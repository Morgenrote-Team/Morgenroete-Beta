 lepsius.16.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]’in toplam arkeolojik tecrübesi: #G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!\n\n Ulusumuz tarafından finanse edilen toplam sefer sayısı: #G [ROOT.Var('lepsius_total_expeditions').GetValue]#!\n\n Ulusumuzun gerçekleştirdiği büyük keşiflerin toplamı: #G [ROOT.Var('lepsius_total_discoveries').GetValue]#!"
 lepsius.16.g: "Büyük bir arkeoloji kongresi düzenle"
 lepsius.17.t: "Büyük Eserler"
 lepsius.17.d: "Bu, müzedeki tüm büyük eserlerin bir özetidir."
 lepsius.17.egypt: "\n#T Mısır:#!\n"
 lepsius.17.sarcophagus: "Krallar Vadisi’nde kayıp bir mezarda #E Bilinmeyen Firavunun Lahdi#!’ni bulduk.\n"
 lepsius.17.nefertiti: "#E Nefertiti Büstü#!, zahmetli kazıların ve diplomatik çekişmelerin ödülü oldu.\n"
 lepsius.17.tut: "#E Tutankhamun’un Ölüm Maskesi#!, Krallar Vadisi’ndeki efsanevi mezarın tacındaki mücevherdir.\n"
 lepsius.17.narmer: "#E Narmer Paleti#!, insanlığın en eski yazılı buluntularından biridir ve bazılarınca Mısır’ın kurucu belgesi sayılır.\n"
 lepsius.17.mesopotamia: "\n#T Mezopotamya:#!\n"
 lepsius.17.lamassu: "Asur’dan #E Kral Sargon’un Lamassu’su#!nu maceralı yollarla elde ettik.\n"
 lepsius.17.meskalamdug: "Babil’de yoğun bir kazı çalışmasının ardından #E Meskalamdug’un Miğferi#!ni bulduk.\n"
 lepsius.17.sargon: "Kadim Asur başkenti Ninova’daki kapsamlı bir kazıda #E Sargon’un Maskesi#!ni bulduk.\n"
 lepsius.17.gilgamesh: "Sürekli yeni parçalar arayışı ve en ileri araştırmalar sonucunda #E Gılgamış Destanı#!nın bazı bölümlerini yeniden oluşturmayı başardık.\n"
 lepsius.17.greece: "\n#T Yunanistan:#!\n"
 lepsius.17.agamemnon: "#E Agamemnon’un Maskesi#!, Miken’deki büyük keşfimizin başlıca buluntusuydu.\n"
 lepsius.17.priam: "#E Priamos’un Hazinesi#!ni Heinrich Schliemann’dan bir hediye olarak aldık.\n"
 lepsius.17.snake: "Minos kültürünün en önemli eserlerinden biri olan Girit’in ünlü #E Yılan Tanrıçası#!nı biraz alışılmışın dışında yollarla müzemize getirmeyi başardık.\n"
 lepsius.17.diskos: "Israrlı kazı çalışmaları sonucunda #E Phaistos Diski#!ni gün yüzüne çıkardık.\n"
 lepsius.17.southamerica: "\n#T Güney Amerika:#!\n"
 lepsius.17.kukulkan: "#E Kukulkan’ın Mücevheri#!, arkeologlarımızdan biri tarafından fantastik ve tehlikeli bir yolculukta elde edildi.\n"
 lepsius.17.pakal: "Arkeologlarımız, Palenque’de yıllar süren kazılardan sonra #E Pakal’ın Gömü Hazinesi#!ni güvence altına aldı.\n"
 lepsius.17.other: "\n#T Diğer:#!\n"
 lepsius.17.abraham: "#E İbrahim’in Asası#!, arkeologlarımızdan biri tarafından manevi bir yolculuk sırasında bulundu.\n"
 lepsius.17.arne: "Fantastik bir macerada, cesur arkeologlarımız 16. yüzyılda dünyanın merkezine yolculuk yaptığının kanıtı olarak #E Arne Saknussemm’in El Yazması#!nı buldu.\n"
 lepsius.17.skull: "Güvenilir bir antikacıdan son derece gizemli bir #E Kristal Kafatası#! edindik.\n"
 lepsius.17.hoa: "Gizemli #E Moai Hoa Hakananai’a#! heykeli, bir maceracı tarafından Paskalya Adası’nda bulundu.\n"
 lepsius.17.summer: "Çin İmparatorluk Sarayı’nın yakılması sırasında, #E Yazlık Saray’dan Yağma#! olarak önemli miktarda değerli eşya elde ettik."
 lepsius.18.t: "Dünya Kültürleri Koleksiyonu"
 lepsius.18.d: "Bu bölüm, dünyanın farklı kültürlerinden eserleri içerir."
 lepsius.18.f: "Bu koleksiyon, bazısı hâlen varlığını sürdüren farklı kültürlerin hem antropolojik hem de arkeolojik bir koleksiyonudur. Bir sergi düzenlemek için #G 10#! eser yeterlidir. Daha büyük koleksiyonlar yoktur, ancak bireysel koleksiyonlar daha değerlidir. Şu anda bu koleksiyon şu bölümlerden oluşmaktadır: \n\n #G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]#! @lepsius_oceanian_minor! Okyanusya’dan küçük eserler \n #G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]#! @lepsius_oceanian_major! Okyanusya’dan büyük eserler \n\n #G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]#! @lepsius_east_asian_minor! Uzak Doğu’dan küçük eserler \n #G [ROOT.Var('lepsius_fareastern_artifact_major').GetValue]#! @lepsius_east_asian_major! Uzak Doğu’dan büyük eserler \n"
 lepsius.18.g: "Bir Uzak Doğu Sergisi Düzenle."
 lepsius.18.h: "Bir Okyanusya Sergisi Düzenle."
 lepsius.22.d: "Başkentimizin seçkinleri ayakta: Arkeoloji Müzesi yeni bir sergiyle karşımıza çıkıyor."
 lepsius.22.f: "Sabahın erken saatlerinde üst ve orta sınıftan insanlar müzenin girişinde toplanıyor. Yeni sergi, önde gelen bir arkeoloğun son sefer ve kazılar hakkında birinci elden bilgi vereceği bir konferansla başlıyor. Ardından sanatseverler ve meraklılar eserleri kendileri inceleyebiliyor. Basın da orada, haberlerini hazırlıyor. [ROOT.GetCountry.GetNameNoFlag] için ulusal ve uluslararası çapta büyük bir gün; büyük güçler prestijli koleksiyonumuza imrenerek bakıyor."
 lepsius.22.g: "Umarım bir bilet daha bulabilirim."
 lepsius.24.t: "Yeni Ege Sergisi"
 lepsius.25.t: "Yeni Prekolomb Sergisi"
 lepsius.26.t: "Arkeoloji Kongresi Sona Eriyor"
 lepsius.26.d: "Arkeoloji Cemiyetimizin düzenlediği kongre bugün sona eriyor. Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] bu süreçte bilgisini genişletti."
 lepsius.26.f: "Haftalar süren toplantılar, okumalar, konferanslar ve samimi buluşmalar sona eriyor. Cemiyete yakın ulusal ve uluslararası arkeologlar keşiflerini, seferlerini ve teorilerini paylaştılar. Etkinlik tam bir başarıydı ve herkesin ufkunu genişletti."
 lepsius.26.g: "Hep şu kimin daha güzel deri ceketleri olduğuna dair tartışmalar..."
 lepsius.27.t: "Yeni Dünya Kültürleri Sergisi"
 lepsius.30.t: "Yeni Baş Arkeolog"
 lepsius.30.d: "Arkeoloji Müzesi yeni bir Baş Arkeolog atadı. Atanan kişi [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]."
 lepsius.30.f: ""
 lepsius.30.g: "Tebrikler!"
 lepsius.31.t: "Baş Arkeolog Müze Müdürü Oluyor"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName], yeni müze müdürü unvanıyla onurlandırıldı. Böylece aktif görevden çekilecek."
 lepsius.31.f: "Yıllar boyunca [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] bilim ve kültüre hayatını adadı ve siyasetten çoktan bıkmıştı. Yalnızca müze çalışmalarına odaklanma kararı çoğu kişi için sürpriz olmadı. Artık siyasi görevlerde ya da seferlerde yer almayacak. Bazı terfiler ne yazık ki üzücüdür."
 lepsius.31.g: "Elveda..."
 lepsius.80.t: "Yeni Bir Arkeoloji Çağı!"
 lepsius.80.d_egypt: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], eski bir Mısır köyüne dair pek çok detayı ortaya çıkarmak için yeni arkeolojik yöntemler kullandı. Stratigrafi ve Üç Çağ Sistemi’ni kullanarak bulgularını belgelemek, arkeolojide yeni bir çağın başlangıcını işaret ediyor."
 lepsius.80.d_mesopotamia: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], eski bir Mezopotamya köyüne dair pek çok detayı ortaya çıkarmak için yeni arkeolojik yöntemler kullandı. Stratigrafi ve Üç Çağ Sistemi’ni kullanarak bulgularını belgelemek, arkeolojide yeni bir çağın başlangıcını işaret ediyor."
 lepsius.80.d_aegean: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], eski bir Ege köyüne dair pek çok detayı ortaya çıkarmak için yeni arkeolojik yöntemler kullandı. Stratigrafi ve Üç Çağ Sistemi’ni kullanarak bulgularını belgelemek, arkeolojide yeni bir çağın başlangıcını işaret ediyor."
 lepsius.80.d_precolumbian: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], eski bir Prekolomb köyüne dair pek çok detayı ortaya çıkarmak için yeni arkeolojik yöntemler kullandı. Stratigrafi ve Üç Çağ Sistemi’ni kullanarak bulgularını belgelemek, arkeolojide yeni bir çağın başlangıcını işaret ediyor."
 lepsius.80.f: "\"Bu köyün eserlerini bulduğumuz toprak katmanları bize çok şey anlatıyor. Örneğin bir katmanda çok miktarda kömür var ve bu, o döneme ait buluntuların sonunu işaret ediyor. Bu da muhtemelen köyün bir yangınla yok olduğu ve terk edildiği anlamına geliyor. Ayrıca hiç metal eşya bulunmaması, buranın bir taş devri köyü olduğunu gösteriyor. Bulduğumuz insan kalıntıları da büyüleyiciydi; yetersiz beslenmişlerdi ve dişleri aşınmıştı.\""
 lepsius.80.g: "Ne kadar da medenî!"
 lepsius.100.t: "[ROOT.GetCountry.GetAdjectiveNoFlag] Arkeoloji Seferine Hazırlık"
 lepsius.100.d: "Arkeoloji seferinin hazırlıkları sürüyor. Ancak, yolculuğun ne kadar süreyle finanse edileceği hâlâ belirsiz."
 lepsius.100.f: "Sadece finansman değil, aynı zamanda seferin süresi de kısa süre içinde siyasi bir mesele haline gelecek gibi görünüyor. [ROOT.GetCountry.GetName], akademisyenlerinin isteklerine boyun eğip uzun zamandır beklenen seferi göndermeye karar verdi. Ancak gidiş-dönüş bile değerli vakit alacakken, Kabine’deki huysuzlar sadece birkaç müzakereci gönderip antikacıdan birkaç eser almanın yeterli olduğunu savunuyor."
 lepsius.100.g: "İş yarım yapılmaz – bu uzun bir yolculuk olacak."
 lepsius.100.h: "Orta uzunlukta bir yolculuk iyi bir uzlaşmadır."
 lepsius.100.i: "Kısa bir yolculuk yeterlidir."
 lepsius.110.t: "Liderlik Üzerine Tartışma"
 lepsius.110.d: "Aydınlar, arkeoloji seferinin başında kendi temsilcilerinden birinin bulunmasını hak görüyorlar. Ancak çok sayıda karşıt ses de mevcut."
 lepsius.110.f: "Ülkenin elitleri bölünmüş durumda. Sefer için verilen devlet desteği, eleştirmenleri ve kıskançları sahneye çıkardı. Ülkenin aydınları bu girişimi kendi egemenlikleri olarak görüyor. Hem muhalefet hem de hükümet güçleri gözlemci olarak birer görev talep ediyor. Aydınların temsilcisinin bu iş için en nitelikli olacağı inkâr edilemez, ama başka ihtimaller de var..."
 lepsius.110.g: "Aydınlar en nitelikli olanlardır."
 lepsius.110.h: "Seferde bir hükümet temsilcisi bulunmalı."
 lepsius.110.i: "Bir muhalefet politikacısı bu iş için uygundur."
 lepsius.110.j: "Arkeoloji deneyimi olan biri bu işi yapmalı."
 lepsius.110.k: "Bu onur sadece veliahta aittir."
 lepsius.120.t: "Askerî Ataşe"
 lepsius.120.d: "Arkeoloji seferi için bir askerî ataşe görevlendirilmesi şiddetle tavsiye ediliyor."
 lepsius.120.f: "Ordu, sefere askerî ataşe olarak katılabilecek üç aday önerdi. Bu karar bugün Harbiye Nezareti tarafından iletildi. Ancak seçim henüz kesinleşmedi."
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]."
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]."
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]."
 lepsius.130.t: "Sanatçılar Seferde"
 lepsius.130.d: "Akademimizden bir grup sanatçı yaklaşan Arkeoloji Seferine katılmakla ilgilendiklerini belirtti."
 lepsius.130.f: "Sanat akademisinde bir seferin kayıp şehirleri ve bilinmeyen sanat hazinelerini arayacağı haberi yayıldı. Çizerler ve ressamlar, Napolyon’un Mısır seferindeki atmosfer, renkler ve sahnelerden zaten ilham almışlardı. Arkeolojik alanların çizim ve eskizlerini yapmak isteyen yeterince aday var. Elbette böyle bir genişleme ek maliyet demektir, ama kesinlikle paraya değer."
 lepsius.130.a: "Kendileri davetlidir."
 lepsius.130.b: "Teşekkürler, ama hayır."
 lepsius.140.t: "Arkeolog Deneyimli Bilim İnsanlarını Katıyor"
 lepsius.140.f: "Ortak ilgiler bizi birbirimize bağlıyor: liderimizin diğer arkeoloji, tarih ve antropoloji konusunda bilgili bilim insanlarıyla bağlantıları var. Sefer üyelerinin böyle genişletilmesi girişimin genel başarısına olumlu katkı sağlayacaktır. Ancak bu dostane bir hizmet değildir: devlet, iaşe, konaklama ve maaş ödemek zorunda kalacak. Kimileri bu sağlanmayı sefer liderinin \"arkadaşlarının\" kayırmacılığı olarak görebilir, ancak kendisi genişlemenin tamamen bilimsel gerekçelerle yapıldığını temin etti."
 lepsius.140.a: "Takım için büyük bir katkı."
 lepsius.140.b: "Arkeoloğumuzun kliklerine para ödemeyiz!"
 lepsius.150.t: "Tabiat Bilimcileri Seferde"
 lepsius.150.d: "Bilim insanları yaklaşan seferde deneyler yapmak istiyor."
 lepsius.150.f: "Ülkemizin üniversiteleri mevcut gelişmelerden etkilenmeden kalmadı. Bazı bilim insanları, coğrafi koşulları incelemek, astronomik hesaplamaları karşılaştırmak ya da hava durumu deneyleri yapmak için sefere katılmak istiyor. Başkaları ise kaya ve ağaç örneklerinin seferin bilimsel sonuçlarını geliştirebileceğini düşünüyor. Seçilen birçok bilim insanından anlaşılıyor ki, bu tür fırsatlarla uzun zamandır beklenen yabancı diyarlara gitmek için adeta gün sayıyorlarmış: sadece bedava yolcu olarak gelmek için bir bahane bekliyorlar. Üstelik pahalı istekleri de var!"
 lepsius.150.a: "A magnificent idea!"
 lepsius.150.b: "Her sakallıya bakamayız..."
 lepsius.200.t: "Sefer Hareket Noktasına Ulaştı"
 lepsius.200.d: "Sefer başlangıç noktasına ulaştı. Yola çıkmadan önce son hazırlıkları yapma zamanı."
 lepsius.200.f_ex_upe: "'Luksor, Luksor!' çığlığı saflardan yükseliyor, Karnak Tapınağı ufukta yükselirken. Sefer üyeleri güverteye yığıldıkça tekne Nil’e devrilecek gibi oluyor, Eski Mısır’da Teb olarak bilinen şehrin siluetine bakıyorlar. Binlerce yıllık yapıların kalıntıları Nil kıyısında sıralanıyor, obeliskler harap evler ve çadırların arasından yükseliyor. Nil’in öteki kıyısında ise kum rengi dağ sıraları yükseliyor; efsanevi Krallar Vadisi’nin gizlendiği ve hâlâ bilinmeyen firavun mezarlarının bulunduğu söyleniyor. Ama oraya varmadan önce Luksor’da halletmemiz gereken işler var..."
 lepsius.200.f_ex_loe: "'Dünyanın Anası' güneş ışığında parıldayan Nil’in sularının üzerinde uzanıyor. Minareler ve kubbeler panoramayı süslüyor, bu şehrin Orta Doğu’nun kaderini bir zamanlar olduğu gibi bugün de belirlemedeki gücünü ve önemini anlatıyor. Renkli çarşılar ve halılar sokaklara hâkim, Fatımi mimarisinin zarif süslemeleriyle birlikte. Ama bakışımız daha da öteye gidiyor – piramitlerin tepeleri çoktan geçmiş bir çağı müjdeliyor ve bu yolculuğun asıl hedefi oluyor. Ancak ondan önce Kahire’de birkaç önlem almamız gerekiyor."
 lepsius.200.f_ex_bab: "Mezopotamya’nın en büyük şehri Bağdat, canlı bir hareketlilik içinde. Kahire gibi Arap dünyasının merkeziydi; Kahire gibi güç ve ihtişamın makamıydı. Ama Kahire’nin aksine, uzak Gize piramitlerinin çok daha eski bir dünyayı hatırlattığı yerde, Bağdat’ta Babil ve Akad imparatorluklarını anımsatacak pek bir şey yok. Hatta dikkatsiz bir sefer üyesinin karanlık bir satıcıdan aldığı sözde antikalar bile sahte çıktı. Mısırlıların ve Mayaların taş yapıları kayıp uygarlıklara tanıklık etmeye devam ederken, burada kıyaslanacak pek bir şey yok. Muhtemelen sıfırdan başlamak zorunda kalacağız."
 lepsius.200.f_ex_ass: "Layard’ın Nimrud’da kazı yaptığı Asur’da daha ne bulunabilir? Musul’daki bir tüccara göre epey şey. Sadece bir ay önce, bir lamassu’nun başı kumdan çıkarıldı. Çarşıda daima iyi parçalar bulunur, diyor bize. Kurtarılamayan birçok parçanın olması ise bölgede kendi alanlarına izinsiz girilmesine izin vermeyen Kürt aşiretleriyle ilgili – kazı ruhsatı olsun olmasın. Uyarıyı aklımızda tutacağız – ve yola çıkmadan önce en gerekli şeyleri alacağız."
 lepsius.200.f_ex_arg: "Ah, eski güzel Atina! Ekibimizin aradığı şeyler için yeterince eski değil ama Attika’da fazladan gün geçirmek için yeterince güzel. Yunanistan’ın çok büyük şehri yok, bu yüzden sefer ekibimizin kırsala çıkmadan önce gerekli hazırlıkları burada yapmaktan başka seçeneği yok. Arkeoloji rehberimiz bizi zorluyor, çünkü bazı bilim insanları dikkatlerini fazlasıyla dağıtıyor – ister klasik mermerler ister Yunan şarabı olsun. Sıcak güneş, zeytin ağaçlarının gölgesi ve pastoral Akkad esintileri oyalanmaya davet ediyor – bazıları burada gerçekten neden bulunduğumuzu çoktan unutmuş gibi görünüyor."
 lepsius.200.f_ex_cre: "Seferimiz Heraklion limanına ulaştığında Ege Denizi’nden hafif bir esinti esiyor. Eski Venedik burçları selam duruyor, Candia’nın Orta Çağ’da bir ticaret merkezi olduğu zamanları hatırlatıyor. Martıların çığlıkları eşliğinde kargolar boşaltılıp katılımcılar karaya çıkarken, dostane karşılama acı gerçeklikle yer değiştiriyor. Bazı katılımcılar yerel mutfaktan şikâyet ediyor ve daha iyi konaklama talep ediyor, ancak baş arkeolog böyle entelektüel olmayan isteklere pek hoşgörülü değil. Çünkü Heraklion onun için sadece bir uğrak yeri – Minosluların hazineleri adanın iç kesimlerinde bekliyor."
 lepsius.200.f_ex_yuc: "Mérida’da kazı ekibimiz büyük yolculuktan önce son hazırlıkları yapıyor. Şehrin ölçülü büyüklüğüne rağmen, İspanyol fethi ve sömürgeciliğinin izleri hâlâ belirgin; Campeche ile birlikte yarımadayı kontrol ettikleri yer burasıydı. Yüz mil bile olmayan bir mesafede, son birkaç yüzyılda ormanın geri aldığı bazı Maya alanlarının bulunduğu söyleniyor. Yeni tapınaklar hatta şehirler keşfetmek istiyorlarsa, sefer üyelerimiz sık orman örtüsünü kazmaya mecbur kalacak..."
 lepsius.200.f_ex_per: "Andlar, tebaalarının başlarının üzerinde krallar gibi yükseliyor; zirveleri, vadilerine girmeye layık olup olmadığımızı sınarcasına heybetle bize bakıyor. Cuzco’ya yolculuk zorlu geçti, fakat teknolojik ilerlemeler sayesinde seferler artık eskisi gibi öngörülemez maceralar olmaktan çıktı. İnkaların eski başkentinin sokaklarında, tarihi İspanyol hâkimiyeti And mimarisinin cazibesiyle birleşiyor. Arada, kusursuz siklop duvarları hâlâ eski hükümdarların mimarisine tanıklık ediyor. Şehir merkezinden bir adım ötede yer alan İnka kalesi Sacsayhuamán’ın kalıntıları, sefer üyelerinin bu yolculukta arayacaklarının bir ön gösterimi niteliğinde."
 lepsius.200.g: "Ah, Mısır."
 lepsius.200.h: "Ah, Mezopotamya."
 lepsius.200.i: "Ah, Yunanistan."
 lepsius.200.j: "Ah, sivrisinekler ve ölümcül hastalıklar."
 lepsius.200.k: "Ah, Peru."
 lepsius.210.t: "Tercümanlar ve Gizemli Rehber"
 lepsius.210.d: "Sefer üyeleri arasında, kalan paramızı birkaç nitelikli tercümana mı yoksa gizemli bir rehbere mi harcamamız gerektiği konusunda anlaşmazlık çıktı."
 lepsius.210.f: "Mesele nicelik ya da nitelik değil, her ne kadar bazı üyelerimiz öyle görse de. Tercümanların yalnızca dili bilmeleri değil, aynı zamanda yerel halkın onlara daha çabuk güvenmesi gibi bir avantajları var. Eserler hakkında bilgi alma ihtimali oldukça yüksek. Öte yandan gizemli rehber ise bizi aksi takdirde bulamayacağımız ya da büyük zorluklarla bulabileceğimiz özel yerlere götürebilir – özel eserlerin ve bilinmeyen zorlukların bulunduğu yerlere."
 lepsius.210.a: "Biraz tercümana ihtiyacımız var."
 lepsius.210.b: "Bölgenin sırlarını bilen bir rehbere ihtiyacımız var."
 lepsius.220.t: "Arkeolog Eser Satın Alıyor"
 lepsius.220.d: "Sefer liderimiz, yerel pazarda bazı değerli eserler bulup satın aldı."
 lepsius.220.f: "Define avcıları, hazine arayıcıları ve maceraperestler, ilk arkeoloğun ayağını yere basmasından çok önce dünyanın kazı alanlarını dolaşıyordu. Bu acı bir gerçek. Çoğu durumda eserler iz bırakmadan kayboluyor, özel koleksiyonlara giriyor ya da değerli metallerden yapılmışsa eritiliyordu. Geri kazanılabilen buluntular bile, kökenlerinin hiçbir zaman kesinleşememesi kusurunu taşıyor. Deneyimli arkeologlar yalnızca eserleri kazıp çıkarmakta değil, aynı zamanda onları ticarette bulup menşelerini yeniden kurgulamakta da sezgi sahibidir."
 lepsius.220.g: "Ne hoş bir sürpriz."
 lepsius.230.t: "Günlük Yazmak"
 lepsius.230.d: "Egzotik çevreden ve günlük izlenimlerden ilham alan sefer liderimiz bir günlük tutmaya başladı."
 lepsius.230.f: "Her ülkenin ve her yerin kendi rengi ve kokusu vardır. Doğu’nun mistisizmi, Yunanistan’ın büyüsü ve Maya ile İnka efsaneleri insanları büyülemiştir. Başkaları ise bilinmez gündelik hayattan, anlaşılmaz dillerden ya da bir maceraperestin içine atıldığı dünyanın garipliğinden esinlenmiştir. Bazen yalnızca yazmak, izlenimlerin etkisini işlemek ve kayda geçirmek için yeterliydi."
 lepsius.230.g: "İnatçı romantik bir ruh."
 lepsius.240.t: "Risale Yazmak"
 lepsius.240.d: "Sefer liderimiz, seferin gidişatı hakkında bilimsel bir makale yazmaya karar verdi."
 lepsius.240.f: "Şaşırtıcı görünebilir ama herkesin kendi işinin yanında notlar tutacak zamanı olmaz. Bazı konular resmi raporlara girmez; belki konudan çok uzaklaştıkları için, belki de henüz olgunlaşmamış oldukları için. Ne olursa olsun: sefer liderimiz, resmi raporlamanın dışında ele almak ve ileride yayımlamak istediği bir konu bulmuş görünüyor."
 lepsius.240.g: "Umarım işe yarar bir şey çıkar."
 lepsius.250.t: "Meyhane Kavgası"
 lepsius.250.d: "Sefer liderimizin kötü huyları diplomatik bir olaya yol açtı."
 lepsius.250.g: "Ne utanç verici..."
 lepsius.260.t: "Takdir"
 lepsius.260.d: "Sefer liderimizin iyi nitelikleri, arkeolojik girişimimizin geniş çaplı takdir toplamasına yol açtı."
 lepsius.260.g: "Harika."
 lepsius.270.t: "Dondurma ve Limonata"
 lepsius.270.g: "Şık seyahat etmek gerekir."
 lepsius.280.t: "Bir Kabul"
 lepsius.280.f: "Yerel vali seferi duymuş ve arkeoloji heyetinin liderini huzuruna çağırmış. Hedeflerle ilgileniyor ve misafiri hakkında son derece meraklıydı. Sonraki sohbette, liderimiz yalnızca ev sahibini iyi eğlendirmekle kalmadı, yetenekleriyle onu o kadar etkiledi ki vali yardım teklif etti. Görüldüğü üzere, kendisine ait değerli bir eseri sefere hediye etti."
 lepsius.280.g: "Harikulade bir armağan!"
 lepsius.290.t: "Ataşe Muhafız Tutuyor"
 lepsius.290.d: "Arkeolojik seferimizin askerî ataşesi yolculuğumuzun güvenliğini sağlamak için bazı paralı askerler tuttu."
 lepsius.290.f: "Anlaşılan Harbiye Nezareti askerî ataşemizi seçerken şanslı davranmış. Yetenekleri, yerel bir askerî subayın takdirini kazandı ve onunla seferimizi koruyacak bir grup muhafız göndermesi üzerine konuştu. Karşılığında ev sahibi ülkenin bir birlik kıtasını ziyaret etti ve tecrübelerini paylaştı."
 lepsius.290.g: "Ordu doğru adamı seçmiş."
 lepsius.300.t: "Arkeolojik Sefer Başlıyor!"
 lepsius.300.d: "Eşyalar toplandı, son yardımcılar tutuldu, sefer planı hazır – yolculuk başlayabilir."
 lepsius.300.f: ""
 lepsius.300.g: "Haydi yola çıkalım!"
 lepsius.310.t: "Arkeolojik Sefer Sona Erdi"
 lepsius.310.d: "Arkeolojik sefer sona erdi. Şimdi ganimeti sayma zamanı!"
 lepsius.310.f: "Nice, zahmetli ve engellerle dolu bir yolculuktu; fakat milletimiz sefer boyunca yalnızca geçmişe dair bilgisini artırmakla kalmadı, aynı zamanda müze için kıymetli eserler de elde etti. Bazı yardımcılar şimdiden ayrıldı, bazı kazı üyeleri ise eve dönmeyi özlüyor. Bu arada sefer lideri, başarının temelini oluşturan küçük parçaları sayıyor. Romantik maceranın ardından kuru bir kataloglama süreci başlıyor."
 lepsius.310.g: "Bilime şerefe! Şimdi evlatlarımızı geri getirin."
 lepsius.310.h: "Bu sadece başlangıç – uzun vadeli bir arkeolojik kazı başlatın."
 lepsius.311.t: "Arkeolog Günlüğünü Yayımlıyor"
 lepsius.311.f: ""
 lepsius.311.g: "Hepimiz için bir ilham kaynağı."
 lepsius.312.t: "Arkeolog Bilimsel Makale Yayımlıyor"
 lepsius.312.f: ""
 lepsius.312.g: "Ulusal kütüphane için bir nüsha almalıyız."
 lepsius.313.t: "Sefer Lideri Eve Dönüyor"
 lepsius.313.d: "[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetFullName], bir arkeolojik seferin ardından döndü. Yolculuktaki deneyimler derin bir iz bıraktı. Ancak şimdi, bulunan eserlerin –çömlek parçaları, kumaş parçaları ve odun parçaları gibi daha önemsiz olanların bile– zahmetli değerlendirmesi bekliyor."
 lepsius.313.f: "Asıl arkeolojik çalışma, bütün objelerin kuru bir kataloglaması, sınıflandırılması ve geçmişe dair sonuçların nemli üniversite duvarları içinde çıkarılması, arkeoloğun hayatının ima ettiğinden çok daha az cazip ve maceracıdır. #V Bu genellikle üç yıl sürer.#! Fakat milletin yine de arkeoloğa ihtiyacı olursa –belki yerel bir kazı için– bilim insanını görevlerinden hemen azletmek daha iyi olabilir. Doktor [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] bundan memnun bile olabilir."
 lepsius.313.g: "Haydi kataloglayalım!"
 lepsius.401.t_bedouin: "Bedevi Baskını"
 lepsius.401.t_kurdish: "Kürt Baskını"
 lepsius.401.d: "Arkeolojik seferimiz yerel kabilelerin saldırısına uğradı."
 lepsius.401.f_bedouin: "Çölün bütün bölgeleri hükümetin tam kontrolü altında değildir. Bazı Bedevi kabileleri, devletin modernleşmesine ve toplumsal değişime başarıyla direnmektedir. Klanlar hâlâ atalarının yüzyıllar önce yaşadığı gibi yaşamaktadır. Kervanlara ve dikkatsiz yolculara baskınlar günlük hayatın bir parçasıdır. Bir Bedevi saldırısı seferimizi de etkiledi: değerli eşyalar ve arkeolojik ekipman çalındı, develer kaçırıldı. Sefer lideri, bu tür tehlikeli olayların bir daha yaşanmaması için hükümetle konuşmamızı istiyor. Elbette bu içişlerine müdahale olarak görülecektir..."
 lepsius.401.f_kurdish: "Mezopotamya’nın kuzey ve doğusunda sınır teşkil eden Zagros Dağları, tarih boyunca yalnızca gevşek şekilde yerel hükümetin kontrolü altında olan Kürt kabilelerine yurt olmuştur. Birçoğu yalnızca kendi kabilesini otorite kabul ederek bağımsız hareket eder. Sık sık baskınlara girişirler. Bu kez bir Kürt saldırısı da seferimizi etkiledi: değerli eşyalar ve arkeolojik ekipman çalındı, develer kaçırıldı. Sefer lideri, bu tür tehlikeli olayların bir daha yaşanmaması için hükümetle konuşmamızı istiyor. Elbette bu içişlerine müdahale olarak görülecektir..."
 lepsius.401.g: "Hükümete resmî şikâyette bulunun."
 lepsius.401.h: "Kendi imkânlarımızla idare ederiz."
 lepsius.401.i: "Onları cezalandırın!"
 lepsius.401.j: "Muhafızlar!"
 lepsius.402.t_desert: "Çöl Fırtınası"
 lepsius.402.t_tropical: "Tropikal Fırtına"
 lepsius.402.d: "Arkeolojik seferimiz yıkıcı bir fırtınayla karşı karşıya!"
 lepsius.402.f_desert: "Başta yalnızca ekibimizin gözlerine kum üfleyen hafif bir esinti vardı. Fakat sonra rüzgâr o kadar şiddetlendi ki hem insanları hem de yük hayvanlarını alt üst etti. Saatler geçmesine rağmen çöl fırtınası şiddetinden hiçbir şey kaybetmedi. Arkeologlarımız bu olayı yerel birine sorduğunda, bu tür fırtınaların yılın bu zamanı için normal olduğunu söyledi. Bu çöl fırtınaları tüm seferimizi tehlikeye atabilir!"
 lepsius.402.f_tropical: "Ne gök gürültüsü ne şimşek, öğleden sonra ekibimizin üstüne aniden boşalan yağmurları haber vermedi. Başta sığınak aradılar, fakat birkaç saat içinde bunun bu bölgedeki olağan yağışlardan çok farklı bir tropikal fırtına olduğunu anladılar. Hatta hamallarımızdan biri bunun tam teşekküllü bir kasırga olabileceğini söyledi!"
 lepsius.402.g: "Bu hafif meltem bizi durduramaz."
 lepsius.402.h: "Durum çok tehlikeli, sefer beklemek zorunda."
 lepsius.403.t: "Andlar’da Sis"
 lepsius.403.d: "Askerî ataşe seferimizi bir kez daha tehlikeye sokunca, diğer katılımcılar sonuç talep ediyor."
 lepsius.403.f: "Andlar’daki sefer ekibimiz askerî ataşeden şikâyet ediyor. Birkaç kez, eski bir İnka alanını bulma çabasında grubu yanlış yöne yönlendirdi. Son zamanlarda, hedefe çabucak ulaşma hırsıyla dağlardaki sisi hesaba katmadı. Sefer bu yüzden önemli vakit kaybetti. Bazı adamlar yeni bir lider atanması için bastırıyor."
 lepsius.403.g: "Görevlerinden alınmalı."
 lepsius.403.h: "İyi iş çıkardı."
 lepsius.404.t_aegean: "Yıkık Köprü"
 lepsius.404.t_peru: "Yıkık Asma Köprü"
 lepsius.404.d: "Yıkılmış bir köprü seferimizin ilerlemesini engelliyor."
 lepsius.404.f_aegean: "Yunanistan ve Girit, sarp arazileriyle tanınır. Seferimiz bir vadiye ulaştığında, köprünün bir ayağının yakın zamanda yaşanan bir toprak kaymasıyla süpürülüp gittiği ortaya çıktı. Şimdi köprüyü onarıp asıl hedefimize yönelmek ya da başka bir yere gitmek arasında seçim yapmamız gerekiyor. İkinci seçenek daha hızlı ve daha ucuz, fakat muhtemelen daha az arkeolojik başarıyla sonuçlanacak."
 lepsius.404.f_peru: "And geçitlerinden ve dar dağ yollarından zorlu bir tırmanışın ardından arkeolojik seferimiz beklenmedik bir sorunla karşılaştı. Yerel halkın efsanelere konu bir tapınağa gittiğini söylediği bir asma köprü tamamen yıkılmış. Bazı sefer üyeleri, arayışı bırakıp daha kolay bir arkeolojik alana yönelmeyi savunuyor – ama yerliler bunun çabaya değeceğini söylüyor. Ancak köprüyü yeniden inşa etmek istersek bize zaman ve para kaybettirecek."
 lepsius.404.g: "Köprüyü yeniden inşa edin."
 lepsius.404.h: "Başka bir yol bulun."
 lepsius.405.t_mesopotamia: "Mezopotamya’da Kötü Yollar"
 lepsius.405.t_yucatan: "Yucatán’da Kötü Yollar"
 lepsius.405.d: "Yolların kötü durumu seferimizi daha önce akla gelmemiş zorluklarla karşı karşıya bırakıyor."
 lepsius.405.f_mesopotamia: "Ne yazık ki tüm yollar aslında beklenebilecek kalitede değil. Özellikle de ana ticaret yolları dışındaki tali yollar ve patikalar şaşırtıcı derecede kötü durumda. Fakat yolculuğumuzun potansiyel hedefleri medeniyet merkezlerinden çok uzakta. Yolculuk güçleşiyor ve bazı sefer üyeleri farklı bir rota seçmemiz gerektiğini şimdiden şikâyet ediyor."
 lepsius.405.f_yucatan: "Yucatán ormanları, bu modern çağda bile hâlâ bakir durumda. Bu da onları değerli arkeolojik hedefler yapıyor, çünkü birçok harabe yüzyıllardır insan eliyle yakından incelenmemiş. Öte yandan yolculuk zahmetlerle dolu. Birkaç sık kullanılan orman patikası dışında neredeyse hiç yol yok. Sefer üyeleri bu rotayı seçme kararını şimdiden eleştirmeye başladı."
 lepsius.405.g: "Başka bir yol deneyin."
 lepsius.405.h: "Yolculuğu kolaylaştırmak için yeni adamlar ve yük hayvanları kiralayın."
 lepsius.405.i: "Bu yolda devam ediyoruz."
 lepsius.406.t: "Sefer Gemisi Batıyor!"
 lepsius.406.d: "Askerî ataşemiz çok talihsiz bir olaydan sorumlu."
 lepsius.406.f: "Sefer gemilerimizden biri Ege Denizi’nde battı. Neyse ki kimse yaralanmadı, ancak pek çok arkeolojik ekipmanımız sulara gömüldü. Ekibimizin çoğu, kaptanın bir kayalığı gözden kaçırmasını suçluyor. Ancak kaptan, yolculuğu çabucak bitirmek istediğini ve kayalığın hiçbir haritada bulunmadığını söyleyerek kendini savundu. Adamlar arasında mevcut liderle başarı şansımızın azaldığına dair artan bir fikir birliği var."
 lepsius.406.g: "Sorumlu olan odur."
 lepsius.406.h: "Yeni ekipman satın alın ve hiçbir şey olmamış gibi davranalım."
 lepsius.407.t: "Vaha"
 lepsius.407.d: "Arkeologlarımız yolculuk sırasında daha önce bilinmeyen bir vaha keşfetti ve su kaynaklarını tazeledi."
 lepsius.407.f: "Aslında sefer üyeleri birkaç gün zahmete katlanmayı bekliyordu: keşfetmek istedikleri eski bir Mısır harabesi çölde iki-üç günlük yürüyüş mesafesinde olmalıydı. Fakat büyük bir sürprizle yolda bir vaha buldular: dolgun hurmalı palmiyeler ve tatlı meyveli incir ağaçları onları bekliyordu. Su kaynakları yenilendi ve bazı katılımcılar Mısır güneşi altında yıkanma fırsatını değerlendirdi."
 lepsius.407.g: "Ferahlık veren haber."
 lepsius.408.t: "Nazarlık"
 lepsius.408.d: "Kiralanan hamallardan bazıları, arkeoloji liderimizin 'nazarın' peşinde olduğuna inanıyor. Ona bir muska almasını ısrarla tavsiye ediyorlar."
 lepsius.408.g: "Muskayı satın al."
 lepsius.408.h: "Bu batıl inanç her türlü bilimsel kanaatle çelişiyor!"
 lepsius.409.t: "Dost Balıkçılar"
 lepsius.409.d: "Kıyıdan geçen bazı dost balıkçılar, seferimizin ekipmanlarını birkaç mil boyunca taşımayı teklif etti."
 lepsius.409.g: "Çok yardımcı oldular."
 lepsius.410.t_yucatan: "Papağan Maskot"
 lepsius.410.t_peru: "Tehditkâr Kondor"
 lepsius.410.d_yucatan: "Yucatán ormanına daldığımızdan beri küçük, rengârenk bir papağan bize eşlik ediyor."
 lepsius.410.d_peru: "Andlar’a tırmandığımızdan beri her gün kudretli bir kondorun gölgesi üzerimizde dolaşıyor."
 lepsius.410.f_yucatan: "Yucatán ormanları tehlikelerle dolu: jaguarlar, yılanlar ve zehirli böcekler çalılıklarda pusuda bekliyor. Aynı zamanda sefer üyeleri flora ve faunadan –özellikle de şapkaların ve miğferlerin üzerinden uçup hiç yanımızdan ayrılmayan küçük, rengârenk bir papağandan– büyülenmiş durumda. Kuş son derece zeki görünüyor ve artık düzenli olarak beslenebiliyor bile. Sefer lideri papağanı seferin maskotu ilan etti ve yolculuk bittiğinde onu eve götürmeyi düşünüyor."
 lepsius.410.f_peru: "Kondor Andlar’ın kralıdır. Bu devasa kuşlar gökyüzüne hükmeder, gölgeleri tahayyül edilemez boyutlara ulaşır. Seferin başından beri alpakaların ve hamalların üzerinde uğursuz bir şekilde dolaşıyor. Yerliler hayvana güvenmiyor. Bir akbaba olarak, yaşayanların değil cesetlerin üzerinde dolaştığı biliniyor. Bu tedirginlik bazı katılımcılar arasında hızla yayılıyor."
 lepsius.410.g: "İyiye işaret."
 lepsius.410.h: "Bir evcil papağan olmalı."
 lepsius.410.i: "Kötüye işaret."
 lepsius.410.j: "O bizim olacak."
 lepsius.411.t: "Yorgun Yük Hayvanları"
 lepsius.411.d: "Görünüşe göre yük hayvanlarımızı fazla çalıştırdık."
 lepsius.411.f: "Günlerdir yük hayvanlarımızı zorluyoruz. Hatta bazıları: çok uzun süredir diyor. Yorgunluk belirtileri artık fark ediliyor. Bazı hayvanlar yolculuğa devam etmeyi reddediyor ve ancak dayakla hareket ettirilebiliyor. Bu sabah ilk hayvanımız yığılıp kaldı."
 lepsius.411.g: "Öldüklerinde dinlenebilirler."
 lepsius.411.h: "Dinlensinler!"
 lepsius.412.t: "Arkeolojik Sefer Kayboldu!"
 lepsius.412.d: "Arkeolojik seferimizle tüm iletişim iki aydır kayıp."
 lepsius.412.f: "Bazen sadece kötü şans olur. Bazı batıl inançlı yerliler, bütün ekibimizin yıldızının düşük olduğunu iddia ediyor. Her halükârda, arkeolojik seferle temas tamamen kayboldu. Son haberin gelmesi uzun zaman oldu. Arkeologların yakında geri döneceğinden eminiz, fakat şu hâlde tüm ekip yolunu kaybetmiş görünüyor."
 lepsius.412.g: "Lanet olsun!"
 lepsius.413.t: "Egzotik Hastalıklar"
 lepsius.413.d: "Arkeolojik seferimizin bazı katılımcıları ciddi şekilde hastalandı."
 lepsius.413.f: "Hastalıklar her zaman uzun yolculukları zorlaştırmıştır. İster tropiklerde, ister çöllerde, bataklıklarda ya da yüksek dağlarda olsun: sefer üyelerimiz bu koşullara alışık değil ve her yerde bilinmedik patojenler pusuda. Özellikle sıtma sürekli olarak kurbanlarını alıyor. Yolculuk sırasında bazı adamlar o kadar ağır hasta düştüler ki artık çalışamayacak durumdalar."
 lepsius.413.g: "Bekleyip onları iyileştirelim."
 lepsius.413.h: "Onları geride bırakın."
 lepsius.414.t: "Yolsuzluk"
 lepsius.414.d: "Seferimiz yerel memurlar tarafından taciz ediliyor ve ilerlememiz engelleniyor."
 lepsius.414.f: "Sefer başladığından beri katılımcılar çok çeşitli baskılarla karşılaştı. Küçük ve orta dereceli memurlar damgalar ve özel harçlarla hayatımızı zorlaştırıyor. Hatta biri vizemizi sorguladı ve bize ceza kesmek istedi. Durum son derece kafa karıştırıcı. Görünüşe göre bu ülkede iyi bağlantılar veya aile bağları olmadan ilerlemek mümkün değil."
 lepsius.414.g: "Haydutlar!"
 lepsius.414.h: "Hırsızlar!"
 lepsius.414.i: "Siyasetçiler!"
 lepsius.415.t: "Sel"
 lepsius.415.d: "Ülke sel felaketiyle harap olurken, sefer liderimiz bir kadının sel sularına kapıldığını gördü."
 lepsius.415.f: "Son günlerdeki sürekli yağmurlar suyun taşmasına neden oldu; olağanüstü bir hava durumu, ama sefer üyelerimizin hazırlıksız olduğu bir şey değil. Nehir azgın bir akıntıya dönüşmüş olsa da adamlarımız yolculuğa devam ediyordu – ta ki kıyıdan bir çığlık duyulana kadar. Bir an için sefer liderimiz rengârenk bir bohçanın sürüklendiğini gördü. Şimdi hızlı tepki vermek önemli, her ne kadar bu yolculukta kesin bir gecikme anlamına gelse de."
 lepsius.415.g: "Onu kurtarın!"
 lepsius.415.h: "Sefer bekleyemez!"
 lepsius.416.t: "İyi Hava"
 lepsius.416.d: "Arkeolojik sefer olağanüstü iyi ilerliyor."
 lepsius.416.f: "Sefer ekibimiz gayet iyi ilerliyor. Bazen en iyi haber, haber olmamasıdır; bu durumda arkeologlarımız iyi hatta çok iyi bir kazı alanı bulacaklarından emin. Bunun dışında kayda değer bir şey yok – iyi hava dışında!"
 lepsius.416.g: "Ne kadar tatmin edici."
 lepsius.417.t: "Misafirperver Halk"
 lepsius.417.d: "Yerel halk seferimizi dostça karşıladı, ama belki bundan daha fazlasını da çıkarabiliriz..."
 lepsius.417.f: "Seferimiz küçük bir köyde mola verdi. Sakinler son derece misafirperverdi; ekibe iyi bir dinlenme yeri sundular ve hayvanlara yiyecek sağladılar. Yerlilerle konuşurken, bölge hakkında –eski kalıntılar dâhil– daha fazla bilgiye sahip olabilecekleri ima edildi..."
 lepsius.417.g: "Her şeyi öğrenmeliyiz."
 lepsius.417.h: "Olduğu gibi kalsın."
 lepsius.418.t: "Yerel Rehber"
 lepsius.418.d: "Bir yerel rehber seferimize hizmetlerini sundu."
 lepsius.418.f: "Bazen sadece şanslı olmak gerekir. Seferimiz, bölgeyi çok iyi tanıyan ve çevredeki önemli yerler hakkında bilgisi olan bir yerel rehber kazandı."
 lepsius.418.g: "Mükemmel!"
 lepsius.419.t: "Kestirme"
 lepsius.419.d: "Seferin askerî ataşesi bir harabeye giden kestirme bir yol buldu, ama karşılığında bir şey istiyor."
 lepsius.419.f: "Askerî ataşemiz bir kestirme yol bildirdi. Dün öğleden sonra mola verdiğimizde çevreyi araştırmış ve hiçbir haritada yer almayan eski bir yol bulduğunu iddia ediyor. Eğer doğruysa bu, seferimize yardımcı olabilir; fakat aynı zamanda onu iyi bir şekilde ödüllendirmemiz gerektiği anlamına da geliyor..."
 lepsius.419.g: "Ödüllendirin ve onu takip edin!"
 lepsius.419.h: "Onu olduğundan daha önemli kılmayalım."
 lepsius.420.t: "Motivasyonu Yüksek Adamlar"
 lepsius.420.d: "Seferimiz, özellikle motive olmuş adamları işe alma şansı buldu. Bu, başarı şansımızı önemli ölçüde artırıyor."
 lepsius.420.f: "Uzaklardan ıslıklar ve şarkılar duyuluyor. Arkeolojik sefer olağanüstü iyi ilerliyor. Ekip son derece motive ve başarılı olacaklarından emin. Adamlar engellere ve sorunlara karşı daha rahat davranıyor. Bunun nedenini bilmiyoruz, belki de adamlarımızı seçerken şanslı davrandık. Her hâlükârda bu, başarı şansımızı büyük ölçüde artırıyor."
 lepsius.420.g: "Carpe Diem."
 lepsius.421.t: "Böcek (Skarabe)"
 lepsius.421.f: "Ne yazık ki mastaba yakınlarında yapılan küçük bir kazıda ekibimiz hiçbir şey bulamadı – lapis lazuli mavisi küçük bir skarabe dışında. Skarabe, Antik Mısır’da bir tılsım olarak kabul edilirdi. Dışkı toplarını yuvarlama davranışı, Re ve onun güneş kayığında gökyüzünde yaptığı yolculukla ilişkilendirilirdi. Sefer liderimiz, belki küçük bir istisna yapılıp bu ikincil parçanın kendisi için bir hatıra olarak saklanabileceğini sordu."
 lepsius.421.g: "Eser onda kalabilir."
 lepsius.421.h: "Bulunan tüm eserler –istisnasız– müzeye verilmelidir!"
 lepsius.422.t: "Kumdaki Tapınak"
 lepsius.422.d: "Arkeologlarımız Makedonlara ait görünümlü bir tapınak buldu."
 lepsius.422.f: "Başta adamlarımız bunun bir kumul olduğunu sandı – ama işlenmiş kireçtaşından küçük bir çıkıntı, arkeologlarımıza Mısır çölündeki bu alışılmadık kum dağının bir sır sakladığını gösterdi. Birkaç gün içinde sefer bir tapınağı ortaya çıkardı. Bazıları sonuçtan hayal kırıklığına uğradı çünkü yapı Antik Mısır’a benzemiyor, Büyük İskender dönemine ait olduğu anlaşılıyordu. Fakat uzmanlar, tapınağın Mısır’daki Yunan generalin faaliyetlerinin bir kanıtı olduğunu söyledi – ki onun mezarı bugüne kadar bulunamamıştır."
 lepsius.422.g: "Büyük İskender’in izinde..."
 lepsius.422.h: "Hepsi boş lakırdı."
 lepsius.423.t: "Kanatlı Aslan"
 lepsius.423.d: "Arkeologlarımız Mezopotamya’da kerube benzeyen bir heykelcik ortaya çıkardı."
 lepsius.423.f: "İnsan ve hayvan karışımı melez yaratıklar Doğu’da oldukça yaygındır. Seferimiz, bir kazı alanı ararken olağanüstü güzel ve iyi korunmuş bir heykelciği ele geçirmeyi başardı; eser şimdiden müzemize doğru yola çıktı. Varlığı bir tapınak muhafızı olarak tanımlayan çivi yazılı bir kitabe de oldukça aydınlatıcıydı. Arkeologlarımız, bu tapınak muhafızlarının Tevrat’ta bahsedilen İsrailoğulları kerubimleriyle bağlantılı olduğunu ileri sürdüler. Bunlardan ikisi, Kudüs Tapınağı’nda duran Ahit Sandığı’nı da koruyordu."
 lepsius.423.g: "Kayıp Sandık’tan mı bahsediyoruz?"
 lepsius.423.h: "Aziz Markos, sen misin?"
 lepsius.423.i: "Hepsi boş lakırdı."
 lepsius.424.t: "Çivi Yazılı Depo"
 lepsius.424.d: "Arkeologlarımız çok sayıda Mezopotamya eseri ortaya çıkardı."
 lepsius.424.f: "Arkeologlarımız küçük bir kasabanın kenarındaki eski bir suru incelerken aslında pek bir şey bulmayı beklemiyordu. Ancak taşı ellediklerinde yapının içinde boşluklar olduğunu fark ettiler. Detaylı bir araştırmadan sonra duvarın belli bir noktasını kırdılar – meğerse duvarın içine çivi yazılı tabletler yerleştirilmiş! Depo şaşırtıcı derecede iyi korunmuştu ve Antik Mezopotamya hakkında önemli bilgiler sunuyordu."
 lepsius.424.g: "Muhteşem bir keşif!"
 lepsius.425.t: "Orikalkum mu?"
 lepsius.425.d: "Arkeologlarımız garip, bilinmeyen bir maddeden yapılmış bir eser buldu."
 lepsius.425.f: "Yunanistan’daki seferlerimizden birinde arkeologlarımız ilginç bir keşif yaptı. Sabah müze yönetimine küçük bir küre ulaştı. Müdür önce neden adamlarının ona bir mermer yolladığını anlayamadı; normal şartlarda önemsiz bir buluntu olurdu. Fakat kehribar rengindeki küre, başka hiçbir yerde karşılaşmadığımız bilinmeyen bir maddeden yapılmıştı. Şimdilik uzmanlar esere dair ne düşüneceklerini bilemiyor; bazıları sahte olduğuna inanıyor. Diğerleri ise bu bulgunun Ege dünyasına dair bilgimizin tamamen yetersiz olduğunun bir kanıtı olduğunu iddia ediyor."
 lepsius.425.g: "Platon da Critias diyalogunda buna benzer bir şeyden bahsetmemiş miydi...?"
 lepsius.425.h: "Hepsi boş lakırdı."
 lepsius.426.t: "Seramik Yığını"
 lepsius.426.d: "Arkeologlarımız çok sayıda Ege eseri ortaya çıkardı."
 lepsius.426.f: "Antikler için çöp olan şey, bir arkeolog için hazine kaynağıdır. Bu motto kısa süre önce doğrulandı; seferimiz küçük bir harabede durduğunda ve detaylı inceleme sonucunda bir çömlek deposunun bulunduğu bir çukur keşfedildiğinde. Çoğu parça hâlâ onarılmayı bekliyor, fakat çok sayıdaki buluntu müze koleksiyonumuzu kesinlikle zenginleştirecek."
 lepsius.426.g: "Ve hepsi bize ait!"
 lepsius.427.t: "Maya Yeşim Taşı"
 lepsius.427.d: "Arkeologlarımız değerli yeşim taşından yapılmış Maya eserleri buldu."
 lepsius.427.f: "Yeşim, Maya sanatında ve dininde çok yaygın kullanılan bir malzemeydi. Elitler kendilerini yeşimle süslerdi, güneş tanrısı da yeşim takılarla betimlenirdi. Orta Amerika halkları ayrıca yeşimden aletler de yapıyordu, çünkü bu, Yeni Dünya’da bilinen en sert malzemelerden biriydi. Arkeologlarımız son kazılarında bu türden birkaç yeşim eseri bulmayı başardı."
 lepsius.427.g: "Koleksiyonumuzda harika durur."
 lepsius.428.t: "İnka İdolü"
 lepsius.428.d: "Arkeologlarımız gizemli bir altın İnka idolü buldu."
 lepsius.428.f: "İnka tanrısı Inti’ye ait altın bir heykelcik bu sabah ekspres kargo ile müzeye ulaştı. Arkeologlarımız eseri nasıl ya da nerede bulduklarını söylemiyor. Aynı anda hem korkunç hem de güzel bir yüz ifadesi gözlemciye bakıyor. Bazı uzmanlar eserin İnka kökenli olup olmadığından şimdiden şüphe duyuyor. Tasarım bilinmeyen bir kültüre işaret ediyor. Ayrıca, İnka altınlarının neredeyse tamamı Peru’dan çalınmıştı. Bu, şimdiye kadar ön-Kolombiyen koleksiyonumuzdaki en eşsiz eser olabilir. Müze müdürü, bazı efsanelerin aslında doğru olabileceğini şimdiden fısıldamaya başladı."
 lepsius.428.g: "El Dorado, diyen?"
 lepsius.428.h: "Hepsi boş lakırdı."
 lepsius.429.t: "Kristal Kafatası"
 lepsius.429.d: "Arkeologlarımız... bir şey buldu."
 lepsius.429.f: "Güvendiğimiz bir tüccar, kazıcımızın yeminine göre, ona son zamanlarda olağanüstü ilginç ve bir o kadar da ürkütücü bir parça göstermiş. Bu bir insan kafatasıydı – tamamen Mezoamerikan kuvarsından yapılmıştı. Yüzeyi inanılmaz derecede iyi parlatılmış ve işçilik, Güney Amerika kıtasındaki kültürler hakkında bildiğimiz her şeyi geride bırakıyordu. Ama şüpheler büyük. Hatta baş arkeoloğumuz bile esere dair ne düşüneceğinden %100 emin değil."
 lepsius.429.g: "Koleksiyona ekleyelim."
 lepsius.429.h: "Kesinlikle sahte."
 lepsius.430.t: "Sahte Kristal Kafatası"
 lepsius.430.d: "Yıllar önce bize bir sansasyon olarak satılan sözde eser aslında bir sahteymiş."
 lepsius.430.f: "Bu nasıl oldu? Çok mu dikkatsizdik? Yoksa sansasyondan sansasyona koşup sadece inanmak istediklerimize mi inandık? Yıllar önce müzemizin bir cazibe unsuru olarak edindiği efsanevi kristal kafatası ucuz bir sahte çıktı. Arkeoloji dünyasındaki saygınlığımızın yeniden inşa edilmesi yıllar alacak!"
 lepsius.430.g: "Arkeolojimiz için ulusal bir utanç!"
 lepsius.431.t: "Yerliler Harabeyi Biliyor"
 lepsius.431.d: "Yardımsever bir yerli, eserleri bulmamıza yardımcı oldu."
 lepsius.431.f: "Seferimiz güzergâh üzerindeki küçük bir kasabada mola verdiğinde, varış noktamız hakkında bir şeyler duymuş yaşlı bir çiftçiyle karşılaştık. Biraz ekmek, tuz ve su karşılığında son derece yardımsever davrandı. 'Diğer köylüler zaten ne aradığınızı bana söylediler,' diye açıkladı. Bizi yarım günlük bir yolculukla bilinmeyen arazilerden geçirdi. Arkeologlarımız, onu doğrudan antik bir harabeye götürdüğünde şaşırdılar. Müzemiz için bazı eserler bulmayı başardık."
 lepsius.431.g: "Bugün bizim şanslı günümüz olmalı!"
 lepsius.432.t: "Yerli Bir Eseri Takas Ediyor"
 lepsius.432.d: "Bir yerli bize bir eser satmak istiyor."
 lepsius.432.f: "Seferimiz daha büyük bir şehirde durakladı. Hamallar yük hayvanları için yem alırken, bir tüccar söze girdi. Görünüşe göre, yolculuğumuz hakkındaki haberler halk arasında epey yayılmış. İyi bir fiyat karşılığında, bir mezar soyguncusundan aldığı değerli bir sanat eserini satmaya razı. Eserin kökeni belirsiz ama teklif cazip – bedeli olsa da."
 lepsius.432.g: "Müzeye ait olmalı."
 lepsius.432.h: "Böyle şüpheli işlere bulaşmayız."
 lepsius.433.t: "Gerçek mi, Sahte mi?"
 lepsius.433.d: "Şüpheli itibara sahip bir antikacı bize bir eser satmak istiyor."
 lepsius.433.f: "Sözde değerli arkeolojik eserlerin tüm satıcıları güvenilir değildir. Bu, aşırı hevesle bize bir sanat hazinesi satmak isteyen bir tüccar için de geçerli. Israrcı tavırları ve sözde bize 'dost fiyatı' vadeden esnek pazarlık tarzı, sefer liderlerimizde şüphe uyandırdı. Bu yüzden müzeye danışarak eseri bu kuşkulu satıcının elinden alıp almamamız gerektiğini sordular."
 lepsius.433.g: "Riski göze almalıyız."
 lepsius.433.h: "Ona güvenme."
 lepsius.434.t: "Mezar Soyguncuları Yakalandı"
 lepsius.434.d: "Seferimiz, bir grup mezar soyguncusunu ve ganimetlerini yakaladı, fakat onlara ne yapacağımız konusunda kararsızız."
 lepsius.434.f: "Arkeologlarımız iyi bir kazı alanı bulduklarını sanıyordu, ta ki oranın yüzyıllardır yağmalandığını fark edene kadar. Eşyalarını toparlarken, birkaç kamp ateşi nöbetçisi, terk edilmiş alandan bir eser kaçırmaya çalışan birkaç şüpheli kişiyi yakalamayı başardı. Aslında, adamları yetkililere teslim etmeli ve çalınan parçayı iade etmeliyiz. Ancak bazıları, esere sahip çıkmamız ve mezar soyguncularının sus payını ödememiz gerektiğini düşünüyor."
 lepsius.434.g: "Eser bizim olmalı."
 lepsius.434.h: "Şikâyet edin ve eseri yerel yetkililere iade edin."
 lepsius.435.t: "Müzayede"
 lepsius.435.d: "Siyasi baskı, yakın zamanda bulunan bir eseri satmayı düşünmemize yol açıyor."
 lepsius.435.f: "Hükümetin bazı üyeleri arasında, yurtdışı arkeolojik girişimlerimizin para israfı olduğuna dair korkular var; ulusal ekonomik çıktımızı, küçük bir bilim insanı kliğinin fildişi kuleleri uğruna feda ettiğimiz iddia ediliyor. Onlar yalnızca bilimsel sonuçlar değil, aynı zamanda bu seferlerin mantıklı olduğunu kanıtlayacak parasal göstergeler de istiyor. Bu nedenle bir grup politikacı, yakın zamanda bulunan bir eserin satılarak arkeolojik maceralarımızın masraflarının karşılanmasını talep ediyor."
 lepsius.435.g: "Müzayedede satın."
 lepsius.435.h: "Ama o müzeye ait!"
 lepsius.436.t: "Gizli Oda"
 lepsius.436.d: "Arkeologlarımız, yağmacılar tarafından talan edilmiş gibi görünen bir mezar buldu. Ancak daha fazla araştırma yaptıklarında, sahte bir duvarın arkasında bir oda keşfettiler."
 lepsius.436.f: "Son durak hayal kırıklığıyla başladı. Sefer liderimiz bu tarihi yerden çok şey bekliyordu: bir soylu yüksek görevlinin, belki de kutsal bir işleve sahip birinin mezarıydı. Her hâlükârda, bazı köylülerden gelen bilgiler bunu gösteriyordu. Ancak sahadaki hayal kırıklığı daha da büyüktü: mezar boştu, duvarlar çıplaktı ve en ufak bir tarihî öneme dair iz bile yoktu. İlk bakışta, düzgün yontulmuş bir mağaradan ibaret gibi görünüyordu. Ancak bu aniden değişti; bir araştırma asistanı duvara yaslandığında kapı çerçevesinin izini fark etti. Moloz, kapaklar ve taşları temizlemek iki saat sürdü – ve sonunda gizli bir odaya erişim açığa çıktı."
 lepsius.436.g: "Hazinem benim!"
 lepsius.437.t: "Terk Edilmiş Kamp"
 lepsius.437.d: "Yabancı bir kazı ekibinin terk edilmiş kampını bulduk. Orada iki eser güvenceye aldık, fakat ülkenin büyükelçisi parçaları kendisi için talep ediyor."
 lepsius.437.f: "Adamlarımız kazı kampına vardığında, yalnızca birkaç ay önce yakındaki bir tapınağı araştıran bir keşif ekibinin izlerini incelediler. Görünüşe göre kazı işçileri alanı biraz fazla hızlı boşaltmıştı: bir kutuda alınmamış iki eser bulundu. Arkeologlarımız buluntuları güvenceye aldı, ancak çok geçmeden ülkenin büyükelçisi gelerek bu eserlerin kendi ülkelerine ait olduğunu ileri sürdü. Olay, büyük bir güçle diplomatik krize yol açtı."
 lepsius.437.g: "Biz bulduk, bizimdir."
 lepsius.437.h: "Eserleri paylaşalım."
 lepsius.437.i: "Bunun yerine bilgimizi paylaşalım."
 lepsius.437.j: "Onlar gerçek sahipleridir."
 lepsius.438.t: "Keşiş"
 lepsius.438.d: "Ne yazık ki, elinde bir eser bulunan bir keşiş işbirliğine pek istekli değil."
 lepsius.438.f: "Bir esere sahip olduğu söylenen tuhaf bir keşişten haber aldık. Geçmiş hakkında etkileyici bir bilgiye ve olağanüstü bir hafızaya sahip. Pek çok açıdan, seferimizin bilim insanları bile onun bilgisine hayran kaldı. Huysuz ihtiyar bize daha fazlasını anlatmak istiyor, fakat eseri asla vermeye niyeti yok. Görünüşe göre zor kullanmak zorundayız."
 lepsius.438.g: "Bu eseri istiyorum ve hemen istiyorum!"
 lepsius.438.h: "Sadece onu dinle."
 lepsius.439.t: "Dinamit mi?"
 lepsius.439.d: "Bazen özel zorluklar özel önlemler gerektirir."
 lepsius.439.f: "Bir kazı sırasında, rehberimiz bir geçidin bir duvarın arkasında gizlenmiş olabileceği sonucuna vardı; en azından arkasında bir boşluk fark ettiğini iddia ediyor. Arkeolojinin ilk dönemlerinde yüksek bilimsel amaçlar uğruna patlayıcıların kullanımı gibi radikal yöntemler normal kabul edilirdi. Elbette, iddia edilen boşluk bir aldatmaca çıkarsa, hiçbir şey elde edemeyiz ve daha önce güvenceye aldığımız kazı alanını tehlikeye atmış oluruz."
 lepsius.439.g: "GÜÜÜM!"
 lepsius.439.h: "Bunu düşünmek bile barbarca."
 lepsius.440.t: "Kırık Bir Parça"
 lepsius.440.d: "Kırık bir eser bulduk. Eksik parça önemsiz bir gücün elinde."
 lepsius.440.f: "Bir kazı sırasında arkeologlarımız değerli bir sanat hazinesi buldu – en azından bir kısmını. Diğer parçanın ise birkaç yıl önce bir antikacıdan satın alan küçük bir devletin elinde olduğu ortaya çıktı. Eksik parçayı elde etmek ve eseri birleştirmek için diplomatik hizmetimizi kullanabiliriz, fakat büyükelçi bunun siyasi bir taahhüt olacağını şimdiden açıkça belirtti."
 lepsius.440.g: "Kibarca rica edelim."
 lepsius.440.h: "Aslında konu o kadar da önemli değil."
 lepsius.441.t: "Unutulmuş Bir Dikilitaş"
 lepsius.441.d: "Bitirilmemiş bir dikilitaş, bilim insanlarımıza antik inşaat uygulamaları hakkında bilgi veriyor."
 lepsius.441.f: "Antik bir Mısır taş ocağında, arkeologlarımız bitirilmemiş bir dikilitaşı andıran bir şey buldu. Görünüşe göre devasa monolit üzerindeki çalışmalar hiçbir zaman tamamlanmamış. Hiyeroglifleri olmasa da ve boyutları nedeniyle taşınamasa da, bilim insanlarımız antik Mısırlıların bu yapıları nasıl yaptıkları ve diktikleri konusunda yeni içgörüler kazandılar."
 lepsius.441.g: "Çok ilginç."
 lepsius.442.t: "Mumyalı Hayvanlar"
 lepsius.442.d: "Yakın zamanda keşfedilen mumyalı hayvanların nasıl ele alınacağı arkeologlar arasında tartışma yarattı."
 lepsius.442.f: "Birkaç gün önce arkeologlar özel bir buluntunun olduğu bir mezar odası keşfetti: orada gömülü soylunun yanı sıra, içinde hayvanların bulunduğu küçük lahitler de bulundu. Görünüşlerine göre bunlar bir kedi, bir köpek ve bir maymun. Bu keşif sonrası bilim insanları arasında tartışmalar alevlendi: mumyalanmış hayvanlar, antik Mısır’da hayvan beslenmesi ve evcil yaşam hakkında ışık tutabilir, fakat aynı zamanda bu nadir eserlerin yok edilmesi anlamına da gelebilir."
 lepsius.442.g: "Ayrıntılı bir inceleme gerektiriyorlar."
 lepsius.442.h: "Onlara dokunmayın, onlar önemli müze eserleri!"
 lepsius.443.t: "Bir Timsah Yüzünden Kavga"
 lepsius.443.d: "Ölü bir timsah hakkındaki garip bir anlaşmazlık, bilim insanlarımız ile askerî ataşeyi karşı karşıya getirdi."
 lepsius.443.f: "Nil faunası, bilim insanlarımızı biyolojik araştırmalarını yoğunlaştırmaya teşvik etti. Özellikle de hem korkuyla hem iğrenmeyle hem de hayranlıkla karşıladıkları Nil timsahına özel ilgi gösterdiler. Bilim insanlarımızın talebi üzerine askerî ataşemiz bir timsahı öldürdü. Ancak şimdi hayvanı teslim etmeyi reddediyor: onu doldurtup şöminesinin üzerine asmayı tercih ediyor."
 lepsius.443.g: "Timsahı araştırmacılara teslim etsin."
 lepsius.443.h: "Yaşasın tahnitçilik!"
 lepsius.443.i: "Gerçekten de güzel bir timsah..."
 lepsius.444.t: "Firavunun Laneti"
 lepsius.444.d: "Birkaç gizemli olayın ardından sadece yerli yardımcılarımız değil, bazı bilim insanları bile artık Mısır’daki girişimimizin lanetli olduğuna inanıyor!"
 lepsius.444.f: "Her şey, sefer liderimizin bir Mısır mezarını açmasından sonra başladı: lahitte korkunç görünümlü bir mumya vardı ve birkaç dakika içinde katılımcıların gözleri önünde parçalandı. Sadece birkaç gün sonra gizemli bir hastalık neredeyse tüm katılımcıları etkiledi. Mumyanın açılışında bulunan bir araştırma asistanı öldü. Bir gün sonra çıkan bir kum fırtınası çalışmayı bir hafta boyunca imkânsız hale getirdi. Bu sabah ise su kaynaklarımızın bakır-sarı renkte parladığı ve içilemez derecede kirlenmiş olduğu ortaya çıktı. Artık giderek daha fazla kişi, mezarı kirlettikleri için bedel ödemeleri gerektiğine inanıyor: bilinmeyen firavunun laneti üzerlerindeydi!"
 lepsius.444.g: "Bu da ne? Kuyruklu yıldız mı görüldü?!"
 lepsius.445.t: "Gılgamış Destanı’ndan Bir Parça"
 lepsius.445.d: "Bilim insanları ünlü Gılgamış Destanı’ndan bir parça buldu. Bu, insanlığın bilinen en eski edebî eseri kabul ediliyor."
 lepsius.445.f: "Gılgamış Destanı, esas olarak Babil bölgesinden gelen ve günümüze ulaşmış en eski yazılı metinlerden birini içeren edebî eserler grubunun konusudur. Farklı versiyonlarıyla Gılgamış Destanı, Akad ve Sümer edebiyatının en bilinen eseridir. Destan, Uruk kralı Gılgamış’ın öyküsünü, onun kahramanlıklarını ve maceralarını, Enkidu ile dostluğunu, ölümünü ve Gılgamış’ın ölümsüzlüğü arayışını anlatır. #T @lepsius_gilgamesh_fragment! Destanın temel bir versiyonunu yeniden inşa etmek için beş parçaya ihtiyaç vardır.#!"
 lepsius.445.g: "Daha fazla parça bulmalıyız."
 lepsius.445.h: "Bu son parça!"
 lepsius.445.i: "Ne kadar çok parça, o kadar iyi."
 lepsius.446.t: "Minos Freski"
 lepsius.446.d: "Girit’te yapılan araştırmalar sırasında, kazı ekibimiz Minos kültürüne ait kalıntılarla karşılaştı."
 lepsius.446.f: "Güzel bir fresk, arkeologlarımızın dikkatini çekti. Balıkçıların, dansçıların ve top oynayanların tasvir edildiği parçalar, antik Minos uygarlığının gündelik yaşamına dair bir izlenim veriyor. Girit’te kazı ekibinin ortaya çıkardığı duvar, 4.000 yıl sonra bile boya izleri taşıyor! Bu olağanüstü keşiften sonra daha birçok buluntuya ulaşılacağı kesin."
 lepsius.446.g: "Kaybolmuş bir kültür gözlerimizin önünde canlanıyor."
 lepsius.447.t: "Kiklop Duvarları"
 lepsius.447.d: "Argolis’te yapılan araştırmalar sırasında kazı ekibimiz Miken kültürüne ait kalıntıları gün yüzüne çıkardı."
 lepsius.447.f: "Bir dizi aksiliğin ardından, Yunanistan’daki arkeologlar, yerlilerin önce zeytinlik terası sandığı, fakat aslında bir Kiklop duvarının tepesi olan yapıyı buldular. Sefer üyeleri şimdiye kadar çok şey bulamamış olsalar da, en azından bir başlangıç sayılır."
 lepsius.447.g: "O zamanlar nasıl bu kadar kusursuz inşa edebiliyorlardı?"
 lepsius.448.t: "Maya Stelası"
 lepsius.448.d: "Yucatán’daki arkeoloji ekibi, Maya hiyerogliflerinin çözülmesinde ilerleme kaydetti."
 lepsius.448.f: "Yucatán ormanlarının derinliklerinde, sefer üyelerimiz Maya dönemine ait bir yazıtla karşılaştı. Bilim insanları bu yazıtı kabaca M.Ö. 6. yüzyıla tarihlendiriyor. Bu keşif, kayıp kültür hakkındaki bilgimizi büyük ölçüde artırdı, fakat bazı hiyeroglifler hâlâ arkeologlarımız için gizemini koruyor. Yine de, sürece katılanlar bize Maya yazısının çözülmesinin sadece bir zaman meselesi olduğu konusunda umut veriyor."
 lepsius.448.g: "Onu çözümlemeliyiz."
 lepsius.449.t: "Maya Mağarası"
 lepsius.449.d: "Sefer ekibi Maya kültürüne ait izler buldu, fakat ellerinde gösterilecek pek bir şey yok."
 lepsius.449.f: "Mayalar, mağaraları ritüellerini gerçekleştirmek için kullanırlardı. Ancak bu ritüellerin kesin içeriği günümüze kadar açıklığa kavuşmuş değildir. Belki arkeologlarımız gelecekte bu konuda daha çok şey anlatabilecektir. Ekip, kuzey Guatemala’da bir Maya mağarasının girişini buldu. Ancak şu ana kadarki sonuçlar oldukça yetersiz kaldı."
 lepsius.449.g: "Size maaş niye veriyoruz ki?"
 lepsius.450.t: "And Dağları’nda Mumya"
 lepsius.450.d: "Dağın zirvesinde, bilim insanlarımız soğuğun yüzyıllar boyunca koruduğu, kurban edilmiş İnka çocuklarının cesetlerini buldu."
 lepsius.450.f: "Capacocha, İnka’lar arasında önemli bir kurban ritüeliydi ve genellikle çocukların kurban edilmesini içerirdi. Hem erkek hem de kız çocukları imparatorluğun dört bir yanından seçilirdi ve törenler, imparatorluk genelinde dağılmış önemli kutsal alanlarda gerçekleştirilirdi. Bu tür kurbanların amacı, insanlığın en iyilerini tanrılarına katmak olarak anlaşılırdı. Kurban seçilen çocuklara genellikle alkol ve koka yaprağı verilir ve törenin yapıldığı yere bırakılırlardı. İnka’lar özellikle çok yüksek rakımlardaki belirli wak’a alanlarına büyük önem gösterirdi. Bu dağlardaki en önemli alanlarda, capacocha törenlerinde kurban edilen çocukların mumyalanmış kalıntıları bulunmuştur."
 lepsius.450.g: "Rahatsız edici, ama değerli."
 lepsius.451.t: "Bir Heykel"
 lepsius.451.d: "Arkeologlar yolculuk sırasında dikkate değer bir heykel buldular. Ne yazık ki boyutu nedeniyle taşınamıyor."
 lepsius.451.f: "Bir sonraki kazı alanına giderken sefer ekibimiz, keşfedilmemiş, engebeli bir bölgede devasa bir heykelle karşılaştı. Hatta pek çok yerli yardımcı ve hamal bile ondan habersizdi; bilimsel heyeti ise ilk andan itibaren büyüledi. Sefer liderimiz heykelin taşınmasını önerdi, fakat hem boyutu hem de zemine bağlılığı bu projeyi zorlaştırıyordu. Çoğu katılımcı bu nedenle en iyi seçeneğin tüm yazıtları kopyalamak ve heykelin ayrıntılı bir çizimini yapmak olduğuna karar verdi. Yine de, bu değerli keşfin parçalanıp başkente gönderilmesi gerektiğini söyleyen birkaç kötü niyetli ses de yükseldi..."
 lepsius.451.g: "Ayrıntılı bir çizim yapıp yazıları titizlikle kopyalasınlar."
 lepsius.451.h: "Heykeli parçalara ayırın ve eve gönderin."
 lepsius.452.t: "Bir Kayıt"
 lepsius.452.d: "Sefer liderimiz, uzun zaman önce yok olmuş bir malzemeyi betimleyen antik bir kayıt elde etti."
 lepsius.452.g: "Hiç yoktan iyidir."
 lepsius.453.t: "Sanatçılar manzarayı kâğıda aktarıyor"
 lepsius.453.d: "Arkeolojik sefere götürdüğümüz sanatçılar, manzarayı öyle bir netlikle resmettiler ki, bu kayıtlar bilim insanlarına onlarca yıl boyunca fayda sağlayacak."
 lepsius.453.f: "Tarih boyunca arkeolojik seferlere yalnızca klasik filologlar değil, coğrafyacılar, biyologlar, matematikçiler, astronomlar veya çevreyi kalem ve kâğıtla kaydeden sanatçılar gibi farklı bilimsel kişilikler de katılmıştır. Katılan herkes, evdeki meslektaşlarına kazı alanının mümkün olan en doğru tasvirini sunabilmek için önemli bilgiler getirmiştir. İşte bu disiplinlerarası yaklaşım, Napolyon’un Mısır’ı işgalinden beri seferleri çok yönlü bir girişim haline getirmiştir; böylece aynı anda birçok alanda bilimsel dönüm noktaları atılmıştır."
 lepsius.453.g: "İyi ki onları işe almışız."
 lepsius.454.t: "Bilim İnsanları Araştırma Yapıyor"
 lepsius.454.d: "Bilim insanlarımız alanda çeşitli deneyler yaptı, sadece karşılaştırmalar yapmakla kalmayıp arkeologlarımıza da faydalı tavsiyelerde bulundular."
 lepsius.454.f: "Tarih boyunca arkeolojik seferlere yalnızca klasik filologlar değil, coğrafyacılar, biyologlar, matematikçiler, astronomlar veya çevreyi kalem ve kâğıtla kaydeden sanatçılar gibi farklı bilimsel kişilikler de katılmıştır. Katılan herkes, evdeki meslektaşlarına kazı alanının mümkün olan en doğru tasvirini sunabilmek için önemli bilgiler getirmiştir. İşte bu disiplinlerarası yaklaşım, Napolyon’un Mısır’ı işgalinden beri seferleri çok yönlü bir girişim haline getirmiştir; böylece aynı anda birçok alanda bilimsel dönüm noktaları atılmıştır."
 lepsius.455.t: "Rakip Keşif"
 lepsius.455.d: "Vahşi doğada birkaç mil ileride, sefer liderimizin ekibi bitkin halde bir grup adamla karşılaştı. Bunlar yabancı bir seferin acınası kalıntılarıydı."
 lepsius.455.f: "Keşfedilmemiş topraklara giren sadece bizim arkeologlarımız değil. Eksantrik bir bilginin küçük, özel seferi devletimizin yürüttüğü çalışmayla kesişti. Bizim ekibimizin aksine rakip şirketin adamları yetersiz donanımlıydı. Yoksunluk ve sefalet içlerinde açıkça görülüyordu. Seferimizin papazı onlara yardım edilmesini önerdi – bu, aynı zamanda anavatanda hayırsever bir jest olarak da yorumlanabilirdi. Öte yandan bazı üyeler, yabancı bilginlerle bilgi alışverişi fırsatını gördü. Askerî ataşe ise, yardım karşılığında seferin hazinesinden değerli bir eser elde etme fırsatı olduğunu düşündü."
 lepsius.455.g: "Onlara yardım edin."
 lepsius.455.h: "Bilgileri karşılığında onlara yardım ediyoruz."
 lepsius.455.i: "Yiyecek ve yardım ancak hazinelerini bize bırakırlarsa."
 lepsius.461.t: "Fısıldayan Sfenks"
 lepsius.461.d: "Kuşkulu yaşam tarzı, sefer liderimiz [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]’in unutulmaz halüsinasyonlar görmesine sebep oluyor."
 lepsius.462.d: "Kuşkulu yaşam tarzı, askerî ataşemiz [SCOPE.sCharacter('lepsius_military_attache').GetFullName]’in unutulmaz halüsinasyonlar görmesine sebep oluyor."
 lepsius.461.g: "Bu adam gerçekten yaşam tarzını gözden geçirmeli."
 lepsius.463.t: "Kedi Tanrıça Bastet"
 lepsius.463.d: "Seyahati sırasında, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] yaptığı çalışmalar sonucunda kedilere karşı bir zaaf geliştirdi."
 lepsius.463.f: "Hayvan biçimli çeşitli tanrılar arasında, Antik Mısır’da kedi tanrıça Bastet de biliniyordu. Kediler, fareler ve hatta yılanlar gibi haşereleri ambarlardan uzak tuttukları için Mısırlılar tarafından büyük saygı görürdü. Mısır’a olan ilgisi sırasında sefer liderimiz bu tanrıçaya büyük ilgi duymaya başladı ve kendine bir kedi edinip ona bakmaya koyuldu. Bu hayvan dostluğu, sert karakterini de bir nebze yumuşattı."
 lepsius.463.g: "İnsan ya kedi insanıdır ya köpek insanı."
 lepsius.464.t: "Tazıyla Av"
 lepsius.464.d: "Askerî ataşemiz [SCOPE.sCharacter('lepsius_military_attache').GetFullName], Mezopotamya’da seyahat ederken yerli bir av köpeği edindi."
 lepsius.464.f: "Orta Doğu’da köpeklerin genelde iyi bir itibarı yoktur. Ancak istisna olanlardan biri tazı türü Saluki’dir. Bedevilere göre o, hem asil bir dosttur hem de tavşan ya da ceylan avında mükemmel iş çıkarır. Askerî ataşemiz böyle mükemmel bir köpeği yerel birinden hediye olarak aldı ve haftalardır insan ile hayvan arasında güçlü bir bağ oluşuyor."
 lepsius.464.g: "İnsan ya köpek insanıdır ya kedi insanı."
 lepsius.465.t: "Sorunlu Bir Üstünlük Tavrı"
 lepsius.465.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]’in kibirli tavırları, bulunduğumuz ülkede tepki topladı."
 lepsius.465.g: "Neden umursayalım ki? Sonuçta onlar barbar!"
 lepsius.465.h: "Bu diplomatik fiyaskoyu ne pahasına olursa olsun düzeltmeliyiz."
 lepsius.466.t: "Haritacı"
 lepsius.466.d: "Arkeolojik sefer sırasında askerî ataşe haritacılığa büyük ilgi duydu ve kendi harita materyallerini oluşturdu. Görünüşe göre arazi ölçümünde yetenekli."
 lepsius.466.f: "Seferin en başından beri askerî ataşe, birliklerin hareketlerini ve ilerlemelerini titizlikle kaydetti ve kendi haritalarını yaptı. Bir brifingde, şimdiden etkileyici bir koleksiyona sahip olduğu ortaya çıktı. Geçtiğimiz hafta boyunca ona eşlik eden bir bilimsel asistan, bulgularını geliştirmesine yardımcı oldu; artık ölçüm aletleriyle çalışabiliyor. Asistan, onun profesyonel bir haritacı olarak yetiştirilmesini öneriyor."
 lepsius.466.g: "Onu parlak bir kariyer bekliyor!"
 lepsius.466.h: "Haritaları iyi, ama askerî işlere odaklanmalı."
 lepsius.467.t: "Unutulmuş Bir Relik"
 lepsius.467.d: "Arkeolojik seferimizin lideri, Doğu’da küçük bir Hristiyan azınlıkla temas kurdu. Anlatacak olağanüstü şeyleri var."
 lepsius.467.h: "Relik’i incelemeli."
 lepsius.468.t: "Ataşe Eser Çalarken Yakalandı"
 lepsius.468.d: "Bu sabah, kazı işçilerimizden biri, birkaç haftadır kayıp sanılan iki eseri askerî ataşemizin çadırında buldu. Belli ki onları kendine saklamak istemişti."
 lepsius.468.f: "Herkes ataşemizin geçmişini biliyor, fakat seferin diğer üyeleri [SCOPE.sCharacter('lepsius_military_attache').GetFullName]’in eski alışkanlıklarına dönmeyeceğini umuyordu. Ne yazık ki yanıldılar: bir kez haydut, daima haydut. Çünkü bir kazı işçisi, son kazıdan çıkan iki eseri tesadüfen ataşenin rapor etmediğini buldu. Bundan çıkarılacak tek sonuç, onları ya kendine saklamak ya da satmak istediğidir. Sefer lideri henüz kendisiyle yüzleşmedi, ama bu olaydan doğacak sonuçlara varmadan önce nasıl ilerleyeceklerine dair bir anlaşmaya varmanın daha mantıklı olduğunu düşünüyor."
 lepsius.468.g: "Olayı görmezden gelin."
 lepsius.468.h: "Durumu dikkatle ele al, ama eserleri geri vermesi konusunda ısrar et."
 lepsius.468.i: "Onu kamuya açık şekilde ifşa et ve disipline et!"
 lepsius.471.t_karnak: "Karnak"
 lepsius.471.t_memphis: "Memfis"
 lepsius.471.t_uruk: "Uruk"
 lepsius.471.t_niniveh: "Ninova"
 lepsius.471.t_tiryns: "Tiryns"
 lepsius.471.t_phaistos: "Festos"
 lepsius.471.t_itza: "Chichén Itzá"
 lepsius.471.t_olla: "Ollantaytambo"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], ünlü bir bölgeyi ziyaret etmek istiyor. Alanın büyük arkeolojik önemi olsa da bu, seferimizi fazlasıyla aksatacaktır."
 lepsius.471.f_karnak: "Luksor’un kuzeyindeki Karnak Tapınağı, antik dünyanın en büyük tapınak komplekslerinden biri sayılır. Teb şehrinin tanrısı Amun-Re’nin önce yerel tanrı, ardından imparatorluk tanrısı mertebesine yükseltilmesinin ardından Orta Krallık’ın ilk hükümdarları bir tapınak inşa etmeye başladı. Bu tapınak binlerce yıl boyunca genişletilerek bugünkü kompleks halini aldı ve Amun rahipliği burada günlük ibadet hizmeti sundu. 30 firavunun bu tapınakta iz bıraktığı söylenir."
 lepsius.471.f_memphis: "Manetho’ya göre efsanede, Memfis’in MÖ 3000 yılında Kral Menes tarafından kurulduğu anlatılır. Eski Krallık döneminde Mısır’ın başkentiydi ve Mısır tarihinde hep önemli bir şehir olarak kaldı. Memfis, zanaatkârların hamisi olan tanrı Ptah’ın koruması altındaydı; onun tapınağı Hut-Ka-Ptah şehrin merkezinde yer alıyordu. Memfis’in yükselişi ve çöküşü ülkenin tarihiyle doğrudan bağlantılıdır."
 lepsius.471.f_uruk: "Uruk, yazının ilk ortaya çıktığı yerdir. MÖ 4. binyılın sonlarında bile erken Sümer döneminin önde gelen siyasi merkezlerinden biriydi. Antik çağlarda Mezopotamya şehri doğrudan nehrin kenarında bulunuyordu. Mitlerde ve edebiyatta Uruk, Gılgamış Destanı’nın kahramanı Gılgamış’ın başkenti olarak ünlüdür. Bilginler Uruk’u Tevrat’taki Erech (Yaratılış 10:10) ile, yani Nimrod’un Şinar’da kurduğu ikinci şehirle özdeşleştirir."
 lepsius.471.f_niniveh: "Ninova, Dicle Nehri’nin doğu kıyısında bulunur ve Yeni Asur İmparatorluğu’nun başkenti ve en büyük şehriydi; ayrıca birkaç on yıl boyunca dünyanın en büyük şehriydi. Yeni Asur döneminde, özellikle II. Asurnasirpal’den itibaren büyük bir mimari genişleme yaşandı. Ana kapıların bazıları, 30.000 kilogram (30 ton) ağırlığa ulaşan devasa taş lamassu heykelleriyle süslenmişti."
 lepsius.471.f_tiryns: "Tiryns, MÖ 1400–1200 yılları arasında öneminin zirvesine ulaştı ve özellikle Argolis’te, Miken dünyasının en önemli merkezlerinden biri oldu. En dikkat çekici özellikleri sarayı, Kiklop tünelleri ve özellikle Homerik lakabını aldığı surlarıydı: “muhteşem surlu Tiryns”. Tiryns, Herakles ile ilgili mitlerle ilişkilendirilmiştir; kahramanın görevleri sırasında ikamet ettiği şehir burasıydı ve bazı kaynaklar burayı onun doğum yeri olarak gösterir."
 lepsius.471.f_phaistos: "Efsaneye göre Festos şehri Kral Minos tarafından kuruldu ve Herakles’in oğlu ya da torunu olan Heros Phaistos’un adını aldı. Phaistos, Minos’un torunu ve daha sonra Girit kralı olan İdomeneus tarafından öldürüldü. Şehrin ilk hükümdarının Minos’un kardeşi Rhadamanthys olduğu söylenir. Festos, Girit’te Knossos’tan sonra ikinci büyük saray kompleksine sahiptir."
 lepsius.471.f_itza: "Chichén Itzá, Meksika’nın Yucatán Yarımadası’ndaki en önemli harabelerden biridir. Yucatán eyaletinde, Mérida’nın yaklaşık 120 kilometre doğusunda yer alır. Kalıntıları geç Maya dönemine aittir. 1.547 hektarlık bir alanı kaplayan Chichén Itzá, Yucatán’daki en geniş alanlardan biridir. Merkezde dini ve siyasi arka plana sahip çok sayıda anıtsal yapının yanı sıra büyük ölçüde korunmuş basamaklı bir piramit öne çıkar."
 lepsius.471.f_olla: "İnka İmparatorluğu döneminde Ollantaytambo, bölgeyi fetheden İmparator Pachacuti’nin kraliyet mülküydü; şehir ve törensel merkezi inşa ettirdi. Peru’nun İspanyol fethinde ise İnka direnişinin lideri Manco Inca Yupanqui için bir kale işlevi gördü. Ollantaytambo, İnka şehir planlamasının günümüze ulaşan tek örneğidir. Yapılar, İnka terasları ve dar sokaklar hâlâ orijinal hallerindedir. Düz ve dar sokaklar, her birinde merkezî avluya açılan giriş bulunan 15 kare blok (cancha) oluşturur."
 lepsius.471.j: "Kesinlikle hayır – sefer önceliklidir!"
 lepsius.472.t: "Kayıp Bir Dünya mı?"
 lepsius.472.d: "Seferimiz uzun süredir haber göndermemişti, sonunda insan, yük hayvanı ve aletlerde büyük kayıplar yaşadığını bildirdi. Sefer liderinin öne sürdüğü mazeret ise hayret vericiydi."
 lepsius.501.t: "Bilinmeyen Bir Firavunun Mezarı"
 lepsius.501.d: "Sefer liderimiz [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], Krallar Vadisi’nde kayıp bir mezar hakkında bilgi aldı. Görünüşe göre mezar, daha önce bilinmeyen bir firavuna aitti. Yerel halk girişini bulduklarını iddia ediyor."
 lepsius.501.f: "3.000 yıldan fazla bir süre önce Mısır firavunları, efsanevi Krallar Vadisi’ne gömülüyordu. Bu mezarların çoğu Antik Çağ’da zaten biliniyor ve adeta birer turistik cazibe merkezi sayılıyordu – Roma ve Yunan yazıtları buna tanıklık eder. Kıpti Hristiyanlar bazı açık mezarları şapele dönüştürmüştü. Yüzyıllar boyunca çevredeki yerlerden mezar soyguncuları, mezar ve tapınaklardan sanat eserleri çalıp pazarda sattılar. Bu yüzden birçok mezardan geriye sadece boşluklar kaldı. Yine de zaman zaman, uzun süredir unutulmuş ve içinde eserler, resimler ya da açılmamış odalar bulunan mezarlar ortaya çıktı. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] kısa süre önce iyi durumda olabileceği söylenen bir mezar hakkında haber aldı."
 lepsius.501.g: "We don't have time for this."
 lepsius.502.t: "Kum, Çok Fazla Kum"
 lepsius.502.d: "Arkeologlar alana ulaştığında, gerçekten de bir kral mezarına dair kanıtlar bulurlar; fakat alan tamamen kumla kaplıdır."
 lepsius.502.f: "Kazının kolay olmayacağı kimsenin aklına gelmemişti. Ancak bir yerli, arkeologları mezarın bulunduğu söylenen yere götürdüğünde, sefer üyelerinin karşılaştığı ilk şey, üzerine kum ve çamur yığılmış dik bir kaya yüzüydü. Ortada bir mezar izi yoktu. Soru sorulduğunda yerli, mezarın girişini hiç görmediğini ama dedesinin bildiğini, babasının da çocukken en azından bir iz gördüğünü söyledi. Yağmur nedeniyle Krallar Vadisi toprak kaymalarına açıktır; rüzgâr ve Mısır kumu da yüzyıllık alanları gizlemesiyle ünlüdür. Bazı yardımcılar mezarın varlığından bile şüphe duysa da [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], kayıp mezarı aramakta kararlıdır. Ancak yılların yığdığı kum kütlelerini kaldırmak için ek fon gerekecektir."
 lepsius.502.g: "Daha fazla araca ihtiyacımız var!"
 lepsius.503.t: "Kayalık Blok"
 lepsius.503.d: "10 millik alandaki bütün kürekler kullanıldıktan sonra ekip, girişe ulaştı – ama bu kez girişin önünü kapatan dev bir kaya bloğuyla karşılaştı."
 lepsius.503.f: "Günler süren yorucu kum ve çamur küreme işinin ödüllendirileceğini umuyorlardı – en azından sefer üyeleri böyle hayal etmişti. Mezar kompleksinin kapı lentosu bulunduğunda yorgun adamların moral bozukluğu birden coşkuya dönüştü. Sadece birkaç saat içinde girişin geri kalanı da açığa çıktı. Fakat ilerler ilerlemez, bu mezarın neden soyulmadığını keşfettiler: muhtemelen onlarca hatta yüzlerce yıl önce kaya yüzünden kopmuş dev bir blok, giriş yolunu kapatıyordu. En ufak bir çocuk bile içeri sığamazdı; çünkü koridorun geri kalanı moloz ve sertleşmiş çamurla harç gibi dolmuştu. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] önemli bir kararla karşı karşıyaydı: Mezar girişindeki bu engel nasıl kaldırılmalıydı?"
 lepsius.503.g: "İleri yöntemler kullanıyoruz."
 lepsius.503.h: "Gelişmiş mekanikler kullanıyoruz."
 lepsius.503.i: "Gelişmiş nitrogliserin kullanıyoruz."
 lepsius.503.j: "Saf kas gücü kullanıyoruz."
 lepsius.504.t: "Nitrogliserinle Yok Edilen Mezar"
 lepsius.504.d: "Maalesef, patlayıcıların kullanımı faydadan çok zarar getirdi: patlama sadece kayayı değil, tüm mezar kompleksini yok etti!"
 lepsius.504.f: "Patlayıcı temini kolay değildi, ancak ekip birkaç gün içinde bir jeologdan uygun fiyata stok satın alarak bu işi çözdü. Sefer üyelerinin hiçbiri kendini yıkım uzmanı olarak tanımlamazdı ama [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], son derece tehlikeli nitrogliserinle uğraşmanın çok büyük bir zorluk olmadığını düşünüyordu. Belki de önceden bir uzmanla görüşmek daha iyi olurdu; çünkü gerekli miktar yanlış hesaplanmış olmalıydı: sadece kayayı parçalamak yerine arkeoloji seferi tüm kaya yüzünü havaya uçurdu! Sefer üyeleri, en yakındaki dağdan koca kayaların düşüp tüm alanı moloza çevirmesinden hemen önce, mucize eseri kendilerini kurtarabildiler. Girişin ardında ne varsa: artık geri dönüşsüz biçimde yok edilmiş olmalı..."
 lepsius.504.g: "Belki de biraz abarttık?"
 lepsius.505.t_archaeology: "Galerideki Resimler"
 lepsius.505.t_engine: "Yıkılmış Bir Galeri"
 lepsius.505.t_muscular: "Galerideki Resimler"
 lepsius.505.d_archaeology: "Detaylı bir arkeolojik inceleme ve ardından en yeni yöntemlerle kayanın dikkatli biçimde kaldırılmasının ardından, arkeologlarımız firavunun mezarının iyi korunmuş galerisine girmeyi başardı."
 lepsius.505.d_engine: "Bir makine yardımıyla ekip kayayı kaldırmayı başardı – fakat olumsuz sonuçlarla."
 lepsius.505.d_muscular: "Güçlü bir İtalyan tutuldu ve kayanın kaldırılmasıyla birlikte arkeolojik alanın iyi korunmuş kısmına girildi."
 lepsius.505.f_archaeology: "Zor bir ameliyata benzer şekilde arkeologlar kayaya yaklaştı. Taşı incelediler, malzemesini kontrol ettiler, kürek ve kazmalarla kazıdılar. Detaylı incelemenin ardından, girişteki hiyerogliflere zarar vermemek için kayayı katman katman kaldırmaya karar verdiler. Uzun ve yorucu bir süreçti, ama kesinlikle buna değdi. Ellerinde yağ lambalarıyla ilk koridordan ilerlediklerinde Antik Mısır’ın güzelliğini gördüler: tarladaki köylüler, firavunun sarayı ve yargı tanrıları duvarlarda olağanüstü şekilde korunmuştu. Her ne kadar arkeologlar somut eser bulamamış olsa da – yağmalama izleri belirgindi – sadece bu umut verici manzara bile mezarın detaylıca keşfedilmesi için yeterliydi."
 lepsius.505.f_engine: "En son teknoloji, Bilinmeyen Firavun’un Mezarındaki kazımıza yardımcı olmalıydı: bir makineyle kaya, girişten bir halatla çekilecekti. İlk başta taş hiç kıpırdamadı, bu yüzden bilim insanlarımız motoru tam güce çıkardı. Ne yazık ki bu ölümcül bir hataydı: taş kısa süreliğine hareket etse de kayıştan kurtulup mezara doğru tam hızla geri yuvarlandı – ve orada felaket bir yıkıma sebep oldu! [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] ve yardımcıları açılan koridora koşturdu ama gördükleri manzara şok ediciydi: kaya sadece bir zamanlar güzel resimlerle dolu galeriyi tamamen yıkmakla kalmamış, aynı zamanda tüm yapının statik dengesinde önemli bir rol oynayan bir duvarı da ağır şekilde tahrip etmişti..."
 lepsius.505.f_muscular: "Luxor’a döndüğümüzde, sefer üyelerimiz etkileyici bir figür buldu. Kendisi Padovalı bir adamdı; aslında Nil’in taşkınlarını kontrol etmeye yardımcı olacak hidrolik bir cihazı Paşa’ya göstermek için Mısır’a gelmişti. Ancak girişim başarısız olmuştu. Yaklaşık iki metre boyunda, boğa kaslarına sahip bu dev adam daha önce sirkte ‘Patagonya Herkülü’ olarak çalışmıştı. İngiliz uşağının güvenilir tanıklığına göre aynı anda altı adamı kaldırabiliyordu. İşte bu özel yetenekler, onu kayayı kaldırması için işe almamıza ikna etti. Alana gelir gelmez taşı bir kenara yuvarlayarak hayranlık uyandıran bir iş başardı. Ellerinde yağ lambalarıyla koridora giren arkeologlarımız Antik Mısır’ın güzelliğini gördü: tarladaki köylüler, firavunun sarayı ve yargı tanrıları duvarlarda olağanüstü şekilde korunmuştu. Bu umut verici manzara tek başına mezarın detaylı keşfine davet ediyordu."
 lepsius.505.g: "Antik Mısır’ın ihtişamı!"
 lepsius.505.h: "Eyvah."
 lepsius.506.t_archaeology: "Güzel Bir Lahit"
 lepsius.506.t_engine: "Tehlike Altında Bir Lahit"
 lepsius.506.t_muscular: "Kırılmış Bir Lahit"
 lepsius.506.d_archaeology: "Arkeologlarımız Kral Odasına hayranlık ve huşu içinde girdi – ve 20. hanedana ait harika bir lahit ve mumyayı güvence altına aldı."
 lepsius.506.d_engine: "Makinenin verdiği hasar mezar odasında açıkça görülüyordu: arkeologların envanter çıkarmaya vakti olmadı, lahiti olabildiğince hızlı dışarı taşımakla meşguldüler!"
 lepsius.506.d_muscular: "Arkeologlarımız, bilinmeyen firavunun sağlam ve güzel süslenmiş mezar odasına girmeyi başardı – ancak ardından öngörülmeyen bir… aksilik yaşandı."
 lepsius.506.f_archaeology: "Arkeologlarımızın, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] önderliğinde asıl mezar odasına girdiği an gerçekten tarihi bir deneyimdi. Adak kapları ve mumyalanmış bir köpeğin yanı sıra onları özel bir sürpriz bekliyordu: Gerçekte, Bilinmeyen Firavun’un lahdi ve mumyası, gömüldüğü 3.000 yıl öncesinden beri hâlâ oradaydı! Bilim insanlarımız bu şaşırtıcı bulguyu özenle inceledi, tozu temizledi ve mezar soyguncularının hasar verdiği kapağı kaldırınca iyi korunmuş ahşap tabutu ortaya çıkardı. Müze koleksiyonumuz, Mısır kültürüne dair eşsiz bir tanıklıkla zenginleşti!"
 lepsius.506.g: "Arkeoloji günü kurtardı."
 lepsius.506.h: "Hemen taşıyın!"
 lepsius.506.i: "Eyvah."
 lepsius.511.t: "Bir Onur Meselesi"
 lepsius.511.d: "Bazı çiftçilere göre, birkaç gün önce yabancı bir sefer, ülkelerinin bayrağını Keops Piramidi’ne dikmiş. Ekibimizdeki vatanseverler kendilerini meydan okunmuş hissediyor – ve aynısını yapmak istiyorlar."
 lepsius.511.f: "Sefer Kahire yakınlarındayken haber herkesi şoke etti: geçen hafta biri, Gize piramidinin tepesine kendi ülkesinin bayrağını dikmişti! Bilim alanında böylesi şatafatlı gösteriler aslında yasaktı ve Paşa’nın böyle bir zafer işaretine razı olup olmadığı da bilinmiyordu. Tek bir şey kesindi: sefer boyunca, kendi vatanını onursuz bırakmamak adına aynı şeyi yapma arzusu güçlü bir şekilde hissedildi."
 lepsius.511.g: "Bunun için zamanımız yok."
 lepsius.511.h: "Bunu yapacağız – [ROOT.GetCountry.GetName] için!"
 lepsius.512.t: "Şafak"
 lepsius.512.d: "Sefer, sabah erken saatlerde Gize’nin Büyük Piramidi’ne tırmanmak için yola çıkıyor!"
 lepsius.512.f_wine: "Piramide tırmanacak katılımcılar sabah 5’te kalktı; dün beş metre yüksekliğinde bir bayrak hazırlamış, dev sancağı Büyük Sfenks’in yanından geçirerek Keops Piramidi’ne taşımışlardı. Kahvaltı için soğuk hindi hazır, bazıları hâlâ bayrak için yapılan dünkü işlerden yorgundu. Ekibin bir kısmı Sfenks’in ayaklarında kurulu çadırda kalırken, diğerleri piramite doğru yola koyuldu. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], piramidin tepesinde kutlama için özel saklanmış bir şişe şarap olacağına söz verdi."
 lepsius.512.f_no_wine: "Piramide tırmanacak katılımcılar sabah 5’te kalktı; dün beş metre yüksekliğinde bir bayrak hazırlamış, dev sancağı Büyük Sfenks’in yanından geçirerek Keops Piramidi’ne taşımışlardı. Kahvaltı için soğuk hindi hazır, bazıları hâlâ bayrak için yapılan dünkü işlerden yorgundu. Ekibin bir kısmı Sfenks’in ayaklarında kurulu çadırda kalırken, diğerleri piramite doğru yola koyuldu. Ancak grup Büyük Piramit’e yaklaşınca, askeri ataşe bu sabah en önemli şeyin unutulduğunu fark etti: kutlama için şarap!"
 lepsius.512.g: "Umarım en iyi şarabı getirir..."
 lepsius.512.h: "Şarabı mı unuttu?"
 lepsius.513.t: "Tırmanış"
 lepsius.513.d: "Arkeoloji lideri ve askeri ataşe, büyük piramidin dibinde duruyor. Cesur girişime kimin liderlik etmesi gerektiği konusunda anlaşmazlık var."
 lepsius.513.f: "Ekibimiz Firavun Keops’un Büyük Piramidi’nin dibine ulaştı. Kaç adımda göğe çıkılacağı soruldu – ve [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], bu soruya 203 diye yanıt verdi. Çünkü çıkılması gereken taş katmanı sayısı buydu. Bu sırada kimin tırmanışa öncülük edeceği tartışması çıktı. [SCOPE.sCharacter('lepsius_military_attache').GetFullName], kendisinin de en az bir dağcı kadar uygun olduğunu çoktan iddia etmişti..."
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] bizi yönlendirmeli."
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName] bizi yönlendirmeli."
 lepsius.514.t: "Orijinal Giriş"
 lepsius.514.d: "Ekibimiz piramidin daha alçak bir seviyesine tırmandı. Şu anda on yedinci basamaktalar, mezar odasının orijinal girişine oldukça yakınlar."
 lepsius.514.f: "İlk aşama tamamlandı. Seferimiz hâlâ tabana oldukça yakın ama mola verdi. Sefer liderimiz, Keops piramidinin tarihi girişini daha yakından incelemek ve birkaç kazı yardımcısıyla birlikte içeriye girmek istiyor. Bazı üyeler bu molayı öğle yemeği için değerlendiriyor. Herkes, bundan sonra tırmanışın daha tehlikeli olacağını biliyor."
 lepsius.514.i: "Bayrağımız için burası yeterince iyi."
 lepsius.515.t: "100 Basamak"
 lepsius.515.d: "Ekibimiz piramidin yüzüncü basamağına ulaştı. Grup artık tırmanışın neredeyse yarısına gelmiş durumda."
 lepsius.515.f: "Yüz basamak çok görünmeyebilir, ancak kalabalık bir grup, yükler ve sınırlı alanla bu meydan okuma bambaşka. Sancağımız hâlâ dürülü halde, beş adam tarafından taşınıyor. Bazı sefer üyeleri bu noktadaki manzaranın yeterince yüksek olduğunu şimdiden dile getiriyor. Bu sırada [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] tepeye kaygıyla bakıyor – çünkü tırmanışın en riskli aşaması yaklaşıyor."
 lepsius.516.t: "Düşüş"
 lepsius.516.d: "Piramidin son aşamasında, liderimiz ve ekibi kendilerini fazla zorladı – yıkıcı bir olay yaşandı!"
 lepsius.516.f: "Belki insan hatasıydı, belki de bir plan tutmadı, ama belki de kader kibirimizden ötürü bizi cezalandırdı. Ancak piramide tırmanırken, bir yardımcı basamakta kaydı ve diğer sefer üyelerini ve yükleri de beraberinde uçuruma sürükledi. Sefer liderimiz ve askeri ataşemiz en kötüsünü engelleyebildi ama ağır yaralandılar. Bazı hamallar erzakla kurtuldu, diğerleri kırık kemiklerden yakınıyor. Büyük Piramit’e bayrağımızı dikmek için başlatılan bu iddialı girişimi yarıda bırakmak zorunda kaldık."
 lepsius.516.g: "Hepimiz için bir utanç."
 lepsius.517.t: "Büyük Piramidin Tepesinde"
 lepsius.517.d: "Sefer ekibi ve ülkemiz için gerçekten olağanüstü bir gün – [ROOT.GetCountry.GetAdjectiveNoFlag] bayrağı artık Gize’nin Büyük Piramidi’nin tepesinde dalgalanıyor!"
 lepsius.517.f: "Arkeoloji için büyük bir an, [ROOT.GetCountry.GetName] için büyük bir an. Seferimiz Keops Piramidi’nin zirvesine tırmandı ve bu başarı küçük bir kutlamayla taçlandırıldı. Champollion, Lepsius ve Rosellini’nin isimleri coşkulu bir ‘hip-hip-hooray!’ ile yankılandı ve sonunda vatanseverler bayrağı göndere çekti. Batmakta olan güneşin ışığında, sancağımız şimdi tüm Nil Vadisi üzerinde parıldıyor!"
 lepsius.517.g: "[ROOT.GetCountry.GetName] bayrağını dikin – yaşasın!"
 lepsius.517.h: "[ROOT.GetCountry.GetName] bayrağını dikin!"
 lepsius.521.t: "İştar Kapısı"
 lepsius.521.d: "Babil’deki kazılar sırasında arkeologlar, efsanevi İştar Kapısı’nın görkemli kalıntılarını keşfetti. Tarihi şehir kapısı şaşırtıcı derecede iyi korunmuş durumda."
 lepsius.521.f: "Antik Babil başkentinin bulunduğu alandaki kazılarda işçiler önce sırlı tuğlalar buldu; bu da prestijli, temsilî bir yapıya işaret ediyordu. Arkeologlar kazıya devam ettikçe daha fazla bulgu ortaya çıktı. Sonunda, aslanların, boğaların ve mitolojik yaratıkların süslediği, olağanüstü korunmuş şehir kapısının duvarlarını ve kulelerini bile seçebildiler. Sefer lideri [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], hükümetimize cesur bir plan sundu: tüm kapıyı söküp başkentte aslına uygun şekilde yeniden inşa etmek. Sayısız bilinmezliği olan masraflı bir girişim – ama aynı zamanda öyle cazip ki önde gelen entelektüeller ve müze yönetimi bile bu fikri destekledi."
 lepsius.521.g: "Sadece bazı parçaları alın. Yerinde kalmalı."
 lepsius.521.h: "[SCOPE.sState('capital_scope').GetCityHubName]’e taşınmalı ve yeniden inşa edilmeli."
 lepsius.522.t: "Mezopotamya’dan Tuğla Nakli"
 lepsius.522.d: "Tuğla rekonstrüksiyonu için tam boy bir parti tuğla bugün [SCOPE.sState('capital_scope').GetCityHubName] müzesine ulaştı."
 lepsius.522.f: ""
 lepsius.522.g: "Mezopotamya tuğlalarının sabah kokusunu seviyorum."
 lepsius.523.t: "Yabancı Ellerde İştar Tuğlaları"
 lepsius.523.d: "Son birkaç on yılda Babil’de kazı yapan tek biz değilmişiz. Görünüşe göre yabancı bir ulus da İştar Kapısı’nı yeniden inşa etmek için gereken tuğlalardan bazı sevkiyatlara sahip. İsteyerek de olsa alttan almak zorundayız."
 lepsius.523.f: ""
 lepsius.523.g: "Muhtemelen boyun eğmeliyiz."
 lepsius.523.h: "Bir avuç değersiz tuğla için mi? Asla!"
 lepsius.524.t: "Düşman Tuğla Nakliyatımızı Engelledi!"
 lepsius.524.d: "Aylar süren bekleyişten sonra, müzemizde İştar Kapısı’nı yeniden inşa etmek için gereken Mezopotamya tuğlalarının sevkiyatı hâlâ gelmedi. Aldığımız habere göre, nakliye savaş sırasında engellenmiş."
 lepsius.524.f: ""
 lepsius.524.g: "Bu düpedüz sabotaj!"
 lepsius.525.t: "Özel Bir Ücret"
 lepsius.525.d: "Görünüşe göre, İştar Kapısı tuğlalarının geldiği kazı ülkesi girişimimizden kâr sağlamaya çalışıyor. Tuğlalar ihraç edilirken üzerine ‘özel bir ücret’ bindirilmiş!"
 lepsius.525.f: ""
 lepsius.525.g: "Her taş parçası için ödeyeceğiz..."
 lepsius.526.t: "Mezopotamya’dan Küçük Tuğla Nakli"
 lepsius.526.d: "Bilinmeyen nedenlerden dolayı gemimiz bu kez İştar Kapısı’nın tuğlalarıyla sadece yarıya kadar dolduruldu."
 lepsius.526.f: ""
 lepsius.526.g: "Birkaç tuğlayı taşımak bu kadar mı zor?"
 lepsius.527.t: "Tuğla Yüklü Gemi Limana Ulaştı"
 lepsius.527.d: "İştar Kapısı’nı yeniden inşa etmek için gereken olağanüstü miktarda tuğla bugün müzeye ulaştı. Görünüşe göre Mezopotamya’daki yükleme beklenenden daha iyi ilerliyor."
 lepsius.527.f: ""
 lepsius.527.g: "Ah, daha fazla tuğla!"
 lepsius.528.t: "Kötü Tuğlalar"
 lepsius.528.d: "Ne yazık ki, [SCOPE.sState('capital_scope').GetCityHubName]’e ulaşan tuğlalara baktığımızda, küratörlerimiz bazı sandıkların tamamen kullanılamaz halde olduğunu gördü. İyi ya da kötü, onlarsız idare etmek zorundayız."
 lepsius.528.f: ""
 lepsius.528.g: "Değerli tuğlalarım – hayır!"
 lepsius.529.t: "Diplomatik Yalvarış"
 lepsius.529.d: "Yabancı bir ulus, birkaç yıl önce bir antikacının bize sattığı değersiz arkeolojik eserler için tüm dünyanın gözü önünde bizden dilenmek zorunda kaldı. Elbette bu jesti memnuniyetle kabul ettik ve bu ıvır zıvırdan kurtulduk."
 lepsius.529.f: ""
 lepsius.529.g: "Müthiş!"
 lepsius.530.t: "İştar Kapısı Yeniden İnşa Edildi!"
 lepsius.530.d: "Yıllar süren çalışma ve on binlerce Babil parçasının titizlikle birleştirilmesinden sonra, efsanevi İştar Kapısı yeni görkemiyle parlıyor – üstelik orijinal boyutlarıyla müzemizde!"
 lepsius.530.f: "İştar Kapısı, Babil’in iç kentine açılan sekizinci kapıydı. MÖ 575 civarında Kral II. Nebukadnezar’ın emriyle şehrin kuzey tarafında inşa edildi. Şehre uzanan ihtişamlı bir surlu geçit yolunun parçasıydı. Duvarlar çoğunlukla mavi sırlı tuğlalarla kaplanmış, aralarda hayvan ve tanrı tasvirleri kabartma olarak yerleştirilmişti; bunlar farklı kalıplarda şekillendirilip renklendirilmiş tuğlalardan yapılmıştı. Kapının ön cephesi, Babil panteonunun iki büyük tanrısını betimleyen tekrar eden desenlere sahipti. Ulusal tanrı ve baş tanrı Marduk ile onun hizmetkârı ejderha Mušḫuššu. Marduk, yılan benzeri baş ve kuyruk, aslan gövdesi ve arka ayaklarında güçlü pençelerle tasvir edilen bir ejderha biçimindeydi. Marduk, iyiliğin kötülüğe karşı ilahi şampiyonu olarak görülüyor, Babillilerin dualarında sık sık onun koruması aranıyordu. Kapıdaki diğer tanrı ise kutsal hayvanı aurochs (soyu tükenmiş bir sığır atası) olan Adad’dı (İshkur olarak da bilinir). Adad hem yıkıcı fırtınaların hem de faydalı yağmurların tanrısıydı. İştar Kapısı’nın tasarımı ayrıca doğurganlık sembolü olarak görülen çizgisel bordürler ve rozet desenleri de içeriyordu. Kapının tuğlaları ince dokulu kilin ahşap kalıplara bastırılmasıyla yapıldı. Hayvan kabartmalarının her biri de yeniden kullanılabilir kalıplara basılan tuğlalarla oluşturuldu."
 lepsius.530.g: "Magnificent!"
 lepsius.531.t: "Lamassu Efsanesi"
 lepsius.531.d: "Arkeologlarımız, çok eskiden kaybolduğu söylenen olağanüstü görkemli bir lamassu’nun Kürt bölgesinde bir yerlerde olduğuna dair hikâyeyi duydu."
 lepsius.531.f: "Ekibimiz çadırları kurup kamp ateşini yakarak günü sonlandırmak için kuzu etini hazırladığı bir akşamüstüydü. Şafakta kararan siyah, mavi ve kızıl gölgeler içinde yaşlı bir çoban yiyecek isteyerek kampa geldi. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] isteğini yerine getirdi ve olağanüstü bir hikâye dinledi. Yaklaşık 30 yıl önce, başka bir arkeoloji seferi bu bölgede hazine ve olağanüstü sanat eserleri aramış; amacı yerel müze yönetimini etkilemek ve şöhretle dönmekti. Kazının en önemli bulgusu, hâlâ yerel halk arasında devasa boyutları ve iyi durumuyla bilinen koca bir lamassu’ydu. Ancak taşınma sırasında bir kaza oldu. Onlarca adam Mezopotamya’nın bu melez dev heykelini taşırken, seferin liderleri yerel Kürt aşiretiyle aralarındaki anlaşmazlık yüzünden bozuştu. Görünüşe göre işe alınan Kürt işçilerin ücretini ödemekten kaçınmışlardı. Bunun üzerine aşiret, sefer üyelerine pusu kurdu ve kendilerine ait olduğuna inandıkları her şeyi aldı. Lamassu ise olduğu yerde kaldı – hâlâ Kürt bölgesinde kurtarılmayı bekliyor. Çoban, bize efsanevi Lamassu’nun yerini söylemesi karşılığında yardımımızı teklif etti."
 lepsius.531.g: "Böylesi masallar uğruna boş yere kendini tehlikeye atmak çok riskli."
 lepsius.531.h: "Bu lamassu’yu ne pahasına olursa olsun kurtarmalıyız!"
 lepsius.532.t: "Lamassu’yu Arayış"
 lepsius.532.d: "Seferimiz Kürt bölgesine tehlikeli yolculuğa çıktı. Bazıları, başarı şansını artırmak için ekibin bölünmesini savunuyor."
 lepsius.532.g: "Bölünmemeliyiz."
 lepsius.532.h: "Ekibi bölmeliyiz."
 lepsius.533.t: "Hediyeler"
 lepsius.533.d: "Seferimiz, bölgeden barışçıl şekilde geçmek ve lamassu’yu kurtarmak için aşiret liderleriyle buluştu."
 lepsius.533.f: "Ekibin bölünmemesi beklenmedik bir avantaj sağladı: yük kervanının yavaşlığı yüzünden yerel Kürt aşiretinin liderleri bizi beklediğimizden daha hızlı buldu. Kısa süre içinde sefer lideri ve askeri ataşe, bu bölgenin gerçek hâkimleri olarak görülen patriarkların önüne çıkarıldı. Onlarla rahatsız edici bir güvensizlikle karşılaşıldı. Görünüşe göre önceki arkeolojik seferin kötü anıları hâlâ canlıydı. Ayrıca, misafir olarak hediye getirmemiz beklentisi vardı. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] bu ihtimal için hazırlık yapmıştı, ancak edinilen malzemeler birçok lideri niyetimize ikna etmeye yetmedi."
 lepsius.533.g: "İnce kumaşlar sunuyoruz."
 lepsius.533.h: "Onlara onurlarını ve misafirperverliklerini hatırlatın."
 lepsius.533.i: "Onlara bir boyun eğiş jesti gösterin."
 lepsius.534.t: "Hakarete Uğradık"
 lepsius.534.d: "Kürt patriarklarını kazanma girişimi tam bir fiyaskoyla sonuçlandı – aksine onları bize karşı çevirdik. Durumun tırmanması tüm seferimizi tehdit ediyor!"
 lepsius.534.g: "Muhafızlar!"
 lepsius.534.h: "Savunun!"
 lepsius.534.i: "Kaçın!"
 lepsius.535.t: "Kürtler Tarafından Kaçırılan Sefer Üyeleri"
 lepsius.535.d: "Küçültülmüş seferin başarısız arayışının ardından geri döndüklerinde, geride kalan bazı üyelerin bir Kürt saldırısının kurbanı olduğunu dehşetle fark ettiler."
 lepsius.535.f: "Seferi bölme stratejisi sonradan yıkıcı bir hata olarak ortaya çıktı. Görünüşe göre bir Kürt aşireti av bekliyordu ve askeri ataşe komutasındaki silahlı birlik kervandan ayrıldığında fırsatı değerlendirdi. Yanlarında götürdükleri malzemelerin çoğu yağmacılar için pek değerli olmadığından, bir düzine kadar yardımcımızı rehin olarak kaçırdılar; görünüşe göre fidye alabileceklerine inanıyorlardı. Ancak sefer ekibi böyle bir teklifi kabul etmeme kararı aldı – gelecekte emsal teşkil edebilirdi. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] Kürt liderlerle müzakere etmekte ısrar ederken, [SCOPE.sCharacter('lepsius_military_attache').GetFullName] Kürt kampına saldırıp yağmacılara ders verilmesi gerektiğini savundu."
 lepsius.535.g: "Müzakere etmeye çalış."
 lepsius.535.h: "Onlara saldır!"
 lepsius.536.t: "Müzakere Başarısız!"
 lepsius.538.t: "Keder Gecesi"
 lepsius.538.d: "Lamassu arayışı başarısız oldu."
 lepsius.538.f: "Sefer ekibi Kürt bölgesinden eli boş ayrıldı. Tekmelenmiş köpekler gibi, gecenin karanlığında tepelerden geçerek eski rotaya dönmeye çalıştılar. İnsan ve malzeme kaybı tüm sefer üyelerini umutsuzluğa sürükledi. Yolculuğun anlamı üzerine sorular, geride melankoli ve bezginlik bıraktı."
 lepsius.538.g: "Geri döneceğiz..."
 lepsius.539.t: "Asil Bir Ölüm"
 lepsius.539.d: "Askeri ataşemiz [SCOPE.sCharacter('lepsius_military_attache').GetFullName], Kürtlerle olan çatışmada hayatını kaybetti!"
 lepsius.539.f: "Çetin bir savaştı, ancak zayıf eğitilmiş askerlerimiz, deneyimli ve cesur Kürt savaşçıları karşısında fazla bir şey yapamadı. Ataşe geri çekilme emri verdi ve arkamızı korumak için kendi adamlarıyla geride kaldı. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] sadece son bir kez arkasına bakabildi ve onun yere yığıldığını gördü. Ekibin güvenliğe ulaşması için değerli zaman kazandırdı, ama kendisi için artık çok geçti."
 lepsius.539.g: "Bizim için hayatını verdi."
 lepsius.540.t: "Lamassu"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], Kürtleri endişelerimiz konusunda ikna edebildi. Lamassu’yu kurtarmanın yolu açık."
 lepsius.540.d_victory: "Yerli Kürt aşiretine karşı askerî zafer kazandık ve efsanevi Lamassu’ya giden yolu açtık!"
 lepsius.540.f: "Kürtleri iyi niyetimiz konusunda ikna etmek kolay olmadı, ancak sefer liderimizin becerileri bu imkânsız görünen girişimi başarıya ulaştırdı. Sadece birkaç gün içinde, tarif edilen lamassu’yu bir uçurumun yakınında bulduk. Tüm vadiye hâkim muazzam bir görünüme sahipti! Arkeologlarımız colossus’un neredeyse hiç zarar görmemiş olmasına sevindi. Şimdiden belli ki Mezopotamya koleksiyonumuzun başyapıtı olacak."
 lepsius.540.f_victory: "Zorlu ve acı bir savaşın ardından kahraman ataşemiz [SCOPE.sCharacter('lepsius_military_attache').GetFullName], üstün becerileri (ve biraz da askerlerinin yardımı) sayesinde düşmanı bozguna uğrattı. Bu dersten etkilenen Kürtler, artık lamassu’nun kurtarılmasına engel olmaya cesaret edemediler. Sadece birkaç gün içinde, tarif edilen lamassu’yu bir uçurumun yakınında bulduk. Tüm vadiye hâkim muazzam bir görünüme sahipti! Arkeologlarımız colossus’un neredeyse hiç zarar görmemiş olmasına sevindi. Şimdiden belli ki Mezopotamya koleksiyonumuzun başyapıtı olacak."
 lepsius.540.g: "Harika!"
 lepsius.551.t: "Arkeolojik Kaza"
 lepsius.551.d: "There was a terrible accident on an excavation site - Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has disappeared!"
 lepsius.551.g: "What happened to [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]?"
 lepsius.552.t: "Labirent"
 lepsius.552.g: "Umarım boğa görünümlü mitolojik yaratıklarla karşılaşmayız..."
 lepsius.553.t: "Labirent – yeniden"
 lepsius.553.g: "Bu bildiğin déjà vu!"
 lepsius.554.t: "Yunuslar Salonu"
 lepsius.554.g: "Zeus - go left."
 lepsius.554.h: "Demeter and Persephone - go right."
 lepsius.554.i: "Artemis - go upstairs."
 lepsius.554.j: "Poseidon - go downstairs."
 lepsius.555.t: "Güneş Salonu"
 lepsius.555.d: "Bir koridorun sonu üç yola ayrılıyor. Duvar üzerinde bir freskin kalıntıları bulunuyor."
 lepsius.555.f: "On the fresco, the blue color shines towards [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]. The sky takes up the whole wall. Eos, the goddess of dawn, stands in the east and dominates the scene. Opposite her to the west is her husband Astraios, who is only recognizable as a silhouette at night. In between the sun shines at noon."
 lepsius.555.g: "Eos - take the left corridor."
 lepsius.555.h: "Astraios - take the right corridor."
 lepsius.555.i: "Helios - take the middle corridor."
 lepsius.556.t: "Kadınlar Salonu"
 lepsius.556.d: "Kaybolan kişi, sonunda dört açık kapının bulunduğu bir odaya ulaşıyor. Önlerinde dört kadın heykelciği duruyor."
 lepsius.556.f: "The four sculptures show women of different ages and sexes. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] cannot determine whether they are goddesses or mortals. Their forms are primitive and limited to the essentials. Her color has long faded; what makes them different is the objects in their hands. The first holds a ball of yarn in her hand, from which she plucks a thread. The second is holding a mirror and looking at herself. The third is holding a snake. The last leads an arch."
 lepsius.556.g: "The Ball of Yarn - door I."
 lepsius.556.h: "The Mirror - door II."
 lepsius.556.i: "The Snake - door III."
 lepsius.556.j: "The Arch - door IV."
 lepsius.557.t: "Adalar Salonu"
 lepsius.557.g: "Rodos."
 lepsius.557.h: "Delos."
 lepsius.557.i: "Eğriboz."
 lepsius.557.j: "Naksos."
 lepsius.558.t: "Minotauros’un Gazabı"
 lepsius.558.g: "Az önce aşağıda ne oldu?"
 lepsius.559.t: "The Tragic Death of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]"
 lepsius.559.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was found dead in his apartment under mysterious circumstances."
 lepsius.559.g: "Ama gerçekten intihar mıydı?"
 lepsius.560.t: "Labirentten Kaçış!"
 lepsius.560.d: "After finally escaping the maze, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] can tell [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] colleagues about the incredible discovery. To prove that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] hadn't gone mad, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] brought with [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] a striking piece of evidence that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had found in the depths of the labyrinth."
 lepsius.560.g: "Bu… Daidalos’un efsanevi labirenti olabilir mi?"
 lepsius.561.t: "Gizemli Piramit"
 lepsius.561.d: "Arkeolojik seferimiz, Yucatán ormanının içinde yarısı yutulmuş, bugüne dek kaydedilmemiş bir piramit tespit etti. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] daha önce bu yerle ilgili söylentiler duymuştu ve içeri girmeye karar verdi..."
 lepsius.561.g: "Bunun hakkında kötü bir hisim var."
 lepsius.561.h: "İlginç. Önce sen gir."
 lepsius.562.t: "Glif-Bilmecesi"
 lepsius.562.d: "Uzun bir kornişli geçidin sonunda, üzerine bilmece kazınmış işlenmiş taş bir pano duruyor. Dört oyuğa yerleştirilmiş kartuşların her biri büyük bir Maya tanrısının yüzünü taşıyor ve bastırılabiliyor; taş işçiliği adeta mekanik bir düzeneğin kokusunu yayıyor. Altında şu beyit yazıyor: “Doğuda ateşli görkemle doğarım; zirvede yeşim gibi parlarım; alacakaranlıkta yeraltı yoluna inerim. Günlerin hesabını tutar ve efendileri tahtına oturturum.” Kartuşlardan biri seçilmek zorunda."
 lepsius.562.g: "K'inich Ajaw (Güneş Lordu)."
 lepsius.562.h: "Chaac (Yağmur/Gök Gürültüsü)."
 lepsius.562.i: "Itzamnaaj (Yaratıcı/Gökyüzü)."
 lepsius.562.j: "Kukulkan (Tüylü Yılan)."
 lepsius.563.t: "Put"
 lepsius.563.d_right: "Arkeoloğumuz, seferin amacına ulaşıyor; düzenek çözülüyor ve kutsal oda açılıyor."
 lepsius.563.d_wrong: "Arkeoloğumuz iç odaya ulaşıyor; ancak erişimin bu kadar kolay olması mantığa aykırı—düzenek henüz son sözünü söylememiş olmalı."
 lepsius.563.g: "Yavaşça... dikkatlice... yap..."
 lepsius.563.h: "Bu sahneyi biliyorum—hiçbir zaman yolunda gitmez. O lanetli eseri kap ve KOŞ!"
 lepsius.564.t: "Bir Tuzak!"
 lepsius.564.g: "KOŞ!"
 lepsius.564.h: "Biliyordum—kahrolsun!"
 lepsius.565.t_right: "Piramitten Çıkış"
 lepsius.565.t_wrong: "Bir Arkeolojik Rakip"
 lepsius.565.d_right: "Beklentilerin aksine, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] piramidin içindeki düzeneklerden sağ kurtuldu ve putu ele geçirmeyi başardı!"
 lepsius.565.g: "Charlie, motoru çalıştır!"
 lepsius.565.h: "Şu adama hiç katlanamıyorum."
 lepsius.566.t: "Bir Arkeolojik Teklif"
 lepsius.566.d: "Özel bir arkeolog, daha önce yabancı bir rakibinden kaptığı değerli bir eseri bize teklif ediyor."
 lepsius.566.f: "Özel bir keşif ekibi, Yucatán ormanlarının derinliklerinde bir Maya piramidi bildirdi. Lideri—ne yazık ki bir yurttaşımız—kutsal bir put edindiğini iddia ediyor. Anlatıya göre bu put, fötr şapkalı bir [PREV.GetCountry.GetAdjectiveNoFlag] arkeologun elinden çekilip alınmış. O arkeolog ise kısa süre sonra Hovitos kabilesiyle şiddetli bir çatışmada hayatını kaybetmiş. Koşullar ne kadar karanlık olursa olsun, bu eser Pre-Kolombiyen koleksiyonumuz için benzersiz bir çekim unsuru olabilir—tabii istenen bedeli ödersek."
 lepsius.566.g: "Bu eser koleksiyonumuzda harika görünecek!"
 lepsius.566.h: "Biz acımasız mezar soyguncularından eser satın almayız."
 lepsius.581.t: "Kayıp Dünya’ya Dönüş"
 lepsius.581.g: "Onurunu geri kazanmalı."
 lepsius.581.i: "Ulusal çıkarlarımız, birkaç kişinin kırık gururundan daha önemlidir."
 lepsius.582.t: "Dışlanan Kâşif Muzaffer Döndü"
 lepsius.582.d: "Tüm bilim dünyasını şaşırtan bir şekilde, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] Yucatán’dan döndü—ve tuhaf iddialarının kanıtını getirdi!"
 lepsius.582.g: "O… haklı mıydı?"
 lepsius.583.t: "Dışlanan Kâşif Yucatán’da Kayboldu"
 lepsius.584.t: "Kayıp Dünya’ya Giriş"
 lepsius.584.d: "Haftalar sonra, sefer tamamen bilinmeyen bir vadiye ulaştı. Görünüşe göre [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] fantastik iddialarında gerçekten haklı!"
 lepsius.584.g: "İnanılmaz!"
 lepsius.585.t: "Dinozorları Fotoğraflamak"
 lepsius.585.d: "Yeni teknik imkânlar, Kayıp Dünya’nın eşsiz flora ve faunasının fotoğraflanmasını mümkün kılıyor."
 lepsius.585.f: "Sanki milyonlarca yıl öncesine açılan bir pencereye bakmak gibi: pterosaurlar gökyüzüne hükmediyor, dev brontosaurlar yeri titretiyor ve tehlikeli raptorlar dikkatsiz avların peşine düşüyor. Buradaki bitkiler de Yucatán’ın diğer bölgelerindekilerden tamamen farklı. Bilimsel bir yoldaş, anı fırsat bilip fotoğraf makinesiyle bir dizi kare çekti. Bu fotoğraflar eve kanıt olarak götürülecek. Oradaki bilim insanları, belki de dünyanın erken tarihini daha iyi yeniden inşa edebilir."
 lepsius.585.g: "Hadi, ‘KÜKRE’!"
 lepsius.586.t: "Maya Varlığı"
 lepsius.586.d: "Vadiyi ayrıntılı şekilde inceledikten sonra sefer lideri, riskli bir plan ortaya attı."
 lepsius.586.g: "Eşsiz bir fırsat!"
 lepsius.586.h: "Yalnızca en gerekli kanıtları yanımıza alalım."
 lepsius.587.t: "Sefer Korkunç Bir Felaketle Sona Erdi"
 lepsius.587.d: "Sefer, bir raptor saldırısının ardından en kötü hâlini aldı."
 lepsius.588.t: "Kukulkan’ın Mücevheri"
 lepsius.588.d: "Tüm zorluklara rağmen, sefer liderimiz efsanevi Kukulkan’ın Mücevheri’ni ele geçirmeyi başardı!"
 lepsius.589.t: "Kahramanlar Kayıp Dünya’dan Döndü"
 lepsius.589.f: "Ne gün ama! Dünyanın sonuna yapılan tehlikeli ve maceralı yolculuğun ardından, seferimiz olağanüstü bulgularını paylaşarak [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]’ın bir deli değil, aksine saygın bir bilim insanı—ve gerçek bir kahraman—olduğunu kamuoyuna kanıtladı! Basın ve halk tutumlarını gözden geçirerek, hükümetin desteğini de doğru bir karar olarak görüyor. Ancak sefer lideri, oradaki flora ve faunayı korumak ve kaçak avcı riskini azaltmak için vadinin gerçek konumunu gizli tutmaya söz verdi."
 lepsius.701.t: "Yabancılar Mirasımızı Çalmak İstiyor"
 lepsius.701.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag] arkeologları, bugün önemli bir eseri yasa dışı yollardan ülke dışına çıkarmaya çalışırken yakalandı. Nasıl tepki vermeliyiz?"
 lepsius.701.f: "[SCOPE.sCountry('lepsius_smuggler_country').GetName]’den gelen ve bizim verdiğimiz kazı ruhsatlarına sahip yabancı arkeologlar, bugün son derece değerli bir eseri ülke dışına taşımaya çalışırken yakalandı. Yürürlükteki yasalara göre, yabancı arkeologlar buldukları eserlerin yarısını kazının yapıldığı ülkeye teslim etmekle yükümlüdür. Görünüşe göre eseri bize göstermeden kendi ülkelerine kaçırmaya çalıştılar."
 lepsius.701.g: "Protesto et!"
 lepsius.701.h: "Bu eski saçmalıkla ne yapalım ki?"
 lepsius.702.t: "Diplomatik Olay"
 lepsius.702.d: "Ne yazık ki [SCOPE.sCountry('lepsius_protest_country').GetName]’deki yetkililer, değerli eseri ülkemize getirme girişimimizi fark etti. Nasıl tepki vermeliyiz?"
 lepsius.702.f: "19. yüzyılın sonlarından itibaren en yaygın arkeolojik kazı ruhsatı biçimi, buluntuların paylaşımına dayanıyordu: kazıyı yapan, bulduğu eserlerin yarısını kazının yapıldığı ülkeye verirdi. Yetkililer bulunan nesneleri inceler, en değerli parçaların ülke dışına çıkarılmadığından emin olurlardı. Ancak bazı ülkeler çıkarılan bir parçayı vermekte ısrar ederdi; diğer durumlarda ise taraflar, nasıl ilerleyecekleri konusunda anlaşma yapardı."
 lepsius.702.g: "Kim bulursa, onundur."
 lepsius.702.h: "Kesinlikle dostane bir anlaşmaya varacağız."
 lepsius.702.i: "Eseri hayırseverliğimizin bir göstergesi olarak bağışlayalım."
 lepsius.703.t: "Yabancılar Bizimle Alay Ediyor!"
 lepsius.703.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName]’den gelen barbarlar, iddialarımızla alay etti. Bizi buluntuya ortak etmeyi akıllarından bile geçirmediler—ve eseri gizlice kendi ülkelerine kaçırdılar."
 lepsius.703.f: "Viktorya dönemi, özellikle Avrupalı güçler tarafından eserlerin yasa dışı biçimde ülke dışına çıkarıldığı sayısız hikâyeyle doludur. Bazı durumlarda müzeler hâlen iade talepleriyle karşı karşıyadır."
 lepsius.703.g: "Bu küstahlık inanılmaz!"
 lepsius.704.t: "Tavizler Verildi"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName] bize anlayış gösterdi ve iddialarımızı haklı buldu. Diplomatik ve mali olarak tavizler vermek istiyorlar. Ayrıca, değerli hazineyi teslim etmemizi teşvik etmek için bize birkaç başka buluntu da teklif ediyorlar."
 lepsius.704.f: "Mezar soygunu veya hırsızlık şüphesi olan pek çok durumda, Avrupalı güçler kazı yapılan ülkelere taviz verdi. Örneğin Truva’daki kazılardan sonra Schliemann, eserleri yurt dışına kaçırdığı için Bâb-ı Âli’ye hesap vermek zorunda kalmıştı. Schliemann yalnızca birkaç buluntu teslim etmekle kalmamış, ayrıca talep edilen miktarın beş katını ödemişti. Böyle bir yöntem uluslararası alanda en zarif çözüm olmasa da, kazı yapılan ülkeyi tamamen aldatmaktan daha iyiydi ve çoğu zaman davacı ülkeler tarafından dostane bir çözüm olarak kabul edilirdi."
 lepsius.704.g: "Hatalarını anladıklarına sevindim."
 lepsius.706.t: "Önemli Eser Geldi!"
 lepsius.706.d: "Biraz gecikmeyle de olsa, değerli eser bugün nihayet müzeye ulaştı. Müdür şimdiden onun için çok özel bir yer seçti!"
 lepsius.706.f: "Önemli eserler her serginin ve müzenin gurur kaynağıdır. Böyle mücevherlere sahip olabilen ülke ne kadar da şanslı!"
 lepsius.711.t: "Tutankhamun’un Maskesi"
 lepsius.711.d: "Tutankhamun’un kayıp mezarını keşfettikten sonra, arkeologlarımız çok özel bir eseri ortaya çıkarmayı başardı: firavunun maskesi!"
 lepsius.711.f: "Tutankhamun’un maskesi, 18. hanedan dönemi Antik Mısır firavunu Tutankhamun’a ait altın bir maskedir. Ölüm maskesi, dünyanın en bilinen sanat eserlerinden biridir ve Antik Mısır’ın önde gelen sembollerinden sayılır. Ahiretin Mısır tanrısı Osiris’in suretini taşıyan maske 54 santimetre yüksekliğinde, 10 kilogramdan (321,5 ons) ağırdır ve yarı değerli taşlarla süslenmiştir. Maskenin omuzlarında, Ölüler Kitabı’ndan alınmış kadim bir büyü hiyerogliflerle işlenmiştir. Yüzü, firavunun standart tasvirini gösterir; aynı suret, mezarın başka yerlerinde, özellikle de bekçi heykellerinde bulunmuştur. Mısırbilimci Nicholas Reeves’e göre maske, “yalnızca Tutankhamun’un mezarından en ikonik görüntü değil, belki de Antik Mısır’ın kendisinden en bilinen objesidir.”"
 lepsius.711.g: "Koleksiyonumuzun en değerli sergisi olacak."
 lepsius.711.h: "Eseri güvenli şekilde ülke dışına çıkarmaya çalışmalıyız..."
 lepsius.712.t: "Nefertiti Büstü"
 lepsius.712.d: "Mısır’daki kazılarımız sırasında, arkeologlarımız gerçekten olağanüstü bir eser buldu: Nefertiti Büstü!"
 lepsius.712.f: "Nefertiti Büstü, firavun Akhenaten’in Büyük Kraliçe Eşi Nefertiti’nin boyalı sıva kaplı kireçtaşı büstüdür. Antik Mısır’ın en çok kopyalanan eserlerinden biridir. Nefertiti, antik dünyanın en ünlü kadınlarından biri ve kadınsı güzelliğin bir ikonu haline gelmiştir. Nefertiti hakkında çok az şey bilinmektedir. Teorilere göre o ya doğuştan bir Mısırlı soylu, ya yabancı bir prenses ya da daha sonra Tutankhamun’dan sonra firavun olan yüksek devlet görevlisi Ay’ın kızı olabilir. 1352 MÖ’den 1336 MÖ’ye kadar hüküm süren Akhenaten ile birlikte Mısır’ın naip hükümdarı olmuş da olabilir. Büstte herhangi bir yazıt bulunmaz, ancak diğer tasvirlerinde de taktığı karakteristik taç sayesinde kesin olarak Nefertiti’ye ait olduğu anlaşılır."
 lepsius.713.t: "Narmer Paleti"
 lepsius.713.d: "Arkeologlarımız kazıları sırasında olağanüstü bir eser ortaya çıkardı: Narmer Paleti!"
 lepsius.713.f: "Narmer Paleti, Büyük Hierakonpolis Paleti ya da Narmer Paleti olarak da bilinir ve MÖ 31. yüzyıla tarihlenen önemli bir Mısır arkeolojik buluntusudur. En azından nominal olarak kozmetik paletler kategorisine aittir. Şimdiye kadar bulunan en eski hiyeroglif yazıtlardan bazılarını içerir. Tabletin, Yukarı ve Aşağı Mısır’ın Kral Narmer altında birleşmesini tasvir ettiği düşünülmektedir. Akrep Topuzu ve Narmer Topuzları ile birlikte Nekhen’deki ana hazinede bulunan Narmer Paleti, bir Mısır kralının bilinen en eski tasvirlerinden birini sunar. Palet, Antik Mısır sanatının pek çok klasik kuralını göstermektedir ki, bu kuralların paletin yaratıldığı dönemde zaten oturmuş olduğu anlaşılır. Mısırbilimci Bob Brier, Narmer Paleti’ni “dünyanın ilk tarihsel belgesi” olarak tanımlamıştır."
 lepsius.722.t: "Sargon’un Maskesi"
 lepsius.722.d: "Asma Bahçeleri’nin keşfi sırasında Ninova’daki kazılarda arkeologlarımız dikkat çekici bir eser buldu: Sargon’un Maskesi!"
 lepsius.722.f: "Eski Sümer hükümdarlarının peruk miğferini takmış bir kralın tunçtan başı, büyük olasılıkla bizzat Sargon’dur. Göz kakmaları eksik ve başka yerlerinde biraz hasarlı olsa da, bu baş antik sanatın en büyük başyapıtlarından biri olarak kabul edilir. Baş, Ninova’da bulunan gerçek boyutlu bir tunç büsttür. Sakalın kıvrımları ve desenleri ile karmaşık saç stili, toplumda ideal bir erkek için krallığı, gücü ve zenginliği simgeler. Estetik özelliklerinin yanı sıra bu parça, kayıp mum kalıbı döküm tekniğiyle yapılmış bilinen en eski içi boş döküm heykel olmasıyla da dikkat çekicidir. Yüzün ve gözün sol tarafında kasıtlı hasar vardır; bu, daha sonraki bir dönemde büstün siyasi ikonoklazmı göstermek için kasten tahrip edildiğini gösterir."
 lepsius.723.t: "Meskalamdug’un Miğferi"
 lepsius.723.d: "Babil’deki kazılarımız sırasında arkeologlarımız özel bir buluntuya rastladı: Meskalamdug’un Miğferi!"
 lepsius.723.f: "Meskalamdug’un Miğferi, Ur’un kraliyet mezarlarından bulunan en ünlü eserlerden biridir. Meskalamdug, MÖ 26. yüzyılda Ur’un Birinci Hanedanı’nın erken dönem Sümer hükümdarıydı. Miğfer altın levha ile kabartılmıştır, bu nedenle savaşta koruyucu giysi olarak kullanılmaya pek uygun değildir. Daha çok törensel/kült amaçlı kullanılmış olabilir. Yanlarda işlenmiş kulakların dışında, genel görünüm bir peruğa benzer; çünkü ince gravürleri dalgalı bir saç stilini taklit eder. Öte yandan yanda, başın etrafında bir örgü ile dalgalı saçtan ayrılan bukleler vardır. Örgü başın arkasında bir düğümle son bulur. Miğferin kenarında, muhtemelen bir astarın tutturulduğu küçük delikler vardır."
 lepsius.731.t: "Agamemnon’un Maskesi"
 lepsius.731.d: "Miken’deki hazineleri keşfettikten sonra, özellikle bir eser dikkatimizi çekti: altın bir ölüm maskesi, sözde Agamemnon’un Maskesi!"
 lepsius.731.f: "'Agamemnon’un Maskesi', antik Yunan Miken kentinde keşfedilen bir altın cenaze maskesine verilen addır. 1876’da eseri keşfeden Alman arkeolog Heinrich Schliemann, bulduğu bedenin Homeros’un Truva Savaşı destanı İlyada’daki Akhaların lideri Miken kralı Agamemnon’a ait olduğuna inanıyordu. Ancak modern arkeolojik araştırmalar maskenin MÖ 1600 civarına, yani efsanevi Truva Savaşı’ndan 300-400 yıl öncesine ait olduğunu göstermektedir. Maske sarımsı-kırmızımsı, sağlam altın levhadan yapılmıştır; yaklaşık 26 cm yüksekliğinde ve 26,5 cm genişliğindedir. Sakallı, bıyıklı ve kaşlı bir adamın yüzü levhaya kabartma olarak işlenmiştir. Her kulak memesinin yanında muhtemelen tutturma için kullanılan bir delik vardır. Cathy Gere, maskeyi “tarihin Mona Lisa’sı” olarak tanımlamıştır."
 lepsius.732.t: "Phaistos Diski"
 lepsius.732.d: "Girit’teki kazılar, özgün ve gizemli bir eseri ortaya çıkardı: Phaistos Diski!"
 lepsius.732.f: "Phaistos Diski, Girit adasındaki Minos Phaistos sarayından çıkan pişmiş toprak bir disktir ve muhtemelen Orta veya Geç Minos Tunç Çağı’na (MÖ 2. binyıl) tarihlenmektedir. Disk yaklaşık 15 cm çapındadır ve her iki yüzü de spiral biçimde dizilmiş damgalı sembollerle kaplıdır. Amacı ve özgün üretim yeri hâlâ tartışmalıdır. Disk 1908’de İtalyan arkeolog Luigi Pernier tarafından Phaistos sarayında bulunmuş ve 241 işaret taşımaktadır; bunlar 45 farklı sembolden oluşur. Semboller, saat yönünde merkeze doğru spiral şeklinde ilerleyen yumuşak kile basılmış mühürlerle yapılmış görünmektedir. Phaistos Diski, amatör ve profesyonel arkeologların hayal gücünü yakalamış, diskteki işaretlerin ardındaki kodu çözmek için pek çok girişim yapılmıştır."
 lepsius.733.t: "Yılan Tanrıça"
 lepsius.733.d: "Girit’teki kazılar sırasında, sanatsal ve tarihsel açıdan büyük öneme sahip bir Minos eseri elimize geçti: Yılan Tanrıça!"
 lepsius.733.f: "İki Minos yılan tanrıçası figürü, 1903 yılında Girit adasındaki Knossos’taki Minos sarayında ortaya çıkarıldı. Knossos figürlerinin her ikisi de ciddi ölçüde eksiktir ve Minos uygarlığının yeni saray döneminin sonlarına, yaklaşık MÖ 1600’e tarihlenmektedir. Çiftten büyük olanına ‘Yılan Tanrıça’, küçük olana ise ‘Yılan Rahibe’ adını koyan Evans’tı; o zamandan beri Evans’ın haklı olup olmadığı tartışılmıştır. Kimilerine göre her iki figür de rahibeleri, kimilerine göreyse aynı tanrıçayı ya da farklı tanrıçaları tasvir etmektedir. Göğüsleri tamamen açıkta bırakan süslü kıyafetler ile ‘yılan tutma’ sahnesinin birleşimi büyük ilgi uyandırmış, hatta çeşitli sahte kopyaların yapılmasına yol açmıştır. Özellikle küçük figür, Minos sanatı ve dini için popüler bir ikon olarak kalmış ve günümüzde de genellikle ‘Yılan Tanrıça’ olarak anılmaktadır."
 lepsius.771.t: "Pakal’ın Mezar Hazineleri"
 lepsius.771.d: "Kral Pakal’ın mezarını keşfettikten sonra, bazı özel eserleri gün yüzüne çıkardık: Pakal’ın Mezar Hazineleri!"
 lepsius.771.f: "Metalleri olmayan Mayaların, çok kalın ve yoğun bir malzeme olan yeşim taşından (jadeit) pek çok nesne üretmiş olmaları dikkat çekicidir; özellikle de (kraliyet) kıyafet parçaları, kemer plakaları (ya da baltacık biçimli süsler), kulak tıkaçları, kolyeler ve maskeler. Baltacıklar (düz, balta biçimli süsler) bazen kralın bir stela benzeri tasviriyle işlenmişti (örneğin Erken Klasik dönem ‘Leyden Levhası’). En bilinen maske örneği, muhtemelen Palenque kralı Pakal’ın ölüm maskesidir; düzensiz şekilli mermer plakalarla kaplanmış olup, gözleri sedef ve obsidyenden yapılmıştır. Büyük Pakal, Kolomb öncesi Mezoamerika kronolojisinde Geç Klasik dönemde Palenque Maya şehir devletinin ajaw’ıydı. Tahta Temmuz 615’te çıkmış ve ölümüne kadar hüküm sürmüştür. Tam 68 yıl boyunca krallık yapmıştır."
 lepsius.772.t: "Belt Plaque"
 lepsius.772.d: "A Pre-Columbian artifact of particular artistic and historical importance fell into our hands during excavations in Yucatan: the Belt Plaque!"
 lepsius.772.f: "The Leyden Plaque is a significant Maya artifact carved from pale green jadeite, serving as a belt pendant. Discovered in 1864 near Puerto Barrios, Guatemala, it is renowned as one of the oldest dated objects from the Maya civilization. The plaque features delicate incised drawings on both sides. The obverse depicts a Maya lord—often identified as Siyaj Chan K'awiil I of Tikal—standing in profile and trampling a bound captive. The reverse bears a Long Count date (8.14.3.1.12), corresponding to September 320 CE, marking the ruler's accession. As a primary source for Early Classic Maya history, it provides vital insights into early royal iconography and epigraphy. Named after the city where it is curated, the plaque is currently held by the National Museum of Ethnology in Leiden, Netherlands."
 lepsius.721.t: "Gılgamış Destanı"
 lepsius.721.d: "Asurologlarımız, bulunan çivi yazılı tabletler sayesinde Gılgamış Destanı’nın temel bölümlerini yeniden kurgulamayı başardı."
 lepsius.721.f: "Gılgamış rüyaları yorumladı,\n annesine seslendi.\n 'Anneciğim! Gecem boyunca\n güçlenmiş, işaretlerin ortasında\n dolandım.\n Gökyüzünde yıldızlar belirdi,\n gökten biri bana düştü.\n Onu kucağımda taşıdım ama bana çok ağır geldi.\n Onun ağı bana aitti ama taşıyamadım.\n Ona, yiğitler ayaklarını öpsün diye\n ülkeyi çağırdım.\n O karşımda dikildi,\n onlar da etrafında durdular.\n Onu kaldırdım ve sana getirdim.'"
 lepsius.721.g: "İnsanlık tarihindeki en eski destan..."
 lepsius.741.t: "Priamos’un Hazinesi"
 lepsius.741.d: "Heinrich Schliemann, Truva’yı keşfettikten sonra Priamos’un hazinesini bağışlayabileceği uygun bir müze arayışına girdi."
 lepsius.741.f: "Schliemann kazılarıyla uzmanları sarsmış ve tüm Avrupa’da popülerlik kazanmış olsa da, araştırma yöntemleri nedeniyle uzmanlardan direnişle karşılaştı. Hâlâ birçok şüphe vardı. Örneğin tarihçiler ve arkeologlar, sözde Priamos’un Hazinesi’nin gerçekten Homeros’un Truva’sına karşılık gelen bir tabakadan gelip gelmediğini sorguluyordu. Ayrıca Schliemann buluntularını bir müzeye bağışlamaya karar verdiğinde beklediği ilgiyi görmedi; eski destekçileri ilgisiz davrandı. Hermitage ya da Louvre gibi ünlü müzeler de teklifi reddetti. Kâşif, hazineleri bir süre Londra’da sergiledi, ardından 1881’de buluntuları ‘Reich’ın başkentinde ebedi olarak Alman halkına ait ve korunacak’ şekilde bağışlamaya karar verdi."
 lepsius.741.g: "... ve bu hazine için mükemmel yeri biliyorum!"
 lepsius.743.t: "Schliemann, Priamos’un Hazinesi’ni bağışlıyor"
 lepsius.743.d: "Uzun değerlendirmelerden sonra [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], Priamos’un Hazinesi’ni müzemize emanet etmeye karar verdi!"
 lepsius.743.g: "Onun için özel bir salon hazırlayacağız – ve adını Schliemann koyacağız!"
 lepsius.743.h: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] asıl hazine!"
 lepsius.744.t: "Schliemann, Priamos’un Hazinesi’ni bir müzeye bağışlıyor"
 lepsius.744.d: "Bugün maalesef Heinrich Schliemann’ın Priamos’un Hazinesi’ni bir müzeye bağışladığını öğrendik. Ne yazık ki bu müze bizimkisi değil."
 lepsius.744.g: "Bize bunu nasıl yapar!"
 lepsius.801.t: "Kazı Alanı"
 lepsius.801.d: "Arkeoloğumuzu hangi kazı alanına göndermeliyiz?"
 lepsius.801.f: "Bay Coffeecake, gerçekçi görünümlü hazine haritasının aslında bir sakız makinesinden çıktığını fark ettiğinde, arkeolojik seyahat planlarını daha önce hiç olmadığı şekilde değiştirmek zorunda kaldı."
 lepsius.801.g: "Yukarı Mısır."
 lepsius.801.h: "Aşağı Mısır."
 lepsius.801.i: "Babil."
 lepsius.801.j: "Asur."
 lepsius.801.k: "Argolis."
 lepsius.801.l: "Yucatán."
 lepsius.801.m: "Boşver."
 lepsius.802.t: "Arkeolog"
 lepsius.802.d: "Yeni bir kazı alanı kurmak için hangi arkeoloğu göndermeliyiz?"
 lepsius.802.f: "Çoğu ülkede yalnızca bir arkeolog bulunur ve bu kişi genellikle Baş Bilimci görevini de üstlenir; ancak bir ulusun –herhangi bir sebeple– daha deneyimli arkeologları varsa, burada ikinci bir kişiyi seçme seçeneği vardır."
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "Yola Çıkış"
 lepsius.803.g: "Bol şans!"
 lepsius.811.t_vok: "Bir Soylunun Mezarı"
 lepsius.811.t_pyr: "Bastet Tapınağı"
 lepsius.811.t_bab: "Sümer Mezarı"
 lepsius.811.t_ass: "Asur Tapınağı"
 lepsius.811.t_arg: "Miken Tapınağı"
 lepsius.811.t_yuc: "Depo Binası"
 lepsius.811.d: "Arkeoloğumuz vasat bir kazı alanı kurdu."
 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], Aşağı Mısır Nil Deltası’nın bataklık bir bölümünde eski bir Mısır tapınak kompleksinin kalıntılarını buldu – en azından ilk başta öyle görünüyordu. Ne yazık ki, bu çok daha küçük bir yapı çıktı: sözde tapınak aslında kedi tanrıça Bastet’e adanmış bir türbe idi. Yine de araştırmacılarımız kazıya başladı – sonuçta bir yerden başlamak gerekiyordu."
 lepsius.811.f_bab: "Sümerler belki de dünyanın en eski uygarlığıdır. Babil’deki [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], tekerleği ve yazıyı icat ettiği söylenen bu eski halka ait bir mezarı tesadüfen keşfetti. Ancak kısa süre içinde anlaşıldı ki eserlerin çoğu çalınmış ya da yok edilmişti. Arkeologlar işe koyuldu."
 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "Ne yazık ki Yucatán’daki kazı ekibimiz, Maya kültürüne ait kalıntıları ararken pek başarılı olamadı. Yan bir vadide arkeologlar yalnızca kırık çömleklerin bulunduğu eski bir depo buldu. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], bir telgrafında gelecekte daha fazlasının beklenebileceğini doğruladı."
 lepsius.811.g: "Vasat bir yer, ama bizim ..."
 lepsius.812.t_vok: "Bir Prens Mezarı"
 lepsius.812.t_pyr: "Ra Tapınağı"
 lepsius.812.t_bab: "Ay Zigguratı"
 lepsius.812.t_ass: "Asur Kalesi"
 lepsius.812.t_arg: "Odacıklı Mezar"
 lepsius.812.t_yuc: "Maya Rasathanesi"
 lepsius.812.d: "Arkeoloğumuz iyi bir kazı alanı kurdu."
 lepsius.812.f_vok: "Mısır’dan iyi haberler! Birçok zorluğun ardından [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], daha önce bilinmeyen bir mezar keşfetti. İlk bilgilere göre bu, eski bir Mısır prensinin ebedi istirahatgahıydı. Geçmişte yerliler tarafından çalınıp satılmış olabilecek bazı eserler eksik olsa da, diğer yandan daha ileri arkeolojik kazılar için iyi bir başlangıç noktasıdır."
 lepsius.812.f_pyr: "Açık bir Mısır gökyüzünün altında, bir obeliskin tepesinde son bir elektron parıltısı çaktı – ve güneş tanrısı Ra’nın tapınağına girişi işaret etti! [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] hemen alanı güvence altına alıp kazıya başladı."
 lepsius.812.f_ass: "Bugüne dek Tevrat, Yahudiler ve Hristiyanlar arasında Asurluların imajını oldukça olumsuz çizmiştir. İsrailoğullarını defalarca rahatsız eden ve nihayetinde kuzey krallığını yok eden savaşçı bir halk olarak tanınan Asurlular, tarihe büyük bir askerî güç olarak geçmiştir. Bu olumsuz propagandanın tamamı doğru olmasa da, bir Asur kalesinin keşfi, eski Orta Doğu hükümdarlarının etkileyici bir askerî kültüre sahip olduğunu gösterdi."
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], yakın zamanda bir Miken odacıklı mezarı buldu. Bu tür mezar mimarisi, Geç Tunç Çağı’nda Ege kültürünün etkisi altındaki bölgelerde kullanılıyordu. Mezarlar kayadan oyulmuş olup üç bölümlü yapıya sahiptir (mezar odası, stomion ve dromos), ayrıca birincil ya da ikincil gömüler için kullanılan nişler ve yan odalar da bulunabilirdi. Müze müdürümüz soğutmaya bir şişe şampanya koydu."
 lepsius.812.f_yuc: "Mayalar gökbilime büyük ilgi duymuşlardı. Görünüşe göre gök olayları konusunda, birçok açıdan Antik Yunanlardan üstün bir bilgiye sahiptiler. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], ormanda tepesinde yılan şeklinde spiral bir merdiven bulunan bir yapı ortaya çıkardı. Araştırmacılarımız, bu keşfin hangi içgörüleri ve eserleri barındırdığını görmek için heyecanlı."
 lepsius.812.g: "Kazı için güzel bir yer."
 lepsius.813.t_vok: "Bir Kraliçe Mezarı"
 lepsius.813.t_pyr: "Haritasız Piramit"
 lepsius.813.t_bab: "Babil Kapısı ve Surları"
 lepsius.813.t_ass: "Asur Sarayı"
 lepsius.813.t_arg: "Miken Kalesi"
 lepsius.813.t_yuc: "Maya Piramidi"
 lepsius.813.d: "Arkeoloğumuz mükemmel bir kazı alanı kurdu."
 lepsius.813.f_pyr: "Bugün [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]’den gelen son telgrafı gören araştırmacılarımız önce inanmak istemedi: görünüşe göre arkeologlarımız Mısır çölünde daha önce bilinmeyen bir piramidi yeniden keşfetmiş. Yerel halk tamamen kumla kaplı bu yapıdan zaten bahsetmişti, ancak bir giriş bulamamışlardı. Ülkemiz, Eski Krallık’tan birçok buluntuyu artık kendi mirası sayabilir!"
 lepsius.813.f_arg: "Gerçekten yarı tanrılar ya da kikloplar mı eski şehirleri inşa etti? Bir Miken kalesi, Yunan tepelerinin üzerinde görkemli biçimde yükseliyor. Keşiften bir hafta sonra, keşif ekibimiz peş peşe başarılar bildiriyor. Mimari sadece hayranlık uyandırmakla kalmıyor, aynı zamanda kil ve altından yapılan buluntular da gelecekte daha fazla keşfe işaret ediyor. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], hatta Menelaos’un Yüzüğü’nün bulunduğunu söyledi."
 lepsius.813.f_yuc: "Saatler süren yağmurun ardından geriye yalnızca ormanı saran hafif bir sis tabakası kaldığında, keşif ekibi muhteşem bir manzarayla karşılaştı. Ağaç tepelerinin üzerinde, sarmaşıklarla ve otlarla kaplı sayısız basamak göğe yükseliyordu: vahşi doğanın ortasında, kuşlar ve tapirlerle çevrili görkemli bir basamaklı piramit manzaraya hakimdi. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], hemen ilk buluntulardan bazılarını güvence altına alarak ekspres teslimatla müzeye gönderdi."
 lepsius.813.g: "Burası mükemmel!"
 lepsius.190.t: "Arkeoloji Ekibinin Geri Çağrılması"
 lepsius.190.d: "Arkeoloji ekibimizi hangi kazı alanından geri çağıralım?"
 lepsius.190.f: "Birileri Henry J.’ye iftira atmış olmalı, çünkü hiçbir suçu yokken bir sabah kazı alanından geri çağrıldı."
 lepsius.190.g: "Yukarı Mısır"
