 lepsius.1001.t: "İskender’in Çağrısı"
 lepsius.1001.d: "Dünyanın önde gelen, olağanüstü bir Mısır eserleri koleksiyonunun açılışı, Arkeoloji Müzesi’ndeki bazı bilim insanlarının çoktan bastırdığı bir anıyı geri getiriyor..."
 lepsius.1001.f: "Kumların içindeki Makedon tapınağının anısı, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] sergiye bakarken canlanıyor. Çünkü orada Ptolemaios dönemine ait başka parçalar da var, hatta bazıları Yunan fethi zamanından. Daha önce yorumlanması imkânsız olan bulmaca parçaları bir anda anlam kazanıyor. Mısır çölünde hâlâ uykuda yatan başka şeyler olabileceğine dair bir ipucu. O kadar büyük ve devasa ki, tüm Sahra onu gömmeye yetmez. Büyük İskender’in son istirahat yeri hâlâ gizemini koruyor. Fakat sayısız bulgu, muazzam bilgi birikimi ve Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]’in parlak arkeolojik uzmanlığı, tarihte eşi benzeri olmayan bir karışım oluşturuyor. Arkeolog emin: İskender yaşayanlara ait bir adamdı, ölüler arasında değil. Onun ebedi istirahatgâhını kim bulursa — sonsuz bir şöhret kazanacak."
 lepsius.1001.g: "Her arkeoloğun rüyası..."
 lepsius.1002.t: "Ahit Sandığı"
 lepsius.1002.d: "Dünyanın önde gelen, olağanüstü bir Mezopotamya eserleri koleksiyonunun açılışı, Arkeoloji Müzesi’ndeki bazı bilim insanlarının çoktan bastırdığı bir anıyı geri getiriyor..."
 lepsius.1002.f: "Keruvlar, Ahit Sandığı’nı süslerdi. Mezopotamya’da görülen türden melez yaratıklar. İsrail’in ve üç dünya dininin atası İbrahim, Ur’dan gelmişti. Yaratılış anlatısı, Babil mitleriyle paralellikler gösterir. Babil aynı zamanda İsrail için bir kader yeridir: Mezopotamya’nın hükümdarları ilk Yahudi devletlerini yok etmiş, Tapınağı küle çevirmiş ve halkı sürgüne göndermişti. O günden bu yana, Musa’nın On Emir’i koyduğu söylenen Ahit Sandığı da iz bırakmadan kayboldu. Bu, dünya tarihinin en önemli kayıp eserlerinden biridir. Mükemmel koleksiyona bakarken, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] Ahit Sandığı’nın aslında sonsuza dek kaybolmadığını, 2.500 yıldır yeniden bulunmayı beklediğini gösteren ipuçları keşfetti."
 lepsius.1003.t: "Tüm Mitlerin En Büyüğü"
 lepsius.1003.d: "Dünyanın önde gelen, olağanüstü bir Ege eserleri koleksiyonunun açılışı, Arkeoloji Müzesi’ndeki bazı bilim insanlarının çoktan bastırdığı bir anıyı geri getiriyor..."
 lepsius.1003.f: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName], parmaklarının arasında parlak küçük bir top olan orikalkumu inceledi. Var olmaması gereken bir madde. Arkeoloji Müzesi’nin görkemli sergisinin açılmasından sonra eline düşmüştü. Minos-Ege bölgesinden diğer eserlerin de yer aldığı bu sergi, onun bilimin ve mitin eşiğinde olduğuna dair görüşünü pekiştirdi. Bir arkeoloğun hayal kurmaya hakkı var mıydı? Schliemann’ın Truva’yı ararken söylediklerine kimse inanmamıştı. Babil Kulesi de yalnızca bir metafor olarak görülmüştü. Peki ya tüm zamanların en büyük miti? Öyle bir mit ki, antik çağ bile artık neyin anlatı neyin tarih olduğunu ayırt edemez hâle gelmişti.\nDr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], yüzünün yansıdığı o parlak küçük topa bakıyor. Kaybolmuş bir uygarlığın kaderi ona geri bakıyordu."
 lepsius.1004.t: "Altının Laneti"
 lepsius.1004.d: "Dünyanın önde gelen, olağanüstü bir Pre-Kolomb eserleri koleksiyonunun açılışı, Arkeoloji Müzesi’ndeki bazı bilim insanlarının çoktan bastırdığı bir anıyı geri getiriyor..."
 lepsius.1004.f: "Avrupalıların Amerika’ya gelişinden beri söylentiler dolaşıyor. Ölümcül söylentiler. Sayısız adam, altına duydukları açgözlülük yüzünden öldü: savaşan kabilelerin kollarında, sıtma dolu bataklıklarda ve denizdeki fırtınalarda. Ponce de Léon gençlik pınarını arıyordu. Vázquez de Coronado Altın Şehirleri aradı. Hernando de Soto bilinmeyen zenginlikler için Kuzey Amerika’nın büyük kısmını dolaştı. Cortés ve Pizarro gibi ünlü ve zengin olma umudu aldatıcı da olsa çok cazipti. Fakat şimdi, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] sözde İnka idolünden esinlenmiş ve onu zengin Pre-Kolomb sergisindeki diğer eserlerle karşılaştırırken, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] aynı altın hummasına kapılmaktan korkuyor. Sonunda [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]’i El Dorado yoluna götüren şey bilim mi olacaktı?"
 je_lepsius_archaeology_start_in_egypt: "Mısırbilimin Doğuşu"
 je_lepsius_archaeology_start_in_egypt_reason: "Mısır çöllerinde hâlâ keşfedilmeyi bekleyen birçok hazine var. Arkeologlarımızdan biri yeni bir Mısırbilim çağını başlatacak ve Mısır’a [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] yapılmasını mümkün kılacak mı?"
 lepsius.22.t: "Mısırbilimin Doğuşu"
 lepsius.22.d_egyptology: "Mısır’a yapılan bir seferin ardından Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], araştırmalarını sundu. Hiyerogliflerin çözülmesi sayesinde yalnızca yeni yerler bulmakla kalmadı, bulguları bölgeye olan ilgiyi de yeniden canlandırdı."
 lepsius.22.f_egyptology: "#b Tarihî Bağlam:#! François Champollion’un ölümünden sonra hiyeroglif araştırmaları durma noktasına geldi. 1837’de, genç Alman filolog Karl Richard Lepsius, Champollion’un yakın dostu ve 1829’daki Fransız-Toskana Mısır seferinden ortak sorumlu olan Ippolito Rosellini’ye bir mektup yazdı. Lepsius, Champollion’un biriktirdiği bilgileri sistemleştirdi ve sundu, böylece Mısırbilimi ciddi bir bilim dalı hâline getirmede etkili oldu. Öte yandan, Avrupa’nın siyasi elitlerini Mısır’a gelecekteki seferler konusunda ikna etti."
 notification_lepsius_birth_of_egyptology_notification_name: "Mısırbilimin Doğuşu"
 notification_lepsius_birth_of_egyptology_notification_desc: "[GetGlobalVariable('lepsius_egyptology_invented_country_global_var').GetCountry.GetName]’den bir Arkeolog Mısır’a bir sefer düzenleyerek yeni bir Mısırbilim çağını başlattı. Biz de tüm büyük uluslar gibi Mısır’a bir Arkeolog göndermeliyiz!"
 je_lepsius_yucatan_expedition: "Yucatán Seferi"
 je_lepsius_yucatan_expedition_reason: "Yucatán ormanlarında antik harabelere dair söylentiler var. Cesur bir kâşifi fantastik hazinelerin beklediği söyleniyor. Belki bir Arkeolog bizim için Maya hazinelerini bulabilir? Bu, bizim ve diğer ulusların Yucatán’a [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] yapmamızı sağlayacaktır."
 lepsius.23.t: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] Seferi"
 lepsius.23.d: "Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ve ekibi, Yucatán ormanlarında aylarını geçirdi. Şimdi buldukları hazineler, bilgiler ve çeşitli harabelerin çizimleriyle geri döndüler. Bu, Orta Amerika’da yeni bir arkeoloji çağını başlatacak."
 lepsius.23.f: "#b Tarihî Bağlam:#! Yeni Dünya, Avrupalılar kıtaya ulaşmadan önce sadece vahşilerin ve barbarların yurdu muydu? Kaşifler John Lloyd Stephens ve Frederick Catherwood bu bakış açısını derinden sarstılar. Amerikalı ve Britanyalı bu iki isim, yıllarca Yucatán Yarımadası’nın ormanlarında dolaştılar ve kendi ifadelerine göre, çoktan yok olmuş bir Mezoamerikan kültürüne ait 44 farklı yeri ziyaret ettiler. Yerliler uzun zamandır ormanda unutulmuş şehirlerden ve gizli tapınaklardan bahsediyorlardı; ancak Stephens’ın raporları ve özellikle Catherwood’un çarpıcı litografileri, daha önce tamamen bilinmeyen bir dünyayı gözler önüne serdi. Tapınakların, heykellerin ve stellerin görüntüleri yalnızca romantiklerin hayallerini ateşlemekle kalmadı. ABD ve Avrupa’ya yayılan, meraktan yüceltmeye ve gerçek bilimsel ilgiye kadar uzanan bir ilgi dalgası doğdu."
 notification_lepsius_yucatan_expedition_notification_name: "Yucatán Seferi"
 notification_lepsius_yucatan_expedition_notification_desc: "[GetGlobalVariable('lepsius_yucatan_expedition_country_global_var').GetCountry.GetName]’den bir Arkeolog Yucatán Yarımadası’ndaki maceralı yolculuktan döndü – ve ormandaki efsanevi harabelerden söz ediyor. Bilim insanları, Maya kültürünü daha yakından incelemekle ilgilendiklerini ifade ettiler."
 lepsius.1011.t: "[SCOPE.sState('lepsius_location_state').GetNameNoFormatting]"
 lepsius.1011.d_alexander: "Antik çağın en güçlü adamının mezarını arayışta yeni bir sayfa açılıyor. Şu ana kadarki bilgiler, [SCOPE.sState('lepsius_location_state').GetName]’de Büyük İskender’in Mozolesi’ni bulmaya yardımcı olabilecek bir ipucu olabileceğini gösteriyor. Kazı ekipleri ve Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hazır."
 lepsius.1011.d_ark: "Çölden esen sıcak bir rüzgâr, Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ve keşif ekibine [SCOPE.sState('lepsius_location_state').GetName]’deki arayışlarının hedefine vardıklarında dokunuyor. Ahit Sandığı’nın sırrı burada bir kez daha açığa çıkarılacak."
 lepsius.1011.d_atlantis: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] bir aptal mıydı? Binlerce yıl boyunca binlercesinden biri mi? Kaçı Platon’un hikâyesine inanmış, ya hiç geri dönmemiş ya da utanç ve kederle dönmüştü? Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] biliyor: Bu yolculukta tek ihtimal başarıydı. Aksi hâlde kariyerinin sonu gelirdi."
 lepsius.1011.d_eldorado: "Keşif üyeleri tropik iklimden şikâyet ediyor. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], el yelpazesiyle serinliyor. İzler ıssız bir bölgeye götürüyor. Bazı hamallar, altın arayışında kaybolmuş sayısız İspanyol fatih gibi aynı akıbeti paylaşabileceklerini fısıldıyor..."
 lepsius.1011.f: "'Kendine sor, Mesih’in Kutsal Kâsesini neden arıyorsun? Onun yüceliği için mi, yoksa kendi yüceliğin için mi?'"
 lepsius.1011.g: "Daha derine kazın."
 lepsius.1012.t: "Başarılı Dönüş"
 lepsius.1012.d_alexander: "Dayanılmaz sıcak bir anlığına kayboluyor. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], notlarına bakıyor. Yeni bağlantılar, Büyük İskender’in mozolesini arayışa yeni bir ışık tutuyor. Bir düşünce [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] zihninden geçiyor. Tarihle karşılaşması – ve tarihe geçmesi – uzun sürmeyecekti."
 lepsius.1012.d_ark: "Ahit Sandığı’nı aramak, yalnızca bir arkeolojik eser arayışı değildi. Tanrı ile temas vaat eden kayıp bir kutsal nesnenin arayışıydı. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] bu duyguyu yolculuk boyunca defalarca yaşadı. Ama bu temas gerçekleşmeden önce kaç arkeolojik hac yolculuğu daha katlanması gerekecekti?"
 lepsius.1012.d_atlantis: "Atlantis miti yaşamaya devam ediyor. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], yolculuğun henüz bitmediğini biliyor. Limanda denizi seyrederken ve kuşların çemberler çizdiğini görürken, oraya ulaşmadan önce hâlâ kaç engelin aşılması gerektiğini düşünüyor."
 lepsius.1012.d_eldorado: "Keşif ekibinin geri kalanı için büyük bir sürpriz olarak, bilim insanları sağ salim döndü. Bir anlığına Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]’in onları intihar görevi gibi bir yolculuğa gönderdiği unutulmuş gibiydi. El Dorado yolundaki bu aşamanın başarıyla tamamlanması, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] haklı çıkardı."
 lepsius.1012.f: "'Kutsal Kâse’yi arayış, içimizdeki ilahi olanı arayıştır. Ama eğer kanıt istiyorsan, sana verecek hiçbir şeyim yok. Bu yaşımda, bazı şeyleri inançla kabullenmeye hazırım.'"
 lepsius.1012.g: "Büyük mozaiğin bir başka parçası."
 lepsius.1013.t_alexander: "Siwa"
 lepsius.1013.d_alexander: "Bir bedevi kılığına giren Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], Ammon Kehaneti’nin yıkılmış kalıntılarına tek başına erişim sağlayabildi. Araştırma sırasında, daha önce ulaşılamayan bir bölgede, Ptolemaiosların ilk dönemine ait korunmuş papirüsler buldu. Bu belgeler, İskender kültüne dair bilgiler içeriyordu."
 lepsius.1013.t_ark: "Kudüs"
 lepsius.1013.d_ark: "Ahit Sandığı’nın akıbetine dair bir ipucu, Kutsal Şehir’den daha kesin nerede bulunabilirdi? Rüşvet ve yasaları çiğnemenin karışımıyla, Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], Kubbet-üs Sahra’nın altındaki gizli tünel sistemine girmeyi başardı ve paha biçilmez eserin nerede olduğuna dair hayati bir ipucu buldu."
 lepsius.1013.t_atlantis: "Santorini"
 lepsius.1013.d_atlantis: "Binlerce yıl önceki büyük patlamanın molozlarının altında Santorini’de hâlâ Minos izleri görülebilir. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], felaketle yok olmuş antik bir sarayı inceledi; [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe], gömülü bir dizi freski ortaya çıkarıp restore etti. Bunlardan biri, şaşırtıcı bir şekilde Akdeniz ve Atlantik batı kıyısının özelliklerini son derece doğru biçimde gösteren bir haritaydı."
 lepsius.1013.t_eldorado: "Bogotá"
 lepsius.1013.d_eldorado: "Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bir zamanlar gizemli Muisca halkının yaşadığı Bogotá çevresini araştırdı. Yerlilerden gelen ipuçları [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] daha önce bilinmeyen bir yere götürdü. Burada bulunan sayısız Muisca eseri, \"Altın Adam\" ritüeli hakkında daha fazla bilgi sağlıyor."
 lepsius.1013.f: "Efsanevi bir Seferin hedefiyle tutarlı belirli bir arkeoloji dalına odaklanan ülkeler, arkeolojik bir sansasyon peşinde büyük avantajlar elde ederler. Bu yalnızca arayışınızı hızlandıracak ek bir ipucu kazanmakla sınırlı değildir."
 lepsius.1013.g: "Büyük mozaiğin bir başka parçası."
 lepsius_discovery_vilcabamba_modifier: "Vilcabamba’nın Keşfi"
 lepsius_peru_inspection_modifier: "Arkeoloğumuz, Peru’daki kazı ekibimizi ziyaret ederek yeni bir kazı alanı belirliyor."
 lepsius_add_1_vilcabamba_clue_tt: "Peru’da önemli bir arkeolojik keşif üzerine #G 1#! yeni ipucu elde edin."
 lepsius_add_2_vilcabamba_clue_tt: "Peru’da önemli bir arkeolojik keşif üzerine #G 2#! yeni ipucu elde edin."
 lepsius_add_3_vilcabamba_clue_tt: "Peru’da önemli bir arkeolojik keşif üzerine #G 3#! yeni ipucu elde edin."
 je_lepsius_discovery_vilcabamba: "Peru’daki Araştırmalar"
 je_lepsius_discovery_vilcabamba_reason: "İnka gizemlerinin tamamının henüz çözülmediğine inanmak için pek çok sebebimiz var. Bu arayış yıllar sürebilir. Bu keşfi başaran, tarihte hak ettiği yeri alacaktır."
 je_lepsius_discovery_vilcabamba_goal: ""
 je_lepsius_disovery_vilcabamba_success: "Peru’da on ipucu bulmayı başarırsak, büyük tarihî öneme sahip kayıp bir yeri yeniden keşfetmek için yeterli malzemeyi toplamış olacağız."
 je_lepsius_disovery_vilcabamba_fail: "Eğer başka bir ulus bizden önce Peru’da on ipucu bulursa, çabalarımız boşa gidecek."
 lepsius.801.n: "Peru"
 lepsius.811.t_per: "Bir Fatihin Mezarı"
 lepsius.811.f_per: "Arkeologlar, büyük bir merakla kilitli bir kapı keşfettiler. Bunun, bir İnka prensinin hatta belki de bir hükümdarın kayıp mezarına açıldığına inanılıyordu. Ne yazık ki, ekibin keşfettiği, yüksek rütbeli bir İnka’ya değil, bir İspanyol fatihine ait bir mezardı. Ancak Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], en azından iç kısmın ve bazı eserlerin İnka dönemine ait olduğunu belirledi. Bu yüzden bazı sonuçlar çıkarmak mümkün."
 lepsius.812.t_per: "İnka Madeni"
 lepsius.812.f_per: "And Dağları’nın derinliklerinde Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], onu bir çukura götüren kayıp bir patika buldu. İlk bakışta önemsiz görünse de ekip dikkatlice enkazı kaldırınca, çukurun karmaşık ve yapay bir mağara sistemine açıldığı ortaya çıktı. Daha ileri araştırmalarda madencilik aletleri, günlük eşyalar ve boyalı duvarlar bulundu. Bu, İnka’ların sanatsal eserlerini yaptığı büyük altın ve gümüş madenlerinden biri olabilir miydi?"
 lepsius.813.t_per: "Güneş Tapınağı"
 lepsius.813.f_per: "Arkeoloji için büyük bir şans: Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], Peru dağlarında daha önce tamamen bilinmeyen bir tapınak kompleksi bulduğunu rapor ediyor. Görünüşe göre burası güneş tanrısı Inti’ye adanmış bir ibadet yeriydi. Bilim insanları yalnızca sayısız eser değil, aynı zamanda resimler ve tapınak giysileri de buldular. Bu keşif, Kolomb öncesi arkeolojide küçük çaplı bir sansasyon."
 lepsius.971.t: "Vilcabamba’nın Keşfi"
 lepsius.971.d: "Uluslararası bilim için sansasyonel bir gün. Büyük bir keşif yaptık: Vilcabamba’nın Kayıp Şehri bugün [ROOT.GetCountry.GetAdjectiveNoFlag] arkeologları tarafından keşfedildi!"
 lepsius.971.f: "Vilcabamba, 1539’dan 1572’ye kadar Yeni İnka Devleti’nin başkentiydi. Yeni İnka Devleti, 1572’de İspanyolların ve onların yerli müttefiklerinin eline düşene kadar İnka İmparatorluğu’nun son sığınağıydı; bu olay, İspanyol hâkimiyetine karşı İnka direnişinin sonunu simgeledi. Daha sonra Vilcabamba terk edildi ve yeri unutuldu. 1911’de kâşif Hiram Bingham, terk edilmiş Machu Picchu harabelerini yanlışlıkla Vilcabamba olarak tanımladı, fakat aynı zamanda yerlilerin Espiritu Pampa dediği bir harabeyi de ziyaret etti. 1964’te Gene Savoy, Espiritu Pampa’yı efsanevi Vilcabamba olarak tanımladı ve bu görüş arkeologlar ile tarihçiler arasında geniş çapta kabul gördü."
 lepsius.971.g: "Fatihlerin bile başaramadığını biz başardık."
 lepsius.972.d: "[SCOPE.sCountry('lepsius_vilcabamba_discoverer').GetName] büyük bir keşif yaptı: Vilcabamba’nın Kayıp Şehri bugün keşfedildi!"
 lepsius.972.f: ""
 lepsius.972.g: "Kaybolmadıkları üzücü."
 je_lepsius_nazca: "Nazca’nın Garip Çizgileri"
 je_lepsius_nazca_reason: "Nazca kasabası yakınlarındaki garip çizgiler, İspanyol fethinden bu yana sorular doğuruyor. Kimileri bunların bir yol ağı ya da su kanalları kalıntısı olduğunu düşünüyor. Bir arkeolog, bir pilotun yardımıyla doğru bakış açısını elde edebilir."
 lepsius.76.t: "Gökyüzünden Nazca’nın Gizemi"
 lepsius.76.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetLastName] took Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] on a flight. Now the scientist can see much more clearly what the lines on the ground mean. When viewed from a suitable height, the lines turn out to be something more complex. There are dozens of scratched images of animals and figures from pre-Columbian times. An incredible archaeological discovery!"
 lepsius.76.f: "Nazca Çizgileri, Peru’daki Nazca ve Palpa yakınlarındaki çöldeki 1.500’den fazla devasa kazıma resmidir (jeoglif). Bunlar yalnızca havadan ve çevredeki tepelerden görülebilir. Çizgiler, çöl ve kültür, ovaya uzak olmayan Nazca şehrinin adını taşır. Paracas kültürü ve Nazca kültürünün bu çizgilerin kökeni olduğu kabul edilir. 500 km²’lik bir alanda, Nazca Ovası’nda dümdüz çizgiler, üçgenler, 20 km’ye varan yamuk şekiller ve boyutları on metreden birkaç yüz metreye kadar değişen insan, maymun, kuş ve balina figürleri görülür. Figürleri oluşturan çizgiler genellikle sadece birkaç santimetre derinliğindedir. En büyük boyutları nedeniyle yalnızca uzak mesafelerden, çevredeki tepelerden ya da uçaklardan görülebilir. Bu anlamda, Nazca Çizgileri yalnızca 1920’lerde ya da en geç 1930’larda, uçakların düzenli olarak Nazca Çölü üzerinde uçmaya başlamasıyla keşfedildi. 1926’da Nazca Çizgileri ilk kez bilimsel olarak tanımlandı."
 lepsius.76.g: "Peki bu resimlerin gerçek anlamı ne olabilir?"
