 douglas.209.t: "Gelişmiş Ekipman"
 douglas.209.d: "#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! tırmanışının başında, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] kullanılan kaliteli ekipmanın dağın gerektirdiklerinin bile üzerinde olduğunu fark eder."
 douglas.209.f: "Bir dağ seferinin ekipman seviyesi, dağın seviyesinden yüksekse bu seferin başlangıç riskini azaltır ve ilerleme bonusu sağlar."
 douglas.209.g: "Zirvede görüşürüz!"
 douglas.216.t: "Moral Bozukluğu"
 douglas.216.d: "Dağcılık ekibimiz bugün, başka bir ulusun #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! zirvesine ilk ulaşan olduğu haberini aldı. Ekipte ilk ayrışma belirtileri görülüyor; bazıları geri dönüyor, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ise tırmanışı bırakma fikrini açıkça dile getirdi."
 douglas.216.f: "Eğer başka bir ulus bir dağın zirvesine ilk çıkarsa, o dağa tırmanma girişimi neredeyse kesin olarak terk edilir."
 douglas.216.g: "Bu sefer anlamını yitirdi."
 douglas_mountaineer_speech_tt: "Dağcılık Seferi, zaman aşımına uğrayana kadar #YELLOW 60 gün daha uzun#! sürecek."
 douglas.208.t: "Tırmanış Öncesi Sözler"
 douglas.208.d: "Zirveye son hamle öncesinde, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ekibe seslenir. Dağ #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!—ama onun sesi de öyle."
 douglas.208.f: "'Üzerimizde zirve var—soğuk, sessiz, hareketsiz. Cesareti umursamaz. Bizden soru sormaz. Ama biz ona cevap veririz—her adımda. Yukarıda ne davul var ne şan. Sadece ardımızdaki manzara ve göze almış olmanın gururu. Biz buraya dağla buluşmaya değil, onu fethetmeye geldik. Her birinizin korkma hakkı var. Ama hiçbir korku bizi durdurmayacak. Bugün değil.'"
 douglas.208.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFirstName] ile dağa meydan okuyoruz!"
 douglas_alpine_club_new_board_tt: "Alp Kulübü için yeni bir yönetim kurulu seçildi."
 douglas.302.t: "Alp Kulübü: Yeni Yönetim"
 douglas.302.d: "Alp Kulübü bugün [SCOPE.sState('douglas_alpine_club_state').GetStateRegion.GetCityHubName]’de yapılan toplantısında yeni yönetim kurulu üyelerini atadı."
 douglas.302.f: "Alp Kulübü şu bileşime karar verdi:\n\n#V Başkan: [GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V] #!\n\n#V Yönetim Kurulu: [GetGlobalVariable('douglas_alpine_club_board_member_1_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_2_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_3_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_4_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_5_global_var').GetCountry.GetName|V]"
 douglas.302.g: "Yeni kurul üyelerini tebrik ediyoruz."
 douglas.302.h: "Hiç mi rüşvet yoktu?"
 douglas_mountaineering_international_expedition_modifier: "Son Uluslararası Dağcılık Seferi"
 douglas_mountaineering_international_expedition_setback_modifier: "Alp Kulübü’nde Geri Adım"
 douglas.311.t: "Uluslararası Dağcılık Seferi Önerisi"
 douglas.311.d: "Alp Kulübü’nün bir yönetim kurulu üyesi olan [SCOPE.sCountry('douglas_board_scope').GetName], uluslararası bir dağcılık seferi düzenlenmesini talep etti. Ülke masrafları karşılayacaktı. Ancak kulüp başkanının bu teklifi veto etme hakkı var."
 douglas.311.f: "'Beyler, dağlar bayraklarla ya da sınırlarla ilgilenmez. Ulusların küçük kavgalarının üstünde yükselirler, rekabetlerimize aldırmazlar. Bu yüzden bugün karşınızda bir vizyonla duruyorum: siyasetin ötesinde, kan bağlarının ötesinde—insanlığın zirvesi. Avrupa’dan, Amerika’dan, uzak Asya’dan en iyi dağcıları toplayalım ve dağın karşısına Portekizli, Fransız ya da Sakson olarak değil, göze alanların kardeşliği olarak çıkalım. Bu, sadece irade ve ip değil; diplomasi, güven ve ortak şan zaferi olacak. Mirasımız bu olsun: fetih değil, işbirliği.'"
 douglas.311.g: "İyi bir öneri."
 douglas.311.h: "Hayır."
 douglas.312.t: "Veto"
 douglas.312.d: "Alp Kulübü Başkanı [SCOPE.sCountry('douglas_president_scope').GetName], uluslararası bir dağcılık seferine veto koydu."
 douglas.312.f: "'Fransızlarla mı tırmanacağız? İsviçrelilerle mi? Ben terliklerle ayıyla güreşmeyi tercih ederim. Bir İngiliz’le çay konusunda anlaşmayı denediniz mi hiç, çadırdan bahsetmiyorum bile? Sağ olun, istemem. Geçen sefer yabancı bir ekip davet ettik, dört varil schnapps getirdiler, haritaları unutmuşlardı. Ayrıca beyler, dağ bir yere gitmiyor—ben de öyle. Eğer bir zafer kazanılacaksa, bu karın üstündeki ayak izleri bizim olacak. Birleşmiş Milletler pikniği değil. Onurlu şekilde tırmanırız—ya da hiç tırmanmayız!'"
 douglas.312.g: "Bu başkanı kim seçti gerçekten?"
 douglas.321.t: "Zirveyi Seçmek"
 douglas.321.d: "Uluslararası sefer onaylandıktan sonra, kulüp artık en nihai soruyu tartışıyor: şan savaşı hangi zirvede verilecek?"
 douglas.321.f: "Alp Kulübü, dağcılık kulübü bulunan herhangi bir ülkenin topraklarındaki bir dağı seçebilir. Lisans gerekmez. Ancak dağ 2., 3. ya da 4. seviyede olmalıdır."
 douglas.321.g: "Dağ çok zor olmamalı."
 douglas.321.h: "Klasik dağlardan birini seçelim."
 douglas.321.i: "Dağ gerçekten bir meydan okuma olmalı!"
 douglas.331.t: "Alp Kulübü Seferi"
 douglas.331.d: "Alp Kulübü cesur bir hedef açıkladı: uluslararası bir tırmanış ekibi tarafından fethedilecek isimli bir zirve. Hedef: #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!"
 douglas.331.f: "Alp Kulübü’nün yürütme komitesinin tüm üyeleri, kulüp tarafından düzenlenen uluslararası bir dağcılık seferine katılabilir. Bunun için aktif bir dağcının kulüp seferine katılması gerekir. Uluslararası seferlerin başarı şansı neredeyse kesindir, ancak nadiren gerçekleşir. Zirveye ulaşıldığında kulüp başkanı ilk tırmanış hakkına sahiptir ve en çok prestiji alır, ancak katılan diğer yönetim kurulu üyeleri de ödüllendirilir."
 douglas.331.g: "Zirve ortak bir bayrak taşısın."
 douglas.341.t: "Ulusların Tırmanışı"
 douglas.341.d: "Bayraklar yükseltiliyor. Erzaklar hazır. Uluslararası sefer, daha önce hiç kimsenin ayak basmadığı zirveye tırmanmaya hazırlanıyor."
 douglas.341.f: "Dünya çapından gelen aksanların berrak sabah havasına karıştığı kamp alanına sessizlik çökmüştü. Kimileri sessizce botlarını sıkıca bağlarken, kimileri son endişeli şakalarını yaptı. Kampın kenarında [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], bulutlara sarılmış zirveyi seyretti.\n\n'Buraya daha önce hiç çıkılmadı,' diye mırıldandı Fransız, sigarasını yakarken.\n\n'O halde zamanı geldi,' diye karşılık verdi İngiliz kadın sessiz bir gülümsemeyle."
 douglas.341.g: "Dünya birlikte tırmansın."
 douglas.351.t: "Zafere Ulaşan Zirve"
 douglas.351.d: "Haftalar süren zorlukların ardından zirveye ulaşıldı. [GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V], Alp Kulübü adına zirveyi sahiplendi."
 douglas.351.f: "İnce havada omuz omuza durmuşlardı; sakal ve kirpiklerine yapışan buz kristalleri, yüzlerindeki her çizgiye kazınmış yorgunluk... Yine de hiçbiri geri adım atmadı. Alp Kulübü Başkanı, seferin bayrağını açıp karın içine sağlamca dikti.\n\nDiğerleri etrafında toplandı. Bu imkânsız yüksekliğe güçlükle taşınan bir fotoğraf makinesi hazırlandı. Arkalarında bulutlar açıldı ve vadi bir tablo gibi göründü.\n\n'Dik durun,' dedi fotoğrafçı. 'Bu çağlara kalacak.'\n\nDeklanşör tıkırdadı.\n\nO tek kare, dünyanın dört bir yanında salonlarda, dersliklerde ve gazetelerde yer bulacaktı. Fotoğrafta Başkan, bayrakla dimdik duruyor; çevresinde ise donmuş, ama gülümseyen dağcılar vardı—ulusla değil, fetihle birleşmiş."
 douglas.351.g: "Bilim için, şan için, insanlık için."
 douglas_add_international_expedition_effect_tt: "#default_text [GetPlayer.GetName], bir Alp Kulübü Seferini tamamlar."
 je_douglas_international_mountaineering_expedition_preparation: "Alp Kulübü Seferi Hazırlıkları"
 je_douglas_international_mountaineering_expedition_preparation_reason: "Alp Kulübü’nün yürütme komitesinin tüm üyeleri, kulüp tarafından düzenlenen uluslararası bir dağcılık seferine katılabilir. Bunun için aktif bir dağcının kulüp seferine katılması gerekir. Uluslararası seferlerin başarı şansı neredeyse kesindir, ancak nadiren gerçekleşir. Zirveye ulaşıldığında kulüp başkanı ilk tırmanış hakkına sahiptir ve en çok prestiji alır, ancak katılan diğer yönetim kurulu üyeleri de ödüllendirilir.\n\nUluslararası Sefer’e katılmak için Dağcı menüsünde 'Kulüp' altında sefere katılmanız gerekir. Bu, bu günlük girdi süresi dolmadığı sürece mümkündür."
 je_douglas_international_mountaineering_expedition: "Alp Kulübü Seferi"
 je_douglas_international_mountaineering_expedition_reason: "Alp Kulübü tarafından yürütülen bir dağcılık seferinin başarısı genellikle garantidir. Ancak süresi büyük ölçüde katılan kurul üyelerinin sayısına bağlıdır. Zirveye ulaşıldığında kulüp başkanı ilk tırmanış hakkına sahiptir ve en çok prestiji alır, ancak katılan diğer yönetim kurulu üyeleri de ödüllendirilir."
 douglas_international_mountain_expedition_progress_bar: "Alp Kulübü Seferi"
 douglas_international_mountain_expedition_progress_bar_desc: "Sefer İlerlemesi: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/10)"
 douglas_international_mountain_expedition_progress_bar_at_full_tt: "Dağ Seferi çubuğu #variable 100%#!’e ulaştı"
