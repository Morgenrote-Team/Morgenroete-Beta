 douglas.210.t: "Bilimsel Destek"
 douglas.210.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], ekibe dağın yapısını incelemede yardımcı olması için [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] asistanını teklif etti."
 douglas.210.f: "Mektup özenle yazılmıştı, mührü şimdiye kadar hiç bozulmamış. Profesör [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], en parlak asistanını geçici olarak görevlendirmeyi teklif ediyor: mineralleri sınıflandırma ve yamaç analizi konusunda yetenekli, sessiz ve gözlemci bir genç adam. Profesör, ayrıntılı raporlar bekliyor. Asistan ölçüm çubukları, defterler ve tükenmez bir merakla geliyor. Tırmanıştan pek anlamıyor—ama taşlardan çok şey biliyor."
 douglas.210.g: "Asistanı kabul et."
 douglas.214.t: "Bir Dağ Senfonisi"
 douglas.214.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]'in son başarısından ilham alan [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName], dağlar ve insanın doğaya karşı mücadelesi üzerine büyük bir müzik eseri yazmak istediğini açıkladı. Müzik dünyası şimdiden bunun önemli bir eser olacağı konusunda hemfikir."
 douglas.214.f: "Alp Senfonisi op. 64, besteci Richard Strauss’un 1915’te ilk kez seslendirilen senfonik şiiridir. Eser, bir Alpler zirvesine tırmanış ve aynı gün vadiye dönüşü müzikal olarak tasvir etme fikrine dayanır. Program fikri Strauss’un çocukluğundaki bir deneyimden gelir: 1879 yazında Bavyera Alplerindeki Heimgarten’de ayağı kaymış, fırtınaya yakalanmıştır. Ertesi gün bu olayı piyanoda anlatmıştır. Bu anıdan konsept doğdu. Strauss, dinleyiciye bir dağ yürüyüşünün aşamalarını doğrudan duyusal bir ses tablosu olarak yaşatmayı amaçlamıştı. Pek çok müzik eleştirmenine göre eser bu hedefi etkileyici bir şekilde gerçekleştirmektedir."
 douglas.214.g: "Umarım içinde alpenhorn olmaz."
 douglas.215.t: "Zirveden Bilime"
 douglas.215.d: "Seferin yol arkadaşlarından biri yeni bir yol seçti. Yüksek dağlarda gördüklerinden etkilenen [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName], jeoloji alanında bir kariyere başlıyor."
 douglas.215.f: "Kar [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] botlarının altında gıcırdarken ve güneş sivri zirvelerin üzerinden yükselirken, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]’de bir şey değişti. Kaya katmanları, kıvrılmış tabakaların sessiz gücü, volkanik yaralar—hepsi zihnine herhangi bir zirveden daha derin kazındı. İnişten sonra diğerleri kutlama yaparken, o kitaplar, haritalar, çekiçler aradı. Sefer yalnızca bir bayrak dikmedi: bir zihni uyandırdı."
 douglas.215.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] çalışmalarını teşvik et!"
 douglas.221.t: "Kolay Bir Tırmanış"
 douglas.221.d: "Dağcı ekibi, #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! zirvesine tırmanış denemesinde kolay ilerleme kaydediyor. Kayda değer bir olay yok."
 douglas.221.f: "'Hayatın tam akışı içinde, en çok arzuladığı aktif çevreyi bir ölçüde yaşamış olan şanslıdır. Bugünkü temel değerlerin yarının boş ve paramparça hayalleri olduğu bu çalkantı ve şiddetli değişim günlerinde, fırsat varken dolu dolu bir yaşam sürmeyi hedefleyen bir felsefeden yana çok şey söylenebilir. Daha kalıcı çok az hazine vardır; böyle bir yaşam tarzının deneyiminden daha değerli bir şey yoktur. Bunlar öyle mülkiyetlerdir ki hiçbir kader, hiçbir kozmik felaket bizi onlardan mahrum bırakamaz; eğer sonsuzluğun bir anında gerçekten yaşadıysak, bunu hiçbir şey değiştiremez.' -Eric Shipton"
 douglas.221.g: "Devam et!"
 douglas.222.t: "Bir Yamaç"
 douglas.222.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] dağlarda küçük bir yamaç fark etti, ancak bu dağcılar için büyük bir sorun teşkil etmemeli."
 douglas.222.f: "Bir tırmanış ekibi ne kadar yükseğe çıkarsa, karşılaştığı zorluklar da o kadar artar. Bir yamaç engel olabilir, ama orta düzeyde donanımlı bir sefer için sorun olmamalı."
 douglas.222.g: "Ekip bunun üstesinden gelecek."
 douglas.222.h: "Bu çok riskli."
 douglas.223.t: "Sarp Duvar"
 douglas.223.d: "Bir uçurum, tırmanıcılar için zirveye giden yolda büyük bir engel teşkil ediyor, ancak [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] bu görevin üstesinden geleceğinden emin."
 douglas.223.f: "2.000 metre irtifaya sahip dağlardan itibaren, dağcılık grubu uçurumlarla karşılaşabilir. Alçak dağlar için bunlar zirveden önceki son engeldir, ancak çoğu durumda daha çok bir ısınma programıdır. Buradan itibaren, normal bir dağ yürüyüşü gerçek bir dağ tırmanışından ayrılır."
 douglas.224.t: "Çığ!"
 douglas.224.d: "#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!'ın yükseklerinde tehlikeli bir çığ kopmuş durumda ve dağcılık girişimini tehdit ediyor. Enkaz artık doğrudan rotayı tehdit ettiğinden, alternatif bir rota bulmak daha güvenli olabilir ancak değerli zaman kaybettirebilir. Bazı tırmanıcılar beklemeyi öneriyor - bu, patikanın daha da tıkanma ihtimalini de içeriyor."
 douglas.224.f: "Çığlar karla kaplı yükseklerden kopar ve zamanın başlangıcından beri dağlarda yaşayan herkes için bir tehlike olmuştur - sadece zirveciler için değil. Onların sinsi doğası çoktan birçok kişiyi ölüme götürdü. Bundan sonra buğday samandan ayrılacak."
 douglas.224.g: "Bu bir dağcıyı sarsamaz."
 douglas.224.h: "Alternatif bir rota ara."
 douglas.225.t: "Uçurum"
 douglas.225.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] son kaya oluşumuna ulaştığında önünde tehlikeli bir uçurum açılıyor. Görünüşte aşılamaz engel, dağcılar için bir meydan okuma teşkil ediyor."
 douglas.225.f: "'Alpinizm, en büyük tehlikelerle en büyük sağduyuyu yüzleştirerek dağlara tırmanma sanatıdır. Burada sanat, bilginin eylemde tamamlanması anlamına gelir. Her zaman zirvelerde kalamazsın. Tekrar aşağı inmek zorundasın. Öyleyse amaç nedir? Sadece şu: yukarıdaki aşağıdakini bilir, aşağıdaki yukarıdakini bilmez. Tırmanırsın, görürsün. İniş yaparsın, artık görmezsin, ama görmüşsündür. Tırmanırken, yolun boyunca tüm zorlukları not al. İniş sırasında, onları artık görmeyeceksin, ancak dikkatlice gözlemlediysen orada olduklarını bileceksin.' -René Daumal"
 douglas.226.t: "Ölüm Basamağı"
 douglas.226.d: "Zirveden kısa bir süre önce, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] son, nihai bir mücadeleyle karşı karşıya: önünde neredeyse dikey yükselen bir kaya, zaferi veya yenilgiyi belirleyecek. Tırmanıcılar arasında bunun bir ölüm tuzağı veya bir ölüm basamağı olduğu dedikoduları dolaşıyor."
 douglas.226.f: "'Bir saatlik istikrarlı ilerlemenin ardından sırt üzerindeki en zorlu görünen problemin eteğine ulaştık - yaklaşık kırk fit yüksekliğinde bir kaya basamağı. Bu irtifada bunun başarı ve başarısızlık arasındaki farkı yaratabileceğini fark ettik. Kayanın kendisi, pürüzsüz ve neredeyse tutamaksız, Göl Bölgesi'ndeki uzman kaya tırmanıcıları için ilginç bir Pazar öğleden sonra problemi olabilirdi, ama burada aşmak için zayıf gücümüzün ötesinde bir bariyerdi. Batıdaki dik kaya yüzeyinde onu döndürecek bir yol göremedim, ama neyse ki onu ele alma olasılığı hala vardı. Doğu tarafında başka bir büyük korniş vardı ve basamağın tam kırk fit yukarısına, korniş ve kaya arasında dar bir çatlak uzanıyordu. Tenzing'den beni olabildiğince iyi emniyete almasını isteyerek, kendimi bu çatlağa sıkıştırdım, sonra kramponlarımlı ayaklarımı geriye doğru teperek sivri uçlarını arkamdaki donmuş kara sapladım ve kendimi yerden kaldırdım. Her küçük kaya tutamağından ve diz, omuz ve kollarımın tüm gücünden yararlanarak, kelimenin tam anlamıyla çatlakta geriye doğru kramponladım, kornişin kayaya bağlı kalacağına dair içten bir dua ederek.' -Edmund Hillary"
 douglas.226.i: "Bu tamamen umutsuz!"
 douglas.227.t: "Hava Değişimi"
 douglas.227.d: "[SCOPE.sState('douglas_location_scope').GetName] dağlarındaki hava değişimi dağcıları ölümcül bir sorunla karşı karşıya bırakıyor. Daha yüksek rakımlarda daha korunaklı bir noktaya ulaşmak için hâlâ bir fırsat penceresi var, ancak bu tehlikeli bir girişim. Dağcılar ana kampta güvenli barınak bulabilirlerdi—ama bu, son günlerin hatta haftaların ilerlemesini boşa çıkarırdı."
 douglas.227.f: "Dağlarda hava değişiklikleri bir dağ yolculuğunda başa gelebilecek en tehditkâr olaylardan biridir. Bu, yağmur, fırtına ve kar için geçerlidir. Özellikle en yüksek rakımlarda ani bir kar yağışı zirve denemesinin iptal edilmesi anlamına gelebilir çünkü öngörülemeyen doğa unsurları bir trajediyle sonuçlanabilir."
 douglas.227.g: "Bu bir dağcıyı sarsamaz."
 douglas.227.h: "Son kampa geri dön!"
 douglas.228.t: "Kaya Düşmesi!"
 douglas.228.d: "Aniden yaşanan bir heyelan kampı vurdu. Birkaç dağcı yaralandı ve hayati ekipman kayboldu!"
 douglas.228.f: "Önce keskin bir çatırdama, sonra bir uğultu. Bivak üzerindeki yamaç uykusundan uyanmış bir canavar gibi çöktü. Kayalar, toz ve devasa taşlar korkunç bir çağlayan halinde aşağıya aktı. Bir hamal taşa çarptı, bir ip koptu, bir erzak sandığı paramparça oldu. Güvenliğe ulaşmayı başaranlar şimdi sessizlik içinde enkaza bakıyor. Kimse yüksek sesle söylemiyor, ama herkes biliyor: bu bir trajediyle bitebilirdi. Rota güvenli görünüyordu—ama dağ dost değildir."
 douglas.228.g: "Kampı güvene alın ve yaralılara yardım edin."
 douglas.229.t: "Baş Döndürücü Yükseklikler"
 douglas.229.d: "Zirve yaklaştıkça, dağın ince havası ve açık sırtları dağcılar üzerinde etkisini göstermeye başlıyor."
 douglas.229.f: "Gökyüzü öğlen bile karanlık, hava jilet gibi ince. Her adım bir kayayı kaldırmak gibi geliyor. Nefes kısa ve yüzeysel, rüzgâr ciğerlerden ruhu çekip alıyor sanki. Kimileri aşağıdaki uçuruma fazla bakınca dizleri titriyor. Diğerleri halüsinasyon görüyor: buzda sesler, karda gölgeler. Dağ burada merhamet göstermiyor—yalnızca yükseklik, rüzgâr ve sessizlik. Bu rakımda cesaret bile donmaya başlıyor."
 douglas.229.g: "Başlar öne eğik, ilerleyin."
 douglas.229.h: "Mola zamanı."
 douglas.230.t: "Taşlarda Okumalar"
 douglas.230.d: "Jeoloji asistanımız araziyi ayrıntılı biçimde inceledi—ve ölümcül hale gelmeden önce gizli riskleri ortaya çıkardı."
 douglas.230.f: "Diğerleri ipleri açıp botlarını kontrol ederken, jeolog taşı inceledi. Katman katman, tane tane, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'in asistanı küçük çatlakları, renk değişimlerini, tortul bantların açısını kaydetti. 'Bu yamaç kararsız,' diye mırıldandı, güvenli görünen bir yolu işaret ederek. Haklıydı da. Küçük bir keşif ekibi önceki bir kaymanın izlerini doğruladı. Sessiz titizliği sayesinde rota zamanında değiştirildi—ve belki de hayatlar kurtuldu. Dağ büyük olabilir, ama desenleri dikkatle bakanlarca okunabilir."
 douglas.230.g: "Bilime güven."
 douglas.231.t: "Dağ Bilimi"
 douglas.231.d: "#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!’in alışılmadık yükseklikleri jeoloji asistanına yeni içgörüler sunuyor; bunları dağ yolculuğu sırasında topluyor ve yazıya döküyor."
 douglas.231.f: "Bilim insanları, dağ seferlerinin erken aşamalarında bölgenin sıra dışı flora ve faunasını sıkça incelemişlerdi. Jeolojik araştırmalar özellikle ilgi çekiciydi—sadece bilimsel nedenlerle değil, aynı zamanda gelecekteki tırmanışları kolaylaştırmak için de."
 douglas.231.g: "Bilim için!"
 douglas.232.t: "Nadir Bir Mineral"
 douglas.232.d: "Dağcı grubu, bilim insanı olarak jeoloğun oyalanmasından şikâyetçiydi; daha çok yük gibi görünüyordu. Ancak anlaşıldı ki, zirveye tırmanırken nadir bir madde keşfetti."
 douglas.232.f: "Adamlar, bir saattir bir yamacın bir yerinde duran akademisyeni bekliyordu; jeolog aniden aletlerini çıkarmıştı. Başta başlarını salladılar, ama zamanı boşa harcamamak için öğünü öne alıp tatsız olanı faydalıyla birleştirmeye karar verdiler. Fakat Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'in asistanının yemek yeme ya da gelme niyeti yoktu. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] jeolog olmadan sefere devam etmekle tehdit edince, jeolog aniden gruba katıldı—elinde parıldayan bir taşla."
 douglas.232.g: "Ne hoş bir sürpriz."
 douglas.233.t: "Kayıp Bir Hayvan"
 douglas.233.d: "Himalayalar’ın alt seviyelerinde doğabilimcimiz [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] garip bir keşif yaptı: açlık ve soğuktan bitap düşmüş tek başına bir hayvan dolaşıyor."
 douglas.233.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] için böyle küçük, narin bir canlıyı görmek garipti; normalde Nepal’in bambu ormanlarında yaşadığı söylenirdi, ama bu ıssız arazideydi. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] onu kitaplardan, illüstrasyonlardan biliyordu ve en yakın ormanlarda yerlilerin yaşadığını da biliyordu; ama tek bir hayvan buraya nasıl gelmişti? Bu mesafeyi? Yiyeceksiz? Bir gizemdi. Acaba küçük kızıl panda da mı dağcılık hevesine kapılmıştı? Yoksa yırtıcılardan mı kaçmıştı? Her neyse, dağcı bitkin hayvanı bakım altına aldı ve iyileştirdi. Bir araştırma yardımcısının kırmızı pandayı ana kampa götürmesi ve oradan yerel hayvanat bahçesine yolculuğuna hazırlaması kararlaştırıldı."
 douglas.233.g: "Bu efsanevi 43. hayvan mı?"
