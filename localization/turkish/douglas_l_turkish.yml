 douglas.217.t: "Kardaki Ayak İzleri"
 douglas.217.d: "'Bunlar herhangi bir adam için fazla büyük, herhangi bir kar leoparı içinse fazla derindi,' diye açıkladı [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName], The Penny Illustrated Paper muhabirine. Makale kısa sürede Londra’dan Kalküta’ya çayhanelerde ve salonlarda yayıldı, hem kahkahalara hem hayranlığa yol açtı. Bir yaratığın, ayı kadar iri ve süzülen bir kar tanesi kadar sessiz, Kabru, Kamet ve Everest’in buzlu yamaçlarında dolaştığı söylendi. Sherpa rehberlerinin bile şüphesi yoktu — onlar buna Metoh-Kangmi diyordu."
 douglas.217.f: "'Bu dağlarda birçok şey gördüm — buz düşmeleri, ansızın çıkan fırtınalar, parmaklarını kaybedip Tanrı’yı bulan adamlar. Ama Majestelerinin çizmeleri üzerine yemin ederim, kamp ateşimizin ötesinde bir şey yürüdü. Ve bizi izliyordu.'\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] tarafından yazılan mektup, [TimeKeeper.GetCurrentDate.Format('y')] yılında yayımlandı"
 douglas.217.g: "İnsanlar bu tür hikâyelere ilgi duyar."
 douglas.217.h: "Bu raporlar dağcımızın itibarına zarar veriyor!"
