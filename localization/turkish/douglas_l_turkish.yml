 douglas.211.t: "Zirve"
 douglas.211.d: "Zorlu bir tırmanışın ardından dağcılar grubu sonunda zirveye ulaştı. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], [ROOT.GetCountry.GetNameNoFormatting] adına bu noktaya çıkan ilk kişi oldu. Artık geriye sadece bu zafer anının tadını çıkarmak kaldı."
 douglas.211.f: "'İlk soracağınız ve benim de cevaplamam gereken soru şudur: 'Everest Dağı'na tırmanmanın ne faydası var?' ve cevabım hemen şu olur: 'Hiçbir faydası yok.' En ufak bir kazanç ihtimali dahi yoktur.\n\nEvet, yüksek irtifada insan vücudunun davranışları hakkında biraz bilgi edinebiliriz ve belki tıp uzmanları bu gözlemlerimizi havacılık için kullanabilir. Ama onun dışında hiçbir şey çıkmaz. Yanımıza tek bir parça altın, gümüş, değerli taş ya da kömür, demir getirmeyeceğiz. Ekin yetiştirmek için kullanılabilecek tek bir karış toprak bulamayacağız. Yani faydası yok.\n\nEğer insanın içinde bu dağın meydan okumasına karşılık veren, onunla yüzleşmeye iten bir şey olduğunu anlamıyorsanız; bu mücadelenin aslında hayatın kendisinin mücadelesi olduğunu – hep yukarıya, hep daha yükseğe doğru – göremiyorsanız, neden gittiğimizi anlamayacaksınız. Bu maceradan aldığımız tek şey saf bir sevinçtir.\n\nVe sevinç, nihayetinde, hayatın amacıdır. Biz yemek yemek ve para kazanmak için yaşamıyoruz. Yaşamak için yemek yer ve para kazanırız ki hayatın tadını çıkarabilelim. Hayatın anlamı budur, amacı budur.' - George Leigh Mallory"
 douglas.211.g: "Haydi şafak vaktinin tadını çıkaralım!"
 douglas.212.t: "Tırmanış iptal edildi"
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]'in zirveye ulaşma denemesi şimdilik başarısız oldu. Dağcımız girişimi bırakmak ve geri dönmek zorunda kaldı."
 douglas.212.f: "Bir dağcının tırmanışı bırakmasının birçok sebebi olabilir. Bazen tek bir hava değişimi yeterlidir; bazen zirveye ulaşılabilecek sanılan bir yol fazlasıyla tehlikeli çıkar. Çoğu zaman tırmanış çok uzun sürer ve uygun zaman aralığını aşar çünkü günün belirli saatleri ve değişiklikler tırmanışı zorlaştırır veya imkânsız hale getirir. Ve bazen de sadece yanlış yol seçilmiştir."
 douglas.212.g: "Hayal kırıklığı."
 douglas.213.t: "Dağcılık Felaketi!"
 douglas.213.d: "[SCOPE.sState('douglas_location_scope').GetName]’de dağlara tırmanırken [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] büyük bir hata yaptı ve sefer felaketle sonuçlandı – birçok kişi öldü, erzak ve ekipman onlarla birlikte aşağıya yuvarlandı. Tüm ulus şokta!"
 douglas.213.f: "'Her gece, anlıyor musunuz, Matterhorn’daki yoldaşlarımı sırtüstü kayarken görüyorum; kolları açılmış, biri diğerini takip ediyor, eşit aralıklarla kusursuz bir düzende – önce rehber Croz, sonra Hadow, ardından Hudson ve en son Douglas. Evet, onları hep göreceğim…' - Edward Whymper"
 douglas.213.g: "Bir trajedi!"
 douglas_mountaineering_expedition_cost_modifier: "Dağcılık Seferi Maliyeti"
 douglas.201.t: "Dağcılık Seferi - Seviye 1"
 douglas.201.d: "Dağcılık kulübü, yalnızca ilkel düzeyde dağcılık ekipmanı ile denenebilecek dağlardan oluşan bir seçim hazırladı."
 douglas.202.t: "Dağcılık Seferi - Seviye 2"
 douglas.202.d: "Dağcılık Kulübü, standart dağcılık ekipmanı gerektiren dağlardan oluşan bir seçim hazırladı."
 douglas.203.t: "Dağcılık Seferi - Seviye 3"
 douglas.203.d: "Dağcılık kulübü, iyi seviyede dağcılık ekipmanı gerektiren dağlardan oluşan bir seçim hazırladı."
 douglas.204.t: "Dağcılık Seferi - Seviye 4"
 douglas.204.d: "Dağcılık Kulübü, yüksek kaliteli dağcılık ekipmanı gerektiren dağlardan oluşan bir seçim hazırladı."
 douglas.205.t: "Dağcılık Seferi - Seviye 5"
 douglas.205.d: "Dağcılık Kulübü, en iyi dağcılık ekipmanını gerektiren dağlardan oluşan bir seçim hazırladı."
