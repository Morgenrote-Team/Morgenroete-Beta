 douglas.103.t: "Dağcı Birliği Alayı"
 douglas.103.d: "Etkileyici dağ fetihleri ve dağ savunması deneyimi nedeniyle, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] üstün becerilerini, bir dağ birlikleri elit birliği oluşturmak için kullanmaya karar verdi."
 douglas.103.f: "Gebirgsjäger, Alpini veya Chasseurs Alpins, yükseklerde savaşta uzmanlaşmış bazı ülkelerin elit birliklerinden sadece birkaç örnektir. 1872'de kurulan Alpini, dünyanın en eski aktif dağ piyadesidir. Orijinal görevleri, İtalya'nın Fransa ve Avusturya-Macaristan ile olan sınırını korumaktı."
 douglas.103.g: "Onun mirasını geleceğe taşıyacaklar."
