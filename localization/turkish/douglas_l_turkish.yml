 douglas.101.t: "Dağcılık Kulübü Kuruldu"
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] çağırıyor—ve dağ cevap veriyor. Dağcılık Kulübü’nün kuruluşu, daha yükseklere çıkmak isteyen herkes için yeni bir dönemi işaret ediyor."
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName], fırtınalar ve çığlar arasından geçen seferler düzenledi—ama şimdi [SCOPE.sCharacter('douglas_president_scope').GetSheHe], mirasını aktarmak istiyor. [ROOT.GetCountry.GetCapital.GetCityHubName]’de [GetPlayer.GetName] Dağcılık Kulübü’nü kuruyor, yalnız değil; yanında keskin bakışlı ve demir iradeli bir aday var: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]. [SCOPE.sCharacter('douglas_president_scope').GetFullName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim]’de sadece hırsı değil, geleceğin efsanesini de görüyor. Birlikte yalnızca zirvelere değil, aynı zamanda şerefe, cesarete—ve belki de tarihte bir yere uzanan bir yolun eşiğinde duruyorlar. Kulüp, dağların çağrısını duyan herkese açıktır. Tırmanış başlıyor."
 douglas.101.g: "Dağ çağırıyor!"
 douglas.102.t: "Alp Kulübü"
 douglas.102.d: "Alp Kulübü, [TimeKeeper.GetCurrentDate.Format('y')] yılında [ROOT.GetCountry.GetCapital.GetCityHubName]’de resmen kuruldu ve dünyanın ilk uluslararası dağcılık örgütü olarak tanındı. Bu kuruluş, modern alpinizmin kurumsal başlangıcını simgeliyor."
 douglas.102.f: "Tarihsel olarak, 1857’de Londra’da bir grup İngiliz centilmen, dağcılığa adanmış bir kulüp kurmak üzere bir araya geldi. John Ball ve Edward Kennedy gibi isimlerin önderliğinde, Alp Kulübü, Alplerin sistematik keşfini teşvik etmeyi, fiziksel mücadeleyi coğrafi ve doğal çalışmalarla birleştirmeyi amaçladı. Kulüp, bilgi paylaşımı, seferlerin düzenlenmesi ve dağcılar arasında bir topluluk duygusunun geliştirilmesi için yapılandırılmış bir çerçeve sağladı. Üyeleri, daha sonra 'Alpçiliğin Altın Çağı' olarak adlandırılacak dönemde birçok ilk tırmanışı başardı ve deneyimlerini belgelendirdi. Çok geçmeden yayımlanmaya başlanan Alpine Journal, dağcılık edebiyatının doğuşuna katkıda bulundu. Alp Kulübü’nün kuruluşu, dünya çapında örgütlü tırmanışın temelini attı ve dağ keşiflerinde kalıcı standartlar belirledi."
 douglas.102.g: "Zirveye birlikte!"
