 ACHIEVEMENT_GROUP_douglas_achievement_group: "Douglas Başarımları"
 ACHIEVEMENT_douglas_president: "Capitol Hill"
 ACHIEVEMENT_DESC_douglas_president: "Alp Kulübü Başkanı olun."
 ACHIEVEMENT_douglas_seven: "Yedi Zirve"
 ACHIEVEMENT_DESC_douglas_seven: "Yedi dağ zirvesine tırman."
 ACHIEVEMENT_douglas_everest: "Mallory’nin Son Dileği"
 ACHIEVEMENT_DESC_douglas_everest: "1953’ten önce Everest Dağı’na tırman."
 je_douglas_mount_everest_expedition_preparation: "Everest Seferi Hazırlıkları"
 je_douglas_mount_everest_expedition_preparation_reason: "Dünyanın en yüksek dağını fethetmek sadece olağanüstü bir dağcı değil, aynı zamanda kapsamlı bir hazırlık da gerektirir. Tırmanış için ne kadar çok hazırlık yaparsak, temel risk o kadar azalır."
 je_douglas_mount_everest_expedition: "Everest Seferi"
 je_douglas_mount_everest_expedition_reason: "Everest Dağı dağların kralıdır. Buradaki ilerleme tamamen olayların sonucuna göre ölçülür. Bir dağcının başarılı olup olmayacağı yeteneklerine bağlıdır. Everest’in temel riski çok yüksek olduğundan, küçük hataların felakete dönüşmesini önlemek için seferin önceden kapsamlı bilimsel tavsiye aldığı varsayılır."
 je_mount_everest_metereologist_tt: "#default_text [GetPlayer.GetName], #V $curie_meteorologist$#! [concept_character_trait] özelliğine sahip bir [concept_curie_physicist]e sahip.#!"
 je_mount_everest_mechanical_engineer_tt: "#default_text [GetPlayer.GetName] has a [concept_tesla_engineer] with the #V $tesla_mechanical_engineer$#! [concept_character_trait].#!"
 je_mount_everest_good_physician_tt: "#default_text [GetPlayer.GetName], #V $panum_physician_experienced$#! veya #V $panum_physician_famous$#! [concept_character_trait] özelliğine sahip bir [concept_panum_physician]e sahip.#!"
 je_mount_everest_good_ethnologist_tt: "#default_text [GetPlayer.GetName], #V $roy_ethnologist_experienced$#! veya #V $roy_ethnologist_famous$#! [concept_character_trait] özelliğine sahip bir [concept_roy_ethnologist]e sahip."
 je_mount_everest_good_geologist_tt: "#default_text [GetPlayer.GetName], #V $agassiz_geologist_experienced$#! veya #V $agassiz_geologist_famous$#! [concept_character_trait] özelliğine sahip bir [concept_agassiz_geologist]e sahip.#!"
 douglas.401.t: "Kutsal Dağın Eteklerinde"
 douglas.401.d: "Sefer Himalayalara ulaştı — ve artık dünyanın zirvesine giden yolu seçmek zorunda."
 douglas.401.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] haritayı açıp kayaların üzerine serdi. İki çizgi. İki seçim.\n\nKuzeyde: Tibet üzerinden bilinen bir yol. Diplomatik izin, eski araştırmalar ve önceki seferlerin hayaletleri.\n\nGüneyde: Nepal’in yasaklı vadisi. Bilinmeyen arazi, ilahi gazap fısıltıları. Ama belki yamaçları daha yumuşaktır.\n\nİkisine birden tırmanamazlardı.\n\nDağ yalnızca tek bir denemeye izin veriyordu."
 douglas.401.g: "Kuzey Yüzü rotasını takip et."
 douglas.401.h: "Güney Yüzü rotasını takip et."
 douglas.411.t: "Yasaklı Vadi"
 douglas.411.d: "Aylar süren müzakerelerin ardından sefer, Chomolungma’nın güneyden tırmanışı için Nepal’e geçti."
 douglas.411.f: "Ona ‘yasaklı vadi’ diyorlardı. On yıllardır hiçbir yabancı, Darjeeling’in son karakolundan öteye adım atmamıştı. Ama o sabah sis dağıldı ve [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] ile ekibi son sırtı geçti.\n\nOrmandan geçen nehir artık hiçbir haritada işaretli değildi. Yol yoktu. Yalnızca keçi patikaları ve yakın köylerden gelen fısıltılar. Sherpalar bile huzursuz görünüyordu. Geceleri rüzgâr, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]’in Alplerde ya da Andlarda hiç duymadığı bir ses taşıyordu — sanki buzulun kendisinden gelen alçak, nefes alan bir sessizlik. Adamlar az konuşuyordu. Yük hayvanları huzursuzdu. Ve doktor, beklenenden çok daha erken irtifa hastalığının ilk vakalarını bildirdi. Yine de kimse geri dönmedi. Çünkü ağaçların, sisin ve vadinin son kıvrımının ötesinde Everest’in güney yüzü duruyordu — el değmemiş.\n\nGüzeldi. Ve sanki onları öldürmek istiyordu."
 douglas.411.g: "Bu yolda yol yok."
 douglas.412.t: "Üstteki Seraklar"
 douglas.412.d: "Sefer Khumbu Buzul Şelalesi’nin eteklerine ulaştı — kar kütleleri ve derin yarıklardan oluşan bir labirent."
 douglas.412.f: "Buzul sessizlik içinde hareket ediyordu. Ayaklarının altında yaşayan bir şey gibi gıcırdıyor, kayıyor, iç çekiyordu. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] daha önce buz görmüştü ama hiç böyle değil. Bunlar Alp yamaçları değildi — bunlar monolitlerdi, içi boş, eğilmiş, donmuş akciğerler gibi mavi ve en az onlar kadar kırılgan.\n\nÖğlene doğru sıcaklık yükseldi. Soldan donuk bir çatırdı yankılandı, sonra bir diğeri — ve ev büyüklüğünde bir blok koparak cam gibi düştü. Sherpalar kaçıştı. Bir adam yarığın kenarında ayağını kaybetti ama son anda çekilip kurtarıldı. Harita işe yaramazdı. Halatlar dondu, koptu. Güneş, onlar tırmanmadan önce basamakları eritiyordu.\n\nYolun yarısına bile gelmemişlerdi.\n\nİleriye zorlayabilirlerdi. Buzulun dayanmasını umarak. Ya da geri dönüp, buzun soğuğun onu sabit tuttuğu şafaktan önce yeniden deneyebilirlerdi.\n\nAma burada kaybedilen her saat, sekiz bin metrenin üzerindeki her saat havasız kalmaktı."
 douglas.412.g: "İleriye devam edin. Buraya tırmanmaya geldik."
 douglas.412.h: "Bu aşılmaz bir engel."
 douglas.413.t: "Beyaz Cehennem"
 douglas.413.d: "Ekip Batı Cwm’e girdi — devasa buz duvarları arasında kalan geniş bir buzul vadisi, güneşin dört bir yandan yansıdığı yer."
 douglas.413.f: "Burası kolay kısım olacaktı. Lhotse Duvarı’ndan önce düz bir geçiş, kısa bir nefes arası. Ama kimse onlara sıcaktan bahsetmemişti.\n\nÖğlene doğru Batı Cwm bir fırına dönüştü. Kar, botlarının altında çamura dönüştü. Güneş gözlükleri buğulandı ya da parçalandı. Her iki yandaki buz duvarları güneşi aşağıya yansıtıyor, öyle ki sanki kızgın camın üzerinde yürüyorlardı. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] konuşmaya çalıştı, ama [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] artık dilini hissedemiyordu.\n\nBir hamal bayıldı. Bir diğeri kustu. Donma yerini güneş yanığına bıraktı. Buzul ayaklarının altında homurdanıyordu, sanki ağırlıklarından hoşlanmıyormuş gibi. Ne rüzgâr, ne ses, ne gölge vardı — sadece parıltı, sıcaklık ve dünyanın çatısında canlı canlı kaynatılıyormuş hissi.\n\nYine de önlerindeki duvar çağırıyordu. Lhotse Yüzü, mavi ve dik, yükseliyordu.\n\nBeklemek daha fazla zaman, daha fazla yiyecek, daha fazla güç kaybetmek demekti.\n\nİlerlemekse güneşe karşı kumar oynamak."
 douglas.413.g: "İlerle. Şimdi duramayız."
 douglas.413.h: "Bu deliliği durdurun."
 douglas.414.t: "Mavi Duvar"
 douglas.414.d: "Güney Geçidi’ne ulaşmak için ekip, kötüleşen koşullar altında dik ve açıkta kalan Lhotse Yüzü’nü tırmanmak zorunda."
 douglas.414.f: "Artık tırmanış değil — bizzat yerçekimine karşı sürünerek yükselmekti. Ayaklarının altındaki buz mermer kadar sert, çelik kadar maviydi. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] her iki botunu da bastı, baltayı sapladı ve tutmasını diledi. Her adım dakikalar aldı. Her nefes bir savaştı.\n\nAşağıda, Batı Cwm sahte bir huzurla parıldıyordu. Üzerlerinde, duvar sonsuza kadar uzanıyordu. Rüzgâr geri dönmüştü — fırtına değil, kemiklerinden sıcaklığı emen kuru, hırçın bir tıslama. Halatlar dondu. Parmaklar katılaştı. Ama hata payı yoktu. Tek bir kayış üç adamı götürebilirdi.\n\nArkasında biri öksürdü. Karlara kan saçıldı. Bir Sherpa tökezliyordu. Fazla yükseğe, fazla hızlı çıkılmıştı. Ama artık geri dönüş yoktu.\n\nDuvar sığınak sunmuyordu. Dinlenme yoktu. Yalnızca tırmanış.\n\nVe üzerlerindeki sırt, iki saat öncekinden daha yakın görünmüyordu."
 douglas.414.g: "Tırman. Geri dönmek için çok yol katettik."
 douglas.414.h: "Kaçın, aptallar!"
 douglas.415.t: "Son Kamp"
 douglas.415.d: "Ekip Güney Geçidi’ne ulaştı. Artık yalnızca zirve sırtı kaldı — ve son karar."
 douglas.415.f: "Ayda kamp yapmak gibiydi. Hava kırılgandı, rüzgâr merhametsizdi. Çadırlar her esintide yaralı hayvanlar gibi titriyordu. Ne kuşlar vardı, ne sesler, ne de buzulun çatırdaması. Sadece ince, hırıltılı nefesler. Güney Geçidi dinlenme yeri değildi — zafer ya da ölüm için bekleme yeriydi.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName], çadırın kumaş kabuğu içinde kambur oturmuş, titreyen eliyle haritaya bakıyordu. Zirveye giden rota açıktı: güneydoğu sırtı boyunca dünyanın tepesine.\n\nAma oksijen azalıyordu. Erzak tükeniyordu. Parmaklar kararmıştı. Bir adam gün doğumundan beri konuşmamıştı.\n\nYalnızca tek bir hamle için yakıt vardı. Son bir deneme. Zirve bin dikey metreden az uzaktaydı — ama ölüm bölgesinde bin mil kadar uzak sayılırdı.\n\nDışarıda rüzgâr canlı bir şey gibi uluyordu. Karar zamanıydı.\n\nYukarı ya da aşağı.\n\nYaşa ya da dene."
 douglas.415.g: "Zirveye saldırıyı başlat."
 douglas.415.h: "Tırmanışı iptal et. Gelecek yıl dönmek için hayatta kal."
 douglas.416.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] Basamağı"
 douglas.416.d: "Zirvenin hemen altında, beklenmedik bir engel son sırtı kapatıyor — dik bir kaya ve buz duvarı."
 douglas.416.f: "Güneş henüz doğmamıştı. Zirve sırtı şafak ışığında solgun parlıyordu ve bir an için [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] yolun açık olduğuna inandı. Hava konuşmak için fazla incedi. Rüzgâr eldivenleri ve gözlükleri delip geçiyordu. Ama sonra — onları durdurdu.\n\nDik bir yüz. On, belki on iki metre. Yürümek için fazla dik, yanından dolaşmak için fazla açık. Tek bir dikey monolit sırtı bir bıçak gibi kesiyordu — ve ip yoktu, piton yoktu, rota yoktu. Haritalarda yer almıyordu. Hiçbir raporda bahsedilmemişti. Kimse uyarmamıştı.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] duvara baktı. Kar incelmişti. Bu granitti, kara ve kırağıyla kaplı. Bir Sherpa solu sola keşfetmeye çalıştı — dik düşüş. Bir diğeri sağa baktı — yalnızca gökyüzü.\n\nDağ son bir hile saklamıştı. Son bir engel.\n\nEtrafından geçmek yoktu. Yalnızca üzerinden.\n\nDaha sonra, onu ilk görenin adıyla anacaklardı."
 douglas.416.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] Basamağını tırman."
 douglas.416.h: "Çok tehlikeli. Geri dönüyoruz."
 douglas.421.t: "Yasaklı Yüz"
 douglas.421.d: "Yerel yetkililerden izinle sefer, Rongbuk Vadisi üzerinden kuzeyden Everest’e tırmanmaya başlar."
 douglas.421.f: "Hoş geldin yoktu, yalnızca rüzgâr. Dua bayrakları renksiz dalgalanıyordu. Tepelerden keşişler hayaletler gibi bakıyordu, hareketsiz, sessiz. Yol buzulun başladığı yerde bitiyordu — ve buzul sessizliğe doğru uzanıyordu.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] raporları okumuştu. Mallory, Norton, Finch. Haritaları eksik, notları şifreliydi. Ama dağ oradaydı, onların anlattığı gibi: heybetli, gri, haşin.\n\nYaklar Rongbuk Manastırı yakınında durdu. Buradan sonrası her şeyi sırtlarında taşımak demekti. Sefer artık teorik değildi. Taş, buz, irtifa. Gökyüzü üzerlerinde ince ve kırılgandı. Kar düşmüyordu — asılı duruyordu. Buzul geceleri sanki uykusunda dönen kadim bir şey gibi gıcırdıyordu.\n\nHamalın biri dağda yaşayan, henüz yatıştırılmamış bir tanrıdan bahsetti.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] çeviri istemedi."
 douglas.421.g: "Kuzey izin verir — ama hoşnut değildir."
 douglas.422.t: "Buzul Çatlakları"
 douglas.422.d: "Doğu Rongbuk Buzulu tehlikelerini ortaya koyuyor — çöken seraklar ve gizli yarıklar kervanın ilerleyişini tehdit ediyor."
 douglas.422.f: "Güneş vadi tabanını zar zor ısıtmıştı ki ilk ses geldi — buzun derinlerinden gelen içi boş, inleyen bir çatırdama. Sonra bir diğeri. Adamlar dondu. Yaklar huzursuzlaştı. Kayalıklardan yavaş, tıslayan kar tabakaları döküldü.\n\nDoğu Rongbuk Buzulu uzaktan hareketsiz görünüyordu, ama yakından mavi sırtların, yarık tarlalarının ve eğilmiş kulelerin labirentiydi. Her adım bir tahmin. Her iz bir kumardı.\n\nSola doğru bir sırtın etrafından dolaşmaya çalıştılar. Buz çöktü. Bir hamal ses çıkarmadan yok oldu. İkinci bir adam bir ipten sallandı, çığlık atıyordu. Kramponları pürüzsüz buzda kayıyordu, tutunamadı. Onu yukarı çektiler — kanlı, gözleri fal taşı gibi açılmış. Uzun süre kimse konuşmadı.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] ileriye baktı. Yamaç düzleşmeden önce üç kilometre daha buzul vardı. Hızla şimdi geçebilirlerdi — ya da geri çekilip, buzun sertleştiği soğuk saatlerde yeniden deneyebilirlerdi.\n\nAma hava değişiyordu. Bulutlar davul gibi yuvarlanıyordu. Gecikmek fırtına demekti."
 douglas.423.t: "Buz Duvarı"
 douglas.423.d: "Kuzey Geçidi’ne ulaşmak için ekip, rüzgâr ve gölgelerin süpürdüğü dik ve açıkta kalan bir buz yamacını tırmanmak zorunda."
 douglas.423.f: "Rota keskin bir açıyla yukarıya uzanıyordu. Demir kadar sert bir buzul dili gökyüzüne doğru çıkıyordu. Kuzey Geçidi, buzdan oyulmuş bir vaat gibi üzerlerinde asılı duruyordu. Ama patika yoktu — yalnızca yamaç, yalnızca rüzgâr, yalnızca korku.\n\nNe kadar yükseldilerse rüzgâr o kadar güçlendi. Uğuldamıyordu — çığlık atıyordu. Karlardan parçalar koparıp yüzlerine cam gibi fırlatıyordu. Çiviler tutmuyordu. Halatlar katılaşıyordu. Güneş, sanki utanmış gibi bulutların ardına saklandı.\n\nBir adam kaydı. Çığlığı kısa sürdü. Onu tuttular — kıl payı. Ama ip artık yıpranmıştı. Ve yukarıdaki sırt, hâlâ daha yakın görünmüyordu.\n\nBazı Sherpa devam etmeyi reddetti, kara diz çöküp görünmeyen tanrılara dua etmeye başladılar.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] son kulvarın dibinde durdu. Yukarıdaki sırt çizgisi bir serap gibi titreşiyordu. Zorla yukarı çıkabilirlerdi — ya da inip dinlenip, daha sağlam iplerle ve daha sıcak havada tekrar deneyebilirlerdi.\n\nAma gecikme fırtına demekti. Ya da daha kötüsü — şüphe."
 douglas.424.t: "Nefesin Eşiği"
 douglas.424.d: "Ekip Kuzey Geçidi’nin üzerinde, zirvenin ağırlığı ve rüzgâra açık halde son bir kamp kurar."
 douglas.424.f: "Sığınak yoktu. Yalnızca rüzgâr ve var olmayan havayı arayan ciğerlerin sesi vardı. Çadırlar her esintide içe bükülüyordu, sanki dağın kendisi onları yutmaya çalışıyordu.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName], hâlâ kırağı kaplı uyku tulumunun içine süründü. Termometre işe yaramazdı. Soğuk artık bir sayı değil — varoluşun bir şartıydı. Ateş yoktu. İştah yoktu. Sadece titreme ve oksijenin maskelere buz tutmuş valflerden tıslayarak dolması.\n\nSherpa’lardan biri artık konuşmuyordu. Hareketsiz oturuyordu, gözleri açık, kımıldamadan. Parmakları griye dönmüştü. Bir diğeri sürekli memleketinden bahsediyordu, kimse sormamış olsa da.\n\nArtık 8.000 metrenin üzerindeydiler. Ölüm bölgesi. Kaslar iyileşmiyordu. Vücut hayatta kalmak için kendini tüketiyordu. Nefes almak bile bir karardı.\n\nZirve sırtı önlerindeydi. Ya ertesi gün ulaşacaklardı — ya da bir daha asla söz edilmeyecekti."
 douglas.425.t: "İkinci Basamak"
 douglas.425.d: "Zirvenin hemen altında ekip, kuzey sırtının en büyük engeli olan dik bir kaya ve buz uçurumuna ulaştı."
 douglas.425.f: "Sırttan devler için yapılmış bir duvar gibi yükseliyordu. On metre yüksekliğinde, kara, dik, kırağıyla kaplı. İkinci Basamak.\n\nHiçbir uyarı olmamıştı. Hiçbir harita bunu göstermemişti.\n\nYol burada bitiyordu. Bir yanda bin metre boşluk. Diğer yanda bir bot genişliğinde dar bir çıkıntı. Rüzgâr montlarını pençeliyordu. Oksijen maskelerinden buhar gibi tıslıyordu.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] yukarı baktı. Belirgin bir tutamak yoktu. Çatlak yoktu. Sadece donmuş nefesle kaygan, dümdüz kaya. Sherpa daha ileri gitmiyordu. Diğerleri bekliyordu, gözleri boş, konuşamayacak kadar yorgun.\n\nBiri çantaları bırakmayı önerdi. Bir diğeri tırmanıp ip sabitlemeyi teklif etti. Ama ip kalmamıştı.\n\nBurada ya geri dönerlerdi. Ya da kaybolurlardı."
 douglas.425.g: "İkinci Basamağı tırmanmayı dene."
 douglas.425.h: "Geri dönün. Burası son."
 douglas.431.t: "Dünyanın Damı"
 douglas.431.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], Chomolungma’nın zirvesine ulaşır — dünyadan daha yükseğe çıkan ilk insan."
 douglas.431.f: "Rüzgâr yoktu. Ses yoktu. Yalnızca [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis] botlarının altındaki karın hışırtısı ve geride bırakılan dünyanın boş sessizliği vardı.\n\nSon adımlar bir rüya gibiydi. Akciğerler yanıyor, gözler bulanık, vücut titriyordu — ve sonra: yukarıda hiçbir şey kalmadı.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName], tek başına zirvede durdu, güneş karları alev gibi parlatıyordu. Çok aşağıda, bulutlar okyanus gibi sürükleniyordu. Bir zamanlar kudretli görünen zirveler şimdi buruşmuş birer parşömen gibiydi.\n\nDünya eğiliyordu. Zaman durmuştu. Sadece buz ve nefessiz gökyüzüne kazınmış tek bir an."
 douglas.431.g: "Üçüncü Kutup bizimdir."
 douglas.432.t: "Dağ Bekliyor"
 douglas.432.d: "Kayıplar, yorgunluk ve azalan umut karşısında sefer zirveye ulaşamadan iptal edildi."
 douglas.432.f: "Hiçbir karar kolay gelmedi. Sonunu getiren fırtına, donma ya da açlık değildi. Ateşin etrafındaki sessizlikti. Artık yukarı bakmayan gözlerdi. 'Ne kadar kaldı' yerine 'neden' diye soran adamlardı.\n\nHaritalar yırtılmış, halatlar buzdan kaskatıydı. Hamallar karanlıkta dua mırıldanıyordu. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] bile zirveye bakmıyordu artık — yalnızca gökyüzüne.\n\nTaşıyamadıklarını gömdüler. Geçidin altındaki taş yığınına bir bayrak bıraktılar.\n\nUzun inişte kimse konuşmadı. Ama sessizliklerinde utanç yoktu."
 douglas.432.g: "Everest’te başarısızlık yenilgi değildir. Yalnızca gecikme."
 douglas.433.t: "Geri Dönmediler"
 douglas.433.d: "Son hamleden sonra bir daha haber alınamadı. Dağ sessizliğini korudu."
 douglas.433.f: "Son işaret alacakaranlıkta geldi. Sırtta bir ışık parıltısı. Gökyüzünün hemen altında hareket eden bir siluet. Sonra — hiçbir şey.\n\nGünlerce yamacı aradılar. Sherpa buzul boyunca tarama yaptı. İp yoktu. Eldiven yoktu. Sadece hiçbir yere varmayan rüzgârla savrulmuş izler.\n\nNe kadar ilerledikleri bilinmiyordu. Zirveye ulaştılar mıydı? Dünyaya yukarıdan bakıp tamamını gördüler mi?\n\nTek bir şey kesindi: geri dönmemişlerdi.\n\nBazıları düştüklerini söyledi. Diğerleri karın hemen altında, bir kolları göğe uzanmış halde yattıklarını.\n\nAma birkaç kişi başka bir şey fısıldadı — dağın onları kabul ettiğini. Ve orada, buzda ve kayada, birilerinin onları takip etmesini beklediklerini."
 douglas.433.g: "Sefer efsaneye karıştı."
 douglas_third_pole_modifier: "Üçüncü Kutup"
 douglas_mount_everest_physicist_button: "Himalayalarda Hava Tahminleri"
 douglas_mount_everest_physicist_button_desc: "Değişken hava koşulları geçmişte başarısız seferlerin en yaygın nedenlerinden biri olmuştur. Meteorolog özelliğine sahip bir fizikçi, zirve denemesi için en uygun tarihi hesaplayabilir."
 douglas_mount_everest_engineer_button: "Geliştirilmiş Oksijen Tedariği"
 douglas_mount_everest_engineer_button_desc: "Aşırı yüksekliklerde dağcılık için oksijen tüplerinin kullanımı hâlâ emekleme aşamasındadır. Bir mühendis bu deneysel teknolojiden daha iyi bir cihaz geliştirebilir."
 douglas_mount_everest_physician_button: "Yüksek İrtifa Hastalığı Araştırması"
 douglas_mount_everest_physician_button_desc: "Yüksek irtifa hastalığı, Himalayalarda dağcılığın tehlikeli yan etkilerinden biri olarak kabul edilir. Deneyimli bir hekim bu durumu daha fazla araştırabilir."
 douglas_mount_everest_ethnologist_button: "Yerel Sherpa"
 douglas_mount_everest_ethnologist_button_desc: "Himalaya zirvelerine giden en başarılı rotalar, bölgeyi en iyi bilen yerlilerin bilgisi sayesinde bulunur. Bir etnolog, sefer için yetenekli bir Sherpa’yı ortak olarak işe alabilir."
 douglas_mount_everest_geologist_button: "Jeolojik Araştırma"
 douglas_mount_everest_geologist_button_desc: "Bir jeolog, dağın profilini çıkarabilir, daha umut vadeden rotaları belirleyebilir ve tırmanış için daha uygun yöntemler önerebilir."
 douglas_mount_everest_risk_decrease_tt: "Everest’e tırmanıştaki başlangıç riski azalır."
 douglas.402.t: "Bir Tahmin"
 douglas.402.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName], Himalayalar için ilk uzun vadeli hava modeli raporunu sunar — [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]’ın seferi yola çıkmadan günler önce."
 douglas.402.f: "Aylar boyunca fizikçi sessizlik içinde çalıştı. Grafikler. Basınç verileri. Hindistan’dan rüzgâr kayıtları. Ve bir teori — radikal belki, ama zarif: Orta Asya’nın büyük rüzgârlarının kaotik değil, mevsimsel koridorları takip ettiği.\n\nŞimdi, tebeşir tozuna bulanmış kollarıyla ve çatlamış parmak uçlarıyla Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] dağcılık kurulunun önünde duruyordu. Elindeki kâğıtta el çizimi izobarlar vardı — Himalaya silsilesinde on günlük bir atmosferik pencereyi gösteriyordu.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] gözlerini kıstı. 'Ve bundan emin misiniz?'\n\nFizikçi gözlüğünü düzeltti.\n\n'Bir dağla konuşurken olunabileceği kadar eminim.'"
 douglas.402.g: "Tahmini kullanarak tırmanışı zamanla."
 douglas.403.t: "Ölüm Bölgesinde Hava"
 douglas.403.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], yüksek irtifa için tasarlanmış yeni bir oksijen cihazını tanıtır."
 douglas.403.f: "Şimdiye dek 8.000 metrenin üzerindeki oksijen kullanımı sadece bir deneydi — zoraki, tıslayan ve omuzları nefessiz bırakan ağır bir yük. Kaçak yapan valfler. Donmuş borular. Çok ağır tanklar.\n\n[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] bunu değiştirdi.\n\nMikro toleranslarla ayarlanmış basınç regülatörleri, yalıtımlı borular ve modüler taşıma sistemiyle yeni cihaz yarı ağırlıktaydı ama iki kat daha stabil akış sağlıyordu. Tanklar artık kıyafetlerin içinde taşınabiliyor, donmayı engelliyordu. Maske, dalgıçların ikinci derisi gibi yüze oturuyordu.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] cihazı eldivenli eliyle kaldırıp başını salladı. '26.000 feetin üzerinde işe yarayacak mı?'\n\nMühendis gülümsedi.\n\n'Başka hiçbir şeyin çalışmadığı yerde çalışması için üretildi.'"
 douglas.403.g: "Ekibi geliştirilmiş sistemle donat."
 douglas.404.t: "Görünmez Tehlike"
 douglas.404.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tırmanış sırasında yüksek irtifa hastalığını nasıl tanıyıp önleyeceklerini ekibe anlatır."
 douglas.404.f: "Donma görülebilirdi. Düşmelere hazırlık yapılabilirdi. Ama bu — bambaşkaydı.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ekibin karşısına geçti ve belirtileri anlatmaya başladı: baş ağrısı, nefes darlığı, ölümcül kararlara yol açan ince bir bilinç bulanıklığı.\n\n'Alkol sarhoşluğu gibi başlar,' dedi, 'ama boğulma gibi biter.'\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] sessizlik içinde dinledi. Bu, hayatta kalmanın reçetesiydi."
 douglas.404.g: "Hekimin protokolünü harfiyen uygula."
 douglas.405.t: "Dağı Bilen Adam"
 douglas.405.d: "Sessiz müzakereler ve kültürel sezgi sayesinde Dr. [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName], Everest’in yamaçlarını eşsiz şekilde bilen deneyimli bir Sherpa’nın desteğini sağlar."
 douglas.405.f: "Harita taşımıyordu. Pek İngilizce konuşmuyordu. Ama parmağıyla işaret ettiğinde dağ cevap veriyordu.\n\nOnu bulan [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName] oldu — listelerde değil, iki vadi ötedeki sessiz bir köyde.\n\n'O, hepimizden daha yükseğe çıktı,' dedi etnolog, 've birden fazla kez geri döndü.'\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] elini uzattı. Sherpa sessizce tuttu. Ne bir seremoni, ne bir şüphe.\n\n'Siz zirveyi incelediniz,' diye mırıldandı Dr. [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName], 'ama o gölgesiyle konuştu.'"
 douglas.405.g: "Deneyimli Sherpa’yı baş rehber olarak işe al."
 douglas.406.t: "Dağın Kemikleri"
 douglas.406.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], araziyi inceler ve eski oluşumlar arasından daha güvenli bir tırmanış rotası keşfeder."
 douglas.406.f: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe|U], taşın üzerindeki siyah çizgilere parmaklarını sürdü ve yavaşça başını salladı. Önce şist, sonra gnays, ardından çatlaklı kireçtaşı. Yara izleri gibi fay hatları. Donmuş dalgalar gibi basınç kıvrımları.\n\n'Dağ hareketsiz değil,' dedi jeolog, 'sadece yavaş.'\n\nSaatler boyunca Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] ekibin önünde yürüdü, elinde çekiciyle vurarak, dinleyerek, okuyarak. Tehlikeli bir buz düşmesini atlatan bir sırtı işaretledi. Bir diğerini ise rüzgâra açık çakıl yamaçlarından çapraz geçen, iki gün kazandıracak bir geçit.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] sessizlik içinde izledi.\n\n'Tutacak olanı öngörebilir misiniz?'\n\nDr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] omuz silkti.\n\n'Hayır,' dedi. 'Ama son on milyon yıldır tutan şeyi söyleyebilirim.'\n\nVe bazen, bu yeterliydi."
 douglas.406.g: "Jeoloğun tavsiyelerine uy."
 douglas.121.t: "Evde Biçimlenen Cesaret"
 douglas.121.d: "[ROOT.GetCountry.GetAdjective] dağlarında geçen yıllar, tereddüdün yerini dinginliğe bıraktı. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], daha sağlam bir el ve daha cesur bir kalple geri döndü."
 douglas.121.f: "'Eskiden korkunun aşılması gereken bir şey olduğunu sanırdım,' dedi [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]. 'Ama gerçekte, onunla yaşamayı öğrenmek ve yönetmesine izin vermemektir.'\n\nAylar boyunca [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], memleketindeki sırtlara ve buzullara tırmandı—yalnız, sessizlik içinde, çoğu zaman aynı rotayı yeniden geçerek daha önce gözden kaçırdıklarını fark etmek için.\n\nZirveler daha yüksek değildi, ama [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] yükselmişti. Kaya düşmeleri, soğuk ve beyaz örtülü gökyüzü artık tanıdık düşmanlardı. Ve hiçbir tırmanış manşetlere çıkmasa da, her biri bir iz bıraktı—şöhrette değil, ama sinirlerde."
 douglas.121.g: "Yüksek yerler gelsin."
 douglas.122.t: "Boşa Gitmeyen Adımlar"
 douglas.122.d: "Başka herkes geri dönerken, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] sadece devam etti. Hatta başarısızlık bile yakıt oldu—ve her patika bir ders."
 douglas.122.f: "Zirve asla tek başına amaç değildi.\n\nBir sırtın üzerinde, fırtına [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] son kulvara ulaşmadan bastırdı. Başka bir seferde, bir çığ rotayı gece boyunca sildi. Bazen yiyecekler azaldı ya da rehberler vazgeçti. Ama [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] kaldı. Döndü. Uyarladı.\n\nBir dağ inatçılığa boyun eğmez. Ama azmi tanır.\n\nAylar boyunca [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], tanıdık zirvelere farklı yollarla tırmandı—yeni yaklaşımlar deneyerek, aletleri test ederek, gizli çıkıntıları haritalayarak. Başkalarının boş tekrar dediği şey, şöhretten daha zor kazanılan bir şeyin temeli oldu: dayanıklılık."
 douglas.122.g: "Aynı yoldan iki kez gitmek asla aynı değildir."
 douglas.123.t: "Bilinen Haritaların Ötesinde"
 douglas.123.d: "Merak, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]’i başkalarının güvendiği rotaların ötesine itti. Orada, boşluklarda, bir amaç—ve bir yol buldu."
 douglas.123.f: "Eski haritalar yalnızca sınırları değil, bilgeliğin kenarlarını da gösterirdi. Çoğu dağcı o sınırların içinde kalırdı. Ama [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] değil.\n\nDiğerleri belirlenmiş yolları takip ederken, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] daha öteye gitti—kimsenin çizmediği yıkık sırtlara, adı olmayan vadilere, kasabadan çok uzaktaki, turistlerin ya da şöhret arayanların ilgisini çekmeyen uçurumlara.\n\nBu yolculuklardan birinde, unutulmuş bir buzulun yakınında kamp kurdu, eski tektonik hareketleri işaret eden kaya tabakalarını kayda geçirdi ve yerlilerin fısıldadığı ama girmeye cesaret edemediği bir yarığı haritaladı. Bu bir ilk tırmanış değildi. Ama bir ilk anlayıştı."
 douglas.123.g: "Kimsenin beklemediğini bulmaktan daha büyük sevinç yoktur."
 douglas.124.t: "Çelik ve Taş"
 douglas.124.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], General [SCOPE.sCharacter('douglas_general_scope').GetLastName] ile karşılaştığında, deneyim içgörüyle çarpıştı—ve ikisi de değişmiş olarak çıktı."
 douglas.124.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U], topçu ateşleri arasında bağırmaya alışık birinin duruşuna ve hâlâ Alplerin kar tozunu taşıyan bir üniformaya sahipti. General [SCOPE.sCharacter('mountain_general').GetFullName], yüksekliklerde savaşmış, adamlarını don ve sessizlik içinde yönetmişti ve dağı bir engel değil, bir savaş alanı olarak görüyordu.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim]’den öğrenmeye gelmişti. Ama günler içinde, bunun karşılıklı bir alışveriş olduğu belli oldu.\n\n'Biz sefer planları yaparız. Siz hayatta kalma planları yapıyorsunuz,' diye mırıldandı General, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] çivileri ve yükseklik haritalarını incelerken.\n\n'Siz orduları hareket ettirirsiniz,' diye geldi yanıt, 'ben yalnız hareket ederim. Ama dağ ikimizi de aynı şekilde yargılar.'"
 douglas.124.g: "Dağ herkese farklı dillerde ders verir."
