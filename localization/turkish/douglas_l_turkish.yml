 douglas.104.t: "İçindeki Dağ"
 douglas.104.d: "Beş yıllık yorucu tırmanış ve eğitimin ardından, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] geri döndü."
 douglas.104.f: "Dağın sesi yok, yine de öğretir. Beş uzun yıl boyunca, dağcımız kar körlüğü, çöken kaya yüzeyleri, keskin rüzgar ve herhangi bir bıçaktan daha derin kesen bir sessizlikle yüzleşti. Yine de her zorluk, bilgiyi kaslara, sabrı nefese kazıdı. Hırs olarak başlayan şey, artık beceriye dönüştü. Tırmanıcı, taşı dinlemeyi, fırtınaları kokusuna göre tahmin etmeyi, gözleri kapalı ve kalbi sakin düğümler atmayı öğrendi. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] dönüşmüş olarak döndü. Bu, ustalığın başlangıcıdır."
