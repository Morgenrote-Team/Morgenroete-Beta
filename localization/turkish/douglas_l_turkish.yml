 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], dağcımız, şu anda #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!’e ilk kez tırmanmak üzere bir ekibi yönetiyor. Amaç zirveye ilk çıkış. Tırmanışın hızı büyük ölçüde tecrübesine ve karakter özelliklerine bağlıdır. Dağın zorluk derecesine göre daha büyük tehlikeler ortaya çıkabilir. Eğer sefer belirli bir süre içinde hedefine ulaşamazsa, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] zirve tırmanışını iptal edecektir. Eğer sefer herhangi bir sebeple en büyük tehlikeye sürüklenirse, en kötü sonuç gerçekleşir."
