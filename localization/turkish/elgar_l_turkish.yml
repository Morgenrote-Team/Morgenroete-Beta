 elgar.801.t: "Ulusal Marş"
 elgar.801.d: "Halkımızda milliyetçi duygular artıyor. Artık hem entelektüeller hem de halk, ülkeyi ve hükümdarı temsil edecek bir marş istiyor."
 elgar.801.f: "19. yüzyıl ortalarından önce, birçok ülkede resmi törenlerde marşlar çalınıyordu. Bazıları resmileşmişti, bazıları ise 20. yüzyıla kadar resmi değildi. Bazı ülkeler hazır marşlarla başlarken, bazıları kendi marşlarını yaratmak zorundaydı. Besteciler ve yazarlar bu süreçte yardımcı olurdu."
 elgar.801.g: "Bunu sonra hallederiz."
