 elgar.91.t: "Tivoli Cam Salonu"
 elgar.91.d: "Tivoli Bahçeleri, Kopenhag halkı için yıllardır son derece popüler. İzleyiciyi canlandırıcı müzikle eğlendirecek 1.000 kişilik bir konser salonu inşa edilmesi planlanıyor."
 elgar.91.f: "Tivoli Bahçeleri'nin kapılarını ilk kez 1843'te açarken bir konser salonu da atraksiyonlar arasındaydı. Bu, Harald Conrad Stilling tarafından tasarlanan dikdörtgen şeklinde, ahşap bir binaydı. Hans Christian Lumbye, 1843'ten 1872'ye kadar müzik direktörü ve baş orkestra şefiydi. Orkestra için neredeyse 700 beste yazdı, özellikle polkalar, valsler ve galoplar. Konser salonu, Johan Andreas Stillmann tarafından 1863'te genişletildi."
 elgar.91.g: "Umarım Bay Lumbye ünlü galoplarıyla gelir!"
 elgar.92.t: "Gran Teatro Nacional"
 elgar.92.d: "Meksika Şehri'nde büyük bir opera evi inşa etme planıyla, hükümet ülkenin tarihindeki en büyük inşaat projelerinden birine imza atmayı planlıyor."
 elgar.92.f: "Tiyatro, 1840 ile 1844 yılları arasında mimar Lorenzo de la Hidalga tarafından Meksika Şehri'nde inşa edildi. Tarihçiler, bu yapıyı Meksika Şehri'nde Metropolitan Katedrali'nin tamamlanmasından ve Palacio de Bellas Artes'in inşaatından sonra en önemli mimari eser olarak kabul ediyor. Büyük Ulusal Tiyatro, Antonio López de Santa Anna'nın başkanlık dönemlerinden birinde açıldı. Adı sırasıyla Büyük Santa Anna Tiyatrosu, Büyük Vergara Tiyatrosu, Büyük İmparatorluk Tiyatrosu ve son olarak Büyük Ulusal Tiyatro olarak değişti. 1852 opera sezonunda tiyatro 17 opera prömiyeri yaptı ve 60'tan fazla performans sundu."
 elgar.93.t: "Teatro Amazonas"
 elgar.93.d: "Bölgenin kauçuk yetiştiriciliği sayesinde yaşadığı patlama nedeniyle Manaus, ormanın ortasında lüks bir opera salonu alacak!"
 elgar.93.f: "Amazon Tiyatrosu, Belle Époque döneminde, kauçuk patlamasında zenginleşen bir dönemde inşa edildi. Amazonas Tiyatrosu'nun inşası, 1881'de yerel Temsilciler Meclisi üyesi Antonio Jose Fernandes Júnior tarafından önerildi ve 'Amazon ormanının kalbinde bir 'mücevher' olarak tasarlandı. Tiyatronun mimari tarzı tipik olarak Rönesans Canlanışı'dır. Çatı kiremitleri Alsace'den, çelik duvarlar Glasgow, İskoçya'dan ve mermer merdivenler, heykeller ve sütunlar İtalya'dan ithal edilmiştir. Kubbe, Brezilya'nın ulusal bayrağının renkleriyle boyanmış 36.000 dekoratif seramik kiremitle kaplanmıştır. İç dekorasyon Fransa'dan Louis Quinze tarzında getirilmiştir. İtalyan sanatçı Domenico de Angelis Genç, salonun tavanlarını ve izleyici odalarını süsleyen panoları boyamıştır."
 elgar.101.t: "Beethoven için Bir Anıt"
 elgar.101.d: "Besteci Robert Schumann'ın çağrısı üzerine, birçok entelektüel, vatandaş, vatansever ve sanatla ilgilenen kişi Ludwig van Beethoven için Bonn'da bir anıt dikilmesi lehinde sesini yükseltti."
 elgar.101.f: "'Gelecekteki hatıra anıtım şu anda önümde kişisel olarak var - oldukça yüksek bir dikdörtgen prizma, üzerinde doğum ve ölüm yılı yazan bir lir, gökyüzü ve yanlarında birkaç ağaç. Beethoven, her sayfasında büyüklüğü ve gururu öğreten bir millete, onun için bin kat daha büyük bir anıt dikmeleri gerekmiyor mu? Eğer ben bir prens olsaydım, ona Palladyan tarzında bir tapınak inşa ederdim! Onu dev bir biçimde şekillendirirdim, tıpkı Saint Borromeo'yu Lago Maggiore'de yaptığı gibi, böylece o, hayatında olduğu gibi, dağları ve dağları izleyebilirdi - ve Ren nehri gemileri geçerken ve yabancılar sorsa: Bu dev ne anlama geliyor, her çocuk cevap verebilir: Beethoven'dır bu - ve düşünülecek ki, bir Alman İmparatoru'dur. Kısacası: Kalkın, mürekkebinizi bırakın ve anıtın aslında sizin kendi anıtınız olduğunu düşünün!' - Robert Schumann"
 elgar.101.g: "Beethoven müziğin Alman deviydi!"
 elgar.101.h: "Bu kültürel olarak değerli projeyi finanse etmekten mutluluk duyuyoruz."
 elgar.101.i: "Önceden bir anıtı yoksa o kadar büyük olamazdı."
 elgar.102.t: "Beethoven Festivali Hazırlığı"
 elgar.102.d: "Beethoven anıtının son dokunuşları yapıldı. Şimdi açılış için hazırlıklara başlama zamanı."
 elgar.102.f: "Beethoven anıtının açılışı için düzenlenen Beethoven Festivali, uluslararası çapta büyük bir müzik etkinliğiydi. Prusya Kralı'nın yanı sıra, İngiliz Kraliçesi Victoria da davet edilmişti, entelektüel büyükler arasında Alexander von Humboldt da bulunuyordu ve Hector Berlioz, Giacomo Meyerbeer ve özellikle Franz Liszt gibi besteciler dört günü şekillendirdi. Binlerce kişinin katılması beklenen bu festival, Bonn'daki küçük kasaba için ciddi sorunlar yaratmıştı."
 elgar.102.g: "Davetiyeleri gönder!"
 elgar.103.t: "Beethoven Festivali için Davetiye"
 elgar.103.d: "Hükümetimiz, Beethoven anıtının açılışının yapılacağı Bonn'daki Beethoven Festivali'ne resmi bir davetiye aldı."
 elgar.103.g: "Sevinçle katılacağız."
 elgar.103.h: "Klasik müzik abartılmış."
 elgar.104.t: "Beethoven Salonu İnşa Et"
 elgar.104.d: "Yüksek ziyaretçi sayısı nedeniyle, Franz Liszt, Köln Katedrali inşaat alanından adam ve malzeme yönlendirilerek Bonn'da bir festival salonunun rekord süre içinde inşa edilmesini önerdi."
 elgar.104.f: "Beethoven Anıtı'nın resmi açılışı, 3 günlük Beethoven Festivali'nin zirve noktası olacaktı. Festivalin başlamasından bir ay önce, 3.000 katılımcıyı ağırlayabilecek uygun bir mekan yoktu. Liszt'in baskıları sonucu ve yalnızca tüm masrafları kendi üzerine almayı teklif ettikten sonra, komite bir mimar ve inşaatçılarla anlaşıp Beethoven Salonu'nu inşa etmeye karar verdi. Sonunda başladıklarında, inşaatçılara sadece iki hafta vardı ve gece gündüz çalışarak zamanında bitirmeleri gerekiyordu. Franz Liszt ayrıca Köln Katedrali'nin inşaatçılarıyla da konuştu. Odunlar Ren Nehri üzerinden Köln'den Bonn'a yüklendi. Köln'de yapılan dekorasyonlar da Bonn'a hızla ulaştı. Sadece on bir günde, hiçbir şeyden bir festival salonu yaratıldı."
 elgar.104.g: "Mükemmel."
 elgar.105.t: "Beethoven Festivali"
 elgar.105.d: "Dört gün süren üst düzey müzikten sonra, Beethoven Festivali tam anlamıyla bir başarı sayılabilir, her ne kadar bu büyüklükteki etkinlikler skandallardan kaçamayacaksa da."
 elgar.105.f: "Tören, bazı garip anlar yaşanmış olsa da, tatsız anlardan kaçınılamadı. Beethoven anıtı, Fürstenberg Sarayı'nın balkonunda yerlerini almış olan Prusya Kralı IV. Frederick William ve İngiliz Kraliçesi Victoria'ya sırtını dönmüştü. Alexander von Humboldt, Beethoven'ın her zaman kaba bir insan olduğunu söyleyerek durumu kurtardı. Daha da utandırıcı olanı ise, festivaldeki şampanya kadehlerinin yükseldiği 'Goldene Stern' adlı festival banketinde, Liszt'in Berlioz'un önderliğindeki Fransız grubunu küçümsemesi ve neredeyse isyan çıkarmasıydı. Banket, Lola Montez'in davet sırasında masada dans edip Liszt'i utandırarak kutlamalarda misafiri olduğunu iddia edip kendi statüsüne uygun bir koltuk talep etmesiyle kesildi ve bu da önceden düzenlenmiş oturma düzenini bozdu."
 elgar.105.g: "Beethoven bize sırtını mı dönüyor?"
 elgar.105.h: "Alexander von Humboldt bir centilmendir."
 elgar.105.i: "Bu Almanlar zerafetten yoksun."
 elgar.105.j: "Bu ilham vericiydi."
 elgar.106.t: "Liszt Kantatası"
 elgar.106.d: "Franz Liszt, Beethoven anıtının açılışı için kantatasını yazma ve halka sunma büyük onuruna sahipti."
 elgar.106.f: "'Bununla birlikte, kantatası gerçekten iyi icra edilmiş ve salonun üçte üçü tarafından sıcak bir şekilde alkışlanmış, büyük ve güzel bir şeydir, bu hemen Liszt'i besteciler arasında çok yukarıya taşır. İçindeki ifade gerçektir, tonlama doğrudur, stil yüce ve yenidir, biçim iyi düşünülmüş ve sadık bir şekilde yerine getirilmiştir, orkestrasındaki enstrümantasyonun gücü ve çeşitliliği dikkat çekicidir. Onun orkestrasında asla aynı seslerin peşinden gitmeyen bir ardışıklık yoktur, bu da bazı eserleri, bir zamanlar değerli olanları dinleyicinin gözünde sıkıcı hale getirir; küçük ve büyük araçları nasıl kullanacağını bilir, enstrümanlara ve seslere fazla yüklenmez; kısacası, bir darbeyle enstrümantasyon ve diğer müzik sanatlarının her alanında stil sahibi olduğunu gösterdi, çünkü bir zamanlar onun bunu bulamamış olduğundan korkuluyordu.' - Hector Berlioz"
 elgar.106.g: "Yaşasın! Yaşasın! Beethoven, yaşasın!"
 elgar.107.t: "Berlioz Beethoven Festivali'nde"
 elgar.107.d: "Beethoven Anıtı'nın açılışı etrafındaki kutlamalar, besteci Hector Berlioz'a önemli ölçüde ilham verdi."
 elgar.107.f: "'Bu seyahatte, Avusturya, Macaristan, Bohemya ve Silezya'da, uzun zamandır düşündüğüm Faust efsanesini bestelemeye başladım. Hemen başlama kararı aldım, ancak çoğu librettoyu kendim yazmak zorunda kaldım; Gérard de Nerval'in Goethe'nin Faust'unun Fransızca çevirisinin parçaları, yirmi yıl önce müziğe dökmüştüm ve bunları yeni partitureda gözden geçirilmiş şekilde dahil etmeyi planladım, Paris'ten ayrılmadan önce M. Gandonnière tarafından verdiğim talimatlarla yazılmış iki ya da üç başka sahne ise eserin altıda biri kadar bile etmedi. Eski Alman posta arabasında seyahat ederken, müzik için yazılacak dizeleri yazmaya çalıştım. Faust’un doğaya çağrısını başlattım, Goethe’nin başyapıtını çevirmeye ya da taklit etmeye çalışmadan sadece ondan ilham almak ve içinde barındırdığı müzikal özü çıkarmak istedim. Başladıktan sonra geri kalan dizeleri müziksel fikirler bana geldikçe yazdım ve partitureyi diğer eserlerimde nadiren yaşadığım bir kolaylıkla besteledim.' - Hector Berlioz"
 elgar.107.g: "Peki seyahat buna değer miydi?"
 elgar.108.t: "Victoria Köln Katedrali'ni Ziyaret Ediyor"
 elgar.108.d: "İngiltere Kraliçesi Victoria, Ren bölgesindeki konaklamasında Köln Katedrali'ni ziyaret etmek ve yeni inşa edilmeye başlanan katedral inşası hakkında daha fazla bilgi edinmek için fırsat buldu."
 elgar.108.f: "Kraliyet ailesinin konserden erken ayrılmasının nedeni, öğleden sonra Köln Katedrali'ni gezmeye gitmeleriydi, bu gezi, çanların çalması eşliğinde yapıldı. Majesteleri ardından ana kapıdan merkezi nave'ye geçerek koro kısmına gittiler, burada Köln erkek korosunun müzik direktörü Weber'in org eşliğinde bir kutlama kantatası seslendiriliyordu."
 elgar.108.g: "Onurluyuz."
 elgar.111.t: "Mozart İçin Bir Anıt"
 elgar.111.d: "Wolfgang Amadeus Mozart'a bir anıt dikme hazırlıkları tüm hızıyla devam ediyor. Ancak bağışlar hala toplanıyor."
 elgar.111.f: "1835 yılında, şu anda Polonya'dan olan yazar Julius Schilling, o dönemde Salzburg'da nispeten tanınmayan Mozart için şimdiki Mozartplatz'ta bir anıt önerdi. Yurtdışındaki önemli sponsorlar ve Viyana'da da bu anıtın inşasını desteklediler. Bavyera Kralı Ludwig I, önemli bir miktar bağışta bulunarak bronz heykelin kaidesini bağışladı."
 elgar.111.g: "Mozart müziğin Alman deviydi!"
 elgar.113.t: "Mozart Anıtı"
 elgar.113.d: "Bugün Salzburg'un en büyük oğlunun anıtı, doğduğu şehirde açıldı."
 elgar.113.f: "Ludwig Schwanthaler tarafından tasarlanan ve Johann Baptist Stiglmaier tarafından dökülen anıt, 5 Eylül 1842'de Mozart'ın hayatta kalan iki oğlunun, Franz Xaver ve Carl Thomas'ın huzurunda resmi olarak açıldı. Ancak Mozart'ın eşi açılışı göremedi. O kısa süre önce Mozartplatz 8'deki evinde ölmüştü. Bir festival, meşale alayları, tekne turları, Alplerin demir yolları, hedef atışları ve at yarışlarıyla kutlamalar tamamlandı."
 elgar.114.t: "Yaşayan Bir Anıt"
 elgar.114.d: "Mozart için bir anıt dikme çabaları Avusturya'da artıyor. Bu nedenle bazı Frankfurt vatandaşları bir yarar konseri düzenlemeyi planlıyor ve bu fikri politik içerikle birleştiriyorlar."
 elgar.114.f: "Başlangıçta, Frankfurt vatandaşları bir Mozart anıtı için yeterli bağış toplamak amacıyla bir konser düzenlemeyi planlıyordu. Burjuva kişiliklerine yönelik anıtlar Almanya'da yenilikti. Sanatçılar veya bilim insanları gibi ulusal figürler için anıt dikmek, dolayısıyla vatansever duyguları ifade etmek için hoş bir fırsat olarak kabul ediliyordu. Frankfurt'ta bazıları, genç bestecileri desteklemek amacıyla bir vakıf kurmak için ulusal bir şarkıcılar toplantısı düzenlemeyi öneriyor."
 elgar.114.g: "Kendi yaşayan anıtımız için para toplayalım - Mozart onuruna bir festival!"
 elgar.114.h: "Salzburg'taki anıta para bağışlayın."
 elgar.115.t: "Sängerfest Davetiyesi"
 elgar.115.d: "Frankfurt vatandaşlığı, ulusumuzdan vatansever şarkıcıları Mozart festivali için davet etti."
 elgar.115.g: "Müzikal ve ulusal bir fırsat."
 elgar.115.h: "Sanat şarkılarına dayanamıyorum."
 elgar.116.t: "Mozart Festivali"
 elgar.116.d: "Ren bölgesi, Baden, Hessen ve Franconia'dan 42 koro topluluğu Frankfurt'ta bir araya gelerek üç gün süren bir Mozart müziği festivali kutladı. Ancak etkinlik, Almanya'nın siyasi birliği için bir gösteriye dönüştü. Toplanan para, genç bestecileri desteklemek için bir vakıf kurmaya yönlendirildi."
 elgar.116.f: "'Şehir hayran kaldı. Evler, tavan aralarına kadar insanlarla doldu. Mainz, Hanau ve Offenbach halkı, top sesleri eşliğinde teknelerle geldi, müzikle süslenmiş teknelerle çevrildiler; tüm kapılardan içeri girdiler. Güçlü bir şekilde etkileyici bir manzaraydı, sanatsal ilgi ikincil hale geldi, ancak ulusal ruh bizimle güçlü bir şekilde yaklaşırken, gözlerimden parlak yaşlar aktı.' - Heinrich Hoffmann"
 elgar.116.g: "Müzik, milleti bir araya getirir."
 elgar.117.t: "Liberal Sorun Çıkartanlar Frankfurt'ta Gürültü Yapıyor"
 elgar.117.d: "Bazı Jakobin zihniyetli 'vatanseverlerin', Frankfurt'taki sözde Mozart Festivali'ni kendi politik agitasyonları için kullandığını fark etmemiz uzun sürmedi."
 elgar.117.f: "Ren bölgesi, Baden, Hessen ve Franconia'dan 42 koro topluluğu Frankfurt'ta bir araya gelerek üç gün süren bir Mozart müziği festivali kutladı. Ancak etkinlik, Almanya'nın siyasi birliği için bir gösteriye dönüştü. Etkinlik, başlangıçta Mozart anıtını finanse etmek amacıyla düzenlenmişti, ancak başlatıcılar kısa süre sonra hayır kurumunun amacını kendi vakıflarına yönlendirdi."
 elgar.117.g: "Alman Konfederasyonu'nda düzen karşıtı bir komplo!"
 elgar.117.h: "Bırakın şarkı söylesinler."
 elgar.121.t: "Genel Alman Müzik Derneği'nin Kuruluşu"
 elgar.121.d: "Bugün [SCOPE.sState('elgar_musikverein_capital').GetCityHubName]’de Allgemeiner Deutscher Musikverein (Genel Alman Müzik Derneği) kuruldu. Hemen ardından, biz Yeni Alman Okulu'na mı aileyiz yoksa müziğin muhafazakar fikrini mi savunuyoruz tartışması başladı."
 elgar.121.f: "Yeni Alman Okulu, 1859'da Franz Brendel tarafından, Neue Zeitung für Musik'in editörü olarak Almanya'daki müzikteki belirli eğilimleri tanımlamak için kullanılan bir terimdi. Farklı zamanlarda farklı anlamlar yüklenmiş olsa da genellikle Franz Liszt ve Richard Wagner, 'Yeni Alman Okulu'nun en önemli temsilcileri olarak kabul edilmiştir. Ayrıca, Johannes Brahms'ın bu okula katılmadığı konusunda bir görüş birliği vardır. Bunun dışında, yorumlar farklılık gösterir. Yeni terim, Beethoven'ın ölümünden sonraki tüm dönemi ifade etmek için kullanılmalıdır. Brendel'e göre, J.S. Bach ve Handel dönemine 'Eski Alman Okulu' denirdi. Sonraki dönem, İtalyan tarzından etkilenmiş olan Mozart gibi Viyana'lı ustaların dönemiydi. Beethoven, ilgiyi tekrar Alman Kuzeyine yönlendirmiş ve 'Neudeutsche Schule'yi açmıştı. Her iki tarafın bestecileri de Beethoven'ı manevi ve sanatsal kahramanları olarak görüyordu; muhafazakarlar onu ulaşılması imkansız bir zirve olarak, ilericiler ise müzikte yeni bir başlangıç olarak görüyordu."
 elgar.121.g: "Biz Yeni Alman Okulu'nun bir parçasıyız."
 elgar.121.h: "Biz Geleneksel Alman Okulu'nu savunuyoruz."
 elgar.122.t: "Genel Alman Müzik Derneği'ne Üyelik"
 elgar.122.d: "Ülkemizden sanatçılar, yeni kurulan Genel Alman Müzik Derneği'ne davet edildiler. Hemen ardından, biz Yeni Alman Okulu'na mı aileyiz yoksa müziğin muhafazakar fikrini mi savunuyoruz tartışması başladı."
 elgar.123.t: "Bir sonraki Müzisyenler Kongresi'nin Yeri"
 elgar.123.d: "Genel Alman Müzik Derneği üyeleri, bir sonraki Tonkünstler-Versammlung (Müzisyenler Kongresi) için yer olarak [SCOPE.sState('elgar_musikverein_capital').GetCityHubName]’yi seçtiler."
 elgar.123.f: "1859'da ilk Tonkünstler toplantısı, Yeni Müzik Dergisi'nin 25. yıldönümünü kutlamak amacıyla Leipzig'de yapıldı. İkinci Tonkünstler toplantısında (1861) Weimar'da, Genel Alman Müzik Derneği (ADMV) tüzükleri 700'den fazla kurucu üye tarafından kabul edildi. Yeni Müzik Dergisi derneğin organı haline geldi. 19. yüzyılın sonunda ADMV, Weimar'ın Büyük Dükalığı'nın koruması altındaydı. ADMV, birçok büyük Tonkünstler toplantısı düzenledi. Çoğunlukla, Franz Liszt ve Richard Wagner tarafından temsil edilen Yeni Alman Okulu'nun yönüne odaklanmışlardı. ADMV'nin sanatsal hedefleri kapsamında, farklı yerlerde her yıl Tonkünstler toplantıları düzenlenmeli ve çok nadiren çalınan, özellikle yeni müzik eserleri sergilenmeliydi. Ayrıca, nadiren veya hiç çalınmayan eski eserler, önemleri nedeniyle sunulmalıydı. Ayrıca, yeni müzik eserleri, ister müzikal ister bilimsel olsun, basılmalıydı."
 elgar.123.g: "Onurluyuz!"
 elgar.124.t: "[SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]'de Müzisyenler Kongresi"
 elgar.124.d: "Bu yılki Tonkünstler-Versammlung (Müzisyenler Kongresi) [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]’de yapılacak. Sanatçılarımız, müzik üzerine tartışmak ve yeni ve unutulmuş müzik eserlerinin performansını dinlemek için davet edildiler."
 elgar.124.g: "Müziğin tadını çıkaralım ve benzer görüşlere sahip kişilerin katkılarını dinleyelim."
 elgar.124.h: "Bu müziksel amatörlere karşı konuşmak için doğru yer."
 elgar.124.i: "Bu, gerçeğin günü olacak - bizim müzik anlayışımız tek doğru olandır!"
 elgar.125.t: "Romantiklerin Savaşı"
 elgar.125.d: "Yeni Alman Okulu'nun temsilcileri ile daha muhafazakar temsilciler arasında bir anlaşmazlık, halk arasında büyük bir skandala yol açtı. Şu anda iki grup arasında basında tam anlamıyla bir savaş sürüyor. [ROOT.GetCountry.GetName]’in sanatçılarının arkasında durma zamanı geldi."
 elgar.125.f: "'Romantiklerin Savaşı', bazı müzik tarihçileri tarafından 19. yüzyılın ikinci yarısında önde gelen müzisyenler arasındaki bölünmeyi tanımlamak için kullanılan bir terimdir. Müzikal yapı, kromatik armoninin sınırları ve programlı müzik ile mutlak müzik arasındaki ana tartışma konularıdır. Karşıt taraflar 1850'lerde kristalleşmiştir. Muhafazakar çevrenin en önde gelen üyeleri Johannes Brahms, Joseph Joachim, Clara Schumann ve Felix Mendelssohn tarafından kurulan Leipzig Konservatuvarı'ydı. Rakipleri, Weimar'dan gelen radikal ilericiler, Franz Liszt ve Yeni Alman Okulu (Almanca: Neudeutsche Schule) üyeleri ile Richard Wagner tarafından temsil edilmiştir. Tartışma, Almanya ve Orta Avrupa kökenliydi; Fransa, İtalya ve Rusya'dan müzisyenler yalnızca marjinal olarak dahil olmuştur. Her iki taraftan besteciler de Beethoven'ı manevi ve sanatsal kahramanları olarak görüyordu; muhafazakarlar onu ulaşılması imkansız bir zirve olarak, ilericiler ise müzikte yeni bir başlangıç olarak görüyordu."
 elgar.125.g: "Yeni Alman Okulu'nu destekleyin!"
 elgar.125.h: "Geleneksel Alman Okulu'nu destekleyin!"
 elgar.126.t_konservativ: "'Romantiklerin Savaşı'nda Muhafazakarlar Kazandı"
 elgar.126.d_konservativ: "Geleneksel Okul'un takipçilerinin büyük çoğunluğu, müziğin geleceği üzerindeki anlaşmazlığı kazandı. İçeriğin doğru olup olmadığı ikinci planda kalıyor: tartışmalara ve polemiklere yapılan katkıların yoğunluğu, kamu imajını belirler."
 elgar.126.f_konservativ: "Bu iki müzik grubunun ana anlaşmazlık noktası, geleneksel ve yeni müzik formları arasındaydı. Bu, Ludwig van Beethoven'ın ellerinde eğlence amaçlı bir türden, toplumsal, ahlaki ve kültürel idealleri içeren bir forma dönüşen senfoni türünün sürdürülebilirliği tartışmasının bir uzantısıydı. Liszt ve çevresi, müzik ile anlatı ve görsel fikirleri birleştiren yeni yazım stillerini ve formları tercih ediyordu. Bu amaca yönelik olarak Liszt, senfonik şiirleri geliştirdi. Leipzig/Berlin okulu, klasik ustalar tarafından kullanılan formları savunuyordu, bu formlar 19. yüzyılın başlarında müzikologlar, örneğin Adolf Bernhard Marx tarafından kodlanmıştı. Programlı müziğin geçerliliği de bir anlaşmazlık noktasıydı. 1854 tarihli kitabında, Vom Musikalisch-Schönen, Hanslick müziğin kendisinden başka hiçbir şeyi temsil edemeyeceğini ve temsil edemeyeceğini belirtti. \n\n Sonuçta, #G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#! üyeler, Yeni Alman Okulu'nu destekledi ve #R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#! üyeler, Geleneksel Okul'u destekledi."
 elgar.126.g: "Geleneksel Okul zafer kazandı."
 elgar.126.t_neudeutsch: "'Romantiklerin Savaşı'nda ilericiler kazandı"
 elgar.126.d_neudeutsch: "Yeni Alman Okulu'nun takipçilerinin büyük çoğunluğu, müziğin geleceği üzerindeki anlaşmazlığı kazandı. İçeriğin doğru olup olmadığı ikinci planda kalıyor: tartışmalara ve polemiklere yapılan katkıların yoğunluğu, kamu imajını belirler."
 elgar.126.f_neudeutsch: ""
 elgar.126.h: "Yeni Alman Okulu zafer kazandı."
 elgar.131.t: "Franz Liszt Avrupa turuna başlıyor"
 elgar.131.d: "Paris'te pek mutlu olmayan bir dönemin ardından, Franz Liszt rakibi Thalberg'in örneğini takip etmeye karar verdi ve uluslararası üne sahip bir müzisyen olmayı hedefledi. İlk durağı [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag] olacak."
 elgar.131.f: "Franz Liszt, Avusturya-Macaristanlı bir besteci, piyanist, orkestra şefi, tiyatro yönetmeni ve müzik öğretmeniydi. Liszt, 19. yüzyılın en önde gelen ve etkili piyano virtüözlerinden biri olarak kabul edilirdi ve 1300'den fazla eser ve düzenleme ile en üretken bestecilerden biriydi. Eserlerinin büyük kısmı piyano literatürüne ait olsa da, Liszt senfonik şiirlerin gelişimiyle orkestral müziğe de büyük bir ivme kazandırdı. Programlı müzik anlayışı ve yeni harmonik ile formel yöntemlerin kullanımı, onu - Richard Wagner ile birlikte - Yeni Alman Okulu'nun en tanınan savunucusu yaptı. Liszt, 1839'da Avrupa'da geniş bir tura çıkmaya başladı ve bu turu sonraki sekiz yıl boyunca sürdürdü. Bu dönem, Liszt'in konser piyanisti olarak en parlak dönemiydi ve turlarında birçok onur ve büyük takdir topladı. Bu dönemde, Liszt'e olan fanatik hayranlık, Lisztomanya olarak adlandırılan yoğun tepkilerle anılmaya başlandı. Lisztomanya, Liszt ve konserlerine olan histerik bir tepkiyle karakterize ediliyordu. Liszt'in çaldığı müziklerin, izleyiciyi mistik bir coşku seviyesine yükselttiği bildiriliyordu."
 elgar.131.g: "Kendisine en iyisini diliyoruz."
 elgar.132.t: "Lisztomania [ROOT.GetCountry.GetNameNoFlag]'de"
 elgar.132.d: "Dünyaca ünlü piyanist Franz Liszt, Avrupa turunun bir sonraki durağı olarak ülkemizi seçti. Tiyatrolar ve opera salonları şimdiden tamamen dolmuş durumda!"
 elgar.132.g: "Bu bağıran kadınlar nereden geldi?"
 elgar.133.t: "Liszt yola çıkıyor"
 elgar.133.d: "Liszt, kaldığı yerden ayrıldı ve misafirperverlik için teşekkür etti. Lisztomanya, [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]'de devam edecek."
 elgar.133.f: "Tahminlere göre, Liszt 1839 ile 1847 yılları arasında halka binlerce kez sahneye çıktı. Dahası, konser sahnesinden resmi olarak emekli olmasından uzun yıllar sonra bile, piyanist olarak kazandığı büyük ün, bu dönemdeki başarılarına dayanıyordu. Ününe katkıda bulunan bir diğer unsur ise Liszt'in eserlerinden elde ettiği gelirin büyük bir kısmını hayır işlerine ve insani yardım amaçlarına bağışlamasıydı. Kolonya Katedrali'nin inşaat fonuna ve Pest'teki Aziz Stephen Bazilikası'na büyük bağışlar yapmış, ayrıca hastaneler ve okullar gibi kamu hizmetlerine ve Leipzig Müzisyenler Emeklilik Fonuna özel bağışlar yapmıştır. 1842'deki Büyük Hamburg Yangını'ndan sonra, evsiz kalanlara yardım için konserler vermiştir. Hayranlarının saçından bir tutam alma isteğini karşılamak için, Liszt görünmeyen şekilde bir köpek edinmiş ve köpeğinin tüyleri, saçı için bir kaynak olmuştur."
 elgar.301.t: "İyi provalar"
 elgar.301.d: "Bir gezgin bestecinin yönettiği orkestra provaları çok umut vericiydi."
 elgar.301.f: "Bir gezgin besteci, orkestra üzerinde liderlik kazanmış ve provalarda şimdiden etkileyici bir izlenim bırakmış!"
 elgar.301.g: "İyi."
 elgar.302.t: "Ortalama provalar"
 elgar.302.d: "Maalesef, bir gezgin besteci tarafından yönetilen orkestra provaları, konser salonunun umduğu kadar iyi geçmedi..."
 elgar.302.f: "İster uyumsuz meslektaşlar, ister kötü hazırlanmış sanatçılar ya da konser salonundaki koşullar olsun - provalar, performans için iyi işaretler vermiyor."
 elgar.302.g: "İyi değil."
 elgar.303.t: "Aşk dolu bir adanış"
 elgar.303.d: "Bir 'küçük' nezaket için yaşanan bir ilişki, ortalığı karıştırıyor."
 elgar.303.f: "Sanatçılar, her zaman biraz 'gevşek yaşam tarzları' ile tanınmış ve bir ya da iki kişisel skandala yol açmışlardır. Dikkat, küçük bir jest üzerine yoğunlaşmıştır, ancak bunun patlayıcı bir gücü vardır. Bir gezgin besteci, evli bir kadına bir sonat adadı ve ona orijinal partitürü bir hediye olarak verdi. Ancak kadın, ordumuzda saygı duyulan bir generalin karısıdır. Bu hediye, spekülasyonlara yol açmış ve adamın kamu imajını zedeleyebilir. Askeri yetkililer harekete geçilmesini talep ediyor."
 elgar.303.g: "Sorun ne ki?"
 elgar.303.h: "İğrenç!"
 elgar.304.t: "Bir akşam resepsiyonu"
 elgar.304.d: "Monarşimiz, bir gezgin besteciyi prenslik resepsiyonuna davet etti. Besteci, minnettarlığını bir beste ile gösterdi."
 elgar.304.f: "19. yüzyılda müzik kültürü, giderek patronajdan kurtulmaya çalışmış olsa da, soylular ve krallar hâlâ sanatın desteklenmesinde ön planda yer almaktadır ve birçok müzik eseri hâlâ prense ve krallara ithaf edilmiştir. Öte yandan, kişisel ilişki, genellikle akademilerden ve sanat çevrelerinden dışlanmış bestecilerin, kişisel zevklerine uygunlarsa zengin bir himayeci bulmalarını sağlıyordu. Örneğin, Wagner'in birçok başyapıtı, Kral Ludwig II'nin kişisel desteği olmadan mümkün olamayacaktı."
 elgar.304.g: "Ne güzel bir sürpriz!"
 elgar.305.t: "Tükendi!"
 elgar.305.d: "Büyük bir bestecinin sold-out (biletlerin tükenmesi) bir performansı, halk arasında büyük bir kargaşaya yol açtı!"
 elgar.305.f: "Bir prömiyer günü, opera binası önünde büyük bir kalabalık beklerken, biletler birkaç gündür tükenmişti; hatta sahneye çıkan besteci bile sadece kara pazardan bir bilet alabilmişti. Ancak bir tiyatro çalışanı ek biletler satmış, bu biletler koltuk sayısından çok daha fazlaydı. Tiyatroda ve dışında gürültülü sahneler yaşandı; içeridekiler sessizlik için bağırırken, dışarıdakiler içeri alınmalarını istiyordu. Açılış koroları hala seslendirilebildi, ancak orkestranın pes etmesiyle gürültü iyice arttı."
 elgar.305.g: "Bunun sorumlusu kim?!"
 elgar.306.t: "Şaşırtıcı prömiyer"
 elgar.306.d: "Ev sahibi ülkelerinde başarısız olan bir bestecinin eseri, izleyicilerimizin kalbini kazandı."
 elgar.306.f: "Ünlü eserlerin prömiyerinin bazen başarısız olduğu örnekler olmuştur. Bu tür deneyimler genellikle sadece ciddi öz-sorgulamalara ve bir kariyerin sona ermesine yol açmakla kalmamış, aynı zamanda aynı eseri farklı bir izleyici kitlesi için tekrar çalma girişimlerine de yol açmıştır. Daha sonra klasikleşmiş eserler genellikle ikinci ya da üçüncü denemede kabul görmüştür. Prömiyerin yeri değil, başarının yeri daha sonra gerçek başlangıç kıvılcımı olarak hatırlanmıştır. Hector Berlioz, eserleri İngiltere ve Almanya'da, memleketi Fransa'dan daha fazla başarı elde eden bir besteci örneğidir."
 elgar.306.g: "Bizim izleyicimiz daha minnettar."
 elgar.307.t: "Müzikal dostluk"
 elgar.307.d: "Bir gezgin besteci, yerel müzisyenlerle hemen anlaşabildi."
 elgar.307.f: "Yabancı ve yerel müzisyenler arasındaki ilişki her zaman kolay olmamıştır. Sadece ulusal düşmanlıklar ve kişisel önyargılar değil, bazen orkestralar, misafir bir şefin yönetim tarzı ile uyum sağlayamamış, bazen de performansların kısa süreli doğası, misafirin yerel müzik dünyasını suçlamasına yol açmıştır. Pek çok yerel besteci ya da şef, yabancıların etkisinin fazla olmasından korkuyordu. Ancak tüm bu engellere rağmen, dostluklar büyümeye devam etti."
 elgar.307.g: "Verimli bir dostluk."
 elgar.308.t: "Müzikal rekabet"
 elgar.308.d: "Yerel müzik dünyası, bir gezgin bestecinin ortaya çıkışını hoşnutsuzluk ve kuşkuyla karşılıyor."
 elgar.308.f: "'Opera için iki büyük eser, Rönesans için iki tane daha, Opera-Comique için iki tane daha, ve bir tane daha Théâtre Italien için mi? Görünüşe göre Monsieur Donizetti, bizi fethedilmiş bir ülke gibi muamele ediyor, gerçek bir işgal. Artık Paris'teki opera binalarından değil, sadece Monsieur Donizetti'nin opera binalarından bahsedilebilir.' - Hector Berlioz"
 elgar.308.g: "Bu müzisyenler biraz toparlanmalı!"
 elgar.309.t: "İlham"
 elgar.309.d: "Bir yabancı besteci, devlet orkestrası üyelerine ilham verdi."
 elgar.309.f: "Dışsal etkiler, yerel ve ulusal müzik dünyasında genellikle fark yaratmıştır. Bilinmeyen eserler, yabancı bir müzik dili ya da karizmatik bir müzisyenin varlığı, yerel müzisyenlerin tamamen yeni bir bakış açısı kazanmalarına yol açabiliyordu."
 elgar.309.g: "İlham mı? Sonuç görmek istiyorum!"
 elgar.309.h: "Bu orkestra üzerinde olumlu bir etkisi olacak."
 elgar.310.t: "Mania"
 elgar.310.d: "Bir bestecinin ortaya çıkışı, eserine karşı görülmemiş, neredeyse histerik bir halk heyecanı yarattı. İnsanların başka hiçbir şeyi kafalarında yok!"
 elgar.310.f: "'Almanya'da, özellikle Berlin'de, Liszt orada gösterdiği zaman meydana gelen bayılma vakalarını duyduğumda, omuzlarımı pityen bir şekilde silkmiş ve şöyle düşünmüştüm: sessiz sabahçı Almanya, kendisine izin verilen küçük egzersiz fırsatını kaybetmek istemiyor... Onlar için bu bir gösteri gösterisi meselesiydi... Bu şekilde Lisztomanya'yı açıkladım ve bunu Ren Nehri'nin ötesindeki siyasi özgürlükten yoksun durumların bir işareti olarak gördüm. Ancak yanlış anlamışım, nihayetinde geçtiğimiz hafta, İtalyan Opera Binası'nda, Liszt ilk konserini verdiğinde fark ettim... Bu gerçekten Alman duygusal ve duygusal Berlin izleyicisi değil, yalnızca kendi dehasıyla yalnızca Liszt'in çaldığı bir izleyici kitlesiydi. Ve yine, sadece varlığı ne kadar sarsıcıydı! Ne kadar coşkulu bir alkış vardı! Hangi övgüydü bu! Gerçekten delilik, bu tür bir fırtınanın tarihlerinde duyulmamış bir şey!' - Heinrich Heine"
 elgar.310.g: "Yani, tamamen dağılmışlar mı?"
 elgar.311.t: "Müzik insanları bir araya getirir"
 elgar.311.d: "Bir elçi, bizde kalan bir bestecinin konserine bilet alıp alamayacağımızı soruyor."
 elgar.311.f: "Büyük bir gücün elçisi, şu anda ülkemizde bulunan bir gezgin bestecinin hayranıdır. Bir performansa katılmak istiyor, ancak yer kalmamıştır. Bu yüzden bize, onun performansa katılabilmesi için siyasi etkimizin kullanılmasını talep etmiştir."
 elgar.311.g: "Haha. Hayır."
 elgar.311.h: "Ona onur verelim."
 elgar.312.t: "Operada suikast girişimi!"
 elgar.312.d: "Ülkemizin önde gelen bir siyasetçisine yönelik korkunç bir suikast girişimi, bugünkü opera performansını gölgelemiştir!"
 elgar.312.f: "Bir süredir, hükümetimizin meşruiyetsizliği halk arasında hoşnutsuzluğa yol açıyordu. Sinsi bir suikastçı, popüler bir bestecinin konserinden faydalanarak, yüksek rütbeli bir hükümet yetkilisini performans sırasında vurdu. [SCOPE.sCharacter('elgar_leader_victim').GetFullName] ciddi şekilde yaralandı. Fail hâlâ kaçak, hayatı tehlikede olan kurban hemen en yakın hastaneye götürüldü."
 elgar.312.g: "Güvenlik güçleri nerede?!"
 elgar.313.t: "Küçük bir eser"
 elgar.313.d: "Ülkemizdeki büyük bir besteci tarafından bestelenen küçük bir eser, belki büyük bir hit olmasa da, hayranlarını bulmuş."
 elgar.313.f: "Bestecilerin ünlü eserlerinin dışında, zaman zaman yaptıkları küçük eserler aynı zamanda ortalama kalitede olmak zorunda değildi. Defalarca küçük parçalar, bir ömrün eserinden daha fazla dikkat çekmeyi başarmıştır. Çalışma zenginliğine rağmen, Nikolai Rimsky-Korsakov, pop kültürde 'Arı Vızıltısı' (Tsar Saltan'dan) ve Edvard Grieg 'Dağ Kralı'nın Salonu' (Peer Gynt'ten) ile tanınmaktadır – yanlış bir şekilde, ama bir müzik hit'i, müzik hit'idir."
 elgar.313.g: "Bazen küçük şeyler mutluluk getirir."
 elgar.314.t: "İlham yok"
 elgar.314.d: "Üzücü bir şekilde, misafirimiz ülkemizde kalmanın tamamen ilham verici olmadığını düşünüyor."
 elgar.314.f: "Bazen işler sadece yürümez."
 elgar.314.g: "Yıkıcı."
 elgar.315.t: "Özel Konser"
 elgar.315.d: "Resmi performansların dışında, bestecimiz küçük bir grupta özel bir konser verdi."
 elgar.315.f: "Büyük bestecilerin küçük özel konserleri uzun bir geleneğe sahiptir. Bu konuda en ünlü olanı Franz Schubert'tir ve ona ait olan Schubertiadeler bu konserlere adını vermiştir. İlk Schubertiadelerde Franz Schubert piyano çalmış ve baritonlar Johann Michael Vogl ve daha sonra Carl von Schönstein şarkılarını söylemiştir. Akşamlar ayrıca okuma ve eğlenceli oyunlarla geçmiştir, bunlar genellikle belirli bir temaya sahipti. Bu etkinlikler, dostça buluşmalarla ve edebi-müzikal salonlarla bir karışımdı."
 elgar.315.g: "Ne güzel."
 elgar.315.h: "Da capo!"
 elgar.316.t: "Yetenekli bir öğrenci"
 elgar.316.d: "Ülkemizdeki büyük bir besteci, ülkemizin siyasi liderlerinden birinin yeteneğini keşfetti ve ona bestecilik sanatını öğretmeyi düşündü."
 elgar.316.f: "Politikacıların sanatsal yeteneklere sahip olabileceği ve kötü insanlar olarak, aslında hiçbir müzik sanatına tamamen duyarsız olmamaları gerektiği insanları şaşırtabilir. Elbette siyasi ambisyonları olan besteciler vardı, ancak müziksel ambisyonları olan politikacılar çok daha azdı. Bu politikacıda sahip olduğu her ne varsa, belki ruhu tümüyle kaybolmamış olabilir."
 elgar.316.g: "Ümit verici bir aday."
 elgar.316.h: "Enerjisi başka bir yerde daha iyi harcanmalı."
 elgar.317.t: "Müzikal felaket"
 elgar.317.d: "Ülkemizdeki bir konser salonunda gerçekleştirilen bir performans, müzik tarihimizin en büyük başarısızlıklarından biri olarak kaydedilebilir."
 elgar.317.f: "Orkestra hazırlıksızdı, solist soğuk algınlığına yakalandı, şef dinlenmemişti ve performansın yapıldığı sırada besteci, ülkemizi bir sonraki turnesinden çıkarma tehdidinde bulunuyor. Bunu başka bir şekilde tanımlamak mümkün değil, felaketti!"
 elgar.317.g: "Uluslararası bir utanç!"
 elgar.318.t: "Skandal konser"
 elgar.318.d: "Skandal bir konser, sadece 'modern' sesleriyle izleyiciyi çılgına çevirmekle kalmadı, aynı zamanda toplumu böldü ve hukuki sonuçları oldu."
 elgar.318.f: "O dönemin basın raporları, gürültülü isyanlardan bahseder. Bestecinin takipçileri, öğrencileri ve rakipleri birbirlerine bağırarak, birbirlerine atarak, performansı engelleyerek, mobilyaları tahrip ederek vb. sahneyi karıştırdılar. Birkaç kez, izleyiciden öfkeli muhafazakârlar sahneye tırmanarak şefe tokat atmak için bağırdılar. O da, düzenin kamu otoritesinin yardımıyla sağlanacağını söylediğinde, isyanın gerçekten başladığı söyleniyor. Sonra bir tokat atıldı. Sonraki yargı sürecinde, orada bulunan bir operet bestecisi şunu söyledi: 'Tokat sesleri, o akşam duyulabilecek en melodik şeydi.'"
 elgar.318.g: "Kalabalığın kültür anlayışı yok. Harikaydı!"
 elgar.318.h: "Eseri hemen kaldırın."
 elgar.319.t: "Zeitgeist"
 elgar.319.d: "Bugün, büyük bir bestecinin kişisel olarak yönettiği modern eser, halkın zevkine tam uyuyor."
 elgar.319.f: "Bazen sadece şansa ihtiyaç vardır."
 elgar.319.g: "Mükemmel!"
 elgar.320.t: "Müzikal Propaganda"
 elgar.320.d: "Bazı hükümet politikacıları, şu anda bizde kalan bestecinin müziğinin ... propaganda amacıyla kullanılmasının mümkün olup olmadığını düşünüyor."
 elgar.320.f: "Özellikle 20. yüzyılın başlarından ve dönemin totaliter rejimlerini üreten kitle toplumundan, halkı müzikle uysallaştırma fikri yaygındı. Bazı müzisyenler bu dönemlerde bile diktatörlüğe karşı dururken, diğerleri eserlerini doğrudan bir ideolojinin hizmetine sundular ya da en azından yeteneklerinin bir politik yönün hizmetine girmesine izin verdiler."
 elgar.320.g: "Müzik, politikadan bağımsız olmalıdır."
 elgar.320.h: "Bazen müzik, politikaya hizmet etmelidir."
 elgar.321.t: "Büyük besteciler arasında"
 elgar.321.d: "Müzik konuğumuz, ülkemizde çalışan büyük bir besteciyle tanıştı. Bir saat süren sohbetler ve yürüyüşlerde, müzikal düşünceler ve fikirler alışverişi yaptılar."
 elgar.321.f: "Büyük zihinler benzer düşünür."
 elgar.321.g: "Tarihi bir buluşma."
 elgar.406.t: "Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]'ın Ölümü"
 elgar.406.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], [GetPlayer.GetNameNoFlag]'ın önde gelen müzik otoritesi, bugün beklenmedik bir şekilde hayatını kaybetti. Müzik dünyası bu büyük kaybı yas tutuyor."
 elgar.406.f: "'Bu ölülerin mezarına durduğumuzda, adeta bir milletin temsilcileriyiz, yerli sanatın kaybolmuş ihtişamının ve vatansever entelektüel gelişimin geriye kalanlarının bir yarısı olarak yüksekçe kutlanan birinin düşüşünü yaslıyoruz. Handel'in ve Bach'ın, Haydn'ın ve Mozart'ın ölümsüz ünlerinin mirasçısı ve genişleticisi hayatını yaşadı ve bizler solmuş bir oyunun kırılmış teli üzerinde ağlıyoruz.\nSolmuş oyundan! Bunu ona diyeyim! Çünkü o bir sanatçıydı ve o neyse, sadece sanat aracılığıyla var oldu.' - Franz Grillparzer"
 elgar.406.g: "Ama şimdi kim Requiem yazacak?"
 elgar.411.t: "Muhteşem Konçerto"
 elgar.411.d: "Şefimiz [SCOPE.sCharacter('elgar_conductor').GetFullName] tarafından yönetilen konser sezonu, beklentilerin çok ötesine geçti!"
 elgar.411.f: "'Dinleyiciler katı olmalı, ıslık çalmamalı, ama alkışlar beni hiçbir şeye zorlamamalı.' - Giuseppe Verdi"
 elgar.411.g: "Bravo!"
 elgar.412.t: "Ortalama Konçerto"
 elgar.412.d: "Şefimiz [SCOPE.sCharacter('elgar_conductor').GetFullName] liderliğindeki konser sezonu, alıştığımız gibi devam ediyor. Şimdiye kadar öne çıkan bir an olmadı."
 elgar.412.f: "'Kendi eserlerimi zaman zaman geliştiremeyecek kadar kendimi ilahi olarak görmemeliyim.' - Ludwig van Beethoven"
 elgar.412.g: "*hıh*"
 elgar.413.t: "Kötü Konçerto"
 elgar.413.d: "Şimdiye kadar olan konser sezonu sadece ortalamanın altında kalmadı; şefimiz [SCOPE.sCharacter('elgar_conductor').GetFullName]'ın performansları, bu yıl özellikle hayal kırıklığı yaratıcı olarak kabul ediliyor. Dinleyiciler encore bile istemiyor..."
 elgar.413.f: "'Gotterdammerung'un son notalarını duyduğumda, sanki hapishaneden çıkmış gibi hissettim.' - Pjotr Tchaikovsky"
 elgar.413.g: "Booo!"
 elgar.414.t: "Seyircide bir elçi"
 elgar.414.f: "'Tristan ve Isolde'nin Prelüdü, bir zamanlar bir İtalyan tablosunu hatırlatıyor; bir şehidin bağırsakları, bir makaradan yavaşça vücudundan çıkarılıyor.' - Eduard Hanslick"
 elgar.414.g: "Adam müziğin ne olduğunu bile bilmiyor."
 elgar.414.h: "Sonunda biri bunu söylüyor!"
 elgar.415.t: "Bale"
 elgar.415.d: "Bugün yeni modern bir bale eseri prömiyerini yaptı."
 elgar.415.f: "'Fındıkkıran'ın hikâyesini hiç sevmedim.' - Pjotr Tchaikovsky"
 elgar.415.g: "Dans et!"
 elgar.416.t: "Film müziği"
 elgar.416.d: "Bugün, baş şefimiz yönetiminde bir uzun metrajlı film için ilk film müzikleri kaydedildi."
 elgar.416.f: "'Film müziği, film dramı ile, benim salonumda okuduğum kitaba birinin piyano çalması arasındaki ilişkiye sahip olmalıdır.' - Igor Stravinsky"
 elgar.416.g: "Bir zamanlar, Kutsal Kase'yi arayan bir arkeolog hakkında bir senaryo yazmıştım ama sonra çalındı."
 elgar.417.t: "Şeflik sezonu sona erdi"
 elgar.417.d: "Konser sezonunun son performansı sona erdi. Yorumlar zaten basında yer aldı. Görünüşe göre [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] iyi bir iş çıkarmış ve tanınma kazanmış. Devlet orkestramızın kalitesinin önemli ölçüde arttığı söyleniyor - bu da ülkemizin müzik itibarını yükseltiyor."
 elgar.417.f: "Henüz şef olmayan besteciler, bir konser sezonunun sonunda şeflik yeteneğini pratikle kazanabilirler. En geç üçüncü sezonda şeflik statüsünün kazanılması kesinleşir. Bu, virtüöz olmayan bestecileri eğitmek ve sonra onları tura göndermek için iyi bir yol."
 elgar.417.g: "Da capo!"
 elgar.421.d: "Bestecimiz şu anda büyük bir yazı bloğuyla mücadele ediyor."
 elgar.422.t: "Bir yürüyüş"
 elgar.422.d: "Doğada yaptığı bir yürüyüş sırasında, [SCOPE.sCharacter('elgar_conductor').GetFullName] çalışmalarına ilham veren bir şey buldu."
 elgar.422.f: "Doğa, birçok besteciye ilham vermiştir. Beethoven kırsala çekilmiş ve orada topladığı izlenimler ona 6. senfonisini yazmasında ilham vermiştir. Gustav Mahler, kendi küçük besteci kulübesini bile kurmuştur."
 elgar.422.g: "Beethoven'ın izinde."
 elgar.423.t: "Yeterli konfor yok"
 elgar.423.f: "Sanatçılara önemli bir iş verdiğinizde, özel taleplerle gelirler. Ciddi bir halk figürü, ona önemli olduğunu hissettirdiğinizde, hızla bir diva haline gelir. Ne zaman fark ederseniz, bu insanların kafası ünlülükle dolmuş olur."
 elgar.423.g: "Ona konfor verin."
 elgar.424.t: "Rahatsızlıklar"
 elgar.424.f: "[SCOPE.sCharacter('elgar_conductor').GetFullName]'ı zor durumda bırakan bir kişi var. İster bir hayran, ister sadece ünlü bir halk figürüne yakın olarak siyasi güç kazanabileceğini düşünen biri. Neredeyse bir grupi olarak adlandırılabilir. Artık o kadar rahatsız edici hale geldiler ki, [SCOPE.sCharacter('elgar_conductor').GetLastName] paranoya şikâyeti yapıyor. Ne yazık ki, bu 'hayran', yüksek rütbeli bir siyasi figürdür ve onun kamu dışlanması anlaşılabilir sonuçlar doğurur."
 elgar.424.g: "Onu rahatsız etmeyin!"
 elgar.424.h: "Bununla başa çıkmak zorunda."
 elgar.431.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')]"
 elgar.431.d: "After several months of effort and artistic creativity, [SCOPE.sCharacter('elgar_conductor').GetFullName] today presented [SCOPE.sCharacter('elgar_conductor').GetHerHis] [SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')] today with him at the podium."
 elgar.431.f: "Konçerto, geç Barok döneminden itibaren, orkestra veya diğer enstrümantal topluluk tarafından eşlik edilen bir veya daha fazla solist için yazılmış enstrümantal bir kompozisyon olarak anlaşılmaktadır. Enstrümantal müzik türü olarak ilk eserler, 18. yüzyılın başlarında konçerto grosso'dan türemiştir. Klasik dönemde tam anlamıyla ifadesini bulur. Genellikle üç bölümden oluşur, ortada yavaş bir bölüm yer alır."
 elgar.432.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_symphony_event_type')]"
 elgar.432.d: "A very special performance is taking place in the concert hall tonight: high society has gathered to attend the premiere of [SCOPE.sCharacter('elgar_conductor').GetFullName]'s new [SCOPE.sCharacter('elgar_conductor').GetCharacter.GetCustom('elgar_composer_masterpiece_for_event_type')]."
 elgar.432.f: "Senfoni, yüzyıllar boyunca farklı form ve enstrümantasyona sahip enstrümantal eserler için kullanılan bir terimdir. Senfoninin klasik formu 18. yüzyılda gelişmiş ve 20. yüzyıla kadar orkestra müziği alanında baskın bir konumda kalmıştır. Bu, orkestraya yönelik, genellikle üç ya da dört (daha nadiren beş) bölümden oluşan bir eserdir ve solist içermez. Ludwig van Beethoven'in 9. Senfonisi'nden itibaren, vokal bölümler (solistler ve/veya korolar) bazen ortaya çıkmıştır, örneğin Gustav Mahler'de olduğu gibi, ancak orkestranın rolü hâlâ baskındır."
 elgar.433.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]"
 elgar.433.d: "The opera '[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]', composed by Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] after many weeks and months of effort, is considered a new highlight in the musical work of this artistic genius. The upcoming premiere promises to be a great success."
 elgar.433.f: "Opera, Barok döneminde ortaya çıkan bir müzik tiyatrosu türüdür. Bir opera, bir dramatik şiirin müzikal olarak sunumundan oluşur ve bu sunumda şarkıcılar, orkestra ve bazen bir koro ve bale topluluğu yer alır. Şarkı söylemenin yanı sıra, oyuncular tiyatro sahnesinde oyunculuk ve dans ederler. Aktörlerin rolleri maskeler ve kostümlerle görsel olarak illustre edilir. Claudio Monteverdi, Orfeo'su ile standartlar koymuş ve operanın atası kabul edilmiştir. 19. yüzyılda ise Richard Wagner, operalarıyla yeni standartlar koymuştur."
 elgar.440.t: "Halk Müziği"
 elgar.440.d: "Ülkenin kırsal kesimlerinde seyahat ederken, [SCOPE.sCharacter('elgar_conductor').GetFullName], yerel halkın danslarını ve şarkılarını öğrenmeye, yazmaya ve toplamaya büyük bir ilgi göstermiştir."
 elgar.440.f: "19. yüzyılın milliyetçiliği, daha önce hor görülen müzik türlerinin aniden ilgi uyandırmasını sağladı çünkü bu müzik türlerinin, bir ülkenin ulusal ruhunu yansıttığı düşünüldü. Yerel tarihçiler ve yerel müzisyenler geleneksel şarkıları topladılar. Bazı besteciler de halktan ilham aldı ve bunları tamamen yeni bir şekilde müziğe döktüler."
 elgar.440.g: "İlginç bir müzik koleksiyonu."
 elgar.440.h: "[SCOPE.sCharacter('elgar_conductor').GetLastName], organ grinder müziğiyle uğraşmak yerine yüksek kültüre odaklanmalı."
 elgar.441.t: "Deniz Marşı"
 elgar.441.d: "Amiral [SCOPE.sCharacter('elgar_admiral').GetLastName]'ın kahramanlıklarından ilham alan bestecimiz [SCOPE.sCharacter('elgar_conductor').GetFullName], küçük bir deniz marşı yazdı."
 elgar.441.f: "Şantinin orijinal pratik amacı, her zaman denizciler arasında bir çalışma şarkısı olarak kalmıştır. Dilsel ve müzikal yönler, diğer taraftan pek önemli değildi. Sanayi Devrimi'nin başlamasıyla birlikte, daha hızlı gemilere ihtiyaç duyuldu. Büyük gövdeli Doğu Hindistan gemileri yok oldu ve bunların yerini kliperler ve fregatlar aldı. Bu, sonuç olarak şantilerin denizcilik için pratik kullanımlarını kaybetmelerine ve yalnızca eğlence ve dinlence amacıyla söylenmelerine yol açtı. Müzikçiler eski deniz şantilerini topladılar veya onlardan ilham alarak kendi eserlerini yarattılar."
 elgar.441.g: "Yo Ho!"
 elgar.442.t: "Marş"
 elgar.442.d: "General [SCOPE.sCharacter('elgar_general').GetFullName]'ın değerlerinden ilham alan bestecimiz [SCOPE.sCharacter('elgar_conductor').GetFullName], yeni bir askeri marş yazdı."
 elgar.442.f: "Marş, özellikle 19. yüzyıl ve erken 20. yüzyılda, ulusalcı ve militarist eğilimleri ve devrimleriyle gelişmiştir. Bunun bir örneği, Gioachino Rossini'dir. Rossini, sadece operalarına ihtişamlı marşlar eklemekle kalmamış, aynı zamanda belirli prensler için bir dizi eser bestelemiştir: Bunlar arasında, Osmanlı Sultanı Abdülmecid I için yazılan (Marcia per il Sultano) komisyonlu bir kompozisyon yer almakta olup, hâlâ düzenli olarak İtalyan askeri bandolarının programında çalınmaktadır. Ayrıca, 19. yüzyılın eğilimlerini örnekleyen bir diğer örnek, Viyana'daki Strauss ailesinin eserleridir. Aile, her uygun fırsatta bir marş bestelemiş ve bu marşlar, vatanseverlik veya imparatora sadakat göstermenin yanı sıra askeri figürleri onurlandırmak için yazılmıştır."
 elgar.442.g: "Ordu için yeni materyal."
 elgar.443.t: "Kunstlied"
 elgar.443.d: "Büyük bir şairin şiirinden ilham alarak, [SCOPE.sCharacter('elgar_conductor').GetFullName] yan bir eser olarak bir Kunstlied yazdı."
 elgar.443.f: "Batı klasik müzik geleneğinde, Lied, şiirin klasik müzikle beste haline getirilerek polifonik bir müzik eseri oluşturulması anlamına gelir. Günümüz Almancasında şarkı, herhangi bir tür şarkıyı ifade etmek için kullanılırken, İngilizce ve Fransızca konuşanlar arasında, lied genellikle 'sanat şarkısı' ile eş anlamlı olarak kullanılır ve geleneksel olarak diğer dillere de ilham vermiş eserleri kapsar. Liedlere dönüştürülen şiirler genellikle pastoral temalar veya romantik aşk temaları etrafında şekillenir."
 elgar.443.g: "Başka bir şey olamaz mıydı...?"
 elgar.444.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')] Piyano Sonatı"
 elgar.444.d: "Piyano eserleri, klasik müziğin standart repertuarının bir parçasıdır. Bir sonraki büyük eseri için parmak çalışması olarak, [SCOPE.sCharacter('elgar_conductor').GetFullName] bir sonat yazmış ve geçen gece küçük bir akşam partisinde bunu sahnelemiştir."
 elgar.444.f: "19. yüzyılın başlarında, sonat formu, önceki uygulama ve önemli Klasik bestecilerin eserlerinin, özellikle Haydn, Mozart, Beethoven ve hatta Clementi'nin eserlerinin bir birleşimi olarak tanımlanmıştır. Bu dönemde, üç bölümlü ve dört bölümlü düzenler arasındaki farklar, özellikle konçertonun üç bölümde ve senfoninin dört bölümde düzenlenmesi konusundaki yorumlarla dikkate alınmıştır. Piyano için açıkça sonat olarak etiketlenen eserler arasında Frédéric Chopin'in üç sonatı, Felix Mendelssohn'un eserleri, Robert Schumann'ın üç sonatı, Franz Liszt'in B minör Sonatı ve sonrasında Johannes Brahms ve Sergei Rachmaninoff'un sonatları yer almaktadır."
 elgar.444.g: "Bir klasik."
 elgar.445.t: "Müzik Üzerine İnceleme"
 elgar.445.d: "Son birkaç aydır, [SCOPE.sCharacter('elgar_conductor').GetFullName], orkestrasyon ve müzik aletlerinin incelenmesi üzerine yeni bir inceleme üzerine yoğun bir şekilde çalışıyordu. Bu inceleme, müzikal yeniliklere katkı olarak kabul ediliyor."
 elgar.445.f: "'Müziğin okyanuslarını bulmak çok zaman alır, ancak onlarda nasıl yol alacağınızı öğrenmek çok daha fazladır.' - Hector Berlioz"
 elgar.445.g: "Önemli bir teorik eser."
 elgar.446.t: "Requiem"
 elgar.446.d: "Son zamanlarda, Katolik dininin etkili bir temsilcisi, [SCOPE.sCharacter('elgar_conductor').GetFullName]'dan, saygıdeğer bir piskoposun ölümünün ardından yeni bir kutsal eser yazmasını istedi."
 elgar.446.f: "Litürjik anlamda cenaze ayini requiem olarak bilinir. Bu terim, Katolik Kilisesi'nde cenaze hizmetinin Kutsal Ayini'nin litürjisini ve ölülerin anılması için yazılmış kilise müziği bestelerini tanımlar. 'Requiem aeternam dona eis, Domine' (Ebedi huzur ver, ya Rab) sözlerinden türetilmiştir. Requiem litürjisinin propriumu, All Souls' Day (Azizler Günü) ile örtüşür. Litürjinin ilk parçası olan Introit, genellikle besteciler tarafından müziğe dökülürken, sunum (Offertory) da öyledir, buna karşılık dizi bazen çeşitli sebeplerle kısaltılır ya da tamamen atlanır. Requiem'de, Gloria ve Credo müziğe dökülmez çünkü cenaze ayininde söylenmez ya da okunmaz."
 elgar.446.g: "Requiem aeternam dona eis, Domine."
 elgar.447.t: "Cesur Bir Opera"
 elgar.447.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName]'ın son bestesi, sansür yetkililerinden eleştiriler aldı. Sanatsal açıdan yüksek bir değeri olsa da, kargaşaya yol açabilir. Ülkenin entelektüelleri şimdiden ayaklanmış durumda."
 elgar.447.f: "19. yüzyılın çoğunda, dönemin en büyük bestecileri bile sansüre tabi tutulmak zorundaydı. 'Figaro'nun' birçok farklı versiyonu, devrimci tema nedeniyle çok eleştirilmişti. Şüpheli küfür veya diğer ahlaksızlıklar da sansürlerin canını sıkıyordu. Bir noktada, bazı besteciler tacizlere dayanamayarak sponsorlarını terk etti."
 elgar.447.g: "Sanat, kargaşaya yol açmamalı, yükseltmelidir."
 elgar.447.h: "Sansürü biraz gevşetmeliyiz."
 elgar.448.t: "Besteci Düellosu"
 elgar.448.d: "[SCOPE.sCharacter('rival_composer_scope').GetFullName], [SCOPE.sCountry('rival_composer_country_scope').GetName]'dan bir besteci, bu ülkenin tipik kibriyle, bizim bestecimiz [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]'ı 'bilinmeyen bir rakam' olarak tanımlayarak, ülkemizin müzikal statüsünü temelden sorguladı."
 elgar.448.f: "'Bizim müzik tarzımızın parçalanması ve keyfiliği, Mendelssohn'un belirsiz, neredeyse anlamsız bir içeriği olabildiğince ilginç ve akıl karıştırıcı şekilde ifade etme çabasıyla, getirilmiş olmasa da en azından en yüksek zirveye çıkarılmıştır. Gerçek müzik kahramanlarımızdan sonuncusu Beethoven, ifade edilemeyen bir içeriğin en net, en kesin şekilde, keskin bir biçim ve plastik tasarımıyla ifade edilmesi için en yüksek arzuya ve mucizevi yeteneğe sahipken, Mendelssohn ise, bu edinilmiş figürleri, üretimlerinde, belirsiz renklerin kararsız parıltısına dönüştürmekte ve bu, keyfi şekilde hayal gücümüzü uyandırırken, insan ruhumuzun net bir sanatsal görüş arzusunu çok az dokunarak sadece yerine getirilme umuduyla bırakmaktadır.' - Richard Wagner, Felix Mendelssohn hakkında"
 elgar.448.g: "Zorluğu kabul ediyoruz."
 elgar.448.h: "Bu düelloyu kazanamayız."
 elgar.449.t: "Besteci Düellosunda Zafer"
 elgar.449.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], rakibine kıyasla çok daha ünlü ve yetenekli bir besteci olarak kendini gösterdi, böylece ülkemizin kültürel merkez olarak itibarı korunmuş oldu."
 elgar.449.f: "'Wagner'ın gücü ve onun tetiklediği fırtına ve stresin en net şekilde nasıl göründüğünü, eserinin aslında kutsadığı bu çürümeyi ve bu çürümenin o zamandan beri nasıl hızla geliştiğini gösteren hiçbir şey yoktur. Bu adamın ne kadar güçlü olması gerektiğini, müzik dramasının çöplüğünü ve gürültüsünü, ölümünden elli yıl sonra bile hala nasıl şaşkın bir şekilde taşıdığımızı görmek zor. Sanatların Sentezi'nin prestiji hâlâ hayatta. Bu, ilerleme olarak mı adlandırılır? Belki. Ama besteciler, Verdi'nin harika tavsiyesini dinleyerek bu ağır mirası atmak için gücü bulamazlarsa: 'Eski zamanlara geri dönelim, işte bu ilerleme olur.' - Igor Stravinsky, Richard Wagner hakkında"
 elgar.449.g: "Şimdi hangi ülkenin baskın kültürel ulus olduğu net bir şekilde belli oldu!"
 elgar.450.t: "Besteci Düellosunda Yenilgi"
 elgar.450.d: "Maalesef, bestecimiz, yarışmada yabancı rakibine karşı mağlup oldu. Şimdi tüm dünya, müzikal olarak geri kaldığımızı düşünüyor!"
 elgar.450.f: "'Wagner gerçekten bir insan mı? O bir hastalık değil mi? Dokunduğu her şeyi hasta ediyor, müziği hasta etti.' - Friedrich Nietzsche, Richard Wagner hakkında"
 elgar.450.g: "Şimdi hangi ülkenin baskın kültürel ulus olduğu net bir şekilde belli oldu..."
 elgar.451.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName]'ın [SCOPE.sCountry('elgar_composer_destination_scope').GetNameNoFlag]'a Seyahati"
 elgar.451.d: "Bestecimiz [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], tüm hazırlıklarını tamamladı. İki buçuk yıl sürecek konser turnesinin ilk durağı [SCOPE.sCountry('elgar_composer_destination_scope').GetName]'dır."
 elgar.451.f: "'Eğer dünya bir gün sona erecekse, Viyana'ya giderim, çünkü her şey orada, elli yıl sonra olur.' - Gustav Mahler"
 elgar.451.g: "Bize bir kartpostal gönder!"
 elgar.452.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] [GetPlayer.GetNameNoFlag]'da Varıyor"
 elgar.452.d: "Bir gezgin besteci, mevcut turnesi sırasında ülkemize uğradı ve bir süre kalmaya karar verdi."
 elgar.452.f: "[SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_composer_achievements_switch_to_character_scope_type')]"
 elgar.452.g: "Hoş geldiniz, hoş geldiniz!"
 elgar.453.t: "Gezgin Besteci Ayrılıyor"
 elgar.453.d: "Birkaç hafta süren bir konaklama ve yerel halktan tanınma kazanan birkaç performansın ardından gezgin besteci turnesine devam etti."
 elgar.453.f: "Bir bestecinin hedefi, bir dizi faktöre bağlıdır. Karar verici kriter opera evleri ve son durağa yakınlıktır. Ancak kültürel teknolojiler, bir Sanat Merkezi'nin (Empresyonizm, Ekspresyonizm, Art Nouveau) varlığı ya da bir konservatuvarın bulunması gibi faktörler de rol oynar. Besteciler, rakip bir bestecinin yakın zamanda performans sergilediği yerlerden kaçınırlar."
 elgar.453.g: "Yakında tekrar görüşmek dileğiyle!"
 elgar.455.t: "Besteci Turnesinden Döndü"
 elgar.455.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis] turnesinden döndü. Müzik dünyasında iz bıraktı ve itibarını önemli ölçüde artırdı."
 elgar.455.f: "Turneler sadece bir bestecinin itibarını artırmak için vardır. Bestecinin yeteneklerine göre bu farklılık gösterir. Kendi eserlerinizin rolü olduğu gibi, karakter özellikleri de rol oynar - yenilikçi veya hırslı karakterler avantajlıdır. Orkestra Şefi Özelliği ve Virtüöz Özelliğine sahip besteciler özel bir bonus alır."
 elgar.455.g: "Hoş geldiniz tekrar, maestro."
 elgar.501.t: "Canto degli Italiani"
 elgar.501.d: "İtalya'nın birleşmesi ve bağımsızlığı için halk mücadelesi ortamında, 20 yaşındaki öğrenci ve vatansever Goffredo Mameli, 'İtalyanların Şarkısı' adını verdiği ilham verici bir şarkı yazdı. Kısa sürede oldukça popüler oldu."
 elgar.501.f: "Il Canto degli Italiani (İtalyanların Şarkısı), İtalyanlar arasında en çok 'Inno di Mameli' (Mameli'nin Marşı) olarak bilinir, şarkının sözlerini yazan kişi olan Mameli'nin adından ya da 'Fratelli d'Italia' (İtalya'nın Kardeşleri) ilk satırından dolayı. Şarkı, başka bir Michele Novaro tarafından müziğe dökülmüştür. Marş, Risorgimento döneminde ve sonraki yıllarda geniş çapta popülerlik kazanmıştır. Ayrıca, 10 Aralık'ta Cenoa'da broşürlerde basılmış ve gösteri, şehrin Avusturya güçlerinden atılmasının 101. yıldönümüne resmen adanmıştır - aslında bu, İtalya'daki yabancı işgallere karşı protesto etmeye ve Carlo Alberto'yu İtalya'nın özgürlük davasını kabul etmeye teşvik etmek için bir bahaneydi. Bu vesileyle, üç renkli bayrak gösterildi ve Mameli'nin marşı ilk kez halka açık olarak söylendi."
 elgar.501.g: "Bununla ilgili bir yasa olmalı..."
 elgar.501.h: "Fratelli d'Italia, l'Italia s'è desta!"
 elgar.503.t: "Deutschlandlied"
 elgar.503.d: "Fransa'nın Ren Nehri'ni doğal sınır olarak görerek yeniden genişleme isteğine karşılık olarak, şair Hoffmann von Fallersleben, 'Deutschlandlied' olarak geniş çapta bilinen bir şarkı yazdı."
 elgar.503.f: "Almanlar'ın Şarkısı, aynı zamanda Deutschlandlied olarak bilinir, August Heinrich Hoffmann von Fallersleben tarafından Heligoland'da yazılmıştır. Hoffmann'ın şarkıyı yazmasının özel nedeni, Ren Krizi sırasında Fransa'nın Ren Bölgesi'ne olan toprak talepleriydi. Bu talepleri şarkı ile reddetmiştir, tıpkı o dönemdeki diğer Alman Ren şarkılarında olduğu gibi. Buna, yalnızca Alman birliğini sağlamak ve bu birliğin, düşman saldırılarına karşı savunma için gerekli önkoşul olacağı fikrini eklemiştir. Şair, eseri, Joseph Haydn'ın eski imparatorluk marşı 'God Save Franz, the Emperor' (1797) melodisiyle bestelemiştir. Şarkı, Birinci Dünya Savaşı sırasında daha büyük bir öneme sahip olmuştur. Üçüncü dizesi, 1952'den itibaren Almanya'nın milli marşı olmuştur."
 elgar.503.g: "Alman şarabı ve Alman şarkısı!"
 elgar.503.h: "Almanya, Almanya her şeyin üstünde!"
 elgar.503.i: "Yanılıyor olmalısınız, şarkının adı 'Gott erhalte Franz den Kaiser' (Fransa İmparatoru'nun Tanrı tarafından korunması) diyorlar."
 elgar.504.t: "Paganini'nin Ölümü"
 elgar.504.d: "Ünlü keman virtüözü Niccolò Paganini'nin ölümü, cenazesiyle ilgili bir tartışma başlattı."
 elgar.504.f: "Niccolò Paganini, İtalyan bir kemancı ve besteciydi. Zamanının en ünlü keman virtüözüydü ve modern keman tekniğinin temel taşlarından biri olarak iz bıraktı. Onun 24 Caprices for Solo Violin Op. 1, en bilinen eserlerinden olup, birçok önemli besteciye ilham kaynağı olmuştur. Mayıs 1840'ta Nice piskoposu Paganini'ye son ayini yapmak için yerel bir rahip gönderdi. Paganini, sakramentin erken olduğunu varsayarak reddetti. Bir hafta sonra, 27 Mayıs 1840'ta, 57 yaşındaki Paganini iç kanamadan öldü, rahip çağrılmadan önce. Bunun ve şeytanla ilişkisi olduğu yönündeki yaygın söylentilerin ardından, Kilise, cenazesinde Katolik bir defin yapmayı reddetti. Bu durum, Paganini'yi nasıl ele alacaklarına dair kamuoyunda bir tartışma başlattı. Paganini'yi Genoa'da saygın bir şekilde defnetmek için kiliseye baskı yapmayı savunan sesler var, ancak bu, kilise otoriteleriyle açık bir çatışmaya yol açacaktır."
 elgar.504.g: "Ona saygın bir defin verin ve mirasını güvence altına alın."
 elgar.504.h: "Bu hassas konuya müdahale etmeyin."
 elgar.505.t: "Nabucco"
 elgar.505.d: "Giuseppe Verdi, son operasıyla şimdiye kadar kariyerinin en büyük başarısını elde etti. Aynı zamanda, İtalyan halkının ulusal duygularını da körüklüyor."
 elgar.505.f: "Nabucco, 1841'de Giuseppe Verdi tarafından yazılmış dört perdelik bir İtalyanca operadır. Opera, en iyi bilinen parçası 'İbraniler'in Köleleri Korosu' ile tanınır ve bu koro, günümüzde birçok opera evinde encore olarak sıkça çalınır. Nabucco, Verdi'nin bir besteci olarak ününü kalıcı olarak pekiştiren opera olarak kabul edilir. Verdi, 'Bu, sanat kariyerimin gerçekten başladığı operadır. Ve karşılaştığım birçok zorluğa rağmen, Nabucco'nun şanslı bir yıldız altında doğduğuna kesinlikle inanıyorum' demiştir. Babil'deki Yahudilerin esaretinin hikayesi, özellikle milliyetçilik çağında İtalyanların yabancı güçler tarafından baskı altına alındığını hissetmeleri nedeniyle, tüm İtalya'da büyük bir dönüm noktası olmuştur. Nabucco'da Verdi'nin gerçekten İtalyan milliyet duygularına hizmet edip etmediği bugün hala tartışmalıdır."
 elgar.505.g: "Va pensiero ..."
 elgar.505.h: "O asi İtalyanlar yine."
 elgar.507.t: "Aida"
 elgar.507.d: "Süveyş Kanalı'nın açılışı vesilesiyle, Giuseppe Verdi, Mısır etkisi taşıyan operası Aida'yı - ufak bir gecikmeyle - sahneye koydu."
 elgar.507.f: "Aida, Giuseppe Verdi'nin dört perdelik bir operasıdır ve İtalyanca librettosu Antonio Ghislanzoni tarafından yazılmıştır. Senaryo, Fransız Mısırologu Auguste Mariette'ye ait olduğu düşünülen bir senaryoya dayanmaktadır, ancak senaryonun aslında Temistocle Solera tarafından yazıldığı iddia edilmiştir. Mısır Hidivi Isma'il Paşa, Verdi'ye operayı yazması için 150.000 frank ödeme yapmış ancak prömiyer gecikmiştir. Aida, nihayetinde Kahire'de büyük bir beğeni ile açıldı. Prömiyer için kostümler ve aksesuarlar Auguste Mariette tarafından tasarlanmış ve sahne tasarımı Paris'te yapılmış, Kahire'ye gönderilmiştir. Verdi, prömiyer için Kahire'ye katılmamış olsa da, izleyici kitlesinin davetli büyükelçiler, politikacılar ve eleştirmenlerden oluştuğunu ve halktan hiç kimse bulunmadığını öğrenerek son derece mutsuz olmuştur. Bu nedenle, İtalya'da (ve Avrupa'da) gerçekleşen prömiyeri, her aşamada büyük bir şekilde yer aldığı La Scala, Milano'da yapılmasını gerçek prömiyer olarak kabul etmiştir."
 elgar.507.g: "İtalya için bir zafer!"
 elgar.507.h: "[ROOT.GetCountry.GetNameNoFlag] için bir zafer!"
 elgar.509.t: "Franz Schubert"
 elgar.509.d: "Franz Schubert'in ölümünden 13 yıl sonra, 5. senfonisi halka tanıtıldı."
 elgar.509.f: "Si bemol majör 5. Senfoni, belki de Schubert'in gençlik döneminin en olgun senfonisi olup, geniş çapta Schubert'in ilk 'olgun' senfonisi olarak kabul edilmektedir. Senfoni, odaklanmış oda müziği mükemmelliğiyle işlenmiştir, çünkü orkestra en küçük boyuttadır ve oranları birbirine mükemmel uyum sağlamaktadır. Bu eser, Schubert'in Mozart'ın senfoni eserlerini üretken bir şekilde incelediği bir dönemden gelmektedir ve Schubert'in tamamen farklılığı ve bağımsızlığını ortaya koymaktadır. Schubert'in kendi yazdığı notalara göre, eser 1816 Eylül ile 3 Ekim tarihleri arasında yazılmıştır; bu dönemde Schubert kendi müzik dilini bulma aşamasındadır. Schubert'in 5. senfonisinin ilk performansı, 1816'da Viyana'da küçük bir amatör orkestra tarafından yapılmış; ancak halka açık ilk performansı, Schubert'in ölümünden 13 yıl sonra, 17 Ekim 1841'de Michael Leitermayer'in yönetiminde gerçekleştirilmiştir."
 elgar.509.g: "Schubert, cennetten bile bize müziğiyle keyif veriyor."
 elgar.510.t: "Poliuto Üzerine Tartışma"
 elgar.510.d: "Kral ile besteci Donizetti arasındaki uzlaşmaz bir anlaşmazlık, onun görevden alınmasına yol açacak bir krize yol açıyor."
 elgar.510.f: "1829'dan 1838'e kadar Gaetano Donizetti, Napoli Kraliyet Tiyatrolarının müzik direktörüydü ve diğer devletlerdeki seyahatlere ve siparişlere rağmen fiilen krallığın en önemli kültürel figürü ve en ünlü temsilcisiydi. Napoli'de yazılan ünlü bir dizi Donizetti operası, İki Sisitli Krallığı'nın müzik açısından en üst sıralarda yer alan bir konumda olduğunu pekiştirdi. Ancak birçok başarıya rağmen, Donizetti, librettolarının tahrif edilmesi ya da tüm operalarının iptal edilmesiyle sürekli olarak Neapolitan sansürü ile savaşmak zorunda kaldı. En son tartışmada, kral kendisi, 'Poliuto' operasının sahnelenmesini engellemek için müdahale etti. Sansürle yıllarca süren kavgaların ardından Donizetti, Paris'e kaçmak için hazırlıklara başlamıştı. Politik elit, kralın etrafında birleşti; Donizetti'nin planlarını engellemek, yalnızca politik ve sosyal manzarayı alt üst etmekle kalmaz, aynı zamanda kralın otoritesine ve itibarına da büyük zarar verirdi."
 elgar.510.g: "Kral konuştu, eşyalarını toplayabilir."
 elgar.510.h: "Donizetti'nin gitmesini engellemek için her şeyi yapmalıyız!"
 elgar.511.t: "Les Martyres, 1840"
 elgar.511.d: "İtalyan besteci Gaetano Donizetti, Paris'e gelerek operası 'Les Martyres'i orada sahneledi ve halk tarafından son derece olumlu karşılandı."
 elgar.511.f: "Poliuto, Gaetano Donizetti'nin üç perdelik bir tragedia lirica (ya da trajik opera) eseridir ve 1641/42'de Pierre Corneille tarafından yazılan Polyeucte adlı oyuna dayanan İtalyanca librettoya sahiptir. Erken Hristiyan şehidi Saint Polyeuctus'un hayatını yansıtmaktadır. Bir yazar tarafından Donizetti'nin 'en kişisel operası' olarak kabul edilen Poliuto'nun müziği, 'Donizetti'nin bestelediği en güzel müziklerden' biri olarak tanımlanmıştır. Poliuto, 1838'de Napoli'deki Teatro San Carlo'da sahnelenmesi planlanan bir eser olarak yazılmıştır. Ancak provaların başlamasına yakın bir dönemde, Kral Ferdinand II, bir Hristiyan şehidinin sahnelenmesini engelleyerek prodüksiyonu yasakladı. Bu karara kızan Donizetti, Paris Opera'sı için bir komisyon almıştı ve San Carlo'ya, orijinal bir eserin yerine Poliuto'yu revize ederek bir Fransız metni yazmaya karar verdi ve 1839-40 yıllarında 'Les Martyres' olarak sahnelenmesini sağladı."
 elgar.511.g: "Bir İtalyan için fena değil."
 elgar.512.t: "Stabat Mater"
 elgar.512.d: "Gaetano Donizetti, Bologna'yı ziyaret ederek Gioachino Rossini'nin Stabat Mater'inin prömiyerini yönetti. Performans tam anlamıyla bir başarıydı."
 elgar.512.f: "Donizetti, Stabat Mater için Bologna'ya gittiğinde, Rossini üçüncü performansı izledi ve iki adam - her biri Bologna Konservatuvarı eski öğrencisi - ilk kez tanıştılar, Rossini, Donizetti için 'İtalya'da Stabat Mater'imi tam istediğim gibi yönetebilecek tek maestro sensin' dedi. Arkadaşları, özellikle kayınbiraderi Antonio Vasselli (Totò olarak bilinir), onu Bologna'da akademik bir pozisyon alması için sürekli olarak ikna etmeye çalıştılar, çünkü bu, besteciye çalışacak ve öğretecek bir yer sağlardı ve şehirler arasında sürekli seyahat etmekten yorulmazdı. Donizetti, halkın tepkisini şöyle bildirdi: 'Coşku anlatılamaz. İlk gecede bile, Rossini'nin katıldığı son prova sırasında, gün ortasında, evine 500'den fazla kişi eşlik etti. Aynı şey, salona çıkmadığı için, penceresinin altındaki ilk gecede oldu.'"
 elgar.512.g: "Rossini & Donizetti - Cennetteki bir eşleşme!"
 elgar.513.t: "Donizetti delirdi mi?"
 elgar.513.d: "Donizetti'nin hızla ilerleyen zihinsel çöküşü, Paris'te bir akıl hastanesine kapatılmasına yol açtı."
 elgar.513.f: "Donizetti, 1820'lerin başından itibaren uzun bir süre boyunca baş ağrıları, bazen sadece bir gün süren ateşli nöbetler ve zaman zaman depresif ruh halleri hakkında mektuplar yazdı. Hayatı boyunca gerçekleştirdiği olağanüstü çalışma miktarı ve özellikle Paris'e taşındıktan ve daha sonra Viyana'ya yerleştikten sonra uzun seyahatler, 1842-1843 yıllarında artan yorgunluk belirtilerine yol açtı. Ara sıra baş ağrıları ve ateşli nöbetler, baş dönmesi ve bazen 'başta hisler' ile birlikte oldu. 1845'te Donizetti'nin sağlığı hızla bozuldu ve Paris'te sokakta bayıldı. Doktorlar ona beste yapmayı yasakladı - bu da onu daha da depresif hale getirdi. Sonunda, sahtekâr bir şekilde, onu Ivry-sur-Seine'deki akıl hastanesine çektiler ve orada zorla yatırdılar. Hasta besteci, 'mahkum' olarak durumunu hemen fark etti ve çaresiz ve yürek burkan mektuplar yazdı, arkadaşlarından ve akrabalarından yardım istedi."
 elgar.513.g: "Belki de böyle daha iyidir."
 elgar.513.h: "Onu akıl hastanesinden çıkarın ve Bergamo'da dinlenmesini sağlayın."
 elgar.514.f: "Donizetti'nin akıl hastanesinden kurtarılması tam 17 ay sürdü. Planlanan bir ayrılık, doktorlar ve Paris polis müfettişi tarafından anlaşılmaz nedenlerle engellendi. Sadece diplomatik baskılarla, şimdi tamamen ilgisiz hale gelmiş besteci, kardeşi Francesco ve yeğeni Andrea tarafından geri getirilebildi. Baroness Rosa Rota-Basoni'nin kızı, besteciye her gün piyano çaldı ve eserlerinden aryalar söyledi, arkadaşı Dolci ona Bergamasca lehçesinde konuştu ve tenor Rubini onu ziyaret etti, ancak Donizetti herhangi bir tepki vermedi. Donizetti, felçle birlikte yüksek ateş ve ardında enfeksiyonlarla bir apoplejik inme sonrası bir hafta içinde öldü. Otopsi sonuçları, 'geçmişte' menenjitten ve kısmi olarak hasar görmüş, iltihaplanmış omurilikten kaynaklanan semptomları gösterdi."
 elgar.514.g: "Trajik bir ölüm."
 elgar.515.t: "Donizetti iyileşti"
 elgar.515.d: "Besteci yoğun bir tedavinin ardından iyileşti ve hayata olan coşkusu ile tekrar bestelemek istiyor."
 elgar.515.f: "Hükümetimizin baskısı altında Donizetti, akıl hastanesinden hızla çıkarıldı. Doktorların talimatıyla, Bergamo’daki memleketinde en iyi koşullarda birkaç aylık bir tedavi görmesi gerekiyordu. Kırsal yaşama dönüş, stresten ve baskıdan uzak kalmak ve köklerine dönmek, aylar süren bir süreçten sonra meyvesini verdi. Haftalarca ilgisiz kalan Donizetti, Baroness Rosa Rota-Basoni’nin kızı Giovanna tarafından söylenen kendi aryalarından birine yanıt verdi. Yerel lehçede aile üyeleriyle konuşması da her gün ilerleme gösterdi. Yıllarca süren terapi sonrası, bir zamanlar ölümcül derecede hasta olan besteci adeta yeniden hayata döndü."
 elgar.515.g: "Tıbbi bir mucize."
 elgar.516.t: "Liszt ve Thalberg"
 elgar.516.d: "Paris’te iki ünlü piyanist birbirine rakip oldu: Franz Liszt, en önemli yaşayan piyanist Sigismund Thalberg’a meydan okudu."
 elgar.516.f: "1835/36 kışında Sigismund Thalberg, Paris’te Avusturya elçiliğinin sekreteri tarafından verilen özel bir konserde sahneye çıktı. Rossini ve Meyerbeer dahil olmak üzere oradaki sanatçılar tarafından coşkuyla karşılandı ve yeni bir piyano tarzının mucidi olarak övüldü. Franz Liszt’in Lyon’daki konserlerinden 500-600 frank kazanırken, Thalberg, İtalyan Tiyatrosu’ndaki tek bir konserden 10.000 frank kazandı. Thalberg’in ikinci Paris ziyareti öncesinde Liszt, ima ve polemiklerle dolu bir eleştiri yayınladı. Liszt’e göre Thalberg’in başarısı tamamen propaganda sayesindeydi. Thalberg, Şubat 1837’den itibaren tekrar Paris’e geldi ve yeniden övgüyle karşılandı. 31 Mart’ta her iki sanatçı, Prenses Belgiojoso tarafından düzenlenen bir hayır etkinliğinde performans sergiledi."
 elgar.516.g: "Thalberg daha iyiydi."
 elgar.516.h: "Liszt daha iyiydi."
 elgar.517.t: "Beşikten Mezara"
 elgar.517.d: "Roma’da Franz Liszt son senfonik şiirini tamamladı. Müzik çevresi, bu bestecinin son 'hatası' hakkında ne düşüneceğini bilmiyor."
 elgar.517.f: "Hayatının son yıllarında Liszt giderek daha fazla kutsal müziğe ve kilise müziğine yöneldi. Son ton şiiri 'Beşikten Mezara' bu nedenle tüm seleflerinden farklıydı. Liszt, Macar ressam Mihály Zichy’nin bir çiziminden ilham aldı. Eserin büyük bölümleri güçlü bir orkestra gerektirmiyor; özellikle başlangıç oda müziği gibi. Müzikal materyalin zayıf olduğu birçok ses adası oluşuyor ve solo pasajlar nadir değil, özellikle bölümlerin sonunda. Kullanılan armonikler de gelecek zamanın habercisi. Ancak yaşamı boyunca, müzik eleştirmenleri eseri 'yaşlı bir adamın hatası' olarak değerlendirdi."
 elgar.517.g: "Gelecek nesiller bunu anlayacak."
 elgar.518.t: "Lohengrin"
 elgar.518.d: "Richard Wagner’in 'Lohengrin'inin prömiyeri sadece dolu bir salonla değil, Almanya’da Wagner için adeta bir hayranlık uyandırdı."
 elgar.518.f: "Lohengrin, Alman besteci Richard Wagner tarafından yazılmış üç perdelik romantik bir operadır. Lohengrin ile Wagner, tamamen bestelenmiş müzikal drama formunu yarattı. Eser, bireysel bölümlere ayrılmamış, perdeler boyunca kesintisiz olarak oynanmıştır. Wagner böylece aria, resitatif ve koro parçalarıyla klasik sayı operalarının yapısından ayrılır. Sahne karakterlerinin iç yaşamını anlaşılır müzik motiflerine çevirebilmek için leitmotif’ler (örn. Kutsal Kase motifi ve soru yasağı motifi) kullanmıştır. Opera, diğer sanat eserlerine de ilham kaynağı olmuştur. Bavyera Kralı II. Ludwig, şatosuna Lohengrin’in Şövalyesi’nden esinlenerek Neuschwanstein adını vermiştir."
 elgar.518.g: "İlham verici."
 elgar.519.t: "Geleceğin Sanat Eseri"
 elgar.519.d: "İsviçre’deki konaklaması sırasında, besteci Richard Wagner, Alman ve uluslararası estetik anlayışı için çığır açıcı olacak çok sayıda müzik ve sanat üzerine yazı yazdı."
 elgar.519.f: "'Geleceğin Sanat Eseri', Richard Wagner tarafından 1849-1852 yılları arasında Zürih’te yazılmış bir sanat teorisi yazısıdır. 'Sanat ve Devrim' adlı eserinde olduğu gibi Wagner, sanatların çöküşünü eleştirir ve sanatların yeni birliği, yani 'Gesamtkunstwerk' modelini geliştirir. Önceki yazılarında olduğu gibi Wagner, Yunan sanatının Yunan dini ve mistisizmine bağlı olduğuna ve dinin yok edilmesiyle sanatın da çözülerek 'bireysel sanatlar' (drama, müzik ve dans) haline geldiğine inanıyordu. Kelimeye eşlik eden saf müziğin çoraklaştığını yakınır. Açıklamalarının devamında, farklı sanatların Antik Çağ’daki ideal durumundan kendi zamanındaki çöküşüne kadar gelişimini ayrıntılı olarak açıklar. Bir sonraki ve en önemli yazılı eserinde, Opera ve Drama’da, müzik ve şiirin optimal 'birliğini' nasıl hayal ettiğini çok ayrıntılı ve teorik olarak açıklar. Bir süre sonra 'pratik' uygulamaya geçerek yıllar süren çalışmanın ardından 'Nibelungen Yüzüğü' müzik dramasını yazmış ve bestelemiştir."
 elgar.519.g: "Bu zor okunan kutulu cümleleri kim anlayacak?"
 elgar.520.t: "Tristan ve Isolde"
 elgar.520.d: "Tristan und Isolde, Richard Wagner'in üç perdeden oluşan operasıdır. Wagner’in yazdığı Almanca librettosuna dayanır ve büyük ölçüde Gottfried von Strassburg’un 12. yüzyıl aşk hikâyesi Tristan ve Isolde üzerine kuruludur. Opera, Batılı klasik besteciler arasında son derece etkili olmuş ve Gustav Mahler, Richard Strauss, Alban Berg, Arnold Schoenberg ve Benjamin Britten gibi bestecilere doğrudan ilham vermiştir. Claude Debussy, Maurice Ravel ve Igor Stravinsky gibi diğer besteciler ise tarzlarını Wagner’in müzikal mirasına karşıt olarak şekillendirmişlerdir. Birçok kişi Tristan’ı, geleneksel armoni ve tonaliteden uzaklaşmada bir dönüm noktası olarak görür ve 20. yüzyıl klasik müziğinin yönünü belirlemede temel hazırlık sayar."
 elgar.520.f: "'Bana her zaman en büyük hayranlık uyandıran eser Tristan olmuştur. Bu devasa yapının karşısında titreyerek hayrete düşerim ve hâlâ bir insanın bunu tasarlayıp hayata geçirmiş olmasının inanılmaz olduğunu düşünürüm. İkinci perdeyi, ruhun yaratmış olduğu en yüce eserlerden biri kabul ediyorum. Bu ikinci perde harika, harika, tarif edilemeyecek kadar harika.' - Giuseppe Verdi"
 elgar.521.t: "Richard Wagner Festivali"
 elgar.521.d: "Richard Wagner'in Festspielhaus'unun kurulması, 19. yüzyıl müzik kültürünün doruk noktalarından biri olarak kabul edilir."
 elgar.521.f: "Bayreuth Festivali, her yıl düzenlenen ve 19. yüzyıl Alman bestecisi Richard Wagner’in operalarının sahnelendiği bir müzik festivalidir. Wagner, özellikle anıtsal eseri 'Der Ring des Nibelungen' ve 'Parsifal'i sergilemek için özel bir festival fikrini bizzat ortaya atıp desteklemiştir. Gösteriler, Wagner’in tasarımını ve inşasını bizzat denetlediği, devasa orkestraları ve özel sahne anlayışını karşılamak için pek çok mimari yenilik barındıran Bayreuth Festspielhaus’ta gerçekleştirilir. Festival, Wagnerciler ve klasik müzik tutkunları için bir hac merkezi hâline gelmiştir. Bu eşsiz müzik olayında Kaiser Wilhelm, Brezilya İmparatoru II. Dom Pedro, Kral Ludwig gibi soyluların yanı sıra filozof Friedrich Nietzsche, Anton Bruckner, Edvard Grieg, Pyotr Çaykovski, Franz Liszt ve genç Arthur Foote gibi ünlü besteciler de bulunmuştur."
 elgar.521.g: "Alman kültürünün zirvesi!"
 elgar.523.t: "Tannhäuser Skandalı"
 elgar.523.d: "Richard Wagner'in Tannhäuser operasının bir sahnelenişi, tüm Paris toplumunu ayağa kaldıran gerçek bir skandala yol açtı. Wagner’in Fransız opera geleneklerine aykırı davranışlarının yanı sıra, Alman ve Fransız müzik dünyaları arasındaki husumet de rol oynadı."
 elgar.523.f: "Wagner’in Paris’te işleri her zaman zordu; sadece popüler Giacomo Meyerbeer ile rekabetinden değil. Operası Tannhäuser’i Grand Opera’ya uyarlamak için Fransız geleneklerine uymak zorunda kaldı – örneğin balenin dâhil edilmesi gibi. Ancak Wagner, bu dayatmalara şiddetle direndi ve yalnızca bir Bacchanal ekledi. Bunun yanında, son derece uzun provalar yüzünden müzisyenleri de kendisine karşı soğuttu. Prömiyer tam bir skandal oldu: Paris ‘Jockey Club’ beyefendileri, uvertürden sonra baleyi göremeyince ihanete uğradıklarını düşündüler. Zira onlar müzik için değil, güzel kadınları seyretmek ve ardından kuliste ziyaret etmek için gelmişlerdi. İstediğini bulamayan bu beyefendiler, ıslıklar ve bağırışlarla etkinliği sabote ettiler. Ertesi gün de farklı olmadı: Paris basını temsili yerden yere vurdu. Sadece Fransa değil, Almanya’daki dostları ve düşmanları da tepkimizi yakından izleyecek."
 elgar.523.g: "Bir daha asla Paris'e ayak basmamalı!"
 elgar.523.h: "Herr Wagner’i yatıştırmamız lazım."
 elgar.524.t: "Holberg Süiti"
 elgar.524.d: "Oslo’da ilk kez sahnelenen Edvard Grieg’in Holberg Süiti, yalnızca bir müzik başyapıtı olmakla kalmamış, aynı zamanda Norveç ulusal duygularını da canlandırmıştır."
 elgar.524.f: "Holberg Süiti, 'Eski Tarzda Süit' alt başlığını taşır. Beş bölümden oluşan ve 18. yüzyıl dans formlarına dayanan bu eser, Edvard Grieg tarafından 1884’te, Dano-Norveçli hümanist oyun yazarı Ludvig Holberg’in (1684-1754) doğumunun 200. yıldönümü için bestelenmiştir. 19. yüzyıl müziğinin, önceki yüzyılın tarz ve biçimlerinden yararlanmasının bir örneğidir. İlk başta piyano için yazılmış, bir yıl sonra bizzat Grieg tarafından yaylı orkestra için uyarlanmıştır. Süit, bir giriş ve bir dizi danstan oluşur. Bu eser, neoklasisizmin erken bir örneği olup, Grieg’in döneminde Holberg çağının müziği hakkında bilinenleri olabildiğince yansıtmaya çalışır. Peer Gynt’in eşlik müziği kadar ünlü olmasa da – ki o eser genellikle iki süite dönüştürülmüş biçimde çalınır – birçok eleştirmen Holberg Süiti’ni onunla eşdeğer bir ustalıkta görmektedir."
 elgar.525.t: "Yeni Ufuklar"
 elgar.525.d: "'Neue Magazin für Musik' dergisinde Robert Schumann, bir gecede aniden üne kavuşan yeni bir sanatçıdan bahsetti. Bu sanatçının adı Johannes Brahms'tı ve hem Schumann hem de eşi Clara üzerinde güçlü bir izlenim bıraktı."
 elgar.525.f: "'Ve o geldi, genç kan, beşiğinin başında nimetler ve kahramanlar nöbet tuttu. Adı Johannes Brahms, Hamburg'dan geldi, orada karanlık bir sessizlik içinde çalıştı, ancak zorlu sanat ortamlarında mükemmel ve hevesli bir öğretmen tarafından eğitildi, kısa süre önce saygın, tanınmış bir usta tarafından bana tavsiye edildi. Dışarıda da, bize şunu ilan eden tüm işaretleri taşıyordu: O, çağrılmış bir insandır.' - Robert Schumann"
 elgar.525.g: "Brahms Bey'den büyük şeyler bekliyoruz."
 elgar.526.t: "Gesang der Parzen"
 elgar.526.d: "Johannes Brahms’ın 'Kader Tanrıçalarının Şarkısı' adlı eseri Basel’de prömiyerini yaptı. İsviçre, Viyana ile birlikte Brahms’ın en önemli konaklama yerlerinden biriydi."
 elgar.526.f: "'Gesang der Parzen' (Kader Tanrıçalarının Şarkısı), Johannes Brahms’ın koro ve orkestra için yazdığı son bestesidir. Kantat Rinaldo op. 50 ve Alto Rapsodisi op. 53’ten 10 yıldan uzun bir süre sonra, Brahms yeniden Johann Wolfgang von Goethe’nin bir metnini kullandı. Max Kalbeck’e göre, Brahms bu eseri bestelemek için Viyana’daki Burgtheater’da İphigenia rolünde sahneye çıkan aktris Charlotte Wolter’den ilham almıştı. 13 Haziran 1896’da Brahms eser hakkında şöyle yazmıştı: 'Parzenlied’in altıncı kıtası üzerine sık sık felsefe yapılır. Bence, şüphesiz dinleyenin kalbi majör girişinde yumuşamalı ve gözleri yaşarmalıdır; ancak o zaman insanlığın sefaleti onu yakalar.'"
 elgar.526.g: "Hem harika hem de rahatsız edici."
 elgar.527.t: "Besteci Bir Portakal Plantasyonu Sahibi"
 elgar.527.d: "Ünlü yün girişimcisi Julius Delius’un oğlu, bir orgcudan dersler aldı ve ilk bestelerinden bazılarını yayımladı."
 elgar.527.f: "İngiltere doğumlu Frederick Delius, Alman yün tüccarı Julius Delius’un oğluydu. Babası onun şirkette halefi olmasını istiyordu, fakat o işlere pek ilgi göstermiyor, daha çok sanat ve müzikle ilgileniyordu. Bu nedenle, Delius Jr. Avrupa metropollerinin etkisinden uzak tutmak amacıyla Florida’daki bir portakal plantasyonuna gönderildi. Ancak bu gönderiliş, onun sonraki müzikal yaratıcılığı için olağanüstü bir önem taşıyacaktı. Jacksonville’de Delius, Katolik orgcu Thomas Ward ile tanıştı; Delius’a göre kendisine gerçekten bir şey öğreten tek kişiydi. Bir süre sonra Delius, ilk bestelerinden bazılarını Virginia’daki Danville’de yayımladı."
 elgar.527.g: "Bu işe yaramazdan ne olacaktı ki?"
 elgar.528.t: "New York’ta Bir Avusturyalı"
 elgar.528.d: "Avusturya’daki memleketinde çıkan anlaşmazlıklardan sonra Gustav Mahler, New York’ta eserlerinin çok iyi karşılandığı bir dinleyici kitlesi buldu. ABD müzik dünyasındaki bazı yetkililer onu uzun vadeli olarak görevlendirmek istiyor."
 elgar.528.f: "Kimileri Mahler adını duyunca heyecandan, ama çoğu öfkeden, Alman ceketini fazla dar buldu. İlk günden beri böyleydi. O, doğrudan etki eden, kışkırtıcı, rahatsız edici, şoke edici biriydi – fark etmez: o, en ufak bir temasla kıvılcımlar saçan ya da alevlenen elektriksel bir doğaya sahipti. Başlangıçta, elbette, yalnızca çılgınca popüler olmayan hâliyle ünlendi. Nefretin desteğiyle taşındı, kıskançlığın dikkatli ışığında, tüm gerçeğin uykusuz ve güçlü koruyucusu olan alay, haset ve iftirayla, her köşe başında yankılanan en yüksek ses taşıyıcıları tarafından ilan edilerek ünlü oldu. (...) Ve her gün şu söylendi: müzisyenlerine eziyet ediyor, onları insanlık dışı bir tempoda çalıştırıyor, neredeyse ölüme sürüklüyor, ellerinden gelse bir kaşık suda boğarlardı. Şarkıcılarını kısaltıyor, onları asker gibi talim ettiriyor, onlarla Büyük Türk’ün köleleriyle oynadığı gibi oynuyordu. (...) Varlığının yoğunluğu tüm New York şehrini doldurmuş gibiydi. - Felix Salten"
 elgar.528.g: "Ne garip bir adam."
 elgar.528.h: "Mahler Amerika’da kalmalı."
 elgar.529.t: "İskit Süiti"
 elgar.529.d: "Rus müziğinin en parlak genç yeteneklerinden Sergei Prokofiev, bugün skandal yaratan bir performansla izleyiciyi şoke etti."
 elgar.529.f: "Prokofiev başlangıçta bu müziği, konusu İskitler arasında geçen 'Ala i Lolli' adlı bale için yazmıştı. Rus şair Sergey Gorodetskiy’in senaryosuna göre bestelenen eser, Sergei Diaghilev’in siparişiyle ortaya çıktı. Ancak Diaghilev, eser tamamlanmadan önce notaları reddedince, besteci müziği konser için bir süite dönüştürdü. Bu performans, Prokofiev’in prömiyerleri arasında en büyük skandal oldu. O dönemin Konservatuvar müdürü Alexander Glazunov konser sırasında salonu terk etti, izleyicilerin çoğu öfkelendi ve eleştiriler yıkıcıydı. Ancak Prokofiev pek etkilenmedi ve ertesi gün Moskova’ya kısaca şunu yazdı: 'Gerçek bir gürültüyle geçti.'"
 elgar.529.g: "Bir başyapıt!"
 elgar.529.h: "İğrenç."
 elgar.530.t: "Ren Senfonisi"
 elgar.530.d: "Robert Schumann, Ren Nehri kıyısındaki Düsseldorf’ta bir iş kabul etti ve Köln Katedrali’ndeki inşaat çalışmalarından aniden ilham alarak yeni bir eser yazdı."
 elgar.530.f: "Robert Schumann, Romantik dönemin en temsilî bestecilerinden biri kabul edilir. 1850’de Ferdinand Hiller’in yerine müzik direktörü oldu ve Düsseldorf’a taşındı. Zayıf orkestra şefliği becerileri ve 'yaratıcı çöküş' nedeniyle alaya alınmasına rağmen, Schumann son senfonisi olan 'Ren Senfonisi'ni besteledi. Beethoven ve Mendelssohn’un senfonilerini örnek aldı, fakat aynı zamanda Ren bölgesindeki izlenimlerinden de ilham aldı. Schumann, Köln’e yaptığı yolculuğun ve katedrali görmesinin bu besteye başlıca ilham kaynağı olduğunu bizzat belirtmiştir. Eser, onun en ünlü bestelerinden biri hâline geldi."
 elgar.530.g: "Katedrali inşa etmeye devam etmek iyi bir fikir değil miydi?"
 elgar.531.t: "Schumann’ın İntihar Girişimi"
 elgar.531.d: "Besteci Robert Schumann bugün son anda nehirden kurtarıldı – görünüşe göre zihinsel bir karışıklık içinde hayatına son vermek istemişti. Onunla nasıl başa çıkılacağı hâlâ tamamen belirsiz."
 elgar.531.f: "10 Şubat 1854’te, Schumann’ın psikolojik acıları dramatik şekilde arttı. Başlıca 'işitme sorunlarından' şikayet ediyordu. Tınılar, akorlar, tüm müzik parçaları kafasında dolanıyor ve uykusunu çalıyordu. Bu sırada Schumann, eşi ve çocukları tarafından gece gündüz gözetim altındaydı ve zaten tıbbi kontrol altındaydı, fakat yine de 27 Şubat 1854’te fark edilmeden daireden çıkabildi. Yakındaki ponton köprüye yöneldi, korkuluğu aştı ve evlilik yüzüğünü suya attıktan sonra kendini nehre bıraktı. Köprü bekçisi ve diğer bilinmeyen kişiler tarafından kurtarıldı, eve götürüldü ve çağrılan bir doktor tarafından gözetildi. İntihar girişiminden sonra, Bonn yakınlarındaki Endenich’te 1844’te psikiyatrist Franz Richarz tarafından açılan akıl hastalarının bakım ve tedavi merkezine kabul edilmek istedi."
 elgar.531.g: "Yapabileceğimiz bir şey yok."
 elgar.531.h: "Onu Endenich yakınlarındaki modern akıl hastanesine gönderin."
 elgar.532.t: "Schumann’ın Ölümü"
 elgar.532.d: "Birkaç yıl süren zihinsel bozukluğun ardından, bir zamanlar umut vadeden müzikal yetenek Robert Schumann, dünyadan uzak bir akıl hastanesinde hayatını kaybetti."
 elgar.532.f: "Brahms, 31 Mart ve 19 Ağustos 1854’te Schumann’ı görebildi ama onunla konuşamadı. 11 Ocak, 23 Şubat ve 2 Nisan 1855’te ise detaylı bir şekilde konuşabildiler. Schumann o kadar iyiydi ki Brahms ile kare piyano çalabiliyor ve bir gözetmen eşliğinde Bonn tren istasyonuna kısmen eşlik edebiliyordu. 10 Nisan 1856’da Brahms, Schumann’ı zor bir durumda buldu. Schumann artık anlaşılır şekilde konuşamıyordu. 1 Mayıs 1856’da tıbbi kayıtlarda son kez Schumann’ın piyano çaldığı belirtildi. Çoğu zaman anlaşılır şekilde kendini ifade edemiyordu. Clara Schumann’ın Nisan 1856’dan itibaren Schumann’ı Düsseldorf’a götürme ve kendisi bakma planı gerçekleşmedi. Temmuz 1856 ortasından itibaren Schumann gittikçe daha az yemeye başladı. 26 Temmuz 1856’da 'yüz ve uzuvlarda çeşitli kas seğirmeleri' vardı. Mukuslu hırıltılar zatürreyi işaret ediyordu. Robert Schumann, 29 Temmuz’da hayatını kaybetti; yanında kimse yoktu."
 elgar.533.t: "Robert Schumann’ın mucizevi iyileşmesi"
 elgar.533.d: "Görünüşe göre Endenich sanatoryumundaki modern yöntemler etkili olmuş. Schumann iyileşme belirtileri gösteriyor, ancak işine dönmesi birkaç ay sürecek."
 elgar.533.f: "Schumann’ın mucizevi iyileşmesi, 1854 Eylül’ünde, 14. evlilik yıldönümlerinden kısa bir süre önce, Düsseldorf’un çöktüğünü ve Clara ile çocukların öldüğünü Peters’a anlatmasıyla başladı. Bu yanılgıyı ortadan kaldırmak için Peters, Clara Schumann’dan kocasına bir mektup istedi. Bu, kabulden bu yana ilk mektup alışverişine yol açtı. Artık Schumann tekrar kurum dışındaki hayata aktif katılım gösteriyordu. Çocukları, Johannes Brahms, Joseph Joachim ve yayınevleri ile yazışmalar yaptı. Eylül 1854 ile Mayıs 1855 arasında yaklaşık 25 mektup yazdı. Bu süre zarfında Schumann sık sık Endenich’ten ayrılmak istediğini belirtti. Arada bir piyano çaldı. Brahms’ın eserlerini inceledi. 11 Ocak 1855’te Johannes Brahms’tan ilk ziyareti aldı. O günden itibaren Schumann’ın durumu sürekli iyileşti ve doktorlar Clara Schumann’ın ziyaretine izin verdi. Onun ve Brahms’ın desteğiyle Schumann kısa sürede tekrar bestelemeye başladı ve böylece kendi kendini iyileştirme sürecini başlattı."
 elgar.533.g: "Ama bu nasıl mümkün olabilir?"
 elgar.534.t: "Tango"
 elgar.534.d: "Tango yorumcusu Carlos Gardel, Mi noche triste ile ilk plak hitini kaydetti."
 elgar.534.f: "Carlos Gardel, tango tarihinin en önde gelen figürüydü. 20. yüzyılın ilk yarısında dünya popüler müziğinin en etkili yorumcularından biriydi. Gardel, tüm zamanların en ünlü popüler tango şarkıcısıdır ve tüm dünyaca tanınır. 1917’de, Pascual Contursi ve Samuel Castriota’nın Mi noche triste eserini yorumlayarak tango-canción’u yarattı. 'Mi noche triste' ile duygusal tangonun doğuşu gerçekleşti. Yeni sözler ve müzik, nostaljik, melodramatik ve hüzünlü olup Buenos Aires ve halkını yansıtıyordu."
 elgar.534.g: "Arjantin Müziği’nin Zaferi."
 elgar.601.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName]’ın Ölümü"
 elgar.601.d: "[SCOPE.sCharacter('elgar_composer_scope').GetFullName]', ülkemizin en büyük sanatsal zekalarından biri ve müzik dünyasında parlayan bir yıldız, bugün vefat etti. Yerine doldurulması güç bir boşluk bırakıyor."
 elgar.601.g: "Müzik tarihinin bir devi aramızdan ayrıldı."
 elgar.603.t: "Rossini Bologna’dan Ayrılıyor"
 elgar.603.d: "Rossini, Bologna’dan ayrılmaya karar verdi. Bu haber, sadece şehrin sakinleri için bir sürpriz olmakla kalmadı, tüm ülkeyi üzdü."
 elgar.603.f: "Gioacchino Rossini, Bologna ve böylece Papalık Devletleri’nden ayrılmaya karar verdiğinde, opera sahnesinden emekli olmasının üzerinden yaklaşık 20 yıl geçmişti. Yine de Rossini hâlâ son derece saygı gören bir figür ve İtalya’nın en sevilen bestecilerinden biriydi. Rossini’nin Paris’e dönmesinin ana nedenlerinden biri, sağlık durumuydu. Avrupa müzik yıldızı olarak geçirdiği son yıllarda hem bedensel hem de zihinsel olarak bozulmuştu. Paris, daha iyi sağlık hizmetleri vaat ediyordu; bu nedenle Rossini emekliliğini orada geçirmeyi düşündü."
 elgar.603.g: "Ama tortellini’sini bitirmedi!"
 elgar.609.d: "Franz Lachner bugün orkestra şefliği kürsüsünden emekli olduğunu açıkladı. Kariyeri için artık bir gelecek görmüyor."
 elgar.609.f: "Bir dizi olay, Franz Lachner’ın müzik dünyasından erken ayrılmasına yol açtı. Bunun belirleyici nedeni Richard Wagner’in yeni müziği ve onun müttefiklerinin zaferiydi. Schubert ve Beethoven’ı tanıyan Lachner bu gelişimi takip edemedi ve etmek istemedi. Dünyanın ilerlediğini, kendisinin ise geçmişin bir kalıntısı olarak görüldüğünü anlayan Rossini gibi, Lachner de eleştirmenlerin alay ve kötülükleri nedeniyle geri çekildi."
 elgar.609.g: "[GetPlayer.GetName] için bir kayıp."
 elgar.613.f: "Gaetano Donizetti, uzun ve dolu dolu bir yaşamın ardından, ikinci eşinin kucağında ve oğullarıyla çevrili olarak bu sabah huzur içinde vefat etti. Birkaç orkestra, yüzlerce meşale taşıyıcı ve binlerce izleyici ile düzenlenen cenaze töreni, mükemmel bir hayat yaşadığı söylenen bir adama veda niteliğinde oldu."
 elgar.614.f: "1867’de Berlioz, oğlunun Havana’da sarı humma nedeniyle öldüğünü öğrendi. Macdonald, Berlioz’un yasını hafifletmek için St. Petersburg ve Moskova’da planlanan konser serisine gitmiş olabileceğini öne sürüyor; fakat bu gezi, onu canlandırmaktan çok kalan gücünü tüketti. Akdeniz ikliminde iyileşmek için Nice’e gitti, ancak kıyıda kayalara düşerek muhtemelen bir felç sonucu, Paris’e dönmek zorunda kaldı ve birkaç ay boyunca iyileşti. Ağustos 1868’de kısa bir süre Grenoble’a gidip bir koro festivalini değerlendirebileceğini hissetti. Paris’e döndükten sonra giderek zayıfladı ve 8 Mart 1869’da 65 yaşında Rue de Calais’taki evinde vefat etti. Montmartre Mezarlığı’na, iki eşi ile birlikte gömüldü; eşleri daha sonra mezardan çıkarılarak yanına yeniden defnedildi."
 elgar.615.f: "Carolyne zu Sayn-Wittgenstein ile başarısız evliliğin ardından Liszt, giderek daha fazla dini temalı bestelere yöneldi. 1870’e kadar çoğunlukla Roma’da kalan Liszt, kısmen sıradan, kısmen manastır yaşamı sürdürdü ve 1863 yazında bir manastıra çekildi; Papa IX. Pius da onu ziyaret etti. 1865’te tonsür geçirdi ve dört küçük rütbeyi aldı. O tarihten itibaren, bir din adamı olarak, Roma yakası taktı ve abbé olarak hitap edildi. 1886’da Liszt, Wagner Festivali’ne katıldı. Bu gezi sırasında Liszt zaten ciddi şekilde hastaydı ve 31 Temmuz 1886’da birkaç gün içinde zatürre nedeniyle öldü. Richard Wagner’in arkadaşı ve doktoru Bernhard Schnappauf, ölüm yatağında son günleri geçirdi ve Liszt’in sessiz ve onurlu bir şekilde vefat ettiğini bildirdi. Liszt gözlerini kapattı ve ölüm maskesi yapıldı; eski geleneğe göre kefen ve yastık kılıfı hakkına sahipti."
 elgar.616.f: "16 Eylül 1882’de Wagner ailesiyle Venedik’e gitti ve Franz Liszt ile birkaç hafta geçirdi. 25 Aralık’ta, Cosima için doğum günü hediyesi olarak, Teatro La Fenice’de son kez ortak bir konser verdi; C majöründe gençlik senfonisini yönetti. 13 Şubat 1883’te ailesiyle birlikte yaşadığı Palazzo Vendramin-Calergi’nin yan kanadında kaldı. Saat 15 civarında, aile Wagner’i beklerken, kalp krizi geçirmesine rağmen, çalışma odasında 'Yine de, kadının özgürleşme süreci sadece coşkulu kasılmalarla ilerler. Aşk - Trajedi' yazdığı bir deneme üzerinde çalışıyordu. Hizmetçi, onu masasında eğilmiş şekilde buldu. Wagner, 'Eşim ve doktor' dedi ve bayılarak Cosima’nın kollarında saat 15:30 civarında vefat etti."
 elgar.617.f: "Edvard Grieg, 4 Eylül 1907’de Bergen, Norveç’teki Belediye Hastanesi’nde kalp yetmezliğinden 64 yaşında vefat etti. Uzun bir hastalık dönemi geçirmişti. Son sözleri: 'Peki, öyle olacaksa.' Cenaze töreni, evinin bulunduğu şehirde 30.000 ila 40.000 kişi tarafından izlendi. Grieg’in isteğine uyarak, arkadaşının orkestrasyonu ile kendi 'Rikard Nordraak Anısına Cenaze Marşı' çalındı; ayrıca Chopin’in Piyano Sonatı No. 2’den Cenaze Marşı çalındı. Grieg, o yıl Bergen’de açılan ilk Norveç krematoryumunda yakıldı ve küllerini evine yakın bir dağ mezarına, Troldhaugen’e yerleştirildi. Eşi vefat ettikten sonra, küller onun yanına kondu."
 elgar.618.f: "Brahms, 3 Nisan 1897 sabah erken saatlerde, 63 yaşında, 1872’den beri yaşadığı Karlsgasse 4’teki dairesinde vefat etti – bazı biyografiler karaciğer kanseri, daha yeni bilgiler pankreas kanseri diyor. Son kamuya açık görünümü, 7 Mart 1897’de Hans Richter’in 4. Senfoni’yi yönetmesini izlemekti; dört bölümün her birinin ardından ayakta alkışlandı. Cenaze evinde Carl Kundmann ölüm maskesini aldı, Ludwig Michalek son pastel portresini yaptı; 6 Nisan’da Lutheran Şehir Kilisesi’nde adak töreni gerçekleştirildi."
 elgar.619.f: "'Sabah ve Viyana. Bir kaos. Henüz kimsenin bilemeyeceği ayrıntılara tutunuyorsun. Küçük kızının yanındaki küçük mezarlığa gömülecek. Ceset getirildi. Diğer sabah. 'An den Langen Lüssen' yolu, kırsal alandan geçerek servilere çıkar. Şapel küçük, sadece tabut ve birkaç çelenk için. Diğerleri mezara giden yolları doldurdu. Bir kadın geçip diğerine dedi ki: 'Şimdi içi huzur içinde. Her şey onun için çok küçüktü.' Grinzing’deki kilise küçük, mezarlık dar. Viyanalılar için bir gösteri yaklaşıyor. Kilise ve mezarlık çevrelenecek. Sadece kartlar erişim sağlayacak. Franz Schalk, Gregor ve yönetim kurulu, cenaze günü operanın kapalı olmasını talep etmiş. Bununla ilgili bir kelime yok. Mahkeme, Viyana belediyesi hareket etmiyor. Sonra kutlama. Tabut dışarı taşınırken kilise önündeyiz. Yağmur yağıyor. Bir bağ yolu ile mezara daha hızlı ulaşıyoruz. Konvoy geliyor. Yağmur duruyor. Bir bülbül öter, toprak parçaları düşer. Bir gökkuşağı. Ve yüzlerce kişi sessiz.' - Paul Stefan"
 elgar.701.g: "Bu harika bir performanstı."
 elgar.701.h: "Bu dahiyane adamı işe alın!"
 elgar.706.g: "20 yaşında, böyle bir iş için biraz fazla genç değil mi?"
 elgar.701.t: "Grande symphonie funèbre et triomphale"
 elgar.701.d: "Temmuz Devrimi’nin onuncu yıldönümünü anmak için Hector Berlioz, halkın büyük beğenisini toplayan bir eser besteledi."
 elgar.701.f: "Fransız hükümeti, Louis-Philippe I’i iktidara getiren Temmuz Devrimi’nin onuncu yıldönümü kutlamaları için Berlioz’a bir senfoni sipariş etti. Bu vesileyle Bastille Meydanı’na Temmuz Sütunu da dikiliyordu. Berlioz rejime pek sempati duymasa da, hükümetin kendisine 10.000 frank teklif etmesi üzerine eseri yazmayı kabul etti. Başlangıçta 'Askerî Senfoni' adını taşıyan (sonradan 'Funèbre et Triomphale Senfonisi' olarak yeniden adlandırıldı) eser, Berlioz’un Romeo ve Juliet’te kurduğu modeli izlemek yerine, Beethoven öncesi dönemin anıtsal Fransız tören müziği geleneğine dönüş niteliğindeydi. Berlioz, Ocak 1842’de partisyonu gözden geçirerek isteğe bağlı yaylı çalgılar bölümü ve Antony Deschamps’ın metnine dayalı bir final korosu ekledi. Richard Wagner, bu yeni versiyonun 1 Şubat 1842’de Salle Vivienne’deki icrasına katıldı. 5 Şubat’ta Robert Schumann’a şunu söyledi: Berlioz’un senfonisinin son bölümündeki bazı pasajlar öylesine 'muhteşem ve yüceydi ki asla aşılamazlar.'"
 elgar.702.t: "Weimar’da Liszt"
 elgar.702.d: "Uzun yıllar süren konser turlarının ardından, piyano virtüözü ve besteci Franz Liszt Weimar’a yerleşmeyi düşünüyor."
 elgar.702.f: "Weimar yılları, Franz Liszt’in sanatsal açıdan en verimli dönemi oldu. Si bemol minör Piyano Sonatı, 'Harmonies poétiques et religieuses' döngüsü, on beş Macar Rapsodisi, çok sayıda transkripsiyon, piyano düzenlemesi ve önceki piyano eserlerinin revizyonları gibi birçok piyano eserini Weimar’da yazdı. Daha önce tasarladığı iki piyano konçertosu da burada nihai formunu aldı. Liszt, Weimar’da dönemin kimi zaman tartışmalı bestecilerinin eserlerini yönetti ve onların operalarını sahneledi. Özellikle yakın dostu Richard Wagner’in eserlerini yönetti; 1849’daki Dresden ayaklanmasından sonra onun Zürih’e kaçmasına da yardım etti. Sonraki yıllarda Wagner’i hem maddi hem de manevi açıdan destekledi ve onunla yoğun bir mektuplaşma sürdürdü. Daha sonra Liszt ve Wagner sık sık birlikte şef olarak sahneye çıktılar. 1865’ten itibaren ise Wagner’in Liszt’in kızı Cosima ile ilişki yaşamasının ardından ilişkileri uzun süre soğudu."
 elgar.703.t: "Rienzi"
 elgar.703.d: "Genç bir besteci, Dresden’de ve uluslararası sanatçılar arasında 'Rienzi' adlı operasıyla büyük etki bıraktı. Onun adı Richard Wagner."
 elgar.703.f: "'Hiçbir sonraki deneyim, Rienzi’nin ilk sahnelenişinde hissettiğim duygulara uzaktan bile benzeyen duygular yaşatmadı. Eserlerimin tüm sonraki prömiyerlerinde, başarılarına dair fazlasıyla haklı kaygılar hislerime öylesine hâkim oldu ki, asla onları gerçekten tadamadım ya da izleyicilerin davranışlarına fazla dikkat edemedim. (...) Rienzi’nin ilk başarısı şüphesiz en baştan garanti altına alınmıştı. Ama halkın bana olan desteğini böylesine gürültülü biçimde ilan etmesi olağanüstüydü... Tiyatro ile bağlantılı herkes öylesine olumlu haberler yaymıştı ki, tüm halk adeta bir mucize beklercesine sahnelemeyi gözlüyordu... O akşamki hâlimi hatırlamaya çalıştığımda, bunu ancak bir rüyanın tüm özelliklerine sahip bir durum olarak hatırlayabiliyorum.' - Richard Wagner"
 elgar.704.t: "La minör Piyano Konçertosu"
 elgar.704.d: "Edvard Grieg’in bir piyano konçertosu bugün Kopenhag’da dünya prömiyerini yaptı. Şimdiden onun en popüler eserlerinden biri olacağı öngörülüyor."
 elgar.704.f: "Op. 16 La minör Piyano Konçertosu, Edvard Grieg tarafından 1868’de bestelenmiş ve bestecinin tamamladığı tek konçerto olmuştur. 24 yaşındaki Grieg’in Danimarka’nın Søllerød kentinde, iklimden faydalanmak için yaptığı ziyaretlerden biri sırasında yazdığı eser, bestecinin Norveç halk müziğine duyduğu ilgiyi yansıtır. Açılış kısmı, Grieg’in memleketinin halk müziğine özgü olan, düşen küçük ikili ve ardından düşen büyük üçlü motifine dayanır. Eser, 3 Nisan 1869’da Kopenhag’da, Edmund Neupert’in solistliği ve Holger Simon Paulli’nin şefliğiyle prömiyerini yaptı. Bazı kaynaklara göre, iyi bir piyanist olan Grieg’in kendisinin solist olması düşünülmüştü, ancak Christiania’daki (bugünkü Oslo) orkestra ile olan yükümlülükleri nedeniyle katılamadı. Prömiyere katılanlar arasında Danimarkalı besteci Niels Gade ve Rus piyanist Anton Rubinstein da vardı; Rubinstein, bu özel gün için piyanolarından birini sağladı. Grieg, eseri en az yedi kez gözden geçirdi; genellikle ince dokunuşlar olsa da bu revizyonlar toplamda 300’den fazla değişiklik getirdi."
 elgar.705.t: "Haydn’ın Bir Teması Üzerine Varyasyonlar"
 elgar.705.d: "Besteci Johannes Brahms bugün yeni bir başyapıtını icra etti, fakat aynı zamanda Viyana’ya kalıcı olarak yerleşmeyi düşünüyor."
 elgar.705.f: "'Haydn’ın Bir Teması Üzerine Varyasyonlar' op. 56a, Johannes Brahms’ın orkestra için yazdığı bir varyasyon eseridir. 1873 yazında Tutzing’de bestelenmiştir. Prömiyeri, 2 Kasım 1873’te Viyana’da, Brahms’ın yönetiminde gerçekleşti. Bu eser, Brahms’ın Viyana’daki yaşamını kutlamak istediği bir döneme denk düşer. Bir yandan yıllar önce Detmold ve Hamburg’dan hayal kırıklığıyla ayrılmıştı; öte yandan, büyük klasik rol modellerinin yaşamış olduğu yerde yaşamak ve Viyana geleneğini sürdürmek için çabalamaktaydı."
 elgar.706.t: "Mahler’in İlk Görünüşü"
 elgar.706.d: "Bad Hall’de genç ve yetenekli şef Gustav Mahler ilk kez Kapellmeister (orkestra şefi) görevini üstlendi. Önümüzdeki yıllarda kariyer basamaklarını tırmanarak Viyana Devlet Operası’na kadar yükselecekti."
 elgar.706.f: "'Ve işte oradaydı, Pollini’yle ilk görüşmemden çıktığımda tiyatro bürosunda bizzat kendisi: solgun, ince yapılı, kısa boylu, uzun yüzlü, dik alnı simsiyah saçlarla çevrili, gözlüklerinin arkasında önemli bakışlar, yüzünde hem acının hem mizahın çizgileri; başka biriyle konuşurken yüzünde olağanüstü bir ifade değişimi beliriyor, E.T.A. Hoffmann’ın fantezilerini okuyan genç birinin hayal edebileceği en ilginç, şeytani, ürkütücü Kapellmeister Kreisler suretini ortaya çıkarıyordu; bana müzikal yeteneğim ve bilgim hakkında nazikçe sorular sordu — ki ben hem utangaçlık hem özgüven karışımı bir şekilde cevap verdim, bu da onu gözle görülür şekilde memnun etti — ve beni adeta sersemlemiş ve sarsılmış bir halde bıraktı. (...) Mahler bana yüzünde ve tavırlarında hem dâhi hem de demon gibi göründü (...)' - Bruno Walter"
 elgar.707.t: "2 Numaralı Piyano Konçertosu"
 elgar.707.d: "Birçok aksiliğin ardından besteci Sergei Rahmaninov etkileyici bir dönüş yaptı: İkinci Piyano Konçertosu çılgınca alkış aldı."
 elgar.707.f: "1897’de Birinci Senfoni’nin felaketle sonuçlanan prömiyerinden sonra Rahmaninov üç yıl boyunca beste yapmasını engelleyen bir ruhsal çöküntü yaşadı. Depresyon enerjisini tüketmesine rağmen sahneye çıkmaya devam etti. Şeflik ve piyano dersleri, maddi durumunu hafifletmek için gerekli hale geldi. 1899’da Londra’da İkinci Piyano Konçertosu’nu çalması gerekiyordu, ancak hastalığı nedeniyle henüz bestelemediği için onun yerine başarılı bir şeflik çıkışı yaptı. Akrabaları onu nörolog Nikolai Dahl ile tanıştırmaya karar verdi; Rahmaninov Ocak-Nisan 1900 arasında her gün onu ziyaret etti ve bu tedavi sağlığını ve beste yapma güvenini geri kazandırdı. Besteci, bu konçertoyu kendisini başarıyla tedavi eden Dahl’a ithaf etti. 1908’de Londra Queen’s Hall’da Serge Koussevitzky yönetiminde konserini gerçekleştirdikten sonra The Times şu övgü dolu yorumu yazdı: 'Eserin doğrudan anlatımı, Rahmaninov’un icrasındaki olağanüstü hassasiyet ve titizlik, hatta kolları ve ellerinin hareketlerindeki sıkı ekonomi bile performansın tamlığını hissettirdi.'"
 elgar.708.t: "1 Numaralı Senfoni 'Klasik'"
 elgar.708.d: "Sergei Prokofiev, ilk senfonisiyle bir kez daha yükselen bir besteci olduğunu kanıtladı. Öte yandan, bu eser genç sanatçıyı daha iyi kazanç elde etmek için dünyaya açılmaya itti."
 elgar.708.f: "'Devlet Orkestrası ile Klasik Senfoni provasını ben yönettim, tamamen doğaçlama, partisyonu unutmuş ve aslında şeflik açısından hiç çalışmamıştım. Tam bir fiyasko olabilir diye düşündüm ama hiçbir şey olmadı, zaten partilerde o kadar çok hata vardı ki oturum esasen düzeltme yapmakla geçti. Kislovodsk’ta yeni eserlerimi çalan bir 'Devrimci Orkestra’dan tepki görürüm diye kaygılanmıştım ama tam tersi oldu: çok sayıda genç kanla yenilenmiş Devlet Orkestrası esnekti, dikkatliydi ve Senfoniyi belli bir zevkle çaldı.' - Sergei Prokofiev"
 elgar.709.t: "Romeo ve Juliet"
 elgar.709.d: "Genç besteci Pyotr Çaykovski, Romeo ve Juliet uvertürünü sundu. İzleyici eseri karışık duygularla karşıladı."
 elgar.709.f: "Sadece kariyerinin başında değil, tüm yaşamı boyunca Çaykovski eleştirmenlere ve rakiplere karşı kendini kanıtlamak zorunda kaldı. Örneğin, Romeo ve Juliet uvertürü yayımlandığında başarısızlığa mahkûm edilmişti. Öte yandan, hayatı boyunca tekrar tekrar aldığı bu eleştiriler, besteciyi bu ve diğer eserlerini aşırı titizlikle gözden geçirmeye itti; Çaykovski kariyeri boyunca kendi eserlerinin en sert eleştirmeni olarak kaldı. Ayrıca, milliyetçi Rus eğilimli bestecilerin, sonradan onun en sert eleştirmenleri olacak olmalarına rağmen, tam da bu eseri övmeleri de ironikti. Bununla birlikte, Çaykovski en geç bu dönemde dönemin en önemli Rus bestecilerinden biri haline geldi ve birkaç yıl içinde yüzyılın başka hiçbir müzisyenin ulaşamadığı bir uluslararası şöhrete erişti."
 elgar.710.t: "Yaşa Verdi"
 elgar.710.d: "İtalyan Ulusal Devleti’nin kuruluşu ve Milano’nun topraklarımıza katılmasıyla, İtalyan müzik tarihinin en önemli figürlerinden birini, Giuseppe Verdi’yi, davet etme fırsatına sahibiz."
 elgar.710.f: "Giuseppe Verdi, İtalyan besteci ve siyasetçiydi; Gioachino Rossini, Vincenzo Bellini ve Gaetano Donizetti gibi 19. yüzyıl İtalyan müzik tiyatrosunun diğer öncüleriyle birlikte, tüm zamanların en büyük opera sanatçılarından ve bestecilerinden biri olarak evrensel biçimde kabul edildi. İtalya’nın birleşmesini amaçlayan Risorgimento hareketine sempati duydu ve kısa bir süre siyasi hayata aktif olarak katıldı; uzun yaşamı boyunca yurttaşları arasında benzersiz bir konum edindi, ülkenin birliğinin derin bir sanatsal sembolü haline geldi. Bu nedenle ölümünden bir ay sonra, Milan sokaklarından geçen görkemli ve bitmek bilmez cenaze alayı, 60 yıl önce yazdığı Nabucco’daki 'Va, pensiero' eşliğinde naaşını uğurladı; bu, İtalyanların kaybettikleri kahramanlarına karşı hislerini etkili bir şekilde dile getiriyordu. Bu olay, Verdi’nin müziğinin ulusal bilinçle ne kadar bütünleştiğini gösteriyordu. Onun eserleri hâlâ dünyanın dört bir yanındaki tiyatrolarda en çok bilinen ve sahnelenenler arasındadır; özellikle Aida (1871), yukarıda sözü edilen Nabucco (1842) ve sözde 'Verdi üçlüsü': Rigoletto (1851), Il Trovatore (1853) ve La traviata (1853)."
 elgar.711.t: "Bahar Senfonisi"
 elgar.711.d: "Robert Schumann’ın Birinci Senfonisi, bugün Felix Mendelssohn Bartholdy yönetiminde seslendirildi. Schumann, önemli piyanist Clara (kızlık soyadı Wieck) ile evli ve bugüne kadar besteci olarak değil, daha çok müzik eleştirmeni olarak dikkat çekti. Piyano eserleri hakkında görüşler farklılık gösteriyor."
 elgar.711.f: "Franz Schubert dışında, hiç bir Almanca konuşan besteci yaşamı boyunca Robert Schumann kadar yanlış anlaşılmadı. Schubert’in önemi ancak erken ölümü sonrasında kabul görürken, Schumann hem deha olarak başladı hem de yetenek olarak bittiği suçlamasıyla karşı karşıya kaldı. Çağdaşları çoğu zaman onun eserlerine erişemedi ya da eserlerini anlayamadı. Bugün ününü oluşturan piyano eserleri, o dönemde çoğunlukla bilinmiyordu. Alaycılar onu yalnızca piyanist Clara Schumann’ın yanındaki adam olarak gördü. Kendi memleketi Saksonya’da Mendelssohn’un gölgesinde kaldı. Wagner daha sonra ona karşı çıktı, Brahms ise Clara ve Robert’ın yakın dostu oldu. Liszt, Schumann’ı Almanya’da müzik ilerlemesinin öncüsü olarak gördü, ancak repertuarına Schumann eserlerini dahil ettiğinde izleyici başarısı elde edemedi. Önemli bir müzik kurumunda kalıcı bir pozisyon umudu defalarca boşa çıktı. Schubert gibi, Schumann da erken ve trajik bir sona ulaştı."
 elgar.712.t: "Kral Olaf"
 elgar.712.d: "Edward Elgar, son yıllarda kantatları ve koro eserleriyle öne çıktı. En son eseri 'Kral Olaf’ın Destanından Sahne ve Görüntüler', izleyiciler tarafından iyi karşılandı."
 elgar.712.f: "1890’larda Edward Elgar, önemli bir İngiliz besteci olarak artan bir üne kavuştu. Başlangıçta kıta Avrupası etkisinde – 'Kral Olaf’ta da Wagner tarzı izler görülüyor – yavaş yavaş kendi ses dilini buldu; bu da sonraki İngiliz bestecileri tamamen yeni yollar denemeye teşvik etti. Elgar, sadece müzikal olarak değil, sosyal olarak da bir dışlanmış hissetti. Akademik çevrelerin hakim olduğu müzik dünyasında, kendi kendini yetiştirmiş bir besteciydi; Protestan İngiltere’de Katolikliği bazı çevrelerce şüpheyle karşılanıyordu; Viktorya ve Edward dönemi İngiltere’sinde sınıf bilincinin hâkim olduğu toplumda, tanınmasına rağmen mütevazı kökenleri konusunda son derece hassastı. Yine de, Elgar, Henry Purcell’den bu yana en önemli İngiliz besteci olarak kabul edilebilir."
 elgar.713.t: "Hofball Müzik Direktörü"
 elgar.713.d: "Hofball müzik direktörlüğü pozisyonu yıllardır açıktı. Aslında bu prestijli pozisyon, besteci Johann Strauss’a verilmesi planlanmıştı. Ancak daha önce politik nedenlerle bu onur kendisine verilmemişti. Şimdi, erken ölen bestecinin oğluna bu pozisyonun verilmesi yönünde artan sesler var."
 elgar.713.f: "Johann Strauss, Avusturya-Alman bir orkestra şefi ve besteci olup uluslararası alanda 'Vals Kralı' olarak tanınıyordu. Altı yaşında ilk valsini bestelemiş ve babasının memur olma planına karşı gizlice keman dersleri almıştı. Babası aileden kopmuş olduğundan annesi, onun isteği dışında müzik eğitimini destekledi. Casino Dommayer’deki ilk çıkışı büyük bir başarıydı. Tur programları başlangıçta onu kendi orkestrasıyla (bu, babasıyla rekabetini artırıyordu) Danube Monarşisi boyunca götürdü. Babasının ölümünden sonra orkestrasını devraldı ve kendi orkestrasıyla birleştirdi. 1848 devrimcileri için bazı eserler bestelemiş ve isyancı hareketlere sempati göstermiş olduğundan, sansür yetkililerinin dikkatini çekti ve popüler olmasına rağmen sarayda gözden düştü. Sonuç olarak, 1863’e kadar Hofball müzik direktörü pozisyonu kendisine verilmedi."
 elgar.713.g: "Fırsatını kaçırdı, ama beste yapmaya devam edebilir."
 elgar.713.h: "Vals Kralı’na hak ettiği yeri verin!"
 elgar.714.t: "Devlet Beste Ödülü’nün Kazananı"
 elgar.714.d: "Bu yılın Devlet Beste Ödülü’nün kazananı olağanüstü bir Çek yetenek. Adı Antonín Dvořák."
 elgar.714.f: "Antonín Dvořák, sıklıkla Moravya ve memleketi Bohemya’nın halk müziğinin ritim ve diğer unsurlarını kullanan Çek bir besteciydi. Küçük yaşta müzik yeteneğini sergiledi; altı yaşından itibaren yetenekli bir keman öğrencisiydi. 1874’te Avusturya Devlet Beste Ödülü’ne başvurdu; iki senfoni ve diğer eserlerin partisyonlarını sundu. Dvořák farkında olmasa da, jüri başkanlarından Johannes Brahms çok etkilendi. Ödül, 1874, 1876 ve 1877’de Dvořák’a verildi; Brahms ve jüri üyesi ünlü eleştirmen Eduard Hanslick, ona tavsiyede bulundu. Brahms, Dvořák’ı yayıncısı Simrock’a önerdi."
 elgar.714.g: "Hak edilmiş bir ödül."
 elgar.714.h: "Bu yeteneği kaçırmamalıyız."
 elgar.715.t: "Bohemyalı Besteci"
 elgar.715.d: "Claude Debussy, Roma Ödülü’nü kazanarak başladı, ancak şimdiye kadar sertifikalı yeteneğiyle fazla bir şey yapmadı; yalnızca küçük, provokatif piyano parçaları yazdı. Bu bohemyalıdan ne olacak?"
 elgar.715.f: "Konservatuvarda bile, Claude Debussy’nin yeteneği hakkında değerlendirmeler oldukça farklıydı. Bazıları onu piyanist olarak övdü ve büyük umutlar besledi. Diğerleri onu dikkatsiz olarak tanımladı. Bu sırada, zaten Tchaikovsky’nin destekçisi Nadezhda von Meck’in evinde piyanist olarak çalışıyordu. 1884’te Debussy Prix de Rome’u kazandı, ancak Roma’daki kalışında hırslı değildi. İtalyan operasını sıkıcı buldu ve Giuseppe Verdi’nin hâkim tarzına ilgi duymadı. Erken Paris’e döndü ve orada dengesiz bir hayat sürdü: 'Eminim Enstitü onaylamaz, çünkü doğal olarak belirlediği yolu tek doğru yol olarak görür. Ama buna bir çare yok! Özgürlüğüme çok düşkünüm, kendi fikirlerime çok bağlıyım!'"
 elgar.715.g: "Güzel piyano müziği, ama müzikli serserilerden fazlamız var."
 elgar.1011.t: "Don Pasquale"
 elgar.1011.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] has just completed a musical masterpiece!"
 elgar.1011.f: "Don Pasquale, üç perdelik bir opera buffa’dır. Bu opera, türünün en ünlü örneklerinden biridir ve L'elisir d'amore ile Lucia di Lammermoor ile birlikte, Donizetti’nin 19. yüzyıldan bu yana neredeyse sürekli sahnelenen birkaç eserinden biridir. Carlo Goldoni’nin komedilerine dayanan karakterler, komedia dell’arte tiplerine az çok yakın olmakla birlikte, duygusal özelliklerle donatılmıştır; yani hüzün, acı veya pişmanlık hissetme ve ifade edebilme yeteneği verilmiştir; bu, karakterlerin tiplerinden öteye geçen bir ayrımdır. Don Pasquale, Paris’te yalnızca Bellini’nin I puritani (1835) eserinin daha önce elde ettiği başarıya benzer bir anlık başarı kazandı."
 elgar.1011.g: "Bravo!"
 elgar.1012.t: "Dom Sébastien"
 elgar.1012.f: "Dom Sébastien, Gaetano Donizetti tarafından bestelenmiş beş perdelik bir Fransız grand operasıdır. Portekiz Kralı Sebastian’ın (1554-1578) ve 1578’deki talihsiz Fas seferinin tarihi-kurgusal hikayesini anlatır. Donizetti, o dönemde Daniel Auber, Fromental Halévy ve Giacomo Meyerbeer’in benzer tarihsel operalarıyla rekabet edebilecek bir eser yaratmaya çalışıyordu. Dom Sébastien’in doğasına dair bir eleştirel tanım, 'beş perdelik bir cenaze' şeklindedir. Eser isteksizce karşılandı ve Donizetti bunu bir fiyasko olarak değerlendirdi. Donizetti, son operasını en önemli eserlerinden biri olarak görmesine rağmen, Dom Sébastien günümüzde büyük ölçüde unutulmuştur. Bu eser, Donizetti’nin 'hayal gücü üzerinde artık sınırsız kontrolü olmadığı' bir dönemde yazılmıştı, bu nedenle opera zaten bestecinin başlangıçtaki hastalık belirtilerini taşıyordu."
 elgar.1021.t: "Les Troyens"
 elgar.1021.f: "Les Troyens, Hector Berlioz tarafından bestelenmiş beş perdelik bir Fransız grand operasıdır. Libretto, Virgil’in Aeneid destanından Berlioz tarafından yazılmıştır; beste 1856-1858 yılları arasında tamamlanmıştır. Les Troyens, Berlioz’un en iddialı çalışmasıdır, tüm sanat kariyerinin bir toplamı olarak görülebilir; ancak Berlioz, eserin tamamını sahnede göremeden hayatını kaybetti. Les Troyens à Carthage başlığıyla, son üç perde Léon Carvalho’nun şirketi Théâtre Lyrique tarafından birçok kesintiyle sahnelendi; ilk gösterim 4 Kasım 1863’te Paris’te Place du Châtelet’teki tiyatroda gerçekleşti ve 21 tekrar performansı oldu. On yıllar süren ihmalin ardından, bugün bazı müzik eleştirmenleri tarafından tüm zamanların en iyi operalarından biri olarak kabul edilmektedir."
 elgar.1022.t: "La damnation de Faust"
 elgar.1022.f: "La damnation de Faust is a work for four solo voices, full seven-part chorus, large children's chorus and orchestra by the French composer Hector Berlioz. He called it a 'légende dramatique' (dramatic legend). The French composer was inspired by a translation of Goethe's dramatic poem Faust and produced a musical work that, like the masterpiece on which it is based, defies easy categorisation. Conceived at various times as a free-form oratorio and as an opera its travelogue form and cosmic perspective have made it an extreme challenge to stage as an opera. Berlioz himself was eager to see the work staged, but once he did, he conceded that the production techniques of his time were not up to the task of bringing the work to dramatic life. Most of the work's fame has come through concert performances."
 elgar.1023.t: "Enstrümantasyon Üzerine İnceleme"
 elgar.1023.f: "'Bu Traité d'Instrumentation, son derece paradoksal bir eserdir. Konuyla ilgisiz birkaç satırlık bir önsözle başlar; burada yazar, modülasyonları kötüye kullanan ve bazı hayvanların tuzlu bitkiler ve dikenli çalıları sevdiği gibi disonansı seven müzisyenlere karşı durur. Ardından orkestral çalgılara geçer ve garip iddiaları en sağlam gerçekler ve değerli tavsiyelerle harmanlar. (...) Eserinde ve orkestrasyonunda, Berlioz tüm tuhaflıklarına rağmen inanılmazdır. Neslimiz onun sayesinde eğitim aldı ve iyi bir eğitim aldığını söyleyebilirim. Berlioz, hayal gücünü ateşleme ve öğrettiği sanata olan sevgiyi uyandırma konusunda paha biçilmez bir yeteneğe sahipti. (...) Bu görünüşte gereksiz müzik örnekleri insanı hayal kurdurur, yeni bir dünyaya kapı açar, geniş ve büyüleyici bir gelecek görme imkanı sunar, Vaadedilmiş Topraklar’a açılan bir pencere gibidir.' - Camille Saint-Saëns"
 elgar.1031.t: "Les Préludes"
 elgar.1031.f: "Les Préludes, Franz Liszt’in on üç senfonik şiirinden üçüncüsüdür. Müzik 1845-1854 yılları arasında bestelenmiştir ve başlangıçta Liszt’in koro döngüsü Les quatre élémens (Dört Element) için bir açılış olarak tasarlanmış, daha sonra bağımsız bir konser açılışına dönüştürülmüş ve Alphonse de Lamartine’in bir şiirine atıfta bulunan yeni bir başlık verilmiştir. Les Préludes, 'Senfonik Şiir' adını taşıyan orkestral bir çalışmanın en erken örneğidir. Liszt, yaşam evrelerini ölüm melodisine hazırlık olarak görür. Bu evreler, mücadeleler ve fırtınalar, aşk, mutluluk ve acı, teselli, doğayı deneyimlemeyi içerir. Les Préludes’da yansıtılan bu ruh halleri arasındaki karşıtlıklara rağmen, eser büyük bir tutarlılığa sahiptir. Melankolik bir melodi ile başlar, buradan ilk fırtınalı ana tema gelişir ve pastoral bir bölüm aracılığıyla ikinci temaya geçer. Bu iki tema kayarak değişen ruh hallerinde geliştirilir. Bir doruk noktasında, orijinal tema, ilk ana temaya görkemli ve göz alıcı bir fanfare olarak akar."
 elgar.1032.t: "Macar Rapsodileri"
 elgar.1032.f: "Macar Rapsodileri, Franz Liszt tarafından 1846-1853 yılları arasında ve daha sonra 1882 ile 1885’te bestelenmiş, Macar halk temalarına dayanan 19 piyano parçasından oluşan bir dizidir. Liszt ayrıca orkestra, piyano düeti ve piyano trio için de düzenlemeler yapmıştır. Bazıları diğerlerinden daha bilinir; özellikle 2 Numaralı Macar Rapsodisi ünlüdür, ayrıca 6, 10, 12 ve 14 numaralı rapsodiler de (özellikle piyano ve orkestra için “Macar Fantezisi” olarak düzenlenen versiyonuyla) tanınır. Liszt, doğup büyüdüğü Batı Macaristan’da duyduğu ve halk müziği olduğuna inandığı pek çok temayı eserlerine dahil etmiştir; ancak bunların birçoğu aslında Macar burjuvazisinin üyeleri ya da József Kossovits gibi besteciler tarafından yazılmış melodilerdi. Orijinal piyano biçimlerinde Macar Rapsodileri, zorluk dereceleriyle bilinir."
 elgar.1033.t: "Dante Senfonisi"
 elgar.1033.f: "'Dante Senfonisi', Franz Liszt tarafından bestelenmiş bir koro senfonisidir. Yüksek romantik üslupta yazılmış olup, Dante Alighieri’nin İlahi Komedya’daki Cehennem ve Araf yolculuğuna dayanmaktadır. Bazı eleştirmenler, Dante Senfonisi’nin klasik anlamda bir senfoni olmaktan çok iki betimleyici senfonik şiir olduğunu öne sürmüştür. Liszt’in ilk niyeti, eseri üç bölüm halinde bestelemekti: Inferno, Purgatorio ve Paradiso. İlk ikisi tamamen enstrümantal olacaktı, final ise koro için. Ancak Wagner, hiçbir dünyevi bestecinin Cennet’in sevinçlerini sadakatle ifade edemeyeceğini söyleyerek Liszt’i ikna etti. Bunun üzerine Liszt üçüncü bölümü bıraktı fakat ikinci bölümün sonuna bir koro Magnificat ekledi. Liszt uzmanı Humphrey Searle’a göre, Liszt cehennemsel bölgeleri göksel olanlardan daha rahat tasvir etmiş olsa da, Cennet’i müzikle betimlemek onun gücünün ötesinde olmazdı."
 elgar.1041.t: "Die Meistersinger von Nürnberg"
 elgar.1041.f: "'Die Meistersinger von Nürnberg', Richard Wagner’in üç perdeden oluşan bir müzik dramasıdır (opera). Sahnelenen en uzun operadır; iki perde arası molalar hariç yaklaşık dört buçuk saat sürer ve geleneksel olarak kısaltılmaz. Nürnbergli Usta Şarkıcılar, Wagner’in eserleri arasında benzersiz bir yere sahiptir. Olgunluk dönemindeki tek komedisi olup, ayrıca mitolojik veya efsanevi bir dünyada değil, tarihsel olarak belirlenmiş bir zaman ve mekânda geçen tek eseridir. Ayrıca tamamen özgün bir hikâyeye dayanan tek Wagner operasıdır. Operada, Wagner’in daha önce denemelerinde karşı çıktığı birçok geleneksel öğe yer alır: kafiyeli dizeler, aryalar, korolar, bir beşli ve hatta bale."
 elgar.1042.t: "Die Walküre"
 elgar.1042.f: "'Die Walküre', 'Das Rheingold', 'Siegfried' ve 'Götterdämmerung' operalarıyla birlikte 'Der Ring des Nibelungen' (Nibelung Yüzüğü) adlı bütünün parçasıdır. Wagner, geleneksel opera birimleri olan aryalar, topluluk şarkıları ve korolar yerine, kişileri, fikirleri ve durumları temsil eden yinelenen leitmotifler sistemini kullanarak, eserin ardındaki duygu ve ruh hallerini yansıtan müziksel drama ilkelerine büyük ölçüde bağlı kalmıştır. Die Walküre’nin hikâyesi, Völsunga destanı ve Poetik Edda’da anlatılan İskandinav mitolojisine dayanır."
 elgar.1043.t: "Parsifal"
 elgar.1043.f: "Richard Wagner’in Parsifal operası kutsal müzik, kutsal emanetin (Kutsal Kâse) açığa çıkarılması, vaftiz ve Hristiyan ayini gibi dini öğeler barındırır. Wagner, daha Zürih’te yazdığı sanat yazılarında, sanatın dini özün aydınlatılması için kullanılabileceği fikrini geliştirmişti. Wagner, insanlığın merhamet aracılığıyla kurtuluş ve yenilenmesine dair mesel benzeri mesajını — arayış içindeki Parsifal ve acı çeken Amfortas aracılığıyla — dini sembolizmle zihinde 'coşkulu bir etki' yaratacak bir sanat formu seçerek iletmek istediğini açıklamıştır. Wagner bu üç perdelik eseri “sahne adama festivali” olarak tanımlamış ve yalnızca Bayreuth Festspielhaus’da sahnelenmesini şart koşmuştur."
 elgar.1051.t: "Peer Gynt"
 elgar.1051.f: "Peer Gynt, Op. 23, Henrik Ibsen’in 1867 tarihli aynı adlı oyunu için Norveçli besteci Edvard Grieg’in yazdığı sahne müziğidir. Grieg her ne kadar birçok kısa piyano parçası ve oda müziği yazmış olsa da, Ibsen için yaptığı bu çalışma öne çıkmıştır. İlk başta oyun için 90 dakikalık orkestral müzik besteleyen Grieg, daha sonra bu müziklerden bazı bölümleri seçerek süitler haline getirdi. Peer Gynt’ün dünyadaki yolculukları ve uzak diyarları, Grieg’in seçtiği enstrümanlarla temsil edilmiştir. Grieg daha sonra Peer Gynt müziğinden iki süit oluşturdu. Bu süitlerdeki bazı parçalar popüler kültürde de yer buldu; özellikle 'Sabah Vakti', 'Dağ Kralının Salonu' ve 'Solveig’in Şarkısı'."
 elgar.1052.t: "Lirik Parçalar"
 elgar.1052.f: "'Lirik Parçalar', Edvard Grieg’in solo piyano için yazdığı 66 kısa parçadan oluşan bir derlemedir. 1867’den 1901’e kadar 10 cilt halinde yayımlanmıştır. Derleme, 'Troldhaugen’de Düğün Günü', 'Bahar’a', 'Trollerin Yürüyüşü' ve 'Kelebek' gibi onun en bilinen parçalarını içerir. Dizinin ilk parçası Arietta’nın teması bestecinin en sevdiği ezgilerden biriydi. Piyanist Andrei Gavrilov’un sözleriyle, 'Lirik Parçalar, Grieg’in hayatı boyunca tuttuğu çok özel bir günlük ya da bir itiraftır, çünkü bestecinin en mahrem anlarını yansıtır.'"
 elgar.1053.t: "Norveç Dansları"
 elgar.1053.f: "Norveç Dansları, Norveçli bestecinin, Antonín Dvořák’ın büyük başarı kazanan Slav Dansları ve Johannes Brahms’ın Macar Dansları’na cevabıdır. İki meslektaş, 1878 ve 1881 yıllarında Simrock yayınevi tarafından piyano dört elle çalınan dans serilerini yayımlamıştı. O dönemde Grieg, danslarını orkestre etmeye cesaret edemedi; çünkü arazi, arkadaşı Johan Svendsen’in 'Norveç Rapsodileri' ile doluydu. Bu nedenle Norveç Dansları’nın orkestral versiyonu Robert Henriques tarafından düzenlendi – Grieg’in memnuniyetine büyük katkı sağladı. İlk dans için Grieg popüler Sinklar marşını kullandı; son üç dans ise sözde 'Hallings' idi, genç erkekler için geleneksel Norveç gelin danslarıdır ve uygulanmaları hızlı ve oldukça akrobatiktir."
 elgar.1061.t: "Alman Requiem’i"
 elgar.1061.f: "'Anlatacak çok şey yok, ama yine de şunu söylemeliyim ki Requiem’inizle tamamen doluyum, çok güçlü bir eser, insanın tüm benliğini sarıyor, nadir şeylerden biri gibi. Derin ciddiyet, şiirin tüm sihriyle birleştiğinde harika, şok edici ve rahatlatıcı bir etki yaratıyor. Bildiğiniz gibi, bunu asla tam olarak kelimelere dökemem, ama bu eserin tüm zengin hazinesini özümsemiş hissediyorum ve her parçadan gelen coşku beni derinden etkiliyor; bu yüzden kendimi tutamıyorum… Ah, duyabilseydim, bunun için ne verirdim.' - Clara Schumann"
 elgar.1062.t: "Macar Dansları"
 elgar.1062.f: "Johannes Brahms’ın Macar Dansları, çoğunlukla Macar temalarına dayanan 21 canlı dans melodisinden oluşur ve 1879’da tamamlanmıştır. Süreleri yaklaşık bir dakikadan beş dakikaya kadar değişir. Brahms’ın en popüler eserlerinden biridir ve kendisine en çok kazanç sağlayan eserler olmuştur. Her dans, çeşitli enstrüman ve topluluklar için düzenlenmiştir. Brahms, başlangıçta piyano dört elle çalınan versiyonu yazmış, daha sonra ilk on dansı solo piyano için uyarlamıştır. Brahms’ın arkadaşı kemancı Joseph Joachim, tüm Macar Dansları’nı keman ve piyano için virtüöz bir düzenleme olarak hazırlamıştır."
 elgar.1063.t: "4. Senfoni"
 elgar.1063.f: "4. Senfoni, Johannes Brahms tarafından yazılmış son senfonidir. Bugün, bestecinin en popüler ve en sık sahnelenen orkestral eserlerinden biridir. İlk bakışta, eserin tavizsiz tasarımı rahatsız edici görünüyordu. Brahms ve Ignaz Brüll, eseri iki piyanoda arkadaşlarına çaldıklarında, Clara Schumann ve Brahms’ın sonraki biyografi yazarı Max Kalbeck dahil bazıları olumsuz tepki verdi. Eduard Hanslick’in, 'Tüm bölüm boyunca, sanki iki son derece zeki kişi tarafından dövülüyormuş gibi hissettim.' dediği söylenir. Elisabeth von Herzogenberg, eseri 'kendi küçük dünyası, karanlıkta yürüyenler sadece küçük bir pay alabilir' olarak tanımlamıştır. Brahms, senfoniyi 1897’de, ölümünden kısa süre önce bir performansta izlediğinde, Viyanalı izleyiciden eser günümüzde de süren büyük alkışlar aldı."
 elgar.1071.t: "5. Senfoni"
 elgar.1071.f: "Bazı Mahler senfonilerinde olduğu gibi, 5. senfoni de prömiyerinden sonra anlaşılamadı. 1905’te Hamburg’daki başarısız bir performanstan sonra Mahler şikayet etti: 'Beşinci lanetli bir eser. Kimse anlamıyor.' Prömiyeri izleyen yıllarda müzik eleştirileri çoğunlukla olumsuzdu. Örneğin, müzik eleştirmeni Ferdinand Pfohl, 5. senfoniyi Mahler’ın daha zayıf eserlerinden biri olarak değerlendirdi. Sadece Neue Zeitung für Musik senfoniye olumlu tanıklık verdi ve 'ezici bir güzellik zenginliği'nden söz etti. Özellikle iki yıl önce yazılmış 4. senfoni ile kıyaslandığında, içerik ve biçimde büyük bir fark temsil eder. 5. senfoninin daha sert ses dünyası ile Mahler, sonraki 6. senfonide daha da geliştirilecek yeni bir yaratıcı aşamaya başlar. Eser, yalnızca Mahler’in ölümünden sonra giderek daha fazla takdir edilmiştir."
 elgar.1072.t: "Yer’in Şarkısı (Lied von der Erde)"
 elgar.1072.f: "'Gerçekten aynı kişi mi, sonsuzlukla uyum içinde Sekizinci’nin yapısını inşa eden ve şimdi Yer’in dertlerinin içki şarkısında bulduğumuz? Kim yalnızca sonbaharda sevgili dinlenme yerine sürünerek gidiyor, ferahlık arıyor? Kim gençliğe yaşlı dostane bakışla, güzellik karşısında nazik bir duyguyla bakıyor? Kim anlamsız dünyevi varoluşu unutmak için sarhoşlukta arayışa giriyor ve sonunda hüzünle veda ediyor? (...) Neredeyse aynı kişi ve besteci değil. O ana kadar tüm eserler yaşam duygusundan doğmuştu (...) Dünya kayboluyor, farklı bir hava esiyor, farklı bir ışık üzerinde parlıyor. (...) Autografi ona geri getirdiğimde, neredeyse kelime söyleyemez halde, 'Abschied'ı açtı ve dedi ki: 'Ne düşünüyorsun? Bu dayanılır mı? İnsanlar sonra kendilerini öldürmez mi?' Ardından ritmik zorluklara işaret etti ve şaka yollu sordu: 'Bunu yönetmenin bir yolu var mı? Ben değil!' - Bruno Walter"
 elgar.1073.t: "Çocuk Ölüleri Şarkıları (Kindertotenlieder)"
 elgar.1073.f: "'Böyle korkunç sözleri, çocukları olmayan ya da çocuklarını kaybetmiş biri bestelediğinde anlayabilirim. Ama nasıl oluyor da çocukları yarım saat önce kucaklayıp öpüp mutlu ve sağlıklı iken onların ölümü hakkında şarkı söyleyebiliyorsun?' - Gustav Mahler’in eşi Alma Mahler-Werfel"
 elgar.1081.t: "3. Piyano Konçertosu"
 elgar.1081.f: "O dönemde Mahler, Nikisch ile aynı sınıfa konulmaya layık gördüğüm tek şef idi. Konçertoya, oldukça karmaşık olan eşlik kısmı mükemmelliğe pratik edilene kadar kendini adadı, halihazırda başka bir uzun provayı daha tamamlamış olmasına rağmen. Mahler'a göre, partisyonun her detayı önemliydi - şefler arasında nadir görülen bir tutum. ... Provanın 12:30'da bitmesi planlanmış olmasına rağmen, bu saati çok aşarak çalmaya devam ettik ve Mahler ilk bölümün tekrar prova edileceğini açıkladığında, müzisyenlerden bir protesto veya sahne bekliyordum, ancak hiçbir rahatsızlık belirtisi gözlemlemedim. Orkestra, ilk bölümü öncekinden daha istekli veya belki de daha yakın bir takdirle çaldı. - Sergei Rachmaninoff"
 elgar.1082.t: "Paganini'nin Bir Teması Üzerine Rapsodi"
 elgar.1082.f: "Parça, Niccolò Paganini'nin kendisinin de bir dizi varyasyon için başlangıç noktası olarak kullandığı bir tema üzerine 24 varyasyondan oluşur. Bu melodi, Johannes Brahms ve Franz Liszt gibi çeşitli besteciler için defalarca şablon görevi görmüştür. Rachmaninoff, bazı varyasyonlarda çok daha eski bir melodi olan 'Dies irae' dizisini kullanır; bu bir zamanlar Latince ölü ayininin ayrılmaz bir parçasıydı. Rachmaninoff bu temayı eserlerinde tekrar tekrar kullandı. Tüm senfonilerde, Senfonik Danslar'da, senfonik şiir Die Toteninsel'de ve ilk piyano sonatında görülür. Bir Paganini temasının 'Dies irae' ile birleştirilmesi, esere dair programatik bir arka plan arayışını tetikler. Efsaneye göre, büyük kemancı, enstrümanında mükemmelliğe ve bir kadının aşkına ulaşmak için ruhunu şeytana satmıştır. 'Dies irae' motifi şeytanı, Paganini teması ise bestekar kemancının kendisini temsil eder."
 elgar.1083.t: "Senfoni No. 3"
 elgar.1083.f: "'New York, Philadelphia, Chicago vb. yerlerde çalındı. İlk iki performansta ben de hazır bulundum. Harika çalındı. Hem halkın hem de eleştirmenlerin tepkisi ekşiydi. Zihnimde acı bir şekilde kalan bir eleştiri: artık içimde Üçüncü bir Senfoni olmadığıydı. Kişisel olarak, bunun iyi bir eser olduğuna sıkı sıkıya inanıyorum. Ama—bazen besteciler de yanılır! Her neyse, şimdilik fikrimde ısrar ediyorum.' - Sergei Rachmaninoff"
 elgar.1091.t: "Romeo ve Juliet"
 elgar.1091.f: "Romeo and Juliet is Sergei Prokofiev's longest and best-known ballet and is widely regarded as his most important contribution to the genre. It is considered a highlight of his musical work. The rich and varied instrumentation as well as the rhythmic complexity of the score still pose challenges for orchestra and dancers. In some places, dissonances border on atonality. The famous 'Dance of the Knights', with its dotted rhythms, is now better known as a quasi-symphonic theme. In contrast, the themes associated with Juliet's awakening to love are at once tender and youthfully lively. Prokofiev reused music from the ballet in three suites for orchestra and a solo piano work."
 elgar.1092.t: "Lieutenant Kijé"
 elgar.1092.f: "Lieutenant Kijé music was originally written to accompany the film of the same name. It was Prokofiev's first attempt at film music, and his first commission. In the early days of sound cinema, among the various distinguished composers ready to try their hand at film music, Prokofiev was not an obvious choice for the commission. Based in Paris for almost a decade, he had a reputation for experimentation and dissonance. Soon after the film's release, Prokofiev received an invitation from the Moscow Radio Symphony Orchestra to create an orchestral suite from his Kijé film music - probably the first instance of a film score being adapted into a significant musical work. While Prokofiev was in the United States for the Boston premiere he was greatly sought after by film producers, but although he was flattered and attracted by their offers he never composed a Hollywood film score."
 elgar.1093.t: "Peter and the Wolf"
 elgar.1093.f: "Peter and the Wolf is a 'symphonic fairy tale for children'. It is Prokofiev's most frequently performed work and one of the most frequently performed works in the entire classical repertoire. The narrator tells a children's story, while the orchestra illustrates it by using different instruments to play a 'theme' that represents each character in the story: 'Each character of this tale is represented by a corresponding instrument in the orchestra: the bird by a flute, the duck by an oboe, the cat by a clarinet playing staccato in a low register, the grandfather by a bassoon, the wolf by three horns, Peter by the string quartet, the shooting of the hunters by the kettle drums and bass drum. Before an orchestral performance it is desirable to show these instruments to the children and to play on them the corresponding leitmotifs. Thereby, the children learn to distinguish the sounds of the instruments during the performance of this tale.'"
 elgar.1101.t: "Die Fledermaus"
 elgar.1101.f: "Johann Strauss's Fledermaus is considered one of the highlights of the operetta era. Along with The Gypsy Baron and One Night in Venice, Die Fledermaus is one of the three most famous Strauss operettas and also one of the few operettas that are regularly performed at major international opera houses. The lyrics are catchy and full of irony with timeless truths. The essential parts of the music are said to have been created within 42 days. The overture, written in free sonata form, occupies a special place and is one of Johann Strauss' greatest creations. It summarizes the numerous musical highlights of the entire work and, with its varied dynamics, is always a challenge even for top orchestras."
 elgar.1102.t: "Donauwalzer"
 elgar.1102.f: "Güzel Mavi Tuna Üzerinde Vals (çoğunlukla kısa adıyla: Tuna Valsi), beste açısından Johann Strauss’un daha önceki eserlerinde kullandığı melodilere dayanmaktadır. Prömiyerinde bile izleyiciler arasında büyük bir heyecan uyandırdı. O dönemde karnaval sezonunda çok sayıda yeni müzik yayını olduğundan, vals başlangıçta pek rağbet görmedi. Ancak Strauss, aynı yıl 1867 Dünya Fuarı’nda Paris’te sahneye çıktığında ve bunun için yeni besteler yarattığında, bu valsi programa dahil etmeyi unutmamış oldu. Le beau Danube bleu adıyla eser, bu sergide büyük bir başarı kazandı. Valsin yayımlanan versiyonlarının, özellikle iki elle piyano versiyonunun, kısa süre içinde neredeyse 1.000.000 kez satıldığı tahmin edilmektedir. Vals, Avusturya’nın gizli marşı ve klasik müzik tarihinin en popüler eserlerinden biri olarak kabul edilmektedir."
 elgar.1103.t: "Venedik’te Bir Gece"
 elgar.1103.f: "Venedik’te Bir Gece, üç perdelik bir 'komik operet'tir. Olay, 18. yüzyıl ortalarında Venedik’te geçer ve iki sınıf arasında aşk karmaşasıyla maskeli kimlik ve yanlış anlamalar komedisidir. Pek çok Viyanalı operette olduğu gibi, librettosu bir Fransız opéra-comique uyarlamasıdır. Berlin’deki prömiyeri başarısız oldu. Bunun nedeni kısmen karmaşık olay örgüsü, kısmen de temel metinlerdi. Eser, bu nedenle Theater an der Wien’deki prömiyer için yeniden işlendi. Uvertür de Strauss tarafından yeniden düzenlendi. En ünlü müzik numaraları lagün valsi ve gondol şarkısıdır. 1923’te ve 1931’de Erich Wolfgang Korngold tarafından önemli ölçüde revize edildi; 1954’te Walter Felsenstein tarafından başka bir versiyonu yazıldı; orijinal versiyon artık çok nadiren sahnelenmektedir."
 elgar.1111.t: "Rigoletto"
 elgar.1111.f: "Rigoletto, Giuseppe Verdi tarafından bestelenmiş ve librettosu Francesco Maria Piave tarafından hazırlanmış bir operadır. Victor Hugo’nun 'Le roi s'amuse' melodramına dayanır. Opera başlangıçta sansürcüler tarafından eleştirildi; bu nedenle Verdi ve Piave, başta planlanan başlığı değiştirmek ve mekanı Paris’ten Mantua’ya taşımak zorunda kaldılar. Ancak Verdi için temel unsurlar, yani engelli ana karakter Rigoletto ve ölen kızının konulduğu çuval, olduğu gibi kaldı. Opera Verdi’nin ilk başyapıtı olarak kabul edilir ve ona dünya çapında ün kazandırdı. Verdi, Rigoletto’yu en başarılı eserlerinden biri olarak görüyordu ve diğer Verdi operalarından farklı olarak eserin revizyonu veya yeni versiyonu yapılmamıştır. Rigoletto prömiyerinde büyük bir başarı kazandı ve sonraki birkaç yıl boyunca neredeyse tüm Avrupa opera evlerinde sahnelendi. Opera, 160 yıldan fazla bir süredir birçok opera evinin repertuarında yer almakta ve en sık sahnelenen İtalyan operalarından biri olmaya devam etmektedir."
 elgar.1112.t: "La Traviata"
 elgar.1112.f: "La traviata, Giuseppe Verdi ve Francesco Maria Piave tarafından bestelenmiş ve Alexandre Dumas’ın La dame aux camélias adlı romanına dayanan bir operadır. Rigoletto ve Il trovatore’da olduğu gibi, Verdi, toplumsal olarak dışlanmış ve reddedilmiş bir kişiyi olayların merkezine yerleştirdi. Tüberkülozdan ölen bir fahişe hakkında bir opera, o dönemde skandal bir yenilikti. Eser, Verdi’nin bizzat sahnelemesine ve önlem olarak olayı XIV. Louis zamanına taşımış olmasına rağmen, prömiyerde başarısız oldu. Revizyonun ardından Verdi, eseri bir yıl sonra tekrar sahneletti – bu tarihten sonra müzik tarihinin en başarılı operalarından biri haline geldi. Bazı ülkelerde en çok sahnelenen opera olmuştur. Yapılan kayıt sayısı açısından La traviata, yalnızca Aida’nın gerisindedir. Sansür gerekçesiyle opera, İtalya’da Violetta adıyla da sahnelenmiştir."
 elgar.1113.t: "Messa da Requiem"
 elgar.1113.f: "1868’de Gioachino Rossini’nin ölümünden etkilenen Giuseppe Verdi, o dönemin İtalya’sındaki en önemli on iki besteciyi bir araya getirerek ortak bir cenaze ayini, yani Messa per Rossini bestelemeye davet etti. Verdi, bu requiem’de son bölüm 'Libera me'yi bizzat üstlendi. Ancak olumsuz koşullar nedeniyle bir performans gerçekleşmedi. Şair Alessandro Manzoni’nin 1873’te ölmesinin ardından Verdi, Requiem materyaliyle tekrar ilgilendi. Verdi, saygı duyduğu Manzoni’ye derin hayranlık besliyordu. Manzoni’nin ölümünün birinci yıldönümünde Milano şehrine sahnelenmek üzere bir ayin besteleme teklifinde bulundu. Rossini Ayini’nden alınan 'Libera me', Manzoni için yeni Requiem’in çekirdeğini oluşturdu. Daha eski besteden 'Dies irae' bölümü, aynı veya benzer metinli pasajlar için üç kez kullanıldı. İlk performans, 22 Mayıs 1874’te Milano’daki San Marco kilisesinde yapıldı ve Manzoni’nin ölümünün birinci yıldönümünü işaret etti. Verdi, bizzat yönetmenlik yaptı."
 elgar.1121.t: "Bir Faun’un Öğleden Sonra Prelüdü (Prélude à l'après-midi d'un faune)"
 elgar.1121.f: "'Bu prelüdün müziği, Mallarmé’nin güzel şiirinin oldukça serbest bir betimlemesidir. Kesinlikle onun bir sentezi olma iddiası taşımaz. Daha ziyade, öğleden sonranın sıcağında faunun arzu ve düşlerinin geçtiği bir sahneler silsilesidir. Sonra, perilerin ve najadların ürkek kaçışını kovalamaktan yorulan faun, kendini sarhoş edici bir uykuya bırakır; bu uykuda evrensel Doğa içinde sahip olma düşlerini nihayet gerçekleştirebilir.'\n\n'Bir Faunun Öğleden Sonrasına Prelüd', orkestra için yazılmış bir senfonik şiirdir ve Debussy’nin en ünlü eserlerinden biridir. Parça, Batı sanat müziği tarihinde bir dönüm noktası ve empresyonist besteciliğin başyapıtı kabul edilir. Pierre Boulez, bu partisyonu modern müziğin başlangıcı saymış ve 'faunun flütü müzik sanatına yeni bir soluk getirdi' demiştir."
 elgar.1121.g: "Kendini bırak, hayal et, bitmeyen anın tadını çıkar..."
 elgar.1122.t: "La Mer"
 elgar.1122.f: "'Dünkü konser, tonal bir palet üzerinde gelişigüzel yayılmış bolca empresyonist renk lekesiyle başladı; biçim ya da amaç hakkında tek bir düşünce yoktu, sadece yeni ses kombinasyonları yaratmak vardı. … Tek kesin olan şey şuydu: bestecinin okyanusu bir kurbağa göletiydi ve sakinlerinden bazıları tüm bakır nefeslilerin boğazına kaçmış gibiydi.'\n\n1903-1905 yılları arasında bestelenen 'La mer', Ekim 1905’te Paris’te prömiyer yaptı. İlk başta iyi karşılanmadı. Debussy’nin eserlerine daha önce güçlü destek vermiş bazı kişiler bile isteksizdi; oysa eser, Debussy’nin estetiğinin üç temel yönünü ortaya koyuyordu: Empresyonizm, Sembolizm ve Japonizm. Prömiyerinden sonraki on yıllarda 'La mer', orkestral repertuvarın temel taşlarından biri haline geldi."
 elgar.1123.t: "Pelléas et Mélisande"
 elgar.1123.f: "'Bir öğretmen olarak pedantikti — başka kelime yok. Gerçekten pedantikti… İçinde bir öfke ve hınç çekirdeği vardı — çoğu zaman onun Pelléas’taki Golaud’ya benzediğini düşünürdüm, ama değildi. O — tüm müziğinde de var bu — çok duyusal bir adamdı. Kimse ondan hoşlanmaz gibiydi. Pelléas’ı oynayan Jean Périer’e Debussy’nin adını ansanız, öfkeden bembeyaz olurdu...'\n\n'Pelléas et Mélisande', beş perdeden oluşan bir operadır. Claude Debussy’nin bu esere verdiği tür adı 'drame lyrique'tir. Metin, Maurice Maeterlinck’in 'Pelléas et Mélisande' adlı oyunundan uyarlanmıştır. Debussy aryaları ve büyük solo sahneleri bilinçli olarak kullanmamış, bu da metne gerçekçi bir karakter kazandırmıştır. 'Pelléas', Debussy’nin tamamlanmış tek operasıdır. Bu nedenle zaman zaman Beethoven’ın 'Fidelio’su ile karşılaştırılmıştır."
 elgar.1131.t: "Kuğu Gölü"
 elgar.1131.f: "'Kuğu Gölü', Pyotr İlyiç Çaykovski’nin müziğiyle hazırlanmış dünyaca ünlü bir baledir. İlk kez 1877’de Moskova’daki Bolşoy Tiyatrosu’nda sahnelenmiştir ve klasik bale topluluklarının standart repertuvarının bir parçasıdır. 'Kuğu Gölü'nde pek çok masaldan ortak motifler bulunur: özellikle, bir prensin sevgisiyle kurtarılan talihsiz büyülenmiş prenses motifi. Orijinal libretonun mutsuz sonu da, 'kuğu kızı' ya da 'kuğu bakiresi' motifinin bilinen bir masal öğesidir. Çaykovski, 'Kuğu Gölü' partisyonu için daha önceki bazı bestelerinden yararlanmıştır. Bestecinin iki akrabası, 1871’de evlerinde Çaykovski’nin 'Kuğuların Gölü' adını verdiği küçük bir bale yazdığını ve bunun ünlü leitmotifi içerdiğini belirtir. Ayrıca, 1868’de yarım bıraktığı 'Voyevoda' operasından da materyal kullanmıştır. Nisan 1876’da partisyon tamamlandı ve provalar başladı. Ancak koreograf Reisinger, bazı bölümleri 'dans edilemez' diyerek bir kenara ayırdı. Hatta başka bestecilerin müzikleriyle danslar hazırlamaya kalktı, fakat Çaykovski buna karşı çıktı ve kendi parçaları geri alındı."
 elgar.1132.t: "6. Senfoni 'Patetik'"
 elgar.1132.f: "'Şu anda tamamen yeni bir işle meşgulüm… ve ondan kopmam çok zor. Bence bu, eserlerimin en iyisi olarak doğuyor. Bir an önce bitirmeliyim, çünkü birçok işi toparlamam gerekiyor ve yakında Londra’ya gitmeliyim. Daha önce sana, bitirdiğim ama aniden beğenmeyip yırttığım bir Senfoni’den bahsetmiştim. Şimdi yeni bir senfoni besteledim ve kesinlikle yırtmayacağım.'\n\nMi minör, Op. 64, 5. Senfoni’nin prömiyerinden iki yıl sonra, Çaykovski bir arkadaşına 'tüm çalışmalarımın kilit taşı olacak muazzam bir senfoni' yazmayı planladığını yazdı. Besteci esere 'Tutkulu Senfoni' adını verdi. Eseri karakterize eden unsur, senfoniler için alışılmadık olan yavaş final bölümüdür; bu finalin sonu, bir requiemi andırır."
 elgar.1133.t: "Re Majör Keman Konçertosu"
 elgar.1133.f: "Re majör Keman Konçertosu, Rus besteci Pyotr İlyiç Çaykovski’nin tek keman konçertosudur. Çaykovski, bu konçertoyu 1878’in Mart ve Nisan aylarında, Cenevre Gölü kıyısındaki Clarens kasabasında yazdı. Burada depresyon ve ağır bir sinir krizinden iyileşiyordu. Konçertoya yansıyan olumlu etki, bestecinin yeniden bulduğu yaşam sevincini gösterir. Besteleme süreci üç haftada tamamlandı, ancak Çaykovski başlangıçta planladığı orta bölümü çıkardı ve yerine 'Canzonetta' olarak bilinen Andante’yi koydu. Müzik eleştirmenleri esere olumsuz tepki gösterdi. Çaykovski ise sakin kaldı ve konçertonun zamanla kabul göreceğine emindi. Bugün hâlâ, dünyanın en ünlü, en çok seslendirilen ve en sık çalınan keman konçertolarından biridir."
 elgar.1141.t: "Pomp & Circumstance"
 elgar.1141.f: "Pomp and Circumstance Askeri Marşları, orkestra için yazılmış beş (veya altı) marşlık bir seridir. Bunlar, Elgar’ın en bilinen bestelerinden bazılarını içerir. Altı marşın en tanınmışı olan Pomp And Circumstance March No. 1 in D, 19 Ekim 1901’de Liverpool’da, March No. 2 ile birlikte prömiyerini yaptı. Elgar ve eşi prömiyere katıldı ve eser 'çılgınca' bir başarı elde etti. Trio bölümünde 'Land of Hope and Glory' olarak bilinen melodi bulunur. 1902’de bu melodi, Kral VIII. Edward için yazdığı Coronation Ode’un 'Land of Hope and Glory' kısmında değiştirilmiş bir biçimde yeniden kullanıldı. Sözler, orijinal melodiyi uyacak şekilde daha da düzenlendi ve sonuç, o zamandan beri Last Night of the Proms etkinliğinin bir klasiği, İngiliz spor marşı ve genel bir vatanseverlik şarkısı haline geldi."
 elgar.1141.g: "Umut ve Görkem Ülkesi!"
 elgar.1142.t: "Hindistan Tacı"
 elgar.1142.f: "Hindistan Tacı, bir mask olarak sahnelenen ve 1912’de düzenlenen görkemli bir tiyatro sunumuydu. Bu sunum, önceki Aralık ayında Kral V. George ve Kraliçe Mary’nin Hindistan’da imparator ve imparatoriçe olarak taç giymeleri vesilesiyle Delhi’yi ziyareti şerefine yapılmıştı. Bu mask için İngiliz besteci Sir Edward Elgar müziği yazdı, librettosu ise Henry Hamilton tarafından hazırlandı. Mask iki tablodan oluşuyordu: 'Hind Şehirleri' ve 'Ave Imperator!'. Elgar daha sonra beş parçayı seçip solo keman için bir intermezzo ekleyerek Hindistan Tacı Süiti’ni oluşturdu. Süit hemen popülerlik kazandı: Elgar hayattayken BBC’de 102 canlı performans gerçekleşti."
 elgar.1143.t: "Enigma Varyasyonları"
 elgar.1143.f: "Enigma Varyasyonları, Elgar’ın çevresindeki insanları 14 varyasyonla tanımlayan orkestra eseridir. Prömiyerini Hans Richter yönetmenliğinde yaparak Elgar’ı uluslararası alanda tanıttı. Başlıktaki 'Enigma', hangi varyasyonun hangi arkadaşına adandığını belirtmez; başka bir bulmacayı ifade eder. Elgar’a göre, tüm eser boyunca geçen farklı ve daha büyük bir tema vardır, ancak bu tema çalınmaz ve asıl tema ona karşımelodi olarak bestelenmiştir. Şu ana kadar çeşitli teoriler öne sürülmüştür. Özellikle 9. varyasyon (Nimrod) büyük popülerlik kazanmıştır."
 elgar.1151.t: "9. Senfoni"
 elgar.1151.f: "1892’de Dvořák Amerika Birleşik Devletleri’ne taşındı ve New York’taki Ulusal Müzik Konservatuvarı’nın müdürü oldu. Amerika’da bulunduğu sırada, dünyanın dört bir yanında ününü yayacak en başarılı orkestra eserlerinden biri olan 'Yeni Dünya Senfonisi'ni yazdı. Dvořák’ın, 1893 yazında Iowa gezisinde gördüğü olası bozkırlar gibi, Amerika’nın 'geniş açık alanlarından' ilham aldığı söylenir. Dvořák ayrıca Beethoven ve Schubert dahil önceki klasik bestecilerin stillerinden ve tekniklerinden etkilenmiştir. Yeni Dünya Senfonisi’nin Scherzo bölümündeki düşen dördüncüler ve timpani vuruşları, Beethoven’ın 9. Senfonisi Scherzo’sunu anımsatır. Carnegie Hall’daki prömiyerde, her bölümün sonunda coşkulu alkışlar yapıldı ve Dvořák ayağa kalkıp selam vermek zorunda hissetti."
 elgar.1152.t: "Slav Dansları"
 elgar.1152.f: "Slav Dansları, Antonín Dvořák tarafından yazılmış 16 enstrümantal parçadan oluşan bir derlemedir; önce dört el piyano için yazılmış, kısa süre sonra orkestraya uyarlanmıştır. Bunlar, Çek bestecinin en ünlü eserleri arasında yer alır. Dvořák’ın besteleri, Bohemya ve Moravya halk danslarının karakteristik ritimlerini, komşu ülkelerin danslarını da kullanır. Ancak eserler, bestecinin tamamen bağımsız yaratımlarıdır. İlk seride iki Furiant, iki Ländler benzeri Sousedská, iki hızlı atlamalı Skočná, bir Polka ve tek Çek olmayan dans olarak Ukrayna Dumka bulunur. İkinci seride ise Çek olmayan danslar çoğunluktadır; bu yüzden Dvořák bazı eleştirilerle karşılaşmıştır. Ülkesine yeterince bağlı olmadığı ve bunun yerine yurtdışında popüler olmak istediği suçlamasıyla karşılaşmıştır."
 elgar.1153.t: "Rusalka"
 elgar.1153.f: "Rusalka, Antonín Dvořák’ın en başarılı operasıdır. Jaroslav Kvapil’in librettosuna dayanır ve rusalkyler (su perileri, deniz kızları) hakkındaki Slav halk efsanelerinden türetilmiştir; Friedrich de la Motte Fouqué’nun Undine’i, Hans Christian Andersen’in Küçük Deniz Kızı masalı ve Eski Fransız Melusine destanı ile benzerlik gösterir. Alt başlığı Lirik Masal olan opera, 'Çek Undine' olarak da bilinir. Bedřich Smetana’nın Pazarlanan Gelin’i ile birlikte, Rusalka en ünlü Çek operalarından biridir. Rusalka, Çek dramatik müziğinin gelişiminde önemli bir yere sahiptir."
 elgar.1161.t: "Do Majör Fantazi (Fantasie in C-Dur)"
 elgar.1161.f: "Do majör Fantezi, Robert Schumann’ın en önemli piyano bestelerinden biridir. 'Kreisleriana' ve 'Çocuk Sahneleri' ile birlikte bestecinin en bilinen eserleri arasında yer alır ve romantik piyano literatürünün temel parçalarındandır. Schumann eseri, hayranlık duyduğu virtüöz Franz Liszt’e adamıştır; Liszt de yıllar sonra büyük Si minör sonatını ona ithaf ederek karşılık vermiştir. Bu piyano fantezisinin vizyoner coşkusu ve tüm eser boyunca sürdürülen gücü, Ludwig van Beethoven’ın mimari ustalığını hatırlatır. Schumann, birinci bölümde Beethoven’ın 'Uzak Sevgiliye' adlı şarkı dizisinden birkaç kez alıntı yaparken, üçüncü bölümde 7. Senfoni’nin Allegretto’sundan bir temayı ele alır."
 elgar.1162.t: "La minör Piyano Konçertosu"
 elgar.1162.f: "La minör, Op. 54 Piyano Konçertosu, Yüksek Romantizm döneminde yazılmış romantik bir piyano ve orkestra konçertosudur. Romantik dönemin birçok özelliğini taşır. 19. yüzyılın bazı piyano konçertoları gibi, senfonik bir karaktere sahiptir. İlk başta bir fantezi olarak tasarlandığından, bütün konser romantik ve fantastik izlenimler taşır. Schumann, tamamlanması geciken bu eser için beş yıldan fazla zaman harcamıştır. Otoğrafın başlığında, Schumann bölümlerin farklı zamanlarda yazıldığını belirtmiştir. Eserin temel fikirleri özlem ve âşık iki insanın mutluluğudur. Schumann, bu eserde Clara Wieck için verdiği mücadeleyi müziğe dönüştürmüştür. Birinci bölümün ana teması, Beethoven’ın 'Fidelio' operasındaki Florestan aryasının melodisine benzer. Beethoven’da olduğu gibi, bu tema da eş sadakati ve özgürlük mücadelesini simgeler."
 elgar.1163.t: "Çocuk Sahneleri"
 elgar.1163.f: "'Çocuk Sahneleri' (Kinderszenen), Robert Schumann’ın on üç kısa piyano parçasından oluşan bir döngüsüdür. 'Gençler için Albüm'ün aksine, bunlar çocuklar için bestelenmiş eserler değil, Schumann’ın kendi sözleriyle 'yaşlı bir kişinin, yaşlı kişiler için yansımasıdır'. Döngünün en ünlü ve en uzun parçası 'Hayal' (Träumerei)’dir. Yaklaşık 20 dakikalık süresiyle 'Çocuk Sahneleri', günümüzde en popüler romantik piyano eserleri arasındadır. Schumann’ın yaşamı boyunca çok başarılı olmasa da, eser en azından onun için özel bir anlam taşıyordu. 1839’daki bir mektuplaşma, Schumann’ın o dönemde Clara Wieck ile evlilik ihtimaline sıkı sıkıya inandığını ve 'Çocuk Sahneleri’nin onun iyimser ve neşeli yanından doğduğunu gösterir."
 elgar.1171.t: "Mi minör Keman Konçertosu"
 elgar.1171.f: "Felix Mendelssohn’un Mi minör Keman Konçertosu, bestecinin son konçertosudur. Prömiyerinde iyi karşılanmış ve o zamandan beri en önde gelen, en çok takdir gören keman konçertoları arasında yerini korumuştur. Keman repertuvarında merkezi bir konuma sahiptir ve her genç konser kemancısının mutlaka öğrenmesi gereken temel bir konçerto olarak görülür; genellikle öğrendikleri ilk romantik dönem konçertolarından biridir. Bu eser, romantik dönemin en önemli keman konçertolarından biri olmuş ve birçok besteci üzerinde etkili olmuştur. Konçerto, hızlı-yavaş-hızlı düzeninde üç bölümden oluşmasına ve her bölüm geleneksel biçimleri izlemesine rağmen, dönemi için yenilikçi sayılan birçok unsur içerir. Dikkat çekici yönlerinden biri, eserin başında kemanın neredeyse hemen devreye girmesidir; klasik dönem konçertolarında alışıldık olduğu üzere orkestranın ana temaları sunmasından sonra değil."
 elgar.1181.t: "Etütler"
 elgar.1181.f: "Frédéric Chopin toplamda 27 piyano etüdü yazmıştır: Op. 10’dan 12 etüt (1833’te yayımlandı), Op. 25’ten 12 etüt (1837’de yayımlandı) ve ayrıca Ignaz Moscheles ile François-Joseph Fétis’in 'Méthodes des Méthodes' adlı piyano okulunun üçüncü bölümü için üç etüt (1840’ta yayımlandı). Bu üç etüt daha sonra ayrı olarak 'Trois nouvelles études' (Üç Yeni Etüt) adıyla basılmıştır. Karl Schumann’ın deyimiyle 'piyano çalmanın Magna Carta’sı' olan bu eserler, müzik tarihinin en önemli piyano kompozisyonları arasında yer alır. Alkan, Scriabin, Debussy ve Rachmaninoff gibi büyük piyano bestecileri bu eserlerden ilham almıştır. Franz Liszt ve Józef Wieniawski, Chopin etütlerini halka açık olarak seslendiren ilk piyanistlerdir."
 elgar.1191.t: "Çar için Bir Yaşam"
 elgar.1191.f: "Yıllarca şarkıcıları dinledikten, müziğiyle kadınları büyüledikten ve Mendelssohn, Berlioz, Liszt gibi ünlü kişilerle tanıştıktan sonra Glinka, yaşamının amacının Rusya’ya dönmek, Rus tarzında besteler yapmak ve Rus müziği için Donizetti ile Bellini’nin İtalyan müziğinde yaptığına benzer bir şey yapmak olduğunun farkına vardı. 'Çar için Bir Yaşam', Glinka’nın iki büyük operasından ilkidir. Eserin asıl adı 'Ivan Susanin' idi. 1612’de geçen bu hikâye, Rus köylüsü ve vatansever kahraman Ivan Susanin’in, Çar’ı arayan bir grup Polonyalı’yı yanlış yola sürükleyerek hayatını feda etmesini anlatır. Bu opera ile Glinka, bağımsız bir Rus müziği yaratmayı başardı; eser ilk Rus operası kabul edilir."
 elgar.1192.t: "Ruslan ve Ludmila"
 elgar.1192.f: "'Ruslan ve Ludmila', Mihail Glinka’nın müziğiyle beş perdeden oluşan 'fantastik bir opera'dır; librettosu Nestor Kukolnik ve başkaları tarafından, Aleksandr Sergeyeviç Puşkin’in aynı adlı şiirine dayanarak yazılmıştır. Puşkin’in ünlü düelloda ölümü, planlandığı gibi librettosunu kendisinin yazmasını engelledi. 'Çar için Bir Yaşam’da olduğu gibi, 'Ruslan' da Rus halk müziğinin bazı öğelerini kullanır; ayrıca disonans, kromatizm ve Doğu unsurlarının yaratıcı kullanımıyla dikkat çeker. Özellikle önemli olan nokta, Rus müziğinde ilk kez tam ses gamının kullanılmasıdır. Neşeli uvertürü, Batı’da en bilinen orkestral gösteri parçalarından biridir ve kontrbasçılar için adeta bir kâbus olarak bilinir."
 elgar.1193.t: "Kamarinskaya"
 elgar.1193.f: "Kamarinskaya, günümüzde çoğunlukla Rus besteci Mikhail Glinka’nın aynı adlı bestesi ile bilinen geleneksel bir Rus halk dansıdır. Glinka’nın 1848’de yazdığı Kamarinskaya, tamamen Rus halk şarkılarına dayanan ilk orkestral eser ve bu türün bestecilik ilkelerini müziğin formunu belirlemek için kullanan ilk çalışmaydı. Eser, Batı odaklı Pyotr Ilyich Tchaikovsky’den The Five olarak bilinen milliyetçi grup dahil olmak üzere bir sonraki Rus besteciler kuşağı için bir başvuru kaynağı oldu ve yurtdışında, özellikle Fransız besteci Hector Berlioz tarafından övgüyle karşılandı. Tchaikovsky için Kamarinskaya, halk şarkılarının senfonik bir yapıda yaratıcı olanaklarını örnekleyen, armonik ve kontrpuan kombinasyonları açısından çeşitli bir model sundu."
 elgar_great_composer: "Büyük Besteci"
 elgar_great_composer_desc: "Büyük Besteciler, bestecilerin crème de la crème’idir. Onlar basitçe en iyisidir ve tüm dünyada tanınırlar."
