 elgar_adopt_national_anthem_decision: "Ulusal Marşı Kabul Et"
 elgar_adopt_national_anthem_decision_desc: "Milliyetçilik arttıkça, ulusal marş olmamak eksikliktir. Temsili törenlerde kullanılacak uygun bir müzik parçası seçmek yeterlidir. Besteciler rastgele parçalar yaratabilir veya doğrudan sipariş edilebilir. Tüm marşların sözlü olması gerekmez ama sözlü olanlar daha prestijlidir."
