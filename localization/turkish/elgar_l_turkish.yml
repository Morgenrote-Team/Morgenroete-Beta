 elgar.1201.t: "Daphnis et Chloé"
 elgar.1201.f: "Daphnis et Chloé, orkestrasyon ve sözsüz koro için yazılmış bir koreografik senfoni (symphonie chorégraphique)dir. Üç ana bölüm ve bir düzine sahneden oluşur, çoğu dans ve yaklaşık bir saat sürer; bestecinin en uzun eseridir. Aslında bir baledir ve ilk olarak bu şekilde sunulmuştur. Dans senaryosu, koreograf Michel Fokine tarafından, 2. yüzyıla tarihlendirilen Yunan yazarı Longus'un pastoral romanından uyarlanmıştır. Yaklaşık bir saat süren Daphnis et Chloé, Ravel'in en uzun eseridir. Dört ayırt edilebilir leitmotiv müzikte birlik sağlar. Bestecinin en tutkulu eserlerinden bazılarını içeren müzik, Empresyonist akımın olağanüstü zengin armonileri ile dikkat çeker; bestecinin yaşamı boyunca yorumcular bunu onun orkestral başyapıtı olarak değerlendirmiştir."
 elgar.1202.t: "Rhapsodie Espagnole"
 elgar.1202.f: "1907-1908 yılları arasında bestelenen Rapsodi, Ravel’in orkestrasyon için yazdığı ilk büyük eserlerden biridir. İlk olarak 1908’de Paris’te sahnelenmiş ve hızla uluslararası repertuvara girmiştir. Parça, bestecinin İspanyol mirasından beslenir ve onun İspanya ile bağlantılı eserlerinden biridir. Rapsodi’nin prömiyeri, 15 Mart 1908’de Théâtre du Châtelet’de, Édouard Colonne yönetiminde Orchestre des Concerts Colonne tarafından gerçekleştirilmiştir. Eleştirmenler genellikle olumlu görüş belirtmiştir. Ravel’in müziğini alışkanlıkla sevmeyen Pierre Lalo ve eseri 'zayıf, tutarsız ve geçici' olarak nitelendiren Gaston Carraud eleştirmenler arasındadır. Bunun dışında orkestrasyonun inceliği ve müziğin resimsel niteliği övgüyle karşılanmıştır."
 elgar.1203.t: "Boléro"
 elgar.1203.f: "'Sadece bir başyapıt yaptım, o da Boléro; ne yazık ki içinde hiçbir müzik yok.' - Maurice Ravel"
 elgar.1211.t: "On İki Ton Tekniği"
 elgar.1211.f: "On iki ton tekniği – dodekafoni, on iki ton serisizmi ve (İngiliz kullanımında) on iki nota besteleme olarak da bilinir – bir müzik besteleme yöntemidir. Bu teknik, bir eserdeki 12 nota sınıfının tümünü eşit sıklıkta duyurmayı ve herhangi bir nota üzerinde vurguyu önlemeyi amaçlar. Tüm 12 nota daha az çok eşit öneme sahip olur ve müzik bir tonaliteye bağlı kalmaz. Zamanla teknik büyük popülarite kazanmış ve 20. yüzyıl bestecilerini derinden etkilemiştir. Genellikle serisizm biçimi olarak kabul edilir."
 elgar.1211.g: "Buna iyi bir fikir olduğundan pek emin değilim."
 elgar.1212.t: "String Quartet No 2"
 elgar.1212.f: "Dört bölümden oluşan bu eser, Schoenberg’in hayatında çok duygusal bir dönemde yazılmıştır. Üçüncü ve dördüncü bölümler bir yaylı çalgılar dörtlüsü için oldukça sıra dışıdır; soprano şarkıcı da yer alır ve Stefan George tarafından yazılmış şiirler kullanılır. Schoenberg George’u ayarlarken daha sonra şöyle yazmıştır: 'Alman şair Stefan George’un şiirlerinden ilham alarak bazı şiirlerine müzik besteledim ve şaşırtıcı bir şekilde, benim beklentim olmadan, bu şarkılar öncekilerimden oldukça farklı bir stil gösterdi. … Yeni sesler üretildi, yeni bir melodi türü ortaya çıktı, duyguların ve karakterlerin ifadesi için yeni bir yaklaşım keşfedildi.'"
 elgar.1212.g: "Harika! Ama 'müzik' şimdilik durabilir mi?"
 elgar.1213.t: "Oda Senfonisi No. 1"
 elgar.1213.f: "Schoenberg’in ilk oda senfonisi 1906’da tamamlanmış ve 8 Şubat 1907’de Viyana’da Rosé Quartet ve Viyana Filarmoni’den bir nefesli topluluk eşliğinde bestecinin yönetiminde prömiyerini yapmıştır. 1913’te Schoenberg tekrar eseri yönetmiş, ünlü Skandalkonzert sırasında, Schoenberg’in ve öğrencisi Alban Berg’in heterodoks tonalleri katılımcıları isyan etmeye ve konseri erken bitirmeye teşvik etmiştir."
 elgar.1213.g: "Bu hiç bitmeyecek mi?"
 elgar.1221.t: "The Firebird"
 elgar.1221.f: "Ateşkuşu, Rus masallarındaki Ateşkuşu ve sahibine getirdiği hem nimet hem laneti konu alan bir bale ve orkestral konser eseridir. Baledeki ölümlü ve doğaüstü unsurlar, 'leit-armoni' olarak adlandırılan armoniye yerleştirilmiş leitmotif sistemiyle ayırt edilir. Stravinsky orkestrada özellikle ponticello, col legno, flautando, glissando ve flutter-tongue gibi birçok özel tekniği bilerek kullanmıştır. Bale, ölümsüz kötü Kosçey’in kalesinde geçer; Prens İvan, büyülü Ateşkuşu’nun yardımıyla Kosçey ile savaşır."
 elgar.1222.t: "Petruşka"
 elgar.1222.f: "Petruşka, Sergei Diaghilev’in Ballets Russes topluluğunun 1911 Paris sezonu için yazılmıştır. Bale, üç kuklanın aşk ve kıskançlık hikâyesini anlatır. Üçü de 1830’daki Aziz Petersburg Şrovetide Fuarı’nda (Maslenitsa) Şarlatan tarafından hayata getirilir. Petruşka, müzik, dans ve tasarımı bir bütün içinde birleştirir. Ballets Russes’in en popüler yapımlarından biridir. Günümüzde genellikle özgün tasarımlar ve koreografiyle sahnelenir. Eser, baş karakterin ortaya çıkışını haber veren bitonalite tekniği olan 'Petruşka akoru' ile karakterizedir."
 elgar.1223.t: "Bahar Ayini"
 elgar.1223.f: "Bahar Ayini, Rus besteci Igor Stravinsky’nin bale ve orkestral konser eseridir. 1913 Paris sezonunda Sergei Diaghilev’in Ballets Russes topluluğu için yazılmıştır; özgün koreografi Vaslav Nijinsky’ye, sahne tasarımı ve kostümler Nicholas Roerich’e aittir. 29 Mayıs 1913’te Théâtre des Champs-Élysées’deki ilk gösterimde, müzik ve koreografinin avangart doğası büyük sansasyon yarattı. Birçok kişi bu ilk gece tepkisini 'isyan' ya da 'neredeyse isyan' olarak nitelese de, bu ifadeler aslında on yıl sonra yapılan eleştirilerde ortaya çıktı. Her ne kadar sahne için, karakterler ve olaylarla ilişkilendirilmiş bölümlerle tasarlanmış olsa da, müzik konser eseri olarak en az aynı derecede, hatta daha fazla ün kazandı ve 20. yüzyılın en etkili müzik eserlerinden biri olarak kabul edilir."
