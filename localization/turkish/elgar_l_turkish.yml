 elgar_faido_modifier: "Fado Müzik Kültürü"
 elgar.535.t: "Saudade’nin Sesi"
 elgar.535.d: "Lizbon’un dar sokaklarından ve Alfama’nın meyhanelerinden yeni bir müzik türü doğuyor—hüzünlü, ham ve derinlemesine Portekizli. Bunun adı Fado."
 elgar.535.f: "19. yüzyılın ilk on yıllarında, Lizbon’un işçi sınıfı mahallelerinde ve liman bölgelerinde kendine özgü bir tür kök saldı. Fado—kelime anlamıyla “kader”—denizciler, fahişeler ve şehirli yoksullar tarafından söyleniyordu, çoğu zaman Portekiz gitarasının yumuşak ağlayışı eşlik ediyordu. Şarkı sözleri özlem, kabullenme ve nostaljiden bahsediyordu; yerlilerin *saudade* dediği, çevrilemeyecek kadar karmaşık bir duygu.\n\nBaşta sıradan sokak müziği olarak küçümsense de, Fado yavaş yavaş sanatsal saygınlık kazandı. Aristokratlar fadistaları salonlarına davet etmeye başladı ve 1840’lara gelindiğinde, Lizbon’un müzik salonlarında halka açık performanslar yaygındı. Yeni bir müzikal kimlik doğuyordu—tamamen Portekizli, değişen bir ulusun acılarını ve gururunu yankılayan."
 elgar.535.g: "Fado’yu ulusal kimliğin sembolü olarak yeşertelim."
 elgar.535.h: "Resmileştirilmesini ve profesyonel performansını teşvik et."
