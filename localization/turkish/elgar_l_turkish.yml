 elgar_art_nouveau_tech_desc: "#R Bu teknoloji yalnızca Morgenröte arayüzündeki Sanat Sekmesindeki bir düğme aracılığıyla kullanılabilir!#!\n\n[concept_elgar_art_nouveau], uluslararası bir sanat, mimari ve uygulamalı sanat tarzıdır, özellikle dekoratif sanatlarda görülür. Stil farklı dillerde farklı adlarla bilinir: Almanca’da *Jugendstil*, İtalyanca’da *Stile Liberty*, Katalanca’da *Modernisme* ve İngilizce’de *Modern Style*. Genellikle bitkilerin ve çiçeklerin kıvrımlı hatları gibi doğal biçimlerden ilham alınmıştır. Mimarlar ve tasarımcılar, sanatları birleştirecek manevi açıdan yüceltici bir *Gesamtkunstwerk* (“tam sanat eseri”) arayışına girmişlerdir."
 elgar_impressionism_tech_desc: "#R Bu teknoloji yalnızca Morgenröte arayüzündeki Sanat Sekmesindeki bir düğme aracılığıyla kullanılabilir!#!\n\n[concept_elgar_impressionism], 19. yüzyıldan kalma bir sanat tarzıdır ve gelip geçici anların atmosferik tasvirleriyle karakterize edilir. İzlenimcilik terimi ayrıca müzik, edebiyat, sinema ve fotoğrafçılıktaki bazı tarzlara da uygulanmıştır."
 elgar_expressionism_tech_desc: "#R Bu teknoloji yalnızca Morgenröte arayüzündeki Sanat Sekmesindeki bir düğme aracılığıyla kullanılabilir!#!\n\n[concept_elgar_expressionism], başlangıçta şiir ve resimde ortaya çıkan modernist bir harekettir. Tipik özelliği, dünyayı tamamen öznel bir bakış açısından sunması, duygusal etki yaratmak için onu kökten çarpıtmasıdır; amaç, ruh hallerini ya da fikirleri uyandırmaktır."
 elgar.423.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName], sahip olduğu çoklu görevler göz önüne alındığında çalışma koşullarının yeterince iyi olmadığından şikâyet ediyor. Belki maddi destek, onun 'ilhamını' artırabilir."
 elgar.424.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] bir süredir beste yapmaya çalışıyor, ancak [SCOPE.sCharacter('elgar_conductor').GetSheHe] sürekli belirli bir kişi tarafından rahatsız ediliyor."
 elgar_irrationalism_tech_desc: "İrrasyonalizm, 19. yüzyılın başlarında ortaya çıkan felsefi bir akımdır ve insan yaşamının akıl dışı boyutunu vurgular. İrrasyonalistler, insan aklının tek başına nesnel gerçekliğin temellerini, bağlantılarını ve yasalarını tanımada yetersiz olduğunu savunur. Dünyayı betimleyici ve normatif açıklamalara alternatif olarak sezgi, inanç veya doğrudan deneyim gibi daha yüksek bilişsel işlevler öne sürülür."
