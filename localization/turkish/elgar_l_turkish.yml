 elgar.802.t: "Eski Marş"
 elgar.802.d: "Yasa değişti ve önceki marş artık uygun değil. Birçok kişi bunu eski bir sistemin kalıntısı olarak görüyor. Değişim baskısı artıyor."
 elgar.802.f: "'Filosu olmayan bir amiralimiz var. Sahili olmayan bir ülkeyi yönetiyor. Kralı olmayan bir krallık.'"
 elgar.802.g: "Bu marş artık ülkemizi temsil etmiyor."
 elgar.803.t: "Gerici Marş"
 elgar.803.d: "Önceki marş iptal edilmeli diyen sesler yükseliyor. Politikacılar, ülkenin başarılarını vurgulayan yeni bir marş istiyor."
 elgar.803.f: "'İleri halk, kurtuluşa doğru\nKızıl Bayrak, Kızıl Bayrak\nİleri halk, kurtuluşa doğru\nKızıl Bayrak kazanacak.\nKızıl Bayrak zafer kazanacak,\nKızıl Bayrak zafer kazanacak,\nKızıl Bayrak zafer kazanacak,\nYaşasın komünizm ve özgürlük.'"
 elgar.811.t: "[ROOT.GetCountry.GetNameNoFormatting] Marşı"
 elgar.811.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting], resmi törenlerde çalınacak bir müzik parçası belirledi. Seçim şu şekilde oldu..."
 elgar.821.t: "[ROOT.GetCountry.GetNameNoFormatting] için Müzik"
 elgar.821.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], bestede özel bir isteğin olup olmadığını sordu. Hangi noktaya dikkat edilmesi gerektiğini merak ediyor."
 elgar.821.f: "Ulusal marşlar beş türdedir. Monarşi marşları meşruiyeti artırır. Halk marşları huzuru sağlar. Değer marşları vatandaşları daha dirençli yapar. Askeri marşlar savunmayı güçlendirir. Konsey Cumhuriyetleri işçi marşları yaptırabilir."
 elgar.821.g: "Marş hükümdarımızı övmek için yapılacak."
 elgar.821.h: "Halk şarkısı, devlet ile halkı birleştirir."
 elgar.821.i: "Ülkemizin değerlerini temsil eden bir marş bestele."
 elgar.821.j: "Halkımızı savaşa motive edecek bir şarkıya ihtiyacımız var!"
 elgar.821.k: "Sadece işçi marşı kabul edilebilir."
 elgar.822.t: "Marş Melodisi Tamamlandı"
 elgar.822.d: "Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName], olası yeni marşın notalarını sundu. Devletin kabul edip etmeyeceği hâlâ belirsiz."
 elgar.822.f: "Birçok marş, ulusal marş olarak seçilmedi. Nedenleri farklıdır. Devlet hâlâ onaylamalı. Hem sözleri hem melodisi olan marşlar daha güçlüdür."
 elgar.822.g: "Umarız halk tarafından da kabul görür..."
 elgar.831.t: "Marş Sözleri Tamamlandı"
 elgar.831.d: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName], ülkenin ulusal marşı için değerli sözlere ihtiyaç duyabileceğini uzun süredir düşünüyordu. Yazar, uzun zamandır bilinen notalara uygun sözleri hızla yazdı."
 elgar.831.f: "'---------' -La Marcha Real"
