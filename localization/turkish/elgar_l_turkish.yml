 elgar.9.t: "On iki ton tekniği"
 elgar.9.d: "Müzikal duraklamaların ardından, modern besteciler müzik dünyasını devrim niteliğinde değiştirecek yeni bir kavram geliştirdi."
 elgar.9.f: "On iki ton tekniği - dodekafoni, on iki tonlu serializm ve (İngiliz kullanımında) on iki notalı kompozisyon olarak da bilinir - müzik kompozisyonu için bir yöntemdir. Bu teknik, bir müzik parçasında kromatik skalanın tüm 12 notasının birbirine eşit sıklıkta çalınmasını ve herhangi bir notanın vurgusunun önlenmesini sağlamak için tonal diziler, yani 12 pitch sınıfının sıralamalarını kullanır. Böylece tüm 12 nota birbirine eşit önem verilmiş olur ve müzik bir ton içinde yer almaz. Zamanla, bu teknik büyük ölçüde popülerleşti ve nihayetinde 20. yüzyıl bestecilerini geniş ölçüde etkilemiştir. Genellikle bir serializm biçimi olarak kabul edilir."
 elgar.9.g: "Bu iyi bir fikir olup olmadığı konusunda pek emin değilim."
