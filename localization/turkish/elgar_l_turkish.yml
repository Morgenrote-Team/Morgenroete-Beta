 elgar_classicism_tech: "Klasisizm"
 elgar_classicism_tech_desc: "Klasisizm, sanatlarda genel olarak bir klasik döneme, Batı geleneğinde klasik antikiteye büyük bir saygıyı ifade eder ve bu dönemlerin zevk standartları olarak kabul edilir. Klasisizm, en saf haliyle, eski Yunan ve Roma'nın kültürüne, sanatına ve edebiyatına dayanan bir estetik tutumdur. Form, sadelik, oran, yapı açıklığı, mükemmeliyet, sınırlı duygu ile birlikte, zekaya açık bir çağrıya vurgu yapar."
 elgar_irrationalism_tech: "İrrasyonellik"
 elgar_modern_art_tech: "Modern Sanat"
 elgar_modern_art_tech_desc: "#R Bu teknoloji sadece bir dummy'dir ve araştırılamaz. [concept_elgar_impressionism], [concept_elgar_expressionism] veya [concept_elgar_art_nouveau] başlıklarını elde etmek için Günlük Girişlerini tamamlayın!#!"
 elgar_art_nouveau_tech: "Art Nouveau"
 elgar_art_deco_tech: "Art Déco"
 elgar_art_deco_tech_desc: "Art Déco, modern stilleri ince zanaat işçiliği ve zengin malzemelerle birleştirdi. En parlak döneminde, lüks, cazibe, neşe ve sosyal ve teknolojik ilerlemeye olan inancı temsil ediyordu. Art Déco, gerçekten uluslararası bir stilin ilk örneklerinden biridir, ancak egemenliği II. Dünya Savaşı'nın başlangıcıyla sona erdi."
 elgar_impressionism_tech: "Empresyonizm"
 elgar_neoclassicism_tech: "Neoklasisizm"
 elgar_neoclassicism_tech_desc: "Yüzyılın başında, klasik ideallere olan yeni bir ilgi vardı: Neoklasisizm. Bu, en azından müzik, felsefe ve edebiyatı kapsıyordu. Mimarlar, Roma ve Yunan inşaatını model olarak kullanmaya devam ederken, besteciler Barok müziği bir ilham kaynağı olarak yeniden keşfediyorlardı."
 elgar_expressionism_tech: "Ekspresyonizm"
 elgar_new_objectivity_tech: "Yeni Nesnelcilik"
 elgar_new_objectivity_tech_desc: "Bu terim, öncelikle Alman resminde bir eğilimi tanımlasa da, kendi hayatını bulmuş ve Weimar Almanyası'ndaki halk hayatı ile buna uyum sağlamak için yaratılan sanat, edebiyat, müzik ve mimarinin tutumunu tanımlamak için kullanılmaya başlanmıştır. Felsefi bir nesnellik hedefi olmaktan ziyade, dünyayla pratik bir angajmana yönelme anlamına geliyordu - iş odaklı bir tutum, Almanlar tarafından doğrudan Amerikalı olarak anlaşılmaktaydı."
 elgar_mass_culture_tech: "Kitle Kültürü"
 elgar_mass_culture_tech_desc: "#R Bu teknoloji yalnızca Günlük Girişi ile açılabilir!#!\n\n'Kitle'nin kültürün temsil ettiği tüm geleneklere karşı anlayışsız düşmanlığı, köylülerin bilgeliğini şaşırtan keskin ve soğuk zekayı, cinsellik ve toplumla ilgili tüm konularda oldukça ilkel içgüdülere dayanan yeni bulunan doğalcılığı, ücret anlaşmazlıkları ve spor stadyumları şeklinde yeniden ortaya çıkan panem et circenses’i - bunlar, Kültürün kesin olarak kapanmasını ve insan varoluşunun oldukça yeni bir aşamasının başlangıcını işaret etmektedir.' - Oswald Spengler, Batının Çöküşü"
