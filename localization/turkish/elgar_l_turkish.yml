 je_elgar_accademia_santa_cecilia: "Santa Cecilia’yı Akademi seviyesine yükselt"
 je_elgar_accademia_santa_cecilia_reason: "Accademia di Santa Cecilia, Papa V. Sixtus’un 1585’te yayımladığı 'Ratione congruit' fermanıyla bir topluluk olarak kuruldu. 1838’de Aziz Cecilia Cemaati resmen Akademi, ardından Papalık Akademisi olarak adlandırıldı. O dönemdeki üyeleri arasında Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod ve Meyerbeer bulunuyordu. Onursal üyelerinden biri Kraliçe Victoria idi. Birleşik İtalya’da önde gelen bir konservatuvara dönüştü."
 je_elgar_leipzig_conservatory: "Leipzig Konservatuvarı’nı kur"
 je_elgar_leipzig_conservatory_reason: "Johann Sebastian Bach’ın da faaliyet gösterdiği geleneksel müzik şehri Leipzig, 19. yüzyılın başlarında müzikal ve akademik yetenekler için bir merkez kurulması adına ideal koşullar sundu. Şehrin dört girişimci vatandaşı — avukat Heinrich Conrad Schleinitz (ikinci müdür), Leipzig bölge müdürü Johann Paul von Falkenstein, Kraliyet Saksonya Saray Danışmanı Johann Georg Keil ve Gewandhaus Kapellmeister’i Felix Mendelssohn Bartholdy — mevcut fikirleri hayata geçirdiler."
 je_elgar_petrograd_conservatory: "Petrograd Konservatuvarı’nı kur"
 je_elgar_petrograd_conservatory_reason: "Büyük Düşes Elena Pavlovna, Anton Rubinstein, Andrei Nikolayeviç Markoviç ve toplum ile müzik hayatından diğer şahsiyetlerin girişimiyle Rusya Müzik Derneği kuruldu. Bu derneğin müzik derslerinden, Rusya’daki ilk konservatuvar doğdu. İlk müdürü ve piyano profesörü Anton Rubinstein oldu. Buradan kompozisyon eğitimini tamamlayan ilk mezun Pyotr Çaykovski idi. Nikolay Andreyeviç Rimski-Korsakov özellikle kompozisyon, orkestrasyon dersleri ve orkestra sınıfı başkanlığı ile büyük etki yaptı."
 elgar.201.t: "[SCOPE.sState('elgar_art_capital').GetCityHubName] Ödülü"
 elgar.201.d: "Sanata düşkün ülkemizin seçkinleri, en iyi bestelere bir sanat ödülü verilmesi için bastırıyor."
 elgar.201.f: "İrrasyonalizm veya Empresyonizm merkezi olan ülkeler zaman zaman müzik yarışmaları düzenler. En yetenekli beş besteci, itibarlarını etkileyebilecek bir ödül alır. Sanat ödülü genellikle her beş yılda bir verilir. Büyük Besteciler davet edilmez – zaten ödüllerini almışlardır."
 elgar.201.g: "Bir sanat yarışması düzenlemeliyiz."
 elgar.201.h: "Ne israf!"
