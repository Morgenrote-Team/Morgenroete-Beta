 gaudi.81.t: "Mimarlar Usta İşi" #deepl:681011782
 gaudi.81.d: "Son yıllarda [THIS.GetCountry.GetName], mimarlık alanında önde gelen ülkelerden biri haline geldi. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] bu gelişmede önemli bir rol oynadı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], antik, ortaçağ ve modern çağların büyük harikalarına rakip olacak bir anıt tasarlama görevini kabul etti." #deepl:2672646441
 gaudi.81.f: "Mimar Anıtı, Büyük Mimar'ın tercih ettiği stile dayanmaktadır:\n\nArt Deco Mimarları [GetBuildingType('building_gaudi_people_monument').GetName]'u tasarlayacaktır.\nBauhaus Mimarları [GetBuildingType('building_gaudi_forum_monument').GetName]'u sunacaktır.\nNeoklasik Mimarlar [GetBuildingType('building_gaudi_people_palace').GetName]'u yaratacaktır." #deepl:4088582525
 gaudi.81.g: "Muhteşem." #deepl:573443058

