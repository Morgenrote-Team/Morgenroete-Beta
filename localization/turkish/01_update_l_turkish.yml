 je_gaudi_blueprint_research_reason: "Mimarımız, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], yorulmak bilmeden yeni bir bina planı üzerinde çalışıyor. Bu süre mimarın becerilerine bağlıdır; genellikle üç yıl sürer. Çalışmalar tamamlandığında benzersiz, yeni bir bina kullanıma hazır olacaktır." #deepl:201849280
