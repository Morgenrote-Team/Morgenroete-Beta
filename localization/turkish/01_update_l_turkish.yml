 gaudi.511.d: "Konu [ROOT.GetCountry.GetCapital.GetCityHubName] adresini güzelleştirmeye geldiğinde, şehir planlamasında bir anlaşmazlık yaşandı." #deepl:2161912626
 gaudi.512.t: "Çevre Yolu Üzerindeki Heykeller" #deepl:1070850347
 gaudi.512.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]'un yeni çevre yolu üzerine yeni bir grup figür dikilecek, ancak hangi mitolojik figürün özel bir yere sahip olacağı belli değil." #deepl:275330526
 gaudi.513.f: "Hükümetin amiral gemisi olarak yeni bir bakanlık inşa edilecekti, ancak sürekli plan değişiklikleri, genişleme ve gizli yolsuzluklar binanın inşaatının uzamasına ve tüm fonların tamamlanana kadar kullanılmasına neden oldu. Tamamlanmamış bina birkaç geçici önlemle işlevsel bir duruma getirilebilir, ancak bu muhtemelen beklenenden daha küçük ofisler ve daha az konforla yetinmek zorunda kalacak olan hükümetin çıkarlarına uygun değildir. Daha fazla inşaat mümkündür, ancak muhtemelen pahalı olacaktır." #deepl:3580582680

 gaudi.511.t: "Çeşme mi Pavillon mu?" #deepl:2151137688
 gaudi.511.f: "Biri bunu imparatorun sakalıyla ilgili bir tartışmayla karıştırabilir: bir küçüklükten somut bir siyasi anlaşmazlık gelişti. Estetik değeri yüksek temsili bir meydanda bir inşaat projesi söz konusu. Bir grup orada oyalanmak için bir pavyon inşa etmek isterken, diğeri bir çeşme yapılmasını savunmaktadır. Tek bir arsa olduğu için projelerden sadece biri inşa edilebilir; bir uzlaşma mümkün değildir." #deepl:1541667756
 gaudi.511.g: "Pavyonu inşa ediyoruz." #deepl:2064679099
 gaudi.511.h: "Çeşmeyi biz inşa ederiz." #deepl:2431357846
 gaudi.511.i: "Burası için kendi planlarım var." #deepl:53271135
 gaudi.512.f: "Çevre yolu planlanırken bazı ayrıntılar hala belirsizliğini korumaktadır. Hangi figürlerin belirgin bir konuma yerleştirileceği henüz belirlenmemiştir. Bunların Roma panteonundan figürler olması gerektiği açıktır. Nüfusun belirli kesimleri ilgili figürlerle özdeşleşiyor - örneğin, kapitalistler ticaret tanrısı Merkür'ün ortaya yerleştirilmesini önerdiler. Öte yandan aristokratlar tanrıların babası Jüpiter'de ısrar etmektedir. Ordu Mars'ı tercih ediyor, akademisyenler ise Apollo'nun merkezde olmasını istiyor." #deepl:3457913174
 gaudi.512.g: "Jüpiter." #deepl:641978563
 gaudi.512.h: "Merkür." #deepl:4064282680
 gaudi.512.i: "Apollo." #deepl:2704921915
 gaudi.512.j: "Mars." #deepl:4251022611
 gaudi.513.t: "Bakanlık binası maliyeti aşıyor" #deepl:3536337121
 gaudi.513.d: "Yeni bakanlık binasının inşaatı küçük bir skandala dönüşüyor." #deepl:3745484689
 gaudi.513.g: "Bir bütçe vardı ve bu bütçeye uyulması gerekiyordu." #deepl:2982007153
 gaudi.513.h: "Bu talihsiz bir durumdur, ancak bu alanda yaygındır." #deepl:3799202878
 gaudi.513.i: "Bu proje ihtiyaç duyduğu kadar para ve zaman almalıdır." #deepl:3703152475
 gaudi.514.t: "Yeni Kahve Evi" #deepl:760472506
 gaudi.514.d: "Ringstrasse'de yeni bir kahve evi açıldı." #deepl:977697169
 gaudi.514.f: "'Kahvehane, yeni olan her şey için en iyi eğitim yerimiz olmaya devam etti. Bunu anlamak için Viyana kahvehanesinin dünyadaki hiçbir benzer kurumla kıyaslanamayacak kadar özel bir kurum olduğunu bilmek gerekir. Aslında herkesin ucuz bir fincan kahve karşılığında ulaşabileceği, bu küçük ücret karşılığında her misafirin saatlerce oturabileceği, tartışabileceği, yazabileceği, kağıt oynayabileceği, mektuplarını alabileceği ve hepsinden önemlisi sınırsız sayıda gazete ve dergi tüketebileceği bir tür demokratik kulüptür. Daha iyi bir Viyana kahvesinde tüm Viyana gazeteleri mevcuttu, sadece Viyana gazeteleri değil, tüm Alman İmparatorluğu'nun, Fransız, İngiliz, İtalyan ve Amerikan gazeteleri ve dünyadaki tüm önemli edebiyat ve sanat eleştirileri. Böylece dünyada olup biten her şeyi ilk elden biliyorduk, yayınlanan her kitaptan, nerede olursa olsun her performanstan haberimiz oluyor ve tüm gazetelerdeki eleştirileri karşılaştırıyorduk. Belki de hiçbir şey Avusturyalı'nın entelektüel esnekliğine ve uluslararası yönelimine, kahvehanede dünyadaki tüm olaylar hakkında bu kadar kapsamlı bir şekilde kendini yönlendirebilmesi ve aynı zamanda bunları dost çevrelerde tartışabilmesi kadar katkıda bulunmamıştır. Her gün saatlerce orada oturduk ve hiçbir şeyi kaçırmadık. - Stefan Zweig" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] ziyaret etmelisiniz." #deepl:3567062403
 gaudi.514.h: "Bu da Viyana'daki yaşam standardını yükseltecektir." #deepl:993415000
 gaudi.515.t: "Çevre Yolu Palas" #deepl:2889767777
 gaudi.515.d: "Bir asilzade, [ROOT.GetCountry.GetCapital.GetCityHubName] adresindeki yeni şehir bölgesinde bir saray inşa ederken aşırıya kaçtı. Yarım kalmış bina harabesi, göze batan bir görüntüye dönüşme tehdidi taşıyor." #deepl:3082201997
 gaudi.515.f: "Ring Yolu Sarayı, Viyana'nın Ringstrasse'sindeki görkemli saraylar için kullanılan bir terimdir. Bu binalar çoğunlukla eski soylular ya da 19. yüzyılın sonlarında bankacılar ve sanayiciler tarafından inşa edilmiştir. Saraylar Neo-Barok ve Neo-Rönesans ya da Neo-Maniyerizm tarzının bir karışımı olarak inşa edilmiştir. Aynı zamanda yükseliş ve statü sembolüydüler. Ancak, inşaatçılardan biri son zamanlarda aşırı zorlandı ve iflasla karşı karşıya kaldı. İnsanlar, en kötü durumda yeniden yıkılması gerekecek ve böylece tüm projenin tamamlanma süresi uzayacak olan bu göze batan görüntüyle şimdiden alay ediyor." #deepl:2482976903
 gaudi.515.g: "Masrafları paylaşıyoruz." #deepl:1778759255
 gaudi.515.h: "Bu bizi ilgilendirmez." #deepl:2515722656
 gaudi.516.t: "Sermaye Genişletme: İyi ilerleme kaydedildi" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] sermaye artırımının daha erken tamamlanabileceğini ifade etmiştir." #deepl:1876608469
 gaudi.516.f: "Bilinmeyen nedenlerden dolayı her şey daha hızlı ilerliyor: vatan sevgisi, yüksek maaşlar, yerel elitlerin dostça desteği ya da sadece daha iyi hava olabilir." #deepl:771529955
 gaudi.516.g: "Harikulade." #deepl:1621308786
 gaudi.517.t: "Sermaye Genişletme: Yavaş ilerleme" #deepl:4246146058
 gaudi.517.d: "Ne yazık ki, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] adresindeki inşaat yönetimi bugün [ROOT.GetCountry.GetCapital.GetCityHubName] adresindeki yeni bölge inşaatının programın gerisinde kaldığını kabul etmek zorunda kaldı." #deepl:984753109
 gaudi.517.f: "Bilinmeyen nedenlerden ötürü her şey daha yavaş ilerliyor: ister düşman siyasi unsurların kışkırtması, ister sendikaların iş ahlakını baltalaması, ister İlluminati komplosu ya da sadece kötü hava koşulları olsun." #deepl:967308050
 gaudi.517.g: "Ne yazık ki." #deepl:1477108256
 gaudi.518.t: "Anıt için [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "Ringstrasse için yeni bir anıt planlanıyor: Kralımızın bir heykeli [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:642834231
 gaudi.518.f: "Ringstrasse Avusturya tarihini gözler önüne sermeye hizmet etmiştir. Bir yandan Habsburg hükümdar ailesinden gelen uzun hükümdarlar ölümsüzleştirilirken, Maria Theresa en gösterişli anıta sahip olmuştur. Ancak Eugen von Savoyen veya Schwarzberg gibi generaller de Viyana şehir manzarasını zenginleştirdi. Burjuvazi ise kendi temsilcilerini, yani şair prensler Goethe ve Schiller'in yanı sıra büyük besteciler Schubert, Mozart ve Beethoven'i ölümsüzleştirmeye büyük önem verdi." #deepl:795951503
 gaudi.518.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] olmak güzel." #deepl:2477877691
 gaudi.518.h: "Güzel - ama bunun yerine Ringstrasse'yi tamamlamaya odaklanın." #deepl:1336009648
 gaudi.519.t: "Ateş!" #deepl:3279516897
 gaudi.519.d: "Yıkıcı bir yangın [ROOT.GetCountry.GetCapital.GetCityHubName] adresindeki bir şantiyede bulunan birkaç binayı yok etti." #deepl:603406045
 gaudi.519.f: "Çevre yolu üzerindeki en bilinen felaket 8 Aralık 1881'de meydana gelen Ringtheater yangınıdır. Bu yangın 19. yüzyılın en büyük yangın felaketlerinden biridir. Tahminler yüzlerce, hatta binden fazla kişinin öldüğü yönünde değişmektedir. Yangının nedeni gaz aydınlatmasında meydana gelen bir arızaydı ve bu da gazın bir sonraki tutuşma denemesinde kaçmasına ve patlamasına neden oldu. Ortaya çıkan yangın, sahnenin geri kalanına ve nihayetinde oditoryuma hızla yayılmadan önce fon trenlerine sıçradı. Yangının, özellikle tiyatro alanında önleyici yangından korunma ve Avusturya'da tiyatro inşaatına ilişkin ilgili yasal hükümler üzerinde ulusal ve uluslararası etkileri oldu. Akşamki performans için bileti olan besteci Anton Bruckner, hasta olduğu için evde kalarak ölümden kurtuldu." #deepl:1763422665
 gaudi.519.g: "Korkunç bir gün." #deepl:3953408834
 gaudi.520.t: "Şehir Genişlemesine Karşı Önyargılar" #deepl:3932558777
 gaudi.520.d: "Kırsal nüfusun temsilcileri [ROOT.GetCountry.GetCapital.GetCityHubName] 'un gelişimini sıradan kırsal nüfus için bir dezavantaj olarak görmektedir." #deepl:3359656956
 gaudi.520.f: ""Hükümet, başkentteki tarifsiz havasıyla, sadece birkaç sokak ötesini düşünen ve [ROOT.GetCountry.GetCapital.GetCityHubName] adresinden hiç ayrılmayan şehir sakinlerinden oluştuğunu açıkça ortaya koyuyor. Sadece başkente gelen, ancak küçük kasabalardaki ya da köylerdeki sıradan taşralıların hiçbir şey fark etmediği muazzam meblağlar orada çarçur ediliyor. Arkasındaki ideoloji merkeziyetçiliği destekliyor, bürokrasiyi destekliyor, devlet aygıtını destekliyor ve ona yardımcı oluyor; ama böylesine çökmüş bir proje sıradan insana hangi perspektifi sunuyor?" #deepl:2119590629
 gaudi.520.g: "Çalışkan kırsal nüfusun yararına dostça bir hediyeye ne dersiniz?" #deepl:1425408969
 gaudi.520.h: "Şehir ve il eşittir." #deepl:154752402
 gaudi.520.i: "Bu aptal çiftçi konuşması kimin umurunda?" #deepl:1424618973
 gaudi.521.t: "Sanayici Konutu" #deepl:1054941492
 gaudi.521.d: "Zengin bir işadamı yeni bir saray inşa ettirdi ve böylece [ROOT.GetCountry.GetCapital.GetCityHubName] 'u büyük bir binayla zenginleştirdi." #deepl:2324185893
 gaudi.521.f: "Sanayicilerin ve bankacıların sarayları, devletteki yeni konumlarını vurgulamanın bir yolu olarak görülüyordu. Yahudi kökenli zenginler için de özgürleştiklerini vurgulamak mümkündü. Viyana'nın 19. yüzyıldaki gelişimi buna iyi bir örnektir. En ünlü çevre yolu saraylarından biri Palais Epstein'dır. Sanayici ve banker Gustav Ritter von Epstein için inşa edilmiştir. Mimarı, bitişiğindeki Avusturya Parlamento Binasını da tasarlayan Theophil Freiherr von Hansen'dir. Beş kat yüksekliğindedir ve zamanının tipik neo-rönesans tarzında inşa edilmiştir." #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] büyüyor ve gelişiyor." #deepl:2259204183
 gaudi.522.t: "Kışlanın Genişletilmesi" #deepl:3408528723
 gaudi.522.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] adresinin genişletilmesi, kışlaların modernize edilmesi ve genişletilmesi için bir fırsat sunmaktadır." #deepl:933440251
 gaudi.522.f: "Franz-Josephs-Baracks, bugünkü Ringstrasse bölgesinde yer alan ve uzun süre büyük ölçekli projenin inşası önünde engel teşkil eden bir Viyana kışla binasıydı. Kışla, adını İmparator I. Franz Joseph'ten almış ve 1848 devriminin ardından 1854-1857 yıllarında inşa edilmiştir. Kışla, inşasından kısa bir süre sonra, 1857'de başlayan Viyana Ringstrasse'nin gelişiminin önünde durdu, ancak ordunun buradan tekrar taşınması için kırk yıl geçmesi gerekti. Bu nedenle Franz Joseph kışlasının kaybını telafi etmek için önceden yeni kışlaların inşa edilmesi gerekmiştir." #deepl:4162429863
 gaudi.522.g: "Kışlayı genişletin." #deepl:2381627455
 gaudi.522.h: "Zamanımızı başka bir yere harcayalım." #deepl:3269234038
 gaudi.523.t: "İnşaat sektörünün genişletilmesi" #deepl:2392547084
 gaudi.523.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] adresinin genişlemesi, inşaat sektörünü büyütme fırsatı sunmaktadır. " #deepl:3106227577
 gaudi.523.f: ""Sanatçının üretmesini engelleyen niteliklerin toplamına genellikle sanatçı doğası diyoruz. - Arthur Schnitzler" #deepl:2115168723
 gaudi.523.g: "İnşaat ofisini genişletin." #deepl:771559939
 gaudi.524.t: "Harika bir park" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]'nin yeni parkı tamamlandı ve artık yürüyüşler için tüm vatandaşlara açık." #deepl:2209166008
 gaudi.524.f: "Yeni Stadtpark'ın kapıları sallanarak açılıyor. Çimler kadife gibi kıvrılıyor. Yollar çiçek tarhları ve heykeller arasında kıvrılıyor. Ama kalabalığı en çok çeken şey çimenler değil, sesler. Bir bando takımı, küçük bir orkestra, esintide sürüklenen bir vals. Bir zamanlar salonlara ve saraylara mahsus olan halk müziği artık herkesin duyması için havayı dolduruyor. Viyana gibi şehirlerde Kursalon, melodinin sivil tapınağı haline gelmişti. İtalyan Rönesansı tarzındaki görkemli bina Johannesgasse üzerinde yer alır ve parkta geniş bir terası vardır. Strauss kardeşler zamanında Kursalon dans ve konserler için popüler bir yerdi." #deepl:556984663
 gaudi.524.g: "Biraz yürüyelim." #deepl:3870101360
 gaudi.524.h: "Bunu bir konserle kutlayalım!" #deepl:3249539672
 gaudi.525.t: "Operanın Genişletilmesi" #deepl:3647447347
 gaudi.525.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] adresinin genişletilmesi, operayı modernize etme ve genişletme fırsatı sunmaktadır." #deepl:1640821642
 gaudi.525.f: "Bulvarların ve pasajların, çeşmelerin ve bakanlıkların ortasında, mevcut opera binası mütevazı, hatta taşralı hissettirmeye başlar. Öneri: yeni bir yapı ya da büyük bir genişletme. Daha fazla koltuk, daha iyi akustik, anıtsal cepheler. Şehrin büyüklüğüne uygun bir kültür tapınağı. Avrupa genelinde bu tür jestler ulusal prestijin sembolleri haline geldi. Paris'te Opéra Garnier mermer merdivenler ve altın tavanlarla yükseliyor. Viyana'da 1869'da açılan Staatsoper, Ringstraße'ye zarafet ve gururla demir atar." #deepl:2327891128
 gaudi.525.g: "Opera binasını genişletin." #deepl:4005131669
 gaudi.526.t: "Belediye Binasının Genişletilmesi" #deepl:857877700
 gaudi.526.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] adresinin genişletilmesi, Belediye Binasının modernize edilmesi ve genişletilmesi fırsatını sunmaktadır." #deepl:3575590115
 gaudi.526.f: "Eski belediye binası hâlâ başka bir yüzyıldan kalma armayı taşıyor. İçeride: dar merdivenler, aşırı kalabalık ofisler ve lambri kaplamadan daha yüksekte yığılmış defterler. Belediye başkanının masası, bırakın iktidarı, evrak işlerine bile ancak yetecek büyüklükte. Şimdi öneri: kentin yönetim, ekonomi ve yurttaşlık kimliğindeki genişleyen rolünü yansıtan yeni bir Belediye Binası. Yüksek kuleler ya da ölçülü bir klasisizm - her iki durumda da otoriteyi işaret etmeli. Avrupa genelinde kentler bu zorluğun üstesinden geldi. Viyana'da neo-Gotik Rathaus (1883'te tamamlandı) belediye güveninin bir sembolü haline geldi. Paris, 1871'den sonra Hôtel de Ville'i ihtişam ve meydan okuma ile restore etti. Berlin'in Rotes Rathaus'u Rönesans formu ve Prusya işlevinin bir birleşimi olarak ortaya çıktı." #deepl:2422046000
 gaudi.526.g: "Belediye binasını genişletin." #deepl:5728920
 gaudi.527.t: "Heldenplatz" #deepl:959071592
 gaudi.527.d: "Heldenplatz'ın (Kahramanlar Meydanı) tamamlanmasının ardından, önde gelen bazı siyasi figürler yakışır bir açılış için bastırıyor." #deepl:1468121085
 gaudi.527.f: "Ringstrasse inşa edildiğinde, 'dış Burgplatz' İmparator Franz Joseph döneminde, hiçbir zaman tamamlanamayan Kaiserforum'un bir parçası olarak tasarlanmıştı. Plan, Leopoldine Kanadı, Yeni Hofburg, Habsburg Koleksiyonları ve Volksgarten'ın yerine asla inşa edilmeyen Yeni Kale'nin bir benzeri tarafından çerçevelenecek dikdörtgen bir meydan yaratmaktı. Heldenplatz ismi 1878 yılında belirlenmiştir; bu isim her ikisi de Anton Dominik Fernkorn'a ait olan iki atlı anıttan gelmektedir. Daha eski olan Arşidük Karl'ınki 1860 yılında açılmıştır. Bunun muadili olan Prens Eugene'in atlı heykeli de 1865 yılında tamamlanmıştır. Birinci Dünya Savaşı'nın kaybedilmesi, Habsburg-Lorraine hanedanının yönetimi altındaki Avusturya-Macaristan ikili monarşisinin çökmesi ve ilk Avusturya cumhuriyetinin kurulmasının ardından Heldenplatz, tüm siyasi kamplar için bir toplanma noktası ve Avusturya ordusu için bir geçit töreni alanı olarak hizmet verdi." #deepl:562832934
 gaudi.527.g: "Bir geçit töreni düzenleyin ve arkadaşlarımızı davet edin." #deepl:99539180
 gaudi.527.h: "Önümüzdeki birkaç yıl için kalıcı bir askeri geçit töreni düzenleyin." #deepl:3502479331
 gaudi.527.i: "Peki tüm bunların bedelini kim ödeyecek?" #deepl:3263444788
 gaudi.528.t: "Üniversitenin Genişletilmesi" #deepl:2548530815
 gaudi.528.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] adresinin genişletilmesi, üniversiteyi modernize etme ve genişletme fırsatı sunmaktadır." #deepl:966048719
 gaudi.528.f: "Düşünce olmadan büyük bir şehir nedir ki? Demiryolu hatları, bakanlıklar ve tiyatrolar arasında üniversite kendi başarısının altında ezilmeye başlar. Az sayıda salon için çok fazla öğrenci. Kiralık binalara yayılmış bölümler. Profesörler kütüphaneler ve laboratuarlar arasında yer kapma yarışına girer. Öneri açıktır: yeni bir kampüs veya büyük bir genişleme-modern amfiler, özel fakülteler, anıtsal bir kütüphane. Bu tür projeler altyapıdan daha fazlasıdır; entelektüel hırsın beyanlarıdır. Viyana'da üniversite 1870'lerde Ringstraße boyunca yeniden konumlandırılmış ve büyük bir cephe ve sembolik bir merkeziyetle yeniden inşa edilmiştir. Paris'te Sorbonne, Jules Ferry'nin reformları kapsamında Fransa'nın büyüyen akademik sınıfını barındıracak şekilde kapsamlı bir şekilde genişletildi." #deepl:3542359765
 gaudi.528.g: "Üniversiteyi genişletin." #deepl:4228402238
 gaudi.529.t: "Sanat Akademisinin Genişletilmesi" #deepl:1188603187
 gaudi.529.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] adresinin genişletilmesi, sanat akademisini modernize etme ve genişletme fırsatı sunmaktadır." #deepl:2971034584
 gaudi.529.f: "Şehir büyüdükçe sanata olan iştahı da artar. Yine de ressamlar ve heykeltıraşlar küçük stüdyoları ve loş tavan aralarını dolduruyor, ustalardan değil söylentilerden ve ödünç alınan eskizlerden öğreniyorlar. Öneri: ışık dolu atölyeleri, anatomik tiyatroları ve halka açık sergilere açık galerileri olan gerçek bir sanat akademisi. Avrupa genelinde bu tür akademiler ulusal zevki şekillendirir. Paris'teki École des Beaux-Arts yarım kıta için klasik standartları belirler. Viyana'da, Akademie der bildenden Künste'nin görkemli binası Ringstraße'nin kültürel prestijine demir atar." #deepl:2427288221
 gaudi.529.g: "Akademiyi genişletin." #deepl:3521772928
 gaudi.530.t: "Urania" #deepl:3604286803
 gaudi.530.d: "Urania ile Viyana'da, tam amacı hala tartışmalı olan sözde bir 'halk eğitim merkezi' açıldı." #deepl:2388110616
 gaudi.530.f: "1883 yılında Alman astronom Max Wilhelm Meyer, Viyana Üniversitesi'nde asistan olarak geçmiş ve gelecekteki güneş tutulmalarını hesaplamak üzere Viyana'ya geldi. Aynı zamanda folklor dersleri verdi ve bir halk eğitim kurumu fikrini geliştirdi. Ancak 1885'te Berlin'e çağrıldığı için fikirlerini orada geliştirmeye devam etti. Viyana'daki Urania, Berlin'deki Urania'yı örnek aldı: 800 kişilik bir alana sahipti ve 200 kişilik bir konferans salonu, bilimsel gösteriler için odalar ve bir gözlemevi içeriyordu. Ancak bu 'geçici' Urania ziyaretçi akınıyla baş etmekte zorlanınca, kısa süre içinde Ringstrasse'de yeni bir binaya ihtiyaç duyuldu. Urania sadece eğitim olanaklarını genişletmekle kalmadı (örneğin dil kursları ile), aynı zamanda kendi Urania senfoni orkestrası ve Urania korosu ile konserler için bir mekan haline geldi. Alışılmadık şekli ve yapısı Viyana'da olağan bir skandala neden oldu. Ancak Viyanalılar binayı beğendi ve Urania kısa sürede Viyana'nın simge yapılarından biri haline geldi." #deepl:2564552960
 gaudi.530.g: "Mimari bir dönüm noktasıdır." #deepl:631489671
 gaudi.530.h: "Burası öncelikle bir eğlence tesisidir." #deepl:1069754801
 gaudi.530.i: "Her şeyden önce burası bir gözlemevi." #deepl:2017455388

 gaudi.9.t: "Kentsel Planlama tamamlandı" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] şehir planlama çalışmasını bugün önemli bir taşra kasabasında tamamladı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] artık tamamen yeniden kullanılabilir." #deepl:60424068
 gaudi.9.f: ""Mimari, hayal gücü ve fanteziyle - disiplinsiz hayal gücü ya da kaprisli fanteziyle değil - öylesine aşılanana kadar en yüksek mertebesine ulaşmaz ki, düzenli yapı her zeki gözlemcinin gözünü memnun eder ve bir şiir gibi duyguları harekete geçirir. -Henry van Brunt" #deepl:2388189232
 gaudi.9.g: "Çok fazla proje, çok az zaman." #deepl:224764128

 gaudi_architecture_treatise_modifier: "Mimarlık İncelemesi" #deepl:1594143488

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]'in Mimarlık Üzerine İncelemeleri" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] çalışmasını tamamladı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] tarihsel ve çağdaş mimarlık üzerine [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] kuramsal düşüncelerle zenginleştirdiği incelemesi, gelecek kuşak mimarları etkileyecek." #deepl:66798799
 gaudi.8.f: "'Mimari, insan ırkının büyük fikirlerini kaydetmiştir. Sadece her dini sembolün değil, her insan düşüncesinin de o engin kitapta bir sayfası vardır. -Victor Hugo" #deepl:864116211
 gaudi.8.g: "Gelecek kuşaklar için bir çalışma." #deepl:575316054

 je_gaudi_architecture_treatise: "Mimarlık İncelemesi" #deepl:1594143488
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mimarlık sanatıyla ilgili önceki bilgilerini bir kitapta toplamak için bir yıl boyunca tamamen geri çekildi. Kitabın, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] yaşamının bir manifestosu olması ve mimarlıkla ilgili tüm [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] deneyim ve teorileri özetlemesi amaçlanmıştır. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ünü, eserin değerinin belirlenmesinde belirleyici bir rol oynar. Ancak $literary$, $erudite$, $innovative$ ve $aesthete$ gibi karakter özellikleri de değerlidir." #deepl:9152525
