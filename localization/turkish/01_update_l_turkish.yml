 gaudi.35.t: "Art Nouveau Mahallesi'nde [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]" #deepl:1088148255
 gaudi.35.d: "Yeni sanatsal gelişim [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName] adresinde de durmadı: artık avangard bir mahalle olarak kabul edilen bu semtte yeni Art Nouveau binalar inşa ediliyor." #deepl:3696139674
 gaudi.35.f: "Art Nouveau mimarisinin Brüksel'deki ilk çıkışına, yeni tarzda bir Dekoratif Sanat dalgası eşlik etti. Önemli sanatçılar arasında Brüksel cephelerinde barok efektler elde etmek için dövme demir kullanan Gustave Strauven; son derece orijinal sandalyeleri ve eklemli metal mobilyalarıyla tanınan mobilya tasarımcısı Gustave Serrurier-Bovy ve yusufçuk, kelebek, kuğu ve yılan şeklinde mücevherler yapan mücevher tasarımcısı Philippe Wolfers vardı. Bu tarz komşu Fransa'da da hızla fark edildi. Horta'nın Hôtel Tassel'ini ziyaret eden Hector Guimard, Paris'in yeni tarzdaki ilk binalarından biri olan Castel Béranger'i inşa etti. Parisliler Guimard'ın özgün ve pitoresk tarzını memnuniyetle karşıladı; Castel Béranger Paris'teki en iyi yeni cephelerden biri seçilerek Guimard'ın kariyerini başlattı. Paris 1900 Exposition universelle, Art Nouveau'nun en yüksek noktasına işaret ediyordu. Nisan ve Kasım 1900 tarihleri arasında dünyanın dört bir yanından yaklaşık elli milyon ziyaretçiyi çeken fuarda, stilin mimarisi, tasarımı, cam eşyaları, mobilyaları ve dekoratif objeleri sergilendi. Paris Sergisi açık ara en büyüğü olsa da, diğer sergiler de stilin popülerleşmesi için çok şey yaptı." #deepl:3102882922
 gaudi.35.g: "Canlı ve yeni bir kültür." #deepl:3379987285

 gaudi.22.t: "Çizgiler ve Ölçüler" #deepl:2020920879
 gaudi.22.d: "Mimarımız geri dönüyor - bu kez elinde bir ölçüm çubuğu ve arazi için yeni gözlerle." #deepl:505021070
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] bir zamanlar şehir meydanlarındaki cepheleri çizmekle, gölgelerin ve süslemelerin izini sürmekle yetiniyordu. Şimdi [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] yeryüzüne çizgiler çiziyor.\n\n [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] seyahatleri sırasında [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] şehirleri terk edip iç bölgelere gitti. Galiçya'nın vahşi doğasında, Po Deltası'nın bataklıklarında ve Midlands'ın demiryolu kesimlerinde [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] mühendisler, çiftçiler ve ustabaşılarla birlikte yürüdü. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] başkalarının kutsal kitapları okuduğu gibi araziyi okumayı öğrendi. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] Suyun nereye akacağını, kilin nereye kayacağını, bir temelin beş kış sonra nerede çatlayacağını size söyleyebilir.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] artık eğimlerden ve jeodezik noktalardan bahsediyor. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] defterleri süslemelerle değil, açılar, yükseklikler ve inç cinsinden ölçülen mesafelerle dolu. Bazıları [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'un kuru hale geldiğini söylüyor-çok titiz, çok katı. Ancak [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] boş bir araziye baktığında [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] caddelerin nereye uzanabileceğini şimdiden görüyor." #deepl:3503840059
 gaudi.22.g: "Bir bina, temel taşı atılmadan çok önce başlar." #deepl:960677900
 gaudi.23.t: "The Architect Who Counts" #deepl:2805524520
 gaudi.23.d: "İki yıllık bir çalışmanın ardından mimarımız geri döner-[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] zihni daha keskin, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] çizimleri daha yabancıdır." #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] bir zamanlar içgüdülerimle çizerdim. Şimdi [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] mantıkla çiziyor.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] zamanını duvarcılar ya da inşaatçılar arasında değil [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] konferans salonlarında geçirdi. Paris, Göttingen, hatta St. Petersburg. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] sembollerle dolu kara tahtaların altında oturdu, elleriyle hiçbir şey inşa etmeyen ama zihinleriyle her şeyi inşa eden adamların altında çalıştı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] artık simetriden, modülden, zarif formüllerle tanımlanan yük eğrilerinden bahsediyor. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] yeni planlar sade, garip, hassasiyetlerinde neredeyse yabancı. Bazılarına soğuk, insanlık dışı görünüyorlar. Ama sonra [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] açıklıyor: bir kubbenin güzelliği süslemesinde değil, eğrisinin mükemmelliğindedir.\n\nYetkililer [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] ile ne yapacaklarından emin değiller. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] meslektaşları pratik olmadığını fısıldıyor. Ama diğerleri -özellikle de gençler- dinliyor." #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] başkalarının sadece hayal ettiği şeyleri inşa eder." #deepl:2581034432
 gaudi.24.t: "Taştan Önce Kağıt" #deepl:3533867777
 gaudi.24.d: "Mimarımız aletlerle ya da denklemlerle değil, mühürlerle, imzalarla ve yetkililerden oluşan bir ağla geri dönüyor." #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] Artık çizim tahtasında debelenmiyor. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] artık ofislerde süzülüyor.\n\nYurtdışında geçirdiği iki yılda [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sadece mimarlık eğitimi almadı,[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] yönetim eğitimi de aldı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] bir projenin tasarımla değil, kararnameyle nasıl yaşayıp öldüğünü öğrendi. Viyana'da [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] bakanlıkları iş başında gözlemledi; Brüksel'de [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] izin memurlarını gölgeledi; Marsilya'da [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] kanalizasyonların gökdelenleri belirlediği konsey toplantılarına katıldı.\n\nŞimdi, eve döndüğünde, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] hangi belgeleri ne zaman sunacağını, hangi yönetmeliğe atıfta bulunacağını, kimi pohpohlayacağını ve kimi görmezden geleceğini biliyor. Kurallar, diyor [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], duvar değil iskeledir; hareket ettirilebilir, yumuşatılabilir, yeniden çerçevelenebilir. Ve bir şekilde, izinler her zamankinden daha hızlı geliyor." #deepl:3047390249
 gaudi.24.g: "Her büyük yapı imzalanmış bir formla başlar." #deepl:3498658136
 gaudi.25.t: "Mimar Geri Dönüyor... Sonunda" #deepl:2911431628
 gaudi.25.d: "Mimarımız nihayet [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] büyük turundan döndü. Kimse [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 'un hikayeler dışında ne getirdiğinden emin değil." #deepl:3640320352
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] purolar ve anekdotlarla geri döner. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 'un söyleyecek isimleri, verecek fikirleri ve [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 'un hatırlamıyormuş gibi yaptığı borçları vardır.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] güzel, hatta ikna edici bir şekilde konuşur - [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] asla ölçülmemiş yapılardan. Planları sorulduğunda [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] konuyu değiştirir. Sonuçlar için baskı yapıldığında, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] gülümser ve parlaklığın aceleye getirilemeyeceğini garanti eder.\n\nBazıları [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'un bir sahtekar olduğunu söyler. Diğerleri ise [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] için yanlış anlaşılmış bir dahi diyor. Gerçek mi? Muhtemelen Trieste'de bir kafe ile Napoli'de kaçırılan bir tren arasında bir yerde." #deepl:3339735037
 gaudi.25.g: "Bunca zaman [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] ne yaptı?!" #deepl:3328871879
 gaudi.26.t: "Bir Ustanın Gölgesinde" #deepl:1494314704
 gaudi.26.d: "Mimarımız daha bilge, daha kararlı ve büyük bir öğretmenin izlerini taşıyarak geri döner." #deepl:2040369888
 gaudi.26.f: "Diğerleri çok seyahat ederken, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] mesafe yerine derinliği seçti. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] yıllarının çoğunu tek bir figürün rehberliğinde geçirdi - efsanevi bir üne sahip yaşlı bir mimar. Sadece konferans salonlarında değil, iskelelerde ve sessizlik içinde [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] süslemenin ardındaki yapıyı, cephenin ardındaki niyeti görmeyi öğrendi. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] çizgiler daha temiz hale geldi. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] bakışlar daha eleştirel oldu. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] sadece nasıl inşa edileceği değil, neden inşa edileceği de öğretildi. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mentorluğunun haberi [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]'dan önce yayıldı. Genç çıraklar şimdiden [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] 'u arıyor ve şehir yetkilileri onu beklenmedik bir hürmetle karşılıyor. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] süreklilik, gelenek ve belki de bir gün mirasla işaretlenmiş biri olarak geri dönüyor." #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] başka bir adamın bilgeliğinin ağırlığını taşır" #deepl:1891012360

