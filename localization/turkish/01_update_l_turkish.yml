 douglas.103.t: "Dağ Birlikleri Alayı" #deepl:459726214
 douglas.103.d: "Dağ fetihleri ve dağ savunmasındaki etkileyici deneyimi nedeniyle [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] üstün becerilerini kullanarak seçkin bir dağ birliği oluşturmaya karar verdi." #deepl:3198382874
 douglas.103.f: "Gebirgsjäger, Alpini ya da Chasseurs Alpins, bazı ülkelerin yükseklerde savaş konusunda uzmanlaşmış seçkin birliklerinden sadece birkaç örnektir. 1872 yılında kurulan Alpini, dünyanın en eski aktif dağ piyadeleridir. Asıl görevleri İtalya'nın Fransa ve Avusturya-Macaristan ile olan sınırını korumaktı." #deepl:3963027024
 douglas.103.g: "Onun mirasını geleceğe taşıyacaklar." #deepl:1701012348

