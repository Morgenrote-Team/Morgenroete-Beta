 gaudi.82.t: "Bir Mimarın Yaşam Çalışması" #deepl:1436757673
 gaudi.82.d: "Aylar süren hazırlıkların ardından [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] planlar, hesaplamalar, istatistikler ve el yapımı bir model sundu. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] iddialı anıt şimdiden mimari sanatın bir rüyası olarak kabul ediliyor. Geriye kalan tek soru, bu rüyayı kimin gerçekleştireceği?" #deepl:1546320616
 gaudi.82.f: ""Yarın güzel şeyler yapacağız. -Antoni Gaudí" #deepl:3107908861
 gaudi.82.g: "Kendimiz için bir anıt." #deepl:3586195485

