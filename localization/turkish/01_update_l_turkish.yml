 je_gaudi_capital_expansion_project: "Sermaye Genişlemesi" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "1836 ve 1936 yılları arasında Viktorya dönemi başkentleri derin kentsel dönüşümler geçirdi. Paris, Haussmann'ın geniş bulvarları ve aksiyal vistaları ile yeniden şekillendirildi. Viyana 1857'de duvarlarını yıkarak yerine büyük Ringstraße'yi inşa etti. Berlin apartman blokları, sanayi mahalleleri ve daha sonra modernist konut siteleri ile hızla genişledi. Londra demiryolu banliyöleri, altyapı projeleri ve dünyanın ilk metrosuyla dışa doğru yayıldı. Avrupa kıtasının dört bir yanında kraliyet şehirleri modern metropollere -gücün, hırsın ve artan sosyal gerilimlerin anıtlarına- dönüştü." #deepl:4052914498

 gaudi.41.t: "Bağlanmamış Bir Şehir" #deepl:1231776512
 gaudi.41.d: "Eski duvarlar yıkılır. Onların yerine hava, ışık ve büyüme vaadi gelir." #deepl:2117769530
 gaudi.41.f: "Yüzyıllar boyunca [ROOT.GetCountry.GetCapital.GetCityHubName] duvarlarla çevrili bir yerdi: gururlu, kompakt ve kendi içine kapalı. Ama şimdi, duvarlar kazma ve toza dönüşüyor.\n\nOrtaçağ surları yıkıldı. Onların yerine ağaçlar ve asil cephelerle kaplı geniş bulvarlar yükseliyor. Bir zamanlar muhafızların yürüdüğü yerlerde şimdi pazar arabaları ve gezinen çiftler yürüyor. Bulvarlar yol olmaktan çok daha fazlası; onlar birer ifade: güvenin, genişlemenin, zapt edilemeyecek kadar büyük bir geleceğin ifadesi.\n\nBazıları antik kapıların kaybından yakınıyor. Ancak [ROOT.GetCountry.GetCapital.GetCityHubName] nihayet ilk derin nefesini aldı." #deepl:4076900735
 gaudi.41.g: "Vizyon ve güçle dışa doğru inşa ediyoruz" #deepl:1116241139
 gaudi.42.t: "İlerleme Halkası" #deepl:3156235256
 gaudi.42.d: "Yeni bir bulvar halkası şehir ve eyaleti birbirine bağlıyor." #deepl:3367270166
 gaudi.42.f: "Bir zamanlar çamurlu setlerin olduğu yerde şimdi taş ve demir hüküm sürüyor. Büyük cadde [ROOT.GetCountry.GetCapital.GetCityHubName]'un kalbinin etrafında bir gerdanlık gibi kıvrılıyor, mahalleleri hareket ve ışıkla birbirine bağlıyor.\n\nBu sadece bir yol çalışması değildi. Tüm bloklar yeniden çizildi, parklar oyuldu, anıtlar mükemmel bir perspektifle çerçevelendi. Gaz lambaları alacakaranlıkta sıralı yıldızlar gibi çiçek açıyor. Asfaltlanan her metreyle [ROOT.GetCountry.GetCapital.GetCityHubName] daha okunaklı, daha emperyal hale geliyor.\n\nYetkililer 'kentsel uyumdan' söz ediyor. Peki ya insanlar? Daha önce hiç görmedikleri heykellere bakarak, bir zamanlar yürümeye korktukları sokaklarda geziniyorlar." #deepl:3543082084
 gaudi.42.g: "Bir savunma değil, yönlendirme halkası." #deepl:2497263912
 gaudi.43.t: "Yetki Yolları" #deepl:4104296278
 gaudi.43.d: "Yeni prefect [ROOT.GetCountry.GetCapital.GetCityHubName]'u yeniden şekillendiriyor -her seferinde bir eksen. Geniş, düz ve tamamen tavizsiz." #deepl:2867872335
 gaudi.43.f: "Bu genişleme değil. Bu bir ameliyattır.\n\nBütün mahalleler pusulanın ve planın altına düşer. Sokaklar bir zamanlar labirenti andıran mahallelerin içinden bulvarlar gibi oyuluyor. Eski sokaklar yok olur. Onların yerine uzun, düz ve her zaman bir anıta, bir kışlaya ya da bir bakanlığa giden çizgiler yükselir.\n\nDireniş başlar, ancak izinler imzalanır, evler kamulaştırılır ve cepheler hizalanır. [ROOT.GetCountry.GetCapital.GetCityHubName] artık düzenin dilini konuşmaktadır: görünürlük, dolaşım, kontrol. İhtişamın ardında niyet yatıyor.\n\nYoksullar buna 'Yıkım' diyor. Yetkililer buna 'Modernleşme' diyor. Vali buna gerekli diyor." #deepl:4133801679
 gaudi.43.g: "Kimse plandan kaçmasın" #deepl:2017759053
 gaudi.44.t: "Büyükşehir Ufku" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] artık sadece bir başkent değil. Minyatür bir dünya haline geliyor." #deepl:101717450
 gaudi.44.f: "Eski şehrin kenarları vardı. Bunun ise hiç yok.\n\nBir zamanlar taşın hakim olduğu yerleri çelik ve cam deliyor. Demiryolu hatları halka açık bahçelerin altında kesişiyor. Elektrik ışıkları alacakaranlık ve şafak arasındaki çizgileri bulanıklaştırıyor. Elçilikler, bankalar, galeriler ve kafeler yeni bir çağın demir kış bahçesinde orkideler gibi çiçek açıyor.\n\nYabancı diller pasajlarda yankılanıyor. Gökdelenler katedrallere meydan okuyor. [ROOT.GetCountry.GetCapital.GetCityHubName] artık büyümek için izin istemiyor, liderlik etmeyi bekliyor. Her semtten tek bir gerçek ortaya çıkıyor: Burası artık bir ulusun kenti değil. Ulusların kenti." #deepl:3494578230
 gaudi.44.g: "Yükseliyoruz, çünkü dünya zaten izliyor." #deepl:1129952378

