 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]Dağcımız şu anda [SCOPE.sState('douglas_location_scope').GetName] adresinde bir keşif gezisinde bir dağcılık ekibine liderlik ediyor. Hedef, bir zirveye ilk tırmanış. Tırmanışın hızı büyük ölçüde onun deneyimine ve karakter özelliklerine bağlıdır. Dağın zorluğuna bağlı olarak daha büyük tehlikeler ortaya çıkabilir. Keşif gezisi belirli bir zaman dilimi içinde hedefine ulaşmazsa [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] zirve tırmanışını iptal edecektir. Keşif ekibi herhangi bir nedenle akla gelebilecek en büyük tehlikeye sürüklenirse, o zaman en kötüsü gerçekleşecektir." #deepl:488000629

