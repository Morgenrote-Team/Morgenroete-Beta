 gaudi.10.t: "Mimar İtibarı İyileştirdi" #deepl:3290657742
 gaudi.10.d: "Geçtiğimiz birkaç yıl içinde [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ülke çapında yeni binaların iyileştirilmesi ve inşası konusunda [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] uzmanlığını ortaya koyarak [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] itibarını ve becerilerini önemli ölçüde artırmıştır." #deepl:1621312069
 gaudi.10.f: ""Ana sanat mimaridir. Kendimize ait bir mimarimiz olmadan, kendi uygarlığımızın ruhuna da sahip olamayız." -Frank Lloyd Wright" #deepl:2640014774
 gaudi.10.g: "Yeni mimari görevlere!" #deepl:4140846455

