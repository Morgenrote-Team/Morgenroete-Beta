 douglas.211.t: "Zirve" #deepl:3152681021
 douglas.211.d: "Zorlu bir tırmanışın ardından dağcı grubu nihayet zirveye ulaşır. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], [ROOT.GetCountry.GetNameNoFormatting] için yeryüzünün bu noktasına çıkan ilk insandır. Artık bu zafer anının tadını çıkarmaktan başka bir şey kalmamıştır." #deepl:2761012191
 douglas.211.f: ""Soracağınız ve benim de cevaplamaya çalışacağım ilk soru şudur: "Everest Dağı'na tırmanmanın ne faydası var?" ve cevabım hemen şu olmalıdır: "Hiçbir faydası yok. En ufak bir kazanç ihtimali bile yok." Evet, insan vücudunun yüksek irtifalardaki davranışları hakkında biraz bilgi edinebiliriz ve muhtemelen tıp adamları gözlemlerimizi havacılık amaçları doğrultusunda kullanabilir. Ama bunun dışında hiçbir şey çıkmayacak. Ne tek bir altın ya da gümüş parçası, ne bir mücevher, ne de kömür ya da demir getireceğiz. Yiyecek yetiştirmek için ekilebilecek tek bir karış toprak bile bulamayacağız. İnsanın içinde bu dağın meydan okumasına yanıt veren ve onu karşılamak için dışarı çıkan bir şey olduğunu, mücadelenin yaşamın kendisinin yukarı ve sonsuza kadar yukarı doğru mücadelesi olduğunu anlayamazsanız, o zaman neden gittiğimizi anlayamazsınız. Bu maceradan aldığımız şey sadece katıksız bir keyiftir.\n\nVe ne de olsa keyif hayatın sonudur. Yemek yemek ve para kazanmak için yaşamıyoruz. Hayattan zevk alabilmek için yemek yer ve para kazanırız. Hayatın anlamı budur ve hayat bunun için vardır."- George Leigh Mallory" #deepl:2116445992
 douglas.211.g: "Şafağın tadını çıkaralım!" #deepl:3916807741
 douglas.212.t: "Tırmanış iptal edildi" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]'in zirveye ulaşma girişimi şimdilik başarısız oldu. Dağcımız girişiminden vazgeçmek ve geri dönmek zorunda kalır." #deepl:641296697
 douglas.212.f: "Bir dağcının tırmanışı terk etmesinin birden fazla nedeni olabilir. Bazen hava durumundaki bir değişiklik yeterli olur; bazen de zirveye ulaşması beklenen bir erişimin çok tehlikeli olduğu ortaya çıkar. Bir tırmanış genellikle çok uzun sürer ve bir zaman aralığını aşar çünkü günün belirli saatleri ve değişiklikler tırmanışı zorlaştırır veya imkansız hale getirir. Ve bazen de sadece yanlış yolu seçersiniz." #deepl:430022267
 douglas.212.g: "Hayal kırıklığı." #deepl:1131565686
 douglas.213.t: "Dağcılık Felaketi!" #deepl:285221578
 douglas.213.d: "Dağlara tırmanırken [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] korkunç bir hata yaptı, bu da keşif gezisini bir felaketle sonuçlandırdı - birkaç kişi öldü, erzak ve ekipman onlarla birlikte düştü. Bütün ulus şok içinde!" #deepl:2272067559
 douglas.213.f: "'Her gece, anlıyor musun, Matterhorn'daki yoldaşlarımın sırt üstü kaydıklarını, kollarını açtıklarını, birbiri ardına, eşit mesafelerde mükemmel bir düzen içinde -önce rehberroz, sonra Hadow, sonra Hudson ve en son Douglas- görüyorum. Evet, onları hep göreceğim...'- Edward Whymper" #deepl:3038127729
 douglas.213.g: "Tam bir trajedi!" #deepl:1503732790

