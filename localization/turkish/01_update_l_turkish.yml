 douglas.104.t: "İçimizdeki Dağ" #deepl:2079471330
 douglas.104.d: "Tırmanış ve eğitimle geçen beş yorucu yılın ardından [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] geri dönüyor." #deepl:862787273
 douglas.104.f: "Dağın sesi yoktur ama yine de öğretir. Dağcımız beş uzun yıl boyunca kar körlüğü, ufalanan kaya yüzeyleri, ısıran rüzgar ve her bıçaktan daha derin kesen sessizlikle yüzleşti. Yine de her zorluk bilgiyi kasa, sabrı nefese dönüştürdü. Hırs olarak başlayan şey artık beceriye dönüşmüştür. Dağcı taşı dinlemeyi, fırtınaları kokusundan tahmin etmeyi, gözleri kapalı ve kalbi sabit bir şekilde düğüm atmayı öğrenmiştir. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] dönüşmüş olarak geri döner. Bu ustalığın başlangıcıdır." #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] artık dağı fethetmiyor-[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] onu anlıyor" #deepl:2453485277

