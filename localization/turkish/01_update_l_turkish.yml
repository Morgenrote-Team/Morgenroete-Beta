 MR_ALPINE_CLUB_BUTTON: "Alpine Club" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T Alpine Club'ın kuruluşu#!\n1857 yılında Londra'da kurulan Alpine Club dünyanın en eski dağcılık örgütüdür. Kuruluşu, Viktorya dönemi İngiltere'sinde organize dağcılığın başlangıcı olmuştur. Kulübün amacı Alplerin bilimsel, coğrafi ve atletik olarak keşfedilmesini teşvik etmekti. Kurucu üyeleri arasında 1865 yılında Matterhorn'un ilk tırmanışını tamamlayan Edward Whymper da vardı. Alpine Club, 'Alpinizmin Altın Çağı' sırasında kilit bir rol oynamış ve Alpine Journal da dahil olmak üzere etkili eserler yayınlamıştır. Dünyanın dört bir yanında gelecekteki dağcılık kulüpleri için standartlar belirlemiştir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
