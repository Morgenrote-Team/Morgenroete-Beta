 lepsius.1326.t: "Homo Heidelbergensis tamamlandı" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] soyu tükenmiş tür hakkında belirli sonuçlara varmak için yeterli sayıda kemik topladı. Homo Heidelbergensis artık bilim için bir gizem değil ve hala cevaplanmamış pek çok soru olsa da artık insan soy ağacında belli bir kesinlik derecesiyle konumlandırılabilir." #deepl:4182329393
 lepsius.1326.f: "Homo heidelbergensis'in alt çenesi 1907 yılında işçi Daniel Hartmann tarafından Heidelberg yakınlarındaki Mauer yakınlarında bir kum ocağında bulunmuş ve 1908 yılında anatomist Otto Schoetensack tarafından tanımlanmıştır; yaklaşık 600.000 yıllık buluntu Avrupa'daki erken insanlara ait en eski kanıt olarak kabul edilmekte, morfolojik olarak Homo erectus ve Homo sapiens arasında yer almakta, bu hominid formunun Afrika, Avrupa ve Asya'da geniş bir dağılımına işaret etmekte ve sağlamlığı ve tahmini beyin hacmi nedeniyle gelişmiş fiziksel adaptasyon, alet kullanımı ve sosyal organizasyon hakkında sonuçlar çıkarılmasına olanak sağlamaktadır." #deepl:2078634084
 
 lepsius.1336.t: "Heidelbergli Adam" #deepl:140239375
 lepsius.1336.d: "Bir işçi, Heidelberg yakınlarındaki Mauer kasabasında bir madende dikkat çekici bir keşif yaptı. Heidelberg Üniversitesi'nden bir profesör bunun değerini hemen anladı." #deepl:3838910430
 lepsius.1336.f: "Homo heidelbergensis'in alt çenesi 1907 yılında işçi Daniel Hartmann tarafından Heidelberg yakınlarındaki Mauer yakınlarında bir kum ocağında bulunmuş ve 1908 yılında anatomist Otto Schoetensack tarafından tanımlanmıştır; yaklaşık 600.000 yıllık buluntu Avrupa'daki erken insanlara ait en eski kanıt olarak kabul edilmekte, morfolojik olarak Homo erectus ve Homo sapiens arasında yer almakta, bu hominid formunun Afrika, Avrupa ve Asya'da geniş bir dağılımına işaret etmekte ve sağlamlığı ve tahmini beyin hacmi nedeniyle gelişmiş fiziksel adaptasyon, alet kullanımı ve sosyal organizasyon hakkında sonuçlar çıkarılmasına olanak sağlamaktadır." #deepl:2078634084

