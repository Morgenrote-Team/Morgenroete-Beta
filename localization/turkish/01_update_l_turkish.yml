 douglas.111.t: "İlk Adım" #deepl:1387851608
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ekibi temel tırmanış malzemeleriyle donatır." #deepl:1200110309
 douglas.111.f: "Doğaçlama tırmanışların devri kapanmıştır. Bir [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] rehberliğinde ekip ilk standart ekipmanlarını alır: halatlar, buz baltaları, pitonlar ve sağlam çantalar. Bu araçlar sadece hayat kurtarmakla kalmaz, dağ algısını da yeniden şekillendirir. Tırmanış daha metodik ve hesaplı hale gelir. Bir zamanlar cesaret ve kaba kuvvet önemliyken, şimdi teknik ve hazırlık ön plana çıkıyor. Bu, buz ve kayaların acımasız dünyasına girmeye cesaret eden herkes için mütevazı ama çağ açıcı bir adımdır." #deepl:444296823
 douglas.111.g: "Şimdi dağlar hazırlananlara ait." #deepl:660628980
 douglas.112.t: "Halatla Bağlı" #deepl:263345135
 douglas.112.d: "Dağcımızın [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] yeni bir fikri var: Güvenliği artırmak için sabit halat ekipleri devreye sokuluyor." #deepl:3311883976
 douglas.112.f: "Dağlarda atılan her adım risk taşır ama artık kimse tek başına tırmanmıyor. İp ekiplerinin kullanılmaya başlanması zihniyette bir değişime işaret ediyor: artık dağa karşı birey değil, güvenle ve dokunmuş bir kordonla birleşmiş bir dağcılar zinciri var. Bu değişim düzen, disiplin ve derin bir ortak sorumluluk duygusu getirir. Eğer biri düşerse, diğerleri onu tutar. Tehlike ortadan kalkmaz ama yeniden dağıtılır. Dağ vahşi kalmaya devam ediyor ama ona verdiğimiz yanıt artık kahramanca değil, işbirliğine dayalı." #deepl:1978213156
 douglas.112.g: "Bir ip. Bir irade. Bir takım." #deepl:1569127386
 douglas.113.t: "Kırılgan Beden" #deepl:3178580481
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ekip için bir ilk yardım sistemi getirme konusunda ısrarcıdır." #deepl:887703212
 douglas.113.f: "Su toplamaları, kırıklar, donma - dağ merhamet göstermiyor. Bir zamanlar riskin bir parçası olarak kabul edilen şeyler artık sistematik bir şekilde tedavi ediliyor. Akıllıca kullanılan küçük bir tıbbi kit hayat kurtarabilir. Hızlıca inşa edilen bir barınak zaman kazandırabilir. İlk kez, temel tıp bilgisi eğitimin bir parçası haline geliyor. Dağ hala her şeyi talep ediyor ama ilk yardım kitleri ve acil durum planlarının devreye girmesiyle ekip, cesaretten daha fazlasıyla karşılık veriyor. İnsan vücudu artık göz ardı edilmiyor, korunuyor." #deepl:563827659
 douglas.113.g: "En güçlüler bile düşebilir." #deepl:4107036891
 douglas.114.t: "Taş Konuşuyor" #deepl:2102994496
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] dağcılıkta bilimsel yöntemleri tanıtmıştır: Arazi analizini geliştirmek için jeolojik bilgi ortaya konmuştur." #deepl:3612073372
 douglas.114.f: "Bir zamanlar arka plan gibi görünen şey - moloz, tortu, kaya - şimdi okunması gereken bir dil haline geliyor. Ekip üyelerinden biri jeolojik uzmanlık getiriyor: katmanlar eski hareketleri ortaya çıkarıyor, kaya türleri çığlara karşı uyarıyor, fay hatları güvenli rotalara rehberlik ediyor. Dağ artık bir efsane değil, bir arşivdir. Bilim, defterler ve çekiçlerle gelir ve aniden keşif gezileri sadece macera değil, saha çalışması haline gelir. Bu yeni bir görme biçimi, sessiz bir devrim." #deepl:1873707756
 douglas.114.g: "Tırmanmadan önce öğrenelim." #deepl:3896308340
 douglas.115.t: "Yükseklik Nefesi" #deepl:1444940126
 douglas.115.d: "Kimyasal savaş alanındaki deneyimler neden dağcılıkta kullanılmasın? Yeni teknoloji, aşırı yüksekliklerde oksijen maskelerinin kullanılmasına olanak sağlıyor." #deepl:2351243748
 douglas.115.f: "Belli bir yüksekliğin üzerinde gökyüzü incelir. Nefes almak bir mücadeleye dönüşür, vücut protesto eder. Ama şimdi, mekanik aygıtların yardımıyla, insanlar asla ulaşmamaları gereken yerlere ulaşabiliyorlar. Bir zamanlar bilimin bir merakı olan oksijen maskeleri standart hale geldi. Olasılığın sınırlarını yeniden tanımlıyorlar. Yedi bin metrenin üzerindeki dünya, bir bedeli olsa da erişilebilir hale gelir: dağcı artık gerçekten yalnız değildir, bir yaşam destek sisteminin parçasıdır. Dağa karşı kazanılan zafer azalmaz, sadece daha soğuk hale gelir." #deepl:689433627
 douglas.115.g: "Yapay olarak nefes alıyoruz ama galip geliyoruz." #deepl:53945526

