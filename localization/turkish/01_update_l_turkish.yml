 gaudi.51.t: "Neoklasik Canlanma" #deepl:3536136445
 gaudi.51.d: "[ROOT.GetCountry.GetName] zamansız ve asil mimarinin bir örneği haline gelmiştir. Bu, uygar dünyanın her yerinde hayranlık uyandıran bir durumdur!" #deepl:1191503815
 gaudi.51.f: ""Antik başyapıtların genel ve en göze çarpan özelliği, nihayetinde, hem duruşta hem de ifadede asil bir sadelik ve sessiz bir ihtişamdır."\n- Johann Joachim Winckelmann" #deepl:3328862889
 gaudi.51.g: "Bu gerçek sanatın özüdür." #deepl:3736488828
 gaudi.52.t: "Bauhaus'un Zaferi" #deepl:1539285104
 gaudi.52.d: "[ROOT.GetCountry.GetName] akılcı ve ilerici mimarinin bir işareti haline gelmiştir. Bu, küresel saygı ve hayranlık uyandıran bir durumdur!" #deepl:1188995024
 gaudi.52.f: ""Tasarımcılık bir meslek değil, bir tutumdur."\n- László Moholy-Nagy" #deepl:1692369698
 gaudi.52.g: "Lüks ihtiyacı yerine halkın ihtiyaçları!" #deepl:3765042267

 je_gaudi_bauhaus_architecture: "Bauhaus Mimarisi" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "Bauhaus, 1919'dan 1933'e kadar faaliyet gösteren, zanaat ve güzel sanatları birleştiren bir Alman sanat okuluydu. Okul, bireysel sanatsal vizyonu seri üretim ilkeleri ve işlev vurgusuyla birleştirmeye çalışan tasarım yaklaşımıyla ünlendi. Tüm sanatların eninde sonunda bir araya getirileceği bir Gesamtkunstwerk (kapsamlı sanat eseri) yaratma fikrine dayanıyordu. Bauhaus tarzı daha sonra modern tasarım, modernist mimari ve mimarlık eğitiminde en etkili akımlardan biri haline geldi." #deepl:1381087306
 je_gaudi_neoclassical_architecture: "Neoklasik Mimari" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "Neoklasizm, 20. yüzyılın başlarında Greko-Romen antik çağının biçimsel netliği, simetrisi ve ihtişamıyla yeniden bağlantı kurmaya çalışan canlanmacı bir mimari ve sanatsal hareketti. Tarihselciliğin aşırılıklarına ve modern sanatın artan soyutlamasına karşı bir kontrpuan olarak ortaya çıkan bu tarz, anıtsallığı, geometrik düzeni ve geleneksel formların rasyonel, genellikle devlet onaylı bir üslupta kullanılmasını vurgulamıştır. Ulusal kimlik ve sivil mimariyle yakından ilişkiliydi ve kalıcılık, otorite ve disiplinli güzellik ideallerini yansıtıyordu." #deepl:2628512539
 je_gaudi_art_deco_architecture: "Art Deco Mimari" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "Art Deco akımı, 1920'lerde klasik düzenin unsurlarını korurken modernliği kucaklayan dekoratif ve mimari bir tarz olarak ortaya çıktı. Stilize formların, zengin malzemelerin ve süslü geometrinin karakteristik kullanımıyla Art Deco, zanaatkârlığın zenginliğini yeni ortaya çıkan makine estetiğiyle birleştirdi. Endüstri, hız ve egzotizmden ilham alan motifler aracılığıyla teknolojik ilerlemeyi ve kentsel dinamizmi kutladı." #deepl:2018331500

 je_gaudi_splendour_bauhaus: "Bauhaus'un Zaferi" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "Bauhaus ruhunun ortaya çıkmasıyla birlikte mimarlar süs ve illüzyondan sıyrılarak açıklık, kesinlik ve malzemeye sadık kalmayı tercih etmeye başladılar. Amaç artık zenginlik yoluyla etkilemek veya geçmiş imparatorlukların ihtişamını çağrıştırmak değil, işlevsel, dürüst ve modern mekanlar yaratarak topluma hizmet etmektir. Bauhaus sadece bir estetik değil, mimarlık ve günlük yaşamın sadelik, kullanışlılık, biçim ve amaç birliği yoluyla uzlaştırılması gerektiği inancına dayanan bir tasarım felsefesidir. Bauhaus ilkelerini benimseyen bir başkent sadece modernliğin değil, en saf haliyle ilerlemenin de sinyalini verir: işlevin cepheye, yeniliğin geleneğe üstünlüğü." #deepl:3357423326
 je_gaudi_splendour_neoclassical: "Neoklasik Canlanma" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "Neoklasizm, antik çağın rasyonel uyumuna, sütunların, alınlıkların ve simetrik düzenlerin mimari gramerine dayanan bir stildir. Ancak 20. yüzyılın başlarında modern inşaat teknikleri, daha temiz çizgiler ve genellikle anıtsal ölçekle yeniden tasarlandı. Sadece geleneği değil, aynı zamanda kamusal yaşamın, hukukun ve kültürün huşu ve birliktelik uyandıran binalarla çerçeveleneceği disiplinli bir gelecek vizyonunu da temsil ediyordu. Bu ilkeleri benimseyen bir mimari, başkentimize ağırbaşlılık ve ihtişam kazandırarak onu dünyanın gözünde bir düzen, dayanıklılık ve ekili güç işaretine dönüştürecektir." #deepl:605890088
 je_gaudi_splendour_art_deco: "Bir Art Deco Rüyası" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "Art Deco'nun ortaya çıkışıyla birlikte mimarlar, örneğin geçmişin katı tarihselciliğinden koparak sanat dünyasında devrim yarattılar. Ancak birçok modern ekolün aksine, onların binaları salt işlevsellik ve nesnelliğin bir ifadesi değildi. Art Deco, klasik modernizmin genel uyanışının ortasında, formun zarafetinin, malzemelerin kıymetinin, renklerin gücünün ve konunun duygusallığının yaratıcı kombinasyonunun ön planda olduğu bir gelişmedir. En parlak döneminde lüksü, ihtişamı, coşkuyu ve sosyal ve teknolojik ilerlemeye olan inancı temsil ediyordu. Bu ilkelere saygılı bir mimari, ulusumuzu modernliğin ve zenginliğin poster çocuğu haline getirecektir." #deepl:980834049

