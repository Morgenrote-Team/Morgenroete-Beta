 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Dağcılık Ekspedisyonu: 1. Seviye Zirveler#!\nBu kategorideki dağlara 1. Seviye dağcılık ekipmanlarıyla tırmanılabilir. Seviye, irtifa veya riski göstermez. Bu zirveler şunları içerir: Whitney Dağı, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Kamerun Dağı, Ras Dashen ve Giluwe Dağı. Daha fazla bilgi için [concept_douglas_mountain_summit_list].\n\n adresini ziyaret edebilirsiniz.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1466134091
