 concept_douglas_mountain_summit: "Dağ Zirvesi" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "Dağ Zirveleri tüm dağcıların gıpta ile baktığı hedeflerdir. Bir dağın en yüksek noktasını işaret ederler. Her zirvenin, başarıyla ulaşmanın ne kadar zor olduğunu tanımlayan üç farklı özelliği vardır.\n\n#V Yükseklik#!: Yükseklik, bir dağa tırmanmak için kaç adım gerektiğini belirler - bu, bir keşif gezisinin toplam uzunluğunu yansıtır. Her 1.000 metre için bir ilerleme adımına ihtiyaç vardır. Değer yukarı yuvarlanır, yani 4,421 metre yüksekliğindeki Whitney Dağı 5 adım gerektirirken, 7,134 metre yüksekliğindeki Kauffmann Zirvesi 8 adım gerektirir. Bir dağın prestiji yüksekliğine göre hesaplanır: toplam yükseklik 250'ye bölünür. Böylece, 5.000 metrelik ideal bir dağ 20 prestij kazandırır.\n\n#V Seviye#!: Bir dağın seviyesi, ona tırmanmak için gerekli ekipman ihtiyacını temsil eder. Bu kesinlikle yüksekliğine bağlı değildir. Örneğin, 5.636 metre yüksekliğine rağmen Citlaltépetl sadece 1. seviyedir ve sadece temel ekipman gerektirir. Buna karşılık, sadece 4.478 metredeki Matterhorn, Seviye 3'te önemli ölçüde daha zorlu kabul edilir ve Alpin acil durumlar için en azından ilk yardım hazırlığı gerektirir.\n\n#V Risk#!: Bir dağın risk seviyesi, bir keşif gezisini etkileyen olumsuz olayların olasılığını gösterir. Hem yükseklikten hem de seviyeden bağımsızdır. Çığlar, sis ve şiddetli hava koşulları temel endişelerdir. Popocatépetl, misafirperver çevresi nedeniyle erken modern zamanlarda bile tırmanılabilmiştir. Buna karşılık, sadece 3.666 metrelik çok daha küçük Großvenediger, 19. yüzyılın başlarına kadar Avusturya keşif gezileri için hala ciddi bir tehdit oluşturuyordu.\n\nBireysel zirveler hakkında daha fazla bilgi [concept_douglas_mountain_summit_list] bölümünde bulunabilir." #deepl:3359948048
 concept_douglas_mountain_range: "Dağ Sırası" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "Sıradağlar [concept_douglas_mountaineering] uzun mesafelerde eğitim için potansiyel sunan bir dağ oluşumu olarak tanımlanır. Klasik sıradağlar arasında Rocky Dağları, And Dağları, Alpler ve Kafkaslar yer alır. Fethedilmesi gereken [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] dağların aksine [concept_douglas_mountaineer] ölümcül bir düşüş yaşama riski bulunmayan daha az zorlu dağlar da vardır. Bunlar daha ziyade bir eğitim rotası olarak görülmelidir. Sıradağlara sahip ülkelerin dağcı yetiştirme olasılığı, bu coğrafi özelliğe sahip olmayanlara göre daha yüksektir." #deepl:2685064578
 concept_douglas_alpine_heritage: "Alpine Heritage" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "Alpin Miras, dağlarla bağlantı ve dağlara tırmanma konusunda uzmanlık için kullanılan kolektif bir terimdir. Aynı zamanda yeni [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]kazanma potansiyelini de ifade eder - çünkü çoğu durumda deneyimli dağcılar dağlık bölgelerden gelir. Bu da [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] veya [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] olan ülkelere her zaman avantaj sağlar. Yeni bir dağcının işe alınması ve diğer çeşitli faaliyetler Alp Mirası'na mal olur." #deepl:707449492

 concept_douglas_mountain_summit_list: "Dağ Zirveleri Listesi" #deepl:4208448161
