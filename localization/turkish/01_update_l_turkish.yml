 gaudi.11.t: "Blueprint Seçimi: Şehir Anıtı" #deepl:3177181239
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]Ülkemizin en önemli mimarı, yeni bir bina için plan tasarlama gibi önemli bir görevi üstlendi. Asıl soru şu: Ne tür bir bina tasarlanmalıdır?" #deepl:1652669912
 gaudi.11.f: "Bir [GetBuildingType('building_gaudi_statue').GetName] hükümetin #G meşruiyetini#! artırır. [GetTechnology('elgar_classicism_tech').GetName] gereklidir.\nBir [GetBuildingType('building_gaudi_fountain').GetName] bulunduğu devletin #G yaşam standardını#! iyileştirir.\nBir [GetBuildingType('building_gaudi_arch').GetName] savaşan birliklerin #G moral kaybını#! azaltacaktır. [GetTechnology('napoleonic_warfare').GetName] gereklidir." #deepl:2246128148
 gaudi.11.g: "Heykel." #deepl:2708296858
 gaudi.11.h: "Çeşme." #deepl:320933070
 gaudi.11.i: "Zafer Takı." #deepl:1127411794
 gaudi.12.t: "Blueprint Seçimi: Kamusal Meydan" #deepl:3080738332
 gaudi.12.f: "Bir [GetBuildingType('building_gaudi_park').GetName], #G kirliliği#! azaltacaktır.\nBir [GetBuildingType('building_gaudi_luna').GetName], bulunduğu eyaletin #G vergi gelirini#! artırır. [GetTechnology('curtiss_tourism_tech').GetName] gereklidir.\nBir [GetBuildingType('building_gaudi_parade').GetName], #G askerlik oranları#! üzerinde olumlu bir etkiye sahiptir. [GetTechnology('nationalism').GetName] gereklidir." #deepl:4066407048
 gaudi.12.g: "Halk Parkı." #deepl:2494674221
 gaudi.12.h: "Luna Park." #deepl:971224439
 gaudi.12.i: "Tören Alanı." #deepl:1574323515
 gaudi.13.t: "Blueprint Seçimi: Kamusal Meydan" #deepl:3080738332
 gaudi.13.f: "A [GetBuildingType('building_gaudi_almshouse').GetName] göçmenleri #G çekecektir#!. [GetTechnology('egalitarianism').GetName] gereklidir.\nA [GetBuildingType('building_gaudi_school').GetName] bulunduğu eyaletin #G eğitim erişimini#! geliştirecektir. [GetTechnology('empiricism').GetName] gereklidir.\nA [GetBuildingType('building_gaudi_prison').GetName] kargaşayı #G azaltacaktır#!. [GetTechnology('law_enforcement').GetName] gereklidir." #deepl:1220690443
 gaudi.13.g: "Devlet Düşkünler Evi." #deepl:10701147
 gaudi.13.h: "Devlet Okulu." #deepl:781611903
 gaudi.13.i: "Eyalet Hapishanesi." #deepl:2831404965
 gaudi.14.t: "Blueprint Seçimi: Halk Sağlığı" #deepl:1830009383
 gaudi.14.f: "Bir [GetBuildingType('building_gaudi_canalization').GetName] eyalete kolera, sarı humma ve vebaya karşı #G bağışıklık kazandıracaktır#!. [GetTechnology('modern_sewerage').GetName] gereklidir.\nBir [GetBuildingType('building_gaudi_hospital').GetName] bulunduğu eyaletin #G doğum oranını#! artıracaktır. [GetTechnology('theiler_microbiology_tech').GetName] gereklidir.\nBir [GetBuildingType('building_gaudi_health').GetName] hastalık yoğunluğunu #G azaltacaktır#!. [GetTechnology('pharmaceuticals').GetName] gereklidir." #deepl:3694299428
 gaudi.14.g: "Kanalizasyon Sistemi." #deepl:4218293714
 gaudi.14.h: "Üniversite Hastanesi." #deepl:2453533946
 gaudi.14.i: "Sağlık Bakanlığı." #deepl:1923211910
 gaudi.15.t: "Blueprint Seçimi: Ulusal Akademi" #deepl:4003607718
 gaudi.15.f: "A [GetBuildingType('building_gaudi_science').GetName], #G aylık Akademik İlerlememizi#! ilerletecektir. [GetTechnology('dialectics').GetName] gereklidir.\nA [GetBuildingType('building_gaudi_arts').GetName], #G aylık Sanatsal İlerlememizi#! ilerletecektir. [GetTechnology('romanticism').GetName] gereklidir.\nA [GetBuildingType('building_gaudi_sports').GetName], #G sporcularımızın deneyimini#! artıracaktır. [GetTechnology('organized_sports').GetName] gereklidir." #deepl:1533132803
 gaudi.15.g: "Bilim Akademisi." #deepl:1181583251
 gaudi.15.h: "Sanat Akademisi." #deepl:369638717
 gaudi.15.i: "Spor Akademisi." #deepl:1127570803
 gaudi.11.j: "Yeni bir plana ihtiyaç yoktur." #deepl:4175354043

 gaudi.16.t: "Yeni Bir Plan" #deepl:4025940977
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] bugün plan üzerindeki çalışmalarını tamamladı ve müşteriye teslim etti." #deepl:3235089264
 gaudi.16.f: "'Süsleme boşa harcanan emek ve dolayısıyla boşa harcanan sağlıktır. Günümüzde bu aynı zamanda boşa harcanan malzeme anlamına da gelmektedir ve her ikisi de boşa harcanan sermaye demektir. Modern insan, modern sinirlere sahip insan, süslemeye ihtiyaç duymaz; ondan nefret eder. -Adolf Loos" #deepl:1476970686
 gaudi.16.g: "Yeni bir bina!" #deepl:1359643446

