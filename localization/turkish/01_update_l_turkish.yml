 douglas.101.t: "Dağcılık Kulübü kuruldu" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] çağırır ve dağ cevap verir. Dağcılık Kulübü'nün kuruluşu, daha yükseği hedefleyen herkes için yeni bir döneme işaret ediyor." #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] Keşif gezileri [SCOPE.sCharacter('douglas_president_scope').GetHerHim] 'u fırtınalar ve çığların içinden geçirdi-ama şimdi [SCOPE.sCharacter('douglas_president_scope').GetSheHe] [SCOPE.sCharacter('douglas_president_scope').GetHerHis] mirasını devretmeye çalışıyor. [ROOT.GetCountry.GetCapital.GetCityHubName] 'da [SCOPE.sCharacter('douglas_president_scope').GetSheHe] tek başına değil ama gelecek vaat eden yeni biriyle birlikte [GetPlayer.GetName] Dağcılık Kulübü'nü kurar: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] Keskin gözleri ve demir gibi iradesi olan hevesli bir dağcı. [SCOPE.sCharacter('douglas_president_scope').GetFullName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] 'da sadece hırs değil, geleceğin efsanesini de görüyor. Birlikte, yalnızca zirvelere değil, aynı zamanda zafere, cesarete ve belki de tarihte bir yere giden bir yolun eşiğinde duruyorlar. Kulüp, dağların çağrısını duyan herkese açıktır. Tırmanış başlıyor." #deepl:3771164746
 douglas.101.g: "Dağ çağırıyor!" #deepl:249284577

 douglas.102.t: "The Alpine Club" #deepl:1599559370
 douglas.102.d: "Alpine Club resmi olarak [ROOT.GetCountry.GetCapital.GetCityHubName] [TimeKeeper.GetCurrentDate.Format('y')] adresinde kurulmuştur ve dünyanın ilk uluslararası dağcılık organizasyonu olarak kabul edilmektedir. Kuruluşu modern dağcılığın kurumsal başlangıcına işaret etmektedir." #deepl:3982546221
 douglas.102.f: "Tarihsel olarak, bir grup İngiliz beyefendisi 1857 yılında Londra'da bir araya gelerek dağcılığa adanmış bir kulüp kurdu. John Ball ve Edward Kennedy gibi isimlerin önderlik ettiği Alpine Club, Alplerin sistematik bir şekilde keşfedilmesini teşvik ederek fiziksel mücadeleyi coğrafi ve doğal çalışmalarla birleştirmeyi amaçlamıştır. Kulüp, bilginin paylaşılması, keşif gezilerinin düzenlenmesi ve dağcılar arasında bir topluluk duygusunun geliştirilmesi için yapılandırılmış bir çerçeve sağladı. Üyeleri, daha sonra 'Alpinizmin Altın Çağı' olarak anılacak olan dönemde çok sayıda ilk tırmanış gerçekleştirerek ve deneyimlerini belgeleyerek kilit bir rol oynadı. Kısa bir süre sonra Alpine Journal yayınlanmaya başladı ve dağcılık literatürüne katkıda bulundu. Alpine Club'ın kuruluşu dünya çapında organize tırmanışların temelini attı ve dağ keşiflerinde kalıcı standartlar belirledi." #deepl:4126383378
 douglas.102.g: "Birlikte zirveye!" #deepl:2506053391

