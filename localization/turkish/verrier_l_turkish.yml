 verrier.142.t: "Güneş Patlaması"
 verrier.142.d: "Güneş patlamalarını gözlemlerken, [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName], oldukça alışılmadık bir olayı fark etti. Teorisi doğruysa, Dünya’ya doğru hızla ilerleyen bir güneş fırtınası var. Bu bir yandan bilim açısından çığır açıcı bir keşif; diğer yandan tehlikeli olabilir."
 verrier.142.f: "Güneş patlaması, Güneş’in kromosferinde artmış radyasyon yapısıdır ve manyetik alan enerjisi ile beslenir. Bir patlama bölgesinin absorpsiyon spektrumu genellikle hidrojenin yanı sıra helyum ve kalsiyum içerir. Bu bölgeler ultraviyole ve X-ışını aralıklarında artmış kısa dalga radyasyonu, protonlar, elektronlar ve iyonlar yayar. Dünya’da bu iyonosferde bozulmalara ve radyo iletişiminde aksamalara yol açar. Partiküller Dünya atmosferine girdiğinde manyetik fırtınalara sebep olur. İyonosferik fırtınalar, parçacıklar aurora bölgelerine yavaşça nüfuz ettiğinde auroraların gece görünür olmasını ve güçlü dalgalanan elektrik akımlarının jeomanyetik bozulmalara yol açmasını sağlar."
 verrier.142.g: "Bu ne anlama geliyor, Profesör?"
 verrier.143.t: "[SCOPE.sCharacter('verrier_carrington_discoverer').GetLastName] Olayı"
 verrier.143.d: "Bir manyetik fırtına Dünya’yı vurdu! Bu eşsiz doğal olay, Kuzey Işıkları’nın Roma, Havana ve Çin’de bile görünmesine yol açtı. İnsanlar bu göksel gösteriye hayran kaldı. Görünüşe göre, Astronom [SCOPE.sCharacter('verrier_carrington_discoverer').GetFullName] tarafından keşfedilen bir güneş patlamasıyla ilgili."
 verrier.143.f: "28 Ağustos–4 Eylül 1859 arasında, özellikle astronom Richard Carrington tarafından gözlemlenen güçlü güneş patlamaları meydana geldi. Koronal kütle atımlarından fırlayan malzeme 2000 km/s hızla Dünya’ya ulaştı. O tarihe kadar kaydedilen en güçlü jeomanyetik fırtına 1–2 Eylül gecesi gerçekleşti. Kuzey ve güney yarımkürelerde auroralar gözlendi. ABD’de Rocky Dağları üzerindeki aurora o kadar parlaktı ki, altın madencileri ışığı sabah zannederek kahvaltıya başladılar. Kuzeydoğu ABD’de insanlar auroranın ışığında gazete okuyabildi. Aurora kutuplardan düşük enlemlere kadar, Meksika orta-güneyi, Küba, Hawaii, Queensland, güney Japonya ve Çin gibi bölgelere ve hatta ekvatora çok yakın Kolombiya’ya kadar görüldü."
 verrier.143.g: "Hem korkunç hem de muhteşem."
 verrier.144.t: "Telgraf Sistemi Çöktü"
 verrier.144.d: "Elektromanyetik alanın oluşturduğu jeomanyetik akımlar nedeniyle, Avrupa ve Kuzey Amerika’daki telgraf sistemleri çöktü; bazı operatörler elektrik çarpması aldı. Telgraf hatlarında indüklenen yüksek voltaj nedeniyle, alıcılardaki kağıt şeritler kıvılcımlarla yanıyordu. Bazı operatörler, güç kaynaklarını devre dışı bıraksalar bile mesaj göndermeye ve almaya devam edebildiler."
 verrier.144.f: "Boston operatörü (Portland operatörüne): 'Lütfen bataryanı tamamen on beş dakika kes.'\nPortland: 'Yapıyorum. Şimdi kesildi.'\nBoston: 'Benimkisi de kesildi, aurora akımıyla çalışıyoruz. Yazımı nasıl alıyorsun?'\nPortland: 'Bataryayla olduğundan daha iyi. Akım gidip geliyor.'\nBoston: 'Akımım bazen çok güçlü, aurora bataryalarımızı sırayla nötralize edip güçlendiriyor, röle mıknatısları için akım bazen çok güçlü. Akım etkisi altındayken bataryasız çalışalım.'\nPortland: 'Peki. Devam edelim mi?'\nBoston: 'Evet, devam edin.'"
 verrier.144.g: "Telgraflar elektriksiz mi çalışıyor?! Bu tamamen imkânsız!"
 verrier.9010.t: "Bilimin Sesi"
 verrier.9010.d: "[SCOPE.sState('sound_of_science_state').GetCityHubName] Üniversitesi’ndeki bir profesör, #variable Christian Doppler#!’in, ses veya ışık gözlemlenen frekansının kaynak veya gözlemci hareketliyse değiştiğini gösteren teorisinin geçerliliğini ispatladı."
 verrier.9010.f: "Yarışan bir tren, çalan bir bakır boru ve kusursuz işitme yeteneğine sahip bir düzine gözlemci, #bold #variable [SCOPE.sState('sound_of_science_state').GetFarmHubName]-[SCOPE.sState('sound_of_science_state').GetCityHubName]#!#! demiryolunda bir deney için toplandı. Amaç? Yıldızların hareketiyle ilgili Doppler teorisi. Eğer bir nesnenin hızına göre dalga frekansının değiştiği teorisi doğruysa, tren yanından geçerken borudan çıkan sesin perdesinde fark edilir bir düşüş olmalı.\n1/8 perdedeki farkı bile duyabilen gözlemciler, tren geçerken gözlemlerini kaydetti. Üç günlük tabulasyondan sonra sonuçlar hazır... Ve... Perde düşüşü evrensel olarak kaydedildi!"
 verrier.9010.g: "Gözlem ve deney bilgi temelidir."
 verrier.9010.h: "Yeni bir gerçeğin beklenmedik şekilde bir amaca hizmet edebileceğini bilemezsiniz."
 verrier_sound_of_science_prestige_modifier: "Bilimin Sesi"
 verrier_sound_of_science_tech_spread_modifier: "Bilimin Sesi"
 je_verrier_uranus: "Başka bir Gezegen?"
 je_verrier_uranus_reason: "Acaba dışarıda başka bir gezegen olabilir mi? Yüzyıllar boyunca yalnızca 6 gezegen biliniyordu, ancak teleskoplardaki son gelişmeler sayesinde başka bir gezegen bulmamız çok olası. Ve neden 7 ile duralım, belki daha fazlası da vardır! Daha fazla gezegen keşfetmek, evrenin sırlarını çözmemize de yardımcı olabilir.\n\n#b Tarihi Bağlam:#! 6 gezegen uzun süre biliniyordu, parlaklıkları sayesinde çıplak gözle bile gözlemlenebiliyorlardı. Uranüs, Neptün ve Plüton ise daha az parlaktı ve Uranüs uygun koşullarda gözle görülebilse de, yavaş yörüngesi nedeniyle birçok astronom gezegeni sabit bir yıldız sanıyordu."
 je_verrier_uranus_goal: "Başka bir gezegenin olup olmadığını belirlemek için [JournalEntry.GetTotalGoalValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfetmemiz gerekiyor."
 je_verrier_uranus_fail: "Eğer başka bir ülke bizden önce gereklilikleri sağlarsa, yeni bir gezegen keşfedebilir ya da yalnızca 6 gezegen olduğunu fark edebilir."
 verrier.12.t: "Yeni Bir Gezegen!"
 verrier.12.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], şimdi Uranüs olarak adlandırılan bilinmeyen bir gezegeni keşfetti! Hiç kimsenin beklemediği bir olay."
 verrier.12.f: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] ilk başta yeni bir kuyruklu yıldız bulduğunu düşündü. Sadece birkaç hafta sonra bunun aslında yeni bir gezegen olduğu anlaşıldı! Başka bir gezegenin mümkün olmadığı düşünülüyordu. Ancak Uranüs keşfedildikten sonra, birçok kişi daha fazla gezegen olup olamayacağını sormaya başladı.\n\n#b Tarihi Bağlam:#! 1781 yılına kadar Wilhelm Herschel tesadüfen Uranüs’ü keşfetti. İlk başta bir kuyruklu yıldız olduğunu düşündü, çünkü neden bilinen gezegenlerin dışında başka gezegenler olsun ki? Ancak sonraki 3 ay içinde bilim camiası bunun gerçekten yeni bir gezegen olduğunu fark etti."
 verrier.12.g: "İnanılmaz! Acaba daha fazla gezegen olabilir mi?"
 verrier.13.d: "Büyük bir heyecan yaşandı! [SCOPE.sCountry('verrier_uranus_discoverer_country').GetName] ülkesinden bir astronom yeni bir gezegen buldu: Uranüs. Eğer bir tane daha varsa, belki daha fazlasını da bulabiliriz!"
 verrier.13.g: "6’dan fazla gezegen varsa, belki bizim keşfetmemiz için daha çok gezegen vardır!"
 verrier_uranus_discoverer_modifier: "Uranüs’ü Keşfeden"
 je_verrier_dwarf_planets: "Göksel Polis"
 je_verrier_dwarf_planets_reason: "Not: Bu Günlük Girişi birden fazla kez tamamlanabilir.\n\nUranüs’ün keşfinden sonra diğer gezegenleri bulma olasılığı ortaya çıktı. Mars ile Jüpiter arasında devasa bir boşluk bulunduğu için, astronomlar orada başka bir gezegen bulmayı umuyordu. Bu nedenle birden fazla gözlemevini kapsayan Göksel Polis’i kurdular.\n\n#b Tarihi Bağlam:#! Göksel Polis (Almanca: Himmelspolizey), 19. yüzyıl başında birçok Avrupalı astronomun oluşturduğu bir işbirliğiydi. Özellikle Mars ve Jüpiter yörüngeleri arasında beklenen cisimleri aramak için bilinir. 1800 yılında ikinci Avrupa astronomlar kongresinde kuruldu."
 je_verrier_dwarf_planets_goal: "Olası yeni bir gezegen bulmak için [JournalEntry.GetGoalAddValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfetmemiz gerekiyor."
 verrier.14.t: "Ceres keşfedildi"
 verrier.14.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], Mars ve Jüpiter arasındaki bölgedeki bilinmeyen bir gezegeni keşfetti. Büyük bir keşif!"
 verrier.14.f: "#b Tarihi Bağlam:#! Astronomlar uzun zamandır Mars ve Jüpiter arasındaki boşlukta başka bir gezegen olabileceğini tahmin ediyordu. Bu nedenle Göksel Polis kuruldu ve bölge parça parça farklı gözlemevlerine dağıtıldı.\n1801 yılbaşı gecesi Giuseppe Piazzi, bir yıldız kataloğunda tesadüfen Ceres’i keşfetti."
 verrier.14.g: "Acaba daha kaç gezegen var?"
 verrier_ceres_discoverer_modifier: "Ceres’i Keşfeden"
 notification_verrier_ceres_discovered_notification_name: "Ceres keşfedildi"
 notification_verrier_ceres_discovered_notification_desc: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName], inanılmaz bir keşif yaptı ve güneş sisteminde yeni bir gezegen buldu. Gezegen Ceres olarak adlandırılacak ve Mars ile Jüpiter arasında yer alıyor."
 verrier.15.t: "Pallas keşfedildi"
 verrier.15.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], Mars ve Jüpiter arasındaki bölgedeki bilinmeyen bir gezegeni keşfetti. Büyük bir keşif!"
 verrier.15.f: "#b Tarihi Bağlam:#! Ceres keşfedildiğinde aynı bölgede başka bir gezegen olması beklenmiyordu. Heinrich Wilhelm Olbers, Ceres’i ararken yeni bir gezegen keşfettiğinde büyük bir sürpriz yaşandı. Pallas’ın keşfi, Göksel Polis’in aynı bölgedeki diğer gezegenleri araştırmasına yol açtı ve birkaç yıl sonra başarılı oldu."
 verrier_pallas_discoverer_modifier: "Pallas’ı Keşfeden"
 notification_verrier_pallas_discovered_notification_name: "Pallas keşfedildi"
 notification_verrier_pallas_discovered_notification_desc: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName], inanılmaz bir keşif yaptı ve güneş sisteminde yeni bir gezegen buldu. Gezegen Pallas olarak adlandırılacak ve Mars ile Jüpiter arasında yer alıyor."
 verrier.16.t: "Vesta keşfedildi"
 verrier.16.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], Mars ve Jüpiter arasındaki bölgedeki bilinmeyen bir gezegeni keşfetti. Büyük bir keşif!"
 verrier.16.f: "#b Tarihi Bağlam:#! Heinrich Wilhelm Olbers ikinci gezegenini 1807’de bulduğunda, adlandırması için Carl Friedrich Gauß’a başvurdu. Yeni adı verilen Vesta, Mars ve Jüpiter arasındaki bölgede bulunan dördüncü gezegen oldu ve yaklaşık 40 yıl boyunca son gezegen olarak kaldı."
 verrier_vesta_discoverer_modifier: "Vesta’yı Keşfeden"
 notification_verrier_vesta_discovered_notification_name: "Vesta keşfedildi"
 notification_verrier_vesta_discovered_notification_desc: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName], inanılmaz bir keşif yaptı ve güneş sisteminde yeni bir gezegen buldu. Gezegen Vesta olarak adlandırılacak ve Mars ile Jüpiter arasında yer alıyor."
 verrier.17.t: "Juno keşfedildi"
 verrier.17.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], Mars ve Jüpiter arasındaki bölgedeki bilinmeyen bir gezegeni keşfetti. Büyük bir keşif!"
 verrier.17.f: "#b Tarihi Bağlam:#! 1801’de Ceres ve 1802’de Pallas keşfedildikten sadece 2 yıl sonra Karl Ludwig Hardwig, aynı Mars-Jüpiter bölgesinde Juno’yu buldu. Bu üç gezegen ile 1807’de keşfedilen Vesta bir süre gezegen olarak kabul edildi; daha sonra giderek daha fazla asteroid keşfedilip gezegen olarak değerlendirilmeye başlandı. Sonunda astronomlar bunların gerçek gezegen olmadığını karar verdiler."
 verrier_juno_discoverer_modifier: "Juno’yu Keşfeden"
 notification_verrier_juno_discovered_notification_name: "Juno keşfedildi"
 notification_verrier_juno_discovered_notification_desc: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName], inanılmaz bir keşif yaptı ve güneş sisteminde yeni bir gezegen buldu. Gezegen Juno olarak adlandırılacak ve Mars ile Jüpiter arasında yer alıyor."
 je_verrier_neptune_goal: "Bilinmeyen Gezegen’in başarılı bir şekilde keşfi için yıldızlı gökyüzünün detaylı bir şekilde incelenmesi gerekir. [JournalEntry.GetTotalGoalValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfettikten sonra gezegeni ortaya çıkarma konusunda başarı elde edebiliriz."
 je_verrier_pluto_goal: "X Gezegeni’nin başarılı bir şekilde keşfi için yıldızlı gökyüzünün detaylı bir şekilde incelenmesi gerekir. [JournalEntry.GetTotalGoalValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfettikten sonra gezegeni ortaya çıkarma konusunda başarı elde edebiliriz."
 MR_ASTEROID_CONGRESS_DWARF_PLANETS_TT: "#default_text #V Ceres#!, #V Pallas#!, #V Vesta#! ve #V Juno#! keşfedildi.#!"
 je_verrier_astro_physics: "Astrofizik"
 je_verrier_astro_physics_reason: "Yeni fiziksel bulgular bilim dünyasını devrim niteliğinde etkiledi. Astronomi de bundan etkileniyor. Her iki bilim dalı verimli bir şekilde bilgi alışverişinde bulunuyor ve teorik ile gözlemsel fizik, evrenin daha iyi anlaşılmasına katkı sağlıyor."
 verrier_astro_physics_tech: "Astrofizik"
 verrier_astro_physics_tech_desc: "Astrofizik, astronomik cisimleri ve olayları incelemek için fizik ve kimya yöntemlerini kullanan bir bilim dalıdır. Disiplinin kurucularından James Keeler’in dediği gibi, astrofizik 'göksel cisimlerin doğasını anlamaya çalışır; konumlarını veya hareketlerini değil – ne olduklarını anlamaya odaklanır, nerede olduklarını değil'."
 verrier_modern_physics_tech: "Modern Fizik"
 verrier_modern_physics_tech_desc: "Modern fizik, 20. yüzyılın başlarında gelişmiş bir fizik dalıdır. Modern fiziğin öne çıkan alanları kuantum mekaniği, özel görelilik ve genel görelilik teorileridir. Işık hızına yakın yüksek hızlar, atomik boyutlarla kıyaslanabilecek küçük mesafeler ve çok yüksek enerjiler gibi ekstrem koşullarla ilgilenir."
 verrier_nuclear_physics_tech: "Nükleer Fizik"
 verrier_nuclear_physics_tech_desc: "Nükleer fizik, atom çekirdeklerinin yapısı ve davranışını inceleyen fizik dalıdır. Nükleer fizik, çekirdek yapısını ve tepkimelerini anlamaya odaklanır. Bu amaçla, çekirdeklerin spontan dönüşümleri (radyoaktivite), çekirdeklerde saçılma süreçleri ve çekirdeklerle reaksiyonlar hem deneysel hem de teorik olarak incelenir. Nükleer fisyon ve füzyon temelli teknolojiler, nükleer fizik araştırmalarına dayanır."
 verrier_first_sun_photo_modifier: "Güneş Tutulmasının İlk Fotoğrafı"
 verrier_helium_discovered_modifier: "Güneş Elementi"
 verrier_comet_observer: "Kuyruklu Yıldız Gözlemcisi"
 verrier_comet_observer_desc: "Bu astronom, adını verdiği büyük bir kuyruklu yıldızı keşfetti."
 verrier_magnetic_storm_observer: "Manyetik Fırtına Gözlemcisi"
 verrier_magnetic_storm_observer_desc: "Bu astronom, bir güneş patlamasıyla tetiklenen manyetik fırtınayı yakından gözlemledi ve inceledi."
 verrier_solar_observer: "Güneş Gözlemcisi"
 verrier_solar_observer_desc: "Bu astronom, bir güneş tutulmasını gözlemledi ve değerli bilimsel bilgiler elde etti."
 verrier.152.t: "Güneş Tutulması"
 verrier.152.d: "Bu yıl nadir bir olay meydana geldi: [ROOT.GetCountry.GetCapital.GetCityHubName] üzerinde tam güneş tutulması gerçekleşti. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName], bunu yakından gözlemleme fırsatı buldu."
 verrier.152.f: "Bir yeryüzü güneş tutulması, Güneş’in Dünya’nın belirli bölgelerinden izlendiğinde Ay tarafından kısmen veya tamamen örtülmesiyle gerçekleşen astronomik bir olaydır. Ay’ın gölgesi Dünya üzerinden geçer ve bu yalnızca yeni ay sırasında mümkündür. Güneş tutulmaları, özellikle Güneş hakkında ve genel olarak evren hakkında yeni bilgiler edinmek için sıklıkla kullanılmıştır. 29 Mayıs 1919’daki tam güneş tutulması, Afrika’daki Príncipe Adası’nda Arthur Stanley Eddington liderliğindeki bir keşif ekibi tarafından gözlemlenmiş ve birkaç yıl önce Albert Einstein tarafından geliştirilen görelilik teorisi ile özel ilgi görmüştür. Bu teori, Güneş’in kütle çekim alanı üzerinden uzak yıldızların ışığının sapmasını açıklıyordu ve gözlemlerle doğrulandı."
 verrier.152.g: "Çok nadir bir olay!"
 verrier.153.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]'ın Boncukları"
 verrier.153.d: "Astronomumuz [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName], son güneş tutulması sırasında güneş koronasını ve öne çıkan cisimleri daha yakından gözlemleme fırsatı buldu. Bilim insanı bunları güneş atmosferinin parçaları olarak tanımladı."
 verrier.153.f: "Baily boncukları, elmas yüzük veya daha nadiren çift elmas yüzük etkileri, tam ve halkalı güneş tutulmalarının özellikleridir. Aynı olgudan kaynaklansalar da, bu tutulma türlerinde ayrı ayrı gözlemlenirler. Ay, güneş tutulması sırasında Güneş’i örttüğünde, Ay’ın kenarının engebeli yapısı bazı yerlerden güneş ışığının sızmasına izin verirken diğer yerleri kapatır. Bu etkiler, 1836’da Francis Baily tarafından açıklanmıştır. Elmas yüzük etkileri, sadece bir veya iki boncuk kaldığında görülür ve Ay silueti etrafında parlak bir halka içine yerleştirilmiş 'elmaslar' gibi görünür."
 verrier.153.g: "Bu olgu, Dr. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]’ın adıyla anılmalıdır."
 verrier.154.t: "Güneş Tutulmasının İlk Fotoğrafı"
 verrier.154.d: "Yeni bir teknik süreç ile Dr. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName], güneş tutulmasının ilk fotoğrafını çekmeyi başardı."
 verrier.154.f: "Tam tutulma gibi nadir bir olayı fotoğraflamak, erken fotoğrafçılıkta benzersiz zorluklar içeriyordu; korona ile Ay’ın gölgesinin aşırı kontrastı ve fotoğraf ekipmanının alışılmadık açılarla konumlandırılması bunlardan bazılarıydı. 28 Temmuz 1851’deki tutulmaya kadar güneş koronasının düzgün bir şekilde pozlanmış fotoğrafı üretilmemişti. Bu etkinlik için Kraliyet Prusya Gözlemevi, şehrin en yetenekli daguerreotipçileri arasında yer alan Johann Julius Friedrich Berkowski’ye görevi verdi. Gözlemciler, 6 cm’lik küçük bir mercekli teleskopu 15,8 cm’lik Fraunhofer heliometresine bağladılar ve Berkowski, tam tutulmanın başından kısa süre sonra 84 saniyelik bir pozlama yaptı."
 verrier.154.g: "Mükemmel."
 verrier.155.t: "Güneş Elementi"
 verrier.155.d: "Yeni bir spektrografik teknik kullanarak Dr. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName], son güneş tutulması sırasında dikkate değer bir keşif yaptı. Görünüşe göre yeni bir element keşfetmişti. Başta kimse inanmak istemedi, ancak kimyager Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] bu keşfi doğruladı."
 verrier.155.f: "Helyum elementinin varlığı, Güneş’in kromosfer spektrumunda 587,49 nanometre dalga boyunda parlak sarı bir spektral çizgiden elde edilmiştir. Fransız astronom Jules Janssen, 18 Ağustos 1868’deki tam güneş tutulması sırasında Hindistan’da bu gözlemi yaptı. Keşfini açıkladığında, kimse başlangıçta inanmadı; çünkü daha önce uzayda yeni bir element bulunmamıştı. Aynı yılın 20 Ekim’inde İngiliz Norman Lockyer, sarı çizginin gerçekten güneş spektrumunda bulunduğunu doğruladı ve bunun önceden bilinmeyen bir elementten kaynaklandığını belirtti. Bu spektral çizgi, Fraunhofer’in D2 (589,00 nm) ve D1 (589,60 nm) sodyum çizgilerine çok yakın olduğundan (merkezden 1,8 nm) bu çizgiye D3 adını verdi. Kendisi ve İngiliz meslektaşı Edward Frankland, yeni elementin adını helyum (Yunanca helios, güneş) olarak önerdiler."
 verrier.155.g: "Helyum? Güneş elementine çok uygun bir isim!"
