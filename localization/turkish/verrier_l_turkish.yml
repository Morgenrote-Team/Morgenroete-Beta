 verrier.22.t: "Unusual Object Photographed"
 verrier.22.d: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] discovered a strange object during [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] last photograph of the night sky. It appears to be neither a planet, nor an asteroid or comet, but also not the sought-after Planet X."
 verrier.22.f: "Some assistants had already tried to convince the astronomer that it could be an extraterrestrial means of transportation, as featured in some popular pulp novels, but Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] dismissed such outlandish ideas. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe|U] considered the appearance of a space angel to be more plausible."
 verrier.22.g: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] is to receive additional assistants and resources to investigate the unknown object."
 verrier.22.h: "The observatory should intensify its efforts to find new objects!"
 verrier.22.i: "Probably just a deception without any value."
 verrier.22g.tt: "The observatory will devote all its resources to thoroughly examining the unknown object. No new astronomical objects will be discovered for a year."
 verrier.22h.tt: "The observatory will ignore the unknown object and continue with its normal work."
 verrier.23.t: "The Centaur"
 verrier.23.d: "After a thorough examination of the unknown object, our chief astronomer is certain: the photographed celestial body represents a completely new class of asteroid! This new class will be called 'Centaurs'. Now all that's missing is a suitable name."
 verrier.23.f: "A centaur, named after the centaurs of Greek mythology, is a member of a class of asteroids whose orbits lie between Jupiter and Neptune. Centaur orbits exhibit a wide range of eccentricity. Although the first confirmed centaur, Chiron, was only discovered in 1977, photographs of it date back to 1895. The centaur Hidalgo was discovered in 1920, but was not yet assigned to its own class."
