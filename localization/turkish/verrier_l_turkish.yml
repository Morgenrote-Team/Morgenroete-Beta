 je_verrier_astro_physics_success: "En az #G 1000#! @verrier_astronomicalobject! astronomik nesneyi bulmamız gerekiyor."
 je_verrier_astro_physics_goal: ""
 verrier_hide_astronomical_decisions: "Astronomik Kararları Gizle"
 verrier_hide_astronomical_decisions_desc: "Daha iyi bir genel görünüm için tüm astronomik kararları gizle."
 verrier_show_astronomical_decisions: "Astronomik Kararları Göster"
 verrier_show_astronomical_decisions_desc: "Tüm astronomik kararları göster."
 verrier_found_observatory_decision: "Gözlemevi Kur"
 verrier_found_observatory_decision_desc: "19. yüzyılda astronomi büyük ilerlemeler kaydetti, en azından ulus devletlerin sponsorluğu sayesinde. Gök cisimlerinin araştırılması, yeni yıldızlar, gezegenler veya asteroitlerin isimlendirilmesi ülkeler ve hükümdarlar için prestij sağladığı için başlatıldı. Teleskopların modernizasyonu veya fotoğrafçılığın tanıtımı gibi sürekli yeni yöntemlerle, verim büyük ölçüde arttı. Bir gözlemevi inşa etmek, her yıl yeni gök cisimlerinin pasif olarak keşfedilmesini sağlayacaktır; tam sayı, gözlemevi tamamlandığında bizzat gözlem ile kontrol edilebilir. Yeni teknolojiler ve bir [concept_verrier_astronomer] istatistikleri artırır."
 verrier_charter_moon_decision: "Ay Haritası Çıkarmak"
 verrier_charter_moon_decision_desc: "Ay atlasları ve Dünya’nın uydusunu haritalama girişimi yüzyıllardır var. Teleskopun icadı, 'selenografi' olarak bilinen bu bilimi devrim niteliğinde geliştirdi, ancak fotoğrafçılığın icadıyla Ay’ı hassas şekilde haritalamak için tamamen yeni bir yol kazandık."
 verrier_visit_observatory_decision: "Gözlemevi Ziyareti"
 verrier_visit_observatory_decision_desc: "Ülkemizin ana gözlemevini ziyaret ederek astronomi hakkında tüm önemli ulusal ve uluslararası bilgileri görün."
 verrier_asteroid_congress_decision: "Asteroitler Üzerine Astronomik Kongre"
 verrier_asteroid_congress_decision_desc: "1801’de Ceres’in keşfinden bu yana astronomlar daha fazla gök cismi buldu, bu yüzden Güneş Sistemi’ndeki gezegen sayısı artmaya devam etti. Neptün’ün keşfi, özellikle Mars ve Jüpiter arasındaki birçok küçük nesne için yeni bir kategorinin mantıklı olup olamayacağını gündeme getirdi. Özellikle yeni astronomik sembollerin icadı ve bu nesnelerin nispeten küçük boyutları, astronomların bunları daha çok 'küçük yıldızlar' veya 'küçük gezegenler' olarak değerlendirmelerine yol açtı. Elbette bu sınıflandırma, daha önce gezegen olarak kabul edilen bazı nesnelerin statüsünü kaybetmesine ve sadece taş yığını hâline gelmesine yol açacaktı."
 verrier_asteroid_congress_decision_tt: "Ne kadar çok gök cismi bulunursa, gezegenlerin önceki tanımının reforme edilmesi o kadar acil hale gelir. #BLUE 1,500#! nesneden fazla olduğunda, durum muhtemelen o kadar kafa karıştırıcı hâle gelir ki bir konferans kaçınılmaz olur."
 verrier_carte_congress_decision: "Carte du Ciel"
 verrier_carte_congress_decision_desc: "1887’de Paris Gözlemevi müdürü Amédée Mouchez tarafından başlatılan geniş ve benzersiz bir uluslararası yıldız haritalama projesi, yeni kuru plaka fotoğrafçılık sürecinin yıldız haritalarını oluşturma sürecini devrim niteliğinde değiştirebileceğini fark etmesiyle mümkün oldu. Nisan 1887’de Paris’te yapılan 50’den fazla astronomun katıldığı Astrographic Kongresi sonucunda, dünyanın dört bir yanından 20 gözlemevi projeye katılmayı kabul etti. Biz de uluslararası topluluğun astronomi bilgisini paylaşmak için böyle bir kongre düzenleyebiliriz."
 verrier_great_debate_decision: "Büyük Tartışma"
 verrier_great_debate_decision_desc: "Shapley-Curtis Tartışması, diğer adıyla Büyük Tartışma, 20. yüzyılın başındaki tartışmaları bir araya getirerek galaksilerin doğası ve evrenin boyutu hakkında yeni bir anlayışa yol açtı. Tartışma, Samanyolu’nun boyutu ve o dönemde spiral nebula olarak bilinen galaksilerin Samanyolu’nda küçük nesneler mi yoksa Samanyolu’ndan çok daha uzakta ve ayrı mı oldukları etrafında dönüyordu. O gün, iki bilim insanı evrenin boyut ölçeği hakkında bağımsız teknik makaleler sundu ve akşam saatlerinde halka açık bir tartışma gerçekleşti. Biz de evrenin nihai gizemlerini tartışmak için böyle bir kongre düzenleyebiliriz."
 notification_verrier_astronomical_observation_notification_name: "Yıllık Astronomik Rapor"
 notification_verrier_astronomical_observation_notification_desc: "Bizim [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] bu yıl [GetPlayer.MakeScope.Var('verrier_astronomical_objects_notification_var').GetValue|0+=] yeni [Concept('concept_verrier_astronomical_object','$concept_verrier_celestial_bodies$')] buldu ve kaydetti."
 verrier.10.t: "Neptün keşfedildi"
 verrier.10.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], ulusumuzun şanına Neptün’ü keşfetti!"
 verrier.10.f: "Neptün, Le Verrier’in tahmin ettiği konumdan 1 dereceden daha az bir sapmayla, gece yarısından kısa bir süre sonra keşfedildi, dikkate değer bir uyum. Pozisyonu ve hareketi iki gece daha gözlemlendikten sonra [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], Le Verrier’e şaşkınlıkla yanıt verdi: 'Hesapladığınız gezegen gerçekten var!'"
 verrier.10.g: "Diğer ülkeler kıskançlıktan çatlayacak!"
 verrier.5.t: "Gözlemevi Açılışı"
 verrier.5.d: "Bugün yapılan resmi bir törenle, ülkemizin astronomi araştırmalarının merkezi olan gözlemevi açıldı."
 verrier.5.f: ""
 verrier.5.g: "Yeni Gözlemevi’yi ziyaret et."
 verrier.6.t: "Gözlemevi Kapatılması"
 verrier.6.d: "Ülke astronomları bir gözlemevini kapatma kararı aldı."
 verrier.6.f: "Son siyasi gelişmeler, ülkemizin birkaç gözlemevi sahibi olmasına yol açtı. Rekabeti ortadan kaldırmak ve başkentteki ana gözlemevi için hükümet finansmanını güvence altına almak amacıyla, araştırmacılar şubedeki faaliyetlerini durdurup kurumu kapatma kararı aldı. Tüm araştırma sonuçları, mevcut bilimsel kadro ile birlikte başkente aktarıldı."
 verrier.6.g: "Üzgün ama gerekli."
 verrier.6.h: "Eee... Henüz başkentte bir gözlemevimiz yok. Oraya taşı!"
 verrier.11.d: "[SCOPE.sCountry('verrier_neptune_discoverer_country').GetName] ülkesinden bilim insanları bugün, bir meslektaşlarının daha önce bilinmeyen Neptün gezegenini keşfettiğini bildirdi."
 verrier.11.g: "Tebrikler ..."
 verrier.20.t: "Plüton keşfedildi"
 verrier.20.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], ulusumuzun şanına Plüton’u keşfetti!"
 verrier.20.f: "Plüton keşfedildiğinde, zayıf parlaklığı ve görünür diskinin olmaması, onun Gezegen X olduğu fikrini şüpheye düşürdü. Aslında, gök cismi bazı bilim insanları için hayal kırıklığı oldu. 20. yüzyıl boyunca Plüton’un kütle tahminleri aşağı yönlü revize edildi. Astronomlar ilk olarak kütlesini, Neptün ve Uranüs üzerindeki tahmini etkisine göre hesapladı. 1931’de Plüton’un kütlesi Dünya kadar, 1948’deki hesaplamalar ise Mars kadar olarak belirlendi. Yine de keşif dünya çapında manşet oldu."
 verrier.20.g: "Küçük olabilir, ama hâlâ bir gezegen."
 verrier.21.d: "[SCOPE.sCountry('verrier_pluto_discoverer_country').GetName] ülkesinden bilim insanları bugün, bir meslektaşlarının daha önce bilinmeyen Plüton gezegenini keşfettiğini bildirdi."
 verrier.21.g: "Bu gerçekten bir gezegen mi?"
 verrier.30.t: "Asteroitler Üzerine Astronomik Kongre"
 verrier.30.d: "Şimdiye kadar gezegen olarak sayılan bazı gök cisimlerinin kaderi, uluslararası bir konferansta belirlenecek."
 verrier.30.f: "19. yüzyılın başlarından bu yana keşfedilen küçük astronomik nesnelerin, gezegen olarak anlaşılan şeyle büyük ölçüde örtüşmediği fikri hızla yayıldı – özellikle uzun zamandır bilinen gezegenlerle daha çok benzeyen Neptün’ün keşfinden sonra. Bir süre tereddüt edildikten sonra, yarım yüzyıldır gezegen olarak adlandırılan Pallas, Vesta ve Juno da yeni asteroit kategorisine dahil edildi. Ancak, 1801’de Giuseppe Piazzi tarafından keşfedilen küçük gezegen Ceres’in durumu için hâlâ bir uzlaşma bulunamadı. Gelenekçilerin bir grubu, onun gezegen olarak kalmasını istiyor. Diğer tüm gezegenlerden önemli ölçüde küçük olmasına rağmen, bir asteroit için çok büyük. Bu nedenle, Kongre’nin bazı üyeleri oylama yapılmasını talep ediyor."
 verrier.30.f_astraea: "19. yüzyılın başlarından bu yana keşfedilen daha küçük astronomik nesnelerin, gezegen olarak anlaşılan şeyle büyük ölçüde örtüşmediği fikri hızla yayıldı – özellikle uzun süredir bilinen gezegenlere çok daha çok benzeyen Neptün’ün keşfinden sonra. Bir süre tereddüt edildikten sonra, yarım yüzyıldır gezegen olarak adlandırılan Pallas, Vesta, Juno ve Astraea da yeni asteroit kategorisine dahil edildi. Ancak, 1801’de Giuseppe Piazzi tarafından keşfedilen küçük gezegen Ceres için hâlâ bir uzlaşma bulunamadı. Gelenekçilerin bir grubu, onun gezegen olarak kalmasını istiyor. Diğer taraftakiler ise, eğer Ceres gezegen olarak kalırsa, birçok daha büyük nesnenin de gezegen sayılabileceğini ve astronomiyi zorlaştıracağını savunuyor."
 verrier.30.g: "Bu gezegeni beğendim. Ceres’in kaderini oylama ile belirleyelim."
 verrier.30.h: "Başka bir toplantıya gerek yok."
 verrier.31.t: "Ceres’in Durumu"
 verrier.31.d: "Ülkemiz, [SCOPE.sCountry('verrier_congress_host_country').GetName] tarafından düzenlenen bir astronomi kongresine davet edilmiştir. En önemli soru, (önceden?) gezegen olan Ceres’in kaderiyle ilgilidir."
 verrier.31.f: "19. yüzyılın başlarından bu yana keşfedilen küçük astronomik nesnelerin, gezegen olarak anlaşılan şeyle büyük ölçüde örtüşmediği fikri hızla yayıldı – özellikle uzun süredir bilinen gezegenlere çok daha çok benzeyen Neptün’ün keşfinden sonra. Bir süre tereddüt edildikten sonra, yarım yüzyıldır gezegen olarak adlandırılan Pallas, Vesta ve Juno da yeni asteroit kategorisine dahil edildi. Ancak, 1801’de Giuseppe Piazzi tarafından keşfedilen küçük gezegen Ceres için hâlâ bir uzlaşma bulunamadı. Gelenekçilerin bir grubu, onun gezegen olarak kalmasını istiyor. Diğer taraf, eğer Ceres gezegen olarak kalırsa, birçok daha büyük nesnenin de gezegen olarak sayılabileceğini ve astronomiyi zorlaştıracağını savunuyor."
 verrier.31.f_astraea: "19. yüzyılın başlarından bu yana keşfedilen küçük astronomik nesnelerin, gezegen olarak anlaşılan şeyle büyük ölçüde örtüşmediği fikri hızla yayıldı – özellikle uzun süredir bilinen gezegenlere çok daha çok benzeyen Neptün’ün keşfinden sonra. Bir süre tereddüt edildikten sonra, yarım yüzyıldır gezegen olarak adlandırılan Pallas, Vesta, Juno ve Astraea da yeni asteroit kategorisine dahil edildi. Ancak, 1801’de Giuseppe Piazzi tarafından keşfedilen küçük gezegen Ceres için hâlâ bir uzlaşma bulunamadı. Gelenekçilerin bir grubu, onun gezegen olarak kalmasını istiyor. Diğer taraf, eğer Ceres gezegen olarak kalırsa, birçok daha büyük nesnenin de gezegen olarak sayılabileceğini ve astronomiyi zorlaştıracağını savunuyor."
 verrier.31.g: "Ceres bir gezegendir."
 verrier.31.h: "Ceres bir gezegen değildir."
 verrier.32.t_demoted: "Ceres’in statüsü düşürüldü"
 verrier.32.t_saved: "Ceres kurtarıldı"
 verrier.32.d_demoted: "Astronomi Kongresi, Ceres’in gezegen statüsünü kaldırdı."
 verrier.32.d_saved: "Astronomi Kongresi, Ceres’in gezegen statüsünü onayladı."
 verrier.32.f_demoted: "Sonuç sürpriz olmadı: diğer küçük gök cisimleri asteroit ise, mantıken Ceres de öyle olmalı. Astronomlar, Ceres’in sözde asteroit kuşağındaki en büyük gök cismi olduğunu kabul ederek, eski gezegene asteroitler arasında onurlu bir şekilde 1 numara verdiler; ama daha fazlası değil. Bazı sesler, gezegen statüsünün kültürel olduğu kadar akademik etkileri de olduğunu öne sürse de, bu argümanlar bilimden çok irrasyonel bir nostaljiyle ilgilidir.\n\n Nihai sonuç, #G [GetGlobalVariable('verrier_ceres_yes').GetValue]#! Evet oyuna karşı #R [GetGlobalVariable('verrier_ceres_no').GetValue]#! Hayır oyları."
 verrier.32.f_saved: "Sonuç birçok kişi için sürpriz oldu: Astronomların çoğunluğu Ceres’in gezegen olarak kalmasını oyladı! Gelenekçiler, şekil ve kütlenin Ceres’i asteroit kuşağındaki diğer nesnelerden ayırdığını savundu. Gezegen açıkça öne çıkıyor. Bilim insanları ayrıca not düştü: Ceres, on yıllardır yalnızca bilimsel değil, aynı zamanda sosyal ve kültürel olarak da kabul gören Güneş Sistemi’nin bir parçası olmuştur. Pek çok kişinin sevdiği gezegeni asteroit olarak düşürmek ve böylece kimliğini elinden almak neredeyse kibir olur.\n\n Nihai sonuç, #G [GetGlobalVariable('verrier_ceres_yes').GetValue]#! Evet oyuna karşı #R [GetGlobalVariable('verrier_ceres_no').GetValue]#! Hayır oyları."
 verrier.32.g: "Ceres sadece bir gezegen cücesi oldu."
 verrier.32.h: "Ceres kurtarıldı!"
 verrier.33.t: "Dört gezegen düşürüldü"
 verrier.33.t_astraea: "Beş gezegen düşürüldü"
 verrier.33.d: "Astronomi Kongresi, daha önce gezegen olarak kabul edilen dört gök cisminin artık asteroit olarak ilan edildiğini açıkladı."
 verrier.33.f: "Kongre, gelecekteki astronomiyi geliştirmek için gök cisimlerinin yeni bir kategorisini, asteroitleri, tanıttı. Artık uzaydaki her kaya parçası gezegen değildir. 1801’den itibaren keşfedilen bazı yeni nesnelerin yanı sıra, 'gezegenler' Ceres, Pallas, Vesta ve Juno da asteroit olarak sınıflandırıldı."
 verrier.33.f_astraea: "Kongre, gelecekteki astronomiyi geliştirmek amacıyla gök cisimleri için yeni bir kategori, asteroitler, tanıttı. Artık uzaydaki her kaya gezegen sayılmıyor. Bazı yeni cisimlerin yanı sıra 1801’den itibaren keşfedilen Ceres, Pallas, Vesta, Juno ve Astraea 'gezegenleri' de asteroit olarak sınıflandırıldı."
 verrier.33.g: "Güneş sisteminde 8 gezegen var."
 verrier.34.t: "Üç gezegenin statüsü düşürüldü"
 verrier.34.t_astraea: "Dört gezegenin statüsü düşürüldü"
 verrier.34.d: "Astronomi Kongresi son bildirgesini yazdı: Bir zamanlar gezegen olarak kabul edilen üç gök cismi artık asteroit olarak ilan edildi."
 verrier.34.f: "Kongre, gelecekteki astronomiyi geliştirmek amacıyla gök cisimleri için yeni bir kategori, asteroitler, tanıttı. Artık uzaydaki her kaya gezegen sayılmıyor. Bazı yeni cisimlerin yanı sıra 1801’den itibaren keşfedilen Pallas, Vesta ve Juno 'gezegenleri' de asteroit olarak sınıflandırıldı. Ceres ise gezegen olarak kaldı."
 verrier.34.f_astraea: "Kongre, gelecekteki astronomiyi geliştirmek amacıyla gök cisimleri için yeni bir kategori, asteroitler, tanıttı. Artık uzaydaki her kaya gezegen sayılmıyor. Bazı yeni cisimlerin yanı sıra 1801’den itibaren keşfedilen Pallas, Vesta, Juno ve Astraea 'gezegenleri' de asteroit olarak sınıflandırıldı. Ceres ise gezegen olarak kaldı."
 verrier.34.g: "Güneş sisteminde 9 gezegen var."
 verrier.35.t: "Tartışmalı gezegen statüsü"
 verrier.35.d: "Son dönemde yapılan bir astronomi kongresi açıklaması, ulusal prestijimiz açısından sonuçlar doğurdu."
 verrier.35.f: "Pek çok itiraz sonuç vermedi. Keşfettiğimiz gezegenlerden birinin veya birkaçının gezegen statüsünün elinden alınması, dünyadaki konumumuzu olumsuz etkiliyor. Günümüzde herkes bir asteroit bulabilir; bu, uluslararası tanınırlık getirmez. Bir zamanlar bilim insanlarımızdan birinin böyle bir gök cismi keşfettiğiyle övünürdük, ancak son kararla birlikte bu tür gururlar artık önemini yitirdi."
 verrier.35.g: "Bu oylama açıkça manipüle edildi!"
 verrier.40.t: "Kuyruklu yıldız görüldü!"
 verrier.40.d: "Rasathanemizdeki bilim insanları yeni bir kuyruklu yıldız keşfetti."
 verrier.40.f: "Gökyüzünde bir kuyruklu yıldız görüldü, bazıları bunun kötü zamanların habercisi olduğuna inanıyor. Bazıları ise bunun aslında gökyüzünde süzülen peri ruhları olduğuna inanıyor. Bir diğer grup ise bu kuyruklu yıldızın büyük bir buz kütlesi olduğunu ve uzun kuyruğunun güneşin enerjisiyle oluştuğunu düşünüyor. Bu üç eşit derecede 'geçerli' teori arasındaki tartışmalar, ülkemizde bilgi arayışını daha da canlı hale getiriyor."
 verrier.40.g: "Tanrıya şükür ki böyle aydınlanmış zamanlarda yaşıyoruz."
 verrier.41.t: "Yeni bir asteroit"
 verrier.41.d: "Astronomlar yeni bir gök cismini, bir asteroidi, keşfetti ve yıldız haritalarımıza ekledi."
 verrier.41.f: "19. yüzyıl boyunca gök cisimlerinin, özellikle de asteroitlerin haritalandırılması büyük bir hız kazandı. Bilim insanları 1850 civarında sadece bir düzine asteroit keşfetmişken, yüzyılın sonunda bu sayı yaklaşık 300’e ulaştı. Bu keşifler, daha önceki kategorilerin yeniden düşünülmesini ve yeni sınıflandırmaların yapılmasını zorunlu kıldı."
 verrier.41.g: "Daha kaç tane olacak acaba?"
 verrier.42.t: "Göktaşı Yağmuru"
 verrier.42.d: "Mevsimsel bir göktaşı yağmuru, bu yıl gökbilimcilerimizin çok sayıda gök cismini gözlemlemesine olanak tanıyor."
 verrier.42.f: "Göktaşı yağmuru, gökyüzünde birçok göktaşının tek bir noktadan yayılıyormuş gibi göründüğü gök olayıdır. Bu göktaşları, meteoroid adı verilen kozmik enkaz akıntılarının Dünya atmosferine son derece yüksek hızlarda paralel yörüngelerle girmesiyle oluşur. Çoğu göktaşı bir kum tanesinden küçüktür, bu yüzden neredeyse hepsi parçalanır ve Dünya yüzeyine ulaşmaz. Çok yoğun ya da olağan dışı göktaşı yağmurları 'göktaşı patlaması' veya 'göktaşı fırtınası' olarak bilinir ve saatte en az 1.000 göktaşı üretir. En ünlülerinden biri Leonid yağmurlarıdır."
 verrier.42.g: "Umarım gökyüzü açıktır ve görüş iyi olur!"
 verrier.43.t: "Bulutsu"
 verrier.43.d: "Rasathanemiz, içinde çok sayıda bilinmeyen yıldız barındıran daha önce keşfedilmemiş güzel bir bulutsu buldu."
 verrier.43.f: "Yıldız kümesinden farklı olarak ilk gerçek bulutsudan, Müslüman Fars astronomu Abd al-Rahman al-Sufi bahsetmiştir. Andromeda Galaksisi’nin bulunduğu yerde 'küçük bir bulut' gördüğünü not etmiştir. 1751-1753 yılları arasında Nicolas-Louis de Lacaille, Ümit Burnu’ndan 42 bulutsu katalogladı ve bunların çoğu daha önce bilinmiyordu. Daha sonra William Herschel ve kız kardeşi Caroline Herschel’in çabalarıyla yaklaşık 2.000 bulutsu kaydedildi. 1864’ten itibaren William Huggins yaklaşık 70 bulutsunun tayfını inceledi. 1923 civarında, Büyük Tartışma’nın ardından, birçok 'bulutsunun' aslında Samanyolu’ndan çok uzaktaki galaksiler olduğu anlaşıldı."
 verrier.43.g: "Harika!"
 verrier.44.t: "Bir yıldıza isim vermek"
 verrier.44.d: "[SCOPE.sCharacter('verrier_star_discoverer').GetFullName], tesadüfen yeni bir yıldız keşfetti. Şu anda kimin veya neyin adının verileceği hâlâ tartışılıyor."
 verrier.44.f: "Astronomlar başlangıçta gök cisimlerine mitolojik figürlerden isim verme kuralına uysalar da, zamanla hükümdarların isimlerini ya da vatanla ilgili çağrışımlar uyandıran isimleri kullanma modası çıktı. Örneğin Uranüs gezegeni ilk olarak dönemin Britanya kralının adıyla 'George' olarak adlandırılmak istendi. Piazzi, Ceres’i keşfettiğinde ise hükümdarı ve hamisi onurlandırmak için 'Ferdinandea' sıfatını ekledi."
 verrier.44.g: "Yıldız ülkemizin adını almalı."
 verrier.44.h: "Yıldız, hükümdarımızın adıyla anılacaktır."
 verrier.44.i: "Yıldız, onu keşfedenin adıyla anılacaktır."
 verrier.45.t: "Yeni bir [concept_verrier_astronomer] sahneye çıkıyor"
 verrier.45.d: "Geçmişte, [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] astronomiye büyük bir ilgi göstermiş ve boş zamanlarında yıldızları gözlemlemiştir."
 verrier.45.f: "Günümüze kadar, birçok amatör astronom olağanüstü hizmetler vermiş ve astronomiyi bir bilim olarak ileriye taşımıştır. Sayısız cisim, bilimsel amatörlerin de kayıtlarla öğrenilmiş uzmanlara yardımcı olmasını sağlamıştır. Bu şaşırtıcı değildir; çünkü bazı ünlü astronomlar genellikle tutkulu yıldız gözlemcileri olarak başlamışlardır."
 verrier.45.g: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], profesyonel bir [concept_verrier_astronomer] olmalıdır."
 verrier.45.h: "Çalışmalar ilginç, ne fazla ne eksik."
 verrier.46.t: "Yıldız haritaları hatalı"
 verrier.46.d: "Maalesef, eski yıldız haritalarını inceledikten sonra bazı işaretlenen yıldızların hiç var olmadığını fark ettik."
 verrier.46.f: "Astronomik kayıtlardaki hatalar nadir değildir. Bu sadece erken modern dönem için değil, 19. yüzyıl için de geçerlidir, yöntemler geliştirilmiş ve rafine edilmiş olsa bile. Örneğin, 1861’de Hermann Goldschmidt Satürn’ün başka bir uydusunu bulduğunu iddia etmiş ve 'Chiron' adını vermiştir, ancak varlığı hiçbir zaman doğrulanamamıştır."
 verrier.46.g: "Yani teleskoptaki tozdu diyorsunuz?"
 verrier.47.t: "Satürn’ün yeni uyduları keşfedildi"
 verrier.47.d: "Ana gözlemevlerimizden birinde teleskop yükseltildikten sonra astronomlarımız Satürn’ün iki yeni uydusunu keşfetmeyi başardı."
 verrier.47.f: "Satürn’ün uyduları sayıca fazla ve çeşitlidir; birkaç on metre çapında küçük uydulardan, Merkür gezegeninden daha büyük dev Titan’a kadar uzanır. Satürn’ün halkalarına gömülmemiş ve yörüngesi doğrulanmış 83 uydusu vardır. Halkalarda milyonlarca gömülü küçük uydu ve sayısız küçük halka parçacığı bulunur. Yedi Satürn uydusu, ellipsoidal bir şekle çökecek kadar büyüktür; yalnızca Titan ve muhtemelen Rhea şu anda hidrostatik denge halindedir. Satürn’ün uyduları arasında özellikle Titan, Güneş Sistemi’nde Jüpiter’in Ganymede’sinden sonra ikinci en büyük uydu olarak dikkat çeker."
 verrier.47.g: "Mükemmel."
 verrier.48.t: "İnanılmaz Nova!"
 verrier.48.d: "[concept_verrier_astronomer] Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], çevresindeki yıldızlardan çok daha parlak yeni bir Nova keşfetti. Bu tür gözlemler son derece nadirdir ve genellikle en iyi astronomlarla sınırlıdır."
 verrier.48.f: "Nova’nın ortaya çıkışını ilk fark eden biz olduk. Ancak kısa süre sonra diğer birçok gözlemevi de teleskoplarını ona yönlendirdi. Nova çevresindeki yıldızlardan çok daha parlaktı ve neredeyse iki hafta boyunca görülebiliyordu. Zamanla sönse de, oldukça uzun bir süre net bir şekilde gözlemlenebildi. Henüz neden olduğunu bilmiyoruz, ancak gözlem bu fenomeni daha iyi anlamamıza yardımcı olacaktır!"
 verrier.48.g: "İnanılmaz"
 verrier.50.t: "Ay Haritası"
 verrier.50.d: "Yıllarca süren yoğun gözlem, haritalama ve son teknoloji fotoğrafçılıkla astronomlarımız ayın doğru bir haritasını oluşturmayı başardı."
 verrier.50.f: "Ay haritalaması 1779’da Johann Schröter’in ay topografyasını titizlikle gözlemleyip ölçmesiyle sistematik hale geldi. 1834’te Johann Heinrich von Mädler, 4 sayfalık boyutta Ay’ın ilk büyük haritasını yayınladı ve ardından Evrensel Selenografi’yi yayımladı. Tüm ay ölçümleri Mart 1840’a kadar doğrudan gözleme dayanıyordu; o tarihte J.W. Draper, 5 inçlik bir reflektör kullanarak Ay’ın daguerreotipini üretti ve böylece fotoğrafçılığı astronomiye kazandırdı. Başlangıçta görüntüler çok düşük kalitedeydi, ancak teleskopta olduğu gibi 200 yıl önce kalite hızla gelişti. 1890’a gelindiğinde ay fotoğrafçılığı astronominin tanınmış bir alt disiplini haline gelmişti."
 verrier.50.g: "Harika."
 verrier.51.t: "Ay kanalı"
 verrier.51.d: "Ay’ı fotoğrafik olarak haritalama projesi ilerleme kaydetti."
 verrier.51.f: "Rille, genellikle Ay yüzeyinde uzun ve dar çukurları tanımlamak için kullanılır; bunlar kanal benzeri yapılardır. Latince terim rima, çoğulu rimae’dir. Bir rille tipik olarak birkaç kilometre genişliğinde ve yüzlerce kilometre uzunluğunda olabilir. Ancak bu terim, Güneş Sistemi’ndeki Mars, Venüs ve çeşitli uydularda benzer yapıları tanımlamak için de gevşek bir şekilde kullanılmıştır. Hepsi yapısal olarak birbirine benzer."
 verrier.51.g: "Büyüleyici."
 verrier.52.t: "Ay krateri"
 verrier.52.f: "Çok eski yüzeylerin krater kayıtları - Ay gibi - yaklaşık 3,9 milyar yıl önce iç Güneş Sistemi’nde yoğun bir erken bombardıman dönemini gösterir. Ay’da erozyon süreçleri minimal olduğundan, kraterler kalıcıdır. 1893’te Grove Karl Gilbert, Ay kraterlerinin büyük asteroid çarpmalarıyla oluştuğunu ilk kez öne sürdü."
 verrier.53.t: "Ay denizleri"
 verrier.53.f: "Ay denizleri, Dünya Ay’ında geniş, koyu bazaltik düzlüklerdir. Uzak tarafta eski asteroid çarpmalarıyla oluşmuş ve bu çarpmalar, karşı tarafta (yakın yüz) volkanik faaliyetleri tetiklemiştir. Erken dönem astronomları, bunları gerçek denizlerle karıştırarak maria (Latince 'denizler') adını vermişlerdir. Demir açısından zengin bileşimleri nedeniyle 'yüksek araziler'den daha az yansıtıcıdırlar ve çıplak gözle koyu görünürler. Maria, Ay yüzeyinin yaklaşık %16’sını kaplar ve çoğu Dünya’dan görünen taraftadır. Uzak tarafta birkaç maria çok daha küçüktür ve çoğunlukla büyük kraterlerde bulunur. Geleneksel Ay adlandırması, bir oceanus (okyanus) ile birlikte lacus ('göl'), palus ('bataklık') ve sinus ('koy') adlarını taşıyan özellikleri de içerir. Son üçü marialardan daha küçüktür, ancak aynı doğa ve özelliklere sahiptir."
 verrier.54.t: "Ay yüksek arazileri"
 verrier.54.f: "Ay’ın daha açık renkli bölgelerine terrae, daha yaygın olarak yüksek araziler denir; çünkü çoğu maria’dan daha yüksektir. 4,4 milyar yıl önce oluşmuş oldukları tarihlendirilmiştir ve Ay magma okyanusunun plajiyoklas birikintilerini temsil ediyor olabilirler. Maria’ların yakın tarafta yoğunlaşması, uzak tarafın yüksek arazilerinin daha kalın kabuğunu yansıtıyor olabilir; bu, Ay’ın oluşumundan birkaç on milyon yıl sonra Dünya’nın ikinci bir ayının yavaş çarpışmasıyla oluşmuş olabilir."
 verrier.61.t: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.61.d: "[SCOPE.sCharacter('verrier_1843_discoverer').GetFullName], bir @verrier_comet keşfetti! Büyük Kuyruklu Yıldız!"
 verrier.61.f: "1843 Büyük Kuyruklu Yıldızı, uzun periyotlu bir kuyruklu yıldızdı ve Mart 1843’te çok parlak hale geldi (Büyük Mart Kuyruklu Yıldızı olarak da bilinir). 5 Şubat 1843’te keşfedildi ve hızla parlayarak büyük bir kuyruklu yıldız oldu. Kreutz Güneş’e Yakın Kuyrukluları ailesine üyeydi; bu aile, bir ana kuyruklu yıldızın yaklaşık 1106’da parçalanmasıyla oluşmuştu. Bu kuyruklu yıldızlar Güneş yüzeyine çok yakın geçer (birkaç güneş yarıçapı içinde) ve çoğu zaman çok parlak olur. Dünya’ya en yakın geçişi 6 Mart 1843’te oldu ve en parlak hali ertesi gün görüldü; ne yazık ki kuzey yarımkürede gözlem yapanlar için zirve görünürlüğü Güney Yarımküre’den daha iyiydi. Son gözlem 19 Nisan 1843’te yapıldı ve o tarihte bu kuyruklu yıldız, Güneş’e bilinen hiçbir cisimden daha yakın geçmişti."
 verrier.61.g: "Şan olsun [ROOT.GetCountry.GetNameNoFlag]!"
 verrier.62.t_name: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.62.t_year: "1843 Büyük Kuyruklu Yıldızı"
 verrier.62.d: "Muhteşem bir Büyük Kuyruklu Yıldız günlerdir gökyüzünü dolduruyor."
 verrier.62.g: "Gökyüzünü izlemeye devam edin!"
 verrier.64.t: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.64.d: "[SCOPE.sCharacter('verrier_1858_discoverer').GetFullName], bir @verrier_comet keşfetti! Büyük Kuyruklu Yıldız!"
 verrier.64.f: "1811 Büyük Kuyruklu Yıldızı’ndan sonra, 1858 Büyük Kuyruklu Yıldızı 19. yüzyılda görülen en parlak kuyruklu yıldızdı. Aynı zamanda fotoğraflanan ilk kuyruklu yıldızdır. 10 Ekim 1858’te Dünya’ya en yakın geçti ve Ekim ayının çoğunda uzun, kama biçimli toz kuyruğu ve belirgin gaz kuyruğuyla parlak bir cisimdi. Güney Yarımküre gözlemcileri için Kasım’a kadar çıplak gözle görülebilirdi. Gözlenen en güzel kuyruklu yıldızlardan biri olarak kabul edilir ve yüzyılın en parlaklarından biridir; sanatçılar ve halk üzerinde güçlü bir etki bırakmıştır. Kuyruklularla ilgili önceki histeri döneminden sonra, özellikle Paris’te (John Russell Hind’ın hatalı hesaplamaları sonucu 1857 Haziran’ında Dünya’ya çarpacağı öngörülmüştü) Avrupa’da karanlık gökyüzünde mükemmel görünürlüğü ve Eylül-Ekim’de iyi hava koşulları sayesinde yüzyılın en çok gözlemlenen kuyruklu yıldızı olmuştur. İngiliz astronom William Henry Smyth, bunu 'gördüğüm en güzel nesnelerden biri' olarak hatırlamıştır. William Turner’ın en az bir tablosunda ve birkaç eskizinde yer almıştır."
 verrier.65.t_name: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.65.t_year: "1858 Büyük Kuyruklu Yıldızı"
 verrier.67.t: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.67.d: "[SCOPE.sCharacter('verrier_1861_discoverer').GetFullName], bir @verrier_comet keşfetti! Büyük Kuyruklu Yıldız!"
 verrier.67.f: "13 Mayıs 1861 akşamı, batı gökyüzünde kuyruklu yıldız ararken, Eridanus takımyıldızındaki Lacaille 1316 yıldızının yakınında soluk ve bulutsu bir nesne fark ettim. Deniz teleskobumda nesne oldukça yaygın görünüyordu ve uzaklığını üç bilinen sabit yıldızdan tahmin etmek büyük zorluk gerektiriyordu. Küçük teleskopa bağlı sekstantta nesne neredeyse seçilemiyordu; referans yıldızlar Procyon, Sirius ve Canopus’un parlaklığı, indeks ve ufuk camları arasına renkli cam yerleştirmemi gerekli kıldı. Her kuyruklu yıldız avcısı, çalışmasını yürütmek için bolca nebula kataloguna sahip olmanın ne kadar gerekli olduğunu bilir, ancak bu değerli yardımcıya maalesef sahip değildim. Mevcut sınırlı kataloglarda nesneyi bulamadım. Bu nedenle onu izlemeye karar verdim ve iyi ki de izlemişim; aksi takdirde astronomi dünyasına kendimi tanıtmak için en iyi fırsatlardan birini kaçırmış olurdum."
 verrier.68.t_name: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.68.t_year: "1861 Büyük Kuyruklu Yıldızı"
 verrier.70.t: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.70.d: "[SCOPE.sCharacter('verrier_1874_discoverer').GetFullName], bir @verrier_comet keşfetti! Büyük Kuyruklu Yıldız!"
 verrier.70.f: "1874 Büyük Kuyruklu Yıldızı, periyodik olmayan bir kuyruklu yıldızdı ve 1874 yazında çıplak gözle görülebiliyordu. Şüphesiz çok güzeldi; gerçek bir büyük kuyruklu yıldız. En parlak olduğu zamanda muhtemelen birinci büyüklüğü aşmış ve kuyruklu yıldızın koma kısmında astronomların 16 yıl önceki Büyük Kuyruklu Yıldız ile karşılaştırdığı bir dizi zarf oluşmuştu. Uygun konumda gözlem yapanlar, Temmuz’da Dünya’ya yakın geçerken çıplak gözle kuyruk uzunluğunun 70 dereceye kadar ulaştığını da not ettiler. Kuyruklu yıldızla ilgili halk korkusu, Mark Twain’in kısa öyküsü 'A Curious Pleasure Excursion' ile hicvedilmiştir."
 verrier.71.t_name: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.71.t_year: "1874 Büyük Kuyruklu Yıldızı"
 verrier.73.t: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.73.d: "[SCOPE.sCharacter('verrier_1882_discoverer').GetFullName], bir @verrier_comet keşfetti! Büyük Kuyruklu Yıldız!"
 verrier.73.f: "1882 Büyük Kuyruklu Yıldızı, Eylül 1882’de çok parlak hale gelen bir kuyruklu yıldızdı. Kreutz Güneş’e Yakın Kuyrukluları ailesine üyeydi. Kuyruklu yıldız, perihelionda gündüz gökyüzünde Güneş’in yanında görülecek kadar parlaktı. 1882 Eylül’ünün sabah gökyüzünde ortaya çıktı. Raporlar, Cape of Good Hope ve Gine Körfezi’nden 1 Eylül 1882’de ilk görüldüğünü ve sonraki günlerde güney yarımkürede birçok gözlemcinin yeni kuyruklu yıldızı rapor ettiğini gösteriyor. Cape’in Kraliçe Astronomu David Gill, 18 Eylül’de Güneş’ten birkaç dakika önce kuyruklu yıldızın yükseldiğini gözlemledi ve 'Çekirdek kesinlikle tekti ve çapı kesin olarak 4\"’den biraz azdı; aslında tarif ettiğim gibi, gündüz görülen birinci büyüklükte bir yıldıza çok benziyordu.' dedi. 1882 Büyük Kuyruklu Yıldızı’nın parçaları birkaç yüz yıl içinde, muhtemelen iki ya da üç yüzyıl boyunca geri dönecek."
 verrier.74.t_name: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName] Kuyruklu Yıldızı"
 verrier.74.t_year: "1882 Büyük Kuyruklu Yıldızı"
 verrier.80.t: "Carte du Ciel Kongresi"
 verrier.80.d: "Astronomi Kongresi için hazırlıklar tamamlandı. Artık diğer ülkeleri davet etme zamanı."
 verrier.80.f: "Üç kongrede (1887, 1889 ve 1891) o dönemin en iyi teknikleri temel alınarak birleştirilmiş gözlem ve hesaplama yöntemleri geliştirildi. Carte du Ciel Parlamentosu’na 38 ülkeye kadar astronom katıldı; sonunda deklinasyon bölgeleri, gözlemevlerinin enlemlerine göre 18 gözlemevine bölündü. Ancak planlanan 40 dakikalık pozlama süreleri, iklim durumuna ve mevcut karşılaştırıcılara uyacak şekilde kısmen uyarlanmak zorunda kaldı. 1895 civarından itibaren, birçok enstitü proje deneyimlerini iyileştirme, yöntem hızlandırma ve yeni laboratuvar teknolojisi için katkıda bulunmak istedi. Bu durum, kaynakları yükselen astrofizik gelişimine de yönlendirmek istemeleriyle birleşti."
 verrier.80.g: "Önde gelen astronomi ülkelerini davet et."
 verrier.81.t: "Carte du Ciel Daveti"
 verrier.81.d: "Astronomlarımız, gökyüzünün daha detaylı keşfi ve haritalandırılması amacıyla bir kongreye davet edildi."
 verrier.81.f: "Üç kongrede (1887, 1889 ve 1891) o dönemin en iyi teknikleri temel alınarak birleştirilmiş gözlem ve hesaplama yöntemleri geliştirildi. Carte du Ciel Parlamentosu’na 38 ülkeye kadar astronom katıldı; sonunda deklinasyon bölgeleri, gözlemevlerinin enlemlerine göre 18 gözlemevine bölündü. Ancak planlanan 40 dakikalık pozlama süreleri, iklim durumuna ve mevcut karşılaştırıcılara uyacak şekilde kısmen uyarlanmak zorunda kaldı. 1895 civarından itibaren, birçok enstitü proje deneyimlerini iyileştirme, yöntem hızlandırma ve yeni laboratuvar teknolojisi için katkıda bulunmak istedi. Bu durum, kaynakları yükselen astrofizik gelişimine de yönlendirmek istemeleriyle birleşti."
 verrier.81.g: "Katılacağız."
 verrier.82.t_laughed: "Astronomi Kongresi’nde Alay Edilmek"
 verrier.82.t_respected: "Astronomi Kongresi’nde Saygı Görmek"
 verrier.82.t_lauded: "Astronomi Kongresi’nde Övülmek"
 verrier.82.d_laughed: "Our delegation was laughed at the Astronomical Congress for lack of astronomical knowledge!"
 verrier.82.d_respected: "Delegasyonumuz, Astronomi Kongresi’nde saygıyla karşılandı."
 verrier.82.d_lauded: "Ülkemizin ileri düzey astronomi bilgisi diğer bilim insanlarının dikkatini çekti."
 verrier.82.f_laughed: "'Ne demek, eter teorisi modası geçmiş?'"
 verrier.82.f_respected: "'Umarım büfede Saturn şeklindeki birkaç lokma hâlâ kalmıştır.'"
 verrier.82.f_lauded: "'İyi akşamlar Bay Büyük Macellan Bulutu - sonunda neden böyle adlandırıldığını anladım.'"
 verrier.82.g: "Korkunç ..."
 verrier.82.h: "İyi."
 verrier.82.i: "Harika!"
 verrier.83.t: "Yıldız Haritalarını Paylaşmak"
 verrier.83.d: "Astronomlarımız, yıldız haritalarımızı yurt dışındaki meslektaşlarımızın haritalarıyla takas etmek istiyor."
 verrier.83.f: "Astronomi, uluslararası iş birliğinin erken başladığı araştırma alanlarından biriydi; sadece Birinci Dünya Savaşı bu çabaları geçici olarak durdurdu. Tüm gökyüzünü görmek ve evrenin sırlarını çözmek zorluğu, tüm ülkelerden bilim insanlarını ortak bir hedefe adanmış hale getirdi. Sadece siyaset engel olabiliyordu."
 verrier.83.g: "Haritalarımızı paylaşmak istiyoruz."
 verrier.83.h: "İlgilenmiyoruz."
 verrier.84.t: "Harita takası"
 verrier.84.d: "Astronomlar, bizimle danışmadan bazı yıldız haritalarını yabancı bilim insanlarıyla takas etti."
 verrier.84.f: "Astronomi, uluslararası iş birliğinin erken başladığı araştırma alanlarından biriydi; sadece Birinci Dünya Savaşı bu çabaları geçici olarak durdurdu. Tüm gökyüzünü görmek ve evrenin sırlarını çözmek zorluğu, tüm ülkelerden bilim insanlarını ortak bir hedefe adanmış hale getirdi. Sadece siyaset engel olabiliyordu - ya da olmayabiliyordu."
 verrier.84.g: "Önce bana sormaları gerekirdi!"
 verrier.85.t: "Astronomi Kongresi sona erdi"
 verrier.85.d: "Kongre sona erdi ve gökyüzü hakkında son zamanlarda bazı önemli bilgiler aldık."
 verrier.85.f: "Uluslararası gözlemevleri ağı ile gökyüzü haritası oluşturma projesi, sonraki on yıllarda başa çıkılması kolay olmayan dev bir görev olarak ortaya çıktı. Carte du Ciel tamamlanmamış olarak kaldı. Yine de, uluslararası toplantılar fikir alışverişine olanak sağladı ve astronomi araştırmaları alanında gelecekteki uluslararası iş birliği ve konferansların temelini attı."
 verrier.85.g: "Oldukça eğitici oldu."
 verrier.86.t: "Büyük Tartışma"
 verrier.86.d: "Astronomi Kongresi için hazırlıklar tamamlandı. Artık diğer ülkeleri davet etme zamanı."
 verrier.86.f: "Büyük Tartışma, Shapley-Curtis Tartışması olarak da bilinir, astronomlar Harlow Shapley ve Heber Curtis arasında yapıldı. Tartışma, sözde spiral nebulaların doğası ve evrenin boyutu hakkındaydı. Shapley, bu nebulaların nispeten küçük olduğunu ve Samanyolu’nun dış bölgelerinde yer aldığını (o dönemde tüm evren olarak düşünülüyordu) savunurken, Curtis bunların bağımsız galaksiler olduğunu, dolayısıyla çok büyük ve uzak olduklarını ileri sürdü. Büyük Tartışma hakkındaki bilgiler, Shapley ve Curtis’in Mayıs 1921’de Bulletin of the National Research Council’de yayımlanan iki makalesinden kaynaklandı. Kamu tartışmasının ardından, bilim insanları her iki astronomun sunduğu kanıtları doğrulayabildi."
 verrier.86.g: "Önde gelen astronomi ülkelerini davet et."
 verrier.87.t: "Büyük Tartışma"
 verrier.87.d: "Astronomlarımız, evrenin boyutu ve doğası konusunu netleştirmek için bir kongreye davet edildi."
 verrier.87.f: "Büyük Tartışma, Shapley-Curtis Tartışması olarak da bilinir, astronomlar Harlow Shapley ve Heber Curtis arasında yapıldı. Tartışma, sözde spiral nebulaların doğası ve evrenin boyutu hakkındaydı. Shapley, bu nebulaların nispeten küçük olduğunu ve Samanyolu’nun dış bölgelerinde yer aldığını (o dönemde tüm evren olarak düşünülüyordu) savunurken, Curtis bunların bağımsız galaksiler olduğunu, dolayısıyla çok büyük ve uzak olduklarını ileri sürdü. Büyük Tartışma hakkındaki bilgiler, Shapley ve Curtis’in Mayıs 1921’de Bulletin of the National Research Council’de yayımlanan iki makalesinden kaynaklandı. Kamu tartışmasının ardından, bilim insanları her iki astronomun sunduğu kanıtları doğrulayabildi."
 verrier.87.g: "Sanırım cevabı 42?"
 verrier.88.t: "Bir Evren mi, Yoksa Farklı Galaksiler mi?"
 verrier.88.d: "Astronomi Kongresi’ndeki tartışma, Samanyolu’nun tüm evreni temsil edip etmediği üzerine odaklanıyor."
 verrier.88.f: "Shapley, Samanyolu’nun tüm evren olduğuna inanıyordu. Andromeda gibi 'spiral nebulaların' yalnızca Samanyolu’nun bir parçası olduğunu savunuyordu. Bu iddiasını göreli boyutları göstererek destekleyebiliyordu - eğer Andromeda Samanyolu’nun bir parçası değilse, uzaklığı yaklaşık 100.000.000 ışık yılı olmalıydı ki bu, dönemin astronomları tarafından kabul edilecek bir sayı değildi. Curtis ise, Andromeda ve diğer benzer 'nebulaların' ayrı galaksiler veya 'ada evrenler' olduğunu (18. yüzyıl filozofu Immanuel Kant tarafından icat edilen bir terim) ve dışgalaktik olduğunu ileri sürdü. Andromeda’da Samanyolu’na kıyasla daha fazla nova olduğunu gösterdi. Bu sayede, Andromeda ayrı bir galaksi değil de Dünya galaksisinin içinde bir nebula olsaydı, neden galaksinin bir küçük bölümünde diğer bölgelere göre daha fazla nova olduğunu sorabiliyordu. Bu, Andromeda’yı kendi yaş ve nova oluşum hızına sahip ayrı bir galaksi olarak desteklemeye yol açtı."
 verrier.88.g: "Evren farklı galaksilerden oluşur."
 verrier.88.h: "Sadece bir Samanyolu vardır, gerisi gaz bulutlarıdır."
 verrier.89.t: "Evren’de Güneş"
 verrier.89.d: "Tartışmanın bir diğer odağı, Güneş’in Samanyolu’nun merkezinde mi yoksa dış bölgelerinde mi olduğu."
 verrier.89.f: "'Büyük gözlemevlerinin olağanüstü gelişimi ve yıldızları analiz etme ile uzayı inceleme yöntemlerindeki etkinlikleri sonucunda, bence başka bir ilerleme gerekli bir döneme ulaştık; galaktik sistem anlayışımız, teleskoplarımızın bulduğu nesneleri doğru şekilde ilişkilendirmek için genişletilmelidir; artık Güneş Sistemi merkezi bir konumda olamaz.'\n\n 'Galaksinin şekli ve yapısı hakkında çıkarılan sonuçlarda benzer bir genel görüş birliği vardır:\n 1. Yıldızlar sayısız değildir ve dağılımları eşit değildir.\n 2. Galaksimiz, Samanyolu’nun projeksiyon konturlarıyla bizim için sınırlandırılmış olup, muhtemelen bir milyar güneş içerir.\n 3. Bu galaksi, bir mercek veya ince bir saat gibi şekillidir, kalınlığı muhtemelen çapın altıda birinden azdır.\n 4. Güneşimiz, galaksinin merkezine oldukça yakın bir konumda yer almaktadır."
 verrier.89.g: "Güneş, Samanyolu’nun iç kısmında yer alıyor."
 verrier.89.h: "Güneş, Samanyolu’nun dış bölgelerinde yer alıyor."
 verrier.90.t: "Büyük Tartışma sona erdi"
 verrier.90.d: "Büyük Tartışma sona erdi ve bilim insanlarının çoğunluğu tarafından kabul edilen görüşler ortaya çıktı."
 verrier.91.t: "Annus mirabilis makaleleri"
 verrier.91.d: "Bilim insanı Albert Einstein, birkaç teoriyle klasik fiziği devrim niteliğinde değiştirdi."
 verrier.91.f: "Annus mirabilis makaleleri, Albert Einstein’ın 1905 yılında Annalen der Physik (Fizik Yıllıkları) adlı bilim dergisinde yayımladığı dört makaledir. Bu dört makale modern fiziğin temellerine büyük katkı sağladı. Bilim dünyasının uzay, zaman, kütle ve enerji konusundaki anlayışını kökten değiştirdi. İlk makale fotoelektrik etkiyi açıkladı, ikinci makale Brown hareketini açıkladı. Üçüncü makale Einstein’ın özel görelilik teorisini tanıttı; bu teori, tüm referans çerçeveleri için ışık hızının evrensel sabit olduğunu ve uzay-zaman kavramını ortaya koydu. Dördüncü makale, özel görelilik teorisinin bir sonucu olarak kütle-enerji eşdeğerliğini geliştirdi; ünlü E = mc^2 denklemine yol açtı ve atom enerjisinin keşfi ile kullanılmasını sağladı. Bu dört makale, kuantum mekaniği ve Einstein’ın daha sonraki genel görelilik teorisi ile birlikte modern fiziğin temelini oluşturur."
 verrier.91.g: "Yani artık her şey göreli mi?"
 verrier.92.t: "Einstein [ROOT.GetCountry.GetNameNoFlag]'a taşınıyor"
 verrier.92.d: "Ünlü fizikçi Albert Einstein, üniversitelerimizden biri tarafından profesör olarak atandı - ve kabul etti."
 verrier.92.f: "Albert Einstein, Almanya doğumlu teorik fizikçi olup, tüm zamanların en büyük ve etkili fizikçilerinden biri olarak kabul edilir. Einstein en çok görelilik teorisini geliştirmesiyle bilinir, ancak kuantum mekaniği teorisinin gelişimine de önemli katkılarda bulunmuştur. Görelilik ve kuantum mekaniği, modern fiziğin iki temel direğidir. Çalışmaları aynı zamanda bilim felsefesi üzerinde de etkilidir. Einstein, Alman İmparatorluğu’nda doğdu, ancak 1895 yılında İsviçre’ye taşındı ve ertesi yıl Alman vatandaşlığından feragat etti. 1901’de İsviçre vatandaşlığını aldı ve yaşamı boyunca bunu korudu. 1914’te Einstein, Berlin’de Prusya Bilimler Akademisi ve Humboldt Üniversitesi’ne katılmak için taşındı. 1917’de Kaiser Wilhelm Fizik Enstitüsü’nün direktörü oldu; bu sırada tekrar Prusya vatandaşı oldu. 1933’te Einstein Amerika Birleşik Devletleri’ni ziyaret ederken Adolf Hitler Almanya’da iktidara geldi. Einstein, bir Yahudi olarak yeni Nazi hükümetinin politikalarına karşı çıktı; Amerika’ya yerleşti ve 1940’ta Amerikan vatandaşı oldu."
 verrier.92.g: "Hoş geldiniz!"
 verrier.93.t: "Einstein’ın yerçekimi teorisi"
 verrier.93.d: "Devrim niteliğindeki bir teori ile Albert Einstein, özellikle yerçekimi ve genel olarak evren anlayışımızı bir kez daha değiştirdi."
 verrier.93.f: "Genel görelilik, diğer adıyla genel görelilik teorisi, Albert Einstein tarafından 1915’te yayımlanan ve modern fizikte yerçekimini açıklayan geometrik teoridir. Genel görelilik, özel göreliliği genelleyerek Newton’un evrensel çekim yasasını geliştirmiş ve yerçekimini uzay ve zamanın geometrik bir özelliği olarak birleştirilmiş şekilde açıklamıştır. Özellikle, uzay-zamanın eğriliği, mevcut madde ve radyasyonun enerji ve momentumuyla doğrudan ilişkilidir. Einstein’ın teorisi, kara deliklerin tahmini gibi astrofiziksel sonuçlar içerir - uzay ve zamanın öyle çarpıtıldığı bölgeler ki hiçbir şey, ışık bile, kaçamaz. Kara delikler, büyük yıldızların son durumudur. Mikrokuazarlar ve aktif galaksi çekirdeklerinin, yıldızsal ve süper kütleli kara delikler olduğu düşünülmektedir. Ayrıca ışığın bükülmesiyle aynı uzak astronomik olgunun birden çok görüntüsünün oluştuğu kütleçekimsel merceklenmeyi de öngörür."
 verrier.93.g: "Adam bir dahi."
 verrier.94.t: "Einstein göç ediyor"
 verrier.94.d: "Ülkemizdeki siyasi değişiklikler nedeniyle, ünlü fizikçi Albert Einstein bugün pasaportunu teslim etti ve ülkemizi terk etti!"
 verrier.94.f: "Albert Einstein, yaşamı boyunca özellikle görelilik teorisi geliştirmesi ve genel olarak fizikteki çalışmalarıyla tanındı. Ancak, siyasi görüşleri de 20. yüzyıl ortalarına kadar kamuoyunun ilgisini çekti; dünya çapındaki siyasi, insani ve akademik projelere katılımı sayesinde ün kazandı. Einstein, sivil hakların savunucusuydu ve ününü Amerikan ayrımcılığını kınamak için kullandı. Amerika’ya geldiğinde, Afrikalı Amerikalıların kötü muamelesine itiraz etti. II. Dünya Savaşı öncesinde Almanya’da ağır antisemitizme maruz kalan Einstein, önde gelen birçok sivil hak aktivisti ve örgütle çalıştı. Özellikle yaşamının ilerleyen dönemlerinde sosyalizmi savundu ve 1949’da Monthly Review için yazdığı 'Neden Sosyalizm?' adlı makalede ekonomik görüşlerini ayrıntılı olarak açıkladı. Bolşevikler hakkındaki görüşleri zamanla değişti; 1925’te onları 'iyi düzenlenmiş bir hükümet sistemi' olmadığını eleştirdi ve yönetimlerini 'terör rejimi ve insanlık tarihinin trajedisi' olarak nitelendirdi."
 verrier.94.g: "Zaten ona ihtiyacımız yok."
 verrier.95.t: "Einstein, politikacı"
 verrier.95.d: "Fizikçi Albert Einstein, ulusal ve uluslararası alanda tanınmış bir isim haline gelmiş olup, aktif olarak siyasete atılmayı düşündüğü görülüyor."
 verrier.95.f: "1918 yılında Einstein, liberal bir parti olan Alman Demokratik Partisi'nin kurucu üyelerinden biriydi. Siyasi görüşleri, ünü ve dünya çapındaki politik, insani ve akademik projelere katılımı nedeniyle 20. yüzyıl ortalarına kadar halkın ilgisini çekti. Einstein bir barış aktivisti ve küresel federalizm ile dünya hukuku savunucusuydu. Özellikle yaşamının ilerleyen dönemlerinde sosyalizmi destekledi ve ekonomik görüşlerini 1949 yılında Monthly Review dergisinde yayımlanan 'Neden Sosyalizm?' başlıklı makalesinde detaylandırdı. Einstein’ın Bolşevikler hakkındaki görüşleri zamanla değişti. 1925’te onları 'iyi düzenlenmiş bir hükümet sistemi' olmamakla eleştirdi ve yönetimlerini 'terör rejimi ve insanlık tarihinin bir trajedisi' olarak nitelendirdi. Toplumdaki görünür konumu, Avrupa’da Nazizmin yükselişi nedeniyle birçok insan susturulmuşken, açık ve hatta provokatif bir şekilde konuşmasına ve yazmasına olanak sağladı. Einstein sivil hakların savunucusuydu ve ünlülüğünü Amerikan ayrımcılığını kınamak için kullandı. Hayat boyu bir pasifistti ve savaşların insan ilerlemesinin önünde bir engel olduğuna inanıyordu."
 verrier.95.g: "O, önemli bir kamu figürüdür."
 verrier.95.h: "O bir bilim insanıdır, politikacı değil."
 verrier.100.t: "Gözlemevi"
 verrier.100.d: "En önemli astronomik istatistiklerin genel bir görünümü."
 verrier.100.planets: "Aşağıdaki #G [GetGlobalVariable('verrier_planets_number').GetValue]#! gök cismi, #T Güneş Sistemi Gezegenleri#! olarak tanınmaktadır:\n"
 verrier.100.mercury: "\n#V Merkür#!, antik çağlardan beri biliniyor."
 verrier.100.venus: "\n#V Venüs#!, antik çağlardan beri biliniyor."
 verrier.100.earth: "\n#V Dünya#!, Terra olarak da bilinir, bizim evimiz."
 verrier.100.mars: "\n#V Mars#!, antik çağlardan beri biliniyor."
 verrier.100.jupiter: "\n#V Jüpiter#!, antik çağlardan beri biliniyor."
 verrier.100.saturn: "\n#V Satürn#!, antik çağlardan beri biliniyor."
 verrier.100.moon: "\n\n#T @verrier_moon_photo! Ay Fotoğrafları#! toplandı: #G [ROOT.Var('verrier_moon_photo').GetValue]#!/#BLUE 10#!.\n"
 verrier.100.comets: "\n#T @verrier_comet! Büyük Kuyrukluyıldızlar#! gözlemlendi: #G [ROOT.Var('verrier_great_comet').GetValue]#!/#BLUE [GetGlobalVariable('verrier_total_verrier_great_comet').GetValue]#!.\n"
 verrier.100.objects: "\nUluslararası astronomi, toplam #BLUE [GetGlobalVariable('verrier_total_astronomical_objects').GetValue]#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] tespit etti; bunlardan #G [ROOT.Var('verrier_astronomical_objects').GetValue]#!’i keşfedildi.\n"
 verrier.100.no_galaxies: "\nSamanyolu, #E tüm evreni#! kapsar. Andromenade Nebulası gibi oluşumlar, sadece #E gaz bulutları#!’dır."
 verrier.100.galaxies: "\nSamanyolu, evreni oluşturan #E birçok galaksiden yalnızca biri#!’dir. Andromeda Nebulası gibi görünüşler aslında #E diğer galaksiler#!’dir."
 verrier.100.sun_center: "Güneş, Samanyolu’nun #E merkezi bir bölgesinde#! yer alır."
 verrier.100.sun_outer: "Güneş, Samanyolu’nun #E dış bölgelerinden#! birinde yer alır."
 verrier.100.g: "Zorluklar aracılığıyla yıldızlara."
 verrier.100.h: "[concept_verrier_astronomer]'i ziyaret edin!"
 verrier.100.i: "En fazla Astronomik Keşif yapan ülkeleri göster!"
 verrier_leave_observatory_tt: "Gözlemevinden çıkacaksınız"
 verrier.101.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]"
 verrier.101.d: "Bizim [concept_verrier_astronomer]’imiz, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], gökyüzünün sırlarını ortaya çıkarmak için durmaksızın çalışıyor."
 verrier.101.g: "Zorluklar aracılığıyla yıldızlara."
 verrier.101.h: "Gözlemevine geri dön."
 verrier.111.t: "Gökyüzünün Mucizeleri"
 verrier.111.d: "Joseph Johann von Littrow, Avrupa’daki en önemli yaşayan astronomlardan biri, astronomi alanında yeni bir standart eser yayımladı."
 verrier.111.f: "Joseph Johann von Littrow, Avusturyalı bir astronom ve Viyana’daki yeni üniversite gözlemevini başlatan kişiydi. Üniversite gözlemevi müdürü olarak ve 1838’den itibaren de dekan olarak, eski gözlemevini tamamen yeniden inşa edebildi ve 1825 yılına kadar iyi, orta boyutlu aletlerle donattı. 1834-36 yıllarında Littrow, kısa sürede 14.000 kopya basılan popüler bilim kitabı 'Gökyüzünün Mucizeleri'ni yayımladı. Üç ciltlik eser, astronomi literatüründe klasikleşti ve Littrow’u 19. yüzyılda en çok okunan Almanca konuşan astronom hâline getirdi. Littrow, başlangıçta 'Gökyüzünün Mucizeleri'nin son bölümü olarak kapsamlı bir astronomi tarihi yayımlamayı planlamıştı. Ancak bu projeyi tamamlayamadı; astronomi tarihi el yazısı halinde kaldı. Littrow, Kasım 1840’ta öldü."
 verrier.111.g: "Bu kitabın pratik bir faydası vardır."
 verrier.111.h: "Bu kitabın teorik bir faydası vardır."
 verrier.111.i: "Bu kitabın eğitimsel bir faydası vardır."
 verrier.112.t: "Bonner Durchmusterung"
 verrier.112.d: "Prusyalı astronomlar, önceden bilinmeyen astronomik cisimleri içeren kapsamlı bir yıldız kataloğu sundular."
 verrier.112.f: "Bonner Durchmusterung (BD), kuzey gökyüzünün görsel yıldız ölçümlerine dayanan bir yıldız kataloğu (veya bundan türetilmiş, 36 sayfadan oluşan bir atlas) olarak hazırlanmıştır. Gözlem, Bonn Üniversitesi Gözlemevi'nde [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] tarafından yapılmıştır. Çalışma, Adalbert Krüger ve Eduard Schönfeld'in desteğiyle 1846-1863 yılları arasında yürütülmüş ve yayımlanmıştır. Deklinasyon aralığı 89° ile −2° arasında olan ve 9,5 kadir (bazen 10 kadir) büyüklüğe kadar yaklaşık 324.198 yıldız ölçülmüştür. Alet olarak Joseph von Fraunhofer tarafından üretilmiş, 7,7 cm açıklıklı ve 65 cm odak uzaklığına sahip bir kuyrukluyıldız bulucu teleskop kullanılmıştır."
 verrier.112.g: "Harika!"
 verrier.112.h: "Kesinlikle [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName], gökyüzünün daha fazla mucizesini keşfedecek!"
 verrier.113.t: "Mars Kanalları"
 verrier.113.d: "Astronomlarımızdan biri, kırmızı komşu gezegenimizde bazı tuhaf gözlemler yaptı."
 verrier.113.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], yüzyılının en keskin gözlü [concept_verrier_astronomer] olarak kabul edilir ve en çok Merkür, Venüs ve Mars gezegenlerindeki gözlemleri ile tanınır. 1877’de Mars’ta, medyada 'Mars kanalları' olarak adlandırılan, ince vadiler gibi görünen yapılar keşfetmiştir ve bu yapılar 80 yıl boyunca araştırmalara konu olmuştur. Bu lineer yapılar, o dönemdeki 30-50 cm mercek teleskoplarının görüş sınırına yakındı ve özel gözlem deneyimi gerektiriyordu. 1879’daki bir sonraki Mars karşıt konumunda, diğer astronomlar tarafından gözlemleri doğrulandı. [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName], bunların doğal oluşumlu, 2000 km uzunluğunda ve yaklaşık 100 km genişliğinde doğrusal çöküntüler olduğunu ve suyun, aksi takdirde kuru olan yüzeye yayılabileceğini düşündü. Ancak İngilizceye yapılan yanlış çeviri (canals yerine channels) birçok gazetecinin bunları mühendislik yapıları olarak düşünmesine yol açtı. Bu da bilim kurgu romanlarının ve on yıllar süren bir Marslı miti oluşmasına sebep oldu."
 verrier.113.g: "Şaşırtıcı bir keşif."
 verrier.113.h: "Gelecekteki Mars tehdidine karşı bir general yetiştirmeliyiz!"
 verrier.113.i: "Belki [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]’in adını daha fazla şeye verebiliriz!"
 verrier.114.t: "Halley Kuyrukluyıldızı"
 verrier.114.d: "Halley Kuyrukluyıldızı yaklaşık 75 yıl sonra gökyüzünde tekrar belirdi."
 verrier.114.f: "Halley, Dünya’dan çıplak gözle düzenli olarak görülebilen bilinen tek kısa periyotlu kuyrukluyıldızdır ve dolayısıyla bir insan ömründe iki kez görülebilen tek çıplak göz kuyrukluyıldızıdır. Halley’in kısa dönemli iç Güneş Sistemi dönüşleri, M.Ö. 240’tan itibaren astronomlar tarafından gözlemlenmiş ve kaydedilmiştir. Ancak İngiliz astronom Edmond Halley, 1705 yılında bu görünümlerin aynı kuyrukluyıldızın yeniden ortaya çıkışları olduğunu anlamıştır. Bu keşif sonucu kuyrukluyıldıza Halley’in adı verilmiştir. 1910 yaklaşımı, birkaç açıdan dikkat çekiciydi: fotoğrafları bulunan ilk yaklaşım olması ve spektroskopik verilerin elde edildiği ilk yaklaşım olması. Amerikan hicivci ve yazar Mark Twain, kuyrukluyıldızın perihelionundan tam iki hafta sonra, 30 Kasım 1835’te doğdu. 1909’da yayımlanan otobiyografisinde şöyle demiştir: 'Halley kuyrukluyıldızıyla geldim 1835’te. Gelecek yıl tekrar geliyor ve onunla çıkmayı umuyorum. Halley’le çıkamazsam, hayatımın en büyük hayal kırıklığı olur. Yüce Tanrı, şüphesiz şöyle demiştir: 'İşte bu iki açıklanamaz gariplik; birlikte geldiler, birlikte gitmeliler.' Twain, 21 Nisan 1910’da, kuyrukluyıldızın sonraki perihelionunu takip eden gün ölmüştür."
 verrier.114.g: "75 yıl sonra tekrar görüşürüz!"
 verrier.115.t: "Lemaître’in genişleyen evreni"
 verrier.115.d: "Bir Katolik rahip, evrenin durumu ve kökeni hakkında önceki dünya görüşümüzü alt üst edebilecek ilginç ve devrim niteliğinde bir teori yazdı."
 verrier.115.f: "Georges Lemaître, Belçikalı Katolik rahip, teorik fizikçi, matematikçi, astronom ve Katolik Leuven Üniversitesi’nde fizik profesörüydü. Yakın galaksilerin uzaklaşmasının genişleyen bir evrenle açıklanabileceğini ilk teorileştiren kişiydi; bu, daha sonra Edwin Hubble tarafından gözlemsel olarak doğrulandı. 'Hubble Yasası’nı (şimdi IAU tarafından Hubble–Lemaître Yasası olarak adlandırılır) ilk olarak türetti ve Hubble’in makalesinden iki yıl önce, 1927’de Hubble sabitinin ilk tahminini yayımladı. Lemaître ayrıca evrenin kökeni için 'Büyük Patlama teorisi'ni önerdi, bunu 'ilk atom hipotezi' olarak adlandırdı ve daha sonra 'dünyanın başlangıcı' dedi. 1927’de yayımlanan 'Dışgalaktik bulutsuların radyal hızını açıklayan sabit kütleli ve büyüyen yarıçaplı homojen bir Evren' başlıklı çalışmasıyla, evrenin genişlediği yeni fikrini Genel Görelilik’ten türetti ve bu eser ona uluslararası ün kazandırdı."
 verrier.115.g: "Yani bütün bu 'büyük patlama' meselesi bir Cizvit tarafından mı uydurulmuş? Bunu biliyordum!"
 verrier.116.t: "Kuantum Teorisi"
 verrier.116.d: "Fizikçi [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], kuantum teorisiyle, atomik ve alt-atomik süreçlerin insan anlayışını kalıcı olarak değiştirdi."
 verrier.116.f: "'Doğası gereği muhafazakâr bir zihniyete sahipti; devrimci hiçbir yanı yoktu ve spekülasyonlara karşı tamamen şüpheciydi. Ancak olgular üzerinden mantıksal akıl yürütmenin zorlayıcı gücüne olan inancı o kadar güçlüydü ki, fiziği sarsan en devrimci fikri duyurmaktan çekinmedi.' - Max Born, Max Planck hakkında\n\n Yeni türetiminin temel varsayımı, şimdi Planck postülası olarak bilinen, elektromanyetik enerjinin yalnızca kuantumlanmış biçimde yayımlanabileceği varsayımıydı. Fizikçiler bu kuantaları artık foton olarak adlandırıyor. Klasik fizikle uyumsuz olan bu varsayım, kuantum fiziğinin doğuşu olarak kabul edilir ve Planck’ın kariyerindeki en büyük entelektüel başarı olarak görülür. Planck sabitinin keşfi, onun yeni bir evrensel fizik birim seti tanımlamasını sağladı; bunların tümü temel fizik sabitlerine dayanmaktadır ve kuantum teorisinin büyük kısmının temelini oluşturur. Planck’ın fiziğin yeni bir dalına yaptığı temel katkının tanınması için, 1918 Nobel Fizik Ödülü kendisine verilmiştir."
 verrier.116.g: "Bilim için tarihi bir atılım!"
 verrier.116.h: "Bu dahi adam bizim için çalışmalı!"
 verrier.117.t: "Samanyolu’nun Ötesi"
 verrier.117.d: "Astronom [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], daha önce toz ve gaz bulutu olarak düşünülen ve 'nebula' olarak sınıflandırılan birçok nesnenin aslında Samanyolu’nun ötesinde galaksiler olduğunu kanıtladı."
 verrier.117.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], Amerikalı bir astronomdu. Galaksilerarası astronomi ve gözlemsel kozmoloji alanlarının kurulmasında kritik rol oynadı. Hubble, bir galaksinin geri çekilme hızının Dünya’dan uzaklığıyla arttığını kanıtladı; bu özellik şimdi 'Hubble Yasası' olarak biliniyor, ancak iki yıl önce Georges Lemaître tarafından önerilmişti. Mount Wilson’daki Hooker Teleskobu’nu kullanarak, Henrietta Leavitt tarafından keşfedilen standart bir mum olan Cepheid değişkenlerini tanımladı. Görünür parlaklıklarını içsel parlaklıklarıyla karşılaştırmak, onların Dünya’dan uzaklığını verir. Hubble, Andromeda Nebulası ve Üçgen Nebulası dahil olmak üzere birkaç nebula içinde Cepheid’leri buldu. 1924’te yapılan gözlemleri, bu nebulaların Samanyolu’nun bir parçası olamayacak kadar uzak olduğunu ve aslında tamamen ayrı galaksiler olduğunu kesin olarak kanıtladı; bu nedenle artık nebula olarak kabul edilmezler. Hubble ayrıca galaksileri sınıflandırmak için en yaygın kullanılan sistemi geliştirdi ve onları fotoğrafik görüntülerdeki görünümlerine göre grupladı. Farklı galaksi gruplarını, Hubble dizisi olarak bilinen şekilde sıraladı."
 verrier.117.h: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] koleksiyonuma harika bir katkı olacak!"
 verrier.118.t: "Nükleer Fizik"
 verrier.118.d: "Ernest Rutherford’un yaptığı araştırmalar ve çalışmalar, atomun nükleer yapısını ve radyoaktif bozunmanın bir nükleer süreç olarak temel doğasını ortaya koymaktadır."
 verrier.118.f: "Ernest Rutherford, Yeni Zelandalı bir fizikçiydi ve nükleer fiziğin babası olarak tanındı. Anavatanında yaptığı çalışmaların yanı sıra kariyerinin büyük bir kısmını Kanada ve Birleşik Krallık'ta geçirdi. İlk çalışmalarında Rutherford, radyoaktif yarı ömür kavramını, radyoaktif element radonu keşfetti ve alfa ve beta radyasyonunu ayırdı ve adlandırdı. Bu, 1908’de 'elementlerin parçalanması ve radyoaktif maddelerin kimyası üzerine araştırmaları' nedeniyle kazandığı Nobel Kimya Ödülü’nün temelidir. Rutherford, Birleşik Krallık’a taşındı ve Thomas Royds ile alfa radyasyonun helyum çekirdekleri olduğunu kanıtladı. Daha sonra atomların yüklerinin çok küçük bir çekirdekte yoğunlaştığını teorileştirerek, Hans Geiger ve Ernest Marsden’in altın folyo deneyinde Rutherford saçılmasıyla birlikte Rutherford atom modeline öncülük etti. Nitrojeni alfa parçacıklarıyla bombardıman ettiği deneylerde, ilk yapay nükleer reaksiyonu gerçekleştirdi ve sonucunda proton adını verdiği bir alt-atomik parçacığın yayılımını keşfetti."
 verrier.119.t: "Periyodik Tablo"
 verrier.119.d: "Kimyager Dmitri Mendeleev, elementlerin periyodik tablosunun bir versiyonunu oluşturdu."
 verrier.119.f: "1863’te 56 bilinen element vardı ve her yıl yaklaşık bir yeni element keşfediliyordu. Diğer bilim insanları daha önce elementlerin periyodikliğini fark etmişti. 1867’de öğretmen olduktan sonra Mendeleev, dönemin otoriter ders kitabı haline gelen 'Kimya Prensipleri'ni yazdı. Bu eser 1868-1870 arasında iki cilt halinde yayımlandı ve Mendeleev ders kitabı hazırlarken yazdı. Elementleri kimyasal özelliklerine göre sınıflandırmaya çalışırken, periyodik tablolarını önermek için desenleri fark etti; tam element düzenlemesini bir rüyasında gördüğünü iddia etti: 'Rüyamda bir tablo gördüm ve tüm elementler gereken yere düştü. Uyandığımda hemen kağıda yazdım, sadece bir yerde sonradan düzeltme gerekti.' Bu desenleri takip ederek ek elementler ekledi ve periyodik tablosunun genişletilmiş versiyonunu geliştirdi. Mendeleev, bilinen tüm elementlerin periyodik tablosunu yayımladı ve tabloyu tamamlamak için birkaç yeni elementi öngördü, bunu Rusça bir dergide yaptı."
 verrier.120.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.120.d: "Fransa’nın en ünlü [concept_verrier_astronomer]’ı, Güneş Sistemi’nin gök cisimleri üzerine bir derleme yazdı."
 verrier.120.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], gök mekaniği konusunda uzmanlaşmış bir Fransız astronom ve matematikçiydi ve yalnızca matematik kullanarak Neptün’ün varlığını ve konumunu öngörmesiyle tanınır. Hesaplamalar, Uranüs’ün yörüngesindeki tutarsızlıkları ve Kepler ile Newton yasalarını açıklamak için yapılmıştı. Le Verrier, koordinatları doğrulaması için Berlin’de Johann Gottfried Galle’ye gönderdi. Galle, Le Verrier’nin mektubunu aldığı aynı gece, tahmin edilen konuma 1° yakınlıkla Neptün’ü buldu. Bunun ardından Le Verrier, '…tüm gezegen sistemini tek bir çalışmada kucaklamak, her şeyi mümkünse uyumlu hale getirmek, aksi takdirde henüz bilinmeyen bozulma nedenleri olduğunu kesin olarak ilan etmek…' görevini üstlendi ve bu iş hayatının geri kalanını doldurdu. Le Verrier, gezegen bozulmalarını hesaplama tekniğini (perturbing function) 7. dereceye kadar yeniden değerlendirmekle başladı. Bu türetim 469 matematiksel terim içeriyordu ve 1849’da tamamlandı. Daha sonra 1750 yılına kadar uzanan gezegen konum gözlemlerini topladı. Bu gözlemleri incelemek ve en son verilerle tutarsızlıkları düzeltmekle 1852’ye kadar meşgul oldu. Bu tablolar, Bureau des Longitudes’in astronomik takvimi Connaissance des Temps’in temel efemerisini oluşturdu ve yaklaşık 1912’ye kadar kullanıldı."
 verrier.120.h: "Bizim için çalışmalı."
 verrier_congress_attend_modifier: "Astronomi Kongresine Katılıyor"
 verrier.121.t: "Astraea keşfedildi"
 verrier.121.d: "Prusyalı amatör astronom Karl Ludwig Hencke tesadüfen yeni bir gezegen keşfetti ve ona 'Astraea' adını verdi."
 verrier.121.f: "Karl Ludwig Hencke - aslında eski bir postacıydı - emekliliğinde tutkusu olan astronomiye kendini adadı. 8 Aralık 1845’te Güneş Sistemi’ndeki beşinci asteroidi, Astraea’yı keşfetti. Bu, son 'gezegen' Vesta’nın keşfinden yaklaşık 40 yıl sonraydı. Prusya Kralı, keşfi nedeniyle ona yıllık 1.200 mark ödedi. Astraea’nın keşfi, asteroit kuşağındaki diğer keşiflerin önsözü olmalıydı ve Neptün’ün keşfinden önceki son büyük gök cismi keşfi olarak kayda geçti. Aynı zamanda 'Astraea', uzaydaki bu kadar küçük cisimlerin gerçekten 'gezegen' olarak adlandırılmayı hak edip etmediği konusundaki şüpheleri artırdı. O dönemde Alexander von Humboldt, gök cisimlerini kendi kategorilerine, yani asteroitler olarak gruplamayı önermişti."
 verrier.121.g: "On ikinci gezegen!"
 verrier.122.g: "Görünüşe göre bu günlerde gelen her taş bir gezegen ilan ediliyor."
 verrier.200.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], 61 Cygni’nin uzaklığını 11,4 ışık yılı olarak belirledi"
 verrier.200.d: "Tek bir hamlede, evren çok daha büyük hale geldi. [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], 61 Cygni’nin paralaksını kullanarak yıldızın uzaklığını 11,4 ışık yılı olarak belirledi. Bu teknik, evrenin incelenmesinde büyük ilerlemeler sağlayacak."
 verrier.200.f: "1836’da Alman astronom Friedrich Bessel, bir yıldızın uzaklığını ilk kez belirlemeyi başardı. Bunu yapmak için, Dünya’nın hareketini kullanarak sabit bir yıldızın arka plana göre konumunu kaydeden paralaks yöntemini kullandı. Bu, bir nesneye önce sağ gözle, sonra sol gözle bakmaya benzer.\n\nUzaklık, bu pozisyon değişiminden hesaplanabilir."
 verrier.200.g: "Astronomi için harika bir gün!"
 verrier_modern_astronomy_invented_modifier: "Bir Yıldızın Uzaklığının İlk Ölçümü"
 verrier.201.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], Fraunhofer Çizgilerinin sebebini buldu"
 verrier.201.d: "Güneş spektrumundaki ince siyah çizgilerin nedeni uzun süre spekülasyon konusu oldu. Ancak artık Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] bu çizgilerin nedenini buldu: Belirli kimyasal elementler bu çizgilerin görünmesine sebep oluyor. Bu, yıldızlarda hangi elementlerin bulunduğunu öğrenmenin bir yolunu sunuyor."
 verrier.201.f: "Joseph Fraunhofer 1813’te güneş spektrumunda belirgin çizgiler fark etti. Ancak onlarca yıl sonra Gustav Robert Kirchhoff ve Robert Bunsen bu çizgilerin nedenini buldu. Farklı elementleri ve kimyasal bileşikleri yakarak, bu elementlerin spektrumun belirli kısımlarını absorbe ettiğini gözlemlediler. Bu nedenle, spektrumun belirli kısımlarının emilimi, bir yıldızın dış kısmında belirli bir kimyasal bileşik veya elementin varlığına kanıt olarak kabul edildi.\n\nSpektroskopi, yalnızca yıldızları türlerine göre sınıflandırmayı sağlamakla kalmadı, aynı zamanda materyal ve kimyasalların spektroskopik analizini mümkün kıldı. Hatta helyumun keşfi bile güneşin spektroskopisi sayesinde gerçekleşti."
 verrier.201.g: "Evrenin bir başka gizemi çözüldü!"
 verrier.1001.t: "Tara Wali Kothi’nin İnşası"
 verrier.1001.d: "Gözlemevimiz Tara Wali Kothi’nin inşası yavaş ilerliyor. Geçen yıl, inşaatın daha hızlı ilerlemesi umuduyla, Teğmen Albay [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] Kraliyet [concept_verrier_astronomer] olarak atandı. İnşaat, Wilcox’a para ve bilgi desteği vermediğimiz sürece birkaç yıl daha sürebilir. Ancak öncelikli soru, binanın inşaatına devam edip etmeyeceğimizdir."
 verrier.1001.f: "Tara Wali Kothi, astronomi ve astrolojiye ilgi duyan ve hatta Kalküta’da astronomi eğitimi almış Kral Nasir-ud-Din Haider tarafından yaptırılan bir gözlemeviydi.\nTara Wali Kothi ya da tercümesiyle 'Yıldızlar Köşkü', 1832’de inşasına başlandı ve 1841’de tamamlanması 9 yıl sürdü. Sadece birkaç yıl kullanıldı ve daha sonra Hint İsyanı sırasında bir karargah olarak kullanıldı. Daha sonra banka olarak hizmet verdi."
 verrier.1001.g: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ile hızlı ilerleme göreceğiz!"
 verrier.1001.h: "Bu tam bir para israfı!"
 stop_constructing_tara_wali_kothi_tt: "Tara Wali Kothi gözlemevinin inşasına devam etmeyeceğiz. Bunu bir daha inşa etme şansınız olmayacak."
 verrier.1002.t: "Tara Wali Kothi tamamlandı"
 verrier.1002.d: "Yıllar süren inşaatın ardından Tara Wali Kothi nihayet tamamlandı ve en yeni astronomik cihazlara ev sahipliği yapacak, bizi büyük keşiflere yönlendirecek."
 verrier.1002.f: "[ROOT.GetCountry.GetRuler.GetFullName], büyük teleskopla yıldızları ve gezegenleri inceliyordu. Tara Wali Kothi nihayet inşa edildiğinden, bina [ROOT.GetCountry.GetName]’in en parlak zihinlerine ev sahipliği yapacak ve öğrencilere dersler verecekti. Bu, geleceğe doğru büyük bir adımdı."
 verrier.1002.g: "Yıldızlar Köşkü bizi yeni keşiflere yönlendirecek!"
 je_verrier_tara_wali_kothi: "Tara Wali Kothi’nin İnşası"
 je_verrier_tara_wali_kothi_reason: "Awadh Krallığı’nda Tara Wali Kothi gözlemevi inşa ediliyor. İlerleme farklı yollarla etkilenebilir."
 je_verrier_tara_wali_kothi_goal: "İnşaatın ilerlemesi 60 veya daha yüksek olmalı."
 je_verrier_tara_wali_kothi_success: "İnşaatın ilerlemesi 60 veya daha yüksek."
 verrier_add_20_tara_wali_kothi_progress_tt: "Tara Wali Kothi’nin inşaatına #p 20 ilerleme #! ekle."
 verrier_add_10_tara_wali_kothi_progress_tt: "Tara Wali Kothi’nin inşaatına #p 10 ilerleme #! ekle."
 verrier_kothe_buy_additional_instruments_button: "Modern astronomik cihazlar satın al"
 verrier_kothe_buy_additional_instruments_button_desc: "Tara Wali Kothi için modern astronomik cihazlar satın al. Bu, inşaatın daha erken tamamlanmasına yardımcı olacak."
 verrier_kothe_employ_physics_teachers_button: "Fizik Öğretmenleri İstihdam Et"
 verrier_kothe_employ_physics_teachers_button_desc: "Okullarınız için, fizik ve astronomi alanındaki en yeni keşifleri öğretecek öğretmenler istihdam edin. Bu, Tara Wali Kothi’nin daha hızlı tamamlanmasını ve araştırma avantajı sağlamamızı sağlayacak."
 verrier_kothe_employ_foreign_engineers_button: "Yabancı Mühendisleri İstihdam Et"
 verrier_kothe_employ_foreign_engineers_button_desc: "Tara Wali Kothi için gerekli astronomik cihazları ve binaları inşa edecek yabancı mühendisleri istihdam edin. Bu, inşaatın daha erken tamamlanmasına yardımcı olacak."
 verrier_kothe_pay_workers_extra_button: "İşçilere fazladan ödeme yap"
 verrier_kothe_pay_workers_extra_button_desc: "İnşaatı daha hızlı tamamlamak için işçilere fazladan ödeme yapacağız. Bu, inşaatın daha erken bitmesini sağlayacak."
 verrier.1011.t: "Ethniko Asterosokopio Athinon’un İnşasına Başlandı"
 verrier.1011.d: "Yunanistan’ın ilk gözlemevi, modernleşme yolunda bir adım daha oldu. Nümf Tepesi’ne büyük bir kalabalık toplanarak bu tarihi olayı gözlemledi. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting], hükümet üyeleri ve Yunan kilisesi ile birlikte oradaydı. Hep birlikte kutlamalar yapıldı, konuşmalar yapıldı ve gökyüzüne bakıldı."
 verrier.1011.f: "   Halkın tezahüratları eşliğinde binanın temel taşı yerleştirildi. Taşın üzerine güneş sistemi işlenmişti; yeni Yunan Gözlemevi için uygun bir detay.\n\n   #b Tarihsel olarak, #! Ethniko Asterosokopio Athinon’un inşasına 26 Haziran 1842’de, bir güneş tutulması günü başlandı. Bu, muhtemelen dönemin en tanınmış Yunan bilim insanı olan astronom Georgios Konstantinos Vouris’in yıllarca süren çabalarının sonucuydu.\n   Vouris bir süre Avusturya’da yaşadığı için hem Avusturya hem de Yunan bağlantıları iyiydi. Yunan-Avusturya bankeri ve girişimci Georgios Sinas’ı bağış yapmaya ikna etti. Gözlemevinin ilk binası Sinas’ın adını aldı."
 verrier.1011.a: "Yakında yıldızları benzeri görülmemiş bir doğrulukla gözlemleyebileceğiz."
 verrier.1012.t: "Astronomlar Ethniko Asterosokopio Athinon’da gökyüzünü gözlemeye başladı"
 verrier.1012.d: "Yunanistan’ın ilk gözlemevi Ethniko Asterosokopio Athinon’un inşası bugün tamamlandı. Gözlemevi, Yunanistan’daki ilk araştırma kurumu ve bilim topluluğu için büyük bir kilometre taşıdır. Astronomları güneş, ay ve yıldızları gözlemlemeye odaklanacak. Umarız çalışmaları astronomi alanında yeni keşiflere yol açar."
 verrier.1012.f: "Ay teleskopta net bir şekilde görünüyordu. Harika görünüyordu. Hatta üzerindeki küçük kraterler bile seçilebiliyordu.\n\n#b Tarihsel olarak, #! gözlemevi çalışmasına 1856’da Yunan astronom Georgios Konstantinos Vouris önderliğinde başladı, iki yıl sonra Vouris hastalandı ve Viyana’da emekli oldu. Yerine Johann Friedrich Julius Schmidt geçti; gözlemevinin kütüphanesini genişletti ve birçok astronomik cismi gözlemledi. Odak noktalarından biri Ay’dı. Ana çalışması, Chaptre der Gebirge des Mondes (Ay’ın Topografik Haritası), Ay’ın tüm gözlemlenebilir yüzeyini kesin çizimlerle gösteriyordu. Ayrıca Linne kraterinin morfolojik değişiklikler gösterdiğini fark etti.\n   Schmidt ayrıca deprem ve meteoroloji üzerine çalışmalar yayınladı ve Truva’yı bulmaya çalıştı.\n\n   Nümf Tepesi’ndeki gözlemevi hala kullanılmakta, ancak Ulusal Atina Gözlemevi’nin bir parçası olan üç başka site daha var: Penteli Astronomik İstasyonu, Kryoneri Astronomik İstasyonu ve Chelmos Gözlemevi."
 verrier.1012.g: "Ne harikalar keşfedeceğiz?"
 verrier.1012.h: "Vouris’in büyük keşifler yapacağından eminim!"
 verrier.1013.t: "Othóneion Panepistímion’daki ilk öğrenciler"
 verrier.1013.d: "Kral Otto, çeşitli Avrupalı bilim insanlarıyla olan bağlantılarını kullanarak yeni bir üniversite, Othóneion Panepistímion veya Othonian Üniversitesi’ni kurdu. Yeni profesörlerin birçoğu Batı’da eğitim görmüş Yunanlılardı. Bu bilim insanları ve akademisyenler Yunanistan’a önemli bilgiler getirecek ve gelecek nesli eğitecek. Şu anda üniversite, mimarlar Stamatios Kleanthis ve Eduard Schaubert’in evinde yer alıyor, ancak Ana Bina tamamlandığında taşınacak."
 verrier.1013.g: "Bu bilgi, büyük güçlerle aradaki farkı kapatmamıza yardımcı olacak!"
 verrier.1013.h: "Yabancıların yardımına ihtiyacımız yok!"
 verrier.1050.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.1050.d: "Matematikçi ve Astronom [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], Leipzig Gözlemevi’nin gözlemcisi. Bu yıl astronomi üzerine en yeni eseri \"Die Hauptsätze der Astronomie\", \"Astronominin İlkeleri\"ni yayımladı. Resmi bir Astronom olarak çok faydalı olacağı kesindir."
 verrier.1050.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], hem matematikçi hem de astronomdu. Leipzig Üniversitesi’nde astronomi öğretirken birçok kitap yayımladı. Matematikte ise ağırlıklı olarak geometri dalı olan topoloji ile ilgileniyordu; bu dal, geometrik varlıkların konum ve düzenini inceler. En ünlüsü, bir yüzeyin mutlaka iki tarafı olması gerekmediğini göstermek için Möbius’un icat ettiği Möbius şerididir."
 verrier.1050.g: "Harika!"
 verrier.1050.h: "Kendi baş [concept_verrier_astronomer]’ımız olmalı!"
 verrier.1060.t: "Güneşe yakın bir kuyruklu yıldız, Harvard’a para akıttı"
 verrier.1060.d: "After a bright comet was visible even during the day, a large number of donations came to Harvard University from the people of Boston. The money will be used to build an observatory. The previous observer of the university, William Cranch Bond, is euphoric about the possibility of a modern observatory."
 verrier.1060.f: "William Cranch Bond was originally a watchmaker and at the same time an amateur astronomer. In his first home, he built an observatory with which he measured the sky. In 1839 he was appointed as an unpaid observator at Harvard University, having to bring his own equipment. When donations of USD 25,730 reached the university in 1843, he was able to build a modern observatory.\nBond succeeded, among other things, in discovering Saturn's moon Hyperion and, together with his son, in discovering Saturn's innermost ring. He was also a pioneer of astrophotography. He succeeded in taking the first picture of a star in America."
 verrier.1060.g: "Let us start the construction of an Observatory!"
 verrier.1060.h: "Yes, we will definitely use the money for Astronomy!"
 verrier.1060.i: "Hiçbir bağış paraya ihtiyacımız yok!"
 verrier.1100.t: "Stresli bir iş"
 verrier.1100.d: "[concept_verrier_astronomer]’ınız [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] oldukça stresli. Belki ona bir mola vermeliyiz?"
 verrier.1100.f: "DAHA fazla yıldız bulmalıyım! Dışarıda o kadar çok var ki! Henüz kimsenin bulmadığı birini nasıl bulmam mümkün değil? Ya kuyruklu yıldızlar ve asteroitler? Bir şeyler bulmalıyım!\nBelki bazı Marslılar? Bekle, Marslılar gerçek mi? Yoksa Mars Kanalları mı demek istedim? Hatırlamıyorum. Ve notlarım nerede?"
 verrier.1100.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]’a mola lazım!"
 verrier.1100.h: "Bu onun işi. [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe|U] yıldız keşfetmek için maaş alıyor, molalar için değil!"
 astronomer_on_break_tt: "[concept_verrier_astronomer]’ınız #n 1#! yıl mola verecek. Bu süre boyunca normal olaylardan hiçbirini alamayacaksınız."
 verrier.1101.t: "Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] aklını mı kaybediyor?"
 verrier.1101.d: "[concept_verrier_astronomer]’ınız [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] giderek daha fazla şeyi unutuyor gibi görünüyor. Belki de artık [SCOPE.sCharacter('verrier_astronomer_scope').GetHerHim] Astronom olarak görevini bırakma zamanı gelmiştir?"
 verrier.1101.f: "O notları nereye koydum? Bekle, öğle yemeğimi nereye koydum? Teleskopumda bu garip şey ne? Bu… bu benim öğle yemeğim mi?\nBekle, bu koku ne? Yangın mı var? Bu nasıl oldu!?"
 verrier.1101.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] çalışmaya devam etmemeli."
 verrier.1101.h: "Pff, bu tamamen normal!"
 verrier.1110.t: "İkiz Yıldız kayboldu"
 verrier.1110.d: "[concept_verrier_astronomer]’ımız [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], geceleri tamamen aynı davranan iki ikiz yıldızı tanımladığına emindi. Diğer astronomlar o yıldızları bulmaya çalıştığında yalnızca birini bulabildiler. Görünüşe göre [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]’in gözlerinde ya da alkolle ilgili ciddi bir sorun olabilir."
 verrier.1110.f: "Yemin ederim! *hick* Orada ikinci bir yıldız vardı! *hick* Çok net görünüyordu *hick* ve mükemmel bir ikizdi. *hick* Kaybolmuş olmalı. *hick* Ya da belki meslektaşlarım yalan söylüyordur! *hick* Kim bilir!"
 verrier.1110.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe|U] tekrar rayına girmeli!"
 verrier.1111.t: "Araştırma Notları yok edildi"
 verrier.1111.d: "[concept_verrier_observatory]’de korkunç bir olay, [concept_verrier_astronomer]’ımız [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]’ın birkaç araştırma notunun yanmasına sebep oldu. Sanki bir mum ışığı o notları ateşe vermiş gibi görünüyor, ama neden [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] alevleri durdurmadı, emin değiliz."
 verrier.1111.f: "Bunun nasıl olduğunu bilmiyorum! Çok çalışıyordum ve teleskopla o kadar meşguldüm ki fark etmemiş olmalıyım!"
