 verrier.9000.t: "Michigan’lı bir öğretmen fırtınalı Niagara Şelalesi üzerinden varil ile geçmeye çalışıyor"
 verrier.9000.d: "Gürleyen bir şelaleyi bir şekilde geçmek istemek deliliğe yakın. Ama varilde mi? Bir kadın mı? Annie Edson Taylor tam olarak bunu yapmak istiyor. Niagara Şelalesi’nden bir varilde süzülmek istiyor.\nPlanını durdurmalı mıyız yoksa risk almasına izin mi vermeliyiz?"
 verrier.9000.f: "\"Beş dolar boğulacak!\"\n\"On dolar, sağ salim dibine ulaşacak!\"\n\n#b Tarihsel olarak#! Niagara Şelalesi’ni geçmeye, süzülmeye veya atlamaya yönelik çeşitli girişimler olmuştur. Çoğu deneme ölümle sonuçlanmıştır. Hayatta kalanlar genellikle para cezası ve yaptırımlarla karşılaşmıştır."
 verrier.9000.g: "Bu deliliği hemen durdur!"
 verrier.9000.h: "Benim sorunum değil. Ne isterse yapsın..."
 verrier_niagara_falls_not_allow_barrel_tt: "Eğer öğretmenin yaptığı şeyi durdurursanız, muhtemelen kötü bir şey olmayacaktır."
 verrier_niagara_falls_allow_barrel_tt: "Belki öğretmen, Niagara Şelalesi’ni varilde canlı geçen ilk kişi olacak. Ama belki de hiç hayatta kalamaz."
 verrier.9001.t: "Annie Edson Taylor, Niagara Şelalesi’ni varilde geçen ilk kişi oldu"
 verrier.9001.d: "Birçok kişi Annie Edson Taylor’ın denemesinin ölümle sonuçlanacağını düşünse de, o Niagara Şelalesi’nden düşerken hayatta kaldı. Bazı yaralanmaları, kanama dahil, olsa da iyidir. Yine de, herkesin aynı şeyi denememesi konusunda uyarıda bulunuyor. Yerel yetkililer bu tür girişimleri yasayla cezalandıracak bir düzenleme tasarladı."
 verrier.9001.f: "\"Bir daha kimse bunu yapmamalı.\"\n\n   #b Tarihsel olarak#! Annie Edson Taylor 1901’deki denemesinden sağ çıktı. Ancak dibe vardığında kanıyordu ve olası taklitçileri uyardı.\n   Yine de, benzer denemeler yapan insanlar oldu. Charles Stephens, 1920’deki denemesinde ölen ilk kişi oldu."
 verrier.9001.g: "Şanslıydı. Şimdi insanlara tekrar denemeyi yasaklayın!"
 verrier.9002.t: "Annie Edson Taylor, Niagara Şelalesi’ni geçmeye çalışırken öldü"
 verrier.9002.d: "Birçok kişinin beklediği şey oldu. Annie Edson Taylor, bir varilde Niagara Şelalesi’ni geçmeye çalışırken öldü. Görünüşe göre dibe sağ ulaştı ama ciddi şekilde yaralandı. Ancak, varilden çıkamadığı için su içeri girince boğuldu. Kesinlikle hoş bir ölüm değil."
 verrier.9002.f: "\"Michigan’lı kadın, devasa bir şelaleyi bir varilde düşerek geçmeye çalışırken öldü.\"\n\n   #b Tarihsel olarak#! Annie Edson Taylor 1901’deki denemesinden sağ çıktı. Ancak dibe vardığında kanıyordu ve olası taklitçileri uyardı.\n   Yine de, benzer denemeler yapan insanlar oldu. Charles Stephens, 1920’deki denemesinde ölen ilk kişi oldu."
 verrier.9002.g: "Aptal oyunlar oynarsan, aptal ödüller kazanırsın... Bir daha kimsenin denemesini yasaklayın."
 verrier_barrel_successful_modifier: "Niagara Şelalesi’ni bir varilde başarıyla geçti"
 verrier_barrel_unsuccessful_modifier: "Ölümlü Varil Denemesi"
 verrier.9003.t: "Niagara Şelalesi donar"
 verrier.9003.d: "Buz gibi bir kış, Niagara Şelalesi’nin giderek daha çok donmasına yol açıyor. Bu arada, şelalelerden birinin altında bir buz köprüsü oluştu bile. İnsanlar bu gösteriyi izlemeye akın ediyor ve işini bilen tüccarlar buz üzerinde ilk mobil dükkanlarını kuruyor. Ama aynı zamanda, buzun bir noktada kırılabileceği uyarısında bulunan sesler de var. İnsanları korumak için bir şey yapmalı mıyız?"
 verrier.9003.f: "\"Ne kadar büyülü bir buz diyarı! Harika görünüyor! Eminim bu kış diyarı, sonsuza dek güzel bir anı olarak hatırlanacak!\"\n\n#b Tarihsel olarak,#! Kuzey Amerika’nın suları defalarca donmuştur. Niagara Şelalesi de istisna değildi. Düşen buz, sıklıkla şelalenin altında bir 'buz köprüsü' oluşturuyordu ve 1880’lerden itibaren insanlar oraya eğlence ve içkilerle dolu bir halk festivali kutlamak için toplanıyordu."
 verrier.9003.g: "Güvenliği sağlamalıyız. Buz köprüsünü kapatın."
 verrier.9003.h: "İnsanlar kesinlikle riskin farkında ve dikkatli!"
 verrier_niagara_falls_no_security_tt: "Buz köprüsünü kapatmıyorsunuz, umarız bir şey olmaz ama #n asla bilemezsiniz#!...."
 verrier.9004.t: "Niagara Şelalesi buz köprüsü çöktü - birkaç ölü"
 verrier.9004.d: "Niagara Şelalesi’nden korkunç haberler geldi. Buz köprüsü parçalandı ve tek tek parçalar hızla nehre sürüklendi. Köprüdeki çoğu kişi kendini kurtarmayı başardı, ancak bazı talihsizler buz iskelesinde sıkıştı. İtfaiyeciler onları kurtarmaya çalıştığında, güçlü buz ve su karışımında can verdiler.\n[SCOPE.sState('niagara_falls_state_scope').GetName] hükümeti sert bir şekilde eleştirildi, çünkü felaket kolaylıkla önlenebilirdi."
 verrier.9004.f: "\"Sanki bir topçu parkının gürlemesi gibi ses geliyordu, muazzam buz köprüsü aniden insan yüküyle birlikte hızla aşağı aktı. Bazıları suya atlayıp titreyerek kıyıya çıkmayı başardı, diğerleri çok yavaş kaldı ve dev buz kütlesinin nehirden geçişini çaresizce izlemek zorunda kaldı.\"\n\n#b Tarihsel olarak,#! Kuzey Amerika’nın suları defalarca donmuştur. Niagara Şelalesi de istisna değildi. Düşen buz sıklıkla şelalenin altında bir 'buz köprüsü' oluşturuyor ve 1880’lerden itibaren insanlar eğlence ve içkilerle dolu bir halk festivali kutlamak için oraya toplanıyordu. 1912’de buz köprüsü kırıldı ve üç kişi hayatını kaybetti. O zamandan beri, ziyaretçilere buz üzerine çıkmamaları konusunda uyarı yapılmaktadır."
 verrier.9004.g: "Ne gereksiz bir trajedi!"
 verrier.9005.t: "Niagara Şelalesi buzları eridi"
 verrier.9005.d: "Niagara Şelalesi yeniden sessizleşti. Buz kısa bir süre kaldı ve şimdi geri çekildi. Şimdi su, her zamanki gibi havuza gürleyerek akıyor. Kısa sürenin geriye kalan kısmı, büyüleyici anılar ve birkaç yerel işadamı için kazanç oldu. Kim bilir, Niagara Şelalesi bir sonraki kez ne zaman donar?"
 verrier.9005.f: "\"Bir gün çocuklarıma, buz köprüsünün üzerinde dururken bir çatlama sesi duyduğumu anlatacağım. Neyse ki, kötü bir şey olmadı. Onun yerine, karımla birlikte buz üzerinde dans ettim!\"\n\n#b Tarihsel olarak,#! Kuzey Amerika’nın suları defalarca donmuştur. Niagara Şelalesi de istisna değildi. Düşen buz sıklıkla şelalenin altında bir 'buz köprüsü' oluşturuyor ve 1880’lerden itibaren insanlar eğlence ve içkilerle dolu bir halk festivali kutlamak için oraya toplanıyordu. 1912’de buz köprüsü kırıldı ve üç kişi hayatını kaybetti. O zamandan beri, ziyaretçilere buz üzerine çıkmamaları konusunda uyarı yapılmaktadır."
 verrier.9005.g: "Harika!"
