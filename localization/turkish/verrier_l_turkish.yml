 verrier.501.t: "Uydu başka bir ülke tarafından keşfedildi"
 verrier.501.d: "Ne yazık ki, Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]'in keşfetmeyi planladığı uydu başka bir ülke tarafından bulundu. Haberler zaten tüm gazetelerde."
 verrier.501.f: "'Görmek bir bakıma öğrenilmesi gereken bir sanattır.' - William Herschel"
 verrier.501.g: "Hayal kırıklığı."
 verrier.511.t: "Deimos keşfedildi"
 verrier.511.d: "Aylar süren araştırmalarının karşılığını alan [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], Mars yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Deimos#! adı verildi."
 verrier.511.f: "'11 Ağustos 1877 gecesi erken saatlerde incelemeyi tekrarladım ve yine bir şey bulamadım, ancak birkaç saat sonra tekrar denediğimde, gezegenin biraz kuzeyinde hafif bir cisim gördüm. Konumunu gözlemleyebilecek kadar vaktim oldu ancak nehirden gelen sis çalışmayı durdurdu. Bu, 11’inin gecesi saat 2:30’da oldu. Bulutlu hava birkaç gün engel oldu. 16 Ağustos’ta cisim tekrar gezegenin diğer tarafında bulundu ve o geceki gözlemler, cismin gezegenle hareket ettiğini ve eğer bir uyduysa, uzantılarından birinin yakınında olduğunu gösterdi. Bu zamana kadar Mars uydusu arayışımı gözlemevindeki kimseye söylemedim, ancak 16’sındaki gözlemlerden sonra, sabah saat 3 civarında asistanım George Anderson’a, cismi gösterdiğimde, Mars’ın bir uydusunu keşfettiğimi düşündüğümü söyledim.' - Asaph Hall"
 verrier.511.g: "Koleksiyonumuza bir ay daha eklendi."
 verrier.512.t: "Phobos keşfedildi"
 verrier.512.d: "Aylar süren araştırmalarının karşılığını alan [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], Mars yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Phobos#! adı verildi."
 verrier.512.f: "'17 Ağustos 1877 günü bir ile iki arasında, gözlemlerimi kaydederken Profesör Newcomb öğle yemeğini yemek için odama geldi ve Mars yakınındaki hafif cismin ölçülerini gösterdim; bu cismin gezegenle hareket ettiğini kanıtladı. 17 Ağustos’ta dış ayı beklerken iç ayı keşfettim. 17. ve 18.’deki gözlemler, bu cisimlerin niteliğini şüpheye yer bırakmayacak şekilde gösterdi ve keşif Amiral Rodgers tarafından halka duyuruldu.' - Asaph Hall"
 verrier.521.t: "Amalthea keşfedildi"
 verrier.521.d: "Aylar süren araştırmalarının karşılığını alan [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], Jüpiter yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Amalthea#! adı verildi."
 verrier.521.f: "Amalthea, 9 Eylül 1892’de Edward E. Barnard tarafından Kaliforniya, ABD’deki Mount Hamilton’daki Lick Gözlemevi’nden 91 cm’lik teleskop kullanılarak keşfedildi. Jüpiter’in diğer uyduları sistematik olarak araştırılırken bulunmuştu. Jüpiter’in beşinci uydusu olarak Roma rakamı V ile adlandırıldı. Fransız astronom Camille Flammarion, aya Amalthea adını verilmesini önerdi; bu isim resmi olarak kullanılmadan önce on yıllarca gayriresmi kullanıldı."
 verrier.522.t: "Himalia keşfedildi"
 verrier.522.d: "Aylar süren araştırmalarının karşılığını alan [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], Jüpiter yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Himalia#! adı verildi."
 verrier.522.f: "Himalia, Jüpiter’in dış veya düzensiz uyduları arasında en büyüğüdür. Himalia, 3 Aralık 1904’te Charles Dillon Perrine tarafından Lick Gözlemevi’nde (San Jose, Kaliforniya) keşfedildi. Ay, Yunan mitolojisinde Zeus’un sevgilisi olan Himalia’nın adını aldı."
 verrier.523.t: "Elara keşfedildi"
 verrier.523.d: "Aylar süren araştırmalarının karşılığını alan [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], Jüpiter yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Elara#! adı verildi."
 verrier.523.f: "Elara, 2 Ocak 1905’te Charles Dillon Perrine tarafından Lick Gözlemevi’nde (San Jose, Kaliforniya) keşfedildi. Dış veya düzensiz uydular arasında ikinci, Jüpiter’in toplamda sekizinci en büyük uydusudur. Ay, Yunan mitolojisinde Zeus’un sevgilisi Elara’dan adını aldı."
 verrier.524.t: "Pasiphae keşfedildi"
 verrier.524.d: "Aylar süren araştırmalarının karşılığını alan [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], Jüpiter yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Pasiphae#! adı verildi."
 verrier.524.f: "Pasiphae, 27 Ocak 1908'de astronom Philibert Jacques Melotte tarafından keşfedildi. İlk olarak 28 Şubat 1908 gecesi İngiltere’deki Royal Greenwich Gözlemevi’nde çekilen fotoğraf plaklarında bulundu. Diğer plakların incelenmesi, cismin aslında 27 Ocak’ta kaydedildiğini gösterdi. Başlangıçta bunun bir asteroit mi yoksa uydu mu olduğu belli olmadığından geçici olarak 1908 CJ asteroit adı verildi. 10 Nisan’da Jüpiter’in yakınında sekizinci bir ayın keşfi nihayet doğrulandı. Ay, Yunan mitolojisinde Minos’un eşi ve Minotaur’un annesi olan Pasiphae’nin adıyla adlandırıldı. Pasiphae, benzer yörüngelerde hareket eden Jüpiter uyduları grubuna adını vermektedir. Pasiphae grubu, Pasiphae dahil 13 üyeden oluşur ve Pasiphae en büyüğüdür."
 verrier.525.t: "Sinope keşfedildi"
 verrier.525.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylar süren araştırması sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe], Jüpiter yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Bu gök cismi #YELLOW Sinope#! olarak adlandırıldı."
 verrier.525.f: "Sinope, 1 Temmuz 1914’te astronom Seth Barnes Nicholson tarafından Lick Gözlemevi’nde keşfedildi. Uydu, Yunan mitolojisinde Zeus tarafından talip olunan ve Apollo tarafından kaçırılan bir periden adını aldı. Sinope, yörüngesel özellikleri nedeniyle Pasiphae grubuna dahil edilmiştir."
 verrier.526.t: "Lysithea keşfedildi"
 verrier.526.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylar süren araştırması sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe], Jüpiter yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Bu gök cismi #YELLOW Lysithea#! olarak adlandırıldı."
 verrier.526.f: "Lysithea, 6 Temmuz 1938’de astronom Seth Barnes Nicholson tarafından Mount Wilson Gözlemevi’nde keşfedildi. Uydu, Yunan mitolojisinde Zeus’un sevgilisi Lysithea’dan adını aldı. Yörüngesel özellikleri nedeniyle Jüpiter’in Himalia grubuna dahil edilmiştir."
 verrier.527.t: "Carme keşfedildi"
 verrier.527.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylar süren araştırması sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe], Jüpiter yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Bu gök cismi #YELLOW Carme#! olarak adlandırıldı."
 verrier.527.f: "Carme, 30 Temmuz 1938’de astronom Seth Barnes Nicholson tarafından Kaliforniya’daki Mount Wilson Gözlemevi’nde keşfedildi. Nicholson, Jüpiter’i 5 Temmuz-25 Ağustos arasında fotoğrafladı; Carme, 30 Temmuz’da çekilen bir plakta görüldü. Yeni uydunun keşfi, yılın Ağustos sonunda duyuruldu. Uydu, Yunan mitolojisinde Zeus’un sevgilisi Carme’den adını almıştır."
 verrier.531.t: "Enceladus keşfedildi"
 verrier.531.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylar süren araştırması sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe], Satürn yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Bu gök cismi #YELLOW Enceladus#! olarak adlandırıldı."
 verrier.531.f: "Enceladus, 28 Ağustos 1789’da Alman-İngiliz astronom Wilhelm Herschel tarafından keşfedildi. Enceladus, Satürn’ün keşfedilen altıncı uydusu ve tüm güneş sistemindeki (Dünya’nın uydusu dışında) on ikinci keşfedilen uydudur. O dönemde Satürn’e en yakın ikinci yörüngeye sahip olduğu için, Herschel’in bildiği yedi büyük Satürn uydusundan içten ikinci sıraya yerleştirildi. Uydu, Yunan mitolojisinde dev Onkelados (Latince Enceladus) adıyla anıldı. Enceladus ve Satürn’ün diğer yedi uydusunun isimlerini, astronom Wilhelm Herschel’in oğlu John Herschel önermiştir."
 verrier.532.t: "Mimas keşfedildi"
 verrier.532.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylar süren araştırması sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe], Satürn yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Bu gök cismi #YELLOW Mimas#! olarak adlandırıldı."
 verrier.532.f: "'Gözlemlerime hava izin verdiği sürece sürekli devam ettim; ve kırk feet’lik ayna teleskobunun büyük ışığı o kadar yararlı oldu ki, 17 Eylül’de yedinci uyduyu, en büyük öndeki uzaklaşımda iken tespit ettim.' - William Herschel"
 verrier.533.t: "Hyperion keşfedildi"
 verrier.533.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylar süren araştırması sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe], Satürn yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Bu gök cismi #YELLOW Hyperion#! olarak adlandırıldı."
 verrier.533.f: "Hyperion, Eylül 1848’de ABD’de William Cranch Bond ve oğlu George Phillips Bond ile Birleşik Krallık’ta William Lassell tarafından bağımsız olarak keşfedildi. Uydu, gözlem ve dikkat tanrısı Titan Hyperion’dan adını alır ve Cronus’un (Roma’da Satürn) büyük kardeşidir."
 verrier.534.t: "Phoebe keşfedildi"
 verrier.534.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylar süren araştırması sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe], Satürn yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Bu gök cismi #YELLOW Phoebe#! olarak adlandırıldı."
 verrier.534.f: "Phoebe, 18 Mart 1899'da William Henry Pickering tarafından keşfedildi. Keşif, 16 Ağustos 1898'den itibaren Peru, Arequipa yakınlarındaki Boyden Gözlemevi'nde DeLisle Stewart tarafından çekilen fotoğraf plaklarıyla yapıldı. Bu, fotoğraf yoluyla keşfedilen ilk uydu oldu. Phoebe, Yunan mitolojisinde Ay ile ilişkilendirilen Titan Phoebe’nin adını almıştır ve Cronus’un kız kardeşidir. Pickering, 1900 yılında '1898’deki dört görüntü, sonunda sadece kusur veya tesadüfi bir yıldız olabilir mi diye merak etmeye başladım.' demiştir. Ancak Pickering Phoebe’yi tekrar bulmuştur. 1905’te 1904 plaklarından onuncu bir Satürn uydusu keşfettiğini iddia etmiş ve ona 'Themis' adını vermiştir. Bu keşfi için 1905’te Fransız Bilimler Akademisi tarafından Lalande Ödülü ile ödüllendirilmiştir. Daha sonra 'Themis’in var olmadığı ortaya çıkmıştır."
 verrier.541.t: "Titania keşfedildi"
 verrier.541.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylardır süren araştırmaları sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] Uranüs yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Titania#! adı verildi."
 verrier.541.f: "Titania, Uranüs’ün en büyük uydusu ve Güneş Sistemi’ndeki sekizinci en büyük uydudur. 11 Ocak 1787’de William Herschel tarafından keşfedilmiştir; aynı gün Uranüs’ün ikinci en büyük uydusu Oberon’u da keşfetmiştir. Daha sonra dört uydu daha keşfettiğini bildirmiş, ancak bunlar sahte olarak ortaya çıkmıştır. Yaklaşık 50 yıl boyunca Titania ve Oberon yalnızca Herschel’in gözlemleriyle görülebilmiştir, ancak günümüzde yüksek kaliteli amatör teleskoplarla izlenebilir. Uranüs’ün tüm uyduları, William Shakespeare veya Alexander Pope’un eserlerindeki karakterlerin adını taşır. Titania adı, Bir Yaz Gecesi Rüyası’ndaki Peri Kraliçesi’nden alınmıştır."
 verrier.542.t: "Oberon keşfedildi"
 verrier.542.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylardır süren araştırmaları sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] Uranüs yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Oberon#! adı verildi."
 verrier.542.f: "Oberon, Uranüs’ün en dış ve ikinci en büyük uydusudur. Uranüs uyduları arasında ikinci en kütleli, Güneş Sistemi’nde ise onuncu en kütleli uydudur. Oberon, Titania’yı keşfettiği 11 Ocak 1787’de Herschel tarafından keşfedildi. Daha sonra dört uydu daha keşfettiğini bildirmiş, ancak bunlar sahte olarak ortaya çıkmıştır. Yaklaşık 50 yıl boyunca Oberon ve Titania yalnızca Herschel’in gözlemleriyle görülebilmiş, ancak günümüzde yüksek kaliteli amatör teleskoplarla izlenebilir. Uranüs’ün tüm uyduları, Shakespeare veya Alexander Pope’un eserlerindeki karakterlerin adını taşır. Oberon adı, Bir Yaz Gecesi Rüyası’ndaki Peri Kralı Oberon’dan alınmıştır."
 verrier.543.t: "Ariel keşfedildi"
 verrier.543.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylardır süren araştırmaları sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] Uranüs yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Ariel#! adı verildi."
 verrier.543.f: "Ariel, Uranüs’ün bilinen uyduları arasında en parlak ve dördüncü en büyük uydudur. Ariel ve Umbriel, 24 Ekim 1851’de İngiliz astronom William Lassell tarafından Liverpool’daki kendi gözlemevinde 60 cm’lik yansıtıcı teleskop kullanılarak keşfedilmiştir. Ay, Alexander Pope’un epik şiiri The Rape of the Lock’ta geçen bir sylphten adını almıştır."
 verrier.544.t: "Umbriel keşfedildi"
 verrier.544.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylardır süren araştırmaları sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] Uranüs yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Umbriel#! adı verildi."
 verrier.544.f: "Umbriel, Uranüs’ün üçüncü en büyük uydusudur. 24 Ekim 1851’de William Lassell tarafından Ariel ile eş zamanlı keşfedilmiştir. Ay, Alexander Pope’un 1712’deki The Rape of the Lock şiirindeki bir karakterin adını taşır. Titania ve Oberon’un kaşifi Herschel, 18. yüzyılın sonunda Uranüs’ün dört ek uydusunu gözlemlediğini iddia etse de gözlemleri doğrulanmamış ve bu uydular sahte olarak kabul edilmiştir."
 verrier.545.t: "Miranda keşfedildi"
 verrier.545.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylardır süren araştırmaları sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] Uranüs yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Göksel cisme #YELLOW Miranda#! adı verildi."
 verrier.545.f: "Miranda, 16 Şubat 1948’de gezegen astronomu Gerard Kuiper tarafından McDonald Gözlemevi’ndeki 82 inç (2.080 mm) Otto Struve Teleskobu ile keşfedildi. Uranüs çevresindeki hareketi 1 Mart 1948’de doğrulandı. Bu, neredeyse 100 yıl içinde Uranüs’ün keşfedilen ilk uydusuydu. Kuiper, nesneyi Shakespeare’in Fırtına oyunundaki Miranda karakterinden adlandırmayı seçti; çünkü daha önce keşfedilen Ariel, Umbriel, Titania ve Oberon’un isimleri Shakespeare veya Alexander Pope karakterlerinden alınmıştı. Ancak önceki uydular perilerden esinlenmişken Miranda bir insana ithafen adlandırılmıştır."
 verrier.551.t: "Triton keşfedildi"
 verrier.551.d: "Shortly after the discovery of Neptune, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] discovered a previously unknown satellite in the orbit of Neptune! The celestial body was named #YELLOW Triton#!."
 verrier.551.f: "Triton, Neptün gezegeninin en büyük doğal uydusudur. Neptün’ün uyduları arasında kendi yerçekimiyle yuvarlaklaşacak kadar büyük tek uydudur ve ince ama yapısal olarak belirgin bir atmosfere sahiptir. Triton, Neptün’ün dönüş yönünün tersine, retrograd bir yörüngede hareket eder ve Güneş Sistemi’ndeki büyük uydular arasında bu özelliğe sahip tek uydudur. Triton, İngiliz astronom William Lassell tarafından, Neptün’ün keşfinden sadece 17 gün sonra, 10 Ekim 1846’da keşfedildi. John Herschel, Neptün’ün keşfi haberini aldığında Lassell’e olası uyduları aramasını önerdi. Lassell, sekiz gün sonra Triton’u keşfetti. Mesleği bira üreticiliği olan Lassell, kendi yaptığı 61 cm (24 inç) açıklıklı metal ayna teleskop (ayrıca 'iki ayaklı' reflektör olarak bilinir) ile Triton’u gözlemledi. Uydu, Yunan deniz tanrısı Triton’un adıyla anılmıştır; Triton, Poseidon’un (Roma mitolojisinde Neptün) oğludur."
 verrier.552.t: "Nereid keşfedildi"
 verrier.552.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'in aylar süren araştırması sonuç verdi: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe], Neptün yörüngesinde daha önce bilinmeyen bir uydu keşfetti! Bu gök cismi #YELLOW Nereid#! olarak adlandırıldı."
 verrier.552.f: "Nereid, Neptün’ün üçüncü en büyük uydusudur. 1 Mayıs 1949’da Gerard P. Kuiper tarafından McDonald Gözlemevi’nde 82 inç teleskop ile çekilen fotoğraf plakaları kullanılarak keşfedildi. Kuiper, keşif raporunda adını önerdi. Uydu, Yunan mitolojisinde deniz perileri olan Nereidlerden ve tanrı Neptün’ün (Yunan karşılığı) yardımcılarından adını almıştır. Voyager 2 gelmeden önce keşfedilen Neptün’ün ikinci ve son uydusudur."
 verrier.49.t: "Güneş Lekeleri"
 verrier.49.d: "Gözlemevimizdeki araştırmacılar, güneş lekeleri ile ilişkili olağanüstü güneş aktivitelerini gözlemledi."
 verrier.49.f: "Güneş lekeleri, güneşin görünür yüzeyinde (fotosfer) daha soğuk ve dolayısıyla çevresine göre daha az ışık yayan karanlık bölgeleridir. Sayıları ve boyutları, so-called güneş aktivitesinin en basit ölçüsünü oluşturur. Güneş lekelerinin sıklığı ortalama on bir yıllık bir periyot gösterir ve buna güneş lekesi döngüsü denir. Lekelerin ve yanlarındaki patlamaların nedeni, bazı bölgelerde güneşin içinden yüzeyine ısı taşınmasını engelleyen güçlü manyetik alanlardır. Birkaç bilinmeyen leke keşfedildi."
 verrier.49.g: "Büyüleyici!"
