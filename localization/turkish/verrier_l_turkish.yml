 verrier.1112.t: "Kaybolan Yıldızlar"
 verrier.1112.d: "Birkaç gün önce [concept_verrier_astronomer]’ımız [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], çeşitli yeni yıldızlar buldu. Ne yazık ki [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] notlarını kaybetmiş gibi görünüyor ve yıldızları tekrar bulamıyor. Yıldızlar kayboldu mu yoksa [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] onları nerede bulduğunu mu unuttu, bilmiyoruz."
 verrier.1112.f: "O notlar nerede? Her yeri aradım! Mutfakta, çöp kutusunda, masamda… Her yerde!\nVe yıldızlar da gitmiş! Bu nasıl olabilir?"
 verrier.1112.g: "Umarız [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] yıldızları tekrar bulur!"
