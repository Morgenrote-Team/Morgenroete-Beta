 verrier_astronaut_modifier: "Astronot"
 je_from_the_earth_to_the_moon: "Dünyadan Aya"
 je_from_the_earth_to_the_moon_reason: "Baltimore Top Kulübü, aya bir mermi gönderecek dev bir top inşa etmek istiyor. Planları arasında 10.000 kg ağırlığında ve 60 cm duvar kalınlığında alüminyumdan bir bomba var. Ayrıca 270 m uzunluğunda, 2,70 m iç çapında ve 1,80 m duvar kalınlığında dökme demirden bir top namlusu üzerinde de anlaştılar. Bu, uygun bir silah sanayisi ve cihazı tasarlayıp inşa edecek yetenekli insanlar gerektiriyor. Florida, fırlatma yeri için mükemmel görünüyor. Malzeme taşımaları nedeniyle bölgenin kendi demiryoluna ihtiyacı var."
 verrier_baltimore_president_alive_tt: "Baltimore Top Kulübü Başkanı [SCOPE.sCharacter('verrier_club_president').GetFullName] hâlâ yaşıyor"
 verrier.131.t: "Dünyadan Aya"
 verrier.131.d: "Baltimore Top Kulübü, [SCOPE.sCharacter('verrier_club_president').GetFullName] gözetiminde kurulmuş ve silah meraklıları için bir eğlence etkinliği olarak görülmektedir. Kulübün son önerisi, ülke çapında manşetlere taşındı."
 verrier.131.f: "Baltimore Top Kulübü, İç Savaş sırasında kuruldu ve topçuluk uzmanlarını bir araya getiriyor. Başkanları [SCOPE.sCharacter('verrier_club_president').GetLastName] ve sekreter, mühendis [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], iç savaşın sona ermesinden sonra yeterince işe yaramadıklarını düşünüyorlar. Yeni bir etkinlik alanı açmak için bir toplantı düzenliyorlar. Yeni bir savaşa başlamayı öneren teklifler sonrası, bir top kullanarak bir mermiyi dünyadan aya göndermeye karar veriyorlar. Planları arasında 10.000 kg ağırlığında ve 60 cm duvar kalınlığında alüminyumdan bir bomba var. Ayrıca 270 m uzunluğunda, 2,70 m iç çapında ve 1,80 m duvar kalınlığında dökme demirden bir top namlusu üzerinde anlaştılar. Guncotton propellant olarak kullanılacak."
 verrier.131.g: "ABD on yıl bitmeden aya ilk insanı gönderecek!"
 verrier.131.h: "Bir sonraki savaşı beklemek çok daha güvenli..."
 verrier.132.t: "Aya uçuş için ekip"
 verrier.132.d: "Hazırlıklar tamamlandı, ama hâlâ önemli bir soru var: kapsüle kimler binecek?"
 verrier.132.f: "Aslında, bir insanı dev bir top mermisi içinde uzaya gönderecek bir intihar görevi için gönüllü bulmak zor olmalıydı. Ama Baltimore Top Kulübü’nün bazı üyeleri için bu büyük bir onur. Başkan ve baş mühendis birer koltuğa hak kazanıyor, diğerleri ünlü bir astronom öneriyor. Daha temkinli akıllar, insan hayatını riske atmamak için sadece iki köpeğin test için uzaya gönderilmesini savunuyor."
 verrier.132.g: "[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], Mühendis"
 verrier.132.h: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], Astronom"
 verrier.132.i: "[SCOPE.sCharacter('verrier_club_president').GetFullName], Kulüp Başkanı"
 verrier.132.j: "Sadece köpekleri koyun."
 verrier.132.k: "HEPSİ!"
 verrier.133.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]’ın Müdahalesi"
 verrier.133.d: "Dev topun yapımı ve kurulumu için son hazırlıklar sırasında, [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] proje başlatıcılarını uyardı: hesaplamalarına göre, [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName] yanlış hesap yapmıştı."
 verrier.133.f: "Ünlü astronom, top mevcut ölçekte inşa edilse ve mermi mevcut şekilde hedeflense, kapsülün neredeyse Dünya’nın yerçekiminden ayrılamayacağını hesapladı. Başarının büyük ölçüde artacağı bazı iyileştirilmiş inşaat planlarını sundu."
 verrier.133.g: "Bir felaketi önleyebilirdi."
 verrier.134.t: "Geri sayım"
 verrier.134.d: "Bu uzun beklenen günden önceki gece kaç kişi uykusuz kaldı! Tüm kalpler huzursuzca çarpıyor. Columbiad aya fırlatılmaya hazır."
 verrier.134.f: "Şafaktan sonra, sayısız kalabalık Stones Hill çevresindeki prairiyi kapladı. Her çeyrek saatte bir demiryolu, yeni ziyaretçi gruplarını getirdi; Tampa Town Observer’a göre, Florida topraklarında beş milyondan az olmayan seyirci vardı. Ay, en saf berraklıkta gökyüzünde yükseliyordu, yıldızların ışığını geçiyordu. İkizler takımyıldızının üzerinden geçti ve şimdi ufuk ile zenit arasında yarı noktaya yaklaşıyordu. Tüm sahneyi korkunç bir sessizlik sardı! Dünyada bir esinti yok! Seyircilerin sayısız göğsünden bir nefes bile duyulmuyor! Kalpleri atmaya korkuyor gibi! Bütün gözler Columbiad’ın açılan ağzına kilitlenmişti.\n'Otuz beş!-- otuz altı!-- otuz yedi!-- otuz sekiz!-- otuz dokuz!-- kırk!'"
 verrier.134.g: "ATEŞ!"
 verrier.135.t: "Bir Felaket"
 verrier.135.d_humans_dead: "İnsanlığın ilk uzay görevi, insanlığın ilk uzay felaketi oldu. Görev tamamen bir felaketti! Korku hâlâ seyircilerin kemiklerinde hissediliyor."
 verrier.135.d_dogs_dead: "Görev tamamen bir felaketti! Zavallı hayvanların acısı üzücü, ama diğer yandan kapsülde insan olmaması birçok kişi için rahatlatıcı."
 verrier.135.f: "O ateş piramidinin göğe muazzam bir yükseklikle yükseldiği anda, alevin parıltısı tüm Florida'yı aydınlattı; ve bir an için gün, ülkenin geniş bir bölgesinde geceyi bastırdı. Bu devasa ateş örtüsü denizde yüz mil uzaklıktan fark edildi ve birden fazla gemi kaptanı bu devasa meteorun görünümünü günlüklerine kaydetti. Columbiad’ın ateşlenmesi tam bir depremle eşlik etti. Florida derinliklerine kadar sallandı. Isı ile genişleyen barut gazları atmosfer tabakalarını şiddetle geri itti ve bu yapay kasırga havada bir su hortumu gibi aktı.\nAma sonra deney kontrol dışına çıktı: Görünüşe göre top, mermiyi uzaya fırlatacak kadar itme gücü üretemedi. Tüm fantastik etkilerden sonra kapsül hızını kaybetti, dünyaya geri dönerek yüksek bir patlama ile çarptı."
 verrier.135.g: "Hâlâ Kerbal Space Program 2’den daha iyi."
 verrier.136.t: "Aya Uçuş"
 verrier.136.d_humans_in_space: "Columbiade’in fırlatılması tamamen başarılı oldu. İnsan ilk kez uzaya girdi! Geri dönüp dönmeyeceği ise belirsiz..."
 verrier.136.d_dogs_in_space: "Columbiade’in fırlatılması tamamen başarılı oldu. İlk kez yapay bir nesne uzaya ulaştı! Ne yazık ki, köpeklerin Columbiad’i dünyaya geri getirmesi olası görünmüyor..."
 verrier.136.f: "O ateş piramidinin göğe muazzam bir yükseklikle yükseldiği anda, alevin parıltısı tüm Florida'yı aydınlattı; ve bir an için gün, ülkenin geniş bir bölgesinde geceyi bastırdı. Bu devasa ateş örtüsü denizde yüz mil uzaklıktan fark edildi ve birden fazla gemi kaptanı bu devasa meteorun görünümünü günlüklerine kaydetti. Columbiad’ın ateşlenmesi tam bir depremle eşlik etti. Florida derinliklerine kadar sallandı. Isı ile genişleyen barut gazları atmosfer tabakalarını şiddetle geri itti ve bu yapay kasırga havada bir su hortumu gibi aktı.\nDeney başarılı oldu."
 verrier.136.g: "Bu gerçekten mükemm ... TEBRİKLER!"
 verrier.136.h: "Keşke gerçek pilotlar göndermiş olsaydık."
 verrier.137.t: "Ay’dan Dönüş!"
 verrier.137.d: "Lunar görev kapsülü Pasifik Okyanusu’na güvenli bir şekilde indi ve bir ABD korveti tarafından kurtarıldı. Haber ülke çapında yayıldı: İnsan aya gidip geri döndü!"
 verrier.137.f_person: "Merminin dalgalar altında battığı nokta tam olarak biliniyordu; fakat onu yakalayıp okyanus yüzeyine çıkaracak makine hâlâ eksikti. Önce icat edilmeli, sonra üretilmeliydi. Amerikan mühendisleri böyle ufak detaylarla uğraşamazdı. Bir kez kavranan vinç kancaları sayesinde, batırıldığı sıvının yoğunluğu ile azalan ağırlığına rağmen kapsül çıkarılacaktı.\nGidiş sırasında gösterilen yoğun sempatiyi hatırlayabiliriz. Eğer girişimin başında bu macera hem eski hem yeni dünyada bu kadar heyecan uyandırdıysa, dönüşlerinde kahraman ne coşkuyla karşılanırdı! Böylece şehirden şehre hızla ilerledi, yol üzerinde tüm nüfus masada bulunuyor, aynı tezahürat ve alkışlarla selamlanıyordu."
 verrier.137.f_team: "Merminin dalgalar altında battığı nokta tam olarak biliniyordu; fakat onu yakalayıp okyanus yüzeyine çıkaracak makine hâlâ eksikti. Önce icat edilmeli, sonra üretilmeliydi. Amerikan mühendisleri böyle ufak detaylarla uğraşamazdı. Bir kez kavranan vinç kancaları sayesinde, batırıldığı sıvının yoğunluğu ile azalan ağırlığına rağmen kapsül çıkarılacaktı.\nGidiş sırasında gösterilen yoğun sempatiyi hatırlayabiliriz. Eğer girişimin başında bu macera hem eski hem yeni dünyada bu kadar heyecan uyandırdıysa, dönüşlerinde kahraman ne coşkuyla karşılanırdı! Böylece şehirden şehre hızla ilerledi, yol üzerinde tüm nüfus masada bulunuyor, aynı tezahürat ve alkışlarla selamlanıyordu."
 verrier.137.g: "Kutlamalıyız!"
 verrier.1051.t: "Gauß’un Dönüşü"
 verrier.1051.d: "Bir zamanlar en büyük Astronomlardan biri sayılan [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], son birkaç yıldır matematik ve manyetizma gibi başka konulara odaklanmıştı. Ama şimdi Astronomi’ye geri döndü."
 verrier.1051.f: "Geri döndüm."
 verrier.1051.g: "Bir işi çanlarla mı ilgiliydi, değil mi?"
 verrier.1051.h: "Yeni gezegenler bulacak!"
