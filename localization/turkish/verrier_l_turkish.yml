 verrier_astronomer: "Astronom"
 verrier_astronomer_desc: "Bu bilim insanı, gökyüzü fenomenleriyle ilgilenir ve astronomik nesneleri teleskopla yorulmadan gözlemler."
 verrier_astronomer_experienced: "Deneyimli Astronom"
 verrier_astronomer_experienced_desc: "Bu karakter bazı olağanüstü astronomik keşifler yapmıştır ve bu nedenle halk tarafından yüksek takdir görür."
 verrier_astronomer_famous: "Ünlü Astronom"
 verrier_astronomer_famous_desc: "Çok sayıda keşfi ve evreni daha iyi anlama katkıları nedeniyle, bu astronom kendi zamanının en saygın zekalarından biri olarak kabul edilir."
 verrier_mathematician: "Matematikçi"
 verrier_mathematician_desc: "Bu karakter bazı olağanüstü matematiksel keşifler yapmıştır ve bu nedenle halk tarafından yüksek takdir görür."
 verrier_physics_tech: "Klasik Fizik"
 verrier_physics_tech_desc: "Fizik, erken modern Avrupalıların deneysel ve nicel yöntemler kullanarak şimdi fizik yasaları olarak kabul edilenleri keşfetmesiyle ayrı bir bilim haline geldi. Bu dönemdeki önemli gelişmeler arasında, Güneş merkezli Kopernik modeli ile geosantrik sistemin değiştirilmesi, gezegenlerin hareket yasalarının (1609-1619 yılları arasında Kepler tarafından belirlenmesi), Galileo’nun 16. ve 17. yüzyıllarda teleskop ve gözlemsel astronomi alanındaki öncü çalışmaları ve Isaac Newton’un hareket yasaları ve evrensel çekim yasalarını keşfetmesi ve birleştirmesi yer alır."
 verrier_astronomy_tech: "Modern Astronomi"
 verrier_astronomy_tech_desc: "18-19. yüzyıllarda Leonhard Euler, Alexis Claude Clairaut ve Jean le Rond d'Alembert’in üç cisim problemini incelemesi, Ay ve gezegenlerin hareketleri hakkında daha doğru tahminler yapılmasını sağladı. Bu çalışmalar, Joseph-Louis Lagrange ve Pierre Simon Laplace tarafından daha da geliştirildi ve gezegenlerin ve uyduların kütleleri, bozunumlarına dayanarak tahmin edilebildi."
 verrier_electromagnetism_tech: "Elektromanyetizma"
 verrier_electromagnetism_tech_desc: "1864’te Edinburgh’lu James Clerk Maxwell, belki de dünyanın elektrik bilgisi açısından en büyük adım olan elektromanyetik ışık teorisini açıkladı. Maxwell’in elektromanyetik ışık teorisi, boşlukta elektrik dalgalarının varlığını içeriyordu ve takipçileri teorinin doğruluğunu deneysel olarak kanıtlamayı görev edindi. Uzayda elektromanyetik dalgaların keşfi, 19. yüzyılın sonlarında radyo teknolojisinin gelişimine yol açtı."
 verrier_chemistry_tech_desc: "Kimyasal bileşimlerin elektrokimyasal teorisinin geliştirilmesi, özellikle iki bilim insanı, Jöns Jacob Berzelius ve Humphry Davy’nin çalışmaları sonucunda 19. yüzyılın başlarında gerçekleşti; bu, Alessandro Volta tarafından icat edilen voltaik pil sayesinde mümkün oldu. İngiliz William Prout, tüm elementleri atomik ağırlıklarına göre sıralamayı önerdi; tüm atomlar, hidrojenin atomik ağırlığının tam katı bir ağırlığa sahipti. J.A.R. Newlands erken bir element tablosu geliştirdi ve bu tablo daha sonra modern periyodik tabloya dönüştü."
 je_verrier_neptune: "Bilinmeyen Gezegen"
 je_verrier_neptune_reason: "1821’de Alexis Bouvard, Uranüs’ün yörüngesine dair astronomik tablolar yayımladı ve Newton’un hareket ve çekim yasalarına dayanarak gelecekteki konumları tahmin etti. Sonraki gözlemler tablolarla önemli sapmalar gösterdi ve Bouvard bazı bozucu bir cisim olabileceğini varsaydığı bir hipotez geliştirdi. Bu düzensizlikler, hem gezegenin ekliptik boylamında hem de yarıçap vektöründe (Güneş’e uzaklığı) çeşitli hipotezlerle açıklanabilirdi: Güneş’in bu kadar uzaktaki çekim etkisi Newton’un tarifinden farklı olabilir; ya da farklar gözlemsel hata olabilir; ya da Uranüs keşfedilmemiş bir gezegen tarafından çekiliyor ya da bozuluyordu. John Couch Adams, bu düzensizlikleri henüz bir lisans öğrencisiyken öğrendi ve bozucu hipoteze ikna oldu. Adams, gözlenen Uranüs verilerini ve Newton’un çekim yasasını kullanarak bozucu cismin kütlesini, konumunu ve yörüngesini çıkarabileceğine inandı. Bu arada 10 Kasım 1845’te Urbain Le Verrier, Paris’teki Académie des sciences’e Uranüs ile ilgili bir makale sundu ve mevcut teorinin hareketini açıklayamadığını gösterdi. Adams’ın çalışmalarından habersiz, benzer bir araştırma yaptı ve 1 Haziran 1846’da Académie’nin halka açık toplantısında ikinci bir makale sundu; burada bozucu cismin konumunu verdi ancak kütle ve yörüngesini açıklamadı. Le Verrier, bilinmeyen gezegeni keşif konumuna bir derece yakın tespit etti. Le Verrier, Adams’ın özel hesaplarının halka açıklanmasının, sözde gezegenin bulunması için İngiliz arayışını başlattığından habersizdi. 31 Ağustos’ta Le Verrier, üçüncü makalesini sundu ve artık yeni cismin kütle ve yörüngesini açıkladı. Artık sadece gök cismini bulmak ve varlığını kanıtlamak kalmıştı."
 je_verrier_neptune_fail: "The nation with the second most astronomical objects will receive a consolation prize. Everyone else's efforts will have been in vain."
 je_verrier_pluto: "Gezegen X"
 je_verrier_pluto_reason: "1840’larda Urbain Le Verrier, Newton mekaniğini kullanarak o zamana kadar keşfedilmemiş olan gezegen Neptün’ün konumunu, Uranüs’ün yörüngesindeki bozulmaları analiz ettikten sonra tahmin etti. 19. yüzyılın sonlarında Neptün gözlemleri, astronomları Uranüs’ün yörüngesinin Neptün dışında başka bir gezegen tarafından da bozulduğu konusunda spekülasyon yapmaya itti. 1906 yılında, 1894’te Arizona, Flagstaff’ta Lowell Gözlemevi’ni kuran zengin Bostonlu Percival Lowell, olası bilinmeyen bir gezegenin peşine düşmek için kapsamlı bir proje başlattı; bu gezegeni 'Gezegen X' olarak adlandırdı. 1909 yılına gelindiğinde Lowell ve William H. Pickering, bu gezegen için birkaç olası göksel koordinasyon önerdi. Lowell ve gözlemevi, Lowell’in 1916’daki ölümüne kadar arayışlarını sürdürdü, fakat sonuçsuz kaldı. Lowell’in haberi olmadan, 19 Mart ve 7 Nisan 1915’te Gezegen X’in iki zayıf görüntüsü gözlemevi kayıtlarına geçmişti, fakat fark edilmedi. Percival’in eşi Constance Lowell, Lowell Gözlemevi ile kocasının mirası üzerinde on yıl süren bir hukuki mücadeleye girişti ve Gezegen X arayışı 1929’a kadar yeniden başlamadı. Gözlemevi müdürü Vesto Melvin Slipher, Gezegen X’i bulma görevini 23 yaşındaki Clyde Tombaugh’a verdi; Tombaugh gözlemevine yeni gelmişti ve Slipher onun astronomi çizim örneklerinden etkilenmişti. Tombaugh’un görevi, gece gökyüzünü sistematik olarak fotoğraf çiftleri halinde çekmek, her çifti incelemek ve herhangi bir nesnenin konumunun değişip değişmediğini belirlemekti. Bir blink karşılaştırıcı kullanarak, fotoğraflar arasındaki nesnelerin hareketini veya değişimini hızlıca gözlemleyerek hareket yanılsaması yaratıyordu. 18 Şubat 1930’da, neredeyse bir yıllık arayışın ardından Tombaugh, fotoğraf plakalarında hareket eden olası bir nesneyi keşfetti."
 je_verrier_pluto_fail: "Eğer başka bir ülke bizden önce gereksinimleri karşılayıp Gezegen X’i keşfederse, tüm çabalarımız boşa gidecek."
 je_verrier_charter_moon: "Ay Haritası Çıkarmak"
 je_verrier_charter_moon_reason: "Selenografi, Ay’ın yüzeyi ve fiziksel özelliklerinin incelenmesidir (Ay coğrafyası veya selenodezi olarak da bilinir). Coğrafya ve areografya gibi, selenografi, gezegen biliminin bir alt dalıdır. Tarihsel olarak selenografların ana görevi, Ay yüzeyini haritalamak ve maria, kraterler, dağ sıraları ve diğer çeşitli özellikleri isimlendirmekti. Ay haritalama 1779’da Johann Schröter’in Ay topografyasını titizlikle gözlemlemesi ve ölçmesiyle sistematik hâle geldi. 1834’te Johann Heinrich von Mädler, 4 sayfadan oluşan ilk büyük Ay haritasını yayımladı ve ardından Evrensel Selenografi’yi yayımladı. Tüm ay ölçümleri, Mart 1840’a kadar doğrudan gözlemle yapıldı; J.W. Draper, 5 inçlik bir reflektör kullanarak Ay’ın daguerreotype fotoğrafını üretti ve böylece astronomiye fotoğrafçılığı tanıttı. Başlangıçta görüntüler çok düşük kalitedeydi, ancak teleskoptaki gelişmeler gibi kısa sürede kalite hızla arttı. 1890’a gelindiğinde, ay fotoğrafçılığı astronominin tanınmış bir alt disiplini hâline gelmişti."
 je_verrier_charter_moon_success: "#G 10#! @verrier_moon_photo! #T ay fotoğrafı#! topladıktan sonra Ay’ın haritasını çıkarabiliriz."
