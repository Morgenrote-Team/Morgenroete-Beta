 verrier.300.t: "Venüs Geçişi"
 verrier.300.d: "Astronomlar, #ORANGE 1874#! yılında Avustralya-Endonezya-Pasifik bölgesinde bir güneş tutulması olacağını öngördüler. [ROOT.GetCountry.GetNameNoFlag]’ın bilim topluluğu, bu ömür boyu bir kez yaşanacak astronomik olayı gözlemlemek için bir [concept_dubois_pacific_expedition] düzenlenmesini istiyor."
 verrier.300.f: "Venüs geçişi, Venüs gezegeninin Güneş’in önünden geçişidir. Bu olay yaklaşık 243 yılda sadece dört kez gerçekleşir. Tarihsel olarak, bu geçişlerin kesin ölçümleri, Dünya ile Güneş arasındaki mesafenin (astronomik birim) belirlenmesinde büyük önem taşır ve önemli enstitüler ile bilim insanları tarafından birçok sefer ve ölçüm kampanyasına yol açmıştır. 1874 geçişi astronomik ölçümler için nispeten elverişsizdi. Avrupa’nın neredeyse tamamından görünmezdi, uzun geçiş süreleri sadece Asya’dan, kısa geçiş süreleri ise Avustralya, Güney Pasifik adaları ve Güney Hint Okyanusu’ndan (özellikle Kerguelen Takımadaları) gözlemlendi. Yine de yaklaşık 60 sefer düzenlendi.\n\n#R Not: Venüs geçişini gözlemleyen bir Pasifik seferinde mutlaka bir [concept_verrier_astronomer] bulunmalıdır.#!"
 verrier.300.g: "Bunu kaçırmamalıyız."
 verrier.301.t: "1874 Venüs Geçişi"
 verrier.301.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#!, Venüs geçişini gözlemleyebildi. [SCOPE.sCharacter('rapanui_scientist').GetFullName] önemli astronomik kayıtlar tuttu ve bilim yıllarca bu verilerle meşgul olacak."
 verrier.301.f: "9 Aralık 1874’te gerçekleşen 1874 Venüs geçişi, 19. yüzyıldaki Venüs geçiş çiftinin ilkiydi. Önceki geçişlerde olduğu gibi, 1874 geçişi de geliştirilmiş ölçümler ve gözlemler için fırsat sundu. Küresel olarak çeşitli noktalar için sayısız sefer planlandı ve gönderildi, birkaç ülke resmi komiteler kurarak planlamayı organize etti. Altı resmi Fransız seferi, beş İngiliz seferi, ABD Kongresi tarafından finanse edilen sekiz sefer, üç Alman seferi (Gazelle seferi dahil) ve iki Meksika seferi vardı. İtalya, Rusya ve Avusturya da bu astronomik olayı gözlemlemek için bir sefer gönderdi. Fransız seferi tarafından çekilen ardışık fotoğraflar, ilk 'film' olarak birleştirildi ve özellikle ünlü oldu. Venüs geçişi, insanlık tarihinin ilk hareketli görüntülerinden biri sayılır."
 verrier.301.g: "Muhteşem bir gösteri."
 verrier.401.t: "Pułtusk Meteor Yağmuru"
 verrier.401.d: "Mazovya’daki insanlar gökyüzünde olağanüstü bir olaya tanık oldular."
 verrier.401.f: "Mazovya’nın kalbinde, Pułtusk kasabası, evrenden gelen bir sırrı saklıyordu. 1868 yılı, soğuk bir kış günü, göksel bir olay gerçekleşti ve bu huzurlu yerleşimi evrenle ebediyen bağladı. 30 Ocak’ta Pułtusk sakinleri günlük rutinlerine devam ederken, parlak bir ışık gökyüzünü deldi. Güneşten daha parlak bir ateş topu gökyüzünde parladı. Tanıklar bunu, ışıklı bir kuyruk bırakan ve gökyüzünü gürültülü bir patırtıyla bölen bir küre olarak tarif ettiler. Meteor olarak tanımlanan bu ateş topu, Dünya atmosferine girerken patlayarak parçalandı. Binlerce parça Pułtusk ve çevresine yağdı ve meteorit taşları yağmuru oluştu. Bu olay, Pułtusk meteor yağmuru olarak bilindi."
 verrier.401.g: "Ne muhteşem bir manzara!"
 verrier.402.t: "Holbrook Meteor Yağmuru"
 verrier.402.d: "Arizona’daki insanlar gökyüzünde olağanüstü bir olaya tanık oldular."
 verrier.402.f: "Gece Holbrook üzerinde çökerken, gökyüzü 19:15 civarında parlak ateş toplarıyla doldu. Boyut ve parlaklıkları değişen yüzlerce meteor, tek bir noktadan çıkarak her yöne dağıldı. Parlak beyaz ve sarı ışık izleri bırakan bu meteorlar, izleyenleri hayran bıraktı. Büyük parçalar, ateşli çekirdekleriyle alt atmosferde daha küçük parçalara ayrılarak kayboldu. Uzaklardan topa benzeyen sesler duyuldu, parçalanmaların enerjisini yansıtıyordu. Başta şaşıran halk, kısa süre sonra göksel gösteriyi izlemek için toplandı. Daha sonra yapılan aramalarda, demir ve nikelden oluşan çok sayıda küçük meteorit parçası bulundu."
 verrier.403.t: "Knyahinya Meteor Yağmuru"
 verrier.403.d: "Doğu Slovakya’daki insanlar gökyüzünde olağanüstü bir olaya tanık oldular."
 verrier.403.f: "Knyahinya meteorit, tarihsel dönemde Avrupa’daki en önemli meteoroid çarpmasıydı. Uzun süre, bu meteorit dünyanın en ağır taş meteoritlerinden biri olarak kabul edildi. Çarpma, 9 Haziran 1866’da Knjahynja kasabasının kuzeyindeki dağlarda saat 16:00-17:00 arasında gerçekleşti. Birçok gözlemci olayı gördü ve sonradan çizimlerle kaydedildi. Meteor, Dünya atmosferine girerken 1.000’den fazla parçaya ayrıldı."
 verrier.411.t: "Cape York Meteorit"
 verrier.411.d: "Jeolog Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName], jeolojik araştırması sırasında önemli bir tesadüfi keşif yaptı. İncelediği garip taş, yapılan titiz inceleme sonucunda uzaydan gelmiş bir malzeme çıktı. Meteoritin boyutu dikkate değer, neredeyse rekor kıracak seviyede."
 verrier.411.f: "Grönland'ın buzlu genişliklerinde, jeolog [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] Cape York meteoritini keşfetti; bu göksel mucize, bilimsel ufkumuzu genişletme vaadi taşıyor. Uzun süredir Inuitler tarafından alet yapımında kullanılan bu büyük demir parçaları, eşsiz Widmanstätten desenleri ve troilit dahilikleri ile Dünya dışı oldukları doğrulandı. 31 metrik tona kadar ağırlığı olan bu meteorlar, güneş sistemimizi oluşturan ilkel maddelere benzersiz bir bakış sunuyor. Bu keşif, erken güneş sisteminin oluşumu hakkında anlayışımızı zenginleştiriyor ve insanlık tarihi ile kozmik olaylar arasındaki derin bağlantıyı vurguluyor. Meteorların bilimsel kurumlara ulaştırılması, detaylı analiz yapılmasına olanak tanıyacak ve evrenin büyük tasarımının gizemlerini aydınlatacak. Bu göksel kalıntıları incelerken, evrenin karmaşık dokusunu ve içindeki yerimizi daha derinlemesine takdir ediyoruz."
 verrier.411.g: "Bu inanılmaz bir keşif!"
 verrier.412.t: "Bacubirito Meteorit"
 verrier.412.f: "Bacubirito meteorit, Meksika’da bulunan en büyük meteorit. 1863 yılında jeolog Gilbert Ellis Bailey tarafından Sinaloa de Leyva yakınlarındaki Ranchito köyünde bulundu. Demir meteorit olup ağırlığı 20 ila 22 ton arasında. Ölçüleri 4,25 metre uzunluğunda, 2 metre genişliğinde ve 1,75 metre yüksekliğinde."
 verrier.413.t: "Mundrabilla Meteorit"
 verrier.413.f: "Mundrabilla meteorit, Batı Avustralya’daki Nullarbor Ovası’na düşen bir demir meteorit ve Dünya atmosferinde parçalanmış. Meteor yağmuru etkisinin birkaç milyon yıl önce gerçekleştiği tahmin ediliyor. Toplam ağırlığı 24 ton olup, dünyanın en büyük meteor keşiflerinden biri. Dünyaya düşmesinin 60 milyon yıl önce olduğu düşünülüyor, bu da onu bilinen en eski meteorlerden biri yapıyor."
 verrier.414.t: "Willamette Meteorit"
 verrier.414.f: "Willamette, ABD Oregon eyaletinde resmi olarak 1902 yılında keşfedilen bir meteoritin adıdır. Ancak birkaç bin yıl önce zaten Dünya’ya düşmüştü. Keşfi sırasında dünyadaki üçüncü en büyük meteorit olarak kabul edilmiş, günümüzde altıncı sırada. Ağırlığı 15,5 ton. Son 13.000 yılda hava koşulları nedeniyle 6 tona kadar meteoritin kaybolduğu hesaplanmış. Willamette Meteorit, modern West Linn şehri yakınlarındaki Willamette Vadisi’nden alınmadan çok önce Clackamas halkı tarafından kutsanmış. 1902 yılında Ellis Hughes, meteoritin önemini fark eden ilk Avrupalı yerleşkeci olmuştur."
 verrier.415.t: "Hoba Meteorit"
 verrier.415.f: "Hoba meteorit, günümüze kadar keşfedilen en büyük meteorit. Namibya’daki Otavi Dağları’nda, Grootfontein’in 20 km batısındaki 'Hoba' çiftliği arazisinde bulunuyor. Ağırlığı 50 ila 60 ton arasında değişiyor. Orijinal boyutları 2,70 x 2,70 x 0,90 metre. Demir meteorit yaklaşık 80.000 yıl önce Dünya’ya çarptı ve hâlâ orijinal konumunda. Tahmini yaşı 190 ila 410 milyon yıl."
 verrier.421.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName], Meteorları incelemek istiyor"
 verrier.421.d: "Astronomumuz [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName] sayesinde, meteorit düşüşünden birkaç gün sonra birçok parça kurtarıldı. Bu buluş, evrenin bazı gizemlerine ışık tutabilir - ancak Dr. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName], bulduğu parçaları saklamakta ısrar ediyor."
 verrier.421.f: "Victoria Dönemi’nin coşkusu ortasında, astronom gökyüzüne yöneldi ve meteorit parçalarının keşfine yol açtı. Keskin gözlem yeteneği ve metodik yaklaşımı, bu göksel kalıntıları toplamasına ve incelemesine olanak sağladı. Her parça titizlikle analiz edildi ve meteoritlerin bileşimi ile kökenleri hakkında daha derin bir anlayış kazandırdı. Çalışması, doyumsuz merak ve evrenin gizemlerini çözme isteğiyle hareket eden Victoria bilim tutkusunun bir örneğini temsil ediyor."
 verrier.421.g: "Tüm parçalar Bilim Akademisi’ne teslim edilmeli!"
 verrier.421.h: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName], meteorlardan birini inceleyebilir."
 verrier.422.t: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName], Meteorları analiz etmek istiyor"
 verrier.422.d: "Ülkenin önde gelen kimyageri Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName], hükümete, yakın zamanda bulunan meteoritin araştırılmasını talep etti. Ayrıca meteorit, laboratuvarında güvende saklanıyor, tehlikeli kasadan daha güvenli."
 verrier.422.f: "'Dünya dışı malzeme! Bilinmeyen bir mesafeden! Bu, meteoritin kimyasal bileşimini ayrıntılı olarak incelemek için bilimsel bir sensasyon ve eşsiz bir fırsat.'"
 verrier.422.g: "Neden her akademisyen benim meteoritimi almak için koşturuyor?"
 verrier.422.h: "Buna eminim, kimyayı ileri taşıyacak."
 verrier.1013.f: "Ünlü [concept_verrier_astronomer] Georgios Konstantinos Vouris, yeni kurulan Üniversite’nin ilk birkaç Yunan öğrencisine ders veriyordu. Yunanistan’da öğrenim ve ilerleme çağı başlamak üzereydi.\n\n#b Tarihsel Bilgi:#! Üniversite 1836’da planlandı ve 3 Mayıs 1837’de resmen kuruldu. Ana kara Yunanistan’daki ilk üniversiteydi. Ana Bina 1841’de tamamlandığında, üniversite yeni binaya taşındı. Üniversitenin kanatlarının inşası 1864’e kadar sürdü. Othóneion Panepistímion daha sonra Otto’nun 1862’de bir darbeyi takiben Yunanistan’dan kaçmak zorunda kalması üzerine Ulusal Üniversite olarak adlandırıldı.\n\nGünümüzde Atina Ulusal ve Kapodistrian Üniversitesi, Yunanistan’ın önde gelen üniversitelerinden biridir. Üniversitenin iki mezunu (her ikisi de şair) eserleriyle Nobel Ödülü kazanmış ve on beş Yunan başbakanı ile üç Yunan cumhurbaşkanı burada eğitim görmüştür."
