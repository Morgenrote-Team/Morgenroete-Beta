 verrier.161.t: "Yeryüzünden Koparılmış"
 verrier.161.d: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], Ay'ın bir zamanlar Dünya'nın bir parçası olduğunu ve gezegenin erken dönemindeki hızlı dönme ve gelgit kuvvetleriyle ayrıldığını öne süren yeni bir teori ortaya koydu."
 verrier.161.f: "Geniş kabul gören Kant-Laplace modeliyle çelişen bu görüş — Dünya ve Ay'ın dönen bir gaz bulutundan eş zamanlı oluştuğunu öne sürer — Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], Ay'ın Dünya'nın dış katmanlarından aşırı dönme hızı nedeniyle fırlatıldığını ileri sürüyor. Teori, gelgit dinamiklerine dayanıyor ve Dünya-Ay sisteminin açısal momentumunu koruduğunu, böyle bir olaya uygun olacağını öne sürüyor. Ay'ın görece düşük yoğunluğu ve Dünya'nın dış katmanlarına benzer bileşimi, onun yüzeye yakın bir yerden kaynaklandığı fikrini destekliyor. Fiziksel örnekler bulunmasa da model, Ay'ın yörüngesi ile Dünya'nın yavaşlayan dönüşü arasındaki yakın bağlantıyı mekanik olarak açıklıyor."
 verrier.161.g: "Büyüleyici."
 verrier.162.t: "Esir Ay"
 verrier.162.d: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], Ay'ın Dünya ile birlikte oluşmadığını, başka bir yerde oluşup Dünya'nın yerçekimi tarafından yakalandığını öne süren cesur bir hipotez ortaya koydu."
 verrier.162.f: "Mevcut eş-oluşum modellerinden saparak, Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], Ay'ın bir zamanlar bağımsız bir gök cismi olduğunu savunuyor. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] hesaplamalarına göre, yerçekimi kuvvetleri — muhtemelen erken atmosfer sürtünmesi veya üçüncü bir cismin etkisiyle desteklenmiş — Ay'ı, her iki cisim zaten oluşmuşken Dünya yörüngesine çekmiş olabilir. Bu, Ay'ın eğimli yörüngesini ve farklı hareketini açıklıyor, ancak eleştirmenler böyle bir yakalamanın hassas koşullar olmadan dinamik olarak istikrarsız olacağını belirtiyor. Gerekli enerji kaybını açıklayan bir mekanizma henüz yok. Yine de teori, geleneksel görüşlere cesur bir meydan okuma olarak ilgi çekiyor."
 verrier.162.g: "Spekülatif, ama incelenmeye değer."
 verrier.163.t: "Zamanın Şafağında Çarpışma"
 verrier.163.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], Ay'ın Dünya'nın en erken dönemlerinde yaşanan şiddetli bir çarpışma sonucu Dünya'dan fırlayan maddelerden oluştuğunu öne süren cesur bir jeolojik hipotez sundu."
 verrier.163.f: "Mevcut ay kökeni teorilerindeki çelişkilerden hayal kırıklığına uğrayan Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], dramatik bir alternatif öneriyor. Dünya'nın oluşum evresinde, küçük veya gezegen ölçeğinde olmayan ama yeterince büyük bir gök cismi, gezegene eğik bir açıyla çarptı. Ortaya çıkan moloz, çoğunlukla Dünya'nın dış katmanlarından, yörüngeye girerek zamanla Ay'ı oluşturacak şekilde birleşti. Bu senaryo, Ay'ın daha düşük yoğunluğu, Dünya'nın manto katmanına olan benzerliği ve Dünya-Ay sisteminin olağan dışı momentumuyla uyumlu. Fikir spekülatif ve kanıtlaması zor olsa da, jeolojik akıl yürütmeyi gök mekaniğiyle birleştirmesi ve gezegen oluşumunu yavaş uyum yerine çarpışma süreci olarak ele alması açısından dikkat çekici."
 verrier.163.g: "Bu teori, gezegen bilimini yeniden şekillendirebilir."
