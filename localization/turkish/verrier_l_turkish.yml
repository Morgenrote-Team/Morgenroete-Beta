 je_verrier_venus_transit_1882_tt: "1882 #V Venüs Geçişi#! [GetPlayer.GetName] Günlüğüne eklendi"
 verrier.308.t: "1874 Venüs Geçişi"
 verrier.308.d: "Gökbilimciler, Avustralya-Endonezya-Pasifik bölgesinde #ORANGE 1874#! yılında bir Venüs geçişi öngördüler. [ROOT.GetCountry.GetNameNoFlag] bilim camiası, bu bir kez yaşanacak astronomik olayı gözlemlemeyi talep ediyor."
 verrier.308.f: "Venüs geçişi, Venüs gezegeninin Güneş'in önünden geçmesidir. Bu olay yaklaşık 243 yılda sadece dört kez meydana gelir. Tarihsel olarak, bu geçişlerin hassas ölçümü, Dünya ile Güneş arasındaki mesafenin (astronomik birim) belirlenmesi açısından büyük öneme sahipti ve birçok önemli enstitü ve bilim insanı tarafından düzenlenen sefer ve ölçüm kampanyalarına yol açtı. 1874 Venüs geçişi, astronomik ölçümler için nispeten elverişsizdi. Avrupa'nın hemen tamamından görünmedi; uzun geçiş süreleri yalnızca Asya'dan, kısa geçiş süreleri ise Avustralya, Güney Pasifik adaları ve Güney Hint Okyanusu'ndan (özellikle Kerguelen Takımadaları) gözlemlendi. Yine de yaklaşık 60 sefer gönderildi."
 verrier.308.g: "Bunu kaçırmamalıyız."
 verrier.309.t: "1882 Venüs Geçişi"
 verrier.309.d: "Gökbilimciler, Güney Amerika, Orta Amerika ve Kuzeydoğu Amerika bölgeleri için #ORANGE 1882#! yılında başka bir Venüs geçişi öngördüler. [ROOT.GetCountry.GetNameNoFlag] bilim camiası, bu bir kez yaşanacak astronomik olayı gözlemlemeyi talep ediyor."
 verrier.309.f: "Venüs geçişi, Venüs gezegeninin Güneş'in önünden geçmesidir. Bu olay yaklaşık 243 yılda sadece dört kez meydana gelir. Tarihsel olarak, bu geçişlerin hassas ölçümü, Dünya ile Güneş arasındaki mesafenin (astronomik birim) belirlenmesi açısından büyük öneme sahipti ve birçok önemli enstitü ve bilim insanı tarafından düzenlenen sefer ve ölçüm kampanyalarına yol açtı. 1882 Venüs geçişi, 1874 geçişine göre bazı avantajlara sahipti; daha erişilebilir bölgelerden gözlemlenebiliyordu. Böylece geçiş, Kuzey Amerika'nın kuzey ve kuzeydoğusu dışında tüm Amerikan kıtasında görünüyordu."
 verrier.311.t: "Venüs Geçişi Hazırlıkları"
 verrier.311.d: "Nadir bir astronomik olay yaklaşıyor: Venüs gezegeni Güneş'in yüzeyinden geçecek. Dünyanın dört bir yanında gözlemevleri ve hükümetler hazırlıklara başladı."
 verrier.311.f: "Tarih saniyeye kadar hesaplandı. Teleskoplar paketleniyor. Saatler senkronize ediliyor. Venüs, Güneş'in önünden geçecek. Gökbilimciler, geçişin astronomik birimin — güneş sisteminin temel ölçeği — hassas ölçümünü sağlayacağını düşünüyor. Ama başarının tamamı görünürlüğe bağlı — konum, hava ve koordinasyona."
 verrier.311.g: "Geçişi evimizden gözlemliyoruz."
 verrier.311.h: "Bir koruyucumuzdaki bölgeye sefer gönderiyoruz."
 verrier.311.i: "Uzak bir diyara sefer gönderiyoruz."
 verrier.311.j: "Bunu tekrar düşünmeliyiz."
 verrier.319.t: "Yabancı Gözler Gökyüzünde"
 verrier.319.d: "[SCOPE.sCountry('verrier_venus_transit_leader').GetName]’den bir sefer, Venüs geçişi gibi nadir bir astronomik olayı gözlemlemek için bölgemize geldi."
 verrier.319.f: "Gemiden lensler, saatler ve haritalar ile indiler. Sözcüleri üniversite yetkilileriyle görüştü, dostane yazışmalar ve teknik brifingler sundu. Gözlemevi asistanları meraklı, gazeteler nötr ama dikkatli.\n\nÇeşitli departmanlar tartışıyor: bilimsel iş birliği evet — ama veri paylaşımı, lojistik egemenlik ve dünya sahnesinde görünürlük de önemli."
 verrier.319.g: "Bilim ortak dilimiz olsun."
 verrier.321.t: "Geçişte Fırtına"
 verrier.321.d: "Geçiş sırasında sefer gemisini şiddetli bir fırtına vurdu. Çarpan dalgalar ve kaotik donatılar arasında birkaç kasa güverteden koparak denize düştü — hassas geçiş aletleri dahil."
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] göğe bakarken küpeye tutundu. Deniz bir düşman gibi yükselmiş, ipleri ve fıçıları güverteye savuruyordu. Kasalar — ikisi — korkunç bir yay çizerek kayboldu.\n\nFırtına geçip yalnızca sessizlik kaldığında hasar sayıldı. Ana heliometre. Königsberg'den çift mercek. Birkaç hassas saat.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], ıslanmış ekip ve kırık tahtalar arasında durdu, ekipmanın olduğu boşluğa bakarak. Yedekler vardı. Ama hiçbiri kusursuz değildi.\n\nVe zaman — Venüs gibi — kimseyi beklemez."
 verrier.321.g: "Devam edin. Hâlâ işleme yetecek kadar malzememiz var."
 verrier.322.t: "Beklenmeyen Işıklar"
 verrier.322.d: "Gece yıldız alanı kalibrasyonu sırasında, seferin gökbilimcisi düzensiz hareketler ve olmaması gereken sabit noktalar fark etti. Mevcut yıldız haritalarıyla karşılaştırma yaptı: ekip yeni, haritalanmamış gök cisimlerini tespit etmiş olabilir."
 verrier.322.f: "Gemi, kadife gibi bir gökyüzünün altında sürükleniyordu. Bulutlar saatler önce dağılmış, geriye doğal olmayan bir berraklık bırakmıştı. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] tekrar dürbüne eğildi. Orada — Altair ile sekstant ızgarasının kenarı arasında — bir hareket vardı. Bir kuyruklu yıldız için çok yavaş. Hata için çok sabit.\n\nGece gecesine, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] aynı gökyüzü parçasına geri dönerek, çizimler yaptı, hesapladı, karşılaştırdı. Nihayet, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] notları doğruladı: küçük bir gezegen cismi. Belki iki. Kataloglanmamış.\n\nVenüs bekleyecekti. Ama yıldızlar zaten başka bir şey sunmuştu."
 verrier.322.g: "Bilinsin ki: gökyüzü hâlâ sırlarla dolu."
 verrier.323.t: "Yıldızlar Arasında Bir Bahçe"
 verrier.323.d: "Sefer sırasında verilen bir molada, ekip karaya çıkarak astronomik gözlem için uygun yükseltileri araştırdı. Ancak buldukları, mevcut botanik kayıtlarında yer almayan yabancı bitkilerden oluşan bir koruluk oldu."
 verrier.323.f: "Her şey bir koku ile başladı. Hafif, narenciye keskinliğinde, orman kenarındaki eğrelti otlarından yükseliyordu. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], kokuyu yoğun çalılıkların arasından takip ederek ışığın su gibi toplandığı bir açıklığa ulaştı.\n\nOrada, derin mor çiçekler mükemmel spiral şeklinde açıyordu. Kırmızı yosun obsidyen renkli taşları kaplamıştı. Yüksekte, sarkan yıldız şekilli sarmaşık kümeleri rüzgârda sallanıyordu. Hiçbirinin adı bilinmiyordu.\n\nGenç asistanlardan biri fısıldadı: 'Sanki gökyüzü yere düşmüş.'\n\nOnlar Venüs gezegenini gözlemlemeye gelmişlerdi. Ama burada, durgun havada ve süzülen ışıkta, bambaşka bir hayranlık buldular."
 verrier.323.g: "Örnekleri toplayın ve inceleme için muhafaza edin."
 verrier.324.t: "Zamanın Ötesindeki Taş"
 verrier.324.d: "Yükseltilmiş bir gözlem yeri ararken, ekip büyük jeolojik ilgi taşıyan bir alan keşfetti. Etrafındaki taşlar, nadiren — hatta belki de hiç — görülen desenler ve inklüzyonlar barındırıyordu."
 verrier.324.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], kayalığın katmanlı yüzeyine elini sürttü. Sabah ışığında hafifçe parlıyordu, metalik çizgilerle çatlamıştı. Derin yeşil girdaplar turuncu kristal çekirdeklerin etrafında dolanıyor, neredeyse kasıtlı gibi bir desen oluşturuyordu.\n\nYakındaki başka bir levha, içi boş ve hâlâ sağlam bir fosilleşmiş kabarcığı ortaya çıkardı. Ekibin bir jeoloğu bunun volkanik kökenli olduğunu düşündü. Başka biri başını salladı: 'Bu, gördüğüm her şeyden daha eski.'\n\nYanlarında getirdikleri aletler gökyüzünü gözlemlemek için yapılmıştı. Ama burada, ayaklarının altındaki kayada, Dünya'nın derin hafızasından bir parça vardı."
 verrier.324.g: "Bu keşif, Dünya'nın kendi hikayesine aittir."
 verrier.325.t: "Gökyüzünün Altındaki Engeller"
 verrier.325.d: "Sefer, liman girişine ulaştı — ancak gümrük yetkilileri derhal geçişe izin vermiyor. Birkaç kutu bilimsel ekipman inceleme için alıkonmuş ve memurlar, daha önce hiç gerek olmayan ek belgeler talep ediyor."
 verrier.325.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], kargo manifestosunun yanında durdu, dişlerini sıktı. Cıva mercekler, hassas saatler, parlatılmış pirinç muhafaza — hepsi kilitli bir kapının arkasındaki depoda duruyordu, mürekkep ve damgayı bekliyordu.\n\nGümrük memuru kibar ama kararlıydı: 'Bilimsel olsun ya da olmasın, tüm yabancı aletler bildirilip, incelenmeli ve vergiye tabi tutulmalıdır, aksi halde muafiyet yoktur.'\n\nAnlaşmalar için zaman yoktu.\n\nDışarıda güneş hâlâ yükseliyordu. Ve Venüs, bürokrasiyi beklemeyecekti."
 verrier.325.g: "Ücreti ödeyin ve geçişi hızlandırın."
 verrier.340.t: "Venüs Geçişi İçin Gözlemevi Hazır"
 verrier.340.d: "Haftalar süren hazırlıkların ardından, Venüs geçişi için gözlem noktası tamamlandı. Aletler kalibre edildi. Haritalar doğrulandı. Şimdi tek bilinmeyen gökyüzü."
 verrier.340.f: "Kubbe, pirinçten yapılmış bir deniz feneri gibi yükseldi, sessiz bir amaçla. İster kendi topraklarında taşla, ister yabancı bir yerde bez ve perçinle inşa edilmiş olsun, şimdi beklentinin nefessiz sessizliğini barındırıyordu. İçeride heliometre lambanın ışığında parlıyordu. Dişliler fısıltıyla dönüyordu. Zamanlayıcılar heyecanla tıklıyordu. Dışarıda asistanlar lenslerden tozu süpürüyordu. Hava bile duraksıyor gibiydi. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] kapıda durdu ve eşik noktasına dokundu. Aylarca her şey bu ana doğru ilerlemişti. Artık inşa edilecek bir şey kalmamış, sadece beklemek kalmıştı. Yukarıda, görünmez gökyüzünde bir yerde, Venüs yolunu takip ediyordu."
 verrier.340.g: "Hassasiyet, sakin ellerle başlar."
 verrier.341.t: "Sessiz Ayar"
 verrier.341.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], ana teleskobun iç stabilizatöründe küçük ama önemli bir değişiklik önermiştir. Bu modifikasyon, iç titreşimi azaltabilir ve temas anında optik keskinliği artırabilir."
 verrier.341.f: "Bu, kubbede değil, arkasındaki atölye çadırında gerçekleşti. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], haritalara bakarken Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] yaklaştı, yağla lekelenmiş bir not defteri tutuyordu. Yeniden hesaplanmış tampon gerilimi. İç pirinç halka için yeniden destek.\n\nDiğerleri saygılı bir şüpheyle dinledi — ta ki testler kanıtlayana kadar: görüntü, birkaç derece daha sabit oldu. Bulanıklık ile netlik arasındaki çizgiyi değiştirecek kadar."
 verrier.341.g: "Küçük bir değişiklik, büyük hassasiyet."
 verrier.342.t: "Netliğin Denklemi"
 verrier.342.d: "Elektromanyetik teoriye dair yakın tarihli bir atılım, teleskobun gözlem protokolüne yeni bir optik filtreleme yöntemi uygulanmasını sağladı. Atmosfer ışığı saçılımının neden olduğu girişim artık daha iyi hesaba katılabiliyor — sonuç olarak görsel veriler daha net."
 verrier.342.f: "Fikir ne kubbeden ne mercek üreticisinin tezgahından geldi, bir sayfadan çıktı. Bu, dalga denklemlerinin bir iyileştirilmesiydi — ışığın yalnızca parçacık veya ışın olarak değil, salınan bir alan olarak nasıl davrandığı. Bununla, girişim için yeni bir model öngörülebilir ve bir düzeltme uygulanabilirdi. Filtreler yeniden kesildi. Pozlama süreleri ayarlandı. Mühendisler şüphelerini tekrar kontrol etti.\n\nO gece Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] test merceğinden bakınca, yıldızlar artık titremiyordu. Duruyorlardı — hassas, soğuk, gerçek. Gökyüzü titremeyi bırakmıştı."
 verrier.342.g: "Matematik gözleri keskinleştirir."
 verrier.351.t: "1874 Geçişi"
 verrier.351.d: "Kıtalar ve okyanuslar boyunca, Yokohama’dan Réunion’a, Kerguelen’den Pekin’e, gökbilimciler Venüs’ün Güneş’in yüzeyinden geçişini izlediler. 1874 geçişi tamamlandı — ve birçok ekip başarı bildirdi."
 verrier.351.f: "Buharlı gemilerle, develerle, demiryoluyla ve yürüyerek geldiler. Mühendisler, botanikçiler, haritacılar. Ormanlarda ve çöllerde gözlemevleri kurdular. Hava durumunu incelediler, gölgeleri zamanladılar, mercekleri öylesine parlatıp titrettiler ki elleri titreyecekti.\n\nVe altı saat boyunca, 9 Aralık 1874’te, siyah bir noktanın Güneş diski üzerinde kaymasını izlediler.\n\nVenüs fısıltı gibi girdi ve sır gibi çıktı. Ölçümler mükemmel değildi, ama yeterliydi. Üçgenleme başlayabilirdi. İnsanlık, güneş sisteminin gerçek ölçeğini — mit veya mecaz değil, gölgelerle izlenen sayılarla — ilk kez öğrenebilirdi. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] defterini kapattı ve nefesini verdi: İş tamamlanmıştı."
 verrier.351.g: "Ne kadar güzel"
 verrier.352.t: "1882 Geçişi"
 verrier.352.d: "6 Aralık 1882’de Venüs bir kez daha Güneş’in önünden geçti. Yüzyılın son kez, gözlemciler dünya çapında aletlerini gökyüzüne çevirdiler — ve Venüs’ün siyah diskini uçuşta kaydettiler."
 verrier.352.f: "Bu kez gemiler daha erken ayrıldı. Gözlemevleri daha sağlamdı. Saatler daha hassastı. 1874’te öğrenilen dersler her ele, her gölgeye, her hesaba rehberlik etti.\n\nNew Jersey’den Patagonya’ya, Meksika’dan Avustralya’ya, dünya bir nokta için durdu.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] son filtreyi ayarladı. Disk göründü — yavaşça parlayan beyazın üzerinden kayıyor. Alkış yoktu, sadece kalemlerin hışırtısı, deklanşörlerin tıkırtısı, sessiz bir zafer nefesi. Venüs’ün bir sonraki dönüşü 121 yıl sonra olacaktı. Ama burada, bu anda, zaman ölçülmüştü."
 verrier.352.g: "Bir sonraki geçişi asla göremeyeceğiz."
 verrier.353.t: "Işık Perdelerinden"
 verrier.353.d: "Uzun zamandır beklenen an yaklaşırken, hava koşulları bozulmaya başlıyor. Bulutlar geliyordu — her şeyi örtmek için yeterince kalın değil, ama berraklık ve zamanı bozacak kadar vardı."
 verrier.353.f: "Gökyüzü tamamen kapanmamıştı, ama artık itaat etmiyordu. Sürüklenen bulut tabakaları güneşin üzerine tül gibi yayıldı. Işık düzensiz pulslarla soldu ve parladı. Her mercek denge için, her asistan nefes için mücadele etti.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] gözünü filtreden ayırmadı. Venüs’ün silueti belirdi — soluk, kırılmış, buhar ve hesaplama arasında dans ediyor.\n\nTemiz bir yay değildi. Ders kitabı gözlemi değildi. Ama veriydi. Zor kazanılmış veri, kaprisli gökyüzü altında."
 verrier.353.g: "Gökyüzü parçalar veriyorsa, onları birleştirmeliyiz."
 verrier.354.t: "Hareket Eden Gölge"
 verrier.354.d: "Venüs geçişi sırasında, bir gözlemci ekibi yalnızca hassas veri değil, görüntü de yakaladı. Düzinecece fotoğraf plâkası sıralı olarak pozlandı ve daha sonra hareket halinde birleştirildi. Tarihte ilk kez, bir gezegen geçişi film olarak kaydedildi."
 verrier.354.f: "Titriyor. Titriyor. Ama hareket ediyor. İşlenmiş plâkalar üzerinde, Venüs kenardan giriyor, Güneş diski üzerinde kayan mükemmel siyah bir nokta. Sadece bir hesaplama değil, sadece bir eskiz değil — hareket. Zamanda yakalanmış. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] karanlık odada durdu, feneri havaya kaldırdı, kısa diziyi tekrar tekrar izledi. Altı saatlik ölçüm, birkaç saniyelik hayranlıkta yoğunlaştı. Gökbilimciler alkışladı. Yeni bir şey yaptıklarını biliyorlardı. Gökyüzünü hareket ettirmişlerdi."
 verrier.354.g: "Gezegen hareketi modellerini geliştirmek için kareleri analiz edin."
 verrier.355.t: "Venüs’ün Yürüyüşü"
 verrier.355.d: "1882 Venüs geçişi etrafında dünya çapında yaşanan heyecandan ilham alan [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName], yeni bir törensel parça yazdı. Geniş bir izleyici kitlesi önünde prömiyerini yaptı; marş hem olayın ihtişamını hem de yeni bir bilim yüzyılının ritmini yansıtıyordu."
 verrier.355.f: "1882 Venüs Geçişi’nden bir yıl sonra, John Philip Sousa, 1878’de ölen Amerikalı fizikçi Joseph Henry’nin bronz heykelinin açılışı için bir geçit marşı bestelemesi amacıyla görevlendirildi. Mason olan Sousa, grup tarafından doğal olaylarda mistik görülen niteliklerle ilgileniyordu. Parça Sousa’nın yaşamı boyunca popüler olmadı. Birçok yıl çalınmadı, çünkü müzik el yazmaları bir selde yok olmuştu."
 verrier.355.g: "Bazı müzikler kalabalıklar için değil, tarih için yazılır."
