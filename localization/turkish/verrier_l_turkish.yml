 je_verrier_venus_transit_1874: "[SCOPE.sCountry('target').GetName]’de 1874 Venüs Geçişi"
 je_verrier_venus_transit_1874_reason: "Nadir bir gök olayı yaklaşıyor. Venüs gezegeni, Dünya ile Güneş arasında doğrudan geçerek küçük gölgesini güneş diski üzerine düşürecek. Dünya çapındaki gözlemevleri, bu kısa süreli olayı gözlemlemeye hazırlanıyor; bu gözlemler, güneş sistemimizin ölçeğinin belirlenmesine yardımcı olabilir.\n$mr_divider_for_je$\nBu sefer sırasında başarı şansı kazanacaksınız. Seferin sonunda bir modifikatör elde edeceksiniz. Başarı şansınız ne kadar yüksek olursa, modifikatörden alacağınız etki o kadar büyük olur.\n#V Mevcut Başarı:#! [GetPlayer.MakeScope.Var('verrier_venus_transit_success_var').GetValue|0+]"
 je_verrier_venus_transit_1874_on_complete_tt: "Sefer sonunda #n %25 kötü hava ihtimali#! vardır ve bu, başarı değerini düşürecektir. Seferin sonunda bir #V modifikatör#! kazanacaksınız ve bu #V başarı değerine göre belirlenecektir#!."
