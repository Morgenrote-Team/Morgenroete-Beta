 verrier.55.t: "Karanlık Yüz"
 verrier.55.d: "Şanslı ve yetenekli Astronomumuz, Ay’ın Libration’ını fotoğraflamayı başardı!"
 verrier.55.f: "Bu ince bir ayrıntıdır, neredeyse farkedilmez, ancak Ay, Dünya’ya bakan yüzüyle tam olarak kilitlenmiş değildir. Yörüngesindeki düzensizlikler, aksi takdirde bilinmez olan uzak yüzü hafifçe görmemizi sağlar; Ay’ın en iyi saklanan sırları hakkında değerli ipuçları sunar. Böyle görüntüleri fotoğraflamak, çoğunlukla şansla ilgilidir; saatlerce yalnız başına kamera ile oturup mükemmel anı yakalamak için sürekli dua etmek gerekir.\n\nAma doğru şekilde yapılırsa, Ay’ın daha önce tarih boyunca hiç görülmemiş bir kısmını görebilirler."
 verrier.55.g: "Bir gün, Ay’ın arka yüzünü tamamen göreceğiz."
