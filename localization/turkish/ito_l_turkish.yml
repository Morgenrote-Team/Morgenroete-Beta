l_turkish:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetName] does not have an active [concept_dubois_botanical_expedition].#!"
 je_ito_botanical_expedition: "Botanik Keşif"
 je_ito_botanical_expedition_reason: "Your [concept_dubois_naturalist] is currently on a [concept_dubois_botanical_expedition] to gather [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] and new [Concept('concept_dubois_specimen','$concept_dubois_specimens$')].\n$mr_divider_for_je$\nEach month the Expedition will gain progress towards gathering [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]. Over a Botanical Expedition, a maximum of 10 [concept_ito_medicinal_plants] can be gathered\n\nAdditionally the expedition will yield [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] each month and has a chance of events that will add additional [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] or even special plants.\n$mr_divider_for_je$\nCurrent yield of the Expedition: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\nEstimated monthly yield: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "The $ito_botanical_expedition_progress_bar$ bar has reached #V 12#!."
 ito_botanical_expedition_progress_bar: "Sefer İlerlemesi"
 ito_botanical_expedition_progress_bar_desc: "Expedition Progress: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/12)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "Aylık İlerleme"
 ito_naturalist_is_dead_tt: "#default_text Bir [concept_dubois_naturalist] yok."
 dubois.390.t: "Botanik Keşif Döndü"
 dubois.390.d: "Our [concept_dubois_botanical_expedition] led by [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] has returned. In total they gathered [SCOPE.GetValue('medicinal_herbs_scope_value')|0+] [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] and  @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*0+] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 dubois.390.f: "\"Burada henüz kimsenin sahiplenmediği büyüleyici bir bitki buldum! Ona [SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]a adını vereceğim!\""
 dubois.390.g: "Tekrar hoş geldiniz!"
 ito_total_specimen_collected_on_expedition_tt: "A total of @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] have been collected on this [concept_dubois_botanical_expedition]."
