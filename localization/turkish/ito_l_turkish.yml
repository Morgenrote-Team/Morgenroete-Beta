 ito_state_trait_madagascar_forest: "Madagascar Rainforest"
 je_ito_improve_forestry_project: "Improve Forestry"
 je_ito_improve_forestry_project_reason: "Your [concept_dubois_naturalist] Dr. [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] focuses on improving the production of the [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches 24 the current building will receive a new modifier. Once all chosen buildings for this project have the modifiers, the project ends.\nThere is a total number of 3 modifiers. Each new modifier needs the progress to fill up again.\nOnce a [GetBuildingType('building_logging_camp').GetName] has all modifiers you will also gain #p 500#! @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')].\n$mr_divider_for_je$\nCurrent Building: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_3_type')]\n\nTotal Remaining Buildings (excluding current): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n$concept_dubois_specimens$ from Project: [JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0] @dubois_specimen!\n\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('ito_naturalist_improvement_project_progress_value')|+2] #!#!"
