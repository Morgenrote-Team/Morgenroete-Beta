l_turkish:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetName] aktif bir [concept_dubois_botanical_expedition] yürütmüyor veya şu anda #V nereye göndereceğini seçiyor#!.#!"
 je_ito_botanical_expedition: "Botanik Keşif"
 je_ito_botanical_expedition_reason: "[concept_dubois_naturalist] şu anda yeni [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] toplamak için bir [concept_dubois_botanical_expedition] üzerinde.\n$mr_divider_for_je$\nSefer, her ay [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sağlayacak ve ek [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] veya özel bitkiler getirebilecek olaylar yaşanma ihtimali olacak.\n$mr_divider_for_je$\nMevcut Sefer verimi: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\nTahmini aylık verim: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "The progress bar has reached #V 24#!."
 ito_botanical_expedition_progress_bar: "Sefer İlerlemesi"
 ito_botanical_expedition_progress_bar_desc: "Sefer İlerlemesi: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/24)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "Aylık İlerleme"
 ito_naturalist_is_dead_tt: "#default_text Bir [concept_dubois_naturalist] yok."
 dubois.390.t: "Botanik Keşif Döndü"
 dubois.390.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] liderliğindeki [concept_dubois_botanical_expedition] döndü. Toplamda @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] topladılar."
 dubois.390.f: "\"Burada henüz kimsenin sahiplenmediği büyüleyici bir bitki buldum! Ona [SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]a adını vereceğim!\""
 dubois.390.g: "Tekrar hoş geldiniz!"
