 je_group_theiler_biology: "Morgenröte: [concept_theiler_biology]"
 je_theiler_microorganism_research_reason: "Microorganism Research"
 je_theiler_microorganism_research: "Doctor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is currently investigating the wondrous world of microorganisms. Depending on his skills and the microscope used, [ROOT.Var('theiler_biologist_var').GetCharacter.GetSheHe] will discover new microorganisms every month. A comprehensive knowledge of microorganisms is essential for detecting [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')].\n\nIf our [concept_theiler_biologist] hasn't yet acquired this skill, there's also the possibility that Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] will acquire the $theiler_microbiologist$ trait."
 theiler_biologist_dies_tt: "The Journal Entry will fail if the [concept_theiler_biologist] dies."
 je_theiler_microscope_achromatic: "Achromatic Microscope"
 je_theiler_microscope_achromatic_reason: "Ernst Abbe developed an advanced achromatic microscope in the 1870s, which significantly improved image clarity and resolution through precise optical design. His work at Carl Zeiss laid the foundation for modern scientific microscopy and standardized lens construction.\n\nBetter microscopes enable more successful observation of [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and other [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]. You will gain progress if you have both an [concept_tesla_engineer] and a [concept_theiler_biologist]."
 je_theiler_microscope_achromatic_goal: "A biologist and an engineer must spend [JournalEntry.GetTotalGoalValue|V0] weeks working together on the new microscope."
 je_theiler_microscope_electron: "Electron Microscope"
 je_theiler_microscope_electron_reason: "The electron microscope, developed in the 1930s by Ernst Ruska and Max Knoll, uses electron beams instead of light to achieve much higher resolution. It played a crucial historical role by allowing scientists to observe structures at the nanometer scale, far beyond the limits of optical microscopes.\n\nBetter microscopes enable more successful observation of [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and other [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]. You will gain progress if you have both an [concept_tesla_engineer] and a [concept_theiler_biologist]."
 je_theiler_microscope_electron_goal: "A biologist and an engineer must spend [JournalEntry.GetTotalGoalValue|V0] weeks working together on the new microscope."
