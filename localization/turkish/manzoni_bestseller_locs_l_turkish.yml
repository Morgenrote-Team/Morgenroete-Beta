 manzoni_writer_crime_book_bestseller_title_8_loc: "\"Beni Suef Çarşısının Kötü Evlat Haydutları\""
 manzoni_writer_crime_book_bestseller_flavor_8_loc: "Boujdour'un tozlu sokaklarında, güneş acımasızca vururken ve tüccarların çığlıkları kalabalık çarşıda yankılanırken, bir grup dışlanmış kendi kaderlerini çizmeye çalışır. Zengin bir şeyhin istenmeyen oğulları olarak doğup, atalarının evinden sürülerek acımasız çöl ortamında hayatta kalmaya zorlanan bu gençler, 'Boujdour Çarşısının Kötü Evlat Haydutları'dır.\n\nAçlık ve ihanetin acısıyla, geçimlerini çarşıdaki tüccarlardan sağlamaya çalışırken suç dolu bir hayata yönelirler. Ancak cesaretleri arttıkça ve hırsları büyüdükçe, küçük çaplı hırsızlıkların ötesinde bir kaderleri olduğunu fark ederler. Ortak mirasları ve onları terk eden babalarına karşı duydukları intikam arzusu ile birleşen bu gençler, hak ettiklerini geri almak için güçlerini birleştirirler."
