 manzoni_writer_crime_book_bestseller_title_6_loc: "\"Blackwood Gizemleri ve Kayboluşlar\""
 manzoni_writer_crime_book_bestseller_flavor_6_loc: "Blackwood'un gaz lambalarıyla aydınlanan dar sokaklarında, bir dizi şaşırtıcı kayboluş toplumda şok dalgaları yaratır. Bu ürkütücü gizemin derinliklerine dalın; burada hiçbir şey göründüğü gibi değildir ve gerçek gölgelerin içinde saklıdır."
