 manzoni_writer_crime_book_bestseller_title_12_loc: "\"Vahşi Batı Haydutları\""
 manzoni_writer_crime_book_bestseller_flavor_12_loc: "Güneş, Vahşi Batı'nın haşin topraklarının üzerinden batarken, haydutların gölgeli figürleri tozdan ortaya çıkar; isimleri korku ve hayranlıkla fısıldanır. Bu sürükleyici anlatıda okuyucular, bu ünlü haydutlarla birlikte yolculuk yapacak, adrenalin dolu çatışmaları ve cesur kaçışları bizzat deneyimleyecektir."
