 manzoni_writer_crime_book_bestseller_title_1_loc: "\"Deli Aşçının Vakası\""
 manzoni_writer_crime_book_bestseller_flavor_1_loc: "Açık denizlerde, tehlike her köşede pusuda beklerken, geminin aşçısı kendi mutfak krallığında hüküm sürer. Ancak bir dizi kaybolma vakası mürettebatı sarsınca, şüphe hayat ve ölüm gücünü elinde tutan o adama düşer.\n\n'Merhametsiz tavuğunuz kuru ve bana deniz suyu arzulatıyor,' der mürettebat üyesi ve arkasını döner; o anda kaderi mühürlenmiştir. Aşçı, sesi kin dolu şekilde, bıçağını bilemeye başlar ve yanıtlar: 'Endişelenme efendim. Yarın sabah, krallar için layık bir ziyafeti tadacaksınız,' tehditkar bir gülümsemeyle.\n\nCesur şefimizle birlikte açık denizlerdeki aldatmaca ve ihanet fırtınasını keşfedin: 'Deli Aşçının Vakası', heyecan dolu bir cinayet hikayesi."
