 manzoni_bestseller_doyle_arthur_conan_1_t: "\"A Study in Scarlet\" – [ROOT.GetCharacter.GetFullName]"
 manzoni_bestseller_doyle_arthur_conan_1_d: "Mantık ve zekâsını kullanarak suçları çözen bir dedektif. Bu Sherlock Holmes karakteri büyüleyici. Arthur Conan Doyle’un ortaya çıkardığı ne kadar ilginç bir fikir."
 manzoni_bestseller_doyle_arthur_conan_1_f: "\"Bunu bilmek, neden bildiğimi açıklamaktan daha kolaydı. Eğer size iki artı iki dört eder mi diye kanıtlamanız istenseydi, biraz zorluk yaşayabilirdiniz, ancak gerçeğe tamamen eminsinizdir.\"