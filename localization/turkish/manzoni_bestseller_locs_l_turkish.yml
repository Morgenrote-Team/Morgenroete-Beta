 manzoni_writer_mystery_book_bestseller_flavor_2_loc: "Gece ay ışığında gölgelerin arasında, kırmızı bir parıltı karanlığı deler—korku ve umutsuzluğun habercisi. 'Kızıl Hançer' siren çağrısını fısıldar, habersiz ruhları ölümcül kucağına çeker. Antik büyü ateşlerinde dövülmüş bu lanetli bıçak kana susamış, onu kullananların kalplerini yozlaştırır. Bu ürkütücü doğaüstü korku ve gücün karanlık cazibesini keşfedin."
