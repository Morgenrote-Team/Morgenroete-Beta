 manzoni_writer_science_fiction_book_bestseller_flavor_1_loc: "Yıldızlara seyahat edebilen bir gemi ve onun harika kaptanı ile mürettebatının hikayesi; daha önce hiçbir insanın gitmediği yerlerde akıl almaz zorluklarla karşılaşırlar. Gece karanlığında, yıldız ışığı ve geleceğin inanılmaz navigasyon cihazlarıyla uzun mesafeler katederler. Uzak gezegenleri keşfederler; hem büyüleyici güzellikte hem de inanılmaz tehlikelidirler. Bu kitabın sayfalarında, onları bekleyen zorlukları, insanın ötesinde keşfedeceklerini ve tehlikeli yolculukları sırasında kimlerle karşılaşabileceklerini öğrenin!"
