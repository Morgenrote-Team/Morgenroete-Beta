 manzoni_writer_juvenile_book_bestseller_title_2_loc: "\"Kıpır Kıpır İskoç Kızının Hikâyeleri\""
 manzoni_writer_juvenile_book_bestseller_flavor_2_loc: "İskoçya'nın sisli yükseklerinde, hem cesur hem de neşeli bir kız yaşardı. Genç Fiona'nın, kendi memleketinin yuvarlanan tepeleri ve eski kalelerinde geçirdiği hayali maceralara katılın. Yaramaz perilerle karşılaşmaktan sakar devleri alt etmeye kadar her hikâye, kahkaha, dostluk ve biraz sihir dolu bir yolculuktur. Fiona'nın maceraları, 'Kıpır Kıpır İskoç Kızının Hikâyeleri' ile okuyucuların kalbini hem genç hem yaşlı için büyüleyecek."
