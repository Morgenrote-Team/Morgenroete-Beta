 manzoni_writer_literary_fiction_book_bestseller_title_1_loc: "\"Çalışma Evindeki Kraliyet Ailesi\""
 manzoni_writer_literary_fiction_book_bestseller_flavor_1_loc: "Bu hikâye, bir zamanlar demir yumrukla hüküm süren, korku dolu bir rejim ile zenginlik ve refahı yalnızca kendilerine tahsis eden bir kraliyet ailesinin çilelerini anlatır. En küçük sebeplerle vergilendirdikleri halklarını, itaatsizlik ya da sebepsiz yere acımasızca cezalandırırlardı. Bu zulüm, İmperia Büyük Hakimiyeti'ni refah ve güç dolu geçmişinden açlığa ve yoksullukla savaşan bir savaşa sürüklenmiş bir krallığa dönüştürdü.\n\nYine de daha fazlasını talep ettiler; bu, Imperian halkını isyan ve protestoya sürükledi, sonunda kanlı bir devrim gerçekleşti ve yeni bir hükümet kuruldu, eski kraliyet ailesi yakalandı.\n\nŞimdi soru şuydu: Onlarla ne yapılmalı? Bazıları anında idam edilmesini isterken, bazıları daha uzun bir ceza öngördü.\n\nKısa bir tartışmanın ardından, bir korku evi, bir zamanlar güçlü olanların hayatlarının geri kalanını geçirecekleri yer olarak seçildi.\n\nBöylece hak edilmiş adalet, intikam ve bir zamanlar görkemli olan Imperia ulusunun yeniden doğuşunun hikâyesi başlar!"
