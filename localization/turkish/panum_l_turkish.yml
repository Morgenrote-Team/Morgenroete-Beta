 panum_spanish_flu_physician_help_modifier: "Doktor pandemiye karşı savaşıyor"
 panum.1110.t: "Doktor ve Pandemi"
 panum.1110.d: "Pandeminin patlak vermesi, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] için kritik bir saat: şimdi [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] parlayabilir! Ama soru ortaya çıkıyor: pandemiye aktif şekilde mi karşı koymalı yoksa onu araştırmalı mı?"
 panum.1110.f: "'O sırada sıradan bir grip dalgası ile uğraşmayacağımız anlaşıldığında, üzerime büyük bir motivasyon yükledi. Aynı zamanda omuzlarımda korkunç bir yük hissettim. Beklentiler büyüktü. Üzerime konan umutları yerine getirebilecek miydim?'\n\nGünlük kaydı, [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.1110.g: "Pandemiye karşı savaş."
 panum.1110.h: "Pandemiyi araştır."
 panum.1111.t: "Pandeminin Patojeni"
 panum.1111.d: "Başhekimimiz Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ve başbiyoloğumuz Doktor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] bugün muazzam bir keşif yaptılar: [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gribe neden olan patojeni keşfettiler!"
 panum.1111.f: "Influenza A virüsü H1N1 (A/H1N1), ördekler, insanlar ve domuzlarda görülen, ancak diğer birçok memeli türünü de enfekte eden Orthomyxoviridae ailesine ait bir influenza A virüsü alt tipidir (Alphainfluenzavirus influenzae türü). H1N1 influenza virüsleri, 1918 İspanyol gribi sonucunda insanlarda ve domuzlarda yerleşti. Bu alt tip on milyonlarca insanın ölümüne neden oldu.\n\nİspanyol gribi sırasında patojen hâlâ bilinmiyordu. Bazı araştırmacılar zaten 'filtrelenebilir virüs' olduğundan şüpheleniyordu. Ders kitaplarında, günümüzde Haemophilus influenzae olarak adlandırılan bakteri grip nedeni olarak kabul ediliyordu. Ancak bakterioloji yöntemleriyle hiçbir patojen tespit edilemiyordu: ne boyanabiliyor ne de yapay kültür ortamında büyüyebiliyordu. İspanyol gribi sayesinde bir bilgi ilerlemesi olduysa, bu, o dönemde bu grip varyantının gerçek patojeninin hâlâ bilinmemesiydi, yani Haemophilus influenzae patojen olarak elenmişti. Virüsün genomu ancak 1996'da dizilendi."
 panum.1111.g: "Heureka!"
 panum.1112.t: "Pandeminin Kökeni"
 panum.1112.d_historical: "Tarih, kriminoloji ve tıbbi bilgiyi birleştiren olağanüstü bir bilimsel araştırmanın ardından Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], pandeminin İspanya’da patlak vermediğini, çoğu kez iddia edildiği gibi, ama Amerika’da başladığını çığır açıcı bir şekilde keşfetti!"
 panum.1112.f_historical: "The doctor's discovery is preceded by a meticulous investigation. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] compared patient files and traced back to the first cases in our country in order to reconstruct a network of infections. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] also collected data from colleagues abroad and sometimes visited them himself. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] has evaluated the findings of other doctors who have undertaken similar efforts in their country. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] cannot say with certainty where the first infection occurred, but everything points to the state of Kansas. That the disease actually broke out in America is now a scientific fact."
 panum.1112.g_historical: "Bu Amerikan gribi demek mi?"
 panum.1112.d_dynamic: "Tarih, kriminoloji ve tıbbi bilgiyi birleştiren olağanüstü bir bilimsel araştırmanın ardından Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], pandeminin [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName]’de değil, [SCOPE.sCountry('panum_pandemic_country').GetName]’de başladığını çığır açıcı bir şekilde keşfetti!"
 panum.1112.f_dynamic: "Doktorun keşfi titiz bir araştırmayı takip etti. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], hasta dosyalarını karşılaştırdı ve enfeksiyon ağını yeniden yapılandırmak için ülkemizdeki ilk vakaları izledi. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ayrıca yurt dışındaki meslektaşlarından veri topladı ve bazen onları bizzat ziyaret etti. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], benzer çabaları ülkesinde gösteren diğer doktorların bulgularını değerlendirdi. İlk enfeksiyonun nerede gerçekleştiğini kesin olarak söyleyemiyor. Hastalığın gerçekten [SCOPE.sCountry('panum_pandemic_country').GetNameNoFormatting]’de çıktığı artık bilimsel bir gerçektir."
 panum.1112.g_dynamic: "[SCOPE.sCountry('panum_pandemic_country').GetAdjectiveNoFormatting] gribi demek mi?"
 panum.1113.t: "Pandeminin Tedavisi"
 panum.1113.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gribi araştırırken, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] birkaç tedavi ve uygulama icat etti ve hastalığı kontrol altına almak için bir eylem planı geliştirdi. Bu bulgular her ne kadar çok geç gelse de, gelecekteki nesiller için faydalı olabilir."
 panum.1113.f: "'Bugün çok daha iyi hissediyorum ve giyindim. Endişe ve uykusuzluktan neredeyse bitap düşmüşüm. Bu hafta çok fazla hastalık ve ölüm yaşandı, ama savaşın sonucuna dair bir büyük ışık ve umut ışığı ortaya çıktı, barış geldi (11. gün).' -Helen Viola Jackson Kent, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gribi kurtulan"
 panum.1113.g: "Peki, bir şeyler öğrendik."
 panum.1114.t: "Pandeminin Tanımı"
 panum.1114.d: "Ne yazık ki, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pandemi sırasında çok az ilerleme kaydetti. Ancak [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gribin varyantlarının belirtilerini tanımaya yardımcı olabilecek bir hastalık tanımı yazdı."
 panum.1114.f: "'Bu kişiler la grippe veya influenza gibi görünen bir atak ile başlıyor ve hastaneye getirildiklerinde, şimdiye kadar görülmüş en kötü tip pnömoniyi çok hızlı geliştiriyorlar. Kabulden iki saat sonra yanak kemikleri üzerinde kahverengi lekeler beliriyor ve birkaç saat sonra kulaklarından başlayıp yüzün tamamına yayılan siyanozu görmeye başlıyorsunuz, ta ki renkli kişiler ile beyaz kişiler arasındaki fark zor ayırt edilir hale gelene kadar. Sonra ölüm gelene kadar sadece nefes almak için mücadele var, boğuluyorlar. Bu korkunç. Bir, iki ya da yirmi kişinin ölmesine katlanabiliriz, ama bu zavallı insanların sinek gibi düşmesini görmek sinirlerinizi zorlayabilir.' -N. Roy Grist, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gribi kurtulan"
 panum.1114.g: "Biraz daha fazlasını bekliyorduk."
 panum.1115.t: "Pandeminin Gizemi"
 panum.1115.d: "Ne yazık ki, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pandeminin gereksinimlerini karşılayamadı. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], hastalığın kökeni, nasıl mücadele edileceği veya tanımı hakkında herhangi bir cevap bulamadı. Ama doktor küçük bir şiir yazdı."
 panum.1115.f: "'Küçük bir kuşum vardı,\nadı Enza idi.\nPencereyi açtım,\nve influenza.'"
 panum.1115.g: "Hayal kırıklığı."
