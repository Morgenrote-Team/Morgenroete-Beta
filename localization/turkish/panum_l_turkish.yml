 panum.2621.t: "Kaygı Kavramı"
 panum.2621.d: "Danimarka'nın önde gelen filozofu Søren Kierkegaard, Kopenhag halkının ilgisini çeken estetik, felsefi ve psikolojik bir eser olan 'Kaygı Kavramı'nı yayımladı."
 panum.2621.f: "'Özgürlüğün olasılığı, iyi ya da kötü seçme yeteneği değildir. Olasılık, yapılabilme yetisidir. Mantıksal bir sistemde, olasılığın gerçeğe dönüştüğünü söylemek uygundur. Ama gerçekte durum böyle değildir ve ara bir terim gereklidir. Bu ara terim kaygıdır, ama niteliksel sıçramayı açıklamaz ya da etik olarak gerekçelendiremez. Kaygı ne zorunluluk kategorisidir ne de özgürlük kategorisi; özgürlüğün kendisi özgür değil, karışmış hâlde olduğu bir durumdur.' -Søren Kierkegaard"
 panum.2621.g: "Danimarka'nın en büyük zihinlerinden biri."
 panum.2621.h: "Kierkegaard, Danimarka'nın yeni ulusal yazarı olacak."
 panum.2622.t: "[SCOPE.sCharacter('panum_phineas_gage').GetFullName]'in Garip Vakası"
 panum.2622.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], usta [SCOPE.sCharacter('panum_phineas_gage').GetFullName]'in garip vakasını araştırdı. Bir patlamada, bir demir çubuk altından üstten kafasına saplanarak büyük bir yara kanalı oluşturdu. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'e göre birkaç hafta içinde fiziksel olarak iyileşti ve algı, hafıza, zeka, dil yeteneği ve motor becerileri tamamen sağlamdı. Ancak kazadan sonraki dönemde, [SCOPE.sCharacter('panum_phineas_gage').GetLastName] belirgin kişilik değişiklikleri yaşadı."
 panum.2622.f: "'Korkunç Kaza. - [SCOPE.sCharacter('panum_phineas_gage').GetFullName], [SCOPE.sState('panum_phineas_gage_state').GetName] demiryolunda bir şef olarak, dün bir patlama için sıkıştırma yaparken, kullandığı demir alet patladı ve başından bir buçuk inç çapında ve üç fit sekiz inç uzunluğunda geçti. Demir, sağ yanak tarafından girip üst çeneyi parçalayarak, sol gözün arkasından geçip başın üstünden çıktı.\n\nBu üzücü olayla bağlantılı en olağanüstü durum, bugün saat ikiye kadar hayatta olması, aklının yerinde olması ve acı çekmemesidir.\n\n[ROOT.GetCountry.GetCapital.GetCityHubName] Kroniği'"
 panum.2622.g: "Demek ki ruh ve beyin bölgeleri bağlantılı mı?"
 panum.2623.t: "Kültürlerarası Psikoloji"
 panum.2623.d: "[SCOPE.sState('panum_colonial_state').GetName] ziyaretinde, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], zihinsel hastalıkların, [ROOT.GetCountry.GetCapital.GetCityHubName]'de sıkça görüldüğü hâlde bu bölgede neredeyse hiç görülmediğini şaşkınlıkla fark etti."
 panum.2623.f: "Emil Kraepelin, 1904’te dört ay boyunca Java’ya giderek Buitenzorg (şimdiki Bogor) akıl hastanesinde 225 kişiyi inceledi. Döneminin önde gelen psikiyatristlerinden ve kültürlerarası psikiyatriye ilgi duyan tek kişi olarak, bir yandan belirli delilik türlerinin farklı yaşam koşullarında ve farklı kabileler arasında bizimkilerle aynı sıklık ve şekilde meydana gelip gelmediğini anlamak istedi. Öte yandan, 'deliliğin sıklığı ve biçimleri, bir gün bir toplumun özelliklerini derinlemesine anlamak için zengin bir hazine oluşturacak' öngörüsünde bulundu."
 panum.2623.g: "Görünüşe göre bazı nevrozlar kültürel geçmişle ilgili."
 panum.2624.t: "İlaçlar"
 panum.2624.d: "Baş kimyager [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in önerisiyle etkili psikotropik ilaçlar üretmek için birkaç kez deneyler yaptı. Sonuç ise... şaşırtıcıydı."
 panum.2624.f: "'Acil olarak beni görmek mi istediniz?'\n'Evet. Deneyin başarılı olduğunu düşünüyorum.'\n'Düşünüyorsunuz mu?'\n'Yeni ilaç kesinlikle ağrı kesici etkisi var. Yorgunlukla mücadelede etkili. Korkuya karşı yardımcı oluyor. Belki biraz fazla etkili.'"
 panum.2624.g: "Liserjik asit dietilamid mi? Bu da ne?"
 panum.2624.h: "Askerlerimiz biraz zırhlı çikolatadan faydalanabilir."
 panum.2625.t: "Psikofizik"
 panum.2625.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], öznel psikolojik deneyim ile nicel olarak ölçülebilen fiziksel uyaranlar arasındaki ilişki hakkında ilginç teoriler ortaya attı."
 panum.2625.f: "Psikofizik, fiziksel uyaranlar ile onların yarattığı duyum ve algılar arasındaki ilişkiyi nicel olarak inceler. Psikofizik 'uyaran ile duyum arasındaki ilişkiyi bilimsel olarak inceleyen alan' olarak tanımlanmıştır. Psikofiziğin klasik teknik ve teorilerinin çoğu 1860’ta Gustav Theodor Fechner tarafından formüle edilmiştir. Fechner, 'psikofizik' terimini, fiziksel uyaranları duyumlar gibi bilinç içeriğine bağlamayı amaçlayan araştırmayı tanımlamak için kullanmıştır. Fechner, bir fizikçi ve filozof olarak, maddeyi zihne bağlayan ve gözle görülebilir dünya ile bireyin özel deneyimi arasında ilişki kuran bir yöntem geliştirmeyi hedeflemiştir. Fechner’in çalışmaları, öğrencisi Joseph Jastrow tarafından incelenip genişletilmiş ve Jastrow kısa sürede kendisi de seçkin bir deneysel psikolog hâline gelmiştir."
 panum.2625.g: "Bir kelime anlamadım ama bonuslar iyi görünüyor!"
