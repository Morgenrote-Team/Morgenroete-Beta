 je_group_panum_medicine: "Morgenröte: #ORANGE Panum Tıbbı#!"
 je_panum_cholera: "Kolera Salgını"
 je_panum_cholera_reason: "Kolera, 19. yüzyılın en kötü salgını olarak kabul edilir. Viktorya dönemi için, Orta Çağ'daki veba kadar önemlidir. Diğer hastalıklardan daha hızlı yayılır ve ölümcül çeşitleri vardır.\n\n#ORANGE Modern Kanalizasyon#! icadı, kolera ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Kolera Tedavisi#! bulabilir. Orta düzeyde bir sağlık sistemi bile yardımcı olur. Tüm bunlar hastalığın önlenmesini ve tedavisini iyileştirir. [concept_gaudi_architect] tarafından modern kanalizasyon sistemiyle donatılan başkentler, prensipte kolera salgınlarından korunur.\n\nKolera ile kalıcı olarak mücadele etmek için, [concept_theiler_biologist] tarafından geliştirilen #V Kolera Aşısı#! gereklidir."
 je_panum_tuberculosis: "Tüberküloz Salgını"
 je_panum_tuberculosis_reason: "Kolera ile birlikte tüberküloz, 19. yüzyılın en yaygın ölüm nedenlerinden biri olmuştur. 'Beyaz Ölüm' başlangıçta romantik bir hastalık olarak görülmüş, sonunda proletaryanın hastalığı haline gelmiştir. Tüberküloz genellikle düşük yaşam standartlarına sahip ve yüksek kentleşme oranına sahip birkaç devletle sınırlıdır.\n\n#ORANGE Pastörizasyon#! icadı, tüberküloz ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Tüberküloz Tedavisi#! bulabilir. İyi bir sağlık sistemi yardımcı olur. Tüm bunlar hastalığın önlenmesini ve tedavisini iyileştirir. Nadir durumlarda iklimli sağlık tesisleri tüberküloza karşı yanıt olarak ortaya çıkabilir, ancak iyileşme sonuçları tartışmalıdır.\n\nTüberküloz ile kalıcı olarak mücadele etmek için, [concept_theiler_biologist] tarafından geliştirilen #V Tüberküloz Aşısı#! gereklidir."
 je_panum_smallpox: "Çiçek Salgını"
 je_panum_smallpox_reason: "Çiçek hastalığı, tüm insanlığı etkileyen büyük felaketlerden biridir ve tüm toplulukları yok etmiştir. Çiçek hastalığı aşılaması sayesinde 18. yüzyıl boyunca etkisi azalmış olsa da, önlem alınmazsa hala tehlikelidir.\n\n#ORANGE Aşılama#! icadı, çiçek hastalığı ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Çiçek Tedavisi#! bulabilir. Temel bir sağlık sistemi bile yardımcı olur. Tüm bunlar hastalığın önlenmesini ve tedavisini iyileştirir.\n\nÇiçek hastalığı ile kalıcı olarak mücadele etmek için, [concept_theiler_biologist] tarafından geliştirilen #V Çiçek Aşısı#! gereklidir."
 je_panum_typhus: "Tifo Salgını"
 je_panum_typhus_reason: "Tifo, Orta Çağ'ın sonlarından beri bilinse de, en yıkıcı etkileri Napolyon Savaşları sırasında görülmüştür. 1815 sonrası nesiller için korkusunu korumuştur. Tifo, birkaç ülkeye hızla yayılabilir. Yüksek yıkım görülen bölgeler özellikle etkilenir. Bu nedenle klasik bir savaş hastalığı olarak kabul edilir ve özellikle askerleri ve sıkışık kışlalarını etkiler.\n\n#ORANGE Antibiyotikler#! icadı, tifo ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Tifo Tedavisi#! bulabilir. Temel bir sağlık sistemi bile yardımcı olur. Tüm bunlar hastalığın önlenmesini ve tedavisini iyileştirir.\n\nTifo ile kalıcı olarak mücadele etmek için, [concept_theiler_biologist] tarafından geliştirilen #V Tifo Aşısı#! gereklidir."
 je_panum_yellow_fever: "Sarı Humma Salgını"
 je_panum_yellow_fever_reason: "Sarı humma, tropik bölgelerde görülen bölgesel bir hastalıktır, ancak 19. yüzyılda ABD'nin güneyine ve Avrupa'ya da yayılmıştır. Genellikle sadece birkaç eyalette görülür, ancak etkisi küçümsenmez.\n\n#ORANGE Sıtma Önleme#! icadı, sarı humma ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Sarı Humma Tedavisi#! bulabilir. Temel bir sağlık sistemi bile yardımcı olur. Tüm bunlar hastalığın önlenmesini ve tedavisini iyileştirir.\n\nSarı humma ile kalıcı olarak mücadele etmek için, [concept_theiler_biologist] tarafından geliştirilen #V Sarı Humma Aşısı#! gereklidir."
 panum.100.t: "[TimeKeeper.GetCurrentDate.Format('y')] Kolera Salgını"
 panum.100.d: "#YELLOW Kolera#!, insanlığın en kötü felaketlerinden biri, şehrimize yayılmıştır. Karanlık zamanlar başladı. Ülke genelinde yayılmasını ve zarar vermesini beklemeliyiz."
 panum.100.f: "Kolera, Doğu Asya'ya endemiktir ve muhtemelen Hindistan alt kıtasında birkaç yüzyıl boyunca lokal salgınlar şeklinde görülmüş, ancak diğer kıtalarda bilinmemektedir. İlk pandemi 1817-1824 yılları arasında gerçekleşmiş ve Asya'nın bazı bölgeleri ile Doğu Afrika ve Küçük Asya'yı etkilemiş, ardından Rusya ve Avrupa'ya yayılmıştır. 1830'da Doğu Galicya ve Macaristan'da ortaya çıkmış, 1831 Haziran'ında Viyana'ya ulaşmıştır. Toplam altı pandemide dünyayı sarmış ve gelişmekte olan sanayi toplumunun belası olmuştur. Enfeksiyonların çoğu (%85 civarı) asemptomatik olsa da, başlangıçta ölüm oranı hastalık tedavi edilmezse %20-70 arasında değişir."
 panum.100.g: "Ölüm Meleği kapımızda."
 panum.102.t: "Kolera salgını [SCOPE.sCountry('panum_infected_country').GetName] yayılıyor"
 panum.102.d: "Bugün [SCOPE.sCountry('panum_infected_country').GetName]’de koleranın ilk vakalarının bildirildiğine dair raporlar aldık. Yetkililer, yayılmayı önlemede yeterince çaba göstermediğimiz için bizi suçluyor."
 panum.102.g: "Bunun suçunu bize mi atıyorlar...?"
 panum.103.t: "Fabrikalarda Kolera"
 panum.103.d: "[SCOPE.sState('panum_disease_state').GetName]’deki birkaç fabrika, işçiler arasında koleranın ilk vakalarını bildirdi. Yerel yetkililer yayılmayı engellemek için düzenleme önermektedir. Bu, sanayi üzerinde büyük bir etki yaratacaktır."
 panum.103.f: "Kolera vakasının ilk örneği geçen hafta şehrin dışındaki bir su değirmeninde görüldü. Bina karantinaya alınmış olmasına rağmen, birkaç imalathane boyunca daha vakalar meydana geldi. Hastalığın nasıl yayıldığı hâlâ tamamen belirsiz, ancak bazı yerel politikacılar, halkın kaybettiği güveni yeniden kazanmak için sert önlemler alınması gerektiği konusunda hemfikir."
 panum.103.g: "İmalathaneleri karantinaya al!"
 panum.103.h: "İmalathaneler her koşulda çalışmaya devam etmeli!"
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] Kolera kaptı!"
 panum.104.d: "Sadece birkaç gün önce [SCOPE.sCharacter('disease_victim_scope').GetFullName] tamamen sağlıklı görünüyordu, ancak geçen gece [SCOPE.sCharacter('disease_victim_scope').GetSheHe] korkunç hastalığın ilk belirtilerini gösterdi. [ROOT.GetCountry.GetNameNoFlag] ülkesini etkisi altına alan bu hastalık, [SCOPE.sCharacter('disease_victim_scope').GetHerHis|U] sağlığını ciddi şekilde tehdit ediyor."
 panum.104.f: "19. yüzyılın ilk iki kolera dalgası ünlü isimleri de öldürdü. Prusya’da filozof Georg Friedrich Wilhelm Hegel ve general August Neidhardt von Gneisenau 1831 kolera salgınında yaşamını yitirdi. Besteci Pyotr Ilyich Tchaikovsky de kolera kurbanı olarak kabul edilir, ancak bu durum - kasıtlı veya kasıtsız şekilde kontamine su tüketimi - tartışmalıdır."
 panum.104.g: "En iyi tedaviyi sağlayın!"
 panum.104.h: "En iyi doktorumuz [SCOPE.sCharacter('disease_victim_scope').GetHerHim] ile şahsen ilgilenecek."
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U] o kadar da önemli değil..."
 panum.105.t: "Zenginlerin Göçü"
 panum.105.d: "[SCOPE.sState('panum_disease_state').GetName] üst sınıfı, finansal kaynaklarını kullanarak bölgeyi mümkün olan en kısa sürede terk ediyor veya kırsala kaçıyor. Karantina düzenlemelerini aşmak için çok sayıda rüşvet ödenmiş durumda. Halk bu gelişmeye büyük bir öfke ile bakıyor."
 panum.105.f: "Kolera, hem zengin hem fakiri öldürdüğü için Orta Çağ’daki veba gibi bir etki gösteriyordu. Bu nedenle etkili ve zengin aileler, salgından kaçınmak için ellerinden geleni yaptı. Aristokrasi, kolerayı 'devrimci bir hastalık' olarak gördü çünkü sınıf ayrımı yapmıyordu. Üst sınıfa yönelik gevşek önlemler, kolerayı sosyal çatışmalar nedeniyle politik bir mesele haline getirdi. 1830’ların başındaki Avrupa kolera salgınları ile devrimci hareketlerin bu bağlamda değerlendirildiği sıkça ifade edilmiştir."
 panum.105.g: "Bırak gitsinler."
 panum.105.h: "Buna biz 'BÜYÜK EŞİTLEYİCİ' diyoruz."
 panum.106.t: "Muhalefet Kolerayı Kullanıyor"
 panum.106.d: "Muhalefet, salgını siyasi hesaplaşma için kullanıyor: hükümeti salgınla mücadelede büyük hatalar yapmakla suçluyor."
 panum.106.f: "Sosyal ve politik etkilerinden dolayı, kolera salgınları özellikle liberallerin muhafazakarlara yüklenebileceği bir alan oluşturuyordu. Daha ilerici önlemler ve yeni yöntemler 'geri kalmış' elitlere alternatif olarak öneriliyordu. Muhafazakarlar ve liberaller arasındaki bu ayrımın farklı koşullar ve partiler altında tekrar etmesi şaşırtıcı değildir."
 panum.106.g: "Haklısınız, biz yanılmışız. Şimdi salgınla savaşalım!"
 panum.106.h: "Bu hükümet durumu tamamen kontrol altında tutuyor."
 panum.107.t: "Toplu Mezarlar"
 panum.107.d: "[SCOPE.sState('panum_disease_state').GetName]’de kazılan yeni toplu mezarlara yönelik eleştiriler artıyor. Özellikle alt sınıf, süreci ölüler için düzgün bir bakım yerine neredeyse mekanik bir işlem olarak görüyor."
 panum.107.f: "Toplu ölümler ve olası enfeksiyon riskleri nedeniyle ölülerin toplu gömülmesi kaçınılmaz bir fenomen haline geldi. Zengin vatandaşlar geleneksel bir cenaze yapabilirken, fakirlerin cesetlerinin basitçe gömülmesi sosyal gerginliğe yol açtı."
 panum.107.g: "Cenazelerle zaman kaybedemeyiz!"
 panum.107.h: "Herkes saygın bir cenazeyi hak eder."
 panum.108.t: "Kolera Hastaneleri"
 panum.108.d: "Bazı siyasi partiler, kendi çıkarları doğrultusunda alt sınıf için kolera hastaneleri kurmaya karar verdiler. Ancak bu hastaneler pek popüler değil."
 panum.108.f: "Kolera veya tüberküloz gibi salgınlar sırasında toplu hastane inşası genellikle tartışmalıydı. Aileler hasta olan yakınlarını evde bakmayı tercih ediyordu; aksi takdirde hastalar, diğer hastalarla birlikte küçük bir alana sıkıştırılıyor ve çoğu kişi orada hastalanıp öleceğine inanıyordu. Bu uygulamanın esas olarak fakirleri zenginlerden izole etmek için yapıldığı iddia ediliyordu."
 panum.108.g: "Gerekirse hastanelerde onları dövün!"
 panum.108.h: "Bu inatçı öküzleri yaşamak zorunda bırakamazsın."
 panum.109.t: "Halk Panik İçinde"
 panum.109.d: "[SCOPE.sState('panum_disease_state').GetName] yerel hükümetinin tüm çabalarına rağmen, halk salgının en tehlikeli etkilerinden biri olan paniğe kapılmaya başladı."
 panum.109.f: "'Kendimizi bu Dünyadaki diğer hiçbir yaratığın üstünde görmek kolaydır, ancak akıl perdesini kaldırırsanız, İnsan hâlâ bir hayvandır; bilinmeyen bir yarına dair korku ve endişeyle yönetilir. Hastalıkların ortaya çıkışı ve yayılması, deneyimli askerlerin bile yüreklerini doldurabilir; çünkü görünmeyen bir düşmanla kim savaşabilir? Hayır, korku kalplerini kemirir ve her köşede düşman görmelerine yol açar, ve düşman olan yerde savaşacak düşmanlar da vardır. Hasta adam, onları uzak tutmak için taşlanır. Kapısından çıkmayan o aile hakkında fısıltılar dolaşır. Sessiz ve dürüst adam, kapıya bir sonraki tıklamanın hırsızlık ve soygun getireceğinden korkarak eve silah getirir, yardım değil.\n\nBu dünyanın sonu değildir. Bu bir aldanışın sonudur: İnsan bir hayvandır ve korkmaktadır.'\n\n[TimeKeeper.GetCurrentDate.Format('y')] salgını üzerine [SCOPE.sState('panum_disease_state').GetName] Times gazetesinden bir haberden alıntı."
 panum.109.g: "Lanet olası korku! Akıl erdirmeyeceklerse onlara nasıl yardım edebiliriz?"
 panum.110.t: "Ortak Amaç"
 panum.110.d: "[SCOPE.sState('panum_disease_state').GetName]’deki Kolera Salgını, ulusal bir birlik duygusunu pekiştirmiş gibi görünüyor; bölge halkı salgına karşı birlikte mücadele etmeye çalışıyor."
 panum.110.f: "'Bir hastane koğuşu karamsar bir yerdir; çünkü hasta bir dünyada yaşadığımızın hatırlatıcısıdır. Ama bu hastalık kim olduğunuzu umursamaz: hangi dini inancı benimsediğinizi, sahibinizin kim olduğunu, ten renginizi ya da siyasetinizi önemsemez. Yatağa bakın ve bir adam, bir kadın ya da bir çocuk görürsünüz. Yardıma muhtaç insanları görürsünüz. Kimin getirdiğini umursamazlar. Doktorun bir rahip, bir asker ya da azıcık zamanını ayıran sıradan bir işçi olup olmadığını umursamazlar. Onun bir monarşist, bir cumhuriyetçi, bir kışkırtıcı olup olmadığını görmek için ona bakmazlar; sadece ne olduklarını görürler.\n\nOna bakarlar ve bir insan görürler. Bir kardeş, bir oğul, bir hemşerisi ama her şeyden önce bir İnsan.'\n\n[TimeKeeper.GetCurrentDate.Format('y')] salgını üzerine [SCOPE.sState('panum_disease_state').GetName] Times gazetesinden bir haberden alıntı."
 panum.110.g: "Koleraya karşı birleşmiş durumdayız!"
 panum.111.t: "Dehşet"
 panum.111.d: "[SCOPE.sState('panum_disease_state').GetName]’deki ceset yığınları giderek büyüyor. Artık en az bir tanıdığı koleraya yakalanmamış kimse kalmadı. Bölge salgının merkezi haline geldi."
 panum.111.f: "Sadece Berlin, 1831-1873 yılları arasında 42 yıl içinde koleradan on üç kez etkilendi. 1848/49, 1852, 1855 ve 1866 salgınları özellikle Prusya genelinde çok şiddetliydi. Son durumda, resmi olarak 114.683 kişi koleradan öldü. 1848/1849’da Londra’da meydana gelen kolera salgını, 1832’deki salgından çok daha ciddiydi. Bu salgında Londra’da 15.000 kişi öldü; o dönemde şehrin nüfusunun yaklaşık %0,5’i. 1852-1860 arasındaki üçüncü pandemide yaklaşık bir milyon kişi Rusya’da öldü; bu durum aynı zamanda devam eden Kırım Savaşı ile kolaylaştırıldı. İngiliz başkomutan Lord Raglan ve Fransız filosu komutanı Armand Joseph Bruat hastalıktan öldü. Koleradan ölenlerin savaşta ölenlerden daha fazla olduğu düşünülmektedir."
 panum.111.g: "Daha ne kadar ölü olacak?!"
 panum.120.t: "Kolera Salgını sona erdi"
 panum.120.d: "Tüm [ROOT.GetCountry.GetNameNoFlag] rahat bir nefes alıyor: yetkililer, son salgın bölgesinde artık kolera vakası olmadığını bildirdi. Olağanüstü hal sona erdi. Şimdi ölüleri sayma ve normale dönme zamanı."
 panum.120.f: "'Tanrı benimle olsun! Cennet bu Yeni Yılı kutsasın. Meyve verimli, barış ve refah dolu bir yıl olsun; tüm insanlık için barış ve birlik yılı olsun; dünya koleradan kurtulsun.' -Giacomo Meyerberr"
 panum.120.g: "Ama hangi bedelle?"
 panum.200.t: "Tüberküloz Salgını"
 panum.200.d: "Eyaletlerimizden birinde salgın çıktı: [SCOPE.sState('panum_disease_state').GetName]’de #YELLOW Tüberküloz#! hızla yayılıyor!"
 panum.200.f: "Erken Orta Çağ’da, Avrupa’da nüfus seyrek olduğundan tüberküloz önemsizdi. Sadece birkaç metropol alanında daha belirgindi. 15. yüzyılın ikinci yarısında İtalya’daki önceki bir salgının ardından, tarihteki en büyük ve en uzun tüberküloz dalgası 17. yüzyılda başladı. Tüberküloz, 19. ve 20. yüzyıl başlarında kentsel fakirlerin endemik hastalığı olarak geniş ilgi gördü. 1815’te İngiltere’de ölümlerin dörtte biri ve 1918’de Fransa’da ölümlerin altıda biri tüberkülozdan kaynaklanıyordu. 1880 civarında, Almanya’da 15-40 yaş grubundaki her iki ölümden biri bu hastalıktan kaynaklanıyordu. Tüberküloz kırsal alanlarda da en yaygın ölüm nedeniydi."
 panum.200.g: "En azından romantik bir ölüm için zaman var mı?"
 panum.220.t: "Tüberküloz Salgını sona erdi"
 panum.220.d: "Şehir ve kırsal doktorlar, tüberküloz vakalarının zirvesinin birkaç haftadır geçtiğini rapor ediyor. Hastalık tamamen ortadan kalkmamış olsa da, artık normal sınırlar içinde."
 panum.220.f: "'Bu renkte aldanamam;\n o damla kan benim ölüm emrimdir;\n Ölmeliyim.' -John Keats"
 panum.300.t: "Çiçek Hastalığı Salgını"
 panum.300.d: "Eyaletlerimizden birinde salgın çıktı: [SCOPE.sState('panum_disease_state').GetName]’de #YELLOW Çiçek Hastalığı#! hızla yayılıyor!"
 panum.300.f: "Çiçek hastalığı muhtemelen binlerce yıldır bilinmektedir ve yaklaşık 12.000 yıl önce Kuzeydoğu Afrika’daki ilk yerleşimlerde ortaya çıkmıştır. Mısırlı tüccarlar aracılığıyla Hindistan’a taşınmış olabilir. Avrupa fatihleri, çiçek hastalığını Amerika’ya getirdi; burada 1518’den itibaren yerliler arasında yıkıcı salgınlara yol açtı ve milyonlarca ölüme neden oldu. Avrupa’da çiçek hastalığı bazen çocuk hastalığı olarak kabul edilirdi ve 18. yüzyılın sonuna kadar tüm küçük çocukların %10’u bu hastalıktan ölürken, hastalık 'çocuk hastalığı' olarak da adlandırılıyordu. 18. yüzyıldan itibaren çiçek hastalığı vakaları arttı ve vebayı en kötü hastalık olarak yerinden etti. Tahminlere göre her yıl 400.000 kişi çiçek hastalığından ölüyordu ve hayatta kalanların üçte biri kör oluyordu. Çocuklar genellikle çiçek hastalığını atlattıktan sonra ailenin gerçek bir parçası olarak kabul edilirdi. 1800 civarında çiçek hastalığı aşısının başarılı şekilde uygulanmasına rağmen, hastalık yüzyılın ikinci yarısına kadar salgın olmaya devam etti."
 panum.300.g: "Sanırım kozmetik ürünler yakında popüler olacak."
 panum.320.t: "Çiçek Hastalığı Salgını sona erdi"
 panum.320.d: "İnsanlığın en kötü felaketlerinden biri olan korkunç çiçek hastalığı, yavaş yavaş [ROOT.GetCountry.GetNameNoFlag]’dan kayboluyor. Hayatta kalanlar ömür boyu izlerle kalacak."
 panum.320.f: "'Gelecek nesiller sadece çirkin çiçek hastalığının var olduğunu ve sizin sayenizde yok edildiğini tarih aracılığıyla bilecek.' -Thomas Jefferson"
 panum.400.t: "Tifo Salgını"
 panum.400.d: "Eyaletlerimizden birinde salgın çıktı: [SCOPE.sState('panum_disease_state').GetName]’de #YELLOW Tifo#! hızla yayılıyor!"
 panum.400.f: "Tifo ateşi muhtemelen eski zamanlardan beri var, ancak yalnızca 16. yüzyılda güvenilir şekilde tanımlanmıştır ve esas olarak savaş ve sefaletin tipik bir salgını olarak ortaya çıkmıştır. Tifo, Napolyon’un Rusya Seferi sırasında ordusu için ciddi bir sorun haline gelmiştir. Haziran 1812’de Rusya’ya ilerleyen Grande Armée, 1813 sonbaharında geri çekildiğinde Mainz, Fransız topraklarında ilk duraktı. Burada 15.000-17.000 Fransız asker ve aynı sayıda sivil öldü. Daha sonra nörolojik belirtilerinden dolayı 'sinirsel ateş' olarak da adlandırılan hastalık, Fransızcada Typhus de Mayence olarak kaldı. 1814 Ekim sonuna kadar Grand Dükalık Würzburg çevresindeki Franconia bölgesinde 14.000 tifo vakası kaydedildi, bunlardan 2.500’ü ölümle sonuçlandı. 1918-1922 arasında savaş ve iç savaş nedeniyle Rusya’da yaklaşık iki buçuk milyon ölüme yol açan başka bir salgın yaşandı."
 panum.400.g: "Belki kıyafetini değiştir?"
 panum.420.t: "Tifo Salgını sona erdi"
 panum.420.d: "Görünüşe göre tifonun en kötü aşaması sona erdi. Ölüm sayısı henüz tamamlanmamış olsa da, bu korkunç salgın için kimsenin sorumlu tutulamayacağı açık."
 panum.420.f: "'Tanıdığım tek İngiliz hastalar çay içmeyi reddediyordu ve tifolu vakalardı; iyileşmeye başladıklarının ilk işareti tekrar çay istemeleriydi.' -Florence Nightingale"
 panum.500.t: "Sarı Humma Salgını"
 panum.500.d: "Eyaletlerimizden birinde salgın çıktı: [SCOPE.sState('panum_disease_state').GetName]’de #YELLOW Sarı Humma#! hızla yayılıyor!"
 panum.500.f: "Sarı humma, Güney Amerika ve Afrika’nın tropikal ve subtropikal bölgelerine endemiktir. 18. ve 19. yüzyıllarda Orta Amerika, Karayipler ve günümüzde ABD’nin güneyi de etkilendi. Hastalık muhtemelen Afrika’da ortaya çıkmış ve Atlantik üçgen ticareti ile Yeni Dünya’ya ulaşmıştır. Hastalığın ilk olası salgını 1648’de Yucatán’da meydana geldi; hastalığa xekik (kara kusma) deniyordu. Philadelphia’daki 1793 salgını gibi en az 25 büyük salgın daha izlendi; bu salgında birkaç bin kişi öldü ve Amerikan hükümeti ve Başkan George Washington şehri terk etmek zorunda kaldı. Kuzey Amerika’daki sarı humma hakkında erken tıbbi tanımlardan biri, 1756’da Charleston’da doktor John Lining tarafından yapılmıştır; burada 1728 ve 1732’de sarı humma ortaya çıkmıştı. Avrupa’da da ara sıra salgınlar kaydedildi, örneğin 1821’de Barselona’da birkaç bin ölüm. 1867’de Florida, Fort Jefferson’da bir salgın yaşandı. 1878’de Mississippi Vadisi’ndeki bir salgında 20.000 kişi öldü ve ABD’deki son salgın 1905’te New Orleans’ta oldu."
 panum.500.g: "Bozulmuş meyveler mi suçlu?"
 panum.520.t: "Sarı Humma Salgını sona erdi"
 panum.520.d: "Sinsi sarı humma nedeniyle tüm sokaklar ve aileler yok olduktan sonra, doktorlar ve yetkililer salgının sona erdiğini bildirdi: salgın nihayet bitti."
 panum.520.f: "'Buna sarı humma denir, ama hekimlerin bildiği ya da okuduğu hiçbir şeye benzemez.' -Thomas Jefferson"
