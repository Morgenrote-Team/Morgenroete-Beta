 panum.55.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName], yabancı bir hastalığı tanımlayabilir"
 panum.55.d: "Başka bir ülkede, [concept_panum_physician]’ınızın hastalığı inceleyip tanımlayabileceği bir salgın var."
 panum.55.g: "Hekimimizi hemen gönder!"
 panum.55.h: "Şu an değil."
 panum.55.i: "Beni daha az rahatsız edecek şekilde bilgilendir."
 panum.55.j: "Bana bundan sonra haber verme."
