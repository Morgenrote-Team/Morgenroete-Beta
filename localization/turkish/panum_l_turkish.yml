 panum.112.t: "Umudun Kıvılcımı"
 panum.112.d: "[SCOPE.sState('panum_disease_state').GetName]'deki kolera hastanelerinde, bir doktor mevcut salgında özellikle öne çıktı: [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself]. [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]'in çalışma şekli ulusal önem kazandı. Bu hekim, [GetPlayer.GetName] ülkesindeki salgınla mücadelede önemli bir rol oynayabilir."
 panum.209.t: "Dr. Tüberküloz"
 panum.209.d: "Tüberküloz sanatoryumunun başkanı Dr. [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], salgın devam ederken hizmetlerini sundu."
 panum.112.f: "'Tanrı bana konuştu ve beni Hizmetine çağırdı. Bu hizmetin hangi biçimi alacağı ise ses tarafından söylenmedi.' -Florence Nightingale"
 panum.112.g: "[SCOPE.sCharacter('panum_new_physician_scope').GetHerHim]'e hemen resmi bir görev verin!"
 panum.112.h: "Doktor, gelecekteki nesilleri bir sonraki salgınla mücadele etmeleri için eğitmelidir."
 panum.122.t: "Kolera Kuluçka Süresi"
 panum.122.d: "Bir dizi gözlem ve görüşmeden sonra Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tipik kolera semptomlarının bir hastada ortaya çıkmadan önce belirli bir süre geçtiğini keşfetti."
 panum.122.f: "Doktor, bu sürenin yaklaşık yarım günden beş güne kadar olduğunu ve ortalamanın üç gün olduğunu tahmin ediyor. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName], hastalığın kurbanları ve yakınları ile birçok görüşme yaptı. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] bu nedenle birden fazla gözlemci raporuna dayanarak olayları yeniden yapılandırabildi. Sebep belirsiz olsa bile, bu gözlemlerden daha sonra 1. günün tam olarak ne olduğuna dair çıkarımlar yapılabilir."
 panum.122.g: "İyi gözlemlenmiş."
 panum.124.g: "Tam olarak gözlemlenmiş."
 panum.123.t: "Kolera Semptomları"
 panum.123.d: "Bugün Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], Tıp Fakültesi'ne kolera semptomlarının kapsamlı bir listesini gönderdi."
 panum.123.f: "Zaten bilindiği üzere, ancak şimdiye kadar yalnızca kabaca işlenmiş olarak, kolera insan ince bağırsağının bir hastalığıdır. Sonuçlar aşırı ishal, tipik mavi renkli 'pirinç suyu dışkısı' ve şiddetli kusmadır. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın, akademik akşam yemeği için bu ve diğer son derece nahoş semptomların tam tanımını zamanında gönderdiği için belirli bir sadistik tarafı olduğu söyleniyordu."
 panum.124.t: "Kolera Asiatica"
 panum.124.d: "Çok övülen bir raporda Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kolera ile diğer kolera benzeri hastalıklar arasındaki farkları ortaya koydu ve bu, gelecekteki hastalık tanımlamaları için bir dönüm noktası olarak kabul edildi."
 panum.124.f: "Bütün diyare veya bağırsak sorunlarını ('safra akışı') ifade eden Yunanca 'bile' kelimesinden türetilen kolera adı, başlangıçta tüm bu tür rahatsızlıkları ifade ediyordu. Jakob de Bondt 1642'de özellikle Hindistan kolera hastalığını tanımlamış olsa da, kolera tamamen toplu bir terim olarak kaldı. 19. yüzyılın büyük kolera pandemilerinin ortaya çıkmasıyla, yüzyılın en yıkıcı hastalığı olduğu ortaya çıkan bu özel, yeni kolera türü, net bir şekilde ayrılabilmesi için resmi bir ad ile tanımlandı: Kolera Asiatica."
 panum.222.t: "Tüberküloz Kuluçka Süresi"
 panum.222.d: "Tüberküloz araştırmaları sırasında Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalıkla ilgili bazı gariplikler fark etti. Görünüşe göre, hasta bir kişi tipik semptomları göstermeden önce haftalar geçebilir."
 panum.222.f: "Miasma teorisi veya mikrop teorisi fark etmez: tüberküloz hâlâ bir gizem oluşturuyor. Eğer bulaşıcı bir hastalıksa, semptomların ortaya çıkması haftalar alabilir: doktor iki ila on iki hafta arasında tahmin ediyor! Ayrıca, hastayla yaşayan herkesin doğrudan enfekte olmadığı görülüyor, çünkü [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] birçok hasta ve yakınının anketlerini inceledi. Ya akademisyenler haklıdır ve tüberküloz bulaşıcı bir hastalık değildir ve diğer faktörler sorumludur, ya da enfeksiyon riski başlangıçta düşünüldüğünden daha düşüktür."
 panum.223.t: "Tüberküloz Semptomları"
 panum.223.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tüberküloz semptomlarını yoğun bir şekilde inceledikten sonra, bazı akademik meslektaşlarını bile şaşırtan bir sonuca vardı: tüberküloz, akciğer sorunlarının çok ötesine geçen çok çeşitli semptomları olan çok daha karmaşık bir hastalıktır."
 panum.223.f: "Akciğerlere saldırı ve onların acılı, yavaş yok oluşu tüberkülozun en bilinen özelliklerinden biri olmasına rağmen, öksürük birçok semptomdan sadece biridir. Pulmoner tüberküloz, tüberkülozun sadece bir türüdür ve diğer organları da etkileyebilir. Yorgunluk, ateş, iştah kaybı, gece terlemesi veya kan tükürme önceden bilinen semptomlardı. Tüberkülozun sadece akciğerlerin dışında vücuda saldırması ve aynı anda iki farklı tür tüberkülozun ortaya çıkabilmesi, Tıp Fakültesi üyelerinin dünya görüşünü önemli ölçüde değiştirdi."
 panum.224.t: "Tüberküloz ve Skrofula"
 panum.224.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], olası tüberküloz hastalıklarının çeşitli biçimleriyle yoğun şekilde ilgilendi ve diğer hastalık semptomlarıyla birçok benzerliğe rağmen, tüberküloz ile skrofula arasındaki özel farkları ortaya çıkardı ve aynı zamanda bağlantılara da vurgu yaptı."
 panum.224.f: "Tüberküloz tanımları yüzyıllardır var olmasına rağmen, 19. yüzyıla kadar daha az şehirleşme nedeniyle karşılaştırılabilir, yıkıcı etkileri yoktu. Hâlâ 19. yüzyılın sonlarına kadar farklı isimlerle biliniyordu – İngilizce konuşulan dünyada 'consumption' terimi 20. yüzyıla kadar kullanılmaya devam etti. René Laennec, akciğer muayenesi için stetoskopu icat eden tüberküloz araştırmalarının öncülerinden biri olarak kabul edilir. Johann Lukas Schönlein 1832'de tüberküloz terimini ortaya koydu ve bunu özel bir klinik tablo ile ilişkilendirdi. Bu yılların önemli bir bulgusu, skrofula ve tüberkülozun iki farklı hastalık olduğu, ancak tüberküloz semptomlarının çokluğu nedeniyle neredeyse ayırt edilemediğiydi."
 panum.322.t: "Çiçek Hastalığı: Kuluçka ve Semptomlar"
 panum.322.d: "Son bir özet çalışmada Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çiçek hastalığının ilk semptomlarının, kötü şöhretli kabarcıklar ortaya çıkmadan önce grip semptomlarına benzediğini belirtti. Enfeksiyon ile semptomlar arasında bir ila iki hafta geçtiği varsayılabilir."
 panum.322.f: "'Vebadan kolayca sağlığına kavuşanlar bana göre vücudun tamamı açısından önceden kurutulmuş ve temizlenmiş gibiydi; bazılarında kusma oldu ve tümünde mide rahatsızlandı. Ve aynı şekilde, kurtarılacak olan önceden temizlenmiş olanlarda, tüm vücutta koyu kabarcıklar belirgin bir şekilde görülür, çoğu ülserli, tümü kuru. (...) Dışarıdan vücut dokunulduğunda sıcak değildi, solukluk yoktu; cilt daha çok kırmızı, morarmış ve küçük kabarcıklar ile ülserler oluşmuştu.' -Galen"
 panum.323.t: "Su Çiçeği mi, Çiçek Hastalığı mı?"
 panum.323.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] çiçek hastalığı gözlemleri sırasında, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] su çiçeğinin bağımsız, zararsız bir hastalık olduğunu gösteren kısmi bir rapor sunabildi. Bu bugüne kadar oldukça tartışmalı bir teori olmuştur."
 panum.323.f: "'Su çiçeği birçok kişide herhangi bir hastalık veya önceki belirti olmadan ortaya çıkar; bazı kişilerde hafif üşüme, yorgunluk, öksürük, bozulmuş uyku, dolaşan ağrılar, iştah kaybı ve üç gün süren hafif ateş belirtileri öncülük eder. Çoğu, çiçek hastalığı ile aynı boyutta, bazıları ise daha küçüktür. Hiçbir zaman birleşik ya da çok sayıda görmedim. Gözlemlediğim en fazla sayı, yüzde yaklaşık on iki ve vücudun geri kalanında iki yüzdür. Patlamanın ikinci veya en geç üçüncü gününde, kırılmamış kabarcıkların çoğu olgunluğa ulaşmış gibi görünür ve en dolu sarı sıvıya sahip olanlar, özellikle ekstraveze serumun olağandan daha geniş bir alanı kapladığı yerlerde, gerçek çiçek hastalığına oldukça benzer.' -William Heberden"
 panum.324.t: "Kızamık ve Çiçek Hastalığı Arasındaki Fark"
 panum.324.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çiçek hastalığı, kızamık ve su çiçeği hastalarının semptomlarını büyük bir titizlikle karşılaştırdı ve bunları oldukça kesin bir şekilde sınıflandırabildi."
 panum.324.f: "'Çiçek hastalığının döküntüsü, sürekli ateş, sırt ağrısı, burun kaşıntısı ve uykuda kabuslar ile öncülük edilir. Bunlar, sırt ağrısı ve ateşle birlikte hissedilen kaşıntı ile birlikte yaklaşımının daha akut semptomlarıdır. Yüzde gelip giden bir şişlik görülür ve her iki yanakta ve göz çevresinde belirgin bir kızarıklık fark edilir. Bütün vücutta bir ağırlık ve büyük huzursuzluk hissedilir; bu, çok fazla esneme ve gerinme ile kendini gösterir. Boğaz ve göğüste ağrı vardır, nefes almak ve öksürmek zordur. Ek semptomlar: nefes kuruluğu, yoğun tükürük, ses kısıklığı, baş ağrısı ve ağırlık, huzursuzluk, bulantı ve endişe. Farkı not edin: huzursuzluk, bulantı ve endişe kızamıkta çiçek hastalığından daha sık görülür. Öte yandan, sırt ağrısı çiçek hastalığında kızamıktan daha belirgindir.' -Rhazes"
 panum.422.t: "Tifüs Semptomları ve Kuluçka Süresi"
 panum.422.d: "İlk ara raporda Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tifüs semptomlarını ve hastalık sürecinde ilk olarak ne zaman ortaya çıktıklarına dair bir ön tahmin listesini sundu."
 panum.422.f: "'Ateş, üşüme, baş ağrısı, öksürük, döküntü, kusma - tüm bunlar tifüs belirtileridir. Ancak bu semptomların benzer hastalıklarda da görülebileceğini unutmamak gerekir. Bulantı ve kafa karışıklığı ise klasik tifüs için tipiktir. Ateşin karakteristik seyri, iki-üç gün süren sıcaklık artışı, ardından yaklaşık on gün süren sürekli ateş ve birkaç gün süren düşüş ile devam eder. Hesaplamalarıma göre, enfeksiyon ile ilk semptomlar arasında yaklaşık on ila on dört gün geçer.'"
 panum.423.t: "Kamp Ateşi"
 panum.423.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], askeri epidemilerin tarihsel raporlarını tifüs hastalarının mevcut semptomlarıyla karşılaştırdıktan sonra, tifüs ile 'kamp ateşi'ni eşleştirmenin çok faydalı olmadığını sonucuna vardı."
 panum.423.f: "'Kesinlikle bir kamp ateşi var - ama bu GERÇEK kamp ateşi mi?' Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bu tür sorular sordu ve Tıp Fakültesi üyelerini düşündürdü. Tarihsel olarak 'kamp ateşi' olarak bilinen hastalık, uzun süredir büyük ordular veya kışlalar ile ilişkilendirilmiştir; özellikle Napolyon Ordusu'nda büyük kayıplara yol açan hastalık olarak bilinir. Ancak orduda 'kamp ateşi' olarak bilinen tüm hastalıklar tifüs ile eşitlenemez. Tekrarlayan ateş ve siper ateşi, kapalı alanlarda askeri personeli etkileyen diğer bilinen hastalıklardır. Öte yandan, Amerikan İç Savaşı sırasında özellikle yayılan hastalık çoğunlukla tifüs olarak adlandırılmıştır, ancak aslında tifo ateşiydi.'"
 panum.424.t: "Tifüs: İki Hastalık Bir Arada?"
 panum.424.d: "Tifüs hastalarını incelerken Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], birçok varsayımın temelden yanlış olduğunu keşfetti. Önceki doktorlar bağırsaklarda 'hastalık değişikliği' teşhisi koymuş olsalar bile, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tifüs nedeniyle ölenlerde bunu tespit edemedi. Doktor, bağırsak hastalığının tifüsten ayrılması gereken bir hastalık olduğunu ve bunu 'tifo ateşi' olarak adlandırdığını varsayıyor."
 panum.424.f: "19. yüzyılın ortalarına kadar doktorlar tifüs ile tifo ateşi arasındaki farkı ayırt edemiyordu. Bu iki hastalık, sadece semptom derecelerine göre farklılaşan aynı hastalığın tezahürleri olarak kabul ediliyordu. 1836'da Amerikalı doktor William Gerhard, bazı tifüs hastalarında bağırsakların hastalıktan etkilenmediğini gözlemledi; o ana kadar bu semptom yaygın şekilde teşhis edilen bir belirtiydi. Benzer gözlemler, tifüsün bağırsak hastalığı değil, diğer organları etkilediği sonucuna varmasına yol açtı: zihinsel karışıklık ve kas ağrıları sindirim sistemi sorunlarından çok daha yaygındı. Yüzyıllar boyunca tifüs ve tifo ateşinin eşleştirilmesi sadece isim benzerliğine yol açmadı, aynı zamanda bazı dillerde tifo ateşinin tifüs olarak adlandırılmasına sebep oldu; örneğin Almanca'da."
 panum.522.t: "Sarı Hummanın İki Seyri"
 panum.522.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sarı humma gözlemleri sırasında Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalığın iki farklı şekilde ilerleyebileceğini keşfetti."
 panum.522.f: "Doktor, bilinen birçok vakada sarı hummanın hafif bir seyir izlediğini ve birkaç gün içinde geçtiğini belirledi. Tahminen her altı hastadan beşi bu hafif formu deneyimliyor. Hastalığın diğer seyri ise tehlikeli ve ölümcül olabilir. Hastalar ikinci, toksik bir süreçten geçiyor. Bu süreçte tekrarlayan ateş, karaciğer hasarına bağlı sarılık ve karın ağrısı görülüyor. Ağız, burun, göz ve sindirim kanalındaki kanamalar, kanlı kusmaya yol açıyor; bu nedenle İspanyolcada sarı humma için kullanılan isimlerden biri 'vómito negro' ('kara kusma')dır. Böbrek yetmezliği, hıçkırık ve deliryum da görülebilir. Hastalığın ikinci evresine ulaşan sarı humma mağdurlarının tahmini %20 ila %50’si yaşamını yitirmiştir - akademik raporda böyle sonuçlanıyor."
 panum.523.t: "Sarı Humma Mevsimleri"
 panum.523.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], sarı humma salgınlarının belirli bir zamansal örüntüyü takip ettiğini buldu."
 panum.523.f: "Tarihsel kayıtlar ve güncel veriler, sarı hummanın öncelikle yaz aylarında ortaya çıktığını gösteriyor. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalığın neden grip gibi her yıl ortaya çıkmadığını, uzun dönemlerde tamamen ortadan kaybolduğunu henüz açıklayamadı. Dikkat çekici olan, sarı hummanın özellikle yağışlı yıllarda yaygın olmasıdır."
 panum.524.t: "Yerel Bir Hastalık mı?"
 panum.524.d: "Sarı hummayı tanımlarken Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalığın belirli bölgelerle sınırlı olduğunu ve esas olarak bataklık ve tropikal alanlarda yayıldığını vurguluyor; birkaç istisna dışında."
 panum.524.f: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], diğer sarı humma salgınlarına dair birçok rapor ve kaydı inceledi. Dikkat çekici olan, salgınların çok sınırlı bir alanda gerçekleşmiş olmasıdır. Öncelikle Afrika ve Amerika’daki tropikal bölgeler ve bataklıklar etkilenmiştir. Bazı durumlarda salgın daha kuzeye yayılabilir - örneğin ABD’de Philadelphia ve İspanya’da Barselona'ya - ancak doktor, belirli iklim bölgelerinin hastalığın ortaya çıkışında etkili olduğuna inanıyor. İngiliz limanlarında hastalığın izole vakalarının görülmesi, doktoru rahatsız etmiyor; çünkü hastalık liman şehrinin çevresi dışında fazla yayılmamıştır."
 notification_panum_description_progress_notification_name: "Hastalık Tanımlama İlerlemesi"
 notification_panum_description_progress_notification_desc: "Our [concept_panum_physician] Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] has gained new insights from observing the epidemic disease and gained an additional clue."
 panum_antitoxins_tech: "Antitoksinler"
 panum_antitoxins_tech_desc: "Antitoksin, belirli bir toksini nötralize etme yeteneğine sahip bir antikordur. Difteri ve tetanoz toksinlerine karşı antitoksinler Emil Adolf von Behring ve meslektaşları tarafından 1890’dan itibaren üretilmiştir. Tıp tarihinin büyük dönüm noktalarından biri olarak kabul edilirler."
