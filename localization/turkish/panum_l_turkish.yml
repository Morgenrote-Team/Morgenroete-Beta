 je_panum_cholera_treatment_expedition_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sCountry('target').GetName] ülkesinde koleraya karşı tedavi yöntemleri bulmak için bir tıbbi araştırma seferine liderlik ediyor. Hastalık ülkede devam ettiği sürece, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], hastalığın nedenlerini araştırmak ve kontrol altına almak için aylık bir şansa sahip.\n\nHastalık yatışırsa, bilimsel ilerleme kaybolmaz, bir sonraki incelemede de mevcut olacaktır."
