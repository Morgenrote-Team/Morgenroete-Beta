 panum.101.t: "Üçüncü Kolera Pandemisi"
 panum.101.d: "Ganj Deltası'ndan endişe verici haberler başkente ulaştı. Hastalık vakaları hızla artıyor. Yerel doktorlar tarafından kısa bir inceleme sonrası, koleranın yeniden ortaya çıktığını görmekten şok oldular."
 panum.101.g: "Bir şekilde Kolera geri döndü."
 panum.1000.t: "Çocuk Felci Salgını"
 panum.1000.d: "Bir devletimizde salgın ortaya çıktı: #YELLOW Polio#! [SCOPE.sState('panum_disease_state').GetName] bölgesinde yayılıyor!"
 panum.1000.f: "Antik Mısır'dan gelen bazı görseller, çocuk felcinin uzun süredir var olduğunu ve endemik olduğunu gösteriyor. Ancak, 19. yüzyılın sonlarına doğru yaygın bir salgın hastalığı statüsüne ulaştı; İsveç ve ABD'de aniden ortaya çıktı. 1910 yılına gelindiğinde, sık sık salgınlar özellikle yaz aylarında şehirlerde yaygın hale geldi. 1940'lar ve 1950'lerde zirvede, polio her yıl dünya çapında yarım milyondan fazla insanı felç ediyor veya öldürüyordu. Bu salgınlara karşı korku ve toplu tepki, yeni önleme ve tedavi yöntemlerinin geliştirilmesini teşvik etti ve tıbbi hayırseverlikte devrim yarattı."
 panum.1000.g: "Koltuk değnekleri ve tekerlekli sandalyeler günlük nesneler haline geliyor..."
 je_panum_germ_theory_success: "[GetPlayer.GetName], #V 20 Kanıt Parçası#! toplayarak Mikrop Teorisi'ni güçlendirdi ve Miasma Teorisi'ni çürüttü."
