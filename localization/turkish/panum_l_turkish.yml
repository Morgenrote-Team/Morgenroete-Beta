 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], [GetPlayer.GetName] tıp toplumunun önde gelen beyinlerinden biri, salgından etkilenen bir eyalete gitmeyi ve hastalığı orada araştırmayı kabul etti. Doktor, bunun hastalığın tam bir tanımına yol açabileceğini umuyor."
 panum.53.d: "Yaygın salgın, [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'in hastalığın nedenlerini belirlemek ve korkunç hastalığı tedavi etmek için yeni yöntemler geliştirmek amacıyla daha yakından incelemesine yol açtı."
