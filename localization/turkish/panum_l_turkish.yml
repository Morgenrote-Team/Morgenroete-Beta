 panum.840.t: "Kara Ölümün Gizemi"
 panum.840.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], vebanın nedenleri, bulaşma yolları ve alınacak önlemlerle ilgili kapsamlı bir eser yazdı. Özellikle dikkat çeken bir bölüm, fareler ve pirelerin rolü ile ilgilidir."
 panum.840.f: "Veba üzerine yazdığı eserinde Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], birçok yeni keşfi özetledi. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] tarafından özel olarak geliştirilen serum ve dezenfeksiyon için döngü sistemi önermesinin yanı sıra, pirelerin veba basili taşıyıcıları olarak farelerin enfeksiyonu ile ilişkisine dikkat çekiyor. Bulaşma pireden fareye, fareden fareye ve fareden insana gerçekleşir."
 panum.840.g: "Kadim bir düşman aniden evcilleştirilebilir hale geliyor."
 panum.841.t: "Dikkate değer Yayılım"
 panum.841.d: "Son haftalarda Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], vebanın ilk ortaya çıkışı ve yayıldığı yerler üzerine kapsamlı çalışmalar yaptı."
 panum.841.f: "'Son haftalarda Ticaret Bakanlığı’ndan haritalar alıp, yurt dışındaki meslektaşlarımın dosyalarıyla karşılaştırdım. Hastalığın belirli bir iklim veya coğrafyayla bağlantılı olduğunu iddia eden doktorlar yanılıyor. Bunun yerine, karada dalga şeklinde bir yayılım ve en dar limanlardan geçen bir yayılım gözlemlenebilir. Bu şaşırtıcı olmamalı, çünkü Orta Çağ Büyük Veba Salgını da İskandinavya, Akdeniz ve Orta Doğu’da etkili olmuştu. Ama bu meslektaşlarımı ikna edecek mi?'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.841.g: "Yani coğrafyayla pek ilgisi yok."
 panum.842.t: "Dönüşümlü Temizlik"
 panum.842.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetName]’de son derece etkili olduğu kanıtlanan yeni bir prosedürü test etti."
 panum.842.f: "'Kasabanın sistematik dezenfeksiyonu denendi, ancak çok maliyetli olduğu için bırakıldı ve bunun yerine 'genel ev temizliği' planı uygulandı; burada Avrupa Sağlık Müfettişleri ve işçileri sürekli çalıştırıldı. Bölgeler dönüşümlü olarak temizlendi, böylece her konut yılda en az üç kez temizlendi. Bu yöntem basitlik, etkinlik ve ekonomi avantajlarına sahiptir. Her Müfettişe günlük belirli sayıda kat atanır; sakinler ev eşyalarını çıkarır, katlar ve bölmeler yıkanır, yatak tahtaları taşınabilir demir tanklarda temizlenir. Küçük yapısal yasadışılık, fare geçitleri ve benzeri delikler derhal çimento ile doldurulur ve tüm çöpler uzaklaştırılır.'\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in [SCOPE.sState('panum_disease_state').GetName] için daha iyi dezenfeksiyon talimatlarından."
 panum.842.g: "Bu sistem her yerde uygulanmalı."
 panum.843.t: "İlginç Bir Ölüm Oranı"
 panum.843.d: "İstatistiklere bakarken Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], fare avcıları arasındaki ölümlerin aşırı yüksek olduğunu fark etti."
 panum.843.f: "'Ajansın başkanı bana korelasyon ile nedenselliği karıştırdığımı söyledi. Esasen, veba salgınından önce fareleri enfekte etme üzerine çok fazla vurgu yapıldığını neredeyse kelimesi kelimesine söyledi. Şimdi ciddi şekilde merak ediyorum, yetkililerin çoğunluğu veba salgınlarının farelerle ilgili olduğunu varsaysaydı, saf tropik bir hastalıkla ilgili benzer sayıda belirtiye rağmen kendi teorilerine sadık kalırlar mıydı? Fare avcıları arasındaki bariz yüksek ölüm oranı, benim için fazla bir 'korelasyon'.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.843.g: "Daha ne kadar kanıt gerekli?"
 panum.844.t: "Sorun fareler, aptal!"
 panum.844.d: "[SCOPE.sState('panum_disease_state').GetName]’de veba salgını daha yakından incelenirken Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], salgın başlamadan önce bölgede tüm farelerin öldüğünü öğrendi."
 panum.844.f: "'15 Haziran 1894’te Hong Kong’a vardığımda yerde çok sayıda ölü fare görüyorum,' yazdı Alexandre Yersin. 'Fareler kesinlikle salgının gerçek yayılmacıları.'"
 panum.844.g: "Cesur bir tez."
 panum.845.t: "Bir Örnek"
 panum.845.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], morgda bir veba kurbanından doku örneği almayı başardı. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] birçok kişiyi ikna etmek zorunda kaldı. Daha doğrusu, birkaç kişiyi rüşvet vermek zorunda kaldı."
 panum.845.f: "'Cesetler kireçle tamamen kaplı tabutlarda yatıyor. Bir tabut açılıyor. Kasık bölgesini ortaya çıkarmak için kireci kenara itiyorum. Kitle net şekilde görünüyor. Bir dakikadan kısa sürede çıkarıyorum.' -Alexandre Yersin"
 panum.845.g: "Masrafları geri ödeyeceğiz."
 panum.851.t: "'Sadece Yoksulluk ve Pislik'"
 panum.851.d: "[SCOPE.sState('panum_disease_state').GetName]'deki bölge doktoru, yerel yetkililer adına Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in mevcut araştırmalarını temelsiz olarak reddetti. Vebanın nedenleri ve tedavi yöntemleri 'iyi biliniyor'."
 panum.851.f: "'Merkezî hükümetin [ROOT.GetCountry.GetCapital.GetCityHubName]'den bir sağlık memuru göndermesini gerekli bulmasına şaşırdığımızı ifade etmeliyiz, oysa durumu yeterince kontrol altında tutuyoruz. Dezenfeksiyon ve hijyen önlemleri etkili oldu, özellikle evlerin temizlenmesi ve sakinlerin yaşam koşullarının iyileştirilmesi. Zehir muhtemelen belirli bölgelerdeki evlerin altındaki atmosfer koşullarından kaynaklanıyor ve basitçe yoksulluk ve pislikten kaynaklanıyor. Normal anlamda hastalık bulaşıcı değildir.'\n\nBölge doktorundan hükümete yazılan mektuptan"
 panum.851.g: "Başarı kendini gösteriyor..."
 panum.852.t: "Kontamine Gıda"
 panum.852.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ile doğrudan bir tartışma içinde olan birkaç bilim insanı, vebanın kötü beslenmeden kaynaklanan bir bağırsak hastalığı olduğunu açıkladı."
 panum.852.f: "'Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in heyecan verici teorileri olabilir, ancak [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hastalıkla başa çıkma konusunda çok az deneyime sahip. [SCOPE.sState('panum_disease_state').GetName]'deki yerel doktorlar, yetkililere yerleşik bulguları sorgulamamalarını defalarca ilettiler. Gerçekler şunlardır: Veba hastalarının %40’ı kusma, %30’u ishal ve yaklaşık %20’si karın ağrısı çekmektedir. Genel olarak, hastaların neredeyse %60’ında gastrointestinal şikayetler belgelenmiştir. Bu nedenle, hastalığın sindirim sistemi enfeksiyonu olduğu açıktır ve kötü, bozulmuş veya eksik beslenmeden kaynaklandığı da oldukça açıktır.'\n\n"
 panum.852.g: "Doktor - ne yanıt veriyorsunuz?"
 panum.853.t: "Tropikal Hastalıklar"
 panum.853.d: "Birkaç uluslararası üne sahip doktor, vebanın yalnızca belirli iklim bölgelerinde görülen ve dışında nadiren ortaya çıkan bir tropikal hastalık olduğunu ileri sürdü. Dolayısıyla iklimsel bir hastalıktır."
 panum.853.f: "'Geçmişte daha serin bir iklimin veba dalgasının azalmasına yol açtığını gördük. Çıkarımlar açıktır: veba iklim değişiklikleriyle güçlü bir şekilde ilişkilidir. Meteorolojik veriler ve kalan tablolar, son veba dalgasının bugünkü ortamdan çok daha sıcak bir ortamda gerçekleştiğini gösteriyor. 17. yüzyıl sonundaki vebanın kaybolması, havanın soğumasıyla ve veba tamamen kaybolana kadar ilişkilidir. Son birkaç yıldaki artan sıcaklıklar ise, daha önce daha soğuk kabul edilen bölgelerde vebanın yayılmasını açıklamaktadır. Bunu daha ileriye götürmem gerekir mi?'\n\nDoktor Angelika Hasenbein’den Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullNameNoFormatting]'e yazılan bir mektup"
 panum.853.g: "Yani sadece sarı humma varyantı."
 panum.854.t: "Sahte Veba"
 panum.854.d: "Son birkaç gün içinde Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], birkaç hastaneye gönderilerek hastaları incelemekle görevlendirildi. Görüldü ki, hastalar veba değil tifüs hastalarıydı."
 panum.854.f: "'Kara Ölüm, tifüs, kolera, verem, bubonik veba... Ah, o günler.' -Bilinmeyen bir cenaze görevlisi"
 panum.854.g: "Üzücü."
 panum.854.h: "Zaman kaybediyorsak, belki doktor bunu kullanabilir?"
 panum.861.t: "Afyon çözüm değil"
 panum.861.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], afyonun veba hastalıklarına karşı iddia edilen iyileştirici etkilerini dikkatle inceledi ve net bir sonuca vardı."
 panum.861.f: "'Çalışmıyor.'\n\nAfyon kullanımına dair Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sonucu"
 panum.861.g: "Bu biraz hayal kırıklığı, ama aynı zamanda aydınlatıcı."
 panum.862.t: "Septisemi"
 panum.862.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], vebanın nedeni olarak bağırsak hastalığını öne süren deneylerin tamamen yanlış yorumlandığını kanıtladı."
 panum.862.f: "Özellikle kontamine gıdalar nedeniyle sindirim yolu yoluyla bulaş görüşü birkaç yıl boyunca geniş kabul gördü, ancak 'nefes ve deriden çıkan emisyonların' en önemli etiyolojik faktör olduğunu düşünenler de vardı. Veba materyaliyle birçok hayvan besleme deneyi yapıldı ve sindirim sistemi hipotezine renk katıldı; çünkü birçok hayvan ve kuş septisemik hastalıktan öldü, bu hastalık vebaya benziyordu. Ancak sonuçlar kesin değildi ve nihayetinde 1904'te Hong Kong'daki mevcut Sağlık Memuru tarafından tümüyle reddedildi."
 panum.862.g: "Bu, vebanın gıda kontaminasyonu nedeniyle ortaya çıktığı teorisine ciddi bir darbe."
 panum.863.t: "Antibiyotikler"
 panum.863.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çeşitli deneylerde veba hastalarının antibiyotik tedavisine mükemmel yanıt verdiğini gösterebildi ve bu yaklaşımı açıkça tavsiye ediyor."
 panum.863.f: "'Deneylerimi tamamen başarılı olarak nitelendirmek hafif kalır. Aslında antibiyotiklerin nasıl çalıştığına şaşırdım. Bazı hastalar kendilerini iyileşmiş gibi hissettiklerini söylediler. Eğer bu etki doğrulanırsa, veba aşısı arayışına gerek kalmayabilir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.863.g: "Antibiyotiklerin hiç dezavantajı yok mu?"
 panum.864.t: "Böcek İlaçları"
 panum.864.d: "Veba bölgesinde böcek ilaçlarının geniş çaplı kullanımı etkisiz kaldı. Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'e göre bu, şaşırtıcı bir başarıdır."
 panum.864.f: "'Bu başarısızlıktan neden memnun olduğumu sorduğunuz için haklısınız. Ama bilim insanları algılanan yenilgilerden de öğrenir. Bu anlamda bu bir yenilgi değil, bir kanıttır. Bazı meslektaşlarım vebanın sıtma gibi bir tropikal hastalık olabileceğini ve sivrisinekler aracılığıyla yayıldığını düşündüler. En azından bu varsayımı bir kenara koyabiliriz.'\n\nYerel bir gazetede Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ile yapılan bir röportajdan"
 panum.864.g: "Bir seçenek daha elendi."
 panum.865.t: "Tuvaletler"
 panum.865.d: "[SCOPE.sState('panum_disease_state').GetName]'deki hijyen önlemleri araştırması sırasında Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], modern kanalizasyon ve tuvalet altyapısının özellikle vebanın yayıldığı bölgelerde yetersiz olduğunu tespit etti ve yerel yetkililerle iletişime geçti."
 panum.865.f: "'Vebayla en iyi şekilde nasıl başa çıkılacağı henüz kesin olarak açıklanmamış olsa da, kişisel teorilerim ve meslektaşlarımın teorileri ne olursa olsun - deneyimler, dışkıyla kirlenmiş zeminler ve durgun kirli suların temel olarak ortadan kaldırılması gerektiğini göstermiştir; ister bu bölgelerden kaynaklandığı düşünülen miasmalar yüzünden olsun, ister mikropların odak noktaları olduğu için. Sadece vebayı değil, gelecekte diğer hastalık kaynaklarını da kontrol etmek istiyorsak, önleyici önlemler almalıyız.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in yerel hükümete yazdığı mektuptan"
 panum.865.g: "Masraflı olacak, ama kaçınılmaz."
 panum.870.t: "Bacillus Pestis"
 panum.870.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], doku örneğini mikroskobuyla inceledi ve kesin olarak belirledi: veba bir basillus ile bulaşmaktadır!"
 panum.870.f: "'20 Haziran 1894. Yumrularda açıkça görülebilen çok sayıda basillus var. Küçük, kısa ve yuvarlak uçlu. Bu, tartışmasız veba mikrobu.' -Alexandre Yersin"
 panum.870.g: "Her şeyi değiştiriyor!"
 panum.871.t: "Pireler"
 panum.871.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], veba tarihinde en kritik keşiflerden birini yapmış olabilir: pireler, fareler ve veba salgını arasındaki ilişki."
 panum.871.f: "[TimeKeeper.GetCurrentDate.Format('y')], [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] hastalığı yayan fare-pire vektörünü keşfetti. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], hastalanan kişilerin birbirleriyle yakın temas kurmak zorunda olmadığını fark etmişti. Çin’in Yunnan bölgesinde, insanlar ölü fareleri görür görmez evlerinden kaçıyor, Formosa (Tayvan) adasında ise ölü farelerin taşınması vebaya yakalanma riskini artırıyordu. Bu gözlemler, vebanın bulaşmasında pirelerin aracılık rolü olabileceğini düşündürdü; çünkü insanlar sadece ölü farelerle 24 saatten daha kısa sürede temas ettiklerinde vebaya yakalanıyordu. Klasik bir deneyde, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], sağlıklı bir farenin, kısa süre önce vebadan ölmüş fareden bulaşan pirelerle enfekte olduktan sonra vebadan öldüğünü gösterdi."
 panum.871.g: "Büyüleyici."
 panum.872.t: "Veba Karşıtı Serum"
 panum.872.d: "Vebanın bulaşma ve kökeni hakkındaki önceki bilgiler ile veba basilleriyle yapılan deneyler temel alınarak Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] son derece etkili bir veba karşıtı serum geliştirdi ve ilk hastada başarıyla test etti."
 panum.872.f: "'Gece yarısından itibaren hasta daha sakinleşiyor ve sabah altıda (…) uyanıyor ve iyileşmiş hissettiğini söylüyor.' -Alexandre Yersin"
 panum.872.g: "İşe yarıyor!"
