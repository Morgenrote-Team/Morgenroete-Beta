 panum.641.t: "Bildirimi Zorunlu Hastalık"
 panum.641.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yetkililere kızamığı hafif bir hastalık olarak görmeyi bırakmaları ve bildirimi zorunlu hale getirmeleri için acil bir mektup yazdı."
 panum.641.f: "'Meslektaşlarımın, hatta en yüksek devlet ve üniversite organlarındaki çok etkili meslektaşlarımın, kızamığın tehlikesini abarttığımı iddia ettiğini dinlemek zorunda kaldım. Kızamık konusunu sadece kendi konumumu iyileştirmek için büyüttüğüm bile söylendi. Kızamığın ölüm oranı %2 ile %5 arasındadır, bu doğrudur. Ama sadece 100 kişiden yaklaşık 2'sinin kızamıktan öldüğünü varsayarsak, 10 milyonluk bir ülkede bu birkaç bin ölü demektir. Basit önlemlerle önlenebilecek milyonlarca ölüm vardır. İnsanların hayatını kurtarmak için biraz daha dikkat etsek ve kurallara uyacak olsak daha iyi olmaz mı? Yeni doğum yapmış kadınların yaptığı hataları ve doktorların ellerini yıkamamalarının kibirini mi tekrar etmek istiyoruz, oysa küçük bir zaman yatırımıyla büyük bir etki yaratılabilir?'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın [SCOPE.sState('panum_disease_state').GetName] yerel yönetimine yazdığı mektuptan alıntı."
 panum.641.g: "Küçük şeyler büyük fark yaratabilir."
 panum.642.t: "Kızamıkta Hayvan Enfeksiyonları"
 panum.642.d: "Yaygın olarak duyurulan bir hayvan deneyinde, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] maymunları kızamık ile enfekte etti."
 panum.642.f: "'Konu büyük önem taşıdığı ve diğer hayvanların görünüşte dirençli olduğu göz önüne alındığında, maymunların kızamık enfeksiyonuna duyarlılığı konusunu daha ileri testlerle araştırmak bizim için çok arzu edilir görünüyordu.\nBir yıl önce çalışmalara başladık ve şimdi, rhesus maymununun kızamık vakasından alınan genel dolaşımdaki kanla enfekte olabileceğini ve böyle enfekte bir maymunun, insanlardaki bazı kızamık türlerinde görülen ateş seyrine benzeyen belirgin bir febril reaksiyon gösterebileceğini ortaya koyan bazı sonuçları raporlamak istiyoruz, yaygın döküntü ile ya da olmadan.\nÇalışmamızın tüm detayları şu anda hazırlanmakta olan bir makalede sunulacaktır.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın Tıp Fakültesine raporu."
 panum.642.g: "Bu, başarılı bir tedavi bulunmasına yardımcı olacak."
 panum.642.h: "Bu, patojeni bulma çalışmalarına katkı sağlayacak."
 panum.643.t: "Yaşa Bağlı Dalgalanan Hastalık"
 panum.643.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetName]’deki çeşitli hastalık vakalarını inceledi ve hasta ölüm oranlarında önemli farklılıklar fark etti."
 panum.643.f: "'Kızamık zararsız bir çocuk hastalığı olarak kabul edilir. Ancak araştırmalarım, bunun yalnızca çocuklar anaokulu yaşındayken doğru olduğunu göstermiştir. Buna karşılık, ölüm oranı 6 ay ile 3 yaş arasındaki çocuklarda özellikle yüksektir. Bundan sonra, ölüm oranı oldukça hızlı düşer. Yetişkinlerde kızamık zararsız kabul edilse de, Faroe Adaları’ndan Ludvig Panum’un raporları, bağışıklamanın çocuklukta yapılmasının daha iyi olduğunu göstermiştir - deneyimli balıkçılar da hastalığın şiddetli seyrettiğini ve hatta ölüme yol açabildiğini bildirir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.643.g: "Demek özel risk grupları var."
 panum.644.t: "Çok Bulaşıcı"
 panum.644.d: "[SCOPE.sState('panum_disease_state').GetName]’de bir okulu ziyaret ederken, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalık ortaya çıktığında neredeyse durdurulamaz şekilde yayıldığını kendisi görebildi."
 panum.644.f: "'Geldiğiniz için teşekkürler, Doktor.'\n'Sevincim yanımda, hanımefendi. Okulda şimdi kaç kızamık vakası var?'\n'Maalesef, tamamen kaybettik. Dün 35 vardı, ama şimdi 40’ı aşmış olmalıyız.'\n'Kızamığın ilk vakası ne zaman belgelenmişti?'\n'Geçen hafta.'"
 panum.644.g: "Endişe verici."
 panum.645.t: "Hapşırıklar ve Öksürükler"
 panum.645.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kızamığı sınırlamak için grip veya tüberkülozda önerilen karantina önlemlerini öneriyor."
 panum.645.f: "'Kızamık solunum yolu hastalığı olarak algılanmıyor, ancak şüphelerim doğrulandı: yayılmasını durdurmanın tek yolu bu. Kızamık - insanlarda en bulaşıcı hastalıklardan biri - görünüşe göre damlacık yoluyla bulaşıyor. Hasta bir kişinin odasında bulunan insanların, odadan iki saat önce çıkmış olsalar bile enfekte olduğu rapor ediliyor. Görünüşe göre bulaşıcı salgılar daha sonra da bulaşıcı kalıyor.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.645.g: "Neyse ki, bunlar iyi bilinen yöntemler."
 panum.646.t: "Antibiyotikler"
 panum.646.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bazı yeni antibiyotiklerde kızamığın yan etkilerini azaltma olasılığı görüyor."
 panum.646.f: "'Kızamığın genellikle ciddiye alınmamasının nedeni, çoğunlukla başka yan etkilerinin olmaması da olabilir. Ne yazık ki, bu her zaman geçerli değil. Kulak veya akciğer enfeksiyonları gibi ikincil hastalıklar, hafif, şiddetli veya ölümcül seyir arasındaki dengeyi sık sık değiştirmiştir. Antibiyotikler kızamığı tedavi edemez, ama dehşetini azaltabilir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.646.g: "Daha fazla antibiyotik!"
 panum.646.h: "Bu bulgular, gerçek patojeni bulma çalışmalarına yardımcı olmalı."
 panum.647.t: "İstatistikler"
 panum.647.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kızamık vakalarının istatistiksel kaydı, enfekte hane halklarının işlenmesi ve verilerin değerlendirilmesinde özellikle başarılı oldu."
 panum.647.f: "'Son birkaç yılın mevcut verileri üzerinde titiz araştırmalar yaparken, 22 ülkedeki kızamık mağdurlarının ölüm oranlarını inceledim ve aşağıdaki sonuçlara ulaştım:'\n\nŞili %4,84, Macaristan %4,43, Avustralya %0,24, İskoçya %0,35, İspanya %3,85, İtalya, İngiltere ve Galler %2,91, ABD %1,08. Kızamığın endemik olduğu ülkelerde, nüfus yenilenmesini takiben üç ila beş yılda bir salgınlar meydana gelir. Sonrasında, özellikle Pasifik Adaları ve Afrika’da %10’a kadar çıkan çok daha yüksek oranlar rapor edilmiştir.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın Tıp Fakültesine raporu."
 panum.647.g: "Faydalı."
 panum.647.h: "Doktor yetenekli, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] çalışmalarını derinleştirmeli."
 panum.648.t: "Çoğalma"
 panum.648.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kızamığın yayılması ve bulaşmasıyla ilgili şaşırtıcı veriler yayımladı."
 panum.648.f: "'Kızamık son derece bulaşıcıdır ve enfekte bir kişiyle temas eden bağışıklığı olmayan insanların %90’ının hastalığı kapacağı tahmin edilmektedir. Matematiksel modeller, temel üreme sayısını 12–18 olarak tahmin ediyor; yani, duyarlı bir nüfusa tek bir girişten sonra ortaya çıkan ortalama ikincil enfeksiyon sayısıdır. Son derece bulaşıcıdır: bağışıklığı olmayan ve enfekte biriyle aynı yaşam alanını paylaşan her on kişiden dokuzu enfekte olur.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın Tıp Fakültesine raporu."
 panum.648.g: "Önceden yalnızca gözlem yoluyla bilinen şey şimdi bilimle kanıtlandı."
 panum.649.t: "Belirtisiz Bulaşma"
 panum.649.d: "Bazı saha gözlemlerinden sonra, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kızamığın dış belirtiler ortaya çıkmadan önce bile asemptomatik hastalar tarafından bulaşabileceğini mantıklı bir varsayım olarak kabul etti."
 panum.649.f: "'Kızamığın yüksek yaygınlığı iyi bilinen bir olgudur ve enfeksiyon riski eski çağlardan beri bilinmektedir. Büyük bir sorun, görünüşte sağlıklı insanların da hastalığı taşımasıdır, henüz ortaya çıkmamış olsa bile. Bu, daha önce geçerli olan birçok varsayımı geçersiz kılar. Bulaşıcılık - [SCOPE.sState('panum_disease_state').GetName]’deki çeşitli gözlemler göstermiştir ki - döküntü ortaya çıkmadan 4 gün önce başlar ve genellikle döküntüden 4 gün sonrasına kadar sürer. Görünüşe göre bulaşıcılık döküntü başlamadan hemen önce başlıyor.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın Tıp Fakültesine raporu."
 panum.649.g: "Daha kapsamlı araştırmalar yapılması gerekiyor."
 panum.650.t: "Kışla Dezenfeksiyonu"
 panum.650.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetName]’de gençler arasında kızamığın yayılmasını önlemek için örnek teşkil eden önlemler uygulayan bir kışlayı ziyaret etti."
 panum.650.f: "'Bu önlemler arasında gelen askerlerin daha uzun ve sıkı izolasyonu; kışlalarda, kantinlerde, tiyatrolarda ve diğer yerlerde toplanmayı önleyen polis kontrolü; bitişik kışla yataklarının baştan ayağa kaydırılması; zeminlerin, duvarların, masaların, kapı kollarının sürekli ıslak silinmesi ve dezenfeksiyonu; tüm personelin önlük ve gazlı maske takması, bunları değiştirmesi ve hastalarla temas sonrası sabun, su veya dezenfektanla ellerini yıkaması vardı; daha önce nadiren yapılan uygulamalar. Bazı bölümlerde personelin kauçuk eldiven giymesi zorunluydu. Hastalar kabin izolasyonuna yerleştirildi, yatak etrafına iplerden çarşaflar asıldı ve maske takmaları zorunlu oldu. Kabin çarşafları bazen periyodik olarak dezenfektanla püskürtüldü. Maskeli hastalar, gözetmen eşliğinde yalnızca birer birer lavaboya alınabiliyordu.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.650.g: "Kızamıkla mücadelede modern yöntemler."
 panum.651.t: "Başarısız Aşılama"
 panum.651.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın çiçek aşılamasına benzer bir yöntemle kızamığı bağışıklama girişimi büyük bir başarısızlıkla sonuçlandı."
 panum.651.f: "1757’de İskoç doktor Francis Home, kızamığın bir patojen tarafından meydana getirildiğini keşfetti: hastalığı, enfekte hastaların kanını kullanarak sağlıklı bireylere aktardı ve bulaşıcı bir ajanın neden olduğunu gösterdi. 12 çocuktan oluşan bir grubu test etti, bunlardan 10’u 6–7 günlük kuluçka süresi sonrası karakteristik orta dereceli ateşli döküntü geliştirdi, ikisi enfekte olmadı. Bu yaklaşım, özellikle kızamık materyalini hastalığı aşılamak için doğru zamanda elde etme konusunda teknik zorluklar nedeniyle hızla terk edildi."
 panum.651.g: "Zaman kaybı."
 panum.652.t: "Boğaz Gargarası"
 panum.652.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], meslektaşlarının yıllardır kızamığı tedavi edici olarak övdüğü çeşitli gargaraları denedi. Hepsi başarısız oldu."
 panum.652.f: "'Son denemeden sonra, geriye sadece acı bir tat kalmadı. Bir yandan, yılan yağı bile daha iyi etki gösteriyor. Öte yandan, tıp birliğimizde daha fazla sahtekar ve yılan yağı satıcısına tahammül ediyoruz, bunların acilen ayıklanması gerekiyor.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.652.g: "Ne demek yılan yağı işe yaramaz?"
 panum.653.t: "Dezenfektan Spreyi"
 panum.653.d: "Bir kışlada, kızamık salgını yaşayan askerler yakın zamanda dezenfektan içmeye başladılar. Doktor bunun aptalca bir girişim olduğunu düşünüyor ve ikna etmek için çok uğraşmak zorunda kaldı."
 panum.653.f: "'Kimyasal ve tıbbi ürünlerin etiketlerine, en küçük aptalın bile bir sıvı, sprey veya başka bir madde ile ne yapmaması gerektiğini kesin olarak görebileceği küçük resimler koymalıyız.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın Doktor Angelika Hasenbein’e mektubundan"
 panum.653.g: "Tedavi bulmaya çalışırken kaybettiğimiz değerli zaman!"
 panum.661.t: "Vitaminlerinizi Alın!"
 panum.661.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kızamık hastalığı sırasında vitamin almanın, istenmeyen yan etkileri ortadan kaldırmada faydalı olduğunu buldu."
 panum.661.f: "'Vitaminlerin etkisi iyi bilinir, ancak kızamık durumunda etkisi beni şaşırttı. A vitamini eksikliği olan çocuklar ciddi hastalık veya hatta körlük riskiyle karşı karşıya. A vitamini takviyeleri genel bağışıklık sistemini güçlendirebilir, ancak hastalığı iyileştiremez.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın Tıp Fakültesine raporu."
 panum.661.g: "Çok iyi."
 panum.900.t: "Difteri Salgını"
 panum.900.d: "Eyaletlerimizden birinde salgın başladı: #YELLOW Difteri#!, [SCOPE.sState('panum_disease_state').GetName]'de yayılıyor!"
 panum.900.f: "Difteri, öncelikle çocuklarda görülen ve üst solunum yolu enfeksiyonundan (farengeal difteri) kaynaklanan akut bulaşıcı bir hastalıktır. Pierre Fidèle Bretonneau, 1826’da difteri terimini tıbbi kullanıma sokmuştur (diphtherite, 'diphtheritis'). Terim, ölü mukoza ve kan bileşenlerinden oluşan boğazda kahverengi sahte zarları ifade eder. Difteri antik çağlardan beri bilinmektedir; Hipokrat hastalığı zaten tanımlamıştı. Difteri vakalarının %5–10'unda ölümcül olabilir. Beş yaş altı çocuklar ve 40 yaş üstü yetişkinlerde ölüm oranı %20’ye kadar çıkabilir."
 panum.900.g: "Boğazım da daralıyor."
 panum.920.t: "Difteri Salgını sona erdi"
 panum.920.d: "Ülkemizi sıkı bir şekilde etkileyen şiddetli difteri salgını sona erdi. Doktorlar ve yetkililer 'her şey yolunda' dedi, çocuklar sokaklara çıkmaya cesaret ediyor, yetişkinler rahatladı."
 panum.920.f: "'Nemli soğuk bir mevsimde, New Hampshire’ın iç kesimlerinde, alçak bir ova üzerinde yer alan Kingston kasabasında, genellikle 'boğaz hastalığı' olarak adlandırılan, son derece kötü huylu ve bu ülkede şimdiye kadar bilinen en ölümcül hastalık çocuklar arasında ortaya çıktı.' - Noah Webster"
