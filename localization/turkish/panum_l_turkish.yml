 panum.2006.t: "Germ Teorisi Güçleniyor"
 panum.2006.d: "Tıp kongresi, birkaç doktorun hastalığın nedenleri hakkında fikir alışverişinde bulunmasına da fırsat tanıdı. Geleneksel miasma teorisine inanan araştırmacı sayısı giderek azalıyor. Germ teorisi, artık en saygın bilim insanları arasında standart olarak kabul ediliyor."
 panum.2006.f: "'Son zamanlarda, bireysel ülkeler artık eskisi kadar önyargılı davranmadıkları için belirli bir düzenleme ortaya çıktı ve bir ülke diğerinden savunma yöntemleri konusunda iyi denenmiş olanları alıyor. Ancak, tüberkülozla mücadelede kullanılan yöntemlerdeki çeşitlilik sürerken, gerçekten hangi önlemlerin bilimsel gereklilikleri ve genel bulguları en iyi karşıladığını sormak gerekiyor.\n\nAma bu soruyu yanıtlamadan önce, tüberkülozda enfeksiyonun nasıl gerçekleştiğini, yani tüberkül basillerinin insan vücuduna nasıl girdiğini kendimize tamamen açıklığa kavuşturmalıyız; çünkü bulaşıcı bir hastalığa karşı tüm önlemler yalnızca hastalığın mikroplarının vücuda girmesini önlemeye yönelik olabilir.' -Robert Koch"
 panum.2006.g: "Bu kanıtı göz ardı edemeyiz."
 panum.2201.t: "Miasma Teorisi Yorumsal Egemenliğini Kaybediyor"
 panum.2201.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] her gün yeni araştırma yöntemlerine daha fazla odaklandıkça, geleneksel miasma teorisi giderek daha az geçerli hale geliyor. Germ teorisi daha ikna edici görünmeye başladı."
 panum.2201.f: "'Beyler, son sözü mikroplar söyleyecek!' -Louis Pasteur"
 panum.2201.g: "Yani miasma teorisi artık sorgulanabilir?"
