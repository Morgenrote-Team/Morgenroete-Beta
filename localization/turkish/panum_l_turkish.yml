 panum.600.t: "Kızamık Salgını"
 panum.600.d: "Devletlerimizden birinde salgın patlak verdi: #YELLOW Kızamık#! [SCOPE.sState('panum_disease_state').GetName]'de hızla yayılıyor!"
 panum.600.f: "Çiçek hastalığı gibi, kızamık da 10. yüzyılda Pers hekimi Rhazes tarafından anılmış ve Orta Çağ boyunca Avrasya bölgesinde yaygın olmuş. Kızamık, 19. yüzyıla kadar Avrupa'da endemikti ve kentleşme arttıkça daha da önem kazandı. Masenr'ın özel özelliği, birkaç gün içinde yüz ve boyundan tüm vücuda yayılan döküntüdür. Çiçek hastalığıyla birlikte, 16. yüzyılda Hindistan'ın yerli nüfusunun büyük bölümünü etkileyen hastalıklardan biri olarak kabul edilir."
 panum.600.g: "Ama bu sadece zararsız bir çocuk hastalığı… değil mi?"
 panum.620.t: "Kızamık Salgını Sona Erdi"
 panum.620.d: "Görünüşe göre kızamık salgını sona erdi. Son bir grup ebeveyn, ölen çocuklarını defnetti."
 panum.620.f: "'Kızamık gibi, aşk da hayatta geç geldiğinde en tehlikelidir.' -Lord Byron"
 panum.602.t: "Kızamık salgını [SCOPE.sCountry('panum_infected_country').GetName]'ye ulaştı"
 panum.602.d: "Bugün [SCOPE.sCountry('panum_infected_country').GetName]'de ilk kızamık vakalarının bildirildiğine dair raporlar aldık. Yetkililer, yayılmayı önlemek için yeterince çaba göstermediğimiz için bizi suçluyor."
 panum.602.g: "Bunu önlemenin bir yolu yoktu."
 panum.603.t: "Kızamık çocukları öldürüyor"
 panum.603.d: "[SCOPE.sState('panum_disease_state').GetName]'de kızamık salgını beklenenden çok daha şiddetliydi. Salgın özellikle bebekler ve küçük çocuklar arasında yaygındı ve tüm bir nesli kalıcı olarak zayıflattı."
 panum.603.f: "Kızamık her zaman bir çocuk hastalığı olarak görülmüştür, ancak yetişkinleri de etkileyebilir. En yıkıcı etkilerini 2–3 yaş arası gösterir. Ölüm oranı daha sonra hızla düşer. 1963'te, aşı bulunmadan önce, resmi istatistikler dünya genelinde yılda 2 milyon kızamık ölümü olduğunu tahmin ediyordu. Hastalık vakalarının yaklaşık %5–10'u ölümle sonuçlanıyordu."
 panum.603.g: "Bu korkunç hastalığın bir çaresi yok mu?"
 panum.604.t: "Kızamık Denizcileri Felç Ediyor"
 panum.604.d: "Gizemli sebeplerden dolayı, [SCOPE.sState('panum_disease_state').GetName]'de kızamık özellikle balıkçılar ve denizcileri etkiledi. Ölüm oranları önemsiz, ancak balık avlama alanlarında ve balina avcıları arasında iş kaybı göze çarpıyor."
 panum.604.f: "Faroe Adaları'ndaki araştırmaları sırasında Peter Panum, kızamığın yetişkinleri de etkilediğini, özellikle daha izole topluluklarda görüldüğünü keşfetti. Bunun nedenleri uzun süre belirsiz kaldı; ancak, daha yoğun kasabalardan uzakta yaşayan balıkçılar ve ailelerinin özellikle etkilendiği dikkat çekiyordu."
 panum.604.g: "Ama kim şimdi denize çıkıyor?"
 panum.605.t: "Kızamık için Çocuk Kliniği"
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName], [SCOPE.sState('panum_disease_state').GetName]'de kızamıktan etkilenen çocuk sayısının yüksek olduğunu, özellikle ölüm oranlarının daha yüksek olduğu yoksul ailelerde fark etti. Politikacı, kızamık için bir çocuk kliniğini finanse etmek istiyor ve kamu bağışı talep etti."
 panum.605.f: "'[SCOPE.sState('panum_disease_state').GetName]'in iyi ebeveynlerini bu korkunç hastalığın insafına bırakmak utanç verici. Politikacılar harekete geçmeli ve sorumluluk almalı. Çok uzun süre boyunca, çok az şey yapıldı ve çok sayıda kişi yetersiz kaldı. Bir çocuk hastanesi, ebeveynlerin sahip olduğu en değerli şeyi korumaya yardımcı olmalıdır. Yardım edeceğiz. Size söz veriyorum. Adım [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting] olduğu sürece... ne demek seçim konuşmaları yapıyorum?'"
 panum.605.g: "Desteklenmeye değer bir girişim."
 panum.605.h: "Bu parti sadece hastalığı siyasi amaçlar için kullanmak istiyor."
 panum.606.t: "Kızamık Depresyonu"
 panum.606.d: "'[SCOPE.sState('panum_disease_state').GetName]'deki çok sayıda hasta ve ölen çocuk, birçok ebeveyni derinden etkiledi. Bazıları hayat krizi yaşayan çok sayıda insan olduğunu söylüyor.'"
 panum.606.f: "'Bayan Miller bu ay üçüncü çocuğunu defnetmek zorunda kaldı. O, artık çocuksuz olan pek çok anneden sadece biri. Kasabadaki bir fırını işleten Bay Miller, dükkanını birkaç hafta kapattı. Bu bölgedeki birçok aile Miller ailesi gibi. Çocuğunu kaybetmeyen neredeyse hiç bir aile yok. Ancak, kadercilik haftalardır memnuniyetsizliğe dönüşüyor. İnsanlar bu bölgede koşullar kötüye giderse önemli ölçüde daha hassas hale geldi. Birçok kişi artık hükümeti yaşadıkları sıkıntılardan dolayı suçluyor.'\n\n[SCOPE.sState('panum_disease_state').GetCityHubName] Herald gazetesinden makale"
 panum.606.g: "Durum göz önüne alındığında tamamen anlaşılmaz değil."
 panum.622.t: "Kızamık Kuluçka Dönemi"
 panum.622.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], kızamık vakalarının ayrıntılı bir listesini derledi ve bu, kızamığın kuluçka dönemini büyük ölçüde göstermektedir."
 panum.622.f: "'Soyulma evresinin bulaşıcı olabileceği inkar edilemez, ancak genel gerekçelerle aksini düşünecek olursak, bu görüşü kabul ederken dikkatli olunmalıdır. Görünüşe göre bu kadar uzun bir gizli dönem düşünülemediği için, hastalığın daha sonraki bir evresi bulaştırıcı olarak seçilmiş gibi görünüyor. Suderø, Hove ve Lobre köylerinde salgının sonuna doğru, aynı hanede nesiller arasında on dört günden uzun bir aralık oldu ve dışarıdan yeni bir enfeksiyon gösteremedim; ancak bu iki vaka, iyileşme evresinde bulaşan bir enfeksiyonla açıklanabilir. Burada sunulan verilere dayanarak, kızamığın kuluçka döneminin yaklaşık on dört gün olarak büyük bir güvenle tahmin edilebileceğini düşünüyorum; ancak bu sürenin, örneğin bir yolculuk gibi özel koşullarla değiştirilemeyeceğini kesin olarak söylemek mümkün değildir. Birçok faktör, diğer hastalıkların gizli dönemlerinin belirsizliğiyle analoji yaparak bu tür mutlak bir yargıya karşı önceden konuşur.' -Peter Panum"
 panum.623.t: "Kızamığın Özelliği"
 panum.623.d: "Yeni bir ara adımda, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] kızamığın farklı formlarını ayırdı ve sadece çiçek hastalığı, kızıl ve rubella gibi benzer hastalıklardan farkları not etmekle kalmadı, aynı zamanda benzersiz semptomlarını da vurguladı."
 panum.623.f: "'Kızamık üzerine literatür, diğer akut döküntülü hastalıklarla, örneğin kızıl ve çiçek hastalığıyla karşılaştırıldığında önemsiz ve eksiktir. Dergilerde tekil salgınlarla ilgili dağınık raporların dışında sadece birkaç monografi vardır ve bunların birkaçı önceki yüzyıla aittir. Bu döküntülü ateş, Yunan ve Arap hekimleri için bilinmeyen bir hastalık, hatta geçen yüzyılda bile o kadar az ayırt edilmişti ki de Haën, semptomlara dayanarak kızamığı çiçek hastalığıyla özdeş tutuyordu ve on yedinci yüzyılın sonuna kadar yazarlar her iki hastalığı aynı aileye ait olarak tanımlıyordu.' -Peter Panum"
 panum.624.t: "Bakire Nüfuslar ve Ömür Boyu Bağışıklık"
 panum.624.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] yakın zamanda çok net bir şekilde gösterebildi ki, kızamık bir kişiyi etkilediğinde tekrar görülmüyor. Hastalıkla hiç karşılaşmamış nüfuslar bu nedenle özellikle risk altında."
 panum.624.f: "'Bu bağlamda oldukça dikkat çekici olan, Faroe Adaları'nda 1781'de kızamık geçirmiş olan yaşlı insanlar arasında, dikkatli bir araştırmayla öğrendiğim kadarıyla, ikinci kez hastalığa yakalanan hiç kimse olmamasıdır. Kendim, gençliğinde hastalığı geçirmiş olan doksan sekiz yaşlı kişi gördüm, ve bunlar bağışık sayıldılar. Bu durum, yüksek yaşın kızamığa karşı duyarlılığı azaltmadığı göz önünde bulundurulduğunda daha da kayda değerdir; çünkü daha önce kızamık geçirmemiş tüm yaşlılar enfeksiyona maruz kaldıklarında hastalığa yakalandılar; oysa bazı gençler, sürekli maruz kalmalarına rağmen, bağışık kaldılar. Eğer kızamık geçirdikten 65 yıl sonra kişiler ikinci kez hastalığa karşı korunabiliyorsa, daha kısa sürede iyileşenlerin daha büyük bir koruma sağladığı varsayılabilir.' -Peter Panum"
 panum.700.t: "Kızıl Ateş Salgını"
 panum.700.d: "Ülkemizin bir eyaletinde salgın başladı: #YELLOW Kızıl Ateş#! [SCOPE.sState('panum_disease_state').GetName]'de hızla yayılıyor!"
 panum.700.f: "Kızıl ateş eski zamanlardan beri bilinir ve özellikle 17. yüzyılda Thomas Sydenham tarafından iyi tarif edilmiştir. 18. yüzyılda tehlikesi azalmış gibi görünse de, 19. yüzyılda yeni bir formda geri dönmüştür. Örneğin Pierre Fidèle Bretonneau, 1800 civarında tek bir ölümcül vaka bilmediğini, ancak 1824’te Tours'da öyle yüksek ölümlerle bir salgın gözlemlediğini ve bu yüzden kızıl ateşi veba ve kolera ile eş tuttuğunu belirtmiştir. Kızıl ateş karakteristik bir döküntü ile görülür. Çiçek hastalığı veya kızamıktan farklı olarak, kızıl ateşte bademcik bölgesi şişer ve dil çilek rengini alır."
 panum.700.g: "Her çocuk bununla bir noktada karşılaşmak zorunda. Umarım."
 panum.720.t: "Kızıl Ateş Salgını Sona Erdi"
 panum.720.d: "Ülkemizi saran kızıl ateş salgını yavaş yavaş şehirleri ve köyleri terk ediyor. Sayısız ebeveyn rahat bir nefes alıyor."
 panum.720.f: "'Kızıl ateş gibidir: geçmek gerekir.'\n\n'O halde aşkı da aşılamak için bir yol icat edilmeli, tıpkı aşı gibi.' -Leo Tolstoy"
 panum.722.t: "Eski Bilgi"
 panum.722.d: "Bir antikacı aracılığıyla, [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] geçmişte kızıl ateşin tarif edildiği birkaç eski kitap bulabildi ve bunlar günümüzde de faydalı olabilir."
 panum.722.f: "Kızıl ateşin antik çağlarda biliniyordu mu yoksa difteri, kızamık ve rubella gibi benzer hastalıklarla karıştırılmış mı olduğu kesin olarak söylenemez. Kızıl ateşe benzer bir hastalığın kanıtları Celsus, Caelius Aurelianus, Arataeus of Cappadocia ve Aetius of Amida’da vardır. Benzer tarifler Orta Çağ’dan itibaren Arap-Fars bölgesinde de bulunabilir, örneğin İbn-i Sina, Ali Abbas ve Rhazes tarafından. Kızıl ateşin ilk kesin tanımı Giovanni Filippo Ingrassia tarafından 1553’te yapılmıştır. 16. yüzyıldan doktor Daniel Sennert de önemli bir kaynaktır. 'Scarlatina' adı Thomas Sydenham’a ve 1675’teki tarifine dayanır. Sydenham’ın tarifi otoriter sayılır, fakat önemli boşluklar vardır ve kızıl ateş terimi İngiltere’de 16. yüzyıl ortalarında da yaygın görünmektedir."
 panum.723.t: "Kızıl Ateşin Belirtileri"
 panum.723.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], kızıl ateşin belirtilerini tanımlamada ilerleme kaydetti ve belirtileri ilk kez özetledi."
 panum.723.f: "'Hastalar titreme ve üşüme hisseder, tıpkı diğer ateşlerde olduğu gibi. Ancak belirtiler orta düzeydedir; ardından tüm cilt küçük kırmızı lekelerle kaplanır, kızamıktakinden daha kalın ve geniş, daha kırmızı ve düzensizdir. Bunlar iki–üç gün sürer ve sonra kaybolur. Hastada sadece döküntü değil, bademcik iltihabı da vardır. Romatizma ve ödem gibi komplikasyonlar olabilir.'\n\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'ın Tıp Fakültesine yazdığı mektup"
 panum.724.t: "Kızıl Ateş Gırtlağı Sevmez"
 panum.724.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], kızıl ateş ile difteri hastalığı arasındaki belirgin farkları tespit etti."
 panum.724.f: "'Kızıl ateşte iltihap bademcikler, damak ve yutakta yaygındır ve başlangıçta difteride olduğu gibi tek bir noktaya sınırlı değildir; ayrıca, kızıl ateşin yutak iltihabı solunum yollarına yayılma eğiliminde değildir. Kısaca söylemek gerekirse: kızıl ateş gırtlağı sevmez.'\n\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'ın Tıp Fakültesine yazdığı mektup"
 panum_plague_quarantine_modifier: "Veba Karantinası"
 panum_plague_hospitals_modifier: "Veba Evleri"
 panum_plague_burn_everything_modifier: "Her Şeyi Yak!"
 panum_plague_rat_killer_modifier: "Her Şeyi Öldür!"
 panum_plague_loss_of_trust_modifier: "Güven Kaybı"
 panum.800.t: "Vebanın Geri Dönüşü"
 panum.800.d: "Birkaç yıldır vebanın ülkemizin bazı bölgelerine geri döndüğü söylentileri vardı. Daha önce bu yalnızca uzak kırsal bölgelerle sınırlıydı. Ancak [SCOPE.sState('panum_disease_state').GetName]'deki salgın ile artık net: veba yeniden pençelerini uzatıyor!"
 panum.800.f: "Üçüncü veba pandemisi (6. yüzyıldaki Justinian Vebası ve 14. yüzyıldaki 'Kara Ölüm'den sonra) 19. yüzyılın sonlarında Çin'de başladı. Pandeminin Yunnan’dan kaynaklandığı düşünülüyor; burada 1792, 1855 ve 1866’da salgınlar görülmüştü. 1894 Ocak ayından itibaren komşu Guangzhou kentindeki salgın 80.000 kişinin ölümüne yol açtı. Mart 1894’te Hong Kong’daki İngiliz bilim insanları ve doktorlar salgından haberdar oldu. Geçmiş on yıllardaki kolera dalgalarından sonra, veba dalgasının özellikle Çin ve Hindistan’da birçok ölüme yol açması ve nihayetinde devlet istikrarını tehdit etmesi bekleniyordu. Dünya genelinde tahmini olarak 15 milyon cana mal olacaktı."
 panum.800.g: "İmkânsız! Veba unutulmuş bir geçmişin hastalığıdır!"
 panum.820.t: "Veba Salgını Sona Erdi"
 panum.820.d: "İnsanlığın en korkunç felaketlerinden biri olan vahşi veba ülkemizi tekrar terk etti. Umarız ait olduğu yere döner: tarihin derinliklerine."
 panum.820.f: "'Ama veba ne anlama geliyor? Hayat, hepsi bu.' -Albert Camus"
 panum.802.t: "Veba [SCOPE.sCountry('panum_infected_country').GetName]'ye yayılıyor"
 panum.802.d: "Veba vakaları artık sınırlarımızın ötesinde de bildiriliyor. Görünüşe göre yetkililer hastalığı kontrol altına alamadı. [SCOPE.sCountry('panum_infected_country').GetAdjectiveNoFlag] büyükelçisi ciddi suçlamalarda bulundu."
 panum.802.g: "Uzun vadede, veba herkese gelir..."
 panum.803.t: "Veba Salgını"
 panum.803.d: "Ülkemizin bir eyaletinde salgın başladı: #YELLOW Veba#! [SCOPE.sState('panum_disease_state').GetName]'de hızla yayılıyor!"
 panum.803.g: "Kara Ölüm kapıda."
 panum.804.t: "Veba: Üçüncü Dalga"
 panum.804.d: "[SCOPE.sCountry('panum_plague_country').GetName]'den tüyler ürpertici haberler geliyor. Birkaç hafta önce şiddetli bir salgın çıktığı söyleniyor. Doktorlar endişeli: bunun ünlü veba olduğu iddia ediliyor."
 panum.804.g: "Buna hazırlık için bir tıbbi sefer düzenlemeliyiz."
 panum.805.t: "Veba Karantinası"
 panum.805.d: "[SCOPE.sState('panum_disease_state').GetName]'de durum kontrolsüz hale gelebilir. Etkili politikacılar, yetkililer ve özel kişiler, vebanın daha fazla yayılmasını önlemek için karantina çağrısında bulunuyor. Bunlar öncelikle [SCOPE.sState('panum_disease_state').GetName]'de yaşamayan kişiler."
 panum.805.f: "Orta Çağ'da kapsamlı ve sıkı karantinaların başarılı olduğu zaten kanıtlanmıştı. Aslında karantina terimi İtalyanca '40' kelimesinden gelir ve görünüşe göre veba zamanlarında ilk kez kullanılmıştır. Özellikle geniş ticaret trafiğine sahip bir ticaret ülkesi olarak Venedik Cumhuriyeti bu önlemle tanınmıştır, çünkü liman ve ticaret şehirleri salgınlardan ciddi şekilde etkileniyordu."
 panum.805.g: "Bütün bölge karantinaya alınmalı."
 panum.805.h: "Abartmamalıyız."
 panum.806.t: "Veba Evleri"
 panum.806.d: "[SCOPE.sState('panum_disease_state').GetName]'de yerel yetkililer, sağlıklı nüfusu hasta nüfustan daha iyi izole etmek için veba evleri kurulmasını önerdi. Bu özellikle kaçamayan fakir sınıfları etkiler."
 panum.806.f: "Veba evleri, veba salgınları sırasında hastaların bakımını sağlamak için kullanılırdı. Salgınların zirve döneminde bu hastalıkların tedavisinin mümkün olmadığı düşünüldüğünden, veba evleri esas olarak hastaları sağlıklı nüfustan izole etmek için yapılırdı. Bunun için genellikle şehir dışında veya kenarında leprozorium benzeri veba evleri inşa edilirdi. Başka bir tür veba evi ise karantina amacıyla önlem olarak hizmet ediyordu. Vebanın görüldüğü çevrelerden insanlar veba evine alınır ve enfekte olmadıkları anlaşılana kadar çıkmalarına izin verilmezdi."
 panum.806.g: "Bu sadece onların iyiliği için. İstemeseler bile."
 panum.806.h: "Bu sadece huzursuzluk yaratır."
 panum.807.t: "Veba Doktoru"
 panum.807.d: "[SCOPE.sState('panum_disease_state').GetName]'deki veba hastanelerimizden birinde baş doktor, bu alanda öyle deneyim kazandı ki ulusal düzeyde değerli bir yardım olabilir."
 panum.807.f: "'Bırakın geçeyim! Ben doktorum. Bu hastalıkla tam olarak nasıl başa çıkılacağını biliyorum.'"
 panum.807.g: "Doktora yüksek rütbeli bir pozisyon verin."
 panum.808.t: "Zenginlerin Kaçışı"
 panum.808.d: "[SCOPE.sState('panum_disease_state').GetName]'de göçmen sayısı her gün artıyor. Özellikle bunu karşılayabilen aileler vebadan kaçmaya çalışıyor. Kaçacak parası olmayanlar arasında büyük bir öfke var. Bazıları bunun vebayı daha da yaygınlaştıracağını uyarıyor."
 panum.808.f: "'Bazıları, en akıllıları, belki de yargıda en sağlam olanları, aynı zamanda en sert mizaca sahip olanlar, hastalık için en iyi veya eşit etkili ilaç olmadığını ve kaçmanın tek çare olduğunu belirttiler; bu reçeteyi izleyen çok sayıda erkek ve kadın, sadece kendilerini düşünenler, şehirlerini, evlerini, mülklerini, akrabalarını terk edip gönüllü sürgüne gittiler veya kırsal bölgelere göç ettiler; Tanrı bu salgını insanlara kötülüklerinin cezası olarak gönderirken, onları nerede olurlarsa olsun takip etmeyecek, sadece şehir duvarları içinde kalanları yok etmeyi amaçlamış olacak; veya belki de artık herkesin kaçması için zamanın geldiğini düşündüler ve son saatinin geldiğini varsaydılar.' -Boccaccio"
 panum.809.t: "Ceset Yığınları"
 panum.809.d: "Vebadan ölü sayısı o kadar arttı ki kontrol altında tutulması neredeyse imkânsız hale geldi. Bazıları şimdiden halka açık yakma ve toplu mezar öneriyor."
 panum.809.f: "1894 Hong Kong vebasının zirvesinde, hastaneye kabul edilen kişi sayısı günde ortalama 80 idi ve günlük ölü sayısı 100’ü aştı. Deniz trafiği aracılığıyla salgın 1894’ten sonra ülkenin geri kalanına yayıldı ve sonunda İngiliz Hindistanı’na ulaştı; burada yaklaşık on milyon Hintli öldü. Başlıca önlemler, veba hastaneleri kurmak ve tıbbi personeli veba hastalarını tedavi ve izole etmek için görevlendirmek; ev ev arama operasyonları yapmak, veba hastalarını bulmak ve nakletmek, enfekte evleri ve alanları temizleyip dezenfekte etmek; ayrıca belirlenmiş mezarlıklar kurmak ve veba ölülerini taşımaktan ve gömmekten sorumlu bir kişi atamak oldu."
 panum.810.t: "Kara Ölüm Bedelini Ödüyor"
 panum.810.d: "[SCOPE.sState('panum_disease_state').GetName]'de veba salgını özellikle şiddetli. Olağanüstü sayıda ölüm bildirildi, normalden daha fazla."
 panum.810.f: "Hastalık birkaç yıl boyunca Güneybatı Çin’de sınırlı kaldıktan sonra yayıldı. 1894 Ocak ayında Canton şehrinde, Haziran’a kadar hastalık 80.000 kişinin ölümüne yol açtı. Yakınlardaki Hong Kong’a yapılan günlük deniz trafiği vebayı hızla buraya taşıdı ve 1894 Hong Kong vebasında iki ay içinde 2.400’den fazla kişi öldü."
 panum.810.g: "Hiç kimse Ölüm Meleği’nden kaçamaz!"
 panum.811.t: "Her Şeyi Yak!"
 panum.811.d: "Etkilenenlerin evlerini temizlemek ve dezenfekte etmek, vebanın yayılmasını durdurmanın genellikle tek yoludur. Bu çoğu zaman veba hastasıyla temas eden her şeyin yakılmasını da içerir."
 panum.811.f: "'Söylerim ki, bu hastalığın bulaşıcılığı o kadar güçlüydü ki, yalnızca insanlardan insana yayılmakla kalmadı, çok daha şaşırtıcı olarak, hastalığa yakalanmış veya ölmüş birine ait eşyalar, başka bir canlı tarafından dokunulduğunda, sadece hastalanmaya değil, neredeyse anında ölüme yol açıyordu. Bunu kendi gözlerimle gördüm; bir gün, ölen bir fakirin bezleri sokaklara saçılmıştı. İki domuz geldi, burnuyla bezlerle oynadı ve hemen ardından zehirlenmiş gibi yere düştü.' -Boccaccio"
 panum.811.g: "Gerekirse giysileri, mobilyaları ve hatta evleri yakın!"
 panum.811.h: "Buna gerek yok."
 panum.812.t: "Her Şeyi Öldür!"
 panum.812.d: "Erken dönemlerden itibaren farelerin vebanın taşıyıcısı olabileceği şüphesi vardı. [SCOPE.sState('panum_disease_state').GetName]'de hastalığın yayılmasını önlemek için hayvanların ve haşerelerin özel olarak yok edilmesi çağrıları yapılıyor."
 panum.812.f: "Üçüncü veba pandemisi sırasında, Avrupa şehirlerinde fareleri aramak ve öldürmek için 'anti-fare birimleri' kuruldu veya fareler benzin dolu kovalara batırıldı. Ancak, üçüncü pandemide vebanın bulaşmasında insanlara özgü veya insanları ısıran parazitlerin (bitler ve pireler gibi) önemli olduğu sıklıkla öne sürüldü. Avrupa’daki salgınlarda az sayıda veba taşıyan fare bulunması, onların bulaşta nispeten küçük rol oynadığını gösteriyor. Bazı araştırmacılar, yetkililerin veba taşıyan fareleri bulmasının zor olduğunu savundu çünkü fareler saklanıyordu."
 panum.812.g: "Fareleri yok et."
 panum.812.h: "Bu çok maliyetli."
 panum.813.t: "Güven Kaybı"
 panum.813.d: "[SCOPE.sState('panum_disease_state').GetName]'de birçok sakin mevcut tıbbi durumu skandal olarak görüyor. Çok sayıda ölüm ve hükümetin açık başarısızlığı, yaygın bir güven kaybına yol açtı."
 panum.813.f: "19. yüzyıl veba salgını özellikle Çin’de yüksek sayıda kurban verdi ve hükümete, Qing imparatorlarının Cennet Mandası’na güveni ciddi şekilde sarstı."
 panum.813.g: "O zaman kendi işini kendi gör!"
 panum.822.t: "Kara Ölüm"
 panum.822.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], çeşitli tarihi kaynakları kullanarak, yeni veba dalgasının aslında Orta Çağ Kara Ölümü ile aynı hastalık olduğunu kanıtlayabildi."
 panum.822.f: "Hindistan’daki vebanın yayılmasının keşfi, vebanın modern anlamdaki hastalık olarak görülmesinde önemliydi. Başlangıçta hastalığın sadece tek bir şekilde yayıldığı düşünülüyordu. Araştırmalar, şimdi çok sayıda kemirgen ve pire türünü kapsayacak şekilde genişledi. Kolonilerdeki yüksek ölüm oranı, salgının özelliklerini haritalamak için araştırma çabalarını artırdı. Başlangıç noktası olarak bunun her zaman veba olduğu sorgulanmadı. Hastalığa tarihsel olarak 'veba' adı verildi. Orta Çağ vebasının Hindistan’daki veba ile aynı olduğu varsayıldı."
 panum.823.t: "Veba Mevsimi"
 panum.823.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], tüm kayıtları inceledi. Bu salgında veya öncekilerde, yakın veya uzak geçmişte: kışın veba salgını yok. Bunun neden böyle olduğu belirsiz, ancak hastalığın çıkış nedenlerini araştırmada rol oynayabilir."
 panum.823.f: "'Böylece bu yıl sona eriyor ... Gerçek şu ki büyük veba nedeniyle büyük bir üzüntü yaşadık ve ailemi uzun süre Woolwich'te tutmak ve kendimi ve ailemin diğer bir kısmını, memurlarımı, Greenwich'te masrafım dahilinde tutmak zorunda kaldım ... Ama şimdi veba neredeyse tamamen azaldı ... Tanıdığım birçok kişi öldü. Yine de büyük sevincimizle, şehir hızla doluyor ve dükkanlar yeniden açılmaya başlıyor. Tanrı vebanın azalmasını sürdürsün - çünkü bu Mahkeme'yi iş yerinden uzak tutar ve böylece kamu işleri de bu mesafede düşünülmeyerek zarar görür.' -Samuel Pepys"
 panum.824.t: "Bubonik Veba ve Pnömonik Veba"
 panum.824.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], vebanın yalnızca tek bir formu olmadığını gösterdi."
 panum.824.f: "Veba genellikle bubonik veba olarak anlaşılır. Kuluçka süresi birkaç saat ile yedi gün arasındadır. Belirtiler ateş, baş ağrısı ve vücut ağrıları, güçlü bir hastalık hissi ve baş dönmesidir. Bilinç bozuklukları daha sonra görülür. Bubonik veba adı, boyun, koltuk altı ve kasık bölgelerinde oluşan çok ağrılı şişliklerden gelir. Pnömonik veba ise çok daha nadirdir. Muhtemelen grip benzeri seyreder, ancak yayılma kapasitesi çok daha zayıftır. Yayılma o kadar özeldir ki, yalnızca özellikle elverişli koşullar altında salgın haline gelebilir. Öncelikle, enfeksiyon kaynakları nadirdir. Örneğin bubonik veba ve zayıf bağışıklık durumunda, veba bulaşmış popülasyonun yalnızca küçük bir kısmı pnömonik veba kapar."
 panum.241.t: "Tavşan Deneyi"
 panum.241.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], tüberkülozun bulaşıcılığını kanıtlayacak cesur bir deney tasarladı. Bu deney, aşılamayla ve birçok küçük ölü tavşanla ilgili."
 panum.241.f: "'İlk deneyim için, tüberkülozun bulaşıcılığını belirlemek amacıyla üç haftalık sevimli bir çift tavşan satın aldım. Bunlardan birini, 33 saat önce ölen bir tüberküloz hastasının dokusundan alınan tüberküloz özütü ile serptim. İşlemi iki kez tekrarladım. Birkaç gün sonra hayvanları diseke ettim ve tavşanın tüberkülozla enfekte olduğunu gördüm.\n\nBir ay sonra deneyimi üç güzel küçük tavşanla tekrarladım. İşlemi yeniden yaptım ve daha sonra bir tavşan ekledim. Sonra dört gün boyunca her gün bir tavşanı diseke ettim. Hepsi tüberküloz hastalığına yakalanmıştı, ancak hastalığın dört farklı aşamasındaydı. Sadece ilkini aşılamıştım.\n\nÜçüncü denememde, üç aylık dört çift sevimli genç tavşan aldım...'\n\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in 'Tüberkülozun Nedeni ve Doğası' adlı deney kitabından"
 panum.241.g: "Bu korkunç hayvan deneylerini durdurun!"
 panum.241.h: "Deneyi kesin olmak için tekrarlayalım."
 panum.241.i: "Bilim için üçüncü tavşan deneyi!"
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U], teoriyi kanıtlamak için mümkün olduğunca çok tavşan öldürebilir."
 panum.261.t: "Yapay Pnömotoraks"
 panum.261.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], akciğerleri yapay olarak çökerten ve tüberkülozla mücadelede yardımcı olabilecek bir cihaz icat etti."
 panum.261.f: "Kardeşinin yardımıyla Carlo Forlanini, intrapleural gaz uygulayabilen basit bir cihaz tasarlayıp inşa etti. İntrapleural sıvıda gaz varlığı, akciğerin çökmesine neden oldu ve böylece yapay bir pnömotoraks oluşturuldu. Cihazı yaptıktan sonra Forlanini, iki tüberküloz vakasında pnömotoraks uygulayarak tedavi denedi ve olumlu sonuç aldı. Yıllar içinde Forlanini’nin tekniği geliştirildi ve başarı oranı arttı. Yapay pnömotoraks, streptomisin kullanılmaya başlanana kadar tedavi olarak devam etti."
 panum.262.t: "Torakoplasti"
 panum.262.d: "Cerrahi yetenekleri sayesinde, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], akciğer cerrahisinde devrim yaratan bir prosedür icat etti ve tüberküloz hastalarının tedavisini geliştirdi."
 panum.262.f: "Torakoplasti, göğüsün bir tarafındaki kaburgaların veya kaburga parçalarının cerrahi olarak çıkarıldığı bir işlemdir; amaç akciğeri veya akciğerin bir kısmını çökertmektir. Bu prosedür Edouarde de Cérenville’e kadar uzanır ve öncelikle akciğer tüberkülozunu tedavi etmek için kullanılmıştır. Ancak etkili antibiyotiklerin tanıtılmasıyla önemi azalmıştır."
 panum.263.t: "Doktor Yine Başardı!"
 panum.263.d: "Tüberkülozun bulaşıcılığını bir kez daha kanıtlamak için Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], sayısız sevimli tavşanı tekrar öldürdü."
 panum.263.f: "'Bu sefer aldığım dört çift tavşandan ilk çiftin ilk hayvanını hemen öldürdüm. Akciğerlerinde herhangi bir lezyon göstermiyordu.'\n\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in 'Tüberkülozun Nedeni ve Doğası' deney kitabından"
 panum.263.g: "Buradaki amaç insan hayatını kurtarmak."
 panum.263.h: "Bu doktor ciddi bir sorun yaşıyor."
