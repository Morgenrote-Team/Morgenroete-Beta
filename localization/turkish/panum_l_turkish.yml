 panum.2221.t: "Kürk İşçileri Hastalığı"
 panum.2221.d: "Sözde 'Kürk İşçileri Hastalığı'nı incelerken, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bunun aslında şarbon olduğunu keşfetti."
 panum.2221.f: "İnsanlarda şarbon, öncelikle deri işçileri ve kürk, kıl ve tüy işleyenlerde ortaya çıkıyordu; ayrıca liman ve nakliye işçileri ile postçularda da görülüyordu. Hastalığın zirveye ulaştığı dönemler, ucuz hayvan derilerinin veteriner kontrolü az veya hiç olmayan bölgelerden ithal edildiği deri endüstrisi krizleriydi. Uzun süre hastalığın gizemli kökeni bilinmiyordu. Zehirlenme vakası olarak düşünülüyordu ve halk buna 'kürk işçileri hastalığı' diyordu. Mikrobiyolojinin ilerlemesi ve mikrop teorisinin uygulanmasıyla, ekonomik açıdan zararlı hayvan hastalığı ile insanlarda ölümcül hastalık arasındaki bağlantılar kurulmuş ve işçilerin korunmasını sağlamak amacıyla yeni düzenlemeler getirilmiştir."
 panum.2221.g: "Sıkı koruyucu önlemler alın."
 panum.2222.t: "Guatr Hastalığı"
 panum.2222.d: "Uzak dağ vadilerinde dev guatrları olan birkaç kişiyi inceledikten sonra, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] iyot kullanarak bir tedavi denedi. Birkaç denemeden sonra terapi işe yaradı."
 panum.2222.f: "Styria, Tirol ve İsviçre'nin Alplerinde, ayrıca diğer dağlık bölgeler ve İngiliz Midlands’ta guatr yaygın bir hastalıktı. Guatr oluşumunun belirli bölgelerdeki suyla ilişkili olabileceği erken dönemde şüphe edilmişti. Paracelsus bazı minerallerin eksikliğini tahmin etmiş ve kurşun içeren su içilmesini önermişti. Eski Çin’de doktorlar deniz yosunu ve sünger yemeyi tavsiye ediyordu. Tiroid bezinin işlevi ve iyodun önemi daha iyi anlaşılınca ilk tedavi girişimleri başladı. 1918’den itibaren İsviçreli doktor Otto Bayard, Nikolaital’daki uygulama alanındaki topluluklara doğru dozda iyot katılmış iyotlu tuz kullanımıyla gelişim bozukluklarını, tiroid bezinin büyümesini ve guatr ile nodül oluşumunu başarılı şekilde tedavi etti, herhangi bir yan etki olmadan."
 panum.2222.g: "Yani bu bir beslenme kaynaklı hastalık!"
 panum.2223.t: "Böbrek Taşları (Nephrolithiasis)"
 panum.2223.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], böbrek taşı olan hastalara başarılı bir şekilde operasyon yapmayı sağlayan bir yöntem geliştirdi."
 panum.2223.f: "Böbrek taşları insanlık tarihi boyunca bilinen bir olgudur; Napoleon bile bundan muzdaripti. Rönesans’tan itibaren böbrek taşlarını çıkarma yöntemleri gelişse de operasyon hâlâ tehlikeliydi. Amerikalı cerrah Henry Jacob Bigelow bir atılım gerçekleştirdi: litolapaksi adlı tıbbi tekniği tanıttı. 1878’de 'Tek Seferde Lithotrity'yi yayınladı; burada 'mesaneden taşın tek seansta kırılması ve çıkarılması' yöntemini anlattı. Önceden cerrahlar mesane taşını kırar ve parçaları birkaç dakika içinde çıkarırdı. Bu yeni yöntemle ölüm oranı yaklaşık %24’ten %2,4’e düştü."
 panum.2223.g: "Düşünmek bile beni tedirgin ediyor."
 panum.2224.t: "Pellegra"
 panum.2224.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yıllar süren araştırmalar sonucunda pellagranın nikotinik asit eksikliğinden kaynaklanan bir hastalık olduğunu keşfetti."
 panum.2224.f: "Christopher Columbus Amerika'yı keşfettikten sonra, mısır Avrupa'ya getirilen ilk bitkilerden biri oldu ve yüksek verimi nedeniyle hızla yayıldı. Yüksek mısır tüketimi olan bölgelerde, ana semptomundan ötürü 'pürüzlü deri' olarak adlandırılan garip bir hastalık, pellagra ortaya çıktı. Pellagranın yüksek mısır tüketimi ile ilişkisi ilk kez 18. yüzyılda şüphelenildi. O dönemde açıklamalar bozulmuş veya zehirlenmiş mısır, enfeksiyon veya kalıtım üzerineydi. Joseph Goldberger ve ekibi 20. yüzyılın başında hem insanlardaki pellagranın hem de köpeklerdeki siyah dil hastalığının kötü beslenmeden kaynaklandığını kanıtladı; Conrad Elvehjem bunu nikotinik asit eksikliğine bağladı. Pellagranın bira mayası ile tedavi edilebileceğinin keşfi, etkilenen bölgelerde akıl hastanesi yataklarının sayısında ani bir azalmaya yol açtı."
 panum.2224.g: "Yani sadece dengesiz beslenmenin bir sonucu?"
 panum.2225.t: "Raşitizm"
 panum.2225.d: "Raşitizm hastalarını yıllarca inceledikten sonra, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bu kemik hastalığının besin yetersizliği ile ilgili olduğuna karar verdi ve önlem olarak balık yağı ve güneş ışığını önerdi."
 panum.2225.f: "Zaman içinde raşitizm hakkında birçok bilimsel tanım yapılmış olsa da, nedenleri uzun süre bilinmemiştir. On dokuzuncu yüzyılın önde gelen patologları, doğuştan frengi ve babadan bulaşan tüberküloz dahil olmak üzere raşitizmin çeşitli nedenlerini öne sürmüştür. Raşitizmin patofizyolojik temelleri hakkında gerçek bir modern anlayış ancak yirminci yüzyılın başında başlamıştır. 1919 yılında Edward Mellanby '4. vitamin'i keşfetmiş ve yayınlamıştır; 'Raşitizm, bazı yardımcı besin faktörlerinin yokluğu sonucu gelişen bir eksiklik hastalığıdır. Bu nedenle raşitizmin nedeni, ya yağda çözünen A vitamini ya da buna benzer dağılıma sahip bir anti-raşitik faktörün alınamaması gibi görünmektedir.' demiştir."
 panum.2225.g: "Vitamin D’den mi bahsediyoruz?"
 panum.2226.t: "Frengi"
 panum.2226.d: "İnsanoğlunun eski belası frengi, bilim sayesinde yakında kontrol altına alınacak gibi görünüyor - Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], en modern tıbbi yöntemlerle mucizevi bir tedavi geliştirdiğini iddia ediyor."
 panum.2226.f: "Yirminci yüzyılın başına kadar frengi, hastanın vücudunun geniş bölgelerine uygulanan toksik cıva ile tedavi edilmekteydi. Bu tedavi, istenmeyen etkiler arasında genellikle vücut kıllarının ve tüm dişlerin kaybına ve tüm vücut fonksiyonlarının hızlı düşüşüne yol açıyordu. Cıva, çok önceleri lepra ve çeşitli deri hastalıklarına karşı bir dereceye kadar etkili bir tedavi ajanı olarak kullanılmıştı. 1907/1908 yıllarında Paul Uhlenhuth ve Paul Ehrlich tarafından geliştirilen ve hayvan deneylerinde başarı sağlanan atoksil, arsaketin ve 418 (arsenofenilglycin) gibi arsenik preparatları ciddi yan etkiler nedeniyle başarısız oldu. 1909’da Sahachiro Hata ve Paul Ehrlich organik arsenik bileşiği arsfenamin’i (Salvarsan) geliştirdi; bu, frengi için hedefe yönelik ilk kemoterapötik tedavi girişimi oldu."
 panum.2226.g: "Salvar… ne?"
 panum.2227.t: "Tetanos"
 panum.2227.d: "Bir dizi testin ardından, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bugün tetanosa karşı bir antitoksin bulduğunu açıkladı."
 panum.2227.f: "Tetanoz, eski uygarlıklar tarafından iyi biliniyordu; yaralar ile ölümcül kas spazmları arasındaki ilişki fark edilmişti. 1884’te Arthur Nicolaier tetanosun striknin benzeri toksinini serbest yaşayan, anaerobik toprak bakterilerinden izole etti. Bahçe toprağını deney hayvanlarına inoküle ederek tetanos etkenini tespit etti. Hastalığın etiyolojisi 1884’te Torino Üniversitesi’nden patologlar Antonio Carle ve Giorgio Rattone tarafından daha da açıklığa kavuşturuldu; tetanosun bulaşıcı olduğu ilk kez gösterildi. 1891’de Kitasato Shibasaburō bir insan mağdurdan C. tetani izole etti, daha sonra organizmanın hayvanlara enjekte edildiğinde hastalık yapabileceğini ve toksinin spesifik antikorlarla nötralize edilebileceğini gösterdi. 1890’da Kitasato ve Emil von Behring, hayvanlarda tetanoz bağışıklığı sağlayabilecek spesifik bir tetanos antitoksini elde etmeyi başardı. Bu antitoksin üretimiyle Behring, 'serum terapisi'nin (difteriye karşı antitoksin keşfiyle birlikte, yine 1890’da) temelini attı."
 panum.2227.g: "Bahçe toprağının bu kadar tehlikeli olabileceğini kim tahmin edebilirdi?"
 country_panum_kidney_stone_treatment_success_chance_mult: "Böbrek Taşı Tedavisi Başarı Şansı"
 country_panum_syphilis_treatment_success_chance_mult: "Frengi Tedavisi Başarı Şansı"
 panum.922.t: "Krup"
 panum.922.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], birçok doktorun genellikle zararsız krup ile tehlikeli difteri arasındaki farkı ayırt edemediğini keşfetti ve farkları bir makalede vurguladı."
 panum.922.f: "Prusya doğumlu doktor Abraham Jacobi, 1860'ta bir tıp konferansında New York’ta yaklaşık 122 difteri vakası olduğunu belirttiğinde, meslektaşları şaşırdı: aynı dönemde hiç difteri teşhisi koymamışlardı. Çocuk hastalıkları alanındaki bilgi eksikliği, ABD’de ilk çocuk hastanelerinin kurulmasının sebeplerinden biriydi; bu hastanelerde difteri özel bir rol oynadı. Jacobi, Amerikan Pediatri’nin babası olarak kabul edilir."
 panum.923.t: "Derimsi Gırtlak"
 panum.923.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], difterinin başlıca özelliklerinden birinin, gırtlağa kadar uzanan ve boğulmaya yol açan derimsi sahte zar olduğunu tespit etti. Bu özellik hastalığı diğerlerinden ayırt etmek için tipiktir."
 panum.923.f: "'Malign anginanın teşhisini dört şekilde koyabiliriz:\n\nHastalığın morbid anatomi üzerine kapsamlı araştırmalar ile, birkaç ay içinde altmış otopsi yapılması;\n\nKlinik gözlemlerle, angina kendi başına bırakılırsa neredeyse her zaman gırtlağı etkilediğini ve böylece krup belirtilerine yol açtığını kanıtladık;\n\nKimyasal incelemelerle, boğazdaki sahte zarın yapısının trakeadakilerle aynı olduğunu gösterdik;\n\nÖnceki yazarların çalışmalarını inceleyerek.'"
 panum.940.t: "Difteri için Panzehir"
 panum.940.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bugün dipteri antitoksini ile yaptığı deneylerin tam bir başarıyla sonuçlandığını kamuoyuna duyurdu."
 panum.940.f: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], şaşkın kalabalığa [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] atık dipteri toksinini atlara verip onların kanından dipteriye karşı son derece etkili bir serum elde ettiğini açıkladı. Bu büyük bir ilerleme olsa da, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bunun aşı ile karıştırılmaması gerektiğini vurguladı; çünkü hastanın bağışıklık sistemini aktive etmiyor. 'Burada hâlâ yapılacak çok iş var,' dedi [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Ama artık geceleri soluk soluğa kalan çocuklarının hayatından korkan tüm ebeveynler çok daha huzurlu uyuyabilecek."
 panum.940.g: "Dipteriden önce biz nefesimizi kesiyoruz."
 panum.941.t: "Demir Perklorat"
 panum.941.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], eski kayıtlarda demir perkloratın difteri tedavisi için önerildiğini buldu. Görünüşe göre gerçekten etkisi var."
 panum.941.f: "'Şaşırtıcı bir şekilde, bu simya benzeri tarif bazı hastalarda etkili olmuş. Görünüşe göre difteri için nadir çözümlerden biri.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’den kısa bir not"
 panum.941.g: "Ama bu gerçekten bir yere varıyor mu?"
 panum.942.t: "Entübasyon"
 panum.942.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bir hastaya entübasyon ile hava vermeyi denedi. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], dipteriye karşı küçük bir başarı elde etti."
 panum.942.f: "'Süreç karmaşık ve kritik, ama dipteriyle mücadelede herhangi bir ipucu şu anda benim için faydalı.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’den kısa bir not"
 panum.942.g: "Ama bu uzun vadeli bir çözüm olamaz, değil mi?"
 panum.943.t: "Trakeotomi"
 panum.943.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], trakeotomi ile oldukça karışık deneyimler yaşadı, ancak tüm tıp meslektaşları bu cerrahi yöntemi difteri tedavisinde kullanıyor."
 panum.943.f: "'Tüm bu difteri uzmanlarının - en azından kendilerini uzman olarak görenlerin - nasıl başarı bildirebildiklerini bir türlü anlayamıyorum. Trousseau, hastalarının neredeyse yarısının hayatını kurtardığını iddia ediyor, ama benim deneyimime göre bu on kişiden birinden az.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’den kısa bir not"
 panum.943.g: "Peki şimdi ne olacak?"
 panum.944.t: "Cıva"
 panum.944.d: "Ne yazık ki, dipteri için uygulanan cıva tedavisi tam olarak Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in beklediği gibi sonuçlandı – zehirlenme ile."
 panum.944.f: "'Daha iyi bilmem gerekirdi mi? Evet! Ama uzman literatür, yüzyıllardır cıvanın difteriye karşı etkili olduğunu gösteriyor. İddiaya göre! Bundan sonra başka tedaviler bulacağım; örneğin gümüş nitrat ya da hidroklorik asit! Acaba gerçekten bu hastalıkla ilgilenen oldu mu?'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’den kısa bir not"
 panum.944.g: "Bütün bunlar difteriden daha ölümcül görünüyor."
 panum.945.t: "Kan Alma"
 panum.945.d: "Uzmanlar, difteri için kan almayı öneriyor. Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bunu iki vakada denedi ve yöntemin aksine etkili olduğunu buldu."
 panum.945.f: "'Zaten zayıf bir hastayı daha da zayıflatmak, sallantılı bir köprüdeki diğer sütunu yıkmak gibi olur. Her mühendisin anladığı şey, tıpta sapkın sayılıyor.'\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’den kısa bir not"
 panum.945.g: "Hiçbir iyileşme yok mu?"
 panum.951.t: "Gecedeki Tıkırtı"
 panum.951.d: ""
 panum.951.f: "Güneş evlerin arkasına çekilmişti. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] gölgeler arasında yürüyordu. Bir başka başarısızlık dolu gün daha geçmişti. Üç çocuk daha ölmüştü. Her zaman olduğu gibi aynı ölüm nedeni. Salgın zirvesi geçmiş olsa bile, çocuk ölümlerinin sokaklarda dolaşıp, oraklarını onların çenelerine saplama riski kalıyordu. Boğulma ve havasız kalma en zalim ölüm biçimlerinden sayılıyordu.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] yıllarca salgın hastalıklar üzerine uzmanlaşmıştı. Ama difteri farklıydı. Kızamık ya da kızıl ateş gibi hafif atlatılabilen çocuk hastalığı değildi. Difteri çocukları nefessiz bırakıyordu. Difteri, çocuğu geceleyin bir intikam meleği gibi boğuyordu.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName], difteriye savaş ilan etmişti. Ama bu umutsuz bir savaş gibiydi. Attığı her adımda hastalık peşindeydi - ve onu yeniden geri çevirdi. Kuşaktan kuşağa aktarılan tüm yöntemler işe yaramazdı. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ölümle mücadele ediyordu. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] şeytanla mücadele ediyordu.\n\nVe bunlar [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'i çaresizlik ve umutsuzluk içinde bırakıyordu. O gece [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] eve geldiğinde, karanlıkta bir hırıltı karşılamıştı onu. Çünkü listesinde olmayan bir hasta [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'i bekliyordu. Difteri yayılmıştı. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sokağına kadar. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] evine kadar.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] oğlunun yatağına kadar."
 panum.951.g: "Acaba doktorun deneyleri...?"
 panum.952.t: "Difteri Tedavisi"
 panum.952.d: ""
 panum.952.f: "Umutsuz bir yutkunma sesi. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bu sese alışmıştı. Genellikle başkaları yutkunurken neredeyse duyulmazdı. Ama bu aynı acıydı; [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] daha önce defalarca duymuştu. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] sesi ezbere biliyordu. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] soğuk bir bezle oğlunun başını örtübilirdi. Ona sakinleştirici sözler söyleyebilirdi.\n\nAma [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] onun için hiçbir şey yapamazdı. Önceki çocuklar için de yapamadığı gibi. Ölü onlarca çocuk için.\n\nBu difteri ilaçlarının ne kadar az işe yaradığını bilen biri varsa, o da [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]’di. Vücudu zehirleyen cıva. Değişken etkileri olan gümüş nitrat ve demir perklorat. Cerrahinin en yüksek sanatı sayılan trakeotomi - ve neredeyse her zaman başarısız.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] bunu defalarca yapmıştı. Ama artık mesele hastalık değildi. Artık konu [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] idi. Bu nefret edilen salgın, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'den intikam alıyordu. Çünkü [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ona karşı koymak istemişti. Çünkü [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] onu yok etmek istemişti, tıpkı küçük çocuklara yaptığı gibi. İntikam alıyordu. Sahip olduğu en değerli şeyi elinden almak istiyordu. Doktor olarak onuru değil, iyileşme umudu değil.\n\nGecedeki tıkırtı geri dönüyor. Küçük şişelerde sıvılar parlıyor. Bir skalpel ay ışığında parlıyor."
 panum.952.g: "Oğlanı demir perklorat ile tedavi et."
 panum.952.h: "Bir trakeotomi uygula."
 panum.952.i: "Bir doku örneğini mikroskopla incele."
 panum.953.t: "Boğucu Melek"
 panum.953.d: ""
 panum.953.f: "Artık tıkırtı yok. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'i rahatsız eden, onu korkutan ses artık yoktu. Ama zafer de yoktu. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bu sesi küçümsemişti.\n\nAma şimdi [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], o korkunç gürültünün geri gelmesini istiyordu.\n\nSessizlik. Ölü sessizlik, aylardır bildiği sessizlik. İşte o an, sessizliği duyabildiğin an. Tüm yaşam enerjisini emen ürkütücü bir mezarlık sessizliği. Sessizlik hem duyulabiliyor hem hissedilebiliyordu. Beden boşlukla doluyordu. Bu bir çelişki değildi. Mantıklıydı. Deneyseldi.\n\nAma mantık ve deneysel bilgi o gece [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'de başarısız oldu. Parmakları soğuk bir çocuğun elini kavradı. Ay ışığı gibi soluk. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] difteri ile yüzleşmişti.\n\nVe difteri, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'i yere çiğneyip, gururu [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'i kör ettiği için zevkle işkence ediyordu."
 panum.953.g: "Doktorun bununla başa çıkması zor olacak."
 panum.954.t: "Gırtlak Değil, Kalp ve Gözler"
 panum.954.d: ""
 panum.954.f: "Ay batmıştı. Güneş tekrar doğmuştu. Gece karanlığı ve çekilmiş perdelerin ardında günler geçmişti. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] yatak başında beklemişti. O zamana kadar hastaları iyileştirememişti. Çalışmaları insanlara değil, hastalıklara odaklanmıştı. Gümüş nitratla deney yapmak kolaydı; serum enjekte etmek sadece bir test olduğunda kolaydı; ve trakea üzerinde operasyon yapmak, sadece deri, sadece kas, sadece et, sadece kemik üzerinde yapıldığında kolaydı.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] daha önce hastalıkları tedavi etmişti. Difteri insanları hasta haline getirmiş, tarihleri tıbbi kayıtlara, acıyı semptomlara dönüştürmüştü. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] insanları nefes darlığından kurtarmak istiyordu. Ama iyileşmesi gereken kişi [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] idi. Gırtlakta değil. Ama gözlerinde ve kalbinde.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] tekrar görebiliyordu. Ve uysal bir gülümseme [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'e yansıdı."
 panum.954.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] başardı!"
 panum.955.t: "Fedakârlık"
 panum.955.d: ""
 panum.955.f: "Kaybolan bir ruh. Kazanılan bir dünya. Mikroskop altında mikrobiler kaynıyordu. Daha önce birçok vakada bulunan mikrobiler gibi. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] bunu şimdiye kadar göz ardı etmişti. Ama en makul açıklama buydu. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] oğlu difteri hastalarıyla temas etmemişti.\n\nSadece [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] etmişti. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] mikropları bu eve taşımıştı. Günler boyunca. Belki haftalar boyunca. Farkında olmadan. Diğer on iki hasta çocuktan. Diğer on iki ölü çocuktan.\n\nŞimdi bir kurban daha vardı.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in bir numunesi vardı. Ve [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] artık hiçbir çocuğun ilgilenmediği, artık kimsenin oynamadığı kobaylar ve tavşanlar vardı. Onlar birer fedakârlık olacaktı. Tıpkı [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]'nin yaptığı gibi. Hastalanırlarsa, bu bir kanıt olacaktı. Amaç difteriyi yok etmekti. Bu [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]'den daha büyük bir hedefti.\n\nVe diğer tüm hedeflerden daha büyüktü."
 panum.955.g: "Cezasız kalmayacak bir fedakârlık."
 panum.956.t: "Teoremin Radikal Değişimi"
 panum.956.d: ""
 panum.956.f: "Son birkaç hafta, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] için önemli bir kırılma noktası oluşturdu. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] kesinlikle bunu Koperniksel bir dönüş olarak adlandırmazdı. Ama nadiren bir olay, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'in [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] ve yöntemlerini bu kadar sorgulamasına neden olmuştur. Difteri karşısındaki çaresizlik kalıcı bir etki bırakıyordu. Ve [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bunun geri döneceğini biliyordu.\n\nYalnızca başarılı, uzun vadeli bir çözüm bu durumu tekrarlamaktan koruyabilirdi.\n\nBu yüzden doktorun muayenehanesinde gözlükler yığılıydı. Tıp kitapları ve tezler yığılmıştı. Ve ilaçlar. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] eli manik bir şekilde difteri hakkında bilindiği iddia edilen her şeye uzanıyordu.\n\nHer sözde tedavi. Her iddia edilen el kitabı. Her sözde tez.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] masayı temizledi. Her şeyi çöpe attı. Hepsi yanlıştı. Bretonneau. Guersant. Trousseau. Bochut. Daviot!\n\nDifteri nedenini çözmek, sonunda difteriyi iyileştirmek demekti. Ve [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] şimdiye kadar okuduğu ve denediği her şeyden sonra, yalnızca bir olasılık kalmıştı. Difteri bulaşıcıydı. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], diğer hastalarla temas ettikten sonra kendi oğlunu enfekte etmişti. Bir etken vardı. Uzmanlar ne derse desin.\n\nBir patojen olmalıydı."
 panum.956.g: "Tüm çabalar artık patojeni bulmaya odaklandı."
 panum.956.h: "Araştırmanın odağı zaten olası bir aşı üzerinde olmalı."
 panum.961.t: "Difteri Toksini"
 panum.961.d: ""
 panum.961.f: "Zehir anahtar unsurdu. Difteri patojeni tarafından salgılanan türden bir zehir. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bir biyoloğun bunun üzerinde deneyler yaptığını duymuştu. Toksin durdurulamayacak kadar güçlüydü. Hayvanları enfekte ederseniz, ölürlerdi.\n\nAma [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bunun bilim dünyasını sarsacak bir bilgi olduğunu biliyordu. Uzman dergilerinde okunabilirdi. Ve dünya çapında, difteri toksinini izole ederek hayvana immunolojik bir etki sağlayıp, milyonlarca çocuğun difteri kurbanı olarak mezarlarında yatmasına yol açmadan bu etkileri elde etmeyi umut eden taklitçiler vardı.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] araştıracaktı. Toksini bulmak zorundaydı. Ve kendi deneylerini yapmak zorundaydı."
 panum.961.g: "Bu belki de kritik adım..."
 panum.961.h: "Bu süreç tetanos toksini üretiminden zaten biliniyor..."
 panum.961.i: "Doğru miktarda iyot bunun için yardımcı olabilir."
 panum.962.t: "Difteri Antitoksini"
 panum.962.d: ""
 panum.962.f: "Bir atılım. Karar verici bir atılım; tüm fedakârlıkları, tüm acıları, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] eşlik etmek zorunda kaldığı tüm ölümleri, yas tutan ebeveynleri ve akrabaları telafi eden bir atılım. Gözyaşlarıyla vedalar. Umutsuzluk ve çaresizlik.\n\nÇok basitti. Ve çok etkiliydi. Toksin zayıflatılmalıydı. Nihayet, bir iyot çözeltisi yardımcı olacaktı. Atlar mükemmel deneklerdi. Geri kalanı kolaydı. Hayvan toksine karşı bağışıklık kazandı – ve böylece serumun kaynağı oldu. Difteriye karşı bir antitoksin.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] o gün şişeyi eline aldığında, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tatmin duygusu hissetti. İlk testleri gerçekleştirmişti. Tüm çocuklar tepki vermemişti. Ama [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hayal edebileceğinden daha fazla. Şimdi bu görünmez düşmana karşı silah kitlesel olarak üretilmeli ve dağıtılmalıydı. Her klinikte. Her doktor muayenehanesinde.\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in difteriye karşı savaşı bitmemişti. Daha yeni başlamıştı."
 panum.962.g: "Bu serumdan mümkün olduğunca çok sipariş et!"
 panum.963.t: "Gölge"
 panum.963.d: ""
 panum.963.f: "Difteri yok edilmeli! Yok olmalı!\n\nBelki de mani hâlinde bir düşünceydi. Ama bu, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'i hayatta tutan bir düşünceydi. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] difteriyle savaşı meyve verdi. Bu kadar çok hayat kurtarıldı. Başka dünyada acı çekip ölecek olan o kadar çok çocuk!\n\nÇokların iyiliği, bireyin iyiliğinin önündeydi. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] difteriyi yok edebilseydi kendi hayatını feda ederdi. Ama kader [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] için nazik değildi. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] kendisini şeytana satmamıştı – ama oğlunu satmıştı. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] bunu onun için kararlaştırmıştı.\n\nO geceden beri, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'in üzerine bir perde inmişti. Hastalığa karşı bir öfke. Ama [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] bunu silmişti. Kendisine ve çalışmasına odaklanmış, öfkeyi akılcı düşüncelerle bastırmıştı. Ama birkaç gün önce, bu öfke kayboldu. Paradoksal olarak, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] kurtardığı çocuk sayısı arttıkça, her şey daha net görünüyordu.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] kendi kendini gördü. Ve gördüğü şeyden nefret etti.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] kibri [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]'i aldatmıştı. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] insanların hayatını kurtardığını sanıyordu. Ama birini seçmişti. Bir cellat gibi. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ne skalpel dokundu ne de küçük bir bardak gümüş nitrat. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] numuneye ve patojene, hastasından daha fazla değer verdi. Bir insandan daha fazla.\n\nKendi eti ve kanı.\n\nBunu her zaman iğrenç buldu. Ve yalnız dairesinde, tek arkadaşları sertifikalar, ödüller ve önemli politikacılar ve akademisyenlerle fotoğraflardı. Geriye sadece boş bir yatak vardı. Ve bir düşünce giderek güçleniyordu. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] başı zonkluyordu. Bu yok edilmeliyim. Kaybolmalıyım.\n\n'Oğlum. Sevgili oğlum...'"
 panum.963.g: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]... Doktor!"
 panum.640.t: "'Kızamık Salgını Sırasında Yapılan Gözlemler'"
 panum.640.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kızamığın tedavisiyle ilgili önerilerini sundu. Bu öneriler, hastalığın nedenlerini ve bulaş yollarını daha iyi anlamayı ve gelecekteki salgınları önlemeyi amaçlıyordu."
 panum.640.f: "'Kızamık, nüfusun yoğun olduğu Thorshavn'da çok hızlı yayıldı ve oradan teknelerle diğer adalara taşındı. Ticaret yerlerine yapılan yolculuklar, kilise ve okul katılımı ve değirmen işleri enfeksiyonu diğer köylere yaydı. Enfeksiyon, Thorshavn'dan Suderø'ya belirlenen bir kişi aracılığıyla getirildi ve araştırmalarla enfeksiyonun neredeyse her köye nasıl ve kim tarafından taşındığı gösterilebildi. Enfeksiyonun giysi, çamaşır ve mektuplar gibi nesnelerle taşınıp taşınamayacağı ise oldukça şüpheli görünmekteydi ve salgın sırasında böyle bir örneğe rastlamadım.' -Peter Panum, 1846 Faroe Adaları Kızamık Salgını Gözlemleri"
 panum.640.g: "Yeni bir Peter Panum!"
 panum.52.m: "[SCOPE.sCountry('panum_scarlet_country_scope').GetName]'deki kızıl hastalığı salgını."
 panum.52.q: "Aslında, bu kötü bir plan..."
