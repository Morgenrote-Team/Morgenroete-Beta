 panum.2100.j: "Askeri Tıp."
 panum_cholera_condition: "Kolera"
 panum_cholera_condition_desc: "Kolera, ince bağırsaklarda görülen tehlikeli bir hastalıktır. 19. yüzyılın tanımlayıcı salgını olarak kabul edilir ve dünya çapında milyonlarca ölüme yol açmıştır."
 panum_tuberculosis_condition: "Tüberküloz"
 panum_tuberculosis_condition_desc: "Tüberküloz, kolera ile birlikte Viktorya döneminin en yaygın ölüm nedenlerinden biri olarak kabul edilir. Tüketim hastalığı olarak da bilinir ve özellikle akciğerleri etkiler."
 panum_smallpox_condition: "Çiçek Hastalığı"
 panum_smallpox_condition_desc: "Yüz ve vücudu şekillendiren kabarcıklarıyla bilinen çiçek hastalığı tarih boyunca en öldürücü hastalıklardan biri olmuştur."
 panum_typhus_condition: "Tifüs"
 panum_typhus_condition_desc: "Tifüs, özellikle Napolyon Savaşları sırasında askerleri yıllarca dehşete düşürmüş ve binlerce askerin ölümüne yol açmıştır. Doğal afetlerden sonra defalarca ortaya çıkmıştır."
 panum_yellow_fever_condition: "Sarı Humma"
 panum_yellow_fever_condition_desc: "Sarı humma, özellikle Güney Amerika ve Afrika'nın tropikal bölgelerini etkiler. Karayipler'de, bu hastalık konuşlandırılmış askerler arasında savaşlardan daha fazla can almıştır."
 panum_measles_condition: "Kızamık"
 panum_measles_condition_desc: "Kızamık, tipik kırmızı deri lekeleri ile bilinen son derece bulaşıcı bir hastalıktır. Özellikle önceden bağışıklığı olmayan nüfuslarda felaket sonuçlar doğurabilir."
 panum_scarlet_condition: "Kızıl Ateş"
 panum_scarlet_condition_desc: "Kızıl ateş, 20. yüzyılın başına kadar çocuklar arasında en yaygın ölüm nedenlerinden biri olan yaygın bir hastalıktır."
 panum_plague_condition: "Veba"
 panum_plague_condition_desc: "Bubonik veba, Orta Çağ'daki 'Kara Ölüm' ile eşdeğer tutulur ve tarihin en kötü felaketlerinden biri olarak kabul edilir. Adı, şişmiş ve ağrılı kabarcıklardan gelir."
 panum_diphteria_condition: "Difteri"
 panum_diphteria_condition_desc: "Difteri, yaşamı tehdit edebilecek komplikasyonlara ve uzun vadeli sonuçlara yol açabilen tehlikeli bir hastalıktır."
 panum_polio_condition: "Çocuk Felci"
 panum_polio_condition_desc: "Poliomyelit, öncelikle çocukları etkileyen bir hastalıktır ve genellikle ölüme veya ömür boyu fiziksel komplikasyonlara yol açar."
