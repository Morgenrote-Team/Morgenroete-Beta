 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]"
 panum.138.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bugün [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] hakkında [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] hastalık tanımını sundu. Tıp Fakültesi şimdiden bunu klasik olarak görüyor."
 panum.138.f: "[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] tezinde [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')], [ROOT.Var('panum_physician_var').GetCharacter.GetFullName], ülkemizdeki diğer tüm doktorlardan daha detaylı şekilde hastalıkla ilgileniyor. Okuyucuya semptomları, kuluçka süresini, diğer hastalıklardan ayırımı ve geçmiş salgınların kronolojisi ile geleneksel epidemiyolojik açıklamalar sunuyor."
 panum.138.g: "Artık canavarı daha iyi tanıyoruz."
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.139.f: "Tıp Fakültesi, [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın tedavi yöntemleri hakkında bilimsel makalesini büyük bir heyecanla bekliyordu. Bu çalışma bir atılım sağlayabilir mi? [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')], sayısız insanın hayatını kurtarabilir. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] salgınının ortaya çıkış nedenlerini ve sonrasında nasıl önlenip tedavi edilebileceğini açıklayan yöntemler, bu hastalıkla ilgili düşünme biçimini temelden değiştirebilir."
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] artık dehşetini kaybediyor."
 panum.140.t: "Kolera - Su Kaynaklı Bir Hastalık!"
 panum.140.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın kahramanca çalışmaları sayesinde, [SCOPE.sState('panum_disease_state').GetCityHubName]'deki Kolera salgını kesin bir şekilde bastırıldı!"
 panum.140.f: "'[SCOPE.sState('panum_disease_state').GetCityHubName]'de bulunduğum ilk günden beri, tüm veriler tek bir sonuca işaret ediyor: kolera su kaynaklı bir hastalıktır. Yüzyıllardır bu kadar çok insanı öldüren hastalık, hava yoluyla, yani miasma olarak değil, su damlalarında taşınır. Yutulduğunda bağırsaklarda gelişir ve öğrendiğimiz koleraya dönüşür. Bu zor bir ders, ama çabucak uygulanmalı. Geçen hafta, salgının merkezindeki su pompasının kollarını çıkardılar. Bugün, masama tek bir yeni vaka gelmeden akşamı karşılıyorum. Bu tartışılmaz. Canavar öldürüldü.\n\nYine de bu durum için bir üzüntü hissediyorum. Keşiflerin tamamının tek başıma sorumluluğunu üstlenmek istemiyorum; sadece daha erken keşfedilebilirdi. Temiz içme suyunun eksikliği nedeniyle pek çok hayat kaybedildi, genç ve yaşlı. Şanslıysak, kolera ile karşılaştığımız son olmasın.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını'nı yazarak, [SCOPE.sState('panum_disease_state').GetCityHubName]’deki araştırmayı sonuçlandırıyor."
 panum.140.g: "İnanılmaz! Bu, miasma teorisine ölümcül bir darbe!"
 panum.141.t: "Bira Fabrikası"
 panum.141.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırması, onu salgının ortasında güvenli bir yere, bir bira fabrikasına götürdü."
 panum.141.f: "'Merhaba! Burada ustabaşı siz olmalısınız. Ben Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], salgını araştırmak için buradayım. Lütfen bana daha fazla bilgi verin.'\n\n'Eh, burada pek sorun olmadı. Diğer fabrikaların çoğu kapandı, ama biz kapatmadık.'\n\n'Kolera sizi çok etkilemiyor mu? Nedenini biliyor musunuz?'\n\n'Hiçbir fikrim yok, korkarım. Ama tahmin etmem gerekirse, buradaki çocuklar evlerine o kokulara gitmiyor.'\n\n'Fabrikada mı yemek yiyorlar?'\n\n'Evet, ve içiyorlar da! Patron, satışta kötü giden eski partilerden birazını öğle yemeğinde içmelerine izin veriyor, çocuklara ucuz bir neşe. Bizim için kuyu suyu yok, sadece üretim maliyeti kadar bir bardak bira.'"
 panum.141.g: "Hmmm...yerel suyu içmiyorsunuz. Çok ilginç."
 panum.142.t: "Alışkanlıkların Yarattığı Canavarlar"
 panum.142.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırması devam ediyor - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], salgının merkezi olabilecek bir yeri buldu."
 panum.142.f: "'...ancak bölgede vakalar o kadar yaygındı ki, daha fazla rehbere ihtiyacım olduğunu fark ettim. Neyse ki, yerel adli tabip ofisi büyük bir yardımcı oldu: Her bir evin adresini not etmişlerdi; ya ceset aldıkları ya da hastalığı gözlemledikleri evleri, ve bu bana basit bir harita üzerinde tüm vakaları doğru şekilde yerleştirme imkanı verdi. Ortaya çıkan alan genişti, yüzlerce evi kapsıyor, ama aynı zamanda büyük bir daire oluşturuyordu.\n\nBu, geleneksel düşünceye aykırıydı. Eğer miasma olsaydı, rüzgarla taşınır ve hakim rüzgar yönleri boyunca yayılırdı. Ama bu rüzgarların ötesine geçiyor, düzgün ve dairesel bir şekilde yayılıyordu. Hepsinin ortasına yürüdüm, belki bir ipucu bulurum umuduyla...ve başka bir şey değil, bir su pompası buldum. Haritadaki tüm evler yürüme mesafesindeydi. Bir bağlantı olmalıydı.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de yapılan araştırmalar."
 panum.142.g: "Acaba...pompadaki sudan mı kaynaklanıyor?"
 panum.143.t: "Farklı Olanlar"
 panum.143.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ilginç bir şey buldu - bir modelde kopukluk."
 panum.143.f: "'Ah, tanrım! Siz bahsedilen doktor olmalısınız, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Lütfen, bize yardım etmelisiniz.'\n\n'Bunu yapmayı tamamen planlıyorum, hanımefendi. Lütfen, kendiniz ve aileniz hakkında elinizden geldiğince detay verin, en küçük ayrıntıyı bile atlamayın. Sizin vakalarınız bu mahalledeki tek vakalardan biri mi?'\n\n'Evet, evet, öyleyiz! Aniden ortaya çıktı! Tüm önlemleri aldık, çiçek desenli maskeler bile taktık, kokuyu engellemek için!'\n\n'Peki o zaman salgın bölgesine girdiniz mi? Neden?'\n\n'Annem, sevgili annem... her zaman pompadaki suyu daha çok severdi, ama ben suyu eve getirdiğimde hastalık giysilerime bulaşmış olmalı ve evime gelmiş.'"
 panum.143.g: "...pompadan su getirdiğinizi mi söylediniz?"
 panum.144.t: "Filtreler"
 panum.144.d: "Salgın hakkında daha fazla ipucu bulma çabasında, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tüm mağdurların suyunun aynı şirketten geldiğini keşfetti!"
 panum.144.f: "'...ama her şeyden en ilginç olanı bu. Yola çıktığımda ya da New River Company tarafından desteklenen evlere giderken, kolera vakalarının dramatik şekilde azaldığını gördüm. Sadece normal seviyedeydi. Güneye döndüğünüzde, sokaklar kolera ile dolu, bağırsak ve ölüm kokusu her yerde. Bu miasmatik toprakların lokalizasyonu olabilir mi?\n\nBence hayır. Çok net bir şekilde işaretlenmiş görünüyor. New River Company'nin saygın beyleriyle iletişime geçtim ve pompa istasyonlarına yeni filtreler eklerken borularını yakın zamanda kapattıklarını öğrendim. Bu filtreler, görülmeyen bir rol oynuyor olabilir mi? Su temizliği miasmayı engelliyor olabilir mi, yoksa başka bir şey mi var?'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.144.g: "...suda hastalık getiren bir şey mi var?"
 panum.145.t: "Kahverengi Su"
 panum.145.d: "Araştırma için en son aletlerle donatılmış olarak, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], mikroskobunu kullanarak Kolera salgını örneklerini inceledi."
 panum.145.f: "Mikroskobu [SCOPE.sState('panum_disease_state').GetCityHubName]'e getirmek kolay olmadı, yol üzerindeki tümsekler lenslerin neredeyse tamamını kıracaktı... ama şimdi burada olduğunda, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], modern tıbbın en büyük araçlarından birine sahipti. Yerel sudan alınan birkaç düzine örnek titizlikle hazırlandı ve her biri mikroskop altında incelendi. Daha az kolera olan bölgelerden gelenler, temiz olanlardı, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] not etti.\n\nPeki ya kirli olanlar? En kötü kirli olanlar?\n\nBunlar, en çok etkilenen bölgelerden gelenlerdi. Kaşını kaldırdı, bir an düşündü. Suda yüzen mikropların küçük hareketleri, kirli kar taneleri gibi. Masumca süzülen, sefil sıvının içindeki zararsız mikroplar."
 panum.145.g: "...ya da göründüğünüz kadar masum değilsiniz?"
 panum.145.h: "Başka bir teori için daha fazla kanıt."
 panum.145.i: "Bunda daha fazlası olmalı."
 panum.146.t: "İlk Ölüm"
 panum.146.d: "Tükenmez çalışmalar ve araştırmalar sonucu, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], salgını kayıtlardaki ilk vakaya kadar izledi - yeni doğmuş bir bebek."
 panum.146.f: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın yaptıklarının en kasvetli hatırlatmalarından biri, en derin yas içinde olan bir kadının evini ziyaret etmekti; bir zamanlar eş ve anne olmuş, şimdi ise ne eş ne de anne olan bir kadın. Doktor, kapısının önünden daha yeni adım atmışken notlarını almaya başladı.\n\nYeni doğmuş erkek bebek sokaktan büyükanneyi ziyarete götürülmüş. Kolera ile dönmüş. Bezler yıkanmış, muhtemelen hastalığı taşıyor.\n\nKoca işten dönmüş. Çelik fabrikasındaki vardiyadan sonra susuz, iyi yemek yemiş, iyi içmiş, haftanın sonunda ölmüş, kolera.\n\nArkalarında ağlamalar. Önde, yağmurlu, ıssız sokaklar. Tüm bunlar arasında fısıldanan bir cümle."
 panum.146.g: "Lütfen, tüm bunların bir sonu olsun."
 panum.147.t: "Çukur"
 panum.147.d: "Araştırmalarını yürütürken, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] gözden kaçan bir şeyi buldu - bir fosseptik."
 panum.147.f: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], miasma teorisini pek sevmiyordu, ancak onu uzak tutmak için kullanılan çiçekli maskelere minnettardı. Fosseptik çürüyen atıklarla doluydu ve tamamen, tamamen berbat kokuyordu. Polis müfettişi bile kenarından uzak durdu.\n\n'Doktor! Böyle bir çukur kesinlikle bu miasmanın ve bize verdiği berbat koleranın kaynağı olmalı!'\n\n'Belki öyledir, ama buraya bakın, müfettiş. Yağın toprağa nasıl aktığını görüyor musunuz?'\n\n'Evet, görüyorum ama ne olmuş bununla?'\n\n'Foseptikten akan yağmur suyu aşağıya, kanalizasyonlara doğru gidiyor. Su bu kanallardan geçmek zorunda, ama eğer bağlantılar bozuksa...'\n\n'...o zaman atık su doğrudan pompa koluna gelir. Tiksindirici. Neyse ki hastalık su yoluyla yayılmıyor...'"
 panum.147.g: "...öyle değil mi?"
 panum.147.h: "Yanlış!"
 panum.148.t: "Malikanesi"
 panum.148.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırması, salgının etkisinin merak uyandıran bir noktasına götürdü - zengin bir adamın evi."
 panum.148.f: "'Bugün yerel bir beyefendinin konutunu ziyaret ettim; şehir içinde, salgının kalbine tehlikeli derecede yakın, daha görkemli bir ev. Bu, şehrin bu bölgesinin bir zamanlar küçük bir gecekonduya göre daha zengin olduğu dönemin bir kalıntısı gibi görünüyordu. Ev sahibi araştırmadan oldukça etkilenmiş ve bana yerel tarih hakkında çok sayıda kitap sağladı, umar ki geçmiş salgınlar hakkında ışık tutar. Daha ilginci, kolera henüz duvarlarının ötesine ulaşmamıştı.\n\nBu benim için oldukça ilginçti, çünkü miasma teorisine göre hastalık havada, kokuda olmalı ve zengin ya da fakir ayrımı yapmamalıydı. Hizmetçiler bile etkilenmemişti, en azından evde yaşayanlar. Depodan yemek yiyip evin içinde bulunan artezyen kuyusundan su içiyorlar ve bir şekilde etkilenmiyorlar. Merak uyandırıcı bir durum. Onların sahip olduğu, diğerlerinde olmayan bir şey mi var?'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.148.g: "Ya da...belki hizmetçiler hasta olanların sahip olduğu bir şeyden mahrum?"
 panum.149.t: "Küçük Ölüm"
 panum.149.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırması muhtemelen suçluyu ortaya çıkardı - bir mikrop!"
 panum.149.f: "'...ama yine de özellikle emin olmam gerekiyordu. Hem sudan hem de hastalılardan özel olarak alınmış örnekleri istedim. Mikroskopumun camına yerleştirildiğinde, bu sıvıların içinde büyük düşmanımızın, vibrionların, varlığını doğruladım.\n\nİlk bakışta bu mikroplar zararsız görünüyor, tüplerden başka bir şey değil gibi. Ama hastalılardan alınan her örnek varlıklarını doğruluyor ve bu canlıların hastalıkta bir rol oynadığı söylenebilir. Acaba...kolera mı bunlar? Belki. Eğer öyleyse, bu tür mikropların hastalık oluşturduğunu kanıtlayan sağlam bir delil.\n\nAma bir şey kesin: düşmanı bulduk. Şimdi onları yok etmeliyiz.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.149.g: "Temizle ve tedavi et, iş bitene kadar."
 panum.149.h: "Bu keşif koleranın ötesine geçiyor."
 panum.150.t: "Bizzat Müdahale"
 panum.150.d: "Hastalığa karşı nadir bir müttefik, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bulgularını tartışmak üzere [SCOPE.sState('panum_disease_state').GetCityHubName]'de adli tabip ile görüşüyor."
 panum.150.f: "'Ah, siz Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] olmalısınız! Elinizi sıkmadığım için affedin, son birkaç gündür ölülerle uğraşıyordum.'\n\n'...inanın, affınızı istemenize gerek yok. Siz yerel adli tabipsiniz, lütfen bulgularınızı anlatın.'\n\n'Bildiğiniz gibi kolera bağırsak hastalığıdır. Daha fazlasını söylememe gerek yok. Kusma, ishal, bağırsaklar o kadar tıkanmış ki yumurta akı gibi görünüyor, sizin gibi bilgili biri bu listeyi bilir.'\n\n'Elbette, ama ilginç bulduğunuz nedir?'\n\n'Şey...bana sürekli bunun miasma olduğunu, bu ölümün havada olduğunu söylüyorlar...ama dürüst olmak gerekirse, bence öyle değil. Eğer öyle olsaydı, şimdiye kadar ben de ölürdüm. Masada çok ceset gördüm, doktor. Bu gıda zehirlenmesi kokuyor, ama değil.'"
 panum.150.g: "Çok ilginç bir düşünce. Daha fazla anlatın."
 panum_physician_health_malus_modifier: "Huzursuz Çalışma"
 panum.151.t: "Alet Fabrikası"
 panum.151.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırması sırasında, yerel bir alet fabrikasına yaptığı ziyaret daha çok soru işareti bırakıyor, yanıt vermiyor."
 panum.151.f: "'Geçen gün alet fabrikasına gittiğimde, her şey ilk başta bir nebze mantıklı görünüyordu. Bu fabrika bıçak, kasap aletleri ve benzerleri konusunda uzmanlaşmış, bu yüzden bir bileme istasyonu var. Çok sayıda taş ve bileme tekerleğini döndüren su çarkları kullanıyorlar. Her işçi taşın yanına karın üstü yatıyor ve su sıçrayabiliyordu. Her şey mantıklı, ve eğer fabrikanın salgını yalnızca burada olsaydı, mantıklı olurdu.\n\nAncak işin garip tarafı şurada: fabrika çalışanları, salgının kalbindeki sokağa veya bileme tekerleklerine hiç yaklaşmamış olmalarına rağmen hastalanıyorlar. Bu nasıl mümkün olabilir?'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.151.g: "Görünüşe göre yanlış bir ipucu."
 panum.151.h: "Görünüşe göre yanlış bir teori."
 panum.152.t: "Kavanoz"
 panum.152.d: "Maalesef, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] yanlış bir iz peşinde - kolera ile ilgisi olmayan bir gıda zehirlenmesi vakası."
 panum.152.f: "'Bugün oldukça sinir bozucu bir gündü. Polis çağrısı ile popüler bir otelde aniden ortaya çıkan hastalık vakasını araştırmak için çağrıldım; bu ani kolera patlaması gibi görünüyordu. Tüm eşyalarımı alıp yetkili mercileri uyardım, yatak ve hasta bakımı için hazırlık yaptım, ancak vardığımda bunun kolera olmadığını anladım. Belirtiler yanlış, ani başlangıç çok hızlıydı. Daha yerel bir sebep sorumlu olmalıydı ve şaşırtıcı olmayan şekilde, etkilenen herkes aynı yemeği yemişti.\n\nMutfaklara yapılan bir araştırma suçluyu ortaya çıkardı: kesinlikle süresi geçmiş bir ördek pate kavanozu, soğuk algınlığı nedeniyle burnu tıkalı bir aşçı tarafından ekmek üzerine sürülmüştü. Zaman kaybıydı. Gıda zehirlenmesi kolera değildir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.152.g: "...en azından dolapları temizlememiz gerektiğini biliyoruz, en azından."
 panum.153.t: "Karışıklıklar"
 panum.153.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırması sırasında bir kaza oldu - örnekler karıştı!"
 panum.153.f: "Ama tam işin ortasında bir kesinti oldu. Sokakta bağırmalar, kavga sesleri. Sarhoş bir kavga, bir bardak fazla. Polis hızla müdahale etti, sürükleyip uzaklaştırdılar, bağırmaya devam ettiler.\n\nBir anımı alıp oturduğum yerden kalkıp kepenkleri kapatmam ve işime dönmem kısa sürdü. Daha da aptalcayım ki, örnekleri yanlış sırada bıraktığımı ve oradan işimi yanlış sırayla yaptığımı fark etmedim, her birini yanlış sırada kaydettim.\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.153.g: "Haftalarca iş, boşa gitti. Lanet olsun."
 panum.154.t: "Taklitçi Katil?"
 panum.154.d: "[SCOPE.sState('panum_disease_state').GetCityHubName]'deki Kolera Salgını araştırması endişe verici bir hal aldı - başka bir hastalık olabilir!"
 panum.154.f: "'Ah, tekrar karşılaşmak güzel, Doktor %Name%. Masam son hafta oldukça yoğundu.'\n\n'Bunu güzel bir karşılaşma olarak nitelendirmem, adli tabip. Ne durumdayız?'\n\n'Daha fazla ceset geliyor. Başta bunun kolera olduğunu düşündüm, belki öyle, ama bu pek doğru değil.'\n\n'Gıda zehirlenmesi mi?'\n\nHayır, ölümler bu hızda olmuyor. Çoğu çocuk ve yaşlı.'\n\n'Kolera savunmasızlar için diğerlerinden daha öldürücü değil mi? Emin misiniz bu değil mi?'\n\n'İçlerinde adını yazmıyor. Dizanteri, kolera, tifüs? Yaygın gıda zehirlenmesi? Kim bilir? Bildiğim tek şey, aynı gibi görünmüyor. Kolera gibi beyaz değil, ama ölüm aynı.'\n\n'O zaman ikinci bir hastalık olabilir...kahrolasıca. İkisini nasıl ayırt edeceğiz?'\n\n'Siz doktor, ben değilim.'"
 panum.154.g: "Ne ile savaştığımı bilmezsem plan yapamam."
 panum.155.t: "Miasma...?"
 panum.155.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırması bir sorunla karşılaştı - miasma gerçek olabilir mi?"
 panum.155.f: "''...ama bu son araştırma bölgesinin sonuçları, mikrop teorisinin mantığını çiğniyor ve nedenini bir türlü anlayamıyorum. Evler sığ bir kanalın yanında duruyor, sık sık kömür taşıyan sandallar bu kanaldan geçiyor. Eski bir kuyu dışında su pompalarına yürüyüş mesafesinde değiller. Su saf, belki de şehirdeki en saf su.\n\nYine de, benim anlam veremediğim bir sebepten, kolera burada. Zaten kötü kokuyu uzak tutmak için çalışıyorlar, ve koku, miasma gerçekten mevcut. Kanal pis su kokuyor... ama eğer bu suyu içmiyorlarsa, başka nasıl zarar görebilirler ki, sadece kokudan mı?'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.155.g: "Miasma doğru olamaz... olabilir mi?"
 panum.156.t: "Yıkım"
 panum.156.d: "Arsa açma iştahıyla [SCOPE.sState('panum_disease_state').GetCityHubName]'in gelişimi durmaksızın devam ediyor, hatta Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırması için bile."
 panum.156.f: "''...siz kimsiniz tekrar?'\n\n'Bu salgını araştıran doktor. Bu sokak hasta insanlarla doluydu. Neredeler?'\n\n'Hiç fikrim yok. Biz, çocuklarım ve ben, sadece bu evleri yıkmaya başladık.'\n\n'Yıkmaya mı? Ne? Bu evler bir düzine ailenin yuvasıydı, hepsi kolerayla enfekte!'\n\n'Artık öyle değiller. Ev sahibi hepsini sokağa attı.'\n\n'Ne?'\n\n'Attı! Böyle kira ödemek yok ama fark etmezdi. Arazi bir tekstil fabrikasına veriliyor ve eğer sakıncası yoksa, ben ve çocuklar iş başına, bu evleri yıkacağız.'"
 panum.156.g: "Aman Tanrım. Şimdi hastaları tekrar bulmam gerekecek... sadece bir şey içmeyin."
 panum.157.t: "Kontamine"
 panum.157.d: "Kötü haber! Doktor Kolera ile enfekte oldu!"
 panum.157.f: "'Nasıl oldu bilmiyorum. Miasma mı? Haftalardır hasta, ölü ve ölmekte olanların yanında bulundum, herkesten fazla. Mikrop mu? Suyu içmedim, ama ya bulaşma? Dokunmayla mı geçer? Havada, yüzeylerde mi? Bilmiyorum.\n\nAma semptomları biliyorum. Mide bozukluğu, ve asla bitmiyor. Ne yesem, ne içsem boş. Binlerce doğruyu ve bir gerçeği söylüyor.\n\nKolera oldum.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.157.g: "Umarım [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] yakında iyileşir."
 panum.161.t: "Bir Damla Cin"
 panum.161.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çalışmalarından bir süreliğine uzaklaşıp diğer tutkusu olan alkollü içkileri 'araştırıyor'."
 panum.161.f: "'...ama bu harika içkinin ikinci kadehini içerken, oldukça garip bir şey fark ettim. Ne kadar çok kişi buraya içmeye geliyorsa, koleraya yakalanma ihtimalleri o kadar az. Gerçekten! Kendi haritalamam, bu yere en yakın evlerin bu illet hastalığa yakalanma olasılığının oldukça düşük olduğunu gösteriyor.\n\nOrada bir desen var, hissediyorum. İşletmeciyle ve daha dost canlısı birkaç yerliyle konuştum, onlar da aynı fikirde gibi. Bu yerde hastalığı uzak tutan bir şey var gibi görünüyor. Daha fazla araştırmalıyım.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.161.g: "Ah, iş ve keyif bir arada ne güzel."
 panum.162.t: "Kadeh Kaldır"
 panum.162.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], en cesur hamleyi yaptı - kendine kolerayı bulaştırdı, kirli su içerek!"
 panum.162.f: "''...tabii, dünyanın en iyi teorisi bile pratik olmadan bir hiçtir. Tüm çalışmalar, rakiplerime göre tesadüf olarak kalır; kimse, düşüncelerimi pekiştirecek tartışmasız kanıt olmadığını iddia eder. Pekala. Onlarla yüzleşeceğim, en doğrudan şekilde: salgının merkezindeki sudan içerek, sadık bir koşucu tarafından getirilen sudan. Eğer haklıysalar, yerinden alındığımda bile hasta olmayacağım. Eğer haklıysam, kısa süre içinde yaşamım için savaşacağım, ama bir hayat, kurtarılabilecek çok sayıda insanın yanında ne ki?\n\nÖyleyse, sevgili günlüğüm, sağlığa kadeh kaldır.\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')] Büyük Kolera Salgını hakkında, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.162.g: "'Ah, aman Tanrım, kendimi...ah hayır hissediyorum.'"
 panum.162.h: "Doktoru bu pervasız davranıştan vazgeçir!"
 panum.163.t: "Başarıya Giden Harita"
 panum.163.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], salgının merkezini mükemmel bir şekilde haritalandırmayı başardı, hastalığın ilerleyişini takip etmeyi kolaylaştırıyor."
 panum.163.f: "'Beyler, beyler, işte size [SCOPE.sState('panum_disease_state').GetName] bölgesindeki enfeksiyonun haritamı sunuyorum. Bölgede meydana gelen her enfeksiyonun yerini, zamanını ve ölüm, enfeksiyon sayısı gibi bilgileri detaylı şekilde kapsıyor. Bu harita, bu mahalledeki kolera salgınının tüm seyrinin yazılı bir zaman çizelgesini sunuyor. Örnek: burada bir su pompası ve yürüme mesafesindeki ev sayısını görebiliyoruz.\n\nAyrıca, bu haritadan alınan bilgilerle oluşturulmuş tabloları da sunuyorum. Eğer siz saygıdeğer beyler kendiniz incelerseniz, bu su pompasının hizmet verdiği bölgelerin tüm alanlar arasında en yüksek ölüm oranına sahip olduğunu göreceksiniz. Bu tabloda, su şirketi [SCOPE.sState('panum_disease_state').GetName] Kuyuları'nın bu pompalarla doğrudan ilişkisi gösteriliyor ve bu da bu şirketin hizmet verdiği tüm bölgeler arasında kolera riskinin en yüksek olduğunu gösteriyor..."
 panum.163.g: "Bir gün bu bir bilim olacaktır."
 panum.164.t: "Ateş ve Öfke"
 panum.164.d: "[SCOPE.sState('panum_disease_state').GetName]'deki kolera salgınıyla mücadelede ilerleme kaydedilememesi, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın sabrını tüketti."
 panum.164.f: "Bağrışmalar neredeyse bir blok öteden duyulabiliyor ve masadan fırlatılan kitap ve fincanların sesi kapının dışından bile geliyor. Lanetler, panik içinde korkmuş asistanların özürleri, sonra daha bağrışmalar, ve devamı.\n\n'Ahmaklar! Tam anlamıyla aptallar! BURADA BİR SEBEPLE VARIZ! Kapımızın önünde insanlar ölüyor, ve onları kurtarmak bize düşüyor, ve kurtaracağız!'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın eli yumruk oldu.\n\n'Eğer en basit talimatlara bile uyamıyorsanız, burada olmamalısınız! Uyabilenler, emirlerime harfiyen uyun, ve BU lanet salgını yeneceğiz! Duyuyor musunuz?'\n\n'Evet, Doktor!'\n\n'Şimdi tekrar dışarı çıkın ve bana daha fazla numune bulun! BU SEFER DOĞRU olanlardan!'"
 panum.164.g: "Ve böylece doktor ordusunu harekete geçirir, hastalığa savaş açmaya hazır."
 panum.165.d: "Tam bir cesaret anında, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]'deki en çok etkilenen hastanelerden birini ziyaret ederek hastalarla görüşüyor."
 panum.165.f: "Bu geçici hastanenin koğuşu kalabalıktı, görsel ve işitsel olarak doluydu ama kokular her şeyden baskındı. Hastalık kokusu. Ölüm kokusu. Çiçekler ve tütsü getirilmişti kötü kokuyu bastırmak için, ama yine de pek az kişi bu lanetli salona geliyordu. Çok riskliydi, sağlıkları için tehlikeliydi. Başkalarına yardım edemezlerdi, kendileri yatakta ölürken.\n\nAz kişi geldi, ama hiç gelmedi değil. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] onlardan biriydi, ve ölüm ve hastalık diyarında bitmek bilmeyen cesaret ve sonsuz enerjiyle dolaştı. Hasta ve yalnızların yanında oturdu, sorular sordu, not aldı. Her düşünce, her cevap değerliydi. Kurtuluş için ipuçlarıydı, bu ölümün nereden geldiğini ve nasıl öldürülebileceğini gösteren işaretlerdi."
 panum.165.g: "Ve bu ölüm salonunda, elinde günlüğüyle bir yaşam meleği dolaşıyordu."
 panum.166.t: "Duanın Gücü"
 panum.166.d_christian: "Hem bilgi hem de belki de teselli arayışında, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yerel bir katedrali ziyaret ederek bir rahipten yardım istedi."
 panum.166.d_muslim: "Hem bilgi hem de belki de teselli arayışında, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yerel bir camiyi ziyaret ederek bir imamdan yardım istedi."
 panum.166.d_other: "Hem bilgi hem de belki de teselli arayışında, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yerel bir tapınağı ziyaret ederek bir rahipten yardım istedi."
 panum.166.f_christian: "'Merhaba, baba. Ben Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], başkentten gönderildim bu salgını araştırmak ve elimden gelen yardımı sunmak için. Yardımınızı rica ediyorum, eğer verebilirseniz.'\n\n'Sadece mütevazı bir rahibim, Tanrı değilim, ama elimden geleni yapacağım. Söyle bana, evlat. Neye ihtiyacın var?'\n\n'Bana bu enfeksiyonun ilk günleri hakkında mümkün olduğunca çok bilgi vermenizi isterim. İlk kim öldü? Nerede? Kaynağı hakkında bir fikriniz var mı?'\n\n'Sadece Tanrı bazı sorulara yanıt verebilir, ama evet, cemaatim hakkında çok şey biliyorum. Gelin, gelin. Ben de kendi yazılarımı alıyorum zaten.'"
 panum.166.f_muslim: "'Esselamu aleyküm, imam. Ben Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], başkentten gönderildim bu salgını araştırmak ve elimden gelen yardımı sunmak için. Yardımınızı rica ediyorum, eğer verebilirseniz.'\n\n'Sadece mütevazı bir din görevlisiyim, Allah değilim, ama elimden geleni yapacağım. Söyle, neye ihtiyacın var?'\n\n'Bana bu enfeksiyonun ilk günleri hakkında mümkün olduğunca çok bilgi vermenizi isterim. İlk kim öldü? Nerede? Kaynağı hakkında bir fikriniz var mı?'\n\n'Sadece Allah bazı sorulara yanıt verebilir, ama evet, burada toplum hakkında çok şey biliyorum. Gelin, gelin. Ben de kendi yazılarımı alıyorum zaten.'"
 panum.166.f_other: "'Selamlar rahip. Ben Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], başkentten gönderildim bu salgını araştırmak ve elimden gelen yardımı sunmak için. Yardımınızı rica ediyorum, eğer verebilirseniz.'\n\n'Ben sadece bu tapınağın mütevazı bekçisiyim, Tanrılardan biri değilim, ama elimden geleni yapacağım. Söyle bana, doktor. Neye ihtiyacın var?'\n\n'Bana bu enfeksiyonun ilk günleri hakkında mümkün olduğunca çok bilgi vermenizi isterim. İlk kim öldü? Nerede? Kaynağı hakkında bir fikriniz var mı?'\n\n'Sadece ilahiler bazı sorulara yanıt verebilir, ama evet, burada yaşayan insanlar hakkında çok şey biliyorum. Gelin, gelin. Ben de kendi yazılarımı alıyorum zaten.'"
 panum.166.g_christian: "Temizlik, kutsallığa yakındır."
 panum.166.g_muslim: "Her hastalığın bir çaresi vardır."
 panum.166.g_other: "İleriye götüreni ve sizi geri tutanı iyi bilin."
 panum.167.t: "Tedbirli"
 panum.167.d: "Araştırmasını yürütürken güvenliği sağlamak için, Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kendini enfekte olanlardan izole etti."
 panum.167.f: "'Bunu korkaklık olarak görenler olabilir. Ben buna pragmatizm derim. Bu, hızla kazanılabilecek bir savaş değil; düşmanın karnına süngü saplayıp hızlıca ölecek şekilde bir çatışma değil. Bu daha zorlu bir mücadele, göremediğimiz ve duyamadığımız ama etrafımızda olabilecek bir düşmanla.\n\nUygun korumaya sahip olmamak bir hata olur. İzolasyon en büyük anahtardır. Güvenli bölgelerden yiyecek ve su, temiz bir çalışma alanı ve enfekte kişilerle veya eşyalarıyla tüm temaslar aracılarla yapılmalı. Hastalıktan uzak, huzur içinde araştırabilir, tüm çabamı bu hastalığın ardındaki gerçeği ortaya çıkarmaya yoğunlaştırabilirim.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden, [TimeKeeper.GetCurrentDate.Format('y')]'deki Büyük Kolera Salgını üzerine, [SCOPE.sState('panum_disease_state').GetCityHubName]'de araştırma yaparken."
 panum.167.g: "...ama eninde sonunda [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ellerini kirletecek."
 panum.168.t: "Uykusuz Çalışma"
 panum.168.d: "Kolera salgınının kaynağına ulaşmaya kararlı olan Dr [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], özellikle geç saatlere kadar çalışıyor."
 panum.168.g: "O zaman, polis memuru, bu sokaklarda birlikte dolaşalım."
 je_panum_cholera_treatment_goal: ""
 je_panum_germ_theory: "Mikrop ve Miasma"
 je_panum_germ_theory_reason: "Koslu Hipokrat, topraktan çıkan toksik buharların havayla taşınarak hastalıkların yayılmasına katkıda bulunduğunu öne süren miasma teorisinin kurucusu olarak kabul edilir. 19. yüzyılda, bakteriler ve virüsler hakkında bilgi eksikliği nedeniyle doktorlar ve araştırmacılar, kolera gibi salgınları yalnızca 'miasma' yoluyla yayılan kötü kokulara bağladılar. Bu teori daha sonra tıpta yanlış bir yol olduğu ortaya çıktı, ancak miasma modeli salgınların nereden geldiğini ve nasıl yayıldığını kısmen açıklıyordu. Bulaşıcı hastalıkları savunanlar ile miasma teorisi destekçileri arasındaki çatışma, 19. yüzyıl ortalarında zaman zaman sertti. Londra’da miasma modelinin zayıflıkları fark edilmişti, ancak temizlik ve izolasyon gibi geçici kurallar epidemileri bir dereceye kadar sınırladı.\n\nBir ulus mikrop teorisi lehine ve miasma teorisi aleyhine yeterli kanıt bulursa, bu paradigma değişimi tedavi yöntemleri araştırmalarında veya salgınlarda daha az olumsuz olay yaşanmasını sağlayacaktır. Mikrop teorisini ilk keşfeden kişi ek bir araştırma bonusu kazanır."
 je_panum_germ_theory_goal: ""
 notification_panum_germ_theory_notification_name: "Mikrop Teorisinde Çığır Açıldı"
 notification_panum_germ_theory_notification_desc: "[GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName]’den bir [concept_panum_physician], mikrop teorisini tüm yönleriyle kesin olarak kanıtlamayı başardı. Miasma teorisi tamamen reddedildi."
 panum.11.t: "Mikrop Teorisi"
 panum.11.d: "Mikrop teorisi lehine ve miasma teorisi aleyhine ezici kanıtlar göz önüne alındığında, tıbbi bir paradigma değişimi gerçekleşti. Mikrop teorisinin bugün yerleşmesini sağlayan Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın katkısı büyüktür."
 panum.11.f: "Miasma teorisi, her yerde doğrulandığı varsayıldığı için çürütülmesi zor bir bilimsel tez örneğidir. 'Temiz hava' için uygulanan temizlik ve hijyen düzenlemeleri bazı hastalıkların gerçekten ortadan kalkmasını sağlamış gibi görünüyordu ve bu 19. yüzyılda doğrulanmıştı. Aynı zamanda, gerçek nedenler ve dolayısıyla gerçek tedavi yöntemleri bilinmediği için tıp biliminin pek çok alanda ilerlemesini engelledi. Bundan sonra doktorlar tedavi yöntemlerini bulmada daha başarılı olacak ve patojenler ve aşı araştırmaları için yol açılmış olacak."
 panum.11.g: "Ama gerçekten suyun içindekileri bilmek istiyor muyduk...?"
 panum.53.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Salgın Eyaletine Seyahat Ediyor"
 panum.53.f: "Tedavi yöntemleri bir hastalıkla mücadelede en önemli adımdır. Olası bir gelecekte salgını önleyebilecek bir aşının temelini oluşturur. Ancak, başarılı bir tedavi yöntemi bile gelecekteki salgınları kontrol altına almak ve süresini ile şiddetini azaltmak için yeterlidir – bu da kurban sayısının önemli ölçüde azalmasıyla sonuçlanır. Kendi ülkesinde bir salgını inceleyen doktorlar, yurt dışına çıkan doktorlardan daha etkili çalışırlar."
 panum.53.g: "Bu dehşet sona ermeli!"
 panum.54.t: "Tıbbi Araştırma Seferi"
 panum.54.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yurt dışında bir salgını yoğun şekilde incelemek ve muhtemelen yeni bir tedavi yöntemi geliştirmek için uygun uzmanlar ve asistanlardan oluşan küçük bir ekip kurdu. Şimdi soru, hangi hastalığın hangi ülkede gözlemleneceği."
