 panum.165.t: "Enfeksiyonun Kalbi"
 panum_physician_health_bonus_modifier: "Önce Güvenlik"
 panum.168.f: "'Dur! Bu saatte dışarıda kim var - Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Ne yapıyorsunuz bu kadar geç?'\n\n'Rundlarım var ve onlar güneş doğmasını beklemeyecek. Her dakika çok değerli, gece yarısından sonra bile.'\n\n'Tanrım! Bu sokaklar gece güvenli değil!'\n\nGün boyunca da güvenli değil, ta ki bu kolera sona erene kadar. Affedersiniz polis, ama fener yağı bitmeden daha yapılacak çok iş var. Kanal ve pompalardan su dolduracağım on iki şişe, evleri ziyaret edeceğim, hendekleri inceleyeceğim.'\n\n'Evet, peki, çok iyi. Hiçbir yanlış yapmıyorsunuz ama yine de size bir eskort vereyim.'"
 panum.3033.d: "Kızıl Haç üyelerinin ezici çoğunluğu Kimyasal Silahların Kullanımıyla İlgili Üçüncü Uluslararası Sözleşmeyi kabul etmiştir. Artık tüm üyeler için bağlayıcıdır."
