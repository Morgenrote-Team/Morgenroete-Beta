 panum.131.t: "Durdurulmuş Hastalık Araştırmaları"
 panum.131.d: "[GetPlayer.GetName] ülkesindeki tehlikeli salgın sona erdi ve son hastalar iyileştiği için Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çalışmalarını şimdilik tamamladı. Doktor, gelecekte hastalığın bilimsel bir tanımını kolaylaştıracak bazı önemli bilgiler topladı, ancak henüz bir atılım gerçekleştiremedi."
 panum.131.f: "'Kökeni ve nedenleri hakkında tüm varsayımları, eğer nedenler bu kadar büyük bir rahatsızlık yaratmaya uygunsa, diğer yazarlara bırakıyorum; kendim için, sadece doğasını yazacağım ve belirtilerini açıklayacağım; belki öğrenci bunu tekrar ortaya çıkarsa tanıyabilir. Bunu daha iyi yapabilirim çünkü hastalığı kendim yaşadım ve başkalarında etkilerini gözlemledim.' -Thucydides"
 panum.131.g: "Başka bir adım atıldı."
 panum.133.t: "Durdurulmuş Tıbbi Sefer"
 panum.133.d: "Tıbbi sefer, salgın sona erdiği için şimdilik çalışmalarını tamamladı. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bilimsel bir tanımı tamamlayamadı, ancak [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] çalışmaları gelecekte değerli olacaktır."
 panum.134.d: "Ülkemizi vuran korkunç salgın geçti. Ancak bu aynı zamanda Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırmalarını şimdilik durdurması gerektiği anlamına geliyor; çünkü [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], hastalığın tedavisini bulmak için daha fazla deney yapamaz. Yine de doktor, gelecekte kesinlikle faydalı olacak değerli bilgiler elde etti."
 panum.134.f: "'Bulaşıcı hastalık, bir şeyden diğerine geçer ve esas olarak farkedilemeyen parçacığın enfeksiyonundan kaynaklanır.' -Girolamo Fracastoro"
 panum.134.g: "Bir tedavi bulmamız sadece zaman meselesi."
 panum.136.d: "Ne yazık ki, tıbbi araştırma seferi şimdilik herhangi bir kesin sonuç alınamadan sona erdi. Salgın ülkeden ayrıldığından, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], teorilerini doğrulayamamış oldu. Ara sonuçlar, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] ve gelecek nesiller için tedavi yöntemini nihayet bulmak üzere kullanılabilir olacak."
