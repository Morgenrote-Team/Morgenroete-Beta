 panum.3031.t: "Birinci Konvansiyon bağlayıcı Konvansiyon oldu"
 panum.3031.d: "Kızılhaç üyelerinin ezici çoğunluğu, Savaş Yaralılarının Bakımıyla İlgili Birinci Uluslararası Konvansiyonu kabul etti. Artık tüm üyeler için bağlayıcıdır."
 panum.3031.f: "Uluslararası konvansiyonlar genellikle bağlayıcı olmayan niyet beyanlarıdır. Ancak, Kızılhaç üyelerinin yeterince çoğu imzalarsa, zamanla geçerli uluslararası hukuk haline gelir ve tüm imzacıların uyması beklenir - diğer üyeler de imzalar. Bu, tüm üyelerin %65’i ve Büyük Güçlerin çoğunluğu konvansiyona katıldığında gerçekleşir - diğer tüm üyeler buna uymak zorunda kalır. Bu konvansiyon artık olağan şekilde kaldırılamaz. Bağlayıcı konvansiyonlardan kaçınmak için Kızılhaç'tan tamamen çekilmek gerekir - tüm sonuçlarıyla."
 panum.3031.g: "Küresel geçerli bir uluslararası hukuk yaratıldı."
 panum.3032.t: "İkinci Konvansiyon bağlayıcı Konvansiyon oldu"
 panum.3032.d: "Kızılhaç üyelerinin ezici çoğunluğu, Silahsızlanma ve Deniz Savaşlarıyla İlgili İkinci Uluslararası Konvansiyonu kabul etti. Artık tüm üyeler için bağlayıcıdır."
 panum.3033.t: "Üçüncü Konvansiyon bağlayıcı Konvansiyon oldu"
 panum.3034.t: "Uluslararası Konvansiyon bağlayıcı oldu"
 panum.3034.d: "Kızılhaç üyelerinin ezici çoğunluğu bir konvansiyonu kabul etti. Artık tüm üyeler için bağlayıcıdır."
 panum.3034.g: "Bunun çıkarlarımıza uygun olup olmadığını kontrol edeceğiz."
