 je_panum_cholera_description_expedition_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], #YELLOW Kolera#! hakkında değerli bilgiler edinmek için [SCOPE.sCountry('target').GetName] ülkesinde bir tıbbi keşif seferi yürütüyor. Hastalık ülkede sürerken, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] her ay yeni bilgiler elde etme şansına sahip olarak hastalık hakkında kapsamlı bir bilimsel görüş hazırlayabilir.\n\nHastalık yatışsa bile, bilimsel ilerleme kaybolmaz ve bir sonraki incelemede de mevcut olur."
