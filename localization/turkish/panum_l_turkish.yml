 panum.2103.d: "Bugün, halkın yoğun ilgisi ve basının huzurunda, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ülkenin ilk modern hastanesini [SCOPE.sState('panum_clinic_state').GetCityHubName]'de açtı; ameliyathaneleri ve modern tıbbi ekipmanlarıyla bir dönüm noktası niteliği taşıyor."
 panum.2103.f: "'İnsanlığın laneti, en korkunç durumlara bile alışarak tahammül etmeyi öğrenmesidir.' -Rudolf Virchow"
 panum.2103.g: "Bravo!"
