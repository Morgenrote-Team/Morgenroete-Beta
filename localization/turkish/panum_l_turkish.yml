 je_panum_medical_research_project_reason: "[ROOT.GetCountry.GetCustom('panum_medical_research_project_active_type')] Tıbbi yeniliklere ek olarak, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] on klasik salgın hastalık arasında olmayan hastalıklar için de tedaviler bulabilir.\n\nBu [concept_panum_physician]’in varsayılan projesidir. Doktor başka bir projeyle meşgul olmadığında aktiftir.\nHer ilerleme [JournalEntry.GetTotalGoalValue|V0] seviyesine ulaştığında küçük bir teknoloji artışı alacağız.\n\nBir sonraki artış için teknoloji: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
 panum.2611.t: "Kurumsallaşma"
 panum.2611.d: "Bazı akıl hastanelerindeki kabul edilemez koşullar nedeniyle doktorlar ve siyasi figürler, oradaki uygulamaların reform edilmesini savunmaktadır. Psikiyatristlerin hastalarıyla yalnız bir hayat yaşayabileceği, trafiğe uzak, izole yerler önerilmektedir."
 panum.2611.f: "Zihinsel hastaların bakımında kurumsallaşmış modern dönem, 19. yüzyılın başında devlet öncülüğünde başlamıştır. İngiltere’de 1808 County Asylums Yasası’nın geçmesinin ardından kamu akıl hastaneleri kurulmuştur. Bu yasa, yargıçlara her bölgede çok sayıda 'fakir deli'yi barındıracak oran destekli hastaneler inşa etme yetkisi vermiştir. 1845 Lunacy Yasası, zihinsel hastaların durumunu tedavi gerektiren hastalar olarak açıkça değiştirdiği için önemli bir dönüm noktasıdır. Yasa, Lunacy Komisyonu’nu Lord Shaftesbury başkanlığında kurmuş ve delilik yasalarını reform etmeye odaklanmıştır. Alman kurumsal psikiyatrisi açısından 1830-1860 yılları arasında General Journal of Psychiatry bahsedilmesi gereken bir organdır. Heinrich Damerow tarafından Carl Friedrich Flemming ve Christian Friedrich Wilhelm Roller ile birlikte 1844’te kurulmuştur."
 panum.2611.g: "Psikiyatrik ve psikolojik araştırmalar ilerleme kaydediyor."
 panum.2612.t: "Beyin Hastalığı"
 panum.2612.d: "Psikiyatride evrim teorisi önemli değişikliklerle eşlik ediyor. Yeni bir psikiyatrist kuşağı, zihinsel hastalıkların beyin hastalıkları olduğunu ileri sürüyor. Bilimsel yönelimli psikiyatri, daha önce hakim olan beşeri görüşün yerini alıyor."
 panum.2612.f: "Wilhelm Griesinger, psikiyatrideki bilimsel dönüşümün en önemli figürlerinden biri olarak kabul edilir. Deneysel fizyoloji kurucusu ve modern fizyoloji üzerine ilk ders kitabının yazarı François Magendie ile tanışmış ve onun araştırma yaklaşımı üzerinde büyük etkisi olmuştur. 1839'da Konstanz Gölü'ndeki Friedrichshafen'e pratik doktor olarak taşınmıştır. Ertesi yıl, 1840'ta, Winnenthal akıl hastanesinde ikinci doktor olarak çalışma teklifi almıştır. Orada çalıştığı iki yıl boyunca Griesinger, 1845'te yayımlanan ve psikiyatride yeni bir dönemi başlatan büyük eseri 'Zihinsel Hastalıkların Patolojisi ve Tedavisi' için zengin bir pratik deneyim kazanmıştır. Bu eserinde psikiyatrinin temelini tıbbi fizyoloji ve patolojiye dayandırmayı denemiştir. Griesinger'in ünlü ifadesi ilk sayfada yer alır; her hastalık belirtisini anlamak için olgunun lokalize edilmesi ve tüm zihinsel hastalıkların beyin hastalıkları olarak tanınması gerektiğini belirtir."
 panum.2613.t: "Zihinsel Bozuklukların Sınıflandırılması"
 panum.2613.d: "Psikiyatristler ve psikologlar, zihinsel hastalıkları daha önce yalnızca tıpta kullanılan bir şemaya göre sınıflandırmaya başlamışlardır. Daha önce yalnızca 'aptal' ve 'deli'yi bilirlerken, artık 7 kategori tanımaktadırlar: mani, melankoli, monomani, paresis, demans, dipsomani ve epilepsi."
 panum.2613.f: "Alman psikiyatri geleneğinin üçlü sistemi, psikiyatrik hastalıkları nedenlerine göre sınıflandıran bir sistemdir. İlk tanım Emil Kraepelin'e dayanır; Kraepelin ise Karl Ludwig Kahlbaum'un hazırlık çalışmalarını temel almıştır. Kraepelin, zihinsel hastalıklara bakmanın yeni bir yolunu bulduğunu ilan etmiş ve geleneksel görüşü 'semptomatik', kendi görüşünü 'klinik' olarak adlandırmıştır. Bu, 19. yüzyılda sınıflandırılmış yüzlerce zihinsel bozukluğu, ana semptomlarının basit benzerliğine göre değil, zaman içinde ortak semptom örüntülerine göre gruplandırdığı paradigma belirleyici bir sentez olarak ortaya çıkmıştır."
 panum.2614.t: "Konuşarak Tedavi"
 panum.2614.d: "Birçok çekinceye rağmen, psikolojik yaklaşım psikiyatristler arasında giderek daha popüler hale gelmektedir. Uzun görüşmeler sonucunda iyileşmiş gibi görünen genç bir kadının vakası, zihinsel hastaların tedavisinde yeni bir dönüm noktası şablonu olarak görülmektedir."
 panum.2614.f: "Josef Breuer'in 1880/1881'de Bertha Pappenheim (takma ad: Anna O.)'u tedavi ederken kazandığı deneyimler, 1895'te Sigmund Freud ile birlikte yayınlanan histeri çalışmaları için temel oluşturmuştur. Bu çalışma (ve temel vaka öyküsü), Freud tarafından psikanalizin kökü ve başlangıç noktası olarak tanımlanmıştır. Sigmund Freud'un öncü çalışmalarını takiben, psikanalitik kuramdan türeyen fikirler psikiyatride de kök salmaya başlamıştır. Psikanalitik teori, hastaların akıl hastanelerinde barındırılmak yerine özel muayenehanelerde tedavi edilebilmesini sağladığı için psikiyatristler arasında popüler hale gelmiştir."
 panum.2615.t: "Psikoloji ve Felsefe"
 panum.2615.d: "Psikoloji okullarının psikiyatri üzerindeki etkisine ek olarak, felsefi etkilerin de artan bir şekilde anlaşılması vardır. Doğa bilimlerinin hakimiyeti kırılmış gibi görünmektedir."
 panum.2615.f: "Karl Jaspers, 20. yüzyılın ilk psikiyatristlerinden biri olarak disiplinlerinin felsefi varsayımlarını inceleyen ve yansıtanlardan biridir. Jaspers'in 'Genel Psikopatoloji' (1913), zihinsel hastalıkları beyin hastalıkları olarak tanımlayan Wilhelm Griesinger ve psikiyatride işlevsel bir nosolojik referans sistemi sunan Emil Kraepelin ile birlikte, metodik olarak yansıtılmış psikopatolojik araştırmanın başlangıcı olarak kabul edilir. Jaspers, Husserl'in betimsel psikoloji üzerine erken çalışmalarına ve Wilhelm Dilthey'in 'açıklama' ve 'anlama' ayrımına atıfta bulunmuş ve metodolojik olarak psikopatolojiye eklemiştir."
 panum.2131.t: "Bir Tabak Kazanmak"
 panum.2131.d: "Raşitizme yoksulluğun oynayabileceği rolün keşfiyle, Sendikacılar ücretsiz okul yemekleri ve süt için mücadele bayrağını devraldılar!"
 panum.2131.f: "Başlangıçta yavaş ilerledi - okulun önünde burada veya orada bir araba, çocuklara süt, çorba ve biraz ekmek veriyordu. Şimdi çok daha fazlası haline geldi: ülkenin işçi sendikaları, sosyalistler ve işçi aktivistleri yalnızca proletarya sınıfı için değil, çocukları için de mücadele etmeyi benimsedi. Boş kaseler ve yalvaran gözlere sahip çocukların posterleri sokaklarda gittikçe yaygınlaşıyor ve hükümetin en genç ve savunmasız vatandaşlarına yeterince bakamaması kolay bir eleştiri aracı oluşturuyor.\n\nÜcretsiz okul yemekleri ve süt fikri bir yangın gibi yayılıyor ve hareketin en uç dalları tarafından bile tekrar ediliyor - hükümet ülkenin çocuklarına bakamazsa, gerçekten kimin için var?"
 panum.2131.g: "Ücretsiz süt hakkımızı alacağız, evet alacağız, evet alacağız!"
 panum.2131.h: "Ücretsiz süt diye bir şey yoktur."
 panum_free_milk_modifier: "Ücretsiz Süt"
 panum_no_free_milk_modifier: "Ücretsiz Süt Yok"
 panum_medical_techniques_level_rises_tt: "[GetPlayer.GetName]'in Tıbbi Teknikler Seviyesi yükseliyor."
 panum.561.t: "Aşıya Giden Yol?"
 panum.561.d: "Başkentten gelen talimat doğrultusunda, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], Sarı Humma'yı nasıl tedavi edebileceğini veya hatta iyileştirebileceğini araştırmaya başlamıştır."
 panum.561.f: "''...yine de, sarı hummayı gerçekten yenebileceğim değerlendirmemde belki de fazla kendime güvenmiş olabileceğimi merak ediyorum. Hastalıkla ilgili bilinen birkaç kesin bilgi vardır; bulaşma yolları bile gizemlidir, kökenlerinden bahsetmiyorum bile. Acaba, denebilir mi ki, bu eski miasma teorisinin bir yeniden dirilişi midir? Böyle bir gizem karşısında kim kesinlik iddia edebilir?\n\nTüm bu gizemlere rağmen bildiğimiz bir şey var. Bu gizemli ölümle karşılaşan herkes ölmez; bazıları neredeyse hiç belirti göstermeden hayatta kalır ve çoğu yaşamı tehdit etmeden önce iyileşir. Sarı humma ile karşılaşmak ölümle dans etmektir, ama kesinlikle seni ele geçireceği kesin değildir...'"
 panum.561.g: "...ve eğer onu herhangi bir yerde durdurabilirsek, her yerde durdurabiliriz."
 panum.562.t: "Yetimhane"
 panum.562.d: "Sarı Humma'dan kurtulmuş tüm vakaları inceleyen Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], birçok sağlıklı bireyin bulunduğu bir eve – bir yetimhaneye – ulaşmıştır."
 panum.562.f: "'Ah, merhaba, siz bu yetimhanenin yöneticisi olmalısınız...Görüyorum ki çocuklar bugün boyalarla oynamış.'\n'İnanın, nereden aldıklarını bilmiyorum - oh, siz arayacağını söyledikleri doktor olmalısınız! Maalesef öksürükler çoktan geçti, bu yüzden -'\n'Üzgünüm, ben o doktor değilim, hanımefendi. Başkentten geldim, sarı hummayı araştırıyorum. Hastalığın... buradan geçmiş olduğunu söylediler mi?'\n'Ah evet, küçükler. Çokları geçirdi. Bazıları ailesini hastalık kaybetmiş, zavallılar, ama çocukları genellikle bağışlıyor gibi görünüyor.'\nFascinating. Teoriniz var mı -'\n'Çocuklar! Hadi gelin! Başkentten gelen iyi bir adam sizinle konuşmak için burada!'\n'Ah...merhaba çocuklar. Ben Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ve sarı humma hakkında konuşmak istiyorum..."
 panum.562.g: "Neden ebeveynler ölürken çocuklar hayatta kalıyor?"
 panum.563.t_america: "Eski Kan"
 panum.563.d_america: "Sarı Humma hakkında daha fazla bilgi edinmek amacıyla, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bu topraklardaki ilk yerleşimcilerin ailelerini ziyaret etmeye karar vermiştir."
 panum.563.f_america: "''...ve yine de, bu topraklardaki ilk ailelerin hepsi yok olmadı. Hâlâ tarihlerini buradaki ilk keşiflere kadar izleyebilen bazı aileler var, büyük veya küçük. Soruşturmamı bu ailelere yönelttim, çünkü bazıları hâlâ geçmişe dair değerli günlükler ve kayıtlar tutuyor; bu, resmi arşivlerden önceki döneme dair bir bakış sağlıyor. Özellikle ilginç bir şey ortaya çıkıyor: Sarı Humma'nın ilk vakaları bu topraklarda yaklaşık 1685 yılında ortaya çıkmış.\n\nAncak, ortaya çıkışından bu yana, bu [ROOT.GetCountry.GetNameNoFlag] büyüklerinden bazıları kaşif ve maceraperest olarak yurt dışına gitmiş... ve burada sarı humma geçirmiş olan bazıları Afrika'da aynı hastalıkla karşılaşmış ama hiç hasta olmamış. Bu beni tek bir gerçeğe yönlendiriyor.'"
 panum.563.g_america: "Bunlar aynı hastalık. Birine karşı bağışıklık, diğerine karşı da bağışıklık demektir."
 panum.563.t_africa: "Kabile Halkı"
 panum.563.d_africa: "Sarı Humma hakkında daha fazla bilgi edinmek amacıyla, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalığı en iyi bilenlere – yerli Afrikalılara – yönelmiştir."
 panum.563.f_africa: "'...ve yine de, biz hızla ölebilirken, yerli Afrikalılar dayanıyor. Bu hastalıkla derin bir deneyime sahipler; dil bariyeri büyük bir engel oluşturuyor, ama birkaç tanımlama ile hastalığı anlayabiliyorlar. Doğal bir dirençleri var mı, tıpkı Avrupalıların Amerika'yı harap eden çiçek hastalığına karşı sahip olabileceği gibi? Belki, ama Afrikalı kökenliler şehirlerimizde çalışırken bizimle aynı oranda ölüyor - o zaman başka bir faktör etkili olmalı. Diyet? Kültür?\n\nAnahtar belki de çocuklukta kabileye maruz kalmaktır. Olabilir ki, sarı hummaya genç yaşta maruz kalıyorlar ve böylece kalıcı bir bağışıklık kazanıyorlar, tıpkı çiçek hastalığına karşı çiğ sütle sağlanan koruma gibi.'"
 panum.563.g_africa: "Ve eğer bağışık hale getirilebilirlerse... o zaman bir aşı geliştirmek mümkün olmalı."
 panum.564.t: "Düşmanın Doğası"
 panum.564.d: "Bir hastalıkla savaşmak, onun doğası hakkında daha fazla bilgi edinmeyi gerektirir ve Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ilginç bir test geliştirmiştir."
 panum.564.f: "'...ve cholera'nın su yoluyla bulaşan bir hastalık olduğu ortaya çıkınca, uygun filtreleme ile bu tür hastalıkları sudan uzaklaştırma olasılığını inceleme şansımız oldu. Bunu gerçekleştirmek biraz zaman aldı, ama elime Berkefeld filtresi geçti; diyatomlu toprakla suyu filtre edebilen fantastik bir cihaz. Son derece hassas, hatta bakterileri bile uzaklaştırabilir. Enfekte birkaç kişiden alınan kanı bir şişede topladım, distile su ile seyreltip filtreden geçirdim. Ortaya çıkan sıvı temiz ve berraktı... ya da öyle sanıyordum.\n\nVe sürpriz var: ne olursa olsun filtreyi geçti, bunu onu enjekte etmeye cesaret eden bir gönüllü kanıtladı. Hasta oldular ve şimdi hayatları için savaşıyorlar. Ancak bu, Sarı Humma'nın basit bir mikroptan ibaret olmadığını, bakteriden daha küçük bir şey olduğunu ve göremediğimiz bir şey olduğunu kanıtlıyor.\n\nBunu imkansızlık olarak adlandırabilirdim, ama bir tıp dergisinde buna dair not buldum. Buna virüs diyorlar.'"
 panum.564.g: "Düşmanı tanı, düşmanı yok et."
 panum.565.t: "Tedavi Edilemez mi?"
 panum.565.d: "Herhangi bir doğru tedavi işareti umuduyla, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yerel klinik ve hastaneleri ziyaret ederek tedavi uygulamalarını araştırmıştır."
 panum.565.f: "'Ah, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], sizi görmek büyük bir zevk! Burada klinikte biz -'\n'Üzgünüm, doktor, hoşbeşi kısa kesmemiz gerekecek. Diğer kliniklere, hastanelere, servisleri ziyaret etmem gerekiyor, geceye kadar yaklaşık yirmi iki yer. Tedavinizin etkinliğini anlatır mısınız?'\n'Ah, uh...biz belirlenmiş yönergeleri takip ediyoruz -'\n'Başarıyla mı? Not alayım.'\n'Uhm...başarısız.'\n'Ölümler?'\n'Oldukça...yüksek.'\n'Bu hafta kaç kayıp verdiniz?'\n'Yüz yetmiş altı.'\n'Bu sizi ve son altı klinikle birlikte toplamda üç binden fazla ölüm ediyor. Tedavi yönergelerine uygun çalışıyorsunuz, değil mi?'\n'Evet, doktor!'\n'O zaman bitkisel ilaçlar, elektroterapi, radyoterapi, hidroterapi, halk ilaçları, modern tıp ve... hmm, bildiğimiz her türlü tedavi, hatta astrolojik nedenler için gece gökyüzünden koruma dahil, elenir.'\n'O zaman...bu doktor, tedavi yok mu demek oluyor?'\n'Evet, görünüşe göre hiçbir tedavinin etkisi olmayacak gibi. Üzücü bir durum."
 panum.565.g: "O zaman taktik değişikliği - bir aşıya ihtiyacımız var."
 panum.566.t: "İlk Kırılma"
 panum.566.d: "Araştırmaları şu ana kadar başarısız olmasına rağmen, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bir aşı geliştirmek amacıyla maymunlar üzerinde deney yapmıştır."
 panum.566.f: "Birçok kişi için kafeste ölü bir maymun görmek kutlanacak bir sebep olmasa da, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ve ekibi için kayda değer bir ilerlemedir. Bu korkunç hastalık için aşı geliştirmek, hastalığı laboratuvarda isteğe bağlı olarak üretebilme yeteneğini gerektiriyordu, ancak ne kadar deneseler de, bunu başaramamışlardı...bugüne kadar. Yerli Afrika maymunları ve şempanzeleri hastalığa karşı bağışık görünüyordu, ama uygun test konusu olarak bir Hint makakının gelmesi gerekiyordu. Enfekte bir insanın damarlarından alınan serum ile aşılanan makak hastalandı ve sonunda öldü.\n\nBazıları için bu boş bir zalimlik gibi görünebilir, ama burada, şimdi, büyük bir ilerleme sundu. Nihayet test edebilecekleri denekler vardı."
 panum.566.g: "Hmm. Bu bir ilerleme... en azından maymunları öldürmede."
 panum.567.t: "Serumun Sırrı"
 panum.567.d: "Güvenilir bir 'denek'e erişimi olan Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], iyileşen hastaların kanını kullanarak aşı olasılıklarını test etmeye başlamıştır."
 panum.567.f: "'1. Makak-makak transfüzyonu: hastalık geçti, bağışıklık yok, makak öldü. Kan yoluyla bulaşma doğrulandı, hastalık muhtemelen böcekler tarafından taşınıyor - sivrisinekler?\n2. İnsan-makak transfüzyonu: hastalık geçti, bağışıklık yok, makak hayatta kaldı. Enfeksiyonun doğrudan türler arası geçebildiğini doğrular.\n3. Güney Amerika ve Afrika Sarı Humması makak için: bağışıklık, makak hayatta kaldı. Her iki hastalığa karşı paylaşılan bağışıklığı doğrular.\n4. Serumda ölü patojen, aşırı ısı ile sterilize edildi: koruma sağlamadı, makak canlı patojenle aşılama sonrası öldü. Önemli bir başarısızlık, ölü patojen aşı olasılıklarını eler.\n5. İyileşen serumun makaka transferi: gelecekteki enfeksiyonu önledi! Ümit verici! Aşı için potansiyel başlangıç?'"
 panum.567.g: "Birkaç makakı kırmadan omlet yapamazsınız..."
 panum.568.t: "Prototip"
 panum.568.d: "Aşı üzerinde çalışmalarına devam eden Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kritik bir noktaya ulaşmıştır - prototip aşı."
 panum.568.f: "'İnanılmaz bir an olmalı, ama ayık kalmakta zorlanıyorum. İyileşmiş hastalardan alınan büyük miktarda insan serumu kullanarak, ekibim ve ben onları damıtılmış bir forma işleyerek, gönüllüye bağışıklık sağlayabilecek potansiyel bir ürün elde ettik. Bu iyi bir ilk taslak ve kritik bir adım oldu, ardından makaklar üzerinde test etmeye başladık. Birçoğu öldü, birçoğu yaşadı, ama makak insan değildir.\n\nCanlı test gerekliydi. Buradan, oradan ve her yerden on gönüllü toplandı. Bazı yerel garnizon askerleri, ekibimden bir üye, birkaç işsiz adam birkaç kuruş vaadiyle ikna edildi. Yaklaşık yirmi iki gönüllü, yaklaşık yirmi iki aşı. Sonuç? Yedisi hiç belirti göstermedi, bir hafta sonra bağışıklıkları doğrulandı. Beşi hafif hastalık yaşadı, sonra bağışık oldu. Altısı daha ağır hasta oldu, sonra bağışık oldu. Kalanlar? Hepsi gerçek sarı humma geçirdi ve biri öldü. Bu, doğru yönde bir adım, ama... ölüler ne olacak?'"
 panum.568.g: "İlerlemenin bedeli yüksek."
 panum.569.t: "Yeni Bir Denek"
 panum.569.d: "İlk aşı denemesi karışık bir başarı ile sonuçlanınca, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] süreci geliştirmeye kararlıdır."
 panum.569.f: "Bazı görevlilerin rahatlamasına, bazılarını dehşete düşürmesine rağmen, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] kritik bir keşif yapmıştı - maymunlar hastalığı kuluçkaya yatırabilen tek hayvan değildi ve daha uygun bir konakçı bulundu: sıradan laboratuvar faresi. Tıpta araştırma endüstrisinde oynayabilecek rolleri küçümsenemez, ama burada özellikle kritik bir rol oynuyorlar: beyin sıvıları, küçük beyinlerinin etrafındaki jöle, sarı humma virüsü için uygun bir üreme ortamı sağlıyor. Bu sürecin ise belirgin bir avantajı var.\n\nFareden fareye her geçiş bir öncekinden daha kısa sürüyor ve virüsü zayıflatıyor. Yavaş ama emin adımlarla, insanları öldüren bu virüs, bir fare bir fare ele geçiriliyor."
 panum.569.g: "İyi, önce maymunlar, şimdi fareler..."
 panum.570.t: "İkinci Prototip"
 panum.570.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in aşısının sürekli geliştirilmesi, iyileştirilmiş bir versiyonun geliştirilmesine yol açtı."
 panum.570.f: "'Son deneme başarısız olmadı, ama bunu başarı olarak adlandıramam. Zavallı gönüllüler, insanlığı bu hastalıktan kurtarma umudu için hayatlarını verdiler ve onlara borçlu olarak mümkün olduğunca geliştirmem gerek. Tam olarak bunu yaptığımı düşünüyorum. Maddeyi maymunlardan farelere aktararak, virüsü yavaş yavaş zayıflattım ve önemli ölçüde güçsüzleştirdim. Otuzdan fazla geçişten sonra, ortaya çıkan sarı humma, ilk denemelere kıyasla aşılarda kullanılabilir hale geldi.\n\nDaha önceki yaklaşımla aynı şekilde, bağışıklık serumu ve zayıflatılmış canlı virüs kombinasyonu oluşturdum, serum belirli bağışıklık komplikasyonları riskini azaltıyor. Önceki denemeye göre daha az gönüllü vardı, ama bir meslektaşım riski almaya karar verdi. Ne aşı olmuş ne de sarı humma ile karşılaşmışlardı ve aşılamadan önce bir hafta boyunca yoğun karantinaya alındılar. Sadece küçük bir kızarıklık dışında, sarı humma gelişmedi. Şu ana kadar çok umut verici sonuçlar.'"
 panum.570.g: "Sanırım sonunda bir yol kat ediyoruz..."
 panum.570.h: "...o zaman bu aşı kampanyasını başlatalım!"
 panum.571.t: "Yangın"
 panum.571.d: "Felaket! Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tarafından geliştirilen serum-aşının dağıtımı kazara kan yoluyla bulaşan hastalıkları iletmiştir!"
 panum.571.f: "Geriye dönüp bakıldığında, insan kan serumu kullanarak aşı yapmak belki de korkunç bir fikirdi. İnsan kanının sırları kısmen çözülmüştü, ama mikroskop yeni mikropları ortaya çıkardığı ve viral cisimler teorisi gelişmeye başladığı bir dünyada, beklenmedik ve felaketle sonuçlanabilecek olaylar her zaman olabilirdi.\n\nO felaket şimdi gerçekleşti: on binlerce kişi, farkında olmadan virüsle kontamine serumla enjekte edildi ve bu virüs askerlerden devlet yetkililerine kadar herkeste sarılık oluşturdu. Bu virüs daha önce bilimimizce bilinmiyordu ve hâlâ birçok zeki zihin tarafından tespit edilemiyor... ama ulusal imajımıza verilen zarar çok açık. Ölümler az, belki hiç yok, ama aşılama projesinin bariz başarısızlığı tıp camiamızı perişan etti, dünya çapında alay konusu oldu."
 panum.571.g: "Bu, tıbbi araştırmamız için bir felaket..."
 panum.572.t: "Son Ayarlamalar?"
 panum.572.d: "Neredeyse tamamlanmış bir aşıyla, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nihai geliştirme sürecindedir."
 panum.572.f: "Bilmiyorsanız, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in laboratuvarını çok garip bir mutfak sanabilirsiniz. Tezgâhlar tuz, su, yağ ve yumurtalarla dolu, sıcak tabaklar, çeşitli bardaklar ve son teknoloji bir buzdolabı. Sahne kahvaltı hazırlamak için kurulmuş gibi görünse de, aslında bir tıbbi buluş üzerinde çalışılıyor. Serum, büyük ölçekli dağıtılacak bir aşı yapmak için çok pahalı, büyük ölçeklerde çalışmak çok zor. Denklemden çıkarılması gerekiyor, peki ya başka ne?\n\nSessizce mırıldanarak, delilik eşiğinde gibi görünen Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] yorulmadan çalışıyor. Özenle hazırlanmış fare dokusu, dikkatle yumurta sarısına batırılıyor ve sonra dikkatle, hep dikkatle, dondurarak kurutma bölümüne yerleştiriliyor. Önceki parti çıktı, içeriği şimdi ince bir toz haline geldi. Bir tuzlu çözeltiye ekleyin...\n\nDoktor gülümsedi.\n\n'Nihayet,' dedi iyi doktor. 'Başardım.'"
 panum.572.g: "Heureka!"
 panum.573.t: "Son Prototip"
 panum.573.d: "Aşı çalışmalarını tamamlayan Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], aşıyı nihai test grubuna uygulamaya başlamıştır."
 panum.573.f: "'Uzun ve zorlu bir yoldu, ama sonunda hedef gözle görülür hâle geldi. Nihai aşama, aşıyı daha kolay erişilebilir hâle getirmekti ve şimdi öyle: serumu tuzlu çözelti ile değiştirdik, ortaya çıkan aşı paketi çiçek hastalığında kullanılan yöntemlere benziyor. Enjeksiyona gerek yok, sadece aynı çizik yöntemi uygulanıyor. Hatta iki aşı aynı anda uygulanabilir. Tüm değerlendirmelere göre, bu aşı güvenli, güvenilir ve etkin bir şekilde yalnızca birkaç bin değil, milyonlara uygulanabilir.\n\nGeçmiş testler ise içimi korku ile dolduruyor. Gönüllü sayısı az, test grubu oluşturacak kadar değil... ama kendimi hesaba katarsam yeterli sayıda var. Düzenlemeleri çoktan yaptım - bir general, askerlerinden yalnızca belirli sayıyı risk hattına gönderebilir, sonra kendisi sahaya çıkmak zorundadır. Bu gece, saat sekizde, bu aşıyı olacağım. Eğer işe yararsa, iki hafta içinde sarı humma ile aşılandığımda, sadece hafif bir rahatsızlık yaşayacağım.'"
 panum.573.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] için şans dileyin."
 panum.574.t: "Sarı Humma Aşısı"
 panum.574.d: "Başkentten haber geldi: Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], sarı humma için başarılı bir aşı geliştirdi!"
 panum.574.f: "'...ama sonunda, tüm zorluklara rağmen ekibimle birlikte başarıya ulaştık. Sarı hummanın hâlâ çözülmemiş birçok gizemi var, ama biz geçerli bir aşı ürettik ve geniş ölçekli üretime hazır. Bazı özel tesisler ve uzman ekipler gerektirebilir, ama üretilebilir ve milyonlarca kişi hızlı bir aşılama kampanyası ile sarı hummadan kurtulabilir.\n\nBirçok hayat kaybedildi, kendi ekibimden de dahil, araştırmalarımız uğruna hayatını veren yardımcılardan testler için gönüllü olanlara kadar; hepsi hak ettiği kahramanlık takdiri ile anılmalı. Ayrıca makaklar ve fareler de bu çalışmada kritik rol oynadılar.\n\nOnların fedakarlığı ve kolektif çabamız sayesinde, artık birkaç yıl içinde sarı hummayı sona erdirecek ve belki de bir gün tamamen yok edecek bir aşıya sahibiz.'"
 panum.574.g: "Aferin doktor! Şimdi hemen uygulamaya başlayalım!"
