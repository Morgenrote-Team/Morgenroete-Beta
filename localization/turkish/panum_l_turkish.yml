 panum.1100.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Gribi"
 panum.1100.d: "Birçok hastane, klinik ve doktor muayenehanesi, önce normal grip sanılan garip bir hastalık vakalarının olağanüstü sayıda olduğunu bildirdi. Hastane yatakları artık tıka basa dolu ve kamu odalarının boşaltılması gerekiyor. En kötü korkular doğrulandı; komşu ülkeleri etkileyen bu durum, görünüşe göre korkulan [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Gribi."
 panum.1100.f: "Başta doktorlar normal bir grip salgını olduğunu söylediler. İlk birkaç gün boyunca, basın bunun garip bir salgın türü hastalık olduğunu iddia etti, ancak zararsız ve ölümcül olmadığını belirtti.\n\nAma durum tam tersiydi. Her gün grip salgını yeni bir şehre, yeni bir bölgeye ulaşıyor ve tıbbi tedavilerin tamamen yeniden düzenlenmesini gerektiriyordu. Dün bir kışlada iki kişi semptom gösterirken, bugün zaten 700 kişi var. Hastalığın uğursuz doğası, çocukları ve yaşlıları değil, 20-40 yaş arası gençleri öldürmesiyle kendini gösteriyor. Yirmide bir hasta gribi atlatamıyor. Nereden geldi, nasıl geldi, ne olduğu: Bu salgın hâlâ bir gizem.\n\nAncak şimdiden belli olan bir şey var: Bu grip, daha önce bildiğimiz normal hayatı tamamen değiştirebilir. Hükümet müdahalesi çağrısı giderek yükseliyor. [GetPlayer.GetName] buna nasıl yanıt verecek?"
 panum.1100.g: "Bu zararsız bir hastalık, değil mi?"
 panum.1101.t: "İspanyol Gribi"
 panum.1101.d: "Birçok hastane, klinik ve doktor muayenehanesi, önce normal grip sanılan garip bir hastalık vakalarının olağanüstü sayıda olduğunu bildirdi. Hastane yatakları artık tıka basa dolu ve kamu odalarının boşaltılması gerekiyor. En kötü korkular doğrulandı; bu, daha önce bilinmeyen boyutlarda bir salgın gibi görünüyor."
 panum.1101.f: "İspanyol gribi, 1918 ile 1920 yılları arasında üç dalga hâlinde yayılan ve grip virüsünün olağanüstü derecede virülent bir türevinden kaynaklanan bir influenza pandemisiydi; 20 milyon ile 50 milyon arasında insanın hayatını kaybetmesine yol açtı. Tahminler, dünya nüfusunun yaklaşık 1,8 milyardan 100 milyona kadar değişen bir aralıkta olduğunu gösteriyor.\nBu, İspanyol gribinden ölen insanların sayısının Birinci Dünya Savaşı’ndaki savaş eylemlerinden (yaklaşık 17 milyon ölü) daha fazla olduğu anlamına geliyordu. Yaklaşık 500 milyon kişinin enfekte olduğu söyleniyor ve bu da %5 ile %10 arasında değişen ölüm oranına yol açıyordu; bu, diğer influenza patojenlerinin neden olduğu hastalıklardan çok daha yüksekti.\n\nİspanyol gribinin özel bir özelliği, özellikle 20 ila 40 yaşları arasındaki gençleri etkilemesiydi; oysa influenza virüsleri genellikle küçük çocukları ve yaşlıları tehlikeye atar. Gribin 'İspanyol' olarak adlandırılmasının nedeni, 29 Haziran 1918'de İspanyol sağlık direktörü Martín Salazar'ın, Avrupa'nın geri kalanında benzer bir hastalık raporu olmadığını açıklamasıdır. 1918 Haziran sonundan itibaren uluslararası basın giderek 'İspanyol gribi' terimini kullanmaya başladı; bu, bazı savaşan hükümetler tarafından gerçek yayılımı örtbas etmek için teşvik edildi. Bu pandemi 'tüm pandemilerin anası' olarak kabul edilir."
 panum.1101.g: "Yani insanlar şimdiden İspanyol gribinden bahsediyor mu?"
 panum.1102.t: "Büyük Pandemi"
 panum.1102.d: "Birçok hastane, klinik ve doktor muayenehanesi, önce normal grip sanılan tuhaf bir hastalığın vakalarının olağanüstü derecede yüksek olduğunu bildirdi. Hasta yatakları artık dolu ve ortak alanlar boşaltılmak zorunda. En kötü korkular doğrulandı; bu, daha önce bilinmeyen bir boyutta bir pandemidir."
 panum.1102.f: "Başlangıçta doktorlar, normal bir grip salgınından söz ettiler. İlk birkaç gün basın, bunun garip bir salgın türü hastalık olduğunu, ama zararsız ve ölümsüz olduğunu iddia etti.\n\nAma durum tam tersi çıktı. Her gün grip salgını yeni bir şehre, yeni bir bölgeye ulaşıyor ve tıbbi tedavinin tamamen yeniden organize edilmesini gerektiriyor. Dün kışlada iki adam semptomlar gösterirken, bugün zaten 700 kişi etkilenmiş durumda. Hastalığın korkunç doğası, normalde çocukları ve yaşlıları öldüren bu hastalığın, 20 ile 40 yaş arasındaki gençleri öldürmesinde görülüyor. Yirmi hastadan biri gribi atlatamıyor. Nereden geldiği, nasıl yayıldığı, ne olduğu: Bu pandemi hâlâ bir gizem.\n\nAncak şimdiden ortaya çıkan, bu grip salgınının daha önce bildiğimiz normal hayatı tamamen değiştirebileceğidir. Hükümetin harekete geçmesi çağrısı giderek artıyor. [GetPlayer.GetName] buna nasıl yanıt verecek?"
 panum.1102.g: "Yani insanlar şimdiden [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripten bahsediyor mu?"
 panum.1103.t: "Pandemi Politikası"
 panum.1103.a.tt: "Sıkı önlemler ekonomiyi durduracak, ancak daha hızlı etki etme ve en azından bazı bölgelerde pandemiyi durdurma şansı daha yüksek olacak."
 panum.1103.b.tt: "Önlemler etkisini göstermesi ve etkili olması açısından çok daha uzun sürecek, ancak ekonomi daha az zarar görecek."
 panum.1103.c.tt: "Pandemi doğal seyrini sürdürüyor ve mevcut önlemler tamamen kaldırılıyor."
 panum.1104.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Gribi, [SCOPE.sState('panum_flu_fading_state').GetName] bölgesinde azalıyor"
 panum.1104.d: "[SCOPE.sState('panum_flu_fading_state').GetName] bölgesindeki kısıtlamalar ilk etkilerini göstermiş gibi görünüyor. Haftalar sonra, ölü sayısında düşüş fark ediliyor."
 panum.1104.f: "Belirli koşullar altında bir pandemi, birkaç hafta içinde bir bölgede azalabilir. Sıkı önlemler, iyi bir sağlık sistemi, birinci sınıf bir doktor veya ileri tıbbi teknikler bu sürecin başlamasına yardımcı olur."
 panum.1104.g: "Umudun bir işareti."
 panum.1105.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Gribi, [SCOPE.sState('panum_flu_disappearing_state').GetName] bölgesinde kayboluyor"
 panum.1105.d: "[SCOPE.sState('panum_flu_disappearing_state').GetName] bölgesindeki pandemi son birkaç haftadır belirgin şekilde azaldı; bu günlerde yeni vaka kaydedilmedi. Bölge tamamen gripten arındı!"
 panum.1105.f: "Bir pandeminin bir bölgeden tamamen kaybolabilmesi için öncelikle azalması gerekir. Daha sonra bazı bölgeler, gerçek pandeminin sona ermesinden önce gripten arınabilir. Sıkı önlemler, iyi bir sağlık sistemi, birinci sınıf bir doktor veya ileri tıbbi teknikler gribi ortadan kaldırmaya yardımcı olur."
 panum.1105.g: "Önlemler buna katkıda bulundu mu?"
 panum.1106.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grip Kurbanı"
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName], birkaç gün önce [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gribine yakalandı ve hastalık şiddetli bir seyir izliyor. Doktorlar en kötüsünü bekliyor."
 panum.1106.f: "'Saat 12 civarında ateşlenmeye başladım. O kadar ateşliydim ki kıyafetleri tutuşturacağımı sandım. Öyle bir öksürüğüm vardı ki bastıramadığımda iç organlarımı parçaladı. Hava karanlıktı; kesinlikle zatürree olmuştum ve hayatımda hiç bu kadar çaresiz ve rahatsız hissetmemiştim. … Sonra bir anda terleme seline kapıldım ve daha rahat olmam gerekirken daha da perişan oldum. Işık geldiğinde ise tam bir sefalet örneğiydim—acı verici öksürük olmadan nefes alamıyordum ve içimde hiç umut kalmamıştı.' -Franklin Martin, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Gripten Kurtulan"
 panum.1106.g: "Yapabileceğimiz bir şey yok."
 panum.1107.t: "Grip Raporları Savaş Karşıtı Duyguları Artırıyor"
 panum.1107.d: "[SCOPE.sState('panum_disease_state').GetName] bölgesinde [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripten kaynaklanan çok sayıda ölüm raporu, savaş çabalarımıza yönelik halk desteğini zayıflatıyor."
 panum.1107.f: "'Bu veba evlerimizi harap ederken insanları savaşa göndermek deliliktir. Devlet, vatandaşlarının hayatlarını ölümlerinden önce korumalı değil midir?'"
 panum.1107.g: "Özgür basına müdahale etmeyeceğiz."
 panum.1107.h: "Tıbbi bilim tarafından desteklenen güven verici propagandayı dağıtın."
 panum.1107.i: "Ölüm ve enfeksiyon haberlerini sansürleyin."
 panum.1108.t: "Pandemi Önlemleri Yoksulluğa Katkıda Bulunuyor"
 panum.1108.d: "Pandemi karşıtı önlemlerimiz nedeniyle çalışamayan birçok kişi, [SCOPE.sState('panum_disease_state').GetName] bölgesindeki daha yoksul vatandaşların kira ödemekte zorlanmasına yol açıyor. Yeni işsiz kalan işçiler, ev sahipleri taleplerini reddettiği için tahliye tehlikesiyle karşı karşıya."
 panum.1108.f: "'Bana fabrikanın dolu olduğunu söylediler, çalışamazmışım. Her fabrika dolu! Ev sahibi, ebedi ateşlerde yanacak olsun, bizim halimize zerre kadar aldırmıyor ve haftanın sonuna kadar kira ödememi, aksi takdirde tahliye edileceğimizi talep ediyor. Ailem kesinlikle evimizden zorla çıkarılacak.'"
 panum.1108.g: "Kira dondurma ve tahliye yasağı uygulayın."
 panum.1108.h: "Sosyal yardımları geçici olarak artırın."
 panum.1108.i: "Bunun için yapabileceğimiz bir şey yok."
 panum.1109.t: "Maske Karşıtı Birliği"
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName], pandemi önlemlerimize karşı Maske Karşıtı Birliği'ni kurdu. Politikalarımızın etkinliğini tartışıyor ve mücadele eden ekonomi için önlemleri geri çekmemizi talep ediyor."
 panum.1109.f: "'Maske tak ve hayatını kurtar! Ülkemizi şimdi karşılayan acil durum, Sağlık Bakanlığı'nın imkanlarının ötesinde. Maske takmayan herkes hastalanır. Şimdi maske takmayan kadın, erkek veya çocuk tehlikeli bir gevşektir!'"
 panum.1109.g: "Birliği görmezden gelin."
 panum.1109.h: "Veba karşıtı önlemleri terk edin."
 panum.1109.i: "Birliği tıbbi bilimle itibarsızlaştırın."
 panum.1120.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Gribi sona eriyor"
 panum.1120.d: "Artık çoğu kişi bu günün geleceğine umut etmiyordu. [GetPlayer.GetName]'in deneyimlemediği türden uzun aylardan sonra, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] grip yavaşça ülkemizden kayboluyor. Gerçekten de bu tüm pandemilerin anasıydı!"
 panum.1120.f: "'Bugün yasak kaldırıldı. Artık... maskeler yok. Her şey açık. 'Tarzan’ın Romantizmi' altı hafta önce olduğu gibi Koloseum'da (sinema) gösterimde. İzlemeyi çok isterim. Okul bu hafta açılıyor—Perşembe! Düşünebiliyor musun? Sanki Pazartesi’ye kadar bekleyemezlerdi!' -Violet Harris, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Gripten Kurtulan"
 panum.1120.g: "Umarız bir daha dönmez."
 je_panum_spanish_flu: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grip"
 je_panum_spanish_flu_reason: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] grip, 20. yüzyılın başında ortaya çıkan ve olağanüstü derecede virülent bir influenza virüsü türevi tarafından başlatılan bir influenza pandemisiydi. 20 milyon ile 50 milyon arasında can kaybına yol açtı ve tahminler dünya nüfusunun yaklaşık 1,8 milyardan 100 milyona kadar değiştiğini gösteriyor. Yaklaşık 500 milyon kişinin enfekte olduğu söyleniyor ve bu da %5 ila %10 arasında bir ölüm oranına yol açıyor; bu, diğer influenza patojenlerinden kaynaklanan hastalıklardan çok daha yüksekti.\n\n[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripin özel bir özelliği, özellikle 20-40 yaş arasındaki gençleri etkilemesiydi; oysa influenza virüsleri genellikle küçük çocuklar ve yaşlıları tehdit eder. Bu, 'tüm pandemilerin anası' olarak kabul edilir. Grip, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] sağlık direktörü, dünyanın geri kalanında benzer bir hastalık raporu olmadığını açıkladığında '[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]' olarak adlandırıldı. O zamandan itibaren uluslararası basın giderek '[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gribi' terimini kullanmaya başladı; bu, bazı hükümetler tarafından gerçek yayılımı örtbas etmek için de teşvik edildi."
