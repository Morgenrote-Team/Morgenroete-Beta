 panum.2000.t: "Tıbbi Kongre Hazırlıkları"
 panum.2000.d: "Ülkemizde bir sonraki Uluslararası Tıbbi Kongre düzenlenmeden önce, kongrenin belirli bir hastalığa mı odaklanması gerektiği sorusu gündeme geliyor."
 panum.2000.f: "Tıbbi konferanslar, ev sahibi ülke hastalığın en az bir tanımına sahipse belirli bir hastalığa odaklanabilir. Her hastalık için kongre yalnızca bir kez düzenlenebilir. Katılan hekimler ve mikrobiyologlar, araştırmalarını daha hızlı ilerletebilmeleri için ek ipuçları alır. Genel bir kongrede ise, katılan ülkeler sadece akademik ilerleme bonusu alır."
 panum.2000.g: "Bu, genel bir tıbbi konferans olacak."
 panum.2001.t: "Tıbbi Kongre"
 panum.2001.d: "Başkent, tıp uzmanlarının uluslararası toplantısı için hazırlanıyor. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] toplantılara başkanlık edecek. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2001.f: "Tıbbi konferanslar, tıbbi bilgiyi paylaşmak için mükemmel bir fırsattır. Önceden sadece bir ülkeye ait olan başarılar burada kardeşçe paylaşılır. Tıbbi konferanslar yalnızca hekimler tarafından düzenlenebilir, ancak mikrobiyoloji uzmanlığına sahip biyologlar da davet edilir ve patojenler ve aşılar alanındaki bilgilerini paylaşabilirler. Bir ülkede hem hekim hem de mikrobiyolog varsa, her ikisi de katılabilir."
 panum.2001.g: "Davetiye gönderin!"
 panum.2002.t: "Tıbbi Kongre Daveti"
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName], önde gelen tıp ülkelerini başkentinde uluslararası bir kongreye davet ediyor. Hem hekimler hem de mikrobiyologlar davetlidir. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2002.g: "Steteskop ve mikroskopları unutmayın!"
 panum.2003.t: "Tanımlar ve Tedaviler"
 panum.2003.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sCountry('panum_congress_host_country').GetName]'deki Tıbbi Kongrede çığır açıcı epidemiyolojik bilgiler edinme fırsatına sahip. Hangi hastalık odak olmalı?"
 panum.2003.f: "Kongreye katılan bir ülke, başka bir ülkenin sahip olmadığı bir hastalık tanımına veya tedavisine sahipse, bu bilgi kongrede öğrenilebilir. Bilgi yalnızca bir hastalık için geliştirilebilir. Kongrede yeni bilgi edinilemiyorsa, genel bilgi biriktirme ve tıbbi teknoloji geliştirme hâlâ mümkündür. Hekimin katılımı bunun için kritik öneme sahiptir."
 panum.2003.g: "Doktor, meslektaşlarından bazı genel tıbbi bilgiler edinmeli."
 panum.2003.h: "Kolera."
 panum.2003.i: "Tüberküloz."
 panum.2003.j: "Çiçek Hastalığı."
 panum.2003.k: "Tifüs."
