 panum.301.t: "Çiçek hastalığı [SCOPE.sState('panum_disease_state').GetName]'e yayılıyor"
 panum.301.d: "Son raporlara göre, çiçek hastalığı artık [SCOPE.sState('panum_disease_state').GetName]’de de hızla yayılıyor. Salgını durdurma çabalarımız başarısız oldu."
 panum.301.g: "Her yerde çiçek hastalığı!"
 panum.302.t: "Çiçek hastalığı [SCOPE.sCountry('panum_infected_country').GetName]'e ulaştı"
 panum.302.d: "Bugün [SCOPE.sCountry('panum_infected_country').GetName]'de ilk çiçek hastalığı vakalarının bildirildiği haberleri aldık. Yetkililer, yayılmayı önlemek için yeterince çaba göstermediğimizden bizi sorumlu tutuyor."
 panum.302.g: "Bunu kim tahmin edebilirdi ki...?"
 panum.303.t: "Çiçek hastalığı kontrol dışı"
 panum.303.d: "[SCOPE.sState('panum_disease_state').GetName]’deki sağlık sistemi çökme noktasına geldi. Doktorlar, kendilerinin de enfekte olma riski nedeniyle bölgeyi terk ediyor. Maalesef, bölgede ölüm sayısını yukarı çekmek zorundayız."
 panum.303.f: "'Hiçbir girişimde bulunulmadı, kurbanları saymak mümkün değil; üst Missouri Nehri yerlileri için verilen 17.200 sayısı ikiye katlansa, Rocky Dağları doğusundaki toplam sayı yine de fazla olmayacaktır.'"
 panum.303.g: "Bu korkunç hastalığın çaresi yok mu?"
 panum.401.t: "Tifüs [SCOPE.sState('panum_disease_state').GetName]'e yayılıyor"
 panum.401.d: "Tehlikeli tifüs, görünüşe göre başka bir eyalete de yayıldı. [SCOPE.sState('panum_disease_state').GetName]'den gelen raporlar, giderek daha fazla insanın hastalığa yakalandığını gösteriyor."
 panum.401.g: "Tifüs durdurulamaz gibi görünüyor ..."
 panum.402.t: "Ahlaki Çöküşün Hastalığı mı?"
 panum.402.d: "Tifüsün ne olduğu, neden kaynaklandığı ve nasıl etkili bir şekilde mücadele edileceği konusunda sınırlı bilgi olduğundan, enfeksiyonu neyin teşvik ettiğine dair birçok teori vardır. Yaygın görüş, bunun bulaşıcı değil, yaşam tarzıyla ilgili bir hastalık olduğudur."
 panum.402.f: "Tüberkülozda olduğu gibi, tifüsün bulaşıcı bir hastalık olmadığını varsayan birçok doktor vardı. Tüberküloz neredeyse romantize edilmiş bir şekilde görülüyordu - romantik ve 'soylu' ruhların hastalığı olarak - tifüs ise ahlaki itibarsızlığın bir damgası olarak kabul ediliyordu. Üst sınıfların etkilenmemesi, belirli bir üstünlük duygusu yaratıyordu. Orta Çağ’da hastalıklar sıklıkla ilahi etkiye veya cezaya bağlandığı gibi, karakter kusurları veya ahlaki bozulmanın da bazı hastalıklarla bağlantılı olduğu kanıtlanmış bir gerçek gibi görülüyordu. Bu görüş yalnızca 19. yüzyılın ikinci üçte birinden itibaren değişmeye başladı."
 panum.402.g: "Tifüsün öncelikle suçluları, fahişeleri ve ahlaksız askerleri etkilemesinin bir nedeni var."
 panum.402.h: "Muhtemelen bu kişilerin kim olduğu değil, nerede yaşadıkları daha önemli."
 panum.403.t: "Karantina"
 panum.403.d: "Orta ve üst sınıflar başta olmak üzere, tifüsten etkilenen alt sınıflara kendi tesislerini sağlama isteği vardır. Bu 'ateş evleri', kar amacı gütmeyen kuruluşlar tarafından da finanse edilecektir. Ancak yoksul sınıflardan bazı temsilciler bunu sağlık hizmetinden çok dışlama yöntemi olarak görmektedir. Öte yandan hükümetin bazı üyeleri, özellikle orta sınıf tarafından tamamen aşırı bir önlem olarak görülen kapsamlı bir karantina istemektedir."
 panum.403.f: "Diğer birçok salgın gibi, tifüs de ayrımcılık için kullanıldı. Genel bir karantina çağrısı, belirli kişilerin hastalığa yakalanabileceği düşüncesi nedeniyle pek çok yerde popüler değildi, özellikle de birçok kişi bunun kalıtsal olduğuna inanıyordu. Ancak enfeksiyon korkusu etkiliydi, bu yüzden birçok yerde ateş evleri kuruldu. 1847’de Kuzey Amerika’daki büyük tifüs salgını sırasında, tifüsün bulaşıcı bir hastalık olduğu fikri öylesine yayıldı ki, enfekte olan çok sayıda İrlandalı göçmen fiilen bu kurumlara gönderildi."
 panum.403.g: "Bütün bölge karantinaya alınmalı."
 panum.403.h: "Tifüs hastalarını özel evlere götürün."
 panum.403.i: "Tifüs bulaşıcı bir hastalık değildir, bu yüzden karantina mantıksız."
 panum.404.t: "Pis Barakalar"
 panum.404.d: "Giderek pislik ve sefalet dolu, aşırı kalabalık tabutlara dönüşen sözde ateş evlerindeki durum [SCOPE.sState('panum_disease_state').GetName]’de ciddi bir sorun haline geldi. Papazlar ve hasta bakıcılar, bu korkunç evlerin yıkılmasını talep eden bir mektup yazdı."
 panum.404.f: "Ateş barakaları pis ve kalabalıktı; hastalar, üst ranzadan düşen pislikle alt ranza yataklarında çift katlı yataklarda yatıyordu. Senato Komitesi raporuna göre, iki veya üç hasta bir yatağa yerleştiriliyordu, yaş veya cinsiyet fark etmeksizin. Ekmek yoktu: öğünler günde üç kez çay, lap veya et suyu ile sınırlıydı. İçme suyu taşındığı için ateş hastalarına asla yeterli gelmiyordu. Bir Katolik rahip, Rahip Moylan, 18 saat boyunca içemeyen hastalara çadırda su verdiğini bildirdi. Barakalar başlangıçta ateş hastalarını barındırmak için tasarlanmamıştı ve havalandırmaları yoktu; yeni barakalar tuvaletsiz inşa edildi. Senato Komitesi, personel ve alan eksikliği nedeniyle hastaların günlerce kendi dışkılarında yattığını ve gece ölenleri almak için yeterli personel olmadığını belirtti."
 panum.404.g: "Daha fazla kişinin enfekte olmasını göze alamayız."
 panum.404.h: "Tifüs hastalarının durumunu iyileştirin ve tıbbi yardım sağlayın."
 panum.404.i: "Bu insanlık dışı evleri yıkın!"
 panum.405.t: "Ateş Barakalarına Karşı Ayaklanmalar"
 panum.405.d: "[SCOPE.sState('panum_disease_state').GetName]’de tifüsün yayılma korkusu bazı vatandaşları öylesine radikalleştirdi ki, öfkeli bir kalabalık oluşturdu. Barakaları ve içindeki hastaları en yakın nehre itmek istediklerine dair bir söylenti dolaşıyor!"
 panum.405.f: "1847’de Montreal’de baraka sayısı 22’ye çıkacak ve hastaların kaçamaması için birlikler bölgeyi ablukaya alacaktı. Bir kalabalık ateş barakalarını nehre atmakla tehdit edince, Montreal belediye başkanı John Easton Mills isyanı bastırdı ve hastalara su verdi, yatakları değiştirdi. Kasım ayında, bir yıldan az görev yaptıktan sonra öldü."
 panum.405.g: "Bu barbarlığa ülkemizde yer yok!"
 panum.405.h: "Ölecekler, fark etmez."
 panum.406.t: "Gömülmemiş Cesetler"
 panum.406.d: "[SCOPE.sState('panum_disease_state').GetName]’deki ölü sayısı o kadar hızlı artıyor ki, cenaze görevlileri sayıyı yetiştiremiyor. Gömülmemiş cesetlerin daha büyük sorunlara yol açma riski var."
 panum.406.f: "1860’larda olağanüstü sert hava koşulları ve mahsul kayıpları, o zamanlar Finlandiya Büyük Dükalığı’nda kıtlığa ve salgın hastalıklara yol açtı. 1866–68 yıllarında açlık ve o dönemde tifüs olarak düşünülen hastalık bölgedeki 270.000 kişiyi öldürdü."
 panum.406.g: "Bu sorunun kontrolden çıkmasını önlemek için tüm mevcut araçları kullanın."
 panum.406.h: "Alışılmış toplu mezarları kazın."
 panum.406.i: "Kapasitelerimiz tükendi, işleri kendiniz düzenlemek zorundasınız!"
 panum.407.t: "Kışlalarda Tifüs"
 panum.407.d: "Tifüs şu anda öncelikle [SCOPE.sState('panum_disease_state').GetName]’in askeri tesislerini etkiliyor. Orada ölümcül etkisini gösteriyor."
 panum.407.f: "Pek çok tarihçi, Napolyon'un askerleri arasındaki tifüs salgınının, onun Rusya’daki seferini durdurmasının asıl nedeni olduğunu düşünüyor; açlık veya soğuk değil. Tifüs, Amerikan İç Savaşı sırasında da önemli bir ölüm sebebiydi; ancak ABD İç Savaşı 'kamp ateşi' vakalarının çoğuna tifo ateşi neden oldu. Kırım Savaşı (1853-1856) sırasında tifüs ateşine 900.000 kadar ölüm atfedilmiştir. Tifüs, I. Dünya Savaşı öncesinde Polonya ve birkaç komşu ülkede endemikti, ancak savaş sırasında salgın haline geldi. Tifüs, Doğu Cephesi ordularını harap etti; sadece Sırbistan’da 150.000'den fazla kişi öldü. Ölüm oranı enfekte olanların genellikle %10 ila %40’ı arasında değişiyor ve hastalara bakanlar için de başlıca ölüm sebebiydi."
 panum.407.g: "Görünmez, ordulardan daha ölümcül bir düşman..."
 panum.408.t: "Hastalıkta İşkence, Savaşta Değil"
 panum.408.d: "Kışlalarımızdaki tifüs salgını her gün yayılmaya devam ediyor. Artık askerler, [SCOPE.sState('panum_disease_state').GetName]’de en sık ölenler arasında - ve düşman etkisi olmadan."
 panum.408.f: "'Savaş bir macera değildir. Bir hastalıktır. Tifüs gibi.' Antoine de Saint-Exupéry"
 panum.408.g: "Korkunç!"
 panum.501.t: "Sarı Humma [SCOPE.sState('panum_disease_state').GetName]’e yayılıyor"
 panum.501.d: "Yeni sarı humma vakaları, en kötü korkularımızı doğruladı. Hastalık artık [SCOPE.sState('panum_disease_state').GetName]’de de yayılıyor!"
 panum.501.g: "Bunu durdurmak neden mümkün olmadı?"
 panum.502.t: "Bulaşıcı bir hastalık mı?"
 panum.502.d: "Sarı hummanın bulaşıcı bir hastalık mı olduğu yoksa başka nedenleri mi olduğu kesin olmasa da, birçok tedbir meraklısı vatandaş, yayılmayı durdurmak için karantina çağrısı yapıyor. Bunu yapmazsak, ilgisizlik veya dikkatsizlik olarak algılanabilir."
 panum.502.f: "17. yüzyıldaki sarı humma salgınları panik ve kafa karışıklığına yol açtı. 18. yüzyılda bile insanlar enfeksiyonu neyin tetiklediği konusunda büyük ölçüde anlaşamıyordu. Hükümetler ve bireyler katı önlemler veya önlem almaya başvurdu, ancak başarılı olamadılar. Sarı humma korkusu, halkın hoşnutsuzluğunu artırmamak için bazen deneysel veya sert önlemlerle, yayılmayı önlemek için hiçbir fırsatın kaçırılmamasına yol açtı. Bazı eylemler bu nedenle tıbbi değil psikolojik nedenlere dayanabiliyordu."
 panum.502.g: "Bunun bulaşıcı bir hastalık olduğuna dair bir kanıt yok."
 panum.503.t: "Sarı Humma Plantasyonları Etkiliyor"
 panum.503.d: "Günlük olarak, [SCOPE.sState('panum_disease_state').GetName]’deki plantasyonlarda sarı humma vakalarının yüksek olduğu bildiriliyor. Bazı hükümet danışmanları, yayılmayı azaltmak için oradaki çalışmaları tamamen durdurmayı savunuyor."
 panum.503.f: "'Yoksul bir siyahi, Sampson adında, sürekli olarak sıkıntı ve yardımsızlık olan evleri dolaşırdı, hiçbir ücret veya ödül almadan. Hastalığa yakalandı ve öldü. Ölümünden sonra, hizmet ettiği aileler tarafından ihmal edildi. Yoksul bir siyahi dul, Sarah Bass, birkaç aileye elinden gelen tüm yardımı yaptı; hiçbir şey almadı ve kendisine bir şey teklif edildiğinde, hizmet ettiği kişilere bırakıyordu.' -Richard Allen"
 panum.503.g: "İşçileri tarlalardan çıkarın!"
 panum.503.h: "Plantasyon her ne pahasına olursa olsun çalışmaya devam etmeli!"
 panum.504.t: "Tahliye"
 panum.504.d: "[SCOPE.sState('panum_disease_state').GetName]’de sağlık durumu kötüleşmeye devam ediyor. Yerel yönetim ve idare üyeleri, şehri terk edip yönetimi kırsaldan organize etmek için izin istedi. Bazıları bunu akıllıca bir öneri, bazıları ise saf korkaklık olarak görüyor."
 panum.504.f: "1793 Philadelphia Sarı Humma salgını sırasında, 1 Ağustos - 9 Kasım arasında ölüm kayıtlarına 5.000 veya daha fazla kişi kaydedildi. Bunların büyük çoğunluğu sarı hummadan öldü; 50.000 kişilik şehirde salgın, ABD tarihinin en şiddetlilerinden biri oldu. Eylül sonunda, 20.000 kişi şehirden kaçtı; bunlar arasında federal hükümetin kongre ve yürütme yetkilileri de vardı. Çoğu, salgın sona erene kadar geri dönmedi. Başkan George Washington şehri terk edip Mount Vernon mülküne gitti. Ölüm oranı Ekim’de zirveye ulaştı, don, sivrisinekleri öldürerek salgına son verdi. Bazı komşu kasabalar, Philadelphia’dan gelen mültecilerin hummayı taşıdığı korkusuyla onları kabul etmedi. Baltimore ve New York gibi büyük liman şehirlerinde Philadelphia’dan gelen mülteciler ve mallar karantinaya alındı, ancak New York Philadelphia’ya mali yardım gönderdi."
 panum.504.g: "Yetkilileri tahliye edin."
 panum.504.h: "Yerel yönetim çökmemeli."
 panum.505.t: "Sarı Humma Kışlalara Yayılıyor"
 panum.505.d: "Sarı humma şu anda öncelikle [SCOPE.sState('panum_disease_state').GetName]’in askeri tesislerini etkiliyor. Orada ölümcül etkisini gösteriyor."
 panum.505.f: "18. ve 19. yüzyılın sonunda Haiti’deki isyancılar ve yaklaşık 100 yıl sonra Küba’da, sarı humma, Avrupa’dan gönderilen sömürge ordularına karşı büyük bir müttefikti. Küba bağımsızlık mücadelesinin lideri, 'yenilmez generallerim Haziran, Temmuz, Ağustos' dedi - yağmurların ve sivrisineklerin geldiği aylar. İngilizler, 1741 Cartagena kuşatması sırasında benzer deneyimler yaşadı. 29.000 İngiliz asker kaleyi kuşattı. Yağmurlar başladığında, 22.000 kişi birkaç hafta içinde felaketle öldü. Jamaika’daki İngiliz garnizonlarındaki ölüm oranı Kanada’dakilerin yedi katıydı; bunun çoğu sarı humma ve diğer tropikal hastalıklar yüzündendi."
 panum.505.g: "Hayır! Onlar savaş alanında onurlu bir ölüm için kaderlerini yaşıyorlardı!"
 panum.506.t: "Denizcinin Hastalığı"
 panum.506.d: "[SCOPE.sState('panum_disease_state').GetName] liman operasyonları, sarı humma nedeniyle neredeyse tamamen durmuş durumda. Bir yandan birçok isçi ve denizci hasta. Öte yandan, mümkün olduğunca çok gemi lanetli bölgeden uzak durmaya çalışıyor."
 panum.506.f: "'En üzücü yıkım New Orleans’ta sarı humma tarafından yaratılıyor. Binlerce kişi bu felaketten ötürü yaşamını yitirdi ve her gün korkunç kayıtlara 200 kişi daha ekleniyor. Ölüler, saatte bir guinea ücretle kiralanan siyahi zincir işçileri tarafından hendeklere gömülüyor. Ve böylece, mezar kazıcıların şarkıları ve müstehcen şakaları, sineklerin vızıltısı, şeker satan kadınların tekdüze bağırışları, ölü arabalarını süren adamların boğuk küfürleri, çocukların neşeli ıslıkları ve onlarca kararmış cesedin boğucu kokusu eşliğinde gün ilerliyor, defin işleri tamamlanıyor ve gece perdeyi çekiyor. Bu arada eğlenceler, regattalar, balolar vs. her zamanki gibi devam ediyor; sanki lanetli şehirde böyle korkunç bir salgın yokmuş gibi.' -Cambridge Weekly News, 1853"
 panum.506.g: "Deniz taşımacılığında çöküş!"
 panum.507.t: "Kara Kusmuk"
 panum.507.d: "[SCOPE.sState('panum_disease_state').GetName]’de sarı humma beklenenden daha şiddetli bir şekilde etkisini gösteriyor. Doktorlar, hastalıktan önceki dönemlere göre daha fazla kişinin öldüğünü rapor ediyor."
 panum.507.f: "'Dışarı çıkanlar, burunlarına kamfor sirkesi emdirilmiş mendil veya sünger, ya da hırsız sirkesi dolu kokulu şişeler taşıyorlardı. Bazıları ellerinde veya ceplerinde ziftli ip parçaları ya da boyunlarına bağlı kamfor torbaları taşıyordu… Cenaze arabasını gördüklerinde insanlar aceleyle yön değiştiriyordu. Birçok kişi kaldırımda yürümüyordu, ölenlerin bulunduğu evlerin önünden geçerken enfekte olmamak için sokak ortasında gidiyordu. Tanıdıklar ve arkadaşlar sokaklarda birbirlerinden kaçınıyor, sadece soğuk bir baş selamı ile ilgilerini gösteriyorlardı. Eski el sıkışma geleneği o kadar terk edilmişti ki, birçok kişi el uzatmaya bile korkarak geri çekiliyordu. Yas kıyafeti giymiş veya yas belirtisi taşıyan bir kişi, adeta bir engerek gibi kaçınılıyordu.' -Mathew Carey"
 panum.507.g: "Bu salgından ne zaman kurtulacağız?"
