 panum.2007.t: "Tıbbi Buluşlar"
 panum.2007.d: "Kongrede, tıbbi yeniliklerde başarılı olan uzmanların olduğu söylendi. Bilgilerini paylaşmaya hazırlar."
 panum.2007.f: "Transplantlar, röntgen gelişimi veya kemoterapi gibi benzersiz tıp yenilikleri insanlık için o kadar önemlidir ki mucitler bilgiyi çekinmeden paylaşırlar. Nihayetinde, tüm insanların refahı söz konusudur."
 panum.2007.g: "İnsanlığa şerefe!"
 panum.2205.t: "Hayvan Deneyleri"
 panum.2205.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], belirli bir merhametsiz bilim insanı olarak kabul ediliyor. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]'nin 'bilim uğruna' öldürdüğü hayvanların sayısının üç haneli olduğu söyleniyor. Yine de, bu deneylerin başarıları var."
 panum.2205.f: "Tıbbın yararı için hayvan deneyleri antik çağlardan beri var olsa da, 19. yüzyılda daha önce bilinmeyen ölçekte gerçekleşmeye başladı. Özellikle mikrop teorisinin keşfi sırasında ve sonrasında, hayvanlar bilinçli olarak patojenlerle defalarca enfekte edilerek adeta yeni ilaçların 'denekleri' haline getirildi. Bu dönemde üniversitelerde öğrencilere yönelik hayvan deneyleri ve vivisektiyon yaygın olarak uygulandı."
 panum.2205.g: "Doktor, istediği gibi özgürdür, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]."
 panum.2205.h: "Öğrenciler hayvanları nasıl diseke edeceklerini öğrenmelidir."
 panum.2205.i: "Bu açıkça çok ileri gidiyor."
 panum.2411.t: "Aspirin"
 panum.2411.d: "Kimyagerimiz Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], eczacılıkta devrim yaratabilecek gerçek bir tıbbi mucize icat etti: Aspirin. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ağrı kesici etkilerini doğruladı."
 panum.2411.f: "Salisilik asit antik çağlardan beri tıbbi olarak kullanılmıştır. Söğüt ağacı ve diğer salisilat bakımından zengin bitkilerden yapılan ilaçlar, antik Sümer'in kil tabletlerinde ve antik Mısır'dan Ebers Papirüsü'nde görülür. Hipokrat M.Ö. 400 civarında ateşi düşürmek için salisilik çay kullanımından bahsetmiştir. Salisilat bakımından zengin bitkiler, klasik antik dönemde ve Orta Çağ'da Batı tıbbının farmakopesinin bir parçasıydı. Söğüt kabuğu özütü, 18. yüzyıl ortalarında ateş, ağrı ve iltihap üzerindeki özel etkileriyle tanındı. 19. yüzyılda eczacılar, söğüt özütünün aktif bileşeni salisin ile ilişkili çeşitli kimyasallarla deneyler yaptı ve reçeteledi. 1853'te kimyager Charles Frédéric Gerhardt, asetil klorürü sodyum salisilat ile işleyerek ilk kez asetilsalisilik asidi üretti. 1897'de Bayer ilaç ve boya fabrikalarındaki bilim insanları, asetilsalisilik asidi, mideyi daha az tahriş eden bir standart salisilat ilacının yerine kullanmak için çalıştı ve saf olmayan maddeler olmadan yeni bir sentetik yol geliştirdi. 1899 yılına gelindiğinde, Bayer buna aspirin adını verdi ve dünya çapında satmaya başladı."
 panum.2411.g: "Bu ilaç, gelecekteki tıbbi araştırmaların başlangıç noktası olacak."
 panum.2411.h: "Kimya daha spektaküler keşiflerin yolunu açacak."
 panum.2411.i: "İlaç endüstrisi bundan fayda sağlayacak."
 panum.2412.t: "Röntgen"
 panum.2412.d: "Fizikçimiz Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName], daha önce bilinmeyen ışınları keşfetti: vücuda ışık tutmak için kullanılabilecek bu ışınlar Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tarafından tıp alanında potansiyeli vurgulandı."
 panum.2412.f: "Röntgen ışınları, yaklaşık 100 eV üzerindeki kuantum enerjilerine sahip elektromanyetik dalgalardır ve dalga boyları yaklaşık 10 nm altındadır. Röntgen ışınları elektromanyetik spektrumda ultraviyole ışık üstü enerji aralığındadır. 1895'te Alman bilim insanı Wilhelm Conrad Röntgen tarafından keşfedilmiş ve X-ışını olarak adlandırılmıştır. Röntgen ışınları, inşaat malzemeleri ve canlı doku gibi birçok katı maddeyi geçebilir; bu nedenle tıbbi tanılarda (ör. kırık kontrolü) ve malzeme biliminde (ör. bazı kimyasal elementlerin tanımlanması ve yapı malzemelerindeki zayıf noktaların tespiti) yaygın olarak kullanılır."
 panum.2412.g: "Ürkütücü - sanki kendi ölümünü görmek gibi."
 panum.2413.t: "Kan Grupları"
 panum.2413.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName], insan kanının bazen karışmasının, bazen ise pıhtılaşmasının sebebini açıklayan şaşırtıcı bir keşif yaptı: farklı kan grupları vardır. Bu, kan bağışı ve nakilleri için kritik bir buluştur."
 panum.2413.f: "'Yakın zamanda gözlemledim ve belirttim ki, normal insanların serumları, diğer sağlıklı bireylerin kırmızı hücrelerini kümelendirebilir... Genel olarak ifade edildiği gibi, en az iki farklı aglütinin türü vardır; biri A, diğeri B, her ikisi birlikte C. Hücreler kendi serumlarındaki aglütininlere doğal olarak duyarsızdır.' - Karl Landsteiner"
 panum.2413.g: "Kan grupları araştırması teşvik edilmelidir."
 panum.2413.h: "Klinik, kan gruplarını toplamalı ve kan nakilleri için saklamalıdır."
 panum.2414.t: "Elektrokardiyografi"
 panum.2414.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName], kalp kası liflerinin elektriksel aktivitesini kaydeden inanılmaz bir cihaz icat etti. Cihaza elektrokardiyograf - EKG adını verdi."
 panum.2414.f: "1843'te Carlo Matteucci, güvercin kalpleri üzerinde deneyler yaparak kalp aktivitesinin elektriksel süreçlere dayandığını fark etti. 1882'de fizyolog Augustus Desiré Waller, köpeği Jimmy üzerinde ilk EKG'yi yaptı ve dört patisini iletken sodyum klorür çözeltisine batırdı. 1887'de kapiler elektrometre ile kalp akımlarını ilk kez kaydedebildi. 1895'te geliştirdiği tel galvanometreye dayanarak Willem Einthoven, 1903'te EKG'yi kullanışlı bir tanı prosedürü haline getirdi ve kliniğe tanıttı. Bugün hâlâ kullanılan terminolojiyi o getirdi."
 panum.2414.g: "Bu cihaz her hastanede olmalı."
 panum.2415.t: "İlk Transplantasyon"
 panum.2415.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]'nin cerrahi yeteneği ülke çapında biliniyor, ancak yakın zamanda uzmanları şaşırtan cesur bir prosedür gerçekleştirdi: Genç bir adamın deri altına ve karın boşluğuna insan tiroid dokusu nakletti."
 panum.2415.f: "Modern anlamda ilk transplantasyon - organ fonksiyonunu yerine getirmek için doku implantasyonu - 1883'te bir tiroid nakli ile gerçekleştirildi. Bu operasyon, İsviçreli cerrah ve sonraki Nobel ödüllü Theodor Kocher tarafından yapıldı. Önceki on yıllarda Kocher, guatr vakalarında fazla tiroid dokusunu kaldırma işlemini o kadar mükemmelleştirmişti ki, tüm organı alabilmesine rağmen kişi operasyon sırasında yaşamını kaybetmiyordu. Kocher bazı vakalarda, tekrar eden guatrı önlemek amacıyla organın tamamını çıkardı. Sonraki yıllarda Kocher ve diğer cerrahlar, spontan olarak ortaya çıkan tiroid eksikliklerini tedavi etmek için tiroid naklini de kullandılar. Tiroid nakli, tümüyle yeni bir terapötik stratejinin modeli haline geldi: organ transplantasyonu."
 panum.2415.g: "Ve insanlar Frankenstein'ın sadece bir korku romanı olduğunu sanıyordu!"
 panum.2416.t: "Stereotaktik Yöntem"
 panum.2416.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]'nin cerrahi dehası sınır tanımıyor: doktor, yeni bir beyin ameliyatı ile beyin cerrahisinde devrim yarattı."
 panum.2416.f: "Stereotaktik beyin cerrahisi, hastanın başı ve cerrahi aletlerin sıkıca sabitlendiği minimal invaziv cerrahi ve radyoterapi prosedürlerini ifade eder ve maksimum doğruluk sağlar. 19. yüzyılın son yıllarında, o dönemde stereotaksi olarak bilinen yöntemle izole operasyonlar ilk kez uygulanmıştır. Operasyon sırasında hastanın vücudu, özellikle başı, güvenilir bir şekilde sert bir çerçeve sistemine sıkıca sabitlenmiştir. Araştırma merakı ve psikiyatrik cerrahi bağlamında yapılan testler o zamanlar hâlâ sınırlı ve basitti. Sonraki on yıllarda aletler ve yöntemler geliştirilmiştir."
 panum.2416.g: "Harika!"
 panum.2417.t: "Kardiyopulmoner Bypass"
 panum.2417.d: "Kardiyopulmoner bypassın geliştirilmesiyle, Doktor Hasenbein modern tıbbın bir başyapıtını başardı. İnsanlar kalp ameliyatı yapabilecek hale gelmek üzere."
 panum.2417.f: "Kardiyopulmoner bypass sırasında kan, kanül ve tüp sistemi aracılığıyla vücuttan çıkarılır, oksijenle zenginleştirilir ve tekrar pompalanır. Buna ekstrakorporeal dolaşım denir. Kanın yolu genellikle vena kava veya sağ atriyumdan, cerrahi alandaki kalp odaları ve açılmış koroner arterlerden geçer ve filtrasyon, oksijen zenginleştirme, karbondioksit giderimi, ısıtma ve ek filtrasyon sonrası ana arter veya femoral arter yoluyla geri döner. Fransız fizyolog Le Gallois 1812'de ekstrakorporeal dolaşım fikrini yayımladı. 1885'te Maximilian von Frey ve meslektaşı Max von Gruber, Leipzig Üniversitesi'nde günümüz kalp-akciğer makinelerinin öncüsünü, film oksijenatörü ve piston pompa ile kapalı ekstrakorporeal sistemde kan dolaşımını ilk kez kullanmak için inşa ettiler."
 panum.2417.g: "Modern kalp cerrahisinin doğuşu!"
 panum.2418.t: "Endoskop"
 panum.2418.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]'nin yeni buluşu, vücudun içini görmeye yarayacak, tıbbi muayenede paha biçilmez bir hizmet sunabilir!"
 panum.2418.f: "Endoskop, organizmaların veya teknik boşlukların içini incelemek ve manipüle etmek için kullanılan bir cihazdır. Endoskop kullanımı, endoskopi olarak bilinir ve başlangıçta insan tıbbı tanısı için geliştirilmiştir. Thomas Edison'un icadından sonra, elektrik ışığının kullanımı endoskopun geliştirilmesinde önemli bir adım olmuştur. İlk ışıklar dışarıdan sağlanıyordu, ancak 1865'te Dublin, İrlanda'daki Mater Misericordiae Hastanesinde Sir Francis Cruise tarafından rutin olarak yapılan sistoskopi, histeroskopi, sigmoidoskopi ve burun (daha sonra torasik) boşlukların muayenesine yeterli ışık sağlayabiliyordu."
 panum.2418.g: "Kullanışlı bir tıbbi cihaz."
 panum.2419.t: "Oftalmoskop"
 panum.2419.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName], göz hastalıklarını incelemeyi kolaylaştıran bir cihaz icat etti ve oftalmolojiye paha biçilmez bir hizmet sundu."
 panum.2419.f: "Oftalmoskopi, gözün görünür kısımlarının bir oftalmoskop kullanılarak incelenmesidir. Özellikle retina ve kan damarları gözlemlenebilir. 1850'de icat edilen oftalmoskop, ilk kez mucidi Hermann von Helmholtz tarafından 1851 Ekim başında tanımlanmıştır. Oftalmoskop, optik sinir, retina, koroid ve vitreus hastalıklarını tespit etmek için kullanılabilir. Bu, oftalmolojinin bağımsız bir tıbbi ve bilimsel disiplin olarak tarihinin başlangıcını işaret eder. Sonrasında, oftalmoskop dahili hastalıkların tanısında giderek önem kazanmıştır."
 panum.2419.g: "İlginç bir tıbbi cihaz."
 panum.2420.t: "Kemoterapi"
 panum.2420.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]'nin test ettiği yeni bir tıbbi prosedür, birçok hasta için umut ışığı olabilir - kanser tamamen tedavi edilemese de, en azından kısmen tedavi edilebilir."
 panum.2420.f: "Kemoterapi, kanser veya enfeksiyonlar için uygulanan bir ilaç tedavisidir. Paul Ehrlich, kimyasal maddelerin patojene doğrudan etki ederek enfeksiyon hastalıklarını tedavi etmesini tanımlamak için kemoterapiyi kullandı. 1904'te, uyku hastalığına yakalanmış fareleri tedavi etmek için kullandığı ilk etkili kemoterapi ilacı olan trypan red'i keşfetti. Ehrlich, 31 Ağustos 1909'da Frankfurt am Main'de sıçanlara frengi patojenleri enjekte ederek ve ardından kemoterapötik prosedürlerle tedavi ederek deneylerine devam etti. Bu deneyler öylesine ikna ediciydi ki, tıbbın enfeksiyon hastalıklarına karşı yeni 'silahı' olarak görüldü. Ehrlich daha sonra 'kemoterapinin yaratıcısı' olarak anıldı. Kullanılan ilaçlar ya yapay olarak üretilir ya da doğal maddelerin türevleridir."
 panum.2420.g: "Acaba bu, kanser hastalarının çektiği acılara bir yanıt olabilir mi?"
 panum.2100.t: "Doktor Alımı"
 panum.2100.d: "Genel Hastane'deki en umut verici doktorlardan biri [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] yeni başhekim olmak için mükemmel bir aday olabilir. [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U] uzmanlık alanı..."
 panum.2100.f: "$concept_panum_physician_desc$\n\n#V yeni#! Doktor, [SCOPE.sCharacter('panum_new_physician_scope').GetFullName], #tooltip:[SCOPE.sCharacter('panum_new_physician_scope').GetTooltipTag],panum_physician_rating_tt_loc [SCOPE.sCharacter('panum_new_physician_scope').GetCustom('panum_physician_rating_new_physician_icon_text_type')]#! bir Doktor.[GetPlayer.GetCustom('panum_physician_rating_display_existing_physician_type')]"
 panum.2100.g: "Epidemiyoloji."
 panum.2100.h: "Cerrahi."
