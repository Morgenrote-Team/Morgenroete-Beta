 je_panum_measles: "Kızamık Salgını"
 je_panum_measles_reason: "Kızamık, tipik kırmızı deri lekeleriyle bilinen son derece bulaşıcı bir hastalıktır. Özellikle önceden bağışıklığı olmayan popülasyonlarda yıkıcı sonuçlar doğurabilir. Üst bölgesel bir hastalık olarak, kızamık diğer bölgelere yayılabilir.\n\n#ORANGE Antibiyotikler#!'in icadı, kızamıkla mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Kızamık Tedavisi#! bulabilir. Sadece çok iyi bir sağlık sistemi yardımcı olur. Tüm bunlar, hastalığın önlenmesini ve tedavisini geliştirir.\n\nNe yazık ki, #V Kızamık Aşısı#! icadı Viktorya dönemi çerçevesinin dışında kalmaktadır."
 je_panum_scarlet: "Kızıl Salgını"
 je_panum_scarlet_reason: "Kızıl, yaygın bir hastalıktır ve 20. yüzyılın başına kadar çocuk ölümlerinin en yaygın nedenlerinden biri olmuştur.\n\n#ORANGE Antitoksinler#!'in icadı, kızıl ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Kızıl Tedavisi#! bulabilir. İyi bir sağlık sistemi yardımcı olur. Tüm bunlar, hastalığın önlenmesini ve tedavisini geliştirir.\n\n#V Kızıl Aşısı#! geliştirmek bir [concept_theiler_biologist] için mümkündür, ancak oldukça zordur."
 je_panum_plague: "Veba Salgını"
 je_panum_plague_reason: "Bubonik veba, Orta Çağ'daki 'Kara Ölüm' ile eşleştirilir ve tarihin en kötü felaketlerinden biridir. 19. yüzyılın sonunda tekrar ortaya çıkana kadar ortadan kaybolduğu düşünülüyordu. Düşük gelirli ve zayıf sağlık sistemine sahip ülkelerde veba, birden çok bölgeye yayılabilir.\n\n#ORANGE Antitoksinler#!'in icadı, veba ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Veba Tedavisi#! bulabilir. Zaten ilkel bir sağlık sistemi yardımcı olacaktır. Tüm bunlar, hastalığın önlenmesini ve tedavisini geliştirir.\n\nVebayı tamamen yenmek için, bir [concept_theiler_biologist] tarafından geliştirilen #V Veba Aşısı#! gereklidir."
 je_panum_diphteria: "Difteri Salgını"
 je_panum_diphteria_reason: "Difteri, hayatı tehdit eden komplikasyonlara ve uzun vadeli sonuçlara yol açabilen tehlikeli bir hastalıktır. Çocuk ölümleri ve solunum problemleri nedeniyle, difteri 'çocukların boğan meleği' olarak anılır. Etkileri lokalizedir.\n\n#ORANGE Antitoksinler#!'in icadı, difteri ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Difteri Tedavisi#! bulabilir. Sadece iyi bir sağlık sistemi yardımcı olur. Tüm bunlar, hastalığın önlenmesini ve tedavisini geliştirir.\n\nDifteriye karşı kalıcı bir çözüm için, bir [concept_theiler_biologist] tarafından geliştirilen #V Difteri Aşısı#! gereklidir."
 je_panum_polio: "Polio"
 je_panum_polio_reason: "Poliomiyelit, öncelikle çocukları etkileyen bir hastalıktır ve sıklıkla ölüm veya ömür boyu fiziksel komplikasyonlara yol açar. Geçmişte yalnızca ara sıra görülürken, 19. yüzyılda endemik hale gelmiştir. Polio, meydana geldiği eyaletin ötesine yayılmaz.\n\n#ORANGE Antitoksinler#!'in icadı, polio ile mücadelede özel bir öneme sahiptir. Bu teknoloji ile bir [concept_panum_physician], #V Polio Tedavisi#! bulabilir. Sadece iyi bir sağlık sistemi yardımcı olur. Tüm bunlar, hastalığın önlenmesini ve tedavisini geliştirir.\n\nNe yazık ki, #V Polio Aşısı#! icadı Viktorya dönemi çerçevesinin dışında kalmaktadır."
