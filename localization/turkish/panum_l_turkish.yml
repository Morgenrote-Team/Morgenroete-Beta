 panum_character_treatment_opium_addiction_loc: "#V $opium_addiction$#!"
 panum_character_treatment_fatal_fallback_loc: "\"Kim düşünürdü ki, o damarı kesmek hastayı öldürecekti?\""
 panum_character_treatment_fatal_tripple_death_loc: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastasını tedavi etmek için hızlı bir ameliyat planladı. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ameliyatı biraz 2 dakikadan fazla bir sürede yapabildi, ancak bir asistandan parmakları kesti - ve bu kişi daha sonra enfeksiyondan öldü. Maalesef hasta da daha sonra enfeksiyondan hayatını kaybetti. Ek olarak, yanlışlıkla ceketi kesilen bir seyirci, hayati organlarının zarar gördüğünü düşündüğü için çöktü ve daha sonra şoktan öldüğü belirlendi."
 panum_character_treatment_fatal_unwashed_hands_loc: "Ameliyat mükemmeldi. Hasta hayattaydı, tüm sorunlar çözüldü ve herkes iyileşmenin hızlı olacağını düşündü. Ancak birkaç gün sonra, hızla yayılan bir enfeksiyon tespit edildi. Sadece birkaç saat içinde hasta öldü. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bunun nasıl olabileceğini anlamakta çok şaşırdı; çünkü [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] önceki ameliyattan sadece birkaç dakika sonra bıçağı değiştirmişti."
 panum_character_treatment_fatal_forgotten_snack_loc: "Hastanın ölümünden sonra otopsi yapıldı. Hastanın içinde, herkesin şaşkınlığına göre, yarım yenmiş bir sandviç bulundu. Bunun nasıl oraya geldiğini kimse bilmiyordu, ta ki bir asistan, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in ameliyat sırasında sandviç yediğini hatırlayana kadar."
 panum_character_treatment_fatal_blood_loss_loc: "İlk başta ameliyat iyi gitti. Görünüşe göre Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hastayı başarılı bir şekilde tedavi edebildi. Ancak hasta hiçbir zaman iyileşmedi. Görünüşe göre kaybedilen kan miktarı çok fazlaydı, bu da hastayı çok zayıf bıraktı ve 3 gün sonra ölüme yol açtı."
 panum_character_treatment_fatal_morphine_overdose_loc: "Ameliyat iyi gidiyor gibi görünüyordu, Morfin kullanımı sayesinde hasta işlem sırasında hiç acı hissetmedi. Ne yazık ki, morfin miktarı çok fazlaydı ve hasta artık hiçbir acıyı hissetmeden öldü."
 panum_character_treatment_fatal_drunken_doctor_loc: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in ameliyat sırasında tıbbi alkol içmeye başlaması herkesin kafasını karıştırdı. Ayrıca [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] yanlış yerlere kesmeye başladı, asistanlara bağırdı ve sonunda büyük bir atardamarı kesti. Ne yazık ki, başka bir doktor yardım etse bile hasta kurtarılamadı."
 panum_character_treatment_fatal_forgotten_instruments_loc: "Başarılı bir ameliyattan sonra Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in hastası iyiye görünüyordu. Ancak sadece bir gün sonra hasta öldü. Yapılan otopside, bir bistüri unutulmuş olarak bulundu. Hasta tekrar hareket edince, bistüri dokuları ve kan damarlarını kesmeye başladı ve iç kanamaya yol açtı."
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Çok başarılı geçen bir ameliyat maalesef korkunç bir sonla bitti. Hasta anesteziden hiç uyanmadı. Kimse bunun nedenini bilmiyor ama Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastanın vücudunun zaten çok zayıf olduğunu varsayıyor."
 panum_character_treatment_fatal_fake_doctor_loc: "Başta ameliyat oldukça iyi geçmiş gibi görünüyordu. Doktor odadan ayrıldıktan kısa süre sonra durum kötüye gitmeye başladı. Aniden Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] odaya girdi ve [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]'nin geç geldiği için üzgün olduğunu söyledi. Herkes şaşkındı çünkü ameliyatı yeni bitirmişti. Görünüşe göre rastgele biri, doktor gibi davranıp ameliyatı gerçekleştirmişti. Maalesef sonunda hasta öldü ve ölümden kimin sorumlu olduğu bilinmiyor."
 panum_character_treatment_fatal_slippery_floor_loc: "Ameliyat harika gidiyordu ta ki Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in ayağı yerdeki bir kan birikintisine değene kadar. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] kaydı ve doğrudan hastanın üzerine düştü. Maalesef bistüri hastanın kalbini deldi ve bu, hastanın ölümüne sebep oldu."
 panum.242.t: "Kalabalığın Ölümü"
 panum.242.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tüberkülozun yoğun nüfuslu bölgelerde sürekli görüldüğünü, seyrek nüfuslu bölgelerde ise nadiren ortaya çıktığını fark etti."
 panum.242.f: "'Tüberkülozun tedavisinde iklim sağlığı kürlerini öneren bazı makalelere yakından baktım. Bir makale öyle ikna edici değildi ki, sanırım meslektaşım korelasyonu nedensellik sanmış. İnsanların dağlarda daha sağlıklı olduğunu ve dolayısıyla tüberküloza yakalanmadığını varsayıyor. Ama aslında gözlemleyebileceğimiz şey, tüberkülozun dağlarda nadir görülmesinin nedeni insanların az olması değil mi? Bu, güney Avrupa yorumunu destekliyor: Biz burada miasmadan ziyade contagium ile uğraşıyoruz. Sonuç olarak tüberküloz bulaşıcı bir hastalık olabilir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden."
 panum.242.g: "Bu teori, tüberkülozun bulaşıcı bir hastalık olduğunu vurgular."
 panum.242.h: "Bu teori, miasma teorisinin yanlış olduğunu vurgular."
 panum.243.t: "Tüberküloz Yalısı"
 panum.243.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tüberkülozdan kurtulmuş bir kişiyle yaptığı görüşmede ilginç bir keşif yaptı."
 panum.243.f: "'Kardeşinizin tüberkülozdan öldüğünü söylediniz?'\n'Evet. O zaman on dokuz yaşındaydım. Ölümünü gözlerimle gördüm.'\n'Sonra siz de tüberküloza yakalandınız mı?'\n'Evet. Onun gibi, kısa süre sonra öleceğimi düşündüm. Bu benim için güvenliydi. Bu yüzden ölmek için uzak bir yere çekildim. Son günlerimi doğada, medeniyetten uzak geçirmek istedim.'\n'Ama hayatta kaldınız. Sebebini neye bağlıyorsunuz?'\n'Sağlıklı beslenme ve egzersiz. Bir noktada hastalığı yenmek için yeterli gücü topladım.'\n'Hm.'"
 panum.243.g: "Gerçekten hepsi bu mu?"
 panum.244.t: "Mirasla İlgisi Yok"
 panum.244.d: "Uzun incelemeler sonrası Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tüberkülozun aslında kalıtsal bir hastalık olduğuna dair çok az delil bulunduğunu sonucuna vardı."
 panum.244.f: "'Eğer eğitimim sırasında bana bir gün soyağacı çalışmaları yapacağımı söyleseydiniz, oldukça şaşırırdım. Ama teorimi doğrulamanın yolu neredeyse sadece etkilenen ailelere, yetkililere ve din adamlarına sormaktan geçiyordu. Eğer tüberküloz gerçekten kalıtsalsa, nesiller boyu fark edilmeden kalabilir. Bazı aile ağaçları hiç tüberküloz vakası içermiyor, sonra bir anda tüm aileyi etkileyebiliyor. Ve dikkat çekici bir gerçek: tüberküloz statik, yönetilebilir bir hastalık değil; bugün oluşturduğu tehlikeyi yalnızca son birkaç on yılda kazandı. Şunu söyleyeyim: Eğer tüberküloz kalıtsalsa, hepimizin genetik yatkınlığı var demektir. Çalışmamın ekinde istatistikler kendini gösteriyor.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in Tıp Fakültesine verdiği ders."
 panum.244.g: "Teorik olarak herkes enfekte olabilir mi?"
 panum.245.t: "Tüberküller"
 panum.245.d: "Anatomik bir inceleme sırasında Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalığa adını veren akciğer dokusundaki tümörler hakkında yeni bilgiler edindi."
 panum.245.f: "René Laennec, başlangıçta tüberkülozu incelemek için stetoskop geliştirdi. İzleyen yıllarda, hastalığın erken aşamada solunum sistemindeki değişiklikleri dinleyerek tespit edilebilmesini sağladı. Aynı zamanda tüberkülozun vücut içindeki gelişimi hakkında bilgi arttı."
 panum.245.g: "Küçük bir ilerleme - ama ilerleme."
 panum.246.t: "Yaşam Tarzı & Bağışıklık"
 panum.246.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], birkaç hastayı ve biyografilerini ayrıntılı şekilde inceledikten sonra, tüberkülozun nedenine dair geleneksel teoriler konusunda ciddi şüpheler taşımaktadır."
 panum.246.f: "'[SCOPE.sState('panum_disease_state').GetCityHubName]'deki birkaç hastanın ve kişisel geçmişlerinin incelenmesi, cevaplardan çok soru ortaya çıkarıyor; beklenen şey mümkün olduğunca basit gerçekler olmalı, sadece parçalar değil. Özellikle proletaryanın tüberkülozdan ciddi şekilde etkilendiği doğrudur, ancak aynı ortamda zengin bir kişinin de hastalığa yakalanmayacağını söylemek şüphelidir. İyi beslenme, temiz hava ve fiziksel egzersizin hastalıklara karşı belli bir direnç sağladığına inanıyorum - fakat bu nedenle tamamen dışlanabileceğini düşünmüyorum. Kısaca: Birinin tüberküloza yakalanmasının sebebinin sanatçı ya da proletaryadan olması bilimsel olarak geçersiz bir iddiadır. Eğer öyle olsaydı, tüberküloz son yıllarda seçimini yapmış olurdu ve şimdi müzisyen ve şairler yerine fabrikalarda çalışanları kurban olarak seçerdi. Bunu ciddi şekilde kimse inanamaz.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden."
 panum.246.g: "Bu, bazı tanınmamış dehalar için büyük bir hayal kırıklığı olacak."
 panum.247.t: "Bildirilmesi Gereken Bir Hastalık"
 panum.247.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]'de tüberkülozu kontrol altına almaya yardımcı olabilecek bir bildirim sistemi denemektedir."
 panum.247.f: "'[SCOPE.sState('panum_disease_state').GetCityHubName]'de tüberkülozun bildirilmesi gereken bir hastalık olarak sınıflandırılması, halk arasında bazı hoşnutsuzluklara yol açtı çünkü birçok kişi bu hastalığı özel bir mesele olarak görüyor. Oysa durum böyle değil, özellikle salgın halinde ortaya çıktığında. Bir hastalık bulaşıcı olarak kabul edildiği anda - ve tüberküloz söz konusu olduğunda bunun için birçok belirti var - bu, kamu sağlığını tehlikeye atabilecek bir kamu meselesidir. Bildirilebilir bir hastalık, karantinadan daha iyidir. Bulaşma kaynaklarının izole edilmesi, tüm bir şehri acil durum durumuna sokmadan tüberkülozun yayılmasını önleyebildi. Ne yazık ki, tüberküloz hastalarına yapıştırılan damga, hoş olmayan kişisel sonuçlar doğuracak. Artık tüberküloz hastaları, cüzzamlılar gibi muamele görüyor.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden."
 panum.247.g: ""
 panum.248.t: "Mikropları Öldürmek"
 panum.248.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], mikroorganizmalarla ilgili önceki bilgileri temel alan bir kimyasal işlem geliştirdi. Bu işlem gelecekte tüberkülozu önleyebilir."
 panum.248.f: "Pastörizasyon, sıvı veya macun kıvamındaki gıdaların mikroorganizmaların vejetatif evrelerini öldürmek için kısa süreli olarak en az 72 °C ve en fazla 100 °C'ye ısıtılmasını ifade eder. Bu yöntem, 19. yüzyıl ortalarından itibaren şarap için kullanıldı. Sadece daha sonra çiğ süt üzerinde uygulandı; çiğ süt aracılığıyla sığır tüberkülozu insanlara bulaşabilirdi. Bu nedenle çiğ sütün pastörizasyonu tüberkülozun kontrolünde rol oynadı. Bu bulgu, ilk bakışta düşünüldüğünden daha önemlidir: uzun süre boyunca doktorlar, biyologlar ve kimyagerler, tüberkülozun sığırlardan insanlara geçemeyeceğini varsaydılar. Tüberküloz uzmanı Robert Koch bile bu konuda yanıldı ve görüşünü ancak daha sonra revize etti - bu süre zarfında birçok çocuk tüberkülozlu süt ve tereyağı aracılığıyla enfekte oldu."
 panum.248.g: "Ve ben sütün temel olarak sağlıklı olduğunu düşünüyordum!"
 panum.249.t: "Kişisel Tükürüklüğü"
 panum.249.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tüberküloz hastaları arasında özellikle kadınlar arasında popüler hale gelmiş bir aksesuar fark etti. Şık mavi cam kabı öyle modaya uygun ki, tükürüklük olduğunu unutuyorsunuz."
 panum.249.f: "'Çoğumuzun burada böyle bir şeyimiz var. Bizim için de bir adı var, takma ad, oldukça eğlenceli.' Hiç çekinmeden, inatçı cahil bir yüz ifadesiyle, kasvetli ifadeyi söyledi: 'Mavi Heinrich'.' -Thomas Mann, Zauberberg"
 panum.249.g: "Eğer her hasta böyle bir şey taşısaydı..."
 panum.251.t: "Bir Hücre Hastalığı mı?"
 panum.251.d: "Alman bir uzmanın tüberküloz üzerine dikkat çeken çalışması, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in önceki bulgularını altüst etti çünkü [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] henüz uygun bir karşı yanıt bulamadı."
 panum.251.f: "'Bazı meslektaşlar tüberkülozun enfeksiyon yoluyla bulaşabileceğini tutkulu bir şekilde iddia ediyor. Birçok hastanın tüberkülozlu bir kişiye yakın olmadan hastalığı geliştirdiği gerçeğiyle karşılaştıklarında, bunun muhtemelen yıllar önce bir yerden bulaştığını söylüyorlar. Bunu nasıl kanıtlayabiliriz? Kendi çalışmalarım, akciğer dokusundaki tüberküllerin hücre çoğalması olarak yorumlanması gerektiğini gösteriyor. Tüberküloz bu nedenle, karsinom gibi, yerel hücrelerin çoğalmasının bir sonucu olarak yorumlanmalıdır. Kesin olarak bir konstitüsyonel hastalık olarak tanımlanabilir.'\n\nDr. Angelika Hasenbein, 'Tüberküloz, Kanser Benzeri Bir Hastalık'"
 panum.251.g: "Yani tüberküloz bir hücre tümörü gibi mi çalışıyor?"
 panum.252.t: "Bronşektazi"
 panum.252.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in keşfettiği gibi, tüberküloz hastalarından edindiğini düşündüğü bazı iddia edilen bulgular yanlıştı. Onlar tamamen farklı bir hastalıktan muzdaripti."
 panum.252.f: "'Ne yazık ki bazı araştırmalar bir çıkmaza girdi. Bu nedenle bazı tüberküloz hastalarının belirli koşullar altında iyileştiğine inandım. Gerçekte onlar tüberküloz değil, bronşektazi hastasıydı. Tüberkülozun bronşektaziyi teşvik edebileceği ihtimali yok değil, fakat bunlar iki farklı hastalıktır ve tüm sonuçlar bu nedenle geçerli değildir. Bu, başarılı bir tedavi yöntemi arayışını büyük ölçüde geciktirecektir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden."
 panum.252.g: "Boşa harcanan zaman!"
 panum.253.t: "Sahtekârlık"
 panum.253.d: "[SCOPE.sState('panum_disease_state').GetCityHubName]'deki bir sanatoryum ziyareti, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] için tam bir hayal kırıklığı oldu."
 panum.253.f: "'Birçok meslektaşım ve tanınmış tıp uzmanı bana [SCOPE.sState('panum_disease_state').GetCityHubName]'deki sanatoryumu önerdi. Son derece ciddi yöntemlerle tüberküloz alanında faaliyet gösteren örnek bir kurum olduğunu söylediler. Birçok hasta burada tıbbi mucizeler olduğunu anlattı. Ancak haftalar süren ziyaretlerden sonra bunun çoğunlukla pazarlama amaçlı olduğunu fark ettim. Yerinde doktorlar iyileşme şansının ne kadar yüksek olduğunu garanti ederken, dosyaları incelediğimde kabul edilen hastaların neredeyse %50'sinin ilk hafta öldüğünü gördüm. Bu sanatoryum tamamen bir dolandırıcılık!'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden."
 panum.253.g: "Ama... ama... akşam yemeği harika olmalıydı!"
 panum.254.t: "Beyaz Ölümle Temas"
 panum.254.d: "Görünüşe göre tüberküloz hastalarını ziyaretler beklenmedik bir etki yarattı: Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bugün kan tükürdü!"
 panum.254.f: "'Ne talihsiz bir gün. Tüberkülozla ilgilenmem ve hastalık hakkındaki varsayılan bilgim şimdi intikam alıyor. Bir yandan birçok açıdan yanılmış olmam, gururumun cezalandırılmasını hak ediyor. Öte yandan, bunun bulaşıcı bir hastalık olduğuna işaret ediyor. Ama bu keşfi hangi bedelle yapmam gerekti?'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden."
 panum.254.g: "Doktor bundan kurtulacak - değil mi?"
 panum.264.t: "De Contagione"
 panum.264.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in tarihî ilgileri, onu Rönesans döneminden gelen ve ölçülemez değere sahip eski bir kitapla karşılaştırdı."
 panum.264.f: "1546 yılında Verona’lı doktor Girolamo Fracastoro, hastalıkların esas olarak daha sonra mikroplara benzeyen küçük parçacıklarla bulaştığını öne sürdü. Bu nedenle 300 yıldan fazla önce miasma teorisini sorguladı. Tüberküloz hakkında Fracastoro, bunun bu patojenler aracılığıyla bulaşan bir hastalık olduğunu belirtir. Kitap bazen birçok modern tezden daha ikna edicidir. Devrimsel olan, Fracastoro'nun sözde 'fomites'lerin solunum sistemi veya vücut gözenekleri yoluyla girip besin arayacağını varsaymasıdır. Bu, hastalığın ilerlemesini sağlayacaktır."
 panum.264.g: "Bu tedavi arayışını hızlandıracak."
 panum.264.h: "Bu, miasma teorisinden çok daha ikna edici."
 panum.264.i: "Küçük bir patojen tüberküloza neden olabilir mi?"
 panum.240.t: "Tüberküloz - Bulaşıcı Bir Hastalık"
 panum.240.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çeşitli deneyler ve hasta incelemeleri aracılığıyla tüberkülozun yalnızca bulaşıcı bir hastalık olduğunu kesin olarak kanıtladı ve bu doğrultuda '[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]' adlı tezinde birkaç önleme yöntemi türetti."
 panum.240.f: "'Tüberkülozun kişiden kişiye ve hayvandan insana bulaşabilen bir hastalık olduğunu bilmek, hastalığı önlemek için bir dizi önlemi beraberinde getirir.\nİlk olarak, tüberküloz hastaları kalabalıktan uzak tutulmalıdır.\nİkinci olarak, hastalık bildirilebilir olmalıdır, böylece yayılım azaltılabilir.\nÜçüncü olarak, kamu hijyenini sağlamak için düzenlemeler yapılmalıdır - örneğin, halka açık yerlerde tükürme yasağı veya en azından kamu ve kişisel tükürük kaplarının kullanımı.\nDördüncü olarak, proletaryadaki enfeksiyonu en aza indirmek için halk sağlığı iyileştirilmelidir.\nBeşinci olarak, çiğ sütün pastörizasyonu şarttır.'\n\nKaynak: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.240.g: "Tüberküloz artık kader değil."
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Bu bir ipucu veriyor... muhtemelen."
 panum.540.t: "Önlemek? Önledik!"
 panum.540.d: "Haftalar süren araştırma ve çalışma sonucunda, doktorumuz sarı humma yayılımını durdurmak için bir yöntem geliştirdi!"
 panum.540.f: "'…ama sonunda tek bir kanıt kaldı, kesin ve affedilemez. Ağ, duman ya da böcek ilacı fark etmez, araştırmam gösterdi ki sineğin yolu herhangi bir nedenle kesildiğinde sarı humma yayılmıyordu. Öyleyse bu, bir böcek kaynaklı hastalık olmalı. Üreme sürecini kesersek, yeni sivrisineklerin insanları enfekte etmesini önleyebiliriz. Sadece yöntem meselesi ve ben üç maddelik bir plan geliştirdim.\nI: Yerel göletleri, bataklıkları ve sazlık alanları üreme için uygun olmayacak şekilde böcek ilacı ile püskürtün. Mümkünse küçük su birikintilerini tamamen boşaltın.\nII: Kamu binalarının tüm girişlerine, özellikle hastanelere böcek ilacı uygulanmış sineklikler veya kumaş örtüler yerleştirin.\nIII: Halkı bu hastalığın sinekler aracılığıyla yayıldığı konusunda bilgilendirin ve evlerini temizlemek için sineklik, böcek ilacı ve duman kullanmalarını teşvik edin.\nSamimiyetle inanıyorum ki, bu yöntemler hayata geçirilirse, ömrümüz boyunca endemik sarı hummanın sona erdiğini ve bu en inatçı düşmanın ortadan kalktığını görebiliriz.'\n\nFrom:[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] by Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]"
 panum.540.g: "Aferin doktor. Şimdi biraz sineklik ve böcek ilacı almalıyız..."
 panum.541.d: "Başhekimimiz Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], gizemli Sarı Hummayı araştırmak üzere [SCOPE.sState('panum_disease_state').GetName]'e ulaştı."
 panum.541.f_america: "'[SCOPE.sState('panum_disease_state').GetCityHubName]'e şafaktan çok önce vardık, tren istasyona ulaştığında peron boştu ve makinist ile arkadaşları için sadece bir şişe sıcak çorba vardı. Çok az kişi sabah bu kadar erken trenle yol alabilir, ama ben pek dinlenememiştim; yerel yönetimin mektupları ve notları aklımı oldukça meşgul ediyordu, çünkü garip bir hastalık olan Sarı Humma'dan bahsediyorlardı. Hastalığın adı sarılık ile ilgilidir, ancak bu sorunların sonu değil - kusma, karın ağrısı, göz kanaması ve bunlar birçok kişiyi öldürüyor.\nAma sonuçlar bize tanıdık gelse de, bu toprakların ilk kolonizasyonundan kalma kayıtlarla yazılmış olsa da hastalığın doğası uzun süre bilimden kaçtı. İşte bu noktada meslektaşlarımı uyandıracak amacı ve enerjiyi buldum ve onları trenden şehir merkezine, sivrisineklerin sürekli vızıldadığı gaz lambalarının ışığı altında yönlendirdim. Eğer bu hastalığı yenmek istiyorsak, en büyük soruyu öğrenmeliyiz. Ne ile savaşıyoruz?'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.541.f_africa: "'Öğle sonrası biraz geçmişti ki gemimiz limana yanaştı ve kaptan bize varış noktasına ulaştığımızı bildirdi. Sömürge imparatorluğumuzun büyük karakollarından biri olan bu yerleşimde, yerel yönetim başkente, anlamakta zorluk çektiği garip ve ölümcül bir hastalık olduğunu bildirmişti - sıradan bir grip değil, meşhur Sarı Humma. Bu hastalık bana yabancı değil, tropikal hastalık tarihi hakkında okuyan hiç kimseye yabancı değil... ama öldürme yollarının çoğunu bilsek de, hastalığın kendisini çok az biliyoruz.\nYardımcılarım ve silahlı bir eskort eşliğinde şehir merkezine yakın bir laboratuvar kurduk. Orada örneklerimizi saklayabilir, evimizi oluşturabilir ve Sarı Humma'nın gizemlerini çözmek için gerekli araştırmaları yapabiliriz... ancak önce örnekleri bulmalıyız ve sürekli varlık gösteren sivrisinekler hoş olmayan bir dikkat dağıtıcıdır. Yine de işimizi yapmamızı engellemeyecek.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.541.g: "Hadi bakalım beyler...esniyorum."
 panum.541.h: "...lanet sivrisinekler."
 panum.542.t: "Dünün Savaşları"
 panum.542.d: "Bu topraklarda Sarı Humma'nın tarihini daha iyi öğrenmek için, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yerel bir garnizon komutanına danışmaya karar verdi."
 panum.542.f: "'Ah, sizi görmek güzel doktor. Askerlerim hastalık gelirse iyi ellerde olduklarını bilmekten her zaman mutludur. Sizin için ne yapabilirim?'\n'Seyir keyfi benim, albay. Buradaki geçmiş kampanyalara ait kayıtlarınız olduğunu söylediler. Askerler arasında sarı humma salgını yaşanan kampanyalar var mı?'\n'Elbette... işte burada. Bu korkunç bir kampanyaydı, inanın, sadece düşman değil. Savaşta ölen birçok genç, hava koşulları, hastalık, maruz kalma nedeniyle ölüyor. Buna kayıplar diyorlar.'\n'Bu... kayıplar özellikle kötüydü, öyle mi?'\n'Kötüden de kötüydü. Hastalık ve yağışlı mevsim arasında, bir adamın kampta korkacak daha çok şeyi vardı, savaş alanında olduğu kadar. Sıcak çok kötüydü ve böcekler.'"
 panum.542.g: "Böcekler, hastalık, yağmur... doğanın kendi eliyle cehennem, diyebiliriz sanırım."
 panum.543.t: "Kederli Tarlalar"
 panum.543.d: "Sarı Humma hakkında daha fazla bilgi edinme görevine devam eden Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], yerleşim yerinin dışında, enfeksiyonun yoğun olduğu bir alan - kırsal bir çiftliğe - seyahat etti."
 panum.543.f: "'İtiraf etmeliyim, bu kırsal aksanı anlamayı öğrenmem neredeyse bir saat sürdü, ama çiftlik sahibi oldukça bilgilendiriciydi. Bu bölge genellikle oldukça ıslak olsa da, sulama çalışmalarına ihtiyaç var. Ancak bu hendekleri kazmak ciddi güç gerektiriyor ve bu güç, çoğunlukla sıkışık ve dağınık kışlalarda birlikte yaşayan onlarca yerel işçi tarafından sağlanıyor. Bu koşullar hastalık üretir, bu yüzden sarı hummanın kısa sürede burada bulunması şaşırtıcı değil.\nÇiftçi kendisi bunun bir seyyar tüccardan ya da hasadı toplamak veya araç gereç teslim etmekle gelen tüccarlardan kaynaklandığını düşünüyor, kesin olarak söyleyemiyor, ama ben buna şüpheyle bakardım. Sarı Hummanın burada kendi başına ortaya çıktığı daha olası görünüyor… ama öyleyse, nasıl?' \n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.543.g: "Bir hastalık… birdenbire nasıl ortaya çıkabilir?"
 panum.544.t: "Su…?"
 panum.544.d: "Sarı Hummanın su yoluyla bulaşan bir hastalık olma olasılığını araştıran Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yerel su yolları ve kuyulardan örnekler toplamıştır."
 panum.544.f: "'Düşündüğüm olasılıklardan biri, bu hastalığın kolera benzeri bir doğaya sahip olabileceği ve hastalıklı suyla taşınabileceğiydi. Bunun doğru olup olmadığını görmek için, yardımcılarıma örnekleri toplamalarını emrettim ve mikroskop için sessiz bir yer buldum, böylece kesintisiz çalışabilirdim. Nemli ve tropikal hava dikkat dağıtıcı, sivrisineklerin sürekli vızıltısı da öyle, ama kısa sürede örnekler mercek altına kaydı ve o minik dünyayı incelemeye başladım.\nMaalesef bu çaba boşunaydı. Bazıları diğerlerinden daha kirliydi, hatta küçük kurtçuklar taşıyordu, ama bunlar enfekte olanların dağılımını, yani harita üzerinde saçılmış gibi bir desenini eşleştirmiyordu. Her ne olursa olsun, bu suda sarı humnın doğasına dair bir ipucu bulamıyorum…'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.544.g: "...ama eğer orada değillerse, o zaman nereye saklanıyorlar?"
 panum.545.t: "Ada"
 panum.545.d: "Enfeksiyon deseninde görünen bir 'kopukluk' karşısında şaşıran Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], sıra dışı bir yere - bir ada balıkçılığına - gitmiştir."
 panum.545.f: "'Ah, siz doktor olmalısınız… oh. Kötü kokudan ötürü özür dilerim doktor. Düşmemeye dikkat edin. Attığımız bağırsakları yiyen balıklar, eğer fırsat bulursa sizi de yiyebilir.'\n'…lütfen, çabuk olun. Bu yer hakkında bilgi verin.'\n'Evet, bence hoşunuza gidecek, burada hastalık hiç yok. En azından sarı humma yok.'\n'Nasıl yani? Erkeklerinizi koruyan bir şey olabilir mi?'\n'Belki karaya çok az zaman geçiriyorlar. Çoğu gün denizde, bazıları daha uzaklara gidiyor ve bir gün veya daha fazla dönmüyor. Ama bunun ötesinde başka bir neden olmalı, diye düşünüyorum. Boş zamanlarını adada, kışlalarda veya evlerinde geçiriyorlar ve burada hiç humma yok.'\n'Bunu araştıracağım… hayır, döndüğümde yardımcılarım araştırabilir.'\n'Herkese haber vereceğim, doktor… ve hatta veda bile etmediler.'"
 panum.545.g: "...ama önce, sabunlu bir banyo. Çok, çok sabunlu bir banyo."
 panum.546.t: "Bataklık Gazı?"
 panum.546.d: "Eski miasma teorisinin ürkütücü bir dönüşü olabileceği düşünülen bir durumda, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] şaşırtıcı raporlar bulmuştur - sarı humma bataklık gazlarıyla ilişkili olabilir!"
 panum.546.f: "'Buradaki çoğu şeyin mantıklı gelmemesi beni üzüyor. Hiçbir şey bildiğimiz yerleşik teorilerle uyumlu değil ve kendimi çare ararken buluyorum. Ancak umut vadeden bir yol var - bataklıklar. Yardımcılarım mikroskop için lamlar hazırladı, ve bunlar mikroplarla dolup taşıyor, ama tanımlayabileceğimiz hiçbir şey yok. Yine de, veba kıyılara vuruyor. Bu bataklıkların yakınındaki evler sarı hummadan en çok etkilenenler. Bazıları çocuklukta bile hastalığa yakalandığını söylüyor.\nVe yine de, hiçbir iz yok… nasıl. Su içmiyorlar, içinden yakalanan balıkları yemiyorlar, ama kokusu rüzgarla evlerine geliyor, onları sarıyor ve hastalık kısa sürede ortaya çıkıyor. Eski metinler 'miasma' diye bağırırdı, ama bu böyle olamaz… ama değilse, hastalık bataklıktan eve başka nasıl yayılabilir?'\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.546.g: "...veya belki astrolojik… hayır, bu mantıklı değil… öyle mi?"
 panum.547.t: "Rakip"
 panum.547.d: "Yerel uzmanlığı araştırmaya karar veren Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], potansiyel bir müttefiki ziyaret etmeye karar verdi - yerel adli tıp uzmanı."
 panum.547.f: "'Ah, sizi görmek güzel, doktor. El sıkışmazsak özür dilerim, diğer odada bir ceset var.'\n'Sarı humma mı?'\n'Öyle sanırdınız ama hayır. Sıtma, inanır mısınız? Bu salgını görmek için en uygun zaman, tam da şimdi, aynı anda.'\n'Talihsiz bir tesadüf mü?'\n'Belki, ama burada yeterince uzun süre bulundum ve bir desen gördüm. İkisi genellikle birlikte gelir ve daha da kötüsü, benzer semptomlar ve benzer ölümler gösterir. İkisini ayırt etmek zor bir iş, söyleyeyim. Onları aynı şey sanırdım.'\n'Bu… aslında oldukça ilginç. Bu konuda iyi kayıtlarınız var mı?'\n'Elbette. Yardımcım bunları size gönderecek, ama ne kadar yardımcı olabileceğini bilmiyorum. Bu şeyin nasıl yayıldığını bilmiyorum doktor, ama birini bulursanız, diğerini de bulabilirsiniz.'"
 panum.547.g: "O zaman belki iki kuşu tek taşla vurabiliriz."
 panum.548.t: "Çatallı Yol"
 panum.548.d: "Sarı hummanın doğası karşısında şaşkın olan Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], başkente yazıp daha fazla talimat istemiştir."
 panum.548.f: "'...ve yine de, ne kadar çabalasam da, nasıl ilerleyeceğimi bilemiyorum. Araştırma yolumu gösterecek çok az 'işaret' var ve çok sayıda tıp dergisini inceledim ve yerel uzmanlarla görüştüm, yine de sarı hummanın gerçekten ne olduğunu tam olarak bilmiyorum. Bir hastalık olduğu kesin, ama ne tür bir hastalık? Hava yoluyla mı, yani miasma gibi mi? Su veya yiyecek ile mi? İnsanlardan insana mı, yoksa bataklıktan insana mı yayılıyor?\n\nBunlar cevaplayamayacağım sorular ve gerçeği asla keşfedemeyebilirim. Hastalığı bulamazsam, doğrudan savaşmayı umamam. Ama araştırmam tamamen boş da değil. Düşünebileceğim iki olası araştırma yolu bulmuş olabilirim:\n\nBirincisi, hastalığın nasıl yayıldığına dair bir desen bulmayı denemek. Odaklanmış bir araştırma ile hastalığın iletimi hakkında mantığı keşfedebilir ve böylece kesintiye uğratabiliriz. Belki yayılmayı durdurmak gerçek nedeni ortaya çıkarır.\n\nİkincisi, bir tedavi veya aşı geliştirmeyi denemek, belki genç yaşta hastalığa yakalanmış ama tamamen iyileşmiş çocukları ve hayatta kalanları inceleyerek. Kökenini bilmiyor olabiliriz, ama belki yine de üstesinden gelebiliriz.\n\nBu nedenle, başkente yazıyorum, saygıdeğer bilim ve öğrenim mensuplarına soruyorum: araştırmamın odak noktası ne olmalı?\n\nBir mektup, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tarafından, [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.548.g: "Önlem bir kilo ilaç değerindedir."
 panum.548.h: "Tüm kozları oynuyoruz. Bir aşı geliştireceğiz."
 panum.551.t: "Önleme Yolu"
 panum.551.d: "Başkentten gelen talimatları izleyerek, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Sarı Hummanın yayılmasını önlemeye yönelik araştırmalara başlamıştır."
 panum.551.f: "'...elbette, bir hastalığın yayılmasını önlemek için tam olarak ne yapılması gerektiğini belirlemek zordur, özellikle de hastalığı ölümcül etkisi dışında neredeyse hiç anlamıyorsak. Ancak bu benim karşılaşmam gereken zorluksa, öyle olsun. Şu ana kadar birkaç umut verici ipucu buldum; enfeksiyon haritam düzensiz, ama burada ve orada, bazı düzensizlik adaları ortaya çıkıyor… salgının önemli ölçüde, hatta tamamen azaldığı yerler.\nGerçekten bu hastalığın doğasını anlamış gibi davranamam, ama hastalık düzensiz değil. Burada keşfedilmeyi bekleyen bir desen var ve bulunursa, bu bulmacayı çözebilir ve sarı hummadan tamamen kurtulabiliriz.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.551.g: "Bir kale inşa ediyoruz, bir tuğla bir tuğla."
 panum.552.t: "Gerçeklerin Dilimi"
 panum.552.d: "Sarı hummanın yayılmasını önleme yolları üzerinde çalışırken, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bir yardımcısı tarafından ziyaret edilmiştir."
 panum.552.f: "'Ah, seni tekrar görmek güzel, evlat, ve - aman tanrım! Bu koku nedir?'\n'Özür dilerim doktor... Yeni geldiğim balıkçılık yerinden geldim, siz beni araştırmaya göndermiştiniz. Çok ilginç bir şey buldum!'\n'Öyle ilginç ki banyo yapacak zamanın yok gibi görünüyordu...'\n'Affedin, ama evet. Sarı hummanın balıkçı yerindeki insanları etkilemediğini araştırdım ve ana karaya kadar izlemeye başladım. Kıyıda bir tütsü evi var ve işçiler oradan geçiyor, kimse orada sarı humma kapmıyor. Bu da aklıma geldi… belki duman uzak tutuyor? Bu yüzden çok duman olan yerleri araştırdım ve bir sabun üreticisi buldum, ocaklarına otlar ve yağlar koyuyorlar. Evlerinde tek bir sarı humma bile yok.'\n'Hmmm… bu harika bir çalışma. Gözlemlerine devam et ve beni bilgilendir, ah, iyi iş.'"
 panum.552.g: "Hızlı adımlar, yardımcıyı gönderiyor… ama doktor düşünmeye devam ediyor."
 panum.553.t_america: "Görev"
 panum.553.d_america: "Salgındaki boşlukları takip eden Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırmaları, onları eski bir koloniyal misyona yönlendirmiştir."
 panum.553.f_america: "'Buradaki misyonu bulmak uzun sürmedi. Kolonileşmeden sonra inşa edilen ilk binalardan biriydi, atalarımız, bir daha göremeyecekleri topraklardan taze gelmişti. Büyük bir katedral değil, ama sevgiyle inşa edilmişti ve zamanla misyonerler ve Ana Kilise mensupları büyüyen, kendi odaları ve salonları ile genişleyen bu binayı geliştirmişti. Hasta getirilebilecek, rahibeler ve yardım etmeye istekli gönüllüler tarafından bakılabilecek ilk yerlerden biriydi.\nTüm hesaplara göre, burası kendi başına bir katliam yeri olmalıydı… ama değil. Diğer hastaneler ölülerini sayarken ve hastalığın koğuştan koğuşa sıçradığını görürken, burada hiçbir şey yok. Bir aile ev yangını sonrası getirildi, ama bir hafta sonra hiçbiri sarı humma kapmadı, sadece birkaç oda uzaklıkta olmalarına rağmen. Bu beni şaşırtıyor, çünkü misyon ve hastane benzer, ama büyük fark var: ağlar. Vaaz kutsaldır ve vızıltılı sivrisinekler ve benzerleriyle kesintiye uğramaz, bu yüzden rahipler her pencereye ağ koymuş, koğuşlarda bile.\nVe böylece sarı humma tamamen yok oluyor.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.553.g: "Çünkü sana sağlık getireceğim..."
 panum.553.t_africa: "Gecekondu"
 panum.553.d_africa: "Salgındaki boşlukları takip eden Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırmaları, onları merak uyandıran bir yere yönlendirdi - gecekondu bölgesine."
 panum.553.f_africa: "Gecekondu, bu topraklarda büyük sömürge girişimimizin önemini sorgulatacak kadar yakındı. Pis ve sefil, kadınlar ve çocuklarla tıklım tıklım dolu, erkeklerini plantasyonlardan, madenlerden veya çalıştıkları diğer yerlerden dönmelerini bekleyen. Fazla çalıştırılan su pompaları kapları dolduruyor, sinekler vızıldıyor ve belirgin bir hijyen eksikliği bu yeri bir hastalık kazanı gibi gösteriyor. Gerçekten de öyle.\n\nBu yerlerde nadir rastlanan bir doktor olarak, yerel rehberler ve polis eşliğinde evden eve gezdirildim, belirli hastalıklar hakkında bilgi vermem istendi. Karşılığında onlara sorular sordum: Sarı humma hakkında ne düşünüyorsunuz? Kolera ve dizanteri vakaları gördüm, ama aradığım hastalık yoktu. Bir kadın pencerelere, ya da olması gereken yerlere işaret etti - cam yerine, bir kumaş duvar, bir ağ. Onlara göre, bu sıtmayı engelliyor, ama belki sarı hummayı da… ki bu, inançlarına göre, böcekler tarafından taşınıyor olabilir.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.553.h: "...ve belki, sadece belki, yerel halk haklıdır?"
 panum.554.t: "En Büyük Katil"
 panum.554.d: "Yerel askerî güçler tarafından verilen kayıtları inceleyen Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], önemli bir keşifte bulunmuştur."
 panum.554.f: "'Ah, seni tekrar görmek güzel, albay. Bu verdiğiniz kayıtlarla ilgili birkaç sorum var. Bir dakikanız var mı?'\n'Elbette! Yardım etmek için her şey.'\n'Burada son seferin, böcek ısırıklarından dolayı derinden rahatsız olmuş bir subay tarafından yönetildiği belirtiliyor.'\n'Rahatsız mı, evet, çok, çok rahatsız. Isırıklar bu topraklarda hayatın bir parçası, ama nereden geldikleri... bilinmiyor.'\n'Anladım, anladım... ama ayrıca ordunun hem sıtma hem de sarı hummadan etkilendiğini, savaşta değil hastalıktan daha çok kayıp verdiğini de belirtiyor.'\n'Attrition, maalesef savaşın uzun süredir bir parçası.'\n'... ama pire otu (pyrethrum) kullanımı emredildikten sonra, sarı humma ve sıtma vakaları keskin şekilde düştü. Bir hafta sonra yerel bölgeye püskürtme emri verildi ve oranlar tekrar düştü. Peki, bu pire otu nedir tam olarak?'"
 panum.554.g: "'Ah, pire otu mu? Askerleri böceklerden arındırmak için kullanılır. Böcekleri öldürür, görüyorsunuz.'"
 panum.555.t_america: "Dünün Anıları"
 panum.555.d_america: "Yüzyıllardır Güney Amerika'yı etkileyen bir hastalıkla mücadele eden Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], cevapları tuhaf bir yerde - geçmişte arıyor."
 panum.555.f_america: "'Bazıları geçmişin farklı bir ülke olduğunu söyler. Amerika'da belki bu diğer yerlerden daha doğrudur, çünkü Kolomb'tan bu yana çok şey değişti, ama şaşırtıcı bir şekilde, savaş verdiğim hastalık bunlardan biri değil. Bu topraklarda ilk kolonistler tarafından yazılan günlükler ve kayıtları bulmam haftalar aldı, ama sonunda ellerime geçti. Değerli bir bulgu. Onlarla, geçmiş doktorların hesaplarını alıyorum, belki bugün sahip olduğumuz araçlardan yoksun parlak zihinler.\n\nYine de, miras olarak tamamlanmamış mücadelelerini aldık, bize başlatılanı bitirmemi sağlayacak değerli bilgiler bıraktılar. Gizli bir keşif var, bu tür kayıtlar olmadan farkedilmesi zor. Ara sıra bu bölgede sarı humma patlamaları oluyor, neredeyse saat gibi. Bu tek başına işe yaramaz, ama yoğun yağmur ve hatta selden bahseden günlüklerle neredeyse tam olarak örtüşüyor; evlerin selde yıkıldığı ve ardından sarı humma salgınlarının geldiği kayıtlı. İkisi ilişkili olabilir mi?'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.555.g: "Hepimiz devlerin omuzlarında duruyoruz... ama daha az devleri vardı üzerinde duracak."
 panum.555.t_africa: "Halk Çareleri"
 panum.555.d_africa: "Belki tartışmalı olarak, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], sarı hummayı en iyi bilen insanlardan, yani yerel halktan tavsiye almıştır."
 panum.555.f_africa: "'Beni tıbbi bir dergi yerine yerlilerle görüşmeyi seçtiğim için deli olarak nitelendirecek olanlar var, ama bence bu yargı için sağlam bir mantıkları yok. Sarı humma burada, Afrika'da bulunan bir hastalıktır ve bu insanlar bizden çok daha uzun süredir burada yaşamışlar. Gerçekte, bu hastalığın bu topraklarda ilk ortaya çıkmış olma ihtimali vardır. Belki de öyledir, çünkü burada birçok salgın Avrupalıları kolayca etkileyebilir, ama yerli Afrikalılara sadece hafif bir grip benzeri semptomlar verir.\n\nBuna rağmen, anlayış vardır. Birçok yerel şifacı ve hatta daha iç bölgelerdeki kabile temsilcileriyle konuştum ve belirli önleyici uygulamalardan bahsettiler... fil gübresi ve çeşitli bitkilerin yakılması, hatta bu dumanın evlere taşınması, sivrisinekleri uzaklaştırıyor; bu sivrisineklerin sıtma ve belki de sarı humma ile ilişkili olduğuna inanıyorlar. Dahası, çevrelerindeki araziyi okuyup 'yağmur' sezonunun başlangıcını tahmin etme yöntemleri var; bu sezonun en kötü sıtma ve sarı humma ile ilişkili olduğunu düşünüyorlar. Daha fazla çalışma ve değerlendirme gerekecek, ama bu umut verici.'\n\nFrom the journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], writing of Yellow Fever in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]"
 panum.555.h: "Beklenmedik bir yerde bulunan bilgelik."
 panum.556.t: "Basit Kumaş?"
 panum.556.d: "Sınır garnizonundaki askerlerimizi desteklemek için tasarlanan yeni, böcek ilacıyla işlenmiş kumaşlar, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın araştırma yaptığı aynı kasabaya ulaştı."
 panum.556.f: "'Bu bölgede olmanız mı gerekiyor - ah, anladım, başkentten gelen doktor sizsiniz. Burada sizin için fazla bir şey yok, doktor. Burada o hastalıktan tek bir vaka yok.'\n'...bildiğim kadarıyla. Bu da ne?' \n'Evdeki generaller, böcekleri uzak tutmak için ilacı doğrudan kumaşa uygulayabileceğini keşfetmişler. Bakın, yere bakın. Onlarca böcek, çoktan ölmüş.'\n'Böcekleri bu kadar hızlı öldürmek çok etkili olmalı. Bu çadırlarda kaç asker kalıyor?'\n'Yaklaşık bir taburun en iyi kısmı, altı yüz kadar. Kumaş, eski olanlar geçen yılki muson fırtınasında hasar gördüğünden yenidir. Berbat bir zamandı, her yerde hastalık ve sıtma vardı. Şimdi bu var, hiçbir şey yok.'"
 panum.556.g: "...şimdi mi dediniz, bu yeni kumaş sayesinde tek bir hastalık vakası yok mu?"
