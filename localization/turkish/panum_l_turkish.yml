 panum_foreign_medical_expedition_modifier: "Yabancı Tıbbi Sefer"
 panum.137.t: "Sefer hastalığı araştırmak istiyor"
 panum.137.d: "Yabancı bir sefer ülkemizin sınırlarına ulaştı. Sefer esas olarak doktorlar, bilim insanları ve asistanlardan oluşuyor. Görünüşe göre yaygın salgını araştırmak istiyorlar."
 panum.137.f: "Tıbbi seferler, diğer ülkelere giderek hastalık tedavilerini bilimsel olarak araştırabilir ve kendi ülkeleri için hastalık tanımları yazabilirler. Ev sahibi ülkeler ise bu süreçten fayda sağlar; çünkü doktorlar salgın alanlarındaki hastaları incelemektedir."
 panum.137.g: "Bu cesur kadınları ve erkekleri hoş karşılayın."
 panum.2202.t: "Antik Hastalık"
 panum.2202.d: "Doktorumuz, Antropologumuzun çalışmalarına değerli bilgiler kazandırdı!"
 panum.2202.f: "'...ama elbette, kafatasının bu kısmını incelerseniz, yaralanmalardan aslında iyileşmeye başladıklarını görebilirsiniz.'\n\n'O zaman bu kesinlikle ölüm nedeni değildi, değil mi?'\n\n'Çok muhtemel! Kötü bir darbe, ama ölümcül değil. Tahminimce başka bir yaralanma onları devirmeden önce yaklaşık altı ay kadar daha yaşadılar, ya da belki yara kötüleşti.'\n\n'Hmmm. Büyüleyici. Darbenin niteliğine bakarak, bunun muhtemelen... künt bir alet olduğunu düşündüm.'\n\n'Bir sopa, büyük olasılıkla, ya da belki künt taşlı bir alet. Bu kaburga bence gerçek ölüm sebebini gösteriyor. Kemiklerin daralmasına bakın, burada ve burada.'\n\n'Yaralanma mı?'\n\n'Tüberküloz, büyük olasılıkla. Bu kişinin beyaz ölümle yıllarca savaştıktan sonra öldüğünü tahmin ediyorum.'"
 panum.2202.g: "Disiplinler arası bilim, en iyi bilim olmaya devam ediyor."
 panum.2203.t: "Garip İlaçlar"
 panum.2203.d: "Biraz boş zamanla, Doktorumuz ve Arkeolog araştırmalarını paylaştı!"
 panum.2203.f: "'Ah, ama işin ilginç kısmı burada, doktor! Bu kavanozlar Mısır'dan geliyor ve eski ilaç örnekleri olduklarına inanıyoruz.'\n\n'Büyüleyici, büyüleyici. Bu mumya yağı mı?'\n\n'...bu, bedenlerde bulunan, iyileştirici özellikleri olan reçine değil mi? Sardıkları şeyin etrafındaki reçine?'\n\n'Ah, hayır, hiç de öyle değil! Mummia, yerden çıkarılan bir tür yağ, petroldeki gibi. Neden?'\n\n'...Sanırım bu ilaçları daha fazla incelememiz en iyisi. Her türlü tentür var. Lütfen inceleyin, ben de bir şeyleri... atmam gerekiyor.'\n\n'Peki, bunlar sanki kokulandırılmış gibi ve - içeride bir şey mi yiyorsunuz?'"
 panum.2203.g: "...mumyanın kendisini yemiyorsunuz, değil mi?"
 panum.2204.t: "Bitkisel Tedaviler?"
 panum.2204.d: "Bulgularını incelemeye zaman ayırdıktan sonra, Doğacı Doktorumuzun ofisine potansiyel tıbbi özellikleri olan bitkiler getirdi."
 panum.2204.f: "'Ah, işte buradasınız! Son botanik seferimizden getirdiğimiz örnekleri katalogluyordum ve birkaç tanesi sizin için ilginç olabilir.'\n\n'Gerçekten mi? Nasıl yani?'\n\n'Birkaç tanesi, iltihap veya ateşle savaşan bilinen tıbbi özelliklere sahip bitkilerle ilgili. Bazıları tamamen yabancı, ancak yerlilerden iyi referanslarla geliyor ve daha fazla araştırmaya değer.'\n\n'Bitkisel tıp çok bilimsel değil... ama kim bilir. Bunların içinde ilginç bir şey olabilir. Sonuçta haşhaş bitkisinde bulunan mucizeleri biliyorsunuz.'\n\n'Ah, morfin!'\n\n'Evet, evet! Asistanlarım, daha yakından inceleme yapmak için bazı toz örnekler hazırlayacak.'"
 panum.2204.g: "Koka yaprağının özellikle ilginç olduğunu düşünüyorum, doktor."
