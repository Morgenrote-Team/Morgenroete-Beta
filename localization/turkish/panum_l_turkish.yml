 panum.2301.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sCharacter('chosen_character').GetFullName]'ın [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] hastalığını başarıyla tedavi etti."
 panum.2301.f: "\"Endişelenmeyin, efendim, bu tedavi kesinlikle işe yarayacak! En az 2 kez uyguladım ve sadece bir hasta öldü!\""
 panum.2301.g: "İyi!"
 panum.2302.t: "[SCOPE.sCharacter('chosen_character').GetFullName]'ın [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] Hastalığının Nötr Tedavisi"
 panum.2302.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sCharacter('chosen_character').GetFullName]'ın [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] hastalığını tedavi etti, ancak gerçek bir değişiklik olmadı."
 panum.2302.f: "\"Yeterince su içmenin işe yarayacağını düşünmüştüm!\""
 panum.2302.g: "En azından zararı olmadı."
 panum.2303.t: "[SCOPE.sCharacter('chosen_character').GetFullName]'ın [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] Hastalığının Başarısız Tedavisi"
 panum.2303.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sCharacter('chosen_character').GetFullName]'ın [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] hastalığını o kadar kötü tedavi etti ki, [SCOPE.sCharacter('chosen_character').GetHerHis] durumu daha da kötüleşti."
 panum.2303.f: "\"Bu hafta üçüncü kez oluyor...\""
 panum.2303.g: "Böyle olmamalıydı!"
