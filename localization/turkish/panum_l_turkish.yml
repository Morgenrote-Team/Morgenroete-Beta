 panum.51.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], Salgın Eyaletine Seyahat Ediyor"
 panum.51.f: "Bir hastalığın tam olarak tanımlanması, onu anlamanın ve daha sonra mücadele etmenin ilk adımıdır. Tanımlar henüz doğrudan bir iyileştirme etkisine sahip olmasa da, ilerideki tedavi yöntemlerinin temelini oluşturur. Kendi ülkelerinde bir salgını inceleyen doktorlar, yurt dışına seyahat eden doktorlara göre daha etkili çalışır."
 je_panum_cholera_description: "Kolera Tanısı"
 je_panum_tuberculosis_description: "Tüberküloz Tanısı"
 je_panum_smallpox_description: "Çiçek Hastalığı Tanısı"
 je_panum_typhus_description: "Tifüs Tanısı"
 je_panum_yellow_fever_description: "Sarı Humma Tanısı"
 je_panum_cholera_description_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], şu anda #YELLOW Kolera#! semptomlarını belirlemek için birkaç hastayı muayene ediyor. Diğer benzer veya eşzamanlı hastalıklardan ayrım yapabilmek çok önemlidir. Çalışmasının sonunda bilim insanı, tanımını halka sunar, böylece gelecek nesiller hastalığın arka planını daha iyi anlayabilir ve tedavi yöntemlerini geliştirebilir."
 je_panum_tuberculosis_description_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], şu anda #YELLOW Tüberküloz#! semptomlarını belirlemek için birkaç hastayı muayene ediyor. Diğer benzer veya eşzamanlı hastalıklardan ayrım yapabilmek çok önemlidir. Çalışmasının sonunda bilim insanı, tanımını halka sunar, böylece gelecek nesiller hastalığın arka planını daha iyi anlayabilir ve tedavi yöntemlerini geliştirebilir."
 je_panum_smallpox_description_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], şu anda #YELLOW Çiçek Hastalığı#! semptomlarını belirlemek için birkaç hastayı muayene ediyor. Diğer benzer veya eşzamanlı hastalıklardan ayrım yapabilmek çok önemlidir. Çalışmasının sonunda bilim insanı, tanımını halka sunar, böylece gelecek nesiller hastalığın arka planını daha iyi anlayabilir ve tedavi yöntemlerini geliştirebilir."
 je_panum_typhus_description_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], şu anda #YELLOW Tifüs#! semptomlarını belirlemek için birkaç hastayı muayene ediyor. Diğer benzer veya eşzamanlı hastalıklardan ayrım yapabilmek çok önemlidir. Çalışmasının sonunda bilim insanı, tanımını halka sunar, böylece gelecek nesiller hastalığın arka planını daha iyi anlayabilir ve tedavi yöntemlerini geliştirebilir."
 je_panum_yellow_fever_description_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], şu anda #YELLOW Sarı Humma#! semptomlarını belirlemek için birkaç hastayı muayene ediyor. Diğer benzer veya eşzamanlı hastalıklardan ayrım yapabilmek çok önemlidir. Çalışmasının sonunda bilim insanı, tanımını halka sunar, böylece gelecek nesiller hastalığın arka planını daha iyi anlayabilir ve tedavi yöntemlerini geliştirebilir."
 panum.52.t: "Tıbbi Gözlem Seferi"
 panum.52.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], salgını yurt dışında yakından gözlemleyip sonuçlar çıkarabilecek küçük bir uzman ve asistan ekibi kurdu. Şimdi hangi hastalığın hangi ülkede gözlemleneceği sorusu ortaya çıkıyor."
 panum.52.f: "Bir doktorun yapabileceği iki farklı tıbbi sefer türü vardır: gözlem seferleri ve araştırma seferleri. Gözlem seferleri, bir hastalığın tanımını tamamlamaya yardımcı olur; araştırma seferleri ise bir tedavi yöntemi keşfetmeye yöneliktir. Ancak bir sefer, yerinde araştırma kadar verimli olmayabilir ve bir hastalığı tamamen araştırmak için birkaç deneme gerekebilir."
 panum.52.g: "[SCOPE.sCountry('panum_cholera_country_scope').GetName] ülkesindeki kolera salgını."
