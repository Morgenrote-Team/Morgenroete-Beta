 panum.2600.t: "Yeni Bir Akıl Hastanesi"
 panum.2600.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bugün yeni akıl hastanesinin açılışını bir konuşmayla kutladı."
 panum.2600.f: "Açılışta muhalefet politikacıları dahil olmak üzere birçok önde gelen isim de hazır bulundu. Doktor yeni yöntemleri ve kliniğe kabulün yol açtığı bir dizi belirgin semptomu vurgularken, şüpheci hükümet karşıtları bu tür bir kurumun kötüye kullanım için de uygun olabileceğini düşündü."
 panum.2600.g: "Sonunda politikacılar, gazeteciler, aktörler için doğru yer..."
 panum.2601.t: "Acil Psikiyatrik Kabul"
 panum.2601.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sCharacter('chosen_character').GetFullName]'in acil ruh sağlığı bakımına ihtiyaç duyduğunu gösteren bir rapor hazırladı. Ne yazık ki, [SCOPE.sCharacter('chosen_character').GetLastName] akıl hastanesinde uzun yıllar geçirecek. Muhtemelen... çok uzun yıllar."
 panum.2601.f: "'Bir gün bir kurbanın bulunması gerekirse\nBir küçük listem var — Bir küçük listem var\nToplum suçlularının kimler olduğunu, yer altına girmesi gerekenleri\nVe kimsenin fark etmeyeceğini — kimsenin fark etmeyeceğini!\nİmzalı yazılar yazan bela verici kişiler\nEl ve gülüşleri rahatsız edici olan herkes\nTarihleri bilen ve sizi etkileyen tüm çocuklar\nEl sıkışırken elleriyle sizi rahatsız eden herkes\nVe tête-á-tête’leri bozmayı sürdüren üçüncü kişiler\nHiçbirinden eksik olmayacak — hiçbirinden eksik olmayacak!'"
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]'nun listesinde — Ve hiçbirinden eksik olmayacak!"
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName], akıl hastanesinin alanlarına sonsuza dek kayboluyor..."
