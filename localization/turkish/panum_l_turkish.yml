 je_panum_medical_techniques_project_reason: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in amacı, [GetPlayer.GetName] ülkesinde en son tıbbi teknolojiyi yaymaktır. Bu sürecin hızı, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] karakteri ve deneyimine bağlıdır. Tıbbi reform tamamlandığında, ülkemiz eski eklenti yerine daha iyi bir eklenti alacak. Bazı durumlarda, bir [concept_panum_physician], tıbbın tarihini kökten değiştiren kendi icatlarını geliştirebilir."
 panum_medical_techniques_advance_tt: "[GetPlayer.GetName] ülkesindeki tıbbi teknikler bir seviye ilerliyor."
 panum.2401.t: "Aşılama"
 panum.2401.d: "Genel bir aşılama programının uygulanması başlangıçta halk arasında şüpheyle karşılandı, ancak Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ülkenin çeşitli eyaletlerini ziyaret edip prosedürü gösterdikten sonra, çoğu hasta buna alıştı."
 panum.2401.f: "Aşılama kampanyası fikrine en azından başta bir direnç vardı. Endişeli anneler, korkmuş çocuklarıyla; bu yeni harikaya şüpheyle bakan yaşlı beyler; bilimin anlaşılmaz bir şeyle oynadığını düşünen çok dindar kişiler... Eğitim bu sorunu çözdü - nasıl çalıştığı ve neden böyle olduğu anlatıldı, ama bundan çok daha fazlası sonuçlardı. Gözleri ve sağlıkları yerinde olan, insanlığın karşılaştığı en ölümcül hastalıklardan birinin korkunç etkilerinden korunmuş çocuklar. Onları izleyenler, sağlıklı ve enerjik olduklarını görünce ikna oldu."
 panum.2401.g: "Bu bir tıbbi devrim!"
 panum.2401.h: "Tıbbi ve hijyen standartlarımız artıyor."
 panum.2402.t: "Anestezi"
 panum.2402.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], yeni anestezi yöntemini birkaç klinikte uygulamalı olarak gösterdi. Artık özellikle nahoş operasyonlar için standart yöntem olarak kabul ediliyor."
 panum.2402.f: "'Zzz.'"
 panum.2402.g: "Bilinçsiz tıbbi operasyonlar mı? Bu izinli mi?"
 panum.2403.t: "Enjektör ve Pense"
 panum.2403.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in tanıttığı yeni tıbbi ekipman alışmayı gerektiriyor, ama artık her doktor ofisinde standart."
 panum.2403.f: "'Bu ne alet, doktor?'\n'Bir alet değil, bir enjektör. İçine sıvı enjekte edebilirsiniz.'\n'Ve bu diş ameliyatı için mi, anladım?'\n'Hayır, pense.'\n'Tamam, iyi. Ve bu yeni bir bistüri mi?'\n'Öğle yemeği için çatal-bıçak setim.'"
 panum.2403.g: "Bu alandaki profesyonelleşme inanılmaz."
 panum.2404.t: "Sterilizasyon"
 panum.2404.d: "Sterilizasyonun önemini başarıyla kanıtladıktan sonra, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [GetPlayer.GetName]’deki tüm doktorların ellerini yıkayıp aletlerini temizlemesini standart uygulama haline getirdi!"
 panum.2404.f: "'Elbette, hâlâ bu uygulamaların gereksiz olduğunu düşünenler var, ve bunların birçoğu önceden pek çok hayat kurtarmış saygın beylerdir. Bu kutsal adamlara şunu söylüyorum: kanıtlara kulak verin. Mikrop teorisinin keşfi, hastalıkların mikroskobik bir canlıdan doğduğunu kanıtladı; bu canlı, enfeksiyondan önce yok edilirse hayat kurtarılır. Bu, [ROOT.GetCountry.GetCapital.GetCityHubName]'in en büyük hastanesindeki doğum koğuşunda daha da belirgindir; burada yeni annelerin ölüm oranı %18,3’ten bir ay sonra sadece %2,2’ye düşmüştür.'\n'Açıkça, saygıdeğer beyler, sonuçlar kendini gösteriyor.'"
 panum.2404.g: "Hasta insanlara dokunduktan sonra el yıkamanın bu kadar önemli olduğunu kim bilebilirdi?"
 panum.2404.h: "Ah, demek doktorun bir şişe likör için başka bir sebebi var!"
 panum.2404.i: "Hmm, bu da işine gelen bir bahane gibi görünüyor..."
 panum.2405.t: "Hasta Kayıtları"
 panum.2405.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hasta kayıtlarını ve kayıt tutma yöntemlerini modernize ederek, hem doktor ofislerinde hem de hastanelerde büyük iyileştirmeler yaptı."
 panum.2405.f: "Bir tıbbi kayıt, tek bir hastanın sağlık geçmişi ve bakımının belirli bir sağlık kuruluşu yetki alanı içinde zaman içerisinde sistematik olarak belgelendiğini anlatır. Tıbbi geçmiş, doğumdan itibaren hastada meydana gelen olayların uzunlamasına kaydıdır. Hastalıkları, büyük ve küçük rahatsızlıkları, büyüme dönüm noktalarını kaydeder. Klinik hekime, hastada daha önce neler olduğunu hissettirme imkânı sağlar. Bu nedenle çoğu zaman mevcut hastalık durumu hakkında ipuçları verebilir. Tıbbi geçmiş; cerrahi geçmiş, ilaç kullanımı, alerjiler, alışkanlıklar veya bağışıklama geçmişi gibi alt kategorileri içerir. Tıbbi kayıtta, bireysel sağlık etkileşimleri, bir hekim, hemşire veya sağlık asistanı tarafından yapılan özetlerle belgelenir ve farklı biçimlerde olabilir. Hasta hastaneye yatırıldığında, klinik değişiklikleri belgeleyen günlük güncellemeler tıbbi kayda işlenir."
 panum.2405.g: "İstatistik, matematik, bürokrasi ve tıp - nihayet birleşti!"
 panum.2406.t: "Ambulansın Tanıtımı"
 panum.2406.d: "Birkaç gün önce, [ROOT.GetCountry.GetCapital.GetCityHubName]’daki zengin bir girişimci, yerel hastaneye yeni bir araç bağışladı: [GetPlayer.GetName]’deki ilk kendi kendine hareket eden ambulans."
 panum.2406.f: "'...ve işte onu gördüm. Parlak beyaza boyanmış ve gururla bir haç ile işaretlenmiş yeni ambulans, atların telaşı veya insanların gücüne ihtiyaç duymuyordu, bunun yerine kendi motor gücüne sahipti. İlk kez, en acil yardıma ihtiyaç duyan yaralı erkek ve kadınlar, hastanenin rahatlık ve bakımına hızla ulaştırılabiliyordu; bu, aksi takdirde kaybolabilecek sayısız canı kurtaracak bir durumdu. Onu görmek kalbimi harekete geçirdi, çünkü burada, İnsan'ın en iyisi, yabancılara duyduğu sevgi, herkesin görebileceği şekilde sergileniyordu.'\n\nYerel gazete, [ROOT.GetCountry.GetCapital.GetCityHubName] Gazetesi, [TimeKeeper.GetCurrentDate.Format('y')]."
 panum.2406.g: "Muhteşem! Şimdi sadece bir sirene ihtiyacı var..."
 panum.2406.h: "Mükemmel! Hastanelerimiz bundan çok faydalanacak!"
 panum.2407.t: "Hava Ambulansı"
 panum.2407.d: "Başkente harika bir haber ulaştı: Bir pilot, doğum yapmakta olan bir kadını kırsal bir bölgeden hastaneye uçurdu, [GetPlayer.GetName] tarihinde gerçekleşen ilk tıbbi uçuş!"
 panum.2407.f: "'...elbette odaklanmak oldukça zordu. Bir uçakta çok sayıda koltuk yok, biliyorsunuz, ve doğumun ağlamalarını pervane ve motor sesinin üzerinde neredeyse duyabiliyordunuz. Elbette, bunlar işin kendisine kıyasla önemsiz şeylerdi - bu dünyada, ihtiyacı olan bir kadının çığlıklarını göz ardı edebilecek kimse yoktu, bu yüzden kadının doğuma başladığında, iyi niyetli herhangi bir kişi gibi, onu hastanenin yetenekli ellerine olabildiğince hızlı ulaştırdım. Bana bunun tehlikeli bir ters doğum olacağı söylendi, ancak oraya bu kadar çabuk varmak, doktorun çocuğun pozisyonunu sağlıklı, doğal bir doğum için ayarlamasını mümkün kıldı.\nEvet, evet, çocuğun sanırım benim adımı aldığına inanıyorum.'\n\nYerel gazete, [ROOT.GetCountry.GetCapital.GetCityHubName] Gazetesi, [TimeKeeper.GetCurrentDate.Format('y')]."
 panum.2407.g: "Demek bebekler gerçekten havayla da geliyor!"
 panum.2407.h: "Anneler için büyük bir rahatlama!"
