 panum.2500.t: "Gelişmiş Tıbbi Destek"
 panum.2500.d: "[concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], savaşta tıbbi desteği geliştirmek için yıllarca çalıştı. Yeni yöntemler ve araçlar artık savaş alanında kullanılabilir!"
 panum.2500.f: "\n'Bu şırıngayı tam olarak nasıl kullanacağınıza dikkat edin. Ve her zaman yeterli serum bulundurun. Bandajlar. Tercihen bir ilk yardım çantası. Sterilizasyonun ne anlama geldiğini biliyor musunuz?'"
