 je_panum_functionalism: "Fonksiyonel Psikoloji Okulu"
 je_panum_functionalism_reason: "Fonksiyonel psikoloji veya fonksiyonalizm, Darwinci düşünceden doğrudan çıkan ve davranışın insan yaşamı boyunca değiştirilen yarar ve amacına odaklanan bir psikoloji okuludur. Edward L. Thorndike, deneme-yanılma öğrenme deneyleriyle tanınır ve bu gevşek tanımlanmış hareketin lideri olarak bilinir. Fonksiyonalizm, introspeksiyon ilkesini reddeder; introspeksiyon, insan düşüncesinin iç işleyişini araştırmaya eğilimlidir, biyolojik süreçleri anlamaktan ziyade."
 je_panum_psychoanalysis: "Psikanaliz Okulu"
 je_panum_psychoanalysis_reason: "Psikanaliz, psikolojik bir teori, kültürel teori, psikoterapötik bir tedavi biçimi ve öz-farkındalık yöntemi olup, 1890 civarında Viyanalı doktor Sigmund Freud tarafından geliştirilmiştir. Psikanaliz terimi, insan ruhunun açıklama ve tanım modelini Freud'un bilinçdışı psikodinamiği teorilerine dayandırır ve analitik psikoterapi ile psikanalitik metodolojiyi kapsar. Kültürel fenomenlerin incelenmesiyle de ilgilenir. Üç alanda da psikanaliz, klinisyenler ve araştırmacılar tarafından günümüzde geliştirilmekte ve değiştirilmektedir."
 je_panum_analytical_psychology: "Analitik Psikoloji Okulu"
 je_panum_analytical_psychology_reason: "Analitik psikoloji, 1913 yılında İsviçreli psikiyatrist Carl Gustav Jung tarafından kurulan psikanalize dayalı bir psikoloji okuludur. Psikanaliz gibi, insan psikolojisinin bilinçdışı kısımlarıyla ilgilenir ve bilinçdışının bilinçli algıdan çok daha büyük bir etkisi olduğu varsayılır. Jung ve takipçileri özellikle bilinçdışının sembolik ifade olasılıklarını vurgulamış ve bunları psikoterapötik olarak kullanmaya çalışmışlardır."
 je_panum_behaviorism: "Davranışçılık Okulu"
 je_panum_behaviorism_reason: "Davranışçılık, insanların ve hayvanların davranışlarını bilimsel yöntemlerle inceleme ve açıklama konseptidir - yani introspeksiyon veya empati olmadan. Davranışçılık, Edward Lee Thorndike tarafından yapılan önemli ön çalışmaların ardından 20. yüzyılın başında John B. Watson tarafından kurulmuştur. Ivan Petrovich Pavlov, davranışın klasik koşullanması üzerine deneyleri ile önemli öncü çalışmalar yapmıştır. ABD'de davranışçılık savunucuları onlarca yıl boyunca üniversitelerde en etkili davranış araştırmacıları olmuş ve aynı dönemde ortaya çıkan psikanaliz okullarının güçlü rakipleri olmuşlardır.\n\nHer ülke yalnızca #R bir#! psikoloji okulunu kurabilir."
