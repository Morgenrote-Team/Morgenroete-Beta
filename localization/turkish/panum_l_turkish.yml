 panum.1001.t: "Yeni Bir Salgın"
 panum.1001.d: "Poliomyelit, 19. yüzyılda birçok farklı isimle bilinen bir hastalıktı. Şaşırtıcı bir şekilde, [SCOPE.sState('panum_disease_state').GetName] bölgesinde polio vakalarının felç ve ölüme yol açtığı haberleri artıyor. Önceden yalnızca izole vakalarda görülen hastalık artık düzenli şekilde ortaya çıkıyor. Polio artık bir salgın hastalıktır."
 panum.1001.g: "Endişe verici haberler."
 panum.1002.d: "[SCOPE.sState('panum_disease_country').GetName] bölgesinde şiddetli bir polio salgını yaşandığını birçok gazete bağımsız olarak bildiriyor. Daha önce yalnızca izole vakalarda görülen hastalık artık bir salgın gibi görünmektedir!"
 panum.1003.t: "Şiddetli Bir Salgın"
 panum.1003.d: "[SCOPE.sState('panum_disease_state').GetName] bölgesindeki polio salgını özellikle ciddi olduğunu kanıtladı. Ölüm sayısı her geçen gün artıyor."
 panum.1003.f: "'Üçüncü günün sabahı, yani Eylül ayının birinci veya ikinci günü, hastaneye yatmıştım. Kahvaltıda tahıl gevreği, meyve suyu ve çikolatalı süt vardı. Çikolatalı sütü almaya çalıştığımı hatırlıyorum, ama elimden kayıp düştü. Artık hareket edemediğim için çok kötü hissettim. Hemşireler hemen içeri girdi ve dökülenleri temizledi. Çikolatalı sütü istiyordum ama alamadım. Bunun yerine bana bir pipet getirdiler ve biraz meyve suyu içtim. Sonrasında bazı doktorlar odama geldi ve beni geriye saydırdı, 10-9-8-7-6 kadar hatırladığım sürece. O sırada yatıyordum çünkü oturmakta zorlanıyordum.'\n\nMarilynne R., Çocuk Felci Mağduru"
 panum.1003.g: "Hiçbir çare yok mu?"
 panum.1004.t: "Kırık Bir Nesil"
 panum.1004.d: "[SCOPE.sState('panum_disease_state').GetName] bölgesindeki salgın ne kadar uzun sürerse, o kadar belirginleşiyor: Felç ve mutilasyonla yaşamak zorunda kalacak bir nesil ortaya çıkacak."
 panum.1004.f: "'Polio teşhisi aldığım günü çok iyi hatırlıyorum. O sabah okulda beden eğitimi dersindeydim ve dokunma futbolu oynuyorduk. Koşarken bacağımın zayıf olduğunu veya biraz çöktüğünü fark ettim. Çok önemsemedim, ama günün ilerleyen saatlerinde Hibbing'de, Coleraine'de büyüdüğüm yerden yaklaşık 30 mil uzaklıkta, bir polio yardım yürüyüşünde lise bandosunda çalıyordum. Yürüyüş sırasında bacaklarım tekrar zayıf oldu. Öyle ki yürüyüş sırasını bırakmak zorunda kaldım ve okul otobüsüne geri dönüp uzandım.'\n\nDavid K., Çocuk Felci Mağduru"
 panum.1004.g: "Bu etki uzun süre devam edecek..."
 panum.1005.t: "Çocuk Felci Mağdurları"
 panum.1005.d: "Bu salgından kurtulanların içlerinde derin bir öfke taşıdığı söylenir. Bu, hastalığın onları ne kadar harap ettiğine karşı bir tür intikamdır. Ülkemizde giderek daha fazla çocuk felci mağdurları dernekleri kurulmaktadır."
 panum.1005.f: "'Lisede farklı olmak gerçekten zordu. Engelim olmasaydı katılabileceğim birçok etkinliğe katılamadım. Cheerleading denemek isterdim, ama sadece konuştuğum için insanlar dalga geçti. Bu yüzden birçok duyguyu içimde tuttum. Dansa gitmek istemedim çünkü aksiliğim yüzünden kendimi kötü hissediyordum. İnsanların bana bakmasından nefret ediyordum. Şu ana kadar, şort giydiğimde insanların bacağıma bakmasından nefret ediyorum.'\n\nGail B., Çocuk Felci Mağduru"
 panum.1005.g: "Sivil toplum çocuk felciyle mücadeleye destek veriyor."
 panum.1006.t: "Siyasetçi Çocuk Felci Vakfı Kuruyor"
 panum.1006.d: "Yaygın çocuk felci salgını karşısında, yaslı ebeveynler, mutilasyon görenler ve ölüler, [SCOPE.sCharacter('panum_opposition_leader').GetFullName] hastalıkla mücadele etmek için bir vakıf kurma planını ortaya koydu. Eleştirmenler, bunun sadece siyasi itibarını artırmak için olduğunu söylüyor."
 panum.1006.f: "ABD Başkanı Franklin D. Roosevelt 1924'ten itibaren Warm Springs kaplıcalarında düzenli olarak kalmış ve 1945'te burada ölmüştür. 1921'de bacak felci yaşamış, bu omurilik çocuk felci olarak kabul edilmiştir; daha yeni araştırmalara göre Guillain-Barré sendromu olduğu ve o dönemde hâlâ çok az bilindiği anlaşılmıştır. Roosevelt, 1927'de Georgia Warm Springs Vakfı'nı kurmuştur; öncelikli misyonu başlangıçta omurilik felcinin tedavisi olmuştur. Bugün tesis, Roosevelt Warm Springs Rehabilitasyon Enstitüsü adını taşımakta ve yirmi altı farklı departmanda her türlü engelliye bakım sağlamaktadır."
 panum.1006.g: "Gerçek bir hayırsever."
 panum.1006.h: "Ve yaklaşan seçim tamamen tesadüf, değil mi?"
 panum.1009.t: "Halk Panik İçinde"
 panum.1009.d: "[SCOPE.sState('panum_disease_state').GetName] bölgesindeki yerel yönetimin tüm çabalarına rağmen, nüfus salgının en tehlikeli taraflarından biri olan paniğe kapılmaya başladı."
 panum.1009.f: "17 Haziran 1916 Cumartesi günü, Brooklyn, New York'ta resmi olarak çocuk felci salgını ilan edildi. O yıl ABD'de 27.363 vaka ve 7.130 ölüm yaşandı; sadece New York Şehri'nde 2.000'den fazla ölüm gerçekleşti. 1916 salgını geniş çaplı paniğe yol açtı ve binlerce kişi şehri terk edip yakınlardaki dağ tatil beldelerine kaçtı; sinemalar kapatıldı, toplantılar iptal edildi, kamu etkinlikleri neredeyse hiç yapılmadı ve çocuklara çeşmelerden su içmemeleri, lunapark, yüzme havuzu ve plajlardan uzak durmaları söylendi."
 panum.1009.g: "Lanet olası korku!"
 panum.1010.t: "Karantina"
 panum.1010.d: "Polio'nun bulaşıcı bir hastalık olup olmadığı belirsiz olsa da, [SCOPE.sState('panum_disease_state').GetName] bölgesinde hastalığın yayılmasını önlemek için karantina uygulanması yönünde artan sesler duyuluyor."
 panum.1010.f: "Hastalık ansızın ortaya çıktı ve uzun karantina dönemlerini gerektirdi; bu süre zarfında ebeveynler çocuklarından ayrıldı: kimin hastalanacağını ve kimin kurtulacağını söylemek imkansızdı. Onaylanmış polio vakası olan kişilerin isim ve adresleri basında günlük olarak yayımlandı, evleri işaretlendi ve aileleri karantinaya alındı."
 panum.1010.g: "Bu, faydadan çok zarar verir."
 panum.1010.h: "Sıkı bir karantina emri uygula."
 panum.1020.t: "Çocuk Felci Salgını Sona Erdi"
 panum.1020.d: "[SCOPE.sState('panum_disease_state').GetName] bölgesindeki klinikler, çocuk felci vakalarının belirgin şekilde azaldığını bildiriyor. Salgının etkileri yıllarca bölgeyi meşgul etmeye devam edecek."
 panum.1020.f: "'Hastayım değilim. Kırılmışım. Ama, yaşayabildiğim sürece resim yapabildiğim için mutluyum.' -Frida Kahlo"
 panum.1022.t: "Çocuk Felcinin Başlangıcı"
 panum.1022.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bugün erken dönem çocuk felci belirtilerinin kısa bir özetini gönderdi."
 panum.1022.f: "'6 ila 36 ay arasındaki sağlıklı ve çoğunlukla canlı görünen çocuklar, istisnai durumlarda biraz daha büyük olanlar, önceden sağlıklı bir şekilde yaşadıktan sonra hastalanırlar; önceki hafif rahatsızlık belirtileri olup olmadığı fark etmez. Bunlar arasında: gözlerin dönmesi, ani ateş belirtileri, tıkanıklık ve tahriş, ateş, susuzluk, huysuzluk, ağlama, gerçek uyku olmadan uyuklama, bazen akut, döküntülü hastalık süreçlerinin belirtileri yer alabilir. Kısa süre sonra, hafif veya daha şiddetli konvülsiyonlar ortaya çıkar ve kısa veya uzun aralıklarla tekrarlanır.\n\nBazı durumlarda, hastalık belirtiler olmadan aniden ortaya çıkar; konvülsiyonlar veya bulantı, vücudun sarkması, ağız ve burundan köpürme, morarma vb. görülebilir.\n\nAncak bazen, tüm bu belirtiler ya tamamen yoktur ya da çok hafif düzeydedir ve felç yavaş ve fark edilmeden başlar.'"
 panum.1040.t: "Heine-Medin Hastalığı Bilgisine Katkılar"
 panum.1040.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bugün Tıp Fakültesi'ne, çocuk felci salgınlarını kontrol altına almak ve çocuk felci mağdurlarının tedavisini geliştirmek için bir başlangıç noktası olacak devrim niteliğinde bir makale sundu."
 panum.1040.f: "[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] 'Heine-Medin Hastalığı Bilgisine Katkılar' adlı çalışmasında, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çocuk felcini önlemeye ve yayılmasını kontrol altına almaya yardımcı olabilecek çeşitli yöntemlerden bahsetti. Önemli bir bulgu, çocuk felcinin bulaşıcı bir hastalık olduğudur. Bu tedbirlerin yanı sıra, hastalara yardımcı olacak çeşitli yöntemler de vardır. Yüksek proteinli diyetler, fizik tedavi programları ve demir akciğer gibi yeni buluşlar, çocuk felcinin tamamen ortadan kaldırılamasa da gelecekte daha iyi yönetilebileceği konusunda yeni umutlar sunuyor."
 panum.1040.g: "Bir Çocuk Felci Onur Listesi oluşturmamız gerekiyor."
 panum.1041.t: "Fizyoterapi"
 panum.1041.d: "Doktor, polio tedavisine dair [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] önceki bilgilerini tamamen değiştiren bir hemşireyle karşılaşıyor."
 panum.1041.f: "'Ne kadar zamandır bunu yapıyorsunuz?'\n'On yıl, Doktor.'\n'Hastaların altına sıcak ped koyuyorsunuz?'\n'Evet, doktor.'\n'Ve bunun işe yaradığını söylüyorsunuz?'\n'Şüpheciliğiniz başarıyı gölgelemez. Sadece sıcak ped ile ilgili değil. Masaj ve gevşeme egzersizleri gerekir. Atel konmuş bir kas artık gelişmez. Egzersize ihtiyaç duyar.'\n'Hmm...'"
 panum.1041.g: "Ama... çocuk felci hastaları dinlenmeli ve stabilize edilmelidir!"
 panum.1042.t: "Sokak"
 panum.1042.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çocuk felci salgını bölgesini incelerken sistematik bir yaklaşım sergiliyor."
 panum.1042.f: "'Eğer biri [SCOPE.sState('panum_disease_state').GetCityHubName] bölgesinde şiddetle devam eden çocuk felci yayılımını takip ederse, ilginç bir keşfi gözden kaçırmaz. Vakalar inci tanesi gibi birbirine bağlı. Bir yolu takip ederek vakaları yan yana görebilirsiniz. Ben de bölgedeki bir demiryolu hattında kronolojik olarak vakaların dağılımını izleyebildim. Bu tesadüf değil.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’ın günlüğünden, [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1042.g: "Ama bu, bulaşıcı olduğuna dair yeterli kanıt mı?"
 panum.1043.t: "Köy"
 panum.1043.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çocuk felci hastalığının nedenlerini araştırmak için salgın bölgesindeki uzak bir köyü ziyaret etti."
 panum.1043.f: "'Bu köyde 49 vaka mı var?'\n'Belediye başkanı olarak üzülerek söylüyorum, Doktor.'\n'Bu vakaların köyde haritasını çıkarırken herhangi bir şey fark ettiniz mi?'\n'Tüm saygımla, ben bilim insanı değilim.'\n'Hastalıklar tek bir noktadan yayılmış. Köy okulu.'"
 panum.1043.g: "Çocuk felci belki de kalıtsal değil, bulaşıcı mı?"
 panum.1044.t: "Hayırseverlik"
 panum.1044.d: "Çocuk felci mağdurları Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ı ziyaret etti. Çocuk felci araştırmalarıyla ilgili bilimsel çalışmaları desteklemek için bir vakıf kurmak istiyorlar."
 panum.1044.f: "20. yüzyılın başında, çocuk felci bilinmeyen nedenleri nedeniyle toplumun büyük bir kısmını alarma geçiren bir hastalıktı; orta sınıf ve zengin sınıflar bile etkilenebiliyordu. Zenginleşen bazı çocuk felci mağdurları da yaşamları boyunca hastalığa karşı kampanyalar yürüttü ve özel ve devlet girişimlerini destekledi. Çocuk felci, hayırseverliğin büyük rol oynadığı bir hastalıktır."
 panum.1044.g: "Değerli bir destek."
 panum.1044.h: "Para, eşit şekilde aşı araştırmalarına yönlendirilmeli."
 panum.1044.i: "Vakıf fonu, genel araştırmalar için de faydalı olacaktır."
 panum.1045.t: "Antibiyotikler"
 panum.1045.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çocuk felci tedavisinde antibiyotik kullanarak başarı elde etti."
 panum.1045.f: "'Çocuk felci için bir tedavi yok. Ve ne yazık ki, bunun gelecekte mümkün olacağını göremiyorum. Yapılabilecek tek şey önleme, nedenleri araştırma ve yayılmasını engellemek – ve belirtileri hafifletmek için tedavi uygulamak. Antibiyotikler, zayıflamış kasları enfeksiyonlardan korumaya yardımcı olabilir. Bu doğru yönde atılmış bir adımdır. Umarım daha fazlası gelir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’ın günlüğünden, [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1045.g: "Antibiyotiklere şerefe!"
 panum.1046.t: "Toplumsal Dışlanma"
 panum.1046.d: "Bir reform makalesinde, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], akademik meslektaşlarına çocuk felci mağdurlarının topluma yeniden kazandırılmasının sadece hastalığı tedavi etmek veya hafifletmekten daha fazlası olduğunu vurguladı. Bireylerin sosyal damgalanması azaltılmalı – hatta tamamen ortadan kaldırılmalıdır."
 panum.1046.f: "'Benim için en büyük zorluk, okul otobüsüne binmekti. İlk basamak, bir mil gibi görünüyordu ve yapamadım. Bir süre annem geldi, bu çok utanç vericiydi çünkü bir tabure getirdi. Ama utancı kaldıramadım; babam ve otobüs şoförü (adı Bill’di, onu çok iyi hatırlıyorum) bir araya gelip bu sorunu nasıl çözebileceklerini tartıştılar. Babam otobüsün durduğu yere gidip toprağa bir hendek kazdı. Bill, otobüsün ön tekerleğini bu hendeğe soktu ve basamak yere çok yaklaştı. Böylece otobüse rahatça binebildim. Ve kimse gerçekten fark etmedi...'\n\nJennifer W., Çocuk Felci Mağduru"
 panum.1046.g: "Çocuk felci mağdurları ikinci sınıf vatandaş değildir."
 panum.1047.t: "İlerlemenin Bedeli"
 panum.1047.d: "Yıllardır devam eden çocuk felci salgınlarının nedenlerini araştırırken, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hoş olmayan bir gerçekle karşılaştı."
 panum.1047.f: "'Çocuk felci eski zamanlardan beri biliniyor, ama – araştırmamın izin verdiği ölçüde – 19. yüzyıl sonuna kadar bugün olduğu gibi bir salgın hastalık değildi. Eğer doğrulanırsa bunun nedeni paradoksal: daha iyi sağlık hizmetleri. Kanalizasyon ve hijyen öncesinde çocuklar polioya çok daha erken, yaklaşık 6 ay ila 4 yaş arasında maruz kalıyordu. Bu dönemde hastalık daha hafif seyreder ve bağışıklık sağlar. Polioya yakalanan kişi ne kadar yaşlıysa, felç olasılığı o kadar yüksektir. Gelişmiş sağlık standartları, daha az kişinin bağışıklık geliştirmesine ve hastalığın tehlikeli sonuçlarına karşı daha savunmasız olmasına yol açmıştır.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’ın günlüğünden, [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1047.g: "Hastalık, kamu sağlığı iyileştiği için mi yayılıyor?"
 panum.1048.t: "Basil mi, Virüs mü?"
 panum.1048.d: "Poliomyelitis’in etken maddesi hakkında henüz bir şey bilinmiyor. Bu nedenle Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], meslektaşlarıyla hararetli bir tartışma içinde bulunuyor."
 panum.1048.f: "Poliomyelitis uzun zamandır biliniyor ve mikrobiyolojinin gelişimiyle patojen olduğu ortaya çıkmış olsa da, uzun süre boyunca bunun polio bakterisi mi yoksa virüsü mü olduğu konusunda görüşler farklı kaldı."
 panum.1048.g: "Her şey bir virüsü işaret ediyor."
 panum.1048.h: "Bu gereksiz tartışmalar doktorun işine odaklanmasını engelliyor!"
 panum.1049.t: "Tekerlekli Sandalye Kabulü"
 panum.1049.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalara sadece tekerlekli sandalye sağlamanın yeterli olmadığını, ayrıca sosyal olarak kabul edilmeleri gerektiğini keşfetti; böylece çocuk felci mağdurları normal hayata kolayca yeniden katılabilir."
 panum.1049.f: "'Üniversiteye gitme konusunda gerçekten çok naiftim ve üniversitenin tekerlekli sandalye için erişilebilir olmadığını görünce şaşırdım. Ama o zamanlar durum böyleydi. Her yerde basamaklar vardı ve lise gibi değildi; arkadaşlarım beni taşımıyorlardı... Birçok kez, sınıftan sınıfa koşturan insanlardan gönüllü toplamak zorunda kaldım, bazen de 'Vaktim yok, sana yardımcı olamam' dediler. Yurtlar erişilebilir değildi, bu yüzden kampüs dışında bir apartmanda yaşamak zorunda kaldım.'\n\nDavid K., Çocuk Felci Mağduru"
 panum.1049.g: "Daha fazla tekerlekli sandalye kabulü için kampanyayı destekliyoruz."
 panum.1049.h: "Kamu binalarına tekerlekli sandalye rampaları eklemek için bir program finanse et."
 panum.1051.t: "Çocuk Felci Tavsiyesi"
 panum.1051.d: "Çocuk felci hastalığıyla ilgili bir eylem önerisi akademik dünyada dolaşıyor ve Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’ın kendi polio tedavi tezlerini uygulamak için büyük çaba göstermesine neden oluyor."
 panum.1051.f: "'Alt ekstremitelere oksijen verin, pozitif elektrikle. Badem unu kullanarak sık banyo yaptırın veya suyu oksitleyin. Roman papatyası, kaygan karaağaç, arnika, hardal, kantaris, tatlı badem yağı ve özel olarak spikenard yağı ve Xanthoxolinum kompres uygulayın. İçeriden kafein, Fl. Kola, kuru kin şilatı, cinchone iksiri, radyum suyu, altın klorür, kalker likörü ve pepsin şarabı kullanın.'\n\nDr. Angelika Hasenbein, 'Çocuk Felci Salgını (İnfantil Paralizi) Üzerine Monografi'"
 panum.1051.g: "Aslında çok ikna edici görünüyor."
 panum.1052.t: "Alçı ve Destek Aparatları"
 panum.1052.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], birkaç \"çocuk felci uzmanı\"ndan, bacak atellerinin hastalar için başlangıç durumunu iyileştirmenin en iyi yolu olduğunu öğrendi – ama [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ikna olmadı."
 panum.1052.f: "Kalıcı felç yaşayan hastalar, ortezlerle tedavi edildi ve kaybedilen işlevleri, kaliper, koltuk değneği ve tekerlekli sandalyeler yardımıyla telafi etmeyi öğrendiler. Kullanıcının hareketinin kısıtlı olması nedeniyle kas atrofisine yol açma eğiliminde olan sert ortezler ve vücut alçılarının da etkili tedavi olarak övüldüğü belirtiliyor. Bu tedavilerin çoğunun terapötik açıdan çok az değeri olduğu kanıtlanmıştır."
 panum.1052.g: "Belki işe yarıyordur...?"
 panum.1053.t: "Yararsız Cerrahi"
 panum.1053.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], cerrahlar tarafından cerrahi müdahalelerin çocuk felci üzerinde olumlu etkisi olduğuna dair güvence aldı."
 panum.1053.f: "'Polio için cerrahi müdahalelerin başarısını kendime kanıtlamak amacıyla sayısız saatimi meslektaşlarımla röportaj yaparak, kitaplar inceleyerek ve hastaları gözden geçirerek geçirdim. Doktorlar sonuçlarından çok gurur duyuyor. Mutilasyonlarla başa çıkış biçimleri, saat kurmakta olduğuna inanan hassas mekanikçiler gibi. İnsan makineleri üzerinde hassas aletler kullanıyorlar. Ama benim izlenimim, odak noktası hastalıkta veya hastada değil – doktorların itibarında. Şimdiye kadar bu yöntemin gerçekten başarılı bir çocuk felci tedavisine yol açtığı herhangi bir vaka bilmiyorum.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’ın günlüğünden, [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1053.g: "Yanıltıcı bir yönlendirme."
 panum.1054.t: "Konvalesan Serum"
 panum.1054.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], güncel çocuk felci tıbbında etkili bir tedavi olarak kabul edilen çok övülen bir serumu denedi. Meslektaşları yönteme ikna olmuşken, doktor bunu zaman kaybı olarak görüyor."
 panum.1054.f: "'O zamanlar bunun bulaşıcı bir hastalık olduğuna dair bir fikir vardı, bu yüzden bana polio geçirmiş kişilerin kanından yapılan 'konvalesan serum' verildi. O dönemde bu tedavi moda olmuştu. Ancak hastalık, bacaklarımda ve karın kaslarımda hiç hareket olmadan belirgin felçlere ilerlediği için herhangi bir etkisi olması pek olası görünmüyor. İzolasyona alındım ve sanırım bana çocuk felci teşhisi konduğu söylenmişti. Ama poliomyelitis’in ne olduğunu bilmiyordum. Kimse bana infantile paralizi geçirdiğimi söylemedi; bunu Roosevelt’in başkan olduğu dönemde fark ederdim çünkü onun hastalıktan kaynaklı önemli felçler yaşadığını biliyordum.'\n\nRichard O., Çocuk Felci Mağduru"
 panum.1054.g: "Ama her doktor bunu reçete ediyor mu?"
 panum.1055.t: "İzolasyon"
 panum.1055.d: "Bazı çocuk felci uzmanları, uzuvları kısıtlamanın yanı sıra, hastaların tamamen izole edilmesinin de tavsiye edildiğine inanıyor. Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], böyle deneyleri bizzat yaptı ve bunun verimsiz ve insafsız bir terapi olduğu sonucuna vardı."
 panum.1055.f: "'Omurilik ponksiyonu yapıldıktan ve polio teşhisi konduktan hemen sonra, hemen izolasyona alındım ve başımı kaldırmamam söylendi. Beni beşiğe koyduklarını hatırlıyorum! Dokuz yaşındaydım ve neden beşiğe konduğumu anlamadım. Bu çok küçük düşürücüydü. Kesinlikle yataktan çıkmayacaktım, devrilip düşmem de mümkün değildi. Aslında neredeyse hiç hareket edemiyordum. Beşikte yattığım sırada virüsün gerçekten yerleştiğini hissettim. Sanki bir kapı hızla kapanıyordu. Dünyam tamamen değişmiş gibi hissettim. Üstelik hava çok sıcak ve nemliydi; tabii klima yoktu o zamanlar; çok rahatsız hissettiğimi hatırlıyorum...'\n\nSharon K., Çocuk Felci Mağduru"
 panum.1055.g: "Bu kabul edilemez!"
 panum.1055.h: "Bu, ikinci bir kariyerin başlangıcı olabilir."
 panum.1055.i: "Bu kayıtların hızla kaybolmasına izin verin."
 panum.1056.t: "Post-Polio Sendromu"
 panum.1056.d: "Son bir muayene sırasında, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], gerçek çocuk felci enfeksiyonundan sonra post-polio sendromu şeklinde bazı kalıcı etkilerin olabileceğini tespit etti. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] bu gelişme karşısında tamamen umutsuz."
 panum.1056.f: "'Yaklaşık 35 veya 40 yaşımdayken eklem ve kaslarımda korkunç ağrılar yaşamaya başladım. Çok çabuk yoruluyordum. Doktora gittim, röntgen ve kan testleri yaptırdım. Bazı ilaçlar aldım ve fizik tedavi gördüm. Hiçbir şey işe yaramadı.\nKayıtları bulmalarını beklerken, bana yardımcı olan kişiye bütün bu yeni ağrıları yaşadığımı ve kayıtların nedenini açıklamaya yardımcı olabileceğini umduğumu anlattım. Bana post-polio sendromunu duydun mu diye sordu. 'Hayır, nedir o?' dedim. Bana, çocuk felci geçirdikten 30-40 yıl sonra tekrar yaşanıyormuş gibi bir durum olduğunu açıkladı.\nÇocuk felci ile yeniden uğraşmayı düşünmek dayanamayacağım bir durumdu. Kendimi tamamen çökerttim. Kayınvalideme durumu anlattım, aileme de söyledim. Çok ağladım. Yerel doktorlarıma tıbbi kayıtlarımı gösterdim ve Sister Kenny Enstitüsü’ndeki randevumu anlattım. Tekrar söylediler ki, çocuk felci artık geçmişte kalmış. Ben de 'Evet, ama ben şimdi buradayım ve yeniden yaşıyorum!' dedim.'\n\nJanice G., Çocuk Felci Mağduru"
 panum.1056.g: "Ne kadar umutsuz bir durum."
 panum.1061.t: "Deneyler"
 panum.1061.d: "Şüpheli ama bir o kadar da başarılı bir deneyde, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], maymunları çocuk felci ile enfekte etti."
 panum.1061.f: "'Yakın zamanda, Jean-Antoine Villemin’in tüberkülozun bulaşıcı olduğunu kanıtlamak için uyguladığı bir prosedürü okudum. Tavşanlar üzerinde deneyler yaptı; onları tüberküloz hastalarının dokusuyla kasıtlı olarak temas ettirdi. Onlarca ölü tavşandan sonra, tezini kanıtlamayı başardı. Benim maymunlarla yaptığım deney benzer bir varsayıma dayanıyor.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’ın günlüğünden, [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1061.g: "Eğer hayvanlar enfekte olabiliyorsa, insanlar da birbirine bulaşabilir."
 panum.1062.t: "Demir Akciğer"
 panum.1062.d: "Dahi mühendis [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'a çocuk felci tedavisinde devrim yaratan zekice bir cihaz inşa etmede yardımcı oldu."
 panum.1062.f: "Demir akciğer, insanın mekanik ventilasyonunu sağlayan ilk klinik cihazlardan biriydi. 1920 civarında Amerikalı mühendis Philip Drinker tarafından akciğer hastalıkları olan hastaları solutmak için geliştirildi. Hastanın başı dışında tüm vücudu boş bir silindirin içinde yer alır. Cihaz boynu hava geçirmez şekilde kapatır ve negatif basınç oluşturur. Bu, çevresel basıncın havayı hastanın burun ve ağzından akciğerlere zorlamasını sağlar. Nefes verme, odadaki fazla basınç birikmesiyle gerçekleşir. Birçok çocuk felci hastası yalnızca hastalığın akut evresinde demir akciğeri kullanmış, kas fonksiyonu geri dönene kadar. Bazı hastalar yalnızca gece boyunca, bazıları ise sürekli olarak kullandı."
 panum.1062.g: "Bu, pek çok hayatı kurtarabilir."
 panum.1063.t: "Psikolojik Destek"
 panum.1063.d: "Psikiyatrist olarak Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], deneyimlerini kullanarak çocuk felci hastalarının yaşamını kolaylaştırdı."
 panum.1063.f: "'Poliomyelit söz konusu olduğunda, hastalığın fiziksel bileşenine haklı olarak dikkat ediyoruz. Ama hasar görmüş bedenin yanında hasar görmüş bir ruh var. Polio sadece fiziksel izler bırakmaz. Özellikle çocuklarla çalışırken, bu korkunç hastalığın onların özel ve sosyal yaşamları üzerindeki etkisini deneyimledim. Kelimeler iyileştiremez. Ama rahatlama sağlayabilirler. Ve hayatta kalmakla kalmayıp hayatta kalma iradesine sahip olmaları için mağdurlara perspektif vermeliyiz.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’ın günlüğünden, [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1063.g: "Teşekkürler, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.1064.t: "Diyet"
 panum.1064.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çocuk felci hastaları için besleyici bir diyeti savunuyor."
 panum.1064.f: "'Raşitizm, iyot eksikliği, skorbüt ve pellegra ile mücadeledeki önceki başarılar, beslenmemizin hastalıklarla mücadelede belirleyici bir rol oynayabileceğini gösterdi. Polio bir eksiklik hastalığı değildir. Ama proteinlerin kas yapımında önemli rol oynadığı bilinmektedir; bu nedenle, çocuk felci hastalarının diyeti normal insanlardan daha zengin olmalıdır.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]’ın günlüğünden, [SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1064.g: "Nihayet, T-bone bifteği yemek için doktor onayı."
