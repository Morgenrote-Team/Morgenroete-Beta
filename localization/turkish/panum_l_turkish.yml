 panum.21.t: "Hastaların Dağıtılması"
 panum.21.d: "Doktor Hasnebein, hastaları ve yaralıları yaralanma şiddetine göre ayıran modern bir sistem geliştirerek hastaların hayatta kalma şansını artırmakla tanınıyor."
 panum.21.f: "Kafkas ve Kırım Savaşlarındaki deneyimlerinden yola çıkarak, Rus cerrah Nikolai Ivanovich Pirogov, aşamalı cerrahi tedavi prosedürlerini ve 'hastaların dağıtılması' ilkesini (yaralı ve hastaların dağıtık tedavisi) geliştirdi; bu sayede kalabalık pansuman alanlarını düzenleyip yaralıları beş aşamaya ayırdı (Pirogov'un tarama prensibi). Prusya ordusu, 1866'da Rus prensibini benimsedi ve daha sonra Avrupa'daki müttefik orduların diğer tıbbi hizmetlerinde de uygulandı. İlerleyen dönemde, tıp ve cerrahi yöntemlerdeki birçok gelişme de askeri tıbbi hizmet organizasyonuna aktarıldı. Ancak Pirogov'un prensibi I. Dünya Savaşı boyunca değişmeden kaldı."
 panum.21.g: "Yani hastalar arasında bir hiyerarşi var?"
 panum.22.t: "Sıtma Tedavisi"
 panum.22.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], cinchona ağacı kabuğundan etkin bir şekilde kinine çıkararak sıtmaya karşı yardımcı olan bir tedavi yöntemi geliştirdi."
 panum.22.f: "Cizvitler, erken modern dönemde cinchona kullanımında fiilen tekel sahibi olmuştu, bazı Protestan ülkelerde başlangıçta çekinceler olsa da. 19. yüzyıl başında, morfinin keşfinden kısa bir süre sonra, cinchona kabuğunun etkinliğini belirleyen madde olarak kinine bulundu ve bu, bitki kimyasının yükselen temeli haline geldi. 1792'de Antoine François de Fourcroy tarafından saf olmayan bir durumda üretildi ve 1820'de Pierre Joseph Pelletier ve Joseph Bienaimé Caventou tarafından alkol ile cinchona kabuğundan izole edildi. 1823'te kinine, eczacı Friedrich Koch tarafından Cinchona türlerinin kabuğundan endüstriyel ölçekte ilk kez elde edildi. Kinine daha sonra bitki kimyası araştırmalarını teşvik etti."
 panum.22.g: "Değerli bir ilaç."
 panum.23.t: "Sadece Farklı Bir Hasta Kategorisi"
 panum.23.d: "Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sent an urgent letter to the government today. In it [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] criticizes the treatment of mentally ill people and advocates treating them as patients who deserve better treatment - and not as antisocial people who need to be excluded from society."
 panum.23.f: "Hastaların psikolojik tedavisinde ilk kararlı adım, 18. yüzyılda atıldı; o dönemde akıl hastaları ve sıradan mahkumlar artık aynı odalarda 'tutulmuyor', ayrı kurumlar moda haline geliyordu. Bunlar hâlâ insani standartların çok altındaydı. Bir sonraki adımda, delilerin zincire vurulduğu ağır buz zincirleri kaldırılarak daha fazla hareket özgürlüğü sağlandı. 19. yüzyıl başından itibaren bu kişilerin de hasta olduğu ve tedavi hakkına sahip olduğu açıkça görüldü. İngiltere'de 1845 Lunacy Act, akıl hastalarının statüsünü açıkça hasta olarak değiştirdiği için önemli bir dönüm noktasıydı."
 panum.23.g: "Bu insanların zihinsel yaşamı da önemlidir."
 panum.24.t: "Tıbbi ve Hemşirelik Bilgisi"
 panum.24.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], daha az nitelikli personelin bazen savaş alanındaki çok sayıda kurban için hemşire olarak çok faydalı olabileceğini hatırlattı ve kadınların hemşire olarak daha fazla kullanılmasını savundu."
 panum.24.f: "Diğer Avrupa ülkelerinde, özellikle Fransa ve Almanya'da, Katolik tarikatlar hemşire yetiştirmeyi misyon edindi, ama İngiltere veya diğer Protestan ülkelerde bunun çok azı gerçekleşti. İngiliz Reformu sırasında çok az manastır ve tarikat hayatta kaldı. İngiliz kamuoyu bunu Florence Nightingale'in yayınları aracılığıyla acı bir şekilde fark etti. Hemşire personelin eğitimi, bağış toplanan ulusal bir görev olarak görüldü. Londra’daki St Thomas Hastanesi’ndeki Nightingale Hemşirelik Okulu, Nightingale tarafından kuruldu ve bu profesyonelleşmenin çekirdeği oldu. 'Doktorlar hastalıkla uğraşır, hemşireler insanlarla' cümlesiyle hemşirelik felsefesinin temelini attığı söylenir."
 panum.24.g: "Kadınlar öne."
 je_panum_spanish_flu_research: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Gribi: Araştırma"
 je_panum_spanish_flu_research_reason: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], gizemli pandemiyi daha detaylı araştırmaya karar verdi. Ne kadar başarılı olacağı [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] için belirsiz. Ancak deneyimli bir doktorun başarı şansı daha yüksek olmalıdır."
 je_panum_spanish_flu_research_complete_tt: "Bir [concept_panum_physician], pandemiden yeni bilgiler elde edebilir: örneğin, hastalığın kökeni, bir tanımı veya hatta patojeni."
