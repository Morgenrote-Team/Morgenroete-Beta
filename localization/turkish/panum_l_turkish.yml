 panum.1007.t: "Polio Kliniği"
 panum.1007.d: "[SCOPE.sCharacter('panum_polio_nurse').GetFirstName] adlı hemşire, [SCOPE.sState('panum_disease_state').GetName]’de çok sayıda hastaya bakabilmek için bir polio kliniği kurdu."
 panum.1007.f: "'Çok uzun boylu ve zarif bir kadındı, tavırları ve duruşuyla güven aşılıyordu. Konuşurkenki hoş aksanı onu dinlemeyi keyifli kılıyordu. Gözlerimi kapatsam hâlâ siyah uzun elbisesi ve büyük, güzel bir deve kuşu tüyü olan şapkasıyla yatağımın yanında durduğunu hayal edebiliyorum... Takı takmazdı, makyaj yapmazdı. Yüzü güçlü ve köşeliydi, gözleri çok etkileyiciydi. Gözlerine baktığında tüm dikkatinizi talep ederdi ve konuştuğunda herkes dinlerdi... Kim sorumluysa herkes bilirdi ve önerdiği tedaviyi alırdık. Onun kadar kararlı birini hiç tanımadım.'\n\nRay G., Polio Kurtulanı"
 panum.1007.g: "Teşekkürler, Hemşire [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]."
 panum.1008.t: "Polio Depresyonu"
 panum.1008.d: "Hayat boyu sakat kalan çok sayıda çocuk sadece bir sonraki neslin fiziksel sağlığını değil, aynı zamanda hükümeti yetersiz bulup suçlayan ebeveynleri de etkiliyor."
 panum.1008.f: "'İlk kez ortezimi okula taktığım günü çok net hatırlıyorum. Gün ortasıydı. Görünüşe göre sabah doktora ortezin ölçüsünü almak için gitmiştim. Annem beni kapıya bıraktı ve uzaklaşırken gözlerinde yaş vardı.'\n\nEdmund Sass, Polio Kurtulanı"
 panum.1008.g: "Mantıksız, ama anlaşılmaz değil."
