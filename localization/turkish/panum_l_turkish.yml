 panum.440.t: "Tifüs – Sosyal Bir Sorun"
 panum.440.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] adlı tezinde, tifüsün, siyasi ve sosyal güçler iş birliği yaptığında önlenebilir bir hastalık olduğunu özellikle vurguladı."
 panum.440.f: "'Dar ve sıkışık yaşam alanları, bitli giysiler ve bakımsız apartmanlar veya asker odaları bana unutulmaz bir görüntü sundu. Tifüs ateşi her yerde vardı. İnsanlar aynı sıkışık koşullarda ama hastane odasının hijyenik koşulları altında yaşadığında, yayılma gözlemlenemedi. Tıbbın yalnızca bireyi ilgilendiren bir bakım olarak düşünülmemesi, kamu sağlığı bağlamında ele alınması gerekir; bu, aynı zamanda sosyal sorunların çözülmesini de içerir. Son zamanlarda gördüğümüz gibi, tifüs salgını ancak yoksulluk ve eğitim eksikliği gibi yaşam koşullarında ortaya çıkmıştır. Bu koşulları ortadan kaldırın ve eminim ki hastalıkla mücadelede önemli gelişmeler göreceğiz.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in hükümete yazdığı memorandumdan"
 panum.440.g: "Tifüs korkutuculuğunu kaybediyor."
 panum.441.t: "Bir Otopsi"
 panum.441.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]'de tifüsten ölenler üzerinde birçok otopsi yaptı ve önemli bulgular elde etti."
 panum.441.f: "'Tifo ateşi ile tifüsün iki farklı hastalık olduğu uzun süredir biliniyor. Ancak hâlâ, kötü beslenme, bağırsak enfeksiyonu veya en azından beslenme eksikliğinin tifüs salgını ile ilişkili olabileceğini düşünen birkaç araştırmacı var. Diyet nedenleri hâlâ birçok hastalığın olası sebebi olarak görülmektedir. İncelemelerimde sindirim sistemiyle ilgili herhangi bir bulguya rastlamadım. Tifüs ateşi, diyet veya sindirimle ilgili değildir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] otopsi raporundan"
 panum.441.g: "Peki ama sebebi ne olabilir?"
 panum.442.t: "Yıkanmamış ve Matlaşmış"
 panum.442.d: "Tifüs salgınının nedenini araştırırken, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], önceki bulguların sorgulanması gerektiğini fark etti."
 panum.442.f: "'Kariyerim boyunca birkaç kez, kötü hijyenin miasma veya mikropların – insanların inandığı şey ne olursa olsun – giysilerde yerleşip hastalığa katkıda bulunduğunu duydum. Ayrıntılarda bu sorgulanabilir, ancak temel ifadede doğru. Askerler, mahkumlar, yoksullar, suçlular ve fahişeler tifüs salgınının klasik kurbanlarıdır. Ancak yıkanmamış yoksullar bunu isteyerek mi yapıyor, yoksa yoksulluk nedeniyle mi yıkanamıyorlar? Tüberkülozun yalnızca sanatçılar hastalığı olduğunu düşünmek istemem, tifüsün de yalnızca ahlaken kötü olan suçluları etkilediğini düşünmediğim gibi. Bu salgında etkilenmeyen birçok zengin suçlu var. Kendilerini başkaları için feda eden masum rahipler de tifüse yakalanıyor. Peki, kurbanlar arasında daha ikna edici bağlantı nedir?'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüklerinden"
 panum.442.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], tifüsün dürüst insanları da etkileyebileceğini mi iddia etmeye çalışıyor?"
 panum.443.t: "Sıcak ve Soğuk"
 panum.443.d: "Tifüs hastası ailelerin evlerini birkaç kez ziyaret ettikten sonra, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tifüsün sıklıkla iddia edildiği gibi mevsimsel bir hastalık olmadığı sonucuna varıyor."
 panum.443.f: "'Mevsimsel hastalıklar vardır ve tifüs için de durum böyle görünüyor. Önceki raporlar, daha soğuk mevsimlerde artış olduğunu gösteriyor; buna yağmurlu bir ilkbahar veya sonbahar da dahil olabilir. Soğuk ve sıcaklığın hastalığı etkilediği kanıtlanmıştır. Mevsimlere bağlı olup olmadığı ise tartışmalıdır. Sıkışık ve ısıtmalı bir odada da aynı derecede sıcak olabilir. Hastalık aynı anda tüm yerlerde ortaya çıkmadı. Eğer öyle olsaydı, bir şehrin belirli bölgeleri değil, tüm şehir aynı şekilde etkilenirdi. Ancak hastalık her zaman insanların sıkışık olduğu yerlerde ortaya çıktı. Bunu birkaç ev ziyareti sırasında belirleyebildim.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüklerinden"
 panum.443.g: "Bu, önceki araştırmalarla çelişiyor."
 panum.444.t: "Ter ve Nefes"
 panum.444.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tifüsün, tüm koşullar henüz tam olarak açıklanmasa da, bulaşıcı bir hastalık olduğuna artık tamamen ikna oldu."
 panum.444.f: "'Araştırmama başladığımda, tifüsün bulaşıcı bir hastalık olmadığına kesin olarak inanıyordum. Ancak ailemde tifüs vakaları arttıkça, hastalığın bulaşıcı olduğuna tamamen inandım ve terin bulaştırıcı etkisini vurguluyorum. Ölmekte olan bir hastayı tıraş eden erkek hemşireyi gördüm; hemşire hastanın nefesini soludu ve hastanın nefesini 'iğrenç bir tat' olarak tanımladı, hemen hastalandı. Benzer şekilde, başka bir hastayı destekleyen bir asistan hastanın keskin terini cildinde hissetti ve hemen tifüs belirtileri gösterdi. Tifüs hastalarına yakın olmanın hastalığa yakalanma riskini artırdığı açıktır.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'ın [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden"
 panum.444.g: "Bu faydalı olabilir ama gerçekten kişiden kişiye mi geçiyor?"
 panum.445.t: "Acı mı Sebep?"
 panum.445.d: "[SCOPE.sState('panum_disease_state').GetCityHubName]'da bir meslektaşıyla yaşanan hararetli tartışmada, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] onun teorilerini çürüttü."
 panum.445.f: "'Bu özel bir tifüs türü mü, açlık tifüsü.'\n\n'Açlık tifüsü?'\n\n'Tifüsün görüldüğü her yerde, kötü beslenme hakimdir. Buna göre açlık, yani kıtlık, tifüs için bir tetikleyicidir. Kan değişikliklerinin de bunda bir rolü olabilir.'\n\n'1726, 1727 ve 1728 yılları kıtlık yıllarıydı, ama tifüs olmadı. 1829 refah yılıydı, ama tifüs vardı. Zayıf bir vücudun daha kolay hastalanması anlaşılabilir - ama neden?'"
 panum.445.g: "'Açlık ateşi' terimi bu nedenle yanlış."
 panum.446.t: "Yer Değil, Durum Önemli"
 panum.446.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], tifüste önemli olanın insanların nasıl yaşadığı değil, nerede yaşadıkları olduğunu düşünüyor."
 panum.446.f: "'[SCOPE.sState('panum_disease_state').GetCityHubName]'ı ziyaretim sırasında, hastalığın şehrin yalnızca bir bölgesini etkilediğini keşfettim. Bu bölge yoksulluk ve ahlaki bozulmayla tanınıyor, bu da tifüsün ahlaki olarak düşük bireylerin hastalığı olduğu teorilerini desteklemişti. Ancak benim gözlemlerime göre, etkilenmiş olanlar için yoğun nüfuslu mahalle ve ekonomik durum önemlidir. Bana göre, hastalığın yayılması ahlaki bozulma ile değil, fiziksel yakınlıkla ilgilidir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'ın [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden"
 panum.446.g: "Bu en azından teorik olarak hastalığın üstesinden gelinebileceği anlamına geliyor..."
 panum.447.t: "Bitler"
 panum.447.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kanıtlayamasa da tifüs hastalığı anlayışını değiştirebilecek oldukça tartışmalı bir teori öne sürdü."
 panum.447.f: "'Gözlemlerimde fark ettiğim bir şey varsa, neredeyse tüm hastaların bitlerle kaplı olmasıydı. İster kalabalık kışlalardaki askerler, ister çok çocuklu aileler, ister harabe hücrelerdeki mahkumlar. Bunun tesadüf olduğuna artık inanmıyorum. Elbette kanıtım yok. Son yıllarda birçok bilim insanı, hastalıkların hayvanlardan insanlara geçebileceğini defalarca kanıtladı. Eğer bu durumda farklıysa, aksi kanıtlanmasını memnuniyetle kabul ederim. Şimdilik, tifüs gizeminin bitlerin rolü incelenmeden çözülemeyeceğine inanıyorum.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'ın [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden"
 panum.447.g: "Böylesine küçük bir şey nasıl bu kadar yıkıcı olabilir?"
 panum.447.h: "Böylesine küçük bir şey mutlaka büyük yıkıma yol açar."
 panum.448.t: "Hijyenik bir hastane"
 panum.448.d: "Örnek bir hastaneyi ziyaret sırasında, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastalığın uygun koşullar altında minimal olarak bulaştığını gösterebildi."
 panum.448.f: "'Hastalar buraya ve oraya götürülmeye başlandığında, enfeksiyon olasılığı nedeniyle durumun kötüleşebileceğinden korkuluyordu. Epideminin daha büyük bir şiddetle vuracağı yeni enfeksiyon kaynaklarının oluşabileceği varsayıldı. Bunların hiçbiri olmadı, buna rağmen bu tür etkiler birçok ateşhanede gözlemlenmişti. Diğer durumlarda gözlemlediğim gibi, daha uygun hijyen koşulları fark yaratıyordu.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'ın [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden"
 panum.448.g: "Yani dar alan değil, koşullar önemli."
 panum.449.t: "Epidemi Yardımı"
 panum.449.d: "[SCOPE.sState('panum_disease_state').GetCityHubName]'a yiyecek, battaniye ve ilaç ulaştırarak, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] epideminin biraz da olsa yatışmasını sağladı."
 panum.449.f: "'Basit gelebilir, ama geçen hafta, sakinlerin sıkıntısını hafifletmek amacıyla gönderilen yardım malzemeleri sayesinde hastalık vakaları azaldı. Benzer durum, geçmişte tifüsün yayıldığı diğer bölgelerde de gözlemlenmişti. Yardım görevlileri pirinç ve bezelye dağıttı, geçici çadır hastaneler kurdu ve ayrıca ilaç ve yeni giysiler getirdi. Bu olay en çok şunu kanıtlıyor: tifüs kalıtsal bir hastalık değildir. Kesinlikle çevresel faktörlere bağlıdır.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'ın Dr. Dementive'ye yazdığı bir mektuptan"
 panum.449.g: "Bazen çözümün tek yolu dışlama kriterlerini kullanmaktır."
 panum.450.t: "Kirli Giysiler?"
 panum.450.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ateşhanede benzer vakalara rastladı."
 panum.450.f: "'Bu iddia edilen bir bulaşmanın kanıtı mı? Şüphe yok ki bu vaka, diğer yerlerde yaşadığım çok benzer deneyimlerle uyumlu. Bazen paltolar, bazen ceketler veya gömlekler. Tifüs hastasının bir kardeşi paltosunu aldı. Birkaç gün sonra o da hastalandı. Paltoyla oynayan çocukların da benzer şekilde enfekte olduğu söyleniyor. Fakir sınıflarda, özellikle soğuk mevsimlerde, giysilerin akrabalardan geçirilmesi oldukça yaygındır. Giysiler bulaşmış mı değil mi – giysi değiştirmek tifüsten kaçınmak için mantıklı önlemlerden biridir.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'ın [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden"
 panum.450.g: "Erkekler çorap ve iç çamaşırlarını mı değiştirmeli? İmkânsız!"
 panum.451.t: "Tifüs İklimi"
 panum.451.d: "Yabancı bir doktor tifüsün kökeniyle ilgili yeni bir hipotez sunduktan sonra, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kendi araştırmalarını sorgulamaya başladı."
 panum.451.f: "'İki gün önce bir 'meslektaşım' tifüsün nedenleri üzerine yazdığı kitabı bana gönderdi. Oldukça şaşırdım, demoralize olduğumu söylemeden edemem. Hastalığın gelişimi ile hava durumu ve iklim koşulları arasındaki ilişkiyi çok hassas ve titiz bir şekilde formüle etmiş. Buna göre, topraktaki nem nedeniyle miasma oluşuyor ve sonra havaya yükseliyor. Bu, tifüsün soğuk ve nemli aylarda sık görülmesini açıklayabilir. Yani sonuçta miasma mı?' \n\n[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'ın günlüğünden"
 panum.451.g: "Ama bu gerçekten doğru çözüm mü?"
 panum.452.t: "Çürüme"
 panum.452.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın son zamanlarda özetlediği bazı bulgular, önceki teorisiyle hiç uyuşmuyor."
 panum.452.f: "'Şimdiye kadar çürüme süreçlerinin hastalığın yayılmasında kritik rol oynadığı teorisini fazla önemsemedim. Ama nereye gidersem gideyim, tifüsün yayıldığı her yerde hayvanlar, buharlar, insan, hayvan ve bitki materyalleri buluyorum. Acaba gerçekten çözülüp geriye miasma – ya da belki zehirler mi bırakıyor?' \n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName] günlüğünden"
 panum.452.g: "Hoş olmayan bir gerileme."
 panum.453.t: "Negatif Hava Akımları"
 panum.453.d: "Almanya’da tanınmış bir doktorun yayını, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın bugüne kadar ilerlemesini sarstı. Böylece tifüsün oluşumunda hava akımlarının rolü kanıtlanmış oldu."
 panum.453.f: "'Böylesine sıcak ve nemli hava, ekvator hava akımıyla kuzey enlemlerine taşınabilir ve sonra güney ve batı rüzgarlarının hakimiyetinde, nispeten sıcak mevsimlerde tifüsün patlak verdiğini görebiliriz. Bu ilişki, yaz aylarında güneş kuzeydeyken, Akdeniz kıyılarının ticaret rüzgarlarının genişlemesine dahil olduğu ve ülkemizde kuzey akımıyla mücadelenin değişken yağışlı bir mevsimde gerçekleştiği durumlarda en mükemmel biçimde gözlemlenir. İşte yaz ve erken sonbahar tifüs salgınları bu şekilde açıklanabilir.' \n\nDr. Angelika Hasenbein, 'Hava Akımları Tifüse Nasıl Sebep Olur ve Sonbahar Yağmuru Grip Nasıl Yapar'"
 panum.453.g: "Bu aslında oldukça ikna edici."
 panum.454.t: "Hasta"
 panum.454.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] birkaç gündür kendini kötü hissediyor. Acaba [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] enfekte oldu mu?"
 panum.454.f: "'Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nerede? Bugün beşinci odadaki tifüs hastasını ziyaret etmek istedi mi?' \n\n'Görünüşe göre doktor [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] hasta.'"
 panum.454.g: "Doktor dinlenmeli."
 panum.454.h: "Doktor çalışmaya devam etmeli!"
 panum.455.t: "Belgeler Kayboldu"
 panum.455.d: "Doktor, tifüs tedavisinin geliştirilmesinde yardımcı olabilecek bazı notlarını savurdu."
 panum.455.f: "- - - - - - - - -\n\n- - - - - - - - -\n\n- - - - - - - - -\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın günlüğünden DEĞİLDİR"
 panum.455.g: "Ne kadar utanç verici."
 panum.461.t: "Sınıflar ve Evler"
 panum.461.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]’da yaşayan farklı tifüs hastalarını, nerede yaşadıklarını ve yaşam standartlarını gösteren bir tablo oluşturdu. Bu nedenle tifüs ateşi 'sosyal' bir hastalıktır."
 panum.461.f: "'İstatistik tablolar, apartmanların sakinlerin sağlığı üzerindeki etkisinin ne kadar büyük olduğunu gösteriyor. Örneğin, ŞEHİR banliyösünde yapılan bir çalışmada, ikinci sınıf sokaklarda ölüm oranının %18, üçüncü sınıf sokaklarda ise %68 daha yüksek olduğunu ve ikinci sınıf evlerde ölüm oranının %31, üçüncü sınıf evlerde ise %78 daha yüksek olduğunu tespit ettim. Geliştirilen fakir yolların ölüm oranında %25’lik bir iyileşme gözlemlendi.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın ' [SCOPE.sState('panum_disease_state').GetCityHubName] Tifüs Salgınına Dair Tablolar ve İstatistikler'"
 panum.461.g: "Demek doktor aynı zamanda bir sosyal eleştirmen?"
 panum_typhus: "Tifüs"
 panum_typhus_desc: "Bu kişi, tehlikeli bir hastalık olan tifüsten muzdarip."
 panum.12.t: "İlk Aşı"
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName], çığır açan bir buluş yaptı. Yeni bir işlem olan aşılama yöntemiyle, korkulan çiçek hastalığına karşı etkili bir korunma aracı geliştirmeyi başardı."
 panum.12.f: "Edward Jenner'in biyografi yazarı John Baron’a göre, Jenner, çiçek hastalığına yakalanmadıkları düşünülen sütçü kızların inancı ('sütçü kızı miti') üzerinden faydalandı. John Fewster, daha önce (zararsız) çiçek hastalığı geçiren bir hastanın çiçek hastalığına karşı bağışık olduğunu gözlemlemişti. Jenner, çiçek aşısı ile bağışıklık kazanılabileceğini ve dolayısıyla çiçek hastalığından korunulabileceğini varsaydı. Jenner, öncelikle çiçek veya at çiçeği geçirmiş, ancak daha sonra bağışık oldukları kanıtlanmış kişilerin vaka ve gözlem çalışmalarını topladı. 14 Mayıs 1796’da, 8 yaşındaki James Phipps’i, çiçek hastalığı geçirmiş sütçü kız Sarah Nelmes’in elinden alınan çiçek aşısı virüsleriyle aşıladı. Yaklaşık altı hafta sonra, 1 Temmuz 1796’da Phipps’i çiçek hastalığıyla inoküle etti; ve bağışık olduğunu kanıtladı."
 panum.12.g: "Tıbbın bir kahramanı!"
 je_panum_vaccine: "Aşı"
 je_panum_vaccine_reason: "Ülkemiz, ilk kez bilinen bir aşıyı ülkeye getirme ve ulusal çapta dağıtma sürecinde."
 je_panum_vaccine_success: "[GetPlayer.GetName], en az #ORANGE 4 Aşı İpucu# topladı!"
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName], en az #ORANGE 3 Tedavi İpucu# topladı!"
 panum.351.t: "Eski Düşman"
 panum.351.d: "Belki de insanlık tarihinin en ölümcül hastalığı olan çiçek hastalığı, topraklarımızda yeniden ortaya çıktı."
 panum.351.f: "Çiçek hastalığı, tanıdık ve tehlikeli bir düşmandır. [GetPlayer.GetName] topraklarında hızla yayılırken, enfekte olanların üçte birinin hayatını alabilir ve diğerlerini ömür boyu kör bırakabilir. Enfekte olanların neredeyse tamamı, bu katilin vücudunda - yüz ve bedenlerindeki ikonik izlerle - ölümsüz, çaresiz bir hastalığın sembolünü taşır. Tarihin her köşesini dolaşmış, imparatorlukları yerle bir etmiş, milyonlarca insanı öldürmüş ve en büyük liderleri boyun eğdirmiştir. İnsan nereye gitse, çiçek hastalığı da peşinden gelir, avını hiç bırakmayan bir avcıdır.\n\nŞimdi, topraklarımızda, yeni kurbanlar bulmuş, endemik formdan çıkıp yeniden salgın haline gelmiştir."
 panum.351.g: "Ve böylece çiçek hastalığına karşı yine savaşa başlıyoruz..."
 panum.352.t: "Çiçek Hastalığı Tedavisi Söylentileri"
 panum.352.d: "Çiçek hastalığına yönelik bir tedavi söylentileri üzerine, halkımız, kabarcıklarla ilgili tuhaf yöntemleri denemeye başladı!"
 panum.352.f: "Çiçek hastalığına yakalanmış kişilerin kabuklarını yiyen bir bilgiliyi görmek hem tiksindirici hem de korkutucu olabilir, ama bu, çaresiz bir insanın umutsuzca tutunduğu bir tedavidir. Dünyanın başka bir yerinde bu korkunç hastalığın tedavisine dair söylentiler vardır ve iddiaya göre, benzer şekilde çalışmaktadır... ama nasıl? Hangi sihirler, hangi bilim bu korkunç hastalıktan kurtarabilir? Avrupa’nın uzak bölgelerinden gelen haberler, çiçek hastalığının geri çekildiğini, tüm şehirlerin tek bir vaka olmadan yaşayabildiğini söylüyor.\n\nBazıları için bu umut vericidir. Orada yenilebiliyorsa, burada da yenebiliriz.\n\nBazıları için bu bir yalandır. En büyük zekâlarımız hala bir tedavi bulamadı, ama belki, belki..."
 panum.352.g: "...başardılar da biz mi başaramadık?"
 panum.353.t: "Çiçek Hastalığının Felaketi"
 panum.353.d: "Tedavi edilmezse ve edilemezse, çiçek hastalığı toplumumuzu yok ediyor... özellikle de çocuklarımızı."
 panum.353.f: "Ağlamalar. Feryatlar. Umutsuzca çırpınan, son nefeslerini vermeden hemen önce çaresizlik içinde bağıran insanlar. Babalar yumruklarını duvarlara vuracak, avuçları kanla kızaracak, parmakları kırılacak. Anneler, bir son dokunuş, bir son okşama için hemşireleri itecektir. Bunlar [GetPlayer.GetName]’da sıkça görülen sahnelerdir, çünkü çiçek hastalığı en savunmasızlarımız olan çocuklarımıza musallat olur. Çiçek hastalığına yakalanan bebeklerin %80’den fazlası ölecek, bu hastalık topraklarımızın geleceğini kesip geçecektir.\n\nVe tedavi olmadığında, yapabileceğimiz tek şey, kaybedilen hayatlar için ağlamaktır."
 panum.353.g: "Bu kabustan bir son olmalı..."
 panum.354.t: "Çiçek Hastalığı Aşısı"
 panum.354.d: "Diplomatlarımız sadece haber değil, çiçek hastalığına karşı bir 'aşı' örneği de getiriyor!"
 panum.354.f_generic: "Uzak Avrupa'ya yapılan bir ziyarette, heyetimiz büyüleyici bir şey keşfetti - çiçek hastalığı için *işleyen* bir tedaviye sahipler gibi görünüyor. Gerçekte, bu hastalığın tarihini öğrenmişler! Görünüşe göre, iyileşmekte olan hastalılardan alınan kurutulmuş çiçek kabuklarıyla çocuklara daha hafif bir hastalık formu verme uygulaması, Osmanlı İmparatorluğu'nda gözlemlenmişti... ancak bu tehlikeli ve kusurlu bir çözümdü; şeytanla dans gibiydi - fazla yaklaşırsa çiçek hastalığı seni alır, aksi halde üstesinden gelmen de mümkün olurdu.\n\nBugün ise Avrupalıların geliştirdiği yöntem, neredeyse zararsız olan inek çiçeğini, ölümcül ağabeyi olan çiçek hastalığına karşı bir koruma aracı olarak kullanmak. Bu, çiçek hastalığına karşı güvenli, ekonomik ve pratik olarak garanti bir kalkan sağlıyor.\n\nİlk başta inanılması güç olsa da, şüpheci hekimlerimiz bu tedaviyi kendi üzerlerinde test ettiler... ve *işliyor*. Tarihimizde ilk kez, çiçek hastalığına karşı geri adım atabiliyoruz."
 panum.354.g_generic: "Bu... bunu hemen ithal etmemiz gerekiyor!"
 panum.354.f_fareast: "Uzak Avrupa'ya yapılan bir ziyarette, heyetimiz büyüleyici bir şey keşfetti - çiçek hastalığı için *işleyen* bir tedaviye sahipler gibi görünüyor. Gerçekte, bu hastalığın tarihini öğrenmişler! Hekimlerimiz variolasyon uygulamasına aşinaydı; iyileşmekte olanlardan alınan kabuklarla korunmamış olanları korumak için kullanılabiliyordu. Ancak Avrupalılar daha etkili bir koruma geliştirmiş: Nispeten zararsız inek çiçeği örneklerini kullanarak, çocukları ve hatta yeni enfekte olmuşları aşılayabilen bir 'aşı' geliştirdiler... Bu aşı hayatta kalma şansını büyük ölçüde artırabiliyor.\n\nEn eğitimli hekimlerimiz bile buna inanmakta zorlandı. Yalnızca Avrupa tarzında eğitim almış ve 'doktor' unvanına sahip olanlar, bunun çiçek hastalığına karşı güvenli, ekonomik ve güçlü bir koruma olabileceğini doğrulayabilirdi. Üstelik bu aşı, halk arasında da test edilmeye başlanmış ve iddiaların gerçek olduğu kanıtlanmıştı.\n\nBöylece çiçek hastalığıyla savaşmak için elimizde güçlü bir silah var."
 panum.354.g_fareast: "Görünüşe göre yeni... doktorlarımız... değerlerini gösterdi. Bunu derhal ithal edin."
 panum.354.f_latino: "Avrupa ana vatanına yapılan bir ziyarette, heyetimiz büyüleyici bir keşif yaptı - çiçek hastalığı için *işleyen* bir tedaviye sahipler gibi görünüyor. Uzun zamandır variolasyon uygulamasına aşinaydık; doktorlarımız iyileşenlerden alınan örnekleri, korunmaya muhtaç olanlara veriyordu. Ancak şimdi çok daha sofistike bir tedavi geliştirilmiş. Ölümcül çiçek kabuklarını kullanmak yerine, yaygın ve genellikle zararsız olan inek çiçeği materyallerinden faydalanılıyor. Bu yeni serum hem ucuz, hem yaygın, hem de en önemlisi etkili.\n\nEn son tıbbi dergilere erişimle, doktorlarımız bu keşfi kutlayabilir. Çiçek hastalığı Amerika kıtası için de yabancı değil; bu topraklardaki yerli halkı yok etmişti... ama şimdi, bu felaketi geçmişte bırakacak güçlü bir silahımız var."
 panum.354.g_latino: "Ana vatanımıza teşekkürlerimizi gönderin ve acil kullanım için bir sevkiyat talep edin."
 panum.355.t: "Aşılama Başlıyor"
 panum.355.d: "[GetPlayer.GetName]'de artık uygulanabilir bir çiçek hastalığı aşısı bulunduğu için hükümet, aşı kampanyasına başladı."
 panum.355.f: "En azından başlangıçta, aşı kampanyasına bazı direnişler vardı. Korkmuş çocuklarıyla endişeli anneler, bu yeni harikaya şüpheyle bakan yaşlı beyefendiler, bilimin anlaşılamayan şeylerle oynadığından korkan dindarlar. Eğitim bunu çözdü - nasıl çalıştığını ve nedenini açıkladılar; ama en önemlisi sonuçlar etkili oldu. Çocuklar, insanlığın karşılaştığı en ölümcül hastalıklardan biri olan çiçek hastalığının korkunç sonuçları yerine, sağlıklı ve gözleri açık olarak kaldılar. İnsanlar, onları izsiz ve sağlıklı gördüklerinde ikna olmakta zorlanmadılar.\n\nYavaş yavaş, birer birer, kuyruklar büyümeye başladı. Okullarda, doktor ofislerinde, iş yerlerinde aşı kampanyası hız kazandı... ve çiçek hastalığı azalmaya başladı."
 panum.355.g: "Ah. İğneden nefret ederim ama eğer beni koruyacaksa..."
 panum.356.t: "Geri Çekilen Bir Hastalık"
 panum.356.d: "Yüzyıllarca süren ölüm ve sefaletin ardından, çiçek hastalığı aşılamasının son dönemde yaygınlaşması, bu eski düşmanı tamamen geri çekilmeye zorladı."
 panum.356.f: "Sayısız eller ve akıllar tarafından yapılan yorulmak bilmez çabalar sonucunda, sevgili [GetPlayer.GetName]'de çiçek hastalığı artık yavaş yavaş geçmişin bir parçası haline geliyor. Ulusal çapta gençleri ve iğneyi kabul eden herkesi aşılayan kapsamlı kampanyanın bir sonucu olarak, çiçek hastalığının ailelerimiz ve topluluklarımız üzerindeki yıkıcı etkisi azalıyor; bugünün çocukları, atalarının yaralarını taşımayacak. Her iğne batışıyla çiçek hastalığının bıçağı gittikçe köreliyor ve bu salgının doğası giderek geçmişte kalıyor.\n\nBu, tarihimizde büyük bir başarı ve görkemli bir gündür: Savaş henüz bitmemiş olsa da, zafer gözlerimizin önünde. Çiçek hastalığı burada ölecek; eğer bizim elimizle değilse, mirasçılarımızın eliyle."
 panum.356.g: "Bir gün, bir gün, bu korkunç canavarı sonsuza kadar yeneceğiz."
 panum_smallpox_vaccination_character_modifier: "Aşılı"
 panum.340.t: "Variolasyon"
 panum.340.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çiçek hastalığı için bir tedavi yöntemi buldu - her ne kadar tamamen zararsız olmasa da."
 panum.340.f: "Variolasyon (aynı zamanda aşılamayla karıştırılabilir), çiçek hastalığının kabarcık içeriğinin kişi kişiye nakledilmesidir. Bu teknik, esas olarak Çin ve Orta Doğu'da, 18. yüzyıla kadar viral hastalıklara karşı aşılama için kullanılmıştır. Burada, hastalığı atlatmış çiçek hastası kişilerin yaralarından alınan virüs koleksiyonları kullanılmıştır. Genellikle, hastalardaki bir kabarcıktan alınan malzeme bir lancet ile çıkarılır ve sağlıklı kişilerin kol veya bacaklarına küçük yaralar aracılığıyla, yani subkutan yolla uygulanırdı. Bu sayede sağlıklı kişilere zayıflatılmış virüsler verilmiş olurdu. Virüslerin çoğalmasıyla bağışıklık tepkisi tetiklenirdi. Ancak virüsler çoğalırken ters mutasyon geçirip hastalık yapıcı hale gelebilir, bu da bu şekilde tedavi edilenler arasında nispeten yüksek bir ölüm oranına (yüzde 2-3) yol açardı."
 panum.340.g: "B...bir ilerleme."
