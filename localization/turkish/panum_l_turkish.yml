 panum.3000.t: "Kızılay"
 panum.3000.d: "Modern savaşın dehşetleri göz önüne alındığında, [SCOPE.sState('panum_red_cross_state').GetName]'de 'Yaralıların Bakımı için Uluslararası Yardım Toplulukları Komitesi' kuruldu. Bu komite, savaşta yaralananlara yardım etmek için uluslar arasında çalışmayı amaçlamaktadır."
 panum.3000.f: "Kızılay şu kararları aldı:\n- Savaşta yaralananlar için ulusal yardım derneklerinin kurulması\n- Yaralıların tarafsızlığı\n- Gönüllü hemşirelerin cepheye gönderilerek yardım sağlaması\n- Uluslararası konferansların organize edilmesi ve uygulanması\n- Beyaz bir kol bandı üzerine kırmızı haç şeklinde tanıtım ve koruyucu bir sembolün kullanılması"
 panum.3000.g: "Uluslararası iş birliğinde kararlı bir adım."
 panum.3001.d: "Modern savaşın dehşetlerini göz önünde bulundurarak, [SCOPE.sState('panum_red_cross_state').GetName]'de 'Yaralıların Bakımı için Uluslararası Yardım Toplulukları Komitesi' kuruldu. Bu komite, savaşta yaralananlara yardım etmek için uluslar arasında çalışmayı amaçlamaktadır. Bir heyet, ülkemizin de bu derneğe katılmak isteyip istemediğini sordu."
 panum.3001.g: "Bu organizasyona kurucu üye olarak katılıyoruz."
 panum.3001.h: "İlginç."
 panum.3002.d: "Modern savaşın dehşetlerini fark eden İsviçreli tüccar Henry Dunant, 'Yaralıların Bakımı için Uluslararası Yardım Toplulukları Komitesi'ni kurdu. Komite, savaşta yaralananlara yardım etmek için uluslar arasında çalışmayı amaçlamaktadır."
 panum.3002.f: "1859'da İsviçreli tüccar Henry Dunant, Solferino savaş alanına tesadüfen rastladı. Yaklaşık 40.000 ölü ve yaralı asker için yardım çağrılarına tanık olan Dunant, bölgeden gönüllüleri, ister dost ister düşman olsun, kurbanlara yardım etmeleri için teşvik etmeye başladı. 1862'de yayımladığı 'Solferino Anısı' adlı kitabı, modern savaşın dehşetlerini geniş kitlelerin dikkatine sundu. Hükümetler ve vatandaşlar, savaşın sınırlandırılması konusunda ilgilenmeye başladı. 17 Şubat 1863'te, Dunant’ın da üye olduğu beş kişilik komite, Uluslararası Kızılhaç Komitesini kurdu. 26-29 Ekim 1863 tarihleri arasında 16 ülkenin delegeleri, Dunant’ın fikirlerini geliştirmek için 1. Cenevre Konferansı’nda toplandı. Beyaz bir bayrak üzerindeki kırmızı haç, yardımcılar için uluslararası bir koruma sembolü oldu. 1901 yılında Dunant, dünyanın ilk Nobel Barış Ödülü’nü aldı."
 panum.3011.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Sözleşmesi"
 panum.3011.d: "Yaralıların korunmasını, sağlık personelinin tarafsızlığını ve Kızılay’ı bir koruma sembolü olarak belirlemek amacıyla [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]’de uluslararası bir konferans düzenlendi."
 panum.3011.f: "'Ama Castiglione kadınları, milliyet ayrımı yapmadığımı görünce benim örneğimi izlediler, kökenleri ne olursa olsun tüm bu erkeklere aynı iyiliği gösterdiler. 'Tutti fratelli,' dediler içtenlikle. Tüm onur bu kadınlara, Castiglione kızlarına! Sarsılmaz, yorulmaz, kararlı, sessiz özverileri yorgunluk ve dehşeti önemsizleştirdi, kendi adanmışlıklarıyla.' -Henry Dunant"
 panum.3011.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Sözleşmesi. Güzel bir gelişme."
 panum.3012.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Antlaşmaları"
 panum.3012.d: "Silahsızlanmayı teşvik etmek ve kara savaşları için geçerli olan uluslararası hukuk kurallarını deniz savaşlarına genişletmek için [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]’de uluslararası bir konferans planlandı."
 panum.3012.f: "'İnsan yaşamının önemine dair ahlaki duygu; tüm bu zavallıların azaplarını biraz hafifletme ya da parçalanmış cesaretlerini geri kazanma insani arzusu; bir insanın bu anlarda topladığı öfkeli ve amansız enerji; bunların hepsi, olabildiğince çok kişiyi kurtarma arzusunu doğurur.\n\nBu korkunç ve ciddi trajedinin çok sayıda sahnesinde artık keder yok.' -Henry Dunant"
 panum.3012.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Antlaşmaları. Güzel bir gelişme."
 panum.3013.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protokolü"
 panum.3013.d: "Savaşta zehirli gaz kullanımını yasaklamak için [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]’de uluslararası bir konferans düzenlendi."
 panum.3013.f: "'Yeni ve korkunç yok etme yöntemleri her gün, daha iyi bir amaç için gösterilmesi gereken azimle icat ediliyor; ve bu yok edici araçların mucitleri çoğu büyük Avrupa devletinde övülüp teşvik ediliyor; ve nihayet Avrupa’daki zihniyet, gelecekteki savaşların olası olduğunu gösteren başka birçok belirtiyle birleşiyor; tüm bunlar göz önüne alındığında, nispeten sakin ve sessiz bir zamanda, hem insani hem Hristiyan bakış açısından büyük ve dünya çapında öneme sahip bir sorunu araştırmak ve çözmek için neden fırsat kullanılmasın?' -Henry Dunant"
 panum.3013.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protokolü. Güzel bir gelişme."
 panum.3021.t: "Bir Kızılay Paramedik"
 panum.3021.d: "Son derece kanlı bir yenilginin ardından, bir paramedik [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] sahra hastanesinde öne çıktı. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] Kızılay’a ait ve belki de yalnızca sahra hizmetinden daha yüce bir çağrıya yanıt veriyor."
 panum.3021.f: "'Cremona’daki bir hastanede bir İtalyan doktor şöyle demişti: İyi şeyleri Müttefik Ordusu arkadaşlarımız için saklıyoruz, düşmanlarımıza ise sadece gerekli olanı veriyoruz. Ölürlerse, ne kötü! Ve bu barbarca sözlerini mazur göstermek için, Verona ve Mantua’dan dönen bazı İtalyan askerlerinden, Avusturyalıların Franco-Sardinya ordusunun yaralılarının bakımsız şekilde ölmelerine izin verdiğini duyduğunu ekledi. Cremona’dan asil bir kadın, Kontes..., doktorun sözlerini duyunca ve büyük bir özveriyle hastanelere kendini adamıştı, hemen Avusturyalılara da Müttefikler kadar özen gösterdiğini belirterek, dost ve düşman arasında fark yapmadığını göstermek için harekete geçti. Çünkü, dedi ki, Efendimiz İsa Mesih insanları iyilikte böyle ayırmamıştır.' -Henry Dunant"
 panum.3021.g: "Hoş geldiniz, Doktor [SCOPE.sCharacter('panum_new_physician_scope').GetLastName]."
 panum.740.t: "Bir Çocuk Daha Korkudan Kurtuldu"
 panum.740.d: "Büyük çabaların ardından, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] için başarılı bir tedavi yöntemi üzerine makalesini nihayet yazdı. Bu çalışma, [ROOT.GetCountry.GetAdjectiveNoFlag] tıbbında bir dönüm noktası olarak kabul ediliyor."
 panum.740.f: "Tıp Fakültesi, [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]'in tedavi yöntemi üzerine bilimsel makalesini büyük bir merakla bekliyordu. Makalesinde doktor, kızamıkçıkla mücadelede etkili bir dizi önlemi açıklıyor. Modern tıp, hastalık ortaya çıktıktan sonra bile kızamıkçığı etkin şekilde önlemek için çeşitli seçenekler sunuyor. Yeni icat edilen bir antitoksin burada kilit rol oynuyor. Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in çalışması [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] adıyla anılıyor."
 panum.740.g: "Artık sayısız ebeveyn daha huzurlu uyuyacak."
 panum.741.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] Testi"
 panum.741.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hastanın kızamıkçığa karşı bağışıklığının olup olmadığını belirleyen bir prosedür geliştirdi ve kendi adıyla anıldı."
 panum.741.f: "1924’te George F. Dick ve Gladys Dick tarafından geliştirilen Dick testi, kızamıkçığa yatkın olanları tespit etmek için kullanıldı. Dick testi, kızamıkçığa neden olan streptokokların seyreltilmiş bir suşunun deri altına enjekte edilmesini içeriyordu; enjeksiyon bölgesinde görülen reaksiyon, kişilerin hastalığa yatkın olup olmadığını gösteriyordu. Reaksiyon dört saat sonra gözlemlenebilirdi, ancak 24 saat sonra daha belirgindi. Deride reaksiyon görülmezse, kişi bağışıklık geliştirmiş kabul edilerek hastalık riski taşımadığı varsayılıyordu."
 panum.741.g: "Kullanışlı bir prosedür."
 panum.742.t: "Kızamıkçık Serumu"
 panum.742.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], at kanından elde ettiği kızamıkçık için etkili bir serum geliştirdi."
 panum.742.f: "Kızamıkçık serumu, geliştirilmesinin ardından Kasım 1900'de Viyana, Avusturya'daki Rudolph Hastanesi Sero-Terapötik Laboratuvarı’nda kullanılmaya başlandı. Serum at kanından elde edildi. Enfekte çocuklar Dr. Paul Moser tarafından karın derisine enjekte edildi. Serumun kullanımıyla birlikte kızamıkçık (scarlatina) ölüm oranları önemli ölçüde düştü. Moser’in antitoksini, kızamıkçık ölüm oranını %40 oranında azalttı."
 panum.742.g: "At kanı mı? Tiksindirici."
 panum.743.t: "Antitoksin"
 panum.743.d: "Bir dizi testten sonra, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], geliştirdiği antitoksinin kızamıkçığa karşı etkili olduğundan emin oldu."
 panum.743.f: "'Kızamıkçığın bilgi ve tedavisindeki son önemli ilerlemelere rağmen, bu korkulan hastalık mevsimsel yayılımında büyük bir sıçrama yaptı. Yeterince erken uygulandığında, antitoksin kızamıkçık ve sık rastlanan komplikasyonlarının tehlikesini hafifletir. Ancak hastalık hâlâ öyle yönlere sahiptir ki, eradikasyonu son derece arzu edilir. Hastalığa yatkın kişilere artan dozda toksin verilmesi, bu kişilerin bağışıklık kazanmasını sağlar.'"
 panum.743.g: "Kararlı bir atılım!"
