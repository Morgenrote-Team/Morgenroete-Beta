 panum.2111.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'in Anatomisi"
 panum.2111.d: "Yerel yetkililerle tıp hizmetlerini genişletme mücadelesi sırasında Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], genç cerrahların eğitiminde ne kadar eksik olduğunu keşfetti. Bu nedenle bu haksızlığı gidermek için standart bir eser yazdı."
 panum.2111.f: "Henry Gray'in İnsan Anatomisi, genellikle sadece Gray's Anatomy olarak adlandırılır, insan anatomisi hakkında bir kitaptır. Konunun klasik eserlerinden sayılır, özellikle İngilizce konuşulan ülkelerde. İlk baskısı 1858’de İngiltere’de, bir yıl sonra ABD’de Gray's Anatomy: Descriptive and Surgical adıyla yayınlandı."
 panum.2111.g: "Her öğrenci eğitim sırasında bu kitabı okumalı."
 panum.2111.h: "Uygulama, öğretimden daha önemlidir."
 panum.2112.t: "Ölüm Nedenleri Diyagramı"
 panum.2112.d: "Askeri hastaneleri ziyaret eden Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], genç doktorların savaş alanındaki bulaşıcı hastalık tehlikeleri konusunda istatistiksel materyalden çok az yararlandığını fark etti. Bu nedenle anlamlı çok sayıda diyagram oluşturdu."
 panum.2112.f: "Kırım Savaşı sırasında geçirdiği bir hastalık nedeniyle Florence Nightingale, kışla, hastane veya yoksul evde durumun nasıl olacağını bizzat göremedi. Bunun yerine veri toplamaya, analiz etmeye ve sonuç çıkarmaya odaklandı. Anketler onun için önemli bir araçtı ve mevcut verileri de kullandı. Bunlar, askeri sağlık hizmetlerinde ciddi sorunları ortaya koydu. İngiliz hükümetine sunduğu raporda açık ifadeler kullandı. Eğer her yıl 1.000 sivilden 11’i ölüyorsa, ama İngiltere’deki piyade, topçu ve muhafız birimlerinden 1.000’er kişiden 17, 19 ve 20’si ölüyor ise, bu 1.100 kişiyi Salisbury Düzlüğü’ne götürüp orada öldürmek kadar suçtur. Florence Nightingale, bu tür verilerin grafiksel hazırlanmasının öncülerinden sayılır."
 panum.2112.g: "Bu istatistikler savaş alanındaki sağlık görevlileri tarafından dikkatle incelenmelidir."
 panum.2112.h: "Uygulama, öğretimden daha önemlidir."
 panum.2113.t: "Omnis cellula e cellula"
 panum.2113.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], önceki hücre teorisine her hücrenin başka bir hücreden doğduğunu ve hastalıkların da hasta hücrelerden kaynaklandığını ekledi. Bu tezi yeni kliniklerde ve hastanelerde kullanılan hücresel patoloji çalışmasında ayrıntılı olarak anlattı."
 panum.2113.f: "Hücresel patoloji, hastalıkların vücut hücrelerindeki bozukluklar veya işlevsel aksaklıklar nedeniyle oluştuğunu savunan bir hastalık teorisidir. 1850’lerde Rudolf Virchow tarafından geliştirilmiş ve 1855’te 'hücresel patoloji' terimini ilk kez kullanmıştır. Aynı adlı eseri standart bir başvuru kaynağı olmuştur. Hücre teorisine dayalı hastalık kavramı, eski çağlardan beri geçerli olan humoral patolojinin yerini almış ve hastalık gelişimi ve genel sağlık anlayışında kapsamlı bir devrim sağlamıştır. Deneysel farmakoloji, fizyoloji ve mikrobiyoloji ile birleşerek klinik tıbbın ve bilimsel temelli tıbbın temelini oluşturur."
 panum.2113.g: "Hastalıklı hücreler hakkında bilgi üniversitelerde standart olmalıdır."
 panum.2113.h: "Bu son derece önemli bir içgörüdür."
 panum.2114.t: "Doğuştan Suçlu"
 panum.2114.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], suçluların psikolojisini ve insan genetiğini yoğun şekilde incelemiş ve suç unsurlarının fizyonomileri üzerinden tanımlanabileceğini keşfetmiştir. Tıp sistemini reform etme çabalarında hasta, deliler ve tembel memurlarla yaptığı sayısız temas, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] için ilham kaynağı olmuştur."
 panum.2114.f: "Evrim teorisinden ilham alan Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], hapishaneler ve akıl hastanelerinde yüzlerce insan üzerinde çalışmalar yaptı ve suçlular arasında atavistik bir tipin yaygın olduğunu keşfetti. Bazı suç türleri bu nedenle yüz tiplerinde ve kafatası şekillerinde görülebilir. Suçlu, kendi isteğiyle suçlu olmaz; genetik yatkınlığı nedeniyle 'elinden geleni yapamaz'. Suçlu ayrı bir antropolojik tipi, homo deliquens’i temsil eder. Evrimsel olarak geride, daha ilkel ve daha eski bir insan tipidir; ahlaksız ve içgüdüsel olarak algılanır."
 panum.2114.g: "Yani doğuştan suçlusunuz."
 panum.2121.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'in Kafatası Tutkusu"
 panum.2121.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], antropolojik kriminoloji tezine devam ederek ülke çapında binlerce kafatası ölçümü yaptı. Bazılarını evinde bile saklamaktadır."
 panum.2121.f: "'Kriminoloji, felsefe ile çok fazla yoğrulmuş ciddi bir doğa bilimidir. Benim devrimim, onu bu yüzyıldaki her modern bilim gibi ampirik yöntemlerle donatmaktır. Biyoloji ve matematik bozulmaz konular, psikiyatri ve kriminoloji onlardan öğrenebilir. Her bir kafatasını ölçüp karşılaştırırsanız - ve bunu binlerce suçlu, deli ve idam edilen insan üzerinde yaptım - aynı istatistiksel sonucu tekrar tekrar gösteren veriler elde edersiniz. Buradan suçlunun yüz asimetrisini çıkaracak neredeyse mükemmel değerler elde edilebilir. Bu kesin ölçümler, insan zihni hakkında tamamen temelsiz varsayımlardan çok daha güvenlidir: elimizde sayılar, gerçekler, yani ampirik çalışmalar var, boş laflar yok.'\n\n'The Criminal Man' kitabından, [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2121.g: "Ne kadar… hoş bir hobi."
 panum.2122.t: "Biyolojik Belirlenimcilik"
 panum.2122.d: "Çalışmalarının ilerleyen aylarında Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], 'doğuştan suçlu' tezini derinleştirdi ve daha şok edici bulgular yayınladı."
 panum.2122.f: "'Suçlu bir gerilemiş insandır. İnsan evrimleşirken, suçlu bir regresyon, insanlığın sapmasıdır. O, 'modern vahşi'dir; bize Taş Devri insanına bakma fırsatı verir; daha az incelikli, acıya daha az duyarlı ve empati yeteneği sınırlıdır. Suçlu, diğer kişinin acısını fark etmez; sadece sınırlı bir şefkat kapasitesine sahiptir. Suçlu, suç eğilimi ile hareket ettiğinden, bu eğilimin kalıtsal olduğu varsayılabilir. Bu nedenle, insanların kendi iradeleriyle hareket etmediklerini, biyolojik belirlenim nedeniyle suç işlediklerini varsayarsak, bunun cezayı hafifletici bir faktör olması beklenebilir. Ancak tersine, suçlu caydırıcı bir cezadan etkilenmez; yeniden topluma kazandırılamaz ve öngörülemezdir. Odak, toplumu korumaktır. Bu nedenle ömür boyu hapis veya ölüm cezası düşünülmelidir. Bu tehlikeli suçluların masumlara zarar vermesine izin veremeyiz.'\n\n'The Criminal Man' kitabından, [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2122.g: "Bunu yönetici teori olarak kabul etmekten başka seçeneğimiz yok mu?"
 panum.2123.t: "Tehlikeli Suçlu Karakter"
 panum.2123.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sCharacter('panum_victim_scope').GetFullName]'un fizyonomisini ve özellikle kafatası şeklini dikkatlice incelemiş ve [SCOPE.sCharacter('panum_victim_scope').GetSheHe]'nin toplum için son derece tehlikeli bir kişi olduğuna ve tüm görevlerinden derhal alınması gerektiğine karar vermiştir!"
 panum.2123.f: "'Hırsızların yüzleri ve elleri genellikle çok hareketlidir; gözleri küçük, huzursuz, sık sık şaşı; kaşları çatık ve çarpışmış; burun eğri veya körelmiş, sakalı seyrek, saç nadiren kalın, alın neredeyse her zaman küçük ve geri çekilmiş, kulaklar sık sık kulp gibi çıkık…\n\nKatillerin bakışları cam gibi, soğuk ve sabittir; gözleri bazen kanlıdır. Burun büyük, genellikle kartal ya da daha çok şahin burunlu; çene kemikli, kulaklar uzun, yanaklar geniş, saç kıvırcık, dolgun ve koyu, sakal genellikle seyrek; dudaklar ince, köpek dişleri büyük… Genel olarak, doğuştan suçlularda kulaklar kulp şeklinde, saç dolgun, sakal seyrek, alın sinüsleri kemerli, çene devasa, çene ucu kare veya çıkık, elmacık kemikleri geniştir.' -Cesare Lombroso"
 panum.2123.g: "Bu kişi gerçekten suçlu bir yüze sahip."
 panum.2123.h: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] suçlamalarında fazla ileri gidiyor!"
 panum.2124.t: "Başka bir kafatası meraklısı!"
 panum.2124.d: "Today, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] introduced an aspiring academic who loves skulls almost as much as [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] does. However, Doctor [SCOPE.sCharacter('andersson_new_anthropologist_scope').GetLastName] is more concerned with the skulls of dead people."
 panum.2124.f: "'[SCOPE.sCharacter('andersson_new_anthropologist_scope').GetFullName] is an excellent scientist who understands the importance of examining skulls in order to draw conclusions about the person to whom the skull belongs. Unfortunately, [SCOPE.sCharacter('andersson_new_anthropologist_scope').GetSheHe] only deals with the skulls of people who have died for an immeasurable amount of time. Unbelievable! You can't be sure whether they were really criminals. How is that supposed to help?'"
 panum.2124.g: "Bu... beklenmedik şekilde hoş bir sürpriz."
 panum.4003.t: "Çiçek Hastalığının Sonu"
 panum.4003.d: "Tüm olasılıkları göz önünde bulundurarak, çiçek hastalığına karşı kampanyamız olağanüstü bir başarıyla sonuçlandı - hastalık artık tamamen ortadan kaldırıldı."
 panum.4003.f: "Birçokları için, sıradan bir gün gibi başlayan bir sabah, aslında ne kadar muhteşem bir sabah olduğunu fark etmeden geçiyor. Bilenler için, bu, ömür boyu süren çalışmaların, neredeyse hayal edilemez bir rüyanın nihayet gerçekleşmesinin doruk noktasıdır. Birçoğu bunun kendi ömürlerinde başarılabileceğini düşünmemişti, bunun yirminci yüzyılın sonu veya yirmi birinci yüzyıl için efsanevi bir iş olacağını düşünmüşlerdi; ama işte, şimdi, [TimeKeeper.GetCurrentDate.Format('y')] yılında, tamamlandı. Son doğrulanmış vaka ile birlikte yeni bir enfekte yok, bu hastalık tarihe karıştı. Tarihte ilk kez, bu hastalığın tehdidi hiçbir bireyin üzerinde değil.\n\nBu yalnızca bir şeyi gösterir: çiçek hastalığı artık yok."
 panum.4003.g: "İnsan bugün kendi mucizesini gerçekleştirdi."
 panum.2211.t: "Hastalık Araştırmaları"
 panum.2211.d: "Tıbbi incelemeleri sırasında Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ülkemizde hakkında çok az yayınlanmış, ancak belirli bölgelerde yaygın olan bir hastalığı detaylı şekilde araştırmak istediğini fark etti."
 panum.2211.f: "Büyük salgın hastalıkların yanı sıra, çok sayıda günlük ve yaygın hastalıklar, uzun zamandır bilinen ancak nedenleri ve tedavi yöntemleri hala bilinmeyen insanlık felaketleri vardır. Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çok özel bir hastalığa odaklanıp odaklanmaması gerektiğini merak ediyor."
 panum.2211.g: "Yün İşçisinin Hastalığını inceleyin."
 panum.2211.h: "Guatr Hastalığını inceleyin."
 panum.2211.i: "Böbrek Taşı Hastalığını inceleyin."
 panum.2211.j: "Pellegra'yı inceleyin."
 panum.2211.k: "Raşiti inceleyin."
 panum.2211.l: "Frengi'yi inceleyin."
 panum.2211.m: "Tetanos'u inceleyin."
 panum.2211.z: "Doktor zamanı eğitim vermeye daha fazla odaklanmak için kullanmalı."
