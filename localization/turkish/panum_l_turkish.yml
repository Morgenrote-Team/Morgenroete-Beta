 panum.201.t: "Tüberküloz [SCOPE.sState('panum_disease_state').GetName]'e yayılıyor"
 panum.201.d: "Tüberküloz salgını, tüm çabalarımıza rağmen yayıldı. Artık [SCOPE.sState('panum_disease_state').GetName]’de de hızla yayılıyor."
 panum.201.g: "Beyaz ölüm durdurulamıyor gibi görünüyor."
 panum.202.t: "Kalıtsal bir hastalık mı?"
 panum.202.d: "Tüm tıbbi incelemelere rağmen, tüberkülozun kökeni hâlâ tartışmalı bir alandır. Bazı sağlık personelimiz bunun kalıtsal bir hastalık veya en azından 'içsel faktörlere' dayalı bir hastalık olduğunu düşünüyor. Diğer doktorlar ise bunun klasik, bulaşıcı bir hastalık olduğunu düşünüyor ve radikal önlemler öneriyor."
 panum.202.f: "18. ve 19. yüzyıl Avrupa ülkelerinde patogenez kavramına dair farklı gelenekler vardı. O dönemin birçok tıbbi yazarı tüberkülozu, ya da her zaman eşanlamlı olmasa da 'tüketim hastalığını', o zaman bilinen en kötü salgın olarak kabul ediyordu. Nedenlerini vücut sıvılarının dengesiz dağılımı, topraktaki uğursuz buharlar, kentleşme veya geleneklerin bozulması olarak görüyordu. İtalya’da ise bulaşıcı, yani geçen bir neden eğilimi vardı. 18. yüzyıl ortalarında Venedik Cumhuriyeti, tüberküloz nedeniyle gelişen phthisis vakalarının rapor edilmesini yazılı olarak zorunlu kıldı. Hastalıktan ölenlerin kişisel eşyaları enfeksiyon riskini azaltmak için yakıldı. İngiltere ve İskandinav ülkelerinde ise hastalığın kalıtsal bir nedene dayandığı genel olarak kabul ediliyordu."
 panum.202.g: "Bu kalıtsal bir hastalık ve yapacak bir şeyimiz yok."
 panum.202.h: "Bu bulaşıcı bir hastalık ve yayılmasını durdurmak için elimizden geleni yapmalıyız!"
 panum.203.t: "Sokaklarda tükürme"
 panum.203.d: "Tüberkülozun nedenleri hakkında bilgi eksikliği nedeniyle alınan önlemler de tartışmalıydı. Bulaşıcı bir neden varsayanlar, yayılmayı önlemek için radikal yasakları savundu—kamusal alanlarda tükürme de dahil. Bu özellikle alt sınıfları etkiledi. Şüpheciler, bu düzenlemeleri sıradan insanlara eziyet etmenin bir yolu olarak gördü."
 panum.203.f: "18. yüzyılın görgü kuralları üst ve orta sınıfta bazı 'kötü alışkanlıkları' ortadan kaldırmış olsa da, hijyen açısından şüpheli pek çok alışkanlık kitleler arasında uzun süre yaygın kaldı. Mendil ve tükürük kapları henüz 19. yüzyıl başında toplumda yaygın değildi ve yüzyılın sonlarına doğru, örneğin toplu taşımada tükürmenin yasaklanması gibi uygulamalar yaygın hale geldi."
 panum.203.g: "Bu iğrenç alışkanlığı yasaklayın!"
 panum.203.h: "Katı bir yasak ilan edin ve suçluları cezalandırın!"
 panum.203.i: "Tükürmek insan doğasıdır, yasaklanamaz."
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] Tüberküloz kaptı!"
 panum.204.d: "Tüberküloz salgını, sanatçımız [SCOPE.sCharacter('disease_victim_scope').GetFullName]'i de etkiledi! Şaşırtıcı bir şekilde, [SCOPE.sCharacter('disease_victim_scope').GetSheHe] bunu en kötü talihsizlik olarak görmüyor."
 panum.204.f: "19. yüzyılın başında ve çok sonrasında tüberküloz 'romantik bir hastalık' olarak kabul ediliyordu. Mağdura ölüme hazırlanması için yeterli zamanı verir ve birçok kişi solgunluğu asil bir nitelik olarak görüyordu. Yazarlar, Dumas Genç'in 'Kamelyalı Kadın'ı gibi birçok eserle onun anısına anıtlar yarattı. Verdi (La Traviata) ve Puccini (La Bohème) operalarında benzer bir yücelme görülebilir. Chopin’in partneri George Sand, 'Chopin sonsuz bir zarafetle öksürüyor' diye not almıştır."
 panum.204.i: "Bu bir requiem için ilham verici bir fırsat olmaz mıydı?"
 panum.204.j: "Ama tüberküloz hep yazarların konusu olmadı mı?"
 panum.204.k: "Ama bu hastalık, sefaletin tasvirini teşvik etmiyor mu?"
 panum.205.t: "Tüberküloz Sanatoryumu"
 panum.205.d: "[SCOPE.sState('panum_disease_state').GetName]’de hızla yayılan tüberküloz salgını göz önüne alındığında, doktorlardan biri bazı zengin hastaların dağlara gönderilmesini önerdi. Yüksek rakımlı iklim ve temiz hava ile hastalıklarının iyileştirileceği düşünülüyordu. Bu amaçla özel bir akciğer sanatoryumu kurulmalı. [SCOPE.sState('panum_davos_scope').GetName] böyle bir sanatoryum için mükemmel bir yer gibi görünüyor."
 panum.205.f: "Hava tedavisi, 19. yüzyıldan itibaren tüberküloz için uzun süre standart tedavi olarak kabul edilen bir iklim terapisi şeklidir. Hastalar günün birkaç saatini açık havada veya teraslarda yataklarda geçirirlerdi. Hava tedavisi özel akciğer sanatoryumlarında uygulanırdı. Almanya’da doktor Hermann Brehmer, daha önce tedavi edilemez olarak kabul edilen tüberkülozu hava terapisi ile tedavi edilebilir olarak tanımlayan ilk kişiydi. 1856’da kronik akciğer tüberkülozunun tedavi edilebilirliği üzerine tezini yazdı. 'Bağışıklık yerleri' olduğunu varsaydı; bu yerler, bir yandan iklimleri sayesinde, tüberkülozun ortaya çıkmasını etkili şekilde önler, diğer yandan hastalık ortaya çıktıktan sonra iyileştirici etki sağlar. İsviçre’de Alman asıllı doktor Alexander Spengler hava terapisi öncüsüydü. 1853’te Davos’ta köy doktoru olarak çalışmaya başladı ve bölge halkının genel olarak tüberkülozdan muzdarip olmadığını, bunu yüksek dağ iklimine bağladı. Thomas Mann, 'Büyülü Dağ' eserinde Davos’u bir iklim sağlık tesisi olarak yüceltti."
 panum.205.g: "[SCOPE.sState('panum_davos_scope').GetName]’e bir Sanatoryum kurun!"
 panum.205.h: "Bunların hepsi lüks bir sahtelikten ibaret."
 panum.206.t: "Proletaryanın Hastalığı"
 panum.206.d: "[SCOPE.sState('panum_disease_state').GetName]'deki tüberküloz salgını alt sınıfı en çok vuruyor. Bu nedenle [SCOPE.sCharacter('union_leader').GetFullName] mevcut koşulları özellikle eleştirdi ve kapsamlı değişiklikler çağrısında bulundu."
 panum.206.f: "Tüberküloz, 19. ve 20. yüzyılın başlarında şehirli yoksul arasında endemik bir hastalık olarak geniş ilgi gördü. 1815'te İngiltere’de ölümlerin dörtte biri, 1918'de Fransa’da ölümlerin altıda biri tüberkülozdan kaynaklanıyordu. 1880 civarında Almanya’da 15-40 yaş arasındaki her iki ölümden biri bu hastalık nedeniyle gerçekleşiyordu."
 panum.206.g: "Belki de yoksullar sadece biraz daha temizlenmeli?"
 panum.206.h: "Bu alanda seçici iyileştirmeler yapılabilir."
 panum.206.i: "Sağlık sorunu ulusal bir meseledir."
 panum.206.j: "Bu girişim için alkış!"
 panum.207.t: "Dini Girişim"
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] [SCOPE.sState('panum_disease_state').GetName]’deki birçok hasta için şahsen girişimde bulundu. [SCOPE.sCharacter('devout_leader').GetSheHe|U] yakında kâr amacı gütmeyen bir hastane açmak istiyor."
 panum.207.f: "'Tüberküloza karşı mücadele, bir şekilde ele alınmamış bir ülke neredeyse yoktur ve bu tehlikeli düşmana karşı kampanyanın artık oldukça genel ve yoğun bir şekilde yürütüldüğünü görmek olağanüstü memnuniyet vericidir.' -Robert Koch"
 panum.207.g: "Bu anlatıcılar sadece nüfuz kazanmaya çalışıyor!"
 panum.208.t: "Beyaz Veba Bedelini Ödüyor"
 panum.208.d: "[SCOPE.sState('panum_disease_state').GetName]’deki tüberküloz salgını kötüleşti. Hasta ve ölü sayısı her geçen gün artıyor. Hiçbir doktor bu gelişmeyi beklemiyordu."
 panum.208.f: "'Ne kadar solgun görünüyorsam! - Sanırım, tüberkülozdan ölmek isterdim… çünkü o zaman tüm kadınlar, 'Bakın şu zavallı Byron’a - ölürken ne kadar etkileyici görünüyor!' derlerdi.' -Lord Byron"
 panum.208.g: "Bu hiç mi bitmeyecek?"
