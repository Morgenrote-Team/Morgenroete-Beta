 je_panum_medical_system_project: "Tıbbi Sistemi Geliştir"
 je_panum_medical_system_project_reason: "Tıbbi sistemi geliştirmekle görevli bir doktor, öncelikle sağlık hizmetlerini iyileştirmek için yerel olarak çalışır. Ancak orada bir idari altyapıya da ihtiyaç vardır. Bürokrasi üzerinde etkili olan avantajlı yeteneklere sahip bir doktor, burada faydalı olur. Onun becerileri ve deneyimi, yeni hastaneler ve klinikler kurma sürecinde aylık ilerlemeyi artırır.\n\nDoktorlar, öncelikle iyi gelişmiş bölgelerde klinikler kurmaya çalışır, ardından daha az gelişmiş bölgelere yönelir. Doktorlar, yönetim binalarının en yüksek seviyede olduğu eyaleti tercih eder.\n\nİlerleme çubuğu dolduğunda, yeni bir klinik/hastane faaliyete geçer ve sonraki uygun eyalette çalışmaya devam edilir. Doktorlar, ya gerekli şartlara sahip eyalet kalmayana kadar ya da iş manuel olarak durdurulana kadar mümkün olduğunca çok klinik ve hastane açar."
 panum.2101.t: "Tıbbi Sistem Geliştirildi"
 panum.2101.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], çalışmalarını tamamlayarak yerel tıbbi tesisleri geliştirdi ve güncelledi. Doktor artık diğer aktiviteler için tekrar kullanılabilir."
 panum.2101.f: "'Tıp bir sosyal bilimdir, politika ise sadece büyük ölçekli bir tıptır.' -Rudolf Virchow"
 panum.2101.g: "İşe geri dön."
 panum.2102.t: "[SCOPE.sState('panum_clinic_state').GetName]'de Uzmanlık Kliniği"
 panum.2102.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]'ın hevesli yardımıyla, ülkemizdeki ilk uzmanlık kliniği [SCOPE.sState('panum_clinic_state').GetCityHubName]'de kuruldu. Doktor, kliniği bizzat yürüteceğini ve bir alanda uzmanlaşacağını açıkladı - uzmanların hangi alana odaklanacağı henüz net değil."
 panum.2102.f: "'Tıp eğitimi, öğrencilere geçim sağlama yolu sunmak için değil, toplumun sağlığını güvence altına almak için vardır.' -Rudolf Virchow"
