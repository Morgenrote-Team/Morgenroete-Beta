 je_panum_cholera_treatment_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], şu anda #YELLOW Kolera#! nedenini belirlemek için birkaç hastayı inceliyor. Hastalığın oluşumunun gerçek nedenleri, modern tedavi yöntemlerine yol açacak önlemler alınmasına yardımcı olabilir. Doktor çalışmasını tamamladığında tezini kamuoyuna sunacak. Bu, gelecekteki salgınları önlemeyecek – bunun için patojenin tanımlanması ve muhtemelen bir aşı gereklidir – ancak yeni bir salgının etkileri nispeten küçük olacaktır."
