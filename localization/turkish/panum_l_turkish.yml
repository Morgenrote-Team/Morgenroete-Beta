 panum.2003.m: "Kızamık."
 panum.2003.n: "Kızıl."
 panum.2003.o: "Veba."
 panum.2003.p: "Difteri."
 panum.2003.q: "Polio."
 panum.2004.t: "Patojen ve Aşı"
 panum.2004.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sCountry('panum_congress_host_country').GetName]'deki kongrede mikrobiolojik bilgilerini paylaşmaya istekli birçok fikirdaş bulduğunda büyük bir memnuniyet duydu. Tek soru, bu harika hastalıklardan hangisi hakkında gelecekte daha fazla bilgi edinmek istediğidir."
 panum.2004.f: "Kongreye katılan bir ülke, başka bir ülkenin sahip olmadığı bir hastalığın patojenini veya aşısını biliyorsa, bu bilgi kongrede öğrenilebilir. Bilgi yalnızca bir hastalık için geliştirilebilir. Kongrede yeni bilgi edinilemiyorsa, genel bilgi biriktirme ve biyolojik teknolojiyi geliştirme hâlâ mümkündür. Mikrobiyolog özelliğine sahip bir biyoloğun katılımı kritik öneme sahiptir."
 panum.2004.g: "Bilim insanımız, meslektaşlarından bazı genel biyolojik bilgiler edinmeli."
 panum.2005.t: "Tıbbi Bir Vizyon"
 panum.2005.d_general: "Kongredeki doktorlar ve biyologlar, özellikle gelecek tıp öğrencilerinin eğitimini modernize etmeye ve geliştirmeye karar verdiler ve bu konuda ortak bir bildiri yazdılar."
 panum.2005.d_special: "Konferansın ana odağı göz önüne alındığında, doktorlar ve biyologlar önümüzdeki birkaç yıl boyunca tüm çabaları belirli bir hastalıkla mücadeleye kaydırmaya oy verdiler."
 panum.2005.f: "Tıbbi kongrenin başında belirli bir konu ana konu olarak ilan edilmişse, tüm katılımcı ülkeler bu hastalık hakkında ek ipuçları alır - fizikçi, mikrobiyolog veya her ikisi var mı durumuna bağlı olarak. Genel bir kongre ise odak, yeni tıp personelinin eğitimindedir."
 panum.2005.g: "Etkinlik buna değerdi."
 panum.2009.t: "Tıbbi Kongre sona erdi"
 panum.2009.d: "[SCOPE.sCountry('panum_congress_host_country').GetName]'deki Tıbbi Kongre dün sona erdi. Doktorlar ve mikrobiyologlar tekrar evlerine dönüyor ve yanlarında sayısız bulguyu getiriyorlar."
 panum.2009.f: "Uluslararası Tıbbi Kongre (Fransızca: Congrès International de Médecine), 1867'den 1913'e kadar periyodik olarak düzenlenen uluslararası tıp bilim konferansları serisiydi. Böyle bir kongre fikri, 1865'te, Fransa'daki üçüncü yıllık Tıbbi Kongre sırasında ortaya çıktı; Profesör Henri Giutrac, o yılki Uluslararası Sergi'ye katılmak için dünyanın dört bir yanından Paris'te olacak hekim ve cerrahları fırsat bilerek 1867'de uluslararası bir tıp konferansı düzenlemeyi önerdi."
 panum.2009.g: "Umarım büfe güzeldi?"
 panum_surgeon: "Cerrah"
 panum_surgeon_desc: "Cerrahlar günlük tıbbi yaşamda oldukça deneyimlidir, ancak tıbbi araştırmalar veya anatomik çalışmalarda da faydalı olabilirler."
 panum_psychiatrist: "Psikiyatrist"
 panum_psychiatrist_desc: "Psikiyatristler, akıl hastalarının koşullarını iyileştirmekle ilgilenir ve bu alanda araştırmalar ile yeni tedavi yöntemlerini yönlendirirler."
 panum_military_physician: "Askeri Doktor"
 panum_military_physician_desc: "Bu doktor, savaş alanında yaralıların bakımında uzmanlaşmıştır ve ilk yardımın geliştirilmesinde özellikle başarılıdır."
