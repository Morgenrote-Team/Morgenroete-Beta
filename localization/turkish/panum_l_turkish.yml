 panum_cholera_desc: "Kolera, ince bağırsakların tehlikeli bir bulaşıcı hastalığıdır. 19. yüzyılın belirleyici salgını olarak kabul edilir ve dünya çapında milyonlarca ölüme yol açmıştır."
 panum.2626.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Gösterisi"
 panum.2626.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], kendi radyo programına sahip oldu ve burada insanlara problemleri hakkında tavsiyeler veriyor. Format oldukça popüler."
 panum.2626.f: "'Merhaba, Ethan. Dinliyorum.'\n'Selam, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName].'\n'Kaç yaşındasın?'\n'On üç.'\n'Peki, sana ne yapabilirim?'\n'Okuldaki diğer çocuklarla çok problem yaşıyorum. Sürekli beni dövüyorlar.'\n'Neden öyle olduğunu düşünüyorsun?'\n'Muhtemelen çünkü zekiyim. IQ’m 160. Astronomi kulübündeyim ve sporu sevmiyorum.'\n'Biliyor musun Ethan, diğer çocuklar sadece kıskançlık ve olgunlaşmamışlıktan ötürü böyle davranıyor ve şu an için pek bir yardım etmese de, önümüzdeki birkaç yıl içinde en sonunda sen gülmeyi bileceksin.'\n'Hepsi bu mu?'\n'Evet.'\n'Açıkçası, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], bu tavsiyeyi basitleştirilmiş, patronize ve ilham verici bulmadım. Asıl şaşırtıcı olan, size bunun için para ödeniyor.'\n'Ethan, nereden arıyorsun?'\n'Evden.'\n'Peki, Ethan’ın sınıf arkadaşları dinliyorsa, nerede olduğunu biliyorsunuz ve sonsuza kadar orada kalamaz. Aradığınız için teşekkürler.'"
 panum.2626.g: "Bekle, bu programı biliyorum!"
