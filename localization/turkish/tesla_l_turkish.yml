l_turkish:
 tesla_prototype_mechanical_computer_modifier: "Mekanik Bilgisayar Prototipi"
 tesla.223.t: "İlk Prototip"
 tesla.223.d: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis] Mekanik Bilgisayar yapma arayışında, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] basit hesaplamalar yapabilen ilk prototipi tamamlamayı başardı. Gerçek bir bilgisayar kadar güçlü olmasa da bu cihaz bilim insanlarımız için faydalı olabilir."
 tesla.223.f: "Henüz tüm hesaplamaları yapamıyor, ama en azından birkaçını yapabiliyor. Toplama, çıkarma, çarpma ve bölme sorun olmamalı. Ama dikkat edin, bir asistanım makine çalışırken neredeyse parmağını kaybediyordu."
 tesla.223.g: "Umarım [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] sadece bir prototipten fazlasını tamamlar..."
 tesla.224.t: "Özellik Ekleme"
 tesla.224.d: "Görünüşe göre Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] fikirlerle dolu. Mekanik Bilgisayarın planlarında her gün bir değişiklik oluyor. Soru şu: Proje tamamlanabilecek mi?"
 tesla.224.f: "\"Ama ya müzik çalabilseydi! Harika olmaz mıydı?\""
 tesla.224.g: "Lütfen sadece o bilgisayarı yapar mısınız?"
 tesla.224.h: "Fon kesintisi tehdidi yap"
 tesla.225.t: "Yangın Mekanik Bilgisayara Zarar Verdi"
 tesla.225.d: "Büyük bir yangın Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]’ın mekanik bilgisayarının bazı parçalarına ve planlarına zarar verdi. Projenin ne kadar geri kalacağını henüz bilmiyoruz."
 tesla.225.f: "Yangın bilgisayarın yazıcı modülünde çıktı. Sebebi tam olarak bilinmiyor ama yazıcının çok fazla kağıt ürettiği anlaşılıyor."
 tesla.225.g: "Bu bilgisayar bir gün tamamlanacak mı?"
 tesla.225.h: "Onlara ek finansman gönder."
 tesla_modernized_railway_lines_state_modifier: "Modernize Edilmiş Demiryolu Hatları"
