 je_tesla_irrigation_project: "Sulama Sistemi"
 tesla_states_with_irrigation_tt: "Tüm [GetPlayer.GetAdjective] Eyaletler $tesla_state_trait_irrigation$ Özelliğine sahip (şu anda [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 tesla_irrigation_project_finished_engineer_loc: "\nDr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName], [GetPlayer.GetName]’in yeni #b Sulama Sistemleri#! üzerinde çalıştı ve onları genişleterek tarım sektörümüzü büyük ölçüde geliştirdi."
 gaudi.1111.t: "[GetPlayer.GetName]’in Sulama Sistemi"
 gaudi.1111.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to construct a modern irrigation system in [GetPlayer.GetNameNoFormatting]. Now that we tamed rivers and brought water to the fields our agriculture will surely grow!"
 gaudi.1111.f: "\"Vahşi nehirler artık kontrol altında. Sihir kayboldu. Artık sadece düz su yolları var. Hatta kunduz da kayboldu...\""
 gaudi.1111.g: "Umarım bunun beklenmedik sonuçları olmaz..."
