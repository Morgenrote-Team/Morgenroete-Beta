 tesla.3001.t: "Denizin Üzerinden Bir Kablo"
 tesla.3001.d: "[SCOPE.sCharacter('tesla_telegraph_boss_scope').GetFullName], önde gelen bir telgraf şirketinin direktörü, uzak kıyıları birbirine bağlayacak ve ulusları anında iletişimle yakınlaştıracak denizaltı telgraf kablosu inşası için iddialı bir plan sundu. Bu çabayı finanse etmek için, yeni kurulan bir kablo şirketinde hisseler sunulmaktadır. Güven göstergesi olarak, şirket devlet katılımını resmen talep etti; projenin hem ticari hem de ulusal çıkarları gözettiğini savundu."
 tesla.3001.f: "Her şey gemiler veya sinyal hatlarıyla başlamaz, mürekkep ve güvenle başlar. Sözleşmeler imzalanır, prospektüsler basılır ve hem salonlarda hem de borsalarda konuşmalar yapılır. Kablo şimdilik sadece bir vaat ve bir sorudur: Geleceğe kim yatırım yapacak? Şirketin lideri birlik, vizyon ve ilerlemeyi konuşur. Diğerleri riskten bahseder. Ve devlet, artık bu tel ve su girişiminde hangi rolü oynayacağını belirlemelidir."
 tesla.3001.g: "Devlet bu girişime katılacak."
 tesla.3001.h: "Şirket kabloyu inşa etmek istiyor, bu yüzden maliyeti kendileri karşılamalı."
 tesla.3002.t: "Hevesli Yatırımcılar"
 tesla.3002.d: "[SCOPE.sState('tesla_fund_state').GetName]'den gelen hırslı sanayiciler ve finansçılardan oluşan bir grup, denizaltı telgraf kablosu döşeme çabalarını desteklemek için bir araya geldi. Yatırımları, gelecekteki iletişim altyapısını güvence altına almak ve okyanuslar arası pazarlara erken erişim sağlamak için stratejik bir hamle olarak görülüyor."
 tesla.3002.f: "Yatırımcılar hayırsever veya romantik anlamda vizyoner değiller. Ama bilginin değerini anlıyorlar—ne kadar hızlı ulaşıyor, ne kadar güvenli geliyor ve akışını kim kontrol ediyor. Sermayelerini kablo şirketine birleştirerek, mesafenin milisaniyelerle ölçüldüğü bir dünyaya yatırım yapıyorlar. Bazıları bu coşkuda ilerlemenin işaretini görürken, diğerleri iletişimin artık spekülasyona tabi olduğunu görüyor. Her halükarda proje yeni bir ivmeyle ilerliyor."
 tesla.3002.g: "Övgüye değer bir girişim!"
 tesla.3003.t: "Politik Bir Kablo?"
 tesla.3003.d: "[SCOPE.gsInterestGroup('tesla_fund_ig').GetName]'den birkaç önde gelen üye, denizaltı kablo girişimine yatırım yapma niyetlerini kamuoyuna açıkladı. Önceden Telgraf Şirketi ile ilişkili olmasalar da, destekleri hem ideolojik hem de stratejik görünüyor—modernitenin savunucusu olarak konumlanırken hayati bir iletişim hattı üzerinde etki kazanıyorlar."
 tesla.3003.f: "İlk bakışta, teklif sermaye ve siyasi iyi niyetin hoş bir katkısı gibi görünüyor. Ancak yatırımın arkasında etki sorusu yatıyor. Kritik bir altyapıda güçlü bir muhalefet partisinin hisse sahibi olması, sadece piyasa dinamiklerini değil, aynı zamanda ulusal politika dengesini de değiştirebilir. İletişim üzerinde kontrol—kim inşa eder, kim bakım yapar ve kim öder—asla sadece teknik bir mesele olmadı. Şirket içinde bazıları, kapıyı şimdi açmanın ileride kapamayı zorlaştırabileceği konusunda uyarıyor."
 tesla.3003.g: "Bu proje güvenini artırır."
 tesla.3003.h: "Bu, mühendisimizin çalışmalarını destekler."
 tesla.3003.i: "Bu çıkar grubu çok güçlü."
 tesla.3004.t: "İstekli Olmayan Yatırımcılar"
 tesla.3004.d: "[SCOPE.sState('tesla_fund_state').GetName]'deki kapitalistler, denizaltı kablo projesi için pek hevesli görünmüyorlar. Düşman olmasalar da, kârlılık ve uzun vadeli uygulanabilirlik konusunda ciddi şüpheler taşıyorlar. Yönetim kurulundaki bazıları, bölgedeki finansal elitleri rahatlatmak için bir tanıtım kampanyası başlatmayı öneriyor—ancak bu, projenin kendisinden fonların kaydırılmasını gerektirir."
 tesla.3004.f: "Risk marjlarından, fırsat maliyetlerinden ve teknolojik belirsizlikten bahsediyorlar. Onlar için kablo bir harika değil, belirsiz getirili bir bahis. Başarısının görünür kanıtı olmadan beklemeyi veya tamamen dışarıda kalmayı tercih ediyorlar. Ancak etki para ile akar ve yoklukları projenin güvenilirliğini zayıflatabilir. Özenle hazırlanmış bir anlatı onları ikna edebilir—ama her harcanan madeni para, çelik, kablo ve gemilerden çalınmış olur."
 tesla.3004.g: "Fırsatı kaçırsınlar, biz yine de ilerliyoruz."
 tesla.3004.h: "Tanıtım kampanyası için projeden fon ayır!"
 tesla.3005.t: "Sanayiciler Destek Veriyor"
 tesla.3005.d: "Telgraf şirketinin yöneticisinin kişisel çabaları ve kabine içindeki uzun süredir devam eden ilişkileri sayesinde, etkili sanayici grubu denizaltı kablo girişimini desteklemeye karar verdi. Siyasi konumları, özel sermaye ve kamu güvenini projeye kanalize etmelerine izin veriyor ve projeye yeni bir ivme kazandırıyor."
 tesla.3005.f: "İş dünyasında başarı sadece planlar ve hesaplamalarla değil, güven ile de sağlanır. Doğru eller tokalaştığında, en isteksiz yatırımcılar bile bilanço tablolarına farklı bakmaya başlar. Sanayiciler destek verdiğinde, kablo projesi güçlü bir müttefik kazanır—finansman sağlama, koruma ve tanıtım yeteneğine sahip. Bazıları kamu ve özel çıkarların karışmasından şikayet edebilir, ama sonuçları inkar eden azdır."
 tesla.3005.g: "Teşekkürler, [SCOPE.sCharacter('tesla_telegraph_boss_scope').GetFullName]!"
 tesla.3006.t: "Endişeli Hissedarlar"
 tesla.3006.d: "[SCOPE.sState('tesla_fund_state').GetName]'deki bölgesel hissedar grubu, denizaltı kablo projesinin yavaş ilerlemesi ve artan maliyetlerinden giderek daha fazla rahatsız oldu. Uzun vadeli kayıtlardan korkarak, hisselerini satmayı düşünüyorlar. Şirket yönetimi, sınırlı bir devlet alımı ile güveni yeniden sağlayabileceğini öneriyor—ancak bu, gelecekteki beklentiler için bir emsal oluşturabilir."
 tesla.3006.f: "Yönetim kurulunda başlayan fısıltılar artık tam bir çıkış çağrısına dönüştü. Yatırımcılar proje gecikmelerini, beklenmedik mühendislik maliyetlerini ve belirsiz getirileri dile getiriyor. Bazıları paniği, bazıları mantıklı ihtiyatı görüyor. Şimdi çekilirlerse, güven başka yerlerde çökmeye başlayabilir. Ancak devlet son alıcı olarak devreye girerse, piyasaları rahatlatabilir—karmaşıklık pahasına."
 tesla.3006.g: "Piyasayı stabilize et—devlet aracılığıyla hisseleri al."
 tesla.3006.h: "Eğer vizyonları yoksa, çıkabilirler."
 tesla.3007.t: "Mühendislik Atılımı"
 tesla.3007.d: "Kablo projesinin baş mühendisi, birkaç temel teknik belirsizliği ele alan revize edilmiş bir plan seti sundu. [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]'ın bulguları, döşeme tekniği, izolasyon dayanıklılığı ve sinyal kararlılığı konularında iyileştirmeleri detaylandırıyor. Şirket yönetim kurulu, yeni yaklaşımı oybirliğiyle onaylayarak önemli bir ilerleme adımı olarak gördü."
 tesla.3007.f: "Şemalar titizlikle hazırlandı. Her kablo segmenti, her röle istasyonu, her voltaj sınırlaması dikkate alındı. Bir zamanlar uzak ve spekülatif görünen şey artık uygulanabilir bir sistemin konturlarını almaya başlıyor. Kararsız olan yatırımcılar artık uzun vadeli strateji ve altyapı mirasından söz ediyor. Vizyon mühendislikle eşleştiğinde, güven de genellikle takip ediyor."
 tesla.3007.g: "Harika haber!"
 tesla.3007.h: "Bu, hissedarları rahatlatacak."
 tesla.3011.t: "Kablo Döşeme Gemisi Kalkıyor"
 tesla.3011.d: "Kablo döşeme gemisi limandan ayrıldı ve planlamadan uygulamaya geçişi işaret ediyor. Hassas aletler, izole kablolar ve kritik malzemelerle yüklü olan gemi, projenin baş mühendisi [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]'i de taşıyor; teknik operasyonu bizzat denetliyor. Geminin seyre çıkmasıyla birlikte, kablo projesinin başarısı, binlerce kilometrelik açık denizde dikkatli çalışmaya bağlı."
 tesla.3011.f: "Büyük bir tören olmadı—sadece iplerin yavaş çekişi ve geminin vidasının dönüşü eşliğinde gemi kanala girdi. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] için bu, kutlama değil, odaklanma anıydı. Diyagramlar tekrar kontrol edildi, toleranslar gözden geçirildi, deniz haritaları nemli tahta üzerine serildi. Çelik ve hırsın ağırlığı artık kıyıdan uzak bir geminin üzerinde. Kağıt ve sözle olan şey artık gerçeklik—bobinlenmiş, yüklenmiş ve derinlere bırakılmış."
 tesla.3011.g: "İyi yolculuklar!"
 tesla.3012.t: "Güvertede Gizli Yolcu"
 tesla.3012.d: "Kablo döşeme görevine birkaç gün sonra, mürettebat alt depolama bölümlerinde saklanan genç bir adamı keşfeder. Kendini doğal tarih öğrencisi olarak tanıtır ve derin deniz faunasını incelemek için gemiye gizlice bindiğini iddia eder—resmî kanallardan bunu finanse edemeyeceği için. Bazı subaylar varlığını naif merak olarak görürken, diğerleri yabancı bir rakip adına casusluk yapıyor olabileceğinden şüphelenir."
 tesla.3012.f: "Genç, kesin ve tehdit edici olmayan bir dil kullanarak konuşur—türleri adlandırır, jeolojik tabakaları belirtir, gergin bir şekilde kitaplara ve derslere atıfta bulunur. Ancak güvenliğin hayati olduğu bir gemide şüphe hızla yayılır ve aksaklık ölümcül olabilir. Fısıltılar onun öğrenci değil, görevi tehlikeye atmak için gönderilmiş bir ajan olabileceğini öne sürer. Kaptan şimdi zor bir karar vermek zorundadır. Onu denize atmak işi hızlıca çözer. Gemide tutmak gecikme, bölünme ve daha kötüsünü riske atar."
 tesla.3012.g: "Varlığını sıkı gözetim altında tolere et."
 tesla.3012.h: "Sorunu ortadan kaldır. Denize at."
 tesla.3013.t: "Kazılardan Gelen Ek Yolcu"
 tesla.3013.d: "Kablo döşeme seferi Süveyş'ten ayrılmadan hemen önce, Avrupalı bir kazı ekibinin genç bir asistanı gemide yolculuk talep eder. Nil Deltası'ndaki arkeolojik görevi sona ermiş, şimdi Bombay'a geçmek ve karşılaştırmalı tapınak mimarisi ile eski ticaret yolları üzerine çalışmalarına devam etmek istemektedir. Tavsiye mektubu taşır ve gerekirse kataloglama veya çeviri işleri için yardım teklif eder."
 tesla.3013.f: "Kıyafetleri tozlu, Arapçası akıcı ve defteri sütunlar, kartuşlar ve güneşte yıpranmış heykel çizimleriyle dolu. Thutmose ve Ashoka'yı aynı nefeste anıyor ve geçmişin binaların ve yolların formlarında yaşadığına inanıyor. Subaylar onu zararsız buluyor, biraz fazla konuşkan olsa da. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] ona 'bir yankı toplayıcı' diyor. Ama birisi geçişine onay veriyor—belki merak, belki de anlam arayışındaki kişilere sempati nedeniyle."
 tesla.3013.g: "Geçişine izin ver. Tarih bizimle gelsin."
 tesla.3013.h: "Reddet. Bu gemi kablolar için, merak için değil."
 tesla.3014.t: "Pasifik'in Bir Bilim İnsanı"
 tesla.3014.d: "Kalkıştan kısa süre önce, genç bir etnolog, Pasifik'i geçecek kablo döşeme gemisinde yolculuk talep etti. Amacı, güzergah boyunca karşılaşacağı Polinezya adaları topluluklarının sosyal yapıları, sözlü gelenekleri ve dini uygulamalarını incelemektir. Referans materyalleri, dil notları ve denizaşırı bir üniversiteden destek mektubu ile donatılmıştır."
 tesla.3014.f: "Yumuşak bir diksiyonla ve soy ağaçları ile ilahilerle dolu yıpranmış defteriyle kendini tanıtır. Geminin makineleri hakkında az soru sorar, ama mürettebatın ada durakları hakkında çok soru sorar. Bazıları onu zararsız bir eksantrik olarak görür; bazıları ise modernitenin henüz silmediği şeyleri saygıyla gözlemleyen biri olarak. Kaptan ona bir yer verir, şartıyla yolcu olarak kalacak, kabloların nasıl döşendiği hakkında fikir sahibi bir yolcu olmayacak."
 tesla.3014.g: "Gemide olmasına izin ver. Kültür, akımdan farklı seyahat eder."
 tesla.3014.h: "Bu bir gezi gemisi değil!"
 tesla_cable_student_gains_experience_tt: "[ROOT.Var('rapanui_adventurer_var').GetCharacter.GetFullName] deneyim kazanıyor, kablo görevi tamamlandığında [concept_academics_academic] olma şansı elde ediyor."
 tesla.3021.t: "Kablo koptu!"
 tesla.3021.d: "Ana kablo döşeme sırasında koptu. Arıza, kıyıdan birkaç yüz deniz mili uzakta meydana geldi; muhtemelen gerilme, düzensiz zemin veya üretim hatası nedeniyle."
 tesla.3021.f: "Başlangıçta sinyalde takılma oldu—gecikme, sonra sessizlik. Mürettebat vinçle çektiğinde, kopmuş izolasyon ve yıpranmış bakır teller ortaya çıktı. Okyanus tabanında bağlantı kesilmişti."
 tesla.3021.g: "Bu, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]'in zamanı!"
 tesla.3022.t: "Kablo Onarıldı"
 tesla.3022.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] açık denizde kabloyu onarma mucizesini gerçekleştirdi."
 tesla.3022.f: "Bir ip, kırık bir kalem ve bir sakız sayesinde, mühendisimiz tüm karşı çıkanlara rağmen denizaltı kablosunu ustalıkla onarmayı başardı."
 tesla.3022.g: "Tanrı'ya şükürler olsun, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]!"
 tesla.3023.t: "Kablo Onarılmadı..."
 tesla.3023.d: "Tüm çabalara rağmen, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] denizaltı kablosunu kurtaramadı."
 tesla.3023.f: "Gemideki mühendisler şimdi gerilme toleranslarını ve ek noktalarını tartışıyor. Evdeki yatırımcılar sorumluluğu tartışıyor. Ve şirket, halkın ne kadarını öğrenmesi gerektiğini tartışıyor."
 tesla.3023.g: "Hasarlı segmenti her ne pahasına olursa olsun alıp onar."
 tesla.3023.h: "Hasarı atlayıp devam et—bir miktar sinyal kaybını kabul et."
 tesla.3024.t: "Yaklaşan Fırtına"
 tesla.3024.d: "Barometrik basınç hızla düştü ve ufukta karanlık bulutlar toplandı. Mürettebat, bir fırtına sisteminin geminin mevcut konumuna doğru hareket ettiğini bildiriyor. Kablo döşeme operasyonu ortadayken, durmak ilerlemeyi geciktirecek—ama devam etmek kabloyu hasara veya kayba maruz bırakabilir."
 tesla.3024.f: "Rüzgar düzensiz rüzgarlarla yükseliyor ve ufuk kayboluyor. Yağmur henüz başlamadı, ama deniz zaten ayak altında hareket ediyor. Kaptan haritalara danışıyor; mühendis gerilme ölçümlerini kontrol ediyor. Yönetim kurulu temsilcileri gecikmenin optiği ile felaket riskini tartışıyor. Fırtınalar, piyasalar gibi pazarlık etmez. Bir karar verilmelidir—hemen."
 tesla.3024.g: "Fırtınadan geç. Gecikmeye tahammül edemeyiz."
 tesla.3024.h: "Operasyonları askıya al ve daha güvenli sulara dön."
 tesla.3025.t: "Beklenmedik Deniz Tabani Koşulu"
 tesla.3025.d: "Mürettebat, kablo döşeme rotasının haritalanmamış bir derin deniz hendeğine girdiğini bildiriyor; bu, kablodaki gerilimi önemli ölçüde artırıyor. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], kablonun ek gerilime dayanıp dayanamayacağından emin değil. Rotada bir düzeltme mümkün, ama maliyetli bir sapmayı gerektirir."
 tesla.3025.f: "Teorik olarak haritalanmış olan deniz tabanı, pratikte öngörülemezliğini ortaya koydu. Batimetrik haritalar ya eski ya da yanlış ve kağıt üzerinde stabil görünen şey şimdi risk işaretleri gösteriyor. Hendek hızla iniyor ve kablo tehlikeli konturlar üzerinde sürükleniyor. Her deniz miliyle mühendisler riski maliyetle tartıyor. Şimdi dönmek kabloyu kurtarabilir—ama bütçeyi değil."
 tesla.3025.g: "Planlandığı gibi devam et. Riski kabul et."
 tesla.3025.h: "Hendekten kaçınmak için rotayı değiştir."
 tesla.3026.t: "Kablo Kazası"
 tesla.3026.d: "Arızalı bir kablo tamburunu kullanırken bir işçi hayatını kaybetti. Olay, mürettebatı sarstı ve güvenlik protokolleri hakkında endişeler uyandırdı. Kazara olsa da, ölüm evde basında bildiriliyor."
 tesla.3026.f: "Tambur uyarı vermeden döndü ve birkaç saniye içinde o kayboldu—bir demir halkasının ve momentumun altında ezildi. Tepki gösterecek zaman yoktu. Yokluğu sadece sessizlik bırakmadı; korku bıraktı. Deniz hataları affetmez. Ve belki de halk da affetmez."
 tesla.3026.g: "Güvenlik taahhüdünü kamuya tekrar et. Yeni protokolleri duyur."
 tesla.3026.h: "Göreve devam etmeye odaklan."
 tesla.3027.t: "Mürettebat Arasında Hastalık"
 tesla.3027.d: "Birkaç denizci hastalandı; ateş ve halsizlik belirtileri gösteriyor. Tıbbi malzemeler sınırlı ve neden belirsiz. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] etkilenenler arasında."
 tesla.3027.f: "Çalışma yavaşlıyor. Konuşmalar sessizleşiyor. Bir teknisyenin öksürüğü vinç uğultusundan daha yüksek yankılanıyor. Yanıt yoksa, korku kendi bulaşıcılığı olur. Okyanus ulusları ayırabilir, ama karantina sunmaz."
 tesla.3027.g: "Hasta iyileşene kadar operasyonları geçici olarak askıya al."
 tesla.3028.t: "Güvertede Şüpheli Aktivite"
 tesla.3028.d: "[ROOT.Var('rapanui_adventurer_var').GetCharacter.GetFullName] gece geç saatlerde hassas aletlerle oynarken bulundu. Meraklı olduğunu iddia ediyor ve yanlış bir şey yapmadığını söylüyor, ama subaylar ikna olmadı. Sabotaj olasılığı göz ardı edilemez."
 tesla.3028.f: "Eylem anında yakalandı, sadece beceriksiz açıklamalar sundu—'sadece okumaları kontrol ediyordum', 'her şeyin çalıştığından emin oluyordum'. Kimse onun sınırlı bölgedeki bulunmasını yetkilendirdiğini hatırlamıyor. Artık mühendisler sabotajdan bahsediyor. Kablo okyanusları geçebilir, ama ihanet sadece birkaç metre tel gerektirir."
 tesla.3028.g: "Bu sefer kaçamazsın!"
 tesla.3028.h: "O masum."
 tesla.3029.t: "Yanlış Adam"
 tesla.3029.d: "Yeni kanıtlar, kovulan mürettebatın kablo döşeme görevini sabote etmeye niyeti olmadığını gösteriyor. Bir yığın dosyalanmamış evrak arasında bulunan yanlış yerleştirilmiş bir bakım emri, aslında ilgili ekipmanın denetimini üstlendiğini doğruluyor. Olay, denizde sessizce ele alındı, fakat basında çıkan kritik haberlerle kamuya yansıdı."
 tesla.3029.f: "Gazeteler artık mürettebatın özel olarak mırıldandıklarını basıyor: bir adam yanlış varsayımlar ve eksik belgeler nedeniyle yargısız yere uzaklaştırıldı. Kanıt onu aklasa da, zarar meydana geldi—sadece ona değil, projenin itibarına da. Yatırımcılar, panik mi yoksa disiplin mi gezintiyi yönetiyor sorguluyor."
 tesla.3029.g: "Ah... ee... Sanırım o iyi."
 tesla.3030.t: "Zorlu Suların Üzerinden Sorunsuz İlerleme"
 tesla.3030.d: "Kablo güzergahının özellikle karmaşık bir bölümü—önceden özel ayarlamalar gerektirdiği düşünülen—gecikme veya komplikasyon olmadan başarıyla döşendi. Ekibin verimliliği ve hazırlığı beklentileri aştı."
 tesla.3030.f: "Bu bölümdeki deniz tabanının düzensiz bir arazi sunması bekleniyordu, ancak dikkatli planlama ve sakin hava koşulları istikrarlı ilerlemeyi sağladı. Mürettebat neredeyse sessiz çalıştı, kablo makaradan iplik gibi serildi. Mühendisler kısa bir memnuniyet baş selamı ile anlaştı ve bu sefer hiçbir düzeltmeye gerek kalmadı. Bir subayın kuru esprisiyle söylediği gibi, 'her zaman dilediğiniz ama nadiren elde ettiğiniz türden sorunsuz bir başarı.' Gemideki güven barometre ile yükseliyor."
 tesla.3030.g: "Harika!"
 tesla.3031.t: "Balinalar ve Yunuslar"
 tesla.3031.d: "Balinalar ve yunuslar güzergahı geçtiğinde eşsiz bir doğa gösterisi ortaya çıkıyor. [SCOPE.sCharacter('rapanui_adventurer_var').GetFullName], gözlemden yeni biyolojik bilgiler bekliyor, ancak mürettebat bu tür akademik meraka fazla ilgi göstermiyor."
 tesla.3031.f: "Öğrenci, bu büyüleyici deniz canlılarını avlamak için kullanılan iğrenç yöntemleri de işaret edince gemide bir tartışma çıkıyor. Çoğu denizci için, balinalar sadece yağ deposu olarak hizmet ettiğinden, bu ders ayrıca rahatsız edici oluyor."
 tesla.3031.g: "Bu harika canlıları incele."
 tesla.3031.h: "Buna zamanımız yok."
 tesla.3032.t: "O kadar Çok Balık!"
 tesla.3032.d: "[SCOPE.sCharacter('rapanui_adventurer_var').GetFullName], Kuzey Atlantik'te daha önce bilinmeyen türlerden oluşan balık sürülerini gördüğünde şansına inanamıyor. Öğrenci kaptandan çalışmayı durdurup örnekler yakalamayı talep ediyor. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], bunun bir kablo döşeme gemisi olduğunu ve araştırma tesisi olmadığını hatırlatıyor."
 tesla.3032.f: "'İnanın bana! Bilimsel araştırmayı kaçırıyoruz! Bu hassas küçük balıklar tamamen keşfedilmemiş bir tür. Görmediniz mi - şimdi onlarla birlikte suda yüzebilirim demek mi?!'"
 tesla.3032.g: "Birkaç balık yakala."
 tesla.3033.t: "Atlantik Okyanusunda Deneyler"
 tesla.3033.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], denizde geçirdiği zamanı kullanarak kablo döşeme gemisinde bazı bilimsel çalışmalar yapmak için aletlerini kurdu. Henüz bir odak seçmedi."
 tesla.3033.atlantic: "'Okyanusta bir nehir vardır. En şiddetli kuraklıklarda bile asla kurmaz, en büyük sellerde taşmaz. Kıyıları ve tabanı soğuk su, akıntısı ise sıcak sudur. Meksika Körfezi kaynağı, ağızı Arktik Denizi'dir. Bu Gulf Stream'dir.' -Matthew Fontaine Maury"
 tesla.3033.indian: "'Hint okyanusu zengin ve nadir mücevherlerle dolu olsa da, daha berrak bir gökyüzü veya daha sakin bir deniz sunmaz. Eğer inançsız dalgaların öfkesinden korkmayan bir kıyı varsa, o rüzgarlar tarafından bilinmeyen dar ve fakir bir girintidir.' -Pietro Metastasio"
 tesla.3033.pacific: "'Pasifik benim ev okyanusum; onu ilk tanıdım, kıyısında büyüdüm, kıyı boyunca deniz hayvanları topladım. Onun ruh hallerini, rengini ve doğasını biliyorum.' -John Steinbeck"
 tesla.3033.g: "Manyetik deneylere odaklan."
 tesla.3033.h: "Oşinografik deneylere odaklan."
 tesla.3034.t: "Derinliklerde Gizem"
 tesla.3034.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], ölçüm verilerini incelerken garip bir keşif yaptı. Atlantik'in belirli bir bölümünde deniz tabanı alışılmadık şekilde yükseliyor. Şimdiye kadar [SCOPE.sCharacter('tesla_engineer_var').GetSheHe] bu olgu hakkında yalnızca bir teoriye sahip."
 tesla.3034.f: "Aslında, denizlerin ortasında özellikle derin olması gerektiği düşünülüyordu. Ama bugünkü keşif bu fikri alt üst ediyor. Derinlik rekoru yerine, taban ile yüzey arasındaki mesafe azalıyor. Bu şirket için iyi bir haber çünkü önce varsayılandan daha az kablo uzunluğu gerekiyor. Ama Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] için, tüm önceki görüşlerin düzeltilmesi gerektiği açıktır. Görünüşe göre deniz tabanında tepeler ve vadiler var. Ve bu tepe sadece bir tepe değil."
 tesla.3034.g: "Altında bir deniz sıradağı mı var?"
 tesla.3035.t: "Awwam Tapınağı"
 tesla.3035.d: "[SCOPE.sCharacter('rapanui_adventurer_var').GetFullName], kaptana kısa bir kara sapışı talep etti: Aden Körfezi'nden içeri doğru Awwam Tapınağı kalıntılarını ziyaret etmek için. Antik Sabaean uygarlığının merkezi olarak bilinen site, uzun süredir sistematik çalışmalara kapalı kalmış. Öğrenci, yakından geçerken inceleme fırsatının nadiren tekrar geleceğini savunuyor. Ancak sapış kablo operasyonlarını geciktirecek."
 tesla.3035.f: "[SCOPE.sCharacter('rapanui_adventurer_var').GetLastName], ay kültleri, tütsü yolları ve henüz çözülmemiş epigrafik bulmacalardan bahsediyor. Parmakları, hayali yazıtları havada takip ediyor; devasa duvarlar ve yarı gömülü sütunları tarif ediyor. Ona göre Awwam Tapınağı, tozun altında bekleyen bir bilmece. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] için ise bu, bekleyen bir gecikme."
 tesla.3035.g: "Sapışı ver."
 tesla.3035.h: "Kablonun kendi programı var."
 tesla.3036.t: "Socotra"
 tesla.3036.d: "Gemi, Socotra açıklarında ikmal için demirlerken, [SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] gizlice karaya çıkmak için izin talep ediyor. Mısır kökenli olduğu söylenen küçük heykelcikler ve cenaze eşyalarından oluşan bir antik eser sevkiyatının adadan, bir Doğu prensi koleksiyonuna kaçak yollardan taşındığı bilgisini almış. Şimdi ele geçirilirse, eserlerin korunabileceğini, kataloglanabileceğini ve nihayetinde doğru akademik ellerine geri döndürülebileceğini savunuyor."
 tesla.3036.f: "[SCOPE.sCharacter('rapanui_adventurer_var').GetLastName] işlemin gayriresmiliğini inkar etmiyor—sadece aciliyetini vurguluyor. 'Sessiz bir tapınak heykelinden ziyade, arşivlenmiş bir sandık daha iyidir,' diyor. Mürettebat tedirgin; kaptan diplomatik hassasiyetler konusunda uyarıyor. Ancak asistan mirastan, unutulmuş parçaların kurtarılmasından ve aksi takdirde kaybolacak bilgiden söz ediyor."
 tesla.3036.g: "İzin verin—sessizce ilerlesin."
 tesla.3036.h: "Bu bizim görevimiz değil."
 tesla.3040.t: "Dev Gölge"
 tesla.3040.d: "Mürettebat, rutin kablo döşeme sırasında geminin altına devasa, yavaş hareket eden bir gölge gözlemlediğini rapor etti. Nesne ne akıntıya ne de bilinen hayvan davranışlarına uymuyordu ve iz bırakmadan kayboldu. Subaylar bunu büyük ihtimalle bir balina veya optik yanılsama olarak değerlendirse de, rapor gemide ve basında söylentilere yol açtı."
 tesla.3040.f: "Sessiz ve istikrarlı hareket etti, yüzeyin çok altında—akıntıya göre fazla düzenli, bilim tarafından bilinen herhangi bir balina için çok büyük. Bazıları metalik bir parıltı gördüğünü iddia ediyor. Diğerleri ışıklar gördüğünü söylüyor. Gemi defteri yalnızca 'belirsiz kökenli yoğun bir deniz kütlesi' not ediyor. Ama fısıltılar çoktan yayılmış. Döşediğimiz kabloların altında başka ne hareket ediyor? Zaten kim izliyor olabilir?"
 tesla.3040.g: "Bunu nadir bir denizsel karşılaşma olarak basına bildir."
 tesla.3041.t: "Denizaltı Kablo Döşeme Filosu Dönüyor"
 tesla.3041.d: "Kablo döşeme filosu limana geri döndü. Haftalar süren deniz seferinin ardından, deniz altı hattının tüm uzunluğu planlanan güzergah boyunca döşendi. Ancak nihai testler henüz başlamadı. Kablo artık kara istasyonlarına bağlanmalı ve sinyal doğrulaması yapılmalı. Ancak o zaman projenin gerçekten başarıya ulaşıp ulaşmadığı anlaşılacak."
 tesla.3041.f: "Vinçlere pas lekeleri yapışmış, gövde tuzla çizilmiş. Mürettebat yorgun, mühendis sessiz. Kablo yerinde—deniz tabanına gömülmüş, sırtlardan gerilmiş, eklenmiş ve mühürlenmiş. Ama hâlâ kıtalar arası tek bir kelime bile iletilmedi. Gemiler evine dönmüş olabilir, ama kesinlik onlarla gelmedi. Tüm gözler şimdi son teste çevrildi."
 tesla.3041.g: "Yaşasın!"
 tesla.3042.t: "Okyanusun Bir Uzmanı"
 tesla.3042.d: "Denizaltı kablo görevini çevreleyen belirsizliklere rağmen, bir adam yolculuğu beklenmedik bir bilimsel başarıya dönüştürdü. Başta şüphe edilen ve neredeyse çıkarılan genç stowaway, sefer boyunca derin deniz yaşamını belgeledi, yüzlerce örnek ve detaylı çizimler topladı. Dönüşte bulguları kıtadaki doğal bilim derneklerinin ilgisini çekti."
 tesla.3042.f: "Küçük bir yağ lambası ve kısıtlı kağıt ile çalışan öğrenci, biyolüminesans planktonları, eklemli balık kemikleri ve kıyı taksonomisine bilinmeyen kabukluları katalogladı. Umutsuzca başlayan eylem akademik ün ile sonuçlandı. Basın ona 'uçurumun doğabilimcisi' diyor. O bunu sadece gözlem meselesi olarak adlandırıyor."
 tesla.3042.g: "Öğrenci mi? Ona doktor deyin!"
 tesla.3042.h: "Bu bilimsel belgeler gerekli."
 tesla.3043.t: "Yıkıntılar ve Rotaların Güncesi"
 tesla.3043.d: "Suez'den Bombay'a kablo seferi sırasında, genç arkeolojik asistan, rota boyunca gözlemlenen veya tartışılan mimari, yazıtlar ve kültürel kalıntılar hakkında geniş notlar aldı. Önceki saha çalışmalarından ve yolculuğun coğrafi çeşitliliğinden yararlanarak, akademik çevrelerde büyük övgüyle dolaşan kapsamlı bir rapor hazırladı."
 tesla.3043.f: "Sadece kıyıları gözlemlemedi. Not defteri, terk edilmiş tapınakların, mola yerlerinin ve unutulmuş liman kasabalarının konturlarını izledi—bir zamanlar ticaret ve inanç ile bağlanmış medeniyetlerin parçaları. Şimdi yazıları aracılığıyla, o parçalar tekrar konuşuyor. Yayın, netliği ve süreklilik hissi ile övülüyor; akademi ile denizcilik arasında bir köprü kuruyor. Kablo bugünü bağlarken, güncesi geçmişi restore ediyor."
 tesla.3043.h: "Bu arkeolojik eserler gerekli."
 tesla.3044.t: "Etnoloji Kürsüsü"
 tesla.3044.d: "Kablo seferi sonrası, gemide yolculuk yapan öğrenci, Polinezya halklarının karaya çıkış ve duraklamalarında gözlemlenen akrabalık sistemleri, sözlü gelenekler ve navigasyon kozmolojileri üzerine bir dizi makale yayımladı. Çalışmaları birçok ülkedeki akademisyenler tarafından övgüyle karşılandı. Bir üniversite, onu karşılaştırmalı etnoloji üzerine yeni bir kürsüye atamak istiyor."
 tesla.3044.f: "Yazıları romantizmi önler, ancak ilahilerin ritmini ve soy ağacının mantığını taşır. Tanrıları rüzgar gibi, aile ağaçlarını dalgalar gibi tasvir eder. Akademik salonlarda adı artık 'okyanusal epistemoloji' terimi ile birlikte anılıyor. Gemideki hatırlayanlar için, bu kadar sessiz not tutmanın tüm bir alanı şekillendirebileceğini düşünmek tuhaf. O bunu dinlemek olarak adlandırıyor."
 tesla.3044.h: "Bu Polinezya eserleri gerekli."
 tesla.3051.t: "Atlantik Üzerindeki İlk Kelime"
 tesla.3051.d: "Bir deniz altı kablo üzerinden iletilen mesaj, [SCOPE.sCountry('tesla_country_1').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('tesla_leader_1').GetFullName] tarafından [SCOPE.sCountry('tesla_country_1').GetName]'den, 16 saat sonra [SCOPE.sCountry('tesla_country_2').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('tesla_leader_2').GetFullName] tarafından [SCOPE.sCountry('tesla_country_2').GetName]'ye ulaştırıldı."
 tesla.3051.f: "'Bu zafer, bir savaş alanında kazanılmış zaferlerden çok daha görkemli ve insanlık için çok daha faydalıdır. Tanrı’nın lütfu altında, Atlantik telgrafının akraba uluslar arasında sürekli barış ve dostluk bağı ve İlahi Takdir tarafından din, medeniyet, özgürlük ve hukukun tüm dünyaya yayılmasını sağlayacak bir araç olmasını dilerim.' -James Buchanan"
 tesla.3051.g: ".... . .-.. .-.. --- -.-.--"
 tesla.3052.t: "Sessizlik"
 tesla.3052.d: "Kablo kıyı istasyonuna bağlandı. Başlangıç iletim denemeleri yapıldı—yanıt alınamadı. Uzak uçtan henüz bir sinyal doğrulanmadı. Teknisyenler ekipmanı test ve yeniden kalibre etmeye devam ediyor, ama saat geçtikçe güven azalıyor. Görev başarısız gibi görünüyor."
 tesla.3052.f: "Hat sessiz. Hiç çatırdama, tıkırtı veya akım titremesi yok—sadece doğal olamayacak kadar kusursuz bir durgunluk. Bazıları sorunu cihazlarda, bazıları röle noktalarında, bazıları ise denizde arıyor. Mühendisler gergin sessizlik içinde çalışıyor, yatırımcılar kaybı fısıldıyor ve basın spekülasyon yapmaya başlıyor. Belki sinyal sadece gecikmiştir. Belki bir şeyler ters gitmiştir. Ya da belki de her zaman fazla istenmişti—deniz altındaki mesajlar."
 tesla.3052.g: "Tüm bir servet denizde kayboldu..."
 tesla.3052.tt: "Hisse sahiplerinin güveni sıfıra düşmezse, şirket yeni bir sermaye artırımı başlatmayı deneyecek."
 tesla.3053.t: "Güvenin Çöküşü"
 tesla.3053.d: "Finansal piyasalar panik içinde. Yatırımcı duyarlılığı çöktü. Telgraf şirketinin hisseleri hızla değer kaybetti ve bu, sanayi yeniliği ile hükümetin spekülatif girişimlerdeki rolüne olan genel güvenin azalmasına yol açtı. Ortaya çıkan kriz bankalar, şirketler ve haneler arasında yayılıyor."
 tesla.3053.f: "Her şey belirsizlikle başladı—sonra sessizlik geldi ve şimdi hesaplaşma zamanı. Bir zamanlar geleceğin sembolü olan hisseler artık kağıttan daha değersiz. Ofisler kapanıyor, bankalar çekim işlemlerini durduruyor ve telgraf şirketinin adı sadece acı ile anılıyor. Binlerce küçük yatırımcı hayat birikimlerini saatler içinde kaybediyor. Kıtaları birleştirmesi amaçlanan kablo, ulusal ekonomiyi parçaladı. Kablo sessizce denizin altına uzanıyor; üstünde ise gürültü sağır edici."
 tesla.3053.g: "Piyasalar kendiliğinden düzelecek, değil mi? Her zaman öyle yaparlar…?"
 tesla.3054.t: "Yenilgi"
 tesla.3054.d: "Bir yabancı güç kendi transoceanic kablosunu başarıyla tamamlayıp aktif hale getirdi. Telgraf sinyalleri artık deniz üzerinden iletiliyor—sadece bizim kablomuzdan değil. Bu duyuru piyasaları sarstı ve kendi girişimimizin hızı ve amacıyla ilgili zor sorular ortaya çıkardı."
 tesla.3054.f: "Manşetler net ve acımasız: bir mesaj okyanusu geçti, ama bizim şartlarımızda değil. Bir zamanlar bir yarış olan şey artık bir kazananı var—ve o biz değiliz. Yatırımcılar duraklıyor, yetkililer savunmaya geçiyor, rakipler sessizce not alıyor. Yabancı kablo sadece sinyaller taşımıyor; etki, güvenilirlik ve ilk hamle avantajı taşıyor. Kendi gemilerimiz hâlâ denizde sürüklüyor, mühendisler hâlâ hesap yapıyor. Bu arada dünya ilerliyor—bağlı, ama bizim sayemizde değil."
 tesla.3054.g: "Bu... bir sorun."
 tesla.3061.t: "Doğu Telgrafı Tamamlandı"
 tesla.3061.d: "Doğrudan bir deniz altı telgraf kablosu artık Mısır ile Hindistan’ı Suez üzerinden bağlıyor. Yıllarca süren hazırlık, haritalama ve sığ denizler ile tartışmalı sulardan geçişin ardından hat tamamlandı. Telgraf operatörleri sinyallerin net ve gecikmesiz alındığını doğruluyor."
 tesla.3061.f: "'Hindistan’a giden kablo tamamlandı.' -Anonim"
 tesla.3061.g: "-... --- -- -... .- -.-- ..--.."
 tesla.3071.t: "Pasifik Üzerindeki İlk Mesaj"
 tesla.3071.d: "Tarihte ilk kez, bir mesaj, Avustralya’dan Kanada’ya kesintisiz bir deniz altı kablo zinciri aracılığıyla Pasifik Okyanusu'nu geçti. Kablo binlerce deniz mili boyunca uzanıyor ve artık kelimeleri saniyeler içinde yarım küreler arasında taşıyor. İlk resmi iletim kısa, resmi ve tarihî oldu."
 tesla.3071.f: "'Pasifik Kablosu başarıyla döşendi. İmparatorluk artık kendi sahip olduğu ve kontrol ettiği bir iletişim zinciri ile birbirine bağlı. Bu başarı, Majesteleri’nin tüm topraklarında birlik ve iş birliği bağlarını güçlendirecektir.' -Edmund Barton"
 tesla.3071.g: ".... --- --- .-. .- -.-- -.-.--"
