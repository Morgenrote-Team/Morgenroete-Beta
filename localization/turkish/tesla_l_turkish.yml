 tesla_topographic_map_project_new_priority_button: "Öncelikli Eyaletleri Değiştir"
 tesla_topographic_map_project_new_priority_button_desc: "#T Öncelikli Eyaletleri Değiştir#!\nBu proje için öncelikli [Concept('concept_state', '$concept_states$')] eyaletlerini değiştirin.\n#n Uyarı: Önceliklendirmeyi doğru uygulamak için oyunu duraklatın.#!"
