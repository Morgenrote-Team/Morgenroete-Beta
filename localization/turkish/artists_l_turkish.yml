 je_artists_realism: "Sanat Salonu"
 je_artists_realism_reason: "Realizm bir sanat formu olarak giderek artan bir popülerlik kazanıyor. Çeşitli yerlerdeki ressamlar zaten bu yeni okula bağlılık gösteriyor. Ancak, realizmin hala kendi, gerçek bir merkezi eksik. Geleneksel sanat seçkinlerinin yeni tarza olan antipatisi, şimdiye kadar yalnızca akademi dışında bir fenomen olarak kalmasına neden oldu. Bu tarzı öğreten kendi sanat akademimize, realist resmin yer bulduğu bir galeriye ve elbette ülkemizde realizmin model figürü olan bir [concept_klimt_painter]'a ihtiyacımız var. Bir sanat salonunun kurulması ayrıca resim yarışmaları düzenlememize de olanak sağlayacaktır."
 je_artists_realism_success: "#G 250#! @klimt_painting_tradition! [concept_klimt_painting_tradition]'a ihtiyacımız var."
 je_artists_realism_goal: ""
 je_artists_realism_trigger: "Realizm için bir [concept_artists_center_of_arts] #G mevcut değil#!."
 je_artists_realism_fail: "Realizm için bir [concept_artists_center_of_arts] #R mevcut#!."
 je_artists_irrationalism: "Müzik Festivali"
 je_artists_irrationalism_reason: "Kendini 'total sanat eseri' olarak gören yeni, devrimci bir müzik biçimi şekilleniyor. Bu müzik formuna hayat vermek olağanüstü bir bestecinin elinde. Bu müzik tek başına kendi festival salonunda çalınabilir ve uluslararası müzik meraklıları için bir hac yeri haline gelebilir: bu bir irrasyonalizm merkezi olurdu! Bir müzik festivali kurulması ayrıca müzik yarışmaları düzenlememize de olanak sağlayacaktır."
 je_artists_irrationalism_success: "#G 500#! @elgar_music_tradition! [concept_elgar_musical_tradition]'a ihtiyacımız var."
 je_artists_irrationalism_goal: ""
 je_artists_irrationalism_trigger: "İrrasyonalizm için bir [concept_artists_center_of_arts] #G mevcut değil#!."
 je_artists_irrationalism_fail: "İrrasyonalizm için bir [concept_artists_center_of_arts] #R mevcut#!."
 artists.2007.t: "Realizmin Merkezi"
 artists.2007.d: "[SCOPE.sState('elgar_culture_capital').GetCityHubName], Realist sanat tarzının merkezi haline geliyor. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] bunda önemli bir rol oynadı ve şimdi realist resim okulunun önde gelen bir figürü olarak kabul ediliyor."
 artists.2007.f: "Sanat tarihinde realizm, klasisizm ve romantisizmin temsillerine karşı çıkan, 19. yüzyılın ortalarında Avrupa'da başlayan yeni bir sanat anlayışını ifade eder. Sanatta realizm, gerçekliği olabildiğince yakından yeniden oluşturmaya çalışır. Sanatçının gerçekliği sahiplenmesi ve ardından onu bir sanat eserine dönüştürmesi ve siyasi çağrışımları realizmin karakteristik özellikleridir. Gündelikliği ve nesnelliği teşvik eder. En bilinen temsilcisi, provokatif etkisi nedeniyle realist sanat terimini sahiplenen ve kendi sanatı için kullanan Fransız ressam Gustave Courbet'ti."
 artists.2007.g: "Ama gerçeklikte gerçek güzelliği bulabilir misiniz?"
 artists.2008.t: "İrrasyonalizmin Merkezi"
 artists.2008.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]'ın Festival Salonu'nun kuruluşu, 19. yüzyıl müzik kültürünün zirve noktalarından biri olarak kabul ediliyor."
 artists.2008.f: "[SCOPE.sState('elgar_culture_capital').GetCityHubName] Festivali, her yıl düzenlenen ve 19. yüzyıl bestecisi [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]'ın operalarının performanslarının sunulduğu bir müzik festivalidir. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] kendi eserlerini, özellikle de anıtsal döngüsü 'Der Ring des Nibelungen' ve 'Parsifal'ı sergilemek için özel bir festival fikrini tasarladı ve teşvik etti. Performanslar, özel olarak tasarlanmış bir tiyatroda, [SCOPE.sState('elgar_culture_capital').GetCityHubName] Festspielhaus'ta gerçekleşir. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] tiyatronun tasarımını ve inşasını bizzat denetledi; bu tiyatro, [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]'ın bestelediği devasa orkestraları barındırmak ve bestecinin eserlerinin sahnelenmesi hakkındaki özel vizyonunu karşılamak için birçok mimari yenilik içeriyordu. Festival, klasik müzik meraklıları için bir hac destinasyonu haline gelmiştir."
 artists.2008.g: "[GetPlayer.GetDefinition.GetPrimaryCulture.GetName] kültürünün bir zirvesi!"
 artists.2011.t: "Fin de Siècle (Yüzyıl Sonu)"
 artists.2011.d: "Yeni bir yüzyılın başlamasıyla birlikte, kesinlikler kayboluyor ve belirsizlikler artıyor. Bu durum sanat için de geçerli. Bir zamanların yeniliği olan izlenimcilik, yeni sanat hareketlerine yer açıyor. Sonuçlar hala tamamen açık - ve ayrıca bu kopuşun hangi sanatçıları üreteceği de."
 artists.2011.f: "Fin de Siècle, aynı zamanda 'Décadence' (Çöküş) olarak da bilinir, 19. yüzyılın son yirmi yılındaki sanatsal eğilimleri ve yaşam tarzını ve daha geniş anlamda, Belle Époque ile paralel olarak I. Dünya Savaşı'nın başlangıcına kadar olan dönemi ifade eder. Terim, kültürel bir çöküşü konu alan bir kültür hareketi olmasına atıfta bulunur. Zaman, bir iyimserlik ruhu, geleceğe dair coşku, belirsiz gelecek korkusu ve gerileme, kıyamet havası, yaşam yorgunluğu, dünya yorgunluğu, ölüm ve geçicilik çekiciliği, kaygısızlık, hafiflik ve çöküş arasında gidip gelen bir karaktere sahipti. Toplumsal yaşamın temel değerlerinin risk altında görünmesi nedeniyle genel bir kriz, önde gelen sosyal sınıfları sardı. Bir yandan piyasa kanunu ve anonim kitleler, diğer yandan doğa bilimleri ve teknoloji ile giderek daha fazla karakterize edilen bir dünya karşısında hem çekilen hem de itilen entelektüeller, sanatçılar ve yazarlar için bir çaresizlik hissi karakteristik hale geldi. Estetik karşıt dünyalara kaçtılar."
 artists.2011.g: "Müzik, sanatların kraliçesidir."
 artists.2011.h: "Resim, bizim gücümüzdür."
 artists.2011.i: "Tamamen edebiyata adanmış durumdayız."
 artists.2012.d: "Yeni bir yüzyılın başlamasıyla birlikte, kesinlikler kayboluyor ve belirsizlikler artıyor. Bu durum sanat için de geçerli. Bir zamanların yeniliği olan dışavurumculuk, yeni sanat hareketlerine yer açıyor. Sonuçlar hala tamamen açık - ve ayrıca bu kopuşun hangi sanatçıları üreteceği de."
 artists.2013.d: "Yeni bir yüzyılın başlamasıyla birlikte, kesinlikler kayboluyor ve belirsizlikler artıyor. Bu durum sanat için de geçerli. Bir zamanların yeniliği olan Art Nouveau, yeni sanat hareketlerine yer açıyor. Sonuçlar hala tamamen açık - ve ayrıca bu kopuşun hangi sanatçıları üreteceği de."
