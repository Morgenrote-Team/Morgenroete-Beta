 artists.11.t: "Bestecimiz Öldü"
 artists.11.d: "Yıllarca [concept_elgar_composer] olarak geçirdiği zamanın ardından, eski birinci sınıf müzisyenimiz öldü. Böyle şaşırtıcı bir sanatçının yerini hiç doldurabilecek miyiz?"
 artists.11.g: "Onun melodisinin sonu."
 artists.11_tt: "Bazen oyun karakterleri öldürür. Bir mod bunun olmasını engelleyemez. Bu olay, o sanatçının rolünü oyundan kaldırır, böylece onun hayaleti tarafından rahatsız edilmezsiniz."
 artists.12.t: "Yazarımız Öldü"
 artists.12.d: "Yıllarca [concept_manzoni_writer] olarak geçirdiği zamanın ardından, eski birinci sınıf söz yazarımız öldü. Böyle şaşırtıcı bir yazarın yerini hiç doldurabilecek miyiz?"
 artists.12.g: "Acaba son sözleri ne oldu?"
 artists.13.t: "Ressamımız Öldü"
 artists.13.d: "A[concept_klimt_painter] olarak onlarca yıl geçirdikten sonra, en büyük sanatsal yeteneğimiz öldü. Böyle şaşırtıcı bir sanatçının yerini hiç doldurabilecek miyiz?"
 artists.13.g: "Onların boyası kurudu."
