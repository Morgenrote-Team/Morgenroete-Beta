 je_artists_impressionism: "İzlenimcilik"
 je_artists_impressionism_reason: "[concept_elgar_impressionism], bir sahnenin kısa anlık görüntülerinin atmosferik tasviri ile karakterize edilen bir sanat tarihi stilidir. 19. yüzyılın ikinci yarısında Fransa'da resim içindeki bir hareketten ortaya çıkmıştır. İzlenimcilik terimi ayrıca müziğin, edebiyatın, filmin ve fotoğrafçılığın belirli stillerine de uygulanmıştır. Heinrich Hart gibi birçok Natüralist, müziği 'hakikat arayan Aksiyonizm'i ifade etmenin bir aracı olarak reddederken, İzlenimciler sıklıkla, ince derecelendirilmiş renkli akorlara doğru 'nesnesiz önceden hayal kurmayı' bir zevk olarak görürlerdi."
 je_artists_impressionism_success: "#G 850#! @elgar_music_tradition! [concept_elgar_musical_tradition]'a ihtiyacımız var."
 je_artists_expressionism: "Dışavurumculuk"
 je_artists_expressionism_reason: "[concept_elgar_expressionism] sanatta bir stildir. Başlangıçları ve öncülleri 19. yüzyılın sonlarında bulunabilir. İzlenimcilik, Sembolizm ve Fovizm gibi, Dışavurumculuk da Natüralizm eğilimlerine karşı bir harekettir. Dışavurumculukta, ifade düzeyi estetik, hitap edici ve olgusal düzeyi ağır basar. Sanatçı, deneyimini izleyici için temsil etmek ister. Şeylerin dış görünüşünün algısını tasvir eden müzikal izlenimciliğin aksine, dışavurumcu sanat akımları insan ruhunun duygularını formüle eder."
 je_artists_expressionism_success: "#G 850#! @elgar_music_tradition! [concept_elgar_musical_tradition]'a ihtiyacımız var."
 je_artists_art_nouveau: "Art Nouveau"
 je_artists_art_nouveau_reason: "[concept_elgar_art_nouveau], çoğunlukla İtalya ile bağlantılı olarak Stile liberty, 19. yüzyıldan 20. yüzyıla geçiş döneminde bir sanat tarihi dönemidir. Art Nouveau'ya atfedilebilecek akımlar reform tarzı (reform hareketinden sonra), Secession tarzı (Viyana Secession'undan sonra), Katalonya'da Modernisme, İsviçre'de Style Sapin ve ABD'de Tiffany Stili'dir. Fransızca, İngilizce ve İtalyancada dominant olan Art nouveau ifadesine ek olarak, İngilizcede Modern Style ve İtalyancada Stile Floreale da kullanılır. Zamansal olarak Art Nouveau, fin de siècle'a aittir."
 je_artists_mass_culture: "Kitle kültürü"
 je_artists_mass_culture_reason: "'Kitle'nin Kültürü temsil eden tüm geleneklere anlamayan düşmanlığı, köylünün bilgeliğini şaşırtan keskin ve soğuk zeka, cinsiyet ve toplumla ilgili tüm konularda oldukça ilkel içgüdülere ve koşullara geri dönen yeni bulunan natüralizm, panem et circenses'in ücret anlaşmazlıkları ve spor stadyumları şeklinde yeniden ortaya çıkışı - tüm bu şeyler, Kültür'ün kesin olarak kapanışına ve insan varlığının oldukça yeni bir aşamasının açılışına işaret eder.' - Oswald Spengler, Batı'nın Çöküşü"
 je_artists_mass_culture_goal: ""
 je_artists_biennale: "Bienal"
 je_artists_biennale_reason: "Bienal, iki yılda bir düzenlenen bir sergidir. Tarihi modeli, hızla uluslararası üne kavuşan ve tüm alanlardan çağdaş sanatçıların yarışmak için bir Mekke'si haline gelen Venedik Bienali'dir. Dünyanın dört bir yanından sanatçılar, vatanlarına uluslararası tanınırlık kazandıracak ve kültürel güçler olarak konumlarını pekiştireceklerdir."
 je_artists_biennale_fail_tt: "Başka bir ülke bizi geçerse bir Bienal düzenleyemeyiz."
 artists.1001.t: "Bienal Kuruldu"
 artists.1001.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName], çağdaş eserlerden oluşan uluslararası bir sanat sergisi için mükemmel bir yer olarak kabul edilmektedir. Organizatörler, gelecek yıl orada ilk bienali düzenlemek için hazırlıklara başladılar."
 artists.1001.f: "İlk Bienal düzenlendikten sonra, ülkemizde iki yılda bir yeni bir Bienal gerçekleşecek ve sanatsal alanda mükemmelleşen ulusları onurlandıracaktır. Belirleyici faktör, bir ulustaki tüm sanatçıların birleşik itibar değeridir. Bienal, her zaman Bienal mekanının sahibi olan ülke tarafından düzenlenir. [SCOPE.sState('artists_biennale_city').GetCityHubName] yabancı güçler tarafından fethedilirse, yeni sahipleri Bienal'e ev sahipliği yapmaya hak kazanacaktır."
 artists.1001.g: "İlk Bienal'i hazırlayacağız."
 artists.1002.t: "[SCOPE.sState('artists_biennale_city').GetCityHubName] [TimeKeeper.GetCurrentDate.Format('y')] Bienali"
 artists.1002.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName]'daki Bienal birkaç haftadır devam ediyor. Sergilenen sanatçılar arasında şimdiden bir trend ortaya çıkıyor. [SCOPE.sCountry('artists_biennale_first_winner_scope').GetName]'den katılımcılar favori olarak görülüyor. [SCOPE.sCountry('artists_biennale_second_winner_scope').GetName] ve [SCOPE.sCountry('artists_biennale_third_winner_scope').GetName]'ın da ilginç sergileri var ancak bu yeterli olmayacak."
 artists.1002.f: "Venedik Bienali 1895'te kuruldu ve 20. yüzyılın ilk on yıllarında giderek daha uluslararası hale geldi. 1907'den itibaren, ilki Belçika'dan olmak üzere, birkaç ülke sergide ulusal pavyonlar kurdu. 1910'da uluslararası üne sahip ilk sanatçılar sergilendi: Gustav Klimt'e adanmış bir oda, Renoir için bir kişisel sergi, Courbet'in bir retrospektifi. Picasso'nun 'Saltimbanque Ailesi' adlı eseri, yeniliğinin halkı şoke edebileceğinden korkulduğu için merkezi Palazzo'daki İspanyol salonundan kaldırıldı. 1914'e kadar yedi pavyon kurulmuştu: Belçika (1907), Macaristan (1909), Almanya (1909), Büyük Britanya (1909), Fransa (1912) ve Rusya (1914)."
 artists.1002.g: "Jüriler toplanmalı."
 artists.1003.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName] Bienali jüri üyelerinin oy birliğiyle aldığı karar sonucunda, sanatçılarımız bu yıl en yenilikçi ve kaliteli sergileri sunmuş olup resim, edebiyat ve müzik alanlarında lider konumdadır. Tebrikler!"
 artists.1003.f: "[GetPlayer.GetName] bu yılki Bienal'e şüphesiz damgasını vurdu ve birinci oldu. [SCOPE.sCountry('artists_biennale_second_winner_scope').GetName]'den sanatçılar ikincilik ödülünü kazandı ve [SCOPE.sCountry('artists_biennale_third_winner_scope').GetName]'den sanatçılar da ikna ediciydi."
 artists.1003.g: "Bu, yeni bir kültürün şafağıdır."
