 curie.10.t: "[SCOPE.sState('curie_uranium_state_scope').GetName]'da Uranyum Bulundu"
 curie.10.d: "Bir jeolog, [SCOPE.sState('curie_uranium_state_scope').GetName]'daki numune toplama çalışmaları sırasında son derece zengin uranyum yatakları buldu. Fizikçiler ve kimyacılar son derece ilgileniyor."
 curie.10.f: "Uranyum (adını Uranüs gezegeninden alır), element sembolü U ve atom numarası 92 olan bir kimyasal elementtir. Uranyum bileşikleri, 19. yüzyıl boyunca cam ve seramikleri, vazoları ve dekoratif parçaları, aynı zamanda kase veya bardak gibi günlük nesneleri renklendirmek için kullanıldı. Joachimsthal'da (Bohemya) cam üreticileri bu tekniği 1826 kadar erken bir tarihte kullanıyorlardı. Uranyum, 20. yüzyılın ortalarına kadar cam renklendirmek için kullanıldı, ancak o zaman daha az zararlı başka renklendirici minerallerle değiştirildi. Turuncudan parlak kırmızıya kadar değişen uranyum içeren seramik sırlar, sofra takımlarından mimari aksesuarlara kadar her şeyde kullanıldı. ABD'de bir üreticinin adı nedeniyle 'Fiestaware' olarak adlandırılan bu seramik, muhtemelen birçok Amerikan hanesinde hala bulunabilen en radyoaktif eşyalardan biridir."
 curie.10.g: "Parlak gelecek!"
