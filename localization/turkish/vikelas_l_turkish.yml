 vikelas.501.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Otomobil Kulübü"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], tutkulu bir sürücü olarak kabul edilir ve aynı fikirdeki kişilerle bir otomobil kulübü kurdu. Bu girişim, yerli otomobil endüstrisini güçlendirmek ve ulusal otomobil etkinlikleri düzenlemek amacıyla yapıldı."
 vikelas.501.f: "1890’ların ortalarında, dünyadaki ilk otomobil kulübü olarak 1895’te kurulan Automobile Club de France (ACF), yılda bir kez yarış düzenliyordu ve bu sezonun doruk noktasıydı. Bu, katılımcıların aralıklı olarak tek tek gönderildiği kamu yollarında yapılan 'şehirden şehire' yarışlardı. ACF'nin kuruluşuna öncülük eden nedenlerden biri, 1894’te Albert de Dion'un Paris-Rouen yarışından elenmesiydi. Takip eden yıllarda hızlı bir gelişme başladı ve giderek daha güçlü araçlar motorsporlarında tehlikeleri artırdı. Bu nedenle ACF, 1901’de ilk kez dünyanın ilk motorsporu yönetmelikleri olarak kabul edilebilecek kuralları uyguladı. Temel yeniliklerden biri, ACF tarafından desteklenen tüm etkinliklerde uygulanması gereken kategorilere ayrılmaydı. Ortaya çıkan ağırlık sınırlaması, başlangıçta aşırı yük nedeniyle meydana gelen lastik arızalarının sayısını azaltmaya yardımcı oldu."
 vikelas.501.g: "Heyecan dolu bir spor!"
 vikelas.502.t: "İlk Grand Prix Yarışı"
 vikelas.502.d: "Motor sporları devrimsel bir dönüşüm geçiriyor: Grand Prix yarışları ile tüm motor sporlarını seven ülkelerde uluslararası yarışlar ardı ardına düzenlenecek. Böylece uluslararası bir şampiyona doğdu. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName], önümüzdeki yıl ilk Grand Prix yarışlarına katılmaları için tüm Otomobil Kulüplerine sahip ülkeleri davet etti."
 vikelas.502.f: "Gordon Bennett Kupası için düzenlenen yıllık yarışlar, 1900-1905 yılları arasında bir otomobil dünya şampiyonası düzenleme girişiminin ilk örneğiydi. Sürekli artan hızlar göz önüne alındığında, 1902’de ACF, katılımcı arabaların uyması gereken teknik yönetmelikleri ilk kez sözde bir yarış formülü şeklinde yayınladı. Yine de kaza sıklığı artmaya devam etti, bu nedenle 1903’ten itibaren yalnızca kapalı pistlerde yarış yapılabildi. Gordon Bennett yarışlarının halefi olarak, ACF tarafından organize edilen ana yarış, 1906’da Grand Prix adı altında ilk kez düzenlendi. Tarihteki ilk Grand Prix galibi, Macar sürücü Ferenc Szisz’in Renault’su oldu."
 vikelas.502.g: "Peki kazanılacak bir şey var mı?"
 vikelas.503.t: "Uluslararası Tanınmış Otomobil Kulüpleri Derneği"
 vikelas.503.d: "Bugün [GetGlobalVariable('vikelas_aiacr_seat_global_var').GetStateRegion.GetCityHubName]’da Uluslararası Otomobil Derneği kuruldu. Tam adı Association Internationale des Automobile Clubs Reconnus (AIACR)."
 vikelas.503.f: "Otomobil üreticilerinin tüm uluslararası yarışlara katılabilmesi için, daha önce Fransız Otomobil Kulübü tarafından kendi yarışları için bağımsız olarak belirlenen teknik ve sportif kuralların, ilgili Grand Prix formülü şeklinde Uluslararası Otomobil Derneği tarafından ülkeler arası düzenlenmesi gerekli oldu. Dernek, 20 Haziran 1904’te Paris’te kuruldu; karar, birkaç gün önce en önemli yarış ülkelerinin otomobil kulüpleri tarafından Gordon Bennett Kupası kapsamında alınmıştı. AIACR, II. Dünya Savaşı’ndan sonra FIA adını alacaktı."
 vikelas.503.g: "Bundan sonra otomobil yarışları uluslararası!"
 vikelas.504.t: "Yeni Grand Prix Yarış Pisti"
 vikelas.504.d: "AIACR’nin bir başka üyesi resmi bir Grand Prix pisti inşa etti. Artık yıllık yarış takviminde #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V Grand Prix pistleri#! bulunuyor."
 vikelas.504.f: "'Otomobil yarışı, boğa güreşi ve dağcılık tek gerçek sporlardır… diğerleri oyundur.' -Ernest Hemingway"
 vikelas.504.g: "Tribünlerdeki VIP koltukları ayırtın."
 vikelas.505.t: "Yarış Arabası Üretici Konumu"
 vikelas.505.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')], [GetPlayer.GetName] ilk seri yarış takımına sahip. [SCOPE.sState('vikelas_team_state').GetName]’deki araba fabrikası, artık kurulan marka sayesinde yüksek talep görüyor."
 vikelas.505.f: "Bireysel sürücülerden, fabrika sürücülerine sahip profesyonel yarış takımlarına yavaş gelişimle motor sporları kalıcı olarak değişti. Kendi arabasını yapan amatörler nadir hale geldi. Yine de diğer araba üreticilerinden lisanslı eksantrik aristokratların heyecan arayışı devam etti, ancak araba geliştirme motor sporlarının gerçek merkezi oldu."
 vikelas.505.g: "Artık kendi yarış arabalarımızı tasarlayabiliriz!"
 vikelas.506.t: "Yarış Arabası Mekanikçisi"
 vikelas.506.d: "Baş mühendis Dr. [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName], yeni kurulan yarış takımı için mekanik olarak görev alabilecek mükemmel bir asistan seçti: [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] uzmanlık alanı..."
 vikelas.506.f: "Mekanikçiler bir arabada üç alanda iyileştirme yapabilir: motor, güvenlik ve gövde. Uzmanlaşma, belirli bir alanda modernizasyonu iki kat daha hızlı gerçekleştirmeye yardımcı olur. Temel olarak - ama her zaman değil - motorlar güvenilirliği (ve hızı), güvenlik eklentileri güvenliği ve gövdeler hızı (ve güvenliği) artırır."
 vikelas.506.h: "Motor."
 vikelas.506.i: "Güvenlik."
 vikelas.506.j: "Gövde."
 vikelas.511.t: "Büyük [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] Yarışı"
 vikelas.511.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] mevcut haftalık sayısında büyük bir araba yarışı duyurdu. Şehirden şehire yarış [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]'den [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]'ye yapılacak. Yurt dışından da çok sayıda yarışçının katılması bekleniyor."
 vikelas.511.f: "Motor yarışlarının ilk günleri, kendi arabasını yapmış, mekanikçi ile birlikte şehirden şehire yarışlara katılan 'centilmen sürücülerle' karakterize edildi. Bu yarış formatı sıklıkla gazeteler ve otomobil kulüpleri tarafından ilan edilir, organize edilir ve desteklenirdi. Mekanikçiler çoğunlukla deneyimsiz olduğundan, varış noktasına ulaşmak daha önemliydi. Marcel Renault'un Paris-Madrid yarışında meydana gelen ölümcül kaza gibi olaylar, bu organizasyon biçiminin yarış tarihindeki yalnızca geçici bir aşama olduğunu gösterdi."
 vikelas.511.g: "Etkinliğe üç ay içinde hazırlan."
 vikelas.512.t: "Yarış Katılımı"
 vikelas.512.d: "Yaklaşan [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] yarışı [SCOPE.sCountry('vikelas_race_country').GetName]’da, ülkemizin önde gelen yarışçısı [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]'in de katılıp katılmayacağına dair spekülasyonlara yol açtı."
 vikelas.512.g: "Mükemmel bir fırsat!"
 vikelas.512.h: "Bu çok tehlikeli."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] yarışa üç ay içinde hazırlanacak."
 vikelas.513.t: "Serbest Sürüş"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] şanslı: [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe], açık yolda tam gaz sürebiliyor. Motor duruyor, virajlar sorunsuz. Bir yarış sürücüsü için en iyi koşullar."
 vikelas.513.f: "'Hız kana karıştığında, yaşamak için sürmek gerekir.' -Rudolf Carraciola"
 vikelas.513.g: "Harika!"
 vikelas.514.t: "Güzel, el değmemiş Doğa"
 vikelas.514.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] şehirden şehire sürerken, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName], geçtiği bölgede el değmemiş doğayı fark eder. Belki de [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] yanında bir hatıra almalı?"
 vikelas.514.f: "Motor sporlarının ilk dönemlerinde, sürücüyü mümkün olduğunca vahşi ve el değmemiş manzaralardan geçmek özel bir cazibe unsuru idi ve sürücüye zorluklar sunardı. Bu nedenle, erken yarış pistleri, sürüş becerisi ve adaptasyon gereksinimlerini daha az talep ettiği gerekçesiyle eleştirilirdi. Elbette bazı uzak vadiler, plajlar ve dağlık alanlar sürprizler sunabilirdi."
 vikelas.514.g: "Kazanmamız gereken bir yarış var!"
 vikelas.514.h: "Bazı bitkiler topla."
 vikelas.514.i: "Bazı taşlar topla."
 vikelas.515.t: "Depoya Şeker"
 vikelas.515.d: "Kısa bir durak sırasında, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName], rakibi [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]'in arabasının da yakında olduğunu fark eder. Görünüşe göre araba tamamen gözetimsiz."
 vikelas.515.f: "'Hile yapmıyorsan, denemiyorsun demektir.'"
 vikelas.515.g: "Tatlı bir intikam."
 vikelas.516.t: "Arkadaşına biraz yardım?"
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] şu anda iyi bir konumda, ama yol kenarında duman çıkaran [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]'in arabasını görüyor. Belki de [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] her şeyin yolunda olup olmadığını kontrol etmeli?"
 vikelas.516.f: "Motor yaralanmaları ve kazalar, yarışların ilk günlerinde yaygındı. Daha sonraki zamanlarda kapalı pistlerde gözlemciler bulunsa da, uzun mesafe yarışlarında gözlemci olmadan bir arıza tehlikeli olabilirdi. 1930’larda Apenninler’deki Mille Miglia’da hâlâ kurtlar görülüyordu. Bu yüzden yarış arkadaşları arasında yardım çoğu zaman doğal olarak gelir."
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] durmalı ve yardım etmeli."
 vikelas.516.h: "Haha! Aptallar!"
 vikelas.517.t: "Motor problemleri"
 vikelas.517.d: "Motorla ilgili bir şeyler oluyor - [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] bile açıklayamıyor. Şu ana kadar bir teşhis yapılamadı. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U], yarışa düşük hızda devam etmek zorunda kalabilir."
 vikelas.517.f: "Motor problemleri her tür motor sporunda ortaya çıkar - hem o zaman hem de şimdi. Lider konumda olan pek çok sürücü, yarıştan erken çekilmek zorunda kaldı. Şu durumda, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] yarışı tamamlayabilir, ama yavaşlamak zorunda kalırsa kazanması çok daha zor olur."
 vikelas.517.g: "Mevcut tüm mekanik ayarlamaları kullan."
 vikelas.517.h: "Araba bu şekilde yarışı tamamlamalı."
 vikelas.518.t: "Çiviler"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName], diğer yarışçulara karşı belli bir avantaj elde etti. Belki [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] kazanma şansını artırabilir ve diğer yarışçılara zor anlar yaşatabilir?"
 vikelas.518.f: "'Ben hile yaptığım için onun hile yaptığını biliyordum ve beni yendi.'"
 vikelas.518.g: "Çivileri al, Muttley."
 vikelas.518.h: "Böyle sportmen olmayan uygulamalardan kaçınırız."
 vikelas.519.t: "Diskalifiye"
 vikelas.519.d: "Maalesef, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]'in sportif ihlali ortaya çıktı. Yarış komisyonu, [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim]'i derhal yarıştan men etti."
 vikelas.519.f: "'Şehirden şehire yarışın 12. paragraf 6. satır 9 kurallarına göre, katılımcı genel kuralları ihlal etti ve bu nedenle erken elendi. İtiraz mümkün değil.'"
 vikelas.519.g: "Diskalifiye mi? Bu adaletsiz!"
 vikelas.520.f: "#V Nihai Sonuçlar#!\n\nBirinci: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] - [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nİkinci: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] - [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nÜçüncü: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] - [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.520.g: "Şampanya!"
 vikelas.521.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] için Zafer"
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], [SCOPE.sCountry('vikelas_race_country').GetName]’daki şehirden şehire yarışta birinci oldu. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe], bir [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')] sürdü."
 vikelas.521.g: "Şampanya!"
 vikelas.522.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] için 2. Sıra"
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], [SCOPE.sCountry('vikelas_race_country').GetName]’daki şehirden şehire yarışta ikinci oldu. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe], bir [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')] sürdü."
 vikelas.522.g: "Görüşürüz bir sonraki sefere!"
 vikelas.523.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] için 3. Sıra"
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], [SCOPE.sCountry('vikelas_race_country').GetName]’daki şehirden şehire yarışta üçüncü oldu. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe], bir [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')] sürdü."
 vikelas.524.t: "Şehirden Şehire Yarış Sona Erdi"
 vikelas.524.d: "[SCOPE.sCountry('vikelas_race_country').GetName]’daki büyük şehirden şehire yarış sona erdi ve kazananlar belirlendi. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], bir [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')] sürdü. İyi bir sıralama elde edemesek de, en azından araba ve sürücü sağ salim varışa ulaştı."
 vikelas.531.t: "Dayanıklılık Yarışı"
 vikelas.531.d: "[GetPlayer.GetName] büyük bir dayanıklılık yarışı organize etti ve yarışa katılmaları için dünyanın dört bir yanından yarışçıları davet etti."
 vikelas.531.f: "20. yüzyılın başlarındaki ilk araba yarışları, mümkün olan en uzun mesafede yapılan yarışlardı. Bu yarışlar, yarış arabalarının hız ve güvenilirliğini test etmeyi amaçlıyordu. İlk aşamalarda Fransa yarışlarda baskın olmasına rağmen, kısa süre sonra Grand Prix yarışlarına geçildi. Bu, hala önemli uluslararası dayanıklılık yarışlarının olduğu gerçeğini değiştirmedi. En geleneksel yarış Sicilya’daki Targa Florio idi. 1906’dan 1977’ye kadar çoğunlukla Mayıs ayında önemli uluslararası bir etkinlik olarak düzenlendi, bazıları Dünya Kupası statüsüne sahipti. Targa Florio’dan sonra, Bin Mil (Mille Miglia) karayolu yarışları arasında klasik olarak kabul edildi (1950’lerde Carrera Panamericana eklendi) ve 'Gran Turismo' (GT) teriminin temelini oluşturdu; bu terim, uzun mesafe yarışları için hızlı tur spor arabalarını tanımlar, örneğin Ferrari’nin MM için özel olarak geliştirdiği arabalar gibi."
 vikelas.531.g: "Bitiriş çizgisinde görüşürüz!"
 vikelas.533.t: "Lastik Hasarı"
 vikelas.533.d: "Yarışın ortasında patlayan bir lastik, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] için ani bir durmaya yol açtı. Olayın ardından sürücü yaralanmadan kurtuldu ve soğukkanlı davranışıyla etkilendi, ancak önemli zaman kaybetti."
 vikelas.533.f: "1931 Mille Miglia, aşırı lastik aşınması ile karakterize edildi. Roma’ya varmadan önce Arcangeli dokuz kez lastik değiştirmek zorunda kaldı. Nuvolari de birkaç kez lastik patlatmasına rağmen, Roma’da Caracciola’nın iki dakika önünde liderdi. Adriyatik’e dönüş yolunda Alfa Romeo’lar lastik sorunlarına rağmen tempolarını korudu. Bu sırada Borzacchini, yarışı 18 dakika önde götürdü. Akdeniz kıyısında kuzeye doğru Campari, toparlanan Arcangeli’nin dört dakika önündeydi. Alfa Romeo’lar arasında liderlik birkaç kez değişti ve İtalyanlar yarış mesafesinin iki üçte birinden sonra her şeyi kontrol altında gibi görünüyordu. Bu durum, birçok lastik değişikliğine imkan tanıyan yoğun bir servis istasyonu ağı sayesinde mümkün oldu. Karar, son 80 kilometrede, şiddetli yağmur başlaması ve Alfa Romeo’ların tekrar yıpranmış lastikleriyle kazalar yaşamasıyla verildi."
 vikelas.533.g: "Şanssızlık."
 vikelas.534.t: "Demiryolu Geçidi"
 vikelas.534.d: "Başka bir sürücüyü takip ederken aniden bir uyarı sesi duyuldu: hem ön hem de arka araçların önünde bir demiryolu bariyeri indi. Öndeki araba hızla geçti. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], durup durmama veya rakibin çok fazla mesafe kazanmasını beklemeksizin geçmeye cesaret edip etmeme kararını vermeli."
 vikelas.534.f: "Mille Miglia sürücüleri, 1954’te yarışan Hans Hermann gibi cesur manevralara yatkındı; Hermann, kapanan bir demiryolu bariyerinin altından arabasını sürerek kendisinin ve yolcusunun başlarını eğmek zorunda kaldığı bir durum yaşadı."
 vikelas.534.g: "Risk al!"
 vikelas.534.h: "Bu çok tehlikeli!"
 vikelas.538.t: "Kurtlar ve Tabancalar"
 vikelas.538.d: "Dağlık bir gece sürüşünde yarış takımı yol dışına çıktı. Aniden bir uluma duyuldu. Yakınlarda bir kurt sürüsü dolaşıyor gibi görünüyordu."
 vikelas.538.f: "'Kendimizi bir kar fırtınasında bulduk ve kurtlar tarafından kovalandık. Ancak her zaman koltuk minderi altına sakladığım tabancamla ve meşale ve silahlarla donanmış yol ekibinin gelmesiyle kurtlar kaçtı.' -Enzo Ferrari"
 vikelas.538.g: "Kurtları öldür."
 vikelas.538.h: "Bölgeden genişçe dolaşarak geç."
 vikelas.538.i: "Bu keşif, aptal bir yarıştan çok daha önemli."
 vikelas.539.t: "Yarış arabası seyircilere çarpıyor!"
 vikelas.539.d: "Yarış sırasında bir yarış arabasının pistten çıkarak kalabalığa çarpması sonucu korkunç bir kaza meydana geldi. Motor sporları dünyası sarsıldı ve güvenlik standartları tartışması tekrar alevlendi."
 vikelas.539.f: "1927’deki ilk Mille Miglia’dan itibaren, yol kenarlarında çok sayıda seyirci bulunmasına rağmen etkinlik felaket kazalarından korunmuştu. Ancak bu durum 3 Nisan 1938, saat 16:30’da değişti. Bu noktada iki Cenevizli sürücü Angelo Mignanego ve yardımcı pilotu Dr. Luigi Bruzzo, Lancia Aprilia ile Viale Berti Pichat, Bologna üzerinden geçiyordu. Yaklaşık 100 km/s hızla, deneyimsiz Mignanego aracın kontrolünü tramvay raylarında kaybetti. Lancia önce bir ağaca, ardından büyük bir seyirci grubuna çarptı. İki araç yolcusu neredeyse yara almadan kurtulurken, on kişi, bunların yedisi çocuk, kazada hayatını kaybetti. 26 seyirci yaralandı, bazıları ciddi şekilde. 12 yaşında bir kız Stanghella’da başka bir kazada öldü."
 vikelas.539.g: "Yarış için kara bir gün."
 vikelas.540.t: "Yeni Ortalama Hız Rekoru"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], dayanıklılık yarışında eşi görülmemiş bir ortalama hız elde etti. Rekor, motor sporları tarihine bir dönüm noktası olarak geçecek."
 vikelas.540.f: "Nefes kesen hassasiyet ve teknik ustalıkla, [GetPlayer.GetCustom('vikelas_race_team_name_type')] daha önce imkânsız olduğu düşünülen bir ortalama hız elde etti. Rekor, motor sporlarının bu altın çağının uzun süre en önemli olayı olarak kabul edilecek."
 vikelas.545.t: "Hayran Toplanması!"
 vikelas.545.d: "İki şehir arasındaki dayanıklılık yarışı sırasında, bir tezahürat kalabalığı, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]'in şehirlerinden geçişini kutlamak için toplandı. Bu etkinlik, motor sporunun halk tarafından benimsenmesini simgeliyor."
 vikelas.545.f: "Sokaklar, arabayı yakından görmek isteyen insanlar tarafından dolup taşmıştı. Çocuklar bayrak sallıyor, yetişkinler sürücünün adını haykırıyordu; sürücünün becerisi ve cesareti onlara ilham veriyordu. Araba durduğunda heyecan dalgası onu sardı. Çiçekler, alkışlar ve tezahüratlar, sürücü tekrar yola çıkmadan önceki kısa durak boyunca eşlik etti. Bu an, insanların kalplerinde hız ve teknoloji tutkusu uyandırdı — motor sporunun önümüzdeki on yıllarda ne anlama geleceğine dair bir ipucu."
 vikelas.545.g: "Yarış popülerleşiyor."
 vikelas.541.t: "Dayanıklılık Yarışı Sona Erdi"
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName], [SCOPE.sCountry('vikelas_first_winner_scope').GetName]'den, prestijli dayanıklılık yarışını ve seyircilerin kalbini kazandı."
 vikelas.541.f: "Son birkaç kilometre gerçek bir gösteriydi: toz pistte savruldu, motorlar kükredi ve heyecan hissedildi. Kazanan nihayet bitiş çizgisini geçtiğinde, muazzam tezahüratlar yükseldi. Arabası, acı bir yarışın izleriyle kaplı olarak, kazanma iradesinin sembolü haline geldi. Hayranlar onu omuzlarına taşıdı ve kalabalık bu anı kutladı. Bu zaferle, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], motor sporlarında en önemli kişilerden biri haline gelir ve yarış takımı [GetPlayer.GetCustom('vikelas_race_team_name_type')] yüksek saygınlığa sahip bir marka olur."
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "[GetPlayer.GetName] Grand Prix"
 vikelas.551.d: "Yarış sezonu [GetPlayer.GetNameNoFormatting]'e ulaştı. Birçok yarışçı ve yarış takımı, ülkemizin kısa süre sonra ev sahipliği yapacağı Grand Prix için hazırlık yapmak üzere çoktan geldi."
 vikelas.551.f: "'Yarışmak yaşamaktır. Geri kalan sadece beklemektir.' -Rudolf Carraciola"
 vikelas.551.g: "En hızlı kazansın."
 vikelas.552.t: "En Hızlı Tur"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], yarış antrenmanında en hızlı turu yaptı. Bu, asıl yarış için mükemmel bir işaret."
 vikelas.552.f: "'Başlamadan önce bile kazanacağıma emindim.' -Ettore Bugatti"
 vikelas.553.t: "Yağ Tabakası"
 vikelas.553.d: "Grand Prix yarışında, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], bir kazadan kalan yağ tabakasına girdi ve yoldan çıktı. Sürücü ve araç yarışa devam edebiliyor, ancak mevcut yarışta çok zaman kaybetti."
 vikelas.553.f: "'Arabaları gitmesi için yapıyorum. Durması için değil.' -Ettore Bugatti"
 vikelas.553.g: "Aman tanrım!"
 vikelas.554.t: "Yağmur"
 vikelas.554.d: "Grand Prix yarışı aniden gelen bir yağmur ön cephesiyle şaşırdı. Bazı sürücüler ekipmanlarını değiştirmek için durdu. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] için soru şudur: Yarışı dikkatsizce tamamlamalı mı yoksa güvenli tarafta kalmak için yavaşlamalı mı?"
 vikelas.554.f: "'Hiçbir şeyden korkma. Sadece inan.' -Armand Peugeot"
 vikelas.554.g: "Bu bir sürücüyü yoldan çıkarmaz!"
 vikelas.554.h: "Hızı yavaşlat."
 vikelas.555.t: "Önde Geçme Manevrası"
 vikelas.555.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], [SCOPE.sCountry('vikelas_race_country_scope').GetName]’den yarışçı [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]'e yaklaşınca benzersiz bir fırsat doğuyor. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe], önde geçme manevrası yapmalı mı?"
 vikelas.555.f: "'Mükemmel yarış arabası önce bitiş çizgisini geçer ve sonra parçalara ayrılır.' -Ferdinand Porsche"
 vikelas.555.g: "Forza!"
 vikelas.555.h: "Bu çok riskli."
 vikelas.556.t: "Önde Geçme Manevrası Başarılı"
 vikelas.556.d: "Önde geçme manevrası tamamen başarılı oldu. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] öne geçti ve hız avantajı elde etti."
 vikelas.556.f: "'Bir Alfa Romeo geçtiğinde, şapkamı çıkarırım.' -Henry Ford"
 vikelas.556.g: "Yaşasın!"
 vikelas.557.t: "Önde Geçme Manevrası Başarısız"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], önde geçme manevrasında başarılı olamadı. Rakip kendini başarıyla savundu ve yarışçımız çok zaman kaybetti."
 vikelas.557.f: "'Talihsiz bir durum, ama her şey oyunun içinde. Elimden geleni yaptım, kaybettim, ödülü alan kişinin yanında dururum.' -Ralph DePalma"
 vikelas.557.g: "Ne yazık."
 vikelas.558.t: "Ev Sahibi Seyirciler Sürücüyü Motive Ediyor"
 vikelas.558.d: "[GetPlayer.GetNameNoFormatting] Grand Prix'inde, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] yerel bir kahraman olarak görülüyor ve seyircilerden özellikle güçlü destek alıyor. Bu, yarışçıyı inanılmaz derecede motive ediyor!"
 vikelas.558.f: "'İkinci olanı kim hatırlar ki, bu asla ben olmayacağım.' -Enzo Ferrari"
 vikelas.558.g: "Harika!"
 vikelas.559.t: "Otomobil Yarışı Şampiyonası"
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag] bu yarış sezonuna damgasını vurdu ve otomobil şampiyonluğunu kazandı."
 vikelas.559.f: "#V Sezon Sonuçları#!\n\nBirinci: [SCOPE.sCountry('vikelas_first_winner_scope').GetName], [SCOPE.GetValue('vikelas_first_winner_points_scope')] Puan, [SCOPE.GetValue('vikelas_first_winner_victories_scope')] Zafer\nİkinci: [SCOPE.sCountry('vikelas_second_winner_scope').GetName], [SCOPE.GetValue('vikelas_second_winner_points_scope')] Puan, [SCOPE.GetValue('vikelas_second_winner_victories_scope')] Zafer\nÜçüncü: [SCOPE.sCountry('vikelas_third_winner_scope').GetName], [SCOPE.GetValue('vikelas_third_winner_points_scope')] Puan, [SCOPE.GetValue('vikelas_third_winner_victories_scope')] Zafer\nDördüncü: [SCOPE.sCountry('vikelas_fourth_winner_scope').GetName], [SCOPE.GetValue('vikelas_fourth_winner_points_scope')] Puan, [SCOPE.GetValue('vikelas_fourth_winner_victories_scope')] Zafer\nBeşinci: [SCOPE.sCountry('vikelas_fifth_winner_scope').GetName], [SCOPE.GetValue('vikelas_fifth_winner_points_scope')] Puan, [SCOPE.GetValue('vikelas_fifth_winner_victories_scope')] Zafer"
 vikelas.559.g: "Şimdi Bizet çal."
 vikelas.559.h: "İstatistiklerle ilgilenmiyorum."
 vikelas.559.tt: "Yıllık Otomobil Şampiyonası istatistikleri artık gösterilmeyecek."
 vikelas.561.t: "[GetPlayer.GetName] Grand Prix Sona Erdi"
 vikelas.561.d: "Grand Prix yarışı sona erdi ve kazananlar belirlendi. [GetPlayer.GetName] Grand Prix'inin galibi [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] oldu. Yarış etkinliği, halk tarafından uzun süre hatırlanacak."
 vikelas.561.f: "#V Sezon Sonuçları#!\n\nBirinci: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] – [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nİkinci: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] – [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nÜçüncü: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] – [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.561.g: "Şampanya!"
 vikelas.571.t: "Le Mans'ın İlk 24 Saati"
 vikelas.571.d: "1923 yılında, ilk Le Mans 24 Saat yarışları gerçekleşti ve kısa sürede motor sporlarının en prestijli etkinliklerinden biri haline geldi, dünya çapından sürücüleri ve üreticileri çekti."
 vikelas.571.f: "26–27 Mayıs 1923'te, Automobile Club de l'Ouest tarafından düzenlenen ilk Le Mans 24 Saat yarışı yapıldı. Sarthe bölgesindeki 17,3 kilometrelik pistte 33 araç yarıştı. Koşullar zorluydu: yağmur, çamurlu yollar ve Le Mans şehri ile çevresindeki kırsal yolları kapsayan bir rota. Zafer, Chenard & Walcker Sport kullanan André Lagache ve René Léonard’a gitti; 24 saatte 2.209 kilometre kat ettiler. Bu yarış, motor sporlarında yenilik ve dayanıklılığı kutlayan bir geleneğin başlangıcını işaret etti."
 vikelas.571.g: "24 saat mi? Bu çılgınlık!"
 vikelas.572.t: "Targa Florio'nun Doğuşu"
 vikelas.572.d: "1906 yılında, Sicilya'nın dolambaçlı yollarında düzenlenen muhteşem bir yarış olan Targa Florio yaratıldı. Vincenzo Florio tarafından organize edilen bu yarış, bölgeyi motor sporları dünyasının merkezine taşıdı."
 vikelas.572.f: "6 Mayıs 1906'da, Sicilya'nın dik dağ yolları ve pitoresk köylerini zorlu bir yarış parkuruna dönüştüren ilk Targa Florio gerçekleşti. Motorsport tutkunu Vincenzo Florio tarafından organize edilen etkinlik, sportif bir meydan okuma vizyonunu gerçekleştirdi. Parkur 446 kilometre uzunluğundaydı ve 148 kilometrelik üç turdan oluşuyordu. Zafer, Itala kullanan Alessandro Cagno’ya gitti; bitiş çizgisini ortalama 46,8 km/s hızla geçti. Targa Florio hız, beceri ve cesaretin simgesi olarak hızla ün kazandı."
 vikelas.572.g: "Targa Florio Gelenek Yaratıyor"
 vikelas.573.t: "İlk Semmering Berg-Rennen"
 vikelas.573.d: "1899 yılında, Semmering’de ilk yokuş tırmanışı yapıldı ve erken dönem otomobil mühendisliği ile sürüş becerilerinin sınırları test edildi. Bu etkinlik, motor sporları tarihinde önemli bir dönüm noktası oldu."
 vikelas.573.f: "27 Ağustos 1899'da, Avusturya Otomobil Kulübü tarafından organize edilen ilk Semmering Yokuş Tırmanışı düzenlendi. Klamm am Semmering’den dağ geçidine kadar uzanan 9,8 kilometrelik rota, erken dönem otomobillerini ve sürücülerini sınırlarına kadar zorladı. %7’ye varan eğimler ve keskin virajlarla yarış, hem teknoloji hem de cesaret testi oldu. Zafer, bir Mors otomobil kullanan Kont Jenő Zichy’ye gitti; parkuru ortalama 22,2 km/s hızla tamamladı. Yarış büyük bir izleyici kitlesini çekti ve Avrupa’da yokuş tırmanışı geleneğinin temelini attı."
 vikelas.573.g: "Yokuş tırmanışı halkı büyülüyor."
 vikelas.581.t: "Yeni Yarış Arabası Motoru"
 vikelas.581.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] motoru geliştirdi. En son yarış arabası modeli artık #V altı silindirli bir motor#! kullanıyor. Yeni araba şimdi [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')] adını taşıyor."
 vikelas.581.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] motoru geliştirdi. En son yarış arabası modeli artık #V dört silindirli kompresörlü motor#! kullanıyor. Yeni araba şimdi [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')] adını taşıyor."
 vikelas.581.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] motoru geliştirdi. En son yarış arabası modeli artık #V sekiz silindirli kompresörlü motor#! kullanıyor. Yeni araba şimdi [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')] adını taşıyor."
 vikelas.581.f: "'Motorlar inşa ederim ve onlara tekerlek takarım.' -Enzo Ferrari"
 vikelas.581.g: "Forza!"
 vikelas_new_engine_tt: "Mevcut motor yükseltilecek."
 vikelas.582.t: "Yeni Yarış Arabası Güvenlik Donanımları"
