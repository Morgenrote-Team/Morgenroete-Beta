 vikelas.300.t: "Yeni Bir Spor"
 vikelas.300.d_football: "Giderek daha fazla vatandaşımız yeni bir oyun olan Futbol’dan etkileniyor. Birçoğu [SCOPE.sCountry('vikelas_overlord_country_scope').GetName]’den gelen bu 'ithalatı' eleştirse de, bu spor artık o kadar popüler hale geldi ki, ondan kaçınmak neredeyse imkansız."
 vikelas.300.d_baseball: "Giderek daha fazla vatandaşımız yeni bir oyun olan Beyzbol’dan etkileniyor. Birçoğu [SCOPE.sCountry('vikelas_overlord_country_scope').GetName]’den gelen bu 'ithalatı' eleştirse de, bu spor artık o kadar popüler hale geldi ki, ondan kaçınmak neredeyse imkansız."
 vikelas.300.d_cricket: "Giderek daha fazla vatandaşımız yeni bir oyun olan Kriket’ten etkileniyor. Birçoğu [SCOPE.sCountry('vikelas_overlord_country_scope').GetName]’den gelen bu 'ithalatı' eleştirse de, bu spor artık o kadar popüler hale geldi ki, ondan kaçınmak neredeyse imkansız."
 vikelas.300.f: "'Oyun bir dinlenme gibidir ve sürekli çalışamazsınız, dinlenmeye ihtiyacınız vardır.' -Aristoteles"
 vikelas.300.g: "Gol!"
 vikelas.300.h: "Bana sopamı ver!"
 vikelas.300.i: "Güzel top."
 vikelas.300.football.tt: "Futbol, [GetPlayer.GetName]’de ulusal spor haline gelecek."
 vikelas.300.baseball.tt: "Beyzbol, [GetPlayer.GetName]’de ulusal spor haline gelecek."
