 vikelas.100.t: "Olimpiyat Rüyası"
 vikelas.100.d: "[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName], antik Olimpiyat Oyunlarını modern bir kılıfla yeniden canlandırmak istiyor. Uluslararası bir spor müsabakası her dört yılda bir yapılmalı."
 vikelas.100.f: "İyi bir zihnin iyi bir bedene de ihtiyaç duyduğu antik ideallerden esinlenen Olimpiyat fikri giderek daha da gelişti. Arkeoloji de buna katkıda bulundu: 19. yüzyılın sonunda Ernst Curtius, Olympia’yı kazdı ve Olimpiyat Oyunlarına yeniden ilgi uyandırdı. Buna ek olarak, evrim teorisinin beslediği 'en uygun olanın hayatta kalması' sosyal fikri ve fabrika çağı işçiliğinde fiziksel egzersizin vazgeçilmez olduğu inancı da eklenmişti. Uluslararası bir etkinlik olarak modern Olimpiyat Oyunları, ulusal bencilliği aşmalı ve barışa katkıda bulunmalıydı. Toplumdaki sınırları aşan ilerleme, 'Citius, altius, fortius' (Daha Hızlı, Daha Yüksek, Daha Güçlü) sloganına uygun şekilde spor rekorları için çabalamakla sembolleştirilmeliydi."
 vikelas.100.g: "Uluslararası Olimpiyat Komitesi’ni kur."
 vikelas.102.t: "Uluslararası Olimpiyat Komitesi"
 vikelas.102.d: "Olimpiyat Oyunlarını yeniden canlandırmak için [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName], eski oyunların modern biçimini sürdürmek ve düzenlemekle sorumlu olacak bir Uluslararası Olimpiyat Komitesi (IOC) kurdu."
 vikelas.102.f: "İlk IOC esasen [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]’in güvendiği kişilerden oluşuyordu. Dar bir çevreye yayıldılar. Daha sonra diğer IOC üyeleri de katılacak ve benzer düşünen bu topluluk uluslararası bir organizasyon haline gelecekti."
 vikelas.102.g: "Ulusal ve uluslararası spor için ileriye doğru bir adım."
 vikelas.103.t: "Olimpiyat Oyunları: Yunan meselesi mi?"
 vikelas.103.d: "Uluslararası Olimpiyat Komitesi’nin kuruluşundan sonra, Oyunların her zaman Yunanistan’da mı yapılacağı yoksa her dört yılda bir farklı bir yerde mi düzenleneceği sorusu gündeme geldi."
 vikelas.103.f: "Uluslararası temsilciler aslında Olimpiyat Oyunlarının uluslararası bir etkinlik olarak farklı ülkelerde yapılmasını istemişti. Buna göre, ev sahibi şehir her dört yılda bir değişmeliydi. Mekân hakkındaki karar kurul tarafından verilmeliydi. Ancak oyunları yeniden canlandıran Yunanistan olduğundan bu görüş tartışmalıydı. Sonunda [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName], mekân konusunu basit bir formüle indirgedi: 'Bizim oyunlarımız, bizim kurallarımız'. Bu ise kurulun sadece onursal bir rol üstlenmesine ve yetkilerinin ciddi biçimde kısıtlanmasına yol açacaktı."
 vikelas.103.g: "Olimpiyat Oyunları bir Yunan meselesidir."
 vikelas.103.h: "Olimpiyat Oyunları uluslararası bir meseledir."
 vikelas.104.t: "Uluslararası Olimpiyat Komitesi"
 vikelas.104.d: "Olimpiyat Oyunlarını yeniden canlandırmak için [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName], eski oyunların modern biçimini sürdürmek ve düzenlemekle sorumlu olacak bir Uluslararası Olimpiyat Komitesi (IOC) kurdu. Oyunların her dört yılda bir Yunanistan’da yapılması planlandı."
 vikelas.104.f: "İlk IOC esasen [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]’in güvendiği kişilerden oluşuyordu. Dar bir çevreye yayıldılar. Daha sonra diğer IOC üyeleri de katılacak ve benzer düşünen bu topluluk uluslararası bir organizasyon haline gelecekti. Uluslararası temsilciler aslında Olimpiyat Oyunlarının farklı ülkelerde yapılmasını istemişti. Ancak güçlü Yunan etkisi nedeniyle IOC, farklı ev sahibi şehirlerle dönüşümlü düzenleme fikrinden vazgeçmek zorunda kaldı. Bu nedenle Olimpiyat Oyunları her dört yılda bir Yunanistan’da yapıldı."
 vikelas.104.g: "Onların Oyunları, onların Kuralları..."
 vikelas.105.t: "Olimpiyatların Yeniden Doğuşu"
 vikelas.105.d: "Uluslararası Olimpiyat Komitesi (IOC) toplandıktan sonra, kurul ilk modern Oyunların Yunanistan’da yapılmasına karar verdi."
 vikelas.105.f: "IOC’nin ilk görevlerinden biri yeni Oyunların yapılacağı yeri belirlemekti. Antik örneği takip eden komite, oyunların ilk olarak Yunanistan’da, orijinal Olimpiyat Oyunlarının anısına düzenlenmesine oybirliğiyle karar verdi. Bundan sonra ise her dört yılda bir farklı bir ülke Olimpiyatlara ev sahipliği yapacaktı. Ev sahibi şehir, her dört yılda bir yeniden oluşturulan kurul tarafından seçilecekti."
 vikelas.105.g: "Sabırsızlıkla bekliyoruz!"
 vikelas.106.t: "[GetRomanNumeral(FixedPointToInt(GetGlobalVariable('vikelas_olympic_games_number_global_var').GetValue))]. Olympic Games Begin"
 vikelas.106.d: "İlk modern Olimpiyat Oyunları başladı! Tüm dünya Yunanistan’a akın etti. #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! ülkeden sporcular bu uluslararası etkinliğe katılıyor."
 vikelas.106.f: "İlk modern Olimpiyat Oyunları [TimeKeeper.GetCurrentDate.Format('wy')] tarihinde başladı. Antik Olimpiyat Oyunları, putperest tanrılara tapınma nedeniyle Roma İmparatoru I. Theodosius tarafından 393 yılında yasaklanmıştı. Oyunlar o dönemde bile üst düzey spor başarıları doğurmamış olsa da, genel olarak büyük bir başarı olarak görülmüş ve Olimpiyat Oyunlarının kalıcı bir şekilde yerleşmesine önemli katkı sağlamıştı."
 vikelas.106.g: "Oyunlar evine dönüyor!"
 vikelas.107.g: "Daha Hızlı Daha Yüksek Daha İleri!"
 vikelas.108.t: "[GetRomanNumeral(FixedPointToInt(GetGlobalVariable('vikelas_olympic_games_number_global_var').GetValue))]. Olympic Games End"
 vikelas.108.d: "İlk Olimpiyat Oyunları sona erdi. Seyirciler, basın ve sporcular heyecanlı: yüzyıllar öncesine dayanan bir gelenek yeniden canlandırıldı ve modern bir biçim kazandı."
 vikelas.108.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_winners_type')] Ancak diğer ülkeler de büyük sportif başarılar elde etti. Katılan [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue|0V] ülke arasından, şu ülkeler altın madalya kazandı:\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_1_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_2_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_3_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_4_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_5_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_6_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_7_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_8_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_9_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_10_this_year_global_type')]"
 vikelas.108.g: "Citius, altius, fortius."
 vikelas.109.d: "Yunanistan bir kez daha dünyayı Olimpiyat Oyunları’na davet etti. #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! ulustan atletler bu uluslararası etkinliğe katılıyor."
 vikelas.109.f: "Yunanistan IOC’yi kurduğunda, gelecekte de geçmişte olduğu gibi Oyunların yalnızca Helen topraklarında yapılacağı açıktı. Bu sadece bir sürekliliği sağlamakla kalmadı, aynı zamanda Yunanistan’a uluslararası saygın bir rol vererek, bir zamanların küçük krallığına çok özel bir konum kazandırdı."
 vikelas.110.t: "Olimpiyat Coşkusu"
 vikelas.110.d: "[SCOPE.sCharacter('vikelas_olympics_enthusiast_scope').GetFullName], yakında Yunanistan’da gerçekleşecek Olimpiyat Oyunları’ndan büyülenmiş durumda. [ROOT.GetCountry.GetName]’in yeni kurulan Uluslararası Olimpiyat Komitesi’ne üye olması için bizzat çaba gösterdi."
 vikelas.110.f: "Olimpiyat Oyunlarının başarılı olmasına pek çok akademisyenin katkıda bulunması şaşırtıcı değildir – antik çağ tutkuları sebebiyle bu canlanmaya ilgi duyan birçok antikacı vardı. Kendileri çoğu zaman katılmasalar da IOC ile iletişim kurmaya çalıştılar. Ayrıca kendi ülkelerinin bu uluslararası etkinlikte temsil edilmesini ulusal bir onur saydılar."
 vikelas.110.g: "Takdire şayan bir girişim."
 vikelas.112.t: "Yeni IOC Yönetim Kurulu seçildi"
 vikelas.112.d: "IOC Yönetim Kurulu yeniden seçildi."
 vikelas.112.f: "IOC Yönetim Kurulu her dört yılda bir seçilir. Sadece kurucu ülke ve başkanın geldiği ülke kurulda kalır. Bunun dışında dağılım şu sistemle yapılır: 5 Büyük Güç, Avrupa’dan 2 ülke, Amerika’dan 2 ülke, Asya’dan 2 ülke, Afrika’dan 1 ülke, Okyanusya’dan 1 ülke. Kurul, IOC üyeleri arasından bir ülkeyi sıradaki Olimpiyatlara ev sahipliği yapması için seçer."
 vikelas.113.t: "Sıradaki Olimpiyatların Yeri"
 vikelas.113.d: "IOC kurul üyeleri, sıradaki Olimpiyatlara ev sahipliği yapacak ülkeyi belirlemek üzere toplandı."
 vikelas.113.f: "Son 20 yılda Olimpiyatlara ev sahipliği yapmamış IOC üyesi üç ülke seçim için aday olabilir. Dördüncü bir ülke yolsuzluk nedeniyle listeye eklenebilir. Seçim, ülkenin itibarı ve bağlantılarına bağlıdır. Vasal ve efendiler, müttefikler ve gümrük birlikleri birbirine oy verecektir. İlişkilerin durumu ve kötü şöhret de önemlidir."
 vikelas.113.g: "[SCOPE.sCountry('vikelas_olympics_candidate_1').GetName]"
 vikelas.113.h: "[SCOPE.sCountry('vikelas_olympics_candidate_2').GetName]"
