 je_vikelas_endurance_race_reason: "Ülkemizin çeşitli eyaletlerinde bir dayanıklılık yarışı düzenleniyor. Yarışa, yarışmayı seven tüm ülkelerden sürücüler katılıyor. Ev sahibi ülke hafif bir avantaj elde eder ve ek etkinlikler alır. Grand Prix yarışlarının aksine, arabaların uzun mesafe dayanıklılığı nedeniyle hızdan çok güvenilirlik önemlidir. Motor arızası riski, ölümcül kazadan daha yüksektir."
 je_vikelas_endurance_race_success: "[GetPlayer.GetName] en az #ORANGE 8 Dayanıklılık Yarışı İlerlemesi#! topladı."
