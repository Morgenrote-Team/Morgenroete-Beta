 vikelas.21.t: "The Gentlemen's Game"
 vikelas.21.d: "In [SCOPE.sState('vikelas_cricket_state').GetName], a group of cricket players has come together for the first time to play matches together under established rules. The club thus assumes a pioneering role in the sport."
 vikelas.21.f: "The 19th century was the era in which cricket evolved from a rural pastime to a sport of national and international importance. The English upper classes made the game their favorite pastime: it was cultivated in boarding schools like Eton and Harrow and glorified as a 'gentleman's sport.' At the same time, its popularity grew among the working class, particularly in northern England, where factory workers founded their own clubs. This democratization of the game led to an unprecedented growth in clubs and spectators.\n\nInternational matches were not long in coming. In 1844, the world's first documented international match between Canada and the United States took place in New York."
 vikelas.21.g: "Pass me the bat!"
 vikelas.601.t: "Kaldırımlarda Pedallar"
 vikelas.601.d: "Bulvarlarda yeni bir icat ortaya çıktı — ön tekerleğe doğrudan bağlı pedallarla çalışan iki tekerlekli bir araç. Buna 'velosiped' deniyor."
 vikelas.601.f: "Başkentteki parklarda ve geniş caddelerde kafalar dönüyor. Şapka ve yelek giymiş beyler, garip demir çerçevelerin üstünde oturuyor, çılgınca pedal çeviriyor, şaşkın kalabalıklarda sallanıyor. Bazıları düşüyor. Bazıları uçuyor. Çocuklar gülüyor. Yaşlılar kaşlarını kaldırıyor. Gazeteler buna le vélocipède diyor — yarı oyuncak, yarı vaat. Bir araba yapımcısı tarafından icat edilen bu 'kemik sarsıcı', ağır ama devrim niteliğinde. Arnavut kaldırımda omurgayı sarsıyor. Ama düzgün caddelerde, şaşırtıcı bir zarafetle hareket ediyor. Fısıltılar var: Bu sadece bir yenilik değil, yeni bir hareket tarzının tohumu."
 vikelas.601.g: "Eğlenceli bir moda!"
 vikelas.602.t: "Geleceğin Bisikleti"
 vikelas.602.d: "Eşit boy tekerlekler, zincirle tahrikli arka aks ve geliştirilmiş dengeye sahip yeni bir bisiklet tasarımı ortaya çıktı. Tehlikeli yüksek tekerlekli bisikletlerin aksine, bu 'güvenlik bisikleti' dengeli, uygun fiyatlı ve hızla popüler oluyor. İcadı? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!"
 vikelas.602.f: "Eski velosipedler kemikleri ve sinirleri sarsıyordu. Devasa penny-farthing’ler hız sunuyordu ama bedeli ağırdı — bir yanlış hareket, sürücüyü uçuruyordu. Şimdi başkentimizdeki atölyelerden yeni bir bisiklet yayılıyor: kompakt, zarif ve güvenli. Arka tekerleğe zincirle tahrik ve pnömatik lastiklerle, kadınlar ve işçiler bile sürmeye başlıyor. Bir zamanlar arabaların hüküm sürdüğü sokaklar, şimdi lastiğin taş üzerindeki yumuşak uğultusuyla doluyor. Kafelerde ve fabrikalarda aynı yorum: Bu bir oyuncak değil. Bu özgürlük — hızlı, sessiz ve aniden ulaşılabilir."
 vikelas.602.g: "Her vatandaş modern çağa sürsün."
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.611.d: "Gün geldi. Ülkenin dört bir yanından sürücüler, insanı ve makineyi açık yolda test etmek için başlangıç çizgisinde toplandı. Hava heyecanla dolu."
 vikelas.611.f: "Güneş bulvarın üzerinde yükseliyor, çoktan kalabalıkla dolu. Bayraklar sallanıyor. Yağ ve toz kokusu sabah havasına karışıyor. Düzine sürücüler bisikletlerine biniyor — bazıları fabrikadan yeni çıkmış parlak makineler, bazıları arka sokak atölyelerinde tamir edilmiş.\nBir silah sesi patlıyor. Alkışlar yükseliyor. Ve tekerlekler dönmeye başlıyor.\nŞehir kapılarından çıkıyorlar ve kırsala ilerliyorlar. Çiftçiler tarlalarında duruyor. Çocuklar yolda koşuyor. Rahipler onları kutsuyor. Kötümserler alay ediyor. Ve toz bulutları arkalarında sürüklenirken, kalabalıkta tuhaf bir his oluşuyor: Bu, daha büyük bir şeyin başlangıcı gibi hissediliyor."
 vikelas.611.g: "Her kasaba ilerlemenin uğultusunu duysun."
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.621.d: "Ulusal bisiklet yarışının galibi sadece bitiş çizgisini kazanmadı — ulusun hayal gücünü de kazandı. Şimdi tüm gözler onun temsil ettiklerine çevrildi."
 vikelas.621.f: "Gazeteler ona 'Demir Sürücü' diyor. Dokuma işçisi bir ailenin çocuğu, on iki yaşında yetim, on altı yaşında fabrika işçisi. Yıpranmış güvenlik bisikletiyle kazandığı zafer — bakımlı, yağlanmış ve tamir edilmiş — sadece bir spor zaferi değildi. Bu bir alegoriydi. Kalabalıklar adını haykırıyor. Ressamlar onu çiziyor. Çocuklar onun duruşunu taklit ediyor. Ama dahası, ideologlar not alıyor. Bazıları onun işçilerin gücünün simgesi olduğunu söylüyor. Diğerleri ulusun canlılığını kanıtladığını iddia ediyor. Basın, onun işçi mi, vatansever mi yoksa tamamen yeni bir şey mi olduğunu tartışıyor.\nSürücü kendisi çok konuşmuyor. Gülümsüyor, başını sallıyor ve sürüyor."
 vikelas.621.g: "Onu işçi sınıfının kahramanı yap."
 vikelas.621.h: "Onu ulusal bir simge olarak kutla."
 vikelas.621.i: "Onu ilerlemenin ve modern insanın bir sembolü olarak sun."
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.622.d: "Ulusal bisiklet yarışı sırasında trajik bir kaza meydana geldi. Bir yarışçı öldü, birkaç kişi yaralandı. Alkışlar durdu."
 vikelas.622.f: "Bir tekerlek çukura takıldı. Bir çığlık, bir çarpışma ve ardından çığlıklar yükseldi. Seyirciler öne atıldı, bisikletler domino gibi devrildi. Kan tozla karıştı. Kasklar parçalandı. Kemikler kırıldı. On yedi yaşındaki bir fabrika çıraklığı yapan genç adam çarpışmada hayatını kaybetti. Gazeteler ikiye bölündü. Bazıları bunu ilerlemenin gerekli bedeli olarak nitelendirdi, bazıları ise kamu sporunun dikkatsizliğini eleştirdi."
 vikelas.622.g: "Düşenleri onurlandır."
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.623.d: "Yarışın bir aşaması halkın kalbini fethetti. Seyirciler bunu sadece bir yarış değil, bir efsane olarak anlatıyor."
 vikelas.623.f: "Yarışçılar şafakta tepelere doğru kayboldular. Ardından olanlar artık bir yarış değil, bir ruh testi oldu. On iki kişi geride kaldı. Üçü çöktü. Biri keskin virajda düştü, kanlar içinde ayağa kalktı ve yardım elini geri çevirdi. Ama biri sisin içinden öne fırladı ve binlerce insanın kalbine girdi. Bütün ulus bundan başka bir şey konuşmuyor."
 vikelas.623.g: "Yol, onun çabasını nesiller boyu hatırlasın."
 vikelas.623.h: "O anın bir tablosunu sipariş et."
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.624.d: "Son yarış aşamasının ardından suçlamalar patlak verdi. Bir yarışçı hile yaparken yakalandı — bazıları onun sadece herkesin yaptığı şeyi, daha az gizli bir şekilde yaptığını iddia ediyor."
 vikelas.624.f: "'Ahırın arkasında bisikletini değiştirdiği söyleniyor. Bazıları, gizli bir tel ile tepeye çekildiğini söylüyor.' Gerçekler bulanık. Açık olan şu: yarışçı çok hızlıydı. Olağanüstü hızlı. Zorlu bir tırmanıştan sonra hâlâ taze. Rakipleri öfkeli. Seyirciler nefesini tuttu. Basın kan kokusunu aldı. Bir fotoğrafta ikinci bir adam aynı kıyafetlerle görünüyor. Başka bir tanık, yarışçının gece aşamasında bir araba tarafından itildiğini gördüğünü iddia ediyor. Suçlanan kişi her şeyi reddediyor ve kıskançlık ve siyaseti suç olarak gösteriyor."
 vikelas.624.g: "Yarışçıyı diskalifiye et ve hileyi ortaya çıkar."
 vikelas.624.h: "Sporun iyiliği için örtbas et."
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.625.d: "Bu yılki yarış sezonunda sert bir rekabet başladı. Güçleri eşit, tarzları zıt iki yarışçı ülkeyi ikiye böldü."
 vikelas.625.f: "Biri ateş: pervasız, cesur, gençler tarafından sevilen. Şapkasını kalabalığa atar, pedal çevirirken güler ve uyarısız saldırır. Diğeri buz: sakin, hesaplı, neredeyse matematiksel. Gücünü saklar, saniyelerle kazanır ve yalnızca gerektiğinde konuşur. İsimleri çatıdan çatıya haykırılır. Kasabalar taraf tutar. Afişler kırmızı veya mavi basılır. Terziler şapkalarını renklerine göre satar. Çocuklar ahşap bisikletlerde duruşlarını taklit eder. Gazeteler yalnızca bir yarıştan bahsetmez. Karakter, felsefe, halkın olmak istediği kişiden söz eder. Ve hiçbir yarışçı geri adım atmaz."
 vikelas.625.g: "Bu, gazete kültürüne fayda sağlar."
 vikelas.625.h: "Rekabeti siyasi kazanç için kullan."
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.626.d: "Bu yılki yarış sezonunda sert bir rekabet başladı. Güçleri eşit, tarzları zıt iki yarışçı ülkeyi ikiye böldü."
 vikelas.626.f: "'Onu köydeki bir demirci atölyesinde buldular, elinde çekçek, yüzü is içinde, yalnız.' İniş tehlikeliydi. Yanlış bir viraj, çakılların çatırdaması—ön çatal kırıldı. Bisikleti yaralı bir kuş gibi katlandı. Çoğu dururdu. Ama o durmadı. Kilometrelerce çerçeveyi sürükleyerek aşağı indi. Uzak bir köyde bir demirci buldu. Hiç mekanik yok, ekip arabası yok. Sadece körük, örs ve kendi elleri vardı. Saatlerce çalıştı — kolları sıvalı, çenesi sıkılı — ön çatalı hafızası ve hissiyle yeniden şekillendirdi. Yetkililer geldiğinde sadece bakış attı ve dedi ki: 'Dokunmayın.' Liderlerin sekiz saat gerisinde tekrar sürdü. Zafer şansı yoktu. Ama yol boyunca kalabalıklar ayağa kalktı — kazanan için değil, durmayı reddeden için."
 vikelas.626.g: "İlham verici bir hikaye."
 vikelas.626.h: "Acil onarımlara izin ver."
 vikelas.626.i: "Onu onurlandır!"
 vikelas.401.t: "Fédération Internationale de Football Association"
 vikelas.401.d: "Bugün Uluslararası Futbol Federasyonu, [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]'de kuruldu. Tam adı Fédération Internationale de Football Association (FIFA) olarak belirlendi."
 vikelas.401.f: "21 Mayıs 1904'te Belçika, Danimarka, Fransa, Hollanda, İspanya, İsveç ve İsviçre'den delegeler bir tüzük imzaladı. Amaç: futbol kurallarını standartlaştırmak, uluslararası maçlar düzenlemek ve oyunu küresel seviyeye taşımaktı. Böylece Fédération Internationale de Football Association — FIFA doğdu. İlk yıllarında FIFA mütevazıydı: yarı zamanlı başkanlık, amatör oyuncular ve bölgesel anlaşmazlıklar vardı. Ama yüzeyin altında, küresel bir hareket büyüyordu. İngiltere katılmakta tereddüt etti, yabancı müdahaleden çekiniyordu. Güney Amerikalılar kendi konfederasyonlarını kurmaya başladı. 1924 ve 1928 Olimpiyat turnuvaları, futbolun gerçek etkisini gösterdi: Paris'te 60.000 kişilik kalabalıklar, orduları değil, takımları destekliyordu."
 vikelas.401.g: "FIFA'ya katılın ve uluslararası yarışmaları destekleyin."
 vikelas.411.t: "Futbol Dünya Kupası [TimeKeeper.GetCurrentDate.Format('y')]"
 vikelas.411.d: "FIFA, bu yılki Dünya Kupası'nın [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]'de yapılmasına karar verdi. Ön eleme turunun ardından favori takımlar sekiz takıma indirildi."
 vikelas.411.f: "#V Çeyrek finale kalan ulusal takımlar:#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]"
 vikelas.411.g: "En iyi takım kazansın."
 vikelas.412.t: "Dünyanın Şampiyonları"
 vikelas.412.d: "Takımımız dünya sahnesinde zafer kazandı, her kıtadan gelen en iyi takımları yendi. Ülke genelinde kutlamalar patladı!"
 vikelas.412.f: "[SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] ile oynanan çekişmeli bir maçta takımımız, [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]'deki Dünya Kupası finalinde kendini kanıtladı. Milli takımımız altın kupayı kaldırdı. Final düdüğü radyolarda, kafelerde, kışlalarda yankılandı. Kuzeydeki madencilerden limandaki tüccarlara kadar halk bir ağızdan coştu. Kaptan kürsüde ağlıyor. Yeni bir nesil izliyor ve hayal kuruyor."
 vikelas.412.g: "Biz şampiyonuz."
 vikelas.413.t: "[SCOPE.sCountry('vikelas_fifa_host_scope').GetName]'de Gümüş Zafer"
 vikelas.413.d: "Futbol takımımız finale ulaştı — ancak zaferin hemen gerisinde kaldı. Ülke genelinde gurur ve hayal kırıklığı bir arada."
 vikelas.413.f: "Maalesef takımımızın en iyisi yeterli değildi. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] ile oynanan heyecan dolu maçta erkeklerimiz kısa düştü. Haftalar boyunca bir ulusun umutlarını taşıdılar. Çamurlu sahalarda ve kavurucu sıcaklarda koştular, savaştılar, inandılar. Maç maç efsane oldular. Diğer marş çalarken başlarını dik tuttular. Gözyaşı yok, sadece sessizlik—sonra yavaşça yükselen alkış."
 vikelas.413.g: "Bu bizden çalındı!"
 vikelas.414.t: "Rüya Erken Bitti"
 vikelas.414.d: "Milli takımımız [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]'deki FIFA Dünya Kupası'ndan erken elendi. Finalde [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName], [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]'i yendi."
 vikelas.414.f: "Umut vardı — gerçek, elle tutulur bir umut. Zaferler fabrika avlularında kutlandı, radyo yorumları kiliselerde fısıldandı, çocuklar sokaklarda golleri tekrar etti. Takım yalnızca futbolu temsil etmiyordu: hırsı, gururu, kendimizi aşabileceğimize dair inancı temsil ediyordu. Ama son maç her şeyi değiştirdi. Bir tek gol yendi. Görülmeyen bir elle müdahale. Kaçırılan bir fırsat. Şimdi rüya bitti ve dünya yoluna devam ediyor."
 vikelas.414.g: "İnandık. Bu yeterliydi."
