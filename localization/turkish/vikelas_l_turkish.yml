 vikelas.592.d: "[concept_vikelas_racer] olarak geçirdiği yıllardan sonra, ülkemizin tanınmış Yarışçısı öldü. Böyle bir olağanüstü yeteneği yerine koyabilecek miyiz?"
 vikelas.592.g: "Bu büyük bir kayıp!"
 vikelas.592_tt: "Bazen oyun karakterleri öldürebilir. Bir mod bunu engelleyemez. Bu etkinlik, [concept_character] rolünü oyundan kaldırır, böylece onun hayaletiyle karşılaşmazsınız."
 vikelas.593.t: "Ölümcül Araba Kazası"
 vikelas.593.d: "Yarışçı [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] şansını fazla zorladı. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] yoldan çok yüksek bir hızla çıktı ve ölümcül bir kaza geçirdi."
 vikelas.593.f: "'Yarış, her şeyi feda etmeyi gerektiren büyük bir tutkudur; çekinmeden, tereddütsüz.' -Enzo Ferrari"
 vikelas.593.g: "Sıradaki!"
 vikelas.594.t: "Araba Bozuldu"
 vikelas.594.d: "Ne yazık ki yarışçı [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], yarış bitmeden pes etmek zorunda kaldı. Araba bozuldu, [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] iddia ediyor."
 vikelas.594.f: "'Şanssızlık diye bir şey yoktur.' -Enzo Ferrari"
 vikelas.594.g: "Araba mı, yoksa sürücü motoru fazla mı zorladı?"
