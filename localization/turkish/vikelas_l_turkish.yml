 vikelas_ioc_foundation_button: "IOC’yi Kur"
 vikelas_ioc_foundation_button_desc: "Uluslararası Olimpiyat Komitesi (IOC), dernek statüsünde hükümet dışı bir organizasyondur. Komitenin amacı modern Olimpiyat Oyunlarını düzenlemek ve denetlemektir. Kurucu ülke, Olimpiyatların yapılacağı yerler hakkında karar veren kurulda kalıcı bir sandalyeye sahip olur. IOC kurulduktan kısa süre sonra ilk Olimpiyat Oyunları düzenlenebilir ve bundan sonra her dört yılda bir yapılır. Belirli koşullar altında diğer ülkeler de normal üye olarak IOC’ye katılabilir, ancak kurul sandalyelerinin sayısı sınırlıdır."
 vikelas_ioc_statistics_button: "IOC’yi Ziyaret Et"
 vikelas_ioc_statistics_button_desc: "Üyeler, bir sonraki Olimpiyatlar veya uluslararası madalya tablosu hakkında bilgi almak için Uluslararası Olimpiyat Komitesini ziyaret et."
 vikelas_ioc_member_button: "IOC Üyesi Ol"
 vikelas_ioc_member_button_desc: "Uluslararası Olimpiyat Komitesine katılarak dört yılda bir yapılan Olimpiyat Oyunlarında yarış. IOC üyeleri ayrıca oyunları kendi ülkelerinde düzenleme şansına da sahiptir."
 vikelas_ioc_bribe_button: "IOC’yi Rüşvetle Etkile"
 vikelas_ioc_bribe_button_desc: "IOC Yönetim Kuruluna yapılacak cömert bir 'bağış' ile üyelerin gönlünü kazanabilir ve bir sonraki Olimpiyat Oyunlarının dağıtımında dördüncü aday olarak listelenebiliriz. Ancak sonrasında seçileceğimizin garantisi yoktur. Diğer IOC üyeleri de cömertliğimizi yanlış anlayabilir."
 vikelas_olympic_flame_button: "Olimpiyat Meşalesi"
 vikelas_olympic_flame_button_desc: "Yunan tanrıçası Hestia’nın hiç sönmeyen ocak ateşine dayanan Olimpiyat Meşalesi, ilk kez 1928 Amsterdam Olimpiyat Oyunlarında tanıtıldı. İlgili olimpiyat meşalesi koşusu geleneği ise 1936 Berlin Yaz Oyunlarında başlatıldı. Yaygın inanışın aksine bu fikir Nasyonal Sosyalistlerden değil, Alman-Yahudi arkeolog Alfred Schiff’ten gelmiştir. Bu geleneğin benimsenmesi Olimpiyat Oyunlarına yeni bir kimlik sembolü kazandırmakla kalmayacak, aynı zamanda halkı her yıl bir araya getirerek diğer sıkıntılardan uzaklaştıracak moral verici bir simge işlevi görecektir."
 vikelas_school_sport_button: "Okul Sporlarını Başlat"
 vikelas_school_sport_button_desc: "Okul sporlarının başlatılmasıyla sporcu özelliklerine sahip kişilerin ortaya çıkma ihtimalini artırabilir ve Olimpiyatlardaki şansımızı geliştirebiliriz."
 vikelas_football_worldcup_button: "Futbol Dünya Kupasını Düzenle"
 vikelas_football_worldcup_button_desc: "Dünya Kupası, milli takımlar arasında düzenlenen bir futbol turnuvasıdır. Takımlar dört yılda bir Dünya Kupası finallerine katılma hakkı kazanabilir. Dört haftalık bir turnuvada en iyi milli takım dünya şampiyonu olur. Dünya futbol federasyonu FIFA turnuvayı organize eder ve pazarlamasını yapar. İlk Dünya Kupası 1930’da Uruguay’da düzenlenmiş ve ev sahibi ülke tarafından kazanılmıştır."
 vikelas_football_worldcup_tt: "En az #G 16#! Futbol Federasyonuna sahip ülke olmalıdır."
 je_vikelas_sports: "Sporlar"
 je_vikelas_sports_reason: "19. yüzyılda örgütlü sporlar yeni bir anlam kazandı. Birçok ulus-devlette kulüpler kuruldu, spor sahaları kamusal alanlara dönüştü ve sportif faaliyetler yaygın bir eğlence biçimi haline geldi. Futbol ve beyzbol ulusal sporlar haline gelirken, bisiklet ve araba yarışları kısa sürede kitle toplumunun yerleşik ritüelleri oldu. Bu gelişimin taçlandırıcı başarısı ise Olimpiyat Oyunlarının uluslararası bir etkinlik olarak kurulmasıydı."
