 vikelas.584.t: "V Motoru"
 vikelas.584.d: "Mühendisimiz Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], yarış için yeni bir motorun nasıl olabileceğine dair çığır açıcı bir öneri sundu ve mekanikçi [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] ile iletişime geçti."
 vikelas.584.f: "V motoru, birkaç silindiri olan bir pistonlu motor türüdür. Silindirler, birbirine açı yapacak şekilde iki blok halinde düzenlenir. V motorları, özellikle silindir sayısı yüksek ve montaj alanı sınırlı olduğunda yaygın olarak kullanılır. Kompakt tasarım malzemeden tasarruf sağlar ve böylece ağırlığı azaltır. İlk V motor, iki silindirli V-twin, Wilhelm Maybach tarafından tasarlandı ve 1889 Daimler Stahlradwagen otomobilinde kullanıldı. İlk V8 motor ise 1903 yılında, Léon Levavasseur tarafından yarış tekneleri ve uçaklar için tasarlanan Antoinette motoru olarak üretildi."
 vikelas.584.g: "Heureka!"
 vikelas.585.t: "Geliştirilmiş Yakıt"
 vikelas.585.d: "Kimyacımız Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], içten yanmalı motorlar için yakıtı daha da geliştirdi ve bu, yarış arabalarının verimliliğini ve performansını artırmada kritik bir rol oynayabilir. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName], test sürüşleri için büyük ilgi gösterdi."
 vikelas.585.f: "Benzin yakıtlarının ilk on yılları son derece değişkendi. Birçok şirket yakıtı seyreltme veya diğer saf yakıtlarla karıştırma eğilimindeydi. Nikolaus August Otto zaten arıtılmış alkol kullanıyordu. Bazı ülkelerde petrol kıtlığı, alternatiflerin geliştirilmesine veya mevcut yakıt miktarının daha verimli kullanılmasına yol açtı. Yarışlarda, geliştirilmiş yakıtlar ve yağlar sürüş performansını optimize etmek için kullanılırdı."
 vikelas.585.g: "Heureka!"
 vikelas.586.t: "Aerodinamik Kuvvetler"
 vikelas.586.d: "Fizikçimiz Dr. [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName], araç tasarımında faydalı olabilecek bazı aerodinamik kuvvet hesaplamalarını açıkladı. Araba mekanikçisi [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName], bu çalışmanın bir kopyasını aldı."
 vikelas.586.f: "'Aerodinamik, motor yapmayı bilmeyenler içindir.' -Enzo Ferrari"
 vikelas.586.g: "Heureka!"
