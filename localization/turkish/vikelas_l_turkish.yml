 vikelas_bicycles_tech_desc: "In the mid-19th century, the balance bike evolved into the velocipede, with pedals being fitted directly to the front axle for the first time. These vehicles, which became known as 'boneshakers', had heavy iron rims and wooden spokes, making riding on uneven ground a physical challenge. Despite the lack of comfort, this era sparked an initial cycling boom, which led to increasingly refined designs and paved the way for the later high-wheeler."