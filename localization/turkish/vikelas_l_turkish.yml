 vikelas.301.t: "Cricket Club founded"
 vikelas.301.d: "Some influential people have founded a sports club to pursue their favorite pastime: the [SCOPE.GetRootScope.GetState.GetStateRegion.GetCityHubName] Cricket Club."
 vikelas.301.f: "The 19th century was the era in which cricket evolved from a rural pastime to a sport of national and international importance. The English upper classes made the game their favorite pastime: it was cultivated in boarding schools like Eton and Harrow and glorified as a 'gentleman's sport.' At the same time, its popularity grew among the working class, particularly in northern England, where factory workers founded their own clubs. This democratization of the game led to an unprecedented growth in clubs and spectators.\n\nInternational matches were not long in coming. In 1844, the world's first documented international match between Canada and the United States took place in New York."
 vikelas.301.g: "Give me my bat!"
 vikelas.301.h: "What a pretentious game."
 vikelas.302.t: "Baseball Club founded"
 vikelas.302.d: "Baseball has established itself as a popular pastime in [SCOPE.sState('vikelas_baseball_club_state_scope').GetName]. A new baseball club has been formed that plays regular games: [SCOPE.sState('vikelas_baseball_club_state_scope').GetCustom('vikelas_historical_baseball_club_names_type')]."
 vikelas.302.f: "In the 1840s, baseball began to emerge from the shadows of its predecessors and take on a distinctive form. The United States was undergoing rapid urbanization, and growing cities sought pastimes that could foster community while reflecting the spirit of the new nation. A pivotal moment came in 1845, when Alexander Cartwright and the members of the Knickerbocker Base Ball Club in New York established the game's first standardized rules. These 'Knickerbocker Rules' laid the foundation of modern baseball: a diamond field with four bases, three outs per inning, and nine players per team. They were significantly different from the less formal versions played on lawns and fields up to that point. On June 19, 1846, the Knickerbocker Club played the first documented game under these rules in Hoboken, New Jersey. The team lost to the New York Nine, but the event marked the symbolic birth of organized baseball."
 vikelas.302.g: "Homerun."
 vikelas.303.t: "Football Club founded"
 vikelas.303.d: "Workers and labourers in [SCOPE.sState('vikelas_football_club_state_scope').GetName] have been meeting for football games for weeks. Now they have founded a club: [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')]."
 vikelas.303.f: "In the first half of the 19th century, football in England was not yet a unified sport, but rather a collective term for a variety of ball games played in towns, villages, and schools. These games often differed drastically in their rules. The first step towards standardization was taken by the Cambridge Rules of 1848, an attempt to create uniform rules for students at Cambridge. They were not a final solution, but they laid the foundation for what followed. The real breakthrough came on October 26, 1863, when eleven clubs met at the Freemasons' Tavern in London and founded the Football Association (FA). Within a few weeks, they agreed on a set of rules that allowed the ball to be played only with the feet and prohibited carrying or throwing the ball - a compromise that angered rugby supporters, who subsequently split off and developed their own set of rules. With the founding of the FA, modern football was born."
 vikelas.303.g: "Goal!"
 vikelas.304.t: "Basketball Club founded"
 vikelas.304.d: "A basketball club has been founded in [SCOPE.sState('vikelas_basketball_club_state_scope').GetName] with the aim of spreading the game throughout [GetPlayer.GetName]. "
 vikelas.304.f: "Basketball is the youngest of the great modern sports. Its roots are closely linked to the social movements of the late 19th century. In 1891, the Canadian physician and physical education teacher James Naismith faced a challenge: He had to invent an indoor game for the students of the YMCA Training Institute in Springfield, Massachusetts, that they could play even in the cold New England winter. The YMCA wanted to use sports to strengthen the physical and moral health of young men—an educational project in the spirit of Protestantism and urbanization. Basketball, with its quick substitutions and clear rules, fit this mission perfectly. It was a game that fostered a sense of community while offering growing American cities a new recreational activity."
 vikelas.304.g: "Splash!"
 vikelas.304.h: "What a silly game."
 vikelas.311.t: "Sports Gazette"
 vikelas.311.d: "In [SCOPE.sState('vikelas_gazette_state').GetName], a publisher has developed a new format newspaper: dedicated solely to sports reporting, with a focus on [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]. The gazette is selling like hot cakes."
 vikelas.311.f: "When sport left its arena in the late 19th century and migrated to the cities, the cafés, and the minds of the masses, it needed a new medium. It wasn't just stadium visitors who needed to know about victories and defeats, but also the worker at the factory gate and the employee with a newspaper in hand. In Italy, it was the 'Gazzetta dello Sport' that met this need and ushered in a new era of sports reporting. Founded on April 3, 1896, in Milan - barely three weeks before the first modern Olympic Games in Athens - the Gazzetta was, from the outset, more than just a results bulletin. It saw itself as the voice of emerging sports: for cycling, track and field, football, fencing - and for everything that promised speed, competition, and passion. Initially published twice a week, in black type on plain paper, it placed more value on facts than just facts: it told stories, turned athletes into heroes, and games into dramas. In 1899, something changed that made the newspaper iconic: The paper turned pink. Originally a pragmatic move because pink paper was cheaper, it soon became a trademark."
 vikelas.321.t: "Baseball"
 vikelas.321.d: "The people of our country have come into contact with an American sport that is gaining more and more fans. [GetPlayer.GetNameNoFlag] is in a baseball frenzy."
 vikelas.321.f: "Although perceived as a US national sport, baseball also spread to other, fundamentally different countries, where it would soon assume a similar position. The game was brought to Japan by Horace Wilson in 1872, shortly after the country opened. At a time when Japan was open to Western innovations, the game quickly became popular. However, it would take over 30 years for the sport to become more professional.\n\nBaseball was first introduced to China in 1864 with the establishment of the Shanghai Baseball Club by American medical missionary Henry William Boone. The Qing dynasty then began sending Chinese students to America to learn more about the game. Organized baseball games were established with a game between St. Johns University and the Shanghai MCA baseball club in 1905.\n\nBaseball was also popularized in Cuba by Nemesio Guillot, who founded the first major baseball club in the country. It became the most played sport in the country in the 1870s, before the period of American intervention. Despite its American origin, baseball is strongly associated with Cuban nationalism, as it effectively replaced colonial Spanish sports such as bullfighting."
 vikelas.403.t: "FIFA: New Board"
 vikelas.403.f: "The FIFA has decided on the following composition:\n\n#V President: [GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName] #!\n\n#V Board: [GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 vikelas.403.g: "A good selection."
 vikelas.403.h: "And there was no bribery involved?"
