 vikelas.121.t: "Komünist Jimnastik Sporcusu"
 vikelas.121.d: "[SCOPE.sCharacter('vikelas_communist_athlete_scope').GetFullName], ülkemizin en yetenekli jimnastik sporcularından biri olarak kabul ediliyor ve madalya kazanma şansı çok yüksek. Ancak komünist dünya görüşü bazı spor yetkililerini rahatsız ediyor. Korkarlar ki, siyasi gruplar onu bir idol olarak kullanabilir."
 vikelas.121.f: "Jimnastik, en eski Olimpik spor dallarından biridir ve her Olimpiyat Oyunlarında temsil edilen dört spor dalından biridir. Spor; artistik jimnastik (ayrıca alet jimnastiği olarak da bilinir), ritmik jimnastik ve trampolin jimnastiği olmak üzere üç disiplinden oluşur. Artistik jimnastik, 1896 Atina Olimpiyatlarından bu yana programda yer almaktadır."
 vikelas.121.g: "Ne düşünürse düşünsün, kazanmalı!"
 vikelas.121.h: "Başka bir sporcumuz yok mu?"
 vikelas.122.t: "Tepkici Tenisçi"
 vikelas.122.f: "1896’daki ilk Olimpiyat Oyunlarında, Jeu de Paume (Fransız Jeu de longue paume biçiminde) ve çim tenis programda yer aldı. Ancak Fransa, İngiltere ve ABD’den tanınmış oyuncular katılmak istemediğinden, çim tenis katılımcı sahası esas olarak Yunanistan’dan bilinmeyen sporculardan oluşuyordu. Ayrıca İngiliz çekiç atıcı George Stuart Robertson ve Macar halterci Momcsilló Tapavicza gibi diğer dallardan sporcular da dahil edildi. Yaygın bir efsaneye göre, sporcu Friedrich Adolf Traun, bir Atina dükkanında tenis raketi satın alırken İrlandalı John Pius Boland tarafından turnuvaya katılmaya ikna edildi. Tenis 1924’e kadar Olimpik bir spor oldu ve 1988’e kadar yeniden programa alınmadı."
 vikelas.123.t: "Sporcu Yarışı Kaçırdı"
 vikelas.123.d: "Sporcularımızdan biri yarışını kaçırdı. Görünüşe göre farklı takvimler kafa karışıklığına yol açtı."
 vikelas.123.f: "\"Ne? Başka bir takvim mi? Neden daha fazla takvim var? Bunu neden kimse bana söylemedi?\"\n\n#b Tarihsel#! olarak, özellikle ilk modern Olimpiyat Oyunlarında, Yunanistan’da kullanılan Julian Takvimi sorun yarattı ve bazı sporcuların yarışlarını kaçırmasına neden oldu."
 vikelas.123.g: "Neden başka bir takvim kullanıyorlar?!"
 vikelas_negative_influence_on_score_tt: "Bu, [GetPlayer.GetName]’in madalya kazanma şansını #n olumsuz#! etkileyebilir."
 vikelas.124.t: "Onurlu Bisikletçi"
 vikelas.124.d: "Bisikletçimiz [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetFullName], rakibi [SCOPE.sCharacter('vikelas_cyclist_with_problems_scope').GetFullName] bisikletindeki mekanik sorunları düzeltmek zorunda kaldığında durdu. Sorun giderildikten sonra yarışa tekrar devam ettiler. [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetLastName] yarışı sonunda kazandı."
 vikelas.124.f: "\"Bisikletin nasıl [SCOPE.sCharacter('vikelas_cyclist_with_problems_scope').GetLastNameNoFormatting]?\"\n\"Ah, zincirle ilgili sadece küçük bir sorun vardı. Takıldı. Ama beklediğin için teşekkürler, [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetLastNameNoFormatting]!\""
 vikelas.124.g: "Harika bir jest!"
 vikelas.125.t: "Bisikletçi Arabaya Çarptı"
 vikelas.125.d: "Bisikletçimiz [SCOPE.sCharacter('vikelas_cyclist_with_accident_scope').GetFullName], cadde yarışına katılırken aniden bir arabaya çarptı. Yaralandı ve şu anda hastanede. Neyse ki, sadece hafif yaralanmaları var gibi görünüyor."
 vikelas.125.f: "Kaza sorumlusu sürücü röportajda şunları söyledi: \"Ne saçma bir fikir. Halka açık yolda bisiklet yarışı. Yol bana ve arabama ait, bir yarışçıya değil!\""
 vikelas.125.g: "Bu nasıl oldu?"
 vikelas.126.t: "Cadde Yarışında Toplu Kaza"
 vikelas.126.d: "Dar sokaklar ve toplu start, bu yılki cadde yarışında toplu kazaya neden oldu. Neyse ki sadece hafif yaralanmalar rapor edildi ve kısa bir mola sonrası yarış yeniden başlatıldı."
 vikelas.126.f: "\"Yarış kazanmak isteyen yüzlerce bisikletçinin, 3 metre genişliğinde bir yolda start alması kazaya yol açacağını kim bilebilirdi? Böyle bir durumda yarışmacıların dikkatli olacağını düşünüyorduk\" dedi organizatörlerden biri."
 vikelas.126.g: "İyi ki kimse ölmedi!"
 vikelas.127.t: "Sarhoş Bisikletçi"
 vikelas.127.d: "[SCOPE.sCharacter('vikelas_drunken_cyclist_scope').GetFullName], ülkemiz için yarışan bisikletçilerden biri, cadde yarışı sırasında sarhoş oldu, kestirdi ve yanlış yöne sürmeye başladı."
 vikelas.127.f: "\"Bu bisikletçi ilk sıradayken indi ve birahane girdi. Sıcaklık onu çok susatmış olmalı. Sonra iki şişe beyaz şarap içti. Daha önce kimsenin bu kadar hızlı içtiğini görmemiştim. Sonrasında dışarı çıktı ve uyuyakaldı. Uyandırmaya çalıştık ve bir noktada uyandı ve aceleyle yarışa devam etti. Maalesef yanlış yöne gitti.\""
 vikelas.127.g: "Ne utanç verici bir görüntü!"
 vikelas.128.t: "Bedava Bira!"
 vikelas.128.d: "[SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetFullName], bu yılki cadde yarışını kazandı, ama en hızlı olduğu için değil, bedava bira içmek için durmadığı için."
 vikelas.128.f: "Bu yılki Olimpik Cadde Yarışı, oldukça tuhaf bir zafer ile sonuçlandı. Uzun süre [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetFullNameNoFormatting] çok gerideydi, ancak bir masada bedava bira vardı ve rakipleri durdu. Onlar içerken, [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetLastNameNoFormatting] sessizce geçti ve öne çıkarak yarışı kazandı. Bazı kişiler bedava biranın tesadüf olmadığını ve [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetLastNameNoFormatting]’in bunu aslında ödemiş olabileceğini söylüyor. Ancak bunu kanıtlamak mümkün değil."
 vikelas.128.g: "Ha! İşte içmenin sonucu."
 vikelas_positive_influence_on_score_tt: "Bu, [GetPlayer.GetName]’in madalya kazanma şansını #p olumlu#! etkileyebilir."
 vikelas.129.t: "Schwingerkönig Güreş Etkinliğini Kazandı"
 vikelas.129.d: "İsviçreli Schwinger [SCOPE.sCharacter('vikelas_schwingerkonig_scope').GetFullName], bu yılki Olimpiyat Oyunlarında güreş etkinliğini kazandı."
 vikelas.129.f: "\"Sadece altın madalya mı kazanıyorum? İsviçre’de biz bir boğa kazanırız!\""
 vikelas.129.g: "Değerli bir kazanan!"
 vikelas.130.t: "Halat Çekme"
 vikelas.130.d: "Olimpiyat Oyunlarında oldukça ses getiren bir halat çekme turnuvasında, rakibimiz [SCOPE.sCountry('vikelas_rival_country_scope').GetName], takımımızı bozmak için haksız yöntemler kullandı ve ardından kazandı. Rakipler, ülkemiz, kültürümüz ve dilimiz hakkında sürekli şakalar yaparak takımımıza hakaret ettiler."
 vikelas.130.f: "Halat çekme, 1900-1920 yılları arasında Olimpiyat programının bir parçasıydı. Günümüzde bağımsız bir spor olarak kabul edilir; geçmişte ağır atletizm veya atletizmin bir parçası olarak değerlendirilirdi. Paris’te sadece iki takım yarıştı: bir Fransız takımı ve Dan ve İsveçli karışık bir takım. Her takım altı sporcudan oluşuyordu. Maksimum üç tur oynandı; iki turu kazanan galip sayıldı. Halat çekme son kez Antwerp’te düzenlendi. Beş katılımcı, Bergvall sistemiyle madalyaları belirledi. Altın madalya için eleme turundan sonra, sonunda kazanan takım tarafından elenen takımlar gümüş için bir eleme turuna ve ardından bronz için üçüncü bir eleme turuna aynı formatta katıldı."
 vikelas.130.g: "Bir gün bunun pişmanlığını yaşayacaklar!"
 vikelas.131.t_fencing: "Eskrim Generali"
 vikelas.131.t_shooting: "Atış Generali"
 vikelas.131.t_riding: "Binicilik Generali"
 vikelas.131.d_fencing: "Birçok yoldaşını şaşırtan [SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName], Olimpiyat Oyunlarına katıldı ve olağanüstü eskrim yetenekleriyle rakiplerini etkiledi. Bu sadece gümüş madalya için yeterli oldu, ancak yurtdaşları için gerçek kazanan odur."
 vikelas.131.d_shooting: "[SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName], Olimpiyat Oyunlarına katıldı ve tüfeği hiç kimse gibi kullanamadı. Sadece bir kaçırılan atış onu altın madalya kazanamaktan alıkoydu. Yine de ülkede bir kahraman olarak kabul edilmektedir."
 vikelas.131.d_riding: "Olimpiyat Oyunlarında, [SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName], öyle etkileyici bir binicilik performansı gösterdi ki birçok izleyici onu kazanan olarak gördü. Diskalifiye edilmesi zaferini bozdu, ancak oyunlarda hala seyircinin favorisi olarak kabul ediliyor."
 vikelas.131.f_fencing: "Eskrim, 1896 Atina’da kurucu spor dallarından biridir. Atina programında üç yarışma vardı: amatör sporcular için kılıç ve flöre, eskrim ustaları için flöre. Epe eskrimi Paris’te 1900’de, takım eskrimi Antwerp’te 1920’de programa eklendi. 1920’de kadınlar ilk kez Antwerp’te kadın flöre yarışmasında altın madalya için mücadele etti. Ayrıca epe eskrimi, modern pentatlonun beş disiplininden biridir ve 1912 Stockholm Yaz Oyunları’nda Olimpik bir yarışma olarak yeniden tasarlanmıştır."
 vikelas.131.f_shooting: "IOC, İkinci Olimpiyat Oyunlarının programına dokuz atış etkinliği ekledi. Ordu tüfeği ile yapılan atış burada önemli bir rol oynadı ve 5 sınıflandırma (yatarak, diz çökmüş, ayakta, üç pozisyonlu savaş ve takım olarak) içeriyordu. 6.000’den fazla katılımcıdan sadece 72 sporcu Olimpik yarışmalara katıldı. Ödüllü atış, o dönemde yaygın ve kazançlı bir etkinlikti, ancak bir sportif başarı için para kabul etmek Olimpik ruhla bağdaşmıyordu, bu nedenle profesyonellere Olimpiyat yarışmalarına katılma izni verilmedi. Olimpik niteliğe sahip olmayan diğer yarışmalar arasında canlı güvercin atışı, yay atışı ve top atışı yer alıyordu."
 vikelas.131.f_riding: "IOC, İkinci Olimpiyat Oyunlarının programına üç binicilik yarışması ekledi; bu, at biniciliğinin ilk kez Olimpik bir disiplin olmasıydı. Bu üç yarışmadaki katılımcıların tam sayısı artık kesin olarak bilinmiyor. İsimleri bilinen sadece 5 ülkeden 15 binici vardır. Ancak 50 başka sporcu yarışa başladı, ancak bunlar arasında birden fazla kez katılanların olması da mümkündür. Paris, Londra ve Stockholm’deki yarışmalar başlangıçta subaylara ayrılmıştı. Bu yalnızca Yedinci Olimpiyat Oyunları Antwerp’te gevşetildi."
 vikelas.131.g: "Mükemmel bir sporcu."
 vikelas.132.t_rowing: "Kürek Amirali"
 vikelas.132.t_sailing: "Yelken Amirali"
 vikelas.132.t_swimming: "Yüzme Amirali"
 vikelas.132.d_rowing: "[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName] sadece mükemmel bir amiral değil, aynı zamanda güçlü bir kürekçidir. Olimpiyatlarda kendi takımıyla yarıştı ve meslektaşları ile seyircilerin saygısını kazandı."
 vikelas.132.d_sailing: "[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName], Olimpiyat Oyunlarında deneyiminden faydalandı: yelken takımıyla gümüş madalya kazandı. Etkileyici başarı tüm ulusa ilham veriyor."
 vikelas.132.d_swimming: "Olimpiyatlarda bir sürpriz vardı. Meslektaşlarının haberi olmadan ve hükümeti bilgilendirmeden, [SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName] sıradan bir sporcu olarak Olimpiyatlara katıldı. Kim böyle mükemmel bir yüzücü olacağını düşünürdü? Altın madalya için yeterli olmasa da uzun süreli bir etki bıraktı. Ne kadar çok yönlü bir sporcu!"
 vikelas.132.f_rowing: "Paris'teki 2. Olimpiyat Oyunları'nda kürek yarışlarının organizasyonu o kadar kötüydü ki komite iki final düzenlemek zorunda kaldı. Her iki finalin IOC kazananlar listesine dahil edilmesi, 1900 Yaz Olimpiyatları'nın gerçekleştiği koşullarla başa çıkmanın zorluğunun bir göstergesidir."
 vikelas.132.f_sailing: "Olimpik yelken, 1900’den beri Oyunlar programının bir parçasıdır: Paris’teki ikinci modern Olimpiyat Oyunları’nda takımlar ilk kez madalya için yarıştı. Yelkenin Olimpik prömiyeri 1896’da Atina’da yapılması planlanmıştı, ancak kötü hava koşulları nedeniyle yarışmalar gerçekleşemedi. 1904 Yaz Olimpiyatları hariç, yelken her Olimpiyat Oyunları’nda yer aldı. Çoğu olimpik yelken yarışması filo yarışı formatında yapıldı. Bazı Olimpiyatlarda ise eşleşme yarışı veya karma filo/eşleşme yarışı formatı da kullanıldı."
 vikelas.132.f_swimming: "1896 Yaz Olimpiyatları'nda dört yüzme etkinliği düzenlendi, hepsi erkekler içindi. Bu etkinlikler Denizcilik Sporları Alt Komitesi tarafından planlandı ve organize edildi. Tüm yarışmalar 11 Nisan’da Zea Körfezi’nde yapıldı. Zea Körfezi, Atina bölgesinde bir liman ve marina olup, özel bir yüzme alanı inşa etmek yerine kullanıldı. Toplam 4 ülkeden 13 sporcu yarıştı. Kadınların yüzme yarışmaları 1912’de Olimpiyatlara dahil edildi."
 vikelas.133.t_boxing: "Boksçu Politikacı"
 vikelas.133.t_wrestling: "Güreşçi Politikacı"
 vikelas.133.t_archery: "Okçu Politikacı"
 vikelas.133.d_boxing: "Birçok kişi [SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName]'ın hızlı zekalı bir konuşmacı olduğunu tahmin ediyordu. Ancak bir Olimpiyat yarışmasında, fiziksel olarak da oldukça yetenekli olduğunu gösterdi. Belki de siyasi rakipleri bundan sonra daha dikkatli olmalıdır?"
 vikelas.133.d_wrestling: "Eğer biri [SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName]'ın yetenekli bir güreşçi olduğunu tahmin etmiş olsaydı, siyasi rakipleri onunla uğraşmadan önce iki kez düşünürdü. Olimpiyat Oyunları’nda parti içindeki kadar neredeyse aynı sempatiyi kazandı. Altın madalya kazanmak için neredeyse yeterliydi!"
 vikelas.133.d_archery: "[SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName]'ın konuşmaları her zaman çok isabetli kabul edilmiştir. Ancak Olimpiyatlar’a katılana kadar sadece en yakın arkadaşları onun boş zamanlarında yetenekli bir okçu olduğunu biliyordu. Eğer seçmenler onu uluslararası spor festivalindeki seyirciler kadar seviyorsa, yakında devletin zirvesinde olacaktır!"
 vikelas.133.f_boxing: "Boks, en eski olimpik disiplinlerden biridir. Modern boksun öncüsü olarak yumruk dövüşlerinin kökeni M.Ö. 688 Olimpiyat Oyunları’na kadar uzanır. 1904 St. Louis Olimpiyatları’nda boks, modern olimpik bir spor olarak prömiyerini yaptı. Ancak burada sadece Amerikalılar katıldı; yedi ağırlık sınıfında toplam 44 sporcu yarıştı. 1912’de İsveç’te boks yasak olduğu için olimpik boks turnuvası düzenlenmedi."
 vikelas.133.f_wrestling: "1896 Yaz Olimpiyatları’nda bir güreş etkinliği düzenlendi. Bu etkinlik Güreş ve Jimnastik Alt Komitesi tarafından organize edildi ve hazırlandı. Dört ülkeden beş sporcu yarıştı. Kazanan Alman Carl Schumann oldu. Güreş öncelikle Greko-Romen stilde yapıldı ve serbest stil 1904’te tanıtıldı. Güreş, oyunlarda önemliydi; en azından antik Olimpiyat Oyunları’nda zaten bu disiplin yer alıyordu."
 vikelas.133.f_archery: "Uluslararası Olimpiyat Komitesi (IOC), modern Olimpiyat Oyunları’nın kurucusu Pierre de Coubertin ve IOC’ye göre, uluslararası katılımın okçuluk için olimpik bir yarışmanın temel gerekliliği olduğunu belirterek, İkinci Olimpiyat programına altı okçuluk yarışması ekledi. Okçuluk o dönemde popüler bir spordu ve bu nedenle 1.723 okçunun katıldığı büyük bir geçit töreniyle açıldı. Tüm yarışmalara 5.254 atıcı katıldı. Olimpik programın altı yarışmasında sadece Fransa ve Belçika’dan gelen 17 katılımcının isimleri biliniyor. Ancak bu yarışmalara çok daha fazla atıcı katıldı. Spor tarihçileri, Hollanda’dan sporcular dahil olmak üzere toplam katılımcı sayısını 153 olarak tahmin ediyor."
 vikelas.134.t: "Olimpiyat Şampiyonu"
 vikelas.134.d: "Çok sayıda deneme, yıllarca süren antrenman ve yılmaz bir ruh, sonunda [SCOPE.sCharacter('vikelas_olympic_champion_scope').GetFullName]'a uzun süredir beklenen başarıyı getirdi: Olimpiyat şampiyonu geri döndü ve altın madalyasını gururla takıyor!"
 vikelas.134.f: "Bugün bildiğimiz, birinciye altın, ikinciye gümüş ve üçüncüye bronz madalya verilen olimpik sistem, başlangıçta mevcut değildi. 1896 ve 1900’de sadece ilk ikiye madalya veriliyordu (birinciye gümüş, ikinciye bronz). 1904’te kazanan ilk kez altın madalya aldı ve diğer madalya renkleri bir basamak aşağı kaydırıldı."
 vikelas.134.g: "Ulusal bir kahraman!"
 vikelas.141.t: "Yelkenli Yok!"
 vikelas.141.d: "Bu yılki Olimpiyat Oyunları’nda bir yelken yarışması olması gerekirken, bir şekilde yelkenliler organize edilmedi. Bu, yelken yarışının sonu anlamına gelebilir."
 vikelas.141.f: "\"Yelkenliler nerede?\"\n\"Ben onların organizatörü sanmıştım.\"\n\"Ben mi?! Ben kürek yarışını zaten organize ettim. Yelken yarışından sen sorumluydun!\"\n\n#b Tarihsel olarak#!, ilk Olimpiyat Oyunları sırasında yelken yarışması yapılamadı çünkü ne sporcular ne de organizatörler yelkenlileri organize etti."
 vikelas.141.g: "Bu ulusumuz için bir utançtır! Bir yerden yelkenli bulun!"
 vikelas.141.h: "Sanırım bu yıl yelken olmayacak."
 vikelas.142.t: "Kurgu Futbol Maçı?"
 vikelas.142.d: "Ülkemiz ile [SCOPE.sCountry('vikelas_olympics_football_country_scope').GetName] arasındaki bir futbol maçının gerçekten adil bir şekilde değerlendirilip değerlendirilmeyeceği konusunda şüpheler var. Gözlemciler, hakemin taraflı olduğunu ve lehimize karar verdiğini iddia ediyor."
 vikelas.142.f: "Futbol, 1908 Olimpiyat Oyunları’ndan beri resmi bir olimpik disiplindir. Ancak futbol kulüpleri ve bazen karma takımlar yine de yarışmalara katılabiliyordu. Uluslararası maçlar sadece 1908’den itibaren gerçekleşti. Tarihteki ilk resmi karşılaşmayı 1908 Olimpiyat futbol turnuvasında Danimarka millî takımı, Fransa B takımına karşı kazandı. Olimpiyat futbol turnuvası 1928’e kadar neredeyse bir futbol dünya şampiyonası statüsüne sahipti, ancak 1930’da dünya şampiyonasının tanıtılması ve özellikle 20. yüzyılın 20’li ve 30’lu yıllarında Avrupa ve Güney Amerika’daki bazı ülkelerde profesyonelliğin ortaya çıkmasıyla önemi keskin şekilde düştü, çünkü sadece amatörler katılabiliyordu ve bu ülkelerin en iyi oyuncuları turnuvalara artık katılamıyordu."
 vikelas.142.g: "Top açıkça ofsayttaydı!"
 vikelas.142.h: "[SCOPE.sCountry('vikelas_olympics_football_country_scope').GetName] maçı haklı olarak kazandı."
 vikelas.143.t: "Maratonun Yeni Efsanesi"
 vikelas.143.d: "Maraton koşucusu [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetFullName], maratonu öyle etkileyici bir şekilde kazandı ki artık ulusal bir kahraman olarak kabul ediliyor!"
 vikelas.143.f: "Beyaz eldivenler takan [SCOPE.sCharacter('vikelas_olympic_rival_athlete_1_scope').GetFullName], [SCOPE.sCountry('vikelas_olympic_rival_country_1_scope').GetName]'in favorisi, 1500 metre koşusunun ilk üçünü oluşturan [SCOPE.sCharacter('vikelas_olympic_rival_athlete_2_scope').GetFullName], [SCOPE.sCountry('vikelas_olympic_rival_country_2_scope').GetName] ve [SCOPE.sCharacter('vikelas_olympic_rival_athlete_3_scope').GetFullName], [SCOPE.sCountry('vikelas_olympic_rival_country_3_scope').GetName]'yi geride bıraktı. İddiaya göre, [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetLastName] 22. kilometrede bir handa bir bardak şarap içti ve zaferini yüksek sesle ilan etti. Sözünü tuttu ve herkesi geçerek öne geçti. Sadece [SCOPE.sCharacter('vikelas_olympic_rival_athlete_2_scope').GetFullName] onu takip edebildi, ama sonra yığılıp kaldı. [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetLastName] yolda kendini koyun peyniri, brendi ve vatandaşı arkadaşlarının sıcak sözleriyle güçlendirdi. Stadyuma koştu ve yorgun dizlerinin üstüne kapanarak monarşisine karşı alçakgönüllülükle eğildi: 'Ben sadece bir çiftçinin oğluyum, benim [SCOPE.sCharacter('vikelas_ruler').GetPrimaryRoleTitle].'"
 vikelas.143.g: "Gerçek bir Olimpiyatçı!"
 vikelas.144.t: "İyi Düzenlenmiş Olimpiyat Oyunları"
 vikelas.144.d: "Olimpiyat Oyunlarındaki diğer katılımcılar, oyunların iyi organizasyonu için övgü dolu. Her şey sorunsuz çalışıyor."
 vikelas.144.f: "'Olimpiyat Oyunları düzenlemek, tarihi çağrıştırmak demektir.' -Pierre de Coubertin"
 vikelas.144.g: "Mükemmel"
 vikelas.145.t: "Ünlü Bir Ev Sahibi"
 vikelas.145.d: "Sporcular ve yabancı seyirciler, ülkemizin misafirperverliği konusunda övgü dolu. Dünyada iyi bir izlenim bıraktık."
 vikelas.145.f: "'Olimpiyat Oyunları dünyaya aittir ve tüm uluslar kabul edilmelidir.' -Pierre de Coubertin"
 vikelas.151.t_sailing: "Yelken yarışı sorunlara rağmen gerçekleşiyor"
 vikelas.151.t_no_sailing: "Yelken yarışı yok"
 vikelas.151.d_sailing: "Başlangıçta [SCOPE.sCountry('vikelas_olympics_host_scope').GetName] yelken yarışları için tekneleri organize etmemiş olsa da, diğer şehirlerden ve ülkelerden bazı yelkenliler temin etmek mümkün oldu."
 vikelas.151.d_no_sailing: "[SCOPE.sCountry('vikelas_olympics_host_scope').GetName] yelken yarışları için tekneleri organize etmediği için, yarış bu yıl yapılamayacak."
 vikelas.151.f_sailing: "Yelken yarışı, yakın limanlardan gelen yelkenlilerin gelişiyle son anda kurtarıldı. Neyse ki hava da yarış için uygun seyretti.\n\n#b Tarihsel olarak#!, ilk Olimpiyat Oyunları sırasında yelken yarışması yapılamadı çünkü ne sporcular ne de organizatörler yelkenlileri organize etti."
 vikelas.151.f_no_sailing: "Regatta, bazı özel teknelerin temini sağlanamadığı için yapılamadı.\n — Charalambos Anninos\n\n#b Tarihsel olarak#!, ilk Olimpiyat Oyunları sırasında yelken yarışması yapılamadı çünkü ne sporcular ne de organizatörler yelkenlileri organize etti."
 vikelas.151.g: "Umarım sporcularımız kazanır!"
 vikelas.151.h: "Rakiplerimiz için bir madalya eksik!"
 vikelas.151.i: "Daha önemli işlerle ilgilenmem gerekiyor. Beni yalnız bırakın."
 vikelas.161.t: "Maraton için Otostop Rehberi"
 vikelas.161.d: "Koşucumuz [SCOPE.sCharacter('vikelas_hitchhiker_scope').GetFullName] bitiş çizgisini ilk geçtiğinde herkes coştu. Ancak kısa süre sonra, yolun 11 kilometresini arabayla gittiği ortaya çıktı. Bu nedenle [SCOPE.sCharacter('vikelas_hitchhiker_scope').GetLastName] diskalifiye edildi. Sadece pratik bir şaka yapmak istediğini söyledi, ama bu ülkemizin itibarına zarar verebilir."
 vikelas.161.f: "\"Yanında bir havlu vardı. Bir Olimpiyat etkinliğine katıldığını nasıl anlayabilirdim? Eğer bir havlu taşıyorsan, her şeye hazırsındır!\n"
 vikelas.161.g: "Panik Yapma!"
 vikelas.162.t: "Vahşi bir Köpek belirdi"
 vikelas.162.d: "Maraton koşucumuz [SCOPE.sCharacter('vikelas_chased_by_dogs_scope').GetFullName] yanlışlıkla yüksek bir çayıra girdi, bir vahşi köpek ortaya çıktı ve onu kovalamaya başladı. Ancak bir mısır tarlasına ulaştığında saklanabileceği için köpek peşini bırakmak zorunda kaldı."
 vikelas.162.f: "\"Hav! Hav!\n"
 vikelas.162.g: "Yüksek çayıra girmemeliydi!"
 vikelas.163.t: "Yanlış Hedefte Tam İsabet"
 vikelas.163.d: "Atıcılarımızdan biri olan [SCOPE.sCharacter('vikelas_bad_shooter_scope').GetFullName], mükemmel bir skor elde etti ve sadece bir atışı kaldı. Son atış da Tam İsabet’i vurdu… ama yanlış hedefe. Atış 0 puan sayıldı ve [SCOPE.sCharacter('vikelas_bad_shooter_scope').GetLastName] zaferini kaybetti."
 vikelas.163.f: "\"Yemin ederim hedefi tutturdum! Kesinlikle eminim! Hiçbir zaman yanlış hedefe atış yapmam! Bu asla olmaz!\n"
 vikelas.163.g: "Ne korkunç bir kayıp!"
 vikelas.182.t: "Olimpiyat Meşalesi"
 vikelas.182.d: "Olimpiyat Oyunları'nı açmak için [SCOPE.sCountry('vikelas_olympic_country').GetName] yolunda olan Olimpiyat meşalesi taşıyıcısı, bugün [SCOPE.sState('capital_scope').GetName]’den geçti. Bu, halk için ilham verici bir olay oldu!"
 vikelas.182.f: "Olimpiyat Ateşi, Yunan tanrıça Hestia'nın sürekli yanan ocak ateşine dayanarak, ilk kez 1928 Amsterdam Olimpiyatları’nda tanıtıldı. İlgili Olimpiyat meşale koşusu geleneği ise 1936 Berlin Yaz Oyunları’nda başlatıldı. Yaygın inanışın aksine, bu fikir Ulusal Sosyalistler’den değil, Alman-Yahudi arkeolog Alfred Schiff’den geldi. Bu geleneğin başlatılması, Olimpiyat Oyunları’na yeni bir tanıtım sembolü kazandırmakla kalmayacak, her yıl halkı bir araya getirecek ve diğer sıkıntılardan dikkat dağıtan yükseltici bir simge olarak işlev görecekti."
 vikelas.182.g: "Panem et circensis."
 vikelas.183.t: "Olimpiyat Alevi"
 vikelas.183.d: "Dünyadaki her ülkenin görkemli bir geçitte yer aldığı muhteşem açılış töreninin ardından, Olimpiyat alevi en önemli an olarak yakıldı. Kalabalık heyecan içinde!"
 vikelas.183.f: "20. yüzyıl boyunca, Olimpiyat Oyunları giderek bir kitle fenomenine dönüştü; bu ritüel-seküler fikir, dini ve ulusal ideallerden uzaklaşmış bir toplumun hem ulusal hem kozmopolit anlamda bir anlam duygusu bulmasını sağladı. Bazıları bunu kendi ülkelerinin üstün konumunu vurgulama fırsatı olarak gördü, bazıları için ise ulusların barışçıl bir şekilde sportif yarışmalar için bir araya gelmesi fikri daha büyük bir rol oynadı. Ev sahibi ülke içinse, kendini halkına ve dünyaya daha önce hiç görülmemiş bir şekilde sunma fırsatıydı."
 vikelas.183.g: "Ulusumuzun insanları bizi büyük bir ülke olarak görüyor."
 vikelas.183.h: "Dünya ulusları bizi büyük bir ülke olarak görüyor."
 vikelas.191.t: "IOC [ROOT.GetCountry.GetNameNoFlag]'de"
 vikelas.191.d: "Siyasi değişiklikler nedeniyle IOC merkezini taşımak zorunda kaldı. [ROOT.GetCountry.GetNameNoFlag]’i uygun bir konum olarak görüyor ve ülkeye yönetim başkanlığını teklif ediyor."
 vikelas.191.f: "IOC’nin kurucu ülkesi herhangi bir nedenle haritadan silinirse, IOC merkezini başka bir ülkeye taşıyacak ve tamamen yeniden seçim yapacaktır. Karşılığında sürgündeki ülkeye başkanlık teklif edilir. Böyle durumlar için klasik adaylar İsviçre veya Yunanistan’dır. Bu ülkeler de yoksa, başkanlık, yönetim kurulunda zaten bulunan bir Büyük Güce teklif edilir."
 vikelas.191.g: "Yeni bir IOC seç."
 vikelas_no_more_olympic_flavor_notification_events_tt: "Artık yalnızca atmosfer için eklenen Olimpiyat Oyunları etkinliklerini #n almayacaksınız#!."
 vikelas_ioc_president_modifier: "IOC Başkanı"
