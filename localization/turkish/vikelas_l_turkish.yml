 vikelas_autoracing_found_automobile_club_button: "Otomobil Kulübü Kur"
 vikelas_autoracing_found_automobile_club_button_desc: "Otomobil kulübü kurmak, motor sporları için gerekli diğer tesisleri inşa etmenin ilk adımıdır."
 vikelas_autoracing_long_distance_button: "Dayanıklılık Yarışı Düzenle"
 vikelas_autoracing_long_distance_button_desc: "Dayanıklılık yarışları, genellikle şehirden şehire düzenlenir ve otomobil yarışlarının ilk dönemlerinde standarttı; 20. yüzyıl ortalarına kadar devam etti. İtalya'da Targa Florio veya Mille Miglia gibi yarışlar en bilinen örneklerdir. İnsan ve makineyi özel bir teste tabi tutar ve uzun süre gerçek ulusal araba yarışları olarak kabul edilirdi."
 vikelas_autoracing_found_grand_prix_button: "Grand Prix Yarışı Kur"
 vikelas_autoracing_found_grand_prix_button_desc: "1906 yılında, otomobil tarihindeki ilk resmi Grand Prix, Grand Prix de l'ACF yarışı ile organize edildi. Menşei ülke fark etmeksizin, otomobil üreticileri başına en fazla üç yarış arabasına izin verildi, bu Fransız endüstrisi temsilcilerinin isteğine uygundu. En önemli yarış olarak, yarış iki gün üst üste ve 1200 km'den uzun bir mesafe üzerinde düzenlendi. 1925 yılında, İtalya Otomobil Kulübü öncülüğünde, resmi bir dünya şampiyonası ilan edildi. Sezonun üç resmi Grand Prix yarışı (Fransa, İtalya ve Belçika) ile birlikte Indianapolis, en önemli Amerikan yarış etkinliği olarak kabul edildi."
 vikelas_autoracing_race_track_button: "Yarış Pisti İnşa Et"
 vikelas_autoracing_race_track_button_desc: "Grand Prix yarışlarıyla birlikte, sabit yarış pisti araba yarışları için giderek norm hâline gelmektedir. Özel bir yarış pisti, uluslararası yarış etkinliklerini tek bir yerde toplamakla kalmaz, aynı zamanda test pisti olarak her yıl yarışçılara deneyim bonusu sağlar."
 vikelas_coach: "Koç"
 vikelas_coach_desc: "Bu karakter bir spor takımına koçluk yapar."
 vikelas_coach_senior: "Kıdemli Koç"
 vikelas_coach_senior_desc: "Bu koç, uzun yıllara dayanan deneyimi nedeniyle spor sahnesinde bir efsanedir."
