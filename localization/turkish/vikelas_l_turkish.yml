 vikelas.113.j: "[SCOPE.sCountry('vikelas_olympics_candidate_4').GetName]"
 vikelas.113.k: "[SCOPE.sCountry('vikelas_olympics_candidate_fallback').GetName]"
 vikelas.114.t: "Sıradaki Olimpiyatlar [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]’da"
 vikelas.114.d: "IOC kararını verdi. [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetName], sıradaki Olimpiyat Oyunlarına ev sahipliği yapmak için en iyi koşullara sahip."
 vikelas.114.f: "Olimpiyat Oyunlarına ev sahipliği yapmak prestijli bir iştir. Hazırlıklar bazı maliyetler gerektirir, fakat çabaya değerdir."
 vikelas.114.g: "[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]’da görüşmek üzere!"
 vikelas.115.g: "Görüşmek üzere... Hey, bir dakika, bu biz miyiz? Yaşasın!"
 vikelas.116.d: "Tüm dünya [ROOT.GetCountry.GetName]’e geldi. #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! ulustan atletler bu uluslararası etkinliğe katılıyor. Ev sahibi olmaktan gurur duyuyoruz – sporcularımız ev sahibi avantajından faydalansın!"
 vikelas.116.f: "‘Olimpiyat Oyunlarında önemli olan kazanmak değil, katılmaktır; hayatta önemli olan zafer değil, mücadeledir; esas olan fethetmek değil, iyi bir şekilde savaşmış olmaktır. Bu ilkeleri yaymak, güçlü, daha yiğit, her şeyden önemlisi daha dürüst ve daha cömert bir insanlık inşa etmektir.’ -Pierre de Coubertin"
 vikelas.116.g: "Oyunlar başlasın!"
 vikelas.117.d: "Tüm dünya [SCOPE.sCountry('vikelas_olympic_country').GetName]’e geldi. #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! ulustan atletler bu uluslararası etkinliğe katılıyor."
 vikelas.118.d: "Sporcularımız cesurca mücadele etti – şimdi ise şanı eve getirme vakti."
 vikelas.119.t: "Uluslararası Olimpiyat Komitesi"
 vikelas.119.d: "Olimpiyat Oyunlarını canlandırmak için [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName], eski Oyunların modern bir biçimini sürdürmek ve organize etmekle sorumlu olacak bir Uluslararası Olimpiyat Komitesi (IOC) kurdu. Modern çağın ilk oyunlarının [ROOT.GetCountry.GetName]’de düzenlenmesine karar verildi."
 vikelas.119.f: "İlk IOC, esas olarak [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]’in yakın çevresinden oluşuyordu. Dar bir çemberde toplanmışlardı. Daha sonra diğer IOC üyeleri katılacak ve benzer fikirlere sahip bu grup uluslararası bir örgüt haline gelecekti. İlk kararlardan biri, ilk Olimpiyat Oyunlarının nerede yapılacağıyla ilgiliydi. Bu görev devredilebilecek egemen bir Yunan ulus devleti olmadığı için oyunların kurucu ülke [ROOT.GetCountry.GetName]’de yapılmasına karar verildi. Bundan sonra kurul, her dört yılda bir farklı bir yer belirleyecekti."
 vikelas.119.g: "O halde oyunları kendi topraklarımızda düzenliyoruz."
 vikelas.120.t: "Uluslararası Olimpiyat Komitesi"
 vikelas.120.d: "Olimpiyat Oyunlarını canlandırmak için [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName], eski Oyunların modern bir biçimini sürdürmek ve organize etmekle sorumlu olacak bir Uluslararası Olimpiyat Komitesi (IOC) kurdu. Modern çağın ilk oyunlarının [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFormatting]’de düzenlenmesine karar verildi."
 vikelas.120.f: "İlk IOC, esas olarak [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]’in yakın çevresinden oluşuyordu. Dar bir çemberde toplanmışlardı. Daha sonra diğer IOC üyeleri katılacak ve benzer fikirlere sahip bu grup uluslararası bir örgüt haline gelecekti. İlk kararlardan biri, ilk Olimpiyat Oyunlarının nerede yapılacağıyla ilgiliydi. Bu görev devredilebilecek egemen bir Yunan ulus devleti olmadığı için oyunların kurucu ülke [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]’de yapılmasına karar verildi. Bundan sonra kurul, her dört yılda bir farklı bir yer belirleyecekti."
 vikelas.120.g: "Görüşmek üzere [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]’de"
 vikelas_3_winners_loc: "Bu yılki Olimpiyat Oyunlarında yalnızca 1 ya da 2 değil, tam 3 kazanan var! [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName], [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName] ve [GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetCountry.GetName], hepsi [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals! altın madalya kazandı."
 vikelas_2_winners_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName] ve [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName], her ikisi de [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals! altın madalyaya sahip. Bu, her iki ülkenin de dünyanın en iyi sporcularını barındırdığı anlamına geliyor."
 vikelas_1_winner_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName], [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals! altın madalya ile bu Olimpiyat Oyunlarına damgasını vurdu."
