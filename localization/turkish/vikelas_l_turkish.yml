 vikelas.595.d: "Yeni bir [concept_vikelas_racer] kendini tanıttı: [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerHis|U] adı [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]."
 vikelas.595.g: "Umarız [SCOPE.sCharacter('vikelas_new_racer_scope').GetSheHe] daha şanslı olur."
 vikelas.596.t: "Yeni Bir Mekanik"
