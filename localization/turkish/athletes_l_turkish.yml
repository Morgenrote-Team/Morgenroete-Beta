l_turkish:
 athletes.2.t: "Dağcımız, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], Emekli Oluyor"
 athletes.2.d: "Zirvelere tırmanmak, bilinmeyen rotalar keşfetmek ve tehlikeli arazilerde keşif gezilerine liderlik ederek onlarca yıl geçirdikten sonra, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] emekli olmaya karar verdi. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] artık [concept_douglas_mountaineer]'ımız olarak hizmet vermeyecek."
 athletes.2.f: ""
 athletes.2.g: "Zirve asla son değildi—sadece inişten önceki manzaraydı."
 athletes.12.t: "Dağcımız Öldü"
 athletes.12.d: "Zirveleri fethetmek ve diğerlerini en tehlikeli tırmanışlarda yönlendirmekle geçen bir ömürden sonra, en saygın [concept_douglas_mountaineer]'ımız hayatını kaybetti. Şimdi bulutların içine kim liderlik edecek?"
 athletes.12.f: ""
 athletes.12.g: "İpi gitmiş olabilir, ama izi duruyor."
 athletes.52.t: "Yeni Bir Dağcı"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName], bir gün zirvelerimize tırmanan en iyiler arasında yer alabilecek umut vaat eden bir yetenektir."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] amaçla tırmanıyor."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] artık Kıdemli Bir Dağcı!"
 athletes.102.d: "Buzullara meydan okuduktan, sırt hatlarını aştıktan ve bilinmeyene keşif gezileri düzenledikten sonra, [concept_douglas_mountaineer]'ımız [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] artık Kıdemli Dağcı olarak anılacak kadar ünlendi!"
 athletes.102.f: ""
 athletes.102.g: "Dağların Ustası!"
 athletes.53.t: "A New Coach"
 athletes.53.d: "A new [concept_vikelas_coach] has introduced [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] name is [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]."
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] will lead our boys to victory."
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] is now a Senior Coach!"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] made a name for himself by training and developing an entire generation of players. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] is now famous enough to be considered a Senior Coach!"
 athletes.103.f: ""
 athletes.103.g: "An award for being able to scream shamelessly on the pitch."
 curtiss_pilot_will_become_part_of_academia_tt: "[SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] will join the Character Pool of [SCOPE.GetRootScope.GetCountry.GetName]."