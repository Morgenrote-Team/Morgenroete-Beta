l_turkish:
 matsuura.101.t: "Genç Bir Adam Ezo'ya Seyahat Etmek İstiyor"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName], kuzeydeki Ezo'ya seyahat etmek isteyen genç bir adam. Ancak Matsumae Domain seyahati kısıtladı. Genç adamın kuzeydeki adalara maceraya çıkmasına izin verilmeli mi?"
 matsuura.101.f: "\"Her yere seyahat etmek istiyorum! Ezo, Morokoshi, Tenjiku! Lütfen dünyanın harikalarını görmeme izin verin!\""
 matsuura.101.g: "Oradaki manzarayı inceleyebilir!"
 matsuura.101.h: "Onun bir şair olduğunu duydum, belki seyahatlerinden ilham alır?"
 matsuura.101.i: "Belki bölgenin resimlerini yapabilir?"
 matsuura.101.j: "Kimsenin ayrılmasına izin verilmiyor."
 matsuura_allowed_travels_modifier: "Ezo'ya Seyahat İzni"
 matsuura.102.t: "Batı Kimyası"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] yıllardır Rangaku, Batı çalışmaları üzerine çalışıyor. Şimdi \"Kimya\" denilen bir şey hakkında bir kitap yazmak üzere. Belki onu desteklemek iyi bir fikir olur."
 matsuura.102.f: "\"Görüyorsunuz, uzak diyarlardan bir adam deneyler yaptı...\"\n\"Deneylerin ne olduğunu bilmek mi istiyorsunuz? Eğer bir teoriniz varsa...\"\n\"Ah, teorinin ne olduğunu da bilmiyorsunuz...\""
 matsuura.102.g: "Bahsettiği bu \"Kimya\" nedir?"
 matsuura.102.h: "Barbar fikirleri!"
 matsuura_barbarian_ideas_modifier: "Barbar Fikirleri"