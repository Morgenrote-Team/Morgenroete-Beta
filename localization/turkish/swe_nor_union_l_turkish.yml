 mr_swe_nor_union_decision_1: "Norveç’e yeni bir Genel Vali atayın"
 mr_swe_nor_union_decision_1_desc: "Christiania’daki Genel Vali pozisyonu şu anda boş. Kralın yokluğunda Norveç Hükûmeti’nin yeni başını atamak için bir karar vermeliyiz."
 mr_swe_nor_union_decision_2: "Bakanlarımızın parlamento tartışmalarına katılmasını talep edin"
 mr_swe_nor_union_decision_2_desc: "Şu anda bakanların Stortinget’te söz hakkı yok. Bu kabul edilemez."
 mr_swe_nor_union_decision_3: "Bayrağımızdaki tüm birlik sembollerinin kaldırılmasını talep edin"
 mr_swe_nor_union_decision_3_desc: "Birlik sembolleri olmayan temiz bir Norveç bayrağı kullanmalıyız."
 mr_swe_nor_union_decision_4: "Norveç konsolosluk ofislerini talep edin"
 mr_swe_nor_union_decision_4_desc: "With the increase in Norwegian shipping, the Swedish consular offices are not enough. We need Norwegian offices."
 mr_swe_nor_union_decision_5: "Kral Karl XV’in sözünü yerine getirmesini talep edin"
 mr_swe_nor_union_decision_5_desc: "Karl XV’in İsveç ve Norveç kralı olarak taç giymesiyle, Genel Vali pozisyonunu kaldırma sözünü yerine getirme zamanı geldi."
 da_appoint_governor_general: "Genel Vali Atayın"
 da_appoint_governor_general_desc: "[concept_subject] için Genel Valiyi değiştirir. Seçilen adaya bağlı olarak [concept_liberty_desire] değişebilir."
 da_appoint_governor_general_action_name: "Genel Vali Atayın"
 da_appoint_governor_general_action_notification_name: "[TARGET_COUNTRY.GetName] yeni bir Genel Valiye sahip oldu"
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetName], [TARGET_COUNTRY.GetName]’in Genel Valisini yeni bir atama ile değiştirdi."
 da_appoint_governor_general_action_notification_third_party_name: "[TARGET_COUNTRY.GetName] yeni bir Genel Valiye sahip oldu"
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetName], [TARGET_COUNTRY.GetName]’in Genel Valisini yeni bir atama ile değiştirdi."
 mr_swe_nor_union_event.1.t: "Yeni Genel Vali Atanması"
 mr_swe_nor_union_event.1.d: "Christiania’daki Genel Vali pozisyonu boş. Belki bu görevi dolduracak birini atamayı düşünmeliyiz."
 mr_swe_nor_union_event.1.f: "1814 Norveç Anayasası’na göre, İsveç veya Norveç vatandaşı bir Genel Vali, Kralın yokluğunda Norveç hükümetine liderlik edebilir. İsveç’te birçok kişi, Genel Valinin İsveç Kralı adına hareket etmesi halinde İsveç vatandaşı olmasının zorunlu olduğunu düşünüyor. Aksi, ulusal güvenliği tehlikeye atabilir."
 mr_swe_nor_union_event.1.a: "İsveçli bir Genel Vali atayın"
 mr_swe_nor_union_event.1.b: "Norveçli bir Genel Vali atayın"
 mr_swe_nor_union_event.1.c: "Pozisyonu önümüzdeki 5 yıl boş bırakın"
 mr_swe_nor_union_event.2.t: "Norveçli Bakanlar"
 mr_swe_nor_union_event.2.d: "Stortinget, Norveçli bakanların parlamento tartışmalarına katılmasına izin veriyor."
 mr_swe_nor_union_event.2.f: "Norveç parlamentosu Stortinget, Norveçli bakanların parlamenter tartışmalara ve müzakerelere katılmasını onayladı. Şimdi Kralın kararlarını onaylamasını bekliyorlar."
 mr_swe_nor_union_event.2.a: "Kararlarını tanımayı reddedin"
 mr_swe_nor_union_event.2.b: "Kararlarını onaylayın"
 mr_swe_nor_union_event.3.t: "Norveç Bayrağı"
 mr_swe_nor_union_event.3.d: "Norveç, temiz bir Norveç bayrağı kullanma hakkını talep ediyor."
 mr_swe_nor_union_event.3.f: "Stortinget, Norveç parlamentosu, İsveç-Norveç birliği sembolleri olmadan yeni bir 'temiz' bayrak kullanmayı onayladı. Kararlarını desteklemeli miyiz yoksa istedikleri bayrağı kullanma haklarını reddetmeli miyiz?"
 mr_swe_nor_union_event.3.a: "Mevcut bayraklarını koruyacaklar"
 mr_swe_nor_union_event.3.b: "İstedikleri bayrağı kullanmalarına izin verin"
 mr_swe_nor_union_event.4.t: "Norveç Konsolosluk Ofisleri"
 mr_swe_nor_union_event.4.d: "Norveç, kendi konsolosluk ofislerini dünya çapında açma hakkını talep ediyor."
 mr_swe_nor_union_event.4.f: "Birlik konsolosluk ofisleri Stockholm’daki dışişleri tarafından yürütülüyordu, ancak Norveç gemicilik endüstrisi önem kazandıkça, Norveçliler bir Norveç konsolosluk ofisinin gerekli olduğunu savunuyor. İsveç’te bu talep, Norveç dış hizmetinin ilk adımı ve gelecekte bağımsızlık talebinin başlangıcı olarak görülüyor."
 mr_swe_nor_union_event.4.a: "Ofislerimizde bir sorun yok"
 mr_swe_nor_union_event.4.b: "Ne kadar çok ofis, o kadar iyi"
 mr_swe_nor_union_event.5.t: "Karl XV’in Sözü"
 mr_swe_nor_union_event.5.d: "Norveç, yeni kral Karl XV’in Christiania’daki Genel Vali pozisyonunu kaldırma sözünü yerine getirmesini talep ediyor."
 mr_swe_nor_union_event.5.f: "Veliahtken halka söz vermek bir şey, iki ülkeyi yönetmek başka bir şeydir. Pozisyon söz verildiği gibi kaldırılmalı ve Genel Vali yerine bir Norveç başbakanı mı geçmeli?"
 mr_swe_nor_union_event.5.a: "Christiania’da kendi kişimize ihtiyacımız var"
 mr_swe_nor_union_event.5.b: "Söz tutulmalı"
 mr_swe_nor_union_event.6.t: "Veliaht Prens’in Sözü"
 mr_swe_nor_union_event.6.d: "Tahtın veliahtı Karl Bernadotte, taç giymesiyle Christiania’daki Genel Vali pozisyonunu kaldırmayı vaat ediyor"
 mr_swe_nor_union_event.6.f: "Gelecek kral, Norveç halkının desteğini kazanmak amacıyla, taç giymesi sırasında Christiania’daki Genel Vali ofisini kaldıracağına dair yemin ediyor. İsveçli toprak sahipleri ve silahlı kuvvetlerin tepkileri, genç veliahtın teklifine gölge düşürüyor."
 mr_swe_nor_union_event.6.a: "Umarız ne yaptığını biliyordur"
 mr_swe_nor_union_concessions_none: "Norveç’e herhangi bir taviz verilmedi"
 mr_swe_nor_union_concessions_minor: "Norveç’e küçük tavizler verildi"
 mr_swe_nor_union_concessions_major: "Norveç’e büyük tavizler verildi"
 mr_swe_nor_clean_flag: "Norveç bayrağındaki tüm birlik sembolleri kaldırıldı"