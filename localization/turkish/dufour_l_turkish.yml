l_turkish:
 dufour_celebrate_schwingfest_decision: "İlk Eidgenössisches Schwing- und Älplerfest'ini düzenle"
 dufour_celebrate_schwingfest_decision_desc: "Schwingen, adeta İsviçre'nin milli sporu haline gelmiş durumda. Hadi bunu gerçek bir milli spor yapalım ve Schwing- und Älplerfest'i kutlayalım!"
 dufour_schwingfest_modifier: "Eidgenössisches Schwing- und Älplerfest"
 dufour_schwingerkonig: "Schwingerkönig"
 dufour_schwingerkonig_desc: "Bu karakter, İsviçre'deki Eidgenössisches Schwingfest'ini kazandı. Halk tarafından bir şampiyon olarak görülüyor."
 dufour.1000.t: "İki Appenzell kadınların seçme hakkını uygulamıyor"
 dufour.1000.d: "İsviçre'de kadınların seçme hakkı tanındı. Ne yazık ki bazı kantonlar biraz yavaş. Appenzell Innerhoden ve Appenzell Ausserrhoden kantonlarında, kadınların federal oylamalara ve seçimlere katılmalarına izin verilmektedir, ancak belediye ve kanton seçimlerine katılamazlar. İlk önce Kantonal Anayasa'ya bir değişiklik yapılması gerekir ve bu da bir Landsgemeinde'de onaylanmalıdır. Süreç birkaç yıl sürebilir. Biz müdahale etmeli ve Appenzell halkını kadınların seçme hakkını tanımaya zorlamalı mıyız, yoksa bekleyip kendi kendilerine tanıyacaklarını ummalı mıyız?"
 dufour.1000.f: "\"Şüphesiz erkeklerimiz bunu düzgün yapıyor!\"\n\n#b Tarihsel olarak#! İsviçre'de kadınların seçme hakkı çok uzun bir süre sonra tanındı. 1971 yılında İsviçre'deki oylama ve seçimler için kadınların seçme hakkı tanındı. Bazı kantonlarda bu daha da uzun sürdü. İki Appenzell en uzun sürenlerdi. Appenzell Ausserrhoden, 1989 yılında bir Landsgemeinde'de kadınların seçme hakkını kabul etti. Appenzell Innerrhoden ise, 1990 yılında Federal Mahkeme tarafından kadınların seçme hakkını tanımaya zorlandı.\nİsviçre, kadınların seçme hakkını en geç tanıyan ülkelerden biridir. Kadınların seçme hakkını daha erken tanıyan ülkeler arasında Afganistan, Finlandiya, ABD ve diğer birçok ülke bulunmaktadır."
 dufour.1000.g: "Kadınların oy kullanmasını sağlamak için onları zorlayın."
 dufour.1000.h: "Şüphesiz yakında kadınlara oy hakkı vermek için karar alacaklardır."
 dufour_womens_suffrage_appenzell_effects_tt:0 "İki kantonu da kadınların seçme hakkını tanımaya zorlamadınız. Eğer bu konuda bir ilerleme olursa veya kararınız gerektiğinde bir olay alırsınız."
 dufour.1001.t: "Her iki Appenzell'de kadınların seçme hakkı oylamasında yenilgi"
 dufour.1001.d: "Appenzell Ausserrhoden ve Appenzell Innerrhoden'deki hükümet, kantonal düzeyde kadınların seçme hakkını tanımayı öneren bir yasa tasarısı sundu. Tasarı reddedildi. Bu, Appenzell kadınlarının hala oy kullanmalarına izin verilmediği anlamına geliyor. İki Appenzell'i kadınlara bu hakkı tanımaya zorlayabiliriz, ancak bu yerel halkın kesinlikle bizim aleyhimize dönmesine neden olacaktır."
 dufour.1001.f: "\"Kadınların seçme hakkını kantonal düzeyde tanımak isteyenler el kaldırsın!\" Birçok el havaya kalktı. Ama yeterli miydi? \"Kadınların seçme hakkının kantonal düzeyde tanınmasını reddettiniz!\"\n\n#b Tarihsel olarak#! İsviçre'de kadınların seçme hakkı çok uzun bir süre sonra tanındı. 1971 yılında İsviçre'deki oylama ve seçimler için kadınların seçme hakkı tanındı. Bazı kantonlarda bu daha da uzun sürdü. İki Appenzell en uzun sürenlerdi. Appenzell Ausserrhoden, 1989 yılında bir Landsgemeinde'de kadınların seçme hakkını kabul etti. Appenzell Innerrhoden ise, 1990 yılında Federal Mahkeme tarafından kadınların seçme hakkını tanımaya zorlandı.\nİsviçre, kadınların seçme hakkını en geç tanıyan ülkelerden biridir. Kadınların seçme hakkını daha erken tanıyan ülkeler arasında Afganistan, Finlandiya, ABD ve diğer birçok ülke bulunmaktadır."
 dufour.1001.g: "Şimdi yeterince sabrettim! Onları kadınların seçme hakkını tanımaya zorlayalım!"
 dufour.1001.h: "Biraz daha bekleyelim."
 dufour.1002.t: "Her iki Appenzell de kadınların seçme hakkını tanıdı"
 dufour.1002.d: "Kimse bunu tahmin edemezdi. Her iki Appenzell, bölgesel toplantılarında kadınların seçme hakkını tanıdılar. Bu, İsviçre'nin her yerinde kadınların artık oy kullanabileceği anlamına geliyor."
 dufour.1002.f: "\"Kadınların seçme hakkını kantonal düzeyde tanımak isteyenler el kaldırsın!\" Birçok el havaya kalktı. Ama yeterli miydi? \"Kadınların seçme hakkının kantonal düzeyde tanınmasını onayladınız!\" Coşkulu alkışlar koptu!\n\n#b Tarihsel olarak#! İsviçre'de kadınların seçme hakkı çok uzun bir süre sonra tanındı. 1971 yılında İsviçre'deki oylama ve seçimler için kadınların seçme hakkı tanındı. Bazı kantonlarda bu daha da uzun sürdü. İki Appenzell en uzun sürenlerdi. Appenzell Ausserrhoden, 1989 yılında bir Landsgemeinde'de kadınların seçme hakkını kabul etti. Appenzell Innerrhoden ise, 1990 yılında Federal Mahkeme tarafından kadınların seçme hakkını tanımaya zorlandı.\nİsviçre, kadınların seçme hakkını en geç tanıyan ülkelerden biridir. Kadınların seçme hakkını daha erken tanıyan ülkeler arasında Afganistan, Finlandiya, ABD ve diğer birçok ülke bulunmaktadır."
 dufour.1002.g: "Bunun bu kadar uzun sürmesini beklemezdim!"
 dufour.1003.t: "İki Appenzell'de kadınların seçme hakkı tanınmasında başka bir başarısızlık"
 dufour.1003.d: "Bazı ilerici Appenzell halkı, kadınların seçme hakkını tanımak için ikinci bir girişimde bulundular. Ancak bu girişim de başarısız oldu. Hala tanıtımı zorlayabiliriz ya da daha uzun bekleyip, Appenzell halkının kadınların seçme hakkını gönüllü olarak tanıyacağını umabiliriz."
 dufour.1003.f: "\"Kadınların seçme hakkını kantonal düzeyde tanımak isteyenler el kaldırsın!\" Birçok el havaya kalktı. Ama yeterli miydi? \"Kadınların seçme hakkının kantonal düzeyde tanınmasını reddettiniz!\"\n\n#b Tarihsel olarak#! İsviçre'de kadınların seçme hakkı çok uzun bir süre sonra tanındı. 1971 yılında İsviçre'deki oylama ve seçimler için kadınların seçme hakkı tanındı. Bazı kantonlarda bu daha da uzun sürdü. İki Appenzell en uzun sürenlerdi. Appenzell Ausserrhoden, 1989 yılında bir Landsgemeinde'de kadınların seçme hakkını kabul etti. Appenzell Innerrhoden ise, 1990 yılında Federal Mahkeme tarafından kadınların seçme hakkını tanımaya zorlandı.\nİsviçre, kadınların seçme hakkını en geç tanıyan ülkelerden biridir. Kadınların seçme hakkını daha erken tanıyan ülkeler arasında Afganistan, Finlandiya, ABD ve diğer birçok ülke bulunmaktadır."
 dufour.1003.g: "Lan bu köylüler de ne yapacaklarını bilmiyorlar. Şansları vardı, şimdi onları zorlayacağız!"
 dufour.1003.h: "Demokratik süreci sadece baltalamamalıyız."
 dufour.1004.t: "Federal Mahkeme, Appenzell Innerrhoden'u kadınların seçme hakkını tanımaya zorladı"
 dufour.1004.d: "Appenzell Ausserrhoden kadınların seçme hakkını son Landsgemeinde'de kabul ettikten sonra, Federal Mahkeme Appenzell Innerrhoden için kararını verdi. Appenzell Innerrhoden, kadınların seçme hakkını tanımak zorunda. Bu mesele artık bir kez ve sonsuza kadar çözülmüş oldu."
 dufour.1004.f: "\"Federal Mahkeme, Appenzell'in İsviçre Konfederasyonu Anayasasını ihlal ettiğini belirtiyor. Kadınların erkeklerle aynı haklara sahip olduğuna karar verilmiştir. Appenzell Innerrhoden, kadınların seçme hakkını derhal tanımak zorundadır!\"\n\n#b Tarihsel olarak#! İsviçre'de kadınların seçme hakkı çok uzun bir süre sonra tanındı. 1971 yılında İsviçre'deki oylama ve seçimler için kadınların seçme hakkı tanındı. Bazı kantonlarda bu daha da uzun sürdü. İki Appenzell en uzun sürenlerdi. Appenzell Ausserrhoden, 1989 yılında bir Landsgemeinde'de kadınların seçme hakkını kabul etti. Appenzell Innerrhoden ise, 1990 yılında Federal Mahkeme tarafından kadınların seçme hakkını tanımaya zorlandı.\nİsviçre, kadınların seçme hakkını en geç tanıyan ülkelerden biridir. Kadınların seçme hakkını daha erken tanıyan ülkeler arasında Afganistan, Finlandiya, ABD ve diğer birçok ülke bulunmaktadır."
 dufour.1004.g: "Sonunda!"
 dufour.2000.t: "İlk Eidgenössisches Schwing- und Älplerfest Biel'de"
 dufour.2000.d: "Birçok Schwinger, ilk Eidgenössisches Schwing- und Älplerfest'ine katıldı. Etkinlik Biel kasabasında düzenlendi ve spor giderek daha popüler hale geldikçe İsviçreli Schwing kulüpleri tarafından planlandı. Büyük başarıdan sonra, katılımcılar ve planlayıcılar, üç yıl sonra düzenlenecek bir sonraki etkinliği dört gözle bekliyorlar. Ve birçok Schwinger, etkinliği kazanmayı ve birinci ödül olan güçlü bir boğayı kazanmayı sabırsızlıkla bekliyor."
 dufour.2000.f: "İki dev vücut birbirleriyle güreşiyor, hiçbiri düşmek istemiyor. Her iki rakip de seyircilerin tezahüratları altında yere düşüyor. Alfred Niklaus üstte. O, ilk Schwingerkönig! Ama önce rakibine kalkmasına yardımcı oluyor ve sırtını talaşlardan temizliyor.\n\n#b Tarihsel olarak#! Schwingen - çok katı kurallara sahip bir güreş türü - İsviçre'de popüler bir spordu, ancak kökeni pek iyi takip edilemiyor. İlk yerel Schwingfest, Interlaken'deki Unspunnenmatte'de düzenlendi. İlk Eidgenössisches Schwing- und Älplerfest 1895 yılında Biel'de düzenlendi ve ardından her iki veya üç yılda bir düzenli olarak yapılmaya başlandı. Schwing- und Älplerfest'te ayrıca İsviçre'nin diğer iki milli sporu olan Hornussen (\"Hornuss\" adı verilen bir diskle oynanan takım sporu) ve Steinstossen (taş fırlatma sporu) de yer alır.\n\nEidgenössisches Schwing- und Älplerfest bugün de kutlanmaktadır. En son etkinlik 2022'de Basel yakınlarındaki Pratteln'de yapıldı ve bir sonraki etkinlik 2025'te Mollis'te gerçekleştirilecek. Kazanan, boğa ödülüyle ödüllendirilir; 2022 Schwingerkönig'i Joel Wicki, \"Magnus\"
 dufour.2000.g: "Bir sonraki etkinliği sabırsızlıkla bekliyorum!"
 dufour.2001.t: "[SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] bu yılki Eidgenössisches Schwingfest'ini kazandı!"
 dufour.2001.d: "Zorlu bir mücadelenin ardından, [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] bu yılki Eidgenössisches Schwingfest'inin galibi olarak öne çıktı."
 swiss_flavor_events.21.f1: "İki dev vücut birbirleriyle güreşiyor, hiçbiri düşmek istemiyor. Her iki rakip de seyircilerin tezahüratları altında yere düşüyor. Bir adam üstte, bu \"Gang\"ı kazandı. Rakibine kalkmasına yardımcı oluyor ve sırtındaki talaşları temizliyor."
 swiss_flavor_events.21.f2: "\n\nİlginç bir şekilde, Schwingen'de Schwinger'ların isimleri ters çevrilir ve soyadlarıyla başlar. Eğer Abraham Lincoln bir Schwinger olsaydı, Lincoln Abraham olarak adlandırılırdı."
 swiss_flavor_events.21.f3: "\n\nEğer bir rakip Schwingerkönig ile aynı puanı alırsa, \"Erstgekrönter\" (ilk taçlanan) unvanını alır."
 swiss_flavor_events.21.f4: "\n\nEidgenössisches'te ilk %15'lik dilime girenler bir çelenk ile ödüllendirilir. Bunlar genellikle \"Eidgenossen\" (İsviçreli vatandaşlar) olarak adlandırılır."
 swiss_flavor_events.21.f5: "\n\nDiğer katılımcılar da ödüller alır. Onlar bir hediye tapınağına yerleştirilir. Her hediye, bir kişi ya da bir organizasyon tarafından bağışlanmıştır."
 swiss_flavor_events.21.f6: "\n\nÜç farklı Schwinger, üç kez Schwingerkönig oldu. Hans Stucki 1900, 1902 ve 1905 yıllarında kazandı. Rudolf Hunsperger 1966, 1969 ve 1974 yıllarında kazandı. Jörg Abderhalden ise 1998, 2004 ve 2007 yıllarında kazandı."
 swiss_flavor_events.21.f7: "\n\nİsviçre'de başka Schwingfest'ler de vardır. Bunlardan iki önemli olanı, Interlaken yakınlarındaki \"Unspunnen-Schwinget\" ve Zürih Kantonundaki \"Kilchberger Schwinget\"tir. Eğer bir Schwinger bu iki etkinliği ve Eidgenössisches'i kazanırsa, buna \"Schwinger-Grand-Slam\" denir."
 swiss_flavor_events.21.f8: "\n\nSchwingen'de sadece kazanmak için puan almazsınız. Eğer iki rakip berabere kalırsa ama çekişmeli bir mücadele sergilerlerse, sıkıcı bir mücadeleye göre 0.25 puan daha fazla ödüllendirilirler. Hatta kaybetseniz bile cesur ve iyi bir mücadele sergilerseniz, 0.75 puan daha fazla alırsınız."
 swiss_flavor_events.21.f9: "\n\nPrestiji yüksek olan Schwingfeste, dağlarda yapılan \"Bergschwingfeste\"lerdir. Bunlar halk festivalleridir ve geleneksel müzikler de vardır. En bilinen Bergschwingfeste'ler, \"Stoos-Schwinget\", \"Rigi Schwing- und Älplerfest\", \"Brünigschwinget\", \"Schwarzsee-Schwinget\", \"Weissenstein-Schwinget\" ve \"Schwägalp-Schwinget\"tir."
