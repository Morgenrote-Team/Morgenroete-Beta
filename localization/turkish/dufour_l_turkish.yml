 dufour.901.t: "Yerel halkın anketi bozması"
 dufour.901.d: "[SCOPE.sState('dufour_mapping_scope').GetName] bölgesindeki anket çalışmaları sırasında, anketçilerimiz kırsal bölgede yaşayanlarla çatışmaya girdi. Görünüşe göre çalışmalarıyla bir cenazeyi rahatsız etmişler."
 dufour.901.f: "\"Hadi, gitsek iyi olacak! Duymadınız mı? Bizim haritaya ihtiyacımız yok, her zaman kendi yolumuzu bulduk!\""
 dufour.901.g: "Başınız sağ olsun."
 dufour.901.h: "Devam edin!"
 dufour.902.t: "Dağda bir anketçi öldü"
 dufour.902.d: "[SCOPE.sState('dufour_mapping_scope').GetName]’in yüksek dağlarından birinde anket yaparken, anketçilerimiz bir gök gürültülü fırtına tarafından şaşırtıldı. Fırtına çıktı ve yağmur yağdı. Anketçiler, çadırlarında sığındılar fakat bir yıldırım biri öldürdü ve diğerini yaraladı."
 dufour.902.f: "\"Bacağım yıldırım çarptı ama birkaç gün içinde iyileşti. Sonunda aşağı inip güvenliğe ulaşabildim. Gerçekten bir zorluktu!\""
 dufour.902.g: "Aman Tanrım!"
 dufour.903.t: "Yerel halk anketçilere yardımcı oldu"
 dufour.903.d: "[SCOPE.sState('dufour_mapping_scope').GetName]’de anketçilerimiz neredeyse kayboluyordu ama birkaç yerli onlara yardım etti ve hatta kalacak yer ve en hızlı yollar hakkında bilgi sundu. Bu, haritanın daha hızlı tamamlanmasına kesinlikle yardımcı olacak!"
 dufour.903.f: "\"Sonra çalışırsınız. Önce birlikte içmemiz gerek. Bu bizim en iyi Kirsch'imiz!\""
 dufour.903.g: "Yardımlarını takdir ediyoruz!"
 dufour.904.t: "Ekipman kayboldu!"
 dufour.904.d: "[SCOPE.sState('dufour_mapping_scope').GetName]’de bir dağa tırmanırken, anketçilerimizden biri ekipmanını kaybetti. Yeni ekipman sağlamak zorundayız ya da ilerleme yavaşlayacak."
 dufour.904.f: "\"Sadece düştü... Tutamadım... Kim bilebilirdi ki ekipmanları sırt çantalarımıza sabitlememiz gerektiğini?\""
 dufour.904.g: "Bunlarla başa çıkmalılar."
 dufour.904.h: "Yeni araç gereç al!"
 dufour.905.t: "Blüemlisalp mi, Frau mı?"
 dufour.905.d: "[SCOPE.sState('dufour_mapping_scope').GetName]’deki yerel halk aynı dağa iki farklı isim veriyor: Blüemlisalp ve Frau. Hangi ismi seçmeliyiz?"
 dufour.905.f: "\"Sadece bir madeni para atamaz mıyız?\""
 dufour.905.g: "Blüemlisalp!"
 dufour.905.h: "Frau!"
 dufour.906.t: "Anketçi, harita üzerindeki çalışmaları hızlandırdı"
 dufour.906.d: "[SCOPE.sCharacter('surveyor_scope').GetFullName], tanınmış bir anketçi, İsviçre'nin topografik haritasının oluşturulmasında büyük bir ilerleme kaydetti."
 dufour.906.f: "\"Evet, bu alet ölçmek içindir, yıldızlara bakmak için değil.\""
 dufour.906.g: "Harika İş!"
 dufour.907.t: "Matematikçi hesaplamalarda yardımcı oldu"
 dufour.907.d: "[SCOPE.sCharacter('mathematician_scope').GetFullName], matematik eğitimi almış bir kişi olarak, ekibimize çeşitli hesaplamaları çözmede yardımcı oldu. Bu, haritanın daha hızlı tamamlanmasına yardımcı olacak."
 dufour.907.f: "\"Kim bilebilirdi ki matematik aslında faydalıdır!\""
 dufour.907.g: "İyi ki Matematikçilerimiz var!"
 dufour.908.t: "Balon uçuşu sanatçıları ilhamlandırdı"
 dufour.908.d: "[SCOPE.sCharacter('balloonist_scope').GetFullName], tanınmış bir baloncu sayesinde, birkaç sanatçı ve anketçi dünyayı yukarıdan görebildiler. Sanatçılar nefes kesen manzaradan ilham aldılar ve ülkemizi harita üzerinde daha gerçekçi bir şekilde nasıl tasvir edebileceklerini daha iyi anladılar."
 dufour.908.f: "\"Aman Tanrım! Umarım kaza yapmayız!\""
 dufour.908.g: "Dünyayı yukarıdan görmek etkileyici!"
 dufour.910.t: "İlk Sayfalar Yayınlandı: Jura ve Basel"
 dufour.910.d: "Yeni topografik haritamızın ilk sayfaları yayınlandı ve bunlar Basel çevresi ve Jura bölgesine odaklanıyor."
 dufour.910.f: "Jura, Savoy'dan Basel'e kadar uzanan küçük dağlardan oluşan bir sırt olup, bazı yamaçları Hristiyan Gölü'ne kadar uzanır. Vaud, Neuchâtel, Bern, Basel'in her ikisi, Solothurn ve Aaargau'yu kapsar. Birçok büyük şehir Jura'ya yakın konumlanır.\n Basel, örneğin İsviçre'nin en önemli şehirlerinden biridir. Basel, Alsace ve Baden ile sınırdır ve Ren Nehri sayesinde iyi bir bağlantıya sahiptir.\nBirkaç yıl önce Basel Kanton'u Basel Stadt (Şehir) ve Basel Land (Kırsal) olmak üzere ikiye bölündü. İlginç bir şekilde, kırsal bölge o dönemde daha liberalken, şehir Patriklerle yönetiliyordu. Basel oldukça uluslararası bir şehir olup, ünlü düşünürler Leonhard Euler ve Daniel Bernoulli'yi barındıran eski bir üniversiteye sahiptir.\nÖte yandan, Cenevre büyük bir şehir olup Fransa ile çevrilidir. Napolyon'un yönetimi altında Fransa'ya bağlıydı ve 1815'te İsviçre'ye döndü. Şimdi ilk özel bankalar kuruluyor ve Cenevre finans sektörünün bir merkezi haline geliyor. Ayrıca Voltaire ve Jean-Jacques Rousseau gibi İsviçre'nin en büyük filozoflarının da eviydi."
 dufour.910.g: "İlginç!"
 dufour.910.h: "İsviçre hakkında hiçbir şey duymak istemiyorum!"
 dufour.910.no_more_information_tt: "Artık #n sadece#! İsviçre'yi etkisiz bir şekilde betimleyen olaylar almayacaksınız."
 dufour.911.t: "Yeni Sayfalar Yayınlandı: Schaffhausen, Thurgau ve St. Gallen"
 dufour.911.d: "Daha fazla sayfa yayınlandı. Bu sefer odak Jura ve Basel bölgesi, özellikle Schaffhausen, Thurgau ve St. Gallen Kantoları."
 dufour.911.f: "Schaffhausen, İsviçre'nin Kuzeydoğusunda yer alır ve çoğunlukla Almanya ile çevrilidir. Şehir, Ren Nehri'nin hemen yanında yer almakta ve Ren Şelaleleri'ne oldukça yakındır. Nehrin sağladığı enerji sayesinde Schaffhausen oldukça erken sanayileşmiş ve kırsal halkın etkisiyle 1831'de liberal bir Kanton olmuştur.\nThurgau, Fransız Devrimi İsviçre'ye yayılana kadar her yıl değişen başka bir Kanton tarafından yönetiliyordu. 1815'ten itibaren tam bir Kanton haline gelmiş ve tekstil sanayi ile tarımın merkezi olmuştur. Yüksek miktarda armut ağacı bulunması nedeniyle \"Mostindien\" (Şıra Hindistanı) adı verilmiş, bu ad Ost (doğu) ve Most (şıra) kelimelerinin birleşimidir. Thurgau, 1831'den beri liberal Kantonlardandır ve İsviçre'de daha fazla merkezileşme istiyor.\nSt. Gallen, dini açıdan bölünmüş bir Kanton olup, bir zamanlar manastırın merkezi ve bir Prens Piskoposluğu'na ev sahipliği yapmıştır. Aynı zamanda tekstil sanayisinin merkezi olup, liberal bir Kanton'dur. St. Gallen, hem Appenzell Kantoları'nı hem de ünlü Säntis Dağları'nı çevreler."
 dufour.912.t: "Yeni Sayfalar Yayınlandı: Grisons ve Rhaetian Alpleri"
 dufour.912.d: "Daha fazla sayfa yayınlandı. Bu sefer odak Grisons Kantonuna ve Rhaetian Alpleri'ne yerleştirildi."
 dufour.912.f: "Grisons sadece İsviçre'nin en büyük Kanton'u değil, aynı zamanda İsviçre'deki Rumantsch dili konuşan halkın da evi olup, aynı dil grubuna ait olan Güney Tirol ve Friuli bölgesinde de konuşulmaktadır.\nGrisons, Alpler tarafından domine edilen, seyrek nüfuslu bir Kanton'dur. Özellikle Rhaetian Alpleri, eski Rhaeti kabilelerinden ismini almıştır. Grisons, büyük ölçüde tarıma dayalı bir Kanton olup, Alp geçitleri üzerinden yapılan taşımacılıktan da fayda sağlamaktadır. Napolyon Savaşları sonrasında bazı İtalyan topraklarını kaybetmek büyük bir felaketti fakat Grisons hala çoğunluğu İtalyanca konuşan yerler bulundurmakta ve üç dil grubuna sahip bir Kanton'dur: Almanca, Rumantsch ve İtalyanca.\nPolitik olarak Grisons, çok güçlü yerel belediyelerin hakimiyetindedir. Ancak son zamanlarda, Kanton'u daha fazla merkezileştirmek isteyen liberal güçler de güç kazanmaktadır."
 dufour.913.t: "Yeni Sayfalar Yayınlandı: Orta İsviçre"
 dufour.913.d: "Daha fazla sayfa yayınlandı. Bu sefer odak, Orta İsviçre'nin pek çok Kantonuna yerleştirildi."
 dufour.913.f: "Orta İsviçre, \"Eidgenossenschaft\", yani İsviçre Konfederasyonu'nun doğduğu yerdir. İlk olarak Uri, Schwyz ve Underwalden (bugün Niedwalden ve Obwalden olarak ayrılmıştır) Kantoları gevşek bir ittifak kurmuş, bu ittifak zamanla daha da genişlemiştir.\nOrta İsviçre'deki pek çok küçük Kantonun ana ekonomik faaliyeti, özellikle Gotthard güzergahı üzerinde mal taşımacılığıdır. Bunun dışında tarım, kereste ve bazı tekstil üretimi bu bölge için önemliydi.\nPolitik olarak Orta İsviçre, muhafazakar Katoliklerin egemenliğindeydi. Luzern Kanton'u, Luzern Şehri sayesinde Orta İsviçre'nin en liberal Kanton'u iken, Uri, Schwyz, Obwalden, Nidwalden, Glarus ve Zug gibi daha küçük Kantolar daha muhafazakar olup, yerel üst sınıflar tarafından yönetiliyordu.\nSchwyz, 1830'larda neredeyse ikiye bölünecekti, çünkü Kanton'un dış bölgeleri eşitlik ve siyasi katılım talep ediyordu. İç Schwyz, Tagsatzung (İsviçre'nin \"hükümeti\") askerleri tarafından işgal edildikten sonra bu talepleri kabul etti ve Schwyz tek bir Kanton olarak kaldı."
 dufour.914.t: "Yeni Sayfalar Yayınlandı: Ticino"
 dufour.914.d: "Daha fazla sayfa yayınlandı. Bu sefer odak, İsviçre'nin güneyindeki en uzak Kanton olan Ticino'ya yerleştirildi."
 dufour.914.f: "Ticino, İsviçre Konfederasyonu'nun İtalya'daki tek kalan mülküdür. 15. ve 16. yüzyıllarda fethedilen bu bölge, eski yerler (Kantonlar) tarafından yönetiliyordu ve Helvetik Cumhuriyet'in kurulmasına kadar devam etti. Ancak 1803'ten itibaren tam teşekküllü bir Kanton olmuştur.\nTicino'nun baskın ekonomik sektörleri tarım ve kerestecilikti. İpek üretimi de kârlı bir işti. İsviçre'nin başka bölgelerinde yetişmeyen tarım ürünleri burada yetiştirilebiliyordu: kestane, tütün, ipek ve çeşitli meyveler gibi.\n1830'da Ticino, liberal bir anayasaya sahip ilk Kantonlardan biriydi. Ancak Kanton'daki siyasi durum karışıktır, çünkü liberaller devleti merkezileştirmeyi isterken, muhafazakarlar bölgesel özerklikten yanadır."
 dufour.915.t: "Yeni Sayfalar Yayınlandı: Bern ve Fribourg"
 dufour.915.d: "Daha fazla sayfa yayınlandı. Bu sefer Bern ve Fribourg Kantonları'na odaklanıldı."
 dufour.915.f: "Hem Bern hem de Fribourg Kantonu'nun Fransızca ve Almanca konuşan bölgeleri vardır. Bern, büyük bir Kanton iken, Fribourg çok daha küçüktür. Bern, Jura dağlarından Alp Dağları'na kadar uzanır. Fribourg ise Bern'in batısında yer almakta ve Gruyère gibi ünlü peynirlerin üretildiği kasabalara ev sahipliği yapmaktadır.\nBern Kanton'u çoğunlukla tarım tarafından egemenken, saatçilik Neuchâtel'den Bernese Jura'ya yayılmaya başlamıştır. Umarız sanayileşme yakında Kanton'un gelişmesine yardımcı olur.\nPolitik olarak, Bern uzun süre şehrin Patriklerinin hakimiyetindeydi ama 1830'larda Kantonun daha küçük kasabalarından gelen liberaller, Bern halkı ve kırsal nüfusun haklarını dengeleyen yeni bir anayasa hazırladılar.\nFribourg, özellikle tahıl üretimi ve peynir üretimiyle tarımın egemen olduğu bir Kanton'dur. Gruyère peynirleri özellikle ünlüdür.\nPolitik olarak, Fribourg, muhafazakar Patriklerin ve Kilise'nin egemenliğindeydi. 1831'de yeni bir anayasa yayınlansa da, Kanton hala muhafazakar kalmış ve seçimlerde muhafazakarlar hala çoğunluğu elde etmiştir."
 dufour.916.t: "Yeni Sayfalar Yayınlandı: Zürich ve Aargau"
 dufour.916.d: "Daha fazla sayfa yayınlandı. Bu sefer odak Zürich ve Aargau'ya yerleştirildi."
 dufour.916.f: "Zürich ve Aargau, İsviçre'nin kuzeyinde, büyük ölçüde nispeten düz olan Mittelland (orta toprak) bölgesinde yer almaktadır. Her iki Kanton da hızla sanayileşiyor ve yakında sanayi devlerinin ortaya çıkması mümkün.\nZürich, eski Kantonlardan biridir ve uzun süre şehrin kendisi tarafından yönetilmiştir. Zürich, mekanize tekstil sanayisinin yanı sıra makine sanayisinin de merkezidir. Birçok fabrika nehirlerin kenarında yer almakta ve bu nehirlere bağlı olarak enerji temin etmektedir.\nPolitik olarak, Zürich uzun süre Şehir'in Patriklerinin egemenliğindeydi, ancak 1830/31'de kırsaldan gelen halk, yeni bir anayasayı kabul ettirerek bu durumu değiştirdi. Sonraki seçimlerde liberaller ve radikaller çoğunluğu elde etti ve şu anda Zürich'deki politikayı domine etmektedir.\nAargau, Helvetik Cumhuriyeti dönemine kadar diğer Kantolar tarafından yönetiliyordu. Artık tam bir Kanton olarak Aargau hızla sanayileşiyor, özellikle tekstil fabrikalarıyla. Aargau'nun birçok nehri, fabrikaların su enerjisinden faydalanmasına olanak sağlamakta ve böylece pek çok dağınık fabrika kurulmuştur.\nAargau, Zürich ve Bern Kantolarına karşı bir denge unsuru olarak görülüyordu ve 1814/15'te tam bir Kanton olma yolunda neredeyse başarılı olamayacaktı. 1815'ten sonra bile Aargau, diğer Kantoların aksine oldukça liberal kalmıştır. 1831'de kabul edilen yeni anayasa, halkın daha fazla hakkını güvence altına aldı. Hükümet, Katolik nüfusun devletin kiliseye yönelik artan denetimine karşı gösterdiği direnişi, isyan eden bölgeleri işgal ederek yanıtladı."
 dufour.917.t: "Yeni Sayfalar Yayınlandı: Vaud ve Valais"
 dufour.917.d: "Daha fazla sayfa yayınlandı. Bu sefer odak Vaud ve Valais'a yerleştirildi."
 dufour.917.f: "Valais, İsviçre'nin güneyinde büyük bir vadidir ve büyük ölçüde Alpler tarafından ülkenin geri kalanından ayrılmıştır. Rhône Nehri, vadiden geçer ve sonra Lac Léman'a dökülür. Gölün kuzey kıyısı Vaud'a aittir, ancak Kanton, Cenevre ve Alpler'den Jura'ya kadar uzanır.\nVaud hala tarım tarafından egemen olmasına rağmen, 1826'dan itibaren liberaller sanayinin büyümesini sağlamak için değişiklikler yapmaya başladı. Zaman gösterecek, Vaud bir tarım Kanton'u olarak kalacak mı yoksa sanayinin merkezi mi olacak.\nNapolyon'un yenilgisinin ardından, diplomatik beceri sayesinde Vaud Kanton'u onaylandı. Ancak karşılığında, Kanton daha muhafazakar bir anayasayı kabul etmek zorunda kaldı. Otoriter yönetim sayesinde liberaller güç kazandı ve 1830'da yeni bir anayasa hazırlayarak kabul ettirdi. Bu arada radikaller de güç kazandı ve demokratikleşme sürecini teşvik etmeye çalıştı.\nValais, tarım ve kırsal nüfus tarafından yönetilmektedir. Önemli bir sanayi yoktur ve dış bağlantılar sınırlıdır.\nValais'teki ana siyasi çatışma, Almanca konuşan üst Valais ile Fransızca konuşan alt Valais arasındaki farktır. Alt Valais daha kalabalık olmasına rağmen, üst Valais Kanton'un hâkim kısmı olmuştur. Soru şu, alt vadinin liberalleri ve radikalleri, Valais'i demokratikleştirme yolunda adım atabilir mi, yoksa eski güçler iktidarlarını sürdürebilir mi?"
 dufour.920.t: "Sesten, Yaban Keçisi'nin İsviçre'ye Geri Getirilmesi Talep Ediliyor"
 dufour.920.d: "St. Gallen'deki \"Walhalla\" otelinin sahibi olan otelci Robert Mader, dağ yaban keçisini İsviçre'ye geri getirmeyi öneriyor. St. Gallen'de, yaban keçilerini yetiştirip daha sonra doğaya salmak için bir kafes hazırlayacağı bir hayvan parkı kurmayı teklif ediyor."
 dufour.920.f: "\"Yaban keçisi, İsviçre'nin ulusal simgesidir. Onu geri getirmeliyiz!\""
 dufour.920.g: "Yaban keçisini geri getireceğiz!"
 dufour.920.h: "Ne kadar zaman kaybı!"
