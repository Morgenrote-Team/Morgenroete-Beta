 dufour.2100.t: "Martin Disteli - Karikatürist"
 dufour.2100.d: "[SCOPE.sCharacter('character_1_scope').GetFullName], Olten'den bir Ressam ve Karikatürist, liberal davaya oldukça ilgi duymaktadır. Politik Karikatürleri, Liberaller için büyük bir fayda sağlayabilir, bu yüzden belki de onu bir Ajitatör olarak kullanmak daha faydalı olacaktır?"
 dufour.2100.f: "\"Sinirli Katolik papazlarla ilgili başka bir karikatür ister misiniz? Oh, eminim istersiniz!\""
 dufour.2100.g: "Liberal dava, iyi Karikatürlere ihtiyaç duyar!"
 dufour.2100.h: "O bir Ressam!"
