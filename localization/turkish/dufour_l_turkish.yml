 je_dufour_carte_dufour: "İsviçre'nin Topografik Haritası"
 je_dufour_carte_dufour_reason: "1822'den itibaren arazi ölçümü İsviçre Konfederasyonu'na ait bir konu olmuştur ve Kantonlara ait değildir. General Dufour, İsviçre'nin haritasını birleştirilmiş standartlara göre yapmakla görevlendirilmiştir. Bu uzun bir zaman alacak ve biraz maliyetli olacaktır, ancak İsviçre'nin gelişmesine yardımcı olacaktır."
 je_dufour_carte_dufour_goal: "Ölçümler tamamlandı ve harita yayınlandı."
 dufour_creating_carte_dufour_modifier: "Carte Dufour Yapılıyor"
 dufour.900.t: "Carte Dufour'un Yayınlanması"
 dufour.900.d: "Yıllarca süren yoğun çalışmaların ardından, İsviçre'nin topografik haritası nihayet tamamlandı ve 25 sayfa ya yayımlandı ya da kısa süre içinde yayımlanacak."
 dufour.900.f: "Sonunda, Carte Dufour'un ilk baskısını görebiliyorsunuz. İnce çizgiler dağları, şehirleri, hatta evleri gösteriyor. Daha önce böyle bir hassas İsviçre haritası hiç var olmamıştı!\n\n#b Tarihsel olarak#! Dufour ve ekibi 1832'den 1865'e kadar harita üzerinde çalıştı. İlk iki sayfa 1845'te yayımlandı ve 25 sayfanın sonuncusu 1865'te yayımlandı. Topografik harita, 1:100.000 ölçekli bir baskı süreciyle basıldı. İlginç bir şekilde, Dufour modern İsviçre'nin ilk generaliydi ve 1848'deki İsviçre iç savaşında (Sonderbundskrieg) İsviçre ordusunu yönetti.\n\n#b Bugün#! Carte Dufour, Zürich'teki Schweizer Landesmuseum'da bulunmaktadır. Ancak harita, İsviçre'nin birçok diğer ulusal haritasıyla birlikte çevrimiçi olarak da bulunabilir."
 dufour.900.g: "Dufour için bir dağa isim verelim!"
