 mfe_industry_events.1.t:0 "Demiryolu Şirketi Ortaya Çıkıyor"
 mfe_industry_events.1.d:0 "Bağlantıları olan bir politikacı, [SCOPE.sCharacter('rich_dude').GetFullName], yeni bir demiryolu şirketini finanse etmek istiyor, ancak [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] bu yeni teklifi desteklemiyor."
 mfe_industry_events.1.f:0 "\"Demiryolu ateşi tüm dünyayı kasıp kavuruyor, para kazanmak için bolca fırsat var, ama harekete geçmeli, hem de hızlıca. Ne dersiniz?\""
 mfe_industry_events.1.a:0 "[SCOPE.sCharacter('rich_dude').GetFullName]’in işine devam etmesine izin ver"
 mfe_industry_events.1.b:0 "Her türlü girişimi engelle"
 mfe_industry_events.1.c:0 "Çabalarını sübvanse et"
 mfe_industry_events.2.t:0 "Başarılı Demiryolu Şirketi"
 mfe_industry_events.2.d:0 "[SCOPE.sState('railway_state').GetName]’deki yeni demiryolları yerel halk arasında büyük bir başarı elde etti ve tamamen benimsendi."
 mfe_industry_events.2.f:0 "\"Eskiden [SCOPE.sState('railway_state').GetName]’den [ROOT.GetCountry.GetCapital.GetName]’e gitmek üç saat sürerdi, ama bu yeni hatlar yolculuk süresini yarıya indirdi.\""
 mfe_industry_events.2.a:0 "Harika!"
 mfe_industry_events.3.t:0 "Demiryolu Şirketi Zor Durumda"
 mfe_industry_events.3.d:0 "Borsadaki ani değişiklikler [SCOPE.gsInterestGroup('ig_industrialists').GetName] üzerinde baskı yarattı, sermaye kaynaklarını kuruttu ve [SCOPE.sState('railway_state').GetName]’deki aşırı genişlemiş demiryolu şirketleri batıyor."
 mfe_industry_events.3.f:0 "\"Elbette basın bu durumdan faydalanıyor – [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] üyeleri tarafından her gün sefaletimizle alay eden makaleler yazılıyor – bir şeyler yapılmalı.\""
 mfe_industry_events.3.a:0 "Demiryollarını sübvanse et!"
 mfe_industry_events.3.b:0 "[SCOPE.gsInterestGroup('ig_industrialists').GetName] serbest piyasa isteyenlerdi..."
 subsidize_rail_state_tt:0 " [SCOPE.sState('railway_state').GetName]’de Demiryollarını sübvanse etmeye başla"