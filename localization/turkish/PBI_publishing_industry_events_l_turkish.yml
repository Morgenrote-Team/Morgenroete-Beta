 pbi_publishing_industry_events.100.d.3: "[ROOT.GetCountry.GetName]’da, [SCOPE.gsInterestGroup('target_ig_1').GetName]’i destekleyen gazeteler, [SCOPE.gsInterestGroup('target_ig_2').GetName]’i destekleyen gazeteler ve hatta [SCOPE.gsInterestGroup('target_ig_3').GetName] için gazeteler mevcut; vatandaşlar kendilerine en uygun gazeteyi seçebilir."
 pbi_publishing_industry_events.100.d.4: "[ROOT.GetCountry.GetName]’da, [SCOPE.gsInterestGroup('target_ig_1').GetName]’i destekleyen gazeteler ve [SCOPE.gsInterestGroup('target_ig_2').GetName]’i destekleyen gazeteler mevcut; vatandaşlar kendilerine en uygun gazeteyi seçebilir."
 pbi_publishing_industry_events.100.f: "'Dünyadaki en büyük hak, yanılma hakkıdır. Bu hakkı kullanırken insanlar tüm konular ve kişiler hakkında sınırsız düşüncelerini ifade etme hakkına sahiptir, sadece bu hakkın kötüye kullanımı için sorumlu olurlar.'\nWilliam Randolph Hearst"
 pbi_publishing_industry_events.100.a: "Seçenek olması güzel"
 pbi_publishing_industry_events.100.b: "İnsanlar gazetelerin kendileri için konuşmasına razı"
 pbi_publishing_industry_events.105.t: "Hükümet Halkla İlişkiler Gazetesi"
 pbi_publishing_industry_events.105.d.1: "[SCOPE.sCharacter('target_character_2').GetFullName], [SCOPE.sParty('target_party_2').GetName]’den, [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.sParty('target_party_1').GetName] gazetesini [SCOPE.sState('target_state').GetName]’de, sahibi [SCOPE.sCharacter('target_character_1').GetFullName] olan, hükümet PR gazetesi gibi olmakla eleştirdi."
 pbi_publishing_industry_events.105.d.2: "[SCOPE.sCharacter('target_character_2').GetFullName], [SCOPE.gsInterestGroup('target_ig_2').GetName]’den, [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.sParty('target_party_1').GetName] gazetesini [SCOPE.sState('target_state').GetName]’de, sahibi [SCOPE.sCharacter('target_character_1').GetFullName] olan, hükümet PR gazetesi gibi olmakla eleştirdi."
 pbi_publishing_industry_events.105.d.3: "[SCOPE.sCharacter('target_character_2').GetFullName], [SCOPE.sParty('target_party_2').GetName]’den, [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.gsInterestGroup('target_ig_1').GetName] gazetesini [SCOPE.sState('target_state').GetName]’de, sahibi [SCOPE.sCharacter('target_character_1').GetFullName] olan, hükümet PR gazetesi gibi olmakla eleştirdi."
 pbi_publishing_industry_events.105.d.4: "[SCOPE.sCharacter('target_character_2').GetFullName], [SCOPE.gsInterestGroup('target_ig_2').GetName]’den, [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.gsInterestGroup('target_ig_1').GetName] gazetesini [SCOPE.sState('target_state').GetName]’de, sahibi [SCOPE.sCharacter('target_character_1').GetFullName] olan, hükümet PR gazetesi gibi olmakla eleştirdi."
 pbi_publishing_industry_events.105.f: "'Çünkü alt sınıftan üst sınıfa kadar herkesin kendi çıkarına göre davrandığı açıktır, devletin iradesi, devleti temsil eden hükümet tarafından uygulanmalıdır ve halkın hükümetin kararlarını destekleyip iş birliği yapması gerekir.'"
 pbi_publishing_industry_events.105.a: "Bu, gazeteciliğin rolüdür"
 pbi_publishing_industry_events.105.b: "Muhalefet için de bir gazete olmalı"
 pbi_publishing_industry_events.110.t: "Öncelikli Medya Hakları"
 pbi_publishing_industry_events.110.d: "[SCOPE.sCharacter('target_character').GetFullName], [SCOPE.gsInterestGroup('target_ig').GetName] üyesi, gazetesinin hükümet duyurularında öncelikli olarak yer alması gerektiğini savunuyor."
 pbi_publishing_industry_events.110.f: "'Politikalarımız, sorumsuz ve ahlaki olarak çöküntü gazeteciler üçlüsü tarafından lekelenmeden önce halka tam olarak ne yapacağımızı anlatmalıyız.'"
 pbi_publishing_industry_events.110.a: "Doğru şekilde iletmek bizim görevimiz"
 pbi_publishing_industry_events.110.b: "Böylesi kayırmacılık kabul edilemez"
 pbi_publishing_industry_events.115.t: "Gazeteler yeni yasayı destekliyor"
 pbi_publishing_industry_events.115.d.1: "[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.sParty('target_party').GetName] gazetesinin yayıncısı [SCOPE.sCharacter('target_character').GetFullName], [SCOPE.sLaw('target_law').GetName] yasasını öven makaleleri her gün yayınladı; ancak diğer gazeteler bunu abartılı buldu."
 pbi_publishing_industry_events.115.d.2: "[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.gsInterestGroup('target_ig').GetName] gazetesinin yayıncısı [SCOPE.sCharacter('target_character').GetFullName], [SCOPE.sLaw('target_law').GetName] yasasını öven makaleleri her gün yayınladı; ancak diğer gazeteler bunu abartılı buldu."
 pbi_publishing_industry_events.115.f: "'Eğer bu yasa tasarısında bir sorun varsa, muhalefetin beyefendilerinin bu tasarının önemini doğru şekilde anlamasını beklememek gerekir'"
 pbi_publishing_industry_events.115.a: "Kamuoyu bizim yaptığımız gibidir"
 pbi_publishing_industry_events.115.b: "Basının rolü, tasarıdaki sorunları göstermek olmalıdır"
 pbi_publishing_industry_events.120.t: "Siyasetçi Skandalı"
 pbi_publishing_industry_events.120.d: "Bazı gazeteler, [SCOPE.gsInterestGroup('target_ig').GetName] üyesi [SCOPE.sCharacter('target_character').GetFullName]’in skandalını haber yapınca, [SCOPE.sCharacter('target_character').GetSheHe] bu makalelerin doğru olmadığını ve iftira içerdiğini iddia ediyor."
 pbi_publishing_industry_events.120.f: "'[SCOPE.sCharacter('target_character').GetLastName]’in, saygın konumuna gelmeden önce kimlerle ilişkide olduğuna bakınca, kaçırma ve cinayet olaylarına karışmış olması şaşırtıcı değil. Aslında bu gazete, o günlerde [SCOPE.sCharacter('target_character').GetHerHim]’i iyi tanıyan kişilerden biriyle konuşabildi. Şaşırtıcı detaylar bir sonraki sayımızda!'"
 pbi_publishing_industry_events.120.a: "Bundan faydalanmalıyız"
 pbi_publishing_industry_events.120.b: "Bu tüm [SCOPE.gsInterestGroup('target_ig').GetName] için bir problem!"
 pbi_publishing_industry_events.125.t: "Bir gazete kimin için?"
 pbi_publishing_industry_events.125.d: "[SCOPE.sState('target_state').GetName] halkı, gazetelerin sadece hükümet için uygun olanı yazdığına inanıyor."
 pbi_publishing_industry_events.125.f: "'[SCOPE.sState('target_state').GetName]'da yayınlanan birçok gazete var ve [SCOPE.sCharacter('target_character').GetFullName] hepsinde hissedar ve gazeteye ne konacağını belirliyor. Gazeteler sadece [SCOPE.sCharacter('target_character').GetHerHis] isteğine göre makale yayınlayabilir. Bu anlamda [SCOPE.sState('target_state').GetName]'da sadece bir gazete var.'"
 pbi_publishing_industry_events.125.a: "Bilgi, kontrol edilmediği sürece anlamlı değildir"
 pbi_publishing_industry_events.125.b: "Onlar verilenle asla yetinmezler"
 pbi_publishing_industry_events.200.t: "Noel Baba var mı?"
 pbi_publishing_industry_events.200.d: "Sevgili Editör,\nBen 8 yaşındayım. Bazı küçük arkadaşlarım Noel Baba yok diyor.\nLütfen bana gerçeği söyleyin: Noel Baba var mı?\nVirginia O'Hanlon"
 pbi_publishing_industry_events.200.f: "Evet, Virginia, Noel Baba var. O, sevgi, cömertlik ve adanmışlık gibi kesinlikle var; ve sen de biliyorsun ki bunlar hayatında en yüksek güzellik ve sevinci verir.\nFrancis Pharcellus Church (The Sun)"
 pbi_publishing_industry_events.200.a: "Sanırım gazeteler bazen güzel şeyler de yazar"
 pbi_publishing_industry_events.200.b: "Sevgi ve samimiyet bir ülkeyi güçlü yapmaz"
 pbi_publishing_industry_events.205.t: "Yetkin Gazete penny press’i eleştiriyor"
 pbi_publishing_industry_events.205.d: "[ROOT.GetCountry.GetName]'daki prestijli bir gazete, [SCOPE.sState('target_state').GetName]'in penny press gazetesini, okuyucuları sansasyonel yanlış bilgilerle çektiği için eleştirdi."
 pbi_publishing_industry_events.205.f: "'Ülkemizin popüler basınının kibri giderek artıyor. Yalnızca politikacılar ve sosyete hakkında dedikodu, skandal suçlar ve davalar yayınlıyorlar. Üstelik bu makalelerin çoğu, gerçek bir habercilik veya bilgiye dayanmadan uyduruluyor!'"
 pbi_publishing_industry_events.205.a: "Gerçekten üzücü"
 pbi_publishing_industry_events.205.b: "En azından halka okuma öğretebilirler"
 pbi_publishing_industry_events.210.t: "İncitilmiş onur"
 pbi_publishing_industry_events.210.d: "[SCOPE.sState('target_state').GetName]'in penny press gazeteleri, [SCOPE.sCharacter('target_character').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('target_character').GetFullName]’in skandalını haber yapıyor; [SCOPE.sCharacter('target_character').GetSheHe] ise bunun yanlış ve iftira olduğunu iddia ederek yayının kaldırılmasını talep ediyor."
 pbi_publishing_industry_events.210.f: "'[SCOPE.sCharacter('target_character').GetLastName]’in, saygın konumuna gelmeden önce kimlerle ilişkide olduğuna bakınca, kaçırma ve cinayet olaylarına karışmış olması şaşırtıcı değil. Aslında bu gazete, o günlerde [SCOPE.sCharacter('target_character').GetHerHim]’i iyi tanıyan kişilerden biriyle konuşabildi. Şaşırtıcı detaylar bir sonraki sayımızda!'"
 pbi_publishing_industry_events.210.a: "Bu durumda, haberin doğruluğu sorun değil"
 pbi_publishing_industry_events.210.b: "[SCOPE.sCharacter('target_character').GetLastName]'in onuru geri kazandırılmalı"
 pbi_publishing_industry_events.215.t: "Gazete bir patchwork gibi"
 pbi_publishing_industry_events.215.d: "[SCOPE.sState('target_state').GetName]'in penny press gazetelerinin çoğunda makale intihali yaygın."
 pbi_publishing_industry_events.215.f: "'[SCOPE.sState('target_state').GetName] gazetecileri aç hyenalar gibidir. Birkaç okuyucu kazanacağını düşündükleri bir makaleyi bulurlar ve gazetelerinde yayınlarlar. İntihal edilmemiş bir makale bulmak zordur. Hatta bir gazete başka bir gazeteden direkt bir köşe yazısı yayınlamıştır!'"
 pbi_publishing_industry_events.215.a: "Makalenin ödülü onu yazan kişiye verilmelidir"
 pbi_publishing_industry_events.215.b: "İyi bir makale yayımlanmalıdır"
 pbi_publishing_industry_events.220.t: "Çok Heyecan Verici"
 pbi_publishing_industry_events.220.d: "Acımasız cinayetler, çirkin aşık kavgaları ve doğruluğu belirsiz skandallar. [SCOPE.sState('target_state').GetName] halkı, penny press’e her gün düşen radikal hikayelere hayran."
 pbi_publishing_industry_events.220.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_publishing_industry_flavor_220')]"
 pbi_publishing_industry_events.220.f.1: "'Eski bir pavilyonda son derece şaşırtıcı bir keşif yapıldı. Söz konusu evin sahibi tadilat için bir müteahhit tuttu. İşçiler duvarın bir kısmını kaldırdıklarında şaşırdılar. Büyük bir bodruma açılan bir geçit ortaya çıktı. İşçiler çekinerek bodruma girdiler. Yanan meşale ışığı, iki insan bedeninin kalıntılarını açıkça gösteriyordu. Neredeyse iki yüzyıl öncesine ait giysiler içindeydiler. Komşu sakinler çeşitli bilgiler sağladı. Ancak şu anda bu iki kişinin bodrumda mı bırakıldığını veya başka bir yerde öldürülüp buraya mı taşındığını belirlemek mümkün değil.'"
 pbi_publishing_industry_events.220.f.2: "'Normalde sessiz olan kasaba, o cumartesi öğleden sonra oldukça gergindi. Sözde, yedi yaşındaki bir kıza karşı korkunç bir cinayetin söylentileri vardı. Öğleden sonra saat 1:30 civarında, üç çocuğa bir avukat ofisinde genç bir memur yaklaştı. Adam kıza bir madeni para teklif etti ve onu köye giden boş bir yola veya eski bir yola götürmeye davet etti. Diğer iki çocuk da madeni para aldı ve adamı takip etmeme sözü verdi. Ancak kız adamla gitmek istemedi. Adam kızın elini tutup sürükleyerek ağlamaya zorladı. Saat yedi veya sekiz civarında kız hâlâ görünmüyordu ve komşular hakkında konuşmaya başladı. Çiftliğe girdikten kısa süre sonra, kayıp kızın başını yerde buldular. Keskin bir bıçakla kesilmiş olduğu belliydi ve yüzü ağızdan kulağa ve sol şakakta kesiklerle kaplıydı. Bu korkunç bir manzaraydı. Parçalanmış, uzuvsuz bedenin her kısmı çiftliğe serpilmişti.'"
 pbi_publishing_industry_events.220.f.3: "'Bir işçi, karısına kötü muamele etmekle suçlandı. Adam, birkaç gece önce uzun bir at kırbacıyla eve geldi ve yatağında yatan karısını şiddetle dövdü. Kadın yedi aylık hamileydi ve direnemedi. Kırbacı neredeyse onun hayatına mal oluyordu. Adam yatağa çıktı ve üç kaburga kırdı. Kadın ciddi yaralarla hastaneye kaldırıldı. İlk duruşmada, sanık bunun karısının içki alışkanlığı yüzünden olduğunu fısıldadı. Hakim, bir haftalık göz hapsi cezası verdi.'"
 pbi_publishing_industry_events.220.f.4: "'Yirmi üç yaşındaki bir köylü, ebeveynlerini, beş kardeşini ve bir hizmetçiyi benzersiz bir vahşetle katletti. İtirafı yalnızca cinayet nedenini ve yöntemini açıklıyordu, pişmanlık belirtileri yoktu. Altı fit uzunluğunda altın bir levye ile kardeşlerini teker teker öldürdü. Sonra babasının sırası geldi. Babasını evin ön kapısından çıkar çıkmaz öldürdü, cesedini arabaya koyup evin arkasına taşıdı ve kan lekelerini gizlemek için toprağı kazdı. Daha sonra odasına gidip küçük kardeşlerini bitirdi. Annesi baltayla vuruldu ve yere düştü. Kız kardeşi yardım etmek için yataktan atladı, ancak bıçakla kesildi ve balta ile öldürüldü. Son olarak hizmetçinin odasına koştu ve karanlıkta tahmin ederek iki kez baltayı salladı. Hizmetçi sessizce öldü. Suçlu mahkemeden şaşırtıcı bir soğukkanlılıkla çıktı.'"
 pbi_publishing_industry_events.220.f.5: "'Reed Caddesi sakini John Vaughty, ebeveynlerine karşı sarhoş ve şiddetli davranmakla suçlandı. John, sorunlu 38 yaşında bir adamdı - babası 93, annesi 88 yaşındaydı - ve ebeveynlerine defalarca sarhoş ve şiddetli davranmıştı. Annesi oğluna acıyordu ve onu hapse koymaya gönlü el vermiyordu.'"
 pbi_publishing_industry_events.220.f.6: "'Bayan Townsend, çocukların kafasını yıkamak için brendi almak istediğinde kocasından iki şilin istediğinde, kocasına güvenmedi ve talebini reddetti. Brendi alırsa, bunun çocukların kafasına gitmeden önce kendi ağzına koyacağını düşündü. Çift hemen tartışmaya başladı ve öfkeli eş kocayı evden kovdu. Koca gece eve döndüğünde, karısını tarif edilemez bir düzensizlik içinde buldu. Şiddetle suçlayınca, Bayan Townsend bir maşa alıp kocasının kafasına vurdu. Koca da karşılık vererek karısını dövdü. Karar, hem kocanın hem karısının suçlu olduğuydu'"
 pbi_publishing_industry_events.220.f.7: "'Susan Burke - Bayan No Lodging - üç aydır evsizdi. Güvenlik hakimi, artık bir eve sahip olması gerektiğini söyledi ve altı aylığına bir ev verdi.'"
 pbi_publishing_industry_events.220.a: "Bu gürültü bizim gücümüz"
 pbi_publishing_industry_events.220.b: "Mütevazılığımızı geri kazanmalıyız"
 pbi_publishing_industry_events.225.t: "Astronomik Atılım"
 pbi_publishing_industry_events.225.d: "[SCOPE.sState('target_state').GetName]'in penny press gazetesi The Sun, Afrika Ümit Burnu’ndaki bir gözlemevinin tamamen yeni bir prensiple çalışan dev bir teleskop kullanarak şaşırtıcı bir keşif yaptığını bildiriyor."
 pbi_publishing_industry_events.225.f: "'Bu dev teleskopu kullanarak John Herschel, Ay'da var olan şeyleri net bir şekilde görebildi. Sonuç olarak, Ay'da yaşamın var olduğuna ikna oldu ve yaşamın var olduğu evrenin yasalarını belirleyebildi.'"
 pbi_publishing_industry_events.225.a: "Yalnız değildik!"
 pbi_publishing_industry_events.226.t: "İnsan Yarasa Adı Verildi"
 pbi_publishing_industry_events.226.d: "[SCOPE.sState('target_state').GetName]'in penny press gazetesi The Sun, ay keşifleriyle ilgili takip haberi yayınladı ve halk şaşırtıcı ayrıntılardan etkilendi."
 pbi_publishing_industry_events.226.f: "'Aniden, büyük kanatlı yaratıkların yavaşça uçurumdan düzlüğe indiğini gördüm. Kanatlarının yarasalarınkine benzediğini net bir şekilde görebiliyordum. Kanatlar saydam bir zarla kaplı, yuvarlak ve sırtlarından çıkıyordu; gerçekten muhteşem bir yapıydı. Bazıları birbirine bakıyor ve ellerini kollarını genişçe hareket ettiriyordu; bu, onların jestlerle iletişim kurduğunu açıkça gösteriyordu. Astronomlar bu beklenmedik yeni yaratığa Vespertilio homo, yani insan yarasa adını verdiler. Yaratık hem erkek hem de kadındı ve alışkanlıklarını detaylı gözlemlemeye devam ettik. Masum ve mutlu yaratıklar olduklarından şüphemiz yok, ama eğlenme biçimleri dünyasal görgü kurallarına göre fazla ölçüsüz.'"
 pbi_publishing_industry_events.226.a: "Bu hikâye doğruysa, şimdiye kadar gördüğüm en muhteşem şey!"
 pbi_publishing_industry_events.227.t: "Doğru veya yanlış, fark etmez"
 pbi_publishing_industry_events.227.d: "Ay'da keşfedilen yaratık haberi, [SCOPE.sState('target_state').GetName]'in penny press gazetesi The Sun tarafından yayımlandı ve artık ABD genelinde bilim insanları ve entelektüeller arasında konuşulan bir konu oldu."
 pbi_publishing_industry_events.227.f: "'Entelektüeller ve bölgesel okuyucular, New York’tan gelen postayı gün be gün eşi görülmemiş bir heyecan ve güvenle beklediler. John Herschel’in büyük keşfini okudunuz mu? İnsanların Ay’da bulunduğunu biliyor muydunuz? Gittiğim her yerde aynı soru soruluyordu. O dönemde herkesin ilgisini çeken bir konuydu. Kimse bunun doğru olup olmadığını düşünmedi ya da söylemedi.\nYale Üniversitesi öğrencisi'"
 pbi_publishing_industry_events.227.a: "Yalan olsa bile, bu muhabire kredi verilmeli"
 pbi_publishing_industry_events.230.t: "George Washington’un dadısı"
 pbi_publishing_industry_events.230.d: "[SCOPE.sState('target_state').GetName] gazeteleri, George Washington’un dadısı olduğunu iddia eden siyah bir kadın olan Joyce Hess hakkında yazıyor."
 pbi_publishing_industry_events.230.f: "'Bu yaşlı kadın tam 161 yaşında. Bu konuda hiç şüphe yok. 500 yaşında olduğunu söyleseydi bile kimse sorgulamazdı. Ayrıca, gösterinin tanıtımcısı P.T. Barnum, bize kanıt olarak onun köle olduğu dönemde aldığı teslim fişini gösterdi. 1727 tarihliydi ve Joyce Hess’in George Washington’un babası Augustine Washington tarafından elli dört yaşında satın alındığı yazıyordu.'"
 pbi_publishing_industry_events.230.a: "Dünya sürprizlerle dolu!"
 pbi_publishing_industry_events.235.t: "Loch Ness Canavarı"
 pbi_publishing_industry_events.235.d: "[SCOPE.sState('target_state').GetName], [SCOPE.sState('target_state').GetOwner.GetName]’de Loch Ness’te tanımlanamayan bir yaratığın görüldüğü bildirildi ve manşetlere taşındı."
 pbi_publishing_industry_events.235.f: "'Balnain sakini D. McKenzie, suyun çalkalandığı, bir kütük veya ters çevrilmiş bir tekne şeklinde bir nesne gördü; yavaşça hareket edip hızlanarak suya kayboldu.'"
 pbi_publishing_industry_events.235.a: "Dünya sürprizlerle dolu!"
 pbi_publishing_industry_events.236.t: "Loch Ness’te Garip Görüntü"
 pbi_publishing_industry_events.236.d: "[SCOPE.sState('target_state').GetName], [SCOPE.sState('target_state').GetOwner.GetName]’de Loch Ness’te tanımlanamayan bir yaratığın görüldüğü bildirildi ve manşetlere taşındı."
 pbi_publishing_industry_events.236.f: "'Abriachan’dan taş ustası Alexander MacDonald, o gün sahile yaklaşık 50 yard uzaklıkta Loch Ness’ten çıkan büyük, kaslı ayaklı bir hayvan gördü.'"
 pbi_publishing_industry_events.236.a: "Dünya sürprizlerle dolu!"
 pbi_publishing_industry_events.237.t: "Cerrahın fotoğrafı"
 pbi_publishing_industry_events.237.d: "[SCOPE.sState('target_state').GetName], [SCOPE.sState('target_state').GetOwner.GetName]’de Loch Ness’te tanımlanamayan bir yaratığın fotoğrafları manşetleri süslüyor."
 pbi_publishing_industry_events.237.f: "'Loch Ness’teki tanımlanamayan yaratık gözlemiyle ilgili tartışmalar uzun süredir devam ediyordu, ancak Londra’daki jinekolog Robert Kenneth Wilson tarafından çekilen bu fotoğraf tartışmalara son veriyor ve Loch Ness canavarının hâlâ orada yaşadığının tartışılmaz kanıtını sunuyor'"
 pbi_publishing_industry_events.237.a: "Dünya sürprizlerle dolu!"
 pbi_publishing_industry_events.240.t: "Cottingley Perileri"
 pbi_publishing_industry_events.240.d: "[SCOPE.sState('target_state').GetName], [SCOPE.sCountry('target_country').GetName]’deki Cottingley köyünde çekilen fotoğraflar, bir perinin küçük bir kızla oynadığını gösteriyor."
 pbi_publishing_industry_events.240.f: "'[SCOPE.sCountry('target_country').GetName]’de çekilen olağanüstü bir fotoğraf, Teozofik Dernek aracılığıyla yayımlandı ve bir perinin küçük bir kızla oynadığını açıkça gösteriyor. Dernek, fotoğrafın doğruluğunu onaylaması için bir fotoğraf uzmanına başvurdu ve fotoğrafın sahte olmadığı sonucuna ulaşıldı. Roman yazarı Arthur Conan Doyle, bir spiritist dergide fotoğrafın psişik fenomenlerin açık kanıtı olduğunu iddia etti.'"
 pbi_publishing_industry_events.240.a: "Dünya sürprizlerle dolu!"
 pbi_publishing_industry_events.245.t: "Zeki Hans"
 pbi_publishing_industry_events.245.d: "[SCOPE.sState('target_state').GetName], [SCOPE.sCountry('target_country').GetName]’de matematik ve takvim hesaplamaları yapabilen bir at, şehrin konuştuğu konu."
 pbi_publishing_industry_events.245.f: "'Hans sorar: \"8’i Salı kabul ederse, takip eden Cuma hangi tarihtir?\" ve 11 kez toynak vurarak cevap verir. Alman Eğitim Kurulu, veteriner, hayvanat bahçesi müdürü ve süvari subayı dahil 13 üyeli bir inceleme komitesi kurarak bu şaşırtıcı atı araştırdı. Komite, Hans’ın performansında herhangi bir hile kullanılmadığı sonucuna vardı.'"
 pbi_publishing_industry_events.245.a: "Dünya sürprizlerle dolu!"
 pbi_publishing_industry_events.246.t: "Bilgelik Sırrı"
 pbi_publishing_industry_events.246.d: "Psikolog Oscar Fungst, [SCOPE.sCountry('target_country').GetName]’de büyük ilgi gören Zeki Hans’ın sırlarını ortaya çıkardı."
 pbi_publishing_industry_events.246.f: "'Soruyu soran cevap bilmediğinde, Hans nadiren doğru cevabı verebiliyordu. Ayrıca, Hans’ın toynak sayısı doğru cevaba yaklaştıkça, soruyu soranın yüz ifadelerinin ve vücut duruşunun giderek gerginleştiğini ve doğru cevap anında bu gerginliğin serbest kaldığını gözlemledi. Fungst, Hans’ın cevabını soruyu soranın fiziksel ipuçlarını kullanarak verdiği sonucuna vardı.'\nHans’ın çevresindekilerin tepkilerini algılayarak gözlemcinin beklentilerine yanıt vermesi “Zeki Hans etkisi” olarak adlandırılır ve hâlâ polis köpeklerinin koku tespitinde gözlemlenmektedir."
 pbi_publishing_industry_events.246.a: "Zeki Hans gerçekten Zeki Hans’tı!"
 pbi_publishing_industry_events.250.t: "Islık Çalan Çocuk"
 pbi_publishing_industry_events.250.d: "[SCOPE.sState('target_state').GetName] gazetesinde küçük bir yazıda, doğru olmayan bir haber okuyucuları eğlendiriyor."
 pbi_publishing_industry_events.250.f: "'Vermont’taki bir çocuk yalnız çalışmaya alışkındı ve kimse etrafta olmadığını görünce ıslık çalmaya başlıyordu. Tamamen bilinçsiz ve uyurken bile ağzı, göğsü ve akciğerleri kendi başına çalışarak şaşırtıcı şekilde yüksek ve alçak bir ıslık çalabiliyordu. Annesi endişelenerek hemen harekete geçti. Başka bir çocuktan sürekli yanında olmasını ve ıslık başladığında onu vurmasını istedi.'"
 pbi_publishing_industry_events.250.a: "Dünya sürprizlerle dolu!"
 pbi_publishing_industry_events.300.t: "Gazeteciliğin Etkinliği"
 pbi_publishing_industry_events.300.d: "[ROOT.GetCountry.GetName]’de üst sınıftan alt sınıfa kadar herkes gazete okuyor. Halk, uzak ülkeler arasındaki gergin olaylardan yerel bir fahişenin tuhaf cinayetine kadar çeşitli haberleri gazeteler aracılığıyla tüketiyor."
 pbi_publishing_industry_events.300.f: "'Bu açıdan, çok alaya alınan gazete bir pratik katkı sağlamıştır: insanlara okumayı öğretmiş ve basılı kelimelerden zevk aldırmıştır. İnsanlara okumayı öğretmiş ve basılı kelimeleri okumayı hobi hâline getirmiştir.'\nEmile Zola (The Paris Newspaper)"
 pbi_publishing_industry_events.300.a: "Gazetelerin siyasi rolüne odaklanmalıyız"
 pbi_publishing_industry_events.300.b: "Gazetelerin halk için eğlence değeri büyüktür"
 pbi_publishing_industry_events.305.t: "Çığır açan matbaa"
 pbi_publishing_industry_events.305.d: "[SCOPE.sCharacter('target_character').GetFullName], [SCOPE.sCountry('target_country').GetName]’de [SCOPE.gsInterestGroup('target_ig').GetName] toplantısında tanıttığı yeni matbaanın performansı mükemmel olarak değerlendirildi."
 pbi_publishing_industry_events.305.f: "Silindirik olarak dönen baskı plakalarını besleyen ve kağıdı üzerine basan rotatif baskı, saatte 8.000’den fazla sayfa basabiliyor, geleneksel matbaalardan çok daha hızlıdır."
 pbi_publishing_industry_events.305.a: "Harika fikir"
 pbi_publishing_industry_events.305.b: "Onların yardımına ihtiyacımız yok"
 pbi_publishing_industry_events.310.t: "Gazete şirketi kurma planları"
 pbi_publishing_industry_events.310.d.1: "[SCOPE.sCharacter('target_character').GetFullName], [SCOPE.sState('target_state').GetName]’de ilk gazeteyi kurmayı planlıyor.\nGazete, [SCOPE.gsInterestGroup('target_ig').GetName] için bir gazete olacak."
 pbi_publishing_industry_events.310.d.2: "[SCOPE.sCharacter('target_character').GetFullName], [SCOPE.sCountry('target_country').GetName]’den, [SCOPE.sState('target_state').GetName]’de ilk gazetesini kurmayı planlıyor.\nBu durum, [SCOPE.sCountry('target_country').GetName] ile ilişkileri etkileyecek."
 pbi_publishing_industry_events.310.f: "'[SCOPE.sState('target_state').GetName]’de bir gazete kurma fikrini geliştirmedeki ilk motivasyonumuz, esas olarak farklı toplulukların ticari talepleriyle ilgiliydi. Bu fikrin geniş kabul görmesi, teklifimize verilen yanıtla açıkça kanıtlandı.\nThe Advertiser'"
 pbi_publishing_industry_events.310.a: "Harika fikir"
 pbi_publishing_industry_events.310.b: "Onlara konuşma platformu verilmemeli"
 pbi_publishing_industry_events.315.t: "Gazetede tartışma"
 pbi_publishing_industry_events.315.f: "'Bu gazetenin akıllı okuyucularının da katılacağına emin olduğum üzere, onların iddialarının hiçbir somut temeli yok, yalnızca bizi hedef alan yalan ve yanlış bilgiler yığını. Gazeteleri en iyi ihtimalle bir parça toz kağıdı kadar değersiz!'"
 pbi_publishing_industry_events.315.c: "Gazeteler bunu abartıyorlar sadece"
 pbi_publishing_industry_events.320.t: "Yayın yasağı"
 pbi_publishing_industry_events.320.d: "Bir mahkeme, hükümeti eleştiren iddialarda ısrar eden [SCOPE.sState('target_state').GetName] gazetesine '[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]' yayın yasağı getirdi."
 pbi_publishing_industry_events.320.f: "Hiçbir siyasi yetkileri yok ama hükümeti şakacı bir şekilde eleştirip halka ulusu felakete sürükleyecek şeytanın sözlerini fısıldıyorlar."
 pbi_publishing_industry_events.320.a: "Adalet yerini buldu"
 pbi_publishing_industry_events_320_tt.1: "[SCOPE.sState('target_state').GetName] [GetBuildingType('building_manzoni_publishing_industry').GetName] 1 yıl boyunca faaliyet göstermeyecek."
 pbi_publishing_industry_events_320_tt.2: "[SCOPE.sState('target_state').GetName] [GetBuildingType('building_manzoni_publishing_industry').GetName] 6 ay boyunca faaliyet göstermeyecek."
 pbi_publishing_industry_events.320.b: "Disiplin cezası minimumda tutulmalı"
 pbi_publishing_industry_events.325.t: "Gazete çocukları grevi"
 pbi_publishing_industry_events.325.d: "[SCOPE.sState('target_state').GetName]’deki gazete çocukları, yayıncılarından daha iyi muamele talep eden büyük bir greve başladılar."
 pbi_publishing_industry_events.325.f: "'Dostlar ve işçi arkadaşlar. Bu, insanların kalplerini sınayan bir zaman. Bu, birbirimize yapışkan gibi kenetlenmemiz gereken zamandır... Ne istediğimizi biliyoruz ve kör olsak bile bunu alacağız.'\nLouis 'Kid Blink' Baletti"
 pbi_publishing_industry_events.325.a: "Bu yanlış bilgi düzeltilmeli"
 pbi_publishing_industry_events.325.b: "Sadece bir grev, değil mi?"
 pbi_publishing_industry_events.330.t: "Öldürülen fahişeler"
 pbi_publishing_industry_events.330.d: "[SCOPE.sState('target_state').GetName] gazeteleri, genç bir fahişenin cinayetini sansasyonel şekilde haberleştiriyor ve büyük ilgi çekiyor.\nBazı gazeteler gerçek katille sahte röportajlar bile yayımladı."
 pbi_publishing_industry_events.330.f: "'23 yaşındaki fahişe Helen Jewett’in cesedi bir genelevde bulundu. Ceset yatakta üç kez balta ile dövüldükten sonra yakılmıştı.\nPolis, kurbanın son misafiri olan 19 yaşındaki Richard P. Robinson’ı şüpheli olarak tutukladı. Şüpheli suçlamaları reddediyor. Duruşma iki ay sonra yapılacak.'"
 pbi_publishing_industry_events.330.a: "İlginç"
 pbi_publishing_industry_events.331.t: "Önyargılı dava"
 pbi_publishing_industry_events.331.d: "Helen Jewett cinayetiyle tutuklanan Richard P. Robinson’un davası, [SCOPE.sState('target_state').GetName] mahkemesinde başladığında, gazeteler, işçi sınıfı kökenli Jewett’e sempati duyanlar ile fahişelerin sempatiye yer olmadığını savunanlar arasında hararetli bir tartışmaya girdi, ancak dava kısa sürede sonuçlandı."
 pbi_publishing_industry_events.331.f: "'Sunulan tüm kanıt ve ifadeler sanığın suçlu olduğunu gösterse de, hâkim jüriyi ifadeleri göz ardı etmeleri konusunda uyardı çünkü tanıklık edenlerin çoğu fahişeydi. Sonuç olarak, sanık 30 dakika içinde beraat etti!'"
 pbi_publishing_industry_events.331.a: "Buna nasıl adil bir dava denebilir?"
 pbi_publishing_industry_events.331.b: "Umudu parlak bir gencin hayatı ile bir fahişeninki aynı mı?"
 pbi_publishing_industry_events.335.t: "Toplu cinayet"
 pbi_publishing_industry_events.335.d: "[SCOPE.sState('target_state').GetName]’de [SCOPE.sState('target_state').GetOwner.GetName]’in bir banliyösünde bir dizi cinayetin failleri yakalandı ve suçların motivasyonlarıyla birlikte art arda açıklanan vahşi tanımlar büyük ilgi çekiyor."
 pbi_publishing_industry_events.335.f: "'Paris banliyösünde tarlada çalışan bir işçi, bir kadın ve beş çocuğunun cesetlerini yerden çıkardı. Kadın 30’dan fazla bıçak darbesiyle öldürülmüş, çocuklar boğazları kesilerek, boğularak ve karınları açılarak öldürülmüştü. Bu inanılmaz vahşi cinayetin faili Jean-Baptiste Tropmann adında bir mekanikti. Cinayeti, kurbanın kocasının, eşinin sadakatsiz olduğunu düşündüğü için işlediğini itiraf etti. Koca Jean-Kink kayıp ve polis hâlâ onu arıyor.'"
 pbi_publishing_industry_events.335.a: "Şeytan işi!"
 pbi_publishing_industry_events.336.t: "Halka açık idam"
 pbi_publishing_industry_events.336.d: "[SCOPE.sState('target_state').GetName]’de, [SCOPE.sState('target_state').GetOwner.GetName]’in bir banliyösünde işlenen bir dizi cinayet nedeniyle giyotinle halka açık bir idam yapıldı ve büyük bir kalabalık toplandı."
 pbi_publishing_industry_events.336.f: "'Polis, malzeme tanığı olarak izlenen kurbanın kocasını ölü buldu. Trotman, ifadesinin yalan olduğunu itiraf etti ve suçun baştan beri Jean Kink’in mal varlığını almak amacıyla işlendiğini söyledi.'"
 pbi_publishing_industry_events.336.a: "Acımaya yer yok"
 pbi_publishing_industry_events.340.t: "Telgraf suçluyu ele verdi!"
 pbi_publishing_industry_events.340.d: "[SCOPE.sState('target_state').GetName], [SCOPE.sState('target_state').GetOwner.GetName]’de, trenle kaçan bir suçlu, kaçtığı istasyonda telgraf sayesinde başarılı bir şekilde yakalandı ve bu olay büyük yankı uyandırdı."
 pbi_publishing_industry_events.340.f: "'Slough İstasyonu’ndan Paddington İstasyonu’na. Bu bölgede Salt Hill’de bir cinayet işlendi. Tanıklar, şüphelinin Londra’ya birinci sınıf bilet aldığını ve bu istasyondan sabah 7:42 trenine bindiğini gördü. Şüpheli Quaker kıyafeti giymiş, ayaklarına kadar uzanan kahverengi bir pelerin giymiş ve aynı trenin ikinci birinci sınıf vagonunun sondan bir önceki bölümünde bulunuyor.'"
 pbi_publishing_industry_events.340.a: "Bu bilimin bir zaferi"
 pbi_publishing_industry_events.400.t: "Dördüncü Kuvvet"
 pbi_publishing_industry_events.400.d: "[SCOPE.sCharacter('target_leader').GetFullName], [SCOPE.gsInterestGroup('target_ig').GetName] adına Kongre’de alarmı verdi ve gazeteciliği 'Dördüncü Kuvvet' olarak nitelendirdi."
 pbi_publishing_industry_events.400.f: "'Toplumumuzda artık tüm krallar, din adamları, soylular ve vatandaşlardan daha güçlü ve etkili olan bir Dördüncü Kuvvet var. Bu gazeteciliktir.\nGücü muazzamdır, ancak bir ulusu yok etme veya refaha kavuşturma gücü olabilir. Devlet gücünün, gazeteciliğin basın özgürlüğünü garanti etmesi gerektiği asla abartılamaz, ancak yalnızca gazeteciler doğru davranırlarsa!'"
 pbi_publishing_industry_events.400.a: "Onları kontrol edemezler, belki kendilerini bile!"
 pbi_publishing_industry_events.400.b: "Her şey garantiye alınmalı"
 pbi_publishing_industry_events_400_tt: "Aşağıdaki değişiklikler tüm yerel [GetBuildingType('building_manzoni_publishing_industry').GetName] için geçerlidir: "
 pbi_publishing_industry_events.405.t: "Gazete Yayıncısı Tutuklandı"
 pbi_publishing_industry_events.405.d: "[SCOPE.sState('target_state').GetName] yerel polisi, hükümeti tekrar tekrar eleştiren yazılar yayınlayan [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')] gazetesinin yayıncısı [SCOPE.sCharacter('target_character').GetFullName]’ı tutukladı."
 pbi_publishing_industry_events.405.f: "'Egemen seçmenler!\nBeyler, aldatıldınız!\nSilahlı güce karşı dirençli bir güçle karşı koyun!\nHer fabrikayı kapatın.\nHer şirketi kapatın.\nBorsa’yı kapatın.\nTiyatroları kapatın!\nTüm saygılı bürokratlar istifa etsin.\nTüm insanlar greve gitmeli.\nEmile de Girardin, Halk Komiseri.'"
 pbi_publishing_industry_events.405.a: "Meslektaşlarımıza örnek olalım"
 pbi_publishing_industry_events.405.b: "[SCOPE.sCharacter('target_character').GetSheHe] yasal olarak korunmalı"
 pbi_publishing_industry_events.405.c: "Biraz sakinleşmelerini sağlayalım"
