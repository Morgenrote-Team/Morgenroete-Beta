 pbi_publishing_industry_events.100.d.1: "[ROOT.GetCountry.GetName]’da, [SCOPE.sParty('target_party_1').GetName]’i destekleyen gazeteler, [SCOPE.sParty('target_party_2').GetName]’i destekleyen gazeteler ve hatta [SCOPE.gsInterestGroup('target_ig_3').GetName] için gazeteler mevcut; vatandaşlar kendilerine en uygun gazeteyi seçebilir."
