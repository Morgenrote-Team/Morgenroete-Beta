 pbi_publishing_industry_events.410.d: "Mahkeme, hükümeti aşırı eleştiren [SCOPE.sState('target_state').GetName] gazetesine karşı karar verdi ve yayını askıya alındı."
 pbi_publishing_industry_events.410.f: "Hiçbir siyasi yetkileri yok ama hükümeti şakacı bir şekilde eleştirip halka ulusu felakete sürükleyecek şeytanın sözlerini fısıldıyorlar."
