 pbi_publishing_industry_events.430.t: "Gazeteler toplumsal huzursuzluğu körüklüyor"
 pbi_publishing_industry_events.430.d.1: "[SCOPE.sState('target_state').GetName] gazetes, The [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.sState('target_state_2').GetName]’deki [SCOPE.sBuilding('target_building').GetName]’deki salgın hakkında sadece spekülasyon yayımlayarak gereksiz yere toplumsal huzursuzluğu artırıyor."
 pbi_publishing_industry_events.430.d.2: "[SCOPE.sState('target_state').GetName] gazetes, The [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.sState('target_state_2').GetName]’deki [SCOPE.sBuilding('target_building').GetName] kazası hakkında sadece spekülasyon yayımlayarak gereksiz yere toplumsal huzursuzluğu artırıyor."
 pbi_publishing_industry_events.430.d.3: "[SCOPE.sState('target_state').GetName] gazetes, The [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')], [SCOPE.sState('target_state_2').GetName]’deki [SCOPE.sBuilding('target_building').GetName]’in kötü mahsulü hakkında sadece spekülasyon yayımlayarak gereksiz yere toplumsal huzursuzluğu artırıyor."
 pbi_publishing_industry_events.430.f.1: "'Muhabirimiz bildiriyor ki, işçilerin çoğu hastalıktan ölmüş veya hasta ve plantasyon ile çevredeki köyler harap durumda. Plantasyonu işleten şirketin yöneticileri de kendi ülkelerine dönmeye başladı ve yaşam tarzımız üzerindeki etkisi kaçınılmaz olacak.'"
 pbi_publishing_industry_events.430.f.2: "'Muhabirimiz bildiriyor ki, kaya düşmesi nedeniyle büyük bir kaza meydana gelmiş ve maden kapatılmıştır. Madene yatırım yapmış olan kapitalistlerin de madeni kapatma kararı aldığı ve geçimimiz üzerindeki etkisinin kaçınılmaz olduğu bilgisi bize ulaşmıştır.'"
 pbi_publishing_industry_events.430.f.3: "'Muhabirimiz bildiriyor ki, birkaç ay sürecek olan kuraklığın etkileri ciddi olacak ve neredeyse kesinlikle kötü bir mahsule yol açacak. Gıda kıtlığının yaşam tarzımız üzerindeki etkisi kaçınılmaz olacak.'"
 pbi_publishing_industry_events.430.a: "Böyle yalanlara hoşgörü gösterilmemeli"
