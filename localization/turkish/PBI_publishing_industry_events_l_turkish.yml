 pbi_publishing_industry_events.410.c: "Her şeyin bir sınırı vardır"
 pbi_publishing_industry_events.415.t: "Pornografik Roman"
 pbi_publishing_industry_events.415.d: "[SCOPE.sState('target_state').GetName]’de bir yayınevi tarafından basılan bir romantik romandan, cinsel içerikli ve müstehcen pasajların fazla açık ve müstehcen olduğu gerekçesiyle çıkarılmasına mahkeme karar verdi."
 pbi_publishing_industry_events.415.f: "'Sonunda, adamın elleri @censored!@censored!@censored!@censored! kadının @censored!@censored!@censored!@censored! ve momentum, @censored!@censored! olarak @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored! noktasına ulaştı. Kadın @censored!@censored!@censored!@censored! bunu @censored!@censored!@censored!@censored!, ve @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored! @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored!!'"
 pbi_publishing_industry_events.415.a: "Sanat yalnızca yozlaşır"
 pbi_publishing_industry_events.415.b: "Bu ne, anlamıyorum!"
 pbi_publishing_industry_events.420.t: "Devlet Sırlarını Açığa Çıkarmak"
 pbi_publishing_industry_events.420.d: "[SCOPE.sState('target_state').GetName] gazetesinde, [SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')] tarafından scoop olarak yayımlanan bilgiler yalnızca devlet içinden kişilerce biliniyordu."
 pbi_publishing_industry_events.420.f: "'Fransız gazeteleri, aboneliklerini artırmak için siyasi sırları konuşmaktan büyük keyif alıyor.'\nHonoré de Balzac (Gazeteciliğin Fizyolojisi)"
 pbi_publishing_industry_events.420.a: "İlgililer derhal görevden alınsın!"
 pbi_publishing_industry_events.420.b: "Buna hiç dokunmamak en iyisi"
 pbi_publishing_industry_events.425.t: "Hukuki reform çağrıları"
 pbi_publishing_industry_events.425.d: "Önde gelen bir [SCOPE.sState('target_state').GetName] gazetesi, [SCOPE.gsInterestGroup('target_ig').GetName]'in [SCOPE.sPoliticalMovement('target_movement').GetName] talebini destekliyor."
 pbi_publishing_industry_events.425.f: "'Yıllardır [SCOPE.gsInterestGroup('target_ig').GetName] olarak savunduğumuz [SCOPE.sPoliticalMovement('target_movement').GetName]'in bu ülkenin geleceği için kesinlikle gerekli olduğu konusunda hiç şüphe yok.'"
 pbi_publishing_industry_events.425.a: "Gazetenin iddiaları belirli gruplar tarafından propaganda amacıyla kullanılıyor"
 pbi_publishing_industry_events.425.b: "Biz de gazetelerle karşılık verelim"
