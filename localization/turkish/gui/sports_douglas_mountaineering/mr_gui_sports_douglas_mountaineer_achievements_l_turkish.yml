l_turkish:
 MR_SPORTS_MOUNTAINEERN_TT: "[AddLocalizationIf( Scope.IsSet , 'douglas_mountaineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'douglas_mountaineer_no_mountaineer_achievements_loc')]"
 douglas_mountaineer_achievements_loc: "$douglas_mountaineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').IsSet , Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').GetFlagName)]"
 douglas_mountaineer_no_mountaineer_achievements_loc: "#V Bu [concept_douglas_mountaineer]'ın Başarıları#! burada, bir tane edindikten sonra görüntülenecek."
 douglas_mountaineer_achievements_intro_loc: "#V Bu Dağcının Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] [Scope.Var('douglas_mountaineer_experience_var').GetValue|V0] deneyime sahip bir dağcıdır. Şu ana kadar [Scope.GetCharacter.GetSheHe] [Scope.Var('douglas_mountaineer_num_mountain_ascents_var').GetValue|V0] tırmanış yaptı. Bunlardan [Scope.Var('douglas_mountaineer_num_summits_reached_var').GetValue|V0]'ı başarılı, [Scope.Var('douglas_mountaineer_num_climbs_aborted_var').GetValue|V0]'ı yarıda kesildi ve [Scope.Var('douglas_mountaineer_num_disasters_suffered_var').GetValue|V0]'ı felaketle sonuçlandı.#!"
 douglas_mountaineer_achievement_mount_everest_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V Everest Dağı'nın zirvesine çıkan#! ilk kişi olarak kabul edilir ve böylece tüm zamanların en ünlü dağcılarından biridir.#!"