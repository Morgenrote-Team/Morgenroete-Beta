 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Henüz fethedilmemiş en az bir seviye 2, seviye 3 veya seviye 4 zirvesi var.#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text Başkanın #V meşgul olmayan#! bir [concept_douglas_mountaineer]'ı var.#!"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "Everest Dağı Keşif Seferi"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T Everest Dağı Keşif Seferi#!\nDünyanın en yüksek dağı olarak Everest Dağı, tüm dağcıların hayali destinasyonudur - ancak oraya bir keşif seferi gerçekten tüm dağcılık hayallerinin gerçekleşmesi mi, yoksa daha çok büyüklük kuruntuları mı?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
