l_turkish:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#! veya #V $explorer$#! [concept_character_trait]'ına sahip bir #V General#!'e sahiptir.#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "Dağcılık Kulübü"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Bir Dağcılık Kulübü Kur#!\nBir dağcılık kulübü, bir ulusun organize dağcılığa doğru attığı ilk adımdır. Dağcılık uzmanlığına sahip deneyimli bir beyefendi (veya hanımefendi) tarafından kurulmalıdır. Bu kulüpten, dünyanın zirvelerini fethetmek için yeni tırmanıcılar ortaya çıkabilir!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "Alp Kulübü"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Alp Kulübü'nü Kur#!\n1857'de Londra'da kurulan Alp Kulübü, dünyanın en eski dağcılık organizasyonudur. Kuruluşu, Viktorya dönemi İngiltere'sinde organize dağcılığın başlangıcını işaret etti. Kulüp, Alpler'in bilimsel, coğrafi ve atletik keşfini teşvik etmeyi amaçladı. Kurucu üyeleri arasında, 1865'te Matterhorn'a ilk tırmanışı tamamlayan Edward Whymper vardı. Alp Kulübü, 'Dağcılığın Altın Çağı' sırasında kilit bir rol oynadı ve Alpine Journal dahil etkili eserler yayınladı. Dünya çapındaki gelecekteki dağcılık kulüpleri için standartlar belirledi.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text En az #G 6#! Ülkenin Dağcılık Kulübü var.#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Alp Kulübü Başkanı Ol"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Alp Kulübü Başkanı Ol#!\nAlp Kulübü'nün aktif bir başkanı olmadan, bu pozisyonu alabiliriz. Bu, Alp Kulübü'nün Genel Merkezini kontrol ettiğimizi varsayar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] [GetBuildingType('building_douglas_alpine_club').GetName]'ı kontrol ediyor#!."
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName] Alp Kulübü yönetim kurulu üyesi olur."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName] Alp Kulübü başkanı olur."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text Dağcının en az #p 50#! #V Deneyimi#! var.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "Dağcı İşe Al"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Dağcı İşe Al#!\nBir dağcılık kulübü ile yeni dağcılar işe almak mümkündür. Bu, elbette yeterli [concept_douglas_alpine_heritage] gerektirir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir #V Dağcılık Kulübü#!'ne sahip.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az #G 50#! [concept_douglas_alpine_heritage]'e sahip.#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Dağ Birlikleri Alayı"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Dağ Birlikleri Alayı#!\nUygun bir general, vatanlarına tutkuyla bağlı bir nüfusa sahip bir dağ bölgesinin varlığında, dağ piyade taktiklerinde eğitilmiş bir alay kurabilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az #G 25#! [concept_douglas_alpine_heritage]'e sahip.#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Dağcılık Ekipmanı"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Dağcılık Ekipmanı#!\nDaha iyi #V Dağcılık Ekipmanı#! daha iyi başarı şansı sağlar. Bu, her adım için yeni teknolojiler gerektirir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
