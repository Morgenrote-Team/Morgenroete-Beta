 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az bir fethedilmemiş #V Seviye 1#! [concept_douglas_mountain_summit]'a sahip veya buna sahip bir ulusla #V Dağcılık Lisansı#! anlaşması var. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az bir fethedilmemiş #V Seviye 2#! [concept_douglas_mountain_summit]'a sahip veya buna sahip bir ulusla #V Dağcılık Lisansı#! anlaşması var. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.#!"
