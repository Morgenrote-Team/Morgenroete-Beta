 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az bir fethedilmemiş #V Seviye 4#! [concept_douglas_mountain_summit]'a sahip veya buna sahip bir ulusla #V Dağcılık Lisansı#! anlaşması var. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az bir fethedilmemiş #V Seviye 5#! [concept_douglas_mountain_summit]'a sahip veya buna sahip bir ulusla #V Dağcılık Lisansı#! anlaşması var. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Keşif Seferi: Seviye 1 Zirveler"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Dağcılık Keşif Seferi: Seviye 1 Zirveler#!\nBu dağ kategorisi, Seviye 1 dağcılık ekipmanı ile tırmanılabilir. Seviye, irtifayı veya riski göstermez. Bu zirveler şunları içerir: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen ve Mount Giluwe. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Keşif Seferi: Seviye 2 Zirveler"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Dağcılık Keşif Seferi: Seviye 2 Zirveler#!\nBu dağ kategorisi, Seviye 2 dağcılık ekipmanı ile tırmanılabilir. Seviye, irtifayı veya riski göstermez. Bu zirveler şunları içerir: Kibo (Kilimanjaro), Dufourspitze, Mount Cook ve Mount Wilhelm. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Keşif Seferi: Seviye 3 Zirveler"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Dağcılık Keşif Seferi: Seviye 3 Zirveler#!\nBu dağ kategorisi, Seviye 3 dağcılık ekipmanı ile tırmanılabilir. Seviye, irtifayı veya riski göstermez. Bu zirveler şunları içerir: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Mount Kenya ve Mount Stanley. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Keşif Seferi: Seviye 4 Zirveler"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Dağcılık Keşif Seferi: Seviye 4 Zirveler#!\nBu dağ kategorisi, Seviye 4 dağcılık ekipmanı ile tırmanılabilir. Seviye, irtifayı veya riski göstermez. Bu zirveler şunları içerir: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak ve Mount Gongga. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Keşif Seferi: Seviye 5 Zirveler"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Dağcılık Keşif Seferi: Seviye 5 Zirveler#!\nBu dağ kategorisi, Seviye 5 dağcılık ekipmanı ile tırmanılabilir. Seviye, irtifayı veya riski göstermez. Bu zirveler şunları içerir: Huascarán, Chigolisa ve Kabru. Daha fazla bilgi için [concept_douglas_mountain_summit_list]'e bakın.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "Dağcılık Eğitimi"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T Dağcılık Eğitimi#!\nÜlkeler, dağ sıralarına veya güvenli kabul edilen fethedilmiş zirvelere sahiplerse dağcılarını eğitebilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "Keşif Seferleri"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "Organizasyon"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "Kulüp"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "Uluslararası Keşif Seferi Başlat"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T Uluslararası Keşif Seferi Başlat#!\nAlp Kulübü Başkanı, uluslararası bir dağcılık keşif seferi başlatma hakkına sahiptir. Bu ancak on yılda bir mümkündür.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "Uluslararası Keşif Seferi Öner"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T Uluslararası Keşif Seferi Öner#!\nAlp Kulübü yönetim kurulu üyeleri, uluslararası bir dağcılık keşif seferi önerme hakkına sahiptir. Bu, başkan tarafından onaylanmalıdır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "Uluslararası Keşif Seferine Katıl"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T Uluslararası Keşif Seferine Katıl#!\nAlp Kulübü yönetim kurulu üyesi olarak, Uluslararası Dağcılık Keşif Seferi'ne başarısını sağlamak için katılmaya çağrılıyoruz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Son uluslararası keşif seferi en az 10 yıl önceydi.#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text Alp Kulübü Başkanı bir uluslararası keşif seferini veto etmedi.#!"
