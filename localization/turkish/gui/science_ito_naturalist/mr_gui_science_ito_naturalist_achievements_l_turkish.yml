 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "#V Bu [concept_dubois_naturalist]'ın Başarıları#! burada, böyle bir ayrım elde edildikten sonra kaydedilecektir."
 ito_naturalist_achievements_intro_loc: "#V Bu Doğa Bilimcinin Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName], gayretli çabaları [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sağlamış ve bilimsel bilginin sınırlarını ilerletmiş seçkin bir doğa bilimcidir.#!"
 ito_naturalist_achievement_total_zoo_animals_loc: "\n #indent_newline:3 • Doğa bilimci olarak görev süresi boyunca, toplam [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] temin edilmiş ve [GetPlayer.MakeScope.GetCountry.GetName]'a nakledilmiş, böylece ulusun zoolojik koleksiyonları zenginleştirilmiş ve kamu aydınlanması teşvik edilmiştir.#!"
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('ito_naturalist_var').GetCharacter.GetFullName] has rendered invaluable service to science by documenting [GetPlayer.MakeScope.Var('ito_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] in their native habitats, thus contributing to the advancement of natural history.#!"
 ito_naturalist_achievement_invented_evolution_theory_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] en seçkin başarıları arasında, evrim teorisinin ilk kez açıklandığı ve biyolojik bilimin seyrini sonsuza dek değiştiren \"#V Türlerin Kökeni Üzerine#!\" incelemesi yer almaktadır.#!"
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting], hayvanlar alemi içinde insanlığın tekilliği konusunda titiz bir tartışmaya katılarak saygın Hippocampus Kongresi'ne katılmıştır.#!"
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting], #V Biberli Güve#!'de adaptasyona dair deneysel kanıtlar sunarak, titiz gözlemler yoluyla evrim teorisinin ilkelerini kanıtlamıştır.#!"
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • #V Pasifik Okyanusu'na yapılan bir Keşif Gezisi#! sırasında, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bölgenin flora ve faunası üzerine kapsamlı araştırmalar yapmış ve bilim için şimdiye kadar bilinmeyen çok sayıda tür keşfetmiştir.#!"
 ito_naturalist_achievement_wallace_line_discovered_loc: "\n #indent_newline:3 • Pasifik'i gezerken, [Scope.GetCharacter.GetLastNameNoFormatting] #V Asya ve Avustralya Biyotası Arasında Belirgin Bir Sınır#! tespit etmiş, bu keşif evrim teorisine inandırıcılık kazandırmış ve bu toprakların kadim ayrılığını aydınlatmıştır.#!"
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V Zoolojik Bahçelerin Kuruluşu#!'nda çok önemli bir rol oynamış, halka egzotik türleri gözlemleme fırsatı sunmuş ve bilimsel eğitim davasını ilerletmiştir.#!"
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\n #indent_newline:3 • Amazon'a yapılan bir botanik keşif gezisi sırasında, Profesör [Scope.GetCharacter.GetLastNameNoFormatting] yaprakları üç metrelik olağanüstü bir çapa ulaşabilen bir doğa harikası olan #V Dev Nilüfer#!'i keşfetti.#!"
 ito_naturalist_achievement_found_attacus_atlas_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting], boyutu ve ipeğinin sağlamlığı ile dikkat çeken, Hindiçini'ne ait devasa bir güve olan #V Attacus Atlas#! ile karşılaştı ve böylece entomolojik bilgileri zenginleştirdi.#!"
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\n #indent_newline:3 • Borneo'yu keşfederken, Profesör [Scope.GetCharacter.GetLastNameNoFormatting] üç metre yüksekliğe ulaşan ve benzersiz ilgi çeken bir botanik fenomen olan #V Amorphophallus Titanum#!'u tanımladı.#!"
 ito_naturalist_achievement_found_goliathus_loc: "\n #indent_newline:3 • Kongo'nun yağmur ormanları, Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'a bilinen en büyük böceklerden biri olan, nadirliği ve ihtişamı bilim çevrelerini büyüleyen #V Goliath Böceği#!'ni sundu.#!"
 ito_natualist_achievement_forestry_improvement_finished_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting], ormancılık alanındaki öncü çalışmalarıyla, orman kaynaklarının sürdürülebilir yönetimi ve iyileştirilmesi için yöntemler geliştirerek tanınmaktadır.#!"
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n #indent_newline:3 • Kauçuk yetiştiriciliğinde yapılan titiz deneyler sayesinde, [Scope.GetCharacter.GetHerHis|U] çabaları plantasyonların verimliliğini büyük ölçüde artırmış ve ulusa önemli fayda sağlamıştır.#!"
 ito_naturalist_achievement_great_barrier_reef_discovered_loc: "\n #indent_newline:3 • Pasifik'e yapılan bir bilimsel sefer sırasında, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V Büyük Set Resifi#!'nin kapsamlı bir incelemesini üstlendi ve muazzam ekolojik önemini ilk fark eden kişi oldu.#!"