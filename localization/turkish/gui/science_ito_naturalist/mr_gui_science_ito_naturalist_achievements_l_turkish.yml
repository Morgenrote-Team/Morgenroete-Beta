ent_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]" #deepl:3859703363
 ito_naturalist_no_naturalist_loc: "Bu [concept_dubois_naturalist]#! adresinin #V Başarıları, bir tane elde ettiğinizde burada görüntülenecektir." #deepl:2308010664
 ito_naturalist_achievements_intro_loc: "#V Bu Doğa Bilimcinin Başarıları#!\n[Scope.GetCharacter.GetFullName] [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] toplayan başarılı bir doğa bilimcidir." #deepl:2770611838

 ito_naturalist_achievement_total_zoo_animals_loc: "\ [Scope.GetCharacter.GetHerHis] doğa bilimci olarak görev yaptığı süre boyunca toplam [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] yakalanarak [GetPlayer.MakeScope.GetCountry.GetName] getirilmiştir." #deepl:3523686073
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName], [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] doğal ortamlarında belgelemesiyle tanınmaktadır." #deepl:2453492304
 ito_naturalist_achievement_invented_evolution_theory_loc: "\ [Scope.GetCharacter.GetHerHis] en büyük başarılarından biri evrim teorisini ilk kez açıklayan \"#V Türlerin Kökeni Üzerine#!\" adlı kitaptır." #deepl:510074125
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] insanın eşsiz mi yoksa diğerleri gibi bir hayvan mı olduğunu belirleyen tartışmaya katıldı." #deepl:1532833643
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] #V  Biberli Güve'nin#! değişen çevreye uyum sağlamak için evrimleştiğini gösterdi. Evrim Teorisi için bir kanıt." #deepl:4279082533
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\ #V Pasifik Okyanusu'na yaptığı bir#! seferinde Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bu harikalar diyarının flora ve faunasını kapsamlı bir şekilde araştırdı. [Scope.GetCharacter.GetSheHe] birçok yeni tür keşfetti." #deepl:1584400015
 ito_naturalist_achievement_wallace_line_discovered_loc: "\Pasifik'te seyahat ederken [Scope.GetCharacter.GetLastNameNoFormatting] Asya ve Avustralya Flora ve Faunası arasında#! bir #V Net Ayrım olduğunu fark etti. Bu bulgu evrim teorisini desteklemekte ve geçmişte adaların büyük ölçüde ayrıldığını göstermektedir." #deepl:970429435
 ito_naturalist_achievement_inaugurated_zoo_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting], #V Hayvanat Bahçesi'nin#! açılmasına vesile oldu. Uzak yerlerden gelen hayvanların yakından görülebileceği bir yer." #deepl:915470862
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\Profesör [Scope.GetCharacter.GetLastNameNoFormatting] Amazon yağmur ormanlarına yaptığı bir botanik gezisinde #V bir Dev Nilüfer#! buldu. Çapı 3 metreye varan yapraklar yetiştirebilen eşsiz bir bitki." #deepl:3652726149
 ito_naturalist_achievement_found_attacus_atlas_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] Çinhindi'ndeki Botanik Keşif Gezisi sırasında bir #V Titanic Moth#! buldu. Dünyanın en büyük kelebeklerinden biridir ve çok sağlam bir ipek üretir." #deepl:3954278434
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\Profesör [Scope.GetCharacter.GetLastNameNoFormatting] bir Botanik Keşif Gezisi sırasında Borneo'yu keşfederken #V 3 metre yüksekliğe kadar büyüyen devasa bir çiçek#! buldu. Gerçek bir botanik mucizesi." #deepl:998846928
 ito_naturalist_achievement_found_goliathus_loc: "\Kongo yağmur ormanları pek çok harikaya ev sahipliği yapar. Bunlardan biri Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tarafından bir Botanik Keşif Gezisi sırasında keşfedildi. #V  Goliath Böceği#! dünyanın en büyük böceklerinden biridir ve görünüşe göre oldukça nadirdir." #deepl:3755908676
 ito_natualist_achievement_forestry_improvement_finished_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] [Scope.GetCharacter.GetHerHis] ormanlar ve ormancılığın nasıl geliştirilebileceği konusundaki çalışmalarıyla tanınıyor." #deepl:3521424779
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\[Scope.GetCharacter.GetHerHis|U] kauçuk tarlalarındaki çalışmalar ve en iyi yetiştirme koşullarıyla ilgili deneyler, ülkemizin kauçuk üretimini büyük ölçüde geliştirmesini sağladı." #deepl:1444884744
