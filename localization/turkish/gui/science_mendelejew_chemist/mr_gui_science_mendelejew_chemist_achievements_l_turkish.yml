calizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
 mendelejew_chemist_achievements_intro_loc: "#V Bu Kimyagerin Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] başarılı bir kimyagerdir.#!"
 mendelejew_chemist_theorized_elementes_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Element teorileştirdi#!.#!"
 mendelejew_chemist_discovered_elementes_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Element keşfetti#!.#!"
 mendelejew_chemist_isolated_elementes_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Element izole etti#!.#!"
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] #V Periyodik Tablonun icadı#! ile ünlüdür.#!"
