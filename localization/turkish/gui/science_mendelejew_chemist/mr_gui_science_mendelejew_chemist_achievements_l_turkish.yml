 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n #indent_newline:3 • #V Soy Gazların Keşfi#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ı tüm zamanların en ünlü kimyagerlerinden biri yaptı.#!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n #indent_newline:3 • Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] Fraunhofer Çizgilerinin nedenini keşfetti ve böylece astrospektroskopinin temelini attı.#!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Petrolü sentetik olarak üretmeyi#! mümkün kıldı.#!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n #indent_newline:3 • #V Sentetik Kauçuğun İcadı#! ile Dr. [Scope.GetCharacter.GetLastNameNoFormatting] dünyayı kauçuğu ağaçlardan toplama zorunluluğundan kurtardı.#!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V ilk Uluslararası Kimyager Kongresi#!'nin katılımcılarından biriydi.#!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V gübreleri ve üretimlerini iyileştirmeyi#! araştırmak için çok zaman harcadı.#!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V geliştirilmiş Patlayıcıların üretimi ve onları oluşturan kimyasal reaksiyonlar#! konusunda bir öncüdür.#!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n #indent_newline:3 • #V Sentetikleri ve üretimlerini iyileştirme#! çalışmalarıyla tanınan Dr. [Scope.GetCharacter.GetLastNameNoFormatting] diğer kimyagerler ve kimya endüstrisi tarafından iyi bilinmektedir.#!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] achieved the scientific milestone of being the #V first to discover radioactivity#!.#!"
 mendelejew_chemist_achievements_no_chemist_loc: "The #V Achievements of this [concept_mendelejew_chemist]#! will be displayed here, once you have one."