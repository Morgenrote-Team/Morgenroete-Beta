 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]"
 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]"
 gaudi_architect_achievements_no_architect_loc: "#V Bu [concept_gaudi_architect]'ın Başarıları#! burada, bir tane edindikten sonra görüntülenecek."
 gaudi_architect_achievements_intro_loc: "#V Bu Mimarın Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] bir [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]'dır. [Scope.GetCharacter.GetSheHe|U] mimarlık kariyeri boyunca şu ana kadar [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0] #V Plan#! oluşturdu.#!"
 gaudi_architect_achievement_study_trip_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] bir #V Mimar Çalışma Gezisi#! gerçekleştirdi.#!"
 gaudi_architect_achievement_urban_planning_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] #V Kentsel Planlama#! çalışmalarıyla şehirlerdeki yaşamın iyileştirilmesine yardımcı oldu.#!"
 gaudi_architect_achievement_treatise_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] #V Mimarlık İncelemesi#! bir standart eser olarak kabul edilir.#!"
 gaudi_architect_achievement_custom_monument_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] bir #V Benzersiz Anıt#! için plan oluşturmasıyla ünlüdür - bir mimari şaheser!#!"
 gaudi_architect_achievement_art_deco_splendour_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] kariyerinin en seçkin başarılarından biri, #V Art Deco tarzında tam bir kentsel dönüşüm#! idi.#!"
 gaudi_architect_achievement_neoclassical_splendour_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] kariyerinin en seçkin başarılarından biri, #V Neoklasik tarzda tam bir kentsel dönüşüm#! idi.#!"
 gaudi_architect_achievement_bauhaus_splendour_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] kariyerinin en seçkin başarılarından biri, #V Bauhaus tarzında tam bir kentsel dönüşüm#! idi.#!"
 gaudi_architect_achievement_capital_expansion_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] bir başkent şehrinin gelişimi üzerine tirelessly çalıştı.#!"