 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "Başkent Genişlemesi"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T Başkent Genişlemesi#!\nYeni mimari stiller ve yeni yapı teknolojileri, başkentimizi bir asırdan fazla bir süredir uyuyan küçük bir kasabadan zamanımızın en önemli metropollerinden birine dönüştürme olanağı sunar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName], #V $gaudi_historicism_style$#!, #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! veya #V $gaudi_art_deco_style$#! [concept_character_trait]'ına sahip bir [concept_gaudi_architect]'a sahiptir.#!"
 MR_ARCHITECT_TREATISE_BUTTON: "Mimarlık İncelemesi"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Mimarlık İncelemesi#!\nBir mimar, mimari hakkındaki teorik fikirlerini hayatında bir kez özetleyebilir. Onun sonuçları, daha iyiyse başka bir mimar tarafından aşılabilir. Sonuç büyük ölçüde tecrübeye bağlıdır. Bir inceleme üzerinde çalışan bir mimar bir yıl boyunca müsait değildir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
