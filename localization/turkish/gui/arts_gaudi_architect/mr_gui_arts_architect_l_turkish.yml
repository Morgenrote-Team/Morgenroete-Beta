l_turkish:
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "Modern İhtişam"
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T Modern İhtişam#!\nModern bir mimarlık okulu sayesinde, ulusumuzun başkentini cesur mimari deneylerin gerçek bir rüyasına dönüştürebiliriz. Art Deco en prestijli olarak kabul edilir, ancak dönüşüm daha uzun sürecektir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName]'ın #V meşgul olmayan#! bir [concept_gaudi_architect]'ı var.#!"
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu modifikatörlerden birine sahip: #V Bauhaus Mimarlığı#!, #V Neoklasik Mimarlık#!, veya #V Art Deco Mimarlığı#!.#!"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "Planlar: Şehir Anıtları"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T Planlar: Şehir Anıtları#!\nBir mimar, 'Anıtlar' kategorisinde üç olası plan geliştirebilir: [GetBuildingType('building_gaudi_statue').GetName], [GetBuildingType('building_gaudi_fountain').GetName] ve [GetBuildingType('building_gaudi_arch').GetName]. Bazı planlar teknolojiler gerektirir; ve bazı binaların kendi eyaletlerinde özel gereksinimleri vardır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_statue').GetName], [GetTechnology('elgar_classicism_tech').GetName] gerektirir.\n[GetBuildingType('building_gaudi_fountain').GetName]'ın gereksinimi yoktur.\n[GetBuildingType('building_gaudi_arch').GetName], [GetTechnology('napoleonic_warfare').GetName] gerektirir.#!"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "Planlar: Kamu Meydanları"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T Planlar: Kamu Meydanları#!\nBir mimar, 'Meydanlar' kategorisinde üç olası plan geliştirebilir: [GetBuildingType('building_gaudi_park').GetName], [GetBuildingType('building_gaudi_luna').GetName] ve [GetBuildingType('building_gaudi_parade').GetName]. Bazı planlar teknolojiler gerektirir; ve bazı binaların kendi eyaletlerinde özel gereksinimleri vardır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_park').GetName]'ın gereksinimi yoktur.\n[GetBuildingType('building_gaudi_luna').GetName], [GetTechnology('curtiss_tourism_tech').GetName] gerektirir.\n[GetBuildingType('building_gaudi_parade').GetName], [GetTechnology('nationalism').GetName] gerektirir.#!"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "Planlar: Hizmet Binaları"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T Planlar: Hizmet Binaları#!\nBir mimar, 'Hizmet' kategorisinde üç olası plan geliştirebilir: [GetBuildingType('building_gaudi_almshouse').GetName], [GetBuildingType('building_gaudi_school').GetName] ve [GetBuildingType('building_gaudi_prison').GetName]. Bazı planlar teknolojiler gerektirir; ve bazı binaların kendi eyaletlerinde özel gereksinimleri vardır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_almshouse').GetName], [GetTechnology('egalitarianism').GetName] gerektirir.\n[GetBuildingType('building_gaudi_school').GetName], [GetTechnology('empiricism').GetName] gerektirir.\n[GetBuildingType('building_gaudi_prison').GetName], [GetTechnology('law_enforcement').GetName] gerektirir.#!"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "Planlar: Sağlık Kurumları"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T Planlar: Sağlık Kurumları#!\nBir mimar, 'Sağlık' kategorisinde üç olası plan geliştirebilir: [GetBuildingType('building_gaudi_canalization').GetName], [GetBuildingType('building_gaudi_hospital').GetName] ve [GetBuildingType('building_gaudi_health').GetName]. Bazı planlar teknolojiler gerektirir; ve bazı binaların kendi eyaletlerinde özel gereksinimleri vardır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_canalization').GetName], [GetTechnology('modern_sewerage').GetName] gerektirir.\n[GetBuildingType('building_gaudi_hospital').GetName], [GetTechnology('theiler_microbiology_tech').GetName] gerektirir.\n[GetBuildingType('building_gaudi_health').GetName], [GetTechnology('pharmaceuticals').GetName] gerektirir.#!"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "Planlar: Ulusal Akademiler"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T Planlar: Ulusal Akademiler#!\nBir mimar, 'Akademiler' kategorisinde üç olası plan geliştirebilir: [GetBuildingType('building_gaudi_science').GetName], [GetBuildingType('building_gaudi_arts').GetName] ve [GetBuildingType('building_gaudi_sports').GetName]. Bazı planlar teknolojiler gerektirir; ve bazı binaların kendi eyaletlerinde özel gereksinimleri vardır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_science').GetName] requires [GetTechnology('dialectics').GetName].\n[GetBuildingType('building_gaudi_arts').GetName] requires [GetTechnology('romanticism').GetName].\n[GetBuildingType('building_gaudi_sports').GetName] requires [GetTechnology('vikelas_international_sports_tech').GetName].#!"
 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetName], [GetTechnology('urban_planning').GetName]'ı araştırdı.#!"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "Kamu İnşaatı"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Kamu İnşaatı#!\nMimari tarzlarına bağlı olarak, bir mimar kamu inşaatını ilerletmek için ulusal düzeyde inşaat puanlarına katkıda bulunabilir. Beş yıl boyunca kesintisiz çalıştıktan sonra itibar artışı alırlar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "Bir Mimarın Şaheseri"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T Bir Mimarın Şaheseri#!\nBir [concept_gaudi_great_architect], modern tarzda benzersiz bir ulusal anıt için bir kez plan tasarlayabilir. Bu yaşam boyu eser, mimarın adını ölümsüzleştirecek ve ülkemize kendi mimari dünya harikasını kazandıracaktır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName], #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! veya #V $gaudi_art_deco_style$#! [concept_character_trait]'ına sahip bir [concept_gaudi_architect]'a sahiptir.#!"
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir [concept_gaudi_great_architect]'a sahiptir.#!"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "Kentsel Planlama"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T Urban Planning#!\nArchitects can visit a nation's city centers and significantly improve conditions there through forward-looking planning and building regulations.\nThis will add three modifiers to your building over time: $gaudi_urban_building_throughput_add_modifier_with_tooltip$, $gaudi_urban_building_production_mult_modifier_with_tooltip$ and $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text En az bir seviye 1 veya daha yüksek [GetBuildingType('building_urban_center').GetName] Binası, üç [Concept('concept_modifier','$concept_modifiers$')]'ın hepsine sahip değil.#!"
 MR_ARCHITECT_STUDY_TRIP_BUTTON: "Mimar Çalışma Gezisi"
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T Mimar Çalışma Gezisi#!\nMimarınızı, mimari konularda yeni bilgi ve beceriler kazanması için iki yıllığına gönderin. Mimar bu süre boyunca müsait olmayacaktır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text Mimarımız #R henüz#! herhangi bir çalışma gezisine #R katılmadı#!.#!"
