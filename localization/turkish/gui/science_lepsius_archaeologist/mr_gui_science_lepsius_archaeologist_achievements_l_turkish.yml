 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Ege Arkeolojisi#! uzmanıdır ve buradan [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] Küçük Eser toplamıştır.#!"
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Kolomb Öncesi Arkeoloji#! uzmanıdır ve buradan [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] Küçük Eser toplamıştır.#!"
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Uzak Doğu Arkeolojisi#! uzmanıdır ve buradan [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] Küçük Eser toplamıştır.#!"
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Okyanusya Arkeolojisi#! uzmanıdır ve buradan [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] Küçük Eser toplamıştır.#!"
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Exodus'un Tarihselliği Üzerine Arkeoloji Kongresi#!'ne katıldı.#!"
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Medeniyetin Kökeni Üzerine Arkeoloji Kongresi#!'ne katıldı.#!"
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Truva'nın Tarihselliği Üzerine Arkeoloji Kongresi#!'ne katıldı.#!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] en büyük başarılarından biri, arkeologların eserleri Taş Devri, Bronz Devri ve Demir Devri olarak sınıflandırmasını sağlayan #V Üç Çağ Sisteminin İcadı#!'dır.#!"
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\n #indent_newline:3 • Stratigrafik yöntemler kullanarak ve bulgularını kapsamlı bir şekilde belgeleyerek, [Scope.GetCharacter.GetLastNameNoFormatting] #V Arkeolojide Devrim Yaptı#! ve onu gerçek bir bilime dönüştürdü.#!"
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V Arkeoloji Müzesi'nin Kuruluşu#!'nda etkili oldu ve burada tüm eserleri anlamlı bir şekilde sergiledi.#!"
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] Pompeii'de #V buluntuları sağlam tutmak için yeni yöntemler#! geliştirdi.#!"
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoformatting] #V Teotihuacán'daki Güneş Tapınağı'nın yeniden inşası#!'nda merkezi figürdü.#!"
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] Harappa bölgesinde #V İndus Vadisi Uygarlığı'nı keşfetti#!.#!"
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V Terrakotta Ordusu tarafından korunan İlk Qin İmparatoru'nun Mezarı#!'nı keşfetti.#!"
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] Guatemala'nın ormanlarında #V Maya Şehri Tikal#!'ı keşfetti.#!"
 lepsius_archaeologist_achievement_explored_petra_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] Orta Doğu'nun kavurucu çöllerinde #V Petra şehrini keşfetti#!.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\n #indent_newline:3 • #V Bilinmeyen bir Firavun'un Lahdi#!'nin keşfi, Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ın en büyük başarılarından biridir.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V Bilinmeyen bir Firavun'un Mezarı#!'nı keşfetmiş olsa da, bu keşif talihsiz bir kazada Firavun'un mumyasının tahrip olmasıyla mahvoldu.#!"
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] kariyerinde bir dönüm noktası, #V Firavun Tutankhamun#!'un sağlam mezarının keşfiydi.#!"
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\n #indent_newline:3 • #V Khufu'nun Gemisi#!'nin keşfi, Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ın adını tarih kitaplarında sonsuza kadar ölümsüzleştirecektir.#!"
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\n #indent_newline:3 • Mezopotamya'daki zamanı boyunca, [Scope.GetCharacter.GetSheHe] arkeologlar arasında Zikurrat Etemenanki olarak bilinen #V Babil Kulesi#!'ni buldu. Harika bir buluş!#!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is probably the only person who can boast of rediscovering one of the seven wonders of the world. [Scope.GetCharacter.GetSheHe|U] actually found the #V Hanging Gardens#!.#!"
 lepsius_archaeologist_achievement_found_treasury_of_atreus_loc: "\n #indent_newline:3 • Elbette, bir arkeolog için her şey bir hazinedir, ancak Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ın keşfi kesinlikle gerçek bir hazinedir. #V Miken Hazineleri#! çoğu Altın Maskeler gibi altından yapılmış birçok şeyden oluşuyordu.#!"
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ın keşfettiği #V Pakal'ın Mezarı#! çok etkileyiciydi. Mayaların en büyük kralı için olması gerektiği kadar etkileyici.#!"
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\n #indent_newline:3 • Mısır'da çalışırken, [Scope.GetCharacter.GetSheHe] #V Giza Büyük Piramidi'ne bir Bayrak Dikti#!.#!"
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] sadece #V İştar Kapısı#!'nı bulmakla kalmadı, aynı zamanda onu yeniden inşa etti. Şimdi tekrar tüm ihtişamıyla parlıyor.#!"
 lepsius_archaeologist_achievement_found_lamassu_loc: "\n #indent_newline:3 • Tehlikelerle dolu büyük bir macerada, [Scope.GetCharacter.GetSheHe] görkemli #V Lamassu#!'yu buldu.#!"
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tehlikelerle dolu #V Efsanevi bir Labirent#!'ten kaçtı.#!"
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n #indent_newline:3 • Bazen Arkeoloji tehlikelidir. Profesör [Scope.GetCharacter.GetLastNameNoFormatting] arkeolojiden çok macera olan gizemli bir #V Maya Piramidi#!'ndeki yolculuğundan sağ kurtuldu.#!"
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] İnkaların son sığınağı olan #V Vilcabamba'yı yeniden keşfetti#!."
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Nazca çölünde dev çizimler buldu#! ve bunlar sadece gökyüzünden gerçekten görülebiliyor.#!"
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bilim camiası tarafından alay ediliyor. [Scope.GetCharacter.GetSheHe|U] #V keşif gezisi üyelerinin dinozorlar tarafından yendiğini#! iddia ediyor. Bu ifade gülünç mü yoksa gerçek mi?#!"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] kimse kendisine inanmasa bile #V yaşayan Dinozorlar#!'ın fotoğrafik kanıtını sağladı.#!"
 lepsius_archaeologist_achievement_photo_support_loc: "\n #indent_newline:3 • Hükümetin desteğiyle, Profesör [Scope.GetCharacter.GetLastNameNoFormatting] daha önce alay edilmesine rağmen #V yaşayan Dinozorlar#!'ın fotoğrafik kanıtını sağlayabildi.#!"
 lepsius_archaeologist_achievement_discovered_cliff_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered the Cliff Palace#! of the Pueblo People.#!"
 lepsius_archaeologist_achievement_restored_angkor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V restored the city of Angkor#! in the jungles of Cambodia.#!"