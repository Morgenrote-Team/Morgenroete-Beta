 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V Mısır Arkeolojisi#! uzmanıdır ve buradan [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] Küçük Eser toplamıştır.#!"
