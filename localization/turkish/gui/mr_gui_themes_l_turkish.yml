l_turkish:
 theme_mr_paleontology: "Morgenröte: Paleontoloji (Topraksal)"
 theme_mr_paleontology_desc: "Paleontoloji, Fosiller ve Dinozor Kemiklerinden ilham alan bir Kullanıcı Arayüzü."
 mr_papermap_coprolite: "Paleontoloji: Koprolit"
 mr_papermap_coprolite_desc: "It seems like a Paleontologist is currently working on preparing a coprolite. You wonder what coprolite is? It is fossilized poop. In this case probably from a dinosaur."
 mr_papermap_belemnite: "Paleontoloji: Belemnit"
 mr_papermap_belemnite_desc: "Bir Paleontolog tarafından bulunmuş bir Belemnit fosili. Bu yaratıklar 358 ile 66 milyon yıl önce denizlerde dolaşıyordu."
 mr_papermap_ammonite: "Paleontoloji: Ammonit"
 mr_papermap_ammonite_desc: "En ünlü fosillerden biri. Bu Ammonit bir zamanlar milyonlarca yıl önce denizde dolaşıyordu. Şimdi masanız için güzel bir dekorasyon."
 mr_papermap_trilobite: "Paleontoloji: Trilobit"
 mr_papermap_trilobite_desc: "Trilobitler ilk eklembacaklılar arasındaydı ve oldukça başarılıydılar. Ne yazık ki Permiyen döneminde soyu tükendi. Neyse ki bazıları fosilleşti ve onları masanızda hatıra olarak saklayabilirsiniz."
 mr_papermap_battenberg_cake: "Mutfak: Battenberg Pastası"
 mr_papermap_battenberg_cake_desc: "Aç mısınız? Belki de bu lezzetli pastayı masanıza koymalısınız. Üzeri badem ezmesiyle kaplı bir pandispanyadır ve adını Prens Louis of Battenberg'den almıştır."
 mr_papermap_old_fashioned: "Mutfak: Old Fashioned"
 mr_papermap_old_fashioned_desc: "Uzun bir günün sonunda iyi bir Old Fashioned'tan daha iyi ne olabilir? Şüphesiz barmeniniz bu kokteylle sizi mutlu bir ruh haline sokacaktır!"
 mr_papermap_cucumber_ice_cream: "Mutfak: Salatalıklı Dondurma"
 mr_papermap_cucumber_ice_cream_desc: "Güneş gökyüzünden parlıyor, sıcak ve güneşli bir gün. Harika bir şekilde ferahlatıcı salatalıklı dondurmadan daha iyi ne olabilir?"
 mr_papermap_croissant_hot_chocolate: "Mutfak: Kruvasan ve Sıcak Çikolata"
 mr_papermap_croissant_hot_chocolate_desc: "Sabahları bir kruvasan ve sıcak çikolata güne başlamanın en iyi yoludur. Sizi ne bekliyor olursa olsun."