l_turkish:
 theme_mr_paleontology: "Morgenröte: Paleontoloji (Toprak)" #deepl:1069050187
 theme_mr_paleontology_desc: "Paleontoloji, Fosiller ve Dinozor Kemiklerinden Esinlenen Bir Kullanıcı Arayüzü." #deepl:415348285

 mr_papermap_coprolite: "Paleontoloji: Koprolit"
 mr_papermap_coprolite_desc: "Görünüşe göre bir Paleontolog şu anda bir koprolit hazırlamak için çalışıyor. Koprolitin ne olduğunu merak ediyor musunuz? Fosilleşmiş dışkıdır. Bu durumda muhtemelen bir dinozora ait."
 mr_papermap_belemnite: "Paleontoloji: Belemnit" #Please replace
 mr_papermap_belemnite_desc: "Bir Paleontolog tarafından bulunan bir Belemnit fosili. Bu canlılar 358 ila 66 milyon yıl önce denizlerde dolaşıyordu." #Please replace
 mr_papermap_ammonite: "Paleontoloji: Ammonit" #Please replace
 mr_papermap_ammonite_desc: "En ünlü fosillerden biri. Bu Ammonit milyonlarca yıl önce denizlerde dolaşıyordu. Şimdi masanız için güzel bir dekorasyon." #Please replace
 mr_papermap_trilobite: "Paleontoloji: Trilobit"
 mr_papermap_trilobite_desc: "Trilobitler ilk eklembacaklılar arasındaydı ve çok başarılıydılar. Ne yazık ki Permiyen'de soyları tükendi. Neyse ki bazıları fosilleşmiş ve onları hatıra olarak masanızda tutabilirsiniz."

 mr_papermap_battenberg_cake: "Mutfak: Battenberg Pastası"
 mr_papermap_battenberg_cake_desc: "Acıktınız mı? Belki de bu lezzetli pastayı masanıza koymalısınız. Badem ezmesiyle kaplı bir pandispanyadır ve adını Battenberg Prensi Louis'den alır."
 mr_papermap_old_fashioned: "Mutfak: Old Fashioned"
 mr_papermap_old_fashioned_desc: "Uzun bir günün sonunda iyi bir Old Fashioned'dan daha iyi ne olabilir? Elbette barmeniniz bu kokteylle sizi mutlu bir ruh haline sokacaktır!"
 mr_papermap_cucumber_ice_cream: "Mutfak: Salatalıklı Dondurma"
 mr_papermap_cucumber_ice_cream_desc: "Güneş gökyüzünden parlıyor, sıcak ve güneşli bir gün. Harika ferahlatıcı bir salatalıklı dondurmadan daha iyi ne olabilir?"
 mr_papermap_croissant_hot_chocolate: "Mutfak: Kruvasan ve Sıcak Çikolata"
 mr_papermap_croissant_hot_chocolate_desc: "Sabahları bir kruvasan ve sıcak bir çikolata güne başlamanın en iyi yoludur. Sizi neyin beklediği önemli değil."
