 panum_physician_no_physician_loc: "Bu [concept_panum_physician]#! adresinin #V Başarıları, bir tane elde ettiğinizde burada görüntülenecektir." #deepl:3202202811
 panum_physician_achievements_intro_loc: "#V Bu Hekimin Başarıları#!\n[Scope.GetCharacter.GetFullName] başarılı bir Hekimdir." #deepl:2011576622

 panum_physician_achievement_successful_treatments_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hastaları tedavi etme konusunda deneyimlidir ve #o  [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] hastaları#! başarıyla tedavi etmiştir." #deepl:2185896488
 panum_physician_achievement_epidemiologist_loc: "\[Scope.GetCharacter.GetSheHe|U] hastalıkları kapsamlı bir şekilde incelemiş ve bir #o $panum_epidemiologist$ #! haline gelmiştir." #deepl:1702393838
 panum_physician_achievement_surgeon_loc: "\[Scope.GetCharacter.GetSheHe|U] birçok ameliyat gerçekleştirmiştir ve bu nedenle iyi bir #o $panum_surgeon$ #! olarak kabul edilmektedir." #deepl:3171499380
 panum_physician_achievement_psychiatrist_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] insan zihnini kapsamlı bir şekilde incelemiştir ve ünlü bir #o  $panum_psychiatrist$ #! ." #deepl:60079648
 panum_physician_achievement_military_physician_loc: "\Bir #o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] olarak savaşın dehşetini gördü ve korkunç koşullar altında insanlara nasıl davranılacağını biliyor." #deepl:696092700
 panum_physician_achievement_germ_theory_inventor_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] şimdiden binlerce insanın hayatını kurtaran #o Mikrop Teorisini#! icat etmiştir." #deepl:2770995117
 panum_physician_achievement_pneumothorax_inventor_loc: "\ [Scope.GetCharacter.GetHerHim] 'un en büyük icatlarından biri #o yapay bir Pnömotoraks#! oluşturmak için kullanılan bir Cihazıdır. Bu, akciğerlerin çökmesine neden olarak Tüberküloz tedavisine yardımcı olabilir." #deepl:304953214
 panum_physician_achievement_thoracoplasty_inventor_loc: "\ [Scope.GetCharacter.GetHerHis] cerrahi becerileri sayesinde Doktor [Scope.GetCharacter.GetLastNameNoFormatting] Torakoplasti#! adı verilen Akciğer Cerrahisinde devrim yaratan bir #o Prosedürü icat etti ve böylece Tüberküloz hastalarının daha iyi tedavi edilmesini sağladı." #deepl:3014173894
 panum_physician_achievement_attended_medical_congress_loc: "\[Scope.GetCharacter.GetSheHe] en az bir #o Tıp Kongresine#! katılmış ve [Scope.GetCharacter.GetHerHis] fikirlerini paylaşmıştır." #deepl:1479296090
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] #o  Aspirin'in#! en önemli mucidi olarak kabul edilmektedir ve sadece sayısız hastaya ağrı kesici sağlamakla kalmamış, aynı zamanda ilaç endüstrisinde de devrim yaratmıştır." #deepl:2162525717
 panum_physician_achievement_xray_inventor_loc: "\ #o X-ışınlarının keşfiyle#! Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] tıp ve fizikte eşit ölçüde devrim yaratan önde gelen uluslararası fizikçilerden biri olarak kabul edilmektedir." #deepl:34275984
 panum_physician_achievement_bloodtypes_inventor_loc: "\A, B, AB ve 0#! olarak adlandırılan farklı #o Kan Gruplarının keşfedilmesiyle Dr. [Scope.GetCharacter.GetLastNameNoFormatting] kan hakkında daha fazla bilgi sahibi olmamızda ve kan nakillerinin daha başarılı olmasında önemli bir rol oynamıştır." #deepl:3740473168
 panum_physician_achievement_ecg_inventor_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tarafından icat edilen #o EKG#!, kalbin elektriksel aktivitesini ölçmeyi mümkün kılmış ve hastane operasyonlarında bir kilometre taşını temsil etmiştir." #deepl:2321856106
 panum_physician_achievement_transplantation_inventor_loc: "\ #o İlk Transplantasyon#! ile Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tıp tarihinde bir yer edinmiştir." #deepl:2933890993
 panum_physician_achievement_stereotactic_method_inventor_loc: "\ #o icat ettiği Stereotaktik Yöntem#! [Scope.GetCharacter.GetSheHe] bugün beyin cerrahisinde çığır açıcı olarak kabul edilmektedir." #deepl:147308326
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Kardiyopulmoner Bypass'ı#! geliştirerek modern tıbbın başyapıtlarından birine imza atmıştır." #deepl:3531788201
 panum_physician_achievement_endoscope_inventor_loc: "\[Scope.GetCharacter.GetHerHis|U] insan içinin ilk kez incelenebildiği #o Endoskop#! buluşu da özellikle hatırlanmaktadır." #deepl:2202274893
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] göz hastalıklarının incelenmesini kolaylaştıran bir cihaz icat ederek oftalmolojiye paha biçilmez bir hizmette bulundu: #o Oftalmoskop#!." #deepl:657308744
 panum_physician_achievement_chemotherapy_inventor_loc: "\nEn inatçı hastalıkları bile çeşitli ilaçlarla tedavi etmek için geliştirilen #o Kemoterapi#! [Scope.GetCharacter.GetSheHe] kanser hastalarına bile her şeyin boşuna olmadığı umudunu veriyor." #deepl:1291980204
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  Kritik ihtiyaç içindeki çocuk felci hastalarının yaşamlarını sürdürebilmeleri için İlk Demir Akciğerin#! inşası bu çağın en büyüleyici mühendislik başarılarından biri olarak kabul edilmektedir." #deepl:2605796385
 panum_physician_achievement_military_medicine_project_finished_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  sahra tıbbı alanında en son yöntemleri icat ederek#! askeri sağlık hizmetlerini dünyada en çok tanınanlardan biri haline getirmiştir." #deepl:3753274088
 panum_physician_achievement_inaugurated_asylum_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] akıl hastalarına kapsamlı ve insani yardım sağlamak amacıyla ülkenin #o İlk Akıl Hastanesinin#! kurulmasında önemli bir rol oynamıştır." #deepl:2471346129
 panum_physician_achievement_anthrax_disease_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Şarbon#! konusunda uzmanlaşmış etkili korunma ve tedavi yöntemleri geliştirmiştir." #deepl:2201385397
 panum_physician_achievement_goiter_disease_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Guatr konusunda uzmanlaşmış#! etkili korunma ve tedavi yöntemleri geliştirmiştir." #deepl:693298154
 panum_physician_achievement_nephrolithiasis_disease_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Nefrolitiazis#! konusunda uzmanlaşmıştır ve bu konuda etkili önleme ve tedavi yöntemleri geliştirmiştir." #deepl:3950905505
 panum_physician_achievement_pellagra_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Pellagra#! üzerinde uzmanlaşmış ve bu hastalık için etkili önleme ve tedavi yöntemleri geliştirmiştir." #deepl:1987809959
 panum_physician_achievement_rickets_disease_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Raşitizm#! konusunda uzmanlaşmış etkili korunma ve tedavi yöntemleri geliştirmiştir." #deepl:660217329
 panum_physician_achievement_syphilis_disease_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Sifiliz#! konusunda uzmanlaşmış bu konuda etkili önleme ve tedavi yöntemleri geliştirmiştir." #deepl:908555016
 panum_physician_achievement_tetanus_disease_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Tetanos#! konusunda uzmanlaşmış ve bu hastalık için etkili korunma ve tedavi yöntemleri geliştirmiştir." #deepl:1982558023
 panum_physician_achievement_basketball_inventor_loc: "\n [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  Basketbol adında yeni bir takım sporu icat etti#!" #deepl:207476415
