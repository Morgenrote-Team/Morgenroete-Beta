num_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "#V Bu [concept_panum_physician]'ın Başarıları#! burada, bir tane edindikten sonra görüntülenecek."
 panum_physician_achievements_intro_loc: "#V Bu Hekimin Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] başarılı bir Hekimdir.#!"
 panum_physician_achievement_successful_treatments_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hasta tedavisinde deneyimlidir ve #o [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] hastayı başarıyla tedavi etmiştir#!.#!"
 panum_physician_achievement_epidemiologist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] hastalıkları kapsamlı bir şekilde inceledi ve bir #o $panum_epidemiologist$#! oldu.#!"
 panum_physician_achievement_surgeon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] birçok ameliyat gerçekleştirdi ve bu nedenle iyi bir #o $panum_surgeon$#! olarak kabul ediliyor.#!"
 panum_physician_achievement_psychiatrist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] insan zihnini kapsamlı bir şekilde inceledi ve #o ünlü bir $panum_psychiatrist$#!.#!"
 panum_physician_achievement_military_physician_loc: "\n #indent_newline:3 • Bir #o $panum_military_physician$#! olarak [Scope.GetCharacter.GetSheHe] savaşın dehşetlerini gördü ve korkunç koşullar altında insanları nasıl tedavi edeceğini biliyor.#!"
 panum_physician_achievement_germ_theory_inventor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Mikrop Teorisini#! icat etti ve bu teori şimdiden binlerce hayat kurtardı.#!"
 panum_physician_achievement_pneumothorax_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHim] en büyük icatlarından biri #o Yapay Pnömotoraks oluşturmak için bir Cihaz#!'dır. Bu, akciğerlerin çökmesine neden olur ve Tüberküloz tedavisine yardımcı olabilir.#!"
 panum_physician_achievement_thoracoplasty_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] cerrahi becerileri sayesinde, Doktor [Scope.GetCharacter.GetLastNameNoFormatting] #o Torakoplasti adı verilen ve Akciğer Cerrahisinde devrim yaratan bir Prosedür#! icat etti ve böylece Tüberküloz hastalarının tedavisinin iyileştirilmesini sağladı.#!"
 panum_physician_achievement_attended_medical_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] en az bir #o Tıp Kongresi#!'ne katıldı ve [Scope.GetCharacter.GetHerHis] fikirlerini paylaştı.#!"
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\n #indent_newline:3 • Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] #o Aspirin#!'in temel mucidi olarak kabul edilir ve sayısız hastaya ağrı kesici sağlamakla kalmamış, aynı zamanda ilaç endüstrisinde de devrim yaratmıştır.#!"
 panum_physician_achievement_xray_inventor_loc: "\n #indent_newline:3 • #o X-ışınları#!'nın keşfiyle, Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] tıp ve fiziği eşit ölçüde devrimseyen önde gelen uluslararası fizikçilerden biri olarak kabul edilir.#!"
 panum_physician_achievement_bloodtypes_inventor_loc: "\n #indent_newline:3 • Farklı #o Kan Gruplarının, yani A, B, AB ve 0#!'nın keşfiyle, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] kan hakkında daha fazla şey anlamamızı ve kan nakillerinin daha başarılı olmasını sağlamada önemli bir rol oynamıştır.#!"
 panum_physician_achievement_ecg_inventor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tarafından icat edilen #o EKG#!, kalbin elektriksel aktivitesini ölçmeyi mümkün kıldı ve hastane operasyonlarında bir dönüm noktası temsil eder.#!"
 panum_physician_achievement_transplantation_inventor_loc: "\n #indent_newline:3 • #o İlk Nakil#! ile Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tıp tarihinde bir yer edindi.#!"
 panum_physician_achievement_stereotactic_method_inventor_loc: "\n #indent_newline:3 • Günümüze kadar, [Scope.GetCharacter.GetSheHe]'ın icat ettiği #o Stereotaktik Yöntem#! beyin cerrahisinde çığır açıcı olarak kabul edilir.#!"
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\n #indent_newline:3 • Bir #o Kardiyopulmoner Baypas#! geliştirmesiyle, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] modern tıbbın bir başyapıtını başarmıştır.#!"
 panum_physician_achievement_endoscope_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] insan içinin ilk kez incelenebilmesini sağlayan #o Endoskop#! icadı da özellikle hatırlanır.#!"
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] göz hastalıklarının incelenmesini kolaylaştıran ve böylece oftalmolojiye paha biçilmez bir hizmet sunan bir aparat icat etti: #o Oftalmoskop#!.#!"
 panum_physician_achievement_chemotherapy_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe]'ın en inatçı hastalıkları bile çeşitli ilaçlarla tedavi etmek için geliştirdiği #o Kemoterapi#!, kanser hastalarına bile her şeyin boşuna olmadığına dair umut veriyor.#!"
 panum_physician_achievement_iron_lung_inventor_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] hayati tehlike altındaki çocuk felci hastalarının yaşamlarını sürdürmek için #o İlk Demir Ciğerin İnşası#!, bu çağın en büyüleyici mühendislik Başarılarından biri olarak kabul edilir.#!"
 panum_physician_achievement_military_medicine_project_finished_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o sahra tıbbı alanında en son yöntemleri icat etmiş#! ve askeri tıbbi hizmetleri dünyanın en tanınmışlarından biri haline getirmiştir.#!"
 panum_physician_achievement_inaugurated_asylum_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] akıl hastalarına kapsamlı ve insani yardım sağlamak için ülkenin #o İlk Akıl Hastanesi#!'nin kurulmasında çok önemli bir rol oynadı.#!"
 panum_physician_achievement_anthrax_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Şarbon#! üzerine uzmanlaşmış ve bunun için etkili korunma ve tedavi yöntemleri geliştirmiştir.#!"
 panum_physician_achievement_goiter_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Guatr#! üzerine uzmanlaşmış ve bunun için etkili korunma ve tedavi yöntemleri geliştirmiştir.#!"
 panum_physician_achievement_nephrolithiasis_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Nefrolitiyazis#! üzerine uzmanlaşmış ve bunun için etkili korunma ve tedavi yöntemleri geliştirmiştir.#!"
 panum_physician_achievement_pellagra_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Pellagra#! üzerine uzmanlaşmış ve bunun için etkili korunma ve tedavi yöntemleri geliştirmiştir.#!"
 panum_physician_achievement_rickets_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Raşitizm#! üzerine uzmanlaşmış ve bunun için etkili korunma ve tedavi yöntemleri geliştirmiştir.#!"
 panum_physician_achievement_syphilis_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Frengi#! üzerine uzmanlaşmış ve bunun için etkili korunma ve tedavi yöntemleri geliştirmiştir.#!"
 panum_physician_achievement_tetanus_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Tetanoz#! üzerine uzmanlaşmış ve bunun için etkili korunma ve tedavi yöntemleri geliştirmiştir.#!"
 panum_physician_achievement_basketball_inventor_loc: "\n #indent_newline:3 • [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] yılında Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o Basketbol adında yeni bir takım sporu icat etmiştir#!#!"