 tesla_engineer_achievements_invented_steel_frame_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] Çelik Çerçeveler#! kullanarak ilk #V Binayı inşa etti. Bu inşaat yöntemi bir orman yangını gibi tüm dünyaya yayıldı." #deepl:3716706247
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\ [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] 'de [Scope.GetCharacter.GetLastNameNoFormatting] yanmalı motora sahip bir #V otomobili icat etti#! ve uzun bir mesafeye sürdü. Bu, otomobilin hızla yayılmasının başlangıcı oldu." #deepl:88145422
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] geliştirilmiş #V Yol Ağları#!. Yolların modernleştirilmesine yönelik [Scope.GetCharacter.GetHerHis] çalışmaları sayesinde yollar artık dünyanın en modern yolları olarak kabul edilmektedir." #deepl:2097415548
 tesla_engineer_achievements_finished_bridge_project_loc: "\[Scope.GetCharacter.GetSheHe] çok sayıda #V Yeni Köprü#! inşa etti ve bu da daha iyi bir altyapı sağladı." #deepl:2671184667
 tesla_engineer_achievements_finished_tunnel_project_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] küçük birer teknoloji harikası olan #V Tünellerinin#! inşası üzerinde çalışıyordu." #deepl:922154902
 tesla_engineer_achievements_finished_railway_project_loc: "\[Scope.GetCharacter.GetSheHe] yeni teknoloji ve diğer iyileştirmeleri uygulayarak Demiryolu Hatlarını #V büyük ölçüde#! geliştirdi." #deepl:721890021
 tesla_engineer_achievements_finished_construction_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  modern ekipman ve inşaat tekniklerini tanıtarak İnşaat Sektörlerini#! geliştirdi." #deepl:987346687
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\[Scope.GetCharacter.GetSheHe] gelecekteki inşaat projelerini kolaylaştıran yeni bir #V Topografik Harita#! oluşturdu." #deepl:2317700588
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  Demiryollarını canlandıracak yeni Lokomotifler#! geliştirdi." #deepl:2246312284
 tesla_engineer_achievements_finished_production_methods_project_loc: "\[Scope.GetCharacter.GetSheHe|U] çeşitli şirketlerin #V Üretimlerini#! geliştirmelerine yardımcı olmuştur." #deepl:3837789510
 tesla_engineer_achievements_finished_rifles_project_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  dünyanın en modern tüfeklerinden biri olan yeni bir Tüfek#! tasarladı." #deepl:373585695
 tesla_engineer_achievements_finished_tanks_project_loc: "\[Scope.GetCharacter.GetSheHe] Tanklarımızı modernize eden bir #V Tank Tasarımı ve Yapımı Öncüsüdür#!." #deepl:1266234006
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  birçok askerin hayatını kurtaran Saha Çalışmaları ve Savunmalarda#! devrim yarattı." #deepl:3300715553
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  bir Jeomanyetik Gözlemevi#! kurarak jeomanyetik araştırmaların yürütülmesine yardımcı olmuştur." #deepl:2611684424
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] bir #V Telgraf Ağı#! kurdu." #deepl:3900781177
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  bir Radyo Ağı kurdu#!." #deepl:494089721
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  Havaalanlarını modernize etti#!." #deepl:4174187253
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] geliştirildi #V Ordu için Modern Uçaklar#!." #deepl:3583316823
