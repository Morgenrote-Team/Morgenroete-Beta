ments_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_suez_india_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_suez_india_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transpacific_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transpacific_cable_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "The #V Achievements of this [concept_tesla_engineer]#! will be displayed here, once you have one."
 tesla_engineer_achievements_intro_loc: "#V Bu Mühendisin Başarıları#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] ilk #V Çelik Çerçeve Kullanan Bina#!'yı inşa etti. Bu inşaat yöntemi dünyada orman yangını gibi yayıldı.#!"
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented.#!"
 tesla_engineer_achievements_invented_automobile_loc: "\n #indent_newline:3 • [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] yılında [Scope.GetCharacter.GetLastNameNoFormatting] #V İçten Yanmalı Motorlu Bir Araba#! icat etti ve onu uzun bir mesafe sürdü. Bu, otomobilin patlayıcı yayılışının başlangıcını işaret etti.#!"
 tesla_engineer_achievements_finished_road_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] #V Karayolu Ağlarını#! iyileştirdi. Yolları modernize etme çalışmaları sayesinde artık dünyanın en modernleri olarak kabul ediliyorlar.#!"
 tesla_engineer_achievements_finished_bridge_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] built many #V New Bridges#! which resulted in a better infrastructure.#!"
 tesla_engineer_achievements_finished_tunnel_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] teknolojinin küçük harikaları olan birçok #V Tünel#! inşası üzerinde çalışıyordu.#!"
 tesla_engineer_achievements_finished_railway_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] massively #V improved Railway Lines#! by implementing new technology and other improvements.#!"
 tesla_engineer_achievements_finished_construction_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] modern ekipman ve inşaat teknikleri getirerek #V İnşaat Sektörlerini#! iyileştirdi.#!"
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] created a new #V Topographic Map#! that eases future construction projects.#!"
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] Demiryollarını güçlendirecek #V yeni Lokomotifler#! geliştirdi.#!"
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] helped various companies to #V improve their Production#!.#!"
 tesla_engineer_achievements_finished_rifles_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] dünyanın en modernlerinden biri olan #V yeni bir Tüfek#! tasarladı.#!"
 tesla_engineer_achievements_finished_tanks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is a #V Pioneer of Tank Design and Construction#! who modernized our Tanks.#!"
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V Savaş Mühendisliği ve Savunmalarda Devrim Yaptı#! ve bu birçok askerin hayatını kurtardı.#!"
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V bir Jeomanyetik Gözlemevi inşa ederek#! jeomanyetik araştırmalar yapılmasına yardımcı oldu.#!"
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] built a #V Telegraphy Network#!.#!"
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V bir Radyo Ağı kurdu#!.#!"
 tesla_engineer_achievements_finished_airport_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V Havaalanlarını modernleştirdi#!.#!"
 tesla_engineer_achievements_finished_warplane_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] developed #V Modern Airplanes for the Military#!.#!"
 tesla_engineer_achievements_bicycle_invented_loc: "\n #indent_newline:3 • [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] yılında [Scope.GetCharacter.GetLastNameNoFormatting] #V ilk Bisikleti icat etti#!. Sadece kendi enerjinizi kullanarak seyahat etmenin harika bir yeni yolu.#!"
 tesla_engineer_achievement_transatlantic_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting]  was chief engineer during the construction of the transatlantic cable in [GetGlobalVariable('tesla_transatlantic_cable_year_global_var').GetValue|V] and is thus the author of a technical masterpiece.#!"
 tesla_engineer_achievement_suez_india_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] oversaw the laying of the Suez-India cable in [GetGlobalVariable('tesla_suez_india_cable_year_global_var').GetValue|V], establishing a crucial link between continents through disciplined engineering.#!"
 tesla_engineer_achievement_transpacific_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] directed the transpacific cable expedition in [GetGlobalVariable('tesla_transpacific_cable_year_global_var').GetValue|V], achieving one of the most demanding feats in maritime telegraphy.#!"