 dubois_paleontologist_no_paleontologist_loc: "#V Bu [concept_dubois_paleontologist]'ın Başarıları#! burada, bir tane edindikten sonra görüntülenecek."
 dubois_paleontologist_achievements_intro_loc: "#V Bu Paleontologun Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')]'dır ve [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ile [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] toplamıştır.#!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] dünyadaki #V ilk Paleontoloji Müzesi#!'ni kurarak dikkat çekici bir fosil koleksiyonunu sergiledi.#!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting], dinozorların neslinin tükenmesi gizemini çözmeye adanmış bir kongreye katıldı.#!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] tarih öncesi bir sivrisinek içeren ve muhtemelen dinozor kanı bulunan nadir bir #V Kehribar#! parçası keşfetti.#!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] kadim deniz sedimentlerinin incelenmesine yardımcı olan bir #V Ammonit#! ortaya çıkardı.#!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ın #V Archaeopteryx#! bulgusu, dinozorlar ve kuşlar arasındaki kilit bir bağlantı olarak selamlandı.#!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] tarafından bulunan kadim kabuklar olan #V Composita#!lar, tarih öncesi yaşam hakkında içgörü sunar.#!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] tarafından keşfedilen #V Eusthenopteron#! fosili, karada yaşam için erken adaptasyonları ortaya koyar.#!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tarafından bulunan #V İchthyosaurus#!, canlı doğum yapan yunus benzeri bir sürüngendi.#!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] en erken kara omurgalılarından biri olan #V Ichthyostega#!'yı ortaya çıkardı.#!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] 6 metreye kadar ulaşan tarih öncesi bir tembel hayvan olan dev #V Megatherium#!'u keşfetti.#!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] kadim göl kıyılarından kanatlı bir dinozor olan #V Pterodactylus#! fosili buldu.#!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] efsanevi kılıç dişli avcı olan iyi korunmuş bir #V Smilodon#! ortaya çıkardı.#!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] buluntuları arasında kaya katmanlarını tarihlemek için önemli indeks fosiller olan #V Trilobitler#! vardır.#!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n #indent_newline:3 • Yeni Zelanda'da Dr. [Scope.GetCharacter.GetLastNameNoFormatting] dev bir yırtıcı kuş olan büyük #V Haast Kartalı#!'nı keşfetti.#!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] meslektaşları tarafından hayranlıkla karşılanan kusursuz bir #V Ankylosaurus#! rekonstrüksiyonu gerçekleştirdi.#!"
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] bazı kusurları olan bir #V Ankylosaurus#! rekonstrüksiyonu yaptı.#!"
