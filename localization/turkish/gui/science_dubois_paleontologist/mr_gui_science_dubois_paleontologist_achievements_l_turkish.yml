 dubois_paleontologist_achievement_perfect_triceratop_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ın #V Triceratops#! rekonstrüksiyonu ünlüdür ve müzenin prestijini yükseltir.#!"
