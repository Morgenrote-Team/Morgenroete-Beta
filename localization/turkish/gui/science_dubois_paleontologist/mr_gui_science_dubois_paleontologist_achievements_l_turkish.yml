 dubois_paleontologist_no_paleontologist_loc: "Bu [concept_dubois_paleontologist]#! adresinin #V Başarıları, bir tane elde ettiğinizde burada görüntülenecektir." #deepl:2334446280
 dubois_paleontologist_achievements_intro_loc: "#V Bu Paleontolog'un başarıları#!\n[Scope.GetCharacter.GetFullNameNoFormatting] toplam [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] toplayan [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] 'dir." #deepl:39291484

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\[Scope.GetCharacter.GetSheHe|U] çeşitli fosilleri sergileyen dünyanın ilk Paleontoloji Müzesi'ni #V #! kurdu." #deepl:2735413684
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] dinozorların soyunun nasıl tükendiğini belirlemeye çalışan bir kongreye katıldı." #deepl:3929204720
 dubois_paleontologist_achievement_fossil_amber_loc: "\[Scope.GetCharacter.GetSheHe|U] içinde küçük bir sivrisineğin bulunduğu eşsiz bir #V Kehribar#! parçası buldu. Belki içinde biraz dinozor kanı bile vardır?" #deepl:1354321492
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] deniz tortularının kronolojik olarak sınırlandırılmasına yardımcı olacak bir #V Ammonit#! buldu." #deepl:2717312690
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\nBirçok kişi Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un keşfini ilk kuş olarak kabul etmektedir. Gerçekten de #V Archaeopteryx#! dinozorlar ve kuşlar arasındaki kayıp halka gibi görünmektedir." #deepl:3644254959
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Compositas#! milyonlarca yıl önce neredeyse her kıtada yaşamış deniz kabuklarıdır. Profesör [Scope.GetCharacter.GetLastNameNoFormatting] [Scope.GetCharacter.GetHerHis] kazılarından birinde bir tane buldu." #deepl:1938126946
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\İlginçtir ki [Scope.GetCharacter.GetSheHe] 'un bulduğu #V Eusthenopteron#! 'un ön yüzgecinde belirgin bir humerus, ulna ve radius bulunmaktadır. Bu kemikler karada yaşayan tüm omurgalılarda mevcuttur." #deepl:1906215431
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\#V Dr. [Scope.GetCharacter.GetLastNameNoFormatting] 'un bir tanesini bulduğu Ichthyosaura#! çok benzersiz bir sürüngendir. Yunusları andırır ve yumurtlamaz ama yavrularını canlı doğurur ki bu sürüngenler için çok nadirdir." #deepl:1058896905
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\Profesör [Scope.GetCharacter.GetLastNameNoFormatting] #V  Ichthyostega#!'nın keşfi ile karada yaşayan en eski hayvanlardan birini buldu. Balıklar ve uzuvlu tetrapodomorflar arasındaki kayıp halkadır." #deepl:178680301
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un keşiflerinden birinin de gösterdiği gibi, bugün küçük olan tembel hayvanlar geçmişte çok büyüktü. #V  Megatherium#! 6 metre (20 ft) uzunluğundaydı." #deepl:2625011393
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\[Scope.GetCharacter.GetSheHe|U] muhtemelen göllere ve nehirlere yakın yerlerde yaşayan kanatlı bir dinozor olan #V Pterodactylus#! fosilini keşfetti." #deepl:1358755979
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\ #V Smilodon#! birkaç bin yıl öncesine kadar yaşamış korkunç bir yırtıcıdır. Profesör [Scope.GetCharacter.GetLastNameNoFormatting] çok iyi korunmuş bir iskelet buldu." #deepl:209509221
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\ [Scope.GetCharacter.GetHerHis] küçük keşiflerinden biri de çeşitli T#V Trilobitler#!. Muhteşem olmasalar da, harika indeks fosilleridir." #deepl:623281739
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\nYeni Zelanda'da Dr. [Scope.GetCharacter.GetLastNameNoFormatting] [Scope.GetCharacter.GetSheHe] şimdi #V Haast Kartalı#! olarak adlandırılan devasa bir Kartal bulduğunda büyüleyici bir keşif yaptı." #deepl:758643186
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] bir #V Ankylosaurus'u#! mükemmel bir şekilde yeniden inşa etti. Diğer Paleontologlar bu rekonstrüksiyona hayran kaldılar." #deepl:2799229951
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] bir #V Ankylosaurus'u#! ancak kusurlu bir şekilde yeniden inşa etti." #deepl:3408874547
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] #V  Ankylosaurus'u#! yeniden inşa etti ancak bu korkunç bir girişimdi ve diğer Paleontologlar tarafından alay konusu oldu." #deepl:2085395454
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\[Scope.GetCharacter.GetHerHis|U] bir #V Diplodocus#! rekonstrüksiyonu kesinlikle mükemmeldir ve her paleontoloji müzesini kıskandırır." #deepl:3626804845
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\[Scope.GetCharacter.GetHerHis|U] bir #V Diplodocus#! rekonstrüksiyonu yeterince iyi." #deepl:412034719
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] #V  Diplodocus'un#! yeniden inşası felakettir ve bir iğrençlik olarak görülür." #deepl:3022704965
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un #V Triceratops#! rekonstrüksiyonunun mükemmelliği yaygın olarak bilinmektedir ve paleontolojik koleksiyonumuzun prestijini artırmıştır." #deepl:2010941711
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un #V Triceratops#! rekonstrüksiyonunun sıradanlığı müzemiz için yeterince iyi ama olağanüstü bir şey değil." #deepl:996647347
 dubois_paleontologist_achievement_poor_triceratop_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un #V Triceratops#! rekonstrüksiyonunun dehşeti koleksiyonumuz için bir utançtır." #deepl:1193371056
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\nBir #V Tyrannosaurus Rex#! muhteşem bir görüntüdür. Özellikle de Profesör [Scope.GetCharacter.GetLastNameNoFormatting] 'un mükemmel bir şekilde bir araya getirdiği." #deepl:2375174801
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\nBir #V Tyrannosaurus Rex#! muhteşem bir manzaradır. Profesörün [Scope.GetCharacter.GetLastNameNoFormatting] yeniden inşa ettiği gibi mükemmel bir şekilde bir araya getirilmemiş olsa bile." #deepl:2816655238
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\nBir #V Tyrannosaurus Rex#! muhteşem bir manzaradır. Ama Profesör [Scope.GetCharacter.GetLastNameNoFormatting] 'un bir araya getirdiği değil. Bu sadece absürd bir canavarlık." #deepl:2924846018
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\ [Scope.GetCharacter.GetSheHe] 'un bir araya getirdiği #V Stegosaurus#! iskeleti dinozor sergimiz için mükemmel bir parça." #deepl:1011030116
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\ [Scope.GetCharacter.GetSheHe] 'un bir araya getirdiği #V Stegosaurus#! iskeleti dinozor sergimiz için iyi bir parça." #deepl:3364926958
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\ [Scope.GetCharacter.GetSheHe] 'un bir araya getirdiği korkunç #V Stegosaurus#! iskeleti dinozor sergimizde yer israfıdır." #deepl:1841850726
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\Herkes bir #V Antarktosaurus#! 'u Dr. [Scope.GetCharacter.GetLastNameNoFormatting] kadar mükemmel bir şekilde bir araya getiremez. Koleksiyonumuzun en önemli parçalarından biridir." #deepl:4276626573
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\nBir #V Antarktosaurus#! bir araya getirmek zor bir iştir, ancak Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bunu oldukça iyi başardı." #deepl:4006286419
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\nHerkes bir #V Antarktosaurus#! monte edemez. Ancak pek az kişi Dr. [Scope.GetCharacter.GetLastNameNoFormatting] kadar kötü bir şekilde bir araya getirebilir. Bu koleksiyonumuzun utancıdır." #deepl:3523325515
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\Koleksiyonumuzdaki harika #V Argyrosaurus#! iskeleti Profesör [Scope.GetCharacter.GetLastNameNoFormatting]'un eseridir. Gerçekten muhteşem bir iskelet." #deepl:2395444631
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\Koleksiyonumuzdaki #V Argyrosaurus#! iskeleti Profesör [Scope.GetCharacter.GetLastNameNoFormatting]'un eseridir. Oldukça iyi yapılmış bir iskelet." #deepl:2170414433
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\nKoleksiyonumuzdaki korkunç #V Argyrosaurus#! iskeleti Profesör [Scope.GetCharacter.GetLastNameNoFormatting]'un eseridir. Belli ki beceriksiz bir paleontologun eseri." #deepl:2917340443
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] bir #V Iguanodon#! iskeletini mükemmel bir şekilde bir araya getirdi." #deepl:3595520963
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\[Scope.GetCharacter.GetSheHe|U] bir #V Iguanodon#! iskeletini bir araya getirdi." #deepl:948446383
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\[Scope.GetCharacter.GetSheHe|U] bir #V Iguanodon#! iskeletini korkunç derecede yanlış bir şekilde bir araya getirdi." #deepl:60351557
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  Plateosaurus#! iskeletini mükemmel bir şekilde yeniden oluşturmayı başardı. Koleksiyonumuz için harika bir sergi." #deepl:3288975063
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bir #V Plateosaurus#! iskeletini yeniden oluşturmayı başardı." #deepl:3540574047
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  Plateosaurus'un#! iskeletini yeniden oluşturmayı başardı. Ancak çok garip ve deforme görünüyor." #deepl:4210803243
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\nBir #V Giraffatitan'ı#! yeniden inşa etmek zor bir iştir ve çok fazla alana ihtiyaç duyar. Neyse ki Profesör [Scope.GetCharacter.GetLastNameNoFormatting] müzemizin büyüklüğünü dinozorun muhteşem bir iskeletini hazırlamak için kullanabildi." #deepl:1815044749
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\nBir #V Giraffatitan'ı#! yeniden inşa etmek zor bir iştir ve çok fazla alana ihtiyaç duyar. Neyse ki Profesör [Scope.GetCharacter.GetLastNameNoFormatting] dinozor iskeletini hazırlamak için müzemizin büyüklüğünü kullanabildi." #deepl:3585680135
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\ #V Giraffatitan'ı#! yeniden inşa etmek zor bir iştir ve çok fazla alana ihtiyaç duyar. Profesör [Scope.GetCharacter.GetSheHe] çalışmak için tüm müzeye sahip olsa da [Scope.GetCharacter.GetLastNameNoFormatting] dinozorun sadece absürt bir versiyonunu yaratabildi" #deepl:2737374971
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\nKoleksiyonumuzdaki korkunç #V Spinosaurus#! iskeleti Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tarafından bir araya getirilmiştir ve bir sanat eseridir." #deepl:493475787
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\nKoleksiyonumuzdaki korkunç #V Spinosaurus#! iskeleti Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tarafından bir araya getirilmiştir." #deepl:1960639131
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\Koleksiyonumuzdaki komik #V Spinosaurus#! iskeleti Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tarafından bir araya getirilmiştir. Kötü yapılmış ve bir dinozordan çok bir tavuğa benziyor." #deepl:308117810
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] 'un bir araya getirdiği #V Psittacosaurus#! gagayı andıran ağzıyla olağanüstü bir iskelet." #deepl:3089964090
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] 'un bir araya getirdiği #V Psittacosaurus#! gagayı andıran ağzıyla hoş bir iskelet." #deepl:1049217798
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\ #V Psittacosaurus'un#! gerçekten sırtında garip bir gagası ve ağzı yerine bir gövdesi var mıydı? En azından Profesör [Scope.GetCharacter.GetLastNameNoFormatting] öyle düşünüyor, ama o tek kişi olabilir." #deepl:4134331305
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\nKorkunç #V Velociraptor#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un başyapıtlarından biridir. Mükemmel bir şekilde bir araya getirilmiştir." #deepl:2793253329
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\Korkunç #V Velociraptor#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un iyi bir çalışmasıdır. [Scope.GetCharacter.GetSheHe] oldukça iyi bir şekilde bir araya getirmiştir." #deepl:4153443130
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\Korkunç #V Velociraptor#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un en kötü işlerinden biri. Her şeyden önce, çok küçük, ikincisi, kesinlikle bir taç olarak 10 pençeye sahip değildi..." #deepl:3768344000
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] 'un yeniden inşa ettiği #V Muttaburrasaurus#! oldukça etkileyiciydi ve bunun nedeni sadece büyüklüğü değildi." #deepl:877060609
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] 'un yeniden inşa ettiği #V Muttaburrasaurus#! büyüklüğü nedeniyle oldukça etkileyiciydi." #deepl:2230628960
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\Profesör [Scope.GetCharacter.GetLastNameNoFormatting] 'un yeniden inşa ettiği #V Muttaburrasaurus#! korkunçtu. Birincisi, diğer tüm paleontologlar başın kuyruğa bağlı olmadığını ve dizlerin diğer tarafa doğru büküldüğünü belirtmiştir." #deepl:1428907282
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\n #V Rhoetosaurus'un#! büyüklüğü etkileyici. Ancak Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un becerisi olmasaydı kesinlikle bu kadar etkileyici olmazdı." #deepl:2002445198
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\n #V Rhoetosaurus'un#! büyüklüğü etkileyici. Ama Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un becerisi olmasaydı kesinlikle daha az etkileyici olurdu." #deepl:2197585922
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\nKuyruğun #V Rhoetosaurus'un#! sırtına ait olduğunu düşünmek [Scope.GetCharacter.GetLastNameNoFormatting] muhtemelen Dr. 'un en aptalca fikriydi. En azından henüz..." #deepl:2580418601
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 'un yeniden inşa ettiği #o Msasaurus#! denizden gelen devasa bir canavardır." #deepl:4291663506
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\ #o Mosasaurus#! Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] denizden büyük bir canavarı yeniden inşa etti." #deepl:2251013384
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 'un yeniden inşa ettiği #o Mosasaurus#! korkunçtu. Mosasaurus'un Okyanus'ta yaşadığı oldukça kesin, ancak bir şekilde iskelet bacaklarla sonuçlandı." #deepl:2727769146
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\nProfesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden yapılandırılan #o Plesiosaurus#! devasa bir deniz sürüngenidir." #deepl:1469085529
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden yapılandırılan #o Plesiosaurus#! dinozorlar zamanında yaşamış bir deniz sürüngenidir." #deepl:1871243527
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden yapılandırılan #o Plesiosaurus#! biraz tuhaftır. Yılan gibi 4 uzvu vardır ve çok kısadır ve kuyruğu yoktur." #deepl:1919744229
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden yapılandırılan #o Basilosaurus#! binlerce yıl önce yaşamış tarih öncesi bir balinadır." #deepl:142765907
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden yapılandırılan #o Basilosaurus#! tarih öncesi bir balinadır." #deepl:1354996810
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden yapılandırılan #o Basilosaurus#! çok garip bir fizyolojiye sahip. Her şeyden çok bir topa benziyor ki bu oldukça yanlış görünüyor." #deepl:1206625829
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden yapılandırılan #o Megalodon#! devasa bir köpekbalığıdır. Gerçekten etkileyici bir iskelet." #deepl:1878769616
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden inşa edilen #o Megalodon#! devasa bir köpekbalığıdır." #deepl:117332675
 dubois_paleontologist_achievement_poor_megalodon_loc: "\Profesör [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tarafından yeniden inşa edilen #o Megalodon#! biraz... kapalı görünüyor. Devasa kafa çok ince bir boyuna monte edilmiş ve görünüşe göre köpekbalığının tüm vücudunu kaplayan garip sivri uçları var." #deepl:3797074524
