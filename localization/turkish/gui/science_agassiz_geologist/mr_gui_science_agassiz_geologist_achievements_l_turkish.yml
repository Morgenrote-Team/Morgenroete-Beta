l_turkish:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('aagassiz_geologist_achievement_ring_of_fire_discovered_var').IsSet , Scope.Var('agassiz_geologist_achievement_ring_of_fire_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_moon_impact_var').IsSet , Scope.Var('agassiz_geologist_achievement_moon_impact_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "#V Bu [concept_agassiz_geologist]'ın Başarıları#! burada, bir tane edindikten sonra görüntülenecek."
 agassiz_geologist_achievements_intro_loc: "#V Bu Jeologun Başarıları#!\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] başarılı bir Jeologdur ve [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] ve [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] toplamıştır. [Scope.GetCharacter.GetHerHis|U] Jeoloji araştırmaları bize [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] sağladı.#!"
 agassiz_geologist_achievement_invented_seismology_loc: "\n #indent_newline:3 • #V Sismolojinin icadı#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ın en büyük başarılarından biridir. Bu, Depremleri ve Volkanik Patlamaları tahmin etmeyi sağlar.#!"
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\n #indent_newline:3 • #V Levha Tektoniği Teorisinin icadı#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'ın en büyük başarılarından biri mi? [Scope.GetCharacter.GetHerHis] meslektaşlarının hepsi teoriyi kabul etmediği için, bunun [Scope.GetCharacter.GetHerHis] en önemli keşfi olarak kabul edilip edilmeyeceğini veya unutulup unutulmayacağını sadece gelecek gösterecek.#!"
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V Levha Tektoniği Jeoloji Kongresi'ne katıldı#!.#!"
 agassiz_geologist_achievement_explored_volcano_loc: "\n #indent_newline:3 • #V Bir Yanardağı Keşfetmek#! tehlikeli bir girişimdir, ancak Dr. [Scope.GetCharacter.GetLastNameNoFormatting] onlardan birine yapılan keşif gezisinden çok şey öğrendi.#!"
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first person to #V discover Helium on Earth#! which will surely be a very useful resource in the future.#!"
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] bir #V Pasifik Keşif Gezisi#!'ne katıldı.#!"
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] görünüşe göre #V Dünya'nın Merkezine ulaştı#! ve oradan tekrar döndü. Ama bu hikaye gerçekten doğru mu?#!"
 agassiz_geologist_achievement_moon_impact_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting], #V Ay'ın bilinmeyen büyük bir gök cisminin Dünya'ya çarpmasıyla oluştuğu#! hipotezini ortaya attı. Oldukça spekülatif bir teori, ancak büyük özgünlüğe sahip.#!"
 agassiz_geologist_achievement_ring_of_fire_discovered_loc: "\n #indent_newline:3 • #V Pasifik Okyanusu'na yapılan bir Keşif Gezisi#! sırasında, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] okyanusun kenarındaki volkanların büyük konsantrasyonunu - #V Ateş Çemberi#! - not etti ve bunun bir tesadüf olmadığına inanıyor. [Scope.GetCharacter.GetSheHe|U] böylece jeolojik araştırmalara önemli bir ivme kazandırdı.#!"