 agassiz_geologist_achievements_intro_loc: "#V Bu Jeologun Başarıları#!\nDr. [Scope.GetCharacter.GetLastNameNoFormatting], [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] ve [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] toplayan başarılı bir Jeologdur. [Scope.GetCharacter.GetHerHis|U] Jeoloji araştırmaları bize [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] sağladı." #deepl:2506244890

 agassiz_geologist_achievement_invented_seismology_loc: "\ #V Sismoloji'nin icadı#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un en büyük başarılarından biridir. Depremleri ve Vulkanik Patlamaları tahmin etmeyi sağlar." #deepl:4027906331
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\ #V Levha Tektoniği Teorisi'nin icadı#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'un en büyük başarılarından biri midir? Teoriyi [Scope.GetCharacter.GetHerHis] tüm meslektaşları kabul etmediği için [Scope.GetCharacter.GetHerHis] en önemli keşif olarak kabul edilip edilmeyeceğini ya da unutulup unutulmayacağını ancak gelecek gösterecek." #deepl:1012351458
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  Levha Tektoniği Jeoloji Kongresi'ne#! katıldı." #deepl:941722190
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V Bir Volkanı Keşfetmek#! tehlikeli bir çabadır, ancak Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bunlardan birinde yaptığı keşif gezisinden çok şey öğrendi." #deepl:3489984187
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  Dünya üzerinde#! gelecekte çok yararlı bir kaynak olacağı kesin olan Helyumu keşfeden ilk kişidir." #deepl:1490724762
