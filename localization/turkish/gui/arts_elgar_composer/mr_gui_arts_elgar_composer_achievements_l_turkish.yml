l_turkish:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "Bir [concept_elgar_composer]'a sahip olduğunuzda, #V Bu Bestecinin Başarıları#! burada görüntülenecektir."
 elgar_composer_achievements_intro_loc: "#V Bu Bestecinin Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName], [Scope.Var('elgar_composer_experience').GetValue|V0] itibara sahip bir bestecidir. Şu ana kadar [Scope.GetCharacter.GetSheHe] [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] tur gerçekleştirdi. [Scope.GetCharacter.GetHerHis] çok sayıdaki eserinden [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] tanesi özellikle öne çıkıyor.#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] mükemmel bir #V Virtüöz#!'dür.#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ünlü bir #V Orkestra Şefi#! olarak kabul edilir.#!"