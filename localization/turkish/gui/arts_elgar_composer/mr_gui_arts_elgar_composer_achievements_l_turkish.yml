l_turkish:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "The #V Achievements of this [concept_elgar_composer]#! will be displayed here, once you have one."
 elgar_composer_achievements_intro_loc: "#V Achievements of this Composer#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is a composer with a reputation of [Scope.Var('elgar_composer_experience').GetValue|V0]. So far [Scope.GetCharacter.GetSheHe] has done [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] tours. Of [Scope.GetCharacter.GetHerHis] numerous works, [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] particularly stand out.#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is an excellent #V Virtuoso#!.#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is considered a famous #V Conductor#!.#!"