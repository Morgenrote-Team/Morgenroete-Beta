 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_1_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_2_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_3_type')]"
 elgar_composer_achievements_no_composer_loc: "Bir [concept_elgar_composer]'a sahip olduğunuzda, #V Bu Bestecinin Başarıları#! burada görüntülenecektir."
 elgar_composer_achievements_intro_loc: "#V Achievements of this Composer#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is a composer with a reputation of [Scope.Var('elgar_composer_experience').GetValue|V0].#!\n #indent_newline:3 • So far [Scope.GetCharacter.GetSheHe] has done [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] tours.#!\n #indent_newline:3 • Of [Scope.GetCharacter.GetHerHis] numerous works, [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] particularly stand out.#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] mükemmel bir #V Virtüöz#!'dür.#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ünlü bir #V Orkestra Şefi#! olarak kabul edilir.#!"
 elgar_composer_achievement_has_masterpiece_loc: "\n • [Scope.GetCharacter.GetSheHe|U] has created [Scope.Var('elgar_composer_num_masterworks_var').GetValue|V0] Masterpieces:#!"
 elgar_composer_achievement_masterwork_1_loc: "#indent_newline:6 \n • [Scope.Var('elgar_masterpiece_1_var').GetFlagName]#!"
 elgar_composer_achievement_masterwork_2_loc: "#indent_newline:6 \n • [Scope.Var('elgar_masterpiece_2_var').GetFlagName]#!"
