 verrier_astronomer_achievements_intro_loc: "#V Bu gökbilimcinin başarıları#![Scope.GetCharacter.GetFullName] [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfeden başarılı bir gökbilimcidir." #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\ #V 61 Cygni'ye olan uzaklığını 11,4 ışık yılı olarak ölçen#!, [Scope.GetCharacter.GetLastNameNoFormatting] evrenin daha önce düşünülenden çok daha büyük olduğunu bir çırpıda göstermeyi başardı." #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "\ [Scope.GetCharacter.GetHerHis] en büyük başarılarından biri #V Güneş'in elektromanyetik spektrumunu incelerken#! Helyum elementini keşfetmesidir." #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\Hiç kimse yeni bir gezegenin keşfedilmesini beklemiyordu ama Profesör [Scope.GetCharacter.GetLastNameNoFormatting] #V  Uranüs#! gezegenini keşfetti. Bu keşif güneş sistemimizde daha fazla gezegen aranmasına yol açtı." #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\nBirçok gökbilimci Mars ve Jüpiter arasındaki gezegeni aradı. Ancak Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  Ceres'i#! bulan kişi oldu." #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  Pallas Gezegenini#! Mars ve Jüpiter arasındaki bölgede buldu." #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nProfesör [Scope.GetCharacter.GetLastNameNoFormatting] #V  Vesta Gezegenini#! Mars ve Jüpiter arasındaki bölgede buldu." #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  Juno Gezegenini#! Mars ve Jüpiter arasındaki bölgede buldu." #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "\ [Scope.GetCharacter.GetHerHis] en büyük işlerinden biri #V Neptün Gezegeninin#! keşfidir. Bu keşif [Scope.GetCharacter.GetHerHim] tarih kitaplarında sonsuza dek yer almasını sağlamıştır." #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\ #V Plüton'un#! var olup olmadığı bile tartışılsa da Profesör [Scope.GetCharacter.GetLastNameNoFormatting] aslında #V bu küçük gezegeni#! keşfetti. Büyük bir astronomik başarı!" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\ #V 1843 yılında#! [Scope.GetCharacter.GetSheHe] Büyük Kuyruklu Yıldızı #V ilk bulan kişi oldu#! bu nedenle kuyruklu yıldıza [Scope.GetCharacter.GetLastNameNoFormatting] adı verildi." #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\ #V 1858 Büyük Kuyruklu Yıldızı#! Dünya'nın yakınından geçtiğinde [Scope.GetCharacter.GetLastNameNoFormatting] kuyruklu yıldızı ilk gören Dr. oldu. Sonuç olarak kuyruklu yıldıza [Scope.GetCharacter.GetHerHim] adı verildi." #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\ #V 1861 Büyük Kuyruklu Yıldızı'nı#! gece gökyüzünün karanlığında ilk keşfeden kişi olan Profesör [Scope.GetCharacter.GetLastNameNoFormatting] gök cismine adını veren kişi oldu." #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n1874 #V Büyük Kuyruklu Yıldızı#! ilk ortaya çıktığında, onu ilk fark eden Dr. [Scope.GetCharacter.GetLastNameNoFormatting] oldu. Artık kuyruklu yıldız [Scope.GetCharacter.GetHerHis] adını sonsuza dek taşıyacak." #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\ #V 1882#! yılı astronomik açıdan muhteşemdi. Profesör [Scope.GetCharacter.GetLastNameNoFormatting] #V  Büyük Kuyruklu Yıldızı#! Dünya'nın yakınından geçerken keşfetti. İnanılmaz bir gösteriydi." #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\ #V Pasifik Keşif Gezisi#! sırasında Dr. [Scope.GetCharacter.GetLastNameNoFormatting] güney yarımkürede çeşitli yeni #V Astronomik Nesneler#! buldu." #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\ #V 1874#! yılında Profesör [Scope.GetCharacter.GetLastNameNoFormatting] Pasifik Okyanusu'nda #V Venüs Geçişini#! gözlemledi. Genellikle hayatta bir kez görülen bir olaydır." #deepl:885972622
