 verrier_astronomer_achievements_no_astronomer_loc: "#V Bu [concept_verrier_astronomer]'ın Başarıları#! burada, bir tane edindikten sonra görüntülenecek."
 verrier_astronomer_achievements_intro_loc: "#V Bu Gök Bilimcinin Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfetmiş başarılı bir gök bilimcidir.#!"
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n #indent_newline:3 • #V 61 Cygni'ye olan mesafeyi 11.4 ışık yılı olarak ölçerek#!, [Scope.GetCharacter.GetLastNameNoFormatting] evrenin önceden düşünülenden çok daha büyük olduğunu bir hamlede göstermeyi başardı.#!"
 verrier_astronomer_achievement_helium_discovered_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] en büyük başarılarından biri, güneşin elektromanyetik spektrumunu incelerken #V Helyum Elementinin Keşfi#!'dir.#!"
 verrier_astronomer_achievement_uranus_discoverer_loc: "\n #indent_newline:3 • Kimse yeni bir gezegen keşfedileceğini beklemiyordu, ancak Profesör [Scope.GetCharacter.GetLastNameNoFormatting] #V Uranüs gezegenini keşfetti#!. Bu keşif, güneş sistemimizde daha fazla gezegen arayışına yol açtı.#!"
 verrier_astronomer_achievement_ceres_discoverer_loc: "\n #indent_newline:3 • Birçok gök bilimci Mars ve Jüpiter arasındaki gezegeni aradı. Ama #V Ceres'i bulan#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'dı.#!"
 verrier_astronomer_achievement_pallas_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] Mars ve Jüpiter arasındaki bölgede #V Pallas Gezegenini buldu#!.#!"
 verrier_astronomer_achievement_vesta_discoverer_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] Mars ve Jüpiter arasındaki bölgede #V Vesta Gezegenini buldu#!.#!"
 verrier_astronomer_achievement_juno_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] Mars ve Jüpiter arasındaki bölgede #V Juno Gezegenini buldu#!.#!"
 verrier_astronomer_neptune_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis] en büyük başarılarından biri #V Neptün Gezegeninin Keşfi#!'ydi. Bu keşif, [Scope.GetCharacter.GetHerHim] tarih kitaplarında sonsuza kadar bir yer sağladı.#!"
 verrier_astronomer_achievement_pluto_discoverer_loc: "\n #indent_newline:3 • #V Plüton#!'un var olup olmadığı tartışılsa da, Profesör [Scope.GetCharacter.GetLastNameNoFormatting] aslında küçük gezegeni #V keşfetti#!. Büyük bir astronomik başarı!#!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\n #indent_newline:3 • #V 1843#! yılında [Scope.GetCharacter.GetSheHe] #V Büyük Kuyruklu Yıldızı#! ilk bulan kişi oldu ve bu nedenle [Scope.GetCharacter.GetLastNameNoFormatting]'ın adı verildi.#!"
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\n #indent_newline:3 • #V 1858 Büyük Kuyruklu Yıldızı#! Dünya'nın yanından geçerken, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] kuyruklu yıldızı ilk gören kişi oldu. Sonuç olarak, kuyruklu yıldıza [Scope.GetCharacter.GetHerHim]'ın adı verildi.#!"
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\n #indent_newline:3 • #V 1861 Büyük Kuyruklu Yıldızı#!'nı gece gökyüzünün karanlığında ilk keşfeden kişi olarak, Profesör [Scope.GetCharacter.GetLastNameNoFormatting] gök cismine adını verdi.#!"
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n #indent_newline:3 • #V 1874 Büyük Kuyruklu Yıldızı#! ilk ortaya çıktığında, onu ilk fark eden Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'dı. Artık kuyruklu yıldız sonsuza kadar [Scope.GetCharacter.GetHerHis] adını taşıyacak.#!"
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\n #indent_newline:3 • #V 1882#! yılı astronomik açıdan muhteşemdi. Profesör [Scope.GetCharacter.GetLastNameNoFormatting] Dünya'nın yanından geçerken #V Büyük bir Kuyruklu Yıldız#! keşfetti. İnanılmaz bir görsel şölen.#!"
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • #V Pasifik Keşif Gezisi#! sırasında, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] güney yarımkürede çeşitli yeni #V Gök Cisimleri#! buldu.#!"
 verrier_astronomer_achievement_observed_venus_transit_loc: "\n #indent_newline:3 • #V 1874#! yılında, Profesör [Scope.GetCharacter.GetLastNameNoFormatting] Pasifik Okyanusu'nda #V Venüs Geçişi#!'ni gözlemledi. Genellikle bir ömürde bir kez yaşanan bir olay.#!"
 verrier_astronomer_achievement_observed_carrington_event_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue] yılında #V Büyük Güneş Patlaması#!'nı gözlemledi.#!"
 verrier_astronomer_achievement_observed_corona_loc: "\n #indent_newline:3 • #V [Scope.GetCharacter.GetLastNameNoFormatting]'ın Boncukları#!'nı keşfetti ve bunlara [Scope.GetCharacter.GetHerHim]'ın adı verildi.#!"
 verrier_astronomer_achievement_sun_photo_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V ilk güneş tutulması fotoğrafı#!'nın yaratıcısıdır.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V Mars'ın doğal uydusu Deimos'u keşfetti#!.#!"
