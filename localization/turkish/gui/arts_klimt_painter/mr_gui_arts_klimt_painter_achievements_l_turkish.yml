l_turkish:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "#V Bu [concept_klimt_painter]'ın Başarıları#! burada, bir tane edindikten sonra görüntülenecek."
 klimt_painter_achievements_intro_loc: "#V Bu Ressamın Başarıları#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] bir [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')]'dır.#!\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0] Tablo üretti ve bunların [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0] tanesi Başyapıt olarak kabul ediliyor.#!"
 klimt_painter_achievement_vernissage_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] tablolarını büyük bir vernissage'de sergiledi.#!"
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe] harika tablolarıyla yeni bir Sanat Galerisi açtı. Galeri kesinlikle gelecekte daha birçok büyük Ressam görecek!#!"