l_turkish:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Transatlantik Kablo#!\nViktorya dönemi bilimi, telgrafın mucizesini ortaya çıkardı ve bilginin benzeri görülmemiş bir hızla büyük mesafeleri kat etmesine olanak sağladı. Atlantik'in her iki yakasında telgraf istasyonları kurarak, deniz altına bir kablo döşeme vizyonu ortaya çıkıyor—bu, ileri mühendislik ve bu iddialı girişime yatırım yapmaya istekli gelişen bir haber sektörü gerektiren bir başarı.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T Süveyş-Hindistan Kablosu#!\nViktorya dönemi yaratıcılığının bir zaferi olan Süveyş Kanalı'nın açılması, Avrupa ve Hindistan'ı doğrudan bir denizaltı kablosuyla birleştirme dürtüsünü yoğunlaştırdı. Böyle bir bağ, bilimsel ilerlemenin gücüyle kıtaları birbirine bağlayarak iletişimde devrim yaratacaktır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "Transpasifik Kablo"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T Transpasifik Kablo#!\nBuharlı gemiler ve ticaret yolları geliştikçe, Viktorya dönemi bilimi Pasifik boyunca bir denizaltı kablosu döşenmesini işaret ediyor. Bu teknolojik sıçrama, aylarca süren yazışmaları dakikalara indirerek, dünyanın en büyük okyanusu boyunca etki ve koordinasyonu genişletecektir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetName] $mr_basic_telegraphy$ [concept_company]'ye sahip.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V Hiç kimse#! henüz Atlantik üzerinden #V radyo mesajı göndermedi#!.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text [GetBuildingType('building_suez_canal').GetName] mevcut.#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az #V 5 Milyon#! [concept_investment_pool]'a sahip.#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az #V 10 Milyon#! [concept_investment_pool]'a sahip.#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az #V 20 Milyon#! [concept_investment_pool]'a sahip.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] $tesla_transatlantic_cable_expedition_failed_modifier$ modifikatörüne sahip değil.#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] $tesla_suez_india_cable_expedition_failed_modifier$ modifikatörüne sahip değil.#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] $tesla_transpacific_cable_expedition_failed_modifier$ modifikatörüne sahip değil.#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Transatlantik Kablo#!\n#p Şu anda Transatlantik Kabloyu döşemek için devam eden bir Keşif Gezisi var.#!\nViktorya dönemi bilimi, telgrafın mucizesini ortaya çıkardı ve bilginin benzeri görülmemiş bir hızla büyük mesafeleri kat etmesine olanak sağladı. Atlantik'in her iki yakasında telgraf istasyonları kurarak, deniz altına bir kablo döşeme vizyonu ortaya çıkıyor—bu, ileri mühendislik ve bu iddialı girişime yatırım yapmaya istekli gelişen bir haber sektörü gerektiren bir başarı."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T Süveyş-Hindistan Kablosu#!\n#p Şu anda Süveyş-Hindistan Kablosunu döşemek için devam eden bir Keşif Gezisi var.#!\nViktorya dönemi yaratıcılığının bir zaferi olan Süveyş Kanalı'nın açılması, Avrupa ve Hindistan'ı doğrudan bir denizaltı kablosuyla birleştirme dürtüsünü yoğunlaştırdı. Böyle bir bağ, bilimsel ilerlemenin gücüyle kıtaları birbirine bağlayarak iletişimde devrim yaratacaktır."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T Transpasifik Kablo#!\n#p Şu anda Transpasifik Kabloyu döşemek için devam eden bir Keşif Gezisi var.#!\nBuharlı gemiler ve ticaret yolları geliştikçe, Viktorya dönemi bilimi Pasifik boyunca bir denizaltı kablosu döşenmesini işaret ediyor. Bu teknolojik sıçrama, aylarca süren yazışmaları dakikalara indirerek, dünyanın en büyük okyanusu boyunca etki ve koordinasyonu genişletecektir."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "Süveyş-Hindistan Kablosu"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n No#! country has researched [GetTechnology('dreadnought_tech').GetName] or [GetTechnology('destroyer').GetName]. The year is also #V before#! 1896.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NOT_ONGOING_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V $je_tesla_transatlantic_cable$#! Günlük Girişi'ne sahip değil.#!"