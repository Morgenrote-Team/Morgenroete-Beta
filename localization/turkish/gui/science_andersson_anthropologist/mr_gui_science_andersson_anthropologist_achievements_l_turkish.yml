 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] toplam [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] İnsan Fosilini tanımladı.#!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] #V Modern İnsanın Kökeni#! Kongresi'ne katıldı.#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim] sayesinde #V Piltdown İnsanı bir sahtekarlık olarak ortaya çıkarıldı#!.#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] insan kemiklerini ve iskeletlerini titizlikle ve çok hassas bir şekilde kaydeden ilk bilim insanıdır. [Scope.GetCharacter.GetSheHe] #V Antropolojinin öncüsü#! olarak görülür.#!"
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] ilk kez bilimsel olarak #V Cro-Magnon'u sınıflandırdı#!.#!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V Neandertal'i tarih öncesi insan sistemiğinde konumlandıran#! ilk kişiydi.#!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n #indent_newline:3 • Daha önce bilinmeyen #V Homo Erectus'un bir insan türü olarak kavranabilir hale gelmesi#! [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] sayesinde oldu.#!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n #indent_newline:3 • Profesör [Scope.GetCharacter.GetLastNameNoFormatting] ilk kez #V Australopithecus'un sırlarını çözmeyi#! ve onun yaşam tarzı ve görünümü hakkında sonuçlar çıkarmayı başardı.#!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n #indent_newline:3 • Birkaç kemikten #V tarih öncesi bir insanı yeniden inşa etmeye çalışmak#! ve böylece onun yaşam ortamı hakkında sonuçlar çıkarılmasını sağlamak birçok insanın başaramadığı bir şey. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bunu #V Paranthropus#! ile başardı.#!"