 curtiss.108.l: "Ben mevcut pilotumuz [SCOPE.sCharacter('curtiss_current_pilot').GetFullName]’i tercih ederim."
 curtiss.231.t: "Yenilik: Uçakta servis edilen yiyecek"
 curtiss.231.d: "Uçaklarda yeni bir hizmet mevcut! İlk kez yolcular, uygun bir fiyata uçakta sandviç satın alabildiler. Bu, Hava Yolu Şirketimizi dünyanın en yenilikçi şirketlerinden biri yapabilir!"
 curtiss.231.f: "\"Yolculuğumuz için bir sandviç ister misiniz?\"\n\"Bir sandviç harika olur! İçecek de satıyor musunuz?\""
 curtiss.231.g: "En azından aç değilim!"
 curtiss.231.h: "Bir sandviç için bu kadar mı istiyorlar?!"
