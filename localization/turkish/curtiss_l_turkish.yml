 curtiss_montgolfier_balloon_tech: "Montgolfier Balonları"
 curtiss_montgolfier_balloon_tech_desc: "Montgolfière, Fransız mucitler Joseph Michel ve Jacques Etienne Montgolfier’in adını taşıyan ilk sıcak hava balonunun ismidir. ‘Aerostatik makineler’in haberi hızla Avrupa’ya yayıldı. Uçakların ilk askeri kullanımı Fransız Devrim Savaşları sırasında gerçekleşti; Fransızlar 1794 Fleurus Muharebesi’nde Avusturya ordusunun hareketlerini gözlemek için ipli bir hidrojen balonu kullandılar."
 curtiss_messenger_pidgeons_tech: "Posta Güvercinleri"
 curtiss_messenger_pidgeons_tech_desc: "Posta güvercini kullanımı 1820’lere kadar nadirdi. 1860’ta Paul Reuter, Brüksel ile Aachen arasında haber ve hisse fiyatlarını taşımak için 45’ten fazla güvercin kullandı. Fransa-Prusya Savaşı sırasında güvercinler, düşmüş Paris ile işgal edilmemiş Fransız toprakları arasında posta taşımak için kullanıldı. Aralık 1870’te bir güvercinin Perpignan’dan Brüksel’e mikrofilm taşıması on saat sürdü."
 curtiss_reconnaissance_balloon_tech: "Keşif Balonları"
 curtiss_reconnaissance_balloon_tech_desc: "Keşif balonu, askeri keşif teknolojisiyle donatılmış, gaz karışımıyla doldurulmuş bir balondur. Amerikan İç Savaşı ve Fransız-Alman Savaşı sırasında gözetleme noktası olarak kullanıldı. İnsanlı bağlı balonlar, düşman hatlarını gözlemek ve bilgileri yere aktarmak için iple havaya bırakılırdı."
 curtiss_early_aviation_tech: "Erken Havacılık"
 curtiss_early_aviation_tech_desc: "1867 ile 1896 arasında Alman havacılık öncüsü Otto Lilienthal, havadan ağır uçuşu geliştirdi. Tekrarlanabilir ve belgelenmiş ilk başarılı planör uçuşlarını yaptı. Lilienthal’in çalışmaları, modern kanat kavramının gelişmesine ve sonraki çalışmalara büyük ilham kaynağı oldu. 1903’te Wright Kardeşler’in uçuşları, ‘havadan ağır ilk sürekli ve kontrollü motorlu uçuş’ olarak kabul edilir."
 curtiss_seaplanes_tech: "Deniz Uçakları"
 curtiss_seaplanes_tech_desc: "28 Mart 1910’da Fransız Henri Fabre, Gnome Omega motorlu hidravionu, üç gövdeli bir deniz uçağıyla ilk başarılı motorlu deniz uçağı uçuşunu gerçekleştirdi. Bu başarı diğer havacıları teşvik etti. Mart 1912’de Monako’da ilk hidro-uçak yarışması yapıldı; Fabre, Curtiss, Tellier ve Farman’ın uçağı katıldı. Aynı yıl Fransız Donanması ilk deniz uçağını sipariş etti."
 curtiss_modern_aviation_tech: "Modern Havacılık"
 curtiss_modern_aviation_tech_desc: "Sivil havacılık, uçuşun iki ana kategorisinden biridir; askeri ve devlet dışındaki özel ve ticari uçuşların tümünü kapsar. Havacılığın Altın Çağı’nda yaygınlaştı. Uzun mesafe lüks uçuşları ilk kez mümkün hale geldi; erken dönemde hava gemileri kullanıldı, fakat Hindenburg felaketinden sonra bunların yerini uçan tekneler aldı."
