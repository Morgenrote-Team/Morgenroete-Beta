 curtiss_aerobatic_team_modifier: "Akrobasi Takımı"
 curtiss_giant_aircraft_propaganda_modifier: "Dev Uçak Propagandası"
 mr_seriously_injured: "Ağır Yaralı"
 mr_seriously_injured_desc: "Bu karakter ağır yaralandı ve bir süre için kullanılamayacak."
 curtiss_recalled_pilot_tt: "Görev, [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] cepheden erken geri çağrılırsa sona erer."
 curtiss.300.t: "Pilot Cepheye Varıyor"
 curtiss.300.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] cepheye ulaştı ve [SCOPE.sCharacter('flying_circus_general').GetFullName] savaş grubuna katıldı."
 curtiss.300.f: "Hava muharebesi hem kahramanca hem de tehlikeli bir iştir. Yalnızca sağlıklı pilotlar tecrübe kazanabilir. Kimi içinse savaşın deneyimleri – olumlu ya da olumsuz – kalıcı olabilir."
 curtiss.300.g: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetSheHe|U] should support him from the air!"
 curtiss.301.t: "Pilot Cepheden Döndü"
 curtiss.301.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] muharebe görevlerinden döndü ve yeniden tamamen hizmetimize hazır."
 curtiss.301.f: "'Asıl darbe özgüvenimize oldu: Baracca devrilebiliyorsa, ben aynı kaderden nasıl kaçınabilirim? Ama içimizde beklemediğimiz bir teselli de oluştu: Baracca karşı savaşçılar tarafından düşürülmedi. Avcı olarak itibarı zedelenmedi. Siegfried gibi, onu ancak hain bir darbe yere serebilirdi. Düşman bu sonla övünemezdi. Ve bu her şeyden önemliydi.' -Mario Fucini"
 curtiss.301.g: "Sağ salim ve tek parça hâlinde; pilotlarımızı böyle isterim."
 curtiss.321.t: "Cehennemin Kapıları"
 curtiss.321.d: "[SCOPE.sCharacter('curtiss_bomber_general').GetFullName], bombardıman filosunu [SCOPE.sState('curtiss_bomber_state').GetName]’in büyük kısımlarını bombalamak üzere kullanmayı kabul etti; böylece mevcut altyapı büyük ölçüde yok edilecekti. Ancak sivil kayıplar da oldukça yüksek olacaktı."
 curtiss.321.f: "'Benden önce yaratılmış hiçbir şey yoktu,\nYalnızca sonsuz olan; ben de sonsuza dek süreceğim.\nEy buradan girenler, bütün umudunuzu bırakın!' -Dante Alighieri"
 curtiss.321.g: "Sektörü tanınmaz hale gelene kadar bombalayın."
 curtiss.321.h: "Savaşın da sınırları vardır."
 curtiss.322.t: "Çelikten Uğursuz Canavarlar"
 curtiss.322.d: "Zeplinler bu savaşta modern ve korkunç bir silah olarak görülüyor. Ulusumuzun bu araçlara odaklanması karşılığını veriyor: [SCOPE.sCharacter('curtiss_zeppelin_general').GetFullName]’in Zeplin filosu o kadar kötü şöhret kazandı ki, düşman yalnızca adını duymaktan bile korkuyor!"
 curtiss.322.f: "Her ne kadar Zeplin saldırıları görece az hasar vermiş olsa da, düşman ordusu ve sivil halk arasında orantısız bir korku ve dehşet yaydılar; ayrıca savaş çabası için önemli olan büyük miktarda kaynağı bağladılar. Alman askeri hava gemileriyle mücadele için, yaklaşık 15.000 adam ve ortalama 25 hava gemisinden oluşan İtilaf güçleri, neredeyse 1:33 oranında silah, malzeme ve insan ayırmak zorunda kaldı. Donanma gibi diğer kuvvetler de benzer yıpratma stratejileri uygulasa da, hava gemilerinin verimliliği, Alman denizaltıları tarafından bile aşılamadı. Yine de Zeplin saldırıları, hedef alınanların moralini kalıcı biçimde sarsmadı ve savaş çabalarını ciddi biçimde engellemedi."
 curtiss.322.g: "Bu kadar güzel bir şey nasıl bu kadar tehlikeli olabilir..."
 curtiss.323.t: "Yaralı Av"
 curtiss.323.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]’in filosu bir düşman hava saldırısını püskürttü ve ağır hasar verdi. Pilot, şimdi kaçan düşmanı takip edip işini bitirmek istiyor."
 curtiss.323.f: "'O dönemin birçok pilotu, kapalı kokpitte bir avcı pilotunun imkânsız olduğunu düşünüyordu; çünkü düşmanı koklamalısınız. Yaktıkları yağ yüzünden onları koklayabilirdiniz.' -Adolf Galland"
 curtiss.323.g: "Devam et!"
 curtiss.323.h: "Bu bir tuzak olabilir."
 curtiss.324.t: "Düşman Uçağı Ele Geçirildi"
 curtiss.324.d: "Ordumuzun düşman topraklarında gerçekleştirdiği kısa bir harekât sırasında, doğaçlama bir havaalanı ele geçirildi. Birkaç uçak askerlerimizin eline geçti."
 curtiss.324.f: ""
 curtiss.324.g: "Uçaklarını inceleyin!"
 curtiss.325.t: "Gökyüzünde Düello"
 curtiss.325.d: "Ufukta tehlike beliriyor. Düşmanın en ünlü pilotu [SCOPE.sCharacter('duel_participant_2').GetFullName], filosuyla birlikte askerlerimizin mevzilerine saldırmak için göründü. Acaba [SCOPE.sCharacter('duel_participant_1').GetFullName] ona karşı durup gökyüzünde kahraman olabilir mi?"
 curtiss.325.f: "Bir hava düellosunu kazanma şansı, büyük ölçüde iki pilotun özelliklerine ve tecrübelerine bağlıdır."
 curtiss.325.g: "Saldır!"
 curtiss.325.h: "Saldırıyı iptal et!"
 curtiss.325.i: "Manevra yap!"
 curtiss.325.tt: "Bu, [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]’in #YELLOW Akrobasi Özelliği#! sayesinde mümkün."
 curtiss.326.t: "Savaş Zamanında Havacılık Mühendisi"
 curtiss.326.d: "Havacılık mühendisimiz cephede hasar görmüş uçakları onarmaya ve yok edilmiş hava araçlarının yerine yenilerini koymaya yardımcı oldu. Böylece [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName], cephe hattında değerli deneyim kazandı."
 curtiss.326.f: "'Havacılık ne bir endüstri ne de bir bilimdi. O bir mucizeydi.' -Igor Sikorsky"
 curtiss.326.g: "Önemli bir yardımcı el."
 curtiss.327.t: "Özel Hava Keşfi"
 curtiss.327.d: "In a daring maneuver, our pilot continued over enemy sectors and took numerous photographs of enemy camps and geographical and infrastructural conditions. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]'s valuable reconnaissance work helps the army to take over enemy territory much more quickly."
 curtiss.327.f: "'Başlangıçta insanlar havacılık keşiflerinin başarısına pek güvenmiyordu, ancak kısa sürede bunun aksi kanıtlandı. Havaalanı her zaman cephe hattının birkaç kilometre gerisindedir, genellikle genel komutanlığın bulunduğu yerde. Emri burada alırsınız. Sonra yaklaşık 1200 metre yükseklikte düşmanın üzerine çıkarsınız. Daha alçakta uçmak pek tavsiye edilmez, çünkü Fransız piyade mermileri oldukça yükseğe ulaşır. Kanatlarda bundan kalma birkaç delik zaten var. Bu yükseklikten, hava makul derecede iyiyse gayet iyi gözlem yapabilirsiniz. Çift kanatlılarımız çok hızlıdır (saatte yaklaşık 110 kilometre) ve böylece kısa sürede oldukça uzun mesafe kat edebilirsiniz. Gözlemci gördüklerini kaydeder ve siz geri dönersiniz. Rapor havaalanından otomobille genel komutanlığa götürülür.' -Anonim Pilot, 'Die Woche', Berlin, 26 Eylül 1914"
 curtiss.327.g: "Bu bize çok faydalı olacak."
 curtiss.328.t: "Pilot yaralandı"
 curtiss.328.d: "Son hava muharebesinden sonra, [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] yaralandığı için görevi geçici olarak bırakmak zorunda kaldı. Doktorlar, yaraların ilk düşünüldüğünden daha kötü olduğunu keşfetti. Pilotumuz bir süre uçamayacak."
 curtiss.328.f: "Yaralı bir pilot görev yapamaz, bu yüzden hava zaferi kaydedemez veya deneyim kazanamaz. Yaralar bir ila üç ay arasında iyileşir."
 curtiss.328.g: "Bu birkaç hafta hastanede demek..."
 curtiss.329.t: "Pilot düştü!"
 curtiss.329.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] son görev sırasında vuruldu ve ciddi bir kaza geçirdi. Acil iniş sert oldu, ama cephemizin tarafında gerçekleşti – kurtarma ekipleri pilotu canlı çıkardı, ancak yaraları çok ağır."
 curtiss.329.f: "Ağır yaralanan pilotlar en iyi ihtimalle altı ay, en kötü ihtimalle bir yıl boyunca görev dışı kalır. Ayrıca ciddi savaş travmaları geliştirme ihtimalleri de vardır."
 curtiss.329.g: "Korkunç!"
 curtiss.331.t: "Savaş Travması"
 curtiss.331.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] ağır kazadan kurtuldu. Ancak geride sadece fiziksel yaralar kalmadı. Pilotumuz o zamandan beri aynı değil."
 curtiss.331.f: "'Hepiniz kayıp bir nesilsiniz.' -Ernest Hemingway"
 curtiss.331.g: "Endişe verici."
 curtiss.400.t: "Hava Gösterisi"
 curtiss.400.d: "Gerçek bir uçak geçidi aynı zamanda muhteşem formasyonlar ve manevralarla bir hava gösterisi içerir. Bu riskli gösteriler ordumuzun havacılık yeteneklerini sergiler ve seyircileri büyüler. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] cesur ama daha büyük bir manevra mı yapmalı, yoksa standart repertuardan daha temkinli bir varyant mı?"
 curtiss.400.f: "Bir pilot, muhteşem bir hava gösterisi manevrası yaparak akrobasi pilotu özelliği kazanabilir. Ancak cesur manevralar aynı zamanda başarısız olabilir ve felaketle sonuçlanabilir. Bunu önlemek için, pilotun yeterli deneyime ve Savaş Pilotu, Schneider Kupası Gazisi, Cesur veya İhtiyatlı gibi olumlu özelliklere sahip olması gerekir. Akrobasi pilotları her zaman muhteşem manevralar yapar."
 curtiss.400.g: "Büyük bir Manevra yap."
 curtiss.400.h: "Normal bir Manevra yap."
 curtiss.411.t: "Muhteşem Hava Gösterisi"
 curtiss.411.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] hava gösterisinde nefes kesici ve aynı zamanda kusursuz bir uçuş manevrası gerçekleştirdi, hem subayları hem de izleyicileri büyüledi."
 curtiss.411.g: "Muhteşem!"
 curtiss.412.t: "İyi Manevra"
 curtiss.412.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] hava gösterisinde oldukça beğenilen bir uçuş manevrası sergiledi. Onu mutlak mükemmellikten ayıran sadece birkaç küçük ayrıntı vardı."
 curtiss.412.g: "İyi."
 curtiss.413.t: "Vasat Manevra"
 curtiss.413.d: "Hava gösterisi oldukça sıkıcı bir etkinlik haline geldi. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] standart manevrasıyla ikna edemedi."
 curtiss.413.g: "Özel bir şey yok..."
 curtiss.414.t: "Feci Manevra"
 curtiss.414.d: "Hava gösterisi bir korku etkinliğine dönüştü: [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] riskli bir manevrayı uygularken uçağının kontrolünü kaybetti ve düştü! Birkaç seyirci yaralandı ve talihsiz pilot gösteri sırasında hayatını kaybetti. Etkinlik derhal iptal edildi."
 curtiss.414.g: "Feci!"
 curtiss.411.f: "Bir hava gösterisi, pilotların uçaklarını uçuş sırasında sergiledikleri açık hava etkinliğidir. Genellikle akrobasi gibi muhteşem uçuş manevraları ve uçuş koşulları sergilerler. Bunları tek başlarına ya da formasyon halinde gösterirler. Bu şekilde hem uçuş becerilerini hem de uçaklarının yeteneklerini sergilerler. Hızla ardışık gelen uçuş manevraları seyirciyi eğlendirmeyi ve etkilemeyi amaçlar. Askeri pilotların sergilediği birçok manevra, askeri uçakların olağan uçuş manevralarıdır. Pilotlar bunları hava muharebelerine hazırlık için düzenli olarak eğitir. Birçok farklı uçak tipinin tanıtıldığı ve uçurulduğu ilk uluslararası halka açık hava gösterisi, 22-29 Ağustos 1909 tarihlerinde Reims’te düzenlenen Grande Semaine d'Aviation de la Champagne idi. Aynı yılın Eylül ayında İtalya’nın Brescia kentinde başka bir hava gösterisi yapıldı. Geçmişte, hava gösterilerinde ve hava gösterisi eğitimleri sırasında çok sayıda, bazen de ciddi kazalar yaşanmıştır. Bunlar, diğer şeylerin yanı sıra, uçaklar arasındaki dar mesafeler, düşük irtifalar ve yüksek uçuş hızları nedeniyle ortaya çıkmıştır."
 curtiss.421.t: "Akrobasi Ekibi"
 curtiss.421.d: "[SCOPE.sCharacter('curtiss_general_scope').GetFullName] sadece yetenekli bir komutan değil, aynı zamanda pilotluk becerileriyle de biliniyor. General, uçak geçidi vesilesiyle formasyon manevrası göstermek üzere birkaç subaydan oluşan bir akrobasi ekibi kurdu."
 curtiss.421.f: "Akrobasi ekipleri, akrobasi hareketlerini ustalıkla icra eden ve sergileyen pilot gruplarıdır. Birkaç hava aracı, filo olarak adlandırılan bir birim oluşturur. Birçok akrobasi ekibi, filo gücündeki hava kuvveti birlikleridir. İngiltere akrobasi uçuşunun beşiği olarak kabul edilir. 1920’lerde burada hem bireysel hem de ekip halinde havacılık mükemmelleştirildi. Yine bu dönemde, şimdiden binlerce ziyaretçi çeken havaalanlarında ilk halka açık etkinlikler düzenlendi."
 curtiss.421.g: "Güzel gösteri."
 curtiss.422.t: "Uçak Geçidinde Yeni Prototip"
 curtiss.422.d: "Devam eden uçak geçidi vesilesiyle, [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName] yeni bir uçağın prototipini inşa etti."
 curtiss.422.f: "Uçak geçitleri sadece akrobasi gösterileri yapmak ve bir hava kuvvetinin askeri potansiyelini göstermek için değil, aynı zamanda teknolojik başarıları ve mühendislik harikalarını sergilemek için de kullanıldı."
 curtiss.422.g: "Havacılık ilhamları."
 curtiss.423.t: "Uçak Geçidinde [ROOT.GetCountry.GetCapital.GetCityHubName]"
 curtiss.424.t: "Uçak Geçidinde [ROOT.GetCountry.GetNameNoFormatting]"
 curtiss.423.d: "[GetPlayer.MakeScope.Var('curtiss_airline_tycoon_var').GetCharacter.GetFullName], dev uçağıyla uçak geçidine katıldı ve orada bulunan seyircileri hayran bıraktı."
 curtiss.424.d: "Devasa hava gemisi uçak geçidinde seyircileri hayrete düşürdü. İnsanlar, ilerlemenin ve iradenin neler başarabileceğine hayran kaldı."
 curtiss.423.f: "İnsanları bir ülkenin üstünlüğüne ve büyüklüğüne ikna etmenin en iyi yolu devasa bir uçaktır."
 curtiss.423.g: "Uç sevgilim, uç!"
 curtiss.425.t: "Kitleleri Etkilemek"
 curtiss.425.d: "Uçak geçidi giderek daha fazla insanda olağanüstü bir duygu uyandırıyor. Bu, hayranlık ve korkunun bir bileşimidir: bir yanda uçaklar ulusumuzun büyüklüğünü ve gücünü gösterirken, diğer yanda güzelliğin içinde var olan gizli bir yıkım arzusu vardır. Hava üstünlüğü, insan üstünlüğünün bir yönü müdür?"
 curtiss.425.f: "'Havacılık, insanlara yeni bir hareket alanı, gökyüzünü açtı. Böylece zorunlu olarak yeni bir savaş alanı da yarattı; çünkü iki insan nerede karşılaşsa, çatışma kaçınılmazdır. Gerçekte, havacılık sivil kullanımından çok önce savaşta geniş ölçüde kullanıldı. Birinci Dünya Savaşı patlak verdiğinde hâlâ emekleme aşamasındaydı, ancak o dönemde askeri gelişim için güçlü bir ivme kazandı.' -Giulio Douhet"
 curtiss.425.g: "Sonuçta biz büyük bir ülkeyiz."
 curtiss.431.t: "Uçak Geçidi Sona Erdi"
 curtiss.431.d: "Uçak geçidi sona erdi. Yarattığı izlenimler uzun süre etkisini sürdürecek, askeriye, siviller, geleceğin ve mevcut pilotlarının ruhunu ilhamla dolduracak – ve yabancı ülkelere ulusumuzun büyüklüğünü gösterecek."
 curtiss.431.f: "'Umarım yakında başka bir hava gösterisi olur?'"
 curtiss.431.g: "Bu moral verici bir etkinlikti."
 curtiss_airplane_speed_record_modifier: "Uçak Hız Rekoru"
 curtiss_testplane_cost_modifier: "Test Uçağı İnşası"
 je_curtiss_testplane_build: "Test Uçağı İnşası"
 je_curtiss_testplane_build_reason: "Bir test uçağının yetenekleri öncelikle bir havacılık mühendisinin deneyimine ve araştırılan teknolojilere bağlıdır. Uçak kabiliyetleri üzerinde kritik etkiye sahip teknolojiler arasında #O Modern Fizik#!, #O Ark Kaynağı#!, #O Deniz Uçakları#! ve #O Modern Havacılık#! bulunur. Bir uçaktan en iyi şekilde yararlanmak için #V aktif bir pilota#! ihtiyaç vardır; pilotun deneyimi aynı zamanda maksimum hız üzerinde doğrudan etkilidir."
 je_curtiss_testplane_build_goal: "Yeni bir uçak inşa etmek yaklaşık bir yıl sürer."
 notification_curtiss_speed_record_broken_notification_name: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName] hız rekorumuzu kırdı!"
 notification_curtiss_speed_record_broken_notification_desc: "[SCOPE.sCountry('curtiss_record_breaking_country').MakeScope.GetVariable('curtiss_pilot_var').GetCharacter.GetFullName], [SCOPE.sCountry('curtiss_record_breaking_country').GetName] ülkesinden bir pilot, hız dünya rekorumuzu kırdı. Yeni rekor [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue|V0] km/s."
 curtiss.60.t: "[SCOPE.sCharacter('curtiss_cook_scope').GetFullNameNoFormatting] & Oğul"
 curtiss.60.d: "[SCOPE.sCharacter('curtiss_cook_scope').GetFullName], ülkemizin ilk turizm şirketini kurdu ve bu nedenle yerel endüstrinin temellerini atan kişi olarak kabul ediliyor. Gelir minimal, ancak bir ülke ne kadar ilgi çekiciyse o kadar çok misafir bekleyebilir."
 curtiss.60.f: "Turizm, kültürel açıdan üstün bir ulusa ek gelir sağlar. Eşsiz anıtlar, müzeler ve sanat galerileri, arkeolojik alanlar, sanat merkezleri ve çeşitli kültürel geleneklerdeki yüksek değerler bir ulusu cazip bir turistik destinasyon haline getirir. Hareket özgürlüğünü ve ekonomik faaliyeti artıran yasalar da turizm gelirini yükseltir. Altyapı da hayati bir rol oynar – sonuçta, uzak yerlere ulaşılamaz. Özellikle bir havaalanı turizmi devrim niteliğinde değiştirir ve geliri önemli ölçüde artırır."
 curtiss.60.g: "Turistler sanat ve kültüre para mı ödüyor?"
 curtiss.700.t: "Yeni test uçağı hazır!"
 curtiss.700.d: "Mühendisimiz [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], yeni test uçağı üzerindeki çalışmalarını tamamladı. Uçağın teknik adı [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] ona [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')] adını verdi."
 curtiss.700.f: "#V Uçak Verileri #!\n\nAd: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]\nTip: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_type')]\nÖzellikler: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_plane')]\nMalzeme: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_material')]\nMotor: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_engine')]\nTahmini Hız: [ROOT.Var('test_airplane_speed_var').GetValue] km/s"
 curtiss.700.g: "Uçağı kalkışa hazırla!"
 curtiss.700.h: "Bu çok riskli!"
 curtiss.701.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')] Uçuşu"
 curtiss.701.d1: "Yalnızca #b #n [ROOT.Var('new_airplane_speed_var').GetValue]#! km/s#! hıza ulaşan [SCOPE.sCharacter('curtiss_pilot_scope').GetSheHe], ülkemizin önceki #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#! km/s#! hız rekorunu kıramadı. Bu, ülkemizin havacılığı için hayal kırıklığı yaratan bir gün."
 curtiss.701.d2: "[ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName], [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')] ile ülkemiz için yeni bir hız rekoru kırdı! #b #p [ROOT.Var('new_airplane_speed_var').GetValue]#! km/s#! hıza ulaşarak ülkemizin önceki #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#! km/s#! rekorunu geçti. Ancak bu, #b #p [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue]#! km/s#! [GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon] olan dünya rekorunu kırmaya yetmedi."
 curtiss.701.d3: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]’in mekanik dehası ve [ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName]’in olağanüstü uçuş yetenekleri çığır açıcı bir başarıya imza attı: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')] yalnızca ülke hız rekoru olan #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue] km/s#! hızını kırmakla kalmadı, aynı zamanda #b #p [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue]#! km/s#! [GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon] dünya rekorunu da kırdı. Uçak nefes kesici bir #b #p [ROOT.Var('new_airplane_speed_var').GetValue]#! km/s#! hıza ulaştı. Böylece [ROOT.GetCountry.GetName], havacılıkta önde gelen ülke kabul edilmektedir!"
 curtiss.701.f1: "\"Hakkımda yalnızca tek bir şey hatırlansın isterim: havacılığa katkım.\" -Howard Hughes"
 curtiss.701.f2: "\"İmkânsızı yap, çünkü neredeyse herkes fikirlerimin yalnızca hayal olduğunu söyledi.\" -Howard Hughes"
 curtiss.701.f3: "\"Eğer tasarımda bir hata yaptıysam, bunun bedelini ödemesi gereken kişi benim. Kendisinden korktuğum bir uçağı başkasının uçmasını asla istemem.\" -Howard Hughes"
 curtiss.701.g: "Uçak mıydı yoksa pilot mu?"
 curtiss.701.h: "Fena değildi ama yeterli değil."
 curtiss.701.i: "Harika! Tebrikler!"
 curtiss.702.t: "Hız Uçuşu Felaketle Sonuçlandı"
 curtiss.702.d: "Hız rekoru arayışı trajediyle sonuçlandı. [ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName], hız uçuşu sırasında [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]’in kontrolünü kaybetti! [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')], [SCOPE.sCharacter('curtiss_pilot_scope').GetHerHim] alevler içinde ölüme sürükledi. Tüm hava ekibi şok içinde."
 curtiss.702.f: "'Kötü bir adam değildi. Kötü bir pilottu, evet, ama kötü bir adam değildi.'"
 curtiss.702.g: "Hayır. Hayır! Haaayıııııır!"
