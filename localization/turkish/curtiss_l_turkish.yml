 je_curtiss_found_schneider_trophy: "Schneider Kupası’nın Kuruluşu"
 je_curtiss_found_schneider_trophy_reason: "Jacques Schneider, bir Fransız sanayici, lisanslı uçak ve balon pilotuydu ve uzun süre balon irtifa rekorunu elinde tuttu. Ağır bir kaza nedeniyle uçma yetisini kaybettikten sonra çeşitli yarışmaları ve hava kulüplerini maddi olarak destekledi. 1912 Monaco toplantısında yarış hakemi olarak deniz uçağı tasarımının diğer uçakların çok gerisinde olduğunu fark etti. Deniz uçaklarının uzun menzilli yolcu taşımacılığı için en iyi çözüm olacağı düşünüldüğünden, Bay Schneider bir deniz uçağı yarışının bu uçakların daha hızlı gelişmesini sağlayacağını düşündü."
 je_curtiss_found_schneider_trophy_goal: "En az #BLUE 5#! büyük güç statüsüne ve üç limana sahip ülke #E Deniz Uçakları#! icat etmiş olmalı. Şu anda yalnızca #G [GetGlobalVariable('curtiss_seaplane_nations').GetValue]#! ülke gereklilikleri karşılıyor."
 je_curtiss_schneider_trophy_race: "Schneider Kupası Yarışı"
 je_curtiss_schneider_trophy_race_reason: "Schneider Kupası, dönemin en ileri teknolojisi ve en iyi pilotları için bir yarışmaydı. Asıl yarış başlamadan önce bile zafer olasılığı hesaplanır. Pilot sayısı, bir as pilot, uçak odaklanması, modern havacılığın icadı, havaalanı ve uçak fabrikalarının sayısı, başarılı eğitim ve devlet desteği; yarış öncesinde önemli sayıda puan kazandıran ve böylece zaferi daha olası kılan etkenlerdir. Bir havayolunun büyüklüğü ve başarısı da rol oynar. Kalan zafer şansı ise yarışın kendisinde, olayların puan kazandırmasıyla hesaplanır. İlk olarak 30 @curtiss_schneider_point! #E Schneider Kupası Puanı#! toplayan ülke zafer için en iyi şansa sahip olur.\n\n#b Katılımcılar:[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_1_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_2_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_3_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_4_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_5_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_6_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_7_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_8_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_9_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_10_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_11_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_12_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_13_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_14_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_15_type')]"
 je_curtiss_schneider_trophy_race_goal: "Takımımız, ilk olarak #BLUE 30#! @curtiss_schneider_point! Schneider Kupası Puanına ulaşırsa kazanır. Şu anda #G [ROOT.Var('curtiss_schneider_trophy_point_var').GetValue]#! @curtiss_schneider_point! Schneider Kupası Puanımız var."
 je_curtiss_schneider_trophy_race_invalid: "Eğer başka bir ülke bizden önce #BLUE 30#! @curtiss_schneider_point! #E Schneider Kupası Puanı#! toplarsa, o ülke yarışı kazanır."
