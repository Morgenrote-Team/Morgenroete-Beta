 je_curtiss_airline_company: "Havayolu Şirketi"
 je_curtiss_airline_company_reason: "Karizmatik ve hırslı eksantrik bir girişimcinin yönetiminde bir havayolu şirketinin kurulması, havacılığın gelişimi için özel fırsatlar açar."
 je_curtiss_air_combat: "Hava Muharebesi"
 je_curtiss_air_combat_reason: "Bir [concept_curtiss_pilot], en az bir birimin hava desteği olduğu sürece bir cephe operasyonunda konuşlandırılabilir. Özelliğine bağlı olarak, birime ek saldırı gücü verirler. Cephe operasyonları için pilotlar ayda 10 tecrübe puanı alır. Bu süre zarfında, bazıları riskli sonuçları olan ek etkinlikler mümkündür. Göreve alındıktan sonra, pilotların tekrar geri çekilebilmeleri için en az altı ay cephede kalmaları gerekir. Yaralı pilotlar herhangi bir tecrübe kazanmaz."
