 je_curtiss_found_private_airline: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolu Şirketi"
 je_curtiss_found_private_airline_reason: "Uçağın günlük hayatta yaygınlaşmasıyla artık yalnızca askeriye ile sınırlı kalmamaktadır. Taşımacılık pahalı olsa da, mal ve yolcu taşımak için hâlâ birçok teşvik bulunmaktadır. Uygun koşullar altında, ilk özel havayolu şirketi yakında kurulmalıdır."
 je_curtiss_found_state_airline: "Ulusal Havayolu Şirketi"
 je_curtiss_found_state_airline_reason: "Gökyüzünü fethetme yolundaki küresel rekabette [ROOT.GetCountry.GetNameNoFlag] öne çıkan bir konumda olmalıdır. Vatandaşlarımızın hızlı taşınmasını sağlamak için bir devlet havayolu kurmak iyi bir fikirdir."
 je_curtiss_spruce_goose_plan: "Gökyüzünün Herkül’ü"
 je_curtiss_spruce_goose_plan_reason: "Gökyüzü son sınırdır. Erken modern dönemdeki keşif çağı ne idiyse, şimdi de gökyüzünün fethi odur. Ancak İspanyol kalyonlarıyla karşılaştırıldığında, bugünün göksel gemileri sadece fındık kabuğu gibidir. Okyanus devleri denizleri aşarken, gökyüzü hâlen küçük makinelerle sınırlıdır. Onlarca değil, yüzlerce kişiyi taşıyabilecek devasa bir uçak inşa etme hayali ütopik görünebilir. Ancak gelişen bir uçak sanayisi ve doğru kişi tarafından yönetilen güçlü bir havayolu bu hayali gerçeğe dönüştürebilir..."
 je_curtiss_spruce_goose_build_reason: "Delilik nedir? Megalomani nedir? Dahilik nedir? [SCOPE.sCharacter('howard_hughes').GetFullName] bu projeyle neyi amaçladıysa, şimdiye kadar insan zekâsının ve teknolojisinin hayal etmeye cesaret ettiği her şeyi gölgede bırakıyor. Dünyanın en büyük uçağı, bir köyün tamamını taşıyabilecek kadar büyük. Hükümet prestij sebepleriyle bu projeyi desteklemeyi kabul etti. Kendisine @money! #R 200K#! kadar yardım sözü verildi. Şirketinin yaptığıyla kıyaslanınca bu, devede kulak kalır. Eğer [SCOPE.sCharacter('howard_hughes').GetLastName] [ROOT.GetCountry.GetCapital.GetCityHubName] ile başarılı olursa, bu havacılıkta bir devrim anlamına gelecek. Başarısız olursa, bu hem şirketi hem de havacılık için felaket olur. Ama işte [SCOPE.sCharacter('howard_hughes').GetLastName] gibi eksantrik karakterlerin sorunu budur: sonunda onun deli mi yoksa dahi mi olduğuna karar verilir."
 je_curtiss_spruce_goose_build_goal: "Ülkenin en iyi mühendisleri devasa uçak üzerinde aralıksız çalışıyor. Tahmini toplam inşa süresi yaklaşık #BLUE 36#! ay. İnşa başlangıcından bu yana #G [ROOT.Var('curtiss_spruce_goose_progress').GetValue]#! ay geçti."
 je_curtiss_hindenburg_plan: "İhtişamla Seyahat"
 je_curtiss_hindenburg_plan_reason: "Zeplin yolculukları zirveye ulaştı. Ulusumuz dünyanın en büyük ve en görkemli zeplinlerinin doğduğu yer olarak görülüyor. Dünyayı devasa bir zeplinle hayran bırakmanın ve gökyüzünde yolculuk etmenin zamanı geldi."
 je_curtiss_hindenburg_build_reason: "Gelişen havayolumuz, bugüne kadar hiç olmadığı kadar çok yolcu taşıyacak devasa bir proje başlattı. Yolcular, kendi piyanolu barlarından en seçkin uluslararası şarapların sunulduğu muhteşem bir restorana kadar her türlü lüksle çevrelenecek."
 je_curtiss_hindenburg_build_goal: "Ülkenin en iyi mühendisleri devasa zeplin üzerinde aralıksız çalışıyor. Tahmini toplam inşa süresi yaklaşık #BLUE 60#! ay. İnşa başlangıcından bu yana #G [ROOT.Var('curtiss_hindenburg_progress').GetValue]#! ay geçti."
 je_curtiss_lindbergh_generic: "Orteig Ödülü"
 je_curtiss_lindbergh_generic_reason: "Orteig Ödülü, New York ile Paris arasında (ya da tersi yönde) durmaksızın uçan ilk pilota (ya da pilotlara) verilecek bir ödüldü. Birçok ünlü havacı başarısız girişimlerde bulundu, ancak görece az tanınan Amerikalı Charles Lindbergh, 1927’de Spirit of St. Louis adlı uçağıyla bu ödülü kazandı. Ancak ödül uğruna birçok insan hayatını kaybetti. Üç ayrı kazada altı kişi öldü, dördüncü kazada üç kişi yaralandı. Ödül, havacılığa büyük yatırımları tetikledi; bazen ödülün değerinin kat kat üzerinde. Aynı zamanda kamuoyunun ilgisini ve havacılık teknolojisinin gelişimini de hızlandırdı. Ödül, 1919’da New Yorklu otel sahibi Raymond Orteig tarafından teklif edilmişti. Beş yıl süreyle geçerli olan ödül, dönemin uçaklarının kapasitesini aşıyordu, bu yüzden yarışmaya katılım olmadı. İlk süresi dolduktan sonra Orteig, 1 Haziran 1925’te ödülü yeniden ilan etti ve 25.000 USD tutarında tahvili Bryant Bankası’na yatırdı. Ödül, yedi kişilik bir mütevelli heyeti tarafından yönetildi."
 je_curtiss_lindbergh_usa: "Orteig Ödülü"
 je_curtiss_lindbergh_usa_reason: "Orteig Ödülü, New York’tan Paris’e veya tam tersi yönünde durmaksızın uçuş yapan ilk havacı(lar)a verilen bir ödüldü. Birçok ünlü havacı, New York–Paris uçuşunu başaramadan denemelerde bulundu, ta ki nispeten tanınmamış Amerikalı Charles Lindbergh 1927’de Spirit of St. Louis adlı uçağıyla ödülü kazanana kadar. Ancak, ödül için yarışan birçok kişi hayatını kaybetti. Üç ayrı kazada altı adam öldü, dördüncü kazada ise üç kişi yaralandı. Ödül, havacılığa önemli yatırımlar yapılmasına yol açtı; kimi zaman ödülün değerinin katbekat fazlası harcandı. Böylece hem kamuoyunun ilgisi hem de havacılık teknolojisi ileriye taşındı. Ödül ilk kez 1919’da New York’lu otel sahibi Raymond Orteig tarafından sunuldu. Beş yıllık süreyle teklif edilen ödül, o dönemin uçaklarının kapasitesini aşan bir hedef olarak görüldü ve hiçbir katılımcı çıkmadı. Sürenin bitiminde Orteig, 1 Haziran 1925’te Bryant Bank’a 25.000 USD tutarında menkul kıymet yatırarak ödülü yeniden teklif etti. Ödülün dağıtımı ise yedi kişilik bir mütevelli heyetine bırakıldı."
 je_curtiss_zeppelin_expedition: "Kuzey Kutbu Zeplin Seferi"
 je_curtiss_zeppelin_expedition_reason: "Aeroarctic, yani 'Zeplinle Arktik Araştırmaları Uluslararası Araştırma Topluluğu', kutup araştırmalarında zeplinlerin kullanılmasını hedefleyen hükümet dışı bir bilimsel topluluktu. Topluluk, esasen havacı ve sonradan genel sekreteri olan Walther Bruns’un girişimiyle kuruldu. 1924’te kurucu başkanı Fridtjof Nansen’di. Yıllarca süren hazırlıkların ardından, 1931’de bir zeplin ilk kez tamamen bilimsel bir kutup seferinde başarıyla kullanıldı. LZ 127 Graf Zeppelin’in Arktik uçuşu, uçulan kutup bölgelerinin coğrafyasına dair bilgiyi önemli ölçüde artırdı. Daha 1926’da Umberto Nobile, 'Norge' adlı zepliniyle Kuzey Kutbu’nu geçmiş, ardından 'Italia' ile yeni bir sefer düzenlemişti."
 je_curtiss_zeppelin_expedition_goal: "Zeplin seferimiz #BLUE 16#! hafta sonra dönecek. Şu ana kadar #G [ROOT.Var('curtiss_zeppelin_progress').GetValue]#! hafta geçti."
 je_zeppelin_expedition_fail: "Eğer sefer sırasında #R 3#! veya daha fazla risk birikirse başarısız olacağız."
 je_curtiss_lost_horizon: "Kayıp Ufuk"
 je_curtiss_lost_horizon_reason: "El yazmasının açıklamaları doğruysa, Himalayalar’da ne tabelası ne de izi olan gizemli bir yer bulunduğu söyleniyor. Ancak, Tibet’in yüksek dağlarında üç eserin bulunduğu ve deneyimli bir arkeoloğun yardımıyla bunların gizli vadiye giden yolu açabileceği iddia ediliyor."
 je_curtiss_lost_horizon_goal: "Şimdiye kadar #BLUE 3#! eserden #G [ROOT.Var('curtiss_shangrila_progress').GetValue]#! tanesini bulduk."
 curtiss.10.t: "Havanın ve Suyun Hâkimi"
 curtiss.10.d: "Deniz uçakları ve uçan teknelerin çağı yalnızca ulaşımı devrimleştirmekle kalmaz, daha önce bilinmeyen imkânlar sunar ve son engelleri aşmak isteyen ruhu da besler."
 curtiss.10.f: "20. yüzyılın başında deniz uçağının icadı beklenmedik avantajlar sağladı. Göllere, nehirlere ve limanlara inebildikleri için hem şehir merkezlerine yakın hem de keşfedilmemiş vahşi doğada iniş yapılabiliyordu – havaalanına ya da piste ihtiyaç yoktu. Aynı zamanda ülkeler, su sporları uçak yarışlarında yeni rekorlar için yarışıyordu."
 curtiss.10.g: "Bu, kahramanlık çağının son perdesi."
 curtiss.12.t: "Henri Fabre"
 curtiss.12.d: "Havacılık öncüsü Henri Fabre bugün Marsilya Körfezi’nde bir deniz uçağını test ederek havacılıkta bir dönüm noktasına imza attı."
 curtiss.12.f: "Henri Fabre, Louis Blériot ve Gabriel Voisin’in uçaklarını inceleyen bir mühendisti. 1909’da ilk deniz uçağı prototipini yapmaya karar verdi. Fabre, şamandıraların yapımına çok zaman ayırdı. Bu bilgi, sonradan yabancı uçak tiplerine şamandıra eklemesine yardımcı oldu. Ancak ilk prototip yalnızca 18 kW (25 hp) gücünde bir motora sahipti, bu yüzden uçamıyordu. Sonraki makineye daha güçlü bir 37 kW (50 hp) Gnôme radyal motoru takıldı. Uçağın adını 'Hydravion' (deniz uçağı) koydu. 28 Mart 1910’da Marsilya yakınlarındaki Martigues’te Étang de Berre üzerinde kalkış denemeleri başladı. İkinci deneme başarılı oldu ve uçak yaklaşık 600 m uçtu. Ertesi gün ise 6 km’ye ulaştı. İnce yapılı Hydravion oldukça dengeliydi. İnişte kaza yapınca uçak yenilendi. Nisan 1911’de yeni versiyon Monaco’da pilot Jean Bécue ile havalandı. Henri Fabre kısa süre sonra Glenn Curtiss ve Gabriel Voisin tarafından temas edildi; onlar da onun icadını kendi deniz uçaklarını geliştirmede kullandılar. Fabre, 1984’te 101 yaşında öldüğünde hayatta kalan son havacılık öncülerinden biriydi. 1971’de bile hâlen Marsilya limanında tek başına kendi teknesini kullandığını söylemişti."
 curtiss.12.g: "Bu deniz uçağını seviyorum… yoksa bu bir uçan tekne mi?"
 curtiss.13.t: "[SCOPE.sState('curtiss_water_airport_state').GetName]’da Su Havaalanı"
 curtiss.13.d: "[SCOPE.sState('curtiss_water_airport_state').GetName]’daki iyi altyapı, liman ile olan bağlantısı ve yoğun şehirleşme, burada gelişen bir deniz uçağı trafiğine yol açtı."
 curtiss.13.f: "1923’te, Kanal Adaları’na yapılan seferlerle ilk başarılı ticari uçan bot hattı başlatıldı. 1928’de, RAF Uzakdoğu filosuna ait dört Supermarine Southampton uçan botu Avustralya’nın Melbourne kentine ulaştı. Bu uçuş, uçan botların uzun mesafe taşımacılık için güvenilir bir araç haline geldiğinin kanıtı sayıldı. 1930’larda uçan botlar sayesinde ABD ile Avrupa arasında düzenli hava taşımacılığı başladı; Güney Amerika, Afrika ve Asya’ya yeni hava yolları açıldı. İrlanda’daki Foynes ile Newfoundland ve Labrador’daki Botwood, birçok erken transatlantik uçuşun terminaliydi. Kara uçakları için havaalanı olmayan bölgelerde, uçan botlar küçük nehir, göl veya kıyı istasyonlarında yakıt ikmali ve malzeme takviyesi yapabiliyordu. Pan Am Boeing 314 ‘Clipper’ uçan botları, Uzak Doğu gibi egzotik destinasyonları ulaşılabilir kıldı ve uçuşun romantizmini simgeler hale geldi."
 curtiss.13.g: "Deniz uçakları gelecektir."
 curtiss.20.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Hava Yolu Şirketi Kuruldu"
 curtiss.20.d: "Büyük girişimci [SCOPE.sCharacter('howard_hughes').GetFullName], ülkenin ilk hava yolu şirketini kurdu. Bu pahalı projeyle eksantrik iş adamının kendini aşıp aşmayacağı konusunda şimdiden şüpheler var. Ancak [ROOT.GetCountry.GetName] için bu kesinlikle geleceğe atılmış önemli bir adım."
 curtiss.20.f: "“Ben paranoyak, çılgın bir milyoner değilim. Kahrolsun, ben milyarderim!” - Howard Hughes"
 curtiss.20.g: "Tebrikler."
 curtiss.20.h: "Gelecek havacılıkta — şirketi destekleyin!"
 curtiss.21.t: "Ulusal Hava Yolu Şirketi Kuruldu"
 curtiss.21.d: "Bir ulusal hava yolu şirketinin kurulmasıyla birlikte [ROOT.GetCountry.GetNameNoFlag], insanlığın ilerleyişinde bir mihenk taşı haline geldi."
 curtiss.21.f: "Devlet hava yolları, özel rakiplerinden daha pahalıdır ve aynı avantajlara sahip değildir. Ancak mali zorluklara girmezler ve bu nedenle risklere karşı bir nebze daha korunaklıdırlar."
 curtiss.21.g: "Şampanya!"
 curtiss.22.t: "Ulusal Hava Yolu’nun Özelleştirilmesi"
 curtiss.22.d: "Yakın zamanda yapılan anayasa değişikliğinin ardından hükümet, devlet hava yolunun tasfiye edilip özel bir şirkete dönüştürüleceğini duyurdu."
 curtiss.22.f: "Ekonominin serbestleşmesi, devlet hava yolumuzun artık bu haliyle geleceği olmadığı anlamına geliyor. Aslında birçok siyasetçi, hava yollarının pahalı bir lüks olması nedeniyle rahatlamış durumda. Ayrıca gelecekte şirketi yönetecek varlıklı bir yatırımcı olarak [SCOPE.sCharacter('howard_hughes').GetFullName] bulundu. Satış, yüksek özelleştirme gelirleri sağlayacak ancak bazı lobiciler, yeni şirketlere başlangıç desteği olması için bu gelirden vazgeçilmesi gerektiğini savunuyor. Aslında yalnızca işletme maliyetlerinden kurtulmak bile yeterince tatmin edici."
 curtiss.22.g: "Özelleştirme gelirleri bize yarar sağlamalı."
 curtiss.22.h: "Şirket, büyüyüp gelişmesi için parayı elinde tutmalı."
 curtiss.23.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Hava Yollarının Kamulaştırılması"
 curtiss.23.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Hava Yolları, ülkenin en büyük özel şirketlerinden biri olarak görülmeye devam ediyor. Ancak artık devlet kontrolüne alınması gerektiğini dile getiren sesler yükseliyor."
 curtiss.23.f: "Bu kadar büyük bir şirketin — [SCOPE.sCharacter('howard_hughes').GetFullName]’ın [ROOT.GetCountry.GetAdjectiveNoFormatting] Hava Yolu Şirketi — ya parçalanması ya da kamulaştırılması gerektiği tamamen açıktır. Bunun sonucunda üst düzey yetkililer, özel şirketi devlet mülkiyetine devretme planlarını şimdiden sundular. Bir grup, sürecin yasal açıdan mümkün olduğunca düzgün yürütülmesini savunuyor. Diğerleri ise bir örnek teşkil etme fırsatı görüp [SCOPE.sCharacter('howard_hughes').GetFullName]’ın varlıklarına el konulması ve bunların kamu yararına bağışlanması gerektiğini düşünüyor."
 curtiss.23.g: "Şirketi yasal açıdan sağlam bir şekilde kamulaştır."
 curtiss.23.h: "O şişman asalaklar halkın sırtından çok uzun süredir geçiniyor."
 curtiss.30.t: "Il Vate (Şair)"
 curtiss.30.d: "Büyük yazar [SCOPE.sCharacter('curtiss_dannunzio').GetFullName], savaşın çağrısını duydu ve pilot olarak hizmete hazır olduğunu bildirdi."
 curtiss.30.f: "Gabriele D’Annunzio, I. Dünya Savaşı sırasında İtalyan şair, oyun yazarı, hatip, gazeteci, aristokrat ve İtalyan Kraliyet Ordusu subayıydı. 1889’dan 1910’a kadar İtalyan edebiyatında, 1914’ten 1924’e kadar da siyasi yaşamda önemli bir yer edindi. Çoğunlukla 'Il Vate' (Şair) lakabıyla anıldı. D’Annunzio, edebi eserlerinde Fransız sembolizmi ve İngiliz estetiğiyle yakından iç içe olan Dekadan hareketiyle ilişkilendirildi. Bu tür eserler, önceki romantiklerin natüralizmine bir karşı çıkışı temsil ediyor, hem duygusal hem de mistik bir nitelik taşıyordu. Friedrich Nietzsche’nin etkisi altında kalan D’Annunzio, bu etkileri hem edebi hem de siyasi katkılarında dışa vurdu. Birinci Dünya Savaşı sırasında, İtalya’da D’Annunzio’nun algısı edebiyat figüründen ulusal bir savaş kahramanına dönüştü. İtalyan Ordusu’nun seçkin Arditi birlikleriyle ilişkilendirildi ve Viyana Üzerinden Uçuş gibi eylemlere katıldı."
 curtiss.30.g: "Iterum rudit leo! (Aslan yeniden kükredi!)"
 curtiss.31.t: "Kızıl Baron"
 curtiss.31.d: "[SCOPE.sCharacter('curtiss_richthofen').GetFullName] sayesinde Almanya, dünya tarihinin en büyük hava aslarından birine sahip olduğunu iddia edebilir."
 curtiss.31.f: "Manfred Albrecht Freiherr von Richthofen, I. Dünya Savaşı sırasında Alman subayı ve savaş pilotuydu. Savaş boyunca tek başına en fazla hava zaferine ulaşan pilottu. Richthofen, günümüzde bile filmlerde, kitaplarda ve diğer medya eserlerinde hatırlanan dünyanın en ünlü pilotlarından biri haline geldi. Soylu kökeni ve uçağının kırmızı boyası sayesinde 'Kızıl Baron' lakabını aldı."
 curtiss.31.g: "Bir efsane doğuyor."
 curtiss.40.t: "Atlantik’i Kesintisiz Geçiş"
 curtiss.40.g: "Konfeti geçidine hazırlanın!"
 curtiss.42.g: "Gösterişli bir performans."
 curtiss.50.t: "Havacılığın Geleceği"
 curtiss.50.d: "Havacılık teknolojisinin ve sivil havacılığın gelişmesiyle birlikte, ülkemizin uçakların mı yoksa zeplinlerin mi geliştirilmesine yatırım yapmak istediği sorusu gündeme geliyor."
 curtiss.50.f: "“Doğrudur, yoldaşlarının kırılgan bedenleri uçağını ağırlaştırmaz; doğrudur, zayıf insanların huzursuz zihinleri kalabalık kabinde yoktur; ama hava gemisi rotasında ilerlerken o, cesarete ilham veren o nadir ruhlarla bağ kurar ve onların güç verici kudretiyle koluna kuvvet, aklına kaynak, ruhuna huzur bulur. Yalnız mı? Eğer insana seçim hakkı verilseydi, hangi başka yoldaşlarla uçmak isterdi?” - Charles Lindbergh"
 curtiss.50.g: "Uçaklar."
 curtiss.50.h: "Zeplinler."
 curtiss.51.t: "Helyum Keşfedildi"
 curtiss.51.d: "Petrol araması sırasında, işçilerimiz [SCOPE.sState('curtiss_helium_state').GetName] bölgesinde helyum yatağı içeren bir gaz sahasına rastladılar. Bu keşif havacılık endüstrimiz için faydalı olabilir."
 curtiss.51.f: "Helyumun ilk kanıtı 18 Ağustos 1868’de, Güneş’in kromosfer spektrumunda 587,49 nanometre dalga boyunda parlak sarı bir çizgi olarak gözlemlendi. Çizgi, Hindistan’ın Guntur kentinde gerçekleşen tam Güneş tutulması sırasında Fransız astronom Jules Janssen tarafından tespit edildi. Lockyer ve İngiliz kimyager Edward Frankland elementi, Yunanca Güneş anlamına gelen 'helios' kelimesinden adlandırdı. 26 Mart 1895’te İskoç kimyager Sir William Ramsay, helyumu Dünya’da izole etti. 1903’te Kansas’ta yapılan bir petrol sondajında yanmayan bir gaz fışkırması meydana geldiğinde, Kansas eyalet jeoloğu Erasmus Haworth gaz örnekleri topladı. Daha sonra Hamilton Cady ve David McFarland, gaz örneğinin %1,84’ünün helyum olduğunu keşfetti. Bu, helyumun Dünya’da genel olarak nadir olmasına rağmen Amerikan Büyük Ovaları’nın altında büyük miktarlarda yoğunlaştığını ve doğal gazın yan ürünü olarak çıkarılabileceğini gösterdi. Düşük sıcaklıklı gaz sıvılaştırma kullanılarak yapılan çıkarma işlemi I. Dünya Savaşı sırasında yeterince gelişmemiş olsa da üretim devam etti. Helyum esas olarak havadan hafif araçlarda taşıyıcı gaz olarak kullanıldı."
 curtiss.51.g: "Stratejik bir rezerve ihtiyacımız var."
 curtiss.52.t: "Helyum rezervi kaybedildi"
 curtiss.52.d: "Petrol ve gaz sahalarına erişimimiz olmadan, artık helyum çıkaramıyoruz."
 curtiss.52.g: "Bu çok büyük bir sorun olmamalı... değil mi?"
 curtiss.53.t: "Graf [SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] hava gemisi inşa etmek için destek arıyor"
 curtiss.53.d: "Kimse Graf [SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName]’in deli mi yoksa dahi mi olduğunu bilmiyor, fakat o bir hava gemisi inşa etme planı için destek arıyor. Ona destek vermeli miyiz?"
 curtiss.53.f: "\"Balonların açık bir dezavantajı var: onları yönlendiremiyorsunuz. Bu gerçeğe çeşitli savaşlarda şahit oldum ve bu sorunun çözülebilir olduğunu fark ettim. Yönlendirilebilir bir hava gemisi inşa etmek için sadece yeterli paraya ihtiyacım var.\""
 curtiss.53.g: "Yeni bir İkarus. Para israfı."
 curtiss.53.h: "Muhteşem bir fikir! Ona destek verelim!"
 curtiss.54.t: "Graf von Zeppelin’in LZ 1 hava gemisi uçtu!"
 curtiss.54.d: "Bugün Ferdinand von Zeppelin’in hava gemisinin uçuşuyla havacılıkta yeni bir dönem başladı."
 curtiss.54.f: "13 Ağustos 1898’de Zeppelin, 'arkaya doğru sıralanmış birkaç destek gövdesine sahip yönlendirilebilir hava aracı' için 98580 numaralı Reich patentini aldı. Zeppelin’in tasarımının en önemli özellikleri, halka ve uzunlamasına parçalarla oluşturulmuş sert alüminyum iskelet, iki gondolun iskelete sağlam bağlantısı, gaz hacminin eşit boyutlu silindirik hücrelere bölünmesi ve pervanelerin hava direnci merkezine yerleştirilmesiydi. Hava gemilerine zeplin denildi. Zeppelin’in fikirleri uzun süre uzmanlar ve halk tarafından reddedildi ve alay konusu oldu; Kaiser Wilhelm II, kontu 'tüm güney Almanların en aptalı' olarak nitelendirdi. Bu dönemde Zeppelin şöyle demişti: 'Tabii ki kimse benim için ayağa kalkmaz, çünkü kimse karanlığa atılmak istemiyor. Ama hedefim açık ve hesaplamalarım doğru.' 1900’de LZ 1, Zeppelin’in teknik yöneticisi mühendis Fritz Burr ile birlikte Konstanz Gölü üzerinde üç kez havalandı. Her geçen gün daha iyi sonuçlar, halk arasında kendiliğinden bir coşku yarattı ve bu da Kont’un hava gemilerinin teknolojisini ve işletmesini daha da geliştirebilmesine büyük katkı sağladı."
 curtiss.54.g: "Onun başarabileceğini biliyordum!"
 curtiss.100.t: "Schneider Kupası"
 curtiss.100.d: "Hazırlıklar tamamlandı, ödül parası dağıtıldı ve kupa bağışlandı. Schneider Kupası için, bir hava yarışı için şimdiye kadar sunulan en prestijli ödül için mücadele 3 ay içinde başlayacak!"
 curtiss.100.f: "Coupe d'Aviation Maritime Jacques Schneider, aynı zamanda Schneider Kupası, Schneider Ödülü veya Schneider Kupası olarak da bilinir, deniz uçakları ve uçan tekneler için bir yarışın kazananına yıllık (ve daha sonra iki yılda bir) verilen bir kupadır. Bu yarış, özellikle aerodinamik ve motor tasarımı alanlarında uçak tasarımını ilerletmede önemliydi ve sonuçlarını II. Dünya Savaşı'nın en iyi avcı uçaklarında gösterecekti. Schneider Kupası tasarımları tarafından öncülük edilen aerodinamik şekil ve düşük sürükleme, sıvı soğutmalı motor, İngiliz Supermarine Spitfire, Amerikan North American P-51 Mustang ve İtalyan Macchi C.202 Folgore'da açıkça görülmektedir. Yarışmalar çok popülerdi ve bazıları 200.000'den fazla seyirci çekti."
 curtiss.100.g: "Davetiyeleri gönderin!"
 curtiss.101.d: "Schneider Kupası yarışına katılmak için bir davet aldık! Yarış [SCOPE.sCountry('curtiss_schneider_trophy_host').GetName] tarafından düzenleniyor."
 curtiss.101.g: "Hadi o pilot gözlüklerini uzatın çocuklar!"
 curtiss.101.h: "Kırmızı domuzlar uçmayı öğrenene kadar olmaz..."
 curtiss.102.d: "Hazırlıklar tamamlandı. Yakında tüm dünya, 3 ay içinde son teknoloji deniz uçakları arasında dünya standartlarında bir yarışa tanık olmak için [SCOPE.sState('curtiss_schneider_trophy_state').GetName]'a akın edecek."
 curtiss.103.t: "Takımımıza Destek"
 curtiss.103.d: "Schneider Kupası yarışı yakında başlayacak. Dünya, pilotlarımızın ne kadar iyi performans gösterdiğini izleyecek - ülkemiz de öyle. Takıma mali olarak yardım ederek şansını artırabiliriz. Tabii ki, tüm bunların bir bedeli var..."
 curtiss.103.f: "Schneider Kupası için rekabet ilk başlarda, çok az hükümet desteğiyle çeşitli pilotlar ve uçakları arasında bir yarış olarak başladı. Ancak 1920'lere gelindiğinde, yarış o kadar çok ilgi gördü ki yüz binlerce kişi yarışlara katıldı. Bununla birlikte, yarış ve önemi yeni bir boyut kazandı. ABD ve İtalya kısa süre sonra takımlarını resmen desteklediğinde, rekabet bir milletler turnuvasına dönüştü. İlk başta bu müdahale kabul edilemez olarak görüldü ancak rekabet dezavantajı tehdidi, Büyük Britanya gibi diğer ülkeleri geri düşmemek için takımlarını resmen desteklemeye zorladı."
 curtiss.103.g: "Ulusal onur için hiçbir bedel çok yüksek değildir!"
 curtiss.103.h: "Takım olduğu gibi yeterince iyi."
 curtiss.104.t: "Schneider Kupası Eğitimi"
 curtiss.104.d: "Prestijli Schneider Kupası için yaklaşan yarışma göz önüne alındığında, pilotlarımızın ekstra eğitim tamamlayıp tamamlamaması gerektiği konusunda değerlendirmeler var."
 curtiss.104.f: "Hiçbir sporcu yarışmaya hazırlıksız girmez - aynısı yaklaşan yarış için pilotlar için de geçerli. Ancak, yarışmalardan önce yapılan eğitimler hakkında her zaman tartışmalar olur. Yüksek hızlar ve riskli manevralar, takımımızın daha iyi bir yer elde etmesinin garantisidir. Hatta bazı antrenmanlarda rekorlar kırıldı. Ancak aynı zamanda, egzersizler riskli olarak kabul edilir. Ciddi kaza yaşanmayan Schneider Kupası yarışının aksine, 1923'ten 1931'e kadar hazırlıklar sırasında on pilot ölümlü kaza geçirdi."
 curtiss.104.g: "Pilotlarımızın daha iyi eğitime ihtiyacı var!"
 curtiss.104.h: "Bu çok tehlikeli."
 curtiss.105.t: "Yeni Rekor!"
 curtiss.105.d: "Schneider Kupası için yapılan ekstra eğitim her şeye değdi. Ekip yalnızca kursu hatasız tamamlamakla kalmadı, aynı zamanda yeni bir hız rekoru da kırdı. Bunlar, yaklaşan yarış için iyi birer umut vaat ediyor!"
 curtiss.105.f: "'Uçarım çünkü bu, zihnimi önemsiz şeylerin zulmünden kurtarır.' - Antoine de Saint-Exupery"
 curtiss.105.g: "Aferin çocuklar!"
 curtiss.106.t: "Normal Performans"
 curtiss.106.d: "Belki havadan, belki motivasyondandı - ama ne yazık ki ekibimiz Schneider Kupası eğitimlerinde yalnızca ortalama sonuçlar elde edebildi. Hiç yoktan iyidir belki ama pilotlarımızdan daha yüksek beklentilerimiz vardı."
 curtiss.106.f: "'Bir eylem planı çıkarmak ve ona bağlı kalmak, özellikle de kişinin arkadaşlarının arzuları karşısında, herkes için yeterince zordur; ancak bir havacı için havaya tam doğru zamanda çıkmak için yerde beklemek iki kat daha zordur.' - Glenn Curtiss"
 curtiss.106.g: "Hiç yoktan iyidir."
 curtiss.107.t: "Eğitim Kazası!"
 curtiss.107.d: "Schneider Kupası için son antrenman felaketle sonuçlandı - henüz netleşmeyen nedenlerle, pilotlarımızdan biri uçağın kontrolünü kaybetti ve tüm hızıyla suya çakıldı. Kayıp büyük çabayla kurtarılabildiyse de, hasarı onarmak ve hatanın nedenini belirlemek haftalar alacak. Ayrıca yaklaşan yarış için en yetenekli pilotlarımızdan birinden yoksun kalacak olmamız, Schneider Kupası mücadelesindeki şansımızı azaltıyor."
 curtiss.107.f: "'Uçak havada kalır çünkü düşmeye vakti yoktur.' - Orville Wright"
 curtiss.107.g: "Feci!"
 curtiss.108.t: "Schneider Kupası Pilotu"
 curtiss.108.d: "Schneider Kupası yarışında yarışacak ekibe hangi pilotun liderlik edeceği sorusu hala cevap bekliyor."
 curtiss.108.f: "Genellikle Schneider Kupası milletlerin değil, pilotların yarışıydı; ancak kısa sürede bir ülkeden birkaç pilotun, genellikle üç uçak için üç pilotluk bir ekip halinde takım olarak yarışmaya başlaması yaygın bir uygulama haline geldi. Kısa sürede bireysel pilotlar etrafında bir kült gelişirken, sonraki yıllarda takım çalışması ağır bastı."
 curtiss.108.g: "[SCOPE.sCharacter('curtiss_schneider_pilot_1').GetFullName]"
 curtiss.108.h: "[SCOPE.sCharacter('curtiss_schneider_pilot_2').GetFullName]"
 curtiss.108.i: "[SCOPE.sCharacter('curtiss_schneider_pilot_3').GetFullName]"
 curtiss.108.j: "[SCOPE.sCharacter('curtiss_schneider_pilot_4').GetFullName]"
 curtiss.108.k: "Bir Acemi"
 curtiss.110.t: "[SCOPE.sState('curtiss_schneider_trophy_state').GetName]'da Schneider Kupası Yarışı"
 curtiss.110.d: "Havada motor uğultusu var! Nihayet büyük yarış günü - dünya, Schneider Kupası mücadelesine tanıklık etmek için [SCOPE.sCountry('curtiss_schneider_trophy_host').GetNameNoFlag]'ı ziyaret ediyor."
 curtiss.110.f: "'Her şeyden çok, uçma hissi mükemmel bir huzurun, sinirleri sonuna kadar geren bir heyecanla birleşmesidir. Böyle bir birleşimi hayal edebiliyorsanız.' - Wilbur Wright\n#b Katılımcılar:#!\n\n[GetGlobalVariable('curtiss_schneider_participiant_1_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_2_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_3_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_4_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_5_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_6_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_7_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_8_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_9_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_10_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_11_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_12_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_13_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_14_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_15_global_var').GetCountry.GetName]"
 curtiss.110.g: "Döndür!"
 curtiss.111.t: "Zafer!"
 curtiss.111.d: "Zorlu bir yarışın ardından [ROOT.GetCountry.GetNameNoFormatting], bu yıl Schneider Kupası’nı kazandı! Bir sonraki yarış bu nedenle ülkemiz tarafından düzenlenecek."
 curtiss.111.f: "Üst üste üç galibiyet elde eden ulus, Schneider Kupası’nı sonsuza kadar elinde tutar. Bu prestijli kupa sadece bir spor ödülü değil; teknik üstünlüğün ve bir ulusun kendini aşma, gökyüzünü fethetme iradesinin sembolüdür. Schneider Kupası’nı elinde tutan ülke dünyanın kıskanç bakışlarını üzerine çeker. Tarihi Schneider Kupası’nda beş yıl içinde üç galibiyet yeterli iken, bu oyunda üç galibiyetin arka arkaya gelmesi gerekir. Kupayı en son kazanan ülke, bir sonraki yarışın organizasyon onuruna sahiptir."
 curtiss.111.g: "Ülkemiz için büyük bir gün."
 curtiss.112.t: "[SCOPE.sCountry('curtiss_schneider_trophy_recent_winner').GetNameNoFlag] Schneider Kupası’nı kazandı"
 curtiss.112.d: "Ne yazık ki en iyimiz bile yeterli olmadı. [SCOPE.sCountry('curtiss_schneider_trophy_recent_winner').GetName] takımı bu yıl Schneider Kupası’nı kazandı."
 curtiss.112.f: "Üst üste üç galibiyet elde eden ulus, Schneider Kupası’nı sonsuza kadar elinde tutar. Bu prestijli kupa sadece bir spor ödülü değil; teknik üstünlüğün ve bir ulusun kendini aşma, gökyüzünü fethetme iradesinin sembolüdür. Schneider Kupası’nı elinde tutan ülke dünyanın kıskanç bakışlarını üzerine çeker. Tarihi Schneider Kupası’nda beş yıl içinde üç galibiyet yeterli iken, bu oyunda üç galibiyetin arka arkaya gelmesi gerekir. Kupayı en son kazanan ülke, bir sonraki yarışın organizasyon onuruna sahiptir."
 curtiss.112.g: "Tebrikler..."
 curtiss.113.t: "Schneider Kupası"
 curtiss.113.d: "Üst üste üçüncü galibiyetle Schneider Kupası için yapılan mücadele sona erdi. [ROOT.GetCountry.GetNameNoFormatting], insan gücü, malzeme ve teknoloji açısından üstün olduğunu tüm dünyaya gösterdi. Pilotlarımız ulusal kahramanlar olarak tarihe geçecek, onlarca yıl sonra bile bu son zaferi mümkün kılan cesur pilotlardan bahsedilecek. Schneider Kupası artık bizim ve tüm dünya bize kıskançlıkla bakıyor!"
 curtiss.113.f: "Üçüncü galibiyetle Schneider Kupası nihayet tek bir ulusun eline geçti. Bu, bir yandan havacılık için büyük bir gün; diğer yandan ise havacılığın öncü çağının sona erdiği ve insan hırsının değil saf mekaniklerin hâkim olduğu gümüş çağın başladığına dair hüzünlü bir düşünce bırakıyor."
 curtiss.113.g: "Gökyüzünü fethettik!"
 curtiss.114.t: "Kupa sonsuza dek kaybedildi"
 curtiss.114.d: "Üst üste üçüncü galibiyetle [SCOPE.sCountry('curtiss_schneider_trophy_winner').GetName], dünyanın en çok arzulanan kupasını eve götürmeyi başardı. Ödül artık sonsuza kadar değersiz pilotların kirli ellerinde kalacak."
 curtiss.114.f: "Üçüncü zaferle birlikte, Schneider Kupası nihayet tek bir ulusun eline geçti. Bu bir yandan havacılık için büyük bir gün; öte yandan, havacılığın rekor kıran gelişimiyle birlikte, havacılığın öncülük çağının, artık insanın hırsının değil saf mekaniğin hükmettiği gümüş bir çağ lehine sona eriyor olması melankolik düşüncesi kalıyor."
 curtiss.114.g: "Acı. Çok acı."
 curtiss.121.t: "Mekanik Arızalar"
 curtiss.121.d: "Schneider Kupası, birçok pilotun yarışmaya katılamamasıyla ünlüydü çünkü seyahat etmek bile başlı başına bir sorundu. Bazı makineler hasar gördü, diğerleri ise start işareti verilene kadar nedeni giderilemeyen motor problemleri yaşadı. Mekanik sorunlar tüm takımların yarış dışı kalmasına neden oldu."
 curtiss.121.f: "Schneider Kupası'nın tam bir başarısızlık olduğunu iddia eden, tekil ve tamamen önemsiz sesler var. Zira devam eden motor problemleri, yolculuk zorlukları ve test pilotlarının ölümleri, birçok takımın yarışamamasına yol açtı - bu da yarışmacı sayısının azalmasına neden oldu. Deniz uçağının tarihi doğum yeri olan Fransa, bu tür problemler nedeniyle yarışmaya neredeyse hiç katılamadı. Büyük Britanya veya İtalya gibi ülkeler, yarışmaya katılabilen tek uçağı temin ettikleri için birkaç kez kazandı."
 curtiss.121.g: "Şarlatanlar!"
 curtiss.122.t: "Kaza!"
 curtiss.122.d: "Bir manevra sırasında, pilotumuz kendini fazla zorladı - ve suya çakıldı!"
 curtiss.122.f: "Zorluklarına rağmen, Schneider Kupası yarışı, yirmi yıllık varlığı boyunca ölümlü veya ciddi bir kazaya neden olmamıştır. Ancak bu, yüksek hızlar ve hala emekleme aşamasındaki uçak yapımı göz önüne alındığında, böyle bir felaketin asla yaşanmayacağı anlamına gelmez."
 curtiss.122.g: "Eyvah!"
 curtiss.123.t: "Şamandıra Atlanmış"
 curtiss.123.d: "Ekibimiz Schneider Kupası yarışında iyi bir tur attı, ancak hakimlerden birinin pilotun şamandıralardan birini atladığını iddia etmesi üzerine puan kaybetme tehlikesiyle karşılaştı."
 curtiss.123.f: "1919'da İtalyan takımı, sisli koşullarda, Birleşik Krallık'ın Bournemouth kentinde kazandı. Swanage dönemeçindeki hakemler, yarışın galibi Guido Janello'nun şamandırayı doğru şekilde dolaşmadığını iddia etti. Janello ise hatanın kötü organizasyondan kaynaklandığını ve resmi olmayan bir teknenin onu yanılttığını söyledi. Ancak Janello diskalifiye edildi ve Schneider Kupası o yıl verilmedi. İtalya, bir sonraki yarışın Venedik'te düzenlenmesiyle tazmin edildi. Diskalinin anısı, İtalya 1920 ve 1921'de de kazandığı ve geriye dönük olarak Schneider Kupası'nı sonsuza dek kazanmış olacağı için, İtalyan uçak nostaljikleri arasında bugün bile büyük bir hayal kırıklığına neden olmaktadır."
 curtiss.123.g: "Kötü şans tabii ki."
 curtiss.123.h: "Hakemi rüşvetle ikna etmeyi dene..."
 curtiss.124.t: "Maksimum Hız"
 curtiss.124.d: "Rota boyunca, pilotlarımız [ROOT.GetCountry.GetAdjectiveNoFormatting] makinelerimizin neler yapabileceğini gösterebilir."
 curtiss.124.f: "Schneider Kupası öncelikle, en son uçak teknolojisinin ve pilotun kişisel başarısının ön planda olduğu bir hız yarışıydı. İyi bir sonuç elde etmek için en son teknolojiler, uçak yapımına verilen ulusal önem ve bir pilotun kişisel nitelikleri önem taşırdı. As pilotlar ve Schneider Kupası gazileri daha iyi performans gösterir, ancak aynı zamanda özellikle cesur veya yenilikçi karakterler de başarılı olurdu."
 curtiss.124.g: "Tam Güç!"
 curtiss.125.t: "Slalom Manevraları"
 curtiss.125.d: "Schneider Kupası en çok hız yarışması olarak bilinir, ancak yüksek hızda kaçırılabilecek üç ila dört işaret vardı – ve bu diskalifiye ile sonuçlanabilirdi."
 curtiss.125.f: "Schneider Kupası yarışlarının çoğu üçgen bir parkurda gerçekleşirdi, bu nedenle dönüş manevraları oldukça nadirdi. Yine de rol oynamaz değillerdi; tek bir hata bir pilota birçok zafer kaybettirmiştir. Böyle bir manevrada pilotun nitelikleri çok önemlidir: deneyimli ve ihtiyatlı pilotlar, fazla aceleci olanlara göre daha iyi sonuç alır. Pilot okulunda eğitim almak ise ek bir avantaj sağlar."
 curtiss.125.g: "Zarafetle uç."
 curtiss.126.t: "Sis"
 curtiss.126.d: "Sis daha çok su yollarında sorun oluştururdu. En deneyimli pilotlar bile bu ani zorlukta başarısız olabilirdi."
 curtiss.126.f: "Su yarışlarının en büyük dezavantajı, sisin ek bir zorluk teşkil etmesidir. Tüm manevralarda olduğu gibi burada da pilotun özellikleri ve deneyimi ana faktörlerdir. Alışılmadık yöntemler kullanan pilotlar da, ihtiyatlı olanlar kadar başarılı olabilir."
 curtiss.126.g: "Pilotumuz yolunu bulacaktır."
 curtiss.127.t: "Üstün uçuş performansı"
 curtiss.127.d: "Pilotumuzun üstün nitelikleri, Schneider Kupası’nı kazanma şansımızı önemli ölçüde artırdı!"
 curtiss.127.f: "'Her şeyden önce, çok rekabetçiydim ve bu hangi spora girerseniz girin faydalıdır. O günlerde uçmak büyük ölçüde bir spordu, evet. Ama havacılıkta bana asıl yardımcı olan şey hızlı tepkiler ve iyi bir denge duygusuna sahip olmamdı. Bunları boks değil, jimnastikten kazandığımı düşünüyorum.' - James Harold Doolittle"
 curtiss.127.g: "Mükemmel!"
 curtiss.128.t: "Su ve Gökyüzü Arasında Düello"
 curtiss.128.d: "En hızlı tur yarışında [SCOPE.sCharacter('duel_participant_1').GetFullName] ve [SCOPE.sCharacter('duel_participant_2').GetFullName] tehlikeli biçimde yakınlaştılar. Hedeflenmiş bir manevrayla şansımızı artırabilir ve doğrudan rakibimizi zayıflatabiliriz."
 curtiss.128.f: "'Kaçma yoksa herkese söylerim!' - Donald Curtis"
 curtiss.128.g: "Köpek dövüşü!"
 curtiss.128.h: "İleri uç."
 curtiss.129.t: "Kazanılmış Hava Düellosu"
 curtiss.129.d: "Bir rakip ülkenin pilotu [SCOPE.sCharacter('curtiss_schneider_pilot').GetFullName]’i yarış dışı bırakmaya çalıştı, ama zaman kaybedip kupayı kazanma mücadelesinde bize avantaj sağladı!"
 curtiss.129.f: "'Aptalsın. Bir erkekte bunu severim.' - Madame Gina"
 curtiss.130.t: "Schneider Kupası’nda Rekabet"
 curtiss.130.d: "Schneider Kupası asımız [SCOPE.sCharacter('duel_participant_1').GetFullName]’in rakibi [SCOPE.sCharacter('duel_participant_2').GetFullName] ile eski bir hesabı var. Cesur bir manevrayla nefret ettiği düşmanı yarış dışı bırakmaya çalışıyor!"
 curtiss.130.f: "'Kaçma yoksa herkese söylerim!' - Donald Curtis"
 curtiss.130.g: "[ROOT.GetCountry.GetNameNoFormatting] onuru için!"
 curtiss.131.t: "Amansız bir rekabet"
 curtiss.131.d: "Schneider Kupası’nda [SCOPE.sCountry('curtiss_schneider_failed_rival').GetName]’in takibine ve bitmek bilmeyen düşmanlığına hazırlıklı olmalıyız; ama bu sefer rakip başarısız oldu! Bir pilot asımız [SCOPE.sCharacter('curtiss_schneider_pilot').GetFullName]’i yarış dışı bırakmaya çalıştı, ama kendi kazasını yaptı."
 curtiss.131.f: "'Aptalsın. Bir erkekte bunu severim.' - Madame Gina"
 curtiss.132.t: "Elverişli hava koşulları"
 curtiss.132.d: "İyi hava koşulları zafer şansımızı artırıyor."
 curtiss.132.f: "Deniz sakin, gökyüzü açık, rüzgarlar hafif. Haftalardır sis görülmedi. Güvenli bir yarış için en iyi koşullar!"
 curtiss.132.g: "Hava koşulları bizden yana."
 curtiss.133.t: "Pilot hasta"
 curtiss.133.d: "Schneider Kupası ekibimizden bir pilot, yarıştan hemen önce hastalık bildirdi."
 curtiss.133.f: "Bir yedek bulmamız birkaç gün alacak. Bu nedenle herhangi bir avantaj kaybetmiyoruz, ama bu hafta da kazanmıyoruz."
 curtiss.133.g: "Kötü bir alamet."
 curtiss.134.t: "Büyük Yarış"
 curtiss.134.d: "Pilotlar ve seyirciler hemfikir: bu yılki Schneider Kupası yarışı çok özel bir yarış."
 curtiss.134.f: "Yabancı devlet adamları, toplum temsilcileri, pilotlar ve turistler bu yılki yarışın organizatörlerini tebrik ettiler. Etkinlik tam bir başarı oldu, kalabalıklar her zamankinden daha büyüktü ve insanlar muhtemelen bu günlerden yıllar boyunca övgüyle bahsedecek. Birçok seyirci [SCOPE.sState('curtiss_schneider_trophy_state').GetName]’den memnun ayrıldı ve bu eşsiz gösterinin bir parçası olduktan sonra günlük kaygılarını unuttu."
 curtiss.134.g: "Harika!"
 curtiss.135.t: "Sabotaj"
 curtiss.135.d: "Bazen Schneider Kupası gibi önemli bir yarış sadece özel beceriler veya üstün uçaklarla değil, aynı zamanda... özel önlemlerle de kazanılır."
 curtiss.135.f: "Tarihsel olarak, Schneider Kupası’na katılan devletlere yönelik hiçbir sabotaj manevrası kanıtlanmamıştır. Ancak makinelerin sık sık arızalanması, bunların sadece mekanik sorunlar olmadığını düşündüren söylentilere yol açmıştır. %50 şansla bir rakibe ciddi zarar vermeyi deneyebiliriz. Ancak manevra başarısız olursa aynı miktarda puan kaybederiz. Hangi ülkeyi sabote etmeliyiz?"
 curtiss.135.g: "Böylesi kirli numaralar onurumuzun altında."
 curtiss.135.h: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_1').GetName]"
 curtiss.135.i: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_2').GetName]"
 curtiss.135.j: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_3').GetName]"
 curtiss.135.k: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_4').GetName]"
 curtiss.135.l: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_5').GetName]"
 curtiss.135.m: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_6').GetName]"
 curtiss.135.n: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_7').GetName]"
 curtiss.135.o: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_8').GetName]"
 curtiss.135.p: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_9').GetName]"
 curtiss.136.t: "Tuhaf Motor Arızası"
 curtiss.136.d: "Tuhaf bir motor arızası, mühendislerimizi çaresizliğe sürüklüyor."
 curtiss.136.f: "Aslında, sadece birkaç gün önce, mekanikler Schneider Kupası yarışındaki zaferimizi garantiye alması gereken makineyi son vidasına kadar kontrol etmişlerdi. Ama bu sabahdan beri uçak bir türlü çalışmıyor. Bazı uzmanlar, mekanik sorunların sabotaj kaynaklı olabileceği görüşünde - ancak bu kanıtlanamıyor. Öte yandan, bu hasarın bizi haftalarca geriye atacağı ortada."
 curtiss.136.g: "Kazanma şansımıza ağır bir darbe."
 curtiss.137.t: "Sabotaj Önlendi!"
 curtiss.137.d: "Başka bir yarışmacının giriştiği sabotaj girişimi son saniyede önlendi."
 curtiss.137.f: "Mekaniklerimiz, dün gece yarış uçağımızın motoruna sabotaj yapmaya çalışan yabancı bir casusu suçüstü yakaladı. Onu yetkililere teslim ettik ve bu ciddi ihlali yarış organizatörlerine bildirdik. Sorumlu yarışmacı ülke puan kesintisiyle cezalandırılacak."
 curtiss.137.g: "Ucu ucuna kurtulduk!"
 curtiss.138.t: "Başarılı Sabotaj"
 curtiss.138.d: "Casusumuz dün gece rakip takımın hangarına sızmeyi başardı ve oradaki uçağı başarıyla sabote etti."
 curtiss.138.f: "Rakip takımın kazanma şansı önemli ölçüde azaldı."
 curtiss.138.g: "Bir planın istediğim gibi işlemesine bayılırım."
 curtiss.139.t: "Sabotaj Ortaya Çıktı!"
 curtiss.139.d: "Ne yazık ki, casusumuz rakip takımın uçağını sabote etmeye çalışırken suçüstü yakalandı."
 curtiss.139.f: "Yarış yönetimi bizi puan kesintisiyle cezalandırdı ve diğer takımlar - haklı olarak - öfkeliler."
 curtiss.139.g: "Kahretsin!"
 curtiss.201.t: "Havayolu Şirketi Havaalanına Yatırım Yapıyor"
 curtiss.201.d: "[SCOPE.sCharacter('howard_hughes').GetFullName]'ın havayolu şirketi tüm beklentileri aştı ve hatırı sayılır bir kar elde etti. [SCOPE.sState('curtiss_new_airport_state').GetName]'da yeni bir havaalanı inşa etmek için değerlendirmeler var."
 curtiss.201.f: "Bazen havacılık gibi riskli bir işi karlı hale getirmek için megaloman bir özgüven ve dolayısıyla çok özel bir insan tipi gerekir. [SCOPE.sCharacter('howard_hughes').GetFullName]'ın bu tipe ait olduğunu kanıtladı. İşler o kadar iyi gidiyor ki kendi havaalanını bile inşa edebilir - veya uçak filosunu büyük ölçüde genişletebilir."
 curtiss.201.g: "Yeni bir havaalanı inşa et."
 curtiss.201.h: "Havayolu şirketini genişlet, ancak sermayeyi başka yere yatır."
 curtiss.202.t: "Havayolu Şirketi Genişliyor"
 curtiss.202.d: "Yakın zamanda faaliyete geçen havayolu şirketi ilk başarısını elde etti ve bir dizi yeni uçak satın aldı."
 curtiss.202.f: "Havacılık işindeki birçok belirsizliğe rağmen, her zaman başarı hikayeleri de olmuştur."
 curtiss.202.g: "Mükemmel."
 curtiss.203.t: "Havayolu Şirketi Durgunlukta"
 curtiss.203.d: "Yeni kurulan havayolu şirketinin gelişimi ne yazık ki beklentilerin gerisinde kalıyor."
 curtiss.203.f: "20. yüzyılın başında havacılıktan yayılan büyük büyülenmeye ve teknolojiye olan coşkuya rağmen, havayolu şirketleri ekonomik bir risk olarak kaldı. Çoğu havayolu şirketi çok az kar elde etti ya da hiç kar etmedi. Yolcu trafiğinin düşük ve maliyetlerin yüksek olması nedeniyle, bazı durumlarda karlı hale gelmeleri yıllar veya on yıllar alacaktı."
 curtiss.203.g: "Hayal kırıklığı yaratan."
 curtiss.203.h: "Havayolu şirketini tanıtmak için pilotlarımızdan birini gönder."
 curtiss.204.t: "Pilot Yeniden Sahada"
 curtiss.204.d: "Havayolu için yapılan başarılı tanıtım turunun ardından pilotumuz [SCOPE.sCharacter('curtiss_pilot').GetFullName] yeniden hizmete hazır."
 curtiss.204.f: ""
 curtiss.204.g: "İyi iş çıkardı."
 curtiss.211.t: "Yabancı Havalimanına Yeni Uçuş Rotası"
 curtiss.211.d: "Ülkemizin havayolu şirketi [SCOPE.sCountry('curtiss_airline_country').GetName]’e yeni bir uçuş rotası kurdu."
 curtiss.211.f: "'New York’tan ayrıldığımda dört sandviçim vardı. Tüm yolculuk boyunca sadece bir buçuk yedim ve biraz su içtim. Daha fazlasını yemeye zamanım olduğunu sanmıyorum, çünkü biliyor musunuz, Avrupa’nın bu kadar kısa bir mesafede olması beni şaşırttı.' - Charles Lindbergh"
 curtiss.211.g: "Umarım bu yatırım değmiştir."
 curtiss.212.t: "Yabancı Havayolu Yeni Uçuş Rotası Kurdu"
 curtiss.212.d: "Yabancı bir havayolu yeni bir uçuş rotası kurdu. Uçaklar [SCOPE.sState('curtiss_foreign_airline_state').GetName]’e iniş yapıyor."
 curtiss.213.t: "Gökdelenler Arasında Zeppelin Uçuş Rotası"
 curtiss.213.d: "[SCOPE.sCountry('curtiss_airline_country').GetName]’e özel bir zeplin rotası bugün kuruldu. Bağlantı noktaları ilgili ülkelerdeki gökdelenler."
 curtiss.213.f: "Zeplinlerin gökdelenlere bağlanması üzerine bazı konseptler vardı. 1931’de açılan Empire State Binası’nın tepesinin aslında bir bağlantı direği olarak hizmet etmesi amaçlanmıştı. Direk öyle sağlam desteklenmişti ki, zeplin bağlamanın 50 tonluk çekişine dayanabilirdi. Bazı vinçler bile çoktan kurulmuştu ve 86. kat bilet gişesi ile gümrük kontrolü olan bir kalkış salonu olarak hazırlanmıştı. Bu fikir, o dönemde gökyüzünün devlerine duyulan coşkuyu yansıtıyordu. Ancak inşaat, zeplinlerin çok hantal manevra yapabildiğini ve gelişimden dolayı her zaman rüzgar türbülanslarının oluştuğunu hesaba katmamıştı; bu da bir zeplini ciddi şekilde tehlikeye sokabilirdi."
 curtiss.213.g: "Zeplinler seyahatin en gösterişli sanatı."
 curtiss.214.t: "Manzara Uçuşları"
 curtiss.214.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolları yeni bir iş fikrine sahip: turistler için manzara uçuşlarıyla tekliflerini çeşitlendiriyor."
 curtiss.214.f: "Flieger, grüß mir die Sonne\nGrüß mir die Sterne und grüß mir den Mond\nDein Leben, das ist ein Schweben\nDurch die Ferne, die keiner bewohnt.\n\nPilot, güneşi selamla\nYıldızları selamla ve ayı selamla\nHayatın bir süzülüştür\nKimsenin yaşamadığı uzaklarda."
 curtiss.214.g: "Ben de bilet alabilir miyim?"
 curtiss.215.t: "Uçakla Sömürge Malları"
 curtiss.215.d: "Afrika’daki sömürgelerimizden birinde küçük bir havaalanı açıldı; buradan kalkan uçaklar sömürge mallarını doğrudan [SCOPE.sState('curtiss_colonial_goods_state').GetName]’e taşıyor."
 curtiss.215.f: "[SCOPE.sState('curtiss_airport_state').GetName] ile [SCOPE.sState('curtiss_colonial_goods_state').GetName] arasında doğrudan uçuş bağlantısının kurulmasıyla Afrika toplulukları [ROOT.GetCountry.GetNameNoFlag]’e daha da yakınlaşıyor. Ayrıca artık hindistan cevizleri, muzlar ve elmaslar için de o kadar beklemenize gerek yok."
 curtiss.215.g: "Dünyanın en uzak bölgeleri bile havacılıkla anavatana bağlanıyor."
 curtiss.216.t: "Turizm"
 curtiss.216.d: "[SCOPE.sCountry('curtiss_tourist_country').GetName]’e uçuş rotasının açılması son derece kârlı oldu. Havayolu şirketi, yolcu sayısının hızla artması nedeniyle kapasitesini ikiye katlamak zorunda. Görünüşe göre turistler bu ülkeye akın ediyor."
 curtiss.216.f: "Önemli anıtlara sahip ülkelerle hava sahası anlaşmaları son derece kârlı olabilir."
 curtiss.216.g: "Ah, [SCOPE.sCountry('curtiss_tourist_country').GetName]!"
 curtiss.217.t: "Hava Yoluyla Seçim Kampanyası"
 curtiss.217.d: "Bir havayolu hükümet adaylarını taşımayı teklif etti."
 curtiss.217.f: "Uçağın olası bir ulaşım aracı olarak ortaya çıkışıyla birlikte seçim çalışmaları da değişti. Kendi uçağına sahip adaylar yalnızca daha hareketli görünmekle kalmadı, aynı zamanda modernliğin de sembolü oldular. En azından, böyle bir reklam aracı iktidar partisine küçük de olsa bir avantaj getirmelidir."
 curtiss.217.g: "Bu teklifi memnuniyetle kabul ediyoruz."
 curtiss.217.h: "Ya birileri uçağı düşürürse?"
 curtiss.218.t: "Reklam için bir Pilot mu?"
 curtiss.218.d: "Havayolu şu sıralar küçük bir krizden geçiyor. Yönetim bize alışılmadık bir fikirle geldi: [SCOPE.sCharacter('curtiss_pilot').GetFullName]’i kendi hatlarında uçmaya mecbur bırakmak ve onu reklam amacıyla kullanmak istiyorlar."
 curtiss.218.f: "Havacılığın ilk dönemlerinde ünlü pilotlar vitrin figürleri olarak yardımcı oluyordu. Örneğin Charles Lindbergh, hava postasının yaygınlaşmasında büyük rol oynadı. West Indian Aerial Express’in sahibi Basil L. Rowe’un isteği üzerine Santo Domingo, Port-au-Prince ve Havana arasında yaklaşık 3.000 özel hatıra mektubunu taşıdı. Latin Amerika turundan iki hafta sonra Lindbergh bir dizi özel uçuş gerçekleştirdi. Dünyanın dört bir yanından on binlerce kendi adresine yazılmış hatıra zarfı gönderildi. Zarflar damgalandıktan sonra hava posta hizmetinin tanıtımı amacıyla sahiplerine geri gönderildi."
 curtiss.218.g: "Tabii ki!"
 curtiss.218.h: "Ondan vazgeçemeyiz, ama başka yollarla yardım ederiz."
 curtiss.218.i: "Ne yazık ki elimiz kolumuz bağlı."
 curtiss.219.t: "Yeni Havalimanı Bağlandı"
 curtiss.219.d: "Havayolu mevcut rota ağını genişletmek için çaba sarf etti."
 curtiss.219.f: "'Uçmak her zaman düz bir seyir olmayabilir, ama verdiği keyif ödediğiniz fiyata değer.' - Amelia Earhart"
 curtiss.219.g: "Mükemmel."
 curtiss.219.h: "Bunu karşılayamayız."
 curtiss.220.t: "Havalimanı büyüyor"
 curtiss.220.d: "[SCOPE.sState('curtiss_airport_state').GetName]’deki havalimanı uluslararası hava trafiğinin merkezi haline geldi."
 curtiss.220.f: "Ulusal havaalanlarımızdan biri, hava trafiğinin modernleşmesi ve yerel ekonominin gelişmesiyle birlikte önemli bir aktarma merkezi haline geldi. Yerel iş çevreleri ve şehir yönetimi de bu nedenle onu gerçek bir havalimanına dönüştürdü."
 curtiss.220.g: "[SCOPE.sState('curtiss_airport_state').GetName] dünyanın merkezi olacak!"
 curtiss.221.t: "Yeni uçaklar"
 curtiss.221.d: "Ülkenin en büyük havayolu filosunu artırma planlarını açıkladı."
 curtiss.221.f: "'Bir kez uçuşun tadını aldıktan sonra, sonsuza dek gözlerin gökyüzüne dönük olarak yeryüzünde yürüyeceksin; çünkü orada bulundun ve oraya dönmeyi hep arzulayacaksın.' - Leonardo da Vinci"
 curtiss.222.t: "Uçak kazası"
 curtiss.222.d: "Ciddi bir uçak kazası, genel olarak havacılığa ve özelde de Havayolu Şirketlerine olan güveni sarsmıştır."
 curtiss.222.f: "Birkaç kişinin ölümüne neden olan bir uçak kazası, ülkenin ana havayolu şirketini bir krize sürüklemiştir. Mağdurların yakınlarına yapılan ödemeler, uçağın kaybı ve yolcu sayısındaki yetersizlik, yatırımların kısıtlanmasına yol açabilir. Müdahaleciler, büyük bir krize sürüklenmeyi önlemek için mali bir enjeksiyon yapılmasını savunuyorlar."
 curtiss.222.g: "Serbest piyasa denmesinin bir nedeni var."
 curtiss.222.h: "Devlet müdahale edecek."
 curtiss.223.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolları Zor Durumda"
 curtiss.223.d: "Ciddi bir kriz, ülkenin ana havayolu şirketini sarstı. [SCOPE.sCharacter('howard_hughes').GetFullName], iflastan kaçınmak için şirkette büyük bir küçülme yapılacağını duyurdu."
 curtiss.223.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolları'ndaki kriz, gazete manşetlerine hakim oluyor. Birkaç yüz iş yeri akut tehlikede, borsa fiyatı çöküyor. Şirketini kurtarmak için [SCOPE.sCharacter('howard_hughes').GetFullName], sendikaları sokağa dökmeye zorlayacak sert önlemler açıkladı. Kodamanın popülaritesi düştü. Hükümet müdahalesi krizi önleyebilir, ancak uzun vadeli bir mali yatırım olur."
 curtiss.223.h: "Bu şirket ulusal öneme sahip!"
 curtiss.224.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolları'nın Uzun Eli"
 curtiss.224.d: "[SCOPE.sCharacter('howard_hughes').GetFullName]'ın entrikaları giderek daha belirgin hale geliyor: Kodaman, bu arada politikada işleyen bir kayırmacılık sistemi kurdu."
 curtiss.224.f: "Pek az adamın ülkede [SCOPE.sCharacter('howard_hughes').GetFullName] kadar gücü var. Bu arada, kodaman bazı insanların ürpertici bulduğu hükümet içinde bir sistem inşa etti. Oradaki havaalanına vergi avantajları sağlamak için rüşvet kullandığı artık kanıtlandı. Kabinede, açıklama ve yeniden değerlendirme yapılması yönündeki sesler artıyor. Diğerleri ise endüstriyle olan bu doğrudan bağları son derece faydalı görüyor."
 curtiss.224.g: "Sorun ne? Birbirinizi tanıyorsunuz ve birbirinize yardım ediyorsunuz."
 curtiss.224.h: "Yolsuzluk, her yerde kökü kazınması gereken bir kötülüktür."
 curtiss.225.t: "Karlı Olmayan Hava Taşımacılığı"
 curtiss.225.d: "Yükselen maliyetler ve düşen yolcu sayıları nedeniyle, [ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolları bir havaalanındaki faaliyetlerini kısıtlamak zorunda kalıyor."
 curtiss.225.f: "Son eylem kötü bir yatırım mıydı? [SCOPE.sCharacter('howard_hughes').GetFullName]'ın iş içgüdüsü mü hata verdi? Her neyse: Bir havaalanının karlı olmaması nedeniyle şirket, büyük bir krize yakalanmamak için oradaki yatırımlarını kısmak zorunda. Tahliye tehdidi altındaki yerel işçiler, devlete başvurarak müdahale edip fiyaskoyu önleyip önleyemeyeceğini soruyorlar."
 curtiss.225.g: "Bu havaalanı ulusal öneme sahip!"
 curtiss.226.t: "[SCOPE.sCountry('curtiss_rival_airline_country').GetNameNoFlag]'dan Rakip Havayolu"
 curtiss.226.d: "Rakip bir havayolu şirketinin denizaşırı işimizi mahvetmesinin ardından, havayolu şirketimizin rekabetçi kalması zorlaşıyor."
 curtiss.226.f: "Yerli havayolu şirketimizin yöneticileri, [SCOPE.sCountry('curtiss_third_country').GetName]'da başarı şanslarının yüksek olduğunu varsaymışlardı. Aslında, bu durum [SCOPE.sCountry('curtiss_rival_airline_country').GetName] kendi yerel havayolu şirketiyle genişleyene kadar sürdü. O zamandan beri şirket bir fiyat savaşı yürütüyor. Yolcular az olduğundan, yerli bir havaalanındaki kapasiteleri azaltıp tasarruf etmeyi düşünüyorlar. Yönetim, rakipleri zarara uğratmak için hükümetimizi [SCOPE.sCountry('curtiss_third_country').GetName]'a müdahale etmeye zorluyor."
 curtiss.226.g: "Bu hassas meseleye karışmayacağız."
 curtiss.226.h: "[SCOPE.sCountry('curtiss_third_country').GetNameNoFlag]'da diplomatik müdahale girişiminde bulun."
 curtiss.227.t: "[SCOPE.sCharacter('howard_hughes').GetFullName] Zor Durumda"
 curtiss.227.d: "Ünlü havayolu koduymanı, [ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolları'nın vaat ettiği karları getirememesi üzerine baskı altında."
 curtiss.227.f: "Aslında bu sadece ülkenin önde gelen sanayicisini tehdit eden küçük bir kriz. Ancak yıllar içinde şirketteki açgözlülük büyüdü ve başarılı iş adamını saf dışı bırakmakta ısrar ediyor. Ülkenin havaalanlarından birindeki kötü bir yatırım, güçlü patronu devirmek ve yerine yeni birini getirmek için fırsat olarak görülüyor. Bu durumu kendi avantajımıza çevirebiliriz."
 curtiss.227.g: "Geri çekilmeli."
 curtiss.227.h: "[SCOPE.sCharacter('howard_hughes').GetFullName] bu küçük krizin üstesinden gelecektir."
 curtiss.228.t: "[SCOPE.sState('curtiss_factory_state').GetName]'de Büyüyen Uçak Fabrikası"
 curtiss.228.d: "Havayolu ile ortaklığa girildikten sonra uçak fabrikalarımızdan biri kapasitesini ve verimliliğini büyük ölçüde artırdı."
 curtiss.228.f: "Daha önce bilinmeyen sinerjiler [SCOPE.sState('curtiss_factory_state').GetName]’de ortaya çıkıyor. Yerel sanayi, bölgedeki havaalanı ve havayolundan büyük ölçüde faydalanıyor. Yakın zamanda imzalanan sözleşme ile [SCOPE.sState('curtiss_factory_state').GetName], [ROOT.GetCountry.GetNameNoFlag]’ın havacılık merkezi haline gelmeye hazırlanıyor. Sözleşme taraflarının imkanları ve ihtiyaçları arasında yakın bir koordinasyon olacak."
 curtiss.228.g: "Havacılık için harika bir gün!"
 curtiss.229.t: "[SCOPE.sState('curtiss_factory_state').GetName]'de Yeni Uçak Fabrikası"
 curtiss.229.d: "Şimdiye kadar patron [SCOPE.sCharacter('howard_hughes').GetFullName] daha çok havayollarına odaklanmıştı, ama şimdi kendi şirketi için doğrudan uçak üretmek istiyor."
 curtiss.229.f: "[ROOT.GetCountry.GetNameNoFlag]’da havacılık sektörü hızla büyüyor. Sürekli artan uçak talebini karşılamak ve müteahhitlere bağlı kalmamak için ülkenin önde gelen havayolu patronu yeni bir iş koluna girmeye karar verdi. [SCOPE.sCharacter('howard_hughes').GetLastName] Aircraft Company’nin dünya pazarında yeni bir rakip olacağı söyleniyor. Ancak bazıları bu kadar gücün tek bir kişinin elinde olmasının tehlikeli olup olmadığını sorguluyor."
 curtiss.229.h: "Bu apaçık bir tuzak."
 curtiss.230.t: "[SCOPE.sCharacter('howard_hughes').GetLastName], Patron"
 curtiss.230.d: "Ünlü milyarder [SCOPE.sCharacter('howard_hughes').GetFullName] müzik ve sinemanın dostu olarak kabul ediliyor. [SCOPE.sState('curtiss_opera_state').GetName]’de devasa yeni bir tiyatro inşa etmek istiyor."
 curtiss.230.f: "Uzun zamandır [SCOPE.sCharacter('howard_hughes').GetFullName], havayolu için merkezi bir kültür noktasının sözde eksikliğinden şikâyet ediyordu. Şehir daha gösterişli bir gece hayatına sahip olabilir ve daha fazla turist çekebilirdi. Aynı zamanda patron, müzik zevki ve yükselen sinema tutkusu ile tanınıyor. Söylentilere göre kendi filmini bile yapmak istiyor. [SCOPE.sState('curtiss_opera_state').GetName]’in genişletilmesi bu nedenle hem onun çıkarına olacak hem de itibarını güçlendirecek."
 curtiss.230.g: "Kültür için harika bir gün!"
 curtiss.251.t: "Kayıp Ufuk"
 curtiss.251.d: ""
 curtiss.251.f: "İnsanlık dünyayı gizemlerinden mahrum bıraktı. İlerleme ve teknoloji onları uzaklaştırdı. Ancak en son ve en ücra köşelerde geri çekilme yerleri kaldı. [SCOPE.sCharacter('curtiss_conway_scope').GetFullName]’i de cezbeden yerler. Onu tanıyan insanlarda kalıcı bir izlenim bıraktı. Burada orada ortaya çıkan ama gri kopya yığınları arasında hatırlanan son orijinallerden biri olan maceracılar gibiydi. Ama [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] sadece dünyayı gezen bir adam değildi. O, ülkemizin Hindistan’daki fahri konsolosuydu — ve birkaç ay önce iz bırakmadan ortadan kayboldu. Nepal ve Tibet arasındaki Himalayalar’da bir yerde. Acı bir kayıp olurdu, eğer kritik bir ayrıntı olmasa. [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] bir şey arıyordu. Büyük bir şey. Birçok hazineden daha değerli bir şey. Kimilerine göre delilikti. Ama deliliğin bir anlamı vardı, çünkü bu sabah [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]’in eski asistanı, Dışişleri Bakanlığı’na bir el yazması gönderdi. Dağlarda gizli, bilinmeyen bir vadiye işaret eden kişisel notlar. Dünyanın fark etmediği bir vadi. Fahri Konsolos’un bu vadiye gitmek üzere olduğu ve haftalardır kayıp olduğuna göre başına bir şey gelmiş olabileceğini düşünüyoruz."
 curtiss.251.g: "Onu bulmak için bir kurtarma görevi düzenlemeliyiz."
 curtiss.251.h: "Bu kaçış hayallerine ayıracak vaktimiz yok."
 curtiss.252.t: "[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]’i Kurtarma"
 curtiss.252.d: ""
 curtiss.252.f: "El yazmasının dikkatli incelenmesinden sonra, [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]’in Himalayalar’da kaybolmuş olabileceği doğrulandı. Diğer elçilere sorular sorulmasına ve muhbirlerin rüşvetle bilgilendirilmesine rağmen, fahri konsolosdan hiçbir iz bulunamadı. El yazmasının kendisi, görünüşe göre [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]’in el yazısıyla, gizli yere giden yolu gösteren üç eserden bahsediyor. Neden oraya gitmek istediğini bilmiyoruz, orada ne aradığını da bilmiyoruz; ama bu sadece bir delinin ateşli hayali bile olsa, [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] kesinlikle [ROOT.GetCountry.GetCapital.GetCityHubName]’e geri getirilmeli. Bu görevi yalnızca deneyimli bir pilot gerçekleştirebilir. Onu canlı bulma umudu çok düşük. Eğer bulamazsak, en azından başına ne geldiğini öğrenmek önemlidir. Belki cevap o gizemli vadinin kendisinde de olabilir. Adı: Şangri-La."
 curtiss.252.g: "[SCOPE.sCharacter('curtiss_expedition_leader_1').GetFullName] onu aramalı."
 curtiss.252.h: "[SCOPE.sCharacter('curtiss_expedition_leader_2').GetFullName] bu işi yapacak."
 curtiss.252.i: "[SCOPE.sCharacter('curtiss_expedition_leader_3').GetFullName] bizim adamımız."
 curtiss.253.t: "Arayış Başlıyor"
 curtiss.253.d: ""
 curtiss.253.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] çoktan birkaç saat uçtu. Uçsuz bucaksız dağ sıralarının devasa, karla kaplı zirveleri bulut denizinden çoktan yükselmeye başladı. Üzerlerinde hafif bir şafak ışığı oynaşıyor. Üç artefaktın nerede bulunabileceğine dair yalnızca kaba işaretler var. Ancak, [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]'ın geride bıraktığı el yazmasını takip ederek, bulunabilecekleri birkaç olası yer var. Uçağın motoru, [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] son rotayı çizerken Tibet'in uçsuz ufukları üzerinde gürlüyor - umudu [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] veya onun aradığı vadiye dair bir ipucu bulmak."
 curtiss.253.g: "Ladakh."
 curtiss.253.h: "Lhasa."
 curtiss.253.i: "Ngari."
 curtiss.253.j: "Bu anlamsız arayışı bitir."
 curtiss.254.t: "Arayış Devam Ediyor"
 curtiss.254.d: ""
 curtiss.255.t: "Artefaktların Sırrı"
 curtiss.255.d: ""
 curtiss.255.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] üç Şangri-La artefaktını da bulduktan sonra, bunların daha yakından incelenmesi gerekiyor. Pilot bu nedenle, artefaktları yerinde eğitimli bir arkeolog tarafından kontrol ettirmek ve analiz ettirmek için kısa bir süreliğine [ROOT.GetCountry.GetNameNoFormatting]'a dönüyor."
 curtiss.255.g: "Bunun için doğru adamı bulmamız gerekiyor."
 curtiss.260.t: "Sessiz Yaşlı"
 curtiss.260.d: ""
 curtiss.260.f: "Sessizlik. Yaşlı adam gözlerini indirdi. Ellerini birleştirdi, artık CHARACTER'a bakmıyor.\n'Sanırım artık gitsen iyi olur.'"
 curtiss.260.g: "Alındı mı acaba?"
 curtiss.261.t: "Ladakh"
 curtiss.261.d: ""
 curtiss.261.f: "Uçuş saatleri geçti. Bir dağ zirveleri ormanı ona saatlerce eşlik etti. Çift motorlu uçağın pervaneleri hala dönerken, [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] Keşmir ile Tibet arasında, Himalayalar'daki küçük bir kasabaya göz atıyor. Biraz sonra sokaklarda dolaşırken kulağına dua çarklarının sesleri geliyor. Köyün girişinde bir grup paralı asker bekliyor; kimin için veya kime karşı savaştıklarını söylemek zor. Silahları ve zırhları başka bir zamandan kalma gibi görünüyor, ama bir o kadar da tehlikeliler. Yerleşimin merkezi, yakındaki Keşmir'den yün ve kumaşların satıldığı küçük bir pazar. Uçuşan bayrakları olan parlak renkli boyalı bir ev, köy yaşlısının orada yaşadığını gösteriyor."
 curtiss.261.g: "Paralı askerleri ziyaret et."
 curtiss.261.h: "Marketı ziyaret et."
 curtiss.261.i: "Yaşlıyı ziyaret et."
 curtiss.261.j: "Medeniyete geri dön."
 curtiss.262.t: "Paralı Askerler?"
 curtiss.262.d: ""
 curtiss.262.f: "Silahlı adamlar bir evi bekliyor. Sert bakışlar, yalnızca yabancılara değil, kapı eşiğine fazla yaklaşan herkese güvenmediklerini açıkça belli ediyor. İkisi de [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] için geçerli. Dişlerini göstererek sırıtmaları, onun uzaklaşmasının daha iyi olacağını anlaması için yeterli oluyor."
 curtiss.262.g: "Onlarla konuşmayı dene."
 curtiss.262.h: "Onları rüşvetle kandırmayı dene."
 curtiss.262.i: "Onlara kora'yı göster."
 curtiss.262.k: "Onlara silahı göster."
 curtiss.262.j: "Köye geri dön."
 curtiss.263.t: "Paralı askerler etkilenmedi"
 curtiss.263.d: ""
 curtiss.263.f: "Hiçbir duygu yok. Paralı askerler – ya da her kimseler – sessizdi. Hatta olumsuz bir tepki bile, yüzüne çarpan bu soğuktan iyiydi; Himalayaların karlı zirvelerinden bile daha soğuk. Soğuk, kısa sürede [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’ın ensesinden ayak uçlarına kadar yükseldi. Görünüşe göre yoluna devam etmek en iyisiydi."
 curtiss.263.g: "Tuhaf adamlar..."
 curtiss.264.t: "Şangri-La’nın Muhafızları"
 curtiss.264.d: ""
 curtiss.264.f: "Geleneksel kılıç buz gibi güneşte parıldıyordu. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’ın gözleri bir paralı askerden diğerine kaydı. Yine tepki yok, diye düşündü, kılıcı indirdi — ve sonra aniden bir ses duydu.\n'Kayda değer.'\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] göz kırptı. Bir yandan onunla konuşmaları şaşırtıcıydı. Ama daha da tuhaf olan, yabancının kendisine Tibetçe değil, anadilinde hitap etmesiydi. Aksansız. Çocukluğundan beri başka bir dil duymamış gibi berrak.\n'Siz [ROOT.GetCountry.GetAdjectiveNoFormatting] misiniz?' diye sordu [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] — ama yanıt alamadı.\n'Yaşlı adam seni buraya getirdi. Sınavı geçtin. Şimdi gel.'\nO anda [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’ı vahşi bir hayvan gibi saran esrarengiz bir düşünce belirdi. Eğer bu adamlar gerçekten Şangri-La’nın muhafızlarıysa, belki de bu vadiyi kendileri ziyaret etmişlerdi. Belki de ölçüsüz bilgelik kazanmış, birçok dilde konuşabilir hale gelmişlerdi; belki de özel bir armağanları vardı ve her yabancının kalbine bakıp düşüncelerini okuyabiliyorlardı; ya da belki de buraya uzak diyarlardan gelen ilk kişi o değildi. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’ın binlerce sorusu, on binlerce cevabı vardı; ama bunların hiçbiri ona verilmedi. Sessizce, adamlardan biri onu tek odalı, Tibet kökenli tek bir esere sahip bir eve götürdü ve dostane olmasa da açık bir tonla işaret etti.\n'Biz Şangri-La’yı insanlıktan gizlemiyoruz. Biz insanlığı kendisinden koruyoruz. Kendini layık göremeyenler yol boyunca yok olur,' dedi muhafız, sonra [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’ı tekrar dışarı çıkardı ve tüm gizemli muhafız ekibinin sessizliğiyle bir olan sonsuz sessizliğe karıştı."
 curtiss.264.g: "Demek ki yaşlı adam bizi sınamış..."
 curtiss.265.t: "Silah"
 curtiss.265.d: ""
 curtiss.265.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] silahını çekti. Metal muhafızlara doğrultulmuştu. Doğru seçimi yapıp yapmadığını görmek için bekledi; ta ki saflardan bir adam ayrılana dek. Ona doğru yürüdü, önce [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’a, sonra silaha baktı.\nKorkunç bir metalik inilti.\nİşkence görmüş demir yolda parıldadı, sonra parlaklığını kaybetti. Yabancı silahı çıplak elleriyle aldı ve kırdı. Bu, [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’ın eve girme hakkını kaybettiğinin en açık göstergesiydi."
 curtiss.265.g: "Bu... vahşiceydi."
 curtiss.266.t: "Yün pazarı"
 curtiss.266.d: ""
 curtiss.266.f: "Tereyağı kokusu, pazarın havasındaki diğer aromaları bastırıyordu. Küçük tezgâhların arasında sadece birkaç insan vardı. Kumaşların ve özellikle yünün çeşitliliği dikkat çekiciydi. Yakındaki Keşmir’den gelen sevkiyatlar bu kasabadan Tibet’e doğru yol alıyordu. Malzemeler orada talep görüyordu. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] tüccarların yanından geçerken, satıcılardan biri iyi bir fiyata tüm bir balya yün teklif ettiğinde kendini tutamadı."
 curtiss.266.g: "Yün kaliteli görünüyor."
 curtiss.267.t: "Yaşlı Bilge"
 curtiss.267.d: ""
 curtiss.267.f: "Tereyağı çayı kokusuna bürünmüş halde, saatler geçti. Burada, Himalayalar’da, başka yerde yoksul sayılabilecek bir salon, bir prensin görkemine sahipti. Halılar, maskeler ve flamalar duvarlarda asılıydı, Yaşlı Bilge ile [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] alçak masada bir sonraki kaseyi bitiriyordu. Mekânın lideri olağanüstü misafirperverdi. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] pek konuşmamış, en önemli şeylerle yetinmiş olsa da, yaşlı adam belli bir ilgi gösteriyor gibiydi. İlk başta [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName], bunun sadece kökenlerinden kaynaklandığını düşündü, çünkü onun gibi insanlar bu ücra yerde nadirdi. Ama Yaşlı Bilge, onun neden burada olabileceğine dair bir fikri varmış gibi hissettiriyordu. [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] ismi anıldı. Ve [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] aslında ne istediğini ima etti. Ziyaretin bu dostane atmosferde bitmesi, [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’ı konuyu daha da açmaya teşvik etti..."
 curtiss.267.g: "Paralı askerler kim?"
 curtiss.267.h: "Şangri-La hakkında ne biliyorsunuz?"
 curtiss.268.t: "Paralı Askerlerin Sırrı"
 curtiss.268.d: ""
 curtiss.268.f: "Yaşlı Bilge bir an için arkasına yaslandı. Bir sonraki sözlerini dikkatlice tartıyor gibiydi. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] böyle anları bilirdi; insanlar neyi söyleyip neyi söylemeyeceklerini tam olarak tarttıklarında ortaya çıkardı.\n'Onlara paralı asker deniyor, ama değiller. Onlar Muhafızlar,' dedi yaşlı adam. 'Onlar Mavi Ay Vadisi’ni koruyorlar.'\n'Mavi Ay Vadisi mi? Bir vadiyi değil, bir evi koruyorlar.'\n'Vadiye giden yol evin içinden geçer. Bazen doğruya ulaşmak için dolambaçlı yoldan gitmek gerekir,' diye açıkladı Yaşlı Bilge. 'Yalnızca kendini layık görenleri geçirirler. Bunun için üstün olmalı. Antik savaşçıların taşıdığı gibi bir silah taşımalı. Onurlu bir silah, Mavi Ay Vadisi’nde de kullanılan türden.'\n'Daha önce bu Muhafızların arasına girip evden geçen oldu mu?'\nYaşlı Bilge gülümsedi.\n'Sizin [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] dediğiniz adam geçti.'"
 curtiss.268.g: "Bu ev, Şangri-La’nın anahtarı."
 curtiss.269.t: "Şangri-La Hakkında"
 curtiss.269.d: ""
 curtiss.269.f: "Samimi atmosfer birden kayboldu. Yaşlı Bilge tereyağı çayını kenara koydu. Gözlerini [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’a dikti. Sesi sertleşmişti. Onu inceledi.\n'Şangri-La’da ne arıyorsun?'"
 curtiss.269.g: "Huzur arıyorum."
 curtiss.269.h: "Gerçek arıyorum."
 curtiss.269.i: "[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]’ı arıyorum."
 curtiss.269.j: "Aydınlanma arıyorum."
 curtiss.270.t: "Bir öğüt"
 curtiss.270.d: ""
 curtiss.270.f: "Yaşlı Bilge gülümsedi.\n'Gerçek en soylu yakıttır. Bir hayat kurtarmak iyidir, ama neden yaptığını bilmiyorsan neye yarar? Şangri-La için de aynı. Yüzyıllardır sayısız insan Mavi Ay Vadisi’ni aradı. Birçoğu huzur arayışıyla sürüklendi. Tatmin özlemiyle. Hatta kimi, ölümcül hastalığı olan sevdiklerine orada uzun bir hayat vermek istedi. Sebepleri ne olursa olsun, önce Şangri-La’nın ne olduğunu sormaları gerekmez mi?'\n'Duyduğuma göre mükemmel bir yer.'\n'Ya sadece başka bir dağ vadisiyse? Aynı dertler, aynı salgınlar, aynı günahlar ve diğer her yer kadar sefil bir hayatla?'\n'Umurumda değil,' dedi [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]. 'Ben kesinlik istiyorum. Ve [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]’ı bulmam gerek.'\nYaşlı Bilge başını salladı.\n'[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]’ın eve girebilmesinin ama diğerlerinin girememesinin belirli bir sebebi vardı. O, Mavi Ay Vadisi’nin geleneksel silahının bir Tibet silahı olmadığını biliyordu. Nepal’e ait bir silahtı. Bir kora kılıcı.'\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] şaşırdı. 'Ama bunu nasıl biliyordu?'\n'Çünkü [SCOPE.sCharacter('curtiss_conway_scope').GetLastName], Şangri-La’ya ilk kez gelmiyordu...'"
 curtiss.270.g: "Bir Kora..."
 curtiss.271.t: "Lhasa"
 curtiss.271.d: ""
 curtiss.271.f: "Lhasa. Mistisizmiyle ünlü bir yer. Dalai Lama’nın ikametgâhı Potala Sarayı şehri yukarıdan izliyor. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’a dünyanın hangi ücra köşesinde olduğunu unutturan masalsı bir manzara. Bazıları bunu vahşi doğada uygarlıkla karıştırabilir; ama Lhasa’yı uygarlık diye nitelemek hata olur. Burada zaman bir noktada durmuş gibidir. İlericiler için barbarlığa saplanıp kalmış geri bir yer; romantikler içinse teknoloji ve ihtişamla yoğrulmuş dünyadan bir kaçış. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName], dar sokaklar ve meyhanelerin yanı sıra geleneksel bir silah ustasının bulunduğu caddelerde dolaşır. Bu yerlerin arayışına yardım edip etmeyeceğini bilmiyordu; ama belki de henüz soramadığı sorulara cevap verebilirlerdi."
 curtiss.271.g: "Potala Sarayı’nı ziyaret et."
 curtiss.271.h: "Demirciyi ziyaret et."
 curtiss.271.i: "Meydanda içki iç."
 curtiss.271.k: "Sokaklarda yürüyüşe çık."
 curtiss.271.j: "Uygarlığa geri dön."
 curtiss.272.t: "Potala Sarayı"
 curtiss.272.d: ""
 curtiss.272.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] fazla ilerleyemedi. Muhafızlar görkemli sarayın kapısında onu durdurdu. İçeri girmesine izin vermediler. Derdini anlatmaya çalıştığında, Dalai Lama’yı rahatsız etmeye yetecek kadar önemli bir meselesi olamayacağı ima edildi. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName], kendisine duyulan büyük güvensizliği fark etti; muhtemelen bir casus sanılıyordu."
 curtiss.272.g: "Tılsımı göster."
 curtiss.272.h: "Lhasa’ya geri dön."
 curtiss.273.t: "Lama"
 curtiss.273.d: ""
 curtiss.273.f: "Tılsım muhafızlara doğru parıldadı. Onların gözleri büyüdü. 'Büyük Beşinci’nin Muskası!' diye haykırdı biri. Artık [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’ın önünde durmuyorlardı. Tam tersine: onu saraya doğru yönlendirdiler. Rengârenk boyalı duvarların, gösterişli kumaşların ve şeytani heykellerin yanından, beklediğinden hızlı biçimde Dalai Lama’nın huzuruna getirdiler. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] bu etkiyi hiç beklememişti. Ve bir mahkûm gibi sürüklendiğinde kulaklarına inanamıyordu; saraydan önemli bir eseri çalmakla suçlanıyordu. Bir tekme onu diz çökmeye zorladı; ta ki sessizlik odayı doldurana dek.\n'Hiçbir yanlış yapmadı.'\nDalai Lama konuşmuştu. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] ancak yavaşça alçakgönüllü duruşundan başını kaldırabildi. Tibet’in ruhani lideri gözleri kapalı, huzurla konuşuyordu. Yalnızca tılsımın ışıltısı onu uyandırdı. Bir muhafız, hatırayı [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’dan kaparak lamaya uzattı.\n'Bu tılsım yıllar önce Potala Sarayı’ndan kayboldu. Onu geri getirecek birini yıllardır bekliyordum. Böyle olması gerekiyordu.'\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] başını kaldırdı. Lama ona kalkmasını işaret etti. Başını salladı. Ama anlamadı.\n'Kaderden mi bahsediyorsunuz?'\n'Kader çok soyut bir kavram. Ben, etten ve kandan canlı bir şeyi tercih ederim,' dedi Dalai Lama.\n'Anlamadım?' diye sordu [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName].\n'Kaderin adı [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]. Ve eğer biri bana tılsımı geri getirirse, ona vermek için burada sakladığım bir şeyim var...'"
 curtiss.273.g: "Bu, Şangri-La’nın ünlü eserlerinden biri!"
 curtiss.274.t: "Demir yok"
 curtiss.274.d: ""
 curtiss.274.f: "'Kapalıyız! Demir yok – iş yok. Birkaç aya tekrar gelin!'\nDükkâna girer girmez boğuk bir ses yankılandı. Bu demirhanede müşteri memnuniyeti belli ki öncelik değildi."
 curtiss.274.g: "'Tesadüfen, yanımda demir var.'"
 curtiss.275.t: "Demirci"
 curtiss.275.d: ""
 curtiss.275.f: "Şimdiye kadar oldukça kaba davranan demirci, bedavaya verilen koca bir demir külçesini görünce şaşırır. Önce mala, sonra [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’e bakar, ardından ellerini ovuşturur. Başkentte metal eşya sıkıntısı olduğundan bahseder ve yolcuya bazı seçkin geleneksel Tibet silahlarını gösterir. Her zamanki gibi, böylesine kaliteli ürünleri başka hiçbir demircide bulamayacağını söyler. Tabii ki tek demircinin kendisi olduğunu es geçer. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] bu fırsatı kullanarak pazarlığa girer. Ama hangi silahı yaptırmalıdır?"
 curtiss.275.g: "Bir dpa'dam."
 curtiss.275.h: "Bir ke-tri."
 curtiss.275.i: "Bir tsep-tsa."
 curtiss.275.j: "Bir kora."
 curtiss.276.t: "Yeni Bir Silah"
 curtiss.276.d: ""
 curtiss.276.f: "Günler geçer ve yeni dövülmüş bir silahın bıçağı lambanın ışığında parlar. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] ona bakar. İş bitince demirci parasını ister ve başka hiçbir vadide böylesine güzel bir parça bulamayacağını hatırlatır."
 curtiss.276.g: "Bu, başkalarına saygıyı öğretecek!"
 curtiss.277.t: "Bir Kora"
 curtiss.277.d: ""
 curtiss.277.f: "Sipariş demirciyi şaşırtmıştı. Nepal’e özgü bir silah mı? Önce onuru kırılmış gibi oldu. Ama [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] bu siparişte ısrar etti. Pekâlâ: demir onundu, para da onundu. Günlerce sessizce çalışan, sorulduğunda sadece homurdanarak ya da kısa yanıtlar veren demircinin elinden çıkan iş yine de çok etkileyiciydi. Kora kılıcı, Katmandu’da bulunan geleneksel silahlardan ayırt edilemeyecek kadar ustaca yapılmıştı."
 curtiss.278.t: "Dilenci"
 curtiss.278.d: ""
 curtiss.278.f: "Soğuk Himalaya havası sokaklarda esmektedir. Halk evlerine çekilmiştir. Duvarlardan kirli bayraklar ve eski halılar sarkmaktadır. Yol kenarında kar ayak bileğine kadar çıkmıştır. Bir dilenci gölgede titrer, elindeki tahta kâseyi kaldırır; içinde yarım bakır sikke vardır."
 curtiss.278.g: "Yoluna devam et."
 curtiss.278.h: "Sadaka ver."
 curtiss.278.i: "Yün ver."
 curtiss.279.t: "Keşişin Sırrı"
 curtiss.279.d: ""
 curtiss.279.f: "Dilenci yünü büyük bir sevinçle kabul eder. Omuzlarına, göğsüne, beline sarar, sonra ellerini ovuşturur. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] yoluna devam etmek ister. Fakat adam onu durdurur.\n'Bana bir şey verdin. Şimdi ben de sana bir şey vermek istiyorum.'\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] dilencinin ona verecek bir şeyi olamayacağını söyler. Dilenci kabul eder: gerçekten hiçbir şeyi yoktur. Ama birini tanıyordur. Ngari dağlarında yaşayan yalnız bir keşiş. Kutsal bir adam. İnsanların ihtiyaçlarını, onlar farkına varmadan karşılar. Issızda yaşar; onu arayan, yolu bilmiyorsa kaybolur. Ama bulan, büyük bir ödül alır. Tabii onu layık görürse.\n'Peki, nasıl layık olurum?' diye sorar [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName].\nDilenci yünü okşar.\n'Bunu zaten yaptın.'"
 curtiss.279.g: "Artık o pek de gizli olmayan bir keşiş olacak."
 curtiss.280.t: "Meyhane"
 curtiss.280.d: ""
 curtiss.280.f: "Gürültülü ve kalabalık salonda uzun barın arkasında, kanatlarını iki yana açmış, doldurulmuş koca bir kuzgun asılıdır. Gece ilerlerken mekânda canlı bir kalabalık vardır: Tibetli yerliler, sert Sherpa dağ rehberleri, kaypak uluslararası kaçakçılar ve firariler, elbette dünyanın dört bir yanından dağcılar. Uzun boylu bir Nepalli barmendir. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] kayıp bir vadinin peşinde olduğunu söyler. Barmen onu bir Sherpa’ya yönlendirir. Bölgedeki tüm geçitleri ve vadileri bilmektedir. İçkiler içilir. Ama Sherpa, tarif edilen vadinin varlığını bilmez. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] Şangri-La’dan bahsedince Sherpa kulak kesilir ama sonra yine susar. Ardından üç eserden söz açılır; gizli vadiye götürdüğü söylenen üç kutsal eşya. İçki yine akar, bir kez daha… Sonra Sherpa konuşur: 'Ngari’de bir tapınakta küçük bir Buda vardır. Onu duvara itebilirsiniz...'"
 curtiss.280.g: "Değerli bir bilgi."
 curtiss.281.t: "Ngari"
 curtiss.281.d: ""
 curtiss.281.f: "Issız bir vadide bir yerleşim. Kutsal kabul edilen Kailaş Dağı, sivri zirvesiyle dağ sırasının üzerinde yükselir. Hacılar oraya akın eder. Şekilsiz, yalçın dağların arasında kristalden bir piramit gibi yükselir ve küçük yerleşimlerle dolu vadiyi aydınlatır. Bu ıssız bölgede iniş yeri bulmak zorlu bir işti. Bu yüzden [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] uçağını güvenli bir mesafeye park edip uzun bir yürüyüş yapmak zorunda kaldı. Sonunda küçük bir köy bulur. Burada demir satan bir seyyar tüccar vardır. Biraz ilerde eski bir tapınak yükselir. Geri kalan her şey: uçsuz bucaksız vahşi doğa."
 curtiss.281.g: "Vahşi doğaya çık."
 curtiss.281.h: "Demir tüccarını ziyaret et."
 curtiss.281.i: "Tapınağı ziyaret et."
 curtiss.282.t: "İnsafsız Dağlar"
 curtiss.282.d: ""
 curtiss.282.f: "Rüzgâr dağlarda amansızca eser. Bir canavar gibi çevreyi yutar. Kar, vadi boyunca yuvarlanır. Karanlık gökyüzü ve kar taneleri, görüşü birkaç metreye indirir. Ne ev, ne insan… Kilometrelerce ötede hayat belirtisi yok. Bir kuş bile yok. Doğayla mücadele ortasında, dağcılık romantizminin hiçbir izine rastlanmaz. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’in ayakları ağırlaşır. Sadece günlerdir yürüdüğü için değil; her adımda kar büyür, dizlerine kadar yükselir. Saatlerdir kör gibi yürümektedir."
 curtiss.282.g: "Devam et."
 curtiss.282.h: "Keşişi ara."
 curtiss.282.j: "Geri dön."
 curtiss.283.t: "Vahşi Doğada Kaybolmuş"
 curtiss.283.d: ""
 curtiss.283.f: "Göz alabildiğine buz, taş yığınları ve kar. Yalnız bir Sherpa, yükü ve yük hayvanıyla bir geçitten geçmektedir. Son günlerdeki kar yığınları dinmiştir. Çevre sessizdir. Gökyüzü açıktır. Bir yamacın üzerinde bir giysi parçası uçuşmaktadır. Sherpa onu görür, yaklaşır – ve hemen tepki verir. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’in ağır donmuş ve yere yığılmış bedenini bulur. Hayat belirtileri zayıftır – ama yaşıyordur."
 curtiss.283.g: "Az daha ölümden dönüyordum..."
 curtiss.284.t: "Layık mı Değil mi?"
 curtiss.284.d: ""
 curtiss.284.f: "Karda bir siluet belirir. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] pes edip kendini doğanın kollarına bırakmaya karar vermek üzereyken, rüzgârda dalgalanan kırmızı ve turuncu keşiş cüppeleri görünür. Kar fırtınası birden sönüp sadece bir esinti kalana dek gürler, uğuldar ve korkutur. Ortada yalnızca [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] ile Keşiş kalır. Ama [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] konuşamaz, bu yüzden keşiş elini kaldırır.\n'Söyle bakalım, neden özellikle sen aradığın yere giden yola layık olmalısın? Sence kim bu yere girmeye layık olurdu?'\nNe tanıtım, ne selam, ne de kim olduğu ve ne istediği sorusu... [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] şüphelenir; bu adam onun kim olduğunu ve ne istediğini bilemez. Ta ki keşişin ipucu almış olabileceğini fark edene kadar – acaba onu sadece Lhasa’daki dilencinin gönderebileceğini mi biliyordu?"
 curtiss.284.g: "Tövbekâr."
 curtiss.284.h: "İnançlı."
 curtiss.284.i: "Alçakgönüllü."
 curtiss.284.j: "Cesur."
 curtiss.285.d: ""
 curtiss.285.f: "'Bir yeri arayan, orada kendisini neyin beklediğini de bilmelidir. Bir yeri arama niyeti, orada bulunacak şeyle aynı değildir. Peki senin aradığın yeri asıl karakterize eden şey nedir?'"
 curtiss.285.g: "Barış ve Uzun Ömür."
 curtiss.285.h: "Topluluk ve Neşe."
 curtiss.285.i: "Bilgelik ve Hakikat."
 curtiss.285.j: "Aydınlanma ve Şifa."
 curtiss.286.d: ""
 curtiss.286.f: "'Aradığın yerin birçok adı var. Tıpkı evreni elinde tutan tek bir güce birçok isim verilmesi gibi. İnsanlar isimler verir; ama bu, o şeyleri yaptıkları anlamına gelmez. Daha çok, onların var olduğuna dair bir sezgiye sahiptirler. Aynı şeyi kastetseler bile, bu mutlaka aynı şey olduğu anlamına gelmez. Bir şey üzerinde güç istiyorsan, onu ancak doğru, gerçek adını bilirsen kontrol edebilirsin. Peki, aradığın yerin adı nedir?'"
 curtiss.286.g: "Şangri-La adıyla bilinen yer."
 curtiss.286.h: "Kayıp Ufuk Dağı."
 curtiss.286.i: "Şambhala Krallığı."
 curtiss.286.j: "Mavi Ay Vadisi."
 curtiss.287.t: "Tılsım"
 curtiss.287.d: ""
 curtiss.287.f: "'Hazırlıklı gelmişsin görüyorum. Vadiyi arayan ilk kişi sen değilsin. Dünyanın dört bir yanından kadınlar ve erkekler onu aradı. Sana yolu gösteremem; ama senin için kolaylaştırabilirim. Mavi Ay Vadisi’ni arayan, kendi gücünün çok ötesinde bir şeye ihtiyaç duyar.'\nKeşiş, [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’in ellerine bir şey koyar. Bir tılsım.\n'Beşinci Dalai Lama bu toprakları fethetti. Bu koruyucu tılsımın ona ait olduğu söylenir. Onu taşımaya layık olduğunu kanıtladın.'\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’in daha çok sorusu vardır. Keşişin Şangri-La hakkında neler bildiğini öğrenmek ister. Elinde tuttuğu parçanın, yerel halkın batıl inançlarından daha fazlası olduğunu düşünür. Ama keşiş görevini tamamlamış görür. Yükselen kar fırtınasında uzaklaşır. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] ise düşüncelere dalar. Bu nesne Şangri-La’ya ait bir eser değildir. Boşuna mı gelmişti? Yanıltılmış mıydı?"
 curtiss.287.g: "Bir tılsım mı? Ama bu nasıl yardımcı olacak ki...?"
 curtiss.288.t: "Demir Tüccarı"
 curtiss.288.d: ""
 curtiss.288.f: "Tüylü yaklar hafif kar rüzgârında solur. Seyyar bir satıcı eldivenlerini düzeltir. Yolda, dağlarda oradan oraya dolaşmaktadır. Yarı korunaklı, yırtık bir çadırı andıran ahşap ve kumaştan yapılmış yapının altında küçük demir külçeleri yığılmıştır. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’i görünce bir el işaretiyle selam verir."
 curtiss.288.g: "Demir satın al."
 curtiss.289.t: "Tapınak"
 curtiss.289.d: ""
 curtiss.289.f: "Yerleşimin dışında yalnız bir tapınak durur. Kilometreler boyunca insan elinden çıkmış en belirgin eserdir. Birkaç renkli çiçek, dua çarkları, rüzgârda dalgalanan yazmalar ve bir Buda heykelinin yanında [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] esasen bir yazıt görür. Şaşırtıcı şekilde Latin alfabesiyle – ve bir Avrupa dilinde yazılmıştır. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName], bunun bir Budist tapınağı olduğuna yemin edebilirdi ama Tibet’te bu tür yapılar olağan dışıdır. Halk daha çok tepecik şeklindeki çörtenleri tercih eder. Buna rağmen yazıt çok eski görünmektedir, en az birkaç yüzyıllık. Dil Fransızcadır. Nereden geldiğini ya da neden burada olduğunu bilmez; ama paslanmış bilgisiyle yazılanı çözmeye çalışır. Harflerin bir kısmı çoktan silinmiştir.\n'Sadece hakikati arayan layık olacaktır. Sadece cömert olan layık olacaktır. Sadece inançlı olan layık olacaktır. O, uzun yıllar sürecek bir hayat yaşayacak ve bilge, aydınlanmışların arasında huzuru bulacaktır. Ama açgözlülükle hareket edenler toprak tarafından yutulacaktır.'"
 curtiss.289.g: "Buda heykelini it."
 curtiss.290.t: "Tapınağın Sırrı"
 curtiss.290.d: ""
 curtiss.290.f: "Buda heykeli tapınağın duvarına gömülür. Bir mekanizma gıcırdar. Gizli bir bölme açılır ve süslü bir kutu ortaya çıkar. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] hazineye doğru eğilir. Ne olabileceğine dair bir fikri vardır – ve hızla kilidi açar."
 curtiss.290.g: "Bir Şangri-La eseri!"
 curtiss.291.t: "Şangri-La Yolu"
 curtiss.291.d: ""
 curtiss.291.f: "Birkaç günlük incelemeden sonra, ünlü arkeolog [SCOPE.sCharacter('curtiss_shangrila_archaeologist').GetFullName] çalışmalarını tamamlamıştır. Fakülteye yaptığı etkileyici bir sunumda anlattığına göre, bu yalnızca üç eserin doğru şekilde yorumlanmasıyla çözülebilecek bir tür koddur. Elbette çözümü birkaç gün içinde bulmuş olması tamamen onun olağanüstü zekâsının eseridir. Açıklama temelde ilkel olsa da birkaç dağ, geçit ve nehre dayanır; ama en modern haritacılık ile basit koordinatlar da elde edilebilir. Artık efsanevi vadiyi keşfetmenin önünde hiçbir engel yoktur.\nAncak arkeoloğun uzun sunumunun ardından hem hükümet temsilcileri hem de [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName], onun da gelmemesinin daha iyi olacağı sonucuna varırlar."
 curtiss.291.g: "Mümkün olduğunca az kişi bilmelidir."
 curtiss.292.t: "Türbülans"
 curtiss.292.d: ""
 curtiss.292.f: "Yüz milden daha az. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] tam mesafeyi unutmuştu. Bir saattir geçilmez bir bulut duvarıyla savaşıyordu. Uçağı yukarı çıkardı, ama bulut örtüsünün sonuna ulaşamadı. Aşağı inerse perde kalkıyordu; ama aynı anda dağ sırtlarına ve karla kaplı zirvelere tehlikeli şekilde yaklaşıyordu. Vadiyi göremiyordu. Daha iyisini bilmesine rağmen alçalmak zorundaydı. Yoksa hedefi ıskalayacaktı. Geceyi geçirmek için iniş yapacak bir yer bulup ertesi sabah tekrar koordinatlara uçmayı düşündü; ama içinde bir ses, bu tür vadilerin her zaman keşfedilmesini engelleyen gizemli sislerle çevrili olduğunu söylüyordu. Bugün, yarın ya da bir ay sonra bakması fark etmezdi: bulutlar ve sis hep karşısında olacaktı. Ama [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] kumandayı hareket ettirdiğinde bütün uçak sarsıldı, motor inledi – türbülans uçağı yakalamıştı! Dağ rüzgârları dönen makineyle gökyüzünde bir oyuncak gibi oynuyordu, pilot çaresizce kumandaları dizginlemeye çalışıyordu..."
 curtiss.292.g: "Neler oluyor?!"
 curtiss.293.t: "Zorunlu İniş"
 curtiss.293.d: ""
 curtiss.293.f: "Kırık bir metal kanat Himalaya kayasında parıldıyor. Parçalar çimenlerin ve toprağın arasına saçılmış. Kırık bir pervane bir çalıya takılmış. Çiçek tarlalarının içinden geçen bir iz, sonunda dumanlar tüten gövdeye ve son bir iç çekişle ses çıkaran motora varıyor. Uçak kapısı sallanıyor – ve kopup yere çakılıyor. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] sarsılarak dışarı çıkar, metal gövdeye tutunur. İzlenimler onu altüst eder. Zorunlu iniş yalnızca bir ayrıntıdır. Sis, bulutlar, kar, soğuk – hepsi geride kalmıştır. Sadece dağ zirvelerinde kar vardır, aşağıda ise ormanlar, nehirler ve şelaleler sıralanır. Güneş mavi gökyüzünde parlar. Yakındaki kaplıcalardan buhar yükselir. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] pilot ceketini çıkarır. Hava yalnızca ılıman değil, sıcaktır. Havada çay ve bal kokusu vardır. Etrafına bakar: yamaçlar şeftali ağaçlarıyla çevrili. Bir tepenin üzerinde bir pagoda yükselir, öğle vakti bir gong çalar. Uzakta bir kasabanın silueti, üzerinde manastır benzeri bir yapı yükselmektedir. Şehrin sursuz olduğunu, manastırın – Tibet için oldukça sıra dışı bir biçimde – hiçbir tahkimatı olmadığını fark eder. Buğday tarlalarının başakları rüzgârda dalgalanır. Başka yerde pirinç çiftçileri bataklık tarlalarında dolaşır. Renkli pencerelerden müzik yankılanır."
 curtiss.293.g: "Bu... vadi mi?"
 curtiss.294.t: "Mavi Ay Vadisi"
 curtiss.294.d: ""
 curtiss.294.f: "Duvarların ve tezgâhların arasından geçip gitti. Bu yerin havasında ve hafifliğinde, [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’in daha önce hiç deneyimlemediği bir şey vardı. Yabancı olmasına rağmen sokaktaki insanlar ona uzun zamandır görmedikleri birini selamlar gibi selam verdiler. Bir meyhaneci onu odasına davet etti; turuncu giysili bir kız ona ücretsiz meyve uzattı. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’in dikkatini çeken diğer şey, şehrin garip biçimde Avrupa tarzı olmasıydı. Budist tapınaklar bekliyordu. Bunun yerine onu Fransız tarzı kiliseler karşıladı. Yüzlerde ne yaşlılık ne acı vardı, yalnızca dostane bir huzur. Hatta konuşsa, aralarında kendi yurttaşlarından birkaç kişinin olduğuna da emindi. Şangri-La bir Tibet şehri değildi. Evrensel bir yerdi.\n'Sonunda geldin...'\nVe [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’in aklına, aslında [SCOPE.sCharacter('curtiss_conway_scope').GetFullName]’i aramadığı; tam tersine, [SCOPE.sCharacter('curtiss_conway_scope').GetFullName]’in onu aradığı ve [ROOT.GetCountry.GetAdjectiveNoFormatting] özellikleri taşıyan, fakat bir Kapuçin başrahibi kılığındaki adamla yüzleştiği düşüncesi gelir."
 curtiss.294.g: "[SCOPE.sCharacter('curtiss_conway_scope').GetFullName] buranın efendisi mi?"
 curtiss.295.t: "[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]"
 curtiss.295.d: ""
 curtiss.295.f: "[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]’in varsayımları doğrulandı. Şangri-La arayışının tamamı bir sınavdı. Üç eseri arayan ilk kişi o değildi; eserler bulununca tekrar yerlerine konuyordu. Şangri-La’ya en son ulaşan kişinin onları yeniden gizlemesi gerekiyordu, böylece vadinin sırlarına layık olan bir sonraki kişiyi buraya çekmiş oluyordu. Ve [SCOPE.sCharacter('curtiss_conway_scope').GetFullName]’in kurtarılmaya niyeti yoktu: Son hükümdarın ölümünden sonra o yönetmişti; bu yönetim güçten değil, tanınma ve başarıdan doğmuştu. Şangri-La’ya hâkim olan saray sadece rahat bir ikametgâh değildi: şimdiye kadar yazılmış tüm yazıtları, dünyanın dört bir yanından sanat hazinelerini ve tenis kortu, yüzme havuzu hatta golf sahası gibi spor alanlarını içeriyordu. [SCOPE.sCharacter('curtiss_conway_scope').GetFullName], [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]’i burada bir aile üyesi gibi yanında görmek istediğini gizlemiyordu. Ona her konuda eğitim verilecekti; tüm hastalıklarından kurtulacak ve uzun bir yaşamın tadını çıkaracaktı. Tabii vadide kalırsa."
 curtiss.295.g: "Belki de... [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] kurtarılmalıydı..."
 curtiss.296.t: "Karar"
 curtiss.296.d: ""
 curtiss.296.f: "'Biz mucizelerin işçileri değiliz; ölümü ya da çürümeyi fethetmedik. Yaptığımız ve bazen yapabildiğimiz tek şey, yaşam denilen bu kısa aralığın temposunu yavaşlatmaktır. Bunu, burada basit ama başka yerde imkânsız olan yöntemlerle yapıyoruz; ama yanılmayın, son hepimizi bekliyor. Okumaya vaktiniz olacak—artık dakikalar kazanmak için sayfaları hızlı geçmeyecek, ya da fazla sürükleyici olur korkusuyla bir incelemeden kaçınmayacaksınız. Müziğe de ilginiz var—işte burada partisyonlarınız ve enstrümanlarınız var; zaman, sarsılmadan ve ölçülmeden, onların en zengin lezzetini vermek için yanınızda. Bizim bir hayalimiz ve bir vizyonumuz var. Bu vizyon, 1789 yılında bu odada ölmek üzere olan yaşlı Perrault’ya ilk kez göründü. Uzun ömrüne geriye bakarken, size de anlattığım gibi, ona dünyanın en güzel şeylerinin geçici ve yok olabilir göründüğünü düşündü; savaş, şehvet ve vahşetin bir gün bunları tamamen ezip yok edebileceğini düşündü. Kendi gözleriyle gördüğü manzaraları hatırladı, zihniyle başka şeyleri canlandırdı; ulusların bilgeliğe değil, kaba tutkulara ve yok etme arzusuna güçlendiklerini gördü; makinelerinin öyle çoğaldığını ki, tek silahlı bir adamın Büyük Monark’ın bütün ordusuna bedel olabileceğini düşündü. İnsanların öldürme teknikleriyle coşup dünyayı öyle bir öfkeyle kasıp kavuracağı bir zamanı öngördü ki, her değerli şey tehlikede olacaktı, her kitap, her resim, her uyum, iki bin yıl boyunca biriktirilmiş bütün hazineler, küçük, narin, savunmasız olan her şey – hepsi kaybolmuş gibi kaybolacaktı. Ve işte evladım, bu yüzden buradayım, bu yüzden SEN buradasın, ve bu yüzden belki de felaketi atlatmamız için dua edebiliriz.'"
 curtiss.296.g: "Burası gizli kalmalı. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] öğrenecek."
 curtiss.296.h: "Burası korunmalı. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] kalacak."
 curtiss.296.i: "Burası bizim olacak. [ROOT.GetCountry.GetNameNoFormatting] adına!"
 curtiss.298.t: "Kötü Karma"
 curtiss.298.d: ""
 curtiss.298.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] adamlarımıza Mavi Ay Vadisi’nin yolunu gösterdikten ve onlar Şangri-La’nın değerli hazinelerini yağmaladıktan sonra sefer nihayet geri döndü. Ancak [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] gizemli koşullar altında kayboldu. Geri dönen keşif üyeleri onun başına ne geldiğini kesin olarak söyleyemiyorlar. Dinlenirken gruptan ayrıldı – ve bir yamaçtan aşağı düştü, izleri derin bir uçurumda kayboldu. Müze artık birçok hazineyle daha zengin, ama kendi ulusumuzun arkeolojik serveti uğruna dürüstlüğünü riske atan umut vaat eden bir yurtseveri kaybetti."
 curtiss.298.g: "Toprak tarafından yutuldu..."
 curtiss.311.t: "Yeni Bir Pilot"
 curtiss.311.f: "'Mermilerimi hedefe kendi elimle koyuyormuş gibi isabet ettiririm.' - René Fonck"
 curtiss.311.g: "Bu, benzersiz bir kariyerin başlangıcı olacak."
 curtiss.311.h: "Ona iç propaganda için ihtiyacımız var."
 curtiss.312.t: "Uçan As"
 curtiss.312.d: "Pilotumuz [SCOPE.sCharacter('curtiss_ace').GetFullName], mevcut savaşta defalarca yeteneklerini kanıtladı, önemli sayıda düşmanı düşürdü. Silah arkadaşları onu yükselen bir uçan as olarak görüyor."
 curtiss.312.f: "'Son anda zihninin tam hâkimiyetini korumak, nişan hattı üzerinden sakin bir şekilde hedef almak ve kafanı dik tutmak herkesin harcı değildir.' - Manfred von Richthofen"
 curtiss.312.g: "Yeni bir ulusal kahraman!"
 curtiss.500.t: "[SCOPE.sCharacter('howard_hughes').GetFullName]’in Rüyası"
 curtiss.500.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolları başkanı, dünyanın en büyük uçağını inşa etme yönündeki vizyoner ve eksantrik planını açıkladı. Tek eksiği, hükümetten ufak bir destek."
 curtiss.500.f: "Dün gece [ROOT.GetCountry.GetCapital.GetCityHubName]’daki merkezinde [SCOPE.sCharacter('howard_hughes').GetFullName] tarafından olağanüstü bir basın toplantısı düzenlendi. Bir süredir gazeteciler onun akıl sağlığından şüphe ediyordu. [SCOPE.sCharacter('howard_hughes').GetLastName]’in takıntılar ve psikozlardan muzdarip olduğu söyleniyordu. Ancak savunucuları, buna rağmen işlerini başarıyla yürüttüğünü savunuyordu. Fakat patronun söylediklerini duyduklarında onlar bile sustu: Dünyanın en büyük uçağını yapmak istiyordu — Atlantik’i bin kişiye kadar taşıyabilecek büyüklükte. Servetinin tamamını bu hava canavarının yapımına yatıracağını açıkladı. Ayrıca hükümetten küçük bir katkı da bekliyor; çünkü bu, havacılığın ve altyapının gelişimi kadar, prestij açısından da ülkenin yararına olacaktı, eğer hayali gerçekleşirse. Bahsettiği meblağ küçük bir altı haneli tutardı. İnşa edilecek uçak ülke başkentimizin adını taşıyacak: [ROOT.GetCountry.GetCapital.GetCityHubName]."
 curtiss.500.g: "Büyük bir vizyon! [ROOT.GetCountry.GetCapital.GetCityHubName] gerçeğe dönüşecek."
 curtiss.500.h: "Bu delilik."
 curtiss.501.t: "Uçak Türü"
 curtiss.501.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] uçak tasarımcıları, uçağın klasik bir uçak mı yoksa bir uçan gemi mi olması gerektiğine henüz karar vermedi."
 curtiss.501.f: "Deniz uçakları sadece bir heves değildi. 1910’lardan 1940’lara kadar geleneksel uçaklara kıyasla önemli avantajlara sahiptiler. Pistlere ihtiyaç duymaz, herhangi bir su yüzeyine inebilirlerdi. Bu denize olduğu kadar büyük göllere de uygulanıyordu. Havaalanları şehirlerin dışında iken deniz uçakları eski limanları kullanabiliyordu. İtalya gibi uzun kıyı şeritlerine sahip ülkeler için bu yüzden deniz uçakları ve uçan gemiler çok daha kullanışlı görülüyordu; hatta Milano gibi kara içindeki bir şehirde bile Linate yakınlarında yapay göllü bir su havaalanı vardı. Dolayısıyla deniz uçakları Büyük Britanya ve ABD gibi Atlantik devletleri için de avantajlar sunuyordu."
 curtiss.501.g: "Klasik bir uçak olacak."
 curtiss.501.h: "Bu bir uçan gemi olacak."
 curtiss.502.t: "İnşaat Malzemeleri"
 curtiss.502.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] planlanırken, hangi malzemenin kullanılacağı konusunda hâlâ anlaşmazlık var."
 curtiss.502.f: "Havacılığın ilk dönemlerinde uçak yapımında ahşap ve kumaş hâkimdi. Bu malzemelerin hafifliğinin avantajı Birinci Dünya Savaşı’nda biliniyordu, fakat aynı zamanda dezavantajlarıyla da karşılaşılıyordu. Hemen hemen hiç hava koşullarına dayanıklı değillerdi ve hızla yıpranıyorlardı. Bu nedenle sonraki yıllarda kısmi metal yapım, nihayetinde ise tamamen metal yapım öne çıktı. Metal, alüminyum mevcut olmadığında çoğu durumda ahşaptan daha ağırdı. Ancak dayanıklılığı, metal korozyonu veya metal yorgunluğu gibi yeni sorunlar ortaya çıksa bile onu daha arzu edilir kılıyordu."
 curtiss.502.g: "Metal yalnızca gerekirse kullanılacak. Bu uçak ağırlıklı olarak ahşaptan yapılacak."
 curtiss.502.h: "Tamamen metal kaplama olsun."
 curtiss.503.t: "Motor Sorunları"
 curtiss.503.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] üzerindeki çalışmalar ilerledi. Uçak yavaş yavaş şekilleniyor. Ancak motor konusu henüz kesinleşmedi: iki farklı seçenek var."
 curtiss.503.f: "İkinci Dünya Savaşı sırasında ve 1950’lerin ortalarına kadar, 3680 kW’ın (5000 bg) üzerinde kalkış gücüne ve 70 litreden fazla silindir hacmine sahip pistonlu motorlar, savaş uçaklarını, bombardıman uçaklarını ve büyük yolcu uçaklarını güçlendirmek için üretildi. Örneğin Wright R-3350 ve Pratt & Whitney R-4360 motorları öne çıkan modellerdi. Jet uçaklarının zaferinden önce, hâlâ uçak motoru mekaniğinin zirvesi olarak kabul ediliyorlardı. Wright R-3350 18 silindirli bir motor iken, Pratt & Whitney R-4360 28 silindirliydi."
 curtiss.503.g: "On adet 18 silindirli motor mükemmel olur."
 curtiss.503.h: "Sekiz adet 28 silindirli motora ihtiyacımız var."
 curtiss.504.t: "Pervaneler"
 curtiss.504.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] son derece iyi gelişiyor. [SCOPE.sCharacter('howard_hughes').GetLastName]’e göre tahmini inşaat süresi yakalanacak. Henüz tüm sorular cevaplanmamış olsa da, kısa süre önce pervanelerin kaç kanatlı olması gerektiği sorusu tekrar gündeme geldi."
 curtiss.504.f: "Aslında tek kanatlı bir pervane en verimli olanıdır, çünkü dönen pervane kanadının akışı, önde giden kanadın yarattığı türbülans tarafından en az etkilenir. Ancak bir denge ağırlığı gerektirir, tahrik miline asimetrik yük bindirir ve oldukça titreşim yapar; bu yüzden bu tasarım nadiren kullanılır. Daha fazla kanat sayısı ise titreşim davranışını olumlu etkiler, özellikle de tekil kanatlar pervane dairesi boyunca farklı akımlara maruz kaldığında. Piston motorlu uçaklarda genellikle iki kanatlı pervaneler yaygındır. Buna karşın büyük uçakların turboprop ve propfan motorlarında 3 ila 7 ya da daha fazla kanat bulunur."
 curtiss.504.g: "4 kanatlı pervaneler uygun olur."
 curtiss.504.h: "5 kanatlı pervanelere ihtiyacımız var."
 curtiss.505.t: "Tarihteki En Büyük Gün"
 curtiss.505.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] ilk uçuşuna çıkmak üzere. Bununla birlikte birçok bilinmezlik söz konusu. [SCOPE.sCharacter('howard_hughes').GetFullName], uçağı kendisinin uçurmasında ısrar ediyor ve iş dünyasından, siyasetten ve basından temsilcileri bu uçuşa davet etmek istiyor. Daha temkinli sesler ise yalnızca seçilmiş temsilcilerin katılmasında ya da halkın tamamen dışarıda tutulmasında ısrar ediyor — ilk uçuşta bir şeylerin ters gitmesi ihtimaline karşı..."
 curtiss.505.f: "'Hercules muazzam bir girişimdi. Bugüne kadar yapılmış en büyük uçaktır. Beş katlı bir binadan daha yüksektir, kanat açıklığı ise bir futbol sahasından daha uzundur. Bu, bir şehir bloğundan bile uzun demektir. Hayatımın terini bu şeye döktüm. Tüm itibarımı ona bağladım ve defalarca söyledim: Eğer başarısız olursa muhtemelen bu ülkeyi terk ederim ve asla geri dönmem. Ve bunu ciddiyetle söylüyorum.' - Howard Hughes"
 curtiss.505.g: "Basın, iş dünyası ve siyaset temsilcilerini davet edin. Bay [SCOPE.sCharacter('howard_hughes').GetLastName] uçağı bizzat uçuracak."
 curtiss.505.h: "Basını davet ediyoruz. Tanınmış bir pilot uçağı uçuracak."
 curtiss.505.i: "Bu uçuş gizli yapılacak. Uçağı isimsiz bir pilot deneyecek."
 curtiss.506.t: "'400.000 Pound Havalanıyor'"
 curtiss.506.d: "Bir teknik mucize gerçekleşti: [ROOT.GetCountry.GetCapital.GetCityHubName], devasa boyutlarına rağmen uçabiliyor!"
 curtiss.506.f_hughes: "Onun günüydü. Hayatının günü. Başarısı. Vizyonu. [SCOPE.sCharacter('howard_hughes').GetFullName] her şeyini tek karta yatırmıştı. Burada ya kazanacak ya da kaybedip düşecekti. Asla yarım iş yapmazdı. Tüm basını, en büyük şirketlerin liderlerini, hatta milletvekillerini ve bakanları davet etmişti. Onlar tribünde oturmayacaktı. Onlarla birlikte uçacaktı. Ve tüm dünya ya onunla alay edecek, şirketini uçuruma sürükleyecek ya da o antik bir Sezar gibi zafer kazanacaktı.\n[SCOPE.sCharacter('howard_hughes').GetLastName] kumandaydı. Motorları çalıştırdı. [ROOT.GetCountry.GetCapital.GetCityHubName]’e komutu verdi. Devasa gövde kükredi. Dalgaları kabarttı. Titan saatlerce suyun üzerinde hızla ilerledi, beyaz köpüklerden uçağın hâlâ suyun yüzeyinde mi yoksa havada mı olduğu anlaşılamıyordu. Sonra: sadece motor gürültüsü. Artık dalga yoktu. [ROOT.GetCountry.GetCapital.GetCityHubName] havalandı. Gazeteciler, nadiren yaptıkları bir şeyi yaptılar. Sessiz kaldılar. Politikacılar kendilerini tutmaya çalıştı. İş insanları gözlerini kısmıştı. [SCOPE.sCharacter('howard_hughes').GetLastName] ise gülümsüyordu. Sonra, oradakiler akıl almaz olayı idrak ederken, bir muhabir sordu: '[SCOPE.sCharacter('howard_hughes').GetFirstName], bunu bekliyor muydunuz?' [SCOPE.sCharacter('howard_hughes').GetLastName]’in cevabı muammaydı:\n'Ben sürpriz yapmayı severim.'"
 curtiss.506.f_pilot: "[ROOT.GetCountry.GetNameNoFlag] için tarihi bir gün. [ROOT.GetCountry.GetCapital.GetCityHubName] imparatorluk asaletinde havalandı ve insan zekâsı ile ilerlemenin neler başarabileceğini gösterdi. [SCOPE.sCharacter('howard_hughes').GetFullName], kumandada olamamanın pişmanlığını şimdiden hissediyordu. Davetli gazeteciler bile bu devin sudan havalanmasına şaşırmıştı — ve haberleriyle ilk alıcıların ortaya çıkmasını sağladılar."
 curtiss.506.f_test: "Ne manzara! Ne mucize! Ne yazık ki bu deneyim sadece birkaç kişiye nasip oldu. [ROOT.GetCountry.GetCapital.GetCityHubName] uçuşu çok sayıda müşteri için bir tanıtım etkinliği olabilirdi. Ancak performans tek başına yeterlidir. Modelin piyasada yer edinmesi zaman alacak olsa da, [SCOPE.sCharacter('howard_hughes').GetFullName] haklı çıkma itibarını sürdürdü. Ve [ROOT.GetCountry.GetNameNoFlag], tarihin en büyük uçağını yapan ülke olarak resmen kayıtlara geçti — yıllarca kırılmayacak bir rekor."
 curtiss.506.g: "Bu gerçekten şaşırtıcı... ve çok olumlu!"
 curtiss.507.t: "Bir Kaya Gibi"
 curtiss.507.d: "En kötü korkular doğrulandı. [ROOT.GetCountry.GetCapital.GetCityHubName], bir kaya kadar uçabilir durumda. Onu en azından havaya fırlatmak için bir mancınık eksik."
 curtiss.507.f_hughes: "[ROOT.GetCountry.GetCapital.GetCityHubName] gürledi. Motorları homurdandı. [SCOPE.sCharacter('howard_hughes').GetLastName]’in yüzündeki gerilim arttı. 75 mil. 85 mil. 95 mil – ama bu canavar havalanmadı. Dev gövde yere yapışıp kaldı. Birkaç dakikalık denemeden sonra ilk alaycı yorum bir gazeteciden geldi. Arkasından zaten bunu önceden bilen eleştirmenlerin sesleri yükseldi. Politikacılar suçlamalar yöneltti. Büyük şirketlerin temsilcileri de önceki anlaşmaları sorgulamaya başladı. Uçak patronu bir kez daha yarattığını havaya kaldırmaya çalıştı — ama boşunaydı. Kariyerinin en mutsuz günüydü. Sonunda [SCOPE.sCharacter('howard_hughes').GetLastName] denemeyi sonlandırdı. Bu yenilginin şirketi için ne anlama geldiği sorulduğunda sadece, artık [ROOT.GetCountry.GetAdjectiveNoFormatting] Havayolları’nın başkanı olmadığını söyledi.\nBir gün sonra [SCOPE.sCharacter('howard_hughes').GetLastName] tüm yükümlülüklerini iptal etti ve [ROOT.GetCountry.GetNameNoFlag]’ı temelli terk etti."
 curtiss.507.f_pilot: "İnsanın unutmak istediği günler vardır — ya da ertesi günü daha da unutulmaz kılarak unutturmak istediği. [ROOT.GetCountry.GetCapital.GetCityHubName]’ın havalanmadığı hayal kırıklığından yalnızca bir gün sonra, [SCOPE.sCharacter('howard_hughes').GetFullName] çokça ses getiren bir açıklamayla istifasını duyurdu. Yalnızca havayolu şirketinden değil, elindeki tüm görevlerden ayrılacaktı. Hisseler serbest düşüşteydi, siparişler iptal edildi ve güven tamamen yok olmuştu. [ROOT.GetCountry.GetCapital.GetCityHubName] için yapılan harcamalar o kadar devasa boyutlardaydı ki şirket iflasın eşiğine geldi ve tarihindeki en kötü krizini yaşıyor. Bu sırada [SCOPE.sCharacter('howard_hughes').GetLastName], [ROOT.GetCountry.GetNameNoFlag]’ı terk edeceğini açıkladı. Gidilecek yer bilinmiyor. Özel uçağıyla ortadan kayboldu."
 curtiss.507.f_test: "[ROOT.GetCountry.GetCapital.GetCityHubName]’ı kapalı kapılar ardında denemek akıllıca bir karardı. Neyse ki büyük yankı uyandırabilecek korkulan bir kaza yaşanmadı. Ama aynı şey başarı haberi için de geçerli. Birkaç denemeden sonra bile [ROOT.GetCountry.GetCapital.GetCityHubName] havalanmaya ikna edilemedi. Başarısızlık tasarım hatalarından kaynaklanıyordu. [SCOPE.sCharacter('howard_hughes').GetLastName] için bu kişisel bir başarısızlıktı. Kamuoyu önünde rezil olmadı. Ancak birkaç ay içinde insanlar [ROOT.GetCountry.GetCapital.GetCityHubName]-projesine ne olduğunu soracak ve kendi sonuçlarını çıkaracaklardı. Gerçek asla tam anlamıyla gün yüzüne çıkmayacak ve hükümet de vergi mükelleflerinin parasının boşa harcanmasının muhalefetin işine yarayacak bir skandala dönüşmesini engelleyecekti. Bu, aslında [SCOPE.sCharacter('howard_hughes').GetLastName]’in istemediği bir yardımdı. Bir anda çok sessiz bir adama dönüşmüştü. Emekliliğe çekilmiş, suskun bir adam."
 curtiss.507.g: "Bu muhtemelen tarihteki en büyük ikinci vergi israfıydı."
 curtiss.508.t: "Bir Kâbus"
 curtiss.508.d: "[SCOPE.sCharacter('howard_hughes').GetFullName] yeni bir İkarus. Onun eseri dünyayı ateşe verdi. Yıkıcı uçak kazası onlarca kişinin ölümüne sebep oldu ve geride bir enkaz çölü bıraktı. Birden fazla tasarım hatası üst üste gelerek felaketi doğurdu."
 curtiss.508.f_hughes: "[SCOPE.sCharacter('howard_hughes').GetLastName] motorları çalıştırdığında içgüdüleri bir şeylerin ters gittiğini söylüyordu. Ama planlar doğruydu. Hesaplamalar doğruydu. Hata olamazdı. Nitekim [ROOT.GetCountry.GetCapital.GetCityHubName] beklenenden bile iyi çalışıyordu. [SCOPE.sCharacter('howard_hughes').GetLastName] amacına ulaştığına inanmıştı. Öyle olmak zorundaydı. Bütün şüphelerini bir kenara attı. Dev uçağı gökyüzüyle evlendirdi — ve ondalık noktasından sonraki bir hatayı yalnızca o fark etti; arka planda gazeteciler ve iş dünyası temsilcileri kutlama yaparken. Ama içgüdüsü yanılmamıştı. Mürettebatın geri kalanının ne olduğunu fark etmesi yalnızca birkaç saniye sürdü, alkışlar korku çığlıklarına dönüştü. Gerisi yalnızca gürültü ve ateşti. [ROOT.GetCountry.GetCapital.GetCityHubName] çatılara çarptı, duvarları yıktı, evleri yağla kapladı ve bir titan gibi çökerek bir mahalleyi ateşe verdi. [ROOT.GetCountry.GetCapital.GetCityHubName], [SCOPE.sCharacter('howard_hughes').GetLastName]’in Cehennemi oldu. Karşısına çıkan masum insanlarla en yakın dostlarını da ölüme sürükledi. Enkaz ve cesetlerin yanında [SCOPE.sCharacter('howard_hughes').GetLastName], batmış bir şirket ve yıllarca toparlanamayacak bir havacılık sektörü bıraktı. [ROOT.GetCountry.GetNameNoFlag] muhtemelen o günden asla tam anlamıyla kurtulamayacak."
 curtiss.508.f_pilot: "[SCOPE.sCharacter('howard_hughes').GetLastName] o gün hayatta kaldı çünkü uçağın kumandasında o yoktu. Ama bazen hayatta kalmaktansa ölmek daha iyidir. Ona planlandığı gibi pilot olarak uçmadığı için mutlu olup olmadığı sorulduğunda, cevabı hayır oldu. Çünkü [SCOPE.sCharacter('howard_hughes').GetLastName] sadece havacılık tarihinin en büyük felaketlerinden birinin değil, aynı zamanda [ROOT.GetCountry.GetNameNoFlag] tarihinin en büyük felaketlerinden birinin de sorumlusuydu. Onlarca ölümün ve bir yıkım hattının yükü onun omuzlarındaydı. Yalnızca hayatının eseri değil, her şey yok olmuştu. Dakikalar içinde dev uçak kontrolden çıkıp bir kuyruklu yıldız gibi bir mahalleye çakıldığında şirketi de telafi edilemeyecek kayıplar yaşadı. Hayali yok oldu. Şirketi yok oldu. İtibarı yok oldu. [SCOPE.sCharacter('howard_hughes').GetLastName], başarısız olursa sürgüne gideceğini söylemişti. Ama bu olaydan sonra birçok kişi sadece sürgünü değil, onun canını istiyordu. [SCOPE.sCharacter('howard_hughes').GetLastName]’in sonuyla birlikte havacılık tarihindeki bir dönem de sona erdi; bir zamanlar [ROOT.GetCountry.GetNameNoFlag]’ın öncülük ettiği bir dönem."
 curtiss.508.f_test: "Hasar kontrolü. [ROOT.GetCountry.GetCapital.GetCityHubName]’ın ilk uçuşunda yaşananları anlatmanın başka yolu yok. Az sayıdaki seyircinin şaşkınlığına rağmen uçak gerçekten havalandı — ancak kısa süre sonra kontrolden çıktı. Test pilotu, dev uçağı bir dizi evden uzaklaştırmaya çalışırken hayatını kaybetti. Bu hareket yalnızca kısmen başarılı oldu ve birkaç bina ağır hasar gördü. Çok sayıda yaralı vardı, test pilotu öldü. [ROOT.GetCountry.GetCapital.GetCityHubName] geri dönüşsüz bir şekilde yok oldu. Olay, gizli testin gizli kalamamasını da sağladı. Kamuoyu artık [SCOPE.sCharacter('howard_hughes').GetLastName]’in başarısızlığını biliyor. Milyarder, emekliliğini açıklayıp ülkeyi terk etti. Geriye iflasın eşiğinde bir şirket kaldı. Daha kötü de olabilirdi. Bu kayıplar karşısında teselli sayılmaz, ama en azından çılgın bir milyarderin eksantrik hevesleri artık daha fazla kurban vermeyecek."
 curtiss.508.g: "Havacılık daha karanlık bir gün görmedi."
 curtiss.510.t: "[ROOT.GetCountry.GetNameNoFormatting]"
 curtiss.510.d: "Havayolu şirketimizin ve gerekli fabrikaların genişlemesinin ardından dev zeplin üzerindeki çalışmalar başladı. Devlet üzerine düşeni yapacak."
 curtiss.510.f: "'Sadece istemeniz, inanmanız ve sonra başaracaksınız.' - Ferdinand Graf von Zeppelin"
 curtiss.510.g: "Teknoloji tarihinde bir kilometre taşı!"
 curtiss.511.t: "[ROOT.GetCountry.GetNameNoFormatting]'ın İlk Seyahati"
 curtiss.511.d: "İki yıllık inşaanın ardından tamamlandı: [ROOT.GetCountry.GetNameNoFormatting] zarif bir şekilde gökyüzüne yükseliyor ve ilk uçuşuna hazır. Biletler aylardır tükenmiş durumda. Şimdi sadece, ilk uçuşun yurt içi mi yoksa uluslararası mı olacağına dair son bir karar verilmesi gerekiyor."
 curtiss.511.f: "Sert yapılı bir hava gemisinin ilk başarılı uçuşu, Ferdinand von Zeppelin'in LZ1'i, 1900'de Almanya'daydı. 1910 ile 1914 yılları arasında, Deutsche Luftschiffahrts-Aktiengesellschaft (DELAG) zeplinlerle binlerce yolcu taşıdı. 1917'de, Alman LZ 104 (L 59), Bulgaristan'daki Jambol'dan Hartum'a ve geriye, 6.800 kilometrelik (4.200 mil; 3.700 deniz mili) duraksız bir yolculuk yapan ilk zeplindi. Savaş sırasında ve hemen sonrasında, İngiltere ve Amerika Birleşik Devletleri zeplinler inşa etti, Fransa ve İtalya ise el konulan Alman zeplinleriyle deneyler yaptı. Luftschiffbau Zeppelin, Ekim 1924'te LZ 126'yı bir savaş tazminatı olarak ABD Donanması'na teslim etti. Şirket başkanı Dr. Hugo Eckener teslimat uçuşunu komuta etti ve gemi USS Los Angeles (ZR-3) olarak görevlendirildi. 1925 yılında, Versailles kısıtlamaları Müttefikler tarafından hafifletildi ve Zeppelin Luftschiffbau'nun başkanı Dr. Hugo Eckener'in, kıtalararası bir hava yolcu servisini başlatmaya uygun bir zeplin geliştirme vizyonunu sürdürmesine olanak tanındı. Buna göre, Zeppelin Lufftschiffbau yeni nesil zeplinlerin ilki olan LZ 127 Graf Zeppelin'in inşasına başladı. 18 Eylül 1928'de, tamamlanan zeplin ilk kez uçtu. Kariyeri boyunca, Graf Zeppelin Güney Atlantik'i toplam 136 kez geçti."
 curtiss.511.g: "İlk seyahat yurt içinde gerçekleşsin."
 curtiss.511.h: "İlk seyahat yurt dışına olsun."
 curtiss.512.t: "[ROOT.GetCountry.GetNameNoFormatting]'ın Yolculuğu"
 curtiss.512.d: "Zeplin filosumuzun amiral gemisi son seyahatinden döndü. Sıradaki seyahat rotası ne olsun?"
 curtiss.512.g: "Zeplin öncelikle sınırlarımız içinde uçsun."
 curtiss.512.h: "Zeplin yurt dışına uçsun ve şanımızı artırsın."
 curtiss.513.t: "[ROOT.GetCountry.GetNameNoFormatting] Felaketi"
 curtiss.513.d: "Bir iniş manevrası sırasında, [ROOT.GetCountry.GetNameNoFormatting]'da bilinmeyen nedenlerle bir yangın çıktı ve zeplin düştü! Onlarca kişi yaralandı ve hayatını kaybetti, olay havacılık tarihinin en kötü kazalarından biri olarak nitelendiriliyor!"
 curtiss.513.f: "'Gemi, muazzaz bir tüy gibi, sanki güçlüymüşçesine - dünya havacılığında oynadığı rolden dolayı muazzaz gururluymuşçasına bize doğru ilerliyor. Gemi şüphesiz aktiviteyle dolup taşıyor, görebildiğimiz gibi. Mürettebata emirler haykırılıyor, yolcular muhtemelen pencerelerde sıralanmış aşağıdaki alana ve demirleme direğine bakıyorlar. Şu anda neredeyse hareketsiz duruyor; geminin burnundan ipler attılar ve aşağıdaki alanda bir grup adam tarafından tutuluyor. Yağmur yeniden başlıyor -- yağmur biraz hafiflemişti. Geminin arka motorları onu sadece tutuyor, sadece --\nAlev aldı! Yoldan çekilin! Yoldan çekilin! Yanıyor ve düşüyor! Korkunç bir şekilde düşüyor! Aman tanrım, lütfen yoldan çekilin. Yanıyor, alevler içinde ve -- ve demirleme direğinin üstüne düşüyor ve herkes bu durumun korkunç olduğunda hemfikir. Bu, dünyanın en kötü felaketlerinden biri! Şimdi duman ve alevler var ve iskelet yere çarpıyor, tam olarak demirleme direğine değil. Oh, insanlık ve tüm yolcular, etrafımda çığlık atıyor!' - Herbert Morrison"
 curtiss.513.g: "Zeplin endüstrisi için ağır bir darbe."
 curtiss.514.t: "Hidrojen Yerine Helyum"
 curtiss.514.d: "Helyum rezervlerimiz sayesinde, Zeplin [ROOT.GetCountry.GetNameNoFormatting] inşasında son derece yanıcı olan hidrojene tamamen ihtiyaç duymadan yapabiliyoruz."
 curtiss.514.f: "Helyumla doldurulmuş bir zeplin, hidrojenle doldurulmuş eşdeğerine göre çok daha güvenlidir. Bu da çok daha güvenli bir yolculuk sağlar. Havacılıkta kazalar asla tamamen göz ardı edilemese de, felaket yaşanma olasılığı büyük ölçüde azalır."
 curtiss.514.g: "Ben de o şeyin sadece komik sesler çıkarmaya yaradığını sanıyordum."
 curtiss.520.t: "Zeplin Seferi Lideri"
 curtiss.520.d: "Kuzey Kutbu Seferi hâlâ yetkin bir hava gemisi pilotuna ihtiyaç duyuyor."
 curtiss.520.f: "Bir zeplin seferi için üç farklı pilot seçeneği vardır. Bazı durumlarda, usta pilotlar tehlikeli bir durumu savuşturma konusunda daha şanslı olabilir. Ancak bir zeplin kazası durumunda, pilotun hayatını kaybetme ihtimali de vardır."
 curtiss.520.g: "[SCOPE.sCharacter('curtiss_expedition_leader_1').GetFullName]."
 curtiss.520.h: "[SCOPE.sCharacter('curtiss_expedition_leader_2').GetFullName]."
 curtiss.520.i: "[SCOPE.sCharacter('curtiss_expedition_leader_3').GetFullName]."
 curtiss.521.t: "Zeplin Görevi"
 curtiss.521.d: "Yetkin bir pilot seçtikten sonra şimdi de kesin araştırma amacını daraltmamız gerekiyor."
 curtiss.521.f: "Başarılı bir sefer, ulusumuzun araştırmalarını geliştirecek. Sefer sırasında hangi alana özel önem verileceğine önceden karar verebiliriz. Coğrafya askeri bilgimizi artırır, meteoroloji üretimi yükseltir, biyoloji ise sosyal araştırmayı geliştirir. Yolculuk sırasında ne kadar çok bilimsel araştırma yapılırsa, elde edilen bonus da o kadar yüksek olur."
 curtiss.521.g: "Coğrafya."
 curtiss.521.h: "Meteoroloji."
 curtiss.521.i: "Biyoloji."
 curtiss.522.t: "Zeplin Seferi Başlıyor!"
 curtiss.522.d: "Hava gemimiz bugün bağlandığı direkten ayrıldı ve doğrudan kutup bölgesine doğru yola çıktı."
 curtiss.522.f: "'Macera sadece kötü planlamadır.' - Roald Amundsen"
 curtiss.522.g: "Bilim için soğuk kuzeye!"
 curtiss.523.t: "Zeplin Seferi Dönüyor"
 curtiss.523.d: "Kuzey Kutbu’na düzenlenen zeplin seferimiz başarıyla geri döndü ve birçok yeni bilimsel keşfi beraberinde getirdi."
 curtiss.523.f: "'Şunu söyleyebilirim ki en önemli unsur şudur: Seferin nasıl donatıldığı, her zorluğun nasıl öngörüldüğü ve bununla başa çıkmak ya da ondan kaçınmak için önlemlerin alınıp alınmadığı. Her şeyi düzen içinde olan, şansa sahip olur; insanlar buna şans der. Gerekli önlemleri zamanında almamış olan içinse yenilgi kesindir; insanlar buna kötü şans der.' - Roald Amundsen"
 curtiss.523.g: "Eve hoş geldiniz çocuklar."
 curtiss.524.t: "Sefer Felaketi"
 curtiss.524.d: "Son hata muhtemelen bir fazlaydı: zeplin seferimizle irtibat kesildi. En kötüsünü bekliyoruz."
 curtiss.524.f: "Kuzey Kutbu’na yapılan zeplin yolculuklarında kazalar ne yazık ki istisna değildi. 1928’de, Umberto Nobile komutasındaki zeplin Italia, Nordaustlandet’in (Svalbard’ın doğu kısmı) yalnızca 30 kilometre kuzeyinde buzulların üzerine çakıldı. Mürettebatın 16 üyesinden 10’u gondol parçalanınca buzun üzerine fırlatıldı; kalan 6’sı ise gondolun kopması sonucu yükselen üst yapının içinde hapsoldu; bu 6 kişinin akıbeti asla öğrenilemedi. Buz üzerindeki 10 kişiden biri olan Pomella çarpma sonucu öldü; Nobile’nin kolu, bacağı, kaburgası kırıldı ve başı yaralandı; Cecioni’nin iki bacağı ağır şekilde kırıldı; Malmgren ciddi bir omuz yarası ve muhtemel böbrek hasarı yaşadı; Zappi’nin birkaç kaburgası kırıldı. Kazanın ardından Sovyetler Birliği, Norveç, İsveç, Finlandiya ve İtalya dâhil birçok ülke ilk kutup hava ve deniz kurtarma operasyonunu başlattı."
 curtiss.524.g: "Yapabileceğimiz tek şey beklemek ve umut etmek."
 curtiss.524.h: "Takımı bulmaları için diğer ülkeleri her ne pahasına olursa olsun harekete geçirmeliyiz!"
 curtiss.525.t: "Sefer Üyeleri Öldü"
 curtiss.525.d: "Günler sonra kesinleşti: zeplin görevi tamamen başarısız oldu ve pilot [SCOPE.sCharacter('curtiss_expedition_leader').GetFullName] dâhil tüm üyeler öldü."
 curtiss.525.f: ""
 curtiss.525.g: "Sonsuz buzlarda kaybolup donarak öldüler..."
 curtiss.526.t: "Sefer Lideri Sağ!"
 curtiss.526.d: "Herkesi şaşırtacak şekilde, zeplin pilotu [SCOPE.sCharacter('curtiss_expedition_leader').GetFullName] bazı sağ kalanlarla birlikte kendisini yok olmuş hava gemisinden kurtarmayı başarmış gibi görünüyor."
 curtiss.526.f: ""
 curtiss.526.g: "Ne büyük bir rahatlama!"
 curtiss.527.t: "Kuzey Kutbu Geçişi"
 curtiss.527.d: "Zeplin seferi ekibimiz, [SCOPE.sCharacter('curtiss_expedition_leader').GetFullName] komutasında Kuzey Kutbu’nun üzerinden uçan ilk ekip oldu."
 curtiss.527.f: "'Diğerlerinin başaramamış olması: Kuzey Kutbu girişimine yönelten esas etken buydu. Gençken hırslıydım. Yeni şeyler istiyordum. Yeni bir hava gemisi inşa etmiştim ama pilotlar ve Hava Kuvvetleri subayları tarafından kullanım şekli hoşuma gitmiyordu. Onu uçurmak istedim çünkü düşündüklerinden çok daha fazlasını yapabileceğini biliyordum.' - Umberto Nobile"
 curtiss.527.g: "Senin için buz getirdim."
 curtiss.528.t: "[ROOT.GetCountry.GetNameNoFormatting] ile Buluşma"
 curtiss.528.d: "Arktik’te seferimiz, uzun zamandır planlanan lüks zeplin [ROOT.GetCountry.GetNameNoFormatting] ile buluştu. Her iki mürettebat için de verimli bir karşılaşma oldu."
 curtiss.528.f: "1928’de Alman hükümeti, yapım aşamasındaki LZ 127 hava gemisini iki araştırma gezisi için kullanmayı kabul etti. Uzun zamandır planlanan Arktik yolculuğu sonunda 24–31 Temmuz 1931 tarihleri arasında gerçekleşti. Mürettebata ek olarak 15 sefer üyesi de gemideydi. Zeplin önce Friedrichshafen’den Berlin ve Leningrad üzerinden Franz-Josef Toprakları’na uçtu. Hooker Adası’nın Bayta Tichaya körfezinde Sovyet buzkıranı Malygin ile buluşuldu ve operasyonu finanse etmek için posta alışverişi yapıldı. Franz Josef Toprakları üzerinde kısa bir turdan sonra Eckener, hava gemisini henüz tam haritalanmamış Komsomolets Adası’na yönlendirdi ve Severnaya Zemlya’nın batı kıyısını Cape Chelyuskin’e kadar takip etti. Taimyr yarımadasındaki Byrranga Dağları üzerinden Kara Denizi’ne ve Novaya Zemlya’nın kuzey ucuna, Dikson yakınlarına dönüldü. Çift adanın güneydoğu kıyısını izleyerek Arkhangelsk ve Leningrad üzerinden Berlin’e uğradıktan sonra zeplin Friedrichshafen’e geri döndü. LZ 127 toplamda yaklaşık 10.600 kilometre kat etmişti. Yolculuk, hava gemilerinin Arktik’te hem ulaşım hem de araştırma platformu olarak mükemmel uygunluğunu gösterdi. Ayrıca çok sayıda bilimsel sonuç elde edildi."
 curtiss.528.g: "Merhaba güzel bayan."
 curtiss.531.t_geo: "Buzsuz geçidin keşfi"
 curtiss.531.t_meo: "Kuzey Işıkları"
 curtiss.531.t_bio: "Kutup Ayıları"
 curtiss.531.d_geo: "Zeplin seferinin araştırmacıları, daha önce bilinmeyen bir Arktik bölge üzerinde uçarken yeni bir geçit keşfettiler."
 curtiss.531.d_meo: "Zeplin seferinin araştırmacıları, olağanüstü derecede aktif aurora gecelerine tanıklık edebildiler."
 curtiss.531.d_bio: "Hava gemisinden araştırmacılar bir grup kutup ayısını gözlemleme ve günler boyunca davranışlarını inceleme fırsatı buldu."
 curtiss.531.f_geo: "Kutup keşiflerinin ilk günlerinde en büyük kaygılardan biri, Kuzeydoğu Geçidi ve Kuzeybatı Geçidi gibi yeni geçitlerin keşfiydi. Her iki rota da buz nedeniyle kârsız olduğu kanıtlansa da, kutup bölgesinin haritaları sonraki keşiflere yardımcı olmada faydalılığını yitirmemeliydi."
 curtiss.531.f_meo: "Kuzey ışıkları, güneş rüzgârının manyetosferde yarattığı bozulmaların sonucudur. Büyük bozulmalar, koronal deliklerden ve koronal kütle atımlarından kaynaklanan güneş rüzgârı hızındaki artışlarla ortaya çıkar. Bu bozulmalar, manyetosfer plazmasındaki yüklü parçacıkların yörüngelerini değiştirir. Auroralar; tüm gökyüzünü kaplayan perdeler, ışınlar, sarmallar veya dinamik titreşimler halinde görünen parlak ışık desenleriyle belirir."
 curtiss.531.f_bio: "Constantine John Phipps, 1773 yılında Kuzey Kutbu’na yaptığı seferin raporunda kutup ayısını ayrı bir tür olarak tanımlayan ilk kişiydi. Kutup ayısı, hâlen yaşayan en büyük ayı türü ve en büyük kara etoburudur. Kahverengi ayının kardeş türü olsa da, çok daha dar bir ekolojik alana uyum sağlamıştır; soğuk iklim, kar ve buz üzerinde hareket edebilmek, açık sularda yüzmek ve çoğunlukla diyetini oluşturan fokları avlamak için birçok fiziksel özelliği evrimleşmiştir. Çoğu kutup ayısı karada doğsa da, zamanlarının büyük kısmını deniz buzunda geçirirler."
 curtiss.531.g: "Harika!"
 curtiss.531.h: "Bu görkemli hayvan bir [concept_dubois_zoo]’ya ait!"
 curtiss.532.t_geo: "Yeni haritalar"
 curtiss.532.t_meo: "Manyetik çalışmalar"
 curtiss.532.t_bio: "Narval"
 curtiss.532.d_geo: "Kuzey Kutbu’na yapılan hava gemisi seferinin haritacıları Arktik’in yeni haritalarını hazırlama sürecinde. Çalışmalarını sürdürebilmek için biraz daha zamana ihtiyaç duyuyorlar."
 curtiss.532.d_meo: "Mevcut kutup seferinde görev yapan meteorologlar, belirli bir bölgedeki manyetik bir olguyu daha yakından gözlemlemek istiyor."
 curtiss.532.d_bio: "Kutup zeplininde bulunan deniz araştırmacıları bir narval gördü. Hayvanın davranışlarını daha yakından incelemek için iki gün geçirmeyi planlıyorlar."
 curtiss.532.f_geo: "Zeplinle Arktik’in geniş kısımlarının üzerinden uçabilmek, önceki gemi yolculuklarına kıyasla muazzam bir avantajdı: Geminin buzda sıkışma riski yoktu. Bu üstün görüş açısı, bölgenin kolay haritalanması için tamamen yeni imkânlar sağladı."
 curtiss.532.f_meo: "Dünyanın dış çekirdeğindeki sıvı hareketi nedeniyle, gerçek manyetik kutuplar sürekli yer değiştirir. Ancak binlerce yıl içinde yönleri, Dünya’nın dönüş eksenine ortalama olarak hizalanır. Yaklaşık her yarım milyon yılda bir kutuplar ters döner, fakat bu değişimin zaman aralığı 10 bin yıldan 50 milyon yıla kadar değişebilir. Jeomanyetik kutup yalnızca teoriktir ve doğrudan belirlenemez, ancak manyetik (dip) kutuptan daha pratik öneme sahip olduğu söylenebilir. Çünkü kutuplar, Dünya’nın manyetik alanı hakkında çok şey açıklar; örneğin auroraların nerelerde görülebileceğini belirler."
 curtiss.532.f_bio: "Başlıca Kanada Arktik bölgesi, Grönland ve Rusya sularında bulunan narval, eşsiz bir şekilde uzmanlaşmış bir kutup yırtıcısıdır. Kışın, yoğun buz tabakasının altında çoğunlukla dilbalığı gibi dip canlılarıyla beslenir. Yazın ise çoğunlukla Arktik morina ve Grönland pisi balığı yer; ayrıca kutup morinası gibi diğer balıklarla da beslenir. Erkek narvalın en belirgin özelliği, aslında köpek dişi olan uzun bir tek diştir. Ortaçağ Avrupalılarının bir kısmı, narval dişlerini efsanevi tek boynuzlu atın boynuzları sanıyordu."
 curtiss.532.g: "Biraz daha kalmalıyız."
 curtiss.532.h: "Havanın değişme riskine girmeyelim – uçmaya devam!"
 curtiss.533.t_geo: "Arktika’nın haritalanması"
 curtiss.533.t_meo: "Meteoroloji istasyonu"
 curtiss.533.t_bio: "Fosil arayışı"
 curtiss.533.d_geo: "Zeplin görevi üyeleri teorilerini doğrulamak ve Arktik’in bazı bölgelerini ölçmek konusunda büyük bir ihtiyaç hissediyor. Ancak bu, tamamen risksiz olmayan bir inişi gerektiriyor."
 curtiss.533.d_meo: "Hava gemisindeki meteorologlar, Arktik’te yer deneyleri yapmak için geçici bir meteoroloji istasyonu kurmaya istekli olduklarını bildirdiler. Ancak bu, zeplinin bir iniş manevrası yapması gerektiği anlamına geliyor."
 curtiss.533.d_bio: "Kutup zeplininde bulunan biyologlar, buzulların içinde tarih öncesi hayvan ve bitkilere ait fosillerin bulunabileceğine inanıyor ve pilotu iniş yapmaya ikna ediyorlar. Ancak bu, tehlikelerle dolu bir girişim."
 curtiss.533.f_geo: "Kutup bölgesinde inişler nadirdi, ama imkânsız değildi. 1931’de ‘Graf Zeppelin’, Arktik Denizi seferinde ustaca bir başarıya imza attı. Buz kütleleri arasında suya iniş yaptı. Tamamen tehlikesiz olmayan bu manevra mükemmel geçti. Zeplin özel posta damgasıyla mühürlenmiş 50.000 mektup taşıyan bir posta çuvalı, yakındaki bir Sovyet buzkıranına teslim edildi. Bu ek işten elde edilen kâr kayda değerdi. Jeodezik, meteorolojik ve coğrafi sonuçlar ise etkileyiciydi: ‘106 saatlik kutup uçuşunda, hava gemisi buz kıranların iki üç yılda yaptığı işi başardı’ diye belirtti araştırma gezisinin bilimsel lideri, Leningrad Arktik Enstitüsü müdürü Profesör Samoilovich."
 curtiss.533.f_meo: "Kutup bölgesinde inişler nadirdi, ama imkânsız değildi. 1931’de ‘Graf Zeppelin’, Arktik Denizi seferinde ustaca bir başarıya imza attı. Buz kütleleri arasında suya iniş yaptı. Tamamen tehlikesiz olmayan bu manevra mükemmel geçti. Zeplin özel posta damgasıyla mühürlenmiş 50.000 mektup taşıyan bir posta çuvalı, yakındaki bir Sovyet buzkıranına teslim edildi. Bu ek işten elde edilen kâr kayda değerdi. Jeodezik, meteorolojik ve coğrafi sonuçlar ise etkileyiciydi: ‘106 saatlik kutup uçuşunda, hava gemisi buz kıranların iki üç yılda yaptığı işi başardı’ diye belirtti araştırma gezisinin bilimsel lideri, Leningrad Arktik Enstitüsü müdürü Profesör Samoilovich."
 curtiss.533.f_bio: "Kutup bölgesinde inişler nadirdi, ama imkânsız değildi. 1931’de ‘Graf Zeppelin’, Arktik Denizi seferinde ustaca bir başarıya imza attı. Buz kütleleri arasında suya iniş yaptı. Tamamen tehlikesiz olmayan bu manevra mükemmel geçti. Zeplin özel posta damgasıyla mühürlenmiş 50.000 mektup taşıyan bir posta çuvalı, yakındaki bir Sovyet buzkıranına teslim edildi. Bu ek işten elde edilen kâr kayda değerdi. Jeodezik, meteorolojik ve coğrafi sonuçlar ise etkileyiciydi: ‘106 saatlik kutup uçuşunda, hava gemisi buz kıranların iki üç yılda yaptığı işi başardı’ diye belirtti araştırma gezisinin bilimsel lideri, Leningrad Arktik Enstitüsü müdürü Profesör Samoilovich."
 curtiss.533.g: "Bir inişi deneyelim."
 curtiss.533.h: "Bu çok tehlikeli."
 curtiss.534.t: "Şiddetli rüzgarlar"
 curtiss.534.d: "Birdenbire ortaya çıkan kutup rüzgarları geçişi zorlaştırıyor."
 curtiss.534.f: "Şiddetli rüzgarlar ve fırtınalar gibi doğa olayları, hava gemileri için hem tehlike hem de fırsat olabilir. Hava gemisi üretimine yönelmiş ya da bir usta pilota sahip ülkeler bu zorluklarla daha iyi baş edebilir. Bu avantajlara sahip olmayan ülkeler içinse doğa güçleri büyük bir tehdit oluşturur."
 curtiss.534.g: "Bu rüzgarlar hava gemimize ve bilime arkamızdan esen bir rüzgar olacak!"
 curtiss.534.h: "Bu delilik! Rotayı değiştirin!"
 curtiss.534.i: "Üstün hava gemimiz bu meydan okumayla kolayca başa çıkacaktır."
 curtiss.535.t: "Kutup Fırtınası"
 curtiss.535.d: "Zeplin görevi tehlikeli bir kutup fırtınasına yakalandı."
 curtiss.535.f: "Şiddetli rüzgarlar ve fırtınalar gibi doğa olayları, hava gemileri için hem tehlike hem de fırsat olabilir. Hava gemisi üretimine yönelmiş ya da bir usta pilota sahip ülkeler bu zorluklarla daha iyi baş edebilir. Bu avantajlara sahip olmayan ülkeler içinse doğa güçleri büyük bir tehdit oluşturur."
 curtiss.535.g: "Geçişi göze almalıyız."
 curtiss.535.h: "Bizi ne pahasına olursa olsun tehlikeden çıkarın!"
 curtiss.535.i: "[SCOPE.sCharacter('curtiss_expedition_leader').GetFullName] günü kurtaracak."
 curtiss.536.t: "Açık Hava"
 curtiss.536.d: "Açık hava ve sakin bir uçuş, zeplin ekibine ekstra zaman kazandırıyor."
 curtiss.536.f: "'Buzulların görkemiyle, parıldayan buz kütlelerinin zengin renk senfonisiyle ve çoğu kez fantastik şekiller almış adalar ve kıyılarla bezenmiş kutup ülkesini görmeyen, dünyamızın sunduğu en güzel şeyleri bilmiyor demektir.' – Hugo Eckener"
 curtiss.536.g: "Bir deney yapın."
 curtiss.536.h: "Hava gemisini onarın."
 curtiss.537.t: "Buz Tutan Pervaneler"
 curtiss.537.d: "Soğuk hava etkisini gösteriyor: pervaneler buz tuttu ve kırılma tehlikesiyle karşı karşıya."
 curtiss.537.f: "Pervanelerde buzlanma, motorları buz çözmek için kısacağımız anlamına gelir. Sert buz parçaları koparsa, zeplin zarfına veya aletlere zarar verebilir. Zeplin şimdiden gözle görülür şekilde irtifa kaybediyor. Bazı adamlar, araştırmacıların büyük üzüntüsüne rağmen, irtifa kazanmak için 'gereksiz balastı' atmanın daha iyi olacağını düşünüyor."
 curtiss.537.g: "Sakin olun ve devam edin."
 curtiss.537.h: "Balastı atın!"
 curtiss.538.t: "Zeplin Demirlemesi"
 curtiss.538.d: "Kutup seferi bakım yapmak veya deneyler gerçekleştirmek için uygun bir mola noktası buldu."
 curtiss.538.f: "Daha 1910’da Alman araştırmacılar, bir zeplinle araştırma seferi hazırlığı için Spitsbergen’e bir gezi düzenlemişti. O dönemde uygun hava gemisi limanları arayışı önemli bir rol oynuyordu. Bu seferin bir sonucu olarak Spitsbergen’de ilk yıl boyu faaliyet gösteren Alman hava durumu istasyonu kuruldu."
 curtiss.538.g: "Dinlenmek için iyi bir yer."
 curtiss.538.h: "Kalıcı bir araştırma istasyonu kurmalıyız."
 curtiss.539.t: "Motor arızası!"
 curtiss.539.d: "Zeplin motorlarından biri bugün aniden çalışmayı durdurdu! Ekip bunu onarmanın bir yolunu göremiyor."
 curtiss.539.f: "Tek bir motor arızası mutlaka bir felaket anlamına gelmez; hava gemilerinde genellikle birden fazla motor bulunur. Ancak böyle bir olayın başka kazalarla birleşmesi dramatik sonuçlara yol açabilir."
 curtiss.539.g: "Bu yolculuk bahtsız."
 curtiss.540.t: "Kutup Ayısı Yakalandı"
 curtiss.540.d: "Kısa bir inişin ardından zeplin ekibimiz kutup ayısını yakalayıp kafese kapatmayı başardı. Onu hemen eve göndereceğiz."
 curtiss.540.f: "Büyük bir sabır ve tuzaklar kullanarak, zeplin ekibi görkemli [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]’i pusuya düşürüp, devasa boyutuna rağmen esir etmeyi başardı. Seferin geri kalanını tehlikeye atmamak için, ayı küçük bir grupla Spitsbergen’deki bir limana götürülecek; orada özel tüccarlar ücret karşılığında onu başkente ulaştıracak."
 curtiss.541.t: "Kutup Ayısı Katliama Yol Açtı!"
 curtiss.541.d: "Kutup ayısını yakalamak için yapılan kısa iniş intihar göreviyle sonuçlandı – adamlarımızdan bazıları ağır yaralandı, biri ise öldü!"
 curtiss.541.f: "Temelde kutup ayıları insanları av olarak görür – bu, bilinen çoğu ayı türünün aksine bir durumdur. Saldırılar sebepsiz yere bile gerçekleşebilir, her ne kadar nadir olsa da. Bu vakada en kötü senaryo gerçekleşti: [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] ciddi şekilde karşılık verdi ve ateşli silah kullanılmasına rağmen araştırmacılara ağır yaralar verdi. Talihsiz bir yardımcı devasa yaratık tarafından paramparça edildi ve sürüklendi. Cesedi tekrar bulmak imkânsızdı."
 curtiss.541.g: "Kahrolası."
