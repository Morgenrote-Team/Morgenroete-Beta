 curtiss.40.d: "Tamamen yalnız ve kendi başına, genç pilot [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName], New York ile Paris arasındaki rotayı duraksamadan tamamlayan ilk kişi oldu. Kimileri [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim] için 'uçan enayi' dese de, [SCOPE.sCharacter('curtiss_new_pilot_scope').GetSheHe] halk arasında büyük bir coşku dalgası uyandırdı ve ulusal bir kahraman olarak kutlandı."
 curtiss.40.f: "Muhteşem bir uçuşun ardından, daha önce tanınmayan pilot [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName], havacılık sanatında olağanüstü bir başarıya imza attı. [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHis] başarısını duyan kalabalıklar, [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim] coşkuyla karşıladı. 33,5 saatlik uçuş boyunca [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] birçok zorlukla karşılaştı; bunlar arasında 10.000 ft (3.000 m) yükseklikte fırtına bulutlarının üzerinden, 10 ft (3 m) kadar alçaktan dalga tepelerinin üzerinden uçmak da vardı. Uçak buzlanmayla mücadele etti, saatlerce sisin içinde kör uçuş gerçekleştirdi ve [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] yalnızca tahmini seyirle yön buldu ([SCOPE.sCharacter('curtiss_new_pilot_scope').GetSheHe] güneş ve yıldızlarla yön bulma konusunda yetkin değildi ve radyo seyrüsefer cihazlarını ağır ve güvenilmez oldukları gerekçesiyle reddetti). Atlantik üzerindeki rüzgarların birbirini nötrlemesi [SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim] için büyük bir şanstı, çünkü sıfır rüzgar kayması sayesinde uzun ve özelliksiz okyanus uçuşunda doğru seyrüsefer yapabildi. Bu başarı, hem ticari havacılıkta hem de hava postasında büyük küresel ilgiyi tetikleyecek ve havacılık endüstrisini dünya çapında devrim niteliğinde dönüştürecek."
 curtiss.42.t: "[SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]'in Uçuşu"
 curtiss.42.d: "Karizmatik genç pilot [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName]'in transatlantik uçuşuyla, halkımız ateşlendi ve havacılığa dair daha önce bilinmeyen bir tutku keşfetti. Şimdiden [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] çılgınlığından bahsediliyor."
 curtiss.314.t: "Bir Uçan As"
 curtiss.314.d: "Sayısız havacılık başarısından dolayı [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] artık gökyüzünün tartışmasız efendisi kabul ediliyor: [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetSheHe], uçan bir as sayılıyor!"
