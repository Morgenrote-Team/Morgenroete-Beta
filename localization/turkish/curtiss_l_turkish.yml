 curtiss_arctica_expedition_decision: "Zeplin Kuzey Kutbu Seferi"
 curtiss_arctica_expedition_decision_desc: "Aeroarctic, yani 'Hava Gemisiyle Kuzey Kutbu’nu Keşif için Uluslararası Çalışma Derneği', kutup araştırmalarında zeplinleri kullanmayı amaç edinmiş hükümet dışı bir bilimsel birlikti. Başlıca girişimcisi baloncu ve daha sonra derneğin genel sekreteri olan Walther Bruns’tu. 1924’te kurucu başkan Fridtjof Nansen oldu. Birkaç yıllık hazırlığın ardından şirket, 1931’de ilk kez tamamen bilimsel bir kutup seferinde zeplin kullanmayı başardı. LZ 127 Graf Zeppelin’in Kuzey Kutbu uçuşu sayesinde uçulan bölgelerin coğrafi bilgisi önemli ölçüde genişletildi. Daha 1926’da Umberto Nobile, 'Norge' zepliniyle Kuzey Kutbu üzerinden uçmuş ve daha sonra 'Italia' ile bir sefer daha yapmıştı."
 curtiss_hold_schneider_trophy_race_decision: "Sonraki Schneider Kupası yarışına ev sahipliği yap"
 curtiss_hold_schneider_trophy_race_decision_desc: "Son yarışı kazanan olarak, ertesi yıl yarışa ev sahipliği yapma onuruna sahibiz. Eğer üç yarışı üst üste kazanırsak, efsanevi Schneider Kupası sonsuza kadar bizim olur."
