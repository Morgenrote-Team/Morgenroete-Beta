 curtiss_air_war_doctrin_tech: "Air War Doctrine"
 curtiss_air_war_doctrin_tech_desc: "The phrase 'The bomber always gets through!' is attributed to Italian General Giulio Douhet. Stanley Baldwin uttered it before the British Parliament in 1932. The phrase expresses Douhet's groundbreaking views on modern air warfare. As a pioneer of strategic bombing, he had a major influence, particularly on air warfare theory in Great Britain and the United States."
 curtiss_airlines_tech: "Airlines"
 curtiss_airlines_tech_desc: "DELAG, Deutsche Luftschiffahrts-Aktiengesellschaft, was the world's first passenger and commercial airline. It was founded in 1909 and began services in June 1910 providing regular passenger air service. DELAG operated airships manufactured by the Zeppelin Company."
 curtiss.681.t: "Gordon Bennett Cup"
 curtiss.681.d: "Preparations for the first major international balloon race are in full swing. Balloonists from all over the world are gathering in [ROOT.GetCountry.GetCapital.GetCityHubName] to test their strength in the long-distance competition. The event is already considered legendary and will find its continuation in the coming years."
 curtiss.681.f: "'At no previous flight, have I received so many good wishes when I left, with me on my way, and never before I have I made so many preparations as for this flight for the Gordon-Bennett-Cup 1907. Soon after the race from Paris in September 1906 was over, the wish raised in me, to take part in this years flight. I say thanks to the Deutschen Luftschiffer-Verband, for their selecting me as its representative, as well as to Baron von Hewald and Hauptmann Hildebrandt, who placed their big balloon POMMERN at my disposal. So they made the victory this year possible for me.\n\nDuring this flight, I received the best impression of North-America concerning flying balloon and hospitality. I only regret, that this country was not even bigger, to allow me, to fly my balloon to its full range and breaking the world-record for distance.' -Oscar Erbslöh"
 curtiss.681.g: "Wonderful!"
 notification_curtiss_gordon_bennett_cup_notification_name: "[GetPlayer.MakeScope.Var('curtiss_balloonist_var').GetCharacter.GetFullName] wins the Gordon Bennett Cup"
 notification_curtiss_gordon_bennett_cup_notification_desc: "Our balloonist won the legendary Gordon Bennett Cup and gained #G 25#! [concept_academics_experience]. The next cup will take place in our country in two years."
 curtiss_gordon_bennett_cup_modifier: "Gordon Bennett Cup"