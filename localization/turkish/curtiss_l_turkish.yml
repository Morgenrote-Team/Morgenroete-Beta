 curtiss.140.t: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastNameNoFormatting] uçağımız için yeni bir motor icat etti"
 curtiss.140.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], our [concept_tesla_aeronautical_engineer] has invented a new engine for our airplane. This will surely boost our chances of winning the Trophy."
 curtiss.140.f: "Bu yeni motor harika! Daha önce böyle bir şey deneyimlemedim. O kadar hızlı ki! Bu muhteşem motor için Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastNameNoFormatting]’e teşekkür etmek istiyorum!"
