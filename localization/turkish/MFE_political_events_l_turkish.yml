 MFE_political_events.1.t:0 "Gazetede Anonim Makaleler"
 MFE_political_events.1.d:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetName] üyeleri, mevcut siyasi ortamdan cesaret alarak, gazetelerde hükümete karşı karalayıcı yazılar yayımlıyor."
 MFE_political_events.1.f:0 "\"Günümüzde halkın bir [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'e ne faydası var? Biz, [ROOT.GetCountry.GetName]'yi, nihayet tiranların etkisinden kurtulmuş daha cesur bir gelecek olarak görüyoruz.\""
 MFE_political_events.1.a:0 "Bastırın – bu suçlamalar saçma!"
 MFE_political_events.1.b:0 "Yayınların serbestçe akmasına izin ver"
 MFE_political_events.2.t:0 "Yerel Seçimde Taciz"
 MFE_political_events.2.d:0 "[ROOT.GetCountry.GetCapital.GetName]'da siyasi gerilimler artıyor ve parti gazetelerinin yerel ofislerine saldırılar gerçekleşiyor."
 MFE_political_events.2.f:0 "\"Hepsini gördüm, [SCOPE.sParty('harassing_party').GetName] adamları, levye ve baltalarla - [SCOPE.sParty('harassed_party').GetName] matbaalarını parçalayacaklarını ve yoluna çıkan herkesi döveceklerini söylediler.\""
 MFE_political_events.2.a:0 "[SCOPE.sParty('harassed_party').GetName]'yi savun"
 MFE_political_events.2.b:0 "[SCOPE.sParty('harassing_party').GetName] çetelerini kınayın"
 MFE_political_events.3.t:0 "Oy Hilesi"
 MFE_political_events.3.d:0 "[ROOT.GetCountry.GetCapital.GetName]'daki seçim sonuçları, muhalefetin oy satın alma ve oy doldurma suçlamaları ile gölgelenmiş durumda."
 MFE_political_events.3.f:0 "\"Bugün seni kaç kez gördüm genç adam? Zaten burada olduğunu sanmıştım...\""
 MFE_political_events.3.a:0 "[SCOPE.sParty('party_1').GetName] açıkça bu oyları uydurdu..."
 MFE_political_events.3.b:0 "[SCOPE.sParty('party_2').GetName] bu konularda güvenilir değil..."
 MFE_political_events.4.t:0 "İşçi Komitesi"
 MFE_political_events.4.d:0 "[SCOPE.sState('workers_state').GetName]'deki [SCOPE.gsInterestGroup('ig_tradeunions').GetName] ile ilişkili işçiler bir Komite kurdu ve işyerinde daha fazla hak talep ediyor."
 MFE_political_events.4.f:0 "\"Fabrikadaki on iki saatlik vardiyalar insanlık dışı, insana hakaret niteliğinde; İşçi, başka bir yol mümkün olduğunu söylüyorum.\""
 MFE_political_events.4.a:0 "Şimdilik toplanmalarına izin verelim"
 MFE_political_events.4.b:0 "Bu kabul edilemez! Bu toplantılar devam edemez."
 MFE_political_events.5.t:0 "Yerel Yönetim Çatışması"
 MFE_political_events.5.d:0 "Bir vilayetimizdeki Değirmen İşçileri sendikası, işçilerini dövdüğü iddia edilen fabrika müdürüne karşı protesto gösterileri düzenliyor. Müdürü görevden alabiliriz ama fabrika sahibi onun iyi iş çıkardığını savunuyor."
 MFE_political_events.5.f:0 "Bu yüzden onu görevden almalıyız. Sadece almak değil, tamamen almak. Anladınız mı? Artık onu istemiyoruz. Kötü haber."
 MFE_political_events.5.a:0 "Bu konuda bir şey yapılamaz..."
 MFE_political_events.5.b:0 "Hemen müdahale etmeliyiz"
 MFE_political_events.6.t:0 "Halk Toplantısı Düzenlendi"
 MFE_political_events.6.d:0 "Komşu başkentlerdeki örnekleri takiben, [ROOT.GetCountry.GetCapital.GetName]'deki [SCOPE.gsInterestGroup('ig_trade_unions').GetName] halk toplantıları düzenlemeye başladı."
 MFE_political_events.6.f:0 "\"Bir kişinin gücü hiçbir şeydir, ama sayılarımızı birleştirirsek... [ROOT.GetCountry.GetName]'nin tamamı bizi dinlemek zorunda kalacak.\""
 MFE_political_events.6.a:0 "Bu toplantılar zararsız... devam etmelerine izin ver"
 MFE_political_events.6.b:0 "Bu etkinliği engellemek için elimizden geleni yap"
 MFE_political_events.7.t:0 "İşhanına Saldırı"
 MFE_political_events.7.d:0 "[SCOPE.sState('attacked_state').GetName]'deki gösteriler kontrolden çıktı ve sokaklarda şiddet yaşandı."
 MFE_political_events.7.f:0 "\"Çelik fabrikasındaki o lanet kalabalık fabrikamızın önünde toplandı ve polis gelmeden önce, ne olduğunu biliyorsunuz...\""
 MFE_political_events.7.a:0 "Demokrasi doğası gereği karmaşıktır"
 MFE_political_events.7.b:0 "Elimizden gelen yardımı yap"
 MFE_political_events.8.t:0 "İşhanı Grevi"
 MFE_political_events.8.d:0 "Ödenmeyen maaşlar ve [ROOT.GetCountry.GetCapital.GetName]'daki ekmek sıkıntısı, işçi grevine yol açtı."
 MFE_political_events.8.f:0 "\"Gün doğumundan gün batımına çalışıp maaşlarımızı alamayıp aç kalmamız mı bekleniyor? Bariyerlere, Yoldaş!\""
 MFE_political_events.8.a:0 "Polisi gönder!"
 MFE_political_events.8.b:0 "Bu büyük bir sorun değil..."
 MFE_political_events.9.t:0 "Profesör Oy Sistemini Eleştiriyor"
 MFE_political_events.9.d:0 "[SCOPE.sCharacter('professor').GetFullName], [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] tarafından takdir edilen bir üniversite profesörü, [ROOT.GetCountry.GetName]'nin seçimlerini bir dizi halka açık konferansta eleştiriyor."
 MFE_political_events.9.f:0 "\"Artık dikkatinizi bu ayrıntılara çekiyorum; daha fazla inceleme sonrası, [ROOT.GetCountry.GetRuler.GetFullName] altında mevcut sistemin sürdürülemez olduğu ortaya çıkacaktır.\""
 MFE_political_events.9.a:0 "Bunlar geçerli argümanlar..."
 MFE_political_events.9.b:0 "[SCOPE.sCharacter('professor').GetFullName]'a halka konuşmayı bırakmasını söyle"
 MFE_political_events.10.t:0 "Ticaret Politikası Müzakereleri"
 MFE_political_events.10.d:0 "[ROOT.GetCountry.GetCapital.GetName]'de uzun tartışmaların ardından ticaret politikası müzakerelerinde nihayet bir ilerleme sağlandı."
 MFE_political_events.10.f:0 "\"İyi bir uzlaşma, her iki tarafı da tatmin etmez, derler. Neyse ki mevcut anlaşmalardan herkes kazanıyor - gerçek bir diplomatik ustalık gösterisi.\""
 MFE_political_events.10.a:0 "Bu, [SCOPE.gsInterestGroup('ig_industrialists').GetName] sayesinde oldu"
 MFE_political_events.10.b:0 "[ROOT.GetCountry.GetRuler.GetFullName] tek başına bunu başardı!"
 MFE_political_events.11.t:0 "Ekmek Ayaklanmaları"
 MFE_political_events.11.d:0 "Yurtdışındaki tahıl sıkıntıları, [SCOPE.sState('bread_riot_state').GetName]'da ekmek fiyatlarının fırlamasına neden oldu."
 MFE_political_events.11.f:0 "\"Eskiden bir yarım paraya üç somun ekmek alabilirdiniz, ama şimdi? Açık fırın bulmak bile şans işi.\""
 MFE_political_events.11.a:0 "Devlet açlıklarını gidermeye çalışacak"
 MFE_political_events.11.b:0 "Ekmek istiyorlarsa, satın alabilirler!"
 MFE_political_events.12.t:0 "Çiftliklerde Zor Günler"
 MFE_political_events.12.d:0 "[SCOPE.sState('bread_queue_state').GetName]'daki kuraklık, yerel çiftçileri zor duruma sokuyor ve [ROOT.GetCountry.GetName]’de bir kriz yaratıyor."
 MFE_political_events.12.f:0 "\"Yağmur mu? [SCOPE.sState('bread_queue_state').GetName]'de aylarca görmedik. Ekim sezonu çok zor geçti... her şeyi kaybedeceğiz.\""
 MFE_political_events.12.a:0 "Hemen yardım gönder"
 MFE_political_events.12.b:0 "Ne yapacaklarını kendileri bulur"
 MFE_political_events.13.t:0 "Silahlar Sınırı Aşıyor"
 MFE_political_events.13.d:0 "Dürüst olmayan tüccarların [SCOPE.sState('neighbor_neighbor_state').GetName]'yi silahlarla doldurduğu ve şiddet olasılığını artırdığı rapor ediliyor."
 MFE_political_events.13.f:0 "\"[SCOPE.sState('neighbor_neighbor_state').GetName] şu anda bir barut fıçısı gibi ve tek bir kıvılcım tüm ülkeyi ateşe verebilir.\""
 MFE_political_events.13.a:0 "Serbest piyasada yapılacak fazla bir şey yok..."
 MFE_political_events.13.b:0 "Bunu hemen durdurmalarını talep et!"
 MFE_political_events.14.t:0 "Yerel İşletme Battı"
 MFE_political_events.14.d:0 "[SCOPE.sState('failing_building').GetName]'deki bir sanayi kazası uluslararası manşetlerde; bir fabrikadaki patlamada otuz iki işçi öldü."
 MFE_political_events.14.f:0 "\"Kazanın olacağını nasıl bilebilirdik? [SCOPE.gsInterestGroup('ig_trade_unions').GetName] unutun - işlerin yeniden çalışması aylar alacak!\""
 MFE_political_events.14.a:0 "Devlet yöneticilerine para gönder"
 MFE_political_events.14.b:0 "Halkı desteklemeliyiz"
 MFE_political_events.15.t:0 "Seferberlik Kampanyası"
 MFE_political_events.15.d:0 "[SCOPE.sState('conscription_state').GetName]'da patlayan milliyetçi coşku, rekor sayıda gönüllü asker kazandırdı."
 MFE_political_events.15.f:0 "\"Çocuklara biraz zafer tadı vermekte ne sakınca var - Noel’e kadar evde olurlar zaten.\""
 MFE_political_events.15.a:0 "Seferberlik kampanyasına devam et"
 MFE_political_events.15.b:0 "Fazladan askere ihtiyacımız yok"
 MFE_political_events.16.t:0 "Laik Politikalar"
 MFE_political_events.16.d:0 "Bir dini figür olan [SCOPE.sCharacter('ig_leader').GetFullName], [ROOT.GetCountry.GetName] hükümetinin toplumun en fakir kesimlerine daha fazla destek vermesi gerektiğini açıkladı."
 MFE_political_events.16.f:0 "\"[ROOT.GetCountry.GetRuler.GetFullName], [ROOT.GetCountry.GetCapital.GetName]'de lüks içinde yaşarken, yoksulluğun acısını nasıl anlayabilir? Liderliğimiz kopuk durumda.\""
 MFE_political_events.16.a:0 "Kilise'yi sessiz kalmaya 'ikna et'"
 MFE_political_events.16.b:0 "Politikalarımıza güvenleri mi yok?!"
 MFE_political_events.17.t:0 "Korumacı Lobi"
 MFE_political_events.17.d:0 "Korumacı Lobi ile bağlantılı politik unsurlar, [ROOT.GetCountry.GetName] genelinde tartışmalara yol açan cesur reform önerileri sundular."
 MFE_political_events.17.f:0 "\"İvme bizimle, dostlar - demir sıcakken vurmalı ve halkın hayal gücünü yakalamalıyız!\""
 MFE_political_events.17.a:0 "Belki daha fazla kısıtlama uygulayabiliriz..."
 MFE_political_events.17.b:0 "Kim olduklarını sanıyorlar..."
 MFE_political_events.18.t:0 "Serbest Ticaret ve İptal Derneği"
 MFE_political_events.18.d:0 "\"Serbest Ticaret ve İptal Derneği\" adını kullanan bir grup kışkırtıcı, [ROOT.GetCountry.GetCapital.GetName]'de faaliyete geçti ve ateşli broşürler yayımlıyor."
 MFE_political_events.18.f:0 "\"Artık insan yapımı sınırlar yıkılmalı ve ticaret ülkeler arasında serbestçe akmalı. Denetimi kaldırın ve sıradan insan kazanacak!\""
 MFE_political_events.18.a:0 "Serbest Ticaret iyi bir fikir olabilir..."
 MFE_political_events.18.b:0 "[SCOPE.sParty('liberal_party').GetName] politikamızı dikte edemez!"
 MFE_political_events.19.t:0 "Serbest Ticaret ve Ahlak"
 MFE_political_events.19.d:0 "[ROOT.GetCountry.GetCapital.GetName]'daki bir gazetenin editörleri, serbest ticaretle ilgili bir dizi makale yayımladı ve köylülerin tepkisini çekti."
 MFE_political_events.19.f:0 "\"Neden biz, sıradan insanlar, her şeyden ağır vergiler ödemeye zorlanıyoruz? Mevcut rejim altında yeterince acı çekmedik mi? Serbest ticareti benimsemek ahlaki bir zorunluluktur.\""
 MFE_political_events.19.a:0 "Serbest Ticaret geleceğin yolu"
 MFE_political_events.19.b:0 "Şu an değişen bir şey olmayacak"
 MFE_political_events.20.t:0 "Sendika Reformu"
 MFE_political_events.20.d:0 "[SCOPE.gsInterestGroup('ig_trade_unions').GetName] temsilcileri kapsamlı reformlar öneriyor."
 MFE_political_events.20.f:0 "[SCOPE.sCharacter('trade_leader').GetFullName], iş bağlantılarına sahip bir yasama üyesi, işlerini destekleyecek bir reform paketini yürürlüğe sokmak için siyasi etkisini kullanıyor."
 MFE_political_events.20.a:0 "Bu teklif kabul edilemez"
 MFE_political_events.20.b:0 "Şimdilik onları yatıştıracağız..."
 MFE_political_events.21.t:0 "Sansür Bürosu Fazla Mesai Yapıyor"
 MFE_political_events.21.d:0 "Sansür Bürosu, bütçelerinin artırılması için [ROOT.GetCountry.GetRuler.GetFullName]'a yazdı."
 MFE_political_events.21.f:0 "\"Her sabah, binlerce belge geliyor - gazeteler, broşürler, siyasi yazılar, özel yazışmalar - hepsi okunmak zorunda ve şu anda yeterli personelimiz yok.\""
 MFE_political_events.21.a:0 "Peki... halkı sansürlemeliyiz"
 MFE_political_events.21.b:0 "Onlara mevcut kaynaklarla yapabileceklerini söyleyin"
 MFE_political_events.22.t:0 "Serbest Piyasa Eleştiriliyor"
 MFE_political_events.22.d:0 "Ticaretle ilgili tartışmalar halkımızı meşgul ediyor; herkes bir taraf tutmuş gibi görünüyor."
 MFE_political_events.22.f:0 "\"Hükümetimiz, halkından çok [SCOPE.gsInterestGroup('ig_industrialists').GetName]'i önemsiyor! Böyle acımasız bir piyasada nasıl hayatta kalacağız?\""
 MFE_political_events.22.a:0 "Serbest Piyasa tek çıkış yolu!"
 MFE_political_events.22.b:0 "Eskisi gibi değil... uyum sağlamalıyız"
 MFE_political_events.23.t:0 "Kölelik Karşıtı Konvansiyon"
 MFE_political_events.23.d:0 "#Y Kölelik#!, [ROOT.GetCountry.GetName]'de kutuplaştırıcı bir konu; giderek daha çok ses eleştiriyor, ancak yerleşik çıkarlar durumu değiştirmeye direniyor."
 MFE_political_events.23.f:0 "\"Bu karmaşık bir konu ve şimdilik dokunulmaması en iyisi. Örneğin köle sahiplerinin kaybı kim tarafından karşılanacak? Hatta bunu tartışacak durumda bile değiliz.\""
 MFE_political_events.23.a:0 "Çok bir şey yapamayız"
 MFE_political_events.23.b:0 "Evet, kölelik gerçekten kötü"
 MFE_political_events.24.t:0 "Kadınlar İçin Eğitim"
 MFE_political_events.24.d:0 "[ROOT.GetCountry.GetCapital.GetName]'deki etkili sosyal kulüpler, özellikle akademik alanda kadın haklarının genişletilmesini talep ediyor."
 MFE_political_events.24.f:0 "\"Neden kızlarımız eğitimden mahrum bırakılıyor? [ROOT.GetCountry.GetName]'in toplumu için katkıda bulunmuyorlar mı?\""
 MFE_political_events.24.a:0 "Eğitim temel bir haktır!"
 MFE_political_events.24.b:0 "Kademeli değişim ilerlemek için daha güvenli bir yol."
 MFE_political_events.25.t:0 "Açlık Grevi"
 MFE_political_events.25.d:0 "[ROOT.GetCountry.GetCapital.GetName]'de büyük bir açlık grevi yaşanıyor, işçilere [SCOPE.gsInterestGroup('ig_industrialists').GetName] destek veriyor."
 MFE_political_events.25.f:0 "\"Twelve saatlik vardiyalarda yemek molası vermeden çalışmamız mı bekleniyor? Patronlarımız saat başında beslenmemizi engellemeye devam ederse, bu politika değişene kadar yemeyi reddediyoruz!\""
 MFE_political_events.25.a:0 "Mantıklı noktalar var... öğle yemeği önemli sonuçta."
 MFE_political_events.25.b:0 "Bu kışkırtıcıları tutuklayın."
 MFE_political_events.26.t:0 "Yerel Şair"
 MFE_political_events.26.f:0 "\"Ve şimdi, 'Genç Werther'in Neşeli Coşkusu'ndan bir okuma... ahem.\n\nEy altın saçlı genç kız / Aydınlat beni; o çorapları nereden aldın?/Çünkü çıplak ayaklarım üşüyor; sert taş parçaları / Kemiklerime üşüme tehdidi yapıyor.\""
 MFE_political_events.26.a:0 "Onu öğrencilerimize ders vermesi için işe alalım"
 MFE_political_events.26.b:0 "Pratik konulara odaklanalım, 'sanat'a değil"
 MFE_political_events.27.t:0 "Yeraltı Gazetesi"
 MFE_political_events.27.d:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]'den bazı anonim kişiler, [ROOT.GetCountry.GetRuler.GetFullName]'i hicveden gazeteler yayımlıyor."
 MFE_political_events.27.f:0 "\"Altıncı sayfada, çıplak [ROOT.GetCountry.GetRuler.GetFirstName]'in bir domuz yalığından içtiği bir karikatür var, alt yazı: 'Hımm! Sanayicilerin verdiği her yemeği yerim!'\""
 MFE_political_events.27.a:0 "İnanılmaz pislik! Hemen bastırın"
 MFE_political_events.27.b:0 "Yayınların serbestçe akmasına izin ver"
 MFE_political_events.28.t:0 "Asiller Köylüleri Kışkırtıyor"
 MFE_political_events.28.d:0 "Ülkemizdeki [SCOPE.sCulture('discriminated_culture').GetName] halkından şikayetler alıyoruz; soyluların onları taciz ettiğini iddia ediyorlar."
 MFE_political_events.28.f:0 "Üst sınıflar arasında yaygın bir görüş: \"[SCOPE.sCulture('discriminated_culture').GetName] insanları [ROOT.GetCountry.GetName]'de sadece lağım kazmak ve eşek sürmek için uygun, çünkü kanalizasyon gibi kokuyorlar ve ahırlarda uyuyorlar\"."
 MFE_political_events.28.a:0 "Aslında bu oldukça komik"
 MFE_political_events.28.b:0 "Hakaret yeter! [SCOPE.sCulture('discriminated_culture').GetName] Halkının yanında yer al"
 MFE_political_events.29.t:0 "Yerel Tüccarlar Öfkeli"
 MFE_political_events.29.d:0 "[ROOT.GetCountry.GetCapital.GetName]'de ucuz ithal malların akışı, yerel tüccarları öfkelendiriyor; işlerinden edilmiş olduklarını iddia ediyorlar."
 MFE_political_events.29.f:0 "\"Buna bir çözüm bulunmazsa, siyasi reformlar için harekete geçmek zorunda kalacağız - dürüst bir işadamı bu günlerde nasıl ilerleyebilir?\""
 MFE_political_events.29.a:0 "Serbest Ticareti destekleyin!"
 MFE_political_events.29.b:0 "Pazarımız tüm avantajları elde etmeli!"
 MFE_political_events.26.d: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName], bir şiir yazarı, son koleksiyonunu tanıtmak için [ROOT.GetCountry.GetCapital.GetName]'e bir konferans turu için geldi."
 MFE_political_events.26.g: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetSheHe|U] belki de iyi bir yetenek olabilir."