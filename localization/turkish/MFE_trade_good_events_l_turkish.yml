l_turkish:
 MFE_trade_good_events.1.t: "Mermiler İçin [SCOPE.sW('active_war').GetName]"
 MFE_trade_good_events.1.d: "[SCOPE.sC('munitions_state').GetName]’deki cephane fabrikalarının yakın zamanda yükseltildiğine dair haberler aldık."
 MFE_trade_good_events.1.f: "'[SCOPE.sC('munitions_state').GetAdjective] basını bu etkileyici başarıyı övüyor ve haksız değiller.'"
 MFE_trade_good_events.1.a: "Savaş için tam zamanında"
 MFE_trade_good_events.2.t: "Cephane İçin Yalvarmak"
 MFE_trade_good_events.2.d: "[SCOPE.sC('ally').GetName]’in katıldığı [SCOPE.sW('active_war').GetName], cephane stoklarının yetersiz olduğunu ortaya çıkardı ve bize cephane vermemiz için yalvarıyorlar."
 MFE_trade_good_events.2.f: "'Fiyatını söyle [ROOT.GetCountry.GetName], ve bu savaşı kazandıktan sonra senin olacak.'"
 MFE_trade_good_events.2.a: "Biraz mermiyi verebiliriz"
 MFE_trade_good_events.2.b: "Mermilerimiz olmadan düşmanımızı nasıl vuracağız?!"
 MFE_trade_good_events.3.t: "[SCOPE.sC('ally').GetName] Gizli Bir Talepte Bulunuyor"
 MFE_trade_good_events.3.d: "[SCOPE.sW('active_war').GetName], [SCOPE.sC('ally').GetName]’i hazırlıksız yakalamış görünüyor; malzemeleri, özellikle cephaneleri azalıyor. Diplomatik temsilcilerini gizlice bize gönderdiler ve topçu yardımı yaparsak çeşitli sözler veriyorlar."
 MFE_trade_good_events.3.f: "'İnan bana - [SCOPE.sC('ally').GetName] bu savaşı kazanabilir, ama biraz yardıma ihtiyacımız olacak! En çaresiz anımızda bizi yalnız bırakmayın!'"
 MFE_trade_good_events.3.a: "Biraz topçu verebiliriz"
 MFE_trade_good_events.3.b: "Kendi stoklarımız çok düşük, maalesef"
 MFE_trade_good_events.4.t: "Güvenlik İhlali"
 MFE_trade_good_events.4.d: "Casus ajanslarımızdan gelen haberlere göre [SCOPE.sS('arms_state').GetName] askeri fabrikalarında bir tür sızıntı yaşamış ve büyük miktarda patlayıcı malzeme kaybolmuş."
 MFE_trade_good_events.4.f: "Böyle bir şeyin olmasına nasıl izin verebilirlerdi?"
 MFE_trade_good_events.4.a: "Umarız yanlış ellere geçmemiştir..."
 MFE_trade_good_events.5.t: "[SCOPE.sS('arable_state').GetName]'de Bereketli Hasat"
 MFE_trade_good_events.5.d: "[SCOPE.sS('arable_state').GetName]'deki yağmurların çiftliklerde harikalar yarattığına dair haberler almaya devam ediyoruz; bölgedeki tarım ürünleri beklenenden çok daha fazla verim verdi."
 MFE_trade_good_events.5.f: "'Bu yılki hasatlar o kadar iyi ki bu sezon daha fazla işçi kiralamamız gerekecek, ama neyse ki bunu karşılayabiliriz.'"
 MFE_trade_good_events.5.a: "Daha iyi bir zaman olamazdı"
 MFE_trade_good_events.6.t: "Tank Fabrikasında Deli"
 MFE_trade_good_events.6.d: "[SCOPE.sS('tank_state').GetName]’den gelen yerel gazeteler korkunç başlıklarla dolu - bir deli bir şekilde bir tankı ele geçirdi ve tüm bir köyü yok ederek onlarca masum insanı öldürdü, polis durdurana kadar devam etti."
 MFE_trade_good_events.6.f: "'Kimse bu anlamsız trajedinin neden gerçekleştiğini bilmiyor ve asla öğrenemeyeceğiz.'"
 MFE_trade_good_events.6.a: "Onlarla birlikte üzülüyoruz ama yardım edemeyiz"
 MFE_trade_good_events.6.b: "İhtiyaçları olan her şeyi verelim - bu gerçekten korkunç..."
 MFE_trade_good_events.7.t: "[SCOPE.sS('plane_state').GetName]'de Yatırımlar Hızlanıyor"
 MFE_trade_good_events.7.d: "Havacılık yatırımcıları [SCOPE.sS('plane_state').GetName]'e akın ediyor, yerel fabrikalarla kendi sözleşmelerini güvence altına almak için birbirleriyle rekabet ediyor."
 MFE_trade_good_events.7.f: "'Böyle bir şeyi daha önce hiç görmedik - sanayiciler, işin pie’sinden pay almak için telaş içinde.'"
 MFE_trade_good_events.7.a: "[SCOPE.GetRootScope.GetCountry.GetName]’de yaşamak için harika bir zaman"
 MFE_trade_good_events.8.t: "Kötü İşçilik"
 MFE_trade_good_events.8.d: "[SCOPE.sS('ironclad_state').GetName] ihraç ettikleri gemilerde kötü işçilikle hızla ün kazanıyor."
 MFE_trade_good_events.8.f: "'Bu gemiler bir aydan fazla suya girmemiş ve zaten tamamen paslanmış? Bu, kalitesiz demirden daha fazlasını söylüyor.'"
 MFE_trade_good_events.8.a: "Umarız malzemeleri düzelir"
 MFE_trade_good_events.9.t: "Kıymetsiz Bir İş"
 MFE_trade_good_events.9.d: "[SCOPE.sS('grain_state').GetName]'deki tahıl kıtlığı sosyal sorunlara yol açıyor, radikal entelektüeller bu fırsatı [SCOPE.GetRootScope.GetCountry.GetName]'in kriz yönetimini eleştirmek için kullanıyor."
 MFE_trade_good_events.9.f: "'Vatandaşlarını besleyemeyen bir hükümete halk asla yetki vermemeli.'"
 MFE_trade_good_events.9.a: "Ama yiyecek yemek için gerçekten ihtiyacı var mı?"
 MFE_trade_good_events.9.b: "[SCOPE.sS('grain_state').GetName]'e biraz fon aktar"
 MFE_trade_good_events.9.c: "[SCOPE.sS('grain_state').GetName]’de dükkanlarda hâlâ bolca pasta var"
 MFE_trade_good_events.10.t: "Kokulu Karides ve Turna Balığı"
 MFE_trade_good_events.10.d: "Son zamanlarda [SCOPE.sS('fish_state').GetName]'den gelen balıkçılık tekneleri kötü kokulu ürünler getiriyor; tüm deniz ürünleri yağlı, çürüyen balık tadında."
 MFE_trade_good_events.10.f: "'Uf, bunu koklayabiliyor musun? Tabii ki; binaya girer girmez gitmek istiyorsun. Sokak kedileri bile bunu istemiyor.'"
 MFE_trade_good_events.10.a: "Balık nasıl fazla balıklı olabilir ki?"
 MFE_trade_good_events.11.t: "[SCOPE.sS('ship_state').GetName] Tersaneleri"
 MFE_trade_good_events.11.d: "[SCOPE.sS('ship_state').GetName] liman amiri, orada inşa edilen savaş gemilerinin tamamlandığını bildiriyor."
 MFE_trade_good_events.11.f: "'Umarım yanında bir şampanya getirdin; savaş gemisi suya indirildiğinde vaftiz töreni yapmak adettendir.'"
 MFE_trade_good_events.11.a: "Harika haber! Ve planlanandan önce"
 MFE_trade_good_events.11.b: "O zaman daha fazla şampanya lazım!"
 MFE_trade_good_events.12.t: "[SCOPE.sS('fabric_state').GetName] Tekstilleri"
 MFE_trade_good_events.12.d: "[SCOPE.sS('fabric_state').GetName]’de üretilen kumaşlar, mükemmel işçilikleriyle uluslararası ün kazanmaya başladı."
 MFE_trade_good_events.12.f: "'Güneşte kumaşın renginin nasıl değiştiğine bak; sence bu Mısır pamuğu mu?'"
 MFE_trade_good_events.12.a: "Sanayilerin geliştiğini duymak her zaman sevindirici"
 MFE_trade_good_events.12.b: "Bu Haute Couture!"
 MFE_trade_good_events.13.t: "Tomruk Fabrikalarında Yangın"
 MFE_trade_good_events.13.d: "[SCOPE.sS('sawmill_fire_state').GetName]’deki gazeteler, şehrin büyük bir kısmını yakan korkunç bir yangını bildiriyor."
 MFE_trade_good_events.13.f: "'Kasabanın dışında bir yağlı bez yığını tutuştu ve çıkan yangın 139 kişinin ölümüne yol açtı.'"
 MFE_trade_good_events.13.a: "Ne felaket! Zavallı, zavallı insanlar"
 MFE_trade_good_events.13.b: "Hemen yardım gönderin!"
 MFE_trade_good_events.14.t: "[SCOPE.sS('hardwood_state').GetName]'in En İyi Ahşabı"
 MFE_trade_good_events.14.d: "[SCOPE.sS('hardwood_state').GetName] genelindeki mobilya üreticileri, yerel ormanlardan elde edilen sert ağacı kullanmalarıyla ünlüdür."
 MFE_trade_good_events.14.f: "'Ahşap dokusuna bak ve tahtaya vur... o sesi duyuyor musun? Bu sağlam, güçlü bir malzeme... yüz yıl dayanır.'"
 MFE_trade_good_events.14.a: "Bu iyi bir şey, değil mi?"
 MFE_trade_good_events.14.b: "Harika! Ahşaptan müzik aletleri yapalım!"
 MFE_trade_good_events.15.t: "[SCOPE.sS('grocery_state').GetName]'de Organize Suç"
 MFE_trade_good_events.15.d: "Aç kalan yerel çeteler, [SCOPE.sS('grocery_state').GetName]’de sebze ve şarküteri dükkanlarını soymak için iş birliği yapıyor."
 MFE_trade_good_events.15.f: "'Altı ay önce bir kilo rosto biftek bu kadar pahalı değildi, sıradan insanların başka ne seçeneği kaldı?'"
 MFE_trade_good_events.15.a: "Umarız polis bu meseleyi çözer"
 MFE_trade_good_events.15.b: "Zorla değil, yardım gönderelim!"
 MFE_trade_good_events.16.t: "Yıpranmış Bir Durum"
 MFE_trade_good_events.16.d: "Pamuk fiyatlarındaki artış, [SCOPE.sS('clothes_state').GetName]'de giysi fiyatlarının fırlamasına sebep oldu."
 MFE_trade_good_events.16.f: "'Evet, işler gerçekten kötüye gidiyor. Sokak çocuklarının un torbalarını tunik olarak giydiğini gördüm; inan bana, bunlar şanslı olanlar.'"
 MFE_trade_good_events.16.a: "Bu bir trajedi, ama kontrolümüz dışında..."
 MFE_trade_good_events.16.b: "Sanırım herkes için bir un torbası alabiliriz..."
 MFE_trade_good_events.17.t: "Showroom'da Bir Felaket"
 MFE_trade_good_events.17.d: "[SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName], [SCOPE.sS('furniture_state').GetName]’de bir mobilya fabrikasını ziyaret ettikten sonra bir sandalyeye otururken aniden yere yığıldı ve hayatını kaybetti."
 MFE_trade_good_events.17.f: "'[SCOPE.sS('furniture_state').GetName]'deki yoğun polis varlığı nedeniyle neler olduğunu anlamak zor, ama bu kesinlikle bir felaket.'"
 MFE_trade_good_events.17.a: "Bu talihsiz bir kaza mı, yoksa kötü niyetli bir şey mi oldu?"
 MFE_trade_good_events.17.b: "Hmm... Bir cinayet sandalyesi. Koleksiyonumuzda eksik."
 MFE_trade_good_events.18.t: "Dünyanın En İyi Kağıdı"
 MFE_trade_good_events.18.d: "[SCOPE.sS('paper_state').GetName]'deki kağıt üretimi herkesin beklentilerini aştı ve bölge güç merkezi olarak tanınmaya başlıyor."
 MFE_trade_good_events.18.f: "'Sadece yirmi yıl önce şehirde fabrika yoktu, şimdi ise her blokta bir tane var.'"
 MFE_trade_good_events.18.a: "Katlanabilir kağıt için fazlamızı satacağız, anladın mı?"
 MFE_trade_good_events.18.b: "Kağıt lütfen!"
 MFE_trade_good_events.19.t: "Yıldızları Kapat"
 MFE_trade_good_events.19.d: "[SCOPE.sS('power_state').GetName]'de elektrik kullanımının, özellikle sokak lambalarının artması, ışık kirliliğini artırdı."
 MFE_trade_good_events.19.f: "'Eskiden açık bir gecede kasaba meydanından Büyük Ayı’yı görebilirdin, şimdi gökyüzünü izlemek için köye gitmen gerekiyor.'"
 MFE_trade_good_events.19.a: "İlerleme yürüyüşünün beklenmedik sonuçları olabilir"
 MFE_trade_good_events.19.b: "Gece bazı ışıkları kapatın!"
 MFE_trade_good_events.20.t: "Patlayıcı Durum"
 MFE_trade_good_events.20.d: "[SCOPE.sS('sulfur_state').GetName]'deki kükürt madenlerindeki büyük bir patlama, iş sahasını yok etti ve yüzlerce işçinin ölümüne sebep oldu."
 MFE_trade_good_events.20.f: "'Normal bir gün gibi görünüyordu, ama sonra yer sallandı ve korkunç bir ses geldi...'"
 MFE_trade_good_events.20.a: "Yer altında sıkışan işçiler var mı? Bu korkunç"
 MFE_trade_good_events.20.b: "Kükürt nerede? Güvende mi? Her şey yolunda mı?"
 MFE_trade_good_events.21.t: "Kurşun Madeni İçinde Garip Manzaralar"
 MFE_trade_good_events.21.d: "[SCOPE.sS('lead_state').GetName]'deki kurşun madenlerinde bir kaza oldu; her şey kayboldu."
 MFE_trade_good_events.21.f: "'İşçiler hâlâ yer altında sıkışanları kurtarmaya çalışıyor, ama işler iyi görünmüyor...'"
 MFE_trade_good_events.21.a: "Bu trajik, anlamsız kaybı yas tutuyoruz"
 MFE_trade_good_events.21.b: "Burası bizim başlıca kurşun madeniydi!"
 MFE_trade_good_events.22.t: "Zararlı Kimyasallar Sızıyor"
 MFE_trade_good_events.22.d: "[SCOPE.sS('lead_state').GetName] yakınlarındaki kurşun madenleri, yerel içme suyunu kirletiyor."
 MFE_trade_good_events.22.f: "'Köylüler suyun böbrek hastalıklarına ve saç dökülmesine yol açtığını söylüyor ve [SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName]'den dayanışma göstergesi olarak yerel bir kuyu suyu içmesini istiyor.'"
 MFE_trade_good_events.22.a: "Bunu denemem! O suyu benden uzaklaştırın"
 MFE_trade_good_events.22.b: "Bundan daha iyi su hiç içmedim!"
 MFE_trade_good_events.23.t: "Yeni Bir Çağın Başlangıcı"
 MFE_trade_good_events.23.d: "'Kauçuk' olarak bilinen mucizevi madde, başkentten köylere kadar herkesin yaşamını değiştiriyor."
 MFE_trade_good_events.23.f: "'Abartı gibi gelebilir ama doğru söylemek gerekirse yeni bir çağa giriyoruz - bu harika madde neredeyse her şeye dönüştürülebilir!'"
 MFE_trade_good_events.23.a: "Bu malzemenin vaat ettiği teknolojik gelişmeleri memnuniyetle karşılıyoruz"
 MFE_trade_good_events.23.b: "Sadece daha fazla üretin!"
 MFE_trade_good_events.24.t: "[SCOPE.sS('oil_state').GetName]'in Kara Altını"
 MFE_trade_good_events.24.d: "[SCOPE.sS('oil_state').GetName]’de bulunan petrol, bir gecede milyonerlere yol açtı ve ulusal olarak madenciliğe ilgiyi artırdı."
 MFE_trade_good_events.24.f: "'Bu madde pek bir şey gibi görünmeyebilir, ama sana söylüyorum, ağırlığı kadar altına değer!'"
 MFE_trade_good_events.24.a: "Ağır sanayimiz mümkün olduğunca çok petrole ihtiyaç duyuyor, bu nedenle bu memnuniyet verici"
 MFE_trade_good_events.24.b: "Ben gerçek altını tercih ederim!"
 MFE_trade_good_events.25.t: "Çelik Fabrikaları Yerel Toplulukları Yok Ediyor"
 MFE_trade_good_events.25.d: "[SCOPE.sState('steel_state').GetName] halkı, şehirdeki çelik fabrikalarından dolayı geleneksel yaşam tarzlarını kaybettiklerini düşünüyor ve pişmanlık yaşıyor."
 MFE_trade_good_events.25.f: "'Başta sadece iş için minnettardık, ama on altı saatlik vardiyalar, haftada yedi gün... bu bir yaşam şekli mi?'"
 MFE_trade_good_events.25.a: "[ROOT.GetCountry.GetName]'in geleceği, güçlü bir çelik sanayisine sahip olmamızı gerektiriyor"
 MFE_trade_good_events.25.b: "En azından vardiyalarını azaltın..."