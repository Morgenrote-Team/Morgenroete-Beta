 agassiz_mid_atlantic_ridge_cost_modifier: "Atlantik Seferi Maliyeti"
 je_agassiz_mid_atlantic_ridge: "Sualtı Dağları"
 je_agassiz_mid_atlantic_ridge_reason: "[concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] şu anda, Atlas Okyanusu'nun yüzey altını taramak için bir eko sondaj cihazı kullanan modern bir araştırma gemisinde. Bu, dünyanın tarihi hakkında daha yeni içgörüler sağlamalı."
 je_agassiz_mid_atlantic_ridge_goal: "12 ay sonra, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'dan sonuçlar bekleniyor."
 agassiz.201.t: "Orta-Atlantik Sırtı"
 agassiz.201.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] ilk verilerin bir kısmını inceledi. Seferin sonucu şaşırtıcı: Sadece Atlas Okyanusu'nun kuzeyinde değil, tüm Atlas Okyanusu boyunca, denizaltı yükseltisi, sadece ekvator seviyesinde kırılan sürekli bir bant olarak görülebiliyor. Jeolog bu fenomene Orta-Atlantik Sırtı adını verdi. Verilerin daha fazla değerlendirilmesi önümüzdeki aylarda ve yıllarda gerçekleşecek."
 agassiz.201.f: "Orta-Atlantik Sırtı, çoğunlukla deniz seviyesinin altında yer alan ve yaklaşık 20.000 km uzanan Atlas Okyanusu'ndaki bir dağ sırasıdır. Bu onu, Dünya'yı saran ve 60.000 km'den uzun olan bir sistem olan okyanus ortası sırtlarının en uzunu yapar. Orta-Atlantik'teki deniz tabanı yükselmesi ilk olarak 1853'te deniz subayı Matthew Fontaine Maury tarafından tanımlandı ve 1872'de Challenger seferi ile doğrulandı. Bunun nedeni, ilk transatlantik derin deniz kablolarının döşenmesine yönelik ön araştırmalardı. 1925-1927 Alman Meteor Seferi sırasında, eko sondaj ölçümleri kullanılarak Orta-Atlantik Sırtı'nın detaylı bir profili oluşturuldu. Orta-Atlantik dağ sırasının keşfi, Wegener'in kıtasal sürüklenme teorisi ile ilgili levha tektoniğinin geodinamik süreçlerine dair erken bir ipucu sağladı."
 agassiz.201.g: "Bu, jeologun jeofiziksel anlayışını geliştirecek."
 agassiz.201.h: "Bu, jeologun oşinografik anlayışını geliştirecek."
 agassiz.201.i: "Bu, jeologun genel anlayışını geliştirecek."
 agassiz.202.t: "Jeolojik-Paleontolojik Sempozyum"
 agassiz.202.d: "Bilimler Akademisi, Prof. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] ve Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] tarafından düzenlenen bir etkinliğe davetliler gönderdi. Sempozyum, dünya tarihi araştırmalarında bir dönüm noktası olarak kabul ediliyor. Her ikisi de Güney Amerika ve Batı Afrika kıyılarının jeolojik ve fosil bileşimindaki çarpıcı benzerlikleri özellikle vurguladı."
 agassiz.202.f: "How closely geology and paleontology are related is shown by numerous scientific personalities who stood out in both fields. The interaction between the earth layer and the fossil for chronological determination makes both inseparable sciences. George Cuvier is considered the father of paleontology, but also the godfather of geology. Even in the scientific disputes, for example in the Cuvier-Geoffroy debate of 1830, which centered on the dispute between gradualism and catastrophism, it was primarily geological and paleontological findings that were highlighted as arguments. Both modern geology and modern paleontology would not have been possible without synergies."
 agassiz.202.g: "Verimli bir akademik alışveriş."
 agassiz.311.t: "Uzaydan Gelen Bir Taş"
 agassiz.311.d: "In one of the more remote areas of our country, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has discovered an extraordinary stone in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] search for new minerals. After an initial investigation it is clear: the iron-containing monolith is a meteorite!"
 agassiz.311.f: "İlk meteorit koleksiyonları, meteoritlerin dünya dışı kökenli olduğu bilinmeden önce, 18. yüzyılda kuruldu. Dünyanın en eski meteorit koleksiyonu, Viyana'daki Doğa Tarihi Müzesi'ndedir ve temeli Hraschina meteoriti (1751'de düştü) ile atılmıştır. Günümüzde yaklaşık 1.100 nesne ile dünyanın en büyük sergi koleksiyonuna ev sahipliği yapmaktadır. Yirminci yüzyıla kadar, yalnızca birkaç yüz meteorit bulgusu keşfedilmişti. Artık dünya koleksiyonlarında 30.000'den fazla meteorit bulgusunun olmasının nedeni, Harvey H. Nininger'ın meteoritlerin Dünya yüzeyinde önceden düşünülenden çok daha yaygın olduğunu keşfetmesiyle başladı. Nininger'ın stratejisi, ABD'nin Büyük Ovaları'nda, arazinin büyük ölçüde işlendiği ve toprağın az sayıda kaya içerdiği yerlerde meteorit aramaktı."
 agassiz.311.g: "Nereden geliyor?"
 agassiz_seismology_tech: "Sismoloji"
 agassiz_seismology_tech_desc: "1839'da İskoçya'daki Comrie yakınlarında meydana gelen bir dizi depreme yanıt olarak, Birleşik Krallık'ta depremler için daha iyi tespit yöntemleri geliştirmek amacıyla bir komite kuruldu. Bunun sonucunda, James David Forbes tarafından ilk modern sismometrelerden biri üretildi. 1857'den itibaren Robert Mallet, modern enstrümantal sismolojinin temelini attı ve patlayıcılar kullanarak sismolojik deneyler gerçekleştirdi. Ayrıca 'sismoloji' kelimesini ilk kullanan kişi olarak bilinir."
 agassiz_geologist_demotivated_modifier: "Demotive Jeolog"
 agassiz_set_new_age_of_earth_effect_tt: "[GetPlayer.GetName], dünyanın yaşı üzerine en son çalışmayı yayınladı. Dünyanın yaşı yeniden hesaplanıyor."
 agassiz.401.tt: "[concept_agassiz_geologist]'a sahip tüm uluslar çalışma hakkında oy kullanıyor."
 notification_agassiz_new_earth_age_notification_name: "Dünyanın yaşı yeniden tahmin edildi"
 notification_agassiz_new_earth_age_notification_desc: "Bir [concept_agassiz_geologist], dünyanın düşünülenden çok daha yaşlı olduğuna birçok meslektaşını ikna edebildi.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "Jeolojik Araştırma"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')]A [concept_agassiz_geologist] who is not busy will conduct Geological Research.\n\nDuring the research the following things can happen:\n- If your Geologist has the $agassiz_mineralogist$ [concept_character_trait] the yearly [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] yield will be doubled.\n- Your Geologist can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')] and Uranium.\n- After 5 years of research you will receive @agassiz_mineral! #p 25,000#! [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and @agassiz_rare_mineral! #p 1#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]. Additionally your Geologist can gain the $agassiz_mineralogist$ [concept_character_trait]"
 agassiz.401.t: "Yeni Bir Hesaplama"
 agassiz.401.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], dünyanın yaşına dair yeni bir tahmin sunmak için, hayatı boyunca edindiği tüm önceki deneyimlerini ve bilgisini bir araya getirdi. Soru şu ki, bu teori bilim camiası tarafından da kabul görecek mi?"
 agassiz.401.f: "19. yüzyılın başından 20. yüzyılın ortasına kadar, dünyanın yaşının belirlenmesi belirsiz kaldı ve çoğunlukla tekrarlanan tartışmalara ve muhalefete maruz kaldı. Dünyanın yaşı sorusu, çoğu zaman evrim sorusuyla ilişkiliydi, çünkü bu teori bir teori olarak işlev görebilmek için yeterince uzun bir zaman dilimine ihtiyaç duyuyordu. Yüzyıl dönümüne kadar birçok bilim insanı, Dünya'nın sadece birkaç milyon yaşında olduğuna inanıyordu - Lord Kelvin hayatının sonunda bunun sadece 20 milyon yıl olduğunu varsayıyordu. Ancak tezini savunan 'maksimalistlerden' biri olan Charles Darwin bile yaklaşık 300 milyon yıla inanıyordu. Dünyanın yaşının doğru bir şekilde belirlenebilmesi ve dünyanın (ve dolayısıyla tüm güneş sisteminin) yaşının gerçek boyutunun anlaşılabilmesi için radyoaktivitenin keşfedilmesi gerekecekti."
 agassiz.401.g: "Makaleyi dünya çapındaki tüm tanınmış jeologlara gönder."
 agassiz.402.t: "Bir Jeolog Yeni Bir Hesaplama Sunuyor"
 agassiz.402.d: "[SCOPE.sCharacter('agassiz_geologist_scope').GetLastName], Dünya'nın gerçek yaşına dair bir hesaplama önerdi. Bilim insanı önceki ölçümü yanlış olarak değerlendiriyor ve dünyanın yaşını önemli ölçüde daha yüksek tahmin ediyor. Jeologumuz bu konunun saygın temsilcilerinden biri olduğu için, bize de tezin bir kopyası gönderildi."
 agassiz.402.g: "Bu hesaplamalar ikna edici."
 agassiz.402.h: "Kim bu sözde jeolojik saçmalığa inanacak?"
 agassiz.403.t_yes: "Jeolojik Çalışma Kabul Edildi"
 agassiz.403.d_yes: "Neyse ki, Uluslararası Jeoloji Topluluğu'nun çoğunluğu jeologumuzun yeni hesaplamalarını bir dönüm noktası olarak değerlendirdi ve teorisini geçerli olarak kabul etti."
 agassiz.403.f_yes: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'ın Dünya'nın yaşını belirleme tahmini çoğunluk tarafından kabul edildi. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] bilim insanı çalışmayı #G kabul etti#!, [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] bilim insanı #R reddetti#!. Bu, teorinin resmi olarak tanındığı ve Dünya'nın yaşının önemli ölçüde arttığı anlamına geliyor."
 agassiz.403.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] için bir zafer, jeoloji için bir zafer!"
 agassiz.403.t_no: "Jeolojik Çalışma Reddedildi"
 agassiz.403.d_no: "Uluslararası jeologların cahil, sözde 'seçkin'leri, jeologumuzun yeni çalışmasını reddetti. Seçimde hile mi yapıldığını yoksa gururlu ulusumuzu baltalamak için düşmanca bir manevra mı olduğunu henüz belirlemedik."
 agassiz.403.f_no: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'ın Dünya'nın yaşını belirleme tahmini çoğunluk tarafından reddedildi. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] bilim insanı çalışmayı #G kabul etti#!, [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] bilim insanı #R reddetti#!. Dünyanın yaşına ilişkin önceki değerlendirme bu nedenle aynı kalıyor."
 agassiz.403.h: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] için bir yenilgi, jeoloji için bir yenilgi..."
 je_agassiz_advanced_oceanography: "İleri Oşinografi"
 je_agassiz_advanced_oceanography_reason: "Önceki oşinografik çalışmalar öncelikle Pasifik'in mevcut koşullarını stratejik olarak kullanmak amacıyla askeriyeye pratik fayda sağlamak içindi, ancak şimdi bilim insanları, deniz araştırmalarının bulgularını sadece bilgi uğruna gezegenimiz hakkında daha fazla şey öğrenmek için kullanmayı savunuyor."
 je_agassiz_advanced_oceanography_success: "#G 50#! @rapanui_oceanographic_knowledge! #E Oşinografik Bilgi#! kazandığımızda çalışmalarımızı tamamlayacağız."
 je_agassiz_advanced_oceanography_goal: "#G 50#! @rapanui_oceanographic_knowledge! #E Oşinografik Bilgi#! kazandığımızda çalışmalarımızı tamamlayacağız."
 agassiz.312.t: "Jeolojik Araştırma"
 agassiz.312.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] geniş bir arazi parçasının jeolojik profilini çıkardı ve haritayı kamuoyunun kullanımına sundu."
 agassiz.312.f: "Modern stratigrafi, 19. yüzyıl boyunca gelişti: Avrupa ve Kuzey Amerika'daki jeologlar, William Smith'in örneğini izleyerek ülkelerindeki kaya katmanlarını inceledi, kategorize etti ve ilişkilendirdi ve çalışmalarının sonuçlarını içeren haritalar, stratigrafik tablolar ve incelemeler yayınladı."
 agassiz.312.g: "Bilgiyi teorik olarak kullan."
 agassiz.312.h: "Bilgiyi pratik olarak kullan."
 agassiz.313.t: "Mineral Yatağı"
 agassiz.313.d: "Geological investigations in a previously undeveloped region have revealed a rich deposit of minerals. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is not yet sure what the main aspect of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] search should be."
 agassiz.313.f: "Bir mineral, genellikle kristalimsi olan ve jeolojik süreçlerle oluşan bir element veya kimyasal bileşiktir. Bugün bilinen ve bağımsız olarak tanınan yaklaşık 6.000 mineral türünün büyük çoğunluğu inorganiktir, ancak melit ve evenkit gibi bazı organik maddeler veya böbrek taşı oluşturucuları whewellite ve weddellite de oluşumlarında jeolojik süreçlerin rol aldığı gerekçesiyle mineral olarak kabul edilir. Bilinen tüm mineral çeşitlerini ve eş anlamlı isimlerinin yanı sıra henüz tanınmayan mineral türlerini de içerecek şekilde, 7.000'den fazla mineral adı bulunmaktadır."
 agassiz.313.g: "Miktar."
 agassiz.313.h: "Kalite."
 agassiz.314.t: "İlham Verici Bir Jeolog"
 agassiz.314.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] artık jeoloji dünyasında kendine bir isim yaptı. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] kürsüsünde, insanlar sıklıkla [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]'den tavsiye istiyordu ve dünyanın dört bir yanından meslektaşlarından gelen mektuplar posta kutusunda birikiyordu."
 agassiz.314.f: "'En iyi jeologun, en çok kaya görmüş olan kişi olduğunu öne sürüyorum.' -Herbert Harold Read"
 agassiz.314.g: "Bu, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] itibarını artıracak."
 agassiz.314.h: "Bu, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] üniversitesinin itibarını artıracak."
 agassiz.315.t: "Jeolojik İçgörüler"
 agassiz.315.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]'i ülkemizdeki birçok farklı jeolojik lokasyona götüren güncel araştırma seyahati, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]'in gözlerini açtı. Hazırlanmakta olan bir tez makalesinde, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] jeolojik prensipler üzerine bazı yeni bulguları özetliyor."
 agassiz.315.f: "'Dünya, jeologun büyük yapboz kutusudur; jeolog onun karşısında, yapbozunun ayrı parçaları, aralarındaki ilişkiyi bulup nereye uyduklarını görünceye kadar bir muamma olarak kalan çocuk gibi durur ve sonra elinin altındaki parçalar hemen birbiriyle bağlantılı bir resme dönüşür.' -Louis Agassiz"
 agassiz.315.g: "Mükemmel."
 agassiz.11.t: "Depremlerin Dinamiği"
 agassiz.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] bugün uluslararası dikkatleri üzerine çekti çünkü [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] depremler hakkındaki bir kitapla jeolojinin bu yönüne dair önceki bilgilerde devrim yarattı. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]'nin ortaya attığı 'epicentrum' (merkez üssü) ve 'sismoloji' gibi kelimeler şimdiden bilim dünyasında yerini buldu."
 agassiz.11.f: "9 Şubat 1846'da Robert Mallet, 'Depremlerin Dinamiği' adlı çalışmasını Kraliyet İrlanda Akademisi'ne sundu; bu çalışma modern sismolojinin temellerinden biri olarak kabul edilir. 1852 ile 1858 yılları arasında, oğlu John William Mallet'in yardımıyla, 1858'de yayınlanan ve bilinen depremleri listeleyip etkilerini tanımlayan İngiliz Derneği'nin Deprem Kataloğu'nu hazırladı. Bu süre zarfında ayrıca, gevşek ve sert kayadaki sismik dalgaların seyahat süresini belirlemek için patlama deneyleri gerçekleştirdi."
 pmg_agassiz_seismology: "Sismoloji"
 pm_agassiz_basic_seismology: "Temel Sismoloji"
 pm_agassiz_advanced_seismology: "İleri Sismoloji"
 pm_agassiz_advanced_volcanology: "İleri Volkanoloji"
 agassiz_congress_host_modifier: "Jeoloji Kongresi'ne Ev Sahipliği Yaptı"
 agassiz_laughed_congress_modifier: "Laughed at the Geological Congress"
 agassiz_respected_congress_modifier: "Jeoloji Kongresi'nde Saygı Gördü"
 agassiz_lauded_congress_modifier: "Jeoloji Kongresi'nde Övüldü"
 agassiz.316.f: "Eğer kendi topraklarında ilginç jeolojik oluşumlar yoksa, jeologlar sınır bölgesinde veya ötesinde oluşumlar veya mağaralar arayabilir."
 agassiz.317.t: "Yabancı Jeolog"
 agassiz.317.d: "Yabancı bir jeolog, araştırması sırasında bir şekilde bölgemize girdi ve kayıtlar yaptı. Bize sonuçlarını 'teşekkür' niyetine gönderdi."
 agassiz.317.g: "Ee...?"
 agassiz.501.t: "Kıtalar Hareket Ediyor mu?"
 agassiz.501.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName], şimdiden oldukça tartışmalı olan bir tezi ortaya attığı bir kitap yayınladı. Buna göre, kıtalar mevcut halleriyle daha yeni jeolojik kökene sahiptir. Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], bugünkü kıtaların 'Pangea' adını verdiği tek bir birim oluşturduğunu öne sürüyor. Uluslararası jeoloji camiasını bu teze ikna etmek için onları bir kongreye davet etti."
 agassiz.501.f: "Kıtaların hareketinin sebep olduğuna dair en eski öneri, Flaman haritacı Abraham Ortelius'tan geldi. 1596 baskılı Atlas Theatrum Orbis Terrarum'unda, iki kıyı şeridinin benzerliği açıkça görülebiliyordu. Alexander von Humboldt, 1801 ve 1845'te Güney Amerika ve Afrika'nın karşılıklı kıyılarının benzerliğini ve bitki örtüsünü tanımladı ve Atlas Okyanusu'nun felaket bir akıntıyla aşındığını öne sürdü. 1858'de coğrafyacı Antonio Snider-Pellegrini, Eski ve Yeni Dünyaları ayıran bir okyanus olmadan gösteren ilk haritayı yayınladığında bir adım daha ileri gitti. Ancak, özellikle Alfred Wegener, kıtasal sürüklenme teorisiyle, fiksizmden (kıtaların yere sıkıca kök saldığı tezi) mobilizme doğru bir bakış açısı değişikliğine yol açtı. Yaşadığı süre boyunca, açıklama modeli bilim dünyasında bir azınlık görüşü olarak kaldı ve ancak 20. yüzyılın ikinci yarısında kabul gördü."
 agassiz.501.g: "Önde gelen jeolojik ulusları davet et!"
 agassiz.502.t: "Jeolojik Bir Davet"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName], uluslararası bir jeoloji kongresi için davetler gönderdi. Ev sahibi, önde gelen bir jeolog, gerçekten de kıtaların hareket ettiğini iddia ediyor...!"
 agassiz.502.g: "Bu eğlenceli olacağa benziyor."
 agassiz.503.t_laughed: "Jeoloji Topluluğunun Alayı"
 agassiz.503.t_respected: "Kendinden Emin Bir Görünüm"
 agassiz.503.t_lauded: "Hayranlık ve Tebrikler"
 agassiz.503.d_laughed: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'ın sunumu eğlenceyle karşılandı. [ROOT.GetCountry.GetNameNoFlag]'ın Jeoloji alanında olağanüstü bir şey başarmış bir itibarı pek yok. Kapalı kapılar ardında açıkça şakalar yapıldı."
 agassiz.503.d_respected: "Jeoloji Kongresi'nin başlamasından önce, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] sıcak bir şekilde karşılandı ve olağan hediyeler takas edildi. [ROOT.GetCountry.GetNameNoFlag] araştırma dünyasında tanınmış bir itibara sahip."
 agassiz.503.d_lauded: "Profesör [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'ın gelişi büyük bir sevinçle karşılandı, kendisi en çok beklenen konuklardan biri olarak kabul ediliyordu. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]'in etrafında hızla bir kalabalık oluştu, çünkü [ROOT.GetCountry.GetNameNoFlag] Jeoloji alanında bir öncü olarak görülüyor."
 agassiz.503.f_laughed: "'[ROOT.GetCountry.GetAdjectiveNoFlag] jeologları neden hiç kız bulamıyor?\n\nÇünkü aralarında çok fazla sürtünme var!'"
 agassiz.503.f_respected: "Upon [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] arrival, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] had a few pleasant conversations with colleagues about mostly boring rock formations."
 agassiz.503.f_lauded: "Prof. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] gördüğü bu yoğun ilgi karşısında neredeyse bunalmış gibiydi. Pek çok meslektaşı onunla konuşmak, onun seferlerinden ve deneyimlerinden faydalanmak istedi. Bazıları ona özel bir ders vermesi için bile ısrar etti."
 agassiz.503.g: "Ne utanç verici!"
 agassiz.503.h: "Sonunda kendi gibi düşünen insanların arasında."
 agassiz.503.i: "Biz önde gelen bir jeoloji ulusuyuz!"
 agassiz.504.t: "Fiksizm mi Mobilizm mi?"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName], bir araya gelen uluslararası jeoloji camiasına, jeolojinin mobilizme -yani kıtasal sürüklenmeye- döndürülmesini şiddetle savunduğu, büyük beğeni toplayan bir konferans verdi. Ancak karşıtları fazla ve hakim olan fiksizm doktrininden ayrılmak istemiyorlar."
 agassiz.504.f: "Fiksizm, 1960'lara kadar temel jeotektonik hipotezdi. Yerkabuğunun, alt katmanlara sıkıca bağlı olduğu ve büyük ölçekli tektonik süreçlerin yerel olduğu varsayılırdı. Buradan, dünyanın gelişiminin ağırlıklı olarak dikey ve çok az yatay tektonik hareketlerle karakterize edildiği sonucu çıkıyordu. Klasik jeolojinin çoğu teorisi fiksizm fikrine dayanıyordu. 10. yüzyılın başında, Güney Amerika ve Afrika'da aynı türden fosiller bulundu. Fiksizm varsayımı altında, bir zamanlar Afrika ve Güney Amerika'yı hayvanların diğer kıtaya göç etmesini sağlayan kara köprülerinin bağladığına dair kara köprüsü hipotezi ortaya atıldı. 1924 ile 1927 yılları arasında Meteor araştırma gemisinin yaptığı yankı derinliği ölçümleri sırasında, beklenen doğu-batı yönündeki bir kara köprüsünün kalıntıları değil, kuzeyden güneye uzanan bir sualtı dağ sırtı olan Orta-Atlantik Sırtı keşfedildi. Bu, kara köprüsü hipotezini sarsmaya başladı ancak hipotez 1960'lara kadar tamamen terk edilmedi. Fiksizmin zıttı, yerkabuğunun yatay hareketlerini belirleyici etken olarak gören mobilizmdir. Mobilizm teorisi, Alfred Wegener'ın kıtaların kayması keşfinden gelişti."
 agassiz.504.g: "Kıtalar milyonlarca yıldır değişmedi."
 agassiz.504.h: "Her şey levha tektoniğine işaret ediyor."
 agassiz.505.t: "Jeologlar kendi aralarında"
 agassiz.505.d: "Büyük jeoloji kongresinin yan etkinliklerinde, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] meslektaşlarıyla fikir alışverişi fırsatı bulur. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] boş zamanlarında neye odaklanmalı?"
 agassiz.505.f: "'Mevcut bilgimizin eksik durumunun karakteristik ve garip bir gerçeğidir ki, soruna biyolojik veya jeofiziksel açıdan yaklaşılıp yaklaşılmadığına bağlı olarak, gezegenimizdeki tarih öncesi koşullar hakkında tamamen zıt sonuçlar çıkarılmaktadır.' -Alfred Wegener"
 agassiz.505.g: "Jeolojik Bilgi."
 agassiz.505.h: "Oşinografik Bilgi."
 agassiz.505.i: "Nadir Mineraller."
 agassiz.505.j: "Yeni yetenekler."
 agassiz.509.t_fix: "Fiksizm zafer kazandı"
 agassiz.509.d_fix: "Despite all [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] efforts, [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] did not manage to convince the majority of [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] colleagues. The accusation is that Prof. [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName] cannot provide sufficient evidence for his theses. The fact remains: the continents are stable."
 agassiz.509.f_fix: "'Kıtaların kayması teorisinin Newton'u henüz ortaya çıkmadı. Onun yokluğu endişe yaratmamalı; teori hala genç ve hala şüpheyle karşılanıyor. Uzun vadede, geçerliliği konusunda fikir birliği olmayan bir yasayı açıklamak için zaman ve emek harcamakta tereddüt eden bir teorisyeni suçlayamazsınız.' -Alfred Wegener"
 agassiz.509.g: "Eppur si muove. (Yine de hareket ediyor.)"
 agassiz.509.t_tectonics: "Mobilizm zafer kazandı"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName], [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] tezini bilimsel camiaya kabul ettirmeyi başardı. Kıtaların kayması, artık daha önce açıklanamayan bir dizi jeolojik olguyu açıklamak için en olası teori olarak kabul ediliyor."
 agassiz.509.f_tectonics: "'Bilim insanları, tüm yer bilimlerinin gezegenimizin eski zamanlardaki durumunu ortaya çıkarmak için kanıt sağlaması gerektiğini ve gerçeğe ancak tüm bu kanıtların bir araya getirilmesiyle ulaşılabileceğini hâlâ yeterince anlamıyor gibi görünüyor. ... Buradaki 'gerçeği', yani bilinen tüm olguları en iyi şekilde düzenleyen ve bu nedenle en yüksek olasılık derecesine sahip olan tabloyu bulmayı, ancak tüm yer bilimlerinin sağladığı bilgileri birleştirerek umut edebiliriz. Ayrıca, hangi bilim dalından gelirse gelsin, her yeni keşfin vardığımız sonuçları değiştirebileceği olasılığına her zaman hazırlıklı olmalıyız.' -Alfred Wegener"
 agassiz.509.h: "Bekle - bu...şaşırtıcı!"
 agassiz_conference_geologist_double_vote_tt: "Tecrübeli jeoloğumuz sayesinde #G iki katı#! oy gücümüz var"
 agassiz_conference_geologist_triple_vote_tt: "Ünlü jeoloğumuz sayesinde #G üç katı#! oy gücümüz var."
 agassiz.601.t: "Yanardağ Konumu"
 agassiz.601.d: "Yaklaşan yanardağ keşif gezisi için bir grup bilim insanı ve asistan bir araya geldi. Ama şimdi soru şu: Ekip, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] liderliğinde hangi yanardağı araştırmalı? Seçebileceğimiz birkaç devlet var."
 agassiz.601.f: "'Dr. Hutton'un teorisinden bahsederken ateş kelimesini kullanmamanızı rica etmeliyim: ısı daha doğru bir ifadedir. O kelimenin alışılagelmiş anlamında ateş, yanma eylemindeki yakıtı varsayar; ancak dünyanın merkezinde bu tanımdaki bir ateşin var olduğuna inanmak için bir nedenimiz yok.' -Maria Hack"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "Yanardağın Eteklerinde"
 agassiz.602.d: "Vulkanoloji keşif heyeti, [SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağın eteklerine ulaştı ve şimdi asıl bilimsel araştırmaya başlıyor."
 agassiz.602.f: "'Yer altı ısısının varlığı, kaplıcalar, yanardağlar ve depremler gibi olgularla kanıtlanmıştır. Bu gözlemler, yerin derinliklerinde ısının varlığı konusunda hiçbir şüphe bırakmamaktadır; ancak hangi derinlikte, hangi ölçüde ve hangi yoğunlukta etki eder?' -John Playfair"
 agassiz.602.g: "Geldiği kadar tehlikeli değil, değil mi?"
 agassiz.603.t: "Başarılı Yanardağ Keşif Gezisi"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName], yalnızca asistanlarını yanardağın zirvesine götürmekle kalmayıp aynı zamanda sayısız deney gerçekleştiren ve örnekler toplayan cesur manevrayı başarıyla tamamladı. Yanardağ keşif gezisi, dünyanın iç işleyişi hakkında daha fazla bilgi edinmeye yönelik değerli bir katkı sağladı."
 agassiz.603.f: "'Tüm Doğanın vahşiliği aynı hikayeyi anlatır: depremlerin şokları ve patlamaları, yanardağlar, gayzerler, kükreyen, gürleyen dalgalar ve seller, bitkilerdeki özsuyun sessiz yükselişi, her türden fırtına, hepsi ve her biri, Doğanın kalbinin düzenli, güzellik yaratan aşk vuruşlarıdır.' -John Muir"
 agassiz.603.g: "Ve hepsi üçüncü derece yanıklar olmadan."
 agassiz.604.t: "Yanardağ Seferi Felaketle Sona Erdi"
 agassiz.604.d: "Korkunç haber! Birkaç uyarı işaretine rağmen - zehirli dumanlar, küçük depremler, kara duman - [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] görünüşe göre inatla seferi devam ettirmekte ısrar etti. Patlama katılımcıları tamamen hazırlıksız yakaladı; bölge bir felaket alanı. Lav hala dağı ve çevresindeki köyleri basıyor. Bazı kurtulanların araştırma sonuçları ve örneklerle güvenliğe ulaşması ancak büyük zorluklarla mümkün oldu. Ancak, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] kayıp. En kötüsünü beklemek zorundayız."
 agassiz.604.f: "Gazeteler şimdiden birkaç yaralanma ve ölüm haberi veriyor. Bölgenin büyük kısımları tahliye edilmek zorunda kaldı. Binalar hasar gördü ve yollar lavla kaplandı. Yanardağ krateri yakınındaki herhangi birinin bu doğa olayından sağ kurtulma ihtimali neredeyse sıfır."
 agassiz.604.g: "Korkunç!"
 agassiz.605.t: "Yanardağ Seferi Sonuçsuz Sona Erdi"
 agassiz.605.d: "Yanardağ seferi tüm araştırma fonlarını tüketti ve geri döndü. Ne yazık ki, sadece birkaç faydalı sonuç üretebildi. Belki de lider fazla ihtiyatlıydı?"
 agassiz.605.f: "'Biraz üzerinde dans etmezsen bir yanardağı keşfedemezsin.'"
 agassiz.605.g: "Hayal kırıklığı"
 agassiz.611.t: "Kimyasal İçgörüler"
 agassiz.611.d: "[SCOPE.sState('agassiz_volcano_state').GetName]'daki sefer sırasında, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] yanardağ kraterindeki bazı ilginç kimyasal süreçleri daha ayrıntılı inceleme fırsatı buldu. Bazı mineral bileşikleri hala tamamen bilinmiyor."
 agassiz.611.f: "Çoğu kimyasal element, özellikle minerallerde büyük çeşitlilik gösteren bileşikler halinde bulunur. Modern kimyanın başlangıcında, jeologlar her zaman kimyacıların daha önce bilinmeyen elementleri izole edebileceği yeni örnekler arıyorlardı."
 agassiz.611.g: "Bu, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]'a yardımcı olabilir."
 agassiz.612.t: "Lav Tuzağı"
 agassiz.612.d: "Yanardağ seferi, kratere ilerlemede biraz fazla cesur davrandı: kendilerini neredeyse her taraftan lavla çevrili buldular. Önceki ilerleyişi terk etmek büyük bir zaman kaybı anlamına gelirdi."
 agassiz.612.f: "'Lavinin kendisi, şairlerin cehennem bölgelerinin nehirlerine atfettiği o kasvetli görünüme sahiptir; kumdan bir dere gibi yavaşça ilerler, gündüzleri siyahımsı, geceleri kırmızı. Size yaklaştıkça, belirsiz olduğu için en büyük korkuya neden olan bir tür çıtırtı sesi duyarsınız. Parıltısı o kadar yoğundur ki, ilk kez yeryüzü gökyüzünü aydınlatır ve ona sürekli yıldırım görünümü verir; gökyüzü de sırayla bu parıltıyı suya yansıtır ve böylece doğa, bu üç katlı ateş imgesiyle alevler içinde kalmış gibi görünür.' -Germaine de Staël"
 agassiz.612.g: "Başka bir yol bul."
 agassiz.612.h: "Karşıya geçmeyi dene."
 agassiz.613.t: "Sertleşmiş Bir Lider"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is an experienced volcanologist who knows exactly how to deal with the mountain; [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] knowledge ensures that the expedition progresses safely and well."
 agassiz.613.f: "'O kadar çok şahit olmayı istediğim olay gerçekleşti ve Vezüvüs günlerdir patlama halinde. Volkandan çıktığı anda lav üzerinde zaten birçok deney yaptım ve o muhteşem ama tehlikeli konumda, ateşten bir çağlayan gibi düşen, su kadar akışkan, kırmızı kor halindeki bir madde akışının 5-6 adım uzağında çok uzun süre kalmam nedeniyle yaşadığım ağır rahatsızlık olmasaydı onları tamamlardım.' -Humphry Davy"
 agassiz.613.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is a superb leader."
 agassiz.614.t: "Zehirli Gazlar"
 agassiz.614.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] liderliğindeki ekip, yanardağın bir noktasında bol miktarda volkanik gaz emisyonu keşfetti. Jeolog, tamamen güvenli olmasa bile, birkaç numune almak istiyor."
 agassiz.614.f: "Volkanik gazlar, volkanik aktivite sırasında yeryüzüne çıkan gazlardır. Çıkış, dar tanımlanmış alanlarda veya bir volkanın yamaçlarından geniş bir alana yayılarak gerçekleşebilir. Volkanik gazlar, 1790'da İtalya'da Scipione Breislak tarafından toplanmış ve analiz edilmiştir. Volkanik gazların bileşimi, volkan içindeki magmanın hareketine bağlıdır. Bu nedenle, gaz bileşimindeki ani değişiklikler genellikle volkanik aktivitede bir değişikliğin habercisidir."
 agassiz.614.g: "Bu gazları incelemeliyiz."
 agassiz.614.h: "Bu delilik!"
 agassiz.615.t: "Volkanik Çıkıntılar"
 agassiz.615.d: "Ani bir gürültü, yanardağ seferi katılımcılarını kısa süreliğine korkuttu. Ekip en kötüsünün bittiğini düşündüğünde, yanardağ aniden parlayan taşlar püskürttü ve bunlar katılımcıların üzerine meteor yağmuru gibi düştü. İki asistan yaralandı ve bir katır öldürüldü."
 agassiz.615.f: "'Üstümüzde ve ada çevresinde, güçlü bir çıtırtılı ateş veya bir iki saniye aralıklarla ağır topçu ateşi gibi tuhaf bir ses duyduk. Beşte, kükreyen gürültü devam etti, karanlık gökyüzüne yayıldı ve üzerimize pomza taşı dolu yağdı, bunların birçoğu oldukça büyük ve epey sıcaktı.' -Kaptan Watson"
 agassiz.615.g: "Talihsiz bir gelişme."
 agassiz.616.t: "Lav Örneği"
 agassiz.616.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], seferi kısa süreliğine durdurmayı teklif etti. Yakınlarda birkaç lav örneği almak için iyi bir yer var gibi görünüyor. Bu, bilimsel açıdan değerli ve riskli bir işlem."
 agassiz.616.f: "'Lav, geniş bir yatağın derin kıyıları içinde hapsolmuştu ve bir sıvı gibi değil, bir kok dağı gibi veya bazen yüksek oranda gazlı kömür gibi akıyordu. Yarılıyor, çatırdıyor, kıvılcımlar saçıyor, dumanlar çıkarıyor, alev alev yanıyor ve hep tek bir devasa kompakt kütle halinde ilerliyordu. Kendinden kopan parçalar yuvarlanıyor, ardında öyle şiddetli bir ışık bırakıyordu ki kendimi bir demir ocağının ağzında hayal edebilirdim; ve her kütle gök gürültüsü sesiyle düştüğünde ağaçlar alev aldı ve kalabalık hayranlık ve pişmanlık çığlıkları attı.' -Luigi Palmieri"
 agassiz.616.g: "İşte bu tür deneyler için buradayız."
 agassiz.617.t: "Lava Örneği - Başarılı!"
 agassiz.617.d: "Jeoloğumuz riskli bir girişimde bir lava örneği almayı başardı. Sonuç en yüksek bilimsel değere sahip."
 agassiz.617.f: ""
 agassiz.617.g: "Sıcak bilim!"
 agassiz.618.t: "Lava Örneği - Başarısız!"
 agassiz.618.d: "Diğer keşif gezisi üyelerinin hayal kırıklığına, örneği toplamak başarısız oldu. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] ağır yanıklar aldı ve ekibi tehlikeye attı!"
 agassiz.618.f: ""
 agassiz.618.g: "Ellerinizi yakacak bir bilim..."
 agassiz.619.t: "Kristaller"
 agassiz.619.d: "Volkanik bölgedeki eşsiz jeolojik süreçler, bir dizi nadir, kristalimsi mineral üretti. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] bu taşları koleksiyonuna eklemek için can atıyor..."
 agassiz.619.f: "Çoğu volkanik kaya, bir dizi ortak minerali paylaşır. Volkanik kayaların farklılaşması, esas olarak fraksiyonel kristalleşme yoluyla silika (SiO2) içeriğini artırma eğilimindedir. Böylece, daha evrimleşmiş volkanik kayalar, feldispatlar, kuvars polimorfları ve muskovit gibi daha yüksek miktarda silika içeren mineraller açısından daha zengin olma eğilimindedir. Hala silikatların hakimiyetinde olsa da, daha ilkel volkanik kayalar, olivin ve piroksenler gibi daha az silika içeren mineral topluluklarına sahiptir. Bowen'in reaksiyon serisi, volkanik kayalardaki en yaygın minerallerin oluşum sırasını doğru bir şekilde tahmin eder. Bazen bir magma, başka bir magmadan kristalleşmiş kristalleri alabilir; bu kristallere zenokrist denir. Kimberlitlerde bulunan elmaslar, nadir ancak iyi bilinen zenokristlerdir; kimberlitler elmasları yaratmaz, ancak onları alır ve Dünya'nın yüzeyine taşır."
 agassiz.619.g: "Bir örnek yeterli."
 agassiz.619.h: "Elinizden geldiği kadar çok örnek alın!"
 agassiz.619.i: "Birkaç taş, bir araştırmacının hayatına değmez."
 agassiz.620.t: "Ateş Nehri"
 agassiz.620.d: "Bir lav nehri, ekibin yolunu kesti. Bazı katılımcılar bu engeli, tüm yanardağ keşif gezisini tehdit edebilecek tehlikeli bir meydan okuma olarak görürken, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] bu durumu öncelikle, kullanılmamış aletlerini test etmek için bilimsel bir fırsat olarak görüyor..."
 agassiz.620.f: "'Çoğu durumda, ışığın akkor haldeki ancak alevlenmeyen cisimlerden yayıldığı açıkça görülebilir. Vezüv'den yükselen görünürdeki alevden oluşan büyük sütunu yapan, parıldayan lavın ışığıdır.' -John Philipps"
 agassiz.620.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] bunu incelemeli."
 agassiz.620.h: "Bu çok tehlikeli!"
 agassiz.621.t: "Volkanizma Üzerine Teoriler"
 agassiz.621.d: "Yanardağdaki konaklaması sırasında, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] kanıt toplayarak ve çevreyi keşfederek önceki volkanizma teorilerinden bazılarını nihayet doğrulamak istiyor. Bunun için, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] meslektaşları arka planda giderek daha fazla kara duman yükselirken dişlerini gıcırdatıp dururken, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]'nin 'son derece büyüleyici ve ilham verici bir bölge' dediği yerde çok fazla zamana ihtiyacı var..."
 agassiz.621.f: "'Patiramanın doruk noktasında, bir kül sütunu muazzam bir çam ağacı şeklinde yükseğe yükseldi ve sonunda aşağı doğru eğilmeye başladı, yoğun maddeden oluşan sütun yere düştü. Dehşet verici büyüklükteki alevli lav selleri şimdi dağdan aşağı akıyordu.' -Mariana Starke"
 agassiz.621.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] bu olguyu iyice incelemek için zaman ayırmalı."
 agassiz.621.h: "Zaman kaybetme!"
 agassiz.622.t: "Deprem"
 agassiz.622.d: "Keşif gezisi kraterin çok yakınındayken, sabahın erken saatlerinde bir deprem sarsıntısına eşlik eden moloz yağmuru ve çamur kayması yaşandı. Küçük deprem, yanardağın katılımcıların önceden düşündüğünden daha aktif olduğunun açık bir göstergesi."
 agassiz.622.f: "'Bu bilgili coğrafyacı, Sicilya'nın bir sarsıntıyla İtalya'dan ayrıldığı geleneğine atıfta bulunarak, o bölgelerde deniz yakınındaki toprakların artık nadiren depremlerle sarsıldığını, çünkü şimdi ateşin, tutuşmuş maddelerin ve suların kaçabileceği açık delikler olduğunu belirtir; ama eskiden, Etna, Lipari Adaları, İşiya ve diğer yanardağlar kapalıyken, hapsolmuş ateş ve rüzgar çok daha şiddetli hareketler üretmiş olabilir. Bu nedenle, yanardağların emniyet supabı olduğu ve yeraltı sarsıntılarının, volkanik enerji ilk kez yeni bir bölgeye kaydığında muhtemelen en şiddetli hale geldiği doktrini modern değildir.' -Charles Lyell"
 agassiz.622.g: "Tüm bu keşif gezisi iyi bir fikir miydi acaba...?"
 agassiz.623.t: "Her Yerde Mineraller"
 agassiz.623.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] liderliğindeki keşif gezisi, [SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağda zengin bir maden yatağına rastladı."
 agassiz.623.f: "Mineraller bir jeologun en iyi dostudur."
 agassiz.623.g: "Mineraller!"
 agassiz.623.h: "Hayır."
 agassiz.624.t: "Egzotik Numune"
 agassiz.624.d: "Şaşırtıcı görünebilir, ancak [SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağ seferi, aslında yanardağa çok yakın yaşayan benzersiz bir faunaya ait nadir hayvan numuneleri buldu. Bazı numuneler kesinlikle yerel zoologlar için büyük ilgi çekici olurdu."
 agassiz.624.f: "'Humphrey! Lütfen biraz volkanik cüce papağan yumurtası topla. Kahvaltı yetersizdi ve pazar günü kızarmış yumurtamı özledim.'"
 agassiz.624.g: "Numune!"
 agassiz.625.t: "Bilinmeyen Fosiller"
 agassiz.625.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]'ın [SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağ seferinde keşfettiği bazı nadir fosiller, önemli paleontolojik ve jeolojik soruları yanıtlayabilir."
 agassiz.625.f: "'Etna'nın güney ve doğu yanlarındaki verimli bölgenin eteğini dolaşırsak, modern lavların altından çıkan kil kumu ve volkanik tüften oluşan denizel tabakalar görürüz. Bu tabakalarda bulunan deniz fosil kabuklarının hepsi veya neredeyse hepsi, şu anda Akdeniz'de yaşayan türlerle aynıdır; ve Catania yakınlarında deniz seviyesinden 600 ila 800 fit yükseklikte ortaya çıkmaları, bu bölgede, daha güneydeki Sicilya'nın diğer kısımlarında olduğu gibi, eski deniz yatağının yukarı doğru bir hareketi olduğunu açıkça kanıtlamaktadır. Bu nedenle, çok modern kökenli kısımlar hariç, tüm dağın bu yükselişe katıldığını çıkarsamak yerindedir.' -Charles Lyell"
 agassiz.625.g: "Fosiller!"
 agassiz.626.t: "Jeomanyetik Veri"
 agassiz.626.d: "[SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağ seferi, bu sabah başkentten bir telgraf aldı. Jeomanyetik Gözlemevi, yanardağ krateri hakkında bazı veriler toplamayı rica ediyor. Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] bu isteğe uydu."
 agassiz.626.f: "'Bu veri Jeomanyetik Enstitü için bu kadar önemliyse, neden gelip veriyi kendiniz almıyorsunuz?'"
 agassiz.626.g: "Mükemmel"
 agassiz.627.t: "Dünya'daki Güneş Elementi"
 agassiz.627.d: "Daha önce göz ardı edilmiş bazı kayaları analiz ederken, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] inanılmaz şeyler keşfedebildi. Sahadaki spektral analizi kullanarak, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] volkanik kayanın aslında, önceden sadece uzayda bulunduğu düşünülen helyum elementini içerdiğini kanıtlayabildi."
 agassiz.627.f: "Luigi Palmieri, İtalyan bir fizikçi, meteorolog, sismolog ve volkanologdu. 1845'te Napoli Üniversitesi'nde Pasquale Galluppi'nin mantık ve metafizik öğretmenliği pozisyonunu devraldı. Gallupi'nin 1847'de ölümünden sonra kürsüsü kendisine emanet edildi. 1860'ta kürsüyü bıraktı ve onun yerine başlattığı jeofizik ve meteoroloji kürsüsünü devraldı. Kürsüye, meteoroloji gözlemevi ve 1842'de kurulan Vezüv Gözlemevi de bağlıydı ve Palmieri yönetimini de devraldı. Kürsünün ve iki gözlemevinin başkanlığını ölümüne kadar sürdürdü. Palmieri özellikle elektromanyetik bir sismograf ve atmosferdeki elektriksel gerilimleri ölçmek için cihazlar gibi geliştirilmiş ölçüm cihazlarıyla tanındı. 1882'de Vezüv lavının spektral analizi yoluyla Dünya'da ilk kez helyum elementini tespit etmeyi başardı."
 agassiz.627.g: "Bu... ilginç olasılıklar açıyor."
 agassiz.628.t: "Ekip dinlenme diliyor"
 agassiz.628.d: "Bir yılı aşkın yanardağ keşif gezisinin ardından, ekip üyeleri giderek daha fazla mola talep ediyor. Çoğu tükenmişliğin eşiğinde. Eve dönme sesleri giderek yükseliyor."
 agassiz.628.f: "'Korktunuz mu? Saygılarımla, bu tür sismik olaylar tam da bu yanardağa tırmanma nedenimiz! Bilim insanı mısınız yoksa firari mi?'"
 agassiz.628.g: "İhtiyaçları kadar dinlensinler."
 agassiz.628.h: "Kısa bir mola, hepsi bu."
 agassiz.628.i: "Bu işe yaramaz asistanların çalışması gerekiyor, boş boş oturması değil!"
 agassiz.629.t: "Cehennem"
 agassiz.629.d: "[SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağdaki durum önemli ölçüde kötüleşti. Dağ aniden siyah duman püskürtmeye başladı ve lav akıntıları artıyor gibi görünüyor. Keşif heyeti şimdi bir ikilemle karşı karşıya. Üyeler ihtiyatlı davranıp lav tarafından sıkışıp kalma riskini mi alsın, yoksa hızlı tepki verip bilinmeyen bir tehlikeyi mi göze alsın?"
 agassiz.629.f: "'Ateşin nefesi, bir topun verebileceği tüm güçle şehre ve sahil şeridine indi. Küller, can acıtıcı bir etkiyle yüzümüze saplandı. Hava alevle doluydu. İstemsizce yüzümüzü korumak için ellerimizi kaldırdık. Kıyıdaki kurbanların cesetlerini gördüğümde aynı hareketi fark ettim.' -Comte de Fitz-James"
 agassiz.629.g: "İhtiyatlı davran."
 agassiz.629.h: "Riski al."
 agassiz.630.t: "Yeryüzünde Cehennem"
 agassiz.630.d: "[SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağda tüm cehennemin boşalmış gibi görünüyor. Lav çeşmeleri fışkırıyor, alevden nehirler içinde kavurucu güçler birbiriyle çarpışıyor. Keşif heyetindeki çoğu kişi için tehditkar bir olay. Sadece Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] kendini huşu verici bir hayranlıktan alamıyor."
 agassiz.630.f: "'Geceleyin ateşin etkisi daha da güzelleşti. Kırmızı ve ışıldayan ateşten oluşan akıntılar ve çağlayanlarla çevriliydik; ve ortasında, bitümlü duman sütununun havaya fırlattığı, yoğun ısılarının ışığıyla beyazlaşmış devasa kaya kütleleri düşüyor, ardında ihtişamlı buhar izleri bırakıyordu.' -George Gordon Byron"
 agassiz.630.g: "Bu büyüleyici bir manzara ve fotoğraflarını çekmeliyiz!"
 agassiz.630.h: "Ürpertici,"
 agassiz.630.i: "Geri çekilin!"
 agassiz.631.t: "Oldukça Aktif Yanardağ"
 agassiz.631.d: "Apparently the volcano that Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is researching is much more active than expected. An outbreak is probably imminent. This makes the expedition more dangerous. However, with higher risk, the scientific opportunities also increase..."
 agassiz.631.f: "'İnsanlar, lavlar kendilerini gerçekten yakalayana kadar yanardağlara asla inanmazlar.' -George Santayana"
 agassiz.631.g: "Daha fazla bilgi!"
 agassiz.631.h: "Daha fazla deneyim!"
 agassiz.631.i: "Daha fazla mineral!"
 agassiz.632.t: "Gazete Raporu"
 agassiz.632.d: "Bölgenin önde gelen gazetelerinden biri olan #YELLOW [SCOPE.sState('manzoni_publisher_state').GetNameNoFormatting] Chronicle#!, şu anda okuyucularını yanardağ seferi hakkındaki raporlarla güncel tutuyor. Böylece bilimsel bir niş alan, nüfusun daha geniş bir kesiminin ilgisini uyandırdı. Özellikle oğlan çocukları ve genç erkekler macera dolu hikayelerden büyüleniyor."
 agassiz.632.f: "'Son sayımızda okuyun: Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting]'ın cesur krater tırmanışı! Cesur bilim insanları lav, zehirli dumanlar ve cehennemi sıcaklıkla yüzleşiyor. İnsanoğlu, eskilerin yeraltı dünyasının girişi olduğuna inandığı şeyin kenarında bir sınırı daha aşıyor. Muhabirlerimiz yolculuğu illüstrasyonlarla takip etmeye devam ediyor. Perşembe Chronicle günü!'"
 agassiz.632.g: "Bu, yeni bir bilim insanı nesline ilham verecek."
 agassiz.633.t: "Güvenli Bir Dinlenme Yeri"
 agassiz.633.d: "Sefer üyeleri, kükürt dumanları, kara duman ve lav akıntıları arasında geri çekilmek için güvenli bir yer buldular."
 agassiz.633.f: "'Sevgili meslektaşım Profesör Schabernack!\n\nVolkanik bir vakumdaki suyun dinamik gelişimi hakkındaki aydınlatıcı içgörüleriniz için şu noktada size teşekkür ederim, ancak itirazlarımı daha sonra daha ayrıntılı olarak formüle edeceğim. Asıl demek istediğim, Dr. Dr. Sauerspeck ile yazışmamda, üniversitede bu volkanda eğlendiğimiz şeklinde utanç verici bir söylentiyi yaydığınızın bana söylenmesidir. Bu varsayımları yapmayı bırakmanızı istiyorum. Kısa süre önce keşfettiğim [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting] Kaplıcaları'nın maksimum sıcaklığı, sizin geçenlerde iddia ettiğiniz gibi 35°C değil, sadece 32°C'dir. Yani fiilen dondurucu soğuklar. Lütfen bu rezil yanlış beyanları düzeltin!'"
 agassiz.633.g: "Rahatlama!"
 agassiz_volcano_tourist_modifier: "Volkan Turizmi"
 agassiz_small_volcano_eruption_modifier: "Küçük Volkanik Patlama"
 agassiz_medium_volcano_eruption_modifier: "Volkanik Patlama"
 agassiz_big_volcano_eruption_modifier: "Mega Volkanik Patlama"
 agassiz_medium_earthquake_modifier: "Deprem"
 agassiz_big_earthquake_modifier: "Mega Deprem"
 agassiz.711.t: "Volkan Gösterisi"
 agassiz.711.d: "[SCOPE.sState('agassiz_volcano_state').GetName] sakinleri şu anda etkileyici bir gösteriye tanık oluyor: yanardağın lav çeşmeleri, özellikle geceleri büyüleyici bir manzara oluşturuyor. Seyirciler arasında turistler ve bilim insanları bulunabilir."
 agassiz.711.f: "'Volkanların En Yücesi! Etna'nın alevi\nSeninkinin yanında soluk ve sönmez Hecla'nınki sakin;\nVesuvius, alışılmış bir manzara olan parıltısını gösterir,\nEsneyen turistlere, onun klişeleşmiş yüksekliğinden.'\n\n - Lord Byron"
 agassiz.711.g: "Harika!"
 agassiz.712.t: "Küçük Yanardağ Patlaması"
 agassiz.712.d: "[SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağ patladı. Bazı küçük köyler yok oldu ve tarlalar lavla kaplandı, ancak felaket sınırlı kaldı."
 agassiz.712.f: "'O zaman ne gördüm! Binlerce ateş dili çevreyi aydınlattı. Ağaçların tepelerinde alevler gördüm. Bir çatırtı duydum ve tam yanımda bir ateş perdesi gördüm. Deniz görünmüyordu. Her şey küllerle kaplıydı. Önümdeki elimi göremiyordum. Son gördüğüm şey, zemindeki tahta aralıklarından bir çeşme gibi fışkıran küllerdi. Ağır bir basınç hissettim, beni yere fırlattı. Sonra sanki hava emiliyormuş gibi geldi ve nefes alamadım.' -Johanna Beyerinck"
 agassiz.712.f_basic: "\n\n#YELLOW Yanardağ Gözlemevimizdeki bilim insanlarımız sayesinde felaket bizi tamamen hazırlıksız yakalamadı. Böylece önlem alabildik ve #G yıkımı bir miktar sınırlayabildik#!.#!"
 agassiz.712.f_advanced: "\n\n#YELLOW Yanardağ Gözlemevimizdeki mükemmel bilim insanlarımız sayesinde, hızla tahliye önlemleri başlatabildik ve koruyucu tedbirler alabildik. #G Yıkımı önemli ölçüde sınırlamayı başardık#!."
 agassiz.712.g: "Sadece biraz lava."
 agassiz.712.h: "Gözlemevinden herhangi bir haber var mı?"
 agassiz.712.i: "This might be interesting for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] and [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] students"
 agassiz.713.t: "Yanardağ Patlaması"
 agassiz.713.d: "[SCOPE.sState('agassiz_volcano_state').GetName] eyaletini şiddetli bir patlama sarstı. Tefa parçaları ve volkanik küller binaları ve ekinleri yok etti, halkımızdan canlar aldı."
 agassiz.713.f: "'Üstümüzde ve ada çevresinde, güçlü bir çıtırtılı ateş veya bir iki saniye aralıklarla ağır topçu ateşi gibi tuhaf bir ses duyduk. Beşte, kükreyen gürültü devam etti, gökyüzüne karanlık yayıldı ve üzerimize sıcak ponza taşı dolu yağdı, birçok parçası oldukça büyük ve epey sıcaktı.\n\nO gece, sürekli kül yağışından ötürü zifiri karanlıktı - gökyüzünde ve ada çevresinde kesintisiz şimşek çakmalarıyla yırtılıyordu.' -Kaptan Watson"
 agassiz.713.g: "Zavallı insanlar."
 agassiz.713.j: "Mağdurları desteklemek için mümkün olduğunca yardım gönder!"
 agassiz.714.t: "Mega Yanardağ Patlaması"
 agassiz.714.d: "[SCOPE.sState('agassiz_volcano_state').GetName] eyaletinde benzeri görülmemiş bir patlama, birçok insanın hayatını tamamen yok etti. Patlama yüzlerce mil öteden duyulabildi ve dağın çevresinde olma talihsizliğine uğrayan her şey anında harap oldu."
 agassiz.714.f: "'Kadınların çığlıklarını, bebeklerin ağlayışlarını ve erkeklerin bağırışlarını duyabiliyordunuz; bazıları ebeveynlerini, diğerleri çocuklarını veya eşlerini seslerinden tanımaya çalışıyordu. İnsanlar kendi kaderlerine veya akrabalarınınkine ağlıyor, bazılarıysa ölüm korkusuyla ölüm için dua ediyordu. Birçok kişi tanrıların yardımını diledi, ancak daha fazlası artık tanrı kalmadığını ve evrenin sonsuza dek ezeli karanlığa gömüldüğünü hayal ediyordu.' -Genç Plinius"
 agassiz.714.g: "Bir trajedi!"
 agassiz.715.t: "Duman ve Gürültü"
 agassiz.715.d: "[SCOPE.sState('agassiz_volcano_state').GetName]'daki yanardağ gürlüyor. Kraterin üzerinden dumanlar yükseliyor. Hepsi bu. Yerel halk rahatlamış durumda, turistler ve bilim insanları ise hayal kırıklığına uğramış."
 agassiz.715.f: "'Araştırmak için çok fazla, keyif almak için çok az. Ne kadar sevimsiz, kaprisli bir yanardağ!'"
 agassiz.715.g: "Uyanacak mı yoksa uyumaya devam mı edecek?"
 agassiz.721.t: "Sismik Dalgalar"
 agassiz.721.d: "Küçük bir sismik rahatsızlık, [SCOPE.sState('agassiz_earthquake_state').GetName] sakinlerini bu sabah yataklarından fırlattı. Küçük deprem sadece önemsiz hasara yol açtı, ancak sismologların ilgisini çekmeyi başardı."
 agassiz.721.f: "'Röportajcı: Şu an bulunduğunuz bina sallanmaya başlasa ve bir deprem olduğunu bilseniz, ne yapardınız?'\nCharles Richter: 'Koşmadan - yürüyerek - en yakın sismografa giderdim.'"
 agassiz.721.g: "İlginç."
 agassiz.722.t: "[SCOPE.sState('agassiz_earthquake_state').GetName] Depremi"
 agassiz.722.d: "[SCOPE.sState('agassiz_earthquake_state').GetName] eyaletine bir deprem vurdu; binaları yıktı, insanları yaraladı ve hatta canlar aldı."
 agassiz.722.f: "'Derinden, derin ve korkunç bir gürültü geldi, sonra Washington Caddesi'nden yukarıya doğru geldiğini gerçekten görebiliyordum. Bütün cadde dalga dalgaydı. Sanki okyanusun dalgaları üzerime geliyordu, geldikçe kabarıyordu.' -Jesse Cook"
 agassiz.722.f_basic: "\n\n#YELLOW Eğitimli sismologlarımız sayesinde, [SCOPE.sState('agassiz_earthquake_state').GetName]'ın depreme eğilimli bir bölge olduğu zaten biliniyordu. Önleyici tedbirler (örneğin inşaat alanında) sayesinde hasar kolayca en aza indirildi.#!"
 agassiz.722.g: "Bir trajedi!"
 agassiz.722.h: "Gözlemevi durumu nasıl değerlendiriyor?"
 agassiz.722.i: "Jeolojik araştırmalar için mükemmel bir alan."
 agassiz.722.j: "Mağdurlara destek olmak için mümkün olduğunca yardım gönder!"
 agassiz.723.t: "Büyük [SCOPE.sState('agassiz_earthquake_state').GetName] Depremi"
 agassiz.723.d: "[SCOPE.sState('agassiz_earthquake_state').GetName] eyaleti, benzeri görülmemiş ölçekte bir depremle harabeye döndü. Sayısız bina yıkıldı ve kaybedilen can sayısını tahmin etmek imkansız."
 agassiz.723.f: "'Deprem, San Francisco'da yüz binlerce dolar değerinde duvar ve baca yıktı. Ancak ardından gelen yangın, yüz milyonlarca dolar değerinde mülkü yaktı. Verilen gerçek hasarı yüz milyonlarca dolar içinde tahmin etmek mümkün değil. Tarihte modern bir imparatorluk şehri hiç bu kadar tamamen yok edilmemişti. San Francisco gitti. Ondan geriye kalan, sadece anılar ve dış mahallelerdeki birkaç ev. Sanayi bölgesi silindi. İş bölgesi silindi. Sosyal ve konut bölgesi silindi. Fabrikalar ve depolar, büyük mağazalar ve gazete binaları, oteller ve zenginlerin sarayları, hepsi gitti. Geriye, bir zamanlar San Francisco olan yerin eteklerindeki birkaç ev kaldı.' -Jack London"
