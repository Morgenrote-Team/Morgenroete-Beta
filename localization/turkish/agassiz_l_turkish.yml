 agassiz.917.tt: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] ve tüm sefer üyeleri karanlıkta ve umutsuzluk içinde can verir!"
 agassiz.909.tt: "Dünyanın Merkezine Yolculuk artık mümkün olmayacak."
 agassiz.915.tt: "Sefer üyelerimizden bazıları hayatını kaybedebilir."
 agassiz_lidenbrock_diary_modifier: "Otto Lidenbrock'un Günlüğü"
 agassiz_journey_coe_preparation_modifier: "Dünyanın Merkezine Yolculuk Hazırlıkları"
 agassiz_tragic_subterranean_accident_modifier: "Feci Yeraltı Kazası"
 je_agassiz_journey_coe: "Dünyanın Merkezine Yolculuk"
 je_agassiz_journey_coe_reason: "Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName], Alman jeolog Otto Lidenbrock'a ait, bir yeraltı mağara sistemine giden bir yolu işaret eden gizemli notlar buldu. Bu notlar, 16. yüzyılda Arne Saknussemm adlı İzlandalı bir simyacı tarafından kullanılmıştı. Kitaba göre giriş, İzlanda'daki bir yanardağda bulunuyor."
 je_agassiz_journey_coe_fail: "Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] ölür veya emekli olursa, sefer artık yürütülemez."
 agassiz.901.t: "Prof. Lidenbrock'un Günlüğü"
 agassiz.901.d: "During his volcano expedition, Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] made a strange find that [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetSheHe] only spoke about after [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetHerHis] return trip."
 agassiz.901.f: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName], şu an yanardağ seferini gölgede bırakan bir şey buldu. Bölgede bir zamanlar sönmüş bir yanardağa ait olduğuna inanılan bir mağarada, [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetSheHe] terk edilmiş bir jeolojik gözlem istasyonu keşfetti. Ancak soruşturulduğunda, yerel yetkililer burada herhangi bir seferin gerçekleşip gerçekleşmediği veya hangisi olduğu konusunda bize bilgi veremedi. Yanardağ bacasının daha yakından incelenmesi sırasında Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName], orada kişisel eşyaların olduğu kutular ve çuvallar, içlerinde bir akademisyene ait çanta bulunduğunu gördü. İçeride bir günlük vardı - Profesör Otto Lidenbrock'a aitti. Lidenbrock, volkanizma ve yeraltı mağara sistemleri konusunda uzmanlaşmış Hamburglu bir jeolog ve mineralogdu. Alanındaki en seçkin figürlerden biri olarak kabul ediliyordu, ancak aynı zamanda kavgacı ve aceleciydi. Üniversitedeki bir anlaşmazlığın ardından, son bir yolculukta iz bırakmadan ortadan kayboldu. Günlük, muhtemelen hayatındaki son durağına dair son bir ipucu - ve zengin mineralojik ve jeolojik çalışmaları göz önüne alındığında bilim için paha biçilmez bir değer! Ancak Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName], kitabı doğrudan en yakın üniversiteye göndermeyi kabul etmiyor, onu daha yakından incelemek istiyor. Sefer lideri, Lidenbrock'un günlüğünün, sıradan kaya formasyonlarının kataloglanmasından çok daha büyük bir şeye erişim sağlayabileceğini savunuyor..."
 agassiz.901.g: "Herkesin yararına olacak bir keşif."
 agassiz.901.h: "Dr. [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] onu saklamalı ve incelemeli."
 agassiz.902.t: "Prof. Otto Lidenbrock'un Sırrı"
 agassiz.902.d: "Yanardağ seferi sırasında bulunan kitap, jeoloğumuz üzerinde kötü bir etkiye sahip."
 agassiz.902.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] Yunanistan'dan döndüğünden beri, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] bir yanardağ boşluğunda bulduğu gizemli günlükten başka bir şeyle neredeyse hiç ilgilenmiyor. Karşılığında, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] siyasi ve bilimsel görevlerini ihmal etti. Çalışanlar, gecenin geç saatlerinde bile ışığının haftalardır yandığını bildiriyor. İşin tuhaf yanı, jeolog son zamanlarda çoğunlukla İskandinav edebiyatı getirtmiş. [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U]'nun, özellikle zor bir vaka çözülene kadar yeğeni ve evin aşçısıyla birlikte kendini [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] evine kilitlettiği söyleniyor. Jeoloğumuz kitabı derinlemesine inceledikçe, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] daha da manyaklaşıyor. Her şey, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]'nin giderek akıl hastalığına sürüklendiğini gösteriyor."
 agassiz.902.g: "Rahatsız edici."
 agassiz.903.t: "Dünyanın Merkezine Yolculuk"
 agassiz.903.d: "Prof. Lidenbrock'un günlüğünün uzun süreli araştırmasının ardından, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] bir atılım yaptı."
 agassiz.903.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] kendini tecrit etmişti. Lidenbrock günlüğüyle baş başa zaman geçirmek için dış dünyadan izole olmuştu. Daha sonra bize anlatacağı üzere, aylardır [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]'i cezbeden bir pasaj vardı. Kişisel notlara ek olarak, sayfaların arasında çok daha eski bir el yazması sayfası bulundu. Yaratıcı: Arne Saknussemm adlı 16. yüzyıl İzlandalı bir simyacı. Gizemli bir runik yazıt bırakmıştı ve bu yazıtı çözmenin [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]'in ilk düşündüğünden çok daha zor olduğu ortaya çıktı. Sonra, sanki bir sezgiymiş gibi, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] bilmeceyi çözdü. Görüldüğü üzere, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] haklıydı. Kitabın bir sırrı vardı; öyle büyük ve müthiş bir gizemdi ki bu, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]'i temelinden sarsmıştı. Çünkü simyacının mesajı şuydu: \n\n 'Snæfellsjökull'un kraterine in, ki Scartaris'in gölgesi Temmuz kalenderlerinden hemen önce okşar onu, ey cesur gezgin, ve dünyanın merkezine ulaşırsın. Bunu ben yaptım.' \n\n [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]'i daha da heyecanlandıran şey: Lidenbrock metne kendi el yazısıyla yeni runeler eklemişti. Onlar şöyleydi: 'Ben de'. Jeolog için açıktır ki bu sansasyonel ifadeler bilimsel doğrulama gerektirir. [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] bu nedenle, İzlanda yolculuğunu desteklememizi talep etti - [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] dünyanın merkezine [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself] gitmek istiyor!"
 agassiz.903.g: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] tamamen delirdi!"
 agassiz.903.h: "Doktor ne yaptığını biliyor. [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]'i destekle!"
 agassiz.909.t: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]'ın Talihsiz Sonu"
 agassiz.909.d: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]'ın yaşam koşullarındaki talihsiz bir değişiklik nedeniyle, dünyanın merkezine planlanan girişimimizi durdurmak zorundayız."
 agassiz.909.f: ""
 agassiz.909.g: "Üzücü."
 agassiz.911.t: "İzlanda"
 agassiz.911.d: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] liderliğindeki Dünyanın Merkezine Yolculuk Seferi, Reykjavík limanına vardı."
 agassiz.911.f: "Rejkiavik'te yolunuzu kaybetmek pek kolay olmazdı. Bu yüzden, tek iletişim aracı el kol hareketleri olduğunda kişiyi yanılgıya düşüren yolu sormak zorunluluğum yoktu. Kasaba, alçak ve bataklık bir düzlük boyunca, iki tepe arasında uzanıyor. Uçsuz bucaksız bir lav yatağı bir yanını sınırlıyor ve usulca denize doğru alçalıyor. Diğer yanda, kuzeyde Snæfell'in devasa buzuluyla çevrelenen geniş Faxa fiyordu uzanıyor ve Valkyria o sıralar onun tek sakiniydi. Normalde balıkçılığın İngiliz ve Fransız muhafızları bu fiyorda demirler ama tam o sırada adanın batı kıyılarında sefer halindeydiler. Rejkiavik'in sahip olduğu iki sokaktan en uzunu, sahile paralel uzanıyordu. Bu kasvetli yolları kısa sürede keşfettim; arada sırada, eskimiş bir halı parçası gibi görünen solgun çimlere ya da, cılız sebzeleri Lilliput masasında ancak yer bulabilecek olan, bir bostan manzarasına gözüm ilişiyordu. Birkaç cılız şebboy, havanın ve güneşin keyfini çıkarmaya çalışıyordu. Üç saat içinde kasabayı değil, çevresini de görmüştüm. Genel görünüm inanılmaz derecede kasvetliydi. Ağaç yok, ve neredeyse hiç bitki örtüsü yok. Her yerde çıplak kayalar, volkanik faaliyetin izleri."
 agassiz.911.g: "Böylece başlıyor."
 agassiz.912.t: "Snæfellsjökull"
 agassiz.912.d: "Ekip, İzlanda yanardağının kraterine ulaştı ve inmek üzere."
 agassiz.912.f: "Yemek çabucak mideye indirildi ve küçük ekip elinden geldiğince barındı. Yatak sert, barınak pek sağlam değildi ve deniz seviyesinden beş bin fit yüksekteki konumumuz kaygı vericiydi. Ertesi sabah keskin, sert havadan yarı donmuş halde uyandık, ama muhteşem bir güneşin ışığıyla. Granit yatağımdan kalktım ve önümde serilmiş muhteşem manzaranın tadını çıkarmak için dışarı çıktım. Başımı kaldırdım ve tam üstümde, çok küçük bir çevreye ama neredeyse mükemmel derecede yuvarlak bir gökyüzü parçasını çerçeveleyen, koninin üst açıklığını gördüm. Tam kenarda, sonsuz boşluğa karşı keskin ve net bir şekilde yükselen Saris'in karlı zirvesi belirdi. Henüz içine atlamak üzere olduğum dipsiz çukura aşağı bakmaya cesaret edememiştim. En son saat gelmişti. Çapının yüz fit, çevresinin üç yüz fit olduğundan bahsetmiştim. Çıkıntılı bir kayaya eğildim ve aşağıya baktım. Tüylerim korkudan diken diken oldu. Baş döndürücü bir boşluk hissi beni ele geçirdi. Ağırlık merkezimin yer değiştirdiğini hissettim ve baş dönmesi beynime sarhoşluk gibi çıktı."
 agassiz.912.g: "Gerçekten hepsi bu kadar iyi bir fikir miydi?"
 agassiz.913.t: "Su Arayışı"
 agassiz.913.d: "Yanardağa indikten sonra, su stokları tükendi. Sadece birkaç gün sonra, yolculuk çoktan ciddi bir tehlikede."
 agassiz.913.f: "Hiçbir mineralog, doğayı yerinde incelemek için kendini bu kadar harika bir durumda bulmamıştı. Sıkıcı, duyusuz, inert bir alet olan sondaj makinesinin kürenin iç yapısının yüzeyine getiremediği şeyleri, biz kendi gözlerimizle inceleyip kendi ellerimizle tutabildik. Yeşilin narin tonlarıyla renklenmiş şist yatakları boyunca, bakır ve manganez iplikleri, platin ve altın izleriyle birlikte dolambaçlı bir rota izliyordu. Düşündüm ki, burada yeryüzünün erişilmez derinliklerine gömülü, insanoğlunun açgözlü gözlerinden sonsuza kadar saklı ne zenginlikler var! Saat altı sıralarında bu muhteşem ışık şöleni hissedilir bir ihtişam azalması yaşadı, sonra neredeyse durdu. Öngördüğüm gibi, su, geri çekilme yürüyüşümüzün ilk gününün sonunda tamamen tükendi. Sıvı gıdamız artık sadece cin idi; ancak bu cehennemi sıvı boğazımı yakıyordu ve onun görüntüsüne bile katlanamıyordum. Sıcaklığı ve havayı boğucu buldum. Yorgunluk uzuvlarımı felç etti. Birden fazla kez hareketsiz bir şekilde yığılıp kaldım. Sonra mola verdik; amcam ve İzlandalı beni iyileştirmek için ellerinden geleni yaptılar. Ama öncekinin aşırı yorgunluğa ve susuzluğun işkencelerine karşı acı verici bir şekilde mücadele ettiğini gördüm. İki yolun birleştiği yere elleri ve dizleri üzerinde sürünerek ve yarı ölü halde vardık. Orada, cansız bir yığın gibi, lav zeminine uzanarak yığılıp kaldım."
 agassiz.913.g: "Yerin çok derinlerindeyiz - suyu orada aramalıyız."
 agassiz.913.h: "Yüzeye geri dönüp suyu orada aramalıyız."
 agassiz.914.t: "Mare Internum (İç Deniz)"
 agassiz.914.d: "Mağara sisteminde bir akıntıyı takip ettikten sonra, gezginler uçsuz bucaksız bir yeraltı deniziyle karşılaşır."
 agassiz.914.f: "Bir mucize eseri su bulduk: bir dere, soğuk suyu yerin derinliklerine taşıyor ve stoklarımızı dolduruyordu. Ama onu takip edip sonuna vardığımızda, daha da büyük bir sürpriz bizi bekliyordu. İlk başta neredeyse hiçbir şey göremedim. Işığa alışkın olmayan gözlerim hızla kapandı. Onları tekrar açabildiğimde, şaşkınlıktan çok daha fazla sersemlemiş halde duruyordum. Uçsuz bucaksız bir su kütlesi, bir gölün ya da okyanusun başlangıcı, göz alabildiğine uzanıyordu ve bana Xenophon'un on bin Yunanlısının uzun geri çekilişlerinden sonra aynı anda haykırdığı o açık denizi, 'Thalatta! thalatta!' denizi! denizi! çok güçlü bir şekilde hatırlattı. Derin girintili çıkıntılı kıyı, ince parıldayan kumdan bir şeritle çevriliydi; dalgalar usulca kıyıya vuruyor ve yaratılmış ilk varlıklar tarafından mesken tutulmuş küçük kabuklarla serpiliyordu. Dalgalar, geniş kapalı alanlara özgü o içi boş, yankılanan uğultuyla bu kıyıya çarpıyordu. Bu, dünyanın düzensiz kıyılarına sahip oldukça okyanus gibiydi, ancak ıssız ve görünüş olarak dehşet verici derecede vahşi. Kırk yedi gün boyunca dar bir galeride hapsedildikten sonra, tuzlu parçacıklarla yoğunlaşmış nemli bir havayı solumanın fiziksel zevkin doruk noktası olduğu kolayca anlaşılacaktır."
 agassiz.914.g: "Bir sal inşa et."
 agassiz.915.t: "Dev"
 agassiz.915.d: "Gizemli, kadim dev mantarların üzerindeki Rünik işaretler, Arne Saknussemm'in burada olduğuna işaret ediyor. Ancak tez için kanıt bulmak, devasa, ürpertici bir tarih öncesi insanın yanından geçmeyi gerektirir."
 agassiz.915.f: "Dağınık ışık, yoğun ve uzak çalılıklardaki en küçük nesneyi ortaya çıkarıyordu. Gördüğümü sanmıştım - hayır! Kendi gözlerimle, devasa kolosal formların hareket ettiğini gördüm. Onlar devasa hayvanlardı; bir mastodon sürüsüydü - fosil kalıntıları değil, yaşıyorlardı ve 1801'de Ohio bataklıklarında kemikleri bulunanlara benziyorlardı. O koca fillerin, uzun, esnek hortumlarının ağaçların altındaki toprağı bir yılanlar lejyonu gibi eşelediğini ve altüst ettiğini gördüm. Uzun fildişi dişlerinin, eski çürümüş kütüklere dalarken çıkardığı gürültülü çatırtıyı duyabiliyordum. İnanamaz bir şekilde başımı sallayarak baktım. Ama ilk başta inanmasam da duyularımın kanıtına boyun eğmek zorunda kaldım. Nitekim, çeyrek mil uzakta, devasa bir kauri ağacının gövdesine yaslanmış, yeraltı bölgelerinin Proteus'u, Neptün'ün yeni bir oğlu, bu sayısız mastodon sürüsünü izleyen bir insan duruyordu. Evet, gerçekten, kendisi daha da iriydi. Artık kemikler tarlasında kurumuş kalıntılarını kolayca kaldırdığımız onun gibi fosil bir varlık değildi; o canavarları kontrol edebilecek bir devdi. Boyu en az on iki fit idi. Bir bufalonunki kadar iri ve biçimsiz olan başı, dağınık saçlarının kalın ve dolaşık örtüsü içinde yarı gizlenmişti. Daha çok ilkel filin yelesine benziyordu. Elinde, bu jeolojik dönem çobanına layık bir asa olan muazzam bir dalı kolaylıkla sallıyordu."
 agassiz.915.g: "Riske atmak zorundayız."
 agassiz.915.h: "Bu çok tehlikeli - hemen yüzeye dön!"
 agassiz.916.t: "Arne Saknussemm'in El Yazması"
 agassiz.916.d: "Dev insanımsı varlıktan kaçtıktan sonra, gezginler her yerde Arne Saknussem'in baş harflerinin bulunduğu bir galeri buldular. Biraz aramadan sonra, İzlandalı simyacının gerçekten burada olduğuna dair kanıt buldular - efsanevi el yazması yerin derinliklerinde bulundu!"
 agassiz.916.f: "Başka bir çeyrek saat içinde çevik topuklarımız bizi bu korkunç canavarın erişim alanının ötesine taşımıştı. Ve yine de, şimdi sakin bir şekilde düşünebildiğimde, şimdi ruhum yeniden sakinleştiğinde, bu tuhaf ve doğaüstü karşılaşmanın üzerinden aylar geçtiğinde, ne düşüneceğim? neye inanacağım? Duyularımızın aldatılmış olmasının imkansız olduğu, gözlerimizin gördüğünü sandığımız şeyi görmediği sonucuna varmalıyım. Hiçbir insan bu yeraltı dünyasında yaşamaz; dünyanın yüzeyindeki sakinlerden habersiz ve onlarla bağlantısız olan, kürenin bu aşağı mağaralarında hiçbir insan nesli ikamet etmez. Buna inanmak saçmadır! Bunun, yapısı insana benzeyen, erken jeolojik çağlardan kalma bir maymun veya babun, bir protopiteka veya bir mezopiteka, Bay Lartet'in Sansau'daki kemik mağarasında keşfettiği gibi erken veya orta dönem bir maymun olabileceğini kabul ederim. Ama bu yaratık, modern paleontolojide bilinen tüm ölçümleri boyut olarak aştı. Ancak bir insanın, yaşayan bir insanın ve dolayısıyla şüphesiz başka nesillerin de orada, yerin bağrında gömülü olması imkansızdır. Ancak, şaşkınlıktan dilsiz, bunalmış ve stupora varan bir korkuyla vurulmuş halde, ışıltılı ormanı geride bırakmıştık. Korkunç canavarın peşimizde olabileceği korkusuyla koşmaya devam ettik. Bu bir kaçıştı, bir düşüştü, kâbuslara özgü o korkunç çekiştirme ve sürüklenme gibi. Ve, hararetle meraklanarak, yüksek duvar boyunca, bir galeriye açılabilecek her çatlağa göz atarak dikkatle baktık. Orada, bir granit levha üzerinde, zamanla yarı yenmiş iki gizemli kazınmış harf belirdi. Onlar cesur ve gözüpek gezginin baş harfleriydi: 'A. S.,' diye bağırdı amcam. 'Arne Saknussemm! Her yerde Arne Saknussemm!'"
 agassiz.916.g: "Sonunda - o bizim!"
 agassiz.917.t: "Dünyanın Merkezine Yolculuk Sona Erdi"
 agassiz.917.d: "Dünyanın merkezine yolculuk başarısız oldu. Sefer üyelerinin tamamının su eksikliğinden susuzluktan öldüğünden şüpheleniyoruz."
 agassiz.917.f: "Saat akşam sekizdi. Henüz hiçbir su belirtisi ortaya çıkmamıştı. Korkunç acılar çekiyordum. Amcam ardı ardına büyük adımlar atıyordu. Durmayı reddetti. Uzaktaki kaynakların mırıltısını endişeyle dinliyordu. Ama hayır, etrafı ölü bir sessizlik kaplamıştı. Ve şimdi uzuvlarım beni taşımakta zorlanıyordu. Amcamı durdurmamak için acı ve işkenceye direndim, bu onu umutsuzluğa sürüklerdi, çünkü gün sonuna yaklaşıyordu ve bu onun son şansıydı. Sonunda tamamen düştüm; bir çığlık attım ve yere yığıldım. 'Bana gelin, ölüyorum.' Amcam adımlarını geri çevirdi. Kolları bağlı halde bana baktı; sonra dudaklarından şu mırıldanmış sözler döküldü: 'Her şey bitti!' Gördüğüm son şey, öfkenin korkunç bir ifadesi oldu ve gözlerim kapandı."
 agassiz.917.g: "Ne trajedi!"
 agassiz.918.t: "Stromboli"
 agassiz.918.d: "Dünyanın merkezine yolculuk tam bir başarıydı - bilim insanlarımız Stromboli yanardağının bir patlamasının ardından güvenle kahramanlar olarak döndüler!"
 agassiz.918.f: "Ardı arkası kesilmeyen patlamalar, yüksek sesli infilaklar, etrafımızdaki kayaların genel bir sarsılışı ve salımızın bir kez çaresizce döndürüldüğü dönen bir hareketin karmakarışık bir izlenimi kaldı aklımda. Yoğun bir kül yağmurunun ortasında, lav seli üzerinde sallanıyordu. Hırlayan alevler bize ateşli dillerini uzattı. Aşağıdan gelen, aynı anda üfleyen muazzam demir ocaklarının üflemelerini andıran vahşi, şiddetli fırtınalı rüzgar esintileri vardı; ve ateşle aydınlanan Hans'ın silüetini bir an için gördüm; ve sahip olduğum tek his, bir topun ağzından canlı canlı uçurulmaya mahkum edilen mutsuz bir suçlunun, tetik çekilmeden hemen önceki hissi ne olmalıysa, uçuşan uzuvların ve et ve deri parçalarının titreyen havayı doldurup kanlı zemini lekelemesi gibiydi. \n\n Gözlerimi tekrar açtığımda kendimi kılavuzumuzun güçlü eliyle kemerimden tutulmuş halde buldum. Kendimi, eğer o tarafa biraz yaslansaydım beni yutacak olan, ağzı açık bir uçurumdan sadece iki metre uzakta, bir dağın yamaç tarafında yatarken buldum. Başımızın üstünde, beş yüz fit veya daha yüksekte, bir volkanın kraterini gördük; on beş dakikalık aralıklarla, yüksek sesli patlamalarla, süngertaşı, kül ve akan lavlarla karışık muazzam ateş sütunları çıkıyordu. Dağın, kocaman bir balina gibi nefes alıyormuş ve muazzam hava deliklerinden ateş ve rüzgar üflüyormuş gibi görünen kabarmasını hissedebiliyordum. Aşağıda, oldukça dik bir yamaçtan, sekiz yüz dokuz yüz fit aşağıya lav nehirleri akıyordu ve dağa yaklaşık 1.300 veya 1.400 fitlik bir yükseklik veriyordu. Ama dağın tabanı, içinde zeytin, incir ve salkımlı mor üzümlerle kaplı asmaları ayırt edebildiğim, mükemmel bir yeşillik koruluğunun içinde gizlenmişti."
 agassiz.918.g: "Ne macera!"
 agassiz.919.t: "Bir Dev Tarafından Yenildi"
 agassiz.919.d: "Dünyanın merkezine yolculuk başarısız oldu. Sefer üyelerinin tamamının bir dev tarafından canlı canlı yendiğinden şüpheleniyoruz."
 agassiz.919.f: "En azından biz öyle şüpheleniyoruz."
