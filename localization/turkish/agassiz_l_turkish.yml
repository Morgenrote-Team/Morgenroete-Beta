l_turkish:
 agassiz_geology_tech: "Jeoloji"
 agassiz_geology_tech_desc: "1815'te kanal inşaatçısı William Smith, hem fosil içeriğini hem de litolojiyi dikkate alan İngiltere ve Galler'in jeoloji haritasını yayınladı. Smith, belirli kayaç dizilerinin aynı zamanda çok spesifik, benzersiz bir faunal dizi ile karakterize edildiğini fark etti. 1827'de Leopold von Buch, göreceli tarihlendirmeye olanak tanıyan fosiller için 'rehber fosil' terimini ortaya attı. Bu andan itibaren, Dünya'nın gerçek yaşı sorusunu aydınlatmak bilimsel bir mesele haline geldi."
 notification_agassiz_yearly_minerals_notification_name: "Yıllık Jeolojik Rapor"
 notification_agassiz_yearly_minerals_notification_desc: "Bu yıl [GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=] yeni [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] bulduk ve kaydettik."
 agassiz_sounding_tech: "Eko Sondaj"
 agassiz_sounding_tech_desc: "Derinlik ölçer ilk olarak denizaltı savaşına bir yanıt olarak icat edildi. Ancak daha sonra birçok sivil alanda da kullanılacaktı: örneğin balık sürülerinin yerini tespit etmede ve derin deniz araştırmalarında."
