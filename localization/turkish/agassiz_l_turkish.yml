 agassiz.101.t: "Yeni Cevher Damarları"
 agassiz.101.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] madencilik şirketleri için birkaç yeni cevher damarı bulduktan sonra geri döndü. Tesislerin daha fazla genişletilmesi onun sorunu değil."
 agassiz.101.f: "'Her şeyin bir sınırı vardır. Demir cevheri, altına dönüşecek şekilde eğitilemez.' -Mark Twain"
 agassiz.101.g: "İyi iş çıkardın."
 agassiz.102.t: "Petrol!"
 agassiz.102.d: "After Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] discovered new oil sources, the black gold bubbled up. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] considers [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] work to be done for the time being.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_oil_rigs_buildings_var').GetValue|V0]"
 agassiz.102.f: "'Başarının formülü: erken kalk, sıkı çalış, petrol bul.' -J. Paul Getty"
 agassiz.102.g: "Hiçbir zaman yeterince petrolün olamaz."
