 agassiz.801.t: "Sismometre"
 agassiz.801.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] ve [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] bugün sismik aktiviteyi kaydetmek için yeni cihazlarını tanıttılar. Sismometre, depremleri daha iyi tespit etmeye yönelik ilk adımdır."
 agassiz.801.f: "1839'da İskoçya'daki Comrie yakınlarında meydana gelen bir dizi depreme yanıt olarak, Birleşik Krallık'ta daha iyi deprem tespit cihazları üretmek için bir komite kuruldu. Bunun sonucunda, James David Forbes tarafından inşa edilen ve 1842'de David Milne-Home'un bir raporunda sunulan, sarkaçın üzerindeki kağıda yerleştirilmiş bir kalem kullanarak sismik aktivite ölçümlerini kaydeden ters bir sarkaçlı sismometre ortaya çıktı. Milne'in raporlarına göre, sunulan tasarımlar etkili olmadı. 1841'de bu enstrümanı tanımlamak için seismometer (sismometre) kelimesini türeten Milne oldu."
 agassiz.801.g: "Akademisyenlerimiz için kesinlikle faydalı."
 agassiz.801.h: "Bilim için kesinlikle faydalı."
 agassiz.802.t: "Sismograf"
 agassiz.802.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] ve [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] bugün sismik aktiviteyi kaydetmek için yeni cihazlarını tanıttılar. Önceki sismometreden önemli ölçüde üstün ve deprem alanlarını çok daha iyi tespit edebiliyor. Bu, acil durumlar için daha hassas hazırlıklar yapmamızı sağlıyor."
 agassiz.802.f: "İlk sismograflar 1870'ler ve 1880'lerde icat edildi. İlk sismograf, 1875 civarında Filippo Cecchi tarafından üretildi. Ancak, alet yeterince hassas değildi ve alet tarafından üretilen ilk sismogram, John Milne tasarımını çoktan Japonya'da göstermiş olduğu 1887 yılında kaydedildi. 1880'de, ilk yatay sarkaçlı sismometre, 1880'den 1895'e kadar Japonya'da yabancı hükümet danışmanları olarak çalışan John Milne, James Alfred Ewing ve Thomas Gray'den oluşan ekip tarafından geliştirildi. Milne, Ewing ve Gray, son beş yılda Meiji Hükümeti tarafından Japonya'nın modernleşme çabalarına yardımcı olmaları için işe alınmışlardı ve 22 Şubat 1880'de Yokohama'da meydana gelen bir Depreme yanıt olarak Japonya Sismoloji Derneği'ni kurdular."
 agassiz.802.g: "Jeoloji için kesinlikle faydalı."
 je_agassiz_seismometer: "Sismometre"
 je_agassiz_seismometer_reason: "The seismometer is a further development of the seismoscope. It is still a very limited device for detecting earth tremors, but can at least be used as a means of recording that an earthquake has occurred.\n\nYou will gain progress if you have both an [concept_tesla_engineer] and a [concept_agassiz_geologist]"
 je_agassiz_seismometer_goal: "Bir jeolog ve bir mühendis, yeni cihaz üzerinde birlikte [JournalEntry.GetTotalGoalValue|V0] hafta çalışmalıdır."
 je_agassiz_seismograph: "Sismograf"
 je_agassiz_seismograph_reason: "A seismograph on a seismometer improves the recording of earthquakes and earth tremors in an amazing way. This would finally make a more modern type of seismology possible. A seismoscope would trigger the device to begin recording, and then a recording surface would produce a graphical illustration of the tremors automatically (a seismogram).\n\nYou will gain progress if you have both an [concept_tesla_engineer] and a [concept_agassiz_geologist]"
 je_agassiz_seismograph_goal: "Bir jeolog ve bir mühendis, yeni cihaz üzerinde birlikte [JournalEntry.GetTotalGoalValue|V0] hafta çalışmalıdır."
 agassiz_seismometer_done_tt: "Jeolog ve mühendis, cihaz hakkındaki teorik ön değerlendirmelerini tamamlar ve sismometreyi inşa etmeye başlar."
 agassiz_seismograph_done_tt: "Jeolog ve mühendis, cihaz hakkındaki teorik ön değerlendirmelerini tamamlar ve sismografı inşa etmeye başlar."
 agassiz.302.t: "Gayzer"
 agassiz.302.d: "In  [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetHerHis] search for special geological features, [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] came across a phenomenal natural spectacle in the remoteness of [SCOPE.sState('agassiz_geyser_state').GetName]. It looks like there are geysers in the area!"
 agassiz.302.f: "Gayzer, suyunu düzenli veya düzensiz aralıklarla bir fıskiye olarak püskürten sıcak bir su kaynağıdır. Böyle bir püskürmeye patlama (eruption) denir. Gayzerler ismini, İzlanda'daki Büyük Geysir'den alır. Gayzerler, yalnızca birkaç yerde büyük ölçekte var olan özel bir jeolojik ve iklimsel koşul kombinasyonu gerektirir. Gayzerler üç faktöre bağlıdır: bir akifer şeklinde su kaynağı, bir ısı kaynağı ve ilişkili boru hattı sistemine en az bir daralmaya sahip bir rezervuar. Dünyada var olanların yaklaşık yarısı olan 300'den fazla aktif gayzer, Yellowstone Ulusal Parkı'nda bulunmaktadır."
 agassiz.302.g: "Gayzerin dakikalık mı yoksa saatlik bir ritmi mi var?"
