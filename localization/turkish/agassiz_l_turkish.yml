 agassiz.812.t: "Yeni Bir En Yüksek Zirve?"
 agassiz.812.d: "Yıllarca Dhaulagiri, ölçülmüş en uzun dağ olarak kabul edilmişti, ancak [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] ikna olmamıştı. Aylar süren üçgenleme ve amansız hesaplamaların ardından, puslu havadan yeni bir aday belirdi: Kangchenjunga."
 agassiz.812.f: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'ın aletleri, fırtınalarla hırpalanmış olsa da, çok az şüphe bıraktı. 28.000 fitin üzerindeki bu uzak zirve, Sikkim-Nepal sınırında önceki tüm rekorları geride bıraktı. Coğrafya, haritacılık ve ulusal gurur üzerindeki etkileri derindi."
 agassiz.812.g: "Dağ daha basit bir isim seçemez miydi?"
 agassiz.812.tt: "#V Kangchenjunga#! artık dünyanın en yüksek dağı olarak kabul ediliyor."
 agassiz.813.t: "Tepenin Kralı"
 agassiz.813.d: "Bengal'deki bir tepenin üzerinde, pirinç aletleri gökyüzüne doğrultmuş sessiz figürlerle başladı. Aralarında, imkansızı doğrulayan hesaplamalarıyla [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] da vardı: Zirve XV—belirsiz, uzak, isimsiz—şimdiye kadar ölçülmüş herhangi bir zirveden daha yüksekte duruyordu."
 agassiz.813.f: "Bu duyuru bilim çevrelerinde şok etkisi yarattı. 29.000 fit yüksekliğindeki bu Himalaya devi, Kangchenjunga ve Dhaulagiri'yi gölgede bıraktı. Henüz isimsiz olsa da, akademisyenler şimdiden ona 'Dünyanın Çatısı' demeye başladılar."
 agassiz.813.g: "Kimsenin hatırlamadığı rastgele bir Britanyalı ölçmene ithafen isimlendirsinler!"
 agassiz.813.tt: "#V Everest Dağı#! artık dünyanın en yüksek dağı olarak kabul ediliyor."
