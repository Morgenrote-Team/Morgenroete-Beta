 agassiz.103.t: "Jeoloji Ekibi Ayrılıyor"
 agassiz.103.d: "After the geological team has finished its work, the research assistants return to their home country. The formations they found are now also accessible to our scientists."
 agassiz.103.f: "'Bu bölümü Profesör Agassiz'in bir sözünü alıntılayarak bitirebilirim: Bilimde yeni ve şaşırtıcı bir gerçek ortaya çıktığında, insanlar önce 'doğru değil' der, sonra 'dinimize aykırı' der ve en sonunda 'bunu zaten herkes biliyordu' der.' -Charles Lyell"
