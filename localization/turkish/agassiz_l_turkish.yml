 je_agassiz_volcano_expedition: "Yanardağ Keşif Gezisi"
 je_agassiz_volcano_expedition_reason: "Profesör [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], bir uzman ve asistanlar ekibiyle birlikte [SCOPE.sState('agassiz_volcano_state').GetName]'da bir yanardağ keşif gezisinde. Keşif bütçesi maksimum 2 yıl ile sınırlı. Genellikle keşif her ay bir miktar ilerleme kaydeder ve bir buçuk yıl sonra araştırma çalışmalarını tamamlamış olmalıdır. Ancak, olağandışı olaylar - ister hoş bilimsel ister nahoş felaketler olsun - olayları etkileyebilir. Kural olarak: tehlike seviyesi asla maksimuma ulaşacak kadar yüksek olmamalı. Bu bir çocuk oyunu değil. Yanardağlarla oynamayın."
 agassiz.21.t: "Osservatorio Vesuviano (Vezüv Gözlemevi)"
 agassiz.21.d: "Jeolojide, Vezüv, tüm volkanoloji hakkında sonuçlar çıkarmak için model bir yanardağ olarak kabul edilir. 17. yüzyıldan beri artan aktivitesi ve daha yeni patlamaları tahmin edebilme ve bilimsel olarak inceleyebilme umuduyla, devlet yönetimi yamaçlarına bir volkanoloji gözlemevi inşa etmeye karar verdi."
 agassiz.21.f: "Vezüv Gözlemevi (İtalyanca: Osservatorio Vesuviano), İtalya'nın Campania bölgesindeki üç volkanik alanı (Vezüv Yanardağı, Campi Flegrei ve Ischia) izleme merkezidir. İki Sicilya'nın Kralı II. Ferdinand tarafından 1841'de Vezüv Yanardağı'nın yamaçlarında kurulan gözlemevi, dünyanın en eski volkanoloji enstitüsüdür."
 agassiz.21.g: "Volkanolojinin ilk ulusuyuz."
