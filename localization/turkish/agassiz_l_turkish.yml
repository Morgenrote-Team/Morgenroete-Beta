 je_agassiz_improve_mines_project_reason: "Your [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is feverishly searching ore veins and other ways to improve the [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nThe project will get progress every month. Once the progress reaches #V 24 Points#! the building will receive the new $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]. Additionally, you will also gain #p 2500#! @agassiz_mineral! [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]\n$mr_divider_for_je$\nCurrent Building: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_agassiz_improve_mines_project_modifier_1_type')]\n\nTotal Remaining Buildings (excluding current): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n$concept_agassiz_minerals$ from Project: [JournalEntry.MakeScope.ScriptValue('agassiz_generic_minderals_from_mine_project_value')|+0] @agassiz_mineral!\n\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('agassiz_monthly_geologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('agassiz_monthly_geologist_project_progress_value')|+2] #!#!"
