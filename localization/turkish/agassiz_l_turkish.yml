 agassiz_deep_sea_research_tech: "Deep Sea Research"
 agassiz_deep_sea_research_tech_desc: "In the 1930s, Otis Barton and William Beebe pioneered the use of the Bathysphere, a spherical steel pressure vessel designed to withstand the crushing weight of the abyss. This invention allowed humans to observe the deep ocean firsthand for the first time, reaching a record depth of 923 meters in 1934 off the coast of Bermuda. Inspired by these successes and his own high-altitude balloon flights, the Swiss physicist Auguste Piccard began adapting his pressurized cabin designs to create the Bathyscaphe, a self-propelled deep-sea submersible."
