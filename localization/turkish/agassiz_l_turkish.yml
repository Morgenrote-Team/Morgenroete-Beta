 agassiz_volcanologist: "Volkanolog"
 agassiz_volcanologist_desc: "Volkanologlar, yanardağlar konusunda uzmanlardır ve onları araştırmada özellikle yardımcı olurlar."
 agassiz.100.t: "Cevher Arayışı"
 agassiz.100.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] ekipmanlarını topladı ve cevher aramaya başlamak için tüm derslerini iptal etti. Soru şu: Hangi tip hammadde yataklarını araştırmalı?"
 agassiz.100.f: ""
