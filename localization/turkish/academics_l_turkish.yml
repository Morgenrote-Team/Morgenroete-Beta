 je_academics_giant_of_the_past: "Paleontolojik Odak: Geçmişin Devi"
 je_academics_giant_of_the_past_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] toplamamızı ve bir [concept_dubois_dinosaur_skeleton] yeniden inşa etmemizi istedi. Hangi durumda olduğu ikincil kalır - asıl mesele koleksiyonumuzda görkemli bir parçaya sahip olmamızdır. Dinozor kemikleri Büyük Oluşumlarda bulunur. Topraklarımızda bir tane yoksa, paleontologumuzun yurtdışında arama yapabilmesi için bir [concept_dubois_paleontological_licence] avantajlı olur."
 academics.2303.t: "Geçmişin Devi"
 academics.2303.d: "Bazı önde gelen bilim insanları, paleontolojik ilerlemelerimize rağmen henüz tam bir dinozor iskeleti sergilemediğimizden yakındı. Bilimsel Topluluğumuz da bir mektupta bu talihsiz durumu derinlemesine üzüntüyle karşıladı ve bu durumun düzeltilmesini istiyor."
 academics.2303.f: "BİR DİNOZOR İSTİYORUZ, VE HEMEN ŞİMDİ!\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2303.g: "Mükemmel bir girişim!"
 academics.2303.h: "Burası küçük çocuklar için bir eğlence parkı değil, bir bilim enstitüsü."
 academics.2304.t: "Dehşet Verici Kertenkele"
 academics.2304.d: "Yeni dinozor, paleontolojik koleksiyonun en muhteşem parçasıdır. Her gün yeni ziyaretçiler iskeleti görmek için sergiye akın ediyor."
 academics.2304.f: "Bir tane daha alabilir miyiz?\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2304.g: "Kendi dinozoruz!"
 academics.2305.t: "Kertenkele Yok"
 academics.2305.d: "Planlanan dinozor iskeleti için ayrılan platform boş kalıyor. Bilimsel Topluluk buna büyük bir rahatsızlıkla tepki verdi."
 academics.2305.f: "Daha net olmamız gerekiyor mu?\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2305.g: "Başka bir oyuncak bul!"
 academics.2306_goal_tt: "#G 3#! #O Özel Fosil#! bul"
 academics.2306_reward_tt: "Ödül olarak, [concept_dubois_paleontologist]'imiz #p 50 Tecrübe#! kazanacak. Henüz bir [concept_dubois_paleontologist]'imiz yoksa, bir tane alacağız. Ayrıca büyük bir teknoloji yatırımı alacağız."
 je_academics_special_fossils: "Paleontolojik Odak: Özel Fosiller"
 je_academics_special_fossils_reason: "Özel fosiller, olağanüstü statüleri nedeniyle ayrı olarak ele alınan benzersiz fosillerdir. Bunlar arasında Archeopteryx veya Ichthyostega gibi geçiş formlarının yanı sıra dev tembel hayvan Megatherium veya yunus benzeri Ichthyosaurus gibi büyük soyu tükenmiş memeli türleri de bulunur. Ancak bir dönemi tanımlamak için kullanılan daha küçük fosiller - en bilinenleri amonitler ve trilobitler - de bu kategoriye aittir. Toplamda, yalnızca oluşumlarda değil, aynı zamanda bilimsel keşif gezilerinde de bulunabilen bir düzine özel fosil vardır."
 je_academics_special_fossils_success: "#G 3#! #O Özel Fosil#! bul"
 academics.2306.t: "Olağanüstü Fosiller"
 academics.2306.d: "Bilimsel Topluluk, olağanüstü fosillerle ilgili olarak bizden olağanüstü bir istekte bulunuyor."
 academics.2306.f: "Hayvan soyunun tarihi, araştırmacılarımızın her gün biraz daha ortaya çıkardığı bir doğa sırrıdır. Özel bir rol, türler arasındaki eşiklerde yer alan, sözde 'kayıp halkalar' olan bu formlar tarafından oynanır. Aynı zamanda, etkilemek için dinozor olmak zorunda olmayan gezegenimizde olağanüstü yaratıklar var: kılıç dişli kaplanlar veya dev tembel hayvanlar gibi soyu tükenmiş memeliler. En az 3 özel fosil toplarsak, enstitümüzün itibarını dünyada daha da güçlendirebiliriz.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2306.g: "Special Fossils for a special collection."
 academics.2306.h: "Bilimsel kapasitemizi daha anlamlı bir şeye odaklayamaz mıyız?"
 academics.2307.t: "Şaşırtıcı Fosil Koleksiyonu"
 academics.2307.d: "Ulusal Paleontoloji Enstitüsü'nün en önemli uluslararası koleksiyonlardan birine sahip olduğundan şüphe yoktur. Bu kadar olağanüstü parçalara sahip karşılaştırılabilir başka bir yer bulmak zordur."
 academics.2307.f: "Özel fosiller her zaman ilk düşünüldüğü kadar etkileyici olmayabilir, ancak büyük bilimsel değere sahiptirler. Bu nedenle Bilimsel Topluluk bir teşekkür mektubu gönderdi. Önümüzdeki günlerde özel bir sergi olacak."
 academics.2307.g: "Muhteşem."
 academics.2308.t: "Özel Hayal Kırıklığı"
 academics.2308.d: "Bilimsel Topluluk, son paleontolojik başarısızlık karşısında endişesini dile getirdi."
 academics.2308.f: "Ülkenin doğa tarihi endişelerinin tamamen göz ardı edilmesi ulusal bir trajedidir. Paleontolojik araştırma, ölü kuşlar ve kertenkeleler hakkında saçmalık olarak reddediliyor, özel keşif gezileri için destek ödemeleri nadiren yapılıyor ve en küçük dilekler bile görmezden geliniyor. Suçluyorum!\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2308.g: "Ah canım."
 ademics_no_paleontological_hero_modifier: "Paleontolojik Kahraman Yok"
 academics.2309_goal_tt: "#o ünlü#! bir [concept_dubois_paleontologist]'e sahip ol"
 academics.2309_reward_tt: "Ödül olarak, #p 120#! [concept_academics_progress] kazanacağız."
 je_academics_famous_paleontologist: "Paleontolojik Odak: Ünlü Paleontolog"
 je_academics_famous_paleontologist_reason: "Bir [concept_dubois_paleontologist]'in yükselişi, tecrübesinin iyileştirilmesiyle birlikte gelir. Her akademisyen gibi, bir paleontolog da yılda 5 tecrübe puanı alır. Formasyonların başarılı paleontolojik araştırmalarında ek tecrübe kazanır. Ek olarak, bir paleontolog Dağcılık keşif gezilerinde ve Pasifik keşif gezilerinde kullanılabilir. Dinozor iskeletlerini başarıyla inşa etmek ve yeniden birleştirmek de bir paleontologun tecrübesini artırmaya yardımcı olur."
 academics.2310.g: "Gençlik için bir ilham kaynağı."
 academics.2311.t: "Bir Paleontoloji Kahramanı Yok"
 academics.2311.d: "Ne sebeple olursa olsun, bir paleontoloğu tanıtıp dünya çapında üne kavuşmasını sağlayamadık."
 academics.2311.f: "Ne yazık ki, bu başarısızlık, bilimsel disiplinlerin lüks (ornitoloji gibi) konular olarak görülmeye devam etmesi ve akademik çalışmalara ve aktif araştırma hizmetine olan hevesin sınırlı kalması anlamına geliyor. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri yaptıkları görüşmelerde hoşnutsuzluklarını dile getiriyor. Entelektüel elit, bu durumdan hükümeti sorumlu tutuyor."
 academics.2311.g: "Hayal kırıklığı yaratan."
 academics_splendid_dinosaur_collection_modifier: "Muhteşem Dinozor Koleksiyonu"
 academics.2312_goal_tt: "En az #G 5#! #o Dinozor Derecelendirmesi#!ne sahip ol!"
 academics.2312_reward_tt: "Ödül olarak Aydınlar #p 5 Onay#! kazanacak. Ayrıca, #p %10#! daha fazla prestij kazanacaksınız ve dernek teknolojilerinin maliyeti 10 yıl boyunca #p %5#! azalacak."
 je_academics_dinosaur_rating: "Paleontolojik Odak: Dinozor Derecelendirmesi"
 je_academics_dinosaur_rating_reason: "#O Dinozor Derecelendirmesi#!ni iyileştirmek için yalnızca yeni dinozor iskeletleri değil, aynı zamanda onların mükemmel bir rekonstrüksiyonu da gereklidir. Bu yıllar alabilir. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bu nedenle bir zaman sınırı koymamaya karar vermiştir."
 je_academics_dinosaur_rating_success: "En az #G 5#! #o Dinozor Derecelendirmesi#!ne sahip ol!"
 academics.2312.t: "Paleontolojinin İhtişamı"
 academics.2312.d: "Bilimsel araştırmamızın paleontoloji dalı zaten iyi bir üne sahip. Şimdi, dinozor sergimizi önemli ölçüde iyileştirerek bunu dünya çapında duyurma zamanı."
 academics.2312.f: "Sergimizde farklı bir dinozor sergilemek isteyebiliriz. Daha fazla sayıda iskelet yalnızca bilimsel araştırmaya değil, aynı zamanda ulusal itibarımıza da fayda sağlayacaktır. Tüm dünya dinozor kemikleri için kazı yapıyor ve daha önce bilinmeyen tarih öncesiyle büyüleniyor. Sadece miktarla ilgili olmamalı, aynı zamanda kaliteyle de ilgilenmeliyiz. Dinozor iskelet rekonstrüksiyonunda öncü olmayı hedeflemeliyiz.\n\nSaygılarımızla, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2312.g: "Bu devasa bir girişim olacak!"
 academics.2312.h: "Yine mi bu paleontolojik saçmalık."
 academics.2313.t: "Muhteşem Bir Koleksiyon"
 academics.2313.d: "Bilimsel Dernek, bugün dinozor iskeletlerinden oluşan özel bir sergi açılışını gururla duyurdu."
 academics.2313.f: "Nihayet ulusumuzdaki paleontolojik araştırmaların yüksek seviyesini vurgulayan bir dinozor koleksiyonuna sahip olduğumuz için hükümete minnettarız. Bundan daha seçkin koleksiyonlar var denemez. Bu, çok fazla sıkı çalışma ve emek, ayrıca bir araştırma susuzluğu ve ısrar gerektirdi. Toplum bu çalışmaya gururla bakabilirken, yurt dışındakiler kıskançlıkla bakıyor. Beyefendiler: Bu, genel olarak bilim ve özellikle paleontoloji için harika bir gün!\n\nSaygılarımızla, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2313.g: "Harika!"
