 je_academics_found_archaeological_museum: "Arkeolojiye Odaklan: Müze Kur"
 je_academics_found_archaeological_museum_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bilgiyi ve aynı zamanda entelektüellerimizin yaşam standardını artırmak için bir Arkeoloji Müzesi inşa etmemizi istiyor. Bir müze inşa etmek, rastgele bir hediye veya yerel bir kazı yoluyla edinme konusunda aşırı şanslı olmadığımız sürece, bir [concept_lepsius_archaeologist] tarafından bir [concept_lepsius_expedition] sırasında bulunması gereken #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] gerektirir.\nBu aynı zamanda çok önemli çünkü profesyonel arkeolojik slogan 'Bu bir müzede olmalı!' gerçek bir müze olmadan pek bir anlam ifade etmezdi.\n\nAslında, bu oldukça utanç verici olurdu."
