 academics.1010.t: "Kadınlar Okumak İstiyor?"
 academics.1010.d: "Birkaç kadın üniversitelerimizden birinde okumak için başvurdu. Şimdi onlar için okumanın yasal olup olmadığı ve hükümetimizin kadınların okuması konusundaki resmi tutumunun ne olduğu sorusu ortaya çıktı."
 academics.1010.f: "\"Kadınların beyinleri mantıksal düşünceler için değil, duygular içindir. Okumalarına izin verilmemelidir!\"\n\n\"Sadece bir kadının sizden daha yetenekli bir bilim insanı olacağından korkuyorsunuz. Ki bu kesinlikle olacak, çünkü argümanlarınızda hiçbir bilimsel temel yok! Kadınların erkeklerle aynı koşullarda okumasına izin verin!\""
 academics.1010.g: "Okumalarına izin verin!"
 academics.1010.h: "Bekle, şimdiye kadar okuyamıyorlar mıydı?"
 academics.1010.i: "Kadınların yeri ocak başıdır!"
 academics.1011.t: "Parlak bir Kadın Bilim İnsanı"
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] üniversitelerimizden birinde sınıfının en iyisi olarak mezun oldu. Erkeklerin baskın olduğu bir alanda eğitimini rekor sürede bitirmeyi başardı ve alanında çalışmaya hevesli. O parlak bir..."
 academics.1011.f: "İnanılmaz dereceniz için içten tebriklerim! Bir kadın için bunun mümkün olabileceğini kim düşünürdü!"
 academics.1011.g: "...Mühendis"
