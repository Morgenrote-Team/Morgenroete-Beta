 academics.21.t: "Bizim [concept_tesla_engineer] vefat etti."
 academics.21.d: "Onlarca yıl boyunca [concept_tesla_engineer] olarak görev yaptıktan sonra, eski #b #ORANGE Baş Mühendisimiz#!#! vefat etti. Böyle olağanüstü bir bilim insanının yerini hiç doldurabilecek miyiz?"
 academics.21.g: "Bu muazzam bir kayıp!"
 academics.21_tt: "Oyun bazen karakterleri öldürebilir. Bir modun bunun olmasını engellemesi mümkün değildir. Bu olay, söz konusu bilim insanının rolünü oyundan kaldırarak, onun hayaleti tarafından rahatsız edilmenizi önler."
 academics.22.t: "Bizim [concept_verrier_astronomer] vefat etti."
 academics.22.d: "Onlarca yıl boyunca [concept_verrier_astronomer] olarak görev yaptıktan sonra, eski #b #ORANGE Baş Gökbilimci#!#! vefat etti. Böyle olağanüstü bir bilim insanının yerini hiç doldurabilecek miyiz?"
 academics.26.t: "Bizim [concept_dubois_naturalist] vefat etti."
 academics.26.d: "Onlarca yıl boyunca [concept_dubois_naturalist] olarak görev yaptıktan sonra, eski #b #GREEN Baş Doğa Bilimcimiz#!#! vefat etti. Böyle olağanüstü bir bilim insanının yerini hiç doldurabilecek miyiz?"
 academics.27.t: "Bizim [concept_dubois_paleontologist] vefat etti."
 academics.27.d: "Onlarca yıl boyunca [concept_dubois_paleontologist] olarak görev yaptıktan sonra, eski #b #GREEN Baş Fosil Bilimcimiz#!#! vefat etti. Böyle olağanüstü bir bilim insanının yerini hiç doldurabilecek miyiz?"
 academics.29.t: "Bizim [concept_lepsius_archaeologist] vefat etti."
 academics.29.d: "Onlarca yıl boyunca [concept_lepsius_archaeologist] olarak görev yaptıktan sonra, eski #b #BLUE Baş Kazı Bilimcimiz#!#! vefat etti. Böyle olağanüstü bir bilim insanının yerini hiç doldurabilecek miyiz?"
 academics.30.t: "Bizim [concept_andersson_anthropologist] vefat etti."
 academics.30.d: "Onlarca yıl boyunca [concept_andersson_anthropologist] olarak görev yaptıktan sonra, eski #b #BLUE Baş İnsan Bilimcimiz#!#! vefat etti. Böyle olağanüstü bir bilim insanının yerini hiç doldurabilecek miyiz?"
