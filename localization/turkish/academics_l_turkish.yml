 je_academics_egyptian_artifacts_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] en az #p 25#! adet Mısır [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] bulmamızı istiyor. Bu eserler, rastgele bir hediye veya yerel bir kazı yoluyla edinme konusunda aşırı şanslı olmadığımız sürece, bir [concept_lepsius_archaeologist] tarafından bir [concept_lepsius_expedition] veya [concept_lepsius_excavation] sırasında bulunmalıdır."
