 academics.2101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bir Müze talep ediyor"
 academics.2101.d: "Dünyanın en güçlü uluslarından biri olarak, şimdiye kadar herhangi bir arkeolojik prestije sahip değildik. Bu nedenle [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bizden bir Arkeoloji Müzesi inşa etmemizi istiyor."
 academics.2101.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sizden arkeolojiye olan bağlılığınızı artırmanızı istiyor. Geçmişi keşfetmek, unutulmuş kültürleri ortaya çıkarmak ve değerli eserleri kurtarmak, bilim kadar ulusal prestij için de son derece önemlidir.\n Bu nedenle, geçmiş kültürlerin bilgisini artırmak, yaymak ve korumak için bir Arkeoloji Müzesi kurmanızı istiyoruz.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2101.g: "Hazine avına gidelim!"
 academics.2101.h: "Tozlu bir müzeye gerek yok."
 academics.2101_goal_tt: "#n 10#! yıl içinde #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] toplamalı ve bir Arkeoloji Müzesi inşa etmelisiniz."
 academics.2102.t: "Arkeoloji Müzesi'nin Açılışı"
 academics.2102.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] temsilcileri, bugün Arkeoloji Müzesi'nin açılışında çok memnun göründüler."
 academics.2102.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] yeni müzenin halka açıldığını ve çok sayıda vatandaşın artık bulunan eserlerin keyfini çıkarabildiğini öğrenmekten memnun. Ayrıca bunlar büyük bilimsel değere sahip. Ancak, bu sadece bir başlangıç olabileceğinden, müze müdürüyle eserlerin gelecekteki temini konusunda onu hatırlatması için zaten anlaştık. O - elbette - bizim topluluğumuzun da bir üyesi.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2102.g: "Şimdi oraya ait başka bir şeye ihtiyacımız var..."
 academics.2103.t: "Arkeolojik bir utanç"
 academics.2103.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'ın üzüntüsüne rağmen, ülkenin arkeolojisini destekleme sözüne rağmen bu yönde hiçbir çaba gösterilmediği bugün not edildi."
 academics.2103.f: "Biz, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri, hükümetin cehaletinden derinden hayal kırıklığına uğradık. Küçük bir müze gerçekten çok mu şey istiyor?\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2103.g: "Zaten o tozlu müzeye kimin ihtiyacı var?"
 academics.2104.t: "Müze müdürü bir Mısır sergisi öneriyor"
 academics.2105.t: "Müze müdürü bir Mezopotamya sergisi öneriyor"
 academics.2106.t: "Müze müdürü bir Ege sergisi öneriyor"
 academics.2107.t: "Museum director suggests a Pre-Columbian Exhibition"
 academics.2104.d: "Arkeoloji Müzesi müdürü, bir sergide eksik eserleri acilen bir araya getirmezsek müzemizin uluslararası karşılaştırmada geride kalabileceği konusunda uyardı."
 academics.2104.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'nın gururlu bir üyesi olarak, güzel müzemizin ihmal edilmesinden dolayı üzüntü duyuyorum. Bütün dünya Mısır eserleri topluyor, son zamanlarda yurtdışından Bastet kedisi heykeli hakkında haberler duydum. Söylemeliyim ki, bu son moda! Ayrıca pembe olduğu söyleniyor. Ve bizde düzgün bir sergi düzenleyecek kadar skarabe bile yok. Yakında en azından orta ölçekli bir sergi için yeterli eser toplayamazsak, ülkemizdeki arkeolojinin geleceği konusunda karamsarım.\n\nİmza, Arkeoloji Müzesi Müdürü"
 academics.2105.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'nın ateşli bir üyesi olarak, saygın müzemizin ihmal edilmesinden dolayı üzüntü duyuyorum. Mezopotamya eserleri bugünlerde çok moda ve büyük uluslar onlara doymak bilmiyor. Elbette, bir lamassu'nun boyutunun değerini belirlemediğine, onunla ne yaptığınıza inanıyorum. Ancak, düzgün bir sergi düzenleyecek kadar çivi yazılı tabletimiz bile yok. Yakında en azından orta ölçekli bir sergi için yeterli eser toplayamazsak, ülkemizdeki arkeolojinin geleceği konusunda karamsarım.\n\nİmza, Arkeoloji Müzesi Müdürü"
 academics.2106.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'nın önemli bir üyesi olarak, gururlu müzemizin ihmal edilmesinden dolayı üzüntü duyuyorum. Ege eserleri sıcak çörek gibi satılıyor, bu son birkaç yılın deneyimi. Truva yeniden keşfedildiğinden beri Homeros destanları popüler kültür haline geldi ve her yeni zenginin artık bahçesinde antik bir heykeli var. Ya biz? Biz sergileyebilecek birkaç adi Miken mezar eşyasına bile sahip değiliz! Yakında en azından orta ölçekli bir sergi için yeterli eser toplayamazsak, ülkemizdeki arkeolojinin geleceği konusunda karamsarım.\n\nİmza, Arkeoloji Müzesi Müdürü"
 academics.2107.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'nın güzel bir üyesi olarak, önemli müzemizin ihmal edilmesinden dolayı üzüntü duyuyorum. Mayacılık artık sınır tanımıyor. Topluluğumuzun ezoterik üyeleri, Orta ve Güney Amerika'nın en egzotik parçalarını almak için çok para harcıyor. Mezar soygunu ve değerli tarihi varlıkların yıkımı tüm hızıyla devam ediyor. Bir sefer liderinin Tikal piramitlerini taşımak istediğini bile duydum! Bizim ise müzede çocukları korkutacak birkaç okült taş maskemiz bile yok. Yakında en azından orta ölçekli bir sergi için yeterli eser toplayamazsak, ülkemizdeki arkeolojinin geleceği konusunda karamsarım.\n\nİmza, Arkeoloji Müzesi Müdürü"
 academics.2104.g: "Servet ve Şan!"
 academics.2104.h: "Hazine avcılığından daha iyi işlerimiz var."
 academics.2108.t: "Yeni bir Arkeolojik Koleksiyon"
 academics.2108.d: "Müze müdürü, yeni eserlerle ilgili endişelerinin duyulduğu konusundaki memnuniyetini ifade etti ve [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'ndaki arkadaşlarını müzenin yakında yeni bir sergiye ev sahipliği yapacağı konusunda bilgilendirdi."
 academics.2108.f: "Firma, ulusun bilimsel itibarını artırmaya yardım ettiği için hükümete teşekkür eder. Çok sayıda yeni eser, bu ülkedeki en iyi erkek ve kadınların sanatçılığının ve yorulmak bilmeyen araştırma dürtüsünün bir ifadesidir.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2108.g: "Başarı!"
 academics.2109.t: "Arkeolojik Hayal Kırıklığı"
 academics.2109.d: "Acil endişelerinin reddedilmesi karşısında vurulmuş, perişan ve şok olan müze müdürü, ofisine çekildi, ağlayarak kilitlendi ve kimseyle konuşmayı reddetti."
 academics.2109.f: "Müze müdürünün, müzenin geleceği konusundaki endişelerini dile getiren mektubunun reddedilmesi karşısında, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri olarak şok ve hayal kırıklığı içindeyiz. Bu, hükümetin bilime ve tarihe olan bağlılığının bir göstergesi mi? Bu, ulusun geleceği için ne anlama geliyor?\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2109.g: "Başarısızlık ..."
