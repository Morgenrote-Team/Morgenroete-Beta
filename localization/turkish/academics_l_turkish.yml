 academics.2309.t: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]'ın Hırsı"
 academics.2309.d: "Profesör [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] paleontoloji alanında ulusal bir referans olarak kabul ediliyor. Bilim Topluluğu, [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] akademik bir öncü olarak kullanmak için uluslararası düzeyde aranan bir kişilik yapmak istiyor."
 academics.2309.f: "Meslektaşımız Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]'ın ulusumuzu bir bilim merkezi olarak temsil etmek için ideal olduğu konusunda kesin bir sonuca vardık. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe], [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] itibarını artırmak için her türlü desteği almalı. Bu özellikle gençleri kendileri için bilimsel bir kariyer peşinde koşmaya motive edecektir.\n\nSaygılarımla, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] will become famous."
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] shouldn't become megalomaniac."
 academics.2310.t: "Paleontolojik Zafer"
 academics.2310.d: "Bir paleontolog olarak ün kazanmasıyla birlikte, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] artık Bilim Topluluğu'nun istediği bilimsel öncü haline geldi."
 academics.2310.f: "We are now receiving many new students who are inspired by the greatness and fame of Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] not only vitalized [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] own subject, but also fundamentally awakened a fascination for the sciences. Being a scientist is no more than a quirky career with few prospects, but rather an exciting job that promises fame and adventure.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
