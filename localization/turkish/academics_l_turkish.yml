 academics_competition_with_rival_won_total_artifacts: "Hazine Avını Kazandı"
 je_academics_rivalry_for_artifacts: "Arkeolojide Odaklan: Hazine Avı"
 je_academics_rivalry_for_artifacts_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] rakibimiz [SCOPE.sCountry('target').GetName]'dan daha fazla [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] bulmamızı istiyor.\n\nBizim #b Toplam Eserlerimiz#!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'ın #b Toplam Eserleri#!: [ROOT.Var('je_artifacts_rival_nature_var').GetVariable('lepsius_total_artifacts').GetValue|0+]"
 je_academics_rivalry_for_artifacts_success: "Siz ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]), [SCOPE.sCountry('target').GetName]'ın ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]) sahip olduğundan daha fazla [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] sahibisiniz."
 academics.2117.t: "Harika eser koleksiyonu"
 academics.2117.d_rival: "Rakibimiz [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]'dan daha büyük bir eser koleksiyonu topladık. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ve nüfusumuz ulusumuzun bu zaferi hakkında heyecanlı!"
 academics.2117.d_rival_gone: "Arkeolojik rakibimiz ortadan kalktı. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ve nüfusumuz ulusumuzun bu zaferi hakkında heyecanlı!"
 academics.2117.f: "Ulusumuzun bu barbarlardan daha iyi bir arkeolojik koleksiyona sahip olması gerektiği açık olmalı. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bu koleksiyondan memnun. Ancak bu vahşilerden kurtarılması gereken daha fazla eser var.\n\nSaygılarımla, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2117.g: "Kurtarılan o kadar çok eser var!"
 academics.2118.t: "Arkeolojik koleksiyonumuzu genişletmeyi başaramadık"
 academics.2118.d: "Arkeolojik koleksiyonumuzu [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]'daki rakiplerimizden daha fazla genişletemedik. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri son derece hayal kırıklığına uğradı."
 academics.2118.f: "Bu vahşilerin kirli elleri insanlığın tarihini kirletiyor. Tüm bu eserlerin mezar yağmacıları tarafından yağmalanmasına nasıl izin verdiniz? Onlar hazineleri yerine tarihimizi korumayı tercih ettikleri için bu kadar çok bilgi kaybolmuş olacak. İğrenç!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "O tozlu eserlere ihtiyacımız yok."
 academics.2200.t: "[SCOPE.sCountry('rival_scope').GetName]'dan daha fazla numune bulmamız gerekiyor"
 academics.2200.d: "The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are unhappy that [SCOPE.sCountry('rival_scope').GetName] gathered more [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] than our nation. They ask us to find more #b Specimens#! in total than [SCOPE.sCountry('rival_scope').GetName] in 10 years time."
 academics.2200.f: "Numune Koleksiyonlarımız [SCOPE.sCountry('rival_scope').GetName]'dakilerle karşılaştırıldığında hiçbir şey değil. Onların özlemle istediğimiz her şeyi var! Hatta çürümüş cesetler gibi kokan devasa bir çiçekleri olduğunu bile duydum. Tüm gururumuz turuncu bir kelebek. Yeni numuneler bulmalıyız, bizden önce kimsenin bulmadığı numuneler! Aksi takdirde bu hayvan kasablarının eline düşebilirler!\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2200_goal_tt: "Rakibiniz [SCOPE.sCountry('rival_scope').GetName]'dan #n 10#! yıl içinde daha fazla [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] toplamalısınız. Onların [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+] adeti var, bizim ise [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]."
 academics.2200_reward_tt: "Ödül olarak Aydınlar #p 5 Onay#! alacak ve 4 yıl boyunca #p %10#! daha fazla prestij kazanacaksınız."
 academics.2200.g: "Doğa bilimcimizi hemen göndermeliyiz!"
 academics.2200.h: "Ne kadar zaman kaybı!"
 academics_no_competition_with_rival_specimen: "Numune Yarışını Kaybetti"
 academics_competition_with_rival_won_specimen: "Numune Yarışını Kazandı"
