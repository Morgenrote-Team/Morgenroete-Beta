 academics.2110.t: "Müze Müdürü Önemli Bir Eser İstiyor"
 academics.2110.d: "Arkeoloji Müzesi müdürü, bugün [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] adına hükümete açık bir mektup yazdı."
 academics.2110.f: "Büyük bir üzüntüyle ifade etmeliyim ki, zengin eser koleksiyonumuza rağmen müzemiz hâlâ koleksiyonun göz bebeği olarak adlandırılabilecek büyük bir çekim merkezinden yoksun. Ne yazık ki hükümet, şimdiye kadar nesneler için arkeolojik bir standart olarak miktar yerine kaliteye odaklanma konusunda başarısız oldu. Bu nedenle, bu eksikliğin önümüzdeki birkaç yıl içinde giderilmesini şiddetle tavsiye ediyorum, aksi takdirde ulusumuz en iyi ihtimalle bilim dünyasında sayı sayanlar olarak anılacaktır.\n\nSaygılarımla, Arkeoloji Müzesi Müdürü"
 academics.2110.g: "Prestijli bir çaba."
 academics.2110.h: "Buna değmez."
 academics.2110_goal_tt: "#n 15#! yıl içinde #p 1#! [concept_lepsius_major_artifact] toplamalısınız."
 academics.2111.t: "Müzenin İhtişamı"
 academics.2111.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bugünkü mektubunda minnettarlığını ifade etti."
 academics.2111.f: "Arkeolojiyi ülkenin ulusal önceliği yapma kararınız için tebrikler. Son edinilen olağanüstü parça, önümüzdeki haftalarda özel bir sergide teşhir edilecek. Dünya bizi kıskanıyor!\n\nSaygılarımla, Arkeoloji Müzesi Müdürü"
 academics.2111.g: "Harika."
 academics.2112.t: "Tozlu Bir Yer"
 academics.2112.d: "Arkeoloji Müzesi müdürü, bugün [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] adına yazdığı açık mektupta, arkeolojinin ulusumuzda ses bulamadığından duyduğu üzüntüyü ifade etti."
 academics.2112.f: "Bu kadar az şey, bu kadar az insan tarafından, bu kadar kısa sürede hiç bu kadar mahvedilmemişti.\n\nSaygılarımla, Arkeoloji Müzesi Müdürü"
 academics.2112.g: "Ve?"
 je_academics_major_artifact: "Arkeolojide Odaklan: Önemli Eser"
 je_academics_major_artifact_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] en az #p 1#! [concept_lepsius_major_artifact] bulmamızı istiyor. Önemli Eserler, büyük keşifler yoluyla, kalıcı kazılar sırasında veya seferlerdeki rastgele olay zincirlerinden kazanılabilir."
 je_academics_major_artifact_success: "#p 1#! [concept_lepsius_major_artifact] edin."
 academics.2113.t: "Müze Müdürü Arkeolojik Mükemmellik Talep Ediyor"
 academics.2113.d: "Arkeoloji Müzesi müdürü, sergiyi neredeyse mükemmel hale getirmek için çok az eksiğin kaldığını belirtti."
 academics.2113.f: "Ben mütevazı bir adamım. Bildiğiniz gibi, iddialarım pek gösterişli değildir. Bu hükümetten hiçbir zaman süslü püslü bir iyilik istemedim. Her zaman, böyle muhteşem bir kurumun küratörüne yakışır şekilde, kendimi geri çektim. Ayrıca: güzel koleksiyonumuzu dünya standartlarına taşıyacak son bir süsleme, son bir ziyafet eksik. Tek gereken mükemmel bir sergi. Daha fazlası değil. Bir bölgeden 100 eser ve bir Önemli eser elde etmek, umarım zor olmayacaktır, değil mi?\n\nSaygılarımla, Arkeoloji Müzesi Müdürü"
 academics.2113.g: "Hoş bir meydan okuma."
 academics.2113.h: "Bu çok riskli."
 academics.2112_goal_tt: "You will have to arrange an Excellent Exhibition in #n 20#! years."
 academics.2114.t: "Arkeolojinin Zirvesi"
 academics.2114.d: "Arkeoloji Müzesi'nden bugün yumuşamış, zar zor okunabilen bir mektup ulaştı."
 academics.2114.f: "Sadece gönderenin kim olduğu hâlâ deşifre edilebildi. İmza açıkça müze müdürüne aitti. Sekreter, mektubu yazarken sevinç gözyaşları döktüğünden şüpheleniyor."
 academics.2114.g: "O mutlu, biz de öyleyiz."
 academics.2115.t: "Setback for Archaeology"
 academics.2115.d: "Arkeoloji Müzesi'nden bugün yumuşamış, zar zor okunabilen bir mektup ulaştı."
 academics.2115.f: "Sadece gönderenin kim olduğu hâlâ deşifre edilebildi. İmza açıkça müze müdürüne aitti. Sekreter, yazarken gözlerine yaşlar geldiğini varsayıyor. Son arkeolojik görevdeki başarısızlığımız onu derin bir depresyona sürüklemiş olmalı."
 academics.2115.g: "O üzgün, biz de öyleyiz."
 je_academics_excellent_collection: "Arkeolojide Odaklan: Mükemmel Koleksiyon"
 je_academics_excellent_collection_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bizden Mükemmel Bir Sergi oluşturmamızı istiyor. Bunun için bir arkeolojik bölgeden #G 100#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ve #p 1#! [concept_lepsius_major_artifact] gerekiyor."
 academics.2116.t: "[SCOPE.sCountry('rival_scope').GetName]'dan daha fazla Eser bulmalıyız"
 academics.2116.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri, [SCOPE.sCountry('rival_scope').GetName]'ın ulusumuzdan daha fazla [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] topladığı için mutsuz. On yıl içinde toplamda [SCOPE.sCountry('rival_scope').GetName]'dan daha fazla #b Eser#! bulmamızı istiyorlar."
 academics.2116.f: "[SCOPE.sCountry('rival_scope').GetName] gibi önemsiz bir ulusun bizden daha büyük bir eser koleksiyonuna sahip olması utanç verici. Sadece hazine için kazan ve gerçek arkeoloji bile yapmayan bu mezar yağmacılarını geçmeliyiz! Bu barbarlar yüzünden ne kadar bilgi kayboldu?\n\nSaygılarımla, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2116_goal_tt: "#n 10#! yıl içinde rakibiniz [SCOPE.sCountry('rival_scope').GetName]'dan daha fazla [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] toplamalısınız. Onların [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+] eseri var, bizim [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]."
 academics.2116_reward_tt: "Ödül olarak Intelligencia #p 5 Onay#! kazanacak ve siz 4 yıl boyunca #p 10%#! daha fazla prestij elde edeceksiniz."
 academics.2116.g: "Ben bir Arkeoloğum ve bir delik kazıyorum!"
 academics.2116.h: "Arkeoloji bir Hazine Avı değildir!"
