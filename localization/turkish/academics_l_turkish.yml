 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]"
 academics_spanisch_broetli_title_loc: "İspanyol Çöreği Demiryolu"
 academics_ferrovia_torino_genova_title_loc: "Torino-Cenova Demiryolu"
 academics_generic_title_loc: "[SCOPE.GetRootScope.GetCountry.GetName]'ın ilk Demiryolu Hattı"
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]"
 academics_spanisch_broetli_desc_loc: "İsviçre, Zürih şehrinden Baden kasabasına ilk tren bağlantısını kurdu. Umarım bu demiryolu hattı malların, insanların ve postanın taşınmasını kolaylaştırır ve Baden ile Zürih'teki sanayileri canlandırır. En azından Zürih'li zengin seçkinlerin, hizmetkarlarını Baden'de ünlü bir fırıncı tarafından yapılan ünlü bir tatlı ekmek rulosu olan taze İspanyol Çöreği (Spanisch Brötli) almaları için sabahları Baden'e göndermelerine izin veriyor. Sanayiciler bu yeni demiryolu hattından oldukça memnun."
 academics_ferrovia_torino_desc_title_loc: "Torino-Cenova Demiryolu, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]'ın huzurunda resmen açıldı. Torino'dan Cenova'ya uzanan tren hattı İtalyan mühendisliğinin bir başyapıtıdır. Çift hatlı hat 169 kilometre uzunluğundadır, 30'dan fazla köprüsü vardır ve 3259 metre uzunluğundaki Giovi Tüneli ile dünyanın en uzun tüneline sahiptir.\nUmarım, tren hattı Torino ile Cenova arasındaki mal ve yolcu hareketini hızlandırır ve sanayimizin gelişimine katkıda bulunur. Açıkçası Sanayi Kaptanlarımız bu ilk demiryolu hattından memnun."
 academics_generic_desc_loc: "The construction of our first railway line was neither easy nor cheap. But thanks to superior [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] engineering it was finished in record time. The Industrialist are very happy as this line provides them with a fast way to move their goods and resources."
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]"
 academics_spanisch_broetli_flavor_loc: "The mouth watering smell of a Spanisch Brötli rises to your nose. The delicious pastry was delivered with the first train of Switzerland, connecting Zürich to the town of Baden.\n\n#b Historically#! the railway from Zürich to Baden was finished in 1847, shortly before the Swiss civil war, the \"Sonderbundskrieg\" occurred. There were 4 locomotives that allowed four connections per day. They were able to travel the 23 kilometers in about 45 minutes. The Schweizerische Nordbahn, as it was officially named, had little economic success and soon expansion plans to Aarau were scraped and one of the daily services was dropped.\n\nA reconstruction of the \"Spanisch-Brötli-Bahn\" exists and is sometimes operated as a historic train on the modern railway tracks in Switzerland."
 academics_ferrovia_torino_genova_flavor_loc: "Cenova Başpiskoposu ilk lokomotifi vaftiz etti. Sonra devasa araç yuvarlanmaya başladı. Cenova'dan Torino'ya kadar gidecek ilk trendi.\n\n#b Tarihsel olarak,#! hat Sardinya-Piyemonte'deki ilk demiryolu hattıydı. 18 Temmuz 1844'te Kral Carlo Alberto I tarafından ısmarlandı. Hat daha bitmeden önce, hatın ilk kısımları art arda tek hat olarak açıldı. 6 Aralık 1853'te hat resmen açıldı.\nDemiryolu hattı hızla İtalya'nın en çok kullanılan hattı oldu. Özellikle Cenova limanından mal taşınmasına izin verdiği için. 1889'da, eski hattan daha düşük eğimlere sahip Giovi Geçidi üzerinden alternatif bir hat inşa edildi.\n1898'de, tren ekibi Giovi tünelinde boğuldu ve lokomotif sürücüsüz devam etti. Bekleyen bir trene çarptı ve toplam 13 kişi öldü. Sonuç olarak hat elektriklendi."
 academics_generic_flavor_loc: "\"Kendi demiryolu hattımıza sahip olmamızın zamanı da geldi! Rekabetimizin çok gerisindeyiz! Artık nihayet tüm ürünlerimizi düzgün bir şekilde taşıyabiliriz!\""
 academics.2401.g: "Evet yapabiliriz!"
 academics.2402.t: "İlk demiryolu hattımızı inşa edemedik"
 academics.2402.d: "Sanayicilerin ülkemizde ilk demiryolu hattının inşasını istemelerinin üzerinden 5 yıl geçti. Hattı zamanında bitiremedik. Bu kesinlikle sanayicilerin hükümetimize bakışını etkileyecektir."
 academics.2402.f: "\"You can't even build a railway line. Your government is an absolute failure. Shame on you!\""
 academics.2402.g: "Hayır, yapamadık"
