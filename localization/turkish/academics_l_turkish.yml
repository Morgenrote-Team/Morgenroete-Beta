 academics.2201.t: "Şaşırtıcı Numune Koleksiyonu"
 academics.2201.d_rival: "Rakibimiz [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]'dan daha büyük bir [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] koleksiyonu topladık. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ve halkımız ulusumuzun bu zaferi karşısında heyecanlı!"
 academics.2201.d_rival_gone: "Büyük bir biyolojik koleksiyon arayışımızdaki Rakibimiz ortadan kalktı. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ve halkımız ulusumuzun bu zaferi karşısında heyecanlı!"
 academics.2201.f: "Nihayet büyük ulusumuza yakışır bir #b Numune Koleksiyonu#!mız var. Artık bu gezegendeki en büyüleyici canlıları sergileyebiliriz. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] şimdilik koleksiyonumuzdan memnun. Açıkçası, diğer ulusların bu zavallı hayvanları ve bitkileri katletmesini önlemek için koleksiyonumuzu büyütmeye devam etmeliyiz.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2201.g: "Değerli bir koleksiyon!"
 academics.2202.t: "[ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]'dan daha fazla numune toplayamadık"
 academics.2202.d: "[ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]'daki rakiplerimizden daha fazla numune koleksiyonumuzu genişletemedik. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri kesinlikle perişan oldu."
 academics.2202.f: "Şimdi dünyanın en büyüleyici hayvanını da onlar buldu. Uçan bir kertenkele. Bilim Akademisi başkanının adını verdiler. Başarısız oldunuz.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "Bundan bilimsel olarak asla kurtulamayacağım!"
 academics.2203.t: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName], Hayvanat Bahçemiz için [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] istiyor"
 academics.2203.d: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName], 10 yıl içinde [concept_dubois_zoo]'muz için [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] edinmemiz için hükümetimize dilekçe verdi."
 academics.2203.f: "Hayvanat Bahçemizde eksik olan bir [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] var. Hükümetimizin [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] bulup Hayvanat Bahçemize getirmesine ihtiyacımız var. Sonuçta Hayvanat Bahçemizin bu harika hayvana sahip olmamasına izin veremeyiz.\n\nİmza, [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] temsilcileri"
 academics.2203_goal_tt: "10 yıl içinde [concept_dubois_zoo]'muz için bir [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] edinmelisiniz."
 academics.2203_reward_tt: "Ödül olarak [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] hükümetinizden #p 5#! onay ve #p %5#! daha fazla pop çekiciliği kazanacak ve ülkeniz 5 yıl boyunca #p %5#! daha fazla prestij kazanacak."
 academics.2203.g: "Hepsini yakalamalıyım!"
 academics.2203.h: "Ben büyük bir ulus yönetiyorum. Bir hayvanat bahçesiyle uğraşmam!"
 je_academics_get_exotic_animal: "Doğa Bilimine Odaklan: Hayvanat Bahçemiz için [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] Edinin"
 je_academics_get_exotic_animal_reason: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName], [concept_dubois_zoo]'muz için [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] edinmemizi istiyor.\nBöyle bir [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] edinmenin çeşitli yolları vardır."
 academics.2204.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] için yeni bir yuva"
 academics.2204.d: "[concept_dubois_zoo]'muz için [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] edinmeyi başardık. Bu kesinlikle [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]'ı mutlu edecek."
 academics.2204.f: "Your government successfully acquired [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our glorious country. This shows that our country is powerful enough to spend its resources on the amusement of our population. Thank you!\n\nSigned, the representatives of the [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2204.g: "Harika bir hayvan!"
 academics.2205.t: "Hayvanat bahçemizde yeni bir hayvan yok"
 academics.2205.d: "Hayvanat Bahçemiz için [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] edinemedik. [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] bundan hoşlanmayacak."
 academics.2205.f: "Hayvanat Bahçemiz için bir hayvan bile edinemiyorsunuz. Bu ülkeyi yöneteceğinize nasıl güvenelim?\n\nİmza, [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] temsilcileri"
 academics.2205.g: "Rastgele hayvanlar için zamanımız yok!"
 academics_exotic_animal_acquired_ig_modifier: "Egzotik Hayvan Edinildi"
 academics_exotic_animal_not_acquired_ig_modifier: "Egzotik Hayvan Edinilemedi"
 academics_exotic_animal_acquired_country_modifier: "Egzotik Hayvan Edinildi"
 academics.2206.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bir Hayvanat Bahçesi talep ediyor"
 academics.2206.d: "Doğal araştırma alanındaki önceki bilimsel başarılar zayıf olarak nitelendirilebilir. Bazı etkili bilimsel temsilciler bu nedenle hükümete bir dilekçe ile başvurdu."
 academics.2206.f: "Biyolojik araştırmayı genel olarak ve zoolojik araştırmayı özellikle güçlendirmek için, nadir hayvanlar koleksiyonu olan bir hayvanat bahçesi şarttır. Böyle bir tesis aynı zamanda nüfusun refahını da büyük ölçüde artıracaktır. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bu nedenle ulusal bir hayvanat bahçesi kurmak için her türlü aracın kullanılmasını ve ayrıca enerjik bir zoolog yetiştirilmesine yardımcı olmayı önermektedir.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2206.g: "Elbette birkaç hayvan bulunabilir."
 academics.2206.h: "Bu insanların başka rahatsız edecek kimseleri yok mu?"
 academics.2207.t: "Yeni Hayvanat Bahçesi"
 academics.2207.d: "Bilimsel Topluluğun bazı temsilcileri yeni hayvanat bahçesinin açılışına bizzat katıldı."
 academics.2207.f: "Mükemmel, gerçekten mükemmel yeni hayvanat bahçesi. Üyeler harika bir gün geçirdiler ve özellikle ücretsiz evcil hayvan mamasından mutlular. Umuyoruz ki bu sadece bir başlangıç olacak ve yeni açılan hayvanat bahçesi yakında genişletilecek ve daha değerli, egzotik ve harika yaratıklarla doldurulacak.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2207.g: "Bana biraz fıstık bırakın!"
 academics.2208.t: "Hayvanat Bahçesi Yok"
 academics.2208.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bugün yeni bir hayvanat bahçesi isteğinin yerine getirilmediğinden şikayet eden acı bir mektup yazdı."
 academics.2208.f: "Büyük üzüntümüze, mevcut hükümetin tamamen bilim düşmanlarından, genel olarak biyolojiden ve özellikle zoolojiden veya en azından insanlık dışı hayvan nefretçilerinden oluştuğunu tespit ettik. Belki böyle bir ortamda muhteşem hayvanlar boşuna harcanırdı.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2208.g: "İnatçıysanız, kesinlikle hiçbir dileğiniz yerine getirilmeyecek."
 academics.2206_goal_tt: "#n 5#! yıl içinde #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] toplamalı ve bir [concept_dubois_zoo] inşa etmelisiniz."
 academics.2206_reward_tt: "Ödül olarak, doğa bilimcimiz #p 50 Tecrübe#! kazanacak. Henüz bir doğa bilimcimiz yoksa, bir tane alacağız."
 academics.2209.t: "Hayvanat Bahçesi Büyütme"
 academics.2209.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'ndan gelen açık bir mektup, Ulusal Hayvanat Bahçesi'nin çok az çeşitlilik sunduğundan yakınıyor."
 academics.2209.f: "Başkentimizde artık bilim insanlarının hayvanları inceleyebilmesi ve halkın eğlenebilmesi için bir hayvanat bahçesi tesisi olmasına rağmen, bu tesis şehrin büyüklüğüne ve ulusal önemimize yakışır standarda zar zor ulaşmıştır. Prestiji artırmak, nüfusu eğlendirmek ve bilimi ilerletmek için mevcut hayvanat bahçesini en azından orta ölçekli bir hayvanat bahçesine genişletmeyi tavsiye ediyoruz.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2209.g: "Daha fazla hayvan getirin!"
 academics.2209.h: "Yapacak daha iyi işlerimiz var."
 academics.2210.t: "Daha da büyük bir Hayvanat Bahçesi"
 academics.2210.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'ndan gelen açık bir mektup, Ulusal Hayvanat Bahçesi'nin çok az çeşitlilik sunduğundan yakınıyor."
 academics.2210.f: "Geçmişte hayvanat bahçemizin saygın bir boyuta ulaşmasına izin vermiş olsak da, henüz zoolojik tutkumuzla diğer ulusları etkilemek için sahip olabileceği ve olması gereken uluslararası öneme sahip değil. Daha fazla ve daha egzotik hayvanlara ihtiyacımız var. Burada sadece bilim değil, prestijimiz de söz konusu. Hayvanat bahçemizin büyük bir hayvanat bahçesine yükseltilmesini şiddetle tavsiye ediyoruz.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2211.t: "Gelişen bir Zooloji Bahçesi"
 academics.2211.d: "Büyütülmüş Zooloji Bahçesi, başkentin ana cazibe merkezlerinden biridir ve hem bilim insanları hem de sıradan vatandaşlar arasında çok popülerdir. Bilimsel Topluluk, dileklerinin yerine getirildiğini memnuniyetle not eder."
 academics.2211.f: "Aferin! Yeni hayvanat bahçesi daha ferah ve dünyanın hayvan dünyasının daha geniş bir yelpazesini tasvir etme gerekliliğini yerine getiriyor. Umarım bir ornitorenk de düşünmüşsünüzdür? Onun için sponsorluk devralmak istiyoruz. Adı Perry mi oluyor?\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2211.g: "Dünyanın hayvanları artık evimizde!"
 academics.2212.t: "Zoolojik hayal kırıklığı"
 academics.2212.d: "Bilimsel Topluluk, endişeleri birkaç hayvanat bahçesi hayvanı için yapılan küçük bir istek gibi çiğnendiğinde hükümete sormaya değip değmeyeceğini merak ediyor."
 academics.2212.f: "Çok, çok hayal kırıklığına uğradık.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2212.g: "Hayvanat bahçesinde eğlenmek yerine araştırma yapmalılar."
 academics.2209_goal_tt: "[concept_dubois_zoo]'nuzu #n 10#! yıl içinde #p 3. boyuta#! (orta ölçekli hayvanat bahçesi) çıkarmalısınız."
 academics.2210_goal_tt: "[concept_dubois_zoo]'nuzu #n 10#! yıl içinde #p 4. boyuta#! (büyük hayvanat bahçesi) çıkarmalısınız."
 academics.2209_reward_tt: "Ödül olarak, doğa bilimcimiz #p 50 Tecrübe#! kazanacak. Henüz bir doğa bilimcimiz yoksa, bir tane alacağız."
 je_academics_found_zoo: "Doğa Bilimine Odaklan: Bir Hayvanat Bahçesi Kurun"
 je_academics_found_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to build a [concept_dubois_zoo] to enhance knowledge, but also the living standard of our intellectuals. Building a zoo requires #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be bought from other countries."
 je_academics_medium_zoo: "Doğa Bilimine Odaklan: Hayvanat Bahçesini Büyütün"
 je_academics_medium_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has requested an extension of the [concept_dubois_zoo] We have a total of ten years to upgrade our zoo to a #p medium-sized zoo#!. This requires more [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be bought from other countries."
 je_academics_large_zoo: "Doğa Bilimine Odaklan: Hayvanat Bahçesini Büyütün"
 je_academics_large_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has requested an extension of the [concept_dubois_zoo] We have a total of ten years to upgrade our zoo to a #p large zoo#!. This requires more [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be bought from other countries."
 academics.2300.t: "[SCOPE.sCountry('rival_scope').GetName]'dan daha fazla fosil bulmamız gerekiyor"
 academics.2300.d: "[SCOPE.sCountry('rival_scope').GetName]'dan daha büyük bir koleksiyon için yeterli [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]'ımız eksik. Bu nedenle, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] toplamda [SCOPE.sCountry('rival_scope').GetName]'dan daha fazla #b Fosil#! bulmamızı istiyor. Bu rakibi yenebilirsek kesinlikle çok memnun olurlar."
 academics.2300.f: "[SCOPE.sCountry('rival_scope').GetName]'daki rakiplerimiz dünyanın farklı yaşlarından ve yerlerinden çeşitli Fosillere sahipken, bizimkiler hem zaman dilimi hem de coğrafi çerçeve açısından oldukça sınırlı. Bu büyük bir utanç ve bizim gibi büyük bir ulus için kabul edilemez.\nFosil koleksiyonumuzu derhal genişletmeliyiz!\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2300_goal_tt: "Rakibiniz [SCOPE.sCountry('rival_scope').GetName]'dan #n 10#! yıl içinde daha fazla [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] toplamalısınız. Onların [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+] adeti var, bizim ise [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]."
 academics.2300_reward_tt: "Ödül olarak Aydınlar #p 5 Onay#! alacak ve 4 yıl boyunca #p %10#! daha fazla prestij kazanacaksınız."
 academics.2300.g: "Ah, bir fosil kavgası!"
 academics.2300.h: "Tozlu kayalara ihtiyacımız yok..."
 academics_no_competition_with_rival_fossils: "Fosil Kavgasını Kaybetti"
 academics_competition_with_rival_won_fossils: "Fosil Kavgasını Kazandı"
 je_academics_rivalry_for_fossils: "Paleontolojiye Odaklan: Fosil Kavgası"
 je_academics_rivalry_for_fossils_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], rakibimiz [SCOPE.sCountry('target').GetName]'dan daha fazla [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] toplamamızı istiyor.\n\nBizim #b Toplam Fosil#!: [ROOT.Var('dubois_fossil').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'ın #b Toplam Fosil#!: [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]"
 je_academics_rivalry_for_fossils_success: "Siz ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]), [SCOPE.sCountry('target').GetName]'dan ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]) daha fazla [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] keşfettiniz."
 academics.2301.t: "Fantastik Fosil Koleksiyonu"
 academics.2301.d_rival: "Rakibimiz [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]'dan daha büyük bir [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] koleksiyonu topladık. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ve halkımız ulusumuzun bu zaferi karşısında heyecanlı!"
 academics.2301.d_rival_gone: "Büyük bir fosil koleksiyonu arayışımızdaki Rakibimiz ortadan kalktı. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ve halkımız ulusumuzun bu zaferi karşısında heyecanlı!"
 academics.2301.f: "En başından beri rakibimizden daha büyük bir fosil koleksiyonuna ihtiyacımız olduğu açıktı. Artık Kambriyen'den Kuvaterner'e ve Amerika'dan Pasifik Adaları'na kadar bu kadar çok fosil topladığımıza göre gerçekten değerli bir koleksiyona sahibiz! Açıkçası bu yıllar önce olmalıydı ve bu koleksiyonu daha da genişletmeliyiz. Şimdilik durum, köylülerin dediği gibi \"yeterince iyi\".\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2301.g: "Bu, bu kavgaya bir son veriyor!"
 academics.2302.t: "[ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]'dan daha fazla fosil toplayamadık"
 academics.2302.d: "[ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]'daki rakiplerimizden daha fazla fosil koleksiyonumuzu genişletemedik. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri memnun değil."
 academics.2302.f: "Onların koleksiyonu çağlar boyunca uzanıyor, her şeye sahipler ve bizim sadece üzerlerinde zor görünen fosiller olan tozlu kayalarımız var... Bu korkunç. Ulusumuz için utanç verici bir zaman! İğrenç.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "Zaten eski kayalara ihtiyacım yok..."
