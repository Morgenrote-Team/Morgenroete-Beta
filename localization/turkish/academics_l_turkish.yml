 academics_supported_goettinger_seven_modifier: "Göttingen Yedilisi Destekçisi"
 academics_kneeling_decree_modifer: "Diz Çökme Kararnamesi"
 academics_germanistentag_modifier: "Germanistentag (Almanistler Günü)"
 je_goettinger_seven_monument: "Göttingen Yedilisi Anıtı"
 je_goettinger_seven_monument_reason: "Birleşik bir Alman ulusu, Göttingen Yedilisinin anısını onurlandırabilir - tabii ki birleştirici lider gücün tarihsel olarak onlar için zaten mücadele etmiş olması şartıyla. Bir anıt, akademisyenlerin nesillerine ilham verirdi! Elbette, bu Alman hükümetinin efsanevi profesörlerin liberal fikirlerini paylaştığı varsayımına dayanır."
 academics.3101.t: "Hanover Anayasası"
 academics.3101.d: "İlk resmi icraatlarından biri olarak Kral, anayasayı, yani sözde Staatsgrundgesetz'i ('Devletin Temel Yasası') feshedeceğini açıkladı. Ernest Augustus kendisini ona bağlı hissetmediğini vurguladı."
 academics.3101.f: "Hanover, 1819'da Naip Prens tarafından verilen ilk anayasasını almıştı; bu, Viyana Kongresi tarafından garanti altına alınan Hanover'in bir seçmen bölgesinden krallığa dönüşümünden biraz daha fazlasını ifade ediyordu. Cambridge Dükü, Kral William'ın Hanover'daki vekili olarak, Hanover hükümetinin kapsamlı bir reorganizasyonunu tavsiye etti. IV. William 1833'te yeni bir anayasayı onaylamıştı; Cumberland Dükü'nün onayı ne soruldu ne de alındı ve anayasanın kendi onayı olmadan kabul edilmesine resmen itiraz etmişti. Kral, Hanover'e varışından hemen sonra, tartışmalı anayasa uyarınca toplanan Hanover Parlamentosu'nu feshetti. Onayının sorulmadığı ve krallığın ihtiyaçlarını karşılamadığı gerekçesiyle anayasayı askıya aldığını ilan etti."
 academics.3101.g: "Anayasayı askıya al."
 academics.3101.h: "Kral yasanın üstünde değildir."
 academics.3102.t: "Göttingen Yedilisi"
 academics.3102.d: "Tarihçi ve politikacı Friedrich Christoph Dahlmann, Ernest'in anayasayı kendi istediği şekilde değiştirme planlarına itiraz etti, çünkü Dahlmann'ın kendisi anayasanın hazırlanmasına katkıda bulunmuştu. Göttingen Üniversitesi'nden diğer altı ünlü profesör protestoya katıldı ve 1833 anayasasını savundu. Yakında bu adamlar 'Göttingen Yedilisi' olarak tanındı - ve Kral için bir baş belası oldular."
 academics.3102.f: "Dahlmann'ın belgesi patlayıcı bir etkiyle karşılandı - üniversitedeki öğrenciler yüzlerce hatta binlerce kopya üretti ve bunları Almanya genelinde yaydı. Diğer altı protestocu, Almanist kardeşler Wilhelm ve Jacob Grimm (ünlü peri masalı ve halk hikayesi yazarları ve anlatıcıları, Grimm Kardeşler olarak bilinirler), hukukçu Wilhelm Eduard Albrecht, tarihçi Georg Gottfried Gervinus, fizikçi Wilhelm Eduard Weber ve ilahiyatçı ve oryantalist Heinrich Georg August Ewald'dı. Protestonun etkisi kralı harekete geçmeye zorladı ve yedi asi profesör üniversite mahkemesinde sorgulandı."
 academics.3102.g: "Görevlerinden alınmalı ve sürgün edilmeleri gerekir!"
 academics.3102.h: "Durum daha da kötüleşmeden taleplerini kabul et."
 academics.3103.d: "Birleşik Krallık'ta Kraliçe Victoria'nın tahta çıkmasının ardından, 120 yıldan fazla süren Hanover ile kişisel birliğin kaybından dolayı biraz üzüntü vardı. Ancak Almanya'daki son olaylardan sonra güvenle söyleyebilirsiniz ki: ayrı yollarımıza gitmemiz iyi oldu."
 academics.3103.f: "Yeni Kral'ın tahta çıkmasından sadece birkaç ay sonra, Hanover, İngiliz yönetimi altında yayınlanan anayasayı feshetti. Yeni Kral Ernest Augustus şimdi akademisyenlerden oluşan bir muhalefetle karşı karşıya. İnsanlar bu anlaşmazlık hakkında şimdiden tüm Almanya'da konuşuyor. Gerçekten de, bir ülke faydalı İngiliz etki alanından ayrılır ayrılmaz barbarlığa düşer."
 academics.3103.g: "İngiliz olmak çok güzel."
 academics.3104.d: "Alman Konfederasyonu devletleri, Hanover Kralı ile yedi inatçı profesör arasındaki çatışmayla sarsıldı: Kral Ernest Augustus anayasayı kaldırdıktan sonra, 'Göttingen Yedilisi' ona isyan etti. Pozisyonlarını kaybettiler - ancak liberal Alman kampında bolca sempati kazandılar."
 academics.3104.f: "Tarihçi ve politikacı Friedrich Christoph Dahlmann, Ernest'in anayasayı kendi istediği şekilde değiştirme planlarına itiraz etti, çünkü Dahlmann'ın kendisi anayasanın hazırlanmasına katkıda bulunmuştu. Göttingen Üniversitesi'nden diğer altı ünlü profesör protestoya katıldı ve 1833 anayasasını savundu. Diğer altı protestocu, Almanist kardeşler Wilhelm ve Jacob Grimm (ünlü peri masalı ve halk hikayesi yazarları ve anlatıcıları, Grimm Kardeşler olarak bilinirler), hukukçu Wilhelm Eduard Albrecht, tarihçi Georg Gottfried Gervinus, fizikçi Wilhelm Eduard Weber ve ilahiyatçı ve oryantalist Heinrich Georg August Ewald'dı. Protestonun doğrudan etkileri sınırlıydı, ancak kamuoyunda yarattığı sansasyon ve medya ilgisi Almanya ve Avrupa'nın büyük bir bölümünde yüksekti ve yedili genel halk arasında popülerdi."
 academics.3104.g: "Tüm saygımla, Kral çok ileri gitti."
 academics.3104.h: "Bu akademik ayak takımı hak ettiği cezayı aldı."
 academics.3105.t: "Hanover Hakkında Hararetli Bir Tartışma"
 academics.3105.d: "'Göttinger Yedilisi' ile yaşanan çatışma, Alman Konfederasyonu'nun diğer devletlerinde fark edilmedi. Büyük Britanya'da bile Kral'ın anayasayı iptal etmesi rahatsızlık yaratıyor."
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName], Ernest Augustus'ın eylemlerini eleştiren sayısız Alman devletinden biridir. Ancak özellikle otoriter yönetime sahip ülkeler olmak üzere, sürece anlayış gösteren ülkeler de var. Bunlar arasında [SCOPE.sCountry('academics_pro_hanover_country').GetName] da var."
 academics.3105.g: "Bu onları hiç ilgilendirmez!"
 academics.3106.t: "Öğrenci Propagandası"
 academics.3106.d: "Devletin 'Göttingen Yedilisi' lehine propaganda yayılmasını önlemek için gösterdiği tüm çabalara rağmen, liberal öğrenci çevreleri büyük şehirlerde geniş çaplı bildiri dağıtmayı başardı."
 academics.3106.f: "Kahramanlarımızı hatırlayın! Göttingen Yedilisini hatırlayın! Erdemlerini övün!' Profesör Dahlmann, Hanover Kralı'na karşı belgelerini yayınladığında, Alman öğrenciler ve liberaller tarafından popüler destek gördü. Alman Konfederasyonu devletlerinde patlayıcı bir etkisi oldu. Göttingen üniversitesindeki öğrenciler yüzlerce, hatta binlerce kopya üretti ve bunları Almanya genelinde yaydı."
 academics.3106.g: "Bu ayaklanmacı öğrenci sürüsü!"
 academics.3107.t: "[ROOT.GetCountry.GetNameNoFlag]'da Jacob Grimm"
 academics.3107.d: "Hanover'dan sürgün edildikten sonra, ünlü Alman bilim insanı ve avukat Jacob Grimm yeni bir yuva arıyor. 'Göttinger Yedilisi'ne olan sempatimiz ona kadar ulaştı, bu yüzden yeni bir iş umuyor."
 academics.3107.f: "Jacob Ludwig Karl Grimm, bir Alman yazar, dilbilimci, filolog, hukukçu ve folklorcuydu. Dilbilimde Grimm yasasını formüle etti ve Deutsches Wörterbuch'un ortak yazarı, Deutsche Mythologie'nin yazarı ve Grimm Masalları'nın editörüydü. Wilhelm Grimm'in abisiydi; birlikte Grimm Kardeşler olarak bilinen edebi ikiliyi oluşturdular."
 academics.3107.g: "Onu karşıla."
 academics.3107.h: "Başka bir huysuz akademisyene ihtiyacımız yok."
 academics.3108.t: "[ROOT.GetCountry.GetNameNoFlag]'da Wilhelm Eduard Weber"
 academics.3108.d: "Hanover'dan sürgün edildikten sonra, ünlü fizikçi Wilhelm Eduard Weber yeni bir yuva arıyor. 'Göttinger Yedilisi'ne olan sempatimiz ona kadar ulaştı, bu yüzden yeni bir iş umuyor."
 academics.3108.f: "Wilhelm Eduard Weber, bir Alman fizikçi ve Carl Friedrich Gauss ile birlikte ilk elektromanyetik telgrafın mucididir."
 academics.3111.t: "Der Grimm (Grimm Sözlüğü)"
 academics.3111.d: "Jacob ve Wilhelm Grimm kardeşler, tüm Almanca kelime dağarcığını kapsaması planlanan bir Almanca sözlüğün ilk cildini sundular. Devasa bir görev, ancak bu Alman kültür ulusunu daha da yakınlaştırıyor."
 academics.3111.f: "Das Deutsche Wörterbuch (Almanca Sözlük), Almanca dilinin en önemli sözlüklerinden biridir. Almanca için Oxford İngilizce Sözlüğü'nün İngilizce için olduğu gibidir; Almanca kelimelerin kökeni ve zaman içindeki kullanımı hakkında, gerçek belgelerden alınan örneklerle desteklenmiş detaylı tarihsel bilgiler içerir. Almancada sözlük 'Der Grimm' olarak da bilinir. 1838'de Grimm kardeşler tarafından başlatıldı. Başlangıçta projenin on yıl süreceğini ve 6 veya 7 cilt üreteceğini tahmin ettiler. Aslında, ilk cilt 1854'e kadar yayınlanmadı. Wilhelm Grimm 1859'da, Jacob ise 'Frucht' (meyve) maddesi üzerinde çalışırken 1863'te öldü. Ölümlerinden sonra, Prusya Bilimler Akademisi ve Berlin Akademisi de dahil olmak üzere çoklu kurumlar işe dahil oldu, Göttingen'de bir merkez de yer aldı. 1961'de nihayet tamamlanan sözlük 32 cilt içerecek ve yaklaşık 350.000 ana madde barındıracaktır. 'Grimm' yalnızca bilimsel değil, aynı zamanda ulusal bir eserdi."
 academics.3111.g: "Bu her Alman Devleti'nde yayınlanmalı!"
 academics.3112.g: "Bunun yerine yeni bir peri masalı kitabı yapsalar keşke..."
 academics.3113.t: "Frankfurt'ta İlk Germanistentag (Almanistler Günü)"
 academics.3113.d: "Birkaç Alman aydını, Frankfurt'ta bir konferans için benzer düşünceli insanları, 'Germanistentag'a davet etti. Birçok kişi bu buluşmayı sadece kültürel bir etkinlik olarak görmek isterken, siyasi mesaj da bir o kadar açık."
 academics.3113.f: "Germanistentag (Almanistler Günü), adının çağrıştırdığının aksine, sadece Alman dilbilimciler için bir etkinlik değildi. Bir Alman ulusal duygusunun gelişiminin bir parçası olarak Alman üniversite bilim insanlarının bir girişimiydi. Günümüzün aksine, Vormärz döneminde Germanistik terimi daha geniş bir anlama sahipti: Alman tarihi, Alman hukuku ve Almanca ile ilgilenen tarihçileri, hukukçuları, dilbilimcileri ve edebiyat bilimcilerini birbirine bağlıyordu. 1846'da Frankfurt'ta Tübingen'li avukat August Ludwig Reyscher tarafından başlatılan ilk Germanistentag'da, Friedrich Christoph Dahlmann, Georg Waitz ve Johann Gustav Droysen Schleswig-Holstein'in bölünmezliği hakkında konuştular. Jacob Grimm 'kesin olmayan bilimlerin değeri' hakkında, kardeşi Wilhelm ise Alman sözlüğü hakkında konuştu. Konferanslar Frankfurt'taki Römer'de yapıldı. 1847'de Lübeck'te ikinci bir Germanistentag izledi. 1848'de Nürnberg'te yapılması planlanan üçüncü Germanistentag, Mart Devrimi nedeniyle gerçekleşmedi."
 academics.3113.g: "Almanya bir kültür ulusudur."
 academics.3113.h: "Onların liberal idealleri bize rehberlik ediyor."
 academics.3115.t: "Diz Çökme Tartışması"
 academics.3115.d: "Napolyon döneminde çevre toprakların ilhakıyla Bavyera, Protestan olan büyük topraklar kazandı. Bu dönemde kral, tebaasına karşı daha hoşgörülü bir politika izledi. Protestan askerlerin Katolik ayini veya alayı önünde diz çökmek zorunda olmamasını emreden ferman buna bir örnekti. Ancak, Bakan Karl von Abel bunu değiştirmeyi önerdi."
 academics.3115.f: "Sözde diz çökme tartışması, 19. yüzyılın ilk yarısında Bavyera Krallığı'nda gerçekleşti. Bavyera bakanı Karl von Abel'ın bir kararnamesiyle başladı; bu kararname, askeri hizmetler sırasında Protestan askerlerin de Kutsal Emanetler önünde diz çökmesini gerektiriyordu. Kararname 'Diz Çökme Kararnamesi' (Kniebeugeedikt) olarak bilinir hale geldi. Bu, birkaç yıl süren ve Temsilciler Meclisi'nde hararetli bir tartışmaya yol açtı."
 academics.3115.g: "Biz Katolik bir ülkeyiz ve burada insanlar diz çöker!"
 academics.3115.h: "Peki ya Protestan vatandaşlarımız ne olacak?"
