 je_academics_first_railway_reason: "Demiryolu icadı [SCOPE.GetRootScope.GetCountry.GetName]'a yayıldığına göre, birçok sanayicimiz malların taşınmasını kolaylaştırmak için böyle bir cihaz inşa etmemizi istiyor. Bu, bir sanayi devi olmamıza yardımcı olacaktır."
 academics.2400.t: "Demiryollarına ihtiyacımız var!"
 academics.2400.d: "Demiryolları malların daha kolay taşınmasını sağlar. Bu nedenle [SCOPE.GetRootScope.GetCountry.GetName]'ın Sanayi Kaptanları önümüzdeki 5 yıl içinde ülkemizde bir demiryolu inşa edilmesini talep ediyor."
 academics.2400.f: "\"We are still transporting our products on dirtroads and rivers. This situation is unacceptable. If we had a better way to transport goods and resources our profits would skyrocket and we could build more factories which would result in better living conditions for everyone. Build a railway now!\""
 academics.2400.g: "İnşa edebilir miyiz?"
