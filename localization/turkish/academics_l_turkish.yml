 je_academics_rivalry_for_specimen_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], rakibimiz [SCOPE.sCountry('target').GetName]'dan daha fazla [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] bulmamızı istiyor.\n\nBizim #b Toplam Numune#!: [ROOT.Var('dubois_specimen').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'ın #b Toplam Numune#!: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]"
