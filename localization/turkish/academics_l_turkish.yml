 academics.140.t: "Mühendisimiz [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], artık bir İnşaat Mühendisi"
 academics.140.d: "İnşaat mühendisliğindeki yıllar süren çalışmalar meyvesini verdi. Pek çok köprü ve tünel inşa ettikten sonra, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] artık gerçek bir [concept_tesla_civil_engineer] olarak kabul ediliyor. Bu, kesinlikle onun projelerini güçlendirecek!"
 academics.140.f: ""
 academics.140.g: "Geleceğimizin Mühendisi!"
 academics.141.t: "Mühendisimiz [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], artık bir Makine Mühendisi"
 academics.141.d: "Makinelerle geçen yıllar süren çalışma meyvesini verdi. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 'ın yarattığı pek çok buluş ve yeni makine, nihayet onun gerçek bir [concept_tesla_mechanical_engineer] olmasını sağladı. Daha şaşırtıcı projeler bekliyoruz!"
 academics.141.f: ""
 academics.141.g: "Gerçek bir İlerleme Motoru!"
 academics.142.t: "Mühendisimiz [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], artık bir Askeri Mühendis"
 academics.142.d: "Ordu için yıllar süren çalışma meyvesini verdi. Yıllarca kale inşa ederek, yeni silahlar geliştirerek ve askerlerimizi donatarak Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] artık tam bir [concept_tesla_military_engineer] olarak kabul ediliyor. Umuyoruz ki milletimize hizmet etmeye devam edecek!"
 academics.142.f: ""
 academics.142.g: "Ordumuzun Temelini İnşa Etmek!"
 academics.143.t: "Mühendisimiz [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], artık bir Elektrik Mühendisi"
 academics.143.d: "Elektriğin gücünü kontrol altına almak, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]'ın her zaman bir hayaliydi. Bu alandaki pek çok buluştan sonra, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] artık bir [concept_tesla_electrical_engineer] olarak kabul görüyor."
 academics.143.f: ""
 academics.143.g: "Bir Bilgi Kıvılcımı!"
 academics.144.t: "Mühendisimiz [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] artık bir Havacılık Mühendisi"
 academics.144.d: "İnsanlar uzun süre uçmanın hayalini kurdu. Artık uçuş çağı başladığına göre, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] havacılık mühendisliğinin ön saflarında yer alıyor. Bu alandaki pek çok buluştan sonra, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] artık bir [concept_tesla_aeronautical_engineer] olarak kabul görüyor."
 academics.144.f: ""
 academics.144.g: "Göklere doğru!"
 notification_academics_yearly_experience_gain_notification_name: "Akademisyenlerin Yıllık Tecrübe Kazanımı"
 notification_academics_yearly_experience_gain_notification_desc: "Tecrübe kazanabilen her Akademisyen #p 0 #! ve #p 5 #! Tecrübe kazandı."
 dubois_humanities_receive_promotion_loc: "Mezar soyguncuları ve nekrofiller toplumumuza hiçbir katkı sağlamıyor!"
 dubois_natural_history_receive_promotion_loc: "Neden tüm fonu kelebek koleksiyoncuları ve canavar yapımcıları alıyor da biz artıklarla geçinmek zorunda kalıyoruz?"
 dubois_mathematics_receive_promotion_loc: "Çılgın tamircilerin ve yıldız gözlemcilerinin her dediğinin yapılması tam bir aptallık, bizimse kırıntılarla yetinmek zorunda olmamız!"
 academics_engineer_focus_atmospheric_engine_loc: "Buharın gücünü kontrol altına alarak işçilerin yerine makineleri koymaya çalışıyoruz. Bu, kaynakları çıkarmayı veya bir şeyler üretmeyi çok daha ucuz hale getirecek!"
 academics_engineer_focus_computer_loc: "Her türlü hesaplamayı yapabilen bir makine inşa etmeye çalışıyoruz. Bu, insan bilgisayarlarını gereksiz kılacaktır. Her şeyi en yüksek hassasiyetle ve hatasız bir şekilde hesaplayabiliriz!"
 academics_engineer_focus_washing_machine_loc: "Amacımız, çamaşır yıkamak için çalışmaya gerek duymayan bir makine yaratmaktır. Toplumumuzda devrim yaratırdı, çünkü kirli çamaşırlarımızı yıkamak için zamanımızı boşa harcamak zorunda kalmazdık!"
 academics_engineer_focus_lighter_loc: "Küçük bir cep çakmağının ne kadar kullanışlı olacağını hayal edebiliyor musunuz? Büyük bir alev çıkarabilen ve mumları veya sigaraları yakabilen bir çakmak? Bu, ele geçirilmeyi bekleyen bir servet!"
 academics_engineer_focus_rocket_loc: "Uzaya ulaşma kapasitesine sahip bir roket yaratmak istiyoruz. Böyle bir roketin askeri uygulamalarını bir hayal edin. Düşmanlarınızı vurabilirsiniz ve onların buna karşı yapabileceği hiçbir şey yok!"
 academics_engineer_focus_telephone_loc: "Çok uzak mesafelerde biriyle konuşmak için kullanabileceğiniz bir cihaz hayal edin! İşte şu anda laboratuvarımızda üzerinde çalıştığımız şey bu!"
 academics_engineer_focus_combustion_engine_loc: "Trains are great but they are huge and need rails. What if we could build a small motor that is able to propel a small vehicle. Everyone could travel everywhere. There are many useful applications of such a motor. And that is exactly what my team is working on right now!"
 academics_engineer_focus_basic_research_alloys_loc: "Mümkün olduğunca çok kullanışlı alaşım bulmak için temel araştırmalar yapıyoruz. Doğru alaşımları bulursak, bu daha iyi yapılara, daha verimli makinelere ve şu an imkansız olduğu düşünülen cihazlara yol açabilir!"
 academics_engineer_focus_basic_research_factory_machinery_loc: "My team is working on improving the machines used in factories. That could lead to a massive boost in our production and the wealth of our nation!"
 academics_engineer_focus_basic_research_housing_loc: "Halkın daha iyi yaşam koşullarını karşılayabilmesine yardımcı olmak ve inşaat sektörümüzü canlandırmak için, ucuz bir şekilde yaşam alanı yaratmanın en verimli yolunu araştırıyoruz."
 academics_engineer_focus_basic_research_urban_planing_loc: "Şehirlerimiz yeterince verimli değil. Bu nedenle halkımızın yaşam standardını yükseltmek için şehirleri nasıl daha verimli hale getirebileceğimizi bulmalıyız!"
 academics.2001.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bizden gökyüzünü incelemeye odaklanmamızı istiyor"
 academics.2001.d: "Ulusumuzun henüz çok fazla astronomik araştırması yok ve bir baş [concept_verrier_astronomer]'imiz bile yok. Bu nedenle [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bizden yeni bir yıldız haritası oluşturmamızı ve bir baş astronom atamamızı istiyor."
 academics.2001.f: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sizden astronomiye olan bağlılığınızı artırmanızı istiyor. Böyle bir odaklanma, gökyüzü ve evren hakkında yeni bilgiler edinmemizi sağlayacaktır.\n Bu nedenle, sizden, ilk olarak yeni ve güncellenmiş bir yıldız haritası oluşturmanızı ve ikinci olarak bir baş astronom işe almanızı talep ediyoruz.\n\nSaygılarımızla, Konsey  [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2001.g: "Yıldızlara Doğru!"
 academics.2001.h: "Yıldızlar mı? Yapacak daha iyi işlerimiz var!"
 academics_unhappy_intelligentsia: "Bilimsel Topluluk Memnuniyetsiz"
 academics.2001_goal_tt: "#n 10#! yıl içinde #p 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfetmeli ve bir [concept_verrier_astronomer] edinmelisiniz."
 academics.2001_reward_tt: "Ödül olarak astronomunuz #p 15 Tecrübe#! kazanacak, ayrıca Aydınlar #p 5 Onay#! alacak ve 3 yıl boyunca üretim teknolojisi maliyeti #p %5#! azalacak."
 je_academics_find_more_stars: "Astronomiye Odaklan: Yıldız Haritası"
 je_academics_find_more_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bizden yeni bir yıldız haritası oluşturmak ve yeni bir baş [concept_verrier_astronomer] atamak için [JournalEntry.GetGoalAddValue] yeni [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] bulmamızı istiyor.\n\nŞu ana kadar [JournalEntry.GetGoalProgressValue] #b Gök Cismi#! keşfettik."
 je_academics_find_more_stars_success: "#p 75#! Yeni #b Gök Cismi# Keşfedildi!"
 je_academics_find_more_stars_event_tt: "Bizim yeni [concept_verrier_astronomer]'ımız, yeni yıldız haritasını sunacak."
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] yeni bir yıldız haritası sunuyor"
 academics.2002.d: "Yeni bir yıldız haritası oluşturmayı başardık ve yeni bir baş [concept_verrier_astronomer] bulduk. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bu durumdan memnun kalacak!"
 academics.2002.f: "\"Bu yeni yıldız haritası çok hassas! Onu diğer ulusların haritalarıyla karşılaştırdım ve bizimki kesinlikle daha üstün. Ayrıca, bazıları oldukça etkileyici olan birçok yeni yıldız keşfettik! Örneğin, şu yıldız normalden daha fazla kırmızı ışık yayıyor.\""
 academics.2002.g: "Yaşasıııııın!"
 academics_scientific_society_happy: "Bilim topluluğu memnun."
 academics.2003.t: "Astronomiye odaklanmamız başarısız oldu!"
 academics.2003.d: "Astronomi üzerinde, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'nın bize verdiği hedeflere ulaşacak kadar odaklanamadık. Durumdan memnun kalmayacaklar!"
 academics.2003.f: "\"Görünüşe göre savaş, ekonomi ve hatta şarap ile alkol, liderlerimiz için bilimden daha önemli. Hayal kırıklığına uğradık. Umuyoruz ki büyük ulusumuzun odak noktası yakında tekrar bilime döner!\""
 academics.2003.g: "Ne yazık!"
 academics.2004.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], [concept_verrier_astronomer]'ımızdan yeni bir yıldız haritası talep ediyor."
 academics.2004.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 'a göre, Ulusumuzun gökyüzünü incelemeye odaklanması gerekiyor. Kurum, Dr.  [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]'dan yeni yıldızlar ve diğer [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] bulmasını ve yeni bir yıldız haritası üretmesini talep etti."
 academics.2004_goal_tt: "#p 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfetmeniz ve #n 10#! yıl içinde yeni bir yıldız haritası üretmeniz gerekecek."
 academics.2004_reward_tt: "Ödül olarak, gökbilimciniz #p 25 Tecrübe#! kazanacak, ayrıca Aydınlar #p 5 Onay#! alacak ve 3 yıl boyunca üretim teknolojisi maliyetleri #p %5#! azalacak."
 je_academics_create_star_chart: "Astronomiye Odaklan: Gökbilimcimizin Yıldız Haritası"
 je_academics_create_star_chart_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], yeni bir yıldız haritası oluşturmak için [concept_verrier_astronomer]'ımızdan  [JournalEntry.GetGoalAddValue] yeni [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] bulmasını istiyor.\n\nŞu ana kadar [JournalEntry.GetGoalProgressValue] #b Gök Cismi#! keşfettik."
 je_academics_create_star_chart_success: "#p 100#! yeni #b Gök Cismi#! keşfet"
 je_academics_create_star_chart_event_tt: "Bizim [concept_verrier_astronomer] yeni yıldız haritasını sunacak."
 je_academics_create_star_chart_event_without_astronomer_tt: "Yeni yıldız haritamız yayınlanacak."
 je_academics_create_star_chart_failed_event_tt: "Bizim [concept_verrier_astronomer] yeni yıldız haritasını sağlayamadı."
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Kaybından sonra [concept_verrier_astronomer] bir yıldız haritası sağlamayı başaramayacağız."
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] yeni bir yıldız haritası sunuyor"
 academics.2005.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] meslektaşları tarafından birbirlerinin sağlığına içki kaldırırken çevrelendi.\n\n\"Sevgili dostum, bunu kolayca yapabileceğini biliyordum. Yeni yıldız haritan olağanüstü! Gerçek bir şaheser!\""
 academics.2006.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] başarısız oldu!"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], yeni bir yıldız haritası oluşturmayı başaramadı. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] yeterince yıldız ve diğer [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] bulamadığı için çabaya değecek bir sonuç elde edilemedi. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'nın geri kalanı, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] başarısızlığı karşısında son derece hayal kırıklığına uğramış durumda."
 academics.2006.f: "Sayın [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName],\n\n   Yeni bir yıldız haritası teslim edemediğinizi fark ettik; bu da bilim yerine başka aktiviteleri tercih ettiğinizi bir kez daha gösteriyor. Ne yazık ki bu, Topluluğumuz üzerinde kötü bir izlenim bırakacak. Gelecekte daha iyisini bekliyoruz!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2006.g: "Ne yazık!"
 academics.2007.t: "Yeni Bir Yıldız Haritası"
 academics.2007.d: "Ne yazık ki bizim eski [concept_verrier_astronomer] yokluğunda, yeni yıldız haritası [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'da sunuldu. Akademisyenler yeni haritadan oldukça memnun görünüyor."
 academics.2007.f: "\"Bu yeni yıldız haritası sayesinde gökyüzünü daha da iyi inceleyebileceğiz! Umuyoruz ki bu gök cisimlerinin nasıl hareket ettiğine dair birçok yeni içgörü keşfedeceğiz!\nBu, yalnızca [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sayesinde mümkün oldu! Şerefimize, Beyler!\""
 academics.2008.t: "Gökbilimci Yok, Yıldız Haritası Yok"
 academics.2008.d: "Bizim [concept_verrier_astronomer] kaybı, beklediğimizden daha az yıldız ve diğer [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]keşfedilmesine yol açtı. Bu nedenle yeni bir yıldız haritası oluşturmak için yeterli veri bulamadık. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bu sonuçtan memnun değil."
 academics.2008.f: "\"Hükümetimiz sadece parlak Baş Gökbilimcisini kaybetmekle kalmadı, aynı zamanda gökbilimcilerimizin çalışmalarını yeterince destekleyemedi. Bu da çok daha az gözlem yapılmasıyla sonuçlandı. Bu, astronomik araştırmalarımızda geri kalacağımız anlamına geliyor. Bu gerçekten korkunç!\""
 academics.2009.t: "[SCOPE.sCountry('rival_scope').GetName]'dan daha fazla yıldız bulmamız gerekiyor"
 academics.2009.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri, [SCOPE.sCountry('rival_scope').GetName]'ın ulusumuzdan daha fazla  [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfetmesinden memnun değil. Toplamda 10 yıl içinde [SCOPE.sCountry('rival_scope').GetName]'dan daha fazla #b Gök Cismi#! bulmamızı istiyorlar."
 academics.2009.f: "[SCOPE.sCountry('rival_scope').GetName] gibi önemsiz bir ulusun bizden daha fazla gök cismi bulmuş olması bir utanç kaynağıdır. Bu medeniyetsiz amatör gökbilimcileri en kısa sürede geçmeli ve toplamda onlardan daha fazla gök cismi keşfetmeliyiz.\n\nSaygılarımızla, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2009_goal_tt: "Rakibiniz [SCOPE.sCountry('rival_scope').GetName]'dan #n 10#! yıl içinde daha fazla [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfetmelisiniz. Onların [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+] adeti var, bizim ise [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]."
 academics.2009_reward_tt: "Ödül olarak Aydınlar #p 5 Onay#! alacak ve 4 yıl boyunca #p %10#! daha fazla prestij kazanacaksınız."
 academics.2009.g: "Hadi onları geçelim!"
 academics.2009.h: "Bu bir uzay yarışı değil..."
 academics_no_competition_with_rival: "Yıldızlar Yarışını Kaybetti"
 academics_competition_with_rival_won: "Yıldızlar Yarışını Kazandı"
 je_academics_rivalry_for_stars: "Astronomiye Odaklan: Yıldız Yarışı"
 je_academics_rivalry_for_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], rakibimiz [SCOPE.sCountry('target').GetName]'dan daha fazla [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] bulmamızı istiyor.\n\nBizim #b Gök Cisimleri#!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'ın #b Gök Cisimleri#!: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]"
 je_academics_rivalry_for_stars_success: "Siz ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]), [SCOPE.sCountry('target').GetName]'dan ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]) daha fazla [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfettiniz."
 academics.2010.t: "Yıldız Yarışını Kazandık"
 academics.2010.d_rival: "[ROOT.Var('je_rival_nation_var').GetCountry.GetName]'dan daha fazla Gök Cismi keşfettik. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ve halkımız ulusumuzun bu zaferi karşısında heyecanlı!"
 academics.2010.d_rival_gone: "Yıldız Yarışındaki Rakibimiz ortadan kalktı. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ve halkımız ulusumuzun bu zaferi karşısında heyecanlı!"
 academics.2010.f: "Biz, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri, rakibimize karşı kazandığımız bu bilimsel zaferden dolayı çok mutluyuz. Onların Bilim İnsanları taş devrinde takılıp kalmış ve daha fazla Gök Cismi keşfedemez durumda olduklarını kanıtladılar. Ulusumuz için harika bir gün!\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2011.t: "Yıldız Yarışını Kaybettik"
 academics.2011.d: "[ROOT.Var('je_rival_nation_var').GetCountry.GetName]'dan daha fazla [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] bulamadık. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri son derece hayal kırıklığına uğramış durumda."
 academics.2011.f: "Akademimizin bu başarısızlığı, ulusumuzun odağının bir kez daha bilim ve bilimsel ilerlemeler üzerinde olmadığını kanıtlıyor. Bu nedenle, bilim lehine dünyayı fethetme planlarını ve düşmanlıkları durdurmayı öneriyoruz.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bir [concept_verrier_observatory] talep ediyor"
 academics.2012.d: "[concept_academics_scientific_society] üyelerimiz, 10 yıl veya daha kısa sürede modern bir [concept_verrier_observatory] inşa etmemizi talep ediyor. Bu, bize [concept_verrier_astronomy] yapma ve [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] bulma imkanı sağlayacaktır."
 academics.2012.f: "Artık her büyük ulus bir Gözlemevine sahip olduğuna göre, biz [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri bir Gözlemevi inşa edilmesini talep ediyoruz. Bir Gözlemevi olmadan asla bilimin ön saflarında olamayız. Bu nedenle bir Gözlemevi açıkça bir zorunluluktur.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2012.g: "Hemen en iyi mimarlarımıza ve mühendislerimize ihtiyacım var!"
 academics.2012.h: "Zaten kime lazım bir Gözlemevi?"
 academics.2012_goal_tt: "#n 10#! yıl içinde bir [concept_verrier_observatory] inşa etmelisiniz."
 academics.2012_reward_tt: "Ödül olarak Aydınlar #p 5 Onay#! alacak ve 5 yıl boyunca üretim teknolojisi maliyeti #p %5#! azalacak, ayrıca akademisyenler arasında #p %5#! sadık taraftar kazanacaksınız."
 je_academics_build_observatory: "Astronomiye Odaklan: Bir Gözlemevi İnşa Et"
 je_academics_build_observatory_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bir [concept_verrier_observatory] inşa etmemizi istiyor. Bir Gözlemevi inşa etmek için en az bir Üniversiteye sahip olmalı ve ya #b Modern Astronomi#! araştırmış olmalı ya da bir [concept_verrier_astronomer]'a sahip olmalıyız."
 academics.2013.t: "Yeni Gözlemevi Gözleme Başlıyor"
 academics.2013.d: "Yeni bir [concept_verrier_observatory] kapılarını açtı ve gökyüzünü gözlemlemeye başladı. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri memnun... şimdilik."
 academics.2013.f: "Bir Gözlemevi inşa ettikten sonra, ulusumuz nihayet gece gökyüzünü keşfedebilecek. Tebrikler. Artık bilimsel olarak gelişmiş bir ülke olarak kabul edilebiliriz.\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri"
 academics.2013.g: "Gecenin gizemlerini ortaya çıkaracağız!"
 academics.2014.t: "Astronomik Bir Başarısızlık"
 academics.2014.d: "Bir [concept_verrier_observatory] inşa edemedik. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri derinden hayal kırıklığına uğramış durumda!"
 academics.2014.f: "Bir Gözlemevi inşa etmek son derece zor bir iş olmalı ki ulusumuz bunu 10 yılda başaramadı! Bu sürede yüzlerce yeni yıldız bulabilir veya birçok kuyruklu yıldızın hareketini hesaplayabilirdik. Ama uygun bir teleskop olmadan bu mümkün değil. Utanç verici bir manzara.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "Suç kuyruklu yıldızındaydı!"
 academics.2015.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] X Gezegeni'ni bulmamızı istiyor"
 academics.2015.d: "[concept_academics_scientific_society] üyelerimiz, X Gezegeni'ni keşfetmenin bu Yüzyılın en büyük bilimsel başarısı olacağına inanıyor. Bizden, herkesten önce gizemli gezegeni bulmaya odaklanmamızı istiyorlar."
 academics.2015.f: "Diğer ulusların X Gezegeni'ni bulmak için hevesli olduğunu duyduk. Ama bu başarı sadece bize ait olmalı! Bu muazzam görevde herkesi geçmeliyiz!\n\nİmza, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] Konseyi"
 academics.2015.g: "Focus all our resources on finding that planet!"
 academics.2015.h: "X Gezegeni mi? Daha çok Y Gezegeni gibi..."
 academics.2015_goal_tt: "Herkesten önce #b X Gezegeni#!'ni bulmalısınız. Onu keşfetme şansına sahip olmak için bir [concept_verrier_astronomer] ve #p 1500#! keşfedilmiş [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]'ne ihtiyacımız olacak."
 academics.2015_reward_tt: "Ödül olarak Aydınlar #p 5 Onay#! alacak ve 10 yıl boyunca üretim teknolojisi maliyeti #p %5#! azalacak, ayrıca akademisyenler arasında #p %10#! sadık taraftar kazanacaksınız ve [concept_verrier_astronomer]'ınız #p 50#! [concept_academics_experience] kazanacak."
 je_academics_find_planet_x: "Astronomiye Odaklan: X Gezegeni'ni Bul"
 je_academics_find_planet_x_reason: "T[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] gizemli #o X Gezegeni#!'ni bulmamızı istiyor. Onu keşfetme şansına sahip olmak için bir [concept_verrier_astronomer] ve #p 1500#! keşfedilmiş [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]'ne ihtiyacımız olacak."
 je_academics_find_planet_x_complete_tt: "Herkesden önce #o X Gezegeni#!'ni keşfet."
 je_academics_find_planet_x_fail_tt: "Birisi #o X Gezegeni#!'ni sizden önce keşfetti."
 academics.2016.t: "X Gezegeni'ni Bulduk"
 academics.2016.d: "X Gezegeni'ni ilk bulan biziz! Bu umarım [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]'ı memnun eder."
 academics.2016.f: "Mektup garip formüller ve diyagramlarla karalanmıştı. Üzerine birinin bir sıvı dökmüş gibi görünen lekeler vardı ve tahmin etmek zorunda kalsaydınız, kağıt üzerinde havyar kalıntıları olduğuna yemin edebilirdiniz. Burada ne olduğunu merak etmeden duramadınız."
 academics.2016.g: "Bu yüzyılın en önemli astronomik keşfi!"
 academics.2017.t: "We were too late to find Planet X"
 academics.2017.d: "Başka bir ulus X Gezegeni'ni bizden önce keşfetti. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] üyeleri bu yenilgi karşısında perişan oldu!"
 academics.2017.f: "Kabul edilemez.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2017.g: "Zaten o gerçek bir gezegen değil!"
 academics_would_replace_engineer_loc: "\n• This would #n replace#! the current [concept_tesla_engineer], [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] (#tooltip:[ROOT.Var('tesla_engineer_var').GetCharacter.GetTooltipTag],tesla_engineer_rating_tt_loc [ROOT.Var('tesla_engineer_var').GetCharacter.GetCustom('tesla_engineer_rating_icon_type')]#!)#!."
