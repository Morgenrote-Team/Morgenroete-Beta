 rapanui_pacific_expedition_decision: "Pasifik’e Sefer"
 rapanui_pacific_expedition_decision_desc: "Kutup bölgeleriyle birlikte Pasifik Okyanusu, hâlâ sırlarla dolu dünyanın son alanlarından biridir. Birden fazla bilim dalından araştırmacılar, doğal tarih, arkeoloji, astronomi ve okyanusbilim çalışmaları yapmak için bir misyon düzenlemeye ilgi duyuyor. Büyük güçler için, dünyanın ucundaki etkilerini göstermek açısından prestijli bir girişim olabilir."
