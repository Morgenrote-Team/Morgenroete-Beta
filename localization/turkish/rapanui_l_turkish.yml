 rapanui_send_new_missionaries_button_desc: "Yeni misyonerlerle, dönüştürme şansımızı artırabiliriz. Girişimin ne kadar başarılı olacağı şansa bağlı."
 rapanui_trade_with_natives_button: "Yerlilerle Ticaret"
 rapanui_trade_with_natives_button_desc: "Dönüştürmeye devam etmek yerine, etkimizle egzotik hediyeler alabiliriz."
 rapanui_sabotage_rival_missionaries_button: "Rakip Misyonerleri Kara Çal"
 rapanui_sabotage_rival_missionaries_button_desc: "Yerinde rakip bir misyon varsa, onu itibarsızlaştırmayı ve yıllarca misyonerlik şansını etkilemeyi deneyebiliriz. Başarı şansımız %50:50. Bu sadece yıllık dönüşüm oranını etkiler."
 rapanui_change_course_button: "Seferin Rotasını Değiştir"
 rapanui_change_course_button_desc: "Bir [concept_dubois_pacific_expedition] sırasında geminin rotasını değiştirmek mümkün. Bu durumda gemi, başlangıçta seçilen bölgeden ayrılır ve diğer iki hedeften birine yönelir."
 je_rapanui_catholic_mission_oceania: "Okyanusya'da Katolik Misyon Kur"
 je_rapanui_catholic_mission_oceania_reason: "Misyonerimiz Father [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], yerlileri Hristiyan inancına dönüştürmek için yorulmadan çalışıyor. Nüfusun yılda yaklaşık %1’inin Katolikliğe dönüştürülmesi bekleniyor. Rastgele olaylar bu sonucu artırabilir. Ancak misyonerlik, çok kabaca davranışlar nedeniyle yerlilerin öfkesini çekerse, tüm girişim başarısız olabilir. Eğer nüfusun %30’u eski inançlarını bırakıp Mesih adına dönmüşse, kalıcı bir misyon istasyonu kurabiliriz."
 je_rapanui_protestant_mission_oceania: "Okyanusya'da Protestan Misyon Kur"
 je_rapanui_protestant_mission_oceania_reason: "Misyonerimiz Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], yerlileri Hristiyan inancına dönüştürmek için yorulmadan çalışıyor. Nüfusun yılda yaklaşık %1’inin Katolikliğe dönüştürülmesi bekleniyor. Rastgele olaylar bu sonucu artırabilir. Ancak misyonerlik, çok kabaca davranışlar nedeniyle yerlilerin öfkesini çekerse, tüm girişim başarısız olabilir. Eğer nüfusun %30’u eski inançlarını bırakıp Mesih adına dönmüşse, kalıcı bir misyon istasyonu kurabiliriz."
 je_rapanui_mission_fail: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’in Hristiyanlaştırılması, yerli saldırganlığı 5 puan veya daha fazla ise başarısız olacak."
 je_rapanui_catholic_conversion_oceania: "Bir lideri Katolikliğe dönüştür"
 je_rapanui_catholic_conversion_oceania_reason: "Kabile reisinin dönüştürülmesi, yerliler arasında Hristiyanlığı kesin olarak kurmak ve devlet dini haline getirmek için belirleyici adımdır. Bunun için, nüfusun çoğunluğunun Katolikliği takip etmesi gerekir. Eğer bu eyalette sapkın Marian düşmanlarının rakip bir misyon istasyonu varsa, onların siyasi güç kazanmasını önlemek için elimizden geleni yapmalıyız. Misyonerimiz Father [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], bunun olmasını engelleyecek ve nüfusun %1’ini her yıl doğru inanca yönlendirecek. Bu eylem her üç yılda bir gerçekleştirilebilir."
 je_rapanui_protestant_conversion_oceania: "Bir lideri Protestanlığa dönüştür"
 je_rapanui_protestant_conversion_oceania_reason: "Kabile reisinin dönüştürülmesi, yerliler arasında Hristiyanlığı kesin olarak kurmak ve devlet dini haline getirmek için belirleyici adımdır. Bunun için, nüfusun çoğunluğunun Protestanlığı takip etmesi gerekir. Eğer bu eyalette sapkın Katoliklerin rakip bir misyon istasyonu varsa, onların siyasi güç kazanmasını önlemek için elimizden geleni yapmalıyız. Misyonerimiz Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], bunun olmasını engelleyecek ve nüfusun %1’ini her yıl doğru inanca yönlendirecek. Bu eylem her üç yılda bir gerçekleştirilebilir."
 je_rapanui_crisis_in_paradise: "Eğer farklı inançtan bir ulus lideri bizden önce dönüştürürse, Hristiyanlaştırma başarısız olur."
 je_rapanui_pacific_expedition: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi"
 je_rapanui_pacific_expedition_reason: "Kutup bölgeleriyle birlikte Pasifik Okyanusu, hâlâ sırlarla dolu dünyanın son alanlarından biridir. Birden fazla bilim dalından araştırmacılar, doğal tarih, arkeoloji, astronomi ve okyanusbilim çalışmaları yapmak için bir araştırma misyonuna ilgi duyuyor. Büyük güçler için, dünyanın ucundaki etkilerini göstermek açısından prestijli bir girişim olabilir."
 je_rapanui_pacific_expedition_success: "Sefer, genel bir yolculukta yedi, özel bir yolculukta beş farklı istasyondan sonra geri dönecek."
 je_rapanui_pacific_expedition_goal: "Sefer, genel bir yolculukta yedi, özel bir yolculukta beş farklı istasyondan sonra geri dönecek."
 je_rapanui_oceanographic_studies: "Oşinografik Çalışmalar"
 je_rapanui_oceanographic_studies_reason: "Oşinografik çalışmalar, sadece okyanusu ve davranışlarını daha iyi anlamamıza yardımcı olmakla kalmayacak, başarılı olursa önemli avantajlar da sağlayacaktır. Her akıntıyı bilen ve denizdeki değişiklikleri doğru yorumlayan bir ulus, her zaman rakiplerinin bir adım önündedir."
 je_rapanui_oceanographic_studies_success: "Eğer #G 25#! #E Oşinografik Bilgi#! kazanırsak çalışmalarımızı tamamlamış olacağız."
 je_rapanui_oceanographic_studies_goal: "Eğer #G 25#! #E Oşinografik Bilgi#! kazanırsak çalışmalarımızı tamamlamış olacağız."
 notification_rapanui_challenger_notification_name: "[INITIATOR_COUNTRY.GetName] okyanus dibinin en derin noktasını keşfetti"
 notification_rapanui_challenger_notification_desc: "[INITIATOR_COUNTRY.GetName]’den bir sefer, Pasifik Okyanusu’nun dibinde ölçülmüş en derin noktayı keşfetti."
 notification_rapanui_wallace_notification_name: "[INITIATOR_COUNTRY.GetName]’den araştırmacı evrim teorisini doğruladı"
 notification_rapanui_wallace_notification_desc: "[INITIATOR_COUNTRY.GetName]’den bir bilim insanı, Endonezya’daki fauna sınırını belirleyerek evrim teorisinin kanıtlanmasına önemli bir katkı sağladı."
 rapanui.101.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’a Katolik Misyon"
 rapanui.101.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’a Protestan Misyon"
 rapanui.101.d_cat: "Cesur Father [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a misyoner olarak gitmeyi ve yerel paganları İsa Mesih’e dönüştürmeyi kabul etti."
 rapanui.101.d_pro: "Cesur Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a misyoner olarak gitmeyi ve yerel paganları İsa Mesih’e dönüştürmeyi kabul etti."
 rapanui.101.f: "Okyanus Adaları, 19. yüzyılda Batı medeniyetinden büyük ölçüde izole bir bölgeydi. Misyonerler, sadece inancı değil, aynı zamanda eğitim ve teknolojiyi de bu bölgelere getirmede önemli rol oynadı. Okyanusya, 20. yüzyılın ortalarında tamamen Hristiyanlaşmış olsa da, misyonerler başlangıçta güvensizlik ve birçok başarısızlıkla karşılaştı. 'Vahşi Güney Denizi' klişesi, birçok misyonerin en korkunç şekilde şehit olması gerçeğinden de türemiştir."
 rapanui.101.g_cat: "Vade cum Deo."
 rapanui.101.g_pro: "Go with God."
 rapanui.102.t_cat: "[SCOPE.sCountry('rapanui_mission_departure_country').GetNameNoFlag]'dan Katolik Misyon"
 rapanui.102.t_pro: "[SCOPE.sCountry('rapanui_mission_departure_country').GetNameNoFlag]'dan Protestan Misyon"
 rapanui.102.d: "Bugün yabancı bir misyoner sahillere ulaştı. Bazıları onu belalı biri olarak görüyor, bazıları ise ülkemize fayda getirebileceğine inanıyor."
 rapanui.102.f: "Pasifik adası halkları ile gelen Hristiyan misyonerler arasındaki ilişki son derece karmaşıktı. Misyonerler, haklı olarak sömürge güçlerinin habercileri ve geleneksel kültürü potansiyel olarak yok edebilecek kişiler olarak görülüyordu. Ancak birçok durumda adalılar, Avrupalıların deneyim ve bilgileri sayesinde fayda sağladı. Misyonerler okullar kurdu, modern tıbbı getirdi veya yeni tarım yöntemleri tanıttı. Birçok kabile için misyonerlerin gelişi, merkeziyetçiliğe atılan ilk adımı temsil etti. Elbette tüm Pasifik sakinleri bu riski almak istemedi ve davetsiz misyonerleri kısa sürede uzaklaştırdı."
 rapanui.102.g: "Öldürün!"
 rapanui.102.h: "Bağışlayın ama görmezden gelin."
 rapanui.102.i: "Dostane bir karşılama sunun."
 rapanui.104.t: "Misyoner şehit oldu!"
 rapanui.104.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a yapılan misyon tamamen başarısız oldu. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_missionary_death_type')]"
 rapanui.104.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a yapılan misyon tamamen başarısız oldu. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_missionary_death_type')]"
 rapanui.104.f: "Ne yazık ki, birçok misyonerlik girişimi, yanlış anlamalar ve yerel gelenekler hakkındaki bilgi eksikliği nedeniyle misyonerin öldürülmesiyle sonuçlandı. Rahip Pierre Chanel Futuna’da öldürüldü; John Williams ve James Harris Erromango adasında yamyamlar tarafından yenildi; Carl Völkner ise Yeni Zelanda’da önce başı kesildi, sonra kabile reisi gözlerini çıkardı ve yuttu.\nBöyle bir başarısızlıktan sonra, yeni bir gönüllü misyoner bulunması yaklaşık beş yıl sürecektir. Dönüştürme denemeleri ne kadar çok olursa, bir sonraki denemenin başarılı olma şansı o kadar artar."
 rapanui.104.g_cat: "Requiem aeternam dona eis, Domine."
 rapanui.104.g_pro: "May he find eternal rest."
 rapanui.105.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a Misyoner Varış"
 rapanui.105.d_cat: "Father [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a güvenle ulaştı. Şu ana kadar yerlilerden ilgi görmedi. Hala hayatta olması küçük bir başarı olarak sayılabilir. Ama hala yapacak çok işi var."
 rapanui.105.d_pro: "Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a güvenle ulaştı. Şu ana kadar yerlilerden ilgi görmedi. Hala hayatta olması küçük bir başarı olarak sayılabilir. Ama hala yapacak çok işi var."
 rapanui.105.f: "Varışta, bazı misyonerler onları hızla uzaklaştırmak isteyen agresif halkla karşılaştı. Bazıları ise ilgi gösterdi ve silah ticareti veya yeni teknolojiler umudu taşıdı. Ama bazı yerlerde Mesih’in mesajı sadece ilgisizlikle karşılandı. Misyonerler için bu iyi bir işaretti: sonuçta, yaşayan misyonerler bir şeyler başarabilir, ölüler ise yapamazdı."
 rapanui.105.g_cat: "Deo gratias."
 rapanui.105.g_pro: "Thanks be to God."
 rapanui.106.t: "Misyoner için Dostane Karşılama"
 rapanui.106.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a yapılan misyon büyük bir başarı oldu. Father [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], yerliler tarafından sıcak karşılandı ve ilk vaftizleri duyurabildi."
 rapanui.106.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'a yapılan misyon büyük bir başarı oldu. Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], yerliler tarafından sıcak karşılandı ve ilk vaftizleri duyurabildi."
 rapanui.106.f: "Yerel halkın misyonerlere karşı tavrı adadan adaya değişiyordu. Düşmanlık veya korkuya ek olarak, bazı sakinler de spontan ilgi gösterdi. Mangareva Krallığı'nda Fransız misyonerler, çok kısa sürede nüfusun büyük kısmını Hristiyanlığa dönüştürmeyi ve kralı vaftiz etmeyi başardılar. Varışlarından bir yıl içinde, misyonerler Taravai, Aukena ve Akamuru adalarındaki yerlileri Hristiyanlığa dönüştürdü, kiliseler kurdu ve hatta adalıları tunik giymeye ikna etti. Rikitea'da, Güney Pasifik adalarının en büyük kilisesi olan St. Michael Katedrali inşa edildi."
 rapanui.106.g_cat: "Ad maiorem Dei gloriam!"
 rapanui.106.g_pro: "Tanrı'nın yüce şanı için!"
 rapanui.111.t_cat: "Katolisizmin Zaferi"
 rapanui.111.t_pro: "Protestanlığın Zaferi"
 rapanui.111.d_cat: "İyi Father [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]'in [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'daki çalışmaları verimli oldu. Gevşek misyonerlik faaliyetlerinden gelişen canlı bir Hristiyan topluluğu ortaya çıktı."
 rapanui.111.d_pro: "İyi Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]'in [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'daki çalışmaları verimli oldu. Gevşek misyonerlik faaliyetlerinden gelişen canlı bir Hristiyan topluluğu ortaya çıktı."
 rapanui.111.f: "Sağlam bir Hristiyan topluluğu kurulduktan sonra, misyonerler artık ülkeden kolayca atılamaz. Yerel prens bile yakında Hristiyanlık konusundaki duruşunu yeniden değerlendirmek zorunda kalacak. Artık soru, [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'ın Hristiyanlığa dönüp dönmeyeceği değil, ne zaman döneceğidir. Bir sonraki hedef, Hristiyanlığı devlet dini yapmak ve tüm ülkenin dönüşümünü teşvik etmek için hükümdarın dönüştürülmesi olmalıdır."
 rapanui.112.t: "Katolik misyon kalıcı olarak kuruldu"
 rapanui.113.t: "Protestan misyon kalıcı olarak kuruldu"
 rapanui.112.d: "Bir Hristiyan misyonu, ülkemizde kalıcı olarak kendini kurmayı başardı. Yabancılardan kurtulmak artık çok daha zor olacak."
 rapanui.112.f: "Nüfusun neredeyse üçte biri eski inançlarını bırakarak Hristiyanlığı benimsediğine göre, [ROOT.GetCountry.GetNameNoFlag]'ın geleceği hakkında meşru sorular ortaya çıkıyor. Hızlı dönüşüm başarıları gelecekte de durmayacak. Şamanlar bekleyip görürken, Hristiyanlaşmış bazı kabile liderleri ülkeyi modernize etmek için bu fırsatı kullanmayı önerdi."
 rapanui.112.g: "Bu gelişmeyi yakından izlemeliyiz."
 rapanui.112.h: "Yabancılara daha açık olmalıyız."
 rapanui.114.t: "Kâfirlerin Gazabı"
 rapanui.114.d_cat: "Korkunç haber! Father [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]'in [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'daki diplomatik olmayan davranışları yerli halkın ona karşı isyan etmesine neden oldu. Misyon istasyonunu ateşe verdiler ve rahibi öldürdüler!"
 rapanui.114.d_pro: "Korkunç haber! Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]'in [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'daki diplomatik olmayan davranışları yerli halkın ona karşı isyan etmesine neden oldu. Misyon istasyonunu ateşe verdiler ve misyoneri öldürdüler!"
 rapanui.114.f: "Misyonerlik genellikle sert uygulama ile zarif diplomasi arasında doğru dengeyi gerektirir. Birçok durumda, aşırı gayretli bir misyoner işini tamamlamadan ölmüştür. Özellikle Güney Denizi'nde, evangelik misyonerler nüfusu dönüştürmek için sert yöntemler kullanmasıyla ünlüydü — ya büyük başarı ya da büyük felaketle sonuçlanır. Bu durumda, sonuncusu misyonerimiz için gerçekleşti."
 rapanui.115.t: "Katolik misyon kaldırıldı"
 rapanui.115.d: "Yabancı misyonerlerin uygunsuz davranışları halkımızın sabrını çok uzun süre zorladı. Popüler bir ayaklanma misyon istasyonunu harabeye çevirdi ve misyoneri de beraberinde yok etti."
 rapanui.115.f: "Görünüşe göre Avrupalılar çok dikkatsizdi. Nüfusu dönüştürmek yerine onları kendi inançlarına geri döndürdüler. Bu olaydan sonra birçok yurttaşımız eski inançlarına geri döndü. Görünüşe göre bu Hristiyanlık saf bir aldatmacaydı."
 rapanui.115.g: "Bunu hak ettiler."
 rapanui.116.t: "Protestan misyon kaldırıldı"
 rapanui.122.t: "İncil Çevirisi"
 rapanui.122.d: "[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'daki misyonerimiz, İncil’i yerel dile çevirdi. Bu, Hristiyanlığa dönüşümü teşvik edecektir."
 rapanui.122.f: "Başlangıçta, Pasifik adalarındaki ilk misyonerler sözlükler oluşturmak ve daha sonra İncil’i yerel dile çevirmek için notlar aldılar. Ancak aşırı gayret bazı misyonerler için zarardan başka bir şey getirmeyebilirdi."
 rapanui.122.g: "Bu, yerel halkı dönüştürmede faydalı olacak."
 rapanui.122.h: "Yeni bir misyoner girişimine başlamak için doğru zaman."
 rapanui.123.t: "Köle tacirleri Misyoner Adasına saldırdı"
 rapanui.123.d: "[SCOPE.sCountry('rapanui_slaver_country').GetNameNoFlag]'den köle tacirleri [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'ya saldırdı. Misyonerimiz [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], baskınları durdurmak için acil müdahale talebinde bulunuyor."
 rapanui.123.f: "19. yüzyılın ikinci yarısına kadar, özellikle Perulu köle tacirlerinin tüm adaları boşaltması yaygındı. Bu tür ucuz işgücü temini, özellikle kuzey Avustralya'da yaygın olan 'blackbirding'den çok daha zalimceydi. Bu saldırılar misyonerler için büyük bir yük oldu; çünkü nominal Hristiyanlar bu adalarda acımasızca dolaşırken yerlileri dönüştürmek hiç de kolay değildi. Katolik ve Protestan din adamları arasında yaygın olan köleliğin kaldırılması hareketi bu tür olaylardan yeni bir ivme kazandı."
 rapanui.123.g: "Bu bizim işimiz değil."
 rapanui.123.h: "Bu insanlık dışı faaliyeti derhal durdurmalıyız!"
 rapanui.124.t: "Putperestlik"
 rapanui.124.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'da hâlâ putperest olan birçok yerli bulunuyor. [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], Aziz Bonifatius geleneğinde örnek olmayı planlıyor."
 rapanui.124.f: "Putların veya kutsal mekânların yok edilmesi, ilkel halkları her zaman derinden sarsmıştır. Bazıları bunu Hristiyan Tanrısı’nın kendi tanrı dünyalarına üstün olduğunun kanıtı olarak görür; diğerleri ise Hristiyanlığa karşı daha sert savaşmaları için bir sebep olarak algılardı. Bazı sanatseverler, putların başka yerlerde daha iyi olacağını belirtti."
 rapanui.124.g: "Putları yok et!"
 rapanui.124.h: "Onları zarif bir şekilde ortadan kaldır."
 rapanui.124.i: "Onlara dokunma."
 rapanui.125.t: "Ata kültü"
 rapanui.125.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'da ata kültüyle nasıl başa çıkılacağı tartışması zirveye ulaşıyor. Süregelen bu kült, misyonerlik çalışmalarını önemli ölçüde zorlaştırıyor."
 rapanui.125.f: "Dünyanın birçok yerinde olduğu gibi, ata kültü ruhsal yaşamın merkezi bir parçasıydı. Katolik misyonerler yüzyıllar önce bu sorunla mücadele etmiş ve başlangıçta geleceğini göz ardı etmişti; özellikle Protestan misyonerler ata kültüne karşı inanılmaz bir sertlik gösterdi. Bununla birlikte, Polinezya’nın bazı bölgelerinde ata kültü hâlâ yaygındır - günümüzde de."
 rapanui.125.g: "Bu kült sona ermeli!"
 rapanui.125.h: "Uygulanabilir bir geçici çözüm bulacağız."
 rapanui.126.t: "Sentez (Senktrizm)"
 rapanui.126.d: "Tüm çabalara rağmen, misyoner [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'da animist ve Hristiyan unsurların karıştığı bir sentezci topluluğun oluştuğunu son raporunda itiraf etmek zorunda kaldı."
 rapanui.126.f: "Sentez, misyonerler için her zaman bir sorun olmuştur. Bazıları bunu bir sonraki adımda aşılabilecek geçiş aşaması olarak görüyordu; diğerleri bu sapkınlığı, dönüştürülmesi gereken asıl dinden daha büyük bir kötülük olarak algıladı. Yine de, sentezci hareketler birçok birey için kimlik olmuştur ve hâlâ öyledir; bu nedenle bu doktrinin bastırılması gerilim yaratacaktır. Bu tür fenomenlerin ilginç kültürel ve sanatsal özellikleri antropologları ve sanatseverleri her zaman etkilemiştir."
 rapanui.126.g: "Bu sapkınlık ortadan kaldırılmalı!"
 rapanui.126.h: "Daha fazla zamana ihtiyaçları var."
 rapanui.126.i: "Bu sentezci kültür çok ilginç."
 rapanui.127.t: "Bay [SCOPE.sCharacter('rapanui_missionary_scope').GetLastName]'in Erkek Korosu"
 rapanui.127.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'daki kilise korosu, yerel çocuklardan oluşuyor ve şaşırtıcı derecede kaliteli."
 rapanui.127.f: "'Vita vita nostra tellus nostra sic clamant sic\nVita vita nostra tellus nostra vita nostra clamant\nPoena poena nostra vires nostra poena nostra sic\nPoena poena nostra vires nostra poena nostra clamant\nIra ira nostra fides nostra ira nostra sic.\nIra ira nostra fides nostra ira nostra clamant.\nVita vita nostra tellus nostra vita nostra sic.'"
 rapanui.127.g: "Bu, inancın güzelliğini yerlilere gösterecek."
 rapanui.127.h: "Bu, yerli halkın ruhlarına huzur getirecek."
 rapanui.127.i: "Bu müzik Avrupa’da duyulmalı!"
 rapanui.128.t: "Toplu vaftiz"
 rapanui.128.d_cat: "Father [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'dan bir klan ve tüm üyeleri İsa Mesih’e kendilerini adadıktan sonra gerçekleşen etkileyici bir toplu vaftizi bildiriyor."
 rapanui.128.d_pro: "Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'dan bir klan ve tüm üyeleri İsa Mesih’e kendilerini adadıktan sonra gerçekleşen etkileyici bir toplu vaftizi bildiriyor."
 rapanui.128.f_cat: "Credo in unum Deum,\nPatrem omnipotentem,\nfactorem caeli et terrae,\nvisibilium omnium, et invisibilium\net in unum Dominum Iesum, Christum,\nFilium Dei unigenitum\net ex Patre natum ante omnia saecula."
 rapanui.128.f_pro: "Bir Tanrı'ya inanırım,\ntüm göklerin ve yerin yaratıcısı olan,\ngörünür ve görünmez her şeyin Babası.\nVe bir Tanrı, İsa Mesih’e,\nTanrı’nın biricik Oğlu,\nher çağdan önce Babadan doğmuş."
 rapanui.128.g: "Âmin."
 rapanui.129.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'da Hastalıklar"
 rapanui.129.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] sakinleri, adaları saran gizemli bir hastalıktan şikayet ediyor ve bunun adaya misyonerlerimiz tarafından getirildiğini iddia ediyor."
 rapanui.129.f: "Avrupalı yerleşimcilerin, misyonerlerin ve tüccarların gelişiyle birlikte, daha önce bilinmeyen hastalıklar da adalara geldi. Bunlar arasında grip, zatürre, kızamık, kabakulak, kızıl hastalığı, çiçek hastalığı, boğmaca ve soğuk algınlığı yer alıyordu. Öte yandan, geleneksel tıp çok fazla bir şey yapamıyordu. Hristiyan misyonerlik faaliyetlerinin başlamasıyla olan bağlantı, pek çok kişinin vaftizin anlamlılığından şüphe etmesine yol açtı; çünkü Hristiyan Tanrısı, görünüşe göre bu salgın karşısında çok az şey yapabiliyordu."
 rapanui.129.g: "Bu şeytanın işi."
 rapanui.130.t: "Misyoner sıtma nedeniyle öldü"
 rapanui.130.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’dan üzücü haber: Rahip [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], tropikal bir hastalıktan öldü. Onun cesur bağlılığı ve misyonerlik çalışmalarındaki liderliği unutulmayacak."
 rapanui.130.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’dan üzücü haber: Rahip [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], tropikal bir hastalıktan öldü. Onun cesur bağlılığı ve misyonerlik çalışmalarındaki liderliği unutulmayacak."
 rapanui.130.f: "Okyanusya’daki misyonerler sadece şehitlik yaşamadı. Tıpkı yerlilerin Avrupalı hastalıklardan ölmesi gibi, Avrupalılar da oradaki hastalıklardan öldü. Misyonerlik çalışmaları devam edecek, bir halef zaten atanmış durumda. Ancak bu yıl vaftiz çalışmaları yapılmayacak."
 rapanui.132.t: "Verimli Misyonerler"
 rapanui.132.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’a gönderdiğimiz yeni misyonerlerin özellikle yetenekli kişiler olduğu ortaya çıktı: misyonerlik çalışmaları beklenenden daha iyi ilerliyor."
 rapanui.132.f: "'İşte aynı Aborijinlerin yakın akrabaları için İncil’in neler yaptığını hatırlayın. Kendi Aneityum’ümüzde, 3.500 Yamyam, putperestliklerinden vazgeçmeye ikna edildi... Fiji’de, 79.000 Yamyam İncil’in etkisi altına alındı; ve 13.000 kilise üyesi İsa için yaşamayı ve çalışmayı taahhüt ediyor. Samoa’da 34.000 Yamyam Hristiyanlığı benimsedi; ve on dokuz yıl içinde, kolejimiz 206 Yerli öğretmen ve vaiz yetiştirip gönderdi. Yeni Hebridler’de 12.000’den fazla Yamyam, İsa’nın huzurunda oturmaya yönlendirildi; tabii hepsinin model Hristiyan olduğunu söylemek istemiyorum; ve 133 Yerli, İncil’i öğretmek ve vaaz vermek için eğitildi ve görevlendirildi.' - John G. Paton"
 rapanui.132.g: "Onlar Tanrı’nın işini yapıyor."
 rapanui.133.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’daki Yeni Misyonerler"
 rapanui.133.d: "Misyon istasyonuna geldikten sonra, yeni misyonerler doğrudan çalışmalarına başladılar ve ilk başarıları bildirebiliyorlar."
 rapanui.133.f: "İbadetleri tamamen korkuya dayalı bir hizmetti; amacı bu veya şu kötü ruhu yatıştırmak, felaketi önlemek veya intikam sağlamaktı. Şeflerini tanrılaştırdılar, böylece neredeyse her köy veya kabile kendi Kutsal Adamına sahipti. Bu köy veya kabile rahipleri, kötülükte olağanüstü bir etkiye sahipti ve kutsal törenleriyle yaşam ve ölümü kontrol edebileceklerine inanılıyordu. Ayrıca atalarının ve kahramanların ruhlarına, ahşap ve taş heykeller aracılığıyla tapıyorlardı. Ruhları korkuyor ve yardımını arıyorlardı; özellikle savaş ve barış, kıtlık ve bolluk, sağlık ve hastalık, yıkım ve refah, yaşam ve ölüm üzerinde hükmeden ruhları yatıştırmaya çalışıyorlardı. Tüm ibadetleri kölece bir korku üzerine kuruluydu; ve bildiğim kadarıyla, merhamet veya lütuf Tanrısı hakkında hiçbir fikirleri yoktu. - John G. Paton"
 rapanui.133.g: "İyi bir iş yapıyorlar."
 rapanui.134.t: "Yetersiz Misyonerler?"
 rapanui.134.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’a gönderdiğimiz yeni misyoner grubuna rağmen, dönüştürme çabalarımız sadece sınırlı başarı sağladı."
 rapanui.134.f: "Düşmanlarım hayatıma yönelik nefret dolu planlarından nadiren vazgeçerdi, ne kadar sakinleşmiş veya o anda şaşkın olsalar da... Vahşi bir şef, dört saat boyunca yüklü tüfeğiyle peşimden dolaştı ve çoğu zaman bana yöneltmesine rağmen, Tanrı elini tuttu. Ona nazikçe konuştum ve sanki orada yokmuş gibi işime devam ettim, Tanrımın beni oraya yerleştirdiğine ve atanmış görevim bitene kadar koruyacağına tamamen inandım. Sevgili Rabbimiz İsa’ya sürekli dua ederek, her şeyi O’nun ellerine bıraktım ve işim bitene kadar ölümsüz gibi hissettim. Zorluklar ve dar kaçışlar inancımı güçlendirdi ve bana daha fazlasını yapma cesareti verdi; ve bunlar ardı ardına geldi. - John G. Paton"
 rapanui.134.g: "Hiçbir şey yapıyorlar mı?"
 rapanui.135.t: "Yerlilerle Ticaret"
 rapanui.135.d: "Yerel liderle iletişim kurduktan sonra, onunla ne takas edileceği sorusu ortaya çıkıyor; değerli bir eser, bir [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] veya değerli inciler teklif ediyor."
 rapanui.135.f: "Ticaret karşılıklıdır: karşılığında, yerli ülke bir teknoloji bonusu alır."
 rapanui.135.g: "Eserle ilgileniyoruz."
 rapanui.135.h: "Seçimimiz hayvana düştü."
 rapanui.135.i: "İncileri beğendik."
 rapanui.136.t: "Manta Vatozu"
 rapanui.136.d: "Yerliler bize muhteşem bir dev vatoz gönderdi; aynı gün evimize gönderdik."
 rapanui.136.f: "Dev manta vatozu hem büyüleyici hem de egzotik bir hayvandır ve yerel bir hayvanat bahçesi için yeni bir ilgi çekicidir. Avustralya ve Okyanusya faunasının tipik hayvanlarından biridir."
 rapanui.136.g: "Harika!"
 rapanui.137.t: "Yeşil Deniz Kaplumbağası"
 rapanui.137.d: "Yerliler bize mükemmel bir deniz kaplumbağası gönderdi; aynı gün evimize gönderdik."
 rapanui.137.f: "Yeşil deniz kaplumbağası hem büyüleyici hem de egzotik bir hayvandır ve yerel bir hayvanat bahçesi için yeni bir ilgi çekicidir. Avustralya ve Okyanusya faunasının tipik hayvanlarından biridir."
 rapanui.138.t: "İtibar zedeleme işe yaradı"
 rapanui.138.d: "Birkaç rüşvet verilen yerli tanığın yardımı ve misyonerimizin retorik becerilerini kullanarak, bazı yerel klanları rakip misyon istasyonunun kötü niyetleri hakkında bilgilendirebildik."
 rapanui.138.f: "Rakip misyoner istasyonları arasındaki anlaşmazlıklar, özellikle protestan ve katolik gruplar arasında, genellikle bir grubun, lider dönüştüğü takdirde, ilgili hükümdar tarafından kovulmasıyla sonuçlanan bir çatışma oluşturuyordu. Tahiti örneğinde, kavgalar tam ölçekli bir savaşa bile yol açtı; çünkü Protestan Tahiti, Fransız koruması altındaki Katolik misyonerlere karşı çıktı. Bu olay, Fransa’nın Tahiti’deki askeri müdahalesinin önsözü oldu; Büyük Britanya ise, dönüştürdüğü Tahiti’nin koruyucusu olarak, birkaç ada yüzünden çatışmaya çekilmedi."
 rapanui.139.t: "İtibar zedeleme ters tepti"
 rapanui.139.d: "Rakip misyon istasyonunun kötü niyetlerini koyunlarımıza -ve olacaklara- anlatma niyetimiz ne kadar iyi olursa olsun, maalesef bizi dinlemek istemediler. Aksine: artık ada üzerinde barışı bozmak isteyen ikiyüzlü sorun çıkarıcılar olarak görülüyoruz!"
 rapanui.139.g: "Bu plan beklenildiği gibi işlemedi."
 rapanui.140.t: "Kumpas!"
 rapanui.140.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’daki rakip bir misyon istasyonu, iyi itibarımıza zarar verdi ve sadece politik etki ve manipülasyon yürüttüğümüzü iddia etti. Dönüştürme şanslarımız ciddi şekilde etkilendi!"
 rapanui.140.g: "Ve bu insanlar kendilerini Hristiyan mı sanıyor?"
 rapanui.141.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] Katolik inancını benimsiyor"
 rapanui.141.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] Protestan inancını benimsiyor"
 rapanui.141.d_cat: "Bugün düzenlenen görkemli bir ayinde, [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’ın hükümdarı İsa Mesih’i ilan etti ve Katolik inancını kabul etti. Rahip [SCOPE.sCharacter('rapanui_missionary_scope').GetLastName]’in misyonerlik çalışmaları böylece doruğa ulaşmış oldu."
 rapanui.141.d_pro: "Misyonerimiz, Rahip [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], bugün [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] hükümdarını Rab adına vaftiz etti. Ülkedeki Hristiyan misyonu böylece son engeli aşmış oldu."
 rapanui.141.f: "Eskiden putperest olan ülkenin hükümdarının dönüşümü ile kendi halkını doğru inanca yönlendirmek için çaba gösterecek. [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] bir süre danışman olarak süreçte bulunacak, ancak öngörülebilir gelecekte ülkesine dönecek. Dönüşüm ile birlikte [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag], bizim korumamızı talep etti ve diğer inançlardan misyonerleri ülkeden kovdu. Büyük güçler, sahadaki etkimize saygı duyuyor; bu etkiyi ileride doğrudan yönetime dönüştürebiliriz. Sahadaki doğrudan misyonerlik çalışmamız sona erdi - ancak dünyanın diğer bölgeleri şimdi İsa Mesih’in mesajına acilen ihtiyaç duyabilir."
 rapanui.141.g_cat: "In Nomine Domini Nostri, Iesu Christi."
 rapanui.141.g_pro: "Rab’bin, İsa Mesih’in adıyla."
 rapanui.142.t: "[SCOPE.sCharacter('rapanui_ruler').GetFullName]’in Vaftizi"
 rapanui.142.d: "[SCOPE.sCharacter('rapanui_ruler').GetFullName]’in Katolikliğe dönüşü ile ülkemizin Hristiyanlaşması tamamlanmıştır. Dönüşen hükümdar, halkın dönüştürülmesini öncelikli hedef olarak belirledi."
 rapanui.143.d: "[SCOPE.sCharacter('rapanui_ruler').GetFullName]’in Protestanlığa dönüşü ile ülkemizin Hristiyanlaşması tamamlanmıştır. Dönüşen hükümdar, halkın dönüştürülmesini öncelikli hedef olarak belirledi."
 rapanui.142.f: ""
 rapanui.144.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] sapkın Protestanlığa geçiyor"
 rapanui.144.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] sapkın Katolikliğe geçiyor"
 rapanui.144.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] hükümdarı bir Protestan misyoner tarafından vaftiz edildikten sonra, oradaki dönüşüm çabalarımız nihai olarak başarısız sayılabilir."
 rapanui.144.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] hükümdarı bir Katolik misyoner tarafından vaftiz edildikten sonra, oradaki dönüşüm çabalarımız nihai olarak başarısız sayılabilir."
 rapanui.144.f: "Yerel halkı doğru inanca dönüştürme çabalarının hepsi boşa gitmiştir. Dönüşümle birlikte, bu sahte vaizleri destekleyen güçler adalarda da etki kazanmış ve yakında kendi halkımızı da kovabilir. Bu politika değişikliğinin ardından misyonerlerimizi geri çekmek ve başka bir ülkenin doğru inancı kabul etme konusunda daha anlayışlı olup olmayacağını gözlemlemek zorunda kalacağız."
 rapanui.144.g_cat: "Bu şeytanın işi."
 rapanui.144.g_pro: "Bu şeytanın işi."
 rapanui.146.t: "Yabancılarla Ticaret"
 rapanui.146.d: "Yabancı bir ülkenin misyon istasyonundan müzakereciler bize bir ticaret teklifi sundu. En çok ilgilendiğimiz şeyi seçebiliriz."
 rapanui.146.f: "Ticaret karşılıklıdır: karşılığında yabancı ülke bir eser, bir hayvan veya bazı inciler alır."
 rapanui.146.g: "Yeni tarım teknikleri."
 rapanui.146.h: "Modern silahlar."
 rapanui.146.i: "Daha fazla eğitim."
 rapanui.151.t: "Misyoner Halk Bilgilerini Topluyor"
 rapanui.151.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’daki misyonerimiz, kültürün zihniyetini ve arka planını daha iyi anlamak için halktan hikayeler, şarkılar ve mitler topladı."
 rapanui.151.f: "Bazı misyonerler kendilerini Boniface geleneğinde görüp yerlilerin alışkanlıklarına radikal bir şekilde karşı çıkarken, her zaman önce ilgili kültürü anlamak ve sonrasında yerlileri daha etkili bir şekilde İsa’ya yönlendirecek temas noktalarını bulmak isteyen bir akademisyen tipi vardı. Jesuitler bu tekniği uygulayanlardan en bilineniydi. Toplamalar, misyonerler gelenekleri yazılı olarak ilk aktaran kişiler olduğundan sonraki tespitler için sıkça önemliydi. Aynı zamanda, Avrupa’da egzotik kültürlere ve onların geleneklerine ilgi arttı."
 rapanui.151.g: "Bu bilgiyi halkı dönüştürmek için kullan."
 rapanui.151.h: "Bu koleksiyon bir müzeye ait."
 rapanui.152.t: "Hristiyan Okulu"
 rapanui.152.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’da bir misyoner okulu kurulmasıyla, ülkenin Hristiyanlaşması ve eğitimi yolunda önemli bir adım atılmış oldu."
 rapanui.152.f: "Hristiyan okulları, Okyanusya’yı Batı’da geçerli olan okul geleneğine kademeli olarak yaklaştırmak ve yerli halk arasında okuryazarlığı artırmak için önemli bir katkı sağladı. Yamyamlığın ve kabile kavgalarının sona ermesiyle birlikte, okulların kurulması misyonerlik çalışmalarının en büyük olumlu yan etkilerinden biri olarak kabul ediliyor."
 rapanui.152.g: "Non scholae, sed vitae discimus."
 rapanui.153.t: "Sapkın Misyonerle Çatışma"
 rapanui.153.d: "Bir misyonerin agresif hareketleri, rakip misyon istasyonu ile mevcut çatışmayı artırdı. Kendi vaizlerine ait olduğunu iddia ettiği bir grup yerlinin bizim cemaatimize ait olmadığını söylüyor."
 rapanui.153.f: "Ne yazık ki, misyonerlerin gelişiyle yamyamların kanlı hevesi ve kabile kavgalarının sona erdiği Hristiyan anlatısında bazı bariz kusurlar vardı: mezhepler arasındaki düşmanlık, önceden var olmayan kavgaları doğurdu."
 rapanui.153.g: "Bunlar bizim vaizlerimizdir."
 rapanui.153.h: "Öteki yanağını çevir."
 rapanui.154.t: "Ticaret Noktası"
 rapanui.154.d: "Açıkça bize karşı yönelmiş bir eylemde, [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’daki rakip misyon istasyonu, kendi ulusları için bir ticaret noktası kurulmasını destekledi; muhtemelen yerlileri kötü amaçlı tüketim yoluyla kendilerine daha sıkı bağlama umuduyla."
 rapanui.154.f: "Bazen Hristiyanlığa dönüştürmede Noel hediyeleri sıkıcı bir İncil’den daha önemlidir."
 rapanui.154.g: "Kendi ticaret noktamızı kuracağız!"
 rapanui.155.t: "Rakibe Ayrıcalık"
 rapanui.155.d: "Rakip bir misyonere, hükümdarın sarayında danışman olarak hareket etme ayrıcalığı verildi. Bu sadece ciddi bir hakaret değil, aynı zamanda [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’daki pozisyonumuzu da zayıflatabilir."
 rapanui.155.f: "Bir hükümdarın güvenini kazanabilen misyonerler genellikle eğitimi, diplomatik bağlantıları ve son olarak, bilgi aktarımı beklentisi nedeniyle işe alınırdı. Bu mutlaka gerçek bir dönüştürme isteği anlamına gelmez, ancak misyonerin geldiği ülkeye daha büyük bir güç konumu kazandırırdı - rakip cemaatleri sinirlendiren bir durum."
 rapanui.155.g: "Aynı ayrıcalıkları talep ediyoruz."
 rapanui.171.t: "Cennette Kriz"
 rapanui.171.d: "Yabancı misyonerler arasındaki çatışma tehlikeli seviyelere ulaştı. Olası bir siyasi anlaşmazlık kaçınılmaz görünüyor."
 rapanui.171.f: "Belirli bir noktada, farklı mezheplere mensup misyonerler arasındaki anlaşmazlıklar siyasi bir çatışmaya dönüşebilir. Bunun en bilinen örneği Tahiti’dir. Müdahaleden korkan hükümdar, iki mezhepten birine geçmeyi deneyebilir, böylece askeri müdahale durumunda ilgili gücün desteğini umabilir; ki bu güç genellikle çok zayıftı. Koruyucunun güvenliği garanti değildi, ama en azından hayatta kalma şansı sunuyordu."
 rapanui.171.g: "Katolikliğe geç."
 rapanui.171.h: "Protestanlığa geç."
 rapanui.172.t: "Cennette Kriz"
 rapanui.172.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’daki durum tırmandı. Yerel hükümdar rakip misyon istasyonunun sapkınlığını itiraf etti. Bazı politikacılar şimdiden deniz müdahalesi çağrısında bulunuyor."
 rapanui.172.f: "Hükümdarın başka bir mezhebe dönüşmesiyle, misyonerlerimizin kovulması sadece zaman meselesi: yakında yeni kurulan devlet dini kalışlarını yasaklayacak. Ada ülkesini kalıcı olarak doğru inanca dönüştürme ve etki sağlama hedeflerimiz ciddi bir darbe aldı; ancak durum tamamen umutsuz değil. Bu mesele, [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’a doğrudan askeri müdahale etmek ve fikirlerimizi -siyasi ve dini olarak- uygulamak için mükemmel bir bahane sunuyor. Tabii yeni koruyucusu kendi mezheptaşıyla yanımızda durursa, bu [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] kıyılarının çok ötesine taşan bir savaşa dönüşebilir..."
 rapanui.172.g: "Bu uzak adalar bir [ROOT.GetCountry.GetAdjectiveNoFlag] denizcisinin kemiğine değmez."
 rapanui.172.h: "Ulusumuzun prestiji tehlikede!"
 rapanui.173.t: "Cennette Kriz"
 rapanui.173.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’daki durumun tırmanması nedeniyle, oradaki hükümdar bizim inancımıza geçti. Ancak rakip misyon istasyonunu işleten ülke bunu kabullenmiyor ve fikirlerini dayatmak için askeri bir işgalle tehdit ediyor."
 rapanui.173.f: "Pasifik’teki bazı adaların kontrolünün bize ne kadar değerli olduğu sorusu, bugün her zamankinden daha önemli: yeni kazanılmış koruyuculuğu savunmak için savaşa hazır mıyız? Her durumda, rakibimiz dişlerini gösteriyor. Böylece [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’a sahip olmak ulusal onur meselesi haline gelebilir."
 rapanui.173.g: "Ne yazık ki, böyle bir çatışma kaynaklarımızı zorlayacaktır."
 rapanui.173.h: "Elbette yeni korumamıza yardım için geliyoruz."
 rapanui.174.t: "Korumasız Koruyucu"
 rapanui.174.d: "Sözde 'koruyucu güç'ümüz, yaklaşan savaşta bizi korumanın çok tehlikeli olduğunu düşündü."
 rapanui.174.f: "Başarılı misyonlardan ve yerel çatışmalarda dostane, karşılıklı destekten sonra bile, Güney Pasifik halklarından birini dönüştüren ülkenin, diğer büyük güçlere karşı onları koruma konusunda mutlaka bir çıkarı yoktu. Böylece Katolik Fransa, etki alanının ihlal edildiğini gördüğünde, Britanya, Protestanlığa dönüştürdüğü Tahiti’yi korumaktan çekindi. Londra, Fransızların taleplerini tanıdı - ayrıca birkaç uzak ada yüzünden dünya savaşını başlatmak istemediği için."
 rapanui.174.g: "Yine de özgürlüğümüz için savaşacağız!"
 rapanui.174.h: "Daha kötü bir durum olmadan teslim oluyoruz."
 rapanui.175.t: "Diplomatik Zafer"
 rapanui.175.d: "Gözdağımız [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] hükümdarının iradesini kırmaya yetti. O, bizim dinimize geçecek ve korumamızı isteyecek."
 rapanui.175.f: "Koruyucu bir güç müdahale edemez ve yerel hükümdar dini kararını geri alırsa, kan dökülmeden bir çatışma olma ihtimali nadirdir."
 rapanui.175.g: "Olabilecek en iyi sonuç."
 rapanui.176.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] savaşa hazırlanıyor"
 rapanui.176.d: "Yeni koruyucularına ihanet edilmesine rağmen, yerliler özgürlüklerini savunmak için bizimle savaşmaya hazır."
 rapanui.176.f: "Müdahalemizle büyük güçler arasında bir çatışma başlatmayacak olsak da, yerli halkın özgürlük mücadelesi, ilkel halkların küçük bir ayaklanmasından beklediğimizden daha şiddetli olabilir."
 rapanui.176.g: "O zaman savaş demektir."
 rapanui.177.t: "İsa’da Yeni Bir Kardeş"
 rapanui.177.d: "Protestan ve Katolik misyonerler arasındaki artan gerginlik nedeniyle, COUNTRY hükümdarı koruma talebinde bulunmak amacıyla bizim mezhebimizi kabul etmeye karar verdi."
 rapanui.177.f: "Çıkarlarımızı kan dökmeden savunabildik. Bu etki alanına olan talebimizi kabul eden rakip misyonerler, şimdiden eşyalarını toplamaya başladı. Gelecekte önümüzde durmayacaklar."
 rapanui.177.g: "Bir dönüşüm, dönüşümdür."
 rapanui.178.t: "Cennetteki Savaş Sona Erdi"
 rapanui.178.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]’daki çıkarlarımızı uyguladık. Hükümdar ve halkı yönetimimize boyun eğecek ve dinimize geçecek."
 rapanui.178.f: "Bazıları bunu acı yolla öğrenmek zorunda. Daha sonra bu hayırsever hareketimiz için bize teşekkür edecekler."
 rapanui.201.t: "Sefer Lideri"
 rapanui.201.d: "[concept_dubois_pacific_expedition] deneyimli bir amiral gerektirir. Bu girişim için en fazla üç aday başvurabilir."
 rapanui.201.f: "Bir seferden dönen amiral, yolculukta deneyimini büyük ölçüde geliştirmelidir, ancak savaş çıkarsa yokluğunda kullanılamaz."
 rapanui.201.g: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_1').GetFullName]"
 rapanui.201.h: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_2').GetFullName]"
 rapanui.201.i: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_3').GetFullName]"
 rapanui.202.t: "Sefer Odak Noktası"
 rapanui.202.d: "Araştırma seferinin belirli bir odak noktası olup olmayacağı konusunda hâlâ anlaşmazlık var ve eğer varsa, seyahatin hangi alana odaklanacağı kararlaştırılmalı."
 rapanui.202.f: "Bir uzmanlaşma, ilgili alt alanlarda bize avantaj sağlayacaktır. Belirli olayların olasılığı artar. Özellikle askeriye, okyanusbilimi bilgimizdeki gelişmeden faydalanacak; sosyal bilimler ise biyolojik çalışmalardan. Büyük güçler de emperyal hırslarını gösterebilir ve bölgede prestij ve etkiyi artıracak eylemler gerçekleştirebilir."
 rapanui.202.g: "Bu genel bir araştırma gezisidir."
 rapanui.202.h: "Biz ağırlıklı olarak okyanusbilim çalışmaları yapıyoruz."
 rapanui.202.i: "Doğanın mucizelerini daha fazla öğrenmek istiyoruz."
 rapanui.202.j: "Ulusumuzun itibarı, böcekler veya deneylerden daha önemlidir."
 rapanui.203.t: "Araştırma Görevlisi"
 rapanui.203.d: "Uygun niteliklere sahip olduğu sürece, sefere özel bir bilim insanı ekleme imkânı vardır. Araştırmacılar, doğabilimciler, paleontologlar ve [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] talep edilmektedir."
 rapanui.203.f: "Pasifik seferleri, çeşitli disiplinlerden bir dizi akademisyeni gemiye getirmeleri ve eve döndüklerinde evde kalan akademisyenlerin ufuklarını genişletmeleriyle ünlüdür. Elbette esas olarak gözlemler ve koleksiyonlar söz konusuydu, değerlendirme genellikle sadece ev ülkesinde yapılıyordu. Denizciler 'böcek toplayıcılarına' biraz küçümseyerek baksa da, genellikle derin deniz ölçümleri, manyetik deneyler veya Venüs geçişi gözlemleri yoluyla üstün bilimsel başarılar elde eden bu titiz kişiliklerdi."
 rapanui.203.g: "Başka bir bilim insanına gerek yok."
 rapanui.203.h: "Bir haritacıya ihtiyacımız var. [SCOPE.sCharacter('rapanui_surveyor').GetFullName] sefer için uygun."
 rapanui.203.i: "A [concept_dubois_naturalist] like [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] seems to be the right person."
 rapanui.203.j: "The choice falls on [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName], the [concept_dubois_paleontologist]."
 rapanui.203.k: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] bir [concept_verrier_astronomer] ve böyle bir sefere buna ihtiyaç var."
 rapanui.204.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi Başlatılıyor"
 rapanui.204.d: "[concept_dubois_pacific_expedition] hazırlıkları tamamlandı. [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName], [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]’i amiral gemisi olarak seçti. Yolculuk #Sarı [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! adıyla tarihe geçecek."
 rapanui.204.f: "Güneşli bir günde, [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]’in silueti suda yansıyor. Akademik elitin önemli temsilcileri iskelede duruyor, bir profesör hem bilimsel detaylara hem de tarihi anın önemine vurgu yapan bir ders veriyor. Bu sadece bilim için değil, [ROOT.GetCountry.GetNameNoFormatting] için de özel bir gün. Yolculuğun sonucu ne olursa olsun, yolculuktan beklenen umutlar yüksek. Yakında [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] demir alma emrini veriyor. Vedalaşırken toplar, sefer gemisi ufukta kaybolana kadar yüksek bir selam sesi veriyor."
 rapanui.204.g: "Demiri al - Okyanusya’ya!"
 rapanui.204.h: "Avustralya ve Yeni Zelanda’ya yelken aç."
 rapanui.204.i: "Rotayı Endonezya ve Melanezya’ya çevir."
 rapanui.205.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi Okyanusya’ya Ulaştı"
 rapanui.205.d: "#SARI [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]#!’in mürettebatı, Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] önderliğinde Doğu Polinezyası sularına güvenle ulaştı ve kısa süre içinde araştırma çalışmalarına başlayacak."
 rapanui.205.f: "[concept_dubois_pacific_expedition], Pasifik’e komşu üç bölgeden birine gönderilebilir: Okyanusya, Avustralya veya Endonezya. Böyle bir seyahatin odak noktası kadar bölge de önemlidir. Örneğin kangurular sadece Avustralya’da bulunur. Emperyalist büyük güçler, diplomatik çıkar olmadan Okyanusya’ya misyoner gönderebilir ve ticaret noktaları kurabilir, ama Endonezya veya Avustralya’da yapamaz. Seyahat sırasında bir kez, günlük giriş yoluyla bölge değiştirilebilir."
 rapanui.205.g: "Ah, Tahiti."
 rapanui.206.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi Avustralya’ya Ulaştı"
 rapanui.206.d: "#SARI [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]#!’in mürettebatı, Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] önderliğinde güvenle Tazmanya sularına ulaştı ve kısa süre içinde araştırma çalışmalarına başlayacak."
 rapanui.206.g: "Ah, Avustralya."
 rapanui.207.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi Endonezya’ya Ulaştı"
 rapanui.207.d: "#SARI [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]#!’in mürettebatı, Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] önderliğinde güvenle Cava sularına ulaştı ve kısa süre içinde araştırma çalışmalarına başlayacak."
 rapanui.207.g: "Ah, Batavia."
 rapanui.210.t: "Rotayı Değiştir"
 rapanui.210.d: "Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName], rotayı değiştirip önceki sefer alanını terk etme emri veriyor. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] hangi bölgede seyredecek?"
 rapanui.210.f: "'Güvensizlikle yapılan hiçbir iş doğru yapılamaz.' - James Cook"
 rapanui.210.g: "Polinezya."
 rapanui.210.h: "Avustralya."
 rapanui.210.i: "Endonezya."
 rapanui.210.j: "Mevcut rotada kal."
 rapanui.211.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi Döndü"
 rapanui.211.d: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] komutasındaki sefer yıllar süren yolculuğun ardından geri döndü. Gelecek nesiller bu başarıdan faydalanacak."
 rapanui.211.f: "Büyük ölçekli araştırma gezilerinin eve dönüşü genellikle son değil, uzun süreli araştırmaların başlangıcıydı. Danimarkalı Galathea seferi örnek teşkil eder. Gemi, zoolojik, entomolojik, botanik ve jeolojik içerikli 93 konteynerle döndü. Ayrıca 21 kutu etnografik malzeme, Java’dan büyük bir koleksiyon ve seferin uğradığı birçok şehir ve limandaki bilim insanlarından hediyeler vardı. Ne yazık ki, bulgular siyasi sebeplerle hiç tam olarak yayımlanmadı. Koleksiyonlar daha sonra esas olarak referans materyali olarak kullanıldı."
 rapanui.211.g: "Evine hoş geldin."
 rapanui.212.t: "Yeni Bir Doğabilimci"
 rapanui.212.d: "Uzun bir sefer ve yoğun çalışmaların ardından araştırmacı [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] artık kanıtlanmış bir doğabilimci ve alanında uzman olarak kabul ediliyor."
 rapanui.212.f: "'Sonuç olarak, uzak ülkelerde yapılan bir yolculuğun genç bir doğabilimci için daha geliştirici olabileceği bir şey düşünemiyorum. Bu yolculuk hem zekayı keskinleştirir hem de, Sir J. Herschel’in belirttiği gibi, tüm bedensel duyular tam tatmin edilmiş olsa da, insanın yaşadığı arzu ve hevesi bir ölçüde hafifletir. Nesnelerin yeniliğinden ve başarı olasılığından kaynaklanan heyecan onu daha aktif olmaya teşvik eder. Ayrıca, izole gerçeklerin çoğu kısa sürede ilgi çekmez hale geldiği için, karşılaştırma alışkanlığı genelleştirmeye yol açar. Öte yandan, gezgin her yerde kısa süre kaldığı için, betimlemeleri genellikle detaylı gözlem yerine sadece taslak niteliğinde olur. Böylece, bilgideki geniş boşlukları yanlış ve yüzeysel hipotezlerle doldurma eğilimi sürekli olarak ortaya çıkar.' - Charles Darwin"
 rapanui.212.g: "Gelecek planlarımız için bize faydalı olacak."
 rapanui.213.t: "Araştırma Görevlisi Rapor Yazıyor"
 rapanui.213.d: "Bir araştırma gezisinden döndükten sonra, [SCOPE.sCharacter('rapanui_scientist').GetFullName] Pasifik yolculuğu ile ilgili ilk raporu yazdı. Sonraki yıllarda sonuçlar daha ayrıntılı şekilde yazılacak."
 rapanui.213.f: "Başarılı araştırma gezilerini genellikle uzun bilimsel makaleler takip eder ve bu yıllar sürebilirdi. Charles Darwin’in 'Beagle' üzerindeki bilgileri ancak birkaç makalede yansıtıldı. Avusturya 'Novara' seferi 21 cilt olarak yansıtıldı. Challenger seferinin bulguları, seferin tamamlanmasından on dokuz yıl sonra, 1895’e kadar Challenger Ofisi (Edinburgh) tarafından yayımlanmaya devam etti. Rapor 50 cilt içeriyor ve 29.500 sayfayı aşıyordu."
 rapanui.213.g: "Kütüphaneye bir bilimsel makale daha."
 rapanui.221.t: "Okyanus Akıntıları"
 rapanui.221.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] olağanüstü güçlü bir akıntıya girdi."
 rapanui.221.f: "Okyanus akıntılarının incelenmesi, okyanusbiliminin geliştiği temel bilimlerden biriydi. Keşif Çağı’nda İspanyol ve Portekizli denizciler, dünyayı hızla geçmek için potansiyel olarak faydalı akıntıları belirlemişti; bunun bilinen bir örneği Filipinler’deki Manila ile Meksika’daki Acapulco arasındaki ticarettir. 19. yüzyılda, okyanusbilim bilgisi derinleştirilmiş ve küresel okyanus akıntıları sisteminin tam olarak nasıl çalıştığına dair daha kapsamlı bir anlayış elde edilmiştir."
 rapanui.221.g: "Bilim insanları en gerekli deneyleri yapmalı."
 rapanui.221.h: "Daha fazla bilgi için akıntıyı takip et."
 rapanui.222.t: "Okyanusbilimsel İncelemeler"
 rapanui.222.d: "#SARI [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#!, şimdiye kadar yalnızca sınırlı şekilde keşfedilmiş bir bölgede okyanus suyu bileşimini ve sıcaklığını inceliyor."
 rapanui.222.f: "Dünyanın okyanuslarının suyu sürekli hareket halindedir. Başlıca etkenler gelgitler ve rüzgardır. Ayrıca, sıcaklık ve tuzluluk farkları da deniz suyu taşınımında önemli rol oynar, çünkü ortaya çıkan yoğunluk farkları akıntılar oluşturur. Su sıcaklığı, tuzluluk ve dolayısıyla akıntı hızındaki değişiklikler, kara kütleleri ve örneğin iklim üzerinde de etkili olur. Bunun en bilinen örneği Gulf Stream’dir."
 rapanui.222.g: "Taze deniz tuzu!"
 rapanui.223.t: "Manyetizma"
 rapanui.223.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] mürettebatındaki bilim insanları, dünyanın manyetizmasıyla ilgili teorileri doğrulamak için çeşitli deneyler yapıyor."
 rapanui.223.f: "Seyahat teodolitleri, ekspedisyonlar için tasarlanmış jeodezik teodolitlerdir; mümkün olduğunca küçük ve sağlam yapılmış, ayarlamaları yolda da yapılabilen cihazlardır. Avusturya ‘Novara Seferi’nde kullanıldığı bilinmektedir. Kara üzerindeki jeomanyetik parametreleri belirlemek için, genellikle sağlam alt zemin olarak yanlarında getirilen 'tuğlalar' ile istasyonlar kurulurdu. Saatler süren ölçüm serileri her zaman astronomik konum belirlemeleri ile desteklenirdi. Bu sayede dünyanın manyetik alanı toplam 17 farklı noktada belirlenebilirdi."
 rapanui.223.g: "Fizik bilgimizi geliştirecek."
 rapanui.223.h: "[SCOPE.sCharacter('rapanui_scientist').GetCustom('getMsMr')] [SCOPE.sCharacter('rapanui_scientist').GetLastName] should do a special experiment."
 rapanui.223.i: "Okyanusbilim bilgimizi geliştirecek."
 rapanui.224.t: "Derin Deniz Ölçümleri"
 rapanui.224.d: "#SARI [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#!, alt deniz seviyelerinde yoğunluk, sıcaklık ve tuzluluğu belirlemek için zor bir derin deniz araştırması yürütüyor. Daha önce bilinmeyen yaşam formları da derinliklerden çıkarılacak."
 rapanui.224.f: "19. yüzyıl ortalarından itibaren derin deniz araştırmaları giderek önemli hale geldi. Bir yandan, telgraf çağının başlarında deniz tabanının kablo döşemesi için incelenmesi gerekiyordu. Öte yandan fiziksel ve biyolojik teoriler doğrulanmalıydı. Uzun süre, belirli bir su derinliğinin ötesinde canlıların olamayacağı veya 'yaşayan fosillerin' orada korunacağı varsayılıyordu. C.W. Tomson gibi bilim insanları, sürekli soğuk, karanlık ve akıntı, dalga veya sismik olay eksikliğinin evrimin tamamen durmasına veya yavaşlamasına yol açacak kadar istikrarlı bir ortam sağladığını düşündü. Bu durum, derin deniz araştırmalarını doğabilimciler, paleontologlar ve evrim teorisi destekçileri için önemli bir alan haline getirdi."
 rapanui.224.g: "Ölçümlere odaklan."
 rapanui.224.h: "Derin deniz [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] yakalamaya odaklan."
 rapanui.225.t: "Antarktika"
 rapanui.225.d: "Güçlü bir akıntı, [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]’i rotasından saptırdı ve kendini Antarktika’nın sonsuz buzlarında buldu. Bilim insanları memnun, denizciler ise buzda sıkışmaktan korkuyor."
 rapanui.225.f: "Bir [concept_dubois_pacific_expedition] Antarktika’ya ulaştığında, kendi araştırmalarını yoğunlaştırmak için iyi bir zamandır. Ancak, gemi buz alanına fazla ilerlerse değerli zaman kaybı riski vardır. 19. yüzyılda birçok sefer kutup altı bölgelere gitmiş, Challenger Seferi bile düşmanca ortamda çok fazla zaman geçirmemeye özen göstermiştir."
 rapanui.225.g: "Okyanusbilim çalışmaları için mükemmel bir zaman."
 rapanui.225.h: "Meteorolojik çalışmalar için mükemmel bir zaman."
 rapanui.225.i: "Zoolojik çalışmalar için mükemmel bir zaman."
 rapanui.225.j: "Genel çalışmalar için mükemmel bir zaman."
 rapanui.226.t: "Buz"
 rapanui.226.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] yolculuğu ciddi şekilde gecikecek. Görünüşe göre gemi ebedi buzların içinde sıkışmış."
 rapanui.226.f: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! deneyler yapamıyor."
 rapanui.226.g: "Değerli zamanlarını kaybediyorlar!"
 rapanui.227.t: "Bilinmeyen Ada"
 rapanui.227.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! bugüne kadar bilinmeyen bir ada keşfetti. Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName], adanın daha yakından incelenmesini emretti."
 rapanui.227.f: "'Derler ki korkaklık bulaşıcıdır; ama diğer yandan tartışma da büyük bir cesaret vericidir.' - Robert Louis Stevenson"
 rapanui.227.g: "Bay [SCOPE.sCharacter('rapanui_scientist').GetLastName]'i adayı keşfetmeye gönder"
 rapanui.227.h: "Küçük bir kara seferi gönder."
 rapanui.229.t: "Deniz akıntısı gemiyi sürüklüyor"
 rapanui.229.d: "Belki de son bilimsel deneyin bedeli biraz fazla oldu. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] akıntı tarafından sürükleniyor ve rüzgar oldukça elverişsiz."
 rapanui.229.f: "Bir sefer gemisi okyanus akıntısına yakalanırsa, orijinal araştırma alanını terk eder ve diğer iki alandan birine sürüklenir. Gemi nereye sürükleneceği rastgeledir."
 rapanui.229.g: "Sefer hedefimizi kaybetmeye başlıyoruz gibi."
 rapanui.230.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Derinliği"
 rapanui.230.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! derin deniz ölçümü yaparak okyanusun en derin noktasını buldu. Bu keşfi anısına, bundan sonra bu derin deniz geminin adını taşıyacak!"
 rapanui.230.f: "23 Mart 1875'te, Guam ve Palau arasında Güneybatı Pasifik Okyanusu'nda yer alan 225 numaralı örnekleme istasyonunda, Challenger Seferi 4,475 kulaç (26,850 ft; 8,184 m) derinlik ölçümü yaptı ve ek bir ölçümle doğrulandı. Modern ekipman kullanan sonraki seferler, bu alanın Mariana Çukuru'nun güney ucunu temsil ettiğini ve okyanus tabanının bilinen en derin noktalarından biri olduğunu gösterdi. Modern ölçümler, Challenger'ın orijinal ölçümünün yapıldığı bölgede 6,012 kulaç (36,070 ft; 10,994 m) derinlikler bulunmuştur. Challenger'ın bu keşfi, seferin okyanus bilimi açısından derinlik ve kapsam bilgisini genişletmede kilit bir bulgusu oldu ve şimdi geminin adıyla anılıyor: Challenger Derinliği."
 rapanui.230.g: "Tarihi bir gün."
 rapanui.231.t: "Kaplumbağa Adası"
 rapanui.231.d: "Sefer sırasında, #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! bir kaplumbağa kolonisiyle karşılaştı. Ada bu sürüngenlerle dolup taşıyor."
 rapanui.231.f: "Uzak mesafeden bile mürettebat, adanın sahilinin hareket ediyormuş gibi göründüğünü fark etti. Görünüşe göre burası yeşil deniz kaplumbağalarının yumurtlamak için favori yeri. Karaya çıkar çıkmaz bazı denizciler, farkında olmayan hayvanlarla şaka yapmak istedi; kaplumbağa yumurtalarını çalmak ya da ünlü kaplumbağa çorbasını denemek istediklerini açıklamak gibi. Ancak bilim insanlarının Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]'a yaptığı acil çağrı, denizcilerin - isteksizce de olsa - bu yemek heveslerinden vazgeçmelerini sağladı."
 rapanui.231.g: "Kaplumbağalardan birini yakalamalıyız."
 rapanui.231.h: "Kaplumbağaları inceleyip örnekler toplamalıyız."
 rapanui.232.t: "Manta"
 rapanui.232.d: "Yeni egzotik balık arayışında, #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! bilim insanları muhteşem, dev bir manta vatosunu fark ettiler."
 rapanui.232.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] sadece sabah kısa süre demir attı ve bir koydaki yerel balık nüfusunu araştırdı. Bazı bilim insanları örnek toplarken, o kadar güzel bir dev manta baştan geçti ki akademisyenler gözlerine inanamadı - bu tür olağanüstü bir örneği sadece eski deniz hikayelerinden bilmekteydiler. Ancak bu haber mürettebatın geri kalanında karışık duygular uyandırdı. Bazı zoologlar, en iyisinin hayvanı yakalayıp evine su dolu bir kapta taşımak olduğunu savundu. Diğer akademisyenler, hayvanı doğal ortamında gözlemlemenin daha iyi bilimsel sonuçlar vereceğini düşündü; son olarak bir grup, mantayı olduğu gibi bırakıp örnek toplamaya devam etmeyi önerdi. Öte yandan Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] tamamen farklı bir plan açıkladı: Hayvanı bir trofe olarak vurup, [SCOPE.sCharacter('rapanui_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('rapanui_ruler').GetFullName]'e takdir göstergesi olarak göndermeyi önerdi - bunun hükümetin mali desteğine minnettarlık mı yoksa kariyerle ilgili bir sebep mi olduğu bilinmiyor."
 rapanui.232.g: "Bu muhteşem hayvanı yakalamayı denemeliyiz."
 rapanui.232.h: "Bu, hükümdarımız için harika bir trofe olur."
 rapanui.232.i: "Bay [SCOPE.sCharacter('rapanui_scientist').GetLastName] bunu incelemeli."
 rapanui.232.j: "Bunun yerine doğanın tadını çıkarıp birkaç örnek toplayın."
 rapanui.233.t: "Kanguru Yakala"
 rapanui.233.d: "Avustralya kıyısında bir mola sırasında, [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] keşifçileri yerel halkla temas kurdu. Mürettebatı bölgedeki kırmızı kangurular hakkında uyardılar."
 rapanui.233.f: "'Ama bunlar büyük, tüylerle kaplı canavarlar!' dedi Galli yerleşimci, zoolog Prof. Buttonholetoaster kırmızı kanguru avına neşeyle çıktığında. Prof. Buttonholetoaster'ın tahmin edemediği şey, Avustralya kırmızı kangurularının hayvan krallığındaki en asi canlılardan biri olması ve Galli yerleşimcinin bunu hafife almış olmasıydı. Yerleşimci, Dead Cat Gully'deki ünlü kırmızı kangurunun kanlı sonuçlarını defalarca göstermiş olsa da, Prof. Buttonholetoaster’ın başına gelecekler için yeterli hazırlık değildi. Hevesli meslektaşlar özellikle belirtmek istedi: #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! öncesinde Prof. Buttonholetoaster üniversitede 33 yıl loş bir bodrumda çalışmıştı ve Avustralya’nın en büyük kara hayvanıyla uğraşmak için ancak katlanılabilir durumdaydı; son birkaç yılda yaptığı tek ağırlık çalışması kırık kiraz keklerini üst üste koymaktı. Meslektaşlar, dev bir kanguru arayışının genel zoolojik araştırmalar için faydalı olduğuna katıldı, fakat bunun doğru yaklaşım olup olmadığı konusunda şüpheler vardı."
 rapanui.233.g: "Bu kanguruyu almalıyız - ne olabilir ki?"
 rapanui.234.t: "Koala Anlaşması"
 rapanui.234.d: "Kıyıda bir izin sırasında, Avustralyalı seyyar bir tüccar bizimle iletişime geçti. Bir hayvan satıcısı. 'Dünyada başka hiçbir yerde bulamayacağınız tüy yumağı bir ayı'm var, dedi..."
 rapanui.234.f: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! bilim insanları söz konusu ayının bir koala ve dolayısıyla bir keseli hayvan olduğunu hızlıca belirledi. Yine de: zoologlar ve biyologların ilgisi büyük. Ancak bir şart var: tüccar para istemiyor, başka bir hayvan karşılığında değiş tokuş istiyor. Bir ermine talep ediyor. Bu talep bazı mürettebatı şaşırttı, fakat hayvan satıcısı Avustralya ve Yeni Zelanda’da gelincik, ferret ve benzeri hayvanların rağbet gördüğünü vurguluyor. Bunun sebebi: yerleşimciler tavşan getirmişti, bu hem yerel flora ve faunaya hem de tarım ekonomisine zarar vermişti çünkü doğal düşmanları yoktu. Şimdi tavşanlarla savaşmak için sansar hayvanları yüksek talep görüyor. Bunun bir sonucu olabilir mi? Hayvan satıcısı sadece omuz silkiyor ve 'Bir stoat sahibi misiniz?' diye soruyor."
 rapanui.234.g: "Stoat’ımızı koalasıyla seve seve takas ediyoruz."
 rapanui.234.h: "Böyle bir stoat Avustralya’da büyük zarar verebilir!"
 rapanui.234.i: "Ne tuhaf bir öneri. Biz daha çok örnekle ilgileniyoruz."
 rapanui.235.t: "En garip hayvan"
 rapanui.235.d: "Bir liman kentinde, bir bağlantı vasıtasıyla tanınmış bir avcı ve hayvan tuzakçısıyla tanışan bilim insanları şaşırtıcı bir hayvanla karşılaştı."
 rapanui.235.f: "Bilim ekibinden hiç kimse böyle bir hayvan duymamış, görmemişti. Avustralya’nın büyüleyici vahşi yaşamı hakkında spekülasyonlar olsa da, Aborjinlerin önceden Avrupalılara bunyip gibi fantastik hayvanlardan bahsettiği ve bunun sadece masal olduğu uyarısı yapılmıştı. Ancak iki şey bilim insanlarının şüphelerini artırdı. Birincisi, avcının hayvana dokunulmaması ve fazla yaklaşılmaması şartıydı. Bu bazı zoologların hayvanın doldurulmuş olabileceğini düşünmesine yol açtı. Bir biyolog, ördek bir otter kürküne konmuş ve bir kunduz kuyruğu eklenmiş olduğunu fark etti. İkinci şüphe ise fiyat: maliyeti karşılamak için başkentten sübvansiyon gerekebilirdi. Avcıdan ek para taleplerinin gelmiş olma ihtimali de vardı."
 rapanui.235.g: "SATIN AL!"
 rapanui.235.h: "Bu hayvan kesinlikle sahte. Satış politikası arkasında şüpheli bir iş modeli olduğunu düşünüyorum."
 rapanui.236.t: "Borneo’nun Sırları"
 rapanui.236.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! Borneo ormanlarında ilginç bir keşif yaptı."
 rapanui.236.f: "Bilim insanları, yerel rehberler ve yardımcılar ile silahlı bir eskort ekibi Borneo ormanlarında yürüyüş yaparken yalnız bir orangutan buldu. Keşifle başa çıkmak için birkaç seçenek var. Orangutanlar genellikle yalnız yaşar ve Avrupalıların gelmesiyle oldukça nadir ve utangaç hale gelmişlerdir. Entomologlar ise bu örneği çok beğendi ve böcek arayışına devam etmek istiyor."
 rapanui.236.g: "Mükemmel bir hayvanat bahçesi hayvanı."
 rapanui.236.h: "Bay [SCOPE.sCharacter('rapanui_scientist').GetLastName] bu harika yaratığı incelemeli."
 rapanui.237.t: "Ejderha"
 rapanui.237.d: "Sunda Adaları’nda, [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] mürettebatı tarih öncesi görünümlü bir sürüngenle karşılaştı."
 rapanui.237.f: "Sunda Adaları’nda, Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName], kayalıklarda devasa bir sürüngenin beklediğini gözlemlemek zorunda kaldı. Bir zoolog bunun şimdiye kadar gördüğü en büyük ve en muhteşem kertenkele türü olduğunu doğruladı, bu da komutana hayatının en korkunç yaratığını keşfettiğine dair kesinlik verdi. Elbette, doğa bilimcileri her zaman olduğu gibi çok memnundu."
 rapanui.237.g: "Eviniz için böyle bir ejderhaya da ihtiyacımız var."
 rapanui.237.h: "Bu yaratığın davranışlarını incelemeli. İyi bir mesafeden."
 rapanui.237.i: "Bilim insanları daha çok böcekler, kuşlar, balıklar ya da kelebekler üzerine odaklanmalı. Bu çirkin yaratık yerine."
 rapanui.238.t: "Kanguru yakalandı!"
 rapanui.238.d: "Mürettebat kırmızı kanguruyu bir tuzağa çekmeyi, bağlamayı ve taşımayı başardı. Artık güvenle bir kafese kilitlenmiş durumda."
 rapanui.238.f: "'Lütfen sırtında taşır mısın!'\nÖrdek, Kanguru'ya dedi.\n'Sessizce otururum, sadece 'Vak' derim,\nTüm uzun gün boyunca!\nVe Dee'ye, Jelly Bo Lee'ye gideriz,\nKara ve deniz üzerinden;—\nLütfen taşır mısın! Lütfen!'\nÖrdek, Kanguru'ya dedi.\n\nKanguru, Ördek'e dedi ki,\n'Bu biraz düşünmeyi gerektiriyor;\nBelki genelde bana şans getirir,\nVe yalnızca bir itiraz var gibi görünüyor,\nEğer bu kadar cesur konuşmama izin verirsen,\nAyakların rahatsız edici şekilde ıslak ve soğuk,\nVe muhtemelen bana roo-Matiz verir!' dedi Kanguru.\n- Edward Lear"
 rapanui.238.g: "Evine gönder!"
 rapanui.239.t: "Mürettebat üyesi dövülerek öldürüldü"
 rapanui.239.d: "Kanlı bir katliam sonrası, birçok yaralı denizci, hasarlı gözlükler ve korkmuş profesörler ile sefer, ne yazık ki kanguruyu yakalama konusunda başarısızlığını kabul etmek zorunda kaldı. Bir araştırma asistanı, öfkeli hayvan tarafından öldürüldü."
 rapanui.239.g: "Dehşet!"
 rapanui.240.t: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] Hattı"
 rapanui.240.d: "Asya ve Avustralya arasındaki fauna sınırının keşfi ile [SCOPE.sCharacter('rapanui_scientist').GetFullName], biyolojiye önemli bir katkı sağladı ve evrim teorisini destekledi. Onuruna, bu hat onun adını taşıyacak."
 rapanui.240.f: "'Burada ilk kez birçok Avustralya formunu gördüm, ki bunlar batıda bulunan adalarda tamamen yok. Küçük beyaz kakadu oldukça fazlaydı ve yüksek sesli ötüşleri, çarpıcı beyaz renkleri ve güzel sarı tepecikleri ile manzaranın dikkat çekici bir unsuru oluşturuyordu. Bu, bu aileden kuşların bulunduğu dünyanın en batı noktasıdır. Doğuya giden bir doğa bilimcisi ilk olarak Ptilotis ailesinden bazı küçük bal yiyicileri ve tuhaf höyük kulelerini (Megapodius Gouldii) bulur. (...) Lombok adasında, Bali’den yirmi milden daha dar bir boğazla ayrılmış, doğal olarak bu (Bali) kuşlarından bazılarıyla tekrar karşılaşmayı bekledim; ama üç aylık bir konaklama sırasında hiçbirini görmedim, bunun yerine tamamen farklı bir tür dizisi buldum, çoğu sadece Java’da değil, Borneo, Sumatra ve Malaka Yarımadası’nda da oldukça bilinmiyordu.' - Alfred Russel Wallace"
 rapanui.240.g: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] Hattı? Bana mantıklı geliyor."
 rapanui.241.t: "Nadir Kuşlar"
 rapanui.241.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! bilim asistanları egzotik kuşların bazı yuvalarını buldu."
 rapanui.241.f: "'Bu kuşlar, görünüm olarak Şili’den Thenca veya La Plata’dan Callandra ile yakından ilgilidir. (...) Her türde sadece bulunur: tüm alışkanlıklar ayırt edilemez. Hatırladığımda, vücut şekli, pul yapısı ve genel boyut, İspanyolların hemen hangi adadan herhangi bir kaplumbağa getirildiğini söylemesine yeterlidir. Bu adalar birbirine görünürdeyken ve az hayvan stokuna sahipken, bu kuşlarla doludur, ancak yapısal olarak biraz farklıdır ve doğada aynı yeri doldurur, bunların sadece varyant olduğunu düşünmem gerekir. Bildiğim tek benzer durum, Doğu ve Batı Falkland Adaları'ndaki kurt benzeri tilki arasındaki sürekli iddia edilen farktır. Bu yorumların en ufak bir temeli varsa, takımadaların zoolojisi incelemeye değer; çünkü bu tür gerçekler türlerin istikrarını sarsabilir.' - Charles Darwin"
 rapanui.241.g: "Kuşları gözlemle ve incele."
 rapanui.241.h: "Kuşları yakala ve yumurtalarını al."
 rapanui.242.t: "Deniz Örneği"
 rapanui.242.d: "Örnek arayıcılarımız dün yeni deniz canlılarından bol bir av yakaladı."
 rapanui.242.f: "Wilkes Seferi, 19. yüzyıl biliminin gelişiminde, özellikle Amerikan bilim kuruluşlarının büyümesinde önemli bir rol oynadı. Seferin bulduğu birçok tür ve diğer öğeler, yeni Smithsonian Enstitüsü koleksiyonlarının temelini oluşturdu. Seferin bilim insanlarının yardımıyla, denizci mürettebat tarafından alayla 'midye kazıcıları' ve 'böcek yakalayıcıları' olarak adlandırılan ekip, 60.000’den fazla bitki ve kuş örneği topladı. Sefer sırasında toplanan veri ve örnek miktarı şaşırtıcıydı; bunlara 648 türün tohumları dahil olup, daha sonra ülke çapında takas edildi, ekildi ve dağıtıldı. Kurutulmuş örnekler, şimdi Smithsonian Enstitüsü’nün bir parçası olan Ulusal Herbaryum’a gönderildi. Ayrıca 254 canlı bitki vardı; bunlar çoğunlukla yolculuğun son kısmından geldi ve 1850’de yeni inşa edilen bir seraya yerleştirildi; daha sonra bu sera ABD Botanik Bahçesi oldu."
 rapanui.242.g: "Biyologların altını."
 rapanui.243.t: "Muhteşem Fosiller"
 rapanui.243.d: "Yolculuk sırasında, #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! önceden bilinmeyen fosillerin bulunduğu bir yatak keşfetti."
 rapanui.243.f: "Fosil buluntuları 'Beagle' seferi sırasında büyük önem taşıyordu. Dönüşün ardından özellikle Richard Owen, Charles Darwin’in keşfettiği fosilleri tanımlamaya adadı kendini. Beagle, Mylodon gibi dev tembel hayvanlar ve dev armadillo (Glyptodon) gibi yeni türler keşfetmişti. Santa Fe yakınlarında bulunan fosiller arasında, daha önce atların 16. yüzyıla kadar Amerika’ya gelmediği düşünülürken Darwin’i şaşırtan bir at dişi vardı. Owen, bu at dişinin nesli tükenmiş bir Güney Amerika türüne ait olduğunu doğruladı ve 1845’te adını Equus curvidens koydu."
 rapanui.243.g: "Fosil arayın."
 rapanui.244.t: "Stromatolitler"
 rapanui.244.d: "Bilim insanları, [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] demir attığı bir koyda büyük bir stromatolit kolonisi buldular."
 rapanui.244.f: "Stromatolitler, su kütlesindeki mikroorganizmaların büyümesi ve metabolizması sonucu çökelti parçalarının yakalanması ve bağlanması veya çözünmüş maddelerin çökelmesiyle oluşan biyojenik tortul kayalardır. Genellikle tabakalıdırlar ve çoğu çok ince tabakalı kireçtaşından oluşur. Bazıları, yumru, sütun veya dalgalı tabaka yapısıyla karnabahara benzer. Bilinen en eski fosiller çoğunlukla stromatolitlerdir ve bu nedenle yaşamın basit formlardan daha karmaşık formlara nasıl evrildiğine dair ipuçları sağlayabilirler. Stromatolitler, organizmalar tarafından oluşturulan ilk tanınabilir yapılar olarak kabul edilir. Prekambriyen’de, 3,5 milyar yıl öncesine kadar ortaya çıkmışlardır. 3,45 milyar yıl yaşındaki Warrawoona serisi, Batı Avustralya Pilbara bölgesindeki Kuzey Kutbu sahasında bulunmuştur. Dünya tarihinin bazı dönemlerinde – mercanlar ortaya çıkmadan çok önce – stromatolit inşaatçıları önemli resif yapıcılarıydı. Bir milyar yıl öncesine kadar stromatolitler neredeyse tüm kıyı sularında yaygındı. 700 milyon yıl önce, stromatolitlerin çeşitliliği ve dağılımı azaldı. Günümüzden 450 milyon yıl öncesine ait stromatolitler çok nadirdir."
 rapanui.244.g: "Bu [concept_dubois_specimen] toplayın."
 rapanui.244.h: "Bu fosilleri toplayın."
 rapanui.244.i: "Stromatolitleri inceleyin."
 rapanui.245.t: "Fosilleşmiş Flora"
 rapanui.245.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] mürettebatı, milyonlarca yıllık eğrelti otu izlerini bir kayalık yüzeyde buldu."
 rapanui.245.f: "Karbonifer döneminde (yaklaşık 360-300 milyon yıl önce), eğrelti otları (bugün olduğundan daha büyük formlarda, genellikle ağaç eğrelti otu olarak adlandırılır), at kuyruğu ve lycopod bitkileri ile birlikte devasa ormanlar oluşturdu ve günümüzdeki kömür yataklarının çoğunun temelini attı. En eski fosil buluntular Alt Devoniyen’den (yaklaşık 400 milyon yıl önce) gelir. Bu nedenle eğrelti otları, ilk olarak Üst Devoniyen’de ortaya çıkan tohumlu bitkilerden muhtemelen daha eskidir."
 rapanui.245.g: "Sanayi Devrimi’nin taşkıranı."
 rapanui.246.t: "Kehribar Kolye"
 rapanui.246.d: "Bir kabile şefi, tarihî kehribar kolyeyi, içinde tarih öncesi böcekler bulunan bir kolyeyi satmayı teklif etti. Ancak Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName], keşifle nasıl ilerleyeceğine karar veremiyor."
 rapanui.246.f: "Yerel bir şeften gelen teklif sürpriz oldu. Görünüşe göre yerli, [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] yolculuğunu duymuş ve iyi bir iş umuyordu. Bilim insanları mücevheri inceledikten sonra, parça ile ne yapılacağı konusunda büyük bir tartışma başladı. Bir grup, müzede sergilenmesi için satın alınmasını savundu; böceklerin nasıl korunduğunu göstermek için. Diğer grup, mücevheri detaylarına ayırıp her fosili ayrı incelemeyi önerdi. Doğa bilimciler ve paleontologlar, açıkça paleontolojik öneme sahip parçayı nasıl ele alacakları konusunda anlaşamazken, antropologlar ve arkeologlar parçanın kültürel önemi olduğunu belirtti. Subaylar ise bilimsel tartışmayı gereksiz bir kavga olarak gördü ve değersiz şeylere para harcamayı bırakıp yolculuğa devam etmeyi savundu."
 rapanui.246.g: "Kolyenin paleontolojik önemi var."
 rapanui.246.h: "Kolyenin arkeolojik önemi var."
 rapanui.246.i: "Kolye kırılıp incelensin."
 rapanui.246.j: "Kolyenin önemi yok."
 rapanui.247.t: "Avustralya Kemiği"
 rapanui.247.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! denizcileri sabah erken saatlerde olağanüstü bir paleontolojik alan keşfetti. Hatta bir amatör bile yerin özel olduğunu görebiliyordu."
 rapanui.247.f: "Ortaya çıkmış bir tortul katman, ilk bakışta fosillerin mükemmel korunmuş olduğunu gösteriyordu. Çok sayıda buluntuya ek olarak, kısa süre sonra 'Avustralya Kemiği' takma adını alan garip bir kemik, denizcilerin ve daha sonra katılan bilim insanlarının dikkatini çekti. Yakında, metodik çalışmasıyla bir paleontologun, deneyimsiz işçilerin çıplak ellerinden çok daha fazlasını ortaya çıkarabileceği ortaya çıktı."
 rapanui.247.g: "Prof. [SCOPE.sCharacter('rapanui_scientist').GetLastName] bunu kazmalı."
 rapanui.247.h: "Mümkün olduğunca çok fosil toplayın."
 rapanui.250.t: "Java Adamı"
 rapanui.250.d: "Prof. [SCOPE.sCharacter('rapanui_scientist').GetLastName], #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! sırasında olağanüstü fosiller keşfetti. Bunlar, bir milyon yıl önce yaşamış tarih öncesi bir insanın iskeleti. Bilimsel bir sansasyon!"
 rapanui.250.f: "Eugène Dubois tarafından 1891'de Doğu Java, Trinil yakınlarındaki Solo Nehri kıyısında ilk kez keşfedilen fosiller Java Adamı olarak adlandırılır. Güncel bilgiye göre, yaklaşık bir milyon yıl yaşında oldukları söylenmektedir. Avrupa dışında keşfedilen ilk hominin fosilleri olup, Neandertallerden sonra anatomik olarak modern insanın (Homo sapiens) fosil akrabalarına dair ikinci kanıtı oluşturur. Java buluntuları önce Anthropopithecus, sonra Pithecanthropus erectus olarak adlandırıldı. Günümüzde çoğu paleoantropolog tarafından Homo erectus türüne atanırlar; kökenleri zaman zaman - 1940’ta Franz Weidenreich’in önerdiği gibi - bir alt tür eklemesiyle vurgulanır: Homo erectus javanensis. Dubois’nin buluntusundan 50 yıl sonra Ralph von Koenigswald, 'Hiçbir diğer paleontolojik keşif bu kadar büyük bir sansasyon yaratmamış ve bu kadar çeşitli çelişkili bilimsel görüşe yol açmamıştır.' dedi."
 rapanui.250.g: "Bu eksik halka mı?"
 rapanui.251.t: "Değerli Bir Eser"
 rapanui.251.d: "Uzak bir adadaki bir kabileyi ziyaret ederken değerli bir okyanus eseri elde ettik."
 rapanui.251.f: "Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] aslında sadece kısa bir karaya çıkma izni almak, mürettebatıyla birlikte erzak ve taze su temin etmek istemişti. Ticaret yollarının kenarında olan ada, dış dünyayla çok az temas halindeydi. Ancak bir yanlış anlaşılma sonucu, şef komutanın bir prens olduğunu varsaymış ve ona sanatsal bir ahşap heykel hediye etmişti. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] mürettebatı ona geleneksel cam bilyeleri verdi ve bu yerliyi çok mutlu etti."
 rapanui.251.g: "Bu bir müzeye ait."
 rapanui.252.t: "Yeni Koy keşfedildi"
 rapanui.252.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! sözde bir adanın aslında sadece bir yarımada olduğunu kanıtladı ve böylece yeni bir koy keşfetti. İsimlendirme konusunda hâlâ fikir ayrılıkları var."
 rapanui.252.f: "1875 Ağustos’unda Pasifik Bismarck Takımadaları’nda konaklarken, Gazelle, Yeni Britanya Adası’nın kuzeydoğusundaki Blanche Koyu’nun doğal limanını inceledi. Bu sırada Yeni Britanya’nın doğu kısmının bir yarımada olduğu fark edildi ve geminin adıyla 'Gazelle Yarımadası' olarak adlandırıldı. Bu isim günümüze kadar geldi. Ayrıca Yeni İrlanda ile Dyaul Adası arasındaki geçit 'Gazelle Kanalı' ve Bougainville’nin batı kıyısındaki doğal liman 'Gazelle Limanı' olarak adlandırıldı."
 rapanui.252.g: "Koyu, ölçümü yapan bilim insanının adıyla adlandır: [SCOPE.sCharacter('rapanui_scientist').GetLastName] Koyu."
 rapanui.252.h: "Devlet başkanımızın adıyla adlandırılmalı: [SCOPE.sCharacter('rapanui_ruler').GetFullName] Koyu."
 rapanui.252.i: "Keşfedenin adıyla adlandır: [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] Koyu."
 rapanui.252.j: "Sefer asla unutulmamalı: [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Koyu."
 rapanui.253.t: "Ticaret Noktası"
 rapanui.253.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! mükemmel bir demirleme yeri buldu."
 rapanui.253.f: "Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] koya girince, buranın gelecekteki bir sefer veya ticaret girişimi için ne kadar korunaklı olabileceğini fark etti. Daha sonra yapılan kara keşfi sadece toprağın plantasyon tarımı için kalitesini değil, aynı zamanda hoş bir iklimi de gösterdi. Bazı ticari danışmanlar, bu yeri [ROOT.GetCountry.GetNameNoFlag] için açmak adına her şeyi yapmayı önerdi. Öte yandan bilim insanları, bu tür emperyalist davranışlar nedeniyle bilimsel görevin ihmal edilebileceğine dikkat çekti."
 rapanui.253.g: "Bir ticaret noktası inşa et."
 rapanui.253.h: "Sadece haritalayın."
 rapanui.254.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]'e misyon?"
 rapanui.254.d_cat: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]'ın papazı, Father [SCOPE.sCharacter('rapanui_missionary_scope').GetLastName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] yerlilerinin İsa Mesih'i hiç duymadığını öğrenmiş. Yerlileri Katolik inancına dönüştürmek için gemiyi terk etme izni istiyor."
 rapanui.254.d_pro: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]'ın papazı, Reverend [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] yerlilerinin İsa Mesih'i hiç duymadığını öğrenmiş. Yerlileri Protestan inancına dönüştürmek için gemiyi terk etme izni istiyor."
 rapanui.254.f: "Birkaç tüccar yakın zamanda gemiye gelerek bölge hakkında haber verdi ve seferin envanterini tazeledi. Konuşma aynı zamanda bölgedeki Hristiyanlaşmış ve pagan kültürlerine de değindi. Geminin papazı dikkatle dinledi ve aynı inanca sahip olanların henüz bu bölgeye gitmediğini keşfederek şaşırdı. Adalarda tekrar ortaya çıkan yamyam korkusu, son yıllarda Tanrı’nın adamlarını karaya çıkmaktan alıkoymuştu."
 rapanui.254.g_cat: "Vade cum Deo."
 rapanui.254.g_pro: "Tanrı ile git."
 rapanui.254.h: "Bu çok tehlikeli!"
 rapanui.255.t: "Düşmanca Tepki"
 rapanui.255.d: "Aslında [SCOPE.sCountry('rapanui_hostile_country').GetNameNoFlag]'i ziyaret ettiğimizde, iyi niyetli tutumumuzu vurgulamak ve uluslararası itibarımızı artırmak istedik. Ne yazık ki, karşı tarafta bunun çok azı anlaşıldı."
 rapanui.255.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] gemisindeki konsolos, [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName]'e kısa bir ziyaret yapmasını ve yerel yöneticilere temsilci olarak başvurmasını tavsiye etmişti. Ancak komutan yerel gelenekleri bilmiyordu. Farkında olmadan ülkedeki bazı üst düzey yetkililere hakaret etti. Aslında, heyetin neyi yanlış yaptığı bile tam olarak bilinmiyor. Muhtemelen ciddi bir hata yaptık."
 rapanui.255.g: "Düzeltmemiz gereken ciddi bir gaf."
 rapanui.255.h: "Suçu Komutana yükle."
 rapanui.255.i: "Hiçbir şey için özür dilemiyoruz."
 rapanui.256.t: "İnci Dalgıçları"
 rapanui.256.d: "Yolculuk sırasında #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#!, esas olarak değerli inci toplamakla geçinen sakin bir köy keşfetti. Tüm mürettebat, yer ve incilerin bolluğu karşısında büyülendi."
 rapanui.256.f: "Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName], Güney Denizleri’ndeki en iyi inci dalgıçlarının okyanusun derinliklerinden en güzel mücevherleri çıkardığı, çevre adalar arasında ünlenmiş bir balıkçı köyü buldu. İnsanlar fakir ama dürüsttü ve çok az ticaret yaptıkları görülüyordu. [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] bu incilerin [ROOT.GetCountry.GetNameNoFlag]’de de bulunmasını sağlamak için yerlilerle anlaşma yapmayı düşünüyor. Ancak gemideki bazı subaylar ve öngörülemez denizci sürüsü, gemimizin zaten gerekli silah ve güce sahip olduğunu ve hak ettiğimiz şeyi alabileceğimizi belirtti..."
 rapanui.256.g: "Küçük bir ticaret bağlantısı kur."
 rapanui.256.h: "Bir doğa bilimcisi bu yeri incelemeli."
 rapanui.256.i: "Bunlar bizim incilerimiz."
 rapanui.257.t: "Diplomatik Delegasyon"
 rapanui.257.d: "[SCOPE.sCountry('rapanui_friendly_country').GetNameNoFlag] temsilcileriyle yapılan toplantı tam bir başarıydı. Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] doğru tonu yakaladı ve açık kulaklar buldu."
 rapanui.257.f: "Soğuk maymun beyni ile serinledikten sonra, [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] komutanı yalnızca denizde değil, kişisel ilişkilerde de ne kadar başarılı olabileceğini gösterdi. Olağan diplomatik şakalar sonrasında, [SCOPE.sCountry('rapanui_friendly_country').GetNameNoFlag] elçileri bu centilmeni hayranlıkla izledi. [ROOT.GetCountry.GetNameNoFlag] bu fırsatı uluslararası arenada değerlendirmeli."
 rapanui.257.g: "Barışçıl niyetlerimizi vurgula."
 rapanui.257.h: "Komutanı öv."
 rapanui.260.t: "Dünya Turu"
 rapanui.260.d: "Komutan [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName], [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] ile dünya turu yaptı!"
 rapanui.260.f: "Birçok ünlü araştırma seferi, dünya turu yapma fırsatını değerlendirdi; çoğu durumda bu en kısa ve verimli yoldu. Bilinen örnekler: 'Beagle', 'Challenger' (İngiltere), 'Novara' (Avusturya), 'Gazelle' (Prusya) ve 'Galathea' (Danimarka)."
 rapanui.260.g: "Dünya turu!"
 rapanui.261.t: "Daha doğru Haritalar"
 rapanui.261.d: "Yardımcı bilim insanı [SCOPE.sCharacter('rapanui_scientist').GetLastName], #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! sırasında, geçmiş kartografların yaptığı bazı ölçüm hatalarını düzelterek harita materyalini önemli ölçüde geliştirdi."
 rapanui.261.f: "19. yüzyıl haritaları, önceki yüzyılın haritalarına göre zaten oldukça iyiydi, ancak hatalardan muaf değildi. Defalarca var olmayan adalar çizilmiş, bilinmeyen adalar girilmemişti. 20. yüzyılın başında bile Pasifik’in bazı bölgeleri hâlâ eksik veya yanlış haritalanmıştı. 1937’de pilot Amelia Earhart’ın kaybolması, hedeflediği Howland Adaları’nın mil ile yanlış girilmiş olmasına bağlanabilir."
 rapanui.261.g: "İyi iş."
 rapanui.262.t: "Düzeltilmiş Mesafeler"
 rapanui.262.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#! haritalarını gözden geçirirken, eşlik eden bilim insanı [SCOPE.sCharacter('rapanui_scientist').GetLastName], haritalarda daha önce verilen mesafelerin yanlış olduğunu belirledi. Harita materyalini güncelleyecek."
 rapanui.262.f: "Daha iyi teknik ön koşullar ve bilimsel seferlerin ritmi, daha hassas mesafe ölçümleri için başlangıç pozisyonunu büyük ölçüde iyileştirdi. Motto: James Cook’un son yolculuğundan beri, kutuplar dışında neredeyse keşfedilecek bir şey yok. Ancak bu keşiflerin birbirleriyle ilişkisi her zaman net değildi. Küresel ekonomide sıkı takvim ve son tarihler devreye girince, yalnızca kaba ölçümler değil, çok doğru ölçümler yapmak giderek daha önemli hale geldi."
 rapanui.263.t: "Egzotik Tohumlar"
 rapanui.263.d: "Kıyı izninde, #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Seferi#!’nden Prof. [SCOPE.sCharacter('rapanui_scientist').GetLastName] büyük bilimsel ve tarımsal önemi olan özel tohumlar buldu."
 rapanui.263.f: "Pasifik ve Doğu Asya bitkilerinin taşınması nadir değildi. 1789’daki ünlü isyanla sonuçlanan Bounty Seferi’nin asıl amacı, ekmek ağacından kesimler alıp Karayipler’de yetiştirmekti. Bu, plantasyon işçilerine ucuz bir temel gıda sağlamalıydı. 19. yüzyılda ise koleksiyon ve bilimsel araştırmalar eklenmişti."
 rapanui.263.g: "Tohumlar bilimsel koleksiyon için uygun."
 rapanui.263.h: "Yeni tohumlar tarımda kullanılacak."
 rapanui.264.t: "Yeni Böcek Türü"
 rapanui.264.d: "Prof. [SCOPE.sCharacter('rapanui_scientist').GetLastName], bir adada yeni bir böcek türü keşfetti ve kendi adıyla adlandırdı. Son derece itici bir hayvan ama bilim insanı için hayatının en mutlu günü."
 rapanui.264.f: "Kim bir çirkin, sümüksü ve tiksindirici böceğin bir gün kendi adıyla anılmasını ve sonsuza kadar soyadıyla ilişkilendirilmesini istemez ki?"
 rapanui.264.g: "Tebrik ... ler."
 rapanui.265.t: "Küçük Bir Oluşum"
 rapanui.265.d: "Kıyı gezisinde, Prof. [SCOPE.sCharacter('rapanui_scientist').GetLastName] birçok fosilin gömülü olduğu küçük bir jeolojik oluşum buldu. Bu yatak şimdiye kadar herhangi bir haritada işaretlenmemişti."
 rapanui.265.f: "'Daha ciddi ve bağlantılı bir zorluk var. Bahsettiğim, hayvan krallığının ana bölümlerine ait türlerin, bilinen en alt fosilli kayalarda aniden ortaya çıkma biçimidir. Şu anda durum açıklanamaz olmalı; ve (evrimci) görüşlere karşı geçerli bir argüman olarak sunulabilir.' -Charles Darwin"
 rapanui.265.g: "Fosiller hiçbir zaman yeterli olmaz."
 rapanui.266.t: "Composita"
 rapanui.266.d: "Prof. [SCOPE.sCharacter('rapanui_scientist').GetLastName] çok sevindi: Nadiren bulduğu geç Devoniyen Composita fosillerini topladı, bunlar şimdiye kadar bulduğu en eski yaşam formlarından biri!"
 rapanui.266.f: "Composita, Geç Devoniyen’den Geç Permiyen’e kadar yaşamış soyu tükenmiş bir brachiopod cinsidir. Composita, Antarktika hariç tüm kıtalarda bulunmuş ve küresel bir dağılıma sahipti. Düzgün bir kabuğa sahip olan Composita’da belirgin bir katlanma ve oluk ve pedikül için yuvarlak bir açıklık bulunur. Composita, Athyrididae (Athyridida Takımı) ailesine dahil edilmiştir ve Spirigerellinae alt familyasına yerleştirilmiştir. Sadece sıradan insanlar bu köklü fosildeki basit bir kabuğu tanıyabilir."
 rapanui.266.g: "Bu gerçekten ... heyecan verici."
 rapanui.267.t: "Güney Gökyüzü Yarımküresi"
 rapanui.267.d: "[concept_verrier_astronomer] [SCOPE.sCharacter('rapanui_scientist').GetFullName], [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]’nin seferini, güney gece gökyüzünü gözlemlemek için yoğun şekilde kullanıyor. Burada kuzey yarımkürede neredeyse göremeyeceği olayları gözlemliyor."
 rapanui.267.f: "Güney gökyüzü, Samanyolu’nun merkezi yaklaşık 20° güneyde Yay takımyıldızında olduğu için kuzey gökyüzünden biraz daha fazla yıldız gösterir. İyi görüş koşullarında, güney gökyüzünde çıplak gözle görülebilen 2.000’den fazla sabit yıldız ve dürbünle 20.000-40.000 kadar yıldız vardır. Ekvator’da yılın ve gecenin her zamanında güney gökyüzünün yarısını ve kuzey gökyüzünün yarısını görebilirken, Güney Afrika veya Avustralya’nın daha güney enlemlerinde güney gökyüzünün yaklaşık üçte ikisini görebilir ve Güney Amerika’nın güneyinde %80’den fazlasını görebilirsiniz."
 rapanui.268.t: "Güneş Tutulması"
 rapanui.268.d: "Yardımcı Bilim İnsanı [SCOPE.sCharacter('rapanui_scientist').GetFullName], [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] gemisinde sıra dışı bir güneş tutulmasını deneyimleme fırsatı buldu ve kapsamlı astronomik çalışmalar gerçekleştirdi!"
 rapanui.268.f: "19. yüzyıl ortalarından itibaren bazı sanayileşmiş ülkelerin astronomi dernekleri, güneş tutulmalarını gözlemlemek için uzak kıtalara seferler düzenlemeye başladı. Ana ilgi odağı korona gözlemi idi. Fransız astronom Jules Janssen, 18 Ağustos 1868’de Hindistan’daki tam güneş tutulmasında helyum elementi ile ilgili ipuçları elde etti. 29 Mayıs 1919’daki tam güneş tutulması, Arthur Stanley Eddington liderliğindeki bir sefer tarafından Afrika’daki Príncipe Adası’ndan gözlemlendi ve birkaç yıl önce Albert Einstein’ın geliştirdiği görelilik teorisi ile ilgili özel bir dikkat çekti; bu teori, uzaktaki yıldızların ışığının güneşin kütle çekim alanıyla saptırılmasını öngörüyordu - gözlemlerle doğrulandı."
 rapanui.268.g: "Mükemmel!"
 rapanui_avantgarde_navy_modifier: "Avantgarde Donanması"
 rapanui.300.t: "Bir Dönemin Sonu"
 rapanui.300.d: "Küresel ölçekte kullanılabilen modern gemilerin gelişmesiyle, Pasifik’e yapılan araştırma gezileri artık istisna değil, günlük rutin haline geldi. Bazı bilim insanları, bir zamanlar uzak olan bu bölgede bulunabilecek her şeyi bulup katalogladıklarını söylüyor."
 rapanui.300.f: "Yelken ve keşif çağı nihayet sona erdi. Emperyalizm ve sömürgeciliğin zaferi ile küresel ekonominin ve iletişimin giderek daha da iç içe geçmesiyle, Pasifik artık sadece birçok bölgeden biri olarak görülüyor. Dünyanın öteki ucuna ulaşmak artık bir macera değil, zaman meselesi. İnsanlık, her şeyin keşfedilmiş gibi göründüğü bir çağa giriyor ve Güney Denizi bile egzotizm için eski cazibesini kaybetmiş durumda."
 rapanui.300.g: "Artık keşfedecek bir şey yok."
 rapanui.1001.t: "Paskalya Adası'nın Sırları"
 rapanui.1001.d: "Keşif gemilerimizden biri Paskalya Adası’na uğradı. Genç haritacı adayı [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], adanın kayıp kültürüyle ilgileniyor."
 rapanui.1001.f: "İlk bakışta, Paskalya Adası olarak adlandırılan bu ada kadar ıssız görünen az yer vardı. Yerel halkın dediği gibi Rapa Nui, uzun zaman önce ormanlarını kaybetmişti. Meyve veya tahıl nadirdi. Volkanik bir krater, bilinmeyen ama büyük bir geçmişe sahip gibi görünen adanın üzerinde yükseliyor. Halkı, Mısır’ın fellahinleri gibi devlerin omuzlarında yaşıyor. Hırslı bir maceraperest olan [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], bu dünyanın sonundaki adada gizli bir şey olabileceğine inanıyor. Kendi inisiyatifiyle karaya çıktı ve birkaç adam topladı."
 rapanui.1001.g: "Ne kadar gizemli bir yer..."
 rapanui.1002.t: "Rapa Nui"
 rapanui.1002.d: "Paskalya Adası’nın iç bölgelerini keşfe çıkan ekip, yerel Rapa Nui kabilesi tarafından karşılandı."
 rapanui.1002.f: "Kendilerini Rapa Nui olarak adlandıran yerliler, Doğu Polinezya’da konuşulan dil çeşitlerine çok benzeyen bir dil konuşuyor. Birçok uzak Polinezya adasına göre Amerika ana karasına daha yakın olmalarına rağmen, adamlar çok net bir şekilde, halkın yüzyıllar önce okyanus bölgesinden geldiğini anlayabiliyor. Misafirperverler, adamları yemeğe davet ediyor. Ancak küçük seferdeki bazı katılımcılar, gizli hazineler arıyorsanız onlardan uzak durmanız gerektiğini söylüyor."
 rapanui.1002.g: "Nazik davetlerini kabul ediyoruz."
 rapanui.1002.h: "Bu vahşilere güvenilmez."
 rapanui.1011.t: "Tören Dansları"
 rapanui.1011.d: "Adamlar, [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] önderliğinde, Paskalya Adası’ndaki Rapa Nui ile vakit geçiriyor."
 rapanui.1011.f: "Paskalya Adası’na birçok gizem yapışmıştır. Yerel halkla ortak bir öğünde, adamlar yalnızca Rapa Nui tarihinin ve dininin parçalarını öğreniyor. Bir yarışma ve yumurta elde etme ile ilgili yıllık turnuva, en önemli Rapa Nui ritüeli gibi görünüyor. Ana tanrıları Makemake ile yakından ilişkili. Toplantı sırasında [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], kuşadam ve Makemake tasvir eden bazı kaya resimlerini daha yakından inceleme fırsatı buluyor. Yerli halkın artık yorumlayamadığı yazılı karakterler buluyor. Ada halkının geçmişi hakkında çok az şey bildiğinden şüphelenmeye başlıyor..."
 rapanui.1011.g: "Bu çok bahsedilen kuşadam kimdir?"
 rapanui.1021.t: "Moai Hava"
 rapanui.1021.d: "Rapa Nui ile birkaç gün geçirdikten sonra, [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] ve ekip önemli bir keşif yapıyor."
 rapanui.1021.f: "Görünüşe göre, Rapa Nui aslında ilkel kuşadam kültünden daha büyük bir mirasa sahipti. Çeşitli yerel klanların toplandığına inanılan eski bir meydanı ziyaret ederken, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], bazalt bir heykelin tabanını yerden fırlamış olarak buldu. Parça bir Moai’yi temsil ediyor. Ataların yaşayan yüzünü temsil ettiği söyleniyor. Figür hasarlı, ama ekip yerel müzeye ulaşıp taşırsa büyük değere sahip olabilir. Ancak bunun nasıl ve olup olmayacağı hâlâ belirsiz."
 rapanui.1021.g: "Yerel halk fark etmeden eseri ülke dışına kaçır..."
 rapanui.1021.h: "Rapa Nui’yi ikna edin, eseri yanımıza alabiliriz."
 rapanui.1021.i: "Başka halkların mirasına saygı göstermeli, çalmamalıyız."
 rapanui.1022.t: "Moai Hava’nın Çalınması"
 rapanui.1022.d: "Paskalya Adası’ndaki ekibimiz Moai heykelini gemiye almayı başarsa da, yerliler hırsızlığı fark etti. Adamlar bu yüzden erken bir kaçış yapmak zorunda kaldı!"
 rapanui.1022.f: "Bu, bildiğiniz gibi gizli bir operasyondu. [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], operasyonun mümkün olduğunca gizli kalması için elinden geleni yaptıysa da, denizciler arasındaki disiplin eksikliği birinin nöbet sırasında uyumasına yol açtı. Yerli halk, adamların Moai’yi yerden çıkardığını bir tepeden izleyebildi. Eseri çoktan yerden kurtardıklarını düşündükleri anda, yerliler uzak mesafeden geldi. Grup en hızlı şekilde kaçmak zorunda kaldı."
 rapanui.1022.g: "Hadi, eve dönelim!"
 rapanui.1023.t: "Moai Hava güvenceye alındı"
 rapanui.1023.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]’nin üstün yetenekleri sayesinde, Paskalya Adası seferimiz monumental Moai heykelini fark edilmeden gemimize almayı başardı."
 rapanui.1023.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], Moai’nin taşınmasının mümkün olduğunca fark edilmemesi için her şeyi yaptı. Gece boyunca adamlar loş lamba ışığında kazı yaptı, böylece yerli halkın küreklerin toprağa girip eseri derinlikten kaldırdığını fark etmemesi sağlandı. Güneş doğduğunda, Moai çoktan güvenle gemiye alınmış, Şilili gübre yığınının altına saklanmıştı."
 rapanui.1023.g: "Mükemmel."
 rapanui.1024.t: "Arkadaşların Yardımıyla"
 rapanui.1024.d: "Rapa Nui, talebimize şüpheyle yaklaşsa da, onları Moai Hava’yı gemimize getirmeye ikna ettik."
 rapanui.1024.f: "Kolay bir konuşma değildi, ama sonunda [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], yerel halkı moai’yi kazıp taşımaya yardım etmeleri için ikna etmeyi başardı. Güvenlerini kazandıktan sonra, Rapa Nui’nin onayı ile planını gerçekleştirebildi. Karşılığında [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], gemideki en değerli hazinelerden bazılarını yerlilere hediye etti: paha biçilmez cam misketler, iki yıpranmış iskambil destesi ve tamamen aşınmamış bir şapka."
 rapanui.1025.t: "Zaman Kaybı"
 rapanui.1025.d: "Adada daha fazla eser bulmak için büyük çabalara rağmen, ekip seferi terk etmek zorunda kaldı."
 rapanui.1025.f: "Paskalya Adası kadar elverişsiz çok az yer vardır: taş ve ot dışında neredeyse hiçbir şey yok. Bu bazı diğer adalar için de geçerli olabilir, ama Paskalya Adası benzersizdir; binlerce insan burada neden yaşadıkları zor anlaşılır sebeplerle yaşıyor. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], insanların bu sefaletin sorumlusu olabileceğine inanıyor: tüm ağaçları kesmiş ve tüm hayvanları öldürmüş olabilirler. Burada geçen her ek dakika boşa gidiyor."
 rapanui.1025.g: "Ve gerçekten adada başka özel bir şey yok mu?"
 rapanui.1026.t: "Moai Hoa Hakananai'a"
 rapanui.1026.d: "Paskalya Adası seferi sırasında, ekip büyüleyici bir Moai heykeli buldu. Yarı gömülü ama özellikle yüksek kalitede."
 rapanui.1026.f: "Ne kadar zarif bir eser, diye düşündü [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], Moai’yi ilk keşfettiğinde. Zar zor görünüyordu ama görünen kısmı, adada tamamen farklı bir dönemin yaşandığını gösteriyordu - bir dönemde petroglyphler kültürün zirvesi ya da şamanistik ritüeller ve yarışmalar değil, etkileyici heykeller inşa eden ve onlara net şekiller veren bir kültür vardı. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] kesinlikle bir bilim insanı veya sanat uzmanı değildi, ama tarihe dair bir sezgiye sahipti; Moai’nin boş gözleri ona baktığında, tarihe bakıyordu. Tek sorusu, bu tarihi eve nasıl götürebileceğiydi."
 rapanui.1026.g: "Ekip Moai’yi kazmalı."
 rapanui.1026.h: "Heykeli kazmaları için yerel halktan yardım isteyin."
 rapanui.1026.i: "Eseri olduğu gibi bırakın."
 rapanui.1027.t: "Rapa Nui ile Anlaşmazlık"
 rapanui.1027.d: "Rapa Nui’den yardım istememiz tam tersi bir etki yarattı. Yerel halk, misafirperverliğimizi yeterince test ettiğimizi düşünüyor ve adalarından ayrılmamızı söylüyor!"
 rapanui.1027.f: "Yerel halkın güvenini kazanma çabalarımız, ilk düşündüğümüzden daha az hoş karşılanmış gibi görünüyor. Rapa Nui yaşlıları, ucuz cam misketlerle onları kandırma girişimimizin bir kez işe yarayabileceğine, ama ikinci kez işe yaramayacağına inanıyor. Yaşlı bir kadın, bir zamanlar güvenlerini kazanmamıza yardımcı olan yıpranmış şapkayı [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]’in ayaklarına fırlattı. Bu hareket, muhtemelen bir savaş ilanının simgesi gibiydi - grup hemen yok olmadıkça."
 rapanui.1027.g: "Sadece kültürleriyle ilgileniyoruz... neden bu kadar huysuzlar?"
 rapanui.1028.t: "Moai Hasar Gördü!"
 rapanui.1028.d: "Maalesef, Moai kazısı felaketle sonuçlandı. Heykeli yerden çıkarmak yerine, adamlar onu onarılamayacak şekilde zarar verdi."
 rapanui.1028.f: "Tamamen istemeden olursa, bunun arkeolojik bir vandalizm olmadığı söylenir. Ya da öyle diyorlar."
 rapanui.1028.g: "Arkeoloji ve sanat dünyası için bir kayıp."
 rapanui.1029.t: "Yerel Halk Yardım Ediyor!"
 rapanui.1029.d: "Rapa Nui, Moai’yi kazma konusunda yardım etmeyi kabul etti."
 rapanui.1029.f: "Bazen eski bir kriket sopası ve bir kavanoz kayısı reçelinin neler yapabileceğine şaşırırsınız. Tabii, onları birbirine nasıl kombine edeceğinizi biliyorsanız."
 rapanui.1029.g: "Beklenmeyen bir sürpriz."
 rapanui.1041.t: "Kuşadam Adası"
 rapanui.1041.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], Paskalya Adası’nı kendi başına keşfetmeye karar verdi. Yerel halk, iyi yerine daha çok sorun çıkarabilir."
 rapanui.1041.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], Paskalya Adası’nı kendi başına keşfetme kararında haklı çıktı. Ada üzerinde değerli buluntular varsa, bunları Rapa Nui’nin iradesine karşı kazanması gerektiğini tahmin ediyordu. Şimdiye kadar, adamlar yalnızca garip işaretler ve sembollerle oyulmuş petroglyph taşlarını buldu; kuşadamlar öne çıkıyor. Ama haritacı, çok daha ödüllendirici bir avın onları beklediğinden emin."
 rapanui.1041.g: "Bu, kesinlikle seferin başarısını sağlayacak."
 rapanui.1042.t: "Moai Hava"
 rapanui.1042.d: "Günler süren aramaların ardından, [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] olağanüstü bir keşif yaptı."
 rapanui.1042.f: "Görünüşe göre, Rapa Nui aslında ilkel kuşadam kültünden daha büyük bir mirasa sahipti. Çeşitli yerel klanların toplandığına inanılan eski bir meydanı ziyaret ederken, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], bazalt bir heykelin tabanını yerden fırlamış olarak buldu. Figür hasarlı ama ekip yerel müzeye ulaşıp taşırsa büyük değere sahip olabilir. Ancak bunun nasıl ve olup olmayacağı hâlâ belirsiz."
 rapanui.1042.g: "Heykeli gemiye al ve adadan ayrıl."
 rapanui.1042.h: "Adayı keşfetmeye devam et."
 rapanui.1043.t: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]'nin Ölümü"
 rapanui.1043.d: "Polinezya eserlerini aramak tamamen işe yaramamış olmakla kalmadı, aynı zamanda ıssız adadaki zorluklar hem insanlar hem malzeme için sorun oluşturdu."
 rapanui.1043.f: "Yerlilerin yardımını reddetme, sonuç vermeyen bir hazine arayışına devam etme ve tüm girişim retrospektifte felaketle sonuçlanacak şekildeydi. Daha birkaç gün geçmeden adamlar su ve yiyecek sıkıntısı çekmeye başladı ve hastalıklara daha yatkın hale geldiler. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] bilinmeyen bir hastalığa yenik düştü ve bir sabah ölü bulundu. Adamlar onu artık lanetli ada sayılan yerde gömdü ve gemiye geri döndü."
 rapanui.1043.g: "Bu anlamsız seferi iptal etmekten başka çare yok."
 rapanui.1050.t: "Rapa Nui’nin Moaileri"
 rapanui.1050.d: "Paskalya Adası’ndaki sürpriz derecede başarılı bir macera, [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] liderliğindeki cesur adamlar için sona erdi: iki değerli okyanus eseri [ROOT.GetCountry.GetNameNoFlag]’a geri dönüyor. Zaten açık ki, ün ve şöhreti hak ediyorlar."
 rapanui.1050.f: "'O ilkel baş\nNe kadar iddialı geniş,\nAma sanatta bir o kadar kaba,\nGeçmişin sıkıntıları\nBir klinik tabloda okunur\nKendi başına.\nBir tek şey için,\nDudakların başarısı\nAlaycı bir şekilde kıvrıldı,\nBu taş yığını\nBir gemide getirildi.' -Robert Frost"
 rapanui.1050.g: "Her iki moai de bir müzede olmalı!"
 rapanui.1051.t: "Moai Hava ile Eve Dönüş"
 rapanui.1051.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] kendini kanıtlamış bir adamdır. Issız Paskalya Adası’nda nadir bir Moai buldu ve gemide [SCOPE.sCharacter('rapanui_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('rapanui_ruler').GetFullName]'a vereceğini duyurdu. Denizciler için maaş artışı var - ama [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] kariyer planlarını hesaplıyor."
 rapanui.1051.f: "Paskalya Adası’ndaki zorluklar nasıl görülürse görülsün, macera başarılıydı. Evdekiler, egzotik bir sanat hazinesi ile ülkeyi zenginleştiren cesur maceracı hakkında hikâyeler anlatıyor. Bazıları için hırsızlık olan şey, başkaları için bir roman konusu."
 rapanui.1051.g: "Paskalya Adası’nın sırları artık açığa çıktı mı?"
 rapanui.1052.t: "Rapa Nui’nin Kutsal Yeri"
 rapanui.1052.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], macera sırasında yerlilerle arkadaş oldu. Geleneklerini, tarihlerini ve sırlarını öğrendi. Artık Paskalya Adası araştırmalarında uzman sayılıyor."
 rapanui.1052.f: "Denize döndüğünde [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], Paskalya Adası’ndaki olayları düşündü. Belki başka bir adam daha pervasız hareket ederdi. Belki nadir eserleri kariyerini ilerletmek için alırdı; belki de yerlilere olan dikkatsizliği ve bilgisizliği sonucu ölürdü. O, adada nadir hazinelerden daha fazlasını bulduğunu özetliyor. Çünkü yerliler takdirlerini göstermişti. Onu geleneklerine dahil ettiler. Artık tarihlerini biliyordu. Prehistorik, yaşayan bir kültür kendini ona açmıştı. Bundan sonra tüm ilgisini bu alana verecekti."
 rapanui.1052.g: "Bu bir bilimsel kariyerin başlangıcı mı?"
 rapanui.1053.t: "Sadece Enkaz"
 rapanui.1053.d: "Çok talihsiz bir şekilde, [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]’nin Paskalya Adası macerası hayal kırıklığı ile sona erdi. Ama tamamen boşuna değildi."
 rapanui.1053.f: "Yelkenler dolarken ve gemi ülkeye dönerken, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], bir zamanlar Moai olan parçaları elinde tutuyordu. Elbette, ayrılışını farklı hayal etmişti. Ama eve bir eser getirememiş olsa da, yolculukta bir şeyler öğrenmişti."
 rapanui.1053.g: "Bir yıldız düşer, bir yıldız doğar."
 rapanui.1054.t: "Paskalya Adası’na Tatlı-Acılı Veda"
 rapanui.1054.d: "Moai’nin silueti, batan güneşin akşam ışığında parlıyor. Aynı anda [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], diğer Moai’nin bir zamanlar sahip olduğu taşları ovuşturuyor. Sonra ileriye, denize bakıyor."
 rapanui.1054.f: "Kaybı mı yas tutmalı, yoksa kalan ganimet için mi sevinmeli? Zafer, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] için gölgeli. Bazı mürettebat üyeleri onu neşelendirmek istiyor. Ama o, mükemmel bir sonun farklı göründüğünü aklından çıkaramıyor. Karar içsel olarak olgunlaşıyor: Bir daha asla! Bu hikâyeden ders alacak. Bir dahaki sefere böyle bir şey olmayacak. Bu deneyim, olayları özetleme kararını pekiştiriyor."
 rapanui.1054.g: "Bir Moai, hiç Moai olmamasından iyidir."
 rapanui.1055.t: "Kanlı Bir Başarı"
 rapanui.1055.d: "Mürettebat her iki moai’yi de Paskalya Adası’ndan çıkarmayı başardı - ama [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], trajik bir şekilde hayatını kaybetti!"
 rapanui.1055.f: "'Gemye, gemiye!' İşte Paskalya Adası’ndan çalınan Moailerle ayrılmak isteyen adamlar için tek önemli şey buydu. Yerliler sonunda yabancıların ne yaptığını fark etti ve aldatıldıklarını hissetti. Gemi zaten yelken açmaya hazır ve Moailer yerleştirilmişti, ancak son saniyede trajik bir kaza meydana geldi. Arkada kalan [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], kimsenin geride kalmadığından emin olmak için son kalan kişi olarak sırtından bir mızrak darbesi aldı ve hareketsiz yere yığıldı. Mürettebat, onu geride bırakarak yola çıkmak zorunda kaldı. [ROOT.GetCountry.GetNameNoFlag] o gün iki değerli esere kavuştu, ancak parlak bir geleceğe sahip olacak eşdeğer bir adamı kaybetti."
 rapanui.1055.g: "[ROOT.GetCountry.GetNameNoFlag] bu kahramanı unutmayacak."
 rapanui.1056.t: "Paskalya Adası’nda Trajedi"
 rapanui.1056.d: "Mürettebat Moai’yi güvenle gemiye aldı - ama ne bedelle?"
 rapanui.1056.f: "'Gemye, gemiye!' İşte Paskalya Adası’ndan çalınan Moailerle ayrılmak isteyen adamlar için tek önemli şey buydu. Yerliler sonunda yabancıların ne yaptığını fark etti ve aldatıldıklarını hissetti. Gemi zaten yelken açmaya hazır ve Moailer yerleştirilmişti, ancak son saniyede trajik bir kaza meydana geldi. Arkada kalan [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], kimsenin geride kalmadığından emin olmak için son kalan kişi olarak sırtından bir mızrak darbesi aldı ve hareketsiz yere yığıldı. Mürettebat, onu geride bırakarak yola çıkmak zorunda kaldı. [ROOT.GetCountry.GetNameNoFlag] o gün iki değerli esere kavuştu, ancak parlak bir geleceğe sahip olacak eşdeğer bir adamı kaybetti."
 rapanui.1056.g: "[ROOT.GetCountry.GetNameNoFlag] bu kahramanı unutmayacak."
 rapanui.1057.t: "Son Saniyede Kaçış"
 rapanui.1057.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] liderliğinde, değerli Moai heykelini gemiye almayı başardılar; ancak yerlilerin öfkesini de üzerlerine çektiler."
 rapanui.1057.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], yerlilerin sabrını zorladığını hızla fark etti. Moai alındıktan sonra dostane olmayan işaretler görüldü. Görünüşe göre yerliler, sunulan hediyelerin - kırık bir sallanan at, birkaç teneke kutu ve üç renkli hayvan kartı - tam bir aldatmaca olduğunu görünce ihanete uğramış hissetti. Soğukkanlılıkla hemen adamlarını gemiye aldı. Çok geçmeden, adamlar sahilde silahlarla toplanmış Rapa Nui’yi görebildiler..."
 rapanui.1057.g: "Bu adamda nitelikler var."
 rapanui.1058.t: "Kayıp"
 rapanui.1058.d: "Paskalya Adası’nda özel özellikleri arayan ekip iz bırakmadan kayboldu."
 rapanui.1058.f: "Bu, fazla hırslı bir maceracının aşırı özgüveni miydi? Gemide kalan mürettebat, diğer denizciler ve liderleri [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]'den günlerce haber alamadı. Yarım hafta sonra üç adam kaderlerini sormaya cesaret etti, ancak sadece birkaç öfkeli yerliyle karşılaştılar ve sonuçsuz arayışı bıraktılar. Gemi, uğursuz adadan ayrıldı. Orada ne olduğu çözülememiş bir sır olarak kaldı."
 rapanui.1058.g: "Korkutucu."
 rapanui.1059.t: "Gölgelenmiş Bir Dönüş Yolculuğu"
 rapanui.1059.d: "Mürettebat, umut vaat eden bir liderin ölümüne yas tutuyor. Eve dönüş yolculuğu üzerinde melankolik bir hava hakim."
 rapanui.1059.f: "Ülkemin çağrısını duydum, denizlerin ötesinden,\nSuların boşluğu boyunca bana çağırıyor.\nKılıcı yan tarafında kuşanmış, miğferi başında,\nAyaklarının çevresinde ölüler ve yaralılar yatıyor.\nSavaşın gürültüsünü, toplarının gök gürültüsünü duyuyorum,\nAnnem, senin oğullarından biri olarak sana koşuyorum. -Cecil Spring-Rice"
 rapanui.1059.g: "Üzücü."
 rapanui_custom_death_shot_arrows: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName], küçük bir tekneyle adaya birkaç kez yaklaşmış ve her seferinde ok yağmuruyla karşılanmıştı. Yerliler, [ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHim]'i gerçekten vurmaya niyetli görünmüyor, sadece uzaklaştırıyorlardı. Üçüncü denemede, [ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHim]'in girişimlerinden yorulmuş gibiydiler. Birkaç ok [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]'e isabet etti ve [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe] hareketsiz yere yere yığıldı."
 rapanui_custom_death_lunch: "Başta her şey yolunda gibi görünüyordu. [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] yerliler tarafından sıcak karşılandı. Hatta onuruna bir ziyafet bile teklif ettiler. Ancak görünüşe göre [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName] yerel dili yeterince iyi çevirememişti. [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe] bir ziyafete katılmak için değil, ziyafet kendisiydi."
 rapanui_custom_death_burnt: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] bir şekilde yerlilerin öfkesini üzerlerine çekmiş olmalı. Varışından kısa süre sonra, vardığı kıyıya ulaşan geminin mürettebatı sahilde büyük bir ateş gördü. [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]'den günlerce haber alamayınca durumu araştırmaya karar verdiler. Sahilde, sadece her zaman yanında taşıdığı haç ile tanınabilen [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]'nin yanmış kalıntılarını buldular."
 rapanui_custom_death_shipwrecked: "Trajedi! [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe] varış noktasına ulaşamadan önce, içinde bulunduğu gemi bir fırtınaya yakalandı ve okyanusa gömüldü. [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName] hariç tüm yolcular kurtuldu. Acaba bu Tanrı’dan bir işaret miydi?"
 rapanui_custom_death_clubbed: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] adaya ayak basar basmaz yerliler tarafından çevrelendi. Başta çok ilgi gösteriyor gibi görünseler de kısa süre sonra büyük bir kavga başladı. Bu süreçte adalılar [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]'i büyük sopalarla dövdü ve [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe] hareketsiz yere yere yığıldı."
 rapanui_custom_death_beheaded: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] adaya ayak basmasının yalnızca bir gün sonrasında, vardığı geminin mürettebatı korkunç bir keşif yaptı. Sahilde, [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]'in kesilmiş başını bir kazığa geçirilmiş olarak buldular. Kimse, adalıların bunu [ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHim]'e neden yaptığını bilmiyor."
 rapanui_custom_death_join_natives: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]'den haftalarca haber alınamadı. Bunun üzerine, [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]'nin ziyaret ettiği köyü araştırmak için bir grup gönderildi. Ortaya çıktığı üzere, [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName] gayet iyiydi. Sadece bu vahşi kabileye katılmaya karar vermişti. Bu nasıl olabilirdi?"
