 rapanui.290.t: "Büyük Set Resifi"
 rapanui.290.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')], Avustralya sularındaki ünlü Büyük Set Resifi’nden geçerken, Dr. [SCOPE.sCharacter('rapanui_scientist').GetLastName] onun daha yakından incelenmesini istediğini belirtiyor. Yaptığı keşifler şaşırtıcı - resifler yalnızca deniz trafiği için engel değil."
 rapanui.290.f: "Charles Darwin, 1836’da HMS Beagle’ın dönüş yolunda Büyük Set Resifi’ni ziyaret etti. Farklı özellikler gözlemledi: Resifin devasa dış sınırları, okyanusa dik bir şekilde inen yüksek mercan duvarlarından oluşuyordu, bazı yerlerde yüzlerce metre derinliğe kadar. Lagünlerde ise yaşayan mercan oluşumları gözlemlenemiyordu; mercan kolonileri ölmüş görünüyordu. Darwin ayrıca dış mercanların deniz tabanı çöktükçe bile yüzeye yakın konumlarını korumak için sürekli yukarı büyüdüklerini fark etti. Bu gözlemler, mercan resiflerinin oluşumuna dair genel modelinin temelini oluşturdu. 1842’de 'The Structure and Distribution of Coral Reefs' adlı eserinde bu çöküş teorisini sundu; bu teori, mercan resiflerinin yavaşça batan adalar veya kıta sahanlıklarında oluşabileceğini öneriyordu. Büyük Set Resifi, Darwin için en çarpıcı bariyer resifi örneği oldu ve teorisi için merkezi bir kanıt sağladı."
 rapanui.290.g: "Atoll’ler... mercanlardan mı oluşuyor?"
