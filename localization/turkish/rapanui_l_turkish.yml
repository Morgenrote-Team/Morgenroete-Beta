 je_rapanui_northwest_expedition_reason: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi, Arktik'te bir Kuzeybatı Geçidi arıyor. Hükümet, bunun çok yıllık bir girişim olmasını bekliyor. Her yaz sefer bir ilerleme denemesi yapacak; her kış mürettebat Sonsuz Buzda kış uykusuna yatacak. Dört yıl sonra hiçbir ilerleme sağlanamazsa, sefer kayıp olarak kabul edilir. Kuzeybatı Geçidi'nden bir ilerleme sağlanıp sağlanamayacağı, kayıp bir seferin dönüp dönmeyeceği veya tüm görevin ulusal bir felaketle sonuçlanıp sonuçlanmayacağı büyük ölçüde görev #V Başarı Şansına#! bağlıdır. En az #G 80#! #V Başarı Şansı#!, Kuzeybatı Geçidi'nden geçişi garanti eder. #YELLOW 60#! #V Başarı Şansı#! ise seferin ilerleme sağlayamayacağı, ancak en azından yeni bilgiler getireceği anlamına gelir. #R 30#!’dan az bir #V Başarı Şansı#! ise ulusal bir trajedi beklenebilir.\n\nŞu anda #V Başarı Şansımız#! #ORANGE [ROOT.Var('rapanui_northwest_success').GetValue]#!."
 je_rapanui_northwest_expedition_fail: "Dört yıl içinde Kuzeybatı Geçidi'nden bir ilerleme sağlanamazsa sefer başarısız olacaktır."
 je_rapanui_northwest_expedition_success: "En az #G 80#! #V Başarı Şansı#! ile Kuzeybatı Geçidi'nden geçiş mümkündür; bu değer bir yıl boyunca bu seviyenin üzerinde kaldığı sürece."
 je_rapanui_northwest_expedition_invalid: "Başka bir ülke Kuzeybatı Geçidi'ni bizden önce geçerse, mürettebat hiçbir sonuç elde edemeden geri dönecek."
 rapanui.401.t: "Kuzeybatı Geçidi: Başarı Şansı"
 rapanui.401.d: "Sefer hazırlıkları başladı. '[SCOPE.sCharacter('rapanui_ship_scope').GetLastNameNoFormatting]' adlı amiral gemisi hazır. Bilim insanları ve denizciler, mevcut başarı şansımızı ilk kez hesaplıyor."
 rapanui.401.f: "Kuzeybatı Geçidi'nden güvenli bir şekilde geçme şansı, birçok faktöre dayanır. Hazırlık sırasında belirlenen temel değer, araştırılan denizcilik teknolojilerinin toplamıdır. Gıda koruma alanındaki ilerlemeler – vakumlu konserve ve pastörizasyon – de çok olumlu etki yapar. Pasifik Seferi'nden okyanus araştırmalarını tamamlamak veya Avantgarde Donanması’na sahip olmak ek bonuslar sağlar. Mühendisler ve gökbilimciler gibi bilim insanları, bu temel değeri artırabilir. Yolculuk sırasında hava gibi rastgele olaylar da değeri etkileyebilir – iyi veya kötü yönde."
 rapanui.401.g: "Kuzeybatı Geçidi'ni bulacağız – [ROOT.GetCountry.GetNameNoFormatting]’in şanına!"
 rapanui.401.h: "İkinci bakışta, bu girişim ilk düşünüldüğünden çok daha tehlikeli."
 rapanui.402.t: "İtiraz!"
 rapanui.402.d: "Mevcut hükümet koalisyonunun üyesi olan [SCOPE.sCharacter('rapanui_ig_leader').GetFullName], Kuzeybatı Geçidi’ni bulma seferine şiddetle itiraz etti. [SCOPE.sCharacter('rapanui_ig_leader').GetSheHe] bunu 'intihar görevi' olarak nitelendiriyor."
 rapanui.402.f: "Dün, [SCOPE.sCharacter('rapanui_ig_leader').GetLastName] partisinin temsilcileri, söz konusu eyleme karşı protesto yaptıklarını açıkladı. Bu seferin Arktik'i geçmeyi amaçlayan girişimi pahalı, anlamsız ve çok riskli olarak görüyorlar. Paranın başka alanlarda daha iyi harcanabileceğini söylüyorlar. Ayrıca, ülkemize hizmet edebilecek önemli kişilerin hayatını da tehlikeye atacağını belirtiyorlar."
 rapanui.402.g: "Buna katlanacaklar."
 rapanui.402.h: "Onlara siyasi tavizler verin."
 rapanui.403.t: "Kuzeybatı Geçidi: Sefer Lideri"
 rapanui.403.d: "Arktik’e yapılacak bir sefer, en tehlikeli deniz operasyonlarından biridir. Bu meydan okumayı kabul edecek ve seferi başarıyla sonuçlandıracak iyi bir kaptan gerekir."
 rapanui.403.f: "Bu görev yalnızca deneyimli kaptanlar tarafından yönetilmelidir: iyi kaptanlar seferin başarı şansını artırır. #YELLOW Deneyimli veya Uzman Deniz Komutanı#! gibi nitelikler yardımcı olur. #YELLOW Kaşifler#! özellikle önceliklidir ve kaptan dünyanın #YELLOW çevresini dolaşmışsa#! en iyi seçim olarak kabul edilir. Ancak dikkat: Sefer felaketle sonuçlanırsa kaptanın da gemiyle batma riski vardır..."
 rapanui.403.g: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_1').GetFullName]"
 rapanui.403.h: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_2').GetFullName]"
 rapanui.403.i: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_3').GetFullName]"
 rapanui.404.t: "Gemi Papazları"
 rapanui.404.d: "Bilinmeyene yapılacak uzun deniz yolculuğu uzun süreli bir izolasyon anlamına gelir. [SCOPE.sCharacter('rapanui_ig_leader').GetFullName], bağlantılarını kullanarak moral artırıcı gemi papazları atamayı teklif etti."
 rapanui.404.f: "'Bu, denizde kaybolmuş ruhlara bakmak için tamamen pastoral bir meseledir. Inuitler mi? Neden Inuitleri dönüştürmek istediğimizi düşündünüz? Kötü şöhretli iddialar! Tabii ki önceden nazikçe soracağız.'"
 rapanui.404.g: "Denizcilerin böyle tehlikeli bir yolculukta papazlara ihtiyacı var."
 rapanui.404.h: "Bizi denizde kurtaracak olan teknoloji ve yetenektir, Tanrı değil."
 rapanui.405.t: "Mühendis Sefer Gemilerini Geliştiriyor"
 rapanui.405.d: "[SCOPE.sCharacter('rapanui_engineer_scope').GetFullName], Arktik Seferi için filomuzu geliştirmek üzere teknik bilgisini sundu."
 rapanui.405.f: "Kuzeybatı Geçidi’ni geçecek ünlü Franklin seferi öncesinde Erebus ve Terror gemileri modernize edildi; ön ve yan gövdeye ek çelik takviyeler yapıldı, böylece paket buzunun baskısıyla gemilerin ezilmesi önlenmeye çalışıldı. Sakin veya olumsuz rüzgar yönünde bile gemilerin buzda manevra yapabilmesi için her iki gemiye yaklaşık 15 tonluk bir buharlı motor ve özel tasarım iki metrelik bir pervane takıldı. Bunlar Kraliyet Donanması'nda buharlı tahrik ve vida pervaneleri ile donatılan ilk gemilerdi. Pervaneler ve dümenler, paket buza takılırsa çıkarılıp güvenli bir yere taşınabilecek şekilde monte edildi. Geriye dönüp bakıldığında, bu ek tahrik gücü oldukça yetersizdi."
 rapanui.405.g: "İlerleme buzları kıracak."
 rapanui.406.t: "Gökbilimci Meteoroloji Çalışmaları Sunuyor"
 rapanui.406.d: "[SCOPE.sCharacter('rapanui_astronomer_scope').GetFullName], daha iyi bir hava raporu hazırlamak ve iyi bir sefere zaman ayarlamak için meteorolojik bilgisini sundu."
 rapanui.406.f: "'Gözlemevinin hava istasyonunu kullandım ve haftalarca süren deneyler, titiz gözlemler ve gece geç saatlere kadar yapılan çalışmalar sonrasında, düşük sıcaklığın bu yolculuk için pek faydalı olmayabileceğini fark ettim.'"
 rapanui.406.g: "Bilim zaferimizi sağlar."
 rapanui.407.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi başlıyor"
 rapanui.407.d: "Kuzeybatı Geçidi’ni aramak için yapılacak seferin gemileri hazır. Liderleri [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]’den dolayı #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#! adı halk arasında şimdiden yerleşmiş durumda."
 rapanui.407.f: "19. yüzyılın ilk yarısında, Kuzeybatı Geçidi’nin bazı kısımları John Ross, Elisha Kent Kane, William Edward Parry ve James Clark Ross gibi birçok sefer tarafından ayrı ayrı keşfedildi; ayrıca John Franklin, George Back, Peter Warren Dease, Thomas Simpson ve John Rae gibi isimlerin kara seferleri de yapıldı. 1826'da Frederick William Beechey Alaska’nın kuzey kıyısını keşfederek Point Barrow'u buldu. 1845’te, Sir John Franklin’in liderliğindeki lüks donanımlı iki gemilik bir sefer, Kanada Arktik’ine doğru yola çıkarak Kuzeybatı Geçidi’nin son keşfedilmemiş bölgelerini haritaladı. Güven yüksekti; çünkü keşfedilmemiş Arktik ana karasının 500 km’den (310 mil) az kaldığı tahmin ediliyordu. Gemiler geri dönmeyince, yardım seferleri ve arama ekipleri Kanada Arktik’ini araştırdı; bu da bölgenin kapsamlı bir şekilde haritalanmasını ve muhtemel bir geçidin tespitini sağladı."
 rapanui.407.g: "İyi şanslar!"
 rapanui.410.t: "Amundsen Kuzeybatı Geçidi’ni Geçiyor"
 rapanui.410.d: "Norveçli kaşif Roald Amundsen, Kuzeybatı Geçidi’ni tekneyle geçen ilk kişi oldu. Sefer üç yıl sürdü. Bu, ülkemiz için büyük bir gün!"
 rapanui.410.f: "Amundsen, 1903–1906 yılları arasında altı kişilik ekibi ve Gjøa adlı ahşap gemisiyle Atlantik’ten Pasifik’e Kuzeybatı Geçidi’ni geçmeyi başardı. Ancak Baffin Körfezi’nden Lancaster Sound, Peel Sound ve James Ross ve Simpson Boğazları üzerinden seçilen rota, deniz derinliği bazı yerlerde bir metreden az olduğundan düzenli deniz taşımacılığı için uygun değildi. Bununla birlikte, altı Norveçli ve Danimarkalı Godfred Hansen’in Kuzeybatı Geçidi’ni doğudan batıya fethetmeleri, yüzyıllar boyunca birçok sefer ekibinin denediği büyük bir denizcilik ve keşif başarısını gölgelemiyor. Yolculuk sırasında Amundsen’in sefer ekibi, John Franklin’in kayıp seferine ait iskelet kalıntıları ve ekipman buldu."
 rapanui.410.g: "Zafer Norveç’e!"
 rapanui.411.t: "Kuzeybatı Geçidi keşfedildi!"
 rapanui.411.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#! Kanada ile Arktik arasındaki Arktik Okyanusu’nda bir atılım yaptı ve böylece bu deniz yolunun ilerleme için aşılmaz bir engel olmadığını kanıtladı. [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] Seferi kahraman ilan edildi!"
 rapanui.411.f: "Kuzeybatı Geçidi’ni geçmek, teorik projeksiyonlarda umut edilen karlı bir ticaret rotası açmadı. Kalın buzdan geçmek çok riskliydi. Olası kışlama, geçişi geciktirdi. Yine de keşif bir dönüm noktasıydı. Daha önce bilinmeyen alanlar haritalandı ve Kuzey veya Güney Kutup bölgelerine seyahat artık imkânsız değildi. Denizcilik, haritacılık, meteoroloji, jeomanyetik ve biyolojik bilgi genişledi. Bazı cesur kaşifler için bölge artık terra incognita değildi."
 rapanui.411.g: "[ROOT.GetCountry.GetNameNoFormatting]’in şanına!"
 rapanui.412.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]'in Kayıp Seferi"
 rapanui.412.d: "Yaklaşık 4 yıldır #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#! hakkında hiçbir haber almadık. Amiralite bu nedenle seferi resmi olarak kayıp ilan etti. Yaygın kanı, mürettebat ve geminin paket buzlarına takıldığı yönünde."
 rapanui.412.f: "Kayıp bir sefer, mutlaka en kötü senaryonun gerçekleştiği anlamına gelmez. Ancak gerçek hedefin, yani Kuzeybatı Geçidi’nin keşfi ve geçişinin kesinlikle başarısız olduğu kesindir. Mürettebatın kaderi ise ayrı bir hikâye. Eğer seferin #V Success Chance#! değeri çok düşük değilse, her şeyin kaybolmadığına dair bir umut vardır."
 rapanui.412.g: "Bu iyi bir haber değil."
 rapanui.413.t: "Kayıp Sefer geri döndü!"
 rapanui.413.d: "Tüm [ROOT.GetCountry.GetNameNoFormatting] halkının mutluluk sürprizi: #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#! geri döndü. Mürettebattan bazıları yaşamını yitirdi, gemi kötü durumda ama değerli bilimsel bilgilerle geri geldi."
 rapanui.413.f: "McClure Arktik seferi, kayıp Franklin seferini bulmak için yapılan birçok girişimden biri olarak önemliydi; çünkü Kuzeybatı Geçidi’ni hem tekne hem de kızakla geçmeyi başaran ilk sefer oldu. Ancak bu nedenle, bunun gerçek bir geçiş sayılıp sayılamayacağı şüphelidir. İlk gerçek geçişi 1903–1905 yılları arasında Roald Amundsen gerçekleştirmiştir."
 rapanui.413.g: "Ne rahat bir duygu!"
 rapanui.414.t: "Sefer üyeleri geri dönüyor"
 rapanui.414.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!’nin kalan az sayıda üyeleri birkaç gün önce Kanada’da medeniyet sınırını geçti. Zayıf ve bitkin haldeki kişiler, gemileri paket buzlarına bırakmak zorunda kaldıklarını açıkladı. Gerekli eşyaları birkaç küçük kızakta taşıdılar. Kaptan [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] zaman zaman ciddi şekilde hastaydı ama şimdi güvenle evine döndü. Diğer mürettebat üyeleri soğuk, açlık, hastalık ve yorgunluk nedeniyle hayatta kalamadı."
 rapanui.414.f: "1852 yılında Edward Belcher, Franklin’i aramak üzere hükümetin Arktik seferinin komutasını aldı. Başarısız oldu; Belcher’in astları tarafından sevilmemesi, bir Arktik yolculuğu için özellikle talihsizdi ve buzlu sularda gemi yönetmeye tamamen uygun değildi. Beş gemiden dördü (HMS Resolute, Pioneer, Assistance ve Intrepid) paket buzlar içinde bırakıldı; Belcher mahkemeye verildi ama beraat etti. Bu gemilerden biri olan HMS Resolute, sonunda Amerikalı bir balina gemisi tarafından sağlam olarak bulundu ve Birleşik Krallık’a geri getirildi."
 rapanui.414.g: "En azından hayatta kaldılar."
 rapanui.415.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferinden Hiç İz Yok"
 rapanui.415.d: "Haftalarca bekledikten sonra korkunç bir şüphe netleşiyor: Kuzeybatı Geçidi’ni arayan sefer geri dönmeyecek. Muhtemelen [ROOT.GetCountry.GetAdjectiveNoFormatting] denizcilik tarihinin en büyük trajedilerinden biriyle yüzleşmeye alışmamız gerekiyor."
 rapanui.415.f: "Franklin Seferi, İngiliz kutup kaşifi Sir John Franklin’in üçüncü ve son büyük araştırma yolculuğuydu. Amaçları, Kuzeybatı Geçidi’ni doğudan batıya ilk kez tamamen geçmek, haritalamak ve böylece Avrupa’dan Asya’ya daha kısa bir deniz yolu bulmaktı. Sefer felaketle sonuçlandı; 1845–1848 yılları arasında Kanada Arktik Takımadaları’nda yer alan herkes öldü. Sefer üyelerinin son izleri, ancak yıllar sonra King William Adası yakınlarında keşfedildi. Franklin Seferi’nin uzun süre gizli kalan trajik kaderi, 19. yüzyıl ortasında geniş ilgi topladı. Gazeteler Franklin’in kaderi hakkında haberler ve spekülasyonlar yaparak yüksek tiraj elde etti ve konuyu modern kitle medyası kurallarına göre işledi. Seferin kendisi ve Lady Jane Franklin’in kocasını kurtarmak için yeni arama seferleri göndermedeki yoğun çabaları, yıllarca İngiliz kamuoyunu meşgul etti."
 rapanui.415.g: "Hepsinin öldüğünü kabul etmeliyiz..."
 rapanui.415.h: "Kurtarma seferi gönder!"
 rapanui.415.tt: "Sefer üyelerini hayatta bulma ihtimali çok düşük. Çoğu durumda hiçbir şey bulunamayacak ya da en fazla birkaç kalıntı ele geçecek. Ancak, bu seferin de kaybolma riski -çok düşük de olsa- mevcut."
 rapanui.416.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferinin İzleri"
 rapanui.416.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName], Kanada’nın kuzeyinde zorlu bir yolculuk sırasında kayıp seferin kalıntılarını bulabildi. Kanıtlar, tüm sefer üyelerinin öldüğünü gösteriyor. Ancak [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetSheHe] bazı buluntuları güvence altına alabildi ve [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetHerHis] görevi [ROOT.GetCountry.GetNameNoFormatting] için yeni bilgiler kazandırdı."
 rapanui.416.f: "Haftalar sonra, kurtarma seferinin üyeleri kayıp gemi mürettebatından bazı gizli mesajlar buldular. Bunlar durum raporları ve konum bildirimleriydi. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]’in liderliğindeki gemiler, #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!’nin kaybolduğu belirli bir alanı sonunda saptayabildi. Hatta bazı Inuitlerden kayıp gemilerden birine ait eşyalar satın almayı başardılar. Mürettebat ve kaptanın ölümü artık kesin. Ancak kurtarma seferi, önceden bilinmeyen bölgeleri haritaladı, yeni araştırma sonuçları elde etti ve kayıp ölçümleri geri kazandı. Kaptan [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] önemli bir deneyim kazandı."
 rapanui.416.g: "En azından konuya biraz ışık tutabildik."
 rapanui.417.t: "Kayıp Seferin Gizemi"
 rapanui.417.d: "Haftalarca aramaya rağmen, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName], #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!’nin akıbetine işaret edecek hiçbir iz bulamadı. Kötü hava koşulları, seferin benzer bir akıbet yaşamaması için iptal edilmesini zorunlu kıldı."
 rapanui.417.f: "Kayıp sefer üyelerinin büyük olasılıkla öldüğü ve gemilerinin battığı düşünülüyor. Ancak belirsizlik etkisini bırakıyor. Basında hikayeler dolaşıyor. Yamyamlık, iblisler, vahşileşmiş beyefendiler ve deliliğe düşüş gibi öyküler anlatılıyor. #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!’nin akıbeti muhtemelen hiçbir zaman netleşmeyecek ve birçok korku hikayesine malzeme sağlayacak."
 rapanui.417.g: "Tahminen konserve yiyecekler iyi mühürlenmemişti?"
 rapanui.418.t: "Bir Arktik Mucizesi"
 rapanui.418.d: "Bunu hiç kimse beklemiyordu. Ama sonra bir telgraf başkente ulaştı: Kaptan [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastName] hayattaydı. Çok zayıf, hasta ve güçsüzdü. Ama hayattaydı. Biraz sonra, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName], kalan mürettebatla birlikte ana limana ulaştı. Kurtarma seferi tam bir başarıyla sonuçlandı."
 rapanui.418.f: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!’nin tüm gemileri paket buzlarının içinde sıkışmıştı. Aylar önce terk edilmişlerdi. Kalan hasta ve zayıf kişiler kesin bir ölümle karşılaştı. Diğerleri, gemiden yapılan geçici kızaklarla ilerlerken öldü. Açlık ve soğuk daha fazla can aldı. Üç kişiden biri ölmüştü. Ama sevinç daha büyüktü çünkü en azından evlerine dönebilmeyi başardılar – sanki bir mucize gibi, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] onları buzsuz bir koya bulup gemiye aldı. Başarılı seferin önemli bilimsel buluntuları da kurtarıldı. [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] filosunu kaybetmiş olsa da, evde [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] ile birlikte, geçidi geçmiş gibi kutlanıyor."
 rapanui.418.g: "Bu adamlar kahraman!"
 rapanui.419.t: "Kurtarma seferi başarısız!"
 rapanui.419.d: "Olası tüm kötü senaryoların en kötüsü gerçekleşti: #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#! kaybedildikten sonra, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] liderliğindeki kurtarma seferi de kayıp. İkisinin de aynı akıbeti yaşadığı korkuluyor."
 rapanui.419.f: "'Rae, Nisan 1854’te Pelly Bay’de (enlem 69° kuzey, boylam 72° batı) Eskimolardan, 10-12 günlük bir yolculuk batıda yaklaşık 40’tan fazla beyaz adamın yiyecek yetersizliği nedeniyle öldüğünü duydu. Yolculuğuna devam ederken, 1850 baharında, King William Adası’nın kuzey kıyısına yakın yerde fok avına çıkan bazı Eskimoların, yaklaşık 40 beyaz adamın güney yönünde buz üzerinde göç ettiklerini gördüklerini öğrendi; Birkaç hafta sonra, Amerika kıtasının kıyısında, büyük bir nehrin bir günlük kuzeybatısında 30 beyaz adamın cesedi ve yakın bir adada 5 kişi bulundu. Eskimolar, en azından bu eşyaların bazı kısımlarını, ayrıca gümüş kaşıklar, çatallar vb. bulmuş ve Rae tarafından satın alınmıştı.'"
 rapanui.419.g: "Bu buz denizi lanetli!"
 rapanui.420.t: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi Dönüyor"
 rapanui.420.d: "Başka bir ulus Kuzeybatı Geçidi’nde belirleyici başarıyı bulduktan sonra, bizim seferimiz geri döndü. Karar verici bir başarı elde edemese de, faydalı bilgiler getirdi. Bu tür seferlerin sonuncusuydu."
 rapanui.420.f: ""
 rapanui.420.g: "Hoş geldiniz."
 rapanui.421.t: "Ilıman Hava"
 rapanui.421.d: "Olağanüstü bir çözülme nedeniyle, bu yıl bazı buzlu geçitler normalden daha erken açıldı. #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#! bu nedenle planlanandan daha iyi ilerliyor."
 rapanui.421.f: "Hava koşullarının değişkenliği kırılmazdır ve daha önce birçok Arktik kaşifin hayatına mal olmuştur. Ülkemize hizmet eden bir astronom, sefer öncesinde daha uygun bir zaman öngörerek olumlu bir hava olayının olasılığını artırabilir."
 rapanui.421.g: "İyi."
 rapanui.422.t: "Sert Hava"
 rapanui.422.d: "Maalesef bu yıl Arktik’te kış daha uzun sürüyor ve buzlanma dönemi daha erken başlıyor; Eylül’de. Bu durum #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!’nin şansını önemli ölçüde azaltıyor."
 rapanui.422.g: "Kötü."
 rapanui.423.t: "İnuit Rehberi"
 rapanui.423.d: "Kuzey Kanada gezisi sırasında, [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] sefer için bir İnuit bulmayı başardı. Sadece coğrafi bilgi sağlamakla kalmıyor, aynı zamanda bu sert iklimde bir iki hayatta kalma tekniğini de biliyor."
 rapanui.423.f: "Avrupalılar, 19. yüzyılın ilk yarısındaki Arktik seferlerinde İnuitlerin bilgisinden faydalandı; bazı sefer katılımcıları dilleri bile konuşabiliyordu. Örneğin, kayıp Franklin Seferi’nin kaderi, bazı İnuit tanıklarla görüşülerek yeniden inşa edilebildi. Ancak yerlilere saygı konusunda eksiklik vardı. Roald Amundsen, kendi Kuzeybatı Geçidi yolculuğunu ve Güney Kutbu seferini başarıyla tamamlamak için kutup sakinlerinin hayatta kalma tekniklerine büyük ölçüde güvenmişti."
 rapanui.423.g: "Harika!"
 rapanui.424.t: "Av Hayvanları"
 rapanui.424.d: "Mürettebatın bir kısmı birkaç gün karaya çıkarak fok, karibu veya kuş avlamak istedi."
 rapanui.424.f: "Kuzey Kanada’nın çorak tundra manzarası ve özellikle Arktik çevredeki bölgeler, büyük vahşi hayvanların hayatta kalma şansını çok azaltıyor. Ancak istisnalar vardır. Franklin Seferi’nin başarısız olmasının nedenlerinden biri, katılımcıların kendi erzaklarına çok güvenmeleri ve bölgenin yiyecek kaynaklarına az güvenmeleriydi. Daha sonraki seferler, yerel hayvanları avlayarak beslenmeyi destekleme fırsatını yoğun şekilde kullandı. Ancak her av başarıyla sonuçlanmaz."
 rapanui.424.g: "Zamanı av için kullanmalılar."
 rapanui.424.h: "Bu zaman kaybı."
 rapanui.425.t: "Zehirlenme"
 rapanui.425.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!’nden birkaç adam zehirlenme belirtileri gösteriyor. Erzakların bozulup bozulmadığı ya da başka nedenlerin sorumlu olup olmadığı bilinmiyor. Geriye kalan yiyeceklerle ne yapılacağı konusunda amiral gemisinde zaten bir tartışma başladı – neredeyse hiç yedek yok."
 rapanui.425.f: "Bugüne kadar Franklin Seferi’nin başarısız olmasının gerçek nedenleri tartışılıyor. Sıklıkla öne sürülen argüman, tenekelerin doğru şekilde lehimlenmediği ve kurşun zehirlenmesi nedeniyle mürettebatın zayıfladığıdır. Bazıları ise cıva zehirlenmesini öne sürdü. Ancak gıda zehirlenmesi de göz ardı edilemez ve bu eşsiz bir durum değildir."
 rapanui.425.g: "Erzak bu kadar mı kötüydu?"
 rapanui.425.h: "Erzakları denize atın ve karada yiyecek arayın."
 rapanui.426.t: "Tüberküloz"
 rapanui.426.d: "Arktik’te [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] zor bir karar ile karşı karşıya: sefer gemisinde tüberküloz hızla yayılıyor. Sağlıklı adamlar için enfeksiyon riski çok yüksek, özellikle bu kadar küçük bir alanda."
 rapanui.426.f: "'İnsanlara kendilerine yapılmasını istediğiniz şeyi siz de onlara yapın; çünkü bu, Kanun ve Peygamberlerin ruhudur.' -Matta 7:12"
 rapanui.426.g: "Onlara elinizden geldiğince bakın."
 rapanui.426.h: "Onları denize atın!"
 rapanui.427.t: "Paket Buzları"
 rapanui.427.d: "Artık hiçbir şey işe yaramıyor. Bir süre sonra gemi hareketsiz kaldı. Ahşap bir parmak ucu kadar bile hareket etmiyor. Yakında çok soğuk olacak: #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#! tamamen paket buzlarıyla çevrili!"
 rapanui.427.f: "'Güçlü adam, büyük işler yapan değil, zorluklarla, başarısızlıklarla ve umutsuzluklarla kararlı bir şekilde yüzleşen adamdır.' -Ernest Shackleton"
 rapanui.427.g: "Bu, tüm kötü dönüşlerin en kötüsü."
 rapanui.427.h: "Neyse ki, mühendisimiz gemiyi bu duruma hazırlamış."
 rapanui.428.t: "Jeomanyetik Veriler"
 rapanui.428.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!’nin fizik ekibi kutup buzulları yakınında yeni bilimsel bilgiler elde etti."
 rapanui.428.f: "'İnsanlık tarihi, karanlıktan aydınlığa doğru sürekli bir mücadeledir. Bu nedenle bilginin kullanımı hakkında tartışmanın hiçbir anlamı yoktur; insan bilmek ister ve bilmekten vazgeçerse artık insan değildir.' -Fridtjof Nansen"
 rapanui.428.g: "Harika!"
 rapanui.429.t: "Kutup Flora ve Faunası"
 rapanui.429.d: "Düşmanca çevreye rağmen, #YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#! araştırmacıları, bu uzak bölgenin bilgilerini geliştirmek için hayvan ve bitki örnekleri toplamayı başardı."
 rapanui.429.f: "'Kutup bölgelerinde uzun süre kalan bir insanın soğuğa karşı diğer ölümlülerden daha dayanıklı olacağını düşünen birçok kişi tamamen yanılıyor.' -Roald Amundsen"
 rapanui.430.t: "Bilinmeyen Topraklar"
 rapanui.430.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] Seferi#!, Kuzey Kanada’da daha önce bilinmeyen adalar ve koylar buldu ve böylece okyanusbilimsel ve kartografik bilgileri artırdı."
 rapanui.430.f: "James Cook’un seferlerinden sonra motto, keşfedilecek hiçbir şey kalmadığıydı. Bu ülkeler ne kadar düşmanca olursa olsun, [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] yeni, önceden bilinmeyen kara alanlarını haritaladı ve böylece son sınırların henüz geçilmediğini kanıtladı."
 rapanui.431.d: "Norveçli maceracı Roald Amundsen, Kuzeybatı Geçidi’ni tekneyle geçen ilk kişi oldu. Kampanya üç yıl sürdü."
 rapanui.431.g: "Tebrikler..."
 rapanui.432.d: "[SCOPE.sCountry('rapanui_northwest_country_scope').GetName]’dan bir sefer, bugün inanılmaz bir başarıyı, Kuzeybatı Geçidi’ni geçmeyi tamamladı."
 rapanui.433.t: "Kayıp [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] Seferi"
 rapanui.433.d: "Denizcilik tarihinin en kötü felaketlerinden biri [SCOPE.sCountry('rapanui_franklin_country').GetName]’ı vurdu: En modern ekipmanlarla donatılmış bir sefer tamamen kayboldu. Sefer, Kuzeybatı Geçidi’ni bulmak ve geçmek için yapılmıştı. Dört yıldır hiçbir temas sağlanamadı. Tüm ülke derin bir yas içindeyken, bazıları tüm mürettebatın ölmüş olabileceğini tahmin ediyor."
 rapanui.433.g: "Samimi taziyelerimizi ileten bir telgraf gönderin."
 rapanui.433.h: "Tehlikeyi arayan, tehlikede yok olsun."
 rapanui.434.t: "[SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] Seferinin İzleri"
 rapanui.434.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName], kuzey Kanada’daki zorlu bir yolculuk sırasında kayıp seferin kalıntılarını bulmayı başardı. Kanıtlar, sefer üyelerinin tümünün öldüğünü gösteriyor. Ancak [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetSheHe] bazı buluntuları güvence altına alabildi ve [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetHerHis] görevi yeni bilgileri [ROOT.GetCountry.GetNameNoFormatting]’a getirdi."
 rapanui.434.f: "Haftalar sonra, kurtarma seferi üyeleri kayıp gemi mürettebatından bazı gizli mesajlar buldu. Bunlar, durum raporları ve konum bildirileriydi. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] liderliğindeki gemiler, #YELLOW [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] seferinin kaybolduğu spesifik bir bölgeyi nihayet belirleyebildi. Hatta kayıp gemilerden gelen bazı eşyaları Inuitlerden satın alabildiler. Mürettebat ve kaptanın ölümü artık üzücü bir kesinlik kazandı. Ancak kurtarma seferi, daha önce bilinmeyen alanları haritaladı, yeni araştırma sonuçları elde etti ve kayıp ölçümleri geri kazandı. Kaptan [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] önemli deneyim kazandı."
 rapanui.435.t: "Kayıp Seferin Gizemi"
 rapanui.435.d: "Haftalarca aradıktan sonra bile, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName], [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting] seferinin kaderine işaret edecek herhangi bir iz bulamadı. Kötü hava koşulları nedeniyle benzer bir akıbete uğramamak için görev iptal edilmek zorunda kaldı."
 rapanui.435.f: "Kayıp seferin üyeleri muhtemelen ölü ve gemileri batmış durumda. Ancak belirsizlik etkisini bırakıyor. Basında hikâyeler dolaşıyor. Yamyamlık, şeytani varlıklar veya iyi beyefendilerin vahşi hayvanlara dönüşüp deliliğe sürüklendiği hikâyeler anlatılıyor. Bu görevin kaderi muhtemelen hiçbir zaman netleşmeyecek ve birçok korku hikâyesine malzeme sağlayacak."
 rapanui.436.t: "Bir gemi yeniden bulundu!"
 rapanui.436.d: "Bir sansasyon: kayıp seferden bir gemi, Kuzey Amerika kıyılarında hayalet gemi olarak ortaya çıktı. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] onu güvence altına almayı başardı. Gemi neredeyse tamamen sağlam, ancak tahmini konumdan yaklaşık 1.200 mil uzakta. Bu geminin enkaz mı yoksa başkasına mı ait olduğu konusunda bir tartışma başladı."
 rapanui.436.f: "HMS Resolute, 19. yüzyıl ortalarında Britanya Kraliyet Donanması’na ait, kutup keşifleri için özel olarak donatılmış bir bark tipi gemiydi. Resolute, Franklin’in kayıp seferini ararken buzlara sıkıştı ve 1854’te terk edildi. Britanya Hükümeti, geminin hâlâ Majesteleri’nin mülkü olduğunu The London Gazette’de duyurdu, ancak kurtarma girişimi yapılmadı. Gemi serbest bırakıldı ve 16 Eylül 1855’te Baffin Körfezi’nde bir hayalet gemi olarak Amerikan balinası George Henry tarafından görüldü - son konumundan neredeyse 2.000 km uzakta. Resolute daha sonra Davis Boğazı’nda tekrar paket buzlarına yakalandı, ancak hâlâ denize elverişliydi ve balinalar tarafından New London, Connecticut limanına ödül olarak götürülebiliyordu. Sonunda ABD Kongresi tarafından 40.000 USD karşılığında satın alındı, yeniden inşa edildi ve 17 Aralık 1856’da iki ülke arasındaki barışın bir işareti olarak Britanya Kraliçesi Victoria’ya resmen takdim edildi."
 rapanui.436.g: "Gemiyi sahibine iade edin."
 rapanui.436.h: "Gemideki bilimsel bilgiler bizim için faydalı olabilir..."
 rapanui_add_x_oceanographic_understanding_minus_x_tt: "@rapanui_oceanographic_knowledge! Oşinografik Bilgi [SCOPE.GetValue('understanding_amount')|0+] kadar azalır."
 rapanui_add_x_oceanographic_understanding_0_tt: "@rapanui_oceanographic_knowledge! Oşinografik Bilgi değişmez."
 rapanui_add_x_oceanographic_understanding_x_tt: "@rapanui_oceanographic_knowledge! Oşinografik Bilgi [SCOPE.GetValue('understanding_amount')|0+] kadar artar."
 rapanui.501.t: "Yeni Atlantik Telgraf Şirketi"
 rapanui.501.d: "Etkili bir hisse şirketi, [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetFullName] önderliğinde kuruldu. Telgraf patronu, Atlantik boyunca riskli bir telgraf kablosu döşeme için gerekli parayı toplamakla görevli. [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastNameNoFormatting] Atlantik Telgraf Şirketi imkansızı başarmaya çalışacak."
 rapanui.501.f: "[SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastName] fikrini ilk sunduğunda alay konusu oldu – kelimenin tam anlamıyla servetini okyanusa gömecek deniyordu. Ancak zamanla projeyi gerçekçi bulan başka sponsorlar da bulundu."
 rapanui.501.g: "Kıtaları birbirine bağlayalım!"
 rapanui.502.t: "Bilimsel destek"
 rapanui.502.d: "Kablo döşeme gemisinin hareketinden kısa süre önce, projeyi desteklemek için bir bilim insanı ekleme fırsatı var."
 rapanui.502.f: "An [concept_tesla_engineer] can help out in the event of accidents at sea, thereby protecting the transoceanic cable project from harm. He also increases the chance that the cable will actually work after it has been laid. A [concept_dubois_naturalist], on the other hand, uses his stay in the Atlantic to observe nature."
 rapanui.502.g: "[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], mühendisimiz."
 rapanui.502.h: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], doğa bilimcimiz."
 rapanui.511.t: "Balinalar ve Yunuslar"
 rapanui.511.d: "Balinalar ve yunuslar rotayı geçtiğinde eşsiz bir doğa gösterisi ortaya çıkıyor. [SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] gözlemden yeni biyolojik bilgiler bekliyor, ancak mürettebat bu tür akademik merakla pek ilgilenmiyor."
 rapanui.511.f: "Profesör, büyüleyici deniz canlılarını katletmek için kullanılan aşağılık av yöntemlerini de işaret edince gemide tartışma çıktı. Çoğu denizci için, balinalar sadece yağ depolama aracı olduğundan, ders ayrıca rahatsız edici oldu."
 rapanui.511.g: "Bu harika canlıları inceleyin."
 rapanui.511.h: "Buna zamanımız yok."
 rapanui.512.t: "Ne kadar çok Balık!"
 rapanui.512.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName], Kuzey Atlantik’te daha önce bilinmeyen türlerde balık sürüleri görünce şansına inanamadı. Profesör kaptana işi durdurup bazı örnekler almasını söyledi. [SCOPE.sCharacter('target_character').GetFullName], bunun bir kablo döşeme gemisi olduğunu ve araştırma tesisi olmadığını hatırlattı."
 rapanui.512.f: "'İnan bana! Bilimsel araştırmayı kaçırıyoruz! Bu hassas küçük balıklar tamamen keşfedilmemiş bir tür. Görmedin mi - ne demek istiyorsun, şimdi suyun içinde onlarla yüzebilirim?!'"
 rapanui.512.g: "Biraz balık yakala."
 rapanui.513.t: "Atlantik Okyanusu’nda Deneyler"
 rapanui.513.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName], kablo döşeme gemisinde bilimsel çalışmalar yapmak için bazı cihazlarını kurmak amacıyla denizdeki zamanı değerlendirdi. Henüz bir odak noktası seçmedi."
 rapanui.513.f: "'Okyanusta bir nehir vardır. En şiddetli kuraklıkta bile asla kuruması söz konusu değildir ve en büyük sellerde bile taşmaz. Kıyıları ve tabanı soğuk sudan, akıntısı ise sıcak sudan oluşur. Kaynağı Meksika Körfezi, ağzı ise Arktik Okyanusu’ndadır. Bu, Gulf Stream’dır.' -Matthew Fontaine Maury"
 rapanui.513.g: "Manyetik deneylere odaklan."
 rapanui.513.h: "Oşinografik deneylere odaklan."
 rapanui.521.t: "Derinliklerdeki Gizem"
 rapanui.521.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName], ölçüm verilerini incelerken garip bir keşif yaptı. Atlantik’in belirli bir bölümünde deniz tabanı alışılmadık şekilde yükseliyor. Şu ana kadar [SCOPE.sCharacter('rapanui_cable_guy_scope').GetSheHe] bu fenomen hakkında sadece bir teoriye sahip."
 rapanui.521.f: "Aslında, denizlerin ortasında özellikle derin olması gerektiği her zaman düşünülmüştü. Ancak bugünkü keşif bu fikri alt üst ediyor. Derinlik rekoru yerine, taban ile yüzey arasındaki mesafe azalıyor. Bu şirket için iyi haber çünkü beklenenden daha az kablo uzunluğu gerekiyor. Ancak [SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] için bu, tüm önceki görüşlerin düzeltilmesi gerektiği anlamına geliyor. Görünüşe göre okyanus tabanında tepeler ve vadiler var. Ve bu tepe sıradan bir tepe değil."
 rapanui.521.g: "Burası bir denizaltı dağ sırası mı?"
 rapanui_cable_guy.option: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName} bunu çözecek."
 rapanui_transatlantic_cable_start_button: "Atlantik kablosunu döşemeye başla"
 rapanui_transatlantic_cable_start_button_desc: "Projeye yeterli yatırımcı bulunduktan sonra, denizaltı kablosunun döşenmesine başlanabilir."
 rapanui_transatlantic_cable_start_tt: "[GetPlayer.GetName], en az #G 8#! #V ilerleme#! kaydetti."
 subject_type_rapanui_protectorate: "#O Okyanusal Koruma Bölgesi#!"
 alert_rapanui_pacific_expedition_possible_alert_hint: "Ülkemiz bir [concept_dubois_pacific_expedition] gönderebilir. Göndermek için #V Morgenröte Penceresi#!’ndeki Akademik Genel Bakış’a erişin."
 rapanui.248.t: "Mineraller"
 rapanui.248.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] mürettebatı yolculuk sırasında bazı ham madde açısından zengin kaya oluşumları buldu. Ekip şu anda taşları daha detaylı inceliyor."
 rapanui.248.f: "Danimarka Pasifik seferinde Galathea’da bir jeolog da bulunuyordu: Hinrich Johannes Rink. Özellikle Danimarka’nın kolonileştirdiği Nikobar Adaları’nın coğrafi araştırmalarıyla ilgilenmişti. Beş ay sonra Nikobar Ateşi hastalığına yakalandı ve yaşamının geri kalanını zayıflatacak şekilde Danimarka’ya dönmek zorunda kaldı. Bu nedenle topladığı jeolojik materyallerin çoğu Pasifik veya Hint Okyanusu’nda değil, dönüş yolunda Kahire ve Malta’da toplandı."
 rapanui.248.g: "Mümkün olduğunca çok mineral toplayın."
 rapanui.248.h: "Bu jeolojik alanı daha yakından inceleyin."
 rapanui.249.t: "Garip Bir Topak"
 rapanui.249.d: "Geçen sefer, mürettebat deniz tabanından malzeme toplamak için ağlarını attığında garip bir metal topak çıkardı. Bu açıkça farklı malzemelerin birleşimlerinden oluşuyor. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]’ta bu buluntunun nasıl değerlendirileceği henüz net değil."
 rapanui.249.f: "'Pasifik’in tamamında (...) kırmızı kil bulunur, özellikle de derin suya sahip Kuzey Pasifik’te. Kırmızı kil içinde, sago tanesi veya kanarya tohumu büyüklüğünden çocuğun başı veya portakal büyüklüğüne kadar değişen düğümler vardır ve neredeyse saf mangan peroksitten oluşur. Bunlar büyük miktarlarda bulunur. Trawl (...) mangan etrafında bir çekirdek oluşturan bir balık dişi, biraz sünger veya bir tür fosil içeren kütleleri getirir.' -Charles Wyville Thomson"
 rapanui.249.g: "Parçala ve kaynakları kullan."
 rapanui.249.h: "Dr. [SCOPE.sCharacter('rapanui_scientist').GetLastName] dikkatlice parçalamalı."
 rapanui.249.i: "Bu garip düğüm, bilimsel bir enstitüde incelenmeli ve sergilenmeli."
 rapanui.249.j: "Dr. [SCOPE.sCharacter('rapanui_scientist').GetLastName] bu parçayı hatıra olarak saklamalı ve sonuçlar çıkarmalı."
 rapanui.269.t: "Değerli Bir Taş"
 rapanui.269.d: "Avustralya’da kıyıda izin sırasında, Yardımcı Bilim İnsanı [SCOPE.sCharacter('rapanui_scientist').GetFullName], daha önce az keşfedilmiş bazı masifleri keşfetme fırsatı buldu. Opaller ve kristallerin yanı sıra, [SCOPE.sCharacter('rapanui_scientist').GetSheHe] başka nadir mineraller de buldu."
 rapanui.269.f: "Bugün bile, Avustralya, nadir topraklar, mineraller ve metallerin dünyaya ulaştığı hammadde açısından zengin bir yerdir. Bu nedenle, Dr. [SCOPE.sCharacter('rapanui_scientist').GetLastName]’in henüz koleksiyonuna ekleyemediği nadir bir mineral ile karşılaşması tesadüf değildi."
 rapanui.269.g: "Benim değerlim!"
 rapanui.270.t: "Ateş Halkası"
 rapanui.270.d: "[SCOPE.sCharacter('rapanui_scientist').GetFullName], [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] gemisinde ne kadar uzun süre kalır ve Pasifik Okyanusu’nda ne kadar uzun süre seyahat ederse, bu bölgenin volkanik faaliyetlerle ne kadar yoğun bir şekilde karakterize edildiğinin farkına o kadar çok varıyor. Bu volkanlar deniz kıyıları boyunca bir halka oluşturuyor. Yardımcı Bilim İnsanı, duman püskürten bu kaya canavarlarına yaklaşmayı başardı ve önemli notlar aldı."
 rapanui.270.f: "Pasifik Ateş Halkası, Pasifik Okyanusu’nu üç tarafını çevreleyen bir volkan kuşağıdır. Tüm Holosen dönemindeki volkanik patlamaların yaklaşık üçte ikisi ve dünya genelindeki depremlerin yaklaşık %90’ı bu bölgeye dayandırılabilir. Ateş Halkası, son 11.700 yıl içinde faal olan yaklaşık 850-1.000 volkanı içerir."
 rapanui.270.g: "Pasifik aslında yan bacalarla çevrili tek bir volkanik krater mi?"
 rapanui.203.l: "[SCOPE.sCharacter('dubois_geologist_scope').GetFullName], [concept_agassiz_geologist] için olağanüstü bir fırsat."
 rapanui.280.t: "Garip Bir Kurt"
 rapanui.280.d: "Bir avcı #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')] Expedition#! mürettebatına yaklaştı. Yakaladığı garip bir kurdu getirdi ve satmayı teklif ediyor."
 rapanui.280.f: "\"O canavarlar değerli hayvanlarımızı öldürüyor! Önce onu öldürmek istedim ama sonra geminizi gördüm. İlginizi çekebileceğini düşündüm...\""
 rapanui.280.g: "Böyle egzotik bir hayvan bizim Hayvanat Bahçesi’ne gitmeli!"
 rapanui.280.h: "Onu doğal yaşam alanında gözlemlemeyi tercih ederiz."
 rapanui.280.i: "Hayır, teşekkürler."
 rapanui.502.i: "Bilim insanlarımız başka yerde gerekiyor."
