 elgar.802.t: "Hino desatualizado"
 elgar.802.d: "Após mudanças recentes na lei, o hino nacional anterior não parece mais apropriado. Muitos o interpretam como um remanescente anacrônico de um sistema político passado. A pressão está crescendo para se livrar da bagagem."
 elgar.802.f: "'Temos um almirante sem uma frota. Ele governa um país sem costa. Este é um reino sem rei."
 elgar.802.g: "Este hino não representa mais nosso país."
 elgar.803.t: "Hino reacionário"
 elgar.803.d: "As vozes estão ficando mais altas para cancelar o hino nacional anterior. Os políticos seniores estão pedindo uma nova peça que enfatize mais claramente as realizações do estado moderno que [ROOT.GetCountry.GetNameNoFormatting] representa."
 elgar.803.f: "'Pessoas para a frente, para a Redenção \ Nred Flag, Bandeira Vermelha \ Nforewward Pessoas, em direção à Redenção \ Nred Flag Will Triumph. \ Nred Flag será triunfante, \ Nred Flag será triunfante, a bandeira será triunfante, e a bandeira viva e a liberdade viva'."
 elgar.811.t: "O hino de [ROOT.GetCountry.GetNameNoFormatting]"
 elgar.811.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] aprovou um decreto de que uma peça de música específica deve ser tocada em ocasiões oficiais. A escolha caiu ..."
 elgar.821.t: "Música para [ROOT.GetCountry.GetNameNoFormatting]"
 elgar.821.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] perguntou se havia algum desejo especial sobre a composição a ser escrita e qual aspecto merecia atenção especial."
 elgar.821.f: "Há um total de cinco categorias de hinos nacionais. Os hinos da monarquia melhoram a legitimidade, os hinos folclóricos reduzem a turbulência, os hinos de valor melhoram a lealdade em melhores condições de vida e, ao mesmo tempo, tornam os cidadãos mais resistentes à deterioração, enquanto os hinos militares fortalecem o poder de defesa de uma nação. As repúblicas do conselho podem comissionar hinos dos trabalhadores, que aumentam o poder político dos sindicatos. Dependendo da forma de governo, nem todo hino é possível."
 elgar.821.g: "O hino pretende elogiar nosso monarca."
 elgar.821.h: "Uma música folclórica popular pretende vincular o governo e o povo."
 elgar.821.i: "Hino sublime composea que representa os valores de nosso país."
 elgar.821.j: "Precisamos de uma música que motiva nosso pessoal em batalha!"
 elgar.821.k: "Apenas uma música dos trabalhadores que glorifica o proletariado é aceitável."
 elgar.822.t: "Melodia do hino terminada"
 elgar.822.d: "O Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] apresentou hoje a pontuação para a proposta de [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis] para um possível novo hino nacional. Ainda não está claro se o estado realmente os aceitará."
 elgar.822.f: "Houve numerosos hinos que nunca se tornaram o hino nacional. As razões para isso são variadas. O estado ainda precisa sancioná -los. Além disso, hinos nacionais que têm uma melodia e as letras originais são mais fortes."
 elgar.822.g: "Espero que encontre aceitação entre as pessoas ..."
 elgar.831.t: "Letras do hino terminaram"
