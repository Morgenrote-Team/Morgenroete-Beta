 je_elgar_accademia_santa_cecilia: "Elevar o Santa Cecilia ao posto de academia"
 je_elgar_accademia_santa_cecilia_reason: "A Accademia Di Santa Cecilia foi fundada pelo Bull 'Ratione Parpold' por Sixtus V em 1585 na forma de uma congregação. Em 1838, a congregação de São Cecilia foi oficialmente nomeada academia e depois a Pontific Academy. Seus membros da época incluíam Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod e Meyerbeer. Um de seus membros honorários era a rainha Victoria. Na Itália Unida, se transformou em um conservatório líder."
 je_elgar_leipzig_conservatory: "Encontrou o Conservatório de Leipzig"
 je_elgar_leipzig_conservatory_reason: "A tradicional cidade musical de Leipzig, onde Johann Sebastian Bach já estava ativo, ofereceu condições ideais para a fundação de uma fábrica de talentos musicais e acadêmicos no início do século XIX. Quatro cidadãos comprometidos da cidade, a saber, o advogado Heinrich Conrad Schleinitz (segundo diretor), o diretor distrital de Leipzig Johann Paul von Falkenstein e o vereador do Tribunal Royal Saxon Johann Georg Keil, como o GEWANDHAUS ISEDESTIDA IDIATIDA FELIX FELIX MENDELSHAHT BARTHOLLD BARTHOLLY, PUTHOLDY PULTY PULTYIDY PULHO PUTHOLDY PUTHOLDY PUTHOLDY PULHO PUTHOLDY PUTHOLDY PUTHOLDY MENDOLDYNHON BARTHOLDY MENDOLDYCLYCOLTY PUTHOLDY PUTHOLDY PUTHOLY"
 je_elgar_petrograd_conservatory: "Encontrou o Conservatório de Petrogrado"
 je_elgar_petrograd_conservatory_reason: "Por iniciativa da grande duquesa Elena Pavlovna, Anton Rubinstein, Andrei Nikolayevich Markovich e outras personalidades da sociedade e da vida musical, a Sociedade de Música Russa foi fundada, de cujas classes musicais o primeiro conservatório na Rússia foi fundado. Anton Rubinstein foi o primeiro diretor do Conservatório e professor de piano. O primeiro graduado a completar seus estudos de composição aqui foi Peter Tchaikovsky. Nikolai Andreyevich Rimsky-Korsakov teve um papel particularmente influente como professor de composição e instrumentação e chefe da classe da orquestra."
 elgar.201.t: "O prêmio [SCOPE.sState('elgar_art_capital').GetCityHubName]"
 elgar.201.d: "A elite do nosso país que ama arte está pressionando por um prêmio de artista pelas melhores composições."
 elgar.201.f: "As nações que têm um centro de irracionalismo ou impressionismo organizam competições musicais de tempos em tempos. Os cinco compositores mais qualificados recebem um prêmio que tem algum impacto em sua reputação. Um prêmio de arte geralmente é concedido a cada cinco anos. Grandes compositores não são convidados - eles já receberam sua recompensa."
 elgar.201.g: "Deveríamos organizar uma competição de arte."
 elgar.201.h: "Que desperdício de dinheiro!"
 elgar.202.t: "O prêmio [SCOPE.sState('elgar_art_capital').GetCityHubName]"
 elgar.202.d: "O júri chegou a uma conclusão e selecionou as melhores composições. A lista de cinco vencedores já está fazendo as rodadas."
 elgar.202.f: "1. [SCOPE.sCharacter('elgar_character_first_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_1_global_var').GetCountry.GetName] \ n2.   [SCOPE.sCharacter('elgar_character_second_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_2_global_var').GetCountry.GetName] \ n3.   [SCOPE.sCharacter('elgar_character_third_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_3_global_var').GetCountry.GetName] \ n4.   [SCOPE.sCharacter('elgar_character_fourth_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_4_global_var').GetCountry.GetName] \ n5.   [SCOPE.sCharacter('elgar_character_fifth_winner_scope').GetFullName] de [GetGlobalVariable('elgar_prize_winner_5_global_var').GetCountry.GetName]"
 elgar.202.g: "Conceda os vencedores."
 elgar.1201.t: "Daphnis et chloé"
 elgar.1201.f: "Daphnis et chloé é uma sinfonie chorégraphique, ou sinfonia coreográfica, para orquestra e coro sem palavras. Está em três seções principais, ou partes e uma dúzia de cenas, a maioria das danças e dura menos de uma hora, tornando -o o trabalho mais longo do compositor. Com efeito, é um balé e foi apresentado pela primeira vez como tal. O cenário de dança foi adaptado pelo coreógrafo Michel Fokine de um romance pastoral do escritor grego Longus pensado até o momento do século III dC. Com quase uma hora, Daphnis et Chloé é o trabalho mais longo de Ravel. Quatro leitmotifs discerníveis dão a ele unidade musical. A música, alguns dos mais apaixonados do compositor, é amplamente considerada como alguns de seus melhores, com harmonias extraordinariamente exuberantes típicas do movimento impressionista; Mesmo durante a vida do compositor, os comentaristas o descreveram como sua obra -prima para a orquestra."
 elgar.1202.t: "Rhapsodie Espagnole"
 elgar.1202.f: "Composto entre 1907 e 1908, o Rapsodie é um dos primeiros grandes trabalhos de Ravel para a orquestra. Foi realizado pela primeira vez em Paris em 1908 e rapidamente entrou no repertório internacional. A peça baseia -se na herança espanhola do compositor e é uma das várias de suas obras estabelecidas ou refletindo a Espanha. A estréia do Rapsodie foi dada pelo Orchester des Concerts Colonne, conduzido por Édouard Colonne, no Théâtre du Châtelet em 15 de março de 1908. A recepção crítica era geralmente favorável. As vozes dissidentes eram Pierre Lalo, que habitualmente não gostava da música de Ravel, e Gaston Carraud, que chamou a partitura de \"esbelta, inconsistente e fugitiva\". Caso contrário, houve muitos elogios à orquestração sutil e fresca e pela pitoresca da música."
 elgar.1203.t: "Bolero"
 elgar.1203.f: "'Eu só fiz uma obra -prima, que é o Boléro; Infelizmente, ele não contém música. -Maurice Ravel"
 elgar.1211.t: "Técnica de doze tons"
 elgar.1211.f: "A técnica de doze tons-também conhecida como dodecafonia, serialismo de doze tons e (no uso britânico) da composição de doze notas-é um método de composição musical. A técnica é um meio de garantir que todas as 12 notas da escala cromática sejam soadas com a mesma frequência como uma da outra em uma peça musical, impedindo a ênfase de qualquer nota através do uso de linhas de tom, ordenar as 12 classes de arremesso. Todas as 12 notas recebem mais ou menos importância e a música evita estar em uma chave. Com o tempo, a técnica aumentou muito em popularidade e acabou se tornando amplamente influente nos compositores do século XX. É comumente considerado uma forma de serialismo."
 elgar.1211.g: "Não tenho tanta certeza se foi uma boa ideia."
 elgar.1212.t: "Quartett de cordas no 2."
 elgar.1212.f: "Este trabalho em quatro movimentos foi escrito durante um momento muito emocional na vida de Schoenberg. O terceiro e o quarto movimentos são bastante incomuns para um quarteto de cordas, pois também incluem um cantor de soprano, usando poesia escrita por Stefan George. Ao definir George, o próprio Schoenberg escreveu mais tarde: 'Fui inspirado por poemas de Stefan George, o poeta alemão, para compor músicas a alguns de seus poemas e, surpreendentemente, sem nenhuma expectativa da minha parte, essas músicas mostraram um estilo bem diferente de tudo o que eu havia escrito antes. ... Novos sons foram produzidos, um novo tipo de melodia apareceu, uma nova abordagem para a expressão de humor e personagens foi descoberta."
 elgar.1212.g: "Ótimo! Mas a 'música' pode parar por enquanto?"
 elgar.1213.t: "Sinfonia de Câmara No. 1"
 elgar.1213.f: "A primeira sinfonia de câmara de Schoenberg foi concluída em 1906 e estreou em 8 de fevereiro de 1907 em Viena pelo Quarteto Rosé, juntamente com um conjunto de vento da Filarmônica de Viena, sob o morcego do compositor. Em 1913, Schoenberg novamente conduziu a peça, como parte da famosa Skandalkonzert, na qual as tonalidades heterodoxas da sinfonia de Schoenberg e, mais ainda, dos trabalhos de seu aluno Alban Berg incitaram os participantes a tumultos em protesto e terminam prematuramente o show."
 elgar.1213.g: "Isso nunca vai acabar?"
 elgar.1221.t: "O Firebird"
 elgar.1221.f: "O Firebird é um trabalho de concerto de balé e orquestra baseado nos contos de fadas russos do Firebird e na bênção e maldição que ele possui para seu dono. Os elementos mortais e sobrenaturais do balé são distinguidos com um sistema de leitmotifs colocados na harmonia apelidada de 'leit-harmonia'. Stravinsky intencionalmente usou muitas técnicas especializadas na orquestra, incluindo Ponticello, Col Legno, Flautando, Glissando e Flutter-Tong. Situado no castelo de Koschei do mal imortal, o balé segue o príncipe Ivan, que luta contra Koschei com a ajuda do Magical Firebird."
 elgar.1222.t: "Petrouchka"
 elgar.1222.f: "Petrushka foi escrito para a temporada de Paris de 1911 da empresa de Ballets Russes de Sergei Diaghilev. O balé conta a história dos amores e ciúmes de três fantoches. Os três são trazidos à vida pelo Charlatan durante a Feira de Shrovetide de 1830 (Maslenitsa) em São Petersburgo. Petrushka reúne música, dança e design em um todo unificado. É um dos mais populares das produções Ballets Russes. Geralmente é realizado hoje usando os designs e coreografia originais. O trabalho é caracterizado pelo chamado acorde de petrushka, um dispositivo de bitotonalidade anunciando a aparência do personagem principal."
 elgar.1223.t: "Sacre du Printemps"
 elgar.1223.f: "O Rito da Primavera é um trabalho de concerto de balé e orquestral do compositor russo Igor Stravinsky. Foi escrito para a temporada de Paris de 1913 da Companhia de Ballets de Sergei Diaghilev; A coreografia original foi de Vaslav Nijinsky com desenhos de palco e figurinos de Nicholas Roerich. Quando se apresentou no Théâtre des Champs-Élysées em 29 de maio de 1913, a natureza de vanguarda da música e da coreografia causou uma sensação. Muitos chamaram a reação de primeira noite de 'tumulto' ou 'quase riota', embora essa redação não tenha surgido até as revisões de apresentações posteriores mais de uma década depois. Embora projetado como um trabalho para o palco, com passagens específicas que acompanham personagens e ações, a música alcançou o mesmo reconhecimento, se não maior, como uma peça de concerto e é amplamente considerado uma das obras musicais mais influentes do século XX."
