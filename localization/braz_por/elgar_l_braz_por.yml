 elgar.801.t: "Um hino nacional"
 elgar.801.d: "Com o crescente sentimento nacional entre o nosso povo, o desejo de um hino nacional que representa adequadamente o governante, o país e o povo agora estão crescendo não apenas entre os intelectuais, mas também entre as seções amplas da população comum."
 elgar.801.f: "Mesmo antes de meados do século XIX, havia muitos países na Europa e na América que tocavam certas músicas em ocasiões oficiais, muitas vezes para representar o monarca. Alguns hinos foram codificados desde o início, enquanto outros permaneceram não oficiais até o século XX. Alguns países, portanto, começam com hinos nacionais predeterminados, que podem mudar devido a uma revolução ou mudanças constitucionais. Muitos países, por outro lado, precisam inventar seus hinos nacionais do zero - compositores e escritores podem fornecer ajuda valiosa com isso."
 elgar.801.g: "Vamos cuidar disso mais tarde."
