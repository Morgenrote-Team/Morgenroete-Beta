 elgar.40.t: "Canal Nacional de Transmissão"
 elgar.40.d: "Depois que o governo emitiu uma nova licença para uma emissora hoje, surge a pergunta sobre em qual área se concentrar."
 elgar.40.f: "Uma nova licença com um novo foco pode ser concedida quando a licença antiga expirar após cinco anos."
 elgar.40.g: "Notícias"
 elgar.40.h: "Educação"
 elgar.40.i: "Política do governo"
 elgar.40.j: "O monarca"
 elgar.40.k: "Propaganda"
 elgar.90.g: "Construa a Opera House"
 elgar.90.h: "Deveríamos intensificar os esforços culturais em nossa capital."
 elgar.91.t: "Tivoli Glass Hall"
 elgar.91.d: "Os Tivoli Gardens são extremamente populares com o público de Copenhague há anos. Há um plano para construir uma sala de concertos para cerca de 1.000 pessoas para entreter o público com música estimulante."
 elgar.91.f: "Uma sala de concertos estava entre as atrações quando o Tivoli Gardens abriu suas portas pela primeira vez em 1843. Era um edifício retangular de madeira projetado por Harald Conrad Stilling. Hans Christian Lumbye foi diretor musical e maestro -chefe de 1843 a 1872. Ele escreveu quase 700 composições para a orquestra, especialmente polkas, valses e Galops. A sala de concertos foi expandida por Johan Andreas Stillmann em 1863."
 elgar.91.g: "Espero que o Sr. Lumbye apareça com seus famosos Galops!"
 elgar.92.t: "Gran Teatro Nacional"
 elgar.92.d: "Com o plano de construir uma grande casa de ópera na Cidade do México, o governo está planejando um dos maiores projetos de construção da história do país."
 elgar.92.f: "O teatro foi construído entre 1840 e 1844 pelo arquiteto Lorenzo de la Hidalga, na Cidade do México. Os historiadores consideram isso o trabalho arquitetônico mais importante na Cidade do México entre a conclusão da Catedral Metropolitana e a construção do Palacio de Bellas Artes. O grande teatro nacional foi inaugurado em um dos termos de Antonio López de Santa Anna como presidente. Seu nome mudou sucessivamente, do Great Theatre de Santa Anna ao Great Theatre Vergara, depois do Great Imperial Theatre e, finalmente, ao Great National Theatre. Durante a temporada de ópera de 1852, o teatro estreou 17 óperas e ofereceu mais de 60 apresentações."
 elgar.93.t: "Teatro Amazonas"
 elgar.93.d: "Devido ao boom que a região está experimentando através do cultivo de borracha, Manaus deve receber uma opulenta casa de ópera - no meio da selva!"
 elgar.93.f: "O teatro Amazonas foi construído durante o Belle Époque, em um momento em que fortunas foram feitas no boom de borracha. A construção do teatro da Amazon foi proposta pela primeira vez em 1881 por um membro da Câmara dos Deputados local, Antonio Jose Fernandes Júnior, que imaginou uma 'jóia' no coração da floresta amazônica. O estilo arquitetônico do teatro é considerado tipicamente renascimento renascentista. Os telhas foram importados da Alsácia, as paredes de aço de Glasgow, Escócia e Marrore Carrara para as escadas, estátuas e colunas, da Itália. A cúpula é coberta com 36.000 telhas de cerâmica decoradas pintadas nas cores da bandeira nacional do Brasil. O mobiliário interior veio da França no estilo Louis Quinze. O artista italiano Domenico de Angelis, o jovem, pintou os painéis que decoram os tetos do auditório e da câmara de público."
 elgar.101.t: "Um monumento para Beethoven"
 elgar.101.d: "Após uma ligação do compositor Robert Schumann, vários intelectuais, mas também cidadãos, patriotas e os interessados ​​em arte falaram em favor de erguer um memorial a Ludwig Van Beethoven em Bonn."
 elgar.101.f: "“O mausoléu da memória futura já está à minha frente pessoalmente - um cubóide razoavelmente alto, uma lira nela com o ano de nascimento e morte, o céu acima e algumas árvores ao lado. Uma nação inteira diante de um Beethoven que lhes ensina grandeza e orgulho em todas as páginas, eles não devem ser capazes de montar um monumento mil vezes maior para ele? Se eu fosse um príncipe, construiria um templo no estilo paladiano! Formá -lo de forma gigantesca, como Saint Borromeo no Lago Maggiore, de modo que, como ele fazia na vida, ele pudesse olhar sobre montanha e montanhas - e quando os navios do Reno voam e os estranhos perguntam: o que o gigante significa, então toda criança pode responder: Beethoven é isso - e eles pensam que é um imperador alemão. Em uma palavra: levante -se, solte sua fleuma e considere que o monumento será seu! - Robert Schumann"
 elgar.101.g: "Beethoven era um titã alemão da música!"
 elgar.101.h: "Estamos felizes em financiar este projeto culturalmente valioso."
 elgar.101.i: "Ele não pode ter sido tão bom se não tivesse um monumento antes."
 elgar.102.t: "Preparando o festival de Beethoven"
 elgar.102.d: "Os retoques finais no monumento de Beethoven estão concluídos. Agora é hora de se preparar para a inauguração."
 elgar.102.f: "O festival de Beethoven para a inauguração do monumento de Beethoven foi um grande evento musical de posição internacional. Além do rei prussiano, a rainha britânica Victoria também foi convidada, grandes nomes intelectuais como Alexander von Humboldt estavam entre os convidados e compositores do posto de Hector Berlioz, Giacomo Meyerbeer e, acima de tudo, Franz Liszt moldou os quatro dias. Milhares de pessoas deveriam participar do festival, que apresentava sérios problemas para a pequena cidade de Bonn."
 elgar.102.g: "Envie os convites!"
 elgar.103.t: "Convite para o festival de Beethoven"
 elgar.103.d: "Nosso governo recebeu um convite oficial para o festival de Beethoven em Bonn, onde o monumento do compositor deve ser revelado."
 elgar.103.g: "Teremos prazer em comparecer."
 elgar.103.h: "A música clássica é superestimada."
 elgar.104.t: "Construa o salão de Beethoven"
 elgar.104.d: "Devido ao alto número de visitantes, Franz Liszt propôs homens e materiais desviando o canteiro de obras de Colônia da Catedral para Bonn, a fim de construir um salão de festivais em tempo recorde."
 elgar.104.f: "A inauguração oficial do monumento de Beethoven seria o ponto alto de um festival de 3 dias de Beethoven. Um mês antes do início do festival, não havia um local adequado para manter os 3.000 participantes esperados. Por unidade de Liszt, e somente depois que ele se ofereceu para suportar o custo total, o comitê contratou um arquiteto e construtores para construir o salão de Beethoven. Quando finalmente começaram, eles tiveram menos de duas semanas para fazer isso e tiveram que trabalhar o tempo todo para terminar a tempo. Franz Liszt também falou com os construtores da Catedral de Colônia. A madeira foi carregada de Colônia para Bonn pelo Reno. As decorações feitas em Colônia também chegaram a Bonn tão rapidamente. Em apenas onze dias, um salão de festivais foi criado do nada."
 elgar.104.g: "Esplêndido."
 elgar.105.t: "O festival de Beethoven"
 elgar.105.d: "Após quatro dias de música de primeira classe, o festival de Beethoven pode ser considerado um sucesso completo, mesmo que os eventos dessa magnitude não possam ficar sem seus escândalos."
 elgar.105.f: "A cerimônia não ficou sem seus momentos desajeitados. O monumento de Beethoven deu as costas aos convidados mais importantes, o rei Frederick William IV da Prússia e a rainha britânica Victoria, que haviam tomado seus lugares na varanda do Palácio Fürstenberg. Alexander von Humboldt salvou o dia, observando que Beethoven sempre foi um sujeito rude. Ainda mais embaraçoso foi o fato de que, durante as torradas no banquete do festival no 'Goldene Stern', Liszt desprezou o contingente francês liderado por Berlioz e quase causou um tumulto. O banquete foi interrompido pelo comportamento de Lola Montez, que dançou em uma mesa e envergonhou Liszt, insistindo que ela era seu convidado nas celebrações e exigindo um assento apropriado ao seu status reivindicado, perturbando assim um acordo de assentos pré-organizado."
 elgar.105.g: "Beethoven vira as costas para nós?"
 elgar.105.h: "Alexander von Humboldt é um cavalheiro."
 elgar.105.i: "Esses alemães não têm elegância."
 elgar.105.j: "Isso foi inspirador."
 elgar.106.t: "Liszt Cantata"
 elgar.106.d: "Franz Liszt teve a grande honra de escrever e executar publicamente a cantata para a inauguração do monumento de Beethoven."
 elgar.106.f: "- Seja como for, sua cantata, realmente bem realizada e aplaudida calorosamente por três quartos e meio do salão, é uma coisa ótima e bonita, que ao mesmo tempo eleva Liszt muito altamente entre os compositores. A expressão é verdadeira, a entonação, o estilo sublime e o novo, a forma bem concebida e executada obedientemente, a instrumentação notável por seu vigor e variedade. Nunca há uma sucessão dos mesmos sons em sua orquestra, que torna certas obras, uma vez valorizadas, tão cansativas para o ouvinte; Ele sabe como usar os meios pequenos e grandes, ele exige nem os instrumentos nem as vozes; Em uma palavra, ele mostrou de uma só vez que tinha estilo de instrumentação e nas outras partes da arte musical, já que se temia que ele ainda não o encontrava. - Hector Berlioz"
 elgar.106.g: "Saudação! Saudação! Beethoven, Salve!"
 elgar.107.t: "Berlioz no festival de Beethoven"
 elgar.107.d: "As celebrações em torno da inauguração do monumento de Beethoven deram ao compositor Hector Belrioz uma inspiração considerável."
 elgar.107.f: "Foi durante esta viagem à Áustria, Hungria, Boêmia e Silésia que comecei a compor minha lenda de Faust, cujo plano eu estava pensando há muito tempo. Assim que decidi empreendê -lo, tive que me contentar em escrever a maior parte do libreto também; Os fragmentos da tradução francesa de Goethe, de Gérard de Nertal, que eu já havia preparado para música vinte anos antes, e que pretendia incluir na nova pontuação em uma versão revisada e duas ou três outras cenas que haviam sido escritas antes da minha partida de Paris por M. Gandonnière. Durante a jornada no antigo treinador alemão, tentei escrever os versos destinados à minha música. Comecei com a invocação de Faust para a natureza, sem tentar traduzir ou mesmo imitar a obra -prima de Goethe, mas apenas para se inspirar nela e extrair a substância musical que ela continha. Depois que comecei, escrevi os versos restantes quando as idéias musicais chegaram a mim, e compus a pontuação com uma facilidade que raramente experimentei com meus outros trabalhos. ' - Hector Berlioz"
 elgar.107.g: "Então, a viagem valeu a pena?"
 elgar.108.t: "Victoria visita a Catedral de Colônia"
 elgar.108.d: "A rainha da Grã -Bretanha Victoria usou sua estadia na Renânia como uma oportunidade de visitar a Catedral de Colônia e descobrir mais sobre a construção da catedral que acabou de começar."
 elgar.108.f: "A partida inicial da Companhia Real do show foi devido ao fato de que, à tarde, houve um passeio pela Catedral de Colônia, que ocorreu no toque festivo dos sinos. Os Majestades seguiram pela entrada principal da nave central para o coral, na qual uma cantata comemorativa estava sendo realizada pela Sociedade Coral de Colônia com o acompanhamento do órgão do diretor musical Weber."
 elgar.108.g: "Somos honrados."
 elgar.111.t: "Um monumento para Mozart"
 elgar.111.d: "Os preparativos para erguer um monumento a Wolfgang Amadeus Mozart estão em pleno andamento. No entanto, as doações ainda estão sendo coletadas."
 elgar.111.f: "Em 1835, o escritor Julius Schilling, que veio de Posen no que hoje é a Polônia, sugeriu um memorial sobre o que hoje é Mozartplatz para Mozart, que era relativamente desconhecido em Salzburgo na época. Patrocinadores significativos no exterior, mas também em Viena finalmente apoiaram a construção do monumento. O rei da Baviera Ludwig I, da Baviera, doou uma quantia considerável e doou a base da estátua de bronze."
 elgar.111.g: "Mozart era um titã alemão da música!"
 elgar.113.t: "O Monumento Mozart"
 elgar.113.d: "Today the memorial for Salzburg's greatest son was unveiled in his birthplace."
 elgar.113.f: "Projetado por Ludwig Schwanthaler e fundido por Johann Baptist Stiglmaier, o monumento foi cerimonialmente revelado em 5 de setembro de 1842 na presença de dois filhos sobreviventes de Mozart, Franz Xaver e Carl Thomas. No entanto, a viúva de Mozart não conseguiu ver a inauguração. Ela havia morrido pouco antes na casa em Mozartplatz 8. Um festival com uma procissão de tochas, viagens de barco, trens alpinos, tiro de alvo e corridas de cavalos emoldurou a celebração."
 elgar.114.t: "Um memorial vivo"
 elgar.114.d: "Os esforços para erguer um monumento a Mozart estão aumentando na Áustria. Alguns cidadãos de Frankfurt, portanto, desejam organizar um concerto beneficente - e vincular a idéia ao conteúdo político."
 elgar.114.f: "Originalmente, a cidadania de Frankfurt queria organizar um concerto para coletar doações suficientes para um monumento de Mozart. Monumentos para as personalidades burguesas eram uma novidade na Alemanha. A construção de monumentos em homenagem a figuras nacionais, como artistas ou cientistas, foi, portanto, uma oportunidade bem -vinda de expressar sentimentos patrióticos. Alguns em Frankfurt sugerem a organização de uma reunião nacional de cantores, cujos recursos devem fluir para uma base para os músicos alemães promoverem jovens músicos."
 elgar.114.g: "Colete dinheiro para o nosso próprio memorial de vida - um festival em homenagem a Mozart!"
 elgar.114.h: "Doe dinheiro para o monumento em Salzburgo."
 elgar.115.t: "Convite para o Sängerfest"
 elgar.115.d: "A cidadania de Frankfurt convidou cantores patrióticos de nossa nação para participar de um festival de Mozart."
 elgar.115.g: "Uma oportunidade musical e nacional."
 elgar.115.h: "Eu simplesmente não suporto músicas de arte."
 elgar.116.t: "O Festival Mozart"
 elgar.116.d: "42 Sociedades Corais da Renânia, Baden, Hessen e Franconia se conheceram em Frankfurt para celebrar um festival de três dias da música de Mozart. O evento se transformou em uma demonstração para a unificação política da Alemanha, no entanto. O dinheiro arrecadado foi arrecadado para uma fundação para apoiar jovens compositores."
 elgar.116.f: "A cidade entrou em êxtase. As casas estavam cheias de pessoas até as clarabóias. O povo de Mainz, Hanau e Offenbach vieram de barco ao som de tiros de canhão, cercados por barcos decorados com música; Através de todos os portões que eles entraram. Era uma visão poderosamente em movimento, o interesse artístico se tornou secundário, mas o nacional nos abordou poderosamente; Não vou negar que lágrimas brilhantes escorrerem pelas minhas bochechas. - Heinrich Hoffmann"
 elgar.116.g: "A música une a nação."
 elgar.117.t: "Treblemakers liberais fazem barulho em Frankfurt"
 elgar.117.d: "Não escapou do nosso aviso de que alguns 'patriotas' de Jacobin exploraram um suposto festival de Mozart em Frankfurt por sua agitação política."
 elgar.117.f: "42 Sociedades Corais da Renânia, Baden, Hessen e Franconia se conheceram em Frankfurt para celebrar um festival de três dias da música de Mozart. O evento se transformou em uma demonstração para a unificação política da Alemanha, no entanto. O evento foi originalmente baseado no financiamento do monumento Mozart, mas os iniciadores logo mudaram o objetivo da caridade em favor de sua própria fundação."
 elgar.117.g: "Uma conspiração contra a ordem na Confederação Alemã!"
 elgar.117.h: "Deixe -os cantar."
 elgar.121.t: "A fundação da Associação Geral de Música Alemã"
 elgar.121.d: "Hoje, o AllgeMeiner Deutscher Musikverein (Geral Aleman Music Association) foi fundado em [SCOPE.sState('elgar_musikverein_capital').GetCityHubName]. Surgiu imediatamente uma discussão sobre se pertencemos à nova escola alemã ou se defendemos a idéia conservadora da música."
 elgar.121.f: "A nova escola alemã é um termo introduzido em 1859 por Franz Brendel, editor do Neue Zeitung Für Musik, para descrever certas tendências na música alemã. Foi usado por pessoas diferentes em momentos diferentes com significados diferentes. É geralmente concordado que Franz Liszt e Richard Wagner estavam entre os representantes mais proeminentes da 'nova escola alemã'. Há também um consenso de que Johannes Brahms não participou. Além disso, as interpretações diferem. O novo termo deve ser entendido como denotando todo o período desde a morte de Beethoven. Segundo Brendel, era comum o uso de chamar o período de J.S. Bach e Handel 'antiga escola alemã'. O período subsequente foi o de mestres vienenses como Mozart, que haviam sido influenciados pelo estilo italiano. Beethoven havia redirecionado o interesse para o norte alemão novamente e com isso abriu o 'Neudeutsche Schule'. Os compositores de ambos os lados olharam para Beethoven como seu herói espiritual e artístico; Os conservadores o veem como um pico insuperável, os progressistas como um novo começo na música."
 elgar.121.g: "Fazemos parte da nova escola alemã."
 elgar.121.h: "Defendemos a escola tradicional alemã."
 elgar.122.t: "Associação da Associação Geral de Música Alemã"
 elgar.122.d: "Artistas de nossa nação foram convidados para a recém -fundada Associação Geral de Música Alemã. Surgiu imediatamente uma discussão sobre se pertencemos à nova escola alemã ou se defendemos a idéia conservadora da música."
 elgar.123.t: "Localização do próximo congresso do músico"
 elgar.123.d: "Os membros da Associação Geral de Música Alemã escolheram [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] como o local para a próxima reunião do Tonkünstler-Versammlung (Congresso do Músico)."
 elgar.123.f: "Em 1859, a primeira reunião de Tonkünstler ocorreu por ocasião do 25º aniversário da nova revista para música em Leipzig. Durante a segunda reunião de Tonkunstler (1861) em Weimar, os Estatutos da Associação Geral de Música Alemã (ADMV) foram adotados por mais de 700 membros fundadores. A nova revista de música se tornou o órgão da associação. No final do século XIX, o ADMV estava sob o protetorado do Grande Duque de Weimar. O ADMV realizou várias grandes reuniões de Tonkunstler. Ele se orientou principalmente para a direção da nova escola alemã representada por Franz Liszt e Richard Wagner. Como parte dos objetivos artísticos do ADMV, as reuniões anuais de Tonkünstler em diferentes locais deveriam ser organizadas, com performances de obras musicais importantes, raramente ouvidas e especialmente novas de todos os tipos. No entanto, trabalhos mais antigos que raramente eram ou não ouvidos, mas de interesse por causa de sua importância, também deveriam ser realizados. Além disso, novos trabalhos, musicais ou acadêmicos, deveriam ser impressos."
 elgar.123.g: "Somos honrados!"
 elgar.124.t: "Congresso do músico em [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]"
 elgar.124.d: "O Tonkünstler-Versammlung deste ano (Congresso do Músico) ocorrerá em [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]. Nossos artistas são cordialmente convidados a discutir música e ouvir a performance de novas e esquecidas peças de música."
 elgar.124.g: "Vamos aproveitar a música e ouvir as contribuições de pessoas com idéias semelhantes."
 elgar.124.h: "Apenas o lugar certo para distribuir esses diletentes musicais."
 elgar.124.i: "Este será o dia da verdade - nossa idéia de música é a única certa!"
 elgar.125.t: "Guerra dos Românticos"
 elgar.125.d: "Uma disputa entre representantes da nova escola alemã e os representantes mais conservadores levou a um escândalo público. Uma guerra completa entre as duas facções já está furiosa na imprensa. É hora de [ROOT.GetCountry.GetName] ficar atrás de seus artistas."
 elgar.125.f: "A 'guerra dos românticos' é um termo usado por alguns historiadores da música para descrever o cisma entre músicos de destaque na segunda metade do século XIX. A estrutura musical, os limites da harmonia cromática e a música do programa versus a música absoluta foram as principais áreas de discórdia. Os partidos adversários cristalizaram durante a década de 1850. Os membros mais proeminentes do Círculo Conservador foram Johannes Brahms, Joseph Joachim, Clara Schumann e o Conservatório de Leipzig, fundado por Felix Mendelssohn. Seus oponentes, os progressistas radicais principalmente de Weimar, foram representados por Franz Liszt e pelos membros da chamada nova escola alemã (alemão: Neudeutsche Schule) e por Richard Wagner. A controvérsia era de origem alemã e da Europa Central; Músicos da França, Itália e Rússia estavam apenas marginalmente envolvidos. Os compositores de ambos os lados olharam para Beethoven como seu herói espiritual e artístico; Os conservadores o veem como um pico insuperável, os progressistas como um novo começo na música."
 elgar.125.g: "Apoie a nova escola alemã!"
 elgar.125.h: "Apoie a escola tradicional alemã!"
 elgar.126.t_konservativ: "Os conservadores vencem a 'guerra dos românticos'"
 elgar.126.d_konservativ: "A esmagadora maioria dos seguidores da escola tradicional venceu a disputa sobre o futuro da música. Se o conteúdo está correto é de importância secundária: a massa de contribuições para debates e polêmicas determina a imagem pública."
 elgar.126.f_konservativ: "Um ponto central de desacordo entre esses dois grupos de músicos era entre formas tradicionais e novas musicais. Foi uma conseqüência do debate sobre a viabilidade do gênero Symphony, que havia crescido nas mãos de Ludwig Van Beethoven, de um destinado a entretenimento a uma forma que incluía ideais sociais, morais e culturais. Liszt e seu círculo favoreceram novos estilos em escrita e formas que misturariam música com idéias narrativas e pictóricas. Para esse fim, Liszt desenvolveu o poema sinfônico. A Escola Leipzig/Berlin defendeu os formulários usados ​​pelos mestres clássicos, formas codificadas por musicólogos como Adolf Bernhard Marx do início do século XIX. A validade da música do programa também foi um ponto de discórdia. Em seu livro de 1854, Vom Musikalisch-Schönen, Hanslick afirmou que a música não fazia e não poderia representar nada específico que não seja. \ n \ n no final, #G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#! Os membros apoiaram a nova escola alemã e #R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#! membros apoiaram a escola tradicional."
 elgar.126.g: "A escola tradicional é triunfante."
 elgar.126.t_neudeutsch: "Progressistas vencem a 'guerra dos românticos'"
 elgar.126.d_neudeutsch: "A esmagadora maioria dos seguidores da nova escola alemã ganhou a disputa sobre o futuro da música. Se o conteúdo está correto é de importância secundária: a massa de contribuições para debates e polêmicas determina a imagem pública."
 elgar.126.f_neudeutsch: ""
 elgar.126.h: "A nova escola alemã é triunfante."
 elgar.131.t: "Franz Liszt começa sua turnê européia"
 elgar.131.d: "Depois de um tempo bastante infeliz em Paris, Franz Liszt decidiu realizar uma turnê após o exemplo de seu rival Thalberg e se tornar um músico celebrado internacionalmente. Seu primeiro destino será [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]."
 elgar.131.f: "Franz Liszt era compositor, pianista, condutor, diretor de teatro austro-húngaro. Liszt foi um dos virtuosos de piano mais proeminentes e influentes e, com uma obra de mais de 1300 obras e arranjos, um dos compositores mais produtivos do século XIX. Embora grande parte de sua obra possa ser atribuída à literatura sobre piano, Liszt também deu um impulso claro à música orquestral com o desenvolvimento do poema sinfônico. Seu conceito de música do programa e o uso de novos meios harmônicos e formais o fizeram - junto com Richard Wagner - o protagonista mais conhecido da nova escola alemã. Liszt iniciou uma extensa turnê pela Europa em 1839, que continuou pelos oito anos seguintes. Esse período foi mais brilhante de Liszt como pianista de concertos e ele recebeu muitas honras e muita adulação durante seus passeios. Durante esse período, apareceram os primeiros relatos de respostas intensas dos fãs de Liszt, que se tornaram referidos como Lisztomania. Lisztomania foi caracterizada por uma reação histérica a Liszt e seus shows. O jogo de Liszt foi relatado para elevar o humor da platéia a um nível de êxtase místico."
 elgar.131.g: "Desejamos a ele tudo de bom."
 elgar.132.t: "Lisztomania em [ROOT.GetCountry.GetNameNoFlag]"
 elgar.132.d: "O pianista mundialmente famoso Franz Liszt escolheu nosso país como o próximo destino de sua turnê européia. Os teatros e casas de ópera já estão totalmente reservados!"
 elgar.132.g: "De onde vêm todas essas mulheres gritando de repente?"
 elgar.133.t: "Liszt sai"
 elgar.133.d: "Liszt terminou sua estadia e agradeceu pela hospitalidade. Lisztomania continuará em [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]."
 elgar.133.f: "Estima -se que Liszt apareceu em público bem mais de mil vezes entre 1839 e 1847. Além disso, sua grande fama como pianista, que ele continuaria a desfrutar muito depois de se aposentar oficialmente do palco do concerto, foi baseado principalmente em suas realizações durante esse tempo. Além de sua reputação, Liszt doou grande parte do produto de seu trabalho a caridade e causas humanitárias. Ele doou grandes somas para o fundo de construção da Catedral de Colônia, e a Basílica de St. Stephen em Pest, e fez doações particulares para serviços públicos, como hospitais e escolas, além de organizações de caridade como o Fundo de Pensões de Músicos Leipzig. Após o grande incêndio de Hamburgo em maio de 1842, ele fez shows em auxílio aos sem -teto deixados. Para satisfazer a necessidade de seus admiradores de seus cabelos, Liszt adquiriu um cachorro cujo pêlo servido despercebido como fonte de cachos."
 elgar.301.t: "Bons ensaios"
 elgar.301.d: "Os ensaios da orquestra, conduzidos por um compositor itinerante, foram muito promissores."
 elgar.301.f: "Um compositor itinerante conquistou a orquestra como condutor e já impressionou com os ensaios!"
 elgar.301.g: "Multar."
 elgar.302.t: "Ensaios medíocres"
 elgar.302.d: "Infelizmente, os ensaios da orquestra conduzidos por um compositor itinerante não eram tão bons quanto a sala de concertos esperava ..."
 elgar.302.f: "Seja devido a colegas não cooperativos, artistas mal preparados ou as condições na sala de concertos - os ensaios não são um bom presságio para a apresentação."
 elgar.302.g: "Não está bem."
 elgar.303.t: "Uma dedicação amorosa"
 elgar.303.d: "Um caso por uma cortesia 'pequena' desperta os ivreiros."
 elgar.303.f: "Os artistas sempre foram conhecidos por seu \"estilo de vida solto\" e causaram um ou dois escândalos interpessoais. A atenção repousa em um pequeno gesto, que, no entanto, tem poder explosivo. Um compositor itinerante dedicou uma sonata a uma senhora casada e deu a ela a pontuação original como presente. No entanto, a mulher é a esposa de um general altamente respeitado em nosso exército. O presente provocou especulações e poderia danificar a imagem pública do homem. As militares exigem ação."
 elgar.303.g: "Eu não vejo o problema?"
 elgar.303.h: "Ultrajante!"
 elgar.304.t: "Uma recepção noturna"
 elgar.304.d: "Nosso monarca convidou um compositor itinerante para uma recepção principesca. O compositor mostrou sua gratidão com uma composição."
 elgar.304.f: "Embora a cultura musical no século XIX tenha procurado cada vez mais se libertar do patrocínio, nobres e reis ainda estavam na vanguarda do patrocínio das artes, e muitas obras musicais ainda eram dedicadas a príncipes e reis. Por outro lado, o relacionamento pessoal geralmente significava que os compositores que foram excluídos de academias e círculos de arte conseguiram encontrar apoio de um patrono rico se se adequassem ao seu gosto pessoal. Uma série inteira de obras -primas de Wagner, por exemplo, não teria sido possível sem o apoio pessoal do rei Ludwig II da Baviera."
 elgar.304.g: "Que bela surpresa!"
 elgar.305.t: "Vendido!"
 elgar.305.d: "Uma fila sobre uma performance esgotada de um grande compositor provocou um clamor público!"
 elgar.305.f: "No dia de uma estréia, uma grande multidão se reuniu com expectativa em frente à Opera House, que havia sido esgotada por dias; Até o compositor que apareceu só poderia obter um ingresso no mercado negro. No entanto, como um funcionário de teatro vendeu ingressos adicionais, os ingressos vendidos excederam em muito o número de assentos. Havia cenas tumultuadas em e em frente ao teatro em que a música estava quase completamente perdida; Aqueles do lado de fora gritaram para serem deixados entrar, os que estavam lá dentro gritaram em silêncio. Os refrões de abertura ainda podiam ser realizados, mas a orquestra desistiu, que foi quando a raquete realmente começou."
 elgar.305.g: "Quem é responsável por isso?!"
 elgar.306.t: "Estreia surpreendente"
 elgar.306.d: "O trabalho de um compositor que falhou em seu país de origem capturou o coração do nosso público."
 elgar.306.f: "Sempre houve casos em que a estréia de obras famosas falhou. Tais experiências geralmente levavam não apenas a uma dúvida séria e ao fim de uma carreira, mas também a uma tentativa de executar a mesma jogada para um público diferente. Os clássicos posteriores geralmente apenas prevaleciam na segunda ou terceira tentativa. Não é o lugar da estréia, mas o local de sucesso foi lembrado como a faísca inicial real. Hector Berlioz é um exemplo de um compositor que teve maior sucesso com suas obras na Grã -Bretanha e na Alemanha do que em casa na França."
 elgar.306.g: "Nosso público é mais grato."
 elgar.307.t: "Amizade musical"
 elgar.307.d: "Um compositor itinerante se deu bem com seus colegas músicos no local imediatamente."
 elgar.307.f: "O relacionamento entre músicos estrangeiros e residentes nem sempre era fácil. Não era apenas ressentimento nacional e preconceito pessoal. Algumas orquestras não podiam trabalhar com o estilo condutor de um condutor convidado, às vezes a natureza de curto prazo das performances exigia compromissos, para os quais o hóspede, por sua vez, culpou o mundo da música local. Muitos compositores ou condutores locais também temiam que a influência de estrangeiros fosse muito grande. No entanto, apesar de todos esses obstáculos, as amizades continuaram a crescer."
 elgar.307.g: "A fruitful friendship."
 elgar.308.t: "Rivalidade musical"
 elgar.308.d: "O mundo da música local vê a aparência de um compositor itinerante com ressentimento e suspeita."
 elgar.308.f: "'Duas ótimas obras para a ópera, mais duas para o Renascença, mais duas para a Opera-Compomique, e mais uma para o teatro Italien? Parece que Monsieur Donizetti nos trata como um país conquistado, é uma invasão real. Não se pode mais falar das casas de ópera de Paris, mas apenas das casas de ópera de Monsieur Donizetti. - Hector Berlioz"
 elgar.308.g: "Esses músicos devem se unir!"
 elgar.309.t: "Inspirações"
 elgar.309.d: "Um compositor estrangeiro inspirou os membros da Orquestra do Estado."
 elgar.309.f: "A influência externa muitas vezes fez a diferença no mundo da música local e nacional. Peças desconhecidas, uma língua musical estrangeira ou a aparência de um músico carismático muitas vezes poderia levar os músicos locais a obter uma perspectiva completamente nova."
 elgar.309.g: "Inspiração? Eu quero ver os resultados!"
 elgar.309.h: "Isso terá um efeito positivo na orquestra."
 elgar.310.t: "Mania"
 elgar.310.d: "A aparência de um compositor levou a um entusiasmo público sem precedentes e quase histéricos por seu trabalho. As pessoas não têm mais nada em mente!"
 elgar.310.f: "'Quando anteriormente eu ouvi falar dos feitiços desmaiados que eclodiam na Alemanha e especialmente em Berlim, quando Liszt se mostrou lá, dei de ombros com pouco e pensei: a silenciosa Alemanha Sabatária não deseja perder a oportunidade de que o pequeno exercício seja permitido ... Em seu caso, pensei que eu sou uma questão de espetáculo para o Espolhe As condições politicamente não fortes existentes além do Reno. No entanto, eu estava enganado, afinal, e não notei até a semana passada, na Ópera italiana, onde Liszt deu seu primeiro concerto ... Isso realmente não era um público berlinate sentimental e realmente sentimental, antes do qual Liszt tocou, muito sozinho, ou melhor, acompanhado apenas por seu gênio. E, no entanto, como convulsivamente sua mera aparência os afetou! Quão barulhento foi o aplauso que tocou para conhecê -lo! ... o que foi aclamado! Uma verdadeira insanidade, inédito nos anais de Furore! - Heinrich Heine"
 elgar.310.g: "Então, eles estão completamente distraídos?"
 elgar.311.t: "A música une pessoas"
 elgar.311.d: "Um embaixador pergunta se podemos conseguir um ingresso para um concerto de um compositor que fica conosco."
 elgar.311.f: "O embaixador de um grande poder é um amante de um compositor que está viajando que atualmente está visitando nosso país. Ele gostaria de participar de uma apresentação, mas não há mais assentos disponíveis. Ele, portanto, nos pediu para usar nossa influência política para que ele ainda pudesse participar da apresentação."
 elgar.311.g: "Haha. Não."
 elgar.311.h: "Dê a ele orgulho de lugar."
 elgar.312.t: "Tentativa de assassinato na ópera!"
 elgar.312.d: "Uma terrível tentativa de assassinato a um político líder em nosso país ofuscou a apresentação de ópera de hoje!"
 elgar.312.f: "Por algum tempo, a falta de legitimidade em nosso governo causou insatisfação entre a população. Um assassino sorrateiro aproveitou o concerto de um compositor popular para filmar um funcionário do governo de alto escalão durante a apresentação. [SCOPE.sCharacter('elgar_leader_victim').GetFullName] ficou gravemente ferido. O agressor ainda está fugindo, a vítima lesionada com risco de vida foi imediatamente levada para o hospital mais próximo."
 elgar.312.g: "Onde estavam as forças de segurança?!"
 elgar.313.t: "Um trabalho menor"
 elgar.313.d: "Um pequeno trabalho composto pelo grande compositor em nosso país pode não ser um grande sucesso, mas encontrou seus fãs."
 elgar.313.f: "Trabalhos ocasionais de compositores criados à parte das famosas obras não precisavam ser de qualidade média ao mesmo tempo. Uma e outra vez, pequenos pedaços conseguiram atrair mais atenção do que muitas obras de uma vida. Apesar de sua riqueza de trabalho, Nikolai Rimsky -Korsakov é famoso na cultura pop pelo 'Flight of the Bumblebee' (de Tsar Saltan) e Edvard Grieg para 'In The Hall of the Mountain King' (do par Gynt) - erroneamente, mas um sucesso musical é um sucesso musical."
 elgar.313.g: "Às vezes são as pequenas coisas que trazem alegria."
 elgar.314.t: "Sem inspiração"
 elgar.314.d: "Decepcionantemente, nosso convidado encontra ficar em nosso país completamente pouco inspirador."
 elgar.314.f: "Às vezes simplesmente não funciona."
 elgar.314.g: "Deprimente."
 elgar.315.t: "Concerto privado"
 elgar.315.d: "Além das apresentações oficiais, nosso compositor deu um concerto particular em um pequeno círculo."
 elgar.315.f: "Pequenos shows particulares de grandes compositores têm uma longa tradição. O mais famoso por isso é Franz Schubert com os Schubertiades com o nome dele. Na primeira Schubertiades, Franz Schubert tocou o piano, e os baritones Johann Michael Vogl e mais tarde Carl Von Schönstein cantaram suas músicas. As noites também incluíam leituras e jogos de entretenimento espirituosos, que geralmente tinham um tema específico. Estas eram uma mistura de reuniões amigáveis ​​e salão musical literário."
 elgar.315.g: "Isso foi bom."
 elgar.315.h: "Da Capo!"
 elgar.316.t: "Um aluno talentoso"
 elgar.316.d: "O grande compositor em nosso país descobriu o talento de um dos líderes políticos de nosso país e considerou instruí -lo em sua arte de composição."
 elgar.316.f: "Pode -se surpreender que os políticos sejam capazes de talentos artísticos, e que, como pessoas más, não deveriam, em princípio, ser completamente insensíveis a qualquer arte musical. Certamente havia compositores com ambições políticas, mas muito menos políticos com ambições musicais. Tudo o que pode ser possuído por esse político, talvez sua alma não esteja irremediavelmente perdida, afinal."
 elgar.316.g: "Um candidato promissor."
 elgar.316.h: "Sua energia é melhor gasta em outro lugar."
 elgar.317.t: "Desastre musical"
 elgar.317.d: "Uma performance em uma de nossas salas de concertos pode ser uma das maiores falhas em nossa história da música."
 elgar.317.f: "A orquestra não estava preparada, o solista pegou um resfriado, o condutor não estava descansado e o compositor, em cuja presença a performance ocorreu, está ameaçando cancelar nosso país em sua próxima turnê. Não há outra maneira de descrevê -lo além de um desastre!"
 elgar.317.g: "Uma desgraça internacional!"
 elgar.318.t: "Concerto de escândalo"
 elgar.318.d: "Um concerto escandaloso, que simplesmente colocou o público em armas com seus sons \"modernos\", não apenas divide a sociedade, mas também tem consequências legais."
 elgar.318.f: "Pressione os relatórios da época falam de tumultos tumultuados. Os seguidores do compositor, seus alunos e oponentes gritaram um para o outro, jogaram um para o outro, interromperam o desempenho, destruíram os móveis etc. Várias vezes, os conservadores indignados da platéia subiram o palco para dar um tapa no condutor. Quando ele ameaçou que a ordem seria criada com a ajuda da autoridade pública, diz -se que o tumulto realmente começou. Então houve um tapa na cara. Na sequência judicial subsequente, um compositor de opereta que esteve presente afirmou: o bate -papo dos tapas 'era a coisa mais melodiosa que se podia ouvir naquela noite'."
 elgar.318.g: "A multidão não tem senso de cultura. Isso foi excelente!"
 elgar.318.h: "Remova a peça da placa imediatamente."
 elgar.319.t: "Zeitgeist"
 elgar.319.d: "A peça moderna, que um grande compositor conduziu pessoalmente hoje, atinge exatamente o sabor das massas."
 elgar.319.f: "Às vezes você só tem que ter sorte."
 elgar.319.g: "Excelente!"
 elgar.320.t: "Propaganda musical"
 elgar.320.d: "Alguns políticos do governo estão considerando se a música do compositor que está atualmente fica conosco pode ser ... emprestado para fins de propaganda."
 elgar.320.f: "Especialmente desde o início do século XX e a sociedade de massa que produziu os regimes totalitários da época, a idéia de fazer as massas dócil através da música prevaleceu. Enquanto alguns músicos resistiram à ditadura, mesmo nesses tempos, havia outros que colocaram seu trabalho diretamente a serviço de uma ideologia, ou pelo menos permitiram que seu talento fosse colocado a serviço de uma direção política."
 elgar.320.g: "A música deve estar livre de política."
 elgar.320.h: "Às vezes, a música deve servir política."
 elgar.321.t: "Grandes compositores entre si"
 elgar.321.d: "Nosso convidado musical conheceu um grande compositor empregado por nosso país. Em conversas e caminhadas de uma hora, eles trocaram pensamentos e idéias musicais."
 elgar.321.f: "Grandes mentes pensam da mesma forma."
 elgar.321.g: "Uma reunião histórica."
 elgar.406.t: "A morte do maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]"
 elgar.406.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], a principal autoridade musical de §1, morreu inesperadamente hoje. O mundo da música lamenta essa grande perda."
 elgar.406.f: "“Enquanto estamos aqui no túmulo deste falecido, somos, por assim dizer, os representantes de uma nação inteira, lamentando a queda da metade altamente célebre do que nos restava do esplendor desaparecido da arte nativa e do florescimento intelectual patriótico. O herdeiro e o expansor de Handel e Bach, da fama imortal de Haydn e Mozart, viveu sua vida, e estamos chorando com a corda quebrada da peça desbotada. \ Nof The Faded Play! Deixe -me chamá -lo assim! Pois ele era um artista, e o que ele era, ele era apenas através da arte. -Franz GrillParzer"
 elgar.406.g: "Mas quem deve escrever para lá agora?"
 elgar.411.t: "Excelente concerto"
 elgar.411.d: "A temporada de concertos liderada por nosso condutor [SCOPE.sCharacter('elgar_conductor').GetFullName] excedeu em muito as expectativas!"
 elgar.411.f: "\"O público deve ser rigoroso, se asso, mas os aplausos deles não devem me comprometer com nada.\" - Giuseppe Verdi"
 elgar.411.g: "Bravo!"
 elgar.412.t: "Concerto medíocre"
 elgar.412.d: "A temporada de concertos sob a liderança de nosso condutor [SCOPE.sCharacter('elgar_conductor').GetFullName] está prosseguindo como de costume. Até agora, não houve momentos excelentes."
 elgar.412.f: "\"Não se deve se considerar tão divino que não se pode ocasionalmente melhorar as próprias obras.\" - Ludwig Van Beethoven"
 elgar.412.g: "*bocejar*"
 elgar.413.t: "Concerto ruim"
 elgar.413.d: "A temporada de concertos até agora não estava apenas abaixo da média; As performances de nosso condutor [SCOPE.sCharacter('elgar_conductor').GetFullName] são consideradas particularmente decepcionantes este ano. O público nem pede um bis ..."
 elgar.413.f: "\"Após as últimas notas de Gotterdammerung, senti como se tivesse sido deixado de sair da prisão.\" - PJOTR TCHAIKOVSKY"
 elgar.413.g: "Boooo!"
 elgar.414.t: "Um embaixador na platéia"
 elgar.414.f: "\"O prelúdio de Tristan e Isolde me lembra a antiga pintura italiana de um mártir cujo intestino está lentamente desenrolado de seu corpo em um carretel.\" - Eduard Hanslick"
 elgar.414.g: "O homem nem sabe o que é música."
 elgar.414.h: "Finalmente alguém diz isso!"
 elgar.415.t: "Balé"
 elgar.415.d: "Uma nova peça de balé moderna comemorou sua estréia hoje."
 elgar.415.f: "'Gosto do enredo do quebra -nozes - de jeito nenhum.' - PJOTR TCHAIKOVSKY"
 elgar.415.g: "Dança!"
 elgar.416.t: "Música cinematográfica"
 elgar.416.d: "Uma das primeiras trilhas sonoras do filme foi gravada hoje para um longa -metragem sob a direção do nosso principal condutor."
 elgar.416.f: "'A música cinematográfica deve ter o mesmo relacionamento com o drama de cinema que o piano de alguém tocando na minha sala de estar tem para o livro que estou lendo.' - Igor Stravinsky"
 elgar.416.g: "Eu tinha uma trama de roteiro sobre um arqueólogo procurando a Arca da Aliança há muito tempo, mas depois foi roubada."
 elgar.417.t: "A temporada de condução termina"
 elgar.417.d: "A última apresentação da temporada de concertos chegou ao fim. Os comentários já estão na imprensa. Parece que [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] se saiu bem e ganhou reconhecimento. Diz -se que a qualidade da orquestra do estado melhorou significativamente - o que está elevando a reputação musical de nossa nação."
 elgar.417.f: "Os compositores que ainda não são condutores podem adquirir a capacidade de conduzir através da prática no final de uma sessão de concerto. Após a terceira temporada, o mais tardar, a aquisição do status do condutor é certo. Esta é uma boa maneira de treinar compositores não-virtuoso e enviá-los em turnê."
 elgar.417.g: "Da Capo!"
 elgar.421.d: "Nosso compositor está atualmente sofrendo de um grande bloco de escrita."
 elgar.422.t: "Uma caminhada"
 elgar.422.d: "Em uma caminhada na natureza, [SCOPE.sCharacter('elgar_conductor').GetFullName] encontrou alguma inspiração que avançou seu trabalho."
 elgar.422.f: "A natureza já inspirou muitos compositores. Beethoven se retirou para o campo e coletou impressões lá que mais tarde o inspiraram a escrever a 6ª Sinfonia. Gustav Mahler chegou a montar sua própria cabana de compositor."
 elgar.422.g: "Nos passos de Beethoven."
 elgar.423.t: "None"
 elgar.423.f: "Assim que você dá aos artistas um trabalho importante, eles vêm com pedidos especiais. Uma figura pública séria se torna rapidamente uma diva se você a faz se sentir importante. Antes que você perceba, a fama está indo para a cabeça dessas pessoas."
 elgar.423.g: "Dê a ele conforto"
 elgar.424.t: "Distúrbios"
 elgar.424.f: "Há uma pessoa que dificulta a vida para [SCOPE.sCharacter('elgar_conductor').GetFullName]. Seja um fã ou apenas uma pessoa que acredita que pode ganhar influência política por estar particularmente perto de uma figura pública famosa. Você quase poderia chamá -lo de groupie. As interrupções agora são tão ruins que [SCOPE.sCharacter('elgar_conductor').GetLastName] está reclamando da paraonia. Infelizmente, o 'fã' é uma figura política de alto escalão cujo ostracismo público teria consequências compreensíveis."
 elgar.424.g: "Não o perturbe!"
 elgar.424.h: "None"
 elgar.431.t: "Concerto para [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_concerto_instrument_name')] em [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]"
 elgar.431.d: "Após vários meses de esforço e criatividade artística, [SCOPE.sCharacter('elgar_conductor').GetFullName] estreou seu concerto [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_concerto_instrument_name')] hoje com ele no pódio."
 elgar.431.f: "Um concerto é, da era barroca tardia, entendida principalmente como uma composição instrumental, escrita para um ou mais solistas acompanhados por uma orquestra ou outro conjunto. Como um gênero de música instrumental, os primeiros trabalhos emergiram do Concerto Grosso no início do século XVIII. Encontra sua expressão completa no período clássico. Geralmente é em três movimentos, com um movimento lento no meio."
 elgar.432.t: "Sinfonia No. [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_symphony_number_name')] em [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]"
 elgar.432.d: "Uma performance muito especial está ocorrendo na sala de concertos hoje à noite: a High Society se reuniu para participar da estréia da nova sinfonia de § 0 em [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]."
 elgar.432.f: "Uma sinfonia é um termo para obras instrumentais de forma e instrumentação variadas ao longo dos séculos. A forma clássica da sinfonia se desenvolveu no século XVIII e manteve uma posição dominante no campo da música orquestral até o século XX. Este é um trabalho que consiste em vários (geralmente três ou quatro, mais raramente cinco) movimentos para orquestra sem solistas. Desde que a 9ª Sinfonia de Ludwig Van Beethoven, as partes vocais (solistas e/ou coro) também apareceram ocasionalmente, por exemplo, em Gustav Mahler, embora o papel da orquestra permaneça dominante."
 elgar.433.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_opera_name')]"
 elgar.433.d: "A ópera '[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_opera_name')]', composta pelo maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] após muitas semanas e meses de esforço, é considerada um novo destaque na obra musical desse gênio artístico. A próxima estréia promete ser um grande sucesso."
 elgar.433.f: "Opera é um gênero musical de teatro que surgiu na era barroca. Uma ópera consiste em um cenário musical de um poema dramático realizado por um conjunto de cantores, uma orquestra que o acompanha e, às vezes, um coral e um conjunto de balé. Além de cantar, os atores realizam atuação e dança em um palco de teatro projetado usando pintura, arquitetura, adereços, iluminação e tecnologia de palco. Os papéis dos atores são ilustrados visualmente por máscaras e figurinos. Claudio Monteverdi, que estabeleceu padrões com seu Orfeo, é considerado o antepassado da ópera. No século 19, Richard Wagner estabeleceu novos padrões com suas óperas."
 elgar.440.t: "Música folclórica"
 elgar.440.d: "Viajando pelas partes mais rurais do país, [SCOPE.sCharacter('elgar_conductor').GetFullName] encontrou um grande interesse em aprender, anotar e coletar as danças e canções da população local."
 elgar.440.f: "O nacionalismo do século XIX significava que muitas formas de música anteriormente criticadas de repente despertaram interesse porque supostamente refletiam a alma nacional de um país. Historiadores locais e músicos locais coletaram músicas tradicionais. Alguns compositores também se inspiraram nas pessoas e as colocaram na música de uma maneira completamente nova."
 elgar.440.g: "Uma coleção de música interessante."
 elgar.440.h: "[SCOPE.sCharacter('elgar_conductor').GetLastName] deve se concentrar na alta cultura, em vez de lidar com a música de moedor de órgãos."
 elgar.441.t: "Shanty do mar"
 elgar.441.d: "Inspirado pelas ações do almirante [SCOPE.sCharacter('elgar_admiral').GetLastName], nosso compositor [SCOPE.sCharacter('elgar_conductor').GetFullName] escreveu uma pequena favela do mar ao lado."
 elgar.441.f: "O objetivo prático original da favela como música de trabalho sempre foi fundamental entre os marítimos. Os aspectos linguísticos e musicais, por outro lado, dificilmente desempenharam um papel. Com o início da Revolução Industrial, foram necessários navios mais rápidos. Os indianos leste de barriga grandes desapareceram e foram substituídos por Clippers e Frigates. Em última análise, isso levou a Shanties gradualmente a perder seu uso prático para o mar de mar e ser cantado apenas por lazer e entretenimento. Músicos coletaram fais antigos do mar ou foram inspirados por eles para criar seus próprios trabalhos."
 elgar.441.g: "Yo ho!"
 elgar.442.t: "Marchar"
 elgar.442.d: "Inspirado pelos valores do general [SCOPE.sCharacter('elgar_general').GetFullName], nosso compositor [SCOPE.sCharacter('elgar_conductor').GetFullName] escreveu uma nova marcha militar."
 elgar.442.f: "A marcha floresceu especialmente nos séculos XIX e início do século XX, com suas tendências nacionalistas e militaristas e suas revoluções. Um exemplo disso é Gioachino Rossini, que não apenas incorporou regularmente marchas pomposas em suas óperas, mas também compôs várias peças para príncipes individuais: incluindo uma composição encomendada para o sultão turco Abdülmecid i (Marcia per il Sultano), que ainda é executado regularmente no programa do programa italiano Bands. Também exemplar para as tendências do século XIX está a produção da família Strauss em Viena, que compôs uma marcha em todas as oportunidades adequadas de demonstrar patriotismo ou lealdade ao imperador, ou para honrar figuras militares."
 elgar.442.g: "Novo material para o exército."
 elgar.443.t: "Kunstlied"
 elgar.443.d: "Com base no poema de um grande poeta, [SCOPE.sCharacter('elgar_conductor').GetFullName] escreveu um trabalho lateral."
 elgar.443.f: "Na tradição da música clássica ocidental, Lied é um termo para definir a poesia para a música clássica para criar uma peça de música polifônica. O termo é usado para qualquer tipo de música no alemão contemporâneo, mas entre falantes de inglês e francês, mentiu é frequentemente usado de forma intercambiável com 'música de arte' para abranger obras que a tradição também inspirou em outras línguas. Os poemas que foram transformados em Lieder geralmente centram -se em temas pastorais ou temas de amor romântico."
 elgar.443.g: "Não poderia ter sido outra coisa ...?"
 elgar.444.t: "Sonata de piano em [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]"
 elgar.444.d: "As peças de piano fazem parte do repertório padrão da música clássica. Como exercício de dedos para o próximo trabalho importante, [SCOPE.sCharacter('elgar_conductor').GetFullName] escreveu uma sonata e o realizou ontem à noite em uma pequena festa noturna."
 elgar.444.f: "No início do século XIX, a forma sonata foi definida, de uma combinação de prática anterior e de obras de compositores clássicos importantes, particularmente Haydn, Mozart, Beethoven, mas compositores como Clementi também. É durante esse período que as diferenças entre os layouts de três e quatro movimentos se tornaram objeto de comentários, com ênfase no concerto sendo apresentado em três movimentos e a sinfonia em quatro. Entre os trabalhos expressamente rotulados Sonata para o piano, há os três de Frédéric Chopin, os de Felix Mendelssohn, os três de Robert Schumann, Sonata de Franz Liszt em B Minor e, mais tarde, as sonatas de Johannes Brahms e Sergei Rachmaninoff."
 elgar.444.g: "Um clássico."
 elgar.445.t: "Tratado sobre música"
 elgar.445.d: "Nos últimos meses, o [SCOPE.sCharacter('elgar_conductor').GetFullName] tem trabalhado extensivamente em um novo tratado sobre orquestração e o estudo de instrumentos musicais. O tratado é considerado uma contribuição para as inovações musicais."
 elgar.445.f: "\"Demora muito tempo para encontrar os oceanos da música, mas ainda mais para aprender a navegá -los.\" -Hector Berlioz"
 elgar.445.g: "Um importante trabalho teórico."
 elgar.446.t: "Réquiem"
 elgar.446.d: "Um representante influente do clero católico recentemente pediu a [SCOPE.sCharacter('elgar_conductor').GetFullName] que escrevesse um novo trabalho sagrado após a morte de um bispo respeitado."
 elgar.446.f: "A forma litúrgica da massa fúnebre é o requiem. O termo descreve a liturgia da Santa Missa no serviço funerário da Igreja Católica e das composições musicais da igreja para a comemoração dos mortos. É derivado do incipito do requiem aeternam da introdução, DONA EIS, DOMINE ('REST ETERNAL, Ó SENHOR'). O proprietário da liturgia do requiem corresponde ao dia de todas as almas. Como a primeira peça da massa musical, a introdução era geralmente definida como música pelos compositores, assim como o criminoso, em contraste com a sequência, que ocasionalmente é encurtada ou omitida inteiramente por várias razões. Gloria e Credo não estão definidas como música no Requiem porque não são cantadas ou faladas na liturgia da missa fúnebre."
 elgar.446.g: "Requiem Aeternam Dona Eis, Domine."
 elgar.447.t: "Uma ópera ousada"
 elgar.447.d: "A última composição de § 0 se reuniu com as críticas das autoridades de censura. É certamente de alto valor artístico, mas pode causar tumulto. A intelligentsia do país já está em pé de guerra."
 elgar.447.f: "Em grande parte do século XIX, mesmo os maiores compositores de seu tempo tiveram que se submeter à censura. As muitas configurações diferentes de 'Figaro' foram consideradas altamente críticas por causa do tema revolucionário. Suspeita de blasfêmia ou outras imoralidades também eram um espinho na lateral dos censores. Em um certo ponto, alguns compositores não podiam mais suportar o assédio e deixaram seu patrocinador."
 elgar.447.g: "A arte deve elevar, não causar tumulto."
 elgar.447.h: "Devemos relaxar um pouco a censura."
 elgar.448.t: "Duelo do compositor"
 elgar.448.d: "[SCOPE.sCharacter('rival_composer_scope').GetFullName], um compositor de [SCOPE.sCountry('rival_composer_country_scope').GetName], em um ajuste da arrogância típica deste país, descreveu nosso compositor [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] como um 'número desconhecido' e questionou fundamentalmente o status musical de nossa nação."
 elgar.448.f: "“A fragmentação e a arbitrariedade de nosso estilo musical foram, se não foram provocadas, pelo menos aumentou para o pico mais alto pelo esforço de Mendelssohn de expressar um conteúdo pouco claro, quase sem sentido da maneira mais interessante e exagerada possível. While the last in the chain of our true musical heroes, Beethoven, had the highest desire and miraculous ability for the clearest, most certain expression of an ineffable content through sharply cut, plastic design of his sound images, Mendelssohn, on the other hand, blurs these acquired figures in his productions into a dissolving, fantastic shadow image whose indefinite shimmer of colors arbitrarily stimulates our capricious imagination, but our purely human inner longing Para uma visão artística clara, dificilmente é tocada apenas com a esperança de realização. -Richard Wagner em Felix Mendelssohn"
 elgar.448.g: "Aceitamos o desafio."
 elgar.448.h: "Não podemos sobreviver a este duelo."
 elgar.449.t: "Vitória no duelo do compositor"
 elgar.449.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] mostrou -se um compositor muito mais famoso e capaz do que seu rival smarmy, preservando assim a reputação de nossa nação como um centro cultural."
 elgar.449.f: "'Nada mostra mais claramente o poder de Wagner e o tipo de tempestade e estresse que ele desencadeou do que essa decadência que seu trabalho realmente consagrou e que se desenvolveu em ritmo acelerado desde seu tempo. Quão poderoso esse homem deve ter sido destruído uma forma essencialmente musical (ópera) com tanta energia que cinquenta anos após sua morte, ainda estamos cambaleando sob o lixo e a raquete do drama musical! Pois o prestígio da síntese das artes ainda está vivo. É isso que é chamado de progresso? Talvez. A menos que os compositores encontrem força para abalar esse legado pesado, obedecendo à admirável liminar de Verdi: 'Vamos voltar aos velhos tempos, e isso será progredido'. -Igor Stravinsky em Richard Wagner"
 elgar.449.g: "Agora está claro qual país é a nação cultural dominante!"
 elgar.450.t: "Derrota no duelo do compositor"
 elgar.450.d: "Infelizmente, nosso compositor foi derrotado por seu rival estrangeiro na competição. O mundo inteiro agora está convencido de que ficamos para trás musicalmente!"
 elgar.450.f: "'Wagner é até um ser humano? Ele não é mais uma doença? Ele deixa tudo o que toca doente, deixou a música doente. -Friedrich Nietzsche em Richard Wagner"
 elgar.450.g: "Agora está claro qual país é a nação cultural dominante ..."
 elgar.451.t: "O maestro viaja para [SCOPE.sCountry('elgar_composer_destination_scope').GetNameNoFlag]"
 elgar.451.d: "Nosso compositor [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] concluiu todos os preparativos. O primeiro destino da turnê de dois anos e meio será [SCOPE.sCountry('elgar_composer_destination_scope').GetName]."
 elgar.451.f: "\"Se o mundo terminar, irei para Viena, porque é para onde tudo acontece cinquenta anos depois.\" - Gustav Mahler"
 elgar.451.g: "Envie -nos um cartão postal!"
 elgar.452.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] chega em [GetPlayer.GetNameNoFlag]"
 elgar.452.d: "Um compositor itinerante parou em nosso país em sua turnê atual e decidiu ficar por um tempo."
 elgar.452.f: "[SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_composer_achievements_switch_to_character_scope_type')]"
 elgar.452.g: "Bem -vindo, bem -vindo!"
 elgar.453.t: "Compositor Viajante parte"
 elgar.453.d: "Após uma estadia de várias semanas e algumas apresentações que lhe renderam reconhecimento da população local, o compositor itinerante continuou sua turnê."
 elgar.453.f: "O destino de um compositor depende de toda uma gama de fatores. Um critério decisivo são casas de ópera e a proximidade do último local. Mas fatores como tecnologias culturais, a presença de um centro de arte (impressionismo, expressionismo, Art Nouveau) ou a existência de um conservatório também desempenham um papel. Os compositores evitam lugares onde ocorreu uma performance de um compositor rival."
 elgar.453.g: "Espero vê -lo novamente em breve!"
 elgar.455.t: "Compositor retorna do Tour"
 elgar.455.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] retornou do tour [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]. Ele deixou sua marca no mundo da música e melhorou significativamente sua reputação."
 elgar.455.f: "Os passeios existem apenas para aumentar a reputação de um compositor. Dependendo das habilidades de um compositor, isso será diferente. Suas próprias composições desempenham um papel, mas também os traços de caráter - personagens inovadores ou ambiciosos têm vantagens. Os compositores que têm o traço do condutor e o traço virtuoso recebem um bônus especial."
 elgar.455.g: "Bem -vindo de volta, maestro."
 elgar.501.t: "Canto Degli Italiani"
 elgar.501.d: "Em um clima de luta popular pela unificação e independência da Itália, o estudante de 20 anos e o patriota Goffredo Mameli escreveu uma música inspiradora, chamando-a de 'a música dos italianos'. Tornou -se bastante popular em pouco tempo."
 elgar.501.f: "Il Canto Degli Italiani (a música dos italianos) é mais conhecida entre os italianos como 'Inno di Mameli' (hino de Mameli), depois do autor da letra, ou 'Fratelli d'Italia' (irmãos da Itália), de sua linha de abertura. O texto foi definido como música por outro Michele Novaro. O hino desfrutou de popularidade generalizada durante todo o período do Risorgimento e nas décadas seguintes. Também foi impresso em folhetos em Gênova e publicado em 10 de dezembro: a manifestação foi oficialmente dedicada ao 101º aniversário da expulsão das potências austríacas da cidade - na verdade, era uma desculpa para protestar contra ocupações estrangeiras na Itália e induzir Carlo Alberto a abraçar a causa italiana da liberdade. Nesta ocasião, a bandeira tricolor foi mostrada e o hino de Mameli foi cantado publicamente pela primeira vez."
 elgar.501.g: "Deve haver uma lei contra ..."
 elgar.501.h: "Fratelli d'Italia, L'Italia S'è DeSta!"
 elgar.503.t: "Deutschlandlied"
 elgar.503.d: "Em resposta ao desejo renovado de expansão da França, que vê o Reno como uma fronteira natural, o poeta Hoffmann von Fallersleben escreveu uma música que é amplamente popular como a 'Deutschlandlied'."
 elgar.503.f: "A música dos alemães, também conhecida como Deutschlandlied, foi escrita por August Heinrich Hoffmann von Fallersleben em Heligoland. O motivo específico para Hoffmann escrever a música foram as reivindicações territoriais francesas para a Renânia durante a crise do Reno. Ele rejeitou essas reivindicações com a música, como aconteceu com outras músicas da Reno da época. Ele complementou isso com mais idéias, especialmente a da unidade alemã, que por si só poderia fornecer o pré -requisito para defender contra ataques inimigos de qualquer tamanho. O poeta criou seu trabalho expressamente para a melodia do antigo hino imperial 'Deus salvar Franz, o imperador' de Joseph Haydn (1797). A música só ganhou maior importância durante a Primeira Guerra Mundial. Seu terceiro versículo tem sido o texto do hino nacional alemão desde 1952."
 elgar.503.g: "Vinho alemão e música alemã!"
 elgar.503.h: "Alemanha, Alemanha acima de tudo!"
 elgar.503.i: "Você deve estar enganado, a música é chamada 'Gott Erhalte Franz Den Kaiser'."
 elgar.504.t: "Morte de Paganini"
 elgar.504.d: "A morte do famoso Virtuoso Niccolò Paganini provocou uma controvérsia em torno de seu funeral."
 elgar.504.f: "Niccolò Paganini era um violinista e compositor italiano. Ele era o virtuoso de violino mais célebre de seu tempo e deixou sua marca como um dos pilares da técnica de violino moderna. Suas 24 Caprichas para Violino Solo OP. Estou entre os mais conhecidos de suas composições e servi como uma inspiração para muitos compositores de destaque. Em maio de 1840, o bispo de Nice enviou Paganini um pároco local para realizar os últimos ritos. Paganini assumiu que o sacramento era prematuro e recusou. Uma semana depois, em 27 de maio de 1840, Paganini, 57 anos, morreu de hemorragia interna antes que um padre pudesse ser convocado. Por causa disso, e sua ampla associação com o diabo, a igreja negou seu corpo um enterro católico em Gênova. Isso levou a uma discussão pública sobre como lidar com Paganini. Há vozes a favor de pressionar a igreja e enterrar Paganini em Gênova, condizente com seu status e reivindicando seu legado. No entanto, isso levaria a uma disputa aberta com as autoridades eclesiásticas."
 elgar.504.g: "Dê a ele um enterro digno e proteja seu legado."
 elgar.504.h: "Não intervenha nessa matéria delicada."
 elgar.505.t: "Nabucco"
 elgar.505.d: "Giuseppe Verdi comemorou o maior sucesso de sua carreira até agora com sua última ópera. Ao mesmo tempo, incita o sentimento nacional do povo italiano."
 elgar.505.f: "A Nabucco é uma ópera em língua italiana em quatro atos compostos em 1841 por Giuseppe Verdi para um libreto italiano da Temistocle Solera. O número mais conhecido da ópera é o 'coro dos escravos hebraicos', um coro que recebe regularmente um bis em muitas casas de ópera quando apresentado hoje. A Nabucco é a ópera que se considera que possui a reputação de Verdi permanentemente como compositor. Ele comentou que 'esta é a ópera com a qual minha carreira artística realmente começa. E embora eu tivesse muitas dificuldades para lutar, é certo que Nabucco nasceu sob uma estrela da sorte. A história do cativeiro dos judeus na Babilônia se tornou um avanço em toda a Itália, principalmente porque os italianos se sentiam dominados por poderes estrangeiros na era do nacionalismo. Até que ponto Verdi realmente serviu aos sentimentos nacionais italianos em Nabucco ainda hoje é controverso."
 elgar.505.g: "VA Pensiero ..."
 elgar.505.h: "Aqueles italianos rebeldes novamente."
 elgar.507.t: "Aida"
 elgar.507.d: "Por ocasião da abertura do Canal de Suez, Giuseppe Verdi estreou sua ópera egípcia Opera Aida - com um pequeno atraso."
 elgar.507.f: "Aida é uma ópera em quatro atos de Giuseppe Verdi para um libreto italiano de Antonio Ghislanzoni, com base em um cenário frequentemente atribuído ao egipologista francês Auguste Mariette, embora tenha sido argumentado que o cenário foi realmente escrito por Temistocle Solera. Isma'il Pasha, Khedive, do Egito, encomendou Verdi para escrever a ópera, pagando a ele 150.000 francos, mas a estréia foi adiada. A AIDA recebeu um grande aclamado quando finalmente abriu no Cairo. Os figurinos e acessórios para a estréia foram projetados por Auguste Mariette, e ele supervisionou o design e a construção dos sets, que foram criados em Paris e enviados para o Cairo. Embora Verdi não tenha participado da estréia no Cairo, ele estava muito insatisfeito com o fato de o público consistir em dignitários convidados, políticos e críticos, mas nenhum membro do público em geral. Portanto, ele considerou a estréia italiana (e européia), realizada em La Scala, Milão, e na qual estava fortemente envolvido em todas as etapas, para ser sua verdadeira estréia."
 elgar.507.g: "Um triunfo para a Itália!"
 elgar.507.h: "Um triunfo para [ROOT.GetCountry.GetNameNoFlag]!"
 elgar.509.t: "Franz Schubert"
 elgar.509.d: "13 anos após sua morte, a 5ª Sinfonia de Franz Schubert foi apresentada ao público em geral."
 elgar.509.f: "A quinta sinfonia, em B, Major, é talvez a mais talentosa de suas sinfonias juvenis e é amplamente considerada como a primeira sinfonia 'madura' de Schubert. Sua elaboração é de perfeição da música de câmara, pois a instrumentação é menor que a de qualquer outra sinfonia, e suas proporções são finamente sintonizadas entre si. Pode ser entendido como o exame produtivo de Schubert das obras sinfônicas de Mozart e revela a completa alteridade e independência de Schubert. De acordo com as próprias entradas de Schubert no placar, o trabalho foi composto entre setembro e 3 de outubro de 1816; Foi escrito em um momento em que Schubert estava procurando sua própria linguagem musical. A primeira apresentação da 5ª Sinfonia de Schubert ocorreu com uma pequena orquestra amadora em Viena em 1816; A primeira apresentação pública, por outro lado, ocorreu apenas em 17 de outubro de 1841, treze anos após a morte de Schubert, sob o bastão de Michael Leitermayer."
 elgar.509.g: "Mesmo do céu, Schubert nos encanta com sua música."
 elgar.510.t: "Controvérsia sobre Poliuto"
 elgar.510.d: "Uma disputa irreconciliável entre o rei e o compositor Donizetti ameaça desencadear sua demissão."
 elgar.510.f: "De 1829 a 1838, Gaetano Donizetti foi diretor musical dos teatros reais de Nápoles e, apesar das viagens e comissões em outros estados, de fato a figura cultural mais importante do reino e seu representante mais famoso. Uma série de óperas famosas do Donizetti foi escrita em Nápoles, que consolidou a posição do reino das duas sicílias como um local de música de alto escalão. Mas, apesar dos muitos sucessos, Donizetti teve que lutar repetidamente com a censura napolitana, que desfigurou seu libreti ou cancelou óperas inteiras. Na disputa mais recente, o próprio rei interveio para impedir o desempenho da ópera 'Poliuto'. Depois de muitos anos de brigas com a censura, Donizetti se cansou e se preparou para fugir para Paris. A elite política se uniu atrás do rei; impedir que Donizetti de seus planos não apenas perturbaria o cenário político e social, mas também prejudicaria massivamente a autoridade e a reputação do rei."
 elgar.510.g: "O rei falou, ele pode embalar suas coisas."
 elgar.510.h: "Devemos fazer tudo para impedir que Donizetti saia!"
 elgar.511.t: "Les Martyres, 1840"
 elgar.511.d: "O compositor italiano Gaetano Donizetti chegou a Paris e realizou sua ópera 'Les Martyres', que foi extremamente bem recebida pelo público."
 elgar.511.f: "Poliuto é uma tragédia lirica de três atos (ou ópera trágica) de Gaetano Donizetti do libreto italiano de Salvadore Cammarano, que foi baseado na peça polieucte de Pierre Corneille escrita em 1641/42. Refletiu a vida do início do martírio cristão Saint Polyeuctus. Considerado por um autor como a \"ópera mais pessoal\" de Donizetti, com a música sendo \"alguns dos melhores donizetti foi compor\", Poliuto foi escrito em 1838 para apresentações planejadas no Teatro San Carlo em Nápoles no final daquele ano. No entanto, perto do tempo para começarem os ensaios, o rei Ferdinand II se recusou a permitir que o martírio de um santo cristão fosse visto no palco e proibiu a produção. Irritado com a decisão e com uma comissão para a Paris Opéra, devido ao compositor, Donizetti pagou a penalidade ao San Carlo por não produzir um trabalho original como substituto e deixou Nápoles para Paris. Como sua primeira comissão para Paris, ele decidiu revisar Poliuto e entre 1839-40 um texto francês, com o título Les Mártires."
 elgar.511.g: "Nada mal para um italiano."
 elgar.512.t: "O Stabat Mater"
 elgar.512.d: "Gaetano Donizetti está visitando Bolonha para conduzir a estréia do Stabat Mater de Gioachino Rossini. O desempenho foi um sucesso completo."
 elgar.512.f: "Quando Donizetti foi a Bolonha para o Stabat Mater, Rossini participou da terceira apresentação, e os dois homens - cada um dos ex -alunos do Conservatório de Bolonha - se reuniu pela primeira vez, com Rossini declarando que Donizetti era 'o único maestro na Itália capaz de conduzir meu stabat como eu o teria'. Amigos, incluindo seu cunhado, Antonio Vasselli (conhecido como Totò)-tentou continuamente convencê-lo a assumir uma posição acadêmica em Bolonha, em vez do envolvimento da Viena Court, se não por outro motivo que isso daria ao compositor uma base a partir da qual trabalhar e ensinar e não se esgotar continuamente com viagens entre as cidades. Donizetti relatou a reação do público: 'O entusiasmo é impossível de descrever. Mesmo no ensaio final, que Rossini compareceu, no meio do dia, ele estava acompanhado de sua casa até o grito de mais de 500 pessoas. A mesma coisa na primeira noite, debaixo da janela, já que ele não apareceu no salão."
 elgar.512.g: "Rossini & Donizetti - Uma partida no céu!"
 elgar.513.t: "Donizetti fica louco?"
 elgar.513.d: "O declínio mental cada vez mais rápido de Donizetti levou a ele estar comprometido com um asilo insano em Paris."
 elgar.513.f: "Donizetti relatou em suas cartas por um longo período de tempo, a partir da década de 1820, sobre dores de cabeça, às vezes ataques de febre que duraram apenas um dia e também sobre humores depressivos ocasionais. A quantidade extraordinária de trabalho que ele realizou ao longo de sua vida, bem como as longas jornadas que eram particularmente extenuantes na época, especialmente depois que ele se mudou para Paris e mais tarde para Viena, levou a um aumento dos sintomas de exaustão de 1842 a 1843. Os ataques ocasionais e febre foram acompanhados por uma tontura e às vezes nas sensações das cabeças. Em 1845, a saúde de Donizetti se deteriorou rapidamente e ele caiu na rua em Paris. Os médicos o proibiram de compor - o que o deprimiu ainda mais. Finalmente, sob falsos pretextos, ele foi atraído para o asilo insano em Ivry-sur-Seine sem seu conhecimento e contra sua vontade, e foi estagiado à força lá. O compositor doente viu rapidamente através de sua situação como um 'prisioneiro' e classificação como um 'maníaco' e escreveu cartas desesperadas e comoventes a amigos e parentes pedindo ajuda."
 elgar.513.g: "Talvez seja melhor assim."
 elgar.513.h: "Tire -o do asilo insano e dê -lhe descanso em Bergamo."
 elgar.514.f: "Levou 17 meses para Donizetti ser resgatado do asilo mental. Uma partida planejada foi impedida pelos médicos, mas também pelo prefeito da polícia de Paris por razões inescrutáveis. Somente com a ajuda da pressão diplomática, o agora completamente apático compositor poderia ser trazido de volta por seu irmão Francesco e seu sobrinho Andrea. A filha da Baronesa Rosa Rota-Basoni tocava piano para o compositor todos os dias e cantou árias de suas obras, seu amigo Dolci falou com ele no dialeto de Bergamasque e recebeu uma visita do tenor Rubini, mas Donizetti não mostrou mais reações. Donizetti morreu uma semana após um derrame apoplético com hemiplegia, febre alta e infecções subsequentes. Os resultados da autópsia mostraram sintomas de meningite \"passada\" e uma medula espinhal parcialmente danificada e inflamada."
 elgar.514.g: "None"
 elgar.515.t: "None"
 elgar.515.d: "None"
 elgar.515.f: "None"
 elgar.515.g: "None"
 elgar.516.t: "None"
 elgar.516.d: "Dois dos pianistas mais famosos competiram entre si em Paris: Franz Liszt desafiou o pianista vivo mais importante, Sigismund Thalberg."
 elgar.516.f: "No inverno de 1835/36, Sigismund Thalberg fez sua estréia em um concerto privado dado pelo secretário da embaixada austríaca em Paris. Ele foi recebido com entusiasmo pelos artistas presentes, incluindo Rossini e Meyerbeer, e elogiou como inventor de um novo estilo de piano. Enquanto os shows de Franz Liszt em Lyon trouxeram cerca de 500 a 600 francos, Thalberg ganhou 10.000 francos de um único concerto no teatro italiano. Antes de Thalberg aparecer em sua segunda estadia em Paris, Liszt publicou uma revisão cheia de insinuações e polêmicas. Segundo Liszt, o sucesso de Thalberg surgiu apenas através da propaganda. Thalberg apareceu novamente em Paris a partir de fevereiro de 1837 e foi comemorado novamente. Em 31 de março, ambos os artistas se apresentaram em um evento de caridade organizado pela princesa BelgioJoso."
 elgar.516.g: "None"
 elgar.516.h: "None"
 elgar.517.t: "Von der wiege zum grabe"
 elgar.517.d: "None"
 elgar.517.f: "In the late years of his life, Liszt increasingly turned to sacred music and church music. His last tone poem, 'From the cradle to the grave' therefore differed from all his predecessors. Liszt was inspired by a drawing by the Hungarian painter Mihály Zichy. Large sections of the work do not require a powerful orchestra, especially the beginning sounds like chamber music; Muitas ilhas de som são formadas em que o material musical é ruim e as passagens solo não são incomuns, especialmente no final dos movimentos. The harmonics used are also a harbinger of times to come. During his lifetime, however, music critics rated the work as the 'mistake of an old man'."
 elgar.517.g: "None"
 elgar.518.t: "Lohengrin"
 elgar.518.d: "A estréia de 'Lohengrin', de Richard Wagner, não era apenas uma multidão - mas desencadeou uma verdadeira admiração por Wagner na Alemanha."
 elgar.518.f: "Lohengrin é uma ópera romântica em três atos do compositor alemão Richard Wagner. Com Lohengrin, Wagner criou a nova forma operática de drama musical composto por meio. A composição não é dividida em números individuais, mas é reproduzida por ato por ato sem interrupção. Wagner, assim, se diferencia da estrutura convencional de óperas numéricas com árias, recitativos e partes corais. Para poder traduzir a vida interior dos personagens do palco em motivos musicais claramente legíveis, Wagner usou o Leitmotifs (por exemplo, o motivo do Graal e o motivo da proibição de perguntas). A ópera inspirou outras obras de arte. O rei Ludwig II da Baviera nomeou seu castelo no castelo de Neuschwanstein em homenagem ao Cavaleiro do Cisne."
 elgar.518.g: "Inspirador."
 elgar.519.t: "Kunstwerk der Zukunft"
 elgar.519.d: "Durante sua estadia na Suíça, o compositor Richard Wagner escreveu vários tratados sobre música e arte que se tornariam inovadores para o entendimento alemão e internacional da estética."
 elgar.519.f: "A 'obra de arte do futuro' é um escrito teórico da arte de Richard Wagner que ele escreveu entre 1849 e 1852 em Zurique. Como em sua escrita 'Arte e a Revolução', Wagner lança a deterioração das artes e desenvolve seu modelo da nova unidade das artes, o 'Gesamtkunstwerk'. Como em seus escritos anteriores, Wagner desenvolveu sua convicção de que a arte grega estava incorporada à religião e misticismo grego e que, através da destruição da religião, a arte também estava perdendo sua coesão e se tornando 'artes individuais' (drama, música e dança) teve que degenerar. Ele reclama que a arte da música como um acompanhamento puro à palavra se afastou. No curso posterior de suas explicações, ele entra em grandes detalhes sobre o desenvolvimento das diferentes artes, desde o estado ideal durante a antiguidade até a decadência de seu tempo. Em seu próximo e mais importante trabalho escrito, ópera e drama, Richard Wagner explica com muita precisão (e muito teoricamente) como ele imagina a ótima 'união' da música e da poesia. Um pouco mais tarde, ele começou a trabalhar na execução 'prática' e escreveu e compôs seu 'Ring des Nibelungen' como o drama musical por excelência após anos de trabalho."
 elgar.519.g: "Quem deve entender essas frases em caixa de difícil leitura?"
 elgar.520.t: "Tristan e Isolde"
 elgar.520.d: "Tristan und Isolde é uma ópera em três atos de Richard Wagner em um libreto alemão do compositor, baseado em grande parte no romance Tristan e Iseult, do século XII, de Gottfried von Strassburg. A ópera foi enormemente influente entre os compositores clássicos ocidentais e forneceu inspiração direta a compositores como Gustav Mahler, Richard Strauss, Alban Berg, Arnold Schoenberg e Benjamin Britten. Outros compositores como Claude Debussy, Maurice Ravel e Igor Stravinsky formularam seus estilos em contraste com o legado musical de Wagner. Muitos vêem Tristan como um marco, afastando -se da prática comum e da tonalidade e consideram que ela estabelece as bases para a direção da música clássica no século XX."
 elgar.520.f: "'O trabalho que sempre despertou minha maior admiração é Tristan. Um espanto trêmulo me apreende na frente deste gigantesco edifício, e ainda me parece incrível como um ser humano pode conceber e perceber. Considero que o segundo ato é uma das criações mais sublimes do Espírito já criadas. Este segundo ato é maravilhoso, maravilhoso, indescritivelmente maravilhoso. - Giuseppe Verdi"
 elgar.521.t: "Richard Wagner Festival"
 elgar.521.d: "O estabelecimento do Festspielhaus de Richard Wganner é considerado um dos destaques da cultura musical do século XIX."
 elgar.521.f: "O Bayreuth Festival é um festival de música realizado anualmente, no qual são apresentadas apresentações de óperas pelo compositor alemão Richard Wagner do século XIX. O próprio Wagner concebeu e promoveu a idéia de um festival especial para mostrar suas próprias obras, em particular seu ciclo monumental 'Der Ring des Nibelungen' e 'Parsifal'. As apresentações ocorrem em um teatro especialmente projetado, o Bayreuth Festspielhaus. Wagner supervisionou pessoalmente o design e a construção do teatro, que continha muitas inovações arquitetônicas para acomodar as enormes orquestras para as quais Wagner escreveu, bem como a visão particular do compositor sobre a encenação de suas obras. O festival se tornou um destino de peregrinação para wagnerianos e entusiastas da música clássica. Present at this unique musical event were Kaiser Wilhelm, Dom Pedro II of Brazil, King Ludwig, and other members of the nobility, as well as the philosopher Friedrich Nietzsche and such accomplished composers as Anton Bruckner, Edvard Grieg, Pyotr Tchaikovsky, Franz Liszt, and the young Arthur Foote."
 elgar.521.g: "Um pico da cultura alemã!"
 elgar.523.t: "Escândalo de Tannhäuser"
 elgar.523.d: "Uma performance do Tannhäuser de Richard Wagner causou um escândalo real que indignou toda a sociedade parisiense. Além da violação de Wagner sobre as boas regras da vida da ópera francesa, a animosidade entre os mundos musicais alemães e franceses também desempenhou um papel."
 elgar.523.f: "Wagner sempre teve um momento difícil em Paris, não apenas por causa de sua competição com o popular Giacomo Meyerbeer. Para acomodar sua ópera tannhäuser na Grand Opera, ele teve que se curvar aos costumes franceses - como a instalação de um balé. Mas Wagner resistiu veementemente às especificações e incluiu apenas um bacanal. Ao mesmo tempo, Wagner se tornou impopular com os músicos com ensaios agonizantemente longos. A estréia causou um escândalo: os cavalheiros do 'Jockey Club' de Paris se sentiram traídos quando o balé não apareceu após a abertura. Os senhores não vieram por causa da música, mas para assistir as mulheres bonitas e visitá -las mais tarde no vestiário. Como eles não conseguiram o que queriam, sabotaram o evento com assobios e gritos. O dia seguinte não foi melhor: a imprensa parisiense rasgou o desempenho no ar. Não apenas a França, mas também os amigos e inimigos de Wagner na Alemanha estarão assistindo de perto nossa reação."
 elgar.523.g: "Ele nunca deve aparecer em Paris novamente!"
 elgar.523.h: "Temos que apaziguar Herrn Wagner."
 elgar.524.t: "Holberg Suite"
 elgar.524.d: "A Suite Holberg de Edvard Grieg, que estreou em Oslo, não apenas se tornou uma obra -prima musical, mas também inspirou o sentimento nacional norueguês."
 elgar.524.f: "A suíte Holberg, sutitulada 'Suite in Olden Style', é uma suíte de cinco movimentos com base nas formas de dança do século XVIII, escritas por Edvard Grieg em 1884 para comemorar o 200º aniversário do nascimento do Dano-Norwegian Humanist Playwright Ludvig Holberg (1684-1744). Ele exemplifica a música do século XIX, que utiliza estilos e formas musicais do século anterior. A suíte Holberg foi originalmente composta para o piano, mas um ano depois foi adaptado pelo próprio Grieg para a orquestra de cordas. A suíte consiste em uma introdução e um conjunto de danças. É um ensaio inicial no neoclassicismo, uma tentativa de ecoar tanto quanto se sabia no tempo de Grieg da música da era de Holberg. Embora não seja tão famosa quanto a música incidental de Grieg do par Gynt, que é geralmente executada como organizada em um par de suítes, muitos críticos consideram as obras de igual mérito."
 elgar.525.t: "Novas pistas"
 elgar.525.d: "No 'Neue Magazin Für Musik', Robert Schumann mencionou um novo artista que de repente se tornou famoso da noite para o dia. Seu nome é Johannes Brahms e ele causou uma forte impressão em Schumann e sua esposa Clara."
 elgar.525.f: "- E ele veio, o sangue jovem, em cujo berço agradece e os heróis vigiaram. Seu nome é Johannes Brahms, ele veio de Hamburgo, trabalhou lá em um silêncio sombrio, mas foi treinado por um excelente e entusiasmado professor em cenários difíceis de arte, recomendado a mim pouco antes por um mestre conhecido e reverenciado. Do lado de fora também, ele usava todos os sinais que nos anunciam: ele é um homem chamado. - Robert Schumann"
 elgar.525.g: "Esperamos grandes coisas do Sr. Brahms."
 elgar.526.t: "Gesang der Parzen"
 elgar.526.d: "A 'Song of the Fates', de Johannes Brahms, foi estreada em Basileia. Junto com Viena, a Suíça era um dos lugares mais importantes de Brahms para ficar."
 elgar.526.f: "O Gesang der Parzen (Song of the Fates) é a última composição para o coro e a orquestra de Johannes Brahms. Mais de 10 anos após o Cantata Rinaldo Op. 50 e o Alto Rhapsody op. 53, Brahms novamente usou um texto de Johann Wolfgang von Goethe. De acordo com Max Kalbeck, Brahms foi inspirado a compor pela atriz Charlotte Wolter, que apareceu no papel da iphigenia no Burgtheater em Viena. Em 13 de junho de 1896, Brahms escreveu sobre a peça: 'Costumo ouvir filosofar sobre o sexto verso dos Parzenlied. Eu acho que o coração do ouvinte inocente deve ficar macio e os olhos molhados na mera entrada do major; Só então a miséria da humanidade o apreende."
 elgar.526.g: "É tão maravilhoso quanto perturbador."
 elgar.527.t: "Um proprietário de plantação laranja composição"
 elgar.527.d: "O filho do conhecido empresário de lã Julius Delius fez lições de um organista e publicou algumas de suas primeiras composições."
 elgar.527.f: "Frederick Delius, um inglês nascido, era filho do empresário de lã alemão Julius Delius. O pai queria que seu filho fosse o sucessor da empresa, mas o filho prestou pouca atenção aos negócios na Europa e estava mais interessado em arte e música. Portanto, Delius Jr. transferido para uma plantação laranja na Flórida para mantê -lo longe das influências das metrópoles européias. No entanto, foi essa transferência que deveria ser de excelente importância para sua criatividade musical posterior. Em Jacksonville, Delius conheceu o organista católico Thomas Ward, que Delius diz ser o único que realmente lhe ensinou qualquer coisa. Um pouco mais tarde Delius foi publicar suas primeiras composições em Danville, Virgínia."
 elgar.527.g: "O que deveria ser desse bom porquinho?"
 elgar.528.t: "Um austríaco em Nova York"
 elgar.528.d: "Após disputas em sua terra natal austríaca, Gustav Mahler encontrou uma audiência em Nova York, com quem suas obras foram muito bem recebidas. Alguns dos responsáveis ​​no mundo da música dos EUA gostariam de envolvê-lo a longo prazo."
 elgar.528.f: "For some, the German doublet was too tight when they heard the name Mahler. Some out of excitement, but most out of anger. It has been like this from day one. He had an immediate effect, inciting, provocative, alarming - it doesn't matter: he belongs to the electric and electrifying natures that give off sparks or ignite at the slightest touch. In the beginning, of course, only his frenetic unpopularity made him popular. Carried by the favor of hate, carefully illuminated by envy, that eternally sleepless and powerful protector of all that is real, by ridicule, by envy and slander, proclaimed by the loudest sound carriers on every street corner, he has become famous. (...) And so it was heard every day that he mistreats his musicians, whips them into inhuman work, almost incites them to death, and that if they were only able, they would all like to drown him in a spoonful of water. It was said that he shortened his singers, drilled them like recruits, played with them like the Great Turk with his slaves. (...) The intensity of his being seemed to fill the whole city of New York. - Felix Salten"
 elgar.528.g: "Que cara estranho."
 elgar.528.h: "Mahler deve ficar na América."
 elgar.529.t: "Suíte cita"
 elgar.529.d: "Sergei Prokofiev, um dos jovens talentos mais promissores da música russa, chocou o público hoje com uma performance escandalosa."
 elgar.529.f: "Prokofiev escreveu originalmente a música para o Ballet Ala I Lolli, cuja história acontece entre os citas. Comissionado por Sergei Diaghilev, o balé foi escrito em um cenário pelo poeta russo Sergey Gorodetsky. Mas quando Diaghilev rejeitou a pontuação antes mesmo de sua conclusão, o compositor retrabalhou a música em uma suíte para a apresentação de concertos. O desempenho se tornou o maior escândalo na história das estreias de Prokofiev. O diretor do conservatório na época, Alexander Glazunov, deixou o salão durante o show, a maioria da platéia ficou indignada e as críticas foram devastadoras. No entanto, Prokofiev não ficou muito impressionado e no dia seguinte escreveu sucintamente a Moscou que a apresentação havia acontecido 'com uma raquete real'."
 elgar.529.g: "Uma obra -prima!"
 elgar.529.h: "Nojento."
 elgar.530.t: "A sinfonia do Rhenish"
 elgar.530.d: "Robert Schumann conseguiu um emprego em Düsseldorf no Reno e foi subitamente inspirado pelas obras da Catedral de Colônia para escrever um novo trabalho."
 elgar.530.f: "Robert Schumann é considerado um dos compositores mais representativos da era romântica. Em 1850, ele sofreu Ferdinand Hiller como diretor musical e se mudou para Düsseldorf. Embora criticado em relação a suas más habilidades de condutor e zombado por causa de seu 'decaimento criativo', Schumann compôs sua última sinfonia, o 'Renhish'. Ele usou as sinfonias de Beethoven e Mendelssohn como modelo, mas também foi inspirado por suas impressões da Renânia. O próprio Schumann afirmou que sua jornada para Colônia e a visão da catedral foram sua principal inspiração para essa composição, que se tornou uma de suas obras mais famosas."
 elgar.530.g: "Foi uma boa ideia continuar construindo a catedral, não foi?"
 elgar.531.t: "A tentativa de suicídio de Schumann"
 elgar.531.d: "O compositor Robert Schumann foi resgatado do rio no último minuto hoje - ele aparentemente queria tirar a própria vida em confusão mental. Ainda não está completamente claro como lidar com ele."
 elgar.531.f: "Em 10 de fevereiro de 1854, o sofrimento psicológico de Schumann aumentou dramaticamente. Ele reclamou principalmente de 'problemas auditivos'. Tons, acordes, peças musicais inteiras se enfureceram na cabeça e o roubaram do sono. Enquanto isso, Schumann foi assistido dia e noite por sua esposa e filhos e já estava sob supervisão médica, mas ainda conseguiu deixar o apartamento em 27 de fevereiro de 1854 em um momento não observado. Ele foi para a ponte do pontão nas proximidades, subiu sobre a grade e, depois de jogar seu anel de casamento na água, se jogou no rio. Ele foi resgatado pelo mestre da ponte e outros homens desconhecidos, levados para casa e cuidados por um médico que foi convocado. Após sua tentativa de suicídio, ele desejava ser admitido na instituição para o tratamento e cuidados de pessoas mentais e insanas em Endenich, perto de Bonn, que foi inaugurado em 1844 pelo psiquiatra Franz Richarz."
 elgar.531.g: "Não há nada que possamos fazer."
 elgar.531.h: "Envie -o para o asilo mental moderno perto de Endenich."
 elgar.532.t: "A morte de Schumann"
 elgar.532.d: "Depois de vários anos de desarranjo mental, Robert Schumann, uma vez um talento musical promissor, morreu em um asilo mental, ignorado pelo mundo."
 elgar.532.f: "Brahms viu Schumann em 31 de março e 19 de agosto de 1854 sem poder falar com ele. Em 11 de janeiro, 23 de fevereiro e 2 de abril de 1855, no entanto, ambos conseguiram falar em detalhes. Schumann estava indo tão bem que conseguiu tocar música no piano quadrado com Brahms e acompanhá -lo parte do caminho até a estação de trem Bonn sob a supervisão de um guarda. Em 10 de abril de 1856, Brahms encontrou Schumann em uma condição precária. Schumann não podia mais falar de maneira inteligente. Em 1º de maio de 1856, foi mencionado pela última vez nos registros médicos que Schumann tocava piano. Na maioria das vezes, ele mal podia se expressar de maneira inteligível. O plano de Clara Schumann de abril de 1856 para levar Schumann para Düsseldorf e cuidar dele lá não foi realizado. A partir de meados de julho de 1856, Schumann comeu cada vez menos. Em 26 de julho de 1856, ele teve 'contimentos em vários músculos, o rosto e os membros'. Rales mucosos sugeriram pneumonia. Robert Schumann morreu em 29 de julho; Ninguém estava presente."
 elgar.533.t: "A recuperação milagrosa de Robert Schumann"
 elgar.533.d: "Aparentemente, os métodos modernos no sanatório de Endenich tiveram um efeito. Schumann está mostrando sinais de melhoria, embora seu retorno ao trabalho ainda leve alguns meses."
 elgar.533.f: "A recuperação milagrosa de Schumann começou depois que ele disse a Peters em setembro de 1854, pouco antes do 14º aniversário do casamento, que Düsseldorf havia desmoronado e Clara e as crianças estavam mortas. Para dissipar essa ilusão, Peters pediu a Clara Schumann uma carta ao marido. Isso levou à primeira troca de cartas desde a admissão. A partir de agora, Schumann novamente participou ativamente da vida fora da instituição. Ele também correspondeu com seus filhos, Johannes Brahms, Joseph Joachim e com os editores. Entre setembro de 1854 e maio de 1855, ele escreveu cerca de 25 cartas. Durante esse período, Schumann costumava expressar seu desejo de deixar Endenich novamente. Ele tocava piano de vez em quando. Ele estudou composições de Brahms. Em 11 de janeiro de 1855, ele fez sua primeira visita de Johannes Brahms. A partir de então, a condição de Schumann melhorou constantemente até que os médicos permitiram que Clara Schumann visitasse. Com seu apoio e o de Brahms, Schumann logo começou a compor novamente - e, assim, iniciou um processo de autocura."
 elgar.533.g: "Mas como isso é possível?"
 elgar.534.t: "Tango"
 elgar.534.d: "O intérprete de Tango, Carlos Gardel, gravou seu primeiro disco com Mi Noche Triste."
 elgar.534.f: "Carlos Gardel foi a figura mais proeminente da história do tango. Ele foi um dos intérpretes mais influentes da música popular mundial na primeira metade do século XX. Gardel é o cantor de tango popular mais famoso de todos os tempos e é reconhecido em todo o mundo. Ele criou o Tango-Canción em 1917 com sua versão de Pascual Contursi e Mi Noche Triste, de Samuel Castriota. Com 'Mi Noche Triste', ocorreu o nascimento do tango sentimental. Nostálgico, melodramático e triste, as novas letras e a música incorporaram Buenos Aires e seu povo."
 elgar.534.g: "O triunfo da música argentina."
 elgar.601.t: "A morte de [SCOPE.sCharacter('elgar_composer_scope').GetLastName]"
 elgar.601.d: "[SCOPE.sCharacter('elgar_composer_scope').GetFullName], uma das maiores mentes artísticas do nosso país e uma estrela brilhante no firmamento musical, morreu hoje. Ele deixa uma lacuna que dificilmente pode ser preenchida."
 elgar.601.g: "Um titã da história da música nos deixou."
 elgar.603.t: "Rossini deixa Bolonha"
 elgar.603.d: "Rossini decidiu deixar Bolonha. A notícia não apenas foi uma surpresa para os moradores da cidade, mas também entristecia o país inteiro."
 elgar.603.f: "Quando Gioacchino Rossini decidiu deixar Bolonha e, portanto, os estados papais, cerca de 20 anos se passaram desde sua aposentadoria da fase de ópera. No entanto, Rossini ainda era uma figura altamente respeitada e um dos compositores mais amados da Itália. Uma das principais razões pelas quais Rossini voltou para Paris - depois de um interlúdio em Florença - provavelmente não foi menos importante devido à sua saúde. Nos últimos anos como estrela da música européia, ele já havia se deteriorado física e mentalmente. Paris prometeu melhores perspectivas de assistência médica, e é por isso que Rossini pensou em gastar sua aposentadoria lá."
 elgar.603.g: "Mas ele não terminou seu tortellini!"
 elgar.609.d: "Franz Lachner anunciou sua aposentadoria do pódio do condutor hoje. Ele não vê mais um futuro para sua carreira."
 elgar.609.f: "Uma série de circunstâncias levou à partida prematura de Franz Lachner do mundo da música. O fator decisivo para isso foi a nova música de Richard Wagner e o triunfo de seus aliados. Lachner, que conhecia Schubert e Beethoven, não pôde seguir esse desenvolvimento e não queria. Semelhante a Rossini, que entendeu que ele era visto como uma relíquia de outras vezes, enquanto o mundo seguia em frente, Lachner se retirou, principalmente por causa do ridículo e da malícia dos críticos leais a Wagner."
 elgar.609.g: "Uma perda para [GetPlayer.GetName]."
 elgar.613.f: "Gaetano Donizetti faleceu pacificamente nesta manhã, depois de uma vida longa e gratificante nos braços de sua segunda esposa e cercada por seus filhos. Uma procissão fúnebre com várias bandas, centenas de portadores de tocha e milhares de espectadores marca a despedida de um homem que se diz ter vivido uma vida perfeita."
 elgar.614.f: "Em 1867, Berlioz recebeu a notícia de que seu filho havia morrido em Havana de febre amarela. MacDonald sugere que Berlioz pode ter procurado distração de sua dor, avançando com uma série planejada de shows em São Petersburgo e Moscou, mas longe de rejuvenescer -o, a viagem apoiou sua força restante.  Ele foi bom para se recuperar no clima do Mediterrâneo, mas caiu em rochas à costa, possivelmente por causa de um derrame, e teve que voltar a Paris, onde ele condenou por vários meses. Em agosto de 1868, ele se sentiu capaz de viajar brevemente para Grenoble para julgar um festival coral.  Depois de voltar a Paris, ele gradualmente ficou mais fraco e morreu em sua casa na Rue de Calais em 8 de março de 1869, aos 65 anos. Ele foi enterrado no cemitério de Montmartre com suas duas esposas, que foram exumadas e re-superadas ao lado dele."
 elgar.615.f: "Após o casamento fracassado com Carolyne Zu Sayn-Wittgenstein, Liszt se dedicou cada vez mais a composições com temas religiosos. Em Roma, onde ele ficou principalmente até 1870, ele liderou uma parte mundana, parte da vida monástica e se retirou para um mosteiro no verão de 1863, onde o Papa Pio IX também o visitou. Em 1865, Liszt passou por tonsura e recebeu as quatro ordens menores. A partir de então, como clérigo, ele usava o colarinho romano e foi abordado como um abade. Em 1886, Liszt participou do Wagner Festival. Na época da viagem, Liszt já estava gravemente doente e morreu alguns dias após sua chegada em 31 de julho de 1886 como resultado de pneumonia. Bernhard Schnappauf, médico e amigo de Richard Wagner, passou os últimos dias em seu leito de morte e relatou que Liszt morreu em silêncio e com dignidade. Ele fechou os olhos e fez a máscara da morte, pela qual, de acordo com o antigo costume, ele tinha direito à mortalha e à fronha."
 elgar.616.f: "Em 16 de setembro de 1882, Wagner viajou com sua família para Veneza, onde passou várias semanas com Franz Liszt. Em 25 de dezembro, como presente de aniversário para Cosima, ele fez um concerto conjunto pela última vez no Teatro La Fenice; Ele conduziu sua sinfonia juvenil em C Major. Em 13 de fevereiro de 1883, ele ficou na ala lateral do Palazzo Vendramin-Calergi em que ele e sua família moravam. Por volta das 15h, a família esperou à mesa por Wagner, que, apesar de ter um ataque cardíaco, estava em seu estudo escrevendo um ensaio sobre o feminino no humano. A empregada o encontrou caído em sua mesa sobre as palavras ', no entanto, o processo de emancipação da mulher prossegue apenas com convulsões extáticas. Amor - tragédia '. Ele disse: 'Minha esposa e o médico' antes de cair inconscientes e morrer nos braços de Cosima por volta das 15h30."
 elgar.617.f: "Edvard Grieg morreu no Hospital Municipal de Bergen, na Noruega, em 4 de setembro de 1907 aos 64 anos de insuficiência cardíaca. Ele sofreu um longo período de doença. Suas últimas palavras foram: 'Bem, se deve ser assim'. O funeral atraiu entre 30.000 e 40.000 pessoas para as ruas de sua cidade natal para homenageá -lo. Obedecendo ao seu desejo, sua própria marcha funerária em memória de Rikard Nordraak foi interpretada com a orquestração por seu amigo Johan Halvorsen, que se casou com a sobrinha de Grieg. Além disso, foi tocado o movimento de março fúnebre do piano Sonata No. 2 de Chopin. Grieg foi cremado no primeiro crematório norueguês abriu em Bergen apenas naquele ano, e suas cinzas foram sepultadas em uma cripta da montanha perto de sua casa, Troldhaugen. Após a morte de sua esposa, suas cinzas foram colocadas ao lado dele."
 elgar.618.f: "Brahms morreu em 3 de abril de 1897 no início da manhã aos 63 anos em seu apartamento em Karlsgasse 4, onde morava desde 1872 - de acordo com algumas biografias de câncer de fígado, de acordo com informações mais recentes do carcinoma pancreático. Sua última aparição pública foi em 7 de março de 1897, quando viu Hans Richter conduzir sua sinfonia nº 4; Houve uma ovação após cada um dos quatro movimentos. Depois de ser demitido na casa de luto, onde Carl Kundmann removeu sua máscara de morte e Ludwig Michalek fez uma última foto pastel, a consagração ocorreu em 6 de abril na Igreja da Cidade Luterana."
 elgar.619.f: "'Manhã e Viena. Um caos. Você se apega a detalhes que ninguém ainda pode saber. Ele deve ser enterrado no pequeno cemitério em sorrindo, ao lado de sua filha. O cadáver é trazido. Na outra manhã. A estrada 'An Den Langen Lüssen' lidera em todo o país a árvores de cipreste. A capela é um espaço pequeno, apenas para o caixão e algumas grinaldas. Os outros alinham os caminhos para o túmulo. Uma mulher vem e diz para outra: 'Agora ele está em paz por dentro. Tudo era pequeno demais para ele. ' A igreja em sorrindo é pequena, o cemitério estreito. E um espetáculo para os vienenses é iminente. A igreja e o cemitério serão isolados. Somente cartões darão acesso. Aprendemos que Franz Schalk, Gregor e o Conselho de Administração solicitaram que a ópera fosse fechada no dia do funeral. Nenhuma palavra sobre isso. O tribunal, o município de Viena, não se move. E então a celebração. Estamos em frente à igreja quando o caixão é realizado. Está chovendo. Chegamos ao túmulo mais rapidamente por meio de um caminho de vinha. A procissão chega. A chuva para. A Nightingale canta, os clodes caem. Um arco -íris. E as centenas estão em silêncio. - Paul Stefan"
 elgar.701.g: "Essa foi uma performance maravilhosa."
 elgar.701.h: "Contrate este homem brilhante!"
 elgar.706.g: "Aos 20 anos, ele não é um pouco jovem demais para um trabalho como este?"
 elgar.701.t: "Grande Symphonie Funèbre et Triomphale"
 elgar.701.d: "Para marcar o décimo aniversário da Revolução de julho, Hector Berlioz compôs uma peça que atraiu grande admiração pública."
 elgar.701.f: "O governo francês encomendou a sinfonia para as celebrações que marcam o décimo aniversário da Revolução de julho, que trouxeram o poder de Louis-Philippe, para o qual estava erguendo a coluna de julho no local de Bastille. Berlioz tinha pouca simpatia pelo régime, mas recebeu a oportunidade de escrever o trabalho porque o governo lhe ofereceu 10.000 francos para isso. O Militaire Symphonie (mais tarde renomeado Symphonie Funèbre et Triomphale), em vez de seguir o modelo que Berlioz havia estabelecido em Romeu e Julieta, representa uma reversão a um estilo anterior pré-foretão na tradição da música cerimonial pública francesa monumental. Berlioz revisou o placar em janeiro de 1842, adicionando uma parte opcional para strings e um coro final a um texto de Antony Deschamps. Richard Wagner participou de uma apresentação desta nova versão no Salle Vivienne em 1 de fevereiro de 1842. Em 5 de fevereiro, ele disse a Robert Schumann que encontrou passagens no último movimento da sinfonia de Berlioz tão magnífica e sublime que nunca podem ser superadas \"."
 elgar.702.t: "Liszt em Weimar"
 elgar.702.d: "Depois de muitos anos de passeios de concerto, o virtuoso e o compositor Franz Liszt está pensando em se estabelecer em Weimar."
 elgar.702.f: "Os anos de Weimar foram o período mais produtivo de Franz Liszt. Ele escreveu muitas de suas obras de piano em Weimar, como o piano sonata em B menor, as harmonias poétiques etc. Dois de seus concertos de piano anteriormente concebidos também receberam sua forma final aqui. Em Weimar, Liszt conduziu muitas obras de compositores contemporâneos, alguns dos quais eram controversos na época e também realizavam suas óperas. Ele conduziu obras de Richard Wagner, que estava particularmente próximo a ele e a quem ele ajudou a fugir para Zurique na primavera de 1849, após a revolta de Dresden. Nos anos que se seguiram, ele apoiou Wagner financeiramente e moralmente e manteve uma correspondência animada com ele. Mais tarde, Liszt e Wagner frequentemente apareciam juntos como condutores. A partir de 1865, depois que Wagner teve um relacionamento com a filha de Liszt, Cosima, o relacionamento se esfriou por um longo tempo."
 elgar.703.t: "Rienzi"
 elgar.703.d: "Um jovem compositor impressionou o público em Dresden e artistas internacionais com sua ópera 'Rienzi'. Seu nome é Richard Wagner."
 elgar.703.f: "'No subsequent experience has given me feelings even remotely similar to those I had on this day of the first performance of Rienzi. The only too well-founded anxiety as to their success has so dominated my feelings at all subsequent first performances of my works that I could never really enjoy them or take much notice of the way the audience was behaving. (...) The initial success of Rienzi was no doubt assured beforehand. But the uproarious way in which the public declared its partiality for me was extraordinary ... The public had been forcibly predisposed to accept it, because everyone connected with the theatre had been spreading such favourable reports ... that the entire population was looking forward to what was heralded as a miracle ... In trying to recall my condition that evening, I can remember it only as possessing all the features of a dream.' - Richard Wagner"
 elgar.704.t: "Concerto para piano em um menor"
 elgar.704.d: "Um concerto para piano de Edvard Grieg comemorou sua estréia mundial hoje em Copenhague. Já é previsível que esta seja uma de suas peças mais populares."
 elgar.704.f: "O concerto para piano em um menor, op. 16, composto por Edvard Grieg em 1868, foi o único concerto Grieg concluído. O trabalho está entre os primeiros trabalhos importantes de Grieg, escritos pelo compositor de 24 anos em 1868 em Søllerød, Dinamarca, durante uma de suas visitas lá para se beneficiar do clima. O Concerto de Grieg fornece evidências de seu interesse na música folclórica norueguesa; O floreio de abertura é baseado no motivo de um segundo menor em queda, seguido por um terço principal em queda, o que é típico da música folclórica do país natal de Grieg. O trabalho foi estreado por Edmund Neupert em 3 de abril de 1869, em Copenhague, com a condução de Holger Simon Paulli. Algumas fontes dizem que o próprio Grieg, um excelente pianista, era o solista pretendido, mas ele não conseguiu comparecer à estréia devido a compromissos com uma orquestra em Christiania (agora Oslo). Entre os que compareceram à estréia estavam o compositor dinamarquês Niels Gade e o pianista russo Anton Rubinstein, que forneceu seu piano para a ocasião. Grieg revisou o trabalho pelo menos sete vezes, geralmente de maneiras sutis, mas as revisões totalizaram mais de 300 diferenças em relação à orquestração original."
 elgar.705.t: "Variações de um tema de Haydn"
 elgar.705.d: "O compositor Johannes Brahms realizou uma nova obra -prima hoje, mas ao mesmo tempo está considerando assumir um compromisso permanente com Viena."
 elgar.705.f: "As variações de um tema de Haydn Op. 56a é um trabalho de variação para a orquestra de Johannes Brahms. O trabalho foi criado no verão de 1873 em Tutzing. A estréia ocorreu em 2 de novembro de 1873 em Viena, sob a direção de Brahms. A peça se enquadra em uma época na qual Brahms queria comemorar sua estadia em Viena. Por um lado, ele deixou Detmold e Hamburgo decepcionados anos atrás. Por outro lado, ele se esforçou para viver onde seus grandes modelos clássicos haviam vivido e para continuar a tradição vienense."
 elgar.706.t: "A primeira aparição de Mahler"
 elgar.706.d: "No Bad Hall, o jovem e talentoso maestro Gustav Mahler assumiu a posição de Kapellmeister pela primeira vez. Nos anos seguintes, ele escalava a carreira para a ópera estadual de Viena"
 elgar.706.f: "'And there he was in person in the theater office when I came out from my first visit to Pollini: pale, thin, small in stature, long face, the steep forehead framed by deep black hair, important eyes behind glasses, furrows of suffering and of humor in his countenance, which, while speaking to another, showed the most amazing change of expression, just as interesting, demonic, intimidating incarnation of Kapellmeister Kreisler as the youthful reader of E.T.A. Hoffmann's fantasies could imagine; he kindly asked me about my musical ability and knowledge - to which I replied, to his evident satisfaction with a mixture of shyness and self-confidence - and left me in a sort of dazed and shaken state. (...) Mahler appeared to me in face and demeanor as genius and demon (...)' - Bruno Walter"
 elgar.707.t: "Concerto para piano No. 2"
 elgar.707.d: "Depois de muitos contratempos, o compositor Sergei Rachmaninoff fez um retorno impressionante: seu segundo concerto de piano causou aplausos frenéticos."
 elgar.707.f: "Após a desastrosa estréia de 1897 de sua primeira sinfonia, Rachmaninoff sofreu um colapso psicológico que impediu a composição por três anos. Embora a depressão tenha ministrado sua energia, ele ainda se envolveu em desempenho. As aulas de condução e piano tornaram -se necessárias para facilitar sua posição financeira. Em 1899, ele deveria realizar o segundo concerto de piano em Londres, que ainda não havia compôs devido a uma doença e, em vez disso, fez uma estréia bem -sucedida. Os parentes decidiram apresentá -lo ao neurologista Nikolai Dahl, a quem ele visitou diariamente de janeiro a abril de 1900, o que ajudou a restaurar sua saúde e confiança na composição. Rachmaninoff dedicou o concerto a Dahl por tratá -lo com sucesso. Depois de cumprir seu envolvimento de 1908 em Londres no The Queen's Hall, sob Serge Koussevitzky, uma revisão lisonjeira do The Times emergiu: 'A expressão direta do trabalho, a extraordinária precisão e exatidão da jogada de Rachmaninoff e até a rigorosa economia de movimentos e mãos que ele se exercita, todos contribuíram para a impressão da linha de desempenho."
 elgar.708.t: "Sinfonia nº 1 'clássico'"
 elgar.708.d: "Com sua primeira sinfonia, Sergei Prokofiev mais uma vez recomendou-se como compositor. Por outro lado, leva o jovem artista ao mundo a ser melhor pago."
 elgar.708.f: "'O ensaio da sinfonia clássica com a orquestra do estado, eu a conduzi, improvisando completamente, tendo esquecido a pontuação e nunca tendo estudado de uma perspectiva condutora. Eu pensei que poderia ser um desastre completo, mas nada aconteceu e, de qualquer forma, as partes têm tantos erros nelas que a sessão se transformou principalmente em uma para fazer correções. Em Kislovodsk, eu tinha preocupado que haveria algum antagonismo de uma 'orquestra revolucionária' tocando meus novos trabalhos, mas o oposto era o caso: a orquestra do estado, infundida com muito sangue jovem, era flexível e atencioso e tocou a sinfonia com prazer evidente. ' - Sergei Prokofiev"
 elgar.709.t: "Romeu e Julieta"
 elgar.709.d: "Pyotr Tchaikovsky, um aspirante a jovem compositor, apresentou sua abertura Romeu e Julieta. O público recebeu o trabalho com sentimentos contraditórios."
 elgar.709.f: "Não apenas no começo, mas ao longo de toda a sua carreira, Tchaikovsky teve que se afirmar contra críticos e concorrentes. O Overture Romeo e Julieta, por exemplo, pretendiam ser um fracasso quando foi publicado. Por outro lado, essa crítica, que Tchaikovsky recebeu repetidamente ao longo de sua vida, levou o compositor a editar supercriticamente essas e outras obras; Tchaikovsky permaneceu um dos maiores críticos de seu próprio trabalho ao longo de sua carreira. Também não ficou sem ironia que os compositores nacionais de mente russa elogiaram precisamente esse trabalho, apesar de mais tarde estarem entre os críticos mais severos de Tchaikovsky. No entanto, Tchaikovsky se tornaria um dos compositores russos mais importantes desse período no último e, em apenas alguns anos, para alcançar a fama internacional que quase nenhum outro músico do século alcançou."
 elgar.710.t: "Viva Verdi"
 elgar.710.d: "Com a criação do estado nacional italiano e a adição da cidade de Opera de Milão ao nosso território, temos a oportunidade única de envolver uma das figuras mais importantes da história musical italiana: Giuseppe Verdi."
 elgar.710.f: "Giuseppe Verdi era um compositor e político italiano, universalmente reconhecido como um dos maiores artistas de ópera e compositores de todos os tempos, juntamente com outros protagonistas do teatro musical italiano do século XIX: Gioachino Rossini, Vincenzo Bellini e Gaetano Donizetti. Ele simpatizou com o movimento de Risorgimento, que buscou a unificação da Itália e participou ativamente por um curto período de tempo na vida política; Ao longo de sua longa existência, ele estabeleceu uma posição única entre seus compatriotas, tornando -se um profundo símbolo artístico da unidade do país. Foi por esse motivo que um mês após sua morte, uma procissão solene e interminável atravessou Milão, acompanhando seus restos mortais com as notas de 'VA, Pensiero' de Nabucco, escrito por ele 60 anos antes, expressando efetivamente os sentimentos dos italianos em relação ao seu herói desaparecido. Isso demonstrou até que ponto a música de Verdi foi assimilada na consciência nacional. Seus trabalhos ainda permanecem entre os mais conhecidos e realizados nos teatros em todo o mundo, em particular Aida (1871), o mencionado Nabucco (1842) e a chamada 'Verdi Triad': Rigoletto (1851), Il Trovatore (1853) e La Traviata (1853)."
 elgar.711.t: "Sinfonia da primavera"
 elgar.711.d: "A primeira sinfonia de Robert Schumann foi realizada hoje sob a direção de Felix Mendelssohn Bartholdy. Schumann é casado com o importante pianista Clara (née Wieck) e até agora atraiu a atenção mais como crítica de música do que como compositor. As opiniões diferem sobre suas peças para piano."
 elgar.711.f: "Com exceção de Franz Schubert, nenhum compositor de língua alemã foi tão mal julgada durante sua vida como Robert Schumann. Enquanto a importância de Schubert só foi reconhecida após sua morte precoce, Schumann foi acusado de começar como um gênio e terminando como talento. Os contemporâneos geralmente não tinham acesso ao seu trabalho ou simplesmente não entendiam suas obras. Suas peças de piano, que compõem parte de sua fama hoje, eram principalmente desconhecidas na época. Os zombadores só o viram como o homem ao lado da pianista Clara Schumann. Em sua Saxônia natal, ele ficou à sombra de Mendelssohn. Wagner mais tarde se opôs a ele, enquanto Brahms se tornou um confidente próximo de Clara e Robert. Liszt viu Schumann como pioneiro no progresso musical na Alemanha, mas não teve sucesso com o público quando incluiu as obras de Schumann em seu repertório. As esperanças de uma posição permanente em uma importante instituição musical foram repetidamente frustradas. Semelhante a Schubert, Schumann também conheceu uma extremidade prematura e trágica."
 elgar.712.t: "Rei Olaf"
 elgar.712.d: "Edward Elgar se distinguiu nos últimos anos com suas cantatas e obras corais. 'Cenas da saga do rei Olaf', seu trabalho mais recente, foram bem recebidas pelo público."
 elgar.712.f: "Na década de 1890, Edward Elgar construiu uma reputação crescente como um grande compositor britânico. Inicialmente, fortemente influenciado pela influência continental - 'King Olaf' também mostra ecos do estilo Wganer - ele gradualmente encontrou sua própria linguagem de som, o que incentivaria os compositores britânicos posteriores a seguirem caminhos completamente novos. Elgar se sentiu por ser um estranho, não apenas musicalmente, mas socialmente. Nos círculos musicais dominados pelos acadêmicos, ele era um compositor autodidata; Na Grã -Bretanha protestante, seu catolicismo romano era considerado com suspeita em alguns trimestres; E na sociedade consciente da classe da Grã-Bretanha vitoriana e eduardiana, ele era extremamente sensível a suas origens humildes, mesmo depois de alcançar o reconhecimento. No entanto, Elgar pode ser considerado o compositor britânico mais importante desde Henry Purcell."
 elgar.713.t: "Diretor musical Hofball"
 elgar.713.d: "O cargo de diretor musical de Hofball está aberto há anos. Uma posição de prestígio que realmente deveria ir ao compositor Johann Strauss. Ele já havia sido negado essa honra por razões políticas. Agora há vozes crescentes para oferecer a posição ao filho do compositor que morreu cedo."
 elgar.713.f: "Johann Strauss era um mestre e compositor austríaco-alemão e foi reconhecido internacionalmente como o 'Waltz King'. Ele já havia compôs sua primeira valsa aos seis anos de idade e havia feito secretamente aulas de violino porque seu pai havia planejado uma carreira como funcionário público. Como o último havia quebrado com a família, sua mãe apoiou seu treinamento musical contra sua vontade. Sua primeira aparição no Dommayer do Casino, um local de entretenimento conhecido em toda a região, foi um enorme sucesso. Tours inicialmente o levou pela monarquia do Danúbio com sua própria orquestra (que aumentou sua rivalidade com seu pai). Após a morte de seu pai, ele assumiu sua orquestra e a fundiu com a dele. Como ele compôs alguns trabalhos para os revolucionários de 1848 e, portanto, mostrou simpatia pelo movimento insurrecional, ele atraiu a atenção das autoridades de censura e caiu em desuso no tribunal, apesar de sua popularidade. Como resultado, ele foi negado o cargo de diretor de música da bola da corte até 1863."
 elgar.713.g: "Ele perdeu sua chance, mas é bem -vindo a compor."
 elgar.713.h: "Dê ao rei da valsa o lugar que ele merece!"
 elgar.714.t: "Vencedor do prêmio estadual por composição"
 elgar.714.d: "O vencedor do Prêmio Estadual de Composição deste ano é um talento tcheco excepcional. Seu nome é Antonín Dvořák."
 elgar.714.f: "Antonín Dvořák era um compositor tcheco, que freqüentemente empregava ritmos e outros aspectos da música folclórica da Morávia e de sua nativa Bohemia. Dvořák exibiu seus presentes musicais em tenra idade, sendo um estudante de violino adequado dos seis anos. Em 1874, ele fez uma apresentação ao Prêmio Estado austríaco por composição, incluindo dezenas de duas sinfonias e outras obras. Embora Dvořák não estivesse ciente disso, Johannes Brahms era o principal membro do júri e ficou muito impressionado. O prêmio foi concedido a Dvořák em 1874 e novamente em 1876 e em 1877, quando Brahms e o proeminente crítico Eduard Hanslick, também um membro do júri, lhe foram conhecidos. Brahms recomendou DVořák para sua editora, Simrock."
 elgar.714.g: "Um troféu bem merecido."
 elgar.714.h: "Não devemos perder esse talento."
 elgar.715.t: "O compositor boêmio"
 elgar.715.d: "Claude Debussy começou como vencedor do Prix de Roma, mas até agora fez pouco com seu talento certificado, além de escrever pequenas peças de piano provocador. O que acontecerá com este boêmio?"
 elgar.715.f: "Mesmo no conservatório, as avaliações do talento de Claude Debussy variaram amplamente. Alguns o elogiaram como pianista e tinham grandes esperanças para ele. Outros o descreveram como descuidado. Durante esse período, ele já era pianista na casa de Nadezhda von Meck, o patrono de Tchaikovsky. Em 1884, Debussy venceu o Prêmio de Roma, mas não foi ambicioso durante sua estadia em Roma. Ele achou a ópera italiana chata e tinha pouco uso para o estilo predominante de Giuseppe Verdi. Ele viajou de volta a Paris cedo e viveu uma vida instável lá: 'Tenho certeza de que o instituto não aprovaria, pois, naturalmente, considera o caminho que ordena como o único certo. Mas não há ajuda para isso! Estou muito apaixonado pela minha liberdade, muito gosta de minhas próprias idéias!"
 elgar.715.g: "Boa música de piano, mas temos vagabundos musicais suficientes."
 elgar.1011.t: "Don Pasquale"
 elgar.1011.d: "Um ótimo compositor acaba de completar uma obra -prima musical!"
 elgar.1011.f: "Don Pasquale é uma ópera buffa em três atos. A ópera é uma das mais famosas de seu gênero e, juntamente com L'Alisir d'Amore e Lucia di Lammermoor, é uma das poucas obras de Donizetti que tem uma tradição quase contínua de desempenho desde o século XIX. Com base nas comédias de Carlo Goldoni, os personagens são mais ou menos de perto nos tipos de Commedia dell'arte, mas recebem características sentimentais, i. H. Através da capacidade de sentir e expressar tristeza, dor ou remorso, uma diferenciação que vai além do seu tipo. Don Pasquale foi um sucesso instantâneo, como apenas o I Puritani (1835) de Bellini havia tido anteriormente em Paris."
 elgar.1011.g: "Bravissimo!"
 elgar.1012.t: "Dom Sébastien"
 elgar.1012.f: "Dom Sébastien é uma grande ópera francesa em cinco atos de Gaetano Donizetti.  É uma ficção histórica sobre o rei Sebastian de Portugal (1554-1578) e sua infeliz expedição de 1578 para Marrocos. Na época, Donizetti estava tentando compor uma ópera competitiva com óperas históricas semelhantes de Daniel Auber, Fromental Halévy e Giacomo Meyerbeer. Uma descrição crítica da natureza de Dom Sébastien é \"um funeral em cinco atos\". O trabalho foi recebido com relutância, que o próprio Donizetti sentiu ser um fiasco. Embora Donizetti tenha considerado sua última ópera como uma de suas obras mais importantes, Dom Sébastien é amplamente esquecido hoje. Foi escrito em um momento em que Donizetti 'não tinha mais controle irrestrito sobre sua imaginação', então a ópera já estava marcada pela doença incipiente de Donizetti."
 elgar.1021.t: "Les Troyens"
 elgar.1021.f: "Les Troyens é uma grande ópera francesa em cinco atos de Hector Berlioz. O libreto foi escrito pelo próprio Berlioz do poema épico de Virgil, o Aeneid; A pontuação foi composta entre 1856 e 1858. Les Troyens é o trabalho mais ambicioso de Berlioz, o somatório de toda a sua carreira artística, mas ele não viveu para vê -lo realizado na íntegra. Sob o título Les Troyens à Cartago, os últimos três atos foram estreou com muitos cortes da companhia de Léon Carvalho, The Théâtre Lyrique, em seu teatro (agora o Théâtre de la Ville) no Place du Châtelet em Paris em 4 de novembro de 1863, com 21 apresentações repetidas. Após décadas de negligência, hoje a ópera é considerada por alguns críticos da música como um dos melhores já escritos."
 elgar.1022.t: "La Damnation de Faust"
 elgar.1022.f: "La Damnation de Faust é um trabalho para quatro vozes solo, coro completo de sete partes, coro e orquestra infantis grandes do compositor francês Hector Berlioz. Ele chamou de \"dramatique de Légende\" (lenda dramática). O compositor francês foi inspirado por uma tradução do poema dramático de Goethe e produziu um trabalho musical que, como a obra -prima na qual se baseia, desafia a categorização fácil. Concebido em vários momentos como um oratório de forma livre e, como ópera, sua forma de diário de viagem e perspectiva cósmica o tornaram um desafio extremo para sentar como ópera. O próprio Berlioz estava ansioso para ver o trabalho encenado, mas uma vez que o fez, ele admitiu que as técnicas de produção de seu tempo não estavam à altura de levar o trabalho à vida dramática. A maior parte da fama do trabalho passou por apresentações de shows."
 elgar.1023.t: "Tratado sobre instrumentação"
 elgar.1023.f: "'This Traité d'Instrumentation is a highly paradoxical work. It begins with a preface of several lines unrelated to the subject, in which the author takes a stand against musicians who abuse modulations and whose penchant for dissonance matches the taste that certain animals have for salty plants and thorny bushes. Then he turns to the orchestral instruments and mixes strange assertions with the most solid truths and valuable advice.(...) In his treatise, as in his orchestration, Berlioz, for all its oddities, is simply fabulous. To him my generation owes its education, and I dare say a good one. Berlioz possessed the invaluable gift of igniting the imagination and arousing love for the art he taught.(...) These seemingly superfluous musical examples made one dream, they opened the door to a new world, to a vast one and fascinating glimpse of the future, of the Promised Land.' - Camille Saint-Saëns"
 elgar.1031.t: "Les Préludes"
 elgar.1031.f: "Les Préludes é o terceiro dos treze poemas sinfônicos de Franz Liszt. A música foi composta entre 1845-54 e começou como uma abertura para o ciclo coral de Liszt, Les Quatre Élémens (os quatro elementos), depois revisado como uma abertura de concerto independente, com um novo título referente a um poema de Alphone de Lamartine. Les Préludes é o exemplo mais antigo de uma obra orquestral intitulada 'Poema Sinfônico'. Liszt vê as fases da vida como prelúdios da melodia da morte. Essas fases da vida são lutas e tempestades, amam felicidade e dor, consolo, experimentando a natureza. Apesar dos contrastes nesses humores refletidos em Les Préludes, o trabalho é de grande coerência. Começa com uma melodia melancólica, a partir da qual o primeiro tema principal tempestuoso se desenvolve, o que leva ao segundo tema através de uma parte pastoral. Esses dois temas são desenvolvidos em humor deslumbrantemente em mudança. Em um clímax, o tema original flui para o primeiro tema principal como uma fanfarra majestosa e glamourosa."
 elgar.1032.t: "Rhapsodies húngaros"
 elgar.1032.f: "O Rhapsodies húngaros é um conjunto de 19 peças de piano baseadas em temas folclóricos húngaros, compostos por Franz Liszt durante 1846-1853, e mais tarde em 1882 e 1885. Liszt também organizou versões para orquestra, piano dueto e piano. Alguns são mais conhecidos do que outros, com o Rhapsody Hungary No. 2 sendo particularmente famoso e o número 6, nº 10, nº 12 e nº 14 (especialmente como arranjado para piano e orquestra como fantasia húngara) também sendo bem conhecidos. Liszt incorporou muitos temas que ouvira em sua Hungria, o oeste da Hungria e que ele acreditava ser música folclórica, embora muitos fossem de fato músicas escritas por membros da classe média alta húngara ou por compositores como József Kossovits. Na forma original do piano, os rapsódios húngaros são observados por sua dificuldade."
 elgar.1033.t: "Dante Symphony"
 elgar.1033.f: "A 'Dante Symphony' é uma sinfonia coral composta por Franz Liszt. Escrito no alto estilo romântico, é baseado na jornada de Dante Alighieri pelo inferno e pelo purgatório, como retratado na comédia divina. Alguns críticos argumentaram que a Sinfonia de Dante não é tanto uma sinfonia no sentido clássico, mas é dois poemas sinfônicos descritivos. A intenção original de Liszt era compor o trabalho em três movimentos: um inferno, um purgatorio e um paradiso. Os dois primeiros deveriam ser puramente instrumentais e o final coral. Wagner, no entanto, convenceu Liszt de que nenhum compositor terrestre poderia expressar fielmente as alegrias do paraíso. Liszt deixou cair o terceiro movimento, mas acrescentou um magnífico coral no final do segundo movimento. O estudioso de Liszt, Humphrey Searle, argumenta que, embora Liszt possa ter se sentido mais em casa retratando as regiões infernais do que as celestes, a tarefa de retratar o paraíso na música não estaria além de seus poderes."
 elgar.1041.t: "Die meistersinger von nürnberg"
 elgar.1041.f: "'Die Meistersinger von Nürnberg' é um drama musical, ou ópera, em três atos, de Richard Wagner. É a ópera mais longa comumente realizada, levando quase quatro horas e meia, sem contar dois intervalos entre os atos, e tradicionalmente não é cortada. O Meistersinger de Nuremberg ocupa um lugar único na obra de Wagner. É a única comédia entre suas óperas maduras e também é incomum entre seus trabalhos em ser ambientado em um tempo e local historicamente bem definidos, e não em um ambiente mítico ou lendário. É a única ópera de Wagner madura baseada em uma história totalmente original. Ele incorpora muitas das convenções operísticas que Wagner havia criticado em seus ensaios sobre a teoria da ópera: verso rimado, árias, coros, um quinteto e até um balé."
 elgar.1042.t: "Die Walküre"
 elgar.1042.f: "'Die Walküre' se forma junto com as óperas 'Das Rheingold', 'Siegfried' e 'Götterdämmerung' The Complete Work 'Der Ring des Nibelungen'. Wagner seguiu amplamente os princípios relacionados à forma de drama musical, refletindo os sentimentos e o humor por trás do trabalho, usando um sistema de leitmotifs recorrentes para representar pessoas, idéias e situações, em vez das unidades operísticas convencionais de árias, conjuntos e coros. A história de Die Walküre é baseada na mitologia nórdica contada na saga de Völsunga e na Edda poética."
 elgar.1043.t: "Parsifal"
 elgar.1043.f: "A parsifal de Richard Wagner contém elementos religiosos como a música sagrada, a inauguração do monstruosas (Graal), o batismo e o ritual da Comunhão Cristã. Já em seus escritos de arte em Zurique, ele desenvolveu a idéia de usar arte para esclarecer o núcleo da religião. Wagner explicou que, a fim de transformar sua mensagem parável de salvação e regeneração da humanidade através da compaixão - representada pela parsifal busca e pelos omfortas que sofrem - ele escolheu uma forma de arte que, com simbolismo religioso, pretendia ter um 'efeito arrebatador na mente'. O próprio Wagner descreveu a peça de três atos como uma peça do Festival de Consagração de Palco e decretou que ela só deveria ser realizada no Bayreuth Festspielhaus."
 elgar.1051.t: "Gynt de pares"
 elgar.1051.f: "Gynt de pares, op. 23, é a música incidental da peça de Henrik Ibsen em 1867 de mesmo nome, escrita pelo compositor norueguês Edvard Grieg. Embora compondo muitas peças de piano curtas e obras de câmara, o trabalho que Grieg fez para Henrik Ibsen se destacou. Originalmente compondo 90 minutos de música orquestral para a peça, ele mais tarde voltou e extraiu certas seções para as suítes. As viagens de Peer Gynt ao redor do mundo e as terras distantes são representadas pelos instrumentos que Grieg escolhe usar. Mais tarde, Grieg criou duas suítes de sua música de gynt de pares. Algumas das músicas dessas suítes receberam cobertura na cultura popular, especialmente as peças 'Morning Homem', 'no salão do rei da montanha' e 'Solveig's Song'."
 elgar.1052.t: "Peças de letra"
 elgar.1052.f: "Lyric Piece é uma coleção de 66 peças curtas para piano solo escrito por Edvard Grieg. Eles foram publicados em 10 volumes, de 1867 a 1901. A coleção inclui várias de suas peças mais conhecidas, como o dia do casamento em Troldhaugen, para a primavera, marcha dos trolls e borboletas. O tema da primeira peça do set, Arietta, foi uma das melodias favoritas do compositor. Nas palavras do pianista Andrei Gavrilow, as peças da letra são \"um tipo muito especial de diário que Grieg manteve ao longo de sua vida, ou uma confissão, porque refletem os momentos mais íntimos da vida do compositor\"."
 elgar.1053.t: "Dança norueguesa"
 elgar.1053.f: "As danças norueguesas foram a resposta do norueguês às danças eslavônicas de grande sucesso de Antonín Dvořák e às danças húngaras de Johannes Brahms. Os dois colegas publicaram sua série de dança para o Piano Four Hands em 1878 e 1881 pela Simrock Publishing House. Naquela época, Grieg não se atreveu a orquestrar suas danças, já que o terreno era ocupado por 'Rapsodies norueguês' de seu amigo Johan Svendsen. A versão orquestral de suas danças norueguesas foi, portanto, organizada por Robert Henriques - muito para a satisfação de Grieg. Para a primeira dança, Grieg usou a popular Marcha de Sinklar, para os três últimos \"corredores\", as danças de noivas noruegas tradicionais para homens jovens, que são rápidos e muito acrobáticos de se apresentar."
 elgar.1061.t: "Deutsches Requiem"
 elgar.1061.f: "'Há pouco a dizer aqui, mas ainda tenho que lhe dizer que estou completamente cheio do seu requiem, é uma peça muito poderosa, agarra a pessoa inteira de uma maneira como poucas outras coisas. A profunda seriedade, combinada com toda a magia da poesia, tem um efeito maravilhoso, chocante e suave. Como você sabe, eu nunca posso realmente colocar em palavras, mas sinto todo o tesouro rico deste trabalho até o núcleo, e o entusiasmo que fala de cada peça me move profundamente, e é por isso que não posso ajudar a pronunciar ... oh, se eu pudesse ouvir, o que eu daria para isso. ' - Clara Schuman"
 elgar.1062.t: "Dança húngara"
 elgar.1062.f: "As danças húngaras de Johannes Brahms são um conjunto de 21 músicas animadas de dança baseadas principalmente em temas húngaros, concluídos em 1879. Eles variam de cerca de um minuto a cinco minutos. Eles estão entre os trabalhos mais populares de Brahms e foram os mais lucrativos para ele. Cada dança foi organizada para uma ampla variedade de instrumentos e conjuntos. Brahms originalmente escreveu a versão para o piano quatro mãos e depois organizou as dez primeiras danças para piano solo. O violinista Joseph Joachim, que era amigo de Brahms, criou um arranjo virtuoso de todas as danças húngaras para violino e piano."
 elgar.1063.t: "Symphony No. 4"
 elgar.1063.f: "Symphony No. 4 é a última sinfonia escrita por Johannes Brahms. Hoje, é um dos trabalhos orquestrais mais populares e com mais frequência do compositor. À primeira vista, a maneira intransigente pela qual o trabalho é projetado foi desconcertante. Quando Brahms e Ignaz Brüll tocaram a sinfonia para amigos em dois pianos, Clara Schumann e Brahms, posteriormente, o biógrafo Max Kalbeck, entre outros, reagiram com a rejeição. Diz -se que Eduard Hanslick exclamou: 'Ao longo do movimento, senti como se estivesse sendo espancado por duas pessoas terrivelmente inteligentes'. Elisabeth von Herzogenberg descreveu o trabalho como 'um mundo pequeno para os inteligentes e conhecedores, nos quais as pessoas que andam no escuro só poderiam ter uma pequena parte'. Quando Brahms participou de uma apresentação da Sinfonia em 1897, pouco antes de sua morte, ele recebeu aplausos estrondosos da platéia vienense, que o trabalho recebeu até hoje."
 elgar.1071.t: "Sinfonia No. 5"
 elgar.1071.f: "Como algumas das outras sinfonias de Mahler, a 5ª Sinfonia não foi entendida após sua estréia. Em 1905, após um desempenho malsucedido em Hamburgo, Mahler reclamou: 'O quinto é um trabalho amaldiçoado. Ninguém entende. ' As resenhas da música nos anos seguintes à estréia foram principalmente negativas. O crítico de música Ferdinand Pfohl, por exemplo, julgou que a 5ª Sinfonia era uma das obras mais fracas de Mahler. Somente o Neue Zeitung Für Musik deu à sinfonia um testemunho benevolente e falou de uma \"grande riqueza de beleza\". Especialmente em comparação com a 4ª Sinfonia, escrita dois anos antes, representa uma grande diferença de conteúdo e forma. Com o mundo mais áspero da 5ª Sinfonia, Mahler inicia uma nova fase criativa, que é desenvolvida ainda mais na sinfonia seguinte. Somente após a morte de Mahler o trabalho se tornou cada vez mais apreciado."
 elgar.1072.t: "Mentiu von der erde"
 elgar.1072.f: "'Is it really the same man who, 'in harmony with the infinite', erected the edifice of the Eighth that we now find in the drinking song of Earth's woes? Who creeps lonely in the autumn to his beloved resting place, longing for refreshment? Who looks at youth with a friendly look of old age, with gentle emotion at beauty? Who seeks to forget the meaningless earthly existence in drunkenness and finally says goodbye in melancholy? (...) It is hardly the same person and composer. All works up to that point had arisen from the feeling of life (...) The earth is disappearing, a different air is blowing in, a different light shines over it. (...) When I brought the autograph back to him, almost unable to say a word about it, he opened the 'Abschied' and said, 'What do you think? Is that bearable at all? Won't people kill themselves afterwards?' He then pointed to the rhythmic difficulties and asked jokingly, 'Any idea how to conduct that? Not me!' - Bruno Walter"
 elgar.1073.t: "KIDERTERTOTENLIEDER"
 elgar.1073.f: "'Eu posso entender bem que se compõe uma letra tão terrível quando se não tem filhos ou quando alguém perdeu filhos. Mas não consigo entender como você pode cantar sobre a morte das crianças se você se abraçar e beijá -las meia hora antes, feliz e saudável! - Alma Mahler-Werfel, esposa de Gustav Mahler"
 elgar.1081.t: "Concerto para piano No. 3"
 elgar.1081.f: "Naquela época, Mahler era o único condutor que eu considerava digno de ser classificado com Nikisch. Ele se dedicou ao concerto até o acompanhamento, o que é bastante complicado, foi praticado com perfeição, embora já tivesse passado por outro longo ensaio. Segundo Mahler, todos os detalhes da pontuação eram importantes - uma atitude muito rara entre os condutores. ... Embora o ensaio estivesse programado para terminar às 12:30, tocamos e tocamos, muito além dessa hora, e quando Mahler anunciou que o primeiro movimento seria ensaiado novamente, eu esperava algum protesto ou cena dos músicos, mas não notei um único sinal de aborrecimento. A orquestra jogou o primeiro movimento com uma apreciação aguçada ou talvez ainda mais próxima do que no tempo anterior. - Sergei Rachmaninoff"
 elgar.1082.t: "Rhapsody em um tema de paganini"
 elgar.1082.f: "A peça consiste em 24 variações sobre um tema que o próprio Niccolò Paganini usou como ponto de partida para uma série de variações. Esta melodia serviu repetidamente como modelo para vários compositores, incluindo Johannes Brahms e Franz Liszt. Em algumas variações, Rachmaninoff usa outra melodia muito mais antiga: a sequência 'morre irae', uma vez parte integrante da massa latina para os mortos. Rachmaninoff usou esse tema repetidamente em suas obras. Aparece em todas as sinfonias, as danças sinfônicas, o poema sinfônico die tteninsel e a primeira sonata de piano. A combinação de um tema de Paganini com o 'Dies Irae' solicita a busca por um plano de fundo programático para o trabalho. Segundo a lenda, o grande violinista vendeu sua alma ao diabo para alcançar a perfeição em seu instrumento e o amor de uma mulher. O motivo de 'Dies Irae' representa o diabo, o tema de Paganini para o próprio violinista composto."
 elgar.1083.t: "Symphony No. 3"
 elgar.1083.f: "'Foi jogado em Nova York, Filadélfia, Chicago, etc. Nas duas primeiras apresentações que eu estava presente. Foi jogado maravilhosamente. Sua recepção pelo público e pela crítica foi azeda. Uma revisão permanece dolorosamente em minha mente: que eu não tinha mais uma terceira sinfonia em mim. Pessoalmente, estou firmemente convencido de que este é um bom trabalho. Mas - às vezes os compositores também estão enganados! Seja como for, estou segurando minha opinião até agora. - Sergei Rachmaninoff"
 elgar.1091.t: "Romeu e Julieta"
 elgar.1091.f: "Romeu e Julieta são o balé mais longo e conhecido de Sergei Prokofiev e é amplamente considerado sua contribuição mais importante para o gênero. É considerado um destaque de seu trabalho musical. A instrumentação rica e variada, bem como a complexidade rítmica da pontuação, ainda apresentam desafios para a orquestra e dançarinos. Em alguns lugares, as dissonâncias fronteiras à atonalidade. A famosa 'Dance of the Knights', com seus ritmos pontilhados, agora é mais conhecida como tema quase-sinfônico. Por outro lado, os temas associados ao despertar de Juliet ao amor são ao mesmo tempo ternos e animados. Prokofiev reutilizou a música do balé em três suítes para orquestra e um trabalho solo de piano."
 elgar.1092.t: "Tenente Kijé"
 elgar.1092.f: "O tenente Kijé Music foi originalmente escrito para acompanhar o filme de mesmo nome. Foi a primeira tentativa de Prokofiev de música cinematográfica e sua primeira comissão. Nos primeiros dias do cinema de som, entre os vários compositores ilustres prontos para experimentar a música cinematográfica, Prokofiev não era uma escolha óbvia para a comissão. Sediada em Paris por quase uma década, ele tinha uma reputação de experimentação e dissonância. Logo após o lançamento do filme, Prokofiev recebeu um convite da Orquestra Sinfônica de Rádio de Moscou para criar uma suíte orquestral a partir de sua música de cinema Kijé - provavelmente a primeira instância de uma trilha sonora sendo adaptada em um trabalho musical significativo. Enquanto Prokofiev estava nos Estados Unidos para a estréia de Boston, ele foi muito procurado pelos produtores de cinema, mas, embora tenha sido lisonjeado e atraído por suas ofertas, ele nunca compôs uma trilha sonora de Hollywood."
 elgar.1093.t: "Peter e o lobo"
 elgar.1093.f: "Peter e o lobo é um 'conto de fadas sinfônicas para crianças'. É o trabalho mais frequentemente realizado de Prokofiev e um dos trabalhos mais frequentemente realizados em todo o repertório clássico. The narrator tells a children's story, while the orchestra illustrates it by using different instruments to play a 'theme' that represents each character in the story: 'Each character of this tale is represented by a corresponding instrument in the orchestra: the bird by a flute, the duck by an oboe, the cat by a clarinet playing staccato in a low register, the grandfather by a bassoon, the wolf by three horns, Peter by the string quartet, the Tiro dos caçadores pela bateria e bumbo de chaleira. Antes de um desempenho orquestral, é desejável mostrar esses instrumentos para as crianças e brincar com elas os LEITMOTIFs correspondentes. Assim, as crianças aprendem a distinguir os sons dos instrumentos durante o desempenho desta história."
 elgar.1101.t: "Die Fledermaus"
 elgar.1101.f: "A Fledermaus de Johann Strauss é considerada um dos destaques da era da opereta. Juntamente com o Barão Cigano e uma noite em Veneza, Die Fledermaus é uma das três operetas Strauss mais famosas e também uma das poucas operetas que são realizadas regularmente nas principais casas internacionais de ópera. As letras são cativantes e cheias de ironia com verdades atemporais. Dizem que as partes essenciais da música foram criadas dentro de 42 dias. A abertura, escrita em forma de sonata livre, ocupa um lugar especial e é uma das maiores criações de Johann Strauss. Ele resume os numerosos destaques musicais de todo o trabalho e, com sua dinâmica variada, é sempre um desafio, mesmo para as principais orquestras."
 elgar.1102.t: "Donauwalzer"
 elgar.1102.f: "A valsa do belo Danúbio azul (muitas vezes encurtada para: Danúbio Waltz) é composicionalmente baseado em melodias que Johann Strauss já havia usado em trabalhos anteriores. Já em sua estréia, provocou entusiasmo entre o público. Devido ao grande número de novos lançamentos musicais na temporada de carnaval na época, a valsa não foi contratada inicialmente. No entanto, como Strauss apareceu em Paris na Feira Mundial de 1867 no mesmo ano e criou novas composições para ela, ele se lembrou de incluir essa valsa no programa. Sob o nome Le Beau Danube Bleu, a peça se tornou um grande sucesso durante esta exposição. Supõe-se que as edições publicadas da valsa, especialmente a versão de piano de duas mãos, foram vendidas quase 1.000.000 vezes em um curto período de tempo. A valsa é considerada hino secreto da Áustria e uma das peças mais populares em toda a história da música clássica."
 elgar.1103.t: "Uma noite em Veneza"
 elgar.1103.f: "Uma noite em Veneza é uma 'opereta cômica' em três atos. A ação ocorre em Veneza em meados do século XVIII e é uma comédia de disfarce e identidade equivocada com a confusão do amor entre duas classes. Como muitas outras operettas viennesas, o libreto é uma adaptação de uma Opéra-Com-Compra francesa. A estréia em Berlim foi um fracasso. Isso ocorreu em parte devido ao enredo confuso, mas também em parte devido aos textos subjacentes. A peça foi, portanto, reformulada para a estréia no teatro An Der Wien. A abertura também foi reformulada por Strauss. Os números musicais mais famosos são a Valsa da Lagoa e a música de gôndola. Em 1923 e novamente em 1931, foi significativamente revisado por Erich Wolfgang Korngold; Outra versão foi escrita por Walter Felsenstein em 1954; A versão original agora é apenas muito raramente executada."
 elgar.1111.t: "Rigoletto"
 elgar.1111.f: "Rigoletto é uma ópera de Giuseppe Verdi com um libreto de Francesco Maria Piave. É baseado no melodrama 'Le Roi S'amuse' de Victor Hugo. A ópera foi inicialmente criticada pelos censores; Verdi e Piave, portanto, tiveram que, entre outras coisas, mudar o título originalmente pretendido e mover o cenário de Paris para Mantua. No entanto, os elementos essenciais para Verdi, como o personagem principal de Crippled Rigoletto e o saco em que sua filha moribunda é colocada, permaneceu intacta. A ópera é considerada a primeira obra -prima de Verdi e estabeleceu sua fama mundial. O próprio Verdi considerou Rigoletto um de seus trabalhos mais bem -sucedidos e, ao contrário de outras óperas Verdi, não há revisões ou novas versões. Rigoletto foi um sucesso esmagador em sua estréia e foi disputado em quase todas as casas de ópera européia nos próximos anos. A ópera faz parte do repertório de muitas casas de ópera há mais de 160 anos e continua sendo uma das óperas italianas com mais frequência."
 elgar.1112.t: "La Traviata"
 elgar.1112.f: "La Traviata é uma ópera de Giuseppe Verdi e Francesco Maria Piave com base no romance La Dame Aux Camélias de Alexandre Dumas, The Younger. Como antes em Rigoletto e Il Trovatore, Verdi colocou uma pessoa ostracizada e rejeitada pela sociedade no centro da ação. Uma ópera sobre uma cortesã que morre de tuberculose era uma inovação escandalosa na época. O trabalho falhou na estréia, apesar de Verdi ter encenado ele mesmo e, como precaução, moveu a ação para a época de Luís XIV. Após sua revisão, a Verdi se apresentou novamente um ano depois - após o que se tornou uma das óperas mais bem -sucedidas da história da música. Em alguns países, é a ópera mais realizada de todos os tempos. Em termos de número de gravações feitas, La Traviata é superada apenas pela AIDA. Por razões de censura, a ópera também foi realizada na Itália sob o título Violetta."
 elgar.1113.t: "MESSA DA REQUIEM"
 elgar.1113.f: "Sob a impressão da morte de Gioachino Rossini em 1868, Giuseppe Verdi convidou os doze compositores mais importantes da Itália na época para compor em conjunto uma missa fúnebre, o chamado Messa por Rossini. Ele próprio assumiu o cenário do movimento final, 'Libera Me', neste requiem. No entanto, um desempenho não ocorreu devido a circunstâncias adversas. Verdi mais uma vez lidou com o material do Requiem depois que o poeta Alessandro Manzoni morreu em 1873. Verdi admirou profundamente o altamente respeitado Manzoni. Ele ofereceu à cidade de Milão a composição de uma missa a ser realizada um ano após a morte de Manzoni. A 'libera me' da missa de Rossini agora se tornou o núcleo do novo Requiem para Manzoni. O cenário de 'morre irae' da composição mais antiga foi adotado três vezes para passagens da sequência com o mesmo texto ou texto semelhante. A primeira apresentação, na Igreja de San Marco, em Milão, em 22 de maio de 1874, marcou o primeiro aniversário da morte de Manzoni. O próprio Verdi conduziu."
 elgar.1121.t: "Prélude à l'près-midi d'un faune"
 elgar.1121.f: "'A música deste prelúdio é uma ilustração muito gratuita do belo poema de Mallarmé. De maneira alguma ele afirma ser uma síntese dela. Em vez disso, há uma sucessão de cenas pelas quais passam os desejos e sonhos do fauno no calor da tarde. Então, cansado de perseguir o vôo tímido de ninfas e naias, ele sucumbe ao sono intoxicante, no qual ele pode finalmente realizar seus sonhos de posse na natureza universal. A peça é considerada um ponto de virada na história da música de arte ocidental, bem como uma obra -prima da composição impressionista. Pierre Boulez considerou a partitura o começo da música moderna, observando que 'a flauta do faun trouxe uma nova respiração à arte da música'."
 elgar.1121.g: "Delicie-se, sonhe, aproveite o momento interminável ..."
 elgar.1122.t: "La mer"
 elgar.1122.f: "'O concerto da noite passada começou com muitos daubs impressionistas de cor de cor, pigdy-pigdy em uma paleta tonal, com nunca um pensamento de forma ou propósito, exceto para criar novas combinações de sons. … Uma coisa só era certa, e era que o oceano do compositor era um lago-lago e que alguns de seus habitantes haviam entrado na garganta de todos os instrumentos de bronze. Mesmo alguns que haviam sido fortes apoiadores do trabalho de Debussy não foram entusiasmados, embora a peça tenha apresentado três aspectos principais da estética de Debussy: impressionismo, simbolismo e japonismo. Nas décadas após a estréia que La Mer se estabeleceu no repertório orquestral central."
 elgar.1123.t: "Pelléas et Mélisande"
 elgar.1123.f: "'Como professor, ele era pedante - essa é a única palavra. Realmente pedante ... havia um núcleo de raiva e amargura nele - muitas vezes acho que ele era um Golaud em Pelléas e, no entanto, ele não estava. Ele estava - em toda a sua música - um homem muito sensual. Ninguém parecia gostar dele. Jean Périer, que jogou Pelléas em minha Mélisande, ficou branca de raiva se você mencionou o nome de Debussy ... '\ n \ npelléas et Mélisande é uma ópera em cinco atos. O nome do gênero do compositor Claude Debussy é 'drame lyrique'. O texto é uma adaptação da peça Pelléas et Mélisande de Maurice Maeterlinck. Debussy evitou Arias e cenas solo maiores, que deram ao texto um personagem realista. Pelléas seria a única ópera concluída de Debussy. Por esse motivo, às vezes foi comparado ao Fidelio de Beethoven."
 elgar.1131.t: "Lago de cisne"
 elgar.1131.f: "O Swan Lake é um balé mundialmente famoso da música de Pyotr Ilyich Tchaikovsky, que estreou em 1877 no Bolshoi Theatre em Moscou e faz parte do repertório padrão de empresas clássicas de balé. Motivos comuns de numerosos contos de fadas podem ser encontrados no lago de cisnes: em particular a infeliz princesa encantada que é resgatada pelo amor de um príncipe. O final infeliz do libreto original também é um motivo conhecido de conto de fadas da garota do cisne ou donzela de cisne. Tchaikovsky atraiu composições anteriores para sua pontuação no lago de cisnes. De acordo com dois parentes de Tchaikovsky, o compositor criou anteriormente um pequeno balé chamado 'The Lake of the Swans' em sua casa em 1871. Este balé incluía o famoso Leitmotif. Ele também fez uso de material de 'The Voyevoda', uma ópera que ele abandonou em 1868. Em abril de 1876, a pontuação foi concluída e os ensaios começaram. Logo, o coreógrafo Reisinger começou a separar certos números que chamou de \"não variável\". Reisinger até começou a coreografar danças com a música de outros compositores, mas Tchaikovsky protestou e suas peças foram restabelecidas."
 elgar.1132.t: "Sinfonia No. 6 'Pathétique'"
 elgar.1132.f: "'Agora estou totalmente ocupado com o novo trabalho ... e é difícil para mim me afastar dele. Eu acredito que surge como o melhor dos meus trabalhos. Devo terminar o mais rápido possível, pois tenho que acabar com muitos assuntos e em breve devo ir a Londres. Eu disse que havia completado uma sinfonia que de repente me desconectei e rasguei. Agora eu compus uma nova sinfonia que certamente não vou chorar. 64, Tchaikovsky planejou, como escreveu a um amigo, 'escrever uma magnífica sinfonia que formará a pedra -chave de todo o meu trabalho'. O compositor intitulou o trabalho 'A Sinfonia apaixonada'. A característica do trabalho é o lento movimento final - incomum para as sinfonias - cujo fim lembra um requiem."
 elgar.1133.t: "Concerto de violino em D Major"
 elgar.1133.f: "O concerto de violino em D Major é o único concerto de violino do compositor russo Pyotr Ilyich Tchaikovsky. Tchaikovsky escreveu o concerto em março e abril de 1878 em Clarens, uma cidade que cresce com vinhos no lago Genebra. Lá ele se recuperou da depressão e de um grave colapso nervoso. O efeito positivo de sua estadia foi refletido no concerto, no qual sua nova alegria da vida se manifestou. O trabalho de composição foi concluído após três semanas, embora Tchaikovsky tenha substituído o movimento médio originalmente planejado pelo Andante, conhecido como 'Canzonetta'. Os críticos da música reagiram negativamente ao trabalho. Tchaikovsky reagiu calmamente e estava convencido de que o concerto prevaleceria. Até hoje, é um dos concertos mais famosos, mais apresentados e mais tocados de violino do mundo."
 elgar.1141.t: "Pomp & circunstância"
 elgar.1141.f: "As marchas militares de pompa e circunstância são uma série de cinco (ou seis) marchas para a orquestra. Eles incluem algumas das composições mais conhecidas de Elgar. A mais conhecida das seis marchas, Pomp e Circunstância de março, nº 1 em D, teve sua estréia, juntamente com o nº 2 de março, em Liverpool, em 19 de outubro de 1901. Elgar e sua esposa compareceram, e foi um sucesso \"frenético\". O trio contém a música conhecida como 'terra de esperança e glória'. Em 1902, a música foi reutilizada, de forma modificada, para a seção 'Terra da Esperança e Glória' de sua ode de coroação para o rei Edward VII. As palavras foram ainda modificadas para se encaixar na música original, e o resultado se tornou um jogo na última noite dos bailes e um hino esportivo inglês e música patriótica geral."
 elgar.1141.g: "Terra da esperança e glória!"
 elgar.1142.t: "A coroa da Índia"
 elgar.1142.f: "A coroa da Índia era uma máscara, uma apresentação teatral elaborada, encenada em 1912 para comemorar a visita de dezembro anterior do rei George V e a rainha Maria a Delhi por sua coroação como imperador e imperatriz da Índia. Para esta máscara, o compositor inglês Sir Edward Elgar escreveu a música, com um libreto de Henry Hamilton. A máscara consistia em dois quadros: 'As cidades de Ind' e 'Ave Imperator!'. Elgar mais tarde extraiu cinco das peças e acrescentou um intermezzo para o violino solo para criar a suíte Crown of India.  A suíte ganhou popularidade imediata: durante a vida de Elgar, houve 102 apresentações ao vivo na BBC."
 elgar.1143.t: "Variações de enigma"
 elgar.1143.f: "As variações do enigma são um trabalho orquestral que descreve as pessoas do ambiente de Elgar em 14 variações. Eles tornaram Elgar conhecido internacionalmente após sua estréia pelo maestro Hans Richter. O 'Enigma' do título não se refere à tarefa de qual variação é dedicada a qual amigo, mas a outro quebra -cabeça. Segundo Elgar, existe um tema diferente e maior em toda a composição, mas não é reproduzida, e o tema real é composto como uma contra -lodia. Várias teorias foram apresentadas até agora. A 9ª Variação (NIMROD), em particular, ganhou grande popularidade."
 elgar.1151.t: "A 9ª Sinfonia"
 elgar.1151.f: "Em 1892, Dvořák se mudou para os Estados Unidos e tornou -se diretor do Conservatório Nacional de Música da América na cidade de Nova York. Enquanto nos Estados Unidos, Dvořák escreveu uma de suas obras orquestrais de maior sucesso: a sinfonia 'do Novo Mundo', que espalhou sua reputação em todo o mundo. Foi dito que Dvořák foi inspirado nos 'amplos espaços abertos' da América, como as pradarias que ele pode ter visto em sua viagem a Iowa no verão de 1893. Dvořák também foi influenciado pelo estilo e técnicas usadas por compositores clássicos anteriores, incluindo Beethoven e Schubert. Os quartos de queda e os timpanos no movimento Scherzo do Novo Mundo Symphony evocam o Scherzo da Sinfonia de Beethoven nº 9. Na estréia em Carnegie Hall, o fim de todos os movimentos foi recebido com palmas estrondosas e Dvořák sentiu -se obrigado a se levantar e se levantar."
 elgar.1152.t: "Danças eslavônicas"
 elgar.1152.f: "As danças eslavônicas são uma coleção de 16 peças instrumentais de Antonín Dvořák, escritas para o piano quatro mãos e cada um pouco depois organizado para a orquestra. Eles estão entre as obras mais famosas do compositor tcheco. As composições de Dvořák usam padrões rítmicos característicos de danças folclóricas boêmia e da Morávia, bem como as dos países vizinhos. No entanto, eles ainda são criações completamente independentes do compositor. Na primeira fila, existem dois furtantes caracterizados por mudanças de ritmo, dois sousedskás semelhantes ao Ländler, dois Skočnás (dança de salto rápido), uma polca e, como a única dança não-coneca, uma dumka ucraniana. Na segunda série, predominam as danças que não são da coça, e é por isso que o DVOřák foi exposto a alguma hostilidade. Ele foi acusado de não se identificar o suficiente com sua terra natal e, em vez disso, querer se tornar popular no exterior."
 elgar.1153.t: "Rusalka"
 elgar.1153.f: "Rusalka é a ópera de maior sucesso de Antonín Dvořák. Foi criado com base em um libreto de Jaroslav Kvapil e remonta aos mitos folclóricos eslavos sobre os Rusalky (espíritos da água, sereias) e é semelhante à história alemã, Undine por Friedrich de la Motte Fouqué, Sagas de Hans Christian Andersen, a Little Mermaid e a antiga melusina francesa. A ópera com o conto de fadas da legenda também é conhecida como 'Tcheca Undine'. Juntamente com The Bride Bride, de Bedřich Smetana, Rusalka é a ópera tcheca mais famosa. A Opera Rusalka ocupa um lugar de destaque no desenvolvimento da música dramática tcheco."
 elgar.1161.t: "Fantasie em C-Dur"
 elgar.1161.f: "A fantasia em C Major é uma das composições de piano mais importantes de Robert Schumann. Juntamente com as cenas de Kreisleriana e infantil, é uma das peças mais conhecidas do compositor e faz parte do núcleo da literatura romântica de piano. Ele o dedicou a Franz Liszt, o virtuoso admirado que o agradeceu anos depois, doando sua grande sonata menor para ele. O balanço visionário dessa fantasia de piano e o poder sustentado por toda a composição são uma reminiscência do domínio arquitetônico de Ludwig van Beethoven, de cujo ciclo da música 'até o amado' Schumann cita várias vezes no primeiro movimento, enquanto no terceiro movimento ele usa um tema do Allegretto do 7º símbolo."
 elgar.1162.t: "Concerto para piano em um menor"
 elgar.1162.f: "O Concerto para Piano em um Minor Op. 54 é um concerto solo romântico para piano e orquestra que foi escrito durante o alto período romântico. Ele tem muitas características da era romântica. Como alguns outros concertos de piano do século XIX, o Concerto Menor tem um personagem sinfônico. Como o trabalho foi inicialmente concebido como uma fantasia, todo o show tem impressões românticas e fantásticas. Schumann precisou de mais de cinco anos para a conclusão atrasada. Na página de título do autógrafo, Schumann aponta os diferentes momentos em que os movimentos foram escritos. As idéias básicas do trabalho são ansiosas e a felicidade de duas pessoas apaixonadas. Neste trabalho, Schumann traduz sua luta por Clara Wieck em música. O tema principal do primeiro movimento é semelhante à melodia da Ária do Florestão da ópera de Beethoven Fidelio. Congratido por Beethoven, esse tema também significa lealdade ao cônjuge e a luta pela liberdade em Schumann."
 elgar.1163.t: "Kinderszenen"
 elgar.1163.f: "O Kinderszenen (cenas infantis) é um ciclo de Robert Schumann, composto por treze peças de piano curtas. Em contraste com o 'álbum for the Youth', essas são peças que não foram compostas para crianças, mas, nas próprias palavras de Schumann, como um 'reflexo de uma pessoa idosa para pessoas mais velhas'. A peça mais famosa e mais longa do ciclo é 'Träumerei'. Com um tempo de jogo com pouco menos de 20 minutos, as cenas das crianças estão entre os trabalhos de piano romântico mais populares hoje. Embora as cenas das crianças não tenham sido particularmente bem -sucedidas durante a vida de Schumann, o trabalho teve um significado especial, pelo menos para ele. Uma troca de cartas de 1839 mostra que Schumann na época acreditava firmemente na possibilidade de uma união conjugal com Clara Wieck e que as cenas das crianças surgiram de seu lado otimista e alegre."
 elgar.1171.t: "Concerto de violino em e menor"
 elgar.1171.f: "O Concerto de Violino de Felix Mendelssohn em E Minor é seu último concerto. Bem recebido em sua estréia, ele permaneceu entre os concertos de violino mais proeminentes e altamente considerados. Ele ocupa um lugar central no repertório de violino e desenvolveu uma reputação como um concerto essencial para todos os aspirantes a violinistas de concertos para dominar, e geralmente um dos primeiros concertos românticos que aprendem. O trabalho em si foi um dos principais concertos de violino da era romântica e foi influente em muitos outros compositores. Embora o concerto consista em três movimentos em uma estrutura padrão de rápida e rápida estrutura e cada movimento segue uma forma tradicional, foi inovadora e incluiu muitos recursos novos para o seu tempo. Os aspectos distintos incluem a entrada quase imediata do violino no início do trabalho - em vez de seguir uma prévia da orquestra dos principais temas do primeiro movimento, como era típico nos concertos da era clássica."
 elgar.1181.t: "ÈTudes"
 elgar.1181.f: "Frédéric Chopin escreveu um total de 27 études para piano: 12 Études op. 10 (publicado em 1833), 12 Études op. 25 (publicado em 1837) e outras três études para a terceira parte (études de perfeição, derramar piano, publicado em 1840) da escola de piano Métodes des Méthodes por Ignaz Moscheles e François-Joseph Fétis. As três études foram posteriormente publicadas separadamente sob o título Trois Nouvelles Études. Como 'Magna Carta of Piano Playing' (Karl Schumann), eles estão entre as composições de piano mais importantes da história da música. Grandes compositores de piano, como Alkan, Scriabin, Debussy e Rachmaninoff, tocaram suas dicas. Franz Liszt e Józef Wieniawski foram os primeiros pianistas a executar publicamente as études de Chopin."
 elgar.1191.t: "Uma vida para o czar"
 elgar.1191.f: "Depois de anos ouvindo cantores, romancando mulheres com sua música e conhecendo pessoas famosas, incluindo Mendelssohn, Berlioz e Liszt, Glinka percebeu que a missão de sua vida era retornar à Rússia, escrever de maneira russa e fazer pela música russa o que Donizetti e Bellini haviam feito pela música italiana. Uma vida para o czar foi a primeira das duas grandes óperas de Glinka. Era originalmente intitulado Ivan Susanin. Situado em 1612, conta a história do camponês russo e herói patriótico Ivan Susanin, que sacrifica sua vida pelo czar, desviando um grupo de poloneses saqueadores que o estavam caçando. Com essa ópera, Glinka conseguiu criar uma música russa independente; É considerado a primeira ópera russa."
 elgar.1192.t: "Ruslan e Ludmila"
 elgar.1192.f: "Ruslan e Ludmila são uma 'ópera fantástica' em cinco atos com música de Mikhail Glinka com um libreto de Nestor Kukolnik e outros com base no poema de mesmo nome de Alexander Sergeyevich Pushkin. A morte de Pushkin no famoso duelo o impediu de escrever o próprio libreto como planejado. Como em 'A Life for the Tsar', Ruslan emprega alguns aspectos da música folclórica russa; Também é observado para o uso imaginativo de dissonância, cromatismo e elementos orientais. De particular conseqüência é o uso de toda a escala de tom pela primeira vez na música russa. A Overture Rollicking é uma das peças de orquestra mais conhecidas no oeste e conhecidas por ser um pesadelo para os baixistas."
 elgar.1193.t: "Kamarinskaya"
 elgar.1193.f: "Kamarinskaya é uma dança folclórica russa tradicional, que é conhecida hoje como a composição do compositor russo Mikhail Glinka com o mesmo nome. Kamarinskaya, de Glinka, escrito em 1848, foi o primeiro trabalho orquestral baseado inteiramente na música folclórica russa e usar os princípios de composição desse gênero para ditar a forma da música. Tornou-se uma pedra de toque para a seguinte geração de compositores russos que variam do Pyotr Ilyich Tchaikovsky orientado para o Ocidente ao grupo de nacionalistas conhecidos coletivamente como os cinco e também foi elogiado no exterior, principalmente pelo compositor francês Hector Berlioz. Para Tchaikovsky, Kamarinskaya ofereceu um exemplo viável das possibilidades criativas de canções folclóricas em uma estrutura sinfônica, usando uma variedade de combinações harmônicas e contrapuntais."
 elgar_great_composer: "Ótimo compositor"
 elgar_great_composer_desc: "Grandes compositores são o crème de la crème de compositores. Eles são simplesmente os melhores e são conhecidos em todo o mundo."
