 je_elgar_composer_duel_fail: "Perdemos o duelo se o compositor rival receber #V 100 ou mais reputação antes de US#! ou nosso compositor morrer prematuramente."
 elgar.9.t: "Técnica de doze tons"
 elgar.9.d: "Após décadas de estagnação musical, os compositores modernos criaram um novo conceito que revolucionará o mundo da música."
 elgar.9.f: "A técnica de doze tons-também conhecida como dodecafonia, serialismo de doze tons e (no uso britânico) da composição de doze notas-é um método de composição musical. A técnica é um meio de garantir que todas as 12 notas da escala cromática sejam soadas com a mesma frequência como uma da outra em uma peça musical, impedindo a ênfase de qualquer nota através do uso de linhas de tom, ordenar as 12 classes de arremesso. Todas as 12 notas recebem mais ou menos importância e a música evita estar em uma chave. Com o tempo, a técnica aumentou muito em popularidade e acabou se tornando amplamente influente nos compositores do século XX. É comumente considerado uma forma de serialismo."
 elgar.9.g: "Não tenho tanta certeza se foi uma boa ideia."
