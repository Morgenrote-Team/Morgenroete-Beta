 elgar_classicism_tech: "Classicismo"
 elgar_classicism_tech_desc: "O classicismo, nas artes, geralmente se refere a uma alta consideração por um período clássico, a antiguidade clássica na tradição ocidental, como estabelecendo padrões de sabor que os classicistas procuram imitar. Em sua forma mais pura, o classicismo é uma atitude estética dependente de princípios baseados na cultura, arte e literatura da Grécia e Roma antigas, com ênfase na forma, simplicidade, proporção, clareza de estrutura, perfeição, emoção restrita e apelo explícito ao intelecto."
 elgar_irrationalism_tech: "Irracionalismo"
 elgar_modern_art_tech: "Arte moderna"
 elgar_modern_art_tech_desc: "#R Esta tecnologia é apenas um manequim e não pode ser pesquisada. Complete as entradas do diário para obter [concept_elgar_impressionism], [concept_elgar_expressionism] ou [concept_elgar_art_nouveau]! #!"
 elgar_art_nouveau_tech: "Art Nouveau"
 elgar_art_deco_tech: "Art Déco"
 elgar_art_deco_tech_desc: "A Art Déco combinou estilos modernos com artesanato fino e materiais ricos. Durante seu auge, representava luxo, glamour, exuberância e fé no progresso social e tecnológico. Art Deco é um dos primeiros estilos verdadeiramente internacionais, mas seu domínio terminou com o início da Segunda Guerra Mundial."
 elgar_impressionism_tech: "Impressionismo"
 elgar_neoclassicism_tech: "Neoclassicismo"
 elgar_neoclassicism_tech_desc: "Após a virada do século, houve um entusiasmo renovado pelos ideais clássicos: neoclassicismo. Encomeu pelo menos música, filosofia e literatura. Enquanto os arquitetos estavam novamente usando a construção romana e grega como modelos, os compositores estavam redescobrindo a música barroca como fonte de inspiração."
 elgar_expressionism_tech: "Expressionismo"
 elgar_new_objectivity_tech: "Nova objetividade"
 elgar_new_objectivity_tech_desc: "Embora descrevesse principalmente uma tendência na pintura alemã, o termo tirou a vida própria e passou a caracterizar a atitude da vida pública na Alemanha de Weimar, bem como a arte, literatura, música e arquitetura criadas para se adaptar a ela. Em vez de algum objetivo da objetividade filosófica, foi para implicar uma mudança para o envolvimento prático com o mundo - uma atitude de todo o negócio, compreendida pelos alemães como intrinsecamente americanos."
 elgar_mass_culture_tech: "Cultura de massa"
 elgar_mass_culture_tech_desc: "#R This technology is only available via Journal Entry!#!\n\n'The mass' uncomprehending hostility to all the traditions representative of the Culture, the keen and cold intelligence that confounds the wisdom of the peasant, the new found naturalism that in relation to all matters of sex and society goes back far to quite primitive instincts and conditions, the reappearance of the panem et circenses in the form of wage disputes and sports stadia - all these things betoken the definite Fechando a cultura e a abertura de uma fase bastante nova da existência humana. - Oswald Spengler, declínio do oeste"
 elgar_stop_composing_button: "Pare de compor"
 elgar_stop_composing_button_desc: "O compositor termina seu trabalho de composição e está disponível novamente para outras tarefas."
