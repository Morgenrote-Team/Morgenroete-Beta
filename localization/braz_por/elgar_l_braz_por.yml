 elgar_art_nouveau_tech_desc: "#R Esta tecnologia está disponível apenas através de um botão na guia Artes da GUI Morgenröte! §1 é um estilo internacional de arte, arquitetura e arte aplicada, especialmente as artes decorativas. O estilo é conhecido por nomes diferentes em diferentes idiomas: JugendStil em alemão, Liberdade do STILE em italiano, modernisme em catalão e também conhecido como estilo moderno em inglês. Muitas vezes, era inspirado por formas naturais, como as curvas sinuosas de plantas e flores. Arquitetos e designers buscaram um Gesamtkunstwerk espiritualmente edificante (\"obra total de arte\") que unificaria as artes."
 elgar_impressionism_tech_desc: "#R Esta tecnologia está disponível apenas através de um botão na guia Arts da GUI Morgenröte! §1 é um estilo de arte do século XIX que é caracterizado pela representação atmosférica de instantâneos fugazes. O termo impressionismo também foi aplicado a certos estilos de música, literatura, cinema e fotografia."
 elgar_expressionism_tech_desc: "#R Esta tecnologia está disponível apenas através de um botão na guia Artes da GUI Morgenröte! §1 é um movimento modernista, inicialmente em poesia e pintura. Sua característica típica é apresentar o mundo apenas de uma perspectiva subjetiva, distorcendo -a radicalmente por efeito emocional, a fim de evocar humor ou idéias."
 elgar.423.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] reclama que as condições de trabalho §1 não são boas o suficiente em vista de suas múltiplas funções de escritório. Talvez os apoios monetários possam melhorar sua 'inspiração'."
 elgar.424.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] tem tentado compor há algum tempo, mas [SCOPE.sCharacter('elgar_conductor').GetSheHe] continua sendo interrompido por uma certa pessoa."
 elgar_irrationalism_tech_desc: "O irracionalismo é um movimento filosófico que surgiu no início do século 19, enfatizando a dimensão não racional da vida humana. Os irracionalistas declaram que apenas a razão humana é incapaz de reconhecer as fundações, conexões e leis da realidade objetiva. Como alternativas para explicações descritivas e normativas do mundo, são sugeridas funções cognitivas mais altas, como, por exemplo, intuição, fé ou experiência direta."
