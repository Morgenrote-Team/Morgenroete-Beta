 elgar_faido_modifier: "Fado Music Culture"
 elgar.535.t: "The Sound of Saudade"
 elgar.535.d: "Das estreitas vielas de Lisboa e das tabernas da Alfama surge uma nova forma musical—lúgubre, crua e profundamente portuguesa. Chama-se Fado."
 elgar.535.f: "Nas primeiras décadas do século XIX, um gênero distinto havia se estabelecido nos bairros operários e distritos portuários de Lisboa. O Fado – literalmente “destino” – era cantado por marinheiros, prostitutas e os pobres urbanos, frequentemente acompanhado pelo choro suave da guitarra portuguesa. As letras falavam de saudade, resignação e nostalgia, o que os locais chamavam de saudade – um sentimento complexo demais para traduzir.\n\nEmbora inicialmente desprezado como música vulgar de rua, o Fado gradualmente ganhou respeitabilidade artística. Aristocratas começaram a convidar fadistas para salões, e na década de 1840, apresentações públicas eram comuns nas casas de shows de Lisboa. Uma nova identidade musical estava tomando forma – unicamente portuguesa, e ecoando as tristezas e o orgulho de uma nação em mudança."
 elgar.535.g: "Deixe Fado florescer como um símbolo da identidade nacional"
