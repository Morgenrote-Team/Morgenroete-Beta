 MR_FIFA_BOARD_TOOLTIP: "#header FIFA Board#!\nThe following countries are member of the FIFA Board:\n\n[GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 MR_FIFA_PRESIDENT_TOOLTIP: "#header FIFA President#!\n[GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName] is President of the FIFA."
 MR_HIRE_COACH_BUTTON_TT: "#T Hire a National Coach#!\nNational coaches contribute their skills to improving match results. The background of a national coach - cricket, baseball, football, basketball - depends on the national sport. If a coach fails to live up to expectations, he or she can be replaced after at least three years.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ADAPT_NATIONAL_SPORT_BUTTON: "Adapt National Sport"
 MR_ADAPT_NATIONAL_SPORT_BUTTON_TT: "#T Adapt National Sport#!\nWe can declare a particular sport that has become popular in our country as a national sport, thereby encouraging the establishment of clubs and the spread of the sport in other countries. This is a prerequisite for a national sports organization.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_NATIONAL_SPORT_BUTTON: "Change National Sport"
 MR_CHANGE_NATIONAL_SPORT_BUTTON_TT: "#T Change National Sport#!\nChanging the national sport is only possible if at least one other sport has become popular. The established sports community will not be happy about this.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_sports_coach_national_sport: "National Sport"
 vikelas_national_sport_loc: "[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]"
 vikelas_no_national_sport_loc: "None"
 MR_SCHOOL_SPORTS_STADIUM_TRIGGER_TT: "#default_text [GetPlayer.GetName] at least one active #V Sports Stadium [concept_production_method] in a [GetBuildingType('building_vikelas_sports').GetName]#!.#!"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON: "Commonwealth Championship"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON_TT: "#T Commonwealth Championship#!\nAs the leader of a power bloc or as the overlord of several vassals, we can hold an international championship among our subjects if they have the same national sport as we do.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INTERNATIONAL_SPORTS_MEMBER_TRIGGER_TT: "#default_text #default_text [GetPlayer.GetName] has at least #G 3#! other #V Bloc Members#! or #G 4#! #V Subjects#! which have [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName] as a national sport.#!"
 MR_INTERNATIONAL_SPORTS_NO_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName] is #R not#! a member of the FIFA.#!"
 MR_INTERNATIONAL_SPORTS_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName] does #R not#! has the #V $vikelas_international_sports_event_modifier$#! or the #V $vikelas_recent_international_sports_event_modifier$#! [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_FIFA_MEMBER_TRIGGER_TT: "#default_text At least #BLUE 16#! countries are #V FIFA Members#!. Currently the FIFA has #G [GetGlobalVariable('vikelas_num_fifa_members_global_var').GetValue]#! members.#!"
 MR_JOIN_FIFA_BUTTON: "Join the FIFA"
 MR_JOIN_FIFA_BUTTON_TT: "#T Join the FIFA#!\nJoining FIFA is a prerequisite for participating in the Football World Cup.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_BUTTON: "Leave the FIFA"
 MR_LEAVE_FIFA_BUTTON_TT: "#T Leave the FIFA#!\nFIFA has betrayed all its ideals and is a corrupt, commercialized NGO that is best left behind.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName] is #R neither#! #V President#! #R nor#! #V Board Member#! of the FIFA.#!"
 MR_SCHOOL_SPORTS_BUTTON: "Introduce School Sports"
 MR_SCHOOL_SPORTS_BUTTON_TT: "#T Introduce School Sports in [GetPlayer.GetName]#!\nWith the introduction of school sports we can increase the general chance that personalities with athlete characteristics will be available and improve the chances at the Olympic Games.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHOOL_SPORTS_PUBLIC_SCHOOLS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has the [GetLawType('law_public_schools').GetName] [concept_law].#!"
 MR_SCHOOL_SPORTS_IG_ATHLETE_LEADER_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a character with the #V Athlete Trait#! as the leader of an #V [concept_interest_group] [concept_in_government]#!.#!"
 MR_SCHOOL_SPORTS_SPORTS_FACILITIES_TRIGGER_TT: "#default_text [GetPlayer.GetName] at least one active #V Sports Facility [concept_production_method] in a [GetBuildingType('building_government_administration').GetName]#!.#!"
 MR_WORLDCUP_BUTTON: "Football World Cup"
 MR_WORLDCUP_BUTTON_TT: "#T Organize the Football World Cup#!\nThe World Cup is a football competition for national teams. Teams can qualify for the finals of the World Cup every four years. In a four-week tournament, the best national team will be determined as world champions. The world football association Fédération Internationale de Football Association (FIFA) organizes and markets the tournament. The first World Cup took place in Uruguay in 1930 and was won by the host team.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#default_text There are at least #G 10#! Countries with a Football Association.#!"
 MR_FIFA_BUTTON_TT: "#T Found the FIFA#!\nWith the number of inter-nation matches increasing as football spread, the need for a global governing body emerged. FIFA (French: Fédération Internationale de Football Association) is an international self-regulatory governing body of association football, futsal and beach soccer. It is one of the world's oldest and largest NGOs, being founded on 21 May 1904. The founding of FIFA allows for international matches between individual nations, whose coaches can improve through winning matches. This will eventually lead to the establishment of a World Cup.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_TRIGGER_TT: "#default_text There are at least #G 6#! Countries with a Football Association.#!"
