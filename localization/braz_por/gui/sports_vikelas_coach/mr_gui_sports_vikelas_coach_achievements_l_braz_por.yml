l_braz_por:
 MR_SPORTS_COACH_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'vikelas_coach_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'vikelas_coach_no_coach_achievements_loc')]"
 vikelas_coach_achievements_loc: "$vikelas_coach_achievements_intro_loc$[AddLocalizationIf( Scope.Var('vikelas_coach_world_championship_var').IsSet , Scope.Var('vikelas_coach_world_championship_var').GetFlagName)][AddLocalizationIf( Scope.Var('vikelas_coach_vice_world_championship_var').IsSet , Scope.Var('vikelas_coach_vice_world_championship_var').GetFlagName)]"
 vikelas_coach_no_coach_achievements_loc: "As conquistas de #V deste [concept_vikelas_coach]#! serão exibidas aqui, quando você tiver uma."
 vikelas_coach_achievements_intro_loc: "#V Achievements of thisCoach#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is a successful Coach.#!"
 vikelas_coach_world_championship_loc: "\n #indent_newline:3 • In [Scope.Var('vikelas_coach_world_championship_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] lead [Scope.GetCharacter.GetHerHis] team to #V win the FIFA World Cup of Football#!.#!"
 vikelas_coach_vice_world_championship_loc: "\n #indent_newline:3 • In [Scope.Var('vikelas_coach_vice_world_championship_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] lead [Scope.GetCharacter.GetHerHis] team to the #V second place in the FIFA World Cup of Football#!.#!"