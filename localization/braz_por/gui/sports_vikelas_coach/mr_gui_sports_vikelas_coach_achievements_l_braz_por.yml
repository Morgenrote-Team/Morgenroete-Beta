l_braz_por:
 MR_SPORTS_COACH_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'vikelas_coach_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'vikelas_coach_no_coach_achievements_loc')]"
 vikelas_coach_achievements_loc: "$vikelas_coach_achievements_intro_loc$[AddLocalizationIf( Scope.Var('vikelas_coach_world_championship_var').IsSet , Scope.Var('vikelas_coach_world_championship_var').GetFlagName)][AddLocalizationIf( Scope.Var('vikelas_coach_vice_world_championship_var').IsSet , Scope.Var('vikelas_coach_vice_world_championship_var').GetFlagName)]"
 vikelas_coach_no_coach_achievements_loc: "As conquistas de #V deste [concept_vikelas_coach]#! serão exibidas aqui, quando você tiver uma."
 vikelas_coach_achievements_intro_loc: "#V Conquistas desse treinador#!\n[Scope.GetCharacter.GetFullName] é um treinador bem-sucedido."
 vikelas_coach_world_championship_loc: "\nEm [Scope.Var('vikelas_coach_world_championship_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] liderar a equipe [Scope.GetCharacter.GetHerHis] para #V ganhar a Copa do Mundo de Futebol da FIFA#!"
 vikelas_coach_vice_world_championship_loc: "\nEm [Scope.Var('vikelas_coach_vice_world_championship_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] liderar a equipe [Scope.GetCharacter.GetHerHis] para o #V segundo lugar na Copa do Mundo de Futebol da FIFA#!"