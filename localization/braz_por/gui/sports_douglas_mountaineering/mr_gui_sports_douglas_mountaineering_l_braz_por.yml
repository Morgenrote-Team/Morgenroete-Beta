 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Expedição de montanhismo - Cumes de Nível 1"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 1#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 1. Estes Cumes incluem: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, and Mount Giluwe. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Expedição de montanhismo - Cumes de Nível 2"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 2#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 2. O Nível não é indicativo de altitude ou de risco. Estes Cumes incluem: Kibo (Kilimanjaro), Dufourspitze, Mount Cook, and Mount Wilhelm. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Expedição de montanhismo - Cumes de Nível 3"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 3#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 2. O Nível não é indicativo de altitude ou de risco. Estes Cumes incluem: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Batian (Mount Kenya), and Mount Stanley. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Expedição de montanhismo - Cumes de Nível 4"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 4#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 2. O Nível não é indicativo de altitude ou de risco. Estes Cumes incluem: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak, and Mount Gongga. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Expedição de montanhismo - Cumes de Nível 5"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 5#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 5. O Nível não é indicativo de altitude ou de risco. Estes Cumes incluem: KHuascarán, Chigolisa and Kabru. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"