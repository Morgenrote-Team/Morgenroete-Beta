 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "Mount Everest Expedition"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T Mount Everest Expedition#!\nAs the highest mountain in the world, Mount Everest is the dream destination of all mountaineers - but is an expedition there really the fulfillment of all mountaineering dreams, or rather delusions of grandeur?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
