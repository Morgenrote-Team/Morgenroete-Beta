 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um [concept_douglas_mountain_summit] de #V Nível 1 #! não conquistado, ou tem uma #V Licença de Montanhismo#! de uma nação com acesso a um. Para mais informações, consulte a [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um [concept_douglas_mountain_summit] de #V Nível 2 #! não conquistado, ou tem uma #V Licença de Montanhismo#! de uma nação com acesso a um. Para mais informações, consulte a [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um [concept_douglas_mountain_summit] de #V Nível 3 #! não conquistado, ou tem uma #V Licença de Montanhismo#! de uma nação com acesso a um. Para mais informações, consulte a [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um [concept_douglas_mountain_summit] de #V Nível 4 #! não conquistado, ou tem uma #V Licença de Montanhismo#! de uma nação com acesso a um. Para mais informações, consulte a [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um [concept_douglas_mountain_summit] de #V Nível 5 #! não conquistado, ou tem uma #V Licença de Montanhismo#! de uma nação com acesso a um. Para mais informações, consulte a [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Expedition: Level 1 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 1#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 1. Estes Cumes incluem: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, and Mount Giluwe. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Expedition: Level 2 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 2#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 2. O Nível não é indicativo de altitude ou de risco. Estes Cumes incluem: Kibo (Kilimanjaro), Dufourspitze, Mount Cook, and Mount Wilhelm. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Expedition: Level 3 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Mountaineering Expedition: Level 3 Summits#!\nThis category of mountains can be climbed with Level 3 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Mount Kenya, and Mount Stanley. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Expedition: Level 4 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 4#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 2. O Nível não é indicativo de altitude ou de risco. Estes Cumes incluem: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak, and Mount Gongga. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Expedition: Level 5 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Expedição de Montanhismo: Cumes de Nível 5#!\nEssa categoria de montanhas podem ser escaladas com Equipamento de Montanhismo Nível 5. O Nível não é indicativo de altitude ou de risco. Estes Cumes incluem: KHuascarán, Chigolisa and Kabru. Para mais informações, de uma olhada na [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "Mountaineering Training"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T Mountaineering Training#!\nCountries can train their mountaineers if they have mountain ranges or conquered summits which are considered safe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
