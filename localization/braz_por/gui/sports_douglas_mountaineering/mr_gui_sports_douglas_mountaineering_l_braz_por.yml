l_braz_por:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #V General#! with the #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#! or #V $explorer$#! [concept_character_trait].#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "Clube de Alpinismo"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Fundar um Clube de Montanhismo#!\nUm Clube de Montanhismo é o primeiro passo de uma nação rumo ao alpinismo organizado. Ele deve ser fundado por um(a) montanhista experiente. A partir deste clube, novos alpinistas podem surgir para conquistar os picos do mundo!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "\"Alpine Club\""
 MR_ALPINE_CLUB_BUTTON_TT: "#T Fundar o \"Alpine Club\"#!\nFundado em Londres em 1857, o \"Alpine Club\" é a organização de montanhismo mais antiga do mundo. Sua criação marcou o começo do alpinismo organizado na Inglaterra Vitoriana. O clube tinha o objetivo de promover a exploração científica, geográfica e atlética dos Alpes. Entre seus membros fundadores estava Edward Whymper, que completou a primeira subida do Matterhorn em 1865. O Alpine Club teve um papel chave durante a 'Idade de Ouro do Alpinismo' e publicou trabalhos influentes, incluindo o \"Alpine Journal\". Ele estabeleceu padrões para futuros clubes de montanhismo ao redor do mundo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text  Há pelo menos #G 6 #! Países com um Clube de Montanhismo. #!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Se tornar Presidente do \"Alpine Club\""
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Se tornar Presidente do \"Alpine Club\" #!\nSem um presidente ativo no \"Alpine Club\", podemos assumir o cargo. Para isso, precisamos controlar a Sede do \"Alpine Club\".\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] controla à [GetBuildingType('building_douglas_alpine_club').GetName]#!."
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName] torna-se membro da Diretoria do \"Alpine Club\"."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName] torna-se presidente do \"Alpine Club\"."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text The mountaineer has at least #p 50#! #V Experience#!.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "Recrutar Montanhista"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Recrutar Montanhista#!\nCom um Clube de Montanhismo, é possível recrutar novos montanhistas. Isso, claro, requer [concept_douglas_alpine_heritage] suficiente.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um #V Clube de Montahismo#!.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Regimento de Tropas de Montanha"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Regimento de Tropas da Montanha #!\nUm general qualificado, dada a presença de uma região montanhosa com uma população fervorosamente devota à sua terra natal, pode estabelecer um regimento treinado em táticas de infantaria montanhosa.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Equipamento de Montanhismo"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Mountaineering Equipment#!\nBetter #V Mountaineering Equipment#! provides better success chances. This requires new technologies for each step.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text  [GetPlayer.GetName] possui o modificador #V $douglas_mountaineering_equipment_level_1_modifier$#!.#!"
