 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um [concept_douglas_mountain_summit] de #V Nível 1 #! não conquistado, ou tem uma #V Licença de Montanhismo#! de uma nação com acesso a um. Para mais informações, consulte a [concept_douglas_mountain_summit_list].#!"
