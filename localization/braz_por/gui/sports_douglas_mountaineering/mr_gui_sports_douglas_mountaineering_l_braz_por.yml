 MR_BAN_FOREIGN_MOUNTAINEERS_BUTTON_TT: "#T Ban Foreign Mountaineers#!\nThe state can issue a decree that local peaks may only be climbed by national mountaineers.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
