 MR_STOP_MOUNTAINEER_PROJECT_BUTTON_TT: "#T Stop Project Effort#!\nRecall your Mountaineer from a non-essential activity, like training, so that they may embark on a more important effort.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
