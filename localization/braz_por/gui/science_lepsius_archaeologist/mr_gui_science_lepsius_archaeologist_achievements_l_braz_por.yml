 lepsius_archaeologist_no_archaeologist_loc: "As conquistas de #V deste [concept_lepsius_archaeologist]#! serão exibidas aqui, quando você tiver uma." #deepl:2404800686
 lepsius_archaeologist_achievements_intro_loc: "#V As conquistas desse arqueólogo#!\n[Scope.GetCharacter.GetFullName] são [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')], que coletou um total de [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] ." #deepl:2747108283

 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "um famoso [concept_lepsius_archaeologist]" #deepl:1164713858
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "um experiente [concept_lepsius_archaeologist]" #deepl:370998510
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "um profissional talentoso [concept_lepsius_archaeologist]" #deepl:139829371
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] é especialista em #V Egyptian Archaeology#!, de onde [Scope.GetCharacter.GetSheHe] coletou [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts." #deepl:2806539652
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] é especialista em #V Mesopotamian Archaeology#!, de onde [Scope.GetCharacter.GetSheHe] coletou [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts." #deepl:4145665032
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] é especialista da #V Aegean Archaeology#!, de onde [Scope.GetCharacter.GetSheHe] coletou [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] artefatos menores." #deepl:3137059405
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] é especialista em #V Precolumbian Archaeology#!, de onde [Scope.GetCharacter.GetSheHe] coletou [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts." #deepl:1609585460
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] é um especialista da #V Fareastern Archaeology#!, de onde [Scope.GetCharacter.GetSheHe] coletou [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts." #deepl:3392738081
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] é um especialista da #V Oceanic Archaeology#!, de onde [Scope.GetCharacter.GetSheHe] coletou [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] artefatos menores." #deepl:2787251010
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] participou do #V Archaeological Congress on the Historicity of the Exodus#!." #deepl:3946194799
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] participou do #V Congresso Arqueológico sobre a Origem da Civilização#!." #deepl:395174587
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] participou do #V Archaeological Congress on the Historicity of Troy (Congresso arqueológico sobre a historicidade de Troia).#!" #deepl:3218356213
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\nUma das maiores conquistas do [Scope.GetCharacter.GetHerHis] é a #V invenção do sistema de três idades#! que permite que os arqueólogos classifiquem os artefatos nos períodos da Idade da Pedra, Idade do Bronze e Idade do Ferro." #deepl:3435944138
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\nAo usar métodos estratigráficos e documentar extensivamente as descobertas [Scope.GetCharacter.GetHerHis], [Scope.GetCharacter.GetLastNameNoFormatting] #V  revolucionou a Arqueologia#! e a transformou em uma ciência real." #deepl:1482092133
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi fundamental para o #V estabelecimento do Museu Arqueológico#!, onde o [Scope.GetCharacter.GetSheHe] exibiu todos os artefatos de forma significativa." #deepl:2255139215
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] desenvolveu #V novos métodos para manter os achados intactos#! em Pompeia." #deepl:3277007049
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "#V \nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi a figura central na reconstrução do Templo do Sol em Teotihuacán#!." #deepl:715105555
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu a Civilização do Vale do Indo#! no local de Harappa." #deepl:823513117
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu a Tumba do Primeiro Imperador Qin#! guardada por um Exército de Terracota." #deepl:3326302787
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu a cidade maia de Tikal#! na selva da Guatemala." #deepl:960255002
 lepsius_archaeologist_achievement_explored_petra_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  explorou a cidade de Petra#! nos desertos escaldantes do Oriente Médio." #deepl:230969931
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\nA descoberta do Sarcófago de um Faraó Desconhecido #V #! é uma das maiores conquistas do Dr. [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:397069606
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\nEmbora o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tenha descoberto a #V Tumba de um Faraó Desconhecido#!, essa descoberta foi arruinada pela destruição da múmia do Faraó em um infeliz acidente." #deepl:4134291227
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\nUm marco na carreira de [Scope.GetCharacter.GetHerHis] foi a descoberta da tumba intacta do #V faraó Tutancâmon#!." #deepl:830597516
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\nA descoberta do #V Navio de Khufu#! imortalizará para sempre o nome do Dr. [Scope.GetCharacter.GetLastNameNoFormatting] nos livros de história." #deepl:263837328
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\nDurante [Scope.GetCharacter.GetHerHis] um período na Mesopotâmia, [Scope.GetCharacter.GetSheHe] encontrou a #V Torre da Babilônia#! que é conhecida entre os arqueólogos como Zikurrat Etemenanki. Uma descoberta maravilhosa!" #deepl:3958757656
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é provavelmente a única pessoa que pode se gabar de ter redescoberto uma das sete maravilhas do mundo. |U[Scope.GetCharacter.GetSheHe] de fato encontrou os #V Hanging Gardens#!." #deepl:1376956218
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\nCom certeza, para um arqueólogo, tudo é um tesouro, mas a descoberta do Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é certamente um verdadeiro tesouro. Os #V Tesouros de Micenas#! consistiam em muitas coisas, a maioria delas feita de ouro, como as Máscaras de Ouro." #deepl:3793568389
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\nA #V Tumba de Pakal#!, que o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] descobriu, era muito impressionante. Tão impressionante quanto deveria ser para o maior rei dos maias." #deepl:3301250790
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\nEnquanto trabalhava no Egito, [Scope.GetCharacter.GetSheHe] #V  hasteou uma bandeira na Grande Pirâmide de Gizah#!." #deepl:453060665
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] não só encontrou o Portão de Ishtar #V #! como também o reconstruiu. Agora ele brilha em toda a sua glória novamente." #deepl:3899648836
 lepsius_archaeologist_achievement_found_lamassu_loc: "\nEm uma grande aventura cheia de perigos, [Scope.GetCharacter.GetSheHe] encontrou o majestoso #V Lamassu#!." #deepl:1325115031
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] escapou de um #V labirinto mítico#! cheio de perigos." #deepl:3205955848
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\nÀs vezes a arqueologia é perigosa. O professor [Scope.GetCharacter.GetLastNameNoFormatting] sobreviveu à sua jornada por uma misteriosa #V pirâmide maia#! que era mais aventura do que arqueologia." #deepl:2309875301
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  redescobriu Vilacamba#!, o último refúgio dos incas." #deepl:1401010459
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  encontrou desenhos enormes no deserto de Nazca#! que só são realmente visíveis do céu." #deepl:3398521121
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é ridicularizado pela comunidade científica. Ele afirma que os membros de sua expedição #V foram comidos por dinossauros#!. Essa afirmação é ridícula ou verdadeira?" #deepl:491140794
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] forneceu evidências fotográficas de #V dinossauros vivos#!, embora ninguém acreditasse [Scope.GetCharacter.GetHerHim]." #deepl:1970351488
 lepsius_archaeologist_achievement_photo_support_loc: "\nCom o apoio do governo, o professor [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu fornecer evidências fotográficas de #V dinossauros vivos#! mesmo tendo sido ridicularizado anteriormente." #deepl:278106961
