ius_archaeologist_achievement_found_tomb_of_pakal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_lost_world_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_lost_world_var').GetFlagName)]"
 lepsius_archaeologist_no_archaeologist_loc: "As conquistas de #V deste [concept_lepsius_archaeologist]#! serão exibidas aqui, quando você tiver uma."
 lepsius_archaeologist_achievements_intro_loc: "#V Achievements of this Archaeologist#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')] who collected a total of [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')].#!"
 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "um famoso [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "um experiente [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "um profissional talentoso [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is an expert for #V Egyptian Archaeology#!, from where [Scope.GetCharacter.GetSheHe] collected [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts.#!"
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is an expert for #V Mesopotamian Archaeology#!, from where [Scope.GetCharacter.GetSheHe] collected [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts.#!"
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is an expert for #V Aegean Archaeology#!, from where [Scope.GetCharacter.GetSheHe] collected [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts.#!"
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is an expert for #V Precolumbian Archaeology#!, from where [Scope.GetCharacter.GetSheHe] collected [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts.#!"
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is an expert for #V Fareastern Archaeology#!, from where [Scope.GetCharacter.GetSheHe] collected [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts.#!"
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is an expert for #V Oceanic Archaeology#!, from where [Scope.GetCharacter.GetSheHe] collected [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts.#!"
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] attended the #V Archaeological Congress on the Historicity of the Exodus#!.#!"
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] attended the #V Archaeological Congress on the Origin of Civilization#!.#!"
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] attended the #V Archaeological Congress on the Historicity of Troy#!.#!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\n #indent_newline:3 • One of [Scope.GetCharacter.GetHerHis] greatest achievements is the #V Invention of the Three-Age System#! that allows Archaeologists to classify artifacts into the time periods Stone Age, Bronze Age and Iron Age.#!"
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\n #indent_newline:3 • By using stratigraphic methods and documenting [Scope.GetCharacter.GetHerHis] findings extensively, [Scope.GetCharacter.GetLastNameNoFormatting] #V revolutionized Archaeology#! and transformed it into a real science.#!"
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was instrumental in the #V Establishment of the Archaeological Museum#!, where [Scope.GetCharacter.GetSheHe] exhibited all the artifacts in a meaningful way.#!"
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] developed #V new methods to keep finds intact#! in Pompeii.#!"
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the central figure in the #V reconstruction of the Temple of the Sun at Teotihuacán#!.#!"
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered the Indus Valley Civilization#! at the site of Harappa.#!"
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered the Tomb of the First Qin Emperor#! guarded by an Army of Terracotta.#!"
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V discovered the Maya City of Tikal#! in the jungle of Guatemala.#!"
 lepsius_archaeologist_achievement_explored_petra_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V explored the city of Petra#! in the searing deserts of the Middle East.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\n #indent_newline:3 • The discovery of the #V Sarcophagus of an Unknown Pharaoh#! is one of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s greatest achievements.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\n #indent_newline:3 • Although Dr. [Scope.GetCharacter.GetLastNameNoFormatting] discovered the #V Tomb of an Unknown Pharaoh#!, this discovery was ruined by the destruction of the mummy of the Pharaoh in an unfortunate accident.#!"
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\n #indent_newline:3 • A milestone in [Scope.GetCharacter.GetHerHis] career was the discovery of the intact tomb of #V Pharaoh Tutankhamun#!.#!"
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\n #indent_newline:3 • The discovery of the #V Ship of Khufu#! will forever immortalize the name of Dr. [Scope.GetCharacter.GetLastNameNoFormatting] in the history books.#!"
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\n #indent_newline:3 • During [Scope.GetCharacter.GetHerHis] time in Mesopotamia, [Scope.GetCharacter.GetSheHe] found the #V Tower of Babylon#! that is known among archaeologists as Zikurrat Etemenanki. A marvelous find!#!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is probably the only person who can boast of rediscovering one of the seven wonders of the world. [Scope.GetCharacter.GetSheHe|U] actually found the #V Hanging Gardens#!.#!"
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\n #indent_newline:3 • Sure, for an archaeologist everything is a treasure, but the discovery of Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is surely a true treasure. The #V Treasures of Mycenae#! consisted of many things most of them made from gold like the Golden Masks.#!"
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\n #indent_newline:3 • The #V Tomb of Pakal#!, that Dr. [Scope.GetCharacter.GetLastNameNoFormatting] discovered, was very impressive. As impressive as it should be for the greatest king of the Maya.#!"
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\n #indent_newline:3 • While working in Egypt, [Scope.GetCharacter.GetSheHe] #V raised a Flag on the Great Pyramid of Gizah#!.#!"
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] did not only find the #V Ishtar Gate#! but reconstructed it. Now it shines in all its glory again.#!"
 lepsius_archaeologist_achievement_found_lamassu_loc: "\n #indent_newline:3 • In a great adventure full of dangers, [Scope.GetCharacter.GetSheHe] found the majestic #V Lamassu#!.#!"
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] escaped from a #V Mythical Labyrinth#! full of dangers.#!"
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n #indent_newline:3 • Sometimes Archaeology is dangerous. Professor [Scope.GetCharacter.GetLastNameNoFormatting] survived [Scope.GetCharacter.GetHerHis] journey through a mysterious #V Maya Pyramid#! that was more adventure than archaeology.#!"
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #V rediscovered Vilacamba#!, the last refuge of the Inca."
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V found huge drawings in the desert of Nazca#! that are only really visible from the sky.#!"
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is ridiculed by the scientific community. [Scope.GetCharacter.GetSheHe|U] claims that [Scope.GetCharacter.GetHerHis] #V expedition members were eaten by dinosaurs#!. Is this statement ridiculous or the truth?#!"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] provided photographic evidence of #V live Dinosaurs#! even though no one believed [Scope.GetCharacter.GetHerHim].#!"
 lepsius_archaeologist_achievement_photo_support_loc: "\n #indent_newline:3 • With the support of the government, Professor [Scope.GetCharacter.GetLastNameNoFormatting] was able to provide photographic evidence of #V live Dinosaurs#! even though he was ridiculed before.#!"
 lepsius_archaeologist_achievement_discovered_cliff_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V discovered the Cliff Palace#! of the Pueblo People.#!"
 lepsius_archaeologist_achievement_restored_angkor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V restored the city of Angkor#! in the jungles of Cambodia.#!"