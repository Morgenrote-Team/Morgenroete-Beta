 verrier_astronomer_achievements_no_astronomer_loc: "As conquistas de #V deste [concept_verrier_astronomer]#! serão exibidas aqui, quando você tiver uma." #deepl:2150212353

 verrier_astronomer_achievements_intro_loc: "#V Realizações desse astrônomo#![Scope.GetCharacter.GetFullName] é um astrônomo de sucesso que descobriu [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ." #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\nAo medir a #V distância de 61 Cygni a 11,4 anos-luz#!, [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu mostrar de uma só vez que o universo era muito maior do que se pensava anteriormente." #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "\nUma das maiores conquistas do [Scope.GetCharacter.GetHerHis] é a #V descoberta do elemento hélio#! enquanto estudava o espectro eletromagnético do sol." #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\nNinguém esperava que um novo planeta fosse descoberto, mas o professor [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o planeta Urano#!. Essa descoberta levou à busca de mais planetas em nosso sistema solar." #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\Muitos astrônomos procuraram o planeta entre Marte e Júpiter. Mas o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi quem #V encontrou Ceres#!." #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  encontrou o planeta Pallas#! na região entre Marte e Júpiter." #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] #V  encontrou o planeta Vesta#! na região entre Marte e Júpiter." #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  encontrou o Planeta Juno#! na região entre Marte e Júpiter." #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "\nUm dos [Scope.GetCharacter.GetHerHis] maiores feitos foi a #V descoberta do planeta Netuno#!. Essa descoberta garantiu a [Scope.GetCharacter.GetHerHim] um lugar para sempre nos livros de história." #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\nEmbora se discutisse se #V Plutão#! existia mesmo, o professor [Scope.GetCharacter.GetLastNameNoFormatting] de fato #V descobriu#! o pequeno planeta. Uma grande conquista astronômica!" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\nEm #V 1843#! [Scope.GetCharacter.GetSheHe] foi o primeiro a #V encontrar o Grande Cometa#! que, por isso, recebeu o nome de [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\nQuando o #V Grande Cometa de 1858#! passou pela Terra, o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi o primeiro a ver o cometa. Como resultado, o cometa recebeu o nome de [Scope.GetCharacter.GetHerHim]." #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\nComo o primeiro a descobrir o #V Grande Cometa de 1861#! na escuridão do céu noturno, o Professor [Scope.GetCharacter.GetLastNameNoFormatting] tornou-se o homônimo do objeto celeste." #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\nQuando o #V Grande Cometa de 1874#! apareceu pela primeira vez, foi o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] quem o notou primeiro. Agora o cometa levará o nome [Scope.GetCharacter.GetHerHis] para sempre." #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\nO ano de #V 1882#! foi espetacular do ponto de vista astronômico. O professor [Scope.GetCharacter.GetLastNameNoFormatting] descobriu um #V Grande Cometa#! em sua passagem pela Terra. Um espetáculo incrível." #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\nEm uma expedição ao Pacífico #V #! , o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] encontrou vários novos objetos astronômicos #V #! no hemisfério sul." #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\nNo ano de #V 1874#!, o professor [Scope.GetCharacter.GetLastNameNoFormatting] observou o #V Trânsito de Vênus#! no Oceano Pacífico. Geralmente é um evento único na vida." #deepl:885972622
 verrier_astronomer_achievement_observed_carrington_event_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] observou o #V Massive Solar Flare#! em [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]." #deepl:2882246181
 verrier_astronomer_achievement_observed_corona_loc: "\nDescobriu o #V [Scope.GetCharacter.GetLastNameNoFormatting] 's Beads#!, que recebeu o nome de [Scope.GetCharacter.GetHerHim]." #deepl:2736282257
 verrier_astronomer_achievement_sun_photo_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é o autor da #V primeira foto de um eclipse solar.#!" #deepl:3755032771
 verrier_astronomer_achievement_deimos_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Marte, Deimos#!." #deepl:69884165
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Marte, Phobos#!." #deepl:473150176
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Júpiter, Amalthea#!." #deepl:2237798027
