 verrier_astronomer_achievement_oberon_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Urano, Oberon#!."
 verrier_astronomer_achievement_ariel_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Urano, Ariel#!."
 verrier_astronomer_achievement_umbriel_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Urano, Umbriel#!."
 verrier_astronomer_achievement_miranda_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Urano, Miranda#!."
 verrier_astronomer_achievement_triton_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Netuno, Tritão#!."
 verrier_astronomer_achievement_nereid_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Netuno, Nereid#!."
 verrier_astronomer_achievement_moon_fission_loc: "\n[Scope.GetCharacter.GetSheHe|U] is considered the founder of the theory that the #V Moon was a part of the Earth#! and split off."
 verrier_astronomer_achievement_moon_capture_loc: "\n[Scope.GetCharacter.GetSheHe|U] is considered the founder of the theory that the #V Moon is a foreign body that was captured by the Earth#!."