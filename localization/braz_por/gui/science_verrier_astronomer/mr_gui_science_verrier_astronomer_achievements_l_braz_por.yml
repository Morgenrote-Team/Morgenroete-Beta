 verrier_astronomer_achievements_no_astronomer_loc: "As conquistas de #V deste [concept_verrier_astronomer]#! serão exibidas aqui, quando você tiver uma."
 verrier_astronomer_achievements_intro_loc: "#V Realizações desse astrônomo#![Scope.GetCharacter.GetFullName] é um astrônomo de sucesso que descobriu [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ."
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\nAo medir a #V distância de 61 Cygni a 11,4 anos-luz#!, [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu mostrar de uma só vez que o universo era muito maior do que se pensava anteriormente."
 verrier_astronomer_achievement_helium_discovered_loc: "\nUma das maiores conquistas do [Scope.GetCharacter.GetHerHis] é a #V descoberta do elemento hélio#! enquanto estudava o espectro eletromagnético do sol."
 verrier_astronomer_achievement_uranus_discoverer_loc: "\nNinguém esperava que um novo planeta fosse descoberto, mas o professor [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o planeta Urano#!. Essa descoberta levou à busca de mais planetas em nosso sistema solar."
 verrier_astronomer_achievement_ceres_discoverer_loc: "\Muitos astrônomos procuraram o planeta entre Marte e Júpiter. Mas o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi quem #V encontrou Ceres#!."
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  encontrou o planeta Pallas#! na região entre Marte e Júpiter."
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] #V  encontrou o planeta Vesta#! na região entre Marte e Júpiter."
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  encontrou o Planeta Juno#! na região entre Marte e Júpiter."
 verrier_astronomer_neptune_discoverer_loc: "\nUm dos [Scope.GetCharacter.GetHerHis] maiores feitos foi a #V descoberta do planeta Netuno#!. Essa descoberta garantiu a [Scope.GetCharacter.GetHerHim] um lugar para sempre nos livros de história."
 verrier_astronomer_achievement_pluto_discoverer_loc: "\nEmbora se discutisse se #V Plutão#! existia mesmo, o professor [Scope.GetCharacter.GetLastNameNoFormatting] de fato #V descobriu#! o pequeno planeta. Uma grande conquista astronômica!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\nEm #V 1843#! [Scope.GetCharacter.GetSheHe] foi o primeiro a #V encontrar o Grande Cometa#! que, por isso, recebeu o nome de [Scope.GetCharacter.GetLastNameNoFormatting]."
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\nQuando o #V Grande Cometa de 1858#! passou pela Terra, o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi o primeiro a ver o cometa. Como resultado, o cometa recebeu o nome de [Scope.GetCharacter.GetHerHim]."
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\nComo o primeiro a descobrir o #V Grande Cometa de 1861#! na escuridão do céu noturno, o Professor [Scope.GetCharacter.GetLastNameNoFormatting] tornou-se o homônimo do objeto celeste."
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\nQuando o #V Grande Cometa de 1874#! apareceu pela primeira vez, foi o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] quem o notou primeiro. Agora o cometa levará o nome [Scope.GetCharacter.GetHerHis] para sempre."
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\nO ano de #V 1882#! foi espetacular do ponto de vista astronômico. O professor [Scope.GetCharacter.GetLastNameNoFormatting] descobriu um #V Grande Cometa#! em sua passagem pela Terra. Um espetáculo incrível."
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\nEm uma expedição ao Pacífico #V #! , o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] encontrou vários novos objetos astronômicos #V #! no hemisfério sul."
 verrier_astronomer_achievement_observed_venus_transit_loc: "\nNo ano de #V 1874#!, o professor [Scope.GetCharacter.GetLastNameNoFormatting] observou o #V Trânsito de Vênus#! no Oceano Pacífico. Geralmente é um evento único na vida."
 verrier_astronomer_achievement_observed_carrington_event_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] observou o #V Massive Solar Flare#! em [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]."
 verrier_astronomer_achievement_observed_corona_loc: "\nDescobriu o #V [Scope.GetCharacter.GetLastNameNoFormatting] 's Beads#!, que recebeu o nome de [Scope.GetCharacter.GetHerHim]."
 verrier_astronomer_achievement_sun_photo_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é o autor da #V primeira foto de um eclipse solar.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Marte, Deimos#!."
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Marte, Phobos#!."
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Júpiter, Amalthea#!."
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Júpiter, Himalia#!."
 verrier_astronomer_achievement_elara_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Júpiter, Elara#!."
 verrier_astronomer_achievement_pasiphae_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Júpiter, Pasiphae#!."
 verrier_astronomer_achievement_sinope_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Júpiter, Sinope#!."
 verrier_astronomer_achievement_lysithea_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Júpiter, Lysithea#!."
 verrier_astronomer_achievement_carme_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Júpiter, Carme#!."
 verrier_astronomer_achievement_enceladus_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Saturno, Enceladus#!."
 verrier_astronomer_achievement_mimas_discoverer_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  descobriu o satélite natural de Saturno, Mimas#!."
 verrier_astronomer_achievement_hyperion_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu o satélite natural de Saturno, Hyperion#!."
