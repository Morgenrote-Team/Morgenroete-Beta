l_braz_por:
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "Esplendor Moderno"
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T Esplendor Moderno#!\nDada uma escola de arquitetura moderna, podemos transformar a capital da nossa nação em um verdadeiro sonho de ousados experimentos arquitetônicos. A Art Deco é considerada a mais prestigiosa, mas a transformação irá demorar mais.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [concept_gaudi_architect] que não está #V ocupado#!.#!"
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um dos seguintes modificadores: #V Arquitetura \"Bauhaus\"#!, #V Arquitetura Neoclássica#!, ou #V Arquitetura Art Deco#!.#!"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "Projetos: Monumentos Urbanos"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T Projetos: Monumentos Urbanos#!\nUm arquiteto pode desenvolver três projetos possíveis na categoria \"Monumentos\": a [GetBuildingType('building_gaudi_statue').GetName], a [GetBuildingType('building_gaudi_fountain').GetName] e o [GetBuildingType('building_gaudi_arch').GetName]. Alguns projetos requerem tecnologias, e algumas construções possuem requisitos especiais em seus respectivos estados.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_statue').GetName] requer [GetTechnology('elgar_classicism_tech').GetName].\n[GetBuildingType('building_gaudi_fountain').GetName] não possui requisitos.\n[GetBuildingType('building_gaudi_arch').GetName] requer [GetTechnology('napoleonic_warfare').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "Projetos: Praças Públicas"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T Projetos: Praças Públicas#!\nUm arquiteto pode desenvolver três projetos possíveis na categoria \"Praças\": o [GetBuildingType('building_gaudi_park').GetName], o [GetBuildingType('building_gaudi_luna').GetName], e a [GetBuildingType('building_gaudi_parade').GetName]. Alguns Projetos possuem requisitos especiais em seus respectivos estados.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_park').GetName] não possui requisitos.\n[GetBuildingType('building_gaudi_luna').GetName] requer [GetTechnology('curtiss_tourism_tech').GetName].\n[GetBuildingType('building_gaudi_parade').GetName] requer [GetTechnology('nationalism').GetName]. #!"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "Projetos: Construções de Serviço"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T Projetos: Construções de Serviço#!\nUm arquiteto pode desenvolver três possíveis projetos na categoria \"Serviços\": A [GetBuildingType('building_gaudi_almshouse').GetName], a [GetBuildingType('building_gaudi_school').GetName], e a [GetBuildingType('building_gaudi_prison').GetName]. Alguns Projetos requerem tecnologias, e algumas construções possuem requisitos especiais em seus respectivos estados.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_almshouse').GetName] requer [GetTechnology('egalitarianism').GetName].\n[GetBuildingType('building_gaudi_school').GetName] requer [GetTechnology('empiricism').GetName].\n[GetBuildingType('building_gaudi_prison').GetName] requer [GetTechnology('law_enforcement').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "Projetos: Instituições de Saúde"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T Projetos: Instituições de Saúde#!\nUm arquiteto pode desenvolver três possíveis projetos na categoria \"Saúde\": a [GetBuildingType('building_gaudi_canalization').GetName], o [GetBuildingType('building_gaudi_hospital').GetName], e a[GetBuildingType('building_gaudi_health').GetName]. Alguns Projetos requerem tecnologias, e algumas construções possuem requisitos especiais em seus respectivos estados.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_canalization').GetName] requer [GetTechnology('modern_sewerage').GetName].\n[GetBuildingType('building_gaudi_hospital').GetName] requer [GetTechnology('theiler_microbiology_tech').GetName].\n[GetBuildingType('building_gaudi_health').GetName] requer [GetTechnology('pharmaceuticals').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "Projetos: Academias Nacionais"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T Projetos: Academias Nacionais#!\nUm arquiteto pode desenvolver três possíveis projetos na categoria \"Academias\": a [GetBuildingType('building_gaudi_science').GetName], a [GetBuildingType('building_gaudi_arts').GetName], e o [GetBuildingType('building_gaudi_sports').GetName]. Alguns Projetos requerem tecnologias, e algumas construções possuem requisitos especiais em seus respectivos estados.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_science').GetName] requires [GetTechnology('dialectics').GetName].\n[GetBuildingType('building_gaudi_arts').GetName] requires [GetTechnology('romanticism').GetName].\n[GetBuildingType('building_gaudi_sports').GetName] requires [GetTechnology('vikelas_international_sports_tech').GetName].#!"
 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetName] pesquisou [GetTechnology('urban_planning').GetName].#!"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "Construção Pública"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Construção Pública#!\nBaseado no estilo arquitetônico dele, um arquiteto pode contribuir pontos de construção à nível nacional para avançar as Construções Públicas. Após 5 anos de trabalho contínuo, ele recebe um bônus de reputação.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "Uma Obra-prima do Arquiteto"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T Obra-prima do arquiteto#!\nUm [concept_gaudi_great_architect] pode, somente uma vez, projetar um Projeto para um monumento nacional único em um estilo moderno. Esse trabalho de vida vai negar o nome do arquiteto e dar ao nosso pais sua própria maravilha arquitetônica para o mundo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [concept_gaudi_architect] com o #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#!, ou #V $gaudi_art_deco_style$#! [concept_character_trait].#!"
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [concept_gaudi_great_architect].#!"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "Planejamento Urbano"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T Urban Planning#!\nArchitects can visit a nation's city centers and significantly improve conditions there through forward-looking planning and building regulations.\nThis will add three modifiers to your building over time: $gaudi_urban_building_throughput_add_modifier_with_tooltip$, $gaudi_urban_building_production_mult_modifier_with_tooltip$ and $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text Pelo menos uma Construção \"[GetBuildingType('building_urban_center').GetName]\" de Nível 1 ou maior não possui todos os 3 [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_ARCHITECT_STUDY_TRIP_BUTTON: "Viagem de Estudos do Arquiteto"
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T Viagem de Estudos do Arquiteto#!\nEnvie seu arquiteto fora por 2 anos para ganhar novos conhecimentos e habilidades no meio arquitetônico. O arquiteto vai estar indisponível durante esse período\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text  Nosso arquiteto ainda #R não foi#! em nenhuma Viagem de Estudos.#!"
