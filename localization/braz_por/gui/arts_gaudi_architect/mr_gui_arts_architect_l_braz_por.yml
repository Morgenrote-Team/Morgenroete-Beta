 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "Expansão da Capital"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T Expansão da Capital#!\nNovos estilos arquitetônicos e novas tecnologias de construção abrem a possibilidade de desenvolver nossa capital, transformando-a de uma cidadezinha pacata em uma das metrópoles mais importantes de nosso tempo ao longo de um século.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [concept_gaudi_architect] com o #V $gaudi_historicism_style$#!, #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#!, ou #V $gaudi_art_deco_style$#! [concept_character_trait].#!"
 MR_ARCHITECT_TREATISE_BUTTON: "Tratado de Arquitetura"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Architecture Treatise#!\nAn architect can summarize his theoretical ideas on architecture once in his life. His results can be surpassed by another architect if he is better. The result depends largely on experience. An architect working on a treatise is unavailable for a year.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
