l_braz_por:
 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]"
 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]"
 gaudi_architect_achievements_no_architect_loc: "As conquistas de #V deste [concept_gaudi_architect]#! serão exibidas aqui, quando você tiver uma."
 gaudi_architect_achievements_intro_loc: "#V Conquistas deste arquiteto#!\n[Scope.GetCharacter.GetFullName] é um [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]. [Scope.GetCharacter.GetSheHe|U] criou [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0] #V  Blueprints#! em [Scope.GetCharacter.GetHerHis] carreira arquitetônica até o momento."
 gaudi_architect_achievement_study_trip_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] realizou #V uma Viagem de Estudo para Arquitetos#!."
 gaudi_architect_achievement_urban_planning_loc: "\nCom [Scope.GetCharacter.GetHerHis] #V  Planejamento Urbano#! [Scope.GetCharacter.GetSheHe] ajudou a melhorar a vida nas cidades."
 gaudi_architect_achievement_treatise_loc: "\n[Scope.GetCharacter.GetHerHis|U] #V  Treatise on Architecture#! é considerado um trabalho padrão."
 gaudi_architect_achievement_custom_monument_loc: "O \n[Scope.GetCharacter.GetLastNameNoFormatting] é famoso por ter criado o projeto de um #V Unique Monument#! - uma obra-prima arquitetônica!"
 gaudi_architect_achievement_art_deco_splendour_loc: "\nUma das realizações mais notáveis da carreira [Scope.GetCharacter.GetHerHis] foi a transformação urbana completa #V no estilo Art Deco#!."
 gaudi_architect_achievement_neoclassical_splendour_loc: "#V \nUma das realizações mais notáveis da carreira [Scope.GetCharacter.GetHerHis] foi a transformação urbana completa no estilo neoclássico#!."
 gaudi_architect_achievement_bauhaus_splendour_loc: "#V \nUma das realizações mais notáveis da carreira [Scope.GetCharacter.GetHerHis] foi a transformação urbana completa no estilo Bauhaus#!."
 gaudi_architect_achievement_capital_expansion_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] trabalhou incansavelmente no desenvolvimento de uma cidade capital."