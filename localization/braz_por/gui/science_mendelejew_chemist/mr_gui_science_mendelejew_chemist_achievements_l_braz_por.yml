l_braz_por:
 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)]"
 mendelejew_chemist_no_chemist_loc: "As conquistas de #V deste [concept_mendelejew_chemist]#! serão exibidas aqui, quando você tiver uma."
 mendelejew_chemist_achievements_intro_loc: "#V Conquistas desse químico#!\n[Scope.GetCharacter.GetFullName] é um químico de sucesso."
 mendelejew_chemist_theorized_elementes_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  teorizou [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Elementos#!."
 mendelejew_chemist_discovered_elementes_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  descobriu [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Elementos#!."
 mendelejew_chemist_isolated_elementes_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  isolado [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Elementos#!."
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] é famoso pela #V invenção da Tabela Periódica#!."
 mendelejew_chemist_achievement_invented_dynamite_loc: "\nCom a #V invenção da dinamite#!, a [Scope.GetCharacter.GetFullNameNoFormatting] mudou o mundo, seja na mineração, na construção ou na guerra."
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\nA #V descoberta dos gases nobres#! fez do Dr. [Scope.GetCharacter.GetLastNameNoFormatting] um dos químicos mais famosos de todos os tempos."
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\nO Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] descobriu o motivo das Linhas de Fraunhofer e, assim, lançou as bases para a astrospectroscopia."
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n[Scope.GetCharacter.GetSheHe] tornou possível #V criar petróleo sinteticamente#!."
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\nCom a #V invenção da borracha sintética#! o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] libertou o mundo da necessidade de coletar borracha das árvores."
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi um dos participantes do #V primeiro Congresso Internacional de Químicos#!."
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] passou muito tempo pesquisando como #V melhorar os fertilizantes e sua produção#!."
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n[Scope.GetCharacter.GetSheHe] é pioneira na produção de #V explosivos aprimorados e nas reações químicas para criá-los#!."
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\nConhecido pelo trabalho [Scope.GetCharacter.GetHerHis] em #V aprimoramento de sintéticos e sua produção#!, o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é bem visto entre outros químicos e no setor químico."