 tesla_engineer_achievements_loc: "$tesla_engineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_iron_lung_inventor_var').IsSet , Scope.Var('panum_physician_achievement_iron_lung_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_road_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_road_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_irrigation_project_finished_engineer_var').IsSet , Scope.Var('tesla_irrigation_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_railway_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_railway_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_construction_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_construction_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "As conquistas de #V deste [concept_gaudi_engineer]#! serão exibidas aqui, quando você tiver uma."
 tesla_engineer_achievements_intro_loc: "#V Feitos deste Engenheiro#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] construiu o primeiro edifício #V usando estruturas de aço#!. Essa forma de construção se espalhou pelo mundo como um incêndio."
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] foi a primeira pessoa a #V Enviar um telegrama#! usando um alfabeto que [Scope.GetCharacter.GetSheHe] inventou."
 tesla_engineer_achievements_invented_automobile_loc: "\nEm [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] inventou um #V carro com motor a combustão#! e o dirigiu por uma longa distância. Isso marcou o início da disseminação explosiva do automóvel."
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] aprimorado #V Redes rodoviárias#!. Graças ao trabalho do [Scope.GetCharacter.GetHerHis] para modernizar as estradas, elas agora são consideradas as mais modernas do mundo."
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] construiu muitas #V novas pontes#! que resultaram em uma infraestrutura melhor."
 tesla_engineer_achievements_finished_tunnel_project_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] estava trabalhando na construção de muitos túneis #V #! que são pequenas maravilhas da tecnologia."
 tesla_engineer_achievements_finished_railway_project_loc: "#V \n[Scope.GetCharacter.GetSheHe] melhorou maciçamente as linhas ferroviárias#! implementando novas tecnologias e outras melhorias."
 tesla_engineer_achievements_finished_construction_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  aprimorou os setores de construção#! introduzindo equipamentos e técnicas de construção modernos."
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] criou um novo #V Topographic Map#! que facilita futuros projetos de construção."
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  desenvolveu novas locomotivas#! que impulsionarão as ferrovias."
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] ajudou várias empresas a #V melhorar sua produção#!."
 tesla_engineer_achievements_finished_rifles_project_loc: "\O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  projetou um novo Rifle#! que é um dos mais modernos do mundo."
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] é um #V pioneiro no projeto e construção de tanques#! que modernizou nossos tanques."
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  revolucionou os trabalhos de campo e as defesas#!, o que salvou a vida de muitos soldados."
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ajudou a conduzir pesquisas geomagnéticas ao #V construir um Observatório Geomagnético#!."
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] construiu uma rede de telegrafia #V #! ."
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  construiu uma rede de rádio#!."
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  modernizou os aeroportos#!."
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] desenvolvido #V Aviões modernos para militares#!."
 tesla_engineer_achievements_bicycle_invented_loc: "Em [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  inventou o primeiro Bycycle#!. Uma nova e excelente maneira de viajar usando apenas sua própria energia."