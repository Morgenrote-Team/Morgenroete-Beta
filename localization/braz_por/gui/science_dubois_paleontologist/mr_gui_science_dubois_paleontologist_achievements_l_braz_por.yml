 dubois_paleontologist_no_paleontologist_loc: "As conquistas de #V deste [concept_dubois_paleontologist]#! serão exibidas aqui, quando você tiver uma."
 dubois_paleontologist_achievements_intro_loc: "#V Achievements of this Paleontologist#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] is [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')], having collected [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].#!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] founded the #V first Paleontological Museum#! in the world, showcasing a remarkable fossil collection.#!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] attended a congress dedicated to unraveling the mystery of dinosaur extinction.#!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] discovered a rare piece of #V Amber#! containing a prehistoric mosquito, possibly with dinosaur blood.#!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] unearthed an #V Ammonite#!, aiding in the study of ancient marine sediments.#!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s find of #V Archaeopteryx#! is hailed as a key link between dinosaurs and birds.#!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n #indent_newline:3 • #V Compositas#!, ancient shells found by Professor [Scope.GetCharacter.GetLastNameNoFormatting], offer insight into prehistoric life.#!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n #indent_newline:3 • The #V Eusthenopteron#! fossil discovered by [Scope.GetCharacter.GetSheHe] reveals early adaptations for life on land.#!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n #indent_newline:3 • #V Ichthyosaurus#!, found by Dr. [Scope.GetCharacter.GetLastNameNoFormatting], was a dolphin-like reptile that gave birth to live young.#!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] uncovered #V Ichthyostega#!, one of the earliest land vertebrates.#!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] discovered the giant #V Megatherium#!, a prehistoric sloth reaching up to 6 meters.#!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] found a #V Pterodactylus#! fossil, a winged dinosaur from ancient lakeshores.#!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] unearthed a well-preserved #V Smilodon#!, the legendary saber-toothed predator.#!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n #indent_newline:3 • Among [Scope.GetCharacter.GetHerHis] finds are #V Trilobites#!, important index fossils for dating rock layers.#!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n #indent_newline:3 • In New Zealand, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] discovered the massive #V Haast Eagle#!, a giant bird of prey.#!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] achieved a flawless reconstruction of an #V Ankylosaurus#!, admired by peers.#!"
