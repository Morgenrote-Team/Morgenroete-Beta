ievement_fossil_pterodactylus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_pterodactylus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_smilodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_smilodon_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_trilobite_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_trilobite_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_haast_eagle_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_haast_eagle_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_ankylosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_ankylosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_diplodocus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_diplodocus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_triceratop_var').IsSet , Scope.Var('dubois_paleontologist_achievement_triceratop_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_tyrannosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_tyrannosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_stegosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_stegosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_antarctosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_antarctosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_argyrosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_argyrosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_iguanodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_iguanodon_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]"
 dubois_paleontologist_no_paleontologist_loc: "As conquistas de #V deste [concept_dubois_paleontologist]#! serão exibidas aqui, quando você tiver uma."
 dubois_paleontologist_achievements_intro_loc: "#V As conquistas desse paleontólogo#!\n[Scope.GetCharacter.GetFullNameNoFormatting] são [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')], que coletou um total de [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] e [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ."
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n[Scope.GetCharacter.GetSheHe|U] fundou o #V primeiro Museu Paleontológico#! do mundo, exibindo vários fósseis."
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] participou de um congresso que tentou determinar como os dinossauros foram extintos."
 dubois_paleontologist_achievement_fossil_amber_loc: "\n[Scope.GetCharacter.GetSheHe|U] encontrou uma peça única de #V âmbar#! na qual um pequeno mosquito estava envolto. Talvez haja até um pouco de sangue de dinossauro nele?"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] encontrou um amonita #V #! , que ajudará na delimitação cronológica de sedimentos marinhos."
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\nMuitos consideram a descoberta do Dr. [Scope.GetCharacter.GetLastNameNoFormatting] como a primeira ave. De fato, o #V Archaeopteryx#! parece ser o elo perdido entre os dinossauros e as aves."
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Compositas#! são conchas que viveram há milhões de anos em quase todos os continentes. O professor [Scope.GetCharacter.GetLastNameNoFormatting] encontrou uma durante uma das [Scope.GetCharacter.GetHerHis] escavações."
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\nO interessante é que o Eusthenopteron #V #! que [Scope.GetCharacter.GetSheHe] encontrou já tem um úmero, uma ulna e um rádio distintos em sua barbatana anterior. Esses ossos estão presentes em todos os vertebrados terrestres."
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V O Ichthyosaura#!, do qual o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] encontrou um, é um réptil muito singular. Ele se parece com os golfinhos e não põe ovos, mas dá à luz os filhotes vivos, o que é muito raro em répteis."
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\nCom a descoberta do #V Ichthyostega#!, o professor [Scope.GetCharacter.GetLastNameNoFormatting] encontrou um dos primeiros animais terrestres. Ele é o elo perdido entre os peixes e os tetrapodomorfos com membros."
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\nAs preguiças são pequenas hoje em dia, mas já existiram enormes no passado, como mostrou uma das descobertas do Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. O #V Megatherium#! tinha até 6 metros (20 pés) de comprimento."
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n[Scope.GetCharacter.GetSheHe|U] descobriu um fóssil de #V Pterodactylus#!, um dinossauro alado que provavelmente vivia perto de lagos e rios."
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\nO #V Smilodon#! é um predador assustador que viveu até alguns milhares de anos atrás. O professor [Scope.GetCharacter.GetLastNameNoFormatting] encontrou um esqueleto muito bem preservado de um deles."
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\nUma das [Scope.GetCharacter.GetHerHis] pequenas descobertas são vários trilobitas T#V #! . Embora não sejam espetaculares, eles são ótimos fósseis de índice."
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\nNa Nova Zelândia, o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] fez uma descoberta fascinante quando [Scope.GetCharacter.GetSheHe] encontrou uma águia gigantesca, agora chamada de #V Haast Eagle#!."
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruiu um #V Ankylosaurus#! de forma perfeita. Outros paleontólogos estão maravilhados com a reconstrução."
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\O professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruiu um #V Ankylosaurus#!, mas de forma imperfeita."
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruiu um #V Anquilossauro#! mas foi uma tentativa horrível e é ridicularizado por outros paleontólogos."
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] \A reconstrução de um #V Diplodocus#! é absolutamente perfeita e causa inveja a todos os museus paleontológicos."
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\Uma[Scope.GetCharacter.GetHerHis|U] reconstrução de um #V Diplodocus#! é suficientemente boa."
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] A reconstrução de um #V Diplodocus#! é desastrosa e vista como uma abominação."
 dubois_paleontologist_achievement_perfect_triceratop_loc: "#V \nA perfeição da reconstrução do Triceratops#! do Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é amplamente conhecida e aumentou o prestígio de nossa coleção paleontológica."
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "#V \nA mediocridade da reconstrução do Triceratops#! do Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é boa o suficiente para nosso museu, mas nada excepcional."
 dubois_paleontologist_achievement_poor_triceratop_loc: "#V O terror da reconstrução do Triceratops#! do Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é uma vergonha para nossa coleção."
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\nUm #V Tyrannosaurus Rex#! é uma visão maravilhosa. Especialmente aquele que o professor [Scope.GetCharacter.GetLastNameNoFormatting] montou perfeitamente."
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\nA #V Tyrannosaurus Rex#! é uma visão maravilhosa. Mesmo que não esteja perfeitamente montado como o que o professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruiu."
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\nUm #V Tyrannosaurus Rex#! é uma visão maravilhosa. Mas não aquele que o professor [Scope.GetCharacter.GetLastNameNoFormatting] montou. Este aqui é uma monstruosidade absurda."
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "#! \nO poderoso esqueleto de Stegosaurus #V que [Scope.GetCharacter.GetSheHe] montou é uma peça perfeita para nossa exposição de dinossauros."
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\nO #V esqueleto de estegossauro#! que [Scope.GetCharacter.GetSheHe] montou é uma boa peça para nossa exposição de dinossauros."
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\nO horrível esqueleto de #V Stegosaurus#! que [Scope.GetCharacter.GetSheHe] montou é um desperdício de espaço em nossa exposição de dinossauros."
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\nNem todo mundo consegue montar um #V Antarctosaurus#! tão perfeitamente quanto o Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Esse é um dos destaques de nossa coleção."
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\nA montagem de um #V Antarctosaurus#! é uma tarefa difícil, mas o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] fez isso muito bem."
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\nNem todo mundo consegue montar um #V Antarctosaurus#!. Mas poucas pessoas o montam tão horrivelmente mal quanto o Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Essa é a vergonha de nossa coleção."
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\nO maravilhoso esqueleto de Argyrosaurus #V #! em nossa coleção é obra do professor [Scope.GetCharacter.GetLastNameNoFormatting]. Um esqueleto realmente maravilhoso."
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\nO esqueleto do #V Argyrosaurus#! em nossa coleção é obra do professor [Scope.GetCharacter.GetLastNameNoFormatting]. Um esqueleto muito bem feito."
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\nO monstruoso #V esqueleto de Argyrosaurus#! em nossa coleção é obra do professor [Scope.GetCharacter.GetLastNameNoFormatting]. Obviamente, o trabalho de um paleontólogo desastrado."
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] montou um esqueleto de #V Iguanodon#! com perfeição."
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] montou um esqueleto de #V Iguanodon#!."
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] montou um esqueleto de #V Iguanodon#! de forma terrivelmente errada."
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu reconstruir perfeitamente o esqueleto de um #V Plateosaurus#!. Uma excelente exposição para nossa coleção."
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu reconstruir o esqueleto de um #V Plateosaurus#!."
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu reconstruir o esqueleto de um #V Plateosaurus#!. Mas ele parece muito estranho e deformado."
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\nReconstruir um #V Giraffatitan#! é um trabalho árduo e precisa de muito espaço. Felizmente, o professor [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu usar o tamanho do nosso museu para preparar um esqueleto magnífico do dinossauro."
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\nReconstruir um #V Giraffatitan#! é um trabalho árduo e precisa de muito espaço. Felizmente, o professor [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu usar o tamanho do nosso museu para preparar o esqueleto do dinossauro."
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\nReconstruir um #V Giraffatitan#! é um trabalho árduo e precisa de muito espaço. Embora [Scope.GetCharacter.GetSheHe] tenha todo o museu para trabalhar, o professor [Scope.GetCharacter.GetLastNameNoFormatting] só conseguiu criar uma versão absurda do dinossauro"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\nO assustador esqueleto do #V Spinosaurus#! em nossa coleção foi montado pelo Dr. [Scope.GetCharacter.GetLastNameNoFormatting] e é uma obra de arte."
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\nO assustador esqueleto do #V Spinosaurus#! em nossa coleção foi montado pelo Dr. [Scope.GetCharacter.GetLastNameNoFormatting]."
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\nO esqueleto engraçado do #V Spinosaurus#! em nossa coleção foi montado pelo Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Ele está mal feito e parece mais uma galinha do que um dinossauro."
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\nCom sua boca parecida com um bico, o #V Psittacosaurus#! que o professor [Scope.GetCharacter.GetLastNameNoFormatting] montou era um esqueleto extraordinário."
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\nCom sua boca parecida com um bico, o #V Psittacosaurus#! que o professor [Scope.GetCharacter.GetLastNameNoFormatting] montou era um belo esqueleto."
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\nO #V Psittacosaurus#! realmente tinha um bico estranho nas costas e uma tromba em vez de boca? Pelo menos o professor [Scope.GetCharacter.GetLastNameNoFormatting] acha que sim, mas ele pode ser o único."
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\nO assustador #V Velociraptor#! é uma das obras-primas do Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Ele é perfeitamente montado."
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\nO assustador #V Velociraptor#! é um bom trabalho do Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] montou-o muito bem."
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\nO assustador #V Velociraptor#! é um dos piores trabalhos do Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Em primeiro lugar, ele é muito pequeno, em segundo lugar, certamente não tinha 10 garras como coroa..."
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\nO #V Muttaburrasaurus#! que o professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruiu era bastante impressionante e não apenas por causa de seu tamanho."
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\nO #V Muttaburrasaurus#! que o professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruiu era bastante impressionante, principalmente por causa de seu tamanho."
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\nO #V Muttaburrasaurus#! que o professor [Scope.GetCharacter.GetLastNameNoFormatting] reconstruiu era horrível. Por um lado, todos os outros paleontólogos notaram que a cabeça não estava presa à cauda e que os joelhos se dobravam para o outro lado."
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\nO tamanho do #V Rhoetosaurus#! é impressionante. Mas, sem a habilidade do Dr. [Scope.GetCharacter.GetLastNameNoFormatting], certamente não teria sido tão impressionante."
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\nO tamanho do #V Rhoetosaurus#! é impressionante. Mas, sem a habilidade do Dr. [Scope.GetCharacter.GetLastNameNoFormatting], com certeza teria sido menos impressionante."
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\nPensar que a cauda pertence às costas do #V Rhoetosaurus#! foi provavelmente a ideia mais estúpida do Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Pelo menos ainda..."
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\nO #o Msasaurus#! que o professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstruiu é um monstro gigantesco do mar."
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\nO #o Mosasaurus#! que o professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstruiu um grande monstro do mar."
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\nO #o Mosassauro#! que o professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] reconstruiu era horrível. É quase certo que o mosassauro vivia no oceano, mas de alguma forma o esqueleto acabou ficando com pernas."
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\nO #o Plesiosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é um enorme réptil marinho."
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\nO #o Plesiosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é um réptil marinho que viveu durante a época dos dinossauros."
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\nO #o Plesiosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é um pouco estranho. Ele tem 4 extremidades semelhantes a cobras e uma cabeça muito curta, sem cauda."
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\nO #o Basilosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é uma baleia pré-histórica que viveu há milênios."
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\nO #o Basilosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é uma baleia pré-histórica."
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\nO #o Basilosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tem uma fisiologia muito estranha. Ele se parece mais com uma bola do que com qualquer outra coisa, o que parece bastante errado."
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\nO #o Megalodon#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é um tubarão gigantesco. Um esqueleto realmente impressionante."
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\nO #o Megalodon#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é um tubarão gigantesco."
 dubois_paleontologist_achievement_poor_megalodon_loc: "\nO #o Megalodon#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] parece estar um pouco... fora de lugar. A enorme cabeça está montada em um pescoço muito fino e, aparentemente, o tubarão tinha espinhos estranhos cobrindo todo o seu corpo."