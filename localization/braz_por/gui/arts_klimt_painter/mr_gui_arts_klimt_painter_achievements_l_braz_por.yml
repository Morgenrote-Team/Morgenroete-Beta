l_braz_por:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "As conquistas de #V deste [concept_klimt_painter]#! serão exibidas aqui, quando você tiver uma."
 klimt_painter_achievements_intro_loc: "#V Conquistas desse pintor#!\n[Scope.GetCharacter.GetFullName] é um [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')].\n[Scope.GetCharacter.GetSheHe] produziu [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0] pinturas, das quais [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0] são consideradas obras-primas."
 klimt_painter_achievement_vernissage_loc: "\n[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] expôs suas pinturas em uma grande vernissage."
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe] inaugurou uma nova Galeria de Arte com [Scope.GetCharacter.GetHerHis] pinturas maravilhosas. Com certeza a Galeria verá muitos outros grandes pintores no futuro!"