l_braz_por:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T The Transatlantic Cable#!\nTelegraphy enables the exchange of information at a previously unknown speed. By establishing a telegraphy station on both sides of the Atlantic, there is the possibility of laying an undersea telegraphy cable to bring Europe and America closer. However, this requires suitable equipment and a developed news sector that would invest significantly in order to exploit such an expensive venture lucratively.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_: "The Suez India Cable"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T The Suez India Cable#!\nWith the opening of the Suez Canal, the prospect of laying a direct submarine cable to India has gained new urgency. A permanent telegraphic link would shorten communication times drastically and bind Asia more closely to Europe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "The Transpacific Cable"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T The Transpacific Cable#!\nAs transoceanic trade intensifies and steam routes connect the Americas with Asia and Oceania, the need for a permanent telegraphic link across the Pacific becomes apparent. A submarine cable would transform months of communication into minutes, anchoring influence and coordination across vast maritime distances.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetName] has the $mr_basic_telegraphy$ [concept_company].#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V No one#! has sent a #V radio message over the Atlantic yet#!.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text The [GetBuildingType('building_suez_canal').GetName] exists.#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [concept_investment_pool] of at least #V 5 Million#!.#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [concept_investment_pool] of at least #V 10 Million#!.#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [concept_investment_pool] of at least #V 20 Million#!.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has not the $tesla_transatlantic_cable_expedition_failed_modifier$ modifier.#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has not the $tesla_suez_india_cable_expedition_failed_modifier$ modifier.#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has not the $tesla_transpacific_cable_expedition_failed_modifier$ modifier.#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T The Transatlantic Cable#!\n#p There is currently an ongoing Expedition to lay the Transatlantic Cable.#!\nTelegraphy enables the exchange of information at a previously unknown speed. By establishing a telegraphy station on both sides of the Atlantic, there is the possibility of laying an undersea telegraphy cable to bring Europe and America closer. However, this requires suitable equipment and a developed news sector that would invest significantly in order to exploit such an expensive venture lucratively."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T The Suez India Cable#!\n#p There is currently an ongoing Expedition to lay the Suez India Cable.#!\nWith the opening of the Suez Canal, the prospect of laying a direct submarine cable to India has gained new urgency. A permanent telegraphic link would shorten communication times drastically and bind Asia more closely to Europe."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T The Transpacific Cable#!\n#p There is currently an ongoing Expedition to lay the Transpacific Cable.#!\nAs transoceanic trade intensifies and steam routes connect the Americas with Asia and Oceania, the need for a permanent telegraphic link across the Pacific becomes apparent. A submarine cable would transform months of communication into minutes, anchoring influence and coordination across vast maritime distances."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "The Suez India Cable"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n No#! country has researched [GetTechnology('dreadnought').GetName] or [GetTechnology('destroyer').GetName]. The year is also #V before#! 1896.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NOT_ONGOING_TRIGGER_TT: "#default_text [GetPlayer.GetName] does not have the #V $je_tesla_transatlantic_cable$ Journal Entry.#!"