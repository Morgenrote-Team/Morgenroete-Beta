l_braz_por:
 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "As conquistas de #V deste [concept_dubois_naturalist]#! serão exibidas aqui, quando você tiver uma."
 ito_naturalist_achievements_intro_loc: "#V Feitos desse Naturalista#!\n[Scope.GetCharacter.GetFullName] é um naturalista talentoso que coletou [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 ito_naturalist_achievement_total_zoo_animals_loc: "\nDurante o mandato de [Scope.GetCharacter.GetHerHis] como naturalista, um total de [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] foram capturados e trazidos para [GetPlayer.MakeScope.GetCountry.GetName]."
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] é bem conhecido por documentar [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] em seu habitat natural."
 ito_naturalist_achievement_invented_evolution_theory_loc: "\nUma das maiores realizações de [Scope.GetCharacter.GetHerHis] foi o livro \"#V On the Origin of Species#!\", que descreveu a teoria da evolução pela primeira vez."
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] participou do debate que determinou se o ser humano era único ou apenas um animal como todos os outros."
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] mostrou que a #V Peppered Moth evolui#! para se adaptar às mudanças em seu ambiente. Uma prova da Teoria da Evolução."
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\nEm uma expedição #V ao Oceano Pacífico#!, o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] explorou extensivamente a flora e a fauna desse país maravilhoso. [Scope.GetCharacter.GetSheHe] descobriu muitas espécies novas."
 ito_naturalist_achievement_wallace_line_discovered_loc: "\nEm sua viagem pelo Pacífico, [Scope.GetCharacter.GetLastNameNoFormatting] notou uma #V clara separação entre a flora e a fauna asiática e australiana#!. Essa descoberta apóia a teoria da evolução e sugere uma separação maciça das ilhas no passado."
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] foi fundamental para a #V abertura do zoológico#!. Um lugar onde animais de lugares distantes podem ser vistos de perto."
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\nEm uma expedição botânica à floresta amazônica, o professor [Scope.GetCharacter.GetLastNameNoFormatting] encontrou um nenúfar gigante #V #! . Uma planta única que pode produzir folhas com um diâmetro de até 3 metros."
 ito_naturalist_achievement_found_attacus_atlas_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] encontrou uma #V Titanic Moth#! durante uma expedição botânica na Indochina. Ela é uma das maiores borboletas do mundo e produz uma seda muito resistente."
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\nAo explorar Bornéu durante uma expedição botânica, o professor [Scope.GetCharacter.GetLastNameNoFormatting] encontrou uma #V enorme flor#! que cresce até 3 metros de altura. Um verdadeiro milagre botânico."
 ito_naturalist_achievement_found_goliathus_loc: "\nAs florestas tropicais do Congo abrigam muitas maravilhas. Uma delas foi descoberta pelo Dr. [Scope.GetCharacter.GetLastNameNoFormatting] em uma expedição botânica. O #V Goliath Beetle#! é um dos maiores insetos do mundo e, aparentemente, bastante raro."
 ito_natualist_achievement_forestry_improvement_finished_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] é bem conhecido por seu trabalho [Scope.GetCharacter.GetHerHis] sobre florestas e como melhorar a silvicultura."
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n[Scope.GetCharacter.GetHerHis|U] trabalho em plantações de borracha e experimentos com as melhores condições de cultivo permitiram que nosso país melhorasse enormemente a produção de borracha."
 ito_naturalist_achievement_great_barrier_reef_discovered_loc: "\nOn an expedition to the Pacific, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] explored the #V Great Barrier Reef#! in more detail and was the first scientist to recognize its importance."