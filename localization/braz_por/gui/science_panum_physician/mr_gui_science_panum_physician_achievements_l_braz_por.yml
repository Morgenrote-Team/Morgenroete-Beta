ar('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "As conquistas de #V deste [concept_panum_physician]#! serão exibidas aqui, quando você tiver uma."
 panum_physician_achievements_intro_loc: "#V Conquistas desse médico#!\n[Scope.GetCharacter.GetFullName] é um médico bem-sucedido."
 panum_physician_achievement_successful_treatments_loc: "#o \nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] tem experiência no tratamento de pacientes e já tratou com sucesso pacientes do [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue]#! ."
 panum_physician_achievement_epidemiologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] estudou doenças extensivamente e se tornou um #o $panum_epidemiologist$ #! ."
 panum_physician_achievement_surgeon_loc: "O \n[Scope.GetCharacter.GetSheHe|U] realizou muitas cirurgias e, portanto, é considerado um bom #o $panum_surgeon$ #! ."
 panum_physician_achievement_psychiatrist_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] estudou extensivamente a mente humana e é um renomado #o  $panum_psychiatrist$ #! ."
 panum_physician_achievement_military_physician_loc: "\nComo #o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] viu os horrores da guerra e sabe como tratar as pessoas em circunstâncias horríveis."
 panum_physician_achievement_germ_theory_inventor_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] inventou a #o Teoria Germinativa#! que já salvou milhares de vidas."
 panum_physician_achievement_pneumothorax_inventor_loc: "\nUma das maiores invenções de [Scope.GetCharacter.GetHerHim] é um dispositivo #o para induzir um pneumotórax artificial#!. Isso resulta no colapso dos pulmões, o que pode ajudar a tratar a tuberculose."
 panum_physician_achievement_thoracoplasty_inventor_loc: "\nGraças às habilidades cirúrgicas do [Scope.GetCharacter.GetHerHis], o doutor [Scope.GetCharacter.GetLastNameNoFormatting] inventou um procedimento #o que revolucionou a cirurgia pulmonar chamada toracoplastia#! e, assim, possibilitou a melhoria do tratamento de pacientes com tuberculose."
 panum_physician_achievement_attended_medical_congress_loc: "\n[Scope.GetCharacter.GetSheHe] participou de pelo menos um #o Congresso Médico#! e compartilhou [Scope.GetCharacter.GetHerHis] ideias."
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\nO Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] é considerado o principal inventor da #o Aspirina#! e não apenas proporcionou alívio da dor a inúmeros pacientes, mas também revolucionou o setor farmacêutico."
 panum_physician_achievement_xray_inventor_loc: "\nCom a descoberta dos #o raios X#!, o Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] é considerado um dos principais físicos internacionais que revolucionaram a medicina e a física em igual medida."
 panum_physician_achievement_bloodtypes_inventor_loc: "\nCom a descoberta de diferentes #o grupos sanguíneos, a saber, A, B, AB e 0#!, o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] desempenhou um papel significativo para garantir que entendêssemos mais sobre o sangue como tal - e que as transfusões de sangue fossem mais bem-sucedidas."
 panum_physician_achievement_ecg_inventor_loc: "\nO ECG #o #! , inventado pelo Dr. [Scope.GetCharacter.GetLastNameNoFormatting], possibilitou a medição da atividade elétrica do coração e representa um marco nas operações hospitalares."
 panum_physician_achievement_transplantation_inventor_loc: "\nCom o #o Primeiro Transplante#!, o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] conquistou um lugar na história da medicina."
 panum_physician_achievement_stereotactic_method_inventor_loc: "\nAté hoje, o método estereotáxico #o #! [Scope.GetCharacter.GetSheHe] inventado é considerado inovador na cirurgia cerebral."
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\nCom o desenvolvimento de um bypass cardiopulmonar #o #! , o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] realizou uma obra-prima da medicina moderna."
 panum_physician_achievement_endoscope_inventor_loc: "[Scope.GetCharacter.GetHerHis|U] #o \A invenção do endoscópio#!, com o qual o interior humano pôde ser examinado pela primeira vez, também é particularmente lembrada."
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] inventou um aparelho que facilita o exame de doenças oculares e, assim, prestou um serviço inestimável à oftalmologia: #o O Oftalmoscópio#!."
 panum_physician_achievement_chemotherapy_inventor_loc: "\nA quimioterapia #o #! [Scope.GetCharacter.GetSheHe] desenvolvida para tratar até mesmo as doenças mais persistentes com uma variedade de medicamentos dá aos pacientes com câncer a esperança de que nem tudo é em vão."
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  A construção do primeiro pulmão de ferro#! para sustentar a vida de pacientes com poliomielite em estado crítico é considerada uma das mais fascinantes conquistas da engenharia desta época."
 panum_physician_achievement_military_medicine_project_finished_loc: "#o \nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] inventou os métodos mais recentes no campo da medicina de campo#!, tornando os serviços médicos militares um dos mais reconhecidos do mundo."
 panum_physician_achievement_inaugurated_asylum_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] desempenhou um papel crucial na fundação do #o Primeiro Asilo Mental do país#! a fim de fornecer ajuda abrangente e humana aos doentes mentais."
 panum_physician_achievement_anthrax_disease_loc: "#o \nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] especializou-se em Anthrax#! e desenvolveu métodos eficazes de prevenção e tratamento para ele."
 panum_physician_achievement_goiter_disease_loc: "#o \nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] especializou-se no bócio#! e desenvolveu métodos eficazes de prevenção e tratamento para ele."
 panum_physician_achievement_nephrolithiasis_disease_loc: "#o \O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] especializou-se na nefrolitíase#! e desenvolveu métodos eficazes de prevenção e tratamento para ela."
 panum_physician_achievement_pellagra_disease_loc: "#o \nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] especializou-se na Pellagra#! e desenvolveu métodos eficazes de prevenção e tratamento para ela."
 panum_physician_achievement_rickets_disease_loc: "#o \O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] especializou-se no raquitismo#! e desenvolveu métodos eficazes de prevenção e tratamento para ele."
 panum_physician_achievement_syphilis_disease_loc: "#o \nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] especializou-se na sífilis#! e desenvolveu métodos eficazes de prevenção e tratamento da doença."
 panum_physician_achievement_tetanus_disease_loc: "#o \nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] especializou-se no tétano#! e desenvolveu métodos eficazes de prevenção e tratamento para ele."
 panum_physician_achievement_basketball_inventor_loc: "\nEm [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  inventou um novo esporte coletivo chamado basquete#!"