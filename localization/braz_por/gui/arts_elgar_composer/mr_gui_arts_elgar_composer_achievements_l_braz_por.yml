l_braz_por:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "As conquistas de #V deste [concept_elgar_composer]#! serão exibidas aqui, quando você tiver uma."
 elgar_composer_achievements_intro_loc: "#V Realizações desse compositor#!\n[Scope.GetCharacter.GetFullName] é um compositor com reputação de [Scope.Var('elgar_composer_experience').GetValue|V0]. Até o momento, [Scope.GetCharacter.GetSheHe] fez [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] turnês. Dos inúmeros trabalhos do [Scope.GetCharacter.GetHerHis], o [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] se destaca particularmente."
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n[Scope.GetCharacter.GetSheHe|U] é um excelente #V Virtuoso#!."
 elgar_composer_achievement_is_composer_conductor_loc: "\n[Scope.GetCharacter.GetSheHe|U] é considerado um famoso #V Condutor#!."