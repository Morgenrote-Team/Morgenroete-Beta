 mr_papermap_coprolite: "Paleontologia: Coprólito"
 mr_papermap_coprolite_desc: "Parece que um paleontólogo está trabalhando atualmente na preparação de um coprólito. Você se pergunta o que é coprólito? É cocô fossilizado. Nesse caso, provavelmente de um dinossauro."
 mr_papermap_belemnite: "Paleontologia: Belemnite" #Please replace
 mr_papermap_belemnite_desc: "Um fóssil de belemnita encontrado por um paleontólogo. Essas criaturas percorreram os mares entre 358 e 66 milhões de anos atrás." #Please replace
 mr_papermap_ammonite: "Paleontologia: Amonite" #Please replace
 mr_papermap_ammonite_desc: "Um dos fósseis mais famosos. Essa amonita já percorreu o mar há milhões de anos. Agora é uma bela decoração para sua mesa." #Please replace
 mr_papermap_trilobite: "Paleontologia: Trilobita"
 mr_papermap_trilobite_desc: "Os trilobitas estavam entre os primeiros artrópodes e foram muito bem-sucedidos. Infelizmente, elas foram extintas no Permiano. Felizmente, alguns foram fossilizados e você pode mantê-los em sua mesa como lembrança."