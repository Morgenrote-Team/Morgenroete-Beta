l_braz_por:
 theme_mr_paleontology: "Morgenröte: Paleontologia (terra)" #NT!
 theme_mr_paleontology_desc: "Uma interface de usuário inspirada na paleontologia, fósseis e ossos de dinossauros." #NT!
  
 mr_papermap_coprolite: "Paleontologia: Coprolite" #NT!
 mr_papermap_coprolite_desc: "Parece que um paleontologista está atualmente trabalhando na preparação de um coprolito. Você se pergunta o que é coprolite? É cocô fossilizado. Nesse caso, provavelmente de um dinossauro." #NT!
 mr_papermap_belemnite: "Paleontologia: Belemnite" #NT!
 mr_papermap_belemnite_desc: "Um fóssil beleminito encontrado por um paleontologista. Essas criaturas percorreram os mares entre 358 e 66 milhões de anos atrás." #NT!
 mr_papermap_ammonite: "Paleontologia: Amonita" #NT!
 mr_papermap_ammonite_desc: "Um dos fósseis mais famosos. Essa amonita uma vez percorreu o mar de milhões de anos atrás. Agora é uma boa decoração para sua mesa." #NT!
 mr_papermap_trilobite: "Paleontologia: Trilobita" #NT!
 mr_papermap_trilobite_desc: "Os trilobitas estavam entre os primeiros artrópodes e muito bem -sucedidos. Infelizmente, eles foram extintos no Permiano. Felizmente, alguns foram fossilizados e você pode mantê -los em sua mesa como lembrança." #NT!
  
 mr_papermap_battenberg_cake: "Culinária: Battenberg Bolo" #NT!
 mr_papermap_battenberg_cake_desc: "Está com fome? Talvez você deva colocar este delicioso bolo na sua mesa. É um pão de esponja coberto de maçapão e nomeado após o príncipe Louis de Battenberg." #NT!
 mr_papermap_old_fashioned: "Culinária: antiquado" #NT!
 mr_papermap_old_fashioned_desc: "O que poderia ser melhor do que um bom antiquado no final de um longo dia? Certamente seu barkeeper o levará a um humor feliz com este coquetel!" #NT!
 mr_papermap_cucumber_ice_cream: "Culinária: sorvete de pepino" #NT!
 mr_papermap_cucumber_ice_cream_desc: "O sol está brilhando do céu, é um dia de sol quente. O que poderia ser melhor do que um sorvete de pepino maravilhosamente refrescante?" #NT!
 mr_papermap_croissant_hot_chocolate: "Culinária: croissant e chocolate quente" #NT!
 mr_papermap_croissant_hot_chocolate_desc: "Um croissant e um chocolate quente da manhã é a melhor maneira de começar o dia. Não importa o que te espere." #NT!
