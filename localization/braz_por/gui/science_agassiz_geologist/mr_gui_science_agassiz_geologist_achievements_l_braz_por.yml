 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]" #deepl:4065666483

 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]" #deepl:1006055885
 agassiz_geologist_no_geologist_loc: "As conquistas de #V deste [concept_agassiz_geologist]#! serão exibidas aqui, quando você tiver uma." #deepl:2266901269
 agassiz_geologist_achievements_intro_loc: "#V Conquistas desse geólogo#!\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é um geólogo de sucesso que coletou [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] e [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] . [Scope.GetCharacter.GetHerHis|U] pesquisa em geologia nos forneceu [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] ." #deepl:2506244890

 agassiz_geologist_achievement_invented_seismology_loc: "\nA invenção da sismologia #V #! é uma das maiores conquistas do Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Ela permite a previsão de terremotos e erupções vulcânicas." #deepl:4027906331
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\A #V invenção da Teoria da Tectônica de Placas#! é uma das maiores realizações do Dr. [Scope.GetCharacter.GetLastNameNoFormatting]? Como nem todos os [Scope.GetCharacter.GetHerHis] colegas estão aceitando a teoria, somente o futuro dirá se ela será considerada a [Scope.GetCharacter.GetHerHis] descoberta mais importante ou se será esquecida." #deepl:1012351458
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  participou do Congresso Geológico sobre Tectônica de Placas#!." #deepl:941722190
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V Explorar um vulcão#! é um empreendimento perigoso, mas o Dr. [Scope.GetCharacter.GetLastNameNoFormatting] aprendeu muito com a expedição em um deles." #deepl:3489984187
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi a primeira pessoa a #V descobrir o hélio na Terra#!, que certamente será um recurso muito útil no futuro." #deepl:1490724762
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting] participou de uma #V Expedição ao Pacífico#!." #deepl:1964542330
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] aparentemente #V chegou ao centro da Terra#! e retornou de lá novamente. Mas será que essa história é realmente verdadeira?" #deepl:3298936682
