 VISIT_IOC_BUTTON: "Visit the IOC"
 MR_VISIT_IOC_POSSIBLE_FOUNDED_TT: "#default_text The #V International Olympic Comitee was founded#!.#!"
 MR_VISIT_IOC_POSSIBLE_TT: "#default_text You are #V not currently visiting the IOC#!.#!"
 VISIT_IOC_BUTTON_TT: "#T Visit the International Olympic Comitee#!\nVisit the International Olympic Committee to obtain information about members, the next Olympics or the international medal table.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_BUTTON: "Found the IOC"
 MR_IOC_FOUNDATION_BUTTON_TT: "#T Found the International Olympic Comitee#!\nThe International Olympic Committee (IOC) is a non-governmental organization in the legal form of an association. The purpose of the committee is to organize and supervise the modern Olympic Games. The founding country has a permanent seat on the board that decides on the venues for the Olympic Games. Shortly after the IOC is founded, the first of the Olympic Games, which from then on will take place every four years, can be organized. Under certain conditions, other countries can join the IOC as regular members, but the number of seats on the board is limited.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least one [concept_academics_academic].#!"
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName] is at Peace.#!"
 MR_IOC_MEMBER_BUTTON: "Join the IOC"
 MR_IOC_MEMBER_BUTTON_TT: "#T Become a Member of the IOC#!\nJoin the International Olympic Committee to compete in the quadrennial Olympic Games. IOC members also have the chance to hold the games in their own country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]'s infamy is lower than #n 50#!.#!"
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName] is #V not unrecognized#!.#!"
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName] is #V not the current Olympic Host#!.#!"
 MR_IOC_BRIBE_BUTTON: "Bribe the IOC"
 MR_IOC_BRIBE_BUTTON_TT: "#T Bribe the IOC#!\nWith a generous 'donation' to the IOC Board of Directors, we can secure the goodwill of the members and be placed as the fourth candidate in the distribution of the next Olympic Games. However, there is no guarantee that we will be selected afterwards. The other IOC members could also misunderstand our generosity.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName] is #V not already bribing the IOC#!.#!"
 MR_OLYMPIC_FLAME_BUTTON: "The Olympic Flame"
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T The Olympic Flame#!\nThe Olympic Flame, based on the ever-burning hearth fire of the Greek goddess Hestia, was introduced for the first time at the 1928 Olympic Games in Amsterdam. The tradition of the associated Olympic torch relay was introduced at the Summer Games in Berlin in 1936. Contrary to popular belief, the idea did not come from the National Socialists, but from the German-Jewish archaeologist Alfred Schiff. The introduction of this tradition would not only give the Olympic Games a new symbol of identification, but would also bring the population together every year and act as an uplifting symbol to distract from other grievances.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName] is #V preparing to host the next Olympic Games#!.#!"
 MR_IOC_PRESIDENT_BUTTON: "Become President of the IOC"
 MR_IOC_PRESIDENT_BUTTON_TT: "#T Become President of the IOC#!\nWithout an active president of the IOC, we can take this position. That assumes we control the Headquarters of the Olympic Committee.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] controls the [GetBuildingType('building_vikelas_ioc').GetName]#!.#!"
 MR_IOC_DISCIPLINE_BUTTON: "Introduce Olympic Discipline"
 MR_IOC_DISCIPLINE_BUTTON_TT: "#T Introduce Olympic Discipline#!\nThe larger the IOC and the more countries participating in the Olympic Games, the more disciplines can be introduced. More disciplines mean more medals. A total of 20 disciplines—including national sports—can be introduced.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_15_MEMBERS_TRIGGER_TT: "#default_text The IOC has at least #G 15#! #V Members#!.#!"
 MR_IOC_20_MEMBERS_TRIGGER_TT: "#default_text The IOC has at least #G 20#! #V Members#!.#!"
 MR_IOC_25_MEMBERS_TRIGGER_TT: "#default_text The IOC has at least #G 25#! #V Members#!.#!"
 MR_IOC_30_MEMBERS_TRIGGER_TT: "#default_text The IOC has at least #G 30#! #V Members#!.#!"
 MR_IOC_40_MEMBERS_TRIGGER_TT: "#default_text The IOC has at least #G 40#! #V Members#!.#!"
 MR_IOC_50_MEMBERS_TRIGGER_TT: "#default_text The IOC has at least #G 50#! #V Members#!.#!"
 MR_IOC_60_MEMBERS_TRIGGER_TT: "#default_text The IOC has at least #G 60#! #V Members#!.#!"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON: "[GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')] as Olympic Discipline"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON_TT: "#T Make [GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')] an Olympic Disciplinee#!\nThe President of the IOC can make his national sport a mandatory Olympic discipline. This is a unique decision.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_NO_BRIBE_BUTTON: "Stop bribing the IOC"
 MR_IOC_NO_BRIBE_BUTTON_TT: "#T Stop bribing the IOC#!\nIf we have recently hosted the Olympic Games, it would be wise to stop the bribery, as we cannot apply again so quickly.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_AT_LEAST_3_YEARS_TRIGGER_TT: "#default_text The IOC bribery is designed to last for #V at least four years#! before it can be discontinued.#!"