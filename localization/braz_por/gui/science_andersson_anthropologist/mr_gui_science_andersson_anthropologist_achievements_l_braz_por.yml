 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] encontrou um total de [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0] fósseis humanos. Esses fósseis consistem em "
