 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] Fósseis de Neanderthaler, "
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] Fósseis de Neanderthaler"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0] Fósseis de Homo Erectus, "
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0] Fósseis de Homo Erectus"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] Fósseis de Australopithecus, "
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] Fósseis de Australopithecus"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0] Fósseis de Paranthropus"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] identificou um total de [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] fósseis humanos"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] participou do Congresso sobre a #V origem do ser humano moderno#!."
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\nGraças a [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] o #V Piltdown Human foi exposto como uma fraude#!."
 andersson_anthropologist_achievement_invented_anthropology_loc: "O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é o primeiro cientista a registrar ossos e esqueletos humanos de forma meticulosa e muito precisa. [Scope.GetCharacter.GetSheHe] é visto como o #V pioneiro da Antropologia#!."
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] classificou cientificamente #V o Cro-Magnon#! pela primeira vez."
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi a primeira pessoa a #V posicionar o Neanderthaler na sistemática do homem pré-histórico#!."
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\nFoi com o crédito de [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] que o até então desconhecido #V Homo Erectus tornou-se compreensível como uma espécie humana#!."
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] foi o primeiro a conseguir decifrar os primeiros #V segredos do Australopithecus#! e a tirar conclusões sobre seu modo de vida e aparência."
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\Poucas pessoas tiveram sucesso ao #V tentar reconstruir um homem pré-histórico#! a partir de alguns ossos, permitindo assim tirar conclusões sobre seu ambiente de vida. O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu fazer isso com o #V Paranthropus#!."