 andersson_anthropologist_achievement_attended_origin_congress_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] participou do Congresso sobre a #V origem do ser humano moderno#!." #deepl:2823441805
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\nGraças a [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] o #V Piltdown Human foi exposto como uma fraude#!." #deepl:1017420061
 andersson_anthropologist_achievement_invented_anthropology_loc: "O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] é o primeiro cientista a registrar ossos e esqueletos humanos de forma meticulosa e muito precisa. [Scope.GetCharacter.GetSheHe] é visto como o #V pioneiro da Antropologia#!." #deepl:3155653452
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] classificou cientificamente #V o Cro-Magnon#! pela primeira vez." #deepl:69566943
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\nO Dr. [Scope.GetCharacter.GetLastNameNoFormatting] foi a primeira pessoa a #V posicionar o Neanderthaler na sistemática do homem pré-histórico#!." #deepl:523665278
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\nFoi com o crédito de [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] que o até então desconhecido #V Homo Erectus tornou-se compreensível como uma espécie humana#!." #deepl:991432050
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nO professor [Scope.GetCharacter.GetLastNameNoFormatting] foi o primeiro a conseguir decifrar os primeiros #V segredos do Australopithecus#! e a tirar conclusões sobre seu modo de vida e aparência." #deepl:994811918
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\Poucas pessoas tiveram sucesso ao #V tentar reconstruir um homem pré-histórico#! a partir de alguns ossos, permitindo assim tirar conclusões sobre seu ambiente de vida. O Dr. [Scope.GetCharacter.GetLastNameNoFormatting] conseguiu fazer isso com o #V Paranthropus#!." #deepl:2683346481
