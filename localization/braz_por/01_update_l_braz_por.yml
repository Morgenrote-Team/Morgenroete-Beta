 gaudi.35.t: "Bairro Art Nouveau em [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]" #deepl:1088148255
 gaudi.35.d: "O novo desenvolvimento artístico não parou no site [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]: novos edifícios Art Nouveau estão sendo construídos em um bairro que agora é considerado um bairro de vanguarda." #deepl:3696139674
 gaudi.35.f: "A estreia da arquitetura Art Nouveau em Bruxelas foi acompanhada por uma onda de Arte Decorativa no novo estilo. Entre os artistas importantes estavam Gustave Strauven, que usava ferro forjado para obter efeitos barrocos nas fachadas de Bruxelas; o designer de móveis Gustave Serrurier-Bovy, conhecido por suas cadeiras altamente originais e móveis de metal articulados; e o designer de joias Philippe Wolfers, que fazia joias em forma de libélulas, borboletas, cisnes e serpentes. O estilo foi rapidamente notado na vizinha França. Depois de visitar o Hôtel Tassel de Horta, Hector Guimard construiu o Castel Béranger, um dos primeiros edifícios de Paris no novo estilo. Os parisienses receberam bem o estilo original e pitoresco de Guimard; o Castel Béranger foi escolhido como uma das melhores fachadas novas de Paris, lançando a carreira de Guimard. A Paris 1900 Exposition universelle marcou o ponto alto da Art Nouveau. Entre abril e novembro de 1900, ela atraiu quase 50 milhões de visitantes de todo o mundo e exibiu a arquitetura, o design, os objetos de vidro, os móveis e os objetos decorativos do estilo. Embora a Exposição de Paris tenha sido de longe a maior, outras exposições contribuíram muito para popularizar o estilo." #deepl:3102882922
 gaudi.35.g: "Uma nova e vibrante cultura." #deepl:3379987285

 gaudi.22.t: "Linhas e medidas" #deepl:2020920879
 gaudi.22.d: "Nosso arquiteto retorna - desta vez com uma vara de agrimensor na mão e novos olhos para o terreno." #deepl:505021070
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] antes se contentava em esboçar fachadas nas praças da cidade, traçar sombras e ornamentos. Agora, o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] desenha linhas na terra.\n\nDurante as viagens do [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] abandonou as cidades pelo interior. Nas regiões selvagens da Galícia, nos pântanos do Delta do Pó e nos cortes de ferrovias das Midlands, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] caminhou com engenheiros, fazendeiros e capatazes. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] aprendeu a ler o terreno como outros lêem as escrituras. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] O mapa do terreno pode dizer onde a água correrá, onde a argila se deslocará, onde um alicerce rachará daqui a cinco invernos.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] fala agora de gradientes e pontos geodésicos. Os cadernos de anotações do [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] não são preenchidos com floreios, mas com ângulos, alturas e distâncias medidas em polegadas. Alguns dizem que a [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] está se tornando seca - muito exigente, muito rígida. Mas quando [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] olha para um campo vazio, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] já vê por onde as avenidas podem passar." #deepl:3503840059
 gaudi.22.g: "Uma construção começa muito antes de a pedra fundamental ser colocada." #deepl:960677900
 gaudi.23.t: "O arquiteto que conta" #deepl:2805524520
 gaudi.23.d: "Após dois anos de estudo, nosso arquiteto retorna -[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mente mais afiada, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] desenhos mais estranhos." #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] antes desenhava por instinto. Agora [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] desenha pela lógica.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] passou [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] tempo não entre pedreiros ou construtores, mas em salas de aula. Paris, Göttingen, até mesmo São Petersburgo. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] sentou-se sob quadros-negros cheios de símbolos, estudou com homens que não construíam nada com as mãos, mas tudo com a mente. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] fala agora de simetria, de módulo, de curvas de carga descritas por fórmulas elegantes.\n\nAcabaram os floreios desenhados à mão. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Os novos planos são austeros, estranhos, quase alienígenas em sua precisão. Para alguns, elas parecem frias, desumanas. Mas então o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] explica: a beleza de um domo não está em sua decoração, mas na perfeição de sua curva.\n\nOs funcionários não sabem ao certo o que fazer com o [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. Os colegas do [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] sussurram sobre a impraticabilidade. Mas outros - especialmente os jovens - estão ouvindo." #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] constrói o que os outros apenas imaginam." #deepl:2581034432
 gaudi.24.t: "Papel antes da pedra" #deepl:3533867777
 gaudi.24.d: "Nosso arquiteto retorna não com ferramentas ou equações, mas com carimbos, assinaturas e uma rede de funcionários." #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] agora desliza pelos escritórios.\n\nEm dois anos no exterior, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] não estudou apenas arquitetura -[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] estudou administração. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] aprendeu como um projeto vive ou morre não por desenho, mas por decreto. Em Viena, o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] observou os ministérios trabalhando; em Bruxelas, o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] acompanhou os funcionários responsáveis pelas licenças; em Marselha, o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] participou de reuniões do conselho nas quais os esgotos decidiam os horizontes.\n\nAgora, de volta ao seu país, o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sabe quais documentos enviar e quando, quais normas citar, quem bajular e quem ignorar. As regras, diz o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], não são paredes, mas andaimes - elas podem ser movidas, suavizadas, reformuladas. E, de alguma forma, as licenças chegam mais rápido do que nunca." #deepl:3047390249
 gaudi.24.g: "Toda grande estrutura começa com um formulário assinado." #deepl:3498658136
 gaudi.25.t: "O arquiteto retorna... Eventualmente" #deepl:2911431628
 gaudi.25.d: "Nosso arquiteto finalmente retornou da [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] grande turnê. Ninguém sabe ao certo o que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] traz de volta - exceto histórias." #deepl:3640320352
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] O [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] retorna com cigarrilhas e anedotas. O [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] tem nomes para mencionar, opiniões para dar e dívidas que o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] finge não se lembrar.\n\nO[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] fala de forma bela e até convincente sobre estruturas que o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] nunca mediu. Quando lhe pedem planos, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] muda de assunto. Quando pressionado por resultados, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sorri e garante que o brilhantismo não pode ser apressado.\n\nAlguns dizem que [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] é uma fraude. Outros chamam o [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] de gênio incompreendido. A verdade? Provavelmente, em algum lugar entre um café em Trieste e um trem perdido em Nápoles." #deepl:3339735037
 gaudi.25.g: "O que o [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] fez durante todo esse tempo?" #deepl:3328871879
 gaudi.26.t: "Na sombra de um mestre" #deepl:1494314704
 gaudi.26.d: "Nosso arquiteto retorna - mais sábio, mais firme e com a marca de um grande professor." #deepl:2040369888
 gaudi.26.f: "Enquanto outros viajaram muito, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] preferiu a profundidade à distância. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] passou a maior parte de seus anos sob a orientação de uma única figura - um arquiteto idoso de reputação lendária. Não apenas em salas de aula, mas em andaimes e em silêncio, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] aprendeu a ver a estrutura por trás do ornamento, a intenção por trás da fachada. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] As linhas ficaram mais limpas. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] olhar mais crítico. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] aprendeu não apenas como construir, mas por quê. A notícia da orientação do [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] se espalhou antes do [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. Os jovens aprendizes já procuram o [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] e as autoridades da cidade o cumprimentam com uma deferência inesperada. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] retorna como alguém marcado pela continuidade, pela tradição e, talvez - algum dia - pelo legado." #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] carrega o peso da sabedoria de outro homem" #deepl:1891012360

 je_gaudi_study_trip: "Viagem de estudos para arquitetos" #deepl:471476780
 je_gaudi_study_trip_reason: "Nosso arquiteto, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], está atualmente viajando para marcos arquitetônicos, academias e reuniões com outros artistas. Não poderemos entrar em contato com ele por dois anos." #deepl:840922178
 je_gaudi_study_trip_success: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] retorna após dois anos." #deepl:130151750
 je_gaudi_study_trip_result: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ganhará experiência e (na maioria dos casos) uma nova característica." #deepl:1095907610
