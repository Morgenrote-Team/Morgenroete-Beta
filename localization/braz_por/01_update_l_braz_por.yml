 ### MR Concepts ###

 concept_gaudi_architectural_splendour: "Architectural Splendour" #please replace
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater." #please replace
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer] - [concept_gaudi_architect]" # Please replace
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!" #Please replace
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]." #Please replace
 concept_douglas_mountaineering: "Montanhismo" #deepl:2724886722
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering." #Please replace

 concept_gaudi_great_architect: "#PURPLE #b Grande arquiteto#!#!" #deepl:2311505900
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!" #You can use this for plural: [Concept('concept_gaudi_great_architect','$concept_gaudi_great_architects$')]
 concept_gaudi_great_architect_desc: "#b Grandes Arquitetos#! são [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] considerados as mentes mais importantes em seu campo. #b Os arquitetos#! que atingirem 500 [concept_artists_experience] se tornarão #b Grandes Arquitetos#!. Se um artista atingir essa classificação especial, ele poderá projetar a planta de um [concept_gaudi_custom_monument] realmente excepcional que incorpore o espírito da nação." #deepl:3535354395

 concept_gaudi_monuments: "Monumentos em #R Morgenröte#!" #deepl:3575665350
 concept_gaudi_monuments_desc: "Muitas nações receberam novos #b Monumentos#! em [concept_morgenroete]: a #b Catedral de Colônia#! na Alemanha, a #b Gotthardbahn#! na Suíça, o #b Cristo Redentor#! no Brasil, a #b Mole Antonelliana#! na Itália, o #b Palácio de Verão#! na China, a #b Sagrada Família#! na Espanha, o #b Schloss Neuschwanstein#! na Baviera, o #b Palacio de Bellas Artes#! no México e o #b Palácio Gyeongbokgung#! na Coreia.\nTodos os edifícios, exceto o #b Summer Palace#! e o #b Campanile#!, precisam ser construídos por seus proprietários; o #b Saxon Palace#! pode ser reativado por uma nação polonesa. Também há novos monumentos no início do jogo, como os #b Budas de Bamiyan#! ou o #b Palácio de Potala#!\nTambém há a possibilidade de ter um [concept_gaudi_custom_monument] projetado por um [concept_gaudi_great_architect].\n\nAo contrário do jogo original, os #b Monumentos#! não são construídos diretamente, mas por meio de uma decisão. A construção ocorre em vários estágios, dependendo do tamanho do edifício, e pode levar anos ou até décadas - e é significativamente mais cara." #deepl:1566202277

 concept_athletes_athlete: "Atleta" #deepl:850847351
 concept_athletes_athletes: "Athletes" #You can use this for plural: [Concept('concept_athletes_athlete','$concept_athletes_athletes$')]
 concept_athletes_athlete_desc: "Em [concept_morgenroete] #b  Athletes#! são personagens especiais que permitem que você use determinadas mecânicas do mod.#b Athletes#! geralmente são criados por meio de eventos ou de um botão. Como outros personagens, os atletas #b #! possuem experiências que garantem maior sucesso em seu campo.\nAtualmente, existem estes atletas #b #! :\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]" #deepl:1061453309

 concept_gaudi_independent_architect: "Arquiteto independente" #deepl:2730756570
 concept_gaudi_independent_architects: "Independent Architects" #You can use this for plural: [Concept('concept_gaudi_independent_architect','$concept_gaudi_independent_architects$')]
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] que não são contratados por um país são os #b Independent Architects#!.\nAo contrário de muitos outros artistas, há poucas exigências para recrutar um #b Independent Architect#!, exceto por um requisito tecnológico mínimo. Eles são verdadeiros viajantes globais e geralmente exigem apenas um bom pagamento." #deepl:4188716455

 concept_gaudi_architectural_blueprint: "Projeto arquitetônico" #deepl:4294565305
 concept_gaudi_architectural_blueprints: "Architectural Blueprints" #You can use this for plural [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]
 concept_gaudi_architectural_blueprint_desc: "As plantas arquitetônicas podem ser pesquisadas em [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. Elas são essenciais para a construção de [concept_gaudi_blueprint_buildings] especiais que só podem ser erguidos uma vez em uma nação. Há um total de 15 edifícios diferentes em cinco categorias diferentes. Alguns projetos exigem que as tecnologias sejam pesquisadas. Como a pesquisa às vezes pode levar anos, é aconselhável decidir antecipadamente quais projetos são mais importantes. Os edifícios podem ser construídos em qualquer estado, mas exigem um certo nível de urbanização. Em alguns casos, pode haver requisitos adicionais.\n\n#R Importante#!: Você só pode construir um edifício de uma categoria específica em um estado. Portanto, se uma fonte estiver localizada em um estado, o arco triunfal ou a estátua também não poderão estar localizados lá." #deepl:1017261789
 concept_gaudi_blueprint_buildings: "Edifícios de planta" #deepl:2672159620
 concept_gaudi_blueprint_buildings_desc: "Edifícios Blueprint são edifícios que precisam de um bluprint pesquisado em [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. Apenas um edifício de uma categoria específica pode ser construído em um estado. Há 15 edifícios diferentes:\n\n#b Monumento#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Praça pública#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Edifícios de serviço#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Instituições de saúde#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b Academias nacionais#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]" #deepl:3852362262

 concept_gaudi_custom_monument: "Monumento personalizado" #deepl:2715885677
 concept_gaudi_custom_monument_desc: "Um monumento personalizado é a maior obra-prima possível do [concept_gaudi_architect]. Ele pode competir com outros monumentos comuns. Somente um [concept_gaudi_great_architect] pode elaborar tais planos. Ele exige pesquisa das mais modernas tecnologias arquitetônicas. O tipo de monumento que um arquiteto projeta depende muito de seu estilo arquitetônico. Os arquitetos da Art Déco projetam o [GetBuildingType('building_gaudi_people_monument').GetName], os arquitetos da Bauhaus o [GetBuildingType('building_gaudi_people_forum').GetName] e os arquitetos neoclássicos o [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:759442240

 concept_douglas_mountaineer: "Montanhista" #deepl:3785520222
 concept_douglas_mountaineers: "Mountaineers" #deepl:2642597122
 concept_douglas_mountaineer_desc: "#n Esta entrada está sendo revisada.#!" #deepl:1338387803
 concept_vikelas_olympian: "Olímpico" #deepl:3681680819
 concept_vikelas_olympian_desc: "#n Esta entrada está sendo revisada.#!" #deepl:1338387803

 concept_douglas_mountain_summit: "Mountain Summit" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "Os cumes das montanhas são o objetivo cobiçado de todos os montanhistas. Eles marcam o ponto mais alto de uma montanha. Cada cume tem três atributos distintos que definem a dificuldade de alcançá-lo com sucesso.\n\n#V Height#!: A altura determina quantos degraus são necessários para escalar uma montanha - isso reflete a extensão geral de uma expedição. Para cada 1.000 metros, é necessário um passo de progresso. O valor é arredondado para cima, o que significa que o Monte Whitney, com 4.421 metros de altura, exige 5 degraus, enquanto o Pico Kauffmann, com 7.134 metros de altura, exige 8. O prestígio de uma montanha é calculado com base em sua altura: a altura total é dividida por 250. Assim, uma montanha ideal de 5.000 metros concede 20 de prestígio.\n\n#V Nível#!: O nível de uma montanha representa as exigências de equipamento necessárias para escalá-la. Isso não está estritamente ligado à sua altura. Por exemplo, apesar de seus 5.636 metros, o Citlaltépetl é apenas de nível 1 e exige apenas equipamentos básicos. Em contraste, o Matterhorn, com apenas 4.478 metros, é considerado significativamente mais exigente no Nível 3, requerendo pelo menos preparação de primeiros socorros para emergências alpinas.\n\n#V Risco#!: O nível de risco de uma montanha indica a probabilidade de eventos negativos afetarem uma expedição. Ele é independente da altura e do nível. Avalanches, neblina e clima severo são as principais preocupações. O Popocatépetl já podia ser escalado no início dos tempos modernos devido ao seu ambiente hospitaleiro. Em contrapartida, o Großvenediger, muito menor, com apenas 3.666 metros, ainda representava uma séria ameaça às expedições austríacas até o início do século XIX.\n\nMais informações sobre cumes individuais podem ser encontradas na seção [concept_douglas_mountain_summit_list]." #deepl:3359948048
 concept_douglas_mountain_range: "Cordilheira" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "Uma cadeia de montanhas é definida como uma formação montanhosa que oferece potencial para [concept_douglas_mountaineering] treinamento em longas distâncias. As cadeias de montanhas clássicas incluem as Montanhas Rochosas, os Andes, os Alpes e o Cáucaso. Ao contrário das [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] que devem ser conquistadas, há também muitas montanhas menos desafiadoras em que não há risco de uma [concept_douglas_mountaineer] queda fatal. Em vez disso, elas devem ser vistas como uma rota de treinamento. Os países com cadeias de montanhas têm maior probabilidade de produzir montanhistas do que aqueles sem essa característica geográfica." #deepl:2685064578
 concept_douglas_alpine_heritage: "Patrimônio Alpino" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "Patrimônio Alpino é um termo coletivo para uma conexão com as montanhas e uma especialização em escalar montanhas. Também se refere ao potencial de recrutar novos [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]- já que, na maioria dos casos, os montanhistas experientes vêm de áreas montanhosas. Isso sempre dá aos países com [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] ou [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] uma vantagem. O recrutamento de um novo montanhista, assim como várias outras ações, custa ao Patrimônio Alpino." #deepl:707449492

 concept_douglas_mountain_summit_list: "Lista de cumes de montanhas" #deepl:4208448161
 concept_douglas_mountain_summit_list_desc: "Há muitos [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] que podem ser escalados.\n\n#V América do Norte:#!\n#b Monte McKinley#! (Alasca), Altura 6190 metros, Nível 4\n#b Monte Logan#! (Território de Yukon), Altura 5959 metros, Nível 4\n#b Citlaltépetl#! (México), Altura 5636 metros, Nível 1\n#b Monte Whitney#! (Califórnia), Altura 4421 metros, Nível 1\n\n#V América do Sul:#!\n#b Aconcagua#! (Mendoza), Altura 6267 metros, Nível 3\n#b Huascarán#! (Território de Lima), Altura 6768 metros, Nível 5\n#b Illimani#! (La Paz), Altura 6438 metros, Nível 4\n#b Chimborazo#! (Equador), Altura 6267 metros, Nível 1\n\n#V Europa:#!\n#b Shkara#! (Grande Cáucaso), Altura 5642 metros, Nível 4\n#b Dufourspitze#! (Dufourspitze), Altura 4634 metros, Nível 2\n#b Matterhorn#! (Oeste da Suíça), Altura 4478 metros, Nível 3\n#b Aiguille Verte#! (Savoy), Altura 4122 metros, Nível 3\n#b Pico de Aneto#! (Aragão), Altura 3404 metros, Nível 1\n\n#V África:#!\n#b Kibo#! (Tanganica), Altura de 5895 metros, Nível 2\n#b Batian#! (Quênia), Altura de 5199 metros, Nível 3\n#b Monte Stanley#! (Uganda), Altura de 5109 metros, Nível 3\n#b Monte Cameroon#! (Sul de Camarões), 4095 metros, Nível 1\n\n#V Ásia:#!\n#b Kamet#! (Delhi), altura de 7756 metros, nível\n#b Chogolisa#! (Caxemira), altura de 7665 metros, nível 5\n#b Kabru#! (Himalaia), altura de 7412 metros, nível 5\n#b Kaufmann Peak#! (Tajiquistão), altura de 7134 metros, nível 4\n\n#V Austrália e Oceania:#!\n#b Monte Wilhelm#! (Nova Guiné Oriental), altura de 4121 metros, nível 2\n#b Monte Cook#! (Ilha do Sul), altura de 3724 metros, nível 2" #deepl:721187631

