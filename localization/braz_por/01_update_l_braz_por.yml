 gaudi.1002.d: "[SCOPE.sCharacter('gaudi_new_architect_scope').GetFullName] finished the construction of the Pavellons Güell, an extension of a finca in the style of Modernism, of which [SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName] is the main representative." #Please replace
 gaudi.1002.f: "The Iron Gate of the Pavellons Güell was crowned by an iron dragon with glass eyes. All buildings were designed in the style of Modernisme and were oriented to an Orientalist Design.\n\n[SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName] was the most important representative of the Catalan style of Modernisme. Modernisme can be seen as a Catalan expression of Art Nouveau and is characterized by traditional materials and techniques from Catalonia. 'Naturalness' and 'Movement' are the most important terms to describe Modernisme. This is well visible, for example, in Parc Güell, which is characterized by round shapes and inspired by plants and other natural forms and shapes." #Please replace
 gaudi.1002.h: "Gaudí has a great future ahead of him!" #Please replace
 gaudi_bauhaus_modifier: "Bauhaus Architecture" #Please replace
 gaudi.21.t: "An Engineer Returns" #Please replace
 gaudi.21.d: "After two years abroad, our architect returns—not only with sketches, but with a new discipline." #Please replace
 gaudi.21.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] left as a draftsman. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] returns a builder.\n\nFor two long years, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] journeyed across Europe—through the valleys of Lombardy, into the ironworks of Manchester, beneath the bridges of Budapest. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] studied not only churches, but pumping stations; not just capitals and cornices, but boiler houses and crane docks. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] sat in lectures at a polytechnic, copied the notebooks of engineers, and learned on a construction site in Lyon that strength cannot be drawn—it must be understood.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] speaks with new words now. Of load-bearing forces, tensile frames, and the soul of iron. Some of [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] old colleagues barely recognize [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. Yet [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] hands remain the same—just steadier now. And [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] gaze? It seems to pass through walls." #Please replace
 gaudi.21.g: "Architecture begins with the question: what holds?" #Please replace

