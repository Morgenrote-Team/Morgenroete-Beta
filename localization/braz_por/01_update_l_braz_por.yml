 douglas.103.t: "Regimento de Tropas de Montanha" #deepl:459726214
 douglas.103.d: "Devido à sua impressionante experiência na conquista e defesa de montanhas, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] decidiu usar suas habilidades superiores para criar uma unidade de elite de tropas de montanha." #deepl:3198382874
 douglas.103.f: "Os Gebirgsjäger, os Alpini ou os Chasseurs Alpins são apenas alguns exemplos de tropas de elite de alguns países que se especializaram na guerra nas alturas. Criados em 1872, os Alpini são a mais antiga infantaria de montanha em atividade no mundo. Sua missão original era proteger a fronteira da Itália com a França e a Áustria-Hungria." #deepl:3963027024
 douglas.103.g: "Eles levarão seu legado para o futuro." #deepl:1701012348

