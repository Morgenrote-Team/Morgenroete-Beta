 je_gaudi_bauhaus_architecture: "Arquitetura Bauhaus" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "A Bauhaus foi uma escola de arte alemã que funcionou de 1919 a 1933, combinando artesanato e belas artes. A escola ficou famosa por sua abordagem ao design, que tentava unificar a visão artística individual com os princípios da produção em massa e a ênfase na função. Ela se baseava na ideia de criar uma Gesamtkunstwerk (obra de arte abrangente), na qual todas as artes seriam reunidas. Mais tarde, o estilo Bauhaus tornou-se uma das correntes mais influentes no design moderno, na arquitetura modernista e na educação arquitetônica." #deepl:1381087306
 je_gaudi_neoclassical_architecture: "Arquitetura neoclássica" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "O neoclassicismo no início do século XX foi um movimento arquitetônico e artístico revivalista que buscou se reconectar com a clareza formal, a simetria e a grandeza da antiguidade greco-romana. Surgindo como um contraponto aos excessos do historicismo e à crescente abstração da arte moderna, esse estilo enfatizava a monumentalidade, a ordem geométrica e o uso de formas tradicionais em um idioma racional, muitas vezes sancionado pelo Estado. Ele estava intimamente ligado à identidade nacional e à arquitetura cívica, projetando ideais de permanência, autoridade e beleza disciplinada." #deepl:2628512539
 je_gaudi_art_deco_architecture: "Arquitetura Art Déco" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "O movimento Art Déco surgiu na década de 1920 como um estilo decorativo e arquitetônico que abraçava a modernidade e, ao mesmo tempo, mantinha elementos da ordem clássica. Com seu uso característico de formas estilizadas, materiais ricos e geometria ornamental, o Art Déco combinou a opulência do artesanato com a emergente estética da máquina. Ele celebrava o progresso tecnológico e o dinamismo urbano por meio de motivos inspirados na indústria, na velocidade e no exotismo." #deepl:2018331500

 je_gaudi_splendour_bauhaus: "Triunfo da Bauhaus" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "Com a introdução do espírito da Bauhaus, os arquitetos começaram a eliminar o ornamento e a ilusão em favor da clareza, da precisão e da verdade do material. O objetivo não é mais impressionar por meio da opulência ou evocar a grandeza de impérios passados, mas servir à sociedade criando espaços que sejam funcionais, honestos e modernos. A Bauhaus não é apenas uma estética - é uma filosofia de design, fundamentada na crença de que a arquitetura e a vida cotidiana devem ser reconciliadas por meio da simplicidade, da utilidade e da unidade de forma e propósito. Ao adotar os princípios da Bauhaus, uma capital sinaliza não apenas modernidade, mas progresso em sua forma mais pura: a elevação da função sobre a fachada, da inovação sobre a tradição." #deepl:3357423326
 je_gaudi_splendour_neoclassical: "Revitalização neoclássica" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "O neoclassicismo é um estilo que tem suas raízes na harmonia racional da antiguidade, na gramática arquitetônica de colunas, frontões e layouts simétricos. No entanto, no início do século XX, ele foi reimaginado com técnicas de construção modernas, linhas mais limpas e, muitas vezes, escala monumental. Ela representava não apenas a tradição, mas também uma visão disciplinada do futuro, na qual a vida pública, a lei e a cultura seriam emolduradas por edifícios que inspiram admiração e unidade. Uma arquitetura que abraçasse esses princípios daria à nossa capital seriedade e grandeza, transformando-a em um farol de ordem, resiliência e poder cultivado aos olhos do mundo." #deepl:605890088
 je_gaudi_splendour_art_deco: "Um sonho de Art Déco" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "Com a introdução da Art Déco, os arquitetos revolucionaram o mundo da arte, por exemplo, rompendo com o rígido historicismo do passado. Mas, ao contrário de muitas escolas modernas, seus edifícios não eram uma expressão de mera funcionalidade e objetividade. A Art Déco é um desenvolvimento em meio ao despertar geral do modernismo clássico, no qual a combinação criativa de elegância da forma, preciosidade dos materiais, força das cores e sensualidade do tema estava em primeiro plano. Durante seu apogeu, ele representou luxo, glamour, exuberância e fé no progresso social e tecnológico. Uma arquitetura que respeitasse esses princípios faria de nossa nação um exemplo de modernidade e riqueza." #deepl:980834049

