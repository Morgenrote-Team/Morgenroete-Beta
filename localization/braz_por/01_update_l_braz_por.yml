 gaudi.10.t: "Reputação aprimorada do arquiteto" #deepl:3290657742
 gaudi.10.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] Nos últimos anos, a [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] demonstrou sua experiência na melhoria e construção de novos edifícios em todo o país, aumentando significativamente a reputação e as habilidades da [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]." #deepl:1621312069
 gaudi.10.f: ""A arte mãe é a arquitetura. Sem uma arquitetura própria, não temos a alma de nossa própria civilização." -Frank Lloyd Wright" #deepl:2640014774
 gaudi.10.g: "Vamos às novas tarefas arquitetônicas!" #deepl:4140846455

