 lepsius.1326.t: "Homo Heidelbergensis concluído" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] coletou ossos suficientes para tirar conclusões específicas sobre a espécie extinta. O Homo Heidelbergensis não é mais um mistério para a ciência e agora pode ser localizado com um certo grau de certeza na árvore genealógica humana, mesmo que ainda existam muitas perguntas sem resposta." #deepl:4182329393
 lepsius.1326.f: "A mandíbula inferior do Homo heidelbergensis foi descoberta em 1907 pelo trabalhador Daniel Hartmann em um poço de areia próximo a Mauer, perto de Heidelberg, e descrita em 1908 pelo anatomista Otto Schoetensack; o achado de aproximadamente 600.000 anos é considerado a evidência mais antiga dos primeiros seres humanos na Europa, situa-se morfologicamente entre o Homo erectus e o Homo sapiens, indica uma ampla distribuição dessa forma hominídea na África, Europa e Ásia e, devido à sua robustez e volume cerebral estimado, permite tirar conclusões sobre adaptação física avançada, uso de ferramentas e organização social." #deepl:2078634084
 
 lepsius.1336.t: "Homem de Heidelberg" #deepl:140239375
 lepsius.1336.d: "Um trabalhador fez uma descoberta notável em uma mina em Mauer, uma cidade próxima a Heidelberg. Um professor da Universidade de Heidelberg reconheceu imediatamente seu valor." #deepl:3838910430
 lepsius.1336.f: "A mandíbula inferior do Homo heidelbergensis foi descoberta em 1907 pelo trabalhador Daniel Hartmann em um poço de areia próximo a Mauer, perto de Heidelberg, e descrita em 1908 pelo anatomista Otto Schoetensack; o achado de aproximadamente 600.000 anos é considerado a evidência mais antiga dos primeiros seres humanos na Europa, situa-se morfologicamente entre o Homo erectus e o Homo sapiens, indica uma ampla distribuição dessa forma hominídea na África, Europa e Ásia e, devido à sua robustez e volume cerebral estimado, permite tirar conclusões sobre adaptação física avançada, uso de ferramentas e organização social." #deepl:2078634084

