 je_gaudi_capital_expansion_project: "Expansão de capital" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "Entre 1836 e 1936, as capitais vitorianas passaram por profundas transformações urbanas. Paris foi remodelada pelos amplos bulevares e vistas axiais de Haussmann. Viena demoliu suas muralhas em 1857, substituindo-as pela grande Ringstraße. Berlim expandiu-se rapidamente com blocos de cortiços, bairros industriais e, mais tarde, conjuntos habitacionais modernistas. Londres se espalhou pelos subúrbios ferroviários, projetos de infraestrutura e o primeiro metrô do mundo. Em todo o continente europeu, as cidades reais evoluíram para metrópoles modernas, monumentos de poder, ambição e crescentes tensões sociais." #deepl:4052914498

 gaudi.41.t: "Uma cidade sem limites" #deepl:1231776512
 gaudi.41.d: "As velhas paredes são derrubadas. Em seu lugar, ar, luz e a promessa de crescimento." #deepl:2117769530
 gaudi.41.f: "Durante séculos, [ROOT.GetCountry.GetCapital.GetCityHubName] foi uma cidade murada: orgulhosa, compacta e fechada em si mesma. Mas agora, a alvenaria é reduzida a picareta e pó.\n\nAs fortificações medievais foram demolidas. Em seu lugar, surgem amplas avenidas, ladeadas por árvores e fachadas nobres. Carroças de mercado e casais passeando agora pisam onde antes marchavam os guardas. Os bulevares são mais do que estradas - são declarações: de confiança, de expansão, de um futuro grande demais para ser contido.\n\nAlguns lamentam a perda dos antigos portões. Mas o site [ROOT.GetCountry.GetCapital.GetCityHubName] finalmente respirou fundo pela primeira vez." #deepl:4076900735
 gaudi.41.g: "Construímos para fora - com visão e vigor" #deepl:1116241139
 gaudi.42.t: "O Anel do Progresso" #deepl:3156235256
 gaudi.42.d: "Um novo anel de avenidas une a cidade e o estado." #deepl:3367270166
 gaudi.42.f: "Onde antes havia aterros lamacentos, agora há pedra e ferro. A grande avenida se curva como um colar ao redor do coração de [ROOT.GetCountry.GetCapital.GetCityHubName], unindo seus distritos em movimento e luz.\n\nNão foi uma mera obra viária. Quarteirões inteiros foram redesenhados, parques esculpidos, monumentos emoldurados em perspectiva perfeita. Os lampiões a gás florescem ao anoitecer como estrelas ordenadas. A cada metro pavimentado, [ROOT.GetCountry.GetCapital.GetCityHubName] se torna mais legível - mais imperial.\n\nOs funcionários falam de "harmonia urbana". E as pessoas? Elas passeiam - olhando para estátuas que nunca viram antes, em ruas que antes tinham medo de andar." #deepl:3543082084
 gaudi.42.g: "Um anel não de defesa, mas de direção." #deepl:2497263912
 gaudi.43.t: "Avenidas de autoridade" #deepl:4104296278
 gaudi.43.d: "O novo prefeito reformula o site [ROOT.GetCountry.GetCapital.GetCityHubName]- um eixo de cada vez. Amplo, reto e totalmente intransigente." #deepl:2867872335
 gaudi.43.f: "Isso não é expansão. É cirurgia.\n\nBairros inteiros caem sob o compasso e o plano. As ruas são esculpidas como bulevares através de bairros que antes eram como lagos. Os antigos becos desaparecem. Em seu lugar surgem linhas - longas, retas e sempre levando a um monumento, a um quartel ou a um ministério.\n\nA resistência aumenta, mas as licenças são assinadas, as casas desapropriadas e as fachadas alinhadas. [ROOT.GetCountry.GetCapital.GetCityHubName] agora fala a linguagem da ordem: visibilidade, circulação, controle. Por trás da grandiosidade está a intenção.\n\nOs pobres chamam isso de "A limpeza". Os funcionários o chamam de "modernização". O prefeito o chama de necessário." #deepl:4133801679
 gaudi.43.g: "Que ninguém escape do plano" #deepl:2017759053
 gaudi.44.t: "O Horizonte Metropolitano" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] não é mais apenas uma capital. Ela está se tornando o mundo em miniatura." #deepl:101717450
 gaudi.44.f: "A cidade antiga tinha bordas. Esta não tem nenhuma.\n\nAço e vidro perfuram onde antes predominava a pedra. As linhas de trem se cruzam sob os jardins públicos. Luzes elétricas borram as linhas entre o anoitecer e o amanhecer. Embaixadas, bancos, galerias e cafés florescem como orquídeas no conservatório de ferro de uma nova era.\n\nLínguas estrangeiras ecoam nas arcadas. Os arranha-céus desafiam as catedrais. [ROOT.GetCountry.GetCapital.GetCityHubName] não pede mais permissão para crescer - espera liderar. De cada distrito, emerge uma única verdade: esta não é mais uma cidade de uma nação. É uma cidade de nações." #deepl:3494578230
 gaudi.44.g: "Nós nos levantamos, porque o mundo já está assistindo." #deepl:1129952378

