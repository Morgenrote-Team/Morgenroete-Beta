 gaudi.82.t: "O trabalho da vida de um arquiteto" #deepl:1436757673
 gaudi.82.d: "Após meses de preparação, o site [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] apresentou planos, cálculos, estatísticas e um modelo feito à mão. O ambicioso monumento [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] já é considerado um sonho de arte arquitetônica. A única pergunta que resta é: quem tornará esse sonho realidade?" #deepl:1546320616
 gaudi.82.f: "Amanhã faremos coisas bonitas. -Antoni Gaudí" #deepl:3107908861
 gaudi.82.g: "Um monumento a nós mesmos." #deepl:3586195485

