 MR_MOUNTAINEERING_CLUB_BUTTON: "Clube de montanhismo" #deepl:2527856433
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Fundar um clube de montanhismo#!\nUm clube de montanhismo é o primeiro passo de uma nação em direção ao alpinismo organizado. Ele deve ser fundado por um cavalheiro (ou uma cavalheira) experiente com conhecimentos de montanhismo. A partir desse clube, novos alpinistas podem surgir para conquistar os picos do mundo!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2346036384

 MR_ALPINE_CLUB_BUTTON: "Clube Alpino" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T Fundar o Alpine Club#!\nFundado em Londres em 1857, o Alpine Club é a organização de montanhismo mais antiga do mundo. Sua fundação marcou o início do alpinismo organizado na Inglaterra vitoriana. O objetivo do clube era promover a exploração científica, geográfica e esportiva dos Alpes. Entre seus membros fundadores estava Edward Whymper, que concluiu a primeira escalada do Matterhorn em 1865. O Alpine Club desempenhou um papel fundamental durante a "Era de Ouro do Alpinismo" e publicou obras influentes, incluindo o Alpine Journal. Ele estabeleceu padrões para futuros clubes de montanhismo em todo o mundo.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
