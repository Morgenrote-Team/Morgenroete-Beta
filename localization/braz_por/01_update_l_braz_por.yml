 douglas.104.t: "A montanha interior" #deepl:2079471330
 douglas.104.d: "Após cinco anos exaustivos de escalada e treinamento, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] retorna." #deepl:862787273
 douglas.104.f: "A montanha não tem voz, mas ensina. Durante cinco longos anos, nosso montanhista enfrentou a cegueira da neve, as rochas em ruínas, o vento cortante e o silêncio que corta mais profundamente do que qualquer lâmina. No entanto, cada dificuldade transformou o conhecimento em músculos e a paciência em fôlego. O que começou como ambição agora se transformou em habilidade. O alpinista aprendeu a ouvir a pedra, a prever tempestades pelo cheiro, a dar nós com os olhos fechados e o coração firme. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] retorna transformado. Esse é o início da maestria." #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] não mais conquista a montanha -[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] a compreende" #deepl:2453485277

