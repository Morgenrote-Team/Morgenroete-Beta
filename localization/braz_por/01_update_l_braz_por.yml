 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] goza de renome mundial como um dos arquitetos mais importantes da [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] época. Para imortalizar o nome [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], [ROOT.Var('gaudi_architect_var').GetCharacter.GetHeShe] está trabalhando em um projeto para um monumento excepcional que fará com que nossa nação brilhe em todo o mundo como um centro de arte arquitetônica." #deepl:2632883859

 gaudi.81.t: "Obra-prima de arquitetos" #deepl:681011782
 gaudi.81.d: "Nos últimos anos, [THIS.GetCountry.GetName] se tornou uma das nações líderes no campo da arquitetura. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] desempenhou um papel significativo nesse desenvolvimento. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] aceitou a incumbência de projetar um monumento que rivalizasse com as grandes maravilhas das eras antiga, medieval e moderna." #deepl:2672646441
 gaudi.81.f: "O Architect's Monument se baseia no estilo preferido do Grande Arquiteto:\n\nArt Deco Architects projetará o [GetBuildingType('building_gaudi_people_monument').GetName].\nBauhaus Architects oferecerá o [GetBuildingType('building_gaudi_forum_monument').GetName].\nNeoclassical Architects criará o [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:4088582525
 gaudi.81.g: "Magnífico." #deepl:573443058

