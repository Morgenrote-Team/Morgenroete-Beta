 gaudi.16.t: "Um novo modelo" #deepl:4025940977
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] concluiu seu trabalho no projeto hoje e o entregou ao cliente." #deepl:3235089264
