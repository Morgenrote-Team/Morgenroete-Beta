 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], nosso montanhista, está atualmente liderando uma equipe de montanhismo em uma expedição em [SCOPE.sState('douglas_location_scope').GetName]. A meta é a primeira ascensão de um pico. A velocidade da subida depende muito de sua experiência e de seus traços de caráter. Dependendo da dificuldade da montanha, podem surgir perigos maiores. Se a expedição não atingir sua meta dentro de um determinado prazo, o [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] abortará a escalada do cume. Se, por qualquer motivo, a expedição se desviar para o maior perigo possível, então o pior acontecerá." #deepl:488000629

