l_braz_por:
 thriving_culture_lesson_start_tutorial_button_loc: "Tutorial Inicial"
 mr_tutorial_buttons: "Botões Morgenröte"
 mr_tutorial_buttons_desc: "A maioria das coisas em Morgenröte são acessíveis nas Janelas-Morgenröte. Você pode acessá-las clicando nos botões na barra lateral. Atualmente, estas janelas existem:\n\n\n- #V Janela de Ciências#!: Aqui você pode encontrar seus [Concept('concept_academics_academic','$concept_academics_academics$')], suas atividades, seu [concept_academics_progress] e Expedições Científicas.\n\n- #V Janela de Artes#!: Aqui você pode encontrar seus [Concept('concept_artists_artist','$concept_artists_artists$')], suas atividades, seu [concept_artistic_progress] e [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n- #V Janela de Esportes#!: Aqui você pode encontrar vários esportes e personagens relacionados a esportes, bem como aeronáutica, suas atividades e Organizações Esportivas Internacionais."
 mr_tutorial_science_window_open: "Abrir a Janela de Ciências"
 mr_tutorial_science_window_open_desc: "Agora vamos dar uma olhada mais de perto na Janela de Ciências. Abra a Janela de Ciências clicando no botão ou pressionando a tecla \"M\" no seu teclado."
 mr_tutorial_science_window_open_tt: "Abra a janela de ciências clicando no botão de ciências ou pressionando \"M\""
 mr_tutorial_science_tab: "A Janela de Ciências"
 mr_tutorial_science_tab_desc: "The science window is the place where you can find information and actions for your scientific endeavours.\n\n\nIt is separated in 4 tabs:\n\n- #V Overview#!: This tab contains [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n\n- #V Mathematical-Technical#!: This tab contains the [concept_tesla_engineer], [concept_mendelejew_chemist] and [concept_verrier_astronomer]\n\n- [concept_dubois_natural_history]: This tab contains the [concept_agassiz_geologist], [concept_dubois_paleontologist] and [concept_dubois_naturalist]\n\n- #V Humanities-Anthropological#!: This tab contains the [concept_panum_physician], [concept_lepsius_archaeologist] and [concept_andersson_anthropologist]"
 mr_tutorial_science_tab_tt: "A janela de ciências está aberta"
 mr_tutorial_science_overview_tab_open: "Abra a Aba Visão Geral"
 mr_tutorial_science_overview_tab_open_desc: "A guia Overview (Visão geral) permite que você acesse [concept_academics_progress], #V General Scientific Expeditions (Expedições científicas gerais)#! e #V Scientific Focus (Foco científico)#!\n\nVá para a guia Overview (Visão geral) clicando no botão da guia."
 mr_tutorial_science_overview_tab_open_tt: "Acesse a guia Overview (Visão geral) clicando no botão da guia."
 mr_tutorial_science_overview_tab_promote_academics: "Promoção acadêmica"
 mr_tutorial_science_overview_tab_promote_academics_desc: "O coração do Morgenröte são os personagens. Mas como você obtém esses personagens? \n\nPara obter um novo [concept_academics_academic], você precisa ganhar o suficiente [concept_academics_progress]. Você pode passar o mouse sobre a barra de progresso para ver quais fatores influenciam o ganho de progresso.\n\nVocê pode promover um Acadêmico específico se tiver uma Universidade com um [concept_academics_university_specialization].\n\nVocê também pode investir dinheiro para ganhar progresso acadêmico mais rapidamente.\n\nAlternativamente, você pode obter Acadêmicos com eventos ou comprando um com uma ação diplomática se for uma nação que não pertence aos países cientificamente mais avançados."
 mr_tutorial_science_overview_tab_scientific_focus: "Foco Científico"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Às vezes, você pode querer se concentrar em um tipo específico de pesquisa. Você pode usar os focos científicos se atender aos seus requisitos. Eles basicamente promoverão a pesquisa de certos grupos de tecnologia e reduzirão a eficiência de outros."
 mr_tutorial_science_overview_tab_scientific_expedition: "Expedições Científicas"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Expedições científicas são expedições que seu país pode iniciar. Dependendo do tipo de expedição, isso pode resultar em grandes benefícios para o seu país.\n\nAtualmente, existem as seguintes expedições:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Expedição\n- Expedição para encontrar a Passagem do Noroeste\n- Expedição Zeppelin\n- Expedição para instalar um Cabo Transatlântico"
 mr_tutorial_science_natural_history_tab_open: "Abra a guia História natural"
 mr_tutorial_science_natural_history_tab_open_desc: "Agora vamos dar uma olhada em um dos [Concept('concept_academics_academic','$concept_academics_academics$')]. Abra a guia Natural History para continuar."
 mr_tutorial_science_natural_history_tab_open_tt: "Acesse a guia Natural History clicando no botão da guia."
 mr_tutorial_science_natural_history_tab_character: "Acadêmicos"
 mr_tutorial_science_natural_history_tab_character_desc: "O coração do Morgenröte são seus personagens. Na guia Ciência, esses personagens são os [Concept('concept_academics_academic','$concept_academics_academics$')].\n\nNo lado esquerdo de cada nova função de personagem, você pode ver um retrato do seu Acadêmico e informações adicionais sobre ele."
 mr_tutorial_science_natural_history_tab_character_rating: "Classificação de Personagens"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Na maioria dos personagens, você encontrará um pequeno ícone ao lado do nome. Este ícone indica a aptidão deles para a função. Você pode ver quais fatores influenciam essa classificação passando o mouse sobre o ícone.\n\nExplicação dos ícones:\n@mr_rating_fantastic! Perfeito\n@mr_rating_very_good! Muito Bom\n@mr_rating_good! Bom\n@mr_rating_mediocre! Medíocre\n@mr_rating_bad! Ruim\n@mr_rating_very_bad! Muito Ruim"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Experiência do Personagem"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Cada personagem tem [concept_academics_experience] em seu campo de especialização. Quanto maior a experiência, melhor o desempenho do personagem em várias tarefas.\n\nA experiência é adquirida passivamente a cada ano e ativamente ao concluir tarefas e obter sucesso. [Concept('concept_academics_academic','$concept_academics_academics$')] ganham traços mais altos se atingirem 100 (experiente) e 300 (famoso) de experiência."
 mr_tutorial_science_natural_history_tab_character_achievements: "Feitos do Personagem"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] às vezes realizam feitos impressionantes. Passe o mouse sobre esse ícone para verificar o que o acadêmico conseguiu até o momento."
 mr_tutorial_science_natural_history_tab_currencies: "Discoveries and Values"
 mr_tutorial_science_natural_history_tab_currencies_desc: "A maioria dos personagens em Morgenröte possui valores atribuídos a eles. Esses valores são exibidos no centro de cada acadêmico. Para a Geologia, você verá quantos minerais foram encontrados ou quanto conhecimento geológico você possui, por exemplo.\n\nFrequentemente, você pode descobrir mais sobre certos valores passando o mouse sobre eles."
 mr_tutorial_science_natural_history_visit_button: "Botão de Visita"
 mr_tutorial_science_natural_history_visit_button_desc: "A maioria dos sites [Concept('concept_academics_academic','$concept_academics_academics$')] tem botões de visita especiais que informam mais sobre esse acadêmico específico.\n\n O site [concept_dubois_naturalist], por exemplo, tem um botão para visitar o zoológico, onde você pode saber mais sobre os animais do zoológico."
 mr_tutorial_science_natural_history_ranking: "Classificação"
 mr_tutorial_science_natural_history_ranking_desc: "Talvez você goste de se comparar com outros países. Nesse caso, a classificação pode ser interessante para você. Ao passar o mouse sobre esse ícone, você verá várias listas que lhe permitirão ver seu desempenho em um determinado aspecto do Morgenröte em comparação com outras nações.\n\nO site [concept_agassiz_geologist], por exemplo, permite comparar sua Pontuação Geológica, Conhecimento Geológico, Conhecimento Oceânico, Minerais e Minerais Raros."
 mr_tutorial_science_natural_history_project_buttons: "Botões de projeto e outros botões"
 mr_tutorial_science_natural_history_project_buttons_desc: "Essa parte da interface é uma das partes mais importantes para você. Ela permite que você atribua projetos ao seu [Concept('concept_academics_academic','$concept_academics_academics$')] e inicie outras interações importantes.\n\nUm [concept_agassiz_geologist] pode fazer expedições, aprimorar seus setores, recalcular a idade da Terra e você pode fundar um gabinete de minerais ou iniciar um congresso sobre Deriva Continental."
 mr_tutorial_science_natural_history_view_switch_buttons: "Alterar o layout"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Se preferir uma interface mais densa, você pode mudar a aparência dela usando esse botão. Para o jogo em si, não importa qual variante você usa. Portanto, escolha a variante de que você mais gosta."
 mr_start_culture_tutorial_button_loc: "Tutorial de cultura"
 mr_tutorial_not_yet_implemented_tt: "Esse tutorial ainda não está pronto."
 mr_tutorial_arts_window_open: "Abrir a janela Artes"
 mr_tutorial_arts_window_open_desc: "Agora vamos dar uma olhada mais de perto na janela de artes. Abra a janela de artes clicando no botão ou pressionando as teclas \"Ctrl + A\" no teclado."
 mr_tutorial_arts_window_open_tt: "Abra a janela de artes clicando no botão de ciência ou pressionando \"Ctrl + A\""
 mr_tutorial_arts_tab: "Guia Artes"
 mr_tutorial_arts_tab_desc: "As artes foram uma parte importante dos séculos XIX e XX. Os grandes [Concept('concept_artists_artist','$concept_artists_artists$')] dessa época ainda são bem conhecidos hoje em dia.\n\nO Morgenröte oferece vários tipos de artistas e suas obras de arte.\n\nA janela Artes em si tem duas guias. Uma delas mostra uma visão geral das artes em seu país; na outra, você pode encontrar seus artistas e recrutar artistas de países estrangeiros."
 mr_tutorial_arts_tab_cultural_tradition: "Tradição Cultural"
 mr_tutorial_arts_tab_cultural_tradition_desc: "A Tradição Cultural é um valor que representa as conquistas culturais de seu país.\nEla consiste em [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] e [concept_klimt_painting_tradition].\n\nA Tradição Cultural é calculada usando a seguinte fórmula:\nTradição Musical / 4 + Tradição de Pintura / 3 + Tradição Literária / 2\n\nVocê também ganhará [concept_prestige] de sua Tradição Artística. Cada 5 pontos de Tradição Artística lhe renderão 1 Prestígio adicional."
 mr_tutorial_arts_overview_tab_open_tt: "Abra a guia Visão geral de artes"
 mr_tutorial_arts_tab_artist_progress: "Progresso do artista"
 mr_tutorial_arts_tab_artist_progress_desc: "You can get new [Concept('concept_artists_artist','$concept_artists_artists$')] by different means: You can recruit them, gain them with events or by collecting enough [concept_artistic_progress].\n\nWhile events and recruitment is not possible for every nation, gaining artists by filling the Artistic Progress bar is possible once you own an $building_elgar_opera$ or an $building_art_academy$.\nYou can see a full list of factors influencing the monthly gain by hovering over the progress bar.\n\nAdditionally you can Patronize the Arts to gain more progress and promote certain artists if you have the necessary [concept_production_method] in your $building_art_academy$."
 mr_tutorial_arts_tab_center_of_arts: "Centro de Artes"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] are the locations where an [concept_artists_art_style] was born.\n Some Centers of Arts are already existing at game start. Others can be unlocked by [Concept('concept_journal_entry','$concept_journal_entries$')] or by pressing one of the buttons that you can see here. Hover over the Center of Arts to see, how you can acquire it.\n\nObviously Center of Arts are useful for you and your country as they give you access to bonuses."
 mr_tutorial_arts_tab_artists_tab_open: "Abra a guia Artists (Artistas)"
 mr_tutorial_arts_tab_artists_tab_open_desc: "Agora vamos dar uma olhada mais de perto no site [Concept('concept_artists_artist','$concept_artists_artists$')].\n\nAbra a guia Artists clicando no botão da guia."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Abra a guia Artists (Artistas)"
 mr_tutorial_arts_tab_artists: "Guia Artistas"
 mr_tutorial_arts_tab_artists_desc: "Os [Concept('concept_artists_artist','$concept_artists_artists$')] são bem parecidos com os Acadêmicos, mas funcionam de forma um pouco diferente.\n\nAtualmente, há 3 Artistas:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "Convidando artistas"
 mr_tutorial_arts_tab_artists_accquisation_desc: "Como já mencionamos, o [Concept('concept_artists_artist','$concept_artists_artists$')] não pode ser adquirido apenas por meio da obtenção de [concept_artistic_progress] suficientes, mas também pelo simples fato de convidá-los.\n\nCada tipo de artista tem requisitos diferentes. Você pode convidar [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] de todo o mundo, mas precisa ser um país com $building_elgar_opera$s suficientes e um [concept_elgar_musical_tradition] bom o bastante.\n\nOs[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] só podem ser convidados se tiverem uma cultura semelhante.\n\nOs[Concept('concept_manzoni_writer','$concept_manzoni_writers$')], por outro lado, não podem ser convidados de forma alguma."
 mr_tutorial_arts_tab_artists_character: "Informações gerais"
 mr_tutorial_arts_tab_artists_character_desc: "A parte mais à esquerda da janela mostra algumas informações básicas sobre seu artista.\n\nAqui você pode ver:\n-O retrato\n-O nome e a classificação\n-O [concept_artists_experience]\n- O [Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "Valores artísticos importantes"
 mr_tutorial_arts_tab_artists_currencies_desc: "Essa parte da interface permite que você veja informações gerais sobre esse aspecto específico da arte.\nPara o [concept_elgar_composer], ele exibe o [concept_elgar_musical_tradition], as composições e obras-primas de seu compositor e uma visão geral dos cinco melhores compositores do mundo, por exemplo.\n\nAlém disso, você pode encontrar uma classificação ao passar o mouse sobre o pequeno ícone no canto superior direito."
 mr_tutorial_arts_tab_artists_actions: "Ações do artista"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] também têm ações. Aqui você pode ver em que seus Artistas podem trabalhar ou que decisões você pode tomar com sua nação.\n\nEssas foram as informações mais importantes sobre os Artistas. Você pode continuar com o Tutorial de Esportes a partir daqui ou continuar o jogo."
 mr_start_sports_tutorial_button_loc: "Tutorial de esportes"
 mr_tutorial_sports_window_open: "Abra a janela Esportes"
 mr_tutorial_sports_window_open_desc: "Agora vamos dar uma olhada mais de perto na janela de esportes. Abra a janela de esportes clicando no botão ou pressionando as teclas \"Ctrl + S\" no teclado."
 mr_tutorial_sports_window_open_tt: "Open the sports window by clicking the sports button or pressing \"Ctrl + S\""
 mr_tutorial_sports_window: "Janela de esportes"
 mr_tutorial_sports_window_desc: "The Sports Window allows you to access all the different sports and characters who are relevant for the sports.\n\nThe Window is separated into normal sports and Aeronautics.\n\nRegular Sports include:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Ball Sports\n- [concept_vikelas_car_racing]\n\nAeronautics include:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "Guia Esportes"
 mr_tutorial_sports_tab_desc: "A guia Sports (Esportes) oferece uma visão geral de várias atividades e personagens relacionados a esportes.\nAo contrário de Academics (Acadêmicos) e Artists (Artistas), os personagens da guia Sports (Esportes) geralmente são apenas generais ou políticos."
 mr_tutorial_sports_tab_open_tt: "Abra a guia Esportes"
 mr_tutorial_sports_tab_character_overview: "Visão geral do personagem"
 mr_tutorial_sports_tab_character_overview_desc: "Esta parte da interface do usuário oferece uma visão geral do [concept_character].\n\nAlguns personagens, como o [concept_vikelas_coach] e o Car Racer, são personagens que você pode obter e, portanto, têm [concept_academics_experience]. Outros, como o Mountaineer, não têm experiência."
 mr_tutorial_sports_tab_currencies: "Valores e informações"
 mr_tutorial_sports_tab_currencies_desc: "No meio, você pode ver informações importantes sobre esse esporte específico.\n\nO [concept_vikelas_olympic_games], por exemplo, apresenta uma visão geral do Presidente e da Diretoria do [concept_vikelas_ioc], quantos membros existem e quantas medalhas você conquistou até o momento."
 mr_tutorial_sports_tab_actions: "Ações"
 mr_tutorial_sports_tab_actions_desc: "O lado direito permite que você tome ações específicas para aquele esporte.\nEssas ações são basicamente decisões que permitem que você use seu [Concept('concept_character', '$concept_characters$')] ou estabeleça algo novo, como [concept_vikelas_ioc]."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Abrir a guia Aeronáutica"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Agora vamos dar uma olhada mais de perto na guia Aeronautics (Aeronáutica). Abra a guia clicando no botão."
 mr_tutorial_aeronautics_tab_open_tt: "Abra a guia Aeronautics (Aeronáutica)"
 mr_tutorial_aeronautics_tab: "Guia Aeronáutica"
 mr_tutorial_aeronautics_tab_desc: "A guia Aeronautics tem a mesma aparência da guia Sports.\n\nUma grande diferença está nos próprios personagens. Você pode patrocinar e automatizar o [concept_curtiss_balloonist] e o [concept_curtiss_pilot] aparecerá em várias circunstâncias.\n\nEste é o fim do tutorial de visão geral. Use a Vickypedia ou os conceitos que adicionamos se quiser saber mais sobre os personagens de Morgenröte."
 mr_tutorial_lesson_button_finish: "Tutorial de acabamento"
