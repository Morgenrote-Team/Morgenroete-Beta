l_braz_por:

 thriving_culture_lesson_start_tutorial_button_loc: "Tutorial inicial" #deepl:1296206908

 mr_tutorial_buttons: "Botões Morgenröte" #deepl:3232304745
 mr_tutorial_buttons_desc: "A maioria das coisas no Morgenröte pode ser acessada no Morgenröte-Windows. Você pode acessá-las clicando nos botões da barra lateral. Atualmente, essas janelas existem: \n\n\n- #V Janela de ciências#!: Aqui você pode encontrar seu [Concept('concept_academics_academic','$concept_academics_academics$')], suas atividades, seu [concept_academics_progress] e Expedições Científicas.\n\n- #V Janela de Artes#!: Aqui você pode encontrar seu [Concept('concept_artists_artist','$concept_artists_artists$')], suas atividades, seu [concept_artistic_progress] e [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n- #V Sports Window#!: Aqui você pode encontrar vários esportes e personagens relacionados a esportes, bem como aeronáutica, suas atividades e organizações esportivas internacionais." #deepl:3017682288

 mr_tutorial_science_window_open: "Abrir a janela Ciência" #deepl:734722697
 mr_tutorial_science_window_open_desc: "Agora vamos dar uma olhada mais de perto na janela de ciência. Abra a janela de ciência clicando no botão ou pressionando a tecla \"M\" no teclado." #deepl:1849505402
 mr_tutorial_science_window_open_tt: "Abra a janela de ciência clicando no botão de ciência ou pressionando \"M\"" #deepl:1188172678

 mr_tutorial_science_tab: "A janela da ciência" #deepl:1054166281
 mr_tutorial_science_tab_desc: "A janela de ciência é o local onde você pode encontrar informações e ações para seus esforços científicos.\n\nEla está separada em 4 guias:\n\n- #V Overview#!: Essa guia contém [concept_academics_progress], #V General Scientific Expeditions#! e #V Scientific Focus#!\n\n- #V Mathematical-Technical#!: Essa guia contém [concept_gaudi_engineer], [concept_mendelejew_chemist] e [concept_verrier_astronomer]\n\n- #V Humanities-Anthropological#!: Esta guia contém os sites [concept_panum_physician], [concept_lepsius_archaeologist] e [concept_lepsius_anthropologist]\n\n- [concept_dubois_natural_history]: Esta guia contém os sites [concept_agassiz_geologist], [concept_dubois_paleontologist] e [concept_dubois_naturalist]\n\n- #V Humanities-Anthropological#!: Esta guia contém os sites [concept_panum_physician], [concept_lepsius_archaeologist] e [concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "A janela de ciência é aberta" #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "Abra a guia Visão geral" #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "A guia Overview (Visão geral) permite que você acesse [concept_academics_progress], #V General Scientific Expeditions (Expedições científicas gerais)#! e #V Scientific Focus (Foco científico)#!\n\nVá para a guia Overview (Visão geral) clicando no botão da guia." #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "Acesse a guia Overview (Visão geral) clicando no botão da guia." #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "Promoção acadêmica" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "O coração do Morgenröte são os personagens. Mas como você obtém esses personagens? \n\nPara obter um novo [concept_academics_academic], você precisa ganhar o suficiente [concept_academics_progress]. Você pode passar o mouse sobre a barra de progresso para ver quais fatores influenciam o ganho de progresso.\n\nVocê pode promover um Acadêmico específico se tiver uma Universidade com um [concept_academics_university_specialization].\n\nVocê também pode investir dinheiro para ganhar progresso acadêmico mais rapidamente.\n\nAlternativamente, você pode obter Acadêmicos com eventos ou comprando um com uma ação diplomática se for uma nação que não pertence aos países cientificamente mais avançados." #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "Foco científico" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Às vezes, você pode querer se concentrar em um tipo específico de pesquisa. Você pode usar os focos científicos se atender aos requisitos deles. Eles basicamente promoverão a pesquisa de determinados grupos de tecnologia e reduzirão a eficiência de outros." #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "Expedições científicas" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Expedições científicas são expedições que seu país pode iniciar. Dependendo do tipo de expedição, isso pode resultar em grandes benefícios para o seu país.\n\nAtualmente, existem as seguintes expedições:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Expedição\n- Expedição para encontrar a Passagem do Noroeste\n- Expedição Zeppelin\n- Expedição para instalar um Cabo Transatlântico" #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "Abra a guia História natural" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "Agora vamos dar uma olhada em um dos [Concept('concept_academics_academic','$concept_academics_academics$')]. Abra a guia Natural History para continuar." #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "Acesse a guia Natural History clicando no botão da guia." #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "Acadêmicos" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "O coração do Morgenröte são seus personagens. Na guia Ciência, esses personagens são os [Concept('concept_academics_academic','$concept_academics_academics$')].\n\nNo lado esquerdo de cada nova função de personagem, você pode ver um retrato do seu Acadêmico e informações adicionais sobre ele." #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "Classificação de caracteres" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Para a maioria dos personagens, você encontrará um pequeno ícone ao lado do nome deles. Esse ícone indica sua aptidão para a função. Você pode ver quais fatores influenciam essa classificação passando o mouse sobre o ícone.\n\nExplicação dos ícones:\n@mr_rating_fantastic!  Perfeito\n@mr_rating_very_good!  Muito bom\n@mr_rating_good!  Bom\n@mr_rating_mediocre!  Mediocre\n@mr_rating_bad!  Ruim\n@mr_rating_very_bad!  Muito ruim" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "Experiência do personagem" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Cada personagem tem [concept_academics_experience] em seu campo de especialização. Quanto maior a experiência, melhor o desempenho do personagem em várias tarefas.\n\nA experiência é adquirida passivamente a cada ano e ativamente ao concluir tarefas e obter sucesso. [Concept('concept_academics_academic','$concept_academics_academics$')] ganham traços mais altos se atingirem 100 (experiente) e 300 (famoso) de experiência." #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "Conquistas do personagem" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] às vezes realizam feitos impressionantes. Passe o mouse sobre esse ícone para verificar o que o acadêmico conseguiu até o momento." #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "Discursos e valores" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "A maioria dos personagens de Morgenröte tem valores associados a eles. Esses valores são exibidos no centro de cada acadêmico. No caso de Geology, você verá quantos minerais foram encontrados ou quanto conhecimento geológico você tem, por exemplo.\n\nMuitas vezes, é possível saber mais sobre determinados valores passando o mouse sobre eles." #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "Botão de visita" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "A maioria dos sites [Concept('concept_academics_academic','$concept_academics_academics$')] tem botões de visita especiais que informam mais sobre esse acadêmico específico.\n\n O site [concept_dubois_naturalist], por exemplo, tem um botão para visitar o zoológico, onde você pode saber mais sobre os animais do zoológico." #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "Classificação" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "Talvez você goste de se comparar com outros países. Nesse caso, a classificação pode ser interessante para você. Ao passar o mouse sobre esse ícone, você verá várias listas que lhe permitirão ver seu desempenho em um determinado aspecto do Morgenröte em comparação com outras nações.\n\nO site [concept_agassiz_geologist], por exemplo, permite comparar sua Pontuação Geológica, Conhecimento Geológico, Conhecimento Oceânico, Minerais e Minerais Raros." #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "Botões de projeto e outros botões" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "Essa parte da interface é uma das partes mais importantes para você. Ela permite que você atribua projetos ao seu [Concept('concept_academics_academic','$concept_academics_academics$')] e inicie outras interações importantes.\n\nUm [concept_agassiz_geologist] pode fazer expedições, aprimorar seus setores, recalcular a idade da Terra e você pode fundar um gabinete de minerais ou iniciar um congresso sobre Deriva Continental." #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "Alterar o layout" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Se preferir uma interface mais densa, você pode mudar a aparência dela usando esse botão. Para o jogo em si, não importa qual variante você usa. Portanto, escolha a variante de que você mais gosta." #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "Tutorial de cultura" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "Esse tutorial ainda não está pronto." #deepl:1971937521

 mr_tutorial_arts_window_open: "Abrir a janela Artes" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "Agora vamos dar uma olhada mais de perto na janela de artes. Abra a janela de artes clicando no botão ou pressionando as teclas \"Ctrl + A\" no teclado." #deepl:53394483
 mr_tutorial_arts_window_open_tt: "Abra a janela de artes clicando no botão de ciência ou pressionando \"Ctrl + A\"" #deepl:2950751548

 mr_tutorial_arts_tab: "Guia Artes" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "As artes foram uma parte importante dos séculos XIX e XX. Os grandes [Concept('concept_artists_artist','$concept_artists_artists$')] dessa época ainda são bem conhecidos hoje em dia.\n\nO Morgenröte oferece vários tipos de artistas e suas obras de arte.\n\nA janela Artes em si tem duas guias. Uma delas mostra uma visão geral das artes em seu país; na outra, você pode encontrar seus artistas e recrutar artistas de países estrangeiros." #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "Tradição cultural" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "A Tradição Cultural é um valor que representa as conquistas culturais de seu país.\nEla consiste em [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] e [concept_klimt_painting_tradition].\n\nA Tradição Cultural é calculada usando a seguinte fórmula:\nTradição Musical / 4 + Tradição de Pintura / 3 + Tradição Literária / 2\n\nVocê também ganhará [concept_prestige] de sua Tradição Artística. Cada 5 pontos de Tradição Artística lhe renderão 1 Prestígio adicional." #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "Abra a guia Visão geral de artes" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "Progresso do artista" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "Você pode obter novos [Concept('concept_artists_artist','$concept_artists_artists$')] de diferentes maneiras: Você pode recrutá-los, ganhá-los com eventos ou coletando um número suficiente de [concept_artistic_progress].\n\nEmbora eventos e recrutamento não sejam possíveis para todas as nações, ganhar artistas preenchendo a barra de Progresso Artístico é possível quando você possui um $building_elgar_opera$ ou um $building_arts_academy$.\nVocê pode ver uma lista completa de fatores que influenciam o ganho mensal passando o mouse sobre a barra de progresso.\n\nAlém disso, você pode Patrocinar as Artes para ganhar mais progresso e promover certos artistas se tiver o [concept_production_method] necessário em seu $building_arts_academy$." #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "Centro de Artes" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] são os locais onde um [concept_artists_art_style] nasceu.\n Alguns Centros de Artes já existem no início do jogo. Outros podem ser desbloqueados pelo site [Concept('concept_journal_entry','$concept_journal_entries$')] ou pressionando um dos botões que você pode ver aqui. Passe o mouse sobre o Center of Arts para ver como você pode adquiri-lo.\n\nObviamente, os Center of Arts são úteis para você e seu país, pois dão acesso a bônus." #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "Abra a guia Artists (Artistas)" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "Agora vamos dar uma olhada mais de perto no site [Concept('concept_artists_artist','$concept_artists_artists$')].\n\nAbra a guia Artists clicando no botão da guia." #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Abra a guia Artists (Artistas)" #deepl:974477655

 mr_tutorial_arts_tab_artists: "Guia Artistas" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "Os [Concept('concept_artists_artist','$concept_artists_artists$')] são bem parecidos com os Acadêmicos, mas funcionam de forma um pouco diferente.\n\nAtualmente, há 3 Artistas:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "Convidando artistas" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "Como já mencionamos, o [Concept('concept_artists_artist','$concept_artists_artists$')] não pode ser adquirido apenas por meio da obtenção de [concept_artistic_progress] suficientes, mas também pelo simples fato de convidá-los.\n\nCada tipo de artista tem requisitos diferentes. Você pode convidar [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] de todo o mundo, mas precisa ser um país com $building_elgar_opera$s suficientes e um [concept_elgar_musical_tradition] bom o bastante.\n\nOs[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] só podem ser convidados se tiverem uma cultura semelhante.\n\nOs[Concept('concept_manzoni_writer','$concept_manzoni_writers$')], por outro lado, não podem ser convidados de forma alguma." #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "Informações gerais" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "A parte mais à esquerda da janela mostra algumas informações básicas sobre seu artista.\n\nAqui você pode ver:\n-O retrato\n-O nome e a classificação\n-O [concept_artists_experience]\n- O [Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "Valores artísticos importantes" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "Essa parte da interface permite que você veja informações gerais sobre esse aspecto específico da arte.\nPara o [concept_elgar_composer], ele exibe o [concept_elgar_musical_tradition], as composições e obras-primas de seu compositor e uma visão geral dos cinco melhores compositores do mundo, por exemplo.\n\nAlém disso, você pode encontrar uma classificação ao passar o mouse sobre o pequeno ícone no canto superior direito." #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "Ações do artista" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] também têm ações. Aqui você pode ver em que seus Artistas podem trabalhar ou que decisões você pode tomar com sua nação.\n\nEssas foram as informações mais importantes sobre os Artistas. Você pode continuar com o Tutorial de Esportes a partir daqui ou continuar o jogo." #deepl:746856108
 mr_start_sports_tutorial_button_loc: "Tutorial de esportes" #deepl:826655861

 mr_tutorial_sports_window_open: "Abra a janela Esportes" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "Agora vamos dar uma olhada mais de perto na janela de esportes. Abra a janela de esportes clicando no botão ou pressionando as teclas \"Ctrl + S\" no teclado." #deepl:243246943
 mr_tutorial_sports_window_open_tt: "Abra a janela de esportes clicando no botão de ciência ou pressionando \"Ctrl + S\"" #deepl:1482293542

 mr_tutorial_sports_window: "Janela de esportes" #deepl:4243980162
 mr_tutorial_sports_window_desc: "A janela Sports (Esportes) permite acessar todos os diferentes esportes e personagens que são relevantes para os esportes.\n\nA janela é separada em esportes normais e Aeronáutica.\n\nOs esportes normais incluem:\n- [concept_vikelas_olympic_games]\n- [concept_dubois_mountaineering]\n- Ball Sports\n- [concept_vikelas_car_racing]\n\nAeronáutica inclui:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "Guia Esportes" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "A guia Sports (Esportes) oferece uma visão geral de várias atividades e personagens relacionados a esportes.\nAo contrário de Academics (Acadêmicos) e Artists (Artistas), os personagens da guia Sports (Esportes) geralmente são apenas generais ou políticos." #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "Abra a guia Esportes" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "Visão geral do personagem" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "Esta parte da interface do usuário oferece uma visão geral do [concept_character].\n\nAlguns personagens, como o [concept_vikelas_coach] e o Car Racer, são personagens que você pode obter e, portanto, têm [concept_academics_experience]. Outros, como o Mountaineer, não têm experiência." #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "Valores e informações" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "No meio, você pode ver informações importantes sobre esse esporte específico.\n\nO [concept_vikelas_olympic_games], por exemplo, apresenta uma visão geral do Presidente e da Diretoria do [concept_vikelas_ioc], quantos membros existem e quantas medalhas você conquistou até o momento." #deepl:1125108675

 mr_tutorial_sports_tab_actions: "Ações" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "O lado direito permite que você tome ações específicas para aquele esporte.\nEssas ações são basicamente decisões que permitem que você use seu [Concept('concept_character', '$concept_characters$')] ou estabeleça algo novo, como [concept_vikelas_ioc]." #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "Abrir a guia Aeronáutica" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Agora vamos dar uma olhada mais de perto na guia Aeronautics (Aeronáutica). Abra a guia clicando no botão." #deepl:2671641916
 mr_tutorial_aeronautics_tab_open_tt: "Abra a guia Aeronautics (Aeronáutica)" #deepl:2187560588

 mr_tutorial_aeronautics_tab: "Guia Aeronáutica" #deepl:2661687945
 mr_tutorial_aeronautics_tab_desc: "A guia Aeronautics tem a mesma aparência da guia Sports.\n\nUma grande diferença está nos próprios personagens. Você pode patrocinar e automatizar o [concept_curtiss_balloonist] e o [concept_curtiss_pilot] aparecerá em várias circunstâncias.\n\nEste é o fim do tutorial de visão geral. Use a Vickypedia ou os conceitos que adicionamos se quiser saber mais sobre os personagens de Morgenröte." #deepl:851922845
 mr_tutorial_lesson_button_finish: "Tutorial de acabamento" #deepl:895117430

