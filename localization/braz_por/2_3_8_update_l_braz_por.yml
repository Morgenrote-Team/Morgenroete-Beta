 dubois_poor_basilosaurus_paleontologist_loc: "\nO #o Basilosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] tem uma fisiologia muito estranha. Ele se parece mais com uma bola do que com qualquer outra coisa, o que parece bastante errado." #deepl:1206625829
 dubois_poor_megalodon_paleontologist_loc: "\nO #o Megalodon#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] parece estar um pouco... fora de lugar. A enorme cabeça está montada em um pescoço muito fino e, aparentemente, o tubarão tinha espinhos estranhos cobrindo todo o seu corpo." #deepl:3797074524
 dubois_poor_plesiosaurus_paleontologist_loc: "\nO #o Plesiosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é um pouco estranho. Ele tem 4 extremidades semelhantes a cobras e uma cabeça muito curta, sem cauda." #deepl:1919744229
