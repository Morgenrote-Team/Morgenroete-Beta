 verrier.308.d: "Os astrônomos previram um trânsito de Vênus na região da Austrália-Indonésia-Pacífico em #ORANGE 1874#!. A comunidade científica do [ROOT.GetCountry.GetNameNoFlag] exige a observação desse evento astronômico único na vida." #deepl:1738426681
 verrier.308.f: "Um trânsito de Vênus é uma passagem do planeta Vênus em frente ao Sol. A aparição ocorre apenas quatro vezes em cerca de 243 anos. Historicamente, a medição precisa de tais passagens foi de grande importância para determinar a distância entre a Terra e o Sol (unidade astronômica) e deu origem a muitas expedições e campanhas de medição por institutos e cientistas importantes. O trânsito de Vênus em 1874 foi relativamente desfavorável para as medições astronômicas. Ele permaneceu invisível em quase toda a Europa, longos períodos de trânsito foram observados apenas na Ásia e curtos períodos de trânsito na Austrália, nas ilhas do Pacífico Sul e no sul do Oceano Índico (especialmente no Arquipélago de Kerguelen). Mesmo assim, cerca de 60 expedições foram enviadas." #deepl:3786277450
 verrier.308.g: "Não devemos perder isso." #deepl:2334937119
 verrier.308.t: "Trânsito de Vênus em 1874" #deepl:3101017563
 verrier.309.d: "Os astrônomos previram outro trânsito de Vênus para as regiões da América do Sul, América Central e América do Nordeste em #ORANGE 1882#!. A comunidade científica de [ROOT.GetCountry.GetNameNoFlag] exige a observação desse evento astronômico único na vida." #deepl:3366532829
 verrier.309.f: "Um trânsito de Vênus é uma passagem do planeta Vênus em frente ao Sol. A aparição ocorre apenas quatro vezes em cerca de 243 anos. Historicamente, a medição precisa de tais passagens foi de grande importância para determinar a distância entre a Terra e o Sol (unidade astronômica) e deu origem a muitas expedições e campanhas de medição por institutos e cientistas importantes. O trânsito de Vênus de 1882 teve algumas vantagens em relação ao trânsito de 1874, pois foi visível em algumas regiões mais acessíveis. Assim, o trânsito foi visível em todo o continente americano, exceto no norte e nordeste da América do Norte." #deepl:1503344549
 verrier.309.t: "Trânsito de Vênus em 1882" #deepl:2995649523
 verrier.311.d: "Um evento astronômico raro está se aproximando: o planeta Vênus cruzará a face do sol. Em todo o mundo, observatórios e governos começam os preparativos." #deepl:4200477530
 verrier.311.f: "A data foi calculada até o segundo. Os telescópios estão sendo embalados. Os relógios estão sendo sincronizados. O planeta Vênus cruzará a face do sol. Os astrônomos acreditam que o trânsito permitirá a medição precisa da unidade astronômica, a escala fundamental do sistema solar. Mas o sucesso do esforço depende inteiramente da visibilidade - da localização, do clima e da coordenação." #deepl:2621945333
 verrier.311.g: "Observamos o trânsito de casa." #deepl:2383387639
 verrier.311.h: "Enviamos uma expedição a um de nossos protetorados." #deepl:1098022190
 verrier.311.i: "Enviamos uma expedição para uma terra distante." #deepl:381412623
 verrier.311.j: "Devemos refletir sobre isso novamente." #deepl:1178423846
 verrier.311.t: "Preparação para o trânsito de Vênus" #deepl:967668025
 verrier.319.d: "Uma expedição do site [SCOPE.sCountry('verrier_venus_transit_leader').GetName] chegou ao nosso território para observar o raro fenômeno astronômico do trânsito de Vênus." #deepl:853589
 verrier.319.f: "Eles desembarcaram com caixas de lentes, relógios e gráficos. Seus porta-vozes se reuniram com funcionários da universidade, oferecendo correspondência amigável e informações técnicas. Os assistentes do observatório estão curiosos, os jornais estão neutros, mas alertas. Vários departamentos estão debatendo as implicações: cooperação científica, sim, mas também troca de dados, soberania logística e visibilidade no cenário mundial." #deepl:209223472
 verrier.319.g: "Que a ciência seja nossa linguagem compartilhada." #deepl:183308092
 verrier.319.t: "Olhos estrangeiros para o céu" #deepl:4019861958
 verrier.321.d: "Uma violenta tempestade atingiu o navio de expedição durante a travessia. Em meio a ondas violentas e cordames caóticos, várias caixas foram arrancadas do convés e perdidas no mar, incluindo instrumentos de trânsito delicados." #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] se agarrou ao corrimão enquanto o céu se despedaçava. O mar havia se erguido como um inimigo, lançando cordas e barris pelo convés. Os caixotes - dois deles - deslizaram em um arco terrível antes de desaparecer na escuridão.\n\nMais tarde, quando a tempestade havia passado e só restava o silêncio, os danos foram contados. O heliômetro principal. Uma lente dupla de Königsberg. Vários relógios precisos.\n\nO Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ficou entre a tripulação encharcada e a madeira quebrada, olhando para o vazio onde o equipamento estava. Havia backups. Mas nenhum deles era perfeito.\n\nE o tempo - como Vênus - não espera por ninguém." #deepl:2744264311
 verrier.321.g: "Continue. Ainda temos o suficiente para prosseguir." #deepl:1985224258
 verrier.321.t: "Tempestade sobre o trânsito" #deepl:2256455346
 verrier.322.d: "Durante a calibração noturna do campo estelar, o astrônomo da expedição notou movimentos irregulares e pontos fixos onde não deveria haver nenhum. Uma comparação posterior com as cartas estelares disponíveis confirmou isso: a equipe pode ter identificado corpos celestes novos e desconhecidos." #deepl:2064965258
 verrier.322.f: "O navio flutuava sob um céu aveludado. As nuvens haviam se dissipado horas antes, deixando para trás uma claridade tão pura que não parecia natural. O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] inclinou-se para a ocular novamente. Ali - entre Altair e a borda da grade do sextante - havia movimento. Muito lento para um cometa. Muito estável para uma falha. Noite após noite, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] retornou ao mesmo pedaço de céu, desenhando, calculando, comparando. Finalmente, as anotações do [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] confirmaram o fato: um objeto planetário menor. Possivelmente dois. Não catalogado.\n\nVênus esperaria. Mas as estrelas já haviam oferecido outra coisa." #deepl:1791725592
 verrier.322.g: "Que fique claro: os céus ainda guardam segredos." #deepl:1342826733
 verrier.322.t: "Luzes inesperadas" #deepl:1561684464
 verrier.323.d: "Durante uma pausa na viagem, a equipe da expedição se aventurou no interior para pesquisar possíveis pontos de elevação para observação astronômica. O que eles encontraram, em vez disso, foi um bosque de plantas desconhecidas, nenhuma das quais aparece nos registros botânicos disponíveis." #deepl:3286240010
 verrier.323.f: "Tudo começou com um cheiro. Sutil e cítrico, que vinha das samambaias na borda da floresta. O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] seguiu o cheiro através da densa vegetação rasteira e encontrou uma clareira onde a luz se acumulava como água.\n\nAqui, caules de violeta profundo floresciam em uma espiral perfeita. O musgo vermelho revestia pedras cor de obsidiana. No alto, aglomerados de trepadeiras em forma de estrelas pendentes balançavam com a brisa. Ninguém conseguia nomeá-las.\n\nUm dos assistentes mais jovens sussurrou: "Parece que o céu caiu na terra."\n\nEles vieram para perseguir o planeta Vênus. Mas aqui, no ar calmo e na luz filtrada, eles encontraram um tipo diferente de maravilha." #deepl:808904157
 verrier.323.f: "Tudo começou com um cheiro. Sutil e cítrico, que vinha das samambaias na borda da floresta. O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] seguiu o cheiro através da densa vegetação rasteira e encontrou uma clareira onde a luz se acumulava como água.\n\nAqui, caules de violeta profundo floresciam em uma espiral perfeita. O musgo vermelho revestia pedras cor de obsidiana. No alto, aglomerados de trepadeiras em forma de estrelas pendentes balançavam com a brisa. Ninguém conseguia nomeá-las.\n\nUm dos assistentes mais jovens sussurrou: "Parece que o céu caiu na terra."\n\nEles vieram para perseguir o planeta Vênus. Mas aqui, no ar calmo e na luz filtrada, eles encontraram um tipo diferente de maravilha." #deepl:808904157
 verrier.323.g: "Coletar amostras e preservá-las para estudo." #deepl:1767661174
 verrier.323.t: "Um jardim entre as estrelas" #deepl:2845961206
 verrier.324.d: "Enquanto procuravam um local de observação elevado, a expedição se deparou com um local de imenso interesse geológico. A pedra ao redor apresenta padrões e inclusões raramente - ou nunca - vistos antes." #deepl:539957699
 verrier.324.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] passou a mão ao longo da superfície em camadas do afloramento. Ela brilhava levemente à luz da manhã, fraturada com costuras de brilho metálico. Redemoinhos de verde profundo se enroscavam em torno de núcleos de cristal laranja, formando um padrão que parecia quase deliberado.\n\nPróximo dali, outra placa revelou uma bolha fossilizada - oca e ainda intacta. Um geólogo da equipe sugeriu uma origem vulcânica. Outro balançou a cabeça: "Isso é mais antigo do que qualquer coisa que eu já vi."\n\nOs instrumentos que eles trouxeram foram construídos para observar os céus. Mas aqui, na rocha sob suas botas, havia um fragmento da memória profunda da própria Terra." #deepl:908721635
 verrier.324.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] passou a mão ao longo da superfície em camadas do afloramento. Ela brilhava levemente à luz da manhã, fraturada com costuras de brilho metálico. Redemoinhos de verde profundo se enroscavam em torno de núcleos de cristal laranja, formando um padrão que parecia quase deliberado.\n\nPróximo dali, outra placa revelou uma bolha fossilizada - oca e ainda intacta. Um geólogo da equipe sugeriu uma origem vulcânica. Outro balançou a cabeça: "Isso é mais antigo do que qualquer coisa que eu já vi."\n\nOs instrumentos que eles trouxeram foram construídos para observar os céus. Mas aqui, na rocha sob suas botas, havia um fragmento da memória profunda da própria Terra." #deepl:908721635
 verrier.324.g: "Essa descoberta pertence à história da própria Terra." #deepl:2450655201
 verrier.324.t: "Pedra além do tempo" #deepl:2335051515
 verrier.325.d: "A expedição chegou ao porto de entrada, mas as autoridades alfandegárias estão recusando a liberação imediata. Várias caixas de equipamentos científicos foram retidas para inspeção, e os oficiais estão solicitando documentação adicional que nunca foi exigida anteriormente." #deepl:2525277400
 verrier.325.f: "O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ficou ao lado do manifesto de carga, com os dentes cerrados. As lentes de mercúrio, os relógios de precisão, o invólucro de latão polido - eles estavam inertes em um armazém atrás de um portão trancado, esperando por tinta e selos.\n\nO funcionário da alfândega foi educado, mas firme: 'Científicos ou não, todos os instrumentos estrangeiros devem ser declarados, inspecionados e taxados, a menos que sejam isentos por tratado. E Vênus não esperaria pela burocracia." #deepl:34765689
 verrier.325.g: "Pague a taxa e acelere a liberação." #deepl:240478226
 verrier.325.t: "Barreiras sob o céu" #deepl:2346862710
 verrier.340.d: "Após semanas de preparação, o posto de observação para o trânsito de Vênus está completo. Os instrumentos estão calibrados. Os gráficos foram verificados. A única incógnita agora é o céu." #deepl:1138273071
 verrier.340.f: "A cúpula se ergueu como um farol de latão e de propósito tranquilo. Construída de pedra em solo nacional ou de lona e rebites em um campo estrangeiro, ela agora abrigava a quietude sem fôlego da expectativa.  No interior, o heliômetro brilhava sob a luz das lâmpadas. As engrenagens giravam com um sussurro. Os cronômetros clicavam em antecipação. Do lado de fora, os assistentes varriam a poeira das lentes. Até mesmo o ar parecia hesitar. O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] parou na porta e tocou a soleira. Durante meses, tudo havia se encaminhado para esse momento. Agora não havia mais nada a construir, apenas esperar. Acima deles, em algum lugar no céu invisível, Vênus seguia seu caminho." #deepl:2967275520
 verrier.340.g: "A precisão começa com mãos calmas." #deepl:2872475059
 verrier.340.t: "Observatório pronto para o trânsito de Vênus" #deepl:966063237
 verrier.341.d: "O Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] propôs uma alteração pequena, mas significativa, no estabilizador interno do telescópio principal. A modificação poderia reduzir a vibração interna e aumentar a nitidez óptica no momento do contato." #deepl:491784908
 verrier.341.f: "O fato não ocorreu na cúpula, mas na tenda da oficina atrás dela. O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] estava examinando os gráficos quando o Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] se aproximou, segurando um bloco de notas manchado de graxa. Uma tensão de buffer recalculada. Um suporte revisado para o anel de latão interno.\n\nOs outros ouviram com ceticismo respeitoso - até que os testes comprovaram: a imagem estava mais estável em frações de grau. O suficiente para mudar a linha entre desfoque e nitidez." #deepl:2995793810
 verrier.341.g: "Uma pequena mudança com grande precisão." #deepl:1641676745
 verrier.341.t: "O ajuste silencioso" #deepl:3486983252
 verrier.342.d: "Um avanço recente na teoria eletromagnética permitiu que um novo método de filtragem óptica fosse aplicado ao protocolo de observação do telescópio. A interferência da dispersão da luz atmosférica agora pode ser melhor considerada, resultando em dados visuais mais claros." #deepl:2503805121
 verrier.342.f: "A ideia não veio da cúpula, nem da bancada do fabricante de lentes, mas de uma página. Era um refinamento das equações de onda - como a luz se comporta não simplesmente como partícula ou raio, mas como campo oscilante. Com isso, um novo modelo de interferência poderia ser previsto e uma correção aplicada. Os filtros foram recortados. Os tempos de exposição foram ajustados. Os engenheiros verificaram novamente suas dúvidas.\n\nQuando o Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] olhou através da lente de teste naquela noite, as estrelas não se contorciam mais. Elas permaneceram - precisas, frias, reais. O céu havia parado de tremer." #deepl:914121255
 verrier.342.g: "A matemática aguça a visão." #deepl:2639991371
 verrier.342.t: "A equação da clareza" #deepl:1039194191
 verrier.351.d: "Em todos os continentes e oceanos, de Yokohama a Réunion, de Kerguelen a Pequim, os astrônomos observaram o planeta Vênus cruzar a face do Sol. O trânsito de 1874 foi concluído - e muitas equipes relataram sucesso." #deepl:3119534429
 verrier.351.f: "Eles vieram em navios a vapor, em lombo de camelo, de trem e a pé. Engenheiros, botânicos, cartógrafos. Construíram observatórios em selvas e desertos. Estudaram o clima, cronometraram sombras, poliram lentes até que elas tremessem em suas mãos.\n\nE por seis horas, em 9 de dezembro de 1874, observaram um ponto preto deslizar pelo disco solar.\n\nVênus entrou como um sussurro e saiu como um segredo. As medições não eram perfeitas, mas eram suficientes. A triangulação poderia começar. Pela primeira vez, a humanidade poderia conhecer a verdadeira escala de seu sistema solar - não em mitos ou metáforas, mas em números traçados pela sombra. O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] fechou o caderno [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] e exalou: Estava feito." #deepl:1827747392
 verrier.351.g: "É lindo" #deepl:2882436754
 verrier.351.t: "O trânsito de 1874" #deepl:2395808814
 verrier.352.d: "Em 6 de dezembro de 1882, o planeta Vênus passou mais uma vez diante do Sol. Pela última vez em um século, observadores de todo o mundo fixaram seus instrumentos nos céus e capturaram o disco negro de Vênus em voo." #deepl:3903856343
 verrier.352.f: "Dessa vez, os navios partiram mais cedo. Os observatórios eram mais resistentes. Os relógios eram mais precisos. As lições aprendidas em 1874 guiaram cada mão, cada sombra, cada cálculo.\n\nDe Nova Jersey à Patagônia, do México à Austrália, o mundo parou para ver um ponto no sol.\n\nO Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ajustou o filtro final. O disco apareceu, deslizando lentamente sobre o branco flamejante. Não houve aplausos, apenas o farfalhar de canetas, o clique de persianas, o suspiro silencioso de triunfo. Passariam mais 121 anos até que Vênus retornasse. Mas aqui, neste momento, o próprio tempo havia sido medido." #deepl:907305697
 verrier.352.g: "Nunca veremos o próximo." #deepl:2603880366
 verrier.352.t: "O trânsito de 1882" #deepl:2224364038
 verrier.353.d: "À medida que o momento tão esperado se aproxima, as condições climáticas começam a se deteriorar. As nuvens se acumulam, não o suficiente para obscurecer tudo, mas o suficiente para distorcer a claridade e o tempo." #deepl:1325753029
 verrier.353.f: "O céu não havia se fechado totalmente, mas não obedecia mais. Camadas de nuvens à deriva se espalharam sobre o sol como uma gaze. A luz diminuiu e se acendeu em pulsos irregulares. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] Cada lente lutava por equilíbrio, cada assistente por fôlego. O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] manteve o olho fixo através do filtro. A silhueta de Vênus surgiu - fraca, refratada, dançando entre o vapor e o cálculo.\n\nNão foi um arco limpo. Nenhuma observação de livro-texto. Mas eram dados. Dados duramente conquistados sob um céu caprichoso." #deepl:1908038831
 verrier.353.g: "Se os céus nos derem peças, devemos costurá-las." #deepl:1646978536
 verrier.353.t: "Através de véus de luz" #deepl:674640397
 verrier.354.d: "Durante o trânsito de Vênus, uma equipe de observadores capturou não apenas dados precisos, mas também imagens. Dezenas de placas fotográficas foram expostas em sequência e depois montadas em movimento. Pela primeira vez na história, um trânsito planetário foi registrado em um filme." #deepl:2258153461
 verrier.354.f: "Ele cintila. Treme. Mas se move. Em uma série de placas tratadas, Vênus entra pela borda, um ponto preto perfeito patinando pelo disco solar. Não é apenas um cálculo, não é um esboço - é movimento. Capturado no tempo. O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ficou na câmara escura, com a lanterna levantada, observando a breve sequência se repetir várias vezes. Seis horas de medição, condensadas em segundos de maravilha. Os astrônomos aplaudiram. Sabiam que tinham feito algo novo. Eles haviam feito os céus se moverem." #deepl:1856959975
 verrier.354.g: "Analisar os quadros para aprimorar os modelos de movimento planetário." #deepl:3348594448
 verrier.354.t: "Uma sombra em movimento" #deepl:969441096
 verrier.355.d: "Inspirado pelo entusiasmo global em torno do trânsito de Vênus de 1882, um [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] escreveu uma nova peça cerimonial. Estreada diante de um grande público, a marcha captura tanto a majestade do evento quanto o ritmo de um novo século científico." #deepl:1566390789
 verrier.355.f: "Um ano após o Trânsito de Vênus de 1882, John Philip Sousa foi encarregado de compor um cortejo para a inauguração de uma estátua de bronze do físico americano Joseph Henry, que havia morrido em 1878. Maçom, Sousa era fascinado pelo que o grupo considerava qualidades místicas em fenômenos naturais. A peça nunca pegou durante a vida de Sousa. Ela ficou sem ser tocada por muitos anos, depois que as cópias manuscritas da música de Sousa foram destruídas em uma enchente." #deepl:3349639062
 verrier.355.g: "Algumas músicas são escritas para a história, não para multidões." #deepl:1666827653
 verrier.355.t: "A Marcha de Vênus" #deepl:1281729794
 verrier_add_x_venus_success_0_tt: "Não ganhe #V Sucesso na observação do trânsito de Vênus#!." #deepl:2753469077
 verrier_add_x_venus_success_minus_x_tt: "Perder [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Sucesso na observação do trânsito de Vênus#!." #deepl:867568724
 verrier_add_x_venus_success_plus_x_tt: "Ganhos [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Sucesso na observação do trânsito de Vênus#!." #deepl:667317191
 verrier_foreign_venus_expedition_modifier: "Expedição estrangeira ao trânsito de Vênus" #deepl:253236392
 verrier_venus_transit_diplomacy_modifier: "Negociações diplomáticas para o trânsito de Vênus" #deepl:1903396933
 verrier_venus_transit_preparation_modifier: "Preparativos para o trânsito de Vênus" #deepl:3653758437
 vikelas.21.d: "Em um ginásio [SCOPE.sState('vikelas_basketball_state').GetName], um novo jogo foi inventado - um jogo que um dia poderá ecoar em salões e estádios em todo o mundo." #deepl:3471187932
 vikelas.21.f: "'Sem chutes. Nada de correr com a bola. E duas cestas de pêssego pregadas em uma galeria.'\n\nEm [TimeKeeper.GetCurrentDate.Format('y')], em uma escola em [SCOPE.sState('vikelas_basketball_state').GetFarmHubName], o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] enfrentou um problema: como manter [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] alunos inquietos ativos dentro de casa durante o inverno. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] solução foi simples - e estranha. Uma bola de futebol, duas cestas de pêssego elevadas e treze regras.\nOs meninos acharam estranho no início. Nada de contato. Nada de dribles. Apenas passes cuidadosos e arremessos em arco. Mas alguma coisa pegou. O jogo se espalhou para outras escolas e depois para outras cidades. Em menos de uma década, ginásios de Nova York a Tóquio estavam ecoando com o ritmo de bolas quicando e gritos de "Basket!"\nO que começou como um passatempo de clima frio pode se tornar algo maior. É rápido, baseado em equipes, adequado à vida moderna e, acima de tudo, nascido em [ROOT.GetCountry.GetAdjectiveNoFormatting]." #deepl:3707830614
 vikelas.21.g: "Introduzi-lo em escolas e ginásios." #deepl:2248999233
 vikelas.21.t: "O jogo com uma cesta de pêssegos" #deepl:2623215155
 vikelas.401.d: "Hoje, a International Football Association foi fundada em [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]. Seu nome completo é Fédération Internationale de Football Association (FIFA)." #deepl:3487975302
 vikelas.401.f: "Em 21 de maio de 1904, delegados de sete nações - Bélgica, Dinamarca, França, Holanda, Espanha, Suécia e Suíça - assinaram um estatuto. O objetivo: padronizar as regras do futebol, organizar partidas internacionais e elevar o jogo a um nível global. Assim nasceu a Fédération Internationale de Football Association - FIFA. Em suas primeiras décadas, a FIFA era modesta: uma presidência de meio período, jogadores amadores e disputas regionais. Mas, sob a superfície, um movimento global crescia. A Inglaterra hesitou em participar, desconfiada da interferência estrangeira. Os sul-americanos começaram a formar suas próprias confederações. Em 1924 e 1928, os torneios olímpicos revelaram o verdadeiro alcance do futebol: multidões de 60.000 pessoas em Paris, torcendo não por exércitos, mas por equipes." #deepl:2154770056
 vikelas.401.g: "Associe-se à FIFA e apoie as competições internacionais." #deepl:1192623767
 vikelas.401.t: "Federação Internacional de Futebol" #deepl:2948752940
 vikelas.411.d: "A FIFA decidiu que a Copa do Mundo deste ano será realizada em [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Após a rodada preliminar, a lista de favoritos é reduzida a oito equipes." #deepl:1721956240
 vikelas.411.f: "#V As seguintes equipes nacionais se classificaram para as quartas de final#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "Que a melhor equipe prevaleça." #deepl:900366891
 vikelas.411.t: "Copa do Mundo de Futebol [TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "Nossa equipe triunfou no cenário mundial, derrotando os melhores times de todos os continentes. Em todo o país, as comemorações explodem!" #deepl:1604872733
 vikelas.412.f: "Em uma partida acirrada contra o [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName], nossa equipe provou seu valor na final da Copa do Mundo em [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Nossa equipe nacional levantou o troféu de ouro. O apito final ecoou em rádios, cafés e quartéis. Dos mineiros do norte aos comerciantes do porto, o povo rugiu como um só. O capitão chora no pódio. Uma nova geração assiste e sonha." #deepl:1159882054
 vikelas.412.g: "Nós somos os campeões." #deepl:2663168066
 vikelas.412.t: "Campeões do mundo" #deepl:3853223886
 vikelas.413.d: "Nosso time de futebol chegou à final - e não conseguiu a glória. Em todo o país, o orgulho e a tristeza se misturam em igual medida." #deepl:80141764
 vikelas.413.f: "Infelizmente, o melhor da nossa equipe não foi suficiente. Em uma partida de tirar o fôlego contra o [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName], nossos homens não conseguiram vencer. Durante semanas, eles carregaram as esperanças de uma nação. Em campos lamacentos e um calor ofuscante, eles correram, lutaram e acreditaram. Jogo a jogo, eles se tornaram lendas. Eles ergueram suas cabeças enquanto o outro hino tocava. Não houve lágrimas, apenas silêncio - e depois, um aplauso lento e crescente." #deepl:3695564906
 vikelas.413.g: "Isso foi roubado de nós!" #deepl:3624655051
 vikelas.413.t: "Silver Glory em [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "Nossa seleção nacional foi eliminada precocemente da Copa do Mundo da FIFA em [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] derrotou [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] na final." #deepl:317995881
 vikelas.414.f: "Havia esperança - esperança real e tangível. Vitórias aplaudidas em pátios de fábricas, comentários de rádio sussurrados em igrejas, crianças encenando gols em becos. A equipe representava mais do que futebol: ambição, orgulho, a crença de que poderíamos nos superar. Mas a última partida mudou tudo. Um único gol sofrido. Um gol de mão não visto. Uma oportunidade perdida. Agora o sonho acabou, e o mundo segue em frente." #deepl:640236906
 vikelas.414.g: "Nós acreditávamos. Isso foi o suficiente." #deepl:4069550601
 vikelas.414.t: "O sonho termina cedo" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] fez seu nome treinando e desenvolvendo toda uma geração de jogadores. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] agora é famoso o suficiente para ser considerado um treinador sênior!" #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "Um prêmio por ser capaz de gritar descaradamente em campo." #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] agora é um treinador sênior!" #deepl:454610152
 vikelas.495.d: "Um novo [concept_vikelas_coach] introduziu [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] nome é [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]." #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] conduzirá nossos rapazes à vitória." #deepl:1930939286
 vikelas.495.t: "Um novo treinador" #deepl:2806014865
 vikelas.601.d: "Uma nova invenção apareceu nas avenidas: uma engenhoca de duas rodas movida por pedais acoplados diretamente à roda dianteira. Ele é chamado de "velocípede"." #deepl:497189807
 vikelas.601.f: "Nos parques e nas ruas largas da capital, as cabeças se viram. Cavalheiros com chapéus e coletes se empoleiram em estranhas estruturas de ferro, pedalando furiosamente, cambaleando em meio a multidões assustadas. Alguns caem. Alguns voam. As crianças riem. Os estadistas mais velhos levantam as sobrancelhas. Os jornais o chamam de le vélocipède - metade brinquedo, metade promessa. Inventado por um fabricante de carruagens, esse "sacudidor de ossos" é tão pesado quanto revolucionário. Em paralelepípedos, ele dá um solavanco na coluna. Mas em passeios suaves, ele se move com uma graça surpreendente. Há rumores de que não se trata de uma mera novidade, mas da semente de um novo tipo de movimento." #deepl:2987098471
 vikelas.601.g: "Uma moda divertida!" #deepl:3063453559
 vikelas.601.t: "Pedais no asfalto" #deepl:583302045
 vikelas.602.d: "Surgiu um novo design de bicicleta, com rodas de tamanho igual, eixo traseiro acionado por corrente e equilíbrio aprimorado. Ao contrário das precárias bicicletas de rodas altas, essa "bicicleta de segurança" é estável, econômica e está se tornando rapidamente uma sensação. Seu inventor? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!" #deepl:1082254426
 vikelas.602.f: "Os antigos velocípedes sacudiam os ossos e os nervos. Os imponentes penny-farthings ofereciam velocidade, mas a um preço que poucos estavam dispostos a pagar - um movimento em falso e o ciclista voava. Agora, um novo tipo de bicicleta está se espalhando pelas oficinas da nossa capital: compacta, elegante e segura. Com um acionamento por corrente na roda traseira e pneus pneumáticos, até mesmo senhoras e trabalhadores começam a pedalar. As ruas antes dominadas por carruagens agora ecoam com o suave zumbido da borracha sobre a pedra. Tanto nos cafés quanto nas fábricas, o veredicto é o mesmo: isso não é um brinquedo. É a liberdade - rápida, silenciosa e, de repente, ao seu alcance." #deepl:2048166631
 vikelas.602.g: "Permita que todos os cidadãos entrem na era moderna." #deepl:158167297
 vikelas.602.t: "A bicicleta do futuro" #deepl:3168239488
 vikelas.611.d: "O dia chegou. Pilotos de todo o país se reúnem na linha de largada, ansiosos para testar o homem e a máquina na estrada aberta. O ar crepita com a expectativa." #deepl:3817467534
 vikelas.611.f: "O sol nasce na avenida, já lotada de espectadores. As bandeiras tremulam. O cheiro de graxa e poeira paira no ar da manhã. Dezenas de ciclistas montam em suas bicicletas - algumas máquinas reluzentes recém-saídas da fábrica, outras remendadas em oficinas de fundo de quintal. Os aplausos irrompem. E as rodas começam a girar.\nEles atravessam os portões da cidade e saem para o campo. Os fazendeiros fazem uma pausa em seus campos. Crianças correm ao lado da estrada. Os padres os abençoam. Os cínicos zombam. E, no entanto, à medida que a poeira se arrasta atrás deles, uma estranha sensação surge na multidão: isso parece ser o início de algo maior." #deepl:872369825
 vikelas.611.g: "Que todas as cidades ouçam o zumbido do progresso." #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "O vencedor da corrida nacional de bicicletas conquistou mais do que apenas a linha de chegada - ele conquistou a imaginação da nação. Agora, todos os olhos se voltam para o que ele representa." #deepl:2904065614
 vikelas.621.f: "Os jornais o chamam de "O Cavaleiro de Ferro". Nascido em uma família de tecelões, órfão aos doze anos, operário de fábrica aos dezesseis. Sua vitória em uma bicicleta de segurança danificada - remendada, raspada e lubrificada com cuidado - não foi um mero triunfo esportivo. Foi uma parábola. Multidões cantam seu nome. Pintores o desenham. As crianças imitam sua postura. Mas, mais do que isso, os ideólogos tomam nota. Alguns o chamam de rosto da força do trabalho. Outros dizem que ele prova a vitalidade da nação. A imprensa discute se ele é um trabalhador, um patriota - ou algo totalmente novo.\nO próprio cavaleiro fala pouco. Ele sorri, acena com a cabeça e cavalga." #deepl:2953543537
 vikelas.621.g: "Faça dele um herói da classe trabalhadora." #deepl:2363628364
 vikelas.621.h: "Comemore-o como um ícone nacional." #deepl:255033591
 vikelas.621.i: "Enquadre-o como um símbolo do progresso e do homem moderno." #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "Ocorreu um trágico acidente durante a corrida nacional de bicicletas. Um ciclista morreu e vários outros ficaram feridos. A torcida parou." #deepl:644341100
 vikelas.622.f: "Uma roda foi pega em um sulco. Um grito, um estrondo e depois uma gritaria. Os espectadores avançaram enquanto as bicicletas caíam como dominós. O sangue se misturou à poeira. Capacetes se partiram. Ossos quebrados. Um jovem - dezessete anos, aprendiz de uma fábrica - morreu no impacto. Os jornais estão divididos. Alguns chamam isso de um preço necessário do progresso, outros condenam a imprudência do esporte público." #deepl:1135060049
 vikelas.622.g: "Honrar os mortos." #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "Uma etapa específica da corrida conquistou o coração do público. Os espectadores falam dela não apenas como uma competição, mas como uma lenda." #deepl:438486236
 vikelas.623.f: "Os cavaleiros desapareceram nas colinas ao amanhecer. O que se seguiu não foi mais uma corrida, mas um teste de espírito. Uma dúzia ficou para trás. Três desmaiaram. Um bateu em uma curva fechada e se levantou sangrando, acenando para a ajuda. Mas um deles avançou através da neblina para o coração de milhares de pessoas. A nação inteira não fala de outra coisa." #deepl:130901318
 vikelas.623.g: "Que a estrada se lembre de seu esforço por gerações." #deepl:3983380699
 vikelas.623.h: "Encomende uma pintura do momento." #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "Surgiram acusações após a última etapa da corrida. Um piloto foi pego trapaceando, embora alguns afirmem que ele estava apenas fazendo o que todos fazem, mas de forma menos discreta." #deepl:3963790231
 vikelas.624.f: "Disseram que ele trocou de bicicleta atrás do celeiro. Outros dizem que ele foi rebocado morro acima por um fio escondido.'\n\nOs fatos são confusos. O que está claro é o seguinte: o ciclista estava muito rápido. Espetacularmente rápido. Muito fresco depois de uma subida brutal. Seus rivais estão furiosos. Os espectadores suspiram. A imprensa sente o cheiro de sangue. Uma fotografia mostra um segundo homem com roupas iguais. Outra testemunha afirma ter visto o piloto ser empurrado por um carro durante a etapa noturna. O acusado nega tudo, chamando o fato de inveja e política." #deepl:2810733320
 vikelas.624.g: "Desqualifique o piloto e exponha a fraude." #deepl:2198835421
 vikelas.624.h: "Cubra isso para o bem do esporte." #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "Uma rivalidade feroz tomou conta da temporada de corridas deste ano. Dois pilotos - iguais em força, opostos em estilo - dividiram a nação em dois campos." #deepl:2483368762
 vikelas.625.f: "Um é o fogo: imprudente, ousado, adorado pelos jovens. Ele joga seu boné para a multidão, ri enquanto pedala e ataca sem aviso prévio.\nO outro é o gelo: calmo, calculista, quase matemático. Ele economiza sua força, vence por segundos e fala somente quando necessário.\n\nSeus nomes são gritados dos telhados. As cidades tomam partido. Os pôsteres são impressos em vermelho ou azul. Alfaiates vendem bonés em suas cores. As crianças imitam suas posturas em bicicletas de madeira.\n\nOs jornais falam de mais do que apenas uma corrida. Eles falam de caráter, de filosofia, de quem as pessoas querem ser. E nenhum dos ciclistas cede um centímetro." #deepl:1380551122
 vikelas.625.g: "Isso beneficiará a cultura do jornal." #deepl:3508242265
 vikelas.625.h: "Usar a rivalidade para obter ganhos políticos." #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "Uma rivalidade feroz tomou conta da temporada de corridas deste ano. Dois pilotos - iguais em força, opostos em estilo - dividiram a nação em dois campos." #deepl:2483368762
 vikelas.626.f: "Encontraram-no em uma forja da aldeia, com o martelo na mão, o rosto enegrecido pela fuligem, sozinho. Uma curva mal calculada, um barulho de cascalho e o garfo dianteiro se partiu. Sua bicicleta se dobrou como um pássaro ferido. A maioria teria parado. Mas ele não. \nEle mancou na descida, arrastando o quadro por quilômetros. Em um vilarejo remoto, ele encontrou uma forja. Nenhum mecânico. Nenhum carro da equipe. Apenas um fole, uma bigorna e suas próprias mãos.\nDurante horas ele trabalhou - mangas arregaçadas, mandíbula cerrada - fundindo o garfo dianteiro de memória e pelo tato. Quando os oficiais chegaram, ele parou apenas para olhar e dizer: "Não toque nisso."\nOito horas atrás dos líderes, ele pedalou novamente. Sem chance de vitória. Mas, ao longo de todo o percurso, a multidão se levantou para aplaudir - não o vencedor, mas aquele que se recusou a parar." #deepl:896070649
 vikelas.626.f: "Encontraram-no em uma forja da aldeia, com o martelo na mão, o rosto enegrecido pela fuligem, sozinho. Uma curva mal calculada, um barulho de cascalho e o garfo dianteiro se partiu. Sua bicicleta se dobrou como um pássaro ferido. A maioria teria parado. Mas ele não. \nEle mancou na descida, arrastando o quadro por quilômetros. Em um vilarejo remoto, ele encontrou uma forja. Nenhum mecânico. Nenhum carro da equipe. Apenas fole, bigorna e suas próprias mãos.\nDurante horas, ele trabalhou - mangas arregaçadas, mandíbula cerrada - fundindo o garfo dianteiro de memória e pelo tato. Quando os oficiais chegaram, ele parou apenas para olhar e dizer: "Não toque nisso."\nOito horas atrás dos líderes, ele pedalou novamente. Sem chance de vitória. Mas, ao longo de todo o percurso, a multidão se levantou para aplaudir - não o vencedor, mas aquele que se recusou a parar." #deepl:896070649
 vikelas.626.g: "Uma história inspiradora." #deepl:3324986220
 vikelas.626.h: "Permitir reparos de emergência." #deepl:385201552
 vikelas.626.i: "Honre-o!" #deepl:581594471
