 dubois_perfect_megalodon_paleontologist_loc: "\nO #o Megalodon#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é um tubarão gigantesco. Um esqueleto realmente impressionante." #deepl:1878769616
 dubois_perfect_plesiosaurus_paleontologist_loc: "\nO #o Plesiosaurus#! reconstruído pelo professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] é um enorme réptil marinho." #deepl:1469085529
