 MR_HIRE_COACH_BUTTON_TT: "#T Contrate um técnico nacional#!\nApós a fundação da FIFA e as primeiras partidas internacionais, um técnico nacional pode ser contratado. Os técnicos nacionais contribuem com suas habilidades para melhorar os resultados das partidas. Se um técnico não corresponder às expectativas, ele poderá ser substituído após pelo menos três anos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3011015130
