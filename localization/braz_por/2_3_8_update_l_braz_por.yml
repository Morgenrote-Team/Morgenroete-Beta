 dubois.2171.j: "Megalodon." #deepl:1809322411
 dubois.2173.f: "Plesiossauro é uma ordem de répteis marinhos. Seus fósseis podem ser encontrados em todo o mundo. Dependendo da espécie, os animais tinham entre 1,5 e 15 metros de comprimento. Dependendo da espécie, eles provavelmente se alimentavam de diferentes animais. De caramujos e mexilhões a peixes e outras presas.\nSuas mandíbulas em forma de U e dentes afiados, que se assemelham a uma armadilha para peixes, forneceram a eles uma ferramenta útil." #deepl:1725138010
 dubois.2173.t: "Plesiossauro" #deepl:3684543079
 dubois.2174.f: "O Basilosaurus não é um dinossauro, mas uma forma pré-histórica de baleia. Seu corpo comprido lembra uma cobra comprida, mas com um comprimento de até 20 metros, é semelhante ao da baleia cachalote." #deepl:4279559397
 dubois.2174.t: "Basilosaurus" #deepl:3895138572
 dubois.2175.f: "O gigantesco tubarão Megalodon é provavelmente o maior tubarão que já existiu. No entanto, é difícil estimar seu comprimento, pois atualmente só foram encontrados dentes e vértebras. Nossos paleontólogos estimam que seu comprimento seja algo entre 9 e 30 metros. De qualquer forma, o esqueleto do tubarão é de tirar o fôlego e uma das joias da coroa de nossa coleção." #deepl:1066794911
