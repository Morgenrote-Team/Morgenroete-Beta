 nationalization.11.d: "Em [TimeKeeper.GetCurrentDate.Format('y')], a Itália testemunhou a publicação de um livro de receitas inovador que mudaria para sempre sua cultura culinária. O autor, Pellegrino Artusi, daria sua contribuição para o estabelecimento de uma culinária italiana reconhecida internacionalmente, que enfatiza a unidade e a grandeza da nação." #deepl:4223602969
 nationalization.11.f: "Publicado em 1891, "La scienza in cucina e l'arte di mangiare bene" de Pellegrino Artusi é amplamente considerado como o primeiro livro de receitas italiano moderno. Em uma época em que a Itália estava apenas começando a forjar uma identidade nacional, o trabalho de Artusi desempenhou um papel fundamental na unificação das diversas cozinhas regionais em uma tradição culinária nacional coerente. Sua coleção meticulosa de receitas, apresentadas com inteligência e clareza, não só estabeleceu um novo padrão para a literatura culinária, mas também contribuiu significativamente para a melhoria do padrão de vida da nação, promovendo a qualidade, a inovação e o orgulho da gastronomia local." #deepl:2207143835
 nationalization.11.g: "Um triunfo da arte culinária!" #deepl:1345745332
 nationalization.11.t: "A ciência na culinária e a arte de comer bem" #deepl:3987888764
 pius.101.d: "Duas crianças nas montanhas do sudeste da França afirmam ter testemunhado uma aparição da Virgem Maria, provocando ondas de entusiasmo espiritual - e preocupação - em todo o mundo católico." #deepl:1912784731
 pius.101.f: "'Aproximem-se, meus filhos, não tenham medo. Estou aqui para lhes trazer ótimas notícias...'\n\nNo alto das pastagens alpinas acima do vilarejo de La Salette, perto de Corps, no sudeste da França, duas crianças pastoras relatam uma visão que agora mexe com os corações de toda a cristandade. Uma senhora, radiante de luz e envolta em tristeza, apareceu para eles. Ela chorou - lágrimas que caíram por um mundo que se afastou de Deus. Ela falou de blasfêmias proferidas sem vergonha, de domingos profanados e da fome e da ruína que viriam caso a humanidade não se arrependesse.\nO que inicialmente parecia uma lenda rústica tornou-se um movimento. Peregrinos se reúnem na remota encosta da montanha. Monges e jornalistas escalam as mesmas trilhas. A Igreja hesita: alguns abraçam a visão como um chamado divino à penitência; outros temem o aumento do misticismo popular e do fervor irracional.\nO bispo de Grenoble oferece uma aprovação cautelosa. As autoridades seculares permanecem desconfiadas.\nE Roma? Roma está observando - em silêncio. Mas os sinos já estão tocando." #deepl:2145205681
 pius.101.g: "Uma advertência celestial." #deepl:3313498992
 pius.101.h: "Permaneça racional." #deepl:499500707
 pius.101.t: "A aparição em La Salette" #deepl:3065761669
 pius.102.d: "Na pequena cidade de Lourdes, uma menina de 14 anos afirma ter visto uma senhora radiante em uma gruta. Suas visões logo atraem peregrinos, controvérsias e a atenção de Roma." #deepl:1624678567
 pius.102.f: "Ela era jovem, descalça e pobre. No entanto, falava de uma beleza que nenhuma palavra poderia descrever.'\n\nEm uma gruta remota perto de Lourdes, no sopé dos Pirineus, uma camponesa chamada Bernadette Soubirous fala de uma senhora vestida de branco, com uma faixa azul e rosas douradas nos pés. A visão não diz nada no início - apenas sorri. Depois ela fala: de penitência, de oração, de sofrimento e da misericórdia divina. Ela se nomeia simplesmente: A Imaculada Conceição.\nNo início, os aldeões zombam. Mas quando Bernadette descobre uma fonte escondida e afirma que ela é uma fonte de cura, milhares começam a chegar - esperando, rezando, chorando. As muletas são deixadas para trás. Os testemunhos se espalham. Os céticos dizem que é histeria. Médicos, padres e políticos descem a Lourdes.\nA Igreja investiga. O Estado observa com cautela. E ainda assim as pessoas vêm." #deepl:580789021
 pius.102.g: "A Shrine to Healing and Hope (Um santuário para a cura e a esperança)." #deepl:2629250679
 pius.102.h: "Alucinações!" #deepl:3891021600
 pius.102.t: "A aparição em Lourdes" #deepl:1767463178
 pius.103.d: "No vilarejo irlandês de Knock, quinze testemunhas relatam uma aparição silenciosa da Virgem Maria, de São José e de São João Evangelista. A visão desperta um povo há muito sobrecarregado pela pobreza, pelo exílio e pelo domínio estrangeiro." #deepl:143567078
 pius.103.f: "'Eles não disseram uma palavra. No entanto, naquele silêncio, uma nação ouviu a esperança.'\n\nA chuva caía constantemente sobre a igreja paroquial de Knock, no condado de Mayo. E, ainda assim, quinze aldeões ficaram paralisados. Diante deles, banhados pela luz na parede da empena sul, estava uma assembleia silenciosa: a Virgem Maria em pose de oração; São José ao seu lado; São João Evangelista, vestido e segurando um Evangelho. Atrás deles, um cordeiro em um altar e uma cruz.\nNenhuma mensagem foi dita. Nenhum movimento foi feito. E, ainda assim, as testemunhas juraram pelo que viram - jovens e idosos, homens e mulheres igualmente.\nEm uma terra desgastada pela fome, emigração e anseio espiritual, a visão silenciosa ecoou mais alto do que os sermões. Os peregrinos logo chegaram, buscando cura, sinais e consolo. As autoridades inglesas zombaram. Alguns membros da Igreja hesitaram. Mas entre os pobres e devotos da Irlanda, Knock se tornou um grito sagrado por dignidade." #deepl:216954390
 pius.103.g: "A Light in the Rain (Uma luz na chuva)." #deepl:4199802423
 pius.103.h: "Desconsidere-o como folclore." #deepl:2853965001
 pius.103.t: "A visão silenciosa em Knock" #deepl:3086062832
 pius.104.d: "No centro de Portugal, três pastorinhos relatam repetidas aparições da Virgem Maria, culminando em um fenômeno milagroso testemunhado por milhares de pessoas. Suas visões trazem profecias sobre guerra, sofrimento e o futuro da Igreja." #deepl:3494130064
 pius.104.f: "'No final, meu Imaculado Coração triunfará.'\n\nPerto da cidade de Fátima, nas colinas rurais da Cova da Iria, três crianças - Lúcia, Francisco e Jacinta - falam de uma senhora mais brilhante que o sol, vestida de brilho e tristeza. Durante seis meses, ela aparece repetidas vezes, alertando sobre a guerra global, o surgimento de ideologias ímpias e a perseguição dos fiéis. Ela pede penitência, oração e a consagração da Rússia ao seu coração.\No dia 13 de outubro de 1917, enquanto dezenas de milhares de pessoas se levantam sob uma chuva torrencial, o sol parece se soltar dos céus, girando e batendo no céu. Alguns caem de joelhos. Outros fogem. Quando a luz se apaga, suas roupas estão secas. A multidão se dispersa em silêncio, espantada e com medo.\nA Igreja é cautelosa. A imprensa está dividida. Mas entre as pessoas - especialmente os pobres, os feridos e os fiéis - uma nova chama se acende: uma chama de esperança, uma chama de advertência, uma chama que vê a Virgem não apenas como mãe, mas como sentinela da era que está por vir." #deepl:2513437425
 pius.104.g: "Preste atenção aos avisos de Fátima." #deepl:1664428204
 pius.104.h: "Desmascarar o milagre solar." #deepl:958137642
 pius.104.t: "Os segredos de Fátima" #deepl:1100906175
 pius.105.d: "Em um vilarejo remoto perto de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName], surgem relatos de uma aparição da Virgem Maria. A história se espalha rapidamente, atraindo peregrinos, céticos e a atenção das autoridades eclesiásticas." #deepl:45703861
 pius.105.f: "'Ela estava acima dos campos, em uma coroa de luz, e nos olhava como se conhecesse a tristeza de cada alma.'\n\nO primeiro a falar foi uma criança - olhos arregalados de admiração, voz trêmula. Ele falou de uma senhora mais brilhante do que o amanhecer, envolta em brilho e tristeza, que apareceu em silêncio e observou o mundo com uma dor profunda e consciente. Outros diziam que também a viam. Alguns caíram de joelhos. Outros correram. Todos se lembravam da quietude que se seguiu.\nA história se espalhou para além da aldeia. Peregrinos chegavam com velas nas mãos. Os fiéis oravam. Os aflitos tinham esperança. Os padres debatiam. As autoridades levantavam as sobrancelhas. Mas as pessoas continuavam chegando - atraídas não pela certeza, mas por algo mais antigo: a necessidade de acreditar.\nSeja milagre, visão ou mito, o evento já moldou o coração daqueles que o testemunharam - e a vida daqueles que agora devem decidir o que ele significa." #deepl:3063415784
 pius.105.g: "Um sinal para os fiéis." #deepl:1177288670
 pius.105.h: "Suprimir a histeria." #deepl:1037767630
 pius.105.t: "Nossa Senhora de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "Apesar das ordens oficiais que proíbem exibições públicas, uma multidão de fiéis iniciou uma procissão espontânea em direção ao local da aparição mariana em [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]." #deepl:3379456873
 pius.111.f: "Não acendemos tochas, não carregamos estandartes. Apenas rosários, silêncio e nossos pés na poeira.'\n\nVieram ao amanhecer, em duplas e trios, caminhando por campos e vilarejos, sussurrando orações. Ao meio-dia, eram centenas, correndo pelas estradas rurais, alguns descalços, outros chorando. As mulheres seguravam flores. Os idosos murmuravam ladainhas. As crianças seguravam ícones esculpidos em madeira.\nAs autoridades haviam declarado o local fechado. Os soldados ficaram de guarda. No entanto, ninguém impediu a multidão. Talvez fosse o canto. Talvez o silêncio. Talvez algo invisível.\nAo chegarem ao local da visão, os fiéis se ajoelharam, murmuraram orações e acenderam velas no solo. Nenhuma voz trovejou do céu. Nenhum milagre foi testemunhado. Mas algo já havia mudado. Um povo havia agido - não em desafio à lei, mas em obediência a algo mais antigo que a lei." #deepl:2369382513
 pius.111.g: "Que eles orem." #deepl:2163336687
 pius.111.h: "Observe com calma." #deepl:3862482018
 pius.111.h_tt: "Grande chance de que haja outros eventos após a aparição mariana." #deepl:2612943668
 pius.111.i: "Disperse-os pela força." #deepl:1733449904
 pius.111.i_tt: "Grande chance de uma colisão sangrenta." #deepl:202372566
 pius.111.t: "A procissão não proibida" #deepl:3613794317
 pius.112.d: "Um confronto entre as autoridades e os fiéis no local da proibida procissão mariana se tornou violento. O terreno onde as visões antes inspiravam esperança agora tem a mancha de sangue." #deepl:2719807490
 pius.112.f: "'Houve orações e depois gritos.'\n\nAs velas ainda estavam tremulando quando os soldados chegaram. As vozes se elevaram em confusão, depois em súplica. Uma mulher caiu. Um menino gritou. Ninguém sabe quem deu a ordem - mas os mosquetes latiam, os cassetetes balançavam, as botas se moviam através do incenso e do solo. Quando o silêncio voltou, era mais pesado do que antes.\nA Igreja está abalada. Os fiéis estão indignados. A imprensa fala em voz baixa - alguns chamam o fato de acidente, outros de massacre. O local, que antes era considerado sagrado, agora é amaldiçoado pela memória. E ainda assim as pessoas se reúnem - não com flores, mas com raiva, com silêncio, com um olhar que nenhuma lei pode extinguir." #deepl:2186004653
 pius.112.g: "Lamentamos o que aconteceu." #deepl:3313805008
 pius.112.h: "Eles provocaram isso em si mesmos." #deepl:402397332
 pius.112.t: "Sangue no solo sagrado" #deepl:1312740775
 pius.113.d: "Um padre local se tornou o principal defensor da aparição mariana em [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Seus sermões atraem multidões, suas palavras inspiram esperança e desafiam a autoridade do Estado. Seu nome é Padre [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]." #deepl:1046441460
 pius.113.f: "Ela apareceu para os humildes, não para os poderosos. E talvez seja por isso que eles desejam silenciá-la.'\n\nNa igreja de pedra acima do vilarejo, um padre chamado Padre [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] começou a pregar - não apenas sobre a misericórdia da Virgem, mas sobre sua justiça. Suas palavras ecoam além da nave: 'Se o Céu falou aqui, então nenhum governo pode proibir seu eco.'\nOs peregrinos acorrem a seus sermões. Seu nome se espalha em sussurros e em hinários. Ele pede paz, mas sua presença galvaniza a agitação. Alguns o chamam de profeta. Outros o chamam de rebelde com vestes. As autoridades ficam inquietas. Os militares falam em incitação. A hierarquia da Igreja hesita - dividida entre o dogma e a diplomacia. Uma proposta discreta chega à sua mesa: Ele poderia ser removido. Discretamente. Discretamente.\nMas alguns homens, quando silenciados, falam ainda mais alto." #deepl:2395659126
 pius.113.g: "Que ele pregue." #deepl:3471579290
 pius.113.h: "Convoque-o para a capital para negociação." #deepl:1641636788
 pius.113.i: "Faça-o desaparecer." #deepl:3010062703
 pius.113.t: "A voz no púlpito" #deepl:3682486724
 pius.114.d: "Em todo o país, os fiéis católicos iniciaram manifestações públicas em apoio à aparição mariana. O que começou como uma peregrinação rural se tornou um movimento nacional." #deepl:3473602537
 pius.114.f: "Eles caminhavam com rosários nas mãos, seus filhos nos ombros e o nome da Virgem nos lábios."\n\nDas vilas de pescadores às cidades fabris, os sinais são os mesmos: velas acesas nas janelas, hinos ecoando nas praças da cidade, milhares se reunindo em silêncio. Não há bandeiras hasteadas - apenas estátuas, ícones e um único nome murmurado repetidas vezes: Maria. O que começou como devoção se tornou desafio.\nEm resposta à violência no local sagrado de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName], os fiéis saíram às ruas. Eles não gritam. Eles rezam. Mas seu número cresce diariamente.\nAlguns membros do governo pedem tolerância. Outros exigem repressão. Os militares estão inquietos. E nos lares de todo o país, até mesmo os duvidosos se perguntam: se tantos acreditam, ainda pode ser uma mentira?" #deepl:3107082794
 pius.114.g: "Permitir a procissão nacional." #deepl:3918828179
 pius.114.h: "Proibir a procissão nacional." #deepl:1813497751
 pius.114.t: "A procissão que abalou a nação" #deepl:738056863
 pius.115.d: "Uma grave quebra de safra atingiu várias regiões rurais de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Entre os fiéis, um sussurro perigoso começa a se espalhar: que a Virgem, antes silenciada pelo Estado, agora chora - e pune." #deepl:3238123436
 pius.115.f: "Ela pediu orações. Nós lhe demos soldados.'\n\nAs chuvas falharam. O trigo amarelou cedo demais. As batatas apodreceram sob a terra, sem serem vistas e amargas. Os aldeões falam de campos que parecem... abandonados. Não apenas pelos homens, mas pela misericórdia.\nE assim eles sussurram. Da mulher de luz que uma vez apareceu - e foi ridicularizada. Do sacerdote que desapareceu. Do santuário selado e dos peregrinos espancados. Agora, dizem, ela virou o rosto para o outro lado.\nAs velas queimam novamente, mas agora atrás de janelas fechadas. As mães batizam as crianças em segredo. Os idosos enterram cascas de pão como oferendas. A Igreja não ousa falar, mas o povo já acredita: Essa é a sua tristeza. Ou sua advertência." #deepl:2485032935
 pius.115.g: "Superstição! Espero que sim..." #deepl:2447781343
 pius.115.t: "Os campos estão vazios" #deepl:3151937266
 pius.116.d: "Depois de anos de repressão e da negação de milagres, muitos cidadãos outrora devotos começaram a abandonar sua fé em [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Um número crescente agora se descreve não como católico, mas como nada." #deepl:1323000478
 pius.116.f: "Ela não vem mais. Nem em sonhos, nem em visões. As velas ficam apagadas.' O santuário está fechado. O sacerdote se foi. Os campos estão silenciosos.\nHouve um tempo em que até mesmo os mais pobres sussurravam Ave Marias antes de dormir, quando os ícones ficavam pendurados ao lado das lareiras e as lágrimas caíam ao som dos sinos. Agora, as igrejas estão vazias. As crianças perguntam o que era "confissão". Os jovens falam de Razão, de Progresso, de Nada.\nAs pessoas não se voltaram para a ideologia. Elas se voltaram para as cinzas. Elas não são radicais. Elas estão exaustas. E em algum lugar no silêncio oco, a pergunta persiste:\nEla nos deixou - ou nós a deixamos?" #deepl:231766477
 pius.116.g: "A Era da Fé já passou." #deepl:146424195
 pius.116.t: "O silêncio além do sino" #deepl:2179217507
 pius.119.d: "O recém-criado governo ateu ordenou o fechamento do local de peregrinação mariana. O que antes era um lugar de luz e oração agora está isolado e silencioso sob a vigilância do Estado." #deepl:1939840262
 pius.119.f: "'Nenhum sino tocou. Nenhuma vela queimava. Os portões foram trancados antes do nascer do sol.'\n\nO santuário que antes atraía milhares de pessoas agora está sozinho. Um aviso foi pregado na porta da capela: 'Por ordem da Assembleia Popular, esta estrutura foi declarada não essencial'. Guardas vigiam, não para proteger, mas para impedir.\nNenhuma força foi usada. Nenhum protesto foi permitido. A mudança ocorreu de forma silenciosa e burocrática - uma ausência em vez de uma explosão. No entanto, nos lares de todo o país, as mãos dos mais velhos tremem. As avós escondem seus rosários. As crianças perguntam por que os peregrinos não cantam mais.\nO clero está em silêncio. O Partido fala de ciência, razão e progresso. E em algum lugar atrás de portas trancadas, uma pergunta tremula como uma vela meio apagada: Isso era realmente necessário?" #deepl:3255413028
 pius.119.g: "Não construímos mais monumentos para ilusões." #deepl:702720701
 pius.119.t: "Fechamento do Santuário" #deepl:589514149
 pius.121.d: "A aparição mariana em [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] foi oficialmente reconhecida como um sinal positivo. Mas, mesmo agora, seu verdadeiro significado continua aberto à interpretação." #deepl:181746716
 pius.121.f: "Nas semanas que se seguiram desde que a figura radiante apareceu aos aldeões, não houve mais sinais. Nenhum fogo do céu. Nenhuma voz nas nuvens. Apenas céus calmos e o eco persistente de admiração.\nMas as pessoas falam - de paz, de cura, de algo que mudou na alma da nação. Os peregrinos não vêm em frenesi, mas em reverência. O clero prega com suavidade. A imprensa, pela primeira vez, faz reportagens sem zombaria: O que significa esse milagre?" #deepl:3589438214
 pius.121.g: "Uma bênção para as pessoas comuns." #deepl:560950828
 pius.121.h: "Um sinal divino para nosso clero." #deepl:2114621818
 pius.121.h_tt: "Essa medida pode ter consequências graves e desconhecidas." #deepl:1123613034
 pius.121.i: "Uma indicação da legitimidade de nosso governo." #deepl:1976662076
 pius.121.t: "O que ela quer dizer com isso?" #deepl:1525290236
 pius.122.d: "O local da aparição mariana agora se tornou um lugar de peregrinação totalmente reconhecido, atraindo fiéis de perto e de longe em um número cada vez maior." #deepl:3557311135
 pius.122.f: "'Onde antes havia apenas pasto, agora há velas, rosas e os passos silenciosos de milhares. Os campos foram desmatados. Uma modesta capela se ergue perto do local onde as crianças falavam de uma Senhora vestida de luz. Todos os dias, chegam peregrinos: fazendeiros com seus filhos, viúvas de preto, soldados em licença, mães sussurrando orações por seus filhos que ainda não nasceram.\nA Igreja reconheceu a sacralidade do local. Um santuário está sendo construído. Mercados florescem em suas bordas, oferecendo pão, medalhas, rosários e vinho. O que antes era uma história duvidosa nas salas de estar agora é uma presença sentida nos ossos da nação.\nE enquanto os sinos tocam no vale, alguém se pergunta: Essa fé renasceu ou é uma semente de algo maior que ainda está por vir?" #deepl:307938956
 pius.122.g: "Totus tuus." #deepl:314650754
 pius.122.t: "O Santuário de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:3872076082
