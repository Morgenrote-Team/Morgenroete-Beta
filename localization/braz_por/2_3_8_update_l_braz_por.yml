 MR_FIFA_BUTTON_TT: "#T Encontrado em FIFA#!\nCom o aumento do número de partidas entre nações à medida que o futebol se expandia, surgiu a necessidade de um órgão de governança global. A FIFA (em francês: Fédération Internationale de Football Association) é um órgão internacional autorregulador do futebol de associação, futsal e futebol de areia. É uma das maiores e mais antigas ONGs do mundo, tendo sido fundada em 21 de maio de 1904. A fundação da FIFA permite a realização de partidas internacionais entre nações individuais, cujos técnicos podem se aperfeiçoar vencendo partidas. Isso acabará levando ao estabelecimento de uma Copa do Mundo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3292557058
