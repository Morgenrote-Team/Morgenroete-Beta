 concept_verrier_venus_transit: "Trânsito de Vênus" #deepl:3328636769
 concept_verrier_venus_transit_desc: "O trânsito de Vênus refere-se à rara ocorrência da passagem da lua entre a Terra e Vênus. Entretanto, ele ocorreu duas vezes no século XIX: em 1874 e 1882. Como as observações do trânsito de Vênus permitem tirar conclusões sobre o tamanho do sistema solar e uma determinação mais precisa do tamanho da unidade astronômica (UA), esses foram eventos científicos importantes. Os países localizados no site [concept_verrier_venus_transit_zone] podem observar o evento de lá; outros países precisam enviar expedições. O sucesso da observação depende da experiência do [concept_verrier_astronomer], da disponibilidade de um [concept_gaudi_engineer] e de um pouco de sorte: às vezes, o clima pode impedir uma boa imagem. Quanto melhor for a observação, maior será o bônus." #deepl:1890935103
 concept_verrier_venus_transit_zone: "Zona de trânsito de Vênus" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "A Zona de Trânsito de Vênus refere-se à parte da Terra a partir da qual um trânsito completo (não apenas parcial) de Vênus pode ser observado. Em 1874, isso foi particularmente verdadeiro para a região Leste da Ásia-Pacífico e, em 1882, para quase todo o continente americano. Uma análise detalhada das regiões estratégicas é fornecida abaixo.\n\n#V Trânsito de Vênus em 1874:#!\nIndonésia, Indochina, Oceania, Sul da China, Norte da China, Manchúria, Japão, Índia Central, Madras, Bengala, Himalaia; também, o Estado do Território do Oceano Índico.\n\n#V Trânsito de Vênus em 1882:#!\nBrasil, La Plata, Andes, Gran Columbia, México, América Central, Caribe, Centro-Oeste, Dixie, Nova Inglaterra; também os estados de Ontário e Quebec." #deepl:1055797749
 concept_vikelas_coach: "Treinador" #deepl:3572285288
 concept_vikelas_coach_desc: "Os técnicos são os treinadores nacionais de um país em um esporte nacional específico. Os esportes nacionais incluem [concept_vikelas_football], beisebol, basquete e críquete. Os técnicos fornecem bônus para a respectiva equipe em competições, seja em campeonatos mundiais internacionais ou em partidas internacionais. Essas últimas são disputadas secretamente em intervalos regulares e aumentam o valor de experiência do técnico após a vitória. Pontos de experiência altos e [Concept('concept_character_trait','$concept_character_traits$')] positivo aumentam a chance de vencer um Campeonato Mundial. As características positivas são aquelas que motivam particularmente os jogadores - como ambiciosos ou carismáticos - enquanto as características desmotivadoras reduzem a chance de vencer uma partida. Essas características incluem traços como impiedoso ou cruel.\n\n#R OBSERVAÇÃO: no momento, apenas o futebol está integrado.#!" #deepl:183600896
 concept_vikelas_coaches: "Treinadores" #deepl:3998480532
 concept_vikelas_football: "Futebol" #deepl:3334413449
 concept_vikelas_football_desc: "O futebol é um possível esporte nacional. Os primeiros clubes de futebol podem ser estabelecidos na Europa e na América do Sul; isso exigirá um sistema jurídico relativamente liberal, uma pequena burguesia forte ou um padrão de vida médio considerável. Depois disso, poderão ser disputadas partidas de futebol ocasionais. Com a criação da FIFA, os jogos internacionais e a Copa do Mundo também se tornaram possíveis. As oito melhores equipes se classificam automaticamente para a Copa do Mundo. As equipes são calculadas de acordo com o Valor da Equipe Nacional de Futebol (NFTV), que é derivado dos parâmetros de padrão de vida (aptidão da população), força da pequena burguesia (sistema de clubes), alfabetização (táticas) e tradição (esporte nacional: sim ou não?). Nas partidas, não apenas o NFTV é levado em conta, mas também os traços de caráter e a experiência do [concept_vikelas_coach]." #deepl:3000477120
 country_artists_decorative_can_promote_architect_boolean_desc: "Se você tiver pelo menos um [GetBuildingType('building_arts_academy').GetName] com o [concept_pm_artists_academy_school], poderá promover um [concept_gaudi_architect] na Visão Geral dos Artistas." #deepl:738833409
