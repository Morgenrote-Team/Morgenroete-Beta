 ACHIEVEMENT_gaudi_kulturnation: "Cultura"
 ACHIEVEMENT_DESC_gaudi_kulturnation: "Como nação alemã, complete a Catedral de Colônia, descubra Netuno, funde o Allgemeine Deutscher Musikverein, crie o Festival Richard Wagner, transporte o Portão de Ishtar para a Alemanha e faça da sua capital o berço do Expressionismo. Você também precisa de um maestro ativo e de um arqueólogo famoso e ativo."
 ACHIEVEMENT_gaudi_segundo_siglo_de_oro: "Segundo Século de Ouro"
 ACHIEVEMENT_DESC_gaudi_segundo_siglo_de_oro: "Traga a Espanha de volta às fileiras das grandes nações culturais: descubra Plutão, faça uma grande descoberta arqueológica, faça da sua capital o berço da Art Nouveau e complete a Sagrada Família! Você deve contratar pelo menos um Grande Compositor para sua campanha."
