 je_gaudi_custom_monument_blueprint_research: "Obra-prima do arquiteto"
 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] enjoys worldwide renown as one of the most important architects of [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] time. To immortalize [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] name, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] is working on a blueprint for an outstanding monument that will make our nation shine throughout the world as a center of architectural art."
 gaudi.81.t: "Obra-prima de arquitetos"
 gaudi.81.d: "Nos últimos anos, [THIS.GetCountry.GetName] se tornou uma das nações líderes no campo da arquitetura. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] desempenhou um papel significativo nesse desenvolvimento. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] aceitou a incumbência de projetar um monumento que rivalizasse com as grandes maravilhas das eras antiga, medieval e moderna."
 gaudi.81.f: "The Architect's Monument is based on the preferred style of the Great Architect:\n\nArt Deco Architects will design the [GetBuildingType('building_gaudi_people_monument').GetName].\nBauhaus Architects will offer the [GetBuildingType('building_gaudi_people_forum').GetName].\nNeoclassical Architects will create the [GetBuildingType('building_gaudi_people_palace').GetName]."
 gaudi.81.g: "Magnificent."
 ACHIEVEMENT_gaudi_stalin: "Stalin está verde de inveja"
 ACHIEVEMENT_DESC_gaudi_stalin: "Possuir o Palácio do Povo como uma república de conselhos com economia de comando."
 gaudi.82.t: "O trabalho da vida de um arquiteto"
 gaudi.82.d: "Após meses de preparação, o site [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] apresentou planos, cálculos, estatísticas e um modelo feito à mão. O ambicioso monumento [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] já é considerado um sonho de arte arquitetônica. A única pergunta que resta é: quem tornará esse sonho realidade?"
 gaudi.82.f: "Amanhã faremos coisas bonitas. -Antoni Gaudí"
 gaudi.82.g: "Um monumento a nós mesmos."
