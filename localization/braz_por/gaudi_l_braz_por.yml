 gaudi.1201.t: "Locomotivas Modernas"
 gaudi.1201.t_general: "Ferrovia Ocidental e Atlântica #3 \"Geral\""
 gaudi.1201.t_forney: "\"Forney\" 0-4-4T"
 gaudi.1201.t_e6: "Classe E6 \"Atlântico\""
 gaudi.1201.t_m_1000: "M-10000"
 gaudi.1201.t_gg1: "Classe GG1"
 gaudi.1201.t_kkstb_30: "kkStB-Reihe 30"
 gaudi.1201.t_fs_class_670: "Classe FS 670"
 gaudi.1201.d: "Finally the Locomotives built by our [concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] are finally on the tracks of the [GetPlayer.GetAdjectiveNoFormatting] rail network!. We will surely see new speed records from them!."
 gaudi.1201.f: "\"Basta olhar para esta maravilha da engenharia! É fantástico, não é?\""
 gaudi.1201.f_general: "A configuração 4-4-0 já provou ser ótima. O \"General” e sua espécie certamente se tornarão os burros de carga da América!"
 gaudi.1201.f_forney: "A Forney é uma ótima locomotiva para áreas urbanas, pois seu pequeno tamanho significa que ela aguenta as curvas fechadas de uma ferrovia urbana."
 gaudi.1201.f_e6: "A Classe E6 \"Atlantic” é uma locomotiva a vapor rápida que oferece um percurso tranquilo aos seus passageiros. Será utilizado nas principais linhas de passageiros."
 gaudi.1201.f_m_1000: "A M-10000 é uma locomotiva gás-elétrica simplificada. Pode atingir altas velocidades e é a locomotiva ideal para rotas expressas."
 gaudi.1201.f_gg1: "A Classe GG1 é uma locomotiva elétrica simplificada que pode puxar trens em velocidades impressionantes. Certamente esta locomotiva terá uma longa carreira!"
 gaudi.1201.f_kkstb_30: "O kkStB-Reihe 30 é um excelente trem suburbano, pois possui um processo de combustão particularmente livre de vapor e fumaça."
 gaudi.1201.f_fs_class_670: "A FS Classe 670 possui design icônico, basicamente invertendo a ordem normal de uma locomotiva. A cabine é colocada na frente da locomotiva permitindo ao maquinista uma visão perfeita."
 gaudi.1201.g: "Uma maravilha da Engenharia!"
 je_gaudi_modernizing_industries_project: "Modernizando Métodos de Produção"
 gaudi_engineer_focus_building: "Foco em Engenharia"
 gaudi.1211.f: "\"Veja, esta nova máquina significa que preciso de três trabalhadores a menos. Então agora eles podem trabalhar em outras três máquinas e tudo se tornará muito mais lucrativo. Poderei comprar um novo iate!\""
 gaudi.1211.g: "Nossos lucros dispararão!"
