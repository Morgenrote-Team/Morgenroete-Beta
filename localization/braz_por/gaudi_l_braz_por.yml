 je_gaudi_neuschwanstein_phase_1: "Neuschwanstein: o sonho do rei"
 je_gaudi_neuschwanstein_phase_1_reason: "Neuschwanstein é considerado o principal exemplo do historicismo e do romantismo alemão. O castelo de conto de fadas, que mais tarde seria visto por muitos como o castelo \"ideal” por si só, foi projetado pelo rei da Baviera, Ludwig II. Embora não fosse incomum no século XIX os monarcas terem castelos medievais construídos num estilo magnífico, Neuschwanstein deveria servir de exemplo a superar e tornar-se um marco não só da Baviera, mas de todo o mundo de língua alemã."
 je_gaudi_neuschwanstein_phase_1_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_neuschwanstein_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_neuschwanstein_phase_2: "Neuschwanstein: um castelo de conto de fadas"
 je_gaudi_neuschwanstein_phase_2_reason: "Desde o início, Neuschwanstein não se destinava à representação ou ao público, mas sim a um retiro privado do rei. Baseou o seu trabalho nos mitos cristãos medievais, mas sobretudo nas óperas de Richward Wagner, a quem apoiava financeiramente e admirava. As ideias sempre novas do rei e seu desejo de construir um palco de ópera de pedra para a eternidade com Neuschwanstein atrasaram significativamente a construção e levaram Ludwig II à beira da ruína."
 je_gaudi_neuschwanstein_phase_2_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_neuschwanstein_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
