 gaudi_radio_mania_modifier: "Rádio Mania"
 gaudi.1002.d: "[SCOPE.sCharacter('gaudi_new_architect_scope').GetFullName] terminou a construção dos Pavellons Güell, uma extensão duma finca no estilo do Modernismo, do qual [SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName] é o principal representativo."
 gaudi.1002.f: "O Portão de Ferro dos Pavellons Güell era coroado por um dragão de ferro com olhos de vidro. Todos os edifícios foram projetados no estilo de Modernisme e foram orientados para um Design Orientalista.\n\n[SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName] foi o representante mais importante do estilo catalão de Modernisme. Modernisme pode ser visto como uma expressão catalã de Art Nouveau e é caracterizado por materiais e técnicas tradicionais da Catalunha. 'Naturalidade' e 'Movimento' são os termos mais importantes para descrever Modernisme. Isso é bem visível, por exemplo, no Parc Güell, que é caracterizado por formas arredondadas e inspirado por plantas e outras formas e formatos naturais."
 gaudi.1002.h: "Gaudí possui um grande futuro pela frente!"
 gaudi_bauhaus_modifier: "Arquitetura Bauhaus"
 gaudi.21.t: "Um Engenheiro Retorna"
 gaudi.21.d: "Após dois anos no exterior, nosso arquiteto retorna — não só com esboços, mas com uma nova disciplina."
 gaudi.21.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] partiu como desenhista. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] regressa como construtor.\n\nPor dois longos anos, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] viajou pela Europa — pelos vales da Lombardia, para as siderúrgicas de Manchester, sob as pontes de Budapeste. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] estudou não apenas igrejas, mas estações de bombeamento; não apenas capitéis e cornijas, mas casas de caldeiras e docas de guindastes. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] assistiu a palestras em uma politécnica, copiou os cadernos de engenheiros e aprendeu em um canteiro de obras em Lyon que a força não pode ser extraída — ela deve ser compreendida.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] fala com novas palavras agora. De forças de sustentação, estruturas tensionadas e a alma do ferro. Alguns dos antigos colegas de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mal reconhecem [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. No entanto, as mãos de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] permanecem as mesmas — apenas mais firmes agora. E o olhar de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]? Parece atravessar paredes."
 gaudi.21.g: "A arquitetura começa com a pergunta: o que sustenta?"
