 je_gaudi_public_construction_reason: "[ROOT.GetCountry.GetCustom('je_gaudi_public_construction_active_type')]An [concept_gaudi_architect] who is not busy with any other project will work on public construction resulting in additional free #V Construction Points#!.\nAs long as no other project is active, you will gain the Modifier. Additionally, your Architect will gain #V Reputation#! each year.\n\nAn Architect with the #V $gaudi_art_deco_style$#!, #V $gaudi_bauhaus_style$#! or #V $gaudi_neoclassical_style$#! trait provides your country with #p +30#! $country_construction_add$ while distributing to public construction.\nAn Architect with the #V $gaudi_historicism_style$#! trait provides your country with #p +20#! $country_construction_add$ while distributing to public construction.\nAn Architect with the #V $gaudi_traditional_style$#! trait provides your country with #p +10#! $country_construction_add$ while distributing to public construction.\n\nAdditionally, an Architect with the #V $gaudi_great_architect$#! trait provides your country with #p +20#! $country_construction_add$ while distributing to public construction."
