 je_gaudi_construction_sector_project_reason: "Your [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] started a project to modernize the [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches #V 12 Points#! the current building will receive a new modifier. Once all chosen buildings for this project have the modifiers, the project ends.\n\nThere is a total number of 3 modifiers. Each new modifier needs the progress to fill up again.\n$mr_divider_for_je$\nCurrent Building: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_tesla_improve_construction_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_tesla_improve_construction_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_tesla_improve_construction_project_modifier_3_type')]\n\nTotal Remaining Buildings (excluding current): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [GetPlayer.MakeScope.ScriptValue('tesla_monthly_civil_engineering_progress_value')|+2] #!#!"
 gaudi.1151.t: "Modern Construction Methods"
 gaudi.1151.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has completed the project to modernize our [GetBuildingType('building_construction_sector').GetName]. Now that our construction processes are more efficient then ever, we should be able to finish constructions way faster!.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_construction_buildings_var').GetValue|V0]"
 je_gaudi_modernizing_industries_project_reason: "Your [concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] focuses on modernizing the production methods of the [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches #V 24 Points#! the building will receive a new modifier.\n$mr_divider_for_je$\nCurrent Building: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_tesla_improve_industries_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_tesla_improve_industries_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_tesla_improve_industries_project_modifier_3_type')]\n\nTotal Remaining Buildings (excluding current): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.ScriptValue('tesla_monthly_mechanical_engineering_progress_value')|+2] #!#!"
 je_gaudi_civil_airports_project_reason: "Your [concept_tesla_aeronautical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] is working on modernizing the [JournalEntry.GetTarget.GetBuilding.GetName] in [JournalEntry.GetTarget.GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches [JournalEntry.GetTotalGoalValue|V0] the building will receive a new modifier.\nThere is a total number of 3 modifiers to gain. Each new modifier needs the progress to fill up again.\n$mr_divider_for_je$\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_aeronautical_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_aeronautical_engineering_progress_var').GetValue|2+] #!#!"
