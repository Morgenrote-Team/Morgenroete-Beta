 gaudi.1301.t: "Novos rifles inventados"
 gaudi.1301.d: "Our [concept_tesla_military_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has worked for years to develop a new rifle for our army. Now it is finally ready to be deployed to our soldiers!"
 gaudi.1301.f: "\"É uma arma muito inovadora que nos dará uma grande vantagem contra nossos inimigos! Estou bastante confiante de que ela pode atirar mais rápido, mais longe e com mais precisão do que qualquer outra arma em uso!\""
 gaudi.1301.g: "Uma arma fascinante. Eu deveria experimentar imediatamente!"
