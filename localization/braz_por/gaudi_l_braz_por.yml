 gaudi.1409.d: "Our [concept_tesla_engineer] Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] has discovered a new lead deposit in [SCOPE.sState('gaudi_deposit_state').GetName] using the most modern geophysical methods."
 gaudi.1407.f: "É possível descobrir um depósito especial com um engenheiro três vezes ao longo de cada jogo, nomeadamente para ferro, chumbo e petróleo. Isto também requer um certo conhecimento geomagnético que só se acumula ao longo dos anos. Portanto, é aconselhável iniciar as investigações geomagnéticas o mais cedo possível."
