 je_gaudi_capital_expansion_project: "Expansão de capital"
 je_gaudi_capital_expansion_project_reason: "Entre 1836 e 1936, as capitais vitorianas passaram por profundas transformações urbanas. Paris foi remodelada pelos amplos bulevares e vistas axiais de Haussmann. Viena demoliu suas muralhas em 1857, substituindo-as pela grande Ringstraße. Berlim expandiu-se rapidamente com blocos de cortiços, bairros industriais e, mais tarde, conjuntos habitacionais modernistas. Londres se espalhou pelos subúrbios ferroviários, projetos de infraestrutura e o primeiro metrô do mundo. Em todo o continente europeu, as cidades reais evoluíram para metrópoles modernas, monumentos de poder, ambição e crescentes tensões sociais."
 gaudi.41.t: "Uma cidade sem limites"
 gaudi.41.d: "As velhas paredes são derrubadas. Em seu lugar, ar, luz e a promessa de crescimento."
 gaudi.41.f: "Durante séculos, [ROOT.GetCountry.GetCapital.GetCityHubName] foi uma cidade murada: orgulhosa, compacta e fechada em si mesma. Mas agora, a alvenaria é reduzida a picareta e pó.\n\nAs fortificações medievais foram demolidas. Em seu lugar, surgem amplas avenidas, ladeadas por árvores e fachadas nobres. Carroças de mercado e casais passeando agora pisam onde antes marchavam os guardas. Os bulevares são mais do que estradas - são declarações: de confiança, de expansão, de um futuro grande demais para ser contido.\n\nAlguns lamentam a perda dos antigos portões. Mas o site [ROOT.GetCountry.GetCapital.GetCityHubName] finalmente respirou fundo pela primeira vez."
 gaudi.41.g: "Construímos para fora - com visão e vigor"
 gaudi.42.t: "O Anel do Progresso"
 gaudi.42.d: "Um novo anel de avenidas une a cidade e o estado."
 gaudi.42.f: "Onde antes havia aterros lamacentos, agora há pedra e ferro. A grande avenida se curva como um colar ao redor do coração de [ROOT.GetCountry.GetCapital.GetCityHubName], unindo seus distritos em movimento e luz.\n\nNão foi uma mera obra viária. Quarteirões inteiros foram redesenhados, parques esculpidos, monumentos emoldurados em perspectiva perfeita. Os lampiões a gás florescem ao anoitecer como estrelas ordenadas. A cada metro pavimentado, [ROOT.GetCountry.GetCapital.GetCityHubName] se torna mais legível - mais imperial.\n\nOs funcionários falam de \"harmonia urbana\". E as pessoas? Elas passeiam - olhando para estátuas que nunca viram antes, em ruas que antes tinham medo de andar."
 gaudi.42.g: "Um anel não de defesa, mas de direção."
 gaudi.43.t: "Avenidas de autoridade"
 gaudi.43.d: "O novo prefeito reformula o site [ROOT.GetCountry.GetCapital.GetCityHubName]- um eixo de cada vez. Amplo, reto e totalmente intransigente."
 gaudi.43.f: "Isso não é expansão. É cirurgia.\n\nBairros inteiros caem sob o compasso e o plano. As ruas são esculpidas como bulevares através de bairros que antes eram como lagos. Os antigos becos desaparecem. Em seu lugar surgem linhas - longas, retas e sempre levando a um monumento, a um quartel ou a um ministério.\n\nA resistência aumenta, mas as licenças são assinadas, as casas desapropriadas e as fachadas alinhadas. [ROOT.GetCountry.GetCapital.GetCityHubName] agora fala a linguagem da ordem: visibilidade, circulação, controle. Por trás da grandiosidade está a intenção.\n\nOs pobres chamam isso de \"A limpeza\". Os funcionários o chamam de \"modernização\". O prefeito o chama de necessário."
 gaudi.43.g: "Que ninguém escape do plano"
 gaudi.44.t: "O Horizonte Metropolitano"
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] não é mais apenas uma capital. Ela está se tornando o mundo em miniatura."
 gaudi.44.f: "A cidade antiga tinha bordas. Esta não tem nenhuma.\n\nAço e vidro perfuram onde antes predominava a pedra. As linhas de trem se cruzam sob os jardins públicos. Luzes elétricas borram as linhas entre o anoitecer e o amanhecer. Embaixadas, bancos, galerias e cafés florescem como orquídeas no conservatório de ferro de uma nova era.\n\nLínguas estrangeiras ecoam nas arcadas. Os arranha-céus desafiam as catedrais. [ROOT.GetCountry.GetCapital.GetCityHubName] não pede mais permissão para crescer - espera liderar. De cada distrito, emerge uma única verdade: esta não é mais uma cidade de uma nação. É uma cidade de nações."
 gaudi.44.g: "Nós nos levantamos, porque o mundo já está assistindo."
 gaudi_capital_expansion_project_progress_bar: "Expansão de capital"
 gaudi_capital_expansion_project_progress_bar_desc: "Expansão de capital: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%] #! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)"
 gaudi.511.d: "Quando se tratou de embelezar o site [ROOT.GetCountry.GetCapital.GetCityHubName], houve uma discordância no planejamento urbano."
 gaudi.512.t: "Estátuas no anel viário"
 gaudi.512.d: "Um novo grupo de figuras será erguido no novo anel viário de [ROOT.GetCountry.GetCapital.GetCityHubName], mas não está claro qual figura mitológica terá um lugar especial."
 gaudi.513.f: "Um novo ministério deveria ser construído como o carro-chefe do governo, mas as constantes mudanças de plano, a expansão e a corrupção latente fizeram com que a construção do prédio se arrastasse e todos os fundos fossem usados até a conclusão. O edifício inacabado poderia ser colocado em um estado funcional com algumas medidas temporárias, mas isso provavelmente não é do interesse do governo, que teria que se contentar com escritórios menores e menos conforto do que o esperado. É possível construir mais, mas provavelmente será caro."
 gaudi.511.t: "Fonte ou pavilhão?"
 gaudi.511.f: "Poderíamos confundi-lo com uma briga sobre a barba do imperador: uma disputa política tangível se desenvolveu a partir de uma pequena questão. Trata-se de um projeto de construção em uma praça representativa de alto valor estético. Uma facção gostaria de construir ali um pavilhão para descansar, a outra defende a construção de uma fonte. Como há apenas um lote, somente um dos projetos pode ser construído; um acordo é inviável."
 gaudi.511.g: "Construímos o pavilhão."
 gaudi.511.h: "Nós construímos a fonte."
 gaudi.511.i: "Tenho meus próprios planos para este lugar..."
 gaudi.512.f: "Ao planejar o anel viário, alguns detalhes ainda não estão claros. Ainda não foi determinado quais figuras devem ser colocadas em uma posição de destaque. Está claro que devem ser figuras do panteão romano. Certos setores da população se identificam com as respectivas figuras - por exemplo, os capitalistas sugeriram colocar Mercúrio, o deus do comércio, no centro. Os aristocratas, por outro lado, insistem em Júpiter, o pai dos deuses. Os militares preferem Marte, e os acadêmicos querem Apolo no centro."
 gaudi.512.g: "Júpiter."
 gaudi.512.h: "Mercúrio."
 gaudi.512.i: "Apollo."
 gaudi.512.j: "Marte."
 gaudi.513.t: "O prédio do ministério excede o custo"
 gaudi.513.d: "A construção de um novo prédio do ministério está se transformando em um pequeno escândalo."
 gaudi.513.g: "Havia um orçamento e esse orçamento deve ser cumprido."
 gaudi.513.h: "Isso é lamentável, mas é comum nesse campo."
 gaudi.513.i: "Esse projeto deve receber todo o dinheiro e tempo que precisar."
 gaudi.514.t: "Nova cafeteria"
 gaudi.514.d: "Uma nova cafeteria foi inaugurada na Ringstrasse."
 gaudi.514.f: "A cafeteria continuou sendo nosso melhor local de educação para tudo o que é novo. Para entender isso, é preciso saber que a cafeteria vienense é uma instituição de um tipo especial que não pode ser comparada a nenhuma instituição semelhante no mundo. Na verdade, é uma espécie de clube democrático, acessível a todos por uma xícara de café barato, onde, por essa pequena taxa, todos os convidados podem sentar-se por horas, discutir, escrever, jogar cartas, receber suas correspondências e, acima de tudo, consumir um número ilimitado de jornais e revistas. Todos os jornais vienenses estavam disponíveis em uma cafeteria vienense melhor, e não apenas os vienenses, mas também os de todo o Reich alemão, francês, inglês, italiano e americano, bem como todas as importantes revistas literárias e artísticas do mundo. Portanto, sabíamos tudo o que estava acontecendo no mundo em primeira mão, ouvíamos sobre cada livro publicado, sobre cada apresentação, onde quer que estivesse ocorrendo, e comparávamos as críticas em todos os jornais. Talvez nada tenha contribuído tanto para a flexibilidade intelectual e a orientação internacional do austríaco quanto o fato de ele ser capaz de se orientar de forma tão abrangente sobre todos os acontecimentos do mundo na cafeteria e, ao mesmo tempo, discuti-los em círculos amigáveis. Sentávamos lá por horas todos os dias e não perdíamos nada\". - Stefan Zweig"
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] deve visitá-la."
 gaudi.514.h: "Isso elevará o padrão de vida em Viena."
 gaudi.515.t: "Palais do anel viário"
 gaudi.515.d: "Um nobre se excedeu na construção de um palácio no novo distrito da cidade de [ROOT.GetCountry.GetCapital.GetCityHubName]. A ruína do edifício semiacabado ameaça se tornar uma monstruosidade."
 gaudi.515.f: "Ring Road Palace é o termo usado para designar os magníficos palácios da Ringstrasse de Viena. Esses edifícios foram construídos principalmente pela antiga nobreza ou por banqueiros e industriais no final do século XIX. Os palácios foram construídos em uma mistura de estilo neobarroco e neorrenascentista, ou neo-maneirismo. Eles também eram um símbolo de ascensão e status. No entanto, um dos construtores recentemente se excedeu e está enfrentando a falência. As pessoas já estão zombando da situação desagradável que, na pior das hipóteses, terá de ser demolida novamente, prolongando assim a conclusão de todo o projeto."
 gaudi.515.g: "Compartilhamos os custos."
 gaudi.515.h: "Isso não é da nossa conta."
 gaudi.516.t: "Extensão de capital: Bom progresso"
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] declarou que a extensão de capital poderia ser concluída antes."
 gaudi.516.f: "Por razões desconhecidas, tudo está progredindo mais rapidamente: pode ser o amor pela pátria, os altos salários, o apoio amigável das elites locais ou simplesmente o clima melhor."
 gaudi.516.g: "Maravilhoso."
 gaudi.517.t: "Extensão de capital: Progresso lento"
 gaudi.517.d: "Infelizmente, a gerência de construção do site [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] teve que admitir hoje que a construção de um novo distrito em [ROOT.GetCountry.GetCapital.GetCityHubName] está atrasada."
 gaudi.517.f: "Por razões desconhecidas, tudo está progredindo mais lentamente: seja por agitação de elementos políticos hostis, enfraquecimento da ética de trabalho pelos sindicatos, uma conspiração dos Illuminati ou simplesmente mau tempo."
 gaudi.517.g: "Lamentável."
 gaudi.518.t: "Monumento a [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]"
 gaudi.518.d: "Um novo monumento está sendo planejado para a Ringstrasse: trata-se de uma estátua do nosso rei [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]."
 gaudi.518.f: "A Ringstrasse serviu para ilustrar a história austríaca. Por um lado, a longa linha de monarcas da família governante dos Habsburgos foi imortalizada, sendo que Maria Teresa recebeu o monumento mais opulento. Mas também generais como Eugen von Savoyen ou Schwarzberg enriqueceram a paisagem urbana vienense. A burguesia, por sua vez, deu grande importância à imortalização de seus expoentes, como os príncipes poetas Goethe e Schiller, mas também os grandes compositores Schubert, Mozart e Beethoven."
 gaudi.518.g: "É bom ser o [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]."
 gaudi.518.h: "Adorável - mas, em vez disso, concentre-se em completar a Ringstrasse."
 gaudi.519.t: "Fogo!"
 gaudi.519.d: "Um incêndio devastador destruiu vários edifícios em um canteiro de obras em [ROOT.GetCountry.GetCapital.GetCityHubName]."
 gaudi.519.f: "A catástrofe mais conhecida no anel viário foi o incêndio do Ringtheater em 8 de dezembro de 1881. Essa é uma das maiores catástrofes de incêndio do século XIX. As estimativas variam de centenas a mais de mil vítimas. A causa foi uma falha na iluminação a gás, o que fez com que o gás escapasse e explodisse na próxima vez que se tentou acendê-lo. O incêndio resultante se espalhou para os bastidores do teatro e para o palco. O fogo resultante se espalhou para os trens do cenário antes de se espalhar rapidamente para o resto do palco e, por fim, para o auditório. O incêndio teve efeitos nacionais e internacionais na proteção preventiva contra incêndios, especialmente na área do teatro e nas disposições legais correspondentes para a construção de teatros na Áustria. O compositor Anton Bruckner, que tinha ingressos para a apresentação da noite, escapou da morte apenas por ter ficado em casa, pois não estava bem."
 gaudi.519.g: "Um dia terrível."
 gaudi.520.t: "Preconceitos contra a expansão da cidade"
 gaudi.520.d: "Os representantes da população rural veem o desenvolvimento do site [ROOT.GetCountry.GetCapital.GetCityHubName] como uma desvantagem para a população rural comum."
 gaudi.520.f: "'O governo deixa claro, com sua arrogância indescritível na capital, que é formado por moradores distantes da cidade que só pensam em algumas ruas e nunca saíram de [ROOT.GetCountry.GetCapital.GetCityHubName]. São desperdiçadas somas enormes que só chegam à capital, mas que as pessoas comuns do interior, nas pequenas cidades ou vilarejos, não percebem. A ideologia por trás dele favorece o centralismo, favorece a burocracia, favorece e auxilia o aparato estatal; mas que perspectiva esse projeto decadente oferece ao homem comum?"
 gaudi.520.g: "Que tal um presente amigável para o benefício da população rural que trabalha duro?"
 gaudi.520.h: "Cidade e província são iguais."
 gaudi.520.i: "Quem se importa com essa conversa estúpida de fazendeiro?"
 gaudi.521.t: "Residência Industrial"
 gaudi.521.d: "Um rico empresário mandou construir um novo palácio e, assim, enriqueceu o site [ROOT.GetCountry.GetCapital.GetCityHubName] com um grande edifício."
 gaudi.521.f: "Os palácios de industriais e banqueiros eram vistos como uma forma de enfatizar sua nova posição no Estado. Também era possível para os ricos de origem judaica enfatizar sua emancipação. O desenvolvimento de Viena no século XIX é um bom exemplo disso. Um dos palácios mais famosos do anel viário é o Palais Epstein. Ele foi construído para o industrial e banqueiro Gustav Ritter von Epstein. O arquiteto foi Theophil Freiherr von Hansen, que também projetou o edifício adjacente do Parlamento Austríaco. Ele tem até cinco andares e foi construído no estilo neorrenascentista típico de sua época."
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] está crescendo e prosperando."
 gaudi.522.t: "Ampliação do quartel"
 gaudi.522.d: "A expansão do site [ROOT.GetCountry.GetCapital.GetCityHubName] oferece a oportunidade de modernizar e expandir os quartéis."
 gaudi.522.f: "O Franz-Josephs-Barracks era um prédio de quartel vienense na atual área da Ringstrasse e, por muito tempo, um obstáculo à construção do projeto de grande escala. O quartel recebeu o nome do imperador Franz Joseph I e foi construído entre 1854 e 1857, após a revolução de 1848. Pouco depois de sua construção, o quartel atrapalhou o desenvolvimento da Vienna Ringstrasse, que começou em 1857, mas foram necessárias quatro décadas para que o exército se mudasse novamente. Portanto, novos quartéis tiveram que ser construídos com antecedência para absorver a perda do quartel Franz Joseph."
 gaudi.522.g: "Ampliar o quartel."
 gaudi.522.h: "É melhor investir o tempo em outro lugar."
 gaudi.523.t: "Ampliação do setor de construção"
 gaudi.523.d: "A expansão do site [ROOT.GetCountry.GetCapital.GetCityHubName] oferece a oportunidade de expandir o setor de construção. "
 gaudi.523.f: "Geralmente chamamos de natureza artística a soma das qualidades que impedem o artista de produzir. - Arthur Schnitzler"
 gaudi.523.g: "Ampliar o escritório de construção."
 gaudi.524.t: "Um parque maravilhoso"
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]O novo parque da empresa está concluído e agora está aberto a todos os cidadãos para caminhadas."
 gaudi.524.f: "Os portões do novo Stadtpark se abrem. Os gramados rolam como veludo. Os caminhos se curvam entre canteiros de flores e estátuas. Mas o que mais atrai as multidões não é a grama - é o som. Um coreto, uma pequena orquestra, uma valsa flutuando na brisa. A música pública, antes reservada para salões e palácios, agora enche o ar para que todos possam ouvir. Em cidades como Viena, o Kursalon havia se tornado um templo cívico da melodia. O magnífico edifício no estilo da Renascença italiana está localizado na Johannesgasse e tem um amplo terraço no parque. Na época dos irmãos Strauss, o Kursalon era um local popular para danças e concertos."
 gaudi.524.g: "Vamos dar uma volta."
 gaudi.524.h: "Vamos comemorar com um show!"
 gaudi.525.t: "Estendendo a ópera"
 gaudi.525.d: "A expansão do site [ROOT.GetCountry.GetCapital.GetCityHubName] oferece a oportunidade de modernizar e expandir a ópera."
 gaudi.525.f: "Em meio a bulevares e arcadas, fontes e ministérios, a casa de ópera existente começa a parecer modesta, até mesmo provinciana. A proposta: uma nova estrutura ou uma grande expansão. Mais assentos, melhor acústica, fachadas monumentais. Um templo da cultura à altura da estatura da cidade. Em toda a Europa, esses gestos se tornaram símbolos de prestígio nacional. Em Paris, a Opéra Garnier se ergue com escadarias de mármore e tetos dourados. Em Viena, a Staatsoper, inaugurada em 1869, ancora a Ringstraße com elegância e orgulho."
 gaudi.525.g: "Ampliar a casa de ópera."
 gaudi.526.t: "Ampliação do Town Hall"
 gaudi.526.d: "A expansão do site [ROOT.GetCountry.GetCapital.GetCityHubName] oferece a oportunidade de modernizar e ampliar o Town Hall."
 gaudi.526.f: "A antiga prefeitura ainda ostenta o brasão de armas de outro século. No interior: escadas estreitas, escritórios superlotados e livros contábeis empilhados mais altos do que o lambril. A mesa do prefeito mal é grande o suficiente para sua papelada, quanto mais para o poder. Agora a proposta: uma nova Prefeitura, que reflita o papel crescente da cidade na governança, na economia e na identidade cívica. Torres imponentes ou classicismo contido - de qualquer forma, ela deve sinalizar autoridade. Em toda a Europa, as cidades aceitaram esse desafio. Em Viena, o Rathaus neogótico (concluído em 1883) tornou-se um símbolo de confiança municipal. Paris restaurou seu Hôtel de Ville após 1871 com grandeza e desafio. O Rotes Rathaus de Berlim surgiu como uma fusão da forma renascentista e da função prussiana."
 gaudi.526.g: "Ampliar a prefeitura."
 gaudi.527.t: "Heldenplatz"
 gaudi.527.d: "Após a conclusão da Heldenplatz (Praça dos Heróis), algumas figuras políticas importantes estão pressionando por uma inauguração condizente."
 gaudi.527.f: "Quando a Ringstrasse foi construída, a \"Burgplatz externa\" foi projetada pelo imperador Franz Joseph como parte do Kaiserforum, que nunca foi concluído. O plano era criar uma praça retangular que seria emoldurada pela Ala Leopoldina, pelo Novo Hofburg, pelas Coleções Habsburgo e por uma contraparte do Novo Castelo, que nunca foi construído no local do Volksgarten. O nome Heldenplatz foi fixado em 1878; ele vem dos dois monumentos equestres, ambos de Anton Dominik Fernkorn. O mais antigo é o do arquiduque Carlos, que foi inaugurado em 1860. Sua contraparte, a estátua equestre do Príncipe Eugênio, também foi concluída em 1865. Após a perda da Primeira Guerra Mundial, o colapso da monarquia dual austro-húngara sob o domínio da dinastia Habsburgo-Lorena e a fundação da primeira república austríaca, a Heldenplatz serviu como ponto de encontro para todos os campos políticos e como local de desfile para o exército austríaco."
 gaudi.527.g: "Realizar um desfile e convidar nossos amigos."
 gaudi.527.h: "Estabelecer um desfile militar permanente para os próximos anos."
 gaudi.527.i: "E quem deve pagar por tudo isso?"
 gaudi.528.t: "Ampliação da universidade"
 gaudi.528.d: "A expansão do site [ROOT.GetCountry.GetCapital.GetCityHubName] oferece a oportunidade de modernizar e expandir a universidade."
 gaudi.528.f: "O que é uma grande cidade sem pensamento? Em meio a linhas de trem, ministérios e teatros, a universidade começa a se desgastar com seu próprio sucesso. Muitos alunos para poucas salas. Departamentos espalhados por prédios alugados. Professores disputando espaço entre bibliotecas e laboratórios. A proposta é clara: um novo campus ou uma grande expansão - salas de aula modernas, faculdades dedicadas, uma biblioteca monumental. Esses projetos são mais do que infraestrutura; são declarações de ambição intelectual. Em Viena, a universidade foi transferida e reconstruída na década de 1870 ao longo da Ringstraße, com uma grande fachada e uma centralidade simbólica. Em Paris, a Sorbonne foi totalmente ampliada com as reformas de Jules Ferry para acomodar a crescente classe acadêmica da França."
 gaudi.528.g: "Expandir a universidade."
 gaudi.529.t: "Ampliação da Academia de Arte"
 gaudi.529.d: "A expansão do site [ROOT.GetCountry.GetCapital.GetCityHubName] oferece a oportunidade de modernizar e expandir a academia de arte."
 gaudi.529.f: "À medida que a cidade cresce, cresce também seu apetite por arte. No entanto, pintores e escultores lotam pequenos estúdios e sótãos escuros, aprendendo não com os mestres, mas com boatos e esboços emprestados. A proposta: uma academia de arte adequada, com ateliês cheios de luz, teatros anatômicos e galerias abertas a exposições públicas. Em toda a Europa, essas academias moldam o gosto nacional. A École des Beaux-Arts em Paris estabelece padrões clássicos para metade do continente. Em Viena, o grande edifício da Akademie der bildenden Künste ancora o prestígio cultural da Ringstraße."
 gaudi.529.g: "Expandir a academia."
 gaudi.530.t: "Urânia"
 gaudi.530.d: "Com o Urania, foi inaugurado em Viena o chamado \"centro de educação popular\", cujo objetivo exato ainda é questionado."
 gaudi.530.f: "Em 1883, o astrônomo alemão Max Wilhelm Meyer veio para Viena para calcular eclipses solares históricos e futuros como assistente na Universidade de Viena. Ele também deu palestras sobre folclore e desenvolveu a ideia de uma instituição de educação folclórica. Entretanto, como foi chamado para Berlim em 1885, continuou a desenvolver suas ideias lá. A Urania em Viena foi modelada com base na Urania em Berlim: tinha espaço para 800 pessoas e continha um salão de palestras para 200 pessoas, salas para demonstrações científicas e um observatório. No entanto, esse Urania \"temporário\" não conseguia lidar com o fluxo de visitantes, de modo que um novo prédio na Ringstrasse logo se tornou necessário. O Urania não apenas expandiu sua gama de oportunidades educacionais (por exemplo, por meio de cursos de idiomas), mas também se tornou um local para concertos, com sua própria orquestra sinfônica e coral Urania. A forma e a construção não convencionais causaram o escândalo habitual em Viena. No entanto, os vienenses gostaram do edifício, e o Urania logo se estabeleceu como um dos pontos de referência de Viena."
 gaudi.530.g: "É um marco arquitetônico."
 gaudi.530.h: "Trata-se principalmente de um estabelecimento de entretenimento."
 gaudi.530.i: "Antes de mais nada, trata-se de um observatório."
 gaudi.9.t: "Planejamento urbano concluído"
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] concluí o trabalho de planejamento urbano do [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] em uma importante cidade da província hoje. O [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] já está totalmente disponível novamente."
 gaudi.9.f: "A arquitetura não alcança seu estado mais elevado até que esteja tão impregnada de imaginação e fantasia - não imaginação indisciplinada ou fantasia caprichosa - que o tecido ordenado encante os olhos de todo observador inteligente e desperte emoções como um poema. -Henry van Brunt"
 gaudi.9.g: "Tantos projetos, tão pouco tempo."
 gaudi_architecture_treatise_modifier: "Tratado de Arquitetura"
 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]do Treatise on Architecture (Tratado sobre Arquitetura)"
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] concluiu o trabalho [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. O tratado [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] sobre arquitetura histórica e contemporânea, enriquecido com reflexões teóricas [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], influenciará as futuras gerações de arquitetos."
 gaudi.8.f: "A arquitetura registrou as grandes ideias da raça humana. Não apenas todo símbolo religioso, mas todo pensamento humano tem sua página nesse vasto livro\". -Victor Hugo"
 gaudi.8.g: "Um trabalho para a posteridade."
 je_gaudi_architecture_treatise: "Tratado de Arquitetura"
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] retirou-se completamente por um ano para compilar [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] o conhecimento anterior sobre arte arquitetônica em um livro. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] A intenção é que seja um manifesto da [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] vida, resumindo todas as experiências e teorias sobre arquitetura. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] A reputação desempenha um papel decisivo na determinação do valor da obra. Entretanto, traços de caráter como $literary$, $erudite$, $innovative$ e $aesthete$ também são valiosos."
