 je_gaudi_secession_3: "A Terceira Secessão Art Nouveau"
 je_gaudi_secession_3_reason: "O novo movimento artístico Art Nouveau atraiu vários artistas. Sob certas condições, isto pode resultar num movimento artístico estabelecido que goza de renome internacional e dá um novo impulso à pintura e à arquitectura. Historicamente, uma das associações mais importantes deste tipo foi a Secessão de Viena. A Secessão de Viena, mais precisamente a Associação de Artistas Austríacos, é uma associação de artistas de Viena do período fin de siècle. Derivado disso, a variante vienense do Art Nouveau também é conhecida como estilo da Secessão ou Art Nouveau vienense."
 je_gaudi_splendid_architecture: "Esplêndida nova arquitetura"
 je_gaudi_splendid_architecture_reason: "Com a introdução da Art Nouveau e da Art Déco, os arquitetos revolucionaram o mundo da arte, por exemplo, rompendo com o rígido historicismo do passado. Mas, ao contrário de muitas escolas modernas, os seus edifícios não eram uma expressão de mera funcionalidade e objectividade. Art Déco é um desenvolvimento em meio ao despertar geral do modernismo clássico, em que a combinação criativa de elegância da forma, preciosidade dos materiais, força das cores e sensualidade do tema estava em primeiro plano. Durante o seu apogeu, representou luxo, glamour, exuberância e fé no progresso social e tecnológico. Uma arquitetura que respeite estes princípios tornaria a nossa nação um exemplo de modernidade e riqueza."
 je_gaudi_splendid_architecture_goal: "#E Arquitetura Esplêndida#! atinge #BLUE 10#! pontos. No momento temos #G [ROOT.Var('gaudi_splendid_architecture').GetValue]#! @gaudi_architectural_splendour! pontos. Construir bairros Art Nouveau, cinemas Art Déco, arranha-céus Art Déco, escritórios Art Déco e aeroportos Art Déco por meio de lançamento no diário lhe dará mais pontos."
 je_gaudi_art_nouveau_quarter: "Bairro Art Nouveau"
 je_gaudi_art_nouveau_quarter_reason: "As primeiras casas e decoração de interiores Art Nouveau surgiram em Bruxelas na década de 1890, na arquitetura e design de interiores de casas projetadas por Paul Hankar, Henry van de Velde e especialmente Victor Horta, cujo Hôtel Tassel foi concluído em 1893. Mudou-se rapidamente para Paris, onde foi adaptado por Hector Guimard, que viu o trabalho de Horta em Bruxelas e aplicou o estilo nas entradas do novo Metro de Paris. Da Bélgica e França, a Art Nouveau espalhou-se pelo resto da Europa, assumindo nomes e características diferentes em cada país. Apareceu frequentemente não só nas capitais, mas também em cidades em rápido crescimento que pretendiam estabelecer identidades artísticas (Turim e Palermo em Itália; Glasgow na Escócia; Munique e Darmstadt na Alemanha), bem como em centros de movimentos de independência (Helsínquia na Finlândia, então parte do Império Russo; Barcelona na Catalunha, Espanha)."
 je_gaudi_art_deco_cinema: "Cinema Art Déco"
 je_gaudi_art_deco_cinema_reason: "Muitos dos melhores exemplos sobreviventes de Art Déco são cinemas construídos nas décadas de 1920 e 1930. O período Art Déco coincidiu com a conversão dos filmes mudos em filmes sonoros, e as empresas cinematográficas construíram grandes destinos de exibição nas principais cidades para capturar o enorme público que vinha assistir aos filmes. Os palácios de cinema da década de 1920 costumavam combinar temas exóticos com estilo art déco; O Teatro Egípcio de Grauman em Hollywood (1922) foi inspirado em antigas tumbas e pirâmides egípcias, enquanto o Fox Theatre em Bakersfield, Califórnia, anexou uma torre no estilo California Mission a um salão Art Déco."
 je_gaudi_art_deco_skyscraper: "Arranha-céu Art Déco"
 je_gaudi_art_deco_skyscraper_reason: "Os arranha-céus são os campanários do presente. Mas o que é uma torre sineira sem um toque característico? Refinar um arranha-céu em estilo Art Déco seria um empreendimento de prestígio que atrairia a admiração de todo o mundo."
 je_gaudi_art_deco_airport: "Aeroporto Art Déco"
 je_gaudi_art_deco_airport_reason: "As caravelas já abriram os oceanos aos europeus e conectaram os continentes do mundo conhecido ao Novo. Agora que chegou a era da aviação, as fronteiras anteriormente estabelecidas estão a abrir-se. Que estilo poderia ser mais apropriado do que o luxuoso e emergente art déco para receber os portos dos novos navios voadores? Aviadores, digam olá ao sol!"
 je_gaudi_art_deco_office: "Escritório Art Déco"
 je_gaudi_art_deco_office_reason: "O estilo Art Déco dominou o mundo comercial e a indústria do entretenimento, mas os respectivos governos também quiseram impressionar com edifícios modernos que sublinhassem a prosperidade do país e dessem à sua própria população a sensação de viver numa nação aspirante."
 je_gaudi_bauhaus: "Bauhaus"
 je_gaudi_bauhaus_reason: "A Bauhaus foi uma escola de arte alemã que funcionou de 1919 a 1933 e que combinava artesanato e artes plásticas. A escola tornou-se famosa pela sua abordagem ao design, que tentava unificar a visão artística individual com os princípios da produção em massa e a ênfase na função. Foi fundamentado na ideia de criar uma Gesamtkunstwerk (obra de arte abrangente) na qual todas as artes seriam eventualmente reunidas. O estilo Bauhaus mais tarde se tornou uma das correntes mais influentes no design moderno, na arquitetura modernista e na educação arquitetônica."
 je_gaudi_summer_burn: "Queima do Palácio de Verão"
 je_gaudi_summer_burn_reason: "O Palácio de Verão tem sido a verdadeira sede da família imperial da Dinastia Qing desde a primeira metade do século XVIII. É o símbolo da grandeza e grandeza da China. Uma destruição significou não apenas uma considerável humilhação do inimigo, mas também abriu a oportunidade para saques valiosos..."
 je_gaudi_summer_burn_success: "Ocupar toda a região da capital #T Pequim#!."
 je_gaudi_ben_burn: "Queimando o Big Ben"
 je_gaudi_ben_burn_reason: "Após o incêndio no Parlamento de Westminster, a Grã-Bretanha construiu um novo e icónico edifício do parlamento que sublinha a reivindicação do Império. Talvez seja hora de trazer o orgulho britânico à terra com outro incêndio?"
 je_gaudi_ben_burn_success: "Ocupar toda a região da capital #T Países de Origem#!."
 je_gaudi_dombau_phase_1: "Catedral de Colônia: retomada da construção"
 je_gaudi_dombau_phase_1_reason: "A Catedral de Colônia é considerada a catedral gótica mais perfeita do mundo. A construção começou no século XIII e atingiu proporções colossais. Após a conclusão da construção do coro, as obras foram paralisadas até serem totalmente interrompidas no decorrer do século XV. Até hoje, o guindaste de construção do final da Idade Média ainda se eleva sobre a torre sul semiacabada. Com o renascimento do sentimento nacional e romântico na burguesia alemã e especialmente após a redescoberta dos planos de construção originais e a sua divulgação, cresce a convicção de que a conclusão da catedral não é apenas um projecto para a glória de Deus, mas também um símbolo da cultura alemã e da unidade da nação alemã."
 je_gaudi_dombau_phase_1_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_dombau_phase_2: "Catedral de Colônia: fachada sul"
 je_gaudi_dombau_phase_2_reason: "Depois de as obras já terem durado vários anos, os arquitectos depararam-se com a construção e decoração da fachada sul da catedral. Com a sua rica decoração figurativa, não é apenas considerado o auge da escultura alemã, mas simplesmente uma das principais obras da arquitetura neogótica. Só a fachada levou treze anos para ser construída e dezoito para terminar e decorar."
 je_gaudi_dombau_phase_2_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_dombau_phase_3: "Catedral de Colônia: estrutura do telhado"
 je_gaudi_dombau_phase_3_reason: "O desenho da Catedral de Colônia, baseado no ideal gótico, não impediu os mestres-de-obras de utilizarem os materiais de construção mais modernos da época. A estrutura do telhado era de ferro, tornando-a a maior estrutura de ferro-aço do mundo até a construção da Torre Eiffel. Graças a esta decisão, a construção sobreviveu mesmo face aos bombardeamentos aliados durante a Segunda Guerra Mundial."
 je_gaudi_dombau_phase_3_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_dombau_phase_4: "Catedral de Colônia: fachada oeste e torres"
 je_gaudi_dombau_phase_4_reason: "A fachada oeste da catedral é a maior fachada de igreja já construída. Segue detalhadamente a planta medieval desenvolvida pelo mestre construtor Michael von Savoyen, que foi registrada em 1370 na chamada planta de fachada F. Característica da silhueta da Catedral de Colônia é a fachada de torre gêmea com as duas torres imponentes. Mestre Michael projetou uma torre rendilhado octogonal totalmente aberta, coroada por um remate em camadas. Com estas soluções, que exploraram os limites do que é tecnicamente possível, os arquitectos góticos quiseram sublinhar que o edifício queria ser 'um relicário monumental' que albergasse os Três Reis Magos no seu interior."
 je_gaudi_dombau_phase_4_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_gotthard_survey: "Ferrovia Gotthard: Plano e levantamento"
 je_gaudi_gotthard_survey_reason: "No século XIX, a Suíça corria o risco de ser ignorada no tráfego ferroviário internacional e, assim, perder não só o contacto com o sistema de transporte moderno, mas também com a Revolução Industrial. Com a abertura de uma linha ferroviária sobre o Passo do Brenner, este perigo assumiu uma nova dimensão. Geograficamente, a Suíça tinha problemas maiores do que a Áustria: o Passo do Brenner era muito mais fácil de negociar do que as rotas alternativas suíças. Décadas de discussões sobre a rota e o financiamento de tal projeto precederam a construção de uma ferrovia alpina na Suíça. O político e empresário de Zurique Alfred Escher desempenhou um papel fundamental na determinação da linha Gotthard."
 je_gaudi_gotthard_survey_goal: "#E Progresso do planejamento#! atinge #BLUE 60#! pontos. No momento temos #G [GetGlobalVariable('gaudi_gotthard_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_gotthard_construction: "Ferrovia Gotthard: Construção"
 je_gaudi_gotthard_construction_reason: "A construção da ferrovia Gotthard é considerada uma das maiores obras do século XIX e é comparada à construção do Canal de Suez em termos de dimensões e obstáculos técnicos. Desde o início, a parte central e mais ambiciosa foi a realização de um túnel através do maciço de São Gotardo. Quando foi inaugurado em 1882, o túnel do cume de São Gotardo era o túnel mais longo do mundo, com 15 quilômetros. Cerca de uma centena de pequenas e grandes pontes, maioritariamente feitas de ferro e aço, são outra parte desta ambiciosa rota, que não só liga o norte ao sul da Europa, mas também representa um símbolo da unidade suíça."
 je_gaudi_gotthard_construction_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_gotthard_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_gotthard_discontent: "Ferrovia Gotthart: descontentamento dos trabalhadores"
 je_gaudi_gotthard_discontent_reason: "As condições de trabalho durante a construção da ferrovia Gotthard foram difíceis, mesmo para os padrões contemporâneos. A classe trabalhadora era em grande parte composta por estrangeiros, principalmente dos vales mais pobres dos Alpes do norte da Itália, que de facto não tinham direitos. Em particular, o trabalho no túnel Gotthard foi considerado uma ameaça à vida e mal remunerado. Isto levou repetidamente a desentendimentos com a gestão da construção, que pelo menos a certa altura chegou a ameaçar todo o projecto."
 je_gaudi_gotthard_discontent_goal: "Se a #E Insatisfação dos Trabalhadores#! atingir o valor máximo de #BLUE 10#! pontos, poderá ocorrer uma greve! No momento o valor é de #R [GetGlobalVariable('gaudi_gotthard_discontent').GetValue]#! pontos."
 je_gaudi_cristo: "Cristo Redentor: Construção"
 je_gaudi_cristo_reason: "O padre vicentino Pedro Maria Boss sugeriu pela primeira vez a colocação de um monumento cristão no Monte Corcovado em meados da década de 1850 para homenagear a Princesa Isabel, regente do Brasil e filha do Imperador Pedro II, mas o projeto não foi aprovado. O Círculo Católico do Rio fez uma segunda proposta para uma estátua marcante na montanha em 1920. O engenheiro local Heitor da Silva Costa e o artista Carlos Oswald projetaram a estátua. O escultor francês Paul Landowski criou a obra. A estátua Art Déco mais tarde ganharia fama mundial como símbolo do Rio de Janeiro ao lado do Pão de Açúcar."
 je_gaudi_cristo_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_cristo_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_mole_phase_1: "Mole Antonelliana: Da Sinagoga ao Símbolo Nacional"
 je_gaudi_mole_phase_1_reason: "A Mole Antonelliana é um edifício semelhante a um pavilhão, com seu ensaio alto e afilado, projetado pelo arquiteto de Turim, Alessandro Antonelli. Começou como sinagoga em nome da comunidade judaica, mas a ambição excessiva do arquitecto levou a um projecto que foi além dos planos originais. Os custos dispararam e a conclusão foi adiada por anos. Apesar das tentativas ambiciosas, a comunidade judaica finalmente não conseguiu arrecadar mais dinheiro. No entanto, o povo de Turim defendeu que o projecto fosse assumido pelo governo local para concluir o edifício, que já impressionava na sua forma tosca, e dedicá-lo à unidade italiana."
 je_gaudi_mole_phase_1_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_mole_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_mole_phase_2: "Mole Antonelliana: Lanterna e Pináculo"
 je_gaudi_mole_phase_2_reason: "Antonelli continuou a fazer alterações no seu edifício, por exemplo acrescentando o chamado 'tempietto' - uma colunata hexagonal neoclássica com dois pisos e base quadrada - que, portanto, retoma o estilo básico dos pronaos. A visão original de Antonelli para a torre era finalizá-la com uma estrela de cinco pontas, mas mais tarde ele optou por uma estátua, representando um gênio alado, ou 'genio alato'. A estátua foi encomendada ao escultor Fumagalli, meses após a morte de Antonelli. O desenho incluía um gênio de cobre dourado e em relevo segurando uma lança em uma mão e um ramo de palmeira na outra. Na sua cabeça havia uma pequena estrela de cinco pontas sustentada por um mastro. Quando a estrela foi colocada em seu lugar em 10 de abril de 1889, elevou a altura total do Mole para 167,5 m (550 pés), tornando-o o edifício de tijolos mais alto da Europa na época."
 je_gaudi_mole_phase_2_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_mole_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_ringstrasse_phase_1: "Ringstrasse de Viena: Senhor dos anéis viários"
 je_gaudi_ringstrasse_phase_1_reason: "O anel viário de Viena foi construído após o desmantelamento das muralhas da cidade em meados do século XIX. De 1860 a 1890, muitos grandes edifícios públicos foram erguidos ao longo da Ringstrasse em um estilo historicista eclético, às vezes chamado de Ringstraßenstil ('estilo Ring Road'), usando elementos da arquitetura clássica, gótica, renascentista e barroca. Numerosos edifícios públicos e privados foram erguidos ao longo de todo o anel viário. Aristocratas e outros indivíduos ricos apressaram-se em construir palácios representativos (palácios circulares) construídos no estilo historicista monumental."
 je_gaudi_ringstrasse_phase_1_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_ringstrasse_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_ringstrasse_phase_2: "Ringstrasse de Viena: Hofoper e Neues Rathaus"
 je_gaudi_ringstrasse_phase_2_reason: "O anel vienense foi inaugurado como tal apenas dez anos após a decisão de construir uma magnífica avenida no local dos bastiões vienenses demolidos. Mas naquela época ainda era dominado por pousios. Um dos projetos mais importantes nos anos que se seguiram foi a construção de uma grande nova casa de ópera, que mais tarde se tornou a Ópera Estatal de Viena. A Nova Câmara Municipal também foi construída durante este período, durante o qual a Ringstrasse foi transformada de uma mera avenida num novo centro de Viena dominado por palácios e edifícios públicos."
 je_gaudi_ringstrasse_phase_2_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_ringstrasse_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_ringstrasse_phase_3: "Viena Ringstrasse: Universität und Kunstmuseen"
 je_gaudi_ringstrasse_phase_3_reason: "A Ringstrasse já se tornou o endereço cobiçado de industriais, banqueiros e da aristocracia. Os edifícios públicos ocupam um lugar de destaque e representam o país da forma mais estética. No entanto, para a sua conclusão é necessária uma fase final de construção, na qual a construção de um novo edifício universitário e a criação de museus de arte deverão estar em primeiro plano."
 je_gaudi_ringstrasse_phase_3_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_ringstrasse_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_1: "Sagrada Família: o sonho de Antoni Gaudí"
 je_gaudi_sagrada_phase_1_reason: "Antoni Gaudí i Cornet foi um arquiteto e designer catalão espanhol conhecido como o maior expoente do modernismo catalão. As obras de Gaudí apresentam um estilo sui generis altamente individualizado. Em 1883, Gaudí foi encarregado do projeto recentemente iniciado para construir uma igreja em Barcelona chamada Basílica i Temple Expiatori de la Sagrada Família. Gaudí mudou completamente o design inicial e imbuiu-o de um estilo próprio e distinto. Até à sua morte dedicou-se inteiramente a este projecto. Durante décadas, a Sagrada Família seria a maior igreja católica inacabada do mundo – um projeto do século entre a genialidade e a loucura."
 je_gaudi_sagrada_phase_1_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_2: "Sagrada Família: A Abside"
 je_gaudi_sagrada_phase_2_reason: "Gaudí concluiu a cripta que havia começado essencialmente de acordo com os planos de del Villar, sendo as abóbadas uma revisão de Gaudí. Em meados da década de 1880, nela puderam ser celebrados os primeiros serviços religiosos e a cripta foi concluída em 1889. Simultaneamente à construção da cripta, Gaudí começou a redesenhar fundamentalmente os planos da igreja. Em 1885 apresentou um novo conceito global com uma linguagem de design gótico, no qual são reconhecíveis 18 torres, embora em menor escala do que no projecto actual. A parede externa da abside, concluída em 1893, é mais alta que o projeto de del Villar. Contém elementos neogóticos, mas mostra a assinatura de Gaudí no uso idiossincrático das formas góticas, das gárgulas naturalistas e das pontas dos pináculos."
 je_gaudi_sagrada_phase_2_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_3: "Sagrada Família: Fachada da Natividade"
 je_gaudi_sagrada_phase_3_reason: "Dedicada ao nascimento de Jesus, a fachada da Natividade é decorada com cenas que lembram elementos da vida. Característica do estilo naturalista de Gaudí, as esculturas são ricamente dispostas e decoradas com cenas e imagens da natureza, cada uma delas um símbolo à sua maneira. A fachada está voltada para o sol nascente a nordeste, símbolo do nascimento de Cristo. Está dividido em três pórticos, cada um dos quais representa uma virtude teologal (Esperança, Fé e Caridade). A Árvore da Vida ergue-se acima da porta de Jesus no pórtico da Caridade."
 je_gaudi_sagrada_phase_3_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_4: "Sagrada Família: Nave Principal"
 je_gaudi_sagrada_phase_4_reason: "A planta da igreja é em cruz latina com cinco naves. As colunas do interior têm um design único de Gaudí. Além de se ramificarem para suportar a sua carga, as suas superfícies em constante mudança são o resultado da intersecção de várias formas geométricas. O exemplo mais simples é o de uma base quadrada evoluindo para um octógono à medida que a coluna sobe, depois para uma forma de dezesseis lados e, eventualmente, para um círculo. Essencialmente, nenhuma das superfícies internas é plana; a ornamentação é abrangente e rica, constituída em grande parte por formas abstratas que combinam curvas suaves e pontas recortadas. Até mesmo trabalhos detalhados, como as grades de ferro para varandas e escadas, estão repletos de elaboração curvilínea."
 je_gaudi_sagrada_phase_4_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_5: "Sagrada Família: Pináculos dos Apóstolos"
 je_gaudi_sagrada_phase_5_reason: "O desenho original de Gaudí prevê um total de dezoito torres, representando em ordem crescente de altura os Doze Apóstolos, a Virgem Maria, os quatro Evangelistas e, o mais alto de todos, Jesus Cristo. Todas as torres, cujas formas pretendem evocar o báculo de um bispo, apresentam longos entalhes verticais e pináculos coloridos decorados com animais ou símbolos sagrados e citações da Bíblia. Trazem uma pequena cruz dourada com o nome do respectivo apóstolo. Algumas das torres estão ligadas por estreitas pontes de pedra."
 je_gaudi_sagrada_phase_5_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_6: "Sagrada Família: Fachada da Paixão"
 je_gaudi_sagrada_phase_6_reason: "Em contraste com a Fachada da Natividade, altamente decorada, a Fachada da Paixão é austera, plana e simples, com ampla pedra nua, e é esculpida com linhas retas e ásperas que lembram os ossos de um esqueleto. Dedicada à Paixão de Cristo, ao sofrimento de Jesus durante a sua crucificação, a fachada pretendia retratar os pecados do homem. Gaudí pretendia que esta fachada causasse medo ao espectador. Ele queria \"quebrar” arcos e \"cortar” colunas, e usar o efeito do claro-escuro (sombras angulares escuras contrastadas com uma luz dura e rígida) para mostrar ainda mais a severidade e a brutalidade do sacrifício de Cristo. Voltada para o sol poente, indicativo e simbólico da morte de Cristo, a Fachada da Paixão é sustentada por seis grandes colunas inclinadas, desenhadas para assemelhar-se a músculos tensos."
 je_gaudi_sagrada_phase_6_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_7: "Sagrada Família: Transepto"
 je_gaudi_sagrada_phase_7_reason: "Os temas em toda a decoração incluem palavras da liturgia. As torres são decoradas com palavras como 'Hosanna', 'Excelsis' e 'Sanctus'; as grandes portas da fachada da Paixão reproduzem trechos da Paixão de Jesus do Novo Testamento em diversas línguas, principalmente o catalão; e a fachada da Glória será decorada com as palavras do Credo Apostólico, enquanto a sua porta principal reproduz todo o Pai Nosso em catalão, rodeado de múltiplas variações do 'O pão nosso de cada dia dá-nos hoje' em outras línguas. As três entradas simbolizam as três virtudes: Fé, Esperança e Amor. Cada um deles também é dedicado a uma parte da vida de Cristo."
 je_gaudi_sagrada_phase_7_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_8: "Sagrada Família: Pináculos de Maria e dos Evangelistas"
 je_gaudi_sagrada_phase_8_reason: "As torres dos Evangelistas são encimadas por esculturas dos seus símbolos tradicionais: um touro alado (São Lucas), um homem alado (São Mateus), uma águia (São João) e um leão alado (São Marcos). Os terminais das torres têm 22,5 m de altura, compostos por três partes distintas: a base é composta por quatro linhas de hexágonos com as inscrições Al·leluia e Amém rodeadas por palmeiras de cerâmica em forma de espinha de peixe; na parte central há um icosaedro cortado por uma esfera coberta com trencadís de cerâmica e vidro veneziano, que contém as fontes de iluminação; e, como acabamento, estão as esculturas dos Tetramorfos, aladas e com livro evangélico com as iniciais de cada evangelista. A torre de Maria está localizada na abside e é encimada por uma grande estrela de doze pontas, que simboliza a estrela da manhã. Além disso, carrega diversos elementos iconográficos alusivos à Virgem, como a Ave Maria e diversas flores como símbolo dos atributos da mãe de Jesus."
 je_gaudi_sagrada_phase_8_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_9: "Sagrada Família: Fachada da Glória"
 je_gaudi_sagrada_phase_9_reason: "A maior e mais marcante das fachadas é a Fachada da Glória. Dedicado à Glória Celestial de Jesus, representa o caminho para Deus: Morte, Julgamento Final e Glória, enquanto o Inferno é deixado para aqueles que se desviam da vontade de Deus. Para chegar ao Pórtico da Glória, a grande escadaria conduz à passagem subterrânea construída sobre a Carrer de Mallorca com a decoração representando o Inferno e o vício. Será decorado com demônios, ídolos, falsos deuses, heresias e cismas, etc. O purgatório e a morte também serão retratados, esta última usando tumbas ao longo do solo. O pórtico possui sete grandes colunas dedicadas aos dons do Espírito Santo. Na base das colunas estão representações dos sete pecados capitais e, no topo, das sete virtudes celestiais."
 je_gaudi_sagrada_phase_9_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 je_gaudi_sagrada_phase_10: "Sagrada Família: Pináculo de Cristo"
 je_gaudi_sagrada_phase_10_reason: "A torre de Jesus está ligada por quatro pontes às torres dos evangelistas e encimada por uma grande cruz de seis braços, de 13,5 m de altura: na sua parte central há um cordeiro, bem como a inscrição 'Tu solus Sanctus, Tu solus Dominus, Tu solus Altissimus' e as palavras 'Amém' e 'Aleluia'. Cada um dos quatro braços da cruz possui poderosos raios de luz que são visíveis a grandes distâncias, em memória da passagem bíblica que define Jesus como \"Eu sou a luz do mundo”. No interior, a torre de Jesus será dividida em três andares, que simbolizarão a criação do universo e a frase relacionada a Cristo ‘Eu sou o Caminho, a Verdade e a Vida’."
 je_gaudi_sagrada_phase_10_goal: "#E Progresso da Construção#! atinge #BLUE 120#! pontos. No momento temos #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! pontos. Normalmente, ganhamos um ponto por mês."
 notification_gaudi_summer_palace_burned_notification_name: "Palácio de Verão queimado"
 notification_gaudi_summer_palace_burned_notification_desc: "O esplêndido Palácio de Verão, residência dos imperadores chineses desde um século, foi incendiado por [INITIATOR_COUNTRY.GetName]."
 gaudi_dombau_phase_1_decision: "Conclua a Catedral de Colônia"
 gaudi_dombau_phase_1_decision_desc: "A Catedral de Colônia é considerada a catedral gótica mais perfeita do mundo. A construção começou no século XIII e atingiu proporções colossais. Após a conclusão da construção do coro, as obras foram paralisadas até serem totalmente interrompidas no decorrer do século XV. Até hoje, o guindaste de construção do final da Idade Média ainda se eleva sobre a torre sul semiacabada. Com o renascimento do sentimento nacional e romântico na burguesia alemã e especialmente após a redescoberta dos planos de construção originais e a sua divulgação, cresce a convicção de que a conclusão da catedral não é apenas um projecto para a glória de Deus, mas também um símbolo da cultura alemã e da unidade da nação alemã."
 gaudi_dombau_phase_2_decision: "Fachada Sul da Catedral de Colônia"
 gaudi_dombau_phase_2_decision_desc: "Depois de as obras já terem durado vários anos, os arquitectos depararam-se com a construção e decoração da fachada sul da catedral. Com a sua rica decoração figurativa, não é apenas considerado o auge da escultura alemã, mas simplesmente uma das principais obras da arquitetura neogótica. Só a fachada levou treze anos para ser construída e dezoito para terminar e decorar."
 gaudi_dombau_phase_3_decision: "Estrutura do telhado da Catedral de Colônia"
 gaudi_dombau_phase_3_decision_desc: "O desenho da Catedral de Colônia, baseado no ideal gótico, não impediu os mestres-de-obras de utilizarem os materiais de construção mais modernos da época. A estrutura do telhado era de ferro, tornando-a a maior estrutura de ferro-aço do mundo até a construção da Torre Eiffel. Graças a esta decisão, a construção sobreviveu mesmo face aos bombardeamentos aliados durante a Segunda Guerra Mundial."
 gaudi_dombau_phase_4_decision: "Fachada oeste e torres da Catedral de Colônia"
 gaudi_dombau_phase_4_decision_desc: "A fachada oeste da catedral é a maior fachada de igreja já construída. Segue detalhadamente a planta medieval desenvolvida pelo mestre construtor Michael von Savoyen, que foi registrada em 1370 na chamada planta de fachada F. Característica da silhueta da Catedral de Colônia é a fachada de torre gêmea com as duas torres imponentes. Mestre Michael projetou uma torre rendilhado octogonal totalmente aberta, coroada por um remate em camadas. Com estas soluções, que exploraram os limites do que é tecnicamente possível, os arquitectos góticos quiseram sublinhar que o edifício queria ser 'um relicário monumental' que albergasse os Três Reis Magos no seu interior."
 gaudi_gotthard_survey_decision: "Planejar e inspecionar a Ferrovia Gotthard"
 gaudi_gotthard_survey_decision_desc: "No século XIX, a Suíça corria o risco de ser ignorada no tráfego ferroviário internacional e, assim, perder não só o contacto com o sistema de transporte moderno, mas também com a Revolução Industrial. Com a abertura de uma linha ferroviária sobre o Passo do Brenner, este perigo assumiu uma nova dimensão. Geograficamente, a Suíça tinha problemas maiores do que a Áustria: o Passo do Brenner era muito mais fácil de negociar do que as rotas alternativas suíças. Décadas de discussões sobre a rota e o financiamento de tal projeto precederam a construção de uma ferrovia alpina na Suíça. O político e empresário de Zurique Alfred Escher desempenhou um papel fundamental na determinação da linha Gotthard."
 gaudi_gotthard_construction_decision: "Construa a Ferrovia Gotthard"
 gaudi_gotthard_construction_decision_desc: "A construção da ferrovia Gotthard é considerada uma das maiores obras do século XIX e é comparada à construção do Canal de Suez em termos de dimensões e obstáculos técnicos. Desde o início, a parte central e mais ambiciosa foi a realização de um túnel através do maciço de São Gotardo. Quando foi inaugurado em 1882, o túnel do cume de São Gotardo era o túnel mais longo do mundo, com 15 quilômetros. Cerca de uma centena de pequenas e grandes pontes, maioritariamente feitas de ferro e aço, são outra parte desta ambiciosa rota, que não só liga o norte ao sul da Europa, mas também representa um símbolo da unidade suíça."
 gaudi_cristo_construction_decision: "Construir Cristo Redentor"
 gaudi_cristo_construction_decision_desc: "O padre vicentino Pedro Maria Boss sugeriu pela primeira vez a colocação de um monumento cristão no Monte Corcovado em meados da década de 1850 para homenagear a Princesa Isabel, regente do Brasil e filha do Imperador Pedro II, mas o projeto não foi aprovado. O Círculo Católico do Rio fez uma segunda proposta para uma estátua marcante na montanha em 1920. O engenheiro local Heitor da Silva Costa e o artista Carlos Oswald projetaram a estátua. O escultor francês Paul Landowski criou a obra. A estátua Art Déco mais tarde ganharia fama mundial como símbolo do Rio de Janeiro ao lado do Pão de Açúcar."
 gaudi_mole_phase_1_decision: "Mole Antonelliana: Da Sinagoga ao Símbolo Nacional"
 gaudi_mole_phase_1_decision_desc: "A Mole Antonelliana é um edifício semelhante a um pavilhão, com seu ensaio alto e afilado, projetado pelo arquiteto de Turim, Alessandro Antonelli. Começou como sinagoga em nome da comunidade judaica, mas a ambição excessiva do arquitecto levou a um projecto que foi além dos planos originais. Os custos dispararam e a conclusão foi adiada por anos. Apesar das tentativas ambiciosas, a comunidade judaica finalmente não conseguiu arrecadar mais dinheiro. No entanto, o povo de Turim defendeu que o projecto fosse assumido pelo governo local para concluir o edifício, que já impressionava na sua forma tosca, e dedicá-lo à unidade italiana."
 gaudi_custom_tt_trigger_mole: "Jogando como #yellow Itália#!"
 gaudi_mole_phase_2_decision: "Mole Antonelliana: Lanterna e Pináculo"
 gaudi_mole_phase_2_decision_desc: "Antonelli continuou a fazer alterações no seu edifício, por exemplo acrescentando o chamado 'tempietto' - uma colunata hexagonal neoclássica com dois pisos e base quadrada - que, portanto, retoma o estilo básico dos pronaos. A visão original de Antonelli para a torre era finalizá-la com uma estrela de cinco pontas, mas mais tarde ele optou por uma estátua, representando um gênio alado, ou 'genio alato'. A estátua foi encomendada ao escultor Fumagalli, meses após a morte de Antonelli. O desenho incluía um gênio de cobre dourado e em relevo segurando uma lança em uma mão e um ramo de palmeira na outra. Na sua cabeça havia uma pequena estrela de cinco pontas sustentada por um mastro. Quando a estrela foi colocada em seu lugar em 10 de abril de 1889, elevou a altura total do Mole para 167,5 m (550 pés), tornando-o o edifício de tijolos mais alto da Europa na época."
 gaudi_ringstrasse_phase_1_decision: "Ringstrasse de Viena: Senhor dos anéis viários"
 gaudi_ringstrasse_phase_1_decision_desc: "O anel viário de Viena foi construído após o desmantelamento das muralhas da cidade em meados do século XIX. De 1860 a 1890, muitos grandes edifícios públicos foram erguidos ao longo da Ringstrasse em um estilo historicista eclético, às vezes chamado de Ringstraßenstil ('estilo Ring Road'), usando elementos da arquitetura clássica, gótica, renascentista e barroca. Numerosos edifícios públicos e privados foram erguidos ao longo de todo o anel viário. Aristocratas e outros indivíduos ricos apressaram-se em construir palácios representativos (palácios circulares) construídos no estilo historicista monumental."
 gaudi_ringstrasse_phase_2_decision: "Ringstrasse de Viena: Hofoper e Neues Rathaus"
 gaudi_ringstrasse_phase_2_decision_desc: "O anel vienense foi inaugurado como tal apenas dez anos após a decisão de construir uma magnífica avenida no local dos bastiões vienenses demolidos. Mas naquela época ainda era dominado por pousios. Um dos projetos mais importantes nos anos que se seguiram foi a construção de uma grande nova casa de ópera, que mais tarde se tornou a Ópera Estatal de Viena. A Nova Câmara Municipal também foi construída durante este período, durante o qual a Ringstrasse foi transformada de uma mera avenida num novo centro de Viena dominado por palácios e edifícios públicos."
 gaudi_ringstrasse_phase_3_decision: "Viena Ringstrasse: Universität und Kunstmuseen"
 gaudi_ringstrasse_phase_3_decision_desc: "A Ringstrasse já se tornou o endereço cobiçado de industriais, banqueiros e da aristocracia. Os edifícios públicos ocupam um lugar de destaque e representam o país da forma mais estética. No entanto, para a sua conclusão é necessária uma fase final de construção, na qual a construção de um novo edifício universitário e a criação de museus de arte deverão estar em primeiro plano."
 gaudi_custom_tt_trigger_ringstrasse: "Jogando como #yellow Áustria#!"
 gaudi_sagrada_phase_1_decision: "Sagrada Família: o sonho de Antoni Gaudí"
 gaudi_sagrada_phase_1_decision_desc: "Antoni Gaudí i Cornet foi um arquiteto e designer catalão espanhol conhecido como o maior expoente do modernismo catalão. As obras de Gaudí apresentam um estilo sui generis altamente individualizado. Em 1883, Gaudí foi encarregado do projeto recentemente iniciado para construir uma igreja em Barcelona chamada Basílica i Temple Expiatori de la Sagrada Família. Gaudí mudou completamente o design inicial e imbuiu-o de um estilo próprio e distinto. Até à sua morte dedicou-se inteiramente a este projecto. Durante décadas, a Sagrada Família seria a maior igreja católica inacabada do mundo – um projeto do século entre a genialidade e a loucura."
 gaudi_sagrada_phase_2_decision: "Sagrada Família: A Abside"
 gaudi_sagrada_phase_2_decision_desc: "Gaudí concluiu a cripta que havia começado essencialmente de acordo com os planos de del Villar, sendo as abóbadas uma revisão de Gaudí. Em meados da década de 1880, nela puderam ser celebrados os primeiros serviços religiosos e a cripta foi concluída em 1889. Simultaneamente à construção da cripta, Gaudí começou a redesenhar fundamentalmente os planos da igreja. Em 1885 apresentou um novo conceito global com uma linguagem de design gótico, no qual são reconhecíveis 18 torres, embora em menor escala do que no projecto actual. A parede externa da abside, concluída em 1893, é mais alta que o projeto de del Villar. Contém elementos neogóticos, mas mostra a assinatura de Gaudí no uso idiossincrático das formas góticas, das gárgulas naturalistas e das pontas dos pináculos."
 gaudi_sagrada_phase_3_decision: "Sagrada Família: Fachada da Natividade"
 gaudi_sagrada_phase_3_decision_desc: "Dedicada ao nascimento de Jesus, a fachada da Natividade é decorada com cenas que lembram elementos da vida. Característica do estilo naturalista de Gaudí, as esculturas são ricamente dispostas e decoradas com cenas e imagens da natureza, cada uma delas um símbolo à sua maneira. A fachada está voltada para o sol nascente a nordeste, símbolo do nascimento de Cristo. Está dividido em três pórticos, cada um dos quais representa uma virtude teologal (Esperança, Fé e Caridade). A Árvore da Vida ergue-se acima da porta de Jesus no pórtico da Caridade."
 gaudi_sagrada_phase_4_decision: "Sagrada Família: Nave Principal"
 gaudi_sagrada_phase_4_decision_desc: "A planta da igreja é em cruz latina com cinco naves. As colunas do interior têm um design único de Gaudí. Além de se ramificarem para suportar a sua carga, as suas superfícies em constante mudança são o resultado da intersecção de várias formas geométricas. O exemplo mais simples é o de uma base quadrada evoluindo para um octógono à medida que a coluna sobe, depois para uma forma de dezesseis lados e, eventualmente, para um círculo. Essencialmente, nenhuma das superfícies internas é plana; a ornamentação é abrangente e rica, constituída em grande parte por formas abstratas que combinam curvas suaves e pontas recortadas. Até mesmo trabalhos detalhados, como as grades de ferro para varandas e escadas, estão repletos de elaboração curvilínea."
 gaudi_sagrada_phase_5_decision: "Sagrada Família: Pináculos dos Apóstolos"
 gaudi_sagrada_phase_5_decision_desc: "O desenho original de Gaudí prevê um total de dezoito torres, representando em ordem crescente de altura os Doze Apóstolos, a Virgem Maria, os quatro Evangelistas e, o mais alto de todos, Jesus Cristo. Todas as torres, cujas formas pretendem evocar o báculo de um bispo, apresentam longos entalhes verticais e pináculos coloridos decorados com animais ou símbolos sagrados e citações da Bíblia. Trazem uma pequena cruz dourada com o nome do respectivo apóstolo. Algumas das torres estão ligadas por estreitas pontes de pedra."
 gaudi_sagrada_phase_6_decision: "Sagrada Família: Fachada da Paixão"
 gaudi_sagrada_phase_6_decision_desc: "Em contraste com a Fachada da Natividade, altamente decorada, a Fachada da Paixão é austera, plana e simples, com ampla pedra nua, e é esculpida com linhas retas e ásperas que lembram os ossos de um esqueleto. Dedicada à Paixão de Cristo, ao sofrimento de Jesus durante a sua crucificação, a fachada pretendia retratar os pecados do homem. Gaudí pretendia que esta fachada causasse medo ao espectador. Ele queria \"quebrar” arcos e \"cortar” colunas, e usar o efeito do claro-escuro (sombras angulares escuras contrastadas com uma luz dura e rígida) para mostrar ainda mais a severidade e a brutalidade do sacrifício de Cristo. Voltada para o sol poente, indicativo e simbólico da morte de Cristo, a Fachada da Paixão é sustentada por seis grandes colunas inclinadas, desenhadas para assemelhar-se a músculos tensos."
