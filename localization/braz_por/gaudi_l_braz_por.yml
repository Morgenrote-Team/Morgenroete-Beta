 je_gaudi_new_locomotives_project_reason: "Your [concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] is working tirelessly to construct new types of locomotives for [GetPlayer.GetName]. The Project will get Progress every month. Once the progress reaches [JournalEntry.GetTotalGoalValue|V0] each month the new locomotives will be deployed to a [GetBuildingType('building_railway').GetName] building. The building with the highest level will get the Modifier first. The progress bar will reset once all buildings have that modifier.\nThere is a total number of 5 modifiers to gain. Each new modifier needs the progress to fill up again.\n\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_mechanical_engineering_progress_var').GetValue|2+] #!#!"
