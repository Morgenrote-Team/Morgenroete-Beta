 je_gaudi_urban_planning_project_reason: "Your [concept_gaudi_architect] [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] focuses on modernizing the production methods of the [JournalEntry.GetTarget.GetBuilding.GetName] in [JournalEntry.GetTarget.GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches 100% the building will receive a new modifier.\nThere is a total number of 3 modifiers:\n- $gaudi_urban_building_throughput_add_modifier_with_tooltip$\n- $gaudi_urban_building_production_mult_modifier_with_tooltip$\n- $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$\n\nThere is a total number of 3 modifiers to gain. Each new modifier needs the progress to fill up again."
