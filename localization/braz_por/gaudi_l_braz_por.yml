 je_gaudi_blueprint_research_reason: "Nosso arquiteto, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], está trabalhando incansavelmente em um novo projeto para um edifício. O tempo necessário depende das habilidades do arquiteto; em geral, leva três anos. Após a conclusão dos estudos, um prédio novo e exclusivo estará disponível."
