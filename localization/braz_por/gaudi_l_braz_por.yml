 gaudi.11.t: "Seleção de projeto: Monumento da cidade"
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]O arquiteto mais importante de nosso país assumiu a importante tarefa de projetar uma planta para um novo edifício. A questão permanece: Que tipo de edifício deve ser projetado?"
 gaudi.11.f: "#G Um [GetBuildingType('building_gaudi_statue').GetName] aumenta a #G legitimidade do governo#!. [GetTechnology('elgar_classicism_tech').GetName] é necessário.\nUm [GetBuildingType('building_gaudi_fountain').GetName] melhora o #G padrão de vida#! do estado em que está localizado.\nUm [GetBuildingType('building_gaudi_arch').GetName] reduzirá a perda de moral#! das tropas em combate. [GetTechnology('napoleonic_warfare').GetName] é necessário."
 gaudi.11.g: "A estátua."
 gaudi.11.h: "A fonte."
 gaudi.11.i: "O Arco do Triunfo."
 gaudi.12.t: "Seleção do projeto: Praça pública"
 gaudi.12.f: "Um [GetBuildingType('building_gaudi_park').GetName] irá #G diminuir a poluição#!.\nUm [GetBuildingType('building_gaudi_luna').GetName] melhora #G a renda tributária#! do estado em que está localizado. [GetTechnology('curtiss_tourism_tech').GetName] é obrigatório.\nUm [GetBuildingType('building_gaudi_parade').GetName] tem um efeito positivo sobre #G as taxas de recrutamento#!. [GetTechnology('nationalism').GetName] é obrigatório."
 gaudi.12.g: "O parque público."
 gaudi.12.h: "O Luna Park."
 gaudi.12.i: "O Parade Ground."
 gaudi.13.t: "Seleção do projeto: Praça pública"
 gaudi.13.f: "Um [GetBuildingType('building_gaudi_almshouse').GetName] irá #G atrair migrantes#!. [GetTechnology('egalitarianism').GetName] é obrigatório.\nUm [GetBuildingType('building_gaudi_school').GetName] melhora o #G acesso à educação#! do estado em que está localizado. [GetTechnology('empiricism').GetName] é obrigatório.\nUm [GetBuildingType('building_gaudi_prison').GetName] irá #G diminuir a turbulência#!. [GetTechnology('law_enforcement').GetName] é obrigatório."
 gaudi.13.g: "A Casa de Esmolas do Estado."
 gaudi.13.h: "A Escola Estadual."
 gaudi.13.i: "A prisão estadual."
 gaudi.14.t: "Seleção do projeto: Saúde Pública"
 gaudi.14.f: "#G Um [GetBuildingType('building_gaudi_canalization').GetName] dará ao estado #G imunidade contra cólera, febre amarela e peste#!. [GetTechnology('modern_sewerage').GetName] é necessário.\nUm [GetBuildingType('building_gaudi_hospital').GetName] melhora a taxa de natalidade #G #! do estado em que está localizado. [GetTechnology('theiler_microbiology_tech').GetName] é necessário.\nUm [GetBuildingType('building_gaudi_health').GetName] diminuirá a intensidade de doenças#!. [GetTechnology('pharmaceuticals').GetName] é necessário."
 gaudi.14.g: "O sistema de esgoto."
 gaudi.14.h: "O Hospital Universitário."
 gaudi.14.i: "O Departamento de Saúde."
 gaudi.15.t: "Seleção do projeto: Academia Nacional"
 gaudi.15.f: "A [GetBuildingType('building_gaudi_science').GetName] will advance our #G monthly Academic Progress#!. [GetTechnology('dialectics').GetName] is required.\nA [GetBuildingType('building_gaudi_arts').GetName] will advance our #G monthly Artistic Progress#!. [GetTechnology('romanticism').GetName] is required.\nA [GetBuildingType('building_gaudi_sports').GetName] will #G boost the experience of our athletes#!. [GetTechnology('vikelas_international_sports_tech').GetName] is required."
 gaudi.15.g: "A Academia de Ciências."
 gaudi.15.h: "A Academia de Artes."
 gaudi.15.i: "A Academia de Esportes."
 gaudi.11.j: "Não é necessário um novo projeto."
 gaudi.16.t: "Um novo modelo"
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] concluiu seu trabalho no projeto hoje e o entregou ao cliente."
 gaudi.16.f: "Ornamentação é trabalho desperdiçado e, portanto, saúde desperdiçada. Hoje em dia, ela também significa material desperdiçado, e ambos significam capital desperdiçado. O homem moderno, o homem com nervos modernos, não precisa de ornamentação; ele a abomina. -Adolf Loos"
 gaudi.16.g: "Um novo edifício!"
