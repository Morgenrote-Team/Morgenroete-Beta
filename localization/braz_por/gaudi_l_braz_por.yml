 gaudi.73.t: "Passado e Futuro dos Jerónimos"
 gaudi.73.d: "O Mosteiro dos Jerónimos, em Lisboa, é considerado um dos principais exemplos do estilo arquitetônico manuelino, recordando um dos períodos mais gloriosos de Portugal. No entanto, o edifício foi tão negligenciado nas últimas décadas que agora se encontra em ruínas."
 gaudi.73.f: "O Mosteiro dos Jerónimos, em Belém (Lisboa), é um dos edifícios de estilo manuelino gótico tardio mais emblemáticos de Portugal, originalmente construído no século XVI. Após séculos de desgaste e abandono, a segunda metade do século XIX viu um crescente interesse pelos monumentos nacionais. Os esforços de restauro começaram a sério durante as décadas de 1860 e 1880, liderados por historiadores e arquitetos da era Romântica que procuravam elevar o passado imperial de Portugal como fonte de orgulho cultural."
 gaudi.73.g: "Alguns reparos menores são necessários."
 gaudi.73.h: "Restaure o seu esplendor histórico com uma renovação completa!"
 gaudi.73.i: "Vender os itens mais valiosos para preencher o tesouro do estado."
