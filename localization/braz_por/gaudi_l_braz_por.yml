 gaudi_civil_engineer_desc: "[Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineers$')] are engineers that focus on construction and infrastructure projects. They might build new bridges, tunnels or canals."
 gaudi_mechanical_engineer_desc: "[Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineers$')] focus on the construction of new and innovative machines. Maybe they will create a better locomotive or a new innovative steam engine. Maybe they will even build carts that can move without horses?"
 gaudi_military_engineer_desc: "[Concept('concept_tesla_military_engineer','$concept_tesla_military_engineers$')] are oftentimes part of the military and focus on the construction of fortresses or new innovative war machines."
 gaudi_electrical_engineer_desc: "Electricity allows for many innovative uses, from light, to motors and even communication. [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineers$')] work on harnessing this power for the good of humanity."
 gaudi_aeronautical_engineer_desc: "The dream of flying is old. Now that it is actually possible for humans to conquer the air, [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineers$')] are aiming to let people fly higher, faster and further as they build new airplanes and airships."
