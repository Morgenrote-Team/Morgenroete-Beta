 je_gaudi_gyeong_phase_1: "Reconstrução do Palácio Gyeongbokgung"
 je_gaudi_gyeong_phase_1_reason: "Gyeongbokgung é um palácio. Localização: Seul. O nome significa 'Palácio do Cenário da Bênção'. É o primeiro e maior palácio de cinco palácios construídos na Coreia durante a Dinastia Joseon. O Palácio Gyeongbokgung foi construído pelo fundador da Dinastia Joseon, Rei Taejo, e foi concluído em 1395. O palácio serviu como residência real até sua destruição pelos japoneses na Guerra Imjin em 1592. O palácio, que foi destruído por um incêndio em a Guerra Imjin, não foi reconstruída por quase 300 anos. Talvez agora seja a hora de restaurá-lo?"
