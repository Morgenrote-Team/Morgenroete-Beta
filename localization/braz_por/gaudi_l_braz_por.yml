 gaudi_gotthard_clean_houses_modifier: "Ferrovia Gotthard: cabanas de trabalhadores renovadas"
 gaudi.1003.h: "Ele parece ser um ótimo mecânico!"
 gaudi.1003.i: "Um incrível talento de corrida!"
