 gaudi.1221.t: "O Computador Mecânico"
 gaudi.1221.d: "Our [concept_tesla_mechanical_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally finished one of the greatest inventions of mankind: The Mechanical Computer. This invention will have an influence no one can yet grasp."
 gaudi.1221.f: "Os motores rugiram e o colosso começou a chacoalhar e a triturar. Milhares de engrenagens começaram a se mover e a impressora começou a cuspir números um após o outro. Tudo isso em uma velocidade e com uma precisão que nenhum humano seria capaz."
 gaudi.1222.t: "O Motor Analítico"
 gaudi.1222.d: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] um polímata bem conhecido, projetou uma nova máquina que seria capaz de computar todos os cálculos que existem. Agora ele está pedindo apoio ao nosso governo para realmente construir tal computador mecânico."
 gaudi.1222.f: "\"Assim que uma Máquina Analítica existir, ela necessariamente guiará o curso futuro da ciência. Sempre que qualquer resultado for buscado com sua ajuda, a questão surgirá — por qual curso de cálculo esses resultados podem ser alcançados pela máquina no menor tempo?\" - Charles Babbage"
 gaudi.1222.g: "Que projeto fascinante!"
 gaudi.1222.h: "Poderíamos construir muitos navios de guerra!"
 tesla_mechanical_computer_project_finished_engineer_loc: "\n[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] inventou o primeiro #V Computador Mecânico#!. Uma das maiores invenções da humanidade."
