 gaudi.1321.d: "Our [concept_tesla_military_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has worked for years to develop a new methods to construct fieldworks and fortifications for our army. Now our soldiers will be able use advanced methods to protect themselves by using fieldworks and fortifications."
 gaudi.1321.f: "\"Exceto pelos ratos e outros vermes, esta fortificação parece bastante segura!”"
 gaudi.1321.g: "Uma defesa forte manterá nossos soldados vivos!"
 gaudi_new_defence_mobilization_option_tt: "Você ganha acesso a um novo [concept_mobilization_option] ou a um novo nível dele."
 advanced_defence: "Trabalhos de campo avançados"
 mobilization_option_advanced_defence_1: "Trabalhos de campo avançados nível 1"
 mobilization_option_advanced_defence_1_desc: "Protecting soldiers from getting wounded is extremely important in a war. Our [concept_tesla_military_engineer] developed modern fieldworks, that will protect soldiers from dangers.\n#V Note:#! You can only activate this mobilization option, once your Engineer developed the new fieldworks."
 gaudi_advanced_defence_tier_1_trigger_tt: "Your [concept_tesla_military_engineer] has developed the first tier of advanced fieldworks. You do not have a higher tier of advanced fieldworks."
 mobilization_option_advanced_defence_2: "Trabalhos de campo avançados nível 2"
 mobilization_option_advanced_defence_2_desc: "Protecting soldiers from getting wounded is extremely important in a war. Our [concept_tesla_military_engineer] developed modern fieldworks, that will protect soldiers from dangers.\n#V Note:#! You can only activate this mobilization option, once your Engineer developed the new fieldworks."
 gaudi_advanced_defence_tier_2_trigger_tt: "Your [concept_tesla_military_engineer] has developed the second tier of advanced fieldworks. You do not have a higher tier of advanced fieldworks."
 mobilization_option_advanced_defence_3: "Trabalhos de campo avançados nível 3"
 mobilization_option_advanced_defence_3_desc: "Protecting soldiers from getting wounded is extremely important in a war. Our [concept_tesla_military_engineer] developed modern fieldworks, that will protect soldiers from dangers.\n#V Note:#! You can only activate this mobilization option, once your Engineer developed the new fieldworks."
 gaudi_advanced_defence_tier_3_trigger_tt: "Your [concept_tesla_military_engineer] has developed the third tier of advanced fieldworks. You do not have a higher tier of advanced fieldworks."
 je_gaudi_electrical_research_project: "Pesquisa em Engenharia Elétrica"
 pmg_gaudi_magnetic_observatory: "Observatório Geomagnético"
 pm_gaudi_no_magnetic_observatory: "Nenhum Observatório Geomagnético"
 pm_gaudi_magnetic_observatory: "Observatório Geomagnético"
 je_gaudi_magnetic_observation: "Observação Geomagnética"
 je_gaudi_magnetic_observation_reason: "Carl Friedrich Gauß construiu o primeiro observatório geofísico em Göttingen e construiu um magnetômetro sensível para ele em 1832. Ele percebeu que medições distribuídas globalmente teriam que ser realizadas ao mesmo tempo para poder localizar as causas das flutuações e medir o campo estático com mais precisão. A partir de 1836, a Associação Magnética fundada para esse fim e a Sociedade Real Britânica forneceram dados que ele e Wilhelm Weber avaliaram. O objetivo era medir as flutuações do campo magnético terrestre de forma coordenada, utilizando numerosas estações de medição distribuídas por todo o mundo. Participaram neste projeto cerca de 50 observatórios, incluindo 35 na Europa, seis na Ásia, dois em África, três na América do Norte e quatro na Oceânia. Os resultados foram entregues em Göttingen e processados ​​cientificamente por Gauß e Weber."
 je_gaudi_magnetic_observation_goal: "Colete #G 100#! @gaudi_magnetic_data! #O Dados Magnéticos#!. Este é um esforço internacional, todos os membros da Associação Magnética contribuirão."
 tesla_set_magnetic_association_tt: "Fundada a Associação Magnética. Outros países podem aderir e também construir #O Observatórios Geomagnéticos#! para coletar @gaudi_magnetic_data! #O Dados Magnéticos#!. Estes são então enviados para Göttingen."
 tesla_add_magnetic_association_member_tt: "Junte-se à Associação Magnética. Os membros enviarão @gaudi_magnetic_data! #O Dados Magnéticos#! para Göttingen e se beneficiar de resultados científicos."
 tesla_add_x_magnetic_data_minus_x_tt: "Perca [SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O Dados Magnéticos#!."
 tesla_add_x_magnetic_data_minus_1_tt: "Perca [SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O Dados Magnéticos#!."
 tesla_add_x_magnetic_data_0_tt: "Não ganhe @gaudi_magnetic_data! #O Dados Magnéticos#!."
 tesla_add_x_magnetic_data_plus_1_tt: "Ganhe [SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O Dados Magnéticos#!."
 tesla_add_x_magnetic_data_plus_x_tt: "Ganhe [SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O Dados Magnéticos#!."
 gaudi_geomagnetical_knowledge_modifier: "Conhecimento Geomagnético"
 gaudi.1401.t: "Um novo membro da Associação Magnética"
 gaudi.1401.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] juntou-se hoje à Associação Magnética em Göttingen. Os outros membros o receberam calorosamente."
 gaudi.1401.f: "Ao ingressar, o Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] também conseguiu obter o conhecimento necessário para construir um observatório geomagnético funcional. O presidente deu ao nosso engenheiro os planos para tal estação e um magnetômetro. Toda a associação pressionou para que a construção fosse iniciada rapidamente e para que os primeiros dados fossem enviados a Göttingen."
 gaudi.1401.g: "Deveríamos construir uma estação de medição imediatamente."
 gaudi.1402.t: "Observatório Geomagnético concluído"
 gaudi.1402.d: "A construção do Observatório Geomagnético foi concluída hoje. Numerosos dados foram obtidos nos últimos meses e transmitidos a Göttingen."
 gaudi.1402.f: "Os dados de medição obtidos não servem apenas para a pesquisa científica do campo magnético terrestre, mas também têm uso prático. Os mapas de declinação foram usados ​​no passado e ainda hoje são usados ​​para navegação marítima e aérea. Para a busca de matérias-primas como jazidas de minério e petróleo, os dados de medição geomagnética são importantes."
 gaudi.1402.g: "Pela ciência geomagnética!"
 gaudi.1403.t: "Coleta Internacional de Dados Magnéticos"
 gaudi.1403.d: "Depois de anos coletando e comparando dados geomagnéticos de todo o mundo, os pesquisadores em Göttingen conseguiram chegar a um resultado interessante."
 gaudi.1403.f: "Em 1839, Gauss conseguiu mostrar que a maior parte do campo magnético estático da Terra vem de dentro da Terra, enquanto variações menores e de curto prazo no campo magnético da Terra vêm de fora. Juntamente com Weber, publicou os resultados em seis volumes sob o título 'Resultados das Observações da Associação Magnética'. Os mapas foram publicados em um volume adicional que fornecia os dados magnéticos válidos na época para todos os locais do globo. Linhas conectavam os pontos de mesma declinação, mesma inclinação e mesma intensidade de campo. Esta publicação representou um marco na história das ciências naturais."
 gaudi.1403.g: "Uma conquista impressionante."
 gaudi.1404.t: "Interesse Náutico"
 gaudi.1404.d: "[SCOPE.sCharacter('gaudi_admiral_scope').GetFullName] manifestou grande interesse na pesquisa geomagnética de [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]. Ele realizou um experimento bem-sucedido no Observatório Geomagnético que está atualmente em construção."
 gaudi.1404.f: "'O que vou fazer com as pernas do sapo? Ah, nada de especial, absolutamente nada..."
 gaudi.1404.g: "O novo conhecimento deve ser útil para ele."
 gaudi.1404.h: "Este conhecimento deve beneficiar a todos."
 gaudi.1405.t: "Uma anomalia"
 gaudi.1405.d: "Apesar das medições renovadas, os números do campo magnético terrestre registrados pelo Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] dificilmente correspondem ao que era esperado. Ele ainda não conseguiu encontrar o motivo disso."
 gaudi.1405.f: "Pode haver uma variedade de razões pelas quais o campo magnético da Terra é diferente em um lugar e em outro lugar. Tais incidentes muitas vezes deram origem à suposição de que um grande depósito metálico poderia estar localizado no local, razão pela qual a pesquisa geomagnética não era desinteressante para a mineração."
 gaudi.1405.g: "Devíamos enviar os dados diretamente para Göttingen."
 gaudi.1406.t: "Astrónomo consulta Observatório Geomagnético"
 gaudi.1406.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] e Dr. [GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetFullName] tiveram algumas conversas estimulantes durante a visita ao recém-construído observatório geomagnético. O intercâmbio expandiu enormemente o conhecimento científico dos [GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetLastName]."
 gaudi.1406.f: "'Então ESTA é a razão pela qual o pão com geleia sempre cai no chão com o lado da geleia sobre ele!'"
 gaudi.1406.g: "This will help [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetHerHim] in [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetHerHis] practical research."
 gaudi.1406.h: "This will help [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetHerHim] in [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetHerHis] theoretical research."
 pmg_gaudi_communication: "Comunicação"
 pm_gaudi_no_communication: "Sem comunicação"
 pm_gaudi_telegraph_office: "Escritório Telegráfico"
 gaudi_building_telegraph_network_modifier: "Conecte a nação com telegrafia"
 gaudi_telegraphy_network_modifier: "Rede Nacional de Telegrafia"
 gaudi_mocked_by_telegram_modifier: "Zombado pelo Telegram"
 je_gaudi_telegraphy_network: "Construa uma rede telegráfica"
 je_gaudi_telegraphy_network_reason: "In principle, a Telegraph Office can only be built where there is already a railway line, as the telegraph poles run along the route and are of considerable importance in coordinating the train system. It takes around a year to open a new office, with an [concept_tesla_engineer] speeding up the process. Completion is even faster if it is an [concept_tesla_electrical_engineer]. The invention of electromagnetism also has a positive effect on work progress. The invention of electromagnetism is also needed to set up Telegraphy Offices in overseas countries or other exclaves. Otherwise, a Telegraph Office can only be built in a state that borders another Telegraph Office."
 gaudi.1411.t: "Uma rede telegráfica nacional"
 gaudi.1411.d: "Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] apresentou hoje planos para uma nova linha telegráfica para conectar [GetPlayer.GetName]. Isso aproximará as pessoas mais do que nunca."
 gaudi.1411.f: "Samuel Morse desenvolveu e patenteou um telégrafo elétrico de gravação em 1837. O assistente de Morse, Alfred Vail, desenvolveu um instrumento chamado registro para registrar as mensagens recebidas. Ele gravou pontos e traços em uma fita de papel móvel por meio de uma caneta operada por um eletroímã. Morse e Vail desenvolveram o alfabeto de sinalização em código Morse. O primeiro telegrama nos Estados Unidos foi enviado por Morse em 11 de janeiro de 1838, através de duas milhas (3 km) de fio na Speedwell Ironworks perto de Morristown, Nova Jersey, embora só mais tarde, em 1844, ele tenha enviado a mensagem \"O QUE DEUS OPEROU \"ao longo das 44 milhas (71 km) do Capitólio em Washington até o antigo depósito de Mt. Clare em Baltimore."
 gaudi.1411.g: "None"
 gaudi.1412.t: "Rede telegráfica parada"
 gaudi.1412.d: "O governo ordenou a suspensão imediata da expansão das linhas telegráficas."
 gaudi.1412.f: "Hoje foi emitido o seguinte despacho, razão pela qual todos os trabalhos serão suspensos a partir de agora:\n\n-.-. --- -. ... - .-. ..- -.-. - .. --- -. /... - --- .--. --..-- / -. --- .-- -.-.--"
 gaudi.1412.g: "Estamos terminando a construção por enquanto."
 gaudi.1413.t: "Rede telegráfica concluída"
 gaudi.1413.d: "Hoje o último poste telegráfico foi erguido cerimoniosamente numa área anteriormente inacessível. Todos os lugares do nosso país estão conectados à rede telegráfica nacional e as mensagens são enviadas de uma ponta a outra do país."
 gaudi.1413.f: "Cobrir toda a nação com uma rede telegráfica é uma conquista tremenda. A ligação à rede internacional garantirá que a troca de ideias nacional e global seja significativamente estimulada. É claro que isto não é o fim: se a nossa nação adquirir novas áreas que ainda não estão ligadas, teremos de instalar aí também escritórios de telegrafia. E talvez um dia haja uma maneira de enviar mensagens sem usar linhas telegráficas..."
 gaudi.1413.g: "None"
 gaudi.1414.t: "Universidades conectadas via Telégrafo"
 gaudi.1414.d: "As universidades de [SCOPE.sState('gaudi_university_state_1').GetName] e [SCOPE.sState('gaudi_university_state_2').GetName] estão agora conectadas por uma linha telegráfica direta. Os cientistas esperam que isso leve a um aumento do intercâmbio."
 gaudi.1414.f: "'De todas as conquistas maravilhosas da ciência moderna, o telégrafo elétrico é transcendentalmente o maior e mais útil para a humanidade... Toda a terra será cercada pela corrente elétrica, palpitando com pensamentos e emoções humanas... Quão potente é, então, o poder telegráfico. destinado a se tornar na civilização do mundo! Isto une por um cordão vital todas as nações da terra. É impossível que antigos preconceitos e hostilidades continuem a existir, enquanto tal instrumento tiver sido criado para uma troca de pensamentos entre todas as nações da terra.' -Augusto Maverick"
 gaudi.1414.g: "Isto fortalecerá a pesquisa técnica."
 gaudi.1414.h: "Isto fortalecerá a pesquisa sobre a natureza."
 gaudi.1414.i: "Isto fortalecerá a pesquisa arqueológica."
 gaudi.1415.t: "Telegrama para seu vizinho"
 gaudi.1415.d: "A estação telegráfica de [SCOPE.sState('gaudi_our_telegraph_state').GetName] estabeleceu conexão com o estado vizinho de [SCOPE.sState('gaudi_neigbour_telegraph_state').GetName]. Agora podemos enviar um telegrama ao nosso vizinho."
 gaudi.1415.f: "A telegrafia pode contribuir para a compreensão internacional e melhorar as relações. Alguns telegramas, entretanto, não o fazem."
 gaudi.1415.g: "Envie um telegrama amigável para fortalecer nossas relações."
 gaudi.1415.h: "Envie um telegrama de piada para irritar o chefe de estado."
 gaudi.1416.t: "Telegrama do nosso vizinho"
 gaudi.1416.d: "Nosso vizinho [SCOPE.sCountry('gaudi_telegram_country').GetName] instalou uma linha telegráfica em um estado vizinho e nos enviou uma mensagem amigável."
 gaudi.1416.f: "'Para bons vizinhos.'"
 gaudi.1416.g: "Um telegrama? Para mim? Deveríamos enviar um também!"
 gaudi.1417.d: "O primeiro telegrama oficial de [SCOPE.sCountry('gaudi_telegram_country').GetName] foi enviado hoje. Aparentemente eles querem nos fazer de idiotas!"
 gaudi.1417.f: "'[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] tem pulgas.'"
 gaudi.1417.g: "Isso deveria ser um telegrama de piada?"
 gaudi_building_radio_network_modifier: "Estações de rádio para todos"
 gaudi_radio_network_modifier: "Rede de estações de rádio"
 je_gaudi_radio_network: "Construa uma rede de estações de rádio"
 je_gaudi_radio_network_reason: "Radio stations can be set up anywhere in the country, provided there is already a railway there - it is not necessary to set up a telegraphy network beforehand. It takes around a year to build a new radio station, with an [concept_tesla_engineer] speeding up the process. Completion is even faster if it is an [concept_tesla_electrical_engineer]."
 gaudi.1421.t: "Rede de Rádio"
 gaudi.1421.d: "A invenção da telegrafia sem fio torna possíveis milagres. A partir de agora, as mensagens podem ser enviadas de qualquer local para outro, sem torres de transmissão, desde que esteja disponível o equipamento técnico adequado."
 gaudi.1421.f: "Em 1897, Karl Ferdinand Braun juntou-se à linha de pioneiros sem fio. Suas principais contribuições foram a introdução de um circuito fechado sintonizado na parte geradora do transmissor, sua separação da parte radiante (a antena) por meio de acoplamento indutivo e, posteriormente, a utilização de cristais para fins de recepção. A telegrafia sem fio atraiu toda a atenção do Dr. Braun em 1898, e por muitos anos depois disso ele se dedicou quase exclusivamente à tarefa de resolver seus problemas. Dr. Braun escreveu extensivamente sobre assuntos sem fio e era bem conhecido por suas muitas contribuições para o Electrician e outras revistas científicas. Em 1899, ele solicitaria a patente de transmissão elétrica sem fio de sinais sobre superfícies."
 gaudi.1421.g: "Uma antena em cada local!"
 gaudi.1422.t: "Rede de Rádio parada"
 gaudi.1422.d: "Construction work on new antennas and radio stations has been interrupted for the time being. They can be continued at any time with an [concept_tesla_electrical_engineer]."
 gaudi.1422.f: "'Fiz bem ao mundo ou acrescentei uma ameaça?' -Guglielmo Marconi"
 gaudi.1422.g: "Estamos terminando a construção por enquanto."
 gaudi.1423.t: "Rede de Rádio concluída"
 gaudi.1423.d: "Os físicos e engenheiros do [GetPlayer.GetName] orgulhosamente anunciam que já cobriram todo o país - sem fio!"
 gaudi.1423.f: "'Meu principal problema era que a ideia era tão elementar, tão simples em lógica, que parecia difícil acreditar que ninguém mais tivesse pensado em colocá-la em prática.' -Guglielmo Marconi"
 gaudi.1423.g: "Ouça o rádio!"
 gaudi.1424.t: "Primeiro programa de rádio"
 gaudi.1424.d: "O primeiro programa de rádio privado transmitido em [SCOPE.sState('gaudi_radio_state').GetName] levou a um forte aumento do interesse por este novo meio. A fábrica próxima está se preparando para isso e melhorou a eficiência da sua própria produção para estar preparada para uma possível corrida de clientes."
 gaudi.1424.f: "Em 1909, a primeira estação de notícias do mundo começou a operar com uma programação regular de 14 watts. A estação em San José, Califórnia, foi criada pelo físico Charles 'Doc' Herrold e alunos de sua Faculdade de Tecnologia Sem Fio e Engenharia. Em 1921, esta estação, agora comercial, recebeu o identificador KQW, que mais tarde foi assumido pela CBS."
 gaudi.1424.g: "Um rádio em cada casa?"
 gaudi.1425.t: "Agitação de Rádio"
 gaudi.1425.d: "A política e a propaganda também mudam com a tecnologia. [SCOPE.sCharacter('gaudi_opposition_leader').GetFullName] abriu um pequeno canal de rádio próprio que os apoiantes do partido ouvem todos os dias. Mesmo pessoas anteriormente não politizadas são receptivas ao programa."
 gaudi.1425.f: "'Bom dia, queridos ouvintes. Estes são os anúncios da manhã. As seletivas para o time de futebol acontecem na tarde de sexta-feira. Isso, é claro, se nosso [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] fizer algo a respeito de nosso péssimo campo de futebol. Eu tenho uma pergunta. O que [SCOPE.sCharacter('gaudi_ruler').GetFullName] realmente faz? Ele deveria ser o [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle], certo? Qual é a agenda dele? Ele está mentindo para todo mundo? Ou ele é? Vamos fazer essas perguntas. Além disso, quem realmente votou em [SCOPE.sCharacter('gaudi_ruler').GetFullName]? Eu sei que não. E todo mundo que fez isso agora está coçando a cabeça e dizendo \"Opa. Acho que não deveria ter feito isso.\" Não estou no gabinete, sou apenas uma pessoa normal como todos vocês. E como todos vocês, quero saber o que aconteceu... com meu país."
 gaudi.1425.g: "Banir esta estação de rádio!"
 gaudi.1425.h: "Este é um país livre, então você pode transmitir livremente."
 gaudi.1426.t: "Uma perturbadora peça de rádio"
 gaudi.1426.d: "Uma das primeiras peças de rádio em um programa de rádio causou pânico em massa entre os ouvintes desinformados, porque eles pensaram que a história fictícia fazia parte da reportagem."
 gaudi.1426.f: "'Este é Orson Welles, senhoras e senhores, fora do personagem, para assegurar-lhes que A Guerra dos Mundos não tem mais significado do que a oferta de férias que deveria ser; A versão de rádio do próprio Mercury Theatre de se vestir com um lençol, pular de um arbusto e dizer 'Boo!' A partir de agora, não poderíamos ensaboar todas as suas janelas e roubar todos os portões do seu jardim até amanhã à noite, então fizemos a segunda melhor coisa. Aniquilamos o mundo diante de seus ouvidos e destruímos totalmente a CBS. Você ficará aliviado, espero, ao saber que não foi nossa intenção e que ambas as instituições ainda estão abertas para negócios. Então, adeus a todos e lembrem-se, por favor, no dia seguinte, da terrível lição que aprenderam esta noite. Aquele invasor globular, sorridente e brilhante da sua sala de estar é um habitante do canteiro de abóboras, e se a campainha tocar e não houver ninguém lá, isso não era marciano, é Halloween. -Orson Welles"
 gaudi.1426.g: "Uma invasão alienígena? E as pessoas acreditaram nisso?"
 gaudi.1426.h: "Ainda bem que estávamos preparados!"
 gaudi.1420.t: "Cabo Transatlântico"
 gaudi.1420.d: "Um cabo transatlântico liga agora as duas localidades da Terra Nova e da Irlanda. Uma primeira mensagem foi trocada entre os continentes."
 gaudi.1420.f: "'É um triunfo mais glorioso, porque muito mais útil para a humanidade, do que jamais foi conquistado pelo conquistador no campo de batalha. Que o telégrafo atlântico, sob a bênção do Céu, prove ser um vínculo de paz e amizade perpétuas entre as nações afins, e um instrumento destinado pela Divina Providência para difundir a religião, a civilização, a liberdade e a lei em todo o mundo.' -James Buchanan"
 gaudi.1420.g: "None"
 gaudi.1430.t: "Transmissão Transatlântica"
 gaudi.1430.d: "Um grande sucesso para o progresso humano: hoje a primeira mensagem foi enviada sem fios através do Atlântico!"
 gaudi.1430.f: "-s-"
 gaudi.1430.g: "E isso realmente funciona? Mensagens pelo ar?"
 je_gaudi_transatlantic_cable: "Cabo Transatlântico"
 je_gaudi_transatlantic_cable_reason: "Ao estabelecer uma estação telegráfica em ambos os lados do Atlântico, existe a possibilidade de instalar um cabo telegráfico submarino para aproximar a Europa e a América."
 je_gaudi_transatlantic_radio: "Transmissão Transatlântica"
 je_gaudi_transatlantic_radio_reason: "Parece magia, mas com tecnologia de ponta é muito mais fácil enviar mensagens através do Atlântico em vez de usar cabos telegráficos. Isto resolveria o problema dos cabos se quebrarem continuamente e, assim, causar interrupções na comunicação."
