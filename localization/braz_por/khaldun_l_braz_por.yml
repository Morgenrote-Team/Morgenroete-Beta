 khaldun.101.t: "Al-Qarawiyyin: Centro de Saber"
 khaldun.101.d: "Séculos atrás, Al-Qarawiyyin foi um Centro de Saber e Ciência, Agora, ela retornou ao seu lugar como uma das maiores universidade do planeta."
 khaldun.101.f: "\"A Al-Qarawiyyin tem sido uma universidade por mais tempo que qualquer outra na Europa. Ela abrigou inúmeras obras, mas, infelizmente, entrou em declínio. Hoje marca o dia em que esta universidade retoma o seu devido lugar!\""
 khaldun.101.g: "Al-Qarawiyyin será um farol do Saber!"
 khaldun.101.h: "Al-Qarawiyyin será um farol da Matemática e Engenharia!"
 khaldun.101.i: "Al-Qarawiyyin será um farol da História Natural!"
 khaldun.101.j: "Al-Qarawiyyin será um farol das Ciências Humanas!"