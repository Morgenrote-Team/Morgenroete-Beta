l_braz_por:
 pbi_objective_publishing_industry_events.200.t: "Um romance de jornal de sucesso"
 pbi_objective_publishing_industry_events.200.d: "O romance de [SCOPE.sCharacter('target_character').GetFullName] foi serializado em um jornal [SCOPE.sState('target_state').GetName] e, após uma exibição muito popular, a série terminou."
 pbi_objective_publishing_industry_events.200.f: "Durante o período de serialização, as vendas de jornais eventualmente triplicaram. A editora publicou um livro resumindo a serialização e até traduziu o livro para o mercado internacional, e as vendas desses livros têm aumentado constantemente."
 pbi_objective_publishing_industry_events.200.a: "Bom trabalho!"
 pbi_objective_publishing_industry_events.200.good: "O progresso da escrita do romance será #positive_value aumentado#!"
 pbi_objective_publishing_industry_events.200.bad: "O progresso da escrita do romance será #negative_value reduzido#!"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value Aumenta a probabilidade de futuras novas reinicializações de progresso#!"
 pbi_objective_publishing_industry_events.201.t: "Cancelamento de serialização"
 pbi_objective_publishing_industry_events.201.d: "O romance, que estava sendo serializado em jornal [SCOPE.sState('target_state').GetName], terminou inacabado quando o escritor não pôde mais continuar escrevendo."
 pbi_objective_publishing_industry_events.201.f: "Muitos leitores não poderão mais ler o restante dos romances serializados que tanto aguardavam."
 pbi_objective_publishing_industry_events.201.a: "Muito ruim"
 pbi_objective_publishing_industry_events.202.t: "Grande Escritor do Futuro"
 pbi_objective_publishing_industry_events.202.d: "Uma empresa jornalística [SCOPE.sState('target_state').GetName] pretende publicar um novo jornal.\nEles procuram um novo romancista para este ambicioso jornal."
 pbi_objective_publishing_industry_events.202.f: "Hoje em dia, não é a declaração política, o editorial espirituoso do editor-chefe ou o sensacional artigo de três páginas que determinam as vendas de um jornal, mas o interesse da ficção serializada."
 pbi_objective_publishing_industry_events.202.a: "[SCOPE.sCharacter('target_character_1').GetFullName] é o grande escritor do futuro!"
 pbi_objective_publishing_industry_events.202.a.tt: "Comece a escrever uma série de romances"
 pbi_objective_publishing_industry_events.202.b: "Sinto uma inteligência transbordante de [SCOPE.sCharacter('target_character_2').GetFullName]!"
 pbi_objective_publishing_industry_events.202.c: "A escrita de [SCOPE.sCharacter('target_character_3').GetFullName] tem uma atração irresistível!"
 pbi_objective_publishing_industry_events.202.e: "Deve haver outras joias brutas que brilham!"
 pbi_objective_publishing_industry_events.202.e.tt: "Procuraremos outros candidatos"
 pbi_objective_publishing_industry_events.203.t: "Não é possível continuar escrevendo"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName] está lutando para progredir no romance [SCOPE.sCharacter('target_character').GetHerHis]. Se isso continuar, a serialização provavelmente será interrompida."
 pbi_objective_publishing_industry_events.203.f: "Um editor responsável visitou a casa de [SCOPE.sCharacter('target_character').GetLastName] no início da manhã para verificar o andamento do manuscrito, mas [SCOPE.sCharacter('target_character').GetSheHe] não estava lá. O servo disse que o patrão não voltava para casa há três dias e não sabia onde estava [SCOPE.sCharacter('target_character').GetSheHe]."
 pbi_objective_publishing_industry_events.203.a: "Amarre [SCOPE.sCharacter('target_character').GetHerHim] a uma cadeira, mas mantenha [SCOPE.sCharacter('target_character').GetHerHim] escrevendo!"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetFullName] precisa de uma mudança de cenário"
 pbi_objective_publishing_industry_events.204.t: "Quem é o dono do manuscrito?"
 pbi_objective_publishing_industry_events.204.d: "O autor se recusa a permitir que a editora revise o conteúdo de um romance que [SCOPE.sCharacter('target_character').GetFullName] está serializando."
 pbi_objective_publishing_industry_events.204.f: "A editora teme que a representação de certos personagens do romance possa ser percebida como uma zombaria de certos políticos."
 pbi_objective_publishing_industry_events.204.a: "Os editores têm direitos de revisão"
 pbi_objective_publishing_industry_events.204.b: "A vontade do autor deve ser respeitada"
 pbi_objective_publishing_industry_events.205.t: "Conteúdo Imoral"
 pbi_objective_publishing_industry_events.205.d: "[SCOPE.gsInterestGroup('target_ig').GetName] estão exigindo melhorias nos romances serializados de [SCOPE.sCharacter('target_character').GetFullName] devido ao seu conteúdo imoral."
 pbi_objective_publishing_industry_events.205.f: "'O conteúdo do polêmico romance de [SCOPE.sCharacter('target_character').GetLastName], que foi serializado em jornais, é inaceitável'"
 pbi_objective_publishing_industry_events.205.a: "Grandes obras são inaceitáveis ​​para valores antigos"
 pbi_objective_publishing_industry_events.205.b: "Precisamos revisar o conteúdo"
 pbi_objective_publishing_industry_events.206.t: "Suspeita de plágio"
 pbi_objective_publishing_industry_events.206.d: "Vários romancistas alegaram que seu trabalho foi plagiado no romance serializado de [SCOPE.sCharacter('target_character').GetFullName]."
 pbi_objective_publishing_industry_events.206.f: "'A suposta criatividade do seu tão estimado escritor é pura fraude. Esta cena que ele afirma ter inventado é baseada no capítulo de um dos meus livros. Como você pode negar isso? A cena da mulher tomando banho é completamente única. Eu reivindico meus direitos autorais!"
 pbi_objective_publishing_industry_events.206.a: "Isso é uma falsa acusação"
 pbi_objective_publishing_industry_events.207.t: "Um romance como uma profecia"
 pbi_objective_publishing_industry_events.207.d: "O conteúdo dos romances serializados de [SCOPE.sCharacter('target_character').GetFullName] chamou a atenção por sua notável semelhança com um recente assassinato bizarro em [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.207.f: "«Não há dúvida de que o problema da pobreza que a nossa sociedade enfrenta actualmente está por trás da ocorrência de tais incidentes. E é surpreendente que o romance de [SCOPE.sCharacter('target_character').GetLastName], atualmente em serialização, contenha exatamente a mesma descrição, como se prenunciasse a ocorrência de tal situação.'"
 pbi_objective_publishing_industry_events.207.a: "É uma peça que captura os tempos"
 pbi_objective_publishing_industry_events.208.t: "Resenhas de livros favoráveis ​​de celebridades"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.sCharacter('target_character_1').GetFullName], um membro influente de [SCOPE.gsInterestGroup('target_ig_1').GetName], emitiu uma crítica favorável do romance que [SCOPE.sCharacter('target_character').GetFullName] está sendo serializado."
 pbi_objective_publishing_industry_events.208.f: "'Todos os jornais publicam romances, mas o romance de [SCOPE.sCharacter('target_character').GetFullName] é o mais interessante de todos. Falando francamente, estou surpreso que [SCOPE.sCharacter('target_character').GetSheHe] tenha tanto talento literário.'"
 pbi_objective_publishing_industry_events.208.a: "[SCOPE.sCharacter('target_character_1').GetLastName] tem olhos para ver"
 pbi_objective_publishing_industry_events.208.b: "Não preciso de [SCOPE.sCharacter('target_character_1').GetHerHis] favores"
 pbi_objective_publishing_industry_events.209.t: "Resenhas críticas de livros feitas por celebridades"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.sCharacter('target_character_1').GetFullName], um membro proeminente do [SCOPE.gsInterestGroup('target_ig_1').GetName], publicou uma resenha crítica de um romance que [SCOPE.sCharacter('target_character').GetFullName] está serializando."
 pbi_objective_publishing_industry_events.209.f: "'A feiura dos romances serializados de [SCOPE.sCharacter('target_character').GetLastName] é notável em comparação com os romances serializados dos últimos anos. Em particular, o romance publicado esta semana não foi nada digno de nota. Não é mais possível reparar esta história quebrada. Sinto até simpatia por [SCOPE.sCharacter('target_character').GetLastName], que deve continuar a escrever romances mesmo que [SCOPE.sCharacter('target_character').GetSheHe] tenha se tornado motivo de chacota no mundo.'"
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName] está revelando sua própria ignorância"
 pbi_objective_publishing_industry_events.210.t: "Romances serializados chamam a atenção"
 pbi_objective_publishing_industry_events.210.d: "Os romances de [SCOPE.sCharacter('target_character').GetFullName], serializados em jornais [SCOPE.sState('target_state').GetName], ganham cada vez mais atenção a cada edição."
 pbi_objective_publishing_industry_events.210.f: "A história das dificuldades e esforços do protagonista, baseada em sua própria vida, conquistou o coração de muitos leitores."
 pbi_objective_publishing_industry_events.210.a: "Mal posso esperar para ver o resto!"
 pbi_objective_publishing_industry_events.211.t: "Ventilador Ardente"
 pbi_objective_publishing_industry_events.211.d.rich: "Os romances serializados de [SCOPE.sCharacter('target_character').GetFullName] são populares com [concept_upper_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.d.middle: "Os romances serializados de [SCOPE.sCharacter('target_character').GetFullName] são populares com [concept_middle_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.d.poor: "Os romances serializados de [SCOPE.sCharacter('target_character').GetFullName] são populares com [concept_lower_strata] de [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.211.f: "Embora seja possível desfrutar de romances de uma variedade de jornais em [SCOPE.sState('target_state').GetName], o trabalho de [SCOPE.sCharacter('target_character').GetFullName] tem sido imensamente popular nos últimos anos."
 pbi_objective_publishing_industry_events.211.a: "Você tem algum evento de autógrafos planejado?"
 pbi_objective_publishing_industry_events.212.t: "Suspensão da serialização"
 pbi_objective_publishing_industry_events.212.d: "O tribunal ordenou que os romances serializados de [SCOPE.sCharacter('target_character').GetFullName] deixassem de ser serializados, alegando que os personagens neles caluniam certos políticos."
 pbi_objective_publishing_industry_events.212.f: "Todo mundo que leu o romance sabe que os personagens do romance de [SCOPE.sCharacter('target_character').GetFullName] são inspirados em certos políticos."
 pbi_objective_publishing_industry_events.212.a: "Oh meu Deus"
 pbi_objective_publishing_industry_events.300.t: "Jornalistas no campo de batalha"
 pbi_objective_publishing_industry_events.300.d: "Artigos enviados do [SCOPE.sFront('target_front').GetName] por repórteres que serviram na guerra [SCOPE.sWar('target_war').GetName] atraíram muito interesse."
 pbi_objective_publishing_industry_events.300.f: "'O General [SCOPE.sCharacter('target_character').GetFullName] ordenou ataques repetidos e finalmente conseguiu forçar o inimigo a recuar, mas as nossas forças também sofreram danos tremendos. O resultado desta batalha, que durou meio dia, foi apenas um avanço de 100 metros sobre a nossa posição.'"
 pbi_objective_publishing_industry_events.300.a: "Vamos recrutar voluntários"
 pbi_objective_publishing_industry_events.300.b: "Vamos arrecadar doações"
 pbi_objective_publishing_industry_events.400.t: "Vencendo a batalha diplomática"
 pbi_objective_publishing_industry_events.400.d: "Nossas conversas divulgadas com [SCOPE.sCountry('target_country').GetName] foram noticiadas em massa na imprensa [SCOPE.sCountry('target_country').GetName]. Embora isto tenha dado impulso ao [Concept('concept_radical', '$concept_radicals$')] no [SCOPE.sCountry('target_country').GetName], também atraiu a condenação do [SCOPE.sCountry('target_country').GetName] entre os países envolvidos."
 pbi_objective_publishing_industry_events.400.f: "'Em resposta ao [SCOPE.sCountry('target_country').GetName] pedido insolente do #bold diplomata#!, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] #bold recusou-se a encontrar#! com o diplomata e informou-o através de #bold um oficial subalterno#! que ele não tinha #bold mais nada a dizer#! .'"
 pbi_objective_publishing_industry_events.400.a: "Até os tolos e os jornais podem ser úteis nas mãos de uma pessoa inteligente"
 pbi_objective_publishing_industry_events.402.t: "Guerra de Informação"
 pbi_objective_publishing_industry_events.402.d: "Os jornais têm agora mais poder do que o discurso de qualquer político. Se usarmos esse poder de forma eficaz, seremos capazes de causar danos aos nossos inimigos."
 pbi_objective_publishing_industry_events.402.f: "'Você fornece as fotos e eu forneço a guerra.'\nWilliam Randolph Hearst"
 pbi_objective_publishing_industry_events.402.a: "[SCOPE.sCountry('target_country_1').GetName] é nosso inimigo"
 pbi_objective_publishing_industry_events.402.b: "Não podemos deixar [SCOPE.sCountry('target_country_2').GetName] continuar a crescer"
 pbi_objective_publishing_industry_events.402.c: "Precisamos cuidar do problema com [SCOPE.sCountry('target_country_3').GetName]"
 pbi_objective_publishing_industry_events.402.e: "Devemos considerar isso com cuidado"
 pbi_objective_publishing_industry_events.402.tt: "Adiaremos a decisão sobre o país alvo por um mês"
 pbi_objective_publishing_industry_events.403.t: "Revista Pó"
 pbi_objective_publishing_industry_events.403.d: "[SCOPE.sCountry('target_country').GetName] jornais reclamaram que nossas reivindicações na região [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] são injustificadas."
 pbi_objective_publishing_industry_events.403.f: "Para [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName], um [concept_strategic_region] tanto para nós como para [SCOPE.sCountry('target_country').GetName], os jornais [SCOPE.sCountry('target_country').GetName] apelam constantemente à legitimidade dos seus direitos. Os problemas nesta área estimularão fortemente o sentimento público [SCOPE.sCountry('target_country').GetName]."
 pbi_objective_publishing_industry_events.403.a: "Não há como não aproveitar isso"
 pbi_objective_publishing_industry_events.404.t: "Pedido Insolente"
 pbi_objective_publishing_industry_events.404.d: "[SCOPE.sCountry('target_country').GetName] governo, através de seus diplomatas, está buscando nossas concessões e está buscando uma reunião secreta com [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 pbi_objective_publishing_industry_events.404.f: "[SCOPE.sCountry('target_country').GetName] a opinião pública começa a insistir que a guerra deve ser aberta se a sua superioridade na região [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] não for reconhecida. É quase certo que a última exigência do governo [SCOPE.sCountry('target_country').GetName] reflecte o seu desejo de evitar a guerra, suprimindo a opinião pública interna, que está a ser dominada pelo campo pró-guerra aberta."
 pbi_objective_publishing_industry_events.404.a: "Eles querem abrir a cortina.\nE da maneira que for melhor para eles!"
 pbi_objective_publishing_industry_events.405.t: "Telegrama do Destino"
 pbi_objective_publishing_industry_events.405.d: "Um telegrama foi entregue a [SCOPE.sCharacter('target_character').GetFullName], informando [SCOPE.sCharacter('target_character').GetHerHim] sobre o conteúdo de uma reunião secreta com [SCOPE.sCountry('target_country').GetName] diplomatas na villa de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] em [SCOPE.sState('target_state_2').GetName]. O [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] disse que o [ROOT.GetCountry.GetRuler.GetSheHe] deixaria ao governo a decisão de tornar público o seu conteúdo."
 pbi_objective_publishing_industry_events.405.f: "'Os diplomatas [SCOPE.sCountry('target_country').GetName] não só exigiram veementemente um encontro com [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], como também pediram a retirada do nosso [concept_interest] para a região [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] e, como prova do seu compromisso, abdicar. O [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] respondeu informando aos diplomatas que o [ROOT.GetCountry.GetRuler.GetSheHe] não poderia e não deveria assumir tal compromisso e que o [ROOT.GetCountry.GetRuler.GetSheHe] não tinha mais nada a dizer na reunião e que as negociações estavam encerradas'"
 pbi_objective_publishing_industry_events.405.a: "Torne isso público. Mas um pouco emocionante"
 pbi_objective_publishing_industry_events.405.a.tt: "As coisas se transformam em um [concept_diplomatic_incident]"
 pbi_objective_publishing_industry_events.405.b: "Não deve ser publicado"
 pbi_objective_publishing_industry_events.405.b.tt: "A situação será resolvida amigavelmente"
 pbi_objective_publishing_industry_events.500.t: "Acenda a luz"
 pbi_objective_publishing_industry_events.500.d: "À medida que os jornais começam a publicar fotos em vez de ilustrações, a realidade crua da nossa sociedade está a ser trazida à luz."
 pbi_objective_publishing_industry_events.500.f: "A foto mostra uma favela com pouca segurança e saneamento precário. Muitos trabalhadores são forçados a realizar trabalhos perigosos por baixos salários. As crianças são forçadas a trabalhar porque não podem frequentar a escola."
 pbi_objective_publishing_industry_events.500.a: "Precisamos nos concentrar na expansão do bem-estar."
 pbi_objective_publishing_industry_events.500.b: "[SCOPE.sCharacter('target_character_1').GetLastName] parece ter mudado de ideia sobre [GetLawGroup('lawgroup_childrens_rights').GetName]"
 pbi_objective_publishing_industry_events.500.c: "[SCOPE.sCharacter('target_character_2').GetLastName] parece ter mudado de ideia sobre [GetLawGroup('lawgroup_welfare').GetName]"
 pbi_objective_publishing_industry_events.500.e: "[SCOPE.sCharacter('target_character_3').GetLastName] parece ter mudado de ideia sobre [GetLawGroup('lawgroup_citizenship').GetName]"
 gaudi_transatlantic_cable_expedition_modifier: "Expedição Transatlântica de Cabo"
 gaudi_transatlantic_cable_expedition_failed_modifier: "Expedição de cabo transatlântico fracassada"