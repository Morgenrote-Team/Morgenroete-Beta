l_braz_por:
  
 mr_swe_nor_union_decision_1: "Nomear um novo Governador-Geral na Noruega" #NT!
 mr_swe_nor_union_decision_1_desc: "A posição em Christiania está vaga no momento. Devemos tomar uma decisão sobre quem nomear como o novo chefe do Governo Norueguês na ausência do Rei." #NT!
  
 mr_swe_nor_union_decision_2: "Exigir que os nossos ministros possam participar nos debates parlamentares" #NT!
 mr_swe_nor_union_decision_2_desc: "Atualmente, os ministros estão proibidos de ter voz em Stortinget. Isso não pode continuar." #NT!
  
 mr_swe_nor_union_decision_3: "Exigir que todos os símbolos da união sejam removidos da nossa bandeira" #NT!
 mr_swe_nor_union_decision_3_desc: "Deveríamos usar uma bandeira norueguesa limpa, sem símbolos sindicais." #NT!
  
 mr_swe_nor_union_decision_4: "Procurar escritórios consulares noruegueses" #NT!
 mr_swe_nor_union_decision_4_desc: "Com o aumento do transporte marítimo norueguês, os escritórios consulares suecos não são suficientes. Precisamos de escritórios noruegueses." #NT!
  
 mr_swe_nor_union_decision_5: "Exigir que o rei Carlos XV cumpra sua promessa" #NT!
 mr_swe_nor_union_decision_5_desc: "Com a coroação de Carlos XV como rei da Suécia e rei da Noruega, é hora de ele cumprir sua promessa de abolir o cargo de governador-geral." #NT!
  
 da_appoint_governor_general: "Nomear Governador-Geral" #NT!
 da_appoint_governor_general_desc: "Altera o Governador-Geral de um [concept_subject]. O [concept_liberty_desire] pode mudar dependendo do candidato escolhido." #NT!
 da_appoint_governor_general_action_name: "Nomear Governador-Geral" #NT!
 da_appoint_governor_general_action_notification_name: "[TARGET_COUNTRY.GetName] ganha novo Governador-Geral" #NT!
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetName] substituiu o Governador-Geral de [TARGET_COUNTRY.GetName] por um novo nomeado." #NT!
 da_appoint_governor_general_action_notification_third_party_name: "[TARGET_COUNTRY.GetName] ganha novo Governador-Geral" #NT!
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetName] substituiu o Governador-Geral de [TARGET_COUNTRY.GetName] por um novo nomeado." #NT!
  
 mr_swe_nor_union_event.1.t: "Nomeação de um novo Governador-Geral" #NT!
 mr_swe_nor_union_event.1.d: "O cargo de Governador-Geral em Christiania está vago. Talvez devêssemos considerar nomear alguém para preencher a função." #NT!
 mr_swe_nor_union_event.1.f: "De acordo com a Constituição Norueguesa de 1814, um Governador-Geral de nacionalidade sueca ou norueguesa poderia ser nomeado para liderar o governo norueguês na ausência do Rei, que reside em Estocolmo. Na Suécia, muitos acreditam que é essencial que um Governador-Geral, agindo em nome do Rei sueco, seja de nacionalidade sueca. Qualquer coisa em contrário é vista como potencialmente prejudicial à segurança nacional." #NT!
 mr_swe_nor_union_event.1.a: "Nomear um Governador-Geral Sueco" #NT!
 mr_swe_nor_union_event.1.b: "Nomear um Governador-Geral Norueguês" #NT!
 mr_swe_nor_union_event.1.c: "Deixe a posição vazia pelos próximos 5 anos" #NT!
  
 mr_swe_nor_union_event.2.t: "Ministros noruegueses" #NT!
 mr_swe_nor_union_event.2.d: "O Stortinget permite que ministros noruegueses participem de discussões parlamentares." #NT!
 mr_swe_nor_union_event.2.f: "O parlamento norueguês, Stortinget, votou a favor de permitir que ministros noruegueses participem de discussões e negociações parlamentares. Eles agora antecipam a aprovação do Rei para sua decisão." #NT!
 mr_swe_nor_union_event.2.a: "Recusar-se a reconhecer a sua decisão" #NT!
 mr_swe_nor_union_event.2.b: "Aprovar a decisão deles" #NT!
  
 mr_swe_nor_union_event.3.t: "A bandeira norueguesa" #NT!
 mr_swe_nor_union_event.3.d: "A Noruega exige o direito de usar uma bandeira norueguesa limpa." #NT!
 mr_swe_nor_union_event.3.f: "Stortinget, o parlamento norueguês, votou para adotar uma nova bandeira "limpa" sem os símbolos usuais da união sueco-norueguesa. Devemos endossar a decisão deles ou negar a eles o direito de usar a bandeira de sua escolha?" #NT!
 mr_swe_nor_union_event.3.a: "Eles manterão sua bandeira atual" #NT!
 mr_swe_nor_union_event.3.b: "Deixe-os usar a bandeira de sua escolha" #NT!
  
 mr_swe_nor_union_event.4.t: "Escritórios Consulares Noruegueses" #NT!
 mr_swe_nor_union_event.4.d: "A Noruega exige o direito de abrir seus próprios escritórios consulares ao redor do mundo." #NT!
 mr_swe_nor_union_event.4.f: "Os escritórios consulares da união eram administrados pelo Ministério das Relações Exteriores em Estocolmo, mas como a indústria naval norueguesa ganhou importância, os noruegueses argumentam que um escritório consular norueguês é necessário. \n Na Suécia, a demanda norueguesa é considerada o primeiro passo em direção a um serviço estrangeiro norueguês e uma potencial demanda futura pela independência norueguesa." #NT!
 mr_swe_nor_union_event.4.a: "Não há nada de errado com nossos escritórios" #NT!
 mr_swe_nor_union_event.4.b: "Quanto mais escritórios, melhor" #NT!
  
 mr_swe_nor_union_event.5.t: "A promessa de Carlos XV" #NT!
 mr_swe_nor_union_event.5.d: "A Noruega exige que o novo rei, Carlos XV, cumpra sua promessa de abolir o cargo de Governador-Geral em Christiania." #NT!
 mr_swe_nor_union_event.5.f: "Fazer promessas ao povo da Noruega enquanto herdeiro é uma coisa, ser o governante de dois países é outra. A posição deveria ser abolida como prometido, tendo um primeiro-ministro norueguês substituindo o Governador-Geral em Christiania?" #NT!
 mr_swe_nor_union_event.5.a: "Precisamos de uma pessoa própria em Christiania" #NT!
 mr_swe_nor_union_event.5.b: "Uma promessa deve ser cumprida" #NT!
  
 mr_swe_nor_union_event.6.t: "A promessa do príncipe herdeiro" #NT!
 mr_swe_nor_union_event.6.d: "Herdeiro do trono, Karl Bernadotte, promete abolir o cargo de Governador-Geral em Christiania após sua coroação" #NT!
 mr_swe_nor_union_event.6.f: "Em um esforço para garantir o favor entre o povo norueguês, o futuro rei promete solenemente eliminar o cargo de Governador-Geral em Christiania após sua coroação real. Reações entre proprietários de terras e forças armadas suecas, sem surpresa, lançam sombras sobre a proposta do jovem herdeiro." #NT!
 mr_swe_nor_union_event.6.a: "Espero que ele saiba o que está fazendo" #NT!
  
 mr_swe_nor_union_concessions_none: "Recusou concessões à Noruega" #NT!
 mr_swe_nor_union_concessions_minor: "Pequenas concessões à Noruega" #NT!
 mr_swe_nor_union_concessions_major: "Grandes concessões à Noruega" #NT!
  
 mr_swe_nor_clean_flag: "Noruega remove todos os símbolos da união de sua bandeira" #NT!
