 objective_thriving_culture_name_BAV: "Baviera"
 objective_thriving_culture_desc_BAV: "Culturalmente, a Baviera sempre foi capaz de competir com os grandes estados alemães. O século XIX foi uma época em que a arte e a arquitetura estavam crescendo em Munique. Além de Walhalla e Neuschwanstein, a Baviera também é o local onde o Archaeopteryx foi encontrado, o lar da Secessão de Munique e o local de nascimento de Spitzweg. Como uma potência média alemã, a Baviera pode se defender contra seus grandes vizinhos confiando menos nos militares e mais na ciência e na arte?"
 objective_thriving_culture_name_MEX: "México"
 objective_thriving_culture_desc_MEX: "À primeira vista, o México pode não parecer a primeira escolha quando se trata de fazer uma cultura florescer. Mas sua rica história arqueológica é promissora. Em teoria, o México poderia até mesmo alcançar um avanço na Passagem do Noroeste. Se o país, abalado por crises, encontrar harmonia, ele pode coroar seu sucesso esteticamente com o Palacio de Bellas Artes."
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete] é um mod que foca em ciência, artes e cultura. Inclui muitas novas mecânicas e muito conteúdo. Para obter uma visão geral do mod, tente usar os conceitos acessando o menu e a Vickypedia ou passando o mouse sobre [Concept('concept_morgenroete','$concept_morgenroete_concept$')].\n\nPara acessar mais do conteúdo do Morgenröte, clique no botão nesta entrada do diário ou naquele próximo à barra lateral. O botão neste lançamento contábil manual deve sempre funcionar."
 je_objective_cradle_of_culture_tt: "Seja a primeira nação a inventar #ORANGE Impressionismo#!, #ORANGE Expressionismo#! ou #ORANGE Art Nouveau#!."
 mr_divider_for_je: "              @divider_start!@divider_mid!@divider_mid!@divider_mid!@divider_mid!@divider_mid!@divider_end!"
 objective_thriving_culture_name_SWE: "Suécia"
 objective_thriving_culture_desc_SWE: "Nos últimos 100 anos, a Suécia emergiu como uma nação científica líder, fazendo contribuições significativas para a ciência, incluindo um sistema para nomear organismos, a escala de temperatura Celsius e um sistema de símbolos de elementos químicos. A Suécia pode manter sua posição na vanguarda da ciência ou é hora de redirecionar a atenção para atividades culturais, nutrindo escritores e compositores?"
