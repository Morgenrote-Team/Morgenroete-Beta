 je_mr_scientific_conferences: "Conferências Científicas"
 je_mr_scientific_conferences_reason: "Qual a idade da Terra? De onde vem o homem? Quão confiável é a Bíblia como fonte histórica? O universo é infinito – e o que são realmente as galáxias? Ao longo de cem anos, não apenas a ciência como tal, mas também a visão de mundo das pessoas mudou significativamente. A teoria da evolução abalou a certeza do homem tanto quanto a teoria da relatividade. As conferências científicas pretendem esclarecer algumas das questões fundamentais, fazendo com que cientistas internacionais as discutam."
