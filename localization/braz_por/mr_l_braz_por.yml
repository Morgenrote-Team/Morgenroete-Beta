 je_mr_archaeology: "Arqueologia"
 je_mr_archaeology_reason: "O século XIX e o início do século XX testemunharam um rápido desenvolvimento no campo da pesquisa da antiguidade: da escavação de tesouros à ciência séria. A escavação de Tróia por Heinrich Schliemann e a descoberta do túmulo de Tutancâmon por Howard Carter são apenas dois dos destaques mais famosos desta época. Ao mesmo tempo, mostram que não só a sede científica, mas também o prestígio nacional desempenharam um papel importante na recuperação de artefactos valiosos. Com a decifração (quase) completa dos hieróglifos egípcios por Karl Richard Lepsius em 1837, esta nova era iria começar."
 mr_romantic_composer_button: "Contrate um novo [concept_elgar_composer] (Romantismo)"
 mr_composer_button_desc: "Ao contrário do [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], o [Concept('concept_elgar_composer','$concept_elgar_composers$')] comum é responsável pelas operações do dia-a-dia. Eles podem ser contratados como regentes e dar ao seu país um bônus passivo [concept_elgar_musical_tradition]. Um compositor pode ser contratado três vezes por jogo, o que exige pesquisa em uma tecnologia específica (Romantismo, Irracionalismo, Neoclassicismo/Nova Objetividade/Art Déco). Um país só pode apoiar um compositor comum e é necessário um investimento de dez anos na cultura musical do país."
 mr_wagnerian_composer_button: "Contrate um novo [concept_elgar_composer] (Irracionalismo)"
 mr_modern_composer_button: "Contrate um novo [concept_elgar_composer] (Moderno)"
 mr_appoint_conductor_button: "Nomeie um Maestro Chefe"
 mr_appoint_conductor_button_desc: "Os maestros dirigem o negócio musical nacional, especialmente os [Concept('concept_elgar_opera','$concept_elgar_opera_house$')] líderes de um país. Na casa de ópera pode ser-lhes confiada uma tarefa específica durante três anos: regência, composição ou digressão. Desta forma, são semelhantes ao [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], embora os seus rendimentos para o [concept_elgar_musical_tradition] sejam mantidos dentro de limites administráveis."
 mr_national_conservatory_button: "Fundou um Conservatório Nacional"
 mr_national_conservatory_button_desc: "With a Conservatory, there is a chance that characters with the Composer trait will appear over time without having to hire them. The chance is very small, but it is there. The probability can be increased with a ballet school in one of our opera schools."
 mr_santa_cecilia_button: "Faça de Santa Cecília uma Academia"
 mr_santa_cecilia_button_desc: "A Accademia di Santa Cecilia foi fundada pela bula papal 'Ratione congruit' de Sisto V em 1585 na forma de uma congregação. Em 1838, a Congregação de Santa Cecília foi oficialmente nomeada Academia e depois Academia Pontifícia. Seus membros naquela época incluíam Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod e Meyerbeer. Um de seus membros honorários foi a Rainha Vitória. Na Itália unida, tornou-se um conservatório líder."
 mr_leipzig_conservatory_button: "Fundou o Conservatório de Leipzig"
 mr_leipzig_conservatory_button_desc: "A tradicional cidade musical de Leipzig, onde Johann Sebastian Bach já atuava, oferecia ótimas condições para a fundação de uma fábrica de talentos musicais e acadêmicos no início do século XIX. Quatro cidadãos comprometidos da cidade, nomeadamente o advogado Heinrich Conrad Schleinitz (segundo diretor), o diretor distrital de Leipzig Johann Paul von Falkenstein e o Conselheiro da Corte Real Saxônica Johann Georg Keil, bem como o Gewandhaus Kapellmeister Felix Mendelssohn Bartholdy colocaram as ideias anteriores em prática."
 mr_petrograd_conservatory_button: "Fundou o Conservatório de Petrogrado"
 mr_petrograd_conservatory_button_desc: "Por iniciativa da Grã-Duquesa Elena Pavlovna, Anton Rubinstein, Andrei Nikolayevich Markovich e outras personalidades da sociedade e da vida musical, foi fundada a Sociedade Musical Russa, de cujas aulas de música foi fundado o primeiro conservatório da Rússia. Anton Rubinstein foi o primeiro diretor do conservatório e professor de piano. O primeiro graduado a completar seus estudos de composição aqui foi Peter Tchaikovsky. Nikolai Andreyevich Rimsky-Korsakov teve um papel particularmente influente como professor de composição e instrumentação e chefe da turma de orquestra."
 mr_bayreuth_button: "Estabelecer o Festival Richard Wagner"
 mr_bayreuth_button_desc: "Richard Wagner há muito sonha em ter seu próprio salão de festivais, onde suas maiores obras são apresentadas todos os anos. Tal lugar poderia rapidamente se tornar um local de peregrinação para todos os entusiastas da música e seria um memorial vivo e duradouro em sua homenagem."
