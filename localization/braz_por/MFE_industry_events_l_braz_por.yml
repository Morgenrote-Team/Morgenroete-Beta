 mfe_industry_events.1.t:0 "Surge a Companhia Ferroviária"
 mfe_industry_events.1.d:0 "Um político com ligações, [SCOPE.sCharacter('rich_dude').GetFullName], quer financiar uma nova empresa ferroviária, mas o [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] não apoia a nova proposta."
 mfe_industry_events.1.f:0 "\"A febre ferroviária está varrendo o mundo inteiro, com muitas oportunidades de ganhar dinheiro, mas temos que agir, e agir rapidamente. O que você me diz?\""
 mfe_industry_events.1.a:0 "Permitir que [SCOPE.sCharacter('rich_dude').GetFullName] continue os negócios"
 mfe_industry_events.1.b:0 "Bloqueie quaisquer esforços adicionais"
 mfe_industry_events.1.c:0 "Subsidiar seus esforços"
 mfe_industry_events.2.t:0 "Próspera empresa ferroviária"
 mfe_industry_events.2.d:0 "As novas ferrovias em [SCOPE.sState('railway_state').GetName] são um sucesso estrondoso entre os habitantes locais, que as abraçaram de todo o coração."
 mfe_industry_events.2.f:0 "\"Antigamente demorava três horas para viajar de [SCOPE.sState('railway_state').GetName] a [ROOT.GetCountry.GetCapital.GetName], mas essas novas rotas encurtam o tempo de viagem pela metade.\""
 mfe_industry_events.2.a:0 "Isso é ótimo!"
 mfe_industry_events.3.t:0 "Companhia ferroviária em apuros"
 mfe_industry_events.3.d:0 "Mudanças súbitas no mercado de ações pressionaram o [SCOPE.gsInterestGroup('ig_industrialists').GetName], esgotando as fontes de capital, e as empresas ferroviárias sobrecarregadas no [SCOPE.sState('railway_state').GetName] estão falindo."
 mfe_industry_events.3.f:0 "\"É claro que a imprensa está se divertindo muito com isso - todos os dias há artigos escritos pelos membros do [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] cantando nosso desespero - algo deveria ser feito.\""
 mfe_industry_events.3.a:0 "Subsidiar os trilhos!"
 mfe_industry_events.3.b:0 "Os [SCOPE.gsInterestGroup('ig_industrialists').GetName] eram os que queriam um mercado livre..."
 subsidize_rail_state_tt:0 "Comece a subsidiar as Ferrovias em [SCOPE.sState('railway_state').GetName]"