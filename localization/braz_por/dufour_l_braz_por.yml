 NEUCHATEL_ADJ: "Neuchâtel"
 je_group_dufour_confoederatio_helvetica: "Morgenröte: Confederação Helvética"
 je_dufour_carte_dufour: "Mapa topográfico da Suíça"
 je_dufour_carte_dufour_reason: "Desde 1822, o levantamento topográfico é assunto da Confederação Suíça e não dos cantões. O General Dufour foi encarregado de realizar o levantamento da Suíça de acordo com padrões uniformes e de registrar os resultados do levantamento em um mapa. Isto levará muito tempo e custará um pouco, mas ajudará a desenvolver ainda mais a Suíça."
 je_dufour_carte_dufour_goal: "As pesquisas foram concluídas e o mapa foi publicado."
 dufour_creating_carte_dufour_modifier: "Criando Carte Dufour"
 dufour.900.t: "Publicação da Carte Dufour"
 dufour.900.d: "Após anos de trabalho árduo, o mapa topográfico da Suíça está finalmente concluído e todas as 25 folhas foram publicadas ou serão publicadas em pouco tempo."
 dufour.900.f: "Finalmente você pode ver a primeira impressão da Carte Dufour. As linhas finas mostram montanhas, cidades e até casas. Nunca antes existiu um mapa tão preciso da Suíça!\n\n#b Historicamente #! Dufour e sua equipe trabalharam no mapa de 1832 a 1865. As duas primeiras folhas foram publicadas em 1845 e a última das 25 folhas foi publicada em 1865. O mapa topográfico foi impresso em processo de impressão de gravura e apresentava escala de 1:100.000. Curiosamente, Dufour foi o primeiro general da Suíça moderna e liderou o exército suíço contra o Sonderbund na guerra civil suíça (Sonderbundskrieg) em 1848.\n\n#b Hoje #! a Carte Dufour está localizada no Schweizer Landesmuseum em Zurique. Mas você pode encontrar o mapa online, pois foi publicado com muitos outros mapas nacionais da Suíça."
 dufour.900.g: "Deveríamos dar o nome de Dufour a uma montanha!"
 dufour_carte_dufour_modifier: "Carta Dufour"
 dufour_add_x_carte_dufour_progress_minus_x_tt: "Perder [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progresso do mapeamento#!."
 dufour_add_x_carte_dufour_progress_minus_1_tt: "Perder [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progresso do mapeamento#!."
 dufour_add_x_carte_dufour_progress_0_tt: "Não ganhe #V Progresso de mapeamento#!."
 dufour_add_x_carte_dufour_progress_plus_1_tt: "Ganhe [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progresso do Mapeamento#!."
 dufour_add_x_carte_dufour_progress_plus_x_tt: "Ganhe [SCOPE.GetValue('carte_dufour_progress_amount')|0+] #V Progresso do Mapeamento#!."
 dufour.901.t: "Moradores perturbados pela pesquisa"
 dufour.901.d: "Durante o trabalho de topografia em [SCOPE.sState('dufour_mapping_scope').GetName], os nossos topógrafos entraram em conflito com os habitantes rurais da região. Aparentemente eles estavam perturbando um funeral com seu trabalho."
 dufour.901.f: "\"É melhor ir agora! Você não ouviu? Não precisamos do seu mapa, sempre encontramos nosso próprio caminho para casa!\""
 dufour.901.g: "Minhas condolencias."
 dufour.901.h: "Continuar!"
 dufour.902.t: "Agrimensor morto nas montanhas"
 dufour.902.d: "Enquanto faziam o levantamento de uma das altas montanhas de [SCOPE.sState('dufour_mapping_scope').GetName], nossos topógrafos foram surpreendidos por uma tempestade. Choveu e choveu. Os topógrafos procuraram abrigo em sua tenda, mas um raio matou um deles e feriu o outro."
 dufour.902.f: "\"Minha perna foi atingida por um raio, mas depois de alguns dias melhorou. Finalmente consegui descer e chegar em segurança. Foi uma provação!\""
 dufour.902.g: "Meu Deus!"
 dufour.903.t: "Moradores ajudam topógrafos"
 dufour.903.d: "Nossos Topógrafos quase se perderam em [SCOPE.sState('dufour_mapping_scope').GetName], mas alguns moradores locais conseguiram ajudá-los e até ofereceram um lugar para ficar e informações sobre os caminhos mais rápidos. Isso certamente ajudará o mapa a ser concluído mais rapidamente!"
 dufour.903.f: "\"Você pode trabalhar mais tarde. Primeiro temos que beber juntos. Este é o nosso melhor Kirsch!\""
 dufour.903.g: "Agradecemos a ajuda!"
 dufour.904.t: "Equipamento perdido!"
 dufour.904.d: "Um de nossos topógrafos perdeu seu equipamento enquanto subia uma montanha em [SCOPE.sState('dufour_mapping_scope').GetName]. Ou teremos que fornecer novos equipamentos ou o progresso será retardado."
 dufour.904.f: "\"Simplesmente caiu... não consegui segurar... Quem diria que teríamos que consertar o equipamento em nossas mochilas?\""
 dufour.904.g: "Eles têm que lidar."
 dufour.904.h: "Obtenha novos instrumentos!"
 dufour.905.t: "Blüemlisalp ou Frau"
 dufour.905.d: "Os moradores de [SCOPE.sState('dufour_mapping_scope').GetName] têm dois nomes para a mesma montanha: Blüemlisalp e Frau. Qual nome devemos escolher?"
 dufour.905.f: "\"Não podemos simplesmente jogar uma moeda?\""
 dufour.905.g: "Bluemlisalp!"
 dufour.905.h: "Frau!"
 dufour.906.t: "Surveyor acelera o trabalho no Map"
 dufour.906.d: "Graças ao apoio de [SCOPE.sCharacter('surveyor_scope').GetFullName], um topógrafo conhecido, o progresso na criação do mapa topográfico deu um grande salto."
 dufour.906.f: "\"Yes, this instrument is for measuring, not for staring at stars.\""
 dufour.906.g: "Ótimo trabalho!"
 dufour.907.t: "Matemático ajuda com cálculos"
 dufour.907.d: "[SCOPE.sCharacter('mathematician_scope').GetFullName], que tem formação em matemática, conseguiu ajudar nossa equipe a resolver diversos cálculos. Isso ajudará a terminar o mapa mais rapidamente."
 dufour.907.f: "\"Who would have known that mathematics are actually useful!\""
 dufour.907.g: "Ainda bem que temos matemáticos!"
 dufour.908.t: "Voo de balão inspira artistas"
 dufour.908.d: "Graças a [SCOPE.sCharacter('balloonist_scope').GetFullName], um conhecido balonista, alguns artistas e agrimensores puderam ver o mundo de cima. Os artistas inspiraram-se na vista deslumbrante e têm uma ideia mais realista de como representar o nosso país num mapa."
 dufour.908.f: "\"Oh, Deus! Espero que não batamos!\""
 dufour.908.g: "Ver o mundo de cima é impressionante!"
 dufour.910.t: "Primeiras folhas publicadas: Jura e Basel"
 dufour.910.d: "As primeiras folhas do nosso novo mapa topográfico foram publicadas e concentram-se na área ao redor de Basileia e do Jura."
 dufour.910.f: "The Jura is a range of small mountains that stretches from Savoy all the way to Basel and some Foothills even to Lake Constance. It encompases parts of Vaud, Neuchâtel, Bern, both Basel, Solothurn and Aargau. many big cities are close to the Jura.\n Basel for example is one of the most important cities of Switzerland. Basel borders both the Alsace as well as Baden and is well connected thanks to the Rhine River.\nJust a few years ago the Canton of Basel was divided into the Cantons of Basel Stadt (City) and Basel Land (Countryside). Interestingly the countryside was more liberal during that time, while the city was ruled by Patricians. Basel is a quite international and has an old University that harbored great thinkers like Leonhard Euler and Daniel Bernoulli.\nGeneva on the other hand is a big city surrounded by France. during Napoléon's reign it was part of France and returned to Switzerland in 1815. Now the first private banks get founded and Geneva slowly becomes a hub of the financial sector. Additionally it was home to Voltaire and Jean-Jaques Rousseau, two of Switzerland's greatest philosophers."
 dufour.910.g: "Interessante!"
 dufour.910.h: "Não quero ouvir nada sobre a Suíça!"
 dufour.910.no_more_information_tt: "Você #n não receberá mais #! eventos que descrevem apenas a Suíça, sem quaisquer efeitos."
 dufour.911.t: "Novas planilhas publicadas: Schaffhausen, Thurgau e St."
 dufour.911.d: "Mais folhas foram publicadas. Desta vez, o foco está no norte e leste da Suíça, com os cantões de Schaffhausen, Thurgau e St. Gallen."
 dufour.911.f: "Schaffhausen lies in the Northeast of Switzerland and is mostly surrounded by Germany. The city itself is located right next to the Rhine and very close to the Rhinefalls at Neuhausen. Thanks to the energy of the river, Schaffhausen was able to industrialize quite early and thanks to the rural people it became a liberal Canton in 1831.\nThurgau was ruled by another Canton that changed every year until the French Revolution spread to Switzerland. It is a full Canton since 1815 and a center of textile industries and agriculture. The high amount of pear trees lead to the name \"Mostindien\" meaning Cider India which is a play on Ost (east) and Most (Cider). Thurgau is one of the liberal Cantons since 1831 and wants more centralization in Switzerland.\nSt. Gallen is a split Canton in regards to religion and was once the seat of monastery and a Prince Bishopric. It is a center of the textile industry and a liberal Canton. The Canton of St. Gallen surrounds both Appenzell Cantons and the remarkable Säntis mountain range, a part of the Alps."
 dufour.912.t: "Novas planilhas publicadas: Grisões e os Alpes Réticos"
 dufour.912.d: "Mais folhas foram publicadas. Desta vez, o foco está no enorme Cantão dos Grisões e nos Alpes Réticos."
 dufour.912.f: "Grisons is not only the biggest Canton of Switzerland, it is also home to the Rumantsch speaking people, a minority in Switzerland and one group of the Alpine Romance language also found in South Tyrol and Friuli.\nGrisons is sparsely populated as it is dominated by the Alps. Particularly the Rhaetian Alps named after the ancient Rhaeti tribes. Grisons is mostly an agrarian Canton that profits from the transport of goods over the Alpine passes as well. The loss of some now Italian lands after the Napoleonic Wars was a catastrophe but Grisons still has some areas that have a majority of Italian speaking people making it a Canton with three language groups: German, Rumantsch and Italian\nPolitically Grisons is dominated by its municipalities that have a lot of power. But the liberal forces that want to centralize the Canton more gained ground lately."
 dufour.913.t: "Novas planilhas publicadas: Suíça Central"
 dufour.913.d: "Mais folhas foram publicadas. Desta vez, o foco está nos muitos cantões da Suíça Central."
 dufour.913.f: "A Suíça Central é o berço da \"Eidgenossenschaft”, a Confederação Suíça. Primeiro, os cantões de Uri, Schwyz e Underwalden (hoje separados em Nied- e Obwalden) formaram uma aliança frouxa que mais tarde foi expandida cada vez mais.\nA parte principal da economia dos muitos pequenos cantões na Suíça central é o transporte de mercadorias. principalmente na rota de São Gotardo. Além dessa agricultura, a exploração madeireira e alguma produção têxtil eram importantes na região.\nA Suíça politicamente central era dominada por católicos conservadores. Enquanto o cantão de Lucerna era o mais liberal dos cantões da Suíça Central graças à cidade de Lucerna, os cantões menores de Uri, Schwyz, Ob- e Nidwalden, Glarus e Zug eram ainda mais conservadores e dominados pelas classes altas locais. .\nSchwyz foi quase dividido em dois cantões na década de 1830, quando as partes externas do cantão exigiam igualdade e participação política. Depois que o interior de Schwyz foi ocupado pelas tropas do Tagsatzung (o \"governo\" da Suíça), o interior de Schwyz concordou com esses pontos no final e Schwyz permaneceu em um cantão."
 dufour.914.t: "Novas planilhas publicadas: Ticino"
 dufour.914.d: "Mais folhas foram publicadas. Desta vez, o foco está no cantão mais meridional da Suíça, o Ticino."
 dufour.914.f: "Ticino é a única possessão remanescente da Confederação Suíça na Itália. Como uma conquista dos séculos XV e XVI, a área foi dominada pelos lugares antigos (cantões) até a fundação da República Helvética. Desde 1803, no entanto, tem sido um cantão de pleno direito.\nOs setores económicos dominantes no Ticino eram a agricultura e a exploração madeireira. A produção de seda também era um negócio lucrativo. Produtos agrícolas que não cresciam em outros lugares da Suíça podiam ser cultivados no Ticino: castanhas, tabaco, seda e frutas diversas, por exemplo.\nEm 1830, o Ticino foi um dos primeiros cantões a ganhar uma constituição liberal. A situação política no Cantão, contudo, é instável, pois os liberais querem centralizar o Estado, enquanto os conservadores preferem a autonomia regional."
 dufour.915.t: "Novas planilhas publicadas: Berna e Friboug"
 dufour.915.d: "Mais folhas foram publicadas. Desta vez focado em Berna e Friburgo."
 dufour.915.f: "Both the Canton of Bern and the Canton of Fribourg have French and German speaking parts. While Bern is a huge Canton Fribourg is a lot smaller. Bern reaches from the Jura mountain range all the way to the Alps in the south. Fribourg is located west of Bern and hosts towns like Fribourg and Gruyère where a well known cheese comes from.\nThe Canton of Bern is mostly dominated by agriculture but watchmaking has slowly spread from neighboring Neuchâtel to the Bernese Jura. Hopefully industrialization will soon help develop the Canton.\nPolitically Bern was long dominated by the Patricians of the city itself but in the 1830s the liberals from the smaller towns in the Canton were able to draw up a new constitution that balanced the rights of the people of Berne and the rural population.\nFribourg is a Canton dominated by agriculture, especially grain production and cheese. The cheese from Gruyère is especially well known.\nPolitically, Fribourg was dominated by the conservative Patricians and the Clergy. Even when a new constitution was issued in 1831, the Canton remained conservative and in the elections the conservatives still gained the majority of the votes."
 dufour.916.t: "Novas planilhas publicadas: Zurique e Argóvia"
 dufour.916.d: "Mais folhas foram publicadas. Desta vez concentrou-se em Zurique e Aargau."
 dufour.916.f: "Both Zürich and Aargau are located in the north of Switzerland mostly in the relatively flat Mittelland (central land). Both Cantons are rapidly industrializing and might become industrial powerhouses quite soon.\nZürich is one of the old Cantons and was dominated by the city itself for quite a long time. Zürich is a center of the mechanized textile industry as well as the machine industry. Many factories are located at rivers and get their energy from those rivers.\nPolitically Zürich was dominated by the Patricians of the City until 1830/31 when the people of the countryside forced a new constitution to be enacted. In the next elections, the liberals and radicals gained a majority and are now dominating the politics in Zürich.\nAargau was ruled by the other Cantons until the time of the Helvetic Republic. Now that it is a full Canton, Aargau is industrializing fast, especially with textile factories. The many rivers of Aargau allowed for factories to get their energy from the water and lead to many decentralized factories.\nAargau was basically a counterweight to the cantons of Zurich and Bern and nearly did not become a full Canton in 1814/15. Even after 1815 Aargau stayed quite liberal unlike other Cantons. In 1831, a new constitution gave the population even more rights. The government responded to the resistance of the Catholic population to the increased control of the church by the state by occupying rebellious regions."
 dufour.917.t: "Novas folhas publicadas: Vaud e Valais"
 dufour.917.d: "Mais folhas foram publicadas. Desta vez focado em Vaud e Valais."
 dufour.917.f: "Valais is a big valley in the very south of Switzerland mostly separated from the rest of the country by the Alps. The Rhône river flows through the valley and then into the Lac Léman. The Northern coast of the Lake is part of Vaud, but the Canton extends from Geneva and the Alps to the Jura.\nVaud is still dominated by agriculture but the liberals started to implement changes to grow the industry since 1826. Time will tell if Vaud will remain an agricultural Canton or become a center of industry.\nThanks to diplomatic skill, the canton of Vaud was confirmed after Napoleon's defeat. In return, however, the canton had to accept a more conservative constitution. Thanks to the authoritarian leadership, the liberals gained ground and were able to push through a new constitution in 1830. In the meantime, the radicals were gaining ground and trying to promote democratization.\nValais is dominated by agriculture and its rural population. There is no significant industry and outside connections are limited.\nThe main political conflict in Valais was the one between the German speaking upper Valais and the French speaking lower Valais. Upper Valais has been the dominant part of the Canton even though the Lower Valais had a higher population. The question is whether the liberals and radicals of the lower valley are in a position to promote the democratization of Valais or whether the old forces can stabilize their rule."
 dufour.920.t: "Crescem vozes para trazer o íbex de volta à Suíça"
 dufour.920.d: "Robert Mader, um hoteleiro dono do hotel \"Walhalla\" em St. Gallen, quer trazer o íbex alpino de volta à Suíça. Ele propõe construir um parque animal em St. Gallen, onde prepararia um recinto para criar os íbexes e depois devolvê-los à natureza."
 dufour.920.f: "\"O Ibex é um símbolo nacional da Suíça. Temos que trazê-lo de volta!\""
 dufour.920.g: "Devolveremos o Ibex!"
 dufour.920.h: "Que perda de tempo!"
