l_braz_por:
 dufour_celebrate_schwingfest_decision: "Crie o primeiro Eidgenössisches Schwing- und Älplerfest"
 dufour_celebrate_schwingfest_decision_desc: "Schwingen tornou-se uma espécie de desporto nacional suíço. Vamos torná-lo o verdadeiro desporto nacional celebrando um Schwing- und Älplerfest!"
 dufour_schwingfest_modifier: "Eidgenössisches Schwing- und Älplerfest"
 dufour_schwingerkonig: "Schwingerkönig"
 dufour_schwingerkonig_desc: "Este personagem ganhou o Eidgenössisches Schwingfest na Suíça. Ele é visto como um campeão pelas massas."
 dufour.1000.t: "Os dois Appenzells não implementam o sufrágio feminino"
 dufour.1000.d: "O sufrágio feminino foi introduzido na Suíça. Infelizmente, alguns cantões são um pouco lentos. Nos cantões de Appenzell Innerhoden e Appenzell Ausserrhoden, as mulheres podem participar nas votações e eleições federais, mas não nas dos municípios e do cantão. Seria primeiro necessária uma alteração à Constituição cantonal e esta teria de ser aprovada numa Landsgemeinde. O processo pode levar vários anos. Devemos intervir e forçar o povo de Appenzell a introduzir o sufrágio feminino ou esperar e esperar que eles próprios o introduzam?"
 dufour.1000.f: "\"Certamente nossos homens estão fazendo isso corretamente!\"\n\n#b Historicamente#! o sufrágio feminino na Suíça demorava muito tempo. Somente em 1971 foi introduzido para votos e eleições suíças. Em alguns cantões demorou ainda mais. Os dois Appenzells demoraram mais. Appenzell Ausserrhoden adotou o sufrágio feminino em 1989 em Landsgemeinde. Appenzell Innerrhoden, por outro lado, teve de ser forçada pelo Tribunal Federal a introduzir o sufrágio feminino em 1990.\nA Suíça é, portanto, um dos países que introduziu o sufrágio feminino mais recentemente. Os países que introduziram anteriormente o sufrágio feminino incluem o Afeganistão, a Finlândia, os EUA e muitos outros."
 dufour.1000.g: "Forçá-los a deixar as mulheres votarem."
 dufour.1000.h: "Certamente eles decidirão em breve dar o voto às mulheres."
 dufour_womens_suffrage_appenzell_effects_tt:0 "Você não força os dois cantões a introduzir o sufrágio feminino. Você receberá um evento se houver progresso no assunto ou se sua decisão for necessária."
 dufour.1001.t: "Derrota na votação do sufrágio feminino em Appenzell"
 dufour.1001.d: "O governo de Appenzell Ausserrhoden e Appenzell Innerrhoden propôs legislação para introduzir o sufrágio feminino a nível cantonal. O projeto foi rejeitado. Isto significa que as mulheres de Appenzell ainda não estão autorizadas a votar. Poderíamos forçar os dois Appenzells a concederem os seus direitos às mulheres, mas isso certamente colocaria a população local contra nós."
 dufour.1001.f: "\"Levante a mão se quiser introduzir o sufrágio feminino em nível cantonal!” Muitas mãos se ergueram no ar. Mas havia o suficiente? \"Você rejeitou a introdução do sufrágio feminino em nível cantonal!\"\n\n#b Historicamente#!, o sufrágio feminino na Suíça demorou muito. Somente em 1971 foi introduzido para votos e eleições suíças. Em alguns cantões demorou ainda mais. Os dois Appenzells demoraram mais. Appenzell Ausserrhoden adotou o sufrágio feminino em 1989 em Landsgemeinde. Appenzell Innerrhoden, por outro lado, teve de ser forçada pelo Tribunal Federal a introduzir o sufrágio feminino em 1990.\nA Suíça é, portanto, um dos países que introduziu o sufrágio feminino mais recentemente. Os países que introduziram anteriormente o sufrágio feminino incluem o Afeganistão, a Finlândia, os EUA e muitos outros."
 dufour.1001.g: "Agora estou farto! Basta forçá-los a introduzir o sufrágio feminino!"
 dufour.1001.h: "Vamos esperar mais um pouco."
 dufour.1002.t: "Ambos Appenzell introduzem o sufrágio feminino"
 dufour.1002.d: "Quem teria pensado aquilo? Ambos Appenzell introduziram o sufrágio feminino levantando as mãos em suas assembleias regionais. Isto significa que as mulheres podem agora votar em qualquer lugar na Suíça."
 dufour.1002.f: "\"Levante a mão se quiser introduzir o sufrágio feminino em nível cantonal!” Muitas mãos se ergueram no ar. Mas havia o suficiente? \"Você aprovou a introdução do sufrágio feminino em nível cantonal!\" Aplausos explodiram!\n\n#b Historicamente#!, o sufrágio feminino na Suíça demorava muito tempo. Somente em 1971 foi introduzido para votos e eleições suíças. Em alguns cantões demorou ainda mais. Os dois Appenzells demoraram mais. Appenzell Ausserrhoden adotou o sufrágio feminino em 1989 em Landsgemeinde. Appenzell Innerrhoden, por outro lado, teve de ser forçada pelo Tribunal Federal a introduzir o sufrágio feminino em 1990.\nA Suíça é, portanto, um dos países que introduziu o sufrágio feminino mais recentemente. Os países que introduziram anteriormente o sufrágio feminino incluem o Afeganistão, a Finlândia, os EUA e muitos outros."
 dufour.1002.g: "Demorou mais do que eu imaginava!"
 dufour.1003.t: "Mais fracassos na introdução do sufrágio feminino nos dois Appenzell"
 dufour.1003.d: "Já foi a segunda tentativa de alguns Appenzellers progressistas de introduzir o sufrágio feminino. Mas esta tentativa também não teve sucesso. Poderíamos ainda forçar a introdução ou esperar ainda mais e esperar que o povo de Appenzell introduza voluntariamente o sufrágio feminino."
 dufour.1003.f: "\"Levante a mão se quiser introduzir o sufrágio feminino em nível cantonal!” Muitas mãos se ergueram no ar. Mas havia o suficiente? \"Você rejeitou a introdução do sufrágio feminino em nível cantonal!\"\n\n#b Historicamente#!, o sufrágio feminino na Suíça demorou muito. Somente em 1971 foi introduzido para votos e eleições suíças. Em alguns cantões demorou ainda mais. Os dois Appenzells demoraram mais. Appenzell Ausserrhoden adotou o sufrágio feminino em 1989 em Landsgemeinde. Appenzell Innerrhoden, por outro lado, teve de ser forçada pelo Tribunal Federal a introduzir o sufrágio feminino em 1990.\nA Suíça é, portanto, um dos países que introduziu o sufrágio feminino mais recentemente. Os países que introduziram anteriormente o sufrágio feminino incluem o Afeganistão, a Finlândia, os EUA e muitos outros."
 dufour.1003.g: "Malditos caipiras. Eles tiveram sua chance, agora estamos forçando-os!"
 dufour.1003.h: "Não podemos simplesmente minar o processo democrático."
 dufour.1004.t: "Tribunal Federal força Appenzell Innerrhoden a introduzir o sufrágio feminino"
 dufour.1004.d: "Depois que Appenzell Ausserrhoden aceitou o sufrágio feminino em seu último Landsgemeinde, o Tribunal Federal tomou uma decisão no caso de Appenzell Innerrhoden. Appenzell Innerrhoden deve introduzir o sufrágio feminino. A questão foi assim decidida de uma vez por todas."
 dufour.1004.f: "\"O Tribunal Federal conclui que Appenzell viola a constituição da Confederação Suíça. As mulheres têm os mesmos direitos que os homens. Appenzell Innerrhoden é obrigada a introduzir o sufrágio feminino imediatamente!\"\n\n#b Historicamente, o sufrágio feminino na Suíça ocorreu muito tempo. Somente em 1971 foi introduzido para votos e eleições suíças. Em alguns cantões demorou ainda mais. Os dois Appenzells demoraram mais. Appenzell Ausserrhoden adotou o sufrágio feminino em 1989 em Landsgemeinde. Appenzell Innerrhoden, por outro lado, teve de ser forçada pelo Tribunal Federal a introduzir o sufrágio feminino em 1990.\nA Suíça é, portanto, um dos países que introduziu o sufrágio feminino mais recentemente. Os países que introduziram anteriormente o sufrágio feminino incluem o Afeganistão, a Finlândia, os EUA e muitos outros."
 dufour.1004.g: "Finalmente!"
 dufour.2000.t: "Primeiro Eidgenössisches Schwing- und Älplerfest em Biel"
 dufour.2000.d: "Many Schwinger participated in the first Eidgenössisches Schwing- und Älplerfest. The event was held in the town of Biel and was planned by the Swiss Schwing clubs after the sport became more and more popular. After the immense success the participants and planners are looking forward to the next event in three years. And many Schwinger are eager to win the event and the first price - a strong bull."
 dufour.2000.f: "Two huge bodies are wrestling each other, neither one wants to fall. Both opponents go down under the cheers of the audience. Alfred Niklaus is on top. He is the first Schwingerkönig! But first he helps his opponent to get up and cleans his back from saw dust.\n\n#b Historically #! Schwingen - a form of wrestling with very strict rules - was a popular sport in Switzerland, although its origin can't be traced well. But the first local Schwingfest was held at the Unspunnenmatte in Interlaken. The first Eidgenössisches Schwing- und Älplerfest was held in 1895 in Biel and then regularly all two or three years. At the Schwing- und Älplerfest there are also the two other Swiss national sports Hornussen (a team sport featuring the hitting of a puck called \"Hornuss\") and Steinstossen (a form of stone put).\n\nThe Eidgenössisches Schwing- und Älplerfest is celebrated to this day. The most recent event occurred in Pratteln close to Basel in 2022 and the next event will be held in Mollis in 2025. The winner is awarded with a bull, the Schwingerkönig of 2022 - Joel Wicki - won the bull \"Magnus\" a Red Holstein."
 dufour.2000.g: "Mal posso esperar pelo próximo evento!"
 dufour.2001.t: "[SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] ganhou o Eidgenössisches Schwingfest!"
 dufour.2001.d: "Depois de uma luta feroz, [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] foi eleito o vencedor do Eidgenössisches Schwingfest deste ano."
 swiss_flavor_events.21.f1: "Dois corpos enormes estão lutando entre si, nenhum deles quer cair. Ambos os adversários caem sob os aplausos do público. Um homem está por cima, ele ganhou essa \"Gangue”. Ele ajuda seu oponente a se levantar e limpa a serragem das costas do outro homem."
 swiss_flavor_events.21.f2: "\n\nCuriosamente, em Schwingen os nomes dos Schwinger são trocados e começam com o sobrenome. Se Abraham Lincoln fosse um Schwinger, ele se chamaria Lincoln Abraham."
 swiss_flavor_events.21.f3: "\n\nIf an opponent has the same number of points as the Schwingerkönig he gets the title of \"Erstgekrönter\" which means first crowned."
 swiss_flavor_events.21.f4: "\n\nOs 15% melhores em um Eidgenössisches recebem uma coroa de flores. Eles geralmente são chamados de \"Eidgenossen”."
 swiss_flavor_events.21.f5: "\n\nOther participants get prizes too. They are put in a temple of gifts. Each gift was donated by someone or by some organization."
 swiss_flavor_events.21.f6: "\n\nTrês Schwinger diferentes foram Schwingerkönig por três vezes ainda. Hans Stucki venceu em 1900, 1902 e 1905. Rudolf Hunsperger venceu em 1966, 1969 e 1974. Jörg Abderhalden venceu em 1998, 2004 e 2007."
 swiss_flavor_events.21.f7: "\n\nExistem outros Schwingfeste na Suíça. Dois dos mais importantes são o \"Unspunnen-Schwinget” perto de Interlaken e o \"Kilchberger Schwinget” no cantão de Zurique. Se um Schwinger vencer esses dois e o Eidgenössisches, isso é chamado de \"Schwinger-Grand-Slam\"."
 swiss_flavor_events.21.f8: "\n\nEm Schwingen você não ganha pontos apenas por vencer. Se dois oponentes empatarem, mas travarem uma luta atraente, eles serão recompensados ​​com 0,25 pontos a mais do que se fosse uma luta chata. Mesmo se você perder, mas lutar com bravura e bem, você ganha 0,75 pontos a mais."
 swiss_flavor_events.21.f9: "\n\nOs Schwingfeste de grande prestígio são os \"Bergschwingfeste\", que acontecem nas montanhas. São festas folclóricas e também há música tradicional. Os Bergschwingfeste mais conhecidos são o \"Stoos-Schwinget\", o \"Rigi Schwing- und Älplerfest\", o \"Brünigschwinget\", o \"Schwarzsee-Schwinget\", o \"Weissenstein-Schwinget\" e o \"Schwägalp-Schwinget\"."
 dufour.2001.g: "Parabéns!"
