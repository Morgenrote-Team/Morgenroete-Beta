 agassiz.801.t: "O sismômetro"
 agassiz.801.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] e [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] apresentaram hoje seu novo aparelho para registrar atividade sísmica. O sismômetro é um primeiro passo para melhor detecção de terremotos."
 agassiz.801.f: "Em resposta a uma série de terremotos perto de Comrie, na Escócia, em 1839, um comitê foi formado no Reino Unido para produzir melhores dispositivos de detecção de terremotos. O resultado disso foi um sismômetro de pêndulo invertido construído por James David Forbes, apresentado pela primeira vez em um relatório de David Milne-Home em 1842, que registrou as medições da atividade sísmica por meio do uso de um lápis colocado no papel acima do pêndulo. Os projetos fornecidos não se mostraram eficazes, de acordo com os relatórios de Milne. Foi Milne quem cunhou a palavra sismômetro em 1841, para descrever este instrumento."
 agassiz.801.g: "É certamente útil para nossos acadêmicos."
 agassiz.801.h: "É certamente útil para a ciência."
 agassiz.802.t: "O Sismógrafo"
 agassiz.802.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] e [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] apresentaram hoje seu novo aparelho para registrar atividade sísmica. Ele é significativamente superior ao sismômetro anterior e pode detectar áreas de terremoto muito melhor. Isso nos permite fazer preparações mais precisas para emergências."
 agassiz.802.f: "Os primeiros sismógrafos foram inventados nas décadas de 1870 e 1880. O primeiro sismógrafo foi produzido por Filippo Cecchi por volta de 1875. No entanto, o instrumento não era sensível o suficiente, e o primeiro sismograma produzido pelo instrumento foi em 1887, época em que John Milne já havia demonstrado seu projeto no Japão. Em 1880, o primeiro sismômetro de pêndulo horizontal foi desenvolvido pela equipe de John Milne, James Alfred Ewing e Thomas Gray, que trabalharam como consultores de governos estrangeiros no Japão, de 1880 a 1895. Milne, Ewing e Gray, todos tendo sido contratados pelo Governo Meiji nos cinco anos anteriores para auxiliar os esforços de modernização do Japão, fundaram a Sociedade Sismológica do Japão em resposta a um terremoto que ocorreu em 22 de fevereiro de 1880, em Yokohama."
 agassiz.802.g: "Certamente é útil para geologia."
 je_agassiz_seismometer: "Sismômetro"
 je_agassiz_seismometer_reason: "The seismometer is a further development of the seismoscope. It is still a very limited device for detecting earth tremors, but can at least be used as a means of recording that an earthquake has occurred.\n\nYou will gain progress if you have both an [concept_tesla_engineer] and a [concept_agassiz_geologist]"
 je_agassiz_seismometer_goal: "Um geólogo e um engenheiro devem passar [JournalEntry.GetTotalGoalValue|V0] semanas trabalhando juntos no novo instrumento."
 je_agassiz_seismograph: "Sismógrafo"
 je_agassiz_seismograph_reason: "A seismograph on a seismometer improves the recording of earthquakes and earth tremors in an amazing way. This would finally make a more modern type of seismology possible. A seismoscope would trigger the device to begin recording, and then a recording surface would produce a graphical illustration of the tremors automatically (a seismogram).\n\nYou will gain progress if you have both an [concept_tesla_engineer] and a [concept_agassiz_geologist]"
 je_agassiz_seismograph_goal: "Um geólogo e um engenheiro devem passar [JournalEntry.GetTotalGoalValue|V0] semanas trabalhando juntos no novo instrumento."
 agassiz_seismometer_done_tt: "O geólogo e o engenheiro concluem suas considerações teóricas preliminares sobre o dispositivo e começam a construir o sismômetro."
 agassiz_seismograph_done_tt: "O geólogo e o engenheiro concluem suas considerações teóricas preliminares sobre o dispositivo e começam a construir o sismógrafo."
 agassiz.302.t: "Gêiser"
 agassiz.302.d: "In  [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetHerHis] search for special geological features, [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] came across a phenomenal natural spectacle in the remoteness of [SCOPE.sState('agassiz_geyser_state').GetName]. It looks like there are geysers in the area!"
 agassiz.302.f: "A geyser is a hot spring that emits its water as a fountain at regular or irregular intervals. Geysers are named after the Great Geysir in Iceland. Geysers require a special combination of geological and climatic conditions that only exist on a large scale in a few places. Geysers depend on three factors: a water supply in the form of an aquifer, a heat source, and at least one reservoir with a constriction to the associated plumbing system. Over 300 active geysers, about half of all existing in the world, are located in Yellowstone National Park."
 agassiz.302.g: "O gêiser tem um ritmo minuto ou horário?"
 agassiz_state_trait_geyser: "Gêiser"
