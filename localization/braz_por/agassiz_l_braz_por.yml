 agassiz.103.t: "Equipe Geológica sai"
 agassiz.103.d: "After the geological team has finished its work, the research assistants return to their home country. The formations they found are now also accessible to our scientists."
 agassiz.103.f: "'Posso concluir este capítulo citando um ditado do Professor Agassiz, que sempre que um fato novo e surpreendente é trazido à luz na ciência, as pessoas primeiro dizem: 'não é verdade', depois que 'é contrário à religião' e, por último, 'que todo mundo sabia disso antes.' - Charles Lyell"
 agassiz.103.g: "Isso costumava ser uma ajuda externa útil."
 agassiz.104.t: "A equipe do Urânio sai"
 agassiz.104.d: "Após a equipe de urânio terminar seu trabalho, os assistentes de pesquisa retornam ao seu país de origem. Os depósitos de urânio que eles encontram também podem ser explorados por nossas empresas."
