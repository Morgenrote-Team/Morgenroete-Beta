 je_agassiz_volcano_expedition: "Expedição ao Vulcão"
 je_agassiz_volcano_expedition_reason: "Professor [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is on a volcano expedition in [SCOPE.sState('agassiz_volcano_state').GetName] together with a team of experts and assistants. The expedition budget is limited to a maximum of 2 years. Usually the expedition makes some progress every month and should have completed its research work after a year and a half. However, unusual events - whether pleasantly scientific or unpleasantly catastrophic - can influence events. As a rule of thumb: the danger level should never be so high that it reaches its maximum. This isn't a kid's walk. Don't play with volcanoes."
 agassiz.21.t: "Observatório Vesuviano"
 agassiz.21.d: "Em geologia, o Vesúvio é considerado um vulcão modelo para tirar conclusões sobre toda a vulcanologia. Devido à sua atividade aumentada desde o século XVII e na esperança de poder prever e estudar cientificamente erupções mais recentes, o governo estadual decidiu por decreto construir um observatório vulcanológico em sua encosta."
 agassiz.21.f: "O Observatório do Vesúvio (em italiano: Osservatorio Vesuviano) é o centro de vigilância para monitorar as três áreas vulcânicas da Campânia, Itália: Monte Vesúvio, Campos Flegreanos e Ischia. Fundado em 1841 nas encostas do Monte Vesúvio por Ferdinando II de Bourbon, Rei das Duas Sicílias, é o mais antigo instituto de vulcanologia do mundo."
 agassiz.21.g: "Somos a primeira nação da vulcanologia."
