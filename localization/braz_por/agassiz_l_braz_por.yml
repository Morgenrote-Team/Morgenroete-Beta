l_braz_por:
 agassiz_geology_tech: "Geologia"
 agassiz_geology_tech_desc: "Em 1815, o construtor de canais William Smith publicou seu mapa da geologia da Inglaterra e do País de Gales, que levou em consideração o conteúdo fóssil e a litologia. Smith reconheceu que certas sequências rochosas também são caracterizadas por uma sequência faunística muito específica e inconfundível. Em 1827, Leopold von Buch cunhou o termo fóssil de índice para fósseis que permitem datação relativa. A partir de agora, esclarecer a questão da idade real da Terra era uma questão científica."
 notification_agassiz_yearly_minerals_notification_name: "Relatório Geológico Anual"
 notification_agassiz_yearly_minerals_notification_desc: "Encontramos e registramos [GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=] novos [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] este ano."
 agassiz_sounding_tech: "Sondagem de eco"
 agassiz_sounding_tech_desc: "A sonda de profundidade foi inventada pela primeira vez como uma resposta à guerra submarina. Mais tarde, porém, seria também utilizado em muitas áreas civis: por exemplo, na localização de cardumes de peixes e na investigação em águas profundas."
 building_agassiz_volcano_observatory: "Observatório de Vulcões"
 agassiz_volcano_observatory_can_construct_volcano_tt: "Estado tem um vulcão #ORANGE#!."
 agassiz_volcano_observatory_can_construct_geologist_tt: "#default_text [GetPlayer.GetName] tem um [concept_agassiz_geologist].#!"
 pmg_agassiz_volcanology: "Vulcanologia"
 pm_agassiz_basic_volcanology: "Vulcanologia Básica"
 agassiz_building_production_mult_modifier: "Novo Veio de Minério"
 agassiz_building_production_2_mult_modifier: "Novo poço de petróleo"
 agassiz_ore_search_cost_modifier: "Custo de pesquisa de minério"
 agassiz_mineralogist: "Mineralogista"
 agassiz_mineralogist_desc: "Os mineralogistas são especialistas em rochas raras e são particularmente úteis na localização de minerais raros."
 agassiz_geophysicist: "Geofísico"
 agassiz_geophysicist_desc: "Os geofísicos são especialistas no que diz respeito à natureza do interior da Terra e estão mais familiarizados com a história da Terra e seus processos."
 agassiz_prospector: "Prospetor"
 agassiz_prospector_desc: "Os garimpeiros possuem habilidades especiais que ajudam a encontrar novos veios de minério ou fontes de petróleo."
 agassiz_oceanographer: "Oceanógrafo"
 agassiz_oceanographer_desc: "Os oceanógrafos possuem excelente conhecimento da natureza e dos processos dos oceanos."
 agassiz_volcanologist: "Vulcanologista"
 agassiz_volcanologist_desc: "Os vulcanologistas são especialistas em vulcões e são particularmente úteis em pesquisá-los."
 agassiz.100.t: "A busca por minérios"
 agassiz.100.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] empacotou equipamentos [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] e cancelou todos os cursos para começar a busca por minérios. A questão permanece: que tipo de depósitos de matérias-primas o [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] deveria investigar?"
 agassiz.100.f: ""
 agassiz.100.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] deveria voltar para a universidade."
 agassiz.100.h: "Carvão."
 agassiz.100.i: "Ferro."
 agassiz.100.j: "Liderar."
 agassiz.100.k: "Enxofre."
 agassiz.100.l: "Ouro."
 agassiz.100.m: "Urânio."
 agassiz.101.t: "Novos veios de minério"
 agassiz.101.d: "After Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has found some new ore veins for the mining companies, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] returns. The further expansion of the facilities is not [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] concern."
 agassiz.101.f: "'Tudo tem seu próprio limite. O minério de ferro não pode ser transformado em ouro.' -Mark Twain"
 agassiz.101.g: "Bom trabalho."
 agassiz.102.t: "Óleo!"
 agassiz.102.d: "After Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] discovered new oil sources, the black gold bubbled up. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] considers [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] work to be done for the time being.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_oil_rigs_buildings_var').GetValue|V0]"
 agassiz.102.f: "'Fórmula para o sucesso: acordar cedo, trabalhar duro, encontrar petróleo.' -J. Paulo Getty"
 agassiz.102.g: "Você nunca pode ter óleo suficiente."
 je_agassiz_find_coal_project: "Encontre carvão"
 je_agassiz_find_iron_project: "Encontre Ferro"
 je_agassiz_find_lead_project: "Encontrar lead"
 je_agassiz_find_sulfur_project: "Encontre Enxofre"
 je_agassiz_find_gold_project: "Encontre ouro"
 je_agassiz_find_uranium_project: "Encontre urânio"
 je_agassiz_find_oil_project: "Encontre petróleo"
 je_group_agassiz_geology: "Morgenrote: [concept_agassiz_geology]"
 je_geologist_dies_tt: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] morre"
 agassiz_stop_geologist_project_button: "Pare o Projeto Geólogo"
 agassiz_stop_geologist_project_button_desc: "Pare seu projeto geólogo atual. Seu progresso de geólogo será perdido."
 agassiz_stop_geologist_improving_project_tt: "Você decidiu interromper o projeto clicando no botão #italic Parar projeto geólogo#!."
 agassiz_mid_atlantic_ridge_cost_modifier: "Custo da Expedição Atlântica"
 je_agassiz_mid_atlantic_ridge: "Montanhas Subaquáticas"
 je_agassiz_mid_atlantic_ridge_reason: "O [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] está atualmente a bordo de um moderno navio de pesquisa que está usando um ecobatímetro para escanear o subsolo do Atlântico. Isso deve fornecer insights mais recentes sobre a história da Terra."
 je_agassiz_mid_atlantic_ridge_goal: "Após 12 meses, espera-se que o Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] apresente resultados."
 agassiz.201.t: "A Dorsal Meso-Atlântica"
 agassiz.201.d: "O Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] viu alguns dos primeiros dados. O resultado da expedição é surpreendente: não apenas no norte do Atlântico, mas em todo o Oceano Atlântico, a elevação submarina pode ser vista como uma faixa contínua que só é quebrada no nível do equador. O geólogo chamou esse fenômeno de Dorsal Mesoatlântica. Uma avaliação mais aprofundada dos dados ocorrerá nos próximos meses e anos."
 agassiz.201.f: "A Dorsal Mesoatlântica é uma cordilheira no Oceano Atlântico que fica principalmente abaixo do nível do mar e se estende por cerca de 20.000 km. Isso a torna a mais longa das dorsais meso-oceânicas, um sistema que abrange a Terra e tem mais de 60.000 km de comprimento. A elevação do fundo do mar no meio do Atlântico foi descrita pela primeira vez pelo oficial da marinha Matthew Fontaine Maury em 1853 e confirmada pela expedição Challenger em 1872. O motivo foram as investigações preliminares sobre a colocação dos primeiros cabos transatlânticos de alto mar. Durante a Expedição Alemã ao Meteoro 1925-1927, um perfil detalhado da Dorsal Meso-Atlântica foi criado usando medições de ecobatímetro. A descoberta da cordilheira do Meio-Atlântico forneceu uma pista inicial para os processos geodinâmicos das placas tectônicas relacionados à teoria da deriva continental de Wegener."
 agassiz.201.g: "Isto melhorará a compreensão geofísica do geólogo."
 agassiz.201.h: "Isto melhorará a compreensão oceanográfica do geólogo."
 agassiz.201.i: "Isto melhorará a compreensão geral do geólogo."
 agassiz.202.t: "Simpósio Geológico-Paleontológico"
 agassiz.202.d: "A Academia de Ciências convidou pessoas para um evento organizado pelo Prof. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] e Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. O simpósio é considerado um marco na pesquisa sobre a história da Terra. Ambos destacaram particularmente as semelhanças impressionantes na composição geológica e fóssil das costas da América do Sul e da África Ocidental."
 agassiz.202.f: "How closely geology and paleontology are related is shown by numerous scientific personalities who stood out in both fields. The interaction between the earth layer and the fossil for chronological determination makes both inseparable sciences. George Cuvier is considered the father of paleontology, but also the godfather of geology. Even in the scientific disputes, for example in the Cuvier-Geoffroy debate of 1830, which centered on the dispute between gradualism and catastrophism, it was primarily geological and paleontological findings that were highlighted as arguments. Both modern geology and modern paleontology would not have been possible without synergies."
 agassiz.202.g: "Um intercâmbio acadêmico frutífero."
 agassiz.311.t: "Uma pedra do espaço"
 agassiz.311.d: "In one of the more remote areas of our country, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has discovered an extraordinary stone in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] search for new minerals. After an initial investigation it is clear: the iron-containing monolith is a meteorite!"
 agassiz.311.f: "As primeiras coleções de meteoritos foram fundadas já no século XVIII, antes de se saber que os meteoritos eram de origem extraterrestre. A coleção de meteoritos mais antiga do mundo está no Museu de História Natural de Viena, onde foi lançada a pedra fundamental com o meteorito Hraschina (caído em 1751). Hoje abriga o maior acervo expositivo do mundo, com cerca de 1.100 objetos. Até o século XX, apenas algumas centenas de meteoritos haviam sido descobertos. A razão pela qual existem agora mais de 30.000 meteoritos encontrados nas coleções mundiais começou com a descoberta de Harvey H. Nininger de que os meteoritos são muito mais comuns na superfície da Terra do que se pensava anteriormente. A estratégia de Nininger era procurar meteoritos nas Grandes Planícies dos Estados Unidos, onde a terra era amplamente cultivada e o solo continha poucas rochas."
 agassiz.311.g: "De onde isso vem?"
 agassiz_seismology_tech: "Sismologia"
 agassiz_seismology_tech_desc: "Em resposta a uma série de terremotos perto de Comrie, na Escócia, em 1839, um comitê foi formado no Reino Unido para produzir melhores métodos de detecção de terremotos. O resultado disso foi a produção de um dos primeiros sismômetros modernos por James David Forbes. A partir de 1857, Robert Mallet lançou as bases da sismologia instrumental moderna e realizou experimentos sismológicos usando explosivos. Ele também é responsável por cunhar a palavra \"sismologia\"."
 agassiz_geologist_demotivated_modifier: "Geólogo desmotivado"
 agassiz_set_new_age_of_earth_effect_tt: "[GetPlayer.GetName] formula o estudo mais recente sobre a idade da Terra. A idade da Terra está sendo recalculada."
 agassiz.401.tt: "Todas as nações que têm [concept_agassiz_geologist] votam no estudo."
 notification_agassiz_new_earth_age_notification_name: "Idade da Terra reestimada"
 notification_agassiz_new_earth_age_notification_desc: "A [concept_agassiz_geologist] conseguiu convencer muitos colegas de que a Terra é muito mais velha do que se pensava.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "Pesquisa Geológica"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')]A [concept_agassiz_geologist] who is not busy will conduct Geological Research.\n\nDuring the research the following things can happen:\n- If your Geologist has the $agassiz_mineralogist$ [concept_character_trait] the yearly [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] yield will be doubled.\n- Your Geologist can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')] and Uranium.\n- After 5 years of research you will receive @agassiz_mineral! #p 25,000#! [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and @agassiz_rare_mineral! #p 1#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]. Additionally your Geologist can gain the $agassiz_mineralogist$ [concept_character_trait]"
 agassiz.401.t: "Um novo cálculo"
 agassiz.401.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has summarized all of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] previous experiences and knowledge throughout [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] life to provide a new estimate of the age of the Earth. The question remains whether the theory is also recognized by the scientific community."
 agassiz.401.f: "Do início do século XIX até meados do século XX, a determinação da idade da Terra permaneceu vaga e foi, na maior parte, sujeita a repetidos debates e hostilidade. A questão da idade da Terra era frequentemente relacionada à questão da evolução, porque esta precisava de um período de tempo suficientemente longo para funcionar como uma teoria. Até a virada do século, muitos cientistas acreditavam que a Terra tinha apenas alguns milhões de anos - no final de sua vida, Lord Kelvin presumiu que ela tinha apenas 20 milhões de anos. Mas mesmo Charles Darwin, que foi um dos \"maximalistas\" que defenderam sua tese, acreditava em cerca de 300 milhões de anos. Foi somente com a descoberta da radioatividade que a idade da Terra pôde ser corretamente determinada e a verdadeira extensão da idade da Terra (e, portanto, de todo o sistema solar) se tornou conhecida."
 agassiz.401.g: "Envie o artigo para todos os geólogos conhecidos no mundo todo."
 agassiz.402.t: "Um geólogo apresenta um novo cálculo"
 agassiz.402.d: "[SCOPE.sCharacter('agassiz_geologist_scope').GetLastName] propôs um cálculo da idade real da Terra. O cientista considera a medição anterior incorreta e estima que a idade da Terra seja significativamente maior. Como nosso geólogo é um dos estimados representantes deste assunto, também nos foi enviada uma cópia da tese."
 agassiz.402.g: "Esses cálculos são convincentes."
 agassiz.402.h: "Quem vai acreditar nesse absurdo pseudogeológico?"
 agassiz.403.t_yes: "Estudo Geológico Aceito"
 agassiz.403.d_yes: "Felizmente, a maioria da Sociedade Geológica Internacional classificou os novos cálculos do nosso geólogo como um marco e reconheceu sua teoria como válida."
 agassiz.403.f_yes: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s estimate for determining the Earth's age was accepted by a majority. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] scientists #G accepted#! the study, [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] #R rejected#! it. This meant that the theory was officially recognized and the age of the Earth was significantly increased."
 agassiz.403.g: "A triumph for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], a triumph for geology!"
 agassiz.403.t_no: "Estudo geológico rejeitado"
 agassiz.403.d_no: "A ignorante, assim chamada 'elite' de geólogos internacionais rejeitou o novo estudo do nosso geólogo. Ainda temos que determinar se houve fraude na eleição ou se foi uma manobra hostil para minar nossa orgulhosa nação."
 agassiz.403.f_no: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s estimate for determining the Earth's age was rejected by the majority. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] scientists #G accepted#! the study, [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] #R rejected#! it. The previous assessment of the age of the Earth therefore remains the same."
 agassiz.403.h: "A defeat for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], a defeat for geology..."
 je_agassiz_advanced_oceanography: "Oceanografia Avançada"
 je_agassiz_advanced_oceanography_reason: "Depois que os estudos oceanográficos anteriores tinham como objetivo principal trazer benefícios práticos aos militares, a fim de explorar estrategicamente as condições atuais do Pacífico, os cientistas agora defendem o uso das descobertas da pesquisa marinha para aprender mais sobre o nosso planeta — puramente por uma questão de conhecimento."
 je_agassiz_advanced_oceanography_success: "Terminaremos nossos estudos se tivermos adquirido #G 50#! @rapanui_oceanographic_knowledge! #E Conhecimento Oceanográfico#!."
 je_agassiz_advanced_oceanography_goal: "Terminaremos nossos estudos se tivermos adquirido #G 50#! @rapanui_oceanographic_knowledge! #E Conhecimento Oceanográfico#!."
 agassiz.312.t: "Pesquisa Geológica"
 agassiz.312.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] created a geological profile of a large area of land and made the map available to the public."
 agassiz.312.f: "A estratigrafia moderna se desenvolveu ao longo do século XIX: geólogos em toda a Europa e América do Norte examinaram, categorizaram e correlacionaram as camadas rochosas em seus países seguindo o exemplo de William Smith e publicaram mapas, tabelas estratigráficas e tratados com os resultados de seu trabalho."
 agassiz.312.g: "Use o conhecimento teoricamente."
 agassiz.312.h: "Use o conhecimento de forma prática."
 agassiz.313.t: "Depósito mineral"
 agassiz.313.d: "Geological investigations in a previously undeveloped region have revealed a rich deposit of minerals. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is not yet sure what the main aspect of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] search should be."
 agassiz.313.f: "Um mineral é um elemento ou composto químico que geralmente é cristalino e formado por processos geológicos. A maioria das aproximadamente 6.000 espécies minerais conhecidas hoje e reconhecidas como independentes são inorgânicas, mas algumas substâncias orgânicas, como a melita e a evenquita ou os formadores de cálculos renais whewellita e weddelita, também são reconhecidas como minerais porque processos geológicos também estavam envolvidos em sua formação. Incluindo todas as variedades minerais conhecidas e nomes sinônimos, bem como espécies minerais que ainda não são reconhecidas, há mais de 7.000 nomes minerais."
 agassiz.313.g: "Quantidade."
 agassiz.313.h: "Qualidade."
 agassiz.314.t: "Um geólogo inspirador"
 agassiz.314.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has now made a name for [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerselfHimself] in the world of geology. At [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] chair, people often asked for advice from [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim], and letters from colleagues from all over the world were piling up in the mailbox."
 agassiz.314.f: "'Sugiro que o melhor geólogo é aquele que viu a maioria das rochas.' -Herbert Harold leu"
 agassiz.314.g: "This will boost [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] reputation."
 agassiz.314.h: "This will boost the reputation of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] university."
 agassiz.315.t: "Insights geológicos"
 agassiz.315.d: "The current research journey, which has taken [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] to many different geological locations in our country, has opened [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]'s eyes. In a thesis paper that is currently being prepared, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] summarizes some new findings on geological principles."
 agassiz.315.f: "'O mundo é a grande caixa de quebra-cabeça do geólogo; ele está diante dela como a criança para quem as peças separadas de seu quebra-cabeça permanecem um mistério até que ele detecte sua relação e veja onde elas se encaixam, e então seus fragmentos crescem imediatamente em uma imagem conectada sob sua mão.' - Louis Agassiz"
 agassiz.315.g: "Excelente."
 agassiz.11.t: "A dinâmica dos terremotos"
 agassiz.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has attracted international attention today because [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] has revolutionized previous knowledge of this aspect of geology with a book about earthquakes. Words [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] coined such as 'epicenter' and 'seismology' have already found their way into science."
 agassiz.11.f: "Em 9 de fevereiro de 1846, Robert Mallet apresentou seu trabalho 'The Dynamics of Earthquakes' para a Royal Irish Academy, que é considerada uma das fundações da sismologia moderna. Entre 1852 e 1858, com a ajuda de seu filho John William Mallet, ele preparou o Catálogo de Terremotos da British Association, que apareceu em 1858 e listou os terremotos conhecidos e descreveu seus efeitos. Durante esse tempo, ele também realizou experimentos de explosão para determinar o tempo de viagem de ondas sísmicas em rochas soltas e sólidas."
 pmg_agassiz_seismology: "Sismologia"
 pm_agassiz_basic_seismology: "Sismologia Básica"
 pm_agassiz_advanced_seismology: "Sismologia Avançada"
 pm_agassiz_advanced_volcanology: "Vulcanologia Avançada"
 agassiz_congress_host_modifier: "Organizou um Congresso Geológico"
 agassiz_laughed_congress_modifier: "Laughed at the Geological Congress"
 agassiz_respected_congress_modifier: "Respeitado no Congresso Geológico"
 agassiz_lauded_congress_modifier: "Elogiado no Congresso Geológico"
 agassiz.316.f: "Se não houver características geológicas interessantes em seu próprio território, os geólogos podem procurar formações ou cavernas na área de fronteira ou além."
 agassiz.317.t: "Geólogo estrangeiro"
 agassiz.317.d: "Um geólogo estrangeiro de alguma forma conseguiu entrar em nossa área durante sua pesquisa e fazer registros. Ele nos enviou seus resultados como agradecimento."
 agassiz.317.g: "Então...?"
 agassiz.501.t: "Os continentes se movem?"
 agassiz.501.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has just published a book in which [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] puts forward a thesis that is already highly controversial. Accordingly, the continents in their current form are of more recent geological origin. Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] postulates that today's continents formed a unit [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] calls 'Pangea'. In order to convince the international geological community of this thesis, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] invited them to a congress."
 agassiz.501.f: "A sugestão mais antiga de que a deriva continental foi a causa veio do cartógrafo flamengo Abraham Ortelius. Na edição de 1596 de seu Atlas Theatrum Orbis Terrarum, a semelhança dos dois litorais já pode ser vista claramente. Alexander von Humboldt descreveu a semelhança das costas opostas da América do Sul e da África e sua vegetação em 1801 e 1845 e especulou que o Atlântico foi levado por uma corrente catastrófica. Em 1858, o geógrafo Antonio Snider-Pellegrini deu um passo além quando publicou o primeiro mapa mostrando o Velho e o Novo Mundo sem um oceano separador. No entanto, foi acima de tudo Alfred Wegener que, com sua teoria da deriva continental, levou a um repensar do fixismo (a tese de que os continentes estão firmemente enraizados na Terra) para o mobilismo. Durante sua vida, no entanto, seu modelo de explicação permaneceu como uma opinião minoritária na ciência, que só se estabeleceu na segunda metade do século XX."
 agassiz.501.g: "Convide as principais nações geológicas!"
 agassiz.502.t: "Um convite geológico"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName] convidou pessoas para um congresso geológico internacional. O anfitrião, um geólogo renomado, afirma que os continentes estão se movendo...!"
 agassiz.502.g: "Isso promete ser divertido."
 agassiz.503.t_laughed: "O ridículo da Sociedade Geológica"
 agassiz.503.t_respected: "Uma aparência confiante"
 agassiz.503.t_lauded: "Admiração e Parabéns"
 agassiz.503.d_laughed: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s appearance was greeted with amusement. [ROOT.GetCountry.GetNameNoFlag] does not exactly have a reputation for having achieved anything outstanding in the field of Geology. There were clearly jokes behind closed doors."
 agassiz.503.d_respected: "Before the start of the Geological Congress, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] was warmly greeted and the usual presents were exchanged. [ROOT.GetCountry.GetNameNoFlag] has a recognized reputation in the research world."
 agassiz.503.d_lauded: "The arrival of Professor [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] was greeted with great joy, being considered one of the most awaited guests. A crowd quickly formed around [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim], as [ROOT.GetCountry.GetNameNoFlag] is considered a pioneer in the field of Geology."
 agassiz.503.f_laughed: "'Por que o geólogo [ROOT.GetCountry.GetAdjectiveNoFlag] não arruma nenhuma garota?\n\nPorque há muito atrito entre eles!'"
 agassiz.503.f_respected: "Upon [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] arrival, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] had a few pleasant conversations with colleagues about mostly boring rock formations."
 agassiz.503.f_lauded: "Prof. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] seemed almost overwhelmed by the onslaught. So many colleagues sought to talk to [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] and wanted to benefit from [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] expeditions and [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] experiences. Some even urged [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] to give a private lecture."
 agassiz.503.g: "Que vergonha!"
 agassiz.503.h: "Finalmente entre pessoas com ideias semelhantes."
 agassiz.503.i: "Somos uma nação geológica líder!"
 agassiz.504.t: "Fixismo ou Mobilismo?"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] deu uma palestra altamente aclamada à comunidade geológica internacional reunida, na qual [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetSheHe] defende veementemente a reversão da geologia para o mobilismo - isto é, a deriva continental. Mas os oponentes são numerosos e não querem desviar-se da doutrina predominante do fixismo."
 agassiz.504.f: "Fixism was the key geotectonic hypothesis until the 1960s. It was assumed that the earth's crust was firmly connected to the subsoil, so that large-scale tectonic processes were local. From this it followed that the development of the earth was predominantly characterized by vertical and very little by horizontal tectonic movements of the earth's crust. Most theories of classical geology were based on the idea of fixism. At the beginning of the 19th century, fossils of the same species were found in South America and Africa. Under the assumption of fixism, the land bridge hypothesis was put forward, according to which there were once land bridges connecting Africa to South America, allowing animals to migrate to the other continent. Through the echo sounder measurements of the research ship Meteor between 1924 and 1927, during which the Mid-Atlantic Ridge - an undersea mountain range that runs from north to south - was discovered and not, as expected, the remnants of a land bridge that should have run from east to west, the land bridge hypothesis began to falter but was not completely abandoned until the 1960s. The opposite of fixism is mobilism, which sees horizontal movements of the earth's crust as having a decisive influence. The theory of mobilism developed from Alfred Wegener's discovery of continental drift."
 agassiz.504.g: "Os continentes não mudaram em milhões de anos."
 agassiz.504.h: "Tudo aponta para a tectônica de placas."
 agassiz.505.t: "Geólogos entre si"
 agassiz.505.d: "On the sidelines of the major geological congress, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] has the opportunity to exchange ideas with colleagues. What should [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] focus on in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] free time?"
 agassiz.505.f: "'É um facto estranho, característico do estado incompleto do nosso conhecimento actual, que conclusões totalmente opostas sejam tiradas sobre as condições pré-históricas do nosso planeta, dependendo se o problema é abordado do ponto de vista biológico ou geofísico.' -Alfred Wegener"
 agassiz.505.g: "Conhecimento Geológico."
 agassiz.505.h: "Conhecimento Oceanográfico."
 agassiz.505.i: "Minerais Raros."
 agassiz.505.j: "Novos talentos."
 agassiz.509.t_fix: "Fixismo triunfante"
 agassiz.509.d_fix: "Despite all [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] efforts, [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] did not manage to convince the majority of [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] colleagues. The accusation is that Prof. [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName] cannot provide sufficient evidence for his theses. The fact remains: the continents are stable."
 agassiz.509.f_fix: "'O Newton da teoria da deriva ainda não apareceu. Sua ausência não precisa causar ansiedade; a teoria ainda é jovem e ainda é frequentemente tratada com suspeita. A longo prazo, não se pode culpar um teórico por hesitar em gastar tempo e trabalho explicando uma lei sobre cuja validade nenhuma unanimidade prevalece.' - Alfred Wegener"
 agassiz.509.g: "Eppur se move."
 agassiz.509.t_tectonics: "Mobilismo triunfante"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] conseguiu convencer a comunidade científica da tese [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis]. A deriva continental é agora considerada a teoria mais provável para explicar uma variedade de fenômenos geológicos antes pouco claros."
 agassiz.509.f_tectonics: "'Os cientistas ainda não parecem entender suficientemente que todas as ciências da Terra devem contribuir com evidências para revelar o estado do nosso planeta em tempos anteriores, e que a verdade do assunto só pode ser alcançada ao pentear todas essas evidências. ... É apenas penteando as informações fornecidas por todas as ciências da Terra que podemos esperar determinar a 'verdade' aqui, ou seja, encontrar a imagem que expõe todos os fatos conhecidos no melhor arranjo e que, portanto, tem o mais alto grau de probabilidade. Além disso, temos que estar sempre preparados para a possibilidade de que cada nova descoberta, não importa qual ciência a forneça, possa modificar as conclusões que tiramos.' - Alfred Wegener"
 agassiz.509.h: "Espere - isso... é surpreendente!"
 agassiz_conference_geologist_double_vote_tt: "Graças ao nosso geólogo experiente, temos #G duas vezes#! o poder de voto"
 agassiz_conference_geologist_triple_vote_tt: "Graças ao nosso famoso geólogo, temos #G três vezes#! o poder de voto."
 agassiz.601.t: "Localização do vulcão"
 agassiz.601.d: "A group of scientists and assistants has come together for the upcoming volcano expedition. But the question now arises: which volcano should the team explore under the leadership of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]? There are several states we can choose from."
 agassiz.601.f: "'Devo pedir que você não use a palavra fogo quando se referir à teoria do Dr. Hutton: calor é uma expressão mais correta. Fogo no sentido usual dessa palavra, supõe combustível no ato de queimar; mas não temos razão para acreditar que haja um fogo dessa descrição no centro da Terra.' -Maria Hack"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "Ao pé do vulcão"
 agassiz.602.d: "A expedição vulcanológica chegou ao sopé do vulcão em [SCOPE.sState('agassiz_volcano_state').GetName] e agora está iniciando a investigação científica propriamente dita."
 agassiz.602.f: "'A existência de calor subterrâneo é provada por fenômenos como fontes termais, vulcões e terremotos. Essas observações não deixam dúvidas sobre a existência de calor nas entranhas da Terra; mas em que profundidade, em que extensão e com que intensidade ele atua?' - John Playfair"
 agassiz.602.g: "Não é tão perigoso quanto parece, certo?"
 agassiz.603.t: "Expedição bem-sucedida ao vulcão"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] accomplished the daring maneuver of not only leading [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] assistants to the top of the volcano, but also carried out numerous experiments and collected specimens. The volcano expedition was a valuable contribution to learning more about the inner workings of the Earth."
 agassiz.603.f: "'Toda a natureza selvagem conta a mesma história: os choques e explosões de terremotos, vulcões, gêiseres, ondas e inundações estrondosas e estrondosas, o fluxo silencioso de seiva nas plantas, tempestades de todos os tipos, cada uma delas, são as batidas de amor ordenadas e criadoras de beleza do coração da Natureza.' - John Muir"
 agassiz.603.g: "E tudo sem queimaduras de terceiro grau."
 agassiz.604.t: "Expedição Vulcânica termina em catástrofe"
 agassiz.604.d: "Terrible news! Despite several warning signs - toxic fumes, small earthquakes, dark smoke - [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] apparently stubbornly persisted in continuing the expedition. The eruption took the participants completely by surprise; the area is a disaster zone. Lava is still flooding the mountain and the surrounding villages. It was only with great difficulty that some survivors were able to get to safety with research results and samples. However, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is missing. We have to expect the worst."
 agassiz.604.f: "Os jornais já estão relatando vários feridos e mortos. Grandes partes da área tiveram que ser evacuadas. Prédios foram danificados e ruas foram inundadas com lava. A possibilidade de que alguém perto da cratera do vulcão tenha sobrevivido a essa força da natureza é quase zero."
 agassiz.604.g: "Horrível!"
 agassiz.605.t: "Expedição Vulcânica termina sem Resultados"
 agassiz.605.d: "A expedição ao vulcão esgotou todos os fundos de pesquisa e retornou. Infelizmente, produziu apenas alguns resultados úteis. Talvez o líder tenha sido muito cauteloso?"
 agassiz.605.f: "\"Você não pode explorar um vulcão se não dançar um pouco nele.\""
 agassiz.605.g: "Decepcionante"
 agassiz.611.t: "Insights químicos"
 agassiz.611.d: "During the expedition in [SCOPE.sState('agassiz_volcano_state').GetName], [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] was able to study some interesting chemical processes at the volcano crater in more detail. Some mineral compounds are still completely unknown."
 agassiz.611.f: "A maioria dos elementos químicos ocorre em compostos que mostram grande variedade, especialmente em minerais. No início da química moderna, os geólogos estavam sempre procurando por novas amostras das quais os químicos pudessem isolar elementos previamente desconhecidos."
 agassiz.611.g: "This might help Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]."
 agassiz.612.t: "Armadilha de lava"
 agassiz.612.d: "A expedição ao vulcão foi obviamente um pouco ousada demais em seu avanço até a cratera: ela se encontra cercada por lava em quase todos os lados. Abandonar o avanço anterior significaria uma grande perda de tempo."
 agassiz.612.f: "'A lava em si tem aquela aparência sombria que os poetas atribuem aos rios das regiões infernais; ela rola lentamente como um riacho de areia, enegrecida de dia e vermelha à noite. Conforme ela se aproxima, você ouve uma espécie de som crepitante, que causa o maior medo, pois é indistinto. Seu esplendor é tão intenso que, pela primeira vez, a terra ilumina o céu e lhe dá a aparência de um relâmpago contínuo; o céu, por sua vez, reflete esse brilho sobre a água, e assim a natureza parece ser incendiada por essa imagem tripla do fogo.' - Germaine de Staël"
 agassiz.612.g: "Encontre outro caminho."
 agassiz.612.h: "Tente atravessá-lo."
 agassiz.613.t: "Um líder endurecido"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is an experienced volcanologist who knows exactly how to deal with the mountain; [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] knowledge ensures that the expedition progresses safely and well."
 agassiz.613.f: "'O evento que eu tanto ansiava por testemunhar ocorreu e o Vesúvio está há alguns dias em estado de erupção. Eu já fiz muitos experimentos na lava no momento em que ela sai do vulcão e eu deveria tê-los completado, não fosse uma indisposição severa devido a ter permanecido muito tempo naquela situação magnífica, mas perigosa, a menos de 5 ou 6 pés de um fluxo de fluido de matéria vermelha quente como água caindo como uma catarata de fogo.' - Humphry Davy"
 agassiz.613.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is a superb leader."
 agassiz.614.t: "Gases tóxicos"
 agassiz.614.d: "The expedition team, led by Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], discovered abundant emissions of volcanic gases at one point on the volcano. The geologist would like to take some samples, even if it is not entirely safe."
 agassiz.614.f: "Gases vulcânicos são gases que emergem da superfície da Terra durante a atividade vulcânica. A emergência pode ocorrer em áreas estreitamente definidas ou difusamente sobre uma grande área dos flancos de um vulcão. Gases vulcânicos foram coletados e analisados ​​já em 1790 por Scipione Breislak na Itália. A composição dos gases vulcânicos depende do movimento do magma dentro do vulcão. Portanto, mudanças repentinas na composição do gás geralmente preveem uma mudança na atividade vulcânica."
 agassiz.614.g: "Temos que estudar esses gases."
 agassiz.614.h: "Isso é loucura!"
 agassiz.615.t: "Ejeção vulcânica"
 agassiz.615.d: "Um estrondo repentino assustou os participantes da expedição ao vulcão por um curto período. Quando a equipe pensou que o pior já tinha passado, o vulcão de repente expeliu pedras brilhantes que caíram sobre os participantes como uma chuva de meteoros. Dois assistentes ficaram feridos e uma mula de carga foi morta."
 agassiz.615.f: "'Ouvimos acima de nós e sobre a ilha um som estranho, como um poderoso fogo crepitante, ou a descarga de artilharia pesada em intervalos de um ou dois segundos. Às cinco, o barulho estrondoso continuou, a escuridão se espalhou pelo céu e uma chuva de pedra-pomes caiu sobre nós, ou seja, muitos pedaços eram de tamanho considerável e bem quentes.' - Capitão Watson"
 agassiz.615.g: "Uma reviravolta infeliz."
 agassiz.616.t: "Amostra de lava"
 agassiz.616.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] briefly asked the expedition to stop. Nearby seems to be a good place to take some lava samples. It is a scientifically worthwhile and risky procedure."
 agassiz.616.f: "'A lava estava retida nas margens profundas de um amplo leito e descia, não como um fluido, mas como uma montanha de coque, ou às vezes como carvão altamente gasoso. Ele se dividiu, estalou, cintilou, fumegou e incendiou-se e sempre se moveu em um vasto corpo compacto. Pedaços se desprenderam e rolaram, deixando para trás um brilho tão feroz que eu poderia ter me imaginado na boca de uma fornalha de ferro; e à medida que cada missa caía com o barulho do trovão, as árvores pegavam fogo e as multidões soltavam gritos de admiração e arrependimento.' -Luigi Palmieri"
 agassiz.616.g: "Estamos aqui para experimentos como este."
 agassiz.617.t: "Amostra de lava - Sucesso!"
 agassiz.617.d: "Nosso geólogo conseguiu coletar uma amostra de lava em um empreendimento arriscado. O resultado é do mais alto valor científico."
 agassiz.617.f: ""
 agassiz.617.g: "Ciência quente!"
 agassiz.618.t: "Amostra de lava - Falha!"
 agassiz.618.d: "To the dismay of the other expedition members, collecting the sample failed. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] suffered severe burns and put the team in danger!"
 agassiz.618.f: ""
 agassiz.618.g: "Uma ciência que vai queimar suas mãos..."
 agassiz.619.t: "Cristais"
 agassiz.619.d: "The unique geological processes in the volcanic area have produced a whole range of rare, crystalline minerals. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] is eager to add the stones to [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] collection..."
 agassiz.619.f: "A maioria das rochas vulcânicas compartilha uma série de minerais comuns. A diferenciação de rochas vulcânicas tende a aumentar o conteúdo de sílica (SiO2) principalmente por cristalização fracionada. Assim, rochas vulcânicas mais evoluídas tendem a ser mais ricas em minerais com uma quantidade maior de sílica, como filo e tectossilicatos, incluindo feldspatos, polimorfos de quartzo e muscovita. Embora ainda dominadas por silicatos, rochas vulcânicas mais primitivas têm conjuntos minerais com menos sílica, como olivina e piroxênios. A série de reações de Bowen prevê corretamente a ordem de formação dos minerais mais comuns em rochas vulcânicas. Ocasionalmente, um magma pode pegar cristais que cristalizaram de outro magma; esses cristais são chamados de xenocristais. Diamantes encontrados em kimberlitos são xenocristais raros, mas bem conhecidos; os kimberlitos não criam os diamantes, mas os pegam e os transportam para a superfície da Terra."
 agassiz.619.g: "Uma amostra é suficiente."
 agassiz.619.h: "Pegue o máximo de amostras que puder!"
 agassiz.619.i: "Algumas pedras não valem a vida de um pesquisador."
 agassiz.620.t: "Rio de Fogo"
 agassiz.620.d: "A river of lava blocks the team's path. While some participants consider this obstacle a dangerous challenge that could threaten the entire volcano expedition, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] sees this situation primarily as a scientific opportunity to test out [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] unused instruments..."
 agassiz.620.f: "'Na maioria dos casos, pode-se ver claramente que a luz emana de corpos incandescentes, mas não de corpos flamejantes. É a luz da lava brilhante que faz a grande coluna de chamas aparentes subindo do Vesúvio.' - John Philipps"
 agassiz.620.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] should study it."
 agassiz.620.h: "Isso é muito perigoso!"
 agassiz.621.t: "Teorias sobre Vulcanismo"
 agassiz.621.d: "During [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] stay at the volcano, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] would like to finally verify some of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] previous volcanism theories by collecting evidence and exploring the surrounding area. To do this, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] needs a lot of time in what [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] calls an 'extremely fascinating and inspiring area', while [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] colleagues watch with gnashing teeth as more and more dark smoke rises in the background..."
 agassiz.621.f: "'No clímax da erupção, uma coluna de cinzas subiu alto na forma de um imenso pinheiro até que finalmente começou a se inclinar para baixo, quando, da quantidade de matéria densa que compunha a coluna, ela caiu no chão. Torrentes de lava flamejante de uma magnitude terrivelmente portentosa agora caíam montanha abaixo.' - Mariana Starke"
 agassiz.621.g: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] should take time to study the phenomenon thoroughly."
 agassiz.621.h: "Não perca tempo!"
 agassiz.622.t: "Terremoto"
 agassiz.622.d: "Entulhos caindo e um deslizamento de terra acompanharam um tremor de terra no início da manhã quando a expedição estava muito perto da cratera. O pequeno terremoto é uma indicação clara de que o vulcão está mais ativo do que os participantes pensavam ser possível."
 agassiz.622.f: "'Em outro lugar, este geógrafo erudito, ao aludir à tradição de que a Sicília havia sido separada da Itália por uma convulsão, observa que atualmente a terra perto do mar nessas partes raramente era abalada por terremotos, pois agora havia orifícios abertos por onde o fogo e as matérias inflamadas, e as águas escapavam; mas antigamente, quando os vulcões do Etna, as Ilhas Lipari, Ischia e outros estavam fechados, o fogo e o vento aprisionados poderiam ter produzido movimentos muito mais veementes. A doutrina, portanto, de que os vulcões são válvulas de segurança, e que as convulsões subterrâneas são provavelmente mais violentas quando primeiro a energia vulcânica se desloca para um novo quadrante, não é moderna.' -Charles Lyell"
 agassiz.622.g: "Toda essa expedição foi uma boa ideia...?"
 agassiz.623.t: "Minerais em todo lugar"
 agassiz.623.d: "The expedition led by [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] on the volcano in [SCOPE.sState('agassiz_volcano_state').GetName] encountered a rich mineral deposit."
 agassiz.623.f: "Os minerais são os melhores amigos do geólogo."
 agassiz.623.g: "Minerais!"
 agassiz.623.h: "Não."
 agassiz.624.t: "Espécime exótico"
 agassiz.624.d: "Pode parecer surpreendente, mas a expedição ao vulcão em [SCOPE.sState('agassiz_volcano_state').GetName] encontrou na verdade exemplares raros de animais de uma fauna única que vivem muito perto do vulcão. Alguns espécimes certamente seriam de grande interesse para os zoólogos locais."
 agassiz.624.f: "'Humphrey! Por favor, colete alguns ovos de periquito anão vulcânico. O café da manhã foi escasso e sinto falta do meu ovo frito de domingo.'"
 agassiz.624.g: "Espécime!"
 agassiz.625.t: "Fósseis Desconhecidos"
 agassiz.625.d: "Some rare fossils that [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] discovered on the volcano expedition in [SCOPE.sState('agassiz_volcano_state').GetName] could answer important paleontological and geological questions."
 agassiz.625.f: "'Se contornarmos a região fértil na base do Etna em seus lados sul e leste, contemplaremos estratos marinhos de areia argilosa e tufo vulcânico, brotando de baixo das lavas modernas. As conchas fósseis marinhas que ocorrem nesses estratos são todas, ou quase todas, idênticas às espécies que agora habitam o Mediterrâneo; e como aparecem na altura de 600 a 800 pés acima do mar perto de Catânia, elas provam claramente que houve nesta região, como em outras partes da Sicília mais ao sul, um movimento ascendente do antigo leito do mar. É justo, portanto, inferir que toda a montanha, com exceção das partes que são de origem muito moderna, participou dessa reviravolta.' -Charles Lyell"
 agassiz.625.g: "Fósseis!"
 agassiz.626.t: "Dados Geomagnéticos"
 agassiz.626.d: "The volcano expedition in [SCOPE.sState('agassiz_volcano_state').GetName] received a telegram from the capital this morning. The Geomagnetic Observatory asks to collect some data on the volcano crater. Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has complied with this wish."
 agassiz.626.f: "'Se esses dados são tão importantes para o Instituto Geomagnético, por que você mesmo não vem aqui para obtê-los?'"
 agassiz.626.g: "Perfeito"
 agassiz.627.t: "O Elemento Solar na Terra"
 agassiz.627.d: "When analyzing some previously neglected rocks, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] was able to discover amazing things. Using on-site spectral analysis, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] was able to prove that the volcanic rock actually contains the element helium, which was previously thought to only occur in space."
 agassiz.627.f: "Luigi Palmieri foi um físico, meteorologista, sismólogo e vulcanologista italiano. Em 1845, ele assumiu a posição de professor de lógica e metafísica de Pasquale Galluppi na Universidade de Nápoles. Após a morte de Gallupi em 1847, sua cadeira foi confiada a ele. Em 1860, ele desistiu da cadeira e assumiu a cadeira de geofísica e meteorologia que ele havia iniciado. Anexados à cadeira estavam o observatório meteorológico e o Observatório do Vesúvio, fundado em 1842, cuja administração Palmieri também assumiu. Ele chefiou a cadeira e os dois observatórios até sua morte. Palmieri ficou conhecido em particular por dispositivos de medição aprimorados, como um sismógrafo eletromagnético e dispositivos para medir tensões elétricas na atmosfera. Em 1882, ele conseguiu detectar o elemento hélio na Terra pela primeira vez por meio da análise espectral da lava do Vesúvio."
 agassiz.627.g: "Isso abre... possibilidades interessantes."
 agassiz.628.t: "Equipe pede descanso"
 agassiz.628.d: "Depois de mais de um ano de expedição ao vulcão, os membros da equipe estão cada vez mais pedindo por pausas. Muitos estão à beira da exaustão. As primeiras vozes são altas para voltar para casa."
 agassiz.628.f: "'Você está com medo? Com ​​todo respeito, eventos sísmicos como esses são a razão pela qual escalamos esse vulcão em primeiro lugar! Você é um cientista ou um desertor?'"
 agassiz.628.g: "Dê a eles todo o descanso que eles precisam."
 agassiz.628.h: "Uma pequena pausa, nada mais."
 agassiz.628.i: "Esses assistentes inúteis deveriam trabalhar, não ficar ociosos!"
 agassiz.629.t: "Inferno"
 agassiz.629.d: "A situação no vulcão em [SCOPE.sState('agassiz_volcano_state').GetName] piorou significativamente. A montanha de repente vomita fumaça preta e os fluxos de lava parecem aumentar. A expedição está agora em um dilema. Os membros da expedição deveriam ter cautela e correr o risco de ficarem presos pela lava, ou deveriam reagir rapidamente, mas arriscando um perigo desconhecido?"
 agassiz.629.f: "'O sopro de fogo varreu a cidade e a orla com toda a força que poderia ter sido dada a ele por um canhão. Cinzas foram atiradas em nosso rosto com efeito pungente. O ar estava cheio de chamas. Involuntariamente, levantamos nossas mãos para proteger nossos rostos. Notei o mesmo gesto quando vi os corpos das vítimas na praia.' - Comte de Fitz-James"
 agassiz.629.g: "Tenha cuidado."
 agassiz.629.h: "Assuma o risco."
 agassiz.630.t: "Inferno na Terra"
 agassiz.630.d: "It seems like all hell has broken out on the volcano in [SCOPE.sState('agassiz_volcano_state').GetName]. Lava fountains shoot up, blazing forces fight each other in streams of fire. A threatening event for the majority of the expedition participants. Only Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] cannot escape a rapturous fascination."
 agassiz.630.f: "'À noite, o efeito do fogo se tornou mais belo. Estávamos cercados por riachos e cataratas do fogo vermelho e radiante; e no meio, da coluna de fumaça betuminosa disparada para o ar, caíam as vastas massas de rocha, brancas com a luz de seu calor intenso, deixando para trás trens de vapor de esplendor.' - George Gordon Byron"
 agassiz.630.g: "Este é um espetáculo fascinante e deveríamos tirar fotos dele!"
 agassiz.630.h: "Assustador,"
 agassiz.630.i: "Retirar!"
 agassiz.631.t: "Vulcão bastante ativo"
 agassiz.631.d: "Apparently the volcano that Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] is researching is much more active than expected. An outbreak is probably imminent. This makes the expedition more dangerous. However, with higher risk, the scientific opportunities also increase..."
 agassiz.631.f: "\"As pessoas nunca acreditam em vulcões até que a lava realmente as alcance.\" -George Santayana"
 agassiz.631.g: "Mais conhecimento!"
 agassiz.631.h: "Mais experiência!"
 agassiz.631.i: "Mais minerais!"
 agassiz.632.t: "Reportagem de Jornal"
 agassiz.632.d: "O #YELLOW [SCOPE.sState('manzoni_publisher_state').GetNameNoFormatting] Chronicle#!,, um dos principais jornais da região, está atualmente mantendo seus leitores atualizados com relatórios sobre a expedição ao vulcão. Um nicho científico de campo despertou, portanto, o interesse de uma parcela maior da população. Meninos e jovens em particular são fascinados pelas histórias de aventura."
 agassiz.632.f: "'Read in the latest issue: The daring crater climb by Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting]! Brave scientists face against lava, toxic fumes and hellish heat. Man crosses another boundary at the edge of what the ancients believed was the entrance to the underworld. Our reporters continue to accompany the journey with illustrations. Thursday is Chronicle day!'"
 agassiz.632.g: "Isso inspirará uma nova geração de cientistas."
 agassiz.633.t: "Um lugar de descanso seguro"
 agassiz.633.d: "Os membros da expedição encontraram um lugar seguro para se refugiar entre vapores de enxofre, fumaça preta e fluxos de lava."
 agassiz.633.f: "'My dear colleague Professor Schabernack!\n\nI thank you at this point for your illuminating insights into the dynamic development of water in a volcanic vacuum, but I will formulate my objections in more detail at a later date. Rather, my point is that in my correspondence with Dr. Dr. Sauerspeck I was told that you had spread the disgraceful rumor at the university that we were having fun on this volcano. I want you to stop making these assumptions. The [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting] Hot Springs I recently discovered have a maximum temperature of only 32°C, not 35°C as you recently claimed. So they are de facto frosty cold. Please correct these infamous misrepresentations!'"
 agassiz.633.g: "Relaxamento!"
 agassiz_volcano_tourist_modifier: "Turismo Vulcânico"
 agassiz_small_volcano_eruption_modifier: "Pequena erupção vulcânica"
 agassiz_medium_volcano_eruption_modifier: "Erupção vulcânica"
 agassiz_big_volcano_eruption_modifier: "Mega Erupção Vulcânica"
 agassiz_medium_earthquake_modifier: "Terremoto"
 agassiz_big_earthquake_modifier: "Mega Terremoto"
 agassiz.711.t: "Espetáculo do Vulcão"
 agassiz.711.d: "Os moradores de [SCOPE.sState('agassiz_volcano_state').GetName] estão atualmente testemunhando um espetáculo impressionante: as fontes de lava do vulcão são uma visão fascinante, especialmente à noite. Turistas e cientistas podem ser encontrados entre os espectadores."
 agassiz.711.f: "'O mais sublime dos vulcões! A chama do Etna\nEmpalidece diante da tua e a inextinguível Hecla domestica;\nO Vesúvio mostra seu brilho, uma visão comum\nPara turistas boquiabertos, de sua altura banal.'\n\n - Lord Byron"
 agassiz.711.g: "Maravilhoso!"
 agassiz.712.t: "Pequena erupção vulcânica"
 agassiz.712.d: "O vulcão em [SCOPE.sState('agassiz_volcano_state').GetName] entrou em erupção. Algumas vilas menores foram destruídas e campos foram inundados com lava, mas o desastre foi limitado."
 agassiz.712.f: "'O que eu vi então! Milhares de línguas de fogo iluminaram os arredores. No topo das árvores eu vi chamas. Ouvi um estalo e vi uma folha de fogo bem ao meu lado. O mar não estava à vista. Tudo estava coberto de cinzas. Eu não conseguia ver minha mão diante de mim. A última coisa que vi foi a cinza sendo empurrada para cima através das rachaduras nas tábuas do assoalho, como uma fonte. Senti uma forte pressão, me jogando no chão. Então parecia que o ar estava sendo sugado e eu não conseguia respirar.' - Johanna Beyerinck"
 agassiz.712.f_basic: "\n\n#YELLOW Graças aos nossos cientistas do Observatório de Vulcões, não fomos totalmente surpreendidos pela catástrofe. Portanto, pudemos tomar precauções e #G limitar um pouco a devastação#!.#!"
 agassiz.712.f_advanced: "\n\n#YELLOW Graças aos nossos excelentes cientistas no Observatório do Vulcão, fomos capazes de iniciar rapidamente medidas de evacuação e tomar medidas de proteção. Fomos capazes de #G limitar significativamente a devastação#!."
 agassiz.712.g: "Só um pouco de lava."
 agassiz.712.h: "Alguma notícia do observatório?"
 agassiz.712.i: "This might be interesting for Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] and [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] students"
 agassiz.713.t: "Erupção vulcânica"
 agassiz.713.d: "Uma erupção violenta abalou o estado de [SCOPE.sState('agassiz_volcano_state').GetName]. Fragmentos de tefra e cinzas vulcânicas destruíram prédios e plantações, tirando algumas vidas de nosso povo."
 agassiz.713.f: "'Ouvimos acima de nós e sobre a ilha um som estranho, como um poderoso fogo crepitante, ou a descarga de artilharia pesada em intervalos de um ou dois segundos. Às cinco, o barulho estrondoso continuou, a escuridão se espalhou pelo céu e uma chuva de pedra-pomes caiu sobre nós, ou que muitos pedaços eram de tamanho considerável e bastante quentes.\n\nAquela noite foi de escuridão — da queda contínua de cinzas — quebrada por relâmpagos incessantes, tanto no céu quanto ao redor da ilha.' - Capitão Watson"
 agassiz.713.g: "Essas pobres pessoas."
 agassiz.713.j: "Envie o máximo de ajuda possível para apoiar as vítimas!"
 agassiz.714.t: "Mega erupção vulcânica"
 agassiz.714.d: "Uma erupção de recordes sem precedentes destruiu completamente as vidas de muitos no estado de [SCOPE.sState('agassiz_volcano_state').GetName]. A explosão pôde ser ouvida a centenas de quilômetros de distância e tudo que teve o mau destino de cercar a montanha foi imediatamente devastado."
 agassiz.714.f: "'Você podia ouvir os gritos das mulheres, o lamento das crianças e os gritos dos homens; alguns chamavam seus pais, outros seus filhos ou suas esposas, tentando reconhecê-los por suas vozes. As pessoas lamentavam seu próprio destino ou o de seus parentes, e havia alguns que rezavam pela morte em seu terror de morrer. Muitos imploravam a ajuda dos deuses, mas ainda mais imaginavam que não havia mais deuses, e que o universo estava mergulhado na escuridão eterna para todo o sempre.' - Plínio, o Jovem"
 agassiz.714.g: "Uma tragédia!"
 agassiz.715.t: "Fumaça e estrondo"
 agassiz.715.d: "O vulcão em [SCOPE.sState('agassiz_volcano_state').GetName] está rugindo. Fumaça sobe acima da cratera. É isso. Os moradores estão aliviados, turistas e cientistas estão decepcionados."
 agassiz.715.f: "'Muito para investigar, muito pouco para aproveitar. Que vulcão miserável e temperamental!'"
 agassiz.715.g: "Ele acorda ou continua dormindo?"
 agassiz.721.t: "Ondas sísmicas"
 agassiz.721.d: "Uma pequena perturbação sísmica tirou [SCOPE.sState('agassiz_earthquake_state').GetName] da cama esta manhã. O pequeno terremoto causou apenas danos menores, mas despertou o interesse dos sismólogos."
 agassiz.721.f: "'Entrevistador: Se o prédio em que você está agora começasse a tremer e você soubesse que um terremoto estava ocorrendo, o que você faria?'\nCharles Richter: 'Eu caminharia — não correria — até o sismógrafo mais próximo.'"
 agassiz.721.g: "Interessante."
 agassiz.722.t: "O terremoto [SCOPE.sState('agassiz_earthquake_state').GetName]"
 agassiz.722.d: "Um terremoto atingiu o estado de [SCOPE.sState('agassiz_earthquake_state').GetName], destruindo prédios, ferindo pessoas e até tirando algumas vidas."
 agassiz.722.f: "'Houve um estrondo profundo, profundo e terrível, e então eu pude vê-lo realmente subindo a Washington Street. A rua inteira estava ondulando. Era como se as ondas do oceano estivessem vindo em minha direção, ondulando conforme vinham.' -Jesse Cook"
 agassiz.722.f_basic: "\n\n#YELLOW Graças aos nossos sismólogos treinados, já se sabia que [SCOPE.sState('agassiz_earthquake_state').GetName] era uma região propensa a terremotos. Devido a medidas preventivas, por exemplo na construção, os danos foram facilmente minimizados.#!"
 agassiz.722.g: "Uma tragédia!"
 agassiz.722.h: "Como o observatório avalia a situação?"
 agassiz.722.i: "Um campo perfeito para pesquisa geológica."
 agassiz.722.j: "Envie o máximo de ajuda possível para apoiar as vítimas!"
 agassiz.723.t: "O Grande Terremoto [SCOPE.sState('agassiz_earthquake_state').GetName]"
 agassiz.723.d: "O estado de [SCOPE.sState('agassiz_earthquake_state').GetName] foi reduzido a ruínas por um terremoto de escala sem precedentes. Inúmeros prédios foram destruídos e a quantidade de vidas perdidas é impossível de dizer."
 agassiz.723.f: "'O terremoto derrubou em São Francisco centenas de milhares de dólares em paredes e chaminés. Mas a conflagração que se seguiu queimou centenas de milhões de dólares em propriedades. Não há como estimar em centenas de milhões o dano real causado. Nunca na história uma cidade imperial moderna foi tão completamente destruída. São Francisco se foi. Nada resta dela, exceto memórias e uma franja de casas de habitação em seus arredores. Sua seção industrial foi destruída. Sua seção comercial foi destruída. Sua seção social e residencial foi destruída. As fábricas e armazéns, as grandes lojas e prédios de jornais, os hotéis e os palácios dos nababos, todos se foram. Permanece apenas a franja de casas de habitação nos arredores do que antes era São Francisco.' -Jack London"
