 dubois_theory_of_evolution_tech: "Teoria da evolução" #NT!
 dubois_theory_of_evolution_tech_desc: "A ruptura crucial do conceito de constantes tipos tipológicos em biologia veio com a teoria da evolução através da seleção natural. Darwin observou que o crescimento da população levaria a uma "luta pela existência", na qual variações favoráveis ​​prevalecem à medida que outros pereceram. Isso poderia explicar a diversidade de plantas e animais de uma ascendência comum. Alguns ficaram perturbados com isso, pois implicavam que os humanos não tinham um lugar especial no universo." #NT!
 dubois_paleontology_tech: "Paleontologia" #NT!
 dubois_paleontology_tech_desc: "Um interesse na história da Terra e dos animais extintos pode ser rastreado até a antiguidade e atingiu um primeiro pico com os estudos de Georges Cuvier por volta de 1800. Mas a publicação da 'On the Origin of Spice' foi um evento divisor de águas em todas as ciências da vida, especialmente a paleontologia. O debate científico que começou imediatamente após a publicação de 'Origin' levou a um esforço conjunto para procurar fósseis de transição e outras evidências de evolução no registro fóssil." #NT!
 dubois_genetics_tech: "Genética" #NT!
 dubois_genetics_tech_desc: "A genética moderna começou com o trabalho do frade agostiniano Gregor Johann Mendel. A redescoberta de 1900 do trabalho de Mendel levou a rápidos avanços na genética. Em 1915, os princípios básicos da genética mendeliana haviam sido estudados em uma ampla variedade de organismos - principalmente a mosca da fruta Drosophila melanogaster. Juntamente com o trabalho experimental, os matemáticos desenvolveram a estrutura estatística da genética populacional, trazendo explicações genéticas para o estudo da evolução." #NT!
  
