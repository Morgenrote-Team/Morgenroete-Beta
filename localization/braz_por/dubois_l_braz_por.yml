 dubois.1059.t: "Gabinete de monstro Gila"
 dubois.1059.d: "O recinto do monstro de Gila era uma paisagem acidentada de terrenos arenosos e fendas rochosas. À primeira vista, as vibrantes escamas pretas e laranja do lagarto misturadas perfeitamente com o ambiente. Então, você o viu-lentamente emergindo de uma toca sombreada, sua pele grossa e parecida com uma pele brilhando na luz enquanto se movia cautelosamente através de seu habitat."
 dubois.1059.f1: "No recinto solar do zoológico, um monstro solitário de Gila lentamente atravessa o terreno rochoso, suas distintas escamas pretas e laranja pretas, pegando a luz do sol. O movimento deliberado e quase pesado desse lagarto veneno chama a atenção de espectadores curiosos. Intrigada com sua aparência e comportamento únicos, você se aproxima de um zookê para obter mais informações. \ \"Ele se move lentamente, conservando energia no ambiente do deserto severo. Ao contrário de muitos outros predadores, não depende da velocidade, mas de seu potente veneno, que usa para subjugar as presas como pequenos mamíferos e pássaros. Sua coloração brilhante serve como um aviso para os possíveis predadores, sinalizando que não é um alvo fácil."
 dubois.1059.f2: "No recinto rochoso, o monstro de Gila está parcialmente escondido sob uma pedra grande, sua língua bifurcada jogando para provar o ar. A visão desta criatura de aparência pré-histórica, com sua pele beady e mandíbulas poderosas, fascina os visitantes. Curioso sobre seus hábitos de alimentação, você busca um zookê para obter mais informações. \ N \ \"Os monstros de Gila têm um metabolismo lento e podem sobreviver em apenas algumas refeições grandes por ano,\" os compartilha o Zookeeper. \"Eles usam suas mandíbulas fortes para esmagar os ovos de pássaros e répteis, um de seus alimentos favoritos. Após uma refeição, eles podem armazenar gordura nas caudas, que os sustenta durante longos períodos sem comida. Essa adaptação é crucial para sobreviver no deserto árido onde os alimentos podem ser escassos."
 dubois.1059.f3: "Enquanto você observa o monstro de Gila em seu habitat do deserto, você percebe que ele subindo cuidadosamente sobre pedras e inspecionando fendas. O ritmo deliberado de seus movimentos e a maneira como ele explora metodicamente seu ambiente desperta seu interesse. Querendo aprender mais sobre esse comportamento intrigante, você se aproxima de um Zookeeper. \"Eles passam a maior parte do dia escondidos em tocas ou sob pedras para evitar o calor extremo. Quando emergem, são meticulosos em seus movimentos, usando seu forte cheiro para localizar presas ou encontrar um ponto seguro para descansar. Seu estilo de vida solitário e secreto os ajudou a prosperar em alguns dos ambientes severos. \""
