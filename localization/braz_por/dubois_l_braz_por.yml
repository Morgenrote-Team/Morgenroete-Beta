 dubois.2121.h: "Argyrossaurus." #NT!
  
 dubois.2122.t: "Antarctosaurus" #NT!
 dubois.2122.f: "Antarctosaurus representa um gênero notável de dinossauros saurópodes que habitavam o antigo continente de Gondwana durante o período do Cretáceo Tardio, aproximadamente 70 a 65 milhões de anos atrás. Classificada dentro dos titanossauros, o Antarctosaurus exemplifica a diversidade de formas de saurópodes que, uma vez, a Terra vagou. \ NCharacterizada por seu tamanho maciço, o Antarctosaurus era um herbívoro colossal e quadrúpedal que atingia comprimentos de até 60 pés ou mais. Seu pescoço e cauda alongados, juntamente com a cabeça relativamente pequena, indicam adaptação para alimentar a vegetação alto acima do solo. Este titanossauro é conhecido por sua estrutura robusta de membros, que provavelmente apoiou seu peso e facilitou seu movimento. \ Nfossils de Antarctosaurus foram descobertos principalmente nos continentes do sul, incluindo a América do Sul e a Antártica, onde forneceram informações valiosas sobre a evolução e a distribuição dos sauropods durante o atraso. Esses achados contribuem para a nossa compreensão dos ecossistemas únicos que existiam em Gondwana durante esse período." #NT!
 dubois.2123.t: "Argyrossaurus" #NT!
 dubois.2123.f: "O Argyrossaurus é um gênero significativo de dinossauros saurópodes que percorreu as antigas paisagens da América do Sul durante o período do Cretáceo tardio, aproximadamente 90 a 70 milhões de anos atrás. Pertencente ao subgrupo saurópode conhecido como titanossauros, o Argyrossaurus oferece informações sobre a diversa fauna pré -histórica da região." #NT!
 dubois.2122.h: "Retorne à seção sul -americana." #NT!
  
 dubois.2131.t: "Seção de dinossauros europeus" #NT!
 dubois.2131.d: "Qual esqueleto de dinossauro para visitar?" #NT!
 dubois.2131.f: "Desde o início do século XIX, os novos fósseis de dinossauros foram desenterrados nos maciços europeus, principalmente como resultado do aumento da mineração. Entre outros, Iguanodon e Plateosaurus são conhecidos." #NT!
 dubois.2131.g: "Iguanodon." #NT!
 dubois.2131.h: "Plateossauro." #NT!
  
 dubois.2132.t: "Iguanodon" #NT!
 dubois.2132.f: "Iguanodon é um gênero notável de dinossauros herbívoros que prosperaram durante o período do Cretáceo, aproximadamente 140 a 120 milhões de anos atrás. Classificado como um iguanodontídeo, o Iguanodon desempenhou um papel fundamental na formação de nossa compreensão da anatomia e do comportamento de dinossauros. Acredita -se que seu pico de polegar, que antes era considerado uma buzina, tenha sido usado para defesa contra predadores ou para manipular a vegetação. \ Niguanodon habitava ambientes diversos, incluindo florestas e planícies, e era um herbívoro qualificado, usando seu bico de dentes para cultivar vegetação. Com um comprimento de até 33 pés, era um herbívoro proeminente de seu tempo, influenciando os ecossistemas que habitava. Os fósseis de Iguanodon foram descobertos pela primeira vez na Europa, principalmente na Bélgica e na Inglaterra, e seu estudo desempenhou um papel crucial no desenvolvimento do campo da paleontologia." #NT!
 dubois.2133.t: "Plateossauro" #NT!
 dubois.2133.f: "O PLACHOSAURUS é um gênero significativo de dinossauros herbívoros que floresceram durante o período do Triássico tardio, aproximadamente 214 a 204 milhões de anos atrás. Classificada como prossauropod, o Platosaurus oferece insights cruciais sobre a evolução precoce dos dinossauros e suas adaptações a diferentes ambientes. Seus membros robustos e adaptações de sustentação de peso permitiram procurar eficientemente a vegetação e navegar em seu habitat. Com um comprimento estimado de até 30 pés, a placa do prato era um herbívoro dominante de seu tempo, ocupando várias paisagens que variam de plantas de inundação a florestas de terras altas. Seus dentes largos em forma de folha facilitaram o consumo de material vegetal." #NT!
 dubois.2132.h: "Retornar à seção europeia." #NT!
  
 dubois.2141.t: "Seção de dinossauros africanos" #NT!
 dubois.2141.d: "Qual esqueleto de dinossauro para visitar?" #NT!
 dubois.2141.f: "Não foi até o início do século XX que a paleontologia na África experimentou um boom significativo, com a Tanzânia e a África do Sul sendo particularmente notáveis, mas também o Egito. Descobertas importantes foram os giraffatitan e espinossauros." #NT!
 dubois.2141.g: "Giraffatitan." #NT!
 dubois.2141.h: "Spinossaurus." #NT!
  
 dubois.2142.t: "Giraffatitan" #NT!
 dubois.2142.f: "Giraffatitan, anteriormente conhecido como Brachiosaurus, é um gênero notável de dinossauros colossais de pescoço comprido que prosperaram durante o período jurássico tardio, aproximadamente 154 a 150 milhões de anos atrás. Classificado como saurópode, a giraffatitana é reconhecida por seu tamanho excepcional e adaptações únicas. Com uma altura de até 39 pés e um comprimento superior a 80 pés, era um dos animais terrestres mais altos e mais longos que já existiam. \ Ngiraffatitan era um herbívoro que provavelmente habitava ambientes exuberantes, como vales de rios e planícies de inundação, onde poderia acessar alimentos plantas amplos. Sua grande massa corporal foi apoiada por ossos robustos dos membros e um enorme peito em forma de barril. A evidência fóssil de giraffatitana foi desenterrada principalmente na África, particularmente na atual Tanzânia e Zimbábue." #NT!
 dubois.2143.t: "Spinossaurus" #NT!
 dubois.2143.f: "O espinossauro é um gênero notável de dinossauros carnívoros que habitou o norte da África durante o período cretáceo, aproximadamente 112 a 93 milhões de anos atrás. Classificada como um terópode, o espinossauro é comemorado por suas características distintas e adaptações únicas. Sua vela pode ter desempenhado um papel na termorregulação ou no reconhecimento de espécies. Com um comprimento estimado de até 50 a 59 pés, Spinosaurus é considerado um dos maiores dinossauros de terópode. Seus membros robustos e crânio alongado sugerem adaptações para capturar e consumir presas aquáticas, destacando seu nicho ecológico. Os restos fósseis de Spinosaurus foram descobertos no Egito e, posteriormente, no Marrocos." #NT!
 dubois.2142.h: "Retornar à seção africana." #NT!
  
 dubois.2151.t: "Seção de dinossauros asiáticos" #NT!
 dubois.2151.d: "Qual esqueleto de dinossauro para visitar?" #NT!
 dubois.2151.f: "Uma primeira expedição dos EUA para a Mongólia no primeiro terço do século XX deve levar à descoberta de novos tipos de dinossauros na Ásia. Psittacosaurus e Velociraptor estão entre as espécies mais longas conhecidas." #NT!
 dubois.2151.g: "Psittacosaurus." #NT!
 dubois.2151.h: "Velociraptor." #NT!
  
 dubois.2152.t: "Psittacosaurus" #NT!
 dubois.2152.f: "Psittacosaurus é um gênero notável de dinossauros pequenos e herbívoros que habitavam a Ásia durante o período do Cretáceo, aproximadamente 126 a 101 milhões de anos atrás. Classificado como um ceratopsiano, o Psittacosaurus se destaca por suas características e contribuições intrigantes para nossa compreensão da evolução de dinossauros. Acredita-se que esses botões de pena tenham suportado estruturas de cerdas, possivelmente para exibição ou termorregulação. \ Com um comprimento variando de cerca de 3 a 6,5 ​​pés, Psittacosaurus habitava uma variedade de ambientes, incluindo florestas e planícies. Seus bicos e dentes especializados sugerem adaptações para o processamento de uma gama diversificada de material vegetal. Os restos fósseis de Psittacosaurus foram descobertos principalmente na China e na Mongólia." #NT!
 dubois.2153.t: "Velociraptor" #NT!
 dubois.2153.f: "Velociraptor é um gênero de renome de dinossauros carnívoros pequenos e médios que percorreram partes da Ásia durante o final do período do Cretáceo, cerca de 75 a 71 milhões de anos atrás. Classificado como um terópode dromaeosaurídeo, o Velociraptor é comemorado por suas adaptações notáveis ​​e seu papel na formação da percepção pública de dinossauros. Ele possuía um corpo elegante, uma cauda longa e uma garra distinta em forma de foice em cada pé, que provavelmente usou para cortar sua presa. Seus sentidos aguçados, dentes afiados e comportamentos de caça de matilha, como inferidos a partir de evidências e estudos fósseis, contribuíram para sua reputação como um predador formidável." #NT!
 dubois.2152.h: "Retornar à seção asiática." #NT!
  
 dubois.2161.t: "Seção de dinossauros australianos" #NT!
 dubois.2161.d: "Qual esqueleto de dinossauro para visitar?" #NT!
 dubois.2161.f: "Em 1926, os ossos de dinossauros foram descobertos na Austrália pela primeira vez, que foi o começo de pesquisas mais intensivas. Mais tarde, o Muttaburrasaurus ganharia notoriedade." #NT!
 dubois.2161.g: "Muttaburrasaurus." #NT!
 dubois.2161.h: "Rhotosaurus." #NT!
  
 dubois.2162.t: "Muttaburrasaurus" #NT!
 dubois.2162.f: "Muttaburrasaurus é um gênero notável de dinossauros ornitópodes que habitou a Austrália durante o período do Cretáceo, aproximadamente 112 a 99 milhões de anos atrás. Classificado como um iguanodontiano, Muttaburrasaurus oferece informações valiosas sobre a fauna pré -histórica dessa região. Suas mandíbulas poderosas estavam equipadas com baterias de dentes adequados para moer material vegetal, sugerindo uma dieta herbívoro. Seus membros robustos e tamanho relativamente grande sugerem adaptações para locomoção e herbivoria eficientes." #NT!
 dubois.2163.t: "Rhotosaurus" #NT!
 dubois.2163.f: "Rhotosaurus é um gênero notável de dinossauros saurópodes que habitou a Austrália durante o período jurássico médio, aproximadamente 165 milhões de anos atrás. Classificado dentro do grupo sauropodomorfoso, Rhotosaurus fornece um vislumbre crucial da história antiga dos dinossauros australianos. Embora relativamente menores em comparação com alguns de seus parentes de Saurópodes, o Rhotosaurus ainda media cerca de 50 pés de comprimento, tornando -o um dos maiores animais de seu tempo na Austrália. Os fósseis do Rhoetossaurus foram descobertos pela primeira vez em Queensland, na Austrália, e representam algumas das evidências mais antigas de Sauropod Dinossaurs nessa região. Suas características anatômicas, como seu pescoço longo e cauda relativamente alongada, refletem adaptações para a herbivoria e a exploração de uma variedade de recursos vegetais." #NT!
 dubois.2162.h: "Retornar à seção australiana." #NT!
  
 dubois.2112.d_perfect_dinosaur: "Este esqueleto de dinossauro é considerado perfeitamente montado. Não precisa ser alterado e oferece uma classificação máxima de dinossauros." #NT!
 dubois.2112.d_imperfect_dinosaur: "Este esqueleto de dinossauro é considerado imperfeito montado. Dá apenas metade da possível classificação de dinossauros. Pode ser remontado por um [concept_dubois_paleontologist], desde que ele não esteja ocupado ou exausto." #NT!
 dubois.2112.d_poor_dinosaur: "Este esqueleto de dinossauro é considerado mal montado. Dói nossa classificação de dinossauros massivamente. Pode ser remontado por um [concept_dubois_paleontologist], desde que ele não esteja ocupado ou exausto." #NT!
 dubois.2112.g: "Remonte este esqueleto de dinossauro." #NT!
  
