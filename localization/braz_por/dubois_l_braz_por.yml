 dubois.52.t: "Florestas de alta qualidade"
 dubois.52.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] atingiu o objetivo [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]. Através de uma seleção cuidadosa de mudas particularmente resistentes, medidas para o controle natural de pragas e o estudo de vários animais e plantas em simbiose, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] fortaleceu sustentávelmente a indústria florestal de nosso país. É provável que essas medidas ecológicas tragam benefícios econômicos."
 dubois.52.f: "'Sinto muito, o quê? Você quer cortar as árvores? Fui a todos os problemas de criá -los, nutri -los e cuidar deles, e agora esses monstros capitalistas querem matar meus queridos? Oh meu Deus, o que eu fiz!"
 dubois.52.g: "Mais madeira para todos!"
 dubois.53.t: "Árvores de borracha de alta qualidade"
 dubois.53.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] atingiu o objetivo [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]. Através de uma seleção cuidadosa de mudas particularmente resistentes, medidas para o controle natural de pragas e o estudo de vários animais e plantas em simbiose, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] fortaleceu sustentávelmente a indústria florestal de nosso país. É provável que essas medidas ecológicas tragam benefícios econômicos."
 dubois.53.f: "'Por que todos estão interessados ​​na borracha completamente inútil? Eu só fiz isso porque estou interessado no mosquito do pântano neohesperialista. Este animal pequeno e facilmente fatal só se reproduz neste clima."
 dubois.53.g: "Mais borracha para todos!"
 dubois.22.t: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] documentos [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]"
 dubois.22.d: "Depois de meses observando o animal em seu habitat nativo, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] completou suas observações. Seu tratado, #YELLOW '[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]'#!, já está disponível. [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]"
