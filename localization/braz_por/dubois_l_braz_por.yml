 je_dubois_improve_forestry_project_reason: "Seu [concept_dubois_naturalist] Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] se concentra em melhores sementes e melhor seleção de mudas no [JournalEntry.GetTarget.GetBuilding.GetName] em [JournalEntry.GetTarget.GetBuilding.GetState.GetName]. \ N$mr_divider_for_je$ \ nO projeto obterá progresso todos os meses. Toda vez que o progresso atinge [JournalEntry.GetTotalGoalValue|V0], o edifício receberá um novo modificador. Cada novo modificador precisa do progresso para preencher novamente. \ N$mr_divider_for_je$ \ nCurrent Monthly Progress: #underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.GetVariable('dubois_monthly_naturalist_improvement_progress_var').GetValue|2+] [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]0" #NT!
