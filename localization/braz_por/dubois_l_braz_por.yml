 dubois_lion_baby_birth_flavor: "Dois pequenos filhotes de leão estavam rastejando pela mãe. Acabou de nascer há algumas semanas, mas eles foram mantidos em um esconderijo por sua mãe por algum tempo. Agora eles finalmente conseguiram ver o mundo, jogar e rolar. Eles eram adoráveis!" #NT!
 dubois_otter_baby_birth_flavor: "Foi a primeira vez que a pequena lontra entrou na água para nadar. Parecia muito bom para ser a primeira vez. Então o pequeno animal saiu da água e deitado em uma rocha quente." #NT!
 dubois_jaguar_baby_birth_flavor: "O pequeno Jaguar, com apenas 6 semanas de idade, seguiu sua mãe. Parecia bastante desajeitado. Mas logo se tornaria um predador perigoso." #NT!
 dubois_koala_baby_birth_flavor: "O pequeno coala segurou as costas de sua mãe. Já era bastante velho, mas ainda dependente da mãe. De repente, ele pegou uma folha de uma das árvores e começou a mordiscar nela." #NT!
 dubois_panda_baby_birth_flavor: "O pequeno panda parecia tão inocente. Rolou e parecia ser bastante desajeitado. Mas sua mãe manteve isso em sua opinião. Nada poderia acontecer com a coisa minúscula." #NT!
  
 dubois.1250.t: "Parque Nacional de Yosemite?" #NT!
 dubois.1250.d: "Alguns conservacionistas influentes querem criar um parque nacional no vale de Yosemite para proteger sua paisagem única. O vale é um lugar único, com vistas deslumbrantes. As perguntas é que preferimos uma reserva natural ou queremos usar o vale para agricultura, madeira e mineração?" #NT!
 dubois.1250.f: "\ "Mas nenhum templo feito com as mãos pode comparar com Yosemite. Toda pedra em sua parede parece brilhar com a vida. \" \ N - John Muir" #NT!
 dubois.1250.g: "Esta é uma ótima ideia!" #NT!
 dubois.1250.h: "Na verdade, isso parece um ótimo lugar para mineração!" #NT!
  
 dubois.1251.t: "Os últimos saboros" #NT!
 dubois.1251.d: "O sábio, o bisonte europeu, está quase extinto. Apenas alguns animais permanecem na floresta Białowieża. Até 1830, a floresta estava protegida, mas após a revolta da NoviMeber, quase todos os postos dos florestadores foram abolidos. A visita de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] pode levar a restabelecer um [concept_dubois_nature_reserve] na floresta." #NT!
 dubois.1251.f: ""Białowieża é a última floresta primitiva da Europa e abriga os últimos sabores. É uma maravilha natural!" #NT!
 dubois.1251.g: "Precisamos proteger o sabor!" #NT!
 dubois.1251.h: "Esta floresta é perfeita para a exploração madeireira." #NT!
  
 dubois.1252.t: "Uma reserva de caça real em Gran Paradiso?" #NT!
 dubois.1252.d: "Caçar em Gran Paradiso é maravilhoso! Especialmente porque é o último lugar onde o #b alpino ibex#! vive. Após uma caçada lá, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] pensou em estabelecer um [Concept('concept_dubois_nature_reserve','$concept_dubois_royal_hunting_reserve$')] lá para proteger os últimos ibex." #NT!
 dubois.1252.f: "\ "Como ousa essas pessoas comuns matar meu Ibex? Só posso caçá -las! Devemos proteger meu jogo desses selvagens! A proteção do Ibex alpino ainda era uma das tarefas mais importantes do parque. Em 1922, havia cerca de 3000 ibexes no parque. Esse número despencou durante o domínio fascista e a Segunda Guerra Mundial, mas mais tarde a população se recuperou e existem cerca de 4000 Ibexes no Parque Nacional hoje." #NT!
 dubois.1252.g: "Encontrei a Reserva Real de Caça imediatamente!" #NT!
 dubois.1252.h: "Talvez mais tarde ..." #NT!
  
  
