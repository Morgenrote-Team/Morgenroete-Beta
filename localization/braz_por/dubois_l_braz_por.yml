 dubois.11.capybara: "A Capivara"
 dubois.1041.capybara: "Visite a #o Capivara#!"
 dubois.1302.capybara: "Capivaras"
 dubois.118.t: "Capivara"
 dubois.118.d: "Nosso zoológico é enriquecido por um animal novo e exótico: hoje o tão esperado #O Capybara#! mudou-se para seu novo recinto."
 dubois.118.f: "O Capybara, o maior roedor do mundo, é nativo da América do Sul. Com seus pés embalados e estilo de vida semi-aquático, ele prospera em zonas úmidas e nas margens dos rios. Capybaras são animais altamente sociais, geralmente vivem em grupos de 10 a 20 indivíduos. Eles se alimentam principalmente de gramíneas e plantas aquáticas e são conhecidas por sua natureza gentil e dócil. Apesar do tamanho, eles são excelentes nadadores e podem permanecer submersos para evitar predadores."
 dubois.118.g: "É uma enorme cobaia!"
 visit_capybara_tt: "Você visitará o recinto do #o Capybara#!"
