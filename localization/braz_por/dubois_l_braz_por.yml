 dubois_nature_protection_tech: "Proteção da natureza"
 dubois_nature_protection_tech_desc: "A proteção da natureza começou com a necessidade de proteger as florestas. Mais tarde, espécies animais ameaçadas e áreas inteiras de terra também foram protegidas. Nos séculos XIX e XX, houve vários projetos de conservação da natureza bem -sucedidos, como a reintrodução do iBex alpino nos Alpes suíços."
