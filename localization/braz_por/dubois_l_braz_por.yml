 dubois.2112.t: "Ankylosaurus" #NT!
 dubois.2112.f: "Ankylosaurus é um gênero notável de dinossauro blindado que prosperou durante o período do Cretáceo tardio, aproximadamente 68 a 66 milhões de anos atrás. Pertencente ao grupo de dinossauros herbívoros conhecidos como anquilossaurídeos, esta criatura pré-histórica é celebrada por suas adaptações defensivas distintas e impressionantes. Sua característica mais icônica era o Tail Club, formado por um botão denso de osso na ponta da cauda, ​​que provavelmente serviu como um impedimento contra os atacantes e uma ferramenta de combate intraespecífico. Com um comprimento de cerca de 20 a 30 pés, o anquilossauro era um herbívoro quadrúpede, utilizando seu amplo a vegetação. Sua cabeça relativamente pequena, quando comparada ao seu corpo substancial, indica hábitos seletivos de alimentação em plantas e arbustos baixos." #NT!
 dubois.2113.t: "Diplodocus" #NT!
 dubois.2113.f: "O diplodoco representa um gênero emblemático de dinossauros colossais e de pescoço longo que floresceu durante o período jurássico tardio, aproximadamente 154 a 152 milhões de anos atrás. Classificada como saurópode, o diplodoco é conhecido por seu notável pescoço alongado e tamanho imenso, resumindo a grandeza da vida pré-histórica. \ Ncharacterizada por seu plano corporal distinto, diplodocus possuía um pescoço alongado e uma cauda, ​​com uma cabeça relativamente pequena que possuía pegos de pegeth supilando para a fossa para servir a serpente. Seu comprimento impressionante de até 90 pés o tornou um dos animais terrestres mais longos que já existiram, enquanto seu esqueleto relativamente leve e a postura quadrúpedal facilitou o movimento eficiente. \ Ndiplodocus acredita -se ter sido um herbívoro, usando seu longo colo para atingir a vegetação acima do solo, evitando a competição com outros seus ebivores. As evidências fósseis sugerem que esses dinossauros provavelmente habitaram ambientes exuberantes ao longo das margens dos rios, onde a ampla vida vegetal estava prontamente disponível." #NT!
 dubois.2114.t: "Triceratops" #NT!
 dubois.2114.f: "O Triceratops é um gênero icônico de dinossauros com chifres que prosperaram durante o período do Cretáceo, aproximadamente 68 a 66 milhões de anos atrás. Classificada como um ceratopsida, o Triceratops é comemorado por sua aparência distinta, marcada por uma impressionante variedade de chifres faciais e um babado ósseo na parte de trás da cabeça. Seu fresco, ornamentado com fenestrae e padrões intrincados, provavelmente desempenharam papéis no reconhecimento de espécies, termorregulação e telas em potencial. Seu bico robusto permitiu que ele cortasse com eficiência a vegetação, e suas maxilares poderosas podiam moer material vegetal difícil. Evidências fossilizadas de ossos de triceratops sugerem que ele pode ter se envolvido em comportamentos sociais e interações hierárquicas nos rebanhos." #NT!
 dubois.2115.t: "Tyrannosaurus rex" #NT!
 dubois.2115.f: "Tyrannosaurus Rex, comumente referido como T. Rex, é um dinossauro predatório icônico e colossal que vagou pela Terra durante o período do Cretáceo Tardio, aproximadamente 68 a 66 milhões de anos atrás. Pertencente ao grupo de dinossauros terópode, T. Rex estava no topo da cadeia alimentar pré -histórica como um dos maiores predadores de terras que já existiam. Seu crânio imponente, equipado com dentes serrilhados e do tamanho de uma banana, sugere uma dieta carnívora compreendendo principalmente outros dinossauros. Seus membros posteriores poderosos foram adaptados para o movimento Swift, enquanto seus armas desproporcionalmente pequenas, remanescentes de estruturas vestigiais, continuam a cativar a investigação científica. \ Npaleontological Evidence sugere que T. rex pode ter sido um predador de ápice, utilizando seu profundo senso de olfato, a visão binocular e a força formidável da JAW para garantir a impressão de que a Jaw formável. O debate sobre seus comportamentos de caça, seja como predador ou tesouro ativo, continua sendo objeto de pesquisa e especulação em andamento." #NT!
 dubois.2116.t: "StegoSaurus" #NT!
 dubois.2116.f: "None" #NT!
 dubois.2112.h: "Retornar à seção norte -americana." #NT!
  
