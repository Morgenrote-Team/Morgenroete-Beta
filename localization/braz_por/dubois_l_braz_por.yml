 dubois.139.d: "Nosso zoológico é enriquecido por um animal novo e exótico: hoje o tão esperado #O Gorilla#! mudou-se para seu novo recinto." #NT!
 dubois.139.f: "O gorila, nativo das florestas da África Central, é o maior dos grandes macacos. Com sua constituição poderosa e olhar inteligente, ele vive em grupos sociais liderados por um homem dominante conhecido como Silverback. Os gorilas são principalmente herbívoros, alimentando -se de folhas, caules e frutas. Apesar de seu tamanho e força, eles geralmente são gentis e tímidos, passando a maior parte do tempo buscando e descansando em seu habitat florestal." #NT!
 dubois.139.g: "Eles são enormes!" #NT!
