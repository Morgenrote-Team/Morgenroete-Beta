 dubois.149.d: "Nosso zoológico é enriquecido por um animal novo e exótico: hoje o tão esperado #O Cat#! de Pallas mudou-se para seu novo recinto."
 dubois.149.f: "O gato de Pallas é um pequeno felino selvagem que vive nas pastagens e regiões montanhosas da Ásia Central. Conhecida por sua densa e fofa de pêlo e uma construção, é bem adaptada a ambientes frios. Os gatos de Pallas são solitários e ilusórios, muitas vezes escondidos em fendas ou tocas para evitar predadores. Eles caçam principalmente pequenos mamíferos como roedores e pássaros, usando sua visão aguda e furtividade."
