 dubois.39.d: "Após semanas de tentativas fracassadas e um esforço sem fim, o tão esperado animal foi finalmente pego. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está muito feliz. Os heróis voltam para casa com o animal que venceram. Certamente será mais feliz no bom zoológico nacional de [ROOT.GetCountry.GetNameNoFlag] do que nesta natureza desconfortável!"
