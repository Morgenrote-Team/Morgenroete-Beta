 dubois_conference_naturalist_double_vote_tt: "Graças ao nosso naturalista experiente, temos #G duas vezes o poder de voto." #NT!
 dubois_conference_naturalist_triple_vote_tt: "Graças ao nosso famoso naturalista, temos #G três vezes o poder de voto." #NT!
