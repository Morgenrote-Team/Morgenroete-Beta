 dubois.1041.t: "Os recintos europeus"
 dubois.1041.d: "O recinto europeu é dominado por uma grande área florestal, mas também havia outros recintos. Alguns visitantes estavam comendo e bebendo algo em um restaurante que estava localizado em uma casa tradicional européia de meio tempo."
