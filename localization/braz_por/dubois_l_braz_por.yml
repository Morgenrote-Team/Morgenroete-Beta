 dubois.1211.d: "Como não conseguimos proteger o [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] em [ROOT.GetState.GetName] estabelecendo um [concept_dubois_nature_reserve], o habitat foi destruído." #NT!
 dubois.1211.f: "Infelizmente, o estabelecimento da empresa de mineração chegou ao preço de destruir o habitat de um dos animais de nosso país. Mas quem se importa com isso? Os lucros estão nos aguardando!" #NT!
