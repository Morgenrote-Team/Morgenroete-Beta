 dubois.1049.t: "Gabinete de alces" #NT!
 dubois.1049.d: "No recinto florestal do zoológico, um majestoso alce europeu é alto, seus enormes chifres que se estendem em direção ao céu." #NT!
 dubois.1049.f1: "O comportamento calmo do alce e o tamanho imponente chamam a atenção dos visitantes, que se maravilham com a pura escala desse gigante gentil. Curiosos sobre seus impressionantes chifres, você se aproxima de um zookê para obter mais informações. \ N \ "ELK europeu, ou alces, como são conhecidos na América do Norte, são os maiores membros da família de veados", explica "o Zookeeper explica. "Seus chifres podem abranger até um metro e oitenta e são usados ​​principalmente durante a estação do sulco, quando os homens competem por companheiros. Esses chifres são derramados e regressivos a cada ano, com o novo conjunto se tornando maior e mais intrincado à medida que as idades dos alces. \"" #NT!
 dubois.1049.f2: "No canto sombreado do habitat dos alces, um grande alce europeu masculino abaixa sua cabeça enorme para pastar em brotos e folhas macias. O movimento silencioso e rítmico de suas mandíbulas, pois mastiga é quase hipnótico, atraindo uma multidão de espectadores. Intrigados com os hábitos de alimentação do alce, você procura um zookê para aprender mais. "Ao contrário dos pastores, que comem principalmente grama, os alces preferem se alimentar de uma variedade de vegetação, incluindo folhas, casca e plantas aquáticas. Eles têm um forte olfato, o que os ajuda a localizar as plantas mais nutritivas em seu ambiente. Na natureza." #NT!
 dubois.1049.f3: "Em meio às árvores enferrujadas do recinto, um alce europeu de repente solta um profundo e ressonante abaixo, seu chamado ecoando pelo ar. O som chama a atenção de todos próximos, que param para ouvir esse grito primitivo. Curioso sobre o significado dessa vocalização, você se aproxima de um zookê para insights. \ "Durante a estação de reprodução, os alces masculinos usam essas vocalizações altas para estabelecer domínio e atrair mulheres. A chamada pode ser ouvida por longas distâncias e é frequentemente acompanhada por exibições de chifres e postura agressiva. É um lembrete poderoso do papel do alce como uma força dominante em seu habitat natural." #NT!
  
