 dubois.1019.t: "Gabinete de meerkat" #NT!
 dubois.1019.d: "O eclosure meerkat foi dominado por rochas com cavernas nelas. Imediatamente você notou muitos dos pequenos animais que estão correndo por aí." #NT!
 dubois.1019.f1: ""Os meerkats são notáveis ​​por sua estrutura social altamente organizada", explica "O Zookeeper explica. "Cada membro do grupo, conhecido como" multidão "ou" gangue ", revezam -se como um sentinela, cuidando de predadores, enquanto outros forragem ou descansam. Sua comunicação é nítida e clara; diferentes chamadas sinalizam níveis variados de ameaça. Essa constante vigilância e cooperação são essenciais para sua sobrevivência na natureza." #NT!
 dubois.1019.f2: "\ "Meerkats são escavadores de especialistas, \" Os compartilhamentos de Zookeeper. "Eles podem cavar vários metros de profundidade em apenas alguns minutos, o que é essencial para encontrar alimentos como insetos, pequenos répteis e raízes. Esse comportamento de escavação também desempenha um papel crucial na criação de seus intrincados sistemas de toca, onde vivem em grupos e criam seus jovens. Essas redes subterrâneas fornecem proteção contra predadores e clima extremo. \"" #NT!
 dubois.1019.f3: ""Os meerkats têm uma ampla gama de vocalizações", explica "o Zookeeper explica. \ "Seus sons incluem tudo, desde chamadas de alarme para coordenar seus movimentos, a chamadas mais suaves usadas para manter o contato dentro do grupo. Quando um membro encontra comida, muitas vezes chama para compartilhar a descoberta com outras pessoas, enfatizando a natureza comunitária de sua sociedade. Essas comunicações vocais são integrantes à sua sobrevivência, ajudando -os a permanecer conectados e coordenados. \"" #NT!
  
