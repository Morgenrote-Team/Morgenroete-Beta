 dubois.7.t: "A mariposa apimentada evolui!"
 dubois.7.d: "O Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] notou que o aparecimento da mariposa apimentada mudou nos últimos anos, o que é uma evidência clara da teoria da evolução."
 dubois.7.f: "\"Como as árvores de bétula nas quais as vidas de mariposa apimentadas ficam cada vez mais escuras por causa da poluição, podemos ver, que o número de mariposas escuras claramente levantadas. À medida que mais mariposas brancas são comidas por predadores porque são muito mais visíveis, as mariposas escuras começam a assumir o controle. \ Não é uma evidência clara da evolução em um período de tempo. à direita. \ \"\ n \ n#b Historicamente#!, A mudança evolutiva na cor da mariposa apimentada foi notada em 1848 em Manchester. Não foi até 1896 que J. W. Tutt mostrou que era um caso de seleção natural. No entanto, o fenótipo branco da mariposa apimentada é dominante novamente, pois o ar ficou mais limpo e a maioria das bétulas é branca novamente."
 dubois.7.g: "Evidências claras da evolução!"
