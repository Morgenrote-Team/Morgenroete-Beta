 dubois.31.l: "Gorila"
 dubois.32.t.gorilla_1: "Um gorila forte"
 dubois.32.t.gorilla_2: "Segundo avistamento de um gorila"
 dubois.32.t.gorilla_3: "Outro gorila"
 dubois.32.f.gorilla.1: "Nas florestas de névoa das terras altas, uma batida de peito profunda e ressonante reverbera através da densa vegetação rasteira-um som que envia um arrepio pela espinha de todas as criaturas vivas ao alcance. Lá, entre as árvores antigas, o gorila Silverback faz sua presença conhecida. Alto e formidável, ele é um protetor e um governante de sua tropa. O professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] assiste com admiração enquanto o grande macaco afirma seu domínio, levando sua família com uma graça que esconde seu imenso poder. O naturalista, dividido entre admiração e dever, prepara seu equipamento, sabendo que capturar essa criatura majestosa para o zoológico pode ser a tarefa mais assustadora até agora."
 dubois.32.f.gorilla.2: "Quando o sol começa a se pôr atrás do horizonte montanhoso, a selva ganha vida com os sons da natureza. Através do denso dossel, surge uma família de gorilas, seus movimentos deliberados e imbuídos de propósito. O mais novo entre eles se apega às costas de sua mãe, enquanto o imponente Silverback levanta a retaguarda, seus olhos atentos que procuram qualquer sinal de perigo. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] prende a respiração, seus binóculos treinados nesse raro e fugaz vislumbre da vida dessas criaturas nobres. O pensamento de separar essa família pesa muito em sua mente, mas a pressão dos clientes do zoológico o deixa com pouca escolha - ele deve prosseguir, mesmo que isso signifique interromper a harmonia da selva."
 dubois.32.f.gorilla.3: "No fundo do coração da floresta tropical, onde o ar é espesso com o perfume da terra e os apelos de criaturas invisíveis, os gorilas fazem sua casa. O imponente prateado, com seu pêlo de prata e os olhos, sabendo olhos, é o líder indiscutível de sua tropa. Suas mãos enormes embalam suavemente um jovem gorila, uma rara demonstração de ternura de um ser tão poderoso. O professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] observa esse momento íntimo à distância, em conflito pelo dilema ético diante dele. Os clientes do zoológico esperam resultados, mas enquanto ele observa os intrincados laços sociais entre esses animais notáveis, ele começa a questionar se alguma gaiola poderia realmente manter o espírito da natureza."
 dubois.33.d.gorilla: "Em busca do #O Gorilla#!,, nossa equipe Safari encontrou uma flora incrível. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está inclinado a fazer uma pausa."
 dubois.34.d.gorilla: "O Safari, que teve como objetivo capturar o # O Gorilla#!, deve ser interrompido. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está faltando!"
 je_dubois_safari_gorilla: "Africa Safari: Gorila"
 je_dubois_safari_gorilla_reason: "Em um safari africano, através de rastreamento e captura constantes, o grande jogo pode ser capturado e depois transportado para um [concept_dubois_zoo]. Só é possível pegar um animal por safari. Dependendo da espécie animal, difere se você precisa de armadilhas ou precisa permanecer em sua trilha. Como regra geral, animais grandes e lentos precisam de mais armadilhas, enquanto os animais rápidos exigem mais rastreamento. O Safari dura 300 dias. Se nenhum animal for pego até então, a equipe Safari deixará o país novamente - sem sucesso. \ N \ Naggressive Animals podem se defender e atacar ao prender. Animais tímidos voam. Um [concept_dubois_naturalist] que tem o traço zoologista pode resolver essas situações sem desvantagem. Novas tecnologias como #ORANGE metralhadora #! ou #ORANGE mecanismo de combustão #! facilita o rastreamento e a captura de animais."
 dubois.228.d: "Quem esperava que uma águia majestosa fosse da Nova Zelândia de todos os lugares? O Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] encontrou vários ossos de uma águia gigantesca que tinha uma envergadura enorme de 2,6 metros (8 pés 6 pol.). Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] assume que esse pássaro pode ter inspirado a lenda de Pouākai, um mito dos maori."
