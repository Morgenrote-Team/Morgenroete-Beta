 dubois.271.t_triassic: "None" #NT!
 dubois.271.d: "O Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] convidou hoje um grupo de colegas para visitar o novo cenário pré -histórico. Os acadêmicos elogiaram [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] senso de detalhe." #NT!
 dubois.271.f_cretaceous: "O clima no cretáceo era geralmente quente e equilibrado. Isso permitiu que alguns dinossauros atingissem as latitudes do sul e do norte, pelo menos durante os meses de verão. Os poloneses estavam livres de gelo e o nível do mar era correspondentemente muito alto, atingindo seu valor máximo no Turoniano Inferior. Foi apenas no final do Cretáceo no Maastrichtiano que o resfriamento e uma regressão acentuada ocorreu. Como no período jurássico anterior, a macrofauna terrestre e a megafauna foram dominadas por dinossauros. Nas plantas do Baixo Cretáceo, Moss, samambaias, samambaias, ginkgoales, bennettitales e coníferas eram as plantas predominantes. No Cretáceo Superior, muitas árvores decíduas, como Maple, Oak e Walnut, competiram com coníferas como Sequoia e Geinitzia. As gramíneas se espalharam pelo continente e mudaram bastante o comportamento da erosão." #NT!
 dubois.271.f_jurassic: "O período jurássico inferior pode ter terminado com erupções maciças em uma grande província magmática em Gondwana. Isso levou ao aquecimento global, juntamente com uma extinção em massa de segunda ordem. As coníferas de folhas pequenas e adaptadas à seca se tornaram uma parte importante da flora e os saurópodes modernos se desenvolveram entre os dinossauros. O período jurássico, especialmente o período jurássico tardio (Jurássico Superior), viu o primeiro auge dos dinossauros, com grandes terópodes como altosaurus e saurópodes gigantes, como diplodocos e girafatitan. A flora foi dominada pelas gimnospermas (incluindo plantas coníferas como sequóias e pinheiros, mas também árvores e cicades de ginkgo). O Jurássico também é conhecido como a idade das cicades porque eram muito comuns. Ferns e cavalos formavam o sub -bosque das florestas." #NT!
 dubois.271.f_triassic: "Durante o Triássico, um clima quente prevaleceu quase continuamente, embora isso estivesse sujeito a fortes flutuações no início do período. O clima também parece ter sido bastante seco em todo o mundo: o motivo foi a forma da pangea supercontinente e um efeito de monção resultante. Provavelmente havia extensos desertos para o interior. A volta do Permiano para o Triássico está associada a uma mudança de fauna pronunciada. Isso é tão drástico que, devido ao registro fóssil significativamente alterado, a virada do Permiano para o Triássico não é apenas a fronteira entre dois períodos, mas também entre duas épocas da história da Terra, o Paleozóico e o Mesozóico. Como resultado, vários grupos de invertebrados marinhos desaparecem completamente ou permanentemente do registro fóssil. A fauna de vertebrados terrestres também está passando por mudanças significativas. A mudança no mundo das plantas de samambaias para gimnospermas que já haviam ocorrido no Permiano continuou no Triássico." #NT!
 dubois.271.g: "Lindo!" #NT!
 dubois.272.t: "Materiais" #NT!
 dubois.272.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] mostra um perfeccionismo notável ao concluir seu cenário pré -histórico. É por isso que [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] já usou todo o seu orçamento." #NT!
 dubois.272.f: "Foi o ovo de dinossauro especialmente ordenado para a exposição? As sementes requintadas? Ou a ponta de 300 libras que o carregador recebeu pela terra natural? Por qualquer motivo, o Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] dificilmente pode explicar, o dinheiro simplesmente flui por suas mãos." #NT!
 dubois.272.g: "Mais dinheiro para algumas plantas artificiais e lagartos? Esqueça!" #NT!
 dubois.272.h: "Queremos um lindo diorama, poupe sem despesas!" #NT!
 dubois.273.t: "Um trabalho ridículo?" #NT!
 dubois.273.d: "Alguns colegas acadêmicos 'simulam o Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] por causa da obsessão [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] com cenário pré -histórico não apenas atrás do [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] de volta, mas agora diretamente. Alguns pesquisadores consideram a atividade [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] um hobby absurdo e o projeto um assunto fundamentalmente ridículo." #NT!
 dubois.273.f: ""A extrema raridade das formas de transição no registro fóssil persiste como o segredo comercial da paleontologia". -Søren Kierkegaard" #NT!
 dubois.273.g: "Paleontologia é uma ciência séria!" #NT!
 dubois.273.h: "É certo que nosso paleontologista é um pouco peculiar." #NT!
 dubois.273.i: "Compre aqueles estudiosos desagradáveis ​​algumas garrafas de xerez para que eles deixe o médico em paz." #NT!
 dubois.274.t: "Interesse estudantil" #NT!
 dubois.274.d: "Há algumas semanas, os alunos da universidade estão assistindo com um interesse crescente onde o Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] está construindo um cenário pré -histórico. O que alguns consideram um empreendimento peculiar, outros vêem como inspiração - de repente o passado distante se torna tangível." #NT!
 dubois.274.f: "Court Court em Crystal Palace Park, no sul de Londres, é um parque temático geológico e paleontológico. É conhecido pelas esculturas de animais, criadas por Benjamin Waterhouse Hawkins em meados do século XIX, como as primeiras representações figurativas em tamanho real do mundo de animais extintos. O parque pretendia servir tanto a diversão quanto a educação de seus visitantes vitorianos. Nas ilhas do lago na parte do complexo projetado como um jardim paisagístico inglês, um parque temático foi projetado que refletia a história geológica da Grã -Bretanha. De acordo com um conceito baseado no geólogo David Thomas Ansted, cada uma das três ilhas foi designada para uma era do Fanerozóico e foi projetada com os sedimentos que se originaram naquele período. Hawkins foi aconselhado pelo paleontologista Richard Owen. Embora os animais pré -históricos não correspondessem mais ao estado da pesquisa no mesmo século, eles despertaram grande interesse e forneceram grandes partes da população com um nível básico de conhecimento paeontológico." #NT!
 dubois.274.g: "Uma nova geração de estudiosos!" #NT!
 dubois.274.h: "Eles devem ajudar o médico." #NT!
  
 je_dubois_safari_hippopotamus: "Africa Safari: Hippopotamus" #NT!
 je_dubois_safari_hippopotamus_reason: "Em um safari africano, através de rastreamento e captura constantes, o grande jogo pode ser capturado e depois transportado para um [concept_dubois_zoo]. Só é possível pegar um animal por safari. Dependendo da espécie animal, difere se você precisa de armadilhas ou precisa permanecer em sua trilha. Como regra geral, animais grandes e lentos precisam de mais armadilhas, enquanto os animais rápidos exigem mais rastreamento. O Safari dura 300 dias. Se nenhum animal for pego até então, a equipe Safari deixará o país novamente - sem sucesso. \ N \ Naggressive Animals podem se defender e atacar ao prender. Animais tímidos voam. Um [concept_dubois_naturalist] que tem o traço zoologista pode resolver essas situações sem desvantagem. Novas tecnologias como #ORANGE metralhadora #! ou #ORANGE mecanismo de combustão #! facilita o rastreamento e a captura de animais." #NT!
