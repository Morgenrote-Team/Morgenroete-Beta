 dubois_zoo_has_no_pallas_tt: "Seu zoológico ainda não possui #V Cats#! de Pallas. Você pode encontrá -los nos estados de #b $STATE_QINGHAI$#!, #b $STATE_HINGGAN$#!, #b $STATE_URGA$#! e #b #!2#!."
 dubois.1039.t: "Gabinete de tilacina"
 dubois.1039.d: "No recinto sombrio do zoológico, o indescritível tilacina se aproxima graciosamente ao longo do perímetro, sua armação listrada e esbelta, dando -lhe uma aparência quase mítica. Os visitantes, encantados por sua presença sobrenatural, reúnem -se para observar essa criatura rara. Curioso sobre suas origens, você se aproxima de um Zookeeper para obter mais informações."
 dubois.1039.f1: "\"O tilacino, ou tigre da Tasmânia, é um exemplo fascinante de evolução convergente\", explica \"O Zookeeper explica. \ \"Embora pareça um canino com seu corpo de cachorro e casaco listrado, é na verdade um marsupial, mais intimamente relacionado a cangurus e coalas. Nativo da Tasmânia e da Austrália continental, a tilacina já foi o ápice predador de seu ambiente."
 dubois.1039.f2: "\"Os tilacinas eram principalmente caçadores noturnos,\" os compartilhamentos de Zookeeper. \"Eles confiaram em seu forte senso de visão e audição para rastrear presas, muitas vezes caçando sozinhas ou em pares. Ao contrário de muitos outros predadores, os tilacinas eram relativamente silenciosos, usando furtividade e paciência para abordar suas pedreiras. Sua dieta consistia principalmente de animais pequenos e médios, incluindo muros, pássaros e roedores. \" \""
 dubois.1039.f3: "\"As vocalizações do tilacino eram raras, mas memoráveis\", explica o zookê. \"Eles produziriam uma série de YIPs, rosnados e uivos, especialmente durante a estação de reprodução ou quando se sentiam ameaçados. Essas chamadas foram usadas para se comunicar com outros tilacinas por longas distâncias, principalmente nas densas florestas de tasmânia."
 je_academics_get_exotic_animal_thylacine_loc: "A #p Thylacine#!"
 dubois_zoo_has_thylacine: "#tooltip:[GetRawTextTooltipTag('dubois_zoo_has_thylacine_tt')] @animal_thylacine! #!"
 dubois_zoo_has_thylacine_tt: "Seu zoológico tem #V thylacines#!."
