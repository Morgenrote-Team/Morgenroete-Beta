 dubois.108.d: "Nosso zoológico é enriquecido por um novo animal exótico: hoje o tão esperado #O gila monster#! mudou-se para seu novo recinto." #NT!
 dubois.108.f: "O monstro de Gila é um nativo veneno do sudoeste dos Estados Unidos e do noroeste do México. Reconhecível por suas distintas marcações em preto e laranja, é um dos poucos lagartos venenosos do mundo. Os monstros de Gila são lentos e principalmente noturnos, alimentando-se de pequenos mamíferos, pássaros e ovos. Eles armazenam gordura nas caudas, permitindo que eles sobrevivam a longos períodos sem comida." #NT!
 dubois.108.g: "Não parece tão perigoso ..." #NT!
 visit_gila_tt: "Você visitará o recinto do #o gila monster#!" #NT!
  
