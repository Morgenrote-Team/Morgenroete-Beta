 dubois.158.d: "Nosso zoológico é enriquecido por um novo animal exótico: hoje o tão esperado #O thilacine#! mudou-se para seu novo recinto." #NT!
 dubois.158.f: "O tilacino, também conhecido como Tasmânia Tiger, era um nativo marsupial carnívoro da Tasmânia e da Austrália. Tinha uma volta distinta listrada e era principalmente noturna. Os tilacinas eram caçadores solitários, contando com furtividade para capturar presas como pequenos mamíferos e pássaros. Infelizmente, devido à caça e perda de habitat, o tilacino agora é considerado extinto." #NT!
