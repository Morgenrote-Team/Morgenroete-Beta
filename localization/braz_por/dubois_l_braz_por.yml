  ### 2.2.3 ### 
  
 dubois.261.t: "Sistemização completa" #NT!
 dubois.261.d: "Ao longo de anos de trabalho, o Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] publicou teorias [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] sobre relacionamentos no mundo pré -histórico de animais e plantas. A publicação já foi reconhecida por uma base para suas novas idéias sobre a árvore genealógica dos seres vivos." #NT!
 dubois.261.f: "'Coletarei plantas e fósseis e, com os melhores instrumentos, fazem observações astronômicas. No entanto, esse não é o principal objetivo da minha jornada. Vou me esforçar para descobrir como as forças da natureza agem umas sobre as outras e de que maneira o ambiente geográfico exerce sua influência em animais e plantas. Em suma, devo descobrir sobre a harmonia na natureza. -Alexander von Humboldt" #NT!
 dubois.261.g: "É realmente ... muito interessante." #NT!
 dubois.262.t: "Árvore genealógica de um animal" #NT!
 dubois.262.d: "Depois que o Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] comparou relatórios locais e internacionais sobre os fósseis de uma certa espécie animal, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] questiona fundamentalmente os fatos anteriormente acreditavam sobre a evolução dessa espécie." #NT!
 dubois.262.f: "Absorvido na investigação especial, não prestei atenção ao edifício que estava inconscientemente se construindo. No entanto, tendo concluído a comparação das espécies fósseis em Paris, eu queria, por uma revisão fácil da mesma, para fazer uma lista de acordo com sua sucessão em formações geológicas, com o objetivo de determinar as características mais exatamente e trazê -las por sua enumeração ao relevo mais ousado. Qual foi minha alegria e surpresa descobrir que a enumeração mais simples dos peixes fósseis de acordo com sua sucessão geológica também era uma declaração completa das relações naturais das famílias entre si; Portanto, pode -se ler o desenvolvimento genético de toda a classe na história da criação, a representação dos gêneros e espécies nas várias famílias que estão sendo determinadas; Em uma palavra, que a sucessão genética dos peixes corresponde perfeitamente à sua classificação zoológica e apenas com a classificação proposta por mim. -Louis Agassiz" #NT!
 dubois.262.g: "Temos esse animal no zoológico?" #NT!
 dubois.263.t: "Uma pequena aquisição" #NT!
 dubois.263.d: "Durante seus estudos, o Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] entrou em contato com outro paleontologista. Através dos canais de negociação, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] conseguiu adquirir um fóssil que apóia sua última tese - às vezes às custas da universidade." #NT!
 dubois.263.f: "Na voz da anatomia comparativa, todo osso e fragmento de um osso, retomou seu lugar. Não consigo encontrar palavras para expressar o prazer que tenho ao ver, pois descobri um personagem, como todas as consequências, que eu previ, foram confirmadas sucessivamente; Os pés foram encontrados de acordo com os personagens anunciados pelos dentes; os dentes em harmonia com os indicados de antemão pelos pés; Os ossos das pernas e das coxas, e toda parte de conexão das extremidades, foram encontradas unidas com precisão como eu as organizava, antes que minhas conjecturas fossem verificadas pela descoberta de partes inteiras: em suma, cada espécie foi, por assim dizer, reconstruída de um único de seus elementos componentes. -William Buckland" #NT!
 dubois.263.g: "Valeu a pena?" #NT!
 dubois.264.t: "Sugestões geológicas" #NT!
 dubois.264.d: "Em uma conversa com [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] sobre os locais dos fósseis nas camadas de rocha, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] ganhou novas idéias sobre a determinação cronológica." #NT!
 dubois.264.f: ""Por que ninguém viu que os fósseis apenas deram à luz uma teoria sobre a formação da terra, que sem eles, ninguém jamais teria sonhado que houve épocas sucessivas na formação do globo". -Georges Cuvier" #NT!
 dubois.264.g: "Ah, as sinergias da geologia e paleontologia!" #NT!
 dubois.265.t: "Uma palestra impressionante" #NT!
 dubois.265.d: "O Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] deu uma série de palestras altamente aclamada em sua universidade neste semestre que são consideradas inspiradoras para a paleontologia. Muitos novos alunos se matricularam no assunto." #NT!
 dubois.265.f: "'As one penetrates from seam to seam, from stratum to stratum and discovers, under the quarries of Montmartre or in the schists of the Urals, those animals whose fossilized remains belong to antediluvian civilizations, the mind is startled to catch a vista of the milliards of years and the millions of peoples which the feeble memory of man and an indestructible divine tradition have forgotten and whose ashes heaped on the surface do nosso globo, formam os dois pés de terra que nos fornecem pão e flores. -Honoré de Balzac" #NT!
 dubois.265.g: "Um professor popular!" #NT!
  
