 dubois.1039.t: "Gabinete de tilacina" #NT!
 dubois.1039.d: "No recinto sombrio do zoológico, o indescritível tilacina se aproxima graciosamente ao longo do perímetro, sua armação listrada e esbelta, dando -lhe uma aparência quase mítica. Os visitantes, encantados por sua presença sobrenatural, reúnem -se para observar essa criatura rara. Curioso sobre suas origens, você se aproxima de um Zookeeper para obter mais informações." #NT!
 dubois.1039.f1: ""O tilacino, ou tigre da Tasmânia, é um exemplo fascinante de evolução convergente", explica "O Zookeeper explica. \ "Embora pareça um canino com seu corpo de cachorro e casaco listrado, é na verdade um marsupial, mais intimamente relacionado a cangurus e coalas. Nativo da Tasmânia e da Austrália continental, a tilacina já foi o ápice predador de seu ambiente." #NT!
 dubois.1039.f2: ""Os tilacinas eram principalmente caçadores noturnos," os compartilhamentos de Zookeeper. "Eles confiaram em seu forte senso de visão e audição para rastrear presas, muitas vezes caçando sozinhas ou em pares. Ao contrário de muitos outros predadores, os tilacinas eram relativamente silenciosos, usando furtividade e paciência para abordar suas pedreiras. Sua dieta consistia principalmente de animais pequenos e médios, incluindo muros, pássaros e roedores. \" "" #NT!
 dubois.1039.f3: ""As vocalizações do tilacino eram raras, mas memoráveis", explica o zookê. "Eles produziriam uma série de YIPs, rosnados e uivos, especialmente durante a estação de reprodução ou quando se sentiam ameaçados. Essas chamadas foram usadas para se comunicar com outros tilacinas por longas distâncias, principalmente nas densas florestas de tasmânia." #NT!
  
