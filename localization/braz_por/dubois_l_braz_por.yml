 dubois_extend_zoo_small_decision: "Estender o [concept_dubois_zoo] (pequeno)" #NT!
 dubois_extend_zoo_small_decision_desc: "§0 são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos e o prestígio internacional é concedido àqueles que podem mostrar o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Alguns estágios de expansão exigem não apenas para coletar muitos animais, mas também de diferentes partes do mundo." #NT!
 dubois_extend_zoo_medium_decision: "Estender o [concept_dubois_zoo] (médio)" #NT!
 dubois_extend_zoo_medium_decision_desc: "§0 são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos e o prestígio internacional é concedido àqueles que podem mostrar o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Alguns estágios de expansão exigem não apenas para coletar muitos animais, mas também de diferentes partes do mundo." #NT!
 dubois_extend_zoo_large_decision: "Estender o [concept_dubois_zoo] (grande)" #NT!
 dubois_extend_zoo_large_decision_desc: "§0 são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos, e o prestígio internacional é concedido àqueles que podem mostrar o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Alguns estágios de expansão exigem não apenas para coletar muitos animais, mas também de diferentes partes do mundo." #NT!
 dubois_extend_zoo_famous_decision: "Estender o [concept_dubois_zoo] (famoso)" #NT!
 dubois_extend_zoo_famous_decision_desc: "§0 são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos e o prestígio internacional é concedido àqueles que podem mostrar o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Alguns estágios de expansão exigem não apenas para coletar muitos animais, mas também de diferentes partes do mundo." #NT!
  
 dubois_catch_local_animal_decision: "Pegue animais locais" #NT!
 dubois_catch_local_animal_decision_desc: "Nossa nação tem habitats animais com espécies fascinantes que podem ser exibidas em um [concept_dubois_zoo]. Um especialista em animais deve viajar pelo país por um ano para coletar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para um zoológico." #NT!
  
 dubois_visit_zoo_decision: "Visite o zoológico" #NT!
 dubois_visit_zoo_decision_desc: "Abre o evento do zoológico em que você pode visitar seu zoológico e ver todos os animais que você coletou." #NT!
 dubois_ban_animal_export_decision: "Proibir exportação de animais" #NT!
 dubois_ban_animal_export_decision_desc: "Com a proibição de exportações de animais, estamos deixando claro em princípio que não estamos preparados para vender nenhum de nossos animais no exterior. Outras nações vão se abster de investigações." #NT!
 dubois_allow_animal_export_decision: "Permitir exportações de animais" #NT!
 dubois_allow_animal_export_decision_desc: "Com uma permissão de exportação para animais, podemos obter uma boa renda extra." #NT!
 dubois_collect_specimen_decision: "Colete [concept_dubois_specimen]" #NT!
 dubois_collect_specimen_decision_desc: "Uma coleção de diversos [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] de origem zoológica e botânica não apenas beneficiaria nossos pesquisadores em casa, mas também representaria uma exibição da mente e descobertas inquéricas de nossa nação." #NT!
  
 dubois_safari_decision: "Africa Safari" #NT!
 dubois_safari_decision_desc: "Em um safari africano, através de rastreamento e captura constantes, o grande jogo pode ser capturado e depois transportado para um [concept_dubois_zoo]. Só é possível pegar um animal por safari. Dependendo da espécie animal, difere se você precisa de armadilhas ou precisa permanecer em sua trilha. Como regra geral, animais grandes e lentos precisam de mais armadilhas, enquanto os animais rápidos exigem mais rastreamento." #NT!
  
 je_dubois_safari: "Africa Safari" #NT!
 je_dubois_safari_reason: "Em um safari africano, através de rastreamento e captura constantes, o grande jogo pode ser capturado e depois transportado para um [concept_dubois_zoo]. Só é possível pegar um animal por safari. Dependendo da espécie animal, difere se você precisa de armadilhas ou precisa permanecer em sua trilha. Como regra geral, animais grandes e lentos precisam de mais armadilhas, enquanto os animais rápidos exigem mais rastreamento." #NT!
 je_dubois_safari_goal: "O Safari da África dura meio ano. Se nenhum animal for pego até então, a equipe Safari deixará o país novamente - sem sucesso." #NT!
 je_dubois_safari_fail: "O Safari da África dura meio ano. Se nenhum animal for pego até então, a equipe Safari deixará o país novamente - sem sucesso." #NT!
  
 je_dubois_dinosaur_excavation: "Escavação de dinossauros" #NT!
 je_dubois_dinosaur_excavation_reason: "Depois de encontrar um osso de dinossauro, o professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] iniciou uma escavação em larga escala. Durante a investigação de um ano, é possível, dependendo da experiência, que nosso [concept_dubois_paleontologist] encontrará um a mais três ossos de dinossauros. No final da escavação, outro achado de osso de dinossauro é possível, por isso ainda não encontramos todos os ossos possíveis para um esqueleto de dinossauros. São necessários 5 ossos para construir um esqueleto na coleção paleontológica." #NT!
 je_dubois_dinosaur_excavation_goal: "Após doze meses, nosso [concept_dubois_paleontologist] resumirá os resultados." #NT!
  
 je_dubois_mountain_expedition: "Tentativa de uma primeira ascensão" #NT!
 je_dubois_mountain_expedition_reason: "Uma equipe de montanhismo liderada por [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] está atualmente tentando escalar uma montanha anteriormente não limitada em [SCOPE.sState('dubois_summit_location').GetName]. A duração da expedição e seu sucesso dependem da altitude das montanhas e da experiência do líder." #NT!
 je_dubois_mountain_expedition_goal: "A montanha é escalada quando temos o progresso de escalada #O suficientemente suficiente e nenhum desastre acontece até então." #NT!
 je_dubois_mountain_expedition_invalid: "A expedição será cancelada, caso o estado em que a expedição ocorra mude as mãos por qualquer motivo." #NT!
  
 dubois_specimen_tt: "Tenha pelo menos #G 50.000#! @dubois_specimen! #O Biológico [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!" #NT!
  
 dubois_promote_humanities_button: "Promover humanidades" #NT!
 dubois_promote_humanities_button_desc: "Para garantir que o próximo cientista seja um [concept_lepsius_archaeologist], devemos ter pelo menos uma universidade com um [concept_pm_academics_university_humanities]." #NT!
 dubois_promote_natural_history_button: "Promover a história natural" #NT!
 dubois_promote_natural_history_button_desc: "Para garantir que o próximo cientista seja um [concept_dubois_naturalist] e [concept_dubois_paleontologist], devemos ter pelo menos uma universidade com um [concept_pm_academics_university_natural_history]." #NT!
 dubois_promote_mathematics_button: "Promover matemática" #NT!
 dubois_promote_mathematics_button_desc: "Para garantir que o próximo cientista seja um [concept_gaudi_engineer] ou [concept_verrier_astronomer], devemos ter pelo menos uma universidade com um [concept_pm_academics_university_mathematics]." #NT!
  
 notification_dubois_paleontological_report_notification_name: "Relatório Paleontológico Anual" #NT!
 notification_dubois_paleontological_report_notification_desc: "Nossos [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] encontraram [GetPlayer.MakeScope.Var('dubois_fossils_notification_var').GetValue|0+=] novos fósseis este ano." #NT!
 notification_dubois_java_man_notification_name: "[INITIATOR_COUNTRY.GetName] descobre o homem java" #NT!
 notification_dubois_java_man_notification_desc: "Um [concept_dubois_paleontologist] de [INITIATOR_COUNTRY.GetName] descobriu um esqueleto importante no Java que poderia responder a perguntas sobre a evolução humana." #NT!
 notification_dubois_botanical_report_notification_name: "Relatório Botânico Anual" #NT!
 notification_dubois_botanical_report_notification_desc: "Nossos [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] encontraram [GetPlayer.MakeScope.Var('dubois_specimen_notification_var').GetValue|0+=] Novo espécime este ano." #NT!
  
 dubois.1.t: "Inauguração do zoológico" #NT!
 dubois.1.d: "No dia de abertura do novo [concept_dubois_zoo], os visitantes se reúnem para ver os animais. Logo havia o desejo de construir ainda mais recintos e estabelecer animais." #NT!
 dubois.1.f: "'Duas noites atrás, eu vi os Tigres sup na Exeter mudar. Exceto o leão de Veli Pacha em Morea, que seguiu o goleiro árabe como um cachorro, o carinho da Hyaena por seu goleiro me divertiu mais. Tal conversazione! - Havia um 'hipopótamo', como Lord Liverpool na cara; E a 'preguiça de Ursine' tem a própria voz e maneira do meu manobrista - mas o tigre falou demais. O elefante levou e me deu meu dinheiro de novo - tirou meu chapéu, abriu uma porta. Trounk um chicote, e se comportou tão bem, que eu gostaria que ele fosse meu mordomo. O animal mais bonito do mundo é um dos Panteras; Mas os pobres antílopes estavam mortos. Eu deveria odiar ver um aqui: a visão do camelo me fez PINE novamente para a Ásia Menor. -Lord byron" #NT!
 dubois.1.g: "Visite o novo zoológico." #NT!
 dubois.2.t: "Sobre a origem da espécie" #NT!
 dubois.2.d: "Com a publicação de seu livro, o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] fez uma contribuição científica inovadora: ele visa explicar nada menos que a origem das espécies." #NT!
 dubois.2.f: "'Owing to this struggle for life, any variation, however slight and from whatever cause proceeding, if it be in any degree profitable to an individual of any species, in its infinitely complex relations to other organic beings and to external nature, will tend to the preservation of that individual, and will generally be inherited by its offspring ... I have called this principle, by which each slight variation, if useful, is preserved, by the term of Natural Selection, in order to mark its relation to Poder da seleção do homem. -Charles Darwin" #NT!
 dubois.2.g: "Essa teoria revolucionará a ciência." #NT!
 dubois.2.h: "Mais uma vez, a ciência refutou as superstições religiosas." #NT!
 dubois.3.t: "Retorno do Beagle" #NT!
 dubois.3.d: "O HMS Beagle retornou à Inglaterra após uma viagem de pesquisa de vários anos. Ela trouxe um rico fundo de espécimes, ossos, desenhos e outros resultados científicos. [concept_dubois_naturalist] [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] também estava a bordo." #NT!
 dubois.3.f: "Quando a bordo do HMS Beagle, como naturalista, fiquei muito impressionado com certos fatos na distribuição dos habitantes da América do Sul e nas relações geológicas do presente aos habitantes passados ​​desse continente. Esses fatos me pareciam lançar alguma luz sobre a origem das espécies - aquele mistério dos mistérios, como foi chamado por um de nossos maiores filósofos. - Charles Darwin" #NT!
 dubois.3.g: "Uma jornada incrível - que tipo de conseqüência ele terá?" #NT!
 dubois.4.t: "Kosmos" #NT!
 dubois.4.d: "Kosmos (geralmente referido em inglês como 'cosmos') foi um tratado influente sobre ciência e natureza escrito pelo cientista e explorador alemão Alexander von Humboldt. O Kosmos começou como uma série de palestras entregue por Humboldt na Universidade de Berlim e foi publicado em cinco volumes entre 1845 e 1862 (o quinto foi póstumo e incompleto)." #NT!
 dubois.4.f: "No final da noite de uma vida agitada, estou entregando ao público alemão uma obra cuja imagem vaga pairou diante da minha alma por quase meio século. Em muitos humores, considerei esse trabalho impraticável: e quando o desisti, voltei a ele novamente, talvez descuidadamente. Dedico aos meus contemporâneos com a timidez de que uma desconfiança da medida dos meus poderes deve inspirar em mim. Eu tento esquecer que os tão esperados escritos geralmente desfrutam de menos indulgência. -Alexander von Humboldt" #NT!
 dubois.4.g: "Este trabalho servirá a ciência contemporânea." #NT!
 dubois.4.h: "Este trabalho inspirará as gerações futuras." #NT!
 dubois.5.t: "A herança de Mendel" #NT!
 dubois.5.d: "A redescoberta do trabalho do abade Gregor Mendel provocou um grande avanço no campo da genética. Suas teses já conhecidas como 'Regras de Mendel'." #NT!
 dubois.5.f: "A experiência de fertilização artificial, como é efetuada com plantas ornamentais para obter novas variações de cor, levou aos experimentos que serão discutidos aqui. A regulação impressionante com a qual as mesmas formas híbridas sempre reapareciam sempre que a fertilização ocorreu entre as mesmas espécies que induziam outros experimentos a serem realizados, cujo objetivo era acompanhar os desenvolvimentos dos híbridos em sua progênie. ' -Gregor Mendel" #NT!
 dubois.5.g: "O nascimento da genética moderna." #NT!
 dubois.6.t: "O homem java" #NT!
 dubois.6.d: "O médico holandês e o anatomista [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] causaram uma sensação científica em sua busca direcionada pelos ancestrais do homem. Ele descobriu o esqueleto de um homem pré -histórico que viveu um milhão de anos atrás." #NT!
 dubois.6.f: "Os fósseis descobertos pela primeira vez por [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] em 1891, nas margens do rio solo, perto de Trinil, em Java Oriental, são chamados de Java Man. De acordo com o conhecimento atual, diz -se que eles têm cerca de um milhão de anos. Eles foram os primeiros fósseis de homininos a serem descobertos fora da Europa e, depois dos neandertais, a segunda evidência de parentes fósseis de humanos anatomicamente modernos (Homo sapiens). Os achados do Java foram chamados de Anthropopithecus e, posteriormente, como Pithecanthropus erectus. Hoje eles são designados para a espécie homo erectus pela maioria dos paleoantropologistas, em que sua origem é ocasionalmente - como sugerido por Franz Weidenreich em 1940 - enfatizado pela adição de um epíteto de subespécie: Homo erectus javanensis. Mais de 50 anos após a descoberta de Dubois, Ralph von Koenigswald se lembrou de que, "nenhuma outra descoberta paleontológica criou essa sensação e levou a uma variedade de opiniões científicas conflitantes"." #NT!
 dubois.6.g: "Precisamos desse homem como nosso paleontólogo principal!" #NT!
  
 dubois.11.t: "Um novo [concept_dubois_zoo_animal]" #NT!
 dubois.11.d: "[SCOPE.sCountry('dubois_animal_country').GetName] concordou gentilmente em nos vender um animal raro para o nosso [concept_dubois_zoo]." #NT!
 dubois.11.f: "Apenas um animal pode ser comprado para um zoológico de cada vez. Após a compra, levará cerca de um mês ou dois para o animal chegar ao zoológico. Somente após a introdução adequada ao zoológico, um novo animal pode ser selecionado por ação diplomática. Qual animal do zoológico deve ser?" #NT!
