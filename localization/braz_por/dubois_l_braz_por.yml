 dubois.2051.diplodocus: "Diplodoco"
 dubois.2051.triceratops: "Triceratops"
 dubois.2051.tyrannosaurus: "Tyrannosaurus rex"
 dubois.2051.stegosaurus: "StegoSaurus"
 dubois.2051.antarctosaurus: "Antarctosaurus"
 dubois.2051.argyrosaurus: "Argyrossaurus"
 dubois.2051.iguanodon: "Iguanodon"
 dubois.2051.plateosaurus: "Plateossauro"
 dubois.2051.giraffatitan: "Giraffatitan"
 dubois.2051.spinosaurus: "Spinossaurus"
 dubois.2051.psittacosaurus: "Psittacosaurus"
 dubois.2051.velociraptor: "Velociraptor"
 dubois.2051.muttaburrasaurus: "Muttaburrasaurus"
 dubois.2051.rhoetosaurus: "Rhotosaurus"
 dubois.2051.g: "Visite os esqueletos norte -americanos."
 dubois.2051.h: "Visite os esqueletos sul -americanos."
 dubois.2051.i: "Visite os esqueletos europeus."
 dubois.2051.j: "Visite os esqueletos da África."
 dubois.2051.k: "Visite os esqueletos asiáticos."
 dubois.2051.l: "Visite os esqueletos australianos."
 dubois.2101.t: "Um esqueleto aprimorado"
 dubois.2101.d: "Os esforços de nosso [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] nasceram frutos: o esqueleto anteriormente defeituoso foi significativamente melhorado."
 dubois.2101.f: "Demorou um pouco para pensar no animal pré -histórico, sua locomoção, seu ambiente ecológico e muitas outras circunstâncias antes do professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] surgir com a idéia crucial de colocar alguns ossos no lugar certo. Todo o esqueleto foi, portanto, significativamente atualizado."
 dubois.2101.g: "Parece muito melhor!"
 dubois.2102.t: "Um esqueleto inalterado"
 dubois.2102.d: "Apesar de inúmeras tentativas de melhorar o esqueleto, nosso [concept_dubois_paleontologist] não teve sucesso."
 dubois.2102.f: "O professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] manteve muito cuidado no tratamento do esqueleto. Em um esforço para não destruir muito e prosseguir com cautela, ele permaneceu tão cuidadoso que mudou quase nada."
 dubois.2102.g: "Inalterado? O que isso está realmente sendo pago?"
 dubois.2103.t: "Um esqueleto deteriorado"
 dubois.2103.d: "Talvez teria sido melhor não ter [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] funcionar em um esqueleto de dinossauro."
 dubois.2103.f: "Foi extremamente surpreendente para todos os envolvidos quando o professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] apresentou a 'versão revisada' do esqueleto. Não menos importante, porque um quadril agora repousava em um dos ombros e uma segunda cauda formidável complementava o animal - na testa."
 dubois.2103.g: "Esse idiota piorou!"
 dubois.2111.t: "Seção de dinossauros norte -americanos"
 dubois.2111.d: "Qual esqueleto de dinossauro para visitar?"
 dubois.2111.f: "Os dinossauros norte -americanos estão entre os mais conhecidos de sua espécie. Numerosas espécies de dinossauros foram encontradas na formação de Morrison no final do século XIX. Espécimes conhecidos são anquilossauros, diplodocos, triceratops e tiranossauro rex."
 dubois.2111.g: "Anquilossauro."
 dubois.2111.h: "Diplodoco."
 dubois.2111.i: "Triceratops."
 dubois.2111.j: "Tyrannosaurus rex."
 dubois.2111.k: "StegoSaurus."
 dubois.2112.t: "Anquilossauro"
 dubois.2112.f: "Ankylosaurus é um gênero notável de dinossauro blindado que prosperou durante o período do Cretáceo tardio, aproximadamente 68 a 66 milhões de anos atrás. Pertencente ao grupo de dinossauros herbívoros conhecidos como anquilossaurídeos, esta criatura pré-histórica é celebrada por suas adaptações defensivas distintas e impressionantes. Sua característica mais icônica era o Tail Club, formado por um botão denso de osso na ponta da cauda, ​​que provavelmente serviu como um impedimento contra os atacantes e uma ferramenta de combate intraespecífico. Com um comprimento de cerca de 20 a 30 pés, o anquilossauro era um herbívoro quadrúpede, utilizando seu amplo a vegetação. Sua cabeça relativamente pequena, quando comparada ao seu corpo substancial, indica hábitos seletivos de alimentação em plantas e arbustos baixos."
 dubois.2113.t: "Diplodoco"
 dubois.2113.f: "O diplodoco representa um gênero emblemático de dinossauros colossais e de pescoço longo que floresceu durante o período jurássico tardio, aproximadamente 154 a 152 milhões de anos atrás. Classificada como saurópode, o diplodoco é conhecido por seu notável pescoço alongado e tamanho imenso, resumindo a grandeza da vida pré-histórica. \ Ncharacterizada por seu plano corporal distinto, diplodocus possuía um pescoço alongado e uma cauda, ​​com uma cabeça relativamente pequena que possuía pegos de pegeth supilando para a fossa para servir a serpente. Seu comprimento impressionante de até 90 pés o tornou um dos animais terrestres mais longos que já existiram, enquanto seu esqueleto relativamente leve e a postura quadrúpedal facilitou o movimento eficiente. \ Ndiplodocus acredita -se ter sido um herbívoro, usando seu longo colo para atingir a vegetação acima do solo, evitando a competição com outros seus ebivores. As evidências fósseis sugerem que esses dinossauros provavelmente habitaram ambientes exuberantes ao longo das margens dos rios, onde a ampla vida vegetal estava prontamente disponível."
 dubois.2114.t: "Triceratops"
 dubois.2114.f: "O Triceratops é um gênero icônico de dinossauros com chifres que prosperaram durante o período do Cretáceo, aproximadamente 68 a 66 milhões de anos atrás. Classificada como um ceratopsida, o Triceratops é comemorado por sua aparência distinta, marcada por uma impressionante variedade de chifres faciais e um babado ósseo na parte de trás da cabeça. Seu fresco, ornamentado com fenestrae e padrões intrincados, provavelmente desempenharam papéis no reconhecimento de espécies, termorregulação e telas em potencial. Seu bico robusto permitiu que ele cortasse com eficiência a vegetação, e suas maxilares poderosas podiam moer material vegetal difícil. Evidências fossilizadas de ossos de triceratops sugerem que ele pode ter se envolvido em comportamentos sociais e interações hierárquicas nos rebanhos."
 dubois.2115.t: "Tyrannosaurus rex"
 dubois.2115.f: "Tyrannosaurus Rex, comumente referido como T. Rex, é um dinossauro predatório icônico e colossal que vagou pela Terra durante o período do Cretáceo Tardio, aproximadamente 68 a 66 milhões de anos atrás. Pertencente ao grupo de dinossauros terópode, T. Rex estava no topo da cadeia alimentar pré -histórica como um dos maiores predadores de terras que já existiam. Seu crânio imponente, equipado com dentes serrilhados e do tamanho de uma banana, sugere uma dieta carnívora compreendendo principalmente outros dinossauros. Seus membros posteriores poderosos foram adaptados para o movimento Swift, enquanto seus armas desproporcionalmente pequenas, remanescentes de estruturas vestigiais, continuam a cativar a investigação científica. \ Npaleontological Evidence sugere que T. rex pode ter sido um predador de ápice, utilizando seu profundo senso de olfato, a visão binocular e a força formidável da JAW para garantir a impressão de que a Jaw formável. O debate sobre seus comportamentos de caça, seja como predador ou tesouro ativo, continua sendo objeto de pesquisa e especulação em andamento."
 dubois.2116.t: "StegoSaurus"
 dubois.2116.f: "None"
 dubois.2112.h: "Retornar à seção norte -americana."
 dubois.2121.t: "Seção de dinossauros sul -americanos"
 dubois.2121.d: "Qual esqueleto de dinossauro para visitar?"
 dubois.2121.f: "No final do século XIX, os ossos de dinossauros foram cada vez mais encontrados nos maciços patagônicos da América do Sul. Os primeiros representantes incluem Antarctosaurus e Argyrossaurus."
 dubois.2121.g: "Antarctosaurus."
 dubois.2121.h: "Argyrossaurus."
 dubois.2122.t: "Antarctosaurus"
 dubois.2122.f: "Antarctosaurus representa um gênero notável de dinossauros saurópodes que habitavam o antigo continente de Gondwana durante o período do Cretáceo Tardio, aproximadamente 70 a 65 milhões de anos atrás. Classificada dentro dos titanossauros, o Antarctosaurus exemplifica a diversidade de formas de saurópodes que, uma vez, a Terra vagou. \ NCharacterizada por seu tamanho maciço, o Antarctosaurus era um herbívoro colossal e quadrúpedal que atingia comprimentos de até 60 pés ou mais. Seu pescoço e cauda alongados, juntamente com a cabeça relativamente pequena, indicam adaptação para alimentar a vegetação alto acima do solo. Este titanossauro é conhecido por sua estrutura robusta de membros, que provavelmente apoiou seu peso e facilitou seu movimento. \ Nfossils de Antarctosaurus foram descobertos principalmente nos continentes do sul, incluindo a América do Sul e a Antártica, onde forneceram informações valiosas sobre a evolução e a distribuição dos sauropods durante o atraso. Esses achados contribuem para a nossa compreensão dos ecossistemas únicos que existiam em Gondwana durante esse período."
 dubois.2123.t: "Argyrossaurus"
 dubois.2123.f: "O Argyrossaurus é um gênero significativo de dinossauros saurópodes que percorreu as antigas paisagens da América do Sul durante o período do Cretáceo tardio, aproximadamente 90 a 70 milhões de anos atrás. Pertencente ao subgrupo saurópode conhecido como titanossauros, o Argyrossaurus oferece informações sobre a diversa fauna pré -histórica da região."
 dubois.2122.h: "Retorne à seção sul -americana."
 dubois.2131.t: "Seção de dinossauros europeus"
 dubois.2131.d: "Qual esqueleto de dinossauro para visitar?"
 dubois.2131.f: "Desde o início do século XIX, os novos fósseis de dinossauros foram desenterrados nos maciços europeus, principalmente como resultado do aumento da mineração. Entre outros, Iguanodon e Plateosaurus são conhecidos."
 dubois.2131.g: "Iguanodon."
 dubois.2131.h: "Plateossauro."
 dubois.2132.t: "Iguanodon"
 dubois.2132.f: "Iguanodon é um gênero notável de dinossauros herbívoros que prosperaram durante o período do Cretáceo, aproximadamente 140 a 120 milhões de anos atrás. Classificado como um iguanodontídeo, o Iguanodon desempenhou um papel fundamental na formação de nossa compreensão da anatomia e do comportamento de dinossauros. Acredita -se que seu pico de polegar, que antes era considerado uma buzina, tenha sido usado para defesa contra predadores ou para manipular a vegetação. \ Niguanodon habitava ambientes diversos, incluindo florestas e planícies, e era um herbívoro qualificado, usando seu bico de dentes para cultivar vegetação. Com um comprimento de até 33 pés, era um herbívoro proeminente de seu tempo, influenciando os ecossistemas que habitava. Os fósseis de Iguanodon foram descobertos pela primeira vez na Europa, principalmente na Bélgica e na Inglaterra, e seu estudo desempenhou um papel crucial no desenvolvimento do campo da paleontologia."
 dubois.2133.t: "Plateossauro"
 dubois.2133.f: "O PLACHOSAURUS é um gênero significativo de dinossauros herbívoros que floresceram durante o período do Triássico tardio, aproximadamente 214 a 204 milhões de anos atrás. Classificada como prossauropod, o Platosaurus oferece insights cruciais sobre a evolução precoce dos dinossauros e suas adaptações a diferentes ambientes. Seus membros robustos e adaptações de sustentação de peso permitiram procurar eficientemente a vegetação e navegar em seu habitat. Com um comprimento estimado de até 30 pés, a placa do prato era um herbívoro dominante de seu tempo, ocupando várias paisagens que variam de plantas de inundação a florestas de terras altas. Seus dentes largos em forma de folha facilitaram o consumo de material vegetal."
 dubois.2132.h: "Retornar à seção europeia."
 dubois.2141.t: "Seção de dinossauros africanos"
 dubois.2141.d: "Qual esqueleto de dinossauro para visitar?"
 dubois.2141.f: "Não foi até o início do século XX que a paleontologia na África experimentou um boom significativo, com a Tanzânia e a África do Sul sendo particularmente notáveis, mas também o Egito. Descobertas importantes foram os giraffatitan e espinossauros."
 dubois.2141.g: "Giraffatitan."
 dubois.2141.h: "Spinossaurus."
 dubois.2142.t: "Giraffatitan"
 dubois.2142.f: "Giraffatitan, anteriormente conhecido como Brachiosaurus, é um gênero notável de dinossauros colossais de pescoço comprido que prosperaram durante o período jurássico tardio, aproximadamente 154 a 150 milhões de anos atrás. Classificado como saurópode, a giraffatitana é reconhecida por seu tamanho excepcional e adaptações únicas. Com uma altura de até 39 pés e um comprimento superior a 80 pés, era um dos animais terrestres mais altos e mais longos que já existiam. \ Ngiraffatitan era um herbívoro que provavelmente habitava ambientes exuberantes, como vales de rios e planícies de inundação, onde poderia acessar alimentos plantas amplos. Sua grande massa corporal foi apoiada por ossos robustos dos membros e um enorme peito em forma de barril. A evidência fóssil de giraffatitana foi desenterrada principalmente na África, particularmente na atual Tanzânia e Zimbábue."
 dubois.2143.t: "Spinossaurus"
 dubois.2143.f: "O espinossauro é um gênero notável de dinossauros carnívoros que habitou o norte da África durante o período cretáceo, aproximadamente 112 a 93 milhões de anos atrás. Classificada como um terópode, o espinossauro é comemorado por suas características distintas e adaptações únicas. Sua vela pode ter desempenhado um papel na termorregulação ou no reconhecimento de espécies. Com um comprimento estimado de até 50 a 59 pés, Spinosaurus é considerado um dos maiores dinossauros de terópode. Seus membros robustos e crânio alongado sugerem adaptações para capturar e consumir presas aquáticas, destacando seu nicho ecológico. Os restos fósseis de Spinosaurus foram descobertos no Egito e, posteriormente, no Marrocos."
 dubois.2142.h: "Retornar à seção africana."
 dubois.2151.t: "Seção de dinossauros asiáticos"
 dubois.2151.d: "Qual esqueleto de dinossauro para visitar?"
 dubois.2151.f: "Uma primeira expedição dos EUA para a Mongólia no primeiro terço do século XX deve levar à descoberta de novos tipos de dinossauros na Ásia. Psittacosaurus e Velociraptor estão entre as espécies mais longas conhecidas."
 dubois.2151.g: "Psittacosaurus."
 dubois.2151.h: "Velociraptor."
 dubois.2152.t: "Psittacosaurus"
 dubois.2152.f: "Psittacosaurus é um gênero notável de dinossauros pequenos e herbívoros que habitavam a Ásia durante o período do Cretáceo, aproximadamente 126 a 101 milhões de anos atrás. Classificado como um ceratopsiano, o Psittacosaurus se destaca por suas características e contribuições intrigantes para nossa compreensão da evolução de dinossauros. Acredita-se que esses botões de pena tenham suportado estruturas de cerdas, possivelmente para exibição ou termorregulação. \ Com um comprimento variando de cerca de 3 a 6,5 ​​pés, Psittacosaurus habitava uma variedade de ambientes, incluindo florestas e planícies. Seus bicos e dentes especializados sugerem adaptações para o processamento de uma gama diversificada de material vegetal. Os restos fósseis de Psittacosaurus foram descobertos principalmente na China e na Mongólia."
 dubois.2153.t: "Velociraptor"
 dubois.2153.f: "Velociraptor é um gênero de renome de dinossauros carnívoros pequenos e médios que percorreram partes da Ásia durante o final do período do Cretáceo, cerca de 75 a 71 milhões de anos atrás. Classificado como um terópode dromaeosaurídeo, o Velociraptor é comemorado por suas adaptações notáveis ​​e seu papel na formação da percepção pública de dinossauros. Ele possuía um corpo elegante, uma cauda longa e uma garra distinta em forma de foice em cada pé, que provavelmente usou para cortar sua presa. Seus sentidos aguçados, dentes afiados e comportamentos de caça de matilha, como inferidos a partir de evidências e estudos fósseis, contribuíram para sua reputação como um predador formidável."
 dubois.2152.h: "Retornar à seção asiática."
 dubois.2161.t: "Seção de dinossauros australianos"
 dubois.2161.d: "Qual esqueleto de dinossauro para visitar?"
 dubois.2161.f: "Em 1926, os ossos de dinossauros foram descobertos na Austrália pela primeira vez, que foi o começo de pesquisas mais intensivas. Mais tarde, o Muttaburrasaurus ganharia notoriedade."
 dubois.2161.g: "Muttaburrasaurus."
 dubois.2161.h: "Rhotosaurus."
 dubois.2162.t: "Muttaburrasaurus"
 dubois.2162.f: "Muttaburrasaurus é um gênero notável de dinossauros ornitópodes que habitou a Austrália durante o período do Cretáceo, aproximadamente 112 a 99 milhões de anos atrás. Classificado como um iguanodontiano, Muttaburrasaurus oferece informações valiosas sobre a fauna pré -histórica dessa região. Suas mandíbulas poderosas estavam equipadas com baterias de dentes adequados para moer material vegetal, sugerindo uma dieta herbívoro. Seus membros robustos e tamanho relativamente grande sugerem adaptações para locomoção e herbivoria eficientes."
 dubois.2163.t: "Rhotosaurus"
 dubois.2163.f: "Rhotosaurus é um gênero notável de dinossauros saurópodes que habitou a Austrália durante o período jurássico médio, aproximadamente 165 milhões de anos atrás. Classificado dentro do grupo sauropodomorfoso, Rhotosaurus fornece um vislumbre crucial da história antiga dos dinossauros australianos. Embora relativamente menores em comparação com alguns de seus parentes de Saurópodes, o Rhotosaurus ainda media cerca de 50 pés de comprimento, tornando -o um dos maiores animais de seu tempo na Austrália. Os fósseis do Rhoetossaurus foram descobertos pela primeira vez em Queensland, na Austrália, e representam algumas das evidências mais antigas de Sauropod Dinossaurs nessa região. Suas características anatômicas, como seu pescoço longo e cauda relativamente alongada, refletem adaptações para a herbivoria e a exploração de uma variedade de recursos vegetais."
 dubois.2162.h: "Retornar à seção australiana."
 dubois.2112.d_perfect_dinosaur: "Este esqueleto de dinossauro é considerado perfeitamente montado. Não precisa ser alterado e oferece uma classificação máxima de dinossauros."
 dubois.2112.d_imperfect_dinosaur: "Este esqueleto de dinossauro é considerado imperfeito montado. Dá apenas metade da possível classificação de dinossauros. Pode ser remontado por um [concept_dubois_paleontologist], desde que ele não esteja ocupado ou exausto."
 dubois.2112.d_poor_dinosaur: "Este esqueleto de dinossauro é considerado mal montado. Dói nossa classificação de dinossauros massivamente. Pode ser remontado por um [concept_dubois_paleontologist], desde que ele não esteja ocupado ou exausto."
 dubois.2112.g: "Remonte este esqueleto de dinossauro."
