 je_dubois_improve_forestry_project_reason: "Your [concept_dubois_naturalist] Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] focuses on better seeds and better selection of seedlings in the [JournalEntry.GetTarget.GetBuilding.GetName] in [JournalEntry.GetTarget.GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches [JournalEntry.GetTotalGoalValue|V0] the building will receive a new modifier.\nThere is a total number of 3 modifiers ($dubois_building_throughput_add_modifier_with_tooltip$, $dubois_building_production_mult_modifier_with_tooltip$, $dubois_building_goods_input_mult_modifier_with_tooltip$) to gain. Each new modifier needs the progress to fill up again.\n$mr_divider_for_je$\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.GetVariable('dubois_monthly_naturalist_improvement_progress_var').GetValue|2+] #!#!"
