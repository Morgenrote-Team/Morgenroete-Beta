 dubois.1052.t: "Gabinete de urso polar"
 dubois.1052.d: "O gabinete do #o Polar Bear#! é provavelmente o gabinete menos naturalista em todos os zoológicos. Não porque o Zoosdon não tente, mas mais ainda porque as regiões em que os zoológicos estão atraindo apenas os visitantes se não estiverem no Pólo Norte. No entanto, o recinto rochoso era um lugar agradável para os ursos polares."
 dubois.1052.f1: "No amplo gabinete com tema do Ártico do zoológico, uma magnífica criatura conhecida como urso polar percorre seu habitat rochoso, seu pêlo branco espesso e uma estatura poderosa que chama a atenção. Intrigada com sua presença majestosa, você se aproxima de um Zookeeper experiente, ansioso para aprender mais sobre esse icônico predador do Ártico. \"Com seu denso pêlo, camada de gordura e patas, os ursos polares estão equipados de maneira única para sobreviver em temperaturas congelantes. Eles são excelentes nadadores, capazes de atravessar grandes distâncias em busca de alimentos, que incluem principalmente focas. \""
 dubois.1052.f2: "Na cativante paisagem polar do zoológico, uma mãe polar urso cuidadosamente tende a seus filhotes, seu pêlo branco macio e travessuras divertidas cativando visitantes de todas as idades. Intrigados com o vínculo materno, você procura um zookeeper experiente, na esperança de descobrir mais sobre a vida desses gigantes do Ártico. \"Após um período de gestação de cerca de oito meses, a fêmea dá à luz um a três filhotes em um dedo construído em um acaso de neve. Os filhotes dependem do calor e da nutrição de sua mãe para a sobrevivência, amamentando seu rico leite até que estejam prontos para se aventurar no mundo gelado. A mãe polar ensina seus filhotes."
 dubois.1052.f3: "Em meio ao habitat com tema do Ártico, um urso polar reclina em um monte de neve, sua presença majestosa emanando poder e serenidade. Intrigado com seu comportamento, você aborda um Zookeeper experiente, na esperança de entender o significado de suas ações. \ \"Durante os meses de verão, quando os alimentos são escassos, eles entram em um estado de atividade reduzida, contando com suas reservas de gordura para sustentá -las. Essa adaptação os ajuda a sobreviver aos períodos magros até que o gelo do mar retorne, oferecendo acesso à sua fonte de alimentos primários."
 dubois.1052.k: "Voltar aos recintos norte -americanos"
 zoo_north_american_enclosures_tt: "Você retornará aos recintos norte -americanos do zoológico."
 dubois.1053.t: "Grizzly Bear Gabinete"
 dubois.1053.d: "Uma área de madeira áspera cobria a maior parte do gelo de #o urso -grisalho_1. Ele forneceu tudo o que os Grizzlies precisam, de esconderijos a um pequeno lago para esfriar."
 dubois.1053.f1: "Dentro do gabinete robusto do zoológico, uma criatura poderosa e inspiradora conhecida como urso pardo vaga com uma presença imponente, seu pêlo espesso e uma estrutura pesada capturando a atenção dos visitantes. Intrigada com sua natureza formidável, você se aproxima de um zookê experiente, ansioso para aprender mais sobre esse icônico urso norte -americano. \ \"Esses ursos majestosos estão bem adaptados aos seus habitats, com seus corpos musculares, garras afiadas e um forte senso de olfato. São onívoros, buscando uma variedade de alimentos, incluindo bagas, peixes, pequenos mamíferos e unidades."
 dubois.1053.f2: "No expansivo habitat de urso pardo do zoológico, uma mãe urso pardo guia seus filhotes divertidos pelo terreno rochoso, seus casacos macios e travessuras divertidas provocando sorrisos dos espectadores. Intrigados com a dinâmica familiar deles, você procura um zookê experiente, na esperança de descobrir mais sobre a vida desses magníficos ursos. \"Após um período de hibernação, a mãe emerge com seus filhotes, ensinando-lhes habilidades vitais de sobrevivência, como pesca, forrageamento e identificação de ameaças em potencial. Ela garante o bem-estar deles e transmite sua sabedoria, preparando-os para uma vida independente na Creat."
 dubois.1053.f3: "Em meio ao cenário acidentado do recinto de ursos pardos, um enorme masculino de urso pardo no terreno, seus poderosos progressos e bufões ocasionais afirmando seu domínio e territorialidade. Intrigada com seu comportamento, você se aproxima de um Zookeeper experiente, na esperança de entender o significado dessas exibições. \ \"Os machos estabelecem seus territórios, marcando -os com perfume e vocalizações, como um meio de afirmar o domínio e atrair parceiros em potencial. Eles se envolvem em várias exibições, como permanecer em suas patas traseiras e esfregar suas corpos contra as árvores, para deixar o perfume de sucessos e comunicar a presença."
 dubois.1053.f4: "Os tablóides estão correndo soltos! Um de nossos famosos ursos pardos havia escapado do zoológico, mas enquanto as autoridades ainda estavam correndo o alarme, o urso correu para um homem forte grego visitante em um parque próximo. O homem forte, que estava passando o tempo em um passeio de carruagem com uma jovem local, agiu rapidamente, lutou com a besta e bateu no urso inconsciente. Quando a polícia chegou ao local, eles não podiam acreditar em seus olhos, esse era o feito. A imprensa local nomeou rapidamente o homem forte de 'The New Hercules' e celebrou sua bravura. Apesar de ninguém ser capaz de compreender as palavras do homem forte devido ao seu forte sotaque, ele se tornou o favorito entre jovens imigrantes e moradores locais. Isso, porém, levou a uma série de acidentes infelizes, quando casais deliberadamente procuraram o deserto para que os jovens pudessem provar sua coragem às suas damas. \ Nour Grizzly estava ileso e voltou ao zoológico."
 dubois.1054.t: "Avio de águia careca"
 dubois.1054.d: "Um aviário rochoso e robusto era o lar da águia careca #o, graças a uma rede sobre o recinto, não era possível para o animal escapar."
 dubois.1054.f1: "Empoleirado majestosamente em um ramo alto dentro do amplo aviário do zoológico, uma magnífica águia careca examina seus arredores com olhos penetrantes, sua impressionante cabeça branca e envergadura escura e poderosa cativando a admiração dos visitantes. Intrigada com sua presença real, você se aproxima de um Zookeeper experiente, ansioso para aprender mais sobre esse icônico pássaro de presa. \"Com sua envergadura impressionante e garras agudas, esses raptores são caçadores formidáveis. Eles se alimentam principalmente de peixes, usando sua visão aguda para identificar suas presas de grandes alturas. A história da Bald Eagle mostra a história da história, mostra a importância de preservar os habitats e proteger essas aves majestosas para as gerações futuras. \" \"\""
 dubois.1054.f2: "Dentro do aviário naturalista do zoológico, um par de águias sobe sem esforço pelo céu, seu vôo sincronizado e chamadas melodiosas ecoando pelo ar. Intrigados com suas proezas aéreas, você procura um zookeeper experiente, na esperança de descobrir mais sobre a vida desses pássaros icônicos. \"Durante as exibições de namoro, o homem e a feminina se envolvem em uma dança aérea de tirar o fôlego, alucinante e mergulhar juntos. Esses exibem não apenas fortalecem seu vínculo de par, mas também servem como um espetáculo visual. Testemunhar a graça e a agilidade desses pássaros em voo é realmente inspirador."
 dubois.1054.f3: "Em meio ao cenário cenário do Habitat Eagle, uma águia careca se encaixa em um ramo alto, emitindo seu chamado distinto que ressoa com o espírito do deserto. Intrigado com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \"Suas chamadas icônicas e agudas, frequentemente associadas à sua presença na natureza, servem a vários propósitos. Essas vocalizações ajudam a estabelecer território, se comunicar com seu companheiro e defender seu ninho. O repertório vocal da águia careca é um testemunho de sua adaptabilidade e sua capacidade de prosperar em diversos habitats. \" \""
 dubois.1055.t: "Gabinete da Pantera da Flórida"
 dubois.1055.d: "O reino do #o Florida Panther#! foi dominado por plantas subtropicais e um pequeno rio. Algumas árvores ofereceram a possibilidade de escalar."
 dubois.1055.f1: "Dentro da exuberante gabinete subtropical do zoológico, um predador poderoso e ágil conhecido como Pantera da Flórida se aproxima com uma graça silenciosa, sua construção muscular e olhos verdes penetrantes cativando o olhar dos espectadores. Intrigado com seu status único, você aborda um zookeeper experiente, ansioso para aprender mais sobre esse cativante gato. \"Endêmico aos ricos e diversos habitats das zonas e florestas da Flórida, esses panteras se adaptaram para prosperar nesse ambiente distinto. Com seus sentidos agudos, mandíbulas fortes e agilidade incrível, eles estão bem equipados para caçar e sobreviver em seus habitats naturais. A Flórida Pantera serve como um testemunho\""
 dubois.1055.f2: "Em meio à vegetação nativa do Habitat do Pantera, uma pantera masculina da Flórida emite uma chamada baixa e reverberante que ecoa pelo ar, uma exibição de sua presença e territorialidade. Intrigado com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \ \"Os machos utilizam chamadas, incluindo rosnados, assobios e gritos, para estabelecer seu domínio e defender seus territórios. Essas vocalizações ajudam a afastar rivais em potencial e se comunicar com mulheres próximas. Ouvindo seus repertórios vocais, os pesquisadores e os conservadores."
 dubois.1055.f3: "Em meio à vegetação nativa do Habitat do Pantera, uma pantera masculina da Flórida emite uma chamada baixa e reverberante que ecoa pelo ar, uma exibição de sua presença e territorialidade. Intrigado com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \ \"Os machos utilizam chamadas, incluindo rosnados, assobios e gritos, para estabelecer seu domínio e defender seus territórios. Essas vocalizações ajudam a afastar rivais em potencial e se comunicar com mulheres próximas. Ouvindo seus repertórios vocais, os pesquisadores e os conservadores."
 dubois.1055.f4: "Inspirado pelo destino da pantera cativa, [SCOPE.sCharacter('manzoni_literary_scope').GetFullName] escreveu um poema: \ n \ n'his Gaze tem, a partir da passagem das barras, tão cansada que não pode segurar. Como uma dança de força em torno de um meio, \ nin, que uma forte vontade é paralisada. Uma imagem entra em Nmpoving através do rígido silencioso do corpo, no coração, deixa de ser."
 dubois.1056.t: "Gabinete Americano de Bison"
 dubois.1056.d: "O #o American Bisons#! viveu em um enorme recinto. O recinto tentou oferecer a mesma paisagem que o Centro -Oeste Americano. A maior parte do recinto estava coberta por gramíneas da pradaria, nas quais os bisontes podiam pastar."
 dubois.1056.f1: "Dentro do amplo gabinete com tema da pradaria do zoológico, uma criatura poderosa e majestosa conhecida como American Bison vaga com uma presença dominante, sua estrutura maciça e chifres impressionantes cativando a atenção dos visitantes. Intrigada com seu significado histórico, você aborda um zookê experiente, ansioso para aprender mais sobre esse símbolo icônico do oeste americano. \"Esses magníficos herbívoros percorrem as vastas pastagens em rebanhos maciços, moldando a paisagem e sustentando inúmeras outras espécies. O bisonte possui uma força e resiliência incríveis, capazes de suportar condições climáticas adversas e atravessar grandes distâncias em busca de alimentos e água. \""
 dubois.1056.f2: "No tranquilo habitat de bisonte do zoológico, um rebanho de bisões americanos pasta pacificamente, seus corpos enormes se movendo em uníssono através da expansão gramada. O som de seus cascos atingindo o chão ressoa através do ar, criando uma harmonia rítmica. Intrigados com a dinâmica social deles, você procura um zookê experiente, na esperança de descobrir mais sobre a vida desses herbívoros icônicos. \ N \ n \ \"American Bison são animais altamente sociais, vivendo em grupos coesos conhecidos como rebanhos,\" o zookeeper explica. \ \"Dentro de um rebanho, há uma estrutura hierárquica liderada por homens dominantes conhecidos como touros. Essas criaturas majestosas se envolvem em higiene mútua, se comunicam através de várias vocalizações e exibem comportamentos fascinantes durante a estação de reprodução. Observar as interações dentro de um rebanho de bisonte oferece uma visita à sua complexa dinâmica social. \"
 dubois.1056.f3: "Em meio à paisagem rolante da pradaria do Bison Habitat, um enorme bisonte de touros fica alto, seu casaco desgrenhado e uma presença formidável cativando a admiração dos visitantes. Intrigada com seu comportamento, você aborda um Zookeeper experiente, na esperança de entender o significado de suas ações. \"Durante a estação de reprodução, os machos se envolvem em exibições notáveis ​​para estabelecer seu status e competir por oportunidades de acasalamento. Isso pode incluir pata no chão, afundar em poeira e travar chifres com rivais em impressionantes batalhas de força. Essas exibições são integrantes de manter a estrutura social do Herd e garantir a sobrevivência de suas espécies. \" \""
 dubois.1057.t: "Gabinete de jacaré"
 dubois.1057.d: "O gabinete de jacaré era um grande pântano que parecia ter sido levado para o Estreito da Flórida."
 dubois.1057.f1: "Dentro do cativante habitat de áreas úmidas do zoológico, uma criatura pré -histórica e formidável conhecida como jacaré se esconde logo abaixo da superfície da água, seu esconderijo escamosa e olhos vigilantes capturando a atenção dos visitantes. Intrigada com sua aparência antiga, você se aproxima de um Zookeeper experiente, ansioso para aprender mais sobre esse réptil icônico. \"Esses répteis antigos permaneceram relativamente inalterados por milhões de anos. Eles são conhecidos por suas maxilares poderosos e fortes mordidas, o que os ajuda a capturar e consumir uma variedade de presas. Os jacarés desempenham um papel essencial em seus ecossistemas, controlando populações de animais menores e mantendo o equilíbrio de habitats úmidos\"."
 dubois.1057.f2: "No ambiente aquático tranquilo do zoológico, um jacaré se aquece em um banco ensolarado, seu corpo blindado e tamanho impressionante evocando uma sensação de reverência. A visão de seu comportamento de aquecimento cative a atenção dos visitantes. Intrigados com seus hábitos de sol, você procura um zookê experiente, na esperança de descobrir mais sobre os comportamentos desse réptil antigo. \ N \ n \"Os jacarés são criaturas ectotérmicas, o que significa que eles dependem de fontes externas de calor para regular sua temperatura corporal\", explica o zookeeper. \"Sunning é um comportamento crucial para eles. Ao se aquecer ao sol, os jacarés podem aumentar sua temperatura corporal, o que, por sua vez, aumenta seus níveis de metabolismo e energia. Esse comportamento é especialmente importante nos meses mais frios quando a temperatura corporal cai devido ao meio ambiente\"."
 dubois.1057.f3: "Em meio ao ambiente exuberante do habitat de jacaré, um grande jacaré masculino emite um rosnado profundo e estridente que reverbera através da água, uma exibição de seu domínio e território. Intrigada com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \ N \ n \"As vocalizações de jacarés são um aspecto crucial de sua comunicação\", compartilha os Zookeeper. \"Durante a estação de reprodução, os machos usam suas chamadas distintas para estabelecer domínio e atrair mulheres. Essas trocas vocais ajudam a evitar confrontos entre homens concorrentes. Os jacarés também usam uma variedade de outros sons, como assobios e grunhidos, para se comunicar e afirmar sua presença em seus habitats úmidos\"."
 dubois.1058.t: "Gabinete axolotl"
 dubois.1058.d: "O gabinete axolotl era menos um gabinete e mais um pouco de lago em uma rocha. Como os axolotls eram bem pequenos, os visitantes puderam chegar muito perto e quase tocarem os animais pequenos."
 dubois.1058.f1: "Dentro do cativante habitat aquático do zoológico, uma criatura fascinante e sobrenatural conhecida como Axolotl desliza através da água, suas brânquias externas com babados e aparência única capturando a atenção dos visitantes. Intrigados com suas características distintas, você aborda um zookeeper experiente, ansioso para aprender mais sobre esse extraordinário anfíbio. \"Ao contrário da maioria dos anfíbios, os axolotls mantêm suas características juvenis ao longo de sua vida, um fenômeno conhecido como Neoteny. Eles são conhecidos por seus notáveis ​​poderes regenerativos, capazes de regredir membros perdidos e até partes de suas medidas espinhais. Essas abordagens capturaram a atenção de cientistas e pesquisadores."
 dubois.1058.f2: "No ambiente aquático tranquilo do zoológico, um axolotl repousa sobre uma rocha submersa, suas brânquias de penas se movendo suavemente enquanto respira debaixo d'água. A visão de suas adaptações respiratórias únicas cative a atenção dos visitantes. Intrigado com seu comportamento respiratório, você procura um zookê experiente, na esperança de descobrir mais sobre a vida desse notável anfíbio. \ N \ n \"axolotls têm características respiratórias únicas que os diferenciam de outros anfíbios\", explica o zookeeper. \"Enquanto a maioria dos anfíbios sofre metamorfose e desenvolve pulmões para respirar em terra, os axolotls permanecem aquáticos e dependem de suas brânquias externas para extrair oxigênio da água. Seus brânquias são altamente eficientes, permitindo que respirem debaixo d'água ao longo de suas vidas. Essa adaptação é um testamento à sua especialização para a vida em ambientes aquáticos\"."
 dubois.1058.f3: "Em meio às plantas aquáticas do gabinete axolotl, um grupo de axolotls juvenis interage de brincadeira, seus movimentos delicados e comportamento curioso revelando suas personalidades encantadoras. Intrigados com suas interações, você se aproxima de um Zookeeper experiente, na esperança de entender o significado de seus comportamentos. Os axolotls de \ n \ n \"são conhecidos por sua natureza curiosa e sociável\", compartilha os Zookeeper. \"São criaturas relativamente pacíficas, muitas vezes coexistindo pacificamente com seus colegas de tanque. Esses anfíbios têm uma profunda sensação de toque e podem detectar vibrações na água. Axolotls usam esses sentidos para explorar seu ambiente, localizar alimentos e interagir entre si."
