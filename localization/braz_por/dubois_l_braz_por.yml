 dubois.1011.t: "The African Natural History Galleries"
 dubois.1011.d: "Enter the African Pavilions of the Zoological Gardens, where curated habitats and discreet architectural pastiches suggest the varied physiography of the continent. Devised under the counsel of learned naturalists, these enclosures afford the studious visitor an opportunity to observe the characteristic fauna of savannah, river, and littoral in conditions favourable to instruction and decorum."
