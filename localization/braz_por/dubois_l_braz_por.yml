 dubois.138.t: "Meerkat" #NT!
 dubois.138.d: "Nosso zoológico é enriquecido por um novo animal exótico: hoje o tão esperado #O meerkat#! mudou-se para seu novo recinto." #NT!
 dubois.138.f: "O Meerkat é um pequeno mangusto que vive na África. Os meerkats são extremamente sociais e vivem juntos em pacotes que consistem em até 30 animais. Geralmente eles vivem em tocas ou cavernas, onde podem se esconder de predadores. Geralmente, pelo menos um meerkat está ocupado com o cuidado de perigo e avisar o pacote. O trabalho de Lookout alterna entre os animais." #NT!
 dubois.138.g: "Que fofo!" #NT!
