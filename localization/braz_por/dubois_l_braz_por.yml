 dubois.32.t.zebra_3: "Outra zebra" #NT!
 dubois.32.d: "Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] localizou o animal que ele está procurando. Agora é importante levar o animal a uma situação com uma abordagem cuidadosa para que possamos pegá -lo." #NT!
 dubois.32.f.hippopotamus.1: "Um local diz que viu um rebanho de hipopótamos tomar banho no rio mais próximo dias atrás. Os habitantes da vila não se aproximam disso; Eles tendem a uma grande agressão, mesmo o grande jogo não se atreve a abordá -los. O rugido deles podia ser ouvido de uma grande distância. "Você pode ouvi -los perto da vila, especialmente à noite, quando os animais são particularmente ativos e migram para seus pastos", diz o local. Diz -se que uma mãe Hippo matou recentemente um crocodilo para defender um filhote; O professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] conseguiu ver isso por si mesmo quando examinou a carcaça do infeliz réptil." #NT!
 dubois.32.f.hippopotamus.2: "À medida que a névoa da manhã levanta, a silhueta de uma criatura colossal emerge das profundezas obscuras do rio. Os contos dos indescritíveis gigantes do rio se espalharam entre os habitantes locais, falando de sua força incomparável e natureza temível. Os hipopótamos, com suas garras enormes e presas de marfim, comandam respeitar e incutir terror no coração de todos os que cruzam seu caminho. Somente um ousado [concept_dubois_naturalist] como o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] poderia esperar capturar uma besta tão formidável, pois diz -se que mesmo o rei da selva é levemente em seu domínio." #NT!
 dubois.32.f.hippopotamus.3: "Os rumores de um lendário hipopótamo cativaram a imaginação dos exploradores, e seus relatos ecoam através da densa vegetação rasteira da savana africana. Esse gigante, conhecido como "o gigante do marfim", possui placas de armadura parecidas com marfim que brilham à luz do sol, tornando-a quase invulnerável aos dentes e garras de outros predadores. As tribos locais reverenciam a criatura, atribuindo poderes míticos à sua presença. Para contemplar essa besta majestosa, o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] deve navegar por pântanos traiçoeiros e superar os perigos da natureza, armados apenas com seu conhecimento e a esperança de capturar uma lenda viva para o mundo se maravilhar com a admiração." #NT!
 dubois.32.f.lion.1: "Em toda a vasta extensão das planícies africanas indomáveis, um majestoso predador reina supremo. O leão, com sua juba dourada e olhar penetrante, permanece como a personificação do poder e da autoridade real. Seu poderoso rugido ressoa através do ar, enviando arrepios nos espinhos de presas e predadores. Os habitantes locais falam de uma leoa, conhecida como "a rainha da savana", que defendeu sozinha seu orgulho contra clãs rivais e até se afastou das hienas ferozes. Para capturar a essência de tal magnificência, o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] deve se aventurar no coração da savana, onde o perigo se esconde em todas as sombras e testemunhe as proezas cruas do monarca real da natureza." #NT!
 dubois.32.f.lion.2: "No fundo do deserto africano, um monarca felino ordena seu domínio com autoridade inabalável. O leão, conhecido como "o soberano dourado", possui uma juba que brilha como os raios do sol, tornando -o um símbolo inconfundível de poder e domínio. Contos de sua incrível força e furtividade viajaram por toda parte, cativando as mentes de aventureiros e naturalistas. Os habitantes locais sussurram de um raro avistamento, um choque de titãs entre o soberano dourado e um formidável Cape Buffalo. Para testemunhar esse encontro épico, o Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] deve andar cuidadosamente através da savana, navegando em um reino, onde apenas o destemido se arriscaria." #NT!
 dubois.32.f.lion.3: "No coração do deserto africano, onde o calor sufocante é temperado pela beleza inspiradora da savana, percorre uma criatura temida e reverenciada por todos. O leão, com sua construção muscular e graça predatória, incorpora a essência da majestade indomável. Seu rugido estrondoso ecoa através das planícies, um chamado ressonante para todas as criaturas que o rei dos animais está próximo. As lendas falam de um orgulho de leão liderado por um patriarca indomável, cuja presença comau o respeito até mesmo dos predadores mais formidáveis. Para observar esse majestoso governante em seu habitat natural, o professor §0 deve superar os desafios da selvagem, mergulhando em um mundo onde o equilíbrio entre vida e morte está pendurado por um fio delicado." #NT!
 dubois.32.f.elephant.1: "Um rebanho de elefantes pisa pó no ar. Uma caravana, liderada por uma matriarca, se move pelo campo. Hudnerte, às vezes milhares de quilômetros que esses grupos cobrem às vezes. Animais jovens permanecem sob os cuidados de suas mães. Então o grupo para em um pequeno bosque, esticando os troncos em árvores. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] observa os eventos através de binóculos e estuda o comportamento social. Basicamente, ele ficou cansado da idéia de roubar um dos animais do rebanho, mas os clientes do zoológico o lembram que sua viagem e comida não foram fornecidas gratuitamente pelo estado - há um trabalho a ser feito." #NT!
 dubois.32.f.elephant.2: "Os gigantes gentis da savana, elefantes, vagam pelas vastas paisagens em busca de nutrição e água. O tamanho imenso deles comanda respeito, mas suas interações ternas dentro do rebanho revelam um profundo senso de laços familiares. Liderados por uma matriarca sábia, os elefantes atravessam grandes distâncias, seus passos sincronizados ecoando pelas pastagens. O professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], com o coração pesado, coloca seu olhar sobre eles, dividido entre admiração por sua graça e a tarefa que está à frente. Para capturar um elefante para o zoológico, ele deve reconciliar seu dever com o entendimento de que interromper a intrincada tapeçaria de seu tecido social tem um custo profundo." #NT!
 dubois.32.f.elephant.3: "Na sombra das árvores de baobá imponentes, uma congregação de elefantes, adornada com presas magníficas, reúne em um buraco de rega tranquilo. Os olhos afiados da matriarca examinam os arredores, garantindo a segurança de seus preciosos parentes. A sinfonia harmoniosa de suas trombetas enche o ar, um testemunho de sua sabedoria coletiva e experiências compartilhadas. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], em conflito pelo fascínio de capturar um desses seres sencientes e pelo peso incômodo da responsabilidade, luta com as implicações morais de sua busca. Enquanto ele observa sua complexa dinâmica social, ele enfrenta a profunda questão de saber se a busca do conhecimento justifica a interrupção de uma existência harmoniosa." #NT!
 dubois.32.f.giraffe.1: "Durante os dias, o grupo Safari do professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] estava procurando o mero sinal de uma girafa, mas não havia encontrado nada até o fim. Mas uma manhã, os pescoços dos animais elegantes se estendem no ar contra o sol nascente da manhã e formam sombras contra a bola de fogo avermelhada. A equipe do Safari sai imediatamente para não perder esta oportunidade." #NT!
 dubois.32.f.giraffe.2: "Através dos tons dourados do amanhecer africano, uma visão maravilhosa se desenrola. Altos e graciosos, as girafas emergem da densa folhagem, seus pescoços alongados chegando em direção aos céus. Como os seres etéreos, eles lançaram sombras alongadas contra o céu ardente, seus pontos se misturando perfeitamente com a luz manchada. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], seu coração cheio de admiração, luta para montar seu equipamento, determinado a não deixar esse momento fugaz desaparecer. A cada passo cuidadoso, ele se aventura mais perto das girafas, ansioso para desvendar os mistérios escondidos dentro de sua extraordinária anatomia e observar a poesia de seus movimentos." #NT!
 dubois.32.f.giraffe.3: "Nas vastas planícies africanas, uma visão de elegância se desenrola à medida que as girafas navegam graciosamente na paisagem verdejante. Suas pernas delgadas os carregam com uma graça balética, enquanto seus pescoços longos se estendem acima das árvores, como se estivessem alcançando os próprios céus. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] e sua equipe Safari, seus corações batendo com antecipação, testemunhe esse espetáculo hipnotizante. Com um olhar atento aos detalhes, o professor estuda os padrões intrincados de seus pontos e se maravilham com sua capacidade de prosperar em seu habitat único. Para capturar a essência dessas criaturas magníficas, ele deve navegar pelo delicado equilíbrio entre observação e intrusão, preservando a magia que faz de girafas o epítome da graça na natureza." #NT!
 dubois.32.f.zebra.1: "Algumas semanas depois de chegar à África, o Safari do Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] conversou com os habitantes locais sobre o próximo rebanho de zebras que vagam pela região. Não leva muito tempo para que eles encontrem os animais com as listras características no sol da noite entre pó de savana, arbustos e árvores retorcidas. Os animais graciosos nem parecem notá -los. O professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] primeiro quer dedicar um tempo para estudar o comportamento e o estilo de vida do rebanho da zebra, mas, como muitos outros pesquisadores, ele está interessado em descobrir o contexto evolutivo do famoso padrão de zebra. Infelizmente, ele é interrompido por um membro da equipe Safari, que aponta que, se esperarem muito tempo, o rebanho poderá seguir em frente novamente." #NT!
 dubois.32.f.zebra.2: "Talvez seguir zebras não tenha sido a melhor decisão. Esses animais poderiam subir até 500 quilômetros de um lugar para outro e, assim, mudar o centro do rebanho para grandes latitudes geográficas. No entanto, houve uma peculiaridade que os tornava previsíveis: eles geralmente ficavam não mais de 12 quilômetros de uma fonte de água. O Safari do Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] aproveita esse detalhe como uma oportunidade de esperar no próximo poço de rega possível. Com sucesso! Logo o rebanho aparece novamente, dando a oportunidade de finalmente pegar um dos animais para o zoológico." #NT!
 dubois.32.f.zebra.3: "Depois de várias semanas em busca de zebras, o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] vê a carcaça de um animal mutilado à distância. Aparentemente, foi vítima de um ataque de leão. Desde que os Leões se mudaram apenas recentemente, a equipe do Safari está motivada a continuar a pesquisa de maneira mais intensiva. Logo cheiram altos e chamadas misturadas de burro e ruídos semelhantes a cavalos. A zebra chicoteia no ar sobre a grama de savana. Os participantes do Safari assistem a um rebanho de uma colina." #NT!
 dubois.32.g: "A equipe deve definir armadilhas." #NT!
 dubois.32.h: "A equipe deve se aproximar do animal." #NT!
 dubois.33.t: "Flores raras" #NT!
 dubois.33.d.hippopotamus: "Em busca do #O hippopotamus_1, nossa equipe Safari encontrou uma flora incrível. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está inclinado a fazer uma pausa." #NT!
 dubois.33.d.lion: "Em busca do #O Lion#!,, nossa equipe Safari encontrou uma flora incrível. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está inclinado a fazer uma pausa." #NT!
 dubois.33.d.elephant: "Em busca do #O Elephant#!,, nossa equipe Safari encontrou uma flora incrível. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está inclinado a fazer uma pausa." #NT!
 dubois.33.d.giraffe: "Em busca do #O giraffe#!, Nossa equipe Safari encontrou uma flora incrível. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está inclinado a fazer uma pausa." #NT!
 dubois.33.d.zebra: "Em busca do #O Zebra#!,, nossa equipe Safari encontrou uma flora incrível. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está inclinado a fazer uma pausa." #NT!
 dubois.33.f: "O safari foi interrompido por uma parada incomum quando o Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ordenou que os homens reunidos parassem. Um cheiro incomum alcançou o nariz. Um prado de flores de cores vivas estava diante de seus olhos. Uma única amostra foi suficiente para estabelecer que eram plantas bastante decentes de qualidade desconhecida que talvez pudessem ser usadas como medicamento ou para aliviar os sintomas. O naturalista agora se viu em um dilema: pois essas plantas africanas exóticas eram de valor indescritível para a pesquisa." #NT!
 dubois.33.g: "Devemos ter essas flores a todo custo." #NT!
 dubois.33.h: "Não temos tempo para escolher flores. O animal está esperando!" #NT!
 dubois.34.t: "Insetos desconhecidos" #NT!
 dubois.34.d.hippopotamus: "O Safari, que teve como objetivo capturar o # O Hipopotamus#!, deve ser interrompido. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está faltando!" #NT!
 dubois.34.d.lion: "O Safari, que teve como objetivo capturar o # O Lion#!, deve ser interrompido. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está faltando!" #NT!
 dubois.34.d.elephant: "O Safari, que teve como objetivo capturar o # O Elephant#!, deve ser interrompido. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está faltando!" #NT!
 dubois.34.d.giraffe: "O Safari, que teve como objetivo capturar o # O Giraffe#!, deve ser interrompido. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está faltando!" #NT!
 dubois.34.d.zebra: "O Safari, que teve como objetivo capturar o # O Zebra#!, deve ser interrompido. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está faltando!" #NT!
 dubois.34.f: "Logo depois de parar para almoçar, os outros participantes do safari notaram que seu líder havia desaparecido de repente. Após uma breve pesquisa, eles encontraram o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] em um monte de sujeira cintilante que se assemelhava a um monte de cupins abandonado. As cores dos besouros verdes, azuis e vermelhos de tamanhos diferentes brilhavam nele. O naturalista estava prestes a soltar gritos de alegria, tão encantado que ele estava em sua descoberta." #NT!
 dubois.34.g: "Colete amostras desses insetos desconhecidos." #NT!
 dubois.34.h: "E arriscar o animal que nos escapando? Vá agora!" #NT!
 dubois.39.t: "Catch bem -sucedido!" #NT!
 dubois.39.f: ""Tudo na África morde, mas o bug do safari é o pior de tudo". -Inser Hemingway" #NT!
 dubois.39.g: "Ótimo!" #NT!
 dubois.40.t: "Safari termina" #NT!
 dubois.40.d.success: "Depois de um safari de sucesso, os heróis voltam para casa com o animal que venceram. Certamente será mais feliz no bom zoológico nacional de [ROOT.GetCountry.GetNameNoFlag] do que nesta natureza desconfortável!" #NT!
 dubois.40.d.fail: "No final de uma pesquisa malsucedida que trouxe nada além de dificuldades, o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] desiste e retorna ao [ROOT.GetCountry.GetNameNoFlag] com sua equipe." #NT!
 dubois.40.f: "'Tudo o que eu queria fazer era voltar para a África. Ainda não o deixamos, mas quando eu acordava durante a noite, mentia, ouvindo, com saudades de casa. Now, looking out the tunnel of trees over the ravine at the sky with white clouds moving across in the wind, I loved the country so that I was happy as you are after you have been with a woman that you really love, when, empty, you feel it welling up again and there it is and you can never have it all and yet what there is, now, you can have, and you want more and more, to have, and be, and live in, to possess now again for always, for that long sudden-ended sempre; Tornando o tempo parado, às vezes tão imóvel que depois você espera para ouvi -lo se mover, e é lento para começar. -Inser Hemingway" #NT!
 dubois.40.g: "Hakuna Matata." #NT!
  
 dubois.41.t: "Plantas exóticas" #NT!
 dubois.41.d: "A expedição encontrou uma variedade de plantas exóticas, mas permanece desconhecido como esse lugar é seguro." #NT!
 dubois.41.f: "Os membros da expedição ficaram hipnotizados. Eles haviam percorrido rios, montanhas e florestas, conquistaram cachoeiras. Mas as plantas grandiosas com suas flores majestosas o dominaram. [SCOPE.sCharacter('expedition_leader').GetFullName] Na verdade, disse que não ficariam aqui por muito tempo, mas depois permitiram que um assistente de pesquisa coletasse algumas amostras. Por um lado, ele também não podia negar o valor científico dessa descoberta. Por outro lado: havia esses ruídos estranhos na selva que ele não sabia dizer se eram de pessoas, animais ou demônios ..." #NT!
 dubois.41.g: "Colete algumas amostras de plantas." #NT!
 dubois.41.h: "Colete o maior número possível de plantas." #NT!
 dubois.42.t: "Borboletas" #NT!
 dubois.42.d: "Para sua própria surpresa, a expedição atingiu uma clareira na selva africana, onde dezenas de milhares de borboletas coloridas se divertem." #NT!
 dubois.42.f: ""Mas são flores que voam e quase cantam." -Robert Frost" #NT!
 dubois.42.g: "Nossos naturalistas em casa ficarão felizes." #NT!
 dubois.43.t: "Peixe do rio" #NT!
 dubois.43.d: "Ao atravessar um rio, alguns dos companheiros da expedição notaram que o peixe desconhecido [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] nadou na água. [SCOPE.sCharacter('expedition_leader').GetFullName], no entanto, tem idéias próprias sobre o que fazer com elas." #NT!
 dubois.43.f: "Eles eram peixes coloridos e cintilantes. Peixe lindo para olhar. Peixe desconhecido. Peixe misterioso. E: peixe saboroso. O que foi uma descoberta significativa para o cientista foi bem -vindo comida para o líder da expedição melhorar o sucesso da viagem." #NT!
 dubois.43.g: "Colete o peixe." #NT!
 dubois.43.h: "Coma o peixe." #NT!
 dubois.44.t: "Amostras perdidas" #NT!
 dubois.44.d: "A expedição coletou algumas amostras de grande valor científico de insetos e plantas desconhecidos há alguns dias. No entanto, depois de uma inspeção hoje, aconteceu que eles foram perdidos!" #NT!
 dubois.44.f: "Era cerca de meio -dia quando um grito em pânico sacudiu a expedição. A princípio, [SCOPE.sCharacter('expedition_leader').GetFullName] temia a invasão de nativos hostis. Mas na verdade foi um assistente de pesquisa que havia notado que as amostras coletadas estavam faltando. Ele imediatamente insistiu em voltar e procurar a coleção científica. Os carregadores o ignoraram e o líder o contradizia: era muito perigoso para isso - e um havia perdido tempo suficiente para escolher flores. O assistente de pesquisa então ameaçou denunciar essa ignorância quando ele voltou e contar a alguns amigos muito importantes em ciências e política." #NT!
 dubois.44.g: "A expedição deve voltar e recuperar as amostras." #NT!
 dubois.44.h: "Deixe este lixo sem valor para trás." #NT!
 dubois.45.t: "Uma coleção valiosa" #NT!
 dubois.45.d: "Um naturalista, que deixou sua expedição anos atrás e vive sozinho no deserto africano para fins de pesquisa, construiu uma impressionante coleção de flora e fauna raras durante os anos de solidão." #NT!
 dubois.45.f: "O homem era uma visão estranha. Os anos de solidão mostraram -se no cinza de seus olhos e o comprimento do cabelo. Como ele havia coletado e catalogado maníaco, borboleta, larva que ele encontrou desde que se separou de sua equipe. Ele havia preservado folhas de plantas tropicais. Lençóis soltos de papel e cadernos rabiscados flutuavam em torno de sua sala de armazenamento. [SCOPE.sCharacter('expedition_leader').GetFullName] rapidamente percebeu que o naturalista que vive como um eremita não havia enlouquecido. Pelo contrário, ele estava procurando uma maneira de retornar à civilização e publicar seus resultados, mas tinha medo de retornar porque estava em excesso. Essa situação abriu possibilidades. Em ambos os lados." #NT!
 dubois.45.g: "Queremos adquirir a coleção." #NT!
 dubois.45.h: "Estamos mais interessados ​​em seu conhecimento." #NT!
  
 dubois.72.t: "Formação geológica descoberta" #NT!
 dubois.72.d: "Em [SCOPE.sState('dubois_formation_state').GetName], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] descobriu formações rochosas milhões de anos. Eles suspeitam que ainda existem fósseis desconhecidos lá." #NT!
 dubois.72.f: "As formações com estratos rochosos antigos são um paraíso para os paleontologistas. Todas as formações rochosas contêm fósseis menores que podem ser encontrados lá. Grandes formações podem até conter os esqueletos de dinossauros enormes. Seu paleontológico ocorre em várias etapas. É preciso um paleontologista para recuperar fósseis das formações. Eles estudarão formações por conta própria e encontrarão fósseis anualmente." #NT!
 dubois.72.g: "Devemos dar uma olhada mais de perto." #NT!
 dubois.73.t: "Grande Formação Geológica descoberta" #NT!
 dubois.73.d: "Em [SCOPE.sState('dubois_formation_state').GetName], os paleontologistas descobriram formações rochosas milhões de anos. É provável que numerosos fósseis dormem nessa enorme formação, provavelmente até esqueletos bem preservados com os quais só podíamos sonhar até agora." #NT!
  
 dubois.101.t: "Urso polar" #NT!
 dubois.101.d: "Nosso zoológico é enriquecido por um novo animal fascinante: hoje o tão esperado #O polar Bear#! mudou-se para seu novo recinto." #NT!
 dubois.101.f: "O urso polar (Ursus maritimus) é uma espécie hipercarnívora de urso. Sua faixa nativa está em grande parte dentro do círculo ártico, abrangendo o Oceano Ártico e seus mares e massas terrestres circundantes, que inclui as regiões mais ao norte da América do Norte e Eurásia. Os ursos polares caçam seu alimento preferido de focas da beira do gelo do mar, geralmente vivendo de reservas de gordura quando não houver gelo marinho. Devido à sua dependência do gelo do mar, os ursos polares são classificados como mamíferos marinhos. Ao contrário dos ursos marrons, os ursos polares não são territoriais. Embora estereotipados como vorazmente agressivos, eles são normalmente cautelosos em confrontos e geralmente optam por escapar em vez de lutar." #NT!
 dubois.101.g: "Legal." #NT!
 dubois.102.t: "Urso pardo" #NT!
 dubois.102.d: "Nosso zoológico é enriquecido por um novo e fascinante animal: hoje o tão esperado #O Grizzly Bear#! mudou-se para seu novo recinto." #NT!
 dubois.102.f: "O urso pardo (Ursus Arctos Horrribilis), também conhecido como Urso Brown da América do Norte ou simplesmente Grizzly, é uma população ou subespécie do urso marrom que habita a América do Norte. Meriwether Lewis e William Clark o descreveram pela primeira vez como Grisley, que poderia ser interpretado como "Grizzly" (isto é, "grisalho"-isto é, com cabelos de ponta cinza) ou "terrível" ("inspirador de medo", agora geralmente "horrível"). Os ursos pardos são algumas das maiores subespécies de urso marrom, sendo apenas espancadas pelos ursos marrons de Kamchatka e pelos ursos Kodiak. Os ursos pardos variam em tamanho, dependendo do tempo e das populações. A gama original de ursos pardos inclui grandes partes da América do Norte ocidental e central. Desce de uma população eurásia de ursos marrons que migraram pelo estreito temporariamente seco de Bering." #NT!
 dubois.102.g: "Aterrorizante." #NT!
 dubois.103.t: "Águia careca" #NT!
 dubois.103.d: "Nosso zoológico é enriquecido por um novo e fascinante animal: hoje o tão esperado #O Eagle#! mudou-se para seu novo recinto." #NT!
 dubois.103.f: "A águia careca (Haliaeetus leucocephalus) é uma ave de presa encontrada na América do Norte. Sua gama inclui a maior parte do Canadá e do Alasca, todos os Estados Unidos contíguos e norte do México. É encontrado perto de grandes corpos de águas abertas com abundante suprimento de alimentos e árvores antigas para o ninho. A águia careca é um alimentador oportunista que subsiste principalmente em peixes, que ele abaixa e pega a água com suas garras. As águias carecas não são realmente carecas; O nome deriva de um significado mais antigo da palavra, 'White Headed'. A águia careca é o pássaro nacional dos Estados Unidos da América e aparece em seu selo." #NT!
 dubois.103.g: "Patriótico." #NT!
 dubois.104.t: "American Bison" #NT!
 dubois.104.d: "Nosso zoológico é enriquecido por um novo e fascinante animal: hoje o tão esperado #O American Bison#! mudou-se para seu novo recinto." #NT!
 dubois.104.f: "O American Bison (Bison Bison), também chamado de Buffalo Americano ou simplesmente Buffalo, é uma espécie de bisonte nativo da América do Norte. É uma das duas espécies existentes de bisonte, ao lado do bisonte europeu. Buffalo foi aplicado ao bisonte americano por Samuel de Champlain como a palavra francesa Buffles em 1616, depois de ver peles e um desenho. Estes foram mostrados a ele por membros da Primeira Nação de Nipissing. A palavra bisonte foi aplicada na década de 1690. Um bisonte tem um casaco de inverno desgrenhado, longo e marrom-escuro e um casaco de verão mais claro e marrom mais claro. O bisonte masculino é significativamente maior e mais pesado que as fêmeas. Uma vez que vagam em vastos rebanhos, as espécies quase se extinguiram por uma combinação de caça comercial e abate no século XIX e introdução de doenças bovinas do gado doméstico." #NT!
 dubois.104.g: "Desgrenhado." #NT!
 dubois.105.t: "Pantera da Flórida" #NT!
 dubois.105.d: "Nosso zoológico é enriquecido por um novo e fascinante animal: hoje o tão esperado #O Florida Panther#! mudou-se para seu novo recinto." #NT!
 dubois.105.f: "O Florida Panther é um puma norte -americano conhecido em vários nomes comuns, incluindo puma da Flórida e Florida Puma. Ele vive em Pinelands, redes de madeira tropical e florestas mistas de pântano de água doce. Os Panteras da Flórida são vistos no nascimento e geralmente têm olhos azuis. À medida que a pantera cresce, as manchas desaparecem e o casaco fica completamente bronzeado, enquanto os olhos normalmente assumem um tom amarelo. O ventre da pantera é um branco cremoso e tem pontas pretas na cauda e nas orelhas. Os Panteras da Flórida não têm a capacidade de rugir e, em vez disso, emitem sons distintos que incluem assobios, chirps, rosnados, assobios e ronronares." #NT!
 dubois.105.g: "Não é mais um puma?" #NT!
 dubois.106.t: "Jacaré" #NT!
 dubois.106.d: "Nosso zoológico é enriquecido por um novo e fascinante animal: hoje o tão esperado #O Alligator#! mudou-se para seu novo recinto." #NT!
 dubois.106.f: "Os jacarés americanos são predadores de ápice e consomem peixes, anfíbios, répteis, pássaros e mamíferos. Os filhotes se alimentam principalmente de invertebrados. Eles desempenham um papel importante como engenheiros de ecossistemas nos ecossistemas de zonas úmidas através da criação de orifícios de jacaré, que fornecem habitats úmidos e secos para outros organismos. Ao longo do ano, os jacarés americanos abaixo declaram território e localizam companheiros adequados. Durante os séculos 19 e 20, foram relatados homens maiores que atingem 5 a 6 m. O maior tamanho individual relatado foi um homem morto em 1890 em Marsh Island, Louisiana, e supostamente medido a 5,84 m de comprimento, mas nenhum espécime de voucher estava disponível, já que o jacaré americano ficou em um banco lamacento depois de ter sido medido por ter sido massivo demais para se mudar." #NT!
 dubois.106.g: "Dentes." #NT!
 dubois.107.t: "Axolotl" #NT!
 dubois.107.d: "Nosso zoológico é enriquecido por um novo animal fascinante: hoje o tão esperado #O axolotl#! mudou-se para seu novo gabinete." #NT!
 dubois.107.f: "O axolotl é um anfíbio de cauda mexicana aquática da família de tritões de dentes transversais, que ocorre naturalmente apenas como larvas permanentes. Os axolotls atingem a maturidade sexual sem alterar sua forma larval externa e sem passar por uma metamorfose que, de outra forma, é comum em anfíbios. Em agosto de 1804, Alexander von Humboldt foi o primeiro a trazer axolotls para a Europa, que - preservado em álcool - serviu como uma curiosidade exótica no Museu de História Natural de Paris. Os axolotls têm a capacidade de restaurar membros, órgãos e até partes do cérebro e do coração. Os regenerados geralmente não são aleijados, mas completos e funcionais. A capacidade de se regenerar torna a espécie um objeto de pesquisa que vale a pena." #NT!
 dubois.107.g: "O que é isso ... criatura estranha?" #NT!
  
 dubois.111.t: "Preguiça de garganta marrom" #NT!
 dubois.111.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O preguiçoso de garganta marrom mudou-se para seu novo recinto." #NT!
 dubois.111.f: "A preguiça de garganta marrom (Bradypus variegatus) é uma espécie de preguiça de três dedos encontrada no reino neotropical da América Central e do Sul. As preguiças de garganta marrom dormem 15 a 18 horas todos os dias e são ativas por apenas breves períodos de tempo, o que pode ser durante o dia ou a noite. Embora possam caminhar pelo chão e até nadar, eles passam a maior parte de suas vidas nos altos ramos das árvores, descendo uma vez a cada oito dias para defecar no solo. Eles não viajam longe, com intervalos domésticos de apenas 0,5 a 9 ha (1,2 a 22,2 acres), dependendo do ambiente local. Dentro de uma faixa típica de 5 hectares (12 acres), uma preguiça de garganta marrom visitará cerca de 40 árvores e poderá se especializar em uma espécie em particular, até gastando até 20% de seu tempo em uma única árvore específica." #NT!
 dubois.111.g: "Esta é a criatura mais nobre que já entrou neste zoológico." #NT!
 dubois.112.t: "Jaguar" #NT!
 dubois.112.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O Jaguar#! mudou-se para seu novo recinto." #NT!
 dubois.112.f: "O Jaguar (Panthera Onca) é o único membro vivo do gênero Panthera, nativo das Américas. Com um comprimento corporal de até 1,85 m (6 pés 1 pol) e um peso de até 158 kg (348 lb), é a maior espécie de gato nas Américas e a terceira maior do mundo. Sua camada distintamente marcada apresenta pêlo amarelo pálido a bronzeado coberto por pontos que passam para rosetas nas laterais, embora um casaco preto melanístico apareça em alguns indivíduos. A poderosa mordida da Jaguar permite perfurar as carapaços de tartarugas e tartarugas e empregar um método de matança incomum: ela morde diretamente através do crânio das presas de mamíferos entre os ouvidos para dar um golpe fatal ao cérebro. A palavra 'Jaguar' é possivelmente derivada da palavra tupi-guarani yaguara que significa 'besta selvagem que supera sua presa em um limite'." #NT!
 dubois.112.g: "Awe inspirador." #NT!
 dubois.113.t: "Aéter gigante" #NT!
 dubois.113.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O Giant Anteater#! mudou-se para seu novo recinto." #NT!
 dubois.113.f: "A tadeira gigante (Myrmecophaga Tridactyla) é um mamífero insetívoro nativo da América Central e do Sul. É uma das quatro espécies vivas de tampas, das quais é o maior membro. Ele se alimenta principalmente de formigas e cupins, usando as garras dianteiras para desenterrá -las e sua língua longa e pegajosa para colecioná -las. Embora túlios gigantes vivam em áreas domésticas sobrepostas, elas são principalmente solitárias, exceto durante as relações mãe-offspring, interações agressivas entre homens e quando acasalam. A tadeira gigante é a mais terrestre das espécies vivas de antetro. Seus ancestrais podem ter sido originalmente adaptados à vida arbórea." #NT!
 dubois.113.g: "Chique." #NT!
 dubois.114.t: "Armadillo de nove bandas" #NT!
 dubois.114.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O Armadillo#! mudou-se para seu novo recinto." #NT!
 dubois.114.f: "O Armadillo de nove peças (Dasypus Novemcinctus) é um mamífero encontrado na América do Norte, Central e Sul, tornando-o o mais difundido dos tatus. Seus ancestrais se originaram na América do Sul e permaneceram lá até que a formação do istmo do Panamá permitisse que eles entrassem na América do Norte como parte do grande intercâmbio americano. O Armadillo de nove bandas é um animal solitário e principalmente noturno, encontrado em muitos tipos de habitats, desde florestas tropicais maduras e secundárias até pastagens e esfoliações secas. A concha externa é composta de escalas dérmicas ossificadas cobertas por escalas epidérmicas queratinizadas e não sobrepostas, que são conectadas por faixas flexíveis de pele. Essa armadura cobre as costas, laterais, cabeça, cauda e superfícies externas das pernas." #NT!
 dubois.114.g: "Bem armado." #NT!
 dubois.115.t: "Condor Andeano" #NT!
 dubois.115.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O andean condor#! mudou-se para seu novo recinto." #NT!
 dubois.115.f: "O Condor Andeano (Vultur Griphus) é um gigante abutre da Cathartid da América do Sul e é o único membro do gênero Vultur. Encontrado nas montanhas Andes e nas costas do Pacífico adjacente do oeste da América do Sul, o condor andino é o maior pássaro voador do mundo pela medição combinada de peso e envergadura. É um grande abutre preto com um babado de penas brancas ao redor da base do pescoço e, especialmente no macho, grandes manchas brancas nas asas. A cabeça e o pescoço são quase sem penas e são de uma cor vermelha maçante, que pode lavar e, portanto, mudar de cor em resposta ao estado emocional do pássaro. O condor andino é um símbolo nacional da Bolívia, Chile, Colômbia, Equador e Peru e desempenha um papel importante no folclore e na mitologia das regiões andinas." #NT!
 dubois.115.g: "Celestial." #NT!
 dubois.116.t: "Peixe -boi das Índias Ocidentais" #NT!
 dubois.116.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O peixe-boi Índia Ocidental mudou-se para seu novo recinto." #NT!
 dubois.116.f: "O peixe -boi das Índias Ocidentais é um grande mamífero aquático, nativo das áreas costeiras quentes do Caribe. Morando sozinho ou em rebanhos, ele se alimenta de plantas subaquáticas e usa seus bigodes para navegar. Como os peixes -boi são mamíferos, respiram ar, têm sangue quente e produzem leite. O peixe -boi das Índias Ocidentais tem um focinho de pré -filial, como o parente, o elefante, para agarrar a vegetação e trazê -lo para a boca. Como os peixes -boi evoluíram em habitats sem predadores naturais, eles não têm comportamento de prevenção de predadores. O tamanho grande e as baixas taxas metabólicas dos peixes -boi emprestam sua capacidade de mergulhos longos e profundos, bem como sua relativa falta de velocidade." #NT!
 dubois.116.g: "Guloseima." #NT!
 dubois.117.t: "Macaco de esquilo" #NT!
 dubois.117.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O Squirrel Monkey#! mudou-se para seu novo recinto." #NT!
 dubois.117.f: "Os macacos de esquilo são um gênero de primatas na família capuchina. Esses primatas relativamente pequenos são nativos da América Central e do Sul e vivem em grandes grupos que podem número de 12 a 100 indivíduos. Os grupos são compostos de numerosos homens e mulheres, bem como os animais jovens comuns. Eles têm uma estrutura social incomum para macacos: o grupo é construído em torno das fêmeas, que desenvolvem uma hierarquia fixa. Os machos geralmente ficam apenas na beira do grupo. Os membros do grupo se comunicam assobiando e rindo. Os macacos de esquilo se alimentam principalmente de insetos e frutas, cuja proporção pode variar dependendo da estação. Os insetos de caça ocorrem a maior parte do dia (até 50% do dia), comendo a fruta apenas em torno de 10%." #NT!
 dubois.117.g: "Encantador." #NT!
  
 dubois.121.t: "Lynx ibérico" #NT!
 dubois.121.d: "Nosso zoológico é enriquecido por um novo animal e bom: hoje o tão esperado #O Lynx#! Iberiano mudou-se para seu novo recinto." #NT!
 dubois.121.f: "O Lynx Ibérico (Lynx Pardinus) é uma espécie de gato selvagem endêmica da Península Ibérica no sudoeste da Europa. O lince ibérico tem um pequeno pêlo malhado amarelado a brilhante. As manchas variam em forma e tamanho de uma rodada pequena a alongada. Eles são organizados em linhas e diminuem o tamanho das costas para as laterais. Nas extremidades das pequenas orelhas triangulares, há pêlos de escova com três centímetros de comprimento. Assim como o lince da Eurásia, eles são importantes para a capacidade auditiva desses linces. No caso do lince ibérico, as experiências mostraram que a perda do pincel reduz a capacidade de ouvir e localizar. O lince ibérico é muito menor que o lince da Eurásia, que é mais difundido no norte. Com um peso corporal entre 9 e 15 kg, eles pesam menos de dois terços de um lince da Eurásia." #NT!
 dubois.121.g: "Multar." #NT!
 dubois.122.t: "Lobo da Eurásia" #NT!
 dubois.122.d: "Nosso zoológico é enriquecido por um novo animal: hoje o tão esperado #O lobo da Eurásia, mudou-se para seu novo recinto." #NT!
 dubois.122.f: "O lobo da Eurásia (Canis Lupus Lupus), também conhecido como Wolf Comum, é uma subespécie de lobo cinza nativo da Europa e da Ásia. O pêlo dos lobos da Eurásia é colorido cinza-amarelado, marrom-cinza ou cinza escuro. A parte inferior do focinho e da garganta é mais clara, as costas das orelhas parecem um pouco avermelhadas. Na maioria dos casos, a coloração nas costas mostra um adesivo escuro a preto. A ponta da cauda e a frente das pernas dianteiras também são frequentemente de cor mais escura. O uivo do lobo da Eurásia é muito mais prolongado e melodioso do que o das subespécies de lobo cinza norte -americano, cujos uivos são mais altos e têm uma ênfase mais forte na primeira sílaba." #NT!
 dubois.122.g: "Perigoso." #NT!
 dubois.123.t: "Texugo da Eurásia" #NT!
 dubois.123.d: "Nosso zoológico é enriquecido por um novo animal: hoje o tão esperado #O Badger#! da Eurásia mudou-se para seu novo recinto." #NT!
 dubois.123.f: "O texugo europeu (Meles Meles), também conhecido como Texugo Eurásico, é uma espécie de texugo na família Mustelidae, nativa de quase toda a Europa. O texugo europeu é um animal poderosamente construído, preto, branco, marrom e cinza, com uma cabeça pequena, um corpo atarracado, pequenos olhos pretos e uma cauda curta. Seu peso varia, sendo 7-13 kg (15-29 lb) na primavera, mas construindo até 15-17 kg (33-37 lb) no outono antes do período de sono de inverno. É noturno e é um animal social e escavador que dorme durante o dia em um dos vários setts em sua faixa territorial. Os dens que eles constroem (chamados setts) são os mais complexos e são transmitidos de geração para geração." #NT!
 dubois.123.g: "Interessante." #NT!
 dubois.124.t: "Arminho" #NT!
 dubois.124.d: "Nosso zoológico é enriquecido por um novo animal: hoje o tão esperado #O Stoat#! mudou-se para seu novo recinto." #NT!
 dubois.124.f: "O Stoat (Mustela Erminea), também conhecido como Eurásia Ermine, Beringian Ermine e Ermine, é um nativo de Mustelid da Eurásia e das porções do norte da América do Norte. O nome Ermine é usado para espécies do gênero Mustela, especialmente o Stoat, em seu puro casaco de inverno branco, ou o pêlo. O stoata é semelhante ao menos doninha em proporções gerais, maneira de postura e movimento, embora a cauda seja relativamente mais longa, sempre excedendo um terço do comprimento do corpo, embora seja mais curto que o da doninha de cauda de longa. Assim como no mínimo de doninha, os roedores semelhantes a camundongos predominam na dieta do Stoat. No entanto, ao contrário do menos doninha, que se alimenta quase exclusivamente de ratazas pequenas, o stoat atrai regularmente as espécies de roedores e lagomorfos maiores, e derruba indivíduos muito maiores que ele." #NT!
 dubois.124.g: "O verdadeiro animal de monarcas e cães." #NT!
 dubois.125.t: "Lontra Eurásia" #NT!
 dubois.125.d: "Nosso zoológico é enriquecido por um novo animal: hoje o tão esperado #O otter#! da Eurásia mudou-se para seu novo recinto." #NT!
 dubois.125.f: "A lontra da Eurásia (Lutra Lutra) é um mamífero semiaquático da Eurásia. A lontra da Eurásia tem uma dieta principalmente de peixes e é fortemente territorial. Como em várias outras espécies de Mustelid, as lontras são capazes de dominar e matar presas significativamente maiores que elas mesmas e são conhecidas por caçar aves aquáticas grandes, como os gansos do Greylag Adulto de vez em quando. Devido à estrutura incomum de seus cabelos, o pêlo da lontra oferece isolamento particularmente eficaz contra o frio e o molhado: como um zíper, o cabelo é interligado com cunhas e ranhuras microscopicamente pequenas e interligadas. Uma trança de pele extraordinariamente densa é criada, que prende bolhas de ar isolante, mas ao mesmo tempo repele a água. Isso mantém a pele da lontra seca e seu corpo quente." #NT!
 dubois.125.g: "Fascinante." #NT!
 dubois.126.t: "Alpine Ibex" #NT!
 dubois.126.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O Alpine ibex#! mudou-se para seu novo recinto." #NT!
 dubois.126.f: "O Alpino Ibex é uma espécie de cabra selvagem que vive nas montanhas dos Alpes europeus. É uma espécie sexualmente dimórfica: os machos são maiores e carregam chifres curvos e mais longos que as fêmeas. Sua cor de casaco é tipicamente cinza acastanhado. Alpine Ibex tende a viver em terrenos íngremes e acidentados perto da linha de neve. Eles também são sociais, embora homens e mulheres adultos segregem durante a maior parte do ano, unindo -se apenas para acasalar. O alpino ibex é estritamente herbívoro, com mais da metade de sua dieta consistindo em gramíneas, e o restante sendo uma mistura de musgos, flores, folhas e galhos. O alpino ibex variou historicamente através da França, Itália, Suíça, Liechtenstein, Baviera, Áustria e Eslovênia. A partir do início do século XVI e com as armas de fogo se tornando comuns, a população geral diminuiu devido à superexploração e caça furtiva." #NT!
 dubois.126.g: "Teimoso." #NT!
 dubois.127.t: "Somente" #NT!
 dubois.127.d: "Nosso zoológico é enriquecido por um novo e maravilhoso animal: hoje o tão esperado #O Wisent#! mudou-se para seu novo recinto." #NT!
 dubois.127.f: "O bisonte sábio ou europeu é uma espécie européia de gado. Sabediações foram encontradas nas florestas primitivas da Europa Ocidental, Central e Sudeste até o início da Idade Média. Seu habitat é florestas decíduas, coníferas e mistas temperadas. Os valores são animais de rebanho, mas de acordo com o habitat deles são encontrados apenas em pequenos grupos. Desde a extinção dos Aurochs, o bisonte tem sido o maior e maior mamífero da Europa e também o último representante das espécies bovinas selvagens no continente europeu. Na pré -história e na história inicial, sua área de distribuição estendeu -se do norte da Península Ibérica na Europa Central e ao sul da Península Escandinava para os Estados Bálticos; Da Baía de Riga, o limite de distribuição correu para o sudeste para o Mar Negro e o Cáucaso. Na década de 1920, o Wisent foi ameaçado de extinção; O último sábio de vida livre (uma montanha sábia) foi filmado em 1927 no Cáucaso. Todos os valores vivos hoje são descendentes de doze valores mantidos em zoológicos e gabinetes de animais." #NT!
 dubois.127.g: "Cru." #NT!
  
 dubois.131.t: "Hipopótamo" #NT!
 dubois.131.d: "Nosso zoológico é enriquecido por um novo animal exótico: hoje o tão esperado #O hippopotamus_1 mudou-se para seu novo recinto." #NT!
 dubois.131.f: "O hipopótamo (Hippopotamus Amphibius) é um grande mamífero semiaquático da África Subsaariana. Seu nome vem do grego antigo para 'River Horse'. Após elefantes e rinocerontes, o hipopótamo é o próximo maior mamífero terrestre. É também o maior artiodáctilo terrestre existente. Os hipopótamos habitam rios, lagos e pântanos de mangue. Cada um dos touros territoriais presidem um trecho de água e um grupo de cinco a trinta vacas e bezerros. Durante o dia, os hipopótamos permanecem frios ficando em água ou lama, emergindo ao entardecer para pastar em gramíneas. Enquanto os hipopótamos descansam perto da água, o pastoreio é uma atividade solitária e os hipopótamos normalmente não exibem comportamento territorial em terra. Os hipopótamos estão entre os animais mais perigosos do mundo devido à sua natureza agressiva e imprevisível." #NT!
 dubois.131.g: "Enorme." #NT!
 dubois.132.t: "Leão" #NT!
 dubois.132.d: "Nosso zoológico é enriquecido por um novo animal exótico: hoje o tão esperado #O Lion#! mudou-se para seu novo recinto." #NT!
 dubois.132.f: "O Leão (Panthera Leo) é um grande gato do gênero Panthera, nativo da África e da Índia. Tem um corpo musculoso e de peito largo; cabeça curta e arredondada; orelhas redondas; e um tufo peludo no final de sua cauda. É sexualmente dimórfico; Os leões adultos são maiores que as fêmeas e têm uma juba proeminente. É uma espécie social, formando grupos chamados orgulhos. O leão habita as pastagens, savanas e matagais. Geralmente é mais diurno do que outros gatos selvagens, mas quando perseguido, se adapta a ser ativo à noite e em Twilight. Um dos símbolos animais mais amplamente reconhecidos na cultura humana, o leão tem sido extensivamente retratado em esculturas e pinturas, em bandeiras nacionais e em filmes e literatura contemporâneos." #NT!
 dubois.132.g: "Majestoso." #NT!
 dubois.133.t: "Elefante" #NT!
 dubois.133.d: "Nosso zoológico é enriquecido por um animal novo e exótico: hoje o tão esperado #O elefante #! mudou-se para seu novo recinto." #NT!
 dubois.133.f: "O elefante africano (Loxodonta Africana) é uma das duas espécies de elefantes africanos existentes e uma das três espécies de elefantes existentes. É o maior animal terrestre vivo, com touros atingindo uma altura do ombro de até 3,96 m (13 pés 0 pol) e uma massa corporal de até 10,4 T (11,5 toneladas). É um mamífero social, viajando em rebanhos compostos por vacas e seus filhos. O elefante africano do mato tem pele cinza com pêlos escassos. Suas orelhas grandes cobrem o ombro inteiro e ajudam a reduzir o calor do corpo; A bate -los cria correntes de ar e expõe grandes vasos sanguíneos nas laterais internas para aumentar a perda de calor durante o clima quente. Os elefantes da África Bush usam seus troncos para comunicação tátil. Ao cumprimentar, um indivíduo de classificação mais baixa insere a ponta do porta -malas na boca de seu superior. Os elefantes também esticarão seu porta -malas em direção a um indivíduo que se aproximava que pretende cumprimentar." #NT!
 dubois.133.g: "Ótimo." #NT!
 dubois.134.t: "Girafa" #NT!
 dubois.134.d: "Nosso zoológico é enriquecido por um animal novo e exótico: hoje o tão esperado #O giraffe#! mudou-se para seu novo gabinete." #NT!
 dubois.134.f: "A girafa é um grande mamífero africano pertencente ao gênero Girafa. É o animal terrestre mais alto e o maior ruminante da Terra. As principais características distintivas da girafa são seus pescoços e pernas extremamente longos, seus ossicones semelhantes a chifres e seus padrões de revestimento manchado. As girafas geralmente habitam savanas e florestas. Sua fonte de alimento são folhas, frutas e flores de plantas lenhosas, principalmente espécies de acácia, que eles navegam em alturas que a maioria dos outros herbívoros não consegue alcançar. As girafas são geralmente encontradas em grupos que variam em tamanho e composição de acordo com fatores ecológicos, antropogênicos, temporais e sociais. Com sua construção esbelta e casaco manchado, a girafa tem sido uma fonte de fascínio em toda a história humana, e sua imagem é generalizada na cultura." #NT!
 dubois.134.g: "Elegante" #NT!
 dubois.135.t: "Pinguim africano" #NT!
 dubois.135.d: "Nosso zoológico é enriquecido por um novo animal exótico: hoje o tão esperado #O Penguin#! mudou-se para seu novo recinto." #NT!
 dubois.135.f: "O pinguim africano (Spheniscus demersus) é uma espécie de pinguim confinada às águas da África Austral. Como todos os pinguins existentes, é sem voo, com um corpo e asas simplificadas endurecidas e achatadas em nadadeiras para um habitat marinho. A espécie tem manchas rosa distintas da pele acima dos olhos e uma máscara facial preta. As partes superiores do corpo são pretas e delineadas fortemente nas partes inferiores brancas, que são vistas e marcadas com uma faixa preta. O pinguim africano é um mergulhador de perseguição e se alimenta principalmente de peixes e lulas e é a única espécie de pinguim que se reproduz na África. Os pinguins africanos são uma espécie comumente vista em zoológicos em todo o mundo. Como eles não exigem temperaturas particularmente baixas, geralmente são mantidas em gabinetes externos." #NT!
 dubois.135.g: "Pelo menos temos um pinguim." #NT!
 dubois.136.t: "RAT de toupeira nua" #NT!
 dubois.136.d: "Nosso zoológico é enriquecido por um novo animal exótico: hoje o tão esperado #O mole nu rat#! mudou-se para seu novo recinto." #NT!
 dubois.136.f: "O rato mole nua exibe um conjunto altamente incomum de características fisiológicas e comportamentais que permitem prosperar em um ambiente subterrâneo severo; Mais notavelmente, é o único termoformador de mamíferos com uma forma quase totalmente ectotérmica (de sangue frio) de regulação da temperatura corporal, além de exibir uma estrutura social complexa dividida entre castas reprodutivas e nãoprodutivas, tornando-a e a clássica mais bem relacionada e a rata-ratina mais ampla dos exemplos de eusocialidade (a rata-ratina mais ampla e a flagrante. O rato mole nua não possui sensibilidade à dor em sua pele e possui taxas metabólicas e respiratórias muito baixas. Também é notável por sua longevidade e sua resistência ao câncer e privação de oxigênio." #NT!
 dubois.136.g: "Bonitinho." #NT!
 dubois.137.t: "Zebra" #NT!
 dubois.137.d: "Nosso zoológico é enriquecido por um novo animal exótico: hoje a tão esperada #O zebra#! mudou-se para seu novo recinto." #NT!
 dubois.137.f: "As zebras são um subgênero do gênero de cavalo, que consiste em três espécies. Todos os representantes das zebras são encontrados exclusivamente na África, onde habitam principalmente paisagens abertas. Existem várias tentativas de explicar o desenvolvimento evolutivo das faixas; Uma combinação de vários efeitos vantajosos também é concebível. Por um lado, Charles Darwin e Alfred Russel Wallace, entre outros, suspeitavam que eles pudessem atuar como camuflagem em grama alta ou em ar quente e cintilante. Como as zebras vivem em rebanhos, isso pode tornar mais difícil para os predadores destacarem presas. De acordo com outra hipótese testada experimentalmente, as faixas se formaram para camuflar contra moscas e moscas da tsé -tsé. Outros cientistas suspeitam que as tiras sejam usadas para termorregulação." #NT!
 dubois.137.g: "Horsy." #NT!
  
 dubois.141.t: "Panda gigante" #NT!
 dubois.141.d: "Nosso zoológico é enriquecido por um novo animal espetacular: hoje o tão aguardado #O panda §1 mudou-se para seu novo recinto." #NT!
 dubois.141.f: "O panda gigante (Ailuropoda melanoleuca) é uma espécie de urso caracterizada por seu casaco em preto e branco e corpora rotundada. O nome 'Giant Panda' às vezes é usado para distingui -lo do panda vermelho, um vizinho Mustelóide. Embora pertença à Ordem Carnivora, o Panda gigante é um folivore, com brotos de bambu e folhas representando mais de 99% de sua dieta. Os pandas gigantes são geralmente solitários. Cada adulto tem um território definido e uma fêmea não é tolerante com outras mulheres em seu alcance. Os encontros sociais ocorrem principalmente durante a breve estação de reprodução em que os pandas próximos um do outro se reunirão. A baixa qualidade nutricional do bambu significa que os pandas precisam comer com mais frequência e, devido à falta de predadores importantes, eles podem ser ativos a qualquer hora do dia." #NT!
 dubois.141.g: "Fantástico." #NT!
 dubois.142.t: "Orangotango" #NT!
 dubois.142.d: "Nosso zoológico é enriquecido por um novo animal espetacular: hoje o tão esperado #O Orangutan#! mudou-se para seu novo recinto." #NT!
 dubois.142.f: "Os orangotangos são grandes macacos nativos das florestas tropicais da Indonésia e da Malásia. O mais arbóreo dos grandes macacos, os orangotangos passam a maior parte do tempo em árvores. Eles têm braços longos e pernas curtas proporcionalmente e têm cabelos marrom-avermelhados cobrindo seus corpos. Os machos adultos dominantes desenvolvem bochechas distintas ou flanges e fazem chamadas longas que atraem fêmeas e intimidam rivais; Os machos subordinados mais jovens não se parecem com mulheres adultas. Eles são os mais solitários dos grandes macacos: os laços sociais ocorrem principalmente entre as mães e seus filhos dependentes. Os orangotangos estão entre os primatas mais inteligentes. Eles usam uma variedade de ferramentas sofisticadas e construtam ninhos de dormir elaborados todas as noites de galhos e folhagem." #NT!
 dubois.142.g: "Com suas habilidades, ele poderia fazer um bom bibliotecário." #NT!
 dubois.143.t: "Tigre de Bengala" #NT!
 dubois.143.d: "Nosso zoológico é enriquecido por um novo animal espetacular: hoje o tão esperado #O Bengala Tiger#! mudou-se para seu novo recinto." #NT!
 dubois.143.f: "O tigre de Bengala é uma população da subespécie de Panthera Tigre Tigre e da subespécie de tigre indicada. Ele está entre os maiores gatos selvagens vivos hoje. O casaco do tigre de Bengala é amarelo a laranja claro, com listras que variam de marrom escuro a preto; A barriga e as partes internas dos membros são brancas e a cauda é laranja com anéis pretos. A unidade social básica do tigre é composta por uma mulher e seus filhos. Os animais adultos se reúnem apenas temporariamente quando as condições especiais permitem, como suprimentos abundantes de alimentos. Caso contrário, eles levam vidas solitárias, caçando individualmente para os animais da floresta e das pastagens sobre as quais atacam. Na maioria dos casos, os tigres se aproximam de sua vítima de lado ou de trás a uma distância possível e seguram a garganta da presa para matá -la." #NT!
 dubois.143.g: "Nobre." #NT!
 dubois.144.t: "Tapir malaio" #NT!
 dubois.144.d: "Nosso zoológico é enriquecido por um novo animal espetacular: hoje o tão esperado #O malaio tapir#! mudou-se para seu novo recinto." #NT!
 dubois.144.f: "O Tapir malaio (tapirus indicus) é a única espécie de tapir viva fora das Américas. É facilmente identificado por suas marcações, principalmente o adesivo de cor clara que se estende de seus ombros aos quartos traseiros. Está coberto de cabelos pretos, exceto as pontas de suas orelhas, que, como em outros tapirs, são arremessadas com branco. O padrão é para camuflagem; A coloração interrompida quebra seu esboço e torna mais difícil de reconhecer; Outros animais podem confundi -lo com uma grande rocha, em vez de presas, quando está deitada para dormir. Os tapirs malaia têm uma visão muito ruim, confiando em excelentes sentidos de olfato e audição." #NT!
 dubois.144.g: "Exótico." #NT!
 dubois.145.t: "Dragão Komodo" #NT!
 dubois.145.d: "Nosso zoológico é enriquecido por um novo animal espetacular: hoje o tão esperado #O Komodo Dragon#! mudou-se para seu novo recinto." #NT!
 dubois.145.f: "O Dragão Komodo (Varanus komodoensis) é um membro da família Monitor Lizard Varanidae que é endêmica das ilhas da Indonésia de Komodo, Rinca, Flores e Gili Motang. É a maior espécie existente de lagarto, crescendo com um comprimento máximo de 3 m (9,8 pés) e pesando até 70 kg (150 lb). Como resultado de seu tamanho, os dragões Komodo são predadores de ápice e dominam os ecossistemas em que vivem. Os dragões de Komodo caçam e emboscam presas, incluindo invertebrados, pássaros e mamíferos. O comportamento do grupo de Komodo Dragons na caça é excepcional no mundo dos répteis. Sua dieta consiste principalmente em Javan Rusa (Rusa timorensis), embora eles também comam quantidades consideráveis ​​de carniça. Eles foram gravados pela primeira vez pelos cientistas ocidentais em 1910. Seu tamanho grande e reputação temível os tornam exposições populares do zoológico." #NT!
 dubois.145.g: "Terrível." #NT!
 dubois.146.t: "Leopardo da neve" #NT!
 dubois.146.d: "Nosso zoológico é enriquecido por um novo animal espetacular: hoje o tão esperado #O Snow Leopard#! mudou-se para seu novo recinto." #NT!
 dubois.146.f: "O leopardo da neve, comumente conhecido como onça, é nativo das cadeias de montanhas da Ásia Central e do Sul. O leopardo da neve mostra várias adaptações para viver em ambientes frios e montanhosos. Suas pequenas orelhas arredondadas ajudam a minimizar a perda de calor. É solitário e principalmente ativo ao amanhecer até o início da manhã e novamente na tarde e no início da noite. Os leopardos da neve não podem rugir, apesar de seu osso hióide parcialmente ossificado, pois seus 9 mm (0,35 pol) dobras vocais fornecem pouca resistência ao fluxo de ar. As vocalizações do leopardo da neve incluem miando, grunhidos, prusten e gemidos. Eles podem ronronar ao exalar. O leopardo da neve é ​​amplamente utilizado na heráldica e como um emblema na Ásia Central. Eles são usados ​​há muito tempo como um símbolo político, as barras AQ ('leopardo branco'), por tártaros, cazaques e búlgaros." #NT!
 dubois.146.g: "Sublime." #NT!
 dubois.147.t: "Cheetah asiático" #NT!
 dubois.147.d: "Nosso zoológico é enriquecido por um novo animal espetacular: hoje o tão esperado #O Cheetah#! asiático mudou-se para seu novo recinto." #NT!
 dubois.147.f: "A chita é o animal mais rápido da terra do mundo. Em um curto período de tempo durante uma perseguição, um guepardo pode produzir 60 vezes mais calor do que em repouso, com grande parte do calor produzido a partir de glicólise, armazenado para possivelmente aumentar a temperatura corporal. A chita asiática já variou do norte da África Subsaariana na Ásia Central à Índia. Durante o curso do século XIX, o alcance da chita asiática continuou a diminuir antes de se extinguir em quase todas as regiões, exceto por uma pequena região no Irã. Já na Primeira Guerra Mundial, os príncipes indianos haviam importado da África, pois a espécie local estava quase extinta." #NT!
 dubois.147.g: "Rápido." #NT!
 dubois.148.t: "Panda vermelha" #NT!
 dubois.148.d: "Nosso zoológico é enriquecido por um novo animal espetacular: hoje o tão aguardado #O panda §1, mudou-se para seu novo recinto." #NT!
 dubois.148.f: "Os pandas vermelhos são um gênero de mamíferos nativos do Himalaia Oriental e do sudoeste da China e se alimentam principalmente de bambu. Ao contrário das suposições atuais nessa direção, o gênero não está intimamente relacionado ao panda gigante. Em forma, eles parecem semelhantes a um guaxinim, mas são mais magros. Seu pêlo é longo e macio, marrom avermelhado para vermelho de cobre no topo, às vezes com um tom amarelado e preto brilhante no fundo. O rosto pode ser colorido individualmente - é principalmente marrom avermelhado com listras de lágrimas brancas, o focinho é curto e o nariz está nu e preto. Pequenos pandas são alpinistas muito habilidosos e acrobáticos. Enquanto eles procuram comida à noite e à noite, durante o dia em que geralmente dormem nos garfos das árvores, nas cavidades das árvores, eles se enrolam e colocam as caudas na frente de seus rostos para protegê -los. Eles são muito sensíveis ao calor; As temperaturas acima de 25 ° C podem ser muito difíceis para eles." #NT!
 dubois.148.g: "Este era difícil de encontrar." #NT!
  
 dubois.151.t: "Tartaruga do mar verde" #NT!
 dubois.151.d: "Nosso zoológico é enriquecido por um novo animal e excepcional: hoje a tão esperada Tartaruga do Mar Verde #O mudou-se para seu novo recinto." #NT!
 dubois.151.f: "A Tartaruga do Mar Verde (Chelonia Mydas) é uma espécie de grande tartaruga marinha da família Cheloniidae. O corpo achatado dorsoventralmente de C. mydas é coberto por uma grande carapaça em forma de lágrima; Possui um par de nadadeiras grandes e parecidas com pá. Geralmente é levemente colorido, embora nas populações do Pacífico Oriental, partes da carapaça possam ser quase pretas. Os adultos geralmente habitam lagoas rasas, alimentando -se principalmente de várias espécies de ervas marinhas. Como outras tartarugas marinhas, as tartarugas marinhas verdes migram longas distâncias entre as áreas de alimentação e as praias de incubação. Muitas ilhas em todo o mundo são conhecidas como Ilha da Tartaruga devido a tartarugas marinhas verdes que nidificam em suas praias. As tartarugas do mar verde podem viver até 90 anos na natureza." #NT!
 dubois.151.g: "Hoary." #NT!
 dubois.152.t: "Manta Ray" #NT!
 dubois.152.d: "Nosso zoológico é enriquecido por um novo animal excepcional: hoje o tão esperado #O manta ray#! mudou-se para seu novo gabinete." #NT!
 dubois.152.f: "O gigante Oceanic Manta Ray (Mobula Birostris) é uma espécie de raio na família Mobulidae e o maior tipo de raio do mundo. É circunglobal e geralmente é encontrado em águas tropicais e subtropicais, mas também pode ser encontrado em águas temperadas. O gigante raio de manta oceânico pode crescer até 9 m (30 pés) em comprimento máximo e para um tamanho de disco de 7 m (23 pés) com um peso de cerca de 3.000 kg (6.600 lb), mas o tamanho médio comumente observado é de 4,5 m (15 pés). A pele é lisa com uma dispersão de tubérculos cônicos e em forma de cordilheira. A coloração da superfície dorsal (superior) é preta, marrom escura ou azul de aço, às vezes com alguns pontos pálidos e geralmente com uma borda pálida. Devido ao seu grande tamanho e velocidade em caso de perigo, o raio de manta oceânico tem muito poucos predadores naturais que podem ser fatais." #NT!
 dubois.152.g: "Gigantesco." #NT!
 dubois.153.t: "Kangaroo vermelho" #NT!
 dubois.153.d: "Nosso zoológico é enriquecido por um novo animal excepcional: hoje o tão esperado #O Kangaroo#! mudou-se para seu novo recinto." #NT!
 dubois.153.f: "O canguru vermelho (Osfranter Rufus) é o maior de todos os cangurus, o maior mamífero terrestre da Austrália e o maior marsupial existente. Esta espécie é um canguru muito grande, com orelhas longas e pontiagudas e um focinho de forma quadrada. Eles são sexualmente dimórficos, pois os machos têm pêlo curto e marrom-avermelhado, desaparecendo para o lustre pálido abaixo e nos membros. Os machos crescem até um comprimento de cabeça e corpo de 1,3-1,6 m (4 pés 3 a 5 pés 3 polegadas) com uma cauda que adiciona mais 1,2 m (3 pés 11 polegadas) ao comprimento total e são referidos pelos australianos como 'grandes vermelhos'. As pernas do canguru vermelho funcionam como um elástico, com o tendão de Aquiles se esticando quando o animal desce, liberando sua energia para impulsionar o animal para cima e para frente, permitindo a locomoção de salto característica. Eles podem atingir velocidades de cerca de 60 km/h (37 mph)." #NT!
 dubois.153.g: "Esplêndido." #NT!
 dubois.154.t: "Koala" #NT!
 dubois.154.d: "Nosso zoológico é enriquecido por um novo animal excepcional: hoje o tão esperado #O koala#! mudou-se para seu novo recinto." #NT!
 dubois.154.f: "O Koala (Phascolarctos cinereus) é um nativo marsupial herbívoro arbóreo da Austrália. É facilmente reconhecível por seu corpo robusto, com a cabeça grande e a cabeça grande, com orelhas redondas e macias e nariz grande em forma de colher. A cor de pele varia de cinza prateado a marrom chocolate. Os coalas normalmente habitam a floresta de eucalipto aberto, enquanto as folhas dessas árvores compõem a maior parte de sua dieta. Essa dieta de eucalipto possui baixo teor nutricional e calórico e contém toxinas que impedem a maioria dos outros mamíferos de se alimentarem. Os coalas são amplamente sedentários e durmam até vinte horas por dia. São animais associados, e a ligação existe apenas entre mães e filhos dependentes. Devido à sua aparência distinta, o coala, juntamente com os cangurus, é reconhecido em todo o mundo como símbolos da Austrália." #NT!
 dubois.154.g: "Bonitinho." #NT!
 dubois.155.t: "Platypus" #NT!
 dubois.155.d: "Nosso zoológico é enriquecido por um novo animal excepcional: hoje o tão esperado #O Platypus#! mudou-se para seu novo gabinete." #NT!
 dubois.155.f: "O ornitorrinco (Ornithorhynchus anatinus) é uma das cinco espécies existentes de monotremvos, mamíferos que depositam ovos em vez de dar à luz jovens. Como outros monotremes, detecta presa através da eletrolocalização. É uma das poucas espécies de mamíferos venenosos, pois o ornitorrinco masculino tem um esporão no pé traseiro que oferece um veneno, capaz de causar dor intensa aos seres humanos. A aparência incomum deste mamífero de pato, bico-pato, naturalistas europeus de mamíferos de cauda de castor, quando o encontraram pela primeira vez. Em 1799, os primeiros cientistas a examinar um órgão de ornitorrinco preservados o julgaram uma falsa, feita de vários animais costurados juntos. As características únicas do ornitorrinco o tornam um assunto importante no estudo da biologia evolutiva e um símbolo reconhecível e icônico da Austrália." #NT!
 dubois.155.g: "Paradoxo." #NT!
 dubois.156.t: "Cassowary" #NT!
 dubois.156.d: "Nosso zoológico é enriquecido por um novo animal excepcional: hoje o tão esperado #O Cassowary#! mudou-se para seu novo recinto." #NT!
 dubois.156.f: "Os casuares são pássaros sem voos sem uma quilha em seus ossos de esterno. Três espécies de casuares estão existentes. O mais comum, o Cassowary do sul, é o terceiro e segundo pássaro vivo mais alto, menor que apenas o Avestruz e o Emu. Cerca de 90% da dieta casuar consiste principalmente em frutas, embora todas as espécies sejam onívoros oportunistas. Normalmente, todos os casuares são pássaros tímidos encontrados na floresta profunda. Eles são hábeis em desaparecer muito antes de um humano saber que estava lá, mas, se provocados, são capazes de infligir ferimentos graves, até fatais, de cães e pessoas. O casuar é frequentemente rotulado como 'o pássaro mais perigoso do mundo'." #NT!
 dubois.156.g: "Para que serve esse casco?" #NT!
 dubois.157.t: "Leão marinho da Nova Zelândia" #NT!
 dubois.157.d: "Nosso zoológico é enriquecido por um novo animal excepcional: hoje o tão esperado #O da Nova Zelândia Lion#! mudou-se para seu novo recinto." #NT!
 dubois.157.f: "O leão-marinho da Nova Zelândia é um grande selo de orelhas nativo da zona sub-polar. Os touros são de cor marrom-preta e atingem alturas de 2,45 metros; Uma juba dos ombros faz com que pareçam enormes. As vacas são mais delicadas: são marrons claros e no máximo 2 metros de comprimento. As colônias são encontradas no sul da Nova Zelândia, nas ilhas subantárticas: as Ilhas Auckland, as Ilhas Snares e a Ilha Campbell. 95 % das ações mundiais são encontradas em três colônias nas Ilhas Auckland. No século XIX, muitos leões -marinhos foram mortos por seladores. Os leões -marinhos das ilhas de Auckland foram completamente eliminados em apenas vinte anos depois que as ilhas foram descobertas em 1806. Hoje, as Ilhas Auckland são um santuário do selo deserto, onde as populações se recuperaram amplamente." #NT!
 dubois.157.g: "Robusto." #NT!
  
 dubois.200.t: "Abertura do Museu de História Natural" #NT!
 dubois.200.d: "O professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] abriu o Museu de História Natural hoje, mostrando o desenvolvimento de seres vivos e evolução." #NT!
 dubois.200.f: "Quando o Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] anunciou orgulhosamente a abertura do primeiro museu de história natural de nossa nação, alguns já haviam esquecido o esforço um esforço para promover esse projeto. O Museu Nacional, que anteriormente abrigava a história natural, havia resistido a esse movimento junto com sua liderança. Para muitos, a história natural era apenas um departamento subordinado. Foi graças ao Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] que ele usou seus contatos no governo e perseguiu sua idéia sem comprometer. Especialmente pesquisas paleontológicas se beneficiarão disso no futuro, e os visitantes já expressaram seu grande interesse em criaturas extintas, além de fazer perguntas sobre a origem do homem. A paleontologia, anteriormente uma ciência puramente auxiliar ou ocupação temporária de geólogos, agora se tornou uma ciência estabelecida com suas próprias instituições e uma reputação que a coloca em pé de igualdade com outras ciências naturais." #NT!
 dubois.200.g: "Parece um ótimo lugar para se visitar!" #NT!
 dubois_natural_history_museum_modifier: "Museu de História Natural" #NT!
  
 dubois.201.t: "Destino de expedição paleontológica" #NT!
 dubois.201.f: "Um [concept_dubois_paleontologist] pode ser despachado para formações em que ele desenterra anualmente fósseis até ser lembrado de sua posição. Ótimas formações também podem conter ossos de dinossauros. Estes variam de continente para continente. A maneira mais fácil de obter acesso a uma formação é controlar o estado associado. No entanto, o acesso também pode ser obtido pacificamente através de licenças paleontológicas." #NT!
 dubois.201.g: "Deixa para lá." #NT!
  
 dubois.202.t: "Dente de tubarão" #NT!
 dubois.202.d: "Depois de examinar uma formação rochosa, uma equipe paleontológica montou uma coleção de dentes de tubarão fóssil." #NT!
 dubois.202.f: "Além das vértebras, os dentes de tubarão fóssil geralmente são os únicos fósseis sobreviventes de tubarões extintos. Como os tubarões produzem um grande número de dentes por causa de seus dentes do revólver, esses estão entre os fósseis mais frequentemente encontrados. Já em 1616, Fabio Colonna foi capaz de mostrar em seu tratado de Glossperotris dissertação que as supostas línguas de víbora são de fato dentes de tubarão. O esqualicórax Pristodontus tinha dentes triangulares planos, até um máximo de três centímetros de comprimento. As bordas de corte foram finamente serrilhadas como hoje no tubarão -tigre. No período cretáceo, o gênero Squalicórax foi distribuído em todo o mundo. Os dentes fossilizados foram encontrados em sedimentos mesozóicos nas Américas, África, Japão, Austrália, Índia, Rússia, Oriente Médio e Europa." #NT!
 dubois.202.g: "Eles ainda são afiados?" #NT!
 dubois.203.t: "Pegadas de dinossauros?" #NT!
 dubois.203.d: "[SCOPE.sCharacter('pb_leader').GetFullName] duvida de uma descoberta recente do professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]." #NT!
 dubois.203.f: "Quando o Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] anunciou uma nova descoberta em uma formação de rochas, o líder da ursinho insignificante também veio ver a sensação paleontológica para si mesmo. No entanto, ele mostrou pouco entendimento para as supostas pegadas de dinossauros. De fato, [SCOPE.sCharacter('pb_leader').GetFullName] explicou que ele não podia ver nada de especial nos recuos estranhos. O filistinismo do líder político levou a uma discussão completa com o professor, que exigiu um pedido de desculpas no local. A disputa logo se tornou um conflito entre os apoiadores de §2 e os acadêmicos em torno do Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]." #NT!
 dubois.203.g: "Estas são pegadas de dinossauros." #NT!
 dubois.203.h: "Esses recortes podem ser qualquer coisa." #NT!
 dubois.204.t: "Palaeosinopa" #NT!
 dubois.204.d: "Os cientistas descobriram recentemente o esqueleto de um mamífero. Este é um exemplo particularmente bem preservado." #NT!
 dubois.204.f: "Palaeosinopa é um gênero de mamíferos na família Pantolestidae, agora extinto. Os animais pareciam os insetívoros atuais e viviam do Paleoceno superior ao Eoceno inferior de 59 a 48 milhões de anos atrás. As evidências são conhecidas principalmente da América do Norte, mais raramente da Europa. As descobertas importantes, incluindo alguns esqueletos completos, vêm do noroeste dos EUA. O membro fóssil Butte da Formação Green River com uma idade de cerca de 52 milhões de anos e a formação de Willwood estratigraficamente mais antiga são particularmente destacados. Representantes de paleosinopa foram caracterizados por um físico robusto e uma cauda longa. As pernas dianteiras mais curtas em comparação com as pernas posteriores mais longas pareciam bastante primitivas. Devido ao físico, um modo de vida semi-aquático é reconstruído para os animais, a estrutura dos dentes, por sua vez, fala para alimentos predominantemente animais. Como resultado, Palaeosinopa parece ter habitado um habitat semelhante ao das lontras de hoje." #NT!
 dubois.204.g: "Fantástico." #NT!
 dubois.204.h: "Um presente perfeito para um amigo!" #NT!
 dubois.205.t: "Ossos no eixo de minas" #NT!
 dubois.205.d: "Os mineiros encontraram ossos de uma espécie pré -histórica em um eixo em [SCOPE.sState('dubois_excavation_state').GetName]. Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] concordou em examinar o site mais de perto." #NT!
 dubois.205.f: "Nem todo mundo estava tão entusiasmado com o achado dos ossos na mina quanto o paleontologista que havia sido convocado. O gerenciamento de minas estava preocupado com o fato de uma escavação paleontológica interferir no trabalho. E, de fato, após uma breve inspeção dos achados, o Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] deve determinar que o trabalho no eixo teria que ser adiado em favor de uma escavação científica profissional. Os industriais já protestaram. A descoberta fóssil se torna uma questão política. Porque a intelligentsia agora também está muito interessada e insiste em escavar os fósseis. As vozes mediadoras estão pensando em evitar uma escavação e apenas manter registros, o que não afetaria o trabalho de mineração e pode ser um bom compromisso político, mas significaria que não poderíamos salvar os fósseis." #NT!
 dubois.205.g: "Devemos ter esses fósseis a todo custo." #NT!
 dubois.205.h: "Nosso cientista pode examinar o local, mas não deve escavar a mina." #NT!
 dubois.205.i: "Não perturbe esses senhores." #NT!
 dubois.206.t: "Composita" #NT!
 dubois.206.d: "Este ano, [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] sob a liderança do Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] no local de escavação em [SCOPE.sState('dubois_excavation_state').GetName] descobriu alguns espécimes particularmente bonitos da composita." #NT!
 dubois.206.f: "A Composita é um gênero Brachiopod extinto que viveu do falecido Devoniano ao falecido Permiano. A Composita tinha uma distribuição global cosmopolita, tendo vivido em todos os continentes, exceto a Antártica.composita, tinha uma concha lisa com uma dobra e sulco mais ou menos distintos e uma abertura redonda para o pedículo na válvula pedicular. A Composita está incluída na família Athyrididae (Order Athyridida) e colocada na subfamília Spirigerellinae. Somente os filisteus reconheceriam uma mera concha nesse fóssil consagrado no tempo." #NT!
 dubois.206.g: "Isso é tão ... emocionante." #NT!
 dubois.207.t: "Trilobita" #NT!
 dubois.207.d: "O Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] entregou hoje uma excelente amostra de trilobita à coleção paleontológica. Tem cerca de 400 milhões de anos e é de grande valor científico. Pelo menos ele diz isso." #NT!
 dubois.207.f: "Os trilobitas são uma classe extinta de artrópodes marinhos. Eles existiram por quase todo o período do Paleozóico, desde a 2ª série do Cambriano (começando 521 milhões de anos atrás) até o evento de extinção em massa no final do Permiano, cerca de 251 milhões de anos atrás. Um grande número de seus exoesqueletos, reforçado com calcita (carbonato de cálcio), foi preservado como fósseis, possibilitando reconstruir a evolução e a variedade de formas das numerosas espécies. Isso, combinado com sua persistência estratigráfica e ampla gama geográfica, faz dos trilobitas importantes fósseis índices para os paleozóicos, particularmente o Cambriano. A classe extinta de Trilobita consiste em nove ordens reconhecidas, mais de 150 famílias, mais de 5000 gêneros e mais de 15.000 espécies descritas." #NT!
 dubois.207.g: "Obrigado, professor." #NT!
 dubois.208.t: "Amonitas" #NT!
 dubois.208.d: "Um amonita encontrado em [SCOPE.sState('dubois_excavation_state').GetName] é outro conjunto notável de fósseis, enriquecendo a coleção paleontológica de nossa nação." #NT!
 dubois.208.f: "Os amonitas (Ammonoidea) são um subgrupo extinto de cefalópodes. Este táxon era muito diversificado, com mais de 1500 gêneros conhecidos. O número de espécies pode ter sido de 30.000 a 40.000. O tamanho da concha de animais adultos geralmente está na faixa de 1 a 30 cm. Desde sua primeira aparição no Devoniano inferior até a extinção no final do Cretáceo (limite do Cretáceo-Paleogene), os amonitas representam um grande número de fósseis de índice durante um período de cerca de 350 milhões de anos; Em parte, a delimitação cronológica de sedimentos marinhos é realizada exclusivamente com base em amonitas. Eles são, portanto, de grande importância para a geologia e a paleontologia. O Taxon Ammonaidea foi mencionado pela primeira vez em 1884 por Karl Alfred von Zittel em seu manual sobre paleontologia. O nome vem da antiguidade, Plínio, o ancião se referiu aos fósseis como 'Amonis Cornua' (chifres de Ammon)." #NT!
 dubois.208.g: "Deixe -me um." #NT!
 dubois.209.t: "Flora fossilizada" #NT!
 dubois.209.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] Encontraram a flora fossilizada milhões de anos em uma pedreira." #NT!
 dubois.209.f: "No carbonífero (cerca de 360-300 milhões de anos atrás), as samambaias (em formas maiores do que hoje, geralmente chamadas de samambaias de árvores), juntamente com as plantas de Horsetail e Lycopod, formaram enormes florestas e criaram a base para a maioria dos depósitos de carvão de hoje. Os achados mais antigos fósseis são do Devoniano Baixo (cerca de 400 milhões de anos atrás). Assim, as samambaias são provavelmente mais antigas que as plantas de sementes, que apareceram pela primeira vez no Devoniano Superior." #NT!
 dubois.209.g: "A pedra angular da revolução industrial." #NT!
 dubois.210.t: "Ovos de dinossauros" #NT!
 dubois.210.d: "Alguns objetos redondos, primeiro pensados ​​como meras pedras, acabaram sendo ovos em um exame mais próximo. Os cientistas ainda não sabem ao certo a quem pertenciam exatamente, mas, sem dúvida, os designam a uma espécie de dinossauro." #NT!
 dubois.210.f: "Em 1859, os primeiros fósseis de ovos de dinossauros documentados cientificamente foram descobertos no sul da França por um padre católico e naturalista amador chamado Padre Jean-Jacques Pouech; Ele pensou, no entanto, que eles eram colocados por pássaros gigantes. Os primeiros fósseis de ovos de dinossauros reconhecidos cientificamente foram descobertos em 1923 por uma equipe do Museu Americano de História Natural enquanto procurava evidências de humanos primitivos na Mongólia. Esses ovos foram atribuídos por engano aos protoceratões de herbívoros localmente abundantes, mas agora são conhecidos por serem ovos oviraptor. As descobertas de ovos continuaram a montar em todo o mundo, levando ao desenvolvimento de vários esquemas de classificação concorrentes." #NT!
 dubois.210.g: "Lidar com isso com cuidado." #NT!
  
 dubois.211.t: "Escavação de dinossauros" #NT!
 dubois.211.d: "Ao investigar uma ótima formação, o Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] encontrou um achado sensacional: um osso de dinossauro! O [concept_dubois_paleontologist] organizou imediatamente uma escavação em larga escala para começar na esperança de encontrar mais peças." #NT!
 dubois.211.f: "'The combination of such characters, some, as the sacral ones, altogether peculiar among Reptiles, others borrowed, as it were, from groups now distinct from each other, and all manifested by creatures far surpassing in size the largest of existing reptiles, will, it is presumed, be deemed sufficient ground for establishing a distinct tribe or sub-order of Saurian Reptiles, for which I would propose the name of Dinosauria.' -Richard Owen" #NT!
 dubois.211.g: "Pegue suas pás!" #NT!
 dubois.213.t: "Fragmentos fósseis" #NT!
 dubois.213.d: "No local da escavação de dinossauros, os cientistas garantiram achados menores de fósseis." #NT!
 dubois.213.f: ""Pode não ser o que estamos procurando, mas um centavo economizado é um centavo ganhado." -[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]" #NT!
 dubois.213.g: "Colete os fósseis!" #NT!
 dubois.214.t: "Osso de dinossauro" #NT!
 dubois.214.d: "A equipe de ciências do Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] fez uma nova descoberta no site Dinosaur Dig." #NT!
 dubois.214.f: "Ao ver um único osso, de um único pedaço de osso, reconheço e reconstruo a parte do todo do qual teria sido tirado. Todo o ser ao qual esse fragmento pertencia aparece nos olhos da minha mente. -Georges Cuvier" #NT!
 dubois.214.g: "Outro osso para a coleção." #NT!
 dubois.215.t: "Crânio de dinossauro" #NT!
 dubois.215.d: "As escavações no poço de dinossauros desenterraram uma magnífica cabeça esquelética." #NT!
 dubois.215.f: "“A cabeça era tão longa ou mais que a de um urso pardo totalmente cultivado, e as mandíbulas eram mais profundas em proporção ao seu comprimento. O focinho era mais curto e mais profundo que o de um cachorro-touro. Os dentes eram todos presas cilíndricas nítidas, suaves e brilhantes e de tamanho irregular. A certa distância em cada mandíbula, eles projetavam três centímetros acima da gengiva e foram afundados uma polegada na margem da mandíbula, sendo assim o tempo que as presas de um tigre, mas mais esbeltas. Duas dessas presas se cruzaram em cada lado do meio da frente. Além dos peixes menores, os répteis, sem dúvida, forneceram as demandas de seu apetite. -Edward Drinker Cope" #NT!
 dubois.215.g: "Espero que seja um Triceratops!" #NT!
 dubois.216.t: "Esqueleto de dinossauro" #NT!
 dubois.216.d: "Após o trabalho meticuloso, o Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] conseguiu descobrir um impressionante esqueleto de dinossauro, alguns ossos são particularmente bem preservados." #NT!
 dubois.216.f: "“O esqueleto em si foi organizado no Museu da Academia de Ciências da Filadélfia, de acordo com essa restauração, e quando o professor Cope me mostrou e explicou suas peculiaridades, notei que as articulações das vértebras foram revertidas e sugeridas a ele que ele tinha tudo o que estava no final da Foremest.  Sua indignação foi ótima, e ele afirmou em uma linguagem forte que estudou o animal por muitos meses e deveria pelo menos conhecer uma extremidade do outro. -Thniel Charles Marsh" #NT!
 dubois.216.g: "Fascinante." #NT!
 dubois.220.t: "Escavação terminada" #NT!
 dubois.220.d: "Os [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] terminaram sua escavação no site de dinossauros. Uma importante investigação científica chega ao fim." #NT!
 dubois.220.f: "O caçador fóssil deve antes de tudo ser um entusiasta científico. Ele deve estar disposto a suportar todos os tipos de dificuldades, para sofrer frio no início da primavera e no final do outono e no início dos meses de inverno, para sofrer calor intenso e o brilho do sol nos meses de verão, e deve estar preparado para beber água alcalina e, em algumas regiões, para combater o ataque do mosquito e de outras pestes. Ele deve ser uma espécie de engenheiro para poder lidar com grandes massas de pedra e transportá -las sobre resíduos sem estradas de deserto para o ponto de remessa mais próximo; Ele deve ter um toque delicado e hábil para preservar os menos fragmentos de osso quando fraturados; Ele deve se contentar com uma vida muito clara, porque a profissão raramente é remunerada, e é quase invariavelmente mal paga; Ele deve encontrar sua principal recompensa e estímulo no sentido de descoberta e na despacho de espécimes para museus que ele nunca viu em benefício de um público que tem pouco conhecimento ou apreciação dos auto-sacrificos que o caçador de fósseis fez. ' -Henry Fairfield Osborn" #NT!
 dubois.220.g: "Estou esperando um novo esqueleto de dinossauro para nossa coleção - pelo menos." #NT!
  
 dubois.221.t: "EUSTHENOPTERON" #NT!
 dubois.221.d: "O Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] descobriu uma forma rara e pré -histórica de peixes que poderia representar um primeiro passo na transição de animais aquáticos para terrestres." #NT!
 dubois.221.f: "O EUTHENOPTERON é um gênero extinto de peixe -peixe (Sarcopterygii) do Devoniano Superior da América do Norte e Europa. É considerado um excelente exemplo de representantes originais da tetrapodomorfa. Desde que Eusthenopteron possuía um órgão de nimlagem de pulmão e um poderoso esqueleto de barbatana, além das brânquias, poderia ter sido possível se mover brevemente para fora da água. No esqueleto das barbatanas dianteiras, os três ossos da extremidade dos vertebrados terrestres, úmero, ulna e raio, já podem ser diferenciados. As duas barbatanas dorsais pontiagudas foram afastadas, as barbatanas pélvicas e as barbatanas anal de frente para elas." #NT!
 dubois.221.g: "Incrível." #NT!
 dubois.222.t: "Archaeopteryx" #NT!
 dubois.222.d: "Durante uma escavação nas montanhas de calcário da Baviera, perto de Solnhofen, o Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] fez uma descoberta surpreendente que equivalia a uma sensação científica: ele descobriu a ligação que faltava entre répteis e pássaros?" #NT!
 dubois.222.f: ""
 dubois.223.t: "Megatherium" #NT!
 dubois.223.d: "Durante uma investigação paleontológica, a equipe do Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] recuperou ossos que pertenciam a uma preguiça gigante." #NT!
 dubois.223.f: ""
 dubois.224.t: "Ictiossauro" #NT!
 dubois.224.d: "O chefe das escavações paleontológicas relata que ele descobriu um dinossauro que se assemelha a meio peixe, meio golfinho." #NT!
 dubois.224.f: ""
 dubois.225.t: "Smilodon" #NT!
 dubois.225.d: "O Departamento de História Natural pode apontar orgulhosamente para uma descoberta: nosso paleontologista aparentemente encontrou o esqueleto de um tigre de dentes de sabre." #NT!
 dubois.225.f: ""
 dubois.226.t: "Pterodactylus" #NT!
 dubois.226.d: "Os ossos descobertos de um pequeno pterossauro deleite o mundo científico. Eles já foram enviados para a coleção paleontológica." #NT!
 dubois.226.f: ""
 dubois.227.t: "Ichthyostega" #NT!
 dubois.227.d: "Quando o Zeppelin pousou, a expedição no gelo eterno encontrou um fóssil extraordinário que poderia revolucionar a paleontologia. Foi rapidamente enviado ao líder paleontologista do país, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]. Supostamente, é o elo que falta entre peixes e animais terrestres!" #NT!
 dubois.227.f: ""
  
 dubois.301.t: "Destino de expedição botânica" #NT!
 dubois.301.d: "Nosso naturalista, Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], fez os preparativos finais para a partida. Para qual área ele deveria viajar?" #NT!
 dubois.301.f: "Um [concept_dubois_naturalist] pode ser despachado para as florestas tropicais, onde ele procura anualmente novo espécime até ser lembrado de sua posição. Os estados com florestas tropicais são indicadas por um modificador de estado na Amazônia, Congo, Bornéu e Indochina. A maneira mais fácil de obter acesso a uma floresta tropical é controlar o estado associado. No entanto, o acesso também pode ser obtido pacificamente através de licenças botânicas." #NT!
 dubois.301.g: "Para a Amazônia." #NT!
 dubois.301.h: "Para o Congo." #NT!
 dubois.301.i: "Para Bornéu." #NT!
 dubois.301.j: "Para Indochina." #NT!
  
 dubois.302.t: "Victoria Amazonica" #NT!
 dubois.302.d: "Em sua expedição botânica, o Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] encontrou um lírio de água grandioso que é inigualável." #NT!
 dubois.302.f: "A Victoria Amazonica, também conhecida como lírio de água gigante da Amazônia, é uma espécie de planta do gênero de lírios gigantes de água (Victoria) dentro da família da família Lily Lily (Nymphaeaceae). É nativo das águas rasas, como oxbows e Bayous, da bacia amazônica. Foi nomeado em homenagem à rainha britânica Victoria. O pecíolo submerso tem 7 a 8 metros de comprimento. As folhas flutuantes têm uma borda com cerca de 6 cm de altura, que tem duas incisões opostas. Essas incisões garantem que a borda da folha não rasga durante o movimento pesado e que o excesso de água possa escorrer facilmente após fortes chuvas. Na natureza, cada folha atinge um diâmetro de até 3 metros, enquanto as plantas mantidas em jardins botânicos geralmente não excedem um diâmetro foliar de 2 metros." #NT!
 dubois.302.g: "Este espécime se sairá bem em nossa exposição." #NT!
 dubois.302.h: "O espécime deve ser cientificamente catalogado e estudado." #NT!
 dubois.303.t: "Atlas Attacus" #NT!
 dubois.303.d: "Embora em uma expedição que tenha se propôndo apenas a procurar plantas, o Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] não pode ocultar suas inclinações entomológicas quando encontra uma colônia de mariposas espetaculares da floresta tropical." #NT!
 dubois.303.f: "A mariposa do Atlas (Atlas Attacus) é uma borboleta (mariposa) da família de mariposas de pavões (Saturniidae). É uma das maiores borboletas do mundo e recebeu o nome do Atlas Titan da Mitologia Grega. As fêmeas crescem maior que os homens. A seda de Fagara é feita a partir dos casulos da mariposa do Atlas. É marrom claro e muito mais robusto que a seda comum." #NT!
 dubois.304.t: "Amorphophallus titanum" #NT!
 dubois.304.d: "Na Indonésia, o Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] descobriu um gigantesco arum de Titan, provavelmente a maior flor do mundo. O naturalista está encantado, o resto da expedição reclama do cheiro terrível." #NT!
 dubois.304.f: "O gênero Amorphophallus é distribuído com cerca de 200 espécies nas florestas tropicais do Velho Mundo, da Nova Guiné à África Ocidental. A. Titanum produz a maior inflorescência não ramificada no reino vegetal. A flor, com mais de três metros de altura, cheira a carniça, produz calor (até 37 ° C) e, portanto, atrai besouros, que cuidam da polinização. Os espetaculares eventos de floração de Titan Arum são uma grande atração em jardins botânicos em todo o mundo." #NT!
 dubois.305.t: "Golias" #NT!
 dubois.305.d: "A descoberta de um besouro de Golias puxa o Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] brevemente de sua pesquisa botânica." #NT!
 dubois.305.f: "Os besouros do Golias (Goliathus) representam um gênero de besouros da subfamília dos Chafras de Rosa (Cetoniinae). Os besouros do Golias estão entre os maiores insetos da Terra, se medidos em termos de tamanho, volume e peso. Com um peso larval de até 110 gramas, o besouro de Golias é o inseto mais pesado de todos. Os insetos mortos são muito populares entre os colecionadores e buscam preços altos no mercado." #NT!
 dubois.306.t: "Novas espécies de orquídeas" #NT!
 dubois.306.d: "A expedição botânica descobriu e catalogou várias espécies de novas orquídeas profundas na floresta tropical." #NT!
 dubois.306.f: "Nenhuma outra família de plantas tem um espectro de formas e cores de flores como a família Orchid. O tamanho das flores varia de alguns milímetros a 20 centímetros e mais por flor. O espectro de cores varia de branco macio a tons verdes e azuis a tons vermelhos e amarelos fortes. Muitas das flores da orquídea são multicoloridas. Após a família Daisy, as orquídeas são a segunda maior família de plantas com flores. Cerca de 1000 gêneros com 15.000 a 30.000 espécies são reconhecidos pelos botânicos." #NT!
 dubois.306.g: "Mais espécimes nunca doem." #NT!
 dubois.307.t: "Plantas medicinais" #NT!
 dubois.307.d: "A expedição de pesquisa na floresta tropical encontrou algumas ervas incríveis que podem ter usos medicinais." #NT!
 dubois.307.f: "Numerosas substâncias medicinais têm um fundo de ervas - mais da metade para ser preciso. O exemplo mais conhecido é a aspirina e seu ingrediente ativo ácido acetilsalicílico, que é extraído da casca de salgueiros há séculos. Isso contém o ingrediente ativo salicina, que é convertido em ácido salicílico no corpo e desenvolve seu efeito de alívio da dor e redução da febre lá. No século XIX, a aspirina de hoje foi desenvolvida com sucesso a partir de ácido salicílico." #NT!
 dubois.307.g: "Estude as plantas." #NT!
 dubois.307.h: "Coletar as plantas." #NT!
 dubois.308.t: "Flores lindas e desconhecidas" #NT!
 dubois.308.d: "Ao explorar uma parte desconhecida da floresta tropical, a expedição botânica se deparou com inúmeras flores desconhecidas." #NT!
 dubois.308.f: "Apesar de sua beleza, no entanto, o líder da expedição [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] hesita antes de escolhê -los. Os habitantes locais consideram as plantas amaldiçoadas; uma indicação de que eles podem ser venenosos. A idéia é que os ajudantes escolham as plantas em massa, sem considerar as consequências futuras para sua saúde. Certamente, também seria possível para o Prof. §1 pesquisar e coletar as plantas primeiro, mas isso também poderia ter consequências desconhecidas." #NT!
 dubois.308.g: "A tripulação da expedição deve coletar essas flores." #NT!
 dubois.308.h: "O líder da expedição deve coletar essas flores." #NT!
 dubois.308.i: "Não toque nessas flores." #NT!
 dubois.309.t: "Perguntas da oposição Expedição botânica" #NT!
 dubois.309.d: "[SCOPE.sCharacter('dubois_sceptical_leader').GetLastName] considera a expedição botânica um desperdício inútil de dinheiro fiscal que seria melhor em outro lugar. Ele também grita com uma nuvem." #NT!
 dubois.309.f: "Uma expedição aqui, uma expedição lá. Expedições de Zeppelin, expedições do Pacífico, expedições arqueológicas, expedições paleontológicas, expedições zoológicas. Nada além de inchaço inútil! '" #NT!
 dubois.309.g: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está programado para retornar imediatamente." #NT!
 dubois.309.h: "Não faremos com que a ciência seja uma questão política." #NT!
 dubois.310.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] FAIO ILL!" #NT!
 dubois.310.d: "O Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] se envenenou enquanto fazia seu trabalho botânico na floresta tropical. A doença grave o obriga a interromper seu trabalho." #NT!
 dubois.310.f: "Enquanto nosso naturalista estiver doente, ele ficará preso na expedição botânica e não pode ser lembrada. Ele não enviará de volta novos espécimes enquanto está doente." #NT!
 dubois.310.g: "Preocupante." #NT!
 dubois.311.t: "Sementes exóticas" #NT!
 dubois.311.d: "Durante a expedição botânica, o Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] encontrou algumas sementes especiais que são de grande interesse científico e agrícola." #NT!
 dubois.311.f: "A troca de culturas entre diferentes partes do mundo já era normal no início do período moderno. Por exemplo, a cana -de -açúcar da região do Mediterrâneo foi cultivada extensivamente na América do Sul. Por outro lado, o britânico Henry Wickham contrabandeou sementes de borracha do Brasil para a Ásia em 1876." #NT!
 dubois.311.g: "As sementes se sairão bem na coleção científica." #NT!
 dubois.311.h: "As novas sementes devem ser usadas na agricultura." #NT!
  
 dubois.411.t: "Alpinistas queriam" #NT!
 dubois.411.d: "Alguns escaladores experientes e homens corajosos já foram recrutados para participar da ousada tentativa de cúpula. A questão permanece sobre qual líder confiamos a essa empresa." #NT!
 dubois.411.f: "A seleção do líder da expedição é de importância crucial para o bem -estar e a aflição da viagem de montanha. Em montanhas baixas, suas habilidades não são particularmente em demanda, mas de uma altitude de 3.000 metros o mais tardar, depende muito das habilidades e características do líder. Alpinistas, exploradores e comandantes com experiência na montanha são tão úteis quanto coragem, persistência e meticulosidade. Saúde fraca e a velhice, por sua vez, têm o efeito oposto." #NT!
 dubois.411.g: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_1').GetFullName]." #NT!
 dubois.411.h: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_2').GetFullName]." #NT!
 dubois.411.i: "[SCOPE.sCharacter('dubois_mountain_expedition_leader_3').GetFullName]." #NT!
 dubois.412.t: "O cume como uma meta" #NT!
 dubois.412.d: "A equipe da subida ao cume foi montada. Mas agora surge a questão: qual montanha a trupe deve subir sob [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName]? Existem vários estados que podemos escolher." #NT!
 dubois.412.f: "Existem até três possíveis cadeias de montanhas para escolher. Suas alturas e dificuldades diferem. Montanhas menos de 3.000 metros - como as terras altas escocesas e as montanhas Apalaches - são consideradas montanhas fáceis que podem ser conquistadas em algumas etapas e sem grandes perigos. Os Alpes, Pirineus e Montanhas Rochosas, por outro lado, são mais difíceis de dominar e levar mais tempo. Montanhas acima de 5.000 metros são consideradas desafios, e o Himalaia normalmente não será gerenciável nessa época." #NT!
 dubois.412.g: "[SCOPE.sState('dubois_summit_1').GetName]." #NT!
 dubois.412.h: "[SCOPE.sState('dubois_summit_2').GetName]." #NT!
 dubois.412.i: "[SCOPE.sState('dubois_summit_3').GetName]." #NT!
 dubois.413.t: "Companheiro científico" #NT!
 dubois.413.d: "Escalar um pico anteriormente desconhecido também tem seu apelo à ciência. Geólogos, naturalistas e paleontologistas são companheiros científicos em potencial." #NT!
 dubois.413.f: "Os geólogos, em particular, podem reunir inúmeras novas descobertas para as expedições de ciências nas montanhas. Os naturalistas estudam flora e fauna e coletam espécimes; Os paleontologistas podem coletar fósseis, mas o rendimento permanece bastante pequeno." #NT!
 dubois.413.g: "Um cientista não é necessário." #NT!
 dubois.413.h: "Um geólogo como [SCOPE.sCharacter('dubois_geologist_scope').GetFullName] seria a melhor escolha." #NT!
 dubois.413.i: "Nosso [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] naturalista será útil." #NT!
 dubois.413.j: "Ligue para o nosso paleontologista, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]." #NT!
 dubois.414.t: "Em até a montanha!" #NT!
 dubois.414.d: "Os alpinistas, liderados por [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName], chegaram à cordilheira em [SCOPE.sState('dubois_summit_location').GetName] e estão começando a se preparar para a subida." #NT!
 dubois.414.f: "'Por que você queria escalar o Monte Everest?' Esta pergunta foi feita por George Leigh Mallory, que estava com as duas expedições em direção ao cume da montanha mais alta do mundo, em 1921 e 1922, e que agora está em Nova York. Ele planeja ir novamente em 1924 e deu como motivo para persistir nessas repetidas tentativas de chegar ao topo: 'Porque está lá'." #NT!
 dubois.414.g: "As montanhas estão ligando e eu devo ir." #NT!
  
 dubois.420.t: "O cume" #NT!
 dubois.420.d: "Após uma árdua ascensão, o grupo de alpinistas finalmente chega ao cume. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] é o primeiro homem a invadir este ponto na Terra para [ROOT.GetCountry.GetNameNoFormatting]. Agora não resta mais nada além de saborear esse momento de triunfo." #NT!
 dubois.420.f: "A primeira pergunta que você fará e qual devo tentar responder é: 'Qual é a utilidade de escalar o Monte Everest?' E minha resposta deve ser imediatamente: 'Não adianta'. Não há a menor perspectiva de qualquer ganho. Mas, caso contrário, nada virá disso. Não traremos de volta um único pedaço de ouro ou prata, nem uma jóia, nem qualquer carvão ou ferro. Não encontraremos um único pé de terra que possa ser plantado com colheitas para criar alimentos. Não adianta. O que obtemos dessa aventura é apenas pura alegria. \ N \ Nand Joy é, afinal, o fim da vida. Não vivemos para comer e ganhar dinheiro. Comemos e ganhamos dinheiro para poder aproveitar a vida. É isso que a vida significa e para que serve a vida. 'George Leigh Mallory" #NT!
 dubois.420.g: "Vamos aproveitar o amanhecer!" #NT!
 dubois.421.t: "Desastre de montanhismo!" #NT!
 dubois.421.d: "Ao subir as montanhas em [SCOPE.sState('dubois_summit_location').GetName], [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] cometeu um erro terrível, que encerrou a expedição em uma catástrofe - várias pessoas morreram, provisões e equipamentos caíram com eles. A nação inteira está em choque!" #NT!
 dubois.421.f: "'Todas as noites, você entende, eu vejo meus camaradas do Matterhorn escorregando de costas, os braços estendidos, um após o outro, em perfeita ordem a distâncias iguais - cutucam o guia, primeiro, depois Hadow, depois Hudson e, finalmente, Douglas. Sim, sempre os verei ... 'Edward Whymper" #NT!
 dubois.421.g: "Uma tragédia!" #NT!
 dubois.422.t: "Subir abortado" #NT!
 dubois.422.d: "A tentativa de atingir o pico mais alto em [SCOPE.sState('dubois_summit_location').GetName] falhou por enquanto. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] é forçado a abandonar o empreendimento e o retorno." #NT!
 dubois.422.f: "Pode haver várias razões pelas quais um alpinista abandona a subida. Às vezes, uma mudança no clima é suficiente; Às vezes, um suposto acesso ao cume acaba sendo muito traiçoeiro. Uma ascensão geralmente leva muito tempo e excede uma janela de tempo, porque certos momentos do dia e as mudanças dificultam ou impossíveis a subida. E às vezes você simplesmente escolhe o caminho errado." #NT!
 dubois.422.g: "Decepcionante." #NT!
 dubois.423.t: "Tropas da montanha" #NT!
 dubois.423.d: "Devido à sua impressionante experiência na conquista das montanhas e na defesa das montanhas, [SCOPE.sCharacter('dubois_mountain_veteran').GetFullName] decidiu usar suas habilidades superiores para criar uma unidade de elite de tropas de montanha." #NT!
 dubois.423.f: "Os Gebirgsjäger, os Alpini ou os Alpins de Chasses são apenas alguns exemplos de tropas de elite de alguns países se especializaram em guerra às alturas. Fundada em 1872, os Alpini são a mais antiga infantaria ativa do mundo. Sua missão original era proteger a fronteira da Itália com a França e a Áustria-Hungria." #NT!
 dubois.423.g: "Eles levarão seu legado para o futuro." #NT!
 dubois.424.t: "Uma sinfonia da montanha" #NT!
 dubois.424.d: "Inspirado pelo recente sucesso de nossa trupe de montanhismo, nosso compositor anunciou que deseja escrever um grande trabalho musical sobre as montanhas e a luta do homem contra a natureza. O mundo da música já está de acordo de que este será um trabalho importante." #NT!
 dubois.424.f: "Uma Sinfonia Alpina OP. 64 é um poema sinfônico do compositor Richard Strauss, que foi realizado pela primeira vez em 1915. O trabalho é baseado no conceito do compositor de usar meios musicais para descrever a subida de um pico alpino e o retorno ao vale em um dia. A idéia do programa remonta a uma experiência da infância de Strauss. No verão de 1879, ele perdeu o pé no Heimgarten nos Alpes da Baviera e foi pego em uma tempestade. No dia seguinte, ele apresentou este evento no piano. A partir dessa memória, ele desenvolveu o conceito. Foi a intenção declarada do compositor de permitir que o ouvinte experimente os palcos de uma caminhada de montanha como uma pintura de som de uma maneira imediatamente sensual. Segundo muitos críticos de música, o trabalho atinge esse objetivo de uma maneira impressionante." #NT!
 dubois.424.g: "Espero que não haja alpenhorns nele." #NT!
  
 dubois.430.t: "Uma subida fácil" #NT!
 dubois.430.d: "A equipe de montanhismo está fazendo um progresso fácil no nível mais baixo da cordilheira em [SCOPE.sState('dubois_summit_location').GetName]. Não há ocorrências notáveis." #NT!
 dubois.430.f: "'Ele tem sorte que, na maré total da vida, experimentou uma medida do ambiente ativo que mais deseja. Nestes dias de agitação e mudanças violentas, quando os valores básicos de hoje são os sonhos vãos e destruídos de amanhã, há muito a ser dito para uma filosofia que visa viver uma vida plena enquanto a oportunidade oferece. Existem poucos tesouros de valor mais duradouro do que a experiência de um modo de vida que é totalmente satisfatório. Afinal, tais são as únicas posses das quais nenhum destino, nenhuma catástrofe cósmica pode nos privar; Nada pode alterar o fato se, por um momento, na eternidade, realmente vivemos. -ERIET Shipton" #NT!
 dubois.430.g: "Vá em frente!" #NT!
 dubois.431.t: "Uma ladeira" #NT!
 dubois.431.d: "[SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] viu uma pequena inclinação nas montanhas, mas isso não deve representar um grande problema para os alpinistas." #NT!
 dubois.431.f: "Quanto mais alta uma equipe de montanhismo sobe, maiores os desafios. Uma inclinação pode ser um obstáculo inicial, mas não deve ser um problema para uma expedição moderadamente bem equipada." #NT!
 dubois.431.g: "A equipe vai dominar isso." #NT!
 dubois.431.h: "Isso é muito arriscado." #NT!
 dubois.432.t: "Parede íngreme" #NT!
 dubois.432.d: "Um penhasco apresenta um grande obstáculo para os escaladores em sua caminhada até o cume, mas [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] está confiante de que ele dominará essa tarefa." #NT!
 dubois.432.f: "De montanhas com uma altitude de 2.000 metros, o grupo de montanhismo pode encontrar penhascos. Para montanhas baixas, elas são o último obstáculo antes do cume, mas em muitos casos é mais um programa de aquecimento. A partir daqui, uma caminhada normal da montanha difere de uma escalada real da montanha." #NT!
 dubois.433.t: "Avalanche!" #NT!
 dubois.433.d: "Uma avalanche perigosa se soltou nas alturas de [SCOPE.sState('dubois_summit_location').GetName], ameaçando o empreendimento de montanhismo. Com os detritos agora ameaçando a rota direta, encontrar uma rota alternativa pode ser mais segura, mas custa um tempo valioso. Alguns alpinistas sugerem a espera - o que inclui a possibilidade de que a trilha possa se tornar mais bloqueada." #NT!
 dubois.433.f: "As avalanches ocorrem a partir de alturas cobertas de neve e têm sido um perigo para todos que viviam nas montanhas desde o tempo imemorial - não apenas os resumos. Sua natureza traiçoeira já levou muitos a suas mortes. A partir de agora, o trigo é separado da palha." #NT!
 dubois.433.g: "Isso não pode sacudir um alpinista." #NT!
 dubois.433.h: "Pesquise uma rota alternativa." #NT!
 dubois.434.t: "Abismo" #NT!
 dubois.434.d: "Um desfiladeiro perigoso se abre na frente de [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] quando ele atingiu a última formação rochosa. O obstáculo aparentemente intransponível representa um desafio para os alpinistas." #NT!
 dubois.434.f: "O alpinismo é a arte de escalar montanhas, enfrentando os maiores perigos com a maior prudência. A arte é usada aqui para significar a realização do conhecimento em ação. Você nem sempre pode ficar no cume. Você tem que descer novamente. Então, qual é o ponto? Só isso: o que está acima sabe o que está abaixo, o que está abaixo não sabe o que está acima. Uma subida, uma vê. Um desce, não se vê mais, mas um viu. Ao subir, observe todas as dificuldades ao longo do seu caminho. Durante a descida, você não os verá mais, mas saberá que eles estão lá se tiver observado com cuidado. -René Daumal" #NT!
 dubois.435.t: "Mudança climática" #NT!
 dubois.435.d: "Uma mudança no clima nas montanhas de [SCOPE.sState('dubois_summit_location').GetName] apresenta alpinistas com um problema com risco de vida. Ainda há uma janela de oportunidade para alcançar um local mais protegido em altitudes mais altas, mas é um empreendimento perigoso. Os alpinistas encontrariam abrigo seguro no acampamento base - mas isso arruinaria o progresso dos últimos dias, se não semanas." #NT!
 dubois.435.f: "As mudanças climáticas nas montanhas podem ser um dos eventos mais ameaçadores que podem acontecer em um passeio na montanha. Isso se aplica à chuva, tempestades e neve. Particularmente nas altitudes mais altas, uma queda de neve repentina pode significar que uma tentativa de cume deve ser abortada porque os elementos imprevisíveis podem terminar em uma tragédia." #NT!
 dubois.435.h: "De volta ao último acampamento!" #NT!
 dubois.436.t: "Passo da morte" #NT!
 dubois.436.d: "Pouco antes da cúpula, [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] é confrontado com um último desafio final: um penhasco que se eleva quase verticalmente à sua frente decide a vitória ou derrota. Os alpinistas já estão rurando que esta é uma armadilha da morte; ou um passo de morte." #NT!
 dubois.436.f: "Depois de uma hora, chegamos ao pé do problema de aparência mais formidável da cordilheira - um passo de rocha com cerca de 4 metros de altura. Percebemos que, nessa altitude, isso poderia soletrar a diferença entre sucesso e fracasso. A rocha em si, suave e quase sem retenção, pode ter sido um problema interessante de domingo à tarde para um grupo de escaladores de rock especializados no Lake District, mas aqui estava uma barreira além da nossa fraca força a ser superada. Não pude ver como girá -lo no íngreme penhasco de rock a oeste, mas felizmente outra possibilidade de enfrentá -lo ainda permanecia. No lado leste, havia outra grande cornija, e subir os quarenta pés do degrau havia uma rachadura estreita entre a cornija e a rocha. Deixando tenzing para me parecer da melhor maneira possível, eu atolei a essa rachadura e depois chutando para trás com meus grampos, afundei seus espinhos profundamente na neve congelada atrás de mim e me alavancou do chão. Aproveitando todas as pequenas rochas e toda a força do joelho, ombro e braços que eu podia reunir, literalmente apertei para trás a rachadura, com uma oração fervorosa para que a cornija permanecesse presa à rocha. -Edmund Hillary" #NT!
 dubois.437.t: "Falta de oxigênio" #NT!
 dubois.437.d: "As alturas incomuns de § 0 levam os alpinistas aos seus limites. A falta de oxigênio ameaça a ascensão ao cume." #NT!
 dubois.437.f: "Em montanhas altas, a pressão atmosférica é menor e isso significa que menos oxigênio está disponível para respirar. Esta é a causa subjacente da doença da altitude. Todo mundo precisa se acostumar, até os alpinistas excepcionais que já estiveram em alta altitude antes. De um modo geral, os alpinistas começam a usar oxigênio engarrafado quando escalam acima de 7.000 m. Montanhistas excepcionais subiram picos de 8000 metros (incluindo o Everest) sem oxigênio, quase sempre com um programa de aclimatação cuidadosamente planejado." #NT!
 dubois.437.g: "É bom que tenhamos nossas garrafas de oxigênio conosco." #NT!
 dubois.437.h: "Cancelar a expedição antes que pior aconteça." #NT!
 dubois.438.t: "Ferimentos graves" #NT!
 dubois.438.d: "Um grupo de retardatários caiu enquanto escalava a última face da rocha e sofreu ferimentos graves. [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] deve decidir como proceder." #NT!
 dubois.438.f: "Montanhistas enfrentam uma variedade de riscos. Ao escalar montanhas, existem dois tipos de riscos, objetivos (baseados na montanha) e subjetivos (baseados em humanos). Os riscos subjetivos referem -se ao mau julgamento de um alpinista, planejamento ruim, falta de habilidades, análise e conclusões defeituosas ou condicionamento inadequado. De 1947 a 2018, nos Estados Unidos, 2.799 pessoas estavam envolvidas em acidentes de montanhismo e 43% desses acidentes resultaram em morte." #NT!
 dubois.438.g: "Bom que temos equipamentos médicos modernos." #NT!
 dubois.438.h: "Esperamos até que eles se recuperem." #NT!
 dubois.439.t: "Equipe de corda" #NT!
 dubois.439.d: "Para garantir uma subida, os alpinistas devem formar um grupo de corda. A inclinação parece tudo menos segura. O empreendimento requer um planejamento cuidadoso." #NT!
 dubois.439.f: "O termo equipe de corda vem originalmente dos esportes da montanha, especialmente escalando, e refere -se a um grupo de pessoas conectadas por uma montanha ou corda de escalada e, assim, garantido contra a queda. Ao usar uma corda de segurança compartilhada, uma equipe de corda oferece a seus membros proteção mútua contra quedas. Ao mesmo tempo, uma equipe de corda também forma uma comunidade de perigos, porque, sob condições desfavoráveis, uma queda por um único membro pode levar a equipe inteira de corda a cair." #NT!
 dubois.439.g: "Bom que temos organização moderna." #NT!
 dubois.440.t: "Ciência da montanha" #NT!
 dubois.440.d: "As alturas desconhecidas de [SCOPE.sState('dubois_summit_location').GetName] oferecem [SCOPE.sCharacter('dubois_mountain_scientist').GetFullName] uma gama inteira de novas idéias, que ele coleciona e escreve durante o passeio na montanha." #NT!
 dubois.440.f: "Os cientistas frequentemente estudavam a flora e a fauna incomuns da área nos estágios iniciais das expedições de montanhas. As investigações geológicas eram de particular interesse - não apenas por razões científicas gerais, mas também muitas vezes para simplificar escaladas futuras." #NT!
 dubois.440.g: "Para a ciência!" #NT!
 dubois.441.t: "Um animal perdido" #NT!
 dubois.441.d: "No nível mais baixo do Himalaia, nosso naturalista [SCOPE.sCharacter('dubois_mountain_scientist').GetFullName] fez uma descoberta estranha: um animal único e abandonado percorre lá, atingido pela fome e frio." #NT!
 dubois.441.f: "Era uma visão estranha para o professor [SCOPE.sCharacter('dubois_mountain_scientist').GetLastName] encontrar uma criatura tão pequena e terna, que se dizia morar nas florestas de bambu do Nepal, neste terreno deserto. Ele conhecia ilustrações dos livros e sabia que os moradores moravam nas florestas mais próximas; Mas como um único animal poderia chegar aqui? Nessa distância? Sem comida? Permaneceu um mistério. O pequeno panda vermelho também pegou o bug de montanhismo? Ou ele fugiu de predadores? Seja como for, o naturalista cuida dos animais exaustos e os enfermes de volta à saúde. Uma visão que o [SCOPE.sCharacter('dubois_mountain_expedition_leader').GetFullName] não gosta: ele vê a subida da montanha ameaçada por esse sentimentalismo zoológico. Acordo que o assistente de pesquisa levará o panda vermelho para o acampamento base - e a partir daí preparará sua jornada para o zoológico local." #NT!
 dubois.441.g: "Este é o lendário 43º animal?" #NT!
  
