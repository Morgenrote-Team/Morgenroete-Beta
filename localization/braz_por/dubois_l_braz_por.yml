 dubois.2171.t: "Seção de esqueleto geral" #NT!
 dubois.2171.d: "Qual esqueleto para visitar?" #NT!
 dubois.2171.f: "Alguns esqueletos podem ser encontrados em todo o mundo. A maioria deles eram dinossauros marinhos ou outras outras criaturas dos mares." #NT!
 dubois.2171.g: "Mosasaurus." #NT!
  
 dubois.2172.t: "Mosasaurus" #NT!
 dubois.2172.f: "Mosasasaurus não é de fato não um dinossauro, mas um réptil marinho. Eles moravam nos oceanos do Cretáceo. Existem muitas espécies diferentes de mosasauro que se adaptaram a várias regiões. Muitos deles eram predadores de ápice e peixes caçados, tubarões e outros dinossauros e répteis marinhos." #NT!
 dubois.2172.h: "Retornar para a coleção geral" #NT!

