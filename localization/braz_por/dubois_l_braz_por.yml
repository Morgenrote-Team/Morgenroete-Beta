 dubois_invented_evolution_theory_loc: "\ Nenhuma das maiores conquistas foi o livro "#o sobre a origem das espécies §2, que descreveu a teoria da evolução pela primeira vez." #NT!
 dubois_attended_hippocampus_congress_loc: "\ nd. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] participou do debate que determinou se o humano era único ou apenas um animal como todos os outros." #NT!
 dubois_naturalist_showed_evolution_in_peppered_moths_loc: "\ nProfessor [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] mostrou que a mariposa apimentada #o evolui para se adaptar ao seu ambiente em mudança. Uma prova para a teoria da evolução." #NT!
 dubois_naturalist_finished_pacific_expedition_loc: "\ não uma expedição #o ao Oceano Pacífico_1 Dr. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] Explorou extensivamente a flora e a fauna deste país das maravilhas. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetSheHe] descobriu muitas novas espécies." #NT!
 dubois_wallace_line_discovered_loc: "\ Nesse que viajava no Pacífico [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastName] notou uma separação clara entre a flora asiática e a Australiana e a fauna _2 Esta descoberta apóia a teoria da evolução e sugere uma separação maciça das ilhas no passado." #NT!
 dubois_naturalist_inaugurated_zoo_loc: "\ n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] foi instrumental na abertura #o do zoo#!. Um lugar onde animais de lugares distantes podem ser vistos de perto." #NT!
 dubois_naturalist_total_zoo_animals_loc: "\ Nduring [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetHerHis] Possui como naturalista, um total de [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('dubois_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] foi capturado e levado para [GetPlayer.MakeScope.GetCountry.GetName]." #NT!
 dubois_naturalist_found_victoria_amazonica_loc: "\ Não uma expedição botânica para a floresta amazônica, o professor [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] encontrou um #o gigante aquático §2 Uma planta única que pode cultivar folhas com um diâmetro de até 3 metros." #NT!
 dubois_naturalist_found_attacus_atlas_loc: "\ nd. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] Encontrou um #o MOTHA TITÍNIDO Durante uma Expedição Botâmica na Indochina. É uma das maiores borboletas do mundo e produz uma seda muito robusta." #NT!
 dubois_naturalist_found_amorphophallus_titanum_loc: "Naquela época, explorando Bornéu durante uma expedição botânica, o professor [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] encontrou um #o FLORES ENORME FLORENTEL_2 que cresce até 3 metros de altura. Um verdadeiro milagre botânico." #NT!
 dubois_naturalist_found_goliathus_loc: "O Congo Rainfrests abriga muitas maravilhas. Um deles foi descoberto pelo Dr. [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] em uma expedição botânica. O #o Golias Beetle#! é um dos maiores insetos do mundo e aparentemente bastante raro." #NT!
  
