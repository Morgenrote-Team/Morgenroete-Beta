 je_dubois_paleontological_expedition_reason: "O paleontologista está conduzindo um [concept_dubois_paleontological_expedition]. \ N$mr_divider_for_je$ \ nfinishing the Expedition levará 12 meses. Uma vez concluído, você ganhará [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] e [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')], dependendo do valor #V succcess#! da expedição. \ N$mr_divider_for_je$ \ neita mês Uma pequena quantidade de #V de sucesso acidente de sucesso é adicionada. Além disso, os eventos aleatórios podem adicionar ou subtrair o sucesso. \ N \ nCurrent estimado Mensal Alteração do Sucesso: #underline $mr_divider_for_je$0 $mr_divider_for_je$1 #!#! (Máximo: 1) \ n$mr_divider_for_je$ \ nvó poderá configurar um $mr_divider_for_je$4 se você tiver um $mr_divider_for_je$5 gratuito. Uma escavação produzirá passivamente mais fósseis e ossos. \ N$mr_divider_for_je$ \ nCurrent $mr_divider_for_je$7 #underline $mr_divider_for_je$9 Conducimento estimado #!#!#! da expedição: \ n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]1" #NT!
