 dubois.251.t: "Ossos humanos desconhecidos"
 dubois.251.d: "Durante sua pesquisa paleontológica, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] encontrou ossos humanos desde os tempos pré -históricos. Eles provavelmente têm dezenas de milhares de anos. Ele enviou os ossos com segurança para que um profissional pudesse cuidar deles."
 dubois.251.f: "Para o espanto do paleontologista, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] encontrou os restos de um esqueleto humano em uma camada superior de rocha. No entanto, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] não conseguiu reconstruir as conexões. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] possui conhecimento paleo-antropológico rudimentar, mas não deseja dar uma opinião, pois isso pode influenciar o resultado científico."
 dubois_add_fossil_java_tt: "Ganho #G 1#! @dubois_human_fossil! #O Fossile humano especial: Homem Java."
 dubois_add_fossil_neanderthaler_tt: "Ganho #G 1#! @dubois_human_fossil! #O Fossile humano especial: Neanderthaler."
 dubois_add_fossil_taung_tt: "Ganho #G 1#! @dubois_human_fossil! #O Fossile humano especial: Criança Taung."
 dubois_add_fossil_peking_tt: "Ganho #G 1#! @dubois_human_fossil! #O Fossile humano especial: Pequim."
 dubois_add_fossil_cromagnon_tt: "Ganho #G 1#! @dubois_human_fossil! #O Fossile humano especial: Cro-Magnon Man."
 dubois_add_fossil_piltdown_tt: "Ganho #G 1#! @dubois_human_fossil! #O Fossile humano especial: Piltdown Man."
 dubois.901.t: "Congresso naturalista: lugar do homem na natureza"
 dubois.901.d: "Os preparativos para o que é possivelmente o congresso científico mais importante dos anos passados ​​e futuros foram concluídos. É nada menos que a classificação taxonômica dos seres humanos - um dos tópicos mais aquecidos de todos após a criação da teoria da evolução de [SCOPE.sCharacter('dubois_darwin_scope').GetFullName]. Os convites serão enviados a todos os naturalistas do mundo. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] presidirá a sessão."
 dubois.901.f: "No decorrer do século XIX, a disputa sobre a classificação taxonômica dos seres humanos veio à tona em conexão com a formulação da teoria da evolução. Embora se saiba há muito tempo que os humanos eram semelhantes aos grandes macacos, e Carl Linnaeus já os havia colocado na ordem dos primatas, havia várias reservas. Para enfatizar a singularidade dos seres humanos, Johann Friedrich Blumenbach o distinguiu de todos os outros primatas como \"duas mãos\" (Bimana) de \"quatro mãos\" (quadrumana). Essa classificação, embora bastante recente, ganhou popularidade nos círculos acadêmicos, como o influente paleontólogo britânico Richard Owen. Para os apoiadores da teoria da evolução, essa era uma situação insustentável e, para os anatomistas, um horror - significava que, de acordo com essa ordem, um gorila estava mais próximo de um babuíno do que um ser humano."
 dubois.901.g: "O mundo da ciência deve ser nosso convidado."
 dubois.902.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] convidou para um Congresso Internacional de Ciências. O tópico será a classificação taxonômica dos seres humanos à luz da teoria da evolução. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] recebeu um convite caloroso."
 dubois.902.g: "Não vamos perder este evento."
 dubois.904.t: "O Lugar do Homem na Natureza: Único ou Apenas Mais um Macaco?"
 dubois.904.d: "Depois de apenas duas palestras, ficou claro o quão competitivo é essencialmente um processo administrativo na zoologia. Até as amizades acadêmicas são divididas sobre a questão de como as pessoas devem ser classificadas. Aparentemente, não é mais a questão científica como tal que ganhou vantagem, mas as implicações associadas."
 dubois.904.f: "Depois que os elementos morfológicos foram trazidos para o campo, o debate veio à cabeça em um aspecto particular da anatomia: o cérebro. [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetFullName] apresentou vários artigos sobre as diferenças anatômicas entre macacos e humanos, enfatizando a impossibilidade de os macacos serem transmutados em homens. Ele afirmou que os seres humanos não eram apenas uma ordem biológica distinta de primatas, mas uma subclasse separada de mamíferos, distinta de todos os outros primatas e mamíferos em geral. O Prof. [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetLastName] baseou essa classificação em três características, sendo o mais importante que a afirmação de que apenas o cérebro humano tem um hipocampo menor. Isso foi combatido por [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetFullName], que insistiu que essas características supostamente únicas pudessem ser encontradas em grandes macacos. Quando perguntado se ele poderia viver com a idéia de ser apenas um macaco modificado, o Prof. [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetLastName] respondeu: 'É tão respeitável ser um macaco modificado como sujeira modificada'."
 dubois.904.g: "O homem é único no reino animal."
 dubois.904.h: "Os seres humanos estão mais intimamente relacionados aos macacos do que se pensava anteriormente."
 dubois.905.t: "Discurso respeitado"
 dubois.905.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] deu uma palestra à equipe científica reunida em [SCOPE.sCountry('dubois_congress_host_country').GetName] que inspirou o público e os jovens acadêmicos."
 dubois.905.f: "'Diz owen, você pode ver o cérebro de chimpanzé \ nis sempre extremamente pequeno, com a extremidade do extremidade mais permanente. erros não poucos."
 dubois.905.g: "Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] causa uma impressão considerável."
 dubois.906.t: "Contribuição valiosa para o debate"
 dubois.906.d: "Uma brilhante palestra científica do Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ampliou os horizontes do mundo acadêmico no Congresso de Ciências em [SCOPE.sCountry('dubois_congress_host_country').GetName]. Provavelmente terá um efeito duradouro."
 dubois.906.f: "Ele manteve teorias muito estranhas sobre muitas coisas boas. Ele até acordou uma vez na Associação Britânica e declarou que os macacos tinham majors de hipopótamo em seus cérebros, assim como os homens. O que foi uma coisa chocante a dizer; Pois, se fosse assim, o que seria da fé, esperança e caridade de milhões imortais? Você pode pensar que existem outras diferenças mais importantes entre você e um macaco, como ser capaz de falar, fazer máquinas, e saber o certo do errado, e fazer suas orações e outros pequenos assuntos desse tipo; Mas isso é chique de uma criança, minha querida. Nada deve depender, exceto o grande teste de hipopótamo. Se você tem um major de hipopótamo em seu cérebro, não é um macaco, embora tivesse quatro mãos, sem pés e fosse mais apish do que os macacos de todas as aberras. -Charles Kingsley"
 dubois.907.t: "A pergunta do hipopótamo"
 dubois.907.d: "O debate sobre o papel dos seres humanos no reino animal já recebeu atenção pública generalizada - de uma maneira que não é exatamente lisonjeira. O escritor [SCOPE.sCharacter('dubois_hippopotamus_writer').GetLastName] já zomba da disputa acadêmica em uma obra."
 dubois.907.f: "“Ficamos muito satisfeitos, e posso dizer, bastante interessado em descobrir que tínhamos todos os hipopótamos em nossos cérebros. Certamente, nunca senti um no meu; Mas talvez esteja morto e, portanto, não se mexeu, e então, é claro, isso não conta, você sabe. Todo mundo tem cérebro em sua cabeça, a menos que ele seja um esqueleto; E enrolou suas coisas em volta de coisas como um macaco, que eu sei, pois vi com meus próprios olhos. Foi o professor Huxley disse que estava em seu rabo - não o de Huxley, é claro, mas os macacos: apenas os macacos não têm caudas, então eu não vejo isso. E então o outro cavalheiro que se levantou pela última vez, Sr. Flower, você sabe, ele disse que estava por todo o macaco, em todos os lugares. Todos os hipocampos, da cabeça aos pés, a pobre besta, como um cachorro por toda parte! Eu me pergunto por que eles não esfregam o Bluestone na parte de trás do pescoço, como se faz com um ponteiro. Bem, então. Onde eu estava? Oh! E o professor Owen disse que não estava em macacos: mas apenas na ordem Bimana, é você e eu. Bem, ele sabe melhor. E todos eles também sabem melhor, pois são monstruosos companheiros inteligentes. Então, é preciso estar certo, e todo o resto errado, ou então um deles errado, e todo o resto certo - você vê isso? Eu me pergunto por que eles não jogam sobre isso. -Charles Kingsley"
 dubois.907.g: "Isso é hilário."
 dubois.908.t: "Troca intelectual ou material"
 dubois.908.d: "Nosso naturalista ganhou algum tempo livre à margem do Congresso e agora está pensando em como ele deve usá -lo melhor."
 dubois.908.f: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] conheceu alguns colegas interessantes do Congresso de Ciências que gostariam de trocar idéias sobre alguns tópicos científicos. Uma troca de experiências seria extremamente proveitosa. Por outro lado, o professor também poderia usar seu tempo para trocar algumas coleções de besouros e plantas com outros colegas ..."
 dubois.908.g: "Trocar idéias com colegas."
 dubois.908.h: "Troca de amostras com colegas."
 dubois.909.t_unique: "O homem é único"
 dubois.909.t_primate: "Homem e macacos estão relacionados"
 dubois.909.d_unique: "Os naturalistas resolveram seus longos debates. Os seres humanos têm uma posição especial no Reino Animal - é isso que os acadêmicos declararam em uma declaração final, que o presidente do Congresso lia cerimoniosamente hoje."
 dubois.909.d_primate: "Alguns professores deixaram o salão com raiva quando o Congresso concluiu e a declaração final foi lida. Os seres humanos, segundo os acadêmicos, estão mais intimamente relacionados a macacos do que se acreditava anteriormente."
 dubois.909.f_unique: "'No homem, o cérebro apresenta uma etapa ascastada no desenvolvimento, mais alta e mais fortemente marcada do que aquela pela qual a subclasse anterior foi distinguida daquele abaixo dele. Não apenas os hemisférios cerebrais se sobrepõem aos lobos olfativos e cerebelo, mas também se estendem antes de um e mais atrás do que o outro. Seu desenvolvimento posterior é tão marcado que os anatomistas atribuíram a essa parte o caráter de um terceiro lobo; É peculiar ao gênero Homo, e igualmente peculiar é o 'chifre posterior do ventrículo lateral' e o 'hipocampo menor', que caracteriza o lobo traseiro de cada hemisfério. A substância cinzenta superficial do cérebro, através do número e profundidade das convoluções, atinge seu máximo de extensão no homem. Os poderes mentais peculiares estão associados a essa forma mais alta de cérebro, e suas consequências ilustram maravilhosamente o valor do caráter cerebral; De acordo com a minha estimativa, sou levado a considerar o gênero Homo, como não apenas um representante de uma ordem distinta, mas de uma subclasse distinta da mamífera, para a qual proponho um nome de 'arquincephala'. -Richard Owen"
 dubois.909.f_primate: "“É certo que o macaco que quase se aproxima do homem é o chimpanzé ou o gorila. Nas proporções gerais do corpo e dos membros, há uma diferença notável entre o gorila e o homem em qualquer proporção que o gorila difere do homem, os outros macacos partem ainda mais amplamente do gorila e que, consequentemente, essas diferenças de proporção não podem ter valor ordinal. Na importante questão da capacidade craniana, os homens diferem mais amplamente um do outro do que dos macacos; Enquanto os macacos mais baixos diferem tanto, na proporção, do mais alto, como o último faz do homem. Portanto, é óbvio que, como a dentição do macaco mais alto difere do homem, difere muito mais amplamente do dos macacos inferiores e mais baixos. Assim, qualquer que seja o sistema de órgãos, a comparação de suas modificações na série APE leva a um e o mesmo resultado - que as diferenças estruturais que separam o homem do gorila e do chimpanzé não são tão grandes quanto aquelas que separam o gorilla dos macacos inferiores. ' -Thomas Henry Huxley"
 dubois.909.g: "O homem é a coroa da criação."
 dubois.909.h: "Somos apenas macacos sem pêlos?"
 dubois.911.t: "Congresso Antropológico: Origem dos humanos modernos"
 dubois.911.d: "Nosso país sediará o Congresso mais importante na história da antropologia. Uma das grandes questões da humanidade, a saber, a de sua origem, deve ser esclarecida. Os antropólogos de todo o mundo discutirão se isso aconteceu na Europa, Ásia ou África. [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] liderará o debate."
 dubois.911.f: "De onde vem o homem? A história bíblica sobre a expulsão do paraíso já contém o núcleo dessa questão - ele obviamente não vem da região em que vive hoje. Consequentemente, durante muito tempo na Europa, pensava -se que os ossos humanos antigos eram os restos mortais das pessoas que morreram na grande inundação - assim como os dinossauros se pensavam há muito tempo como animais que não tinham lugar na arca. Com a postulação da teoria da Idade do Gelo e subsequentes estudos geológicos e paleontológicos, que mostraram que a Terra era significativamente mais antiga que o esperado, o interesse em 'homens das cavernas' aumentou. No mais recente, com a teoria da evolução e a descoberta de ossos pré -históricos que tinham mais de alguns milhares de anos, a questão do local de origem dos seres humanos modernos se tornou mais virulenta."
 dubois.911.g: "Onde está o berço da humanidade?"
 dubois.912.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] convidou para um Congresso Internacional de Ciências. O tópico será a origem dos humanos modernos. Professor [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] recebeu um convite caloroso."
 dubois.914.t: "Os seres humanos modernos emergiram na Europa, Ásia ou África?"
 dubois.914.d: "O mundo acadêmico se dividiu em três campos. A questão do berço da humanidade não está apenas ligada a um certo orgulho nacional, mas também a outras teses sobre a evolução humana."
 dubois.914.f: "Em um debate estimulante, os respectivos defensores dos três campos trocaram seus argumentos. [SCOPE.sCharacter('dubois_europe_defender_scope').GetLastName] trouxe a Europa para o campo porque os achados até agora mostraram o maior volume cerebral nos fósseis europeus. Como o cérebro maior precedeu a caminhada vertical, isso é inevitável. [SCOPE.sCharacter('dubois_asia_defender_scope').GetLastName] duvidava dessa teoria. Os fósseis da caminhada vertical, representantes humanos, já foram encontrados na Ásia - o cérebro só se desenvolveu depois de andar de pé. [SCOPE.sCharacter('dubois_africa_defender_scope').GetLastName], por outro lado, apontou que as espécies de macacos conhecidas mais próximas dos seres humanos vieram da África, não da Ásia. Como o inventor da teoria da evolução o havia baseado, a origem da humanidade teve que ser encontrada lá."
 dubois.914.g: "Humanos modernos desenvolvidos na Europa."
 dubois.914.h: "Tudo aponta para uma origem asiática."
 dubois.914.i: "O berço da humanidade está na África."
 dubois.915.t: "Discurso respeitado"
 dubois.915.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] deu uma palestra à equipe científica reunida em [SCOPE.sCountry('dubois_congress_host_country').GetName] que inspirou o público e os jovens acadêmicos."
 dubois.915.f: "'A terra é o berço da humanidade, mas a humanidade não pode permanecer no berço para sempre.' \ N -Konstantin tsiolkovsky."
 dubois.915.g: "Professor [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] causa uma impressão considerável."
 dubois.916.t: "Contribuição valiosa para o debate"
 dubois.916.d: "Uma brilhante palestra científica do Professor [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] ampliou os horizontes do mundo acadêmico no Congresso de Ciências em [SCOPE.sCountry('dubois_congress_host_country').GetName]. Provavelmente terá um efeito duradouro."
 dubois.916.f: "Ele manteve teorias muito estranhas sobre muitas coisas boas. Ele até acordou uma vez na Associação Britânica e declarou que os macacos tinham majors de hipopótamo em seus cérebros, assim como os homens. O que foi uma coisa chocante a dizer; Pois, se fosse assim, o que seria da fé, esperança e caridade de milhões imortais? Você pode pensar que existem outras diferenças mais importantes entre você e um macaco, como ser capaz de falar, fazer máquinas, e saber o certo do errado, e fazer suas orações e outros pequenos assuntos desse tipo; Mas isso é chique de uma criança, minha querida. Nada deve depender, exceto o grande teste de hipopótamo. Se você tem um major de hipopótamo em seu cérebro, não é um macaco, embora tivesse quatro mãos, sem pés e fosse mais apish do que os macacos de todas as aberras. -Charles Kingsley"
 dubois.917.t: "Crânio misterioso"
 dubois.917.d: "Um antropólogo amador apareceu na conferência com um fóssil desconhecido. Ele gostaria de vendê -lo para a sociedade científica, mas a um preço horrendo. Muitos antropólogos rejeitam o \"porco em uma abordagem\"."
 dubois.917.f: ""
 dubois.917.g: "Cada osso é valioso para a nossa coleção."
 dubois.917.h: "... Mas esse osso é obviamente inútil."
 dubois.919.t_europe: "Os humanos modernos vêm da Europa"
 dubois.919.t_asia: "Os humanos modernos vêm da Ásia"
 dubois.919.t_africa: "Os humanos modernos vêm da África"
 dubois.919.d_europe: "A ciência internacional concordou com uma origem européia da humanidade moderna. Estudiosos não europeus denunciaram essa decisão como suprematismo."
 dubois.919.d_asia: "O Congresso Antropológico Internacional concordou recentemente com o compromisso de que os humanos devem vir da Ásia. A maioria dos membros da Assembléia concordou com essa visão."
 dubois.919.d_africa: "Após um debate final muito controverso, os cientistas conseguiram concordar com uma estreita maioria de que a origem da humanidade deveria estar localizada na África."
 dubois.919.f_europe: "Historicamente, a questão do local de origem real da humanidade não foi resolvida no início do século XX. Enquanto um pequeno grupo, parcialmente enganado pela descoberta do chamado homem de Piltdown, suspeitava da origem do homem moderno na Europa menos por razões científicas do que ideológicas, a teoria da Ásia recebeu mais apoio. As descobertas sobre Java e a recuperação do homem de Pequim tiveram um papel importante nisso. Foi apenas a partir de meados do século XX que mais e mais achados africanos começaram a corroer essa visão."
 dubois.919.f_asia: "Historicamente, a questão do local de origem real da humanidade não foi resolvida no início do século XX. Enquanto um pequeno grupo, parcialmente enganado pela descoberta do chamado homem de Piltdown, suspeitava da origem do homem moderno na Europa menos por razões científicas do que ideológicas, a teoria da Ásia recebeu mais apoio. As descobertas sobre Java e a recuperação do homem de Pequim tiveram um papel importante nisso. Foi apenas a partir de meados do século XX que mais e mais achados africanos começaram a corroer essa visão."
 dubois.919.f_africa: "Historicamente, a questão do local de origem real da humanidade não foi resolvida no início do século XX. Enquanto um pequeno grupo, parcialmente enganado pela descoberta do chamado homem de Piltdown, suspeitava da origem do homem moderno na Europa menos por razões científicas do que ideológicas, a teoria da Ásia recebeu mais apoio. As descobertas sobre Java e a recuperação do homem de Pequim tiveram um papel importante nisso. Foi apenas a partir de meados do século XX que mais e mais achados africanos começaram a corroer essa visão."
 dubois.919.g: "Como esperado, a humanidade evoluiu na Europa."
 dubois.919.h: "Todas as evidências sugerem que a humanidade evoluiu na Ásia."
 dubois.919.i: "'Out of Africa' é uma tese aprovada agora."
 dubois.921.t: "Congresso Paleontológico: Extinção dos dinossauros"
 dubois.921.d: "Nossa nação tem a honra de preparar um dos congressos mais importantes da paleontologia. Cientistas de todo o mundo se reunirão para [SCOPE.sCountry('dubois_congress_host_country').GetName] para responder à pergunta de por que os dinossauros foram extintos. [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] já escolheu seu capacete favorito para vestir durante seu discurso de abertura."
 dubois.921.f: "A questão do que levou à extinção dos dinossauros atormentou a humanidade desde o dia em que o primeiro osso de dinossauros foi encontrado e classificado como parte de uma espécie desconhecida. Antes do século XIX, as pessoas se contentavam em descartar dinossauros como os animais que não chegaram à arca de Noah no dilúvio. À medida que novos métodos geológicos e paleontológicos se desenvolviam, a imagem se tornou mais sutil. A idéia da enchente ainda vivia com Georges Cuvier, embora na direção oposta: ele acreditava que os níveis do mar havia afundado e que os lagartos que ele havia localizado em pântanos haviam perdido o habitat. Foi apenas uma das inúmeras teorias que surgiriam no próximo século e meio - respostas insatisfatórias."
 dubois.921.g: "Essa pergunta será respondida?"
 dubois.922.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] convidou para um Congresso Internacional de Ciências. O tópico será a causa da extinção dos dinossauros. Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] recebeu um convite caloroso."
 dubois.922.f: "Este será o evento da década."
 dubois.923.t: "Teoria revolucionária de § 0"
 dubois.923.d: "Pouco antes do início do Congresso, o astrônomo mais reconhecido de nossa nação, [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], anunciou que tinha sua própria idéia do que poderia ter levado à extinção dos dinossauros: um impacto de asteróide! Ele pede que essa tese seja espalhada entre os paleontologistas."
 dubois.923.f: "Embora o professor [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] não fosse um paleontologista, ele estava familiarizado com os fenômenos cósmicos - e sabia sobre seu poder destrutivo. O século XIX tinha visto alguns grandes cometas incríveis no céu, mas, ao mesmo tempo, no caso de Tunguska, experimentou o que as peças extraterrestres de rocha poderiam fazer. O astrônomo não apenas fez cálculos teóricos, mas também coletou amostras que continham materiais incomuns em certas camadas de rochas, incluindo as no final do período do Cretáceo. Em constante comunicação com o professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], os dois cientistas famosos trocaram suas opiniões e, com a ajuda do conhecimento físico mais moderno, chegaram à conclusão de que um impacto de asteróide foi a causa mais lógica do fim da idade dos dinossauros - não tanto por causa do impacto, mas por causa das conseqüências ecológicas e climáticas."
 dubois.923.g: "Esta é uma ideia fascinante."
 dubois.923.h: "Isso é completamente absurdo."
 dubois.924.t: "Por que os dinossauros desapareceram?"
 dubois.924.d: "Os paleontologistas se uniram - e as opiniões diferem sobre a questão da extinção em massa no final do período cretáceo. Não há dois ou três campos - mas uma mistura de teses que geralmente diferem apenas ligeiramente em termos de probabilidade e loucura."
 dubois.924.f: "Desde a descoberta de dinossauros, as tentativas mais fantásticas de explicar por que os dinossauros desapareceram da terra estão circulando. Aqui está apenas uma seleção."
 dubois.924.a: "O motivo foi um impacto de asteróide."
 dubois.924.g: "O nível do mar caiu e destruiu habitats."
 dubois.924.h: "O conteúdo de oxigênio da atmosfera da Terra aumentou para níveis mais adequados para pássaros e mamíferos."
 dubois.924.i: "Traços desadaptativos levaram a um beco sem saída evolutivo."
 dubois.924.j: "A diminuição da atividade sexual leva à extinção."
 dubois.924.k: "Gigantismo patológico!"
 dubois.924.l: "Competição com mamíferos que comiam seus ovos."
 dubois.924.m: "Mudança climática."
 dubois.924.n: "Erupções vulcânicas."
 dubois.924.o: "Bombardeio da radiação cósmica ou ultravioleta."
 dubois.924.p: "O tamanho do cérebro de dinossauros diminuiu ao longo do mesozóico até que, na verdade, eles se tornassem estúpidos demais para se viver."
 dubois.929.t: "O Congresso Paleontológico termina"
 dubois.929.d_asteroid: "Em uma declaração final, o Congresso Paleontológico anunciou que havia tomado uma decisão: a tese de que um impacto de asteróide selou o fim dos dinossauros apenas parece ser uma idéia convincente."
 dubois.929.d_climate: "Com um suspiro consternado, o professor do país anfitrião iniciou uma palestra hoje que apontou com consternação a extinção de dinossauros devido às mudanças climáticas."
 dubois.929.d_sex: "Um pouco timidamente e com muita limpeza, o presidente do Congresso Paleontológico explica que a falta de reprodução sexual foi a razão do desaparecimento dos dinossauros. A interjeição do professor Tottenham de que ele sempre pensou que sua esposa era um brontossauro foi repreendida nos minutos."
 dubois.929.d_mammals: "Após dias de discussão, os paleontologistas chegaram à conclusão de que a competição com os mamíferos anunciava o fim dos dinossauros. Eles suspeitam que os roedores teriam preferido comer ovos de dinossauros."
 dubois.929.d_fat: "Hoje, em um tom de convicção, o presidente do Congresso Paleontológico leu com toda a gravidade um documento que apoiava a crença de que os dinossauros simplesmente haviam se tornado muito grandes e muito gordos, o que levou à sua inevitável extinção. O comentário do professor Tottenham de que isso significava que o assento do presidente logo ficaria vago resultou em uma repreensão pública."
 dubois.929.d_stupid: "A declaração final lida hoje pelo Congresso Paleontológico explica em detalhes que os cérebros dos dinossauros se tornaram cada vez menores ao longo de milhões de anos até que, no final, eram simplesmente estúpidos demais para sobreviver. A declaração do professor Tottenham de que isso também seria desejável para alguns colegas científicos antes que o Congresso não fosse incluído na ata."
 dubois.929.f: "É assim que alguns cientistas importantes do século XIX e início do século XX realmente acreditavam."
 dubois.929.g: "Um impacto de asteróide foi responsável."
 dubois.929.h: "Uma teoria desajeitada, mas a única aceita."
