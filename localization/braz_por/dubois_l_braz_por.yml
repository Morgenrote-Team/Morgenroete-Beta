 dubois.2121.d: "Qual esqueleto de dinossauro para visitar?" #NT!
 dubois.2121.f: "No final do século XIX, os ossos de dinossauros foram cada vez mais encontrados nos maciços patagônicos da América do Sul. Os primeiros representantes incluem Antarctosaurus e Argyrossaurus." #NT!
