 dubois.128.t: "Alce"
 dubois.128.d: "Nosso zoológico é enriquecido por um animal novo e exótico: hoje o tão esperado #O elk#! mudou-se para seu novo recinto."
 dubois.128.f: "O alce europeu, também conhecido como o alce na América do Norte, é o maior membro da família dos cervos. Nativo das florestas da Europa e da Ásia, esses gigantes solitários são conhecidos por seus enormes chifres, que os machos derramam e regeneram anualmente. Elks são navegadores, alimentando -se de folhas, casca e plantas aquáticas. Apesar de seu tamanho, eles são ágeis e bem adaptados aos seus habitats frios e florestais."
 dubois.128.g: "Majestoso!"
 visit_elk_tt: "Você visitará o recinto do #o elk#!"
