 dubois.10.t: "Dissolução de um zoológico"
 dubois.10.d: "O governo não tem interesse em continuar a manter o zoológico em [SCOPE.sState('dubois_zoo_state').GetName]. Deve ser dissolvido e os animais vendidos."
 dubois.10.f: "Um país só pode manter um único zoológico na capital. A quantidade de dinheiro e espécimes que um país recebe em troca depende do tamanho do zoológico."
 dubois.10.g: "Mas ... mas todos os animais maravilhosos!"
