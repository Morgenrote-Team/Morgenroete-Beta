 dubois.35.t: "Escapes de animais!" #NT!
 dubois.35.d: "Quando a equipe do Safari tenta seguir o animal, de repente foge - os assistentes do professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] correm o risco de serem abalados!" #NT!
 dubois.35.f: ""Ainda estamos muito longe de reconhecer a vida animal, e ainda estamos estudando animais com a intenção de nos conhecermos". -Aldred Edmund Brehm" #NT!
 dubois.35.g: "Não há nada que possamos fazer ..." #NT!
  
 dubois.36.t: "Animal attcks!" #NT!
 dubois.36.d: "Quando a equipe do Safari queria montar as armadilhas, eles assustaram o animal - que depois foi ao ataque!" #NT!
 dubois.36.f: "É errado dizer que o elefante é um animal irritado. Sua natureza é suave e calma. Ele vive em amizade e paz com todas as criaturas. -Aldred Edmund Brehm" #NT!
 dubois.36.g: "Fugir, vocês tolos!" #NT!
 dubois.36.h: "Deixe as armadilhas de qualquer maneira!" #NT!
 dubois.36.i: "Nosso naturalista tem tudo sob controle." #NT!
  
 dubois.37.t: "Acidente de Safari" #NT!
 dubois.37.d: "Descuidadamente, a equipe do Safari mexeu com o animal errado. Ele quebrou todas as armadilhas, assistentes feridos e depois fugiu. Semanas de trabalho foram destruídas em questão de horas. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] teve que cancelar o safari por causa disso." #NT!
 dubois.37.f: ""Se eu já vi mágica, está na África." -Inser Hemingway" #NT!
 dubois.37.g: "Horrível!" #NT!
  
 dubois.36.success_tt: "A equipe Safari ainda define suas armadilhas com sucesso." #NT!
 dubois.36.fail_tt: "Um acidente grave leva ao safari ser cancelado prematuramente." #NT!
 dubois_safari_zoologist_tt: "Isso é possível porque nosso naturalista tem a característica zoológica." #NT!
  
 dubois.38.t: "Extras de Safari" #NT!
 dubois.38.d: "O progresso tecnológico também está revolucionando o Safari, seja na forma de novas armas ou veículos." #NT!
 dubois.38.f: ""Eu nunca soube de uma manhã na África quando acordei que não estava feliz." -Inser Hemingway" #NT!
 dubois.38.machine_guns_tt: "Com a invenção da metralhadora, nossa equipe é muito superior às ameaças humanas e animais." #NT!
 dubois.38.combustion_engine_tt: "Com a invenção do motor de combustão, podemos acompanhar facilmente qualquer animal." #NT!
 dubois.38.g: "Isso dá 'Heia Safari!' um significado totalmente novo." #NT!
  
 dubois.40.d: "No final de uma pesquisa malsucedida que trouxe nada além de dificuldades, o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] desiste e retorna ao [ROOT.GetCountry.GetNameNoFlag] com sua equipe." #NT!
  
