 dubois.2001.t: "Coleção Paleontológica"
 dubois.2001.d: "Bem -vindo à coleção paleontológica."
 dubois.2001.f_paleontologist: "Nossa coleção é atualmente gerenciada pelo nosso [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. Apresenta: \ n \ n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fossils \ n \ n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Fósseis especiais. \ N \ n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! Fósseis humanos \ n \ n#G [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]2#! @dubois_dinosaur_bone! Ossos de dinossauros \ n \ n#G [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]5#! @dubois_dinosaur_skeleton! Esqueletos de dinossauros \ n \ nour [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]7 Classificação de dinossauros #! Como uma classificação para todos os nossos esqueletos de dinossauros em exibição é [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]9."
 dubois.2001.f_no_paleontologist: "Atualmente, nossa coleção é gerenciada por #R NONE#!. Apresenta: \ n \ n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fossils \ n \ n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Fósseis especiais. \ N \ n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! Fósseis humanos \ n \ n#G #!.2#! @dubois_dinosaur_bone! Ossos de dinossauros \ n \ n#G #!.5#! @dubois_dinosaur_skeleton! Esqueletos de dinossauros \ n \ nour #!.7 Classificação de dinossauros #! Como uma classificação para todos os nossos esqueletos de dinossauros em exibição é #!.9."
