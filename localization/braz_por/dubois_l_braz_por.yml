 dubois.231.t: "Rival destruído Digsite"
 dubois.231.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] estava na trilha de um depósito promissor. Quando ele chegou lá, no entanto, ele descobriu que um rival já havia desenterrado muitos ossos e depois explodiu o site."
 dubois.231.f: "Se eu não posso ter esses ossos, ninguém mais o fará!"
 dubois.231.g: "Por que eles fariam isso!"
 dubois.232.t: "Os habitantes locais compartilham informações"
 dubois.232.d: "Os habitantes de uma pequena vila encontraram vários fósseis por perto. Eles os compartilharam felizes com o Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]. Isso levará [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] um passo mais perto de descobrir um novo Digsite!"
 dubois.232.f: "Então, meu avô do avô já encontrou uma buzina de unicórnio. Eu sei o que pensa, mas acho que foi o osso de um dinossauro! Infelizmente ele vendeu. Mas ele me disse onde o encontrou em primeiro lugar. Estava no leito do rio. Tenho certeza que você encontrará alguns ossos perto do rio!"
 dubois.232.g: "Obrigado!"
 dubois.233.t: "Paleontologista local compartilha pesquisas"
 dubois.233.d: "Um residente de uma pequena vila é aparentemente também um paleontologista de hobby. Como [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] é muito velho para escavar mais sites possíveis, ele compartilhou todo o seu conhecimento com o Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.233.f: "Comecei a coletar fósseis quando criança e nunca parei. Mas agora estou velho demais para me ajoelhar e me cansar. Então, espero poder pelo menos ajudá -lo a encontrar alguns ossos e fósseis de dinossauros. E se você encontrar alguns, por favor, deixe -me vê -los!"
 dubois.233.g: "Esta é uma coleção incrível!"
 dubois.234.t: "Deslizamento de terra enterra um local promissor"
 dubois.234.d: "Apenas um dia depois que a equipe do Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] e [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] descobriu um local promissor, foi enterrado por um enorme deslizamento de terra. Levaria meses ou até anos para descobrir o que estiver oculto sob toda a sujeira."
 dubois.234.f: "Primeiro, estava muito quente para cavar, então estava muito molhado para cavar e agora é para escavar? Talvez você simplesmente não goste de cavar!"
 dubois.234.g: "Droga, clima!"
 dubois.235.t: "Uma nova liderança"
 dubois.235.d: "O trabalho duro do Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] parece finalmente pagar. Depois de coletar relatórios das rochas e formações, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] possui vários locais promissores localizados. Esperançosamente [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] encontrará ossos de dinossauros em um desses lugares."
 dubois.235.f: "Veja bem, esses sedimentos geralmente contêm ossos de dinossauros. Eles chegam à superfície nesses lugares, então temos certeza de encontrar ossos em um desses lugares! Esperançosamente. Talvez."
 dubois.235.g: "Bom trabalho!"
