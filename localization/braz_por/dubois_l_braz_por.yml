 dubois.442.t: "Conhecimento geológico" #NT!
 dubois.442.d: "Durante sua estadia nas montanhas, o [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] examinou a montanha em detalhes, mapeou e fez interpretações científicas. Para surpresa de toda a equipe de montanhismo, ele os surpreendeu na manhã seguinte com um mapa de alívio mostrando as armadilhas e escaladas mais suaves da montanha." #NT!
 dubois.442.f: "'Por que eu fiz isso? Oh, eu estava um pouco entediado e também catalogou meus minerais. Não é nada de especial! Eu nem colori ... '" #NT!
 dubois.442.g: "Graças a Deus temos o Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]" #NT!
 dubois.443.t: "Um belo mineral" #NT!
 dubois.443.d: "O grupo de montanhismo já estava reclamando da natureza que não fazia do geólogo, que como cientista era mais um fardo do que uma ajuda; Mas, como se vê, o Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] descobriu um material raro enquanto subia no pico." #NT!
 dubois.443.g: "Que pequena surpresa adorável." #NT!
  
