 dubois.1000.t: "Le Carnaval des Animaux" #NT!
 dubois.1000.d: "Durante sua recente visita ao zoológico, nosso compositor foi inspirado em particular pelo leão, o elefante, o canguru e as tartarugas por uma pequena obra humorística, que ele batizou de 'carnaval dos animais'." #NT!
 dubois.1000.f: "O 'Carnaval dos Animais', legendado Grande Fantaisie Zoologique, foi composto por Camille Saint-Saëns em janeiro de 1886 em uma pequena vila austríaca. Aqui, em apenas alguns dias, ele processou os esboços anteriores para o Carnaval, que datam de uma época em que trabalhava como professor em uma escola de música particular em Paris, encomendada por Aristide Dietsch (1861/1865). Quando as paródias musicais estavam no currículo lá, Saint-Saëns foi persuadido por seus alunos a perceber uma de suas muitas idéias para uma peça de música humorística. No entanto, preocupado com sua reputação, Saint-Saëns decidiu não publicar o trabalho para a Orquestra de Câmara. Porque, além do fato de o compositor imitar as chamadas de animais através dos instrumentos nas peças, ele havia parodiado vários de seus colegas profissionais. Embora os compositores estivessem mortos até então, Saint-Saëns não queria perturbar seus admiradores. O trabalho foi publicado apenas postumamente por sua editora Jacques Durand." #NT!
