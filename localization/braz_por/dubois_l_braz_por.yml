 dubois.2101.t: "Um esqueleto aprimorado" #NT!
 dubois.2101.d: "Os esforços de nosso [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] nasceram frutos: o esqueleto anteriormente defeituoso foi significativamente melhorado." #NT!
 dubois.2101.f: "Demorou um pouco para pensar no animal pré -histórico, sua locomoção, seu ambiente ecológico e muitas outras circunstâncias antes do professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] surgir com a idéia crucial de colocar alguns ossos no lugar certo. Todo o esqueleto foi, portanto, significativamente atualizado." #NT!
 dubois.2101.g: "Parece muito melhor!" #NT!
 dubois.2102.t: "Um esqueleto inalterado" #NT!
 dubois.2102.d: "Apesar de inúmeras tentativas de melhorar o esqueleto, nosso [concept_dubois_paleontologist] não teve sucesso." #NT!
 dubois.2102.f: "O professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] manteve muito cuidado no tratamento do esqueleto. Em um esforço para não destruir muito e prosseguir com cautela, ele permaneceu tão cuidadoso que mudou quase nada." #NT!
 dubois.2102.g: "Inalterado? O que isso está realmente sendo pago?" #NT!
 dubois.2103.t: "Um esqueleto deteriorado" #NT!
 dubois.2103.d: "Talvez teria sido melhor não ter [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] funcionar em um esqueleto de dinossauro." #NT!
 dubois.2103.f: "Foi extremamente surpreendente para todos os envolvidos quando o professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] apresentou a 'versão revisada' do esqueleto. Não menos importante, porque um quadril agora repousava em um dos ombros e uma segunda cauda formidável complementava o animal - na testa." #NT!
 dubois.2103.g: "Esse idiota piorou!" #NT!
  
 dubois.2111.t: "Seção de dinossauros norte -americanos" #NT!
 dubois.2111.d: "Qual esqueleto de dinossauro para visitar?" #NT!
 dubois.2111.f: "Os dinossauros norte -americanos estão entre os mais conhecidos de sua espécie. Numerosas espécies de dinossauros foram encontradas na formação de Morrison no final do século XIX. Espécimes conhecidos são anquilossauros, diplodocos, triceratops e tiranossauro rex." #NT!
