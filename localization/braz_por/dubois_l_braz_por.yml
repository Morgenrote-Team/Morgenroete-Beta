 dubois.251.t: "Ossos humanos desconhecidos"
 dubois.251.d: "Durante sua pesquisa paleontológica, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] encontrou ossos humanos desde os tempos pré -históricos. Eles provavelmente têm dezenas de milhares de anos. Ele enviou os ossos com segurança para que um profissional pudesse cuidar deles."
 dubois.251.f: "Para o espanto do paleontologista, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] encontrou os restos de um esqueleto humano em uma camada superior de rocha. No entanto, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] não conseguiu reconstruir as conexões. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] possui conhecimento paleo-antropológico rudimentar, mas não deseja dar uma opinião, pois isso pode influenciar o resultado científico."
