 dubois.1012.t: "Gabinete de hipopótamo" #NT!
 dubois.1012.d: "O #o Hippopotamus_1 Anclosure abriga um monte dessas enormes criaturas. Felizmente, eles são separados dos visitantes por um grande fosso." #NT!
 dubois.1012.f1: "Os hippopotâmi estavam flutuando na água em seu recinto. Não estava acontecendo muito. Você se perguntou se eles fizeram alguma coisa quando um zookê apareceu ao seu lado." #NT!
 dubois.1012.f2: "De repente, um hipopótamo emergiu da água. Você nunca viu isso antes, mesmo que estivesse assistindo o recinto por vários minutos. Deve estar na água por algum tempo. \ N \ Na pessoa ao seu lado começou a falar: \ "Não é fascinante? Esses hipopótamos podem ficar debaixo d'água por cinco minutos. Quando submergirem, suas narinas e ouvidos estão fechados, para que nenhuma água possa entrar. \"" #NT!
 dubois.1012.f3: "Um dos hipopótamo abriu sua boca enorme e mostrou seus dentes longos e curvos. Então começou a grunhir e espirrar. \ N \ nyou uma vez leu que os hipopótamos do sexo masculino fazem isso para alertar os rivais, pois são muito protetores de seu território. Os hipopótamos do sexo masculino também usam suas fezes para marcar pontos específicos em seu território. Às vezes, eles até olham para outros hipopótamos masculinos como uma forma de domínio." #NT!
 dubois.1012.k: "Retornar aos recintos africanos" #NT!
 zoo_african_enclosures_tt: "Você retornará aos recintos africanos do zoológico." #NT!
  
 dubois.1013.t: "Gabinete de leão" #NT!
 dubois.1013.d: "Um pacote de #o Lions#! pode ser encontrado no gabinete do leão. O gabinete apresenta uma árvore para sombra e um pequeno lago para beber." #NT!
 dubois.1013.f1: "Os magníficos leões estavam deitados no meio de seu orgulho. A juba do leão masculino era grande e bastante escura. De repente, o leão bocejou e mostrou os dentes. Quanto mais velho o leão fica, mais escuro sua juba se torna. A juba provavelmente tem dois propósitos principais: atrair mulheres e pretectar a garganta e o pescoço do leão durante as brigas. A espessura da juba depende das temperaturas no habitat do leão. Nas regiões mais frias, as crinas são muito mais pesadas para os leões que vivem em zoológicos na Europa e na América do Norte." #NT!
 dubois.1013.f2: "No começo, era apenas um leão rugindo, mas os outros se juntaram. A cada leão o rugido ficou cada vez mais alto. Então, de repente, eles pararam tudo de uma vez. \ N \ nlions geralmente vivem em orgulho de animais relacionados. A maioria das fêmeas permanece no mesmo orgulho a vida inteira, enquanto os homens geralmente se juntam a outros orgulhos ou coalizões de outros leões do sexo masculino. No orgulho, as fêmeas geralmente são os caçadores com uma chance muito maior de capturar presas. Os machos têm cerca de 10% de chance de realmente pegar suas presas. Mas quando eles pegam um grande animal, os leões podem comer até 40 kg de carne." #NT!
 dubois.1013.f3: "Nos limites de um zoológico, o poderoso leão anda de um lado para o outro dentro e para trás em seu recinto. Seu corpo muscular exala poder e graça enquanto examina seus arredores. Os movimentos inquietos do leão chamam sua atenção, levando você a refletir sobre os segredos por trás de seu comportamento. Ao refletir, um Zookeeper experiente se aproxima, pronto para compartilhar idéias sobre essas criaturas magníficas. "Durante o dia, eles geralmente se envolvem em ritmo repetitivo, um comportamento que pode ser visto tanto em leões cativos quanto em seus colegas selvagens. Acredita -se que esse ritmo seja resultado de seu instinto natural de patrulhar e marcar seu território, mesmo na ausência de vastas pastagens ou paisagens expansivas. \" "" #NT!
 dubois.1013.f4: "No zoológico, [SCOPE.sCharacter('dubois_prinz_eugen').GetFullName] é conhecido por verificar o antigo leão no recinto todos os dias. O veterano sente uma conexão profunda com o animal. Ambos parecem testemunhas de tempos passados ​​de glória e honra. Os visitantes do zoológico dizem que há um vínculo entre esse animal específico e o homem. Finalmente, três dias chegaram quando o leão não viu mais seu mestre, ele se recusou a comer qualquer coisa e passeava inquietamente para cima e para baixo no recinto. Por volta das três da manhã, ele soltou um rugido que o guardião dos animais correu para o recinto para ver. Ao mesmo tempo, ouviu o toque da morte na capela e, por isso, sabia que seu mestre, o grande general [SCOPE.sCharacter('dubois_prinz_eugen').GetLastName], havia morrido naquela mesma hora. São as coisas que tocam até os corações mais difíceis dos soldados." #NT!
  
 dubois.1014.t: "Gabinete de elefante" #NT!
 dubois.1014.d: "Em um vasto recinto, os elefantes estão vagando. Eles são uma das maiores atrações do zoológico e sempre há pessoas assistindo -as." #NT!
 dubois.1014.f1: "Você estava observando os elefantes por algum tempo. Um deles acaricia para você. Era uma enorme elefante com presas longas. Ela parecia assumir a liderança às vezes e os outros elefantes pareciam respeitá-la muito. Dentro do rebanho, você frequentemente encontra uma matriarca, uma mulher sábia e experiente que lidera e protege o grupo. Em sua família, os elefantes têm fortes laços sociais. Eles até lamentam a perda de um de seu grupo. Felizmente, não tivemos uma morte de elefante em anos! \ "" #NT!
 dubois.1014.f2: "One of the Elephants was trumpeting. It sounded great! You would probably even have heard it from hundreds of meters away.\n\nIt reminded you of a text you once read about elephants: "One of the Elephants was trumpeting. It sounded great! You would probably even have heard it from hundreds of meters away.\n\nIt reminded you of a text you once read about elephants: "Um dos elefantes estava trombeta. Parecia ótimo! Você provavelmente o teria ouvido de centenas de metros de distância. Através de uma variedade de vocalizações, como trombetas, rootes e rugidos, eles transmitem informações a outros membros de seu rebanho, seja um aviso de perigo ou um chamado para se reagrupar. \ "" #NT!
 dubois.1014.f3: "Um dos elefantes chegou mais perto de você. Seu porta -malas se aproximou lentamente de você. Não foi o elefante que você alimentou um pouco de comida há um ano? Não, isso não poderia ser. Teria te esquecido agora! No entanto, você deu ao elefante uma fruta que você trouxe. Locais, fontes de água e até indivíduos que encontraram." #NT!
  
 dubois.1015.t: "Girafa" #NT!
 dubois.1015.d: "As girafas eram visíveis de longe. Suas cabeças chegaram bem acima do solo para obter algumas folhas frescas das árvores." #NT!
 dubois.1015.f1: "A língua azul da girafa se curvou em torno dos galhos verdes na sua mão. No processo, a língua deslizou sobre sua mão. Era difícil e muito longo. \ N \ nyou lembra de algo que você leu uma vez em um livro: a língua da girafa foi perfeitamente adaptada ao seu ambiente. Foi projetado para pastar as folhas de acácia do ramo sem se machucar pelos espinhos. Para comer os 30 kg de folhas por dia, a girafa tem que rasgar as folhas das árvores por até 12 horas. Ao mesmo tempo, as folhas também cobrem grande parte das necessidades de água da girafa." #NT!
 dubois.1015.f2: "Duas das girafas ficaram lado a lado quando de repente começaram a atingir os lados um do outro com a cabeça. O pescoço longo deles lhes permitiu arremessar a cabeça e buscar seu oponente. O que poderia causar um comportamento tão selvagem? Onde os homens se envolvem em lacunas suaves para estabelecer o domínio ou ganhar direitos de acasalamento." #NT!
 dubois.1015.f3: "You listened to a zookeeper talking about the Giraffes with a group of people: \"Giraffes have a distinct coat pattern that resembles a mosaic of irregular patches. These patterns, which vary among individuals, help Giraffes camouflage themselves within their surroundings, providing them with a measure of protection against predators. Apart from that the lighter stripes help the Giraffe to cool down. If they only had dark hair, they would overheat in the Savannah. \ "" #NT!
  
 dubois.1016.t: "Gabinete de pinguim africano" #NT!
 dubois.1016.d: "Alguns pinguins estavam nadando na água, outros estavam juntos, um estava balançando com as asas." #NT!
 dubois.1016.f1: "Na movimentada exposição de pinguins do zoológico, uma colônia animada de pinguins africanos pingam e brincam na água. Sua elegante plumagem em preto e branco brilha sob a luz do sol, chamando a atenção dos visitantes. Hiferizado por suas travessuras lúdicas, você se aproxima de um zookê próximo, ansioso para aprender mais sobre essas criaturas carismáticas. "Esses pinguins são endêmicos das costas da África Austral, encontradas especificamente nas águas que circundam a Namíbia e a África do Sul. Ao contrário de seus colegas na Antártica, os pinguins africanos prosperam em um clima mais quente, tornando-os bem adequados às regiões costeiras que chamam de lar. \"" #NT!
 dubois.1016.f2: "Você assiste como um pinguim luta com uma pedra. Partes da rocha voam para longe, então deve ser uma rocha macia. Você assiste com interesse enquanto o Penguin continua a cavar. \ N \ ndid Você não leu algo sobre isso? Os pinguins africanos cavam uma caverna de ninho em depósitos de Guano. Este guano vem dos excrementos de centenas de gerações de pássaros. Na África do Sul, existem grandes depósitos de Guano, onde os pinguins ninhos. Assim, os parceiros se revezam na criação." #NT!
 dubois.1016.f3: "À medida que você se maravilha com os salpicos lúdicos dos Penguins na água, um zookê compartilha um detalhe fascinante: \ "Uma característica única dos pinguins africanos é a sua capacidade de natação excepcional. Eles são inimigos e simplificados, que se baseiam em que se destacam, que se baseiam em sua dieta. permitindo que eles suportem as temperaturas frias do oceano. \ "" #NT!
  
 dubois.1017.t: "Gabinete de rato molar nu" #NT!
 dubois.1017.d: "Como um animal que era principalmente subterrâneo, o recinto do rato-macaco nu era principalmente apenas uma pilha de sujeira. Mas, através do uso de vidro, foi possível olhar para os pequenos animais em suas habitações." #NT!
 dubois.1017.f1: "Dentro do fascinante habitat subterrâneo do zoológico, uma criatura única e diligente conhecida como rato-toupeira nua através de seus intrincados túneis, sua aparência sem pêlos e enrugados capturando a atenção dos visitantes. Intrigado com seu estilo de vida subterrâneo, você se aproxima de um zookê experiente, ansioso para aprender mais sobre esse mamífero intrigante. "Esses roedores notáveis ​​são altamente especializados para a vida em ambientes escuros e subterrâneos. Sua falta de pêlo é uma vantagem, pois impede que a sujeira e os detritos grudem na pele enquanto cavam. Com seus dentes afiados e mandíbulas poderosas, ratos de toupeiras nuas são escavadores qualificados, criando sistemas de túneis elaborados que fornecem proteção, armazenamento de alimentos e estruturas sociais"." #NT!
 dubois.1017.f2: "Nas cativantes tocas subterrâneas do zoológico, uma colônia de ratos de toupeiras nuas funciona harmoniosamente, cada indivíduo contribuindo para as tarefas de cavar, forragear e cuidar dos jovens. A visão de suas atividades comunitárias cative a atenção dos visitantes. Intrigados com a dinâmica social deles, você procura um zookê experiente, na esperança de descobrir mais sobre a vida desses roedores fascinantes. \ N \ n "" ratos molares nus são criaturas altamente sociais ", explica o Zookeeper. "Eles vivem em colônias com uma estrutura social complexa, semelhante à das abelhas ou formigas. Dentro de uma colônia, há uma única fêmea reprodutiva, conhecida como a rainha, responsável por dar à luz a maioria dos jovens. O restante da colônia é compensado de indivíduos que não são de raça, conhecidos como trabalhadores, que contribuem para as tarefas como túneis, para a túnica e a manutenção." #NT!
 dubois.1017.f3: "Em meio aos intrincados túneis do habitat de rato-toupeira, um grupo de ratos molares nus se amontoam, seus corpos enrugados entrelaçados enquanto compartilham calor e se envolvem em cuidados sociais. Intrigados com o comportamento comunitário deles, você aborda um zookeeper experiente, na esperança de entender o significado de suas interações. "Seu comportamento de amontoação serve a vários propósitos, incluindo a manutenção da temperatura corporal e a promoção de laços sociais. Esses roedores são conhecidos por se envolver em cuidados sociais, o que não apenas ajuda na higiene, mas também reforça as conexões sociais nas colônias." #NT!
  
 dubois.1018.t: "Gabinete de zebra" #NT!
 dubois.1018.d: "O eclos de zebra era bastante plano, cheio de grama e tinha algumas árvores solitárias que ofereciam sombra. Parecia um pouco com a África." #NT!
 dubois.1018.f1: "Dentro do vibrante gabinete com tema de savana do zoológico, um grupo de criaturas cativantes e listradas conhecidas como zebras pastam pacificamente, seus padrões em preto e branco criando uma exibição visual fascinante no contexto das pastagens. Intrigados com a aparência impressionante, você se aproxima de um zookeeper experiente, ansioso para aprender mais sobre esses animais africanos icônicos. As zebras não são conhecidas apenas por suas listras negras e brancas únicas, mas também por seus comportamentos fascinantes e dinâmica social ", o zookeeper começa. "Essas faixas servem como uma forma de camuflagem, ajudando-as a se misturar nas pastagens e predadores confusos. As zebras são animais altamente sociais, geralmente encontrados em grupos familiares conhecidos como haréns. Seus comportamentos cooperativos, como cuidados e vigilância, contribuem para a segurança e o bem-estar do grupo"." #NT!
 dubois.1018.f2: "No sereno habitat de savana do zoológico, uma zebra masculina afirma seu domínio, envolvendo -se em uma exibição animada de chutes e posturas, sua juba e cauda balançando a cada movimento. A visão de seu comportamento cative a atenção dos visitantes. Intrigado com suas ações, você procura um zookeeper experiente, na esperança de descobrir mais sobre os comportamentos sociais desses animais africanos carismáticos. "As zebras masculinas estabelecem sua hierarquia dentro de um grupo através de vários comportamentos, como vocalizações, postura e interações físicas. Eles também têm maneiras únicas de se comunicar, incluindo sons de zurra e choramingos altos. Esses comportamentos desempenham um papel crucial na manutenção da ordem social em um harem zebra" "." #NT!
 dubois.1018.f3: "Em meio à ampla paisagem de Savannah do habitat da Zebra, uma jovem brincalhão e correr em torno de sua mãe, seu comportamento divertido capturando a essência da exuberância juvenil. Intrigado com a interação, você aborda um zookeeper experiente, na esperança de entender o significado do comportamento do potro. "Os potros são conhecidos por sua diversão, que serve importantes fins de desenvolvimento. O jogo permite que eles pratiquem habilidades físicas, desenvolvam laços sociais e aprendam com suas interações com os adultos no grupo. Com esses comportamentos lúdicos, os potros ganham gradualmente as habilidades necessárias para prosperar na natureza"." #NT!
  
