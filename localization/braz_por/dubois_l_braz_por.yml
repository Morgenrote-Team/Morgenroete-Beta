  ### 2.3.6a ### 
  
 dubois.443.f: "Os homens estavam esperando uma hora pelo acadêmico, que parou em algum lugar em uma ladeira e de repente puxou as ferramentas [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]. Balançando a cabeça no começo, eles decidiram combinar o desagradável com os úteis e trouxeram a refeição para não perder tempo desnecessariamente. No entanto, o Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] não tinha intenção de comer ou vir. Quando o líder ameaçou continuar a expedição sem o geólogo, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] repentinamente voltou ao grupo - com uma pedra espumante em [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis], cuja beleza impressionou todos os colegas [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]." #NT!
  
