 dubois.1062.t: "Gabinete de preguiça de garganta marrom" #NT!
 dubois.1062.d: "O verde exuberante do gabinete da preguiça de #o com garganta marrom era ideal para o animal lento. Havia muitas árvores em que podiam aguentar." #NT!
 dubois.1062.f1: "Dentro da exuberante recarga cheia de folhagem do zoológico, uma criatura cativante e lenta e cativante conhecida como preguiça de garganta marrom se apega sem esforço a um ramo, seus movimentos lânguidos e natureza gentil cativando a atenção dos visitantes. Intrigada com suas adaptações únicas, você aborda um zookeeper experiente, ansioso para aprender mais sobre esse fascinante mamífero arbóreo. \ "Essas criaturas notáveis ​​evoluíram para prosperar nas copas das árvores das florestas tropicais centrais e sul -americanas. Com suas garras longas e curvas e músculos especialmente adaptados, as preguiçosas são perfeitamente adequadas para uma vida gasta pendurada de cabeça para baixo. Seus movimentos lisos e lentos ajudam a conservar a energia e permitir -lhes sobreviver a uma dieta que se constituía." #NT!
 dubois.1062.f2: "No tranquilo habitat arbóreo do zoológico, um preguiçoso de garganta marrom percorre o dossel da árvore, seu pêlo desgrenhado e expressão de olhos arregalados, evocando uma sensação de tranquilidade. Intrigada com seu estilo de vida, você procura um zookê experiente, na esperança de descobrir mais sobre os comportamentos intrigantes desses mamíferos fascinantes. "Eles passam a maior parte de suas vidas no topo das árvores, muitas vezes imóveis e se misturando com o ambiente. Os preguiçosos têm um sistema digestivo especializado para processar as folhas resistentes e fibrosas que consomem, o que pode levar dias para digerir totalmente. Eles também possuem algas em seu pêlo, o que ajuda a fornecer camuflagem e nutrientes adicionais." #NT!
 dubois.1062.f3: "Em meio à vegetação exuberante do habitat preguiçoso, uma preguiça de garganta marrom pendura de cabeça para baixo de um galho, aparentemente imperturbável pela atividade movimentada do zoológico. Intrigada com sua natureza aparentemente relaxada, você aborda um zookê experiente, na esperança de entender o significado de seu estilo de vida em ritmo lento. \ "Seus movimentos de lazer não apenas economizam energia, mas também oferecem um nível de proteção contra predadores. Ao gastar a maior parte do tempo pendurando de cabeça para baixo, mas minimizam sua visibilidade e confiam em sua pele especializada para se misturar com a folhagem circundante. É uma adaptação cativante que mostra os sloths exclusivos que empregam sloths para sobreviver em seu resíduo." #NT!
 dubois.1062.k: "Voltar aos recintos da América do Sul" #NT!
 zoo_south_american_enclosures_tt: "Você retornará aos recintos sul -americanos do zoológico." #NT!
  
 dubois.1063.t: "Gabinete Jaguar" #NT!
 dubois.1063.d: "O gabinete semelhante à selva era o reino do #o Jaguar#!. cheio de arbustos verdes, árvores e vegetações. Era o lugar perfeito para a Jaguar se esconder." #NT!
 dubois.1063.f1: "Dentro do imersivo gabinete com tema da selva do zoológico, uma criatura poderosa e ilusória conhecida como Jaguar se aproxima com um senso de propósito, seu corpo elegante e musculoso se mistura perfeitamente com o ambiente exuberante. Intrigada com sua reputação como um predador qualificado, você aborda um zookeeper experiente, ansioso para aprender mais sobre esse icônico gato grande. "" Equipados com mandíbulas fortes e garras afiadas, é um predador de ápice, capaz de derrubar uma variedade de presas, incluindo grandes mamíferos, répteis e peixes. Jaguares são conhecidos por suas técnicas de caça furtiva, geralmente emboscam suas vítimas com as que mais seão as vítimas e as vítimas ", a presença de que a presença é de um povo de caça." #NT!
 dubois.1063.f2: "No cativante habitat da Jaguar do zoológico, um jaguar elegante e ágil sobe graciosamente em uma árvore, mostrando suas notáveis ​​habilidades arbóreas. Seus membros musculares e visão aguçada cativam a atenção dos visitantes. Intrigada com suas proezas de escalada, você procura um zookê experiente, na esperança de descobrir mais sobre a vida desse felino enigmático. "Eles têm membros poderosos e garras retráteis que lhes permitem navegar pelas árvores com precisão. As onças geralmente usam galhos de árvores como pontos de vista para pesquisar seus arredores ou descansar após uma caça bem -sucedida. Sua capacidade de escalar e atravessar o dossel da floresta é um testamento de sua versatilidade como predadores de habilidades. \" "" #NT!
 dubois.1063.f3: "Em meio à vegetação exuberante do gabinete da Jaguar, um poderoso homem que se ressoa em um rugido baixo e ressonante que reverbera através do ar, uma exibição de sua força e territorialidade. Intrigado com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. "Seus rugidos profundos são uma maneira de estabelecer sua presença e defender seu território. Essas vocalizações também desempenham um papel na comunicação com potenciais companheiros, especialmente durante a estação de reprodução. O Jaguars possui uma ampla gama de vocalizações, incluindo gronhos, gate -scar e slowls e tocam o que está denominados vocalizações, os pesquisadores ganham insights valiosos." #NT!
  
 dubois.1064.t: "Giant A80 de tamachim" #NT!
 dubois.1064.d: "O gabinete do #o gigante de téater §1 foi dominado por enormes colinas de formigas vermelhas que se destacavam no recinto gramado. Lá, o taint gigante poderia facilmente se deleitar nos pequenos insetos." #NT!
 dubois.1064.f1: "Dentro do habitat imersivo do zoológico, uma criatura única e fascinante, conhecida como Giant Antéter, vaga com seu focinho alongado distinto e cauda espessa, cativando a atenção dos visitantes. Intrigada com suas adaptações especializadas, você aborda um zookeeper experiente, ansioso para aprender mais sobre esse mamífero intrigante que comia de insetos. \ "Com seu focinho longo, língua pegajosa e garras afiadas, está perfeitamente equipado para sua dieta especializada. Os antecedores consomem milhares de formigas e cupins todos os dias usando sua língua notável, que pode se estender até dois metros. Seu forte senso de olfato os ajuda a localizar colônias de insetos e suas garras"." #NT!
 dubois.1064.f2: "No gabinete cativante de tântilos do zoológico, um taintá gigante serpenteia através do habitat, seu casaco preto e branco distinto se misturando com a luz solar manchada filtrando através das árvores. Intrigada com sua aparência única, você procura um zookeeper experiente, na esperança de descobrir mais sobre o estilo de vida fascinante desse mamífero carismático. \ "Eles são principalmente animais solitários, gastando seu tempo buscando insetos e descansando em cavidades ou tocas de árvores. Esses túlios têm um metabolismo lento e baixa temperatura corporal, permitindo que eles conservam energia. Eles também são excelentes nadadores e podem atravessar corpos de água com facilidade usando seus corpos flutuantes e longos focinhos atuando como sinos." #NT!
 dubois.1064.f3: "Em meio ao ambiente arborizado do habitat de antetro, um taintá gigante utiliza suas garras formidáveis ​​para rasgar um monte de cupins, com a língua entrando e saindo para capturar os minúsculos insetos. Intrigada com suas técnicas de forrageamento, você aborda um zookê experiente, na esperança de entender o significado de seu comportamento. \ "Eles têm uma técnica de alimentação especializada, que envolve o uso de suas garras afiadas para quebrar a formiga e os montes de cupins. A língua do tainea pode entrar e sair de até 160 vezes por minuto, retirando os insetos com precisão notável. Esse comportamento de forrageamento ajuda a regular as populações de insetos e desempenha um papel vital no ecomanado." #NT!
  
 dubois.1065.t: "Gabinete de Armadillo de nove bandas" #NT!
 dubois.1065.d: "#o Armadillos de nove bandas prospera em vários habitats, de áreas quentes e úmidas a matagais, pradarias e florestas tropicais. Para o zoológico, uma mistura desses habitats foi escolhida." #NT!
 dubois.1065.f1: "Dentro do fascinante gabinete do zoológico, uma criatura curiosa e blindada conhecida como Armadillo de nove bandas, sua concha segmentada e focinho distinto cativando a atenção dos visitantes. Intrigada com suas adaptações únicas, você aborda um zookeeper experiente, ansioso para aprender mais sobre esse mamífero intrigante. "Sua notável concha de armadura, composta de placas ósseas, fornece proteção contra predadores. Quando ameaçados, eles têm a capacidade de se enrolar em uma bola, expondo sua concha blindada e deixando pouco vulnerável a ameaças em potencial. Suas garras fortes são perfeitas para cavar e forragear para sua dieta preferida de insetos, como formigas e cupins." #NT!
 dubois.1065.f2: "No cativante habitat do tatu do zoológico, um tatu de nove bandas usa seu forte olfato para farejar insetos enterrados, seu focinho único sondando o chão em busca de uma refeição. Intrigada com seu comportamento de forrageamento, você procura um zookê experiente, na esperança de descobrir mais sobre o estilo de vida fascinante desse mamífero blindado. "Eles dependem muito de seu olfato para localizar insetos no solo. Com suas garras afiadas e pernas frontais poderosas, os tatilhas cavam no chão com facilidade, expondo suas presas. Eles têm uma língua especializada que pode investigar profundamente os túneis de formiga e cupins, permitindo que os extrairem suas penhas favoritas com precisão." #NT!
 dubois.1065.f3: "Em meio ao substrato arenoso do Armadillo Habitat, um tatã de nove peças de banda abrestiga, deixando um rastro de orifícios rasos para trás enquanto procura sua próxima refeição. Intrigada com seu comportamento de escavação, você aborda um Zookeeper experiente, na esperança de entender o significado de suas ações. "Eles escavam tocas rasas, conhecidas como" buracos ", onde se refugiam de temperaturas extremas e ameaças em potencial. Essas tocas também fornecem um local seguro para os tatus de tatilhas descansarem e dar à luz seus jovens." #NT!
  
 dubois.1066.t: "Avio Andor Andor" #NT!
 dubois.1066.d: "Para simular os Andes, o aviário do #o Andor#! foi preenchido com rochas. Foi construído em uma ladeira e também apresentava um penhasco." #NT!
 dubois.1066.f1: "Dentro do amplo aviário do zoológico, uma criatura majestosa e inspiradora conhecida como condor andina voa com asas estendidas, seu tamanho imenso e aparência impressionante cativam a atenção dos visitantes. Intrigada com sua grandeza, você se aproxima de um Zookeeper experiente, ansioso para aprender mais sobre esse pássaro icônico dos Andes. \ "Com sua envergadura impressionante, atingindo até três metros, é um dos maiores pássaros voadores do mundo. Essas aves magníficas são conhecidas por seu vôo gracioso e sua capacidade de voar sem esforço pelas regiões montanhosas dos Andes. Eles têm uma capacidade única de montar atualizações térmicas, permitindo que elas viajassem vastes em busca de alimentos." #NT!
 dubois.1066.f2: "No cativante aviário do zoológico, um condor andino se encaixa no topo de uma borda rochosa, suas penas brilhando à luz do sol enquanto observa os arredores com uma visão aguçada. Intrigada com sua visão impressionante, você procura um zookê experiente, na esperança de descobrir mais sobre as habilidades notáveis ​​desse pássaro majestoso. "Sua visão nítida lhes permite identificar fontes de alimentos em potencial de grandes alturas, como carniça ou carcaças de animais. Eles desempenham um importante papel ecológico como a tripulação de limpeza da natureza, ajudando a impedir a propagação de doenças consumindo carniça." #NT!
 dubois.1066.f3: "Em meio ao cenário cenário do gabinete do condor, um magnífico condor andino masculino exibe sua plumagem de tirar o fôlego, espalhando suas asas e emitindo uma chamada profunda e ressonante que reverbera pelo ar. Intrigada com seu comportamento, você aborda um zookê experiente, na esperança de entender o significado de suas exibições. "Eles são usados ​​para rituais de comunicação e namoro. Condores masculinos se envolvem em exposições elaboradas para atrair fêmeas, que incluem espalhar suas asas, inchar suas penas e emitir vocalizações profundas. Essas exibições mostram sua força, a vitalidade e a adequação como um potencial com testemunhas dessas exibições é uma experiência notável e um testemunho para o tribunal e o tribunal e o tribunal." #NT!
  
 dubois.1067.t: "Gabinete de peixe -boi das Índias Ocidentais" #NT!
 dubois.1067.d: "Os peixes -boi das Índias Ocidentais tinham uma grande piscina onde podiam nadar e alguns bancos de areia para deitar." #NT!
 dubois.1067.f1: "Dentro do sereno habitat aquático do zoológico, uma criatura gentil e majestosa conhecida como peixe -boi das Índias Ocidentais desliza pela água, seu grande corpo e um comportamento calmo capturando a atenção dos visitantes. Intrigada com sua presença pacífica, você se aproxima de um zookê experiente, ansioso para aprender mais sobre esse icônico mamífero marinho. "Esses gigantes gentis são encontrados em águas costeiras quentes e rios lentos. Apesar de seu tamanho enorme, são herbívoros, alimentando-se principalmente de plantas aquáticas. Seu lento metabolismo e habitats de água quente os ajudam a conservar a energia. Infelizmente, os peixes-boi são ameaçados pela perda de habitats e colisões de barcos." #NT!
 dubois.1067.f2: "Nas águas tranquilas do gabinete do peixe -boi, um peixe -boi das Índias Ocidentais flutua perto da superfície da água, suas nadadeiras quebrando suavemente a superfície da água a cada movimento. A visão de seu comportamento dinâmico cative a atenção dos visitantes. Intrigados com seus hábitos de natação, você procura um zookeeper experiente, na esperança de descobrir mais sobre a vida desse notável mamífero marinho. "Seus corpos grandes e grossos e pulmões cheios de ar contribuem para sua flutuabilidade natural, permitindo que eles flutuem perto da superfície da água. Essa flutuabilidade os ajuda a economizar energia e deslizar sem esforço pelo seu habitat aquático. Seus movimentos lentos e deliberados são um testamento de sua adaptação ao seu ambiente aquático"." #NT!
 dubois.1067.f3: "Em meio às águas pacíficas do habitat do peixe -boi, um peixe -boi das Índias Ocidentais emite uma série de chamadas suaves e melódicas que ressoam através do ar, uma exibição de sua presença e comunicação potencial. Intrigado com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \ N \ n "Os peixes -boi são conhecidos por suas vocalizações únicas", compartilha o Zookeeper. "Essas criaturas gentis se comunicam através de uma variedade de sons, incluindo quietas, assobios e cliques. Essas trocas vocais desempenham um papel na manutenção de laços sociais, localizando -se em seu ambiente subaquático e potencialmente indicando as intenções de acasalamento. As vocalizações de peixes -bonde" #NT!
  
 dubois.1068.t: "Gabinete de macaco do esquilo" #NT!
 dubois.1068.d: "O gabinete do macaco esquilo estava cheio de árvores e outras coisas para escalar e brincar. Era o lugar perfeito para os macacos." #NT!
 dubois.1068.f1: "Dentro do vibrante gabinete com tema da floresta tropical do zoológico, um grupo de criaturas energéticas e sociais conhecidas como macacos de esquilo balançam pelas árvores com agilidade, seus movimentos rápidos e travessuras lúdicas que capturam a atenção dos visitantes. Intrigados com o seu comportamento animado, você se aproxima de um Zookeeper experiente, ansioso para aprender mais sobre esses primatas cativantes. Os macacos de esquilo \ n \ n "" são um verdadeiro prazer de observar ", começa o Zookeeper. "Esses pequenos primatas são conhecidos por sua energia ilimitada e grupos sociais unidos. Eles têm características distintas, como suas máscaras brancas e caudas espessas. Os macacos de esquilo se comunicam através de uma variedade de vocalizações, desde chamadas de alarme acentuadas a rumores suaves." #NT!
 dubois.1068.f2: "No movimentado ambiente da floresta tropical do habitat dos macacos, um macaco esquilo meticulosamente prepara seu companheiro, sua interação estreita e movimentos suaves revelando a força de seus laços sociais. A visão de seu comportamento de cuidados cative a atenção dos visitantes. Intrigados com suas interações, você procura um zookeeper experiente, na esperança de descobrir mais sobre a vida desses primatas carismáticos. \ N \ n "A higiene é um aspecto vital das interações sociais dos macacos de esquilo", explica o Zookeeper. "Ele serve a vários propósitos, desde a manutenção da higiene e a remoção de parasitas até o fortalecimento dos laços sociais dentro do grupo. Os macacos esquilos se envolvem em cuidados mútuos, onde se preparam para o pêlo e até limpam os rostos um do outro. Essas sessões de preparação reforçam as conexões sociais e contribuem para a coesão do grupo"." #NT!
 dubois.1068.f3: "Em meio à folhagem exuberante do recinto de macacos, um macaco de esquilo divertido emite uma série de chamadas agudas que ecoam pelo ar, uma exibição de sua presença e comunicação. Intrigados com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. "Suas vocalizações variam de altas chamadas de alarme a sons mais suaves. Essas trocas vocais os ajudam a se comunicar com outros membros de seu grupo, alertando -os para possíveis perigos ou sinalizando suas intenções. Os macacos esquilos também usam a linguagem corporal, como cuidados e gestos, para transmitir mensagens dentro de sua estrutura social dinâmica"." #NT!
  
