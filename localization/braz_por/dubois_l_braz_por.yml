 dubois.2021.t: "Fósseis especiais" #NT!
 dubois.2021.d: "Esta coleção abriga alguns dos fósseis mais extraordinários encontrados até o momento." #NT!
 dubois.2021_amber: "#T Amber#!\nThe Resina preservou um inseto que tem milhões de anos. \ N \ n n" #NT!
 dubois.2021_ammonite: "#T Amonite#!\nTens de milhares de espécies de amonitas moldaram os mares por 350 milhões de anos. \ N \ n n" #NT!
 dubois.2021_archaeopteryx: "#T Archaeopteryx#!\nThis 'Primeval Bird' é considerado por alguns pesquisadores como um possível vínculo entre répteis e pássaros. \ N \ n n" #NT!
 dubois.2021_composita: "#T Composita#!\nComposita eram uma espécie generalizada que vivia do Devoniano tardio para o Permiano tardio. \ N \ n n \ n" #NT!
 dubois.2021_eusthenopteron: "#T EUSTHENOPTERON#!\nThis Os peixes podem ter sobrevivido em uma bacia rio seca e acredita-se que seja um passo importante em direção a anfíbios. \ N \ n n" #NT!
 dubois.2021_ichthyosaurus: "#T icthyosaur#!\nThis O réptil não apenas tinha uma semelhança com um golfinho, mas também era vivíparo. \ N \ n n" #NT!
 dubois.2021_ichthyostega: "#T ichthyostega#!\nA Possível ligação ausente entre peixes e tetrapods. \ N \ n n" #NT!
 dubois.2021_megatherium: "#T megatherium#!\nA preguiçosa de solo gigante. Infelizmente, uma espécie extinta também." #NT!
 dubois.2021_pterodactylus: "#T pterodactylus _1 pequeno pterodactyl de cauda curta que provavelmente vivia nas costas. \ N \ n n" #NT!
 dubois.2021_smilodon: "#T smilodon#!\nOne dos predadores mais conhecidos de dentes de sabre. \ N \ n" #NT!
 dubois.2021_trilobite: "#T Trilobite#!\nThe Numerosas ocorrências e estratificação desses artrópodes os tornam fósseis de índice importantes para os paleozóicos." #NT!
  
 dubois.2041.t: "Ossos de dinossauros" #NT!
 dubois.2041.d: "Aqui os ossos de dinossauros podem ser reconstruídos a partir de fósseis e ossos de dinossauros podem ser construídos em esqueletos de dinossauros." #NT!
 dubois.2041.f: "De cinco ossos de dinossauros de uma região continental, um [concept_dubois_paleontologist] pode reconstruir um dinossauro completo. Um paleontologista experiente também pode tentar reconstruir um osso de dinossauro de 20 fragmentos fósseis. Um osso de dinossauro só pode ser reconstruído se pelo menos um osso de dinossauro estiver disponível para orientação. Para executar qualquer uma das ações, o paleontologista não deve ser esgotado ou ocupado. Its success depends largely on paleontological experience.\n\n#G [ROOT.Var('dubois_north_american_dinosaur_bone').GetValue]#! North American Dinosaur Bones\n#G [ROOT.Var('dubois_south_american_dinosaur_bone').GetValue]#! South American Dinosaur Bones\n#G [ROOT.Var('dubois_european_dinosaur_bone').GetValue]#! European Dinosaur Bones\n#G #G1#! African Dinosaur Bones\n#G #G4#! Asian Dinosaur Ossos \ n#G #G7#! ossos de dinossauros australianos" #NT!
 dubois.2041.g: "Reconstrua um osso de dinossauro de fósseis." #NT!
  
 dubois.2042.t: "Osso de dinossauro reconstruído" #NT!
 dubois.2042.d: "Professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] teve sucesso completo: com a ajuda de seu conhecimento científico, ele foi capaz de reconstruir um osso de dinossauro de fragmentos fósseis." #NT!
 dubois.2042.f: "Foi um jogo de quebra -cabeça estimulante, mas que não representou um problema para as habilidades superlativas de nossos [concept_dubois_paleontologist]. Após alguns meses de estudo e combinatória sofisticada, ele conseguiu reconstruir pedaços de osso dos restos fósseis do tamanho de um fósforo e, portanto, as principais partes de uma espécie de dinossauros das quais apenas ossos soltos eram conhecidos anteriormente." #NT!
 dubois.2042.g: "Esplêndido!" #NT!
 dubois.2043.t: "Professor perplexo" #NT!
 dubois.2043.d: "Apesar dos meses de teste, o professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] não conseguiu produzir resultados no que diz respeito aos materiais utilizados. Que pena dos fósseis!" #NT!
 dubois.2043.f: "Onde essa parte pertenceu novamente? E isso? Mas se essa peça pertencia a esta, a outra não poderia mais se encaixar. Eventualmente, o [concept_dubois_paleontologist] não aguentou mais. Ele estava batendo a cabeça a noite toda, mas não conseguiu e não conseguiu derivar o conhecimento útil dos objetos encontrados até o que o esqueleto de dinossauro deve ter parecido uma vez." #NT!
 dubois.2043.g: "O professor desperdiçou nossos fósseis!" #NT!
 dubois.2044.t: "Esqueleto perfeitamente montado" #NT!
 dubois.2044.d: "Nosso [concept_dubois_paleontologist] fez um trabalho incrível ao montar o esqueleto, adicionando uma peça significativa à coleção de história natural." #NT!
 dubois.2044.f: "Aplausos estrondosos encheram a exposição quando o professor apresentou o esqueleto de dinossauro recém -montado ao público. Ao fazer isso, ele resolveu alguns problemas que ocuparam especialistas por anos e mostraram uma abordagem completamente nova para interpretar os ossos do dinossauro. Os paleontólogos internacionais presentes procuraram conversar com o professor e querem criar achados semelhantes em suas coleções de maneira muito semelhante. Alguns chegaram ao ponto de chamar [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] de gênio do quebra -cabeça, tendo conseguido fazer o que os outros haviam levado décadas para fazer imediatamente." #NT!
 dubois.2044.g: "Excelente trabalho, Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]." #NT!
 dubois.2045.t: "Esqueleto imperfeitamente montado" #NT!
 dubois.2045.d: "O professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] fez o seu melhor, mas infelizmente o esqueleto de dinossauro reunido tem alguns erros." #NT!
 dubois.2045.f: "Quando o novo esqueleto de dinossauros foi apresentado na coleção de história natural, houve aplausos educados, mas sim restantes. Embora o líder paleontologista do país tenha tentado de tudo, colegas profissionais conseguiram descobrir algumas falhas no dia da apresentação que obscureceu o desempenho. No entanto, o esqueleto atende aos requisitos, pelo menos em termos amplos, e deve enriquecer a exposição, mesmo que seja necessário um retoque nos próximos anos." #NT!
 dubois.2045.g: "Funciona, não é?" #NT!
 dubois.2046.t: "Esqueleto mal montado" #NT!
 dubois.2046.d: "O esqueleto montado por [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] deixou especialistas ... surpresos. Embora não da maneira que a sociedade paleontológica esperava." #NT!
 dubois.2046.f: "Foi um dia memorável, superado apenas pela natureza bizarra do evento. O Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] apresentou o novo esqueleto de dinossauro sob uma lona com gestos dramáticos e aplausos estrondosos esperados. Mas em vez disso: silêncio. Whispers se seguiram. Então: diversão. Os pesquisadores envolveram sorriram, outros se uniram, até que finalmente um colega, meio rindo, meio incrédulo, apontou para a quimera de paralelepípedos e gritou: 'Isso é um dinossauro de três cabeças?'" #NT!
 dubois.2046.g: "Isso deve ser uma piada!" #NT!
  
