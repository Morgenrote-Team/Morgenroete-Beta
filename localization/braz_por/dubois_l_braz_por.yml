 dubois.2011.d_other: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] é o principal [concept_dubois_paleontologist] do nosso país. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] está ocupado em outros lugares no momento."
 dubois.2011.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] possui um [concept_academics_experience] paleontológico total de #G [ROOT.Var('dubois_paleontologist_var').GetVariable('dubois_paleontologist_experience_var').GetValue]#!\n\nPalaeontologists pode encontrar novos fósseis nas formações todos os anos. Grandes formações também têm a chance de descobrir ossos raros de dinossauros que podem ser usados ​​para reconstruir esqueletos. Para fazer isso, o [concept_dubois_paleontologist] deve ser atribuído a uma formação. Se nenhuma formação estiver dentro das fronteiras, um contrato de licença paleontológica também pode ser negociado com um país que tenha uma grande formação. Sem atribuição a uma formação, o paleontologista permanece inativo. Durante esse período, no entanto, [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] pode ser usado para expedições, reconstrução dos ossos de dinossauros, construção de esqueletos ou remédio de esqueleto."
