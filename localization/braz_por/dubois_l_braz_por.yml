 dubois_theory_of_evolution_tech: "Teoria da evolução"
 dubois_theory_of_evolution_tech_desc: "The decisive departure from the doctrine of immutable biological types was achieved through the theory of evolution by natural selection. Darwin observed that unchecked population growth would inevitably result in a 'struggle for existence,' wherein advantageous variations are preserved while others are eliminated. This mechanism provides a rational explanation for the diversity of flora and fauna from a shared ancestry. The implications unsettled many, as it suggested that humanity occupies no privileged position in the natural order."
 dubois_paleontology_tech: "Paleontologia"
 dubois_paleontology_tech_desc: "Interest in the Earth's ancient history and extinct organisms can be traced to antiquity, but reached a significant milestone with Georges Cuvier's comparative anatomical studies around 1800. The publication of 'On the Origin of Species' marked a watershed in the life sciences, particularly paleontology. The ensuing scientific discourse prompted a systematic search for transitional fossils and empirical evidence of evolutionary processes within the geological record."
 dubois_genetics_tech: "Genética"
 dubois_genetics_tech_desc: "Modern genetics originated with the meticulous experiments of Gregor Johann Mendel, an Augustinian friar. The rediscovery of Mendel's work in 1900 precipitated rapid advances in the field. By 1915, the principles of Mendelian inheritance had been elucidated across diverse organisms, notably the fruit fly Drosophila melanogaster. Concurrently, mathematicians developed the statistical framework of population genetics, integrating genetic theory into the broader study"
 dubois_naturalist: "Naturalista"
 dubois_naturalist_desc: "A learned student of the natural world, tasked with the collection of specimens and the live capture of exotic fauna."
 dubois_naturalist_experienced: "Seasoned Naturalist"
 dubois_naturalist_experienced_desc: "This naturalist has earned distinction through diligent fieldwork and valuable contributions to the cataloguing of nature’s diversity."
 dubois_naturalist_famous: "Renowned Naturalist"
 dubois_naturalist_famous_desc: "Celebrated for their groundbreaking expeditions and contributions to natural philosophy, this figure stands among the most esteemed scholars of the age."
 dubois_paleontologist: "Paleontólogo"
 dubois_paleontologist_desc: "A scholar devoted to the study of fossilized remains, illuminating the lost worlds of prehistoric life."
 dubois_paleontologist_experienced: "Distinguished Paleontologist"
 dubois_paleontologist_experienced_desc: "Recognized for a series of notable excavations, this scientist has attained esteem among the geological societies of the age."
 dubois_paleontologist_famous: "Eminent Paleontologist"
 dubois_paleontologist_famous_desc: "Through prolific research and celebrated discoveries, this paleontologist is regarded as a leading authority on ancient life."
 ask_for_zoo_animal: "Aquire Exotic Animal"
 ask_for_zoo_animal_desc: "Should this nation possess the [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] not yet represented in our collection, we may formally petition for its acquisition."
