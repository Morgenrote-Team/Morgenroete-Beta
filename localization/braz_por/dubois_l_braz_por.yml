 dubois.228.t: "Águia-de-Haast"
 dubois.228.f: "\"Primeiro, encontramos uma garra enorme e assumimos que ela fazia parte de um dinossauro, mas depois encontramos mais ossos e ficou cada vez mais evidente que era uma águia. Felizmente, essa águia está extinta hoje, como provavelmente poderia ter matado humanos.\""
 dubois.228.g: "Isso é assustador!"
