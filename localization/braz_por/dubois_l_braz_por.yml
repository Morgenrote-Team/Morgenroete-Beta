 dubois.52.t: "Florestas de alta qualidade" #NT!
 dubois.52.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] atingiu o objetivo [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]. Através de uma seleção cuidadosa de mudas particularmente resistentes, medidas para o controle natural de pragas e o estudo de vários animais e plantas em simbiose, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] fortaleceu sustentávelmente a indústria florestal de nosso país. É provável que essas medidas ecológicas tragam benefícios econômicos." #NT!
 dubois.52.f: "'Sinto muito, o quê? Você quer cortar as árvores? Fui a todos os problemas de criá -los, nutri -los e cuidar deles, e agora esses monstros capitalistas querem matar meus queridos? Oh meu Deus, o que eu fiz!" #NT!
 dubois.52.g: "Mais madeira para todos!" #NT!
 dubois.53.t: "Árvores de borracha de alta qualidade" #NT!
 dubois.53.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] atingiu o objetivo [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]. Através de uma seleção cuidadosa de mudas particularmente resistentes, medidas para o controle natural de pragas e o estudo de vários animais e plantas em simbiose, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] fortaleceu sustentávelmente a indústria florestal de nosso país. É provável que essas medidas ecológicas tragam benefícios econômicos." #NT!
 dubois.53.f: "'Por que todos estão interessados ​​na borracha completamente inútil? Eu só fiz isso porque estou interessado no mosquito do pântano neohesperialista. Este animal pequeno e facilmente fatal só se reproduz neste clima." #NT!
 dubois.53.g: "Mais borracha para todos!" #NT!
  
 dubois_naturalist_forestry_improvement_loc: "\ nprofessor [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetLastNameNoFormatting] é bem conhecido pelo trabalho §1 em florestas e como melhorar a silvicultura." #NT!
 dubois_naturalist_rubber_improvement_loc: "\ n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetHerHis|U] Trabalho em plantações de borracha e experimentos com as melhores condições de crescimento permitiu que nosso país melhorasse a produção de borracha massivamente." #NT!
  
 dubois.22.t: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] documentos [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]" #NT!
