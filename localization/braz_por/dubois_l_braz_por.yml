 dubois.1069.t: "Anexo Capybara"
 dubois.1069.d: "O gabinete da Capybara apresentava uma área exuberante e gramada ao redor de um grande lago. Imediatamente, você notou vários desses roedores grandes e suaves descansando pela beira da água, enquanto outros percorreram as águas rasas. Seu comportamento descontraído e comportamento de grupo próximo chamou imediatamente a atenção dos visitantes."
 dubois.1069.f1: "No gabinete da capitão, um pequeno grupo desses grandes roedores relaxa à beira da água, alguns mastigando preguiçosamente na grama, enquanto outros descansam na sombra. Seu comportamento social calmo chama imediatamente a atenção dos visitantes. Curioso sobre o estilo de vida deles, você se aproxima de um Zookeeper para obter mais informações. \"Eles vivem em grupos, às vezes tão grandes quanto 20 ou mais, e raramente são vistos sozinhos. Seus fortes laços sociais são essenciais para sua sobrevivência, oferecendo proteção contra predadores e ajudando-os a manter sua estrutura familiar unida."
 dubois.1069.f2: "No movimentado habitat de capybara, um Capybara particularmente aventureiro entra na lagoa, submergindo -se ao nariz, enquanto os outros seguem o exemplo, espirrando de brincadeira na água. A visão desses grandes roedores que desfruta de seus nivadas cativam os espectadores. Intrigados com esse comportamento, você pede a um zookê para obter mais detalhes. \"Eles passam muito tempo na água, o que os ajuda a regular a temperatura corporal e escapar dos predadores. Eles podem até dormir na água com apenas o nariz acima da superfície. Essa afinidade pela água é uma parte vital de seu comportamento natural, e é onde eles se sentem mais em casa.\" \""
 dubois.1069.f3: "Enquanto você assiste ao grupo Capybara em seu recinto, uma repentina agitação de movimento chama sua atenção. Uma das capybaras mais jovens encontrou um pedaço de grama particularmente saboroso e mastigou animadamente, levando os outros a se reunir e se juntar. A alimentação comunitária é emocionante para testemunhar, e você decide aprender mais falando com um zookê. \ \"Sua dieta consiste principalmente em gramíneas e plantas aquáticas, que elas compartilham de bom grado."
