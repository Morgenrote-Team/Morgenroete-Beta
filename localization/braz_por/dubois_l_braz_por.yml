 dubois.11.koala: "O coala." #NT!
 dubois.11.platypus: "O ornitorrinco." #NT!
 dubois.11.cassowary: "O Cassowary." #NT!
 dubois.11.sealion: "O leão -marinho da Nova Zelândia" #NT!
 dubois.11.no: "Talvez não precisemos de um novo animal do zoológico, afinal." #NT!
  
 dubois.12.t: "Contrabandistas atingem o habitat animal" #NT!
 dubois.12.d: "Professor [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] conseguiu penetrar em um habitat animal em [SCOPE.sCountry('dubois_animal_country').GetName]. Qual animal ele deveria ... emprestar para fins científicos?" #NT!
 dubois.12.f: ""Como pode ser um crime caçar ou pegar um animal? Dificilmente pode ser seu próprio proprietário", explicou o professor quando um dos companheiros perguntou em seu retorno se suas ações não estavam pelo menos prestes a se mover." #NT!
 dubois.13.t: "Contrabandistas pegos!" #NT!
 dubois.13.d: "Más notícias: o pequeno grupo de contrabandistas que enviamos para [SCOPE.sCountry('dubois_animal_country').GetName] foi pego em flagrante. Não deve surpreender que o caso tenha causado um escândalo internacional - estamos sendo acusados ​​publicamente de ser caçadores caçadores!" #NT!
 dubois.13.f: "De acordo com um relatório do jornal, nossos homens foram pegos por alguns funcionários da floresta que então informaram as forças de segurança. Nosso embaixador foi então convocado pelo ministro das Relações Exteriores. Nossa única sorte é que o professor [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] foi capaz de sair do caso a tempo. É difícil imaginar o que o incidente significaria para sua reputação." #NT!
 dubois.13.g: "As coisas foram de maneira diferente do planejado." #NT!
  
 dubois.21.t: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] retorna com animais" #NT!
 dubois.21.d: "O professor [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] retornou após um ano de busca por animais extraordinários. Com a ajuda de alguns caçadores e caçadores, ele conseguiu capturar novos [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]." #NT!
 dubois.21.f: "Número de animais capturados: #G [ROOT.Var('dubois_catch_animal_total').GetValue]#!" #NT!
 dubois.21.g: "Magnífico!" #NT!
  
 dubois.31.t: "Safari começa" #NT!
 dubois.31.d: "A equipe Safari liderada por [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] chegou à África. No entanto, ainda não está claro qual animal será capturado para o [concept_dubois_zoo] nacional." #NT!
 dubois.31.f: "Nem todo animal pode ser capturado da mesma maneira que outro. Nesse ponto, apenas algumas dicas difíceis: um elefante precisa de significativamente mais armadilhas do que uma girafa. Um leão, por outro lado, muda sua localização com mais frequência do que um hipopótamo." #NT!
