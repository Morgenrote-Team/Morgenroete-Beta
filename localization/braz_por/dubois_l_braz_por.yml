 dubois.1030.t: "Gabinete de gato de Pallas" #NT!
 dubois.1030.d: "O gabinete de gato de Pallas era um terreno rochoso pontilhado de fendas e pequenas cavernas. À primeira vista, o felino grosso e macio parecia quase invisível, misturando -se perfeitamente com o ambiente. Então, você viu um - seus olhos arredondados e arredondados espiando cautelosamente por trás de uma pedra, observando silenciosamente tudo ao seu redor." #NT!
 dubois.1030.f1: "No recinto rochoso do zoológico, o gato de Pallas espia por trás de uma pedra, seus olhos arredondados e arredondados, examinando os arredores. Com seu pêlo grosso e prateado inchado contra o frio, parece uma pequena bola de cotão selvagem. Ao contrário de muitos outros gatos selvagens, o gato do Pallas tem uma construção atarracada e pernas curtas, perfeitamente adaptadas às regiões frias e de alta altitude da Ásia Central, onde vive." #NT!
 dubois.1030.f2: "À medida que o gato do Pallas emerge de seu esconderijo entre as rochas, seu rosto plano e olhos grandes e expressivos dão uma aparência quase cômica. Os visitantes geralmente ficam surpresos com seu tamanho pequeno e pêlo macio, o que o ajuda a se misturar ao ambiente nevado. Por natureza solitária, o gato de Pallas raramente é visto na natureza, preferindo ficar escondido em fendas e tocas de rocha durante o dia e emergindo ao amanhecer ou anoitecer para caçar." #NT!
 dubois.1030.f3: "Em meio ao ambiente fino e simulado de estepes de seu gabinete, o gato de Pallas se move com precisão silenciosa, sua cauda espessa atrás de uma pluma. Conhecida por seu comportamento indescritível, este pequeno gato selvagem prefere a solidão e depende de seu pêlo de camuflagem para evitar a detecção por predadores e presas. Com uma dieta consistindo principalmente de pequenos mamíferos, o gato de Pallas é um caçador habilidoso, usando sua visão aguda para identificar o movimento no terreno aberto." #NT!
  
