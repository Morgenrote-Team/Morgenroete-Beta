 dubois.2171.h: "Plesiossauro."
 dubois.2171.i: "Basilosaurus."
 dubois.2171.j: "Megalodon."
 dubois.2173.t: "Plesiossauro"
 dubois.2173.f: "Plesiosaurus é uma ordem de répteis marinhos. Seus fósseis podem ser encontrados em todo o mundo. Dependendo da espécie, os animais tinham entre 1,5 e 15 metros de comprimento. Dependendo da espécie, provavelmente se alimentavam de animais diferentes. Desde caracóis e mexilhões até peixes e outras presas.\nSuas mandíbulas em forma de U e dentes afiados, que se assemelham a uma armadilha de peixes, forneciam-lhes uma ferramenta útil."
 dubois.2174.t: "Basilosaurus"
 dubois.2174.f: "Basilosaurus não é um dinossauro, mas uma forma pré-histórica de baleia. Seu corpo longo lembra uma cobra comprida, mas com um comprimento de até 20 metros, é semelhante em comprimento ao cachalote."
 dubois.2175.t: "Megalodon"
 dubois.2175.f: "O tubarão gigante Megalodon é provavelmente o maior tubarão que já existiu. No entanto, estimar seu comprimento é difícil, pois atualmente apenas dentes e vértebras foram fundados. Nossos paleontólogos estimam que seu comprimento esteja entre 9 e 30 metros. De qualquer forma, o esqueleto do tubarão é deslumbrante e uma das joias da coroa de nossa coleção."
