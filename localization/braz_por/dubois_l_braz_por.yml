 dubois.1031.t: "Os recintos australianos e oceanosos"
 dubois.1031.d: "As pinturas e cabanas australianas tradicionais da Oceania estão espalhadas nesta parte do zoológico. Existem até algumas rochas vermelhas que se parecem com o que você viu nas pinturas da Austrália."
