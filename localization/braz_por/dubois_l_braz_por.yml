 dubois_has_active_paleontologist_tt: "Tem um [concept_dubois_paleontologist] que não está ocupado." #NT!
  
 dubois_naturalist_sick_tt: "O [concept_dubois_naturalist] está doente." #NT!
 dubois_botanical_expedition_banned_tt: "Expedições botânicas foram proibidas por razões políticas." #NT!
  
 dubois_chemical_warfare_tt: "Isso é possível porque inventamos o #O guerra química Warfare#!." #NT!
