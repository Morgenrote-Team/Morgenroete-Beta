 dubois.1021.d: "A parte asiática do zoológico é decorada com motivos asiáticos tradicionais e cabanas asiáticas e pagodes. Existem até algumas estátuas de dragões e animais asiáticos típicos. É como se você estivesse na Ásia." #NT!
