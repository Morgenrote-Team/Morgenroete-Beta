 dubois_naturalist_famous: "Naturalista famoso" #NT!
 dubois_naturalist_famous_desc: "Devido a suas contribuições pioneiras para a ciência natural, esse naturalista é considerado o representante mais proeminente de seu campo em todo o mundo." #NT!
  
