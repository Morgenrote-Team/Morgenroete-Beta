 dubois_chemical_warfare_tt: "This undertaking is enabled by our development of #O Chemical Warfare#!—a grim but decisive innovation."
 dubois_triage_tt: "This measure is made feasible through our adoption of the #O Triage#! system in battlefield medicine."
 dubois_logistics_tt: "This operation is supported by our mastery of modern #O Logistics#!, ensuring timely supply and coordination."
