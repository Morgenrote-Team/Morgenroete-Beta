 dubois.1020.t: "Anexo de gorilas" #NT!
 dubois.1020.d: "O gabinete de gorila foi caracterizado por vegetação exuberante e grandes estruturas de escalada. Imediatamente, você notou vários desses primatas impressionantes se movendo graciosamente através da densa folhagem, alguns escalando as cordas e outros descansando na sombra. Sua poderosa construção e comportamento tranquilo fizeram deles uma visão cativante." #NT!
 dubois.1020.f1: "No gabinete de gorila verdejante, um gorila dominante de Silverback senta -se majestosamente em uma grande pedra, examinando seu grupo com um olhar atento. Sua presença calma e imponente imediatamente chama a atenção dos visitantes. Curioso sobre a estrutura social, você se aproxima de um Zookeeper para obter mais informações. \ N \ "Gorilas são animais altamente sociais," o Zookeeper explica. "O Silverback, como líder da tropa, desempenha um papel crucial na manutenção da ordem e na proteção do grupo. Cada membro da tropa tem papéis específicos, e as responsabilidades do Silverback incluem a tomada de decisões sobre movimentos e resposta a ameaças. A coesão do grupo e a liderança do Silverback são essenciais para o seu bem-estar." #NT!
 dubois.1020.f2: "No habitat de gorila, um jovem gorila sobe e balança energicamente das cordas e galhos, enquanto os membros mais velhos do grupo observam de baixo. O comportamento lúdico dos jovens gorilas cativam os espectadores. Interessado em aprender mais sobre essa atividade, você pede a um zookê. \ N \ "Os jovens gorilas são incrivelmente ativos e brincalhões", os compartilha dos Zookeeper. "Escalar e balançar os ajudam a desenvolver as habilidades físicas necessárias para suas vidas posteriores. Essas atividades também fornecem estimulação mental e vínculo social com outros membros da tropa. A brincadeira é uma parte vital de seu desenvolvimento, ajudando -os a se tornar forte e socialmente adepto. \"" #NT!
 dubois.1020.f3: "No gabinete de gorila, o grupo está reunido em torno de uma grande pilha de frutas e legumes, alimentando e compartilhando entre si. O comportamento de alimentação harmonioso e cooperativo é fascinante de observar. Querendo saber mais sobre essa interação social, você se aproxima de um Zookeeper. \ N \ "Os gorilas são conhecidos por seus hábitos de alimentação pacífica e cooperativa," o Zookeeper explica. "Eles geralmente se alimentam e compartilham alimentos dentro do grupo, que fortalece os laços sociais e garante que todos recebam o suficiente para comer. Esse comportamento comunitário é um aspecto essencial de sua estrutura social, promovendo a harmonia e reduzindo a concorrência entre os membros. \"" #NT!
  
