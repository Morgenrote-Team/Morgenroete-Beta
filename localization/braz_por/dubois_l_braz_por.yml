  ### 2.1.2d ### 
  
 dubois.228.t: "Haast Eagle" #NT!
 dubois.228.f: ""Primeiro, encontramos uma garra enorme e assumimos que ela fazia parte de um dinossauro, mas depois encontramos mais ossos e ficou cada vez mais evidente que era uma águia. Felizmente, essa águia está extinta hoje, como provavelmente poderia ter matado humanos."" #NT!
 dubois.228.g: "Isso é assustador!" #NT!
 dubois_add_fossil_haast_eagle_tt: "Ganho #G 1#! @dubois_special_fossil! #O Fossil#! especial: Haast Eagle." #NT!
  
