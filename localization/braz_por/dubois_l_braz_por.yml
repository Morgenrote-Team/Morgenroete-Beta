 dubois.1032.t: "Gabinete da tartaruga marinha"
 dubois.1032.d: "O gabinete de tartaruga marítima #o consiste principalmente em água, aumentada por algumas pequenas praias de areia. A maioria das pessoas se reuniu em torno de um pequeno buraco, que permitiu olhar para as tartarugas na água."
 dubois.1032.f1: "No vibrante mundo subaquático do recinto do mar da Oceania, uma magnífica tartaruga marinha desliza graciosamente pelas águas cerúleas, sua concha elegante brilhando à luz do sol. Intrigada com sua presença serena, você se aproxima de um biólogo marinho experiente, ansioso para aprender mais sobre esse fascinante réptil marinho. \ N \ n \ \"A tartaruga marinha oceânica, também conhecida como Tartaruga Verde, é uma criatura cativante que navega pelo vasto oceano com graça, o biólogo marinho da marinha Broadins. \ \"Eles são encontrados em águas tropicais e subtropicais no Oceano Pacífico. Sua carapaça de cor de oliveira, ou concha superior, e suas poderosas nadadeiras permitem que lhes navegam nas correntes e realizem longas migrações, retornando a praias específicas para colocar seus ovos. \""
 dubois.1032.f2: "No movimentado recife de coral do gabinete da paisagem marítima da Oceania, uma tartaruga -mar de mãe desliza graciosamente pelo vibrante ecossistema marinho, acompanhado por uma trilha de escotilhas. Intrigados com a jornada deles, você procura um guardião de zoológico experiente, na esperança de descobrir mais sobre o notável ciclo de vida da tartaruga marinha oceânica. \"Depois de acasalar no oceano, as fêmeas se aventuram em terra para deitar seus ovos em praias de areia. Ela cava um ninho na areia e deposita cuidadosamente os ovos antes de cobri -los com areia. Após um período de incubação, os filhotes emergem e fazem sua perigna jornada de volta ao oceano, instintivamente guiada pelo luar. \" \""
 dubois.1032.f3: "No expansivo santuário marinho do recinto dos mares oceanianos, uma gentil tartaruga marinha se aproxima de um vibrante recife de coral, sua natureza paciente cativando os espectadores. Intrigado com seu papel no ecossistema, você aborda um biólogo marinho experiente, na esperança de obter informações sobre a importância da tartaruga marinha oceânica. \ \"Como herbívoros, eles pastam em ervas marinhas e algas, ajudando a manter esses habitats em equilíbrio. Além disso, contribuem para o ciclismo de nutrientes, consumindo presas como água -viva, mantendo a estabilidade ecológica. Sua presença é crucial para a saúde geral e a biodiversidade do ambiente oceânico. \" \""
 dubois.1032.k: "Retornar aos recintos australianos e oceanosos"
 zoo_australian_enclosures_tt: "Você retornará aos gabinetes australianos e oceanianos do zoológico."
 dubois.1033.t: "Gabinete de raio de manta"
 dubois.1033.d: "Um enorme aquário abrigava vários #o manta ray#!. A maior atração era um túnel com janelas das quais você conseguiu ver os mantos mantos deslizando pela água."
 dubois.1033.f1: "No expansivo reino oceânico, um majestoso raio de manta desliza sem esforço pelas águas azuis, suas asas amplas graciosamente onduladas. Intrigada com sua presença gentil, você se aproxima de um biólogo marinho experiente, ansioso para aprender mais sobre essa cativante criatura marinha. \ \"Com seus corpos distintos em forma de diamante e barbatanas peitorais semelhantes a asas, eles são perfeitamente adaptados para a vida no oceano aberto. Esses gigantes gentis podem crescer para tamanhos impressionantes, com alguns indivíduos com envergadura de mais de 6 metros, tornando-os um dos maiores raios do mundo."
 dubois.1033.f2: "No vibrante recife de coral do gabinete oceânico do habitat, um raio de manta desliza graciosamente pelo ecossistema vibrante, seus movimentos elegantes cativantes. Intrigado com seu papel na comunidade de recifes, você procura um guardião do zoológico experiente, na esperança de descobrir mais sobre a importância do manta raio. \ \"Como alimentadores de filtro, eles consomem grandes quantidades de plâncton, ajudando a regular as populações desses pequenos organismos. Ao fazer isso, contribuem para a saúde e o equilíbrio geral do recife, apoiando a diversa variedade de espécies que dependem desses delicados ecossistemas para a sobrevivência. \""
 dubois.1033.f3: "Na vasta extensão do santuário oceânico, um grupo de raios de manta nadar graciosamente em padrões sincronizados, realizando um balé hipnotizante subaquático. Intrigados com o comportamento social deles, você se aproxima de um biólogo marinho experiente, na esperança de obter informações sobre as fascinantes vidas dos raios de manta. \ \"Eles são conhecidos por exibir comportamentos sociais complexos, geralmente formando grupos e se engajando em intrincados displays de namoro. Eles também exibem forte fidelidade do local, retornando a locais específicos de alimentação e limpeza ano após ano. Essas interações sociais desempenham um papel significativo em suas vidas e contribuem para a dinâmica geral de sua população."
 dubois.1034.t: "Gabinete de Koala"
 dubois.1034.d: "O gabinete #o coala#! foi dominado por uma grande floresta de eucalipto na qual você poderia identificar alguns dos animais cinzentos."
 dubois.1034.f1: "Dentro do encantador recinto do zoológico, um coala sonolento repousa sobre um ramo de eucalipto, seu pêlo cinza macio com a paleta de cores moderada do ambiente. Intrigada com sua presença pitoresca, você se aproxima de um Zookeeper experiente, ansioso para aprender mais sobre esse marsupial carinhoso. \"Essas criaturas arbóreas são perfeitamente adaptadas ao seu habitat da árvore do eucalipto. Com seus membros fortes, garras afiadas e dígitos opositados, eles navegam habilmente nos galhos e passam a maior parte do tempo descansando e festejando nas folhas de eucalipto.\""
 dubois.1034.f2: "No recinto de Koala, uma mãe Koala abraça seu minúsculo Joey, seu vínculo suave que lembra uma cena de uma época passada. Intrigados com o relacionamento que você procura um zookê experiente, na esperança de descobrir mais sobre os cuidados maternos únicos do coala. \"Após um período de gestação de cerca de um mês, a mãe dá à luz um pequeno e subdesenvolvido Joey. O Joey então se arrasta para a bolsa da mãe, onde continua a crescer e se desenvolver por vários meses. A bolsa fornece calor, proteção e um suprimento pronto de leite para o Joey em crescimento.\""
 dubois.1034.f3: "Em meio ao gabinete, um grupo de coalas emite uma sinfonia de foles e grunhidos suaves, enchendo o ar com um ambiente encantador. Intrigados com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \ N \ n \ \"Koalas não são animais particularmente vocais, mas eles têm sua própria maneira de se comunicar,\" os compartilhamentos de zookeeper. \ \"Os folha mais baixos, frequentemente emitidos pelos homens, servem como chamadas territoriais, proclamando sua presença a outros coalas. Além disso, grunhidos e bufos suaves podem ser ouvidos durante a estação de acasalamento ou quando os indivíduos estão buscando interação social."
 dubois.1035.t: "Gabinete de canguru"
 dubois.1035.d: "Uma estepe como gabinete abrigava o #o kangaroos#!. Foi dominado por gras longos e algumas rochas vermelhas."
 dubois.1035.f1: "No espaçoso recinto do zoológico, um grupo de cangurus pula graciosamente na paisagem, suas poderosas pernas traseiras os impulsionando sem esforço. Suas silhuetas distintas contra o cenário natural evocam uma sensação de admiração. Intrigado com sua locomoção única, você se aproxima de um zookeeper experiente, ansioso para aprender mais sobre esses cativantes marsupiais. \"Com suas poderosas pernas traseiras e caudas longas, os cangurus evoluíram para serem jumpers notáveis. Essa adaptação extraordinária permite que eles abranjam grandes distâncias com facilidade, atingindo velocidades de até 40 milhas por hora. É uma visão de se ver, especialmente durante suas exibições delicadas."
 dubois.1035.f2: "No pacífico habitat de canguru do zoológico, uma mãe canguru com ternura embala seu Joey em sua bolsa, seu vínculo evidente em todo movimento gentil. O pêlo macio e o pasto gentil evocam um ambiente sereno. Intrigados com o comportamento nutritivo deles, você procura um zookê experiente, na esperança de descobrir mais sobre os cuidados maternos únicos dos cangurus. \"Após um período de gestação relativamente curto, o minúsculo e subdesenvolvido Joey nasce. Ele se arrasta instintivamente para a bolsa da mãe, onde continua a crescer e se desenvolver, recebendo nutrição e proteção. A bolsa proporciona um ambiente caloroso e seguro para o Joey, permitindo que ele cresça no seu próprio ritmo. \" \""
 dubois.1035.f3: "Em meio ao tranquilo gabinete de canguru no zoológico, um canguru masculino emite uma série de grunhidos profundos e cliques, comunicando seu domínio a outros machos. Intrigado com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \"Os homens geralmente emitem grunhidos profundos e cliques como uma forma de comunicação, afirmando seu domínio e estabelecendo território. Essas vocalizações servem como um aviso para outros homens, sinalizando que devem manter a distância. É uma demonstração fascinante da dinâmica social dentro do grupo canguru."
 dubois.1036.t: "Gabinete de ornitorrinco"
 dubois.1036.d: "O gabinete #o Platypus#! foi dominado por um grande lago de água clara e doce. Nele, o Platypi passou a maior parte do tempo."
 dubois.1036.f1: "No habitat tranquilo do rio do zoológico, uma criatura curiosa conhecida como ornitorrinco desliza graciosamente pela água, seu corpo elegante e pés de teia, que o impulsionam com facilidade. Sua aparência única cativa os espectadores. Intrigada com sua natureza extraordinária, você aborda um zookeeper experiente, ansioso para aprender mais sobre esse notável monotrema. \"Encontrado nos habitats de água doce da Austrália, possui uma combinação de características que parecem quase paradoxais. Com sua conta de pato, cauda do castor e pés palmados, é um testemunho das maravilhas da evolução. A platô é um dos poucos mamíferos que se tornam ovos, tornando-o um exemplo extraordinário da diversidade da natureza. \""
 dubois.1036.f2: "No recinto sereno de ornitorrinco do zoológico, uma mãe ornitorpus embalou seu jovem em uma toca cuidadosamente construída, seus corpos peludos aninhados em uma demonstração de calor e proteção. Intrigada com seus hábitos reprodutivos únicos, você procura um zookê experiente, na esperança de descobrir mais sobre o fascinante ciclo de vida do ornitorrinco. \"Após o acasalamento, a fêmea de platô se retira para a toca, que ela me alinha com folhas e gramíneas para isolamento. Lá, ela coloca um a três ovos de couro e os incubam por cerca de dez dias. A mãe ornamenta então amamenta sua verdadeira marvel com leite."
 dubois.1036.f3: "Em meio à vegetação exuberante do habitat de ornitorrinco, um ornitorrinco masculino emite uma série de grunhidos baixos e cliques, uma exibição vocal de sua presença e territorialidade. Intrigado com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \"Os homens geralmente emitem grunhidos baixos e cliques como chamadas territoriais, sinalizando sua presença e estabelecendo seu domínio. Essas vocalizações podem servir como avisos a outros machos para ficar longe ou como convites para possíveis companheiros. O repertório vocal único do ornitorrinco aumenta sua natureza intrigante e dinâmica social. \" \""
 dubois.1036.f4: "#o Platypus Perry desapareceu do zoológico! #!\nMystery atingiu o zoológico como um de seus Platypi - Perry - não pode mais ser localizado. Ou fugiu de seu gabinete ou é muito bom em se esconder. Os dois Zookeepers, Phineas Flynn e Ferb Fletcher, têm certeza de que o pequeno animal retornará em breve. \"Perry frequentemente se esconde em um lugar que ninguém o esperaria. Mas ele geralmente pode ser visto novamente mais tarde no mesmo dia. Não estamos preocupados. Por algum motivo, um de seus experimentos causou uma enorme explosão que quase tirou a vida do Dr. Doofenschmirtz. Se não fosse por um herói desconhecido, sua vida certamente teria terminado."
 dubois.1032.g: "Um ornitorrinco? Perry, o ornitorrinco!"
 dubois_unknown_hero_modifier: "Herói desconhecido"
 dubois.1037.t: "Gabinete Cassowary"
 dubois.1037.d: "O gabinete de casuarias abrigava um ambiente semelhante à selva para o pássaro colorido. Este é o lar do jardineiro da floresta tropical."
 dubois.1037.f1: "Dentro do cativante gabinete com tema da floresta tropical do zoológico, uma criatura única e enigmática conhecida como Cassowary Roams com uma presença poderosa, sua impressionante plumagem azul e preta e casca de capacete distinto cativando a atenção dos visitantes. Intrigada com sua natureza misteriosa, você se aproxima de um Zookeeper experiente, ansioso para aprender mais sobre esse pássaro notável. \"Essas grandes aves sem voos desempenham um papel crucial na manutenção do equilíbrio do ecossistema. Eles são conhecidos como 'jardineiros da floresta tropical', pois sua dieta inclui uma variedade de frutas e plantas. Consumindo essas frutas e distribuindo as sementes através de seus dropings, as cásticas contribuem para a regenheira e a sustentabilidade das raíadas\"."
 dubois.1037.f2: "No habitat exuberante e verdejante do zoológico, um casuar se move graciosamente pela vegetação rasteira, suas pernas poderosas e aparência impressionante evocando uma sensação de admiração. Intrigado com suas adaptações únicas, você procura um zookeeper experiente, na esperança de descobrir mais sobre as características intrigantes desse pássaro indescritível. Os casuários de \ n \ n \"são conhecidos por suas características e comportamentos distintos\", explica o Zookeeper. \"Acredita-se que o casco, uma estrutura de capacete na cabeça, desempenhe um papel na amplificação de som e possivelmente na atração de companheiros. Eles também têm garras afiadas e semelhantes a punhais, que podem ser usadas para defesa ou para desenterrar os alimentos. Essas adaptações são um testamento de sua evolução no ambiente da floresta tropical\"."
 dubois.1037.f3: "Em meio à densa folhagem do habitat de casuar, uma fêmea de casuar protege sua embreagem de ovos verdes vibrantes, seu olhar atento revelando uma mãe dedicada. Intrigada com seu comportamento de nidificação, você se aproxima de um Zookeeper experiente, na esperança de entender o significado dessa exibição. \ N \ n \"O comportamento de ninho do casuário mostra seus instintos maternos únicos\", compartilha o Zookeeper. \"As fêmeas assumem a responsabilidade de incubar os ovos e criar os filhotes, enquanto os machos desempenham um papel menos ativo. A dedicação da mãe em proteger sua embreagem e criar seus jovens demonstra a complexa dinâmica social dessas aves e sua contribuição vital para o ecossistema da floresta tropical\"."
 dubois.1038.t: "Gabinete de vedação da Nova Zelândia"
 dubois.1038.d: "O gabinete do Sealion foi dominado por um grande lago que tinha várias pedras. Se houvesse apenas uma maneira de ver o Sealion sob a água ..."
 dubois.1038.f1: "Dentro da exposição de tema costeira do zoológico, uma criatura carismática e marinha conhecida como o leão-marinho da Nova Zelândia Basks ao sol, seu corpo elegante e expressão cativante capturando a atenção dos visitantes. Intrigada com sua presença única, você se aproxima de um zookeeper experiente, ansioso para aprender mais sobre esse cativante mamífero marinho. \"Endêmico da Nova Zelândia, esses leões -marinhos são conhecidos por sua natureza lúdica e seu forte vínculo com o ambiente marinho. São nadadores e mergulhadores qualificados, capazes de cobrir longas distâncias em busca de comida\"."
 dubois.1038.f2: "No habitat tranquilo à beira -mar do zoológico, um leão -marinho da Nova Zelândia desliza graciosamente pela água, suas poderosas nadadeiras o impulsionando com facilidade. A visão de suas proezas aquáticas cativa a atenção dos visitantes. Intrigados com suas habilidades de natação, você procura um zookê experiente, na esperança de descobrir mais sobre a vida desses mamíferos marinhos. \"Eles têm corpos simplificados e nadadeiras fortes que lhes permitem navegar pelas correntes oceânicas e caçar sua dieta preferida de peixe, lula e outras criaturas marinhas. Seus olhos grandes oferecem uma excelente visão subaquática, permitindo que eles detectem presas, mesmo em águas obscuras. Observá -los nadar é um testamento de sua adaptação ao seu ambiente marinho\"."
 dubois.1038.f3: "Em meio à costa rochosa do habitat do leão -marinho, um leão marinho da Nova Zelândia emite um rugido profundo e ressonante que carrega as ondas, uma exibição de sua presença e territorialidade. Intrigados com suas vocalizações, você aborda um zookeeper experiente, na esperança de entender o significado desses sons. \ N \ n \"As vocalizações são parte integrante da dinâmica social dos leões marinhos da Nova Zelândia\", compartilha o Zookeeper. \"Os homens usam seus rugidos distintos para estabelecer domínio e defender seu território durante a estação de reprodução. Essas vocalizações também desempenham um papel na atraição de mulheres para acasalar. A variedade de sons e exibições em que os leões marinhos se envolvem é um testemunho de sua complexa comunicação e estrutura social\"."
