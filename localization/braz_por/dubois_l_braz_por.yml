 dubois.3000.t: "O Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] está perdendo [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis] Mente?"
 dubois.3000.d: "Seu [concept_dubois_naturalist], [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], parece esquecer mais e mais coisas. Talvez seja hora de [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHim] deixar o cargo de naturalista?"
 dubois.3000.f: "Espere um segundo ... onde eu coloquei meu chá? Oh, está aqui? Ou essa foi a planta posiona? E por que há uma enorme aranha sentada no canto da sala?"
 dubois.3000.g: "Eu não acho que [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] deveria continuar trabalhando."
 dubois.3000.h: "PFF, isso é totalmente normal!"
 dubois.3010.t: "Espécimes perdidos"
 dubois.3010.d: "Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] é subitamente incapaz de encontrar alguns espécimes na coleção [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]. [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] disse que eles simplesmente ... desapareceram."
 dubois.3010.f: "Tenho certeza de que apenas os coloquei aqui nesses pinos. Mas agora eles se foram. Aqueles eram insetos magníficos! Talvez eu apenas os coloque em outro lugar?"
 dubois.3010.g: "Como eles desapareceram? Eu pensei que eles estavam mortos ..."
 dubois.3011.t: "Naturalista vende partes da coleção"
 dubois.3011.d: "Aparentemente, o professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] havia acumulado enormes dívidas. Parece que a única solução [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] foi vender partes de nossa coleção."
 dubois.3011.f: "\"Não, por favor, não faça nada com minha pequena esperança. Ela não fez nada de errado! Eu farei de tudo para conseguir o dinheiro! Por favor! Só não a machuque. Ela é apenas uma pequena aranha inocente! \""
 dubois.3011.g: "[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe|U] fez o quê?!"
 ito_botanist: "Botânico"
 dubois_botanist_desc: "De selvas a desertos, de árvore a musgo, esse personagem dedicou seu tempo à pesquisa de plantas em todo o mundo."
 ito_entomologist: "Entomologista"
 dubois_entomologist_desc: "Why would anyone ever want to research bugs? Well this character does and has become a specialist."
 ito_marine_biologist: "Biólogo marinho"
 dubois_marine_biologist_desc: "Ah, o mar! Não seria ótimo passar uma vez a vida lá? Apenas talvez não como um marinheiro. Esse personagem pode passar a vida pesquisando todas as formas de vida no mar. Que vida maravilhosa!"
 ito_zoologist: "Zoólogo"
 dubois_zoologist_desc: "Os animais são emocionantes! Eles são fascinantes! E esse personagem quer conhecer todos eles!"
