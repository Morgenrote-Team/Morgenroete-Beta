 douglas.211.t: "A Cúpula" #deepl:3152681021
 douglas.211.d: "Depois de uma árdua subida, o grupo de alpinistas finalmente chega ao cume. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] é o primeiro homem a invadir esse ponto da Terra para [ROOT.GetCountry.GetNameNoFormatting]. Agora não resta nada além de saborear esse momento de triunfo." #deepl:2761012191
 douglas.211.f: "A primeira pergunta que você fará e que eu tentarei responder é a seguinte: "Qual é a utilidade de escalar o Monte Everest?" e minha resposta deve ser imediatamente: 'Não vale a pena'. Não há a menor perspectiva de qualquer ganho.\n\nPode ser que aprendamos um pouco sobre o comportamento do corpo humano em grandes altitudes e, possivelmente, os médicos podem usar nossas observações para fins de aviação. Mas, fora isso, nada resultará disso. Não traremos de volta um único pedaço de ouro ou prata, nem uma gema, nem carvão ou ferro. Não encontraremos um único pé de terra que possa ser plantado para produzir alimentos. É inútil.\n\nPortanto, se você não consegue entender que há algo no homem que responde ao desafio dessa montanha e sai para enfrentá-lo, que a luta é a luta da própria vida para cima e para sempre para cima, então você não entenderá por que vamos. O que ganhamos com essa aventura é pura alegria.\n\nE a alegria é, afinal, o fim da vida. Não vivemos para comer e ganhar dinheiro. Comemos e ganhamos dinheiro para podermos aproveitar a vida. É isso que a vida significa e é para isso que ela serve."- George Leigh Mallory" #deepl:2116445992
 douglas.211.g: "Vamos aproveitar o amanhecer!" #deepl:3916807741
 douglas.212.t: "Escalada abortada" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]A tentativa da equipe da Kinross de chegar ao pico fracassou por enquanto. Nosso alpinista é forçado a abandonar a aventura e retornar." #deepl:641296697
 douglas.212.f: "Pode haver vários motivos pelos quais um alpinista abandona a escalada. Às vezes, uma mudança no clima é suficiente; às vezes, um suposto acesso ao cume acaba sendo muito traiçoeiro. Muitas vezes, uma subida leva muito tempo e excede uma janela de tempo porque certos horários do dia e mudanças tornam a subida difícil ou impossível. E, às vezes, você simplesmente escolhe o caminho errado." #deepl:430022267
 douglas.212.g: "Decepcionante." #deepl:1131565686
 douglas.213.t: "Desastre de montanhismo!" #deepl:285221578
 douglas.213.d: "Ao escalar as montanhas em [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] cometeu um erro terrível, que acabou com a expedição em uma catástrofe - várias pessoas morreram, provisões e equipamentos caíram com elas. A nação inteira está em choque!" #deepl:2272067559
 douglas.213.f: "'Todas as noites, você entende, vejo meus companheiros do Matterhorn escorregando de costas, com os braços estendidos, um após o outro, em perfeita ordem e a distâncias iguais - Croz, o guia, primeiro, depois Hadow, depois Hudson e, por último, Douglas. Sim, eu sempre os verei...'- Edward Whymper" #deepl:3038127729
 douglas.213.g: "Uma tragédia!" #deepl:1503732790

