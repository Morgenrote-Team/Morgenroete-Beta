 douglas.204.d: "O Mountaineering Club criou uma seleção de montanhas que requerem equipamentos de montanhismo de alta qualidade para tentar a escalada."
 douglas.205.t: "Expedição de montanhismo - Nível 5"
 douglas.205.d: "O Mountaineering Club criou uma seleção de montanhas que exigem o melhor equipamento de montanhismo para tentar a escalada."
