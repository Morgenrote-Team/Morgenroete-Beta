 douglas.111.t: "A primeira etapa"
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] equipa a equipe com equipamentos básicos de escalada."
 douglas.111.f: "A era das subidas improvisadas chegou ao fim. Sob a orientação de um [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], a equipe recebe seu primeiro equipamento padronizado: cordas, machados de gelo, pitons e mochilas resistentes. Essas ferramentas não salvam apenas vidas - elas reformulam a própria percepção da montanha. A subida se torna mais metódica, calculada. Onde antes a coragem e a força bruta eram tudo o que importava, agora a técnica e a preparação ocupam o centro do palco. É um passo modesto, mas que define uma época, para qualquer pessoa que se atreva a entrar no impiedoso mundo do gelo e da rocha."
 douglas.111.g: "Agora as montanhas pertencem aos preparados."
 douglas.112.t: "Bound by Rope"
 douglas.112.d: "Nosso montanhista [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] tem uma nova ideia: Para aumentar a segurança, são introduzidas equipes de corda fixa."
 douglas.112.f: "Cada passo nas montanhas traz riscos, mas agora ninguém escala sozinho. A introdução de equipes de cordas marca uma mudança de mentalidade: não é mais o indivíduo contra a montanha, mas uma cadeia de escaladores unidos pela confiança - e por uma corda trançada. Essa mudança traz ordem, disciplina e um profundo senso de responsabilidade compartilhada. Se um cair, os outros o seguram. O perigo não é eliminado, mas redistribuído. A montanha continua selvagem, mas nossa resposta a ela não é mais heroica, mas cooperativa."
 douglas.112.g: "Uma corda. Uma vontade. Uma equipe."
 douglas.113.t: "O corpo frágil"
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] insiste em introduzir um sistema de primeiros socorros para a equipe."
 douglas.113.f: "Bolhas, fraturas, queimaduras de frio - a montanha não tem piedade. O que antes era aceito como parte do risco agora é tratado sistematicamente. Um pequeno kit médico, usado com sabedoria, pode salvar uma vida. Um abrigo construído rapidamente pode ganhar tempo. Pela primeira vez, o conhecimento médico básico passa a fazer parte do treinamento. A montanha ainda exige tudo, mas com a introdução de kits de primeiros socorros e planos de emergência, a equipe responde com mais do que garra. O corpo humano não é mais ignorado - ele é protegido."
 douglas.113.g: "Até mesmo os mais fortes podem cair."
 douglas.114.t: "A pedra fala"
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] introduziu métodos científicos no montanhismo: O conhecimento geológico é introduzido para melhorar a análise do terreno."
 douglas.114.f: "O que antes parecia ser um pano de fundo - cascalho, sedimento, rocha - agora se torna uma linguagem a ser lida. Um membro da equipe traz conhecimentos geológicos: camadas revelam movimentos antigos, tipos de rocha alertam sobre avalanches, linhas de falha orientam rotas seguras. A montanha não é mais um mito - é um arquivo. A ciência chega com cadernos e martelos e, de repente, as expedições não são apenas aventuras, mas estudos de campo. É uma nova maneira de ver - uma revolução silenciosa."
 douglas.114.g: "Vamos aprender antes de escalar."
 douglas.115.t: "Respiração de Altitude"
 douglas.115.d: "Por que não usar as experiências em guerra química para práticas de montanhismo? A nova tecnologia permite o uso de máscaras de oxigênio em alturas extremas."
 douglas.115.f: "Acima de uma certa altitude, o céu se torna mais fino. A respiração se torna uma luta, o corpo protesta. Mas agora, com a ajuda de aparelhos mecânicos, os seres humanos chegam a lugares para os quais nunca foram destinados. As máscaras de oxigênio - antes uma curiosidade da ciência - tornaram-se padrão. Elas redefinem os limites da possibilidade. O mundo acima de 7.000 metros se torna acessível, embora a um preço: o alpinista não está mais realmente sozinho, mas faz parte de um sistema de suporte à vida. O triunfo sobre a montanha não diminui, apenas se torna mais frio."
 douglas.115.g: "Respiramos artificialmente, mas prevalecemos."
