 douglas.101.t: "Fundação do Clube de Montanhismo" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] chama - e a montanha responde. A fundação do Mountaineering Club marca uma nova era para todos os que almejam algo mais alto." #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] expedições conduziram [SCOPE.sCharacter('douglas_president_scope').GetHerHim] através de tempestades e avalanches - mas agora, [SCOPE.sCharacter('douglas_president_scope').GetSheHe] procura passar adiante o legado de [SCOPE.sCharacter('douglas_president_scope').GetHerHis]. Em [ROOT.GetCountry.GetCapital.GetCityHubName], [SCOPE.sCharacter('douglas_president_scope').GetSheHe] funda o Mountaineering Club de [GetPlayer.GetName], não sozinho, mas ao lado de um recém-chegado promissor: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SCOPE.sCharacter('douglas_president_scope').GetFullName] vê em [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] não apenas ambição, mas uma futura lenda. Juntos, eles estão no limiar de um caminho que leva não apenas aos cumes, mas à glória, à coragem - e talvez a um lugar na história. O clube está aberto a todos que ouvem o chamado das montanhas. A subida começa." #deepl:3771164746
 douglas.101.g: "A montanha está chamando!" #deepl:249284577

 douglas.102.t: "O Clube Alpino" #deepl:1599559370
 douglas.102.d: "O Alpine Club foi oficialmente fundado em [ROOT.GetCountry.GetCapital.GetCityHubName] em [TimeKeeper.GetCurrentDate.Format('y')] e é reconhecido como a primeira organização internacional de montanhismo do mundo. Sua criação marca o início institucional do alpinismo moderno." #deepl:3982546221
 douglas.102.f: "Historicamente, um grupo de cavalheiros britânicos se reuniu em Londres em 1857 para fundar um clube dedicado ao montanhismo. Liderado por figuras como John Ball e Edward Kennedy, o Alpine Club buscava promover a exploração sistemática dos Alpes, combinando desafios físicos com estudos geográficos e naturais. O clube forneceu uma estrutura para compartilhar conhecimento, organizar expedições e promover um senso de comunidade entre os alpinistas. Seus membros desempenharam um papel fundamental no que mais tarde seria conhecido como a "Era de Ouro do Alpinismo", conquistando várias primeiras ascensões e documentando suas experiências. A publicação do Alpine Journal começou logo em seguida, contribuindo para a literatura emergente do montanhismo. A fundação do Alpine Club lançou as bases para a escalada organizada em todo o mundo e estabeleceu padrões duradouros na exploração de montanhas." #deepl:4126383378
 douglas.102.g: "Chegaremos ao topo juntos!" #deepl:2506053391

