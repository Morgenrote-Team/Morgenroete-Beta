 douglas.202.t: "Expedição de montanhismo - Nível 2"
 douglas.202.d: "O Mountaineering Club criou uma seleção de montanhas que requerem equipamento padrão de montanhismo para tentar a escalada."
 douglas.203.t: "Expedição de montanhismo - Nível 3"
 douglas.203.d: "O clube de montanhismo criou uma seleção de montanhas que exigem um bom equipamento de montanhismo para tentar a escalada."
