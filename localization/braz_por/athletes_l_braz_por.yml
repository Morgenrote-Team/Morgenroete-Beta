l_braz_por:
 athletes.2.t: "Nosso Mountaineer, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], se aposenta"
 athletes.2.d: "Depois de passar décadas de [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] vida escalando picos, traçando rotas desconhecidas e liderando expedições em terrenos perigosos, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] decidiu se aposentar. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] não será mais nosso [concept_douglas_mountaineer]."
 athletes.2.f: ""
 athletes.2.g: "O cume nunca foi o fim - apenas a vista antes da descida."
 athletes.12.t: "Nosso Mountaineer morre"
 athletes.12.d: "Depois de uma vida inteira conquistando picos e guiando outros nas escaladas mais traiçoeiras, nosso mais reverenciado [concept_douglas_mountaineer] faleceu. Quem irá agora liderar o caminho para as nuvens?"
 athletes.12.f: ""
 athletes.12.g: "Sua corda pode ter desaparecido, mas seu rastro permanece."
 athletes.52.t: "Um novo Mountaineer"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] é um talento promissor que um dia poderá estar entre os maiores a escalar nossos picos."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] sobe com determinação."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] agora é um veterano da Mountaineer!"
 athletes.102.d: "Depois de enfrentar geleiras, cruzar cordilheiras e liderar expedições ao desconhecido, nosso [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] agora é renomado o suficiente para ser chamado de Veteran Mountaineer (montanhista veterano)!"
 athletes.102.f: ""
 athletes.102.g: "Um mestre das montanhas!"