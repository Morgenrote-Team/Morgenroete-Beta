 MR_EXTINCTION_CONGRESS_BUTTON: "Congresso de extinção" #NT!
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Extinction Congress#!\nOne of the most puzzling mysteries in natural history remains the disappearance of the dinosaurs. O pai da paleontologia, Georges Cuvier, descobriu que houve uma extinção em massa no final do período cretáceo em que os dinossauros também morreram. But how could the dire lizards, which dominated the earth for millions of years, suddenly become obsolete?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
