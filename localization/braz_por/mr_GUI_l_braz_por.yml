 MR_CRETACEOUS_SCENERY_BUTTON_TT: "#T Construir Cenário Cretáceo#!\nAssim que o conhecimento geológico global atingir um certo nível, os paleontólogos podem montar uma sala com cenário pré-histórico nas universidades. Apenas um cenário é possível por universidade. Neste caso, deixe o seu Paleontólogo construir um cenário do Período Cretáceo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETACEOUS_SCENERY_BUTTON_STOP_TT: "#T Pare de construir um Cenário do Cretáceo#!\nDeixe seu Paleontólogo #n parar#! de construir um Cenário do Cretáceo e o torne disponível novamente.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_JURASSIC_SCENERY_BUTTON_TT: "#T Construir um Cenário Jurássico#!\nAssim que o conhecimento geológico global atingir um certo nível, os paleontólogos podem montar uma sala com cenário pré-histórico nas universidades. Apenas um cenário é possível por universidade. Neste caso, deixe seu Paleontólogo construir um cenário do Período Jurássico\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_JURASSIC_SCENERY_BUTTON_STOP_TT: "#T Pare de construir um Cenário Jurássico#!\nDeixe seu Paleontólogo #n parar#! de construir um Cenário Jurássico e torne-os disponíveis novamente.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCENERY_HAS_CRETACEOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um $dubois_cretaceous_scenery_modifier$"
