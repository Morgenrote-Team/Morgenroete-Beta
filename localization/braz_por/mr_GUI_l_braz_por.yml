 MR_PACIFIC_15_FLOTILLAS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem #V 15 ou mais flottilas#!.#!" #NT!
 MR_PACIFIC_ADMIRAL_AVAILABLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um #V Admiral#! Quem é #V não ocupado #!.#!" #NT!
 MR_PACIFIC_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não é #V em uma expedição do Pacífico #! ou #V recentemente teve um #!.#!" #NT!
  
