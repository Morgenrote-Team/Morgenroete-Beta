 MR_RED_CROSS_BUTTON_TT: "#T Encontrou o [concept_panum_red_cross]#!\nThe International Red Cruz é uma das primeiras instituições supranacionais. O estabelecimento desta organização foi um passo importante para o direito internacional. Foi fundada para proteger a vida e a saúde humanas, para garantir o respeito por todos os seres humanos e prevenir e aliviar o sofrimento humano. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
