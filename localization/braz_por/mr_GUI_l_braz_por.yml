 MR_PAINTER_TRIP_BUTTON: "Jornada educacional" #NT!
 MR_PAINTER_TRIP_BUTTON_TT: "#T Viagem educacional §1 a [concept_klimt_painter_trip], um artista pode aprender um estilo artístico anteriormente desconhecido e, assim, melhorar o [concept_klimt_painting_tradition] anual. Eles também podem adquirir outras características positivas e negativas durante sua estadia em um [concept_artists_center_of_arts] estrangeiro. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACQUIRE_MASTERWORK_BUTTON: "Adquirir uma obra -prima" #NT!
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T adquirir um obras -primas §1 pode comprar uma obra -prima de um estilo no exterior que ainda não possuímos. No entanto, isso pressupõe que outra nação tenha pelo menos mais de uma obra -prima desse estilo. Além disso, precisamos de uma galeria nacional para pendurar a pintura. Além dos custos de compras, também precisamos negociar algumas de nossas pinturas, que nos custam #R 100#! [concept_klimt_painting_tradition]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_VERNISSAGE_BUTTON: "Vernissage" #NT!
 MR_VERNISSAGE_BUTTON_TT: "#T VernisSage#!\nAt Uma vernissage, um [concept_klimt_painter] pode exibir algumas de suas fotos e, em troca, adquirir reputação e [concept_klimt_painting_tradition]. Uma vernissage só é possível uma vez na vida de um pintor. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
