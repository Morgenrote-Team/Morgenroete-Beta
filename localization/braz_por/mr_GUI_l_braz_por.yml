 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON: "Encontrou a Associação Geral de Música Alemã" #NT!
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T Encontrou a Associação Geral de Música Alemã §1 Allgemeiner Deutscher Musikverein (ADMV, 'Geral Aleman Music Association') era uma associação musical alemã fundada em 1861 por Franz Liszt e Franz Brendel, para incorporar os ideais musicais da nova escola alemã da música. O ADMV teve como objetivo ter desempenho musical e apoio prático. Como parte dos objetivos artísticos do ADMV, a Tonkünstler-Versammlungen anual em diferentes locais deveriam ser organizados, com performances de obras musicais importantes, raramente ouvidas e especialmente novas de todos os tipos. No entanto, trabalhos mais antigos que raramente eram ou não ouvidos, mas de interesse por causa de sua importância, também deveriam ser realizados. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
