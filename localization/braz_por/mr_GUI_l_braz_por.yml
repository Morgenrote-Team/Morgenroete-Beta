 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T Aeronaves de alta velocidade #!\nOur Engenheiro aeronáutico pode construir uma aeronave de alta velocidade para quebrar o registro existente. Para construir o avião mais rápido do mundo, você precisa não apenas de um engenheiro, mas também de um piloto para pilotar o avião. O sucesso depende da experiência do engenheiro e do piloto, além de tecnologias avançadas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
