 MR_SYSTEMIZE_FOSSILS_BUTTON: "Sistematizar Fósseis"
 MR_SYSTEMIZE_FOSSILS_BUTTON_TRIGGER: "#T Sistematizar Fósseis#!\nPaleontólogos que não estão em campo podem praticar um trabalho mais teórico e tentar sistematizar fósseis, reconstruir as árvores genealógicas de animais ou traçar o desenvolvimento de plantas ao longo da história da Terra.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_NOT_HAS_RECENT_VOLCANO_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não #V tem#! o #! Modificador #V Expedição Vulcânica Recente#!."
 MR_PROMOTE_ENGINEER_TT: "#T Promote Engineer#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much.\n\n#n Note:#! You can only have one Engineer at a time.[GetPlayer.GetCustom('mr_promote_has_engineer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ASTRONOMER_TT: "#T Promover Astrônomo#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] encontram novos objetos astronômicos, descobrem estrelas e planetas ou podem participar de congressos astronômicos.\n\n#n Nota:#! Você só pode ter um Astrônomo por vez.[GetPlayer.GetCustom('mr_promote_has_astronomer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_CHEMIST_TT: "#T Promover Químico#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] são cientistas que se concentram na descoberta de novos elementos e na melhoria da sua indústria química.\n\n#n Nota:#! Você só pode ter um Químico por vez.[GetPlayer.GetCustom('mr_promote_has_chemist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_GEOLOGIST_TT: "#T Promover Geólogo#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] estudam minerais, vulcões e outras formações geológicas.\n\n#n Nota:#! Você só pode ter um Geólogo por vez.[GetPlayer.GetCustom('mr_promote_has_geologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T Promover Naturalista#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] pode capturar animais em casa ou no exterior, encontrar espécimes ou liderar expedições botânicas.\n\n#n Nota:#! Você só pode ter um Naturalista por vez.[GetPlayer.GetCustom('mr_promote_has_naturalist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T Promover Paleontólogo#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] pode examinar formações geológicas em busca de fósseis e ossos de dinossauros ou encontrá-los em expedições.\n\n#n Nota:#! Você só pode ter um Paleontólogo por vez.[GetPlayer.GetCustom('mr_promote_has_paleontologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T Promover Arqueólogo#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] pode encontrar artefatos, fazer grandes descobertas e participar de conferências arqueológicas.\n\n#n Nota:#! Você só pode ter um Arqueólogo por vez.[GetPlayer.GetCustom('mr_promote_has_archaeologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T Promover Antropólogo#!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] estudam as origens dos humanos, desde o início da evolução humana até a Idade da Pedra.\n\n#n Nota:#! Você só pode ter um Antropólogo por vez.[GetPlayer.GetCustom('mr_promote_has_anthropologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_COMPOSER_TT: "#T Promover Compositor#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] são necessários para criar uma cultura musical próspera. Eles ajudarão um país a criar mais [concept_elgar_musical_tradition].\n\n#n Nota:#! Você só pode ter um Compositor por vez.[GetPlayer.GetCustom('mr_promote_has_composer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_WRITER_TT: "#T Promover Escritor#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] são mestres da narração e trabalham em livros e outras obras literárias. Com o seu trabalho, fortalecem a [concept_manzoni_literary_tradition] de um país.\n\n#n Nota:#! Você só pode ter um Escritor nacional e 3 Escritores locais por vez.[GetPlayer.GetCustom('mr_promote_has_writers_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T Promover Pintor#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] capturam impressões, paisagens e as maravilhas do mundo na tela. Através de suas obras-primas, eles fortalecem a [concept_klimt_painting_tradition] de um país.\n\n#n Nota:#! Você pode ter apenas um Pintor por vez.[GetPlayer.GetCustom('mr_promote_has_painter_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
