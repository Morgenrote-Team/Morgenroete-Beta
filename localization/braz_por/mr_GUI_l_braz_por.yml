 MR_AUTORACING_LONG_DISTANCE_BUTTON: "Corrida de resistência" #NT!
 MR_AUTORACING_LONG_DISTANCE_BUTTON_TT: "#T Organize uma corrida de resistência #!\nEndurance Racing, muitas vezes cidade para cidade, era a norma nos primeiros dias das corridas de automóveis e continuou em meados do século XX. Na Itália, corridas como Targa Florio ou Mille Miglia são os exemplos mais conhecidos. Eles colocam o homem e a máquina em um teste especial e foram considerados por muito tempo as verdadeiras corridas de carros nacionais. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON: "Found Grand Prix" #NT!
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TT: "#T Encontrou o Grande Prêmio Racing#!\nIn 1906, o primeiro Grande Prêmio oficial da história automotiva foi organizado com a corrida pelo Grande Prêmio de L'Acf. Independentemente do país de origem, até três carros de corrida por fabricante de automóveis foram aprovados, conforme solicitado originalmente pelos representantes da indústria francesa. De acordo com seu status de mais importante de todas as competições, a corrida foi realizada a uma distância de mais de 1200 km e em dois dias consecutivos. Em 1925, por instigação do Automobile Club da Itália, foi anunciada a introdução de um campeonato mundial oficial. As três corridas oficiais do Grande Prêmio da temporada (França, Itália e Bélgica) foram designadas como corridas, bem como Indianapolis como o mais importante evento de corrida americano. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TRIGGER_TT: "#default_text #V Pelo menos 5 outros países §2 têm um #V Clube de Automóvel §2 e pesquisado [GetTechnology('organized_sports').GetName].#!" #NT!
  
 MR_AUTORACING_RACE_TRACK_BUTTON: "Construir uma pista de corrida" #NT!
 MR_AUTORACING_RACE_TRACK_BUTTON_TT: "#T Construa uma pista de corrida §1 As corridas do Grande Prêmio, a pista de corrida fixa está se tornando cada vez mais a norma para as corridas de carros. Uma pista de corrida dedicada não apenas centralizaria os eventos internacionais de corrida em um local, mas como uma faixa de teste, também daria aos nossos motoristas de corrida um bônus de experiência a cada ano. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
