 MR_CIVIL_ENGINEER_IRRIGATION_BUTTON_TT: "#T Irrigation Project#!\nLet your [concept_tesla_engineer] focus on improving the Irrigation in [GetPlayer.GetName]. You will be able to prioritize states and those states will get the #V $tesla_state_trait_irrigation$#! State Trait which improves the [concept_throughput] of agricultural buildings and the the resistance against various [Concept('concept_harvest_condition', '$concept_harvest_conditions$')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
