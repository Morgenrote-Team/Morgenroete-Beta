 MR_IOC_FOUNDATION_BUTTON: "Encontrou o COI" #NT!
 MR_IOC_FOUNDATION_BUTTON_TT: "#T Constatou que o Comitê Olímpico Internacional Internacional Olímpico (COI) é uma organização não governamental na forma legal de uma associação. O objetivo do comitê é organizar e supervisionar os Jogos Olímpicos modernos. O país fundador tem um assento permanente no quadro que decide nos locais para os Jogos Olímpicos. Logo após a fundação do COI, o primeiro dos Jogos Olímpicos, que a partir de então acontecerá a cada quatro anos, poderão ser organizados. Sob certas condições, outros países podem ingressar no COI como membros regulares, mas o número de assentos no conselho é limitado. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem pelo menos um [concept_academics_academic].#!" #NT!
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName] está em paz.#!" #NT!
 MR_IOC_MEMBER_BUTTON: "Junte -se ao COI" #NT!
 MR_IOC_MEMBER_BUTTON_TT: "#T Torne -se um membro do IOC#!\nJoin O Comitê Olímpico Internacional para competir nos Jogos Olímpicos Quadrinhados. Os membros do COI também têm a chance de manter os jogos em seu próprio país. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text § [GetPlayer.GetName] A infâmia é menor que #n 50#!.#!" #NT!
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName] é #V não não reconhecido #!.#!" #NT!
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName] é #V Não é o host olímpico atual" #NT!
 MR_IOC_BRIBE_BUTTON: "Subornar o COI" #NT!
 MR_IOC_BRIBE_BUTTON_TT: "#T subornam o IOC#!\nWith Uma generosa 'doação' para o Conselho de Administração do COI, podemos garantir a boa vontade dos membros e ser colocados como o quarto candidato na distribuição dos próximos Jogos Olímpicos. No entanto, não há garantia de que seremos selecionados posteriormente. Os outros membros do COI também podem entender mal nossa generosidade. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName] é #V ainda não está subornando o ioc#!.#!" #NT!
 MR_OLYMPIC_FLAME_BUTTON: "A chama olímpica" #NT!
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T A chama olímpica olímpica, baseada no fogo da deusa grega Hestia, baseada no largo da deusa grega, foi introduzida pela primeira vez nos Jogos Olímpicos de 1928 em Amsterdã. A tradição do revezamento da tocha olímpica associada foi introduzida nos Jogos de Verão em Berlim em 1936. Ao contrário da crença popular, a idéia não veio dos socialistas nacionais, mas do arqueólogo judeu alemão Alfred Schiff. A introdução dessa tradição não apenas daria aos Jogos Olímpicos um novo símbolo de identificação, mas também reuniria a população todos os anos e agiria como um símbolo edificante para distrair outras queixas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName] está #V Preparando -se para hospedar os próximos jogos olímpicos #!.#!" #NT!
  
