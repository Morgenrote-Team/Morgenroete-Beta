 MR_READING_TOUR_BUTTON_TT: "#T Envie o escritor de um escritor de leitura Tour#!\nAn reconhecido internacionalmente, que está em contato com editores estrangeiros, pode aumentar a própria fama do país se ele entrar em um tour de leitura. Isso não apenas promoverá relacionamentos mútuos, mas também sua reputação. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
