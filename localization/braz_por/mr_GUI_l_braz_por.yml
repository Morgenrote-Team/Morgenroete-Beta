 MR_SIGN_FIRST_CONVENTION_BUTTON: "Assine a primeira convenção" #NT!
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Assinar a primeira convenção §1 Primeira Convenção de Genebra, oficialmente a Convenção para a melhoria da condição dos feridos em exércitos no campo define 'a base na qual repousa as regras do direito internacional para a proteção das vítimas de conflitos armados'. Um de seus regulamentos mais importantes é a imunidade da captura e destruição de todos os estabelecimentos para o tratamento de soldados feridos e doentes e a recepção e tratamento imparciais de todos os combatentes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SIGN_SECOND_CONVENTION_BUTTON: "Assine a segunda convenção" #NT!
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T Sign A segunda convenção §1 Convenções de Haia de 1899 e 1907 são uma série de tratados e declarações internacionais negociados em duas conferências internacionais de paz em Haia, na Holanda. Ambas as conferências incluíram negociações sobre o desarmamento, as leis da guerra e dos crimes de guerra. A conferência de 1907 teve um foco aumentado na guerra naval. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Assine a terceira convenção" #NT!
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Assinar o terceiro protocolo da Convenção #!\nThe para a proibição do uso na guerra de asfixiantes, gases venenosos ou outros, e de métodos bacteriológicos de guerra, geralmente chamados de protocolo de Genebra, é um tratado que proíbe o uso de armas químicas e biológicas em conflitos armados internacionais. Foi assinado em Genebra em 17 de junho de 1925. \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_LEAVE_RED_CROSS_BUTTON: "Deixe a Cruz Vermelha" #NT!
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T Deixe a cruz vermelha Homini lupus. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T Introduzir técnicas médicas §1 O médico para introduzir equipamentos modernos, métodos e novos tratamentos para propriedades médicas em todo o país. Às vezes, um médico pode desenvolver novas invenções espetaculares. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
