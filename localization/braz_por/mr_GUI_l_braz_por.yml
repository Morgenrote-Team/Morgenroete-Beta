 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON: "Projeto de Infraestrutura"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON_TT: "#T Infrastructure Project#!\nLet your [concept_tesla_engineer] focus on expanding the infrastructure in [GetPlayer.GetName]. There are different projects that add [Concept('concept_modifier','$concept_modifiers$')] that add [concept_infrastructure] to your states. Each time the state with the least infrastructure will gain the modifier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_TRIGGER_TT: "#default_text Nenhum estado no seu país possui toda a infraestrutura [Concept('concept_modifier','$concept_modifiers$')]. Um estado precisa de um [GetBuildingType('building_railway').GetName] para obter o modificador de ferrovias.#!"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON: "Projeto de ConstruçãoProjeto de Construção"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON_TT: "#T Construction Project#!\nLet your [concept_tesla_engineer] focus on modernizing the [GetBuildingType('building_construction_sector').GetName] of [GetPlayer.GetName].\n\nThis will add three modifiers to your building over time: $gaudi_new_construction_methods_modifier_with_tooltip$, $gaudi_faster_construction_methods_modifier_with_tooltip$ and $gaudi_efficient_construction_methods_modifier_with_tooltip$.\n\nThis project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_CONSTRUCTION_TRIGGER_TT: "#default_text Pelo menos um [GetBuildingType('building_construction_sector').GetName] de Nível 1 ou superior não possui todos os três [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON: "Pesquisa Mecânica"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON: "Novas Locomotivas"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON_TT: "#T Develop new Locomotives#!\nLet your [concept_tesla_engineer] focus on constructing new locomotives that will give a bonus to your [GetBuildingType('building_railway').GetName] buildings. This will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_TRIGGER_TT: "#default_text Pelo menos um [GetBuildingType('building_railway').GetName] de Nível 1 ou superior não tem todos os cinco locomotivas [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON: "Modernizando Indústrias"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON_TT: "#T Modernizing Industries#!\nLet your [concept_tesla_engineer] focus on modernizing the production methods of a building. This will add small bonuses on [concept_throughput], [concept_good_production] and [concept_input_mult] to your building. This project will add #n expenses#! to your country.\n\nModifiers that the building will gain:\n$gaudi_building_throughput_add_modifier_with_tooltip$\n$gaudi_building_production_mult_modifier_with_tooltip$\n$gaudi_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_TRIGGER_TT: "#default_text Pelo menos um edifício industrial de Nível 1 ou superior não possui todos os três [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON: "Pesquisa Militar"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON: "Pesquisa Naval"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON: "Fuzis Avançados"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T Develop Advanced Rifles#!\nLet your [concept_tesla_engineer] focus on developing advanced rifles. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON: "Tanques Avançados"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON_TT: "#T Develop Advanced Tanks#!\nLet your [concept_tesla_engineer] focus on developing advanced tanks. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON: "Trabalhos de Campo Avançados"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON_TT: "#T Develop Advanced Fieldworks#!\nLet your [concept_tesla_engineer] focus on developing advanced fieldwork techniques. This will allow you to use a new [concept_mobilization_option] or raise its tier. This project will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON: "Pesquisa Elétrica"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Juntar-se à Associação Geomagnética"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Juntar-se à Associação Geomagnética!#!\nJuntar-se à Associação Magnética em Göttingen é um requisito obrigatório para iniciar nossa pesquisa no campo do magnetismo terrestre e para estabelecer um Observatório Geomagnético.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Rede Telegráfica"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Estabelecer uma Rede Telegráfica#!\nA telegrafia revoluciona as comunicações de um país, melhorando os serviços e a infraestrutura em regiões onde uma rede telegráfica possui. Cabear uma nação se torna mais difícil quanto maior for o país. Postes telegráficos só podem ser construídos em um estado cujo estado vizinho também tenha um poste telegráfico. Para telegrafia ultramarina, tanto o telégrafo elétrico quanto o eletromagnetismo são necessários para instalar cabos submarinos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui uma [GetBuildingType('building_railway').GetName] na capital.#!"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui uma [GetBuildingType('building_railway').GetName] em #p 65%#! de todos os estados.#!"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Rede de Rádio"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T Construa uma Rede de Estações de Rádio#!\nA era dos cabos emaranhados e irritantes chegou ao fim! Com a invenção da tecnologia de rádio, as mensagens agora podem ser enviadas via antena. Isso não só possibilita a troca de notícias, mas também o estabelecimento de programas de rádio. Antes disso, é claro, uma rede nacional de estações de rádio precisa ser estabelecida.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Buscar Deposito de Ferro"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Procurar por um Depósito de Ferro#!\nA geofísica e o geomagnetismo têm muitas utilizações práticas. A mineração em particular beneficiou da descoberta de possíveis depósitos. Grandes empresas usaram o conhecimento geofísico para localizar depósitos de ferro, chumbo e petróleo anteriormente desconhecidos. Juntamente com as tecnologias certas e o mapeamento do campo magnético da Terra, deve ser fácil fazer uso produtivo do conhecimento teórico atual.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text  [GetPlayer.GetName] possui um [GetBuildingType('building_verrier_observatory').GetName] com o [concept_production_method] #V Observatório Geomagnético#!.#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Buscar Deposito de Chumbo"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Procurar por um Depósito de Chumbo#!\nA geofísica e o geomagnetismo têm muitas utilizações práticas. A mineração, em particular, beneficiou da descoberta de possíveis depósitos. Grandes empresas usaram o conhecimento geofísico para localizar depósitos de ferro, chumbo e petróleo anteriormente desconhecidos. Juntamente com as tecnologias certas e o mapeamento do campo magnético da Terra, deve ser fácil fazer um uso produtivo do conhecimento teórico atual.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "Buscar Deposito de Petróleo"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON_TT: "#T Procurar por um Depósito de Petróleo#!\nGeofísica e geomagnetismo têm muitos usos práticos. A mineração, em particular, beneficiou-se da descoberta de possíveis depósitos. Grandes empresas usaram o conhecimento geofísico para localizar depósitos de ferro, chumbo e petróleo anteriormente desconhecidos. Juntamente com as tecnologias certas e o mapeamento do campo magnético da Terra, deve ser fácil fazer uso produtivo do conhecimento teórico atual.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON: "Pesquisa Aeronáutica"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON: "Modernizando Aeroportos"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON_TT: "#T Modernizing Airports#!\nLet your [concept_tesla_engineer] focus on modernizing your [GetBuildingType('building_airport').GetName]. The Airports will get modifiers that increase [concept_throughput] and [concept_good_production] and lower [concept_input_mult]. This will add #n expenses#! to your country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [GetBuildingType('building_airport').GetName] de Nível 1 ou superior que ainda não possui os três [Concept('concept_modifier','$concept_modifiers$')].#!"
