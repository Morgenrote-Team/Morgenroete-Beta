 MR_INVITE_INDEPENDENT_PAINTER: "Convidar Pintor"
 MR_INVITE_INDEPENDENT_PAINTER_TT: "#T Convidar este Pintor#!\nConvidar um [concept_klimt_painter] é um jeito de conseguir um novo Pintor para o seu país caso você não consiga criar um bom o suficiente por conta própria, ou caso o seu Pinto atual não o satisfaça.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_painter', Scope.GetCharacter.MakeScope ).End)]"
