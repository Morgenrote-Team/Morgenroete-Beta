 #Naturalist Buttons 
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T HEIA Safari#!\nOn Um safari africano, através de rastreamento e captura constantes, o grande jogo pode ser capturado e depois transportado para um [concept_dubois_zoo]. Só é possível pegar um animal por safari. Dependendo da espécie animal, difere se você precisa de armadilhas ou precisa permanecer em sua trilha. Como regra geral, animais grandes e lentos precisam de mais armadilhas, enquanto os animais rápidos exigem mais rastreamento. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um [concept_dubois_naturalist] que é #V não ocupado #!.#!" #NT!
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text você tem um [concept_dubois_zoo] que é pelo menos #V de pequeno tamanho #!.#!" #NT!
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V possui pelo menos um habitat § 3 de animais africanos com grande jogo ou existe um habitat em um estado #V de propriedade de uma nação descentralizada #!.#!" #NT!
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] não é #V em um safari#! ou #V recentemente teve um #!.#!" #NT!
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Catch Animais locais §1 Nação tem habitats animais com espécies fascinantes que podem ser exibidas em um [concept_dubois_zoo]. Um [concept_dubois_naturalist] deve viajar pelo país por um ano para coletar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para um zoológico. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um habitat animal que abriga um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] que não vive em nosso [concept_dubois_zoo].#!" #NT!
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não é #V atualmente capturando animais locais §3" #NT!
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Expedição botânica #!\nBotanical Expedições (às vezes chamadas de 'caça às plantas') são viagens científicas projetadas para explorar a flora de uma região específica. Um [concept_dubois_naturalist] seria responsável pela identificação, descrição e coleta de espécimes. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Expedições botânicas foram banidas por #V razões políticas §2" #NT!
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V possui uma floresta tropical em pelo menos um estado. As florestas tropicais têm os seguintes modificadores de estado: #V Amazon Forest#!, #V Congo Forest#!, #V Borneo Forest#! e #V Forest#!.#!" #NT!
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T RECORMA NATURALISTA DA EXPEDIÇÃO BOTânica §1 O [concept_dubois_naturalist] de volta de sua pesquisa botânica para usá -lo para outros propósitos - como a captura de animais. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text seu [concept_dubois_naturalist] é #V Nem viajar nem doentes" #NT!
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Seu [concept_dubois_naturalist] não está mais ocupado." #NT!
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Congresso do hipocampo" #NT!
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Congresso do hipocampo §1 Único é o homem? Quanto de um animal ele é? Os gregos antigos já haviam notado uma proximidade entre humanos e macacos. O fato de Carl Linneaus classificar macacos e humanos como primatas - a classificação "mais alta" entre os animais - mostra que o campo não foi tão controverso. No entanto, com a formulação da teoria da evolução e a presumida descendência de humanos de um parente semelhante ao macaco, surgiram conflitos que devem ser resolvidos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um [concept_dubois_naturalist]#!" #NT!
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text pelo menos #V 5 países #! têm um [concept_dubois_naturalist].#!" #NT!
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem #V 20000 ou mais §3 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (atualmente [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) .#!" #NT!
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 ou More#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] foram coletados em todo o mundo (atualmente [GetGlobalVariable('dubois_global_specimen').GetValue|0+]) .#!" #NT!
 MR_EXTEND_ZOO_SMALL_BUTTON: "Estender o [concept_dubois_zoo] (pequeno)" #NT!
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T Estender o zoológico a pequenos size#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos e o prestígio internacional é concedido àqueles que podem mostrar o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Alguns estágios de expansão exigem não apenas para coletar muitos animais, mas também de diferentes partes do mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 10 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Você atualmente tem [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!" #NT!
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 2 African#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 Asian#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) ou #V 2 Oceanic#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (atualmente [GetPlayer.GetName]3)." #NT!
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName] é #V Atualmente não está expandindo §3 [concept_dubois_zoo].#!" #NT!
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "Estender o [concept_dubois_zoo] (médio)" #NT!
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T Estender o zoológico para o tamanho médio §1 são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos e o prestígio internacional é concedido àqueles que podem mostrar o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Alguns estágios de expansão exigem não apenas para coletar muitos animais, mas também de diferentes partes do mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 20 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Você atualmente tem [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!" #NT!
 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 5 African#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 5 Asian#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]), #V 5 Oceanic#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (atualmente [GetPlayer.GetName]3) ou § § § § §." #NT!
 MR_EXTEND_ZOO_LARGE_BUTTON: "Estender o [concept_dubois_zoo] (grande)" #NT!
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T Estender o zoológico a tamanho grande §1 são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos e o prestígio internacional é concedido àqueles que podem mostrar o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Alguns estágios de expansão exigem não apenas para coletar muitos animais, mas também de diferentes partes do mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXTEND_ZOO_SMALL_30_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 30 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Você atualmente tem [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!" #NT!
 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Estender o [concept_dubois_zoo] (famoso)" #NT!
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T Estender o zoológico a size§1 famosos são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos, e o prestígio internacional é concedido àqueles que podem mostrar o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Alguns estágios de expansão exigem não apenas para coletar muitos animais, mas também de diferentes partes do mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 40 Total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Você atualmente tem [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]#!" #NT!
 MR_SPECIMEN_GARDEN_BUTTON: "Encontrado Jardim Botânico" #NT!
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Encontrou o Jardim Botânico de Jardim Botânico em seu zoológico o tornará ainda mais prestigioso. Podemos plantar todas as plantas exóticas coletadas por nosso [concept_dubois_naturalist]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 50000 ou More#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (atualmente [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) .#!" #NT!
 MR_SPECIMEN_GARDEN_NO_BOTANICAL_GARDEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] não possui um #V jardim botânico ainda." #NT!
 MR_SPECIMEN_GARDEN_EFFECT_TT: "Seu [GetBuildingType('building_dubois_zoo').GetName] receberá um #V Jardim Botânico que oferece 50 prestígio e um menor padrão de vida." #NT!
 MR_SPECIMEN_COLLECTION_BUTTON: "Encontrou coleção de amostras" #NT!
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Encontrou a coleção de espécimes." #NT!
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não possui uma coleção de espécimes #V ainda." #NT!
 MR_SPECIMEN_COLLECTION_EFFECT_TT: "Seu [GetBuildingType('building_dubois_zoo').GetName] receberá uma coleção de espécimes #V que oferece 50 impulsionamentos de pesquisas menores." #NT!
 MR_BAN_ANIMAL_EXPORT_BUTTON: "Proibir exportação de animais" #NT!
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T proibir exportação de animais _1 uma proibição de exportações de animais, estamos deixando claro em princípio que não estamos preparados para vender nenhum de nossos animais no exterior. Outras nações se absterão de consultas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "Permitir exportação de animais" #NT!
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T Permitir exportação de animais _1 Uma permissão de exportação para animais, podemos obter uma boa renda extra. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_BREEDING_ANIMALS_BUTTON: "Raça animais" #NT!
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T raça animais em sua reserva natural para estabelecer um novo [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] [concept_dubois_habitat] em um estado com um [concept_dubois_nature_reserve]. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text Você pode criar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] se tiver um estado com um [concept_dubois_nature_reserve] que não possui o animal específico da mesma região que o #V Nature Reserve#! ainda e se você tem esse animal em seu [concept_dubois_zoo]. [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]0 ainda e se você tiver #b alpine ibexes#! em seu #b zoo#!.#!" #NT!
  
