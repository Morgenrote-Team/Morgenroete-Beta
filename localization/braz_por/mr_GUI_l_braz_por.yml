 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON: "Zepelim Gigante"
 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T Zepelim Gigante#!\nAs viagens em dirígivel atingiram seu auge. Nossa nação é considerada o berço dos maiores e mais sombrios zepelins do mundo. É hora de surpreender o mundo inteiro com um dirígivel gigantesco e viajar pelo globo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_AIRLINE_LEVEL_4_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui uma [concept_curtiss_airline] de Nível #V 4 ou superior#!.#!"
 MR_AERONAUTICAL_ENGINEER_ZEPPELIN_FOCUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui o #V \"$curtiss_zeppelin_focus_modifier$\"#! [concept_modifier].#!"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "Avião Gigante"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T Avião Gigante#!\nO céu é o último limite. O que antes foi a era das descobertas no início do período moderno é agora a conquista dos céus. Mas, comparados aos galeões dos espanhóis, os navios celestes de hoje são meras cascas de noz. Gigantes oceânicos navegam os mares hoje, mas os céus até agora só foram dominados por pequenas máquinas. O sonho de construir um avião gigantesco que possa transportar não dezenas, mas centenas de pessoas, parece utópico. Mas uma próspera indústria aeronáutica e uma poderosa companhia aérea liderada pelo homem certo poderiam virar o mundo de cabeça para baixo...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
