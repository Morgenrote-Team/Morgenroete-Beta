 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Investimento Acadêmico#!\nUm investimento governamental geral em nossas universidades promoverá o #O Progresso Acadêmico#! em #G +1#! por mês. O fomento está previsto para um período de 10 anos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]  "
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "O Governo [GetPlayer.GetAdjective] já não esta investindo na Academia no momento."
 MR_ACADEMICS_AVANTGARDE_TT: "#T Avantgarde Intelligentsia#!\nUma elite de acadêmicos, com convicções culturais, sociológicas e antropológicas marcantes, dita as regras da vida científica. Em detrimento, os campos de aplicação prática perdem sua proeminência.\n#R Nota#!: Aumenta a frequência de aparição de Acadêmicos em um ponto por mês\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] já não possui o Foco #b Avantgarde Intelligentsia#! e não mudou recentemente seu Foco.#!"
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text Pelo menos #p 50%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_PRACTICAL_TT: "#T Academia Prática#!\nOs cientistas de nossa nação buscam incansavelmente encontrar aplicações práticas para as descobertas de todos os campos do saber. O propósito é servir ao progresso geral e à paz da humanidade.\n#R Nota#!: Aumenta o surgimento de Acadêmicos em um ponto por mês.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetName] já não possui o Foco #b Academia Prática#! e não mudou recentemente seu Foco.#!"
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text Pelo menos #p 50%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_MILITARY_TT: "#T Complexo Militar-Industrial#!\nA cooperação entre os industrialistas e os militares levou ao desenvolvimento de uma teia de conexões, laços pessoais e conhecidos particularmente importante, com apenas um leve toque de corrupção, que pode ser melhor descrita como um Complexo Militar-Industrial.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] já não possui o Foco #b Complexo Industrial-Militar#! e não mudou recentemente seu Foco.#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text Pelo menos #p 50%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_mathematics]#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName] has at least one [GetBuildingType('building_automotive_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plant').GetName] or [GetBuildingType('building_artillery_foundry').GetName] of level #p 5#! or higher.#!"
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text  O Exército [GetPlayer.GetAdjective] tem, ao menos, #b 50#! de tamanho ou mais.#!"
 MR_ACADEMICS_BUSINESS_TT: "#T Escolas de Negócios e Capitalismo Magnata#!\nO indivíduo independente, combinado com uma era próspera de progresso, levou a uma mentalidade na qual escolas de negócios e empresas de médio e grande porte exercem uma influência decisiva na ciência do país. Em contrapartida, as universidades trabalham para aumentar a prosperidade adquirida da nação através de novas tecnologias e para impulsionar ideias sociais através do progresso.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] já não possui o Foco #b Escolas de Negócios e Capitalismo Magnata#! e não mudou recentemente seu Foco.#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text Pelo menos #p 35%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text Pelo menos #p 35%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] has either [GetBuildingType('building_textile_mill').GetName] or [GetBuildingType('building_furniture_manufactory').GetName] of at least level #p 15#! or either [GetBuildingType('building_tooling_workshop').GetName] or [GetBuildingType('building_steel_mill').GetName] of at least level #p 10#! or either [GetBuildingType('building_motor_industry').GetName] or [GetBuildingType('building_electrics_industry').GetName] of at least level #p 5#!.#!"
 MR_ACADEMICS_SEAPOWER_TT: "#T Poder Marítimo e Marinha Mercante#!\nA marinha e o comércio internacional desempenham um papel imenso para o nosso país. Aumentar a prosperidade por meio da produção avançada e do comércio global de nossos produtos é tão importante quanto defender o que já foi conquistado.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] já não possui o Foco #b Poder Marítimo e Marinha Mercante#! e não mudou recentemente seu Foco.#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text Pelo menos #p 35%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text Pelo menos #p 35%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text  A Marinha [GetPlayer.GetAdjective] tem, ao menos, #b 50#! de tamanho ou mais.#!"
 MR_ACADEMICS_USEFUL_TT: "#T Torre de Marfim Útil#!\nA academia é vista em nosso país como um refúgio para mentes excêntricas que contam besouros, polem vasos antigos e se ocupam com toda gama de esquisitices. Contudo, não se pode negar que o isolamento da torre de marfim da sociedade também tem suas vantagens. Sem serem perturbados, muitos professores trabalham melhor.\n#R Nota#!: Aumenta a taxa de surgimento de Acadêmicos em um ponto por mês.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] já não possui o Foco #b Torre de Marfim Útil#! e não mudou recentemente seu Foco.#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text Pelo menos #p 35%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text Pelo menos #p 35%#! das Universidades [GetPlayer.GetAdjective] possuem o [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] tem [GetBuildingType('building_lepsius_archaeological_museum').GetName], um [GetBuildingType('building_verrier_observatory').GetName] ou um [GetBuildingType('building_dubois_zoo').GetName].#!"
 MR_MOUNTAIN_EXPEDITION_TT: "#T Expedição Montanhosa#!\nCom a ascensão do Mont Blanc em 1786, iniciou-se uma nova era de conquista dos picos mais altos da Terra; uma tendência que apenas cresceu durante os séculos XIX e XX. Caso tenhamos uma cadeia montanhosa em um de nossos territórios que ainda não tenha sido escalada, poderíamos delegar a conquista a um general capaz com as habilidades apropriadas.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text  [GetPlayer.GetName] possui pelo menos um #V  Cume não conquistado #! não conquistado, ou tem uma #V Licença de Montanhismo#! de uma nação com acesso a um.#!"
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não conquistou uma montanha recemente, ou falhou uma Expedição Montanhosa.#!"
 MR_ZEPPELIN_EXPEDITION_TT: "#T Expedição Zeppelin#!\nA Aeroarctic, a 'Sociedade Internacional de Estudo para a Exploração do Ártico por Dirigível', era uma associação científica não governamental que tinha como objetivo usar dirigíveis em pesquisas polares. Foi fundada principalmente por iniciativa do aeronauta e posteriormente secretário-geral da sociedade, Walther Bruns. O presidente fundador em 1924 foi Fridtjof Nansen. Após vários anos de trabalho preparatório, a empresa conseguiu, em 1931, usar pela primeira vez um dirigível para uma expedição polar puramente científica. Através do voo do LZ 127 Graf Zeppelin no Ártico, o conhecimento da geografia das regiões polares sobrevoadas foi significativamente ampliado. Já em 1926, Umberto Nobile sobrevoou o Pólo Norte com o seu dirigível 'Norge' e mais tarde empreendeu uma expedição com o 'Italia'.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [GetBuildingType('building_verrier_observatory').GetName] com o método de produção #V Estação Meteorológica#!.#!"
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui ou tem acesso a uma [concept_curtiss_airspace_convention] com um desses estados: #V Groênlandia#!, #V Norte da Noruega#!, #V Alaska#!, #V Nunavut #! ou #V Nenetsia#!.#!"
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não está a bordo de #V uma Expedição Zeppelin#! ou #V teve uma recentemente#!.#!"
 MR_PACIFIC_EXPEDITION_TT: "#T Expedição do Pacífico#!\nJuntamente com os polos, o Oceano Pacífico é uma das últimas áreas da Terra que ainda guardam segredos. Acadêmicos de várias disciplinas científicas estão interessados em uma missão de pesquisa para conduzir estudos naturalísticos, paleontológicos, astronômicos e oceanográficos. Novamente, para as grandes potências, poderia ser um caso de prestígio para mostrar sua influência no fim do mundo.\n\n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetName] é uma #V Grande Potência#! ou uma #V Superpotência#!.#!"
 MR_PACIFIC_PORT_BUILDING_TRIGGER_TT: "#default_text  [GetPlayer.GetName] possui um [GetBuildingType('building_port').GetName].#!"
 MR_PACIFIC_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui uma [GetBuildingType('building_university').GetName].#!"
 MR_PACIFIC_15_FLOTILLAS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 15 ou mais Flotilhas#!.#!"
 MR_PACIFIC_ADMIRAL_AVAILABLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um #V Almirante#! que #V não está ocupado#!.#!"
 MR_PACIFIC_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não está a bordo de #V uma Expedição do Pacífico#! ou #V teve uma recentemente#!.#!"
