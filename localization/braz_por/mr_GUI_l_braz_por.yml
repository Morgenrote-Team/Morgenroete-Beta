 MR_PHYSICIAN_CAN_DESCRIBE_LOCAL_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] está sofrendo de uma doença epidêmica que ainda não foi totalmente descrita.#!"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T Expedição de Observação Médica#!\nUm médico pode empreender uma expedição a uma terra distante onde uma epidemia está a devastar e descrever a doença lá. Este processo leva mais tempo do que um diagnóstico no seu próprio país.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T Expedição de Observação Médica#!\n#p Seu $concept_panum_physician$ está atualmente em uma Expedição de Observação Médica.#!\nUm médico pode empreender uma expedição a uma terra distante onde uma epidemia está em fúria e descrever a doença lá. Este processo leva mais tempo do que um diagnóstico em seu próprio país."
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem interesse num país que está a sofrer de uma doença epidémica que ainda não foi totalmente descrita.#!"
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T Tratamento de Doenças#!\nUm médico pode encontrar um tratamento para uma doença que se espalha como uma epidemia no território nacional. Embora o tratamento não impeça a doença, ele limitará significativamente seu efeito. Para certas doenças, a pesquisa em uma tecnologia específica é necessária antes que um método de tratamento possa ser encontrado.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_ACTIVE_TT: "#T Tratamento de Doenças#!\n#p Seu $concept_panum_physician$ está procurando um tratamento para uma doença.#!\nUm médico pode encontrar um tratamento para uma doença que assola como uma epidemia em território nacional. Embora o tratamento não previna a doença, ele limitará significativamente seus efeitos. Para certas doenças, a pesquisa em uma tecnologia específica é necessária antes que um método de tratamento possa ser encontrado."
 MR_PHYSICIAN_CAN_FIND_LOCAL_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] está sofrendo de uma epidemia que foi descrita, mas para a qual ainda não há tratamento e também tem a tecnologia correspondente.#!"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_BUTTON_TT: "#T Expedição de Pesquisa Médica#!\nUm médico pode empreender uma expedição a uma terra distante onde uma epidemia está assolando e estudar a doença lá para encontrar um tratamento. Este processo leva mais tempo do que em seu próprio país. Para certas doenças, a pesquisa em uma tecnologia específica é necessária antes que um método de tratamento possa ser encontrado.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_ACTIVE_TT: "#T Expedição de Pesquisa Médica#!\n#p Seu $concept_panum_physician$ está procurando um tratamento para uma doença.#!\nUm médico pode empreender uma expedição para uma terra distante onde uma epidemia está assolando e estudar a doença lá para encontrar um tratamento. Este processo leva mais tempo do que em seu próprio país. Para certas doenças, a pesquisa em uma tecnologia específica é necessária antes que um método de tratamento possa ser encontrado."
 MR_PHYSICIAN_CAN_FIND_FOREIGN_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem interesse em um país que sofre de uma doença epidêmica que foi descrita, mas para a qual ainda não há tratamento e que também tem a tecnologia correspondente.#!"
