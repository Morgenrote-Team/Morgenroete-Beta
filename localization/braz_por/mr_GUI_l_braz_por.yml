 MR_RED_CROSS_BUTTON: "Fundar a [concept_panum_red_cross]"
 MR_RED_CROSS_BUTTON_TT: "#T Fundar a [concept_panum_red_cross]#!\nA Cruz Vermelha Internacional é uma das primeiras instituições supranacionais. O estabelecimento desta organização foi um passo importante em direção ao direito internacional. Foi fundada para proteger a vida e a saúde humanas, para garantir o respeito por todos os seres humanos e para prevenir e aliviar o sofrimento humano.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui menos que #V 35 [concept_infamy]#!.#!"
 MR_JOIN_RED_CROSS_BUTTON: "Juntar-se à [concept_panum_red_cross]"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T Juntar-se à [concept_panum_red_cross]#!\nNossa nação pode se juntar à Cruz Vermelha Internacional e melhorar sua reputação através de acordos internacionais - à custa de uma guerra implacável.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_FIRST_CONVENTION_BUTTON: "Assinar a Primeira Convenção"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Assinar a Primeira Convenção#!\nA Primeira Convenção de Genebra, oficialmente a Convenção para a Melhoria da Condição dos Feridos nos Exércitos em Campanha, define 'a base sobre a qual repousam as regras do direito internacional para a proteção das vítimas de conflitos armados'. Uma de suas regulamentações mais importantes é a imunidade contra captura e destruição de todos os estabelecimentos para o tratamento de soldados feridos e doentes e o recebimento e tratamento imparcial de todos os combatentes.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "Assinar a Segunda Convenção"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T Assinar a Segunda Convenção#!\nAs Convenções de Haia de 1899 e 1907 são uma série de tratados e declarações internacionais negociados em duas conferências internacionais de paz em Haia, nos Países Baixos. Ambas as conferências incluíram negociações sobre desarmamento, as leis da guerra e crimes de guerra. A conferência de 1907 teve um foco maior na guerra naval.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Assinar a Terceira Convenção"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Assinar a Terceira Convenção#!\nO Protocolo relativo à Proibição do Uso na Guerra de Gases Asfixiantes, Tóxicos ou Similares e de Meios Bacteriológicos de Guerra, geralmente denominado Protocolo de Genebra, é um tratado que proíbe o uso de armas químicas e biológicas em conflitos armados internacionais. Foi assinado em Genebra em 17 de junho de 1925.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_RED_CROSS_BUTTON: "Deixe a Cruz Vermelha"
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T Deixe a Cruz Vermelha#!\nHomo homini lupus.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T Introduzir Técnicas Médicas#!\nDireciona o Médico a introduzir equipamentos modernos, métodos e tratamentos inovadores em propriedades médicas por toda a nação. Às vezes, um médico pode desenvolver novas invenções espetaculares.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_ACTIVE_TT: "#T Introdução de Técnicas Médicas#!\nSeu Médico está atualmente introduzindo equipamentos modernos, métodos e tratamentos inovadores para propriedades médicas em todo o país. Às vezes, um médico pode desenvolver novas invenções espetaculares."
