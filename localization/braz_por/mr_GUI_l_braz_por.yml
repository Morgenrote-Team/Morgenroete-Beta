 MR_MINERAL_CABINET_BUTTON: "Fundar Gabinete Mineral"
 MR_MINERAL_CABINET_BUTTON_TT: "#T Fundar Gabinete Mineral#!\nUm Gabinete Mineral no seu Zoológico o tornará ainda mais prestigioso. Podemos exibir todos os minerais coletados por nosso [concept_agassiz_geologist] lá.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MINERAL_CABINET_NUMBER_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem #V 50 ou mais#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] (atualmente [GetPlayer.MakeScope.Var('agassiz_rare_minerals_var').GetValue|0+].#!"
 MR_MINERAL_CABINET_EFFECT_TT: "Seu [GetBuildingType('building_dubois_zoo').GetName] receberá um #V Gabinete Mineral#! que lhe dará 50 de prestígio e um pequeno impulso no padrão de vida."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T Explore as Montanhas do Atlântico#!\nApós evidências de elevações submarinas serem encontradas durante a colocação do cabo transatlântico, os principais geólogos estão se perguntando qual poderia ser a causa. Equipamentos de medição modernos e um geólogo experiente poderiam desvendar o mistério.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_EXPERIENCED_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um [concept_agassiz_geologist] #O experiente#! ou #O famoso#!.#!"
 MR_GEOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um [concept_agassiz_geologist] #O Famoso#!.#!"
 MR_PALEONTOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um [concept_dubois_paleontologist] #O Famoso#!.#!"
 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T Prospect Ore#!\nA [concept_agassiz_geologist] can search for new raw material deposits near already established mines and thus increase the production of the ore.\n\nThe building would gain the $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Parar de Prospectar Minério#!\nSeu [concept_agassiz_geologist] está procurando por novos depósitos minerais perto de minas já estabelecidas, assim tentando aumentar a capacidade de produção daquele minério.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T Prospect Oil#!\nA [concept_agassiz_geologist] can search for new oil wells near already established oil rigs and thus increase production.\n\nThe building would gain the $agassiz_building_production_2_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "Visitar o Planetarium"
 VISIT_OBSERVATORY_BUTTON_TT: "#T Visite o Planetarium#!\nO Planetarium oferece a você uma visão geral do conhecimento astronômico de sua nação, outras nações e da comunidade científica"
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Vender Minerais por Minerais Raros#!\nUm [concept_agassiz_geologist] pode comprar [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] de colegas, colecionadores e outros entusiastas da geologia. Para isso, ele tem que trocar uma quantidade considerável de minerais comuns.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "Simpósio Interdisciplinar"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Simpósio Geológico-Paleontológico#!\nAs intersecções entre geologia e paleontologia são amplas. Devemos reunir as luminárias na área e usar as sinergias que surgem desse intercâmbio para criar novas teorias científicas sobre a história da Terra.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Promover Geólogo#!\n#p Você está atualmente promovendo o Geólogo.#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] estudam minerais, vulcões e outras formações geológicas."
 MR_ACADEMICS_PROMOTE_GEOLOGIST_EFFECT_TT: "Seu próximo cientista será um [concept_agassiz_geologist]."
