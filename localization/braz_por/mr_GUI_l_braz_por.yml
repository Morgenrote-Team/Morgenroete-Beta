 #Mountain Expedition 
 MR_MOUNTAIN_EXPEDITION_TT: "#T Mountain Expedition#!\nWith the ascent of Mont Blanc in 1786, a new era of conquering the highest peaks on earth began; a trend that only increased during the 19th and 20th centuries. Se terem uma cordilheira em um de nossos territórios que ainda não foram escalados, poderíamos delegar a conquista a um general capaz com as habilidades apropriadas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "None" #NT!
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "None" #NT!
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não chegou recentemente a uma nova montanha ou falhou em uma expedição de montanha.#!" #NT!
  
 #Zeppelin Expedition 
 MR_ZEPPELIN_EXPEDITION_TT: "#T Zeppelin Expedition#!\nThe Aeroarctic, a 'Sociedade Internacional de Estudos para a Exploração do Ártico por dirigível' era uma associação científica não governamental que havia estabelecido o objetivo de usar aeronaves na pesquisa polar. It was founded mainly on the initiative of the aeronaut and later general secretary of the society, Walther Bruns. The founding president in 1924 was Fridtjof Nansen. Após vários anos de trabalho preparatório, a empresa teve sucesso em 1931 ao usar um dirigível para uma expedição polar puramente científica pela primeira vez. Through the Arctic flight of the LZ 127 Graf Zeppelin, knowledge of the geography of the polar regions flown over was significantly expanded. As early as 1926 Umberto Nobile flew over the North Pole with his airship 'Norge' and later undertook an expedition with the 'Italia'.\n\n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "None" #NT!
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui ou tem acesado com um [concept_curtiss_airspace_convention] a um desses estados: #V Greenland#!, #V Norween Norway#!, #V Alaska#!, #V Nunavut [GetPlayer.GetName]0 ou #V nenetsia §10.[GetPlayer.GetName]0" #NT!
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "None" #NT!
  
 #Pacific Expedition 
 MR_PACIFIC_EXPEDITION_TT: "#T Pacific Expedition#!\nAlong with the poles, the Pacific Ocean is one of the last areas on earth that still hold secrets. Estudiosos de várias disciplinas científicas estão interessadas em uma missão de pesquisa para conduzir estudos naturalistas, paleontológicos, astronômicos e oceanográficos. Again, for the great powers it could be a prestigious affair to show their influence at the end of the world.\n\n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetName] é um #V major Power#! ou um #V Grande Power#!.#!" #NT!
