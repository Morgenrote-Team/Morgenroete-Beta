 MR_NEWSPAPER_NOVEL_BUTTON_NO_NEWSPAPER_NOVEL_SCANDAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] não #V tem#! o modificador #V $manzoni_newspaper_novel_scandal_modifier$#!.#!"
 MR_NEWSPAPER_NOVEL_BUTTON_NO_WRITER_EFFECT_TT: "Seu [concept_manzoni_national_writer] fica #V ocupado#! e escreve um Romance de Jornal."
 MR_READING_TOUR_BUTTON: "Turnê de Leitura"
 MR_READING_TOUR_BUTTON_TT: "#T Enviar Escritor em Turnê de Leitura#!\nUm escritor internacionalmente reconhecido que está em contato com editoras estrangeiras pode aumentar a própria fama do país se ele for em uma turnê de leitura. Isso não só promoverá relacionamentos mútuos, mas também a sua reputação.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
