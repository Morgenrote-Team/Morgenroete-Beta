 MR_EXTINCTION_CONGRESS_BUTTON: "Congresso sobre Extinção"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Congresso sobre Extinção#!\nUm dos mistérios mais intrigantes da história natural continua sendo o desaparecimento dos dinossauros. O pai da paleontologia, Georges Cuvier, descobriu que houve uma extinção em massa no final do período Cretáceo, na qual os dinossauros também morreram. Mas como os terríveis lagartos, que dominaram a terra por milhões de anos, puderam se tornar obsoletos de repente?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_PALEONTOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [concept_dubois_paleontologist].#!"
