 MR_PADDOCK_FIRE_MECHANIC_BUTTON_TT: "#T As equipes do Mechanic#!\nRacing podem preencher uma posição mecânica se o mecânico atual não atender aos requisitos esperados. No entanto, um novo mecânico só pode ser recrutado após um intervalo de dois anos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
