 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON: "Fósseis para Osso"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T Transformar Fósseis em um Osso#!\nUm [concept_dubois_paleontologist] experiente ou famoso pode transformar 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] em um [concept_dubois_dinosaur_bone] se você já possui pelo menos um osso e não tem muitos ossos de cada continente.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSFORM_FOSSILS_TO_BONES_TRANSFORMABLE_DINOSAUR_BONE_TRIGGER: "#default_text [GetPlayer.GetName] já possui #V pelo menos 1#! [concept_dubois_dinosaur_bone] e ainda #V não possui todos os Ossos necessários de cada continente#!.#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_FOSSILS_TRIGGER: "#default_text [GetPlayer.GetName] possui #V 20 ou mais #! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')].#!"
