 MR_PHYSICIAN_DESCRIBE_DISEASE_BUTTON_TT: "#T Descrição da doença § 1 O médico pode descrever uma doença não descrita anteriormente em detalhes mais científicos se estiver furioso como uma epidemia no território nacional. Esta é uma etapa preliminar importante no desenvolvimento de um método de tratamento subsequente. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T Descrição da doença §1 Seu $concept_panum_physician$ está atualmente trabalhando em uma primeira descrição de uma doença.#!\nA O médico pode descrever uma doença anteriormente não descrita em detalhes mais científicos se for uma epidemia no território nacional. Esta é uma etapa preliminar importante no desenvolvimento de um método de tratamento subsequente." #NT!
