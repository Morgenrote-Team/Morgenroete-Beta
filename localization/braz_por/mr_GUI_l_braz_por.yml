 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON: "None" #NT!
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T Transforme fósseis em um osso_1 Experiente ou famoso [concept_dubois_paleontologist] pode transformar 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] em um [concept_dubois_dinosaur_bone] se você já possui pelo menos um osso e não possui muitos ossos de cada continente. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_TRANSFORM_FOSSILS_TO_BONES_TRANSFORMABLE_DINOSAUR_BONE_TRIGGER: "None" #NT!
 MR_TRANSFORM_FOSSILS_TO_BONES_FOSSILS_TRIGGER: "#default_text [GetPlayer.GetName] tem #V 20 ou mais §3 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')].#!" #NT!
