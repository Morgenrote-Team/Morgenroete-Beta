 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T A viagem gigante do Zeppelin_1 atingiu seu pico. Nossa nação é considerada o local de nascimento do maior e mais sombrio zepelins do mundo. É hora de surpreender o mundo inteiro com um dirigível gigantesco e viajar pelo globo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
