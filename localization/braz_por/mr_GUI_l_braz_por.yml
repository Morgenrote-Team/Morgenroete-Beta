 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Rede Telegráfica" #NT!
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Estabeleça uma rede telegráfica #!\nTelegraphy revoluciona as comunicações de um país, melhorando os serviços e a infraestrutura em regiões onde existe uma rede telegráfica. A fiação de uma nação se torna mais difícil quanto maior o país. Os pólos de telégrafo só podem ser construídos em um estado cujo estado vizinho também possui um pólo de telégrafo. Para telegrafing no exterior, são necessários o telégrafo elétrico e o eletromagnetismo para colocar cabos submarinos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
