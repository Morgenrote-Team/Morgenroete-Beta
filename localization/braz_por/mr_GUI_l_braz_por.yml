 TOTAL_GEOLOGICAL_KNOWLEDGE_VAR_TT: "#header [concept_agassiz_geological_knowledge]#!\n[GetPlayer.GetName] has collected @agassiz_geological_knowledge! [GetPlayer.MakeScope.GetVariable('agassiz_geological_knowledge_var').GetValue|V0] out of @agassiz_geological_knowledge! [GetGlobalVariable('agassiz_geological_knowledge_global_var').GetValue|V0] [concept_agassiz_geological_knowledge] collected by all countries."
