 MR_CHEMIST_CONGRESS_BUTTON: "Congresso sobre Química"
 MR_CHEMIST_TRIGGER_TT: "#default_text Possui um [concept_mendelejew_chemist].#!"
 MR_CHEMIST_CONGRESS_5_CHEMISTS_TRIGGER_TT: "#default_text Pelo menos #V 5 países#! têm um [concept_mendelejew_chemist].#!"
 MR_CHEMIST_CONGRESS_ELEMENTS_TRIGGER_TT: "#default_text Um total de pelo menos #V 60#! [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] foram verificados em todo o mundo [GetGlobalVariable('mendelejew_isolated_elements_global_number_var').GetValue|+0] foram isolados).#!"
 MR_MOUNT_SKELETON_ACTIVE_TT: "#T Construir Esqueleto de Dinossauro#!\n#p Seu Paleontólogo está construindo um Esqueleto de Dinossauro.#!\nSeu [concept_dubois_paleontologist] pode construir um novo [concept_dubois_dinosaur_skeleton] com 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] do mesmo continente."
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T Remontar Esqueleto de Dinossauro#!\n#p Seu Paleontólogo está remontando um Esqueleto de Dinossauro.#!\nSe você tiver algum [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] imperfeito, você pode deixar seu [concept_dubois_paleontologist] tentar remontá-lo. Se seu Paleontólogo for experiente o suficiente, o esqueleto remontado pode ser de melhor qualidade."
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expedição ao Vale dos Reis#!\n#p Seu Arqueólogo está em uma expedição ao Vale dos Reis.#!\nCom a antiga capital Tebas e o Vale dos Reis, o Alto Egito é considerado a Meca da Egiptologia. Devemos adquirir uma licença de escavação para a área e procurar por tesouros egípcios."
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expedição às Pirâmides#!\n#p O seu Arqueólogo está em uma expedição às Pirâmides.#!\nDesde o início dos tempos, as pirâmides Egípcias fascinam a humanidade. Diz-se que outras tumbas, templos e até cidades que desapareceram nas areias do Baixo Egito esperam ser redescobertas."
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T Expedição à Babilônia#!\n#p Seu Arqueólogo está em uma expedição à Babilônia.#!\nA Babilônia, a parte sul da Mesopotâmia, deve seu nome à outrora poderosa cidade da Babilônia. A região é considerada o 'Berço da Civilização', onde preciosos artefatos arqueológicos são descobertos repetidamente. Eles definitivamente pertencem a um Museu."
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T Expedição à Assíria#!\n#p Seu Arqueólogo está em uma expedição à Assíria.#!\nA Assíria refere-se à parte norte da Mesopotâmia, com as duas cidades importantes de Assur e Nínive. O escasso conhecimento sobre o país ainda pode ser rastreado até a Bíblia como fonte - mas talvez haja evidências históricas mais confiáveis?"
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T Expedição a Argólida#!\n#p Seu Arqueólogo está em uma expedição à Argólida.#!\nApós a descoberta de Troia, até mesmo cientistas céticos começam a perceber que os mitos dos antigos gregos são mais do que apenas contos de fadas. Restos de cidades da Idade do Bronze estariam em Argólida até hoje, a mais conhecida delas é Micenas. Devemos nos convencer disso."
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T Expedição a Creta#!\n#p Seu Arqueólogo está em uma expedição a Creta.#!\nDiz-se que o lendário Rei Minos governou Creta. Semelhante a Troia e Micenas, também parece haver algo de verdade nesta história: artefatos da lendária cultura Minoica são cada vez mais encontrados na ilha. A nossa nação também devia garantir alguns deles."
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T Expedição ao Iucatã#!\n#p Seu Arqueólogo está atualmente em uma expedição ao Iucatã.#!\nOs relatos de cidades desconhecidas e enormes no meio da selva aumentaram. Devemos investigar mais a fundo e enviar uma expedição arqueológica ao Iucatã."
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T Expedição ao Peru#!\n#p Seu Arqueólogo está em uma expedição ao Peru.#!\nOs pilotos relatam estranhas fortalezas e estruturas muradas nos Andes que viram em seus voos sobre o Peru. Talvez os espanhóis não tenham destruído completamente a cultura dos Incas? Algumas cidades de resistência indígena não foram encontradas até hoje."
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T Identificar Fósseis#!\n#p Seu Antropólogo está identificando fósseis.#!\nUm [concept_lepsius_anthropologist] tem a capacidade de analisar um osso desconhecido ao longo do tempo e atribuí-lo a uma espécie humana ou pré-humana específica. Se ele conseguir atribuir três ossos à mesma espécie, poderá sistematizar essa espécie com sucesso. O tempo necessário para identificar corretamente um osso depende da experiência do antropólogo."
 MR_CONDUCTING_ACTIVE_TT: "#p O seu Compositor está conduzindo uma Temporada na Ópera.#!\n[Localize('concept_elgar_conducting_desc')]"
 MR_MUSIC_TOUR_ACTIVE_TT: "#p Seu Compositor está em uma Turnê Musical.#!\n[Localize('concept_elgar_musical_tour_desc')]"
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T Romance de Jornal#!\n#p Seu Escritor está atualmente escrevendo um Romance de Jornal.#!\nNo século XIX, o romance de jornal garantia a muitos autores uma renda segura e fama nacional. Muitos escritores conhecidos da época, como Tolstói, Dostoiévski, Flaubert e Dumas, publicaram seus romances pela primeira vez como folhetins em jornais antes de serem publicados como livros."
 MR_READNG_TOUR_ACTIVE_TT: "#T Turnê de Leitura#!\n#p Seu escritor está atualmente em uma Turnê de Leitura#!\nUm escritor reconhecido internacionalmente que está em contato com editoras estrangeiras pode aumentar a fama do próprio país se fizer uma turnê de leitura. Isso não só promoverá relações mútuas, mas também sua reputação."
 MR_PAINTER_TRIP_ACTIVE_TT: "#T Jornada Educacional#!\n#p Seu Pintor está atualmente em uma Jornada Educacional.#!\nEm uma [concept_klimt_painter_trip], um artista pode aprender um estilo de arte previamente desconhecido e, assim, melhorar a [concept_klimt_painting_tradition] anual. Eles também podem adquirir outros traços positivos e negativos durante sua estadia em um [concept_artists_center_of_arts] estrangeiro."
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T Expedição Montanhosa#!\n#p Atualmente, há uma Expedição Montanhosa em andamento.#!\nCom a ascensão do Mont Blanc em 1786, uma nova era de conquista dos picos mais altos da terra começou; uma tendência que só aumentou durante os séculos XIX e XX. Caso tenhamos uma cadeia montanhosa em um de nossos territórios que ainda não tenha sido escalada, poderíamos delegar a conquista a um general capaz com as habilidades apropriadas."
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T Missão de Combate Aéreo#!\n#p Seu Piloto está atualmente em uma Missão de Combate Aéreo.#!"
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T Parada de Aeronaves#!\n#p Seu Piloto está atualmente participando de uma Parada de Aeronaves.#!"
 academics_academy_progress_observatory_tt_loc: "\n#p 1 Point#! for #V promoting an#! [concept_tesla_engineer], [concept_mendelejew_chemist] or [concept_verrier_astronomer] and having an [GetBuildingType('building_verrier_observatory').GetName]."
 academics_academy_progress_observatory_inactive_tt_loc: "\n#default_text 1 Point for promoting an [concept_tesla_engineer], [concept_mendelejew_chemist] or [concept_verrier_astronomer] and having an [GetBuildingType('building_verrier_observatory').GetName].#!"
 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T Congresso sobre Química#!\nO Congresso de Karlsruhe foi o primeiro simpósio internacional sobre química moderna. Aconteceu de 3 a 5 de setembro de 1860 por iniciativa de Friedrich August Kekulé von Stradonitz, Charles Adolphe Wurtz e Karl Weltzien no Ständehaus em Karlsruhe. Os tópicos incluíram a nomenclatura de compostos químicos e sua representação formulária, bem como a questão dos pesos atômicos e moleculares de compostos químicos. Foi a primeira conferência internacional de química do mundo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
