 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T Expedição de observação médica #!\nA O médico pode realizar uma expedição a uma terra distante, onde uma epidemia está furiosa e descreve a doença lá. Este processo leva mais tempo que um diagnóstico em seu próprio país. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T Expedição de observação médica §1 Seu $concept_panum_physician$ está atualmente em uma expedição de observação médica.#!\nA O médico pode realizar uma expedição a uma terra distante, onde uma epidemia está furiosa e descreve a doença lá. Esse processo leva mais tempo do que um diagnóstico em seu próprio país." #NT!
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem interesse em um país que sofre de uma doença epidêmica que ainda não foi totalmente descrita.#!" #NT!
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T Tratamento da doença _1 O médico pode encontrar um tratamento para uma doença riving como uma epidemia no território nacional. Embora o tratamento não impeça a doença, ele limitará significativamente seu efeito. Para certas doenças, a pesquisa sobre uma tecnologia específica é necessária antes que um método de tratamento possa ser encontrado. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PHYSICIAN_FIND_TREATMENT_ACTIVE_TT: "#T Tratamento da doença §1 Seu $concept_panum_physician$ está pesquisando um tratamento para uma doença.#!\nA O médico pode encontrar um tratamento para uma doença riving como uma epidemia no território nacional. Embora o tratamento não impeça a doença, ele limitará significativamente seu efeito. Para certas doenças, a pesquisa sobre uma tecnologia específica é necessária antes que um método de tratamento possa ser encontrado." #NT!
