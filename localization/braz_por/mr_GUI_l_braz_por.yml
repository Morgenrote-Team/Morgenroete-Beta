 MR_PROMOTE_CHEMIST_TT: "#T Promover Chemist#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] são cientistas que se concentram na descoberta de novos elementos e na melhoria da sua indústria química." #NT!
 MR_PROMOTE_GEOLOGIST_TT: "#T Promover geólogo §1 Minerais, vulcões e outras formações geológicas." #NT!
 MR_PROMOTE_NATURALIST_TT: "#T Promover Naturalist#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] pode capturar animais em casa ou no exterior, encontrar espécimes ou liderar expedições botânicas. \ N \ n#n Nota: #! Você só pode ter um naturalista em um momento.[GetPlayer.GetCustom('mr_promote_has_naturalist_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T Promoção Paleontologista #!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] Pode examinar as formações geológicas para fósseis e ossos de dinossauros ou encontrá -los em expedições." #NT!
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T Promover arqueólogo #!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] pode encontrar artefatos, fazer grandes descobertas e participar de conferências arqueológicas." #NT!
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T Promover antropologista #!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] Estude as origens dos seres humanos, desde o início da evolução humana até a Idade da Pedra." #NT!
 MR_PROMOTE_COMPOSER_TT: "#T Promover composer#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] são necessários para criar uma próspera cultura musical. Eles ajudarão um país a criar mais [concept_elgar_musical_tradition]. \ N \ n#n Nota: #! Você só pode ter um compositor de cada vez.[GetPlayer.GetCustom('mr_promote_has_composer_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PROMOTE_WRITER_TT: "#T Promoção Writer#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] são mestres de narrativa e trabalho em livros e outras literatura. Com o trabalho deles, eles fortalecem um países [concept_manzoni_literary_tradition]. \ N \ n#n Nota: #! Você só pode ter um escritor nacional e 3 escritores locais de cada vez.[GetPlayer.GetCustom('mr_promote_has_writers_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PROMOTE_PAINTER_TT: "#T Promover pintor#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] Capture impressões, paisagens e maravilhas do mundo em tela. Através de suas obras -primas, eles fortalecem o [concept_klimt_painting_tradition] de um país. \ N \ n#n Nota: #! Você só pode ter um pintor de cada vez.[GetPlayer.GetCustom('mr_promote_has_painter_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
