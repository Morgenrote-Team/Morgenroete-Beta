 MR_IMPRESSIONISM_BUTTON: "Impressionismo"
 MR_IMPRESSIONISM_BUTTON_TT: "#T Escolher Impressionamis #!\n[concept_elgar_impressionism] é um estilo na história da arte que se caracteriza pela representação atmosférica de instantâneos fugazes de uma cena. Surgiu de um movimento dentro da pintura na França na segunda metade do século XIX. O termo impressionismo também foi aplicado a certos estilos de música, literatura, cinema e fotografia. Enquanto muitos naturalistas, como Heinrich Hart, rejeitaram a música como meio de expressar um \"acionismo em busca da verdade”, os impressionistas muitas vezes consideravam um prazer o \"sonhar sem objetivo à frente” com acordes coloridos finamente graduados.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text O [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] [GetPlayer.GetAdjective] é [concept_powerful].#!"
 MR_NOT_POWERFUL_INTELLIGENTSIA_TRIGGER_TT: "#default_text A [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] [GetPlayer.GetAdjective] não é [concept_powerful].#!"
 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text A [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] [GetPlayer.GetAdjective] possui um [concept_approval] de #V 5 ou maios #!.#!"
 MR_EXPRESSIONISM_BUTTON: "Expressionismo"
 MR_EXPRESSIONISM_BUTTON_TT: "#T Escolher Expressionismo#!\n[concept_elgar_expressionism] é um estilo de arte. Seus primórdios e precursores podem ser encontrados no final do século XIX. Assim como o Impressionismo, o Simbolismo e o Fauvismo, o Expressionismo é um movimento contra as tendências do Naturalismo. No Expressionismo, o nível expressivo supera o nível estético, apelativo e factual. O artista quer representar sua experiência para o espectador. Em contraste com o impressionismo musical, que retrata a percepção da aparência externa das coisas, os movimentos artísticos expressionistas formulam as emoções da alma humana.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text A [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] ou as [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] [GetPlayer.GetAdjective] são [concept_powerful].#!"
 MR_NOT_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Os [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] [GetPlayer.GetAdjective] não são [concept_powerful].#!"
 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text A [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] ou as [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] [GetPlayer.GetAdjective] possuem uma [concept_approval] de #V 5 ou mais#!.#!"
 MR_ART_NOUVEAU_BUTTON: "Art Nouveau"
 MR_ART_NOUVEAU_BUTTON_TT: "#T Escolher Art Nouveau#!\n[concept_elgar_art_nouveau], principalmente em conexão com a Itália também Stile liberty, é uma época histórico-artística na virada do século XIX para o XX. Correntes que podem ser atribuídas à Art Nouveau são o estilo reformista (após o movimento reformista), o estilo Secessão (após a Secessão de Viena), o Modernismo na Catalunha, na Suíça o Style Sapin e nos EUA o Tiffany Style. Além da expressão Art nouveau, que é dominante em francês, inglês e italiano, Modern Style também é usado em inglês e Stile Floreale em italiano. Em termos de tempo, Art Nouveau pertence ao fin de siècle.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
