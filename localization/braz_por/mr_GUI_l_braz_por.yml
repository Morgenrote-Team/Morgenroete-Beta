 MR_PHYSICIAN_DESCRIBE_DISEASE_BUTTON_TT: "#T Descrição da Doença#!\nUm médico pode descrever uma doença previamente não descrita com mais detalhes científicos se ela estiver ocorrendo como uma epidemia em território nacional. Este é um importante passo preliminar no desenvolvimento de um método de tratamento subsequente.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T Descrição da Doença#!\n#p O seu $concept_panum_physician$ está atualmente a trabalhar numa primeira descrição de uma doença.#!\nUm médico pode descrever uma doença previamente indescrita com mais detalhes científicos se esta estiver a assolar o território nacional como uma epidemia. Este é um passo preliminar importante no desenvolvimento de um método de tratamento subsequente."
