 MR_JOIN_RED_CROSS_BUTTON_TT: "#T Junte -se à nação [concept_panum_red_cross]#!\nOur pode ingressar na Cruz Vermelha Internacional e melhorar sua reputação por meio de acordos internacionais - às custas da guerra implacável. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
