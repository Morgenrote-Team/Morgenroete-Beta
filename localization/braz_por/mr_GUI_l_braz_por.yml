 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_BUTTON_TT: "#T Expedição de pesquisa médica #!\nA O médico pode realizar uma expedição a uma terra distante, onde uma epidemia está furiosa e estudar a doença lá para encontrar um tratamento. Esse processo leva mais tempo do que em seu próprio país. Para certas doenças, a pesquisa sobre uma tecnologia específica é necessária antes que um método de tratamento possa ser encontrado. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_ACTIVE_TT: "#T Expedição de pesquisa médica #!\n#p Seu $concept_panum_physician$ está pesquisando um tratamento para uma doença.#!\nA O médico pode realizar uma expedição a uma terra distante em que uma epidemia está furiosa e estudar a doença lá para encontrar um tratamento. Esse processo leva mais tempo do que em seu próprio país. Para certas doenças, a pesquisa sobre uma tecnologia específica é necessária antes que um método de tratamento possa ser encontrado." #NT!
