 MR_FOSSIL_IDENTIFICATION_BUTTON_TT: "#T Identifique os fósseis #!\nAn [concept_lepsius_anthropologist] tem a capacidade de analisar um osso desconhecido ao longo do tempo e atribuí-lo a uma espécie humana ou pré-humana específica. Se ele conseguir atribuir três ossos à mesma espécie, poderá sistematizar com sucesso esta espécie. O tempo que leva para identificar corretamente um osso depende da experiência do antropólogo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
