 MR_IMPROVE_RUBBER_ACTIVE_TT: "#T Melhorar Silvicultura#!\n#p Seu Naturalista está melhorando uma [GetBuildingType('building_rubber_plantation').GetName].#!"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON: "Borracha Sintética"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON_TT: "#T Borracha Sintética#!\nA borracha está limitada a uma zona climática muito pequena. Sem colónias ou importações, é quase impossível obter esta valiosa matéria-prima. Mas talvez as possibilidades da química possam compensar o que nos falta noutros lugares?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_BUTTON: "Document Local Fauna"
 MR_ANIMAL_DOCUMENTATION_BUTTON_TT: "#T Document Local Fauna#!\nThe native fauna should not be neglected in all ambitions to research animals that are as exotic as possible. A naturalist can closely study animals in habitats that live in their core provinces and write scientific papers about them.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_ACTIVE_TT: "#T Document Local Fauna#!\n#p Your Naturalist is currently documenting the local wildlife.#!\nThe native fauna should not be neglected in all ambitions to research animals that are as exotic as possible. A naturalist can closely study animals in habitats that live in their core provinces and write scientific papers about them."
 MR_CAN_DOCUMENT_ANIMAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um estado integrado com um habitat animal que abriga um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] não documentado.#!"
