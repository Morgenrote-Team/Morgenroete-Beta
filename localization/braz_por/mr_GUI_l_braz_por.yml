 MR_UPPER_EGYPT_EXPEDITION_TT: "#T Envie uma expedição ao vale dos Kings#!\nWith A antiga capital Tebas e o vale dos reis, o Upper Egypt é considerado a meca da egiptologia. Devemos adquirir uma licença de escavação para a área e procurar tesouros egípcios. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Lepsius escreveu uma carta a Rosellini#!, que iniciou a arqueologia no Egito.#!" #NT!
 MR_UPPER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Atualmente não está financiando §3 e [concept_lepsius_expedition] para o Upper Egypt.#!" #NT!
 MR_UPPER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o estado do Egito Upper" #NT!
  
 MR_LOWER_EGYPT_EXPEDITION_TT: "#T Envie uma expedição para as pirâmides #!\nSince No início dos tempos, as pirâmides egípcias fascinaram a humanidade. Dizem que outros túmulos, templos e até cidades que desapareceram nas areias do Baixo Egito estão esperando para serem redescobertos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Atualmente não está financiando §3 e [concept_lepsius_expedition] para diminuir o Egito.#!" #NT!
 MR_LOWER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o estado do Egito Baixo Egito_3 ou possui um [concept_lepsius_excavation_licence] com seu proprietário.#!" #NT!
  
 MR_BABYLONIA_EXPEDITION_TT: "#T Envie uma expedição ao berço da civilização §1 A parte sul da Mesopotâmia deve seu nome à cidade antes poderosa da Babilônia. A região é considerada o 'berço da civilização', onde os preciosos artefatos arqueológicos são descobertos repetidamente. Eles definitivamente pertencem a um museu. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V A língua acadiana foi decifrada #!, permitindo arqueologia na Mesopotâmia.#!" #NT!
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Atualmente não está financiando §3 e [concept_lepsius_expedition] para a Babilônia.#!" #NT!
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o estado de Bagdadad_3 ou possui um [concept_lepsius_excavation_licence] com seu proprietário.#!" #NT!
  
 MR_ASSYRIA_EXPEDITION_TT: "#T Envie uma expedição a jardins de Assíria odração refere -se à parte norte da Mesopotâmia com as duas importantes cidades de Assur e Nínive. O conhecimento escasso sobre o país ainda pode ser rastreado até a Bíblia como fonte - mas talvez haja evidências históricas que sejam mais confiáveis? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Atualmente não está financiando §3 e [concept_lepsius_expedition] para assíria.#!" #NT!
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o estado de Mossul#! ou possui um [concept_lepsius_excavation_licence] com seu proprietário.#!" #NT!
  
 MR_ARGOLIS_EXPEDITION_TT: "#T Envie uma expedição à cidade de Agamenon, a descoberta de Tróia, até os cientistas céticos percebem que os mitos dos gregos antigos são mais do que apenas contos de fadas. Diz -se que os restos mortais das cidades da Idade do Bronze estão em Argolis até hoje, a mais conhecida das quais são Micenas. Devemos nos convencer disso." #NT!
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Schliemann descobriu Troy#!, permitindo arqueologia na Grécia.#!" #NT!
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Atualmente não está financiando §3 e [concept_lepsius_expedition] para argolis.#!" #NT!
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o estado de Peloponeso #! ou possui um [concept_lepsius_excavation_licence] com seu proprietário.#!" #NT!
  
 MR_CRETE_EXPEDITION_TT: "#T Envie uma expedição aos palácios de Creta#!\nThe O lendário rei Minos tem uma vez governado por Creta. Semelhante a Troy e Micenas, também parece haver algo nessa história: os artefatos da lendária cultura minóica são cada vez mais encontrados na ilha. Nossa nação também deve garantir alguns deles. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Atualmente não está financiando §3 e [concept_lepsius_expedition] para Creta.#!" #NT!
 MR_CRETE_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o estado de Creta#! ou possui um [concept_lepsius_excavation_licence] com seu proprietário.#!" #NT!
  
 MR_YUCATAN_EXPEDITION_TT: "#T Envie uma expedição para as cidades perdidas dos maias das cidades desconhecidas e enormes no meio da selva aumentou. Devemos investigar mais e enviar uma expedição arqueológica para Yucatán. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Stephens & Catherwood empreendeu uma expedição #!, permitindo arqueologia em yucatán.#!" #NT!
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Atualmente não está financiando §3 e [concept_lepsius_expedition] para yucatán.#!" #NT!
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o estado de Yucatán#! ou possui um [concept_lepsius_excavation_licence] com seu proprietário.#!" #NT!
  
 MR_PERU_EXPEDITION_TT: "#T Envie uma expedição para procurar o legado oculto dos incas#!\nPilots Relatório fortalezas estranhas e estruturas muradas nos Andes que viram em seus vôos sobre o Peru. Talvez os espanhóis não destruíssem completamente a cultura dos incas? Algumas cidades de resistência indígena não foram encontradas até hoje. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Bingham descobriu machu picchu#!, permitindo arqueologia no Peru.#!" #NT!
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Atualmente não está financiando §3 e [concept_lepsius_expedition] para o Peru.#!" #NT!
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o estado de Peru#! ou possui um [concept_lepsius_excavation_licence] com seu proprietário.#!" #NT!
  
 MR_EXODUS_CONGRESS_BUTTON: "Congresso no êxodo" #NT!
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T Congresso sobre o êxodo_1 O aumento da pesquisa sobre o Egito e o Levante, a questão da historicidade dos eventos bíblicos surge novamente. Em particular, a não mencionação do êxodo, ou seja, a partida dos hebreus do Egito, levantou a questão de saber se os cinco livros de Moisés não são apenas meras invenções. Cientistas radicais até exigem que todas as histórias bíblicas sejam completamente ignoradas. Outro grupo argumenta que as histórias da Bíblia não podem ser levadas literalmente, mas elas têm valor científico. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] precisa de pelo menos #V 25#! @lepsius_egypt_minor! Egípcio [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (atualmente [GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+]) .#!" #NT!
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text pelo menos #V 150#! @Lepsius_Egypt_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] foram encontrados em todo o mundo (atualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @Lepsius_Egypt_minor!" #NT!
  
 MR_CIVILIZATION_CONGRESS_BUTTON: "Congresso sobre civilização" #NT!
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T Congresso sobre a ascensão da civilização § 1 Séculos. Mas com o aumento diário de achados da Assíria e da Babilônia, essa teoria foi claramente abalada. Em vez disso, acontece que a escrita foi aparentemente inventada na Mesopotâmia - assim como muitas outras realizações que acompanharam o início da civilização. Talvez seja o caso que toda civilização emergiu da Babilônia - e toda forma de religião deriva dos mitos babilônicos? O épico de Gilgamesh talvez seja a inspiração para todo tipo de literatura - da Bíblia aos épicos homéricos? \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] precisa de pelo menos #V 25#! @lepsius_mesopotamia_minor! Mesopotâmico [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (atualmente [GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+]) .#!" #NT!
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text pelo menos #V 300#! @Lepsius_mesopoTamia_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] foram encontrados em todo o mundo (atualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @Lepsius_mesopoTamia_minor! Foram encontrados) .#!" #NT!
  
 MR_TROY_CONGRESS_BUTTON: "Congresso em Troy" #NT!
 MR_TROY_CONGRESS_BUTTON_TT: "#T Congresso em Troy#!\nSchliemann Encontrou Troy. Pelo menos é o que ele afirma. Embora as vozes críticas que consideravam Troy uma mera invenção diminuíram, toda uma série de perguntas permanece sem resposta. O Troy é encontrado por Schliemann, o Homérico Troy? E o que era Troy, afinal? Vários acadêmicos permanecem céticos. E novas descobertas da Anatólia podem lançar uma nova luz sobre as descobertas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] precisa de pelo menos #V 25#! @lepsius_aegean_minor! Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (atualmente [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+]) .#!" #NT!
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text pelo menos #V 300#! @Lepsius_AEGEAN_MINOR! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] foram encontrados em todo o mundo (atualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_aegean_minor!" #NT!
  
 MR_INSPECT_EXCAVATION_BUTTON: "Inspecione a escavação" #NT!
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T Inspecione a escavação #!\nWe pode enviar um arqueólogo experiente para uma área onde estamos escavando para intensificar nossos esforços lá. Nosso arqueólogo abrirá um novo local de escavação em cerca de um ano e conduzirá pesquisas intensivas, durante as quais podemos encontrar mais indicações de grandes descobertas arqueológicas anteriormente desconhecidas. O sucesso depende em grande parte da experiência de nosso arqueólogo. O estabelecimento de uma sociedade arqueológica também aumenta nossas chances. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V pelo menos um [concept_lepsius_excavation]#! em andamento em uma área onde nenhuma grande descoberta arqueológica foi feita.#!" #NT!
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text [GetPlayer.GetName] deve ter #V estudado pelo menos 30 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]#! em uma região específica antes de procurar pistas lá.#!" #NT!
  
 MR_CANCEL_EXCAVATION_BUTTON: "Cancelar escavação" #NT!
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T Cancelar escavação#!\nIn Algumas situações, pode ser útil recordar uma equipe de escavação. Nossos artefatos e coleções adquiridos permanecerão, mas nossa escavação permanente terminará. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem pelo menos #V 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] fazendo um [concept_lepsius_excavation].#!" #NT!
  
 MR_LOCAL_EXCAVATION_BUTTON: "Escavação local" #NT!
 MR_LOCAL_EXCAVATION_BUTTON_TT: "#T Escavação local #!\nArchaeological Os tesouros não estão apenas esperando para serem descobertos longe. Embora as escavações locais sejam consideradas menos prestigiadas do que a busca pelos artefatos famosos, ela fornece uma visão da era pré -histórica de nossa região natal. Ao contrário das escavações após uma expedição, as escavações locais não podem ser concluídas até o financiamento acabar. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
  
