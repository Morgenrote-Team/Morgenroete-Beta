 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "Avião gigante" #NT!
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T Airplano gigante Sky é o último limite. O que antes foi a era da descoberta no início do período moderno é agora a conquista dos céus. Mas, em comparação com os galeões dos espanhóis, os vasos celestes de hoje são meras nozes. Os gigantes do oceano navegam nos mares hoje, mas os céus até agora só foram dominados por pequenas máquinas. O sonho de construir um avião gigantesco que pode transportar não dezenas, mas centenas de pessoas parecem utópicas. Mas uma próspera indústria de aeronaves e uma companhia aérea poderosa chefiada pelo homem certo podem virar o mundo de cabeça para baixo ... \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
