 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Congresso sobre a Origem dos Humanos Modernos#!\nCom a descoberta de ossos humanos pré-históricos, surgiu também a questão da origem original do homem. Enquanto Darwin assumiu uma origem africana, outros postularam vários desenvolvimentos paralelos. A partir da virada do século, a visão dominante era que os humanos modernos se desenvolveram na Ásia.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
