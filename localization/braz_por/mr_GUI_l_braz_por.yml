 MR_CHEMIST_CONGRESS_ELEMENTS_TRIGGER_TT: "#default_text Um total de pelo menos #V 60#! [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] foram verificados em todo o mundo [GetGlobalVariable('mendelejew_isolated_elements_global_number_var').GetValue|+0] foram isolados) .#!" #NT!
  
 MR_MOUNT_SKELETON_ACTIVE_TT: "#T Construa o esqueleto de dinossauros seu paleontologista está atualmente construindo um esqueleto de dinossauro.#!\nYour [concept_dubois_paleontologist] pode construir um novo [concept_dubois_dinosaur_skeleton] com 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] do mesmo continente." #NT!
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T Remunha Squeleto de dinossauro #!\n#p Seu paleontologista está atualmente remontando um esqueleto de dinossauro.#!\nIf Você tem qualquer [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] imperfeito, pode deixar seu [concept_dubois_paleontologist] tentar remontá -lo. Se o seu paleontologista tiver experiência suficiente, o esqueleto Remoundet pode ser de melhor qualidade." #NT!
  
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expedição ao vale dos Kings#!\n#p Seu arqueólogo está atualmente em uma expedição ao vale do rei. Devemos adquirir uma licença de escavação para a área e procurar tesouros egípcios." #NT!
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expedição para as pirâmides #!\n#p Seu arqueólogo está atualmente em uma expedição às pirâmides.#!\nSince No início dos tempos, as pirâmides egípcias fascinaram a humanidade. Dizem que outros túmulos, templos e até cidades que desapareceram nas areias do Baixo Egito estão esperando para serem redescobertos." #NT!
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T Expedição para a Babilônia #!\n#p Seu arqueólogo está atualmente em uma expedição à Babilônia.#!\nBabylonia, A parte sul da Mesopotâmia deve seu nome à cidade antes poderosa da Babilônia. A região é considerada o 'berço da civilização', onde os preciosos artefatos arqueológicos são descobertos repetidamente. Eles definitivamente pertencem a um museu." #NT!
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T Expedição a Assíria §1 Seu arqueólogo está atualmente em uma expedição à Assíria. O conhecimento escasso sobre o país ainda pode ser rastreado até a Bíblia como fonte - mas talvez haja evidências históricas mais confiáveis?" #NT!
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T Expedição a Argolis#!\n#p Seu arqueólogo está atualmente em uma expedição a Argolis.#!\nAfter A descoberta de Tróia, até cientistas céticos percebem que os mitos dos gregos antigos são mais do que apenas contos de fadas. Diz -se que os restos mortais das cidades da Idade do Bronze estão em Argolis até hoje, a mais conhecida das quais são Micenas. Devemos nos convencer disso." #NT!
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T Expedição a Creta#!\n#p Seu arqueólogo está atualmente em uma expedição a Creta.#!\nThe O lendário rei Minos teria que já governou Creta. Semelhante a Troy e Micenas, também parece haver algo nessa história: os artefatos da lendária cultura minóica são cada vez mais encontrados na ilha. Nossa nação também deve garantir alguns deles." #NT!
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T Expedição a Yucatán#!\n#p Seu arqueólogo está atualmente em uma expedição a Yucatán.#!\nReports de cidades desconhecidas e enormes no meio da selva. Devemos investigar mais e enviar uma expedição arqueológica para Yucatán." #NT!
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T Expedição ao Peru#!\n#p Seu arqueólogo está atualmente em uma expedição ao Peru.#!\nPilots Relatório fortalezas estranhas e estruturas muradas nos Andes que viram em seus voos sobre o Peru. Talvez os espanhóis não destruíssem completamente a cultura dos incas? Algumas cidades de resistência indígena não foram encontradas até hoje." #NT!
  
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T Identifique fósseis #!\n#p Seu antropólogo está atualmente identificando fósseis.#!\nAn [concept_lepsius_anthropologist] tem a capacidade de analisar um osso desconhecido ao longo do tempo e atribuí-lo a uma espécie humana ou pré-humana específica. Se ele conseguir atribuir três ossos à mesma espécie, poderá sistematizar com sucesso esta espécie. O tempo que leva para identificar corretamente um osso depende da experiência do antropólogo." #NT!
  
 MR_CONDUCTING_ACTIVE_TT: "#p Seu compositor está atualmente conduzindo uma temporada na ópera.#!\n[Localize('concept_elgar_conducting_desc')]" #NT!
 MR_MUSIC_TOUR_ACTIVE_TT: "#p seu compositor está atualmente em uma turnê musical.#!\n[Localize('concept_elgar_musical_tour_desc')]" #NT!
  
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T Novelas de jornal #!\n#p Seu escritor está atualmente escrevendo um romance de jornal. Muitos escritores conhecidos da época, como Tolstoi, Dostoyevsky, Flaubert e Dumas, publicaram seus romances pela primeira vez como romances em série em jornais antes de serem publicados como livros." #NT!
 MR_READNG_TOUR_ACTIVE_TT: "#T Reading Tour#!\n#p Seu escritor está atualmente em uma turnê de leitura.#!\nAn Escritor reconhecido internacionalmente que está em contato com editores estrangeiros pode aumentar a própria fama do país se ele for uma excursão de leitura. Isso não apenas promoverá relacionamentos mútuos, mas também sua reputação." #NT!
  
 MR_PAINTER_TRIP_ACTIVE_TT: "#T Viagem educacional #!\n#p Seu pintor está atualmente em uma jornada educacional. Eles também podem adquirir outras características positivas e negativas durante sua estadia em um [concept_artists_center_of_arts] estrangeiro." #NT!
  
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T Expedição da montanha #!\n#p Atualmente, existe uma expedição de montanha em andamento. Uma tendência que só aumentou durante os séculos XIX e XX. Se tivemos uma cordilheira em um de nossos territórios que ainda não foram escalados, poderíamos delegar a conquista a um general capaz com as habilidades apropriadas." #NT!
  
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T missão de combate de ar" #NT!
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T Parade da aeronave #!\n#p Seu piloto está atualmente participando de um desfile de aeronaves.#!" #NT!
  
