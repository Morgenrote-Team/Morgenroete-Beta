 MR_RECRUIT_PHYSICIAN_BUTTON: "Recrutar Médico"
 MR_RECRUIT_PHYSICIAN_BUTTON_TT: "#T Recrutar Médico#!\nPossuir um grande hospital geral oferece uma oportunidade única de recrutar imediatamente médicos do serviço de prática. Além disso, um médico pode ser selecionado com base em sua especialidade. Isso permite uma pesquisa médica significativamente mais direcionada.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
