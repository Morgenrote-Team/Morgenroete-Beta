 MR_NATURALIST_IMPROVE_FORESTRY_BUTTON_TT: "#T Improve Forestry#!\nYour Naturalist can use their skill to improve the forests of your country which will improve one of your [GetBuildingType('building_logging_camp').GetName].\n\nModifiers that the building will gain:\n$dubois_building_throughput_add_modifier_with_tooltip$\n$dubois_building_production_mult_modifier_with_tooltip$\n$dubois_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
