 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T Congresso químico #!\nThe Karlsruhe Congresso foi o primeiro simpósio internacional sobre química moderna. Ocorreu de 3 a 5 de setembro de 1860 por iniciativa de Friedrich August Kekul Von Stradonitz, Charles Adolphe Wurtz e Karl Weltzien no Ständehaus em Karlsruhe. Os tópicos incluíram a nomenclatura de compostos químicos e sua representação fórmula, bem como a questão dos pesos atômicos e moleculares dos compostos químicos. Foi a primeira conferência de química internacional no mundo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
