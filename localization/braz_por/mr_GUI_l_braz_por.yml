 MR_VISIT_GALLERY_BUTTON: "Visitar Galeria"
 MR_VISIT_GALLERY_BUTTON_TT: "#T Visitar a Galeria#!\nO valor total de nossa tradição artística e de seus trabalhos podem ser checados na Galeria\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_GALLERY_BUTTON_TRIGGER_TT: "#default_text Você #V não está atualmente visitando #!a Galeria.#!"
 MR_PAINTER_TRIP_BUTTON: "Jornada Educacional"
 MR_PAINTER_TRIP_BUTTON_TT: "#T Jornada Educacional#!\nEm uma [concept_klimt_painter_trip], um artista pode aprender um estilo de arte anteriormente desconhecido e assim melhorar a [concept_klimt_painting_tradition] anual. Ele também pode adquirir outros traços positivos e negativos durante sua estadia em um [concept_artists_center_of_arts] estrangeiro.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "Adquirir uma Obra-Prima"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T Adquirir uma Obra-Mestra#!\nPodemos comprar uma obra-mestra de um estilo que ainda não possuímos no exterior. No entanto, isso pressupõe que outra nação tenha pelo menos mais de uma obra-mestra desse estilo. Além disso, precisamos de uma Galeria Nacional para exibir a pintura. Além dos custos de aquisição, também temos que trocar algumas de nossas pinturas, o que nos custa #R 100#! [concept_klimt_painting_tradition].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VERNISSAGE_BUTTON: "Vernissage"
 MR_VERNISSAGE_BUTTON_TT: "#T Vernissage#!\nNuma vernissage, um [concept_klimt_painter] pode expor algumas das suas pinturas e, em troca, adquirir reputação e [concept_klimt_painting_tradition]. Uma vernissage só é possível uma vez na vida de um pintor.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INDEPENDENT_PAINTER: "Pintores Independentes"
