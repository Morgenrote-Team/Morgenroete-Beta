 MR_MOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] de um continente do qual não temos todos [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] ainda #!.#!" #NT!
 MR_REMOUNT_SKELETON_BUTTON: "Remunha o esqueleto de dinossauro" #NT!
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T Remount Dinosaur Skeleton#!\nIf Você tem algum [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] imperfeito, pode deixar seu [concept_dubois_paleontologist] tentar remontá -lo. Se o seu paleontologista tiver experiência suficiente, o esqueleto Remountet pode ser de melhor qualidade. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_REMOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text você ainda não está #V considerando remontar um [concept_dubois_dinosaur_skeleton]#!.#!" #NT!
