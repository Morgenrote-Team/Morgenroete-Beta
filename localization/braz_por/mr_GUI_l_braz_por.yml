 #Astronomer Buttons 
 MR_ASTEROID_CONGRESS_BUTTON: "Congresso em asteróides" #NT!
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Congresso em asteróides §1 A descoberta de Ceres em 1801, os astrônomos encontraram cada vez mais corpos celestes, e é por isso que o número de planetas no sistema solar continuou a aumentar. A descoberta de Netuno levantou a questão de saber se uma nova categoria pode fazer mais sentido para os numerosos objetos menores encontrados particularmente entre Marte e Júpiter. Em particular, a invenção de novos símbolos astronômicos e seu tamanho relativamente pequeno levou os astrônomos a assumir que eles eram mais provavelmente 'pequenas estrelas' ou 'pequenos planetas'. Obviamente, essa categorização significaria que alguns dos objetos anteriormente considerados planetas perderiam seu status e seriam degradados para meras rochas. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V neptune#! foi descoberto.#!" #NT!
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um [GetBuildingType('building_verrier_observatory').GetName].#!" #NT!
  
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text tem um [concept_verrier_astronomer].#!" #NT!
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Um total de pelo menos #BLUE 1500#! @verrier_astronomicalObject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] foram descobertos em todo o mundo (atualmente [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalObject!" #NT!
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Carte du Ciel" #NT!
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T O Congresso no Carte du Ciel#!\nA Vasta e sem precedentes Projeto de mapeamento de estrelas foi iniciada em 1887 pelo diretor do Observatório de Paris, Amédée Mouchez, que percebeu o potencial do novo processo fotográfico da placa seca para revolucionar o processo de fazer mapas das estrelas. Como resultado do congresso astrográfico de mais de 50 astrônomos realizados em Paris em abril de 1887, 20 observatórios de todo o mundo concordaram em participar do projeto. Podemos hospedar um congresso para compartilhar o conhecimento astronômico da comunidade internacional. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text #V não foi um congresso astronômico §2 no #V nos últimos 5 anos #! (o último host não tem o \ "" hospedou um congresso astronômico \ "modificador) .#!" #NT!
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Um total de pelo menos #BLUE 7000#! @verrier_astronomicalObject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] foram descobertos em todo o mundo (atualmente [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalObject!" #NT!
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um [GetBuildingType('building_university').GetName] de #V Nível 10 ou superior #!.#!" #NT!
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Grande debate" #NT!
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T O Grande Debate#!\nThe Shapley-Curtis Debate, também conhecido como Grande Debate, agrupou as discussões do início do século XX que acabaram por levar a um novo entendimento da natureza das galáxias e ao tamanho do universo. Ele girou em torno do tamanho da Via Láctea e se as galáxias então conhecidas como nebulosas em espiral são pequenos objetos na Via Láctea ou muito mais distantes e separados da Via Láctea. Naquele dia, os dois cientistas apresentaram trabalhos técnicos independentes na escala de tamanho do universo, seguidos por uma discussão pública à noite. Podemos manter um congresso para discutir os mistérios finais do universo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Um total de pelo menos #BLUE 12000#! @verrier_astronomicalObject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] foram descobertos em todo o mundo (atualmente [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalObject!" #NT!
  
  
