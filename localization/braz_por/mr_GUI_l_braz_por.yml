 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON: "Aeronave de Alta Velocidade"
 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T Aeronave de Alta Velocidade#!\nNosso engenheiro aeronáutico pode construir uma aeronave de alta velocidade para quebrar o recorde existente. Para construir o avião mais rápido do mundo, você precisa não só de um engenheiro, mas também de um piloto para pilotar o avião. O sucesso depende da experiência do engenheiro e do piloto, assim como de tecnologias avançadas.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
