 MR_PROMOTING_ENGINEER_TT: "#T Promote Engineer#!\n#p You are currently promoting the Engineer.#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much."
 MR_PROMOTING_ASTRONOMER_TT: "#T Promover Astrônomo#!\n#p Você está promovendo atualmente o Astrônomo.#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] encontram novos objetos astronômicos, descobrem estrelas e planetas ou podem participar de congressos astronômicos."
 MR_PROMOTING_NATURALIST_TT: "#T Promover Naturalista#!\n#p Você está atualmente promovendo o Naturalista.#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] pode capturar animais em casa ou no exterior, encontrar espécimes ou liderar expedições botânicas."
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T Promover Paleontólogo#!\n#p Você está atualmente promovendo o Paleontólogo.#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] pode examinar formações geológicas em busca de fósseis e ossos de dinossauros ou encontrá-los em expedições."
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T Promover Arqueólogo#!\n#p Atualmente, você está promovendo o Arqueólogo.#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] pode encontrar artefatos, fazer grandes descobertas e participar de conferências arqueológicas.\n"
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T Promover Antropólogo#!\n#p Você está atualmente promovendo o Antropólogo.#!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] estudam as origens dos humanos, desde o início da evolução humana até a Idade da Pedra.#T Investimento Acadêmico#!"
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T Investimento Acadêmico#!\n#p Você está investindo na Academia.#!\nUm investimento governamental geral em nossas universidades aumentará o #O Progresso Acadêmico#! em #G +1#! por mês. O financiamento está programado para 10 anos."
 MR_PROMOTING_COMPOSER_TT: "#T Promover Compositor#!\n#p Você está promovendo o Compositor atualmente.#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] são necessários para criar uma Cultura Musical próspera. Eles ajudarão um país a criar mais [concept_elgar_musical_tradition]."
 MR_PROMOTING_WRITER_TT: "#T Promover Escritor#!\n#p  Você esta promovendo um Escritor.#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] são mestres da narração e trabalham em livros e outras obras literárias. Com o seu trabalho, fortalecem a [concept_manzoni_literary_tradition] de um país."
 MR_PROMOTING_PAINTER_TT: "#T Promover o Pintor#!\n#p Atualmente está a promover o Pintor.#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] capturam impressões, paisagens e as maravilhas do mundo na tela. Através das suas obras-primas, eles fortalecem a [concept_klimt_painting_tradition] de um país."
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T Avantgarde Intelligentsia#!\n#p Avantgarde Intelligentsia é atualmente seu foco científico ativo.#!\nUma panelinha de acadêmicos com ideias culturais, sociológicas e antropológicas claras determina o dia a dia científico. Em contraste, os campos práticos têm menor importância.\n#R Nota#!: Aumenta o aparecimento de Acadêmicos em um ponto por mês."
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T Academia Prática#!\n#p A Academia Prática é atualmente o seu foco científico ativo.#!\nOs cientistas em nosso país se esforçam incansavelmente para fazer descobertas de todas as áreas adequadas para o uso prático diário. Isso serve ao progresso geral e à paz da humanidade.\n#p Nota#!: Aumenta a aparição de Acadêmicos em um ponto por mês."
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T Complexo Industrial-Militar#!\n#p Complexo Industrial-Militar é atualmente o seu foco científico ativo.#!\nA cooperação entre industriais privados e os militares levou ao desenvolvimento de uma teia particularmente importante de conexões, laços pessoais e conhecidos, com apenas um levíssimo toque de corrupção, que pode ser melhor descrito como um Complexo Industrial-Militar."
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T Escolas de Negócios e Capitalismo Magnata#!\n#p Escolas de Negócios e Capitalismo Magnata é atualmente o seu foco científico ativo.#!\nO indivíduo independente, combinado com um período próspero de progresso, levou a uma mentalidade em que as escolas profissionais, as empresas de médio porte e as grandes corporações têm uma influência decisiva na ciência do país. Vice-versa, as universidades trabalham para aumentar a prosperidade adquirida da nação através de novas tecnologias e para impulsionar ideias sociais através do progresso."
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T Poder Marítimo e Marinha Mercante#!\n#p Poder Marítimo e Marinha Mercante é atualmente o seu foco científico ativo.#!\nA marinha e o comércio internacional desempenham um papel imenso para o nosso país. Aumentar a prosperidade através da produção avançada e do comércio global dos nossos produtos é tão importante quanto defender o que já foi conquistado."
 MR_IVORY_TOWER_ACTIVE_TT: "#T Torre de Marfim Útil#!\n#p A Torre de Marfim Útil é atualmente o seu foco científico ativo.#!\nA academia é vista em nosso país como um refúgio para mentes excêntricas que contam besouros, lustram vasos antigos e se envolvem em esquisitices. No entanto, não se pode negar que o isolamento da torre de marfim da sociedade também tem suas vantagens. Sem perturbações, muitos professores trabalham melhor.\n#p Nota#!: Aumenta a aparição de Acadêmicos em um ponto por mês."
 MR_ON_PACIFIC_EXPEDITION_TT: "#T Expedição do Pacífico#!\n#p Já está ocorrendo uma Expedição do Pacífico.#!\nJuntamente com os polos, o Oceano Pacífico é uma das últimas áreas da Terra que ainda guardam segredos. Acadêmicos de várias disciplinas científicas estão interessados em uma missão de pesquisa para conduzir estudos naturalísticos, paleontológicos, astronômicos e oceanográficos. Novamente, para as grandes potências, poderia ser um caso de prestígio para mostrar sua influência no fim do mundo."
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T A Passagem do Noroeste#!\n#p Já está ocorrendo uma Expedição para encontrar a Passagem do Noroeste.#!\nJá na virada do século passado, aventureiros audazes exploraram as partes mais externas do Mar Ártico. Um antigo sonho permanece por se cumprir: a descoberta da Passagem do Noroeste entre o Canadá e o Oceano Ártico. Mas quem ousaria uma expedição tão perigosa?"
 MR_ON_ARCTICA_EXPEDITION_TT: "#T Expedição Zeppelin#!\n#p Já está ocorrendo uma Expedição Zeppelin.#!\nA Aeroarctic, a 'Sociedade Internacional de Estudo para a Exploração do Ártico por Dirigível', era uma associação científica não governamental que tinha como objetivo usar dirigíveis em pesquisas polares. Foi fundada principalmente por iniciativa do aeronauta e posteriormente secretário-geral da sociedade, Walther Bruns. O presidente fundador em 1924 foi Fridtjof Nansen. Após vários anos de trabalho preparatório, a empresa conseguiu, em 1931, usar pela primeira vez um dirigível para uma expedição polar puramente científica. Através do voo do LZ 127 Graf Zeppelin no Ártico, o conhecimento da geografia das regiões polares sobrevoadas foi significativamente ampliado. Já em 1926, Umberto Nobile sobrevoou o Pólo Norte com o seu dirigível 'Norge' e mais tarde empreendeu uma expedição com o 'Italia'."
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_tesla_civil_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]."
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_tesla_mechanical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]."
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_tesla_military_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]."
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_tesla_electrical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')]."
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_tesla_aeronautical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]."
 MR_SAFARI_ACTIVE_TT: "#T Safari Heia#!\n#p Seu Naturalista está atualmente em um Safari.#!\nEm um Safari Africano, através de rastreamento e armadilhas constantes, grandes animais podem ser capturados e depois transportados para um [concept_dubois_zoo]. É possível capturar apenas um animal por safari. Dependendo da espécie do animal, difere se você precisa de armadilhas ou se tem que permanecer em sua trilha. Como regra geral, animais grandes e lentos precisam de mais armadilhas, enquanto animais rápidos exigem mais rastreamento."
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Capturar Animais locais#!\n#p Seu Naturalista está atualmente capturando animais locais.#!\nNossa nação possui habitats de animais com espécies fascinantes que poderiam ser exibidas em um [concept_dubois_zoo]. Um [concept_dubois_naturalist] deve viajar pelo país por um ano para coletar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para um zoológico."
 MR_CHEMIST_IMPROVE_FERTILIZER_BUTTON: "Melhorar Fertilizantes"
