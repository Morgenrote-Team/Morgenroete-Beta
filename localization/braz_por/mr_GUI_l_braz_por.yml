 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Investimento acadêmico #!\nA O investimento geral do governo em nossas universidades aumentará #O Progresso acadêmico #! por #G +1#! por mês. O financiamento está programado para 10 anos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
