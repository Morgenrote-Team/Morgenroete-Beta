 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T O cabo transatlântico _1 permite a troca de informações em uma velocidade anteriormente desconhecida. Ao estabelecer uma estação de telégrafo de ambos os lados do Atlântico, existe a possibilidade de colocar um cabo de telegráfico submarino para aproximar a Europa e a América. No entanto, isso requer equipamento adequado e um setor de notícias desenvolvido que investiria significativamente para explorar um empreendimento tão caro lucrativamente. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
