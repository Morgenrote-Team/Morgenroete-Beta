 MR_UPPER_EGYPT_EXPEDITION_TT: "#T Enviar uma Expedição ao Vale dos Reis#!\nCom a antiga capital Tebas e o Vale dos Reis, o Alto Egito é considerado a Meca da egiptologia. Devemos obter uma licença de escavação para a área e procurar tesouros egípcios.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Lepsius escreveu uma carta para Rosellini#! que iniciou a Arqueologia no Egito.#!"
 MR_UPPER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V não está atualmente financiando#! uma [concept_lepsius_expedition] para o Alto Egito.#!"
 MR_UPPER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o Estado do Alto Egito#! ou possui uma [concept_lepsius_excavation_licence] com o seu proprietário.#!"
 MR_LOWER_EGYPT_EXPEDITION_TT: "#T Enviar uma Expedição às Pirâmides#!\nDesde o início dos tempos, as pirâmides egípcias fascinam a humanidade. Diz-se que outros túmulos, templos e até cidades que desapareceram nas areias do Baixo Egito estão à espera de serem redescobertos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V não está atualmente financiando#! uma [concept_lepsius_expedition] para o Baixo Egito.#!"
 MR_LOWER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o Estado do Baixo Egito#! ou possui uma [concept_lepsius_excavation_licence] com seu proprietário.#!"
 MR_BABYLONIA_EXPEDITION_TT: "#T Enviar uma Expedição ao Berço da Civilização#!\nA Babilônia, a parte sul da Mesopotâmia, deve seu nome à outrora poderosa cidade da Babilônia. A região é considerada o 'berço da civilização', onde artefatos arqueológicos preciosos são descobertos repetidamente. Eles definitivamente pertencem a um museu.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V A língua Acadiana foi decifrada#!, permitindo a Arqueologia na Mesopotâmia.#!"
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V não está atualmente financiando#! uma [concept_lepsius_expedition] para a Babilônia.#!"
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "O #default_text [GetPlayer.GetName] ou #V possui o Estado de Bagdá#! ou possui uma [concept_lepsius_excavation_licence] com o seu proprietário.#!"
 MR_ASSYRIA_EXPEDITION_TT: "#T Enviar uma Expedição aos Jardins da Assíria#!\nAssíria refere-se à parte norte da Mesopotâmia com as duas importantes cidades de Assur e Nínive. O escasso conhecimento sobre o país ainda pode ser rastreado até a Bíblia como uma fonte - mas talvez haja evidências históricas que sejam mais confiáveis?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V não está financiando atualmente#! uma [concept_lepsius_expedition] para a Assíria.#!"
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o Estado de Mossul#! ou possui uma [concept_lepsius_excavation_licence] com o seu proprietário.#!"
 MR_ARGOLIS_EXPEDITION_TT: "#T Enviar uma Expedição à Cidade de Agamemnon#!\nApós a descoberta de Troia, até mesmo cientistas céticos começam a perceber que os mitos dos antigos gregos são mais do que meras histórias de fadas. Diz-se que os restos de cidades da Idade do Bronze permanecem em Argólida até hoje, a mais conhecida das quais é Micenas. Devemos nos convencer disso.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Schliemann descobriu Troia#!, permitindo a Arqueologia na Grécia#!"
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V não está atualmente a financiar#! uma [concept_lepsius_expedition] para Argólida.#!"
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ou #V possui o Estado do Peloponeso#! ou possui uma [concept_lepsius_excavation_licence] com o seu proprietário.#!"
 MR_CRETE_EXPEDITION_TT: "#T Enviar uma Expedição aos Palácios de Creta#!\nO lendário Rei Minos teria governado Creta. Semelhante a Troia e Micenas, também parece haver algo nessa história: artefatos da lendária cultura Minoica são cada vez mais encontrados na ilha. Nossa nação também deve garantir alguns deles.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V não está atualmente financiando #! a [concept_lepsius_expedition] para Creta.#!"
 MR_CRETE_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V possui o Estado de Creta#! ou tem uma [concept_lepsius_excavation_licence] com o seu proprietário.#!"
 MR_YUCATAN_EXPEDITION_TT: "#T Enviar uma Expedição às Cidades Perdidas dos Maias#!\nRelatos de cidades desconhecidas e enormes no meio da selva aumentaram. Devemos investigar mais a fundo e enviar uma expedição arqueológica a Iucatã.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text  #V Stephens & Catherwood realizaram uma Expedição#!, permitindo a Arqueologia em Yucatán.#!"
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V não está atualmente financiando #! a [concept_lepsius_expedition] para Iucatã.#!"
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V possui o Estado de Iucatã#! ou tem uma [concept_lepsius_excavation_licence] com o seu proprietário.#!"
 MR_PERU_EXPEDITION_TT: "#T Enviar uma expedição para procurar o legado oculto dos Incas#!\nPilotos relatam estranhas fortalezas e estruturas muradas nos Andes que viram em seus voos sobre o Peru. Talvez os espanhóis não tenham destruído completamente a cultura dos Incas? Algumas cidades de resistência indígena não foram encontradas até hoje.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Bingham descobriu Machu Picchu#!, permitindo a Arqueologia no Peru.#!"
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V não está atualmente financiando #! a [concept_lepsius_expedition] para Peru.#!"
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "O #default_text [GetPlayer.GetName] ou #V possui o Estado de $STATE_ICA$#! ou possui uma [concept_lepsius_excavation_licence] com o seu proprietário.#!"
 MR_EXODUS_CONGRESS_BUTTON: "Congresso sobre o Êxodo"
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T Congresso sobre o Êxodo#!\nCom o aumento da pesquisa sobre o Egito e o Levante, a questão da historicidade dos eventos bíblicos surge novamente. Em particular, a não menção do Êxodo, ou seja, a partida dos hebreus do Egito, levantou a questão de saber se os Cinco Livros de Moisés não são meras invenções. Cientistas radicais até exigem que todas as histórias bíblicas sejam completamente ignoradas. Outro grupo argumenta que as histórias da Bíblia não podem ser tomadas literalmente, mas possuem valor científico.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] precisa de pelo menos #V 25#! @lepsius_egypt_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] egípcio (atualmente [GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+]).#!"
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Pelo menos #V 150#! @lepsius_egypt_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] foram fundados em todo o mundo (atualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_egypt_minor! foram fundados).#!"
 MR_CIVILIZATION_CONGRESS_BUTTON: "Congresso sobre Civilização"
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T Congresso sobre a Ascensão da Civilização#!\nDurante séculos, acreditou-se, não só na Europa, mas também em outros países do Mediterrâneo e do Médio Oriente, que o Egito era a civilização mais antiga. Mas com o aumento diário de achados da Assíria e da Babilónia, esta teoria foi claramente abalada. Em vez disso, verifica-se que a escrita foi aparentemente inventada na Mesopotâmia - assim como muitos outros feitos que acompanharam o início da civilização. Será talvez o caso de que toda a civilização emergiu em última análise da Babilónia - e toda a forma de religião deriva dos mitos babilónicos? A Epopeia de Gilgamesh é talvez a inspiração para todo o tipo de literatura - da Bíblia às epopeias homéricas?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] precisa de pelo menos #V 25#! @lepsius_mesopotamia_minor! Artefato Mesopotâmico [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (atualmente [GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+]).#!"
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Pelo menos #V 300#! @lepsius_mesopotamia_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] foram Fundar em todo o mundo (atualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_mesopotamia_minor! foram Fundar).#!"
 MR_TROY_CONGRESS_BUTTON: "Congresso sobre Troia"
 MR_TROY_CONGRESS_BUTTON_TT: "#T Congresso sobre Troia#!\nSchliemann fundou Troia. Pelo menos é o que ele afirma. Embora as vozes críticas que consideravam Troia uma mera invenção tenham diminuído, uma série de questões permanecem sem resposta. A Troia encontrada por Schliemann é a Troia homérica? E o que era Troia, afinal? Vários acadêmicos permanecem céticos. E novas descobertas da Anatólia poderiam lançar uma nova luz sobre as descobertas.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] precisa de pelo menos #V 25#! @lepsius_aegean_minor! Egeu [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (atualmente [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+]).#!"
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Pelo menos #V 300#! @lepsius_aegean_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] foram fundados em todo o mundo (atualmente [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_aegean_minor! foram fundados).#!"
 MR_INSPECT_EXCAVATION_BUTTON: "Inspecionar Escavação"
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T Inspecionar Escavação#!\nPodemos enviar um Arqueólogo experiente para uma área onde estamos escavando para intensificar nossos esforços ali. Nosso Arqueólogo abrirá um novo sítio de escavação em cerca de um ano e conduzirá uma pesquisa intensiva, durante a qual podemos encontrar indicações adicionais de descobertas arqueológicas importantes, anteriormente desconhecidas. O sucesso depende em grande parte da experiência do nosso Arqueólogo. O estabelecimento de uma Sociedade Arqueológica também aumenta nossas chances.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V pelo menos uma [concept_lepsius_excavation]#! em uma área onde nenhuma grande descoberta arqueológica foi feita.#!"
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text [GetPlayer.GetName] deve ter #V estudado pelo menos 30 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]#! numa região específica antes de procurar pistas lá.#!"
 MR_CANCEL_EXCAVATION_BUTTON: "Cancelar Escavação"
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T Cancelar Escavação#!\nEm algumas situações, pode ser útil recolher uma equipe de escavação. Nossos artefatos e coleções adquiridos permanecerão, mas nossa escavação permanente terminará.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos #V 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] a fazer uma [concept_lepsius_excavation].#!"
 MR_LOCAL_EXCAVATION_BUTTON: "Escavação Local"
