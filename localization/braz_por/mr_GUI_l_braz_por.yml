 MR_NEWSPAPER_NOVEL_BUTTON: "Romance de Jornal"
 MR_NEWSPAPER_NOVEL_BUTTON_TT: "#T Escrever um Romance de Jornal#!\nNo século XIX, o romance de jornal garantia a muitos autores um rendimento seguro e fama nacional. Muitos escritores conhecidos da época, como Tolstói, Dostoiévski, Flaubert e Dumas, publicaram primeiramente os seus romances como folhetins em jornais antes de serem publicados como livros.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
