 VISIT_SCIENTIFIC_SOCIETY_BUTTON_TT: "#T Visite a Sociedade Científica#!\nA [concept_academics_scientific_society] oferece uma visão geral de seus [Concept('concept_academics_academic','$concept_academics_academics$')] e suas realizações e os teoremas científicos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
