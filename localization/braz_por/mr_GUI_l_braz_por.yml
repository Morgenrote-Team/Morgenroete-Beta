 MR_PROMOTE_ENGINEER_TT: "#T Promover Engineer#!\n[Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] são técnicos versáteis nas forças armadas e na construção. Eles também aceleram a construção de monumentos por duas vezes mais. \ N \ n#n Nota: #! Você só pode ter um engenheiro de cada vez.[GetPlayer.GetCustom('mr_promote_has_engineer_type')] \ n \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
