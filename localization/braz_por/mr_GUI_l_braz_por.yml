 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON_TT: "#T Expedição Paleontológica#!\nEnvie seu [concept_dubois_paleontologist] em uma [concept_dubois_paleontological_expedition]. Uma Expedição dura 1 ano e resulta em uma quantidade de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] e [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].\n\nAo final de uma Expedição, você pode deixar uma [concept_dubois_paleontological_team] para montar uma [concept_dubois_paleontological_excavation].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
