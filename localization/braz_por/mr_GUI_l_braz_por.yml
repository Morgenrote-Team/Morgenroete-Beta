 MR_VISIT_GALLERY_BUTTON_TT: "#T Visite o valor total da Gallery#!\nThe de nossa tradição de pintura e suas obras de arte podem ser verificadas na galeria. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
