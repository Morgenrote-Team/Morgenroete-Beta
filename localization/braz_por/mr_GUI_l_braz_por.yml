 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "Lembre -se da expedição paleontológica" #NT!
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T RECORMENTO A EXPEDIÇÃO Paleontológica #!\nOrders O paleontologista de volta de sua investigação paleontológica para outros usos - como construção ou remodelação de esqueletos de dinossauros. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_MOUNT_SKELETON_BUTTON: "Construa o esqueleto de dinossauro" #NT!
