 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON: "Expedição Paleontológica"
 MR_PALEONTOLOGICAL_EXPEDITION_NOT_TRAVELLING_TRIGGER: "#default_text O [concept_dubois_paleontologist] [GetPlayer.GetAdjective] #V não está viajando atualmente#!.#!"
 MR_ACTIVE_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] possui um [concept_dubois_paleontologist] que #V não está ocupado#!.#!"
 MR_PALEONTOLOGICAL_EXPEDITION_HAS_ACCESS_FORMATION_TRIGGER: "#default_text [GetPlayer.GetName] possui acesso direto a uma [Concept('concept_dubois_formation','$concept_dubois_geological_formation$')] ou possui uma [concept_dubois_paleontological_licence].#!"
 MR_PALEONTOLOGICAL_EXPEDITION_NOT_CHOOSING_CURRENTLY_TRIGGER: "#default_text [GetPlayer.GetName] não está #V em processo de enviar uma Expedição Paleontológica#! atualmente.#!"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "Recolher Expedição Paleontológica"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Recolher Expedição Paleontológica#!\nOrdena o paleontólogo de volta de sua investigação paleontológica para outros usos - como construir ou remodelar esqueletos de dinossauros.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_BUTTON: "Construir Esqueleto de Dinossauro"
 MR_MOUNT_SKELETON_BUTTON_TT: "#T Construir Esqueleto de Dinossauro#!\nSeu [concept_dubois_paleontologist] pode construir um novo [concept_dubois_dinosaur_skeleton] com 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] do mesmo continente.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
