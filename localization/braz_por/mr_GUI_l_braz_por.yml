 MR_ARCHAEOLOGY_MODERN_ARCHAEOLOGY_EXPERIENCED_OR_FAMOUS_TRIGGER: "#default_text [GetPlayer.GetName] possui um [concept_lepsius_archaeologist] #V Experiente ou Famoso #!.#!"
