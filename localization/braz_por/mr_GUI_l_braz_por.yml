 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Calcular a Idade da Terra#!\nUm geólogo pode calcular a idade da Terra uma vez em sua vida e apresentar sua teoria a todos os outros geólogos. Se eles concordarem, sua determinação do tempo da Terra será a decisiva. Se ele for rejeitado, pode tentar novamente após um período de depressão. Para apresentar uma nova teoria, a Pontuação Geológica nacional deve ser maior do que a pontuação usada para determinar a última idade da Terra.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_AGE_EARTH_ACTIVE_TT: "#T Calcular a Idade da Terra#!\n#p Seu Geólogo está calculando a idade da Terra.#!"
 MR_GEOLOGIST_CAN_CALCULATE_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] ainda não apresentou uma determinação internacionalmente autoritária da idade da Terra.#!"
 MR_GEOLOGIST_CALCULATE_AGE_TRIGGER_TT: "#default_text A Pontuação Geológica nacional é superior à pontuação utilizada para determinar a última idade da Terra.#!"
 MR_GEOLOGIST_NO_AGE_DEBATE_TRIGGER_TT: "#default_text Não há atualmente nenhum debate sobre a idade da Terra.#!"
 MR_GEOLOGIST_NOT_DEMOTIVATED_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] não está sem motivação.#!"
 MR_GEOLOGIST_OIL_STOP_BUTTON_TT: "#T Parar a Prospecção de Petróleo#!\nSeu [concept_agassiz_geologist] está procurando novos poços de petróleo perto de plataformas de petróleo já estabelecidas, aumentando assim a produção.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_oil_stop_button_effect_tt: "Seu [concept_agassiz_geologist] irá parar de prospectar minério."
 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T Pesquisa Geológica#!\nUm geólogo pode viajar pelo país por 5 anos para expandir seu conhecimento. Dessa forma, ele também pode encontrar formações geológicas, cavernas ou (mais tarde) até mesmo urânio. Geólogos que possuem a característica Mineralogista dobram o número de minerais adquiridos anualmente. No final de sua pesquisa, os geólogos ganham minerais adicionais, experiência e a característica mineralogista, caso ainda não a possuam.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_geological_research_stop_effect_tt: "Seu [concept_agassiz_geologist] irá parar sua Pesquisa Geológica."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_ACTIVE_TT: "#T Explorando as Montanhas Atlânticas#!\n#p Seu [concept_agassiz_geologist] está atualmente explorando as Montanhas Atlânticas.#!"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON: "Congresso sobre Deriva Continental"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T Congresso sobre Deriva Continental#!\nDurante séculos, a crença de que os continentes eram fixos e imóveis foi inabalável. Um eminente geólogo com considerável conhecimento geológico poderá derrubar este mantra. Se ele conseguirá, é bastante questionável.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_CONGRESS_KNOWLEDGE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem #V 50 ou mais#! @agassiz_geological_knowledge![concept_agassiz_geological_knowledge] (atualmente [GetPlayer.MakeScope.Var('agassiz_geological_knowledge_var').GetValue|0+].#!"
 MR_ASTRONOMER_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] tem um [concept_verrier_astronomer] que #V não está ocupado#!.#!"
 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T Mapeie a Lua#!\nCom a ajuda da câmera e de telescópios modernos, é possível mapear todo o companheiro da Terra com uma qualidade sem precedentes. Um mapa da lua seria um marco na astronomia. No entanto, um astrônomo encontrará menos objetos astronômicos se prosseguir com estudos selenográficos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_MOON_MAP_ACTIVE_TT: "Mapear a Lua\n#p O seu [concept_verrier_astronomer] está atualmente a mapear a Lua tirando [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].#!"
