  ### 2.2.1a ### 
  
 MR_PROMOTING_ENGINEER_TT: "#T Promover engenheiro #!\n#p Você está atualmente promovendo o engenheiro.#!\n[Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] são técnicos versáteis nas forças armadas e na construção. Eles também aceleram a construção de monumentos em duas vezes mais." #NT!
 MR_PROMOTING_ASTRONOMER_TT: "#T Promover astrônomo." #NT!
 MR_PROMOTING_NATURALIST_TT: "#T Promover Naturalist#!\n#p Você está atualmente promovendo o naturalista.#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] pode capturar animais em casa ou no exterior, encontrar espécimes ou liderar expedições botânicas." #NT!
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T Promover paleontologista #!\n#p Você está atualmente promovendo o paleontologista.#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] pode examinar as formações geológicas para fósseis e ossos de dinossauros ou encontrá -los em expedições." #NT!
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T Promover arqueólogo #!\n#p Você está atualmente promovendo o arqueologista.#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] pode encontrar artefatos, fazer grandes descobertas e participar de conferências arqueológicas. \ N" #NT!
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T Promover antropólogo #!\n#p Você está atualmente promovendo o antropologista.#!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] Estude as origens dos seres humanos, desde o início da evolução humana até a idade da pedra.#T Investimento acadêmico §4" #NT!
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T Investimento acadêmico #!\n#p Você está investindo na academia.#!\nA O investimento geral do governo em nossas universidades aumentará #O Progresso acadêmico § 4 por #G +1#! por mês. O financiamento está programado para 10 anos." #NT!
 MR_PROMOTING_COMPOSER_TT: "#T Promover composer#!\n#p Você está atualmente promovendo o compositor.#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] são necessários para criar uma cultura musical próspera. Eles ajudarão um país a criar mais [concept_elgar_musical_tradition]." #NT!
 MR_PROMOTING_WRITER_TT: "#T Promover Writer#!\n#p Você está atualmente promovendo o Writer.#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] são mestres de narrativa e trabalho em livros e outras literatura. Com o trabalho deles, eles fortalecem um países [concept_manzoni_literary_tradition]." #NT!
 MR_PROMOTING_PAINTER_TT: "#T Promover pintor#!\n#p Você está atualmente promovendo o pintor.#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] Capture impressões, paisagens e as maravilhas do mundo na tela. Através de suas obras -primas, eles fortalecem o [concept_klimt_painting_tradition] de um país." #NT!
  
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T Avantgarde Intelligentsia#!\n#p Avantgarde Intelligentsia é atualmente o seu foco científico ativo.#!\nA CRINCE DE Acadêmicos com idéias culturais, sociológicas e antropológicas claras determina a vida científica cotidiana. Por outro lado, os campos práticos são de menor importância. \ N#R Note#!: aumenta a aparência dos acadêmicos em um ponto por mês." #NT!
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T Academia prática da academia prática é atualmente seu foco científico ativo. Isso é para servir ao progresso e paz gerais da humanidade. \ N#p Note#!: Aumenta o aparecimento dos acadêmicos em um ponto por mês." #NT!
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T Complexo industrial militar §1 Complexo industrial militar é atualmente o seu foco científico ativo." #NT!
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T Escolas de Negócios e Matrósticos Capitalismo § 1 Escolas de Negócios e Ticot Capitalismo é atualmente seu foco científico ativo.#!\nThe Indivíduo independente combinado com um tempo próspero de progresso levou a uma mentalidade na qual as escolas comerciais, empresas de médio porte e grandes corporações têm uma influência decisiva na ciência do país. Vice-versa, as universidades trabalham para aumentar a prosperidade adquirida do país por meio de novas tecnologias e para impulsionar as idéias sociais através do progresso." #NT!
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T Power e Merchant Marine#!\n#p Power e Merchant Marine é atualmente seu foco científico ativo.#!\nThe Marinha e comércio internacional desempenham um imenso papel para o nosso país. Aumentar a prosperidade por meio de produção avançada e comércio global em nossos produtos é tão importante quanto defender o que já foi ganho." #NT!
 MR_IVORY_TOWER_ACTIVE_TT: "#T A TOWER IVORY UVEL IVORY_1 A Torre de Marfim útil é atualmente seu foco científico ativo. A academia é vista em nosso país como um refúgio para mentes excêntricas que contam besouros, vasos antigos polonenos e se envolvem em ímpares. No entanto, não se pode negar que o isolamento da torre de marfim da sociedade também tenha suas vantagens. Não perturbado, muitos professores trabalham melhor. \ N#p Note#!: aumenta a aparência dos acadêmicos em um ponto por mês." #NT!
  
 MR_ON_PACIFIC_EXPEDITION_TT: "#T Pacific Expedition#!\n#p Atualmente, existe uma expedição do Pacífico em andamento. Estudiosos de várias disciplinas científicas estão interessadas em uma missão de pesquisa para conduzir estudos naturalistas, paleontológicos, astronômicos e oceanográficos. Novamente, para os grandes poderes, poderia ser um caso de prestígio mostrar sua influência no final do mundo." #NT!
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T A passagem do noroeste _1 Atualmente, existe uma expedição em andamento para encontrar a passagem do noroeste.#!\nAlready Na virada do século passado, aventureiros ousados ​​exploraram as partes externas do mar do Ártico. Um sonho antigo permanece não realizado: a descoberta da passagem noroeste entre o Canadá e o Oceano Ártico. Mas quem ousaria uma expedição tão perigosa?" #NT!
 MR_ON_ARCTICA_EXPEDITION_TT: "#T Zeppelin Expedition#!\n#p Atualmente, existe uma expedição em andamento do Zeppelin. Foi fundada principalmente por iniciativa do aeronauta e mais tarde secretário geral da Sociedade, Walther Bruns. O presidente fundador em 1924 foi Fridtjof Nansen. Após vários anos de trabalho preparatório, a empresa teve sucesso em 1931 ao usar um dirigível para uma expedição polar puramente científica pela primeira vez. Através do vôo do Ártico do LZ 127 Graf Zeppelin, o conhecimento da geografia das regiões polares voado foi significativamente expandido. Já em 1926, Umberto Nobile voou sobre o Pólo Norte com seu dirigível 'Norge' e depois realizou uma expedição com o 'Italia'." #NT!
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T O cabo transatlântico _1 Atualmente, existe uma expedição em andamento para colocar um cabo transatlântico. Ao estabelecer uma estação de telégrafo de ambos os lados do Atlântico, existe a possibilidade de colocar um cabo de telegráfico submarino para aproximar a Europa e a América. No entanto, isso requer equipamentos adequados e um setor de notícias desenvolvido que investiria significativamente para explorar um empreendimento tão caro lucrativamente." #NT!
  
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_gaudi_civil_engineer]#!\nYour [concept_gaudi_engineer] está focado em [Concept('concept_gaudi_civil_engineer','$concept_gaudi_civil_engineering$')]." #NT!
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_gaudi_mechanical_engineer]#!\nYour [concept_gaudi_engineer] está focado em [Concept('concept_gaudi_mechanical_engineer','$concept_gaudi_mechanical_engineering$')]." #NT!
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_gaudi_military_engineer]#!\nYour [concept_gaudi_engineer] está focado em [Concept('concept_gaudi_military_engineer','$concept_gaudi_military_engineering$')]." #NT!
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_gaudi_electrical_engineer]#!\nYour [concept_gaudi_engineer] está focado em [Concept('concept_gaudi_electrical_engineer','$concept_gaudi_electrical_engineering$')]." #NT!
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_gaudi_aeronautical_engineer]#!\nYour [concept_gaudi_engineer] está focado em [Concept('concept_gaudi_aeronautical_engineer','$concept_gaudi_aeronautical_engineering$')]." #NT!
  
 MR_SAFARI_ACTIVE_TT: "#T HEIA Safari#!\n#p Seu naturalista está atualmente em um safari.#!\nOn Um safari africano, através de rastreamento e captura constantes, o grande jogo pode ser capturado e depois transportado para um [concept_dubois_zoo]. Só é possível pegar um animal por safari. Dependendo da espécie animal, difere se você precisa de armadilhas ou precisa permanecer em sua trilha. Como regra geral, animais grandes e lentos precisam de mais armadilhas, enquanto os animais rápidos exigem mais rastreamento." #NT!
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Pegue os animais locais §1 Seu naturalista está atualmente pegando animais locais. #!\nOur Nação tem habitats animais com espécies fascinantes que podem ser exibidas em um [concept_dubois_zoo]. Um [concept_dubois_naturalist] deve viajar pelo país por um ano para coletar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para um zoológico." #NT!
  
