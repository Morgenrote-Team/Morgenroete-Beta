 MR_PADDOCK_FIRE_RACER_BUTTON_TT: "#T FIRE RACER#!\nUnlike Os drivers dos velhos cavalheiros, os motoristas da equipe de corrida não são insubstituíveis. Depois que um novo motorista de corrida foi contratado, essa posição não pode ser preenchida por dois anos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
