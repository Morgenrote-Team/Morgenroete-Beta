 MR_ASTEROID_CONGRESS_BUTTON: "Congresso sobre Asteroides"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Congresso sobre Asteroides #!\nDesde a descoberta de Ceres em 1801, os astrónomos têm encontrado cada vez mais corpos celestes, razão pela qual o número de planetas no sistema solar tem continuado a aumentar. A descoberta de Neptuno levantou a questão de saber se uma nova categoria faria mais sentido para os numerosos objetos menores encontrados particularmente entre Marte e Júpiter. Em particular, a invenção de novos símbolos astronómicos e o seu tamanho relativamente pequeno levaram os astrónomos a presumir que eram mais provavelmente 'estrelas pequenas' ou 'planetas pequenos'. Claro que esta categorização significaria que alguns dos objetos anteriormente considerados planetas perderiam o seu estatuto e seriam degradados a meras pedras.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text Texto padrão #V Netuno#! foi descoberto.#!"
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text  [GetPlayer.GetName] possui um [GetBuildingType('building_verrier_observatory').GetName].#!"
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text  Possui um [concept_verrier_astronomer].#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Um total de pelo menos #BLUE 1500#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] foram descobertos mundialmente (atualmente [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! foram encontrados).#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Carte du Ciel"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T Congresso da Carte du Ciel#!\nUm vasto e inédito projeto internacional de mapeamento estelar foi iniciado em 1887 pelo diretor do Observatório de Paris, Amédée Mouchez, que percebeu o potencial do novo processo fotográfico de placa seca para revolucionar o processo de criação de mapas das estrelas. Como resultado do Congresso Astrográfico de mais de 50 astrônomos realizado em Paris em abril de 1887, 20 observatórios de todo o mundo concordaram em participar do projeto. Podemos hospedar tal congresso para compartilhar o conhecimento astronômico da comunidade internacional.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text  Não houve um #V Congresso Astronômico#! nos #V últimos 5 anos#! (o último Anfitrião não tem o Modificador \"Sediou um Congresso Astronômico\").#!"
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Um total de pelo menos #BLUE 7000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] foram descobertos mundialmente (atualmente [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]@verrier_astronomicalobject! foram encontrados).#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui uma [GetBuildingType('building_university').GetName] de Nível #V 10 ou superior#!.#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Grande Debate"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T O Grande Debate#!\nO Grande Debate Shapley-Curtis, também conhecida como O Grande Debate, reuniu as discussões do início do século XX que eventualmente levaram a uma nova compreensão da natureza das galáxias e do tamanho do Universo. Girou em torno do tamanho da Via Láctea e se as galáxias então conhecidas como nebulosas espirais são pequenos objetos na Via Láctea ou muito mais distantes e separados da Via Láctea. Naquele dia, os dois cientistas apresentaram artigos técnicos independentes sobre a escala de tamanho do Universo, seguido por uma discussão pública à noite. Podemos realizar um congresso desses para discutir os mistérios finais do universo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Um total de pelo menos #BLUE 12000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] foram descobertos mundialmente (atualmente [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! foram encontrados).#!"
 SPECIMEN_VAR: "@dubois_specimen!  [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|*V0]"
 SPECIMEN_VAR_TT: "#header [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!\n[GetPlayer.GetName] has collected @dubois_specimen! [GetPlayer.MakeScope.GetVariable('dubois_specimen').GetValue|V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T Heia Safari!#!\nNum Safari Africano, através do rastreamento e armadilhagem constantes, a caça grossa pode ser capturada e depois transportada para um [concept_dubois_zoo]. Só é possível capturar um animal por safari. Dependendo da espécie animal, difere se precisa de armadilhas ou tem de ficar no seu rasto. Como regra geral, os animais grandes e lentos precisam de mais armadilhas, enquanto os animais rápidos requerem mais rastreamento.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text  [GetPlayer.GetName] possui um(a) [concept_dubois_naturalist] que #V não está ocupado(a)#!.#!"
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text Você tem um [concept_dubois_zoo] que é pelo menos #V de tamanho pequeno#!.#!"
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V possui pelo menos um habitat de Animal Africano#! com caça grossa ou existe um tal Habitat num estado #V detido por uma nação descentralizada#!.#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] não é #V num Safari#! ou #V teve um recentemente#!.#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Capturar Animais locais#!\nNossa nação possui habitats de animais com espécies fascinantes que poderiam ser exibidas em um [concept_dubois_zoo]. Um [concept_dubois_naturalist] deve viajar pelo país durante um ano para coletar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] para um zoológico.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui pelo menos um habitat animal que abriga um(a) [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] que não vive no nosso [concept_dubois_zoo].#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não está #V atualmente capturando animais locais#!.#!"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Congresso sobre Hipocampo"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Congresso sobre Hipocampo#!\nQuão único é o homem? Quão animal ele é? Os antigos gregos já haviam notado uma proximidade entre humanos e macacos. O fato de Carl Linneaus ter classificado macacos e humanos como primatas - a 'mais alta' classificação entre os animais - mostra que o campo já não foi tão controverso. No entanto, com a formulação da teoria da evolução e a presumida descendência dos humanos de um parente símio, surgiram conflitos que agora precisam ser resolvidos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [concept_dubois_naturalist]#!"
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text Pelo menos #V 5 países#! têm um [concept_dubois_naturalist].#!"
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 20000 ou mais#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (atualmente [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 ou mais#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] foram coletados em todo o mundo (atualmente [GetGlobalVariable('dubois_global_specimen').GetValue|0+]).#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "Aprimorar o [concept_dubois_zoo](pequeno)"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T Estender o Zoológico para tamanho pequeno#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] são a felicidade de todos: as pessoas se espalham pelo zoológico, os cientistas podem continuar seus estudos zoológicos, e prestígio internacional é concedido àqueles que podem exibir o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Algumas etapas de expansão exigem não apenas coletar muitos animais, mas também de diferentes partes do mundo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 10 total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Você possui atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 2 Animais#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] Africanos (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 Animais#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] Asiáticos (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) ou #V 2 Animais#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] Oceânicos (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+])."
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName] não está #V atualmente expandindo#! o [concept_dubois_zoo].#!"
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "Aprimorar o [concept_dubois_zoo](medium)"
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T Aprimorar o Zoológico para tamanho médio#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos, e o prestígio internacional é concedido àqueles que conseguem exibir o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Algumas etapas de expansão exigem não apenas coletar muitos animais, mas também de diferentes partes do mundo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 20 total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Você possui atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 5 animais#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] africanos (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 5 animais#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] asiáticos (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]), #V 5 animais#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] oceânicos (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]) ou #V 5 animais#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] sul-americanos (atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_south_america').GetValue|0+]).#!"
 MR_EXTEND_ZOO_LARGE_BUTTON: "Aprimorar o [concept_dubois_zoo] (grande)"
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T Aprimorar o Zoológico para tamanho grande#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos, e o prestígio internacional é concedido àqueles que podem exibir o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Algumas etapas de expansão exigem não apenas coletar muitos animais, mas também de diferentes partes do mundo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_30_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 30 no total#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Você possui atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Aprimorar o [concept_dubois_zoo] (famoso)"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T Aprimorar o Zoológico para um tamanho famoso#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] são a felicidade de todos: as pessoas se dispersam no zoológico, os cientistas podem continuar seus estudos zoológicos e o prestígio internacional é concedido àqueles que podem exibir o maior número possível de fauna estrangeira. A cada expansão, o prestígio de uma nação aumenta. Algumas etapas de expansão exigem não apenas coletar muitos animais, mas também de diferentes partes do mundo.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 40 no total#! de [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Você tem atualmente [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]#!"
 MR_SPECIMEN_GARDEN_BUTTON: "Fundar Jardim Botânico"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Fundar Jardim Botânico#!\nUm Jardim Botânico no seu Zoológico torná-lo-á ainda mais prestigiado. Podemos plantar todas as plantas exóticas recolhidas pelo nosso [concept_dubois_naturalist].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui #V 50000 ou mais#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (atualmente [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_SPECIMEN_GARDEN_NO_BOTANICAL_GARDEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] ainda não tem um #V Jardim Botânico#!.#!"
 MR_SPECIMEN_GARDEN_EFFECT_TT: "O seu [GetBuildingType('building_dubois_zoo').GetName] obterá um #V Jardim Botânico#! que lhe dará 50 de prestígio e um pequeno impulso no padrão de vida."
 MR_SPECIMEN_COLLECTION_BUTTON: "Fundar Coleção de Espécimes"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Fundar Coleção de Espécimes#!\nEncomendar todos os nossos insetos exóticos, borboletas e outros [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] mostraria ao mundo como nossa nação é cientificamente avançada.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetName] ainda não tem uma #V Coleção de Espécimes#!.#!"
 MR_SPECIMEN_COLLECTION_EFFECT_TT: "Seu [GetBuildingType('building_dubois_zoo').GetName] receberá uma #V Coleção de Espécimes#! que lhe dará 50 de prestígio e pequenos aumentos de pesquisa."
 MR_BAN_ANIMAL_EXPORT_BUTTON: "Proibir a Exportação de Animais"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Proibir Exportação de Animais#!\nCom a proibição da exportação de animais, deixamos claro em princípio que não estamos preparados para vender nenhum dos nossos animais para o estrangeiro. Outras nações abster-se-ão de fazer indagações.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "Permitir Exportação de Animais"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T Permitir Exportação de Animais#!\nCom uma licença de exportação de animais, podemos obter uma boa renda extra.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_BUTTON: "Cruzar Animais"
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T Cruzar Animais na sua Reserva Natural#!\nTente estabelecer um novo [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] [concept_dubois_habitat] num estado com uma [concept_dubois_nature_reserve].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text Você pode procriar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] se tiver um estado com uma [concept_dubois_nature_reserve] que ainda não possui o animal específico da mesma região que a #V Reserva Natural#! e se tiver esse animal no seu [concept_dubois_zoo].\nPor exemplo, se você tiver uma #b Reserva Natural#! em um Estado Europeu e quiser procriar o #b Íbex Alpino#! nela, só poderá fazê-lo se o estado ainda não tiver um [concept_dubois_habitat] de Íbex e se você tiver #b Íbexes Alpinos#! no seu #b Zoológico#!.#!"
