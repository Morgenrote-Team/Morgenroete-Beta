 MR_MOZART_MONUMENT_BUTTON: "Construir o Monumento Mozart"
 MR_MOZART_MONUMENT_BUTTON_TT: "#T Construir o Monumento a Mozart#!\nWolfgang Amadeus Mozart é um dos compositores mais importantes de todos os tempos, mas alguns ainda lhe negam esse reconhecimento. Mais recentemente, toda uma geração de compositores o redescobriu como um ponto de partida para a música contemporânea. A construção de um monumento a Mozart em sua cidade natal, Salzburgo, inspirará futuras gerações a querer seguir seus passos.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
