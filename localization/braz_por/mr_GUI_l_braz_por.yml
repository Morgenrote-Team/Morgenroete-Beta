 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T A Automobile Association#!\nRacing está se tornando cada vez mais um esporte internacional no qual os motoristas competem com diferentes marcas de carros de diferentes países. Muitas nações começaram a realizar suas próprias corridas sem nenhum acordado. Para melhor coordenar regras e termos, o estabelecimento de um órgão internacional é necessário: uma associação internacional de automóveis. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
