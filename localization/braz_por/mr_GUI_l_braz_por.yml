 MR_REMOUNT_SKELETON_BUTTON: "Remontar Esqueleto de Dinossauro"
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T Remontar Esqueleto de Dinossauro#!\nSe você tiver algum [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] imperfeito, você pode deixar seu [concept_dubois_paleontologist] tentar remontá-lo. Se seu Paleontólogo for experiente o suficiente, o esqueleto remontado pode ser de melhor qualidade.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_REMOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text Você ainda não está #V considerando remontar um [concept_dubois_dinosaur_skeleton]#!.#!"
