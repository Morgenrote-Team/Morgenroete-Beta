 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON: "Fundar a Associação Musical Geral Alemã"
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T Fundar a Associação Musical Geral Alemã#!\nA Allgemeiner Deutscher Musikverein (ADMV, 'Associação Musical Geral Alemã') foi uma associação musical alemã fundada em 1861 por Franz Liszt e Franz Brendel, para incorporar os ideais musicais da Nova Escola Alemã de música. A ADMV visava tanto à apresentação musical quanto ao apoio prático. Como parte dos objetivos artísticos da ADMV, Tonkünstler-Versammlungen anuais em diferentes locais deveriam ser organizadas, com apresentações de obras musicais importantes, raramente ouvidas e, especialmente, novas de todos os tipos. No entanto, obras mais antigas que eram apenas raramente ou nunca ouvidas, mas de interesse devido à sua importância, também deveriam ser apresentadas.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_BUTTON_TT: "#T Railroad Project#!\nLet your [concept_tesla_engineer] focus on improving the [GetBuildingType('building_railway').GetName] in [GetPlayer.GetName]. You will be able to prioritize states and the railways in those states will get the $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier] which improves the [concept_throughput] of the building.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
