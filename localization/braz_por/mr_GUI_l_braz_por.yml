 #Avantgarde Intelligentsia 
 MR_ACADEMICS_AVANTGARDE_TT: "#T Avantgarde Intelligentsia#!\nA CRINCE DE Acadêmicos com idéias culturais, sociológicas e antropológicas claras determina a vida científica cotidiana. Por outro lado, os campos práticos são de menor importância. \ N#R Note#!: Aumenta a aparência dos acadêmicos em um ponto por mês. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] não possui o foco #b Avantgarde Intelligentsia#! e ainda não mudou recentemente seu foco.#!" #NT!
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text pelo menos #p 50%#! das universidades [GetPlayer.GetAdjective] têm o [concept_pm_academics_university_humanities].#!" #NT!
 #Practical Academia 
 MR_ACADEMICS_PRACTICAL_TT: "#T Academia prática Os cientistas em nosso país tentam incansavelmente fazer descobertas de todas as áreas adequadas para uso cotidiano prático. Isso é para servir ao progresso e paz gerais da humanidade. \ N#R Note#!: Aumenta a aparência dos acadêmicos em um ponto por mês. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetName] não possui o foco #b da academia prática e ainda não mudou recentemente seu foco.#!" #NT!
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text pelo menos #p 50%#! das universidades [GetPlayer.GetAdjective] têm o [concept_pm_academics_university_natural_history].#!" #NT!
 #Military-Industrial Complex 
 MR_ACADEMICS_MILITARY_TT: "#T Complexo industrial militar §1 entre industriais privados e militares levou ao desenvolvimento de uma rede particularmente importante de conexões, laços pessoais e conhecidos, com apenas um pequeno indício de corrupção, que pode ser melhor descrito como um complexo industrial militar. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] não possui o #b Complexo Industrial #! Foco ainda e ainda não mudou seu foco.#!" #NT!
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text pelo menos #p 50%#! das universidades [GetPlayer.GetAdjective] têm o [concept_pm_academics_university_mathematics].#!" #NT!
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName] tem pelo menos um [GetBuildingType('building_war_machine_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plants').GetName] ou [GetBuildingType('building_artillery_foundries').GetName] do nível #p 5#! ou superior.#!" #NT!
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text O exército [GetPlayer.GetAdjective] é pelo menos de tamanho #b 50#! ou superior.#!" #NT!
 #Business Schools & Tycoon Capitalism 
 MR_ACADEMICS_BUSINESS_TT: "#T Escolas de Negócios e Ticot Capitalism#!\nThe Independente Independente Combinado com um tempo de progresso próspero levou a uma mentalidade em que escolas comerciais, empresas de médio porte e grandes corporações têm uma influência decisiva na ciência do país. Vice-versa, as universidades trabalham para aumentar a prosperidade adquirida do país por meio de novas tecnologias e para impulsionar idéias sociais através do progresso. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] não possui as escolas de negócios #b e o foco do Capitalism#! ainda e ainda não mudou seu foco.#!" #NT!
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text pelo menos #p 35%#! das universidades [GetPlayer.GetAdjective] têm o [concept_pm_academics_university_mathematics].#!" #NT!
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text pelo menos #p 35%#! das universidades [GetPlayer.GetAdjective] têm o [concept_pm_academics_university_humanities].#!" #NT!
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] possui [GetBuildingType('building_textile_mills').GetName] ou [GetBuildingType('building_furniture_manufacturies').GetName] de pelo menos nível #p 15#! ou [GetBuildingType('building_tooling_workshops').GetName] ou [GetBuildingType('building_steel_mills').GetName] de pelo menos nível #p 10#! ou [GetPlayer.GetName]0 ou [GetPlayer.GetName]1 de pelo menos nível #p 5#!.#!" #NT!
 #Sea Power & Merchant Marine 
 MR_ACADEMICS_SEAPOWER_TT: "#T Power e Merchant Marine#!\nThe Marinha e comércio internacional desempenham um imenso papel para o nosso país. Aumentar a prosperidade por meio de produção avançada e comércio global em nossos produtos é tão importante quanto defender o que já foi ganho. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] não possui o foco do #b do mar e do comerciante de marítimo." #NT!
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text pelo menos #p 35%#! das universidades [GetPlayer.GetAdjective] têm o [concept_pm_academics_university_mathematics].#!" #NT!
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text pelo menos #p 35%#! das universidades [GetPlayer.GetAdjective] têm o [concept_pm_academics_university_natural_history].#!" #NT!
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text A Marinha [GetPlayer.GetAdjective] é pelo menos de tamanho #b 50#! ou superior.#!" #NT!
 #Useful Ivory Tower 
 MR_ACADEMICS_USEFUL_TT: "#T A academia útil do marfim é vista em nosso país como um refúgio para mentes excêntricas que contam besouros, velhos velhos poloneses e se envolvem em ímpares. No entanto, não se pode negar que o isolamento da torre de marfim da sociedade também tenha suas vantagens. Undisturbed, many a professor works better.\n#R Note#!: Increases the appearance of Academics by one point per month.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "None" #NT!
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text pelo menos #p 35%#! das universidades [GetPlayer.GetAdjective] têm o [concept_pm_academics_university_humanities].#!" #NT!
