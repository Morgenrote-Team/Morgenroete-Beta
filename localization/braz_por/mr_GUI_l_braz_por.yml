 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON: "Encontrado Clube de Automóvel" #NT!
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON_TT: "#T Encontrado do Automobile Club#!\nEstablishing Um clube de automóveis é o primeiro passo na construção de outras instalações essenciais para o automobilismo. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
