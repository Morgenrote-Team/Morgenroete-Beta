 MR_BEETHOVEN_MONUMENT_BUTTON: "Construir o monumento de Beethoven" #NT!
 MR_BEETHOVEN_MONUMENT_BUTTON_TT: "#T Construir o Monument#!\nThere de Beethoven é sem dúvida que Ludwig Van Beethoven foi o maior compositor de todos os tempos e que toda a música romântica é uma conseqüência de seu trabalho. Todo artista contemporâneo lhe deve uma homenagem. É ainda mais surpreendente que ele ainda seja muito pouco apreciado. Após um apelo de Robert Schumann, no entanto, várias associações, cidades, príncipes e governos coletaram dinheiro para erguer um memorial em seu local de nascimento Bonn. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
  
