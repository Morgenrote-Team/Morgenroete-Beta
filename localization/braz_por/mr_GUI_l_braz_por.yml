 VISIT_PALEONTOLOGICAL_COLLECTION_BUTTON_TT: "#T Visite a Coleção Paleontológica#!\nA [concept_dubois_paleontological_collection] oferece mais informações sobre nossos achados de [concept_dubois_fossil], nosso [concept_dubois_paleontologist] e nosso [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_PALEONTOLOGICAL_COLLECTION_REQUIREMENTS_TRIGGER_TT: "#default_text [GetPlayer.GetName] possui um [concept_dubois_paleontologist], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ou [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].#!"
