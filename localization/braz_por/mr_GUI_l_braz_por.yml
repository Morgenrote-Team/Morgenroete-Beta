 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Pesquisar um depósito de ferro #!\nGeophysics e o geomagnetismo têm muitos usos práticos. A mineração em particular se beneficiou da descoberta de possíveis depósitos. As grandes empresas usaram o conhecimento geofísico para localizar depósitos anteriormente desconhecidos de ferro, chumbo e petróleo. Juntamente com as tecnologias corretas e o mapeamento do campo magnético da Terra, deve ser fácil fazer uso produtivo do conhecimento teórico atual. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
