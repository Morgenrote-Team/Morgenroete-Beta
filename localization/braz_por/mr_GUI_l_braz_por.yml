 MR_IMPRESSIONISM_BUTTON: "Impressionismo" #NT!
 MR_IMPRESSIONISM_BUTTON_TT: "#T Escolha o impressionismo §1 é um estilo na história da arte que é caracterizado pela representação atmosférica de instantâneos fugazes de uma cena. Emergiu de um movimento dentro da pintura na França na segunda metade do século XIX. O termo impressionismo também foi aplicado a certos estilos de música, literatura, cinema e fotografia. Enquanto muitos naturalistas como Heinrich Hart rejeitavam a música como um meio de expressar um 'acionismo em busca de verdade', os impressionistas costumavam considerar o 'sonho sem objetos à frente' para graduar acordes coloridos finamente como um prazer. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Os [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] são [concept_powerful].#!" #NT!
 MR_NOT_POWERFUL_INTELLIGENTSIA_TRIGGER_TT: "#default_text O [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] não é [concept_powerful].#!" #NT!
 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text O [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] tem um [concept_approval] de #V 5 ou superior #!.#!" #NT!
 MR_EXPRESSIONISM_BUTTON: "Expressionismo" #NT!
 MR_EXPRESSIONISM_BUTTON_TT: "#T Escolha o Expressionism#!\n[concept_elgar_expressionism] é um estilo no art. Seu início e precursores podem ser encontrados no final do século 19. Como impressionismo, simbolismo e fauvismo, o expressionismo é um movimento contra as tendências do naturalismo. No expressionismo, o nível expressivo supera o nível estético, apelativo e factual. O artista quer representar sua experiência para o espectador. Em contraste com o impressionismo musical, que descreve a percepção da aparência externa das coisas, os movimentos da arte expressionista formulam as emoções da alma humana. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_POWERFUL_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text O [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] ou [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] são [concept_powerful].#!" #NT!
 MR_NOT_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Os [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] não são [concept_powerful].#!" #NT!
 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text O [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] ou [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] tem um [concept_approval] de #V 5 ou superior #!.#!" #NT!
 MR_ART_NOUVEAU_BUTTON: "Art Nouveau" #NT!
 MR_ART_NOUVEAU_BUTTON_TT: "#T Escolha Art Nouveau#!\n[concept_elgar_art_nouveau], Principalmente em conexão com a Itália também Stile Liberty, é uma época histórica da arte na virada do século XIX para o século XX. As correntes que podem ser atribuídas a Art Nouveau são o estilo de reforma (após o movimento de reforma), o estilo de secessão (após a secessão de Viena), o modernismo na Catalunha, no estilo da Suíça Sapin e no estilo Tiffany dos EUA. Além da expressão Art Nouveau, que é dominante em francês, inglês e italiano, o estilo moderno também é usado em inglês e no STILE em italiano. Em termos de tempo, Art Nouveau pertence ao Fin de Siècle. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
 MR_POWERFUL_INDUSTRIALISTS_TRIGGER_TT: "#default_text Os [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] são [concept_powerful].#!" #NT!
  
