 MR_MOZART_MONUMENT_BUTTON_TT: "#T Construa o Mozart Monument#!\nWolfgang Amadeus Mozart é um dos compositores mais importantes de todos os tempos, mas alguns ainda negam a ele esse reconhecimento. Mais recentemente, toda uma geração de compositores o redescobriu como ponto de partida para a música contemporânea. A montagem de um monumento de Mozart em seu local de nascimento Salzburgo inspirará as gerações futuras a querer seguir seus passos. \ N \ n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #NT!
