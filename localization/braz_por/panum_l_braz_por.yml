 panum.52.t: "Expedição de observação médica" #NT!
 panum.52.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] reuniu uma pequena equipe de especialistas e assistentes adequados para observar de perto uma epidemia no exterior e tirar conclusões dele. A questão agora surge sobre qual doença deve ser observada em qual país." #NT!
 panum.52.f: "Existem dois tipos diferentes de expedições médicas que um médico pode realizar: expedições de observação e expedições de pesquisa. As expedições de observação ajudam a concluir uma descrição de uma doença, expedições de pesquisa para descobrir um método de tratamento. No entanto, uma expedição não é tão eficiente quanto a pesquisa no local e pode levar várias tentativas para pesquisar totalmente uma doença." #NT!
