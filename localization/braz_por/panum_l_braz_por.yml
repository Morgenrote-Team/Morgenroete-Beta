 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]" #NT!
 panum.138.d: "Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Apresentado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Descrição da doença de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] hoje. A faculdade médica já o vê como um clássico." #NT!
 panum.138.f: "No [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Tratise [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')] [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] lida com a doença com mais detalhes do que qualquer outro médico em nosso país antes. Educa o leitor sobre sintomas, o período de incubação e a diferenciação de outras doenças, bem como uma cronologia de epidemias passadas e outras descrições epidemiológicas tradicionais." #NT!
 panum.138.g: "Agora conhecemos a besta melhor." #NT!
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.139.f: "A faculdade médica aguardava ansiosamente o artigo científico sobre o método de tratamento de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. Esse trabalho talvez tenha um avanço? §1 poderia potencialmente salvar a vida de inúmeras pessoas. As razões que ele descreve para o surto de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] e as maneiras pelas quais ele pode ser evitado ou tratado depois podem mudar fundamentalmente a maneira como essa doença foi pensada." #NT!
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] está perdendo seu horror." #NT!
  
 panum.140.t: "Colera - uma doença nascido na água!" #NT!
 panum.140.d: "Graças ao trabalho heróico do médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], o surto de cólera em [SCOPE.sState('panum_disease_state').GetCityHubName] foi decisivamente esmagado!" #NT!
 panum.140.f: "Desde o início do meu tempo aqui em [SCOPE.sState('panum_disease_state').GetCityHubName], reuni uma grande quantidade de informações que todos apontam para uma conclusão: a cólera é uma doença transmitida por água. A doença que matou tantos por séculos não é encontrada no ar, como miasma, mas se contorce e enxames em gotas de água. Ingestente, ele se desenvolve no intestino e se manifesta na cólera que aprendemos a lutar. É uma lição aprendida, mas rapidamente agiu. Na semana passada, eles removeram as alças da bomba de água no coração desse surto. Hoje, me aposentei da noite sem um único novo caso trazido para a minha mesa. É irrefutável. A besta é morta. \ N \ nyet, sinto um lamento por tudo isso. Não gostaria de poder reivindicar uma responsabilidade total e exclusiva pelas descobertas que fizemos aqui, apenas que elas poderiam ter sido descobertas ainda mais cedo. Muitas vidas foram perdidas por falta de água potável, jovem e velha. Se tivermos sorte, que este seja o último que enfrentarmos da cólera." #NT!
 panum.140.g: "Incrível! Este é um golpe mortal para a teoria de Miasma!" #NT!
 panum.141.t: "A cervejaria" #NT!
 panum.141.d: "A investigação do Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] levou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a uma ilha de segurança no surto - uma cervejaria de cerveja." #NT!
 panum.141.f: "'Olá! Disseram -me que você deve ser o capataz aqui na cervejaria. Eu sou o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] e estou aqui para investigar o surto. Por favor, diga -me mais. A maioria das outras fábricas está se fechando, mas não nós. '\ N \ n'a cólera não afeta muito você, aqui? Você tem alguma idéia do porquê? Mas se eu tivesse que apostar, é porque os rapazes não vão para casa em todo esse fedor. O chefe permite que todos tenham alguns dos lotes mais antigos que não estão vendendo bem com o almoço, um pouco me pega para os meninos baratos. Nenhuma dessas água de poço para nós, apenas uma cerveja de cerveja por mais pouco possível para fazer." #NT!
 panum.141.g: "Hmmm ... para que você não beba a água local. Muito fascinante." #NT!
 panum.142.t: "Criaturas de hábito" #NT!
 panum.142.d: "A investigação do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] continua - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] encontrou o que pode ser o centro do surto." #NT!
 panum.142.f: "'... mas tão comuns foram os casos na área que percebi que precisava de mais orientação. Felizmente, o escritório do médico legista local provou ser da maior assistência: eles haviam escrito o endereço de todas as casas das quais haviam tomado um corpo ou tomaram conhecimento de doenças, e isso me forneceu os meios para colocar cada um com precisão em um mapa simples. A área resultante é vasta, abrangendo mais de cem casas, mas também forma um vasto círculo. Se fosse um miasma, certamente seria transportado pela brisa, viajando pelos ventos predominantes. Em vez disso, vai além dos ventos, redondo e perturbadoramente arrumado. Fui até o centro de tudo, talvez esperando encontrar alguma pista ... e encontrei ninguém menos que uma bomba de água. Toda casa no gráfico estava a uma curta distância. Deve haver algum tipo de conexão." #NT!
 panum.142.g: "Poderia ... estar na bomba, de alguma forma?" #NT!
 panum.143.t: "Os estranhos" #NT!
 panum.143.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou algo interessante - uma quebra no padrão." #NT!
 panum.143.f: "'Oh, graças aos céus! Você deve ser o médico da qual eles estão falando, doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Por favor, você tem que nos ajudar. '\ N \ n'i pretendo totalmente, senhora. Por favor, diga -me o máximo que puder sobre você e a sua, e não poupe nem o menor detalhe, se puder. O seu parece ser um dos únicos casos neste bairro? '\ N \ n'yes, sim, nós somos! Apenas saiu do nada! Tomamos todas as precauções, mesmo usando uma delas máscaras florais com todas as flores para manter o fedor afastado! O que quer que seja?" #NT!
 panum.143.g: "... Você disse que trouxe a água de volta da bomba?" #NT!
 panum.144.t: "Os filtros" #NT!
 panum.144.d: "Em [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] tentam descobrir mais pistas sobre o surto, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que todas as vítimas têm água da mesma empresa!" #NT!
 panum.144.f: "'... mas é a coisa mais curiosa de todas. Quando viajei pela estrada, ou rio acima, para casas apoiadas pela New River Company, a quantidade de casos de cólera caiu dramaticamente. Não era mais do que o habitual, se isso. Retorne para o sul, e encontra -se que as ruas estivessem em chamas com cólera, cheias de fedem de entranhas e morte. Isso poderia ser uma localização do solo miasmático? \ N \ ni pensa não. Parece marcado com muita limpeza. Entrei em contato com os senhores honrosos da The New River Company e eles me informaram que seus canos foram fechados recentemente enquanto eles adicionavam novos filtros, com ótimos custos, à sua estação de bombeamento. Esses filtros poderiam estar fazendo parte invisível nisso? Poderia ser uma limpeza ociosa da água mantendo o miasma afastado, ou algo mais?" #NT!
 panum.144.g: "... Existe algo na água que traz doenças?" #NT!
 panum.145.t: "Água marrom" #NT!
 panum.145.d: "Equipado com os instrumentos mais recentes para a pesquisa [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] usou o microscópio [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para examinar amostras do surto de cólera." #NT!
 panum.145.f: "Não tinha sido fácil trazer o microscópio até [SCOPE.sState('panum_disease_state').GetCityHubName], pois uma colisão na estrada quase quebrou todas as lentes ... mas agora que estava aqui, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tinha uma das maiores ferramentas da medicina moderna à sua disposição. Algumas dezenas de amostras reunidas da água local, cuidadosamente preparadas e cada uma vista sob o microscópio. Alguns vieram de áreas com menos cólera. Esses eram os mais limpos, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] observou. \ N \ nbut os sujos? Aqueles montados com sujeira do tipo mais vil? \ N \ n \ n \ n \ n \ n \ nentheus foram os da áreas mais afetadas. Uma testa escovada, um momento de pensar. Flickers de sujeira flutuando no líquido, como flocos de neve suja. Aqui, ali, os pequenos movimentos de micróbios inofensivos, inocentemente flutuando sobre a sopa miserável." #NT!
 panum.145.g: "... ou você não é tão inofensivo quanto parece?" #NT!
 panum.145.h: "Mais evidências para outra teoria." #NT!
 panum.145.i: "Tem que haver mais nisso." #NT!
 panum.146.t: "A primeira morte" #NT!
 panum.146.d: "Após o incansável trabalho e investigação, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] rastreou o surto de volta ao primeiro caso registrado - um bebê recém -nascido." #NT!
 panum.146.f: "Havia mais alguns lembretes sombrios do que o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez do que visitar a casa de uma mulher no pior de luto, uma mulher que já havia sido esposa e uma vez mãe, mas agora não era. Já, mal fora dos degraus da porta, o médico estava fazendo as anotações. Voltou com cólera. As fraldas lavadas, possivelmente transportando doenças. \ N \ nhusband retornou do trabalho. Sede após o turno no siderúrgico. Comeu bem, bebeu bem, morreu no final da semana, cólera. À frente, ruas chuvosas e desoladas. Entre tudo isso, uma frase sussurrada." #NT!
 panum.146.g: "Por favor, que haja um fim para tudo isso." #NT!
 panum.147.t: "O poço" #NT!
 panum.147.d: "Enquanto conduzia a investigação [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou algo negligenciado - um fossa." #NT!
 panum.147.f: "O doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] não gostava da teoria de Miasma, mas [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] se viu muito grato pelas máscaras florais destinadas a mantê -la afastada. O Cesspit estava cheio de resíduos apodrecidos e totalmente, totalmente rancid. Até o inspetor da polícia se afastou de sua borda. \ N \ n'doctor! Tal poço certamente deve ser a fonte desse miasma, e a cólera miserável que nos dá! '\ N \ n'per, mas olhe aqui, inspetor. Você vê a maneira como a chuva flui para a terra, aqui? '\ N \ n'aye, sim, mas e assim? Deve fluir através deles, mas se assim for, levaria a água perto da bomba. Se os acessórios estiverem comprometidos ... '\ n \ n' ... então enfiou as águas residuais na alça. Eca. Uma doença boa não se espalha pela água ... '" #NT!
 panum.147.g: "...certo?" #NT!
 panum.147.h: "Errado!" #NT!
 panum.148.t: "A mansão" #NT!
 panum.148.d: "A investigação do Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] levou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a um buraco curioso na compreensão do surto - o lar de um homem rico." #NT!
 panum.148.f: "“Visitei a residência de um cavalheiro local hoje, uma grande habitação dentro dos limites da cidade, perigosamente perto do coração do surto. Parece um remanescente de um dia anterior na história desta cidade, quando essa parte era mais rica que uma favela mesquinha. O mestre da casa ficou bastante fascinado com a investigação e me forneceu muitos livros sobre história local, na esperança de que eles pudessem iluminar surtos passados. Mais interessante, eles deixaram claro que a cólera ainda não alcançou as paredes. Até seus servos não são aflitos, pelo menos aqueles que vivem dentro dos quartos. Eles comem da despensa e bebem do poço artesiano dentro das paredes, e de alguma forma isso os torna inalterados. Um enigma curioso. É algo que eles têm que os outros não?" #NT!
 panum.148.g: "Ou ... talvez os servos não tenham algo que os doentes possam ter?" #NT!
 panum.149.t: "A pequena morte" #NT!
 panum.149.d: "A investigação do Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] possivelmente revelou o culpado - um micróbio!" #NT!
 panum.149.f: "'' ... mas ainda assim, eu tinha que ter certeza. Peguei amostras novas, tiradas da água e efluentes especialmente preparados dos doentes. Colocada no vidro do meu microscópio, pude espiar dentro desses líquidos e confirmar a presença do que deve ser nosso grande inimigo nesta batalha: vibrações. \ N \ nat Primeira olhada, esses micróbios parecem ser inofensivos, mais como tubos do que qualquer grande predador. Mas todas as amostras dos doentes confirmam sua presença, e parece confiante dizer que essas criaturas estão participando dessa doença. Eles são ... a própria cólera? Talvez. Nesse caso, é uma evidência concreta para a teoria de que germes como essa causam doença. \ N \ nbut uma coisa é certa: encontramos o inimigo. Agora, devemos matá -los." #NT!
 panum.149.g: "Limpe e trate, até que seja feito." #NT!
 panum.149.h: "Essa descoberta vai muito além da cólera." #NT!
 panum.150.t: "Uma questão na matéria" #NT!
 panum.150.d: "Um raro aliado na batalha contra a doença, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se reúne com o médico legista em [SCOPE.sState('panum_disease_state').GetCityHubName] para discutir suas descobertas." #NT!
 panum.150.f: "'Ah, você deve ser médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Perdoe -me por não sacudir sua mão, eu tenho vasculhado em cadáveres nos últimos dias. '\ N \ n' ... acredite, você não precisa pedir meu perdão. Você é o médico legista local, por favor, conte -me suas descobertas. Mais do que isso, eu não preciso dizer. Vômito, purga, um intestino tão entupido que parece claras de ovo, alguém tão aprendido quanto você conhecerá a lista. '\ N \ n', é claro, mas o que você acha interessante? Eu estaria morto agora se sim. Eu tive muitos corpos nessa mesa, médico. Isso fede a intoxicação alimentar, mas não é." #NT!
 panum.150.g: "Um pensamento muito fascinante. Diga -me mais." #NT!
  
 panum_physician_health_malus_modifier: "Trabalho inquieto" #NT!
  
 panum.151.t: "A fábrica de ferramentas" #NT!
 panum.151.d: "Enquanto trabalha na investigação [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], a viagem do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a uma fábrica de ferramentas local levanta mais perguntas do que respostas." #NT!
 panum.151.f: "'Quando fui à fábrica de ferramentas outro dia, as coisas pareciam estar fazendo algum sentido a princípio. Esta fábrica é especializada em facas, ferramentas de açougueiro e similares, e assim elas têm uma estação de afiação. Ele usa rodas de água para girar um grande número de pedras de whets, afiando as rodas para terminar a borda em cada lâmina. Cada trabalhador estava deitado em suas barrigas perto do moedor e pode ser jogado com água. Tudo isso faz sentido, e se o surto na fábrica tivesse sido limitado lá, teria feito sentido. Há homens na fábrica adoecendo depois de nunca estarem perto da rua no coração desse surto, nem nas rodas de afiação. Como isso poderia ser possível?" #NT!
 panum.151.g: "Aparentemente, uma pista errada." #NT!
 panum.151.h: "Aparentemente, uma teoria errada." #NT!
 panum.152.t: "A jarra" #NT!
 panum.152.d: "Infelizmente, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está perseguindo um beco sem saída - um caso local de intoxicação alimentar, não relacionada à cólera." #NT!
 panum.152.f: "Hoje foi um dia muito agravante. Fui chamado pelo policial para investigar um súbito surto de doença em um hotel popular, que parecia ser uma súbita explosão de cólera. Eu havia reunido todas as minhas coisas para investigar, alertando as autoridades adequadas para encontrar camas e cuidar dos doentes, mas no momento em que cheguei, sabia que isso não era cólera. Os sintomas estavam errados, o início repentino muito rápido. Uma causa mais local teve que ser culpada e, sem surpresa, todos os aflitos haviam começado a mesma refeição. \ N \ Na NA Venture nas cozinhas revelou o culpado: um pote de pato de pato certamente expirado, manchado em pão fino por um cozinheiro com um nariz muito bloqueado por um resfriado para cheirar a root. Uma perda de tempo, se alguma vez houve um. A intoxicação alimentar não é a cólera." #NT!
 panum.152.g: "... bem, pelo menos sabemos limpar os armários, pelo menos." #NT!
 panum.153.t: "Erros" #NT!
 panum.153.d: "Ocorreu um acidente durante a investigação do médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] misturou suas amostras!" #NT!
 panum.153.f: "Mas, bem no meio do trabalho, tive uma interrupção. Gritando, gritando, o som de uma luta na rua. Uma briga bêbada, uma xícara demais. O policial foi rápido em colocá -lo em ordem, arrastando -os para longe, gritando ainda. Mais tolo, sou que não notei que coloquei as amostras na ordem errada e de onde a partir daí do que fazer meu trabalho na ordem errada, para registrar cada uma em ordem errada?" #NT!
 panum.153.g: "Semanas de trabalho, desperdiçado. Condenação." #NT!
 panum.154.t: "O assassino de imitadores?" #NT!
 panum.154.d: "A investigação do surto de cólera em [SCOPE.sState('panum_disease_state').GetCityHubName] deu uma guinada alarmante - parece que pode haver outra doença!" #NT!
 panum.154.f: "'Ah, prazer em conhecê -lo novamente, o nome do médico %. Minha mesa está ocupada na semana passada. '\ N \ ni não chamaria de bom conhecê -lo, médico legista. O que temos? Principalmente as crianças também e os idosos. Tem certeza de que não é? Disenteria, cólera, tifo? Intoxicação alimentar comum? Quem pode dizer? A única coisa que sei é que não parece a mesma. Não tenho o branco, como a cólera, mas a morte é a mesma. Como devemos distinguir os dois separados? '" #NT!
 panum.154.g: "Não posso fazer um plano se não souber o que estou lutando." #NT!
 panum.155.t: "O miasma ...?" #NT!
 panum.155.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] e [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] a investigação tiveram um problema - poderia ser o miasma é real?" #NT!
 panum.155.f: "'' ... Mas os resultados deste último quadrante da investigação desafiam os raciocínio da teoria dos germes, e não posso, como eu sou de mim. As casas ficam além de um canal raso, freqüentemente percorrido por barcaças entregando carvão para as fundições. Eles não estão dentro da faixa de caminhada fácil de bombas de água, exceto um poço antigo. É puro, talvez o mais puro da cidade. \ N \ nyet, por algum motivo além de mim, a cólera está aqui. Eles já trabalham para manter o fedor afastado, e o fedor, o miasma, realmente está lá. O canal cheira a efluente ... mas se eles não bebem essa água, de que outra forma podem ser prejudicados, exceto pelo cheiro sozinho?" #NT!
 panum.155.g: "Miasma não pode estar correto ... pode?" #NT!
 panum.156.t: "Desconstruído" #NT!
 panum.156.d: "Com uma fome por cada vez mais terra, o desenvolvimento de [SCOPE.sState('panum_disease_state').GetCityHubName] não tem tempo para parar, mesmo para a investigação do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.156.f: "'' ... quem é você de novo? '\ n \ n'O médico investigando esse surto. Esta rua estava cheia de pessoas doentias. Onde eles estão? '\ N \ n'n't uma pista. Eu, rapazes e eu estamos aqui apenas para começar a rasgar essas casas. O que? Essas casas abrigavam uma dúzia de famílias, todas infectadas com cólera! O proprietário transformou o lote para a rua. Não paga aluguel como esse, mas não importaria de qualquer maneira. Land está indo para ser um moinho têxtil e, se você não se importa, eu e os meninos temos que começar a trabalhar derrubando essas casas." #NT!
 panum.156.g: "Oh, pelo amor de Deus. Agora eu tenho que encontrar os doentes de novo ... apenas não beba nada." #NT!
 panum.157.t: "Contaminado" #NT!
 panum.157.d: "Notícias terríveis! O médico foi infectado com cólera!" #NT!
 panum.157.f: "- Não sei como aconteceu. Miasma? Estou com os doentes, os mortos e os moribundos há semanas, mais do que ninguém. Germes? Eu não bebi a água, mas e a contaminação? Poderia ser espalhado pelo toque? No ar, em superfícies? Eu não sei. \ N \ nbut eu conheço os sintomas. A dor de estômago e como nunca acaba. Eu também posso comer e não beber nada, para todo o bem que me faz. Fala mil verdades e uma. \ N \ ni tem cólera." #NT!
 panum.157.g: "Oh, espero que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] melhore logo." #NT!
  
 panum.161.t: "Um ponto de gin" #NT!
 panum.161.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tirou algum tempo do trabalho para 'investigar' sua outra paixão: álcool." #NT!
 panum.161.f: "'... Mas enquanto no meu segundo copo daquela bebida mais maravilhosa, comecei a perceber algo bastante estranho. Quanto mais pessoas chegavam a este lugar para beber, menor a probabilidade de serem afetadas pela cólera. De fato! Meu próprio mapa de trama mostra que essas casas mais próximas a este lugar têm uma chance substancialmente menor de ser afetado com essa doença miserável. Eu falei mais com o proprietário e com vários habitantes locais mais afáveis, e eles parecem concordar. Há algo nesse lugar que parece ajudar a afastar a doença. Eu deveria investigar mais." #NT!
 panum.161.g: "Ah, as maravilhas dos negócios e do prazer em um." #NT!
 panum.162.t: "Baixo está para cima" #NT!
 panum.162.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tomou o movimento mais ousado de todos - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] deu [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] cólera bebendo água contaminada!" #NT!
 panum.162.f: "'' ... Claro, toda a melhor teoria do mundo não é nada sem prática. Apesar de todo o trabalho, permanece, mas acontece com meus detratores, que continuam afirmando que não há evidências irrefutáveis ​​com as quais cimentar meus pensamentos. Muito bem, então. Vou encontrá -los de frente e da maneira mais direta de todos: bebendo a mesma água encontrada no coração desse surto, entregue por um corredor fiel. Se eles estiverem certos, então não fico doente mesmo quando removido do local. Se eu for, em breve estarei lutando pela minha vida, mas o que é uma vida, em comparação com tantos que podem ser salvos se eu puder provar minhas reivindicações?" #NT!
 panum.162.g: "- Oh, querido, eu sinto ... oh não." #NT!
 panum.162.h: "Dissuadir o médico desta manobra imprudente!" #NT!
 panum.163.t: "Um mapa para o sucesso" #NT!
 panum.163.d: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu elaborar um mapa excelente do núcleo do surto, facilitando o rastreamento do progresso da doença." #NT!
 panum.163.f: "Senhores, senhores, apresento a você meu mapa da infecção em [SCOPE.sState('panum_disease_state').GetName]. Ele abrange, em detalhes excelentes, a localização de cada infecção na região, cronometrada e carimbada de acordo, com o nome e o número de mortes, infecções e assim por diante. Apresenta uma linha do tempo escrita de toda a progressão do surto de cólera neste bairro. Um exemplo: aqui, vemos uma bomba de água e o número de casas a uma curta distância. Se você bem, cavalheiros daria uma olhada por si mesmos, verá que as áreas atendidas por essa bomba de água têm as maiores taxas de mortalidade de todas. Por aqui, nesta tabela, vemos que a empresa de água, [SCOPE.sState('panum_disease_state').GetName] Wells, tem uma correlação direta com essas bombas, o que, por sua vez, mostra que esta empresa tem o maior risco de cólera de todas as áreas de serviço ..." #NT!
 panum.163.g: "Esta será uma ciência um dia." #NT!
 panum.164.t: "Fogo e fúria" #NT!
 panum.164.d: "A falta de progresso no combate ao surto de cólera em [SCOPE.sState('panum_disease_state').GetName] desgastou a paciência do doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.164.f: "Os gritos podiam ser ouvidos a quase um quarteirão de distância, e o som de livros e xícaras jogados de sua mesa de fora da porta. Uma enxurrada de maldições, desculpas frenéticas e desesperadas de assistentes assustados, depois mais gritos e muito mais. Você absoluto, imbecis absolutos! Estamos aqui por um motivo! As pessoas estão morrendo do lado de fora da nossa porta, e elas nos procuram para salvá -las e salvá -las, nós o faremos! Aqueles de vocês que podem, seguem minhas ordens até a carta, e veremos essa praga miserável! Você me ouve? '\ N \ n'yes, doutor! Os certos, desta vez!" #NT!
 panum.164.g: "E assim, o médico coloca seu exército na marcha, pronto para fazer guerra contra a própria doença." #NT!
 panum.165.d: "Em um momento de coragem total, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visitou um dos hospitais mais aflitos em [SCOPE.sState('panum_disease_state').GetCityHubName] para entrevistar os pacientes de lá." #NT!
 panum.165.f: "A enfermaria deste hospital improvisado estava lotado, cheio de pontos turísticos e sons, mas cheira mais do que qualquer outro. O cheiro de doença. O cheiro da morte. As flores foram trazidas para tentar manter o cheiro afastado e também o incenso, mas mesmo assim, poucos chegaram a esse salão dos condenados. Era muito arriscado, eles disseram, perigosos demais para sua própria saúde. Como eles poderiam esperar ajudar os outros, se eles também morressem em uma cama? \ N \ nfew chegou, mas não nenhum. O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] era um deles, e eles percorreram esse local de morte e morrendo com coragem incessante e energia sem fundo. Eles sentaram -se ao lado do doente e sozinho, fazendo perguntas, fazendo anotações. Todo pensamento, toda resposta, era preciosa. Eles eram as pistas da salvação, as dicas de onde essa morte poderia vir e como ela também pode ser morta." #NT!
 panum.165.g: "E neste Hall da Morte, um anjo da vida caminhou, diário na mão." #NT!
 panum.166.t: "O poder da oração" #NT!
 panum.166.d_christian: "Em busca de insights e talvez conforto, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou um padre em uma catedral local." #NT!
 panum.166.d_muslim: "Em busca de insights e talvez conforto, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou um imã em uma mesquita local." #NT!
 panum.166.d_other: "Em busca de insights e talvez conforto, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou um padre em um templo local." #NT!
 panum.166.f_christian: "'Olá, pai. Sou médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado pelo capital para investigar esse surto e oferecer qualquer ajuda que puder. Eu pediria sua ajuda nisso, se você puder emprestá -lo. Diga -me, criança. O que você precisa? '\ N \ n'i gostaria de saber o máximo que você pode me contar sobre os primeiros dias dessa infecção. Quem foi o primeiro a sucumbir? Onde? Você tem algum pensamento sobre de onde pode ter vindo? Venha, venha. Afinal, tenho tomado meus escritos." #NT!
 panum.166.f_muslim: "'As-Salamu Alaykum, imã. Sou médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado pelo capital para investigar esse surto e oferecer qualquer ajuda que puder. Eu pediria sua ajuda nisso, se você puder emprestá -lo. Diga -me, o que você precisa? '\ N \ n'i gostaria de saber o quanto você pode me contar sobre os primeiros dias dessa infecção. Quem foi o primeiro a sucumbir? Onde? Você tem algum pensamento sobre de onde pode ter vindo? '\ N \ n'only Allah pode ter a resposta para algumas dessas perguntas, mas sim, eu sei muito sobre a comunidade aqui. Venha, venha. Afinal, tenho tomado meus escritos." #NT!
 panum.166.f_other: "'Saudações a você, padre. Sou médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado pelo capital para investigar esse surto e oferecer qualquer ajuda que puder. Eu pediria sua ajuda nisso, se você puder emprestá -lo. Diga -me, doutor. O que você precisa? '\ N \ n'i gostaria de saber o máximo que você pode me contar sobre os primeiros dias dessa infecção. Quem foi o primeiro a sucumbir? Onde? Você tem algum pensamento sobre de onde pode ter vindo? '\ N \ n'only the Divines pode ter a resposta para algumas dessas perguntas, mas sim, eu sei muito sobre as pessoas aqui. Venha, venha. Afinal, tenho tomado meus escritos." #NT!
 panum.166.g_christian: "A limpeza está ao lado da piedade." #NT!
 panum.166.g_muslim: "Há uma cura para todas as doenças." #NT!
 panum.166.g_other: "Saiba bem o que leva você para a frente e o que o impede." #NT!
 panum.167.t: "Seguro, desculpe" #NT!
 panum.167.d: "Em uma tentativa de permanecer seguro ao conduzir sua investigação, o Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] isolou com segurança §1 para longe dos infectados." #NT!
 panum.167.f: "'Há alguns que chamariam isso de covardia. Eu chamaria isso de pragmatismo. Esta não é uma batalha que pode ser vencida rapidamente, onde se pode simplesmente empalar uma baioneta na barriga do inimigo e deixá -los morrer rapidamente. É uma luta mais difícil, contra um inimigo que não podemos ver nem ouvir, mas que pode estar em qualquer lugar ao nosso redor. O isolamento é a maior chave. Alimentos e água de áreas seguras, um local limpo para estudar e todo o contato com os infectados e seus bens feitos por meio de intermediários. Seguro da doença, posso pesquisar em paz e concentrar todos os meus esforços em descobrir a verdade por trás dessa doença." #NT!
 panum.167.g: "... mas mesmo [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] terá que sujar o §1." #NT!
 panum.168.t: "Trabalho inquieto" #NT!
 panum.168.d: "Determinado a chegar à base do surto de cólera, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] trabalha especialmente tarde." #NT!
 panum.168.g: "Então, por todos os meios, vamos passear por essas ruas juntas, policial." #NT!
  
 je_panum_cholera_treatment_goal: ""
  
 je_panum_germ_theory: "Germes e miasma" #NT!
 je_panum_germ_theory_reason: "Os Hipócrates de KOs são considerados o fundador da teoria dos miasmos, as exalações tóxicas do solo que são levadas no ar e, portanto, contribuem para a disseminação de doenças. No século XIX, devido à falta de conhecimento sobre bactérias e vírus, médicos e pesquisadores simplesmente atribuíram epidemias como cólera a maus cheiros que estavam espalhados por 'miasmas'. Mais tarde, essa teoria provou ser um caminho errado na medicina, embora o modelo de miasma já tenha explicado parcialmente de onde vêm epidemias e como elas se espalham. O conflito entre os contagionistas, que reivindicaram infecção humana-para-humana, e os anticontagionistas, os apoiadores da teoria de Miasma, era amargo às vezes em meados do século XIX. As fraquezas do modelo de miasma foram reconhecidas em Londres, embora as regras improvisadas para lidar com miasmas, como limpeza e isolamento, tenham limitado as epidemias até certo ponto. O primeiro descobridor da teoria dos germes recebe um bônus de pesquisa adicional." #NT!
 je_panum_germ_theory_goal: ""
  
 notification_panum_germ_theory_notification_name: "Avanço da teoria dos germes" #NT!
 notification_panum_germ_theory_notification_desc: "Um [concept_panum_physician] de [GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName], pela primeira vez, conseguiu substanciar conclusivamente a teoria germinativa em todas as suas facetas. A teoria do miasma foi completamente rejeitada." #NT!
  
 panum.11.t: "A teoria germinativa" #NT!
 panum.11.d: "Dada a evidência avassaladora da teoria dos germes e as evidências igualmente esmagadoras contra a teoria do miasma, ocorreu uma mudança de paradigma médica. Não é menos importante graças ao Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que a teoria dos germes agora se estabeleceu." #NT!
 panum.11.f: "A teoria do Miasma é um exemplo típico de uma tese científica que é difícil de refutar, pois é presumivelmente confirmada em todos os lugares. O fato de que os regulamentos de limpeza e higiene para o 'ar limpo' garantiram que algumas doenças realmente desaparecessem pareciam estar confirmadas no século XIX. Ao mesmo tempo, impediu a ciência médica de fazer avanços em uma ampla variedade de campos, porque as causas verdadeiras e, portanto, os métodos reais de cicatrização permaneceram desconhecidos. A partir de agora, os médicos terão maior sucesso em encontrar métodos de tratamento - e o caminho é claro para pesquisas sobre patógenos e vacinas." #NT!
 panum.11.g: "Mas realmente queremos saber o que acontece na água ...?" #NT!
  
 panum.53.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viaja para o estado epidêmico" #NT!
 panum.53.f: "Os métodos de tratamento são o passo mais importante no combate a uma doença. É a base para uma possível vacina futura que pode impedir uma epidemia. No entanto, mesmo um método de tratamento bem -sucedido é forte o suficiente para conter epidemias futuras e minimizar sua duração e gravidade - o que resulta em um número significativamente menor de vítimas. Os médicos que estudam uma epidemia em seu próprio país trabalham com mais eficácia do que os médicos em uma viagem ao exterior." #NT!
 panum.53.g: "Este horror deve terminar!" #NT!
  
 panum.54.t: "Expedição de pesquisa médica" #NT!
 panum.54.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] reuniu uma pequena equipe de especialistas e assistentes adequados para estudar intensamente uma epidemia no exterior e possivelmente desenvolver um novo método de tratamento. A questão agora surge sobre qual doença deve ser observada em qual país." #NT!
  
 notification_panum_epidemic_spread_notification_name: "A epidemia está se espalhando" #NT!
 notification_panum_epidemic_spread_notification_desc: "A epidemia se espalhou para outro estado, apesar dos nossos melhores esforços." #NT!
  
