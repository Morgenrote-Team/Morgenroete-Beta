  ### 2.3.1 ### 
  
 panum.101.t: "Terceira pandemia da cólera" #NT!
 panum.101.d: "Relatórios preocupantes do Delta do Ganges chegaram à capital hoje. Os casos de doença aumentaram rapidamente lá. Após um breve exame dos médicos locais, eles ficam chocados ao descobrir que a cólera levantou sua cabeça feia novamente." #NT!
 panum.101.g: "De alguma forma, a cólera voltou." #NT!
 panum.1000.t: "Epidemia de poliomielite" #NT!
 panum.1000.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW Polióis_1 está devastando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.1000.f: "Já existem imagens do Egito antigo que sugerem que a poliomielite existe há muito tempo e é endêmica. No entanto, ele só atingiu seu status de doença epidêmica no final do século XIX, quando de repente eclodiu na Suécia e nos EUA. Em 1910, epidemias frequentes se tornaram eventos regulares em todo o mundo desenvolvido principalmente nas cidades durante os meses de verão. No auge nas décadas de 1940 e 1950, a poliomielite paralisava ou matava mais de meio milhão de pessoas em todo o mundo todos os anos. O medo e a resposta coletiva a essas epidemias dariam origem a uma reação pública extraordinária e mobilização estimulando o desenvolvimento de novos métodos para prevenir e tratar a doença e revolucionar a filantropia médica." #NT!
 panum.1000.g: "Muletas e cadeiras de rodas se tornam objetos diários ..." #NT!
 je_panum_germ_theory_success: "[GetPlayer.GetName] coletou pelo menos #V 20 peças de evidência para reforçar a teoria germinativa e refutar a teoria do miasma." #NT!
  
 panum_aspirin_factory_modifier: "Fábrica de aspirina" #NT!
 panum_xray_modifier: "Raios X" #NT!
 panum_bloodtypes_modifier: "Transfusões de sangue" #NT!
 panum_ecg_modifier: "Eletrocardiografia" #NT!
 panum_transplantation_modifier: "Transplantes" #NT!
 panum_stereotactic_method_modifier: "Método estereotático" #NT!
 panum_cardiopulmonary_bypass_modifier: "Bypass cardiopulmonar" #NT!
 panum_chemotherapy_modifier: "Quimioterapia" #NT!
  
 panum.2007.t: "Invenções médicas" #NT!
 panum.2007.d: "A notícia foi ao congresso de que havia especialistas que conseguiram inovações médicas. Eles estão prontos para compartilhar seus conhecimentos." #NT!
 panum.2007.f: "Inovações únicas na medicina, como transplantes, o desenvolvimento de raios-X ou quimioterapia, são de grande importância para a humanidade que os inventores compartilham o conhecimento sem reserva. Por fim, é sobre o bem-estar de todas as pessoas." #NT!
 panum.2007.g: "Saúde à humanidade!" #NT!
  
 panum.2205.t: "Testes em animais" #NT!
 panum.2205.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] é considerado um cientista gelado com uma certa propensão à crueldade. Diz -se que o número de animais [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] morto 'para o benefício da ciência' está em três números. No entanto, esses experimentos têm seus sucessos." #NT!
 panum.2205.f: "Embora os testes em animais para o benefício da medicina existam desde os tempos antigos, foi somente no século XIX que os testes ocorreram em uma escala que era anteriormente desconhecida. Particularmente no curso da descoberta da teoria dos germes - e depois - numerosos experimentos foram realizados nos quais os animais foram conscientemente infectados com patógenos inúmeras vezes e literalmente se tornaram 'cobaias' para novos medicamentos. Essa fase também viu a ampla introdução de testes e vivissecção em animais em universidades para estudantes." #NT!
 panum.2205.g: "O médico é gratuito como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] agrada." #NT!
 panum.2205.h: "Os alunos devem aprender a dissecar os animais." #NT!
 panum.2205.i: "Isso claramente está indo longe demais." #NT!
  
 panum.2411.t: "Aspirina" #NT!
 panum.2411.d: "Nosso químico Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] inventou um verdadeiro milagre médico que poderia revolucionar a farmácia: aspirina. O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] confirmou os efeitos de alívio da dor." #NT!
 panum.2411.f: "O ácido salicílico tem sido usado medicinalmente desde os tempos antigos. Os medicamentos feitos de madeira de salgueiro e outras plantas ricas em salicilato aparecem em comprimidos de argila da Suméria Antiga e no Papiro de Ebers do Egito antigo. Hipócrates se referiu a 400 a.C. B.C. Sobre o uso de chá salicílico para reduzir a febre. As plantas ricas em salicilato faziam parte da farmacopeia da medicina ocidental na antiguidade clássica e na Idade Média. O extrato de casca de Willow ficou conhecido em meados do século XVIII por seus efeitos específicos na febre, dor e inflamação. No século 19, os farmacêuticos experimentaram e prescreveram uma variedade de produtos químicos associados à salicina, o componente ativo do extrato de salgueiro. Em 1853, o químico Charles Frédéric Gerhardt tratou o cloreto de acetil com salicilato de sódio pela primeira vez para produzir ácido acetilsalicílico. Em 1897, os cientistas das fábricas de drogas e pintura da Bayer começaram a estudar ácido acetilsalicílico como uma substituição menos irritante do estômago para drogas comuns de salicilato padrão e criaram uma nova rota sintética sem impurezas. Em 1899, a Bayer chamou isso de aspirina e a estava vendendo em todo o mundo." #NT!
 panum.2411.g: "O medicamento será o ponto de partida para mais pesquisas médicas." #NT!
 panum.2411.h: "A química certamente abrirá descobertas ainda mais espetaculares." #NT!
 panum.2411.i: "A indústria farmacêutica se beneficiará disso." #NT!
 panum.2412.t: "Raios X" #NT!
 panum.2412.d: "Nosso físico Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] fez uma descoberta espetacular: [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] descobriu raios anteriormente desconhecidos que podem ser usados ​​para iluminar o corpo. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] destacou as possibilidades de medicina." #NT!
 panum.2412.f: "Os raios X são ondas eletromagnéticas com energias quânticas acima de cerca de 100 eV, correspondentes a comprimentos de onda abaixo de cerca de 10 nm. Os raios X estão no espectro eletromagnético na faixa de energia acima da luz ultravioleta. Os raios X foram descobertos em 1895 pelo cientista alemão Wilhelm Conrad Röntgen, que o chamou de radiação X para significar um tipo desconhecido de radiação. Os raios X podem penetrar em muitas substâncias sólidas, como materiais de construção e tecido vivo, portanto a radiografia de raios-X é amplamente utilizada em diagnóstico médico (por exemplo, verificando ossos quebrados) e ciência do material (por exemplo, identificação de alguns elementos químicos e detecção de pontos fracos nos materiais de construção)." #NT!
 panum.2412.g: "Assustador - como ver sua própria morte." #NT!
 panum.2413.t: "Tipos sanguíneos" #NT!
 panum.2413.d: "O Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] fez uma descoberta surpreendente que explicaria por que o sangue humano às vezes se mistura e às vezes se aglomerou: aparentemente existem diferentes grupos sanguíneos. Este é um avanço decisivo para doações de sangue e transfusões de sangue." #NT!
 panum.2413.f: "'Recentemente, observei e afirmei que o soro de pessoas normais é capaz de agrupar os células vermelhas de outros indivíduos saudáveis ​​... como comumente expresso, pode -se dizer que nesses casos pelo menos dois tipos diferentes de aglutininas existem, um tipo de graça, o outro em B, ambos juntos em C. -Karl Landsteiner" #NT!
 panum.2413.g: "Pesquisas sobre grupos sanguíneos devem ser promovidos." #NT!
 panum.2413.h: "A clínica deve coletar tipos de sangue e coletá -los para transfusões de sangue." #NT!
 panum.2414.t: "Eletrocardiografia" #NT!
 panum.2414.d: "O Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] inventou um dispositivo incrível que registra a atividade elétrica das fibras musculares do coração. O médico chama o dispositivo de eletrocardiógrafo - um ECG." #NT!
 panum.2414.f: "Em 1843, Carlo Matteucci percebeu através de experimentos em corações de pombo que a atividade cardíaca se baseia em processos elétricos. Em 1882, o fisiologista Augustus Desiré Waller realizou o primeiro ECG em seu cachorro, Jimmy, mergulhando suas quatro patas em solução condutora de cloreto de sódio. Em 1887, ele conseguiu registrar correntes cardíacas pela primeira vez usando um eletrômetro capilar. Os instrumentos foram significativamente melhorados em 1903 por Willem Einthoven, que, com base em seu galvanômetro de cordas desenvolvido em 1895, desenvolveu o ECG em um procedimento de diagnóstico útil e o introduziu na clínica. A terminologia que ele introduziu ainda é usada hoje." #NT!
 panum.2414.g: "Este dispositivo deve estar em todos os hospitais." #NT!
 panum.2415.t: "Primeiro transplante" #NT!
 panum.2415.d: "O talento cirúrgico do Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] é conhecido em todo o país, mas [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] recentemente surpreendeu especialistas com um procedimento ousado: o médico transplantou o tecido da tireóide humano sob a pele e na cavidade abdominal de um jovem." #NT!
 panum.2415.f: "O primeiro transplante no sentido moderno - a implantação do tecido do órgão para substituir uma função de órgão - foi um transplante de tireóide em 1883. Foi realizado pelo cirurgião suíço e depois pelo Nobel Laureado Theodor Kocher. Nas décadas anteriores, Kocher aperfeiçoou a remoção do excesso de tecido da tireóide em casos de bócio em uma extensão em que ele foi capaz de remover todo o órgão sem que a pessoa morresse da operação. Kocher realizou a remoção total do órgão em alguns casos como medida para impedir o bócio recorrente. Nos anos seguintes, Kocher e outros cirurgiões usaram o transplante da tireóide também para tratar a deficiência de tireóide que apareceu espontaneamente, sem uma remoção anterior de órgãos. O transplante de tireóide se tornou o modelo para uma nova estratégia terapêutica: transplante de órgãos." #NT!
 panum.2415.g: "E as pessoas pensaram que Frankenstein era um romance de terror!" #NT!
 panum.2416.t: "Método estereotático" #NT!
 panum.2416.d: "O gênio cirúrgico do Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] não conhece limites: o médico revolucionou a neurocirurgia com uma nova operação cerebral." #NT!
 panum.2416.f: "A cirurgia cerebral estereotática refere -se a procedimentos de neurocirurgia e radioterapia minimamente invasivos, nos quais os instrumentos médicos e os instrumentos médicos do paciente são fixados em uma estrutura fortemente parafusada para obter a máxima precisão. Pela primeira vez nos últimos anos do século XIX, as operações isoladas foram realizadas no cérebro exposto usando um procedimento que já era conhecido na época como estereotaxia. Durante o procedimento, o corpo do paciente e, especialmente, a cabeça foi fixada rigidamente em um sistema de estrutura rígida confiável. O teste de possibilidades no contexto da curiosidade da pesquisa e da cirurgia psiquiátrica ainda era muito limitada e simples naquele momento. Nas décadas posteriores, as ferramentas e a metodologia foram refinadas." #NT!
 panum.2416.g: "Brilhante!" #NT!
 panum.2417.t: "Bypass cardiopulmonar" #NT!
 panum.2417.d: "Com o desenvolvimento de um desvio cardiopulmonar, o doutor Hasenbein alcançou uma obra -prima da medicina moderna. Não demorará muito para que as pessoas possam fazer uma cirurgia cardíaca sem problemas." #NT!
 panum.2417.f: "Durante um desvio cardiopulmonar, o sangue deixa o corpo através de um sistema de cânula e tubo, é enriquecido com oxigênio e bombeado novamente. Isso é chamado de circulação extracorpórea. O caminho do sangue geralmente sai da veia Cavae ou do átrio direito, bem como das câmaras cardíacas, e abriu artérias coronárias na área cirúrgica e, após filtragem, enriquecimento de oxigênio e eliminação de dióxido de carbono, além de aquecimento e filtragem adicional, por meio da artéria principal ou da artéria femoral. O fisiologista francês Le Gallois publicou a idéia de circulação extracorpórea em 1812. Em 1885, Maximilian von Frey e seu colega Max von Gruber na Universidade de Leipzig construíram o precursor de canto de cauda-de-lunnco de hoje com um extracorador de oxigenador de filme." #NT!
 panum.2417.g: "Este é o nascimento da cirurgia cardíaca moderna!" #NT!
 panum.2418.t: "Endoscópio" #NT!
 panum.2418.d: "Uma nova invenção do Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] poderia fornecer serviços de exame médico inestimáveis ​​- ela pode ser usada para ver o interior do corpo!" #NT!
 panum.2418.f: "Um endoscópio é um dispositivo que pode ser usado para examinar e manipular o interior de organismos ou cavidades técnicas. O uso do endoscópio, conhecido como endoscopia, foi originalmente desenvolvido para diagnóstico médico humano. Após a invenção de Thomas Edison, o uso da luz elétrica foi um grande passo na melhoria do endoscópio. As primeiras luzes foram externas, embora suficientemente capazes de iluminação para permitir cistoscopia, histeroscopia e sigmoidoscopia, bem como o exame das cavidades nasais (e posteriores torácicas), como estava sendo realizado rotineiramente em pacientes humanos por Sir Francis Cruise (usando seu próprio endoscópio comercial) por 1865 na misericórdia." #NT!
 panum.2418.g: "Um dispositivo médico útil." #NT!
 panum.2419.t: "Oftalmoscópio" #NT!
 panum.2419.d: "O Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] inventou um aparelho que facilita o exame das doenças oculares e, assim, prestou um serviço inestimável à oftalmologia." #NT!
 panum.2419.f: "Oftalmoscopia ou fundoscopia é a inspeção das partes visíveis do olho realizadas usando um oftalmoscópio. Em particular, a retina e os vasos sanguíneos que o fornecem podem ser examinados. O oftalmoscópio, inventado em 1850, foi descrito pela primeira vez por seu inventor Hermann von Helmholtz no início de outubro de 1851. O oftalmoscópio pode ser usado para detectar doenças do nervo óptico, retina, coróide e corpo vítreo. Isso marcou o início da história da oftalmologia como uma disciplina médica e científica independente. Depois disso, o oftalmoscópio tornou -se cada vez mais importante para o diagnóstico de doenças internas." #NT!
 panum.2419.g: "Um dispositivo médico interessante." #NT!
 panum.2420.t: "Quimioterapia" #NT!
 panum.2420.d: "Um novo procedimento médico que o Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] está no momento pode oferecer um vislumbre de esperança para muitas pessoas doentes - mesmo o câncer não seria curável, mas pelo menos parcialmente tratável." #NT!
 panum.2420.f: "A quimioterapia é uma terapia medicamentosa para câncer ou infecções. Paul Ehrlich usou quimioterapia para descrever o tratamento de doenças infecciosas com substâncias químicas que trabalham diretamente contra o patógeno. Em 1904, ele descobriu o Trypan Red como o primeiro medicamento eficaz da quimioterapia, que costumava curar ratos que sofrem de doença do sono. Ehrlich iniciou outros experimentos em 31 de agosto de 1909 em Frankfurt Am Main, injetando patógenos sífilis em ratos e depois tratando -os com a ajuda de procedimentos quimioterapêuticos. Esses experimentos tiveram um efeito tão convincente que foram vistos como a nova 'arma' da medicina contra doenças infecciosas. Ehrlich foi posteriormente referido como o 'Criador da quimioterapia'. Os medicamentos utilizados são fabricados artificialmente ou são derivados de substâncias que ocorrem naturalmente." #NT!
 panum.2420.g: "Isso poderia ser uma resposta para o sofrimento de pacientes com câncer?" #NT!
  
 panum.2100.t: "Recrutamento de médicos" #NT!
 panum.2100.d: "Um dos médicos mais promissores do Hospital Geral é [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. §1 seria um excelente candidato para se tornar o novo médico -chefe. [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U] Especialidade é ..." #NT!
