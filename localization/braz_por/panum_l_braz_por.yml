 panum.112.t: "Um vislumbre de esperança" #NT!
 panum.112.d: "Nos hospitais de cólera do [SCOPE.sState('panum_disease_state').GetName], um médico distinguiu particularmente o [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] na epidemia atual. A maneira como o [SCOPE.sCharacter('panum_new_physician_scope').GetFullName] funciona já ganhou importância nacional. Este médico poderia potencialmente desempenhar um papel importante no combate à epidemia no [GetPlayer.GetName]." #NT!
 panum.209.t: "Dr. Tuberculose" #NT!
 panum.209.d: "O chefe do sanatório de tuberculose, Dr. [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], ofereceu [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis] serviços em meio à epidemia crescente." #NT!
 panum.112.f: "'Deus falou comigo e me chamou para o Seu Serviço. Que forma esse serviço deveria tomar, a voz não disse.' -Florence Nightingale" #NT!
 panum.112.g: "Dê ao [SCOPE.sCharacter('panum_new_physician_scope').GetHerHim] uma posição oficial imediatamente!" #NT!
 panum.112.h: "O médico deve treinar as gerações futuras para combater a próxima epidemia." #NT!
  
 panum.122.t: "Incubação da cólera" #NT!
 panum.122.d: "Após várias observações e entrevistas, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que um certo período de tempo passa antes que os sintomas típicos da cólera apareçam em um paciente." #NT!
 panum.122.f: "O médico estima que esse período seja de cerca de meio dia a cinco dias, com a média sendo de três dias. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] teve várias discussões com vítimas da doença e seus parentes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] foi, portanto, capaz de reconstruir os eventos com base em vários relatos de testemunhas oculares. Mesmo que a causa permaneça obscura, conclusões podem ser tiradas posteriormente dessas observações sobre o que exatamente aconteceu no dia 1." #NT!
 panum.122.g: "Bem observado." #NT!
 panum.124.g: "Observado com precisão." #NT!
 panum.123.t: "Sintomas de cólera" #NT!
 panum.123.d: "Hoje, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enviou à Faculdade de Medicina uma lista abrangente de sintomas de cólera." #NT!
 panum.123.f: "Como já se sabe, mas até agora apenas rudimentarmente processado, a cólera é uma doença do intestino delgado humano. As consequências são diarreia extrema com uma típica "fezes de água de arroz" de cor azul e vômitos intensos. Dizia-se que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tinha uma certa veia sádica porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] enviou uma descrição completa desses e de outros sintomas extremamente desagradáveis ​​a tempo para o jantar acadêmico." #NT!
 panum.124.t: "Cólera asiática" #NT!
 panum.124.d: "Em um relatório muito aclamado, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu as diferenças entre a cólera e outras doenças semelhantes à cólera, o que é considerado um marco na descrição futura de doenças." #NT!
 panum.124.f: "O nome cólera, que é derivado da palavra grega para bílis, originalmente se referia a todas as formas possíveis de diarreia ou problemas intestinais ('fluxo de bílis'). Embora Jakob de Bondt já tivesse descrito uma doença de cólera especificamente indiana em 1642, cólera permaneceu puramente um termo coletivo. Foi somente com o surgimento das principais pandemias de cólera do século XIX que esse novo tipo específico de cólera, que acabou se tornando a doença mais devastadora do século, também foi definido com um nome próprio para diferenciá-la claramente: Cólera Asiática." #NT!
  
 panum.222.t: "Incubação da tuberculose" #NT!
 panum.222.d: "Em sua pesquisa sobre tuberculose, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notou algumas estranhezas relacionadas à doença. Aparentemente, pode levar semanas até que uma pessoa doente realmente mostre sintomas típicos." #NT!
 panum.222.f: "Seja teoria do miasma ou teoria dos germes: a tuberculose ainda é um mistério. Se for uma doença infecciosa, pode levar semanas para os sintomas aparecerem: o médico assume entre duas e até doze semanas! Além disso, nem todos que vivem com alguém doente parecem ser infectados diretamente, como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] descobriu em inúmeras pesquisas com pacientes e parentes. Ou os acadêmicos estão certos com sua teoria de que a tuberculose não é uma doença infecciosa e outros fatores são responsáveis, ou o risco de infecção é menor do que se pensava inicialmente." #NT!
 panum.223.t: "Sintomas da tuberculose" #NT!
 panum.223.d: "Depois que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] estudou intensamente os sintomas da tuberculose, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] chegou a uma conclusão que surpreendeu até mesmo alguns colegas acadêmicos: a tuberculose é uma doença muito mais complicada, com uma grande variedade de sintomas que vão muito além dos problemas pulmonares." #NT!
 panum.223.f: "Embora o ataque aos pulmões e sua destruição lenta e dolorosa seja uma das características mais conhecidas da tuberculose, a tosse é apenas um dos muitos sintomas. A tuberculose pulmonar é apenas um tipo de tuberculose, que também pode afetar outros órgãos. Fadiga, febre, perda de apetite, suores noturnos ou cuspir sangue eram sintomas conhecidos anteriormente. O fato de que a tuberculose não ataca apenas o corpo fora dos pulmões, mas que dois tipos diferentes de tuberculose podem ocorrer ao mesmo tempo, mudou significativamente a visão de mundo de alguns membros da Faculdade de Medicina." #NT!
 panum.224.t: "Tuberculose e escrófula" #NT!
 panum.224.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] lidou intensamente com as várias formas de possíveis doenças tuberculosas e, apesar das inúmeras semelhanças com outros sintomas da doença, descobriu as diferenças específicas entre tuberculose e escrófula, mas ao mesmo tempo também enfatizou as conexões." #NT!
 panum.224.f: "Descrições de tuberculose existem há séculos, mas ela não teve efeitos devastadores comparáveis ​​até o século XIX devido à menor urbanização. Ela ainda era conhecida por outros nomes até o século XIX - o termo "consumo" ainda era usado no mundo de língua inglesa até o século XX. René Laennec é considerado um dos pioneiros da pesquisa sobre tuberculose que inventou o estetoscópio para exame pulmonar. Johann Lukas Schönlein cunhou o termo tuberculose em 1832 e o associou a um quadro clínico específico. Uma descoberta importante desses anos foi que a escrófula e a tuberculose eram duas doenças diferentes, mas dificilmente podiam ser diferenciadas devido ao grande número de sintomas de tuberculose." #NT!
  
 panum.322.t: "Incubação e sintomas da varíola" #NT!
 panum.322.d: "Em um resumo recente, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] observou que os sintomas iniciais da varíola não são diferentes daqueles da gripe antes que as infames pústulas apareçam. Pode-se presumir que uma a duas semanas se passam entre a infecção e os sintomas." #NT!
 panum.322.f: "'Aqueles facilmente restaurados à saúde da peste parecem-me ter sido previamente secos e purgados em relação a todo o corpo, pois vômitos ocorreram em alguns deles e o estômago foi perturbado em todos. E, da mesma forma, naqueles já purgados que iriam ser salvos, pústulas escuras aparecem claramente por todo o corpo, na maioria ulceradas, em todas secas. (...) Por fora, o corpo não estava quente ao toque, nem havia palidez; a pele estava bastante vermelha, lívida e estourou em pequenas bolhas e úlceras.' - Galeno" #NT!
 panum.323.t: "Varicela ou varíola?" #NT!
 panum.323.d: "Durante a observação [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] de pacientes com varíola, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu apresentar um relatório parcial de que a varicela é uma doença independente e inofensiva. Esta tem sido uma teoria muito controversa até agora." #NT!
 panum.323.f: "'A catapora irrompe em muitos sem nenhuma doença ou sinal anterior: em outros, é precedida por um pequeno grau de calafrio, lassidão, tosse, sono interrompido, dores errantes, perda de apetite e febre por três dias. A maioria delas é do tamanho comum da varíola, mas algumas são menores. Nunca as vi confluentes nem muito numerosas. O maior número que já observei foi cerca de doze no rosto e duzentas no resto do corpo. No segundo ou no máximo no terceiro dia do início da erupção, muitas das varíolas que não estão estouradas parecem ter chegado à sua maturidade completa, e aquelas que estão mais cheias daquele licor amarelo lembram muito o que a varíola genuína é no quinto ou sexto dia, especialmente onde acontece de haver um espaço maior do que o normal ocupado pelo soro extravasado.' - William Heberden" #NT!
 panum.324.t: "A diferença entre sarampo e varíola" #NT!
 panum.324.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comparou os sintomas de pessoas com varíola, sarampo e catapora com extremo cuidado e conseguiu classificá-los com muita precisão." #NT!
 panum.324.f: "'A erupção da varíola é precedida por febre contínua, dor nas costas, coceira no nariz e pesadelos durante o sono. Esses são os sintomas mais agudos de sua abordagem, juntamente com uma dor perceptível nas costas acompanhada de febre e coceira sentida pelo paciente em todo o corpo. Aparece um inchaço no rosto, que vai e vem, e nota-se uma cor inflamatória geral perceptível como uma forte vermelhidão em ambas as bochechas e ao redor dos dois olhos. Sente-se um peso em todo o corpo e grande inquietação, que se expressa como muito alongamento e bocejo. Há dor na garganta e no peito e acha-se difícil respirar e tossir. Sintomas adicionais são: secura da respiração, saliva espessa, rouquidão na voz, dor e peso na cabeça, inquietação, náusea e ansiedade. Observe a diferença: inquietação, náusea e ansiedade ocorrem mais frequentemente com sarampo do que com varíola. Por outro lado, a dor nas costas é mais aparente com varíola do que com sarampo.' - Rhazes" #NT!
  
 panum.422.t: "Sintomas e incubação do tifo" #NT!
 panum.422.d: "Em um primeiro relatório provisório, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] listou os sintomas do tifo, bem como uma estimativa inicial de quando eles aparecem pela primeira vez no curso da doença." #NT!
 panum.422.f: "'Febre, calafrios, dor de cabeça, tosse, erupção cutânea, vômito - todos esses são sinais de tifo. No entanto, todos esses sintomas podem ser encontrados em doenças semelhantes também. Náuseas e confusão, por outro lado, são típicas do tifo clássico. O curso característico da febre é um aumento de dois a três dias na temperatura, seguido por uma febre contínua de cerca de dez dias e subsequente defervescência ao longo de vários dias. De acordo com meus cálculos, leva cerca de dez a quatorze dias entre a infecção e os primeiros sintomas.'" #NT!
 panum.423.t: "A febre do acampamento" #NT!
 panum.423.d: "Depois que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] compara relatos históricos de epidemias nas forças armadas com os sintomas atuais de pacientes com tifo, ele chega à conclusão de que igualar tifo e "febre de acampamento" é de pouca ajuda." #NT!
 panum.423.f: "'É certamente uma febre de acampamento - mas é A febre de acampamento?' O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez perguntas como essas que fizeram os membros da Faculdade de Medicina pensarem. Historicamente conhecida como 'febre de acampamento', ela tem sido associada há muito tempo a epidemias nos principais exércitos ou quartéis, particularmente como a doença que causou grandes baixas no Exército Napoleônico. Mas nem todas as doenças no exército conhecidas como 'febre de acampamento' podem ser equiparadas ao tifo. Febre recorrente e febre de trincheira são outras doenças conhecidas por terem afetado militares em espaços confinados. A doença que particularmente assolou a Guerra Civil Americana, por outro lado, é frequentemente chamada de tifo, mas na verdade era febre tifoide." #NT!
 panum.424.t: "Tifo: duas doenças em uma?" #NT!
 panum.424.d: "Ao examinar pacientes com tifo, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que uma série de suposições estavam fundamentalmente erradas. Se médicos anteriores tivessem diagnosticado uma 'mudança mórbida' nos intestinos, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não poderia detectar nada disso naqueles que morreram de tifo. Em vez disso, o médico assume que a doença intestinal é uma enfermidade que deve ser distinguida do tifo, que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] chama de 'febre tifoide'." #NT!
 panum.424.f: "Até meados do século XIX, os médicos não diferenciavam entre tifo e febre tifoide. Eles eram simplesmente considerados manifestações da mesma doença com vários graus de sintomas. Em 1836, o médico americano William Gerhard observou que em alguns portadores de tifo os intestinos não eram afetados pela doença, embora ela tivesse sido um dos sintomas comumente diagnosticados até aquele momento. Além disso, observações semelhantes o levaram a acreditar que o tifo não era uma doença dos intestinos, mas sim atacava outros órgãos: confusão mental e dores musculares eram muito mais comuns do que problemas do trato digestivo. A identificação secular do tifo e da febre tifoide não só levou a uma semelhança nos nomes, mas também levou ao fato de que em algumas línguas a febre tifoide é chamada de tifo, por exemplo, em alemão." #NT!
  
 panum.522.t: "Dois cursos de febre amarela" #NT!
 panum.522.d: "Em [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] observação atenta da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que a doença pode progredir de duas maneiras." #NT!
 panum.522.f: "O médico descobriu que em muitos casos conhecidos a febre amarela tem uma manifestação branda que passa depois de alguns dias. Estima-se que cinco em cada seis pacientes apresentam essa forma branda de febre amarela. O outro curso da doença é perigoso e pode ser fatal. Os pacientes sofrem um segundo curso tóxico. É caracterizada por febre recorrente, acompanhada de icterícia devido a danos no fígado, bem como dor abdominal. Sangramento na boca, nariz, olhos e trato gastrointestinal causam vômito contendo sangue, daí um dos nomes em espanhol para febre amarela, vómito negro ('vômito preto'). Também pode haver insuficiência renal, soluços e delírio. Estima-se que 20 a 50 por cento das vítimas de febre amarela que atingem esse segundo estágio da doença morreram - conclui o acadêmico no relatório apresentado." #NT!
 panum.523.t: "Temporadas de febre amarela" #NT!
 panum.523.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que as epidemias de febre amarela seguem um certo padrão temporal." #NT!
 panum.523.f: "Registros históricos e dados atuais sugerem que a febre amarela ocorre principalmente no verão. O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ainda não conseguiu explicar por que a doença não ocorre anualmente como a gripe, mas desaparece completamente ao longo de longos períodos de tempo. É impressionante que a febre amarela tenha sido particularmente galopante em anos chuvosos." #NT!
 panum.524.t: "Uma doença local?" #NT!
 panum.524.d: "Ao descrever a doença da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enfatiza o fato de que a febre amarela é uma doença limitada a certos territórios e se espalha principalmente em áreas pantanosas e tropicais, com algumas exceções." #NT!
 panum.524.f: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] revisou vários relatórios e registros de outras epidemias de febre amarela. O que é impressionante é que elas ocorreram em uma área muito limitada. Regiões tropicais e pântanos na África e América são os mais afetados. Embora em alguns casos a epidemia esteja se movendo mais para o norte - por exemplo, para Filadélfia nos EUA e para Barcelona na Espanha - o médico está convencido de que certas zonas climáticas têm algo a ver com a ocorrência da doença. O fato de ter havido surtos isolados da doença em portos ingleses não incomoda [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] - porque a doença não se espalhou muito além da área ao redor da cidade portuária." #NT!
  
