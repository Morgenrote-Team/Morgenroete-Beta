 je_panum_medical_techniques_project: "Introduzir técnicas médicas" #NT!
 je_panum_medical_techniques_project_reason: "O objetivo do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] é espalhar a mais recente tecnologia médica no [GetPlayer.GetName]. A rapidez com que esse processo ocorre depende das características e da experiência do [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] de caracteres. Depois de concluir a reforma médica, nossa nação receberá um melhor modificador para substituir o antigo. Em alguns casos, um [concept_panum_physician] pode desenvolver suas próprias invenções que revolucionam a história da medicina." #NT!
 panum_medical_techniques_advance_tt: "Técnicas médicas em [GetPlayer.GetName] estão melhorando por um nível" #NT!
  
 panum.2401.t: "Vacinação" #NT!
 panum.2401.d: "A introdução de um programa de vacinação geral foi inicialmente recebida com o ceticismo entre a população, mas depois que o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visitou várias províncias do país e demonstrou o procedimento, a maioria dos pacientes se acostumou a ele." #NT!
 panum.2401.f: "Houve alguma resistência à idéia de uma campanha de vacinação, pelo menos a princípio. Mães preocupadas com seus filhos assustados, envelhecidos senhores, que eram céticos em relação a essa nova maravilha, os muito piedosos que temiam que a ciência estivesse adulterando algo além de seu entendimento. A educação resolveu isso - explicações de como funcionou, por que - mas muito mais do que esse foram os resultados. As crianças que ficaram com a visão e a saúde, e não com as terríveis consequências de uma das doenças mais mortais que a humanidade já havia encontrado. Poucos precisavam ser convencidos quando os viram livres de cicatrizes e cheios de vida." #NT!
 panum.2401.g: "Esta é uma revolução médica!" #NT!
 panum.2401.h: "Nossos padrões médicos e de higiene estão aumentando." #NT!
 panum.2402.t: "Anestesia" #NT!
 panum.2402.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] agora demonstrou o novo método de anestesia em várias clínicas. Agora é considerado o método padrão para operações particularmente desagradáveis." #NT!
 panum.2402.f: "'Zzz.'" #NT!
 panum.2402.g: "Operações médicas sem consciência? Isso é permitido?" #NT!
 panum.2403.t: "Seringas e fórceps" #NT!
 panum.2403.d: "O novo equipamento médico que o Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] introduziu leva algum tempo para se acostumar, mas agora eles são padrão em todos os consultórios médicos." #NT!
 panum.2403.f: "'Que tipo de ferramenta é essa, Doctor?' \ N'N't uma ferramenta, mas uma seringa. Você pode injetar fluido com ele. E isso é um novo bisturi? '\ N'my talheres para o almoço.'" #NT!
 panum.2403.g: "A profissionalização nesse campo é simplesmente surpreendente." #NT!
 panum.2404.t: "Esterilização" #NT!
 panum.2404.d: "Tendo bem -sucedido provado a importância da esterilização, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tornou a prática padrão para todos os médicos em [GetPlayer.GetName] lavar as mãos e limpar suas ferramentas!" #NT!
 panum.2404.f: "É claro que ainda existem aqueles que acreditam que essas práticas são desnecessárias, e muitas delas serão aprendidas que salvaram muitas vidas antes. Para esses homens sagrados, digo o seguinte: ouça as evidências. A descoberta da teoria dos germes provou que as doenças nascem de uma criatura microscópica, que poderia ser destruída bem antes da infecção, salvando vidas que, de outra forma, poderiam ser perdidas. Não é maior isso do que na maternidade do maior hospital de [ROOT.GetCountry.GetCapital.GetCityHubName], onde a taxa de mortalidade para novas mães foi tão reduzida de 18,3% para apenas 2,2% um mês depois." #NT!
 panum.2404.g: "Quem sabia que lavar as mãos depois de tocar pessoas doentes era tão importante?" #NT!
 panum.2404.h: "Ah, então um médico tem outro motivo para uma garrafa de liqour!" #NT!
 panum.2404.i: "Hmmm. Parece uma desculpa conveniente ..." #NT!
 panum.2405.t: "Registros médicos" #NT!
 panum.2405.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] modernizou amplamente a estadia do paciente, seja no consultório médico ou no hospital, com melhor registro e criação de registros médicos." #NT!
 panum.2405.f: "Um prontuário médico descreve a documentação sistemática do histórico médico de um único paciente ao longo do tempo dentro da jurisdição de um prestador de serviços de saúde em particular. A história médica é um registro longitudinal do que aconteceu com o paciente desde o nascimento. Ele narra doenças, doenças maiores e menores, bem como marcos de crescimento. Dá ao clínico uma idéia do que aconteceu antes do paciente. Como resultado, muitas vezes pode dar pistas ao estado atual da doença. O histórico médico inclui vários subconjuntos, como história cirúrgica, medicamentos e alergias médicas, hábitos ou histórico de imunização. Dentro do prontuário médico, os encontros médicos individuais são marcados por sumões discretas do histórico médico de um paciente por um médico, enfermeiro ou assistente médico e podem assumir várias formas. Quando um paciente é hospitalizado, as atualizações diárias são inseridas no registro médico que documentam mudanças clínicas." #NT!
 panum.2405.g: "Estatísticas, matemática, burocracia e medicina - Finalmente United!" #NT!
 panum.2406.t: "Introdução da ambulância" #NT!
 panum.2406.d: "Alguns dias atrás, um empreendedor rico em [ROOT.GetCountry.GetCapital.GetCityHubName] doou generosamente um novo veículo ao hospital local: a primeira ambulância auto-alimentada em todo o [GetPlayer.GetName]" #NT!
 panum.2406.f: "'... e aí, eu vi. Pintou um branco brilhante e orgulhosamente estampado com uma cruz, a nova ambulância não precisava que não fosse a confusão de cavalos ou a força dos homens, mas, em vez disso, carregava o poder de seu próprio motor. Pela primeira vez, homens e mulheres feridos em necessidade mais direcionada de assessores poderiam ser entregues ao conforto e aos cuidados do hospital em velocidade, uma coisa que certamente salvará a vida de inúmeras almas que, de outra forma, poderiam estar perdidas. Isso mexeu em meu coração vê -lo, pois aqui, o melhor do homem, o amor que ele poderia suportar para estranhos, estava em exibição para todos verem." #NT!
 panum.2406.g: "Magnífico! Agora, ele só precisa de uma sirene ..." #NT!
 panum.2406.h: "Excelente! Nossos hospitais farão um ótimo uso deles!" #NT!
 panum.2407.t: "A ambulância aérea" #NT!
 panum.2407.d: "As notícias acabaram de chegar à capital de algo incrível: um piloto acabou de levar uma mulher em trabalho de parto do campo rural para um hospital, o primeiro voo médico na história de [GetPlayer.GetName]!" #NT!
 panum.2407.f: "'... Claro, foi muito difícil se concentrar. Um avião não tem assentos para muitos, você sabe, e você quase pode ouvir o lamento do trabalho sobre o som do hélice e do motor. Obviamente, esses são apenas assuntos de Triffling em comparação com a própria ação - não há uma alma nesta terra que possa recusar os gritos de uma mulher necessitada; portanto, quando ela entrou em trabalho de parto nos terrenos de observação, fiz o que qualquer alma boa faria e a entreguei o mais rápido possível para as mãos qualificadas e capazes de um hospital. Disseram-me que teria sido um parto perigoso na culatra, mas estar lá tão logo tornou possível para o médico ajustar a posição da criança antes de um parto saudável e natural." #NT!
 panum.2407.g: "Então os bebês realmente vêm de ar!" #NT!
 panum.2407.h: "Um suspiro de alívio, para mães em todos os lugares!" #NT!
  
 panum.52.l: "A epidemia de sarampo em [SCOPE.sCountry('panum_measles_country_scope').GetName]." #NT!
 panum.52.n: "A epidemia de peste em [SCOPE.sCountry('panum_plague_country_scope').GetName]." #NT!
 panum.52.o: "A epidemia de difteria em [SCOPE.sCountry('panum_diphteria_country_scope').GetName]." #NT!
 panum.52.p: "A epidemia da poliomielite em [SCOPE.sCountry('panum_polio_country_scope').GetName]." #NT!
  
 country_panum_surgical_treatment_success_chance_mult: "Chance de sucesso do tratamento cirúrgico" #NT!
 country_panum_psychological_treatment_success_chance_mult: "Chance de sucesso do tratamento psicológico" #NT!
  
 panum.641.t: "Uma doença notificável" #NT!
 panum.641.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] escreveu uma carta urgente às autoridades para parar de tratar o sarampo como uma doença benigna e torná -la uma doença relatável." #NT!
 panum.641.f: "“Eu tive que ouvir acusações de colegas, até colegas muito influentes nos órgãos estaduais e universitários mais altos, de que eu estava exagerando o perigo representado pelo sarampo. Eu até fui acusado de tornar o sarampo emitido maior do que apenas para melhorar minha posição. É verdade que a taxa de mortalidade para o sarampo está entre 2 e 5 %. Mas se apenas assumirmos que cerca de 2 em cada 100 pessoas morrem de sarampo, em um país de 10 milhões, isso significa vários milhares de mortes. Existem milhões de mortes em todo o mundo que podem ser evitadas com medidas de proteção simples. Não é melhor se todos prestássemos um pouco mais de atenção e seguissemos as regras para salvar a vida das pessoas? Queremos cometer os mesmos erros que as mulheres que recentemente deram à luz e a arrogância dos médicos em não lavar as mãos, mesmo que seja um pequeno investimento de tempo com um enorme impacto?" #NT!
 panum.641.g: "Pequenas coisas podem ter um grande impacto." #NT!
 panum.642.t: "Infecções animais com sarampo" #NT!
 panum.642.d: "Em um experimento animal altamente divulgado, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] infectou macacos com sarampo." #NT!
 panum.642.f: "'Tendo em vista a grande importância do sujeito e da aparente insusceptibilidade de outros animais, parecia -nos altamente desejáveis ​​colocar a questão da receptividade dos macacos na infecção de sarampo para testar ainda mais o que o Menso de Rhesus é o que é o que é um sangue que é o que é um sangue que o Rhesus é o que é um pouco o que é o que é o que é o que é o que é o que é o que é o que é que o MemoSo, o Menso, o Menso de Rhesus é o que é o que é que o Rhesus é o que é o que é que o Rhesus Monkey. Assim, infectados pode mostrar uma reação febril definida, semelhante ao curso da temperatura em alguns tipos de sarampo no sujeito humano, com ou sem um exanteno generalizado." #NT!
 panum.642.g: "Isso ajudará a encontrar um tratamento bem -sucedido." #NT!
 panum.642.h: "Isso ajudará na busca pelo patógeno." #NT!
 panum.643.t: "Uma doença que flui em idade" #NT!
 panum.643.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] revisou vários casos de doença em [SCOPE.sState('panum_disease_state').GetName] e reconheceu diferenças significativas na mortalidade por pacientes." #NT!
 panum.643.f: "'O sarampo é considerado uma doença infantil inofensiva. No entanto, minha pesquisa mostrou que isso só é verdade quando as crianças têm idade do jardim de infância. Por outro lado, a mortalidade é particularmente alta em crianças entre 6 meses e 3 anos. Depois disso, a mortalidade cai rapidamente. Embora o sarampo em adultos seja considerado inofensivo, relatos de Ludvig Panum das Ilhas Faroe mostraram que é melhor se ocorrer imunização na infância - os pescadores experientes também relatam um curso grave da doença e até a morte." #NT!
 panum.643.g: "Portanto, existem grupos de risco especiais." #NT!
 panum.644.t: "Altamente contagioso" #NT!
 panum.644.d: "Durante uma visita a uma escola em [SCOPE.sState('panum_disease_state').GetName], o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu ver por [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] que uma vez que a doença se separou, ela se espalha quase imparável." #NT!
 panum.644.f: "'Obrigado por vir, médico.' \ N'joy está do meu lado, senhorita. Quantos casos de sarampo a escola agora tem? Ontem havia 35, mas deveríamos ter excedido 40 até agora." #NT!
 panum.644.g: "Preocupante." #NT!
 panum.645.t: "Espirros e tosse" #NT!
 panum.645.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] recomenda medidas de quarentena, como as recomendadas para gripe ou tuberculose, a fim de limitar o sarampo." #NT!
 panum.645.f: "'O sarampo não é percebido como uma doença respiratória, mas minhas suspeitas foram confirmadas de que essa é a única maneira de parar sua propagação. Sarampo - uma das doenças humanas mais contagiosas - é aparentemente transmitido por infecção por gotículas. Há relatos de que as pessoas na sala de uma pessoa doente foram infectadas, apesar de estarem fora da sala por duas horas. Aparentemente, as secreções infecciosas permanecem contagiosas mais tarde. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.645.g: "Felizmente, esses são métodos conhecidos." #NT!
 panum.646.t: "Antibióticos" #NT!
 panum.646.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] vê a possibilidade de reduzir alguns dos efeitos colaterais do sarampo em alguns novos antibióticos." #NT!
 panum.646.f: "'O fato de o sarampo geralmente não ser levado a sério, pois uma doença também se deve ao fato de que muitas vezes não tem outros efeitos colaterais. Infelizmente, esse nem sempre é o caso. Doenças secundárias, como infecções no ouvido ou pulmões, geralmente derrubaram as escalas entre um curso leve, grave e fatal. Os antibióticos não podem curar o sarampo, mas podem tirar o horror dele." #NT!
 panum.646.g: "Obtenha mais antibióticos!" #NT!
 panum.646.h: "Essas descobertas devem ajudar na busca pelo patógeno real." #NT!
 panum.647.t: "Estatística" #NT!
 panum.647.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se destacou particularmente no registro estatístico de casos de sarampo, no processamento de famílias infectadas e na avaliação dos dados." #NT!
 panum.647.f: "'Em pesquisas meticulosas sobre os dados disponíveis dos últimos anos, examinei a mortalidade dos que sofrem de sarampo em 22 países e cheguei às seguintes conclusões:' \ n \ nChile 4,84%, Hungria 4,43%, Austrália 0,24%, Scotland 0,35%, Espanha 3,85%, Itália, Inglaterra e Wales 2.91%, USA, USA, USA, USA, USA, USA, USA, USA. Nos países onde o sarampo era endêmico, surtos epidêmicos ocorrem a cada três a cinco anos após a renovação da população. Posteriormente, taxas muito mais altas foram relatadas, atingindo 10%, particularmente nas Ilhas do Pacífico e na África." #NT!
 panum.647.g: "Útil." #NT!
 panum.647.h: "O médico tem talento, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] deve aprofundar os estudos [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.648.t: "Multiplicação" #NT!
 panum.648.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] publicou números surpreendentes sobre a propagação e a infecção de sarampo." #NT!
 panum.648.f: "'O sarampo é extremamente transmissível e estima-se que 90% das pessoas não imunes expostas a um indivíduo infeccioso contrairão a doença. Modelos matemáticos estimam o número reprodutivo básico em 12 a 18; Esse é o número médio de infecções secundárias que seguem uma única introdução em uma população suscetível. É extremamente contagioso: nove em cada dez pessoas que não são imunes e compartilham espaço de estar com uma pessoa infectada estarão infectadas." #NT!
 panum.648.g: "O que anteriormente foi reconhecido apenas pela percepção foi comprovado pela ciência." #NT!
 panum.649.t: "Infecção sem sintomas" #NT!
 panum.649.d: "Após algumas observações no local, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] assumiu a suposição razoável de que o sarampo também é transmitido por pacientes assintomáticos, mesmo antes da aparecer sinais externos." #NT!
 panum.649.f: "'A alta prevalência de sarampo é um fenômeno bem conhecido e o risco de infecção é conhecido desde os tempos antigos. Um grande problema é que pessoas aparentemente saudáveis ​​também carregam a doença, mesmo que ela não pareça ter surgido ainda. Isso anula muitas suposições que eram válidas anteriormente. A contagiosidade - como várias observações em [SCOPE.sState('panum_disease_state').GetName] mostraram - começa 4 dias antes que a erupção cutânea apareça e geralmente dura até 4 dias após a erupção cutânea aparecer. Parece que a contagiosidade é pouco antes do início da erupção cutânea." #NT!
 panum.649.g: "Investigações mais completas são, portanto, justificadas." #NT!
 panum.650.t: "Desinfecção do quartel" #NT!
 panum.650.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visitou um quartel em [SCOPE.sState('panum_disease_state').GetName] que implementou algumas medidas exemplares para impedir a propagação de sarampo entre os jovens." #NT!
 panum.650.f: "'Algumas dessas medidas incluíram isolamento mais longo e mais rigoroso de recrutas que chegam do que anteriormente; policiamento para impedir a congregação em quartéis, cantinas, teatros e outros lugares; escalonamento de um cotas de quartel adjacente; Mapping e desinfecção molhada contínua de pisos, paredes, mesas, maçanetas da porta. Todos os funcionários usavam vestidos e máscaras de gaze, trocavam -os e lavavam as mãos com sabão, água ou desinfetantes entre o contato com os pacientes, que eram práticas incomuns antes. As enfermarias exigiram que a equipe usasse luvas de borracha. Os pacientes foram colocados em isolamento de cubículos, pendurando lençóis de fios amarrados ao redor da cama e foram obrigados a usar máscaras. As folhas de cubículos às vezes eram pulverizadas periodicamente com desinfetantes. Pacientes mascarados só foram autorizados a entrar em lavatórios, um de cada vez sob a supervisão de atendentes." #NT!
 panum.650.g: "Métodos modernos para combater o sarampo." #NT!
 panum.651.t: "Inoculação com falha" #NT!
 panum.651.d: "A tentativa do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] de imunizar o sarampo usando um procedimento semelhante à variolação da varíola provou ser uma falha colossal." #NT!
 panum.651.f: "Em 1757, o médico escocês Francis Home descobriu que o sarampo foi causado por um patógeno: ele transmitiu a doença a indivíduos saudáveis ​​usando o sangue de pacientes infectados e demonstrou que foi causado por um agente infeccioso. Ele testou um grupo de 12 crianças, 10 das quais desenvolveram uma erupção cutânea febril moderada após um período de incubação de 6 a 7 dias e dois dos quais permaneceram sem infecções. Essa abordagem foi rapidamente abandonada devido a dificuldades técnicas, principalmente para obter material do sarampo no momento certo para inocular a doença." #NT!
 panum.651.g: "Uma perda de tempo." #NT!
 panum.652.t: "Garganta garganta" #NT!
 panum.652.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] experimentou vários remédios de gargarejo que foram apontados por colegas médicos por cura de sarampo há anos. Todos eles acabaram sendo um fracasso." #NT!
 panum.652.f: "'Após o último experimento, fiquei com mais do que apenas um sabor amargo. Por um lado, porque até o óleo de cobra tem melhores efeitos. Por outro lado, porque toleramos mais vendedores de petróleo de cobra e charlatães em nossa guilda médica, que precisam urgentemente ser resolvidos." #NT!
 panum.652.g: "O que você quer dizer com o óleo de cobra é inútil?" #NT!
 panum.653.t: "Spray desinfetante" #NT!
 panum.653.d: "Em um quartel, os soldados que sofrem de um surto de sarampo começaram recentemente a ingerir linguagem desinfetante. O médico acha que este é um empreendimento tolo e teve que fazer muito convincente." #NT!
 panum.653.f: "'Nós realmente devemos colocar pequenas fotos nos rótulos de produtos químicos e médicos que mostram até o menor idiota o que você definitivamente não deve fazer com um líquido, spray ou outra substância." #NT!
 panum.653.g: "Este é um momento valioso que perdemos tentando encontrar um tratamento!" #NT!
 panum.661.t: "Pegue suas vitaminas!" #NT!
 panum.661.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que tomar vitaminas durante uma doença do sarampo é benéfico na eliminação de efeitos colaterais desagradáveis." #NT!
 panum.661.f: "'O efeito das vitaminas é bem conhecido, mas no caso do sarampo, seu efeito me surpreendeu. Crianças com deficiência de vitamina A correm o risco de doenças graves ou até cegueira. Os suplementos de vitamina A podem fortalecer o sistema imunológico geral, embora não possam curar a doença." #NT!
 panum.661.g: "Muito bom." #NT!
  
 panum.900.t: "Epidemia de difteria" #NT!
 panum.900.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW Diphteria#! está devastando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.900.f: "A difteria é uma doença infecciosa aguda que ocorre principalmente em crianças e é causada por uma infecção do trato respiratório superior (difteria faríngea). Pierre Fidèle Bretoneau introduziu o termo difteria no uso médico em 1826 como difterita ("difterite"). A palavra refere -se ao bronzeado da garganta, pseudomembranas escuras (depósitos marrons de couro na laringe e traquéia) feitos de membrana mucosa morta e componentes sanguíneos. A difteria é conhecida desde os tempos antigos; Hipócrates já havia descrito a doença. A difteria é fatal em 5 a 10% dos casos. Em crianças menores de cinco anos e adultos acima de 40 anos, a taxa de mortalidade pode chegar a 20%." #NT!
 panum.900.g: "Minha garganta também está apertando." #NT!
 panum.920.t: "Epidemia de difteria termina" #NT!
 panum.920.d: "A severa epidemia de difteria que manteve nosso país em um domínio de estrangulamento chegou ao seu fim. Médicos e autoridades dão às crianças claras, ousarem sair nas ruas novamente, as pessoas mais velhas são aliviadas." #NT!
 panum.920.f: "'Em uma estação fria úmida, apareceu em Kingston, uma cidade interior em New-Hampshire, situada em uma planície baixa, uma doença entre crianças, comumente chamada de' Distemper da garganta ', do tipo mais maligno e de longe o mais fatal já conhecido neste país'. -Aven Noah Webster" #NT!
  
