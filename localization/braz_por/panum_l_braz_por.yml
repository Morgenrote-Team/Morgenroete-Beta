 panum.131.t: "Estudos de doenças descontinuadas" #NT!
 panum.131.d: "Desde que a epidemia perigosa em [GetPlayer.GetName] chegou ao fim e os últimos pacientes agora se recuperaram, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] terminou os estudos [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] por enquanto. O médico conseguiu coletar algumas informações importantes que devem simplificar uma descrição científica futura da doença, mas [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ainda não alcançou um avanço" #NT!
 panum.131.f: "'Todas as especulações quanto à sua origem e suas causas, se as causas podem ser consideradas adequadas para produzir um distúrbio tão grande, deixo para outros escritores, sejam leigos ou profissionais; Para mim, simplesmente estabelecerei sua natureza e explicarei os sintomas pelos quais talvez isso possa ser reconhecido pelo aluno, se alguma vez sair novamente. Eu posso fazer isso, como eu mesmo tive a doença, e assisti sua operação no caso de outros. -Thucydides" #NT!
 panum.131.g: "Outro passo foi dado." #NT!
 panum.133.t: "Expedição médica descontinuada" #NT!
 panum.133.d: "A expedição médica terminou seu trabalho por enquanto, quando a epidemia acabou. O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] não conseguiu concluir uma descrição científica, mas os estudos §1 devem ser valiosos para o futuro." #NT!
 panum.134.d: "A terrível epidemia que atingiu nosso país passou. Mas isso também significa que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] precisa interromper as investigações [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] por enquanto, porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não pode realizar mais experiências para encontrar um método de tratamento para a doença. No entanto, o médico ganhou informações valiosas que certamente serão úteis no futuro." #NT!
 panum.134.f: "'O contágio passa de uma coisa para outra e é originalmente causada pela infecção da partícula imperceptível.' -Girolamo Fracastoro" #NT!
 panum.134.g: "É apenas uma questão de tempo antes de encontrarmos uma cura." #NT!
 panum.136.d: "Infelizmente, a Expedição de Pesquisa Médica terminou por enquanto sem resultados finais. Desde que a epidemia deixou o país, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] não verificou as teorias [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Os resultados provisórios estarão disponíveis para [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] e as gerações futuras para finalmente encontrar um método de tratamento." #NT!
  
