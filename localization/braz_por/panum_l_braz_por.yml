 ### 2.3.0 ###

 panum.51.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viaja para o estado epidêmico" #NT!
 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], uma das mentes líderes da sociedade médica de [GetPlayer.GetName], viajou para [SCOPE.sState('panum_disease_state').GetName] para pesquisar mais sobre a doença lá. O médico espera que isso possa resultar em uma descrição completa da doença." #NT!
 panum.51.f: "Uma descrição completa de uma doença é um primeiro passo para entendê-la e, mais tarde, combatê-la. Descrições ainda não têm um efeito direto no alívio, mas são a base de um método de tratamento posterior. Médicos que estudam uma epidemia em seu próprio país trabalham com mais eficiência do que médicos em uma viagem ao exterior." #NT!
 panum.51.g: "Você precisa conhecer seus inimigos para derrotá-los." #NT!
  
