 je_panum_cholera_treatment_reason: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está atualmente examinando vários pacientes para determinar a causa de #YELLOW Cólera#!. Somente as verdadeiras razões para a ocorrência da doença podem ajudar a fazer prevenções que levem a um método moderno de tratamento. Quando o médico terminar seu trabalho, ele apresentará sua tese ao público. Isso não evitará futuras epidemias - isso requer a identificação do patógeno e possivelmente uma vacina - mas os efeitos de uma nova epidemia serão relativamente pequenos." #NT!
