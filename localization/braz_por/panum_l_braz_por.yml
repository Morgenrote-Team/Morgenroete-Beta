 panum_physician_achievement_surgeon_loc: "\ n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] conduziu muitas cirurgias e, portanto, é considerado um bom #o $panum_surgeon$#!." #NT!
 panum_physician_achievement_psychiatrist_loc: "\ nd. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] Extensivelsy estudou a mente humana e é um #o renomado $panum_psychiatrist$#!." #NT!
 panum_physician_achievement_military_physician_loc: "\ NAS A #o $panum_military_physician$#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] viu os horrores da guerra e sabe como tratar as pessoas em circunstâncias horríveis." #NT!
 panum_physician_achievement_germ_theory_inventor_loc: "\ nd. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] inventou o #o Germ Theory#! que já salvou milhares de vidas." #NT!
 panum_physician_achievement_pneumothorax_inventor_loc: "\ Nenhuma das maiores invenções de [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHim] é um dispositivo #o para induzir um pneumotórax artificial, isso resulta no colapso dos pulmões que podem ajudar a tratar a tuberculose." #NT!
 panum_physician_achievement_thoracoplasty_inventor_loc: "\ nthanks Para [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis] Habilidades cirúrgicas, o médico [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventou um procedimento #o que revolucionou a cirurgia pulmonar chamada toracoplastia#! e, portanto, permitiu o tratamento melhorado de pacientes com tuberculose." #NT!
 panum_physician_achievement_attended_medical_congress_loc: "\ n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] participou de pelo menos um #o Congresso Médico #! e compartilhou [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis] idéias." #NT!
  
