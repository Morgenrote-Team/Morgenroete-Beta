 panum.2600.t: "Um novo asilo" #NT!
 panum.2600.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comemorou a inauguração do novo asilo mental com um discurso hoje." #NT!
 panum.2600.f: "Numerosas personalidades proeminentes também estavam presentes na inauguração, incluindo políticos da oposição. Enquanto o médico apontou os novos métodos e uma série de sintomas claros que levaram à admissão na clínica, os oponentes do governo céticos suspeitavam que essa instituição também pudesse ser adequada para abuso." #NT!
 panum.2600.g: "Finalmente, o lugar certo para políticos, jornalistas, atores ..." #NT!
  
 panum.2601.t: "Uma admissão psiquiátrica urgente" #NT!
 panum.2601.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] preparou um relatório mostrando que [SCOPE.sCharacter('chosen_character').GetFullName] requer cuidados de saúde mental urgentes. Infelizmente, [SCOPE.sCharacter('chosen_character').GetLastName] passará muitos anos no asilo mental. Possivelmente ... muitos anos." #NT!
 panum.2601.f: "'As some day it may happen that a victim must be found\nI've got a little list — I've got a little list\nOf society offenders who might well be underground\nAnd who never would be missed — who never would be missed!\nThere's the pestilential nuisances who write for autographs\nAll people who have flabby hands and irritating laughs\nAll children who are up in dates, and floor you with 'em Flat \ Nas pessoas que, com as mãos apertadas, apertam a mão de você assim, todas as terceiras pessoas que, ao estragar tête-á-têtes, insistem que não foram perdidas-elas não teriam perdido! '" #NT!
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] os pegam na lista - e eles não farão falta!" #NT!
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName] desaparece para sempre nos setores do asilo mental ..." #NT!
  
 panum_physician_recent_asylum_conducted_modifier: "Admissão recente no asilo mental" #NT!
 panum_send_leader_to_asylum_modifier: "Abuso político de psiquiatria" #NT!
  
 panum_checkmark_loc: "@green_checkmark!" #NT!
 panum_cross_loc: "@red_cross!" #NT!
  
 panum.21.t: "Dispersão dos doentes" #NT!
 panum.21.d: "O doutor Hasnebein é creditado com o desenvolvimento de um sistema moderno para classificar os doentes e feridos de acordo com a gravidade de seus ferimentos, aumentando assim as chances de sobrevivência do paciente." #NT!
 panum.21.f: "A partir de suas experiências na guerra caucasiana e na Guerra da Crimeia, o cirurgião russo Nikolai Ivanovich Pirogov desenvolveu procedimentos de tratamento cirúrgico graduado e o princípio de 'dispersão dos doentes' (tratamento distribuído dos lesões e doentes) para ordenar as principais áreas de vestir e se dividir em cinco estágios (Pirogov, rastreando. O Exército Prussiano adotou o princípio russo em 1866, e mais tarde também foi aplicado aos outros serviços médicos de exércitos aliados na Europa. Em desenvolvimento adicional, numerosos avanços nos métodos de medicina e cirúrgicos também foram transferidos para a organização do Serviço Médico Militar. No entanto, o princípio de Pirogov permaneceu intacto durante a Primeira Guerra Mundial." #NT!
 panum.21.g: "Então, há uma hierarquia dos doentes?" #NT!
 panum.22.t: "Um tratamento para a malária" #NT!
 panum.22.d: "Ao extrair efetivamente a quinina da casca de árvore de Cinchona, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] inventou um método de tratamento que ajuda contra a malária." #NT!
 panum.22.f: "Os jesuítas já tinham o monopólio de fato do uso de Cinchona para curar a malária no início do período moderno, mesmo que houvesse inicialmente reservas em alguns países protestantes. No início do século XIX, logo após a descoberta da morfina, a quinina foi encontrada como o ingrediente que determina a eficácia da casca de Cinchona e a tornou uma pedra angular da química emergente da planta. Foi produzido em um estado impuro por Antoine François de Fourcroy em 1792 e isolado da casca de Cinchona em 1820 por Pierre Joseph Pelletier e Joseph Bienaimé Caventou por extração com álcool. Em 1823, o quinino foi obtido pela primeira vez em escala industrial da casca de espécies de Cinchona pelo farmacêutico Friedrich Koch em Oppenheim. O quinino posteriormente estimulou a pesquisa em química das plantas." #NT!
 panum.22.g: "Um medicamento valioso." #NT!
 panum.23.t: "Apenas uma categoria diferente de pacientes" #NT!
 panum.23.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enviou uma carta urgente ao governo hoje. Nele [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] critica o tratamento de pessoas com doenças mentais e defende tratá -las como pacientes que merecem melhor tretamento - e não como pessoas anti -sociais que precisam ser excluídas da sociedade." #NT!
 panum.23.f: "O primeiro passo decisivo em direção ao tratamento psicológico dos pacientes ocorreu no século XVIII, quando pessoas com doenças mentais e condenados comuns não eram mais "mantidos" nos mesmos quartos, mas instituições separadas se tornaram elegantes. Estes ainda estavam muito abaixo de qualquer padrão humano. Um passo adicional foi dado quando as fortes cadeias de gelo com as quais os lunáticos foram acorrentados foram abolidos em favor da maior liberdade de movimento. Desde o início do século XIX, ficou claro que essas pessoas também estavam doentes e tinham direito ao tratamento. Na Inglaterra, a Lei Lunacia de 1845 foi um marco importante, pois mudou explicitamente o status de pessoas com doenças mentais para os pacientes." #NT!
 panum.23.g: "A vida mental dessas pessoas também conta." #NT!
 panum.24.t: "Conhecimento médico e de enfermagem" #NT!
 panum.24.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nos lembrou que o pessoal menos qualificado às vezes é de grande utilidade como enfermeiro para muitas vítimas no campo de batalha e defende o aumento do uso de mulheres como enfermeiras." #NT!
 panum.24.f: "Enquanto em outros países europeus, especialmente na França e na Alemanha, as ordens católicas fizeram sua missão de treinar enfermeiras, pouco aconteceu na Grã -Bretanha ou em outros países protestantes. Muito poucos mosteiros e ordens sobreviveram à Reforma Inglesa. O público britânico tornou -se dolorosamente ciente desse fato por meio de publicações de Florence Nightingale. O treinamento da equipe de enfermagem foi visto como uma tarefa nacional para a qual as doações foram coletadas. A Escola de Enfermagem Nightingale no Hospital St Thomas, em Londres, fundada por Nightingale, tornou -se o núcleo dessa profissionalização. Com os médicos de sua sentença lidam com doenças, as enfermeiras lidam com as pessoas que ela disse ter lançado as bases para uma filosofia de enfermagem." #NT!
 panum.24.g: "Mulheres para a frente." #NT!
  
 je_panum_spanish_flu_research: "A gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]: pesquisa" #NT!
 je_panum_spanish_flu_research_reason: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] decidiu investigar a misteriosa pandemia com mais detalhes. Quanto sucesso [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] terá é um palpite. No entanto, um médico experiente deve ter uma chance melhor de alcançar um resultado." #NT!
 je_panum_spanish_flu_research_complete_tt: "Um [concept_panum_physician] pode obter novos conhecimentos da pandemia: por exemplo, o local de origem, uma descrição da doença ou mesmo o patógeno." #NT!
  
 state_harvest_condition_panum_spanish_flu_condition_impact_mult: "[GetHarvestConditionType('panum_spanish_flu_condition').GetName] [concept_panum_disease] Impacto" #NT!
 state_harvest_condition_panum_spanish_flu_condition_impact_mult_desc: "Um aumento ou diminuição do impacto da pandemia." #NT!
 panum_spanish_flu_physician_help_modifier: "Médico luta com pandemia" #NT!
  
 panum.1110.t: "O médico e a pandemia" #NT!
 panum.1110.d: "O surto da pandemia é uma hora crucial para o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]: agora [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe] pode brilhar! Mas surge a pergunta: deveria ser melhor combater ativamente a pandemia ou pesquisar?" #NT!
 panum.1110.f: "No dia em que ficou claro que não estaríamos lidando com uma onda de gripe comum, senti uma grande motivação para fazer minha parte. E, ao mesmo tempo, senti o peso vertiginoso nos ombros. As expectativas eram enormes. Eu seria capaz de cumprir as esperanças que foram colocadas em mim?" #NT!
 panum.1110.g: "Lute com a pandemia." #NT!
 panum.1110.h: "Pesquise a pandemia." #NT!
 panum.1111.t: "Patógeno da pandemia" #NT!
 panum.1111.d: "Nosso médico -chefe, Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], e nosso biólogo chefe, Doctor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], fizeram uma descoberta brilhante hoje: eles descobriram o patógeno que causa a gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]!" #NT!
 panum.1111.f: "O vírus da influenza A H1N1 (A/H1N1) refere -se a um subtipo do vírus influenza A (espécies alphainfluenzavirus influenzae) da família Orthomyxoviridae, que ocorre em patos, humanos e pombos, mas também infecta outras espécies mamais. Os vírus da influenza H1N1 se estabeleceram em humanos e porcos como resultado da gripe espanhola de 1918. Este subtipo causou dezenas de milhões de mortes humanas. Alguns pesquisadores já suspeitaram de um 'vírus filtrável'. Nos livros didáticos, a bactéria agora chamada Haemophilus influenzae era considerada a causa da influenza. No entanto, nenhum patógeno poderia ser detectado usando os métodos usuais de bacteriologia: não podia ser tingido nem cultivado em meios de cultura artificial. Se houve um avanço no conhecimento como resultado da gripe espanhola, era na medida em que o patógeno real dessa variante da gripe ainda era desconhecido na época, o que significa que Haemophilus influenzae era descartado como patógeno. Não foi até 1996 que o genoma do vírus foi sequenciado." #NT!
 panum.1111.g: "Heureka!" #NT!
 panum.1112.t: "Origem da pandemia" #NT!
 panum.1112.d_historical: "Após uma excelente investigação científica que combina história, criminologia e conhecimento médico, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez uma descoberta inovadora: a pandemia não começou na Espanha, como é tão frequentemente reivindicado, mas na América!" #NT!
 panum.1112.f_historical: "A descoberta do médico é precedida por uma investigação meticulosa. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] comparou arquivos do paciente e rastreou -se aos primeiros casos em nosso país, a fim de reconstruir uma rede de infecções. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] também coletou dados de colegas no exterior e às vezes os visitava. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avaliou os resultados de outros médicos que realizaram esforços semelhantes em seu país. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] não pode dizer com certeza onde ocorreu a primeira infecção, mas tudo aponta para o estado do Kansas. Que a doença realmente eclodiu na América agora é um fato científico." #NT!
 panum.1112.g_historical: "Isso significa que devemos falar sobre a gripe americana?" #NT!
 panum.1112.d_dynamic: "Após uma excelente investigação científica que combina história, criminologia e conhecimento médico, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez uma descoberta inovadora: a pandemia não começou em [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName], como é tão frequentemente reivindicado, mas em [SCOPE.sCountry('panum_pandemic_country').GetName]!" #NT!
 panum.1112.f_dynamic: "A descoberta do médico é precedida por uma investigação meticulosa. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] comparou arquivos do paciente e rastreou -se aos primeiros casos em nosso país, a fim de reconstruir uma rede de infecções. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] também coletou dados de colegas no exterior e às vezes os visitava. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] avaliou os resultados de outros médicos que realizaram esforços semelhantes em seu país. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] não pode dizer com certeza onde ocorreu a primeira infecção. Que a doença realmente eclodiu em [SCOPE.sCountry('panum_pandemic_country').GetNameNoFormatting] agora é um fato científico." #NT!
 panum.1112.g_dynamic: "Isso significa que devemos falar sobre a gripe [SCOPE.sCountry('panum_pandemic_country').GetAdjectiveNoFormatting]?" #NT!
 panum.1113.t: "Tratamento da pandemia" #NT!
 panum.1113.d: "Durante a pesquisa [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sobre a gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective], o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] inventou vários remédios e práticas e desenvolveu um plano de ação para conter a doença. Embora essas descobertas cheguem tarde demais, elas podem ser úteis para as gerações futuras." #NT!
 panum.1113.f: "'Mell muito melhor e vestido hoje. Quase desgastado com preocupação e perda de sono. Tanta doença e morte nesta semana, mas um grande raio de luz e esperança sobre o resultado da guerra, pois a paz veio neste passado [11th]. -Helen viola jackson kent, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] sobrevivente da gripe" #NT!
 panum.1113.g: "Bem, aprendemos algo." #NT!
 panum.1114.t: "Descrição da pandemia" #NT!
 panum.1114.d: "Infelizmente, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez pouco progresso durante a pandemia. No entanto, [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe] escreveu uma descrição da doença que poderia ser útil para reconhecer os sintomas das variantes da gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]." #NT!
 panum.1114.f: "“Esses homens começam com o que parece ser um ataque de La Grippe ou influenza e, quando trazidos para o hospital, eles desenvolvem rapidamente o tipo mais viscoso de pneumonia que já foi visto. Duas horas após a admissão, eles têm as manchas de mogno sobre os ossos da bochecha e, algumas horas depois, você pode começar a ver a cianose se estendendo de seus ouvidos e se espalhando por todo o rosto, até que seja difícil distinguir os homens de cor do branco. É apenas uma questão de algumas horas até que a morte chegue, e é simplesmente uma luta pelo ar até que eles sufocam. É horrível. Pode -se suportar ver um, dois ou vinte homens morrerem, mas para ver esses pobres demônios caindo como moscas meio que se nos dão nos nervos. -N. Roy Grist, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] sobrevivente da gripe" #NT!
 panum.1114.g: "Esperávamos um pouco mais." #NT!
 panum.1115.t: "Mistério da pandemia" #NT!
 panum.1115.d: "Infelizmente, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] não estava à altura das demandas da pandemia. §1 não conseguiu encontrar respostas sobre a origem, como combater ou descrever a doença. Mas o médico escreveu um pequeno poema." #NT!
 panum.1115.f: "'Eu tinha um passarinho, o nome era enza. \ Ni abriu a janela, \ Nand in-flu-enza.'" #NT!
 panum.1115.g: "Decepcionante." #NT!
  
