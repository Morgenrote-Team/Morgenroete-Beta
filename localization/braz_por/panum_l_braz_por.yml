 notification_panum_description_progress_notification_desc: "Nosso [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ganhou novos insights ao observar a doença epidêmica e obteve uma pista adicional." #NT!
  
 panum_antitoxins_tech: "Antitoxinas" #NT!
 panum_antitoxins_tech_desc: "Uma antitoxina é um anticorpo com a capacidade de neutralizar uma toxina específica. Antitoxinas para toxinas de difteria e tétano foram produzidas por Emil Adolf von Behring e seus colegas a partir de 1890. Elas são consideradas um dos grandes marcos da história médica." #NT!
  
