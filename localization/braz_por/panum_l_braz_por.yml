 je_group_panum_medicine: "Morgenröte: #ORANGE Medicina Panum#!" #NT!
  
 je_panum_cholera: "Epidemia de cólera" #NT!
 je_panum_cholera_reason: "A cólera é considerada a pior epidemia do século XIX. Tem um significado semelhante para a era vitoriana como a peste na Idade Média. Ela se espalha mais rápido do que qualquer outra doença e apresenta uma variedade mortal.\n\nA invenção da #ORANGE Rede de Esgotos Moderna#! tem um significado especial no combate à cólera. Com esta tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para Cólera#!. Mesmo um sistema de saúde moderadamente bom ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. As capitais que um [concept_gaudi_architect] equipa com um sistema de esgoto moderno estão, em princípio, protegidas contra surtos de cólera.\n\nPara derrotar a cólera de uma vez por todas, é necessária uma #V Vacina contra a cólera#!, desenvolvida por um [concept_theiler_biologist] ." #NT!
 je_panum_tuberculosis: "Epidemia de tuberculose" #NT!
 je_panum_tuberculosis_reason: "Junto com a cólera, a tuberculose foi uma das causas mais comuns de morte no século XIX. A "Morte Branca" começou como uma doença romântica e, finalmente, tornou-se cada vez mais uma doença do proletariado. A tuberculose é limitada principalmente a alguns estados com baixos padrões de vida e alta urbanização.\n\nA invenção da #ORANGE Pasteurização#! tem um significado particular no combate à tuberculose. Com esta tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para Tuberculose#!. Um bom sistema de saúde ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. Em casos raros, resorts de saúde climáticos podem surgir como uma resposta à tuberculose, embora com resultados de cura questionáveis.\n\nPara derrotar a tuberculose de uma vez por todas, é necessária uma #V Vacina contra Tuberculose#! desenvolvida por um [concept_theiler_biologist]." #NT!
 je_panum_smallpox: "Epidemia de varíola" #NT!
 je_panum_smallpox_reason: "A varíola é um dos grandes flagelos da humanidade que dizimou povos inteiros. Devido à variolação e à vacinação contra a varíola, ela perdeu seu terror no decorrer do século XVIII, mas sem precauções ainda pode mostrar sua cara feia.\n\nA invenção da #ORANGE Vacinação#! tem um significado particular no combate à varíola. Com esta tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para a Varíola#!. Um sistema de saúde rudimentar já ajudará. Tudo isso leva a uma melhor prevenção e cura da doença.\n\nPara derrotar a varíola de uma vez por todas, é necessária uma #V Vacina contra a Varíola#! desenvolvida por um [concept_theiler_biologist]." #NT!
 je_panum_typhus: "Epidemia de tifo" #NT!
 je_panum_typhus_reason: "Embora o tifo seja conhecido desde o final da Idade Média, seus efeitos mais devastadores ocorreram durante as Guerras Napoleônicas. Portanto, ele manteve seu horror pelas gerações após 1815. A febre tifoide pode se espalhar rapidamente para vários países. Regiões com alta devastação são particularmente afetadas. Portanto, é considerada uma doença de guerra clássica e afeta particularmente os soldados e seus quartéis apertados.\n\nA invenção dos #ORANGE Antibióticos#! tem um significado particular no combate ao tifo. Com esta tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para o Tifo#!. Um sistema de saúde rudimentar já ajudará. Tudo isso leva a uma melhor prevenção e cura da doença.\n\nPara derrotar o tifo de uma vez por todas, é necessária uma #V Vacina contra o Tifo#! desenvolvida por um [concept_theiler_biologist]." #NT!
 je_panum_yellow_fever: "Epidemia de febre amarela" #NT!
 je_panum_yellow_fever_reason: "A febre amarela é uma doença regional que ocorre perto dos trópicos, mas no século XIX se espalhou para o sul dos EUA e Europa. Geralmente se espalha apenas em alguns estados, mas não deixa de causar danos.\n\nA invenção da #ORANGE Prevenção da Malária#! tem um significado particular no combate à febre amarela. Com essa tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para Febre Amarela#!. Um sistema de saúde rudimentar já ajudará. Tudo isso leva a uma melhor prevenção e cura da doença.\n\nPara derrotar a febre amarela de uma vez por todas, é necessária uma #V Vacina contra Febre Amarela#! desenvolvida por um [concept_theiler_biologist]." #NT!
  
 panum.100.t: "A epidemia de cólera de [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.100.d: "#YELLOW Cólera#!, um dos piores flagelos da humanidade, se espalhou para uma de nossas cidades. Tempos sombrios começaram. Devemos esperar que se espalhe pelo país - e cobre seu preço." #NT!
 panum.100.f: "A cólera, endêmica do Leste Asiático, provavelmente ocorreu no subcontinente indiano ao longo de vários séculos na forma de epidemias localizadas, mas era desconhecida em outros continentes. A primeira pandemia ocorreu entre 1817 e 1824 e afetou partes da Ásia, bem como a África Oriental e a Ásia Menor e, posteriormente, a Rússia e a Europa. Em 1830, apareceu na Galícia Oriental e na Hungria, e em junho de 1831 em Viena. Ela dominou o mundo em um total de seis pandemias e se tornou o flagelo da sociedade industrial emergente. Embora a maioria das infecções (cerca de 85%) seja assintomática, a taxa de mortalidade no início é entre 20 e 70 por cento, se a doença não for tratada." #NT!
 panum.100.g: "O Ceifador está à nossa porta." #NT!
 panum.101.t: "A cólera se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.101.d: "A epidemia de cólera se espalhou apesar de nossos melhores esforços. Agora também está devastando [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.101.g: "Essa praga está completamente fora de controle!" #NT!
 panum.102.t: "Epidemia de cólera atinge [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.102.d: "Recebemos relatos de que os primeiros casos de cólera foram relatados no [SCOPE.sCountry('panum_infected_country').GetName] hoje. As autoridades nos culpam por não fazer o suficiente para impedir a disseminação." #NT!
 panum.102.g: "Isso deveria ser culpa nossa...?" #NT!
 panum.103.t: "Cólera nas Fábricas" #NT!
 panum.103.d: "Várias fábricas em [SCOPE.sState('panum_disease_state').GetName] relatam os primeiros casos de cólera entre os trabalhadores. Autoridades locais estão propondo regulamentação para combater a disseminação. Isso teria um impacto enorme na indústria." #NT!
 panum.103.f: "O primeiro caso de cólera ocorreu na semana passada em um moinho de água nos arredores da cidade. Embora o prédio estivesse em quarentena, houve mais incidentes rio abaixo em várias fábricas. Ainda não está completamente claro como a doença se espalhou, mas alguns políticos locais concordam que restrições severas devem ser usadas para recuperar a confiança perdida entre a população." #NT!
 panum.103.g: "Coloque as fábricas em quarentena!" #NT!
 panum.103.h: "As fábricas devem continuar funcionando, a todo custo!" #NT!
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] contraiu cólera!" #NT!
 panum.104.d: "Há poucos dias, [SCOPE.sCharacter('disease_victim_scope').GetFullName] parecia estar completamente saudável, mas ontem à noite [SCOPE.sCharacter('disease_victim_scope').GetSheHe] apresentou os primeiros sintomas da terrível doença que se abateu sobre [ROOT.GetCountry.GetNameNoFlag]. A saúde de [SCOPE.sCharacter('disease_victim_scope').GetHerHis|U] é deplorável." #NT!
 panum.104.f: "As duas primeiras ondas de cólera no século XIX também mataram pessoas famosas. Na Prússia, o filósofo Georg Friedrich Wilhelm Hegel e o general August Neidhardt von Gneisenau morreram na epidemia de cólera de 1831. O compositor Pyotr Ilyich Tchaikovsky também é considerado uma vítima de cólera, embora as circunstâncias - ingestão consciente ou inconsciente de água contaminada - sejam controversas." #NT!
 panum.104.g: "Garanta o melhor tratamento possível!" #NT!
 panum.104.h: "Nosso melhor médico cuidará de [SCOPE.sCharacter('disease_victim_scope').GetHerHim] pessoalmente." #NT!
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U] não é tão importante..." #NT!
 panum.105.t: "O Êxodo dos Ricos" #NT!
 panum.105.d: "A classe alta de [SCOPE.sState('panum_disease_state').GetName] utiliza seus recursos financeiros para deixar a área o mais rápido possível ou para fugir para o campo. Muitos subornos foram pagos para contornar os regulamentos de quarentena. As pessoas comuns vêem este desenvolvimento com desprezo." #NT!
 panum.105.f: "Uma das características da cólera era que ela matava tanto ricos quanto pobres, tornando-a como a praga da Idade Média. As famílias influentes e ricas, portanto, tentavam o máximo para evitar a praga. A aristocracia via a cólera como uma espécie de "doença revolucionária" porque não fazia distinção entre classes. As medidas frouxas em relação à classe alta fizeram da cólera uma questão política devido a esses conflitos sociais. Muitas vezes foi afirmado que as epidemias de cólera do início da década de 1830 na Europa e os movimentos revolucionários estavam em um contexto." #NT!
 panum.105.g: "Deixe-os ir." #NT!
 panum.105.h: "Há um motivo pelo qual o chamamos de O GRANDE EQUALIZADOR." #NT!
 panum.106.t: "Oposição tenta explorar a cólera" #NT!
 panum.106.d: "A oposição está usando a epidemia para acertar contas: ela acusa o governo de cometer enormes erros no combate à epidemia." #NT!
 panum.106.f: "Por causa de suas implicações sociais e políticas, as epidemias de cólera eram uma área na qual os liberais em particular podiam culpar os conservadores. Medidas mais progressivas e novos métodos eram recomendados como uma alternativa à elite "atrasada". Não deveria ser surpreendente que esse corte entre conservadores e liberais fosse repetido em circunstâncias diferentes e com partidos diferentes." #NT!
 panum.106.g: "Você está certo, nós estamos errados. Agora vamos lutar contra a epidemia!" #NT!
 panum.106.h: "Este governo tem a situação perfeitamente sob controle." #NT!
 panum.107.t: "Valas comuns" #NT!
 panum.107.d: "As críticas às novas valas comuns escavadas em [SCOPE.sState('panum_disease_state').GetName] estão a crescer. A classe mais baixa, em particular, vê o processo como um processo quase mecânico, em vez de um cuidado adequado aos mortos." #NT!
 panum.107.f: "Na sequência das mortes em massa e dos possíveis riscos de infecção, o enterro em massa dos mortos tornou-se um fenómeno inevitável. O facto de os cidadãos mais ricos terem condições de realizar um funeral no estilo habitual, enquanto os corpos dos pobres eram simplesmente enterrados, causou explosão social." #NT!
 panum.107.g: "Não temos tempo a perder com funerais!" #NT!
 panum.107.h: "Todos merecem um enterro digno." #NT!
 panum.108.t: "Hospitais de Cólera" #NT!
 panum.108.d: "Vários partidos políticos, por seus próprios interesses, decidiram criar hospitais de cólera para cuidar da classe baixa. No entanto, eles não são muito populares." #NT!
 panum.108.f: "A construção de hospitalizações em massa durante epidemias como cólera ou tuberculose era frequentemente controversa. As famílias preferiam cuidar de seus doentes em casa em vez de entregá-los ao anonimato, onde eram amontoados em um pequeno espaço com outros doentes, razão pela qual muitos estavam convencidos de que ficariam doentes e morreriam ali. Circulou a acusação de que era principalmente uma medida para isolar os pobres dos ricos e, assim, proteger os últimos." #NT!
 panum.108.g: "Bata neles nos hospitais se for preciso!" #NT!
 panum.108.h: "Você não pode forçar esses bois teimosos a viver." #NT!
 panum.109.t: "Pânico público" #NT!
 panum.109.d: "Apesar dos melhores esforços do governo local em [SCOPE.sState('panum_disease_state').GetName], a população começou a sucumbir a uma das partes mais perigosas de qualquer surto: o pânico." #NT!
 panum.109.f: "'É fácil pensar que estamos acima de qualquer outra besta na Terra, mas retire o verniz da razão e você descobrirá que o Homem ainda é um animal, governado pelo medo e pavor de um amanhã desconhecido. O surto e a disseminação de doenças podem encher os corações até mesmo de tropas veteranas de terror, pois quem pode lutar contra um inimigo que nem consegue ver? Não, o terror pode roer seus corações e deixá-los vendo inimigos em cada canto, e onde há inimigos, há inimigos a serem combatidos. O homem doente, apedrejado para mantê-los longe. Sussurros sobre aquela família que não saiu de sua porta. O homem quieto e honesto traz para casa uma arma, com medo de que a próxima batida na porta traga pequenos furtos e roubos, não ajuda.\n\nEste não é o fim do mundo. É o fim da ilusão: o Homem é um animal e ele tem medo.'\n\nUm trecho de um artigo de notícias sobre o surto de [TimeKeeper.GetCurrentDate.Format('y')], do [SCOPE.sState('panum_disease_state').GetName] Times." #NT!
 panum.109.g: "Medo maldito! Como podemos ajudá-los se eles não veem a razão?" #NT!
 panum.110.t: "Finalidade Comum" #NT!
 panum.110.d: "O surto de cólera em [SCOPE.sState('panum_disease_state').GetName] parece ter fomentado um sentimento de unidade nacional, com a população da região a unir-se para tentar combater o surto." #NT!
 panum.110.f: "'Uma enfermaria de hospital é um lugar sombrio, pois é um lembrete de que vivemos em um mundo doentio. Mas essa doença não se importa com quem você é: não se importa com a religião que você mantém, com o mestre que você tem, com a cor da sua pele ou com a política que você mantém perto do seu coração. Olhe para a cama e você verá um homem, uma mulher ou uma criança. Você vê pessoas precisando de ajuda. Elas não se importam com quem a traz. Elas não se importam se o médico é um padre, um soldado ou um trabalhador comum oferecendo o pouco tempo que tem de sobra, arriscando-se para ajudar um estranho. Elas não olham para ele para ver um monarquista, um republicano, um agitador ou qualquer outra coisa que não seja o que elas realmente são.\n\nEles olham para ele e veem um homem. Um irmão, um filho, um compatriota, mas acima de tudo, um companheiro Homem.'\n\nUm trecho de um artigo de notícias sobre o surto de [TimeKeeper.GetCurrentDate.Format('y')], do [SCOPE.sState('panum_disease_state').GetName] Times." #NT!
 panum.110.g: "Estamos unidos contra a cólera!" #NT!
 panum.111.t: "O Horror" #NT!
 panum.111.d: "As montanhas de cadáveres em [SCOPE.sState('panum_disease_state').GetName] estão se acumulando. Não há mais ninguém que não conheça pelo menos um conhecido que foi infectado com cólera. A região se tornou um epicentro da epidemia." #NT!
 panum.111.f: "Berlim sozinha foi atingida pela cólera treze vezes em 42 anos entre 1831 e 1873. As epidemias de 1848/49, 1852, 1855 e 1866 foram particularmente severas em toda a Prússia. No último caso, 114.683 pessoas morreram oficialmente de cólera. Um surto de cólera em Londres em 1848/1849 foi muito mais sério do que o surto de cólera em 1832/1832. Durante esse surto, 15.000 pessoas morreram em Londres, mais de 0,5 por cento de uma população da cidade na época de cerca de 2,5 milhões. Na primeira semana de setembro de 1849, 300 pessoas morreram por dia. Na terceira pandemia entre 1852 e 1860, cerca de um milhão de pessoas morreram na Rússia, o que foi facilitado pela Guerra da Crimeia que estava ocorrendo ao mesmo tempo. O comandante-em-chefe britânico, Lord Raglan, e o comandante da frota francesa, Armand Joseph Bruat, morreram da doença. Acredita-se que mais pessoas morreram de cólera do que de combate." #NT!
 panum.111.g: "Quantos mais mortos?!" #NT!
  
 panum.120.t: "Fim da epidemia de cólera" #NT!
 panum.120.d: "Todo o [ROOT.GetCountry.GetNameNoFlag] respira aliviado: as autoridades acabaram de informar que não há mais casos de cólera na última área de doença. O estado de emergência acabou. Agora é hora de contar os mortos e retornar à normalidade." #NT!
 panum.120.f: "'Que Deus esteja comigo! Que o Céu abençoe este Ano Novo. Que seja um ano de fecundidade, de paz e prosperidade; que seja um ano de paz e unidade para toda a humanidade; que o mundo seja libertado da cólera.' -Giacomo Meyerberr" #NT!
 panum.120.g: "Mas a que custo?" #NT!
  
 panum.200.t: "Epidemia de tuberculose" #NT!
 panum.200.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW Tuberculose#! está devastando [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.200.f: "No início da Idade Média, a tuberculose desempenhou um papel menor na Europa devido à população escassa. Ela só foi mais fortemente representada nas poucas áreas metropolitanas. Após um surto anterior na Itália na segunda metade do século XV, a maior e mais longa onda de tuberculose da história começou no século XVII. A tuberculose ganhou amplo interesse no século XIX e início do século XX como a doença endêmica dos pobres urbanos. Em 1815, um quarto das mortes na Inglaterra e em 1918 na França, um sexto das mortes foram causadas pela tuberculose. Por volta de 1880, uma em cada duas mortes na Alemanha na faixa etária de 15 a 40 anos foi devido a esta doença. A tuberculose também foi a causa mais comum de morte em áreas rurais." #NT!
 panum.200.g: "Há pelo menos tempo para uma morte romântica?" #NT!
  
 panum.220.t: "Fim da epidemia de tuberculose" #NT!
 panum.220.d: "Os médicos da cidade e do interior relatam que o zênite dos casos de tuberculose já passou há algumas semanas. Embora a doença não tenha desaparecido completamente, ela está de volta aos limites usuais." #NT!
 panum.220.f: ""Não posso ser enganado por essa cor;\naquela gota de sangue é minha sentença de morte;\ndevo morrer." - John Keats" #NT!
  
 panum.300.t: "Epidemia de varíola" #NT!
 panum.300.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW Varíola#! está devastando [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.300.f: "A varíola provavelmente é conhecida há milhares de anos e apareceu nos primeiros assentamentos no nordeste da África há 12.000 anos. De lá, eles podem ter sido trazidos para a Índia por comerciantes egípcios. Os conquistadores europeus trouxeram a varíola com eles para a América, onde causou epidemias devastadoras entre os índios a partir de 1518, causando milhões de mortes. Na Europa, a varíola às vezes era considerada uma doença infantil, e a doença, da qual até 10% de todas as crianças pequenas morriam até o final do século XVIII, também era chamada de "doença infantil". A partir do século XVIII, os casos de varíola aumentaram e substituíram a peste como a pior doença. Estima-se que 400.000 pessoas morriam de varíola a cada ano, e um terço dos que sobreviviam ficavam cegos. Muitas vezes, as crianças só eram consideradas parte da família depois de sobreviverem à varíola. Apesar da introdução bem-sucedida da vacinação contra a varíola por volta de 1800, a varíola permaneceu como uma doença epidêmica até a segunda metade do século." #NT!
 panum.300.g: "Imagino que os produtos cosméticos logo se tornarão populares." #NT!
  
 panum.320.t: "Fim da epidemia de varíola" #NT!
 panum.320.d: "A terrível varíola, uma das piores pragas da humanidade, está desaparecendo lentamente de [ROOT.GetCountry.GetNameNoFlag]. Aqueles que sobreviveram estão marcados para o resto da vida." #NT!
 panum.320.f: "'As nações futuras saberão apenas pela história que a repugnante varíola existiu e foi extirpada por vocês.' - Thomas Jefferson" #NT!
  
 panum.400.t: "Epidemia de tifo" #NT!
 panum.400.d: "Uma epidemia eclodiu em um dos nossos estados: #YELLOW Tifo#! está devastando [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.400.f: "A febre tifoide, que provavelmente existia em tempos antigos, mas só foi descrita de forma confiável no século XVI, apareceu principalmente como uma epidemia típica de guerra e miséria. O tifo se tornou um problema sério para o exército de Napoleão durante a campanha russa. Quando o Grande Armée, que havia se mudado para a Rússia em junho de 1812, se retirou no outono de 1813, Mainz foi a primeira parada em solo francês. 15.000-17.000 tripulantes franceses e outros tantos civis morreram lá. A doença, que então também era chamada de "febre nervosa" por causa dos sintomas neurológicos que causava, permaneceu na língua francesa como Typhus de Mayence. No final de outubro de 1814, 14.000 casos de tifo foram registrados na área da Francônia ao redor do Grão-Ducado de Würzburg, dos quais 2.500 foram fatais. Outra epidemia com cerca de dois milhões e meio de mortes ocorreu como resultado da guerra e da guerra civil entre 1918 e 1922 na Rússia." #NT!
 panum.400.g: "Talvez trocar de roupa?" #NT!
  
 panum.420.t: "Fim da epidemia de tifo" #NT!
 panum.420.d: "Parece que a pior fase da epidemia de tifo acabou. Embora a contagem de corpos ainda não tenha sido concluída, já está claro que ninguém pode ser responsabilizado por esse terrível surto." #NT!
 panum.420.f: "“Os únicos pacientes ingleses que conheci recusaram chá foram casos de tifo; e o primeiro sinal de melhora foi a vontade de tomar chá novamente. -Florence Nightingale" #NT!
  
 panum.500.t: "Epidemia de febre amarela" #NT!
 panum.500.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW Febre Amarela#! está devastando [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.500.f: "A febre amarela é endêmica em áreas tropicais e subtropicais na América do Sul e África. Nos séculos XVIII e XIX, a América Central, o Caribe e o sul do que hoje são os EUA também foram afetados. A doença provavelmente se originou na África e chegou ao Novo Mundo através do comércio triangular atlântico. O primeiro surto provável da doença ocorreu em Yucatán em 1648, onde a doença foi referida como xekik (vômito preto). Pelo menos 25 grandes surtos se seguiram, como na Filadélfia em 1793, em que vários milhares de pessoas morreram e o governo americano e o então presidente George Washington foram forçados a deixar a cidade. Uma das primeiras descrições médicas da febre amarela na América do Norte foi feita por John Lining (1756), um médico em Charleston, onde a febre amarela ocorreu em 1728 e 1732. Surtos ocasionais também foram registrados na Europa, por exemplo em Barcelona em 1821 com vários milhares de mortes. Em 1867, houve uma erupção em Fort Jefferson, na Flórida. Em 1878, uma erupção no Vale do Mississippi matou 20.000 pessoas, e a última erupção nos Estados Unidos foi em Nova Orleans em 1905." #NT!
 panum.500.g: "A culpa é da fruta estragada?" #NT!
  
 panum.520.t: "Fim da epidemia de febre amarela" #NT!
 panum.520.d: "Depois que ruas inteiras e famílias foram dizimadas pela insidiosa febre amarela, médicos e autoridades dão sinal verde: a epidemia finalmente acabou." #NT!
 panum.520.f: ""É chamada de febre amarela, mas não se parece com nada conhecido ou lido pelos médicos." - Thomas Jefferson" #NT!

 ### 2.2.3c ###

 building_panum_tuberculosis_sanatorium: "Sanatório de Tuberculose" #NT!
 pmg_panum_sanatorium: "Sanatório de Tuberculose" #NT!
 pm_panum_sanatorium: "Sanatório de Tuberculose" #NT!
 building_panum_tuberculosis_sanatorium_tt: "Um Sanatório de Tuberculose pode ser fundado após uma epidemia de tuberculose em áreas com montanhas. #R Ele só é ativado por meio de evento.#!" #NT!
  
 panum_tuberculosis: "Tuberculose" #NT!
 panum_tuberculosis_desc: "A tuberculose, também conhecida como "morte branca", foi uma das principais causas de morte na era vitoriana." #NT!
  
 panum_forbidden_spitting_modifier: "Proibição de cuspir" #NT!
 panum_tuberculosis_quarantine_modifier: "Quarentena de Tuberculose" #NT!
 panum_tuberculosis_sanatorium_cost_modifier: "Custo do Sanatório" #NT!
 panum_help_against_tuberculosis_modifier: "Ajuda contra a tuberculose" #NT!
 panum_praised_for_tuberculosis_initiative_modifier: "Elogiado por discurso sobre tuberculose" #NT!
 panum_supports_health_care_initiative_modifier: "Apoia a Iniciativa de Assistência Médica" #NT!
 panum_opposes_health_care_initiative_modifier: "Opõe-se à iniciativa de cuidados de saúde" #NT!
 panum_tuberculosis_hospital_modifier: "Hospital de Tuberculose" #NT!
  
 panum.201.t: "Tuberculose se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.201.d: "A epidemia de tuberculose se espalhou apesar de nossos melhores esforços. Agora também está se alastrando em [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.201.g: "A morte branca parece imparável." #NT!
 panum.202.t: "Uma doença hereditária?" #NT!
 panum.202.d: "Apesar de todos os exames médicos, a origem da tuberculose ainda continua sendo uma área controversa. Alguns de nossos médicos assumem que esta é uma doença hereditária, ou pelo menos uma baseada em 'fatores internos'. Outros médicos são da opinião de que é uma doença clássica e contagiosa e recomendam medidas radicais." #NT!
 panum.202.f: "Em relação ao conceito de patogênese, diferentes tradições existiam nos países europeus dos séculos XVIII e XIX. Muitos autores médicos da época consideravam a tuberculose, ou a tuberculose, que nem sempre era sinônimo dela, a pior das epidemias conhecidas na época. Eles viam as causas como uma distribuição desigual de humores corporais, exalações sinistras do solo, urbanização ou declínio dos costumes. Na Itália, por outro lado, havia uma tendência tradicional para uma causa contagiosa, ou seja, h. transmissível. Consequentemente, em meados do século XVIII, a República de Veneza introduziu a obrigação escrita de relatar casos de tísica (tuberculose devido à tuberculose pulmonar). Os pertences pessoais daqueles que morreram da doença eram queimados para reduzir o risco de infecção. Na Inglaterra e nos países nórdicos, no entanto, acreditava-se geralmente que a doença era devido a uma causa hereditária." #NT!
 panum.202.g: "É uma doença hereditária e não há nada que possamos fazer." #NT!
 panum.202.h: "É uma doença contagiosa e devemos fazer tudo o que pudermos para impedir que ela se espalhe!" #NT!
 panum.203.t: "Cuspindo nas Ruas" #NT!
 panum.203.d: "Devido ao desconhecimento das causas da tuberculose, as medidas também geraram polêmica. Aqueles que assumiram uma causa contagiosa defenderam proibições radicais – incluindo cuspir em áreas públicas – para evitar a propagação. Isto afetou particularmente as classes mais baixas. Os céticos viam essas regulamentações apenas como uma forma de assediar as pessoas comuns." #NT!
 panum.203.f: "Mesmo que as regras de etiqueta do século XVIII tenham erradicado alguns "maus hábitos" nas classes alta e média, muitas peculiaridades higienicamente duvidosas permaneceram disseminadas entre as massas por um longo tempo. Lenços e escarradeiras ainda não tinham se tornado comuns na sociedade no início do século XIX, e foi somente na virada do século que se tornou prática comum proibir cuspir no transporte público, por exemplo." #NT!
 panum.203.g: "Proíba esse hábito nojento!" #NT!
 panum.203.h: "Anuncie uma proibição draconiana e faça os malfeitores pagarem!" #NT!
 panum.203.i: "Cuspir é uma natureza humana que não pode ser proibida." #NT!
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] contraiu tuberculose!" #NT!
 panum.204.d: "A epidemia de tuberculose também afetou nosso artista [SCOPE.sCharacter('disease_victim_scope').GetFullName]! Surpreendentemente, [SCOPE.sCharacter('disease_victim_scope').GetSheHe] não vê isso como o pior golpe do destino." #NT!
 panum.204.f: "No início do século XIX, mas também muito além, a tuberculose era considerada uma "doença romântica". Ela dava à vítima tempo suficiente para se preparar para a morte, e muitos viam a palidez associada como nada menos que nobre. Escritores criaram monumentos para ela com várias obras, como Dumas, o Jovem, com a "Dama das Camélias". Ela encontra transfiguração semelhante nas óperas de Verdi (La Traviata) e Puccini (La Bohème). Dizem que George Sand, parceiro de Chopin, observou: "Chopin tosse com graça infinita"." #NT!
 panum.204.i: "Não seria uma ocasião inspiradora para um réquiem?" #NT!
 panum.204.j: "Mas a tuberculose não foi sempre tema de escritores?" #NT!
 panum.204.k: "Mas essa mesma doença não nos encoraja a visualizar a miséria?" #NT!
 panum.205.t: "Sanatório de Tuberculose" #NT!
 panum.205.d: "Em vista da epidemia de tuberculose que assola [SCOPE.sState('panum_disease_state').GetName], um dos médicos de lá sugeriu que alguns pacientes ricos fossem transferidos para as montanhas. Dizem que o clima de alta altitude e o ar purificador os curam da doença. Deve haver um sanatório pulmonar dedicado a esse propósito. [SCOPE.sState('panum_davos_scope').GetName] parece ser o lugar perfeito para tal sanatório." #NT!
 panum.205.f: "A cura pelo ar é uma forma de terapia climática que foi considerada a terapia padrão para tuberculose por um longo tempo a partir do século XIX. Os pacientes ficavam deitados em cadeiras de praia ao ar livre ou em lounges abertos por várias horas por dia. O tratamento com ar era realizado em sanatórios pulmonares especiais. Na Alemanha, o médico Hermann Brehmer foi o primeiro a descrever a doença anteriormente incurável tuberculose como curável com a ajuda da terapia do ar. Em 1856, ele escreveu sua dissertação sobre a cura da tuberculose crônica dos pulmões. Ele presumiu que existem 'lugares imunes' que, por um lado, devido ao seu clima, protegem efetivamente os moradores da ocorrência de tuberculose e, por outro lado, têm um efeito curativo após o surgimento da doença. Na Suíça, o médico alemão Alexander Spengler foi um pioneiro da terapia do ar. Ele começou a praticar como médico rural em Davos em 1853 e logo chegou à conclusão de que os moradores da área geralmente não sofriam de tuberculose, o que ele atribuiu ao clima de alta montanha. Thomas Mann glorificou Davos como um resort de saúde climático em seu 'Zauberberg'." #NT!
 panum.205.g: "Construa um Sanatório em [SCOPE.sState('panum_davos_scope').GetName]!" #NT!
 panum.205.h: "Isso tudo é apenas charlatanismo luxuoso." #NT!
 panum.206.t: "A Doença dos Proletários" #NT!
 panum.206.d: "A epidemia de tuberculose no [SCOPE.sState('panum_disease_state').GetName] atinge mais duramente a classe baixa. O [SCOPE.sCharacter('union_leader').GetFullName], portanto, criticou particularmente as condições atuais e pediu mudanças de longo alcance." #NT!
 panum.206.f: "A tuberculose ganhou interesse generalizado no século XIX e início do século XX como a doença endêmica dos pobres urbanos. Em 1815, um quarto das mortes na Inglaterra e em 1918 na França, um sexto das mortes foram causadas pela tuberculose. Por volta de 1880, uma em cada duas mortes na Alemanha na faixa etária de 15 a 40 anos foi devido a esta doença." #NT!
 panum.206.g: "Talvez os pobres devessem se lavar mais?" #NT!
 panum.206.h: "Melhorias seletivas nessa área são necessárias." #NT!
 panum.206.i: "A questão dos cuidados de saúde é um assunto nacional." #NT!
 panum.206.j: "Aplausos para esta iniciativa!" #NT!
 panum.207.t: "Iniciativa Religiosa" #NT!
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] defendeu pessoalmente os muitos doentes em [SCOPE.sState('panum_disease_state').GetName]. [SCOPE.sCharacter('devout_leader').GetSheHe|U] gostaria de criar um hospital sem fins lucrativos lá em breve." #NT!
 panum.207.f: "'Dificilmente existe um país onde, de uma forma ou de outra, a luta contra a tuberculose não tenha sido empreendida, e é extraordinariamente gratificante ver como a campanha é agora travada de forma bastante geral e com considerável vigor contra este perigoso inimigo.' - Robert Koch" #NT!
 panum.207.g: "Esses contadores de histórias estão apenas tentando ganhar influência!" #NT!
 panum.208.t: "A peste branca cobra seu preço" #NT!
 panum.208.d: "O surto de tuberculose em [SCOPE.sState('panum_disease_state').GetName] piorou. O número de pessoas doentes e mortas está aumentando a cada dia. Nenhum dos médicos esperava esse desenvolvimento." #NT!
 panum.208.f: "'Como pareço pálido! - Eu gostaria, eu acho, de morrer de tuberculose... porque então todas as mulheres diriam, 'vejam aquele pobre Byron - como ele parece interessante morrendo!' - Lord Byron" #NT!
 panum.208.g: "Isso nunca vai acabar?" #NT!

