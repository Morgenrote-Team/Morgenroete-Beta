 je_panum_medical_system_project: "Expandir Sistema Médico" #NT!
 je_panum_medical_system_project_reason: "Um médico que deve expandir o sistema médico trabalha principalmente localmente para melhorar os cuidados de saúde. Mas também há necessidade de uma infraestrutura administrativa lá. Um médico com talentos vantajosos que impressiona a burocracia é útil aqui. Suas habilidades e experiência impulsionam o progresso mensal na criação e construção de novos hospitais e clínicas.\n\nOs médicos tentarão primeiro criar clínicas em áreas particularmente bem desenvolvidas antes de recorrer a clínicas em regiões menos desenvolvidas. Os médicos preferirão o estado que tiver o nível mais alto de edifícios administrativos.\n\nToda vez que a barra de progresso enche, uma nova clínica/hospital é ativada e o trabalho continua no próximo estado adequado. Os médicos ativarão o máximo de clínicas e hospitais como método de produção possível até que não haja mais estados com os requisitos necessários ou até que o trabalho seja interrompido manualmente." #NT!
  
 panum.2101.t: "Sistema Médico Expandido" #NT!
 panum.2101.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] concluiu seu trabalho e expandiu e atualizou as instalações médicas locais. O médico agora está disponível para outras atividades novamente." #NT!
 panum.2101.f: "'A medicina é uma ciência social, e a política nada mais é do que medicina em larga escala.' - Rudolf Virchow" #NT!
 panum.2101.g: "De volta ao trabalho." #NT!
 panum.2102.t: "Clínica especializada em [SCOPE.sState('panum_clinic_state').GetName]" #NT!
 panum.2102.d: "Com a ajuda ansiosa do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], a primeira clínica especializada em nosso país foi estabelecida em [SCOPE.sState('panum_clinic_state').GetCityHubName]. O Doutor anunciou que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] irá administrá-la [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] e se especializar em uma área - embora ainda não esteja claro em qual área os especialistas devem se concentrar." #NT!
 panum.2102.f: "'A educação médica não existe para fornecer aos alunos uma maneira de ganhar a vida, mas para garantir a saúde da comunidade.' -Rudolf Virchow" #NT!
 panum.2102.g: "Cirurgia." #NT!
 panum.2102.h: "Psiquiatria." #NT!
 panum.2102.i: "Epidemiologia." #NT!
 panum.2102.j: "Medicina Militar." #NT!
 panum.2102.k: "Medicina Geral." #NT!
 panum.2103.t: "Hospital em [SCOPE.sState('panum_clinic_state').GetName]" #NT!
 panum.2103.d: "Hoje, com grande interesse público e presença da imprensa, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] inaugurou o primeiro hospital moderno do país em [SCOPE.sState('panum_clinic_state').GetCityHubName], que marca uma virada com suas salas de cirurgia e equipamentos médicos modernos." #NT!
 panum.2103.f: "'É a maldição da humanidade que ela aprende a tolerar até as situações mais horríveis por hábito.' - Rudolf Virchow" #NT!
 panum.2103.g: "Bravo!" #NT!
  
