 panum.840.t: "O mistério da Peste Negra" #NT!
 panum.840.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] escreveu um tratado abrangente sobre as causas, transmissão e medidas contra a praga. Uma digressão particularmente notável lida com o papel de ratos e pulgas." #NT!
 panum.840.f: "Em seu tratado sobre a praga, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] resumiu muitas das novas descobertas. Além de recomendar um sistema de rotação para desinfecção e um soro especialmente desenvolvido por [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aponta para a relação entre pulgas como portadores do bacillus da peste e a infecção de ratos. A transmissão ocorre de pulga para rato, de rato para rato e de rato para humano." #NT!
 panum.840.g: "Um inimigo antigo de repente se torna doméstico." #NT!
  
 panum.841.t: "Uma propagação notável" #NT!
 panum.841.d: "Nas últimas semanas, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] lidou extensivamente com a primeira aparição e os lugares onde a praga se espalhou." #NT!
 panum.841.f: "'Nas últimas semanas, recebi mapas pelo Departamento de Comércio e os comparei com os arquivos de meus colegas no exterior. Os médicos que afirmam que a doença está ligada a um clima ou geografia em particular estão enganados. Em vez disso, pode-se observar uma propagação de onda em terra e uma propagação pelos portos mais estreitos. Isso não deve ser surpreendente, uma vez que a grande epidemia de peste da Idade Média também se espalhou na Escandinávia, no Mediterrâneo e no Oriente Médio. Mas isso convencerá meus colegas?" #NT!
 panum.841.g: "Portanto, tem pouco a ver com geografia." #NT!
 panum.842.t: "Limpeza de rotação" #NT!
 panum.842.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] testou um novo procedimento em [SCOPE.sState('panum_disease_state').GetName] que está se mostrando extremamente eficaz." #NT!
 panum.842.f: "'A desinfecção sistemática da cidade foi tentada, mas provou ser um empreendimento muito caro e foi abandonado em favor de um esquema de' limpeza geral de casas ', na qual um pessoal de inspetores sanitários e coolies europeus era constantemente empregado. Os distritos foram tratados em rotação, para que cada casa de cortiço fosse limpa pelo menos três vezes por ano. Este método tem todas as vantagens da simplicidade, eficácia e economia. Cada inspetor recebe um certo número de pisos diariamente; Os ocupantes produzem seus bens domésticos, os pisos e cubículos são lavados e as placas de cama são limpas em tanques de ferro portáteis. Uma inspeção é feita para pequenas ilegalidades estruturais, corridas de ratos e orifícios semelhantes são preenchidos com cimento de uma só vez, e todos os lixo foram retirados." #NT!
 panum.842.g: "Este sistema deve ser implementado em todos os lugares." #NT!
 panum.843.t: "Uma mortalidade interessante" #NT!
 panum.843.d: "Ao analisar as estatísticas, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que o número de mortes entre os apanhadores de ratos é exorbitante." #NT!
 panum.843.f: "'O chefe da agência me disse que eu estava confundindo correlação e causalidade. Em princípio, foi dada muita ênfase ao infectar ratos antes de um surto de praga, ele disse quase literalmente. Agora estou seriamente me perguntando se, se a maioria das autoridades assumiu que os surtos de peste tinham algo a ver com ratos, se eles seguiriam sua própria teoria, devido a um número semelhante de indicações de uma doença puramente tropical. A mortalidade flagrantemente maior entre os apanhadores de ratos em comparação com o resto da população é uma 'correlação' demais para mim. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.843.g: "Quanto mais evidências são necessárias?" #NT!
 panum.844.t: "São os ratos, estúpidos!" #NT!
 panum.844.d: "Durante a investigação mais detalhada do surto de praga em [SCOPE.sState('panum_disease_state').GetName], o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] foi informado de que, antes que a praga rompeu, todos os ratos na área morreram." #NT!
 panum.844.f: ""Vejo muitos ratos mortos deitados no chão", escreveu Alexandre Yersin ao chegar a Hong Kong em 15 de junho de 1894. "Os ratos são certamente os verdadeiros espalhadores da epidemia"." #NT!
 panum.844.g: "Uma tese ousada." #NT!
 panum.845.t: "Uma amostra" #NT!
 panum.845.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu pegar uma amostra de tecido de uma vítima de peste em um necrotério. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] teve que fazer muito convincente. Ou melhor, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] teve que subornar algumas pessoas para obtê -lo." #NT!
 panum.845.f: "“Eles estão em seus caixões, que são completamente cobertos de limão. Um caixão é aberto. Eu empurro o limão para o lado para expor a área da virilha. O caroço é claramente visível. Eu o cortei em menos de um minuto. -Alexandre yersin" #NT!
 panum.845.g: "Vamos reembolsar os custos." #NT!
  
 panum.851.t: "'Simplesmente pobreza e sujeira'" #NT!
 panum.851.d: "O médico distrital em [SCOPE.sState('panum_disease_state').GetName], em nome das autoridades locais, rejeitou as investigações atuais do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] como infundadas. As causas e os métodos de tratamento para a praga são "bem conhecidos"." #NT!
 panum.851.f: "'Devemos expressar nossa surpresa que o governo central em [ROOT.GetCountry.GetCapital.GetCityHubName] tenha achado necessário enviar um oficial médico, mesmo que tenhamos a situação suficientemente sob controle. As medidas de desinfecção e saneamento tiveram um impacto, especialmente a limpeza das casas e a melhoria das condições de vida dos moradores. O veneno provavelmente é desenvolvido a partir de condições atmosféricas sob casas em certos distritos e que é causada simplesmente pela pobreza e sujeira. No sentido comum, a doença não é infecciosa ou contagiosa." #NT!
 panum.851.g: "O sucesso fala por si ..." #NT!
 panum.852.t: "Comida contaminada" #NT!
 panum.852.d: "Vários cientistas, em uma controvérsia direta com o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], deixaram claro que a praga é uma doença intestinal causada por má nutrição." #NT!
 panum.852.f: "'O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] pode ter algumas teorias emocionantes, mas [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tem muito pouca experiência em lidar com a doença. Os médicos locais em [SCOPE.sState('panum_disease_state').GetName] apelaram repetidamente às autoridades para não questionar as descobertas estabelecidas. Os fatos são os seguintes: 40 % dos pacientes com peste sofrem de vômito, outros 30 % da diarréia e quase 20 % da dor abdominal. No geral, as queixas gastrointestinais foram documentadas em quase 60 % dos pacientes. Portanto, é claro que é uma infecção do trato digestivo, e é ainda mais claro que aparentemente se deve a nutrição estragada, ruim ou deficiente." #NT!
 panum.852.g: "Médico - O que você responde?" #NT!
 panum.853.t: "A doenças tropicais" #NT!
 panum.853.d: "Vários médicos de renome internacional apresentaram a teoria de que a praga é outra doença tropical que dificilmente ocorreria fora de certas zonas climáticas e, se o fizesse, apenas esporadicamente. É, portanto, uma doença climática." #NT!
 panum.853.f: "'Já descobrimos no passado que um clima mais frio resultou na queda da onda de peste. As implicações são claras: a peste é uma doença fortemente ligada a mudanças climáticas. Dados meteorológicos e pinturas sobreviventes mostram que a última onda de peste ocorreu em um ambiente significativamente mais quente do que hoje. O desaparecimento da praga do final do século XVII se correlaciona com um resfriamento do clima até que a praga desapareça completamente. As crescentes temperaturas dos últimos anos, por outro lado, correlacionam -se com a propagação da praga em áreas que eram anteriormente consideradas mais frias. Preciso levar isso mais longe?" #NT!
 panum.853.g: "Então, apenas uma variante de febre amarela." #NT!
 panum.854.t: "A falsa praga" #NT!
 panum.854.d: "Nos últimos dias, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] foi ordenado a vários hospitais para examinar os pacientes lá. Como se viu, eles não eram sofredores de atormentação, mas portadores de tifo." #NT!
 panum.854.f: ""A Peste Negra, Tifo, Colera, Consumo, Praga Bubônica ... Oh, esses eram os dias." -Eguro desconhecido Undertaker" #NT!
 panum.854.g: "Lamentável." #NT!
 panum.854.h: "Se estamos perdendo tempo, talvez o médico possa usá -lo?" #NT!
  
 panum.861.t: "Ópio não é uma resposta" #NT!
 panum.861.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examinou cuidadosamente os supostos efeitos de cura do ópio contra doenças da peste e chegou a uma conclusão clara." #NT!
 panum.861.f: "- Não funciona." #NT!
 panum.861.g: "Isso é um pouco decepcionante e esclarecedor ao mesmo tempo." #NT!
 panum.862.t: "Septicamia" #NT!
 panum.862.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu provar que vários experimentos que deveriam sugerir uma doença gastrointestinal como a causa da praga foram completamente mal interpretados." #NT!
 panum.862.f: "A visão da infecção pelo trato alimentar, devido a alimentos especificamente contaminados, foi amplamente aceita por vários anos, embora houvesse aqueles que consideraram 'emanações da respiração e pele' como sendo o fator etiológico mais importante. Um grande número de experimentos de alimentação animal, com material de peste, foram realizados e a cor foi emprestada à hipótese gastrointestinal, pois muitos dos animais e pássaros morreram de doença sitticêmica que se assemelham à peste. No entanto, os resultados foram inconclusivos e acabaram sendo contestados em Hong Kong em 1904 pelo atual oficial médico da saúde, que expressou toda a sua discordância, com essa visão." #NT!
 panum.862.g: "Este é um golpe sério para a teoria de que a praga foi causada pela contaminação dos alimentos." #NT!
 panum.863.t: "Antibióticos" #NT!
 panum.863.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu mostrar em vários experimentos que atormentam os pacientes com excelentemente o tratamento com antibióticos e recomenda expressamente essa abordagem." #NT!
 panum.863.f: "'Chamar meus experimentos de um sucesso completo seria um eufemismo. Na verdade, fiquei surpreso com o funcionamento dos antibióticos. Alguns pacientes até disseram que sentiram que haviam sido curados. Se esse efeito for confirmado, a busca de uma vacina para a praga pode se tornar desnecessária. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.863.g: "Não há desvantagens para os antibióticos?" #NT!
 panum.864.t: "Inseticidas" #NT!
 panum.864.d: "O uso em larga escala de inseticidas em um ponto de peste não teve efeito. Segundo o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], este é um sucesso surpreendente." #NT!
 panum.864.f: "- Você está certo em perguntar por que estou feliz com esse fracasso. Mas os cientistas também aprendem com as derrotas percebidas. Nesse sentido, não foi uma derrota, mas uma prova. Vários dos meus colegas sugeriram que a praga poderia ser uma doença tropical não muito diferente da malária, que foi transmitida por um mosquito. Pelo menos podemos deixar essa suposição de lado. '\ N \ nfrom uma entrevista com o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] em um jornal local" #NT!
 panum.864.g: "Uma opção a menos." #NT!
 panum.865.t: "Latrinas" #NT!
 panum.865.d: "Durante uma investigação sobre as medidas de higiene em [SCOPE.sState('panum_disease_state').GetName], o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que a infraestrutura moderna de esgoto e latrina deixou algo a desejar, especialmente em um distrito infestado de praga, e contatou as autoridades locais." #NT!
 panum.865.f: "“Mesmo que ainda não tenha sido esclarecido conclusivamente a melhor forma de lidar com a praga e, independentemente de como são minhas teorias pessoais e as de meus colegas - a experiência mostrou que os pisos contaminados com fezes e águas poluídas permanecem em princípios a serem removidos, que podem ser de que são os que se suspeitos. Se queremos controlar não apenas a praga, mas também outras fontes de doença no futuro, devemos tomar medidas preventivas. '\ N \ ndd. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] em uma carta ao Govenrment local" #NT!
 panum.865.g: "None" #NT!
  
 panum.870.t: "Bacillus pestis" #NT!
 panum.870.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] examinou a amostra de tecido com seu microscópio e determinado definitivamente: a praga é transmitida por um Bacillus!" #NT!
 panum.870.f: "20 de junho de 1894. Os inchaços contêm, clara e clara, um grande número de bacilos. Eles são pequenos, curtos e têm pontas arredondadas. Isso é sem dúvida o micróbio da praga. -Alexandre yersin" #NT!
 panum.870.g: "Isso muda tudo!" #NT!
 panum.871.t: "Pulgas" #NT!
 panum.871.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pode ter feito uma das descobertas mais cruciais da história da peste: a relação entre pulgas, ratos e o surto de peste." #NT!
 panum.871.f: "Em [TimeKeeper.GetCurrentDate.Format('y')], [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] descobriu o vetor de tira de rato que impulsiona a doença. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] observou que as pessoas que ficaram doentes não precisavam estar em contato próximo para adquirir a doença. Em Yunnan, a China, os habitantes fugiriam de suas casas assim que viram ratos mortos e, na ilha de Formosa (Taiwan), os moradores consideraram o tratamento de ratos mortos aumentou os riscos de desenvolver peste. Essas observações levaram [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a suspeitar que a pulga poderia ser um fator intermediário na transmissão da peste, uma vez que as pessoas adquiriram peste apenas se estivessem em contato com ratos que haviam morrido menos de 24 horas antes. Em um experimento agora clássico, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] demonstrou como um rato saudável morreu da praga depois que as pulgas infectadas saltaram para ele de um rato que havia morrido recentemente da praga." #NT!
 panum.871.g: "Fascinante." #NT!
 panum.872.t: "Soro anti-plaga" #NT!
 panum.872.d: "Com base no conhecimento prévio da transmissão e origem da praga, bem como em experimentos com o bacilus da praga, o Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desenvolveu um soro anti-Plaga altamente eficaz e o testou com sucesso em um primeiro paciente." #NT!
 panum.872.f: ""A partir da meia -noite, o paciente fica mais calmo e, às seis da manhã (...), ele acorda e declara que se sente curado." -Alexandre yersin" #NT!
 panum.872.g: "Funciona!" #NT!
  
