 panum_character_treatment_fatal_fallback_loc: "\ "Quem pensaria que atravessar aquele vaso sanguíneo mataria o paciente? \"" #NT!
 panum_character_treatment_fatal_tripple_death_loc: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] planejou uma cirurgia rápida para tratar o paciente [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] foi capaz de realizar a cirurgia em pouco mais de 2 minutos, mas amputou os dedos de um assistente - que mais tarde morre de uma infecção. Infelizmente, o paciente também morreu de infecção mais tarde. Além disso, um espectador cujas caudas de casaco também foram acidentalmente cortas, porque ele levou seus órgãos vitais, foi descoberto que ele morreu de choque." #NT!
 panum_character_treatment_fatal_unwashed_hands_loc: "A cirurgia foi perfeita. O paciente estava vivo, todos os problemas foram resolvidos e todo mundo, que foi considerado uma rápida recuperação. Alguns dias depois, no entanto, foi descoberta uma infecção que se espalhou como incêndio. Apenas horas depois, o paciente morreu. O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ficou muito confuso com a forma como isso poderia ter acontecido, pois [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] mudou a faca após a cirurgia anterior apenas alguns minutos antes." #NT!
 panum_character_treatment_fatal_forgotten_snack_loc: "Após a morte do paciente, uma autópsia foi realizada. Dentro do paciente. Para surpresa de todos, um sanduíche meio comido foi encontrado. Ninguém sabia como chegou lá até que um assistente lembrou que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comeu um sanduíche durante a cirurgia." #NT!
 panum_character_treatment_fatal_blood_loss_loc: "A princípio, a cirurgia correu bem. Parecia que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu tratar o paciente com sucesso. No entanto, o paciente nunca se recuperou. Parece que houve muito sangue perdido, que MDE, o paciente, foi uma semana e resultou em morte após mais 3 dias." #NT!
 panum_character_treatment_fatal_morphine_overdose_loc: "A cirurgia parecia ir bem, graças ao uso da morfina, o paciente não sentiu dor durante o procedimento. Infelizmente, o paciente não sentiu mais nenhuma dor, pois a quantidade de morfina era demais e o paciente morreu." #NT!
 panum_character_treatment_fatal_drunken_doctor_loc: "Todos ficaram um pouco confusos quando o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] começou a beber o álcool médico durante a cirurgia. Também não ajudou que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] começou a cortar os lugares errados, gritar com os assistentes e finalmente atingir uma artéria importante. Infelizmente, o paciente não pôde ser salvo mesmo depois que outro médico foi chamado para ajudar." #NT!
 panum_character_treatment_fatal_forgotten_instruments_loc: "Após uma cirurgia bem -sucedida, o paciente do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] parecia melhorar. Mas apenas um dia depois o paciente morreu. Uma autópsia revelou um bisturi que, de alguma forma, foi esquecido dentro do paciente. À medida que o paciente se movia novamente, o bisturi começou a cortar os vasos de tecido e sanguíneo, o que causou sangramento interno." #NT!
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Infelizmente, uma cirurgia muito bem -sucedida teve um fim horrível. O paciente nunca acordou da anestesia. Ninguém sabe o que poderia ter causado, mas o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] assume que o corpo do paciente já estava muito fraco." #NT!
 panum_character_treatment_fatal_fake_doctor_loc: "A princípio, a cirurgia parecia ter ido muito bem. Um do médico deixou a sala, não demorou muito para que a situação mudasse para pior. De repente, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] invadiu a sala e disse que §1 estava muito arrependido por chegar tarde. Todos ficaram confusos quando o médico acabou de realizar a cirurgia. Parece que uma pessoa aleatória fingiu ser o cirurgião e realizou a cirurgia. Infelizmente, no final, o paciente morreu e ninguém sabe quem está respondendo pela morte." #NT!
 panum_character_treatment_fatal_slippery_floor_loc: "Foi uma ótima cirurgia até o pé do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrar uma poça de sangue no chão. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] escorregou e caiu no topo do paciente. Infelizmente, o bisturi empalou o coração do paciente, o que causou a morte do paciente." #NT!
  
 panum.242.t: "Morte da multidão" #NT!
 panum.242.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] acha que a tuberculose ocorre consistentemente em áreas densamente povoadas, mas raramente em regiões esparsas povoadas." #NT!
 panum.242.f: "'Eu observei mais de perto alguns dos tratados que recomendam resorts climáticos de saúde para curar a tuberculose. Um artigo me pareceu tão pouco convincente que acho que meu colega confundiu a correlação com a causa. Ele assume que as pessoas nas montanhas são mais saudáveis ​​porque o ar é mais saudável e, portanto, não é vítima de tuberculose. Mas não é óbvio que, em princípio, podemos observar que a tuberculose não aparece nas montanhas porque há menos pessoas lá? Isso fala pela interpretação do sul da Europa que estamos lidando menos com o Miasma do que com o Contagium. Afinal, a tuberculose pode ser uma doença contagiosa." #NT!
 panum.242.g: "Esta é uma teoria que destaca que a tuberculose é uma doença contagiosa." #NT!
 panum.242.h: "Esta é uma teoria que destaca que a teoria do Miasma está errada." #NT!
 panum.243.t: "Um eremita de tuberculose" #NT!
 panum.243.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez uma descoberta interessante em uma troca com um sobrevivente de tuberculose." #NT!
 panum.243.f: "'Você disse que seu irmão morreu de tuberculose?' \ N'Correct. Eu tinha dezenove anos então. Eu o vi morrer diante dos meus olhos. 'E você também ficou doente com tuberculose?' \ N'Exactly. Eu assumi que, como ele, eu morreria em breve. Isso foi seguro para mim. Então eu me retirei para uma área remota para morrer. Eu queria passar meus últimos dias na natureza, longe da civilização. 'Mas você sobreviveu. Qual você acha que é a razão para isso? Em algum momento, reuni força suficiente para superar a doença. '\ N'hm.'" #NT!
 panum.243.g: "Isso é realmente tudo?" #NT!
 panum.244.t: "Nada hereditário" #NT!
 panum.244.d: "Após longos exames, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] chega à conclusão de que há pouco a sugerir que a tuberculose é na verdade uma doença hereditária." #NT!
 panum.244.f: "“Se você tivesse me dito durante o meu treinamento que um dia perseguiria um trabalho genealógico, ficaria bastante surpreso. Mas quase não havia maneira de confirmar minha teoria além de perguntar às próprias famílias afetadas, bem como às autoridades e ao clero. Se a tuberculose é de fato uma doença hereditária, então pode permanecer não detectada por gerações. Existem árvores familiares inteiras sem um caso de tuberculose, apenas para que de repente acabasse com uma família inteira. E é um fato impressionante que a tuberculose não é uma doença estática e gerenciável, mas só se tornou o perigo que representa hoje nas últimas décadas. Deixe -me colocar desta maneira: se a tuberculose é uma doença hereditária, obviamente todos temos uma predisposição. Como você pode ver no apêndice do meu estudo, as estatísticas falam por si mesmas." #NT!
 panum.244.g: "Então, teoricamente, alguém pode ser infectado?" #NT!
 panum.245.t: "Tubérculos" #NT!
 panum.245.d: "Durante um exame anatômico, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] obteve novas idéias sobre os tumores no tecido pulmonar que dão ao nome da doença." #NT!
 panum.245.f: "René Laennec desenvolveu o estetoscópio, originalmente para examinar a tuberculose. Nos anos que se seguiram, ajudou que a doença pudesse ser detectada anteriormente, sendo capaz de ouvir mudanças no sistema respiratório em um estágio inicial. Ao mesmo tempo, o conhecimento sobre o desenvolvimento da tuberculose dentro do corpo cresceu." #NT!
 panum.245.g: "Pequeno progresso - mas progresso." #NT!
 panum.246.t: "Estilo de vida e imunidade" #NT!
 panum.246.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem sérias dúvidas sobre as teorias tradicionais sobre a causa da tuberculose após examinar minuciosamente vários pacientes e suas biografias." #NT!
 panum.246.f: "'O exame de vários pacientes em [SCOPE.sState('panum_disease_state').GetCityHubName], incluindo suas histórias pessoais, levanta mais perguntas do que respostas; desde que se espere verdades o mais simples possível, em vez de apenas fragmentos da verdade. É verdade que o proletariado em particular é severamente afetado pela tuberculose, mas acho questionável se uma pessoa rica no mesmo meio também não seria vítima da doença. Estou convencido de que uma boa nutrição, ar fresco e exercício físico oferecem um certo nível de resiliência contra doenças - mas não acredito que eles possam ser descartados em princípio. Em suma: acredito que a ideia de que alguém recebe tuberculose porque é um artista ou proletário é uma reivindicação cientificamente insustentável. Se fosse esse o caso, a tuberculose teria escolhido sua afiliação nos últimos anos e agora prefere os trabalhadores da fábrica como suas vítimas altamente escolhidas espiritualmente, em vez de músicos e poetas. Ninguém pode acreditar seriamente nisso. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.246.g: "Esta será uma grande decepção para alguns gênios não reconhecidos." #NT!
 panum.247.t: "Uma doença notificável" #NT!
 panum.247.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem experimentado um sistema de relatório em [SCOPE.sState('panum_disease_state').GetCityHubName] que pode ajudar a conter a tuberculose." #NT!
 panum.247.f: "'A classificação da tuberculose de [SCOPE.sState('panum_disease_state').GetCityHubName] como uma doença notificável causou algum ressentimento entre a população porque muitas pessoas consideram a doença um assunto privado. Mas não é, especialmente quando ocorre na forma epidêmica. No momento em que uma doença é considerada contagiosa - e no caso da tuberculose, há muito a sugerir que é - é uma questão pública que pode colocar em risco o bem -estar público. Melhor ter uma doença relatável do que uma quarentena. O isolamento de fontes individuais de infecção mostrou que a disseminação da tuberculose poderia ser evitada sem colocar uma cidade inteira em estado de emergência. Infelizmente, o estigma que os guindastes de tuberculose agora transportam terão consequências pessoais desagradáveis. Os pacientes com tuberculose agora são tratados como leprosos." #NT!
 panum.247.g: ""
 panum.248.t: "Matando os micróbios" #NT!
 panum.248.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desenvolveu um processo químico baseado no conhecimento prévio de microorganismos. Pode impedir a tuberculose no futuro." #NT!
 panum.248.f: "A pasteurização refere-se ao aquecimento a curto prazo de alimentos líquidos ou pastosos a temperaturas de pelo menos 72 ° C a um máximo de 100 ° C para matar as fases vegetativas dos microorganismos, a fim de preservar os alimentos de maneira suave. O processo foi usado para o vinho a partir de meados do século XIX. Somente mais tarde foi usado no leite cru, através do qual os patógenos de tuberculose bovina poderiam ser transmitidos aos seres humanos. A pasteurização do leite cru, portanto, desempenhou um papel na contenção da tuberculose. Essa descoberta é mais importante do que se poderia pensar: por um longo tempo, médicos, biólogos e químicos assumiram que a tuberculose do gado não podia ser transmitida aos seres humanos. Até o especialista em tuberculose, Robert Koch, estava errado a esse respeito, e ele só mais tarde revisou sua opinião - um período em que muitas crianças foram infectadas através do leite e manteiga da tuberculose." #NT!
 panum.248.g: "E eu pensei que o leite era basicamente saudável!" #NT!
 panum.249.t: "Espotão perosnal" #NT!
 panum.249.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notou um acessório que se tornou particularmente popular entre as mulheres que sofrem de tuberculose. Possui um sofisticado revestimento de vidro azul que parece tão elegante que você esquece que é uma escarradeira." #NT!
 panum.249.f: "“A maioria de nós tem isso aqui em cima. Ele também tem um nome conosco, um apelido, bastante divertido. Sem nenhuma restrição, com um rosto teimosamente ignorante, ela proferiu a expressão sombria 'The Blue Heinrich'. -Thomas Mann, Zauberberg" #NT!
 panum.249.g: "Se toda pessoa doente carregasse algo assim ..." #NT!
  
 panum.251.t: "Uma doença celular?" #NT!
 panum.251.d: "O estudo muito notado de um especialista alemão em tuberculose derruba as descobertas anteriores do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ainda não foi capaz de encontrar uma contra-resposta adequada." #NT!
 panum.251.f: "'Existem alguns colegas que afirmam apaixonadamente que a tuberculose pode ser transmitida através da infecção. Quando confrontados com o fato de que muitos pacientes desenvolveram a doença sem estar perto de um guindaste de tuberculose, eles afirmam que provavelmente foi infectado em algum lugar atrás. Como se deve provar isso? Em vez disso, meus próprios estudos mostram que os tubérculos do tecido pulmonar devem ser interpretados como proliferação celular. Portanto, a tuberculose deve ser interpretada, como o carcinoma, como resultado da proliferação de células locais. Pode ser claramente identificado como uma doença constitucional. '\ N \ ndd. Angelika Hasenbein, 'Tuberculosis, uma doença semelhante ao câncer'" #NT!
 panum.251.g: "Portanto, a tuberculose funciona como um tumor de células?" #NT!
 panum.252.t: "Bronquiectasia" #NT!
 panum.252.d: "Como o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu, algumas alegadas conclusões que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pensavam [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] obtiveram com os pacientes com tuberculose estavam incorretos. Eles sofriam de uma doença completamente diferente." #NT!
 panum.252.f: "Infelizmente, algumas pesquisas acabaram sendo um beco sem saída. Então, eu acreditava que alguns pacientes com tuberculose se recuperaram sob certas circunstâncias. Na realidade, eles não tinham tuberculose, mas bronquiectasia. Não é excluído que a tuberculose pode promover a bronquiectasia, mas essas são duas doenças diferentes e nem todos os resultados são aplicáveis. É provável que atrase significativamente a busca por um método de tratamento bem -sucedido. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.252.g: "Tempo perdido!" #NT!
 panum.253.t: "Carlatanismo" #NT!
 panum.253.d: "Uma visita a um sanatório em [SCOPE.sState('panum_disease_state').GetCityHubName] acabou sendo uma decepção completa para o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.253.f: "Muitos colegas e especialistas médicos reconhecidos recomendaram o sanatório em [SCOPE.sState('panum_disease_state').GetCityHubName] para mim. É uma instituição exemplar que opera no campo da tuberculose com métodos extremamente graves - disseram eles. Vários pacientes falaram de milagres médicos que ocorrem lá. Enquanto os médicos no local me garantiram o quão grandes eram as chances de recuperação, descobri exatamente o oposto. Quando olhei através dos arquivos do paciente, descobri que quase 50 % dos pacientes admitidos morreram na primeira semana. Todo esse sanatório é um golpe! \ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.253.g: "Mas ... mas ... o jantar deve ser excelente!" #NT!
 panum.254.t: "Contato com a morte branca" #NT!
 panum.254.d: "Aparentemente, as muitas visitas aos pacientes com tuberculose têm um efeito não intencional: Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] cuspiu sangue hoje!" #NT!
 panum.254.f: "'Que dia infeliz. Minhas relações com a tuberculose e meu suposto conhecimento da doença agora estão se vingando. Por um lado, eu estava errado em tantos níveis que é certo que meu orgulho seja punido. Por outro lado, é uma indicação de que é uma doença contagiosa. Mas a que custo eu tive que fazer essa descoberta? \ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.254.g: "O médico se recuperará disso - certo?" #NT!
  
 panum.264.t: "De contagione" #NT!
 panum.264.d: "Os interesses históricos do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] levaram [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a encontrar um livro antigo do Renascimento - que tem um valor incomensurável." #NT!
 panum.264.f: "Já em 1546, o médico veneno Girolamo Fracastoro postulou que as doenças foram causadas principalmente por infecção por pequenas partículas que lembravam os germes posteriores. Portanto, ele duvidava da teoria do Miasma há mais de 300 anos. No que diz respeito à tuberculose, Fracastoro também diz que é uma doença contagiosa que é transmitida por esses patógenos. O livro às vezes é mais convincente do que muitos tratados modernos. O que é revolucionário é que Fracastoro assume que esses chamados 'fomitas' entram através do sistema respiratório ou dos poros do corpo para procurar alimentos. Isso avançaria a doença." #NT!
 panum.264.g: "Isso estimulará a busca pelo tratamento." #NT!
 panum.264.h: "Isso é muito mais convincente do que a teoria do miasma." #NT!
 panum.264.i: "Um pequeno patógeno poderia causar tuberculose?" #NT!
  
 panum.240.t: "Tuberculose - uma doença contagiosa" #NT!
 panum.240.d: "Através de vários experimentos e exames de pacientes, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu provar conclusivamente que a tuberculose não é apenas uma doença contagiosa, mas também foi capaz de derivar vários métodos de prevenção a partir disso no tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] '[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]'." #NT!
 panum.240.f: "'O conhecimento de que a tuberculose é uma doença que pode ser transmitida de pessoa para pessoa e também de animal para pessoa leva a toda uma série de medidas para impedir a doença. \ NFirst, a tuberculose que sofre de regulamentação deve ser mantida como se a spread de sepultina. ou pelo menos o uso de espanhol público e pessoal." #NT!
 panum.240.g: "A tuberculose não é mais destino." #NT!
  
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Isso dá uma pista ... provavelmente." #NT!
  
 panum.540.t: "Prevenindo? Impedido!" #NT!
 panum.540.d: "Após semanas de pesquisa e estudo, nosso médico criou um meio de interromper a disseminação da febre amarela!" #NT!
 panum.540.f: "'... Mas no final, uma prova permaneceu, certa e indesculpável. Seja por rede, fumaça ou pesticida, minha investigação revelou que sempre que o caminho do mosquito era interrompido por qualquer motivo, a propagação da febre amarela era interrompida. Deve ser, então, uma doença de insetos. Se pudermos interromper o processo de desova, podemos muito bem impedir que novos mosquitos cheguem para infectar nosso povo. É apenas uma questão de meios, e eu desenvolvi um plano de três pontos. Se possível, drene completamente os corpos de água. Se esses métodos forem colocados em ação, podemos ver o fim da febre amarela endêmica em nossa vida e um fim para esse mais persistente dos inimigos. '\ n \ nfrom: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] por Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]1" #NT!
 panum.540.g: "Muito bem, médico. Agora, para obter algumas redes de mosquito e spray de insetos ..." #NT!
  
 panum.541.d: "Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], nosso médico chefe, chegou a [SCOPE.sState('panum_disease_state').GetName] para investigar a misteriosa febre amarela." #NT!
 panum.541.f_america: "'Chegamos a [SCOPE.sState('panum_disease_state').GetCityHubName] bem antes do amanhecer, nosso trem chegando à estação para encontrar uma plataforma desprovida de passageiros e com apenas um frasco de sopa quente para o motorista e seus colegas no motor. Poucos homens podem sair de um trem tão cedo, mas eu era pouco capaz de descansar; As cartas e notas do governo local pesavam muito em minha mente, pois falaram de uma doença estranha, febre amarela. O nome decorre da icterícia que vem com a doença, embora esse dificilmente seja o fim dos problemas - vomitando, dores do abdômen, sangramento dos olhos e estes matem muitos. É lá que encontrei o propósito e a energia de acordar meus colegas e os levar a partir do trem e para a cidade, sob o brilho das lâmpadas de gás ao redor das quais os mosquitos incessantemente zombam. Se quisermos derrotar essa doença, precisamos aprender a maior questão de todos. O que estamos lutando?" #NT!
 panum.541.f_africa: "“Já passava do meio -dia quando nosso navio entrou no porto, e o capitão nos informou que chegamos ao nosso destino. Um dos grandes postos avançados do nosso Império Colonial, a administração local enviou uma notícia de volta à capital de uma doença estranha e letal que eles tinham problemas para entender - sem mera gripe comum, mas a infame febre amarela. Não é realmente estranho para mim, nem para ninguém ler bem sobre a história da doença tropical ... mas por tudo o que conhecemos de seus muitos meios de matar, conhecemos tão pouco da própria doença. Lá, podemos manter nossas amostras, fazer nossa casa e realizar a pesquisa necessária para decifrar os mistérios da febre amarela ... mas primeiro, precisamos encontrar essas amostras, e a presença incessante de mosquitos é uma distração indesejável. Ainda assim, não nos impedirá de nosso trabalho." #NT!
 panum.541.g: "Venha junto, senhores ... bocejo." #NT!
 panum.541.h: "... Mosquitos condenados." #NT!
 panum.542.t: "Guerras de ontem" #NT!
 panum.542.d: "Em uma tentativa de descobrir mais sobre a história da febre amarela nessas terras, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] decidiu consultar o comandante de uma guarnição local." #NT!
 panum.542.f: "'Ah, bom ver você, doutor. Meus homens estão sempre felizes em saber que estão em boas mãos se a doença chegar. O que posso fazer por você? '\ N' O prazer é meu, coronel. Disseram -me que você pode ter registros de campanhas anteriores aqui? Você tem algum que possa ter visto um surto de febre amarela entre as tropas? '\ N'oh, certamente ... aqui. Essa foi uma campanha terrível, ou seja, acredite em mim, e não apenas no inimigo. Muitos rapazes que morrem na guerra morrem dos elementos, doenças, exposição. Eles chamam isso de atrito. '\ N'is ... atrito foi especialmente ruim, então?' \ N'worse do que ruim. Entre a doença e a estação chuvosa, um homem tinha mais a temer no acampamento do que no campo de batalha. O calor também era horrível e os insetos." #NT!
 panum.542.g: "Insetos, doença, chuva ... uma própria criação da natureza, pode -se dizer." #NT!
 panum.543.t: "Campos de aflição" #NT!
 panum.543.d: "Continuando a missão de saber mais sobre a febre amarela, o Dr. §1 viajou para fora do assentamento para um aparente foco de infecção - uma fazenda rural." #NT!
 panum.543.f: "'Admito, levou quase uma hora para aprender a entender esse sotaque rural, mas o proprietário da fazenda provou ser bastante informativo. Embora essa região seja frequentemente bastante úmida, ainda há a necessidade de obras de irrigação. No entanto, cavar essas trincheiras exige força significativa, fornecida por muitas dezenas de trabalhadores locais, que muitas vezes vivem juntos em quartéis apertados e desordenados. Tais condições podem criar doenças, e é pouca surpresa que a febre amarela fosse encontrada lá em pouco tempo. Parece mais que a febre amarela surgiu aqui por conta própria ... mas se sim, como?" #NT!
 panum.543.g: "Como uma doença poderia apenas ... surgir do nada?" #NT!
 panum.544.t: "A água ...?" #NT!
 panum.544.d: "Investigando a possibilidade de que a febre amarela possa ser uma doença transmitida por água, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] colheu amostras de hidrovias e poços locais." #NT!
 panum.544.f: "“Uma possibilidade que eu considerava era que essa doença talvez fosse de natureza semelhante à cólera, que poderia ser transportada através da água doente. Decidindo ver se era esse o caso, ordenei meus assistentes para reunir amostras antes de encontrar um lugar tranquilo para o meu microscópio, onde eu poderia trabalhar não perturbado. O ar úmido e tropical está perturbando, assim como o zumbido incessante dos mosquitos, mas em pouco tempo, as amostras começaram a escorregar sob a lente, permitindo -me espiar esse menor mundial. Alguns eram mais sujos que outros, mesmo com minuto minuciosos e coisas do gênero, mas estes não correspondiam ao padrão dos infectados, que se espalham pelo mapa como um spray de tiro de pássaro. Seja qual for o caso, não consigo encontrar nenhuma pista sobre a natureza da febre amarela nesta água ... '\ n \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo a febre amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.544.g: "... Mas se eles não estão lá, então onde estão se escondendo?" #NT!
 panum.545.t: "A ilha" #NT!
 panum.545.d: "Intrigado com uma aparente 'pausa' no padrão de infecções, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se aventurou em um lugar incomum - uma pesca na ilha." #NT!
 panum.545.f: "'Ah, você deve ser médico ... Oh. Perdoe o fedor, médico. Lembre -se de que você também não cai. Os peixes que comem as entranhas que jogamos são como comer você, se puderem. '\ N' ... por favor, torne -o rápido. Conte -me sobre este lugar. '\ N'aye, bem, acho que você ficará feliz em saber que não há nenhuma doença aqui. Não é essa febre amarela, de qualquer maneira. Existe algo que possa estar poupando seus homens? '' '', Que eles passam tão pouco tempo em terra. Na maioria dos dias, eles estão no mar, e alguns variam mais e não voltam por um dia ou mais. Mas deve haver mais do que isso, eu acho. Eles passam o tempo de folga aqui na ilha, no quartel ou em suas casas, e não há febre aqui." #NT!
 panum.545.g: "... Mas primeiro, um banho de sabão. Um banho muito, muito saboroso." #NT!
 panum.546.t: "Gas do pântano?" #NT!
 panum.546.d: "No que pode ser um retorno assustador da antiga teoria do miasma, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou relatórios surpreendentes - a febre amarela pode estar relacionada à fumaça do pântano!" #NT!
 panum.546.f: "'Dói -me como tão pouco aqui parece fazer sentido. Nada se alinha às teorias estabelecidas que conhecemos, e eu me pego segurando os canudos. No entanto, há uma linha de promessa - pântanos. Meus assistentes prepararam slides para o microscópio, e eles ficam e prosperam com micróbios, mas nada que possamos identificar. E, no entanto, apesar disso, a praga explode nas margens. As casas próximas a esses pântanos são as mais afetadas com febre amarela. Alguns até mencionam ter na infância. Ainda não há sinal de ... como. Eles não bebem a água, não comem peixe preso nela, e ainda assim o fedor vagueia para suas casas na brisa, os inunda com o fedor e a doença logo se segue. Os textos antigos gritariam 'miasma', mas isso não pode ser assim ... mas se não, de que outra forma poderia se espalhar do pântano para a casa?" #NT!
 panum.546.g: "... ou talvez seja astrológico ... não, isso não faz sentido ... Não é?" #NT!
 panum.547.t: "O rival" #NT!
 panum.547.d: "Decidindo procurar experiência local, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] decidiu visitar um aliado em potencial - o médico legista local." #NT!
 panum.547.f: "'Ah, prazer em conhecê -lo, médico. Me desculpe, se não apertarmos as mãos, tenho um corpo na laje na outra sala. Malária, você acreditaria? De todas as vezes para ver um surto, nós o entendemos agora, ao mesmo tempo. Os dois tendem a entrar em pares e, pior ainda, têm sintomas semelhantes e mortes semelhantes. Torna uma tarefa terrível para diferenciar os dois, eu digo. Eu teria pensado na mesma coisa. '\ N'is é ... bastante fascinante, na verdade. Você tem bons registros disso? '\ N'oh, é claro. Vou pedir ao meu assistente enviá -los para você, embora eu não saiba como eles podem ser úteis. Não sei como essa coisa se espalha, doutor, mas eu apostaria se você puder encontrar um, pode encontrar o outro." #NT!
 panum.547.g: "Então talvez possamos matar dois pássaros com uma pedra." #NT!
 panum.548.t: "A estrada bifurcada" #NT!
 panum.548.d: "Intrigado com a natureza da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] escreveu de volta ao capital para solicitar mais instruções." #NT!
 panum.548.f: "'... e, no entanto, por mais que eu possa, me sinto sem como proceder. Há poucos 'diz' para orientar meu curso de investigação e, embora eu tenha examinado muitas revistas médicas e consultou especialistas locais, não tenho certeza do que realmente é a febre amarela. Uma doença para ter certeza, mas de que tipo? Uma doença do ar, como em um miasma? Algo na água ou na comida? Como isso se espalha do homem para o homem, ou talvez, do pântano ao homem? Nessas perguntas que eu não posso responder e nunca possa descobrir a verdade. Se não consigo encontrar a doença, não posso esperar combatê -la diretamente, mas minha investigação não é inteiramente sem frutas. Talvez eu tenha encontrado duas possíveis avenidas de pesquisa a serem consideradas: \ n \ nfirstly, que podemos tentar encontrar algum padrão sobre como ele está sendo espalhado. Talvez com uma investigação focada, possamos discernir alguma lógica sobre como a doença é transmitida e, portanto, interrompê -la. Talvez a interrupção da propagação revele a verdadeira causa. Podemos não saber de suas origens, mas talvez possamos melhor ainda." #NT!
 panum.548.g: "Uma onça de prevenção vale um quilo de cura." #NT!
 panum.548.h: "Tocamos para todas as bolas de gude. Teremos uma vacina." #NT!
  
 panum.551.t: "O caminho para a prevenção" #NT!
 panum.551.d: "Após a instrução da capital, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] começou a investigar como impedir a propagação da febre amarela." #NT!
 panum.551.f: "'... Claro, é difícil determinar o que, exatamente, deve ser feito para impedir a propagação de uma doença que mal entendemos de maneira mais do que como isso pode induzir fatalidade. No entanto, se esse é o desafio que devo enfrentar, que assim seja. Descobri uma série de pistas promissoras até agora; Meu mapa da infecção é esporádico, mas aqui e ali, certas ilhas de irregularidade aparecem ... lugares onde o surto cai significativamente, mesmo completamente. Há um padrão aqui, esperando para ser descoberto, e se puder ser encontrado, poderíamos muito bem resolver esse quebra -cabeça e nos livrar da febre amarela para sempre." #NT!
 panum.551.g: "Estamos construindo uma fortaleza, um tijolo de cada vez." #NT!
 panum.552.t: "Fatos de filete O '" #NT!
 panum.552.d: "Enquanto trabalhava em um meio para impedir a propagação da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] foi visitado por um dos assistentes §1." #NT!
 panum.552.f: "'Ah, é bom vê -lo novamente, meu filho e - bons céus! O que é esse fedor? Eu achei algo muito interessante! '\ N''Seless que você não poderia poupar tempo para um banho, parece ...' \ n'forgive me, mas sim. Eu olhei como a febre amarela não afetou os homens na pesca e comecei a segui -la de volta ao continente. Há um fumeiro na costa, e os trabalhadores partem por ele, e ninguém está ficando com febre amarela lá. E isso me fez pensar ... talvez a fumaça o mantenha longe? Então, comecei a procurar lugares com muita fumaça, e encontrei esse fabricante de sabão, e eles colocaram ervas e óleos em seu queimador. Nem uma única febre amarela em sua casa. '\ N'hmmm ... Este é um trabalho fascinante. Continue suas observações e mantenha -me informado e, oh, bom trabalho." #NT!
 panum.552.g: "Passos ansiosos envia o assistente ... mas deixa o médico para pensar." #NT!
 panum.553.t_america: "A missão" #NT!
 panum.553.d_america: "Após o caminho das lacunas no surto, a pesquisa do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] os levou a uma antiga missão colonial." #NT!
 panum.553.f_america: "'Não demorou muito para encontrar a missão aqui. Foi um dos primeiros edifícios levantados após a colonização, nossos antepassados ​​frescos de terras que eles nunca mais poderiam ver. Não é uma Grande Catedral, mas foi construída com amor e, com o tempo, missionários e membros da Igreja Mãe o viram crescer, explodindo com alas e salões próprios. Foi um dos primeiros lugares onde os doentes poderiam ser trazidos, tendidos por freiras e quaisquer voluntários piedosos dispostos a ajudar. Enquanto outros hospitais contam seus mortos e veem a doença saltar de ala para a ala, aqui, nada. Uma família foi trazida após o incêndio da casa, mas depois de uma semana, nenhum deles pegou febre amarela, apesar de serem protegidos, mas a alguns quartos de distância. Isso me intriga, pois a missão e o hospital são iguais, mas há uma grande diferença: redes. Um sermão é uma coisa sagrada e não pode ser interrompida por mosquitos zumbidos e seu tipo, de modo que o clero colocou redes em todas as janelas para manter os mosquitos, mesmo nas enfermarias." #NT!
 panum.553.g: "Pois vou restaurar a saúde para ti ..." #NT!
 panum.553.t_africa: "A favela" #NT!
 panum.553.d_africa: "Seguindo o caminho das lacunas no surto, a pesquisa do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] os levou a algum lugar curioso - as favelas." #NT!
 panum.553.f_africa: "As favelas estavam próximas o suficiente para fazer com que qualquer homem duvidasse da importância de nossa grande empresa colonial nessas terras. Imundo e miserável, embalado para a explosão de mulheres e crianças, esperando que seus homens retornem das plantações ou das minas ou onde quer que possam funcionar. As bombas de água com excesso de trabalho enchem vasos, moscas zumbindo e uma distinta falta de saneamento se combinariam para fazer com que este lugar pareça um caldeirão de doença. De fato, é uma visão rara nesses lugares, um médico como eu fui ansiosamente levado de casa em casa por guias locais e com a escolta da polícia, pediu para fornecer informações sobre uma doença ou de outra. Em troca, fiz perguntas sobre eles: e a febre amarela? Vi casos de cólera e disenteria, mas não a doença que estou caçando. Uma mulher apontou para as janelas ou onde deveriam estar - em vez de vidro, uma parede de tecido, uma rede. Para eles, manteve a malária, mas também, talvez, febre amarela ... que, eles acreditam, podem muito bem ser aborrecidos por insetos." #NT!
 panum.553.h: "... E talvez, apenas talvez, os habitantes locais estejam certos?" #NT!
 panum.554.t: "O maior assassino" #NT!
 panum.554.d: "Lendo os registros dados a eles por forças militares locais, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez uma descoberta." #NT!
 panum.554.f: "'Ah, é bom conhecê -lo novamente, coronel. Tenho algumas perguntas sobre esses registros que você me deu? Você tem um momento de sobra? '\ N'oh, mas é claro! Qualquer coisa para ajudar. '\ N'it menciona aqui que a última campanha foi liderada por um oficial que, ao que parece, profundamente perturbado por mordidas de insetos. Bites are just a part of life in this land, but where they came from...none.'\n'I see, I see...but it also mentions the army was afflicted with both malaria and yellow fever, which killed more by sickness than in battle.'\n'Attrition is long a part of warfare, I am afraid.'\n'...but once they ordered the use of pyrethrum, the cases of yellow fever and malaria dropped sharply. Então, uma semana depois, ele ordenou a pulverização da área local e, novamente, as taxas caíram. O que exatamente é esse piretrum?" #NT!
 panum.554.g: "'Oh, piretrum? É usado para deliciar as tropas. Mata insetos, você vê. '" #NT!
 panum.555.t_america: "As memórias do passado" #NT!
 panum.555.d_america: "Locked em batalha contra uma doença que atormentou a América do Sul por séculos, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procura respostas em um lugar estranho - o passado." #NT!
 panum.555.f_america: "Alguns dizem que o passado é um país diferente. Nas Américas, talvez isso seja mais verdadeiro do que em qualquer outro lugar, pois muito mudou desde Colombo, mas, para minha surpresa, a doença que luto não é uma delas. Demorou semanas para rastrear diários e discos dos primeiros colonos nessas terras, mas, finalmente, eles entraram em minhas mãos. É uma descoberta valiosa. Com eles, tenho os relatos de médicos anteriores, mentes brilhantes que podem ter falta das ferramentas que hoje tomamos como garantido. Há uma revelação preciosa, oculta, difícil de notar sem essas contas. De vez em quando, há uma explosão de febre amarela nesta região, quase como um relógio. Isso por si só é inútil, mas correlaciona -se quase exatamente com os periódicos que falam de chuva intensa e até inundações, gravadas aqui como casas sendo lavadas em inundações que são seguidas por surtos de febre amarela. Os dois poderiam ser relacionados?" #NT!
 panum.555.g: "Todos nós estamos nos ombros dos gigantes ... Eles só tinham menos gigantes para se levantar." #NT!
 panum.555.t_africa: "Remédios populares" #NT!
 panum.555.d_africa: "Talvez controversa, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou conselhos das pessoas que podem conhecer melhor a febre amarela - os nativos." #NT!
 panum.555.f_africa: "'Há aqueles que me chamavam de louco por optar por consultar os nativos sobre um diário médico, mas acho que eles não têm um bom raciocínio para esse julgamento. A febre amarela é uma doença encontrada aqui, na África, e essas pessoas vivem aqui há muito mais tempo que nós. De fato, há a chance de que essa doença tenha surgido nesta terra em primeiro lugar. Talvez seja assim, para muitos surtos aqui, pode matar os europeus e similares com facilidade, mas dê ao povo africano nativo nada mais do que sintomas semelhantes a uma influenza leve. \ N \ nyet, apesar disso, há entendimento. Conversei com vários curandeiros locais e até representantes de tribos em terra, e eles mencionam certas práticas preventivas ... a queima de esterco de elefante e várias plantas, até trazendo essa fumaça para dentro de casa, que afasta os mosquitos que eles acreditam estar relacionados à malária e talvez à febre amarela. Mais do que isso, eles têm um meio de ler a terra ao seu redor e prever o início da estação 'chuvosa', que eles acreditam corresponder ao pior da malária e da febre amarela. Levará mais estudos e considerações, mas isso é promissor." #NT!
 panum.555.h: "Sabedoria, no lugar menos esperado." #NT!
 panum.556.t: "Tecido simples?" #NT!
 panum.556.d: "Embora destinados a apoiar nossas tropas em uma guarnição de fronteira, novos tecidos impregnados com inseticidas chegaram à mesma cidade que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está investigando." #NT!
 panum.556.f: "- Você deve estar nessa área - oh, eu vejo, você é o médico da capital. Não sei se há muito aqui para você, doutor. Não é um único caso daquela febre por aqui. '\ N' ... que eu posso dizer. O que é isso? Ver? Olhe para o chão. Dezenas de bastardos já mortas. '\ N'it deve ser muito eficaz para matá -los tão rapidamente. Quantos homens ficam nessas tendas? O tecido é novo, pois os antigos foram destruídos em uma monção no ano passado. Tempo terrível, febre em todos os lugares e malária também. Agora conseguimos isso, nada. '" #NT!
 panum.556.g: "... Você acabou de dizer que não há uma única febre, já que você pegou esse novo tecido?" #NT!
  
