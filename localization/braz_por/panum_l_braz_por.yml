 panum.922.t: "Garupa" #NT!
 panum.922.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que muitos médicos geralmente não podem dizer a diferença entre o grupo bastante inofensivo e a difteria perigosa e destacou as diferenças em um artigo." #NT!
 panum.922.f: "Quando o médico nascido na Prússia, Abraham Jacobi, observou em uma conferência médica em 1860 que havia cerca de 122 casos de difteria em Nova York, seus colegas ficaram surpresos: eles não haviam diagnosticado nenhuma difteria durante o mesmo período. A falta de conhecimento no campo das doenças das crianças foi uma das razões para a fundação dos primeiros hospitais infantis nos EUA, nos quais a difteria desempenhou um papel especial. Jacobi é considerado o pai da pediatria americana." #NT!
 panum.923.t: "Laringe de couro" #NT!
 panum.923.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] identificou uma das principais características da difteria como a pseudomembrana de couro que se estende à laringe e causa asfixia. Essa característica é típica da doença para distingui -la dos outros." #NT!
 panum.923.f: "Podemos estabelecer a identificação da angina maligna de quatro maneiras: \ n \ nby extensas pesquisas sobre a anatomia mórbida da doença, sessenta autópsias sendo realizadas no curso de alguns meses; \ n \ nby observações, que se levantamos, a angina, se a angina, e a si mesma, que é a invariante, a ser invariável para atacar a lâmpada, que é a angina, que é quase invariável para atacar a lâmpada, e a angina, que é uma vez que a angina, se fosse a invariante, a se elevaria, se a angina, e a angina, que é uma das observações que se elevam, quase invarianas, para serem invariantes; Exame, pelo qual ele provou a identidade na composição da membrana falsa na faringe com a da traquéia; \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n \ n e no estudo das obras dos escritores anteriores ''..........." #NT!
  
 panum.940.t: "O antídoto para a difteria" #NT!
 panum.940.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] anunciou publicamente hoje que os experimentos com a antitoxina da difteria [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] produzidos foram um sucesso completo." #NT!
 panum.940.f: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] explicou à multidão surpresa que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] havia usado uma toxina enfraquecida da difteria para infectar cavalos e, por sua vez, obter um soro do sangue que era altamente eficaz no combate à difteria. Embora esse seja um grande avanço, o [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] também enfatizou que isso não deve ser confundido com uma vacina porque não ativa o sistema imunológico do paciente. 'Ainda há muito trabalho a ser feito aqui', disse [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Mas todos os pais que temiam a vida de seus filhos ofegantes à noite poderão dormir muito mais profundamente a partir de agora." #NT!
 panum.940.g: "Cortamos o ar da difteria antes que ela faça o mesmo conosco." #NT!
  
 panum.941.t: "Perclorato de ferro" #NT!
 panum.941.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu nos registros mais antigos que o perclorato de ferro era recomendado como um remédio para a difteria. Na verdade, parece ter um efeito." #NT!
 panum.941.f: "Surpreendentemente, esta receita do tipo alquímica teve um efeito em alguns pacientes. Aparentemente, é um dos poucos remédios para a difteria." #NT!
 panum.941.g: "Mas isso realmente nos leva a algum lugar?" #NT!
 panum.942.t: "Intubação" #NT!
 panum.942.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tentou dar ar ao paciente por meio da intubação. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] alcançou um pequeno sucesso contra a difteria." #NT!
 panum.942.f: "'O processo é complicado e crítico, mas qualquer indício de combate à difteria é útil para mim no momento.' \ N \ na nota curta do doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] na difteria" #NT!
 panum.942.g: "Mas certamente essa não pode ser uma solução de longo prazo?" #NT!
 panum.943.t: "Traqueotomia" #NT!
 panum.943.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] teve experiências confusas com traqueotomia, embora todos os colegas médicos §1 usem esse procedimento cirúrgico para tratar a difteria." #NT!
 panum.943.f: "“Não consigo entender por que todos esses especialistas em difteria - ou pelo menos aqueles que afirmam ser - foram capazes de relatar qualquer sucesso. Trousseau afirma ter salvado a vida de quase metade de seus pacientes com difteria, mas na minha experiência profissional é menor que um em cada dez." #NT!
 panum.943.g: "E agora?" #NT!
 panum.944.t: "Mercúrio" #NT!
 panum.944.d: "Infelizmente, um tratamento de mercúrio para a difteria terminou exatamente como o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] esperado - com envenenamento." #NT!
 panum.944.f: "'Eu deveria ter conhecido melhor? Sim! Mas a literatura especializada não deixa dúvidas de que Mercúrio ajudou contra a difteria há séculos. Alegadamente! A partir de agora, encontro outros remédios que supostamente ajudam: nitrato de prata, por exemplo. Ou ácido clorídrico! Alguém realmente lidou com esta doença?" #NT!
 panum.944.g: "Tudo isso soa ainda mais mortal que a difteria." #NT!
 panum.945.t: "Sangramento" #NT!
 panum.945.d: "Especialistas recomendam um bom leite de sangue para a difteria. O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tentou este [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] em dois casos - e descobriu que o método era bastante contraproducente." #NT!
 panum.945.f: "O enfraquecimento de um paciente enfraquecido ainda mais seria como quebrar outro pilar em uma ponte com um pilar instável. O que todo engenheiro entende é considerado herético em medicina." #NT!
 panum.945.g: "Não há melhorias?" #NT!
  
 panum.951.t: "O chocalho à noite" #NT!
 panum.951.d: ""
 panum.951.f: "O sol se retirou atrás das casas. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] caminhou nas sombras. Foi outro dia de falhas. Mais três crianças mortas. Como sempre, a mesma causa de morte. Mesmo que o pico da epidemia tenha passado. Continua sendo um risco residual de que a morte infantil percorreu as ruas e mergulhasse sua foice em suas mandíbulas. O afogamento e asfixia estavam entre as formas mais cruéis de morte. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se especializou em doenças epidêmicas por anos. Mas a difteria era diferente. Não era apenas uma doença infantil como sarampo ou escarlatina, o que poderia ter um resultado leve. A difteria fez crianças ofegarem o ar. A difteria estrangulou a criança durante a noite como um anjo vingador. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] declarou guerra contra a difteria. Mas parecia uma guerra sem esperança. Cada passo [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tomou, a doença se seguiu - e reverteu [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] novamente. Todos os métodos que foram transmitidos acabaram sendo inúteis. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] Luta com a morte. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] Luta com o diabo. Naquela noite em que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] chegou em casa. Como um suspiro cumprimentou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] na escuridão. Porque havia um paciente esperando por [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não tinha na lista. A difteria se espalhou. Até [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] rua. Até [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] House. \ N \ nup para [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Cama do filho." #NT!
 panum.951.g: "Os experimentos do médico ...?" #NT!
 panum.952.t: "Tratamento da difteria" #NT!
 panum.952.d: ""
 panum.952.f: "Uma engolia desesperada. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] havia se acostumado a esse som. Normalmente, você mal podia ouvir quando outras pessoas engoliram. Mas era a mesma agonia §1 que já ouvia tantas vezes antes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] memorizou o som. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] pode colocar um pano frio na cabeça do filho [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] poderia falar suavemente com ele. \ N \ nbut [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não poderia fazer nada por ele. Não mais do que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] havia feito para as outras crianças. Para muitos outros, dezenas de crianças mortas. Se houvesse alguém que soubesse quão pouco essas drogas da difteria valiam, era [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Mercúrio que envenenou o corpo. Nitrato de prata e perclorato de ferro com efeitos variados. A traqueotomia, que foi considerada a arte mais alta da cirurgia - e quase sempre falhou. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] o fez com tanta frequência. E, no entanto, era diferente. Não era mais sobre a doença. Era sobre [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] agora. Essa epidemia odiada estava se vingando de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] queria resistir a ele. Porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] queria erradicá -lo, como fez para crianças pequenas. Estava se vingando. Ele queria tirar a coisa mais preciosa §1. Não [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Honra como médico, não [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Espere uma cura. \ N \ n O barulho na noite retorna. Os líquidos brilham em pequenos frascos. Um bisturi brilha ao luar." #NT!
 panum.952.g: "Trate o garoto com perclorato de ferro." #NT!
 panum.952.h: "Realizar uma traqueotomia." #NT!
 panum.952.i: "Examine uma amostra de tecido com o microscópio." #NT!
 panum.953.t: "O anjo estrangulador" #NT!
 panum.953.d: ""
 panum.953.f: "Não há mais barulho. O som que atormentou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], que acompanhara [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] e ensinado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a temer - se foi. Mas não houve triunfo. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] havia desprezado o som. \ N \ nbut agora [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] desejou o terrível ruído de volta. O silêncio morto, como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] o conheceu há meses. Foi o momento em que você podia ouvir o silêncio. Um sinistro de cemitério que se espalhou e sugou toda força vital. O silêncio podia ser ouvido e sentido. Encheu o corpo com o vazio. Isso não foi uma contradição. Era lógico. Era empírico. \ N \ nbut lógica e empirismo falharam [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] naquela noite. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] dedos apertou a mão de uma criança fria. Pálido como a luz da lua que brilhava pelas janelas. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] desafiou a difteria. \ N \ Nand Diphtheria pisou [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] no chão e torturou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] com prazer porque a arrogância §11 havia cego [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]." #NT!
 panum.953.g: "O médico terá dificuldade em lidar com isso." #NT!
 panum.954.t: "Não laringe, mas coração e olhos" #NT!
 panum.954.d: ""
 panum.954.f: "A lua havia afundado. O sol havia ressuscitado novamente. Os dias se passaram na alternância da escuridão noturna e nas persianas desenhadas. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] estava esperando ao lado da cama. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] não havia curado pacientes até então. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] O trabalho não se concentrou nas pessoas, mas em doenças. Era fácil administrar nitrato de prata ao experimentar; Era fácil injetar um soro quando foi um mero teste; E era fácil realizar uma operação na traquéia ao não tratar um ser humano, mas apenas pele, apenas músculo, apenas carne, apenas osso. \ n \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] havia tratado doenças antes. A difteria transformou pessoas em pacientes, histórias em registros médicos e sofrimento em sintomas. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] queria libertar pessoas da falta de ar. No entanto, era [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] quem precisava de cura. Não na laringe. Mas em [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] olhos e coração. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] podia ver novamente. E um sorriso manso sorriu em [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]." #NT!
 panum.954.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] fez isso!" #NT!
 panum.955.t: "O sacrifício" #NT!
 panum.955.d: ""
 panum.955.f: "Uma alma perdida. Um mundo ganhou. Micróbios agitados sob o microscópio. Micróbios como os que foram encontrados em muitos outros casos. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] havia descartado até agora. Mas foi a explicação mais razoável. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Son não teve contato com pacientes com difteria. \ N \ Nonly [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tinha. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] trouxe os germes para esta casa. Durante dias. Talvez por semanas. Sem perceber. Das outras dúzias de crianças doentes. Das outras dúzias de filhos mortos. \ N \ nwho agora era uma vítima mais rica. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tinha uma amostra. E [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tinham porquinhos e coelhos da Índia que nenhuma criança cuidava mais; que nenhuma criança brincou mais com. Eles seriam um sacrifício. Assim como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] fez sacrifícios. Se eles adoeceram, isso era prova. Era sobre erradicar a difteria. Essa era uma meta maior que [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. \ N \ nand maior que qualquer outro objetivo." #NT!
 panum.955.g: "Um sacrifício que não ficará impune." #NT!
 panum.956.t: "Mudança radical do teorema" #NT!
 panum.956.d: ""
 panum.956.f: "As últimas semanas desencadearam uma Caesura significativa para [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] certamente não chamaria isso de reviravolta copernicana. Mas raramente um evento fez com que [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] questionasse tanto os métodos [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] e [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. A impotência diante da difteria tem um efeito duradouro. E [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sabe que ele voltará. Livros e tratados de remédios são empilhados. E medicamentos. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] A mão pega manicamente para tudo o que é supostamente conhecido sobre a difteria. \ N \ nevery supostamente cura. Todo suposto manual. Cada suposto tratado. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] limpa a tabela. Joga tudo nele no lixo. Eles estavam todos errados. Bretonneau. Guersant. TRUSSEAU. Bochut. Daviot! E depois que tudo [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] lia e tentou até agora, apenas uma possibilidade permaneceu aberta. A difteria era contagiosa. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] infectou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] próprio filho após contato com outros pacientes. Havia um agente. Não importa o que os especialistas dissessem." #NT!
 panum.956.g: "Todos os esforços agora estão focados em encontrar o patógeno." #NT!
 panum.956.h: "O foco da pesquisa já deve estar na possível vacina." #NT!
  
 panum.961.t: "A toxina da difteria" #NT!
 panum.961.d: ""
 panum.961.f: "Um veneno era a chave. Veneno do tipo secretado pelo patógeno da difteria. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Ouvi dizer que um biólogo estava experimentando. A toxina era forte demais para ser parada. Se você infectou animais com ele, eles morreram. Pode -se ler sobre isso nos periódicos especializados. E havia imitadores em todo o mundo que também estavam isolando a toxina da difteria na esperança de induzir um efeito imunológico em um animal sem morrer da mesma maneira que os milhões de crianças cujos cadáveres estavam em homenagem ao altar da difteria. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] teve que encontrar a toxina. E conduzir [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] próprios experimentos." #NT!
 panum.961.g: "Este é talvez o passo crucial ..." #NT!
 panum.961.h: "Este processo já é conhecido na produção de toxina tétano ..." #NT!
 panum.961.i: "A quantidade certa de iodo pode ajudar com isso." #NT!
 panum.962.t: "A antitoxina da difteria" #NT!
 panum.962.d: ""
 panum.962.f: "Um avanço. Um avanço decisivo que compensou todos os sacrifícios, todo o sofrimento, todas as mortes [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tiveram que acompanhar, incluindo os pais e parentes em luto. As despedidas chorosas. O desespero e a desesperança. \ N \ nit era tão simples. E tão eficiente. A toxina teve que ser enfraquecida. Finalmente, uma solução de iodo ajudaria. Os cavalos eram os assuntos de teste perfeito. O resto foi fácil. O animal desenvolveu poderes imunológicos contra a toxina - e, portanto, era o fornecedor de um soro. Uma antitoxina contra a difteria. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] realizou os primeiros testes. Nem todas as crianças responderam. Mas mais de [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ousou sonhar. Agora, essa arma contra o inimigo invisível tinha que ser produzido em massa - e distribuído. Em todas as clínicas. Na cirurgia de todo médico. A guerra de \ n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] contra a difteria não acabou. Estava apenas começando." #NT!
 panum.962.g: "Encomende o máximo possível deste soro!" #NT!
 panum.963.t: "A sombra" #NT!
 panum.963.d: ""
 panum.963.f: "A difteria deve ser erradicada! Deve desaparecer! \ N \ nit pode ter sido um pensamento maníaco. Mas foi um pensamento que manteve o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] vivo. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Guerra contra a Diphteria deu frutos. Tantas vidas salvas. Tantas crianças que teriam sofrido agonia e morreram em outro mundo! O bem dos muitos superava o bem do indivíduo. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] teria dado sua própria vida se [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pudesse ter destruído a difteria. Mas o destino não foi gentil com [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] não havia vendido [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] ao diabo - mas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] filho. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] decidiu isso. Para ele. Uma raiva contra a doença. Mas [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] a apagou. Com pensamentos racionais que afogaram o ressentimento em relação ao [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] no trabalho e na vingança. Mas alguns dias atrás, essa raiva desapareceu. Paradoxalmente, quanto mais filhos [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] salvaram, mais claro [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] poderia ver. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] viu [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. E [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] detestou o que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] viu. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] A arrogância havia enganado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] Acreditava que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] estava salvando vidas humanas. No entanto, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] decidiu por um. Como um carrasco. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] nem tocou o bisturi. Ou pelo menos um pequeno copo de nitrato de prata. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] havia colocado mais valor na amostra e no patógeno - do que no paciente [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Um ser humano. \ N \ n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] própria carne e sangue. E no apartamento solitário [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] somente companheiros eram certificados, prêmios e fotos com políticos e acadêmicos importantes. Caso contrário, apenas uma cama vazia. E um pensamento que se tornou mais forte. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Cabeça latejou. Tornou -se uma dor de cabeça agonizante: devo ser erradicado. Devo desaparecer. \ N \ n'my filho. Meu querido filho ... '" #NT!
 panum.963.g: "Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ... médico!" #NT!
  
 panum.640.t: "'Observações feitas durante a epidemia de sarampo'" #NT!
 panum.640.d: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] apresentou as recomendações [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para o tratamento de sarampo, que destinam -se a entender melhor as causas e a transmissão da doença, a fim de mitigar e evitar surtos no futuro." #NT!
 panum.640.f: "O contágio se espalhou muito rapidamente no Thorshavn densamente povoado, e daí foi transportado por barcos para as outras ilhas. As viagens de e para os planos de negociação, a frequência da igreja e da escola e as unidades de moagem espalham a infecção para as outras aldeias. O contágio foi introduzido na SUDERIR de Thorshavn por um indivíduo identificado e, após a investigação, era possível demonstrar em quase todos os lugares como e por quem a infecção havia sido trazida para cada vila. Se a infecção pode ser transmitida por coisas como roupas, lavanderia e letras parecem bastante duvidosas, e eu não vi ou ouvi nenhum exemplo de tal transmissão durante a epidemia. -Peter panum, observações feitas durante a epidemia de sarampo nas Ilhas Faroe no ano de 1846" #NT!
 panum.640.g: "Um novo Peter Panum!" #NT!
  
  ### 2.3.4a ### 
  
 panum.52.m: "A epidemia de febre escarlate em [SCOPE.sCountry('panum_scarlet_country_scope').GetName]." #NT!
 panum.52.q: "Na verdade, esse é um plano ruim ..." #NT!
 panum_no_expedition_effect_tt: "Seu [concept_panum_physician] é livre para realizar outras atividades novamente." #NT!
  
  ### 2.3.5 ### 
  
 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], uma das mentes principais da Sociedade Médica de [GetPlayer.GetName], concordou em viajar para um estado afetado pela epidemia e pesquisar a doença lá. O médico espera que isso possa resultar em uma descrição completa da doença." #NT!
 panum.53.d: "A epidemia desenfreada levou [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a investigá -la mais de perto para determinar as causas e desenvolver novos métodos para tratar a doença terrível." #NT!
  
