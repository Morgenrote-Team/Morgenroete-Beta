 panum_sailor_quarantine_modifier: "Sarampo paralisa marinheiros" #NT!
  
 panum.600.t: "Epidemia de sarampo" #NT!
 panum.600.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW Sarampo#! está devastando [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.600.f: "Assim como a varíola, o sarampo foi mencionado pelo médico persa Rhazes no século X e parece ter sido disseminado na região da Eurásia durante a Idade Média. O sarampo era endêmico na Europa até o século XIX e se tornou ainda mais importante à medida que a urbanização aumentava. Uma característica especial do Masenr é a erupção cutânea que começa no rosto e pescoço e se espalha por todo o corpo em poucos dias. Junto com a varíola, o sarampo é considerado uma das doenças que atingiram grandes partes da população indígena indiana no século XVI." #NT!
 panum.600.g: "Mas isso é apenas uma doença infantil inofensiva... certo?" #NT!
 panum.620.t: "Fim da epidemia de sarampo" #NT!
 panum.620.d: "A epidemia de sarampo aparentemente acabou. Um último par de pais enterrou seu filho morto." #NT!
 panum.620.f: ""Assim como o sarampo, o amor é mais perigoso quando chega tarde na vida." - Lord Byron" #NT!
  
 panum.602.t: "Epidemia de sarampo atinge [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.602.d: "Recebemos relatos de que os primeiros casos de sarampo foram relatados no [SCOPE.sCountry('panum_infected_country').GetName] hoje. As autoridades nos culpam por não fazer o suficiente para impedir a disseminação." #NT!
 panum.602.g: "Não havia como evitar isso." #NT!
 panum.603.t: "Sarampo mata crianças" #NT!
 panum.603.d: "Em [SCOPE.sState('panum_disease_state').GetName], o surto de sarampo foi muito mais grave do que o esperado. A epidemia foi particularmente galopante entre bebês e crianças pequenas e enfraqueceu permanentemente uma geração inteira." #NT!
 panum.603.f: "O sarampo sempre foi visto como uma doença infantil, embora também possa afetar adultos. Ele mostra seus efeitos mais devastadores entre as idades de 2 e 3 anos. A taxa de mortalidade então cai rapidamente. Em 1963, antes de uma vacina ser inventada, as estatísticas oficiais estimavam que 2 milhões de mortes por sarampo estavam ocorrendo em todo o mundo a cada ano. Cerca de 5 a 10 por cento dos casos da doença terminavam fatalmente." #NT!
 panum.603.g: "Não há cura para esta doença terrível?" #NT!
 panum.604.t: "Sarampo paralisa marinheiros" #NT!
 panum.604.d: "Por razões misteriosas, o sarampo em [SCOPE.sState('panum_disease_state').GetName] afetou particularmente pescadores e marinheiros. As taxas de mortalidade são insignificantes, mas a perda de trabalho é perceptível nos estaleiros de peixes e entre os baleeiros." #NT!
 panum.604.f: "Durante sua pesquisa nas Ilhas Faroé, Peter Panum descobriu que o sarampo também afetava adultos, especialmente em populações mais isoladas. As razões para isso permaneceram obscuras por muito tempo; Em princípio, no entanto, era perceptível que pescadores e suas famílias que viviam longe das cidades mais movimentadas eram particularmente afetados." #NT!
 panum.604.g: "Mas quem vai para o mar agora?" #NT!
 panum.605.t: "Clínica Infantil para Sarampo" #NT!
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName] notou o alto número de crianças sofrendo de sarampo em [SCOPE.sState('panum_disease_state').GetName], particularmente entre famílias mais pobres, onde as taxas de mortalidade são mais altas. O político gostaria de financiar uma clínica infantil para sarampo e pediu uma doação pública." #NT!
 panum.605.f: "'É uma pena ver os bons pais de [SCOPE.sState('panum_disease_state').GetName] à mercê desta terrível doença. Os políticos devem agir e assumir a responsabilidade. Por muito tempo, muito pouco foi feito por muitos. Um hospital infantil deve ajudar a proteger a coisa mais valiosa que os pais têm. Nós ajudaremos. Eu prometo a você. Enquanto meu nome for [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting]... o que você quer dizer com eu fazer discursos eleitorais?'" #NT!
 panum.605.g: "Uma iniciativa que vale a pena apoiar." #NT!
 panum.605.h: "Este partido só quer explorar a doença para fins políticos." #NT!
 panum.606.t: "Sarampo Depressão" #NT!
 panum.606.d: "'As muitas crianças doentes e mortas em [SCOPE.sState('panum_disease_state').GetName] deixaram sua marca em muitos pais. Alguns falam de inúmeras pessoas que estão em crise de vida.'" #NT!
 panum.606.f: "'A Sra. Miller teve que enterrar seu terceiro filho este mês. Ela é apenas uma das muitas mães que agora não têm filhos. O Sr. Miller, que administra uma padaria na cidade, fechou sua loja por várias semanas. Muitas famílias nesta área são como os Millers. Dificilmente há um clã que não tenha perdido um filho. No entanto, o fatalismo vem se transformando em insatisfação há semanas. As pessoas nesta região se tornaram significativamente mais sensíveis caso as circunstâncias continuem a piorar. Muitas pessoas agora culpam o governo por sua miséria.'\n\nArtigo do [SCOPE.sState('panum_disease_state').GetCityHubName] Herald" #NT!
 panum.606.g: "Não é totalmente incompreensível dada a situação." #NT!
  
 panum.622.t: "Incubação do sarampo" #NT!
 panum.622.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] compilou uma lista meticulosa de casos de sarampo que mostra muito bem o período de incubação do sarampo." #NT!
 panum.622.f: "'Não se pode negar que o estágio de descamação pode ser infeccioso, mas deve-se ser cauteloso ao aceitar essa visão, pois, em termos gerais, suspeitar-se-ia do oposto. Quase parece que, como um período latente tão longo não poderia ser concebido, um estágio posterior da doença foi escolhido como o infectante. Nas aldeias de Hove e Lobre, em Suderø, perto do fim da epidemia, ocorreu um intervalo de mais de quatorze dias entre gerações do exantema na mesma casa, sem que eu pudesse demonstrar uma nova infecção de fora; no entanto, esses dois casos podem ser explicados por uma infecção que foi transmitida durante o estágio de convalescença. A partir dos dados aqui apresentados, acredito que o período de incubação do sarampo pode ser estimado com grande segurança em cerca de quatorze dias, sem, no entanto, insistir que esse intervalo é aquele que não pode ser modificado por circunstâncias particulares, como, por exemplo, uma viagem; muitos fatores falam a priori contra tal ditado absoluto, bem como a analogia com a incerteza dos períodos latentes de outras doenças.' -Pedro Panum" #NT!
 panum.623.t: "Singularidade do sarampo" #NT!
 panum.623.d: "Em uma nova etapa intermediária, o Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] diferenciou entre diferentes formas de sarampo e não apenas observou as diferenças de outras doenças semelhantes, como varíola, rubéola e sarampo, mas também destacou os sintomas específicos." #NT!
 panum.623.f: "'A literatura sobre sarampo é insignificante e incompleta em comparação com a de outros exantemas agudos, como, por exemplo, escarlatina e varíola. Além de relatos dispersos em periódicos relacionados a surtos únicos, há apenas algumas monografias, várias das quais datam do século anterior. Essa febre exantemática, certamente desconhecida dos médicos gregos e árabes, era tão insuficientemente diferenciada mesmo no último século que de Haën manteve a identidade do sarampo com a varíola, com base nos sintomas, e escritores antes do final do século XVII descreveram ambas as doenças como pertencentes à mesma família.' - Peter Panum" #NT!
 panum.624.t: "Populações virgens e imunidade vitalícia" #NT!
 panum.624.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] foi capaz de mostrar recentemente muito claramente que quando o sarampo afeta um indivíduo, ele não ocorre novamente. Populações que nunca foram expostas à doença estão, portanto, particularmente em risco." #NT!
 panum.624.f: "'A este respeito, é bastante notável, no entanto, que das muitas pessoas idosas que ainda viviam nas Ilhas Faroé e que tiveram sarampo em 1781, nenhuma, até onde pude descobrir por meio de investigação cuidadosa, foi atacada pela segunda vez. Eu mesmo vi noventa e oito dessas pessoas idosas, que estavam isentas porque tiveram a doença na juventude. Isso foi ainda mais notável porque uma idade avançada não diminuiu de forma alguma a suscetibilidade ao sarampo, uma vez que, até onde sei, todas as pessoas idosas que não tiveram sarampo na vida anterior foram atacadas quando foram expostas à infecção; enquanto certas pessoas jovens, embora constantemente expostas, estavam isentas. Se a recuperação do sarampo sessenta e cinco anos antes pudesse garantir que as pessoas não pegassem a doença pela segunda vez, pode-se supor que uma proteção ainda maior seria oferecida por terem se recuperado dela em menos tempo' - Peter Panum" #NT!
  
 panum.700.t: "Epidemia de escarlatina" #NT!
 panum.700.d: "Uma epidemia eclodiu em um dos nossos estados: #YELLOW Escarlatina#! está devastando [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.700.f: "A escarlatina é conhecida desde os tempos antigos e foi bem descrita no século XVII, notavelmente por Thomas Sydenham. Embora a escarlatina aparentemente tenha se tornado menos perigosa no século XVIII, ela reapareceu em uma nova forma no século XIX. Pierre Fidèle Bretonneau, por exemplo, afirmou que por volta de 1800 não havia conhecido um único caso fatal de escarlatina, enquanto em 1824 observou uma epidemia em Tours com mortalidade tão alta que colocou a escarlatina no mesmo nível da peste e da cólera. A escarlatina é acompanhada por uma erupção cutânea característica. Ao contrário da varíola ou do sarampo, a escarlatina é caracterizada por uma área de amígdala inchada e uma língua cor de morango." #NT!
 panum.700.g: "Toda criança tem que passar por isso em algum momento. Espero." #NT!
 panum.720.t: "Fim da epidemia de escarlatina" #NT!
 panum.720.d: "A epidemia de escarlatina que tomou conta do nosso país está lentamente deixando as cidades e vilas. Inúmeros pais respiram aliviados." #NT!
 panum.720.f: "'É como a escarlatina: é preciso acabar com isso.'\n\n'Então é preciso inventar uma maneira de inocular o amor, como uma vacinação.' - Leo Tolstoy" #NT!
  
 panum.722.t: "Conhecimento antigo" #NT!
 panum.722.d: "Por meio de um antiquário, [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu encontrar vários livros antigos que resumem descrições da escarlatina no passado e também podem ser úteis no presente." #NT!
 panum.722.f: "Não se pode dizer com certeza se a escarlatina era conhecida nos tempos antigos ou se era confundida com doenças semelhantes, como difteria, sarampo e rubéola. Evidências de uma doença semelhante à escarlatina já existem em Celso, Célio Aureliano, Arataeus da Capadócia e Aécio de Amida. Descrições semelhantes podem ser encontradas na região árabe-perisiana a partir da Idade Média, nomeadamente por Avicena, Ali Abbas e Rhazes. A primeira descrição definitiva da escarlatina é uma descrição de Giovanni Filippo Ingrassia de 1553. Outra posição importante é ocupada pelo médico Daniel Sennert, também do século XVI. O nome 'Scarlatina' remonta a Thomas Sydenham e sua descrição de 1675. Embora a descrição de Sydenham seja considerada autoritativa, há lacunas significativas nela, e o termo escarlatina também parece ter sido difundido na Inglaterra já em meados do século XVI." #NT!
 panum.723.t: "Sintomas da escarlatina" #NT!
 panum.723.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] fez progressos em sua descrição da escarlatina e resumiu os sintomas pela primeira vez." #NT!
 panum.723.f: "'Os pacientes sentem rigoros e calafrios, assim como em outras febres. Os sintomas, no entanto, são moderados; depois, toda a pele fica coberta de pequenas máculas vermelhas, mais espessas que as do sarampo, bem como mais largas, mais vermelhas e menos uniformes. Elas duram dois ou três dias e depois desaparecem. O paciente não só tem erupção cutânea, mas também inflamação das amígdalas. Pode haver complicações como reumatismo e hidropisia.'\n\nUma carta do Doutor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] para a Faculdade de Medicina" #NT!
 panum.724.t: "A escarlatina não ama a laringe" #NT!
 panum.724.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] identificou as diferenças específicas entre as doenças escarlatina e difteria." #NT!
 panum.724.f: "'Na escarlatina, a inflamação é amplamente espalhada sobre as amígdalas, palato e faringe, e não é, como na difteria, inicialmente limitada a um ponto; e em segundo lugar, a inflamação escarlatina da faringe não tem tendência a se espalhar para as vias respiratórias. Para resumir: a escarlatina não ama a laringe.'\n\nUma carta do Doutor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] para a Faculdade de Medicina" #NT!
  
 panum_plague_quarantine_modifier: "Quarentena de Peste" #NT!
 panum_plague_hospitals_modifier: "Casas de Praga" #NT!
 panum_plague_burn_everything_modifier: "Queime tudo!" #NT!
 panum_plague_rat_killer_modifier: "Mate tudo!" #NT!
 panum_plague_loss_of_trust_modifier: "Perda de confiança" #NT!
  
 panum.800.t: "O Retorno da Peste" #NT!
 panum.800.d: "Há vários anos, há rumores de que a praga retornou a partes do nosso país. Anteriormente, isso se limitava a distritos rurais remotos. No entanto, com o surto em [SCOPE.sState('panum_disease_state').GetName], finalmente está claro: a praga está mais uma vez estendendo seus dedos nodosos!" #NT!
 panum.800.f: "A terceira pandemia de peste (após a Peste Justiniana no século VI e a "Peste Negra" no século XIV) começou na China no final do século XIX. Acredita-se que a pandemia tenha se originado em Yunnan, que viu um surto já em 1792, em 1855 e novamente em 1866. Um surto na cidade vizinha de Guangzhou, de janeiro de 1894 em diante, matou 80.000. A partir de março de 1894, cientistas e médicos britânicos em Hong Kong tomaram conhecimento do surto. Após as ondas de cólera das últimas décadas, esperava-se que a onda de peste causasse muitas mortes, especialmente na China e na Índia, e, finalmente, levasse à instabilidade do estado. Custaria cerca de 15 milhões de vidas em todo o mundo." #NT!
 panum.800.g: "Impossível! A peste é uma doença do passado esquecido!" #NT!
  
 panum.820.t: "Fim da epidemia de peste" #NT!
 panum.820.d: "A terrível peste, um dos piores flagelos da humanidade, deixou nosso país novamente. Esperemos que ela retorne para onde pertence: para o abismo da história." #NT!
 panum.820.f: "'Mas o que significa, a peste? É a vida, só isso.' - Albert Camus" #NT!
  
 panum.802.t: "A peste se espalha para [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.802.d: "Casos de peste agora também estão sendo relatados além de nossas fronteiras. Aparentemente, as autoridades não conseguiram conter a doença. O embaixador [SCOPE.sCountry('panum_infected_country').GetAdjectiveNoFlag] fez sérias acusações contra nós." #NT!
 panum.802.g: "A longo prazo, a praga chega para todos..." #NT!
 panum.803.t: "Epidemia de peste" #NT!
 panum.803.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW A peste#! está devastando [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.803.g: "A Peste Negra está batendo à porta." #NT!
 panum.804.t: "A Peste: Uma Terceira Onda" #NT!
 panum.804.d: "Notícias perturbadoras chegam até nós de [SCOPE.sCountry('panum_plague_country').GetName]. Dizem que um surto epidêmico violento ocorreu lá algumas semanas atrás. Os médicos estão preocupados: supostamente é a infame peste." #NT!
 panum.804.g: "Deveríamos organizar uma expedição médica para nos preparar para isso." #NT!
 panum.805.t: "Quarentena de Peste" #NT!
 panum.805.d: "A situação em [SCOPE.sState('panum_disease_state').GetName] ameaça sair do controle. Políticos influentes, chefes de autoridades e indivíduos privados estão pedindo uma quarentena para evitar que a praga se espalhe ainda mais. Essas são principalmente pessoas que não vivem em [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.805.f: "Quarentenas extensas e rigorosas já haviam se mostrado bem-sucedidas na Idade Média. Na verdade, o termo quarentena remonta à palavra 40 na língua italiana e foi aparentemente usado pela primeira vez em tempos de peste. A República de Veneza em particular, como uma nação comercial com tráfego marítimo extensivo, era conhecida por essa medida, pois cidades portuárias e comerciais eram particularmente afetadas por epidemias." #NT!
 panum.805.g: "Toda a área deve ser colocada em quarentena." #NT!
 panum.805.h: "Não devemos dramatizar demais." #NT!
 panum.806.t: "Casas de Praga" #NT!
 panum.806.d: "As autoridades locais em [SCOPE.sState('panum_disease_state').GetName] fizeram uma proposta para montar casas de peste para isolar melhor a população saudável da população doente. Isso afetaria particularmente as classes mais pobres, que não podem fugir como os ricos." #NT!
 panum.806.f: "Uma casa de peste era usada para cuidar de pacientes de peste durante epidemias de peste. Como a epidemia era considerada incurável durante o período de pico dessas ondas de doenças, no final da Idade Média e início dos tempos modernos, e era, portanto, apenas um alívio como resultado de cuidados médicos, as casas de peste tinham como objetivo principal isolar os doentes da população saudável. Para esse propósito, casas de peste semelhantes a leprosários eram geralmente construídas fora ou nos arredores de uma cidade. Outro tipo de casa de peste tinha como objetivo servir à prevenção no sentido de um período de quarentena. Pessoas em cuja vizinhança imediata a peste havia ocorrido eram levadas para a casa de peste, da qual só tinham permissão para sair se não estivessem infectadas." #NT!
 panum.806.g: "É apenas para o bem deles. Mesmo que eles não queiram." #NT!
 panum.806.h: "Isso só provocaria inquietação." #NT!
 panum.807.t: "O Doutor da Peste" #NT!
 panum.807.d: "O médico responsável em um dos nossos hospitais de peste em [SCOPE.sState('panum_disease_state').GetName] adquiriu tanta experiência nesta área que pode ser uma ajuda valiosa em nível nacional." #NT!
 panum.807.f: "'Deixe-me passar! Eu sou médico. E sei exatamente como lidar com essa doença.'" #NT!
 panum.807.g: "Dê ao médico uma posição de alto escalão como médico." #NT!
 panum.808.t: "A Fuga dos Ricos" #NT!
 panum.808.d: "O número de emigrantes em [SCOPE.sState('panum_disease_state').GetName] está aumentando a cada dia. Em particular, as famílias que podem pagar tentam escapar da praga. Há grande ressentimento entre aqueles que não podem pagar por tal fuga. Outros alertam que isso tornará a praga mais disseminada." #NT!
 panum.808.f: "'Alguns, novamente, os mais sensatos, talvez, em julgamento, como também eram os mais severos em temperamento, de todos, afirmaram que não havia remédio para a doença superior ou igual em eficácia à fuga; seguindo essa prescrição, uma multidão de homens e mulheres, negligentes com tudo, exceto consigo mesmos, abandonaram sua cidade, suas casas, suas propriedades, seus parentes, seus bens, e foram para o exílio voluntário, ou migraram para as regiões rurais, como se Deus, ao visitar os homens com essa pestilência em retribuição às suas iniquidades, não os perseguisse com Sua ira, onde quer que estivessem, mas pretendesse destruir apenas aqueles que permaneceram dentro do circuito dos muros da cidade; ou julgando, por acaso, que agora era hora de todos fugirem dela, e que sua última hora havia chegado.' - Bocaccio" #NT!
 panum.809.t: "Pilhas de cadáveres" #NT!
 panum.809.d: "O número de mortes pela peste atingiu tais proporções que dificilmente poderia ser mantido sob controle. Alguns já estão recomendando queimadas públicas e valas comuns." #NT!
 panum.809.f: "No pico da peste de 1894 em Hong Kong, as admissões hospitalares eram em média de 80 por dia, e a morte atingia o pico de mais de 100 por dia. Por meio do tráfego marítimo, a epidemia se espalhou para o resto do país depois de 1894 e, eventualmente, se espalhou para o Raj britânico na Índia, onde cerca de dez milhões de indianos foram mortos. As principais medidas preventivas foram a criação de hospitais de peste e a mobilização de equipe médica para tratar e isolar pacientes de peste; conduzir operações de busca de casa em casa, descobrir e transferir pacientes de peste e limpar e desinfetar casas e áreas infectadas; e criar cemitérios designados e designar uma pessoa responsável por transportar e enterrar os mortos da peste." #NT!
 panum.810.t: "A Peste Negra cobra seu preço" #NT!
 panum.810.d: "A epidemia de peste está particularmente intensa em [SCOPE.sState('panum_disease_state').GetName] ultimamente. Várias mortes foram relatadas, até mais do que o normal." #NT!
 panum.810.f: "A doença permaneceu localizada no sudoeste da China por vários anos antes de se espalhar. Na cidade de Cantão, a partir de janeiro de 1894, a doença matou 80.000 pessoas até junho. O tráfego diário de água com a cidade vizinha de Hong Kong espalhou rapidamente a praga lá, matando mais de 2.400 em dois meses durante a praga de Hong Kong de 1894." #NT!
 panum.810.g: "Ninguém escapa do Grim Reaper!" #NT!
 panum.811.t: "Queime tudo!" #NT!
 panum.811.d: "Limpar e desinfetar as casas dos afetados é, muitas vezes, a única maneira de impedir a propagação da peste. Isso geralmente inclui queimar qualquer coisa que entre em contato com um paciente da peste." #NT!
 panum.811.f: "'Digo, então, que tal era a energia do contágio da dita pestilência, que não era meramente propagada de homem para homem, mas, o que é muito mais surpreendente, era frequentemente observado que coisas que pertenciam a um doente ou morto da doença, se tocadas por alguma outra criatura viva, não da espécie humana, eram a ocasião, não meramente de enjoo, mas de uma morte quase instantânea. Do qual meus próprios olhos (como eu disse um pouco antes) tiveram conhecimento, um dia entre outros, pela seguinte experiência. Os trapos de um homem pobre que havia morrido da doença estavam espalhados pela rua aberta, dois porcos foram até lá, e depois, como é seu costume, não pouco brincando com seus focinhos, pegaram os trapos entre os dentes e os jogaram para frente e para trás sobre suas bochechas; então, quase imediatamente, eles deram algumas voltas e caíram mortos, como se por veneno, sobre os trapos que em uma hora ruim eles haviam perturbado.' -Boccaccio" #NT!
 panum.811.g: "Queime roupas, móveis e até casas, se necessário!" #NT!
 panum.811.h: "Isso não é necessário." #NT!
 panum.812.t: "Mate tudo!" #NT!
 panum.812.d: "Suspeitou-se desde o início que ratos poderiam ser portadores da peste. Há apelos no [SCOPE.sState('panum_disease_state').GetName] para erradicar especificamente animais e vermes para evitar a disseminação da doença." #NT!
 panum.812.f: "Na esteira da terceira pandemia de peste, cidades europeias criaram verdadeiros "corpos anti-ratos" que foram encarregados especificamente de procurar e matar os animais ou mergulhá-los em baldes de gasolina. No entanto, foi frequentemente proposto que outras fontes de peste, como parasitas humanos específicos infectados ou que picam humanos, como pulgas e piolhos, foram importantes para a transmissão na Europa durante a Terceira Pandemia. Os baixos números de ratos infectados com peste encontrados durante os surtos europeus sugerem que eles desempenharam um papel relativamente menor na transmissão da peste. No entanto, alguns pesquisadores argumentaram que as autoridades provavelmente não encontrariam ratos infectados com peste porque eles se esconderiam." #NT!
 panum.812.g: "Extermine os ratos." #NT!
 panum.812.h: "Isso é muito caro." #NT!
 panum.813.t: "Perda de confiança" #NT!
 panum.813.d: "Muitos moradores em [SCOPE.sState('panum_disease_state').GetName] acham a situação médica atual escandalosa. As muitas mortes e a falha óbvia do governo levaram a uma perda generalizada de confiança no governo." #NT!
 panum.813.f: "A epidemia de peste do século XIX causou um grande número de vítimas, principalmente na China, o que abalou severamente a confiança no governo e no Mandato Celestial dos imperadores Qing." #NT!
 panum.813.g: "Então faça sua bagunça sozinho!" #NT!
  
 panum.822.t: "A peste negra" #NT!
 panum.822.d: "Usando diversas fontes históricas, o Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu provar que a nova onda de peste é na verdade uma doença que corresponde à Peste Negra da Idade Média." #NT!
 panum.822.f: "A descoberta da propagação da peste na Índia teve um significado dominante na visão da peste em seu significado atual como uma doença moderna. Inicialmente, levou à visão de que havia apenas uma maneira de a doença se espalhar. A pesquisa agora se expandiu para incluir um grande número de roedores e um grande número de espécies de pulgas. A alta mortalidade nas colônias levou ao aumento dos esforços de pesquisa para mapear as características da epidemia. O fato de que sempre foi a peste não foi questionado como ponto de partida. A doença recebeu o termo histórico peste. A identidade da peste medieval com a peste pesquisada na Índia foi assumida." #NT!
 panum.823.t: "Época de peste" #NT!
 panum.823.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] examinou todos os registros. Seja nesta epidemia ou antes, seja no passado próximo ou distante: não há epidemias de peste no inverno. Por que isso acontece ainda não está claro, mas pode desempenhar um papel na busca pelas razões do surto da doença." #NT!
 panum.823.f: "'Assim termina este ano... É verdade que passamos por grande melancolia por causa da grande praga, e eu coloquei grandes encargos por ela, mantendo minha família por muito tempo em Woolwich, e eu e outra parte da minha família, meus funcionários, sob meus cuidados em Greenwich... Mas agora a praga diminuiu quase a nada... Mas muitos dos que eu conheço muito bem, morreram. No entanto, para nossa grande alegria, a cidade enche rapidamente, e as lojas começam a abrir novamente. Ore para que Deus continue a diminuir a praga - pois isso mantém a Corte longe do local de trabalho, e assim tudo vai para o ralo quanto aos assuntos públicos, eles a esta distância não pensam nisso.' - Samuel Pepys" #NT!
 panum.824.t: "Peste bubônica e peste pneumônica" #NT!
 panum.824.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu mostrar que existe mais de uma forma de peste." #NT!
 panum.824.f: "A peste é geralmente entendida como peste bubônica. O período de incubação é de algumas horas a sete dias. Os sintomas são febre, dor de cabeça e dores no corpo, uma forte sensação de mal-estar e tontura. Distúrbios de consciência ocorrem mais tarde. O nome peste bubônica vem dos caroços severamente inchados e muito dolorosos no pescoço, axilas e virilha. A peste pneumônica é significativamente mais rara. É provável que seja semelhante à gripe, embora sua capacidade de se espalhar seja muito mais fraca. A propagação é tão específica que só pode se tornar uma epidemia em circunstâncias particularmente favoráveis. Primeiro de tudo, as fontes de infecção são raras. Apenas uma pequena proporção da população infectada pela peste contrai peste pneumônica, por exemplo, no caso de peste bubônica e resistência fraca." #NT!
  
  
 panum.241.t: "O experimento do coelho" #NT!
 panum.241.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] surge com um experimento ousado que acabará provando a contagiosidade da tuberculose. É sobre inoculação. E é sobre muitos coelhinhos mortos." #NT!
 panum.241.f: "'Para meu primeiro experimento, comprei um par de coelhos fofos de três semanas de idade com o propósito de determinar a contagiosidade da tuberculose. Borrifei um deles com extrato tuberculítico do tecido de um paciente com tuberculose que havia morrido 33 horas antes. Repeti o procedimento duas vezes. Depois de alguns dias, dissequei os animais e descobri que o coelho estava infectado com tuberculose.\n\nUm mês depois, repeti o experimento com três lindos coelhinhos. Repeti o procedimento novamente, depois adicionando um coelho. Então, dissequei um dos coelhos a cada dia por quatro dias consecutivos. Todos eles sofriam de tuberculose, embora em quatro estágios diferentes da doença. Eu só havia inoculado o primeiro.\n\nNa minha terceira tentativa, adquiri quatro pares de coelhos jovens e fofos, de três meses de idade...'\n\nDo livreto experimental do Doutor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] 'A Causa e a Natureza da Tuberculose'" #NT!
 panum.241.g: "Parem com esses terríveis experimentos com animais!" #NT!
 panum.241.h: "Vamos repetir o experimento para ter certeza." #NT!
 panum.241.i: "Um terceiro experimento com coelhos para a ciência!" #NT!
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] pode matar tantos coelhos quanto possível para provar a teoria." #NT!
  
 panum.261.t: "Pneumotórax artificial" #NT!
 panum.261.d: "O Doutor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventou um dispositivo que colapsa artificialmente os pulmões e pode ajudar a combater a tuberculose." #NT!
 panum.261.f: "Com a ajuda de seu irmão, Carlo Forlanini projetou e construiu um dispositivo simples capaz de administrar gases intrapleuralmente. A presença de gás no fluido intrapleural causou o colapso do pulmão, criando, portanto, um pneumotórax artificial. Após ter construído o dispositivo, Forlanini tentou tratar dois casos de tuberculose induzindo um pneumotórax nos dois pacientes e obteve resultados positivos. Ao longo dos anos, a técnica de Forlanini foi desenvolvida e aprimorada, aumentando, portanto, a taxa de sucesso do procedimento. O pneumotórax artificial continuou como um tratamento até a introdução da estreptomicina." #NT!
 panum.262.t: "Toracoplastia" #NT!
 panum.262.d: "Graças às habilidades cirúrgicas do [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis], o Doutor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventou um procedimento que revolucionou a cirurgia pulmonar e, assim, permitiu um melhor tratamento de pacientes com tuberculose." #NT!
 panum.262.f: "Uma toracoplastia é um procedimento cirúrgico no qual costelas ou partes de costelas de um lado do tórax são removidas cirurgicamente para colapsar o pulmão ou partes do pulmão. Este procedimento remonta a Edouarde de Cérenville e era usado principalmente para tratar tuberculose pulmonar, mas depois se tornou cada vez menos importante com a introdução de antibióticos eficazes." #NT!
 panum.263.t: "O Doutor fez de novo!" #NT!
 panum.263.d: "Para provar mais uma vez a contagiosidade da tuberculose, o Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] matou novamente inúmeros coelhos fofos." #NT!
 panum.263.f: "'Dos quatro pares que adquiri desta vez, matei o primeiro animal do primeiro par imediatamente. Ele não apresentou nenhuma lesão nos pulmões.'\n\nDo livreto experimental do Doutor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] 'A Causa e a Natureza da Tuberculose'" #NT!
 panum.263.g: "Trata-se de salvar vidas humanas." #NT!
 panum.263.h: "Este médico tem um problema sério." #NT!
  
