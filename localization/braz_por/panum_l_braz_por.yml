 je_group_panum_medicine: "Morgenröte: #ORANGE Panum Medicine#!" #NT!
  
 je_panum_cholera: "Epidemia de cólera" #NT!
 je_panum_cholera_reason: "A cólera é considerada a pior epidemia do século XIX. Tem um significado semelhante para a era vitoriana como a praga na Idade Média. Ele se espalha mais rápido do que qualquer outra doença e vem em uma variedade mortal. Com essa tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para o cholera#!. Mesmo um sistema de saúde moderadamente bom ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. As capitais que um [concept_gaudi_architect] equipa com um sistema de esgoto moderno são, em princípio, protegidas dos surtos de cólera. \ N \ nin ordem para derrotar a cólera de uma vez por todas, é necessária uma vacina #V contra a cólera." #NT!
 je_panum_tuberculosis: "Epidemia de tuberculose" #NT!
 je_panum_tuberculosis_reason: "Juntamente com a cólera, a tuberculose foi uma das causas mais comuns de morte no século XIX. A 'morte branca' começou como uma doença romântica e, finalmente, tornou -se cada vez mais uma doença do proletariado. A tuberculose é limitada principalmente a alguns estados com baixos padrões de vida e alta urbanização. Com essa tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para tuberculose#!. Um bom sistema de saúde ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. Em casos raros, os resorts climáticos de saúde podem emergir como uma resposta à tuberculose, embora com resultados questionáveis ​​de cura." #NT!
 je_panum_smallpox: "Epidemia de varíola" #NT!
 je_panum_smallpox_reason: "A varíola é uma das grandes flagelos da humanidade que dizimou povos inteiros. Devido à variolação e à vacinação contra a varíola, perdeu seu terror no decorrer do século XVIII, mas sem precauções ainda pode mostrar sua face feia. Com esta tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para a varíola para a varíola. Já um sistema de saúde rudimentar ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. \ N \ nin A ordem para derrotar a varíola de uma vez por todas, é necessária uma vacina #V contra a varíola da varíola que é desenvolvida por um [concept_theiler_biologist]." #NT!
 je_panum_typhus: "Epidemia de tifo" #NT!
 je_panum_typhus_reason: "Embora o tifo seja conhecido desde o final da Idade Média, seus efeitos mais devastadores ocorreram durante as guerras napoleônicas. Portanto, manteve seu horror para as gerações após 1815. A febre tifóide pode se espalhar rapidamente para vários países. As regiões com alta devastação são particularmente afetadas. Portanto, é considerada uma doença clássica de guerra e afeta particularmente os soldados e seus quartéis apertados. Com essa tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para tifus _1. Já um sistema de saúde rudimentar ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. \ N \ nin a fim de derrotar o tifo de uma vez por todas, é necessária uma vacina #V contra o tifo_1 que é desenvolvido por um [concept_theiler_biologist]." #NT!
 je_panum_yellow_fever: "Epidemia de febre amarela" #NT!
 je_panum_yellow_fever_reason: "A febre amarela é uma doença regional que ocorre perto dos trópicos, mas no século XIX se espalhou para o sul dos EUA e da Europa. Geralmente, ele se espalha apenas em alguns estados, mas é preciso nada menos. Com essa tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para febril amarelo #!. Já um sistema de saúde rudimentar ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. \ N \ nin Ordem para derrotar a febre amarela de uma vez por todas, é necessária uma vacina #V contra a febre amarela §11 que é desenvolvida por um [concept_theiler_biologist]." #NT!
  
 panum.100.t: "A epidemia de cólera de [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.100.d: "#YELLOW Colera#!, Um dos piores flagelos da humanidade, se espalhou para uma de nossas cidades. Os tempos sombrios começaram. Devemos esperar que ele se espalhe pelo país - e tenha seu preço." #NT!
 panum.100.f: "A cólera, endêmica do leste da Ásia, provavelmente ocorreu no subcontinente indiano ao longo de vários séculos na forma de epidemias localizadas, mas era desconhecido em outros continentes. A primeira pandemia ocorreu entre 1817 e 1824 e as partes afetadas da Ásia, bem como a África Oriental e a Ásia Menor e, posteriormente, a Rússia e a Europa. Em 1830, apareceu no leste da Galiza e Hungria e em junho de 1831 em Viena. Ele sobrecarregou o mundo em um total de seis pandemias e se tornou o flagelo da emergente Sociedade Industrial. Embora a maioria das infecções (cerca de 85 %) seja assintomática, a taxa de mortalidade no início é entre 20 e 70 %, se a doença não for tratada." #NT!
 panum.100.g: "Grim Reaper está à nossa porta." #NT!
 panum.102.t: "A epidemia de cólera chega a [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.102.d: "Recebemos relatos de que os primeiros casos de cólera foram relatados no [SCOPE.sCountry('panum_infected_country').GetName] hoje. As autoridades nos culpam por não fazer o suficiente para impedir a propagação." #NT!
 panum.102.g: "Isso deveria ser nossa culpa ...?" #NT!
 panum.103.t: "Cólera em fábricas" #NT!
 panum.103.d: "Várias fábricas em [SCOPE.sState('panum_disease_state').GetName] relatam os primeiros casos de cólera entre os trabalhadores. As autoridades locais estão propondo regulamentação para combater o spread. Isso teria um grande impacto na indústria." #NT!
 panum.103.f: "O primeiro caso de cólera ocorreu na semana passada em um moinho de água nos arredores da cidade. Embora o edifício tenha sido em quarentena, houve incidentes adicionais a jusante em várias fabricações. Ainda não está completamente claro como a doença se espalhou, mas alguns políticos locais concordam que restrições difíceis devem ser usadas para recuperar a confiança perdida entre a população." #NT!
 panum.103.g: "Quarentena as fábricas!" #NT!
 panum.103.h: "As fábricas devem continuar a correr, a todo custo!" #NT!
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] contraiu a cólera!" #NT!
 panum.104.d: "Apenas alguns dias atrás, [SCOPE.sCharacter('disease_victim_scope').GetFullName] parecia completamente saudável, mas ontem à noite [SCOPE.sCharacter('disease_victim_scope').GetSheHe] mostrou os primeiros sintomas da terrível doença que varreu [ROOT.GetCountry.GetNameNoFlag]. [SCOPE.sCharacter('disease_victim_scope').GetHerHis|U] A saúde é deplorável." #NT!
 panum.104.f: "As duas primeiras ondas de cólera no século XIX também mataram pessoas famosas. Na Prússia, o filósofo Georg Friedrich Wilhelm Hegel e o general de August Neidhardt von Gneisenau morreram na epidemia de cólera de 1831. O compositor Pyotricric Ilyich tchaikovsky também é considerado uma vítima de cólera, embora as circunstâncias - conscientes ou não conscientes." #NT!
 panum.104.g: "Garanta o melhor tratamento possível!" #NT!
 panum.104.h: "Nosso melhor médico cuidará de [SCOPE.sCharacter('disease_victim_scope').GetHerHim] pessoalmente." #NT!
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U] não é tão importante ..." #NT!
 panum.105.t: "O êxodo dos ricos" #NT!
 panum.105.d: "A classe alta de [SCOPE.sState('panum_disease_state').GetName] usa seus recursos financeiros para deixar a área o mais rápido possível ou para escapar para o campo. Muitos subornos foram pagos para contornar os regulamentos de quarentena. As pessoas comuns veem esse desenvolvimento com desprezo." #NT!
 panum.105.f: "Uma das características da cólera foi que ele matou ricos e pobres, tornando -o como a praga da Idade Média. As famílias influentes e ricas, portanto, fizeram o possível para evitar a praga. A aristocracia viu a cólera como uma espécie de 'doença revolucionária' porque não fez distinção entre as classes. O LAX mede em relação à classe alta fez da cólera uma questão política devido a esses conflitos sociais. Freqüentemente foi afirmado que as epidemias da cólera do início da década de 1830 na Europa e os movimentos revolucionários estavam em um contexto." #NT!
 panum.105.g: "Deixe -os ir." #NT!
 panum.105.h: "Há um motivo que o chamamos de grande empate." #NT!
 panum.106.t: "Oposição tenta explorar a cólera" #NT!
 panum.106.d: "A oposição está usando a epidemia para liquidar as pontuações: acusa o governo de cometer grandes erros no combate à epidemia." #NT!
 panum.106.f: "Devido a suas implicações sociais e políticas, as epidemias da cólera eram uma área em que os liberais em particular poderiam culpar os conservadores. Medidas mais progressivas e novos métodos foram recomendados como uma alternativa à elite "atrasada". Não deve surpreender que esse corte entre conservadores e liberais tenha sido repetido em diferentes circunstâncias e com diferentes partidos." #NT!
 panum.106.g: "Você está certo, estamos errados. Agora vamos lutar contra a epidemia!" #NT!
 panum.106.h: "Este governo tem a situação perfeitamente sob controle." #NT!
 panum.107.t: "Graves em massa" #NT!
 panum.107.d: "As críticas às novas sepulturas em massa de cavado em [SCOPE.sState('panum_disease_state').GetName] estão crescendo. A classe baixa, em particular, vê o processo como um processo quase mecânico, em vez de cuidados adequados para os mortos." #NT!
 panum.107.f: "Após as mortes em massa e possíveis riscos de infecção, o enterro em massa dos mortos se tornou um fenômeno inevitável. O fato de os cidadãos mais ricos poderiam se dar ao luxo de ter um funeral no estilo usual, enquanto os corpos das pessoas pobres foram simplesmente enterrados, causou explosividade social." #NT!
 panum.107.g: "Não temos tempo a perder com os funerais!" #NT!
 panum.107.h: "Todo mundo merece um enterro digno." #NT!
 panum.108.t: "Hospitais de cólera" #NT!
 panum.108.d: "Vários partidos políticos, por meio de seus próprios interesses, decidiram estabelecer hospitais de cólera para cuidar da classe baixa. No entanto, eles não são muito populares." #NT!
 panum.108.f: "A construção de hospitalizações em massa durante epidemias como cólera ou tuberculose era frequentemente controversa. As famílias preferiram cuidar de seus doentes em casa, em vez de entregá -los ao anonimato, onde estavam amontoados em um pequeno espaço com outras pessoas doentes, e é por isso que muitos estavam convencidos de que ficariam doentes e morreriam lá. A acusação circulou de que era principalmente uma medida isolar os pobres dos ricos e, assim, proteger o último." #NT!
 panum.108.g: "Vencê -los nos hospitais, se for necessário!" #NT!
 panum.108.h: "Você não pode forçar esses bois teimosos a viver." #NT!
 panum.109.t: "Pânico público" #NT!
 panum.109.d: "Apesar dos melhores esforços do governo local em [SCOPE.sState('panum_disease_state').GetName], a população começou a sucumbir a uma das partes mais perigosas de qualquer surto: pânico." #NT!
 panum.109.f: "“É fácil pensar que estamos acima de qualquer outra besta nesta terra, mas retire o verniz da razão, e você descobre que o homem ainda é um animal, governado pelo medo e medo de um amanhã desconhecido. O surto e a disseminação de doenças podem encher o coração de tropas veteranas com terror, pois quem pode lutar com um inimigo que eles nem conseguem ver? Não, o terror pode mastigar seus corações e deixá -los vendo inimigos em todos os cantos, e onde há inimigos, há inimigos a serem travados. O homem doente, com pedras para mantê -las afastadas. Sussurros sobre aquela família que não saiu da porta deles. O homem quieto e honesto traz para casa uma arma, com medo de que a próxima batida na porta traga pegajosos roubos e assaltos, não ajuda. É o fim da ilusão: o homem é um animal e tem medo." #NT!
 panum.109.g: "Medo condenável! Como podemos ajudá -los se eles não verão o motivo?" #NT!
 panum.110.t: "Propósito comum" #NT!
 panum.110.d: "O surto de cólera em [SCOPE.sState('panum_disease_state').GetName] parece ter promovido um senso de unidade nacional, o povo da região se unindo para tentar combater o surto." #NT!
 panum.110.f: "'Uma ala de hospital é um lugar sombrio, pois é um lembrete de que vivemos em um mundo doentio. Mas essa doença não se importa com quem você é: não se importa com a religião que você mantém, para o mestre que você tem, para a cor da sua pele ou a política que você segura perto do seu coração. Olhe para a cama, e você veja um homem, uma mulher ou uma criança. Você vê Poeply, precisando de ajuda. Eles não se importam com quem o traz. Eles não se importam se o médico é um padre, ou um soldado, ou um homem que trabalha com comum que oferece o pouco tempo que ele tem que sobrar, em perigo para ajudar um estranho. Eles não olham para ele para ver um monarquista, ou um republicano, ou um agitador, ou qualquer outra coisa, além do que realmente é. Um irmão, um filho, um compatriota, mas acima de tudo, um companheiro." #NT!
 panum.110.g: "Estamos unidos contra a cólera!" #NT!
 panum.111.t: "O horror" #NT!
 panum.111.d: "As montanhas de cadáveres em [SCOPE.sState('panum_disease_state').GetName] agora estão se acumulando. Não há ninguém que não conheça pelo menos um conhecido que tenha sido infectado com cólera. A região tornou -se um epicentro da epidemia." #NT!
 panum.111.f: "Somente Berlim foi atingida por Cholera treze vezes em 42 anos entre 1831 e 1873. As epidemias de 1848/49, 1852, 1855 e 1866 foram particularmente graves em toda a Prússia. No último caso, 114.683 pessoas morreram oficialmente de cólera. Um surto de cólera em Londres em 1848/1849 foi muito mais sério do que o surto de cólera em 1832/1832. Durante esse surto, 15.000 pessoas morreram em Londres, mais de 0,5 % de uma população da cidade na época de cerca de 2,5 milhões. Na primeira semana de setembro de 1849, 300 pessoas morreram por dia. Na terceira pandemia entre 1852 e 1860, cerca de um milhão de pessoas morreram na Rússia, o que foi facilitado pela Guerra da Crimeia que estava ocorrendo ao mesmo tempo. O comandante em chefe britânico, Lord Raglan, e o comandante da frota francesa, Armand Joseph Bruat, morreram da doença. Acredita -se que mais pessoas mortassem de cólera do que por lutar." #NT!
 panum.111.g: "Quantos mais mortos?!" #NT!
  
 panum.120.t: "Epidemia de cólera termina" #NT!
 panum.120.d: "Todo o [ROOT.GetCountry.GetNameNoFlag] está respirando um suspiro de alívio: as autoridades acabaram de relatar que não há mais casos de cólera na última área da doença. O estado de emergência acabou. Agora é hora de contar os mortos e retornar à normalidade." #NT!
 panum.120.f: "'Que Deus esteja comigo! Que o céu abençoe este ano novo. Que seja um ano de fecundidade, de paz e prosperidade; Que seja um ano de paz e unidade para toda a humanidade; Que o mundo seja libertado da cólera. -Giacomo Meyerberr" #NT!
 panum.120.g: "Mas a que custo?" #NT!
  
 panum.200.t: "Epidemia de tuberculose" #NT!
 panum.200.d: "None" #NT!
 panum.200.f: "No início da Idade Média, a tuberculose desempenhou um papel menor na Europa devido à população escassa. Foi apenas mais fortemente representado nas poucas áreas metropolitanas. Após um surto anterior na Itália na segunda metade do século XV, a maior e mais longa onda de tuberculose da história começou no século XVII. A tuberculose ganhou interesse generalizado nos séculos XIX e início do século XX como a doença endêmica dos pobres urbanos. Em 1815, um quarto de mortes na Inglaterra e em 1918 na França, uma sexta das mortes foi causada por tuberculose. Por volta de 1880, cada segunda morte na Alemanha na faixa etária de 15 a 40 anos se deve a esta doença. A tuberculose também foi a causa mais comum de morte nas áreas rurais." #NT!
 panum.200.g: "Há pelo menos tempo para uma morte romântica?" #NT!
  
 panum.220.t: "Epidemia de tuberculose extremas" #NT!
 panum.220.d: "A cidade e os médicos rurais relatam que o zênite dos casos de tuberculose já foi aprovado há algumas semanas. Embora a doença não tenha desaparecido completamente, está de volta dentro dos limites usuais." #NT!
 panum.220.f: ""Não posso ser enganado nessa cor; essa gota de sangue é minha guerreira da morte; \ n eu devo morrer." -John Keats" #NT!
  
 panum.300.t: "Epidemia de varíola" #NT!
 panum.300.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW MEDLEPOX#! está devastando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.300.f: "A varíola provavelmente é conhecida há milhares de anos e apareceu nos primeiros assentamentos no nordeste da África há 12.000 anos. De lá, eles podem ter sido trazidos para a Índia por comerciantes egípcios. Os conquistadores europeus trouxeram a varíola para a América, onde causou epidemias devastadoras entre os índios a partir de 1518, causando milhões de mortes. Na Europa, a varíola às vezes era considerada uma doença na infância, e a doença, da qual até 10% de todas as crianças pequenas morreram até o final do século 18, também eram chamadas de "doença das crianças". A partir do século XVIII, os casos de varíola aumentaram e substituíram a praga como a pior doença. Estima -se que 400.000 pessoas morriam de varíola a cada ano, e um terço dos que sobreviveram ficou cego. Muitas vezes, as crianças eram consideradas apenas parte da família depois de sobreviveram à varíola. Apesar da introdução bem -sucedida da vacinação de varíola por volta de 1800, a varíola permaneceu uma doença epidêmica até a segunda metade do século." #NT!
 panum.300.g: "Os produtos cosméticos em breve se tornarão populares, presumo." #NT!
  
 panum.320.t: "Extremidades epidêmicas da varíola" #NT!
 panum.320.d: "A terrível varíola, uma das piores pragas da humanidade, está lentamente desaparecendo de [ROOT.GetCountry.GetNameNoFlag]. Aqueles que sobreviveram estão marcados por toda a vida." #NT!
 panum.320.f: ""As nações futuras saberão apenas pela história que a varíola repugnante já existe e por você foi extirpada." -Thomas Jefferson" #NT!
  
 panum.400.t: "Epidemia de tifo" #NT!
 panum.400.d: "Uma epidemia começou em um de nossos estados: #YELLOW typhus#! está devastando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.400.f: "A febre do tifo, que provavelmente existia nos tempos antigos, mas foi descrita apenas com segurança no século XVI, apareceu principalmente como uma epidemia típica de guerra e miséria. Tifo se tornou um problema sério para o exército de Napoleão durante a campanha russa. Quando o Grande Armée, que se mudou para a Rússia em junho de 1812, retirou -se no outono de 1813, Mainz foi a primeira parada em solo francês. 15.000-17.000 tripulantes franceses e muitos civis morreram lá. A doença, que também era chamada de "febre nervosa" por causa dos sintomas neurológicos que causou, permaneceu no idioma francês como tifo de mayence. No final de outubro de 1814, 14.000 casos de tifo haviam sido registrados na área franconiana em torno do Grande Ducado de Würzburg, dos quais 2.500 eram fatais. Outra epidemia com cerca de dois milhões e meio de mortes ocorreu como resultado da guerra e da guerra civil entre 1918 e 1922 na Rússia." #NT!
 panum.400.g: "Talvez trocar de roupa?" #NT!
  
 panum.420.t: "Epidemia de tifo termina" #NT!
 panum.420.d: "Parece que a pior fase do tifo epidêmico acabou. Embora a contagem de corpos ainda não tenha sido concluída, já está claro que ninguém pode ser responsabilizado por esse terrível surto." #NT!
 panum.420.f: "'Os únicos pacientes em inglês que eu já conheci com chá de lixo foram casos de tifo; E o primeiro sinal de que melhoram foi o desejo deles novamente para o chá. -Florence Nightingale" #NT!
  
 panum.500.t: "Epidemia de febre amarela" #NT!
 panum.500.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW Amarelo Fever#! está devastando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.500.f: "A febre amarela é endêmica para áreas tropicais e subtropicais na América do Sul e na África. Nos séculos XVIII e XIX, a América Central, o Caribe e o sul do que agora é os EUA também foram afetados. A doença provavelmente se originou na África e alcançou o Novo Mundo através do comércio triangular do Atlântico. O primeiro surto provável da doença ocorreu em Yucatan em 1648, onde a doença foi chamada de Xekik (vômito preto). Pelo menos 25 grandes surtos se seguiram, como na Filadélfia em 1793, na qual vários milhares de pessoas morreram e o governo americano e então o presidente George Washington foram forçados a deixar a cidade. Uma das primeiras descrições médicas de febre amarela na América do Norte foi de John Lining (1756), um médico em Charleston, onde a febre amarela ocorreu em 1728 e 1732. Os surtos ocasionais também foram registrados na Europa, por exemplo, em Barcelona, ​​em 1821, com vários milhares de mortes. Em 1867, houve uma erupção em Fort Jefferson, na Flórida. Em 1878, uma erupção no vale do Mississippi matou 20.000 pessoas, e a última erupção nos Estados Unidos foi em Nova Orleans em 1905." #NT!
 panum.500.g: "A fruta estragada é culpada?" #NT!
  
 panum.520.t: "Epidemia de febre amarela termina" #NT!
 panum.520.d: "Depois de ruas e famílias inteiras foram eliminadas pela insidiosa febre amarela, os médicos e as autoridades dão o tempo todo: a epidemia finalmente acabou." #NT!
 panum.520.f: ""É chamado de febre amarela, mas não é como nada conhecido ou lido pelos médicos." -Thomas Jefferson" #NT!
  
  ### 2.2.3c ### 
  
 building_panum_tuberculosis_sanatorium: "Sanatório de tuberculose" #NT!
 pmg_panum_sanatorium: "Sanatório de tuberculose" #NT!
 pm_panum_sanatorium: "Sanatório de tuberculose" #NT!
 building_panum_tuberculosis_sanatorium_tt: "Um sanatório de tuberculose pode ser fundado após uma epidemia de tuberculose em áreas com montanhas. #R é ativado apenas via evento.#!" #NT!
  
 panum_tuberculosis: "Tuberculose" #NT!
 panum_tuberculosis_desc: "A tuberculose, também conhecida como 'morte branca', foi uma das principais causas de morte na era vitoriana." #NT!
  
 panum_forbidden_spitting_modifier: "Proibição de cuspir" #NT!
 panum_tuberculosis_quarantine_modifier: "Tuberculose Quarentena" #NT!
 panum_tuberculosis_sanatorium_cost_modifier: "Custo de sanatório" #NT!
 panum_help_against_tuberculosis_modifier: "Ajuda contra tuberculose" #NT!
 panum_praised_for_tuberculosis_initiative_modifier: "Elogiado pelo discurso de tuberculose" #NT!
 panum_supports_health_care_initiative_modifier: "Apoia a iniciativa de saúde" #NT!
 panum_opposes_health_care_initiative_modifier: "Se opõe à iniciativa de saúde" #NT!
 panum_tuberculosis_hospital_modifier: "Hospital de Tuberculose" #NT!
  
 panum.201.t: "A tuberculose se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.201.d: "A epidemia de tuberculose se espalhou, apesar dos nossos melhores esforços. Agora também está furioso em [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.201.g: "A morte branca parece imparável." #NT!
 panum.202.t: "Uma doença hereditária?" #NT!
 panum.202.d: "Apesar de todos os exames médicos, a origem da tuberculose ainda continua sendo uma área controversa. Alguns de nossos funcionários médicos assumem que esta é uma doença hereditária, ou pelo menos uma baseada em 'fatores internos'. Outros médicos são da opinião de que é uma doença clássica e contagiosa e recomendam medidas radicais." #NT!
 panum.202.f: "Em relação ao conceito de patogênese, diferentes tradições existiam nos países europeus dos séculos XVIII e XIX. Muitos autores médicos da época consideraram a tuberculose, ou consumo, que nem sempre era sinônimo, para ser o pior das epidemias conhecidas na época. Eles viram as causas como uma distribuição desigual de humores corporais, exalações ameaçadoras do solo, urbanização ou declínio dos costumes. Na Itália, por outro lado, havia uma tendência tradicional em relação a um contagioso, isto é, h. Causa transmissível. Consequentemente, em meados do século XVIII, a República de Veneza introduziu a obrigação por escrito de relatar casos de phthisis (consumo devido à tuberculose pulmonar). Os pertences pessoais daqueles que morreram da doença foram queimados para reduzir o risco de infecção. Na Inglaterra e nos países nórdicos, no entanto, acreditava -se geralmente que a doença era devida a uma causa hereditária." #NT!
 panum.202.g: "É uma doença hereditária e não há nada que possamos fazer." #NT!
 panum.202.h: "É uma doença contagiosa e devemos fazer tudo o que pudermos para impedir que ela se espalhe!" #NT!
 panum.203.t: "Cuspindo nas ruas" #NT!
 panum.203.d: "Devido à falta de conhecimento sobre as causas da tuberculose, as medidas também foram controversas. Aqueles que assumiram uma causa contagiosa defendiam proibições radicais - incluindo cuspir em áreas públicas - para impedir a propagação. Isso afetou particularmente as classes mais baixas. Os céticos viram regulamentos como apenas uma maneira de assediar pessoas comuns." #NT!
 panum.203.f: "Mesmo que as regras de etiqueta do século XVIII erradizassem alguns "maus hábitos" na classe alta e média, muitas peculiaridades higienicamente duvidosas permaneceram generalizadas entre as massas por um longo tempo. Os lenços e as espanholas ainda não haviam se tornado difundidas na sociedade no início do século XIX, e foi apenas na virada do século que se tornou prática comum proibir cuspir no transporte público, por exemplo." #NT!
 panum.203.g: "Proibir esse hábito repugnante!" #NT!
 panum.203.h: "Anuncie uma proibição draconiana e faça os malfeitores pagarem!" #NT!
 panum.203.i: "O cuspir é uma natureza humana que não pode ser banida." #NT!
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] contraiu a tuberculose!" #NT!
 panum.204.d: "A epidemia de tuberculose também afetou nosso artista [SCOPE.sCharacter('disease_victim_scope').GetFullName]! Surpreendentemente, [SCOPE.sCharacter('disease_victim_scope').GetSheHe] não o vê como o pior golpe de destino." #NT!
 panum.204.f: "No início do século XIX, mas também muito além, a tuberculose era considerada uma 'doença romântica'. Isso deu à vítima tempo suficiente para se preparar para a morte, e muitos viram a palidez associada como nada menos que nobre. Os escritores criaram monumentos para ela com vários trabalhos, como Dumas, o mais jovem, com a 'dama das camélias'. Ela encontra transfiguração semelhante nas óperas de Verdi (La Traviata) e Puccini (La Bohème). Diz -se que George Sand, parceiro de Chopin, observou: 'Chopin tosse com graça infinita'." #NT!
 panum.204.i: "Não seria uma ocasião inspiradora para um requiem?" #NT!
 panum.204.j: "Mas a tuberculose não sempre foi objeto de escritores?" #NT!
 panum.204.k: "Mas essa mesma doença não incentiva a visualizar a miséria?" #NT!
 panum.205.t: "Sanatório de tuberculose" #NT!
 panum.205.d: "Em vista da epidemia de tuberculose em [SCOPE.sState('panum_disease_state').GetName], um dos médicos de lá sugeriu que alguns pacientes ricos fossem transferidos para as montanhas. Diz -se que o clima de alta altitude e o ar de limpeza os curam da doença. Deve haver um sanatório pulmonar dedicado para esse fim. [SCOPE.sState('panum_davos_scope').GetName] parece ser o lugar perfeito para um sanatório." #NT!
 panum.205.f: "A cura do ar é uma forma de terapia climática que foi considerada a terapia padrão para a tuberculose por um longo tempo a partir do século XIX. Os pacientes estavam em cadeiras de convés ao ar livre ou em lounges abertos por várias horas por dia. O tratamento aéreo foi realizado em sanatórios pulmonares especiais. Na Alemanha, o médico Hermann Brehmer foi o primeiro a descrever a tuberculose de doenças anteriormente incuráveis ​​como curável com a ajuda da terapia aérea. Em 1856, ele escreveu sua dissertação sobre a curabilidade da tuberculose crônica dos pulmões. Ele assumiu que existem 'lugares imunes' que, por um lado, devido ao seu clima, protegem efetivamente os moradores da ocorrência de tuberculose e, por outro lado, têm um efeito de cura após a quebra da doença. Na Suíça, o médico nascido em alemão Alexander Spengler foi pioneiro em terapia aérea. Ele começou a praticar como médico do país em Davos em 1853 e logo chegou à conclusão de que os moradores da área geralmente não sofriam de tuberculose, que ele atribuiu ao clima de alta montanha. Thomas Mann glorificou Davos como um resort climático de saúde em seu 'Zaubberberg'." #NT!
 panum.205.g: "Construa um sanatório em [SCOPE.sState('panum_davos_scope').GetName]!" #NT!
 panum.205.h: "Tudo isso é apenas uma charlatanry luxuosa." #NT!
 panum.206.t: "A doença dos proletários" #NT!
 panum.206.d: "A epidemia de tuberculose em [SCOPE.sState('panum_disease_state').GetName] atinge a classe mais baixa mais difícil. [SCOPE.sCharacter('union_leader').GetFullName], portanto, criticou particularmente as condições atuais e pediu mudanças de longo alcance." #NT!
 panum.206.f: "A tuberculose ganhou interesse generalizado nos séculos XIX e início do século XX como a doença endêmica dos pobres urbanos. Em 1815, um quarto de mortes na Inglaterra e em 1918 na França, uma sexta das mortes foi causada por tuberculose. Por volta de 1880, cada segunda morte na Alemanha na faixa etária de 15 a 40 anos se deve a esta doença." #NT!
 panum.206.g: "Talvez os pobres devam se lavar mais?" #NT!
 panum.206.h: "Melhorias seletivas nessa área são justificadas." #NT!
 panum.206.i: "A questão dos cuidados de saúde é uma questão nacional." #NT!
 panum.206.j: "Aplausos para esta iniciativa!" #NT!
 panum.207.t: "Iniciativa religiosa" #NT!
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] defendeu pessoalmente as muitas pessoas doentes em [SCOPE.sState('panum_disease_state').GetName]. [SCOPE.sCharacter('devout_leader').GetSheHe|U] gostaria de montar um hospital sem fins lucrativos em breve." #NT!
 panum.207.f: ""Dificilmente permanece um país onde, de uma maneira ou de outra, a luta contra a tuberculose não foi adotada, e é extraordinariamente gratificante ver como a campanha agora é travada de maneira geral e com considerável vigor contra esse inimigo perigoso". -Robert Koch" #NT!
 panum.207.g: "Esses contadores de histórias estão apenas tentando ganhar influência!" #NT!
 panum.208.t: "A Praga Branca cobra seu pedágio" #NT!
 panum.208.d: "O surto de tuberculose em [SCOPE.sState('panum_disease_state').GetName] piorou. O número de pessoas doentes e mortas está aumentando todos os dias. Nenhum dos médicos esperava esse desenvolvimento." #NT!
 panum.208.f: "'Como estou pálida! - Eu gostaria, eu acho, morrer de consumo ... porque então as mulheres diziam: 'Veja aquele pobre Byron - como ele parece interessante ao morrer!' -Lord byron" #NT!
 panum.208.g: "Isso nunca vai acabar?" #NT!
  
  ### 2.2.4 ### 
  
