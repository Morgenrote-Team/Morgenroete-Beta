 je_panum_germ_theory: "Germes e Miasma" #NT!
 je_panum_germ_theory_reason: "Hipócrates de Kos é considerado o fundador da teoria dos miasmas, as exalações tóxicas do solo que são levadas pelo ar e, portanto, contribuem para a disseminação de doenças. No século XIX, devido à falta de conhecimento sobre bactérias e vírus, médicos e pesquisadores simplesmente atribuíram epidemias como a cólera a maus cheiros que eram disseminados por meio de "miasmas". Essa teoria mais tarde provou ser um caminho errado na medicina, embora o modelo do miasma já explicasse parcialmente de onde as epidemias vêm e como elas se espalham. O conflito entre os contagionistas, que alegavam infecção de humano para humano, e os anticontagionistas, os defensores da teoria do miasma, foi amargo às vezes em meados do século XIX. As fraquezas do modelo de miasma foram reconhecidas em Londres, embora as regras improvisadas para lidar com miasmas, como limpeza e isolamento, limitassem as epidemias até certo ponto.\n\nSe uma nação encontrar evidências suficientes a favor da teoria dos germes e contra a teoria dos miasmas, então essa mudança de paradigma permitirá menos eventos negativos na busca por métodos de tratamento ou em epidemias. O primeiro descobridor da teoria dos germes recebe um bônus de pesquisa adicional." #NT!
 je_panum_germ_theory_success: "[GetPlayer.GetName] coletou pelo menos #V 20 Peças de Evidência#! para refutar a Teoria dos Germes e refutar a Teoria do Miasma." #NT!
 je_panum_germ_theory_goal: ""
  
 notification_panum_germ_theory_notification_name: "Avanço da teoria dos germes" #NT!
 notification_panum_germ_theory_notification_desc: "Um [concept_panum_physician] de [GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName] foi, pela primeira vez, capaz de substanciar conclusivamente a teoria dos germes em todas as suas facetas. A teoria do miasma foi completamente rejeitada." #NT!
  
 panum.11.t: "A Teoria dos Germes" #NT!
 panum.11.d: "Dada a evidência esmagadora para a teoria dos germes, e a evidência igualmente esmagadora contra a teoria do miasma, ocorreu uma mudança de paradigma médico. Não é menos graças ao Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] que a teoria dos germes agora se estabeleceu." #NT!
 panum.11.f: "A teoria do miasma é um exemplo típico de uma tese científica difícil de refutar, pois é presumivelmente confirmada em todos os lugares. O fato de que as regulamentações de limpeza e higiene para "ar limpo" garantiram que algumas doenças realmente desaparecessem parecia ter sido confirmado no século XIX. Ao mesmo tempo, impediu a ciência médica de fazer avanços em uma ampla variedade de campos porque as verdadeiras causas e, portanto, os métodos de cura reais permaneceram desconhecidos. De agora em diante, os médicos terão maior sucesso em encontrar métodos de tratamento - e o caminho está livre para pesquisas sobre patógenos e vacinas." #NT!
 panum.11.g: "Mas será que realmente queríamos saber o que acontece na água...?" #NT!
  
 panum.53.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viaja para o estado epidêmico" #NT!
 panum.53.d: "A epidemia galopante levou [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] a investigar o estado de [SCOPE.sState('panum_disease_state').GetName] mais de perto para determinar as causas e desenvolver novos métodos para tratar a terrível doença." #NT!
 panum.53.f: "Os métodos de tratamento são o passo mais importante no combate a uma doença. É a base para uma possível vacina futura que pode prevenir uma epidemia. No entanto, mesmo um método de tratamento bem-sucedido é forte o suficiente para conter epidemias futuras e minimizar sua duração e gravidade - o que resulta em um número significativamente menor de vítimas. Médicos que estudam uma epidemia em seu próprio país trabalham de forma mais eficaz do que médicos em uma viagem ao exterior." #NT!
 panum.53.g: "Esse horror tem que acabar!" #NT!
  
 panum.54.t: "Expedição de Pesquisa Médica" #NT!
 panum.54.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] reuniu uma pequena equipe de especialistas e assistentes que são adequados para estudar intensivamente uma epidemia no exterior e possivelmente desenvolver um novo método de tratamento. A questão que surge agora é qual doença deve ser observada em qual país." #NT!
  
