 panum.440.t: "Tifo - Um Problema Social" #NT!
 panum.440.d: "Em seu tratado [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')], o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enfatizou particularmente o fato de que o tifo é uma doença prevenível quando forças políticas e sociais trabalham juntas." #NT!
 panum.440.f: "'Condições apertadas, roupas cheias de piolhos e apartamentos ou quartos de soldados decadentes apresentaram uma imagem memorável para mim. A febre tifoide estava em todos os lugares. Onde quer que as pessoas vivessem nas mesmas condições apertadas, mas sob as condições higiênicas do quarto do hospital, nenhuma disseminação podia ser observada. A medicina não deve ser pensada como cuidado do indivíduo, mas sim em termos de saúde pública, o que também implica resolver problemas sociais. Não pode haver dúvida de que tal disseminação epidêmica de tifo como a que vimos recentemente ocorreu apenas em condições de vida como pobreza e falta de educação. Tire essas circunstâncias e tenho certeza de que veremos melhorias significativas na luta contra a doença.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] em seu memorando ao governo" #NT!
 panum.440.g: "O tifo está perdendo seu terror." #NT!
  
 panum.441.t: "Uma autópsia" #NT!
 panum.441.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realizou várias autópsias em mortes por tifo no [SCOPE.sState('panum_disease_state').GetCityHubName] e fez descobertas cruciais." #NT!
 panum.441.f: "'Há muito se sabe que a febre tifoide e o tifo são duas doenças diferentes. Mas ainda há alguns pesquisadores que acreditam que a má nutrição, uma infecção do trato intestinal ou pelo menos uma deficiência nutricional podem estar relacionadas ao surto de tifo. Razões alimentares ainda são consideradas uma possível causa de muitas doenças. Durante meus exames, não encontrei nada que de alguma forma sugerisse um distúrbio digestivo. A febre tifoide não tem nada a ver com dieta ou digestão.'\n\nDe um relatório de autópsia do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.441.g: "Mas o que poderia ser?" #NT!
 panum.442.t: "Não lavado e emaranhado" #NT!
 panum.442.d: "Na busca pela causa da epidemia de tifo, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] percebeu que descobertas anteriores precisavam ser questionadas." #NT!
 panum.442.f: "'Já ouvi várias vezes na minha carreira que a falta de higiene é uma forma de miasma ou germes - o que quer que as pessoas acreditem - se instalarem nas roupas e contribuírem para doenças. Acho que isso é questionável em detalhes, mas não na declaração básica. Soldados, condenados, pobres, criminosos e prostitutas estão entre as vítimas clássicas da epidemia de tifo. Mas os pobres não lavados são pobres porque querem ser não lavados, ou não é o caso de que eles são não lavados porque são pobres? Não quero acreditar que a tuberculose seja uma doença de artista, assim como o tifo não afeta apenas criminosos porque são moralmente perversos. Existem vários criminosos ricos que não foram afetados pelo tifo nesta epidemia. Existem padres inocentes nas favelas que se sacrificam pelos outros e que sucumbem à doença. Então, qual é a conexão mais convincente entre as vítimas?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.442.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] está tentando afirmar que o tifo também pode afetar pessoas honestas?" #NT!
 panum.443.t: "Calor e Frio" #NT!
 panum.443.d: "Após várias visitas às casas de famílias que sofrem de tifo, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] chega à conclusão de que não se trata, como muitas vezes se afirma, de uma doença sazonal." #NT!
 panum.443.f: "'Existem doenças sazonais e este parece ser o caso do tifo também. Relatórios anteriores indicam um aumento nas estações mais frias, que também podem incluir uma primavera ou outono chuvoso. Acho que foi provado que o frio e o calor têm influência na doença. Se depende das estações é questionável. Pode ficar tão quente em uma sala aquecida e bem apertada. A doença não ocorreu em todos os lugares na mesma época do ano. Se fosse esse o caso, não apenas certas áreas de uma cidade, mas a cidade inteira teria que ser igualmente afetada. Mas sempre apareceu onde as pessoas estavam aglomeradas. Consegui determinar isso durante várias visitas domiciliares.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.443.g: "Isso contradiz estudos anteriores." #NT!
 panum.444.t: "Suor e respiração" #NT!
 panum.444.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está agora completamente convencido de que o tifo deve ser uma doença contagiosa, mesmo que todas as circunstâncias ainda não tenham sido esclarecidas." #NT!
 panum.444.f: "'No início da minha investigação, eu estava firmemente convencido de que o tifo não era uma doença contagiosa. À medida que minha família com tifo aumentava, no entanto, passei a acreditar firmemente no contágio da doença e enfatizo a natureza contaminante do suor. Vi um enfermeiro que, enquanto barbeava um paciente moribundo, inalou o hálito do paciente. O enfermeiro descreveu o hálito do paciente como tendo 'um gosto nauseante' e quase imediatamente adoeceu. Da mesma forma, um assistente estava dando suporte a outro paciente que morreu logo depois, ele sentiu o suor pungente do paciente em sua pele e o assistente foi imediatamente tomado pelos sintomas do tifo. É claro que a proximidade com pacientes com tifo coloca a pessoa em risco de contrair a doença.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.444.g: "Isso pode ser útil, mas será que realmente é transmitido de pessoa para pessoa?" #NT!
 panum.445.t: "É fome?" #NT!
 panum.445.d: "Em uma disputa acalorada com um colega do [SCOPE.sState('panum_disease_state').GetCityHubName], o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] refutou suas teorias." #NT!
 panum.445.f: "'É um tipo especial de tifo, tifo de fome.'\n\n'Tifo de fome?'\n\n'Pode-se observar que onde quer que ocorra tifo, a desnutrição prevalece. Consequentemente, a fome, ou melhor, a fome, é um gatilho para o tifo. Mudanças no sangue provavelmente também têm algo a ver com isso.'\n\n'1726, 1727 e 1728 foram anos de fome, mas não houve tifo. 1829 foi um ano próspero, mas houve tifo. É compreensível que um corpo enfraquecido tenha mais probabilidade de ficar doente - mas a causa?'" #NT!
 panum.445.g: "O termo "febre da fome" é, portanto, incorreto." #NT!
 panum.446.t: "Não a localização, mas a situação" #NT!
 panum.446.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] acredita que o [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] descobriu que o que importa não é tanto como as pessoas com tifo vivem, mas onde elas vivem." #NT!
 panum.446.f: "'Durante minha visita a [SCOPE.sState('panum_disease_state').GetCityHubName], descobri que toda a doença afetava apenas uma parte da cidade. A área é conhecida por sua pobreza e depravação moral, o que apoiou algumas teorias de que o tifo é uma doença de indivíduos moralmente inferiores. Mas, até onde posso dizer, é o bairro densamente povoado e a situação econômica dos afetados. Na minha opinião, espalhar a doença não é sobre corrupção moral, mas proximidade física.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.446.g: "Isto pelo menos significa que a doença pode teoricamente ser superada..." #NT!
 panum.447.t: "Piolhos" #NT!
 panum.447.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] apresentou uma teoria altamente controversa que, embora o [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não possa prová-la, pode mudar a compreensão da doença do tifo no futuro." #NT!
 panum.447.f: "'Se há uma coisa que notei em minhas muitas observações, foi que quase todos os pacientes estavam em um estado infestado de piolhos. Sejam os soldados nos quartéis superlotados, as famílias com seus inúmeros filhos, os condenados em suas celas decadentes. Não acredito mais que isso seja uma coincidência. Claro, não tenho evidências. Nos últimos anos, vários cientistas conseguiram provar repetidamente que doenças podem ser transmitidas entre animais e humanos. Se for diferente nesta situação, ficaria feliz em ser provado o contrário. Por enquanto, acredito que o mistério do tifo não pode ser resolvido sem olhar mais de perto o papel dos piolhos.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.447.g: "Como algo tão pequeno pode causar tanta devastação?" #NT!
 panum.447.h: "Algo tão pequeno deve causar tanta devastação." #NT!
 panum.448.t: "Um hospital higiênico" #NT!
 panum.448.d: "Durante uma visita a um hospital exemplar, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu convencer [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] de que a transmissão da doença é mínima apenas em condições favoráveis." #NT!
 panum.448.f: "'Quando os doentes começaram a ser levados para hospitais aqui e ali, havia o medo de que a situação pudesse piorar devido a uma possível infecção. Supunha-se que novas fontes de infecção poderiam se formar, das quais a epidemia atacaria com violência ainda maior. Nada disso aconteceu, embora tal efeito tenha sido observado em muitos abrigos de febre. Como observei em outros casos, as condições higiênicas mais favoráveis ​​fizeram a diferença.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.448.g: "Então não é a estreiteza em si, mas as condições." #NT!
 panum.449.t: "Assistência Epidêmica" #NT!
 panum.449.d: "Ao entregar comida, cobertores e remédios ao [SCOPE.sState('panum_disease_state').GetCityHubName], o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu garantir que a epidemia diminuísse um pouco." #NT!
 panum.449.f: "'Pode parecer banal, mas com um carregamento de produtos destinados a aliviar a miséria dos moradores, os surtos de doenças caíram na semana passada. Algo semelhante já havia sido observado em outras áreas onde o tifo havia devastado no passado. Trabalhadores humanitários distribuíram arroz e ervilhas, construíram hospitais de tendas improvisados ​​e também trouxeram remédios e roupas novas. O caso prova isso acima de tudo: o tifo não é uma doença hereditária. Definitivamente depende de fatores ambientais.'\n\nUma carta do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] para o Dr. Dementive" #NT!
 panum.449.g: "Às vezes, a única maneira de abordar uma solução é usar critérios de exclusão." #NT!
 panum.450.t: "Roupas contaminadas?" #NT!
 panum.450.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notou um caso estranho em um galpão de febre que corresponde a experiências semelhantes." #NT!
 panum.450.f: "'Isso é evidência de um suposto contágio? Não há dúvida de que este caso corresponde a experiências muito semelhantes que tive em outros lugares. Às vezes são casacos, às vezes jaquetas ou camisas. Um sofredor de tifo tinha um irmão que pegou seu casaco. Poucos dias depois, ele também estava doente. Dizem que crianças que brincaram com o casaco foram infectadas de forma semelhante. Nas classes mais pobres, é bastante comum passar roupas de parentes, especialmente nas estações frias. Estejam as roupas contaminadas ou não, trocar de roupa parece ser uma das medidas sensatas para evitar o tifo.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.450.g: "Os homens devem trocar suas meias e roupas íntimas? Impossível!" #NT!
  
 panum.451.t: "Clima de tifo" #NT!
 panum.451.d: "Depois que um médico estrangeiro apresentou uma nova hipótese sobre as origens do tifo, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] duvida [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] de sua própria pesquisa." #NT!
 panum.451.f: "'Um 'colega' me enviou seu volume sobre as causas do tifo há dois dias. Estou bastante surpreso, para não dizer desmotivado. Ele formulou de forma muito precisa e rigorosa como o clima e as condições climáticas estão relacionados ao desenvolvimento da doença. Consequentemente, o miasma se forma quando há umidade na terra e então sobe para o ar. Isso explicaria a ocorrência frequente de tifo em meses frios e úmidos. Então, é miasma, afinal?'\n\nDo diário de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.451.g: "Mas essa é realmente a solução certa?" #NT!
 panum.452.t: "Putrefação" #NT!
 panum.452.d: "Algumas das descobertas que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] resumiu recentemente simplesmente não se encaixam com a teoria anterior do [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.452.f: "'Até agora, não pensei muito na teoria de que processos putrefativos desempenham um papel crucial na disseminação de doenças. Mas onde quer que eu vá, onde quer que o tifo esteja se alastrando, encontro animais, encontro exalações, encontro material humano, animal e vegetal. Poderia realmente se dissolver e deixar para trás miasma - ou talvez venenos?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.452.g: "Um contratempo desagradável." #NT!
 panum.453.t: "Correntes de ar negativas" #NT!
 panum.453.d: "Uma publicação de um reconhecido médico alemão abala o progresso do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] até agora. Portanto, foi provado que as correntes de ar são responsáveis ​​pela ocorrência do tifo." #NT!
 panum.453.f: "'Tal ar quente e úmido pode ser transportado por uma corrente de ar equatorial para latitudes do norte e então veremos o tifo irrompendo sob o domínio dos ventos do sul e do oeste em estações relativamente quentes. Tal relação deve ser mais excelente no verão, quando o sol está em sua posição norte, as margens do Mediterrâneo estão incluídas na extensão dos ventos alísios e em nosso país a batalha com a corrente do norte ocorre em uma estação chuvosa com um caráter mutável. É assim que as epidemias de tifo do verão e do início do outono podem ser explicadas.'\n\nDra. Angelika Hasenbein, 'Como as correntes de ar causam tifo e a chuva de outono causa gripe'" #NT!
 panum.453.g: "Isso é realmente muito convincente." #NT!
 panum.454.t: "Doente" #NT!
 panum.454.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está se sentindo pior há alguns dias. O [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] foi infectado?" #NT!
 panum.454.f: "'Onde está o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]? O [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] queria visitar o paciente com tifo no quarto cinco hoje?'\n\n'Parece que o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] está doente.'" #NT!
 panum.454.g: "O Doutor deveria descansar." #NT!
 panum.454.h: "O Doutor deve continuar trabalhando!" #NT!
 panum.455.t: "Documentos perdidos" #NT!
 panum.455.d: "O Doutor desperdiçou algumas das notas do [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] que poderiam ter sido úteis no desenvolvimento de um tratamento para o tifo." #NT!
 panum.455.f: "- - - - - - - - -\n\n- - - - - - - - -\n\n- - - - - - - - -\n\nNÃO do diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.455.g: "Que vergonha." #NT!
  
 panum.461.t: "Aulas e Casas" #NT!
 panum.461.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] criou uma tabela com os vários portadores de tifo que vivem em [SCOPE.sState('panum_disease_state').GetCityHubName], onde vivem e qual é o padrão de vida que têm. A febre tifoide é, portanto, uma doença "social"." #NT!
 panum.461.f: "'As tabelas estatísticas mostram quão grande é a influência dos apartamentos na saúde dos moradores. Por exemplo, em um estudo do subúrbio de CITY, descobri que a taxa de mortalidade nas ruas de segunda classe era de 18 por cento e nas ruas de terceira classe 68 por cento maior do que na primeira classe; e que a mortalidade era 31 por cento maior em casas de segunda classe e 78 por cento maior em casas de terceira classe do que em casas de primeira classe. A mortalidade havia melhorado em 25 por cento nas estradas ruins que foram melhoradas.'\n\n'Do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]' 'Tabelas e Estatísticas sobre a Epidemia de Tifo em [SCOPE.sState('panum_disease_state').GetCityHubName]'" #NT!
 panum.461.g: "Então o médico também é um crítico social?" #NT!
  
 panum_typhus: "Tifo" #NT!
 panum_typhus_desc: "Esta pessoa sofre de tifo, uma doença perigosa." #NT!
  
 panum.12.t: "A Primeira Vacina" #NT!
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName] fez uma invenção inovadora. Usando um novo processo, a vacinação, ele conseguiu inventar um meio eficaz de proteção contra a temida varíola." #NT!
 panum.12.f: "De acordo com o biógrafo de Edward Jenner, John Baron, Jenner teria explorado a crença popular de que leiteiras infectadas com varíola bovina geralmente não contraíam varíola ('mito da leiteira'). John Fewster observou que um paciente que já havia tido varíola bovina (inofensiva) não poderia ser variolado com varíola. Jenner, portanto, levantou a hipótese de que a inoculação com varíola bovina forneceria a mesma imunidade que a varíola bovina e, portanto, forneceria proteção contra a varíola. Jenner primeiro coletou estudos de caso e observacionais de pessoas que já haviam tido varíola bovina ou equina, mas que então se mostraram imunes no caso de uma variolação posterior ou em um surto real de varíola. Em 14 de maio de 1796, ele vacinou James Phipps, de 8 anos, com vírus da varíola bovina ou vacínia que ele havia tirado de uma pústula de varíola bovina da mão da leiteira Sarah Nelmes, que tinha varíola bovina. Cerca de seis semanas depois, em 1º de julho de 1796, Jenner variolou o menino com pus de varíola; ele se mostrou imune." #NT!
 panum.12.g: "Um herói da medicina!" #NT!
  
 je_panum_vaccine: "A vacina" #NT!
 je_panum_vaccine_reason: "Nossa nação está no processo de introduzir uma vacina conhecida em nosso país pela primeira vez e distribuí-la nacionalmente." #NT!
 je_panum_vaccine_success: "[GetPlayer.GetName] coletou pelo menos #ORANGE 4 Pistas de Vacinas#!." #NT!
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName] coletou pelo menos #ORANGE 3 Pistas de Tratamento#!." #NT!
  
 panum.351.t: "O Velho Inimigo" #NT!
 panum.351.d: "A varíola, talvez a doença mais mortal conhecida pelo homem, ressurgiu em nossas terras." #NT!
 panum.351.f: "A varíola é uma inimiga familiar e perigosa. À medida que ela avança pelas terras de [GetPlayer.GetName], ela pode tirar a vida de um terço dos infectados e deixar outros cegos pelo resto de seus dias. Quase todos os infectados carregarão para sempre o cartão de visita desse assassino em sua carne - a cicatriz icônica do rosto e do corpo, o símbolo imortal e eterno de uma doença quase tão antiga quanto a própria civilização. Ela perseguiu todos os cantos do globo, do antigo Oriente Médio ao Novo Mundo, um exército cuja marcha devastou impérios, matou milhões e humilhou os maiores líderes que já caminharam sobre a Terra. Onde o homem foi, a varíola seguiu, um caçador sempre perseguindo sua presa.\n\nAgora, em nossas terras, ela encontrou novas vítimas, o suficiente para romper com sua forma endêmica e se tornar uma epidemia mais uma vez." #NT!
 panum.351.g: "E assim lutamos contra a varíola mais uma vez..." #NT!
 panum.352.t: "Rumores de tratamento de varíola" #NT!
 panum.352.d: "Após rumores de um tratamento para varíola, nosso povo começou a tentar práticas estranhas para lidar com as próprias pústulas!" #NT!
 panum.352.f: "A visão de um cavalheiro culto comendo crostas de pessoas infectadas com varíola pode ser uma visão que é ao mesmo tempo repugnante e horrível em igual medida, mas é uma cura desesperada agarrada por um homem desesperado. Há rumores de um tratamento para esta doença horrível em algum outro lugar do mundo, e, supostamente, funciona de forma semelhante... mas como? Que feitiçarias, que ciência, pode livrá-los desta praga horrível? Notícias vêm de terras distantes da Europa de que o flagelo da varíola foi levado a recuar, que cidades inteiras podem viver sem sequer um único caso.\n\nPara alguns, isso é uma coisa de esperança. Se pode ser derrotado lá, então podemos vencê-lo aqui.\n\nPara alguns, isso é uma mentira. Nossas maiores mentes ainda não conseguiram encontrar um tratamento, mas talvez, talvez..." #NT!
 panum.352.g: "...poderiam ter tido sucesso onde falhamos?" #NT!
 panum.353.t: "O flagelo da varíola" #NT!
 panum.353.d: "Se não for tratada e não tiver cura, a varíola está devastando nossa sociedade... e especialmente nossos jovens." #NT!
 panum.353.f: "Soluços. Lamentos. Os gritos frenéticos dos desesperados, que mal conseguem tirar um segundo do último suspiro ofegante antes de caírem em uma tristeza da qual nenhuma mão pode levantá-los. Os pais baterão os punhos contra as paredes até que suas palmas fiquem vermelhas de sangue e seus nós dos dedos fiquem quebrados e achatados. As mães afastarão os enfermeiros com a força de gigantes por um último toque, por uma última carícia de uma bochecha fria e pálida. Essas são visões comuns em [GetPlayer.GetName], pois a varíola tem fome dos mais vulneráveis ​​de todos nós: nossos filhos, nascidos e não nascidos. Mais de oitenta por cento dos bebês infectados pela varíola morrerão, esta doença abrindo caminho para o futuro de nossas terras.\n\nE sem tratamento, não há nada que possamos fazer a não ser chorar pelas vidas que deveriam ter sido." #NT!
 panum.353.g: "Deve haver um fim para este pesadelo..." #NT!
 panum.354.t: "A vacina contra a varíola" #NT!
 panum.354.d: "Nossos diplomatas trazem mais do que notícias: eles trazem amostras de uma "vacina" contra a varíola!" #NT!
 panum.354.f_generic: "Durante uma visita à distante Europa, nossos dignitários descobriram algo fascinante - eles têm o que parece ser um tratamento *funcional* para a varíola. De fato, eles aprenderam sobre a história desta doença! Aparentemente, a prática da variolação, ou usar amostras de crostas secas de varíola de doentes em recuperação para dar às crianças uma forma "mais fraca" desta doença, foi observada no Império Otomano... no entanto, esta era uma solução falha, perigosa, pois era uma dança com o diabo - chegue muito perto, e a varíola o arrebataria tão facilmente quanto você a superaria.\n\nNo entanto, hoje, o que os europeus desenvolveram é um meio de usar a varíola bovina, uma doença quase inofensiva, como uma forma de proteção contra seu irmão mais velho letal. Isso fornece um escudo seguro, econômico e praticamente garantido contra a praga da varíola.\n\nA princípio, muito para ser acreditado, nossos médicos céticos testaram esta cura por si mesmos... e ela *funciona*. Pela primeira vez na nossa história, podemos lutar contra a varíola." #NT!
 panum.354.g_generic: "Nós...nós precisamos importar isso, imediatamente!" #NT!
 panum.354.f_fareast: "Durante uma visita à distante Europa, nossos dignitários descobriram algo fascinante - eles têm o que parece ser um tratamento *funcional* para a varíola. De fato, eles aprenderam sobre a história desta doença! Embora nossos médicos estejam bem familiarizados com a prática da variolação, que pode usar crostas secas da recuperação para proteger os não infectados, eles parecem ter descoberto uma proteção ainda maior. Usando amostras derivadas de varíola bovina relativamente benigna, os europeus desenvolveram uma "vacina", capaz de inocular crianças, ou mesmo os recentemente infectados... uma vacina que pode aumentar enormemente suas chances de sobrevivência.\n\nNossos médicos mais educados mal conseguiam acreditar nisso. Somente aqueles educados à maneira europeia e intitulados "doutores" poderiam garantir seu potencial como uma proteção segura, econômica e poderosa contra a varíola. Mais do que isso, eles já começaram a testá-la entre nosso povo e descobriram que essas alegações não são apenas alegações, oh não, mas fatos.\n\nCom isso, temos uma arma para combater a varíola." #NT!
 panum.354.g_fareast: "Parece que nossos novos... médicos... mostraram seu valor. Importe isso imediatamente." #NT!
 panum.354.f_latino: "Durante uma visita à pátria mãe na Europa, nossos dignitários descobriram algo fascinante - eles têm o que parece ser um tratamento *funcional* para a varíola. Embora estivéssemos familiarizados com a prática da variolação, onde nossos médicos podem usar amostras retiradas de pessoas em recuperação para dar àqueles que precisam desesperadamente de proteção, eles desenvolveram um tratamento muito mais sofisticado. Em vez de usar crostas de varíola e arriscar a infecção com essa doença letal, eles usam materiais retirados da varíola bovina, uma doença comum e geralmente inofensiva. Este novo soro é barato, comum e, o mais importante, eficaz.\n\nAgora, com acesso aos últimos periódicos médicos, nossos médicos só podem comemorar esta descoberta. A varíola não é estranha às Américas, pois dizimou os povos nativos dessas terras... mas agora, temos uma arma poderosa para tornar esse flagelo uma coisa do passado." #NT!
 panum.354.g_latino: "Envie agradecimentos à pátria e um pedido para importar uma remessa para uso imediato." #NT!
 panum.355.t: "Começa a vacinação" #NT!
 panum.355.d: "Com uma vacina viável contra a varíola agora presente em [GetPlayer.GetName], o governo iniciou uma campanha de vacinação." #NT!
 panum.355.f: "Houve alguma resistência à ideia de uma campanha de vacinação, pelo menos no início. Mães preocupadas com seus filhos assustados, velhos cavalheiros enrugados que eram céticos em relação a essa nova maravilha, os muito piedosos que temiam que a ciência estivesse mexendo com algo além de sua compreensão. A educação resolveu isso - explicações de como funcionava, por que - mas muito mais do que isso foram os resultados. Crianças que ficaram com sua visão e saúde, e não com as consequências horríveis de uma das doenças mais mortais que a humanidade já havia encontrado. Poucos precisaram ser convencidos quando os viram livres de cicatrizes e cheios de vida.\n\nPouco a pouco, uma a uma, as filas começaram a crescer. Nas escolas, consultórios médicos, locais de trabalho, a campanha de vacinação começa a ganhar força... e com ela, a varíola começa a declinar." #NT!
 panum.355.g: "Ai. Eu odeio agulhas, mas se elas me manterem segura..." #NT!
 panum.356.t: "Uma doença em retirada" #NT!
 panum.356.d: "Após incontáveis ​​séculos de morte e miséria, a recente proliferação da vacinação contra a varíola colocou esse velho inimigo em completa retirada." #NT!
 panum.356.f: "Foi preciso um grande esforço incansável de mãos e mentes além da conta, mas dentro do nosso amado [GetPlayer.GetName], a varíola é uma ameaça que está lentamente, mas seguramente, se tornando uma coisa do passado. O resultado de uma extensa campanha para vacinar a juventude da nação e todos dispostos a pegar a agulha, a capacidade da varíola de abrir caminho através de nossas famílias e comunidades está se desintegrando, carregando a promessa de que as crianças de hoje não carregarão as cicatrizes de seus avós. A cada picada da agulha, a lâmina da varíola fica cada vez mais cega, e a natureza desta praga se torna ainda mais uma coisa do passado.\n\nÉ uma conquista importante, um dia glorioso em nossa história: embora a batalha ainda não tenha sido vencida, a vitória está à vista. A varíola morrerá aqui, e se não por nossas mãos, então pelas de nossos herdeiros." #NT!
 panum.356.g: "Um dia, um dia, nós acabaremos com essa fera hedionda para sempre." #NT!
  
 panum_smallpox_vaccination_character_modifier: "Vacinado" #NT!
  
 panum.340.t: "Variolação" #NT!
 panum.340.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou um método de tratamento para a varíola, embora não seja totalmente inofensivo." #NT!
 panum.340.f: "Variolação (também inoculação) é a transferência do conteúdo da pústula da varíola de pessoa para pessoa por meio da inoculação. É uma técnica de vacinação contra doenças virais que foi usada em pessoas, principalmente na China e no Oriente Médio, até o século XVIII. Aqui, coletivos de vírus de feridas de portadores de varíola que sobreviveram à doença foram usados. Normalmente, o material era retirado de uma pústula em pessoas doentes usando uma lanceta, que era então introduzida subcutaneamente, ou seja, por meio de pequenas feridas, no braço ou perna de pessoas saudáveis. Isso significava que vírus atenuados eram administrados a pessoas saudáveis. A reação imunológica deveria ser desencadeada pela multiplicação dos vírus. No entanto, os vírus poderiam se tornar causadores de doenças novamente por meio de mutação reversa à medida que se multiplicavam, o que levava a uma taxa de mortalidade relativamente alta (2-3%) entre aqueles tratados dessa forma." #NT!
 panum.340.g: "Um...progresso." #NT!
  
