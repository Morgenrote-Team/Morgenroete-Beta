 panum.1100.t: "A gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 panum.1100.d: "Vários hospitais, clínicas e escritórios do médico relataram um número extraordinariamente alto de casos de uma doença estranha que eles pensaram que era a gripe comum. As camas de guindaste agora estão superlotadas e os quartos públicos precisam ser limpos. Os piores medos são confirmados de que aparentemente é a temida gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] que atingiu os países vizinhos." #NT!
 panum.1100.f: "A princípio, os médicos falaram de uma epidemia normal de gripe. Nos primeiros dias, a imprensa alegou que era uma estranha doença do tipo epidemia, mas que era inofensiva e sem mortes. \ N \ nbut o oposto é o caso. Todos os dias a epidemia de gripe atinge uma nova cidade, uma nova região e exige uma reorganização completa do tratamento médico. Onde ontem dois homens em um quartel sofriam de sintomas, hoje já existem 700. A natureza sinistra da doença se reflete no fato de que ela não mata crianças e idosos como de costume, mas os jovens entre 20 e 40 anos. Um em vinte pessoas doentes não sobrevive à gripe. De onde veio, como veio, o que é: essa pandemia continua sendo um mistério. O pedido de ação do governo está ficando mais alto. Como [GetPlayer.GetName] responderá a isso?" #NT!
 panum.1100.g: "Esta é uma doença benigna, não é?" #NT!
 panum.1101.t: "A gripe espanhola" #NT!
 panum.1101.d: "Vários hospitais, clínicas e escritórios do médico relataram um número incomumente alto de casos de uma doença estranha que eles pensaram que era a gripe comum. As camas de guindaste agora estão superlotadas e os quartos públicos precisam ser limpos. Os piores medos são confirmados de que isso é aparentemente uma pandemia de proporções anteriormente desconhecidas." #NT!
 panum.1101.f: "A gripe espanhola era uma pandemia de influenza causada por um derivado incomumente virulento do vírus influenza que se espalhou em três ondas entre 1918 e 1920, reivindicando entre 20 e 50 milhões de vidas, com estimativas que variando de uma população global de aproximadamente 1,8 bilhão de até 100 milhões. \ Nthis Meios que mais pessoas morreram de aproximação de um que mais de 1,8 bilhão. Diz -se que um total de cerca de 500 milhões de pessoas foram infectadas, o que resulta em uma taxa de mortalidade de 5 a 10 %, o que foi significativamente maior do que o das doenças causadas por outros patógenos da influenza. A gripe tornou -se 'espanhola' quando, em 29 de junho de 1918, o diretor de saúde espanhol Martín Salazar anunciou que não tinha relatos de uma doença comparável no resto da Europa. Desde o final de junho de 1918, a imprensa internacional usou cada vez mais o termo 'gripe espanhola', que também foi incentivada por alguns governos beligerantes para encobrir a propagação real. É considerado a 'mãe de todas as pandemias'." #NT!
 panum.1101.g: "Então as pessoas já estão falando sobre a gripe espanhola?" #NT!
 panum.1102.t: "A grande pandemia" #NT!
 panum.1102.d: "Vários hospitais, clínicas e escritórios do médico relataram um número incomumente alto de casos de uma doença estranha que eles pensaram que era a gripe comum. As camas de guindaste agora estão superlotadas e os quartos públicos precisam ser limpos. Os piores medos são confirmados de que isso é aparentemente uma pandemia de proporções anteriormente desconhecidas." #NT!
 panum.1102.f: "A princípio, os médicos falaram de uma epidemia normal de gripe. Nos primeiros dias, a imprensa alegou que era uma estranha doença do tipo epidemia, mas que era inofensiva e sem mortes. \ N \ nbut o oposto é o caso. Todos os dias a epidemia de gripe atinge uma nova cidade, uma nova região e exige uma reorganização completa do tratamento médico. Onde ontem dois homens em um quartel sofriam de sintomas, hoje já existem 700. A natureza sinistra da doença se reflete no fato de que ela não mata crianças e idosos como de costume, mas os jovens entre 20 e 40 anos. Um em vinte pessoas doentes não sobrevive à gripe. De onde veio, como veio, o que é: essa pandemia continua sendo um mistério. O pedido de ação do governo está ficando mais alto. Como [GetPlayer.GetName] responderá a isso?" #NT!
 panum.1102.g: "Então, as pessoas já estão falando sobre a gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]?" #NT!
 panum.1103.t: "Política Pandêmica" #NT!
 panum.1103.a.tt: "Medidas rigorosas sufocarão a economia, mas terão uma chance maior de entrar em vigor mais cedo e parar a pandemia em pelo menos alguns estados." #NT!
 panum.1103.b.tt: "As medidas levarão significativamente mais tempo para entrar em vigor e ter um impacto, mas a economia será menos danificada." #NT!
 panum.1103.c.tt: "A pandemia está seguindo seu curso natural e as medidas estabelecidas estão sendo completamente abolidas." #NT!
 panum.1104.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripe em [SCOPE.sState('panum_flu_fading_state').GetName] desaparece" #NT!
 panum.1104.d: "Aparentemente, as restrições em [SCOPE.sState('panum_flu_fading_state').GetName] tiveram seus primeiros efeitos. Depois de semanas, um declínio no número de mortes é notável." #NT!
 panum.1104.f: "Sob certas condições, uma pandemia pode diminuir em um estado após algumas semanas. Medidas Rigid, um bom sistema de saúde, um médico de primeira classe ou técnicas médicas altamente desenvolvidas ajudam a iniciar esse processo." #NT!
 panum.1104.g: "Um sinal de esperança." #NT!
 panum.1105.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripe em [SCOPE.sState('panum_flu_disappearing_state').GetName] desaparece" #NT!
 panum.1105.d: "Depois que a pandemia em [SCOPE.sState('panum_flu_disappearing_state').GetName] diminuiu visivelmente nas últimas semanas, nenhum novo caso foi registrado lá hoje em dia. A região é completamente livre de fluxo!" #NT!
 panum.1105.f: "Para que uma pandemia desapareça completamente de um estado, ele já deve ter desaparecido. É então possível que alguma região esteja livre da gripe antes do final da pandemia real. Medidas rígidas, um bom sistema de saúde, um médico de primeira classe ou técnicas médicas altamente desenvolvidas ajudam a se livrar da gripe." #NT!
 panum.1105.g: "As medidas contribuíram para isso?" #NT!
 panum.1106.t: "Vítima da gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName] contraiu a gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] há alguns dias e está passando por um curso grave da doença. Os médicos estão esperando o pior." #NT!
 panum.1106.f: "Por volta das 12 horas, comecei a me sentir quente. Eu estava tão febril que tinha medo de acender as roupas. Eu tive uma tosse que rasgava minhas entranctas quando não conseguia suprimi -la. Estava escuro; Eu certamente tive pneumonia e nunca fiquei tão desamparado e desconfortável em minha vida. … Então eu descobri que estava invadindo um dilúvio de transpiração e, embora deveria estar mais confortável, estava mais infeliz do que nunca. Quando a luz finalmente chegou, eu era um espécime de miséria - não poderia respirar sem uma tosse excruciante e não havia esperança em mim. -Franklin Martin, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Sobrevivente da gripe" #NT!
 panum.1106.g: "Não há nada que possamos fazer." #NT!
 panum.1107.t: "Relatórios de gripe criando sentimento anti-guerra" #NT!
 panum.1107.d: "Relatórios das muitas mortes resultantes da gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] em [SCOPE.sState('panum_disease_state').GetName] estão prejudicando o apoio popular aos nossos esforços de guerra." #NT!
 panum.1107.f: "É loucura que enviemos homens para a guerra enquanto essa praga arrebata nossas casas. O Estado não deve priorizar a vida de seus cidadãos sobre suas mortes?" #NT!
 panum.1107.g: "Não vamos interferir na imprensa livre." #NT!
 panum.1107.h: "Distribua a propaganda tranquilizadora apoiada por ciências médicas." #NT!
 panum.1107.i: "Notícias do censor de taxas de mortalidade e infecções." #NT!
 panum.1108.t: "Medidas pandêmicas que contribuem para a pobreza" #NT!
 panum.1108.d: "Com muitos incapazes de trabalhar devido às nossas medidas anti-pandêmicas, os cidadãos mais pobres em [SCOPE.sState('panum_disease_state').GetName] estão lutando para pagar o aluguel. Os trabalhadores recém -desempregados enfrentam despejo, pois os proprietários recusam seus pedidos de alívio." #NT!
 panum.1108.f: "'Eles me disseram que eu não podia trabalhar porque a fábrica está superlotada. Cada fábrica está superlotada! O proprietário, que ele queime nos incêndios eternos, não se preocupa com a nossa situação e exige aluguel antes do final da semana com a dor de despejo. Minha família certamente será forçada de nossa casa." #NT!
 panum.1108.g: "Institua uma proibição de congelamento de aluguel e despejo." #NT!
 panum.1108.h: "Aumentar temporariamente a previdência social." #NT!
 panum.1108.i: "Não há nada que possamos fazer sobre isso." #NT!
 panum.1109.t: "A Liga Anti-Masca" #NT!
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] formou a Liga Anti-Máscara em oposição às nossas medidas pandêmicas. Eles contestam a eficácia de nossas políticas e exigem que os revogamos em prol da economia em dificuldades." #NT!
 panum.1109.f: "'Use uma máscara e salve sua vida! A emergência que agora confronta nosso país está além das instalações do Departamento de Saúde. \ Não é que não as usa fica doente. O homem ou mulher ou criança que não usará uma máscara agora é um preguiçoso perigoso!" #NT!
 panum.1109.g: "Ignore a liga." #NT!
 panum.1109.h: "Abandone as medidas anti-plaue." #NT!
 panum.1109.i: "Desacredite a liga com ciências médicas." #NT!
  
 panum.1120.t: "A gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] termina" #NT!
 panum.1120.d: "Muitos não esperavam mais que este dia chegasse. Depois de muitos meses, os gostos dos quais [GetPlayer.GetName] não experimentaram, a gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] está desaparecendo lentamente de nosso país. Na verdade, essa era a mãe de todas as pandemias!" #NT!
 panum.1120.f: "'A proibição foi levantada hoje. Não mais .... máscaras. Tudo aberto também. 'O romance de Tarzan' está no Coliseu [movie theater], como era cerca de 6 semanas atrás. Eu gostaria de ver muito. A escola abre esta semana - a quinta -feira! Você já fez? Como se eles não pudessem ter esperado até segunda -feira! -Violet Harris, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Sobrevivente da gripe" #NT!
 panum.1120.g: "Esperamos que ela nunca volte." #NT!
  
 je_panum_spanish_flu: "A gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]" #NT!
 je_panum_spanish_flu_reason: "A gripe [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] era uma pandemia de influenza causada por um derivado incomumente virulento do vírus influenza que apareceu no início do século XX, reivindicando entre 20 e 50 milhões de vidas, com estimativas variando de uma população global de aproximadamente 1,8 bilhão de até 100 milhões. Diz -se que um total de cerca de 500 milhões de pessoas foram infectadas, o que resulta em uma taxa de mortalidade de 5 a 10 %, o que foi significativamente maior do que o das doenças causadas por outros patógenos da influenza. É considerado a 'mãe de todas as pandemias'. A gripe tornou -se '[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]' quando o diretor de saúde [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] anunciou que não tinha relatos de uma doença comparável no resto do mundo. A partir de então, a imprensa internacional usou cada vez mais o termo '[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] gripe', que também foi incentivado por alguns governos para encobrir a propagação real." #NT!
 panum_remove_spanish_flu_effect_tt: "Revoga todas as políticas pandêmicas e seus efeitos." #NT!
  
