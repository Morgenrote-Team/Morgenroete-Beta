 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]" #NT!
 panum.138.d: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] apresentou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] descrição da doença de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] hoje. A Faculdade de Medicina já a vê como um clássico." #NT!
 panum.138.f: "No tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')] [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] lida com a doença em mais detalhes do que qualquer outro médico em nosso país antes. Ele educa o leitor sobre os sintomas, o período de incubação e a diferenciação de outras doenças, bem como uma cronologia de epidemias passadas e outras descrições epidemiológicas tradicionais." #NT!
 panum.138.g: "Agora conhecemos melhor a fera." #NT!
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.139.d: "Após grande esforço, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finalmente escreveu seu [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sobre um método de tratamento bem-sucedido para a doença [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. É considerado um marco na medicina [ROOT.GetCountry.GetAdjectiveNoFlag]." #NT!
 panum.139.f: "A Faculdade de Medicina aguardava ansiosamente o artigo científico sobre o método de tratamento do [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. Esse trabalho talvez tivesse um avanço? O [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] poderia potencialmente salvar as vidas de inúmeras pessoas. As razões que ele descreve para o surto do [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] e as maneiras pelas quais ele pode ser prevenido ou tratado depois podem mudar fundamentalmente a maneira como essa doença tem sido pensada." #NT!
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] está perdendo seu horror." #NT!
  
 panum.140.t: "Cólera - Uma doença transmitida pela água!" #NT!
 panum.140.d: "Graças ao trabalho heróico do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], o surto de cólera em [SCOPE.sState('panum_disease_state').GetCityHubName] foi decisivamente esmagado!" #NT!
 panum.140.f: "'Desde o início do meu tempo aqui em [SCOPE.sState('panum_disease_state').GetCityHubName], reuni uma grande quantidade de informações que apontam para uma conclusão: a cólera é uma doença transmitida pela água. A doença que matou tantos por séculos não é encontrada no ar, como o miasma, mas se contorce e se aglomera em gotas de água. Ingerida, ela se desenvolve no intestino e se manifesta na cólera que aprendemos a combater. É uma lição difícil de aprender, mas rapidamente colocada em prática. Na semana passada, eles removeram as alças da bomba d'água no centro deste surto. Hoje, eu me retiro para a noite sem um único caso novo trazido à minha mesa. É irrefutável. A fera foi morta.\n\nNo entanto, sinto uma pontada de lamento por tudo isso. Não desejo poder reivindicar total e exclusiva responsabilidade pelas descobertas que fizemos aqui, apenas que elas poderiam ter sido descobertas ainda mais cedo. Muitas vidas foram perdidas por falta de água potável limpa, jovens e velhos. Se tivermos sorte, que esta seja a última vez que enfrentaremos a cólera.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], concluindo a investigação em [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.140.g: "Incrível! Este é um golpe mortal para a teoria do miasma!" #NT!
 panum.141.t: "A Cervejaria" #NT!
 panum.141.d: "A investigação do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] levou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] para uma ilha segura no surto - uma cervejaria." #NT!
 panum.141.f: "'Olá! Disseram-me que você deve ser o capataz aqui na cervejaria. Eu sou o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], e estou aqui para investigar o surto. Por favor, conte-me mais.'\n\n'Bem, não tem sido um grande problema aqui. A maioria das outras fábricas está fechando, mas não nós.'\n\n'A cólera não afeta muito você aqui? Você tem alguma ideia do porquê?'\n\n'Não é a primeira pista, eu temo. Mas se eu tivesse que apostar, é porque os rapazes não vão para casa com todo esse fedor.'\n\n'Eles comem na cervejaria?'\n\n'Sim, e bebem também! O chefe nos deixa comer alguns dos lotes mais antigos que não estão vendendo bem com o almoço, um pequeno estimulante para os meninos barato. Nada daquela água de poço para nós, apenas uma cerveja por quase o mesmo preço que custou para fazer.'" #NT!
 panum.141.g: "Hmmm...então você não bebe a água local. Muito fascinante." #NT!
 panum.142.t: "Criaturas de Hábito" #NT!
 panum.142.d: "A investigação do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] continua - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] descobriu o que pode ser o centro do surto." #NT!
 panum.142.f: "'...mas os casos eram tão comuns na área que percebi que precisava de mais orientação. Felizmente, o legista local provou ser de grande ajuda: eles tinham anotado o endereço de cada casa de onde haviam retirado um corpo ou notado uma doença, e isso me forneceu os meios para colocar cada uma delas com precisão em um mapa simples. A área resultante é vasta, abrangendo bem mais de cem casas, mas também forma um vasto círculo.\n\nIsso vai contra o pensamento tradicional. Se fosse um miasma, então certamente seria carregado pela brisa, viajando ao longo dos ventos predominantes. Em vez disso, ele vai além dos ventos, redondo e perturbadoramente limpo. Andei até o centro de tudo, talvez esperando encontrar alguma pista... e não encontrei nada além de uma bomba d'água. Cada casa no mapa estava a uma curta distância. Deve haver algum tipo de conexão.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.142.g: "Poderia...estar na bomba, de alguma forma?" #NT!
 panum.143.t: "Os Estranhos" #NT!
 panum.143.d: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou algo interessante: uma quebra no padrão." #NT!
 panum.143.f: "'Oh, graças a Deus! Você deve ser o médico de quem estão falando, Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Por favor, você tem que nos ajudar.'\n\n'Eu pretendo, senhora. Por favor, me conte o máximo que puder sobre você e os seus, e não poupe nem o menor detalhe se puder. O seu parece ser um dos únicos casos nesta vizinhança?'\n\n'Sim, sim, somos! Simplesmente surgiu do nada! Tomamos todas as precauções, até mesmo usando uma daquelas máscaras florais com todas as flores para manter o fedor sob controle!'\n\n'Então você foi para a área do surto? Para quê?'\n\n'Minha mãe, minha querida mãe... ela sempre gostou mais da água da bomba deles, mas quando eu a trouxe de volta, a doença deve ter grudado nas minhas roupas e voltado para casa comigo.'" #NT!
 panum.143.g: "...você disse que trouxe água da bomba deles?" #NT!
 panum.144.t: "Os filtros" #NT!
 panum.144.d: "Na tentativa de descobrir mais pistas sobre o surto, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que todas as vítimas recebem água da mesma empresa!" #NT!
 panum.144.f: "'...mas é a coisa mais curiosa de todas. Quando viajei pela estrada, ou rio acima, para casas apoiadas pela New River Company, a quantidade de casos de cólera caiu drasticamente. Não era mais do que o normal, se tanto. Volte para o sul e encontre as ruas em chamas com cólera, cheias do fedor de intestinos não tratados e morte. Poderia ser uma localização de solo miasmático?\n\nAcho que não. Parece muito bem marcado. Entrei em contato com os honrados cavalheiros da New River Company, e eles me informaram que seus canos foram fechados recentemente enquanto eles adicionavam novos filtros, com grande despesa, à sua estação de bombeamento. Esses filtros poderiam estar desempenhando algum papel invisível nisso? Poderia ser a limpeza ociosa da água mantendo o miasma sob controle, ou algo mais?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.144.g: "...há algo na água que traz doenças?" #NT!
 panum.145.t: "Água Marrom" #NT!
 panum.145.d: "Equipado com os mais recentes instrumentos para pesquisa [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] usou o microscópio [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para examinar amostras do surto de cólera." #NT!
 panum.145.f: "Não foi fácil levar o microscópio até [SCOPE.sState('panum_disease_state').GetCityHubName], pois um solavanco na estrada quase quebrou todas as lentes... mas agora que estava ali, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tinha uma das maiores ferramentas da medicina moderna à sua disposição. Algumas dezenas de amostras coletadas da água local, cuidadosamente preparadas e cada uma vista sob o microscópio. Algumas vieram de áreas com menos cólera. Essas eram as mais limpas, observou [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe].\n\nMas as sujas? As cheias de sujeira do tipo mais vil?\n\nEssas eram as das áreas mais afetadas. Uma sobrancelha escovada, um momento de reflexão. Cintilações de sujeira flutuando no líquido, como flocos de neve suja. Aqui, ali, os pequenos movimentos de micróbios inofensivos, inocentemente esvoaçando sobre a sopa miserável." #NT!
 panum.145.g: "...ou você não é tão inofensivo quanto parece?" #NT!
 panum.145.h: "Mais evidências para outra teoria." #NT!
 panum.145.i: "Tem que haver mais." #NT!
 panum.146.t: "A Primeira Morte" #NT!
 panum.146.d: "Após trabalho e investigação incansáveis, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] rastreou o surto até o primeiro caso registrado: um bebê recém-nascido." #NT!
 panum.146.f: "Havia poucas lembranças mais sombrias do que o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez do que visitar a casa de uma mulher no pior dos lutos, uma mulher que já foi esposa e mãe, mas agora não era nenhuma das duas coisas. Já, mal saindo dos degraus da porta, o médico estava tomando notas.\n\nMenino recém-nascido levado da rua para visitar a avó. Retornou com cólera. Fraldas lavadas, possivelmente portador de doença.\n\nMarido voltou do trabalho. Com sede após o turno na siderúrgica. Comeu bem, bebeu bem, morreu no final da semana, cólera.\n\nAtrás deles, lamentando. À frente, ruas chuvosas e desoladas. No meio de tudo isso, uma frase sussurrada." #NT!
 panum.146.g: "Por favor, que tudo isso acabe." #NT!
 panum.147.t: "O Poço" #NT!
 panum.147.d: "Ao conduzir a investigação [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou algo esquecido: uma fossa." #NT!
 panum.147.f: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] não gostava da teoria do miasma, mas o [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] se viu muito grato pelas máscaras florais destinadas a mantê-lo afastado. A fossa estava cheia de resíduos podres e completamente, completamente rançosa. Até o inspetor de polícia desviou de sua borda.\n\n'Doutor! Tal fossa deve certamente ser a fonte deste miasma, e da cólera miserável que ele nos dá!'\n\n'Talvez sim, mas olhe aqui, inspetor. Você vê como a chuva flui para a terra, aqui?'\n\n'Sim, eu vejo, mas e daí?'\n\n'A água da chuva flui desta fossa lá embaixo, em direção às calhas. Deve fluir por elas, mas se for o caso, levaria a água para perto da bomba. Se os encaixes forem comprometidos...'\n\n'...então ela enfiaria água residual direto na alça. Ugh. Ainda bem que doenças não se espalham pela água..." #NT!
 panum.147.g: "...certo?" #NT!
 panum.147.h: "Errado!" #NT!
 panum.148.t: "A Mansão" #NT!
 panum.148.d: "A investigação do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] levou [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a um curioso buraco no alcance do surto: a casa de um homem rico." #NT!
 panum.148.f: "'Visitei a residência de um cavalheiro local hoje, uma moradia maior dentro dos limites da cidade, perigosamente perto do coração do surto. Parece um resquício de um dia anterior na história desta cidade, quando esta parte era mais rica do que uma pequena favela. O dono da casa ficou bastante fascinado pela investigação e me forneceu muitos livros sobre história local na esperança de que pudessem lançar luz sobre surtos passados. Mais interessante, eles deixaram claro que a cólera ainda não chegou além de seus muros.\n\nIsso foi bastante fascinante para mim, pois pelos princípios da teoria do miasma, a doença está no ar, no cheiro, e não deve discriminar entre ricos e pobres dessa maneira. Nem mesmo seus servos são afligidos, aqueles que vivem dentro dos alojamentos, pelo menos. Eles comem do depósito e bebem do poço artesiano dentro dos muros e, de alguma forma, isso os torna não afetados. Um enigma curioso. É algo que eles têm que os outros não têm?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.148.g: "Ou...talvez os servos não tenham algo que os doentes possam ter?" #NT!
 panum.149.t: "A Pequena Morte" #NT!
 panum.149.d: "A investigação do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] possivelmente revelou o culpado - um micróbio!" #NT!
 panum.149.f: "''...mas ainda assim, eu tinha que ter certeza especial. Pedi amostras frescas, tiradas tanto da água quanto de efluentes especialmente preparados dos doentes. Colocados no vidro do meu microscópio, consegui espiar dentro desses líquidos e confirmar a presença do que deve ser nosso grande inimigo nesta batalha: vibriones.\n\nÀ primeira vista, esses micróbios parecem inofensivos, mais como tubos do que qualquer grande predador. Mas cada amostra dos doentes confirma sua presença, e parece confiante dizer que essas criaturas estão desempenhando algum papel nesta doença. Elas são... a própria cólera? Talvez. Se for, é uma evidência concreta para a teoria de que germes como este causam doenças.\n\nMas uma coisa é certa: encontramos o inimigo. Agora, devemos matá-los.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.149.g: "Limpe e trate até que esteja tudo pronto." #NT!
 panum.149.h: "Essa descoberta vai muito além da cólera." #NT!
 panum.150.t: "Uma questão prática" #NT!
 panum.150.d: "Um raro aliado na batalha contra doenças, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se encontra com o legista no [SCOPE.sState('panum_disease_state').GetCityHubName] para discutir suas descobertas." #NT!
 panum.150.f: "'Ah, você deve ser o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Perdoe-me por não apertar sua mão, tenho revirado cadáveres nos últimos dias.'\n\n'... acredite em mim, você não precisa me pedir perdão. Você é o legista local, por favor, me conte suas descobertas.'\n\n'Como você sabe, cólera é uma doença dos intestinos. Mais do que isso, não preciso dizer. Vômitos, purgações, um intestino tão entupido que parece clara de ovo, alguém tão erudito quanto você saberá a lista.'\n\n'Claro, mas o que é que você acha interessante?'\n\n'Bem... eles continuam me dizendo que isso é miasma, que essa morte está no ar... mas honestamente, eu não acho. Eu estaria morto agora se fosse. Eu tive muitos corpos naquela mesa, doutor. Isso fede a intoxicação alimentar, mas não é.'" #NT!
 panum.150.g: "Um pensamento fascinante. Conte-me mais." #NT!
  
 panum_physician_health_bonus_modifier: "Economize em vez de Desculpe" #NT!
 panum_physician_health_malus_modifier: "Trabalho Inquieto" #NT!
  
 panum.151.t: "A Fábrica de Ferramentas" #NT!
 panum.151.d: "Enquanto trabalha na investigação [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], a viagem do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a uma fábrica de ferramentas local levanta mais perguntas do que respostas." #NT!
 panum.151.f: "'Quando fui à fábrica de ferramentas outro dia, as coisas pareciam estar fazendo algum sentido no início. Esta fábrica é especializada em facas, ferramentas de açougueiro e coisas do tipo, então eles têm uma estação de afiação. Ela usa rodas d'água para girar um grande número de pedras de amolar, rodas de afiação para finalizar o fio de cada lâmina. Cada trabalhador deitava de bruços perto do amolador e podia ser molhado com água. Tudo isso faz sentido, e se o surto na fábrica tivesse sido limitado ali, teria feito sentido.\n\nOnde as coisas se tornam estranhas, então, é que isso quebra uma tendência vista em todos os outros lugares. Há homens na fábrica adoecendo depois de nunca terem estado perto da rua no centro deste surto, nem nas rodas de afiação. Como isso poderia ser possível?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.151.g: "Aparentemente uma pista errada." #NT!
 panum.151.h: "Aparentemente uma teoria errada." #NT!
 panum.152.t: "O Jarro" #NT!
 panum.152.d: "Infelizmente, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está em busca de um beco sem saída: um caso local de intoxicação alimentar, não relacionado à cólera." #NT!
 panum.152.f: "'Hoje foi um dia muito irritante. Fui chamado pela polícia para investigar um surto repentino de doença em um hotel popular, que parecia ser uma explosão repentina de cólera. Eu tinha reunido todas as minhas coisas para investigar, alertando as autoridades competentes para encontrar leitos e cuidar dos doentes, mas no momento em que cheguei eu sabia que não era cólera. Os sintomas estavam errados, o início repentino foi rápido demais. Uma causa mais local tinha que ser a culpada e, sem surpresa, todos os afetados comeram a mesma refeição.\n\nUma incursão nas cozinhas revelou o culpado: um pote de patê de pato certamente vencido, espalhado em pão fino por um cozinheiro com o nariz muito entupido por um resfriado para sentir o cheiro da podridão. Uma perda de tempo, se é que alguma vez houve uma. Intoxicação alimentar não é cólera.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.152.g: "...bem, pelo menos sabemos como limpar os armários." #NT!
 panum.153.t: "Deslocamentos" #NT!
 panum.153.d: "Um acidente ocorreu durante a investigação do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] - [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] misturou suas amostras!" #NT!
 panum.153.f: "Mas bem no meio do trabalho, tive uma interrupção. Gritos, berros, o som de uma briga na rua. Uma briga de bêbados, uma xícara a mais. A polícia foi rápida em colocar tudo em ordem, arrastando-os para longe, gritando ainda.\n\nLevei apenas um momento para me levantar do meu assento e fechar as venezianas, e menos ainda para retornar ao meu trabalho. Mais tolo sou eu por não ter percebido que coloquei as amostras na ordem errada, e de onde mais do que fazer meu trabalho na ordem errada, registrar cada uma na ordem errada?\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.153.g: "Semanas de trabalho desperdiçadas. Condenação." #NT!
 panum.154.t: "O Assassino Imitador?" #NT!
 panum.154.d: "A investigação do surto de cólera em [SCOPE.sState('panum_disease_state').GetCityHubName] tomou um rumo alarmante - parece que pode haver outra doença!" #NT!
 panum.154.f: "'Ah, bom te encontrar de novo, Doutor %Name%. Minha mesa tem estado ocupada na semana passada.'\n\nEu não chamaria de bom te encontrar, legista. O que temos?'\n\n'Mais corpos chegando. Pensei que fosse mais cólera, e talvez seja, mas isso não está certo.'\n\n'Intoxicação alimentar?'\n\nNão, não com a velocidade com que isso os está matando. Principalmente crianças e idosos.'\n\n'A cólera é ainda mais letal para os vulneráveis ​​do que para qualquer outra pessoa. Tem certeza de que não é isso?'\n\n'Não é como se escrevesse seu nome dentro das veias. Disenteria, cólera, tifo? Intoxicação alimentar comum? Quem pode dizer? A única coisa que sei é que não parece a mesma coisa. Não tenho o branco, como cólera, mas a morte é a mesma.'\n\n'Então podemos muito bem ter uma segunda doença... maldição e condenação. Como podemos diferenciar as duas?'\n\n'Você é o médico, não eu.'" #NT!
 panum.154.g: "Não consigo fazer um plano se não sei contra o que estou lutando." #NT!
 panum.155.t: "O Miasma...?" #NT!
 panum.155.d: "A investigação do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] e [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] encontrou um problema: o miasma poderia ser real?" #NT!
 panum.155.f: "''...mas os resultados deste último quadrante da investigação desafiam os raciocínios da teoria dos germes, e eu não consigo entender o porquê. As casas ficam ao lado de um canal raso, frequentemente percorrido por barcaças que entregam carvão para as fundições. Elas não estão a uma curta distância de nenhuma bomba de água, exceto um poço antigo. É puro, talvez o mais puro da cidade.\n\nNo entanto, por algum motivo além de mim, a cólera está aqui. Eles já trabalham para manter o fedor sob controle, e o fedor, o miasma, realmente está lá. O canal fede a efluente...mas se eles não bebem esta água, então de que outra forma podem ser prejudicados, exceto pelo cheiro sozinho?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.155.g: "Miasma não pode estar correto...pode?" #NT!
 panum.156.t: "Desconstruído" #NT!
 panum.156.d: "Com uma fome cada vez maior por terras para construir, o desenvolvimento do [SCOPE.sState('panum_disease_state').GetCityHubName] não tem tempo para parar, nem mesmo para a investigação do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.156.f: "''...quem é você mesmo?'\n\n'O médico que está investigando esse surto. Essa rua estava cheia de pessoas doentes. Onde elas estão?'\n\n'Não faço ideia. Eu e meus rapazes estamos aqui só para começar a demolir essas casas.'\n\n'Demolir? O quê? Essas casas eram o lar de uma dúzia de famílias, todas infectadas com cólera!'\n\n'Bem, elas não existem mais. O senhorio jogou todas elas na rua.'\n\n'Eles O QUÊ?'\n\n'Jogaram elas fora! Não estou pagando aluguel assim, mas não importaria de qualquer forma. O terreno vai virar uma fábrica têxtil, e se você não se importa, eu e os rapazes temos que começar a trabalhar demolindo essas casas.'" #NT!
 panum.156.g: "Oh, pelo amor de Deus. Agora tenho que encontrar os doentes de novo...só não beba nada." #NT!
 panum.157.t: "Contaminado" #NT!
 panum.157.d: "Notícia terrível! O médico foi infectado com cólera!" #NT!
 panum.157.f: "'Não sei como aconteceu. Miasma? Estou perto de doentes, mortos e moribundos há semanas, mais do que qualquer outra pessoa. Germes? Não bebi a água, mas e a contaminação? Poderia ser espalhada pelo toque? No ar, em superfícies? Não sei.\n\nMas conheço os sintomas. A indisposição estomacal e como ela nunca acaba. Eu poderia muito bem comer e beber nada, por todo o bem que me faz. Ela fala mil verdades, e uma.\n\nEu tenho cólera.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.157.g: "Ah, espero que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] melhore logo." #NT!
  
 panum.161.t: "Um pouco de gim" #NT!
 panum.161.d: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tirou um tempo do trabalho para "investigar" sua outra paixão: o álcool." #NT!
 panum.161.f: "'...mas enquanto estava no meu segundo copo daquela bebida maravilhosa, comecei a perceber algo bem estranho. Quanto mais pessoas vinham a este lugar para beber, menor a probabilidade de serem afetadas pela cólera. De fato! Meu próprio mapa de plotagem mostra que as casas mais próximas deste lugar têm uma chance substancialmente menor de serem afligidas por esta doença miserável.\n\nHá um padrão aí, eu sinto. Falei mais com o proprietário e vários moradores locais mais afáveis, e eles parecem concordar. Há algo sobre este lugar que parece ajudar a afastar a doença. Eu deveria investigar mais.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.161.g: "Ah, as maravilhas dos negócios e do prazer em um só lugar." #NT!
 panum.162.t: "De baixo para cima" #NT!
 panum.162.d: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tomou a atitude mais ousada de todas: [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] transmitiu cólera ao [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] ao beber água contaminada!" #NT!
 panum.162.f: "''...claro, toda a melhor teoria do mundo não é nada sem a prática. Apesar de todo o trabalho, continua sendo apenas um acaso para meus detratores, que continuam a afirmar que não há evidências irrefutáveis ​​com as quais consolidar meus pensamentos. Muito bem, então. Vou enfrentá-los de frente, e da maneira mais direta de todas: bebendo a mesma água que é encontrada no coração deste surto, entregue por um mensageiro fiel. Se eles estiverem certos, então não ficarei doente, mesmo quando removido do local. Se estiver, logo estarei lutando pela minha vida, mas o que é uma vida, comparada a tantas que podem ser salvas se eu puder provar minhas alegações?\n\nEntão, meu querido diário, um brinde à saúde.\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.162.g: "'Oh, meu Deus, eu sinto...oh não.'" #NT!
 panum.162.h: "Dissuadir o médico dessa manobra temerária!" #NT!
 panum.163.t: "Um mapa para o sucesso" #NT!
 panum.163.d: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu traçar um mapa excelente do núcleo do surto, facilitando o acompanhamento do progresso da doença." #NT!
 panum.163.f: "'Senhores, senhores, apresento a vocês meu mapa da infecção em [SCOPE.sState('panum_disease_state').GetName]. Ele cobre, em detalhes soberbos, a localização de cada infecção na região, cronometrada e carimbada de acordo, com o nome e o número de mortes, infecções e assim por diante. Ele apresenta uma linha do tempo escrita de toda a progressão do surto de cólera neste bairro. Um exemplo: aqui, vemos uma bomba d'água e o número de casas a uma curta distância.\n\nAlém disso, apresento as seguintes tabelas, elaboradas pela tabulação das informações daquele mapa. Se vocês, cavalheiros, derem uma olhada por si mesmos, verão que as áreas atendidas por esta bomba d'água têm as maiores taxas de mortalidade de todas. Aqui, nesta tabela, vemos que a empresa de água, [SCOPE.sState('panum_disease_state').GetName] Wells, tem uma correlação direta com essas bombas, o que por sua vez mostra que esta empresa tem o maior risco de cólera de todas as áreas atendidas..." #NT!
 panum.163.g: "Um dia isso será uma ciência." #NT!
 panum.164.t: "Fogo e Fúria" #NT!
 panum.164.d: "A falta de progresso no combate ao surto de cólera em [SCOPE.sState('panum_disease_state').GetName] esgotou a paciência do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.164.f: "Os gritos podiam ser ouvidos a quase um quarteirão de distância, e o som de livros e xícaras atiradas da mesa bem do lado de fora da porta. Uma onda de xingamentos, desculpas frenéticas e desesperadas de assistentes assustados, depois mais gritos e mais silêncio.\n\n'Seus idiotas! Seus imbecis absolutos e completos! Estamos aqui por uma RAZÃO! Pessoas estão morrendo do lado de fora da nossa porta, e elas esperam que as salvemos, e nós as salvaremos!'\n\nA mão do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se fechou em punho.\n\n'Se você não consegue obedecer nem mesmo às instruções mais simples, então você não deveria estar aqui! Aqueles que conseguem, sigam minhas ordens ao pé da letra, e nós VAMOS derrotar essa praga miserável! Você me ouviu?'\n\n'Sim, Doutor!'\n\n'Agora volte lá e encontre mais amostras para mim! As CERTAS, dessa vez!'" #NT!
 panum.164.g: "E assim, o médico coloca seu exército em marcha, pronto para declarar guerra à própria doença." #NT!
 panum.165.t: "Thea Coração de Infecção" #NT!
 panum.165.d: "Num momento de extrema coragem, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visitou um dos hospitais mais afetados do [SCOPE.sState('panum_disease_state').GetCityHubName] para entrevistar os pacientes." #NT!
 panum.165.f: "A enfermaria deste hospital improvisado era um lugar lotado, cheio de imagens e sons, mas cheirava mais do que qualquer outro. O cheiro da doença. O cheiro da morte. Flores foram trazidas para tentar manter o fedor sob controle, e incenso também, mas mesmo assim, poucos vinham a este salão dos condenados. Era muito arriscado, eles diziam, muito perigoso para sua própria saúde. Como eles poderiam esperar ajudar os outros, se eles também estavam morrendo em uma cama?\n\nPoucos vieram, mas nenhum. O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] era um deles, e eles caminharam por este lugar de morte e morte com coragem incessante e energia sem fundo. Eles se sentaram ao lado dos doentes e dos solitários, fazendo perguntas, tomando notas. Cada pensamento, cada resposta, era precioso. Eles eram as pistas para a salvação, as dicas de onde essa morte poderia vir e como ela também poderia ser morta." #NT!
 panum.165.g: "E neste salão da morte, um anjo da vida caminhava, com um diário na mão." #NT!
 panum.166.t: "O Poder da Oração" #NT!
 panum.166.d_christian: "Em busca de compreensão e talvez conforto, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou um padre em uma catedral local." #NT!
 panum.166.d_muslim: "Em busca de compreensão e talvez conforto, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou um imã em uma mesquita local." #NT!
 panum.166.d_other: "Em busca de compreensão e talvez conforto, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou um padre em um templo local." #NT!
 panum.166.f_christian: "'Olá, pai. Eu sou o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado pela capital para investigar esse surto e oferecer qualquer ajuda que eu puder. Eu pediria sua ajuda nisso, se você puder emprestar.'\n\n'Eu sou apenas um humilde padre, não o Todo-Poderoso, mas farei o que puder. Diga-me, criança. O que você precisa?'\n\n'Eu gostaria de saber o máximo que você puder me contar sobre os primeiros dias dessa infecção. Quem foi o primeiro a sucumbir? Onde? Você tem alguma ideia de onde isso pode ter vindo?'\n\n'Só Deus pode ter a resposta para algumas dessas perguntas, mas sim, eu sei muito sobre meu rebanho. Venha, venha. Eu tenho pegado meus próprios escritos, afinal.'" #NT!
 panum.166.f_muslim: "'As-salamu alaykum, imã. Eu sou o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado pela capital para investigar este surto e oferecer qualquer ajuda que eu puder. Eu pediria sua ajuda nisso, se você puder emprestar.'\n\n'Eu sou apenas um humilde clérigo, não o Todo-Poderoso, mas farei o que puder. Diga-me, o que você precisa?'\n\n'Eu gostaria de saber o máximo que você puder me contar sobre os primeiros dias desta infecção. Quem foi o primeiro a sucumbir? Onde? Você tem alguma ideia de onde isso pode ter vindo?'\n\n'Só Alá pode ter a resposta para algumas dessas perguntas, mas sim, eu sei muito sobre a comunidade aqui. Vamos, vamos. Eu tenho pegado meus próprios escritos, afinal.'" #NT!
 panum.166.f_other: "'Saudações a você, padre. Eu sou o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], enviado pela capital para investigar este surto e oferecer qualquer ajuda que eu puder. Eu pediria sua ajuda nisso, se você puder emprestar.'\n\n'Eu sou apenas um humilde guardião deste templo, não um dos Deuses, mas farei o que puder. Diga-me, doutor. O que você precisa?'\n\n'Eu gostaria de saber o máximo que você puder me contar sobre os primeiros dias desta infecção. Quem foi o primeiro a sucumbir? Onde? Você tem alguma ideia de onde ela pode ter vindo?'\n\n'Somente os divinos podem ter a resposta para algumas dessas perguntas, mas sim, eu sei muito sobre as pessoas aqui. Vamos, vamos. Eu tenho pegado meus próprios escritos, afinal.'" #NT!
 panum.166.g_christian: "A limpeza está próxima da santidade." #NT!
 panum.166.g_muslim: "Existe uma cura para cada doença." #NT!
 panum.166.g_other: "Saiba bem o que te leva adiante e o que te impede." #NT!
 panum.167.t: "Seguro em vez de Desculpe" #NT!
 panum.167.d: "Em uma tentativa de permanecer seguro enquanto conduz sua investigação, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] isolou com segurança [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] longe dos infectados." #NT!
 panum.167.f: "'Há quem chame isso de covardia. Eu chamaria de pragmatismo. Esta não é uma batalha que pode ser vencida rapidamente, onde se pode simplesmente enfiar uma baioneta na barriga do inimigo e deixá-lo morrer rapidamente. É uma luta mais difícil, contra um inimigo que não podemos ver nem ouvir, mas que pode estar em qualquer lugar ao nosso redor.\n\nNão ter proteção adequada é loucura. O isolamento é a maior chave. Comida e água de áreas seguras, um lugar limpo para estudar e todo contato com os infectados e seus pertences feito por intermediários. A salvo de doenças, posso pesquisar em paz e concentrar todos os meus esforços em descobrir a verdade por trás desta doença.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a Grande Epidemia de Cólera de [TimeKeeper.GetCurrentDate.Format('y')], investigando em [SCOPE.sState('panum_disease_state').GetCityHubName]." #NT!
 panum.167.g: "...mas mesmo [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] terá que sujar as mãos de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] eventualmente" #NT!
 panum.168.t: "Trabalho Inquieto" #NT!
 panum.168.d: "Determinado a chegar à origem do surto de cólera, o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem trabalhado até muito tarde." #NT!
 panum.168.f: "'Alto! Quem está por aí a essa hora do - Doutor %Sobrenome%? O que você está fazendo tão tarde?'\n\n'Tenho rondas para fazer, e elas não vão esperar o nascer do sol. Cada minuto é precioso, mesmo depois da meia-noite.'\n\n'Meu Deus! Essas ruas não são seguras à noite!'\n\nNem são de dia, não até que essa cólera acabe. Se me der licença, policial, há mais trabalho a ser feito antes que o óleo da minha lanterna acabe. Tenho uma dúzia de frascos para encher com água dos canais e bombas, casas para visitar, valas para examinar.'\n\n'Sim, bem, muito bem então. Você não está fazendo nada errado, mas é melhor eu lhe dar uma escolta mesmo assim.'" #NT!
 panum.168.g: "Então, por favor, vamos andar por essas ruas juntos, policial." #NT!
  
