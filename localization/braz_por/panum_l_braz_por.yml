 panum_congress_host_modifier: "Recentemente sediou um congresso médico" #NT!
 panum_congress_attend_modifier: "Participa do Congresso Médico" #NT!
  
 panum.2000.t: "Preparativos para o Congresso Médico" #NT!
 panum.2000.d: "Antes de o próximo Congresso Médico Internacional ser realizado em nosso país, surge a pergunta sobre se o Congresso deve se concentrar em uma doença específica ou não." #NT!
 panum.2000.f: "As conferências médicas podem se concentrar em uma doença específica se a nação anfitriã tiver pelo menos uma descrição da doença. Um Congresso só pode ser realizado uma vez para cada doença. Médicos e microbiologistas presentes recebem pistas adicionais para que possam avançar sua pesquisa mais rapidamente. Em um congresso geral, os países participantes simplesmente recebem um bônus ao seu progresso acadêmico." #NT!
 panum.2000.g: "Supõe -se que seja uma conferência médica geral." #NT!
 panum.2001.t: "Congresso médico" #NT!
 panum.2001.d: "A capital está se preparando para a reunião internacional de especialistas médicos. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] presidirá as reuniões como presidente. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2001.f: "As conferências médicas são uma excelente oportunidade para trocar conhecimento médico. As realizações anteriormente reservadas para apenas um país são compartilhadas aqui de maneira fraterna. As conferências médicas só podem ser organizadas por médicos, mas os biólogos da especialização em microbiologia também são convidados e podem compartilhar seus conhecimentos no campo de patógenos e vacinas. Se um país possui um médico e um microbiologista, ambos podem participar." #NT!
 panum.2001.g: "Envie os convites!" #NT!
 panum.2002.t: "Convite para Congresso Médico" #NT!
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName] está convidando as principais nações médicas para um Congresso Internacional em sua capital. Médicos e microbiologistas são convidados. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2002.g: "Não se esqueça dos estetoscópios e microscópios!" #NT!
 panum.2003.t: "Descrições e tratamentos" #NT!
 panum.2003.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem a oportunidade única de obter insights epidemiológicos inovadores no Congresso Médico em [SCOPE.sCountry('panum_congress_host_country').GetName]. Qual doença deve ser o foco?" #NT!
 panum.2003.f: "Se uma nação que frequenta o Congresso Médico conhece uma descrição de uma doença ou tratamento para uma doença que outro país não possui, o último poderá aprender no Congresso. O conhecimento só pode ser melhorado sobre uma doença. Se nenhum novo conhecimento for possível no Congresso, ainda existe a possibilidade de acumular conhecimento geral e melhorar uma tecnologia médica. A participação de um médico é crucial para isso." #NT!
 panum.2003.g: "O médico deve reunir algum conhecimento médico geral de colegas." #NT!
 panum.2003.h: "Cólera." #NT!
 panum.2003.i: "Tuberculose." #NT!
 panum.2003.j: "Varíola." #NT!
 panum.2003.k: "Tifo." #NT!
 panum.2003.l: "Febre amarela." #NT!
 panum.2003.m: "Sarampo." #NT!
 panum.2003.n: "Escarlatina." #NT!
 panum.2003.o: "Praga." #NT!
 panum.2003.p: "Difteria." #NT!
 panum.2003.q: "Poliomielite." #NT!
 panum.2004.t: "Patógeno e vacina" #NT!
 panum.2004.d: "Foi com prazer que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que havia muitas pessoas com idéias semelhantes no Congresso em [SCOPE.sCountry('panum_congress_host_country').GetName] que estavam dispostas a compartilhar seu conhecimento microbiológico. A única questão é qual das doenças maravilhosas §2 gostaria de saber mais no futuro?" #NT!
 panum.2004.f: "Se uma nação que frequenta o Congresso Médico conhece um patógeno de uma doença ou vacina para uma doença que outro país não possui, o último poderá aprender no Congresso. O conhecimento só pode ser melhorado sobre uma doença. Se nenhum novo conhecimento for possível no Congresso, ainda existe a possibilidade de acumular conhecimento geral e melhorar uma tecnologia biológica. A participação de um biólogo com o traço de microbiologista é crucial para isso." #NT!
 panum.2004.g: "Nosso cientista deve reunir algum conhecimento biológico geral de colegas." #NT!
 panum.2005.t: "Uma visão médica" #NT!
 panum.2005.d_general: "Os médicos e biólogos do Congresso decidiram, em particular, modernizar e melhorar o treinamento de possíveis estudantes de medicina e escreveram uma declaração conjunta sobre isso." #NT!
 panum.2005.d_special: "Dado o foco principal da conferência, médicos e biólogos votaram para mudar todos os esforços para combater uma doença específica nos próximos anos." #NT!
 panum.2005.f: "Se um determinado tópico foi declarado o tópico principal no início do Congresso Médico, todas as nações participantes receberão pistas adicionais sobre esta doença - dependendo se um físico, um microbiologista ou ambos estão presentes. Se é um congresso geral, o foco está no treinamento de uma nova equipe médica." #NT!
 panum.2005.g: "O evento valeu a pena." #NT!
  
 panum.2009.t: "Congresso médico termina" #NT!
 panum.2009.d: "O Congresso Médico em [SCOPE.sCountry('panum_congress_host_country').GetName] terminou ontem. Médicos e microbiologistas estão a caminho de casa novamente e estão trazendo de volta inúmeras descobertas." #NT!
 panum.2009.f: "O Congresso Médico Internacional (francês: congrès International de Médecine) foi uma série de conferências científicas internacionais sobre medicina que ocorreu, periodicamente, de 1867 a 1913. A idéia de um congresso ocorreu em 1865, durante o terceiro Congresso Médico Anual da França; O professor Henri Giutrac propôs realizar uma conferência médica internacional em 1867, aproveitando o fato de que médicos e cirurgiões de todo o mundo certamente estariam em Paris para participar da exposição internacional daquele ano." #NT!
 panum.2009.g: "Espero que o buffet tenha sido bom?" #NT!
  
