 panum_congress_host_modifier: "Recentemente sediou um Congresso Médico" #NT!
 panum_congress_attend_modifier: "Participa de Congresso Médico" #NT!
  
 panum.2000.t: "Preparativos para o congresso médico" #NT!
 panum.2000.d: "Antes do próximo Congresso Médico Internacional ser realizado em nosso país, surge a questão se o congresso deve se concentrar em uma doença específica ou não." #NT!
 panum.2000.f: "As conferências médicas podem se concentrar em uma doença específica se a nação anfitriã tiver pelo menos uma descrição da doença. Um congresso só pode ser realizado uma vez para cada doença. Médicos e microbiologistas presentes recebem pistas adicionais para que possam avançar em suas pesquisas mais rapidamente. Em um congresso geral, as nações participantes simplesmente recebem um bônus por seu progresso acadêmico." #NT!
 panum.2000.g: "Esta deveria ser uma conferência médica geral." #NT!
 panum.2001.t: "Congresso Médico" #NT!
 panum.2001.d: "A capital se prepara para o encontro internacional de médicos especialistas. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] presidirá as reuniões como presidente. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2001.f: "As conferências médicas são uma excelente oportunidade para trocar conhecimento médico. Conquistas que antes eram reservadas para apenas um país são compartilhadas aqui de forma fraterna. As conferências médicas só podem ser organizadas por médicos, mas biólogos com especialização em microbiologia também são convidados e podem compartilhar seus conhecimentos no campo de patógenos e vacinas. Se um país tiver um médico e um microbiologista, ambos podem participar." #NT!
 panum.2001.g: "Envie os convites!" #NT!
 panum.2002.t: "Convite para Congresso Médico" #NT!
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName] está convidando as principais nações médicas para um congresso internacional em sua capital. Médicos e microbiologistas estão convidados. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2002.g: "Não se esqueça dos estetoscópios e microscópios!" #NT!
 panum.2003.t: "Descrições e Tratamentos" #NT!
 panum.2003.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem a oportunidade única de obter insights epidemiológicos inovadores no Congresso Médico em [SCOPE.sCountry('panum_congress_host_country').GetName]. Qual doença deve ser o foco?" #NT!
 panum.2003.f: "Se uma nação que participa do Congresso Médico souber uma descrição de uma doença ou um tratamento para uma doença que outro país não possui, então este último pode aprender no congresso. O conhecimento só pode ser melhorado sobre uma doença. Se nenhum conhecimento novo for possível no congresso, ainda há a possibilidade de acumular conhecimento geral e melhorar uma tecnologia médica. A participação de um médico é crucial para isso." #NT!
 panum.2003.g: "O médico deve reunir algum conhecimento médico geral dos colegas." #NT!
 panum.2003.h: "Cólera." #NT!
 panum.2003.i: "Tuberculose." #NT!
 panum.2003.j: "Varíola." #NT!
 panum.2003.k: "Tifo." #NT!
 panum.2003.l: "Febre amarela." #NT!
 panum.2003.m: "Sarampo." #NT!
 panum.2003.n: "Escarlatina." #NT!
 panum.2003.o: "Praga." #NT!
 panum.2003.p: "Difteria." #NT!
 panum.2003.q: "Poliomielite." #NT!
 panum.2004.t: "Patógeno e Vacina" #NT!
 panum.2004.d: "Foi com prazer que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que havia muitas pessoas com ideias semelhantes no congresso em [SCOPE.sCountry('panum_congress_host_country').GetName] que estavam dispostas a compartilhar seus conhecimentos microbiológicos. A única questão é sobre qual das doenças maravilhosas [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] gostaria de saber mais no futuro?" #NT!
 panum.2004.f: "Se uma nação que participa do Congresso Médico conhece um patógeno de uma doença ou uma vacina para uma doença que outro país não possui, então este último pode aprender no congresso. O conhecimento só pode ser melhorado sobre uma doença. Se nenhum novo conhecimento for possível no congresso, ainda há a possibilidade de acumular conhecimento geral e melhorar uma tecnologia biológica. A participação de um biólogo com a característica de microbiologista é crucial para isso." #NT!
 panum.2004.g: "Nosso cientista deve reunir algum conhecimento biológico geral dos colegas." #NT!
 panum.2005.t: "Uma Visão Médica" #NT!
 panum.2005.d_general: "Os médicos e biólogos presentes no congresso decidiram, em particular, modernizar e melhorar a formação de futuros estudantes de medicina e escreveram uma declaração conjunta sobre isso." #NT!
 panum.2005.d_special: "Dado o foco principal da conferência, médicos e biólogos votaram para mudar todos os esforços para combater uma doença específica nos próximos anos." #NT!
 panum.2005.f: "Se um determinado tópico foi declarado o tópico principal no início do congresso médico, todas as nações participantes receberão pistas adicionais sobre essa doença - dependendo se um físico, um microbiologista ou ambos estão presentes. Se for um congresso geral, o foco é treinar novos profissionais médicos." #NT!
 panum.2005.g: "O evento valeu a pena." #NT!
  
 panum.2009.t: "Fim do Congresso Médico" #NT!
 panum.2009.d: "O Congresso Médico em [SCOPE.sCountry('panum_congress_host_country').GetName] terminou ontem. Médicos e microbiologistas estão a caminho de casa novamente e estão trazendo inúmeras descobertas." #NT!
 panum.2009.f: "O Congresso Médico Internacional (em francês: Congrès International de Médecine) foi uma série de conferências científicas internacionais sobre medicina que ocorreram periodicamente de 1867 a 1913. A ideia de tal congresso surgiu em 1865, durante o terceiro Congresso Médico Anual da França; o professor Henri Giutrac propôs a realização de uma conferência médica internacional em 1867, aproveitando o fato de que médicos e cirurgiões de todo o mundo certamente estariam em Paris para participar da Exposição Internacional daquele ano." #NT!
 panum.2009.g: "Espero que o buffet tenha sido bom?" #NT!
  
 panum_surgeon: "Cirurgião" #NT!
 panum_surgeon_desc: "Os cirurgiões estão em casa na vida médica cotidiana, mas podem ser úteis em pesquisas médicas ou tratados anatômicos." #NT!
 panum_psychiatrist: "Psiquiatra" #NT!
 panum_psychiatrist_desc: "Os psiquiatras estão interessados ​​em melhorar as condições de pessoas com doenças mentais e estão impulsionando pesquisas e novos métodos de tratamento nessa área." #NT!
 panum_military_physician: "Médico Militar" #NT!
 panum_military_physician_desc: "Este médico é especialista em cuidar de feridos no campo de batalha e é particularmente bem-sucedido em melhorar os primeiros socorros." #NT!
 panum_yellow_fever: "Febre amarela" #NT!
  
