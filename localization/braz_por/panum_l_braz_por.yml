 panum_administrative_evacuation_modifier: "Evacuação Administrativa" #NT!
 panum_yellow_fever_barracks_modifier: "Febre Amarela em Quartel" #NT!
 panum_yellow_fever_port_modifier: "Febre Amarela no Porto" #NT!
  
 panum.301.t: "A varíola se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.301.d: "De acordo com os últimos relatórios, a doença da varíola agora também está desenfreada em [SCOPE.sState('panum_disease_state').GetName]. Nossos esforços para deter a epidemia não tiveram sucesso." #NT!
 panum.301.g: "Varíola em todo lugar!" #NT!
 panum.302.t: "Epidemia de varíola atinge [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.302.d: "Recebemos relatos de que os primeiros casos de varíola foram relatados em [SCOPE.sCountry('panum_infected_country').GetName] hoje. As autoridades nos culpam por não fazer o suficiente para impedir a disseminação." #NT!
 panum.302.g: "Quem poderia imaginar que...?" #NT!
 panum.303.t: "Varíola fora de controle" #NT!
 panum.303.d: "O sistema de saúde em [SCOPE.sState('panum_disease_state').GetName] foi levado à beira do colapso. Os médicos já estão deixando a área porque eles próprios correm o risco de serem infectados. Infelizmente, temos que ajustar o número de mortos na região para cima." #NT!
 panum.303.f: "'Nenhuma tentativa foi feita para contar as vítimas, nem é possível contá-las em nenhuma dessas tribos com precisão; acredita-se que se o número de 17.200 dos índios do alto Rio Missouri fosse dobrado, o total não seria muito grande para aqueles que caíram a leste das Montanhas Rochosas.'" #NT!
 panum.303.g: "Não há cura para esta doença terrível?" #NT!
  
 panum.401.t: "O tifo se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.401.d: "O tifo perigoso aparentemente se espalhou para outro estado. Relatórios do [SCOPE.sState('panum_disease_state').GetName] sugerem que mais e mais pessoas estão sendo vítimas da doença." #NT!
 panum.401.g: "O tifo parece imparável..." #NT!
 panum.402.t: "Uma doença de corrupção moral?" #NT!
 panum.402.d: "Dado o conhecimento limitado sobre o que é tifo, o que o causa e como combatê-lo efetivamente, há inúmeras teorias sobre o que promove a infecção. A visão predominante é que é uma doença relacionada ao estilo de vida, não à transmissão." #NT!
 panum.402.f: "Semelhante à tuberculose, havia muitos médicos que presumiam que o tifo não era uma doença contagiosa. Enquanto a tuberculose era vista de uma forma quase romantizada - era uma doença dos românticos e, portanto, de espíritos 'nobres' - no caso do tifo, a doença era vista como um estigma de descrédito moral. O fato de as classes mais altas não serem afetadas levou a um certo sentimento de superioridade. Assim como na Idade Média as doenças eram frequentemente atribuídas à influência ou punição divina, parecia ser um fato comprovado que defeitos de caráter ou depravação estavam, até certo ponto, ligados a certas doenças. Foi somente a partir do segundo terço do século XIX que essa visão começou a mudar." #NT!
 panum.402.g: "Há uma razão pela qual o tifo afeta principalmente criminosos, prostitutas e soldados imorais." #NT!
 panum.402.h: "Provavelmente importa menos o que essas pessoas são do que onde elas vivem." #NT!
 panum.403.t: "Quarentena" #NT!
 panum.403.d: "Há um desejo, particularmente por parte das classes média e alta, de fornecer às classes sociais mais baixas afetadas pelo tifo suas próprias instalações. Essas 'casas de febre' também seriam pagas por organizações sem fins lucrativos. No entanto, alguns representantes das classes mais pobres veem isso mais como um método de exclusão do que de assistência médica. Alguns membros do governo, por outro lado, querem uma quarentena completa, o que a classe média em particular considera uma medida completamente excessiva." #NT!
 panum.403.f: "Como muitas outras epidemias, o tifo serviu para segregar. O apelo por uma quarentena geral foi, portanto, impopular em muitos lugares porque se acreditava que certas pessoas poderiam ser atribuídas à doença, especialmente porque muitos acreditavam que era hereditário. No entanto, o medo subjacente de infecção desempenhou um papel, e é por isso que casas de febre foram construídas em muitos lugares. Durante a grande epidemia de tifo na América do Norte em 1847, a ideia de que era uma doença contagiosa se tornou tão difundida que massas de imigrantes irlandeses infectados foram de fato deportadas para tais instituições." #NT!
 panum.403.g: "Toda a área deve ser colocada em quarentena." #NT!
 panum.403.h: "Leve os portadores de tifo para casas especiais." #NT!
 panum.403.i: "O tifo não é uma doença contagiosa, então a quarentena não faz sentido." #NT!
 panum.404.t: "Galpões imundos" #NT!
 panum.404.d: "A situação nas supostas casas de febre, que estão se transformando cada vez mais em caixões superlotados cheios de fezes e miséria, já se tornou um problema sério no [SCOPE.sState('panum_disease_state').GetName]. Pastores e cuidadores de doentes escreveram uma carta pedindo que essas casas terríveis sejam desmanteladas." #NT!
 panum.404.f: "Os galpões de febre eram imundos e lotados, com pacientes deitados em beliches duplos que permitiam que a sujeira do beliche de cima caísse no de baixo. De acordo com o relatório do Comitê do Senado, dois ou três inválidos seriam colocados juntos em um beliche, independentemente da idade ou sexo. Não havia pão: as refeições consistiam em chá, mingau ou caldo servido três vezes ao dia. Como a água potável era transportada, nunca havia o suficiente para os pacientes com febre. Um padre católico, o padre Moylan, relatou dar água a inválidos em uma tenda que não conseguiam beber por 18 horas. Os galpões não foram originalmente planejados para abrigar pacientes com febre e não tinham ventilação; novos galpões foram construídos sem latrinas. O Comitê do Senado declarou que, devido à falta de pessoal e espaço, os inválidos ficavam em seus próprios excrementos por dias e não havia pessoal suficiente para levar aqueles que morriam durante a noite." #NT!
 panum.404.g: "Não podemos correr o risco de mais pessoas serem infectadas." #NT!
 panum.404.h: "Melhorar a situação dos que sofrem de tifo e fornecer ajuda médica." #NT!
 panum.404.i: "Desmantelem essas casas desumanas!" #NT!
 panum.405.t: "Revoltas contra galpões de febre" #NT!
 panum.405.d: "O medo da propagação do tifo em [SCOPE.sState('panum_disease_state').GetName] radicalizou alguns cidadãos a ponto de eles formarem uma multidão enfurecida. Há um rumor circulando de que eles querem empurrar as casas de febre e seus pacientes para o rio mais próximo!" #NT!
 panum.405.f: "Em 1847, o número de galpões em Montreal aumentaria para 22, com tropas isolando a área para que os doentes não pudessem escapar. Quando uma multidão ameaçou jogar os galpões de febre no rio, o prefeito de Montreal, John Easton Mills, reprimiu o tumulto e forneceu cuidados, dando água aos pacientes e trocando as roupas de cama. Ele morreu em novembro, cumprindo menos de um ano no cargo." #NT!
 panum.405.g: "Essa barbárie não tem lugar no nosso país!" #NT!
 panum.405.h: "Eles morrem de qualquer maneira." #NT!
 panum.406.t: "Cadáveres não enterrados" #NT!
 panum.406.d: "O número de mortes em [SCOPE.sState('panum_disease_state').GetName] está aumentando tão rapidamente que os agentes funerários mal conseguem acompanhar o número. Há o perigo de que os corpos não enterrados possam levar a problemas ainda maiores." #NT!
 panum.406.f: "Na década de 1860, condições climáticas excepcionalmente severas e perdas de colheitas afligiram o que era então o Grão-Ducado da Finlândia, levando à fome e doenças epidêmicas. De 1866 a 1868, a fome e, especialmente, o que foi considerado na época como tifo, mataram 270.000 pessoas na região." #NT!
 panum.406.g: "Use todos os meios disponíveis para evitar que esse problema se torne insuportável." #NT!
 panum.406.h: "Cave as valas comuns de sempre." #NT!
 panum.406.i: "Nossas capacidades estão esgotadas, você tem que organizar as coisas sozinho!" #NT!
 panum.407.t: "Tifo no Quartel" #NT!
 panum.407.d: "Atualmente, o tifo está contaminando principalmente as instalações militares de [SCOPE.sState('panum_disease_state').GetName]. Ele cobra seu preço mortal lá." #NT!
 panum.407.f: "Muitos historiadores acreditam que o surto de tifo entre as tropas de Napoleão é a verdadeira razão pela qual ele paralisou sua campanha militar na Rússia, em vez de fome ou frio. O tifo foi um assassino significativo durante a Guerra Civil Americana, embora a febre tifoide tenha sido a causa mais prevalente da 'febre de acampamento' da Guerra Civil dos EUA. Cerca de 900.000 mortes foram atribuídas à febre tifoide durante a Guerra da Crimeia em 1853-1856. O tifo era endêmico na Polônia e em vários países vizinhos antes da Primeira Guerra Mundial (1914-1918), mas se tornou epidêmico durante a guerra. O tifo devastou os exércitos da Frente Oriental, onde mais de 150.000 morreram apenas na Sérvia. As fatalidades foram geralmente entre 10% e 40% dos infectados e a doença foi uma das principais causas de morte para aqueles que cuidavam dos doentes." #NT!
 panum.407.g: "Um inimigo invisível, mais mortal que qualquer exército..." #NT!
 panum.408.t: "Atormentado pela doença, não pela guerra" #NT!
 panum.408.d: "A epidemia de tifo em nossos quartéis continua a se espalhar a cada dia. Soldados estão agora entre os mais frequentemente mortos no [SCOPE.sState('panum_disease_state').GetName] - e sem influência inimiga." #NT!
 panum.408.f: "'A guerra não é uma aventura. É uma doença. É como tifo.' Antoine de Saint-Exupéry" #NT!
 panum.408.g: "Terrível!" #NT!

 panum.501.t: "Febre amarela se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.501.d: "Relatos de novos casos de febre amarela confirmaram nossos piores medos. A doença agora também está se alastrando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.501.g: "Por que não foi possível impedir isso?" #NT!
 panum.502.t: "Uma doença contagiosa?" #NT!
 panum.502.d: "Embora não esteja claro se a febre amarela é uma doença contagiosa ou tem outras causas, muitos cidadãos preocupados com a segurança estão pedindo quarentena para impedir a disseminação. Se não fizermos isso, eles podem ver isso como ignorância ou desinteresse em suas necessidades." #NT!
 panum.502.f: "Os primeiros surtos de febre amarela no século XVII causaram pânico e desorientação. Mesmo no século XVIII, as pessoas discordavam amplamente sobre o que desencadeava uma infecção. Embora governos e indivíduos tenham recorrido a medidas rigorosas ou prevenção, não houve sucesso. O medo da febre amarela significava que nenhuma oportunidade era desperdiçada para impedir sua disseminação, às vezes com medidas experimentais ou draconianas. Algumas ações poderiam, portanto, ter razões psicológicas em vez de médicas para evitar a escalada do descontentamento entre a população." #NT!
 panum.502.g: "Não há evidências de que esta seja uma doença contagiosa." #NT!
 panum.503.t: "Febre Amarela afeta plantações" #NT!
 panum.503.d: "Relatórios são recebidos diariamente de que as plantações em [SCOPE.sState('panum_disease_state').GetName] em particular têm uma alta taxa de portadores de febre amarela. Alguns conselheiros do governo estão pressionando para parar o trabalho lá completamente para reduzir a disseminação." #NT!
 panum.503.f: "'Um pobre homem negro, chamado Sampson, ia constantemente de casa em casa onde havia sofrimento, e nenhuma assistência, sem taxa ou recompensa. Ele foi atingido pela desordem, e morreu. Após sua morte, sua família foi negligenciada por aqueles a quem ele serviu. Sarah Bass, uma pobre viúva negra, deu toda a assistência que pôde, em várias famílias, pelas quais ela não recebeu nada; e quando qualquer coisa lhe foi oferecida, ela deixou para a opção daqueles a quem serviu.' -Richard Allen" #NT!
 panum.503.g: "Tirem os trabalhadores dos campos!" #NT!
 panum.503.h: "A plantação deve continuar a funcionar, a todo custo!" #NT!
 panum.504.t: "Evacuação" #NT!
 panum.504.d: "A situação da saúde em [SCOPE.sState('panum_disease_state').GetName] continua a piorar. Membros do governo local e da administração pediram para deixar a cidade e organizar a administração do campo. Alguns consideram uma sugestão inteligente, outros consideram pura covardia." #NT!
 panum.504.f: "Durante a epidemia de febre amarela de 1793 na Filadélfia, 5.000 ou mais pessoas foram listadas no registro de mortes entre 1º de agosto e 9 de novembro. A grande maioria delas morreu de febre amarela, tornando a epidemia na cidade de 50.000 pessoas uma das mais severas da história dos Estados Unidos. No final de setembro, 20.000 pessoas fugiram da cidade, incluindo autoridades do Congresso e do executivo do governo federal. A maioria não retornou até que a epidemia tivesse diminuído no final de novembro. O presidente George Washington deixou a cidade para sua propriedade em Mount Vernon. A taxa de mortalidade atingiu o pico em outubro, antes que a geada finalmente matasse os mosquitos e acabasse com o surto. Algumas cidades vizinhas se recusaram a deixar refugiados da Filadélfia entrarem, temendo que estivessem carregando a febre. Grandes cidades portuárias, incluindo aquelas em Baltimore e Nova York, tinham quarentenas contra refugiados e mercadorias da Filadélfia, embora a cidade de Nova York tenha enviado ajuda financeira para a Filadélfia." #NT!
 panum.504.g: "Evacue as autoridades." #NT!
 panum.504.h: "A administração local não deve entrar em colapso." #NT!
 panum.505.t: "Febre amarela se espalha para quartéis" #NT!
 panum.505.d: "A febre amarela está contaminando principalmente as instalações militares de [SCOPE.sState('panum_disease_state').GetName]. Ela cobra seu preço mortal lá." #NT!
 panum.505.f: "Para os rebeldes no Haiti na virada dos séculos XVIII e XIX e em Cuba quase 100 anos depois, a febre amarela era a grande aliada contra os exércitos coloniais enviados da Europa. O líder da luta pela independência cubana falou de seus 'generais invencíveis junho, julho, agosto' - aqueles meses em que as chuvas vêm e com elas os mosquitos. Os britânicos tiveram experiências semelhantes durante o cerco de Cartagena em 1741. 29.000 soldados britânicos sitiaram a fortaleza. Quando as chuvas começaram, 22.000 pereceram miseravelmente em poucas semanas. A taxa de mortalidade nas guarnições britânicas na Jamaica era sete vezes maior que a das guarnições no Canadá, principalmente por causa da febre amarela e outras doenças tropicais." #NT!
 panum.505.g: "Não! Eles estavam destinados a uma morte honrosa no campo de batalha!" #NT!
 panum.506.t: "Doença do marinheiro" #NT!
 panum.506.d: "As operações portuárias em [SCOPE.sState('panum_disease_state').GetName] pararam virtualmente devido à febre amarela. Por um lado, muitos trabalhadores portuários e marítimos estão doentes. Por outro lado, o máximo possível de navios tenta evitar a região amaldiçoada." #NT!
 panum.506.f: "'A mais deplorável devastação está sendo feita em Nova Orleans pela febre amarela. Milhares foram levados por suas devastações, e a cada dia acrescentam-se mais 200 ao registro medonho. Os mortos são enterrados em trincheiras por gangues de negros, contratados por um guinéu a hora. E assim, com as canções e as piadas obscenas dos coveiros, o zumbido das moscas, os gritos cantados das mulheres vendedoras de doces, os juramentos roucos dos homens que conduzem as carroças dos mortos, o assobio alegre dos meninos e o fedor sufocante das dezenas de cadáveres enegrecidos, o dia passa rapidamente, o trabalho de sepultamento é feito, e a noite desce a cortina. Enquanto isso, diversões, regatas, bailes, etc. estão ocorrendo como de costume, como se nenhuma pestilência tão terrível estivesse na cidade condenada.' - Cambridge Weekly News em 1853" #NT!
 panum.506.g: "Um colapso para o transporte marítimo!" #NT!
 panum.507.t: "Vômito preto" #NT!
 panum.507.d: "Em [SCOPE.sState('panum_disease_state').GetName], a febre amarela está atacando mais violentamente do que o esperado. Os médicos relatam que mais pessoas do que antes morreram da doença." #NT!
 panum.507.f: "'Aqueles que se aventuravam no exterior, tinham lenços ou esponjas impregnadas com vinagre de cânfora em seus narizes, ou frascos de cheiro cheios de vinagre dos ladrões. Outros carregavam pedaços de corda alcatroada em suas mãos ou bolsos, ou sacos de cânfora amarrados em volta de seus pescoços... As pessoas mudavam rapidamente de curso ao ver um carro funerário vindo em sua direção. Muitos nunca andavam na calçada, mas iam para o meio das ruas, para evitar serem infectados ao passar por casas onde pessoas haviam morrido. Conhecidos e amigos evitavam uns aos outros nas ruas, e apenas demonstravam sua consideração com um aceno frio. O antigo costume de apertar as mãos caiu em desuso tão geral, que muitos recuavam com medo até mesmo com a oferta de uma mão. Uma pessoa com crepe de luto, ou qualquer aparência de luto, era evitada como uma víbora.'' -Mathew Carey" #NT!
 panum.507.g: "Quando finalmente seremos libertados desta praga?" #NT!
  
