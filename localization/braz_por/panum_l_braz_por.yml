 je_panum_disease_investigation: "Exame da doença" #NT!
 je_panum_disease_investigation_reason: "Às vezes, pode acontecer que um médico, durante sua pesquisa médica habitual, se dedique à investigação de uma doença muito específica. Esta não é uma doença epidêmica, mas doenças cotidianas, doenças infantis ou doenças generalizadas. Exemplos disso incluem raquitistas, pedras nos rins ou sífilis. \ N \ NunLee Em outros casos, o médico realiza esta pesquisa ao lado, o que significa que ele não está ocupado e não está disponível para atividades adicionais. Se um médico morre, o projeto não se perde, mas é suspenso até que outro médico assuma o controle." #NT!
  
