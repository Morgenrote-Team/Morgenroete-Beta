  ### 2.3.7 ### 
  
 panum.1007.t: "Clínica de Pólio" #NT!
 panum.1007.d: "A irmã [SCOPE.sCharacter('panum_polio_nurse').GetFirstName] fundou uma clínica de poliomielite em [SCOPE.sState('panum_disease_state').GetName] para poder cuidar dos muitos pacientes lá." #NT!
 panum.1007.f: "“Ela era uma mulher muito alta e elegante, e inspirou confiança apenas por sua maneira e pela maneira como se carregava. Ela tinha um sotaque delicioso, o que fez dela uma pessoa interessante para ouvir. Se eu fechar os olhos, ainda posso visualizá -la parada ao lado da minha cama usando um vestido longo e preto e um chapéu grande com uma bela pena de avestruz ... ela não usava jóias e não usava maquiagem. Lembro -me do rosto dela como forte e angular, e seus olhos eram muito intensos. Quando ela olhou nos olhos, essa intensidade exigiu toda a sua atenção e, quando ela falou, as pessoas a ouviram ... todo mundo sabia quem estava no comando, e recebemos qualquer tratamento que ela recomendou. Eu nunca conheci ninguém tão assertivo quanto ela." #NT!
 panum.1007.g: "Obrigado, irmã [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]." #NT!
 panum.1008.t: "Depressão da poliomielite" #NT!
 panum.1008.d: "As muitas crianças que são mutiladas para a vida não apenas têm um impacto na saúde física da próxima geração, mas também nos pais, que acusam o governo de fazer muito pouco." #NT!
 panum.1008.f: "Lembro -me vividamente do primeiro dia em que usava a cinta para a escola. Era o meio do dia escolar. Aparentemente, eu tinha ido ao médico naquela manhã para instalar a cinta. Minha mãe me deixou na porta, e eu lembro que ela tinha lágrimas nos olhos enquanto eu era embora." #NT!
 panum.1008.g: "Irracional, mas não incompreensível." #NT!
