 je_panum_functionalism: "Escola Psicológica de Funcionalismo" #NT!
 je_panum_functionalism_reason: "Psicologia funcional ou funcionalismo refere -se a uma escola psicológica de pensamento que foi uma conseqüência direta do pensamento darwiniano que concentra a atenção na utilidade e no objetivo do comportamento que foram modificados ao longo dos anos de existência humana. Edward L. Thorndike, mais conhecido por seus experimentos com aprendizado de julgamento e erro, passou a ser conhecido como o líder do movimento vagamente definido. O funcionalismo nega o princípio da introspecção, que tende a investigar o funcionamento interno do pensamento humano, em vez de entender os processos biológicos da consciência humana." #NT!
 je_panum_psychoanalysis: "Escola Psicológica de Psicanálise" #NT!
 je_panum_psychoanalysis_reason: "A psicanálise é uma teoria psicológica, teoria cultural, forma psicoterapêutica de tratamento e método de autoconsciência, que foi desenvolvida por volta de 1890 pelo médico viennense Sigmund Freud. O termo psicanálise representa o modelo de descrição e explicação da psique humana com base nas teorias de Freud sobre a psicodinâmica do inconsciente, bem como para a psicoterapia analítica e para a metodologia psicanalítica, que também lida com a investigação de fenômenos culturais. Nos três aspectos, a psicanálise continua sendo desenvolvida e alterada por clínicos e pesquisadores hoje." #NT!
 je_panum_analytical_psychology: "Escola Psicológica de Psicologia Analítica" #NT!
 je_panum_analytical_psychology_reason: "A psicologia analítica é uma escola psicanaliticamente baseada em psicologia fundada pelo psiquiatra suíço Carl Gustav Jung em 1913. Semelhante à psicanálise, lida com as partes inconscientes da psique humana, sob a suposição de que o inconsciente tem uma influência muito maior que a percepção consciente. Jung e seus sucessores enfatizaram particularmente as possibilidades de expressão simbólica do inconsciente e tentaram usá -los psicoterapêuticos." #NT!
 je_panum_behaviorism: "Escola Psicológica de Comportamentismo" #NT!
 je_panum_behaviorism_reason: "Comportamentism é o conceito de teoria científica de examinar e explicar o comportamento de pessoas e animais usando métodos científicos - ou seja, sem introspecção ou empatia. O behaviorismo foi fundado por John B. Watson no início do século XX, após importante trabalho preliminar de Edward Lee Thorndike. Ivan Petrovich Pavlov também realizou um importante trabalho pioneiro com seus experimentos sobre o condicionamento clássico do comportamento. Nos EUA, os defensores do behaviorismo foram durante décadas os pesquisadores comportamentais mais influentes das universidades e os oponentes firmes das escolas psicanalíticas que estavam emergindo ao mesmo tempo." #NT!
  
 panum_functionalism_school_founded_tt: "A Escola Psicológica de Funcionalismo foi fundada em outro país." #NT!
 panum_psychoanalysis_school_founded_tt: "A Escola Psicológica de Psicanálise foi fundada em outro país." #NT!
 panum_analytical_psychology_school_founded_tt: "A Escola Psicológica de Psicologia Analítica foi fundada em outro país." #NT!
 panum_behaviorism_school_founded_tt: "A Escola Psicológica de Comportamentismo foi fundada em outro país." #NT!
  
 panum_psychotherapeutic_level_rises_tt: "O nível psicoterapêutico de § 0 aumenta." #NT!
  
 panum.541.t: "No coração febril" #NT!
 panum_yellow_fever_fork_note_tt: "#R Nota: #! A segunda opção será possível se o médico tiver o traço de biólogo ou microbiologista." #NT!
 panum.165.t: "O coração da infecção" #NT!
 panum_physician_health_bonus_modifier: "Seguro, desculpe" #NT!
 panum.168.f: "'Pare! Quem está fora e, neste momento de - Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] O que quer que você esteja fazendo tão tarde? Cada minuto é precioso, mesmo depois da meia -noite. Essas ruas não são seguras à noite! Se você me desculpar, Constable, há mais trabalho a ser feito antes que meu óleo de lanterna queime. Eu tenho uma dúzia de frascos para encher com água dos canais e bombas, casas para visitar, valas para examinar. '\ N \ n'aye, bem, muito bem então. Você não está fazendo nada de errado, mas melhor eu te dou uma escolta da mesma forma." #NT!
 panum.3033.d: "A esmagadora maioria dos membros da Cruz Vermelha concordou com a terceira convenção internacional sobre o uso de armas químicas. Agora é vinculativo para todos os membros." #NT!
 notification_panum_technology_boost_from_physician_notification_name: "Boost de pesquisa para [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]" #NT!
 notification_panum_technology_boost_from_physician_notification_desc: "Obrigado ao Dr. [GetPlayer.MakeScope.GetVariable('panum_physician_var').GetCharacter.GetLastName] [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')] recebeu um impulso de pesquisa." #NT!
 je_panum_medical_research_project_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está atualmente impulsionando a pesquisa médica adiante. Além das inovações médicas, o Dr. §1 também pode encontrar curas para doenças que não estão entre as dez doenças epidêmicas clássicas. Toda vez que o progresso atingir [JournalEntry.GetTotalGoalValue|V0], obteremos um pequeno aumento de tecnologia. Use o botão para interromper." #NT!
  
 panum.2611.t: "Institucionalização" #NT!
 panum.2611.d: "Em vista das condições inaceitáveis ​​de alguns asilos mentais, médicos e figuras políticas estão pressionando que as práticas lá sejam reformadas. Eles defendem lugares isolados onde os psiquiatras podem viver uma vida solitária com seus pacientes, longe do tráfego." #NT!
 panum.2611.f: "A era moderna da provisão institucionalizada para os cuidados dos doentes mentais começou no início do século XIX com um grande esforço liderado pelo Estado. Asilos mentais públicos foram estabelecidos na Grã -Bretanha após a aprovação da Lei de Asilos do Condado de 1808. Isso capacitou os magistrados a construir asilos apoiados por taxas em todos os municípios a abrigar os muitos 'lunáticos pobre'. A Lei Lunacia de 1845 foi um marco importante no tratamento dos doentes mentais, pois mudou explicitamente o status de pessoas com doenças mentais para pacientes que precisavam de tratamento. A lei criou a Comissão Lunacia, liderada por Lord Shaftesbury, para se concentrar na reforma da legislação de loucura. O Geral Journal of Psychiatry deve ser mencionado como um órgão da psiquiatria institucional alemã entre 1830 e 1860. Foi fundada por Heinrich Damerow junto com Carl Friedrich Flemming e Christian Friedrich Wilhelm Roller em 1844." #NT!
 panum.2611.g: "A pesquisa psiquiátrica e psicológica está progredindo." #NT!
 panum.2612.t: "Doença do cérebro" #NT!
 panum.2612.d: "Na psiquiatria, a teoria da evolução é acompanhada por mudanças significativas. Uma nova geração de psiquiatras está postulando que doenças mentais são doenças do cérebro. A psiquiatria cientificamente orientada está substituindo a visão de humanidades prevalecentes anteriormente." #NT!
 panum.2612.f: "Wilhelm Griesinger é considerado uma das figuras mais importantes da reviravolta científica da psiquiatria. Ele conheceu François Magendie, fundador da fisiologia experimental e autor do primeiro livro moderno sobre fisiologia, cuja abordagem de pesquisa o influenciou muito. Em 1839, ele se mudou para Friedrichshafen no lago Constance como médico praticante. No ano seguinte, 1840, ele recebeu uma oferta de trabalhar como médico secundário no asilo insano de Winnenthal. Nos dois anos seguintes em que ele trabalhou lá, Griesinger ganhou uma riqueza de experiência prática, que se tornou a base para seu principal trabalho 'a patologia e a terapia de doenças mentais', publicada em 1845 e inaugurando uma nova era em psiquiatria. Nele, ele tentou encontrar psiquiatria com base na fisiologia e patologia médica. A famosa declaração de Griesinger pode ser encontrada na primeira página, segundo a qual, para entender todos os sintomas da doença, é necessário localizar o fenômeno em questão e reconhecer todas as doenças mentais como doenças do cérebro." #NT!
 panum.2613.t: "Classificação de transtornos mentais" #NT!
 panum.2613.d: "Psiquiatras e psicólogos começaram a classificar doenças mentais de acordo com um esquema que anteriormente estava disponível apenas no restante da medicina. Enquanto eles já conheciam apenas 'imbecil' e 'insanidade', agora reconhecem 7 categorias: mania, melancolia, monomania, paresia, demência, dipsomania e epilepsia." #NT!
 panum.2613.f: "O sistema triádico da tradição psiquiátrica alemã é um sistema de doenças psiquiátricas que é classificada de acordo com suas causas. A primeira descrição remonta a Emil Kraepelin; Kraepelin, por sua vez, foi baseada no trabalho preparatório de Karl Ludwig Kahlbaum. Kraepelin anunciou que havia encontrado uma nova maneira de olhar para a doença mental, referindo -se à visão tradicional como 'sintomática' e à sua visão como 'clínica'. Isso acabou sendo sua síntese de cenário de paradigma das centenas de transtornos mentais classificados pelo século XIX, agrupando doenças com base na classificação da síndrome - padrões comuns de sintomas ao longo do tempo - e não pela simples similaridade dos principais sintomas na maneira de seus antecessores." #NT!
 panum.2614.t: "Cura falando" #NT!
 panum.2614.d: "Apesar de muitas reservas, a abordagem psicológica está se tornando cada vez mais popular entre os psiquiatras. O caso de uma jovem que parece ter sido curada como resultado de longas discussões é vista como um modelo para um novo ponto de virada no tratamento de pacientes com doenças mentais." #NT!
 panum.2614.f: "As experiências que Josef Breuer obteve ao tratar Bertha Pappenheim (pseudônimo: Anna O.) em 1880/1881 formou a base para os estudos sobre histeria publicados juntamente com Sigmund Freud em 1895. Este trabalho (e a história do caso subjacente) foi descrito por Freud como raiz da Aradia, do Psycho do ponto de partida do ponto de partida do PSYSHONAL. Seguindo o trabalho pioneiro de Sigmund Freud, as idéias decorrentes da teoria psicanalítica também começaram a se enraizar na psiquiatria. A teoria psicanalítica tornou -se popular entre os psiquiatras porque permitiu que os pacientes fossem tratados em consultórios particulares, em vez de armazenados em asilos." #NT!
 panum.2615.t: "Psicologia e filosofia" #NT!
 panum.2615.d: "Além da influência das escolas psicológicas na psiquiatria, há também uma crescente compreensão das influências filosóficas. O domínio das ciências naturais parece estar quebrado." #NT!
 panum.2615.f: "Karl Jaspers estava entre os primeiros psiquiatras do século XX a examinar e refletir sobre as suposições filosóficas de sua disciplina. Jaspers '' Psicopatologia Geral '(1913) é considerada o começo da pesquisa psicopatológica refletida metodicamente - ao lado de Wilhelm Griesinger, que definiu doenças mentais como doenças do cérebro, e Emil Kraepelin, que foi o primeiro a introduzir um sistema de referência nuológica útil na psiquiatria. Jaspers se referiu ao trabalho inicial de Husserl sobre psicologia descritiva e a distinção muito discutida de Wilhelm Dilthey entre 'explicar' e 'compreensão', com a qual ele também complementou a psicopatologia em um sentido metodológico." #NT!
  
 panum.2131.t: "Um prato para ganhar" #NT!
 panum.2131.d: "Com a descoberta do papel que a pobreza pode desempenhar em raquitistas, os sindicalistas assumiram o manto de lutar por refeições escolares gratuitas e leite!" #NT!
 panum.2131.f: "Começou lentamente no início - um vagão aqui ou ali estacionando fora da escola, dando ao leite infantil, à sopa e um pouco de pão. Agora, cresceu para se tornar muito mais: os sindicatos, socialistas e ativistas trabalhistas da nação adotaram a causa de não apenas lutar pela aula do proletariado, mas também para seus filhos. Posters with images of children with empty bowls and pleading eyes are ever more common in the streets, and the failure of the government to provide for its youngest and most vulnerable citizens is an easy cudgel to condemn it and its system.\n\nThe idea of ​​a free school meal and milk is spreading, like a wildfire, and is echoed by even the most extreme branches of the movement - if the government cannot be trusted to provide for the nation's children, then Para quem, verdadeiramente, é?" #NT!
 panum.2131.g: "Teremos nossa conta de leite gratuita, sim, sim, sim, nós o faremos!" #NT!
 panum.2131.h: "Não existe leite livre." #NT!
 panum_free_milk_modifier: "Leite grátis" #NT!
 panum_no_free_milk_modifier: "Sem leite grátis" #NT!
  
 panum_medical_techniques_level_rises_tt: "O nível de técnicas médicas de § [GetPlayer.GetName] aumenta." #NT!
  
 panum.561.t: "O caminho para uma vacina?" #NT!
 panum.561.d: "Após a instrução da capital, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] começou a investigar como tratar ou até curar a febre amarela." #NT!
 panum.561.f: "'' ... No entanto, eu me pergunto se talvez eu estivesse confiante demais em minha avaliação que eu poderia, de fato, derrotar a febre amarela. A doença tem poucas certezas conhecidas, mesmo com seus meios de transmissão um mistério, para não falar de suas origens. Pode -se sugerir um ressurgimento da teoria de Miasma da antiga? Quem pode reivindicar certeza diante de tanto mistério? Nem todos aqueles que encontram essa morte enigmática são mortos por ela; Alguns quase não têm nenhum sinal de que era essa febre amarela, e mais do que alguns se recuperam antes que se torne a vida. Encontrar a febre amarela é dançar com a morte, certamente, mas não é certo que ela reivindique a você ... '" #NT!
 panum.561.g: "... e se pudermos parar em qualquer lugar, ainda poderíamos impedi -lo em todos os lugares." #NT!
 panum.562.t: "O orfanato" #NT!
 panum.562.d: "Examinando toda e qualquer instância de recuperação da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] chegou a uma casa com muitos sobreviventes - um orfanato." #NT!
 panum.562.f: "'Ah, olá, você deve ser a amante deste orfanato ... Vejo que as crianças brincam com tinta hoje.' \ N'ebenidere me, não tenho a primeira pista onde elas conseguiram - oh, você deve ser o médico que eles disseram que estaria ligando! Receio que as tosses já tenham esclarecido, então não há -'\ n'eu Receio que eu não sou esse médico, senhora. Eu venho da capital, investigando a febre amarela. Disseram -me que a doença já passou por aqui? '\ N'oh sim, os mais pequenos. Eles tiveram, muitos até. Alguns vêm de famílias eliminadas pela doença, as coisas pobres, mas ela gosta de poupar as crianças, ao que parece. '\ Nfascinating. Você tem alguma teorias -'\ n'Children! Venha, venha! Há um homem legal da capital aqui para falar com você! '\ N'oh ... Olá, filhos. Meu nome é o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], e eu gostaria de falar sobre febre amarela ..." #NT!
 panum.562.g: "Qual é a razão pela qual os pais morrem, mas as crianças sobrevivem?" #NT!
 panum.563.t_america: "O sangue velho" #NT!
 panum.563.d_america: "Em uma tentativa de descobrir mais sobre a febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] decidiu visitar as famílias de alguns dos primeiros colonos nessas terras." #NT!
 panum.563.f_america: "'' ... e, no entanto, nem todas as primeiras famílias dessas terras se foram. Ainda existem alguns que podem rastrear sua história de volta às primeiras expedições aqui, ótimas ou pequenas. É para essas famílias que transformei minha investigação, pois algumas delas ainda mantêm revistas preciosas e registros que nos dão um vislumbre do passado antes de arquivos históricos adequados. Ele revela algo especialmente fascinante: os primeiros casos de febre amarela apareceram nessas terras em 1685 ou mais. Isso me leva a uma verdade." #NT!
 panum.563.g_america: "Eles são a mesma doença. A imunidade a um é a imunidade ao outro." #NT!
 panum.563.t_africa: "Os homens da tribo" #NT!
 panum.563.d_africa: "Em uma tentativa de descobrir mais sobre a febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou aqueles com a maior experiência de febre amarela - os africanos nativos." #NT!
 panum.563.f_africa: "'... e ainda assim, embora possamos perecer rapidamente, os africanos nativos perduram. É uma doença que eles são profundamente íntimos; Embora a barreira do idioma apresente um obstáculo significativo, é preciso apenas algumas descrições para que eles entendam a doença da qual falo. Eles têm uma resistência natural a isso, semelhante à que os europeus podem ter pela varíola que dei desperdício nas Américas? Talvez, mas os da herança africana que trabalham em nossas cidades morrem na mesma proporção que nós - algum outro fator, então, deve estar em jogo. Alimentar? Cultural? É uma possibilidade que eles sejam expostos jovens à febre amarela e, assim, desenvolvam uma imunidade duradoura, assim como a Cowpox pode conceder proteção contra a varíola." #NT!
 panum.563.g_africa: "E se eles puderem ser imunológicos ... então deve ser possível fazer uma vacina." #NT!
 panum.564.t: "A natureza do inimigo" #NT!
 panum.564.d: "Lutar contra uma doença exige descobrir mais sobre sua natureza, e o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desenvolveu um teste fascinante." #NT!
 panum.564.f: "'... No entanto, desde a revelação de que a cólera era uma doença transmitida pela água, tivemos a chance de examinar a possibilidade de remover tais doenças da água com filtração adequada. Demorou algum tempo para ser entregue, mas encontrei minhas mãos em um filtro de Berkefeld, uma engenhoca fantástica que pode filtrar a água através da terra de diatomáceas. É uma coisa extremamente precisa, capaz de remover bactérias uniformes. Eu preparei um frasco que consistia no sangue de vários dos infectados, diluí -o com água destilada e depois o derramei através do filtro. O que emergiu estava claro, líquido puro ... ou assim eu pensei. \ N \ Nand Há a surpresa: seja o que for, ele passou pelo filtro, comprovado por um voluntário corajoso o suficiente para injetá -lo. Eles ficaram doentes e lutam agora por sua vida. No entanto, isso prova que a febre amarela não é mero micróbio, é algo ainda menor que uma bactéria, algo que não podemos ver. \ N \ ni teria chamado isso de impossibilidade, mas encontrei nota tal em um diário médico. Eles chamam isso de vírus." #NT!
 panum.564.g: "Conheça o inimigo, destrua o inimigo." #NT!
 panum.565.t: "Não tratável?" #NT!
 panum.565.d: "Esperançoso para qualquer sinal de tratamento adequado, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visitou clínicas e hospitais locais para investigar suas práticas de tratamento." #NT!
 panum.565.f: "Ah, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], é um prazer conhecê -lo! Estamos aqui na clínica -'\ n'i, receio que precisemos interromper as gentilezas, doutor. Preciso visitar outras clínicas, hospitais, enfermarias, cerca de duas dúzias ao anoitecer. Conte -me sobre a eficácia do seu tratamento. '\ N'ah, uh ... bem, seguimos as diretrizes estabelecidas -' \ n'with Success? Deixe -me fazer anotações. Você está trabalhando ao longo das diretrizes de tratamento, correto? Provavelmente que qualquer tratamento não tenha efeito. Uma pena." #NT!
 panum.565.g: "Uma mudança nas táticas, então - devemos ter uma vacina." #NT!
 panum.566.t: "A primeira rachadura" #NT!
 panum.566.d: "Embora sua pesquisa tenha sido um fracasso até agora, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] experimentou macacos em uma tentativa de criar uma vacina." #NT!
 panum.566.f: "Para muitos, a visão de um macaco morto em uma gaiola não seria muita causa de comemoração, mas para a equipe do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] e [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], foi um progresso notável. O desenvolvimento de uma vacina para esta terrível doença exigia a capacidade de produzir a doença em um laboratório sob demanda e, no entanto, tentava, por mais que os iludissem ... até hoje. Com macacos africanos nativos e chimpanzés aparentemente imunes à doença, levou a chegada de um macaco indiano para fornecer um sujeito de teste adequado. Inoculado com o soro tirando das veias de um homem infectado, o macaco havia adoecido e, finalmente, morreu. Para alguns, pode parecer uma crueldade ociosa, mas aqui agora, apresentou um enorme salto adiante. Finalmente, eles tinham indivíduos para testar." #NT!
 panum.566.g: "Hmmm. Isso é progresso ... ao matar macacos, pelo menos." #NT!
 panum.567.t: "O segredo do soro" #NT!
 panum.567.d: "Com o acesso a um "sujeito de teste" confiável, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] começou a testar as possibilidades de inocular usando o sangue de pacientes em recuperação." #NT!
 panum.567.f: "'1. Macaque para Macaco Transfusão: Doença transferida, sem imunidade, macaco falecido. Confirma transmissão à base de sangue, a doença provavelmente é transportada por insetos - mosquitos? \ N2. Transfusão humana a macaca: doença transferida, sem imunidade, o macaco sobreviveu. Confirma que a infecção pode atravessar espécies diretamente. \ N3. Febre Amarela da América do Sul e Africana para Macaque Sobrevivente: Imunidade, Macaque sobreviveu. Confirma a imunidade compartilhada às duas formas de doença. \ N4. Patógeno morto no soro, esterilizado sob calor extremo: falhou em fornecer proteção, o macaco falecido após inoculação com patógeno vivo. Falha significativa, exclui as possibilidades de uma vacina morta-patógeno. \ N5. Transferência de soro de recuperação para o macaco: infecção futura evitada! Promissor! Início potencial para uma vacina?" #NT!
 panum.567.g: "Você não pode fazer uma omelete sem quebrar alguns macacos ..." #NT!
 panum.568.t: "O protótipo" #NT!
 panum.568.d: "Tendo tido tempo de continuar trabalhando em sua vacina, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] atingiu um ponto crítico - um protótipo de vacina." #NT!
 panum.568.f: "'Deve ser um momento incrível, mas me vejo lutando para manter minha sobriedade. Usando grandes quantidades de soro humano, retirado de vários doentes em recuperação, minha equipe e eu conseguimos processá -los em uma forma destilada, potencialmente capazes de fornecer imunidade ao voluntário. Era um bom primeiro rascunho e um trampolim em potencial e crítico, e então começamos a testá -lo nos macacos. Um bom número morreu, um bom número viveu, mas um macaco não é um homem. \ N \ nit precisava de testes ao vivo. Dez voluntários, reunidos daqui, ali e em todos os lugares. Algumas tropas da guarnição local, um membro de minha própria equipe, alguns homens fora do trabalho da cidade influenciados pela promessa de alguns centavos. Cerca de duas dúzias de voluntários, por quase tantos tiros. Deles? Sete não tiveram sintomas, depois confirmaram a imunidade uma semana depois. Cinco tinham doenças menores, depois imunidade. Outros seis estavam mais doentes, depois imunes. O restante? Todos desenvolveram febre amarela apropriados e um morreu. É um passo na direção certa, inegavelmente, mas ... e os mortos?" #NT!
 panum.568.g: "O custo do progresso é alto." #NT!
 panum.569.t: "Um novo assunto" #NT!
 panum.569.d: "Com a primeira tentativa de uma vacina um sucesso misto, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está determinado a refinar o processo." #NT!
 panum.569.f: "Para o alívio de alguns manipuladores e o horror de outros, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez uma descoberta crítica - os macacos não eram o único animal que podia incubar a doença, e um anfitrião mais novo e mais adequado foi encontrado: o rato de pesquisa comum. O lote que eles podem jogar na crescente indústria de pesquisa médica não pode ser subestimada, mas aqui eles desempenham uma parte especialmente crítica: seu líquido cerebral, a gosma em torno de seus pequenos cérebros, é um meio de crescimento adequado para o vírus da febre amarela. Esse processo, no entanto, tem uma vantagem distinta. \ N \ Naach Passage do mouse para o mouse leva menos tempo do que o último, enfraquecendo o vírus como ele. Lenta mas seguramente, esse assassino de homens está sendo trazido para o calcanhar, um rato de cada vez." #NT!
 panum.569.g: "Oh bom, primeiro os macacos, agora os ratos ..." #NT!
 panum.570.t: "O segundo protótipo" #NT!
 panum.570.d: "O refinamento contínuo da vacina do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] levou ao desenvolvimento de uma versão aprimorada." #NT!
 panum.570.f: "“Embora a última tentativa não tenha sido um fracasso, não ouso chamá -lo de sucesso. Esses meninos pobres deram suas vidas à esperança de livrar a humanidade desta doença, e devo a eles melhorar o máximo possível. Eu acredito que fiz exatamente isso. Ao transferir o assunto de macacos para ratos, pude atenuar lenta mas seguramente o vírus, enfraquecendo -o substancialmente por horas extras. Após mais de trinta passagens, a febre amarela resultante é uma criatura enfraquecida, muito mais provável de ser útil em uma vacina do que as primeiras tentativas. Havia menos voluntários do que a última vez, mas um colega meu decidiu correr o risco. Eles não tiveram vacinação nem exposição à febre amarela e ficaram intensivamente em quarentena por uma semana antes da inoculação. Além de um pequeno avermelhamento da área, eles não desenvolveram febre amarela. Resultados muito promissores até agora." #NT!
 panum.570.g: "Parece que finalmente estamos chegando a algum lugar ..." #NT!
 panum.570.h: "... Então, vamos começar esta campanha de vacinação!" #NT!
 panum.571.t: "Incêndio" #NT!
 panum.571.d: "Desastre! A distribuição da Vaccina Serum desenvolvida pelo Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] transferiu inadvertidamente doenças nascidas no sangue!" #NT!
 panum.571.f: "Foi, em retrospectiva, bastante óbvio que fazer uma vacina usando soro sanguíneo humano era, talvez, uma idéia terrível. Os mistérios do sangue humano haviam sido parcialmente decifrados, mas em um mundo onde o microscópio estava revelando micróbios sempre novos e uma nova teoria dos corpos virais estava começando a emergir, sempre houve uma preocupação cada vez maior de que algo inesperado de que mais de milhares de indivíduos não se deve a um desastre, que não foi um desastre, que não foi um desastre, que não foi um desastre de que mais de milhares de indivíduos, que não foi o que foi realizado por mais de milhares de indivíduos, que não foi o que é um desastre, que não foi o que é um desastre, que não foi o que é um desastre de que mais de milhares de indivíduos de indivíduos. icterícia em todos, desde soldados a funcionários do governo. Esse vírus era anteriormente desconhecido para nossa ciência e ainda evita a detecção de muitas de nossas mentes mais brilhantes ... ao contrário dos danos à nossa imagem nacional. Embora tenha havido poucas mortes, se houver, o fracasso óbvio deste projeto de vacinação deixou nossa comunidade médica em frangalhos, o alvo de piadas em todo o mundo." #NT!
 panum.571.g: "Esta é uma catástrofe para nossa pesquisa médica ..." #NT!
 panum.572.t: "Ajustes finais?" #NT!
 panum.572.d: "Perto de uma vacina finalizada, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está no meio do desenvolvimento final." #NT!
 panum.572.f: "Se alguém não soubesse o contrário, poderia ter pensado que o laboratório do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pareceria uma cozinha muito estranha. Sal, água, óleo e ovos espalharam os balcões, ao lado de plantas quentes, uma ampla seleção de óculos e uma geladeira de última geração. A cena estava aparentemente pronta para fazer o café da manhã, não um avanço médico, mas é exatamente o que está em andamento. O soro é muito caro para fazer uma vacina que pode ser distribuída em escala, muito estranha para trabalhar nas grandes escalas necessárias para inocular uma colônia ou uma cidade. Ele deve ser removido da equação, mas se não for assim, então o quê? Uma seleção cuidadosamente preparada de tecido de camundongo é, cuidadosamente, mergulhada em gema de ovo e, com cuidado, sempre cuidadosamente, colocada no compartimento de liofilização. Um lote anterior foi lançado, seu conteúdo agora um pó fino. Adicione -o a uma solução salina ... \ n \ nO médico sorriu. \ N \ n'at Last ', diz o bom médico. 'Eu tenho.'" #NT!
 panum.572.g: "Heureka!" #NT!
 panum.573.t: "O protótipo final" #NT!
 panum.573.d: "Depois de concluir o trabalho em sua vacina, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] começou a implantá -la em um grupo de teste final." #NT!
 panum.573.f: "Foi um caminho longo e difícil, mas o fim está finalmente à vista. A fase final foi tornar a vacina mais prontamente disponível e agora é: tendo trocado o soro por uma solução salina, o pacote de vacina resultante é semelhante ao usado para a varíola. Não há necessidade de uma injeção, apenas a mesma prática de escarificação. De fato, os dois podem até ser entregues ao mesmo tempo. Por todas as contas, deve ser um meio confiável, seguro e eficiente para entregar essa vacina, não apenas a alguns milhares, mas a milhões. Existem poucos voluntários, não o suficiente para criar um grupo de testes ... mas se alguém fosse considerado em mim mesmo, então há o suficiente. Eu já fiz as providências - um general só pode enviar muitos de seus homens para a linha de fogo antes que eles se esperem para o campo. Hoje à noite, às oito horas, serei inoculado com esta vacina. Se funcionar, então, quando sou injetado com a febre amarela em duas semanas, não terei nada além de uma leve virada." #NT!
 panum.573.g: "Desejo [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] sorte." #NT!
 panum.574.t: "Uma vacina contra a febre amarela" #NT!
 panum.574.d: "As notícias chegaram à capital: o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] criou com sucesso uma vacina para a febre amarela!" #NT!
 panum.574.f: "'... Mas no final, minha equipe e eu conseguimos ter sucesso contra todas as probabilidades. Embora ainda existam muitos mistérios de febre amarela ainda não resolvidos, produzimos com sucesso uma vacina viável, pronta para a produção em larga escala. It may require some specialized facilities, manned by great minds, but it can be produced at scale, and millions upon millions would benefit from a rapid campaign of vaccination that could render yellow fever a thing of the past.\n\nYet, a great many lives have been lost, including a number upon my own team, from humble assistants that laid down their lives in pursuit of their research to volunteers who stood for testing, all of whom should be recognized as the Heróis eles são. Também deve ser dada uma palavra de elogio aos macacos e aos ratos, que desempenharam um papel crítico nesse empreendimento." #NT!
 panum.574.g: "Muito bem, doutor! Agora, vamos começar a implantação imediata!" #NT!
  
