 panum_cholera_condition: "Cólera" #NT!
 panum_cholera_condition_desc: "A cólera é uma doença perigosa do intestino delgado. É considerado uma epidemia definidora do século XIX, com milhões de mortes em todo o mundo." #NT!
 panum_tuberculosis_condition: "Tuberculose" #NT!
 panum_tuberculosis_condition_desc: "A tuberculose é considerada, juntamente com a cólera, uma das causas mais comuns de morte na era vitoriana. Também conhecido como consumo, afeta principalmente os pulmões" #NT!
 panum_smallpox_condition: "Varíola" #NT!
 panum_smallpox_condition_desc: "Conhecida por suas pústulas, que desfiguram o rosto e o corpo, a varíola tem sido uma das doenças mais letais da história." #NT!
 panum_typhus_condition: "Tifo" #NT!
 panum_typhus_condition_desc: "Tifo aterrorizou soldados ao longo dos séculos, particularmente nas guerras napoleônicas quando matou milhares de pessoal do exército. Isso aconteceu repetidamente após desastres naturais" #NT!
 panum_yellow_fever_condition: "Febre amarela" #NT!
 panum_yellow_fever_condition_desc: "A febre amarela afeta principalmente as áreas tropicais da América do Sul e da África. No Caribe, a doença matou mais vidas entre soldados estacionados do que qualquer guerra." #NT!
 panum_measles_condition: "Sarampo" #NT!
 panum_measles_condition_desc: "O sarampo é uma doença altamente contagiosa conhecida por suas manchas típicas da pele vermelha. Pode ter consequências catastróficas, particularmente em populações sem imunidade prévia." #NT!
 panum_scarlet_condition: "Escarlatina" #NT!
 panum_scarlet_condition_desc: "A febre escarlatina é uma doença generalizada que foi uma das causas mais comuns de morte entre as crianças até o início do século XX." #NT!
 panum_plague_condition: "Praga" #NT!
 panum_plague_condition_desc: "A peste bubônica é equiparada à 'morte negra' da Idade Média, que é uma das piores catástrofes da história. O nome vem dos inchados e dolorosos inchaços." #NT!
 panum_diphteria_condition: "Difteria" #NT!
 panum_diphteria_condition_desc: "A difteria é uma doença perigosa que pode levar a complicações com risco de vida e consequências a longo prazo." #NT!
 panum_polio_condition: "Poliomielite" #NT!
 panum_polio_condition_desc: "A poliomielite é uma doença que afeta principalmente crianças, geralmente resultando em morte ou complicações físicas ao longo da vida." #NT!
  
