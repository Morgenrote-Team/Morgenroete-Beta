 panum_stop_medical_project_button: "Stop Medical Project" #NT!
 panum_stop_medical_project_button_desc: "Pare seu projeto médico atual. Seu progresso médico será perdido." #NT!
 panum_stop_medical_project_tt: "Você decidiu interromper o projeto clicando no botão #italic Stop Medical Project#!." #NT!
  
