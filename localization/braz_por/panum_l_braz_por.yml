 je_panum_measles_treatment_reason: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está atualmente examinando vários pacientes no [SCOPE.sState('panum_disease_state').GetName] para determinar a causa do #YELLOW Sarampo#!. Somente as verdadeiras razões para a ocorrência da doença podem ajudar a fazer prevenções que levem a um método moderno de tratamento. Quando o médico terminar seu trabalho, ele apresentará sua tese ao público. Isso não evitará futuras epidemias - isso requer a identificação do patógeno e possivelmente uma vacina - mas os efeitos de uma nova epidemia serão relativamente pequenos." #NT!
