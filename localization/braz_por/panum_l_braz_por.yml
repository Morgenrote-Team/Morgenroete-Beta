 panum_is_red_cross_member_tt: "Membro do [concept_panum_red_cross]" #NT!
 panum.3031.t: "Primeiro Conventinon se torna uma convenção vinculativa" #NT!
 panum.3031.d: "A esmagadora maioria dos membros da Cruz Vermelha concordou com a Primeira Convenção Internacional sobre o cuidado da guerra ferido. Agora é vinculativo para todos os membros." #NT!
 panum.3031.f: "As convenções internacionais geralmente são declarações de intenção não vinculativas. No entanto, se membros suficientes da Cruz Vermelha o assinarem, com o tempo se tornará um direito internacional válido, com o qual todos os signatários devem cumprir - e os outros membros também o assinarão. Isso acontece quando 65 % de todos os membros e a maioria das grandes potências concordam com esta convenção - todos os outros membros são forçados a cumprir com ela. Esta convenção não pode mais ser abolida como de costume. Para evitar convenções vinculativas, é necessária uma retirada completa da Cruz Vermelha - com todas as consequências." #NT!
 panum.3031.g: "Uma lei internacional globalmente válida é criada." #NT!
 panum.3032.t: "A segunda convenção se torna uma convenção de ligação" #NT!
 panum.3032.d: "A esmagadora maioria dos membros da Cruz Vermelha concordou com a Segunda Convenção Internacional sobre Desarmamento e Guerra Naval. Agora é vinculativo para todos os membros." #NT!
 panum.3033.t: "Terceira convenção se torna uma convenção de ligação" #NT!
 panum.3034.t: "Convenção Internacional se torna vinculativa" #NT!
 panum.3034.d: "A esmagadora maioria dos membros da Cruz Vermelha concordou com uma convenção. Agora é vinculativo para todos os membros." #NT!
 panum.3034.g: "Vamos verificar se isso é do nosso interesse." #NT!
  
