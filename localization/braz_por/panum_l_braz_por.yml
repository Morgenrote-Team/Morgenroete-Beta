 panum.61.t: "A equipe de tratamento médico sai" #NT!
 panum.61.d: "Depois que os assistentes de pesquisa introduziram nossos médicos locais aos métodos modernos de tratamento médico de nosso país de Overlord, eles se despedem e retornam à sua terra natal." #NT!
 panum.61.f: ""A única coisa de importância, quando partirmos, serão os traços de amor que deixamos para trás." -Albert Schweitzer" #NT!
 panum.61.g: "Nosso Overlord cuida de nós?" #NT!
