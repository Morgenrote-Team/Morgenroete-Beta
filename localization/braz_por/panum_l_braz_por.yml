 je_panum_medical_research_project: "Pesquisa Médica" #NT!
 je_panum_medical_research_project_reason: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está atualmente impulsionando a pesquisa médica. Além das inovações médicas, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] também pode encontrar curas para doenças que não estão entre as dez doenças epidêmicas clássicas. Toda vez que o progresso atingir [JournalEntry.GetTotalGoalValue|V0], receberemos um pequeno impulso tecnológico. #n Este projeto continuará indefinidamente. Use o botão para pará-lo.#!" #NT!
  
