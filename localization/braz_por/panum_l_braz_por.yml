 panum.51.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viaja para o estado epidêmico" #NT!
 panum.51.f: "Uma descrição completa de uma doença é o primeiro passo para entendê -la e mais tarde combatê -la. As descrições ainda não têm um efeito direto no alívio, mas são a base de um método de tratamento posterior. Os médicos que estudam uma epidemia em seu próprio país trabalham com mais eficácia do que os médicos em uma viagem ao exterior." #NT!
  
