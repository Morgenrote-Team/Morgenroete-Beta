 panum.440.t: "Tifo - um problema social" #NT!
 panum.440.d: "Em seu tratado [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')], o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enfatizou particularmente o fato de que o tifo é uma doença evitável quando forças políticas e sociais trabalham juntas." #NT!
 panum.440.f: "'Condições apertadas, roupas cheias de piolhos e apartamentos degradados ou salas de soldados apresentaram uma imagem memorável para mim. A febre do tifo estava por toda parte. Onde quer que as pessoas morassem nas mesmas condições apertadas, mas nas condições higiênicas da sala do hospital, nenhuma disseminação poderia ser observada. A medicina não deve ser considerada como cuidar do indivíduo, mas em termos de saúde pública, o que também implica resolver problemas sociais. Não há dúvida de que uma disseminação tão epidemia de tifo, como vimos recentemente, só ocorreu em condições de vida, como pobreza e falta de educação. Tire essas circunstâncias e tenho certeza de que veremos melhorias significativas na luta contra a doença. '\ N \ ndr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] em seu memorando ao governo" #NT!
 panum.440.g: "Tifo está perdendo seu terror." #NT!
  
 panum.441.t: "Uma autópsia" #NT!
 panum.441.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realizou várias autópsias sobre mortes por tifo em [SCOPE.sState('panum_disease_state').GetCityHubName] e fez descobertas cruciais." #NT!
 panum.441.f: "'É sabido há muito tempo que a febre tifóide e o tifo são duas doenças diferentes. Mas ainda existem alguns pesquisadores que acreditam que a má nutrição, uma infecção do trato intestinal ou pelo menos uma deficiência nutricional pode estar ligada ao surto de tifo. As razões alimentares ainda são consideradas uma possível causa de muitas doenças. Durante meus exames, não encontrei nada que, de alguma forma, sugasse um distúrbio digestivo. A febre do tifo não tem nada a ver com dieta ou digestão. '\ N \ nfrom um relatório de autópsia do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.441.g: "Mas o que poderia ser?" #NT!
 panum.442.t: "Não lavado e emaranhado" #NT!
 panum.442.d: "Em [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] pesquisar a causa da epidemia de tifo, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] percebeu que as descobertas anteriores tinham que ser questionadas." #NT!
 panum.442.f: "“Ouvi várias vezes em minha carreira que a pobre higiene é uma maneira de Miasma ou germes - o que quer que as pessoas acreditem - segurassem roupas e contribuam para a doença. Eu acho que isso é questionável em detalhes, mas não na declaração básica. Soldados, condenados, pobres, criminosos e prostitutas estão entre as vítimas clássicas da epidemia de tifo. Mas os pobres não são lavados porque querem ser não lavados, ou não é o caso de não ser lavados porque são pobres? Não quero acreditar que a tuberculose é a doença de um artista, assim como o tifo afeta apenas os criminosos porque eles são moralmente perversos. Existem numerosos criminosos ricos que não foram afetados pelo tifo nesta epidemia. Há padres sem culpa nas favelas que se sacrificam pelos outros e que próprios sucumbem à doença. Então, qual é a conexão mais convincente entre as vítimas?" #NT!
 panum.442.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] está tentando afirmar que o tifo também pode afetar pessoas honestas?" #NT!
 panum.443.t: "Calor e frio" #NT!
 panum.443.d: "Após várias visitas às casas de famílias que sofrem de tifo, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] chega à conclusão de que não é, como é frequentemente reivindicado, uma doença sazonal." #NT!
 panum.443.f: "'Existem doenças sazonais e esse parece ser o caso de Typhus também. Relatórios anteriores indicam um aumento nas estações mais frias, que também podem incluir uma mola ou outono úmido. Eu acho que ficou provado que o frio e o calor influenciam a doença. Se depende das estações é questionável. Pode ficar tão quente em uma sala bem embalada e aquecida. A doença não ocorreu em todos os lugares na mesma época do ano. Se fosse esse o caso, não apenas certas áreas de uma cidade, mas toda a cidade teria que ser igualmente afetada. Mas sempre apareceu onde as pessoas estavam lotadas. Consegui determinar isso durante várias visitas domiciliares. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.443.g: "Isso contradiz estudos anteriores." #NT!
 panum.444.t: "Suor e respiração" #NT!
 panum.444.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está agora completamente convencido de que o tifo deve ser uma doença contagiosa, mesmo que todas as circunstâncias ainda não tenham sido esclarecidas." #NT!
 panum.444.f: "No início da minha investigação, eu estava firmemente convencido de que Tifo não era uma doença contagiosa. À medida que minha família com tifo aumentava, no entanto, eu cresci para acreditar firmemente no contágio da doença e enfatizo a natureza contaminante do suor. Vi uma enfermeira que, enquanto raspava um paciente moribundo, inalou a respiração do paciente. A enfermeira descreveu a respiração do paciente como tendo 'um sabor enjoado' e quase imediatamente adoeceu. Da mesma forma, um assistente apoiava outro paciente que morreu logo depois, sentiu o suor pungente do paciente sobre sua pele, e o assistente foi levado imediatamente com os sintomas do tifo. É claro que a proximidade de pacientes com tifo coloca um em risco de contrair a doença." #NT!
 panum.444.g: "Isso pode ser útil, mas realmente transmite de pessoa para pessoa?" #NT!
 panum.445.t: "É fome?" #NT!
 panum.445.d: "Em uma disputa acalorada com um colega em [SCOPE.sState('panum_disease_state').GetCityHubName], o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] refutou suas teorias." #NT!
 panum.445.f: "É um tipo especial de tifo, tifo de fome. Consequentemente, a fome, ou melhor, a fome, é um gatilho para o tifo. As mudanças no sangue provavelmente também têm algo a ver com isso. '\ N \ n'1726, 1727 e 1728 foram anos de fome, mas não havia tifo. 1829 foi um ano próspero, mas havia tifo. É compreensível que um corpo enfraquecido tenha maior probabilidade de ficar doente - mas a causa?" #NT!
 panum.445.g: "O termo 'febre da fome' está, portanto, incorreto." #NT!
 panum.446.t: "Não localização, mas situação" #NT!
 panum.446.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] acredita que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] descobriu que o que importa não é tanto como as pessoas com tifo vivem, mas onde vivem." #NT!
 panum.446.f: "Durante minha visita a [SCOPE.sState('panum_disease_state').GetCityHubName], descobri que toda a doença afetou apenas uma única parte da cidade. A área é conhecida por sua pobreza e depravação moral, que apoiou algumas teorias de que o tifo é uma doença de indivíduos moralmente inferiores. Mas, até onde eu sei, é o bairro densamente povoado e a situação econômica das pessoas afetadas. Na minha opinião, espalhar a doença não é sobre corrupção moral, mas proximidade física. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.446.g: "Isso significa pelo menos que a doença pode teoricamente ser superada ..." #NT!
 panum.447.t: "Piolhos" #NT!
 panum.447.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] apresentou uma teoria altamente controversa de que, embora [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não possa provar isso, poderia mudar o entendimento da doença do tifo no futuro." #NT!
 panum.447.f: "'Se há uma coisa que notei em minhas muitas observações, foi que quase todos os pacientes estavam em um estado infestado de piolhos. Seja os soldados no quartel superlotado, as famílias com seus inúmeros filhos, os condenados em suas células degradadas. Não acredito mais que isso é uma coincidência. Claro, não tenho evidências. Nos últimos anos, vários cientistas foram capazes de provar repetidamente que as doenças podem ser transmitidas entre animais e humanos. Se for diferente nessa situação, ficaria feliz em ser comprovado o contrário. Por enquanto, acredito que o mistério do tifo não pode ser resolvido sem examinar mais de perto o papel dos piolhos." #NT!
 panum.447.g: "Como algo tão pequeno pode causar tanta devastação?" #NT!
 panum.447.h: "Algo tão pequeno deve causar tanta devastação." #NT!
 panum.448.t: "Um hospital higiênico" #NT!
 panum.448.d: "Durante uma visita a um exemplaryhospital, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu convencer [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] de que a transmissão da doença é apenas mínima em condições favoráveis." #NT!
 panum.448.f: "Quando os doentes começaram a ser levados para hospitais aqui e ali, havia medo de que a situação pudesse piorar devido à possível infecção. Supunha -se que novas fontes de infecção pudessem se formar, a partir da qual a epidemia atacaria com uma violência ainda maior. Nada disso aconteceu, embora esse efeito tenha sido observado em muitos galpões de febre. Como observei em outros casos, as condições higiênicas mais favoráveis ​​fizeram a diferença. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.448.g: "Portanto, não é a estreiteza como tal, mas as condições." #NT!
 panum.449.t: "Assistência epidêmica" #NT!
 panum.449.d: "Ao entregar alimentos, cobertores e remédios para [SCOPE.sState('panum_disease_state').GetCityHubName], o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu garantir que a epidemia diminua um pouco." #NT!
 panum.449.f: "'Pode parecer banal, mas com um envio de mercadorias destinadas a aliviar a miséria dos moradores, surtos de doença caíram na semana passada. Algo semelhante já havia sido observado em outras áreas onde o tifo havia se enfurecido no passado. Os trabalhadores de assistência distribuíram arroz e ervilhas, construíram hospitais improvisados ​​e também trouxeram remédios e roupas novas. O caso prova isso acima de tudo: o tifo não é uma doença hereditária. Definitivamente, depende de fatores ambientais." #NT!
 panum.449.g: "Às vezes, a única maneira de abordar uma solução é usar os critérios de exclusão." #NT!
 panum.450.t: "Roupas contaminadas?" #NT!
 panum.450.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notou um caso estranho em um galpão de febre que corresponde a experiências semelhantes." #NT!
 panum.450.f: "'Essa evidência é de um suposto contágio? Não há dúvida de que este caso corresponde a experiências muito semelhantes que tive em outros lugares. Às vezes são casacos, às vezes jaquetas ou camisas. Um sofredor de tifo tinha um irmão que pegou o casaco. Alguns dias depois, ele também estava doente. Dizem que as crianças que brincavam com o casaco se infectaram de maneira semelhante. Nas classes mais pobres, é bastante comum passar roupas de parentes, especialmente nas estações frias. Se as roupas estão contaminadas ou não - trocar de roupa parece ser uma das medidas sensatas para evitar tifo." #NT!
 panum.450.g: "Os homens devem trocar de meias e roupas íntimas? Impossível!" #NT!
  
 panum.451.t: "Clima do tifo" #NT!
 panum.451.d: "Depois que um médico estrangeiro forneceu uma nova hipótese sobre as origens do tifo, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] duvida [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Pesquisa própria." #NT!
 panum.451.f: "'Um colega' me enviou seu volume sobre as causas de Typhus há dois dias. Estou muito impressionado, para não dizer desmotivado. Ele formulou com muita precisão e rigor como as condições climáticas e climáticas estão relacionadas ao desenvolvimento da doença. Consequentemente, o miasma se forma quando há umidade na terra e depois sobe no ar. Isso explicaria a ocorrência frequente de tifo em meses frios e chuvosos. Afinal, é miasma?" #NT!
 panum.451.g: "Mas esta é realmente a solução certa?" #NT!
 panum.452.t: "Putrefação" #NT!
 panum.452.d: "Algumas das descobertas que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] resumiram recentemente simplesmente não se encaixam na teoria anterior [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.452.f: "Até agora, não pensei muito na teoria de que os processos putrefativos desempenham um papel crucial na disseminação da doença. Mas onde quer que eu vá, onde quer que o tifo esteja furioso, encontro animais, encontro exalações, encontro material humano, animal e vegetal. Na verdade, poderia se dissolver e deixar para trás Miasma - ou talvez venenos?" #NT!
 panum.452.g: "Um revés desagradável." #NT!
 panum.453.t: "Correntes de ar negativas" #NT!
 panum.453.d: "Uma publicação de um médico alemão reconhecido sacode o progresso do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] até agora. Portanto, ficou provado que as correntes de ar são responsáveis ​​pela ocorrência de tifo." #NT!
 panum.453.f: "“Tão ar quente e úmido pode ser transportado por uma corrente de ar equatorial para as latitudes do norte e veremos o tifo se rompendo sob o domínio dos ventos do sul e oeste em estações relativamente quentes. Esse relacionamento deve ser mais excelente no verão, quando o sol está em sua posição norte, as margens do Mediterrâneo estão incluídas na extensão dos ventos comerciais e em nosso país a batalha com a corrente do norte ocorre em uma estação chuvosa com um caráter em mudança. É assim que as epidemias de tifo do verão e do início do outono podem ser explicadas. '\ N \ ndd. Angelika Hasenbein, 'Como as correntes de ar causam tifo e chuva de outono causa gripe'" #NT!
 panum.453.g: "Isso é realmente muito convincente." #NT!
 panum.454.t: "Doente" #NT!
 panum.454.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está se sentindo pior há alguns dias. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ficou infectado?" #NT!
 panum.454.f: "'Onde está o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]? [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] queria visitar o paciente de tifo na sala cinco hoje? '\ N \ n'it parece que o médico [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] está doente.'" #NT!
 panum.454.g: "O médico deve descansar." #NT!
 panum.454.h: "O médico deve continuar trabalhando!" #NT!
 panum.455.t: "Documentos perdidos" #NT!
 panum.455.d: "O médico desperdiçou algumas das notas [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] que poderiam ter sido úteis no desenvolvimento de um tratamento para o tifo." #NT!
 panum.455.f: "- - - - - - - - - \ n \ n- - - - - - - - - \ n \ n- - - - - - - - - \ n \ NNOt do Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.455.g: "Como embaraçoso." #NT!
  
 panum.461.t: "Aulas e casas" #NT!
 panum.461.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] criou uma tabela dos vários pacientes com tifo que vivem em [SCOPE.sState('panum_disease_state').GetCityHubName], onde vivem e que padrão de vida possuem. A febre do tifo é, portanto, uma doença 'social'." #NT!
 panum.461.f: "'As tabelas estatísticas mostram o quão grande é a influência dos apartamentos na saúde dos moradores. Por exemplo, em um estudo do subúrbio da cidade, descobri que a taxa de mortalidade nas ruas de segunda classe era de 18 % e nas ruas de terceira classe 68 % maiores que na primeira classe; e essa mortalidade foi 31 % maior em casas de segunda classe e 78 % maior em casas de terceira classe do que em casas de primeira classe. A mortalidade havia melhorado 25 % nas estradas pobres que foram melhoradas." #NT!
 panum.461.g: "Então o médico também é um crítico social?" #NT!
  
 panum_typhus: "Tifo" #NT!
 panum_typhus_desc: "Essa pessoa está sofrendo de tifo, uma doença perigosa." #NT!
  
 panum.12.t: "A primeira vacina" #NT!
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName] fez uma invenção inovadora. Usando um novo processo, a vacinação, ele conseguiu inventar um meio eficaz de proteção contra a temida varíola." #NT!
 panum.12.f: "De acordo com o biógrafo de Edward Jenner, John Baron, Jenner teria explorado a crença popular de que as leites que estavam infectadas com a Cowpox geralmente não recebiam varíola ('Myth Myth'). John Poundster havia observado que um paciente que já havia (inofensivo) de caçaneira não podia ser variolado com a varíola. Jenner, portanto, levantou a hipótese de que a inoculação com a Cowpox forneceria a mesma imunidade que a Cowpox e, portanto, forneceria proteção contra a varíola. Jenner coletou os estudos de caso e observação de pessoas que haviam anteriormente vaca ou horsepox, mas que se mostraram imunes em caso de variolação posterior ou em um surto de varíola real. Em 14 de maio de 1796, ele vacinou James Phipps, de 8 anos, com vírus de Cowpox ou Vaccinia que ele havia retirado de uma pustula de caubóia da mão de Milkmaid Sarah Nelmes, que teve Cowpox. Cerca de seis semanas depois, em 1º de julho de 1796, Jenner variola o garoto com pus de varíola; Ele provou imune." #NT!
 panum.12.g: "Um herói da medicina!" #NT!
  
 je_panum_vaccine: "A vacina" #NT!
 je_panum_vaccine_reason: "Nossa nação está no processo de introdução de uma vacina conhecida em nosso país pela primeira vez e distribuí -la nacionalmente." #NT!
 je_panum_vaccine_success: "[GetPlayer.GetName] coletou pelo menos #ORANGE 4 Clues de vacina §2" #NT!
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName] coletou pelo menos #ORANGE 3 Clues de tratamento §2" #NT!
  
 panum.351.t: "O velho inimigo" #NT!
 panum.351.d: "A varíola, talvez a doença mais mortal conhecida pelo homem, fez um ressurgimento em nossas terras." #NT!
 panum.351.f: "A varíola é um inimigo familiar e perigoso. Ao rasgar as terras de [GetPlayer.GetName], pode levar a vida de um terço completo daqueles que estão infectados e deixar outros cegos pelo resto de seus dias. Quase todos os infectados levarão para sempre o cartão de chamada desse assassino em sua carne - a cicatriz icônica do rosto e do corpo, o símbolo imortal e sem idade de uma doença quase tão antiga quanto a própria civilização. Ele perseguiu todos os cantos do mundo, do antigo Oriente Médio ao Novo Mundo, um exército cuja marcha foi desperdiçada a impérios, matou milhões e humilhou os maiores líderes que já andou na terra. Onde o homem foi, a varíola se seguiu, um caçador perseguindo para sempre sua presa." #NT!
 panum.351.g: "E então fazemos batalha contra a varíola mais uma vez ..." #NT!
 panum.352.t: "Rumores de tratamento de varíola" #NT!
 panum.352.d: "Seguindo rumores de um tratamento para a varíola, nosso povo começou a tentar práticas estranhas com as próprias pústulas!" #NT!
 panum.352.f: "A visão de um cavalheiro instruído comendo crostas de pessoas infectadas com varíola pode ser uma visão que é nojenta e horrível em igual medida, mas é uma cura desesperada compreendida por um homem desesperado. Há rumores de um tratamento para esta doença horrível em outro lugar do mundo e, supostamente, funciona de maneira semelhante ... mas como? Que feiticeiros, que ciência, podem livrá -los dessa praga horrível? As notícias vêm das terras distantes da Europa de que o flagelo da varíola foi levado a retirada, que as cidades inteiras podem viver sem um único caso. \ N \ n para alguns, isso é uma coisa de esperança. Se puder ser espancado lá, poderíamos vencê -lo aqui. \ N \ n para alguns, isso é uma mentira. Nossas maiores mentes ainda não conseguiram encontrar um tratamento, mas talvez, talvez ..." #NT!
 panum.352.g: "... Eles poderiam ter conseguido onde falhamos?" #NT!
 panum.353.t: "O flagelo da varíola" #NT!
 panum.353.d: "Não tratado e intratável, a varíola é devastadora nossa sociedade ... e especialmente a nossa jovem." #NT!
 panum.353.f: "Soluçando. Lamentos. Os gritos frenéticos dos desesperados, que mal levam um segundo do fôlego final antes de se sentirem em tristeza da qual nenhuma mão pode levantá -los. Os pais baterão os punhos contra as paredes até as palmas das mãos ficarem vermelhas de sangue e suas juntas estão quebradas e planas. As mães jogarão fora de ordem com a força dos gigantes por um último toque, para uma última carícia de uma bochecha fria e pálida. São vistas comuns em [GetPlayer.GetName], pois a varíola tem uma fome para os mais vulneráveis ​​de todos nós: nossos filhos, nascidos e não nascidos. Mais de oitenta por cento dos bebês infectados pela varíola morrerão, essa doença entrando no futuro de nossas terras. \ N \ nand sem tratamento, não há nada que possamos fazer, exceto chorar pelas vidas que deveriam ter sido." #NT!
 panum.353.g: "Deve haver um fim para este pesadelo ..." #NT!
 panum.354.t: "A vacina contra a varíola" #NT!
 panum.354.d: "Nossos diplomatas trazem de volta mais do que notícias - eles trazem amostras de uma 'vacina' contra a varíola!" #NT!
 panum.354.f_generic: "Durante uma visita à Europa distante, nossos dignitários descobriram algo fascinante - eles têm o que parece ser um tratamento * funcionando * para a varíola. De fato, eles aprenderam sobre a história desta doença! Aparentemente, a prática de variolação, ou usando amostras de crostas de varíola seca do mal em recuperação para dar às crianças uma forma 'mais fraca' dessa doença, foi observada no Império Otomano ... mas essa era uma solução falha, para que você se desenvolvesse, para que fosse uma dança. Use Cowpox, uma doença quase inofensiva, como uma maneira de proteger contra seu irmão mais velho letal. Isso fornece um escudo seguro, econômico e praticamente garantido contra a praga da varíola. \ N \ n Pela primeira vez em nossa história, podemos lutar contra a varíola." #NT!
 panum.354.g_generic: "Nós ... precisamos importar isso imediatamente!" #NT!
 panum.354.f_fareast: "Durante uma visita à Europa distante, nossos dignitários descobriram algo fascinante - eles têm o que parece ser um tratamento * funcionando * para a varíola. De fato, eles aprenderam sobre a história desta doença! Embora nossos médicos estejam bem familiarizados com a prática de variolação, que pode usar crostas secas da recuperação para proteger os não infectados, eles parecem ter descoberto uma proteção ainda maior. Usando amostras derivadas de feijão relativamente benigno, os europeus desenvolveram uma 'vacina', capazes de inocular crianças, ou mesmo os infectados recentemente ... uma vacina que pode aumentar muito sua chance de sobrevivência. \ N \ nour mais médicos educados podiam acreditar mal. Somente aqueles educados da maneira europeia e intitulados 'médicos' poderiam atestar seu potencial como uma proteção segura, econômica e poderosa contra a varíola. Mais do que isso, eles já começaram a testá -lo entre nosso povo e descobriram que essas reivindicações não são apenas reivindicações, oh não, mas fatos." #NT!
 panum.354.g_fareast: "Parece que nossos novos ... médicos ... mostraram seu valor. Importar isso imediatamente." #NT!
 panum.354.f_latino: "Durante uma visita ao país mãe da Europa, nossos dignitários descobriram algo fascinante - eles têm o que parece ser um tratamento * funcionando * para a varíola. Embora estivéssemos familiarizados com a prática de variolação, onde nossos médicos poderiam usar amostras retiradas da recuperação para dar aos que precisam desesperadamente de proteção, eles desenvolveram um tratamento muito mais sofisticado. Em vez de usar as crostas da varíola e o risco de infecção com essa doença letal, eles usam materiais retirados da Cowpox, uma doença comum e geralmente inofensiva. Esse novo soro é barato, comum e, mais importante, eficaz. A varíola não é estranha para as Américas, pois dizimou os povos nativos nessas terras ... mas agora temos uma arma poderosa para tornar esse flagelo uma coisa do passado." #NT!
 panum.354.g_latino: "Envie agradecimento à pátria e um pedido para importar uma remessa para uso imediato." #NT!
 panum.355.t: "A vacinação começa" #NT!
 panum.355.d: "Com uma vacina viável da varíola agora presente em [GetPlayer.GetName], o governo iniciou uma campanha de vacinação." #NT!
 panum.355.f: "Houve alguma resistência à idéia de uma campanha de vacinação, pelo menos a princípio. Mães preocupadas com seus filhos assustados, envelhecidos senhores, que eram céticos em relação a essa nova maravilha, os muito piedosos que temiam que a ciência estivesse adulterando algo além de seu entendimento. A educação resolveu isso - explicações de como funcionou, por que - mas muito mais do que esse foram os resultados. As crianças que ficaram com a visão e a saúde, e não com as terríveis consequências de uma das doenças mais mortais que a humanidade já havia encontrado. Poucos precisavam ser convencidos quando os viram livres de cicatrizes e cheios de vida. Nas escolas, consultórios médicos, locais de trabalho, a campanha de vacinação começa a pegar o vapor ... e, com ela, a varíola começa a diminuir." #NT!
 panum.355.g: "Ai. Eu odeio agulhas, mas se isso me manter seguro ..." #NT!
 panum.356.t: "Uma doença em retiro" #NT!
 panum.356.d: "Após inúmeros séculos de morte e miséria, a recente proliferação de vacinação contra a varíola colocou esse antigo inimigo em retirada completa." #NT!
 panum.356.f: "Foi preciso muito esforço incansável das mãos e mentes além da contagem, mas dentro de nossa amada [GetPlayer.GetName], a varíola é uma ameaça que está lenta mas seguramente se tornando uma coisa do passado. O resultado de uma extensa campanha para vacinar a juventude da nação e todos os dispostos a tomar a agulha, a capacidade de a varíola rasgar suas famílias e comunidades está quebrando, cumprindo a promessa de que os filhos de hoje não levarão as cicatrizes de seus avós. Com cada picada da agulha, a lâmina da varíola fica cada vez mais chata, e a natureza dessa praga se torna ainda mais uma coisa do passado. A varíola morrerá aqui e, se não estiver à nossa mão, a de nossos herdeiros." #NT!
 panum.356.g: "Um dia, um dia, colocaremos essa besta hedionda para sempre." #NT!
  
 panum_smallpox_vaccination_character_modifier: "Vacinado" #NT!
  
 panum.340.t: "Variolação" #NT!
 panum.340.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou um método de tratamento para a varíola - embora não seja totalmente inofensiva." #NT!
 panum.340.f: "A variolação (também inoculação) é a transferência do conteúdo da pólula da varíola de pessoa para pessoa através da inoculação. É uma técnica para vacinar contra doenças virais que foram usadas em pessoas, principalmente na China e no Oriente Médio, até o século XVIII. Aqui, foram utilizados coletivos de vírus das feridas dos pacientes com varíola que haviam sobrevivido à doença. Geralmente, o material era retirado de uma pústula em pessoas doentes usando um lancet, que foi introduzido por subcutaneamente, isto é, através de pequenas feridas, no braço ou na perna de pessoas saudáveis. Isso significava que os vírus atenuados eram administrados a pessoas saudáveis. A reação imune deve ser desencadeada pela multiplicação dos vírus. No entanto, os vírus podem se tornar causadores de doenças novamente através da mutação reversa à medida que se multiplicaram, o que levou a uma taxa de mortalidade relativamente alta (2-3%) entre os tratados dessa maneira." #NT!
 panum.340.g: "Um ... progresso." #NT!
  
