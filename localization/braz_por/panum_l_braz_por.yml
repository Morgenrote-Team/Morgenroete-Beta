 panum_physician_experienced: "Médico experiente" #NT!
 panum_physician_experienced_desc: "Depois de passar anos trabalhando para tratar os pacientes, este $panum_physician$ é experimentado em seu campo." #NT!
 panum_physician_famous: "Médico famoso" #NT!
 panum_physician_famous_desc: "As inovações e descobertas médicas feitas por isso $panum_physician$ as tornam famosas no campo da medicina." #NT!
  
