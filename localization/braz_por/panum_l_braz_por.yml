 panum_vitamins_tech: "Vitaminas" #NT!
 panum_vitamins_tech_desc: "Ao isolar certos nutrientes que o corpo necessita, é possível garantir que mais pessoas tenham uma dieta saudável e equilibrada." #NT!
  
 panum.2006.t: "A Teoria dos Germes é reforçada" #NT!
 panum.2006.d: "O congresso médico também ofereceu a oportunidade para vários médicos trocarem ideias sobre as causas da doença. Está se tornando aparente que cada vez menos pesquisadores acreditam na teoria tradicional do miasma. A teoria dos germes é agora considerada o padrão entre os estudiosos mais respeitados." #NT!
 panum.2006.f: "'Ultimamente, um certo ajuste, de fato, fez sua aparição, na medida em que países individuais não procedem mais de forma tão tendenciosa como antes, e um assume do outro o que parece ser bem testado em termos de meios de defesa. No entanto, em meio à variedade persistentemente grande nas formas e meios de combater a tuberculose, ainda é necessário perguntar quais medidas realmente satisfazem melhor os requisitos científicos e as descobertas gerais na luta contra doenças contagiosas.\n\nMas, antes de respondermos a essa pergunta, devemos deixar perfeitamente claro para nós mesmos como a infecção é causada na tuberculose, ou seja, como os bacilos da tuberculose invadem o organismo humano; pois todas as medidas profiláticas contra uma doença infecciosa só podem ser direcionadas para impedir que os germes da doença invadam o corpo.' - Robert Koch" #NT!
 panum.2006.g: "Essa evidência não pode ser descartada de imediato." #NT!
 panum.2201.t: "A Teoria do Miasma perde a Soberania interpretativa" #NT!
 panum.2201.d: "A cada dia que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se concentra mais e mais em novos métodos de pesquisa, a teoria tradicional do miasma se torna menos relevante. A teoria dos germes parece mais convincente." #NT!
 panum.2201.f: "'Senhores, são os micróbios que terão a última palavra!' - Louis Pasteur" #NT!
 panum.2201.g: "Então a teoria do miasma é questionável?" #NT!
  
