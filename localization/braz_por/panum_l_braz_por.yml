 panum.2111.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]'s Anatomy" #NT!
 panum.2111.d: "Em [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], a batalha com as autoridades locais para expandir os cuidados médicos, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu o quão mal o treinamento dos jovens cirurgiões está indo. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], portanto, escreveu um trabalho padrão para conter essa queixa." #NT!
 panum.2111.f: "A anatomia do corpo humano de Henry Gray, geralmente chamado de anatomia de Gray, é um livro sobre anatomia humana. É considerado um clássico do assunto, especialmente em países de língua inglesa. A primeira edição apareceu em 1858 na Grã -Bretanha e um ano depois nos EUA sob o nome de Anatomia de Gray: descritiva e cirúrgica." #NT!
 panum.2111.g: "Todo aluno deve ler este livro durante o treinamento." #NT!
 panum.2111.h: "A aplicação prática é mais importante que o ensino." #NT!
 panum.2112.t: "Diagrama de causas de mortalidade" #NT!
 panum.2112.d: "Ao visitar hospitais militares, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notou como pouco material estatístico era usado para educar jovens médicos sobre o perigo de doenças infecciosas no campo de batalha. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U], portanto, criou um grande número de diagramas significativos." #NT!
 panum.2112.f: "Devido a uma doença que ela contratou durante a Guerra da Crimeia, Florence Nightingale não conseguiu ver por si mesma como seria a situação em um quartel, hospital ou pobre casa. Ela, portanto, concentrou -se em coletar dados, prepará -los e analisá -los e depois tirar conclusões dele. Os questionários eram uma ferramenta importante para seu trabalho e ela também usou dados existentes. Entre outras coisas, demonstrou sérios problemas com os cuidados de saúde militar. Em seu relatório ao governo britânico, Nightingale encontrou palavras claras para isso. Se 11 dos 1.000 civis morressem todos os anos, mas 17, 19 e 20 dos 1.000 soldados da infantaria, artilharia e guardas estacionados na Inglaterra morreram, isso seria tão criminoso quanto liderar 1.100 homens todos os anos na planície de Salisbury e atirar lá lá. Florence Nightingale é considerado um dos pioneiros da preparação de dados gráficos de tais dados." #NT!
 panum.2112.g: "Essas estatísticas devem ser estudadas com cuidado com médicos no campo de batalha." #NT!
 panum.2112.h: "A aplicação prática é mais importante que o ensino." #NT!
 panum.2113.t: "Omnis Cellula E Cellula" #NT!
 panum.2113.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] expandiu a teoria celular anteriormente conhecida para incluir o princípio de que todas as células surgem de outra célula e que as doenças também surgem de células doentes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] descreveu esta tese em detalhes em seu trabalho sobre patologia celular, que é usada como manual em novas clínicas e hospitais." #NT!
 panum.2113.f: "A patologia celular é uma teoria da doença segundo a qual as doenças são baseadas em distúrbios das células do corpo ou de suas funções. Foi desenvolvido na década de 1850 por Rudolf Virchow, que também cunhou o termo 'patologia celular' em 1855. Seu trabalho de mesmo nome se tornou um trabalho padrão. Como conceito de doença baseado na teoria das células, substituiu a patologia humoral que anteriormente estava em vigor desde os tempos antigos e, portanto, é responsável por uma revolução abrangente na idéia do desenvolvimento de doenças e doenças em geral. Juntamente com a farmacologia experimental, a fisiologia e a microbiologia, ele forma uma base unificada para a medicina clínica e uma base de medicina baseada cientificamente." #NT!
 panum.2113.g: "O conhecimento sobre células doentes deve ser padrão nas universidades." #NT!
 panum.2113.h: "Esta é uma visão extremamente importante." #NT!
 panum.2114.t: "Nascido criminoso" #NT!
 panum.2114.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] estudou intensivamente a psique de criminosos e genética humana e descobriu que elementos criminosos podem ser identificados com base em sua fisionomia. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] numerosos contatos com pacientes doentes, lunáticos e funcionários preguiçosos durante suas tentativas de reformar o sistema médico inspiraram [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] por toda parte." #NT!
 panum.2114.f: "Inspirado na teoria da evolução, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realizou estudos de centenas de pessoas em penitentárias e asilos mentais e descobriu que um tipo atavístico é generalizado entre os criminosos. Certas formas de crime podem, portanto, ser vistas em tipos faciais e formas de crânio. O criminoso não se torna um criminoso por vontade própria, mas por causa de sua predisposição genética, ele tem um problema de que 'não pode ajudar'. O criminoso representa um tipo antropológico separado, o Homo deliquens. Ele é um tipo evolutivo para trás, mais cedo e mais primitivo de pessoa que aparece como imoral e impulsionada pelo instinto." #NT!
 panum.2114.g: "Então você é criminoso desde o nascimento." #NT!
  
 panum.2121.t: "Dr. § [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] O amor de crânios" #NT!
 panum.2121.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] continuou sua tese de criminologia antropológica e, portanto, mediu milhares de crânios em todo o país. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] até mantém alguns em casa." #NT!
 panum.2121.f: "'A criminologia é uma ciência natural séria que tem sido mergulhada em filosofia por muito tempo. Minha revolução é equipá -la com o mesmo empirismo que toda ciência moderna deste século. Biologia e matemática são assuntos incorruptíveis, e psiquiatria e criminologia podem aprender com eles. Se você medir e comparar todos os crânios - e eu fiz isso com milhares de criminosos, lunáticos e pessoas executadas -, poderá coletar dados estatísticos que mostram o mesmo resultado estatístico repetidamente. A partir disso, valores quase perfeitos podem ser derivados para deduzir a assimetria do rosto do criminoso. Essas medidas precisas são muito mais seguras do que suposições completamente infundadas sobre a mente humana: aqui temos números, fatos, em estudos empíricos de curta duração, lá uma conversa sem fundo." #NT!
 panum.2121.g: "Um ... adorável hobby." #NT!
 panum.2122.t: "Determinismo biológico" #NT!
 panum.2122.d: "Após mais meses de seus estudos, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] aprofundou suas teses anteriores sobre o 'criminoso nascido' e publicou outras descobertas chocantes." #NT!
 panum.2122.f: "'O criminoso é um degenerado. Enquanto o homem evolui, o criminoso representa uma regressão, uma forma de apostasia humana. Ele é o 'selvagem moderno', ele nos permite olhar para o homem da Idade da Pedra, que era menos sutil, menos sensível à dor e menos empático. O criminoso não percebe o sofrimento da outra pessoa, assim como ele tem apenas uma capacidade limitada de compaixão. Como os atos criminosos de uma disposição criminal, pode -se supor que essa disposição criminal seja herdada. Pode -se, portanto, assumir que, se as pessoas não cometerem seus atos por vontade própria, mas por determinação biológica, esse deve ser um fator atenuante na punição. Mas o oposto é o caso, porque o criminoso não pode ser impressionado com uma sentença dissuasor, ele não é reintegrador nem previsível. O foco está em proteger a sociedade. Portanto, é melhor pensar em prisão pela vida ou na pena de morte. Não podemos permitir que esses criminosos perigosos prejudiquem pessoas inocentes." #NT!
 panum.2122.g: "Temos alguma outra escolha além de aceitar isso como a teoria do governo?" #NT!
 panum.2123.t: "Um sujeito criminoso perigoso" #NT!
 panum.2123.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] estudou cuidadosamente a fisionomia de [SCOPE.sCharacter('panum_victim_scope').GetFullName] e, em particular, a forma de [SCOPE.sCharacter('panum_victim_scope').GetHerHis] crânio e chegou à conclusão de que [SCOPE.sCharacter('panum_victim_scope').GetSheHe] é uma pessoa altamente perigosa com energia criminosa que deve ser removida de todos os serviços imediatamente - para proteger a sociedade!" #NT!
 panum.2123.f: "'Os ladrões geralmente têm rostos e mãos muito móveis; Seus olhos são pequenos, inquietos, muitas vezes apertados; sobrancelhas dobradas e colididas; O nariz é torto ou brusco, a barba é escassa, o cabelo raramente é espesso, a testa é quase sempre pequena e recuando, a orelha geralmente se destaca como uma alça ... \ n. Os assassinos têm um olhar fixo e vítreo e fixo; Seus olhos às vezes são tiro no sangue. O nariz é grande, geralmente o nariz de uma águia ou melhor; As mandíbulas são fortes, as orelhas compridas, as bochechas largas, os cabelos enrolados, cheios e escuros, a barba frequentemente escassa; Os lábios são finos, os dentes caninos são grandes ... em geral, em criminosos desde o nascimento, os ouvidos são em forma de maçaneta, o cabelo está cheio, a barba é escassa, os seios do frontal são arqueados, a mandíbula é enorme, o queixo é quadrado ou saliente, as maçãs do rosto são largas. -CeSe Lombroso" #NT!
 panum.2123.g: "Essa pessoa realmente tem um rosto criminoso." #NT!
 panum.2123.h: "O médico vai longe demais com as acusações [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]!" #NT!
 panum.2124.t: "Outro amante do crânio!" #NT!
 panum.2124.d: "Hoje, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] introduziu um aspirante a acadêmico que adora crânios quase tanto quanto [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]. No entanto, o doutor [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetLastName] está mais preocupado com os crânios de pessoas mortas." #NT!
 panum.2124.f: "'[SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetFullName] é um excelente cientista que entende a importância de examinar os crânios, a fim de tirar conclusões sobre a pessoa a quem o crânio pertence. Infelizmente, [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetSheHe] lida apenas com os crânios de pessoas que morreram por uma quantidade imensurável de tempo. Inacreditável! Você não pode ter certeza se eles eram realmente criminosos. Como isso deve ajudar? '" #NT!
 panum.2124.g: "Esta é uma ... surpresa inesperadamente agradável." #NT!
  
 panum.4003.t: "O fim da varíola" #NT!
 panum.4003.d: "Contra todas as probabilidades, nossa campanha contra a varíola conseguiu além de todas as medidas - a doença agora foi erradicada." #NT!
 panum.4003.f: "Para muitos, é um dia que começa como qualquer outro, sem saber o que realmente é uma manhã magnífica. Para quem conhece, é o culminar de vidas de trabalho, de um sonho que quase não se pode imaginar finalmente se concretizando. Muitos não achavam que isso poderia ser feito em suas vidas, que seria um trabalho de lendário para o final do século XX, ou mesmo os vinte primeiros, e ainda aqui, agora é feito no ano de [TimeKeeper.GetCurrentDate.Format('y')]. O último caso confirmado terminou com um único novo indivíduo infectado, confinando essa doença à história. Pela primeira vez na história, a ameaça dessa doença fica sobre uma única cabeça. \ N \ nand isso significa apenas uma coisa: a varíola não existe mais." #NT!
 panum.4003.g: "O homem fez seu próprio milagre hoje." #NT!
  
 panum.2211.t: "Pesquisa de doenças" #NT!
 panum.2211.d: "Durante os exames médicos [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] percebeu que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] queria pesquisar em detalhes uma doença sobre a qual muito pouco foi publicado em nosso país, mas que se tornou uma doença generalizada em certas regiões." #NT!
 panum.2211.f: "Além das principais doenças epidêmicas, existem numerosas doenças cotidianas e generalizadas, bem como flagelos da humanidade há muito conhecidos, cujas causas e métodos de cura ainda são desconhecidos. Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se pergunta se ele não deve se concentrar em uma doença muito específica." #NT!
 panum.2211.g: "Examine a doença do Woolstorter." #NT!
 panum.2211.h: "Examine a doença do bócio." #NT!
 panum.2211.i: "Examine a doença da pedra renal." #NT!
 panum.2211.j: "Examine Pellagra." #NT!
 panum.2211.k: "Examine raquitistas." #NT!
 panum.2211.l: "Examine a sífilis." #NT!
 panum.2211.m: "Examine o tétano" #NT!
 panum.2211.z: "O médico deve usar o tempo para se concentrar mais no treinamento." #NT!
  
