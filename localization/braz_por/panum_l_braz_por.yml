 panum_physician_achievement_aspirin_inventor_loc: "\ nd. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] é considerado o inventor -chave do #o aspirin#! e não apenas forneceu alívio da dor a inúmeros pacientes, mas também revolucionou a indústria farmacêutica." #NT!
 panum_physician_achievement_xray_inventor_loc: "\ nwith a descoberta de #o-rays#!, Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastName] é considerado um dos principais físicos internacionais que revolucionaram a medicina e a física em igual medida." #NT!
 panum_physician_achievement_bloodtypes_inventor_loc: "\ n com a descoberta de diferentes grupos sanguíneos de #o, a saber, A, B, AB e 0#!, Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] desempenhou um papel significativo para garantir que entendamos mais sobre o sangue como tal - e que as transfusões de sangue são mais bem -sucedidas." #NT!
 panum_physician_achievement_ecg_inventor_loc: "\ nThe #o ECG#!, inventado pelo Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], tornou possível medir a atividade elétrica do coração e representa um marco nas operações hospitalares." #NT!
 panum_physician_achievement_transplantation_inventor_loc: "\ nwith o #o Primeiro transplante §1 Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ganhou um lugar no histórico médico." #NT!
 panum_physician_achievement_stereotactic_method_inventor_loc: "\ NO DIA, o método estereotático #o §1 [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] inventado é considerado inovador na cirurgia cerebral." #NT!
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\ nwith o desenvolvimento de um desvio do cardiopulmonar #o §1 Dr. §2 alcançou uma obra -prima da medicina moderna." #NT!
 panum_physician_achievement_endoscope_inventor_loc: "\ n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis|U] A invenção do #o Endoscope#!, com a qual o interior humano pode ser examinado pela primeira vez, também é particularmente lembrado." #NT!
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\ nd. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] inventou um aparelho que facilita o exame das doenças oculares e, assim, prestou um serviço inestimável à oftalmologia: #o The Ophthalmoscope#!." #NT!
 panum_physician_achievement_chemotherapy_inventor_loc: "\ nThe #o quimioterapia#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] Desenvolvido para tratar até as doenças mais teimosas com uma variedade de medicamentos oferecem até pacientes com câncer, esperam que nem tudo seja em vão." #NT!
 panum_physician_achievement_iron_lung_inventor_loc: "\ n[GetPlayer.MakeScope.Var('gaudi_engineer_var').GetCharacter.GetHerHis|U] #o A construção do primeiro pulmão de ferro para sustentar a vida de pacientes com poliomielite em necessidade crítica é considerada uma das realizações de engenharia mais fascinantes dessa idade." #NT!
 panum_physician_achievement_military_medicine_project_finished_loc: "\ nd. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] #o inventou os métodos mais recentes no campo da medicina de campo, tornando os serviços médicos militares um dos mais reconhecidos do mundo." #NT!
 panum_physician_achievement_inaugurated_asylum_loc: "\ nd. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desempenhou um papel crucial na fundação do #o do país primeiro asilo mental #!, a fim de fornecer ajuda abrangente e humana aos doentes mentais." #NT!
  
