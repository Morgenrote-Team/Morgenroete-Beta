 je_panum_cholera_description_reason: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está atualmente examinando vários pacientes para determinar os sintomas de #YELLOW Cholera#!. É crucial poder diferenciar entre outras doenças semelhantes ou coexistentes. No final de seu trabalho, o cientista disponibiliza sua descrição ao público, para que as gerações futuras tenham uma chance melhor de reconhecer os antecedentes da doença e encontrar métodos de tratamento." #NT!
 je_panum_tuberculosis_description_reason: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está atualmente examinando vários pacientes para determinar os sintomas de #YELLOW tuberculosis#!. É crucial poder diferenciar outras doenças semelhantes ou coexistentes. No final de seu trabalho, o cientista disponibiliza sua descrição ao público, para que as gerações futuras tenham uma chance melhor de reconhecer os antecedentes da doença e encontrar métodos de tratamento." #NT!
