 panum.2301.t: "Tratamento bem-sucedido de [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2301.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] tratou com sucesso o [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] do [SCOPE.sCharacter('chosen_character').GetFullName]." #NT!
 panum.2301.f: "\"Não se preocupe, senhor, esse tratamento certamente funcionará! Eu o fiz pelo menos 2 vezes e apenas um paciente morreu!\"" #NT!
 panum.2301.g: "Bom!" #NT!
  
 panum.2302.t: "Tratamento neutro de [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2302.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] tratou o [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] do [SCOPE.sCharacter('chosen_character').GetFullName], mas nada mudou realmente." #NT!
 panum.2302.f: "\"Eu realmente pensei que beber bastante água resolveria o problema!\"" #NT!
 panum.2302.g: "Pelo menos não doeu." #NT!
  
 panum.2303.t: "Tratamento malfeito de [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2303.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] tratou o [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] do [SCOPE.sCharacter('chosen_character').GetFullName] tão mal que piorou ainda mais a condição do [SCOPE.sCharacter('chosen_character').GetHerHis]." #NT!
 panum.2303.f: "\"Esta é a terceira vez que isso acontece esta semana...\"" #NT!
 panum.2303.g: "Isso não deveria ter acontecido!" #NT!
  
 panum.2304.t: "Tratamento Fatal [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2304.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] infelizmente causou a morte do paciente durante o tratamento [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]." #NT!
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]" #NT!
 panum.2304.g: "Uma tragédia!" #NT!
  
 panum_foreign_medical_expedition_modifier: "Expedição Médica Estrangeira" #NT!
  
 panum.137.t: "Expedição quer pesquisar doenças" #NT!
 panum.137.d: "Uma expedição estrangeira chegou às fronteiras do nosso país. Ela consiste principalmente de médicos, cientistas e seus assistentes. Eles aparentemente querem pesquisar a epidemia galopante." #NT!
 panum.137.f: "Expedições médicas podem viajar para outros países para pesquisar cientificamente tratamentos de doenças e escrever descrições de doenças para sua terra natal. Os países anfitriões, por sua vez, se beneficiam disso porque os médicos examinam os pacientes nas áreas epidêmicas." #NT!
 panum.137.g: "Dêem boas-vindas a esses homens e mulheres corajosos." #NT!
  
 panum.2202.t: "Doença Antiga" #NT!
 panum.2202.d: "Nosso Doutor trouxe insights preciosos ao trabalho do nosso Antropólogo!" #NT!
 panum.2202.f: "'...mas, é claro, se você examinar esta parte do crânio deles, você pode ver que eles realmente começaram a se curar dos ferimentos.'\n\n'Então essa definitivamente não foi a causa da morte?'\n\n'Muito provavelmente! Um golpe feio, mas não letal. Eu estimaria que eles passaram mais seis meses vivos antes que outro ferimento os derrubasse, ou talvez o ferimento tenha piorado.'\n\n'Hmmm. Fascinante. A julgar pela natureza do golpe, pensei que provavelmente fosse algum tipo de... instrumento contundente.'\n\n'Um porrete, provavelmente, ou talvez uma ferramenta com uma pedra contundente. Acho que esta costela apresenta a verdadeira causa da morte. Observe o estreitamento dos ossos, aqui e aqui.'\n\n'Ferimento?'\n\n'Tuberculose, provavelmente. Eu apostaria que seu homem morreu depois de anos lutando contra essa morte branca.'" #NT!
 panum.2202.g: "A ciência interdisciplinar continua sendo a melhor ciência." #NT!
 panum.2203.t: "Medicina Estranha" #NT!
 panum.2203.d: "Com algum tempo livre juntos, nosso médico e arqueólogo compartilharam suas pesquisas!" #NT!
 panum.2203.f: "'Ah, mas é aí que as coisas ficam interessantes, doutor! Esses jarros vêm do Egito e contêm o que acreditamos ser amostras de remédios antigos.'\n\nFascinante, fascinante. É esse o óleo de múmia?'\n\n'... não é encontrado nos corpos, com propriedades curativas? A resina ao redor de seus envoltórios?'\n\n'Oh, não, de jeito nenhum! Múmia é um tipo de óleo que eles encontram no solo, semelhante ao petróleo. Por quê?'\n\n'... Acho melhor examinarmos mais esses medicamentos. Existem todos os tipos de tinturas. Por favor, dê uma olhada nelas, e eu volto em um momento. Preciso me desfazer de... algo.'\n\n'Bem, parece que eles podem ter sido perfumados e - você está comendo alguma coisa aí?'" #NT!
 panum.2203.g: "...você não vai comer a múmia, vai?" #NT!
 panum.2204.t: "Remédios Herbais?" #NT!
 panum.2204.d: "Depois de algum tempo para examinar suas descobertas, nosso naturalista entregou plantas com propriedades potencialmente medicinais ao consultório do nosso médico." #NT!
 panum.2204.f: "'Ah, aí está você! Eu estava catalogando algumas das amostras que trouxemos da última expedição botânica e encontrei algumas que podem ser do seu interesse.'\n\n'Ah, é mesmo? Como assim?'\n\n'Algumas delas estão relacionadas a plantas com propriedades medicinais conhecidas, como combater inflamações ou febres. Algumas delas são completamente estranhas para nós, mas vêm com boas palavras dos nativos e vale a pena investigar mais a fundo.'\n\n'A fitoterapia não é uma ciência muito boa... mas nunca se sabe. Pode haver algo interessante nelas. Você conhece as maravilhas que encontraram na planta papoula, afinal.'\n\n'Ah, morfina!'\n\n'De fato, de fato! Vou mandar meus assistentes trabalharem na preparação de algumas amostras em pó para um exame mais detalhado.'" #NT!
 panum.2204.g: "Acredito que a folha de coca é especialmente fascinante, doutor." #NT!
  
