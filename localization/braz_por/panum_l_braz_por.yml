 panum.2500.t: "Apoio médico avançado" #NT!
 panum.2500.d: "Nosso [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] trabalha há anos para melhorar o apoio médico na guerra. Os novos métodos e meios agora podem ser usados ​​no campo de batalha!" #NT!
 panum.2500.f: "\ n'Pay Atenção ao uso exato desta seringa. E sempre tenha soro suficiente na mão. E ataduras. De preferência um kit de primeiros socorros. Você sabe o que significa esterilização?" #NT!
 panum.2500.g: "Os soldados um dia construirão um monumento ao médico." #NT!
