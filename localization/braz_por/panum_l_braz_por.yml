 panum.52.t: "Expedição de Observação Médica" #NT!
 panum.52.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] reuniu uma pequena equipe de especialistas e assistentes que são adequados para observar de perto uma epidemia no exterior e tirar conclusões dela. A questão agora é qual doença deve ser observada em qual país." #NT!
 panum.52.f: "Existem dois tipos diferentes de expedições médicas que um médico pode realizar: expedições de observação e expedições de pesquisa. As expedições de observação ajudam a completar uma descrição de uma doença, as expedições de pesquisa para descobrir um método de tratamento. No entanto, uma expedição não é tão eficiente quanto a pesquisa no local e pode levar várias tentativas para pesquisar completamente uma doença." #NT!
