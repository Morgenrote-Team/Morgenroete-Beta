 panum_character_treatment_fatal_fallback_loc: "\"Quem imaginaria que cortar aquele vaso sanguíneo mataria o paciente?\"" #NT!
 panum_character_treatment_fatal_tripple_death_loc: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] planejou uma cirurgia rápida para tratar o paciente [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. O [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] conseguiu realizar a cirurgia em pouco mais de 2 minutos, mas amputou os dedos de um assistente - que mais tarde morreu de uma infecção. Infelizmente, o paciente também morreu de uma infecção mais tarde. Além disso, um espectador cujas abas do casaco também foram cortadas acidentalmente desmaiou porque pensou que seus órgãos vitais estavam feridos, mais tarde foi descoberto que ele morreu de choque." #NT!
 panum_character_treatment_fatal_unwashed_hands_loc: "A cirurgia foi perfeita. O paciente estava vivo, todos os problemas foram resolvidos e todos pensaram que seria uma recuperação rápida. Poucos dias depois, no entanto, uma infecção foi descoberta e se espalhou como fogo. Apenas algumas horas depois, o paciente morreu. O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ficou muito confuso sobre como isso poderia ter acontecido, pois o [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] trocou a faca após a cirurgia anterior, apenas alguns minutos antes." #NT!
 panum_character_treatment_fatal_forgotten_snack_loc: "Após a morte do paciente, uma autópsia foi conduzida. Dentro do paciente. Para a surpresa de todos, um sanduíche meio comido foi encontrado. Ninguém sabia como ele foi parar ali até que um assistente se lembrou de que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comeu um sanduíche durante a cirurgia." #NT!
 panum_character_treatment_fatal_blood_loss_loc: "No início, a cirurgia correu bem. Parecia que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu tratar o paciente com sucesso. No entanto, o paciente nunca se recuperou. Parece que houve muito sangue perdido, o que deixou o paciente muito fraco e resultou em morte após mais 3 dias." #NT!
 panum_character_treatment_fatal_morphine_overdose_loc: "A cirurgia pareceu correr bem, graças ao uso de Morfina o paciente não sentiu nenhuma dor durante o procedimento. Infelizmente o paciente não sentiu mais nenhuma dor, pois a quantidade de Morfina era muito grande e o paciente morreu." #NT!
 panum_character_treatment_fatal_drunken_doctor_loc: "Todos ficaram um pouco confusos quando o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] começou a beber o álcool medicinal durante a cirurgia. Também não ajudou que o [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] começou a cortar nos lugares errados, gritar com os assistentes e finalmente atingir uma artéria importante. Infelizmente, o paciente não pôde ser salvo mesmo depois que outro médico foi chamado para ajudar." #NT!
 panum_character_treatment_fatal_forgotten_instruments_loc: "Após uma cirurgia bem-sucedida, o paciente do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] pareceu melhorar. Mas apenas um dia depois, o paciente morreu. Uma autópsia revelou um bisturi que, de alguma forma, foi esquecido dentro do paciente. Conforme o paciente se movia novamente, o bisturi começou a cortar tecidos e vasos sanguíneos, o que causou sangramento interno." #NT!
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Uma cirurgia muito bem-sucedida infelizmente teve um final horrível. O paciente nunca acordou da anestesia. Ninguém sabe o que pode ter causado isso, mas o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] supõe que o corpo do paciente já estava muito fraco." #NT!
 panum_character_treatment_fatal_fake_doctor_loc: "No começo, a cirurgia parecia ter ido muito bem. Assim que o Doutor saiu da sala, não demorou muito para que a situação mudasse para pior. De repente, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] invadiu a sala e disse que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] estava muito arrependido por chegar atrasado. Todos ficaram confusos, pois o Doutor apenas realizou a cirurgia. Parece que uma pessoa aleatória fingiu ser o cirurgião e realizou a cirurgia. Infelizmente, no final, o paciente morreu e ninguém sabe quem é o responsável pela morte." #NT!
 panum_character_treatment_fatal_slippery_floor_loc: "Foi uma ótima cirurgia até que o pé do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou uma poça de sangue no chão. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] escorregou e caiu bem em cima do paciente. Infelizmente, o bisturi perfurou o coração do paciente, o que causou a morte do paciente." #NT!
  
 panum.242.t: "Morte da Multidão" #NT!
 panum.242.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] acha impressionante que a tuberculose ocorra consistentemente em áreas densamente povoadas, mas apenas raramente em regiões escassamente povoadas." #NT!
 panum.242.f: "'Eu dei uma olhada mais de perto em alguns dos tratados que recomendam resorts de saúde climáticos para curar tuberculose. Um artigo me pareceu tão pouco convincente que acho que meu colega confundiu correlação com causalidade. Ele assume que as pessoas nas montanhas são mais saudáveis ​​porque o ar é mais saudável e, portanto, não são vítimas de tuberculose. Mas não é óbvio que, em princípio, podemos observar que a tuberculose não aparece nas montanhas porque há menos pessoas lá? Isso fala pela interpretação do sul da Europa de que estamos lidando menos com miasma do que com contágio. A tuberculose pode ser uma doença contagiosa, afinal.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.242.g: "Esta é uma teoria que ressalta que a tuberculose é uma doença contagiosa." #NT!
 panum.242.h: "Esta é uma teoria que ressalta que a teoria do miasma está errada." #NT!
 panum.243.t: "Um eremita da tuberculose" #NT!
 panum.243.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez uma descoberta interessante em uma conversa com um sobrevivente de tuberculose." #NT!
 panum.243.f: "'Você disse que seu irmão morreu de tuberculose?'\n'Correto. Eu tinha dezenove anos na época. Eu o vi morrer diante dos meus olhos.'\n'E você também ficou doente com tuberculose mais tarde?'\n'Exatamente. Presumi que, assim como ele, eu morreria em breve. Isso era seguro para mim. Então me retirei para uma área remota para morrer. Eu queria passar meus últimos dias na natureza, longe da civilização.'\n'Mas você sobreviveu. Qual você acha que é a razão para isso?'\n''Alimentação saudável e exercícios. Em algum momento, reuni força suficiente para superar a doença.'\n'Hm.'" #NT!
 panum.243.g: "É realmente só isso?" #NT!
 panum.244.t: "Nada hereditário" #NT!
 panum.244.d: "Após longos exames, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] chega à conclusão de que há poucos indícios de que a tuberculose seja realmente uma doença hereditária." #NT!
 panum.244.f: "'Se você tivesse me dito durante meu treinamento que um dia eu seguiria o trabalho genealógico, eu teria ficado bastante surpreso. Mas dificilmente havia outra maneira de confirmar minha teoria além de perguntar às próprias famílias afetadas, bem como às autoridades e ao clero. Se a tuberculose é de fato uma doença hereditária, então uma que pode permanecer sem ser detectada por gerações. Existem árvores genealógicas inteiras sem um caso de tuberculose, apenas para que ela destrua repentinamente uma família inteira. E é um fato impressionante que a tuberculose não é uma doença estática e controlável, mas apenas se tornou o perigo que representa hoje nas últimas décadas. Deixe-me colocar desta forma: se a tuberculose é uma doença hereditária, então obviamente todos nós temos uma predisposição. Como você pode ver no apêndice do meu estudo, as estatísticas falam por si.'\n\nPalestra de [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] para a Faculdade de Medicina" #NT!
 panum.244.g: "Então, teoricamente, qualquer um pode ser infectado?" #NT!
 panum.245.t: "Tubérculos" #NT!
 panum.245.d: "Durante um exame anatômico, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] obteve novos insights sobre os tumores no tecido pulmonar que dão nome à doença." #NT!
 panum.245.f: "René Laennec desenvolveu o estetoscópio, originalmente para examinar a tuberculose. Nos anos que se seguiram, ajudou que a doença pudesse ser detectada mais cedo, sendo capaz de ouvir as mudanças no sistema respiratório em um estágio inicial. Ao mesmo tempo, o conhecimento sobre o desenvolvimento da tuberculose dentro do corpo cresceu." #NT!
 panum.245.g: "Pequeno progresso - mas progresso." #NT!
 panum.246.t: "Estilo de vida e imunidade" #NT!
 panum.246.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem sérias dúvidas sobre as teorias tradicionais sobre a causa da tuberculose após examinar minuciosamente vários pacientes e suas biografias." #NT!
 panum.246.f: "'O exame de vários pacientes em [SCOPE.sState('panum_disease_state').GetCityHubName], incluindo suas histórias pessoais, levanta mais perguntas do que respostas; desde que se esperem verdades tão simples quanto possível, em vez de apenas fragmentos da verdade. É verdade que o proletariado em particular é severamente afetado pela tuberculose, mas acho questionável se uma pessoa rica no mesmo meio também não seria vítima da doença. Estou convencido de que uma boa nutrição, ar fresco e exercícios físicos oferecem um certo nível de resiliência contra doenças - mas não acredito que eles possam, portanto, ser descartados em princípio. Em suma: acredito que a ideia de que alguém contrai tuberculose porque é um artista ou um proletário é uma afirmação cientificamente insustentável. Se fosse esse o caso, então a tuberculose teria escolhido sua afiliação nos últimos anos e agora preferiria trabalhadores de fábrica como suas vítimas altamente espiritualmente escolhidas em vez de músicos e poetas. Ninguém pode acreditar seriamente nisso.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.246.g: "Isso será uma grande decepção para alguns gênios não reconhecidos." #NT!
 panum.247.t: "Uma doença de notificação obrigatória" #NT!
 panum.247.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem experimentado um sistema de relatórios no [SCOPE.sState('panum_disease_state').GetCityHubName] que pode ajudar a conter a tuberculose." #NT!
 panum.247.f: "'A classificação da tuberculose como uma doença de notificação obrigatória pelo [SCOPE.sState('panum_disease_state').GetCityHubName] causou algum ressentimento entre a população porque muitas pessoas consideram a doença um assunto privado. Mas não é, especialmente quando ocorre em forma epidêmica. No momento em que uma doença é considerada contagiosa - e no caso da tuberculose há muito que sugere que é - é um assunto público que pode colocar em risco o bem-estar público. É melhor ter uma doença de notificação obrigatória do que uma quarentena. O isolamento de fontes individuais de infecção mostrou que a disseminação da tuberculose poderia ser prevenida sem colocar uma cidade inteira em estado de emergência. Infelizmente, o estigma que os grous da tuberculose agora carregam terá consequências pessoais desagradáveis. Os portadores de tuberculose agora são tratados como leprosos.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.247.g: ""
 panum.248.t: "Matando os micróbios" #NT!
 panum.248.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desenvolveu um processo químico que é baseado em conhecimento prévio de microrganismos. Ele pode prevenir tuberculose no futuro." #NT!
 panum.248.f: "Pasteurização refere-se ao aquecimento de curto prazo de alimentos líquidos ou pastosos a temperaturas de pelo menos 72 °C a um máximo de 100 °C para matar as fases vegetativas de microrganismos a fim de preservar os alimentos de forma suave. O processo foi usado para vinho a partir de meados do século XIX. Só mais tarde foi usado em leite cru, através do qual os patógenos da tuberculose bovina poderiam ser transmitidos aos humanos. A pasteurização do leite cru, portanto, desempenhou um papel na contenção da tuberculose. Esta descoberta é mais importante do que se poderia pensar: por muito tempo, médicos, biólogos e químicos presumiram que a tuberculose do gado não poderia ser transmitida aos humanos. Até mesmo o especialista em tuberculose Robert Koch estava errado a esse respeito, e só mais tarde ele revisou sua opinião - um período em que muitas crianças foram infectadas através do leite e da manteiga da tuberculose." #NT!
 panum.248.g: "E eu que achava que leite era basicamente saudável!" #NT!
 panum.249.t: "Cuspidor pessoal" #NT!
 panum.249.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notou um acessório que se tornou particularmente popular entre mulheres que sofrem de tuberculose. Ele tem um sofisticado invólucro de vidro azul que parece tão moderno que você vai esquecer que é uma escarradeira." #NT!
 panum.249.f: "'A maioria de nós tem isso aqui em cima. Também tem um nome conosco, um apelido, bem divertido.' Sem nenhuma restrição, com uma cara teimosamente ignorante, ela proferiu a expressão sombria 'The Blue Heinrich'.' - Thomas Mann, Zauberberg" #NT!
 panum.249.g: "Se cada pessoa doente carregasse algo assim..." #NT!
  
 panum.251.t: "Uma doença celular?" #NT!
 panum.251.d: "O estudo muito notado de um especialista alemão em tuberculose anula as descobertas anteriores do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] porque o [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ainda não conseguiu encontrar uma contra-resposta adequada." #NT!
 panum.251.f: "'Há alguns colegas que afirmam apaixonadamente que a tuberculose pode ser transmitida por infecção. Quando confrontados com o fato de que há muitos pacientes que desenvolveram a doença sem terem estado perto de um guindaste tuberculoso, eles afirmam que ela provavelmente foi infectada em algum lugar anos atrás. Como alguém pode provar isso? Em vez disso, meus próprios estudos mostram que os tubérculos do tecido pulmonar devem ser interpretados como proliferação celular. A tuberculose deve, portanto, ser interpretada, como o carcinoma, como o resultado da proliferação de células locais. Ela pode ser claramente identificada como uma doença constitucional.'\n\nDra. Angelika Hasenbein, 'Tuberculose, uma doença semelhante ao câncer'" #NT!
 panum.251.g: "Então a tuberculose funciona como um tumor celular?" #NT!
 panum.252.t: "Bronquiectasia" #NT!
 panum.252.d: "Como o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu, algumas supostas descobertas que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] pensou que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] havia obtido de pacientes com tuberculose estavam incorretas. Eles sofriam de uma doença completamente diferente." #NT!
 panum.252.f: "'Infelizmente, algumas pesquisas acabaram sendo um beco sem saída. Então eu acreditava que alguns pacientes com tuberculose tinham se recuperado sob certas circunstâncias. Na realidade, eles não tinham tuberculose, mas bronquiectasia. Não está excluído que a tuberculose possa promover bronquiectasia, mas essas são duas doenças diferentes e nem todos os resultados são, portanto, aplicáveis. Isso provavelmente atrasará significativamente a busca por um método de tratamento bem-sucedido.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.252.g: "Tempo perdido!" #NT!
 panum.253.t: "Charlatanismo" #NT!
 panum.253.d: "Uma visita a um sanatório em [SCOPE.sState('panum_disease_state').GetCityHubName] acabou sendo uma completa decepção para o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.253.f: "'Muitos colegas e especialistas médicos reconhecidos me recomendaram o sanatório em [SCOPE.sState('panum_disease_state').GetCityHubName]. É uma instituição exemplar que atua no campo da tuberculose com métodos extremamente sérios - eles disseram. Vários pacientes falaram de milagres médicos ocorrendo lá.\n\nNo entanto, após semanas de visita, percebi que era principalmente marketing. Enquanto os médicos no local me garantiam o quão grandes eram as chances de recuperação, descobri exatamente o oposto. Quando olhei os arquivos dos pacientes, descobri que quase 50 por cento dos pacientes admitidos morreram na primeira semana. Todo esse sanatório é uma farsa!\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.253.g: "Mas... mas... o jantar deve ser excelente!" #NT!
 panum.254.t: "Contato com a Morte Branca" #NT!
 panum.254.d: "Aparentemente, as muitas visitas a pacientes com tuberculose tiveram um efeito indesejado: o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] cuspiu sangue hoje!" #NT!
 panum.254.f: "'Que dia infeliz. Minhas relações com a tuberculose e meu suposto conhecimento da doença agora estão se vingando. Por um lado, eu estava errado em tantos níveis que é justo que meu orgulho seja punido. Por outro lado, é uma indicação de que é uma doença contagiosa. Mas a que custo eu tive que fazer essa descoberta?\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] em [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.254.g: "O médico vai se recuperar disso, certo?" #NT!
  
 panum.264.t: "De Contágio" #NT!
 panum.264.d: "Os interesses históricos do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] levaram [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] a se deparar com um livro antigo da Renascença, que tem um valor imensurável." #NT!
 panum.264.f: "Já em 1546, o médico veronês Girolamo Fracastoro postulou que as doenças eram causadas principalmente por infecção com partículas minúsculas que lembravam germes posteriores. Ele, portanto, duvidou da teoria do miasma há mais de 300 anos. Com relação à tuberculose, Fracastoro também diz que é uma doença contagiosa transmitida por esses patógenos. O livro às vezes é mais convincente do que muitos tratados modernos. O que é revolucionário é que Fracastoro assume que esses chamados "fômites" entram pelo sistema respiratório ou poros do corpo para procurar comida. Isso faria a doença progredir." #NT!
 panum.264.g: "Isso estimulará a busca por tratamento." #NT!
 panum.264.h: "Isso é muito mais convincente do que a teoria do miasma." #NT!
 panum.264.i: "Um pequeno patógeno poderia causar tuberculose?" #NT!
  
 panum.240.t: "Tuberculose - Uma doença contagiosa" #NT!
 panum.240.d: "Por meio de vários experimentos e exames de pacientes, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] foi capaz de provar conclusivamente que a tuberculose não é apenas uma doença contagiosa, mas também foi capaz de derivar vários métodos de prevenção disso no tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] '[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]'." #NT!
 panum.240.f: "'O conhecimento de que a tuberculose é uma doença que pode ser transmitida de pessoa para pessoa e também de animal para pessoa leva a uma série de medidas para prevenir a doença.\nPrimeiro, os portadores de tuberculose devem ser mantidos longe das massas.\nSegundo, a doença deve ser notificável para que a disseminação possa ser mitigada.\nTerceiro, regulamentações devem ser emitidas para garantir a higiene pública - como a proibição de cuspir em público ou pelo menos o uso de escarradeiras públicas e pessoais.\nQuarto, a saúde pública deve ser melhorada para minimizar a infecção entre os proletários.\nQuinto, a pasteurização do leite cru é essencial.'\n\nDe:[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.240.g: "A tuberculose não é mais o destino." #NT!
  
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Isso dá uma pista...provavelmente." #NT!
 panum_yellow_fever_fork_note_tt: "#R NOTA:#! A segunda opção será possível com um biólogo. Este recurso será adicionado mais tarde." #NT!
  
 panum.540.t: "Prevenindo? Prevenido!" #NT!
 panum.540.d: "Após semanas de pesquisa e estudo, nosso médico criou uma maneira de impedir a propagação da febre amarela!" #NT!
 panum.540.f: "'...mas no final, uma prova permaneceu, certa e indesculpável. Seja por rede, fumaça ou pesticida, minha investigação revelou que sempre que o caminho do mosquito era interrompido por qualquer motivo, a propagação da febre amarela era interrompida. Deve ser, então, uma doença transmitida por insetos. Se pudermos interromper o processo de desova, podemos muito bem evitar que novos mosquitos cheguem para infectar nosso povo. É apenas uma questão de meios, e eu elaborei um plano de três pontos.\n\nI: Pulverizar lagoas, pântanos e charcos locais com pesticida para torná-los inadequados para a desova. Se possível, drene completamente os corpos d'água menores.\nII: Instale mosquiteiros, coberturas de tecido dosadas com pesticida, em todas as aberturas de edifícios públicos, especialmente hospitais.\nIII: Informe as pessoas sobre a natureza desta doença como sendo transmitida pelo mosquito, e incentive o uso de mosquiteiros, inseticidas e fumaça para fumigar suas casas.\n\nAcredito sinceramente que se esses métodos forem colocados em ação, então poderemos ver o fim da febre amarela endêmica em nossas vidas, e o fim deste inimigo mais persistente.'\n\nDe: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] por Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.540.g: "Muito bem, doutor. Agora, para pegar algumas redes mosquiteiras e repelente de insetos..." #NT!
  
 panum.541.t: "Prevenindo? Prevenido!" #NT!
 panum.541.d: "O Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], nosso médico-chefe, chegou ao [SCOPE.sState('panum_disease_state').GetName] para investigar a misteriosa Febre Amarela." #NT!
 panum.541.f_america: "'Chegamos em [SCOPE.sState('panum_disease_state').GetCityHubName] bem antes do amanhecer, nosso trem chegando à estação para encontrar uma plataforma vazia de passageiros e com apenas um frasco de sopa quente para o maquinista e seus colegas na locomotiva. Poucos homens poderiam partir de um trem tão cedo pela manhã, mas eu mal conseguia descansar; as cartas e notas do governo local pesavam muito em minha mente, pois falavam de uma doença estranha, a febre amarela. O nome deriva da icterícia que acompanha a doença, embora isso dificilmente seja o fim dos problemas - vômitos, dores no abdômen, sangramento nos olhos, e estes matam muitos.\n\nMas embora os resultados sejam familiares para nós, escritos em relatos que remontam à primeira colonização dessas terras, a natureza da doença em si há muito tempo escapa à ciência. Foi lá que encontrei o propósito e a energia para acordar meus colegas e levá-los do trem para a cidade, sob o brilho das lâmpadas a gás em torno das quais os mosquitos zumbem incessantemente. Se quisermos derrotar esta doença, precisamos aprender a maior questão de todas. Contra o que estamos lutando?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre Febre Amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.541.f_africa: "'Passava um pouco do meio-dia quando nosso navio atracou no porto, e o capitão nos informou que tínhamos chegado ao nosso destino. Um dos grandes postos avançados do nosso império colonial, a administração local havia enviado uma mensagem de volta à capital sobre uma doença estranha e letal que eles tinham dificuldade em entender - não uma mera gripe comum, mas a infame Febre Amarela. Não é realmente estranho para mim, nem para ninguém bem lido na história das doenças tropicais... mas por tudo o que sabemos sobre seus muitos meios de matar, sabemos tão pouco sobre a doença em si.\n\nAcompanhados por meus assistentes e uma escolta armada, estabelecemos um laboratório não muito longe do centro da cidade. Lá, podemos manter nossas amostras, fazer nossa casa e realizar a pesquisa necessária para decifrar os mistérios da Febre Amarela... mas primeiro, devemos encontrar essas amostras, e a presença incessante de mosquitos é uma distração indesejada. Ainda assim, isso não nos impedirá de trabalhar.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre Febre Amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.541.g: "Vamos, cavalheiros...bocejem." #NT!
 panum.541.h: "...malditos mosquitos." #NT!
 panum.542.t: "Guerras de ontem" #NT!
 panum.542.d: "Na tentativa de descobrir mais sobre a história da Febre Amarela nessas terras, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] decidiu consultar o comandante de uma guarnição local." #NT!
 panum.542.f: "'Ah, que bom ver você, doutor. Meus homens sempre ficam felizes em saber que estão em boas mãos se a doença chegar. O que posso fazer por você?'\n'O prazer é meu, coronel. Disseram-me que você pode ter registros de campanhas passadas aqui? Você tem alguma que possa ter visto um surto de febre amarela entre as tropas?'\n'Oh, certamente... aqui. Aquela foi uma campanha terrível, acredite em mim, e não apenas o inimigo. Muitos rapazes que morrem na guerra morrem dos elementos, doenças, exposição. Eles chamam isso de desgaste.'\n'Este... desgaste era especialmente ruim, então?'\n'Pior do que ruim. Entre a doença e a estação chuvosa, um homem tinha mais a temer no acampamento do que no campo de batalha. O calor também era terrível, e os insetos.'" #NT!
 panum.542.g: "Insetos, doenças, chuva... um inferno criado pela própria natureza, pode-se dizer." #NT!
 panum.543.t: "Campos de Aflição" #NT!
 panum.543.d: "Dando continuidade à missão [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] de aprender mais sobre a Febre Amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viajou para fora do assentamento, para um aparente foco de infecção: uma fazenda rural." #NT!
 panum.543.f: "'Admito que levei quase uma hora para aprender a entender esse sotaque rural, mas o dono da fazenda provou ser bastante informativo. Embora essa região seja frequentemente bastante úmida, ainda há necessidade de obras de irrigação. No entanto, cavar essas trincheiras exige força significativa, fornecida por muitas dezenas de trabalhadores locais, que muitas vezes vivem juntos em barracas apertadas e desorganizadas. Essas condições podem gerar doenças, e não é surpresa que a febre amarela tenha sido encontrada lá em pouco tempo.\n\nO próprio fazendeiro acredita que veio de um comerciante viajante de algum tipo, ou talvez com comerciantes pegando a colheita ou entregando ferramentas, ele não pode dizer com certeza, mas eu mesmo duvidaria disso. Parece mais que a febre amarela surgiu aqui por conta própria... mas se sim, então como?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre febre amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.543.g: "Como uma doença pode simplesmente... surgir do nada?" #NT!
 panum.544.t: "A Água...?" #NT!
 panum.544.d: "Investigando a possibilidade de que a febre amarela possa ser uma doença transmitida pela água, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] coletou amostras de cursos d'água e poços locais." #NT!
 panum.544.f: "'Uma possibilidade que eu tinha considerado era que essa doença poderia ser talvez similar em natureza à cólera, que poderia ser transmitida por água contaminada. Decidindo ver se esse era o caso, ordenei aos meus assistentes que coletassem amostras antes que eu encontrasse um lugar tranquilo para meu microscópio, onde eu pudesse trabalhar sem ser perturbado. O ar úmido e tropical é uma distração, assim como o zumbido incessante dos mosquitos, mas em pouco tempo, as amostras começaram a deslizar sob a lente, permitindo-me espiar aquele minúsculo dos mundos.\n\nInfelizmente, foi um esforço infrutífero. Alguns eram mais sujos do que outros, até mesmo carregando minúsculos vermes e coisas do tipo, mas estes não correspondiam ao padrão dos infectados, que se espalham pelo mapa como um jato de chumbo. Seja qual for o caso, não consigo encontrar nenhuma pista sobre a natureza da febre amarela nesta água...'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre febre amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.544.g: "...mas se eles não estão lá, então onde estão se escondendo?" #NT!
 panum.545.t: "A ilha" #NT!
 panum.545.d: "Intrigado com uma aparente "quebra" no padrão de infecções, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se aventurou em um lugar incomum: uma ilha de pesca." #NT!
 panum.545.f: "'Ah, você deve ser doutor... oh. Perdoe o fedor, doutor. Cuidado para não cair também. Os peixes que comem as tripas que jogamos também podem comê-lo, se puderem.'\n'... por favor, seja rápido. Conte-me sobre este lugar.'\n'Sim, bem, acho que você ficará feliz em saber que não há nenhuma doença aqui. Não aquela febre amarela, pelo menos.'\n'Como assim? Há algo que possa estar poupando seus homens?'\n'Pode ser que eles passem tão pouco tempo em terra. Na maioria dos dias eles estão no mar, e alguns vão mais longe e não voltam por um dia ou mais. Mas deve haver mais do que isso, eu acho. Eles passam o tempo livre aqui na ilha, no quartel ou em suas casas, e não há febre alguma aqui.'\n'Eu vou investigar... não, meus assistentes podem depois que eu retornar.'\n'Eu vou avisar a todos, doutor... e eles nem se despediram.'" #NT!
 panum.545.g: "...mas primeiro, um banho ensaboado. Um banho muito, muito ensaboado." #NT!
 panum.546.t: "Gás de pântano?" #NT!
 panum.546.d: "No que pode ser um retorno assustador da antiga teoria do miasma, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontrou relatos alarmantes: a febre amarela pode estar relacionada aos vapores dos pântanos!" #NT!
 panum.546.f: "'Me dói como tão pouco aqui parece fazer sentido. Nada se alinha com as teorias estabelecidas que conhecemos, e me pego me agarrando a palhas. No entanto, há uma linha de promessa - pântanos. Meus assistentes prepararam lâminas para o microscópio, e elas estão cheias e prosperam com micróbios, mas nada que possamos identificar. E ainda assim, apesar disso, a peste explode nas praias. As casas perto desses pântanos são as mais afetadas pela febre amarela. Alguns até mencionam tê-la na infância.\n\nE ainda assim, não há sinal de... como. Eles não bebem a água, não comem peixes capturados nela, e ainda assim o fedor dela vagueia para suas casas na brisa, inunda-as com o fedor, e a doença logo se segue. Os textos antigos gritariam 'miasma', mas isso não pode ser assim... mas se não, então de que outra forma a doença poderia se espalhar do pântano para a casa?'n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre Febre Amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.546.g: "...ou talvez seja astrológico...não, isso não faz sentido...faz?" #NT!
 panum.547.t: "O Rival" #NT!
 panum.547.d: "Decidindo procurar especialistas locais, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] decidiu visitar um possível aliado: o legista local." #NT!
 panum.547.f: "'Ah, prazer em conhecê-lo, doutor. Peço desculpas se não apertarmos as mãos, tenho um corpo na laje na outra sala.'\n'Febre amarela?'\n'Você pensaria assim, mas não. Malária, você acreditaria? De todas as vezes em que vemos um surto, temos agora, ao mesmo tempo.'\n'Uma infeliz coincidência?'\n'Talvez, mas estou aqui há tempo suficiente para ter visto um padrão. Os dois tendem a vir em pares e, pior ainda, têm sintomas semelhantes e mortes semelhantes. Torna uma tarefa terrível diferenciá-los, eu lhe digo. Eu teria pensado que eram a mesma coisa.'\n'Isso é... bastante fascinante, na verdade. Você tem bons registros disso?'\n'Ah, claro. Vou pedir ao meu assistente para enviá-los a você, embora eu não saiba o quão úteis eles podem ser. Não sei como essa coisa se espalha, doutor, mas aposto que se você conseguir encontrar um, poderá encontrar o outro." #NT!
 panum.547.g: "Então talvez possamos matar dois coelhos com uma cajadada só." #NT!
 panum.548.t: "A Estrada Bifurcada" #NT!
 panum.548.d: "Intrigado com a natureza da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] escreveu de volta à capital para solicitar mais instruções." #NT!
 panum.548.f: "'...e ainda assim, por mais que eu tente, não sei como proceder. Existem poucas 'dicas' para guiar meu curso de investigação e, embora eu tenha examinado muitas revistas médicas e consultado especialistas locais, não tenho certeza do que realmente é a febre amarela. Uma doença, com certeza, mas de que tipo? Uma doença do ar, como um miasma? Algo na água ou na comida? Como ela se espalha de homem para homem ou, talvez, do pântano para o homem?\n\nEssas são perguntas que não posso responder e talvez nunca descubra a verdade. Se não consigo encontrar a doença, não posso esperar combatê-la diretamente, mas minha investigação não é totalmente sem frutos. Talvez eu tenha encontrado duas possíveis vias de pesquisa a serem consideradas:\n\nPrimeiramente, que podemos tentar encontrar algum padrão de como ela está se espalhando. Talvez com uma investigação focada possamos discernir alguma lógica de como a doença é transmitida e, assim, interrompê-la. Talvez interromper a disseminação revele a verdadeira causa.\n\nSegundo, que tentemos inventar alguma forma de cura ou vacina, talvez investigando as crianças que foram infectadas com ela na juventude, mas que se recuperaram completamente, bem como aquelas que sobreviveram. Podemos não saber de suas origens, mas talvez possamos melhorá-la ainda.\n\nComo tal, escrevo para a capital, para vocês, estimados cavalheiros do aprendizado e da ciência, e pergunto: qual deve ser o foco da minha pesquisa aqui?\n\nUma carta do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.548.g: "É melhor prevenir do que remediar." #NT!
 panum.548.h: "Jogamos por todas as bolinhas. Teremos uma vacina." #NT!
  
 panum.551.t: "O Caminho para a Prevenção" #NT!
 panum.551.d: "Seguindo instruções da capital, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] começou a investigar como prevenir a propagação da Febre Amarela." #NT!
 panum.551.f: "'...claro, é difícil determinar o que, exatamente, deve ser feito para evitar a propagação de uma doença que mal entendemos de qualquer forma mais do que como ela pode induzir a fatalidade. No entanto, se este é o desafio que devo enfrentar, então que assim seja. Descobri uma série de pistas promissoras até agora; meu mapa da infecção é esporádico, mas aqui e ali, certas ilhas de irregularidade aparecem... lugares onde o surto cai significativamente, até mesmo completamente.\n\nNão posso fingir que realmente entendo a natureza desta doença, mas a doença dificilmente é irregular. Há um padrão aqui, esperando para ser descoberto, e se puder ser encontrado, então podemos muito bem resolver este quebra-cabeça e nos livrar da febre amarela para sempre.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre febre amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.551.g: "Estamos construindo uma fortaleza, um tijolo de cada vez." #NT!
 panum.552.t: "Filé de fatos" #NT!
 panum.552.d: "Enquanto trabalhava em um meio de prevenir a propagação da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] foi visitado por um dos assistentes do [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]." #NT!
 panum.552.f: "'Ah, é bom ver você de novo, meu rapaz, e - meu Deus! Que fedor é esse?'\n'Desculpe, doutor... Acabei de voltar da pescaria, aquela que você me mandou investigar. Encontrei algo muito interessante!'\n'Tão interessante que você não conseguiu reservar um tempo para um banho, ao que parece...'\n'Perdoe-me, mas sim. Eu pesquisei como a febre amarela não afetava os homens na pescaria e comecei a segui-la de volta ao continente. Há um fumeiro na costa, e os trabalhadores saem por ele, e ninguém está pegando febre amarela lá. E isso me fez pensar... talvez a fumaça a mantenha longe? Então, comecei a procurar lugares com muita fumaça, e encontrei este fabricante de sabão, e eles colocam ervas e óleos em seu queimador. Nem uma única febre amarela em sua casa.'\n'Hmmm... este é um trabalho fascinante. Continue suas observações e me mantenha informado e, oh, bom trabalho.'" #NT!
 panum.552.g: "Passos ansiosos mandam o assistente embora...mas deixam o médico pensando." #NT!
 panum.553.t_america: "A missão" #NT!
 panum.553.d_america: "Seguindo o caminho das lacunas do surto, a pesquisa do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] os levou a uma antiga missão colonial." #NT!
 panum.553.f_america: "'Não demorou muito para encontrar a missão aqui. Foi um dos primeiros edifícios erguidos após a colonização, nossos antepassados ​​recém-chegados de terras que talvez nunca mais veriam. Não é uma grande catedral, mas foi construída com amor e, com o tempo, missionários e membros da Igreja Mãe a viram crescer, explodindo com enfermarias e salões próprios. Foi um dos primeiros lugares para onde os doentes podiam ser trazidos, atendidos por freiras e quaisquer voluntários piedosos dispostos a ajudar.\n\nPor todos os relatos, deveria muito bem ter se tornado um matadouro próprio... e, no entanto, não é assim. Enquanto outros hospitais contam seus mortos e veem a doença saltar de enfermaria para enfermaria, aqui, nada. Uma família foi trazida após um incêndio em casa, mas depois de uma semana, nenhum deles pegou febre amarela, apesar de estarem abrigados a apenas alguns quartos de distância. Isso me intriga, pois tanto a missão quanto o hospital são semelhantes, mas há uma grande diferença: redes. Um sermão é algo sagrado e não pode ser interrompido pelo zumbido de mosquitos e similares, então o clero colocou redes em todas as janelas para manter os mosquitos afastados, mesmo nas enfermarias.\n\nE assim, a febre amarela parece desaparecer completamente.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a febre amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.553.g: "Pois eu te restaurarei a saúde..." #NT!
 panum.553.t_africa: "A Favela" #NT!
 panum.553.d_africa: "Seguindo o caminho das lacunas do surto, a pesquisa do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] os levou a um lugar curioso: as favelas." #NT!
 panum.553.f_africa: "As favelas eram próximas o suficiente para fazer qualquer homem duvidar da importância de nosso grande empreendimento colonial nessas terras. Sujas e miseráveis, lotadas até a explosão de mulheres e crianças, esperando seus homens retornarem das plantações ou das minas ou de onde quer que trabalhem. Bombas de água sobrecarregadas enchem potes, moscas zumbem e uma nítida falta de saneamento se combinariam para fazer este lugar parecer um caldeirão de doenças. De fato, é.\n\nUma visão rara nesses lugares, um médico como eu era levado ansiosamente de casa em casa por guias locais e com a escolta da polícia, solicitado a fornecer informações sobre uma doença ou outra. Em troca, fiz perguntas a eles: e a febre amarela? Vi casos de cólera e disenteria, mas não a doença que estou procurando. Uma mulher apontou para as janelas, ou onde elas deveriam estar - em vez de vidro, uma parede de tecido, uma rede. Para eles, isso mantinha a malária afastada, mas também, talvez, a febre amarela... que, eles acreditam, pode muito bem ser transmitida por insetos.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre a febre amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.553.h: "...e talvez, só talvez, os moradores locais estejam certos?" #NT!
 panum.554.t: "O maior assassino" #NT!
 panum.554.d: "Lendo os registros fornecidos a eles pelas forças militares locais, o Dr. ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez uma descoberta." #NT!
 panum.554.f: "'Ah, é bom encontrá-lo novamente, coronel. Tenho algumas perguntas sobre esses registros que você me deu? Você tem um momento livre?'\n'Oh, mas é claro! Qualquer coisa para ajudar.'\n'Ele menciona aqui que a última campanha foi liderada por um oficial que estava, ao que parece, profundamente incomodado por picadas de insetos.'\n'Preocupado e muito, muito irritado, eu temo. Picadas são apenas uma parte da vida nesta terra, mas de onde elas vieram... nenhuma.'\n'Entendo, entendo... mas também menciona que o exército foi afligido por malária e febre amarela, que matavam mais por doença do que em batalha.'\n'A desistência é há muito tempo uma parte da guerra, eu temo.'\n'...mas uma vez que eles ordenaram o uso de piretro, os casos de febre amarela e malária caíram drasticamente. Então, uma semana depois, ele ordenou a pulverização da área local, e novamente, as taxas caíram. O que é exatamente esse piretro?" #NT!
 panum.554.g: "'Oh, piretro? É usado para despiolhar as tropas. Mata insetos, sabe.'" #NT!
 panum.555.t_america: "As memórias do passado" #NT!
 panum.555.d_america: "Envolvido na batalha contra uma doença que assola a América do Sul há séculos, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] busca respostas em um lugar estranho: o passado." #NT!
 panum.555.f_america: "'Alguns dizem que o passado é um país diferente. Nas Américas, talvez isso seja mais verdadeiro do que em qualquer outro lugar, pois muita coisa mudou desde Colombo, mas, para minha surpresa, a doença que combato não é uma delas. Levei semanas para rastrear diários e registros dos primeiros colonos nessas terras, mas finalmente eles chegaram às minhas mãos. É um achado valioso. Com eles, tenho os relatos de médicos do passado, mentes brilhantes que podem não ter as ferramentas que hoje consideramos garantidas.\n\nNo entanto, embora possamos ter herdado sua batalha inacabada, eles nos deixaram informações preciosas que podem me permitir terminar o que começaram. Há uma revelação preciosa, oculta, difícil de perceber sem esses relatos. De vez em quando, há uma explosão de febre amarela nesta região, quase como um relógio. Isso por si só é inútil, mas se correlaciona quase exatamente com diários que falam de chuva intensa e até inundações, registradas aqui como casas sendo levadas pelas enchentes que são seguidas por surtos de febre amarela. Os dois poderiam estar relacionados?'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre Febre Amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.555.g: "Todos nós estamos sobre ombros de gigantes... eles só tinham menos gigantes para se apoiar." #NT!
 panum.555.t_africa: "Remédios populares" #NT!
 panum.555.d_africa: "Talvez de forma controversa, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] procurou conselhos das pessoas que talvez conhecessem melhor a febre amarela: os nativos." #NT!
 panum.555.f_africa: "'Há aqueles que me chamariam de louco por escolher consultar os nativos em vez de um jornal médico, mas acho que eles não têm um raciocínio sólido para tal julgamento. A febre amarela é uma doença encontrada aqui, na África, e essas pessoas vivem aqui há muito mais tempo do que nós. De fato, há a chance de que essa doença tenha surgido nesta terra em primeiro lugar. Talvez seja assim, pois muitos surtos aqui podem massacrar europeus e semelhantes com facilidade, mas não dão aos povos nativos africanos nada mais do que sintomas semelhantes a uma gripe leve.\n\nNo entanto, apesar disso, há compreensão. Falei com vários curandeiros locais e até mesmo representantes de tribos mais distantes, e eles mencionam certas práticas preventivas... a queima de esterco de elefante e várias plantas, até mesmo trazendo essa fumaça para dentro de casa, o que afasta os mosquitos que eles acreditam estar relacionados à malária e, talvez, à febre amarela. Mais do que isso, eles têm um meio de ler a terra ao redor deles e prever o início da estação 'chuvosa', que eles acreditam corresponder ao pior da malária e da febre amarela. Serão necessários mais estudos e considerações, mas isso é promissor.'\n\nDo diário do Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], escrevendo sobre Febre Amarela em [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.555.h: "Sabedoria, no lugar menos esperado." #NT!
 panum.556.t: "Tecido Simples?" #NT!
 panum.556.d: "Embora destinados a dar suporte às nossas tropas em uma guarnição de fronteira, novos tecidos impregnados com inseticidas chegaram à mesma cidade que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] está investigando." #NT!
 panum.556.f: "'Você deveria estar nesta área - oh, entendo, você é o médico da capital. Não sei se há muito aqui para você, doutor. Não há um único caso dessa febre por aqui.'\n'... que eu possa dizer. O que é isso?'\n'Os generais lá em casa descobriram que podem dosar pesticidas direto no tecido e manter os insetos sangrentos afastados. Viu? Olhe para o chão. Dezenas desses bastardos, já mortos.'\n'Deve ser muito eficaz matá-los tão rapidamente. Quantos homens ficam nessas tendas?'\n'A melhor parte de um batalhão, provavelmente cerca de seiscentos. O tecido é novo, pois os antigos foram destruídos em uma monção no ano passado. Época terrível, febre por toda parte e malária também. Agora temos isso, nada.'" #NT!
 panum.556.g: "...você acabou de dizer que não houve nenhuma febre desde que você comprou esse tecido novo?" #NT!

