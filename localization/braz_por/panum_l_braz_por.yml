 je_panum_military_medicine_project_reason: "Médicos militares e médicos da Cruz Vermelha têm a oportunidade única de melhorar os cuidados médicos no campo de batalha e, assim, salvar muitas vidas - e possivelmente decidir uma guerra. Dependendo dos traços e da experiência dos caráter, essa melhoria ocorre em diferentes velocidades. Após o [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] reforma médica militar, um [concept_mobilization_option] ou um nível superior será desbloqueado." #NT!
