 panum.112.t: "Um vislumbre de esperança" #NT!
 panum.112.d: "Nos hospitais da cólera de [SCOPE.sState('panum_disease_state').GetName], um médico distinguiu particularmente [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] na epidemia atual. A maneira como [SCOPE.sCharacter('panum_new_physician_scope').GetFullName] funciona já ganhou importância nacional. Esse médico poderia potencialmente desempenhar um papel importante para combater a epidemia em [GetPlayer.GetName]." #NT!
 panum.209.t: "Dr. tuberculose" #NT!
 panum.209.d: "O chefe do sanatório de tuberculose, Dr. [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], ofereceu serviços [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis] em meio à epidemia de raiva." #NT!
 panum.112.f: "'Deus falou comigo e me chamou ao seu serviço. O que esse serviço era para tomar a voz não disse. -Florence Nightingale" #NT!
 panum.112.g: "Dê [SCOPE.sCharacter('panum_new_physician_scope').GetHerHim] uma posição oficial imediatamente!" #NT!
 panum.112.h: "O médico deve treinar as gerações futuras para combater a próxima epidemia." #NT!
  
 panum.122.t: "Incubação da cólera" #NT!
 panum.122.d: "Após várias observações e entrevistas, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que uma certa quantidade de tempo passa antes que os sintomas típicos da cólera apareçam em um paciente." #NT!
 panum.122.f: "O médico estima que esse período seja cerca de meio dia a cinco dias, com a média de três dias. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] realizou várias discussões com as vítimas da doença e seus parentes. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] foi capaz de reconstruir os eventos com base em vários relatórios de testemunhas oculares. Mesmo que a causa permaneça obscura, as conclusões poderão ser tiradas posteriormente com essas observações sobre o que exatamente aconteceu no dia 1." #NT!
 panum.122.g: "Bem observado." #NT!
 panum.124.g: "Observado com precisão." #NT!
 panum.123.t: "Sintomas da cólera" #NT!
 panum.123.d: "Hoje, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enviou ao corpo docente médico uma lista abrangente de sintomas da cólera." #NT!
 panum.123.f: "Como já é conhecido, mas até agora apenas rudimentares processados, a cólera é uma doença do intestino delgado humano. As consequências são diarréia extrema com um típico 'fezes de água de arroz' de cor azul e vômito grave. Diz -se que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] apresentava uma certa sequência sádica porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] enviou uma descrição completa desses e de outros sintomas extremamente desagradáveis ​​a tempo do jantar acadêmico." #NT!
 panum.124.t: "Colera Asiatica" #NT!
 panum.124.d: "Em um relatório altamente aclamado, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] elaborou as diferenças entre a cólera e outras doenças semelhantes a cólera, que é considerado um marco na descrição futura da doença." #NT!
 panum.124.f: "O nome cólera, que é derivado da palavra grega para bile, originalmente referida a todas as formas possíveis de diarréia ou problemas intestinais ('fluxo biliar'). Embora Jakob de Bondt já tivesse descrito uma doença da cólera especificamente indiana em 1642, a cólera permaneceu puramente um termo coletivo. Foi apenas com o surgimento das principais pandemias da cólera do século XIX que esse novo tipo de cólera específico, que acabou sendo a doença mais devastadora do século, também foi definida com um nome adequado para diferenciá -lo claramente: a cólera asiatica." #NT!
  
 panum.222.t: "Incubação de tuberculose" #NT!
 panum.222.d: "Em sua pesquisa sobre tuberculose, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] notou algumas esquisitices relacionadas à doença. Aparentemente, pode levar semanas para que uma pessoa doente mostre sintomas típicos." #NT!
 panum.222.f: "Se a teoria de Miasma ou a teoria germinativa: a tuberculose ainda representa um mistério. Se for uma doença infecciosa, aparentemente pode levar semanas para que os sintomas se divirtam: o médico assume entre duas e até doze semanas! Além disso, nem todo mundo que vive com alguém que está doente parece ser infectado diretamente, como [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] descobriu em inúmeras pesquisas de pacientes e parentes. Os acadêmicos estão certos com sua teoria de que a tuberculose não é uma doença infecciosa e outros fatores são responsáveis, ou o risco de infecção é menor do que o primeiro pensamento." #NT!
 panum.223.t: "Sintomas de tuberculose" #NT!
 panum.223.d: "Depois que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] estudou intensamente os sintomas da tuberculose, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] chegou a uma conclusão que surpreendeu até alguns colegas acadêmicos: a tuberculose é uma doença muito mais complicada, com uma ampla variedade de sintomas que vão muito além dos problemas pulmonares." #NT!
 panum.223.f: "Embora o ataque aos pulmões e sua destruição dolorosa e lenta seja uma das características mais conhecidas da tuberculose, a tosse é apenas um dos muitos sintomas. A tuberculose pulmonar é apenas um tipo de tuberculose, que também pode afetar outros órgãos. Fadiga, febre, perda de apetite, suores noturnos ou sangue cuspido eram sintomas anteriormente conhecidos. O fato de a tuberculose não apenas ataca o corpo fora dos pulmões, mas que dois tipos diferentes de tuberculose podem ocorrer ao mesmo tempo, mudou significativamente a visão de mundo de alguns membros da faculdade médica." #NT!
 panum.224.t: "Tuberculose e escrofula" #NT!
 panum.224.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] lidou intensamente com as várias formas de possíveis doenças de tuberculose e, apesar das numerosas semelhanças com outros sintomas da doença, elaborou as diferenças específicas entre tuberculose e escrofula, mas ao mesmo tempo também enfatizou as conexões." #NT!
 panum.224.f: "As descrições da tuberculose existem há séculos, mas não tiveram efeitos comparáveis ​​e devastadores até o século XIX devido a menos urbanização. Ainda era conhecido sob outros nomes até o século XIX - o termo "consumo" ainda era usado no mundo de língua inglesa até o século XX. René Laennec é considerado um dos pioneiros da pesquisa de tuberculose que inventou o estetoscópio para o exame pulmonar. Johann Lukas Schönlein cunhou o termo tuberculose em 1832 e o associou a um quadro clínico específico. Um achado importante desses anos foi que a escrofula e a tuberculose eram duas doenças diferentes, mas dificilmente poderiam ser diferenciadas devido ao grande número de sintomas de tuberculose." #NT!
  
 panum.322.t: "Incubação e sintomas da varíola" #NT!
 panum.322.d: "Em um resumo recente, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] observou que os sintomas iniciais da varíola não são diferentes dos da influenza antes que as pústulas infames apareçam. Pode -se supor que uma a duas semanas se aproxime entre infecção e sintomas." #NT!
 panum.322.f: "'Os facilmente restaurados à saúde da praga me parecem ter sido secos e purgados em relação a todo o corpo, pois o vômito ocorreu em alguns deles e o estômago foi perturbado em tudo. E, da mesma maneira, naqueles que já foram purificados que seriam salvos, as pústulas escuras aparecem claramente em todo o corpo, na maioria das vezes, todos secos. (...) Do lado de fora do corpo não estava quente ao toque, nem havia palidez; A pele estava bastante vermelha, lívida e começou a pequenas bolhas e úlceras. -Galen" #NT!
 panum.323.t: "Varicela ou varíola?" #NT!
 panum.323.d: "Durante a observação de [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] de pacientes com varíola, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu apresentar um relatório parcial de que a varicela é uma doença independente e inofensiva. Essa tem sido uma teoria muito controversa até agora." #NT!
 panum.323.f: "'A varicela quebra muitos sem nenhuma doença ou sinal anterior: em outros, eles são precedidos por um pouco de frio, lassidão, tosse, sono quebrado, dores errantes, perda de apetite e febril por três dias. A maioria deles é do tamanho comum da varíola, mas alguns são menores. Eu nunca os vi confluentes nem muito numerosos. O maior número que eu já observei foi cerca de doze no rosto e duzentos sobre o resto do corpo. No segundo ou no mais distante, no terceiro dia, desde o início da erupção, o maior número de rochas que não são quebradas parecem chegar a toda a sua maturidade, e aqueles que estão mais cheios daquele licor amarelo se assemelham muito ao que a varíola genuína é no quinto ou sexto dia, especialmente onde acontece um espaço maior do que o ordinário ocupado pelo extravastado serum. -William Heberden" #NT!
 panum.324.t: "A diferença entre sarampo e varíola" #NT!
 panum.324.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] comparou os sintomas dos pacientes com varíola, pacientes com sarampo e catapora com extremo cuidado e foi capaz de classificá -los com muita precisão." #NT!
 panum.324.f: "'A erupção da varíola é precedida por uma febre contínua, dor nas costas, coceira no nariz e pesadelos durante o sono. Estes são os sintomas mais agudos de sua abordagem, juntamente com uma dor notável nas costas acompanhadas de febre e coceira sentida pelo paciente em todo o corpo. Um inchaço do rosto aparece, que vem e vai, e percebe -se uma cor inflamatória geral perceptível como uma forte vermelhidão nas bochechas e nos dois olhos. Alguém experimenta um peso de todo o corpo e grande inquietação, que se expressa como muito alongamento e bocejamento. Há uma dor na garganta e no peito e se acha difícil respirar e tossir. Sintomas adicionais são: secura da respiração, cuspida espessa, rouquidão da voz, dor e peso da cabeça, inquietação, náusea e ansiedade. Observe a diferença: inquietação, náusea e ansiedade ocorrem com mais frequência com sarampo do que com a varíola. Por outro lado, a dor nas costas é mais aparente com a varíola do que com o sarampo. -RHAZES" #NT!
  
 panum.422.t: "Sintomas de tifo e incubação" #NT!
 panum.422.d: "Em um primeiro relatório provisório, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] listou os sintomas do tifo, bem como uma estimativa inicial de quando eles aparecem pela primeira vez no curso da doença." #NT!
 panum.422.f: "Febre, calafrios, dor de cabeça, tosse, erupção cutânea, vômito - todos esses são sinais de tifo. No entanto, todos esses sintomas também podem ser encontrados em doenças semelhantes. Náusea e confusão, por outro lado, são típicas para o tifo clássico. O curso característico da febre é um aumento da temperatura de dois a três dias, seguido por uma febre contínua de cerca de dez dias e subsequente adição de cena ao longo de vários dias. De acordo com meus cálculos, leva cerca de dez a quatorze dias entre a infecção e os primeiros sintomas." #NT!
 panum.423.t: "A febre do acampamento" #NT!
 panum.423.d: "Depois que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] compara relatórios históricos de epidemias nas forças armadas com os sintomas atuais dos pacientes com tifo, ele chega à conclusão de que a equitação do tifo e da 'febre do acampamento' é de pouca ajuda." #NT!
 panum.423.f: ""É certamente uma febre do acampamento - mas é a febre do acampamento?" O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez perguntas como essas que levaram os membros do corpo docente médico. Historicamente conhecido como 'febre do acampamento', há muito tempo está associado a epidemias nos principais exércitos ou quartéis, particularmente como a doença que infligiu vítimas maciças ao exército napoleônico. Mas nem todas as doenças do exército conhecidas como 'febre do acampamento' podem ser equiparadas ao tifo. A febre recorrente e a febre da vala são outras doenças que afetam o pessoal militar em espaços confinados. A doença que particularmente enfrentou durante a Guerra Civil Americana, por outro lado, é frequentemente chamada de tifo, mas na verdade era febre tifóide." #NT!
 panum.424.t: "Tifo: Duas doenças em uma?" #NT!
 panum.424.d: "Ao examinar pacientes com tifo, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que várias suposições estavam fundamentalmente erradas. Se os médicos anteriores tivessem diagnosticado uma 'mudança mórbida' no intestino, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não poderia detectar nada disso naqueles que morreram de tifo. Em vez disso, o médico assume que a doença intestinal é uma doença que deve ser distinguida do tifo, que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] chama de 'febre tifóide'." #NT!
 panum.424.f: "Até meados do século XIX, os médicos não diferenciavam entre tifo e febre tifóide. Eles foram simplesmente considerados manifestações da mesma doença com graus variados de sintomas. Em 1836, o médico americano William Gerhard observou que em alguns sofrimentos de tifo, os intestinos não foram afetados pela doença, apesar de ter sido um dos sintomas comumente diagnosticados até esse ponto. Além disso, observações semelhantes o levaram a acreditar que o tifo não era uma doença dos intestinos, mas atacou outros órgãos: confusão mental e dor muscular eram muito mais comuns do que os problemas do trato digestivo. A identificação de séculos de tifo e febre tifóide não apenas levou a uma semelhança nos nomes, mas também levou ao fato de que, em alguns idiomas, a febre tifóide é chamada de tifo, por exemplo, em alemão." #NT!
  
 panum.522.t: "Dois cursos de febre amarela" #NT!
 panum.522.d: "Em [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Observação estreita da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fez a descoberta de que a doença pode progredir de duas maneiras." #NT!
 panum.522.f: "O médico descobriu que, em muitos casos conhecidos, a febre amarela tem uma manifestação leve que passa após alguns dias. Estima -se que cinco em cada seis pacientes experimentam essa forma leve de febre amarela. O outro curso da doença é perigoso e pode ser fatal. Os pacientes sofrem um segundo curso tóxico. É caracterizada por febre recorrente, acompanhada por icterícia devido a danos no fígado, bem como à dor abdominal. Sangramento na boca, nariz, olhos e o trato gastrointestinal causam vômito contendo sangue, portanto um dos nomes em espanhol para febre amarela, vómito negro ('vômito preto'). Também pode haver insuficiência renal, soluços e delírio. Estima -se que 20 a 50 % das vítimas da febre amarela que atingem esse segundo estágio da doença morreram - o acadêmico conclui no relatório apresentado." #NT!
 panum.523.t: "Estação da febre amarela" #NT!
 panum.523.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que as epidemias da febre amarela seguem um certo padrão temporal." #NT!
 panum.523.f: "Registros históricos e dados atuais sugerem que a febre amarela ocorre principalmente no verão. O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ainda não foi capaz de explicar por que a doença não ocorre anualmente como influenza, mas desaparece completamente por longos períodos de tempo. É impressionante que a febre amarela tenha sido particularmente desenfreada em anos chuvosos." #NT!
 panum.524.t: "Uma doença local?" #NT!
 panum.524.d: "Ao descrever a doença da febre amarela, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enfatiza o fato de que a febre amarela é uma doença limitada a certos territórios e se espalha principalmente em áreas pantanosas e tropicais, com algumas exceções." #NT!
 panum.524.f: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] revisou vários relatórios e registros de outras epidemias de febre amarela. O que é impressionante é que eles ocorreram em uma área muito limitada. Regiões tropicais e pântanos na África e na América são afetados principalmente. Embora em alguns casos a epidemia esteja se movendo mais para o norte - por exemplo, para a Filadélfia nos EUA e para Barcelona na Espanha - o médico está convencido de que certas zonas climáticas têm algo a ver com a ocorrência da doença. O fato de ter havido surtos isolados da doença nos portos ingleses não incomoda [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] - porque a doença não se espalhou muito além da área circundante de Port City." #NT!
  
 notification_panum_description_progress_notification_name: "Descrição da doença Progresso" #NT!
 notification_panum_description_progress_notification_desc: "Nosso [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] obteve novas idéias ao observar a doença epidêmica e ganhou uma pista adicional." #NT!
  
 panum_antitoxins_tech: "Antitoxinas" #NT!
 panum_antitoxins_tech_desc: "Uma antitoxina é um anticorpo com a capacidade de neutralizar uma toxina específica. Antitoxinas para a difteria e as toxinas de tétano foram produzidas por Emil Adolf von Behring e seus colegas a partir de 1890. Eles são considerados um dos grandes marcos da história médica." #NT!
  
