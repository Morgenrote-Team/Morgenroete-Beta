 panum.2621.t: "O conceito de ansiedade" #NT!
 panum.2621.d: "Søren Kierkegaard, o principal filósofo da Dinamarca, publicou 'O conceito de ansiedade', um trabalho estético, filosófico e psicológico que chamou a atenção do público de Copenhague." #NT!
 panum.2621.f: "'A possibilidade da liberdade não é a capacidade de escolher o bem ou o mal. A possibilidade é poder. Em um sistema lógico, é conveniente dizer que a possibilidade passa para a realidade. No entanto, na verdade, não é tão conveniente e é necessário um termo intermediário. O termo intermediário é a ansiedade, mas não explica mais o salto qualitativo do que pode justificá -lo eticamente. A ansiedade não é uma categoria de necessidade nem uma categoria de liberdade; É a liberdade emaranhada, onde a liberdade não é livre em si mesma, mas emaranhada, não por necessidade, mas por si só. -Søren Kierkegaard" #NT!
 panum.2621.g: "Uma das maiores mentes da Dinamarca." #NT!
 panum.2621.h: "Kierkegaard se tornará o novo escritor nacional da Dinamarca." #NT!
 panum.2622.t: "O caso estranho de [SCOPE.sCharacter('panum_phineas_gage').GetFullName]" #NT!
 panum.2622.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] investigou o caso estranho de Foreman [SCOPE.sCharacter('panum_phineas_gage').GetFullName]. Durante uma explosão, uma barra de ferro disparou de baixo para cima através do crânio, criando um grande canal de ferida. De acordo com o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ele foi recuperado fisicamente após algumas semanas, e suas habilidades intelectuais, incluindo percepção, memória, inteligência, capacidade de linguagem, bem como suas habilidades motoras estavam completamente intactas. No entanto, no período seguinte ao acidente, [SCOPE.sCharacter('panum_phineas_gage').GetLastName] sofreu mudanças perceptíveis de personalidade." #NT!
 panum.2622.f: "'Acidente horrível. - Como [SCOPE.sCharacter('panum_phineas_gage').GetFullName], um capataz na ferrovia em [SCOPE.sState('panum_phineas_gage_state').GetName], foi ontem engajada em fazer uma explosão, o pó explodiu, carregando um instrumento de ferro através da cabeça uma polegada e uma quarta em circunferência e três pés e oito polegadas de comprimento, que ele estava usando na época. O ferro entrou no lado direito do rosto, quebrando a mandíbula superior e passando para trás do olho esquerdo, e saindo no topo da cabeça." #NT!
 panum.2622.g: "Então, as áreas de psique e cérebro estão conectadas?" #NT!
 panum.2623.t: "Psicologia Transcultural" #NT!
 panum.2623.d: "Durante uma visita a [SCOPE.sState('panum_colonial_state').GetName], o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ficou surpreso ao descobrir que doenças mentais, como as que ocorrem com frequência em [ROOT.GetCountry.GetCapital.GetCityHubName], dificilmente ocorrem nessa área." #NT!
 panum.2623.f: "Emil Kraepelin viajou para Java por quatro meses em 1904 e examinou 225 pessoas no asilo mental de Buitenzorg (agora Bogor). Como o único psiquiatra líder de seu tempo que estava interessado em investigar fenômenos transculturais em psiquiatria, ele queria descobrir, por um lado, se certas formas de loucura, que formam o principal conteúdo de nossas instituições, também existem em condições de vida completamente diferentes e entre tribos completamente diferentes da mesma maneira e com a mesma frequência que os nossos. Por outro lado, ele previu que 'a frequência e as formas de insanidade formarão um dia um rico tesouro para uma compreensão mais profunda das peculiaridades de um povo'." #NT!
 panum.2623.g: "Aparentemente, algumas neuroses estão relacionadas a origens culturais." #NT!
 panum.2624.t: "Drogas" #NT!
 panum.2624.d: "O Chief Chemist [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] experimentou recentemente várias vezes com substâncias por sugestão do médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] para produzir medicamentos psicotrópicos eficazes. O resultado, no entanto, foi ... surpreendente." #NT!
 panum.2624.f: "'Você queria me ver com urgência?' \ N'yes. Eu suspeito que o experimento tenha sido bem-sucedido. 'Você suspeita?' O novo medicamento definitivamente tem um efeito de alívio da dor. É eficaz contra a fadiga. E ajuda contra o medo. Talvez até um pouco bom demais. '" #NT!
 panum.2624.g: "Dietilamida de ácido lisérgico? O que é?" #NT!
 panum.2624.h: "Nossos soldados podem se beneficiar de algum chocolate blindado." #NT!
 panum.2625.t: "Psicofísica" #NT!
 panum.2625.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] postulou algumas teorias interessantes sobre a inter -relação entre experiência psicológica subjetiva e estímulos físicos quantitativamente mensuráveis." #NT!
 panum.2625.f: "A psicofísica investiga quantitativamente a relação entre estímulos físicos e as sensações e percepções que eles produzem. A psicofísica foi descrita como "o estudo científico da relação entre estímulo e sensação". Muitas das técnicas e teorias clássicas da psicofísica foram formuladas em 1860 por Gustav Theodor Fechner. Ele cunhou o termo "psicofísica", descrevendo pesquisas destinadas a relacionar estímulos físicos ao conteúdo da consciência, como sensações. Como físico e filósofo, Fechner teve como objetivo desenvolver um método que relaciona a matéria à mente, conectando o mundo publicamente observável e a impressão privada de uma pessoa. O trabalho de Fechner foi estudado e estendido por Charles S. Peirce, que foi auxiliado por seu aluno Joseph Jastrow, que logo se tornou um psicólogo experimental ilustre por direito próprio." #NT!
 panum.2625.g: "Eu não entendi uma palavra, mas os bônus parecem bons!" #NT!
  
