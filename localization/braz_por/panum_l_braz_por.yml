 panum.3000.t: "A Cruz Vermelha" #NT!
 panum.3000.d: "Dados os horrores da guerra moderna, um 'Comitê Internacional de Sociedades de Ajuda para os cuidados dos feridos' foi fundado em [SCOPE.sState('panum_red_cross_state').GetName]. Destina -se a trabalhar nas nações para ajudar os feridos em guerra." #NT!
 panum.3000.f: "A Cruz Vermelha adotou as seguintes resoluções: \ n- o estabelecimento de sociedades nacionais de socorro para guerra feridas \ n- a neutralidade dos enfermeiros voluntários que estão enviando para o campo de batalha para prestar assistência \ n- a organização e a implementação de mais conferências internacionais com a introdução de um símbolo de identificação e protetor, a formação de um símbolo, de um símbolo de identificação e protemol." #NT!
 panum.3000.g: "Um passo decisivo em frente na cooperação internacional." #NT!
 panum.3001.d: "Dados os horrores da guerra moderna, um 'Comitê Internacional de Sociedades de Ajuda para os cuidados dos feridos' foi fundado em [SCOPE.sState('panum_red_cross_state').GetName]. Destina -se a trabalhar nas nações para ajudar os feridos em guerra. Um enviado perguntou se nossa nação também gostaria de ingressar nessa associação." #NT!
 panum.3001.g: "Nós nos juntamos a esta organização como membro fundador." #NT!
 panum.3001.h: "Interessante." #NT!
 panum.3002.d: "Reconhecendo os horrores da guerra moderna, o comerciante suíço Henry Dunant fundou um 'Comitê Internacional de Sociedades de Ajuda para o cuidado dos feridos'. Destina -se a trabalhar nas nações para ajudar os feridos em guerra." #NT!
 panum.3002.f: "Em 1859, o comerciante suíço Henry Dunant tropeçou no campo de batalha de Solferino por acaso. Abalado pelos gritos pela ajuda de cerca de 40.000 soldados morrendo e feridos, ele começa a incentivar voluntários da área a ajudar as vítimas - sejam amigos ou inimigos. Seu livro de 1862, 'A Memory of Solferino', trouxe os horrores da guerra moderna à atenção das massas. Governos e cidadãos desenvolvem um interesse na contenção de guerra. Em 17 de fevereiro de 1863, o comitê de cinco membros do qual Dunant era membro fundou o Comitê Internacional da Cruz Vermelha. Os delegados de 16 nações se reuniram na 1ª Conferência de Genebra de 26 a 29 de outubro de 1863 para desenvolver ainda mais as idéias de Dunant. A Cruz Vermelha em uma bandeira branca se torna o símbolo internacional de proteção para ajudantes. Em 1901, Dunant recebeu o primeiro Prêmio Nobel da Paz do mundo." #NT!
  
 panum.3011.t: "A Convenção [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]" #NT!
 panum.3011.d: "Uma conferência internacional foi convocada em [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] para estabelecer a proteção dos feridos, a neutralidade do pessoal médico e a Cruz Vermelha como um símbolo de proteção." #NT!
 panum.3011.f: "'Mas as mulheres de Castiglione, visto que não há distinção entre as nacionalidades, seguiu meu exemplo, mostrando a mesma bondade com esses homens cujas origens eram tão diferentes, e todos eram estrangeiros para eles. 'Tutti Fratelli', eles repetiram com sinceridade. Toda a honra a essas mulheres, a essas garotas de Castiglione! Imperturbável, inaugurado, inalterável, seu silencioso auto-sacrifício fez pouco de fadiga e horrores, e por sua própria devoção. -Henry Dunant" #NT!
 panum.3011.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Convenção. Parece bom." #NT!
 panum.3012.t: "Os tratados [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]" #NT!
 panum.3012.d: "Uma conferência internacional foi agendada em [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] para promover o desarmamento e estender as regras anteriores de direito internacional para a Guerra da Terrenos à Guerra do Mar." #NT!
 panum.3012.f: "'O sentido moral da importância da vida humana; O desejo humano de aliviar um pouco dos tormentos de todos esses pobres desgraçados ou restaurar sua coragem quebrada; A atividade furiosa e implacável que um homem convoca em tais momentos; Tudo isso se combina para criar um tipo de energia que gera um desejo positivo para aliviar o máximo que se pode. -Henry Dunant" #NT!
 panum.3012.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Tratados. Parece bom." #NT!
 panum.3013.t: "O protocolo [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]" #NT!
 panum.3013.d: "Uma conferência internacional foi convocada em [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] para proibir o uso de gás venenoso na guerra." #NT!
 panum.3013.f: "Como os novos e terríveis métodos de destruição são inventados diariamente, com perseverança digna de um objeto melhor, e como os inventores desses instrumentos de destruição são aplaudidos e incentivados na maioria dos grandes estados europeus, que estão envolvidos em uma corrida de armamento; E desde que finalmente o estado de espírito na Europa combina com muitos outros sintomas para indicar a perspectiva de guerras futuras, cuja prevenção de que, mais cedo ou mais tarde, parece dificilmente possível, tendo em vista tudo isso, por que não se pode tomar vantagem de um tempo de relativa calma e sossego para investigar e tentar resolver uma pergunta de imensa imensa e mundial, do humano e do ponto de vista cristão? -Henry Dunant" #NT!
 panum.3013.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protocolo. Parece bom." #NT!
  
 panum.3021.t: "Um médico da Cruz Vermelha" #NT!
 panum.3021.d: "Após uma derrota extremamente sangrenta, um médico distinguiu [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] no hospital de campo. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] pertence à Cruz Vermelha e talvez seja chamado a algo maior que o mero serviço de campo." #NT!
 panum.3021.f: "Em um dos hospitais de Cremona, um médico italiano havia dito: mantemos as coisas boas para nossos amigos do exército aliado e damos aos nossos inimigos as necessidades nuas. Se eles morrem, tanto pior! e ele acrescentou, para desculpar essas palavras bárbaras, que tinha ouvido de alguns soldados italianos que haviam retornado de Verona e Mantua, que os austríacos permitiram que os feridos do exército franco-sardiniano morressem sem se preocupar. Uma nobre dama de Cremona, condessa ..., que ouvira as palavras do médico e estava se dedicando aos hospitais com o máximo zelo, se apressou em mostrar sua desaprovação ao declarar que deu exatamente a mesma atenção aos austríacos quanto aos aliados e não fez diferença entre amigos e inimigos. Pois, disse ela, nosso Senhor Jesus Cristo não fez tais distinções entre homens ao fazer bem. -Henry Dunant" #NT!
 panum.3021.g: "Bem -vindo, doutor [SCOPE.sCharacter('panum_new_physician_scope').GetLastName]." #NT!
  
 panum.740.t: "Um susto a mais um filho" #NT!
 panum.740.d: "Após grande esforço, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] finalmente escreveu [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] tratado sobre um método de tratamento bem -sucedido para [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. É considerado um marco na medicina [ROOT.GetCountry.GetAdjectiveNoFlag]." #NT!
 panum.740.f: "A faculdade médica aguardava ansiosamente o artigo científico sobre o método de tratamento de [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. No tratado [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis], o médico descreve uma série inteira de medidas eficientes para combater a escarlatina. A Modern Medicine oferece toda uma gama de opções para manter efetivamente a febre escarlate, mesmo depois que a doença ocorreu. Uma antitoxina recém -inventada desempenha um papel fundamental. O trabalho do Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] leva o nome [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]." #NT!
 panum.740.g: "Inúmeros pais agora dormem mais pacificamente." #NT!
  
 panum.741.t: "O teste [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]" #NT!
 panum.741.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desenvolveu um procedimento com o nome [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] que determina se um paciente tem imunidade à escarlatina ou não." #NT!
 panum.741.f: "O teste de pau, desenvolvido em 1924 por George F. Dick e Gladys Dick, foi usado para identificar aqueles suscetíveis à febre escarlatina. O teste de pau envolveu a injeção de uma tensão diluída dos estreptococos conhecidos por causar escarlatina; Uma reação na pele no local da injeção identificou pessoas suscetíveis ao desenvolvimento da febre escarlate. A reação pode ser vista quatro horas após a injeção, mas foi mais perceptível após 24 horas. Se nenhuma reação foi vista na pele, a pessoa foi assumida por não estar em risco da doença, tendo desenvolvido imunidade a ela." #NT!
 panum.741.g: "Um procedimento útil." #NT!
 panum.742.t: "SCARLET FEBER SERO" #NT!
 panum.742.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desenvolveu um soro eficaz contra a febre escarlatina, que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] obteve do sangue do cavalo." #NT!
 panum.742.f: "O soro da febre escarlatinha foi usada a partir de novembro de 1900, após seu desenvolvimento no Laboratório Seroperapeutico do Hospital Rudolph, em Viena, Áustria. O soro foi retirado do sangue dos cavalos. As crianças infectadas foram injetadas em sua pele abdominal pelo Dr. Paul Moser. As taxas de mortalidade por febre escarlate (também conhecida como Scarlatina) diminuíram significativamente após o uso do soro do sangue. A antitoxina de Moser reduziu a mortalidade da escarlatina em 40%." #NT!
 panum.742.g: "Sangue de cavalo? Urgh." #NT!
 panum.743.t: "A antitoxina" #NT!
 panum.743.d: "Após vários testes, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem certeza de que [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] produziu uma antitoxina que é eficaz contra a escarlatina." #NT!
 panum.743.f: "Apesar dos recentes avanços importantes no conhecimento e tratamento da escarlatina, essa doença muito drenada deu um grande salto sobre suas prevalências sazonais. Quando administrado com antecedência, a antitoxina aliviará o perigo de escarlatina e suas frequentes complicações subsequentes. A doença ainda mantém aspectos, no entanto, que tornam sua erredicação extremamente desejável. Verificou -se que doses crescentes da toxina dadas aos suscetíveis tornarão imune a essas pessoas." #NT!
 panum.743.g: "Um avanço decisivo!" #NT!
  
