 panum.1001.t: "Uma nova epidemia" #NT!
 panum.1001.d: "A poliomielite é uma doença conhecida por muitos nomes diferentes no século XIX. Surpreendentemente, há notícias crescentes em [SCOPE.sState('panum_disease_state').GetName] sobre casos de poliomielite que terminam em incapacitante e morte. O que antes era uma doença que só ocorreu em casos isolados agora parece ocorrer regularmente. A poliomielite é agora uma doença epidêmica." #NT!
 panum.1001.g: "Notícias perturbadoras." #NT!
 panum.1002.d: "Vários jornais relatam independentemente que uma epidemia grave da poliomielite está rging em [SCOPE.sState('panum_disease_country').GetName]. A doença, que anteriormente ocorreu apenas em casos isolados, parece ter se tornado uma epidemia!" #NT!
 panum.1003.t: "Uma epidemia violenta" #NT!
 panum.1003.d: "A epidemia de poliomielite em [SCOPE.sState('panum_disease_state').GetName] provou ser particularmente grave. O número de mortes está aumentando todos os dias." #NT!
 panum.1003.f: "“Na manhã do terceiro dia em que fui hospitalizado, que foi o primeiro ou o segundo de setembro, tive cereais, suco e leite com chocolate no café da manhã. Lembro -me de tentar pegar o leite com chocolate e caiu na minha mão. Eu me senti tão mal porque não conseguia mais me mexer. Todas as enfermeiras entraram e limparam a bagunça. Lembro que queria o leite com chocolate, mas não entendi. Em vez disso, eles me trouxeram um canudo e eu bebi um pouco de suco. Depois disso, alguns médicos entraram no meu quarto e me fizeram contar para trás, 10-9-8-7-6 pelo tempo que me lembro. Eu estava deitado naquele momento porque estava tendo problemas para sentar." #NT!
 panum.1003.g: "Não há cura?" #NT!
 panum.1004.t: "Uma geração quebrada" #NT!
 panum.1004.d: "Quanto mais a epidemia em [SCOPE.sState('panum_disease_state').GetName] dura, mais óbvio se tornará: haverá uma geração inteira que terá que viver com mutilações e paralisia." #NT!
 panum.1004.f: "Lembro -me do dia em que fui diagnosticado com a poliomielite. Naquela manhã, eu estava na aula de educação física na escola e estávamos no campo de futebol jogando futebol. Percebi que, enquanto estava correndo, minha perna seria fraca ou meio que colapsou debaixo de mim. Eu realmente não pensei muito nisso, mas depois naquele dia eu estava tocando com a banda do ensino médio em um desfile de benefícios da poliomielite em Hibbing, que fica a cerca de 48 quilômetros de Coleraine, onde cresci. Durante a marcha naquele desfile, minhas pernas novamente ficaram fracas. Na verdade, eles eram tão fracos que eu tive que sair da linha de março e voltei ao ônibus escolar para me deitar." #NT!
 panum.1004.g: "Este efeito durará muito tempo ..." #NT!
 panum.1005.t: "Sobreviventes de poliomielite" #NT!
 panum.1005.d: "Dizem que aqueles que sobrevivem a essa epidemia abrigam uma profunda raiva dentro de si. É uma forma de vingança contra a doença que devastou essas pessoas. Cada vez mais associações de sobreviventes da poliomielite estão se formando em nosso país." #NT!
 panum.1005.f: "'Ser diferente é muito difícil quando você está no ensino médio. Acabei não participando de muitas coisas das quais provavelmente teria participado se não fosse por minha deficiência. Eu gostaria de experimentar a torcida, mas as pessoas zombaram de mim apenas por falar sobre isso. Então, acabei mantendo muitos sentimentos por dentro. Eu não queria ir a uma dança porque estava constrangido com o meu mole. Eu não queria ter pessoas olhando para mim enquanto atravessava a pista de dança. Eu odiava ter pessoas olhando e rir de mim. Eu acho que todos os adolescentes são constrangidos, mas quando você tem alguma deficiência física, isso realmente amplia essa autoconsciência. Até hoje, eu odeio quando as pessoas olham para a minha perna quando eu uso shorts." #NT!
 panum.1005.g: "A sociedade civil está se unindo contra a poliomielite." #NT!
 panum.1006.t: "O político estabelece a Fundação Polio" #NT!
 panum.1006.d: "Em face da desenfreada epidemia da poliomielite, os pais em luto, os mutilados e os mortos, [SCOPE.sCharacter('panum_opposition_leader').GetFullName] criaram o plano de estabelecer uma base para combater a doença. Os críticos dizem que ele está apenas tentando polir sua reputação política." #NT!
 panum.1006.f: "O presidente dos EUA, Franklin D. Roosevelt, permaneceu regularmente no spa Warm Springs desde 1924 e morreu aqui em 1945. Em 1921, sofria de paralisia de suas pernas, que era considerado poliomielite espinhal; De acordo com pesquisas mais recentes, era a síndrome de Guillain-Barré, que ainda era pouco conhecida na época. Roosevelt fundou a Georgia Warm Springs Foundation em 1927, cuja missão principal era inicialmente o tratamento da paralisia da coluna vertebral. Hoje, a instalação é chamada de ROOSEVELT WARM SPRINGS Institute for Rehabilitation e cuida de pacientes com todos os tipos de deficiência em vinte e seis departamentos diferentes." #NT!
 panum.1006.g: "Um verdadeiro filantropo." #NT!
 panum.1006.h: "E a próxima eleição é pura coincidência, presumo?" #NT!
 panum.1009.t: "Pânico público" #NT!
 panum.1009.d: "Apesar dos melhores esforços do governo local em [SCOPE.sState('panum_disease_state').GetName], a população começou a sucumbir a uma das partes mais perigosas de qualquer surto: pânico." #NT!
 panum.1009.f: "No sábado, 17 de junho de 1916, foi feito um anúncio oficial da existência de uma infecção por poliomielite epidêmica no Brooklyn, Nova York. Naquele ano, houve 27.363 casos e 7.130 mortes devido à poliomielite nos Estados Unidos, com mais de 2.000 mortes apenas na cidade de Nova York. A epidemia de 1916 causou pânico generalizado e milhares fugiram da cidade para resorts nas montanhas próximos; Os cinemas foram fechados, as reuniões foram canceladas, as reuniões públicas eram quase inexistentes e as crianças foram avisadas para não beber de fontes de água e disseram para evitar parques de diversão, piscinas e praias." #NT!
 panum.1009.g: "Medo condenável!" #NT!
 panum.1010.t: "Quarentena" #NT!
 panum.1010.d: "Embora não esteja claro se a poliomielite é uma doença contagiosa, há vozes crescentes em [SCOPE.sState('panum_disease_state').GetName] para introduzir quarentena para garantir que ela não se espalhe." #NT!
 panum.1010.f: "A doença atingiu sem aviso prévio e exigiu longos períodos de quarentena durante os quais os pais foram separados das crianças: era impossível dizer quem conseguiria a doença e quem seria poupado.  Os nomes e endereços de indivíduos com casos de poliomielite confirmados foram publicados diariamente na imprensa, suas casas foram identificadas com cartazes e suas famílias foram em quarentena." #NT!
 panum.1010.g: "Isso causará mais mal do que bem." #NT!
 panum.1010.h: "Aplicar uma ordem de quarentena estrita." #NT!
  
 panum.1020.t: "Poliomouse Epidemic Ends" #NT!
 panum.1020.d: "As clínicas em [SCOPE.sState('panum_disease_state').GetName] relatam que os casos de poliomielite diminuíram visivelmente. As consequências da epidemia continuarão a interessar a região nos próximos anos." #NT!
 panum.1020.f: "'Eu não estou doente. Estou quebrado. Mas estou feliz por estar vivo enquanto eu puder pintar. -Frida Kahlo" #NT!
  
 panum.1022.t: "O início da poliomielite" #NT!
 panum.1022.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] enviou hoje um breve resumo dos sintomas que ocorrem quando a poliomielite precoce começa." #NT!
 panum.1022.f: "'Healthy and mostly blooming-looking children between the ages of 6 and 36 months, in exceptional cases a little older, become ill after previously enjoying untroubled health, either with or without previous hints of indisposition, such as: rolling of the eyes, suddenly under the manifestations of heat, congestive and irritative states, fever, thirst, peevishness, crying, drowsiness without real sleep, as well sometimes with the symptoms of disturbed course of acute, Processos de doenças exantenhasas. Soon afterwards, convulsions of a milder or more severe degree break out, which repeat themselves at shorter or longer intervals.\n\nIn other cases, the disease appears suddenly without the symptoms listed, with convulsions or nausea, slumping of the body, foaming at the mouth and nose, turning blue, etc.\n\nSometimes, however, all of these symptoms are absent, or are only present to a very mild degree, and the paralysis se ajusta lenta e despercebida." #NT!
  
 panum.1040.t: "Contribuições para o conhecimento da doença de Heine-Medin" #NT!
 panum.1040.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] apresentou hoje um artigo revolucionário à Faculdade de Medicina que servirá como ponto de partida para controlar a epidemia da poliomielite - e melhorar o tratamento dos sobreviventes da poliomielite." #NT!
 panum.1040.f: "Em [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] 'Contribuições para o conhecimento da doença de Heine-Medin', o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mencionou vários aspectos que devem ajudar a prevenir e espalhar a poliomielite. Uma visão importante é que a poliomielite é uma doença infecciosa. Além das medidas derivadas disso, também existem vários métodos para ajudar os pacientes. Dietas de alta proteína, programas de fisioterapia e novas invenções como o pulmão de ferro proporcionam uma nova esperança de que a poliomielite não seja erradicada, mas pode ser gerenciada melhor no futuro." #NT!
 panum.1040.g: "Precisamos de um Hall da Fama da Pólio." #NT!
  
 panum.1041.t: "Fisioterapia" #NT!
 panum.1041.d: "O médico conhece uma enfermeira que transforma [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] conhecimento anterior do tratamento da poliomielite de cabeça para baixo." #NT!
 panum.1041.f: "'E há quanto tempo você faz isso agora?' '\ N'Ten anos, doutor.' \ N'vous coloca almofadas de aquecimento sob os pacientes? '\ N'yes, doutor. Não se trata apenas da almofada de aquecimento. São necessários massagens e exercícios de relaxamento. Um músculo que é sincero não se desenvolve mais. Precisa de exercício. '\ N'hmm ...'" #NT!
 panum.1041.g: "Mas ... pacientes com poliomielite precisam de descanso e estabilização!" #NT!
 panum.1042.t: "A rua" #NT!
 panum.1042.d: "Ao inspecionar a área de surto da doença da poliomielite, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] prossegue sistematicamente." #NT!
 panum.1042.f: "'Se alguém seguir a propagação da poliomielite em [SCOPE.sState('panum_disease_state').GetCityHubName], não se pode perder uma descoberta interessante. As quedas são amarradas como uma série de pérolas. Você pode seguir uma estrada e ver os casos lado a lado. Consegui rastrear a ocorrência cronológica em uma linha ferroviária na área. Isso não é coincidência. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1042.g: "Mas essa evidência é suficiente para infecção?" #NT!
 panum.1043.t: "A paróquia" #NT!
 panum.1043.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] visitou uma comunidade remota na área da peste para promover sua pesquisa sobre as causas da doença da poliomielite." #NT!
 panum.1043.f: "'49 casos nesta comunidade?' \ N'a prefeita, lamento dizer isso, médico. É a escola da vila." #NT!
 panum.1043.g: "A poliomielite talvez não seja uma doença hereditária, mas contagiosa?" #NT!
 panum.1044.t: "Filantropia" #NT!
 panum.1044.d: "Os sobreviventes da poliomielite vieram ao Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Você gostaria de apoiar o trabalho científico relacionado à pesquisa da poliomielite com uma fundação." #NT!
 panum.1044.f: "No início do século XX, a poliomielite era uma doença que alarmava grandes partes da sociedade porque seus antecedentes eram desconhecidos e até classes de classe média ou ricas poderiam ser afetadas. Alguns sobreviventes da poliomielite que se tornaram ricos também fizeram campanha contra a doença ao longo de suas vidas e apoiaram iniciativas privadas e governamentais. A poliomielite é uma doença que a filantropia desempenhou um papel importante no combate." #NT!
 panum.1044.g: "Um apoio valioso." #NT!
 panum.1044.h: "O dinheiro deve fluir igualmente para a pesquisa de vacinas." #NT!
 panum.1044.i: "O dinheiro da fundação também beneficiaria a pesquisa geral." #NT!
 panum.1045.t: "Antibióticos" #NT!
 panum.1045.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] alcançou sucesso no tratamento da poliomielite usando antibióticos." #NT!
 panum.1045.f: "'Não há cura para a poliomielite. E, infelizmente, não vejo como isso será possível no futuro. Só pode haver prevenção, pesquisa sobre as causas e evitar a propagação - e o tratamento para aliviar os sintomas. Os antibióticos podem ajudar a proteger os músculos enfraquecidos das infecções. Este é um passo na direção certa. Esperançosamente, mais seguirão. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1045.g: "Saúde para antibióticos!" #NT!
 panum.1046.t: "Ostracismo social" #NT!
 panum.1046.d: "Em um artigo de reforma, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] apontou para seus colegas acadêmicos que a reintegração de sobreviventes da poliomielite significa mais do que apenas curar, tratar ou aliviar a doença. O estigma social dos indivíduos deve ser reduzido - e eliminado." #NT!
 panum.1046.f: "Lembro -me do maior desafio para mim foi entrar no ônibus escolar. Aquele primeiro passo para o ônibus parecia uma milha, e eu simplesmente não conseguia. Por um tempo, minha mãe saiu, e foi tão embaraçoso porque ela trazia esse banquinho. Mas eu não aguentava o constrangimento, então meu pai e o motorista do ônibus (o nome dele era Bill, e eu me lembro dele vividamente) se reuniram e discutiram como eles poderiam resolver esse problema. O que meu pai fez foi sair para onde o ônibus parou e ele cavou uma trincheira na terra. Bill dirigia a roda dianteira do ônibus naquela trincheira, e isso abaixaria o passo até onde estava muito perto do chão. Então eu poderia entrar no ônibus sem problemas. E ninguém realmente percebeu ... '\ n \ njennifer W., sobrevivente da poliomielite" #NT!
 panum.1046.g: "Os sobreviventes da poliomielite não são cidadãos de segunda classe." #NT!
 panum.1047.t: "O preço do progresso" #NT!
 panum.1047.d: "Em sua investigação sobre as causas das epidemias da poliomielite que ocorrem há anos, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] chegou a uma verdade desagradável." #NT!
 panum.1047.f: "'Pólio é conhecido desde os tempos antigos, mas - tanto quanto minha pesquisa permitir - até o final do século XIX, não era uma doença epidêmica como é hoje. A razão para isso, se confirmada, é paradoxal: melhor assistência médica. Antes da introdução de esgoto e saneamento, as crianças eram expostas à poliomielite muito antes, entre 6 meses e 4 anos. Durante esse período, a doença é mais suave e fornece imunidade. A pessoa mais velha infectada com poliomielite, mais provável que ocorra paralisia. Os padrões de saúde aprimorados significaram que menos pessoas desenvolveram imunidade e são mais vulneráveis ​​às conseqüências perigosas da doença." #NT!
 panum.1047.g: "A doença está se espalhando porque a saúde pública melhorou?" #NT!
 panum.1048.t: "Bacillus ou vírus?" #NT!
 panum.1048.d: "Nada ainda se sabe sobre o agente causador da poliomielite. Por isso, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] encontra [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] em uma disputa animada com colegas." #NT!
 panum.1048.f: "Embora a poliomielite fosse conhecida há muito tempo e, com o desenvolvimento da microbiologia, ficou claro que era um patógeno, as crenças continuaram a diferir por um longo tempo para se eram bactérias da poliomielite ou vírus da poliomielite." #NT!
 panum.1048.g: "Tudo aponta para um vírus." #NT!
 panum.1048.h: "Esta conversa inútil está distraindo o médico de seu trabalho!" #NT!
 panum.1049.t: "Aceitação em cadeira de rodas" #NT!
 panum.1049.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que não é apenas importante fornecer aos pacientes cadeiras de rodas - eles também precisam ser aceitos socialmente para que os sobreviventes da poliomielite possam se reintegrar facilmente na vida normal." #NT!
 panum.1049.f: "“Fui realmente ingênuo em ir para a faculdade e fiquei surpreso ao descobrir que a universidade não era acessível para uma pessoa em uma cadeira de rodas. Mas era assim que era então. Havia passos em todo o lugar, e não era como o ensino médio, onde eu tinha um grupo de amigos para me levar por aí ... muitas vezes eu tinha que conseguir um monte de voluntários ou apenas recrutar pessoas enquanto elas corriam de classe para aula, e às vezes diziam: 'Eu simplesmente não tenho tempo. Eu não posso te ajudar. ' Eu tive que morar em um apartamento fora do campus porque nenhum dos dormitórios estava acessível." #NT!
 panum.1049.g: "Apoiamos uma campanha para mais aceitação de cadeira de rodas." #NT!
 panum.1049.h: "Financie um programa para adicionar rampas acessíveis a cadeira de rodas a edifícios públicos." #NT!
  
 panum.1051.t: "Conselho da poliomielite" #NT!
 panum.1051.d: "Atualmente, uma recomendação de ação sobre doença da poliomielite está circulando no mundo acadêmico e está causando o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] todo o problema de aplicar [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] teses próprios no tratamento da poliomielite." #NT!
 panum.1051.f: "'Dê oxigênio através das extremidades inferiores, por eletricidade positiva. Banhos frequentes usando refeição de amêndoa ou oxidando a água. Aplicações de cataplasmas de camomila romana, olmo escorregadio, arnica, mostarda, cantharis, amygdalae dulcis Óleo e mérito especial, petróleo de Spikenard e xanthoxolinum. Use internamente cafeína, FL. Kola, muriado seco de quinino, elixir de cinchona, água de rádio, cloreto de ouro, licor calcis e vinho da pepsina. '\ N \ ndd. Angelika Hasenbein, 'Uma monografia sobre a epidemia de poliomielite (paralisia infantil)' '" #NT!
 panum.1051.g: "Na verdade, parece muito convincente." #NT!
 panum.1052.t: "Gesso elencos e aparelhos" #NT!
 panum.1052.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] aprendeu com vários "especialistas em poliomielite" que as talas das pernas são a melhor maneira de melhorar a situação inicial para os pacientes - mas [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não está convencido." #NT!
 panum.1052.f: "Pacientes com paralisia residual foram tratados com aparelho e ensinados a compensar a função perdida com a ajuda de pinças, muletas e cadeiras de rodas. O uso de dispositivos como aparelhos rígidos e elencos corporais, que tendiam a causar atrofia muscular devido ao movimento limitado do usuário, também foram apresentados como tratamentos eficazes. A maioria desses tratamentos provou ser de pouco valor terapêutico" #NT!
 panum.1052.g: "Talvez ajude ...?" #NT!
 panum.1053.t: "Cirurgia inútil" #NT!
 panum.1053.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] foi garantido pelos cirurgiões de que os procedimentos cirúrgicos têm um efeito positivo na poliomielite." #NT!
 panum.1053.f: "“Passei inúmeras horas entrevistando colegas, estudando livros e revisando os pacientes para me convencer do sucesso de intervenções cirúrgicas para a poliomielite. Os médicos estão muito orgulhosos de seus resultados. A maneira como eles lidam com as mutilações é uma reminiscência da mecânica de precisão que acredita que está montando um relógio. Eles usam ferramentas de precisão para trabalhar em máquinas humanas. Mas minha impressão é que o foco aqui não está na doença, não no paciente - mas na reputação dos médicos. Até agora, não estou ciente de nenhum caso em que esse método realmente levou ao bem -sucedido tratamento da poliomielite. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]1" #NT!
 panum.1053.g: "Uma liderança falsa." #NT!
 panum.1054.t: "Soro convalescente" #NT!
 panum.1054.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] experimentou um soro altamente aclamado que é considerado um remédio eficaz na medicina da poliomielite atual. Embora os colegas §1 estejam convencidos do método, o médico pensa que é uma perda de tempo." #NT!
 panum.1054.f: "'Naquela época, eles tinham uma idéia de que era uma doença infecciosa, então recebi o que era chamado de' soro convalescente ', que foi feito do sangue de pessoas que haviam se recuperado da poliomielite. Essa forma de tratamento estava em voga naquela época. Parece improvável que tenha tido algum efeito, uma vez que a doença progrediu para paralisia bastante pronunciada, sem movimento nas pernas e nenhum movimento nos meus músculos abdominais. Fiquei isolado e acho que poderia ter sido informado de que tinha poliomielite. No entanto, eu não sabia o que era poliomielite. Ninguém me disse que eu tinha paralisia infantil, que eu teria reconhecido porque Roosevelt era presidente na época, e eu sabia que ele havia sofrido paralisia significativa da doença." #NT!
 panum.1054.g: "Mas todo médico prescreve isso?" #NT!
 panum.1055.t: "Isolamento" #NT!
 panum.1055.d: "Além de restringir os membros, alguns especialistas em poliomielite acreditam que é aconselhável isolar completamente os pacientes. O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] realizou essas experiências - e chegou à conclusão de que era uma terapia ineficiente e desumana." #NT!
 panum.1055.f: "Depois que a torneira espinhal foi concluída e o diagnóstico de poliomielite foi feito, fui imediatamente colocado isoladamente e disse que não deveria levantar a cabeça. Lembro que eles me colocaram em um berço! Eu tinha nove anos e não conseguia entender por que fui colocado em um berço. Foi muito degradante. Eu certamente não iria sair da cama, nem provavelmente rolava e caía. Na verdade, eu mal conseguia me mover. Enquanto eu estava lá naquele berço, eu podia sentir o vírus realmente entrando. Era como uma porta se fechando. Eu senti que meu mundo havia mudado totalmente. Para piorar as coisas, estava terrivelmente quente e úmido, e é claro que isso era antes do ar condicionado; Lembro -me de me sentir muito desconfortável ..." #NT!
 panum.1055.g: "Isso é inaceitável!" #NT!
 panum.1055.h: "Este pode ser o começo de uma segunda carreira." #NT!
 panum.1055.i: "Deixe esses registros desaparecerem rapidamente." #NT!
 panum.1056.t: "Síndrome pós-Polio" #NT!
 panum.1056.d: "Durante um exame recente, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] constatou que, após a infecção real da poliomielite, incluindo seus efeitos, pode haver efeitos pós-efeitos na forma de síndrome pós-polio. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] está completamente desesperado por esse desenvolvimento." #NT!
 panum.1056.f: "Quando eu tinha cerca de 35 ou 40 anos, comecei a ter uma dor terrível nas articulações e nos músculos. Eu me cansei muito facilmente. Fui ao médico e fiz radiografias e exames de sangue. Eu tomei algumas pílulas e fiz fisioterapia. Nada ajudou. \ Nas esperei que eles encontrassem os registros, expliquei à pessoa que estava me ajudando que estava experimentando toda essa nova dor e esperava que os registros pudessem ajudar a explicar o porquê. Bem, ela perguntou se eu tinha ouvido falar da síndrome do Polio. Eu disse: 'Não, o que é isso?' Ela explicou que cerca de 30 ou 40 anos depois que você teve poliomielite, é como se você o recebesse de novo. \ Finalizando sobre lidar com a poliomielite novamente era mais do que eu poderia lidar. Eu apenas me desfez. Liguei para minha cunhada e contei a ela o que havia descoberto. Eu também disse à minha família. Eu chorei muito. Mostrei meus médicos locais meus registros médicos e expliquei sobre minha consulta no Instituto Sister Kenny. Eles novamente me disseram que a poliomielite era uma coisa do passado. Eu disse: 'Sim, mas estou aqui agora e estou vivendo de novo!'" #NT!
 panum.1056.g: "Que situação sem esperança." #NT!
  
 panum.1061.t: "Experimentos" #NT!
 panum.1061.d: "Em um experimento duvidoso, mas não menos bem -sucedido, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] infectou macacos com poliomielite." #NT!
 panum.1061.f: "“Recentemente, li sobre um procedimento que Jean-Antoine Villemin costumava provar a contagiosidade da tuberculose. Ele realizou experimentos em coelhos, deliberadamente, colocando -os em contato com o tecido dos pacientes com tuberculose. Dezenas de caninos mortos mais tarde, ele foi capaz de provar sua tese. Meu experimento com macacos é baseado em uma suposição semelhante. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1061.g: "Se os animais podem ser infectados, os humanos também podem ser entre si." #NT!
 panum.1062.t: "Pulmão de ferro" #NT!
 panum.1062.d: "O engenheiro brilhante [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName] ajudou o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] a construir um dispositivo engenhoso que revolucionou o tratamento da poliomielite." #NT!
 panum.1062.f: "Um pulmão de ferro foi um dos primeiros dispositivos clínicos que permitiram a ventilação mecânica de um humano. Por volta de 1920, o engenheiro americano Philip Drinker desenvolveu -o para ventilar pacientes com doenças pulmonares. O corpo do paciente, exceto a cabeça, fica completamente dentro de um cilindro oco. O dispositivo sela o pescoço aéreo e cria uma pressão negativa. Isso faz com que a pressão ambiente force o ar através do nariz e da boca do paciente nos pulmões. A expiração ocorre de acordo com a construção de excesso de pressão na câmara. Muitos pacientes com poliomielite precisavam apenas do pulmão de ferro na fase aguda da doença até que a função muscular retomasse. Alguns pacientes os usaram apenas durante a noite, outros os usaram continuamente." #NT!
 panum.1062.g: "Isso pode salvar muitas vidas." #NT!
 panum.1063.t: "Apoio psicológico" #NT!
 panum.1063.d: "Como psiquiatra, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] usou a experiência [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] para facilitar a vida para pacientes com poliomielite." #NT!
 panum.1063.f: "'Prestamos, com razão, atenção ao componente físico da doença quando falamos de poliomielite. Mas ao lado do corpo danificado, há uma alma danificada. A poliomielite não deixa apenas traços físicos. Especialmente ao trabalhar com crianças, experimentei o impacto que essa doença horrível tem em suas vidas privadas e sociais. Palavras não podem curar. Mas eles podem fornecer alívio. E temos que dar à perspectiva dos sobreviventes para que eles não apenas sobrevivam, mas tenham vontade de sobreviver. '\ N \ nfrom the Journal of Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1063.g: "Obrigado, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.1064.t: "Dieta" #NT!
 panum.1064.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] defende uma dieta rica em nutrientes para pacientes com poliomielite." #NT!
 panum.1064.f: "'Sucessos anteriores no combate a raquitistas, deficiência de iodo, escorbuto e Pellagra mostraram que nossa dieta pode desempenhar um papel decisivo no combate a doenças. A poliomielite não é uma doença de deficiência. Mas sabe -se que as proteínas desempenham um papel importante na construção do músculo e, portanto, é importante ressaltar que a dieta dos pacientes com poliomielite deve ser mais rica que a das pessoas comuns." #NT!
 panum.1064.g: "Finalmente, um certificado médico para comer bifes em T-Bone." #NT!
  
