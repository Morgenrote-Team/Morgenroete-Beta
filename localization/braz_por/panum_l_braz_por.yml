 panum_administrative_evacuation_modifier: "Evacuação administrativa" #NT!
 panum_yellow_fever_barracks_modifier: "Febre amarela no quartel" #NT!
 panum_yellow_fever_port_modifier: "Febre amarela no porto" #NT!
  
 panum.301.t: "A varíola se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.301.d: "De acordo com os relatórios mais recentes, a doença da varíola agora também é galopante em [SCOPE.sState('panum_disease_state').GetName]. Nossos esforços para parar a epidemia não tiveram êxito." #NT!
 panum.301.g: "Mulpião em todos os lugares!" #NT!
 panum.302.t: "A epidemia de varíola chega a [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.302.d: "Recebemos relatos de que os primeiros casos de varíola foram relatados em [SCOPE.sCountry('panum_infected_country').GetName] hoje. As autoridades nos culpam por não fazer o suficiente para impedir a propagação." #NT!
 panum.302.g: "Quem poderia ter adivinhado isso ...?" #NT!
 panum.303.t: "Varíola fora de controle" #NT!
 panum.303.d: "O sistema de saúde em [SCOPE.sState('panum_disease_state').GetName] foi trazido à beira do colapso. Os médicos já estão saindo da área porque eles mesmos correm o risco de serem infectados. Infelizmente, temos que ajustar o número de mortos na região para cima." #NT!
 panum.303.f: "“Nenhuma tentativa foi feita para contar as vítimas, nem é possível considerá -las em nenhuma dessas tribos com precisão; Acredita -se que, se o número 17.200 para os índios do rio Missouri superior fosse dobrado, o agregado não seria muito grande para aqueles que caíram a leste das montanhas rochosas." #NT!
 panum.303.g: "Não há cura para esta doença terrível?" #NT!
  
 panum.401.t: "Tifo se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.401.d: "O tifo perigoso aparentemente se espalhou para outro estado. Relatórios de [SCOPE.sState('panum_disease_state').GetName] sugerem que mais e mais pessoas estão sendo vítimas da doença." #NT!
 panum.401.g: "Tifo parece imparável ..." #NT!
 panum.402.t: "Uma doença de corrupção moral?" #NT!
 panum.402.d: "Dado o conhecimento limitado do que é tifo, o que o causa e como combatê -lo efetivamente, existem inúmeras teorias sobre o que promove a infecção. A visão predominante é que é uma doença relacionada ao estilo de vida, não à transmissão." #NT!
 panum.402.f: "Semelhante à tuberculose, havia muitos médicos que assumiram que o tifo não era uma doença contagiosa. Enquanto a tuberculose era vista de uma maneira quase romantizada - era uma doença dos românticos e, portanto, espíritos "nobres" - no caso de Tifo, a doença era vista como um estigma de depuração moral. O fato de as classes mais altas não terem sido afetadas levou a um certo sentimento de superioridade. Assim como as doenças da Idade Média eram frequentemente atribuídas à influência ou punição divina, parecia ser um fato comprovado que os defeitos ou depravação do caráter estavam em certa medida ligados a certas doenças. Foi apenas do segundo terço do século XIX em diante que essa visão começou a mudar." #NT!
 panum.402.g: "Há uma razão pela qual Typhus afeta principalmente criminosos, prostitutas e soldados imorais." #NT!
 panum.402.h: "Provavelmente importa menos o que essas pessoas são do que onde vivem." #NT!
 panum.403.t: "Quarentena" #NT!
 panum.403.d: "Há um desejo, particularmente por parte das classes médias e altas, de fornecer às classes sociais mais baixas afetadas pelo tifo com suas próprias instalações. Essas 'casas de febre' também seriam pagas por organizações sem fins lucrativos. No entanto, alguns representantes das classes mais pobres veem isso como um método de exclusão do que dos cuidados de saúde. Alguns membros do governo, por outro lado, querem uma quarentena completa, que a classe média em particular considera uma medida completamente excessiva." #NT!
 panum.403.f: "Como muitas outras epidemias, Typhus serviu para segregar. O apelo a uma quarentena geral era, portanto, impopular em muitos lugares, porque acreditava -se que certas pessoas poderiam ser atribuídas à doença, especialmente porque muitas acreditavam que era hereditário. No entanto, o medo subjacente da infecção desempenhou um papel, e é por isso que as casas de febre foram construídas em muitos lugares. Durante a grande epidemia de tifo na América do Norte em 1847, a idéia de que era uma doença contagiosa tornou -se tão difundida que massas de imigrantes irlandeses infectados foram deportados a essas instituições." #NT!
 panum.403.g: "Toda a área deve ser em quarentena." #NT!
 panum.403.h: "Leve os pacientes com tifo para casas especiais." #NT!
 panum.403.i: "Tifo não é uma doença contagiosa, então a quarentena não faz sentido." #NT!
 panum.404.t: "Galpões imundos" #NT!
 panum.404.d: "A situação nas supostas casas de febre, que estão cada vez mais se transformando em caixões superlotados cheios de fezes e miséria, já se tornou um problema sério no [SCOPE.sState('panum_disease_state').GetName]. Pastores e cuidadores doentes escreveram uma carta pedindo que essas casas terríveis sejam desmontadas." #NT!
 panum.404.f: "Os galpões de febre estavam imundos e lotados, com pacientes deitados em níveis duplos de beliches, o que permitia que a sujeira do beliche superior caísse na parte inferior. De acordo com o relatório do comitê do Senado, dois ou três inválidos seriam unidos em um lugar, independentemente da idade ou do sexo. Não havia pão: as refeições consistiam em chá, mingau ou caldo servido três vezes por dia. Enquanto a água potável estava carregada, nunca houve o suficiente para os pacientes com febre. Um padre católico, padre Moylan, relatou dar água aos inválidos em uma barraca que não conseguiu beber por 18 horas. Os galpões não eram originalmente destinados a abrigar pacientes com febre e não tinham ventilação; Novos galpões foram construídos sem privadas. O Comitê do Senado afirmou que, devido à falta de pessoal e espaço, os inválidos estavam em seus próprios excrementos por dias e havia funcionários insuficientes para tirar aqueles que morreram durante a noite." #NT!
 panum.404.g: "Não podemos arriscar mais pessoas sendo infectadas." #NT!
 panum.404.h: "Melhore a situação dos pacientes com tifo e forneça ajuda médica." #NT!
 panum.404.i: "Desmontam essas casas desumanas!" #NT!
 panum.405.t: "Tumultos contra galpões de febre" #NT!
 panum.405.d: "O medo de tifo se espalhar em [SCOPE.sState('panum_disease_state').GetName] radicalizou alguns cidadãos na medida em que formaram uma multidão irritada. Há um boato de que eles querem empurrar as casas de febre e seus pacientes para o rio mais próximo!" #NT!
 panum.405.f: "Em 1847, o número de galpões em Montreal cresceria para 22, com tropas cortando a área para que os doentes não pudessem escapar. Quando uma multidão ameaçou jogar a febre derramar no rio, o prefeito de Montreal, John Easton Mills, reprimiu o tumulto e prestou cuidados, dando água aos pacientes e trocando roupas de cama. Ele morreu em novembro, cumprindo menos de um ano no cargo." #NT!
 panum.405.g: "Esta barbárie não tem lugar em nosso país!" #NT!
 panum.405.h: "Eles morrem de qualquer maneira." #NT!
 panum.406.t: "Cadáveres não purificados" #NT!
 panum.406.d: "O número de mortes em [SCOPE.sState('panum_disease_state').GetName] está aumentando tão rapidamente que os empreendedores dificilmente conseguem acompanhar o número. Existe o perigo de que os corpos não purificados possam levar a problemas ainda maiores." #NT!
 panum.406.f: "Na década de 1860, condições climáticas excepcionalmente severas e perdas de culturas afetadas o que era então o Grande Ducado da Finlândia, levando à fome e à doença epidêmica. 1866–68 viu fome e, especialmente, o que se pensava na época como Tifo matando 270.000 pessoas na região." #NT!
 panum.406.g: "Use todos os meios disponíveis para impedir que esse problema se torne esmagador." #NT!
 panum.406.h: "Cavar as sepulturas de massa usuais." #NT!
 panum.406.i: "Nossas capacidades estão exaustas, você precisa organizar as coisas sozinho!" #NT!
 panum.407.t: "Tifo em quartéis" #NT!
 panum.407.d: "Atualmente, Typhus está contaminando principalmente as instalações militares de [SCOPE.sState('panum_disease_state').GetName]. Isso tem seu preço mortal lá." #NT!
 panum.407.f: "Muitos historiadores acreditam que o surto de tifo entre as tropas de Napoleão é a verdadeira razão pela qual ele parou sua campanha militar na Rússia, em vez de fome ou frio. Tifo foi um assassino significativo durante a Guerra Civil Americana, embora a febre tifóide tenha sido a causa mais prevalente da 'febre do acampamento da Guerra Civil dos EUA. Cerca de 900.000 mortes foram atribuídas à febre do tifo durante a Guerra da Crimeia em 1853-1856. Tifo era endêmico na Polônia e em vários países vizinhos antes da Primeira Guerra Mundial (1914-1918), mas tornou-se epidemia durante a guerra. Tifo devastou os exércitos da Frente Oriental, onde mais de 150.000 morreram apenas na Sérvia. As mortes estavam geralmente entre 10% e 40% dos infectados e a doença foi uma das principais causas de morte para aqueles que amamentam os doentes." #NT!
 panum.407.g: "Um inimigo invisível mais mortal do que qualquer exército ..." #NT!
 panum.408.t: "Atormentado em doença, não em guerra" #NT!
 panum.408.d: "A epidemia de tifo em nossos quartéis continua se espalhando todos os dias. Os soldados estão agora entre os mais frequentemente mortos no [SCOPE.sState('panum_disease_state').GetName] - e sem influência inimiga." #NT!
 panum.408.f: "'A guerra não é uma aventura. É uma doença. É como Typhus. Antoine de Saint-Exupéry" #NT!
 panum.408.g: "Terrível!" #NT!
  
 panum.501.t: "A febre amarela se espalha para [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.501.d: "Relatos de novos casos de febre amarela confirmaram nossos piores temores. A doença agora também está furiosa em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.501.g: "Por que não foi possível parar isso?" #NT!
 panum.502.t: "Uma doença contagiosa?" #NT!
 panum.502.d: "Embora não esteja claro se a febre amarela é uma doença contagiosa ou tem outras causas, muitos cidadãos com a segurança estão pedindo que a quarentena interrompa a propagação. Se não fizermos isso, eles poderiam vê -lo como ignorância ou desinteresse em suas necessidades." #NT!
 panum.502.f: "Os primeiros surtos de febre amarela no século XVII causaram pânico e desorientação. Mesmo no século 18, as pessoas discordaram amplamente sobre o que desencadeou uma infecção. Embora governos e indivíduos tenham recorrido a medidas ou prevenção estritos, não houve sucesso. O medo da febre amarela significava que nenhuma oportunidade foi desperdiçada para impedir sua propagação adicional, às vezes com medidas experimentais ou draconianas. Algumas ações poderiam, portanto, ter razões psicológicas e não médicas, a fim de evitar escalar o descontentamento entre a população." #NT!
 panum.502.g: "Não há evidências de que esta seja uma doença contagiosa." #NT!
 panum.503.t: "A febre amarela afeta as plantações" #NT!
 panum.503.d: "Os relatórios são recebidos diariamente de que as plantações em [SCOPE.sState('panum_disease_state').GetName], em particular, têm uma alta taxa de pacientes com febre amarela. Alguns consultores do governo estão pressionando completamente o trabalho lá para reduzir completamente a propagação." #NT!
 panum.503.f: "“Um homem negro pobre, chamado Sampson, foi constantemente de casa em casa onde estava a angústia e sem assistência, sem taxa ou recompensa. Ele foi ferido com o distúrbio e morreu. Após sua morte, sua família foi negligenciada por aqueles que ele havia servido. Sarah Bass, uma pobre viúva negra, deu toda a assistência que pôde, em várias famílias, pela qual não recebeu nada; E quando qualquer coisa lhe foi oferecida, ela deixou a opção daqueles que serviu. -Richard Allen" #NT!
 panum.503.g: "Tire os trabalhadores dos campos!" #NT!
 panum.503.h: "A plantação deve continuar a correr, a todo custo!" #NT!
 panum.504.t: "Evacuação" #NT!
 panum.504.d: "A situação de saúde em [SCOPE.sState('panum_disease_state').GetName] continua a piorar. Membros do governo e administração local pediram para deixar a cidade e organizar a administração do campo. Alguns consideram uma sugestão inteligente, outros consideram pura covardia." #NT!
 panum.504.f: "Durante a epidemia de febre amarela de 1793 na Filadélfia, 5.000 ou mais pessoas foram listadas no Registro de Mortes entre 1 de agosto e 9 de novembro. A grande maioria deles morreu de febre amarela, tornando a epidemia na cidade de 50.000 pessoas uma das mais graves da história dos Estados Unidos. Até o final de setembro, 20.000 pessoas haviam fugido da cidade, incluindo funcionários executivos e do congresso do governo federal. A maioria não retornou até que a epidemia tenha diminuído no final de novembro. O presidente George Washington deixou a cidade para sua propriedade de Mount Vernon. A taxa de mortalidade atingiu o pico em outubro, antes de Frost finalmente matar os mosquitos e acabar com o surto. Algumas cidades vizinhas se recusaram a deixar os refugiados da Filadélfia, temendo que estivessem carregando a febre. As principais cidades portuárias, incluindo as de Baltimore e Nova York, tiveram quarentena contra refugiados e mercadorias da Filadélfia, embora a cidade de Nova York tenha enviado ajuda financeira à Filadélfia." #NT!
 panum.504.g: "Evacuar as autoridades." #NT!
 panum.504.h: "A administração local não deve entrar em colapso." #NT!
 panum.505.t: "A febre amarela se espalha para quartéis" #NT!
 panum.505.d: "Atualmente, a febre amarela está contaminando principalmente as instalações militares de [SCOPE.sState('panum_disease_state').GetName]. Isso tem seu preço mortal lá." #NT!
 panum.505.f: "Para os rebeldes no Haiti na virada dos séculos XVIII e XIX e em Cuba quase 100 anos depois, a febre amarela era o grande aliado contra os exércitos coloniais enviados da Europa. O líder da luta da independência cubana falou de seus 'generais invencíveis em junho, julho, agosto' - aqueles meses em que as chuvas vêm e com eles os mosquitos. Os britânicos tiveram experiências semelhantes durante o cerco de Cartagena em 1741. 29.000 soldados britânicos cercaram a fortaleza. Quando as chuvas começaram, 22.000 pereceram miseravelmente dentro de algumas semanas. A taxa de mortalidade nas guarnições britânicas na Jamaica foi sete vezes a das guarnições no Canadá, principalmente por causa da febre amarela e outras doenças tropicais." #NT!
 panum.505.g: "Não! Eles foram destinados a uma morte honrosa no campo de batalha!" #NT!
 panum.506.t: "Doença do marinheiro" #NT!
 panum.506.d: "As operações portuárias em [SCOPE.sState('panum_disease_state').GetName] chegaram a uma parada virtual devido à febre amarela. Por um lado, muitos trabalhadores das docas e marítimos estão doentes. Por outro lado, o maior número possível de navios tentam evitar a região amaldiçoada." #NT!
 panum.506.f: "'O estrago mais deplorável está sendo feito em Nova Orleans pela febre amarela. Milhares foram realizados por sua devastação, e todos os dias adicionam mais 200 ao recorde horrível. Os mortos estão enterrados em trincheiras por gangues de cadeia de negros, contratados em uma Guiné uma hora. And thus, what with the songs and the obscene jests of the gravediggers, the buzzing of the flies, the sing-song cries of the huxter-women vending their confections, the hoarse oaths of the men who drive the dead carts, the merry whistle of the boys, and the stifling reek from the scores of blackened corpses, the day wears apace, the work of sepulture is done, and night draws the curtain. Enquanto isso, diversões, regatas, bolas, etc. estão precedentes como de costume, como se não tivesse essa pestilência terrível na cidade condenada. -Cambridge Weekly News em 1853" #NT!
 panum.506.g: "Um colapso para o envio!" #NT!
 panum.507.t: "Vômito preto" #NT!
 panum.507.d: "Em [SCOPE.sState('panum_disease_state').GetName], a febre amarela está impressionando mais violentamente do que o esperado. Os médicos relatam que mais pessoas do que antes morreram da doença." #NT!
 panum.507.f: "Aqueles que se aventuraram no exterior, tinham lenços ou esponjas impregnados com vinagre de cânfora em seus narizes, ou com cheirar a gargalhadas cheias do vinagre dos ladrões. Outros carregavam pedaços de corda asfaltados em suas mãos ou bolsos, ou bolsas de cânfora amarradas em volta do pescoço ... as pessoas mudaram apressadamente seu curso ao ver um carro funerário vindo em sua direção. Muitos nunca caminharam na trilha, mas foram para o meio das ruas, para evitar serem infectados de passagem por casas em que as pessoas haviam morrido. Os conhecidos e os amigos se evitaram nas ruas e apenas significavam seu respeito por um aceno frio. O antigo costume de treinar as mãos caiu em um desuso geral, que muitos encolheram com Affrright, mesmo na oferta de uma mão. Uma pessoa com crepe de luto, ou qualquer aparência de luto, foi evitada como uma vípera. ' -Mathew Carey" #NT!
 panum.507.g: "Quando finalmente seremos libertados dessa praga?" #NT!
  
