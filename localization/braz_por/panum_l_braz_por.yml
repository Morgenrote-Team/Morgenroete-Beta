 je_panum_measles: "Epidemia de sarampo" #NT!
 je_panum_measles_reason: "O sarampo é uma doença altamente contagiosa, conhecida por suas típicas manchas vermelhas na pele. Pode ter consequências catastróficas, principalmente em populações sem imunidade prévia. Como uma doença suprarregional, o sarampo pode se espalhar para outras áreas.\n\nA invenção de #ORANGE Antibióticos#! tem um significado particular no combate ao sarampo. Com essa tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para o sarampo#!. Somente um sistema de saúde muito bom ajudará. Tudo isso leva a uma melhor prevenção e cura da doença.\n\nInfelizmente, a invenção de uma #V Vacina contra o sarampo#! está além do escopo do período vitoriano." #NT!
 je_panum_scarlet: "Epidemia de escarlatina" #NT!
 je_panum_scarlet_reason: "A escarlatina é uma doença disseminada que foi uma das causas mais comuns de morte entre crianças até o início do século XX.\n\nA invenção de #ORANGE Antitoxinas#! tem um significado particular no combate à escarlatina. Com esta tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para a escarlatina#!. Um bom sistema de saúde ajudará. Tudo isso leva a uma melhor prevenção e cura da doença.\n\nDesenvolver uma #V Vacina contra a escarlatina#! por um [concept_theiler_biologist] é possível, mas muito difícil." #NT!
 je_panum_plague: "Epidemia de peste" #NT!
 je_panum_plague_reason: "A peste bubônica é equiparada à "Peste Negra" da Idade Média, que é uma das piores catástrofes da história. Acreditava-se que ela havia desaparecido até reaparecer no final do século XIX. Em países com baixa riqueza e sistemas de saúde fracos, a peste pode se espalhar por várias áreas.\n\nA invenção de #ORANGE Antitoxinas#! tem um significado particular no combate à peste. Com essa tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para a Peste#!. Um sistema de saúde rudimentar já ajudará. Tudo isso leva a uma melhor prevenção e cura da doença.\n\nPara derrotar a peste de uma vez por todas, é necessária uma #V Vacina contra a Peste#! desenvolvida por um [concept_theiler_biologist]." #NT!
 je_panum_diphteria: "Epidemia de difteria" #NT!
 je_panum_diphteria_reason: "A difteria é uma doença perigosa que pode levar a complicações fatais e consequências a longo prazo. Devido à mortalidade infantil e aos problemas respiratórios associados a ela, a difteria é apelidada de "anjo estrangulador das crianças". Os efeitos permanecem localizados.\n\nA invenção de #ORANGE Antitoxinas#! tem um significado particular no combate à difteria. Com esta tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para a difteria#!. Somente um bom sistema de saúde ajudará. Tudo isso leva a uma melhor prevenção e cura da doença.\n\nPara derrotar a difteria de uma vez por todas, é necessária uma #V Vacina contra a difteria#! desenvolvida por um [concept_theiler_biologist]." #NT!
 je_panum_polio: "Poliomielite" #NT!
 je_panum_polio_reason: "A poliomielite é uma doença que afeta principalmente crianças, muitas vezes resultando em morte ou complicações físicas ao longo da vida. Embora tenha ocorrido apenas esporadicamente no passado, a poliomielite se tornou endêmica durante o século XIX. A poliomielite não se espalha além do estado onde ocorre.\n\nA invenção de #ORANGE Antitoxinas#! tem um significado particular no combate à poliomielite. Com esta tecnologia, um [concept_panum_physician] pode encontrar um #V Tratamento para a poliomielite#!. Somente um bom sistema de saúde ajudará. Tudo isso leva a uma melhor prevenção e cura da doença.\n\nInfelizmente, a invenção de uma #V Vacina contra a poliomielite#! está além do escopo do período vitoriano." #NT!
  
