 panum_vitamins_tech_desc: "Ao isolar certos nutrientes que o corpo precisa, é possível garantir que mais pessoas tenham uma dieta saudável e equilibrada." #NT!
  
 panum.2006.t: "A teoria dos germes é reforçada" #NT!
 panum.2006.d: "O Congresso Médico também ofereceu a oportunidade para vários médicos trocarem idéias sobre as causas da doença. Está se tornando aparente que menos e menos pesquisadores acreditam na teoria tradicional do miasma. A teoria dos germes agora é considerada o padrão entre os estudiosos mais respeitados." #NT!
 panum.2006.f: "De fato, um certo ajuste fez sua aparência, na medida em que os países individuais não prosseguem de maneira tão tendenciosa como antes, e um assume de outro, o que parece ser bem tentado no caminho da defesa. No entanto, em meio à grande variedade persistentemente grande das maneiras e meios de combater a tuberculose, ainda é necessário perguntar quais medidas realmente satisfazem melhor os requisitos científicos e as descobertas gerais na luta contra a doença contagiosa. \ N \ \ nbut, antes de responder a essa pergunta, como a infecção, como a infecção, como a infecção, como o humor; Para todas as medidas profiláticas contra uma doença infecciosa, só pode ser direcionada para impedir que os germes da doença invadissem o corpo. -Robert Koch" #NT!
 panum.2006.g: "Essa evidência não pode ser descartada de imediato." #NT!
 panum.2201.t: "A teoria de Miasma perde soberania interpretativa" #NT!
 panum.2201.d: "A cada dia que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] se concentra cada vez mais em novos métodos de pesquisa, a teoria tradicional do miasma se torna menos relevante. A teoria dos germes parece mais convincente." #NT!
 panum.2201.f: "'Senhores, são os micróbios que terão a última palavra!' -Louis pasteur" #NT!
 panum.2201.g: "Então a teoria do miasma é questionável?" #NT!
  
