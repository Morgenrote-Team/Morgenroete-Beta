 panum_physician_achievement_successful_treatments_loc: "\nO Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] tem experiência no tratamento de pacientes e #o tratou com sucesso [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] pacientes#!." #NT!
 panum_physician_achievement_epidemiologist_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] estudou doenças extensivamente e se tornou um #o $panum_epidemiologist$#!." #NT!
 panum_physician_achievement_surgeon_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] realizou muitas cirurgias e, portanto, é considerado um bom #o $panum_surgeon$#!." #NT!
 panum_physician_achievement_psychiatrist_loc: "\nO Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] estudou extensivamente a mente humana e é um #o renomado $panum_psychiatrist$#!." #NT!
 panum_physician_achievement_military_physician_loc: "\nComo #o $panum_military_physician$#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] viu os horrores da guerra e sabe como tratar as pessoas em circunstâncias horríveis." #NT!
 panum_physician_achievement_germ_theory_inventor_loc: "\nO Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] inventou a #o Teoria dos Germes#! que já salvou milhares de vidas." #NT!
 panum_physician_achievement_pneumothorax_inventor_loc: "\nUma das maiores invenções de [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHim] é um #o Dispositivo para induzir um pneumotórax artificial#!. Isso resulta no colapso dos pulmões, o que pode ajudar a tratar a tuberculose." #NT!
 panum_physician_achievement_thoracoplasty_inventor_loc: "\nGraças às habilidades cirúrgicas do [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis], o Doutor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventou um #o Procedimento que revolucionou a Cirurgia Pulmonar chamado Toracoplastia#! e assim permitiu um melhor tratamento de pacientes com Tuberculose." #NT!
 panum_physician_achievement_attended_medical_congress_loc: "\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] participou de pelo menos um #o Congresso Médico#! e compartilhou [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis] ideias." #NT!
  
 panum_no_epidemic_corruption_modifier: "Nenhuma corrupção epidêmica" #NT!
