 je_panum_measles: "Epidemia de sarampo" #NT!
 je_panum_measles_reason: "O sarampo é uma doença altamente contagiosa conhecida por suas manchas típicas da pele vermelha. Pode ter consequências catastróficas, particularmente em populações sem imunidade prévia. Como uma doença supra -orgional, o sarampo pode se espalhar para outras áreas. Com essa tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para sarampo. Apenas um sistema de saúde muito bom ajudará. Tudo isso leva a uma melhor prevenção e cura da doença." #NT!
 je_panum_scarlet: "Epidemia de febre escarlatina" #NT!
 je_panum_scarlet_reason: "A febre escarlatina é uma doença generalizada que foi uma das causas de morte mais comuns entre as crianças até o início do século XX. Com essa tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para a escarlatinha febril _1. Um bom sistema de saúde ajudará. Tudo isso leva a uma melhor prevenção e cura da doença." #NT!
 je_panum_plague: "Epidemia de peste" #NT!
 je_panum_plague_reason: "A peste bubônica é equiparada à 'morte negra' da Idade Média, que é uma das piores catástrofes da história. Pensa -se que ele desapareceu até reaparecer no final do século XIX. Em países com baixa riqueza e sistemas de saúde fracos, a praga pode se espalhar por várias áreas. Com essa tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para peste#!. Já um sistema de saúde rudimentar ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. \ N \ nin a fim de derrotar a peste de uma vez por todas, é necessária uma vacina #V contra a peste#! que é desenvolvida por um [concept_theiler_biologist]." #NT!
 je_panum_diphteria: "Epidemia de difteria" #NT!
 je_panum_diphteria_reason: "A difteria é uma doença perigosa que pode levar a complicações com risco de vida e consequências a longo prazo. Devido à mortalidade infantil e problemas respiratórios associados a ela, a difteria é apelidada de 'anjo estrangulador de crianças'. Os efeitos permanecem localizados. Com esta tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para a difteria#!. Apenas um bom sistema de saúde ajudará. Tudo isso leva a uma melhor prevenção e cura da doença. \ N \ nin a fim de derrotar a difteria de uma vez por todas, é necessária uma vacina #V contra a difteria#! que é desenvolvida por um [concept_theiler_biologist]." #NT!
 je_panum_polio: "Poliomielite" #NT!
 je_panum_polio_reason: "A poliomielite é uma doença que afeta principalmente crianças, geralmente resultando em morte ou complicações físicas ao longo da vida. Enquanto só ocorreu esporadicamente no passado, a poliomielite se tornou endêmica durante o século XIX. A poliomielite não se espalha além do estado em que ocorre. Com esta tecnologia, um [concept_panum_physician] pode encontrar um tratamento #V para a poliomielite. Apenas um bom sistema de saúde ajudará. Tudo isso leva a uma melhor prevenção e cura da doença." #NT!
  
