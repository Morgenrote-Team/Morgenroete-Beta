 je_panum_measles_treatment_expedition_reason: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] lidera uma expedição médica em [SCOPE.sCountry('target').GetName] para encontrar métodos de tratamento contra #YELLOW Sarampo#!. Enquanto a doença estiver presente no país, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] terá uma chance mensal de rastrear as causas da doença e contê-la.\n\nSe a doença diminuir, o progresso científico não será perdido, mas também estará presente no próximo exame." #NT!
