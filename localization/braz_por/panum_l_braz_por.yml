 panum.600.t: "Epidemia de sarampo" #NT!
 panum.600.d: "Uma epidemia eclodiu em um de nossos estados: #YELLOW sarampo, 1 está devastando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.600.f: "Como a varíola, o sarampo foi mencionado pelo médico persa Rhazes no século X e parece ter sido difundido na região da Eurásia ao longo da Idade Média. O sarampo era endêmico na Europa até o século XIX e se tornou ainda mais importante à medida que a urbanização aumentou. Uma característica especial de Masenr é a erupção cutânea que começa no rosto e pescoço e se espalha por todo o corpo dentro de alguns dias. Juntamente com a varíola, o sarampo é considerado uma das doenças que atingiram grandes partes da população indígena indiana no século XVI." #NT!
 panum.600.g: "Mas isso é apenas uma doença infantil inofensiva ... certo?" #NT!
 panum.620.t: "Extremidade epidêmica do sarampo" #NT!
 panum.620.d: "A epidemia de sarampo aparentemente acabou. Um último conjunto de pais enterrou seu filho morto." #NT!
 panum.620.f: ""Como o sarampo, o amor é mais perigoso quando se trata da vida." -Lord byron" #NT!
  
 panum.602.t: "A epidemia de sarampo chega a [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.602.d: "Recebemos relatos de que os primeiros casos de sarampo foram relatados no [SCOPE.sCountry('panum_infected_country').GetName] hoje. As autoridades nos culpam por não fazer o suficiente para impedir a propagação." #NT!
 panum.602.g: "Não havia como evitar isso." #NT!
 panum.603.t: "O sarampo mata crianças" #NT!
 panum.603.d: "Em [SCOPE.sState('panum_disease_state').GetName], o surto de sarampo foi muito mais severo do que o esperado. A epidemia foi particularmente desenfreada entre bebês e crianças pequenas e enfraqueceu permanentemente uma geração inteira." #NT!
 panum.603.f: "O sarampo sempre foi visto como uma doença da infância, embora também possa afetar os adultos. Ele mostra seus efeitos mais devastadores entre 2 e 3 anos. A taxa de mortalidade cai rapidamente. Em 1963, antes de uma vacina ser inventada, as estatísticas oficiais estimaram que 2 milhões de mortes de sarampo estavam ocorrendo em todo o mundo a cada ano. Cerca de 5 a 10 % dos casos da doença terminaram fatalmente." #NT!
 panum.603.g: "Não há cura para esta doença terrível?" #NT!
 panum.604.t: "O sarampo paralisa marinheiros" #NT!
 panum.604.d: "Por razões misteriosas, sarampo em [SCOPE.sState('panum_disease_state').GetName] afetaram particularmente os pescadores e marinheiros. As taxas de mortalidade são insignificantes, mas a perda de trabalho é perceptível nos pátios de peixes e entre os baleeiros." #NT!
 panum.604.f: "Durante sua pesquisa nas Ilhas Faroe, Peter Panum descobriu que o sarampo também afetou os adultos, especialmente em populações mais isoladas. As razões para isso permaneceram obscuras por um longo tempo; Em princípio, no entanto, era perceptível que os pescadores e suas famílias que moravam longe das cidades mais movimentadas foram particularmente afetadas." #NT!
 panum.604.g: "Mas quem vai para o mar agora?" #NT!
 panum.605.t: "Clínica Infantil para Sarampo" #NT!
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName] observou o alto número de crianças que sofrem de sarampo em [SCOPE.sState('panum_disease_state').GetName], particularmente entre as famílias mais pobres, onde as taxas de mortalidade são maiores. O político gostaria de financiar uma clínica infantil para o sarampo e pediu uma doação pública." #NT!
 panum.605.f: "É uma pena ver os bons pais de [SCOPE.sState('panum_disease_state').GetName] à mercê desta terrível doença. Os políticos devem agir e assumir a responsabilidade. Por muito tempo, muito pouco foi feito por muitos. Um hospital infantil deve ajudar a proteger a coisa mais valiosa que os pais têm. Vamos ajudar. Eu prometo a você isso. Enquanto meu nome for [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting] ... o que você quer dizer com discursos eleitorais? '" #NT!
 panum.605.g: "Uma iniciativa que vale a pena apoiar." #NT!
 panum.605.h: "Este partido só quer explorar a doença para fins políticos." #NT!
 panum.606.t: "Depressão do sarampo" #NT!
 panum.606.d: "“As muitas crianças doentes e mortas em [SCOPE.sState('panum_disease_state').GetName] deixaram sua marca em muitos pais. Alguns falam de inúmeras pessoas que estão em uma crise na vida." #NT!
 panum.606.f: "'EM. Miller teve que enterrar seu terceiro filho este mês. Ela é apenas uma das muitas mães que agora não têm filhos. Miller, que administra uma padaria na cidade, fechou sua loja por várias semanas. Muitas famílias nesta área são como os Millers. Dificilmente há um clã que não perdeu um filho. No entanto, o fatalismo vem se transformando em insatisfação há semanas. As pessoas nesta região se tornaram significativamente mais sensíveis se as circunstâncias continuarem a piorar. Muitas pessoas agora culpam o governo por sua miséria. '\ N \ Narticle do [SCOPE.sState('panum_disease_state').GetCityHubName] Herald" #NT!
 panum.606.g: "Não é totalmente incompreensível, dada a situação." #NT!
  
 panum.622.t: "Incubação de sarampo" #NT!
 panum.622.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] compilou uma lista meticulosa de casos de sarampo que mostra praticamente o período de incubação do sarampo." #NT!
 panum.622.f: "“Não se pode negar que o estágio de descamação possa ser infeccioso, mas deve -se ter cuidado ao aceitar essa visão na medida em que, por motivos gerais, seria suspeito do contrário. Parece quase que, como um período latente tão longo não pôde ser concebido, um estágio posterior da doença foi escolhido como o infectando. Nas aldeias de Hove e Lobre, em Subderø, no final da epidemia, ocorreu um intervalo de mais de quatorze dias entre gerações do exanteno na mesma casa, sem que eu seja capaz de demonstrar uma nova infecção por fora; No entanto, esses dois casos podem ser explicados por uma infecção transmitida durante o estágio de convalescença. A partir dos dados aqui apresentados, acredito que o período de incubação do sarampo pode ser estimado com grande garantia em cerca de catorze dias, sem, no entanto, insistir que esse intervalo é aquele que não pode ser modificado por circunstâncias particulares, como, por exemplo, uma jornada; Muitos fatores falam a priori contra um ditado tão absoluto, bem como a analogia com a incerteza dos períodos latentes de outras doenças. -Peter panum" #NT!
 panum.623.t: "Silencioso saramquiness" #NT!
 panum.623.d: "Em uma nova etapa intermediária, o Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] diferenciou entre diferentes formas de sarampo e não apenas observou as diferenças de outras doenças semelhantes, como varíola, rubéola e sarampo, mas também destacou os sintomas únicos." #NT!
 panum.623.f: "'A literatura sobre sarampo é insignificante e incompleta em comparação com a que outros exantematos agudos, como, por exemplo, febre escarlatal e varíola. Além de relatórios dispersos nos periódicos relacionados a surtos únicos, existem apenas algumas monografias, várias das quais datam do século anterior. Essa febre exanteática, certamente desconhecida pelos médicos gregos e árabes, foi tão insuficientemente diferenciada, mesmo no século passado, que De Haën manteve a identidade do sarampo com a varíola, com base nos sintomas e escritores antes do final do século XVII, descreveu ambas as doenças como pertencentes à mesma família. -Peter panum" #NT!
 panum.624.t: "Populações virgens e imunidade ao longo da vida" #NT!
 panum.624.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu mostrar muito claramente que, quando o sarampo afeta um indivíduo, ele não ocorre novamente. As populações que nunca foram expostas à doença estão, portanto, particularmente em risco." #NT!
 panum.624.f: "'Nesse sentido, é bastante notável, no entanto, que, das muitas pessoas idosas que ainda vivem nos Faroes que tiveram sarampo em 1781, não um, até onde eu conseguia descobrir por uma investigação cuidadosa, foi atacada pela segunda vez. Eu mesmo vi noventa e oito velhos, que estavam isentos porque tinham a doença de sua juventude. Isso foi o mais digno de nota, pois uma idade alta não diminuiu a suscetibilidade ao sarampo, já que, até onde eu sei, todos os idosos que não haviam passado com o sarampo na vida anterior foram atacados quando foram expostos à infecção; enquanto certos jovens, embora constantemente expostos, estavam isentos. Se a recuperação do sarampo de sessenta e cinco anos antes pudesse garantir as pessoas contra a doença pela segunda vez, pode -se supor que uma proteção ainda maior seria proporcionada por terem se recuperado dela por um tempo menor antes de ' -Peter Panum" #NT!
  
 panum.700.t: "Epidemia de febre escarlatina" #NT!
 panum.700.d: "Uma epidemia começou em um de nossos estados: #YELLOW Scarlet Fever#! está devastando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.700.f: "A febre escarlatina é conhecida desde os tempos antigos e foi bem descrita no século XVII, principalmente por Thomas Sydenham. Embora a febre escarlate aparentemente tenha se tornado menos perigoso no século XVIII, ela revidou de uma nova forma no século XIX. Pierre Fidèle Bretonau, por exemplo, afirmou que por volta de 1800 ele não conhecia um único caso fatal de escarlatina, enquanto em 1824 ele observou uma epidemia em passeios com tão mortalidade que colocou escarlatina em pé de igualdade com a praga e a cólera. A febre escarlatina é acompanhada por uma erupção cutânea característica. Ao contrário da varíola ou do sarampo, a febre escarlatina é caracterizada por uma área de amígdala inchada e uma língua cor de morango." #NT!
 panum.700.g: "Toda criança tem que passar por isso em algum momento. Esperançosamente." #NT!
 panum.720.t: "Etdemia epidêmica da febre escarlatina" #NT!
 panum.720.d: "A epidemia de febre escarlate que tomou o nosso país está lentamente deixando as cidades e as aldeias. Inúmeros pais respiram um suspiro de alívio." #NT!
 panum.720.f: ""É como escarlatina: é preciso acabar com isso. -Leo Tolstoi" #NT!
  
 panum.722.t: "Conhecimento antigo" #NT!
 panum.722.d: "Através de um traficante de antiguidades, [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu encontrar vários livros antigos que resumem as descrições da febre escarlate no passado e também podem ser úteis no presente." #NT!
 panum.722.f: "Não se pode dizer com certeza se a febre escarlate era conhecida nos tempos antigos ou se foi confundida com doenças semelhantes, como difteria, sarampo e rubéola. Evidências de uma doença semelhante à febre escarlatina já existem em Celsus, Caelius aurelianus, Arataeus da Capadocia e Aetius de Amida. Descrições semelhantes podem ser encontradas na região árabe-perisiana a partir da Idade Média, a saber, por Avicenna, Ali Abbas e Rhazes. A primeira descrição definitiva da febre escarlate é uma descrição de Giovanni Filippo Inglassia de 1553. Outra posição importante é mantida pelo médico Daniel Sennert, também do século XVI. O nome 'Scarlatina' remonta a Thomas Sydenham e sua descrição de 1675. Embora a descrição de Sydenham seja considerada autoritária, há lacunas significativas nele, e o termo escarlate também parece ter sido difundido na Inglaterra em meados do século XVI." #NT!
 panum.723.t: "Sintomas da febre escarlatina" #NT!
 panum.723.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] fez progresso em sua descrição da febre escarlate e resumiu os sintomas pela primeira vez." #NT!
 panum.723.f: "Os pacientes se sentem rigoros e tremendo, exatamente como em outras febres. Os sintomas, no entanto, são moderados; Posteriormente, toda a pele fica coberta com pequenas mágulas vermelhas, mais grossas que as do sarampo, além de mais largas, mais vermelhas e menos uniformes. Estes duram dois ou três dias e depois desaparecem. O paciente não apenas tem uma erupção cutânea, mas também a inflamação das amígdalas. Pode haver complicações como reumatismo e hidropisia. '\ N \ na uma carta do doutor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] para a faculdade de medicina" #NT!
 panum.724.t: "Scarlatina não ama a laringe" #NT!
 panum.724.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] identificou as diferenças específicas entre as doenças escarlate e a febre e a difteria." #NT!
 panum.724.f: "'Na escarlatina, a inflamação está amplamente sobre as amígdalas, palato e faringe, e não é, como na difteria, a princípio limitado a um ponto; e em segundo lugar, a inflamação escarlatinal da faringe não tem tendência a surgir nas passagens respiratórias. Para colocar brevemente: Scarlatina não ama a laringe." #NT!
  
 panum_plague_quarantine_modifier: "Praga em quarentena" #NT!
 panum_plague_hospitals_modifier: "Casas de peste" #NT!
 panum_plague_burn_everything_modifier: "Queime tudo!" #NT!
 panum_plague_rat_killer_modifier: "Mate tudo!" #NT!
 panum_plague_loss_of_trust_modifier: "Perda de confiança" #NT!
  
 panum.800.t: "O retorno da praga" #NT!
 panum.800.d: "Há rumores há vários anos de que a praga retornou a partes do nosso país. Anteriormente, isso se limitava a distritos rurais remotos. No entanto, com o surto em [SCOPE.sState('panum_disease_state').GetName], finalmente está claro: a praga está mais uma vez estendendo seus dedos retorcidos!" #NT!
 panum.800.f: "A terceira praga pandemia (após a praga Justiniana no século VI e a 'morte negra' no século 14) começou na China no final do século XIX. Pensa -se que a pandemia se originou de Yunnan, que viu um surto já em 1792, em 1855 e novamente em 1866. Um surto na cidade vizinha de Guangzhou de janeiro de 1894 matou 80.000. A partir de março de 1894, cientistas e médicos britânicos em Hong Kong tomaram conhecimento do surto. Após as ondas da cólera das últimas décadas, esperava -se que a onda de peste causasse muitas mortes, especialmente na China e na Índia, e, finalmente, levasse à instabilidade do Estado. Custaria cerca de 15 milhões de vidas em todo o mundo." #NT!
 panum.800.g: "Impossível! A praga é uma doença do passado esquecido!" #NT!
  
 panum.820.t: "Epidemia de peste termina" #NT!
 panum.820.d: "A terrível praga, um dos piores flagelos da humanidade, deixou nosso país novamente. Vamos torcer para que volte para onde pertence: ao abismo da história." #NT!
 panum.820.f: "- Mas o que isso significa, a praga? É a vida, é tudo. -Albert Camus" #NT!
  
 panum.802.t: "A peste se espalha para [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.802.d: "Os casos de peste também estão sendo relatados além de nossas fronteiras. Aparentemente, as autoridades não conseguiram conter a doença. O embaixador [SCOPE.sCountry('panum_infected_country').GetAdjectiveNoFlag] fez acusações sérias contra nós." #NT!
 panum.802.g: "A longo prazo, a praga chega a todos ..." #NT!
 panum.803.t: "Epidemia de peste" #NT!
 panum.803.d: "Uma epidemia começou em um de nossos estados: #YELLOW peste#! está devastando em [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.803.g: "A Peste Negra está batendo." #NT!
 panum.804.t: "A Praga: uma terceira onda" #NT!
 panum.804.d: "As notícias perturbadoras nos alcançam de [SCOPE.sCountry('panum_plague_country').GetName]. Diz -se que um surto epidêmico violento se enfureceu há algumas semanas. Os médicos estão preocupados: deve ser a famosa praga." #NT!
 panum.804.g: "Devemos montar uma expedição médica para nos preparar para isso." #NT!
 panum.805.t: "Praga em quarentena" #NT!
 panum.805.d: "A situação em [SCOPE.sState('panum_disease_state').GetName] ameaça ficar fora de controle. Políticos influentes, chefes de autoridades e particulares estão pedindo uma quarentena para impedir que a praga se espalhe ainda mais. São principalmente pessoas que não vivem em [SCOPE.sState('panum_disease_state').GetName]." #NT!
 panum.805.f: "As quarentenas extensas e rigorosas já haviam se mostrado bem -sucedidas na Idade Média. De fato, o termo quarentena remonta à palavra 40 no idioma italiano e aparentemente foi usado pela primeira vez em tempos de peste. A República de Veneza, em particular, como nação comercial com extenso tráfego de remessa, era conhecido por essa medida, pois as cidades portuárias e comerciais foram particularmente afetadas por epidemias." #NT!
 panum.805.g: "Toda a área deve ser em quarentena." #NT!
 panum.805.h: "Não devemos exagerar." #NT!
 panum.806.t: "Casas de peste" #NT!
 panum.806.d: "As autoridades locais em [SCOPE.sState('panum_disease_state').GetName] fizeram uma proposta para estabelecer casas de peste para isolar melhor a população saudável da população doente. Isso afetaria particularmente as classes mais pobres, que não podem fugir como os ricos." #NT!
 panum.806.f: "Uma casa de peste foi usada para cuidar de pacientes com peste durante epidemias de peste. Como a epidemia foi considerada incurável durante o período de pico dessas ondas de doença, no final da Idade Média e no início dos tempos modernos, e, portanto, era apenas um alívio como resultado de cuidados médicos, as casas de peste pretendiam isolar os doentes da população saudável. Para esse fim, as casas de peste semelhantes aos leprosoriums eram geralmente construídas do lado de fora ou nos arredores de uma cidade. Outro tipo de peste pretendia servir a prevenção no sentido de um período de quarentena. Pessoas em cuja vizinhança imediata a praga ocorreu foram levadas para a casa da peste, que só podiam sair se fossem infectadas." #NT!
 panum.806.g: "É apenas para o seu próprio bem. Mesmo que eles não quiserem." #NT!
 panum.806.h: "Isso apenas provocaria a agitação." #NT!
 panum.807.t: "O médico da peste" #NT!
 panum.807.d: "O médico líder em um de nossos hospitais de peste em [SCOPE.sState('panum_disease_state').GetName] ganhou tanta experiência nesse campo que ele poderia ser uma ajuda valiosa em nível nacional." #NT!
 panum.807.f: "'Deixe -me passar! Sou um médico. E eu sei exatamente como lidar com essa doença." #NT!
 panum.807.g: "Dê ao médico uma posição de alto escalão como médico." #NT!
 panum.808.t: "O vôo dos ricos" #NT!
 panum.808.d: "O número de emigrantes em [SCOPE.sState('panum_disease_state').GetName] está aumentando todos os dias. Em particular, aquelas famílias que podem pagar tentam escapar da praga. Há um grande ressentimento entre aqueles que não podem pagar tal fuga. Outros alertam que isso tornará a praga mais difundida." #NT!
 panum.808.f: "“Alguns novamente, o mais sólido, talvez, julgando, como nós também é o mais duro em temperatura, de todos, afirmou que não havia remédio para a doença superior ou igual em eficácia ao voo; following which prescription a multitude of men and women, negligent of all but themselves, deserted their city, their houses, their estate, their kinsfolk, their goods, and went into voluntary exile, or migrated to the country parts, as if God in visiting men with this pestilence in requital of their iniquities would not pursue them with His wrath, wherever they might be, but intended the destruction of such alone as remained within the circuit of the walls of the cidade; ou considerando, por acaso, que agora chegou a hora de todos fugir dele e que sua última hora chegou. -Bocaccio" #NT!
 panum.809.t: "Pilhas de cadáveres" #NT!
 panum.809.d: "O número de mortes da praga atingiu essas proporções que dificilmente poderia ser mantido sob controle. Alguns já estão recomendando queimaduras públicas e túmulos em massa." #NT!
 panum.809.f: "No auge da praga de 1894 em Hong Kong, as admissões no hospital em média de 80 por dia e a morte atingiu mais de 100 por dia. Através do tráfego marítimo, a epidemia se espalhou para o resto do país após 1894 e, eventualmente, se espalhou para a Raj British India, onde cerca de dez milhões de índios foram mortos. As principais medidas preventivas estavam estabelecendo hospitais de peste e implantando a equipe médica para tratar e isolar pacientes com peste; realizar operações de pesquisa de casa em casa, descobrir e transferir pacientes com peste e limpar e desinfetar casas e áreas infectadas; e configurar cemitérios designados e atribuir uma pessoa responsável pelo transporte e enterro da praga morta." #NT!
 panum.810.t: "A PETENDA BEL" #NT!
 panum.810.d: "A epidemia de peste está particularmente furiosa em [SCOPE.sState('panum_disease_state').GetName] hoje em dia. Inúmeras mortes foram relatadas, ainda mais do que o habitual." #NT!
 panum.810.f: "A doença permaneceu localizada no sudoeste da China por vários anos antes de se espalhar. Na cidade de Canton, a partir de janeiro de 1894, a doença matou 80.000 pessoas até junho. O tráfego diário de água com a cidade vizinha de Hong Kong espalhou rapidamente a praga lá, matando mais de 2.400 em dois meses durante a praga de 1894 de Hong Kong." #NT!
 panum.810.g: "Ninguém escapa de Ceifador Grim!" #NT!
 panum.811.t: "Queime tudo!" #NT!
 panum.811.d: "Limpar e desinfetar as casas das pessoas afetadas é frequentemente a única maneira de interromper a propagação da praga. Isso geralmente inclui queimar qualquer coisa que entre em contato com um paciente de peste." #NT!
 panum.811.f: "'Eu digo, então, que essa era a energia do contágio da referida pestilência, que não foi apenas propagada de homem para homem, mas, o que é muito mais surpreendente, foi observado frequentemente que as coisas que pertenciam a uma morte ou morta da doença, se tocadas por alguma outra criatura viva, não da espécie humana, não foram a ocasião, não apenas de inacessos. Do que meus próprios olhos (como eu disse um pouco antes) tinham conhecimento, um dia entre outros, pela seguinte experiência. Os trapos de um homem pobre que morreu da doença sendo espalhado pela rua aberta, dois porcos chegaram para lá e depois, como é o seu costume, pouco insignificante com seus focinhos, pegou os trapos entre os dentes e os jogou para e para seus rachadres; então, quase imediatamente, eles deram algumas voltas e caíram mortos, como se por veneno, sobre os trapos que em uma hora maligna eles haviam perturbado. -Boccaccio" #NT!
 panum.811.g: "Queime roupas, móveis e até casas, se necessário!" #NT!
 panum.811.h: "Isso não é necessário." #NT!
 panum.812.t: "Mate tudo!" #NT!
 panum.812.d: "Suspeita -se que os ratos pudessem ser transportadores da praga. Existem chamadas no [SCOPE.sState('panum_disease_state').GetName] para erradicar especificamente animais e vermes para impedir a propagação da doença." #NT!
 panum.812.f: "Após a terceira pandemia de peste, as cidades européias criaram 'Corpo de Rancos' reais que foram encarregados de procurar e matar especificamente os animais ou mergulhá-los em baldes de gasolina. No entanto, era frequentemente proposto que outras fontes de peste, como parasitas infectados específicos de humanos ou morcegos humanos, como pulgas e piolhos, eram importantes para a transmissão na Europa durante a terceira pandemia. O baixo número de ratos infectados por peste encontrados durante os surtos europeus sugerem que eles desempenharam um papel relativamente menor na transmissão da peste. No entanto, alguns pesquisadores argumentaram que é improvável que as autoridades encontrassem ratos infectados com a praga porque se escondiam." #NT!
 panum.812.g: "Exterminar os ratos." #NT!
 panum.812.h: "Isso é muito caro." #NT!
 panum.813.t: "Perda de confiança" #NT!
 panum.813.d: "Muitos residentes em [SCOPE.sState('panum_disease_state').GetName] acham a situação médica atual escandalosa. As muitas mortes e o óbvio fracasso do governo levaram a uma perda generalizada de confiança no governo." #NT!
 panum.813.f: "A epidemia de peste do século XIX causou um grande número de vítimas, particularmente na China, que abalou severamente a confiança no governo e o mandato celestial dos imperadores Qing." #NT!
 panum.813.g: "Então faça sua bagunça sozinha!" #NT!
  
 panum.822.t: "A morte negra" #NT!
 panum.822.d: "Usando várias fontes históricas, o Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu provar que a nova onda de peste é na verdade uma doença que corresponde à morte negra da Idade Média." #NT!
 panum.822.f: "A descoberta da disseminação da praga na Índia teve um significado dominante na visão da praga em seu significado atual como uma doença moderna. Inicialmente, levou à visão de que havia apenas uma maneira de a doença se espalhar. A pesquisa agora se expandiu para incluir um grande número de roedores e um grande número de espécies de pulgas. A alta mortalidade nas colônias levou a um aumento nos esforços de pesquisa para mapear as características epidêmicas. O fato de sempre ter sido a praga não foi questionado como o ponto de partida. A doença recebeu a praga histórica. A identidade da praga medieval com a praga pesquisada na Índia foi assumida." #NT!
 panum.823.t: "Estação da peste" #NT!
 panum.823.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] passou por todos os registros. Seja nesta epidemia ou antes, seja no passado próximo ou distante: não há epidemias de peste no inverno. Por que esse é o caso ainda não está claro, mas pode desempenhar um papel na busca pelos motivos do surto da doença." #NT!
 panum.823.f: "'Assim termina este ano ... é verdade que passamos por uma grande melancolia por causa da grande praga, e eu coloquei grandes acusações por isso, mantendo minha família por muito tempo em Woolwich, e eu e outra parte da minha família, meus funcionários, sob meu cargo em Greenwich ... mas agora a praga é quase nada ... mas muitos de isso sabem muito bem. No entanto, para nossa grande alegria, a cidade enche o ritmo e as lojas começam a abrir novamente. Ore a Deus, continue a diminuição da praga - pois isso mantém a quadra longe do local dos negócios e, assim, tudo vai a se deparar com questões públicas, eles a essa distância não pensam nisso. -Samuel Pepys" #NT!
 panum.824.t: "Peste bubônica e peste pneumônica" #NT!
 panum.824.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] conseguiu mostrar que há mais do que apenas uma forma de praga." #NT!
 panum.824.f: "A praga é geralmente entendida como significado da praga bubônica. O período de incubação é de poucas horas a sete dias. Os sintomas são febre, dor de cabeça e dores no corpo, um forte sentimento de doença e tontura. Distúrbios da consciência ocorrem mais tarde. O nome Bubônico Praga vem dos inchaços gravemente inchados e muito dolorosos no pescoço, axilas e virilha. A peste pneumônica é significativamente mais rara. É provável que seja semelhante à influenza, embora sua capacidade de se espalhar seja muito mais fraca. A propagação é tão específica que só pode se tornar uma epidemia em circunstâncias particularmente favoráveis. Primeiro de tudo, as fontes de infecção são raras. Apenas uma pequena proporção da população infectada com a praga recebe peste pneumônica, por exemplo, no caso de peste bubônica e resistência fraca." #NT!
  
  
 panum.241.t: "O experimento de coelho" #NT!
 panum.241.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] apresenta um experimento ousado que provará a contagiosidade da tuberculose. É sobre inoculação. E é sobre muitos coelhos mortos." #NT!
 panum.241.f: "'Para o meu primeiro experimento, comprei um par de coelhos fofos com três semanas de idade com o objetivo de determinar a contagiosidade da tuberculose. Eu borrifei um deles com extrato tuberculítico do tecido de um paciente com tuberculose que havia morrido 33 horas antes. Eu repeti o procedimento duas vezes. Depois de alguns dias, disseci os animais e descobri que o coelho estava infectado com tuberculose. Repeti o procedimento novamente, posteriormente adicionando um coelho. Então disseci um dos coelhos todos os dias por quatro dias consecutivos. Todos eles sofriam de tuberculose, embora em quatro estágios diferentes da doença. Eu tinha apenas inoculado o primeiro. \ N \ nin minha terceira tentativa, adquiri quatro pares de coelhos jovens e fofos, três meses ..." #NT!
 panum.241.g: "Pare essas terríveis experimentos com animais!" #NT!
 panum.241.h: "Vamos repetir o experimento para ter certeza." #NT!
 panum.241.i: "Um terceiro experimento de coelho para a ciência!" #NT!
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] pode matar o maior número possível de coelhos para prova a teoria." #NT!
  
 panum.261.t: "Pneumotórax artificial" #NT!
 panum.261.d: "O médico [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventou um dispositivo que colapsa artificialmente os pulmões e poderia ajudar a combater a tuberculose." #NT!
 panum.261.f: "Com a assistência de seu irmão, Carlo Forlanini projetou e construiu um dispositivo simples capaz de administrar gases intrapeleuralmente. A presença de gás no líquido intrapleural fez com que o pulmão colapse, criando, portanto, um pneumotórax artificial. Depois de construir o dispositivo, Forlanini tentou tratar dois casos de tuberculose induzindo um pneumotórax nos dois pacientes e obteve resultados positivos. Ao longo dos anos, a técnica de Forlanini foi desenvolvida e aprimorada, aumentando assim a taxa de sucesso do procedimento. O pneumotórax artificial continuou como tratamento até a introdução da estreptomicina." #NT!
 panum.262.t: "Toracoplastia" #NT!
 panum.262.d: "Graças às habilidades cirúrgicas §0, o médico [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] inventou um procedimento que revolucionou a cirurgia pulmonar e, portanto, permitiu o tratamento melhorado de pacientes com tuberculose." #NT!
 panum.262.f: "Uma toracoplastia é um procedimento cirúrgico no qual costelas ou partes das costelas de um lado do tórax são removidas cirurgicamente para colapsar o pulmão ou partes do pulmão. Esse procedimento remonta a Edouarde de Cérenville e foi usado principalmente para tratar a tuberculose pulmonar, mas depois se tornou cada vez menos importante com a introdução de antibióticos eficazes." #NT!
 panum.263.t: "O médico fez de novo!" #NT!
 panum.263.d: "Para provar mais uma vez a contagiosidade da tuberculose, o Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] mais uma vez matou inúmeros coelhos fofos." #NT!
 panum.263.f: "Dos quatro pares que adquiri desta vez, matei o primeiro animal do primeiro par imediatamente. Não mostrou nenhuma lesão dos pulmões." #NT!
 panum.263.g: "É sobre salvar vidas humanas." #NT!
 panum.263.h: "Este médico tem um problema sério." #NT!
  
