 panum.2301.t: "Tratamento bem -sucedido de [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2301.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] tratou com sucesso [SCOPE.sCharacter('chosen_character').GetFullName] de [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]." #NT!
 panum.2301.f: ""Não se preocupe, senhor, esse tratamento certamente funcionará! Eu fiz isso pelo menos 2 vezes e apenas um paciente morreu!" "" #NT!
 panum.2301.g: "Bom!" #NT!
  
 panum.2302.t: "Tratamento neutro de [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2302.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] tratou [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')], mas nada realmente mudou." #NT!
 panum.2302.f: ""Eu realmente pensei que beber água suficiente faria o truque! \"" #NT!
 panum.2302.g: "Pelo menos não doeu." #NT!
  
 panum.2303.t: "Tratamento fracassado de [SCOPE.sCharacter('chosen_character').GetFullName] [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2303.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] tratou tanto [SCOPE.sCharacter('chosen_character').GetFullName] de [SCOPE.sCharacter('chosen_character').GetFullName] que tornava ainda pior a condição [SCOPE.sCharacter('chosen_character').GetHerHis]." #NT!
 panum.2303.f: "\ "Esta é a terceira vez que aconteceu esta semana ... \"" #NT!
 panum.2303.g: "Isso não deveria ter acontecido!" #NT!
  
 panum.2304.t: "Tratamento fatal [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2304.d: "O Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] trouxe a morte do paciente durante o tratamento [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]." #NT!
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]" #NT!
 panum.2304.g: "Uma tragédia!" #NT!
  
 panum_foreign_medical_expedition_modifier: "Expedição médica estrangeira" #NT!
  
 panum.137.t: "Expedição deseja pesquisar doenças" #NT!
 panum.137.d: "Uma expedição estrangeira atingiu as fronteiras do nosso país. Consiste principalmente em médicos, cientistas e seus assistentes. Aparentemente, eles querem pesquisar a epidemia desenfreada." #NT!
 panum.137.f: "As expedições médicas podem viajar para outros países para pesquisar cientificamente tratamentos de doenças e escrever descrições de doenças para sua terra natal. Os países anfitriões, por sua vez, se beneficiam disso porque os médicos examinam os pacientes nas áreas epidêmicas." #NT!
 panum.137.g: "Bem -vindo a esses homens e mulheres corajosos." #NT!
  
 panum.2202.t: "Doença antiga" #NT!
 panum.2202.d: "Nosso médico trouxe uma visão preciosa do trabalho de nosso antropólogo!" #NT!
 panum.2202.f: "'... Mas, é claro, se você examinar essa parte do crânio deles, poderá ver que eles realmente começaram a se curar de seus ferimentos. Um golpe desagradável, mas não letal. Eu estimaria que eles passaram mais seis meses vivos antes de outra lesão derrubá -los, ou talvez a ferida tenha dado mal. '\ N \ n'hmmm. Fascinante. A julgar pela natureza do golpe, pensei que é provável que fosse algum tipo de instrumento ... Eu acho que essa costela apresenta a verdadeira causa da morte. Observe o estreitamento dos ossos, aqui e aqui. Eu apostaria que seu homem morreu depois de anos lutando contra essa morte branca." #NT!
 panum.2202.g: "A ciência interdisciplinar continua sendo a melhor ciência." #NT!
 panum.2203.t: "Medicamento estranho" #NT!
 panum.2203.d: "Com algum tempo livre juntos, nosso médico e arqueólogo compartilharam suas pesquisas!" #NT!
 panum.2203.f: "'Ah, mas é aí que as coisas ficam interessantes, doutor! Esses frascos vêm do Egito e contêm o que acreditamos ser amostras de medicina antiga. '\ N \ nfascinating, fascinante. É esse o óleo mummia? '\ N \ n' ... Isso não é encontrado nos corpos, com propriedades de cura? A resina em torno de suas embalagens? '\ N \ n'oh, não, de jeito nenhum! Mummia é um tipo de óleo que encontram fora do chão, semelhante ao petróleo. Por quê? '\ N \ n' ... Eu acho que é melhor examinar mais esses medicamentos. Existem todos os tipos de tinturas. Por favor, dê uma olhada neles e eu voltarei em um momento. Eu preciso descartar ... alguma coisa." #NT!
 panum.2203.g: "... você não está comendo a múmia, está?" #NT!
 panum.2204.t: "Remédios à base de plantas?" #NT!
 panum.2204.d: "Tendo tido algum tempo para examinar suas descobertas, nosso naturalista entregou plantas com propriedades potencialmente medicinais ao consultório do médico." #NT!
 panum.2204.f: "'Ah, aí está você! Eu estava catalogando algumas das amostras que trouxemos de volta da última expedição botânica, e encontrei alguns que poderiam ser do seu interesse. '\ N \ n'oh, verdadeiramente? Como assim? Alguns deles são completamente estranhos para nós, mas vêm com boas palavras dos nativos e valem a pena investigar mais. Pode haver algo interessante neles. Você conhece as maravilhas que eles encontraram na planta de papoula, afinal. Vou fazer com que meus assistentes comecem a trabalhar para preparar algumas amostras em pó, para um exame mais detalhado." #NT!
 panum.2204.g: "Eu acredito que a folha da coca é especialmente fascinante, doutor." #NT!
  
