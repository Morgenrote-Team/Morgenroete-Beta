 panum_cholera_desc: "A cólera é uma doença infecciosa perigosa do intestino delgado. É considerado uma epidemia definidora do século XIX, com milhões de mortes em todo o mundo." #NT!
  
 panum.2626.t: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] show" #NT!
 panum.2626.d: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] recebeu [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] próprio programa no rádio no qual [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] dá conselhos a pessoas que desejam falar sobre seus problemas. O formato é muito popular." #NT!
 panum.2626.f: "'Olá, Ethan. Estou ouvindo. '\ N'hi, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName].' \ N'e Old você está? Eles estão sempre me espancando. 'Por que você acha que é assim?' \ N'Probable porque sou inteligente. Eu tenho um 160 QI. Estou no clube de astronomia e odeio esportes. sinceridade, sem inspiração. A verdadeira surpresa aqui é que eles pagam você para distribuir esse suco de balão. Obrigado pela sua ligação. '" #NT!
 panum.2626.g: "Espere, eu conheço esse show!" #NT!
  
