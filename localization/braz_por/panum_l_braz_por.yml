 panum_vaccination_tech: "Vacinação" #NT!
 panum_vaccination_tech_desc: "A vacina contra a varíola é a primeira vacina a ser desenvolvida contra uma doença contagiosa. Em 1796, o médico britânico Edward Jenner demonstrou que uma infecção com o vírus da varíola bovina, relativamente brando, conferia imunidade contra o vírus mortal da varíola." #NT!
  
