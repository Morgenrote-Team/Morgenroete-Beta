 panum.55.h: "Não agora." #NT!
 panum.55.i: "Notifique-me de uma forma menos intrusiva." #NT!
 panum.55.j: "Não me fale mais sobre isso." #NT!
 panum_foreign_disease_research_only_notification_tt: "A partir de agora você será notificado com #V Notificações#! sobre a possibilidade de enviar seu [concept_panum_physician] para países com doenças." #NT!
 panum_foreign_disease_research_no_notification_tt: "Você #n não será mais#! notificado sobre a possibilidade de enviar seu [concept_panum_physician] para países com doenças." #NT!
  
 panum.56.t: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] pode encontrar um tratamento para uma doença estranha" #NT!
 panum.56.d: "Outro país tem um surto de doença que seu [concept_panum_physician] poderia investigar para encontrar um tratamento para a doença." #NT!
  
 notification_panum_foreign_description_possible_notification_name: "Expedição de observação médica possível" #NT!
 notification_panum_foreign_description_possible_notification_desc: "Você pode enviar seu [concept_panum_physician] em uma Expedição de Observação Médica para descrever uma doença." #NT!
 notification_panum_foreign_treatment_possible_notification_name: "Possível expedição de pesquisa médica" #NT!
 notification_panum_foreign_treatment_possible_notification_desc: "Você pode enviar seu [concept_panum_physician] em uma Expedição de Pesquisa Médica para descrever uma doença." #NT!
  
 panum.131.t: "Estudos de doenças descontinuados" #NT!
 panum.131.d: "Como a perigosa epidemia em [GetPlayer.GetName] chegou ao fim e os últimos pacientes já se recuperaram, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] concluiu os estudos [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] por enquanto. O médico conseguiu coletar algumas informações importantes que devem simplificar uma futura descrição científica da doença, mas [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ainda não conseguiu um avanço" #NT!
 panum.131.f: "'Toda especulação quanto à sua origem e suas causas, se as causas podem ser encontradas adequadas para produzir uma perturbação tão grande, deixo para outros escritores, sejam leigos ou profissionais; quanto a mim, simplesmente estabelecerei sua natureza e explicarei os sintomas pelos quais talvez possa ser reconhecido pelo aluno, se ele surgir novamente. Isso eu posso fazer melhor, pois eu mesmo tive a doença e observei sua operação no caso de outros.' - Tucídides" #NT!
 panum.131.g: "Mais um passo foi dado." #NT!
 panum.133.t: "Expedição médica descontinuada" #NT!
 panum.133.d: "A expedição médica terminou seu trabalho por enquanto, pois a epidemia acabou. O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] não conseguiu completar uma descrição científica, mas os estudos [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] devem ser valiosos para o futuro." #NT!
 panum.134.d: "A terrível epidemia que atingiu nosso país passou. Mas isso também significa que o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] tem que parar as investigações [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] por enquanto porque [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] não pode realizar mais experimentos para encontrar um método de tratamento para a doença. No entanto, o médico ganhou insights valiosos que certamente serão úteis no futuro." #NT!
 panum.134.f: "'O contágio passa de uma coisa para outra e é causado originalmente pela infecção da partícula imperceptível.' -Girolamo Fracastoro" #NT!
 panum.134.g: "É só uma questão de tempo até encontrarmos uma cura." #NT!
 panum.136.d: "Infelizmente, a expedição de pesquisa médica foi encerrada por enquanto sem nenhum resultado final. Como a epidemia deixou o país, o Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] não verificou as teorias do [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]. Os resultados provisórios estarão disponíveis para o [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] e as gerações futuras para finalmente encontrar um método de tratamento." #NT!
  
