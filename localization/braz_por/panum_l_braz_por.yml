 panum.2221.t: "A doença do Woolstorter" #NT!
 panum.2221.d: "Ao examinar a chamada 'doença do lã', o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu que era na verdade antraz." #NT!
 panum.2221.f: "O antraz em humanos ocorreu principalmente como uma doença ocupacional em trabalhadores de curtumo e em pessoas que processaram pêlo, cerdas e cabelos, mas também em trabalhadores portuários e transportados que lidaram com esses materiais, bem como em Skinners. O pico da ocorrência foi de tempos de crise na indústria de couro, quando um número crescente de couros de animais baratos foi importado de regiões com pouco ou nenhum controle veterinário do abate. Por um longo tempo, a origem misteriosa da doença era desconhecida. Acreditava -se que era um caso de envenenamento e as pessoas o chamavam de 'doença do lã'. Com o avanço da microbiologia e a implementação da teoria dos germes, as conexões reais entre as doenças animais economicamente extremamente prejudiciais e a doença fatal para os seres humanos foram estabelecidas e levaram a novos regulamentos e regulamentos destinados a garantir a proteção dos trabalhadores." #NT!
 panum.2221.g: "Adote medidas de proteção estritas." #NT!
 panum.2222.t: "A doença do bócio" #NT!
 panum.2222.d: "Depois de examinar várias pessoas nos vales remotos da montanha com bócios gigantescos, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] experimentou um tratamento usando iodo. Após várias tentativas, a terapia funcionou." #NT!
 panum.2222.f: "Nas regiões alpinas de Estíria, Tirol e Suíça, mas também em outras regiões montanhosas ou na Midlands inglesa, os bócios eram uma doença cotidiana. Havia uma suspeita precoce de que a formação do bócio tinha algo a ver com a água em um certo território. Paracelsus suspeitava da falta de certos minerais e recomendou a água potável contendo chumbo. Na China antiga, os médicos recomendaram comer algas e esponjas. Com uma melhor compreensão da função da glândula tireóide e da importância do iodo, os primeiros esforços de cura finalmente começaram. A partir de 1918, o médico suíço Otto Bayard introduziu sal iodado através da adição corretamente dosada de potássio iodo ao sal de mesa nas comunidades em sua área de prática da nikolaital e mostrou que essa eliminou os distúrbios de desenvolvimento, o aumento dos efeitos do tendão e do bode e a formação de nódulos sem nenhum número." #NT!
 panum.2222.g: "Então é uma doença relacionada à dieta!" #NT!
 panum.2223.t: "Nefrolitíase" #NT!
 panum.2223.d: "O médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] desenvolveu um procedimento para operar com sucesso em pacientes com pedras nos rins." #NT!
 panum.2223.f: "As pedras nos rins são um fenômeno conhecido ao longo da história humana; Até Napoleão sofreu com eles. Embora vários procedimentos para remover as pedras nos rins tenham se desenvolvido desde o Renascimento, a operação permaneceu perigosa. O cirurgião americano Henry Jacob Bigelow alcançou um avanço: ele introduziu a técnica médica da litolapaxia. Em 1878, ele publicou 'LitoTridade por uma única operação', na qual descreveu sua técnica para 'a esmagamento e a remoção de uma pedra da bexiga de uma só vez'. Antes disso, os cirurgiões esmagavam uma pedra da bexiga e depois passavam apenas alguns minutos removendo as peças. Com esse novo método, a taxa de mortalidade caiu de cerca de 24% para 2,4%." #NT!
 panum.2223.g: "Estou ficando nervoso só de pensar nisso." #NT!
 panum.2224.t: "Pelagra" #NT!
 panum.2224.d: "Como o Doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] descobriu após anos de pesquisa, Pellagra é uma doença causada pela falta de ácido nicotínico." #NT!
 panum.2224.f: "Depois que Christopher Columbus descobriu a América, o milho foi uma das primeiras plantas a serem trazidas para a Europa, onde se espalhou rapidamente devido ao seu alto rendimento de culturas. Logo, em áreas com alto consumo de milho, uma doença estranha chamada 'pele áspera' após o sintoma principal, Pellagra, apareceu. A conexão entre Pelragra e alto consumo de milho (por exemplo, na forma de polenta) foi suspeita de primeiro no século XVIII. As explicações na época incluíam milho mofado ou envenenado, infecção ou hereditariedade. Joseph Goldberger e colegas provaram então no início do século XX que tanto a chamada pelra em humanos quanto a doença da língua negra em cães surgem da desnutrição, que Conrad Elvehjem conseguiu atribuir a uma deficiência de ácido nicotínico. A descoberta de que Pellagra poderia ser tratada com o fermento de Brewer levou a uma redução repentina no número de presos no hospital psiquiátrico nas áreas afetadas." #NT!
 panum.2224.g: "O mero resultado de uma dieta desequilibrada?" #NT!
 panum.2225.t: "Raquitismo" #NT!
 panum.2225.d: "Após muitos anos estudando pacientes com raquitismo, o médico [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] chega à conclusão de que a doença óssea tem a ver com uma deficiência de nutrientes - e recomenda o óleo de fígado de bacalhau e a luz solar como prevenção." #NT!
 panum.2225.f: "Embora tenha havido muitas descrições científicas de raquitistas ao longo do tempo, suas causas permaneceram desconhecidas por um longo tempo. Uma variedade de causas de raquitismo foi proposta pelos principais patologistas no século XIX, incluindo sífilis congênita e infecção por tuberculose paterna. Uma verdadeira compreensão moderna da base fisiopatológica dos raquitistas não começou até o início do século XX. Em 1919, Edward Mellanby descobriu e publicou sobre a '4ª vitamina', afirmando que as raquitinhas é uma doença de deficiência que se desenvolve em conseqüência da ausência de algum fator ou fator de alimentos acessórios. Portanto, parece provável que a causa dos raquitistas seja uma ingestão reduzida de um fator anti-rachítico, que é o fator A-solúvel em gordura A ou tem uma distribuição semelhante a ele '." #NT!
 panum.2225.g: "Estamos falando de uma vitamina D?" #NT!
 panum.2226.t: "Sífilis" #NT!
 panum.2226.d: "A sífilis, o flagelo antigo da humanidade, parece ser colocado em breve na cadeia pela ciência - Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] afirma ter inventado uma cura milagrosa usando os métodos médicos mais modernos." #NT!
 panum.2226.f: "Até o início do século XX, a sífilis era tratada principalmente com mercúrio tóxico, que era aplicado a grandes áreas do corpo do paciente, que, entre outros efeitos indesejáveis, geralmente levavam a uma perda completa de pêlos do corpo e todos os dentes e o rápido declínio de todas as funções corporais iniciadas. Mercúrio já havia sido usado vários séculos antes como um agente terapêutico mais ou menos eficaz contra a hanseníase e várias outras doenças de pele. Experimentos com preparações de arsênico, como atxil e arsacetina, bem como a preparação 418 (arsenofenilglicina), que só foi bem -sucedida em experimentos com animais e foram desenvolvidos e testados por Paul Uhlenhuth e Paul Ehrlich em 1907/1908, falhou, principalmente devido aos sérios efeitos. Em 1909, Sahachiro Hata e Paul Ehrlich desenvolveram o composto de arsênico orgânico arsfenamina (Salvarsan), que foi o primeiro a tentar um tratamento quimioterapêutico direcionado da sífilis." #NT!
 panum.2226.g: "Salvavw ... o quê?" #NT!
 panum.2227.t: "Tétano" #NT!
 panum.2227.d: "Após vários testes, o doutor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] anunciou hoje que encontrou uma antitoxina contra o tétano." #NT!
 panum.2227.f: "O tétano era bem conhecido pelas civilizações antigas, que reconheceram a relação entre feridas e espasmos musculares fatais. Em 1884, Arthur Nicolaier isolou a toxina do tétano do tipo estricnina de bactérias anaeróbicas de vida livre. Ele detectou o patógeno do tétano no solo, inoculando o solo do jardim em animais de teste. A etiologia da doença foi elucidada em 1884 por Antonio Carle e Giorgio Rattone, dois patologistas da Universidade de Turim, que demonstraram a transmissibilidade do tétano pela primeira vez. Em 1891, C. tetani foi isolado de uma vítima humana por Kitasato Shibasaburō, que mais tarde mostrou que o organismo poderia produzir doenças quando injetado em animais e que a toxina poderia ser neutralizada por anticorpos específicos. Em 1890, Kitasato e Emil Von Behring finalmente conseguiram obter uma antitoxina de tétano específica, o que poderia permitir a imunidade do tétano em animais. Com essa produção de antitoxina, Behring lançou as bases para a 'terapia sérica' (bem como a descoberta da antitoxina da difteria, também em 1890)." #NT!
 panum.2227.g: "Quem pensaria que o solo do jardim poderia ser tão perigoso?" #NT!
  
