 je_panum_cholera_description_expedition_reason: "O Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] lidera uma expedição médica em [SCOPE.sCountry('target').GetName] para obter um conhecimento valioso sobre #YELLOW Cholera#!. Desde que a doença se estunda no país, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] tem uma chance mensal de obter novas idéias para que o SAVENSINATIVO DE ASSAVER UMA PREGOS SIGNIFICAIS APRENDIDADE ASSAIS PERMINAÇÃO ASSANTO ASSANTO ASSANTO DOS SUSTA A RESIDER SERÁ A RESIDERSO SERÁ ASSANTOS SIGNIFICADOS SERÁ ASSANTOS SIMPENDIMENTOS SIMPENDIMENTOS SIMPENDIMENTOS A PRONTAGENS." #NT!
