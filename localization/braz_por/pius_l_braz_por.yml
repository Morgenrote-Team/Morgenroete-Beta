 pius_adopt_gregorian_calender_decision: "Adotar Calendário Gregoriano"
 pius_adopt_gregorian_calender_decision_desc: "Como o Calendário Gregoriano estava ativo na maior parte da Europa, o uso de outros calendários frequentemente causava problemas. Poderíamos adotar o Calendário Gregoriano para facilitar as interações com os países europeus."
