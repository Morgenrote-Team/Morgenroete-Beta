 pius.111.h_tt: "Alta probabilidade de que haja mais eventos na sequência da aparição mariana."
 pius.111.i_tt: "Chance muito alta de uma colisão sangrenta."
 pius.121.h_tt: "Esta medida pode ter consequências desconhecidas e graves."
 pius.101.t: "A Aparição de La Salette"
 pius.101.d: "Duas crianças nas montanhas do sudeste da França afirmam ter testemunhado uma aparição da Virgem Maria, provocando ondas de entusiasmo espiritual — e preocupação — em todo o mundo católico."
 pius.101.f: "'Cheguem mais perto, meus filhos, não tenham medo. Estou aqui para lhes trazer grandes notícias…'\n\nNo alto dos pastos alpinos acima da vila de La Salette, perto de Corps, no sudeste da França, duas crianças pastoras relatam uma visão que agora agita corações em toda a cristandade. Uma senhora, radiante de luz e envolta em tristeza, apareceu para elas. Ela chorava — lágrimas caindo por um mundo que se afastou de Deus. Ela falou de blasfêmias proferidas sem vergonha, de domingos profanados e de fome e ruína que viriam caso a humanidade não se arrependesse.\nO que a princípio parecia uma lenda rústica tornou-se um movimento. Peregrinos acorrem à remota encosta da montanha. Monges e jornalistas sobem as mesmas trilhas. A Igreja hesita: alguns abraçam a visão como um chamado divino à penitência; outros temem a ascensão do misticismo popular e do fervor irracional.\nO Bispo de Grenoble oferece aprovação cautelosa. As autoridades seculares permanecem desconfiadas.\nE Roma? Roma observa — silenciosa. Mas já, os sinos estão tocando."
 pius.101.g: "Um aviso celestial."
 pius.101.h: "Mantenha-se racional."
 pius.102.t: "A Aparição em Lourdes"
 pius.102.d: "Na pequena cidade de Lourdes, uma menina de quatorze anos afirma ter visto uma senhora radiante em uma gruta. Suas visões logo atraem peregrinos, controvérsia — e a atenção de Roma."
 pius.102.f: "'Ela era jovem, descalça e pobre. No entanto, falava de uma beleza que nenhuma palavra poderia descrever.'\n\nNuma gruta remota perto de Lourdes, no sopé dos Pirenéus, uma camponesa chamada Bernadette Soubirous fala de uma senhora vestida de branco, com uma faixa azul e rosas douradas nos pés. A visão não diz nada a princípio — apenas sorri. Depois ela fala: de penitência, de oração, de sofrimento e de misericórdia divina. Ela se nomeia simplesmente: A Imaculada Conceição.\nA princípio, os aldeões zombam. Mas quando Bernadette descobre uma nascente escondida e afirma que é uma fonte de cura, milhares começam a chegar — esperando, rezando, chorando. Muletas são deixadas para trás. Testemunhos se espalham. Céticos criticam a histeria. Médicos, padres e políticos descem sobre Lourdes.\nA Igreja investiga. O estado observa com cautela. E ainda assim as pessoas vêm."
 pius.102.g: "Um Santuário de Cura e Esperança."
 pius.102.h: "Alucinações!"
 pius.103.t: "A Visão Silenciosa em Knock"
 pius.103.d: "Na aldeia irlandesa de Knock, quinze testemunhas relatam uma aparição silenciosa da Virgem Maria, São José e São João Evangelista. A visão comove um povo há muito sobrecarregado pela pobreza, exílio e domínio estrangeiro."
 pius.103.f: "'Não disseram uma palavra. No entanto, naquele silêncio, uma nação ouviu esperança.'\n\nA chuva caía constantemente sobre a igreja paroquial de Knock, Condado de Mayo. E, no entanto, quinze aldeões permaneceram paralisados. Diante deles, banhada em luz na parede do gablete sul, estava uma assembleia silenciosa: a Virgem Maria em pose de oração; São José ao seu lado; São João Evangelista, vestido com uma túnica e segurando um Evangelho. Atrás deles, um cordeiro sobre um altar e uma cruz.\nNenhuma mensagem foi dita. Nenhum movimento foi feito. E ainda assim, as testemunhas juraram pelo que viram — jovens e velhos, homens e mulheres.\nEm uma terra desgastada pela fome, emigração e anseio espiritual, a visão silenciosa ecoou mais alto do que sermões. Peregrinos logo chegaram, buscando cura, sinais e consolação. As autoridades inglesas zombaram. Alguns na Igreja hesitaram. Mas entre os pobres e devotos da Irlanda, Knock tornou-se um grito sagrado por dignidade."
 pius.103.g: "Uma Luz na Chuva."
 pius.103.h: "Descarte como folclore."
 pius.104.t: "Os Segredos de Fátima"
 pius.104.d: "Em Portugal central, três crianças pastoras relatam repetidas aparições da Virgem Maria, culminando num fenómeno milagroso testemunhado por milhares. As suas visões trazem profecias de guerra, sofrimento e o futuro da Igreja."
 pius.104.f: "\"No final, o meu Imaculado Coração triunfará.\"\n\nPerto da cidade de Fátima, nas colinas rurais de Cova da Iria, três crianças — Lúcia, Francisco e Jacinta — falam de uma senhora mais brilhante que o sol, vestida de fulgor e tristeza. Ao longo de seis meses, ela aparece repetidamente, alertando para a guerra global, a ascensão de ideologias ímpias e a perseguição dos fiéis. Ela pede penitência, oração e a consagração da Rússia ao seu coração.\nEm 13 de outubro de 1917, enquanto dezenas de milhares estão na chuva torrencial, o sol parece se soltar dos céus, girando e caindo no céu. Alguns caem de joelhos. Outros fogem. Quando a luz se desvanece, suas roupas estão secas. A multidão se dispersa em silêncio, maravilhada e com medo.\nA Igreja é cautelosa. A imprensa está dividida. Mas entre o povo — especialmente os pobres, os feridos e os fiéis — uma nova chama se acende: uma de esperança, uma de aviso, uma que vê a Virgem não apenas como mãe, mas como sentinela da era que está por vir."
 pius.104.g: "Atente para os Avisos de Fátima."
 pius.104.h: "Desmistifique o Milagre Solar."
 pius.105.t: "Nossa Senhora de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.105.d: "Numa aldeia remota perto de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName], surgem relatos de uma aparição da Virgem Maria. A história se espalha rapidamente, atraindo peregrinos, céticos e a atenção das autoridades da igreja."
 pius.105.f: "\"Ela estava acima dos campos, numa coroa de luz, e olhou para nós como se conhecesse a tristeza de cada alma.\"\n\nO primeiro a falar foi uma criança — olhos arregalados de admiração, voz trêmula. Ele falou de uma senhora mais brilhante que a aurora, envolta em resplendor e tristeza, que apareceu em silêncio e observou o mundo com uma dor profunda e conhecedora. Outros afirmaram tê-la visto também. Alguns caíram de joelhos. Outros correram. Todos se lembraram da quietude que se seguiu.\nA história se espalhou para além da aldeia. Peregrinos chegaram, velas na mão. Os fiéis rezaram. Os aflitos esperaram. Padres debateram. Oficiais levantaram as sobrancelhas. Mas as pessoas continuaram a vir — atraídas não pela certeza, mas por algo mais antigo: a necessidade de acreditar.\nSeja milagre, visão ou mito, o evento já moldou os corações daqueles que o testemunharam — e as vidas daqueles que agora devem decidir o que ele significa."
 pius.105.g: "Um Sinal para os Fiéis."
 pius.105.h: "Suprimir a Histeria."
 pius.111.t: "A Procissão Não Convidada"
 pius.111.d: "Apesar das ordens oficiais proibindo demonstrações públicas, uma multidão de fiéis iniciou uma procissão espontânea em direção ao local da aparição mariana em [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]."
 pius.111.f: "'Não acendemos tochas, não carregamos estandartes. Apenas rosários, silêncio e nossos pés na poeira.'\n\nEles vieram ao amanhecer, em duplas e trios, caminhando por campos e aldeias, sussurrando orações. Ao meio-dia, eram centenas, fluindo ao longo de estradas rurais, alguns descalços, alguns chorando. Mulheres seguravam flores. Velhos murmuravam ladainhas. Crianças agarravam ícones esculpidos em madeira.\nAs autoridades haviam declarado o local fechado. Soldados montavam guarda. No entanto, ninguém parou a multidão. Talvez fosse o canto. Talvez o silêncio. Talvez algo invisível.\nQuando os fiéis chegaram ao local da visão, ajoelharam-se, murmuraram orações e acenderam velas no solo. Nenhuma voz trovejou do céu. Nenhum milagre foi testemunhado. Mas algo já havia mudado. Um povo havia agido — não em desafio à lei, mas em obediência a algo mais antigo que a lei."
 pius.111.g: "Deixe-os rezar."
 pius.111.h: "Observe silenciosamente."
 pius.111.i: "Dispersá-los à força."
 pius.112.t: "Sangue em Terra Sagrada"
 pius.112.d: "Um confronto entre as autoridades e os fiéis no local da procissão mariana proibida tornou-se violento. O terreno onde as visões outrora inspiraram esperança agora ostenta a mancha de sangue."
 pius.112.f: "Havia orações, e então havia gritos.\n\nAs velas ainda tremeluziam quando os soldados chegaram. Vozes se elevaram em confusão, depois em súplica. Uma mulher caiu. Um menino gritou. Ninguém sabe quem deu a ordem — mas mosquetes dispararam, cassetetes balançaram, botas se moveram através do incenso e do solo. Quando o silêncio retornou, estava mais pesado do que antes.\nA Igreja está abalada. Os fiéis estão indignados. A imprensa fala em tons sussurrados — alguns chamam de acidente, outros de massacre. O local, antes sussurrado como sagrado, agora é amaldiçoado pela memória. E ainda assim as pessoas se reúnem — não com flores, mas com raiva, com silêncio, com um olhar que nenhuma lei pode extinguir."
 pius.112.g: "Lamentamos o ocorrido."
 pius.112.h: "Eles que se puseram nessa situação."
 pius.113.t: "A Voz no Púlpito"
 pius.113.d: "Um padre local ascendeu como o principal defensor da aparição mariana em [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Seus sermões atraem multidões, suas palavras inspiram esperança — e desafiam a autoridade estatal. Seu nome é Padre [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]."
 pius.113.f: "\"Ela apareceu aos humildes, não aos poderosos. E talvez seja por isso que desejam silenciá-la.\"\n\nNa igreja de pedra acima da aldeia, um padre chamado Padre $[SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] começou a pregar — não apenas sobre a misericórdia da Virgem, mas sobre a sua justiça. As suas palavras ecoam para além da nave: \"Se o Céu falou aqui, então nenhum governo pode proibir o seu eco.\"\nPeregrinos acorrem aos seus sermões. O seu nome espalha-se em sussurros e em hinários. Ele exorta à paz, mas a sua presença galvaniza a agitação. Alguns chamam-lhe profeta. Outros, um rebelde de batina.\nAs autoridades ficam inquietas. Os militares falam de incitamento. A hierarquia da Igreja hesita — dividida entre o dogma e a diplomacia. Uma proposta discreta chega à sua secretária: Ele pode ser removido. Silenciosamente. Discretamente.\nMas alguns homens, quando silenciados, falam ainda mais alto."
 pius.113.g: "Deixe-o pregar."
 pius.113.h: "Convoca-o à capital para negociação."
 pius.113.i: "Faça-o desaparecer."
 pius.114.t: "A Procissão Que Abalou a Nação"
 pius.114.d: "Em todo o país, crentes católicos iniciaram manifestações públicas em apoio à aparição mariana. O que começou como uma peregrinação rural se tornou um movimento nacional."
 pius.114.f: "'Caminhavam com rosários nas mãos, os filhos nos ombros e o nome da Virgem nos lábios.'\n\nDe aldeias de pescadores a cidades fabris, os sinais são os mesmos: velas acesas nas janelas, hinos ecoando pelas praças, milhares reunidos em silêncio. Não são exibidas faixas — apenas estátuas, ícones e um único nome murmurado repetidamente: Maria. O que começou como devoção se tornou desafio.\nEm resposta à violência no local sagrado de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] os fiéis foram para as ruas. Eles não gritam. Eles oram. Mas seus números crescem diariamente.\nAlguns no governo pedem tolerância. Outros exigem repressão. Os militares estão inquietos. E em lares por todo o país, até mesmo os que duvidam se perguntam: se tantos acreditam, pode ainda ser uma mentira?"
 pius.114.g: "Permita a procissão nacional."
 pius.114.h: "Proibir a procissão nacional."
 pius.115.t: "Os Campos Jazem Vazios"
 pius.115.d: "Uma severa falha na colheita atingiu várias regiões rurais de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Entre os fiéis, um sussurro perigoso começa a se espalhar: que a Virgem, antes silenciada pelo estado, agora chora — e pune."
 pius.115.f: "'Ela pediu orações. Nós lhe demos soldados.'\n\nAs chuvas falharam. O trigo amareleceu cedo demais. Batatas apodreceram sob a terra, invisíveis e amargas. Os aldeões falam de campos que se sentem... abandonados. Não apenas por homens, mas pela misericórdia.\nE assim eles sussurram. Da mulher na luz que uma vez apareceu — e foi ridicularizada. Do padre que desapareceu. Do santuário lacrado e dos peregrinos espancados. Agora, dizem, ela virou o rosto.\nVelas queimam novamente, mas agora atrás de janelas fechadas. Mães batizam crianças em segredo. Velhos enterram crostas de pão como oferendas. A Igreja não ousa falar, mas o povo já acredita: Esta é a sua tristeza. Ou o seu aviso."
 pius.115.g: "Superstição! Espero..."
 pius.116.t: "O Silêncio Além do Sino"
 pius.116.d: "Após anos de repressão e milagres negados, muitos cidadãos outrora devotos começaram a abandonar sua fé em [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Um número crescente agora se descreve não como católico — mas como nada."
 pius.116.f: "Ela não vem mais. Nem em sonhos, nem em visões. As velas ficam apagadas.\n\nO santuário está fechado. O padre se foi. Os campos estão silenciosos.\nHouve um tempo em que até os mais pobres sussurravam Ave Marias antes de dormir, quando ícones penduravam ao lado das lareiras, e lágrimas caíam ao som dos sinos. Agora, as igrejas estão vazias. As crianças perguntam o que era 'confissão'. Os jovens falam de Razão, de Progresso, de Nada.\nO povo não se voltou para a ideologia. Eles se transformaram em cinzas. Eles não são radicais. Eles estão exaustos. E em algum lugar no silêncio oco, a pergunta persiste:\nEla nos deixou — ou nós a deixamos?"
 pius.116.g: "A Era da Fé passou."
 pius.119.t: "Encerramento do Santuário"
 pius.119.d: "O governo ateu recém-estabelecido ordenou o fechamento do local de peregrinação mariana. O que antes era um lugar de luz e oração agora está isolado, silencioso sob vigilância estatal."
 pius.119.f: "\"Nenhum sino tocou. Nenhuma vela queimou. Os portões foram trancados antes do nascer do sol.\"\n\nO santuário que antes atraía milhares agora permanece sozinho. Um aviso foi pregado na porta da capela: \"Por ordem da Assembleia Popular, esta estrutura é declarada não essencial.\" Guardas ficam de vigia, não para proteger, mas para impedir.\nNenhuma força foi usada. Nenhum protesto permitido. A mudança veio silenciosamente, burocraticamente — uma ausência em vez de uma explosão. No entanto, em lares por todo o país, mãos mais velhas tremem. Avós escondem seus rosários. Crianças perguntam por que os peregrinos não cantam mais.\nO clero está em silêncio. O Partido fala de ciência, razão e progresso. E em algum lugar atrás de portas trancadas, uma pergunta cintila como uma vela meio gasta: Isso foi realmente necessário?"
 pius.119.g: "Já não construímos monumentos a ilusões."
 pius.121.t: "O que ela quer dizer?"
 pius.121.d: "A aparição Mariana em [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] foi oficialmente reconhecida como um sinal positivo. Mas, mesmo agora, seu verdadeiro significado permanece aberto à interpretação."
 pius.121.f: "Nas semanas desde que a figura radiante apareceu aos aldeões, não surgiram mais sinais. Nenhum fogo do céu. Nenhuma voz nas nuvens. Apenas céus calmos e o eco persistente da maravilha.\nNo entanto, as pessoas falam — de paz, de cura, de algo que mudou na alma da nação. Peregrinos vêm não em frenesi, mas em reverência. O clero prega suavemente. A imprensa, por uma vez, noticia sem zombaria: O que significa este milagre?"
 pius.121.g: "Uma benção para o povo comum."
 pius.121.h: "Um sinal divino para nosso clero."
 pius.121.i: "Uma indicação da legitimidade do nosso governo."
 pius.122.t: "O Santuário de [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.122.d: "O local da aparição mariana agora possui um lugar de peregrinação totalmente reconhecido, atraindo os fiéis de perto e de longe em números crescentes."
 pius.122.f: "Onde antes havia apenas pasto, agora estão velas, rosas e os passos silenciosos de milhares.\n\nAs estradas se alargaram. Os campos foram limpos. Uma modesta capela se ergue perto do local onde as crianças outrora falavam de uma Senhora vestida de luz. A cada dia, peregrinos chegam: agricultores com seus filhos, viúvas de preto, soldados de licença, mães sussurrando orações por seus nascituros.\nA Igreja reconheceu a sacralidade do local. Um santuário está sendo construído. Mercados florescem em suas bordas, oferecendo pão, medalhas, rosários, vinho. O que antes era uma história duvidada nas salas de estar agora é uma presença sentida nos ossos da nação.\nE enquanto os sinos tocam no vale, nos perguntamos: É esta fé renascida — ou uma semente de algo ainda maior por vir?"
 pius.122.g: "Totus tuus."