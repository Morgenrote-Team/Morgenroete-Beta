 concept_lepsius_archaeology: "Arqueologia"
 concept_lepsius_archaeology_desc: "#b Archaeology#! is one of the main features of [concept_morgenroete].\n\nThere are 8 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] on the map.\n\n To be able to send an [concept_lepsius_expedition], you need to research the Antiquarianism Technology, have an [concept_lepsius_archaeological_team] and have acces to one of the Excavation Sites. You can either get access by owning the Site yourself or by asking a country with a Site for a [concept_lepsius_excavation_licence].\n\nYou can now send an Archaeological expedition to one of the Excavation Sites. Your Team will discover [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] and in very rare cases and the help of a good [concept_lepsius_archaeologist], you might even find a [concept_lepsius_major_artifact].\n\nOnce your Team returns with the Artifacts, you might be able to build a [concept_lepsius_museum]. In a Archaeological Museum you will be able to see your Artifacts, create [concept_lepsius_exhibition] and visit your #b #BLUE Archaeologist#!#!.\n\nThe more Artifacts and Exhibitions you have, the more Prestige you will get.\n\n#b Anthropology#! is another part of Archaeology. If you have an [concept_andersson_anthropologist] and a [concept_andersson_cave], you can find [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and reconstruct prehistoric human species. Each skeleton will give you more anthropological prestige. With enough anthropological prestige, you will get a prestige modifier for your country."
 concept_lepsius_archaeologist: "#b #BLUE Arqueologista #!#!"
 concept_lepsius_archaeologists: "#b #BLUE Arqueologistas #!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE Arqueólogos #!#! são acadêmicos que você pode enviar para [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Eles vão reunir [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] lá. Às vezes, eles podem até encontrar um [concept_lepsius_major_artifact]. \ Narchaeologists ganham [concept_academics_experience] durante seu trabalho e passivamente a cada ano. Eles podem obter melhores níveis do traço do arqueólogo ganhando o suficiente #b Experience#!."
 concept_lepsius_museum: "Museu Arqueológico"
 concept_lepsius_museum_desc: "O Museu Arqueológico de #b é um edifício que você pode construir que exibe todo o [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que sua nação encontrou."
 concept_lepsius_excavation_site: "Local de escavação histórica"
 concept_lepsius_excavation_sites: "Sites de escavação histórica"
 concept_lepsius_excavation_site_desc: "There are multiple #b Historical Excavation Sites#! in different countries including: Upper and Lower Egypt, Babylonia, Assyria, Crete, Argolis, Yucatán and Peru. Each #b Historical Site#! offers different [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] and Events. Besides these large, historically significant excavation sites, there are also [Concept('concept_lepsius_minor_excavation_site', '$concept_lepsius_minor_excavation_sites$')]."
 concept_lepsius_expedition: "Expedição arqueológica"
 concept_lepsius_expeditions: "Expedições arqueológicas"
 concept_lepsius_expedition_desc: "Uma expedição arqueológica #b é uma expedição de um [concept_lepsius_archaeologist] e seu [concept_lepsius_archaeological_team]. Levará vários meses em que eles tentarão reunir o maior número possível de [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. #b Expedições #! são a única maneira de obter a posse de [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]. \ N. Se você pesquisou arqueologia precoce, você pode deixar sua equipe no site para criar um [concept_lepsius_excavation] após uma expedição #b bem -sucedida."
 concept_lepsius_archaeological_team: "Equipe arqueológica"
 concept_lepsius_archaeological_teams: "Equipes arqueológicas"
 concept_lepsius_excavation_team: "Equipe de escavação"
 concept_lepsius_archaeological_team_desc: "Você precisa de um ou mais #b time arqueológico para poder conduzir [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Você pode ganhar até 3 #b equipes arqueológicas #!, mas cada um tem requisitos mais altos. 66%. \ N \ nyou pode obter outra equipe #b, tendo pesquisado a tecnologia de antiquarianismo e ter um [concept_lepsius_archaeologist] experiente."
 concept_lepsius_excavation_licence: "Licença de escavação"
 concept_lepsius_excavation_licences: "Licenças de escavação"
 concept_lepsius_excavation_licence_desc: "If you do not own some of the [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] yourself, you can still get access to them by using the #b Excavation Licence#! Diplomatic Action.\nTo be able to get a #b Excavation Licence#! you need to be at least a Major Power and have a high enough [concept_interest_tier] in the Region.\nYou will have to pay the other country a small amount of money to keep the #b Excavation Licence#!."
 concept_lepsius_artifact: "Artefato"
 concept_lepsius_artifacts: "Artefatos"
 concept_lepsius_minor_artifact: "Artefato menor"
 concept_lepsius_minor_artifacts: "Artefatos menores"
 concept_lepsius_oceanic_artifact: "Artefato oceânico"
 concept_lepsius_oceanic_artifacts: "Artefatos oceânicos"
 concept_lepsius_artifact_desc: "Você pode obter artefatos enviando [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')] em [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')], [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')], em [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] ou em eventos. \ N \ nUNUalmente você receberá #b de menores e que você pode usar o outro. Tenha um nome único. Geralmente, você pode encontrá -los em expedições, escavações e como descobertas arqueológicas."
 concept_lepsius_major_artifact: "Artefato principal"
 concept_lepsius_major_artifacts: "Grandes artefatos"
 concept_lepsius_major_artifact_desc: "#b ARTIFACTS PRINCIPAL SÃO [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ESPECIAIS que têm um nome e uma identidade. Alguns deles você encontrará durante o [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Para outros, você precisa manter um [concept_lepsius_excavation] contínuo até encontrar. E alguns serão descobertos em uma grande descoberta. \ \ \ Optaking um #b Principal artefact#! de um país ilegalmente pode causar um incidente diplomático que pode prejudicar mais do que possuir um #b principal artefact#!. Por outro lado, #b Principais artefatos #! permitem criar um #!3 que lhe dará um enorme bônus de prestígio e é necessário para alguns #!4."
 concept_lepsius_exhibition: "Exposição"
 concept_lepsius_exhibitions: "Exposições"
 concept_lepsius_excellent_exhibition: "Excelente exposição"
 concept_lepsius_excavation: "Escavação"
 concept_lepsius_excavations: "Escavações"
 concept_lepsius_excavation_desc: "Se você pesquisou arqueologia precoce e terminou um [concept_lepsius_expedition], pode decidir deixar seu [concept_lepsius_archaeological_team] no site para desenterrar passivamente [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. Você sempre pode ligar para sua equipe de volta da escavação #b"
 concept_verrier_astronomy: "Astronomia"
 concept_verrier_observatory: "Observatório"
 concept_verrier_observatories: "Observatórios"
 concept_verrier_astronomer: "#b #ORANGE Astrônomo #!#!"
 concept_verrier_astronomers: "#b #ORANGE Astrônomo #!#!"
 concept_verrier_astronomical_object: "Objeto astronômico"
 concept_verrier_astronomical_objects: "Objetos astronômicos"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "Corpo celeste"
 concept_verrier_celestial_bodies: "Corpos celestes"
 concept_verrier_comet: "Grande Cometa"
 concept_verrier_comets: "Ótimos cometas"
 concept_verrier_comet_desc: "A idade vitoriana tinha alguns #b cometas §1 que receberam atenção pública generalizada. Se você tiver um [concept_verrier_astronomer], há uma chance de descobrir um desses #b grandes cometas #! primeiro, resultando em um bônus de prestígio e pesquisa."
 concept_verrier_moon_photo: "Foto da lua"
 concept_verrier_moon_photos: "Fotos da lua"
 concept_rapanui_christian_mission: "Missão Cristã"
 concept_rapanui_christian_missions: "Missões cristãs"
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] ou [Concept('concept_great_power','$concept_great_powers$')] com [Concept('concept_interest','$concept_interests$')] na Oceania pode tentar converter uma nação insular descentralizada na região - mas isso só é possível se o seu país não for muito secular e o grupo de interesse \"devoto\" não é muito fraco. Se você enviar um missionário, ele será recebido gentilmente, ignorado - ou morto imediatamente. Se sua missão der errado, você terá que esperar alguns anos para encontrar um novo missionário para espalhar a Palavra de Deus. Posteriormente, seu missionário converterá 1% da população por ano. Pode haver eventos que ajudem ou prejudiquem a conversão. \ N \ n O segundo estágio começa quando você atinge 30% de nativos convertidos. Agora sua estação missionária se tornará permanente. Se 51 % dos nativos privarem o cristianismo, o chefe se converterá à sua religião e se colocará sob sua proteção como um [concept_protectorate]. Anos depois, essas áreas podem até ser anexadas se você tiver a tecnologia para impedir a malária. \ N \ nin na terceira etapa Você pode tomar ativamente decisões através da entrada do diário. Ou você fortalece a missão diretamente enviando missionários adicionais ou tenta negociar. Você pode adquirir raros [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] ou pérolas que aumentam o padrão de vida dos ricos."
 concept_manzoni_literary_tradition: "Tradição literária"
 concept_klimt_painters: "#PURPLE #b Pintores#!#!"
 concept_klimt_painting_tradition: "Tradição de pintura"
 concept_vikelas_sports: "Esportes"
 concept_vikelas_sports_desc: "#b Sports#! são uma das principais características de [concept_morgenroete]. \ N \ nonce Um país descobre #b Organized Sports#!, ele obtém acesso a diferentes atividades esportivas. O mais importante é a base do [concept_vikelas_ioc] que começará a organizar o [concept_vikelas_olympic_games]. Os Jogos Olímpicos darão a você a chance de ganhar medalhas de ouro que fornecerão ao seu país [concept_prestige]."
 concept_vikelas_olympic_games: "Jogos Olímpicos"
 concept_vikelas_olympic_games_desc: "Once the [concept_vikelas_ioc] is founded, the #b Olympic Games#! can take place every 4 years. Each time the Committee will vote for a #b Host#!. The host country will get a big [concept_prestige] boost.\n During the Olympic Games your Athletes will compete for medals. Many factors influence how many Medals you will get. Your population has a small influence, the [concept_sol] has a bigger influence, some events influence your chances as well and so do great [Concept('concept_general', '$concept_generals$')] and great [Concept('concept_admiral', '$concept_admirals$')]. Additionally characters with the #b Athlete#! trait and Urban Centers with the #b Sports Facilities#! also give small boosts.\nAll those factors have an influence on how many medals out of the 12 Gold Medals your country will get. Each Gold Medal will grant you 5 [concept_prestige]."
 concept_vikelas_ioc: "International Olympic Committee"
 concept_vikelas_ioc_desc: "A Nation that has researched #V $vikelas_international_sports_tech$#! can found the #b International Olympic Committee#! or #b IOC#! in short. The IOC will then start organizing the [concept_vikelas_olympic_games]. Each member of the IOC can participate in the Olympic Games.\n The most important members of the IOC are the #b Board Members#!. The Founder of the IOC will become the #b President#! and therefore stay a board member forever while the other members will be elected every 4 years. The Board has space for 5 Great Powers, 2 European, 2 Asian, 2 American, 1 African and 1 Oceanic nation.\nThe main task of the Board Members is choosing the next Host of the Games. There will be 3 candidates (or 4 if a country decides to bribe the Board) to choose from.\nIf Greece founds the IOC, the Olympic Games will only be held in Greece resulting in the Board being less important, as they do not choose the Host."
 concept_lepsius_exhibition_desc: "Seu [concept_lepsius_museum] configurará automaticamente as exposições (na forma de um [concept_production_method] para cada região) se você tiver [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] suficiente do mesmo tipo. Para artefatos normais, a primeira exposição será criada para 10 ou mais artefatos. A partir daí, são possíveis exposições melhores com 25 (exposição média), 50 (grande exposição) e 100 artefatos menores (excelente exposição). A excelente exposição precisa adicionalmente de um [concept_lepsius_major_artifact]. \ N \ nlocal artefatos têm um conjunto menos diversificado de exposições, pois são limitadas a uma exposição regular e uma grande. A exposição regular requer 25 artefatos locais e a grande exposição exige 50."
 concept_vikelas_racer: "Piloto de carro"
 concept_vikelas_racers: "Corredores de carros"
 concept_vikelas_racer_desc: "A #b Car Racer#! is a special [concept_character] who takes part in [concept_vikelas_car_racing]. Apart from the [concept_vikelas_race_car], the driver is the most important factor in winning a car race. Their personal qualities are crucial."
 concept_vikelas_car_racing: "Corrida de Carros"
 concept_vikelas_car_racing_desc: "As corridas de carros são um esporte no qual [Concept('concept_vikelas_racer','$concept_vikelas_racers$')] competem entre si em uma pista ou em estradas regulares."
 concept_lepsius_archaeological_exhibition: "Exposição arqueológica"
 concept_elgar_opera_desc: "The #b Opera#! is the musical center of a nation. It is where the most important musicians gather and play for the masses.\nThe #b Opera#! is a separate building that can be constructed in states if the Urban Center is at least level 5. The #b Opera#! will produce Music and consume Instruments. The higher the level of the #b Opera#! is, the more [concept_elgar_musical_tradition] will be produced every year.\nAdditionally with an #b Opera#! you gain access to some decisions like visiting your Opera."
 concept_elgar_impressionism_desc: "#b Impressionism#! é um estilo na história da arte que é caracterizado pela representação atmosférica de instantâneos fugazes de uma cena. Emergiu de um movimento dentro da pintura na França na segunda metade do século XIX. O termo impressionismo também foi aplicado a certos estilos de música, literatura, cinema e fotografia. Enquanto muitos naturalistas como Heinrich Hart rejeitaram a música como um meio de expressar um 'acionismo em busca de verdade', os impressionistas costumavam considerar o 'sonho sem objetos à frente' para graduar os acordes coloridos finos, como um prazer, o que é um land § § #b § §1, é apenas um jornal de entrada de um diário que 1 \ nin requer 1 #b impressionismo §1 é apenas desbloqueado com diário que é um diário que \ \ nin requer 1 #b § §111, é um jornal que é um diário que se requer a entrada de 1 \ nin, #b § §1. e uma intelligentsia com uma aprovação de 5 acima. Se você escolher #b Impressionism#!, não poderá desbloquear os outros dois ramos. Portanto, dará a você o maior bônus para [concept_elgar_musical_tradition]."
 concept_elgar_expressionism_desc: "#b Expressionism#! é um estilo no art. Seu início e precursores podem ser encontrados no final do século 19. Como impressionismo, simbolismo e fauvismo, o expressionismo é um movimento contra as tendências do naturalismo. No expressionismo, o nível expressivo supera o nível estético, apelativo e factual. O artista quer representar sua experiência para o espectador. Em contraste com o impressionismo musical, que mostra a percepção da aparência externa das coisas, os movimentos da arte expressionista formulam as emoções da alma humana. ou acima. Se você escolher #b Expressionism#!, não poderá desbloquear os outros dois ramos."
 concept_elgar_art_nouveau_desc: "#b Art nouveau#! é um estilo de arte que se desenvolveu a partir do movimento §2 Arts ARTS e CRATTS #! e foi inspirado por formas naturais. Frequentemente, focado no dinamismo e movimento e usava materiais modernos. \ N \ nin o jogo, #b art nouveau#! é desbloqueável apenas com uma entrada de diário que requer 1000 [concept_elgar_musical_tradition], um [concept_elgar_opera], industriais poderosos e uma intelligentsia com uma aprovação de 5 ou mais. Se você escolher #b art nouveau#!, não poderá desbloquear os outros dois ramos. Você receberá vários eventos e entradas de diário sobre ações arquitetônicas e poderá obter um #!4."
 concept_elgar_composer: "#PURPLE #b Compositor#!#!"
 concept_elgar_composers: "#PURPLE #b Compositores#!#!"
 concept_elgar_composer_desc: "#b Compositores #! são homens e mulheres que compõem música. Os compositores são tipos especiais de caracteres que você pode ganhar com os eventos, ganhando [concept_artistic_progress] suficientes para criar um em sua nação ou oferecendo uma posição para um [concept_elgar_travelling_composer]. \ Nonce Você tem um #b compositor _1 Você pode deixar que eles iniciem [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], para ir §8 ou compposição [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]. Cada ação é diferente no que o compositor faz, o que eles exigem e o que você ganha com eles. O #b Composer#! estará #!2 Após todas as tarefas e precisará descansar por um tempo até que ele possa trabalhar novamente. Quanto maior a reputação #b #!, maiores os benefícios de um #b compositor's#! ações serão. #b compositores #! atingindo uma reputação #b #! de 500 se tornará [concept_artistic_progress]4, titãs da música, conhecida em todo o mundo."
 concept_elgar_great_composer: "#PURPLE #b Grande compositor"
 concept_elgar_great_composers: "#PURPLE #b Grandes compositores #!#!"
 concept_elgar_great_composer_desc: "#b Grandes compositores #! são os titãs da música. Aqueles cujos nomes serão conhecidos por toda a eternidade. [Concept('concept_elgar_composer','$concept_elgar_composers$')] atingindo 500 [concept_artists_experience], se tornará #b Great Composers#!. Isso aumentará bastante sua eficiência e permitirá que sua nação ganhe muito mais [concept_elgar_musical_tradition]. Um #b Great Composer#! pode criar um [concept_elgar_musical_masterwork] caminho mais rápido, por exemplo."
 concept_elgar_travelling_composer: "Compositor Viajante"
 concept_elgar_travelling_composers: "Compositor viajante"
 concept_elgar_travelling_composer_desc: "#b Compositores de viagem §1 são [Concept('concept_elgar_composer','$concept_elgar_composers$')] que não são contratados por nenhuma nação. Em vez disso, eles viajam em passeios de concerto. Você pode adquirir um #b compositor viajante, mas quanto mais [concept_artists_experience] eles têm mais demandas que terão. \ N #b compositores #! Com uma reputação #b mais alta, exigirá casas de ópera maiores, música moderna #!3, um certo #!4 e alguns podem se juntar apenas a #!5 ou #!6."
 concept_elgar_national_composer: "Compositor nacional"
 concept_elgar_national_composers: "Compositor nacional"
 concept_elgar_national_composer_desc: "#b National Composers#! are [Concept('concept_elgar_composer','$concept_elgar_composers$')] who value their nation very much. They will not be able to be hired by other nations.\nWhether a #b National Composer#! is available to you or not is decided by their culture's [Concept('concept_discrimination_trait', '$concept_cultural_traits$')]. One of your primary cultures needs to share both a non-heritage #b Trait#! as well as a [concept_language_trait]. This means that a North German #b National Composer#! will be available to German Countries as well as Switzerland."
 concept_elgar_composing: "Composição"
 concept_elgar_composing_lower_case: "composição"
 concept_elgar_composing_compose: "compor"
 concept_elgar_composing_desc: "A [concept_elgar_composer] que #b compõe#! recebe 5 [concept_artists_experience] por ano e adiciona 5 [concept_elgar_musical_tradition] ao país. Além disso, ele cria um número aleatório de composições a cada ano. A #b Composer#! Com habilidades especiais, como condutor, virtuoso, inovador ou meticuloso, cria uma composição adicional por ano. O número de composições é decisivo para o sucesso em [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')] posterior. A #b Composer#! compõe até que a ação seja cancelada na entrada do diário. Um #b composer#! que compõe custos ao país uma pequena taxa de manutenção anual."
 concept_elgar_conducting: "Conduzindo"
 concept_elgar_conducting_lower_case: "conduzindo"
 concept_elgar_conducting_conduct: "conduta"
 concept_elgar_conducting_desc: "O [concept_elgar_composer] se concentrará no #b conduzindo #! por 24 meses e organizará uma temporada de concertos. Isso melhorará a saída musical de um [concept_elgar_opera] aleatório ou 5 a 10 anos, dará um pequeno impulso à sua nação para [concept_elgar_musical_tradition] e dará ao seu #b compositor _2 um impulso médio ao seu [concept_artists_experience]. Se o seu #b composer#! ainda não for um condutor, ele poderá ganhar o #b0 no final da temporada. Você terá que pagar o #b composer#! enquanto ele estiver #b Conduzindo#!."
 concept_elgar_musical_tour: "Tour do concerto"
 concept_elgar_musical_tours: "Passeios de concerto"
 concept_elgar_musical_tour_tour: "Percorrer"
 concept_elgar_musical_tour_tours: "Passeios"
 concept_elgar_musical_tour_desc: "O [concept_elgar_composer] pode ir a um tour#! de concerto #b no exterior por 30 meses. #b Tours#! Aumente o [concept_prestige] da nação #b compositora. Além disso, o #b composer#! ganha um impulso de #b0 no final do #b Tour#! que depende do número de composições do #b compositor § _2, bem como seus traços. A característica reservada #! não pode ir em #b Tours#!."
 concept_elgar_musical_masterwork: "Obra -prima musical"
 concept_elgar_musical_masterworks: "Obras -primas musicais"
 concept_elgar_musical_masterwork_masterwork: "Obra-Prima"
 concept_elgar_musical_masterwork_masterworks: "Obras-Primas"
 concept_elgar_musical_masterwork_of_music: "Obra -prima da música"
 concept_elgar_musical_masterworks_of_music: "Obras -primas da música"
 concept_elgar_musical_masterwork_desc: "O [concept_elgar_composer] pode começar a compor um #b -prém -obra #! que levará vários anos. Quanto mais [concept_artists_experience] a #b composer#!, mais rápido ele terminará. Uma vez que o #b prém -obra §2 for composto, o #b composer#! ganhará 50 [concept_artists_experience] e o país ganhará até 150 #b1, dependendo de seu #b2. \ Na #b compositor §"
 concept_elgar_composer_exhaustion: "Exaustão do compositor"
 concept_elgar_composer_exhaustion_exhausted: "esgotado"
 concept_elgar_composer_exhaustion_desc: "Depois que um [concept_elgar_composer] terminou [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], compondo [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] ou um [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], ele estará #b exausta #! do trabalho. Um #b compositor esgotado não poderá trabalhar por algum tempo. Quanto mais antigo o #b Composer#!, mais tempo se livra da exaustão #b."
 concept_manzoni_writer: "#PURPLE #b Escritor#!#!"
 concept_manzoni_writers: "#PURPLE #b escritores #!#!"
 concept_klimt_painter: "#PURPLE #b pintor#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE Conservatório#!#!"
 concept_pm_artists_academy_conservatory_desc: "Um conservatório será especializado na Academia de Artes de Música. Se você tiver um conservatório, poderá promover [Concept('concept_elgar_composer','$concept_elgar_composers$')]. Você receberá um modificador de taxa de transferência negativo §1 para a Academia de Arte, bem como um efeito negativo #n no seu [concept_artistic_progress] ao alterar esse método de produção."
 concept_pm_artists_academy_salon: "#b #PURPLE Salon§#!#! literário"
 concept_pm_artists_academy_salon_desc: "Um salão literário especializará a Academia de Artes para a Literatura. Se você tiver um salão de literatura, poderá promover [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. Você receberá um modificador de taxa de transferência negativo §1 para a Academia de Arte, bem como um efeito negativo #n no seu [concept_artistic_progress] ao alterar esse método de produção."
 concept_pm_artists_academy_studio: "#b #PURPLE Studio de arte"
 concept_pm_artists_academy_studio_desc: "Um estúdio de arte será especializado na Academia de Artes para a Pintura. Se você tem um estúdio de arte, poderá promover [Concept('concept_klimt_painter','$concept_klimt_painters$')]. Você receberá um modificador de taxa de transferência negativo §1 para a Academia de Arte, bem como um efeito negativo #n no seu [concept_artistic_progress] ao alterar esse método de produção."
 concept_pm_artists_academy_specialization: "Foco da Academia de Artes"
 concept_pm_artists_academy_specialization_desc: "Toda academia de artes pode ser especializada alterando seu método de produção. \ Nan Arts Academy com um [concept_pm_artists_academy_conservatory] permitirá que você promova [Concept('concept_elgar_composer','$concept_elgar_composers$')]. \ Nan Arts Academy com um [concept_pm_artists_academy_salon] permitirá que você promova [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. [concept_artistic_progress]."
 concept_artists_artist: "Artista"
 concept_artists_artists: "Artistas"
 concept_artistic_progress: "Progresso artístico"
 concept_artistic_progress_desc: "By acquiring 1000 #b Artistic Progress#! you can gain a new [concept_artists_artist]. To even have access to #b Artistic Progress#!, you must either have an #b Arts Academy#! or an #b Opera#!.\nYour #b Artistic Progress#! gain is influenced by various factors. The more [concept_literacy] you have, the faster you gain #b Artistic Progress#! for example. You can gain detailed information on all the factors influencing Artistic Progress from the Toolbar of the Artistic Progress Bar in the Arts Window."
 concept_artists_experience: "Reputação"
 concept_artists_experience_desc: "Every [concept_artists_artist] has a #b Reputation#!. The Reputation represents how well regarded the artist is. Artists start with a small amount of Reputation and can gain additional Reputation by working in their field. Artists that gained a Reputation of 500, will become a #b Great Artists#! and get the corresponding [concept_character_trait]."
 concept_manzoni_great_writer: "Grande escritor"
 concept_manzoni_local_writer: "Escritor Local"
 concept_artists_center_of_arts: "Centro de Artes"
 concept_artists_centers_of_arts: "Centros de Artes"
 concept_artists_center_of_classicism: "Centro de Classicismo"
 concept_artists_center_of_romanticism: "Centro do Romantismo"
 concept_artists_center_of_realism: "Centro do Realismo"
 concept_artists_center_of_impressionism: "Centro do Impressionismo"
 concept_artists_center_of_expressionism: "Centro do Expressionismo"
 concept_artists_center_of_art_nouveau: "Centro de Art Nouveau"
 concept_klimt_great_painter: "#PURPLE #b Grande pintor#!#!"
 concept_klimt_great_painters: "#PURPLE #b grandes pintores #!#!"
 concept_klimt_great_painter_desc: "#b Grandes pintores#! são [Concept('concept_klimt_painter','$concept_klimt_painters$')] que serão conhecidos pela eternidade. #b pintores#! atingindo 500 [concept_artists_experience], se tornará #b grandes pintores#!. Isso aumentará bastante sua eficiência e permitirá que sua nação ganhe muito mais [concept_klimt_painting_tradition]."
 concept_klimt_independent_painter: "Pintor independente"
 concept_klimt_independent_painters: "Pintores Independentes"
 concept_klimt_painter_trip: "Jornada educacional do pintor"
 concept_klimt_painter_trip_journeys: "Viagens"
 concept_elgar_music_desc: "#b Music Culture#! é um dos principais recursos de [concept_morgenroete]. Durante os séculos 19 e XX, a música era importante como um meio para entreter a população e mostrar uma grandeza nas nações. \ N \ n O #b Opera#! produzirá música, mas precisa de instrumentos para operar. Além de produzir #b Música #! Para sua população consumir, #b OPPRESSA_1 adicionará lentamente #!2 ao seu país. A quantidade de tradição musical #b §1 fornece um bônus de prestígio e permite que você escolha um caminho para a arte de sua nação avançar. Você pode seguir a rota de #!7, #!8 ou #!9. Cada um desses estilos de arte tem outro foco. Um compositor poderá [concept_morgenroete]3, [concept_morgenroete]4, ir com [concept_morgenroete]5 e até criar [concept_morgenroete]6. Essas ações melhorarão o #b compositor's#! [concept_morgenroete]9 ou melhorarão suas nações #b Tradição musical #!."
 concept_artists_center_of_arts_desc: "Um #b Center of Arts#! é um centro de um [concept_artists_art_style] que é criado em um [concept_state_region] assim que um estilo de arte #b é inventado. Existe apenas um #b Center of Arts#! por #b Arte Style#!. \ N#b O Centro de Artes §1 são especialmente importantes para #!1 que podem levar #!2 para estudar o estilo de arte #b. Além disso, alguns #b Center of Arts#! oferecem eventos exclusivos que acontecerão lá. Alguns, por exemplo, permitem que você ganhe #!7."
 concept_klimt_painting_culture: "Cultura de pintura"
 concept_klimt_painting_culture_desc: "#b Painting Culture#! is one of the main features of [concept_morgenroete]. During the 19th and 20th Century, Painting developed rapidly resulting in various new [Concept('concept_artists_art_style','$concept_artists_art_styles$')] that brought a lot of progress to individuals and countries.\n\nTo access most of the Painting content in #r Morgenröte#! you will need to build an #b Arts Academy#!. #b Arts Academies#! allow you to start gaining [concept_klimt_painting_tradition] and to recruit new [Concept('concept_klimt_painter','$concept_klimt_painters$')]\n\n#b Painters#! will create paintings and #b Masterworks#! for your country and give you a big amount of #b Painting Tradition#!. As there are different [Concept('concept_artists_art_style','$concept_artists_art_styles$')] for #b Painters#! to focus on, you can let them study additional #b Art Styles#! on a [concept_klimt_painter_trip]. Once they turn 40 years old, #b Painters#! will specialize in one of their #b Art Styles#! and focus on creating paintings in that #b Art Style#!."
 concept_artists_art_style: "Estilo de arte"
 concept_artists_art_styles: "Estilos de arte"
 concept_artists_art_style_style: "Estilo"
 concept_artists_art_style_desc: "Um estilo de arte #b é um foco específico da arte. Alguns estilos de arte #b estão lá desde o início, como #b Classicismo #! e #b Romantismo #!. Os outros, #b realism#!, #b irracionalismo #!, #!2, #!3 e #!4, aparecem apenas mais tarde após as condições forem atendidas. Todo #b Art Style#! possui um #!7 correspondente no #!8 onde começou."
 concept_klimt_painter_desc: "#PURPLE #b Painters#!#! são homens e mulheres que criam pinturas e outras obras de arte. #b Painters#! são tipos especiais de caracteres que você pode ganhar com os eventos, ganhando [concept_artistic_progress] suficientes para criar um em sua nação ou oferecendo uma posição para um [concept_klimt_independent_painter]. \ N#b Painters#! imediatamente começará a pintar e criar uma série de pinturas a cada ano, dependendo de seus [Concept('concept_character_trait','$concept_character_traits$')]. Às vezes, eles podem até criar uma obra -prima de #b que lhe dará ainda mais #b2. \ N#b Painters#! pode estudar diferentes #b5 em #b6. Cada #b pintor#! se especializará em um estilo de arte #b, uma vez que tiverem 40 anos, o que lhes permitirá pintá -los #b mestres trabalhos -prados de um determinado estilo."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] that are not hired by a country are #b Independent Painters#!. #b Independent Painters#! can be hired by countries that have a [Concept('concept_primary_cultures','$concept_primary_culture$')] that shares a [concept_discrimination_trait] with the culture of the #b Painter#!.\n#b Independent Painters#! have various requirements for their host country. You will need #b Arts Academies#!, certain [Concept('concept_technology', '$concept_technologies$')] or [concept_klimt_painting_tradition] depending on the #b Painter's#! [concept_artists_experience]. Additionally you will have to pay them a sum of money that depends on their #b Renown#! as well as your country's financial capabilities."
 concept_klimt_painter_trip_desc: "Um [concept_klimt_painter] pode aprender novo [Concept('concept_artists_art_style','$concept_artists_art_styles$')] em uma viagem educacional #b para um dos [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]. \ Non tal #b trip#! Um pintor pode obter [Concept('concept_character_trait','$concept_character_traits$')] positivo e negativo que influenciará seu trabalho e o número de pinturas que eles criam. Cada #b Center of Arts#! tem eventos ligeiramente diferentes e dará ao #b pintor#! um #b único #b, 3 no final, que mais tarde pode se tornar a especialização #b pintor's#!."
 concept_klimt_art_prize: "Prêmio de arte"
 concept_klimt_art_prizes: "Prêmios de arte"
 concept_klimt_art_prize_desc: "De tempos em tempos, são realizadas competições artísticas nas quais os prêmios são concedidos - o que promove a reputação de um artista. Nações que têm um [concept_artists_center_of_arts] para irracionalismo ou [concept_elgar_impressionism] Escolha os melhores músicos em uma competição que ocorre a cada cinco anos. Os proprietários de um [concept_klimt_art_gallery] ou um #b Center of Art of Realism#! passam a sediar uma competição de pintura que ocorre a cada cinco anos. O país do qual os vencedores vêm também recebe tradição de música ou pintura. Uma forma especial de competição de arte é a Bienal, que a cada dois anos concede um prêmio de arte abrangente ao país que tem os artistas com a maior reputação, o que aumenta todos os valores da tradição cultural."
 concept_klimt_art_gallery: "Galeria de arte"
 concept_klimt_art_gallery_desc: "A Galeria de Arte #b é um edifício especial na capital de uma nação que está disponível a partir do #b realism#!. Só pode ser construído se a nação tiver um [concept_klimt_painter] com especialização. #b Painters#! Com uma especialização desbloquear a coleção de seu [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] - isto é, um artista com uma especialização no estilo romântico desbloqueia uma coleção de romantismo. Para atualizar uma coleção para uma excelente coleção, é necessária uma obra -prima desse tipo, que deve ser pintada por um pintor ou adquirida no exterior."
 concept_manzoni_writer_novelist: "Romancista"
 concept_manzoni_writer_desc: "A #b Writer#! é um personagem especial que escreverá obras de literatura para o seu país. #b escritores #! geralmente começam como [concept_manzoni_local_writer] e escrevem #b publicações #! e às vezes até [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. A #b BestSeller#! concederá o #b Writer#! Uma grande quantidade de #!2 e #!3 ao seu país. Há uma chance de escrever um #b bestSeller#! todos os anos, dependendo de quão perto do #b Writer's#! #!8 está do #!9. \ N \ na bem conhecido #b writer#! cujo #b2 é feliz o suficiente, pode se tornar seu #b3. Um escritor nacional #b pode ganhar #b6 ou criar um romance de jornal. Se um #b Writer#! ganha 500 #b Reputação #! Eles podem se tornar um #!1 e fornecer ao seu país ainda mais #b Tradição literária §1. \ N \ n NBE Cuidado, se #b escritores #! estão infelizes com a situação política em um país, eles podem decidir #!6 ou interfirarem em políticas em um país político, eles podem se tornar § 36 ou interfirarem em um país político, que podem se tornar #!6 ou interferir"
 concept_manzoni_great_writer_desc: "A #b Great Writer#! is a [concept_manzoni_writer] known all over the world. A #b Writer#! can become a #b Great Writer#! once their [concept_artists_experience] reaches #V 500#!. If your #b Great Writer#! is your [concept_manzoni_national_writer] you will get a bonus to your yearly [concept_manzoni_literary_tradition] gain."
 concept_manzoni_local_writer_desc: "Nearly every [concept_manzoni_writer] starts as a #b Local Writer#!. Every country can have a maximum of 3 #b Local Writers#! that will create #b Publications#!, grant you [concept_manzoni_literary_tradition] if their [concept_manzoni_genre] matches the [concept_manzoni_popular_taste] and gain [concept_artists_experience].\nA #b Local Writer#! with a #b Reputation#! of 150 and whose [concept_interest_group] is not unhappy, can become a country's [concept_manzoni_national_writer] which will grant you more #b Literary Tradition#! and other additional advantages.\nBe aware that #b Local Writers#! unhappy with the current political situation can start to interfere in the political discourse or even become an [concept_agitator]"
 concept_manzoni_national_writer: "Escritor nacional"
 concept_manzoni_national_writer_desc: "A #b National Writer#! is a type of [concept_manzoni_writer] that is considered to be the face of your country's literature. #b National Writers#! grant you a minimum of 1 and up to 5 [concept_manzoni_literary_tradition].\nYou can gain a #b National Writer#! by appointing one of your [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]. To be able to appoint one of your #b Local Writers#! they must have at least #V 150#! [concept_artists_experience] and their [concept_interest_group] must have a positive [concept_approval].\n"
 concept_manzoni_bestseller: "Best-seller"
 concept_manzoni_bestsellers: "Best-Sellers"
 concept_manzoni_bestseller_desc: "A #b BestSeller#! é uma publicação #b #! por um [concept_manzoni_writer] que está vendendo muito bem, geralmente porque o #b escritor's#! [concept_manzoni_genre] corresponde ou está próximo do atual [concept_manzoni_popular_taste]. O primeiro #b bestSeller#! concederá uma grande quantia de #!5 e cada #b best -seller#! após o primeiro concederá ao país uma quantidade significativa de #b tradição literária#!."
 concept_manzoni_genre: "Gênero"
 concept_manzoni_genres: "Gêneros"
 concept_manzoni_genre_desc: "Cada [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] possui um gênero específico de #b para sua redação. O gênero #b é atribuído quando o §1 Writer#! for criado e depende de muitos fatores. \ N#b Escritores #! ganharão mais [concept_artists_experience] e escreverá mais #b0 quando seu gênero #b corresponder ou estiver próximo ao #b3 do país."
 concept_manzoni_popular_taste: "Gosto popular"
 concept_manzoni_popular_taste_audience: "Gosto do público"
 concept_manzoni_popular_tastes_audience: "Audiência tem gosto"
 concept_manzoni_popular_taste_desc: "A população de toda nação possui um gosto #b para um [concept_manzoni_genre] específico. A cada 10 anos, este sabor §0, dependendo de mudanças políticas, sociais e culturais no próprio país. #!7, #!8, #!9 \ n- #b [concept_manzoni_genre]1#!: #!7, [concept_manzoni_genre]4, [concept_manzoni_genre]5 \ n- #b [concept_manzoni_genre]7 §3: §18, § [concept_manzoni_genre]5, [concept_manzoni_genre]4 _27. #!9 \ n- #b #b9#!: #!1, #!7, [concept_manzoni_genre]5 \ n- #b #!5 §1: #b_ #!8, #!9 \ n- §0 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]1_1: #!8, #!9 \ §0 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]1_1: §18, #!9 § § [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]141. [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]7#!: #!9, #!8, #!9"
 concept_manzoni_book_licence: "Licença de livro"
 concept_manzoni_book_licences: "Licenças de livros"
 concept_manzoni_book_licence_desc: "Os editores estrangeiros podem obter contratos com um [concept_manzoni_national_writer] e oferecer seus livros como traduções em seu próprio mercado. Isso acontece quando um escritor conhece o [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] no exterior. Se um autor recebe pelo menos cinco licenças de livros, seus livros são considerados literatura mundial. Ele pode então fazer um tour de leitura."
 concept_manzoni_local_writers: "Escritores Locais"
 concept_manzoni_library: "Biblioteca Nacional"
 concept_manzoni_library_desc: "Sua biblioteca nacional #b configurará automaticamente as coleções de livros (na forma de um [concept_production_method]) se você tiver [concept_manzoni_publications] suficiente. A primeira coleção de livros será criada para 1.000 ou mais publicações. A partir daí, são possíveis coleções melhores com 2.500 (pequena coleção de livros), 5.000 (coleção de livros pequenos), 10.000 (coleção de livros médios), 25.000 (coleção de livros grandes), 50.000 (excelente coleção de livros) e 100.000 (ótima coleção de livros)."
 concept_manzoni_publications: "Publicações"
 concept_manzoni_publications_desc: "#b Publicações #! Inclua todos os títulos de livros, jornais, ensaios e outros produtos escritos similares em uma nação. Eles não são consistentes com @manzoni_prints! $manzoni_prints$ circulando como mercadorias. As publicações também podem aparecer independentemente da indústria editorial, por exemplo, através das prensas de impressão interna de prédios ou universidades do governo. Acadêmicos e particulares também produzem publicações, dependendo de seu nível de alfabetização. No entanto, o setor editorial é responsável pela participação do leão, e o fator decisivo é se um método de produção moderno é usado ou não. Um grande número de publicações é fundamental para a expansão de um [concept_manzoni_library]."
 concept_curtiss_tourism: "Turismo"
 concept_curtiss_tourism_desc: "O turismo fornece uma nação culturalmente superior a renda adicional. Monumentos únicos, museus e galerias de arte, sítios arqueológicos, centros de arte e altos valores nas várias tradições culturais são fatores que fazem de uma nação um destino turístico atraente. As leis que aumentam a liberdade de movimento e a atividade econômica também contribuem para a maior renda turística. A infraestrutura também desempenha um papel crucial - afinal, lugares remotos não podem ser alcançados. Um aeroporto em particular revoluciona o turismo e fornece um aumento significativo na receita."
 concept_curtiss_private_airline: "Companhia aérea privada"
 concept_mendelejew_chemist: "#b #ORANGE Químico#!#!"
 concept_manzoni_literature: "Cultura literária"
 concept_manzoni_literature_desc: "#b Literary Culture#! is one of the main features of [concept_morgenroete]. Print culture and newspaper culture in particular experienced significant upheavals in the 19th and 20th centuries. The mass of printed products and everyday use is represented by the printing industry. The cultural value of the literature produced is reflected in the [concept_manzoni_literary_tradition]. The latter depends largely on the [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] of a country, and there are [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] and [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]. Whether they live in the shadows or become celebrated authors depends on the [concept_manzoni_popular_taste]."
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor #! is a mod created to broaden the cultural and scientific aspects of Victoria 3. It features content for various aspects of the Victorian Age:\n\n#V Science:#!\n #indent_newline:3 • Tesla: [concept_tesla_engineering]#!\n #indent_newline:3 • Mendeleev: [concept_mendelejew_chemistry]#!\n #indent_newline:3 • Verrier: [concept_verrier_astronomy]#!\n #indent_newline:3 • Agassiz: [concept_agassiz_geology]#!\n #indent_newline:3 • Dubois: [Concept('concept_dubois_natural_history','$concept_dubois_natural_history_paleontology$')]#!\n #indent_newline:3 • Ito: [concept_dubois_natural_history]#!\n #indent_newline:3 • Theiler: [concept_theiler_biology]#!\n #indent_newline:3 • Panum: [concept_panum_medicine]#!\n #indent_newline:3 • Lepsius: [concept_lepsius_archaeology]#!\n #indent_newline:3 • Andersson: [concept_andersson_anthropology]#!\n\n#V Art:#!\n#indent_newline:3 • Gaudí: [concept_elgar_architecture]#!\n#indent_newline:3 • Elgar: [concept_elgar_music]#!\n#indent_newline:3 • Manzoni: [concept_manzoni_literature]#!\n#indent_newline:3 • Klimt: [concept_klimt_painting_culture]#!\n\n#V Sports:#!\n#indent_newline:3 • Douglas: [concept_douglas_mountaineering]#!\n#indent_newline:3 • Vikelas: [concept_vikelas_sports] and [concept_vikelas_car_racing]#!\n#indent_newline:3 • Curtiss: [concept_curtiss_aviation]#!"
 concept_agassiz_mineral: "Mineral"
 concept_agassiz_minerals: "Minerais"
 concept_agassiz_mineral_desc: "Os minerais são todos os tipos de tipos especiais de rocha que não se enquadram nos recursos conhecidos usados ​​na indústria. Uma nação recebe um certo número de minerais anualmente depois de inventar a tecnologia #b geologia #!. Se um [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] estiver a serviço desta nação, ele poderá encontrar minerais adicionais. Locais de minerais são caracterizados por modificadores de estado: montanhas, desertos, áreas do Ártico, depósitos de matéria -prima (áreas de carvão, ferro e enxofre, por exemplo), bem como [Concept('concept_dubois_formation','$concept_dubois_formations$')] e vulcões geológicos. Os desertos e as áreas do Ártico são consideradas pobres em minerais, enquanto grandes formações geológicas e vulcões são considerados particularmente ricos em minerais. Uma forma mais valiosa de minerais são [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 concept_agassiz_rare_mineral: "Mineral Raro"
 concept_agassiz_rare_minerals: "Minerais Raros"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] pode encontrar minerais raros em suas expedições, como [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_douglas_mountaineering] Expedições, [concept_agassiz_volcano] Expedições ou durante a prospecção mineral. Ao contrário do [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] comum, eles são encontrados apenas em quantidades muito limitadas. Minerais raros são usados ​​para construir um gabinete mineral."
 concept_agassiz_geologist: "#b #GREEN Geologista#!#!"
 concept_agassiz_geologists: "#b #GREEN Geólogos#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who primarily study rocks and earth history. They locate [Concept('concept_dubois_formation','$concept_dubois_formations$')] and [Concept('concept_curie_uranium','$concept_curie_uranium$')] deposits, which makes them irreplaceable colleagues for [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')]. During their expeditions, they may find additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] that a [concept_mendelejew_chemist] can use to discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. They can find new deposits of raw materials. They are also active as volcanologists and can go on expeditions to local [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] to research them in more detail. Together with [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], they can develop new devices, such as seismographs, to learn more about the Earth's interior. Geologists can take part in [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] and [concept_douglas_mountaineering] expeditions."
 concept_agassiz_volcano: "Vulcão"
 concept_agassiz_volcanoes: "Vulcões"
 concept_curie_physicist: "#b #ORANGE Médico#!#!"
 concept_curie_physicists: "#b #ORANGE Físicos #!#!"
 concept_curie_physicist_desc: "#n em breve para Morgenröte! #!"
 concept_curie_uranium: "Urânio"
 concept_curie_uranium_desc: "O urânio é um material extremamente raro que só pode ser encontrado em algumas províncias históricas selecionadas por [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]. A física moderna deve ter sido pesquisada para isso. À primeira vista, o urânio é um minério secundário que é usado apenas na produção de cerâmica. No entanto, será necessário mais tarde, especialmente no [concept_verrier_observatory]. Somente se os melhores métodos de produção física e química forem fornecidos com urânio, eles poderão cumprir seu objetivo, seja no campo da física nuclear ou na pesquisa de elementos anteriormente desconhecidos. Sem urânio, todas as atividades científicas no campo da radioatividade são simplesmente impossíveis. Portanto, é particularmente interessante para [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] e [Concept('concept_curie_physicist','$concept_curie_physicists$')] na fase final de Victoria 3."
 concept_mendelejew_chemistry: "Química"
 concept_mendelejew_chemistry_desc: "#b Chemistry#! is one of the main features of [concept_morgenroete]. Starting in the 18th Century, #b Chemistry#! rapidly developed into a modern science. Suddenly many new elements were discovered and chemical processes were invented. The 19th and 20th century saw even more discoveries in Chemistry, ranging from new elements to the invention of dynamite or the Haber-Bosch-Process.\n\nIn #b Morgenröte#! #b Chemistry#! will be conducted by [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] who will be able to focus on different tasks.\nOne focus is the improvement of your countries #b $building_chemical_plant$#!, #b $building_explosives_factory$#! or #b $building_synthetics_plant$#!, which will make those [Concept('concept_building', '$concept_buildings$')] more efficient.\nIf you are looking for a more prestigious task, you can let your #b Chemist#! theorize, discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. Each Element will add a little bit of [concept_prestige] depending on whether you theorized, discovered or isolated it.\nLater in the game the #b Chemist#! will also be able to invent #b Synthetic Oil#! and #b Synthetic Rubber#!. This will unlock the #b $building_mendelejew_hydrogenation_plants$#! or the #b $building_mendelejew_synthetic_rubber_factory$#!."
 concept_mendelejew_chemists: "#b #ORANGE Químicos#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE químicos §2 são [Concept('concept_academics_academic','$concept_academics_academics$')] que teorizarão, descobrirão e isolarão [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. \ N#b #ORANGE químicos §2 Ganho [concept_academics_experience] Quando pesquisam #b Elements#ORANGE0 ou participe de conferências. Eles também podem melhorar os fertilizantes, explosivos e sintéticos. Os químicos podem inventar a tabela periódica ou combustível sintético, tornando -os valiosos para países sem acesso a petróleo. Eles obtêm #b Experience#ORANGE0 também passivamente a cada ano. Isso permite que #b #ORANGE químicos #!#! obtenham melhores traços de químicos. Eles também podem obter uma especialização (teórica, analista, inspetor) quando criado ou por evento."
 concept_mendelejew_element: "Elemento químico"
 concept_mendelejew_element_no_chemical: "Elemento"
 concept_mendelejew_elements: "Elementos químicos"
 concept_mendelejew_element_desc: "Nos tempos antigos, era comum acreditar que o mundo consistia nos quatro elementos: fogo, terra, água e ar. Com o início da emancipação da química da alquimia, surgiu a análise científica dos elementos químicos. Esse processo estava longe de ser completo no século XIX. \ N \ n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] pode continuar esta pesquisa teorizando, descobrindo e isolando elementos um de cada vez. Somente quando isolado é um elemento considerado totalmente reconhecido e recebe seu nome; Anteriormente, é apenas um número. A categorização de elementos traz progresso científico e químico [concept_academics_experience]. Não todos os elementos podem ser teorizados, descobertos e isolados desde o início. Muitos elementos só podem ser pesquisados ​​adequadamente com espectrografia; No final do jogo, um ciclotron pode ser necessário. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] são necessários para a descoberta e isolamento de elementos químicos. Além dos métodos de produção, a experiência do químico e os traços de caráter desempenham um papel decisivo em quanto tempo a pesquisa leva."
 concept_verrier_meteorite: "Meteorito"
 concept_verrier_meteorites: "Meteoritos"
 concept_manzoni_national_writers: "Escritores nacionais"
 concept_verrier_astronomy_desc: "#b Astronomy#! é uma das principais características de [concept_morgenroete]. \ N \ n para obter acesso a #b Astronomy#! Você precisa de um [concept_verrier_observatory] ou um [concept_verrier_astronomer]. \ N \ Nonce, você terá um observar que você terá um observatório, que você terá § § §1. #!1. \ NSOMETINS SEU #!2 também pode encontrar #!3, que pode ser examinada por #b astrônomos #! e #!6. \ N \ nevery Astronomical Discovery concederá a você #!7, que será adicionado a você #!8. Verifique o #!9 [concept_morgenroete]0 para ver o seu prestígio astronômico #b"
 concept_verrier_observatory_desc: "An #b Observatory#! is the backbone of a country's [concept_verrier_astronomy] and [concept_mendelejew_chemistry]. From there [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] can discover Planets, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and take [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].\nTo build an #b Observatory#!, you need to have a University and either the $verrier_astronomy_tech$ or $verrier_chemistry_tech$ [concept_technology] researched. Additionally an #b Observatory#! can only be built once and only in your capital."
 concept_verrier_astronomer_desc: "#b astrônomos #! são acadêmicos que explorarão o céu e descobrirão [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] e [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. \ N#b astrônomos §1 Ganho [concept_academics_experience] Quando descobrirem #b objetos astronômicos #! ou participe de conferências. Eles obtêm #b Experience#! também passivamente a cada ano. Isso permite que #b astrônomos #! obtenham melhores traços de astrônomos. No entanto, isso reduzirá a quantidade de objetos astronômicos de #b descobertos #!"
 concept_verrier_astronomical_prestige: "Prestígio astronômico"
 concept_verrier_astronomical_prestige_desc: "#b Prestigem astronômico §1 é a quantidade de [concept_prestige] que você ganha com a astronomia. Vários fatores influenciam seu prestígio astronômico de #b: \ n- Encontrar um novo planeta concederá a você entre #V 15#! e #V 100#! Prestige Dependendo da dificuldade de encontrá-lo. concederá a você 10 prestígio."
 concept_verrier_astronomical_object_desc: "#b Objetos astronômicos #! são asteróides e estrelas que você descobriu. Esses objetos podem ser descobertos se você tiver um [concept_verrier_observatory]. Quanto melhor sua tecnologia de astronomia, mais objetos você encontrará. Você também descobrirá mais #b objetos #! se tiver um [concept_verrier_astronomer]. \ Nwith #b Objetos astronômicos #! Você poderá descobrir novos planetas ou a tecnologia de física Astro."
 concept_verrier_moon_map: "Mapa da lua"
 concept_verrier_moon_photo_desc: "Se você tiver um [concept_verrier_observatory] e pesquisou a tecnologia da câmera, poderá solicitar seu [concept_verrier_astronomer] para começar a fotografar a lua. Isso reduzirá a quantidade de [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do seu #b astrônomo -4, mas lhe dará #b fotos da lua #! todos os anos. Completando o mapa da lua, concederá à sua nação alguns [concept_verrier_astronomical_prestige]"
 concept_verrier_satellite: "Satélite"
 concept_verrier_satellites: "Satélites"
 concept_verrier_satellite_desc: "#b satélites#! ou luas são [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] que estão orbitando um planeta. Alguns #b satélites#! Como a Lua da Terra já estão descobertos, mas um [concept_verrier_astronomer] pode tentar encontrar mais deles. \ Neach #b satélite #! descoberto por seu país concederá uma pequena quantidade de [concept_verrier_astronomical_prestige]."
 concept_verrier_meteorite_desc: "Os meteoritos são corpos sólidos relativamente pequenos de origem cósmica que passaram pela atmosfera da Terra e chegaram ao solo. Em casos raros, fragmentos de meteoritos podem ser encontrados após um chuveiro de meteoros. Os meteoritos que atingem a Terra milhares de anos atrás também podem ser encontrados por [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] em terrenos difíceis, como desertos e áreas do Ártico. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] e [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] Em particular, estão interessados ​​em meteoritos e podem querer analisá -los. \ N \ nadditionalmente #b meteorites#! ajuda a aumentar seu [concept_agassiz_geological_score] e permitir uma melhor estimativa do [concept_agassiz_age_of_earth]."
 concept_agassiz_volcano_desc: "#b Vulcões#! são uma nova característica de estado em #r Morgenröte#!. Ao contrário do jogo base para Victoria 3, não são regiões estratégicas, mas sim estados com vulcões que estão ligados à ocorrência de uma erupção vulcânica. A atividade vulcânica é significativamente maior, mas nem sempre é destrutiva. Em países com vulcões, um #b $building_agassiz_volcano_observatory$#! pode ser construído, o que não só ajuda a prever e mitigar erupções através de observações, mas também é o ponto de partida para uma expedição vulcânica. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] podem adquirir novos [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], experiência e a característica de vulcanólogo em uma expedição vulcânica."
 concept_agassiz_geological_knowledge: "Conhecimento geológico"
 concept_agassiz_geological_knowledge_desc: "#b Conhecimento geológico §1 Inclui a compreensão geral de uma nação da natureza da Terra. É um recurso muito raro que pode ser adquirido principalmente no curso dos marcos geológicos. #b Conhecimento geológico § 1 não é o mesmo que o [concept_agassiz_geological_score], mas é o componente mais importante e é considerado particularmente valioso."
 concept_agassiz_geological_score: "Escore geológico"
 concept_agassiz_geological_score_desc: "A pontuação geológica #b inclui todas as realizações e conhecimentos de uma nação relacionados à geologia. O componente mais importante é [concept_agassiz_geological_knowledge], mas existem muitos outros fatores importantes; como a experiência de um [concept_agassiz_geologist], [concept_agassiz_oceanographic_knowledge], o número de [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ou [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] e tecnologias geológicas. A pontuação geológica é crucial para re-namoro o [concept_agassiz_age_of_earth]."
 concept_agassiz_oceanographic_knowledge: "Conhecimento oceanográfico"
 concept_agassiz_oceanographic_knowledge_desc: "#b O conhecimento oceanográfico #! faz parte de [concept_agassiz_geological_knowledge] e corresponde ao conhecimento sobre os mares, em particular correntes oceânicas, mas também a pesquisa marinha geral combinada com considerações geofísicas. #b conhecimento oceanográfico #! é amplamente obtido em [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]. 50 #b conhecimento oceanográfico #! é necessário para adquirir [concept_agassiz_geological_knowledge]."
 concept_agassiz_age_of_earth: "Idade da Terra"
 concept_agassiz_age_of_earth_desc: "Uma das grandes questões do século XIX foi a questão da idade #b da Terra §1. Tinha implicações na história natural, particularmente em relação à validade da teoria da evolução e à sequência de eventos geológicos. Somente um [concept_agassiz_geologist] pode determinar uma nova idade da Terra. Para fazer isso, sua nação deve ter um [concept_agassiz_geological_score] mais alto do que a nação que pela última vez determinou uma idade da Terra. Ele então compartilhará seus resultados de pesquisa com outros colegas. Ele não precisa necessariamente ter sucesso - os geólogos muito jovens e inexperientes não serão ouvidos. No entanto, as nações estrangeiras são um pouco mais flexíveis quando nenhuma nova teoria é apresentada por muitos anos. Os geólogos só podem estimar a idade da Terra uma vez em suas vidas - mas isso só se aplica se forem bem -sucedidos. Se você falhar, poderá tentar novamente após uma fase de motivação."
 concept_agassiz_geology: "Geologia"
 concept_agassiz_geology_desc: "#b Geology#! is one of the main features of [concept_morgenroete]. Even before the beginning of the Victorian Age, geology had already experienced a significant boom, which is why it is available to many nations at the start of the game.\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can be used in a variety of ways: they can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')] and [concept_curie_uranium] deposits during a geological search, go on [concept_agassiz_volcano] expeditions, determine [concept_agassiz_age_of_earth], find new ore and oil deposits or go on [concept_dubois_pacific_expedition] and [concept_douglas_mountaineering] expeditions useful as scientific companions. A [concept_agassiz_geological_score] evaluates the overall knowledge of a nation and is crucial in determining the age of the earth. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] are an essential part of geology; The latter can be used to establish a mineral cabinet in the [concept_dubois_zoo]. A special geological facility is the #b $building_agassiz_volcano_observatory$#!, which carries out volcanological and seismic studies."
 concept_theiler_biologist: "#b #GREEN Biólogo #!#!"
 concept_theiler_biologists: "#b #GREEN Biólogos #!#!"
 concept_theiler_biologist_desc: "A Biologist is an [concept_academics_academic] who researches all aspects of life.\nIn [concept_morgenroete] the Biologist is mostly responsible for researching [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], improving your Agriculture, fighting [Concept('concept_theiler_pest','$concept_theiler_pests$')], and finding [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')].\nBiologists gain [concept_academics_experience] passively or by finishing projects."
 concept_gaudi_architect: "#b #PURPLE Arquitet#!#!"
 concept_gaudi_architects: "#b #PURPLE Arquitetos#!#!"
 concept_academics_university_specialization_desc: "Each University can be specialized by changing its production method.\nA university with a [concept_pm_academics_university_humanities] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_panum_physician','$concept_panum_physicians$')], [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')].\nA university with a [concept_pm_academics_university_natural_history] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_theiler_biologist','$concept_theiler_biologists$')].\nA university with a [concept_pm_academics_university_mathematics] will allow you to focus your nations research on production and military innovation and allows to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].\nChanging the Specialization will lead to [concept_academics_academic_confusion] which has a #n short negative effect#! for the building and your [concept_academics_progress].\nSpecialized Universities can influence various projects as well. Universities with a $concept_pm_academics_university_mathematics$ focus will help with engineering projects for example."
 concept_pm_academics_university_humanities_desc: "A Humanities-Anthropological Focus specializes the University and allows a national focus on Society Research and to specifically recruit [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Humanities-Anthropological Focus will give you a bonus on the success chance of Expeditions (maximum of +4 requiring 40 Levels of specialization) and improve the progress for some other projects."
 concept_pm_academics_university_natural_history_desc: "A Natural History Focus specializes the University and allowsa national focus on Society Research and to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Natural History Focus will give you a bonus to various projects of your Natural scientists."
 concept_pm_academics_university_mathematics_desc: "Mathematical-Technical Focus specializes the University and allows a national focus on Production and Military Research and to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] or [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Mathematical-Technical Focus will give you a bonus to various projects of your [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] and [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]."
 concept_panum_physician: "#b #BLUE Médico #!#!"
 concept_panum_physicians: "#b #BLUE Médicos#!#!"
 concept_panum_physician_desc: "#b #BLUE Physicians#!#! são [Concept('concept_academics_academic','$concept_academics_academics$')] que trabalham e pesquisam no campo de [concept_panum_medicine]. Sua principal tarefa é escrever [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] e encontrar [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]. Eles também podem melhorar a pesquisa médica, melhorar a assistência médica e curar outros personagens. \ Nphysicians ganham [concept_academics_experience] durante seu trabalho e passivamente a cada ano. Eles podem obter melhores níveis do traço do médico ganhando o suficiente #b Experience#!."
 concept_panum_medicine: "Medicamento"
 concept_panum_medicine_desc: "A medicina é uma das maiores expansões de [concept_morgenroete] para Victoria 3. Um dos focos é a epidemia [Concept('concept_panum_disease','$concept_panum_diseases$')] como cólera, tuberculose e tifo, que atormentam a humanidade há séculos e finalmente foram controlados por avanços científicos. As doenças epidêmicas são, portanto, um dos eventos negativos em [concept_morgenroete]. A contenção através da busca por um [concept_panum_disease_treatment] é, portanto, ainda mais importante. Um componente central da medicina é, portanto, um [concept_panum_physician] que é um dos acadêmicos da universidade antropológica-humanista. Ele pode descrever doenças epidêmicas e encontrar tratamentos. Um método de tratamento geralmente requer um [concept_panum_disease_description] e uma tecnologia. Um médico também pode melhorar a pesquisa de tecnologias médicas ou expandir a saúde por meio de hospitais, além de introduzir novas técnicas médicas e curar outros personagens. As conferências médicas ajudam a espalhar o conhecimento médico internacionalmente. Um passo importante na modernização da medicina também é a transição da teoria do miasma para o [concept_panum_germ_theory]. Uma nação que é líder em descobertas médicas também pode demonstrar [concept_panum_medical_prestige] alto."
 concept_panum_disease: "Doença"
 concept_panum_diseases: "Doenças"
 concept_panum_disease_desc: "The term disease usually refers to the epidemic diseases that can affect a nation every few years. A [concept_panum_physician] can counteract them by making [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] and providing [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] Epidemic diseases usually do not occur at the same time and it takes some time for epidemic diseases to break out again. Depending on the type, epidemic diseases can have a devastating effect and spread across several states. There are various [concept_panum_disease_prevention] methods to delay the onset of such a disease or to mitigate its effects. The triggers for an illness can be very different. Yellow fever only occurs in tropical regions and cholera and tuberculosis require a minimum of urbanization to have an effect. A state's standard of living and level of devestation also play a role.\n\nIn addition to these particularly feared epidemic diseases, there are also everyday diseases that a physician can randomly examine during medical research. Such diseases include rickets, pellagra and syphilis.\n\nDiseases are:\n #indent_newline:3 • [GetHarvestConditionType('panum_cholera_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_tuberculosis_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_smallpox_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_typhus_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_yellow_fever_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_measles_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_scarlet_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_plague_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_diphteria_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_polio_condition').GetName]#!"
 concept_panum_disease_description: "Descrição da doença"
 concept_panum_disease_descriptions: "Descrições de doenças"
 concept_panum_disease_description_desc: "As descrições são o primeiro passo para entender um [concept_panum_disease]. Eles não têm impacto na gravidade de uma epidemia, mas são fundamentais para encontrar [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] e [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. As descrições de doenças não têm mais requisitos: tudo o que é necessário é uma doença epidêmica e um [concept_panum_physician]."
 concept_panum_disease_treatment: "Tratamento da doença"
 concept_panum_disease_treatments: "Tratamentos de doenças"
 concept_panum_disease_treatment_desc: "A [concept_panum_physician], dada a tecnologia correta e um [concept_panum_disease_description], pode encontrar um tratamento para um [concept_panum_disease] em um processo longo. Os tratamentos não são os mesmos que uma cura. Em vez disso, o médico descobre a causa de uma doença e desenvolve métodos nessa base para evitar ou limitar significativamente um surto. Os tratamentos da doença limitam a duração de uma doença epidêmica a alguns meses ou semanas e também impedem que ela se espalhe para vários estados. Os tratamentos da doença fazem parte de um possível [concept_panum_disease_prevention] contra surtos epidêmicos."
 concept_panum_disease_prevention: "Prevenção de doenças"
 concept_panum_disease_prevention_no_disease: "Prevenção"
 concept_panum_disease_prevention_desc: "Existem várias maneiras de evitar ou pelo menos mitigar um [concept_panum_disease] epidemia. O método mais conhecido é o [concept_panum_disease_treatment] desenvolvido por um [concept_panum_physician]. Reduz significativamente o tempo em que uma doença se enfurece e também reduz a probabilidade de se espalhar para outro país. Padrão de vida, hospitais, tecnologias e um alto nível de instituições de saúde também têm um impacto. A prevenção final é um [concept_theiler_vaccine] que impede que uma doença ocorra em primeiro lugar. As vacinas são desenvolvidas por [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. No entanto, só é eficaz se a instituição de saúde atingir pelo menos o nível especificado no corpo docente médico. Afinal, a distribuição de uma vacina deve ser organizada e supervisionada."
 concept_panum_disease_type: "Tipo de doença"
 concept_panum_disease_types: "Tipos de doenças"
 concept_panum_disease_type_desc: "A epidemia [Concept('concept_panum_disease','$concept_panum_diseases$')] pode ser diferenciada de acordo com seu grau de distribuição. #V Doenças locais #!, Como a febre escarlatina, são limitadas ao estado em que eclodiram. #V Doenças regionais #!, Como tuberculose, pode se espalhar para alguns estados vizinhos, mas não além. #V doenças transregionais #! - a mais notória das quais é a cólera - pode se espalhar por todo o país, mesmo que os estados não precisem se fazer se beira."
 concept_panum_local_disease: "Doença local"
 concept_panum_local_diseases: "Doenças locais"
 concept_panum_regional_disease: "Doença regional"
 concept_panum_regional_diseases: "Doenças regionais"
 concept_panum_transregional_disease: "Epidemia transregional"
 concept_panum_transregional_diseases: "Epidemia transregional"
 concept_panum_germ_theory: "Teoria germinativa"
 concept_panum_germ_theory_desc: "A teoria germinativa é um dos avanços científicos médicos fundamentais do século XIX. Ele substituiu teorias anteriores e mais arcaicas, como a teoria do miasma, que foi generalizada na Europa e representa todas as tentativas tradicionais de explicar a causa de [Concept('concept_panum_disease','$concept_panum_diseases$')]. A descoberta da teoria dos germes não apenas beneficia o primeiro descobridor. Ao procurar por [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], as chances de sucesso são um pouco mais altas porque impede alguns eventos negativos e desbloqueia mais eventos positivos."
 concept_panum_medical_prestige: "Prestígio médico"
 concept_panum_medical_prestige_desc: "O prestígio médico é composto pelos [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 pontos), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 pontos), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 pontos) e [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 pontos) descobertos até agora. As primeiras descobertas dão duas vezes mais pontos. Mais prestígio médico pode vir da cura de doenças cotidianas, inventar métodos especiais de cura ou geralmente melhorando o sistema de saúde por meio de um [concept_panum_physician]."
 concept_theiler_pathogen: "Patógeno"
 concept_theiler_pathogens: "None"
 concept_theiler_pathogen_desc: "A Pathogen is the name for something that causes a [concept_panum_disease]. This could be anything from an organism to a [concept_theiler_microorganism]. Often it is a Bacterium, parasite or Virus.\nA [concept_theiler_biologist] with access to enough Microorganisms can try to find the Pathogen that causes a Disease. This can help tp prevent the disease and to discover and produce a [concept_theiler_vaccine]"
 concept_theiler_vaccine: "Vacina"
 concept_theiler_vaccines: "Vacinas"
 concept_theiler_vaccine_desc: "The discovery of Vaccines has allowed humans to become immune to [Concept('concept_panum_disease','$concept_panum_diseases$')] without contracting them and can potentially save millions of lives.\nTo create a Vaccine, A [concept_theiler_biologist] must first find the [concept_theiler_pathogen] that causes a Disease. Then the development of a Vaccine can start if enough [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] are available."
 concept_panum_red_cross: "Cruz Vermelha"
 concept_panum_red_cross_desc: "A Cruz Vermelha é uma das primeiras organizações internacionais e, em casos raros, oferece a oportunidade de receber médicos da Cruz Vermelha em uma guerra. Os membros da Cruz Vermelha também recebem certos bônus. Dependendo da regra do jogo, a Cruz Vermelha pode ser fundada histórica ou dinamicamente; Os estados reconhecidos podem ingressar sob certos requisitos tecnológicos. O fundador recebe a sede da Cruz Vermelha em sua capital. Os membros podem aderir a até três [Concept('concept_panum_convention','$concept_panum_conventions$')] vinculativos sob o direito internacional."
 concept_panum_convention: "Convenção internacional"
 concept_panum_conventions: "Convenções internacionais"
 concept_panum_convention_desc: "Uma convenção internacional é uma declaração conjunta de intenção pelos estados para estabelecer certas regras do jogo no tráfego internacional. Havia vários exemplos disso no decorrer do século XIX, como a Convenção de Genebra ou o Código de Guerra Terrestre de Haia. O que todas as convenções têm em comum é que elas tentam mitigar os horrores da guerra. As opções militares são, portanto, preferidas sobre cuidados médicos seguros para as armas feridas e definitivas são proibidas, o que leva a uma certa contenção da guerra. A vantagem é maior flexibilidade. Embora a adoção de uma convenção seja vista favoravelmente, a abolição de uma convenção pode levar à raiva internacional. No entanto, se membros suficientes do [concept_panum_red_cross] assinarem, com o tempo, ele se tornará um direito internacional válido, com o qual todos os signatários devem cumprir - e os outros membros também o assinarão. Isso acontece quando 65 % de todos os membros e a maioria das grandes potências concordam com esta convenção - todos os outros membros são forçados a cumprir com ela. Esta convenção não pode mais ser abolida como de costume. Para evitar convenções vinculativas, é necessária uma retirada completa da Cruz Vermelha - com todas as consequências."
 concept_manzoni_literary_tradition_desc: "#b Literary Tradition#! is a representation of a nation's literary achievements and traditions.\nThere are various ways to gain #b Literary Tradition#!. Having at least one $building_art_academy$, having one or more [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], a [concept_manzoni_national_writer] and having certain [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] will passively add #b Literary Tradition#! to your country.\nThe more #b Literary Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you to unlock the [concept_elgar_expressionism] [concept_artists_art_style]."
 concept_elgar_musical_tradition_desc: "#b Tradição musical §1 é uma representação das realizações e tradições musicais de uma nação. Se você tiver pelo menos um [concept_elgar_opera], obterá passivamente #b tradição musical #!. Quanto mais #b Óperas#! você tem, mais você obtém. Você também pode obter mais #b tradição musical § 1 das tecnologias musicais e artísticas. Cada tecnologia fornece um bônus diferente. Você também pode obter #b tradição musical §1 dos eventos, especialmente se você tiver um #!3. \ NA mais #b Tradição musical §1 A sua nação ganha, quanto maior o bônus de prestígio que você ganha. Além disso, permitirá que você desbloqueie o #!6 #!7."
 concept_klimt_painting_tradition_desc: "#b Tradição de pintura §1 é uma representação das realizações e tradições de uma nação. Pode ser obtido por ter #b academias artísticas #!, um [concept_klimt_painter], certos [Concept('concept_technology', '$concept_technologies$')] ou de eventos. \ N#b Tradição de pintura #! permite desbloquear o [concept_elgar_art_nouveau] [concept_artists_art_style] e é usado para calcular sua tradição cultural #b §1."
 concept_mendelejew_theorized_elements: "Elementos teorizados"
 concept_mendelejew_discovered_elements: "Elementos descobertos"
 concept_mendelejew_isolated_elements: "Elementos isolados"
 concept_panum_psycho_point: "Ponto Psicoterapêutico"
 concept_panum_psycho_points: "Pontos Psicoterapêuticos"
 concept_panum_psycho_point_desc: "Os pontos psicoterapêuticos são uma moeda abstrata que representa o progresso de um país no campo da psiquiatria e psicologia. Eles são gerados mensalmente a partir de tecnologias, um asilo insano ou um [concept_panum_physician] com #V psiquiatra §2 [concept_character_trait]. Pontos psicoterapêuticos também podem ser adquiridos via evento. Um alto número de pontos psicoterapêuticos resulta em uma melhor chance de curar personagens com doenças mentais. A subida de um nível psicoterapêutico também fornece bônus de pesquisa e [concept_academics_progress]. Um certo número de pontos psicoterapêuticos é um requisito para a maioria das escolas psicológicas."
 concept_vikelas_mechanic: "Mecânico"
 concept_vikelas_mechanic_desc: "#b Mechanics#! are responsible for building the [concept_vikelas_race_car], and their character traits and experience influence how long it takes to build or upgrade a car. However, they are not only responsible for the car itself, but also have a direct influence on [concept_vikelas_mechanical_innovation]. Good mechanics ensure that a car's speed (including the driver's tendency to seek the thrill of speed) does not exceed the safety rating, in order to prevent fatal accidents. The same applies to reliability: if the speed rating is higher than the reliability rating, there is a 50% chance that the car will not reach its destination."
 concept_vikelas_mechanical_innovation: "Inovação Mecânica"
 concept_vikelas_race_car: "Carro de Corrida"
 concept_vikelas_race_car_desc: "Alongside the [concept_vikelas_racer], the #b Race Car#! is the key factor in a [concept_vikelas_car_racing]. They are built by a [concept_vikelas_mechanic]. The most important attributes of a race car are speed, reliability and safety. A fast car that does not meet safety standards may well have a chance of winning, but it also carries a high risk of a fatal accident. A car that is safe but too slow, on the other hand, cannot secure a victory. The racing team must therefore strike the right balance."
 concept_vikelas_race_car_reliability: "Confiabilidade do Carro de Corrida"
 concept_vikelas_race_car_safety: "Segurança do Carro de Corrida"
 concept_vikelas_race_car_speed: "Velocidade do Carro de Corrida"
 concept_dubois_dinosaur_bone_no_dinosaur: "Ossos"
 concept_dubois_dinosaur_bones_no_dinosaur: "Ossos"
 concept_dubois_paleontological_expedition_desc: "Um [concept_dubois_paleontologist] pode ser despachado para [Concept('concept_dubois_formation','$concept_dubois_formations$')]. Levará 1 ano e, dependendo do sucesso da expedição, você receberá [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] e [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. Quando você termina uma expedição e se tiver um [concept_dubois_paleontological_team] gratuito, poderá configurar um [concept_dubois_paleontological_excavation] para obter passivamente fósseis e ossos dessa região. \ NA maneira mais fácil de obter acesso a uma formação é controlar o estado associado. No entanto, o acesso também pode ser obtido pacificamente através de [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]."
 concept_dubois_paleontological_team: "Equipe Paleontológica"
 concept_dubois_paleontological_teams: "Equipes paleontológicas"
 concept_dubois_paleontological_team_desc: "As equipes paleontológicas podem ser usadas para configurar um [concept_dubois_paleontological_excavation] depois de terminar um [concept_dubois_paleontological_expedition]. Isso permitirá que você obtenha passivamente [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] e [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_dubois_paleontological_excavation: "Escavação paleontológica"
 concept_dubois_paleontological_excavations: "Escavações paleontológicas"
 concept_dubois_paleontological_excavation_desc: "Você pode configurar uma expedição paleontológica após terminar um [concept_dubois_paleontological_expedition] se tiver um [concept_dubois_paleontological_team] grátis. Uma escavação paleontológica permitirá que sua equipe produza passivamente [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] e [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_verrier_venus_transit: "Trânsito de Vênus"
 concept_verrier_venus_transit_desc: "The transit of Venus refers to the rare occurrence of the Venus passing between Earth and the Sun. However, it occurred twice in the 19th century: in 1874 and 1882. Since observations of the transit of Venus allow conclusions to be drawn about the size of the solar system and a more precise determination of the size of the astronomical unit (AU), these were major scientific events. Countries located in the [concept_verrier_venus_transit_zone] can observe the event from there; other countries must send expeditions. The success of the observation depends on the experience of the [concept_verrier_astronomer], the availability of an [concept_tesla_engineer], and a bit of luck: sometimes the weather can prevent a good image. The better the observation, the greater the bonus."
 concept_verrier_venus_transit_zone: "Zona do Trânsito de Vênus"
 concept_verrier_venus_transit_zone_desc: "The Venus Transit Zone refers to the part of the Earth from which a complete (not just partial) transit of Venus can be observed. In 1874, this was particularly true for the East Asia-Pacific region, and in 1882 for almost the entire American continent. A detailed breakdown of the strategic regions is provided below.\n\n#V Venus Transit 1874:#!\nIndonesia, Indochina, Oceania, South China, North China, manchuria, Japan, Central India, Madras, Bengal, Himalayas; also, the State of Indian Ocean Territory.\n\n#V Venus Transit 1882:#!\nBrazil, La Plata, Andes, Gran Columbia, Mexico, Central America, Caribbean, The Midwest, Dixie, New England; also, the States of Ontario and Quebec."
 concept_vikelas_coach: "Treinador"
 concept_vikelas_coaches: "Treinadores"
 concept_vikelas_coach_desc: "Coaches are the national trainers of a country in a specific national sport. National sports include [concept_vikelas_football], baseball, basketball, and cricket. Coaches provide bonuses for the respective team in competitions - whether at International World Championships or at international matches. The latter are played secretly at regular intervals and increase a coach's experience value upon victory. High experience points and positive [Concept('concept_character_trait','$concept_character_traits$')] increase the chance of winning a World Championship. Positive traits are those that particularly motivate players - such as ambitious or charismatic - while demotivating traits reduce the chance of winning a match. These include traits such as ruthless or cruel."
 concept_vikelas_football: "Futebol"
 concept_vikelas_football_desc: "Futebol é um possível esporte nacional. Os primeiros clubes de futebol podem ser estabelecidos na Europa e na América do Sul; isso exigirá um sistema legal relativamente liberal, uma burguesia forte ou um padrão de vida médio considerável. Depois disso, partidas de futebol ocasionais podem ser jogadas. Com o estabelecimento da FIFA, partidas internacionais e a Copa do Mundo também se tornam possíveis. As oito melhores equipes se qualificam automaticamente para a Copa do Mundo. As equipes são calculadas de acordo com o Valor da Seleção Nacional de Futebol (VSNF), que é derivado dos parâmetros de padrão de vida (aptidão da população), força da burguesia (sistema de clubes), alfabetização (táticas) e tradição (esporte nacional: sim ou não?). Em partidas, não apenas o VSNF é levado em conta, mas também os traços de caráter e a experiência do [concept_vikelas_coach]."
 concept_gaudi_architectural_splendour: "Esplendor Arquitetônico"
 concept_gaudi_architectural_splendour_desc: "Esplendor Arquitetônico é um termo coletivo para os avanços espetaculares na arquitetura moderna, referindo-se principalmente à Art Deco, Bauhaus e Neoclassicismo, conforme surgiram no início do século XX. O valor representa a transformação de formas desatualizadas em uma arquitetura preparada para o futuro. Art Deco requer atingir um limite mais alto para realizar o sonho de uma cidade Art Deco — no entanto, os benefícios são maiores."
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by acquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "A arquitetura é um dos conceitos principais de [concept_morgenroete]. Ela é dividida em duas partes principais.\n\nPor um lado, os [concept_gaudi_monuments] foram completamente redesenhados: eles não são mais construídos diretamente, mas expandidos passo a passo com base em decisões. Por outro lado, inúmeros monumentos foram adicionados - alguns dos quais devem ser construídos, outros existem no início do jogo.\n\nO outro ponto-chave é a introdução do [concept_gaudi_architect], que pode aprimorar cidades e projetar até 15 novos edifícios únicos pesquisando [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Arquitetos também podem reconstruir um país nos estilos Bauhaus, Neoclássico e Art Déco. Um [concept_gaudi_great_architect] pode até projetar seu próprio [concept_gaudi_custom_monument]!"
 concept_gaudi_architect_desc: "#PURPLE #b Arquitetos#!#! são [Concept('concept_artists_artist','$concept_artists_artists$')] cujas habilidades se relacionam com planejamento urbano, projeto de edifícios e construção. Eles são tipos de personagens especiais que você pode obter de eventos, ganhando [concept_artistic_progress] suficiente para criar um em sua nação ou oferecendo uma posição para um [concept_gaudi_independent_architect].\nEnquanto outros artistas são mais propensos a acumular tradição cultural, os arquitetos raramente geram o valioso [concept_gaudi_architectural_splendour] quando estão envolvidos no planejamento urbano ou na expansão da capital — ou quando redesenham completamente o país em um estilo arquitetônico particular. Sua principal tarefa é de natureza mais prática. Eles trabalham na Construção Pública, fornecendo assim a uma nação pontos de construção adicionais. Eles melhoram a infraestrutura por meio do planejamento e transformam as capitais em lugares habitáveis. Os arquitetos também podem aprimorar suas habilidades em uma viagem de estudos ou escrever um tratado Arquitetônico.\nDe importância primordial é o projeto de novos edifícios únicos, para os quais eles criam um [concept_gaudi_architectural_blueprint]. Um total de 15 desses [concept_gaudi_blueprint_buildings] podem ser pesquisados — como isso leva muito tempo, vale a pena considerar quais fazem sentido.\nOs arquitetos também fornecem um bônus passivo: sua mera presença acelera a construção de [concept_gaudi_monuments] em 100 por cento. A maior conquista de um arquiteto é o projeto de seu próprio [concept_gaudi_custom_monument]. Isso só é possível com um [concept_gaudi_great_architect]."
 concept_douglas_mountaineering: "Montanhismo"
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters up to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering."
 concept_gaudi_great_architect: "#PURPLE #b Grande arquiteto#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Grandes Arquitetos#!#!"
 concept_gaudi_great_architect_desc: "#b Grandes Arquitetos#! são [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] considerados as mentes mais importantes em seu campo. #b Os arquitetos#! que atingirem 500 [concept_artists_experience] se tornarão #b Grandes Arquitetos#!. Se um artista atingir essa classificação especial, ele poderá projetar a planta de um [concept_gaudi_custom_monument] realmente excepcional que incorpore o espírito da nação."
 concept_gaudi_monuments: "Monumentos em #R Morgenröte#!"
 concept_gaudi_monuments_desc: "Muitas nações receberam novos #b Monumentos#! em [concept_morgenroete]: a #b Catedral de Colônia#! na Alemanha, a #b Gotthardbahn#! na Suíça, o #b Cristo Redentor#! no Brasil, a #b Mole Antonelliana#! na Itália, o #b Palácio de Verão#! na China, a #b Sagrada Família#! na Espanha, o #b Schloss Neuschwanstein#! na Baviera, o #b Palacio de Bellas Artes#! no México e o #b Palácio Gyeongbokgung#! na Coreia.\nTodos os edifícios, exceto o #b Summer Palace#! e o #b Campanile#!, precisam ser construídos por seus proprietários; o #b Saxon Palace#! pode ser reativado por uma nação polonesa. Também há novos monumentos no início do jogo, como os #b Budas de Bamiyan#! ou o #b Palácio de Potala#!\nTambém há a possibilidade de ter um [concept_gaudi_custom_monument] projetado por um [concept_gaudi_great_architect].\n\nAo contrário do jogo original, os #b Monumentos#! não são construídos diretamente, mas por meio de uma decisão. A construção ocorre em vários estágios, dependendo do tamanho do edifício, e pode levar anos ou até décadas - e é significativamente mais cara."
 concept_athletes_athlete: "Atleta"
 concept_athletes_athletes: "Atletas"
 concept_athletes_athlete_desc: "Em [concept_morgenroete] #b  Athletes#! são personagens especiais que permitem que você use determinadas mecânicas do mod.#b Athletes#! geralmente são criados por meio de eventos ou de um botão. Como outros personagens, os atletas #b #! possuem experiências que garantem maior sucesso em seu campo.\nAtualmente, existem estes atletas #b #! :\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "Arquiteto independente"
 concept_gaudi_independent_architects: "Arquitetos Independentes"
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] que não são contratados por um país são os #b Independent Architects#!.\nAo contrário de muitos outros artistas, há poucas exigências para recrutar um #b Independent Architect#!, exceto por um requisito tecnológico mínimo. Eles são verdadeiros viajantes globais e geralmente exigem apenas um bom pagamento."
 concept_gaudi_architectural_blueprint: "Projeto arquitetônico"
 concept_gaudi_architectural_blueprints: "Projetos Arquitetônico"
 concept_gaudi_architectural_blueprint_desc: "Architectural blueprints can be researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. They are essential for the construction of special [concept_gaudi_blueprint_buildings] that can only be erected once in a nation. There are a total of 15 different buildings in five different categories. Certain blueprints require technologies to be researched. Since research can sometimes take years, it's wise to decide beforehand which blueprints are most important. The buildings can potentially be constructed in any state, but require a certain level of urbanization. In some cases, there may be additional requirements."
 concept_gaudi_blueprint_buildings: "Edifícios de planta"
 concept_gaudi_blueprint_buildings_desc: "Blueprint buildings are buildings which need a bluprint researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. These buildings can only be built once in a nation. There are 15 different buildings:\n\n#b Monument#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Public Square#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Service Buildings#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Health Institutions#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b National Academies#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "Monumento personalizado"
 concept_gaudi_custom_monument_desc: "Um monumento personalizado é a maior obra-prima possível do [concept_gaudi_architect]. Ele pode competir com outros monumentos comuns. Somente um [concept_gaudi_great_architect] pode elaborar tais planos. Ele exige pesquisa das mais modernas tecnologias arquitetônicas. O tipo de monumento que um arquiteto projeta depende muito de seu estilo arquitetônico. Os arquitetos da Art Déco projetam o [GetBuildingType('building_gaudi_people_monument').GetName], os arquitetos da Bauhaus o [GetBuildingType('building_gaudi_people_forum').GetName] e os arquitetos neoclássicos o [GetBuildingType('building_gaudi_people_palace').GetName]."
 concept_douglas_mountaineer: "Montanhista"
 concept_douglas_mountaineers: "Montanhistas"
 concept_douglas_mountaineer_desc: "#b Mountaineers#! are [Concept('concept_athletes_athlete','$concept_athletes_athletes$')] who can climb unconquered [concept_douglas_mountain_summit]. They can be recruited against [concept_douglas_alpine_heritage] after the establishment of a mountaineering club. Countries with geographical features such as mountains, peaks, or volcanoes therefore have an advantage in recruitment. Mountaineering traits and experience are the most important factors for progress in conquering a mountain or overcoming a dangerous situation."
 concept_vikelas_olympian: "Olímpico"
 concept_vikelas_olympian_desc: "#n Esta entrada está sendo revisada.#!"
 concept_douglas_mountain_summit: "Cume da Montanha"
 concept_douglas_mountain_summits: "Cumes da Montanha"
 concept_douglas_mountain_summit_desc: "Mountain Summits are the coveted goal of all mountaineers. They mark the highest point of a mountain. Each summit has three distinct attributes that define how difficult it is to reach successfully.\n\n#V Height#!: Height determines how many steps are required to climb a mountain—this reflects the overall length of an expedition. For every 1,000 meters, one progress step is needed. The value is rounded up, meaning that the 4,421-meter-high Mount Whitney requires 5 steps, while the 7,134-meter-high Kauffmann Peak demands 8. A mountain's prestige is calculated based on its height: the total height is divided by 300. Thus, an ideal mountain of 4,500 meters grants 15 prestige.\n\n#V Level#!: A mountain's level represents the equipment demands necessary to climb it. This is not strictly tied to its height. For example, despite its 5,636 meters, Citlaltépetl is only Level 1 and requires just basic equipment. In contrast, the Matterhorn, at only 4,478 meters, is considered significantly more demanding at Level 3, requiring at least first aid preparation for Alpine emergencies.\n\n#V Risk#!: A mountain's risk level indicates the likelihood of negative events affecting an expedition. It is independent of both height and level. Avalanches, fog, and severe weather are key concerns. Popocatépetl could be ascended already in early modern times due to its hospitable surroundings. In contrast, the much smaller Großvenediger, at just 3,666 meters, still posed a serious threat to Austrian expeditions well into the early 19th century.\n\nMore information about individual summits can be found under the [concept_douglas_mountain_summit_list] section."
 concept_douglas_mountain_range: "Cordilheira"
 concept_douglas_mountain_ranges: "Cadeias Montanhosas"
 concept_douglas_mountain_range_desc: "Uma cadeia de montanhas é definida como uma formação montanhosa que oferece potencial para [concept_douglas_mountaineering] treinamento em longas distâncias. As cadeias de montanhas clássicas incluem as Montanhas Rochosas, os Andes, os Alpes e o Cáucaso. Ao contrário das [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] que devem ser conquistadas, há também muitas montanhas menos desafiadoras em que não há risco de uma [concept_douglas_mountaineer] queda fatal. Em vez disso, elas devem ser vistas como uma rota de treinamento. Os países com cadeias de montanhas têm maior probabilidade de produzir montanhistas do que aqueles sem essa característica geográfica."
 concept_douglas_alpine_heritage: "Patrimônio Alpino"
 concept_douglas_alpine_heritage_desc: "Patrimônio Alpino é um termo coletivo para uma conexão com as montanhas e uma especialização em escalar montanhas. Também se refere ao potencial de recrutar novos [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]- já que, na maioria dos casos, os montanhistas experientes vêm de áreas montanhosas. Isso sempre dá aos países com [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] ou [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] uma vantagem. O recrutamento de um novo montanhista, assim como várias outras ações, custa ao Patrimônio Alpino."
 concept_douglas_mountain_summit_list: "Lista de cumes de montanhas"
 concept_douglas_mountain_summit_list_desc: "There are many [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), Height 5642 meters, Level 4\n#b Dufourspitze#! (West Switzerland), Height 4634 meters, Level 2\n#b Matterhorn#! (West Switzerland), Height 4478 meters, Level 3\n#b Aiguille Verte#! (Savoy), Height 4122 meters, Level 3\n#b Pico de Aneto#! (Aragon), Height 3404 meters, Level 1\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Mount Kenya#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), Height 4095 meters, Level 1\n\n#V Asia:#!\n#b Kamet#! (Delhi), Height 7756 meters, Level 4\n#b Chogolisa#! (Kashmir), Height 7665 meters, Level 5\n#b Kabru#! (Himalayas), Height 7412 meters, Level 5\n#b Kaufmann Peak#! (Tajikistan), Height 7134 meters, Level 4\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), Height 4121 meters, Level 2\n#b Mount Cook#! (South Island), Height 3724 meters, Level 2"
 concept_panum_disease_description_describe: "describe"
 concept_panum_disease_description_described: "described"
 concept_panum_disease_treatment_treat: "treat"
 concept_panum_disease_treatment_treated: "treated"
 concept_roy_ethnologist: "#b #BLUE Ethnologist#!#!"
 concept_roy_ethnologists: "#b #BLUE Ethnologists#!#!"
 concept_roy_ethnologist_desc: "#n Coming soon to Morgenröte!#!"
 ag_morgenroete_desc: "We have open alerts from the [concept_morgenroete] Mod."
 concept_tesla_engineer: "#b #ORANGE Engineer#!#!"
 concept_tesla_engineers: "#b #ORANGE Engineers#!#!"
 concept_tesla_civil_engineer: "#b #ORANGE Civil Engineer#!#!"
 concept_tesla_civil_engineers: "#b #ORANGE Civil Engineers#!#!"
 concept_tesla_civil_engineering: "#b #ORANGE Civil Engineering#!#!"
 concept_tesla_mechanical_engineer: "#b #ORANGE Mechanical Engineer#!#!"
 concept_tesla_mechanical_engineers: "#b #ORANGE Mechanical Engineers#!#!"
 concept_tesla_mechanical_engineering: "#b #ORANGE Mechanical Engineering#!#!"
 concept_tesla_military_engineer: "#b #ORANGE Military Engineer#!#!"
 concept_tesla_military_engineers: "#b #ORANGE Military Engineers#!#!"
 concept_tesla_military_engineering: "#b #ORANGE Military Engineering#!#!"
 concept_tesla_electrical_engineer: "#b #ORANGE Electrical Engineer#!#!"
 concept_tesla_electrical_engineers: "#b #ORANGE Electrical Engineers#!#!"
 concept_tesla_electrical_engineering: "#b #ORANGE Electrical Engineering#!#!"
 concept_tesla_aeronautical_engineer: "#b #ORANGE Aeronautical Engineer#!#!"
 concept_tesla_aeronautical_engineers: "#b #ORANGE Aeronautical Engineers#!#!"
 concept_tesla_aeronautical_engineering: "#b #ORANGE Aeronautical Engineering#!#!"
 concept_tesla_engineering: "Engineering"
 concept_tesla_engineering_desc: "#b Engineering#! is one of the main features of [concept_morgenroete].\n\nTo get access to #b Engineering#!, you need to have an [concept_tesla_engineer]. #b Engineers#! can start #b Engineering Projects#! depending on their specialization. There are five specialized #b Engineers#!:\n- The [concept_tesla_civil_engineer] focuses on improving the infrastructure of a country.\n- The [concept_tesla_mechanical_engineer] focuses on mechanical inventions that benefit the industry, for example.\n- The [concept_tesla_military_engineer] focuses on improving the army and navy of a country.\n- The [concept_tesla_electrical_engineer] focuses on improving the electrical infrastructure of a country.\n- The [concept_tesla_aeronautical_engineer] focuses on making human flight possible and improving airplanes and other aircraft."
 concept_tesla_engineer_desc: "#b #ORANGE Engineers#!#! are Academics that will help with the construction of special buildings by providing expertise.\nAdditionally #b #ORANGE Engineers#!#! will provide a bonus to the [concept_technology_spread] of your nation. The bonus depends on how many nations have more technologies researched than your nation."
 concept_tesla_civil_engineer_desc: "#b Civil Engineers#! focus on improving the infrastructure of a country.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to states that raise [concept_infrastructure], to improve your #b Construction Sectors#! or to research [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_mechanical_engineer_desc: "#b Mechanical Engineers#! focus on mechanical innovations that improve your industry, machines or the lives of your population.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to your industrial building that improve [concept_throughput], [concept_good_production] and [concept_input_mult], to improve your #b Railways#! with new locomotives or to research industrial [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_military_engineer_desc: "#b Military Engineer#! focus on improving our army and navy by introducing new innovations.\nThey can start #b Engineering Projects#! to gain new [Concept('concept_mobilization_option','$concept_mobilization_options$')] by inventing weapons, new field works and better tanks or to research military or naval [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_electrical_engineer_desc: "#b Electrical Engineer#! focus on improving your country with electrical innovations.\nThey can start #b Engineering Projects#! to research the geomagnetic field of the Earth, to build telegraph or radio networks or to research electrical [Concept('concept_technology', '$concept_technologies$')]."
 concept_tesla_aeronautical_engineer_desc: "#b Aeronautical Engineer#! focus on developing means to fly and improving airplanes and Zeppelins.\nThey can start #b Engineering Projects#! to add [Concept('concept_modifier','$concept_modifiers$')] to your #V Airports#! that improve [concept_throughput], [concept_good_production] and [concept_input_mult], to unlock #V Advanced Aircraft#! as [Concept('concept_mobilization_option','$concept_mobilization_options$')] or to research aviation [Concept('concept_technology', '$concept_technologies$')]."
 concept_vikelas_national_sport: "National Sport"
 concept_vikelas_national_sport_desc: "Any country can declare one of the following sports as its national sport: cricket, baseball, football, or basketball. Three of these four sports (the exception being cricket) were only invented during the 19th century. The country that first invents a sport is considered the 'mother country' of that sport. From this point on, sports spread throughout the world, but not under the same conditions: the spread of cricket and baseball is more limited, while that of football and basketball is subject to less stringent conditions. Sports can be spread by an overlord among subjects to improve relations. Different sports can coexist within a country, but to spread nationwide in every sports facility, they must be a national sport."
 concept_theiler_microorganism: "Microorganism"
 concept_theiler_microorganisms: "Microorganisms"
 concept_theiler_microorganism_desc: "Microorganisms are tiny organisms like bacteria, viruses and single celled organisms.\nThey can be found by a [concept_theiler_biologist] through the $je_theiler_microorganism_research$ [concept_journal_entry] which Biologists conduct when they are not busy.\nMicroorganisms can mainly be used to discover [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] which help a country to protect their population from [Concept('concept_panum_disease','$concept_panum_diseases$')]."
 concept_theiler_biology: "Biology"
 concept_theiler_biology_desc: "In [concept_morgenroete], #b Biology#! plays a vital supporting role in the medical and agricultural sectors. Microbiological studies are particularly important: a [concept_theiler_biologist] can identify [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], especially [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]. The latter is useful for developing [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Vaccines can completely prevent the onset of [Concept('concept_panum_disease','$concept_panum_diseases$')] if the healthcare system is well-developed. Furthermore, biologists are useful in [concept_theiler_pest] control, such as combating the codling moth, and improve the output of agricultural businesses."
 concept_ito_medicinal_plants: "Medicinal Plants"
 concept_ito_medicinal_plants_desc: "Medicinal Plants are plants that have medicinal properties which can be used to create pharmaceuticals and other useful chemicals.\nYou can gather Medicinal Plants by sending a [concept_dubois_naturalist] on a [concept_dubois_botanical_expedition]. Once enough Medicinal Plants are gathered a [concept_mendelejew_chemist] can start to isolate the chemical substance. Once that is done a [concept_theiler_biologist] will be able to start producing a pharmaceutical."
 concept_academics_academic_confusion: "Academic Confusion"
 concept_academics_academic_confusion_desc: "Changing the [concept_academics_university_specialization] of a University will lead to many confused academics. This will result in a reduction of the scientific output for a short period of time."
 concept_academics_experience_civil_engineer: "Civil Engineer Experience"
 concept_academics_experience_mechanical_engineer: "Mechanical Engineer Experience"
 concept_academics_experience_military_engineer: "Military Engineer Experience"
 concept_academics_experience_electrical_engineer: "Electrical Engineer Experience"
 concept_academics_experience_aeronautical_engineer: "Aeronautical Engineer Experience"
 concept_academics_experience_chemist: "Chemist Experience"
 concept_academics_experience_astronomer: "Astronomer Experience"
 concept_academics_experience_physicist: "Physicist Experience"
 concept_academics_experience_geologist: "Geologist Experience"
 concept_academics_experience_paleontologist: "Paleontologist Experience"
 concept_academics_experience_naturalist: "Naturalist Experience"
 concept_academics_experience_biologist: "Biologist Experience"
 concept_academics_experience_physician: "Physician Experience"
 concept_academics_experience_archaeologist: "Archaeologist Experience"
 concept_academics_experience_anthropologist: "Anthropologist Experience"
 concept_academics_experience_tethnologist: "Ethnologist Experience"
 concept_academics_experience_experienced: "Experienced"
 concept_academics_experience_famous: "Famous"
 concept_andersson_anthropologist: "#b #BLUE Anthropologist#!#!"
 concept_andersson_anthropologists: "#b #BLUE Anthropologists#!#!"
 concept_andersson_anthropologist_desc: "#b #BLUE Anthropologists#!#! are academics who study human prehistory, both in the paleontological and archaeological senses. They search for [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')], [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')], find new human species and reconstruct [Concept('concept_andersson_skeleton','$concept_andersson_skeletons$')]. Anthropologists often work as speleologists (cave explorers) and, over time, can develop a wide range of specializations. These include categories such as monogenists, polygenists, diffusionists and evolutionists, whose voting behaviour at conferences often determines the outcome. Particularly skilled anthropologists can reform existing anthropological terminology of the [concept_andersson_human_evolution] or shed light on the Piltdown fraud."
 concept_andersson_human_fossil: "Human Fossil"
 concept_andersson_human_fossils: "Human Fossils"
 concept_andersson_human_bones: "Human Bones"
 concept_andersson_human_fossil_desc: "There are essentially two types of #b Human Fossils#!: non-specific fossils and specific fossils. Non-specific fossils are all remains of human biology, including those of a recent nature from historical times. They can also be found by people other than anthropologists, but are important, for example, for the establishment of the [GetBuildingType('building_andersson_institute').GetName]. Specific human fossils belong to one of four groups: Neoanthropus, Palaeanthropus, Pithecanthropus, Australopithecus. They can be found during a hominid survey or a hominid expedition. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] may also discover entirely new types in the process. There are a total of 16 different specific human fossils. [Concept('concept_andersson_skeleton','$concept_andersson_skeletons$')] can also be reconstructed from them to trace [concept_andersson_human_evolution]."
 concept_andersson_cave: "Cave"
 concept_andersson_caves: "Caves"
 concept_andersson_cave_desc: "#b Prehistoric Caves#! are a place where early human or pre-human species have left [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]. They therefore provide a bonus when conducting anthropological research. Caves can be discovered and explored by [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. Some Caves are also unlocked through historical events."
 concept_andersson_human_evolution: "Human Evolution"
 concept_andersson_human_evolution_desc: "In the Victorian era, there was a tendency to classify [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and evolutionary stages according to their higher level of development. A distinction was drawn between the 'gifted' Homo sapiens, endowed with artistic talent, and their more coarse-featured ancestors or ape-like counterparts. Thus, the precursors of humanity were divided into categories such as Neoanthropus (True Man), Palaeanthropus (Cave Man) and Pithecanthropus (Ape-Man); the latter represented the actual 'missing link' between animals and humans. Although these concepts were frequently rejected by later scholarship, they served as an initial point of reference for further research into the early history of humankind. The discovery of Australopithecus (Southern Ape) in Africa was therefore, for a number of reasons, one that shook the established view."
 concept_andersson_prehistoric_artifact: "Prehistoric Artifact"
 concept_andersson_prehistoric_artifacts: "Prehistoric Artifacts"
 concept_andersson_prehistoric_artifact_desc: "#b Prehistoric Artifacts#! provide evidence of human presence in a [concept_andersson_cave] or other archaeological sites. Unlike non-specific [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')], they directly give [concept_andersson_anthropological_prestige]. In rare cases, they are also required for exhibitions on human life during the Neolithic, Mesolithic or Upper Palaeolithic periods. An [concept_andersson_anthropologist] with the [concept_lepsius_archaeologist] trait finds more prehistoric artifacts during an anthropological research."
 concept_andersson_skeleton: "Prehistoric Skeleton"
 concept_andersson_skeletons: "Prehistoric Skeletons"
 concept_andersson_skeleton_desc: "Reconstructing a #b Prehistoric Skeleton#! requires the construction of a [GetBuildingType('building_andersson_institute').GetName]. Once [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] have found five [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] of a specific species, they can begin the reconstruction - the anthropologist's [Concept('concept_character_trait','$concept_character_traits$')] and experience affect the duration of the process. The first skeleton of a Neoanthropus, Palaeanthropus or Pithecanthropus activates the respective production method in the institute. However, an anthropologist can also easily reconstruct the other skeletons, provided they have the fossils, in order to gain further [concept_andersson_anthropological_prestige]."
 concept_lepsius_minor_excavation_site: "Minor Excavation Site"
 concept_lepsius_minor_excavation_site_desc: "Besides the large [Concept('concept_lepsius_excavation_site', '$concept_lepsius_excavation_sites$')], which are potentially usable by all countries internationally via licenses and offer Egyptian, Mesopotamian, Aegean, and pre-Columbian [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], there are also 'smaller' excavation sites. These are only usable by the owner and contain only local artifacts. They are unlocked via a Journal Entry, which usually requires an [concept_lepsius_archaeologist] and special technology. Only then is the excavation site actually activated, visible through a State Trait in the State Region. After activation, Minor Excavation Sites generate an additional Local Artifact as long as the archaeologist is conducting an archaeological project. Examples of such excavation sites are Pompeii, Tikal, or Harappa."
