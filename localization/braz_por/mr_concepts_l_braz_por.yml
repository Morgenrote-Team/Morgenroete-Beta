l_braz_por:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "Temos pelo menos uma ação possível para um recurso [concept_morgenroete]."
 concept_morgenroete: "#r Morgenröte#!"
 concept_morgenroete_mr: "SENHOR"
 concept_morgenroete_concept: "Conceito"
 concept_pm_academics_university_humanities: "#b #BLUE Foco em Humanidades-Antropológica#!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN Foco em História Natural#!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE Foco em Matemática-Técnica#!#!"
 concept_academics_university_specialization: "Foco Universitário"
 concept_academics_academic: "Acadêmico"
 concept_academics_academics: "Acadêmicos"
 concept_academics_scientist: "Cientista"
 concept_academics_scientists: "Cientistas"
 concept_academics_academic_desc: "In [concept_morgenroete] #b Academics#! are special characters that allow you to use certain mechanics of the mod. You can get #b Academics#! in some events or by aquiring enough [concept_academics_progress].\nCurrently these #b Academics#! exist:\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_lepsius_anthropologist]"
 concept_academics_progress: "Progresso acadêmico"
 concept_academics_progress_desc: "Ao adquirir 360 #b Progresso Acadêmico #! Você pode obter um novo [concept_academics_academic]. Para ter acesso ao #b Progresso Acadêmico #!, você deve ter a tecnologia #b academia_1 e pelo menos um #b University#!. Quanto mais #!1 você tiver, mais rápido você obtém #b Progress#!, por exemplo. Outro fator é a porcentagem de pops acadêmicos em seu país. Você obterá o máximo de progresso acadêmico #b para #!6 2%#! ou mais pops acadêmicos. Escolas melhores e uma intelligentsia feliz também ajudam a obter #b Progresso Acadêmico #!. Por fim, alguns dos focos de tecnologia e edifícios especiais como o [concept_academics_academic]0 ou o [concept_academics_academic]1 fornecerão também #b Progress#! adicionais."
 concept_academics_scientific_society: "Sociedade Científica"
 concept_academics_scientific_societies: "Sociedades científicas"
 concept_academics_scientific_society_desc: "A Sociedade Científica #b §1 é uma sociedade de seus países mais brilhantes. Representa cientistas e acadêmicos de seus países e permite que você visite seu [Concept('concept_academics_academic','$concept_academics_academics$')]."
 concept_academics_experience: "Experiência"
 concept_academics_experience_desc: "Alguns acadêmicos reúnem #b Experience#! durante sua vida. Em [concept_morgenroete], os caracteres recebem #b Experience#! quando são criados. Geralmente eles recebem 10 #b Experience#! para cada ano com mais de 30. \ nadditionalmente eles ganham #b Experience#! fazendo seu trabalho, por exemplo, para encontrar novos [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. Eles ganham #b Experience#! também passivamente a cada ano. Se um caractere atingir 300 #b Experience#!, ele obtém o #b Trait#! \ nA maior a experiência #b §1 de um personagem, melhor o trabalho deles. Um §22 experiente ou famoso, por exemplo, encontra mais [concept_morgenroete]3 e é melhor na construção de um [concept_morgenroete]4."
 concept_academics_academic_mission: "Missão Acadêmica"
 concept_academics_academic_missions: "Missões Acadêmicas"
 concept_academics_mission: "Missão"
 concept_academics_missions: "Missões"
 concept_academics_academic_mission_desc: "Seu [concept_academics_scientific_society] às vezes pede que você atinja um determinado objetivo. Tais objetivos podem ser encontrar uma quantidade específica de [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ou coisas semelhantes. Outras missões #b podem precisar que você encontre o Planeta X ou para obter um [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]. \ N."
 concept_curtiss_aviation: "Aviação"
 concept_curtiss_aviation_desc: "#b aviação #! é um dos principais recursos de [concept_morgenroete]. O século XIX e XX viram a ascensão do vôo humano. Primeiro na forma de #b Balloons#! e #b aeroxersos #!, depois com #b planos#!. Voar era uma atividade de prestígio e permitiu alcançar novos horizontes. A quebra de um dos recorros dará ao seu país um impulso de tecnologia, bem como um modificador de prestígio. \ NRESE Pesquisando a tecnologia Zeppelin permitirá que você conduza um #!0 se tiver acesso ao Pólo Norte e um #!1. Você poderá construir #!2 que produza o novo #b voos #! bom, bem como #b Services#!. O aeroporto #b #! permitirá que um #!9 cresça, o que permitirá que você use a ação diplomática §20. A Convenção do Espaço Aéreo #b permitirá que você obtenha acesso aos Estados e [concept_morgenroete]3, bem como ao Pólo Norte. Se a sua companhia aérea #b crescer o suficiente, você poderá construir um dirigível gigantesco ou o maior avião do mundo. O Troféu Schneider #b é uma corrida de hidroaviões na qual diferentes países competem. Se você ganhar, também receberá prestígio e sediará o próximo evento. E se você conseguir vencer a corrida 3 vezes, manterá o #b Schneider Trophy#!."
 concept_curtiss_balloonist_role: "Papel balonista"
 concept_curtiss_balloonist_role_only_balloonist: "Balonista"
 concept_curtiss_balloonists_role: "Balonistas"
 concept_curtiss_balloonist_role_desc: "Um #b Balonista#! é um personagem especial que pode ser patrocinado por uma nação. Geralmente, países bem desenvolvidos ou ocidentais patrocinam #b Balonistas#! e competem por recordes e novas descobertas. Os #b Balonistas#! realizam voos aleatoriamente e obtêm recordes de maior distância, maior tempo de voo ou maior altitude. A cada voo de balão, o #b Balonista#! ganha experiência e sobe de classificação, o que aumenta a chance de novos recordes. Mas esteja ciente de que o balonismo é um negócio perigoso e muitos balonistas morrem cedo, especialmente se estiverem doentes, forem alcoólatras ou usuários de drogas."
 concept_curtiss_arctic_expedition: "Expedição Ártica"
 concept_curtiss_arctic_expeditions: "Expedições do Ártico"
 concept_curtiss_arctic_expedition_desc: "Se você pesquisou a tecnologia #b Zeppelin_1, tenha um [concept_verrier_observatory] com uma estação meteorológica #b, um [concept_curtiss_pilot] e acesso a um estado próximo ao Pólo Norte, você pode realizar uma expedição #b do Ártico §1. Você pode esses estados são #b Greenland#!, #b Norway#!, #b Alaska#!, #b Nunavut#! e #b nenetsia#!. Você pode ter acesso ao possuir o estado ou ter um #!8 com o proprietário."
 concept_curtiss_pilot: "Piloto"
 concept_curtiss_pilots: "Pilotos"
 concept_curtiss_pilot_desc: "A #b pilot#! é um caractere com o traço piloto #b #!. #b Pilots#! tem uma baixa chance de desova após a descoberta #b da aviação precoce. Além disso, em batalhas em uma frente usando reconhecimento aéreo como método de produção, há uma chance de que um pilot#! #b emerge da batalha por meio de um evento. Melhores tecnologias como aviões e aviação moderna, mas também o estabelecimento de uma escola piloto por meio de decisões permite uma melhor chance de um personagem ter a característica pilot#!. #b Airlines#! pode estar interessado em #b pilots#! para aumentar sua imagem; Na batalha pelo #!8, os pilotos #b experientes têm uma chance melhor; e um #b pilot#! é necessário para realizar o #b3. #b Pilots#! também pode ser atualizado para a ACE Pilots por meio de um evento se forem implantados na frente."
 concept_curtiss_airport: "Aeroporto"
 concept_curtiss_airports: "Aeroportos"
 concept_curtiss_airport_desc: "Um aeroporto #b é um edifício desbloqueado pela tecnologia de aviação moderna #b. É um edifício puramente civil e fornece serviços [GetGoods('air_travel').GetName] e #b #!, mas consome uma variedade de mercadorias a partir de [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] e #!0. Posteriormente, ele precisa de #!1, #!2 e #!3 também. \ Nif que você tiver #b aeroportos suficientes #!6 será fundado e, com seus crescentes aeroportos #b, a linha aérea #b crescerá também e oferecerá mais bônus."
 concept_curtiss_airline: "Companhia aérea"
 concept_curtiss_airlines: "Companhias aéreas"
 concept_curtiss_airline_desc: "Uma companhia aérea #b é uma empresa ou uma instituição de administração do governo que oferece [GetGoods('air_travel').GetName] do nível local até voos internacionais no final do jogo. #b Airlines#! também fornece vários outros bônus. #b Airlines#! precisa [Concept('concept_curtiss_airport','$concept_curtiss_airports$')] para conduzir esses voos. Se você cultivar seus aeroportos #b, o mesmo acontecerá com as companhias aéreas #b. Se a sua companhia aérea #b for de propriedade pública ou privada, você poderá ter a chance de criar o maior avião já criado."
 concept_curtiss_airspace_convention: "Convenção do espaço aéreo"
 concept_curtiss_airspace_conventions: "Convenções do espaço aéreo"
 concept_curtiss_airspace_convention_desc: "A Convenção do Espaço Aéreo #b é um [concept_diplomatic_pact] importante que permite que você interaja com regiões distantes da sua influência. Se você tiver uma Convenção do Espaço Aéreo #b com outra nação que possui um [concept_lepsius_excavation_site], poderá realizar um [concept_lepsius_expedition] sem ter um [concept_active_interest] na região."
 concept_curtiss_schneider_trophy: "Troféu Schneider"
 concept_curtiss_schneider_trophy_desc: "A luta por esse prestigiado troféu, que o francês Jacques Schneider doou pouco antes da Primeira Guerra Mundial, pretendia principalmente estimular o desenvolvimento de hidroaviões. Com o tempo, a corrida para esse troféu se tornou uma corrida de nações, com o Reino Unido, EUA e Itália, em particular, dando a suas equipes apoio maciço para ganhar o cobiçado troféu. De fato, o desenvolvimento tecnológico se beneficiou do #b Schneider Trophy#! usando hidroaviões cada vez mais rápidos e avançados. fatores. Uma nação com uma escola piloto e um grande [concept_curtiss_airline] terá uma vantagem, por exemplo. Um ótimo [concept_curtiss_pilot] e financiamento maciço também ajudarão a ganhar o troféu. Ganhar o troféu três vezes seguidas é ainda melhor, pois o país manterá o troféu para sempre e receberá um bônus de prestígio por isso."
 concept_curtiss_balloonist: "Balonista"
 concept_curtiss_balloonist_desc: "Esse personagem é um balonista que costuma sair em passeios de balão aventureiros."
 concept_curtiss_experienced_balloonist: "Balonista experiente"
 concept_curtiss_experienced_balloonist_desc: "Esse personagem é um balonista experiente que costuma sair em passeios de balão aventureiros. Os personagens com essa característica têm uma chance maior de definir melhores registros."
 concept_curtiss_famous_balloonist: "Balonista famoso"
 concept_curtiss_famous_balloonist_desc: "Esse personagem é um famoso balonista que costuma fazer passeios de balão aventureiros. Os personagens com essa característica têm uma chance maior de definir melhores registros."
 concept_dubois_natural_history: "História natural"
 concept_dubois_natural_history_desc: "#b HISTÓRIA NATURAL#! é uma das principais características de [concept_morgenroete]. O século XIX viram muitas grandes descobertas de história natural: muitas grandes expedições, como a do Beagle, a invenção da teoria da evolução, a descoberta de centenas de milhares de novas espécies e, é claro, a descoberta de dinossauros. Em uma expedição #b do Pacífico #!, você pode encontrar plantas, animais e fósseis raros, conduzir pesquisas oceanográficas ou observar fenômenos astronômicos, como eclipses solares. Quanto mais animais, maior o efeito o #b zoo#! tem. Você pode encontrar aqueles animais #b #! em expedições, você pode colecioná -las em seu próprio território ou pedir a outros países que os vendam. A #!3 pode coletar tais #b amostras -1. A #!6 #b Naturalist#!#! pode ser enviado em #!9 aos estados com um modificador de estado da floresta tropical. Caso você não tenha esse estado, você pode adquirir um [concept_morgenroete]0 de outro país. A #!6 #b Naturalist#!#! ganhará [concept_morgenroete]4 quando encontrarem espécimes raros. \ N \ n[concept_morgenroete]5 são o campo de um [concept_morgenroete]6, sejam fósseis de plantas, insetos ou outros pequenos animais. #b Fossils#! pode ser encontrado nas expedições #b #! ou em estados com [concept_dubois_pacific_expedition]1. Se você tiver um #b Great Formation#!, poderá até encontrar [concept_dubois_pacific_expedition]4. E, caso contrário, você pode acessar um comprando um [concept_dubois_pacific_expedition]5."
 concept_dubois_naturalist: "#b #GREEN Naturalista#!#!"
 concept_dubois_naturalists: "#b #GREEN Naturalistas#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN Naturalist#!#! são acadêmicos que podem reunir [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] e [concept_dubois_specimen]. Eles podem ser enviados para um [concept_dubois_pacific_expedition] ou um [concept_dubois_botanical_expedition], onde podem encontrar plantas e animais raros que lhe dão um pequeno bônus. #b #GREEN Naturalists#!#! Ganho #GREEN0 Quando encontram novos espécimes raros."
 concept_dubois_paleontologist: "#b #GREEN Paleontologista#!#!"
 concept_dubois_paleontologists: "#b #GREEN Paleontólogos#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN Paleontologists#!#! são acadêmicos que procurarão para [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] e [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Para colecioná -los, você precisa acessar um [concept_dubois_formation]. Se você tiver acesso a uma formação #b #!, possuindo você mesmo ou com um [concept_dubois_paleontological_licence], poderá enviar seu paleontologista #b em um #GREEN1. Como #b #GREEN Paleontologists#!#! Ganho #!#!0, eles melhorarão na reconstrução de #b esqueletos de dinossauros #! e o mesmo será o #b esqueletons#!. Quanto melhor os esqueletos de dinossauros #b, mais prestígio seu #!#!7 fornecerá."
 concept_dubois_pacific_expedition: "Expedição do Pacífico"
 concept_dubois_pacific_expeditions: "Expedições do Pacífico"
 concept_dubois_pacific_expedition_desc: "Como uma grande ou grande potência, você pode enviar uma expedição ao Oceano Pacífico. Você precisa ter o empirismo #b #!, #b Friga de parafuso Tecnologia dialética #b Tecnologia pesquisada, você precisa de uma porta e uma universidade, além de uma marinha de pelo menos 15 e um almirante. eclipses. No início da expedição #b, você também pode escolher um #b cientista #! para sua expedição, seja um Surveyor #b #!,6, #!,7 ou #!,8. Cada um ajudará a trazer melhores rendimentos em eventos específicos vinculados à sua experiência. Pode ser dedicado inteiramente aos mistérios do mar e melhorar seu conhecimento oceanográfico e astronômico; Nesse caso, apenas os eventos oceanográficos desencadearão. Se você explorar as maravilhas da natureza, será confrontado com eventos botânicos, zoológicos e paleontológicos. Os grandes poderes também terão a opção de realizar uma missão de prestígio, na qual você encontrará artefatos, estabelecer postagens comerciais ou configurar missões - especialmente úteis se você não tiver interesses diplomáticos na Oceania, mas quiser tentar adquirir pelo menos uma pequena colônia por meio de missionários. \ Nyou também terá escolhido para onde a sua missão viajará para: Oceania, Australia, Australia, \ Nyou. Cada um oferece eventos e recompensas diferentes."
 concept_dubois_habitat: "Habitat"
 concept_dubois_habitats: "Habitats"
 concept_dubois_animal_habitat: "Habitat animal"
 concept_dubois_habitat_desc: "A #b Habitat#! é uma região em um estado em que um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] específico vive. Em #r Morgenröte#! #b Habitats#! Para os vários animais existem em várias regiões estaduais. Se você possui um #b habitat#!, poderá transportar os animais #b #! para o #!1 ou até vendê -los para outros países. Extinção Você pode construir um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]0 em um estado com um #b habitat#!"
 concept_dubois_nature_reserve: "Reserva Natural"
 concept_dubois_nature_reserves: "Reservas naturais"
 concept_dubois_royal_hunting_reserve: "Reserva Real de Caça"
 concept_dubois_nature_reserve_desc: "A #b Nature Reserve#! é uma área protegida onde você pode proteger ou estabelecer [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]. \ N \ n. Se você já possui um #b habitat#!, pode protegê -lo da destruição pela influência dos seres humanos ao construir o #b Nature Reserve#! Construção no Estado com o #b Habitt§1. Para construir um #b Nature Reserve#!, você precisa ter a tecnologia #b genética #! da tecnologia desbloqueada e ter um estado incorporado com um #b habitat#! que é uma pátria de uma das suas culturas primárias. Genetics#! Tecnologia desbloqueada e pelo menos um [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]1 do seu continente em seu [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]2. \ N \ Na #b Nature Reserve#! não apenas protege seu animal #b Habitats#!, também permite que você liquifique #b animais exóticos #! de seu continente neles. Ao fazer isso, você pode proteger todos os animais exóticos #b do seu continente em um único estado."
 concept_dubois_zoo_animal: "Animal do zoológico"
 concept_dubois_zoo_animals: "Animais do zoológico"
 concept_dubois_exotic_animal: "Animal exótico"
 concept_dubois_exotic_animals: "Animais exóticos"
 concept_dubois_zoo_animal_desc: "Existem muitos animais no mundo que seu [concept_dubois_naturalist] pode pegar. Para capturar um #b exótico animal#!, você precisa de um estado com um [concept_dubois_habitat]. Como alternativa, você pode comprar um Animal Exótico §1 de um país com um #b habitat#! \ Nonce capturado, o #b Zoo Animal#! pode ser enviado ao seu #b0, que permitirá expandir o #b zoo#!."
 concept_dubois_zoo: "Zoológico"
 concept_dubois_zoos: "Zoológicos"
 concept_dubois_zoo_desc: "Um #b zoo#! é um edifício especial que você pode construir após a coleta de 5 [concept_dubois_zoo_animal]. O #b zoo#! abriga seus #b animais #!, sua coleção de [concept_dubois_specimen] e sua coleção paleontológica."
 concept_dubois_specimen: "Espécime"
 concept_dubois_specimens: "Espécimes"
 concept_dubois_specimen_desc: "Os vários insetos, plantas e animais menores que um [concept_dubois_naturalist] pode coletar, são chamados #b espécimen#!. Você pode usar a amostra #b para construir um jardim botânico ou coleta de amostras em seu [concept_dubois_zoo]."
 concept_dubois_botanical_expedition: "Expedição botânica"
 concept_dubois_botanical_expeditions: "Expedições botânicas"
 concept_dubois_botanical_expedition_desc: "Você pode enviar um [concept_dubois_naturalist] em uma expedição botânica #b se tiver a teoria §1 da evolução §2 e #b prevenção da malária §2 pesquisada e se você tiver acesso a uma floresta de um estado em um estado em um estado em que se acumular em uma floresta ou a aquisição de um número de §1. Expedição botânica #!. Mas às vezes eles encontram uma planta rara que será um ótimo complemento para a coleção botânica de um #b3."
 concept_dubois_botanical_licence: "Licença Botânica"
 concept_dubois_botanical_licences: "Licenças Botânicas"
 concept_dubois_botanical_licence_desc: "Se você não tiver acesso a um estado com o modificador do estado da floresta tropical, ainda poderá enviar um [concept_dubois_botanical_expedition] adquirindo uma licença botânica #b de um país que o faça. Você terá que pagar uma pequena quantia de dinheiro, mas isso permitirá que você colete [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] e encontre plantas raras."
 concept_dubois_fossil: "Fóssil"
 concept_dubois_fossils: "Fósseis"
 concept_dubois_fossil_desc: "Um [concept_dubois_paleontologist] pode descobrir #b fósseis #! de plantas e animais, que são extintos há muito tempo, se você descobriu um [concept_dubois_formation]."
 concept_dubois_dinosaur_bone: "Ossos de dinossauros"
 concept_dubois_dinosaur_bones: "Ossos de dinossauros"
 concept_dubois_dinosaur_bone_desc: "A [concept_dubois_paleontologist] pode encontrar ossos de dinossauros em Great [Concept('concept_dubois_formation','$concept_dubois_formations$')]. \ Nan #b Paleontologista experiente #! também pode tentar reconstruir um osso de dinossauro #b de 20 fragmentos [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Um osso do dinossauro #b só pode ser reconstruído se pelo menos um osso do dinossauro estiver disponível para orientação. Seu sucesso depende em grande parte do Paleontological [concept_academics_experience]. \ N#b Dinosaur Bones#! são usados ​​para reconstruir [Concept('concept_dubois_formation','$concept_dubois_formations$')]2."
 concept_dubois_dinosaur_skeleton: "Esqueleto de dinossauro"
 concept_dubois_dinosaur_skeletons: "Esqueletos de dinossauros"
 concept_dubois_dinosaur_skeleton_desc: "De cinco [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] de uma região continental, um [concept_dubois_paleontologist] pode reconstruir um dinossauro completo. Para reconstruir um esqueleto de dinossauro #b, você precisa de 5 #b ossos de dinossauros #! da mesma região. Caso contrário, você pode arriscar perder o prestígio para o seu [concept_dubois_paleontologist]0. No entanto, se um esqueleto de dinossauro §2 foi reconstruído errado, você pode tentar corrigi -lo, o que resultará em uma reconstrução um pouco melhor."
 concept_dubois_paleontological_collection: "Coleção Paleontológica"
 concept_dubois_paleontological_collections: "Coleções paleontológicas"
 concept_dubois_paleontological_collection_desc: "A coleção paleontológica #b é o reino do seu [concept_dubois_paleontologist]. Lá você encontrará todos os [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] e [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] da sua nação. Se o seu paleontologista #b montou os esqueletos #b horrivelmente errados, isso pode até fazer com que você perca o prestígio. Mas talvez o mesmo ou outro paleontologista #b possa remontá -los melhor!"
 concept_dubois_formation: "Formação"
 concept_dubois_formations: "Formações"
 concept_dubois_geological_formation: "Formação geológica"
 concept_dubois_formation_desc: "Existem dois tipos de #b formações #!, formações normais permitem que o seu [concept_dubois_paleontologist] colete [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], enquanto grandes formações permitem a descoberta de [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. \ N#b formação #! pode ser descoberto por seu paleontologista ou quando você pode ser possível, você não pode ser descoberto, que não pode ser descoberto, que não pode ser descoberto, que não pode ser descoberto."
 concept_dubois_paleontological_expedition: "Expedição paleontológica"
 concept_dubois_paleontological_expeditions: "Expedições paleontológicas"
