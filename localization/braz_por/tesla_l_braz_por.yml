 je_gaudi_magnetic_station: "Construir um Observatório Geomagnético"
 je_gaudi_magnetic_station_reason: "Com a ajuda dos instrumentos e instruções de Göttingen, nosso engenheiro montará o Observatório Geomagnético nos próximos dois anos. Trata-se de um empreendimento internacional: quanto mais dados de diferentes países forem enviados a Göttingen, mais rápido os cientistas de lá poderão obter novos insights sobre o campo magnético da Terra."
 je_gaudi_magnetic_station_progress_complete_tt: "O progresso atingiu #V 24#!."
 tesla_magnetic_station_progress_bar: "Progresso"
