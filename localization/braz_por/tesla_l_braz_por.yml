l_braz_por:
 tesla_prototype_mechanical_computer_modifier: "Protótipo de computador mecânico"
 tesla.223.t: "Um primeiro protótipo"
 tesla.223.d: "Na busca [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis] para construir um Computador Mecânico, o Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] conseguiu terminar um primeiro protótipo que pode executar cálculos simples. Embora não seja tão poderoso quanto um computador real, esse dispositivo pode ajudar nossos cientistas."
 tesla.223.f: "Ele ainda não é capaz de fazer todos os cálculos, mas pelo menos alguns. Adição, Subtração, Multiplicação e Divisão não devem ser um problema. Mas esteja ciente de que um dos meus assistentes quase perdeu o dedo, quando a máquina estava funcionando."
 tesla.223.g: "Espero que o [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] conclua mais do que apenas um protótipo..."
 tesla.224.t: "Aumento de recursos"
 tesla.224.d: "Parece que o Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] está cheio de ideias. Não passa um dia sem ajustes nos planos do Computador Mecânico. A única questão é se o projeto será concluído algum dia."
 tesla.224.f: "\"Mas imagine se ele também pudesse tocar música! Não seria ótimo?\""
 tesla.224.g: "Você poderia, por favor, montar esse computador?"
 tesla.224.h: "Ameaçar cortar financiamento"
 tesla.225.t: "Incêndio danifica computador mecânico"
 tesla.225.d: "Um grande incêndio danificou partes do computador mecânico do Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] e destruiu alguns planos para ele. Ainda não sabemos quanto isso vai atrasar o projeto."
 tesla.225.f: "O incêndio começou no módulo da impressora do computador. Ninguém sabe exatamente o que o causou, mas parece que a impressora produziu grandes quantidades de papel."
 tesla.225.g: "Esse computador será construído algum dia?"
 tesla.225.h: "Envie-lhes financiamento adicional."
