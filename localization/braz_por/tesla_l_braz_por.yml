 tesla_state_trait_irrigation: "Sistema de Irrigação"
 je_tesla_irrigation_project: "Sistema de Irrigação"
 tesla_states_with_irrigation_tt: "Todos os Estados  [GetPlayer.GetAdjective] possuem o traço de estado $tesla_state_trait_irrigation$ (atualmente [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 tesla_irrigation_project_finished_engineer_loc: "\nDr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] trabalhou no novos #b Sistemas de Irrigação#! de [GetPlayer.GetName] e foi capaz de estende-lo, o que melhorou massivamente nosso setor agrícola."
 gaudi.1111.t: "O Sistema de Irrigação de [GetPlayer.GetName]"
 gaudi.1111.d: "Nosso [concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] finalmente completou o projeto de construir um Sistema de Irrigação moderno em [GetPlayer.GetNameNoFormatting]. Agora que nos domamos os rios e trouxemos agua para os campos nossa agricultura certamente prosperará!"
 gaudi.1111.f: "\"Os rios selvagens agora estão domados. A magia desapareceu. Agora são apenas cursos d'água retos. Até o castor desapareceu...\""
 gaudi.1111.g: "Espero que isso não tenha consequências imprevistas..."
