 je_klimt_painter_trip: "Jornada educacional"
 je_klimt_painter_trip_reason: "Em um [concept_klimt_painter_trip], um pintor pode aprender um estilo artístico anteriormente desconhecido e, assim, melhorar o [concept_klimt_painting_tradition] anual. Eles também podem adquirir outras características positivas e negativas durante sua estadia em um [concept_artists_center_of_arts] estrangeiro."
 je_klimt_painter_trip_goal: "Normalmente, um pintor completa seus estudos em #G 12 meses §1 Eventos podem prolongar ou diminuir desta vez."
 je_klimt_secession: "A secessão art nouveau"
 je_klimt_secession_reason: "O novo movimento artístico de Art Nouveau atraiu inúmeros artistas. Sob certas condições, isso pode resultar em um movimento artístico estabelecido que desfruta de renome internacional e dá a pintura e arquitetura a nova impulso. Historicamente, uma das associações mais importantes desse tipo foi a secessão de Viena. A secessão de Viena, mais precisamente a Associação de Artistas Austríacos, é uma associação de artistas em Viena do período Fin de Siècle. Derivado disso, a variante vienense de Art Nouveau também é chamada de estilo de secessão ou arte vienense."
 je_klimt_secession_fail: "Outra nação desbloqueou a secessão diante de nós."
