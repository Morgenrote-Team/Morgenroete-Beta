 klimt_recently_hired_independent_painter_modifier: "Recentemente contratado pintor independente"
 klimt.2.f: "Aos dos 40 anos, um [concept_klimt_painter] considerará seus estudos completos e finalmente se estabelecerá em seu estilo de pintura preferido. A regra geral é que esse estilo é baseado no gênero mais moderno, com Art Nouveau sendo o mais moderno e o classicismo sendo a forma de arte mais arcaica. Os pintores com um estilo de pintura especializados criarão obras -primas nesse estilo de arte sob certas condições. Você também pode iniciar uma coleção de arte em uma galeria adequada ao seu gosto. Um pintor especializado considera seu treinamento de pintura completo e não fará mais jornadas educacionais."
 klimt.2.g: "O estilo de pintura agora está maduro."
 klimt.10.t: "Galeria inaugurada"
 klimt.10.d: "O recém -nomeado diretor abriu a nova galeria de arte com uma cerimônia de comemoração. Um dos convidados de honra foi [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName], que compareceu ao ato com satisfação."
 klimt.10.f: "A construção de uma galeria nacional abre uma variedade de possibilidades. Os pintores especializados criarão automaticamente uma coleção de arte adaptada ao seu gosto. Consequentemente, os artistas que abandonaram o estilo romântico criarão uma coleção de pinturas românticas. Essa coleção de arte pode ser aprimorada com uma obra -prima para torná -la uma excelente coleção. As obras -primas podem ser pintadas aleatoriamente ao longo do tempo por artistas neste movimento artístico ou adquiridas do exterior."
 klimt.10.g: "Finalmente, não precisamos mais armazenar essas coisas no sótão!"
 klimt.20.t: "Galeria Nacional"
 klimt.20.d: "As obras -primas definidoras de uma época são exibidas na galeria de arte. Atualmente, possuímos as seguintes pinturas exclusivas:"
