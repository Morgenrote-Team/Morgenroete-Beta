 klimt.11.t: "Dissolução de uma galeria"
 klimt.11.d: "O governo não pode mais garantir uma galeria nacional em [SCOPE.sState('klimt_gallery_state').GetName]. Foi decidido dissolvê -lo e transferir as exposições mais importantes para a nossa capital."
 klimt.11.f: "Se uma galeria nacional existir fora da capital, ela será automaticamente dissolvida e exibida em sua própria galeria nacional. Se ainda não houver galeria nacional, uma nova será construída."
 klimt.11.g: "Esta requintada coleção de pinturas enriquecerá nossa galeria nacional."
 klimt.11.h: "Tome a coleção como base para a construção de uma nova galeria nacional."
 alert_klimt_painter_trip_possible_alert_hint: "Você tem um [concept_klimt_painter] que poderia estudar um novo estilo de arte em um [concept_artists_center_of_arts]. Pressione o botão na guia Artista na janela §2 Morgenröte para enviá -los."
 klimt_add_x_painting_tradition_minus_x_tt: "[THIS.GetCountry.GetName] perde [SCOPE.GetValue('painting_tradition_amount')|0+] @klimt_painting_tradition! [concept_klimt_painting_tradition]."
