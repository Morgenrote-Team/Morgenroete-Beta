 klimt.20.g: "Tenha um bom dia."
 klimt.30.t: "Uma lufada de ar fresco para arte"
 klimt.30.d: "[SCOPE.sState('klimt_secession_state').GetCityHubName] tornou -se o centro de um movimento artístico internacional de destaque profundamente conectado ao Art Nouveau. O círculo artístico se descreve como a '[SCOPE.sState('klimt_secession_state').GetCityHubName] secessão'."
 klimt.30.f: "A secessão de Viena é um movimento artístico, intimamente relacionado ao Art Nouveau, formado em 1897 por um grupo de pintores austríacos, artistas gráficos, escultores e arquitetos, incluindo Josef Hoffman, Koloman Moser, Otto Wagner e Gustav Klimt. Eles renunciaram à Associação de Artistas Austríacos em protesto contra seu apoio a estilos artísticos mais tradicionais. Seu trabalho arquitetônico mais influente foi o edifício de secessão projetado por Joseph Maria Olbrich como um local para exposições do grupo. Sua revista oficial foi chamada Ver Sacrum (Sacred Spring, em latim), que publicou obras altamente estilizadas e influentes da arte gráfica. Em 1905, o próprio grupo se dividiu, quando alguns dos membros mais proeminentes, incluindo Klimt, Wagner e Hoffmann, renunciaram a uma disputa por prioridades, mas continuou a funcionar e ainda funciona hoje, de sua sede no prédio da secessão. Em sua forma atual, a Galeria de Exposições de Secessão é liderada independentemente e gerenciada por artistas."
 klimt.30.g: "Este beijo para o mundo inteiro!"
 klimt.30.h: "Klimt? Você quer dizer Gustav Klimt?"
 klimt.30_tt: "Desencadeia o Evento #white #b A Primeira Secessão #!#!"
 klimt.40.t: "Vernissage"
 klimt.40.d: "A exposição em [SCOPE.sState('klimt_vernissage_state').GetCityHubName] foi totalmente dedicada às obras de [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]. O evento é considerado um dos destaques culturais do ano e ganhou aclamação crítica. Para o nosso país, é confirmar que somos uma nação cultural líder."
 klimt.40.f: "'O que estou aos olhos da maioria das pessoas - uma não -entidade, uma pessoa excêntrica ou desagradável - alguém que não tem posição na sociedade e nunca terá; Em suma, o mais baixo do baixo. Tudo bem, então - mesmo que isso fosse absolutamente verdadeiro, então eu deveria um dia mostrar pelo meu trabalho o que é um excêntrico, ninguém, tem em seu coração. \ Não é minha ambição, com base em ressentimento do que em amor, apesar de tudo, com base mais em um sentimento de serenidade do que a pura. Vejo pinturas ou desenhos nas cabanas mais pobres, nos cantos mais sujos. E minha mente é levada a essas coisas com um momento irresistível. -Vincent van Gogh"
 klimt.40.g: "Como foi o buffet?"
 klimt.101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]"
 klimt.101.d: "Em sua vernissage, o maestro [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] apresentou [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] §1 §1 Última pintura ao público: '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' é uma obra típica de classicismo e já é considerada significativa nesse gênero."
 klimt.101.f: "O novo trabalho de § 0 chamou imediatamente a atenção de especialistas em arte. Em particular, os acadêmicos mais conservadores gostaram das formas estéticas e do equilíbrio de linha e cor. A integridade moral e a sublimidade da obra da arte foram particularmente enfatizadas. A imagem já é considerada uma excelente herança cultural de nossa nação e deve ser o adorno de qualquer galeria."
 klimt.101.g: "Isso pertence a uma ... galeria!"
 klimt.102.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]"
 klimt.102.d: "O pintor nacional [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] apresentou [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] trabalho ao público com alguns convidados convidados. A sensualidade e o poder das cores impressionam o público. A pintura já é considerada um trabalho importante de romantismo."
 klimt.102.f: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]' já teve um forte impacto em alguns visitantes na primeira noite. O espírito por trás da obra -prima é claramente perceptível. Os críticos reclamaram que os contornos estavam embaçados em alguns lugares, outros viram a força do assunto nessa falta de clareza combinada com a riqueza da cor. Com esta pintura, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] certamente garantiu uma entrada nos livros da história da arte."
 klimt.103.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]"
 klimt.103.d: "Em um sarau, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] aproveitou a oportunidade para mostrar uma nova pintura que pode ser claramente designada para o realismo. Alguns especialistas em arte presentes elogiaram o trabalho."
 klimt.103.f: "Some guests present had feared a more provocative surprise, but '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' turned out to be a very sober representation. At first glance, some guests mistook it as a genre painting. Mas quanto mais os presentes olhavam para a representação de uma cena cotidiana, mais clara a idéia inflamatória e mais clara por trás disso e as questões sociais às quais o autor estava aludindo ficou claro. §1 pode ter alienado alguns membros da Sociedade da noite com a abordagem socialmente crítica, mas a opinião esmagadora é que esse tesouro de arte pertence a uma exposição digna em nível nacional."
 klimt.104.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]"
 klimt.104.d: "Em uma grande exposição de arte de representantes de alto escalão da National Painting Society, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] apresentou uma obra que, embora tenha ganhado considerável atenção, também atraiu o ridículo de alguns críticos. However, a high-priced offer from a foreign art dealer has suddenly made it very popular."
 klimt.104.f: "None"
 klimt.105.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]"
 klimt.105.d: "None"
 klimt.105.f: "'What does that even mean: '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]'? Qual é o ponto? What are these colors from a kindergarten coloring book? These crude figures? These delirious scenes? You call that art? ARTE?! You charlatan! If you spit on the picture, it would be more art than it is now!'\n\nAnd that was one of the more positive comments at the presentation. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] has thereby caused a historic scandal that only increases the importance of the picture."
 klimt.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]"
 klimt.106.d: "After the publication of [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] new work '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]'', [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] is considered one of the most important artists on the international scene. It thrilled traditionalists and avant-garde alike."
 klimt.106.f: "None"
 klimt.110.t: "None"
 klimt.110.d: "Um revendedor experiente de arte e antiguidades se ofereceu para obter uma rara obra -prima no exterior. A discrição extrema é necessária neste assunto - o revendedor também compra de rivais e até oponentes de guerra. [SCOPE.sCharacter('klimt_art_dealer').GetFullName] garantiu que ele cumprirá sua ordem silenciosamente - assumindo um bom salário e algumas pinturas em troca."
 klimt.110.f: "Para comprar uma pintura estrangeira, um revendedor de arte no exterior deve fazer uma oferta adequada. Isso inclui não apenas dinheiro, mas também algumas pinturas em troca - o que danificará nosso [concept_klimt_painting_tradition]. Um revendedor de arte só pode comprar obras -primas em países com mais de uma pintura do mesmo estilo - eles não venderão uma peça única. Da mesma forma, uma nação não pode comprar mais de uma obra -prima de um estilo no exterior. Levará cerca de seis meses para que o acordo seja concluído e para a pintura chegar em nossa galeria nacional."
 klimt.110.g: "None"
 klimt.110.h: "Obter uma obra -prima do romantismo."
 klimt.110.i: "Obter uma obra -prima do realismo."
 klimt.110.j: "Obter uma obra -prima do impressionismo."
 klimt.110.k: "Obter uma obra -prima do expressionismo."
 klimt.110.l: "Obtenha uma obra -prima de Art Nouveau."
 klimt.111.t: "Uma obra -prima do classicismo"
 klimt.111.d: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' chegou hoje como uma nova obra -prima na Galeria Nacional. O governo ficou muito feliz com a peça. O traficante de arte vê seu trabalho como feito."
 klimt.111.f: "As grandes expectativas não ficaram desapontadas. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' atende exatamente aos requisitos e deve ser um excelente complemento à coleção de fotos de [GetPlayer.GetNameNoFlag]. A imprensa comercial também concorda que essa compra valia cada centavo gasto. Uma exposição está planejada para o próximo mês que se concentrará neste auge do classicismo."
 klimt.111.g: "Outro tesouro de arte para a nossa coleção!"
 klimt.112.t: "Uma obra -prima do romantismo"
 klimt.112.d: "Alguns espectadores se reuniram na Galeria Nacional hoje. Os representantes da imprensa local e nacional também estão sitiando o local desde as primeiras horas da manhã. A palavra já passou por '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]', uma obra -prima romântica, está prestes a chegar à coleção de fotos."
 klimt.112.f: "Já houve alguns rumores sobre '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]'. Deve ser uma pintura colorida que estimula os sentidos. Nenhuma informação adicional é conhecida sobre o assunto. Diz -se que o desconhecido traficante de arte, que poderia fornecer mais informações, foi para o exterior com um grande pedaço de dinheiro e fez planos para sua aposentadoria. Ele não estava mais disponível para entrevistas."
 klimt.113.t: "Uma obra -prima do realismo"
 klimt.113.d: "A nova obra -prima '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' foi apresentada ao público hoje em uma cerimônia como parte de uma exposição especial. A peça pertence ao gênero do realismo e é considerada uma das principais pinturas desta era artística. A multidão era correspondentemente grande. Os ingressos para o evento foram completamente esgotados semanas antes."
 klimt.113.f: "“É uma grande honra e um prazer para mim, como diretor da Galeria Nacional, poder apresentar hoje a nova obra -prima que enriquecerá nossa coleção de fotos a partir de hoje. Como você sabe, trabalhamos há muito tempo para poder chamar um trabalho importante de realismo nosso. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' é exatamente isso. Não preciso dizer muito sobre o pintor, todos vocês o conhecem. Com sua representação sóbria e relevância cotidiana, foi inicialmente incompreendida pelos críticos como pintura de gênero ou sem espírito. Mas, na realidade, seu conteúdo é profundo. Observe os detalhes na coloração que dão a impressão de que ... '"
 klimt.114.t: "Uma obra -prima do impressionismo"
 klimt.114.d: "O revendedor de arte cumpriu sua missão hoje e entregou '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]' aos responsáveis ​​na Galeria Nacional por uma recompensa pesada. O processo correu bem. O diretor também comentou positivamente a compra, mas reclamou que as cores estavam um pouco embaçadas."
 klimt.114.f: "Estou muito deprimido e profundamente enojado com a pintura. É realmente uma tortura contínua. -Claude Monet"
 klimt.115.t: "Uma obra -prima do expressionismo"
 klimt.115.d: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]', a obra -prima do exterior adquirida por um revendedor de arte confiável, finalmente chegou em [GetPlayer.GetNameNoFlag]. No entanto, não se pode falar de aprovação total. O revendedor de arte também saiu após o pagamento e não pode ser encontrado."
 klimt.115.f: "Depois que '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]' chegou, alguns conhecedores de arte expressaram surpresa, se não críticas. A composição incomum deu a impressão de que dificilmente poderia ser obra de um artista de renome. O nome incomum, que tinha pouco a ver com o daubing, também despertou suspeitas sobre se eles talvez tivessem encontrado um Charlatan que teve uma piada. O fato de um autógrafo autêntico ter sido encontrado na imagem piorou as coisas do que melhor. Esteja preparado para fortes reações do público."
 klimt.116.t: "Uma obra -prima de Art Nouveau"
 klimt.116.d: "O diretor da Galeria Nacional ficou aliviado ao descobrir hoje que a obra -prima havia chegado do exterior. [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] é puro colírio para os olhos."
 klimt.116.f: "Quando o [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] foi finalmente retirado da caixa, ele imediatamente capturou o coração daqueles presentes como um novo filhote de tigre em um zoológico. Ou um novo artefato importante em um museu. Ou um planeta recém -encontrado em um observatório. Ou a nova obra -prima musical de um compositor. Ou um esqueleto remontado de um paleontologista. Ou os restos encontrados de um ancestral humano. Ou ..."
 klimt.116.g: "Ou uma vitória no Schneider Trophy?"
 klimt.301.t: "O prêmio [SCOPE.sState('klimt_art_capital').GetCityHubName]"
 klimt.301.d: "A elite de nosso país que ama arte está pressionando por um prêmio de artista pelas melhores pinturas."
 klimt.301.f: "As nações que possuem uma galeria ocasionalmente organizam competições de arte. Os cinco pintores mais qualificados recebem um prêmio que tem um forte impacto em sua reputação. Um prêmio de arte geralmente é concedido a cada cinco anos. Grandes pintores não são convidados - eles já receberam sua recompensa."
 klimt.301.g: "Deveríamos organizar uma competição de arte."
 klimt.301.h: "Que desperdício de dinheiro!"
 klimt.302.t: "O prêmio [SCOPE.sState('klimt_art_capital').GetCityHubName]"
 klimt.302.d: "O júri chegou a uma conclusão e selecionou as melhores pinturas. A lista de cinco vencedores já está fazendo as rodadas."
 klimt.302.f: "1. [SCOPE.sCharacter('klimt_character_first_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_1_global_var').GetCountry.GetName] \ n2.   [SCOPE.sCharacter('klimt_character_second_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_2_global_var').GetCountry.GetName] \ n3.   [SCOPE.sCharacter('klimt_character_third_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_3_global_var').GetCountry.GetName] \ n4.   [SCOPE.sCharacter('klimt_character_fourth_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_4_global_var').GetCountry.GetName] \ n5.   [SCOPE.sCharacter('klimt_character_fifth_winner_scope').GetFullName] de [GetGlobalVariable('klimt_prize_winner_5_global_var').GetCountry.GetName]"
 klimt.302.g: "Conceda os vencedores."
 klimt.401.t: "Destino de viagem pintor"
 klimt.401.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] já empacotou [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] coisas. Qual escola de arte [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] estudar?"
 klimt.401.f: "Um [concept_klimt_painter] que continua sua educação em uma viagem de arte não gerará [concept_klimt_painting_tradition] em sua ausência. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] só pode estudar estilos de arte que antes são desconhecidos para ele. Normalmente, essa viagem dura um ano, mas pode haver obstáculos ou oportunidades que estendem a estadia."
 klimt.401.g: "Classicismo."
 klimt.401.h: "Romantismo."
 klimt.401.i: "Realismo."
 klimt.401.j: "Impressionismo."
 klimt.401.k: "Expressionismo."
 klimt.401.l: "Art Nouveau."
 klimt.401.m: "Deixa para lá."
 klimt.402.t: "Chegada em [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.402.d: "Good news! [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] has arrived in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] is still looking for a free room and will start [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] studies soon."
 klimt.402.f: ""
 klimt.402.g: "Ah ... [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.403.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] returns from Painter Trip"
 klimt.403.f: "\"A arte é apenas arte onde é um fim em si, onde é absolutamente livre, deixado para si mesmo, onde não conhece leis mais altas que as suas, as leis da verdade e da beleza.\" -Ludwig feuerbach"
 klimt.403.g: "E toda a viagem não foi apenas por diversão?"
 klimt.411.t: "Companheiros pintores entre si"
 klimt.411.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] met a fellow painter from [SCOPE.sCharacter('klimt_fellow_painter').GetHomeCountry.GetName] on his study trip. The two recognize each other as equal colleagues. [SCOPE.sCharacter('klimt_fellow_painter').GetFullName] seems to be a gifted spirit and sociable."
 klimt.411.f: "Se, por acaso, várias nações enviaram um pintor em uma viagem de estudo ao mesmo tempo, existe a possibilidade de que eles se encontrem e haverá efeitos sinérgicos positivos. Rivalidades e inimidades podem desaparecer rapidamente no interesse do entusiasmo compartilhado pela arte."
 klimt.411.g: "Eles devem trocar seu conhecimento artístico."
 klimt.411.h: "Eles certamente podem aprender com as técnicas um do outro."
 klimt.411.i: "O conhecido será útil no mundo da arte para se apoiar."
 klimt.421.t: "Nos passos dos gigantes"
 klimt.421.d: "Our painter wrote from [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] place of study that [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] already foresees [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] future in glorious visions. What [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] needs, however, is more time and more money."
 klimt.421.f: "In Rome, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is confronted with some of the most important painters in art history as well as with the remains of Roman architecture. Time and time again, travelers to Rome have developed a special relationship with this city and its history. The desire to follow in the footsteps of the classics has moved many an artist. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]'s ambition grows to one day become an artist just as great as one of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] idols. This may border on megalomania, but above all it will take time, patience - and further studies, as [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] said in a letter."
 klimt.421.g: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should take [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] time and emulate Michelangelo and Raphael."
 klimt.421.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should paint, not daydream!"
 klimt.422.t: "Espírito dos românticos"
 klimt.422.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] hasn't written back from Bamberg for days. Apparently [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] indulges in daydreaming."
 klimt.422.f: "Bamberg não é apenas um lugar pitoresco, com inúmeras casas semi-térmicas e uma rica herança barroca que o convida a permanecer romanticamente. Há algo nessa cidade que a tornou incrivelmente atraente para os românticos. Ludwig Tieck e Heinrich Wackenroder eram românticos importantes que realmente vieram de Berlim, mas com quem Franconiano deixou sua marca. Eles também estavam menos interessados ​​em seus estudos e mais interessados ​​no país, em seu povo e na rica herança das cidades da região. E. T. A. Hoffmann, outro romântico da Prússia, experimentou seu avanço literário durante sua estadia de cinco anos em Bamberg. Qual foi a sua viagem à Itália para Goethe, essa parte da Alemanha foi para os jovens românticos. Na paisagem cultural, eles não apenas encontraram uma conexão com a Idade Média Alemã idealizada, mas também com as pinturas de Albrecht Dürer em Nuremberg e ao catolicismo, cuja espiritualidade atraiu mais os românticos do que o protestantismo secularizado."
 klimt.422.g: "A vida de um bom porquinho ..."
 klimt.423.t: "Conversão"
 klimt.423.d: "Actually, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] hasn't had much of a relationship with faith so far. However, the strong Catholicism he was confronted with, both in art and in everyday life, triggered something in [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim]. More and more [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] feels a connection that [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] would never have thought possible until then. Inspired by this, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] painted [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] first religious picture."
 klimt.423.f: "'Veja Bamberg e se tornar católico' era um lema entre os românticos alemães. De fato, o romantismo alemão foi uma das poucas épocas influenciadas por mais católicos do que pensadores protestantes, incluindo muitos convertidos. De maneira semelhante, Roma também trouxe dúvidas para a dobra da igreja. Isso pode ser surpreendente em uma era materialista na qual o progresso e a ciência desempenharam um papel de liderança na sociedade, mas foi precisamente a necessidade de uma contra-resposta que acabou levando um hedonista ao mosteiro."
 klimt.423.g: "Espero que não seja uma foto brega da Madonna."
 klimt.423.tt: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] loses all negative addictive traits and converts to #YELLOW Catholicism#! if [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] is not yet a Catholic."
 klimt.424.t: "Atenção aos detalhes"
 klimt.424.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] found in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] a master of realism who would help him improve [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] painting technique. However, this will take months - and the fee is hefty."
 klimt.424.f: "'A pintura é uma arte essencialmente concreta e só pode consistir na representação de coisas reais e existentes'. -Gustave coubert"
 klimt.424.g: "Isso pode levar algum tempo, mas vale a pena."
 klimt.424.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should rather concentrate on gaining recognition from the master."
 klimt.425.t: "Inspiração sem limites"
 klimt.425.f: "\"Desde o aparecimento do impressionismo, os salões oficiais, que costumavam ser marrons, se tornaram azuis, verdes e vermelhos. Mas hortelã -pimenta ou chocolate, eles ainda são confeitos.\" -Claude Monet"
 klimt.425.g: "Essas novas idéias o inspirarão a criar inúmeras pinturas."
 klimt.425.h: "Essas novas idéias devem inspirar nossa cultura em casa."
 klimt.426.t: "A vida de um artista"
 klimt.426.d: "The sophisticated life in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] has also left its mark on [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]. [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] often hangs out in bars and pubs - and uses stimulants to increase [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] creative power. Without one or two intoxications, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] would hardly be able to complete [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] workload in such a short time."
 klimt.426.f: "\"Após o primeiro copo, você vê as coisas como desejarem. -Scar Wilde"
 klimt.426.g: "If that inspires [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] art - where is the problem?"
 klimt.426.h: "Então leva mais tempo."
 klimt.427.t: "O vice de um artista"
 klimt.427.d: "We are receiving worrying reports from [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]'s addictions reach frightening proportions. Apparently [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] uses his absence to indulge in vices and debauchery, which put a significant strain on [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] health."
 klimt.427.f: "Camille Pissarro, Henri de Toulouse -Lautrec, Paul Gauguin, Oscar Wilde e Charles Baudelaire - todos foram vítimas de intoxicação por absinto. O mesmo se aplica a Vincent Van Gogh. Gabriele d'Annunzio, por outro lado, estava procurando aventuras eróticas. Jean Cocteau descobriu o ópio e escreveu um diário sobre seu uso e efeitos. O fato de que, em muitos casos, esses vícios e vícios levaram à autodestruição e à morte prematura é um dos episódios trágicos da vida dos artistas."
 klimt.427.g: "Todo artista tem um vício."
 klimt.427.h: "Temos que intervir!"
 klimt.427.tt: "The educational trip is cancelled. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is taken into custody by our agents in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] and brought back to [GetPlayer.GetName]. He will be put into rehab there for the next six months."
 klimt.428.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] is available again"
 klimt.428.d: "After a break of several months, our painter has returned to [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] usual day-to-day business. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] didn't give up [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] lifestyle, but at least something worse could be prevented."
 klimt.428.f: "'Um seqüestro? Não, não, Monsieur, isso foi uma intervenção. Um seqüestro aconteceria com o seu sofrimento, uma intervenção só é iniciada para o seu bem ... o que você quer dizer, não sabemos o que é melhor para você?"
 klimt.428.g: "Espero que as coisas voltem ao normal agora."
 klimt.431.t: "Veduta"
 klimt.431.d: "Inspired by the beauty of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] host city [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] our painter began painting a masterful veduta picture on an educational trip. However, that could extend [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] stay a bit."
 klimt.431.f: "Um Veduta é uma pintura altamente detalhada, geralmente em larga escala, ou, mais frequentemente, a impressão de uma paisagem urbana ou de alguma outra vista. Os pintores de Veduto são referidos como Vedutisti. No final do século XIX, \"impressões\" mais pessoais de paisagens da cidade substituíram o desejo de precisão topográfica, que foi satisfeita por panoramas pintados e depois fotografados. Os pintores de Veduta mais importantes desta época incluem David Roberts e Eduard Gaertner."
 klimt.431.g: "Uma ideia esplêndida."
 klimt.431.h: "Concentre -se em estudar."
 klimt.432.t: "Círculo de pintura"
 klimt.432.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] has been welcomed into [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]'s local artist group as one of their own."
 klimt.432.f: "Devo ficar sozinho e saber que estou sozinho para contemplar e sentir a natureza na íntegra; Eu tenho que me render ao que me envolve, tenho que me fundir com minhas nuvens e pedras para ser o que sou. A solidão é indispensável para o meu diálogo com a natureza. -Caspar David Friedrich"
 klimt.432.g: "Precisamos do reconhecimento do mundo da pintura."
 klimt.433.t: "Compreensão rápida"
 klimt.433.d: "On [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational journey in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], our artist is making faster progress than expected. Maybe [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] can return sooner."
 klimt.433.f: "'O talento faz o que quiser. Genius faz apenas o que pode. -Eugène delacroix"
 klimt.433.g: "Você pode ver talento à primeira vista."
 klimt.434.t: "Revendedor de arte"
 klimt.434.d: "During [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational stay, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] found a renowned art dealer who might sell a few pieces."
 klimt.434.f: "'Eu sou um empresário absolutamente sério. Os calúnias dos meus concorrentes que vendo falsificações são apenas devido a inveja. Posso agora deixar você animado com esta pintura? Um verdadeiro Leonardo da Vinci: A senhora do Sistine DeGu. Uma raridade! Uma oferta como essa nunca voltará!"
 klimt.434.g: "Compre algumas pinturas."
 klimt.434.h: "Não precisamos de mercadorias estrangeiras de segunda classe."
 klimt.435.t: "A mais recente moda"
 klimt.435.d: "On [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational journey, our artist learned about new fashions, new architectural styles and new pastimes that were previously unknown to [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]."
 klimt.435.f: "Os homens que vieram da Inglaterra sabiam dizer aos seus amigos surpresos que as pessoas do outro lado do canal, por mais sensíveis que fossem, ainda gostavam muito de prazeres infantis. Então, os jovens se divertem chutando uma bola de couro em um prado, outros atingiram a bola sobre uma rede com uma espécie de batedor de carpetes, e essa loucura atrai espectadores em toda multidão. Entre eles, existem pessoas no cargo e na dignidade - que às vezes nem se envolvem por se envolver."
 klimt.435.g: "O respiração fresca da nova cultura."
 klimt.435.h: "Mas é realmente certo seguir o zeitgeist?"
 alert_klimt_painter_trip_possible_alert_name: "Seu [concept_klimt_painter] pode estudar um novo estilo de arte"
