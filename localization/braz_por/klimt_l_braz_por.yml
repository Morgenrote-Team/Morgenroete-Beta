l_braz_por:
 klimt_painter: "Pintor"
 klimt_painter_desc: "Esse personagem é um artista que o foco principal são pinturas. Talvez um dia suas pinturas sejam conhecidas em todo o mundo?"
 klimt_great_painter: "Grande pintor"
 klimt_great_painter_desc: "Esse personagem é um dos maiores pintores do mundo. Suas pinturas estão penduradas em todas as importantes galerias de arte e colecionadores pagam uma fortuna por eles."
 klimt_spitzweg_not_funny_modifier: "Suspeito Spitzweg"
 klimt.1300.t: "Carl Spitzweg, o pobre poeta"
 klimt.1300.d: "O pobre poeta (alemão: Der Arme Poet) é a pintura mais conhecida e mais popular do pintor alemão Carl Spitzweg. Foi executado em 1839 e tinha três versões. É considerado uma obra -prima inicial."
 klimt.1300.f: "Carl Spitzweg era um pintor e poeta romântico alemão. Ele é considerado um dos artistas mais importantes da era Biedermeier. Seu pai, um comerciante rico, havia treinado Carl como farmacêutico. Ele alcançou sua qualificação da Universidade de Munique, mas enquanto se recuperava de uma doença, ele também tomou pintura. Spitzweg foi autodidata como artista e começou copiando as obras dos mestres flamengos. Ele contribuiu com seu primeiro trabalho para revistas satíricas. Ao receber uma herança em 1833, ele foi capaz de se dedicar à pintura. Suas pinturas e desenhos posteriores eram frequentemente obras de gênero humorísticas. Muitas de suas pinturas descrevem os excêntricos bastante caracterizados."
 klimt.1300.g: "Ahahah, um pintor engraçado!"
 klimt.1300.h: "Espere! Sátira contra quem?"
