 klimt.2.t: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] Cometida [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerselfHimself] a um estilo"
 klimt.2.d: "Após muitos anos em que [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] colecionaram experiências e impressões para melhorar a técnica [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis], [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] finalmente estabeleceu um estilo preferido."
 je_klimt_painter_trip_fail: "If [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] has to end [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] journey prematurely gets replaced or dies during [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] stay in a foreign country, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] will not acquire a new school [concept_character_trait]."
 klimt.2.h: "Classical painting is superior to any other form."
 klimt.2.i: "Only Romanticism gives soul to painting."
 klimt.2.j: "Is there really a rival to Realism?"
 klimt.2.k: "I am under the impression that Impressionism should impress."
 klimt.2.l: "Gugelhupf!"
 klimt.2.m: "Art Nouveau is art - nothing else."
