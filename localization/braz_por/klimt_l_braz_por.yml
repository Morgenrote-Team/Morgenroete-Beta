 klimt_add_x_painting_tradition_plus_x_tt: "[THIS.GetCountry.GetName] Gains [SCOPE.GetValue('painting_tradition_amount')|0+] @klimt_painting_tradition! [concept_klimt_painting_tradition]."
 klimt.403.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] retornou da viagem de estudo [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] e trouxe com [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim] novas experiências, novos conhecimentos e nova inspiração. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe|U] também melhorou a reputação [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] no mundo da arte."
 klimt.425.d: "Desde a chegada [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] em [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] teve centenas e milhares de impressões. Faz muito tempo que uma idéia seguiu a seguinte. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] pode literalmente sentir como este lugar revigora [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim]."
