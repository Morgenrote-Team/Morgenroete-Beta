 klimt_excellent_taste_modifier: "None"
 klimt_disgusting_painting_modifier: "None"
 klimt_disgusting_taste_modifier: "None"
 klimt_art_censorship_modifier: "None"
 je_klimt_rossetti: "Irmandade pré-rafaelita"
 je_klimt_rossetti_reason: "None"
 je_klimt_fattori: "None"
 je_klimt_fattori_reason: "None"
 je_klimt_barbizon: "None"
 je_klimt_barbizon_reason: "A Escola Barbizon foi formada por um grupo de pintores paisagísticos franceses no final do primeiro terço do século XIX. Os artistas ficaram na vila de Barbizon, perto da floresta de Fontainebleau. A colônia do pintor, fundada por Théodore Rousseau e existia até 1870, teve uma influência significativa na pintura de paisagem em toda a Europa, especialmente no impressionismo."
 klimt.501.t: "Os pré-rafaelitas"
 klimt.501.d: "With the Pre-Raphaelites, a brotherhood was established that opposed classicism and realism, but at the same time saw itself as a reform movement. Their support could bring new talent to light, but that would contradict the style of our current painter, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]."
 klimt.501.f: "'Eu já estive aqui antes, quando ou como não sei dizer: \ ni conheço a grama além da porta, no cheiro doce e agudo, no som suspiro, as luzes ao redor da costa.' -Dante Gabriele Rossetti"
 klimt.501.g: "Promover a irmandade pré-rafaelita."
 klimt.501.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] is way better"
 klimt.502.t: "Os Macchiaioli"
 klimt.502.d: "O grupo de artistas Macchiaioli foi fundado hoje em Florence. Embora sua influência seja pequena, o grupo inspira alguns jovens artistas a procurar novos caminhos na arte."
 klimt.502.f: "'The Stain (Macchia) é a solidez dos corpos em frente à luz' -Giovanni Fattori"
 klimt.502.g: "Então eles eram Avantgarde antes do Avantgarde?"
 klimt.503.t: "Escola Barbizon"
 klimt.503.d: "Com o estabelecimento de um círculo de pintores perto de Fontainebleau, sob a direção de Théodore Rousseau, a pintura de paisagem experimentou novos impulsos em todo o cenário artístico."
 klimt.503.f: "'Se minha pintura descreve fielmente e sem refinação excessiva o caráter simples e verdadeiro do lugar que você freqüentou, se eu conseguir ... em dar a própria vida a esse mundo da vegetação, então você ouvirá as árvores gemendo sob o vento de inverno, os pássaros que chamam seus jovens e chorarão após a dispersão; Você sentirá o velho castelo tremer; Ele lhe dirá que, como a esposa que você amou, também vai ... desaparecerá e renascerá de várias formas ... não se copia com precisão matemática o que se vê, mas se sente e interpreta um mundo real, todas as fatalidades que você se apega rapidamente. -Téodore Rousseau"
 klimt.503.g: "Paisagens finas!"
 klimt.601.t: "A morte de [SCOPE.sCharacter('klimt_painter_scope').GetLastName]"
 klimt.601.d: "[SCOPE.sCharacter('klimt_painter_scope').GetFullName], um pintor nacional e internacionalmente altamente considerado e uma das excelentes personalidades artísticas do nosso país, morreu hoje. Ele deixa uma lacuna que dificilmente pode ser preenchida."
 klimt.601.f: "Em 26 de junho de 1835, Caspar David Friedrich sofreu um derrame com sintomas de paralisia. Ele pegou uma cura em Teplitz, que ele só podia pagar vendendo algumas fotos sobre o poeta Zhukovsky para a corte do czar russo. Após o tratamento, Friedrich começou a pintar novamente, o que lhe causou dificuldades. No entanto, a pintura a óleo à beira -mar à luz da lua foi criada em 1835/36. Até 1839, ele produzia principalmente desenhos e aquarelas sépia, menos paisagens e mais alegorias de morte. Friedrich enviou alguns desenhos em sépia para as exposições de arte de Dresden em 1836 e 1838. No último ano da minha vida, o trabalho parou. Friedrich morreu aos 65 anos em 7 de maio de 1840 em Dresden e foi enterrado no cemitério da Trindade."
 klimt.601.g: "But who is painting [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] death portrait now?"
 klimt.602.f: "À medida que Turner envelheceu, ele se tornou mais excêntrico. Ele tinha poucos amigos íntimos, exceto o pai, que morou com ele por 30 anos e trabalhou como assistente de estúdio. A morte de seu pai em 1829 teve um efeito profundo sobre ele e, posteriormente, ele estava sujeito a crises de depressão. Turner morreu de cólera na casa de Sophia Caroline Booth, em Cheyne Walk em Chelsea, em 19 de dezembro de 1851. Ele está enterrado na Catedral de São Paulo, onde está perto do pintor Sir Joshua Reynolds. Aparentemente, suas últimas palavras foram \"o sol (ou filho?) É Deus\", embora isso possa ser apócrifo."
 klimt.603.f: "Em 6 de fevereiro de 1848, a família Cole participou de um culto matinal na Igreja Episcopal de Saint Luke em Catskill. Depois do almoço, Cole se queixou de lassidão e, à meia -noite, sua condição piorou e o médico foi convocado. Seguiram -se um ataque de pleurisia e congestionamento de seus pulmões. Thomas Cole morreu na casa principal de Cedar Grove às 20h de sexta -feira, 11 de fevereiro de 1848."
 klimt.604.f: "O inverno de 1862/63 foi extremamente difícil para Delacroix; Ele estava sofrendo de uma infecção ruim na garganta que parecia piorar ao longo da temporada. Em uma viagem a Champrosay, ele conheceu um amigo no trem e ficou exausto depois de ter uma conversa. Em 1º de junho, ele voltou a Paris para consultar seu médico. Duas semanas depois, em 16 de junho, ele estava melhorando e voltou para sua casa no país. Mas em 15 de julho ele estava doente o suficiente para ver seu médico, que disse que não podia fazer mais nada por ele. Até então, a única comida que ele podia comer era frutas. Delacroix percebeu a seriedade de sua condição e escreveu sua vontade, deixando um presente para cada um de seus amigos. Para sua empregada doméstica de confiança, Jenny Le Guillou, ele deixou dinheiro suficiente para ela viver enquanto ordenava que tudo em seu estúdio fosse vendido. Ele também inseriu uma cláusula proibindo qualquer representação de suas características, 'seja por uma máscara de morte ou desenhando ou por fotografia. Eu o proíbe, expressamente. Em 13 de agosto, Delacroix morreu."
 klimt.605.f: "Nos últimos anos de sua vida, a visão de Eckersberg começou a falhar. Isso acabou levando a ele ter que desistir de pintar completamente. Ele morreu em Copenhague da cólera em 22 de julho de 1853 durante a grande epidemia. Ele está enterrado no cemitério Assistente de Copenhague."
 klimt.901.t: "§ Firmamento de § 0"
 klimt.901.d: "[GetPlayer.GetNameNoFlag] is a leading nation in the field of astronomy. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]'s outstanding discoveries inspired [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] to create a painting depicting the night sky and the cosmos."
 klimt.901.f: "Os marcos de uma nação também têm um impacto nos pintores do país. Eventos culturais extraordinários, avanços tecnológicos e descobertas científicas podem inspirar artistas a capturá -los em tela para a eternidade."
 klimt.901.g: "Lindo!"
 klimt.902.t: "Tesouros do Pacífico"
 klimt.902.d: "The return of an expedition from the Pacific has left its mark: exotic goods, fascinating art treasures, new oceanographic knowledge and wild animals have reached [GetPlayer.GetNameNoFlag]. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] was inspired by this to create a painting that showcases our nation's will to discover and explore."
 klimt.903.t: "Arte Oriental"
 klimt.903.d: "The increasing number of expeditions to the Middle East have awakened a euphoria in society for an art movement that can be described as 'Orientalism'. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] was also captured by the fascination of the Orient and painted a fantasy painting from 1001 Nights."
 klimt.904.t: "O impulso de uma nova era"
 klimt.904.d: "[GetPlayer.GetNameNoFlag] is at the forefront of conquering the skies. New machines, whether airplanes or zeppelins, populate the sky. New records are broken every day and our pilots are considered national heroes. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] has cast the spirit of this new era in color and celebrates the triumph of technology, will and heroism."
 klimt.905.t: "Retrato com tigre e leão"
 klimt.905.d: "During his last visit to the zoo, [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] was able to experience first hand the exotic animals that [GetPlayer.GetNameNoFlag] had already brought to the capital from all over the world. As a qualified zoologist, Prof. [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] gave [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim|U] a tour and told him some interesting facts about the animals. At the end of his stay, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] created an extraordinary self-portrait."
 klimt.906.t: "Esboços de dinossauros"
 klimt.906.d: "Inspired by the successes of Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] tried to breathe life back into the extinct reptiles in a picture."
 klimt.907.t: "Segredos da selva"
 klimt.907.d: "The archaeological discoveries in Yucatan and the adventurous circumstances in which researchers like Prof. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] repeatedly discovered new Mayan sites led [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] to immortalize our expeditions in pictures."
 klimt.908.t: "Portrait of [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]"
 klimt.908.d: "The tireless work and the constantly new highlights in Maestro [ROOT.Var('elgar_composer_var').GetCharacter.GetLastName]'s work have inspired [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] to create a portrait of the composer. Not only his unparalleled music, but also this painting will increase his fame."
 klimt.911.t: "Um retrato do [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]?"
 klimt.911.d: "A portrait of [SCOPE.sCharacter('klimt_ruler_scope').GetFullName] is still missing from the official gallery of [GetPlayer.GetNameNoFlag]'s heads of state. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is considered an obvious candidate to properly showcase the ruler."
 klimt.911.f: "A cada mandato, há uma chance de que um pintor seja solicitado a pintar um retrato do chefe do governo ou chefe de estado. Se isso é bem -sucedido depende da reputação do artista em questão."
 klimt.911.g: "Crie um retrato."
 klimt.911.h: "E se der errado - quem pagará por isso?"
 klimt.912.t: "Um ... retrato notável"
 klimt.912.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] publicly unveiled [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] portrait of the [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle] today. While fellow artists emphasize the 'audacity' and 'innovation', parts of the government are horrified by it."
 klimt.912.f: "'Isso é nojento!' \ N'it é chamado Kubism, senhor. '"
 klimt.912.g: "Arte é arte."
 klimt.912.h: "Destrua essa pintura!"
 klimt.913.t: "Um ótimo retrato"
 klimt.913.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] has outdone [ROOT.Var('klimt_painter_var').GetCharacter.GetHerselfHimself] with [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] painting of the [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]. The painting immediately aroused enthusiasm and is considered one of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] best works."
 klimt.913.f: "'Seis pés e meio de altura, músculos como Hércules, uma aparência de vontade com Napoleão, um rosto como Afrodite - sim, está certo, sou eu! Tome o artista com dinheiro. '"
