 vikelas_autoracing_found_automobile_club_button: "Fundar Clube Automobilístico"
 vikelas_autoracing_found_automobile_club_button_desc: "Estabelecer um clube automobilístico é o primeiro passo para construir outras instalações essenciais para o automobilismo."
 vikelas_autoracing_long_distance_button: "Organize uma corrida de resistência"
 vikelas_autoracing_long_distance_button_desc: "Corridas de resistência, geralmente de cidade para cidade, eram a norma nos primeiros dias das corridas de automóveis e continuaram até meados do século XX. Na Itália, corridas como a Targa Florio ou a Mille Miglia são os exemplos mais conhecidos. Elas colocam o homem e a máquina em um teste especial e foram por muito tempo consideradas as verdadeiras corridas nacionais de carros."
 vikelas_autoracing_found_grand_prix_button: "Encontrado Grand Prix Racing"
 vikelas_autoracing_found_grand_prix_button_desc: "Em 1906, o primeiro Grande Prêmio oficial da história automotiva foi organizado com a corrida para o Grand Prix de l'ACF. Independentemente do país de origem, até três carros de corrida por fabricante de automóveis foram aprovados, conforme solicitado originalmente pelos representantes da indústria francesa. Mantendo seu status como a mais importante de todas as competições, a corrida foi realizada em uma distância de mais de 1200 km e em dois dias consecutivos. Em 1925, por iniciativa do Automobile Club da Itália, a introdução de um campeonato mundial oficial foi finalmente anunciada. As três corridas oficiais do Grande Prêmio da temporada (França, Itália e Bélgica) foram designadas como corridas, bem como Indianápolis como o evento de corrida americano mais importante."
 vikelas_autoracing_race_track_button: "Construa uma pista de corrida"
 vikelas_autoracing_race_track_button_desc: "Com as corridas do Grand Prix, a pista de corrida fixa está se tornando cada vez mais a norma para corridas de carros. Uma pista de corrida dedicada não apenas centralizaria eventos de corrida internacionais em um local, mas como uma pista de teste também daria aos nossos pilotos de corrida um bônus de experiência todo ano."
