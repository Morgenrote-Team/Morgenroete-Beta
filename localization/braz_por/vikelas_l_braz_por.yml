 je_vikelas_endurance_race_reason: "Uma corrida de resistência está acontecendo atualmente em vários estados do nosso país. Pilotos de corrida de todos os países amantes de corrida participam da corrida. Um país anfitrião tem uma ligeira vantagem e recebe eventos adicionais. Ao contrário dos Grandes Prêmios, a confiabilidade é mais importante do que a velocidade, pois os carros precisam durar uma longa distância. O risco de um motor quebrar também é maior do que um acidente fatal."
