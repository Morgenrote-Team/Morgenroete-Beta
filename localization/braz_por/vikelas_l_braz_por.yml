 vikelas.571.t: "As primeiras 24 horas de Le Mans"
 vikelas.571.d: "Em 1923, aconteceram as primeiras 24 Horas de Le Mans, tornando-se rapidamente um dos eventos mais prestigiados do automobilismo, atraindo pilotos e fabricantes do mundo todo."
 vikelas.571.f: "Em 26 e 27 de maio de 1923, foram realizadas as primeiras 24 Horas de Le Mans, organizadas pelo Automobile Club de l'Ouest. A pista de 17,3 quilômetros na região de Sarthe recebeu 33 veículos. As condições eram desafiadoras: chuva, estradas lamacentas e um percurso que atravessava a cidade de Le Mans e estradas rurais vizinhas. A vitória foi para André Lagache e René Léonard, pilotando um Chenard & Walcker Sport, cobrindo uma distância de 2.209 quilômetros em 24 horas. Esta corrida marcou o início de uma tradição que continua a celebrar a inovação e a resistência no automobilismo."
 vikelas.571.g: "24 horas? Isso é loucura!"
 vikelas.572.t: "O Nascimento da Targa Florio"
 vikelas.572.d: "Em 1906, foi criada a Targa Florio, uma corrida espetacular realizada nas estradas sinuosas da Sicília. Organizada por Vincenzo Florio, ela trouxe a região para o centro do mundo do automobilismo."
 vikelas.572.f: "Em 6 de maio de 1906, ocorreu a primeira Targa Florio, uma corrida de longa distância que transformou as íngremes estradas de montanha e as pitorescas vilas da Sicília em uma pista de corrida desafiadora. Organizado por Vincenzo Florio, um entusiasta do automobilismo, o evento concretizou sua visão de um desafio esportivo. A pista tinha 446 quilômetros, divididos em três voltas de 148 quilômetros cada. A vitória foi para Alessandro Cagno, pilotando um Itala, que cruzou a linha de chegada com uma velocidade média de 46,8 km/h. A Targa Florio rapidamente se tornou um símbolo de coragem, habilidade e paixão pela velocidade."
 vikelas.572.g: "A Targa Florio Estabelece uma Tradição"
 vikelas.573.t: "O primeiro Berg-Rennen Semmering"
 vikelas.573.d: "Em 1899, a primeira subida de montanha em Semmering foi realizada, testando os limites da engenharia automobilística inicial e da habilidade de dirigir. Este evento marcou um marco importante na história do automobilismo."
 vikelas.573.f: "Em 27 de agosto de 1899, foi realizada a primeira Semmering Hill Climb, organizada pelo Austrian Automobile Club. A rota de 9,8 quilômetros, que vai de Klamm am Semmering até a passagem da montanha, levou os primeiros automóveis e seus motoristas ao limite. Com inclinações de até 7% e curvas fechadas, a corrida foi um teste de tecnologia e coragem. A vitória foi para o Conde Jenő Zichy, dirigindo um automóvel Mors, que completou o percurso com uma velocidade média de 22,2 km/h. A corrida atraiu um grande público e lançou as bases para a tradição de escalada na Europa."
 vikelas.573.g: "A subida da colina encanta as massas."
