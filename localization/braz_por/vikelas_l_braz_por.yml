 vikelas.501.t: "O [ROOT.GetCountry.GetAdjectiveNoFormatting] Automóvel Clube"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] é considerado um motorista apaixonado e fundou um clube de automóveis com pessoas com ideias semelhantes para marcar esta ocasião. Isso tem como objetivo fortalecer a indústria automobilística nacional e organizar eventos nacionais de automóveis."
 vikelas.501.f: "Já em meados da década de 1890, o Automobile Club de France (ACF), fundado em 1895 como o primeiro clube automobilístico do mundo, organizava uma corrida uma vez por ano, que representava o destaque da temporada. Essas eram as chamadas corridas \"cidade a cidade\" em estradas públicas rurais, nas quais os participantes eram enviados individualmente em intervalos. Um dos gatilhos para a fundação da ACF foi o rebaixamento de Albert de Dion da corrida Paris-Rouen em 1894. Nos anos seguintes, o rápido desenvolvimento começou, com veículos cada vez mais potentes aumentando muito os perigos do automobilismo. A ACF, portanto, implementou regras pela primeira vez em 1901, que podem ser consideradas as primeiras regulamentações de automobilismo do mundo. Uma inovação central foi a divisão em categorias que tinham que se aplicar a todos os eventos apoiados pela ACF. A limitação de peso resultante deve ajudar inicialmente a reduzir o imenso número de defeitos de pneus devido à sobrecarga."
 vikelas.501.g: "Um esporte cheio de emoções!"
 vikelas.502.t: "Primeira corrida do Grande Prêmio"
 vikelas.502.d: "O automobilismo está tomando um rumo revolucionário: com as corridas de Grand Prix, corridas internacionais serão realizadas uma após a outra em todas as nações amantes do automobilismo. Com isso, um campeonato internacional nasceu. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] convidou todas as nações com um Automobile Club para participar de seu primeiro Grand Prix no próximo ano."
 vikelas.502.f: "As corridas anuais para a Gordon Bennett Cup foram a primeira tentativa de realizar um campeonato mundial de automóveis de 1900 a 1905. Em vista do aumento constante das velocidades, em 1902 a ACF emitiu regulamentos técnicos pela primeira vez na forma de uma chamada fórmula de corrida, à qual os carros participantes tinham que aderir. No entanto, a frequência de acidentes continuou a aumentar, de modo que a partir de 1903 apenas corridas de circuito puderam ser realizadas em percursos fechados. Como sucessora das corridas Gordon Bennett, a corrida principal organizada pela ACF ocorreu pela primeira vez em 1906 sob o nome de Grand Prix. O primeiro vencedor do Grand Prix na história foi o piloto húngaro Ferenc Szisz em um Renault."
 vikelas.502.g: "Então há algo a ser conquistado?"
 vikelas.503.t: "Associação Internacional dos Clubes Automobilísticos Reconnus"
 vikelas.503.d: "Hoje, a International Automobile Association foi fundada em [GetGlobalVariable('vikelas_aiacr_seat_global_var').GetStateRegion.GetCityHubName]. Seu nome completo é Association Internationale des Automobile Clubs Reconnus (AIACR)."
 vikelas.503.f: "Para que os fabricantes de automóveis pudessem participar de todas as corridas internacionais, tornou-se necessário ter os regulamentos técnicos e esportivos que haviam sido estipulados de forma independente pelo French Automobile Club para suas corridas na forma da respectiva fórmula Grand Prix regulamentada em todos os países por uma International Automobile Association. A associação foi fundada em 20 de junho de 1904 em Paris como a Association Internationale of the Automobile Club Reconnus (AIACR), após a decisão de fundá-la ter sido tomada alguns dias antes pelos clubes de automóveis das nações de corrida mais importantes como parte da Gordon Bennett Cup em Bad Homburg. A AIACR iria se renomear FIA após a Segunda Guerra Mundial."
 vikelas.503.g: "A partir de agora, as corridas de automóveis são internacionais!"
 vikelas.504.t: "Novo circuito de corrida do Grande Prêmio"
 vikelas.504.d: "Outro membro da AIACR construiu um circuito oficial de Grand Prix. Agora há #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V circuitos de Grand Prix#! no calendário anual de corridas."
 vikelas.504.f: "'Automobilismo, touradas e montanhismo são os únicos esportes reais... todos os outros são jogos.' -Ernest Hemingway"
 vikelas.504.g: "Reserve os assentos VIP nas arquibancadas."
 vikelas.505.t: "Localização do fabricante do carro de corrida"
 vikelas.505.d: "Com [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')], [GetPlayer.GetName] tem sua primeira equipe de corrida de série. A fábrica de carros em [SCOPE.sState('vikelas_team_state').GetName] agora está desfrutando de grande demanda devido à marca estabelecida."
 vikelas.505.f: "Com o lento desenvolvimento de pilotos individuais masculinos para equipes de corrida profissionais com pilotos de fábrica, o automobilismo mudou permanentemente. Amadores com carros autoconstruídos se tornaram uma raridade. Embora ainda acontecesse que aristocratas excêntricos com licenças de outros fabricantes de automóveis buscassem a emoção, o desenvolvimento de carros se tornou o verdadeiro centro do automobilismo."
 vikelas.505.g: "Agora podemos projetar nossos próprios carros de corrida!"
 vikelas.506.t: "Mecânico de carros de corrida"
 vikelas.506.d: "O engenheiro-chefe Dr. [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName] selecionou um excelente assistente da equipe [SCOPE.sCharacter('gaudi_engineer_scope').GetHerHis] que poderia atuar como mecânico para a recém-fundada equipe de corrida: [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. A especialização da [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] é na área de..."
 vikelas.506.f: "Os mecânicos podem fazer melhorias nas três áreas de um carro: motor, segurança e carroceria. A especialização ajuda a realizar a modernização em uma área específica duas vezes mais rápido. Basicamente - mas nem sempre - é verdade que os motores aumentam a confiabilidade (e a velocidade), as extensões de segurança aumentam a segurança e as carrocerias aumentam a velocidade (e a segurança)."
 vikelas.506.h: "Motor."
 vikelas.506.i: "Segurança."
 vikelas.506.j: "Corpo."
 vikelas.511.t: "A Grande Corrida [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]"
 vikelas.511.d: "O [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] anunciou uma grande corrida de carros em sua edição semanal atual. A corrida de cidade para cidade foi projetada para ir de [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] a [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]. Vários pilotos de corrida também são esperados do exterior."
 vikelas.511.f: "Os primeiros dias do automobilismo foram caracterizados pelos chamados gentleman drivers que participavam de corridas de cidade para cidade em carros construídos por eles mesmos com seu mecânico, que muitas vezes também servia como motorista. Esse formato de corrida era frequentemente anunciado, organizado e apoiado por jornais e clubes de automóveis. Como os mecânicos geralmente ainda estavam na infância, era mais importante chegar ao destino. Acidentes fatais como o de Marcel Renault na corrida Paris-Madrid significavam que essa forma de organização era apenas uma fase de transição na história das corridas."
 vikelas.511.g: "Prepare-se para o evento em três meses."
 vikelas.512.t: "Participação na Corrida"
 vikelas.512.d: "A próxima corrida [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] em [SCOPE.sCountry('vikelas_race_country').GetName] levou a especulações sobre se o principal piloto do nosso país, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], também participará."
 vikelas.512.g: "Uma excelente oportunidade!"
 vikelas.512.h: "Isso é muito perigoso."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se preparará para a corrida em três meses."
 vikelas.513.t: "Passeio Livre"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] tem sorte: [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] pode dar aceleração total na estrada aberta. O motor para, as curvas são suaves. Melhores requisitos para um piloto de corrida."
 vikelas.513.f: "\"Quando a velocidade entra no sangue, é preciso dirigir para viver.\" - Rudolf Carraciola"
 vikelas.513.g: "Fantástico!"
 vikelas.514.t: "Natureza linda e intocada"
 vikelas.514.d: "Enquanto [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] dirige de cidade em cidade, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] percebe a natureza intocada na área por onde [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] está dirigindo. Talvez [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] devesse levar uma lembrança com ele?"
 vikelas.514.f: "Na fase inicial do automobilismo, uma atração especial era dirigir por paisagens tão selvagens e intocadas quanto possível, o que apresentava desafios ao motorista. As primeiras pistas de corrida foram, portanto, também criticadas porque supostamente exigiam menos habilidade de direção e requisitos de adaptação. Claro, alguns vales remotos, praias e áreas montanhosas podem oferecer surpresas."
 vikelas.514.g: "Temos uma corrida para vencer!"
 vikelas.514.h: "Colete algumas plantas."
 vikelas.514.i: "Colete algumas pedras."
 vikelas.515.t: "Açúcar no Tanque"
 vikelas.515.d: "Durante uma parada curta, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] percebe que o carro do competidor [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHis] [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] também está próximo. Aparentemente, o carro está completamente despercebido."
 vikelas.515.f: "\"Se você não está trapaceando, você não está tentando.\""
 vikelas.515.g: "Uma doce vingança."
 vikelas.516.t: "Uma ajudinha para um amigo?"
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] está atualmente em uma boa posição, mas vê o carro fumando de [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] na beira da estrada. Talvez [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] deva verificar se está tudo bem?"
 vikelas.516.f: "Ferimentos e acidentes de carro eram comuns nos primeiros dias das corridas. No entanto, embora em tempos posteriores houvesse fiscais disponíveis em rotas fechadas, uma pane poderia ser perigosa em corridas de longa distância sem um observador. Lobos ainda eram vistos na Mille Miglia nos Apeninos na década de 1930. É por isso que a ajuda entre colegas de corrida geralmente vem naturalmente."
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] deveria parar e ajudar."
 vikelas.516.h: "Haha! Tolos!"
 vikelas.517.t: "Problemas no motor"
 vikelas.517.d: "Algo - nem mesmo [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] consegue explicar - está acontecendo com o motor. Um diagnóstico até agora não teve sucesso. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] pode ter que continuar a corrida em velocidade reduzida."
 vikelas.517.f: "Problemas de motor ocorrem em todas as formas de automobilismo - tanto naquela época quanto agora. Houve vários pilotos que tiveram que abandonar uma corrida mais cedo porque estavam na liderança. Do jeito que as coisas estão, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] ainda pode terminar a corrida, mas apenas se ele diminuir o ritmo, o que tornaria muito mais difícil vencer."
 vikelas.517.g: "Utilize todas as medidas de ajuste fino mecânico disponíveis."
 vikelas.517.h: "O carro tem que sobreviver à corrida assim."
 vikelas.518.t: "Unhas"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] conseguiu construir uma certa liderança sobre o resto do campo. Talvez [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] pudesse melhorar suas chances de vencer e dificultar a vida do resto do campo?"
 vikelas.518.f: "\"Eu sei que ele estava trapaceando porque eu estava trapaceando e ele me batia.\""
 vikelas.518.g: "Pegue as unhas, Muttley."
 vikelas.518.h: "Nós nos abstemos de tais práticas antidesportivas."
 vikelas.519.t: "Desqualificação"
 vikelas.519.d: "Infelizmente, a má conduta esportiva de [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] veio à tona. A comissão de corrida, portanto, excluiu imediatamente [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim] de outras corridas."
 vikelas.519.f: "'De acordo com os regulamentos da corrida cidade a cidade, de acordo com o parágrafo 12 parágrafo 6 linha 9, o participante violou as regras gerais e, portanto, será excluído antecipadamente. Não é possível apelar.'"
 vikelas.519.g: "Desqualificado? Isso é injusto!"
 vikelas.520.f: "#V Resultados finais#!\n\nFirst Lugar: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] de [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nSegundo lugar: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] de [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nTerceiro lugar: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] de [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.520.g: "Champanhe!"
 vikelas.521.t: "Vitória para [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ficou em primeiro lugar na corrida de cidade para cidade em [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] dirigiu um [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.521.g: "Champanhe!"
 vikelas.522.t: "2º lugar para [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ficou em segundo lugar na corrida cidade a cidade em [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] dirigiu um [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.522.g: "Até a próxima!"
 vikelas.523.t: "3º lugar para [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ficou em terceiro lugar na corrida cidade a cidade em [SCOPE.sCountry('vikelas_race_country').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] dirigiu um [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.524.t: "Fim da corrida de cidade para cidade"
 vikelas.524.d: "A grande corrida de cidade para cidade em [SCOPE.sCountry('vikelas_race_country').GetName] acabou e os vencedores foram escolhidos. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] dirigiu um [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]. Embora não tenhamos conseguido um bom posicionamento, pelo menos o carro e o motorista chegaram sãos e salvos."
 vikelas.531.t: "Corrida de resistência"
 vikelas.531.d: "[GetPlayer.GetName] organizou uma grande corrida de resistência e convidou corredores do mundo inteiro para participar."
 vikelas.531.f: "As primeiras corridas de carros no início do século XX foram corridas de longa distância com o maior alcance possível. Elas deveriam testar a velocidade e a confiabilidade dos carros de corrida. Enquanto a França dominava as corridas nos estágios iniciais, eles logo passaram para as corridas de Grand Prix. Isso não mudou o fato de que ainda havia importantes corridas de resistência internacionais. A corrida mais tradicional era a Targa Florio na Sicília. De 1906 a 1977, foi realizada principalmente em maio como um importante evento internacional, algumas com status de Copa do Mundo. Depois da Targa Florio, a Thousand Miles (Mille Miglia) foi considerada um clássico entre as corridas de rua (a Carrera Panamericana foi adicionada na década de 1950) e a base para o termo 'Gran Turismo' (GT), que descreve carros esportivos de turismo rápidos para corridas de longa distância, como aqueles desenvolvidos pela Ferrari especificamente para o MM."
 vikelas.531.g: "Vejo vocês na linha de chegada!"
 vikelas.533.t: "Danos nos pneus"
 vikelas.533.d: "No meio da corrida, um pneu estourado leva a uma parada repentina por [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]. Apesar do incidente, o piloto permaneceu ileso e impressionado com suas ações sensatas, mas perdeu um tempo importante."
 vikelas.533.f: "A Mille Miglia de 1931 foi caracterizada por um desgaste maciço dos pneus. Antes de chegar a Roma, Arcangeli teve que trocar um pneu nove vezes. Nuvolari também teve vários furos, mas ainda liderava Caracciola por dois minutos em Roma. Na viagem de volta ao Adriático, os Alfa Romeos mantiveram seu ritmo animado apesar dos problemas com os pneus. No meio tempo, Borzacchini liderou a competição por 18 minutos. Ao longo da costa mediterrânea ao norte, Campari estava quatro minutos à frente do ressurgente Arcangeli. A liderança mudou várias vezes dentro dos Alfa Romeos e os italianos pareciam ter tudo sob controle após dois terços da distância da corrida. Isso também se deveu a uma densa rede de postos de serviço, o que tornou muitas trocas de pneus possíveis. A decisão foi tomada nos últimos 80 quilômetros, quando uma forte chuva começou e os Alfa Romeos tiveram acidentes com seus pneus mais uma vez desgastados."
 vikelas.533.g: "Má sorte."
 vikelas.534.t: "A travessia ferroviária"
 vikelas.534.d: "Enquanto persegue outro motorista, um som de alerta soa de repente: uma barreira ferroviária se abaixa na frente dos dois carros. O carro da frente acelera. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] deve decidir se para ou arrisca cruzar antes que o oponente ganhe muito espaço."
 vikelas.534.f: "Os motoristas da Mille Miglia eram propensos a manobras ousadas, como Hans Hermann, que competiu em 1954, que dirigiu seu carro sob uma barreira ferroviária que estava se fechando, fazendo com que ele e seu passageiro tivessem que abaixar a cabeça."
 vikelas.534.g: "Arrisque!"
 vikelas.534.h: "Isso é muito temerário!"
 vikelas.538.t: "Lobos e Revólveres"
 vikelas.538.d: "Em uma viagem noturna montanhosa, a equipe de corrida sai da pista. De repente, ouve-se um uivo. Uma matilha de lobos parecia estar por perto."
 vikelas.538.f: "'Nós nos encontramos em uma nevasca, e fomos perseguidos por lobos. Eles foram postos em fuga, no entanto, por tiros do revólver que eu sempre mantinha sob a almofada do assento, e pela chegada de um grupo de bandidos armados com tochas e armas.' - Enzo Ferrari"
 vikelas.538.g: "Mate os lobos."
 vikelas.538.h: "Dirija bastante pela área."
 vikelas.538.i: "Essa descoberta é muito mais importante do que uma corrida estúpida."
 vikelas.539.t: "Carro de corrida atropela espectadores!"
 vikelas.539.d: "Um terrível acidente ocorreu quando um carro de corrida saiu da pista durante a corrida e foi contra a multidão. O mundo do automobilismo está abalado e o debate sobre padrões de segurança está se inflamando novamente."
 vikelas.539.f: "Desde a primeira Mille Miglia em 1927, o evento foi poupado de acidentes catastróficos, apesar do grande número de espectadores nas margens das estradas. Isso mudou em 3 de abril de 1938 às 16h30. Neste ponto, os dois motoristas genoveses Angelo Mignanego e seu copiloto Dr. Luigi Bruzzo em sua Lancia Aprilia ao longo da Viale Berti Pichat em Bolonha. A uma velocidade de pouco menos de 100 km/h, o inexperiente Mignanego perdeu o controle do carro nos trilhos do bonde ali colocados. O Lancia primeiro colidiu com uma árvore e depois com um grande grupo de espectadores. Enquanto os dois ocupantes do carro estavam quase ilesos, dez pessoas, incluindo sete crianças, morreram no acidente. 26 espectadores ficaram feridos, alguns gravemente. Uma menina de 12 anos morreu em outro acidente em Stanghella."
 vikelas.539.g: "Um dia negro para as corridas."
 vikelas.540.t: "Novo recorde de velocidade média"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] atingiu uma velocidade média sem precedentes em corridas de resistência. O recorde ficará marcado como um marco na história do automobilismo."
 vikelas.540.f: "Com precisão de tirar o fôlego e maestria técnica, [GetPlayer.GetCustom('vikelas_race_team_name_type')] atingiu uma velocidade média que antes era considerada impossível. O recorde será considerado por muito tempo o destaque desta era de ouro do automobilismo."
 vikelas.545.t: "Encontro de fãs!"
 vikelas.545.d: "Durante a corrida de resistência entre duas cidades, uma multidão animada se reuniu para celebrar a passagem de [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] por sua cidade. Este evento marca a ascensão do automobilismo como uma sensação pública."
 vikelas.545.f: "As ruas estavam cheias de pessoas que se aglomeravam para dar uma olhada no carro passando em alta velocidade. Crianças agitavam bandeiras e adultos gritavam o nome do piloto cujas habilidades e coragem os inspiravam. Quando o carro parou, uma onda de excitação tomou conta dele. Flores, aplausos e vivas acompanharam a curta parada antes do motorista partir novamente. Foi um momento que acendeu uma paixão por velocidade e tecnologia nos corações das pessoas - um gostinho do que o automobilismo significaria nas décadas seguintes."
 vikelas.545.g: "As corridas se tornam populares."
 vikelas.541.t: "Fim da corrida de resistência"
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] de [SCOPE.sCountry('vikelas_first_winner_scope').GetName] venceu a prestigiosa corrida de resistência e também os corações dos espectadores."
 vikelas.541.f: "Os últimos quilômetros foram um verdadeiro espetáculo: a poeira rodopiava pela pista, os motores rugiam e a excitação era palpável. Quando o vencedor finalmente cruzou a linha de chegada, aplausos estrondosos irromperam. Seu carro, coberto com as marcas de uma corrida amarga, tornou-se um símbolo de sua vontade de vencer. Os fãs o carregaram em seus ombros enquanto a multidão celebrava o momento. Com este triunfo, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se torna uma das personalidades mais importantes do automobilismo e sua equipe de corrida [GetPlayer.GetCustom('vikelas_race_team_name_type')] se torna uma marca altamente respeitada."
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "Grande Prêmio de [GetPlayer.GetName]"
 vikelas.551.d: "A temporada de corridas chegou a [GetPlayer.GetNameNoFormatting]. Vários pilotos de corrida e suas equipes de corrida já chegaram para se preparar para o Grand Prix que nosso país sediará em breve."
 vikelas.551.f: "'Correr é viver. Todo o resto é simplesmente esperar.' -Rudolf Carraciola"
 vikelas.551.g: "Que vença o mais rápido."
 vikelas.552.t: "Volta mais rápida"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] conseguiu a volta mais rápida no treinamento de corrida. Essas são excelentes perspectivas para a corrida real."
 vikelas.552.f: "'Mesmo antes do início, eu tinha certeza da vitória.' - Ettore Bugatti"
 vikelas.553.t: "Mancha de óleo"
 vikelas.553.d: "Durante a corrida Grand prix, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] entrou na mancha de óleo de um veículo acidentado e saiu da estrada. O piloto e o carro conseguem continuar dirigindo, mas perderam muito tempo na corrida atual."
 vikelas.553.f: "\"Eu faço carros para andar. Não para parar.\" -Ettore Bugatti"
 vikelas.553.g: "Oh não!"
 vikelas.554.t: "Chuva"
 vikelas.554.d: "A corrida do Grand Prix foi surpreendida por uma frente de chuva repentina. Alguns pilotos pararam para trocar seus equipamentos. A questão para [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] é se [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] deve completar a corrida de forma imprudente ou diminuir a velocidade para estar no lado seguro."
 vikelas.554.f: "\"Não tema nada. Apenas acredite.\" - Armand Peugeot"
 vikelas.554.g: "Isso não tira o piloto da pista!"
 vikelas.554.h: "Diminua o ritmo."
 vikelas.555.t: "Manobra de ultrapassagem"
 vikelas.555.d: "Uma oportunidade única surge quando [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] se aproxima de [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], um piloto de [SCOPE.sCountry('vikelas_race_country_scope').GetName]. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] deve tentar uma manobra de ultrapassagem?"
 vikelas.555.f: "\"O carro de corrida perfeito cruza a linha de chegada primeiro e depois se desfaz em suas partes individuais.\" - Ferdinand Porsche"
 vikelas.555.g: "Força!"
 vikelas.555.h: "Isso é muito arriscado."
 vikelas.556.t: "Manobra de ultrapassagem bem-sucedida"
 vikelas.556.d: "A manobra de ultrapassagem foi um sucesso total. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] está à frente e tem vantagem de velocidade."
 vikelas.556.f: "\"Quando vejo um Alfa Romeo passar, tiro o chapéu.\" - Henry Ford"
 vikelas.556.g: "Viva!"
 vikelas.557.t: "Falha na manobra de ultrapassagem"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] não conseguiu realizar a manobra de ultrapassagem. O adversário se defendeu com sucesso e nosso piloto de corrida perdeu muito tempo."
 vikelas.557.f: "\"É azar, mas está tudo no jogo. Fiz o meu melhor, e já que perdi, estou a favor do homem que escolheu o prêmio.\" -Ralph DePalma"
 vikelas.557.g: "Que pena."
 vikelas.558.t: "Home Multidão motiva Racer"
