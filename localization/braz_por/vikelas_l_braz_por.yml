 vikelas.592.t: "Nosso [concept_vikelas_racer] morreu"
 vikelas.592.d: "Depois de passar anos como um [concept_vikelas_racer], o famoso piloto de corrida do nosso país morreu. Será que algum dia conseguiremos substituir um talento tão surpreendente?"
 vikelas.592.g: "Esta é uma perda enorme!"
 vikelas.592_tt: "Às vezes, o jogo mata personagens. Um mod não pode impedir que isso aconteça. Este evento remove o papel daquele [concept_character] do jogo, para que você não seja assombrado por um fantasma deles."
 vikelas.593.t: "Acidente de carro fatal"
 vikelas.593.d: "O piloto de corrida [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] abusou da sorte. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] saiu da estrada em alta velocidade e sofreu um acidente fatal."
 vikelas.593.f: "'Correr é uma grande mania à qual é preciso sacrificar tudo, sem reticências, sem hesitação.' - Enzo Ferrari"
 vikelas.593.g: "Próximo!"
 vikelas.594.t: "Quebra de carro"
 vikelas.594.d: "Infelizmente, o piloto [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] teve que desistir antes que a corrida acabasse. O carro quebrou, alega [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]."
 vikelas.594.f: "\"A má sorte não existe.\" -Enzo Ferrari"
 vikelas.594.g: "Foi o carro ou o motorista estimulou demais o motor?"
