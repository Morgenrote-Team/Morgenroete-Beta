 vikelas.584.t: "O motor V"
 vikelas.584.d: "Nosso engenheiro Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] fez uma proposta inovadora sobre como seria um novo motor para corrida e contatou o mecânico [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]."
 vikelas.584.f: "Um motor V é um tipo de motor de pistão alternativo com vários cilindros. Eles são divididos em dois bancos de cilindros que estão em um ângulo um em relação ao outro. Os motores V são amplamente utilizados, especialmente com um número maior de cilindros e espaço de instalação limitado. O design compacto economiza material e, portanto, peso. O primeiro motor V, um V-twin de dois cilindros, foi projetado por Wilhelm Maybach e usado no automóvel Daimler Stahlradwagen de 1889. O primeiro motor V8 foi produzido em 1903, na forma do motor Antoinette projetado por Léon Levavasseur para barcos de corrida e aviões."
 vikelas.584.g: "Heureca!"
 vikelas.585.t: "Combustível melhorado"
 vikelas.585.d: "Nosso químico Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] desenvolveu ainda mais o combustível para motores de combustão interna de tal forma que ele poderia desempenhar um papel crucial no aumento da eficiência e do desempenho dos carros de corrida. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] demonstrou grande interesse em testes."
 vikelas.585.f: "As primeiras décadas de combustíveis a gasolina foram extremamente mutáveis. Muitas empresas tendiam a esticar o combustível ou misturá-lo com outros combustíveis puros. Nikolaus August Otto já usava álcool retificado. Em alguns países, a escassez de petróleo levou ao desenvolvimento de alternativas - ou para tornar a quantidade de combustível disponível mais eficiente. Nas corridas, combustíveis e óleos lubrificantes aprimorados eram usados ​​para garantir que o desempenho de direção fosse otimizado."
 vikelas.585.g: "Heureca!"
 vikelas.586.t: "Forças Aerodinâmicas"
 vikelas.586.d: "Nosso físico Dr. [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName] descreveu alguns cálculos sobre forças aerodinâmicas que podem ser úteis para a construção de veículos. O mecânico de automóveis [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] recebeu uma cópia do artigo."
 vikelas.586.f: "\"Aerodinâmica é para pessoas que não sabem construir motores.\" -Enzo Ferrari"
 vikelas.586.g: "Heureca!"
