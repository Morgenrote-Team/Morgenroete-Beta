 vikelas_sports_clubs_tech: "Sports Clubs"
 vikelas_sports_clubs_tech_desc: "In the 18th century, the first sports clubs emerged in England, particularly for horse racing, boxing, and cricket. They played a central role in the institutionalization of sport: through organizational structures, memberships, and regular events, binding rules and regulations were established. This professionalization laid the foundation for modern sports systems with associations, leagues, and international competitions."
 vikelas_international_sports_tech: "International Sports"
 vikelas_international_sports_tech_desc: "The popularity of sporting competitions spread first nationally, then internationally. To better regulate competitions between nations, international committees, federations, and rules were needed. The Olympic Games and the IOC are the most prominent figures in this development."
