 je_vikelas_basketball_fail: "Any country invents basketball before [GetPlayer.GetName]."
 je_vikelas_baseball: "Baseball"
 je_vikelas_baseball_reason: "Baseball became the national sport of the United States in the 19th century and from there began its journey around the world. The first documented game took place in Hoboken, New Jersey, in 1846. In the 1860s, the game rapidly professionalized; in 1876, the National League, the first major professional league, was founded. At the same time, baseball spread to other countries through American soldiers, traders, and missionaries."
 je_vikelas_baseball_fail: "Any country invents baseball before [GetPlayer.GetName]."
 je_vikelas_football: "Football"
 je_vikelas_football_reason: "The first uniform football rules emerged in England in the 1840s, the Football Association was founded in 1863, and the first official international match between England and Scotland took place in 1872. From Great Britain, football spread to the continent and South America. National associations and leagues emerged in Germany, France, Italy, and Spain from the 1890s onwards. At the same time, football also spread to Argentina, Brazil, and Uruguay, where British railway workers and emigrants founded the first clubs."
 je_vikelas_football_fail: "Any country invents football before [GetPlayer.GetName]."
 je_vikelas_cricket: "Cricket"
 je_vikelas_cricket_reason: "The origins of cricket date back to the late Middle Ages: As early as the 16th century, children in Kent played a simple game of bat and ball, referred to in old documents as 'creckett' or 'creag.'' However, it wasn't until the 18th century that it began to develop into a complex, regulated game. During this period, the first organized clubs emerged, and with the founding of the Marylebone Cricket Club (MCC) in London in 1787, cricket gained a focal point. The MCC established the first binding rules, which became the starting point for the modern game."
 je_vikelas_cricket_fail: "Any country invents cricket before [GetPlayer.GetName]."
 je_vikelas_cricket_national_league: "National Cricket League"
 je_vikelas_cricket_national_league_reason: "In the 19th century, cricket, long established in England as a pastime of both aristocrats and commoners, began to take on a more organized structure. The decisive moment came in 1890 with the creation of the County Championship, the first official domestic cricket league in the world. Before that, matches between counties had been played since the 18th century, but without a formal points system or championship table. The County Championship brought a standardized competition to English cricket, with Yorkshire, Surrey, and Lancashire emerging as dominant teams in the early years. Cricket clubs outside England, particularly in Australia and South Africa, also began organizing structured competitions."
 je_vikelas_baseball_national_league: "National Baseball League"
 je_vikelas_baseball_national_league_reason: "In the 1860s, the sport of baseball, previously popular primarily in New York, became a national phenomenon in the United States. The decisive factor for this was soldiers who played the game in military camps during the American Civil War and thus ensured that the sport became more widespread. In 1857, the first American baseball association, the National Association of Base Ball Players (NABBP), was founded. By 1867, more than 400 clubs had joined the association. However, the strongest teams were still located in the northeastern United States, particularly in New York. Founded in 1871, NABBP's successor organization, the National Association of Professional Base Ball Players (NAPBBP) - also known as the National Association (NA) - is considered the first professional baseball league in the world."
 je_vikelas_football_national_league: "National Football League"
 je_vikelas_football_national_league_reason: "In the late 19th century, football, which had previously been a loosely organized pastime in England's public schools and local communities, transformed into a national phenomenon. The decisive factor for this was the founding of The Football Association (FA) in 1863, which codified the rules and enabled organized competition. By the 1870s, the sport's popularity had spread rapidly, especially among the working-class communities in industrial cities. In 1888, the Football League was established in England, becoming the first professional football league in the world. It brought together 12 clubs from the Midlands and the North, with teams like Preston North End and Aston Villa among the early powerhouses."
 je_vikelas_basketball_national_league: "National Basketball League"
 je_vikelas_basketball_national_league_reason: "In the early 20th century, basketball, invented in 1891 by James Naismith, evolved from a YMCA training activity into a competitive sport. The key development came in 1898 with the founding of the National Basketball League (NBL) in the United States, regarded as the first professional basketball league in the world. The league consisted of six teams from Pennsylvania and New Jersey and marked basketball's first steps toward professionalism. However, the original NBL was short-lived and disbanded in 1904. It would take until 1946, with the formation of the Basketball Association of America (BAA) - later merged into the NBA - for professional basketball to become a stable, nationwide enterprise."
