 je_vikelas_basketball: "Basquete"
 je_vikelas_basketball_reason: "Rápido, baseado em equipes e construído para a cidade moderna — pode ser o jogo do século."
 vikelas.21.t: "The Gentlemen's Game"
 vikelas.21.d: "In [SCOPE.sState('vikelas_cricket_state').GetName], a group of cricket players has come together for the first time to play matches together under established rules. The club thus assumes a pioneering role in the sport."
 vikelas.21.f: "The 19th century was the era in which cricket evolved from a rural pastime to a sport of national and international importance. The English upper classes made the game their favorite pastime: it was cultivated in boarding schools like Eton and Harrow and glorified as a 'gentleman's sport.' At the same time, its popularity grew among the working class, particularly in northern England, where factory workers founded their own clubs. This democratization of the game led to an unprecedented growth in clubs and spectators.\n\nInternational matches were not long in coming. In 1844, the world's first documented international match between Canada and the United States took place in New York."
 vikelas.21.g: "Pass me the bat!"
 vikelas.601.t: "Pedais no Asfalto"
 vikelas.601.d: "Uma nova invenção surgiu nos bulevares — uma engenhoca de duas rodas movida por pedais fixados diretamente na roda dianteira. Chama-se 'velocípede'."
 vikelas.601.f: "Nos parques e nas amplas ruas da capital, as cabeças se viram. Cavalheiros de chapéu e colete empoleiram-se em estranhas estruturas de ferro, pedalando furiosamente, cambaleando por entre multidões assustadas. Alguns caem. Alguns voam. Crianças riem. Velhos estadistas arqueiam as sobrancelhas. Os jornais chamam-lhe le vélocipède — metade brinquedo, metade promessa. Inventada por um fabricante de carruagens, esta \"agitadora de ossos\" é tão pesada quanto revolucionária. Sobre os paralelepípedos, sacode a coluna. Mas em passeios suaves, move-se com uma graça surpreendente. Há murmúrios de que isto não é mera novidade, mas a semente de um novo tipo de movimento."
 vikelas.601.g: "Uma moda divertida!"
 vikelas.602.t: "A Bicicleta do Futuro"
 vikelas.602.d: "Um novo design de bicicleta surgiu, apresentando rodas de tamanho igual, um eixo traseiro acionado por corrente e equilíbrio aprimorado. Ao contrário das precárias bicicletas de roda alta, esta \"bicicleta de segurança\" é estável, acessível e rapidamente se tornando uma sensação. O seu inventor? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!"
 vikelas.602.f: "Os antigos velocípedes agitavam ossos e nervos igualmente. As imponentes bicicletas de roda alta ofereciam velocidade, mas a um preço que poucos estavam dispostos a pagar — um passo em falso, e o ciclista voava. Agora, um novo tipo de bicicleta está se espalhando das oficinas em nossa capital: compacta, elegante e segura. Com uma corrente de transmissão para a roda traseira e pneus pneumáticos, até senhoras e trabalhadores começam a pedalar. Ruas outrora dominadas por carruagens agora ecoam com o zumbido suave da borracha na pedra. Em cafés e fábricas, o veredito é o mesmo: isso não é um brinquedo. É liberdade — rápida, silenciosa e subitamente ao alcance."
 vikelas.602.g: "Que cada cidadão entre na era moderna."
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.611.d: "O dia chegou. Pilotos de todo o país se reúnem na linha de partida, ansiosos para testar homem e máquina na estrada aberta. O ar crepita com antecipação."
 vikelas.611.f: "O sol nasce sobre o bulevar, já lotado de espectadores. Bandeiras tremulam. O cheiro de graxa e poeira paira no ar da manhã. Dezenas de ciclistas montam em suas bicicletas — algumas máquinas reluzentes, recém-saídas da fábrica, outras remendadas em oficinas de vielas.\nUm tiro ecoa. Aplausos irrompem. E as rodas começam a girar.\nEles pedalam pelos portões da cidade e para o campo. Agricultores fazem uma pausa em seus campos. Crianças correm ao lado da estrada. Padres os abençoam. Céticos zombam. E ainda assim, enquanto a poeira fica para trás, uma estranha sensação surge na multidão: isso parece o começo de algo maior."
 vikelas.611.g: "Que cada cidade ouça o zumbido do progresso."
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.621.d: "O vencedor da corrida nacional de bicicletas capturou mais do que apenas a linha de chegada — ele capturou a imaginação da nação. Agora, todos os olhos se voltam para o que ele representa."
 vikelas.621.f: "Os jornais o chamam de 'O Cavaleiro de Ferro'. Nascido em uma família de tecelões, órfão aos doze anos, operário de fábrica aos dezesseis. Sua vitória em uma bicicleta de segurança esfarrapada — remendada, arranhada e lubrificada com cuidado — não foi um mero triunfo esportivo. Foi uma parábola. As multidões gritam seu nome. Pintores o esboçam. Crianças imitam sua postura. Mas mais do que isso, os ideólogos tomam nota. Alguns o chamam de o rosto da força do trabalho. Outros dizem que ele prova a vitalidade da nação. A imprensa discute se ele é um trabalhador, um patriota — ou algo inteiramente novo. O próprio ciclista fala pouco. \nEle sorri, acena com a cabeça e pedala."
 vikelas.621.g: "Faça dele um herói da classe trabalhadora."
 vikelas.621.h: "Celebre-o como um ícone nacional."
 vikelas.621.i: "Apresente-o como um símbolo de progresso e do homem moderno."
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.622.d: "Um trágico acidente aconteceu durante a corrida nacional de bicicletas. Um ciclista está morto e vários outros ficaram feridos. Os aplausos pararam."
 vikelas.622.f: "Uma roda pegou um sulco. Um grito, um estrondo e depois gritos. Espectadores avançaram enquanto bicicletas caíam como dominós. Sangue misturado com poeira. Capacetes racharam. Ossos quebraram. Um jovem — dezessete, aprendiz de fábrica — morreu no impacto. Os jornais estão divididos. Alguns chamam de preço necessário do progresso, outros denunciam a imprudência do esporte público."
 vikelas.622.g: "Honrar os caídos."
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.623.d: "Uma etapa particular da corrida capturou o coração do público. Os espectadores falam dela não apenas como uma competição, mas como uma lenda."
 vikelas.623.f: "Os pilotos desapareceram nas colinas ao amanhecer. O que se seguiu não foi mais uma corrida, mas um teste de espírito. Uma dúzia ficou para trás. Três desabaram. Um caiu em uma curva fechada e levantou-se sangrando, recusando ajuda. Mas um avançou através do nevoeiro para os corações de milhares. A nação inteira não fala de outra coisa."
 vikelas.623.g: "Que a estrada se lembre do seu esforço por gerações."
 vikelas.623.h: "Comissionar uma pintura do momento."
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.624.d: "Acusações surgiram após a última etapa da corrida. Um ciclista foi pego trapaceando — embora alguns aleguem que ele estava apenas fazendo o que todo mundo faz, mas de forma menos discreta."
 vikelas.624.f: "Disseram que ele trocou de bicicletas atrás do celeiro. Outros dizem que ele foi rebocado para cima da colina por um fio escondido.\n\nOs fatos estão borrados. O que está claro é isto: o ciclista estava rápido demais. Espetacularmente rápido. Fresco demais depois de uma subida brutal. Seus rivais fumegam. Os espectadores engasgam. A imprensa fareja sangue. Uma fotografia mostra um segundo homem com roupas iguais. Outra testemunha afirma ter visto o ciclista sendo empurrado por um carro durante a etapa noturna. O acusado nega tudo, chamando isso de inveja e política."
 vikelas.624.g: "Desqualifique o atleta e exponha a fraude."
 vikelas.624.h: "Abafar isso para o bem do esporte."
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.625.d: "Uma rivalidade acirrada tomou conta da temporada de corridas deste ano. Dois pilotos — iguais em força, opostos em estilo — dividiram a nação em dois campos."
 vikelas.625.f: "Um é fogo: imprudente, ousado, adorado pelos jovens. Joga o boné para a multidão, ri enquanto pedala e ataca sem aviso.\nO outro é gelo: calmo, calculista, quase matemático. Poupa forças, ganha por segundos e fala apenas quando necessário.\n\nSeus nomes são gritados dos telhados. As cidades tomam partido. Cartazes são impressos em vermelho ou azul. Alfaiates vendem bonés em suas cores. Crianças imitam suas posturas em bicicletas de madeira.\nOs jornais falam de mais do que apenas uma corrida. Falam de caráter, de filosofia, de quem as pessoas querem ser. E nenhum dos ciclistas cede um milímetro."
 vikelas.625.g: "Isso beneficiará a cultura dos jornais."
 vikelas.625.h: "Use a rivalidade para ganho político."
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.626.d: "Uma rivalidade acirrada tomou conta da temporada de corridas deste ano. Dois pilotos — iguais em força, opostos em estilo — dividiram a nação em dois campos."
 vikelas.626.f: "'Encontraram-no numa forja de aldeia, martelo na mão, rosto enegrecido pela fuligem, sozinho.'\n\nA descida era traiçoeira. Uma curva mal calculada, um ranger de cascalho—e o garfo dianteiro partiu-se. A sua bicicleta dobrou como um pássaro ferido. A maioria teria parado. Mas não ele.\nEle desceu coxinhando, arrastando o quadro por quilómetros. Numa aldeia remota, encontrou uma forja. Sem mecânicos. Sem carro de equipa. Apenas foles, bigorna e as suas próprias mãos.\nDurante horas trabalhou —mangas arregaçadas, queixo cerrado—refundindo o garfo dianteiro de memória e tato. Quando os oficiais chegaram, ele parou apenas para os encarar e dizer: 'Não toquem nisso.'\nOito horas atrás dos líderes, ele pedalou novamente. Sem hipótese de vitória. Mas ao longo de todo o percurso, as multidões levantaram-se para aplaudir —não o vencedor, mas aquele que se recusou a parar."
 vikelas.626.g: "Uma história inspiradora."
 vikelas.626.h: "Permitir reparos de emergência."
 vikelas.626.i: "Honre-o!"
 vikelas.401.t: "Fédération Internationale de Football Association"
 vikelas.401.d: "Hoje, a Associação Internacional de Futebol foi fundada em [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]. Seu nome completo é Fédération Internationale de Football Association (FIFA)."
 vikelas.401.f: "Em 21 de maio de 1904, delegados de sete nações — Bélgica, Dinamarca, França, Holanda, Espanha, Suécia e Suíça — assinaram uma carta. O objetivo: padronizar as regras do futebol, organizar partidas internacionais e elevar o jogo a um nível global. Assim nasceu a Fédération Internationale de Football Association — FIFA. Nas suas primeiras décadas, a FIFA era modesta: uma presidência em tempo parcial, jogadores amadores e disputas regionais. Mas, por baixo da superfície, um movimento global cresceu. A Inglaterra hesitou em aderir, receosa de interferências estrangeiras. Os sul-americanos começaram a formar as suas próprias confederações. Em 1924 e 1928, os torneios olímpicos revelaram o verdadeiro alcance do futebol: multidões de 60.000 pessoas em Paris, torcendo não por exércitos, mas por equipas."
 vikelas.401.g: "Junte-se à FIFA e apoie a competição internacional."
 vikelas.411.t: "Copa do Mundo de Futebol [TimeKeeper.GetCurrentDate.Format('y')]"
 vikelas.411.d: "A FIFA decidiu que a Copa do Mundo deste ano acontecerá em [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Após a rodada preliminar, a lista de favoritos é reduzida a oito equipes."
 vikelas.411.f: "#V As seguintes seleções nacionais se classificaram para as quartas de final#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]"
 vikelas.411.g: "Que o melhor time prevaleça"
 vikelas.412.t: "Campeões do Mundo"
 vikelas.412.d: "Nossa equipe triunfou no cenário mundial, derrotando as melhores equipes de todos os continentes. Em toda a nação, as celebrações explodem!"
 vikelas.412.f: "Num jogo acirrado contra [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName], nossa equipe provou seu valor na final da Copa do Mundo em [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Nossa seleção nacional levantou o troféu de ouro. O apito final ecoou por rádios, cafés, quartéis. De mineiros no norte a comerciantes no porto, o povo rugiu como um só. O capitão chora no pódio. Uma nova geração observa e sonha."
 vikelas.412.g: "Nós somos os campeões."
 vikelas.413.t: "Glória Prateada em [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]"
 vikelas.413.d: "Nosso time de futebol chegou à final — e por pouco não alcançou a glória. Em toda a nação, orgulho e desgosto se misturam em igual medida."
 vikelas.413.f: "Infelizmente, o melhor da nossa equipe não foi suficiente. Em uma partida tensa contra [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName], nossos homens ficaram aquém. Por semanas, carregaram as esperanças de uma nação. Em campos enlameados e calor ofuscante, correram, lutaram, acreditaram. Partida após partida, tornaram-se lendas. Mantiveram suas cabeças erguidas enquanto o outro hino tocava. Sem lágrimas, apenas silêncio - e então, uma salva de palmas lenta e crescente."
 vikelas.413.g: "Isto foi roubado de nós!"
 vikelas.414.t: "O Sonho Termina Cedo"
 vikelas.414.d: "Nossa seleção foi eliminada precocemente da Copa do Mundo FIFA em [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] derrotou [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] na final."
 vikelas.414.f: "Houve esperança — esperança real e tangível. Vitórias celebradas nos pátios das fábricas, comentários de rádio sussurrados nas igrejas, crianças reencenando gols nos becos. O time representava mais do que futebol: ambição, orgulho, a crença de que poderíamos superar a nós mesmos. Mas a última partida mudou tudo. Um único gol sofrido. Uma mão invisível. Uma oportunidade perdida. Agora o sonho acabou, e o mundo segue em frente."
 vikelas.414.g: "Nós acreditamos. Isso foi o suficiente."
