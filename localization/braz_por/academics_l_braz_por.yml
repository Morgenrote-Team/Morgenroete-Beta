 academics.2110.t: "O diretor do museu quer um grande artefato" #NT!
 academics.2110.d: "O diretor do Museu Arqueológico escreveu hoje uma carta aberta ao governo em nome do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]." #NT!
 academics.2110.f: "É com grande arrependimento que tenho que afirmar que, apesar do rico fundo de artefatos, nosso museu ainda carece de uma grande atração que poderia ser chamada de peça de exibição da coleção. Infelizmente, o governo até agora não conseguiu se concentrar na qualidade como um padrão arqueológico para os objetos em vez de quantidade. Portanto, aconselho fortemente que essa queixa seja corrigida nos próximos anos, ou nossa nação será, na melhor das hipóteses, classificados como contadores de feijão no mundo científico." #NT!
 academics.2110.g: "Um empreendimento de prestígio." #NT!
 academics.2110.h: "Não vale a pena o problema." #NT!
 academics.2110_goal_tt: "Você terá que coletar #p 1#! [concept_lepsius_major_artifact] em #n 15#! anos." #NT!
 academics.2111.t: "Esplendor do museu" #NT!
 academics.2111.d: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] expressou sua gratidão em sua carta hoje." #NT!
 academics.2111.f: "Parabéns pela decisão de tornar a arqueologia a prioridade nacional do país. O espécime excepcional recentemente adquirido estará em exibição em uma exposição especial nas próximas semanas. O mundo nos inveja!" #NT!
 academics.2111.g: "Maravilhoso." #NT!
 academics.2112.t: "Um lugar empoeirado" #NT!
 academics.2112.d: "Em uma carta aberta hoje em nome do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], o diretor do Museu Arqueológico expressou seu arrependimento por a arqueologia não estar sendo ouvida em nossa nação." #NT!
 academics.2112.f: "Nunca foi tão arruinado por tão poucos em tão pouco tempo. \ N \ nSigned, o diretor do Museu Arqueológico" #NT!
 academics.2112.g: "E?" #NT!
  
 je_academics_major_artifact: "Foco na arqueologia: artefato principal" #NT!
 je_academics_major_artifact_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 1#! [concept_lepsius_major_artifact]. Os principais artefatos podem ser obtidos por meio de grandes descobertas, através de escavações permanentes ou em cadeias de eventos aleatórios durante as expedições." #NT!
 je_academics_major_artifact_success: "Tenha #p 1#! [concept_lepsius_major_artifact]." #NT!
  
 academics.2113.t: "Diretor do Museu exige excelência arqueológica" #NT!
 academics.2113.d: "O diretor do Museu Arqueológico apontou que pouco está faltando para tornar a exposição quase perfeita." #NT!
 academics.2113.f: "Eu sou um homem humilde. Como você sabe, minhas reivindicações não são particularmente extravagantes. Eu nunca pedi a este governo um favor chique. Eu sempre me segurei, como convém ao curador de uma instituição tão esplêndida. Além disso: um último pouco de gelo no bolo está faltando para elevar nossa bela coleção para a classe mundial. Só é preciso uma excelente exposição. Não mais. Obter 100 artefatos de uma região e os maiores artefatos não serão difíceis, certo?" #NT!
 academics.2113.g: "Um desafio de boas -vindas." #NT!
 academics.2113.h: "Isso é muito arriscado." #NT!
 academics.2112_goal_tt: "Você terá que organizar uma excelente exposição em #n 20#! anos." #NT!
 academics.2114.t: "Arqueologia em seu pico" #NT!
 academics.2114.d: "Uma carta suavizada e quase legível chegou hoje do Museu Arqueológico." #NT!
 academics.2114.f: "Somente o remetente ainda pode ser decifrado. A assinatura pertencia claramente ao diretor do museu. O secretário suspeita de lágrimas de alegria enquanto escreve a carta." #NT!
 academics.2114.g: "Ele é feliz e nós também." #NT!
 academics.2115.t: "Revés para arcaoelogia" #NT!
 academics.2115.d: "Uma carta suavizada e quase legível chegou hoje do Museu Arqueológico." #NT!
 academics.2115.f: "Somente o remetente ainda pode ser decifrado. A assinatura pertencia claramente ao diretor do museu. O Secretário assume que as lágrimas chegaram aos seus olhos enquanto o escrevem. Nosso fracasso na última missão arqueológica deve tê -lo jogado em uma profunda depressão." #NT!
 academics.2115.g: "Ele está triste e nós também." #NT!
  
 je_academics_excellent_collection: "Foco na arqueologia: excelente coleção" #NT!
 je_academics_excellent_collection_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que criemos uma excelente exposição. Precisamos de #G 100#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] e #p 1#! [Concept('concept_lepsius_major_artifact')] de uma região arqueológica para fazê -lo." #NT!
  
 academics.2116.t: "Precisamos encontrar mais artefatos do que [SCOPE.sCountry('rival_scope').GetName]" #NT!
 academics.2116.d: "Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão infelizes que [SCOPE.sCountry('rival_scope').GetName] reuniu mais [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] do que nossa nação. Eles nos pedem para encontrar mais #b artefatos #! no total que [SCOPE.sCountry('rival_scope').GetName] em 10 anos." #NT!
 academics.2116.f: "É uma pena que uma nação tão insignificante como [SCOPE.sCountry('rival_scope').GetName] tenha uma coleção maior de artefatos do que nós. Devemos ultrapassar esses invasores de túmulos que estão apenas cavando para o Tesático e nem mesmo conduzem arqueologia real! Quanto conhecimento foi perdido por causa desses bárbaros? \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2116_goal_tt: "Você terá que reunir mais [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] do que o seu rival, [SCOPE.sCountry('rival_scope').GetName], em #n 10#! anos. Eles têm [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+], temos [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]." #NT!
 academics.2116_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 10%#! mais prestígio por 4 anos." #NT!
 academics.2116.g: "Eu sou um arqueólogo e estou cavando um buraco!" #NT!
 academics.2116.h: "Arqueologia não é uma caça ao tesouro!" #NT!
  
 academics_no_competition_with_rival_total_artifacts: "Perdeu a caça ao tesouro" #NT!
 academics_competition_with_rival_won_total_artifacts: "Ganhou a caça ao tesouro" #NT!
  
 je_academics_rivalry_for_artifacts: "Foco na arqueologia: a caça ao tesouro" #NT!
 je_academics_rivalry_for_artifacts_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos mais [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] do que o nosso rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Artefatos totais #!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+] \ n[SCOPE.sCountry('target').GetName] #b Artefatos totais §4 [ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]" #NT!
 je_academics_rivalry_for_artifacts_success: "Você ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]) tem mais [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] do que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+])." #NT!
  
 academics.2117.t: "Coleção de artefatos maravilhosos" #NT!
 academics.2117.d_rival: "Reunimos uma coleção maior de artefatos do que o nosso rival [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!" #NT!
 academics.2117.d_rival_gone: "Nosso rival arqueológico se foi. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!" #NT!
 academics.2117.f: "Deveria ser óbvio que nossa nação deve ter uma coleção arqueológica melhor do que aqueles bárbaros. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está contente com esta coleção. Embora haja mais artefatos que precisam ser salvos de tais selvagens. \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2117.g: "Tantos artefatos salvos!" #NT!
  
 academics.2118.t: "Não conseguimos expandir nossa coleção arqueológica" #NT!
 academics.2118.d: "Não fomos capazes de expandir nossa coleção arqueológica além dos nossos rivais em [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão totalmente decepcionados." #NT!
 academics.2118.f: "As mãos sujas desses selvagens são o solo a própria história da humanidade. Como você poderia deixar que todos esses artefatos sejam saqueados por esses invasores de túmulos. Muito conhecimento terá sido perdido porque eles querem tesouros em vez de preservar nossa história. Nojento! \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2118.g: "Não precisamos desses artefatos empoeirados." #NT!
  
 academics.2200.t: "Precisamos encontrar mais espécime do que [SCOPE.sCountry('rival_scope').GetName]" #NT!
 academics.2200.d: "Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão infelizes que [SCOPE.sCountry('rival_scope').GetName] reuniu mais [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que nossa nação. Eles nos pedem para encontrar mais espécimes #b no total do que [SCOPE.sCountry('rival_scope').GetName] em 10 anos." #NT!
 academics.2200.f: "Nossas coleções de amostras não são nada em comparação com as em [SCOPE.sCountry('rival_scope').GetName]. Eles têm tudo o que desejamos! Eu até ouvi dizer que eles têm uma flor gigantesca que cheira a cadáveres podres. Todo o nosso orgulho é uma borboleta laranja. Precisamos encontrar novos espécimes, espécimes que ninguém encontrou diante de nós! Caso contrário, eles podem cair nas mãos desses açougueiros de animais! \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2200_goal_tt: "Você terá que reunir mais [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que o seu rival, [SCOPE.sCountry('rival_scope').GetName], em #n 10#! anos. Eles têm [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], temos [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]." #NT!
 academics.2200_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 10%#! mais prestígio por 4 anos." #NT!
 academics.2200.g: "Precisamos enviar nosso naturalista imediatamente!" #NT!
 academics.2200.h: "Que perda de tempo!" #NT!
  
 academics_no_competition_with_rival_specimen: "Perdeu a corrida para a amostra" #NT!
 academics_competition_with_rival_won_specimen: "Ganhou a corrida por espécime" #NT!
  
 je_academics_rivalry_for_specimen: "Concentre -se no naturalismo: a corrida para os espécimes" #NT!
 je_academics_rivalry_for_specimen_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos mais [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que o nosso rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Amostras totais Total [ROOT.Var('dubois_specimen').GetValue|0+] \ n[SCOPE.sCountry('target').GetName]'s #b espécimes totais [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]" #NT!
 je_academics_rivalry_for_specimen_success: "Você ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) tem mais [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])." #NT!
  
 academics.2201.t: "Coleção surpreendente de amostras" #NT!
 academics.2201.d_rival: "Reunimos uma coleção maior de [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que o nosso rival [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!" #NT!
 academics.2201.d_rival_gone: "Nossa rival em nossa busca por uma enorme coleção biológica se foi. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!" #NT!
 academics.2201.f: "Finalmente, temos uma coleção de espécimes #b digna de nossa grande nação. É hora de podermos exibir os seres vivos mais fascinantes deste planeta. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está satisfeito com a nossa coleção no momento. Obviamente, teremos que continuar cultivando nossa coleção para impedir que outras nações abordassem esses pobres animais e plantas." #NT!
 academics.2201.g: "Uma coleção digna!" #NT!
  
 academics.2202.t: "Não conseguimos reunir mais amostras do que [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]" #NT!
 academics.2202.d: "Não conseguimos expandir nossa coleção de amostras além dos nossos rivais em [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] são absolutamente esmagados." #NT!
 academics.2202.f: "Agora eles também encontraram o animal mais fascinante do mundo. Um lagarto voador. Eles nomearam o presidente do Presidente da Academia de Ciências. Você falhou. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2202.g: "Eu nunca vou me recuperar disso cientificamente!" #NT!
  
 academics.2203.t: "O [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] quer [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso zoológico" #NT!
 academics.2203.d: "O [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] solicitou ao nosso governo que adquirisse [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso [concept_dubois_zoo] em 10 anos." #NT!
 academics.2203.f: "Há um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] que falta nosso zoológico. Precisamos que nosso governo encontre [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] e trazê -lo para o nosso zoológico. Não podemos permitir que nosso zoológico não tenha esse animal maravilhoso, afinal." #NT!
 academics.2203_goal_tt: "Você terá que adquirir um [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso [concept_dubois_zoo] em 10 anos." #NT!
 academics.2203_reward_tt: "Como recompensa, o [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] ganhará #p 5#! Aprovação do seu governo e #p 5%#! Mais atração pop e seu país receberá #p 5%#! Mais prestígio por 5 anos." #NT!
 academics.2203.g: "Tenho que pegar todos eles!" #NT!
 academics.2203.h: "Estou liderando uma grande nação. Eu não tenho relações com um zoológico!" #NT!
  
 je_academics_get_exotic_animal: "Concentre -se no naturalismo: adquirir [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso zoológico" #NT!
 je_academics_get_exotic_animal_reason: "O [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] quer que adquiramos [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso [concept_dubois_zoo]. \ NELE EMEM várias maneiras de adquirir esse [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]." #NT!
  
 academics.2204.t: "Um novo lar para [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]" #NT!
 academics.2204.d: "Conseguimos adquirir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso [concept_dubois_zoo]. Isso certamente fará o [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] feliz." #NT!
 academics.2204.f: "Seu governo adquiriu com sucesso [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso país glorioso. Isso mostra que nosso país é poderoso o suficiente para gastar seus Ressources na diversão de nossa população. Obrigado! \ N \ nSigned, os representantes do [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]" #NT!
 academics.2204.g: "Um animal maravilhoso!" #NT!
  
 academics.2205.t: "Nenhum animal novo em nosso zoológico" #NT!
 academics.2205.d: "Não fomos capazes de adquirir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso zoológico. O [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] não se divertirá." #NT!
 academics.2205.f: "Você não pode nem adquirir um animal para o nosso zoológico. Como devemos confiar em você para orientar este país? \ N \ nSigned, os representantes do [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]" #NT!
 academics.2205.g: "Não temos tempo para alguns animais aleatórios!" #NT!
  
 academics_exotic_animal_acquired_ig_modifier: "Animal exótico adquirido" #NT!
 academics_exotic_animal_not_acquired_ig_modifier: "Animal exótico não adquirido" #NT!
 academics_exotic_animal_acquired_country_modifier: "Animal exótico adquirido" #NT!
  
 academics.2206.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige um zoológico" #NT!
 academics.2206.d: "Os sucessos científicos anteriores no campo da pesquisa natural podem ser descritos como escassos. Alguns representantes científicos influentes se voltaram para o governo com uma petição." #NT!
 academics.2206.f: "Para fortalecer a pesquisa biológica em pesquisa geral e zoológica em particular, é essencial um zoológico com uma coleção de animais raros. Essa instalação também melhoraria muito o bem-estar da população. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sugere, portanto, que todos os meios devem ser usados ​​para estabelecer um zoológico nacional e também ajudariam no treinamento de um zoólogo energético." #NT!
 academics.2206.g: "Alguns animais certamente podem ser encontrados." #NT!
 academics.2206.h: "Essas pessoas não têm mais alguém para irritar?" #NT!
 academics.2207.t: "O novo zoológico" #NT!
 academics.2207.d: "Alguns representantes da sociedade científica participaram pessoalmente da inauguração do novo zoológico." #NT!
 academics.2207.f: "Excelente, realmente excelente o novo zoológico. Os membros tiveram um dia maravilhoso e estão particularmente felizes com a comida de estimação gratuita. Esperamos que isso seja apenas um começo e que o zoológico que acabou de abrir em breve seja expandido e cheio de criaturas mais preciosas, exóticas e maravilhosas." #NT!
 academics.2207.g: "Deixe -me alguns amendoins!" #NT!
 academics.2208.t: "Sem zoológico" #NT!
 academics.2208.d: "Os [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] escreveram uma carta amarga hoje reclamando que o desejo de um novo zoológico não foi cumprido." #NT!
 academics.2208.f: "Para nosso grande arrependimento, descobrimos que o atual governo parece ser composto por inimigos diretos da ciência, da biologia em geral e da zoologia em particular, ou pelo menos um monte de inumanos odiadores de animais. Talvez em tal ambiente os animais magníficos fossem desperdiçados em vão." #NT!
 academics.2208.g: "Se você é teimoso, certamente não receberá nenhum desejo." #NT!
  
 academics.2206_goal_tt: "Você terá que coletar #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] e criar um [concept_dubois_zoo] em #n 5#! anos." #NT!
 academics.2206_reward_tt: "Como recompensa, nosso naturalista receberá #p 50 Experience#! Se ainda não tivermos um naturalista, conseguiremos um." #NT!
  
 academics.2209.t: "Ampliação do zoológico" #NT!
 academics.2209.d: "Uma carta aberta do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] lamenta o fato de o zoológico nacional oferecer pouca variedade." #NT!
 academics.2209.f: "Embora nossa capital agora tenha uma instalação de zoológico que ofereça alguma variedade para os cientistas estudarem animais e, para o público pagador, essa instalação mal atingiu o padrão digno do tamanho da cidade e nossa importância nacional. Para aumentar o prestígio, para entreter a população e promover a ciência, recomendamos que a expansão do zoológico atual para pelo menos de tamanho médio. \ N \ NSigned, o Conselho do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2209.g: "Traga mais animais!" #NT!
 academics.2209.h: "Temos coisas melhores para fazer." #NT!
 academics.2210.t: "Um zoológico ainda maior" #NT!
 academics.2210.d: "Uma carta aberta do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] lamenta o fato de o zoológico nacional oferecer pouca variedade." #NT!
 academics.2210.f: "Embora tenhamos permitido que nosso zoológico crescesse em um tamanho respeitável no passado, ele ainda não desfruta da importância internacional que poderia e deveria ter para impressionar outras nações com nossa paixão zoológica. Precisamos de animais cada vez mais exóticos. Não apenas a ciência está em jogo aqui, mas também nosso prestígio. Aconselhamos fortemente a atualização do nosso zoológico para um grande zoológico." #NT!
 academics.2211.t: "Um próspero jardim zoológica" #NT!
 academics.2211.d: "O jardim zoológico ampliado é uma das principais atrações da capital e é muito popular entre os estudiosos e os cidadãos comuns. A Sociedade Científica tem o prazer de observar que seu desejo foi concedido." #NT!
 academics.2211.f: "Bom trabalho! O novo zoológico é mais espaçoso e cumpre a exigência de descrever um espectro mais amplo do mundo animal do mundo. Espero que você também tenha pensado em um ornitorrinco? Gostaríamos de assumir um patrocínio para isso. Acontece que é nomeado Perry?" #NT!
 academics.2211.g: "Os animais do mundo em nossa casa!" #NT!
 academics.2212.t: "Decepção zoológica" #NT!
 academics.2212.d: "A sociedade científica se pergunta se perguntar ao governo ainda vale a pena quando suas preocupações são pisoteadas de forma a o pequeno pedido de alguns animais do zoológico." #NT!
 academics.2212.f: "Estamos muito, muito decepcionados." #NT!
 academics.2212.g: "Eles devem fazer pesquisas em vez de se divertir no zoológico." #NT!
  
 academics.2209_goal_tt: "Você terá que aumentar seu [concept_dubois_zoo] para #p tamanho 3#! (zoológico de tamanho médio) em #n 10#! anos." #NT!
 academics.2210_goal_tt: "Você terá que aumentar seu [concept_dubois_zoo] para #p tamanho 4#! (zoológico grande) em #n 10#! anos." #NT!
 academics.2209_reward_tt: "Como recompensa, nosso naturalista receberá #p 50 Experience#! Se ainda não tivermos um naturalista, conseguiremos um." #NT!
  
 je_academics_found_zoo: "Concentre -se no naturalismo: encontrado um zoológico" #NT!
 je_academics_found_zoo_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que construamos um [concept_dubois_zoo] para aprimorar o conhecimento, mas também o padrão de vida de nossos intelectuais. Construir um zoológico requer #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], que pode ser capturado por um [concept_dubois_naturalist] em uma expedição zoológica local ou em um safari da HEIA. Os animais também podem ser comprados de outros países." #NT!
 je_academics_medium_zoo: "Concentre -se no naturalismo: amplie o zoológico" #NT!
 je_academics_medium_zoo_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] solicitou uma extensão do [concept_dubois_zoo] que temos um total de dez anos para atualizar nosso zoológico para um zoológico de tamanho médio #p, isso recomenda mais [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], que pode ser capturado por um [concept_dubois_naturalist] em uma expedição zoological local ou um safari heia. Os animais também podem ser comprados de outros países." #NT!
 je_academics_large_zoo: "Concentre -se no naturalismo: amplie o zoológico" #NT!
 je_academics_large_zoo_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] solicitou uma extensão do [concept_dubois_zoo], temos um total de dez anos para atualizar nosso zoológico para um #p zoológico grande, isso recomenda mais [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], que pode ser capturado por um [concept_dubois_naturalist] em uma expedição zoológica local ou um safari de heia. Os animais também podem ser comprados de outros países." #NT!
  
 academics.2300.t: "Precisamos encontrar mais fósseis do que [SCOPE.sCountry('rival_scope').GetName]" #NT!
 academics.2300.d: "Faltam [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] suficientes para uma coleção maior que [SCOPE.sCountry('rival_scope').GetName]. Portanto, o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos mais #b fossils#! no total que [SCOPE.sCountry('rival_scope').GetName]. Eles certamente apreciariam muito se pudéssemos vencer esse rival." #NT!
 academics.2300.f: "Embora nossos rivais em [SCOPE.sCountry('rival_scope').GetName] tenham vários fósseis de diferentes idades e lugares ao redor do mundo, os nossos são bastante limitados no prazo e no quadro geográfico. Isso é uma enorme vergonha e inacaptável para uma grande nação como a nossa." #NT!
 academics.2300_goal_tt: "Você terá que reunir mais [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] do que o seu rival, [SCOPE.sCountry('rival_scope').GetName], em #n 10#! anos. Eles têm [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], temos [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]." #NT!
 academics.2300_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 10%#! mais prestígio por 4 anos." #NT!
 academics.2300.g: "Ah, uma briga fóssil!" #NT!
 academics.2300.h: "Não precisamos de nenhuma rochas empoeirada ..." #NT!
  
 academics_no_competition_with_rival_fossils: "Perdeu a briga fóssil" #NT!
 academics_competition_with_rival_won_fossils: "Ganhou a briga fóssil" #NT!
  
 je_academics_rivalry_for_fossils: "Foco na paleontologia: a briga fóssil" #NT!
 je_academics_rivalry_for_fossils_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que coletamos mais [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] do que o nosso rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Fossils total do total [ROOT.Var('dubois_fossil').GetValue|0+] \ n[SCOPE.sCountry('target').GetName] #b Fossils total §4 [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]" #NT!
 je_academics_rivalry_for_fossils_success: "Você ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]) tem mais [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] do que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+])." #NT!
  
 academics.2301.t: "Coleção Fossil fantástica" #NT!
 academics.2301.d_rival: "Reunimos uma coleção maior de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] do que o nosso rival [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!" #NT!
 academics.2301.d_rival_gone: "Nossa rival em nossa busca por uma enorme coleção de fósseis se foi. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!" #NT!
 academics.2301.f: "Ficou claro desde o início que precisávamos de uma coleção fóssil maior do que o nosso rival. Agora que coletamos tantos fósseis do Cambriano até o Quaternário e da América às Ilhas do Pacífico, temos verdadeiramente uma coleção digna! Obviamente, esse deveria ter sido o caso anos atrás, e devemos exandrar ainda mais essa coleção. No momento, a situação é \ "boa o suficiente \", como dizem os camponeses. \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2301.g: "Isso coloca um fim a esta briga!" #NT!
  
 academics.2302.t: "Não conseguimos reunir mais fósseis do que [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]" #NT!
 academics.2302.d: "Não conseguimos expandir nossa coleção de fósseis além de nossos rivais em [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] não se divertem." #NT!
 academics.2302.f: "Sua coleção abrange eras, eles têm tudo e temos algumas pedras empoeiradas com fósseis muito visíveis ... é horrível. Este é um momento vergonhoso para a nossa nação! Nojento. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2302.g: "Eu não preciso de pedras velhas de qualquer maneira ..." #NT!
  
