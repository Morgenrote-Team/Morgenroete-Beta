 academics.119.d: "After a long time of studying and discovering the artifacts of primal men, our [concept_andersson_anthropologist] Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] is now famous in the world of anthropology!"
 academics.119.f: ""
 academics.119.g: "Um novo tipo de homem!"
 academics.108.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] agora é um geólogo experiente"
 academics.108.d: "Após anos de escavação e aprendizado, nosso [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] agora é experimentado!"
 academics.108.f: ""
 academics.108.g: "Eu cavo!"
 academics.109.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] agora é um geólogo famoso"
 academics.109.d: "Depois de passar mais tempo com pedras do que com as pessoas, nosso [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] agora é famoso no mundo da geologia!"
 academics.109.f: ""
 academics.109.g: "Uma verdadeira estrela do rock!"
 academics.140.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro civil"
 academics.140.d: "Years of work in civil engineering paid off. After constructing many bridges and tunnels, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] is now considered to be a true [concept_tesla_civil_engineer]. This will surely boost his projects!"
 academics.140.f: ""
 academics.140.g: "O engenheiro do nosso futuro!"
 academics.141.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro mecânico"
 academics.141.d: "Years of work with machines paid off. The many inventions and new machines, that Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] created have finally let him become true [concept_tesla_mechanical_engineer]. We hope for more astonishing projects!"
 academics.141.f: ""
 academics.141.g: "Um verdadeiro motor de progresso!"
 academics.142.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro militar"
 academics.142.d: "Years of work for the military paid off. After building fortresses, constructing new weapons and equiping our soldiers for years, Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] is now considered to be a proper [concept_tesla_military_engineer]. Hopefully he will continue to serve our nation!"
 academics.142.f: ""
 academics.142.g: "Engenharia a base de nossas forças armadas!"
 academics.143.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro elétrico"
 academics.143.d: "To harness the power of electricity was always a dream of Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]. After many breakthroughs in that area, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] is now considered an [concept_tesla_electrical_engineer]."
 academics.143.f: ""
 academics.143.g: "Uma centelha de conhecimento!"
 academics.144.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro aeronáutico"
 academics.144.d: "For a long time humans dreamed of flying. Now that the era of flight has begun,  Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] is at the forefront of aeronautical engineering. After many breakthroughs in that area, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] is now considered an [concept_tesla_aeronautical_engineer]."
 academics.144.f: ""
 academics.144.g: "Para os céus!"
 notification_academics_yearly_experience_gain_notification_name: "Ganho de experiência anual acadêmica"
 notification_academics_yearly_experience_gain_notification_desc: "Every Academic that can get Experience got between #p 0#! and #p 5#! Experience."
 dubois_humanities_receive_promotion_loc: "Os invasores e necrófilos da tumba não contribuem nada para a nossa sociedade!"
 dubois_natural_history_receive_promotion_loc: "Por que os colecionadores de borboleta e os construtores de monstros recebem todo o financiamento e temos que passar com as sobras?"
 dubois_mathematics_receive_promotion_loc: "É absolutamente idiota que os Tinkerrers loucos e os Stargazers tenham todos os seus desejos lidos de seus lábios, enquanto temos que suportar as migalhas!"
 academics_engineer_focus_atmospheric_engine_loc: "We are trying to harness the power of steam to replace workers with machinery. This would make it cheaper to mine for resources or produce things!"
 academics_engineer_focus_computer_loc: "Estamos tentando construir uma máquina que possa conduzir todos os tipos de cálculos. Isso tornaria os computadores humanos desnecessários. Poderíamos calcular tudo com a maior precisão e com nossos erros!"
 academics_engineer_focus_washing_machine_loc: "Nosso objetivo é criar uma máquina que possa lavar a roupa sem a necessidade de trabalho. Isso revolucionaria nossa sociedade, pois não teríamos que perder nosso tempo lavando nossa roupa suja!"
 academics_engineer_focus_lighter_loc: "Você pode imaginar o quão útil seria um pequeno isqueiro de bolso? Um que cria uma grande chama e pode acender velas ou cigarros? Esta é uma fortuna esperando para ser levantada!"
 academics_engineer_focus_rocket_loc: "Queremos criar um foguete capaz de alcançar o espaço. Imagine as aplicações militares desse foguete. Você poderia atingir seus inimigos e eles não poderiam fazer nada contra isso!"
 academics_engineer_focus_telephone_loc: "Imagine um dispositivo que você poderia usar para conversar com alguém em vastas distâncias! É nisso que estamos trabalhando em nosso laboratório agora!"
 academics_engineer_focus_combustion_engine_loc: "Trains are great but they are huge and need rails. What if we could build a small motor that is able to propel a small vehicle. Everyone could travel everywhere. There are many useful applications of such a motor. And that is exactly what my team is working on right now!"
 academics_engineer_focus_basic_research_alloys_loc: "Estamos conduzindo pesquisas básicas para encontrar o maior número possível de ligas úteis. Se encontrarmos as ligas certas que podem levar a melhores construções, máquinas e dispositivos mais eficientes que são considerados impossíveis agora!"
 academics_engineer_focus_basic_research_factory_machinery_loc: "My team is working on improving the machines used in factories. That could lead to a massive boost in our production and the wealth of our nation!"
 academics_engineer_focus_basic_research_housing_loc: "Estamos analisando a maneira mais eficiente de construir casas para criar espaço de vida barato. Isso poderia ajudar a população a pagar melhores condições de vida e aumentaria nosso setor de construção."
 academics_engineer_focus_basic_research_urban_planing_loc: "Nossas cidades não são eficientes o suficiente. Portanto, devemos descobrir como tornar as cidades mais eficientes para elevar o padrão de vida de nosso povo!"
 academics.2001.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] nos pede para nos concentrarmos em pesquisar os céus"
 academics.2001.d: "Nossa nação ainda não tem muita pesquisa astronômica e nem temos uma cabeça [concept_verrier_astronomer]. Portanto, o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que criemos um novo gráfico de estrelas e nomeie um astrônomo principal."
 academics.2001.f: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] pede que você aumente seu compromisso com a astronomia. Tal foco nos permitiria obter novos conhecimentos sobre o céu e o universo."
 academics.2001.g: "Ad astra!"
 academics.2001.h: "Estrelas? Temos coisas melhores para fazer!"
 academics_unhappy_intelligentsia: "A sociedade científica está infeliz"
 academics.2001_goal_tt: "Você terá que descobrir #p 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] e obter um [concept_verrier_astronomer] em #n 10#! anos."
 academics.2001_reward_tt: "Como recompensa, seu astrônomo receberá #p 15 Experience#!, Além disso, a Intelligencia receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 3 anos."
 je_academics_find_more_stars: "Foco na astronomia: o gráfico de estrelas"
 je_academics_find_more_stars_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos [JournalEntry.GetGoalAddValue] Novo [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] para criar um novo gráfico de estrelas e nomear um novo chefe [concept_verrier_astronomer]. \ N \ também longe, encontramos [JournalEntry.GetGoalProgressValue] #b Objetos astronômicos #!."
 je_academics_find_more_stars_success: "Encontre #p 75#! Novo #b Objetos astronômicos #!"
 je_academics_find_more_stars_event_tt: "Nosso novo [concept_verrier_astronomer] apresentará o novo gráfico de estrelas"
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] apresenta um novo gráfico de estrelas"
 academics.2002.d: "Conseguimos criar um novo gráfico de estrelas e encontramos um novo chefe [concept_verrier_astronomer]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ficará satisfeito!"
 academics.2002.f: "\"This new star chart is very precise! I compared it to the ones of other nations and ours is obviously superior. Additionally we found many new stars of which some are quite fascinating! This one for example has more red light than usual.\""
 academics.2002.g: "Hurra!"
 academics_scientific_society_happy: "A sociedade científica está feliz"
 academics.2003.t: "Nosso foco na astronomia falhou!"
 academics.2003.d: "Não fomos capazes de focar o suficiente na astronomia para alcançar os objetivos dados pelo [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Eles não ficarão satisfeitos!"
 academics.2003.f: "\"Parece que a guerra, a economia e até o vinho e o álcool são mais importantes para nossos líderes do que a ciência. Estamos desapontados. Espero que o foco de nossa grande nação retorneá à ciência em breve!\""
 academics.2003.g: "What a pity!"
 academics.2004.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] solicita um novo gráfico de estrelas do nosso [concept_verrier_astronomer]"
 academics.2004.d: "De acordo com o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], nossa nação precisa se concentrar em examinar o céu. Eles solicitaram que o Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] encontrasse novas estrelas e outros [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] e para produzir um novo gráfico de estrelas."
 academics.2004_goal_tt: "Você terá que descobrir #p 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] em #n 10#! anos."
 academics.2004_reward_tt: "Como recompensa, seu astrônomo receberá #p 25 Experience#!, Além disso, o Intelligencia receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 3 anos."
 je_academics_create_star_chart: "Foco na astronomia: o gráfico de estrelas de nosso astrônomo"
 je_academics_create_star_chart_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] deseja que nosso [concept_verrier_astronomer] encontre [JournalEntry.GetGoalAddValue] novo [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] para criar um novo gráfico de estrelas."
 je_academics_create_star_chart_success: "Encontre #p 100#! Novo #b Objetos astronômicos #!"
 je_academics_create_star_chart_event_tt: "Nosso [concept_verrier_astronomer] apresentará o novo gráfico de estrelas."
 je_academics_create_star_chart_event_without_astronomer_tt: "Nosso novo gráfico de estrelas será publicado."
 je_academics_create_star_chart_failed_event_tt: "Nosso [concept_verrier_astronomer] não fornece o novo gráfico de estrelas."
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Depois de perder [concept_verrier_astronomer], deixaremos de fornecer um gráfico de estrelas."
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] apresenta um novo gráfico de estrelas"
 academics.2005.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] was surrounded by [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] colleagues when they toasted each other.\n\n\"Dear friend, I knew you could easily do this. Your new star chart is extraordinary! A true masterpiece!\""
 academics.2006.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] falhou!"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] failed to create a new star chart. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] was not able to find enough stars and other [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] for it to be worth. The rest of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] is extremely disappointed with [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] failure."
 academics.2006.f: "Dear [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName],\n\n   We have noticed that you were not able to submit a new star chart, which once more shows that you prefer, other activities, over science. Sadly this will reflect badly on our Society. We expect better in the future!\n\nThe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2006.g: "What a pity!"
 academics.2007.t: "Um novo gráfico de estrelas"
 academics.2007.d: "Infelizmente, na ausência de nosso antigo [concept_verrier_astronomer], o novo gráfico de estrelas foi apresentado no [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Os acadêmicos parecem estar muito felizes com o novo gráfico."
 academics.2007.f: "\ \"Graças a este novo gráfico de estrelas, poderemos estudar o céu ainda melhor! Espero que encontremos muitas novas idéias sobre como esses corpos se movem! \ Não foi possível só graças ao [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]! A torrada para nós, senhores! \""
 academics.2008.t: "Sem astrônomo, sem gráfico de estrela"
 academics.2008.d: "The loss of our [concept_verrier_astronomer] led to fewer discoveries of stars and other [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], than we expected. We were therefore not able to find enough to create a new star chart. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] is not pleased with this result."
 academics.2008.f: "\"\" Nosso governo não apenas perdeu seu brilhante astrônomo -chefe, eles também não foram capazes de apoiar suficientemente nossos astrônomos em seu trabalho. Resultando em muito menos observações. Isso significa que voltaremos em nossa pesquisa astronômica. É verdadeiramente horrível! \ \"\""
 academics.2009.t: "Precisamos encontrar mais estrelas do que [SCOPE.sCountry('rival_scope').GetName]"
 academics.2009.d: "Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão infelizes que [SCOPE.sCountry('rival_scope').GetName] descobriram mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que nossa nação. Eles nos pedem para encontrar mais #b objetos astronômicos #! no total que [SCOPE.sCountry('rival_scope').GetName] em 10 anos."
 academics.2009.f: "É uma pena que uma nação tão insignificante como [SCOPE.sCountry('rival_scope').GetName] tenha encontrado mais objetos astronômicos do que nós. Devemos ultrapassar esses astrônomos amadores não civilizados o mais rápido possível e encontrar mais objetos astronômicos em geral do que eles."
 academics.2009_goal_tt: "Você terá que descobrir mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que o seu rival, [SCOPE.sCountry('rival_scope').GetName], em #n 10#! anos. Eles têm [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], temos [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]."
 academics.2009_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 10%#! mais prestígio por 4 anos."
 academics.2009.g: "Vamos vencê -los!"
 academics.2009.h: "Esta não é uma corrida espacial ..."
 academics_no_competition_with_rival: "Perdeu a corrida pelas estrelas"
 academics_competition_with_rival_won: "Ganhou a corrida pelas estrelas"
 je_academics_rivalry_for_stars: "Concentre -se na astronomia: a raça estrela"
 je_academics_rivalry_for_stars_reason: "A [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que o nosso rival [SCOPE.sCountry('target').GetName].\n\nNossos #b Objetos Astronômicos#!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+]\n#b Objetos Astronômicos#! de [SCOPE.sCountry('target').GetName]: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]"
 je_academics_rivalry_for_stars_success: "Você ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) tem mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])."
 academics.2010.t: "Ganhamos a corrida pelas estrelas"
 academics.2010.d_rival: "Descobrimos objetos mais astronômicos do que [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!"
 academics.2010.d_rival_gone: "Nosso rival na corrida pelas estrelas se foi. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!"
 academics.2010.f: "Nós, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], estamos muito felizes com a nossa vitória científica sobre o nosso rival. Seus cientistas provaram estar presos na Idade da Pedra e incapazes de descobrir objetos mais astronômicos. Este é um ótimo dia para a nossa nação!"
 academics.2011.t: "Perdemos a corrida pelas estrelas"
 academics.2011.d: "Não conseguimos encontrar mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão totalmente decepcionados."
 academics.2011.f: "Esse fracasso de nossa academia prova mais uma vez que o foco de nossa nação não está nos avanços científicos e científicos. Portanto, propomos interromper as hostilidades e esses planos de conquista mundial em favor da ciência."
 academics.2012.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige um [concept_verrier_observatory]"
 academics.2012.d: "Os membros de nosso [concept_academics_scientific_society] exigem que construímos um [concept_verrier_observatory] moderno em 10 ou menos anos. Isso nos permitiria realizar [concept_verrier_astronomy] e encontrar [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.2012.f: "Como hoje em dia toda nação é dona de um observatório, nós, membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], exigimos a construção de um observatório. Sem um observatório, nunca estaremos na vanguarda da ciência. Portanto, um observatório é claramente uma necessidade."
 academics.2012.g: "Eu preciso de nossos melhores arquitetos e engenheiros agora!"
 academics.2012.h: "Quem precisa de um observatório de qualquer maneira?"
 academics.2012_goal_tt: "Você terá que construir um [concept_verrier_observatory] em #n 10#! anos."
 academics.2012_reward_tt: "Como recompensa, a Intelligencia receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 5 anos, você também ganhará #p 5%#! partidários entre os acadêmicos."
 je_academics_build_observatory: "Foco na astronomia: construir um observatório"
 je_academics_build_observatory_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que construamos um [concept_verrier_observatory]. Para construir um observatório, precisamos ter pelo menos uma universidade e pesquisar #b astronomia moderna #! ou ter um [concept_verrier_astronomer]."
 academics.2013.t: "Novo observatório começa a observação"
 academics.2013.d: "Um novo [concept_verrier_observatory] abriu suas portas e começou a observar o céu. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão satisfeitos ... por enquanto."
 academics.2013.f: "Após a construção de um Observatório, nossa nação é finalmente capaz de explorar o céu noturno. Parabéns. Agora poderíamos ser considerados um país cientificamente avançado.\n\nAssinado, os membros da [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2013.g: "Vamos descobrir os mistérios do céu noturno!"
 academics.2014.t: "Um fracasso astronômico"
 academics.2014.d: "Não fomos capazes de construir um [concept_verrier_observatory]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão profundamente decepcionados!"
 academics.2014.f: "Construir um Observatório deve ser algo extremamente difícil, já que nossa nação não conseguiu fazê-lo em 10 anos! Nesse tempo, poderíamos ter encontrado um novo planeta, centenas de estrelas ou calculado o movimento de muitos cometas. Mas sem um telescópio adequado, isso não é possível. Uma exibição vergonhosa.\n\nO [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "Foi culpa do cometa!"
 academics.2015.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos planeta x"
 academics.2015.d: "Os membros de nossos [concept_academics_scientific_society] estão convencidos de que a descoberta do planeta X será o maior sucesso científico neste século. Eles nos pedem para nos concentrar em encontrar o planeta misterioso antes que mais alguém o faça .."
 academics.2015.f: "Ouvimos dizer que outras nações estão ansiosas para encontrar o Planeta X. Mas essa descoberta pertence apenas a nós! Temos que superar todos os outros nesta tarefa colossal!\n\nAssinado, O Conselho da [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2015.g: "Focus all our resources on finding that planet!"
 academics.2015.h: "Planeta X? Mais como o planeta y ..."
 academics.2015_goal_tt: "Você terá que encontrar #b Planet X#! antes de mais ninguém. Para ter a chance de descobri -lo, precisaremos de um [concept_verrier_astronomer] e #p 1500#! descobertos [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.2015_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 10 anos, você também ganhará #p 10%#! fielistas entre os acadêmicos e seu [concept_verrier_astronomer] ganhará #p 50#! [concept_academics_experience]."
 je_academics_find_planet_x: "Concentre -se na astronomia: Encontre o Planeta X"
 je_academics_find_planet_x_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos o misterioso #o Planeta X#!. para ter uma chance de descobri -lo, precisaremos de um [concept_verrier_astronomer] e #p 1500#! descobertos [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 je_academics_find_planet_x_complete_tt: "Descubra #o Planet X#! antes de mais ninguém."
 je_academics_find_planet_x_fail_tt: "Alguém mais descobriu #o Planet X#! antes de você."
 academics.2016.t: "Encontramos o planeta x"
 academics.2016.d: "Somos os primeiros a encontrar o Planeta X! Esperançosamente, isso agradará o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2016.f: "A carta foi rabiscada com fórmulas e diagramas estranhos. Havia manchas que pareciam alguém derramava um pouco de líquido sobre a carta e, se você precisar adivinhar, poderia jurar que havia descanso de caviar no papel também. Você não conseguia parar de se perguntar o que aconteceu aqui."
 academics.2016.g: "Esta é a descoberta astronômica mais importante do século!"
 academics.2017.t: "We were too late to find Planet X"
 academics.2017.d: "Outra nação descobriu o planeta X diante de nós. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] são esmagados por esta derrota!"
 academics.2017.f: "Inaceitável.\n\nA [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2017.g: "De qualquer forma, isso não é um planeta real!"
