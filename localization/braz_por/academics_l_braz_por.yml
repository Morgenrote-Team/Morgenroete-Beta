 je_academics_mesopotamian_artifacts: "Foco na arqueologia: artefatos mesopotâmicos" #NT!
 je_academics_mesopotamian_artifacts_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 25#! mesopotâmico [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], que deve ser encontrado por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition] ou [concept_lepsius_excavation], não devemos ter a sorte ultrajante de adquiri -los através de um presente aleatório ou uma escavação local." #NT!
