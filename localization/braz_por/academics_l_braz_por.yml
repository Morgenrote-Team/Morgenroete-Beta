 country_academics_decorative_humanities_project_add: "Progresso para projetos antropológicos em humanidades" #NT!
 country_academics_decorative_humanities_project_add_desc: "A quantidade de progresso que você ganha com os níveis de [GetBuildingType('building_university').GetName] com o [concept_pm_academics_university_humanities] para projetos antropológicos em humanidades. Esses projetos incluem:" #NT!
  
 country_academics_decorative_excavation_add: "Progresso para algumas escavações arqueológicas" #NT!
 country_academics_decorative_excavation_add_desc: "A quantidade de progresso que você ganha com os níveis de [GetBuildingType('building_university').GetName] com o [concept_pm_academics_university_humanities] para algumas escavações arqueológicas." #NT!
  
 country_academics_decorative_natural_history_project_add: "Progresso para projetos de história natural" #NT!
 country_academics_decorative_natural_history_project_add_desc: "A quantidade de progresso que você ganha com os níveis de [GetBuildingType('building_university').GetName] com o [concept_pm_academics_university_natural_history] para projetos de história natural. Esses projetos incluem: expedição paleontológica, projetos de melhoria do naturalista, documentando animais nativos e projetos de melhoria do geólogo." #NT!
  
 country_academics_decorative_animal_breeding_progress_add: "Progresso para a criação de animais" #NT!
 country_academics_decorative_animal_breeding_progress_add_desc: "A quantidade de progresso que você ganha com os níveis de [GetBuildingType('building_university').GetName] com o [concept_pm_academics_university_natural_history] para a criação de [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]." #NT!
  
 country_academics_decorative_mathematical_project_add: "Progresso para projetos matemáticos-técnicos" #NT!
 country_academics_decorative_mathematical_project_add_desc: "A quantidade de progresso que você ganha com os níveis de [GetBuildingType('building_university').GetName] com o [concept_pm_academics_university_mathematics] para projetos matemáticos-técnicos. Esses projetos incluem: projetos [concept_gaudi_engineering], projetos de melhoria de [concept_mendelejew_chemist] e teorização, descoberta e isolamento de [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]." #NT!
  
