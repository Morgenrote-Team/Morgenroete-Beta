 academics.1010.t: "Estudando mulheres?"
 academics.1010.d: "Algumas mulheres candidataram-se para estudar em uma de nossas universidades. Agora, surgiu a questão se é legal para elas estudarem e qual é a posição oficial de nossos governos sobre mulheres que estudam."
 academics.1010.f: "\"O cérebro das mulheres não foi feito para pensamentos lógicos, mas sim para emoções. Elas não deveriam ter permissão para estudar!\"\n\n\"Você está apenas com medo de que uma mulher se torne uma cientista mais capaz do que você. O que definitivamente acontecerá, já que seus argumentos não possuem nenhuma base científica! Deixem as mulheres estudar nas mesmas condições que os homens!\""
 academics.1010.g: "Deixe-as estudar!"
 academics.1010.h: "Espere, eles não foram capazes de estudar até agora?"
 academics.1010.i: "As mulheres pertencem à lareira!"
 academics.1011.t: "Uma cientista brilhante"
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] se formou no topo de sua turma em uma de nossas universidades. Em um campo dominado por homens, ela conseguiu concluir seus estudos em tempo recorde e está ansiosa para começar a trabalhar em sua área. Ela é uma brilhante..."
 academics.1011.f: "Meus sinceros parabéns a você por seu diploma incrível! Quem pensaria isso possível para uma mulher!"
 academics.1011.g: "...Engenheira"
 academics.1011.h: "...Astrônoma"
 academics.1011.i: "...Naturalista"
 academics.1011.j: "...Paleontóloga"
 academics.1011.k: "...Arqueóloga"
 academics.1011.l: "...Antropóloga"
 academics.1011.m: "Não precisamos dela."
 gaudi_replace_engineer_with_new_female_engineer_tt: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] will become your new [concept_tesla_engineer]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]"
