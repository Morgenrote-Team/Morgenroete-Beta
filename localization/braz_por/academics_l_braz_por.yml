 ademics_our_own_dinosaur_modifier: "Nosso novo dinossauro" #NT!
 ademics_no_dinosaur_modifier: "Sem dinossauros" #NT!
 academics.2303_goal_tt: "Construto #G 1#! [concept_dubois_dinosaur_skeleton]" #NT!
 academics.2303_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 5%#! mais prestígio por 4 anos. Também teremos um investimento em tecnologia média." #NT!
  
 je_academics_giant_of_the_past: "Foco paleontológico: gigante do passado" #NT!
 je_academics_giant_of_the_past_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] pediu para coletar [concept_dubois_dinosaur_bone,'$concept_dubois_dinosaur_bones$] e reconstruir um [concept_dubois_dinosaur_skeleton]. Em que condição está permanece secundária - o principal é que temos uma peça opulenta em nossa coleção. Os ossos de dinossauros são encontrados em ótimas formações. Se não tivermos um em nosso território, um [concept_dubois_paleontological_licence] seria vantajoso para que nosso paleontologista possa pesquisar no exterior." #NT!
  
 academics.2303.t: "Gigante do passado" #NT!
 academics.2303.d: "Alguns cientistas líderes lamentaram que, apesar de nossos avanços paleontológicos, ainda precisamos exibir um esqueleto completo de dinossauros. Nossa sociedade científica também se arrependeu profundamente dessa situação infeliz em uma carta e gostaria de ver essa situação remediada." #NT!
 academics.2303.f: "Queremos um dinossauro, e queremos agora! \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2303.g: "Uma excelente iniciativa!" #NT!
 academics.2303.h: "Este não é um parque de diversões para meninos, mas um instituto científico." #NT!
 academics.2304.t: "O lagarto terrível" #NT!
 academics.2304.d: "O novo dinossauro é a peça mais espetacular da coleção paleontológica. Todos os dias, os novos visitantes se reúnem na exposição para ver o esqueleto." #NT!
 academics.2304.f: "Podemos ter outro? \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2304.g: "Nosso próprio dinossauro!" #NT!
 academics.2305.t: "Sem lagarto" #NT!
 academics.2305.d: "A plataforma reservada para o esqueleto de dinossauro planejado permanece vazio. A sociedade científica reagiu a isso com grande irritação." #NT!
 academics.2305.f: "Precisamos ser ainda mais claros? \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2305.g: "Encontre outro brinquedo!" #NT!
  
 academics.2306_goal_tt: "Encontre #G 3#! #O fósseis especiais" #NT!
 academics.2306_reward_tt: "Como recompensa, nosso [concept_dubois_paleontologist] receberá #p 50 Experience#! Se ainda não tivermos um [concept_dubois_paleontologist], conseguiremos um. Também teremos um grande investimento tecnológico." #NT!
  
 je_academics_special_fossils: "Foco paleontológico: fósseis especiais" #NT!
 je_academics_special_fossils_reason: "Fósseis especiais são fósseis únicos que são tratados separadamente devido ao seu status excepcional. Estes incluem formas de transição como o archaeopteryx ou ichthyostega, mas também grandes espécies de mamíferos extintas, como o megatherium gigante da preguiça ou o ictiossauro do tipo golfinho. Mas fósseis menores que são usados ​​para definir uma era - os mais conhecidos são amonitas e trilobitas - também pertencem a essa categoria. No total, existem uma dúzia de fósseis especiais que podem ser encontrados não apenas nas formações, mas também em expedições científicas." #NT!
 je_academics_special_fossils_success: "Encontre #G 3#! #O fósseis especiais" #NT!
  
 academics.2306.t: "Fósseis extraordinários" #NT!
 academics.2306.d: "A sociedade científica tem um pedido extraordinário de nós sobre fósseis extraordinários." #NT!
 academics.2306.f: "A história da ascendência animal é um segredo da natureza que nossos pesquisadores revelam um pouco mais a cada dia. Um papel especial é desempenhado pelas formas que estão nos limiares entre as espécies, os chamados 'Links ausentes'. Ao mesmo tempo, existem criaturas extraordinárias em nosso planeta que não precisam ser dinossauros para impressionar: mamíferos extintos, como tigres de dentes de sabre ou preguiças gigantes. Se coletássemos pelo menos três fósseis especiais, poderíamos fortalecer ainda mais a reputação de nosso instituto no mundo." #NT!
 academics.2306.g: "Fossisls especiais para uma coleção especial." #NT!
 academics.2306.h: "Não podemos concentrar nossas capacidades científicas em algo mais significativo?" #NT!
 academics.2307.t: "Coleção fóssil surpreendente" #NT!
 academics.2307.d: "Não há dúvida de que o Instituto Paleontológico Nacional tem uma das coleções internacionais mais importantes. Quase não há lugar comparável com peças tão extraordinárias." #NT!
 academics.2307.f: "Os fósseis especiais nem sempre são tão impressionantes quanto se pode pensar primeiro, mas têm um grande valor científico. A sociedade científica, portanto, enviou uma carta de agradecimento. Haverá uma exposição especial nos próximos dias." #NT!
 academics.2307.g: "Magnífico." #NT!
 academics.2308.t: "Decepção especial" #NT!
 academics.2308.d: "A sociedade científica expressou consternação com o mais recente fracasso paleontológico." #NT!
 academics.2308.f: "É uma tragédia nacional que as preocupações da história natural do país estejam sendo completamente ignoradas. A pesquisa paleontológica é descartada como bobagem sobre pássaros e lagartos mortos, os pagamentos de apoio a expedições especiais raramente são feitos e até os menores desejos são ignorados. J'Accuse! \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2308.g: "Oh céus." #NT!
  
 ademics_no_paleontological_hero_modifier: "Nenhum herói da paleontologia" #NT!
  
 academics.2309_goal_tt: "Tem um #o famoso §1 [concept_dubois_paleontologist]" #NT!
 academics.2309_reward_tt: "Como recompensa, ganharemos #p 120#! [concept_academics_progress]." #NT!
  
 je_academics_famous_paleontologist: "Foco paleontológico: Paleontologista famoso" #NT!
 je_academics_famous_paleontologist_reason: "A ascensão de um [concept_dubois_paleontologist] é acompanhada pela melhoria de sua experiência. Como todo acadêmico, um paleontologista recebe 5 pontos de experiência anualmente. Ele ganha experiência adicional em pesquisas paleontológicas bem -sucedidas de formações. Além disso, um paleontologista pode ser usado em expedições de montanhismo e expedições do Pacífico. Construir e remontar com sucesso esqueletos de dinossauros também ajuda a melhorar a experiência de um paleontologista." #NT!
  
 academics.2310.g: "Uma inspiração para a juventude." #NT!
 academics.2311.t: "Nenhum herói da paleontologia" #NT!
 academics.2311.d: "Por qualquer motivo, não conseguimos promover um paleontologista e deixá -lo alcançar a fama mundial." #NT!
 academics.2311.f: "Infelizmente, o fracasso significou que as disciplinas científicas continuam sendo descartadas como assuntos da orquídea e o entusiasmo pelo estudo acadêmico e a entrada no serviço de pesquisa ativo é limitado. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sentem a insatisfação nas conversas. A elite intelectual culpa o governo por essa situação." #NT!
 academics.2311.g: "Decepcionante." #NT!
  
 academics_splendid_dinosaur_collection_modifier: "Coleção de dinossauros esplêndidos" #NT!
  
 academics.2312_goal_tt: "Tem uma classificação de dinossauros #o §1 de pelo menos #G 5 #!" #NT!
 academics.2312_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aprovação #!. Além disso, você receberá #p 10%#! Mais prestígio e o custo para a tecnologia da sociedade será reduzido por #p 5%#! por 10 anos." #NT!
  
 je_academics_dinosaur_rating: "Foco paleontológico: Classificação de dinossauros" #NT!
 je_academics_dinosaur_rating_reason: "Para melhorar a classificação de dinossauros #O, não apenas são necessários novos esqueletos de dinossauros, mas também uma reconstrução perfeita deles. Isso pode levar anos. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] decidiu, portanto, não definir um limite de tempo." #NT!
 je_academics_dinosaur_rating_success: "Tem uma classificação de dinossauros #o §1 de pelo menos #G 5 #!" #NT!
  
 academics.2312.t: "O esplendor da paleontologia" #NT!
 academics.2312.d: "O ramo paleontológico de nossa pesquisa científica já tem uma boa reputação. Agora é hora de torná -lo conhecido em todo o mundo, melhorando significativamente nossa exposição de dinossauros." #NT!
 academics.2312.f: "Poderíamos mostrar um dinossauro diferente em nossa exposição. Um número maior de esqueletos não apenas beneficiaria pesquisas científicas, mas também nossa reputação nacional. O mundo inteiro está cavando ossos de dinossauros e é fascinado pela pré -história anteriormente desconhecida. Não deve ser apenas sobre quantidade, mas também sobre qualidade. Nosso objetivo é ser o pioneiro na reconstrução do esqueleto de dinossauros. \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2312.g: "Este será um empreendimento colossal!" #NT!
 academics.2312.h: "Não é esse absurdo paleontológico novamente." #NT!
 academics.2313.t: "Uma coleção esplêndida" #NT!
 academics.2313.d: "A Sociedade Científica estava orgulhosa de anunciar hoje uma exposição especial de esqueletos de dinossauros." #NT!
 academics.2313.f: "Somos profundamente gratos ao governo por finalmente ter uma coleção de dinossauros que ressalta o alto nível de pesquisa paleontológica em nossa nação. Quase não existem coleções mais requintadas do que esta. Demorou muito trabalho e esforço, bem como uma sede de pesquisa e persistência. A sociedade pode olhar para este trabalho com orgulho, enquanto no exterior olha com inveja. Cavalheiro: Este é um ótimo dia para a ciência em geral e a paleontologia em particular! \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2313.g: "Maravilhoso!" #NT!
  
  ### 2.0.2 ### 
  
