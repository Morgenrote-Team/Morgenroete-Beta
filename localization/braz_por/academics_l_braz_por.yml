 je_academics_rivalry_for_fossils_success: "Você ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]) tem mais [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] do que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+])."
 academics.2301.t: "Coleção Fossil fantástica"
 academics.2301.d_rival: "Reunimos uma coleção maior de [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] do que o nosso rival [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!"
 academics.2301.d_rival_gone: "Nossa rival em nossa busca por uma enorme coleção de fósseis se foi. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!"
 academics.2301.f: "Ficou claro desde o início que precisávamos de uma coleção fóssil maior do que o nosso rival. Agora que coletamos tantos fósseis do Cambriano até o Quaternário e da América às Ilhas do Pacífico, temos verdadeiramente uma coleção digna! Obviamente, esse deveria ter sido o caso anos atrás, e devemos exandrar ainda mais essa coleção. No momento, a situação é \ \"boa o suficiente \", como dizem os camponeses. \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2301.g: "Isso coloca um fim a esta briga!"
 academics.2302.t: "Não conseguimos reunir mais fósseis do que [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]"
 academics.2302.d: "Não conseguimos expandir nossa coleção de fósseis além de nossos rivais em [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] não se divertem."
 academics.2302.f: "Sua coleção abrange eras, eles têm tudo e temos algumas pedras empoeiradas com fósseis muito visíveis ... é horrível. Este é um momento vergonhoso para a nossa nação! Nojento. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "Eu não preciso de pedras velhas de qualquer maneira ..."
