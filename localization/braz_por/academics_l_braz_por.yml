 academics.2101_reward_tt: "Como recompensa, o padrão de vida #p da classe média em todos os estados com uma universidade aumentará em um ponto por 5 anos, além disso, o [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 3 anos."
 academics.2104_reward_tt: "Como recompensa, ganharemos #p 5% Prestige#! por 5 anos, além disso, o [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] receberá #p 5 aprovação #! e o custo para a tecnologia de produção será reduzido por #p 5% #! por 3 anos. Nosso arqueólogo receberá #p 15 Experience#!."
 academics.2110_reward_tt: "Como recompensa, ganharemos #p 5% Prestige#! por 5 anos, além disso, o [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] receberá #p 5 aprovação #! e o custo para a tecnologia de produção será reduzido por #p 5% #!. Nosso arqueólogo receberá #p 25 Experience#!."
 academics.2112_reward_tt: "Como recompensa, ganharemos #p 10% Prestige#! por 5 anos, além disso, o [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] receberá #p 5 aprovação #! e o custo para a tecnologia de produção será reduzido por #p 5% #!. Nosso povo também desfrutará de #p 1 padrão de vida §1 mais. Nosso arqueólogo receberá #p 50 Experience#!"
 academics.2309.t: "A ambição de [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 academics.2309.d: "Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] é considerado uma referência nacional no campo paleontológico. A Sociedade Científica gostaria de tornar [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] uma personalidade procurada internacionalmente para usar o [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] como uma figura acadêmica."
 academics.2309.f: "Chegamos à conclusão firme de que nosso colega, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting], seria ideal para representar nossa nação como um local científico. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] deve receber todo suporte possível para aumentar a reputação do [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim]. Isso motivaria os jovens em particular a seguir uma carreira científica."
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] will become famous."
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] shouldn't become megalomaniac."
 academics.2310.t: "Glória paleontológica"
 academics.2310.d: "Com [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] subir à fama como paleontologista, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] é agora a figura científica que a sociedade científica queria."
 academics.2310.f: "We are now receiving many new students who are inspired by the greatness and fame of Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] not only vitalized [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] own subject, but also fundamentally awakened a fascination for the sciences. Being a scientist is no more than a quirky career with few prospects, but rather an exciting job that promises fame and adventure.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
