 academics.2101.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige um museu"
 academics.2101.d: "Como uma das nações mais poderosas do mundo, até agora não tínhamos prestígio arqueológico. Portanto, o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está nos pedindo para construir um museu arqueológico."
 academics.2101.f: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] pede que você aumente seu compromisso com a arqueologia. Explorar o passado, descobrir culturas esquecidas e recuperar artefatos valiosos é de suma importância para a ciência e também para o prestígio nacional."
 academics.2101.g: "Vamos caçar tesouros!"
 academics.2101.h: "Não há necessidade de um museu empoeirado."
 academics.2101_goal_tt: "Você terá que coletar #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] e construir um museu arqueológico em #n 10#! anos."
 academics.2102.t: "Inauguração do museu arqueológico"
 academics.2102.d: "Os representantes do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] pareciam estar muito satisfeitos com a abertura do Museu Arqueológico hoje."
 academics.2102.f: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está encantado ao saber que o novo museu foi aberto ao público e vários cidadãos agora podem desfrutar dos artefatos encontrados. Eles também são de grande valor científico. No entanto, como isso só pode ser um começo, já organizamos com o diretor do museu que ele deveria lembrar a futura compra de artefatos. Ele é - é claro - também um membro da nossa sociedade."
 academics.2102.g: "Agora precisamos de outra coisa que pertence lá ..."
 academics.2103.t: "Uma vergonha arqueológica"
 academics.2103.d: "Para consternação do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], foi observado hoje que, apesar da promessa de promover a arqueologia do país, nenhum esforço foi feito nessa direção."
 academics.2103.f: "Nós, os membros da [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], estamos profundamente desapontados com a ignorância do governo. É pedir muito um pequeno Museu?\n\nAssinado, os membros da [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2103.g: "Quem precisa desse museu empoeirado, afinal?"
 academics.2104.t: "O diretor do museu sugere uma exposição egípcia"
 academics.2105.t: "O diretor do museu sugere uma exposição mesopotâmica"
 academics.2106.t: "O diretor do museu sugere uma exposição do Egeu"
 academics.2107.t: "Museum director suggests a Pre-Columbian Exhibition"
 academics.2104.d: "O diretor do Museu Arqueológico alertou que nosso museu poderia ficar para trás em comparação internacional se não reunirmos urgentemente os artefatos ausentes em uma exposição."
 academics.2104.f: "Como um membro orgulhoso do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento a negligência de nosso belo museu. O mundo inteiro coleta artefatos egípcios, recentemente ouvi falar da estátua felina de Bastet do exterior. A mais recente mania absoluta, eu digo a você! Deveria ser rosa também, ouvi. E nem temos escaravelho suficiente para organizar uma exposição adequada. Se não coletarmos artefatos pelo menos suficientes para uma exposição de médio porte em breve, sou pessimista sobre o futuro da arqueologia em nosso país."
 academics.2105.f: "Como um membro ardente do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento a negligência de nosso respeitado museu. Os artefatos mesopotâmicos são toda a raiva hoje em dia, e as grandes nações simplesmente não conseguem o suficiente. Obviamente, acredito que o tamanho de um Lamassu não determina seu valor, mas o que você faz com ele. No entanto, nem temos comprimidos cuneiformes suficientes para organizar uma exposição adequada. Se não coletarmos artefatos pelo menos suficientes para uma exposição de médio porte em breve, sou pessimista sobre o futuro da arqueologia em nosso país."
 academics.2106.f: "Como um membro importante do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento a negligência de nosso orgulhoso museu. Os artefatos do mar Egeu estão vendendo como hotcakes, essa é a experiência dos últimos anos. Os épicos homéricos se tornaram cultura popular desde que Troy foi redescoberto, e todo Nouveau Riche agora tem uma estátua antiga em seu jardim. E nós? Nós nem temos alguns bens de túmulos micênicos vil para mostrar! Se não coletarmos artefatos pelo menos suficientes para uma exposição de médio porte em breve, sou pessimista sobre o futuro da arqueologia em nosso país."
 academics.2107.f: "Como um belo membro do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento a negligência do nosso importante museu. O mayanismo não conhece mais nenhuma fronteira. Os membros esotéricos de nossa sociedade gastam muito dinheiro para obter as peças mais exóticas da América Central e do Sul. O assalto grave e a destruição de ativos históricos valiosos estão em pleno andamento. Ouvi dizer que um líder da expedição queria mover as pirâmides de Tikal! Por outro lado, nem temos algumas máscaras de pedra ocultas para assustar as crianças no museu. Se não coletarmos artefatos pelo menos suficientes para uma exposição de médio porte em breve, sou pessimista sobre o futuro da arqueologia em nosso país."
 academics.2104.g: "Fortuna e glória!"
 academics.2104.h: "Temos coisas melhores para fazer do que caçar tesouros."
 academics.2108.t: "Uma nova coleção arqueológica"
 academics.2108.d: "O diretor do museu expressou seu prazer de que suas preocupações com novos artefatos foram ouvidas e informaram seus amigos no [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] que o museu em breve estará sediando uma nova exposição."
 academics.2108.f: "A empresa agradece ao governo por ajudar a aumentar a reputação científica do país. Os numerosos novos artefatos são uma expressão da arte e incansável unidade de pesquisa dos melhores homens e mulheres deste país."
 academics.2108.g: "Sucesso!"
 academics.2109.t: "Decepção arqueológica"
 academics.2109.d: "Dirigido, consternado e chocado com a negação de suas preocupações urgentes, o diretor do museu se aposentou em seu escritório, chorando, trancado e recusando -se a falar com qualquer um."
 academics.2109.f: "Muito bem, muito bem. A última vez que o diretor do Museu esteve nesse estado, ele quase se jogou pela janela. É realmente insensível a forma como alguns funcionários do governo estão agindo. Ele só queria alguns artefatos. Alguns artefatos sujos e insignificantes. Ele não tem nada no mundo além de algumas estatuetas empoeiradas e vasos quebrados! Espero que estejam felizes agora. O pobre homem está arrasado.\n\nAssinado, os membros da [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2109.g: "Falha ..."
 academics.2104_goal_tt: "Você terá que coletar #p 25#! egípcio [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] em #n 15#! anos."
 academics.2105_goal_tt: "Você terá que coletar #p 25#! mesopotâmico [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] em #n 15#! anos."
 academics.2106_goal_tt: "Você terá que coletar #p 25#! Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] em #n 15#! anos."
 academics.2107_goal_tt: "Você terá que coletar #p 25#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] pré-colombiano em #n 15#! anos."
 je_academics_found_archaeological_museum: "Foco na arqueologia: encontrou um museu"
 je_academics_found_archaeological_museum_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que construamos um museu arqueológico para aprimorar o conhecimento, mas também o padrão vivo de nossos intelectuais. Construir um museu requer #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], que deve ser encontrado por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition], se não tivermos a sorte ultrajante de adquiri -los por meio de um presente aleatório ou uma escavação local. \ Nit também é muito importante porque a hematemana arqueológica profissional pertence a um museu! ' Não faria muito sentido sem um museu real. \ Nin FACT, seria bastante embaraçoso."
 je_academics_egyptian_artifacts: "Foco na arqueologia: artefatos egípcios"
 je_academics_egyptian_artifacts_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 25#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] egípcio, que devem ser encontrados por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition] ou [concept_lepsius_excavation], não devemos ter a sorte ultrajante de adquiri -los através de um presente aleatório ou uma escavação local."
 je_academics_egyptian_artifacts_success: "Colete #p 25#! #b Artefatos egípcios #!"
 je_academics_egyptian_artifacts_goal: ""
 je_academics_artifacts_event_tt: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ficará encantado."
 je_academics_mesopotamian_artifacts: "Foco na arqueologia: artefatos mesopotâmicos"
 je_academics_mesopotamian_artifacts_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 25#! mesopotâmico [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], que deve ser encontrado por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition] ou [concept_lepsius_excavation], não devemos ter a sorte ultrajante de adquiri -los através de um presente aleatório ou uma escavação local."
 je_academics_mesopotamian_artifacts_success: "Colete #p 25#! #b Artefatos mesopotâmicos #!"
 je_academics_mesopotamian_artifacts_goal: ""
 je_academics_aegean_artifacts: "Foco na arqueologia: artefatos do mar Egeu"
 je_academics_aegean_artifacts_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 25#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] Egean, que deve ser encontrado por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition] ou [concept_lepsius_excavation], não devemos ter a sorte ultrajante de adquiri -los através de um presente aleatório ou uma escavação local."
 je_academics_aegean_artifacts_success: "Colete #p 25#! #b Artefatos Aegeanos #!"
 je_academics_aegean_artifacts_goal: ""
 je_academics_precolumbian_artifacts: "Foco na arqueologia: artefatos pré-colombianos"
 je_academics_precolumbian_artifacts_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to find at least #p 25#! Precolumbian [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], which must be found by an [concept_lepsius_archaeologist] on an [concept_lepsius_expedition] or [concept_lepsius_excavation], should we not have the outrageous luck of acquiring them through a random gift or a local excavation."
 je_academics_precolumbian_artifacts_success: "Colete #p 25#! #b Artefatos pré-colombianos #!"
 je_academics_precolumbian_artifacts_goal: ""
 academics.2110.t: "O diretor do museu quer um grande artefato"
 academics.2110.d: "O diretor do Museu Arqueológico escreveu hoje uma carta aberta ao governo em nome do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2110.f: "É com grande arrependimento que tenho que afirmar que, apesar do rico fundo de artefatos, nosso museu ainda carece de uma grande atração que poderia ser chamada de peça de exibição da coleção. Infelizmente, o governo até agora não conseguiu se concentrar na qualidade como um padrão arqueológico para os objetos em vez de quantidade. Portanto, aconselho fortemente que essa queixa seja corrigida nos próximos anos, ou nossa nação será, na melhor das hipóteses, classificados como contadores de feijão no mundo científico."
 academics.2110.g: "Um empreendimento de prestígio."
 academics.2110.h: "Não vale a pena o problema."
 academics.2110_goal_tt: "Você terá que coletar #p 1#! [concept_lepsius_major_artifact] em #n 15#! anos."
 academics.2111.t: "Esplendor do museu"
 academics.2111.d: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] expressou sua gratidão em sua carta hoje."
 academics.2111.f: "Parabéns pela decisão de tornar a arqueologia a prioridade nacional do país. O espécime excepcional recentemente adquirido estará em exibição em uma exposição especial nas próximas semanas. O mundo nos inveja!"
 academics.2111.g: "Maravilhoso."
 academics.2112.t: "Um lugar empoeirado"
 academics.2112.d: "Em uma carta aberta hoje em nome do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], o diretor do Museu Arqueológico expressou seu arrependimento por a arqueologia não estar sendo ouvida em nossa nação."
 academics.2112.f: "Nunca tanto foi arruinado por tão poucos em tão pouco tempo.\n\nAssinado, O Diretor do Museu Arqueológico"
 academics.2112.g: "E?"
 je_academics_major_artifact: "Foco na arqueologia: artefato principal"
 je_academics_major_artifact_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 1#! [concept_lepsius_major_artifact]. Os principais artefatos podem ser obtidos por meio de grandes descobertas, através de escavações permanentes ou em cadeias de eventos aleatórios durante as expedições."
 je_academics_major_artifact_success: "Tenha #p 1#! [concept_lepsius_major_artifact]."
 academics.2113.t: "Diretor do Museu exige excelência arqueológica"
 academics.2113.d: "O diretor do Museu Arqueológico apontou que pouco está faltando para tornar a exposição quase perfeita."
 academics.2113.f: "Eu sou um homem humilde. Como você sabe, minhas reivindicações não são particularmente extravagantes. Eu nunca pedi a este governo um favor chique. Eu sempre me segurei, como convém ao curador de uma instituição tão esplêndida. Além disso: um último pouco de gelo no bolo está faltando para elevar nossa bela coleção para a classe mundial. Só é preciso uma excelente exposição. Não mais. Obter 100 artefatos de uma região e os maiores artefatos não serão difíceis, certo?"
 academics.2113.g: "Um desafio de boas -vindas."
 academics.2113.h: "Isso é muito arriscado."
 academics.2112_goal_tt: "You will have to arrange an Excellent Exhibition in #n 20#! years."
 academics.2114.t: "Arqueologia em seu pico"
 academics.2114.d: "Uma carta suavizada e quase legível chegou hoje do Museu Arqueológico."
 academics.2114.f: "Somente o remetente ainda pode ser decifrado. A assinatura pertencia claramente ao diretor do museu. O secretário suspeita de lágrimas de alegria enquanto escreve a carta."
 academics.2114.g: "Ele é feliz e nós também."
 academics.2115.t: "Setback for Archaeology"
 academics.2115.d: "Uma carta suavizada e quase legível chegou hoje do Museu Arqueológico."
 academics.2115.f: "Somente o remetente ainda pode ser decifrado. A assinatura pertencia claramente ao diretor do museu. O Secretário assume que as lágrimas chegaram aos seus olhos enquanto o escrevem. Nosso fracasso na última missão arqueológica deve tê -lo jogado em uma profunda depressão."
 academics.2115.g: "Ele está triste e nós também."
 je_academics_excellent_collection: "Foco na arqueologia: excelente coleção"
 je_academics_excellent_collection_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to create an Excellent Exhibition. We need #G 100#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] and #p 1#! [concept_lepsius_major_artifact] from one archaeological region to do so."
 academics.2116.t: "Precisamos encontrar mais artefatos do que [SCOPE.sCountry('rival_scope').GetName]"
 academics.2116.d: "The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are unhappy that [SCOPE.sCountry('rival_scope').GetName] gathered more [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] than our nation. They ask us to find more #b Artifacts#! in total than [SCOPE.sCountry('rival_scope').GetName] in 10 years time."
 academics.2116.f: "É uma pena que uma nação tão insignificante como [SCOPE.sCountry('rival_scope').GetName] tenha uma coleção de artefatos maior que a nossa. Precisamos ultrapassar esses saqueadores de tumbas que só estão cavando por tesouros e nem mesmo conduzem uma arqueologia de verdade! Quanto conhecimento foi perdido por causa desses bárbaros?\n\nAssinado, os membros da [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2116_goal_tt: "Você terá que reunir mais [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] do que o seu rival, [SCOPE.sCountry('rival_scope').GetName], em #n 10#! anos. Eles têm [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+], temos [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]."
 academics.2116_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 10%#! mais prestígio por 4 anos."
 academics.2116.g: "Eu sou um arqueólogo e estou cavando um buraco!"
 academics.2116.h: "Arqueologia não é uma caça ao tesouro!"
 academics_no_competition_with_rival_total_artifacts: "Perdeu a caça ao tesouro"
 academics_competition_with_rival_won_total_artifacts: "Ganhou a caça ao tesouro"
 je_academics_rivalry_for_artifacts: "Foco na arqueologia: a caça ao tesouro"
 je_academics_rivalry_for_artifacts_reason: "A [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos mais [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] que nosso rival [SCOPE.sCountry('target').GetName].\n\nNossos #b Artefatos Totais#!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+]\n#b Artefatos Totais#! de [SCOPE.sCountry('target').GetName]: [ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]"
 je_academics_rivalry_for_artifacts_success: "Você ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]) tem mais [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] do que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+])."
 academics.2117.t: "Coleção de artefatos maravilhosos"
 academics.2117.d_rival: "Reunimos uma coleção maior de artefatos do que o nosso rival [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!"
 academics.2117.d_rival_gone: "Nosso rival arqueológico se foi. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!"
 academics.2117.f: "Deve ser óbvio que nossa nação deve ter uma coleção arqueológica melhor do que a daqueles bárbaros. A [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está contente com esta coleção. Embora haja mais artefatos que precisam ser salvos de tais selvagens.\n\nAssinado, os membros da [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2117.g: "Tantos artefatos salvos!"
 academics.2118.t: "Não conseguimos expandir nossa coleção arqueológica"
 academics.2118.d: "Não fomos capazes de expandir nossa coleção arqueológica além dos nossos rivais em [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão totalmente decepcionados."
 academics.2118.f: "The dirty hands of those savages are soiling the very history of humanity. How could you let all those artifacts get looted by those tomb raiders. So much knowledge will have been lost because they rather want treasures instead of preserving our history. Disgusting!\n\nThe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "Não precisamos desses artefatos empoeirados."
 academics.2200.t: "Precisamos encontrar mais espécime do que [SCOPE.sCountry('rival_scope').GetName]"
 academics.2200.d: "The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are unhappy that [SCOPE.sCountry('rival_scope').GetName] gathered more [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] than our nation. They ask us to find more #b Specimens#! in total than [SCOPE.sCountry('rival_scope').GetName] in 10 years time."
 academics.2200.f: "Nossas coleções de amostras não são nada em comparação com as em [SCOPE.sCountry('rival_scope').GetName]. Eles têm tudo o que desejamos! Eu até ouvi dizer que eles têm uma flor gigantesca que cheira a cadáveres podres. Todo o nosso orgulho é uma borboleta laranja. Precisamos encontrar novos espécimes, espécimes que ninguém encontrou diante de nós! Caso contrário, eles podem cair nas mãos desses açougueiros de animais! \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2200_goal_tt: "Você terá que reunir mais [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que o seu rival, [SCOPE.sCountry('rival_scope').GetName], em #n 10#! anos. Eles têm [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], temos [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]."
 academics.2200_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 10%#! mais prestígio por 4 anos."
 academics.2200.g: "Precisamos enviar nosso naturalista imediatamente!"
 academics.2200.h: "Que perda de tempo!"
 academics_no_competition_with_rival_specimen: "Perdeu a corrida para a amostra"
 academics_competition_with_rival_won_specimen: "Ganhou a corrida por espécime"
 je_academics_rivalry_for_specimen: "Concentre -se no naturalismo: a corrida para os espécimes"
 je_academics_rivalry_for_specimen_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos mais [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que o nosso rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Amostras totais Total [ROOT.Var('dubois_specimen').GetValue|0+] \ n[SCOPE.sCountry('target').GetName]'s #b espécimes totais [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]"
 je_academics_rivalry_for_specimen_success: "Você ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) tem mais [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])."
 academics.2201.t: "Coleção surpreendente de amostras"
 academics.2201.d_rival: "Reunimos uma coleção maior de [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] do que o nosso rival [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!"
 academics.2201.d_rival_gone: "Nossa rival em nossa busca por uma enorme coleção biológica se foi. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!"
 academics.2201.f: "Finalmente, temos uma coleção de espécimes #b digna de nossa grande nação. É hora de podermos exibir os seres vivos mais fascinantes deste planeta. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está satisfeito com a nossa coleção no momento. Obviamente, teremos que continuar cultivando nossa coleção para impedir que outras nações abordassem esses pobres animais e plantas."
 academics.2201.g: "Uma coleção digna!"
 academics.2202.t: "Não conseguimos reunir mais amostras do que [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]"
 academics.2202.d: "Não conseguimos expandir nossa coleção de amostras além dos nossos rivais em [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] são absolutamente esmagados."
 academics.2202.f: "Agora eles também encontraram o animal mais fascinante do mundo. Um lagarto voador. Eles nomearam o presidente do Presidente da Academia de Ciências. Você falhou. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "Eu nunca vou me recuperar disso cientificamente!"
 academics.2203.t: "O [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] quer [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso zoológico"
 academics.2203.d: "O [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] solicitou ao nosso governo que adquirisse [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso [concept_dubois_zoo] em 10 anos."
 academics.2203.f: "Há um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] que falta nosso zoológico. Precisamos que nosso governo encontre [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] e trazê -lo para o nosso zoológico. Não podemos permitir que nosso zoológico não tenha esse animal maravilhoso, afinal."
 academics.2203_goal_tt: "Você terá que adquirir um [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso [concept_dubois_zoo] em 10 anos."
 academics.2203_reward_tt: "Como recompensa, o [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] ganhará #p 5#! Aprovação do seu governo e #p 5%#! Mais atração pop e seu país receberá #p 5%#! Mais prestígio por 5 anos."
 academics.2203.g: "Tenho que pegar todos eles!"
 academics.2203.h: "Estou liderando uma grande nação. Eu não tenho relações com um zoológico!"
 je_academics_get_exotic_animal: "Concentre -se no naturalismo: adquirir [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso zoológico"
 je_academics_get_exotic_animal_reason: "O [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] quer que adquiramos [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso [concept_dubois_zoo]. \ NELE EMEM várias maneiras de adquirir esse [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]."
 academics.2204.t: "Um novo lar para [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2204.d: "Conseguimos adquirir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso [concept_dubois_zoo]. Isso certamente fará o [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] feliz."
 academics.2204.f: "Your government successfully acquired [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our glorious country. This shows that our country is powerful enough to spend its resources on the amusement of our population. Thank you!\n\nSigned, the representatives of the [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2204.g: "Um animal maravilhoso!"
 academics.2205.t: "Nenhum animal novo em nosso zoológico"
 academics.2205.d: "Não fomos capazes de adquirir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] para o nosso zoológico. O [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] não se divertirá."
 academics.2205.f: "Você não pode nem adquirir um animal para o nosso zoológico. Como devemos confiar em você para orientar este país? \ N \ nSigned, os representantes do [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2205.g: "Não temos tempo para alguns animais aleatórios!"
 academics_exotic_animal_acquired_ig_modifier: "Animal exótico adquirido"
 academics_exotic_animal_not_acquired_ig_modifier: "Animal exótico não adquirido"
 academics_exotic_animal_acquired_country_modifier: "Animal exótico adquirido"
 academics.2206.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige um zoológico"
 academics.2206.d: "Os sucessos científicos anteriores no campo da pesquisa natural podem ser descritos como escassos. Alguns representantes científicos influentes se voltaram para o governo com uma petição."
 academics.2206.f: "Para fortalecer a pesquisa biológica em pesquisa geral e zoológica em particular, é essencial um zoológico com uma coleção de animais raros. Essa instalação também melhoraria muito o bem-estar da população. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sugere, portanto, que todos os meios devem ser usados ​​para estabelecer um zoológico nacional e também ajudariam no treinamento de um zoólogo energético."
 academics.2206.g: "Alguns animais certamente podem ser encontrados."
 academics.2206.h: "Essas pessoas não têm mais alguém para irritar?"
 academics.2207.t: "O novo zoológico"
 academics.2207.d: "Alguns representantes da sociedade científica participaram pessoalmente da inauguração do novo zoológico."
 academics.2207.f: "Excelente, realmente excelente o novo zoológico. Os membros tiveram um dia maravilhoso e estão particularmente felizes com a comida de estimação gratuita. Esperamos que isso seja apenas um começo e que o zoológico que acabou de abrir em breve seja expandido e cheio de criaturas mais preciosas, exóticas e maravilhosas."
 academics.2207.g: "Deixe -me alguns amendoins!"
 academics.2208.t: "Sem zoológico"
 academics.2208.d: "Os [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] escreveram uma carta amarga hoje reclamando que o desejo de um novo zoológico não foi cumprido."
 academics.2208.f: "Para nosso grande arrependimento, descobrimos que o atual governo parece ser composto por inimigos diretos da ciência, da biologia em geral e da zoologia em particular, ou pelo menos um monte de inumanos odiadores de animais. Talvez em tal ambiente os animais magníficos fossem desperdiçados em vão."
 academics.2208.g: "Se você é teimoso, certamente não receberá nenhum desejo."
 academics.2206_goal_tt: "Você terá que coletar #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] e criar um [concept_dubois_zoo] em #n 5#! anos."
 academics.2206_reward_tt: "Como recompensa, nosso naturalista receberá #p 50 Experience#! Se ainda não tivermos um naturalista, conseguiremos um."
 academics.2209.t: "Ampliação do zoológico"
 academics.2209.d: "Uma carta aberta do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] lamenta o fato de o zoológico nacional oferecer pouca variedade."
 academics.2209.f: "Embora nossa capital agora tenha uma instalação de zoológico que ofereça alguma variedade para os cientistas estudarem animais e, para o público pagador, essa instalação mal atingiu o padrão digno do tamanho da cidade e nossa importância nacional. Para aumentar o prestígio, para entreter a população e promover a ciência, recomendamos que a expansão do zoológico atual para pelo menos de tamanho médio. \ N \ NSigned, o Conselho do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2209.g: "Traga mais animais!"
 academics.2209.h: "Temos coisas melhores para fazer."
 academics.2210.t: "Um zoológico ainda maior"
 academics.2210.d: "Uma carta aberta do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] lamenta o fato de o zoológico nacional oferecer pouca variedade."
 academics.2210.f: "Embora tenhamos permitido que nosso zoológico crescesse em um tamanho respeitável no passado, ele ainda não desfruta da importância internacional que poderia e deveria ter para impressionar outras nações com nossa paixão zoológica. Precisamos de animais cada vez mais exóticos. Não apenas a ciência está em jogo aqui, mas também nosso prestígio. Aconselhamos fortemente a atualização do nosso zoológico para um grande zoológico."
 academics.2211.t: "Um próspero jardim zoológica"
 academics.2211.d: "O jardim zoológico ampliado é uma das principais atrações da capital e é muito popular entre os estudiosos e os cidadãos comuns. A Sociedade Científica tem o prazer de observar que seu desejo foi concedido."
 academics.2211.f: "Bom trabalho! O novo zoológico é mais espaçoso e cumpre a exigência de descrever um espectro mais amplo do mundo animal do mundo. Espero que você também tenha pensado em um ornitorrinco? Gostaríamos de assumir um patrocínio para isso. Acontece que é nomeado Perry?"
 academics.2211.g: "Os animais do mundo em nossa casa!"
 academics.2212.t: "Decepção zoológica"
 academics.2212.d: "A sociedade científica se pergunta se perguntar ao governo ainda vale a pena quando suas preocupações são pisoteadas de forma a o pequeno pedido de alguns animais do zoológico."
 academics.2212.f: "Estamos muito, muito decepcionados."
 academics.2212.g: "Eles devem fazer pesquisas em vez de se divertir no zoológico."
 academics.2209_goal_tt: "Você terá que aumentar seu [concept_dubois_zoo] para #p tamanho 3#! (zoológico de tamanho médio) em #n 10#! anos."
 academics.2210_goal_tt: "Você terá que aumentar seu [concept_dubois_zoo] para #p tamanho 4#! (zoológico grande) em #n 10#! anos."
 academics.2209_reward_tt: "Como recompensa, nosso naturalista receberá #p 50 Experience#! Se ainda não tivermos um naturalista, conseguiremos um."
 je_academics_found_zoo: "Concentre -se no naturalismo: encontrado um zoológico"
 je_academics_found_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to build a [concept_dubois_zoo] to enhance knowledge, but also the living standard of our intellectuals. Building a zoo requires #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be bought from other countries."
 je_academics_medium_zoo: "Concentre -se no naturalismo: amplie o zoológico"
 je_academics_medium_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has requested an extension of the [concept_dubois_zoo] We have a total of ten years to upgrade our zoo to a #p medium-sized zoo#!. This requires more [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be bought from other countries."
 je_academics_large_zoo: "Concentre -se no naturalismo: amplie o zoológico"
 je_academics_large_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has requested an extension of the [concept_dubois_zoo] We have a total of ten years to upgrade our zoo to a #p large zoo#!. This requires more [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be bought from other countries."
 academics.2300.t: "Precisamos encontrar mais fósseis do que [SCOPE.sCountry('rival_scope').GetName]"
 academics.2300.d: "Faltam [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] suficientes para uma coleção maior que [SCOPE.sCountry('rival_scope').GetName]. Portanto, o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos mais #b fossils#! no total que [SCOPE.sCountry('rival_scope').GetName]. Eles certamente apreciariam muito se pudéssemos vencer esse rival."
 academics.2300.f: "Embora nossos rivais em [SCOPE.sCountry('rival_scope').GetName] tenham vários fósseis de diferentes idades e lugares ao redor do mundo, os nossos são bastante limitados no prazo e no quadro geográfico. Isso é uma enorme vergonha e inacaptável para uma grande nação como a nossa."
 academics.2300_goal_tt: "Você terá que reunir mais [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] do que o seu rival, [SCOPE.sCountry('rival_scope').GetName], em #n 10#! anos. Eles têm [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], temos [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]."
 academics.2300_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 10%#! mais prestígio por 4 anos."
 academics.2300.g: "Ah, uma briga fóssil!"
 academics.2300.h: "Não precisamos de nenhuma rochas empoeirada ..."
