 academics_supported_hanover_modifier: "Hanover apoiado" #NT!
 academics_supported_goettinger_seven_modifier: "Goettinger sete apoiado" #NT!
 academics_goettinger_seven_monument_modifer: "Goettinger Seven Monument" #NT!
 academics_kneeling_decree_modifer: "Ajoelhado decreto" #NT!
 academics_germanistentag_modifier: "Germanistentag" #NT!
  
 je_goettinger_seven_monument: "Goettinger Seven Monument" #NT!
 je_goettinger_seven_monument_reason: "Uma nação alemã unida poderia honrar a memória do Göttingen Seven - desde que o principal poder unificador já tenha defendido historicamente para eles. Um monumento inspiraria gerações de acadêmicos! Obviamente, isso pressupõe que o governo alemão compartilha as idéias liberais dos professores lendários." #NT!
  
 academics.3101.t: "A Constituição de Hanover" #NT!
 academics.3101.d: "Como um de seus primeiros atos oficiais, o rei anunciou que aboliria a Constituição, o chamado Staatsgrundgesetz ('Lei Básica do Estado'). Ernest Augusto enfatizou que não se sente ligado a isso." #NT!
 academics.3101.f: "Hanover recebeu sua primeira constituição, concedida pelo príncipe Regent, em 1819; Isso fez pouco mais do que denotar a mudança de Hanover de um eleitorado para um reino, garantido pelo Congresso de Viena. O duque de Cambridge, como vice -rei do rei William, em Hanover, recomendou uma reorganização completa do governo hanoveriano. William IV havia seu consentimento a uma nova constituição em 1833; O consentimento do duque de Cumberland não foi solicitado nem recebido, e ele havia protestado formalmente contra a adoção da Constituição sem o seu consentimento. Imediatamente após sua chegada a Hanover, o rei dissolveu o Parlamento da Hanoveria, que havia sido convocado sob a constituição disputada. Ele proclamou a suspensão da Constituição, alegando que seu consentimento não havia sido solicitado e que não atendia às necessidades do reino." #NT!
 academics.3101.g: "Suspender a Constituição." #NT!
 academics.3101.h: "O rei não está acima da lei." #NT!
 academics.3102.t: "O Göttingen Sete" #NT!
 academics.3102.d: "O historiador e político Friedrich Christoph Dahlmann contestou os planos de Ernest de mudar a Constituição para o seu gosto, como o próprio Dahlmann havia contribuído para o enquadramento da Constituição. Seis outros professores famosos da Universidade de Göttingen se juntaram ao protesto e defenderam a Constituição de 1833. Logo os homens eram conhecidos como 'Göttingen Seven' - e foram um incômodo para o rei." #NT!
 academics.3102.f: "O documento de Dahlmann se encontrou com uma influência explosiva - os estudantes da universidade produziram muitas centenas ou até milhares de cópias e os disseminaram em toda a Alemanha. The other six protesters were the Germanist brothers Wilhelm and Jacob Grimm (famed fairy tale and folk tale writers and storytellers, known together as the Brothers Grimm), jurist Wilhelm Eduard Albrecht, historian Georg Gottfried Gervinus, physicist Wilhelm Eduard Weber, and theologian and orientalist Heinrich Georg August Ewald. O impacto do protesto forçou o rei a agir e os sete professores desafiadores foram interrogados perante o tribunal universitário." #NT!
 academics.3102.g: "Eles devem ser removidos de suas posições e banidos!" #NT!
 academics.3102.h: "Ceder suas demandas antes que a situação aumente." #NT!
 academics.3103.d: "Após a adesão da rainha Victoria ao trono no Reino Unido, houve alguma tristeza com a perda da união pessoal com Hanover que durou mais de 120 anos. Mas após os últimos eventos na Alemanha, você pode dizer com confiança: é bom que estejamos seguindo caminhos separados." #NT!
 academics.3103.f: "Apenas alguns meses após a adesão do novo rei ao trono, Hanover dissolveu a constituição que havia sido emitida sob o domínio britânico. O novo rei Ernest Augustus agora enfrenta toda uma oposição dos acadêmicos. As pessoas já estão falando sobre essa disputa em toda a Alemanha. Na verdade, assim que um país deixa a esfera britânica de influência benéfica, ela cai na barbárie." #NT!
 academics.3103.g: "É tão bom ser britânico." #NT!
 academics.3104.d: "Os estados da Confederação Alemã são abalados pelo conflito entre o rei de Hanover e sete professores recalcitrantes: depois que o rei Ernest Augusto aboliu a Constituição, o 'Göttingen Seven' se rebelou contra ele. Eles perderam suas posições - mas ganharam muita simpatia no campo liberal alemão." #NT!
 academics.3104.f: "O historiador e político Friedrich Christoph Dahlmann contestou os planos de Ernest de mudar a Constituição para o seu gosto, como o próprio Dahlmann havia contribuído para o enquadramento da Constituição. Six other famous professors from the University of Göttingen joined the protest and defended the constitution of 1833. The other six protesters were the Germanist brothers Wilhelm and Jacob Grimm (famed fairy tale and folk tale writers and storytellers, known together as the Brothers Grimm), jurist Wilhelm Eduard Albrecht, historian Georg Gottfried Gervinus, physicist Wilhelm Eduard Weber e teólogo e orientalista Heinrich Georg August Ewald. Os efeitos diretos do protesto foram limitados, mas a sensação pública e o interesse da mídia foram altos na Alemanha e grande parte da Europa, e os sete eram populares entre o público em geral." #NT!
 academics.3104.g: "Com todo o respeito, o rei foi longe demais." #NT!
 academics.3104.h: "Esta multidão acadêmica recebeu sua justa punição." #NT!
 academics.3105.t: "Um debate acalorado sobre Hanover" #NT!
 academics.3105.d: "O conflito com o 'Göttinger Seven' não passou despercebido nos outros estados da Confederação Alemã. Mesmo na Grã -Bretanha, o povo está irritado por o rei revogar a Constituição." #NT!
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName] é um dos numerosos estados alemães que criticaram as ações de Ernest Augusto. Mas ainda existem países, especialmente aqueles com regra autoritária, que demonstraram entendimento em relação ao processo. Estes incluem [SCOPE.sCountry('academics_pro_hanover_country').GetName]." #NT!
 academics.3105.g: "Isso não é da conta deles!" #NT!
 academics.3106.t: "Propaganda do aluno" #NT!
 academics.3106.d: "Apesar de todos os esforços do Estado para impedir a propagação de propaganda em favor dos círculos de estudantes liberais de 'Göttingen Seven', conseguiram distribuir folhetos em larga escala em grandes cidades." #NT!
 academics.3106.f: "Lembre -se de nossos heróis! Lembre -se do Göttingen Seven! Elogie suas virtudes! Quando o professor Dahlmann publicou seus documentos contra o rei de Hanover, recebeu apoio popular de estudantes e liberais alemães. Teve uma influência explosiva nos estados da Confederação Alemã. Os estudantes da Universidade de Göttingen produziram muitas centenas, ou até milhares, de cópias e os disseminaram em toda a Alemanha." #NT!
 academics.3106.g: "Este pacote de estudante tumultuoso!" #NT!
 academics.3107.t: "Jacob Grimm em [ROOT.GetCountry.GetNameNoFlag]" #NT!
 academics.3107.d: "Depois de ser banido de Hanover, o famoso estudioso e advogado alemão Jacob Grimm está procurando um novo lar. Nossas simpatias pelo 'Göttinger Seven' se espalharam para ele, e é por isso que ele espera um novo emprego." #NT!
 academics.3107.f: "Jacob Ludwig Karl Grimm era um autor alemão, linguista, filologista, jurista e folclorista. Ele formulou a Lei da Linguística de Grimm e foi o co-autor do Deutsches Wörterbuch, o autor da Myitologie deutsche e o editor dos contos de fadas de Grimms. Ele era o irmão mais velho de Wilhelm Grimm; Juntos, eles eram a dupla literária conhecida como os irmãos Grimm." #NT!
 academics.3107.g: "Bem -vindo a ele." #NT!
 academics.3107.h: "Não precisamos de outro acadêmico irritadiço." #NT!
 academics.3108.t: "Wilhelm Eduard Weber em [ROOT.GetCountry.GetNameNoFlag]" #NT!
 academics.3108.d: "Depois de ser banido de Hanover, o famoso físico Wilhelm Eduard Weber está procurando um novo lar. Nossas simpatias pelo 'Göttinger Seven' se espalharam para ele, e é por isso que ele espera um novo emprego." #NT!
 academics.3108.f: "Wilhelm Eduard Weber era um físico alemão e, juntamente com Carl Friedrich Gauss, inventor do primeiro telégrafo eletromagnético." #NT!
 academics.3111.t: "Der Grimm" #NT!
 academics.3111.d: "Os irmãos Jacob e Wilhelm Grimm apresentaram o primeiro volume de um dicionário alemão que se destina a cobrir todo o vocabulário alemão. Uma tarefa gigantesca, mas que aproxima a nação cultural alemã." #NT!
 academics.3111.f: "Das Deutsche Wörterbuch (o dicionário alemão) é um dos dicionários mais importantes da língua alemã. É para o alemão o que é o dicionário em inglês de Oxford para o inglês, contendo informações históricas detalhadas sobre a origem e uso ao longo do tempo das palavras alemãs, com exemplos retirados de documentos reais. Em alemão, o dicionário também é conhecido como 'der Grimm'. Foi iniciado pelos irmãos Grimm em 1838. Inicialmente, eles esperavam que o projeto levasse dez anos e produzisse 6 ou 7 volumes. De fato, o primeiro volume não foi publicado até 1854. Wilhelm Grimm morreu em 1859, e Jacob em 1863, enquanto trabalhava na entrada de 'Frucht' (frutas). Após suas mortes, várias instituições estavam envolvidas no trabalho, incluindo a Academia Prussiana de Ciências e a Academia de Berlim, com um centro em Göttingen também envolvido. Finalmente concluído em 1961, o dicionário conterá 32 volumes e incluirá cerca de 350.000 entradas principais. O 'Grimm' não era apenas um trabalho científico, mas também nacional." #NT!
 academics.3111.g: "Isso deve ser publicado em todo estado alemão!" #NT!
 academics.3112.g: "Eu esperava que eles fizessem um novo livro de conto de fadas em vez disso ..." #NT!
 academics.3113.t: "Primeiro Germanistentag em Frankfurt" #NT!
 academics.3113.d: "Vários intelectuais alemães convidaram pessoas que pensam da mesma forma para uma conferência em Frankfurt, o 'Dia dos Germanistas'. Enquanto muitos querem ver essa reunião como apenas um evento cultural, a mensagem política é igualmente clara." #NT!
 academics.3113.f: "Os 'dias alemães' eram, ao contrário do que o nome sugere, não um evento apenas para os alemães. Eles foram uma iniciativa dos cientistas universitários alemães como parte do desenvolvimento de um sentimento nacional alemão. Em contraste com hoje, o termo estudos alemães tinha um significado mais amplo no Vormärz: ligou historiadores, advogados e linguistas e estudiosos literários que lidaram com a história alemã, a lei alemã e o idioma alemão. No primeiro dia dos alemães, iniciado em Frankfurt em 1846 pelo advogado de Tübingen, August Ludwig, reinicializador, Friedrich Christoph Dahlmann, Georg Waitz e Johann Gustav Droysen falaram sobre a universibilidade de Schleswig-Holstein. Jacob Grimm falou sobre o 'valor das ciências imprecisas', seu irmão Wilhelm falou sobre o dicionário alemão. As conferências foram realizadas no Römer, em Frankfurt. Um segundo dia dos alemães se seguiu em Lübeck em 1847. O Terceiro Dia dos Germanistas, que deveria ocorrer em Nuremberg em 1848, não ocorreu devido à revolução de março." #NT!
 academics.3113.g: "A Alemanha é uma nação cultural." #NT!
 academics.3113.h: "Seus ideais liberais servem como um guia para nós." #NT!
 academics.3115.t: "Ajoelhando -se controvérsia" #NT!
 academics.3115.d: "Com as anexações das terras vizinhas na era napoleônica, a Baviera ganhou grandes territórios que eram protestantes. Nesse período, o rei promoveu um político mais tolerante em relação a seus súditos. Um exemplo foi o decreto, que os soldados protestantes não tinham que se ajoelhar em frente a uma missa ou procissão católica. No entanto, o ministro Karl von Abel propôs mudar isso." #NT!
 academics.3115.f: "A chamada disputa genuflectada ocorreu no reino da Baviera na primeira metade do século XIX. Começou com um decreto do ministro da Baviera Karl von Abel, que também exigia que os soldados protestantes genuflutos diante do Santíssimo Sacramento durante os serviços militares. O decreto ficou conhecido como o 'decreto ajoelhado'. Isso levou a um argumento acalorado na Câmara de Deputados que durou vários anos." #NT!
 academics.3115.g: "Somos um país católico e as pessoas se ajoelham aqui!" #NT!
 academics.3115.h: "Mas e quanto aos nossos compatriotas protestantes?" #NT!
  
