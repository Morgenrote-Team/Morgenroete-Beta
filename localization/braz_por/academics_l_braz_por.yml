  ###################ARCHAEOLOGICAL MISSIONS################## 
  
 academics.2101.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige um museu" #NT!
 academics.2101.d: "Como uma das nações mais poderosas do mundo, até agora não tínhamos prestígio arqueológico. Portanto, o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está nos pedindo para construir um museu arqueológico." #NT!
 academics.2101.f: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] pede que você aumente seu compromisso com a arqueologia. Explorar o passado, descobrir culturas esquecidas e recuperar artefatos valiosos é de suma importância para a ciência e também para o prestígio nacional." #NT!
 academics.2101.g: "Vamos caçar tesouros!" #NT!
 academics.2101.h: "Não há necessidade de um museu empoeirado." #NT!
 academics.2101_goal_tt: "Você terá que coletar #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] e construir um museu arqueológico em #n 10#! anos." #NT!
 academics.2102.t: "Inauguração do museu arqueológico" #NT!
 academics.2102.d: "Os representantes do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] pareciam estar muito satisfeitos com a abertura do Museu Arqueológico hoje." #NT!
 academics.2102.f: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está encantado ao saber que o novo museu foi aberto ao público e vários cidadãos agora podem desfrutar dos artefatos encontrados. Eles também são de grande valor científico. No entanto, como isso só pode ser um começo, já organizamos com o diretor do museu que ele deveria lembrar a futura compra de artefatos. Ele é - é claro - também um membro da nossa sociedade." #NT!
 academics.2102.g: "Agora precisamos de outra coisa que pertence lá ..." #NT!
 academics.2103.t: "Uma vergonha arqueológica" #NT!
 academics.2103.d: "Para consternação do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], foi observado hoje que, apesar da promessa de promover a arqueologia do país, nenhum esforço foi feito nessa direção." #NT!
 academics.2103.f: "Nós, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], estamos profundamente decepcionados com a ignorância do governo. Um pequeno museu está realmente perguntando demais? \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2103.g: "Quem precisa desse museu empoeirado, afinal?" #NT!
  
 academics.2104.t: "O diretor do museu sugere uma exposição egípcia" #NT!
 academics.2105.t: "O diretor do museu sugere uma exposição mesopotâmica" #NT!
 academics.2106.t: "O diretor do museu sugere uma exposição do Egeu" #NT!
 academics.2107.t: "O diretor do museu sugere uma exposição pré-colombiana" #NT!
 academics.2104.d: "O diretor do Museu Arqueológico alertou que nosso museu poderia ficar para trás em comparação internacional se não reunirmos urgentemente os artefatos ausentes em uma exposição." #NT!
 academics.2104.f: "Como um membro orgulhoso do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento a negligência de nosso belo museu. O mundo inteiro coleta artefatos egípcios, recentemente ouvi falar da estátua felina de Bastet do exterior. A mais recente mania absoluta, eu digo a você! Deveria ser rosa também, ouvi. E nem temos escaravelho suficiente para organizar uma exposição adequada. Se não coletarmos artefatos pelo menos suficientes para uma exposição de médio porte em breve, sou pessimista sobre o futuro da arqueologia em nosso país." #NT!
 academics.2105.f: "Como um membro ardente do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento a negligência de nosso respeitado museu. Os artefatos mesopotâmicos são toda a raiva hoje em dia, e as grandes nações simplesmente não conseguem o suficiente. Obviamente, acredito que o tamanho de um Lamassu não determina seu valor, mas o que você faz com ele. No entanto, nem temos comprimidos cuneiformes suficientes para organizar uma exposição adequada. Se não coletarmos artefatos pelo menos suficientes para uma exposição de médio porte em breve, sou pessimista sobre o futuro da arqueologia em nosso país." #NT!
 academics.2106.f: "Como um membro importante do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento a negligência de nosso orgulhoso museu. Os artefatos do mar Egeu estão vendendo como hotcakes, essa é a experiência dos últimos anos. Os épicos homéricos se tornaram cultura popular desde que Troy foi redescoberto, e todo Nouveau Riche agora tem uma estátua antiga em seu jardim. E nós? Nós nem temos alguns bens de túmulos micênicos vil para mostrar! Se não coletarmos artefatos pelo menos suficientes para uma exposição de médio porte em breve, sou pessimista sobre o futuro da arqueologia em nosso país." #NT!
 academics.2107.f: "Como um belo membro do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], lamento a negligência do nosso importante museu. O mayanismo não conhece mais nenhuma fronteira. Os membros esotéricos de nossa sociedade gastam muito dinheiro para obter as peças mais exóticas da América Central e do Sul. O assalto grave e a destruição de ativos históricos valiosos estão em pleno andamento. Ouvi dizer que um líder da expedição queria mover as pirâmides de Tikal! Por outro lado, nem temos algumas máscaras de pedra ocultas para assustar as crianças no museu. Se não coletarmos artefatos pelo menos suficientes para uma exposição de médio porte em breve, sou pessimista sobre o futuro da arqueologia em nosso país." #NT!
 academics.2104.g: "Fortuna e glória!" #NT!
 academics.2104.h: "Temos coisas melhores para fazer do que caçar tesouros." #NT!
 academics.2108.t: "Uma nova coleção arqueológica" #NT!
 academics.2108.d: "O diretor do museu expressou seu prazer de que suas preocupações com novos artefatos foram ouvidas e informaram seus amigos no [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] que o museu em breve estará sediando uma nova exposição." #NT!
 academics.2108.f: "A empresa agradece ao governo por ajudar a aumentar a reputação científica do país. Os numerosos novos artefatos são uma expressão da arte e incansável unidade de pesquisa dos melhores homens e mulheres deste país." #NT!
 academics.2108.g: "Sucesso!" #NT!
 academics.2109.t: "Decepção arqueológica" #NT!
 academics.2109.d: "Dirigido, consternado e chocado com a negação de suas preocupações urgentes, o diretor do museu se aposentou em seu escritório, chorando, trancado e recusando -se a falar com qualquer um." #NT!
 academics.2109.f: "Muito bem, bem feito. A última vez que o diretor do museu esteve nesse estado, ele quase se jogou pela janela. É realmente insensível a maneira como alguns funcionários do governo estão agindo. Ele só queria alguns artefatos. Alguns pequenos artefatos sujos. Ele não tem nada no mundo, mas algumas estatuetas empoeiradas e vasos quebrados! Espero que você esteja feliz agora. O pobre homem está devastado. \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] "" #NT!
 academics.2109.g: "Falha ..." #NT!
 academics.2104_goal_tt: "Você terá que coletar #p 25#! egípcio [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] em #n 15#! anos." #NT!
 academics.2105_goal_tt: "Você terá que coletar #p 25#! mesopotâmico [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] em #n 15#! anos." #NT!
 academics.2106_goal_tt: "Você terá que coletar #p 25#! Aegean [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] em #n 15#! anos." #NT!
 academics.2107_goal_tt: "Você terá que coletar #p 25#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] pré-colombiano em #n 15#! anos." #NT!
  
 je_academics_found_archaeological_museum: "Foco na arqueologia: encontrou um museu" #NT!
 je_academics_found_archaeological_museum_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que construamos um museu arqueológico para aprimorar o conhecimento, mas também o padrão vivo de nossos intelectuais. Construir um museu requer #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], que deve ser encontrado por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition], se não tivermos a sorte ultrajante de adquiri -los por meio de um presente aleatório ou uma escavação local. \ Nit também é muito importante porque a hematemana arqueológica profissional pertence a um museu! ' Não faria muito sentido sem um museu real. \ Nin FACT, seria bastante embaraçoso." #NT!
  
 je_academics_egyptian_artifacts: "Foco na arqueologia: artefatos egípcios" #NT!
 je_academics_egyptian_artifacts_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 25#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] egípcio, que devem ser encontrados por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition] ou [concept_lepsius_excavation], não devemos ter a sorte ultrajante de adquiri -los através de um presente aleatório ou uma escavação local." #NT!
