 academics.2104_reward_tt: "Como recompensa, ganharemos #p 5% Prestige#! por 5 anos, além disso, o [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] receberá #p 5 aprovação #! e o custo para a tecnologia de produção será reduzido por #p 5% #! por 3 anos. Nosso arqueólogo receberá #p 15 Experience#!." #NT!
 academics.2110_reward_tt: "Como recompensa, ganharemos #p 5% Prestige#! por 5 anos, além disso, o [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] receberá #p 5 aprovação #! e o custo para a tecnologia de produção será reduzido por #p 5% #!. Nosso arqueólogo receberá #p 25 Experience#!." #NT!
 academics.2112_reward_tt: "Como recompensa, ganharemos #p 10% Prestige#! por 5 anos, além disso, o [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] receberá #p 5 aprovação #! e o custo para a tecnologia de produção será reduzido por #p 5% #!. Nosso povo também desfrutará de #p 1 padrão de vida §1 mais. Nosso arqueólogo receberá #p 50 Experience#!" #NT!
 academics.2309.t: "A ambição de [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]" #NT!
 academics.2309.d: "Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] é considerado uma referência nacional no campo paleontológico. A Sociedade Científica gostaria de tornar [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] uma personalidade procurada internacionalmente para usar o [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] como uma figura acadêmica." #NT!
 academics.2309.f: "Chegamos à conclusão firme de que nosso colega, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting], seria ideal para representar nossa nação como um local científico. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] deve receber todo suporte possível para aumentar a reputação do [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim]. Isso motivaria os jovens em particular a seguir uma carreira científica." #NT!
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] se tornará famoso." #NT!
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] não deve se tornar megalomaníaco." #NT!
 academics.2310.t: "Glória paleontológica" #NT!
 academics.2310.d: "Com [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] subir à fama como paleontologista, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] é agora a figura científica que a sociedade científica queria." #NT!
 academics.2310.f: "Agora estamos recebendo muitos novos alunos inspirados pela grandeza e fama do professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] Não apenas [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] de assunto vitalizado, mas também despertou fundamentalmente um fascínio pelas ciências. Ser um cientista não passa de uma carreira peculiar com poucas perspectivas, mas um trabalho emocionante que promete fama e aventura. \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
  
