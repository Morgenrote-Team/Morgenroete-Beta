 je_academics_first_railway: "Foco na indústria: construir a primeira ferrovia de [SCOPE.GetRootScope.GetCountry.GetName]"
 je_academics_first_railway_reason: "Agora que a invenção da ferrovia se espalhou para [SCOPE.GetRootScope.GetCountry.GetName], muitos de nossos industriais querem que construamos um dispositivo para facilitar o transporte de mercadorias. Isso nos ajudaria a nos tornar uma potência industrial."
 academics.2400.t: "Precisamos de ferrovias!"
 academics.2400.d: "As ferrovias permitem que as mercadorias sejam transportadas com mais facilidade. Portanto, os capitães da indústria de [SCOPE.GetRootScope.GetCountry.GetName] exigem a construção de uma ferrovia em nosso país nos próximos 5 anos."
 academics.2400.f: "\"We are still transporting our products on dirtroads and rivers. This situation is unacceptable. If we had a better way to transport goods and resources our profits would skyrocket and we could build more factories which would result in better living conditions for everyone. Build a railway now!\""
 academics.2400.g: "Podemos construí -lo?"
 academics_industrialists_happy_modifier: "Industriais agradados"
 academics_industrialists_discontent_modifier: "Industriais descontentados"
 academics_first_railway_modifier: "Primeira Ferrovia"
 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]"
 academics_spanisch_broetli_title_loc: "Spanisch-Brötli-Bahn"
 academics_ferrovia_torino_genova_title_loc: "Ferrovia Torino-Genova"
 academics_generic_title_loc: "A primeira linha ferroviária de [SCOPE.GetRootScope.GetCountry.GetName]"
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]"
 academics_spanisch_broetli_desc_loc: "A Suíça estabeleceu sua primeira conexão de trem da cidade de Zurique para a cidade de Baden. Esperançosamente, essa rota ferroviária faciliará o transporte de mercadorias, pessoas e correio e impulsionará as indústrias em Baden e Zurique. Pelo menos permite que a rica nobreza de Zurique envie seus servos para Baden pela manhã, para obter um Spanisch Brötli fresco, um famoso rolo de pão doce que foi feito por um famoso padeiro em Baden. Os industriais estão muito felizes com essa nova linha ferroviária."
 academics_ferrovia_torino_desc_title_loc: "O Ferrovia Torino-Genova foi oficialmente aberto na presença de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. A linha de trem de Torino a Genova é uma obra -prima da engenharia italiana. A linha de pista dupla tem 169 quilômetros de comprimento, tem mais de 30 pontes e, com o túnel Giovi de 3259 metros de comprimento, possui o túnel mais longo do mundo. Obviamente, nossas capatins da indústria estão encantadas com essa primeira linha ferroviária."
 academics_generic_desc_loc: "The construction of our first railway line was neither easy nor cheap. But thanks to superior [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] engineering it was finished in record time. The Industrialist are very happy as this line provides them with a fast way to move their goods and resources."
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]"
 academics_spanisch_broetli_flavor_loc: "The mouth watering smell of a Spanisch Brötli rises to your nose. The delicious pastry was delivered with the first train of Switzerland, connecting Zürich to the town of Baden.\n\n#b Historically#! the railway from Zürich to Baden was finished in 1847, shortly before the Swiss civil war, the \"Sonderbundskrieg\" occurred. There were 4 locomotives that allowed four connections per day. They were able to travel the 23 kilometers in about 45 minutes. The Schweizerische Nordbahn, as it was officially named, had little economic success and soon expansion plans to Aarau were scraped and one of the daily services was dropped.\n\nA reconstruction of the \"Spanisch-Brötli-Bahn\" exists and is sometimes operated as a historic train on the modern railway tracks in Switzerland."
 academics_ferrovia_torino_genova_flavor_loc: "O arcebispo de Genova batizou a primeira locomotiva. Então o gigante começou a rolar. Foi o primeiro trem que viajaria de Genova até Torino. Foi encomendado pelo rei Carlo Alberto I em 18 de julho de 1844. Mesmo antes da linha terminar, as primeiras partes da linha foram abertas sucessivamente em uma única pista. Em 6 de dezembro de 1853, a linha foi oficialmente aberta. \ NA linha ferroviária rapidamente se tornou a linha mais usada na Itália. Especialmente porque permitiu o transporte de mercadorias do porto de Genova. Em 1889, uma linha alternativa foi construída sobre o passe Giovi, com gradientes mais baixos que a linha antiga. \ N1898, a tripulação de trem sufocou no túnel Giovi e a locomotiva continuou sem motorista. Ele bateu um trem em espera e um total de 13 pessoas foram mortas. Como resultado, a linha foi eletrificada."
 academics_generic_flavor_loc: "\"Também já era hora de termos nossa própria linha ferroviária! Estamos muito atrás da nossa competição! Agora, finalmente, podemos transportar todos os nossos produtos de uma maneira decente!\""
 academics.2401.g: "Sim, podemos!"
 academics.2402.t: "Não conseguimos construir nossa primeira linha ferroviária"
 academics.2402.d: "Faz cinco anos que os indústrias nos pediram para construir a primeira linha ferroviária em nosso país. Não conseguimos terminar a linha a tempo. Certamente isso afetará a visão industrial de nosso governo."
 academics.2402.f: "\"You can't even build a railway line. Your government is an absolute failure. Shame on you!\""
 academics.2402.g: "Não, não poderíamos"
