 je_academics_precolumbian_artifacts_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 25#! pré -colombiano [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], que deve ser encontrado por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition] ou [concept_lepsius_expedition], não devemos ter a sorte ultrajante de adquiri -los através de um presente aleatório ou uma escavação local." #NT!
 je_academics_precolumbian_artifacts_success: "Colete #p 25#! #b Artefatos pré-colombianos #!" #NT!
