 je_academics_aegean_artifacts: "Foco na arqueologia: artefatos do mar Egeu" #NT!
 je_academics_aegean_artifacts_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos pelo menos #p 25#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] Egean, que deve ser encontrado por um [concept_lepsius_archaeologist] em um [concept_lepsius_expedition] ou [concept_lepsius_excavation], não devemos ter a sorte ultrajante de adquiri -los através de um presente aleatório ou uma escavação local." #NT!
 je_academics_aegean_artifacts_success: "Colete #p 25#! #b Artefatos Aegeanos #!" #NT!
