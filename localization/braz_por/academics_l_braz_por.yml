 academics.21.t: "Our [concept_tesla_engineer] died"
 academics.21.d: "After spending decades as a [concept_tesla_engineer], our former #b #ORANGE Chief Engineer#!#! has died. Will we ever be able to replace such an astonishing scientist?"
 academics.21.g: "Esta é uma grande perda!"
 academics.21_tt: "Às vezes, o jogo mata os personagens. Um mod não pode impedir que isso aconteça. Este evento remove o papel desse cientista do jogo, para que você não seja assombrado por um fantasma deles."
 academics.22.t: "Nosso [concept_verrier_astronomer] morreu"
 academics.22.d: "Depois de passar décadas como um [concept_verrier_astronomer], nosso ex -astrônomo -chefe #b #ORANGE morreu. Será que seremos capazes de substituir um cientista tão surpreendente?"
