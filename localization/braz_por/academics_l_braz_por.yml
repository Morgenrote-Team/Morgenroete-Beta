 academics.51.f: "[Concept('concept_academics_academic','$concept_academics_academics$')] são cientistas com habilidades especiais. Por exemplo, [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] pode coletar espécimes adicionais sobre expedições de pesquisa, acessar o Safari e capturar [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]. [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] Aumente o número de [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] encontrado a cada ano. [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] dobrar a velocidade do edifício grande [Concept('concept_elgar_architecture','$concept_elgar_architectural_projects$')]. [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] são essenciais para a pesquisa da antiguidade. Se um novo acadêmico surgir, você pode optar por substituir seu antecessor nessa profissão - isso pode ser vantajoso se a morte ou a aposentadoria de um acadêmico estiver se aproximando, mas deve ser cuidadosamente considerado, especialmente com arqueólogos, naturalistas, paleontologistas e astrônomos - afinal, eles têm §8 especiais que podem ser perdidos." #NT!
