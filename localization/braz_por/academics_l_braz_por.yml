 je_academics_first_railway: "Foco na indústria: construir a primeira ferrovia de [SCOPE.GetRootScope.GetCountry.GetName]" #NT!
 je_academics_first_railway_reason: "Agora que a invenção da ferrovia se espalhou para [SCOPE.GetRootScope.GetCountry.GetName], muitos de nossos industriais querem que construamos um dispositivo para facilitar o transporte de mercadorias. Isso nos ajudaria a nos tornar uma potência industrial." #NT!
  
 academics.2400.t: "Precisamos de ferrovias!" #NT!
 academics.2400.d: "As ferrovias permitem que as mercadorias sejam transportadas com mais facilidade. Portanto, os capitães da indústria de [SCOPE.GetRootScope.GetCountry.GetName] exigem a construção de uma ferrovia em nosso país nos próximos 5 anos." #NT!
 academics.2400.f: ""Ainda estamos transportando nossos produtos em dirtroads e rios. Essa situação é inaceitável. Se tivéssemos uma maneira melhor de transportar mercadorias e rejeitar nossos lucros disparariam e poderíamos construir mais fábricas, o que resultaria em melhores condições de vida para todos. Construir uma ferrovia agora!"" #NT!
 academics.2400.g: "Podemos construí -lo?" #NT!
  
 academics_industrialists_happy_modifier: "Industriais agradados" #NT!
 academics_industrialists_discontent_modifier: "Industriais descontentados" #NT!
 academics_first_railway_modifier: "Primeira Ferrovia" #NT!
  
 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]" #NT!
 academics_spanisch_broetli_title_loc: "Spanisch-Brötli-Bahn" #NT!
 academics_ferrovia_torino_genova_title_loc: "Ferrovia Torino-Genova" #NT!
 academics_generic_title_loc: "A primeira linha ferroviária de [SCOPE.GetRootScope.GetCountry.GetName]" #NT!
  
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]" #NT!
 academics_spanisch_broetli_desc_loc: "A Suíça estabeleceu sua primeira conexão de trem da cidade de Zurique para a cidade de Baden. Esperançosamente, essa rota ferroviária faciliará o transporte de mercadorias, pessoas e correio e impulsionará as indústrias em Baden e Zurique. Pelo menos permite que a rica nobreza de Zurique envie seus servos para Baden pela manhã, para obter um Spanisch Brötli fresco, um famoso rolo de pão doce que foi feito por um famoso padeiro em Baden. Os industriais estão muito felizes com essa nova linha ferroviária." #NT!
 academics_ferrovia_torino_desc_title_loc: "O Ferrovia Torino-Genova foi oficialmente aberto na presença de [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. A linha de trem de Torino a Genova é uma obra -prima da engenharia italiana. A linha de pista dupla tem 169 quilômetros de comprimento, tem mais de 30 pontes e, com o túnel Giovi de 3259 metros de comprimento, possui o túnel mais longo do mundo. Obviamente, nossas capatins da indústria estão encantadas com essa primeira linha ferroviária." #NT!
 academics_generic_desc_loc: "A construção de nossa primeira linha ferroviária não foi fácil nem barata. Mas, graças à engenharia superior [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting], ele foi finalizado em tempo recorde. O industrial é muito feliz, pois essa linha lhes fornece uma maneira rápida de mover seus produtos e Ressources." #NT!
  
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]" #NT!
 academics_spanisch_broetli_flavor_loc: "O cheiro de dar água na boca de um Spanisch Brötli sobe no seu nariz. A deliciosa pastelaria foi entregue com a primeira linha da Suíça, conectando Zürique à cidade de Baden. Havia 4 locomotivas que permitiram quatro conexões por dia. Eles conseguiram viajar os 23 quilômetros em cerca de 45 minutos. O Schweizerische Nordbahn, como foi oficialmente nomeado, teve pouco sucesso econômico e logo os planos de expansão para Aarau foram raspados e um dos serviços diários foi retirado." #NT!
 academics_ferrovia_torino_genova_flavor_loc: "O arcebispo de Genova batizou a primeira locomotiva. Então o gigante começou a rolar. Foi o primeiro trem que viajaria de Genova até Torino. Foi encomendado pelo rei Carlo Alberto I em 18 de julho de 1844. Mesmo antes da linha terminar, as primeiras partes da linha foram abertas sucessivamente em uma única pista. Em 6 de dezembro de 1853, a linha foi oficialmente aberta. \ NA linha ferroviária rapidamente se tornou a linha mais usada na Itália. Especialmente porque permitiu o transporte de mercadorias do porto de Genova. Em 1889, uma linha alternativa foi construída sobre o passe Giovi, com gradientes mais baixos que a linha antiga. \ N1898, a tripulação de trem sufocou no túnel Giovi e a locomotiva continuou sem motorista. Ele bateu um trem em espera e um total de 13 pessoas foram mortas. Como resultado, a linha foi eletrificada." #NT!
 academics_generic_flavor_loc: ""Também já era hora de termos nossa própria linha ferroviária! Estamos muito atrás da nossa competição! Agora, finalmente, podemos transportar todos os nossos produtos de uma maneira decente!"" #NT!
  
 academics.2401.g: "Sim, podemos!" #NT!
  
 academics.2402.t: "Não conseguimos construir nossa primeira linha ferroviária" #NT!
 academics.2402.d: "Faz cinco anos que os indústrias nos pediram para construir a primeira linha ferroviária em nosso país. Não conseguimos terminar a linha a tempo. Certamente isso afetará a visão industrial de nosso governo." #NT!
 academics.2402.f: ""Você nem consegue construir uma linha ferroviária. Seus governadores são um fracasso absoluto. Vergonha para você!"" #NT!
 academics.2402.g: "Não, não poderíamos" #NT!
  
