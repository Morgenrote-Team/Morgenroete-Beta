 ademics_our_own_dinosaur_modifier: "Nosso Novo Dinossauro"
 ademics_no_dinosaur_modifier: "Sem dinossauros"
 academics.2303_goal_tt: "Construto #G 1#! [concept_dubois_dinosaur_skeleton]"
 academics.2303_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 5%#! mais prestígio por 4 anos. Também teremos um investimento em tecnologia média."
 je_academics_giant_of_the_past: "Foco paleontológico: gigante do passado"
 je_academics_giant_of_the_past_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has asked to collect [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] and reconstruct a [concept_dubois_dinosaur_skeleton]. What condition it is in remains secondary - the main thing is that we have an opulent piece in our collection. Dinosaur bones are found in Great Formations. If we don't have one on our territory, a [concept_dubois_paleontological_licence] would be advantageous so that our paleontologist can search abroad."
 academics.2303.t: "Gigante do passado"
 academics.2303.d: "Alguns cientistas líderes lamentaram que, apesar de nossos avanços paleontológicos, ainda precisamos exibir um esqueleto completo de dinossauros. Nossa sociedade científica também se arrependeu profundamente dessa situação infeliz em uma carta e gostaria de ver essa situação remediada."
 academics.2303.f: "NÓS QUEREMOS UM DINOSSAURO, E NÓS O QUEREMOS AGORA!\n\nAssinado, os membros da [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2303.g: "Uma excelente iniciativa!"
 academics.2303.h: "Este não é um parque de diversões para meninos, mas um instituto científico."
 academics.2304.t: "O lagarto terrível"
 academics.2304.d: "O novo dinossauro é a peça mais espetacular da coleção paleontológica. Todos os dias, os novos visitantes se reúnem na exposição para ver o esqueleto."
 academics.2304.f: "Podemos ter outro? \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2304.g: "Nosso próprio dinossauro!"
 academics.2305.t: "Sem lagarto"
 academics.2305.d: "A plataforma reservada para o esqueleto de dinossauro planejado permanece vazio. A sociedade científica reagiu a isso com grande irritação."
 academics.2305.f: "Precisamos ser ainda mais claros? \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2305.g: "Encontre outro brinquedo!"
 academics.2306_goal_tt: "Encontre #G 3#! #O fósseis especiais"
 academics.2306_reward_tt: "Como recompensa, nosso [concept_dubois_paleontologist] receberá #p 50 Experience#! Se ainda não tivermos um [concept_dubois_paleontologist], conseguiremos um. Também teremos um grande investimento tecnológico."
 je_academics_special_fossils: "Foco paleontológico: fósseis especiais"
 je_academics_special_fossils_reason: "Fósseis especiais são fósseis únicos que são tratados separadamente devido ao seu status excepcional. Estes incluem formas de transição como o archaeopteryx ou ichthyostega, mas também grandes espécies de mamíferos extintas, como o megatherium gigante da preguiça ou o ictiossauro do tipo golfinho. Mas fósseis menores que são usados ​​para definir uma era - os mais conhecidos são amonitas e trilobitas - também pertencem a essa categoria. No total, existem uma dúzia de fósseis especiais que podem ser encontrados não apenas nas formações, mas também em expedições científicas."
 je_academics_special_fossils_success: "Encontre #G 3#! #O fósseis especiais"
 academics.2306.t: "Fósseis extraordinários"
 academics.2306.d: "A sociedade científica tem um pedido extraordinário de nós sobre fósseis extraordinários."
 academics.2306.f: "A história da ascendência animal é um segredo da natureza que nossos pesquisadores revelam um pouco mais a cada dia. Um papel especial é desempenhado pelas formas que estão nos limiares entre as espécies, os chamados 'Links ausentes'. Ao mesmo tempo, existem criaturas extraordinárias em nosso planeta que não precisam ser dinossauros para impressionar: mamíferos extintos, como tigres de dentes de sabre ou preguiças gigantes. Se coletássemos pelo menos três fósseis especiais, poderíamos fortalecer ainda mais a reputação de nosso instituto no mundo."
 academics.2306.g: "Special Fossils for a special collection."
 academics.2306.h: "Não podemos concentrar nossas capacidades científicas em algo mais significativo?"
 academics.2307.t: "Coleção fóssil surpreendente"
 academics.2307.d: "Não há dúvida de que o Instituto Paleontológico Nacional tem uma das coleções internacionais mais importantes. Quase não há lugar comparável com peças tão extraordinárias."
 academics.2307.f: "Os fósseis especiais nem sempre são tão impressionantes quanto se pode pensar primeiro, mas têm um grande valor científico. A sociedade científica, portanto, enviou uma carta de agradecimento. Haverá uma exposição especial nos próximos dias."
 academics.2307.g: "Magnífico."
 academics.2308.t: "Decepção especial"
 academics.2308.d: "A sociedade científica expressou consternação com o mais recente fracasso paleontológico."
 academics.2308.f: "É uma tragédia nacional que as preocupações da história natural do país estejam sendo completamente ignoradas. A pesquisa paleontológica é descartada como bobagem sobre pássaros e lagartos mortos, os pagamentos de apoio a expedições especiais raramente são feitos e até os menores desejos são ignorados. J'Accuse! \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2308.g: "Oh céus."
 ademics_no_paleontological_hero_modifier: "Nenhum herói da paleontologia"
 academics.2309_goal_tt: "Tem um #o famoso §1 [concept_dubois_paleontologist]"
 academics.2309_reward_tt: "Como recompensa, ganharemos #p 120#! [concept_academics_progress]."
 je_academics_famous_paleontologist: "Foco paleontológico: Paleontologista famoso"
 je_academics_famous_paleontologist_reason: "A ascensão de um [concept_dubois_paleontologist] é acompanhada pela melhoria de sua experiência. Como todo acadêmico, um paleontologista recebe 5 pontos de experiência anualmente. Ele ganha experiência adicional em pesquisas paleontológicas bem -sucedidas de formações. Além disso, um paleontologista pode ser usado em expedições de montanhismo e expedições do Pacífico. Construir e remontar com sucesso esqueletos de dinossauros também ajuda a melhorar a experiência de um paleontologista."
 academics.2310.g: "Uma inspiração para a juventude."
 academics.2311.t: "Nenhum herói da paleontologia"
 academics.2311.d: "Por qualquer motivo, não conseguimos promover um paleontologista e deixá -lo alcançar a fama mundial."
 academics.2311.f: "Infelizmente, o fracasso significou que as disciplinas científicas continuam sendo descartadas como assuntos da orquídea e o entusiasmo pelo estudo acadêmico e a entrada no serviço de pesquisa ativo é limitado. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sentem a insatisfação nas conversas. A elite intelectual culpa o governo por essa situação."
 academics.2311.g: "Decepcionante."
 academics_splendid_dinosaur_collection_modifier: "Coleção de dinossauros esplêndidos"
 academics.2312_goal_tt: "Tem uma classificação de dinossauros #o §1 de pelo menos #G 5 #!"
 academics.2312_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aprovação #!. Além disso, você receberá #p 10%#! Mais prestígio e o custo para a tecnologia da sociedade será reduzido por #p 5%#! por 10 anos."
 je_academics_dinosaur_rating: "Foco paleontológico: Classificação de dinossauros"
 je_academics_dinosaur_rating_reason: "Para melhorar a classificação de dinossauros #O, não apenas são necessários novos esqueletos de dinossauros, mas também uma reconstrução perfeita deles. Isso pode levar anos. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] decidiu, portanto, não definir um limite de tempo."
 je_academics_dinosaur_rating_success: "Tem uma classificação de dinossauros #o §1 de pelo menos #G 5 #!"
 academics.2312.t: "O esplendor da paleontologia"
 academics.2312.d: "O ramo paleontológico de nossa pesquisa científica já tem uma boa reputação. Agora é hora de torná -lo conhecido em todo o mundo, melhorando significativamente nossa exposição de dinossauros."
 academics.2312.f: "Poderíamos mostrar um dinossauro diferente em nossa exposição. Um número maior de esqueletos não apenas beneficiaria pesquisas científicas, mas também nossa reputação nacional. O mundo inteiro está cavando ossos de dinossauros e é fascinado pela pré -história anteriormente desconhecida. Não deve ser apenas sobre quantidade, mas também sobre qualidade. Nosso objetivo é ser o pioneiro na reconstrução do esqueleto de dinossauros. \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2312.g: "Este será um empreendimento colossal!"
 academics.2312.h: "Não é esse absurdo paleontológico novamente."
 academics.2313.t: "Uma coleção esplêndida"
 academics.2313.d: "A Sociedade Científica estava orgulhosa de anunciar hoje uma exposição especial de esqueletos de dinossauros."
 academics.2313.f: "Somos profundamente gratos ao governo por finalmente ter uma coleção de dinossauros que ressalta o alto nível de pesquisa paleontológica em nossa nação. Quase não existem coleções mais requintadas do que esta. Demorou muito trabalho e esforço, bem como uma sede de pesquisa e persistência. A sociedade pode olhar para este trabalho com orgulho, enquanto no exterior olha com inveja. Cavalheiro: Este é um ótimo dia para a ciência em geral e a paleontologia em particular! \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2313.g: "Maravilhoso!"
 academics_royalist_reaction_modifier: "Reação realista"
 academics_royalist_weakness_modifier: "Fraqueza realista"
 academics_constitution_suspended_modifier: "Staatsgrundgesetz suspenso"
 academics_constitution_confirmed_modifier: "Staatsgrundgesetz confirmou"
 academics_academic_purge_modifier: "Purga acadêmica \ n #R -1#! #o Progresso acadêmico #!"
 academics_good_to_be_british_modifier: "É bom ser britânico"
 academics_supported_hanover_modifier: "Hanover apoiado"
 academics_supported_goettinger_seven_modifier: "Goettinger sete apoiado"
 academics_kneeling_decree_modifer: "Ajoelhado decreto"
 academics_germanistentag_modifier: "Germanistentag"
 je_goettinger_seven_monument: "Goettinger Seven Monument"
 je_goettinger_seven_monument_reason: "Uma nação alemã unida poderia honrar a memória do Göttingen Seven - desde que o principal poder unificador já tenha defendido historicamente para eles. Um monumento inspiraria gerações de acadêmicos! Obviamente, isso pressupõe que o governo alemão compartilha as idéias liberais dos professores lendários."
 academics.3101.t: "A Constituição de Hanover"
 academics.3101.d: "Como um de seus primeiros atos oficiais, o rei anunciou que aboliria a Constituição, o chamado Staatsgrundgesetz ('Lei Básica do Estado'). Ernest Augusto enfatizou que não se sente ligado a isso."
 academics.3101.f: "Hanover recebeu sua primeira constituição, concedida pelo príncipe Regent, em 1819; Isso fez pouco mais do que denotar a mudança de Hanover de um eleitorado para um reino, garantido pelo Congresso de Viena. O duque de Cambridge, como vice -rei do rei William, em Hanover, recomendou uma reorganização completa do governo hanoveriano. William IV havia seu consentimento a uma nova constituição em 1833; O consentimento do duque de Cumberland não foi solicitado nem recebido, e ele havia protestado formalmente contra a adoção da Constituição sem o seu consentimento. Imediatamente após sua chegada a Hanover, o rei dissolveu o Parlamento da Hanoveria, que havia sido convocado sob a constituição disputada. Ele proclamou a suspensão da Constituição, alegando que seu consentimento não havia sido solicitado e que não atendia às necessidades do reino."
 academics.3101.g: "Suspender a Constituição."
 academics.3101.h: "O rei não está acima da lei."
 academics.3102.t: "O Göttingen Sete"
 academics.3102.d: "O historiador e político Friedrich Christoph Dahlmann contestou os planos de Ernest de mudar a Constituição para o seu gosto, como o próprio Dahlmann havia contribuído para o enquadramento da Constituição. Seis outros professores famosos da Universidade de Göttingen se juntaram ao protesto e defenderam a Constituição de 1833. Logo os homens eram conhecidos como 'Göttingen Seven' - e foram um incômodo para o rei."
 academics.3102.f: "O documento de Dahlmann se encontrou com uma influência explosiva - os estudantes da universidade produziram muitas centenas ou até milhares de cópias e os disseminaram em toda a Alemanha. The other six protesters were the Germanist brothers Wilhelm and Jacob Grimm (famed fairy tale and folk tale writers and storytellers, known together as the Brothers Grimm), jurist Wilhelm Eduard Albrecht, historian Georg Gottfried Gervinus, physicist Wilhelm Eduard Weber, and theologian and orientalist Heinrich Georg August Ewald. O impacto do protesto forçou o rei a agir e os sete professores desafiadores foram interrogados perante o tribunal universitário."
 academics.3102.g: "Eles devem ser removidos de suas posições e banidos!"
 academics.3102.h: "Ceder suas demandas antes que a situação aumente."
 academics.3103.d: "Após a adesão da rainha Victoria ao trono no Reino Unido, houve alguma tristeza com a perda da união pessoal com Hanover que durou mais de 120 anos. Mas após os últimos eventos na Alemanha, você pode dizer com confiança: é bom que estejamos seguindo caminhos separados."
 academics.3103.f: "Apenas alguns meses após a adesão do novo rei ao trono, Hanover dissolveu a constituição que havia sido emitida sob o domínio britânico. O novo rei Ernest Augustus agora enfrenta toda uma oposição dos acadêmicos. As pessoas já estão falando sobre essa disputa em toda a Alemanha. Na verdade, assim que um país deixa a esfera britânica de influência benéfica, ela cai na barbárie."
 academics.3103.g: "É tão bom ser britânico."
 academics.3104.d: "Os estados da Confederação Alemã são abalados pelo conflito entre o rei de Hanover e sete professores recalcitrantes: depois que o rei Ernest Augusto aboliu a Constituição, o 'Göttingen Seven' se rebelou contra ele. Eles perderam suas posições - mas ganharam muita simpatia no campo liberal alemão."
 academics.3104.f: "O historiador e político Friedrich Christoph Dahlmann contestou os planos de Ernest de mudar a Constituição para o seu gosto, como o próprio Dahlmann havia contribuído para o enquadramento da Constituição. Six other famous professors from the University of Göttingen joined the protest and defended the constitution of 1833. The other six protesters were the Germanist brothers Wilhelm and Jacob Grimm (famed fairy tale and folk tale writers and storytellers, known together as the Brothers Grimm), jurist Wilhelm Eduard Albrecht, historian Georg Gottfried Gervinus, physicist Wilhelm Eduard Weber e teólogo e orientalista Heinrich Georg August Ewald. Os efeitos diretos do protesto foram limitados, mas a sensação pública e o interesse da mídia foram altos na Alemanha e grande parte da Europa, e os sete eram populares entre o público em geral."
 academics.3104.g: "Com todo o respeito, o rei foi longe demais."
 academics.3104.h: "Esta multidão acadêmica recebeu sua justa punição."
 academics.3105.t: "Um debate acalorado sobre Hanover"
 academics.3105.d: "O conflito com o 'Göttinger Seven' não passou despercebido nos outros estados da Confederação Alemã. Mesmo na Grã -Bretanha, o povo está irritado por o rei revogar a Constituição."
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName] é um dos numerosos estados alemães que criticaram as ações de Ernest Augusto. Mas ainda existem países, especialmente aqueles com regra autoritária, que demonstraram entendimento em relação ao processo. Estes incluem [SCOPE.sCountry('academics_pro_hanover_country').GetName]."
 academics.3105.g: "Isso não é da conta deles!"
 academics.3106.t: "Propaganda do aluno"
 academics.3106.d: "Apesar de todos os esforços do Estado para impedir a propagação de propaganda em favor dos círculos de estudantes liberais de 'Göttingen Seven', conseguiram distribuir folhetos em larga escala em grandes cidades."
 academics.3106.f: "Lembre -se de nossos heróis! Lembre -se do Göttingen Seven! Elogie suas virtudes! Quando o professor Dahlmann publicou seus documentos contra o rei de Hanover, recebeu apoio popular de estudantes e liberais alemães. Teve uma influência explosiva nos estados da Confederação Alemã. Os estudantes da Universidade de Göttingen produziram muitas centenas, ou até milhares, de cópias e os disseminaram em toda a Alemanha."
 academics.3106.g: "Este pacote de estudante tumultuoso!"
 academics.3107.t: "Jacob Grimm em [ROOT.GetCountry.GetNameNoFlag]"
 academics.3107.d: "Depois de ser banido de Hanover, o famoso estudioso e advogado alemão Jacob Grimm está procurando um novo lar. Nossas simpatias pelo 'Göttinger Seven' se espalharam para ele, e é por isso que ele espera um novo emprego."
 academics.3107.f: "Jacob Ludwig Karl Grimm era um autor alemão, linguista, filologista, jurista e folclorista. Ele formulou a Lei da Linguística de Grimm e foi o co-autor do Deutsches Wörterbuch, o autor da Myitologie deutsche e o editor dos contos de fadas de Grimms. Ele era o irmão mais velho de Wilhelm Grimm; Juntos, eles eram a dupla literária conhecida como os irmãos Grimm."
 academics.3107.g: "Bem -vindo a ele."
 academics.3107.h: "Não precisamos de outro acadêmico irritadiço."
 academics.3108.t: "Wilhelm Eduard Weber em [ROOT.GetCountry.GetNameNoFlag]"
 academics.3108.d: "Depois de ser banido de Hanover, o famoso físico Wilhelm Eduard Weber está procurando um novo lar. Nossas simpatias pelo 'Göttinger Seven' se espalharam para ele, e é por isso que ele espera um novo emprego."
 academics.3108.f: "Wilhelm Eduard Weber era um físico alemão e, juntamente com Carl Friedrich Gauss, inventor do primeiro telégrafo eletromagnético."
 academics.3111.t: "Der Grimm"
 academics.3111.d: "Os irmãos Jacob e Wilhelm Grimm apresentaram o primeiro volume de um dicionário alemão que se destina a cobrir todo o vocabulário alemão. Uma tarefa gigantesca, mas que aproxima a nação cultural alemã."
 academics.3111.f: "Das Deutsche Wörterbuch (o dicionário alemão) é um dos dicionários mais importantes da língua alemã. É para o alemão o que é o dicionário em inglês de Oxford para o inglês, contendo informações históricas detalhadas sobre a origem e uso ao longo do tempo das palavras alemãs, com exemplos retirados de documentos reais. Em alemão, o dicionário também é conhecido como 'der Grimm'. Foi iniciado pelos irmãos Grimm em 1838. Inicialmente, eles esperavam que o projeto levasse dez anos e produzisse 6 ou 7 volumes. De fato, o primeiro volume não foi publicado até 1854. Wilhelm Grimm morreu em 1859, e Jacob em 1863, enquanto trabalhava na entrada de 'Frucht' (frutas). Após suas mortes, várias instituições estavam envolvidas no trabalho, incluindo a Academia Prussiana de Ciências e a Academia de Berlim, com um centro em Göttingen também envolvido. Finalmente concluído em 1961, o dicionário conterá 32 volumes e incluirá cerca de 350.000 entradas principais. O 'Grimm' não era apenas um trabalho científico, mas também nacional."
 academics.3111.g: "Isso deve ser publicado em todo estado alemão!"
 academics.3112.g: "Eu esperava que eles fizessem um novo livro de conto de fadas em vez disso ..."
 academics.3113.t: "Primeiro Germanistentag em Frankfurt"
 academics.3113.d: "Vários intelectuais alemães convidaram pessoas que pensam da mesma forma para uma conferência em Frankfurt, o 'Dia dos Germanistas'. Enquanto muitos querem ver essa reunião como apenas um evento cultural, a mensagem política é igualmente clara."
 academics.3113.f: "Os 'dias alemães' eram, ao contrário do que o nome sugere, não um evento apenas para os alemães. Eles foram uma iniciativa dos cientistas universitários alemães como parte do desenvolvimento de um sentimento nacional alemão. Em contraste com hoje, o termo estudos alemães tinha um significado mais amplo no Vormärz: ligou historiadores, advogados e linguistas e estudiosos literários que lidaram com a história alemã, a lei alemã e o idioma alemão. No primeiro dia dos alemães, iniciado em Frankfurt em 1846 pelo advogado de Tübingen, August Ludwig, reinicializador, Friedrich Christoph Dahlmann, Georg Waitz e Johann Gustav Droysen falaram sobre a universibilidade de Schleswig-Holstein. Jacob Grimm falou sobre o 'valor das ciências imprecisas', seu irmão Wilhelm falou sobre o dicionário alemão. As conferências foram realizadas no Römer, em Frankfurt. Um segundo dia dos alemães se seguiu em Lübeck em 1847. O Terceiro Dia dos Germanistas, que deveria ocorrer em Nuremberg em 1848, não ocorreu devido à revolução de março."
 academics.3113.g: "A Alemanha é uma nação cultural."
 academics.3113.h: "Seus ideais liberais servem como um guia para nós."
 academics.3115.t: "Ajoelhando -se controvérsia"
 academics.3115.d: "Com as anexações das terras vizinhas na era napoleônica, a Baviera ganhou grandes territórios que eram protestantes. Nesse período, o rei promoveu um político mais tolerante em relação a seus súditos. Um exemplo foi o decreto, que os soldados protestantes não tinham que se ajoelhar em frente a uma missa ou procissão católica. No entanto, o ministro Karl von Abel propôs mudar isso."
 academics.3115.f: "A chamada disputa genuflectada ocorreu no reino da Baviera na primeira metade do século XIX. Começou com um decreto do ministro da Baviera Karl von Abel, que também exigia que os soldados protestantes genuflutos diante do Santíssimo Sacramento durante os serviços militares. O decreto ficou conhecido como o 'decreto ajoelhado'. Isso levou a um argumento acalorado na Câmara de Deputados que durou vários anos."
 academics.3115.g: "Somos um país católico e as pessoas se ajoelham aqui!"
 academics.3115.h: "Mas e quanto aos nossos compatriotas protestantes?"
