 academics.1010.t: "Estudando mulheres?" #NT!
 academics.1010.d: "Algumas mulheres se inscreveram para estudar em uma de nossas universidades. Agora, surgiu a questão se é legal para eles estudarem e qual é a posição oficial dos nossos governos no estudo das mulheres." #NT!
 academics.1010.f: ""O cérebro das mulheres não é feito para pensamentos lógicos, mas por emoções. Elas não devem estudar!" #NT!
 academics.1010.g: "Deixe -os estudar!" #NT!
 academics.1010.h: "Espere, eles não foram capazes de estudar até agora?" #NT!
 academics.1010.i: "As mulheres pertencem à lareira!" #NT!
  
 academics.1011.t: "Uma cientista brilhante" #NT!
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] se formou no topo de sua classe em uma de nossas universidades. Em um campo dominado por homens, ela conseguiu terminar seus estudos em tempo recorde e está ansioso para começar a trabalhar em seu campo. Ela é uma brilhante ..." #NT!
 academics.1011.f: "Meus sinceros parabéns a você por seu diploma incrível! Quem pensaria isso possível para uma mulher!" #NT!
 academics.1011.g: "...Engenheiro" #NT!
 academics.1011.h: "...Astrônomo" #NT!
 academics.1011.i: "...Naturalista" #NT!
 academics.1011.j: "...Paleontólogo" #NT!
 academics.1011.k: "...Arqueólogo" #NT!
 academics.1011.l: "...Antropólogo" #NT!
 academics.1011.m: "Não precisamos dela." #NT!
  
