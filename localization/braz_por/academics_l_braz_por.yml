 academics.109.f: ""
 academics.109.g: "Uma verdadeira estrela do rock!" #NT!
  
 academics.140.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro civil" #NT!
 academics.140.d: "Anos de trabalho em engenharia civil valeram a pena. Depois de construir muitas pontes e túneis, o Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] agora é considerado um verdadeiro [concept_gaudi_civil_engineer]. Isso certamente aumentará seus projetos!" #NT!
 academics.140.f: ""
 academics.140.g: "O engenheiro do nosso futuro!" #NT!
  
 academics.141.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro mecânico" #NT!
 academics.141.d: "Anos de trabalho com máquinas pagas. As muitas invenções e novas máquinas, que o Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] criou finalmente o deixou se tornar verdadeiro [concept_gaudi_mechanical_engineer]. Esperamos projetos mais surpreendentes!" #NT!
 academics.141.f: ""
 academics.141.g: "Um verdadeiro motor de progresso!" #NT!
  
 academics.142.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro militar" #NT!
 academics.142.d: "Anos de trabalho para os militares valeram a pena. Após a construção de fortalezas, construindo novas armas e equipando nossos soldados por anos, o Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] agora é considerado um [concept_gaudi_military_engineer] adequado. Espero que ele continue a servir nossa nação!" #NT!
 academics.142.f: ""
 academics.142.g: "Engenharia a base de nossas forças armadas!" #NT!
  
 academics.143.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro elétrico" #NT!
 academics.143.d: "Aproveitar o poder da eletricidade sempre foi um sonho do Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]. Após muitos avanços nessa área, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] agora é considerado um [concept_gaudi_electrical_engineer]." #NT!
 academics.143.f: ""
 academics.143.g: "Uma centelha de conhecimento!" #NT!
  
 academics.144.t: "Nosso engenheiro, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], agora é um engenheiro aeronáutico" #NT!
 academics.144.d: "Por muito tempo, os humanos sonhavam em voar. Agora que o voo começou, o Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] estava na vanguarda da engenharia aeronáutica. Após muitos avanços nessa área, [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] agora é considerado um [concept_gaudi_aeronautical_engineer]." #NT!
 academics.144.f: ""
 academics.144.g: "Para os céus!" #NT!
  
 notification_academics_yearly_experience_gain_notification_name: "Ganho de experiência anual acadêmica" #NT!
 notification_academics_yearly_experience_gain_notification_desc: "Todo acadêmico que pode obter experiência obteve #p 5#! Experiência." #NT!
  
 academics.1000.t: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] solicita financiamento" #NT!
 academics.1000.d: "Nosso [concept_gaudi_engineer], Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], está descontente com o financiamento do departamento [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis]. [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] solicita substancialmente mais fundos para a pesquisa [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis]." #NT!
 academics.1000.f: "§0 I, por outro lado, estou envolvido em pesquisas reais! Pesquisa com um benefício científico ... \ NMY Departamento deve receber mais financiamento! Atualmente, estou envolvido em um projeto que mudará nosso mundo! \ N[SCOPE.GetRootScope.GetCountry.GetCustom('academics_engineer_focus_custom_loc')] \ n \ nbut para conseguir isso, precisamos de financiamento adicional!" #NT!
 academics.1000.g: "Financiar sua pesquisa!" #NT!
 academics.1000.h: "Quem se importa com alguns engenheiros?" #NT!
 academics_additional_funding_engineer_modifier: "Financiamento adicional para engenheiros" #NT!
 academics_no_funding_engineer_modifier: "Sem financiamento para engenheiros" #NT!
  
 dubois_humanities_receive_promotion_loc: "Os invasores e necrófilos da tumba não contribuem nada para a nossa sociedade!" #NT!
 dubois_natural_history_receive_promotion_loc: "Por que os colecionadores de borboleta e os construtores de monstros recebem todo o financiamento e temos que passar com as sobras?" #NT!
 dubois_mathematics_receive_promotion_loc: "É absolutamente idiota que os Tinkerrers loucos e os Stargazers tenham todos os seus desejos lidos de seus lábios, enquanto temos que suportar as migalhas!" #NT!
  
 academics_engineer_focus_atmospheric_engine_loc: "Estamos tentando aproveitar o poder do vapor para substituir os trabalhadores por máquinas. Isso tornaria mais barato minerar por Ressources ou produzir coisas!" #NT!
 academics_engineer_focus_computer_loc: "Estamos tentando construir uma máquina que possa conduzir todos os tipos de cálculos. Isso tornaria os computadores humanos desnecessários. Poderíamos calcular tudo com a maior precisão e com nossos erros!" #NT!
 academics_engineer_focus_washing_machine_loc: "Nosso objetivo é criar uma máquina que possa lavar a roupa sem a necessidade de trabalho. Isso revolucionaria nossa sociedade, pois não teríamos que perder nosso tempo lavando nossa roupa suja!" #NT!
 academics_engineer_focus_lighter_loc: "Você pode imaginar o quão útil seria um pequeno isqueiro de bolso? Um que cria uma grande chama e pode acender velas ou cigarros? Esta é uma fortuna esperando para ser levantada!" #NT!
 academics_engineer_focus_rocket_loc: "Queremos criar um foguete capaz de alcançar o espaço. Imagine as aplicações militares desse foguete. Você poderia atingir seus inimigos e eles não poderiam fazer nada contra isso!" #NT!
 academics_engineer_focus_telephone_loc: "Imagine um dispositivo que você poderia usar para conversar com alguém em vastas distâncias! É nisso que estamos trabalhando em nosso laboratório agora!" #NT!
 academics_engineer_focus_combustion_engine_loc: "Os trens são ótimos, mas são enormes e precisam de trilhos. E se pudéssemos construir um pequeno motor capaz de impulsionar um veículo pequeno. Todos poderiam viajar por toda parte. Existem muitas aplicações úteis desse motor. E é exatamente nisso que minha equipe está trabalhando agora!" #NT!
 academics_engineer_focus_basic_research_alloys_loc: "Estamos conduzindo pesquisas básicas para encontrar o maior número possível de ligas úteis. Se encontrarmos as ligas certas que podem levar a melhores construções, máquinas e dispositivos mais eficientes que são considerados impossíveis agora!" #NT!
 academics_engineer_focus_basic_research_factory_machinery_loc: "Minha equipe está trabalhando para melhorar as máquinas usadas nas fábricas. Isso pode levar a um impulso maciço em nossa produção e à beira da nossa nação!" #NT!
 academics_engineer_focus_basic_research_housing_loc: "Estamos analisando a maneira mais eficiente de construir casas para criar espaço de vida barato. Isso poderia ajudar a população a pagar melhores condições de vida e aumentaria nosso setor de construção." #NT!
 academics_engineer_focus_basic_research_urban_planing_loc: "Nossas cidades não são eficientes o suficiente. Portanto, devemos descobrir como tornar as cidades mais eficientes para elevar o padrão de vida de nosso povo!" #NT!
  
 academics.1001.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] solicita financiamento" #NT!
 academics.1001.d: "Nosso [concept_verrier_astronomer], [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], solicita substancialmente mais fundos para o observatório [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] argumenta que, sem fundação adicional, a equipe [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] não poderá descobrir novos [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #NT!
 academics.1001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Nosso trabalho é importante para desvendar os mistérios do espaço e do tempo. Poderíamos encontrar tantas coisas ótimas se tivéssemos apenas dinheiro suficiente! \ Nas precisam de um telescópio moderno que nos permitiria ficar muito à frente de todos os outros países! É sobre prestígio nacional!" #NT!
 academics.1001.g: "Financie seu novo telescópio!" #NT!
 academics.1001.h: "O que mais? Eles não descobrirão mais nenhuma estrela?" #NT!
 academics_additional_funding_astronomer_modifier: "Financiamento adicional para astrônomos" #NT!
 academics_no_funding_astronomer_modifier: "Sem financiamento para astrônomos" #NT!
  
 academics.1002.t: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] solicita financiamento" #NT!
 academics.1002.d: "Nosso [concept_dubois_naturalist], [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName], quer conduzir uma expedição de pesquisa a uma parte selvagem do mundo, cheia de plantas e animais desconhecidos. Nessa região, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] espera descobrir muitos novos [concept_dubois_specimen]." #NT!
 academics.1002.f: "§0 I Por outro lado, tento encontrar todas as espécies do mundo! Isso pode ser muito importante no futuro, como você nunca sabe, como novas espécies o ajudarão. E imagine, eu poderia até nomear um novo animal ou planta depois de você! Isso não seria ótimo? \ Ni só precisava de fundos suficientes para conduzir esta expedição." #NT!
 academics.1002.g: "Financie sua expedição!" #NT!
 academics.1002.h: "Já temos espécies suficientes em casa." #NT!
 academics_additional_funding_naturalist_modifier: "Financiamento adicional para naturalista" #NT!
 academics_no_funding_naturalist_modifier: "Sem financiamento para naturalista" #NT!
  
 academics.1003.t: "Dr. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] solicita financiamento" #NT!
 academics.1003.d: "Nosso [concept_dubois_paleontologist], [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName], precisa urgentemente de fundos para seu museu de dinossauro. Isso permitiria que [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] exibisse mais [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] e [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] e, portanto, contribuíssem para a glória de nossa nação." #NT!
 academics.1003.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] \ NOUNDO, enquanto eu tenho um museu de prestígio, que mal posso pagar. Esses dinossauros são a maior maravilha do mundo e estão apenas reunindo poeira! Se eu tivesse fundos adequados, eu poderia expandir o museu e decorá -lo com novos esqueletos. Seria uma coleção fantástica que traria milhares de visitantes à nossa nação! Não é fundos, eu teria que demitir meus assistentes e quem sabe se eu saberia onde os dinossauros têm a cabeça sem a ajuda deles!" #NT!
 academics.1003.g: "Financie o museu!" #NT!
 academics.1003.h: "Em seguida, [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] quer financiamento para um parque Jurassic ou algo assim. Não, obrigado!" #NT!
 academics_additional_funding_paleontologist_modifier: "Financiamento adicional para paleontologista" #NT!
 academics_no_funding_paleontologist_modifier: "Sem financiamento para paleontologista" #NT!
  
 academics.1004.t: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] solicita financiamento" #NT!
 academics.1004.d: "Nosso [concept_lepsius_archaeologist], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName], precisa de fundos urgentemente para organizar outras expedições e escavações. Somente assim nossa nação pode acompanhar os outros poderes." #NT!
 academics.1004.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] \ NO NOUS PAÍSES ENVIAM NOVAS EXPEDIÇÕES TODO O MUNDO TODOS OS DIAS E PODENTE OS TELODOS ARCHOEOLÓGICOS, enquanto nosso museu permanece vazio. Isso é inaceitável! \ NMY As equipes precisam urgentemente de financiamento para acompanhar. E se perdermos o túmulo de um rei só porque não tivemos dinheiro suficiente? Imagine, nossos rivais celebrados por todo o mundo e nós sem nenhum sucesso!" #NT!
 academics.1004.g: "Dê a eles mais fundos!" #NT!
 academics.1004.h: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] só quer financiamento para [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] estilo de vida luxuoso!" #NT!
 academics_additional_funding_archaeologist_modifier: "Financiamento adicional para arqueólogo" #NT!
 academics_no_funding_archaeologist_modifier: "Sem financiamento para o arqueólogo" #NT!
  
 academics.1005.t: "Dr. [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] solicita financiamento" #NT!
 academics.1005.d: "Nosso [concept_lepsius_anthropologist], [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName], precisa de fundos urgentemente para organizar outras expedições e escavações. Somente assim nossa nação pode acompanhar os outros poderes." #NT!
 academics.1005.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] \ NO NOUS PAÍSES Focam em encontrar o link que falta mais antigo em nossa evolução, enquanto temos alguns ossos da Idade Média ... isso é inaceitável! Imagine os ossos do primeiro humano deitado em nosso país e depois sendo destruído por alguns trabalhadores que não se importam. Se não conseguirmos financiamento, não temos a chance de encontrar esses esqueletos! E se nossos rivais encontrarem o primeiro humano e provarem que seu país abriga a origem da humanidade?" #NT!
 academics.1005.g: "Dê a eles mais fundos!" #NT!
 academics.1005.h: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe] para forjar um pouco de crânio e se tornar famoso!" #NT!
 academics_additional_funding_anthropologist_modifier: "Financiamento adicional para antropólogo" #NT!
 academics_no_funding_anthropologist_modifier: "Sem financiamento para o antropólogo" #NT!
  
 academics.2001.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] nos pede para nos concentrarmos em pesquisar os céus" #NT!
 academics.2001.d: "Nossa nação ainda não tem muita pesquisa astronômica e nem temos uma cabeça [concept_verrier_astronomer]. Portanto, o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que criemos um novo gráfico de estrelas e nomeie um astrônomo principal." #NT!
 academics.2001.f: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] pede que você aumente seu compromisso com a astronomia. Tal foco nos permitiria obter novos conhecimentos sobre o céu e o universo." #NT!
 academics.2001.g: "Ad astra!" #NT!
 academics.2001.h: "Estrelas? Temos coisas melhores para fazer!" #NT!
 academics_unhappy_intelligentsia: "A sociedade científica está infeliz" #NT!
 academics.2001_goal_tt: "Você terá que descobrir #p 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] e obter um [concept_verrier_astronomer] em #n 10#! anos." #NT!
 academics.2001_reward_tt: "Como recompensa, seu astrônomo receberá #p 15 Experience#!, Além disso, a Intelligencia receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 3 anos." #NT!
  
 je_academics_find_more_stars: "Foco na astronomia: o gráfico de estrelas" #NT!
 je_academics_find_more_stars_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos [JournalEntry.GetGoalAddValue] Novo [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] para criar um novo gráfico de estrelas e nomear um novo chefe [concept_verrier_astronomer]. \ N \ também longe, encontramos [JournalEntry.GetGoalProgressValue] #b Objetos astronômicos #!." #NT!
 je_academics_find_more_stars_success: "Encontre #p 75#! Novo #b Objetos astronômicos #!" #NT!
 je_academics_find_more_stars_event_tt: "Nosso novo [concept_verrier_astronomer] apresentará o novo gráfico de estrelas" #NT!
 je_academics_find_more_stars_goal: ""
  
 academics.2002.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] apresenta um novo gráfico de estrelas" #NT!
 academics.2002.d: "Conseguimos criar um novo gráfico de estrelas e encontramos um novo chefe [concept_verrier_astronomer]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ficará satisfeito!" #NT!
 academics.2002.f: "\ "Este novo gráfico de estrelas é muito preciso! Eu o comparei com as de outras nações e a nossa é obviamente suprema. Além disso, encontramos muitas novas estrelas das quais algumas são bastante fascinantes! Este, por exemplo, tem mais luz vermelha do que normalmente ... \"" #NT!
 academics.2002.g: "Hurra!" #NT!
 academics_scientific_society_happy: "A sociedade científica está feliz" #NT!
  
 academics.2003.t: "Nosso foco na astronomia falhou!" #NT!
 academics.2003.d: "Não fomos capazes de focar o suficiente na astronomia para alcançar os objetivos dados pelo [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Eles não ficarão satisfeitos!" #NT!
 academics.2003.f: ""Parece que a guerra, a economia e até o vinho e o álcool são mais importantes para nossos líderes do que a ciência. Estamos desapontados. Espero que o foco de nossa grande nação retorneá à ciência em breve!"" #NT!
 academics.2003.g: "Que pitty!" #NT!
  
 academics.2004.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] solicita um novo gráfico de estrelas do nosso [concept_verrier_astronomer]" #NT!
 academics.2004.d: "De acordo com o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], nossa nação precisa se concentrar em examinar o céu. Eles solicitaram que o Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] encontrasse novas estrelas e outros [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] e para produzir um novo gráfico de estrelas." #NT!
  
 academics.2004_goal_tt: "Você terá que descobrir #p 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] em #n 10#! anos." #NT!
 academics.2004_reward_tt: "Como recompensa, seu astrônomo receberá #p 25 Experience#!, Além disso, o Intelligencia receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 3 anos." #NT!
  
 je_academics_create_star_chart: "Foco na astronomia: o gráfico de estrelas de nosso astrônomo" #NT!
 je_academics_create_star_chart_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] deseja que nosso [concept_verrier_astronomer] encontre [JournalEntry.GetGoalAddValue] novo [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] para criar um novo gráfico de estrelas." #NT!
 je_academics_create_star_chart_success: "Encontre #p 100#! Novo #b Objetos astronômicos #!" #NT!
 je_academics_create_star_chart_event_tt: "Nosso [concept_verrier_astronomer] apresentará o novo gráfico de estrelas." #NT!
 je_academics_create_star_chart_event_without_astronomer_tt: "Nosso novo gráfico de estrelas será publicado." #NT!
 je_academics_create_star_chart_failed_event_tt: "Nosso [concept_verrier_astronomer] não fornece o novo gráfico de estrelas." #NT!
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Depois de perder [concept_verrier_astronomer], deixaremos de fornecer um gráfico de estrelas." #NT!
 je_academics_create_star_chart_goal: ""
  
 academics.2005.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] apresenta um novo gráfico de estrelas" #NT!
 academics.2005.f: "O Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] estava cercado por seus colegas quando eles o brindaram." #NT!
  
 academics.2006.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] falhou!" #NT!
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] não conseguiu criar um novo gráfico de estrelas. Ele não foi capaz de encontrar estrelas suficientes e outros [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] para que valesse a pena. O restante do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] está extremamente decepcionado com seu fracasso." #NT!
 academics.2006.f: "Caro [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName], \ n \ n Notamos que você não conseguiu enviar um novo gráfico de estrelas, que mais uma vez mostra que você prefere, outras atividades, sobre a ciência. Infelizmente, isso refletirá mal em nossa sociedade. Esperamos melhor no futuro! \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2006.g: "Que pitty!" #NT!
  
 academics.2007.t: "Um novo gráfico de estrelas" #NT!
 academics.2007.d: "Infelizmente, na ausência de nosso antigo [concept_verrier_astronomer], o novo gráfico de estrelas foi apresentado no [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Os acadêmicos parecem estar muito felizes com o novo gráfico." #NT!
 academics.2007.f: "\ "Graças a este novo gráfico de estrelas, poderemos estudar o céu ainda melhor! Espero que encontremos muitas novas idéias sobre como esses corpos se movem! \ Não foi possível só graças ao [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]! A torrada para nós, senhores! \"" #NT!
  
 academics.2008.t: "Sem astrônomo, sem gráfico de estrela" #NT!
 academics.2008.d: "A perda de nosso [concept_verrier_astronomer] levou a menos descobertas de estrelas e outros [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], então esperamos. Portanto, não fomos capazes de encontrar o suficiente para criar um novo gráfico de estrelas. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] não está satisfeito com este resultado." #NT!
 academics.2008.f: """ Nosso governo não apenas perdeu seu brilhante astrônomo -chefe, eles também não foram capazes de apoiar suficientemente nossos astrônomos em seu trabalho. Resultando em muito menos observações. Isso significa que voltaremos em nossa pesquisa astronômica. É verdadeiramente horrível! \ """ #NT!
  
 academics.2009.t: "Precisamos encontrar mais estrelas do que [SCOPE.sCountry('rival_scope').GetName]" #NT!
 academics.2009.d: "Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão infelizes que [SCOPE.sCountry('rival_scope').GetName] descobriram mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que nossa nação. Eles nos pedem para encontrar mais #b objetos astronômicos #! no total que [SCOPE.sCountry('rival_scope').GetName] em 10 anos." #NT!
 academics.2009.f: "É uma pena que uma nação tão insignificante como [SCOPE.sCountry('rival_scope').GetName] tenha encontrado mais objetos astronômicos do que nós. Devemos ultrapassar esses astrônomos amadores não civilizados o mais rápido possível e encontrar mais objetos astronômicos em geral do que eles." #NT!
 academics.2009_goal_tt: "Você terá que descobrir mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que o seu rival, [SCOPE.sCountry('rival_scope').GetName], em #n 10#! anos. Eles têm [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], temos [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]." #NT!
 academics.2009_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e você receberá #p 10%#! mais prestígio por 4 anos." #NT!
 academics.2009.g: "Vamos vencê -los!" #NT!
 academics.2009.h: "Esta não é uma corrida espacial ..." #NT!
  
 academics_no_competition_with_rival: "Perdeu a corrida pelas estrelas" #NT!
 academics_competition_with_rival_won: "Ganhou a corrida pelas estrelas" #NT!
  
 je_academics_rivalry_for_stars: "Concentre -se na astronomia: a raça estrela" #NT!
 je_academics_rivalry_for_stars_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que o nosso rival [SCOPE.sCountry('target').GetName]. \ N \ nour #b Objetos astronômicos #!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+] \ n[SCOPE.sCountry('target').GetName] #b Objetos astronômicos §4 [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]" #NT!
 je_academics_rivalry_for_stars_success: "Você ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) tem mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])." #NT!
  
 academics.2010.t: "Ganhamos a corrida pelas estrelas" #NT!
 academics.2010.d_rival: "Descobrimos objetos mais astronômicos do que [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!" #NT!
 academics.2010.d_rival_gone: "Nosso rival na corrida pelas estrelas se foi. O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] e nossa população estão entusiasmados com esta vitória de nossa nação!" #NT!
 academics.2010.f: "Nós, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], estamos muito felizes com a nossa vitória científica sobre o nosso rival. Seus cientistas provaram estar presos na Idade da Pedra e incapazes de descobrir objetos mais astronômicos. Este é um ótimo dia para a nossa nação!" #NT!
  
 academics.2011.t: "Perdemos a corrida pelas estrelas" #NT!
 academics.2011.d: "Não conseguimos encontrar mais [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] do que [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão totalmente decepcionados." #NT!
 academics.2011.f: "Esse fracasso de nossa academia prova mais uma vez que o foco de nossa nação não está nos avanços científicos e científicos. Portanto, propomos interromper as hostilidades e esses planos de conquista mundial em favor da ciência." #NT!
  
 academics.2012.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] exige um [concept_verrier_observatory]" #NT!
 academics.2012.d: "Os membros de nosso [concept_academics_scientific_society] exigem que construímos um [concept_verrier_observatory] moderno em 10 ou menos anos. Isso nos permitiria realizar [concept_verrier_astronomy] e encontrar [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #NT!
 academics.2012.f: "Como hoje em dia toda nação é dona de um observatório, nós, membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], exigimos a construção de um observatório. Sem um observatório, nunca estaremos na vanguarda da ciência. Portanto, um observatório é claramente uma necessidade." #NT!
 academics.2012.g: "Eu preciso de nossos melhores arquitetos e engenheiros agora!" #NT!
 academics.2012.h: "Quem precisa de um observatório de qualquer maneira?" #NT!
 academics.2012_goal_tt: "Você terá que construir um [concept_verrier_observatory] em #n 10#! anos." #NT!
 academics.2012_reward_tt: "Como recompensa, a Intelligencia receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 5 anos, você também ganhará #p 5%#! partidários entre os acadêmicos." #NT!
  
 je_academics_build_observatory: "Foco na astronomia: construir um observatório" #NT!
 je_academics_build_observatory_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que construamos um [concept_verrier_observatory]. Para construir um observatório, precisamos ter pelo menos uma universidade e pesquisar #b astronomia moderna #! ou ter um [concept_verrier_astronomer]." #NT!
  
 academics.2013.t: "Novo observatório começa a observação" #NT!
 academics.2013.d: "Um novo [concept_verrier_observatory] abriu suas portas e começou a observar o céu. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão satisfeitos ... por enquanto." #NT!
 academics.2013.f: "Depois de construir um observatório, nossa nação agora finalmente pode explorar o céu noturno. Parabéns. Agora, na verdade, somos considerados um país cientificamente avançado. \ N \ nSigned, os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2013.g: "Vamos descobrir os mistérios do céu noturno!" #NT!
  
 academics.2014.t: "Um fracasso astronômico" #NT!
 academics.2014.d: "Não fomos capazes de construir um [concept_verrier_observatory]. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] estão profundamente decepcionados!" #NT!
 academics.2014.f: "A construção de um observatório deve ser uma coisa extremamente difícil, pois nossa nação não conseguiu fazê -lo em 10 anos! Nesse período, poderíamos ter encontrado um novo planeta centenas de estrelas ou calculado o movimento de muitos cometas. Mas sem um telescópio adequado, isso não é possível. Uma exibição vergonhosa. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2014.g: "Foi culpa do cometa!" #NT!
  
 academics.2015.t: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos planeta x" #NT!
 academics.2015.d: "Os membros de nossos [concept_academics_scientific_society] estão convencidos de que a descoberta do planeta X será o maior sucesso científico neste século. Eles nos pedem para nos concentrar em encontrar o planeta misterioso antes que mais alguém o faça .." #NT!
 academics.2015.f: "Ouvimos dizer que outras nações estão ansiosas para encontrar o Planeta X. Mas esse avanço pertence a nós sozinho! Temos que vencer todos os outros nesta tarefa colossal! \ N \ nSigned, o Conselho do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #NT!
 academics.2015.g: "Concentre todos os nossos relógios em encontrar esse planeta!" #NT!
 academics.2015.h: "Planeta X? Mais como o planeta y ..." #NT!
 academics.2015_goal_tt: "Você terá que encontrar #b Planet X#! antes de mais ninguém. Para ter a chance de descobri -lo, precisaremos de um [concept_verrier_astronomer] e #p 1500#! descobertos [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #NT!
 academics.2015_reward_tt: "Como recompensa, o Intelligencia receberá #p 5 Aproval#! e o custo para a tecnologia de produção será reduzido por #p 5%#! por 10 anos, você também ganhará #p 10%#! fielistas entre os acadêmicos e seu [concept_verrier_astronomer] ganhará #p 50#! [concept_academics_experience]." #NT!
  
 je_academics_find_planet_x: "Concentre -se na astronomia: Encontre o Planeta X" #NT!
 je_academics_find_planet_x_reason: "O [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] quer que encontremos o misterioso #o Planeta X#!. para ter uma chance de descobri -lo, precisaremos de um [concept_verrier_astronomer] e #p 1500#! descobertos [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #NT!
 je_academics_find_planet_x_complete_tt: "Descubra #o Planet X#! antes de mais ninguém." #NT!
 je_academics_find_planet_x_fail_tt: "Alguém mais descobriu #o Planet X#! antes de você." #NT!
  
 academics.2016.t: "Encontramos o planeta x" #NT!
 academics.2016.d: "Somos os primeiros a encontrar o Planeta X! Esperançosamente, isso agradará o [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]." #NT!
 academics.2016.f: "A carta foi rabiscada com fórmulas e diagramas estranhos. Havia manchas que pareciam alguém derramava um pouco de líquido sobre a carta e, se você precisar adivinhar, poderia jurar que havia descanso de caviar no papel também. Você não conseguia parar de se perguntar o que aconteceu aqui." #NT!
 academics.2016.g: "Esta é a descoberta astronômica mais importante do século!" #NT!
  
 academics.2017.t: "Estávamos atrasados ​​para encontrar o Planeta X" #NT!
 academics.2017.d: "Outra nação descobriu o planeta X diante de nós. Os membros do [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] são esmagados por esta derrota!" #NT!
 academics.2017.f: "Inaceitável. \ N \ nthe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]." #NT!
 academics.2017.g: "De qualquer forma, isso não é um planeta real!" #NT!
  
