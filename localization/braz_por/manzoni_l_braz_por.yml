 manzoni_writer_masterpiece_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] escreveu um artigo incrível no jornal que chamou a atenção de todos os leitores. Só por causa desse artigo, o jornal já está esgotado em menos de uma hora."
 manzoni_writer_good_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] publicou uma nova reportagem no jornal bastante cativante e interessante."
 manzoni_writer_mediocre_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] escreveu um novo artigo que não é realmente especial, mas também não é horrível. É um trabalho decente de jornalismo, mas que em breve será esquecido."
