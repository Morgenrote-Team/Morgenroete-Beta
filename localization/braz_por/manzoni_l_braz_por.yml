 manzoni.1205.t: "\"La Coscienza di Zeno\""
 manzoni.1205.d: "Aron Ettore Schmitz, mais conhecido pelo pseudônimo [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], foi um escritor e empresário italiano, autor de romances, peças de teatro e contos. Amigo próximo do romancista e poeta irlandês James Joyce, Svevo foi considerado um pioneiro do romance psicológico na Itália e é mais conhecido por seu romance modernista \"La Coscienza di Zeno\" ou \"A Consciência de Zeno\"\", que se tornou um clássico amplamente apreciado da literatura italiana Svevo também foi modelo para Leopold Bloom, o protagonista de Ulisses de Joyce."
 manzoni.1205.f: "\"Ao contrário de outras doenças, a vida é sempre fatal. Não tolera terapias. Seria como tapar os buracos que temos no corpo, acreditando que são feridas. Morreríamos de estrangulamento no momento em que fôssemos tratados.\" n- Italo Svevo, La Coscienza di Zeno"
 manzoni.1207.t: "\"A aventura de Pinóquio. História de um burattino\""
 manzoni.1207.d: "Carlo Lorenzini, mais conhecido como [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], foi um jornalista e escritor mais lembrado por sua história sobre o boneco Pinóquio que ganhou vida. \"As Aventuras de Pinóquio. História de uma Marionete\" apareceu pela primeira vez no 'Giornale dei Bambini' de 1880 como uma história em série antes de ser publicada em dois volumes em 1883. É sobre as aventuras travessas de uma marionete animada chamada Pinóquio e seu criador e figura paterna, um pobre entalhador chamado Gepeto."
 manzoni.1207.f: "\"A consciência é aquela voz mansa e delicada que as pessoas não ouvem.\"\n- Carlo Collodi, Le avventure di Pinocchio. História de um burattino"
 manzoni.1208.t: "\"Cuore\""
 manzoni.1208.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] foi um escritor e jornalista italiano que mais tarde ficou conhecido por sua literatura infantil. De Amicis era um patriota e lutou nas Guerras de Independência italianas, mas renunciou ao serviço porque estava desiludido com o exército. Como maçom declarado, De Amicis fez um esforço em suas obras para substituir o catolicismo profundo na alma italiana por virtudes seculares e compromisso com o Estado. Nos anos posteriores, as ideias socialistas tiveram uma influência formativa sobre ele."
 manzoni.1208.f: "\"Este livro é especialmente dedicado às crianças do ensino fundamental, entre 9 e 13 anos, e poderia ser intitulado: História de um ano escolar, escrita por um aluno da terceira série de uma escola municipal da Itália. Dizendo escrito por um aluno da terceira série, não quero dizer que ele realmente tenha escrito, como está impresso. Ele foi anotando gradualmente em um caderno, como sabia, o que tinha visto, ouvido, pensado, na escola e fora dela e seu pai, na escola; final do ano, escreveu estas páginas naquelas notas, tomando cuidado para não alterar seus pensamentos, e preservar, tanto quanto possível, as palavras de seu filho que então, 4 anos depois, já cursando o ensino médio, releu o manuscrito e. acrescentou algo de sua autoria, aproveitando sua memória ainda fresca das pessoas e das coisas. Agora leiam este livro, rapazes: espero que vocês fiquem felizes com ele e que ele lhes faça bem.\"\n- Edoardo de. Amicis, Cuore"
 manzoni.1208.h: "Que livro ótimo!"
 manzoni.1306.t: "\"Berlim Alexanderplatz\""
 manzoni.1306.d: "\"Berlin Alexanderplatz\" de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] conta a história do trabalhador Franz Biberkopf, que, após ser libertado da prisão, não consegue recuperar o equilíbrio na vida normal e volta ao crime. Biberkopf não luta apenas contra os demônios internos e externos, mas também contra a metrópole como tal, contra a qual ameaça perecer."
 manzoni.1306.f: "\"Você não deveria se preocupar com seu destino. Eu sou um oponente do destino. Não sou grego, sou berlinense.\"\n- Alfred Döblin, Berlim Alexanderplatz"
 manzoni.1306.g: "Uma obra inovadora do modernismo."
 manzoni.1403.t: "\"Le Pequeno Príncipe\""
 manzoni.1403.d: "Em \"Le Petit Prince\" ou \"O Pequeno Príncipe\" [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] permite que um pequeno príncipe de um pequeno planeta viaje para outros planetas onde conhece várias pessoas que são caricaturas de diferentes tipos de adultos. Em suas viagens o príncipe espera compreender o universo. Ele encontrará uma resposta para esta pergunta?"
 manzoni.1403.f: "\"Todos os adultos já foram crianças... mas poucos deles se lembram disso.\"\n- Antoine de Saint-Exupéry, Le Petit Prince"
 manzoni.1403.g: "Compreendendo o Universo? Isso parece impossível..."
 manzoni.1901.t: "\"Ulisses\""
 manzoni.1901.d: "\"Ulisses\" é um romance moderno escrito por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Nele, o autor leva o leitor a uma viagem por Dublin na qual Leopold Bloom, o protagonista, visita diversos lugares. Uma característica especial do romance é que ele mostra os pensamentos e associações das pessoas. Ele os descreve conforme passam pela cabeça da pessoa."
 manzoni.1901.f: "\"Eu era uma flor da montanha sim quando coloquei a rosa no cabelo como as andaluzas usavam ou devo usar um sim vermelho e como ele me beijou debaixo da muralha mourisca e eu pensei tão bem nele quanto em outro e então Eu perguntei a ele com meus olhos para perguntar de novo sim e então ele me perguntou se eu sim diria sim minha flor da montanha e primeiro eu coloquei meus braços em volta dele sim e puxei-o para mim para que ele pudesse sentir meus seios todo perfume sim e seu meu coração estava enlouquecido e sim, eu disse sim, vou sim.\"\n- James Joyce, Ulysses"
 manzoni.1901.g: "Este é um novo estilo de escrita interessante!"
 manzoni_company_basic_publishing_industries: "Publicação"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_singular: "Publicação"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_plural: "Publicação"
 manzoni.500.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], um escritor local está farto do nosso governo. [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe|U] decidi entrar na política para mudar a nossa nação para melhor. A questão é: devemos permitir isso?"
 manzoni.801.t: "Belas Ilustrações"
 manzoni.801.d: "Para [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] o trabalho mais recente, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] conseguiu convencer o pintor [SCOPE.sCharacter('klimt_painter_scope').GetFullName] a contribuir com algumas ilustrações. As primeiras ilustrações concluídas são incomparavelmente belas e emocionaram [SCOPE.sCharacter('manzoni_writer_scope').GetLastName]."
 manzoni.801.f: "\"This is a magnificent illustration! I wonder if the artist hid any small details that will tell us more about the story?\""
 manzoni.801.g: "Os detalhes são incríveis!"
 manzoni.801.h: "Isso se tornará um best-seller!"
 manzoni.801.h_tt: "Isso aumentará a chance de [GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetLastName] escrever um [concept_manzoni_bestseller]"
 manzoni.802.t: "Teorias sobre Vida Extraterrestre"
 manzoni.802.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], um escritor de ficção científica e nosso astrônomo Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] se reuniram para discutir a possibilidade de vida extraterrestre. Juntos, eles fizeram suposições sobre como seria esta vida e onde ela seria possível. Eles publicaram suas teorias como a Hipótese [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]-[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]."
 manzoni.802.f: "\"Obviamente, essas criaturas viveriam nos oceanos gasosos de um Gigante Gasoso. Eu presumiria que eles não poderiam se comunicar com o mundo exterior, mas e se encontrassem uma maneira que lhes permitisse colonizar novos Gigantes Gasosos? Poderíamos até ver uma revolução em uma dessas colônias!\""
 manzoni.802.g: "Talvez devêssemos procurar por extraterrestres?"
 manzoni.802.h: "Eles deveriam escrever um livro sobre suas teorias!"
 manzoni.802.i: "Fascinante!"
 manzoni.803.t: "As Aventuras de [SCOPE.sCharacter('manzoni_adventurer_scope').GetFullName]"
 manzoni.803.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] ouviu falar das aventuras do Dr. [SCOPE.sCharacter('manzoni_adventurer_scope').GetLastName] e decidiu se encontrar com [SCOPE.sCharacter('manzoni_adventurer_scope').GetHerHim] para uma entrevista. Eles conversaram por um longo tempo, o que levou [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] a ter muitas ideias para o próximo livro de [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]."
 manzoni.803.f: "\"Sim, agora que você mencionou isso, lembro que havia piratas! Na verdade, eles eram piratas com piranhas como animais de estimação!\""
 manzoni.803.g: "Espero que isso seja frutífero!"
 manzoni.804.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] inspirado em voo de balão"
 manzoni.804.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] levou nosso poeta [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] em um vôo de balão. Agora retornado, [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] parece inspirado na viagem."
 manzoni.804.f: "\"As nuvens pareciam um oceano branco e ver os pequenos humanos no chão. Foi incrível!\""
 manzoni.804.g: "Ah, a beleza do vôo!"
 manzoni.804.h: "Talvez [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] poemas agora melhorem!"
 manzoni.804.i: "O que eu daria para ser balonista!"
 manzoni.805.t: "Beleza das Montanhas"
 manzoni.805.d: "Juntamente com o conhecido montanhista [SCOPE.sCharacter('mountaineer_scope').GetFullName], [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] fez um passeio por uma montanha. A subida foi difícil, mas uma vez no pico, [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] ficou maravilhado com a vista"
 manzoni.805.f: "“Rodeado por um mar de neblina que só é interrompido por alguns picos, contemplei o sol nascente. Uma vista maravilhosa."
 manzoni.805.g: "As montanhas inspiraram muitos poetas!"
 manzoni.805.h: "Espero que o ar da montanha ajude [SCOPE.sCharacter('manzoni_writer_scope').GetHerHim] a escrever poemas melhores!"
 manzoni.805.i: "Talvez ele devesse se tornar um montanhista [SCOPE.sCharacter('manzoni_writer_scope').GetHerselfHimself]?"
 manzoni.1003.t: "\"Ilha do Tesouro\""
 manzoni.1003.d: "\"Treasure Island\", escrito por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], é a jornada de Jim Hawkins, um menino, em sua busca para encontrar um tesouro. Junto com o Dr. Livesey e o escudeiro John Trelawney eles viajam para a ilha em um navio. Mas acontece que a maioria da tripulação são piratas que querem matar o resto da tripulação para ficar com o tesouro para si. Jim sobreviverá a esta aventura?"
 manzoni.1003.f: "\"Esse era o tesouro de Flint que havíamos vindo tão longe em busca, e que já havia custado a vida de dezessete homens da Hispaniola. Quanto custou na acumulação, que sangue e tristeza, que bons navios afundaram nas profundezas , que homens corajosos caminhando sobre a prancha com os olhos vendados, que tiro de canhão, que vergonha, mentiras e crueldade, talvez nenhum homem vivo pudesse dizer.\"\n- Robert Louis Stevenson, Ilha do Tesouro"
 manzoni.1003.g: "Arr!"
 manzoni.1004.t: "\"Frankenstein; ou, O Prometeu Moderno\""
 manzoni.1004.d: "\"Frankenstein; ou, The Modern Prometheus\", de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] é um romance em que o Dr. Frankenstein tenta ressuscitar um ser feito de partes do corpo. Graças ao raio ele consegue reanimar o corpo. Assim que o monstro volta à vida, o Dr. Frankenstein não consegue suportar a feiúra do monstro e o deixa entregue ao seu destino. A face do monstro espalha medo e terror entre os moradores e assim a criatura bem-humorada começa a sucumbir à solidão."
 manzoni.1004.f: "\"Mesmo com o espírito quebrantado como está, ninguém pode sentir mais profundamente do que ele as belezas da natureza. O céu estrelado, o mar e todas as vistas proporcionadas por essas regiões maravilhosas parecem ainda ter o poder de elevar sua alma da terra. Tal homem tem uma existência dupla: ele pode sofrer miséria e ser dominado por decepções, mas, quando se retirar para si mesmo, será como um espírito celestial que tem uma auréola ao seu redor, em cujo círculo não há sofrimento; ou empreendimentos insensatos.\"\n- Mary Shelley, Frankenstein; ou, O Prometeu Moderno"
 manzoni.1004.g: "Trazer de volta a morte, não seria legal?"
 manzoni.1005.t: "\"Alice no País das Maravilhas\""
 manzoni.1005.d: "Em “Alice no País das Maravilhas”, a jovem Alice desce pela toca do coelho e se encontra em um mundo estranho. O livro escrito por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] apresenta criaturas fabulosas e regras estranhas criadas por adultos. a história ridiculariza o mundo moralista da era vitoriana."
 manzoni.1005.f: "\"Se eu tivesse um mundo próprio, tudo seria um absurdo. Nada seria o que é, porque tudo seria o que não é. E, ao contrário, o que é, não seria. E o que seria não seria, entende?\"\n- Lewis Carroll, Alice no País das Maravilhas"
 manzoni.1005.g: "Que terra interessante!"
 manzoni.1006.t: "\"Ursinho Pooh\""
 manzoni.1006.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] escreveu “Winnie-the-Pooh” inspirado em seu filho Christopher Robin e seus bichinhos de pelúcia. É uma coleção de contos focados no urso Winnie the Pooh e seus amigos. Nele Pooh vivencia diversas aventuras."
 manzoni.1006.f: "\" \"Bem\", disse Pooh, \"o que eu mais gosto\", e então ele teve que parar e pensar. Porque embora Comer Mel fosse uma coisa muito boa de se fazer, houve um momento logo antes de você começar a fazer isso. coma o que estava melhor do que quando você estava, mas ele não sabia como se chamava.\"\n- A.A. Milne, Ursinho Pooh"
 manzoni.1006.g: "Um ursinho de pelúcia como amigo parece maravilhoso!"
 manzoni.1007.t: "\"O misterioso caso de Styles\""
 manzoni.1007.d: "\"O Misterioso Caso de Styles\" é um romance policial de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Apresenta o personagem Hercule Poirot, um belga que se mudou para a Inglaterra e tem que solucionar o assassinato da Sra. Inglethorp com quem mora atualmente. Poirot apareceria mais tarde em um total de 33 romances de [SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting]."
 manzoni.1007.f: "\"Você deu muita rédea solta à sua imaginação. A imaginação é uma boa serva e uma péssima dona. A explicação mais simples é sempre a mais provável.\"\n- Agatha Christie, The Mysterious Affair at Styles"
 manzoni.1007.g: "Será que verei Hercule Poirot novamente?"
 manzoni.1008.t: "\"O livro da Selva\""
 manzoni.1008.d: "\"The Jungle Book\" é um livro infantil escrito por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Seu tema principal é o abandono e o acolhimento refletido por Mowgli, um menino que foi deixado no deserto e criado por lobos. Outra faceta importante do livro é a lei da selva que os animais da selva seguem. O livro ensina as crianças a conhecerem o seu lugar e a cumprirem as regras e a lei."
 manzoni.1008.f: "\"Uma das belezas da Lei da Selva é que a punição acerta todas as contas. Não há nenhuma reclamação depois.\"\n- Rudyard Kipling, The Jungle Book"
 manzoni.1008.g: "Procure as necessidades básicas!"
 manzoni.1009.t: "\"O Conto de Pedro Coelho\""
 manzoni.1009.d: "“O Conto de Peter Rabbit” é a história de Peter Rabitt que entra no jardim do Sr. McGregor e posteriormente o persegue. A história escrita por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] é radical e inovadora para um livro infantil com muitas inovações que antes não eram comuns na literatura infantil."
 manzoni.1009.f: "\"Era uma vez quatro coelhinhos, e seus nomes eram - Flopsy, Mopsy, Cottontail e Peter.\"\n- Beatrix Potter, The Tale of Peter Rabbit"
 manzoni.1009.g: "Entrar em um jardim proibido parece interessante!"
 manzoni.1010.t: "\"Para o Farol\""
 manzoni.1010.d: "\"To the Lighthouse\" é um romance modernista escrito por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Ele retrata o feriado da família Ramsey na Ilha de Skye e é escrito com foco em pensamentos e observações, em vez de diálogos e ações."
 manzoni.1010.f: "\"Qual é o sentido da vida? Isso era tudo - uma pergunta simples; uma pergunta que tendia a se fechar com o passar dos anos, a grande revelação nunca havia acontecido. A grande revelação talvez nunca tenha acontecido. Em vez disso, ocorreram pequenos milagres diários , iluminações, fósforos acesos inesperadamente no escuro; aqui estava um.\"\n- Virginia Woolf, To the Lighthouse;"
 manzoni.1010.g: "Famílias..."
 manzoni.1307.t: "\"Buddenbrooks: Verfall einer Familie\""
 manzoni.1307.d: "“Buddenbrooks: Verfall einer Familie” ou “Buddenbrooks: O Declínio de uma Família” é o primeiro romance social em língua alemã. Nele, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] descreve o declínio de uma rica família de comerciantes ao longo de quatro gerações na cidade hanseática de Lübeck."
 manzoni.1307.f: "\"Frequentemente, os sinais e símbolos materiais externos e visíveis de felicidade e sucesso só se mostram quando o processo de declínio já se instalou. As manifestações externas levam tempo - como a luz daquela estrela lá em cima, que na realidade pode já estar apagada, quando parece estar brilhando mais forte.\"\n- Thomas Mann, Buddenbrooks"
 manzoni.1307.g: "Espero que minha família não esteja em declínio."
 manzoni.1404.t: "\"La Dame aux Camélias\""
 manzoni.1404.d: "\"La Dame aux Camélias\" ou \"A Dama das Camélias\" é uma história de amor da própria vida de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Nele, o amor eterno entre Armand e a cortesã Marguerite é interrompido pelo pai de Armand, que está preocupado que o relacionamento de seu filho possa destruir as chances de casamento de sua filha. Portanto, ele a convence a deixar Armand. Ele algum dia descobrirá sobre isso?"
 manzoni.1404.f: "\"Seu deleite pelas menores coisas era como o de uma criança. Havia dias em que ela corria no jardim, como uma criança de dez anos, atrás de uma borboleta ou de uma libélula. Essa cortesã que custara mais dinheiro em buquês do que teria mantido uma família inteira no conforto, às vezes sentava-se na grama por uma hora, examinando a simples flor cujo nome ela levava.\"\n- Alexandre Dumas Fils, La Dame aux Camélias"
 manzoni.1404.g: "Ah, amor que nunca morre!"
 manzoni.1405.t: "“Madame Bovary”"
 manzoni.1405.d: "\"Madame Bovary\" é uma história realista escrita por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Nele, Emma Bovary fica entediada com sua vida na zona rural da França e com seu marido e começa a se envolver em aventuras românticas com outros homens. Ela também gasta muito mais dinheiro do que gasta e fica cada vez mais endividada. Ela será capaz de pagar sua dívida?"
 manzoni.1405.f: "\"No fundo do coração, porém, ela esperava que algo acontecesse. Como marinheiros naufragados, ela voltou os olhos desesperados para a solidão de sua vida, procurando ao longe alguma vela branca nas brumas do horizonte. Ela não o fez. saberia qual seria essa oportunidade, que vento a traria, para que margem a levaria, se seria uma chalupa ou uma de três andares, carregada de angústia ou cheia de felicidade até as vigias Mas todas as manhãs, como. ela acordou, esperou que chegasse naquele dia; ouviu cada som, levantou-se sobressaltada, imaginou que não chegasse então, ao pôr do sol, cada vez mais triste, ansiava pelo amanhã. Flaubert, Madame Bovary"
 manzoni.1405.g: "Este livro é um pouco... estranho."
 manzoni.1406.t: "\"Boule de Suif\""
 manzoni.1406.d: "\"Boule de Suif\" é um conto de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Quando os prussianos ocupam partes da Normandia, um grupo de franceses foge de suas casas, mas acidentalmente entra nos territórios ocupados e fica detido por tempo indeterminado. Então Boule de Suif (Dumpling), uma prostituta entre os viajantes, explica que o oficial alemão só os deixará ir depois de fazer sexo com eles. No início os outros viajantes apoiam Boule de Suif, mas depois de alguns dias isso muda..."
 manzoni.1406.f: "\"Os habitantes da cidade, em seus quartos escuros, estavam atordoados, como se por algum cataclismo, algum terremoto devastador, contra o qual toda sabedoria e toda resistência fossem inúteis. Tal sentimento é produzido toda vez que a ordem estabelecida das coisas é perturbada, quando a segurança é destruído e tudo até então protegido pelas leis do homem ou da natureza fica subitamente à mercê de uma brutalidade selvagem e irracional.\"\n- Guy de Maupassant, Boule de Suif"
 manzoni.1406.g: "Para costurar seu próprio salvador assim..."
 manzoni.1407.t: "\"Arsène Lupin, cavalheiro cambrioleur\""
 manzoni.1407.d: "Em \"Arsène Lupin, cavalheiro-cambrioleur\" ou \"Arsène Lupin, cavalheiro ladrão\" há uma coleção de contos apresentando o cavalheiro ladrão Arsène Lupin. As histórias criadas por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] retratam como Lupin primeiro é preso, depois foge da prisão e na última história tem que enfrentar Sherlock Holmes."
 manzoni.1407.f: "\"Que pena que não sou um homem honesto!\"\n- Maurice Leblanc, Arsène Lupin, cavalheiro-cabrioleur"
 manzoni.1407.g: "Gostaria de saber quem é melhor, Sherlock Holmes ou Arsène Lupin?"
 manzoni.1408.t: "\"À la recherche du temps perdu\""
 manzoni.1408.d: "\"À la recherche du temps perdu\" ou \"Em busca do tempo perdido\" segue as lembranças do narrador sobre a infância e as experiências da idade adulta no final do século XIX e início do século XX, na França da alta sociedade. O autor, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], usa especialmente a memória involuntária como dispositivo de enredo."
 manzoni.1408.f: "\"Os laços entre nós e outra pessoa existem apenas em nossas mentes. A memória, à medida que se torna mais fraca, os afrouxa, e apesar da ilusão pela qual queremos ser enganados e que, por amor, amizade, polidez, deferência, dever, nós enganamos os outros, existimos sozinhos. O homem é a criatura que não consegue escapar de si mesmo, que conhece os outros apenas em si mesmo e quando afirma o contrário está mentindo.\"\n- Marcel Proust, À la recherche du temps. perdido"
 manzoni.1408.g: "Esse livro me lembra uma coisa..."
 manzoni.1409.t: "\"La Petite Fadette\""
 manzoni.1409.d: "Em \"La Petite Fadette\" ou \"Little Fadette\" dois irmãos gêmeos de uma conhecida família de agricultores se apaixonam por Fadette. No início, o relacionamento deles desafia as normas e expectativas patriarcais da aldeia, mas quando Fadette herda uma fortuna, tudo muda. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] utiliza as suas origens rurais para descrever com precisão a aldeia e os seus habitantes."
 manzoni.1409.f: "\"Deus abandona apenas aqueles que se abandonam, e quem tem a coragem de calar a sua tristeza dentro do seu próprio coração é mais forte para lutar contra ela do que aquele que reclama.\"\n- George Sand, La Petite Fadette"
 manzoni.1409.g: "Jovens inteligentes!"
 manzoni.1501.t: "\"Cabine do tio Tom\""
 manzoni.1501.d: "\"Uncle Tom's Cabin\" de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] é um livro que retrata os males e horrores da escravidão. Ele retrata as vidas de vários escravos, que são caracterizadas pela miséria e sofrimento."
 manzoni.1501.f: "\"...o coração não tem lágrimas para dar, - ele derrama apenas sangue, sangrando em silêncio.\"\n- Harriet Beecher Stowe, Cabana do Tio Tom"
 manzoni.1501.g: "Isso parece horrível!"
 manzoni.1502.t: "\"Ben-Hur: Um Conto de Cristo\""
 manzoni.1502.d: "Em “Ben-Hur: Um Conto de Cristo”, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] retrata a vida de Judah Ben Hur, um príncipe judeu que é escravizado pelos romanos e se torna cocheiro. A história reflete a vida de Jesus."
 manzoni.1502.f: "\"É mais bonito confiar em Deus. O belo neste mundo vem de suas mãos, declarando a perfeição do gosto; ele é o autor de todas as formas; ele veste o lírio, ele pinta a rosa, ele destila a gota de orvalho , ele faz a música da natureza; em uma palavra, ele nos organizou para esta vida, e impôs suas condições; e elas são uma garantia para mim que, confiante como uma criança, deixo para ele a organização de minha Alma, e todos os arranjos para a vida após a morte, eu sei que ele me ama.\"\n- Lew Wallace, Ben-Hur: A Tale of the Christ."
 manzoni.1502.g: "Um verdadeiro cristão!"
 manzoni.1503.t: "\"Moby-Dick; ou, A Baleia\""
 manzoni.1503.d: "\"Moby-Dick; or, The Whale\" de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] mostra a obsessão do Capitão Ahab por uma baleia branca na perspectiva do jovem marinheiro Ishmael. Depois que a baleia morde a perna de Ahab até o joelho, Ahab conhece apenas um propósito na vida: vingança."
 manzoni.1503.f: "“Sempre que me vejo ficando sombrio; sempre que há um novembro úmido e chuvoso em minha alma; sempre que me vejo parando involuntariamente diante de armazéns de caixões e cuidando da retaguarda de todos os funerais que encontro; e especialmente sempre que minha hipoglicemia obter uma vantagem tão grande sobre mim, que é necessário um forte princípio moral para me impedir de pisar deliberadamente na rua e tirar metodicamente o chapéu das pessoas - então, considero que é hora de ir para o mar o mais rápido que puder. \"\n- Herman Melville, Moby-Dick; ou, a baleia"
 manzoni.1503.g: "Qual é a minha baleia?"
 manzoni.2100.t: "\"Tang Thương Ngẫu Lục\""
 manzoni.2100.d: "\"Tang Thương Ngẫu Lục - Registros Arbitrários de Tristeza\" é uma coleção de histórias de Pham Dinh Ho e Nguyen An, registrando eventos religiosos e sociais do Vietnã do final do século XVIII e início do século XIX. Com um total de 89 contos, separados em dois livros, Superior e Inferior, o acervo inclui contos de grandes povos, viagens cênicas, relíquias históricas e até lendas locais. Os registros fornecem uma visão única da vida no Vietnã durante a era tumultuada do final da dinastia Le e do início da dinastia Nguyen."
 manzoni.2100.f: "De Ly, Tran, Le, Trinh até hoje, depois de centenas de anos, não existem histórias nem documentadas por historiadores oficiais nem lembradas por lendas locais; assim, os dois homens decidiram coletá-los no reino das mudanças dolorosas. Se ambos considerassem essas histórias tristes e, portanto, decidissem esquecê-las, mais cedo ou mais tarde seriam esquecidas. Felizmente, ao escrever essas histórias, elas podem servir como a jangada que nos livra da costa delirante, como a luz que ilumina a escuridão, chamada Tang Thương Ngẫu Lục - Registros Arbitrários de Tristeza, o significado pode assim ser percebido."
 manzoni.2100.g: "Contos de uma época mais sombria, devemos nos esforçar para sermos melhores."
 manzoni.2200.t: "Um duelo por honra"
 manzoni.2200.d: "Depois de [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] ter enviado uma carta altamente insultuosa a Georges d'Anthès, suposto admirador de sua esposa, este o desafiou para um duelo. Agora chegou a hora dos dois se enfrentarem."
 manzoni.2200.f: "\"As regras do duelo estipulam que os dois oponentes se alinhem a uma distância acordada. Suas costas devem estar voltadas para o oponente. Ao sinal, os dois duelistas se viram e caminham um em direção ao outro. Eles decidem quando atirar. Quem atirar primeiro deve ficar parado no mesmo lugar.\nVocês dois concordam com essas regras?\""
 manzoni.2200.g: "Espero que ele sobreviva!"
 manzoni.2200.h: "Espero que esse encrenqueiro morra!"
 manzoni.2201.t: "\"Prestupleniye i nakazaniye\""
 manzoni.2201.d: "\"Prestupleniye i nakazaniye\" ou \"Crime e Castigo\" de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] segue a angústia mental e os dilemas morais de Rodion Raskolnikov, um ex-estudante empobrecido em São Petersburgo que planeja matar um penhorista sem escrúpulos, uma velha que armazena dinheiro e objetos valiosos em seu apartamento."
 manzoni.2201.f: "\"Dor e sofrimento são sempre inevitáveis ​​para uma grande inteligência e um coração profundo. Os homens realmente grandes devem, eu acho, ter grande tristeza na terra.\"\n- Fjodor Dostoevsky, Prestupleniye i nakazaniye"
 manzoni.2201.g: "Ainda bem que não devo nada!"
 manzoni.2202.t: "\"Voyna, eu mir\""
 manzoni.2202.d: "“Voyna i mir” ou “Guerra e Paz” de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] segue vários personagens de diversas origens, de camponeses a nobres. O livro se passa durante as Guerras Napoleônicas que mudam a vida dos três personagens principais do livro."
 manzoni.2202.f: "\"Não é dado às pessoas julgar o que é certo ou errado. As pessoas sempre se enganaram e se enganarão, e em nada mais do que naquilo que consideram certo e errado.\"\n- Leo Tolstoy, Voyna i mir"
 manzoni.2202.g: "Uma verdadeira obra-prima! Só um pouco longo..."
 manzoni.2300.t: "\"Tōsei Shosei Katagi\""
 manzoni.2300.d: "“Tōsei Shosei Katagi” ou “Retratos de Estudantes Contemporâneos” de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] é um dos primeiros romances modernos do Japão. Junto com um \"Shōsetsu Shinzui\", uma crítica que ele escreveu, esses livros ajudaram a tornar romances e dramas mais aceitos no Japão."
 manzoni.2300.f: ""
 manzoni.2300.g: "Agora o Japão também terá romances!"
 manzoni.2400.t: "\"Memórias Postumas de Brás Cubas\""
 manzoni.2400.d: "Em \"Memórias Posthumas de Braz Cubas\" ou \"Memórias Póstumas de Brás Cubas\" [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] permite ao protagonista Brás Cubas relatar sua vida após sua morte. Isso permite que Cubas critique a sociedade brasileira. É o primeiro livro realista de Machado e alguns personagens e elementos são retomados em livros posteriores."
 manzoni.2400.f: "\"Ao verme que primeiro roeu a carne fria do meu cadáver, dedico com terna lembrança estas Memórias Póstumas.\"\n- Machado de Assis, Memórias Posthumas de Braz Cubas"
 manzoni.2400.g: "Ser criticado por um homem morto!"
 manzoni.2401.t: "\"Iracema\""
 manzoni.2401.d: "\"Iracema\" é uma história de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] que tenta mostrar como surgiu o primeiro brasileiro. É a história da indígena Iracema e do colono português Martim que mais tarde tiveram um filho chamado Moacir. O título do livro é um anagrama para a América, um título condizente com o tema da colonização."
 manzoni.2401.f: "\"Verdes mares selvagens da minha terra natal, onde canta a jandaia nas folhas da carnaúba.\"\n- José de Alencar, Iracema"
 manzoni.2401.g: "Uma história para criar uma nação..."
 manzoni.2402.t: "\"O Cortiço\""
 manzoni.2402.d: "\"O Cortiço\" ou \"A Favela\" é romance naturalista de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Nele [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] retrata a vida de vários portugueses e outros imigrantes em uma favela. Essas pessoas se adaptam e mudam em sua nova casa."
 manzoni.2402.f: "“E naquela terra encharcada e fumegante, naquela umidade quente e lamacenta, um mundo começou a vermes, a brotar, a crescer, uma coisa viva, uma geração, que parecia surgir espontaneamente, ali mesmo, daquela lama, e multiplicam-se como vermes no estrume.\"\n- Aluísio Azevedo, O Cortiço"
 manzoni.2402.g: "Como podemos permitir que tais favelas existam?"
 manzoni.2500.t: "\"Kuángrén Rìjì\""
 manzoni.2500.d: "\"Kuángrén Rìjì\" ou \"Diário de um Louco\" é uma história chinesa moderna escrita principalmente em chinês vernáculo por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Nele o irmão do narrador enlouquece cada vez mais. Ele suspeita que as pessoas sejam canibais e tenta forçá-lo a cometer suicídio."
 manzoni.2500.f: "\"Eu sabia que naquela risada havia coragem e integridade. Tanto o velho quanto meu irmão empalideceram, impressionados com minha coragem e integridade.\"\n- Xun Lu, Kuángrén Rìjì"
 manzoni.2500.g: "Pelo menos não há canibais ao meu redor!"
