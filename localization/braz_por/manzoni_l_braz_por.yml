 manzoni.1000.t: "\"Um Estudo em Vermelho\" por Arthur Conan Doyle"
 manzoni.1000.d: "Um detetive resolvendo crimes aplicando a lógica e sua mente. Este Sherlock Holmes é um personagem fascinante. Que conceito interessante surgiu com Arthur Conan Doyle."
 manzoni.1000.f: "\"Era mais fácil saber do que explicar por que eu sei. Se lhe pedissem para provar que dois mais dois são quatro, você poderia encontrar alguma dificuldade, mas ainda assim teria certeza do fato.\" Arthur Conan Doyle, Um estudo em escarlate"
 manzoni.1000.a: "Elementar meu caro Watson."
 manzoni.1100.g: "Eu queria poder morar nos Alpes!"
 manzoni.1101.g: "Estou julgando as pessoas pela aparência ou pela personalidade?"
 manzoni.1102.g: "Talvez eu pudesse encontrar realização se ouvisse figuras de autoridade também?"
 manzoni.1103.g: "O meu lobo interior também está a rugir?"
 manzoni.1104.g: "Posso ler mais Bandes Desinées?"
 manzoni.1200.t: "\"I prometsi sposi\" por Alessandro Manzoni"
 manzoni.1200.d: "\"I promessi sposi\" (Os noivos) é um romance histórico italiano de Alessandro Manzoni, publicado pela primeira vez em 1827, em três volumes. Foi o primeiro romance histórico italiano, um modelo para a ficção literária italiana subsequente e uma base para a língua italiana moderna. No início do século 19, ainda havia alguma controvérsia sobre qual deveria ser a forma que a linguagem literária padrão da Itália deveria assumir. Manzoni - originalmente de Milão - era firmemente a favor do dialecto de Florença e, depois de \"lavar o seu vocabulário nas margens do Arno\" (como ele disse), revisou a linguagem do romance para a sua republicação em 1842."
 manzoni.1200.f: "Ambientado no norte da Itália em 1628, o romance é sobre dois jovens, Renzo e Lúcia, que vivem em um vilarejo às margens do Lago Como e querem se casar, mas são impedidos e perseguidos pelo senhor feudal local, que está de olho em Lúcia. , razão pela qual eles têm que fugir da sua aldeia. Muitas expressões, citações e nomes do romance ainda são comumente usados ​​em italiano, como Perpetua (que significa empregada doméstica de um padre) ou 'Questo matrimonio non s'ha da fare' ('Este casamento não deve ser realizado', usado ironicamente ) e ainda é considerada uma verdadeira obra-prima da literatura mundial. Como o livro se passa durante o período da ocupação espanhola, \"I promessi sposi” tem sido frequentemente interpretado como um ataque oculto contra o domínio austríaco na Itália do século XIX."
 manzoni.1200.g: "Quem se importa com um romance italiano bobo?"
 manzoni.1200.h: "O auge da cultura italiana!"
 manzoni.1202.t: "\"La Ginestra\" de Giacomo Leopardi"
 manzoni.1202.d: "Giacomo Leopardi criou uma obra poética notável e renomada, relacionada à época romântica. Juntamente com Alessandro Manzoni, Leopardi teve uma influência imensa na língua italiana e foi uma figura de proa dos movimentos patrióticos na Itália, mesmo que tivesse reservas quanto ao nacionalismo e à crença no progresso. Escreveu frequentemente sobre poesia em geral e sobre a sua própria ideia de poesia, da sua linguagem e âmbito. Leopardi morreria em 1837, com apenas 38 anos."
 manzoni.1202.f: "\"La Ginestra\" (A Vassoura) é o penúltimo poema lírico de Giacomo Leopardi. Abre com a descrição das encostas do Vesúvio, o vulcão que em 79 DC. irrompeu, semeando destruição e morte onde antes existiam vilas, jardins e cidades grandes e prósperas. A partir deste momento, o poeta recorre à vassoura, que se torna interlocutora privilegiada do seu discurso poético: abandonando-se à memória, Leopardi conta à flor que já a viu no campo deserto. A vassoura é, portanto, considerada um símbolo de beleza e resistência diante da devastação. Mas até a vassoura terá que se curvar diante do inevitável em algum momento, com o qual o poema enfatiza a transitoriedade da existência humana em contraste com as forças da natureza. Ao fazê-lo, Leopardi zomba da ideia de os humanos dominarem a natureza ou colocarem a riqueza material e o poder acima de ideais mais elevados."
 manzoni.1202.g: "Que melancólico."
 manzoni.1203.t: "\"Rime Nuove\" de Giosuè Carducci"
 manzoni.1203.d: "Giosuè Carducci foi considerado o poeta nacional oficial da Itália moderna, fazendo parte da vida cultural e política geral. Carducci foi um conferencista popular e um crítico feroz da literatura e da sociedade. Suas coleções \"Rime Nuove\" (Novas Rimas) e Odi Barbare (Odes Bárbaras) contêm suas maiores obras. Ele também traduziu algumas obras de Goethe e Heine para o italiano. Um ano antes de sua morte, Carducci tornou-se o primeiro italiano a ganhar o Prêmio Nobel de Literatura."
 manzoni.1203.f: "Na coleção \"Rime Nuove”, que é precedida por um Intermezzo, são capturados os ecos e motivos de Hugo, von Platen, Goethe, Heine, Baudelaire e Poe. Nele, os conteúdos e as formas derivam em grande parte de escritos anteriores, mas são mais aprofundados e maduros. Entre os temas que emergem no \"Rime Nuove\", um lugar importante é ocupado pelo culto ao passado e às memórias históricas onde o sonho da criação de uma sociedade igualitária e liberal se faz sentir sobretudo através da exaltação da época dos municípios que são tomados como exemplo de saúde moral e de vida civil. Outro exemplo de expansão democrática dado por Carducci é a Revolução Francesa, que é relembrada nos doze sonetos do 'Ça ira'."
 manzoni.1203.g: "Mas você pode confiar em um homem que escreve um hino satânico?"
 manzoni.1204.t: "\"Myricae\" por Giovanni Pascoli"
 manzoni.1204.d: "Giovanni Pascoli estudou na Universidade de Bolonha, onde seu professor e mentor foi Giosuè Carducci. Pascoli, mesmo num período de positivismo e ciência, acreditava que a vida é um mistério. Somente associações simbólicas descobertas nas coisas humildes da natureza podem levar alguém a vislumbrar a verdade por trás das meras aparências. Seus poemas posteriores compartilham temas semelhantes, mas são mais experimentais e refletem seu conhecimento da antiguidade clássica. Eles tiveram uma grande influência nos poetas italianos posteriores, que incorporaram seus temas melancólicos em suas próprias obras. Pascoli escreveu em italiano e latim."
 manzoni.1204.f: "Myricae é uma coleção de poemas de Giovanni Pascoli. O título da coleção de Pascoli deriva de uma parte do segundo verso da IV Bucólica de Virgílio. Myricae estende-se por quase toda a produção poética do autor, de modo que se pode dizer que a história composicional coincide com o próprio desenvolvimento da consciência poética de Pascoli. A poesia de Myricae apresenta uma visão simbólica do mundo com intuição e revelação das analogias e correspondências misteriosas entre as coisas, um sentido de vida cheio de perplexidade e perplexidade. O sentido do mistério da vida, a angústia, a morte e a melancolia são aspectos difundidos na poesia de Pascoli que também apresenta o tema do ninho como metáfora do lar."
 manzoni.1204.g: "Um pequeno grande poeta."
 manzoni.1205.g: "O autor está zombando de Sigmund Freud?"
 manzoni.1206.t: "\"Il Piacere\" por Gabriele D'Annunzio"
 manzoni.1206.d: "Gabriele D'Annunzio teve um lugar de destaque na literatura e na vida política italiana. Ele foi apelidado de Il Vate (O Poeta) e Il Profeta (O Profeta). D'Annunzio foi associado ao movimento Decadente em suas obras literárias, que interagiram estreitamente com o Simbolismo Francês e o Esteticismo Britânico. No auge do seu sucesso, D'Annunzio foi celebrado pela originalidade, poder e decadência da sua escrita. A sua obra teve imenso impacto em toda a Europa e em gerações de escritores italianos."
 manzoni.1206.f: "\"Il Piacere” foi o primeiro romance de D'Annunzio. Assim como um século antes o livro 'Últimas Cartas de Jacopo Ortis' de Ugo Foscolo difundiu a corrente romântica e a sensibilidade na Itália, \"Il Piacere\" e seu protagonista Andrea Sperelli introduziram a tendência decadente e o esteticismo na cultura italiana no final do século XIX. D'Annunzio inaugura um novo tipo de prosa psicológica e introspectiva, destinada a ter grande sucesso e que lhe permitiu investigar os erros e adversidades da vida do 'último descendente de uma raça intelectual'."
 manzoni.1206.g: "Isso é simbolismo ou já é decadência?"
 manzoni.1207.g: "Este conto infantil definitivamente teria feito mais sucesso como filme."
 manzoni.1208.g: "Um romance patriótico para jovens italianos!"
 manzoni_great_writer: "Grande escritor"
 manzoni_great_writer_desc: "Este personagem é um dos maiores escritores de sua época. Famosos em todo o mundo por suas obras literárias."
