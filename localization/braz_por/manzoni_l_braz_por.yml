 manzoni.1300.t: "\"Alemanha. Ein Wintermärchen\" por Heinrich Heine"
 manzoni.1300.d: "Heinrich Heine, um dos poetas mais importantes da língua alemã, escreveu um poema épico satírico dirigido contra a situação política na Alemanha. Enquanto os liberais celebram o livro, alguns políticos querem proibi-lo."
 manzoni.1300.f: "Em 1843, o poeta alemão Heinrich Heine, que trocou a Alemanha em 1831 pela França, voltou por algumas semanas, visitando sua mãe e editor Julius Campe em Hamburgo. Heine não foi um típico autor romântico, mas sim um autor satírico que criticou a política reacionária e a censura dos estados autoritários alemães, mas também dos seus compatriotas nacionalistas e chauvinistas. Na viagem de volta a Paris, o primeiro rascunho de \"Deutschland. Ein Wintermärchen” (Alemanha: Um Conto de Inverno) tomou forma. De acordo com os regulamentos de censura da Conferência de Carlsbad de 1819, manuscritos com mais de vinte fólios não foram submetidos ao escrutínio da censura. Por isso foi publicado juntamente com outros poemas num volume denominado 'Novos Poemas'. A obra mostrou o mundo das imagens de Heine e sua dicção poética semelhante a uma canção folclórica em uma reunião compacta, com críticas irônicas às circunstâncias de sua terra natal."
 manzoni.1300.g: "Deveria ser publicado."
 manzoni.1300.h: "Banir e confiscar!"
 manzoni.1300.i: "Censure isso..."
 manzoni.1301.t: "Heinrich Heine zomba da Catedral de Colônia"
 manzoni.1301.d: "Em seu último trabalho, Heinrich ridicularizou decididamente a retomada da construção da Catedral de Colônia."
 manzoni.1301.f: "Heine, um antigo cidadão prussiano (nasceu em Düsseldorf), era contra o militarismo no seu próprio país. Em seus versos épicos ele criticou o \"comportamento prussiano”, mas também foi contra o transfigurador romantismo alemão. Na verdade, ele zombou dos anacrônicos alemães, que preferiram terminar uma catedral medieval, em vez de olhar para frente."
 manzoni.1301.g: "Maldito seja, Heine!"
 manzoni.1302.t: "\"Mondnacht\" por Joseph von Eichendorff"
 manzoni.1302.d: "Um novo poema de Joseph von Eichendorff é considerado um dos pináculos da poesia alemã."
 manzoni.1302.f: "Joseph Freiherr von Eichendorff foi um poeta e romancista alemão da posterior escola romântica alemã. O tema poético norteador de Eichendorff era que o homem deveria encontrar a felicidade na plena absorção das belezas e das mudanças de humor da Natureza. O lirismo da poesia de Eichendorff é muito elogiado, e seus poemas foram compostos por muitos compositores, incluindo Schubert, Schumann, Mendelssohn, Brahms, Hugo Wolf, Richard Strauss, Friedrich Nietzsche, Hans Pfitzner e Alexander Zemlinsky. Em 1837, foi publicado seu poema \"Mondnacht\" (Noite da Lua), que é frequentemente visto como a 'pérola de pérolas' do lirismo romântico alemão."
 manzoni.1302.g: "Lindo."
 manzoni.1302.h: "Em vez de lutarem pela sua liberdade política, os alemães se deixam distrair por poemas estúpidos?"
 manzoni.1303.t: "A revolta do tecelão"
 manzoni.1303.d: "No [SCOPE.sState('manzoni_weberaufstand_state').GetName], os problemas sociais, económicos e políticos são evidentes. Os futuros ideais liberais e a pobreza emergente entre os artesãos tradicionais criaram uma situação de conflito ameaçadora. Circulam rumores de que ocorrerá uma rebelião, liderada pelos tecelões locais."
 manzoni.1303.f: "O início da industrialização mergulhou vários tecelões na miséria. O proprietário da fábrica têxtil local compra fio deles, mas consegue baixar o preço devido à oferta. Os tecelões não são, portanto, operários fabris clássicos, mas sim pessoas empobrecidas, independentes e dependentes das fábricas. Enfrentando o sofrimento da exploração e o perigo de poderem ser ainda mais explorados no futuro, alguns na região uniram-se e ameaçam agora o empresário que consideram responsável pela sua miséria. As elites políticas já interpretam esta difícil situação à sua maneira. Os industriais, em particular, apelam a medidas duras para evitar incidentes semelhantes no futuro. Aqueles que exigem melhores condições salariais veriam isto como uma afronta."
 manzoni.1303.g: "Envie as tropas."
 manzoni.1303.h: "Negociar."
 manzoni.1304.t: "\"Weberlied\" por Heinrich Heine"
 manzoni.1304.d: "A supressão da revolta dos tecelões em [SCOPE.sCountry('manzoni_weberaufstand_country').GetAdjectiveNoFlag] [SCOPE.sState('manzoni_weberaufstand_state').GetName] tornou-se um símbolo dos problemas sociais e políticos não resolvidos no território da Confederação Alemã. Heinrich Heine criticou as autoridades responsáveis ​​num poema."
 manzoni.1304.f: "Nenhuma lágrima flui de seus olhos sombrios,\nEles sentam-se no tear, seus dentes brancos à mostra:\nTua mortalha, ó Alemanha, agora tecemos,\nUma maldição tripla estamos tecendo para ti,\n—Estamos tecendo , estamos tecendo!\n\nUma maldição sobre o Deus a quem nossa petição\nEm vão nos dirigimos quando estávamos famintos;\nEm vão esperamos, e em vão esperamos,\nEle apenas ridicularizou e zombou' d nosso triste destino,\n—Estamos tecendo, estamos tecendo!\n\nUma maldição sobre o Rei dos ricos, que muitas vezes\nNossa miséria tentou em vão suavizar;\nQue tira até o último centavo nós temos,\nE deixe-nos levar um tiro como cães na estrada,\n—Estamos tecendo, estamos tecendo!\n\nUma maldição sobre nossa pátria falsa e inventada,\nOnde apenas vergonha e desgraça são vistas prosperando,\nOnde as flores são colhidas antes de se desdobrarem,\nOnde os vermes atacam a corrupção e o mofo,\n—Estamos tecendo, estamos tecendo!"
 manzoni.1304.g: "Você de novo, Heine?"
 manzoni.1304.h: "Censurar! Censurar!"
 manzoni.1305.t: "\"Morrer Weber”, de Gerhart Hauptmann"
 manzoni.1305.d: "Gerhart Hauptmann apresentou o drama mais importante de sua carreira. Reforçou sua reputação como representante da literatura alemã no país e no exterior. Em 1912, Hauptmann recebeu o Prêmio Nobel de Literatura por \"sua rica, variada e notável eficácia no campo da poesia dramática”."
 manzoni.1305.f: "A maioria dos personagens de \"Die Weber” (Os Tecelões) são proletários que lutam por seus direitos. Ao contrário da maioria das peças de qualquer época, como apontado muitas vezes na crítica literária e nas introduções, a peça não tem um verdadeiro personagem central, proporcionando amplas oportunidades para atuação em conjunto. Em vez de um herói, Hauptmann criou uma multidão. Esta multidão é, portanto, o protagonista - ou personagem principal - e se os indivíduos emergem das bases, eles não são colocados em primeiro plano para permanecerem por muito tempo. O pano de fundo histórico foi a Revolta dos Tecelões na década de 1840 em [SCOPE.sState('manzoni_weberaufstand_state').GetName]."
 manzoni.1305.g: "Na Alemanha, até uma tragédia sangrenta se torna património cultural."
 maria_luigia_died_tt: "#O Maria Luísa de Parma#! morre."
 je_manzoni_lucca: "O destino de Lucca"
 je_manzoni_lucca_reason: "O Congresso de Viena enfrentou alguns problemas durante a Restauração em 1815. Isto incluiu a questão da reintegração dos Bourbons em Parma e o apanágio da esposa de Napoleão, Maria Luisa, natural dos Habsburgos. Os Bourbons em Parma receberam o Reino da Etrúria depois que Bonaparte incorporou Parma ao Império Francês; No entanto, a Etrúria teve de ceder à restauração da Toscana sob um herdeiro dos Habsburgos. O compromisso era, portanto, que os príncipes da Casa de Bourbon-Parma pudessem reivindicar para si o Ducado de Lucca, enquanto Maria Luísa poderia manter Parma como um apanágio até a sua morte. Após a morte de Maria Luisa, a Casa de Bourbon-Parma deveria retornar a Parma e Lucca caiu para a Toscana."
 manzoni.901.t: "O destino de Lucca"
 manzoni.901.d: "De acordo com as disposições do Congresso de Viena, a Casa de Bourbon-Parma ascendeu novamente ao trono em Parma após a morte de Maria Luísa de Habsburgo. Em troca, Lucca deve ser cedida à Toscana."
 manzoni.901.f: "O Congresso de Viena enfrentou alguns problemas durante a Restauração em 1815. Isto incluiu a questão da reintegração dos Bourbons em Parma e o apanágio da esposa de Napoleão, Maria Luisa, natural dos Habsburgos. Os Bourbons em Parma receberam o Reino da Etrúria depois que Bonaparte incorporou Parma ao Império Francês; No entanto, a Etrúria teve de ceder à restauração da Toscana sob um herdeiro dos Habsburgos. O compromisso era, portanto, que os príncipes da Casa de Bourbon-Parma pudessem reivindicar para si o Ducado de Lucca, enquanto Maria Luísa poderia manter Parma como um apanágio até a sua morte. Após a morte de Maria Luisa, a Casa de Bourbon-Parma deveria retornar a Parma e Lucca caiu para a Toscana."
 manzoni.901.g: "Viva [SCOPE.sCharacter('manzoni_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('manzoni_ruler_scope').GetFullName]"
 manzoni.902.g: "Lucca é finalmente nosso."
 manzoni_italian_irredenta_decision: "Itália irredenta"
 manzoni_italian_irredenta_decision_desc: "Historicamente, a Dalmácia, as Ilhas Jónicas, Malta e a Córsega faziam parte da pátria italiana. A Córsega pertencia a Génova, Malta à Sicília e a Dalmácia e as Ilhas Jónicas faziam parte da República de Veneza. Comunidades italianas ainda existem nestas áreas. Depois da gloriosa unificação da Itália e do grande progresso que fizemos, é hora de resgatar os últimos territórios italianos, que ainda estão sob domínio estrangeiro. Uma última vez deveríamos chorar: Va fuori, stranier'!"
 united_italian: "italiano"
 je_manzoni_italianization: "Italianização"
 je_manzoni_italianization_reason: "Após a unificação da Itália, Massimo d'Azeglio disse: \"Fizemos a Itália, agora temos de fazer os italianos”. Mesmo que o ditado seja historicamente questionável, ainda assim traz à tona a verdade de que depois da unificação política de Itália, a unidade interna era tudo menos estável. Isto não se aplica apenas ao sul, onde os bandidos faziam maldades - mesmo no norte, fora da elite burguesa, a maioria das pessoas ainda se sentia ligada à sua identidade regional. As guerras conjuntas, um sistema educativo nacional, o serviço militar conjunto e a construção de instituições nacionais, como quartéis, portos militares e instalações administrativas, são susceptíveis de garantir que uma identidade totalmente italiana significativamente mais forte emerja do árduo processo de unidade nacional nos próximos anos. anos."
 manzoni_italian_consiousness_capital_tt: "As populações locais do norte da Itália e do sul da Itália da nossa capital tornam-se uma só população italiana. Será transformada numa pátria italiana. Nossa cultura primária mudará para o italiano e seremos capazes de italianizar todo o país."
 je_manzoni_italianization_goal: "#O Progresso da Identidade Nacional#! atinge #G 250#!."
 je_manzoni_italianization_ai: "Italianização"
 je_manzoni_italianization_ai_reason: "Após a unificação da Itália, Massimo d'Azeglio disse: \"Fizemos a Itália, agora temos de fazer os italianos”. Mesmo que o ditado seja historicamente questionável, ainda assim traz à tona a verdade de que depois da unificação política de Itália, a unidade interna era tudo menos estável. Isto não se aplica apenas ao sul, onde os bandidos faziam maldades - mesmo no norte, fora da elite burguesa, a maioria das pessoas ainda se sentia ligada à sua identidade regional. As guerras conjuntas, um sistema educativo nacional, o serviço militar conjunto e a construção de instituições nacionais, como quartéis, portos militares e instalações administrativas, são susceptíveis de garantir que uma identidade totalmente italiana significativamente mais forte emerja do árduo processo de unidade nacional nos próximos anos. anos."
 je_manzoni_italianization_ai_goal: "#O Progresso da Identidade Nacional#! atinge #G 250#!."
 je_manzoni_italian_national_identity: "Identidade Italiana"
 je_manzoni_italian_national_identity_reason: "Depois de alguns anos de crescimento conjunto e de algumas reformas, o sentimento de estar ligado a uma identidade pan-italiana está cada vez mais a espalhar-se entre a população em geral. Este sentimento espalhar-se-á de região para região, independentemente da forma como o Estado estabeleça o enquadramento adequado: as regiões que são bem servidas por administrações governamentais, universidades, quartéis ou bases navais têm maior probabilidade de desenvolver uma identidade totalmente italiana devido à sua função integradora. As áreas fortemente urbanizadas têm maior probabilidade de ter acesso a um conceito que antes só era investigado por intelectuais. Em circunstâncias perfeitas, um subestado poderia adoptar a nova identidade todos os anos. Se todos os italianos no Estado-nação se sentirem assim, isso também terá uma influência sobre os italianos no estrangeiro, que se sentirão cada vez mais como os nossos compatriotas no estrangeiro, em vez de lombardos, sicilianos ou toscanos."
 manzoni.911.t: "Consciência italiana em [SCOPE.sState('united_italian_culture_state').GetName]"
 manzoni.911.d: "Após anos de influência social e política, a população de [SCOPE.sState('united_italian_culture_state').GetName] desenvolveu um sentimento de pertença a toda a Península Itálica. Estão agora totalmente comprometidos com a identidade pan-italiana."
 manzoni.911.f: "«Os italianos queriam criar uma nova Itália e permanecer os velhos italianos de antes, com as apreensões e misérias morais que eram a sua herança desde os tempos antigos; porque pensam em reformar a Itália, e ninguém percebe que para o conseguirem devem primeiro reformar-se a si próprios. -Massimo d’Azeglio"
 manzoni.911.g: "O antigo sonho de Maquiavel torna-se realidade!"
 manzoni_italian_consiousness_tt: "As populações locais do norte da Itália e do sul da Itália tornam-se uma população italiana. As pátrias do norte e do sul da Itália serão transformadas em pátrias italianas."
 manzoni.912.t: "Uma consciência pan-italiana"
 manzoni.912.d: "Agora que toda a população de Itália já não se vê principalmente como pertencente à sua identidade regional, mas sim à sua identidade nacional, isto tem um impacto não só nos italianos no seu país, mas também em todo o mundo."
 manzoni.912.f: "Com o estabelecimento do Estado nacional italiano e a aplicação da identidade pan-italiana, os italianos fora das fronteiras - quer como emigrantes no mundo, quer originalmente vivendo sob domínio estrangeiro - também se identificarão principalmente como italianos."
 manzoni.912.g: "Nós fizemos os italianos!"
 manzoni_pan_italian_identity_tt: "Em todo o mundo, todas as populações do norte e do sul de Itália irão agora identificar-se como uma população pan-italiana. As pátrias do norte da Itália e do sul da Itália serão apenas pátrias italianas em todo o mundo."
 manzoni.913.d: "Agora que toda a população de Itália já não se vê principalmente como pertencente à sua identidade regional, mas sim à sua identidade nacional, isto tem um impacto não só nos italianos no seu país, mas também em todo o mundo. Também no nosso país existe agora uma necessidade de nos identificarmos como italianos, em vez de nos referirmos apenas às origens regionais, como acontecia anteriormente."
 manzoni.913.g: "Você está dizendo que não há diferenças entre um pescador siciliano e um pastor trentino?"
 rule_manzoni_united_cultures_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! Fusão Cultural"
 setting_manzoni_united_cultures_rule: "Fusão cultural: #G ativado#!"
 setting_manzoni_united_cultures_rule_desc: "A italianização, a germanização e a suíça são possíveis: as culturas individuais podem fundir-se em italiana, alemã e suíça. Isso melhora o desempenho ao longo do jogo, mas pode levar a incompatibilidades com outros mods."
 setting_manzoni_no_united_cultures_rule: "Fusão Cultural: #R desativado#!"
 setting_manzoni_no_united_cultures_rule_desc: "Italianização, germanização e suíça são #R e não#! possíveis. Isso melhora a compatibilidade com outros mods, mas não tem impacto positivo no desempenho ao longo do jogo."
 manzoni_brigants_modifier: "Banditagem"
 manzoni_anti_regionalism_ig_modifier: "Anti-Regionalismo"
 manzoni_anti_regionalism_country_modifier: "Anti-Regionalismo"
 manzoni_linguistic_impurity_modifier: "Impureza Lingüística"
 manzoni_no_foscolo_modifier: "Foscolo negado"
 manzoni.914.t: "[SCOPE.sCharacter('manzoni_character_scope').GetLastName] apoia a causa italiana"
 manzoni.914.d: "Na esteira do apelo crescente por uma identidade pan-italiana, [SCOPE.sCharacter('manzoni_character_scope').GetFullName] identificou-se completamente com os ideais do Risorgimento. Ele vê suas próprias origens como secundárias e enfatiza sua identidade nacional italiana."
 manzoni.914.f: "Mesmo antes da unificação da Itália, a elite intelectual em particular identificava-se principalmente como italiana e via as origens regionais apenas como folclore. A partir do momento da unificação, esta consciência espalhou-se particularmente nas forças armadas italianas – o exército e a marinha tornaram-se a \"escola da nação”. Na política, as forças centralistas prevaleceram desde o início sobre as forças regionalistas."
 manzoni.914.g: "Os dias do campanilismo acabaram."
 manzoni.915.t: "Bandidos em [SCOPE.sState('manzoni_brigant_state').GetName]"
 manzoni.915.d: "As más condições em [SCOPE.sState('manzoni_brigant_state').GetName] levaram a que cada vez mais pessoas sem perspectivas se juntassem ao gangue [SCOPE.sCharacter('manzoni_brigant_character').GetFullName]. Eles estão agora causando estragos na área circundante – a tal ponto que os bandidos se tornaram um problema real. Há até apoiantes entre as pessoas comuns que os vêem como opositores ao governo e à crescente italianização e, portanto, como resistentes políticos e regionais."
 manzoni.915.f: "O banditismo no sul da Itália existia de alguma forma desde os tempos antigos. No entanto, as suas origens como bandidos que visavam viajantes aleatórios evoluiriam enormemente mais tarde na forma do movimento de resistência política. Após a conquista do Reino das Duas Sicílias em 1861 pelo Reino Savoyard da Sardenha (mais tarde Reino da Itália), surgiu a forma de banditismo mais famosa e conhecida na área. Entre os bandidos havia uma mistura de pessoas, com diferentes antecedentes e motivações profissionais; os bandidos incluíam ex-prisioneiros, bandidos e outras pessoas que o governo italiano considerava criminosos comuns, mas também ex-soldados e legalistas do exército Bourbon. Lançaram ataques não só contra as autoridades italianas e as classes altas proprietárias de terras, mas também contra pessoas comuns, saqueando frequentemente aldeias, cidades e quintas, e cometendo assaltos à mão armada contra indivíduos e grupos, incluindo agricultores, cidadãos e bandos de bandidos rivais."
 manzoni.915.g: "Outro bandido disfarçado de Robin Hood!"
 manzoni.916.t: "Medo pelo patrimônio regional"
 manzoni.916.d: "As pessoas comuns em [SCOPE.sState('manzoni_regionalist_state').GetName] temem que as novas instituições nacionais italianas e a popularização da língua italiana possam destruir o modo de vida tradicional ali. [SCOPE.sCharacter('manzoni_rural_leader_scope').GetFullName] argumentou que a herança especial da região não deveria ser ignorada e que a homogeneização da Itália já progrediu demasiado."
 manzoni.916.f: "Com a revolução fracassada de 1848/1849, os Neo-Guelfos, como braço dirigente do movimento de unidade italiano, tornaram-se de facto impotentes. Originalmente, tinham-se pronunciado a favor de uma Itália estruturada a nível federal, sob a presidência primus inter pares do Papa. Em resposta, os círculos centralistas ganharam preeminência absoluta – um fenómeno que permaneceu predominante até ao século XX. As sensibilidades regionais já não eram tidas em conta mas, pelo contrário, os sentimentos regionais eram vistos como tendências perigosas que poderiam destruir os esforços italianos de unificação."
 manzoni.916.g: "[SCOPE.sState('manzoni_regionalist_state').GetName] é uma região italiana como qualquer outra."
 manzoni.916.h: "Deveríamos ter em conta esta herança especial."
 manzoni.917.t: "Dialetos ou línguas?"
 manzoni.917.d: "Os principais professores, conferencistas e professores do nosso país manifestaram-se a favor de promover particularmente a implementação da língua italiana não só nas instituições públicas, mas também na vida quotidiana. Isto deverá melhorar significativamente os processos científicos e políticos na nova Itália - mas entre a população em geral, especialmente a população rural, é uma exigência extremamente impopular, uma vez que as pessoas continuam a falar exclusivamente em dialecto."
 manzoni.917.f: "Mesmo no século XVIII não havia dúvida de que as variedades linguísticas individuais da península italiana eram línguas independentes. Não foi só a Toscana que teve grande prestígio por causa de Dante Alighieri. O veneziano era a língua oficial e escrita da República de Veneza, peças como as de Carlo Goldoni e a literatura eram escritas em veneziano, que também ainda tinha um significado especial como língua franca na região do Adriático. Algo semelhante pode ser dito sobre o napolitano. No século XIX, no entanto, prevalecia a opinião de que havia apenas uma variedade italiana padrão e que todas as outras línguas na Itália eram meros dialetos - embora o italiano falado no norte já tivesse um estatuto linguístico especial. Porém, no decorrer dos movimentos políticos, a realidade tornou-se cada vez mais predominante: uma língua difere de um dialeto porque o primeiro tem uma marinha e um exército."
 manzoni.917.g: "A nossa diversidade linguística é o nosso prestígio."
 manzoni.917.h: "Fale italiano, fale claro. O resto são apenas dialetos."
 manzoni.918.t: "O destino de Foscolo"
 manzoni.918.d: "À medida que o sentimento nacional se torna cada vez mais evidente, levantam-se vozes apelando ao transporte do corpo do grande poeta italiano Ugo Foscolo da Grã-Bretanha para Itália."
 manzoni.918.f: "A nova nação italiana procurava marcos: acontecimentos históricos, mas também personalidades históricas. A ideia de criar um túmulo de artistas, cientistas e outras grandes personalidades baseado no modelo do Partenon, semelhante ao da França, surgiu cedo. Santa Croce em Florença, que anteriormente serviu como cemitério de cidadãos proeminentes, parecia o lugar certo para isso. Personalidades como Maquiavel, Michelangelo e Galileu são há muito mais italianas do que toscanas. Ugo Foscolo, um poeta de origem veneziana da ilha de Zakynthos, viveu nos anos revolucionários e é considerado uma figura definidora do liberalismo e nacionalismo italiano inicial. Ele seria o complemento perfeito para esta galeria de grandes mentes italianas. No entanto, Foscolo morreu no exílio em 1827 - em Turnham Green, perto de Londres."
 manzoni.918.g: "Peça-lhes que nos dêem Foscolo."
 manzoni.918.h: "Ficaríamos envergonhados se eles dissessem não."
 manzoni.919.d: "O governo italiano solicitou que o corpo do famoso poeta e defensor do nacionalismo italiano, Ugo Foscolo, lhes fosse entregue."
 manzoni.919.g: "Eles deveriam ter seu pequeno poeta. Qual é o nome dele mesmo?"
 manzoni.919.h: "O cara do Fosco fica aqui."
 manzoni.920.t_foscolo: "Foscolo retorna"
 manzoni.920.d_foscolo: "O governo britânico concordou - o corpo de Foscolo retornará em breve a solo italiano e encontrará seu local de descanso final na igreja de Santa Croce!"
 manzoni.920.f_foscolo: "O regresso de Ugo Foscolo à Itália é considerado um dos primeiros pontos-chave para o jovem Estado-nação. Foscolo foi celebrado como um herói que voltou; seu enterro foi como uma procissão – com pessoas chorando e aplaudindo. Com o 'Panteão' de grandes personalidades italianas em Santa Croce, foi inaugurado um ponto fixo do nacionalismo italiano para o qual as pessoas poderiam se orientar. Os heróis italianos deveriam ser o foco desta ideologia, e não os santos católicos."
 manzoni.920.g: "Um grande italiano volta para casa!"
 manzoni.920.t_no_foscolo: "Foscolo permanece no exílio"
 manzoni.920.d_no_foscolo: "Infelizmente, o governo britânico impediu Ugo Foscolo de regressar a Itália - usando várias desculpas hipócritas."
 manzoni.920.f_no_foscolo: "Na verdade, eles tiveram a arrogância de se referir ao grande poeta italiano como \"aquele cara do Fosco”!"
 manzoni.920.h: "Esses filhos de uma vaca perneta estão nos negando nosso Foscolo!"
 manzoni_gbr_hits_ita_prestige_tt: "Isto dará um golpe ao prestígio da Itália."
 manzoni_roma_aeterna_decision: "Roma Eterna"
 manzoni_roma_aeterna_decision_desc: "Roma, a Cidade Eterna, tem sido a única verdadeira capital italiana desde o Império Romano. Podemos, portanto, mudar a nossa sede do governo para lá sem quaisquer desvantagens. Se tivermos um zoológico, um museu ou um observatório na antiga capital, eles serão desmantelados lá, mas receberemos imediatamente um substituto correspondente na nova capital."
 manzoni.910.t: "Roma Eterna"
 manzoni.910.d: "Somente com a transferência da capital para Roma a Itália poderá se autodenominar a verdadeira capital de todos os italianos. Na verdade, agora a Itália pode usar o capacete de Cipião!"
 manzoni.910.f: "'Quando o Coliseu cair, Roma cairá;\nE quando Roma cair, o mundo.' -Lorde Byron"
 manzoni.910.g: "Roma Caput Mundi."
