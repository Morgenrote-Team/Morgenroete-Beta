 manzoni_writer_poem_bestseller_title_15_loc: "Onde as flores silvestres sussurram"
 manzoni.2600.t: "\"De Leeuw van Vlaenderen, de de Slag der Gulden Sporen\""
 manzoni.2600.d: "\"De Leeuw van Vlaenderen, of de Slag der Gulden Sporen\" ou \"O Leão de Flandres, ou a Batalha das Esporas Douradas\" de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] é um romance histórico com foco na Batalha das Esporas Douradas, na qual uma Milícia Flamenga derrotou uma força invasora francesa. O livro é considerado um épico nacional flamengo."
 manzoni.2600.f: "\"Você, flamengo, que leu este livro, reflita, através dos feitos gloriosos que ele relata, o que Flandres já foi, o que é agora e, ainda mais, o que se tornará se você esquecer os exemplos sagrados de seus antepassados! \"\n- Hendrik Conscience, De Leeuw van Vlaenderen, de de Slag der Gulden Sporen"
 manzoni.2600.g: "Pela Flandres!"
 manzoni.1601.t: "\"Roda rummet\""
 manzoni.1601.d: "\"Röda rummet\" ou \"The Red Room\" é uma crítica à sociedade sueca escrita por [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Nela, o funcionário público idealista Arvid Falk se torna um escritor e entra em conflito com seu irmão conservador Carl Nikolaus Falk. A sociedade de Estocolmo é retratada de forma satírica."
 manzoni.1601.f: "\"...assim que uma obra de arte é de uso prático, revela um propósito ou uma tendência, sua beleza desaparece.\"\n- August Strindberg, Röda rummet"
 manzoni.1601.g: "A sociedade precisa mudar!"
 manzoni.1602.t: "\"Isso faz um\""
 manzoni.1602.d: "\"Det går an\" ou \"Isso serve\" é um ataque de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] ao casamento para toda a vida como uma instituição e à incapacidade das mulheres de se tornarem financeiramente independentes. No romance, o sargento Albert se apaixona por Sara Videbeck, filha de um vidraceiro, durante uma viagem de barco a vapor entre Estocolmo e Lidköping. Sara está interessada, mas descreve um casamento igualitário sem uma cerimônia formal de casamento e sem propriedade compartilhada. O romance termina com ela perguntando: \"Isso tudo serve, Albert?\" (\"Går allt detta an, Albert?\"), e sua resposta, \"Isso serve\" (\"Det går an\")."
 manzoni.1602.f: "\"...aquele que deseja cortar vidro, meu senhor, deve ter um diamante!\"\n- Carl Jonas Love Almqvist, Det går an"
 manzoni.1602.g: "Isso serve!"
 manzoni.1603.t: "\"Pengar\""
 manzoni.1603.d: "\"Pengar\" ou \"Dinheiro\" é uma crítica de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] às leis contemporâneas do casamento. O livro acompanha Selma dos dezesseis aos vinte e três anos. Durante esse tempo, ela se transforma de uma jovem animada com sonhos artísticos em uma mulher endurecida com a liberdade como seu único objetivo. Aos dezesseis anos, Selma se casa com o muito mais velho Pål Kristersson, um homem rico que ganhou sua fortuna com trabalho duro, em grande parte porque ela está convencida de que ele é um bom par financeiro. No entanto, ela nunca sente nenhum amor por ele e parece lentamente esquecer o que é o amor. Seu marido é descrito como \"um porco raspado\". Ao longo dos anos de casamento, ela começa a reconhecer todas as falhas em seu relacionamento, mas também as questões sociais mais amplas sobre a posição das mulheres, sua falta de autonomia legal e seus direitos."
 manzoni.1603.f: "\"...seu autoengano evocou uma imagem distorcida, que se assemelhava muito à felicidade.\"\n- Victoria Benedictsson, Pengar"
 manzoni.1603.g: "Liberdade para Selma!"
 manzoni.1604.t: "\"Hertha\""
 manzoni.1604.d: "\"Hertha\" é um romance de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] que defende a autonomia legal das mulheres e o acesso à educação. A protagonista do romance, a jovem obstinada Hertha, vive em uma casa dominada por um pai tirânico. Eles residem em uma pequena cidade patriarcal chamada Kungsköping — uma versão em miniatura da Suécia. Uma noite, um incêndio irrompe, ameaçando destruir a cidade inteira. O incêndio se torna um evento que revela as verdadeiras faces dos habitantes e expõe a estreiteza de espírito da sociedade sueca. Durante os esforços de resgate, no entanto, pela primeira vez, as mulheres e os homens da cidade, ricos e pobres, trabalham lado a lado. O antigo queimou, e algo novo pode ser construído. Hertha surge como uma força motriz, e na nova realidade da cidade após o incêndio, as mulheres recebem a promessa de um papel central."
 manzoni.1604.f: "\"...Eu certamente gostaria de me casar esta noite, se ao menos eu pudesse ser viúva amanhã!\"\n- Fredrika Bremer, Hertha"
 manzoni.1604.g: "Queime tudo!"
 manzoni.1605.t: "\"Fedorento e flamante\""
 manzoni.1605.d: "\"Stänk och flikar\" é uma coleção de poemas de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. O poema de amor erótico \"En morgondröm\" ou \"A Morning Dream\" apresentado na coleção é repleto de significado. Em sua essência, ele serve como uma crítica às visões da época — particularmente da igreja — sobre moralidade, nudez e sexualidade."
 manzoni.1605.f: "\"...ela estava nua, revelada nas necessidades de sua beleza, e com os joelhos separados e o núcleo trêmulo, ela encontrou o desejo de seu amante mais uma vez.\"\n- Gustaf Fröding, Stänk och flikar"
 manzoni.1605.g: "Censura!"
 manzoni.1606.t: "\"No dia de aniversário\""
 manzoni.1606.d: "\"På nyårsdagen\" ou \"No Dia de Ano Novo\" é um poema curto e expressivo de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Foi descrito como um hino de batalha para individualistas obstinados."
 manzoni.1606.f: "\"Sozinho em uma embarcação frágil, o marinheiro ousa aventurar-se no vasto mar...\"\n- Erik Gustaf Geijer, På nyårsdagen"
 manzoni.1606.g: "Avante! - tal é o comando do seu destino"
 manzoni.1607.t: "\"Deus te abençoe, jord\""
 manzoni.1607.d: "\"Godnatt, jord\" ou \"Boa Noite, Terra\" é um romance coletivo de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] que retrata a vida de crofters em uma propriedade em Södermanland – trabalho diário e arredores empobrecidos, desejo reprimido e alegria descomplicada. Do coletivo agitado, uma série de histórias de vida individuais emergem com notável intimidade. Ao redor de todas elas está o perfume da paisagem de Södermanland, exuberante com carvalhos e vibrante com papoulas."
 manzoni.1607.f: "\"Dizem que as folhas de bananeira são encontradas principalmente em caminhos, onde são pisoteadas. O mesmo pode ser dito dos crofters.\"\n- Ivar-Lo Johansson, Godnatt, jord"
 manzoni.1607.g: "Boa noite!"
 manzoni.1608.t: "\"Bodes\""
 manzoni.1608.d: "\"Bödeln\" ou \"O Carrasco\" é um romance de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. A história se desenrola em duas linhas do tempo: a Idade Média e o presente. O fio condutor entre as duas partes é o cenário, uma taverna, e o carrasco que está presente em ambas as seções. O livro conclui com o carrasco fazendo um discurso aos convidados, expressando sua visão sombria da humanidade."
 manzoni.1608.f: "\"A violência é a expressão máxima das forças físicas e espirituais da humanidade.\"\n- Pär Lagerkvist, Bödeln"
 manzoni.1608.g: "O horror!"
 manzoni.1609.t: "\"Flor sem flores\""
 manzoni.1609.d: "\"Nässlorna blomma\" ou \"Urtiga em Flor\" é um romance parcialmente autobiográfico de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. O livro conta a história da criança órfã Martin, que é o alter ego do autor e é escrito da perspectiva da criança. O pai de Martin morre e sua mãe deixa os filhos para uma nova vida na Califórnia. Tudo o que ele ama desaparece muito cedo e ele cresce trabalhando em várias fazendas e sendo mandado embora ou indo embora, enquanto enfrenta a dura vida de trabalho do trabalhador rural. Martin é descrito como egoísta, estúpido, infantil, autocompassivo, obsequioso, covarde e falso. Portanto, não há idealização da criança."
 manzoni.1609.f: "\"Ele pensava muito, mas tinha muito pouco entendimento.\"\n- Harry Martinson, Nässlorna blomma"
 manzoni.1609.g: "Pobre criança"
 manzoni.1610.t: "\"Mais presenteador assina\""
 manzoni.1610.d: "\"Mor gifter sig\" ou \"My Mother Gets Married\" é um romance parcialmente autobiográfico de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. O livro conta a história de Mia, de sete anos, que entende o mundo muito bem, mas não entende nada. Ela não consegue entender por que sua mãe quer se casar com um homem bonito, mas sem esperança, que bebe, briga e trai? Sua mãe trabalha duro para ganhar o pão de cada dia e garante que a vida em quartos alugados e com correntes de ar se torne suportável. A vida naquela família se torna uma série de partidas dolorosas e humilhantes, onde Mia é lentamente moldada na sociedade de classes. Ela sonha com uma casa tranquila com flores azuis na parede do fogão, mas descobre que o mundo não tem espaço para os sonhos de todos — e mal tem um lugar para morar para muitos."
 manzoni.1610.f: "\"Quando a dor é avassaladora e busca destruir uma pessoa, os mortos se levantam de seus túmulos para dar uma mão.\"\n- Moa Martinson, Mor gifter sign"
 manzoni.1610.g: "Um casamento realmente alegre"
 manzoni.1611.t: "\"Raskens\""
 manzoni.1611.d: "\"Raskens\" é um romance de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Ambientado na segunda metade do século XIX no sudeste de Småland, a história segue Gustav, um pobre trabalhador rural que se junta ao sistema de distribuição como soldado. Atribuído a uma croft de soldado e o nome Rask, ele se casa com Ida, uma empregada doméstica que também vive na pobreza. O romance retrata suas lutas e perseverança na croft enquanto oferece um relato histórico vívido da vida na Suécia."
 manzoni.1611.f: "\"Vamos lá, então! Eu posso lutar com você por oito dias sem nem tirar meu colete.\"\n- Vilhelm Moberg, Raskens"
 manzoni.1611.g: "Maldito gato arranhador!"
 manzoni.1612.t: "\"Doutor Glas\""
 manzoni.1612.d: "\"Doktor Glas\" é um romance epistolar de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] que conta a história de um médico na Suécia do século XIX que lida com questões morais e amorosas. O romance é sobre o Dr. Tyko Gabriel Glas, um médico respeitado em Estocolmo. A história é contada na forma de um diário e segue o Doutor Glas enquanto ele luta contra a depressão. O antagonista é o Reverendo Gregorius, um clérigo moralmente corrupto. A bela e jovem esposa de Gregorius confidencia ao Dr. Glas que sua vida sexual a está deixando miserável e pede sua ajuda. Glas se apaixona por ela e concorda em ajudar, embora ela já tenha outro amante. Ele tenta intervir, mas o Reverendo se recusa a abrir mão de seus \"direitos conjugais\" - ela deve fazer sexo com ele, goste ou não. Então, para fazer seu amor feliz, ele começa a tramar o assassinato de seu marido."
 manzoni.1612.f: "\"Queremos ser amados, na falta disso admirados, na falta disso temidos, na falta disso odiados e desprezados.\"\n- Hjalmar Söderberg, Doktor Glas"
 manzoni.1612.g: "Traga-me o cianeto de potássio!"
 manzoni.1613.t: "\"Singoalla\""
 manzoni.1613.d: "\"Singoalla\" é um romance de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Ambientado na Suécia medieval, é um conto romântico e histórico que mistura elementos de aventura, tragédia e folclore. A história gira em torno de Singoalla, uma bela e enigmática garota cigana, e Jöran, um nobre que se apaixona por ela. O romance se desenrola em uma época de intriga política, onde o amor de Singoalla e Jöran se entrelaça com o conflito entre classes sociais, as forças do destino e desejos pessoais."
 manzoni.1613.f: "\"Vai! Vai embora! Vai para o teu estranho!\"\n- Viktor Rydberg, Singoalla"
 manzoni.1613.g: "Tão romântico!"
 manzoni.1614.t: "\"Novas palavras\""
 manzoni.1614.d: "\"Nya dikter\" ou \"Novos Poemas\" é uma coleção de poemas de [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] que abrange temas da história, natureza e identidade nacional sueca. Esta coleção é frequentemente vista como a adoção do nacionalismo romântico pelo poeta, onde ele se concentra na beleza e força do povo sueco e sua herança. Há um foco distinto em honrar o passado e celebrar o legado do país, ao mesmo tempo em que contempla o futuro."
 manzoni.1614.f: "\"É mais bonito ouvir uma corda que se rompeu, do que nunca ter puxado um arco.\"\n- Verner von Heidenstam, Nova versão"
 manzoni.1614.g: "Que história de orgulho!"
 manzoni.1504.t: "\"As Aventuras de Tom Sawyer\""
 manzoni.1504.d: "Ao longo das margens do Rio Mississippi, um garoto travesso chamado Tom Sawyer e seu melhor amigo, Huck Finn, embarcam em aventuras emocionantes, incluindo brincadeiras, caças ao tesouro e até mesmo testemunhar um assassinato. Ao longo de suas aventuras, Tom aprende importantes lições de vida sobre amizade, moralidade e responsabilidade."
 manzoni.1504.f: "\"O trabalho consiste em tudo o que um corpo é obrigado a fazer, e a diversão consiste em tudo o que um corpo não é obrigado a fazer.\"\n- Samuel \"Mark Twain\" Clemens, As Aventuras de Tom Sawyer"
 manzoni.1504.g: "Um pequeno patife!"
