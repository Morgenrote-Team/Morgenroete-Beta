 manzoni.711.t: "Praise for the [SCOPE.gsInterestGroup('target_ig_1').GetName]"
 manzoni.711.d: "A newspaper belonging to the [SCOPE.sCharacter('target_character_1').GetFullName] publishing empire has singled out the [SCOPE.gsInterestGroup('target_ig_1').GetName]'s governance efforts with particular praise. It is no coincidence that [SCOPE.sCharacter('target_character_1').GetLastName] [SCOPE.sCharacter('target_character_1').GetHerselfHimself] belongs to this interest group."
 manzoni.711.f: "'The press is like a woman: sublime when it lies, it will not let go until it has forced you to believe it. The public, like a foolish husband, always succumbs.' -Honoré de Balzac"
 manzoni.711.g: "The article should be distributed as widely as possible!"
 manzoni.711.h: "This is a disgusting attempt at pandering."
 manzoni.712.t: "A Delicate Union"
 manzoni.712.d: "[SCOPE.sCharacter('target_character_1').GetFullName]'s recent marriage had already attracted attention. It has now emerged that [SCOPE.sCharacter('target_character_1').GetHerHis] spouse is a member of the [SCOPE.sCharacter('target_character_2').GetLastNameNoFormatting] family, which, with [SCOPE.sCharacter('target_character_2').GetFullName], provides the leader of the [SCOPE.gsInterestGroup('target_ig_1').GetName]. This raises questions about the newspaper's independence - its ties to the government, and the true power of the [SCOPE.sCharacter('target_character_1').GetLastName] empire."
 manzoni.712.f: "When the news came out that the finance minister's wife worked for a newspaper that was also part of the [SCOPE.sCharacter('target_character_1').GetLastName] publishing house, some officials began to think about what they had done wrong in life - and hadn't found better matches."
 manzoni.712.g: "Where love falls!"
 manzoni.712.h: "This is a development worthy of criticism."
 manzoni.713.t: "Government Propaganda"
 manzoni.713.d: "In one region, [SCOPE.sCharacter('target_character_1').GetFullName]'s' newspapers have become such a dominant force in everyday life that virtually all information about current events is provided solely by this medium. In effect, [SCOPE.sCharacter('target_character_1').GetLastName] can dictate what the truth is. Fortunately, this reporting is pro-government."
 manzoni.713.f: "'I am the press.' -[SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.713.g: "Why censorship when the press works for the government?"
 manzoni.714.t: "Inconspicuous Subsidies"
 manzoni.714.d: "[SCOPE.sCharacter('target_character_1').GetFullName]'s newspapers have been receiving hidden subsidies from the state treasury for years. The government is buying a friendly press. The intermediary is a fellow party member of [SCOPE.sCharacter('target_character_1').GetLastName], [SCOPE.sCharacter('target_character_2').GetFullName]. The case has eroded trust in the press."
 manzoni.714.f: "'I come across journalists in theatre lobbies; it makes me shudder to see them. Journalism is an inferno, a bottomless pit of iniquity and treachery and lies; no one can traverse it undefiled, unless, like Dante, he is protected by Virgil's sacred laurel.' -Honoré de Balzac"
 manzoni.714.g: "The collaboration is going well, what's up?"
 manzoni.714.h: "This collaboration between press and state must end!"
 manzoni.721.t: "The [SCOPE.gsInterestGroup('target_ig_2').GetName] in the crosshairs"
 manzoni.721.d: "[SCOPE.sCharacter('target_character_1').GetFullName] has instructed [SCOPE.sCharacter('target_character_1').GetHerHis] paper to target the [SCOPE.gsInterestGroup('target_ig_2').GetName] currently occupying ministerial positions in the government. [SCOPE.sCharacter('target_character_1').GetSheHe|U] has launched a veritable witch hunt—and the newspapers sell better with every sensational headline."
 manzoni.721.f: "'Who meddles with the postal codes?\nWho schemes along the railway roads?\nWho whispers “Truth” behind a fan,\nAnd questions crown, and church, and man?\nThe [SCOPE.gsInterestGroup('target_ig_2').GetName]! The learned pests!\nThey never cease their vain protests!'"
 manzoni.721.g: "Lies! Nothing but lies!"
 manzoni.721.h: "This article will not be re-shared."
 manzoni.721.i: "But if the newspaper says so?"
 manzoni.722.t: "The Voice of the Opposition"
 manzoni.722.d: "Using [SCOPE.sCharacter('target_character_1').GetHerHis] media power, [SCOPE.sCharacter('target_character_1').GetFullName] praised the [SCOPE.gsInterestGroup('target_ig_1').GetName] in an influential article. The associated media empire has already taken over the tone and is beating the propaganda drum."
 manzoni.722.f: "'Journalism, so far from being in the hands of a priesthood, came to be first a party weapon, and then a commercial speculation, carried on without conscience or scruple, like other commercial speculations. Every newspaper, as Blondet says, is a shop to which people come for opinions of the right shade. If there were a paper for hunchbacks, it would set forth plainly, morning and evening, in its columns, the beauty, the utility, and necessity of deformity.' -Honoré de Balzac"
 manzoni.722.g: "What do we care about this cheap propaganda?"
 manzoni.722.h: "Funded a rebuttal in a newspaper that is sympathetic to us."
 manzoni.723.t: "The [SCOPE.sCharacter('target_character_2').GetLastName] Affair"
 manzoni.723.d: "[SCOPE.sCharacter('target_character_1').GetFullName] has triggered a national crisis with a major editorial, combined with investigative reports: It appears that [SCOPE.sCharacter('target_character_2').GetFullName] has embezzled funds. The public is outraged by the tax waste, the government is drifting into crisis, the [SCOPE.gsInterestGroup('target_ig_2').GetName] are into sheer panic—and [SCOPE.sCharacter('target_character_1').GetLastName]'s publishing house is booming like never before."
 manzoni.723.f: "[SCOPE.sCharacter('target_character_1').GetSheHe|U] was underestimated. For years, [SCOPE.sCharacter('target_character_1').GetLastName] was considered just another publisher. But [SCOPE.sCharacter('target_character_1').GetHerHis] ambition to increase the [SCOPE.gsInterestGroup('target_ig_1').GetName]'s influence and to remove the government [SCOPE.sCharacter('target_character_1').GetSheHe] despised from office is bearing fruit. For months, [SCOPE.sCharacter('target_character_1').GetSheHe] has deployed [SCOPE.sCharacter('target_character_1').GetHerHis] best journalists to target government agencies and officials to expose a historic embezzlement scandal. Even former critics have to admit that this was brilliant journalistic research that will continue to benefit colleagues for years to come. For members of state and government, however, the attack has incalculable consequences. There is talk of resignation, a government reshuffle, and even possible new elections."
 manzoni.723.g: "This is just propaganda from the opposition!"
 manzoni.723.h: "A resignation is long overdue."
 manzoni.723.i: "Regroup the entire cabinet."
 manzoni.723.j: "Let the people decide at the ballot box!"
 manzoni.731.t: "Higher Circulation by all means"
 manzoni.731.d: "[SCOPE.sCharacter('target_character_1').GetFullName] is firmly convinced that circulation is only declining because [SCOPE.sCharacter('target_character_1').GetHerHis] magazine is not tabloid-like enough."
 manzoni.731.f: "'I feel like we've lost touch with ordinary people. We can't retreat into the ivory tower. We need to speed things up again. We need short, fast pieces—three, four paragraphs at the most. More bangers! BANGERS! More articles with stabbings—the blood must spurt!' -[SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.731.g: "OHYA!"
 manzoni.731.h: "Isn't there at least some kind of journalistic ethics?"
