 manzoni_alien_theories_modfier: "Teorias Extraterrestres"
 manzoni_adventure_idea_modifier: "Ideias de aventura"
 manzoni.332.d: "Um escritor mundialmente famoso prestou homenagem ao nosso país. [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe|U] está atualmente em uma turnê de leitura."
 manzoni.332.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] é um escritor de [SCOPE.sCharacter('manzoni_writer_scope').GetHomeCountry.GetName] com reputação de [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_writer_experience').GetValue|V0]. De [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] inúmeras obras, [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_bestsellers_var').GetValue|V0] são consideradas best-sellers e [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] livros são publicados em [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_book_licenses_var').GetValue|V0] países."
