 manzoni_je_pro_government_newspaper: "Pro-Government Newspaper"
 manzoni_je_pro_government_newspaper_reason: "The fourth estate exists to check the government. However, it has often happened that a certain court-like reporting has led to far too close a relationship between those in power and journalists. This may be unfortunate for reporting and press freedom, but who wants to be disturbed by unpleasant news?\n\n'Pro-Government Newspaper' triggers when the [concept_executive] of a publishing company belongs to an interest group that #G is part of the government#!. He then engages in pro-government articles."
 manzoni_has_publisher_ig_in_government_tt: "The interest group to which the Publishing Company [concept_executive] belongs is based in the #G government#!."
 manzoni_has_publishing_company_tt: "#default_text [GetPlayer.GetName] has a Publishing [concept_company].#!"
 manzoni_has_penny_press_tt: "#default_text [GetPlayer.GetName] has a $building_manzoni_publishing_industry$ with $manzoni_pm_penny_press$.#!"
 manzoni_je_freedom_of_the_press: "Freedom of the Press"
 manzoni_je_freedom_of_the_press_reason: "Driven by an irrepressible will to proclaim the truth—or simply because their own political party is not in government—publishers have challenged the state more than once. In times like these, freedom of the press is more important than ever.\n\n'Freedom of the press' triggers when the [concept_executive] of a publishing company belongs to an interest group that #R is not part of the government#!. He then engages in opposition work."
 manzoni_has_publisher_ig_in_opposition_tt: "The interest group to which the Publishing Company [concept_executive] belongs is based in the #R opposition#!."
