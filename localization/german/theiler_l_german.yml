 theiler_pharmaceutical_strophantine_flag: "Strophantus Gratus"
 theiler.41.strychnine: "Strychnos nux-vomica ist ein tropischer Baum, der in Indien und Südostasien heimisch ist. Seine Samen enthalten die Alkaloide Strychnin und Brucin, die beide hochgiftig sind. Strychnin wirkt auf das Nervensystem, verursacht schwere Muskelkrämpfe und kann zum Tod führen. Trotz seiner Giftigkeit wurden Extrakte in kleinen, kontrollierten Dosen in der Vergangenheit in der Medizin als Stimulans und zur Behandlung von Verdauungs- oder Nervenstörungen verwendet."
 theiler.41.emetine: "Carapichea ipecacuanha ist eine tropische Pflanze, die in Südamerika, insbesondere in Brasilien, heimisch ist. Ihre Wurzeln enthalten die Alkaloide Emetin und Cephaelin, die Erbrechen auslösen und eine antiparasitäre Wirkung haben. Traditionell wurde die Ipecac-Wurzel als Brechmittel zur Behandlung von Vergiftungen und als Expektorans in Hustensäften verwendet."
 theiler.41.atropine: "Atropa belladonna, auch bekannt als Tollkirsche, ist eine mehrjährige Pflanze, die in Europa, Nordafrika und Westasien heimisch ist. Sie enthält giftige Alkaloide wie Atropin, Scopolamin und Hyoscyamin, die das Nervensystem beeinflussen, indem sie Acetylcholinrezeptoren blockieren. In der Vergangenheit wurde sie als Beruhigungsmittel, Schmerzmittel und zur Erweiterung der Pupillen verwendet. In der modernen Medizin wird gereinigtes Atropin in der Augenheilkunde und zur Behandlung von Bradykardie oder Vergiftungen durch Organophosphate eingesetzt."
 theiler.41.aloin: "Aloe vera ist eine Sukkulente, die in Nordafrika und auf der Arabischen Halbinsel heimisch ist. Ihre dicken Blätter enthalten ein Gel, das reich an Polysacchariden, Vitaminen und Enzymen ist und beruhigende und feuchtigkeitsspendende Eigenschaften hat. Das Gel wird häufig in Kosmetika und in der Medizin zur Behandlung von Verbrennungen, Wunden und Hautirritationen verwendet. Getrockneter Latex aus der inneren Schicht des Blattes enthält Aloin, eine Verbindung mit stark abführender Wirkung."
 theiler.41.digitoxin: "Digitalis purpurea, auch Fingerhut genannt, ist eine zweijährige Pflanze, die in Europa heimisch ist. Ihre Blätter enthalten Herzglykoside wie Digoxin und Digitoxin, die die Herzkontraktionen stärken und den Herzschlag regulieren. Traditionell wurden Extrakte zur Behandlung von Herzinsuffizienz und Herzrhythmusstörungen verwendet. Gereinigte Herzglykoside werden in Medikamenten gegen Herzerkrankungen sorgfältig dosiert, während die rohe Pflanze aufgrund der hohen Vergiftungsgefahr gemieden wird."
 theiler.41.quinine: "Cinchona pubescens ist ein Baum, der in Südamerika, insbesondere in den Andenregionen, heimisch ist. Seine Rinde enthält Chinin und andere Alkaloide, die starke malariabekämpfende Eigenschaften haben. Traditionell wurde die Rinde zur Behandlung von Fieber und Malaria verwendet. Auch heute noch sind Chinin und seine Derivate in der Medizin zur Behandlung von Malaria von Bedeutung. Der Baum wird wegen seiner medizinisch wirksamen Rinde auch in tropischen Regionen angebaut."
 theiler.41.thymol: "Thymus vulgaris, oder gewöhnlicher Thymian, ist ein kleines mehrjähriges Kraut, das im Mittelmeerraum heimisch ist. Seine Blätter und sein Öl enthalten Thymol, Carvacrol und andere ätherische Öle mit antimikrobiellen, antioxidativen und entzündungshemmenden Eigenschaften. Traditionell wird Thymian zur Behandlung von Atemwegsinfektionen, Husten und Verdauungsproblemen eingesetzt. Er findet breite Anwendung in der Kräutermedizin, Aromatherapie und als natürliches Konservierungs- oder Aromastoff in Lebensmitteln."
 theiler.41.pilocarpine: "Pilocarpus pennatifolius ist ein tropischer Strauch, der in Brasilien heimisch ist. Seine Blätter enthalten das Alkaloid Pilocarpin, das die Speichel- und Schweißdrüsen stimuliert. Traditionell wurde es zur Behandlung von Mundtrockenheit und Augenerkrankungen eingesetzt. In der modernen Medizin wird Pilocarpin zur Behandlung von Glaukomen durch Senkung des Augeninnendrucks und zur Behandlung von Xerostomie (Mundtrockenheit) aufgrund von Bestrahlung oder Medikamenten eingesetzt. Die Pflanze wird vor allem wegen ihrer pharmakologisch wirksamen Alkaloide geschätzt."
 theiler.41.ephedrine: "Ephedra sinica, auch bekannt als Ma Huang, ist ein Strauch, der in China und Zentralasien heimisch ist. Seine Stängel enthalten Ephedrin und Pseudoephedrin, Alkaloide, die das Nervensystem stimulieren und die Bronchien erweitern. In der chinesischen Medizin wurde es zur Behandlung von Asthma, Bronchitis und verstopfter Nase eingesetzt. Seine Verwendung ist aufgrund des Risikos von Bluthochdruck, Herzproblemen und anderen Nebenwirkungen eingeschränkt."
 theiler.41.strophantine: "Strophanthus gratus ist eine in Westafrika heimische Kletterpflanze. Ihre Samen enthalten Herzglykoside wie Ouabain, die die Herzkontraktionen stark beeinflussen. Traditionell wurden Extrakte als Pfeilgift und in kleinen Dosen zur Behandlung von Herzerkrankungen verwendet. Ouabain wurde im Zusammenhang mit Herzinsuffizienz und Herzrhythmusstörungen untersucht."
