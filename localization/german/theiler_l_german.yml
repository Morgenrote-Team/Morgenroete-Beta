 theiler.42.d.strychnine: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Strychnin#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_strychnine$#! isoliert werden kann."
 theiler.42.d.emetine: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Emetine#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_emetine$#! isoliert werden kann."
 theiler.42.d.atropine: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Atropin#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_atropine$#! isoliert werden kann."
 theiler.42.d.aloin: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Aloin#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_aloin$#! isoliert werden kann."
 theiler.42.d.digitoxin: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Digitoxinopine#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_digitoxin$#! isoliert werden kann."
 theiler.42.d.quinine: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Quinine#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_quinine$#! isoliert werden kann."
 theiler.42.d.thymol: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Thymol#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_thymol$#! isoliert werden kann."
 theiler.42.d.pilocarpine: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Pilocarpine#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_pilocarpine$#! isoliert werden kann."
 theiler.42.d.ephedrine: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Ephedrin#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_ephedrine$#! isoliert werden kann."
 theiler.42.d.strophantine: "In einer gemeinsamen Anstrengung haben unsere Wissenschaftler das Arzneimittel #V Strophantin#! entdeckt, das aus der Pflanze #V $je_theiler_medicinal_plant_strophantine$#! isoliert werden kann."
 theiler.42.f.strychnine: "#V Strychnin#! wurde erstmals aus den Bohnen des Strychnos Ignatii, einem in Südostasien heimischen Baum, isoliert. Es fand Verwendung als Pestizid und in winzigen Dosen als Muskel-, Herz- und Darmstimulans. Am bekanntesten ist es jedoch wohl für seine Neurotoxizität, da Überdosierungen unter anderem zu Krampfanfällen, Schweißausbrüchen und Kiefersperre führen und tödlich sein können, was es zur Droge der Wahl für potenzielle Mörder und Krimiautoren macht."
 theiler.42.f.emetine: "#V Emetine#! ist ein Wirkstoff, der in Carapichea ipecacuanha, auch bekannt als Ipecac-Wurzel, einer in Mittel- und Südamerika heimischen Blume, vorkommt. Er wurde ursprünglich zur Behandlung von Amöbenruhr, einer Infektion des Darms, eingesetzt. Sein Name leitet sich von seiner emetischen Nebenwirkung ab – seiner Neigung, Übelkeit und Erbrechen zu verursachen."
 theiler.42.f.atropine: "#V Atropin#! ist ein Medikament, das aus Atropa Belladonna, auch bekannt als Tollkirsche, gewonnen wird, einer Pflanze, die in Europa und Westasien heimisch ist. Atropin wird in verschiedenen Formen zur Behandlung von Asthma, zur Blockierung von Nebenwirkungen der Nervenstimulation, zur Verringerung der Speichelproduktion, zur Behandlung bestimmter Gifte und von Frauen zur kosmetischen Erweiterung der Pupillen verwendet."
 theiler.42.f.aloin: "#V Aloin#! ist ein natürlicher Wirkstoff, der vor allem in unterschiedlichen Konzentrationen in Pflanzen der Gattung Aloe vorkommt. Er wird als Abführmittel, zur Behandlung von Sonnenbrand, zur Wundversorgung und aufgrund seiner antioxidativen und entzündungshemmenden Eigenschaften verwendet."
 theiler.42.f.digitoxin: "#V Digitoxin#! ist ein natürlicher Wirkstoff, der in Digitalis purpurea, auch bekannt als Fingerhut, einer in ganz Europa und Marokko heimischen Pflanze, vorkommt. Digitoxin wird zur Verringerung von Flüssigkeitsansammlungen in den Muskeln (Wassersucht), zur Erleichterung des Wasserlassens und zur Behandlung von Herzrhythmusstörungen und Herzinsuffizienz eingesetzt. Wie der Name schon sagt, hat es jedoch toxische Eigenschaften, die zu Herzrhythmusstörungen, Übelkeit, Herzstillstand und Tod führen können."
 theiler.42.f.quinine: "#V Chinin#! ist ein Medikament, das erstmals aus der Rinde eines in Peru heimischen Cinchoha-Baums isoliert wurde. Chinin hat eine illustre Geschichte. Die Rinde wurde zunächst von den Quechua als Muskelrelaxans verwendet und dann von Jesuiten nach Europa gebracht, wo es zur Behandlung von Malaria eingesetzt wurde. Das aus dieser Rinde gewonnene Chinin verbreitete sich schnell und ermöglichte den Europäern weitere Kolonialisierungs- und Eroberungsvorhaben auf dem afrikanischen Kontinent. Es kann auch zur Behandlung von Scharlach, Gelbfieber und Grippe eingesetzt werden."
 theiler.42.f.thymol: "#V Thymol#! ist ein Medikament, das hauptsächlich aus Thymus vulgaris, dem gewöhnlichen Thymian, gewonnen wird, einer Pflanze, die in Südeuropa heimisch ist, aber auch in verschiedenen anderen Pflanzen weltweit vorkommt. Es ist bekannt für seine antimikrobiellen, antimykotischen und antiseptischen Eigenschaften und wurde daher häufig zur Wundbehandlung, für die Zahnhygiene und zur Bekämpfung von Parasiten eingesetzt."
 theiler.42.f.pilocarpine: "#V Pilocarpin#! ist ein Medikament, das aus Pflanzen der Gattung Pilocarpus gewonnen wird, die in den tropischen Regionen Südamerikas heimisch sind. Es wird zur Stimulierung der Speichel- und Schweißproduktion eingesetzt und daher häufig zur Behandlung von Mundtrockenheit verwendet, die durch Erkrankungen oder als Nebenwirkung anderer Behandlungen verursacht wird. Es wird auch zur Behandlung verschiedener Augenerkrankungen eingesetzt."
 theiler.42.f.ephedrine: "#V Ephedrin#! ist ein Stimulans, das aus der Ephedra Sinica-Pflanze gewonnen wird, die in den Hochländern Nordchinas, der Mongolei und Russlands heimisch ist. Es wurde zur Behandlung von Asthma, Narkolepsie, Fettleibigkeit und Nasenverstopfung eingesetzt. Es hat zahlreiche Nebenwirkungen, darunter Schlafstörungen, Kopfschmerzen, Angstzustände, Halluzinationen, Bluthochdruck und erhöhte Herzfrequenz. Die beiden letztgenannten führten dazu, dass es als leistungssteigerndes Stimulans verwendet wurde."
 theiler.42.f.strophantine: "#V Strophantin#! ist ein Medikament, das aus Pflanzen der Gattung Strophantus gewonnen wird, die in Afrika heimisch sind. Strophantin wurde zur Verbesserung der Herzfunktion, zur Behandlung von Herzinsuffizienz und zur Verbesserung der Leistungsfähigkeit des Nervensystems eingesetzt, in hohen Konzentrationen jedoch auch als Pfeilgift verwendet."
