 theiler.10.t: "Die Geburt der Mikrobiologie"
 theiler.10.d: "Eine neue Studie sorgt in Biologie- und Medizin-Kreisen für Aufsehen. Ihr Autor, Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName], hat Entdeckungen über Bakterien gemacht, die unsere Sicht auf die Welt verändern könnten."
 theiler.10.f: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] hat mit seiner systematischen Arbeit zur Klassifizierung von Bakterien bemerkenswerte Ergebnisse erzielt. [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis|U]e „Forschung über Bakterien” hat Bakterien als eigenständige taxonomische Gruppe mit reproduzierbaren Eigenschaften etabliert. [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe|U] hat gezeigt, dass Bakterien genauso rigoros kultiviert, untersucht und klassifiziert werden können wie Pflanzen oder Tiere. Am bedeutendsten ist, dass [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis]e Methoden es Forschern ermöglichen, zwischen harmlosen und pathogenen Bakterien zu unterscheiden. Die Methoden von [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] könnten die Grundlage für einen völlig neuen Zweig der Medizin bilden – einen, der endlich die Mechanismen von Infektionskrankheiten erklären könnte."
 theiler.10.g: "Ein Durchbruch bei der Suche nach Mikroorganismen."
 theiler.10.h: "Ein Durchbruch für die Keimtheorie."
