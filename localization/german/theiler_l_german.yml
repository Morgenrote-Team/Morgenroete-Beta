 theiler.51.p: "Der Polio-Erreger."
 theiler.52.t: "Impfstoffforschung"
 theiler.52.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] hat sich zum Ziel gesetzt, einen revolutionären Impfstoff zu entwickeln, um eine Geißel der Menschheit zu beseitigen. Allerdings steht noch nicht fest, gegen welche Krankheit der Impfstoff entwickelt werden soll."
 theiler.52.f: "Impfstoffe sind die wirksamste Waffe der Medizin und Biologie gegen Krankheiten. In Verbindung mit einem starken Gesundheitssystem verhindern sie das Auftreten von Krankheiten vollständig. Bevor ein Impfstoff entwickelt werden kann, müssen Biologen den entsprechenden Erreger erforscht haben. Einige Impfstoffe erfordern technologische Voraussetzungen – beispielsweise sind für Typhus, Gelbfieber und Diphtherie genetische Kenntnisse erforderlich."
