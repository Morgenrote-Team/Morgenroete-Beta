 theiler_cell_culture_tech: "Zellkultur"
 theiler_cell_culture_tech_desc: "Zellkultur ist die Kultivierung von tierischen oder pflanzlichen Zellen in einem Nährmedium außerhalb des Organismus. Im Jahr 1885 gelang es Wilhelm Roux als Erstem, embryonale Hühnerzellen mehrere Tage lang in einer Kochsalzlösung zu erhalten und damit das Grundprinzip zu demonstrieren. Im Jahr 1907 kultivierte Ross Granville Harrison das Rückenmark von Amphibien und zeigte, dass sich Axone als Verlängerungen einzelner Nervenzellen entwickeln. Im Jahr 1913 kultivierten Edna Steinhardt, Chai Israeli und Robert A. Lambert das Vaccinia-Virus auf Fragmenten der Hornhaut von Meerschweinchen."
 theiler.51.t: "Krankheitserregerforschung"
 theiler.51.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] hat beschlossen, einen gefährlichen Erreger genauer zu untersuchen, um neue Erkenntnisse über diese Geißel der Menschheit zu gewinnen. Das Forschungsprojekt ist noch nicht abgeschlossen."
 theiler.51.f: "Die Untersuchung eines Krankheitserregers, die aus der Entdeckung und Isolierung besteht, ist ein wichtiger Schritt für die spätere Entwicklung eines wirksamen Impfstoffs. Die Untersuchung eines bestimmten Krankheitserregers erfordert eine Beschreibung der Krankheit, ein achromatisches Mikroskop oder Elektronenmikroskop (je nachdem, ob es sich um ein Bakterium oder ein Virus handelt) und eine bestimmte Anzahl bekannter Mikroben – letztendlich muss der Biologe in der Lage sein, den Keim zu unterscheiden."
 theiler.51.g: "Der Cholera-Erreger."
 theiler.51.h: "Der Tuberkulose-Erreger."
 theiler.51.i: "Der Pocken-Erreger."
