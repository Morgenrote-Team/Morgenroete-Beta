 theiler.2101.t: "Mikrobiologisches Institut"
 theiler.2101.d: "Die intensive Erforschung des Erregers hat führende Wissenschaftler des Teams [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] dazu veranlasst, ein mikrobiologisches Institut zu gründen, um die Forschung effizienter voranzutreiben."
 theiler.2101.f: "Nach seinen Erfolgen bei der Identifizierung von Krankheitserregern (Anthrax 1876, Tuberkulose 1882, Cholera 1884) erhielt Robert Koch Unterstützung von der preußischen Regierung, um ein eigenes Institut zu gründen. Es war das erste Forschungszentrum, das sich systematisch und institutionell mit Mikroorganismen als Ursache von Krankheiten befasste. Louis Pasteurs „Laboratoire de Chimie Physiologique” in Paris (ab 1887) zeigte bereits den Charakter einer solchen Forschungseinrichtung. Offiziell gilt jedoch das Robert-Koch-Institut (1891) als das erste mikrobiologische Institut im modernen Sinne."
 theiler.2101.g: "Das Institut sollte sich der allgemeinen Forschung widmen."
 theiler.2101.h: "Das Institut sollte sich der Erregerforschung widmen."
 theiler.2102.t: "Verbesserte Labormethode"
 theiler.2102.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] modernisierte die Ausstattung des mikrobiologischen Labors, führte neue Färbemethoden und verbesserte Mikroskope ein und erzielte damit einen Durchbruch in der Erforschung von Krankheitserregern."
 theiler.2102.f: "Seit den 1860er Jahren revolutionierten synthetische Anilinfarbstoffe die Mikrobiologie. Methylenblau, Fuchsin und später Gram- (1884) und Ziehl-Neelsen-Färbungen ermöglichten erstmals die Unterscheidung von Bakterien. Um 1900 kamen spezielle Färbungen für Sporen, Kapseln und Diphtheriebazillen hinzu; ab 1920 verbreiteten sich Giemsa- und Silberfärbungen, und in den 1940er Jahren tauchten die ersten Fluoreszenzverfahren auf."
 theiler.2102.g: "Gut."
 theiler.2103.t: "Internationale Zusammenarbeit"
 theiler.2103.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scopet').GetLastName] aus [SCOPE.sCountry('theiler_country_scope').GetName] schrieb einen Brief. Der Biologe, ein Freund von Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], lieferte einige Hinweise für [ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis]e Forschung zu Krankheitserregern."
 theiler.2103.f: "Ab 1885 arbeitete der japanische Arzt Shibasaburo Kitasato am Berliner Institut von Robert Koch. Unter Kochs Anleitung gelang ihm 1889 die erste Reinkultur des Tetanus-Erregers, ein Meilenstein in der Bakteriologie. Gemeinsam legten sie den Grundstein für die Serumtherapie, die später zur Behandlung von Tetanus und Diphtherie eingesetzt wurde. Ihre Zusammenarbeit gilt als frühes Beispiel für erfolgreiche internationale Forschung."
 theiler.2103.g: "Dies wird die Erforschung von Krankheitserregern beschleunigen."
 theiler.2103.h: "Dieses Wissen verschafft uns weitere Einblicke."
 theiler.2104.t: "Laborunfall"
 theiler.2104.d: "Bei der Suche nach dem Krankheitserreger kam es zu einem schweren Zwischenfall: Aufgrund laxer Sicherheitsvorkehrungen infizierten sich unsere Forscher. Zahlreiche Mitarbeiter müssen unter Quarantäne gestellt werden, und die wissenschaftlichen Arbeiten könnten für Monate unterbrochen werden."
 theiler.2104.f: "Die Arbeit mit Krankheitserregern war äußerst riskant. Zahlreiche Mikrobiologen infizierten sich während ihrer Forschungen: Robert Koch erkrankte wiederholt an Anthrax und Tuberkulose, Emil von Behring infizierte sich bei Experimenten mit Diphtherietoxin und Max von Pettenkofer nahm Cholera-Bakterien zu sich, um seine Theorie zu überprüfen. Die Schutzmaßnahmen waren rudimentär, sodass viele Forscher an leichten bis schweren Infektionen litten. Diese Erfahrungen trugen später zur Entwicklung moderner Laborsicherheitsstandards bei."
 theiler.2104.g: "Eine Katastrophe!"
 theiler.2104.h: "Wir müssen das Labor um jeden Preis neu organisieren!"
 theiler.2105.t: "Kontaminierte Proben"
 theiler.2105.d: "Wie sich herausstellte, waren einige der Proben, mit denen das wissenschaftliche Team von Doktor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] arbeitete, kontaminiert, was die Suche nach dem Erreger leider zurückwarf."
 theiler.2105.f: "Arbeiten zu Anthrax, Tuberkulose oder Diphtherie waren häufig durch Schimmel, andere Bakterien oder unreine Serumproben kontaminiert. Auch Pasteurs frühe Impfstoffexperimente litten darunter. Solche Kontaminationen führten zu falschen Schlussfolgerungen über Krankheitserreger und trieben die Entwicklung von Reinkulturtechniken, Sterilisation und aseptischen Verfahren erheblich voran. Durch die Zellkulturforschung sind solche Vorfälle weniger wahrscheinlich."
 theiler.2105.g: "Welcher Wissenschaftler war dafür verantwortlich?"
 theiler.2106.t: "Streit unter Forschern"
 theiler.2106.d: "Es ist eine hochrangige wissenschaftliche Kontroverse über die Suche nach Krankheitserregern entbrannt. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], einer der führenden Ärzte unseres Landes, hat in einem Austausch mit Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] dessen bisherige Entdeckungen kritisiert. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] behauptet, der Biologe sei auf dem völlig falschen Weg. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] hingegen behauptet, der Arzt habe überhaupt keine Ahnung von diesem Thema."
 theiler.2106.f: "„Deine Experimente stinken schlimmer als eine Petrischale nach zwei Wochen!“\n„Und du diagnostizierst Krankheiten mit der Sicherheit eines Münzwurfs!“\n„Bitte, ich rette Leben, während du Bakterien wie Haustiere streichelst!“\n„Ha! Bessere Haustiere als Patienten, die deine Pillen in Panik schlucken!“\n„Mikroskop-Plünderer!“\n„Stethoskop-Sodomit!“"
 theiler.2106.g: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat Recht."
 theiler.2106.h: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] hat Recht."
 theiler.2106.i: "Sie sollten recherchieren, nicht streiten!"
 theiler.2107.t: "Wissenschaftliche Mitarbeiter"
 theiler.2107.d: "Unser Biologe Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] hat vorgeschlagen, einige Studenten und Assistenten aus der akademischen Welt abzuziehen und sie ins Labor zu schicken, um bei [ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis]er Forschung zu unterstützen."
 theiler.2107.f: "„Wir könnten ihre Karrieren ruinieren, aber hey, es ist im Namen der WISSENSCHAFT!“"
 theiler.2107.g: "Stellen Sie zusätzliche Assistenten ein."
 theiler.2107.h: "Junge Akademiker werden anderswo gebraucht."
 theiler.2111.t: "Militärische Impfstoffverwendung"
 theiler.2111.d: "Der Impfstoff, an dem Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] arbeitet, hat bedeutende Erfolge erzielt. Das Militär zeigt bereits großes Interesse daran, um die Gesundheit seiner Soldaten zu gewährleisten und die Zahl der Opfer im nächsten Krieg zu reduzieren."
 theiler.2111.f: "Impfungen verschafften im Krieg entscheidende Vorteile: Britische Truppen in Indien nutzten die Pockenimpfung und -variolation, um sich vor Epidemien zu schützen. Ebenso reduzierte die Gelbfieberimpfung in tropischen Gebieten zu Beginn des 20. Jahrhunderts die Zahl der Todesopfer aufgrund von Epidemien. Geimpfte Soldaten blieben einsatzfähig, während ungeimpfte Truppen durch Krankheiten geschwächt wurden – Impfstoffe wirkten somit wie strategische Waffen."
 theiler.2111.g: "Das Militär hat Vorrang bei der Impfung."
 theiler.2111.h: "Nutzen Sie die Erkenntnisse aus dieser Feldstudie, um den Impfstoff zu verbessern."
 theiler.2112.t: "Glücksgriff"
 theiler.2112.d: "Ein Assistent entdeckte unerwartet in einem Abfallbehälter eine Probe, die ein überraschend wirksames Präparat enthielt."
 theiler.2112.f: "Louis Pasteur entdeckte, dass eine „alte” Bakterienkultur der Hühnercholera Hühner nicht krank machte. Dieser Zufall führte zur Entwicklung eines abgeschwächten Impfstoffs, der Schutz bot. Jonas Salk nutzte die Entdeckung, dass Polioviren in Zellkulturen wachsen und gleichzeitig inaktiviert werden können. Dies führte zur Entwicklung des ersten sicheren Polio-Impfstoffs. Alexander Fleming bemerkte zufällig, dass Schimmel Bakterien abtötete, was zur Entdeckung des Penicillins führte."
 theiler.2112.g: "Belohnen Sie den Assistenten."
 theiler.2113.t: "Erfolgreicher Test"
 theiler.2113.d: "Eine erste Studie mit dem neuen Impfstoff hat sich als unerwartet wirksam erwiesen. Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] erwägt, viel früher mit der Massenproduktion und Massenimpfung zu beginnen. Dies ist ein glücklicher Tag für die Impfstoffforschung!"
 theiler.2113.f: "Ein herausragendes Beispiel für eine erfolgreiche Impfstoff-Pilotstudie ist der Cholera- und Pestimpfstoff, der Ende des 19. Jahrhunderts von Waldemar Haffkine entwickelt wurde. Haffkine, ein russisch-jüdischer Mikrobiologe, führte 1892 in Indien die ersten klinischen Studien mit einem Cholera-Impfstoff durch, der später in großem Umfang eingesetzt wurde. Im Jahr 1897 entwickelte er einen Impfstoff gegen die Pest, der 1898 in Indien getestet wurde und zu einem drastischen Rückgang der Todesfälle führte. Seine Arbeit gilt als Meilenstein in der modernen Impfstoffentwicklung."
 theiler.2113.g: "Ein großer Fortschritt für die Impfstoffentwicklung!"
 theiler.2113.h: "Dies sind neue Anhaltspunkte für die medizinische Forschung."
 theiler.2114.t: "Unbeabsichtigte Nebenwirkungen"
 theiler.2114.d: "In [SCOPE.sState('theiler_state_scope').GetCityHubName] hat der neue Impfstoff von Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] drastische Nebenwirkungen gezeigt. Viele der Testpersonen erkrankten schwer, einige starben sogar. Die Studie hat nicht nur das Vertrauen der Öffentlichkeit erschüttert, sondern könnte auch die Impfstoffentwicklung erheblich zurückwerfen."
 theiler.2114.f: "In den 1930er Jahren ereignete sich in Lübeck ein schwerwiegender Impfvorfall: 251 Neugeborene erhielten einen BCG-Impfstoff gegen Tuberkulose, der aufgrund eines Herstellungsfehlers mit virulenten Tuberkulosebakterien kontaminiert war. 208 Kinder erkrankten, 77 starben. Das „Lübecker Impfunglück” löste einen öffentlichen Skandal aus, verzögerte die Einführung des BCG-Impfstoffs in Deutschland und führte zur Einführung strengerer Sicherheitsstandards bei der Impfstoffherstellung."
 theiler.2114.g: "Wer hätte das ahnen können?"
 theiler.2114.h: "Führen Sie die Experimente in diesem Bereich weiterhin durch."
 theiler.2115.t: "Vorwurf des Plagiats"
 theiler.2115.d: "Ein ausländischer Biologe aus [SCOPE.sCountry('theiler_country_scope').GetName] hat die Herstellung des neuen Impfstoffs, der derzeit von Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] entwickelt wird, gründlich untersucht. [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe|U] erhebt schwerwiegende Vorwürfe: [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe|U] behauptet, es handele sich um ein Plagiat eines sehr ähnlichen Serums, das Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] patentieren lassen wollte."
 theiler.2115.f: "Zwischen dem 19. und frühen 20. Jahrhundert führten der Mangel an Patentschutz und internationalen Standards zu Streitigkeiten über die Urheberschaft in der Impfstoffforschung. Pasteur beanspruchte die Urheberschaft für den Rindercholera-Impfstoff, obwohl sein Mitarbeiter Toussaint bereits zuvor damit experimentiert hatte. Später lösten BCG-Stämme und Haffkines Cholera- und Pestimpfstoffe Kontroversen aus. Debatten über Priorität und „Plagiate” waren typisch für eine Zeit, in der Impfmethoden hochsensibel und wertvoll waren."
 theiler.2115.g: "Entschuldigung."
 theiler.2115.h: "Das ist reiner Zufall."
 theiler.2116.t: "Kostenexplosion"
 theiler.2116.d: "Es sieht so aus, als hätte Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] die Kosten für den neuen Impfstoff unterschätzt. [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis|U]e optimistische Schätzung könnte nun die gesamte Entwicklung gefährden."
 theiler.2116.f: "„Geld? Geld?! Schmutziger Mammon! Ist Ihnen nicht klar, dass ich mein Leben für die Wissenschaft opfere? Schließlich geht es hier um den endgültigen Sieg über den Tod! Um die Ausrottung einer Geißel der Menschheit! Und Sie wagen es, mit Listen, Tabellen und Bilanzen zu mir zu kommen? Was sind Sie? Ein Buchhalter? Verschwinden Sie aus meinem Labor!“"
 theiler.2116.g: "Subventioniert den neuen Impfstoff."
 theiler.2116.h: "Stellen Sie mehr Akademiker als Zeitarbeitskräfte ein."
 theiler.2116.i: "Komm damit klar."
 theiler_state_trait_cochliomyia: "Cochliomyia hominivorax"
 theiler_state_trait_cydia: "Cydia pomonella"
 je_theiler_cochliomyia_eredication: "Cochliomyia Eradication"
 je_theiler_cochliomyia_eredication_reason: "Mit den modernsten verfügbaren Methoden könnte die Ausrottung der gefährlichen Neuwelt-Schraubenwurmfliege möglich sein, wodurch Menschen und Tiere von dieser Plage befreit würden. Ein Biologe kann eine Theorie entwickeln und Feldversuche durchführen, um eine geeignete Lösung für dieses Problem zu finden.\n\nWenn der Biologe während seiner Arbeit stirbt, werden die Arbeiten zur Ausrottung des Parasiten eingestellt, aber sobald wieder ein Biologe zur Verfügung steht, werden sie fortgesetzt."
 je_theiler_cochliomyia_eredication_success: "Ein [concept_theiler_biologist] hat mindestens #ORANGE 12 Monate#! daran gearbeitet, eine Methode zur Ausrottung von Schraubenwurmfliegen zu finden."
 je_theiler_cochliomyia_eredication_goal: ""
 theiler.21.t: "Sterile-Insekten-Technik"
 theiler.21.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] hat eine unorthodoxe, aber bahnbrechende Idee entwickelt: Anstatt die Parasiten mit Pestiziden zu vernichten, wäre es vielversprechend, sterile Männchen zu züchten, damit die Weibchen keine Nachkommen mit ihnen zeugen können. "
 theiler.21.f: "Die Sterile-Insekten-Technik (SIT) wurde in den 1950er Jahren von Raymond C. Bushland und Edward F. Knipling entwickelt. Männliche Fliegen werden mit Gammastrahlung sterilisiert, die in der Regel aus Kobalt-60- oder Cäsium-137-Quellen stammt. Diese hochenergetische Strahlung zerstört die DNA in den Keimzellen, ohne die Vitalität oder Paarungsfähigkeit der Tiere wesentlich zu beeinträchtigen. Die sterilisierten Männchen werden dann massenhaft freigelassen. Da sie sich weiterhin erfolgreich mit wildlebenden Weibchen paaren, aber keine lebensfähigen Nachkommen zeugen können, bricht die Population allmählich zusammen. Die Methode war besonders erfolgreich gegen die Neuwelt-Schraubenwurmfliege, deren Ausrottung in Nord- und Mittelamerika massive wirtschaftliche und veterinärmedizinische Schäden verhindert hat."
 theiler.21.g: "Wir vernichten sie buchstäblich?"
 theiler.22.t: "Ausrottung von Schraubenwurmfliegen in [SCOPE.sState('theiler_state_scope').GetName]"
 theiler.22.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] berichtet, dass die Neuwelt-Schraubenwurmfliege in einer weiteren Region ausgerottet wurde."
 theiler.22.g: "Scheiß auf die Würmer!"
 theiler_cochliomyia_experiment_lab_modifier: "Schraubenwurmfliegen-Forschungslabor"
 je_theiler_sti: "Sterile-Insekten-Technik"
 je_theiler_sti_reason: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] versucht, die Schraubenwurmfliege in einer Region mithilfe moderner Technologie auszurotten."
 je_theiler_sti_success: "Ein [concept_theiler_biologist] hat mindestens #ORANGE 36 Monate#! an der Ausrottung der Schraubenwurmfliege gearbeitet."
