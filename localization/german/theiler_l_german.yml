 je_group_theiler_biology: "Morgenröte: [concept_theiler_biology]"
 je_theiler_microorganism_research_reason: "Mikroorganismus-Forschung"
 je_theiler_microorganism_research: "Doktor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] erforscht derzeit die wundersame Welt der Mikroorganismen. Je nach seinen Fähigkeiten und dem verwendeten Mikroskop wird [ROOT.Var('theiler_biologist_var').GetCharacter.GetSheHe] jeden Monat neue Mikroorganismen entdecken. Ein umfassendes Wissen über Mikroorganismen ist für den Nachweis von [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] unerlässlich.\n\nWenn unser [concept_theiler_biologist] diese Fähigkeit noch nicht erworben hat, besteht auch die Möglichkeit, dass Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] die Eigenschaft $theiler_microbiologist$ erhält."
 theiler_biologist_dies_tt: "Der Journaleintrag wird fehlschlagen, wenn der [concept_theiler_biologist] stirbt."
 je_theiler_microscope_achromatic: "Achromatisches Mikroskop"
 je_theiler_microscope_achromatic_reason: "Ernst Abbe entwickelte in den 1870er Jahren ein fortschrittliches achromatisches Mikroskop, das die Bildschärfe und Auflösung durch eine präzise optische Konstruktion erheblich verbesserte. Seine Arbeit bei Carl Zeiss legte den Grundstein für die moderne wissenschaftliche Mikroskopie und den standardisierten Linsenbau.\n\nBessere Mikroskope ermöglichen eine erfolgreichere Beobachtung von [Concept('concept_theiler_pathogen','Pathogenen')] und anderen [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]. Sie werden Fortschritte machen, wenn Sie sowohl einen [concept_tesla_engineer] als auch einen [Concept('concept_theiler_biologist','$concept_theiler_biologists$')] haben."
 je_theiler_microscope_achromatic_goal: "Ein Biologe und ein Ingenieur müssen [JournalEntry.GetTotalGoalValue|V0] Wochen lang gemeinsam an dem neuen Mikroskop arbeiten."
 je_theiler_microscope_electron: "Elektronenmikroskop"
 je_theiler_microscope_electron_reason: "Das Elektronenmikroskop, das in den 1930er Jahren von Ernst Ruska und Max Knoll entwickelt wurde, nutzt Elektronenstrahlen anstelle von Licht, um eine wesentlich höhere Auflösung zu erzielen. Es spielte eine entscheidende historische Rolle, da es Wissenschaftlern ermöglichte, Strukturen im Nanometerbereich zu beobachten, die weit über die Grenzen optischer Mikroskope hinausgingen.\n\nBessere Mikroskope ermöglichen eine erfolgreichere Beobachtung von [Concept('concept_theiler_pathogen','Pathogenen')] und anderen [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]. Sie werden Fortschritte machen, wenn Sie sowohl einen [concept_tesla_engineer] als auch einen [Concept('concept_theiler_biologist','$concept_theiler_biologists$')] haben."
 je_theiler_microscope_electron_goal: "Ein Biologe und ein Ingenieur müssen [JournalEntry.GetTotalGoalValue|V0] Wochen lang gemeinsam an dem neuen Mikroskop arbeiten."
