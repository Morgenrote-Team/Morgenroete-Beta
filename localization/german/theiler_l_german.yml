 theiler.2201.t: "Verbesserung der Landwirtschaft"
 theiler.2201.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] hat [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis] Ziel erreicht. Durch die sorgfältige Auswahl und Anwendung [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis]es biologischen Fachwissens hat [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] die Landwirtschaft unseres Landes nachhaltig gestärkt.\n\nGesamtzahl verbesserter Gebäude: [GetPlayer.MakeScope.Var('mr_num_improved_agriculture_buildings_var').GetValue|V0]\n$concept_theiler_microorganisms$ vom Projekt: [JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0] @theiler_microorganisms_texticon!"
 theiler.2201.f: "„Diese Idioten glauben immer noch, dass sie all diese Pflanzen domestiziert haben. In Wirklichkeit haben die Pflanzen uns Menschen domestiziert. Seht euch nur an, wie wir sie pflegen!“"
 theiler.2201.g: "Unsere Wirtschaft wächst!"
