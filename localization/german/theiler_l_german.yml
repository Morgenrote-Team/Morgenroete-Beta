 je_theiler_medicinal_plant_strychnine: "Strychnos Nux-Vomica"
 je_theiler_medicinal_plant_strychnine_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nStrychnos nux-vomica ist ein tropischer Baum, der in Indien und Südostasien heimisch ist. Seine Samen enthalten die Alkaloide Strychnin und Brucin, die beide hochgiftig sind. Strychnin wirkt auf das Nervensystem, verursacht schwere Muskelkrämpfe und kann zum Tod führen. Trotz seiner Giftigkeit wurden Extrakte in kleinen, kontrollierten Dosen in der Vergangenheit in der Medizin als Stimulans und zur Behandlung von Verdauungs- oder Nervenstörungen eingesetzt."
 je_theiler_medicinal_plant_strychnine_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Strychnos Nux-Vomica#! gesammelt."
 theiler_medicinal_plant_project_progress_medicinal_plants_isolated_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_theiler_biologist','$concept_theiler_biologists$')] und hat die Substanz durch einen [concept_mendelejew_chemist] isoliert.#!"
 theiler_biologist_medicinal_plant_project_progress_bar_at_full_tt: "Der Arzneimittel-Fortschritt hat #variable 100 %#! erreicht"
 je_theiler_medicinal_plant_emetine: "Carapichae Ipecacuanha"
 je_theiler_medicinal_plant_emetine_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nCarapichea ipecacuanha ist eine tropische Pflanze, die in Südamerika, insbesondere in Brasilien, heimisch ist. Ihre Wurzeln enthalten die Alkaloide Emetin und Cephaelin, die Erbrechen auslösen und eine antiparasitäre Wirkung haben. Traditionell wurde die Ipecac-Wurzel als Brechmittel zur Behandlung von Vergiftungen und als Expektorans in Hustensäften verwendet."
 je_theiler_medicinal_plant_emetine_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Carapichae Ipecacuanha#! gesammelt."
 je_theiler_medicinal_plant_atropine: "Atropa Belladonna"
 je_theiler_medicinal_plant_atropine_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nAtropa belladonna, auch bekannt als Tollkirsche, ist eine mehrjährige Pflanze, die in Europa, Nordafrika und Westasien heimisch ist. Sie enthält giftige Alkaloide wie Atropin, Scopolamin und Hyoscyamin, die das Nervensystem beeinflussen, indem sie Acetylcholinrezeptoren blockieren. Historisch wurde sie als Beruhigungsmittel, Schmerzmittel und zur Erweiterung der Pupillen verwendet. In der modernen Medizin wird gereinigtes Atropin in der Augenheilkunde und zur Behandlung von Bradykardie oder Vergiftungen durch Organophosphate eingesetzt."
 je_theiler_medicinal_plant_atropine_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Atropa Belladonna#! gesammelt."
 je_theiler_medicinal_plant_aloin: "Aloe Vera"
 je_theiler_medicinal_plant_aloin_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nAloe vera ist eine Sukkulente, die in Nordafrika und auf der Arabischen Halbinsel heimisch ist. Ihre dicken Blätter enthalten ein Gel, das reich an Polysacchariden, Vitaminen und Enzymen mit beruhigenden und feuchtigkeitsspendenden Eigenschaften ist. Das Gel wird häufig in Kosmetika und in der Medizin zur Behandlung von Verbrennungen, Wunden und Hautirritationen verwendet. Getrockneter Latex aus der inneren Schicht des Blattes enthält Aloin, eine Verbindung mit stark abführender Wirkung."
 je_theiler_medicinal_plant_aloin_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Aloe Vera#! gesammelt."
 je_theiler_medicinal_plant_digitoxin: "Digitalis purpurea"
 je_theiler_medicinal_plant_digitoxin_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nDigitalis purpurea, auch Fingerhut genannt, ist eine zweijährige Pflanze, die in Europa heimisch ist. Ihre Blätter enthalten Herzglykoside wie Digoxin und Digitoxin, die die Herzkontraktionen stärken und den Herzschlag regulieren. Traditionell wurden Extrakte zur Behandlung von Herzinsuffizienz und Herzrhythmusstörungen verwendet. Gereinigte Herzglykoside werden in Medikamenten gegen Herzerkrankungen sorgfältig dosiert, während die rohe Pflanze aufgrund der hohen Vergiftungsgefahr gemieden wird."
 je_theiler_medicinal_plant_digitoxin_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Digitalis Purpurea#! gesammelt."
 je_theiler_medicinal_plant_quinine: "Cinchona Pubescens"
 je_theiler_medicinal_plant_quinine_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nCinchona pubescens ist ein Baum, der in Südamerika, insbesondere in den Andenregionen, heimisch ist. Seine Rinde enthält Chinin und andere Alkaloide, die starke malariabekämpfende Eigenschaften haben. Traditionell wurde die Rinde zur Behandlung von Fieber und Malaria verwendet. Auch heute noch sind Chinin und seine Derivate in der Medizin zur Behandlung von Malaria von Bedeutung. Der Baum wird wegen seiner medizinisch wirksamen Rinde auch in tropischen Regionen angebaut."
 je_theiler_medicinal_plant_quinine_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Cinchona Pubescens#! gesammelt."
 je_theiler_medicinal_plant_thymol: "Thymus Vulgaris"
 je_theiler_medicinal_plant_thymol_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nThymus vulgaris, oder gewöhnlicher Thymian, ist ein kleines mehrjähriges Kraut, das im Mittelmeerraum heimisch ist. Seine Blätter und sein Öl enthalten Thymol, Carvacrol und andere ätherische Öle mit antimikrobiellen, antioxidativen und entzündungshemmenden Eigenschaften. Traditionell wird Thymian zur Behandlung von Atemwegsinfektionen, Husten und Verdauungsproblemen eingesetzt. Er findet breite Anwendung in der Kräutermedizin, Aromatherapie und als natürliches Konservierungs- oder Aromastoff in Lebensmitteln."
 je_theiler_medicinal_plant_thymol_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Thymus Vulgaris#! gesammelt."
 je_theiler_medicinal_plant_pilocarpine: "Pilocarpusp Pennatifolius"
 je_theiler_medicinal_plant_pilocarpine_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nPilocarpus pennatifolius ist ein tropischer Strauch, der in Brasilien heimisch ist. Seine Blätter enthalten das Alkaloid Pilocarpin, das die Speichel- und Schweißdrüsen stimuliert. Traditionell wurde es zur Behandlung von Mundtrockenheit und Augenerkrankungen verwendet. In der modernen Medizin wird Pilocarpin zur Behandlung von Glaukomen durch Senkung des Augeninnendrucks und zur Behandlung von Xerostomie (Mundtrockenheit) aufgrund von Bestrahlung oder Medikamenten eingesetzt. Die Pflanze wird vor allem wegen ihrer pharmakologisch wirksamen Alkaloide geschätzt."
 je_theiler_medicinal_plant_pilocarpine_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Pilocarpusp Pennatifolius#! gesammelt."
 je_theiler_medicinal_plant_ephedrine: "Ephedra sinica"
 je_theiler_medicinal_plant_ephedrine_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nEphedra sinica, auch bekannt als Ma Huang, ist ein Strauch, der in China und Zentralasien heimisch ist. Seine Stängel enthalten Ephedrin und Pseudoephedrin, Alkaloide, die das Nervensystem stimulieren und die Bronchien erweitern. In der chinesischen Medizin wurde es zur Behandlung von Asthma, Bronchitis und Nasenverstopfung eingesetzt. Seine Verwendung ist aufgrund des Risikos von Bluthochdruck, Herzproblemen und anderen Nebenwirkungen eingeschränkt."
 je_theiler_medicinal_plant_ephedrine_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Ephedra Sinica#! gesammelt."
 je_theiler_medicinal_plant_strophantine: "Strophanthus Gratus"
 je_theiler_medicinal_plant_strophantine_reason: "Der Prozess der Erfindung eines neuen Arzneimittels verläuft in der Regel wie folgt: Basierend auf dem Niveau Ihrer medizinischen Technik schlägt ein [concept_panum_physician] vor, bestimmte [concept_ito_medicinal_plants] für medizinische Zwecke zu finden, in diesem Fall mindestens #V 5 [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. Ein [concept_dubois_naturalist] wird damit beauftragt, genügend Proben zu sammeln, um sie zu isolieren. Ein [concept_mendelejew_chemist] isoliert dann die chemische Substanz. Sobald sie gefunden wurde, kann ein [concept_theiler_biologist] das Arzneimittel herstellen.\n\nStrophanthus gratus ist eine in Westafrika heimische Kletterpflanze. Ihre Samen enthalten Herzglykoside wie Ouabain, die die Herzkontraktionen stark beeinflussen. Traditionell wurden Extrakte als Pfeilgift und in kleinen Dosen zur Behandlung von Herzerkrankungen verwendet. Ouabain wurde bei Herzinsuffizienz und Herzrhythmusstörungen untersucht."
 je_theiler_medicinal_plant_strophantine_success: "[GetPlayer.GetAltName('NOM')] hat mindestens #V 5 Strophanthus Gratus#! gesammelt."
