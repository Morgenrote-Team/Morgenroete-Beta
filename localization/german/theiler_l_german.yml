 theiler_microbiology_tech_desc: "Mikrobiologische Untersuchungen wurden bereits seit dem 17. Jahrhundert mit ersten Mikroskopen durchgeführt, doch erst mit den medizinischen Fortschritten des 19. Jahrhunderts und der Verbesserung der Mikroskoptechnik entstand ein neuer Zweig der biologisch-medizinischen Forschung, der viele Bereiche des alltäglichen Lebens grundlegend veränderte."
