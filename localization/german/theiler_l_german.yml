 theiler.101.t: "Vibrio Cholerae"
 theiler.101.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Choleraerreger zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.101.f: "Das Bakterium Vibrio cholerae wurde erstmals 1854 vom italienischen Anatom Filippo Pacini beschrieben, seine Rolle bei Choleraausbrüchen wurde jedoch erst 1884 von Robert Koch bestätigt. Es handelt sich um einen gekrümmten, stäbchenförmigen Organismus, der in aquatischen Umgebungen, insbesondere in warmem Brackwasser, gedeiht. V. cholerae ist gramnegativ, besitzt ein einziges polares Flagellum für die Fortbewegung und sezerniert Cholera-Toxin, das den Wasserhaushalt des Darms stört und schweren Durchfall verursacht."
 theiler.101.g: "Fieses kleines Ding."
 theiler.201.t: "Mycobacterium Tuberculosis"
 theiler.201.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Erreger der Tuberkulose zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.201.f: "Dieses Bakterium wurde 1882 von Robert Koch identifiziert, wofür er 1905 den Nobelpreis erhielt. M. tuberculosis ist ein langsam wachsender, stäbchenförmiger Organismus mit einer wachsartigen Zellwand, die reich an Mykolsäuren ist, wodurch er gegen die Standard-Gram-Färbung und viele Antibiotika resistent ist. Stattdessen wird er als „säurefest” klassifiziert. Der Erreger ist streng aerob und befällt in erster Linie die Lunge, kann sich jedoch auch auf andere Organe ausbreiten."
 theiler.201.g: "Deine Zeit ist vorbei, stiller Stalker."
 theiler.301.t: "Orthopoxvirus Variolae"
 theiler.301.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Erreger der Pocken zu identifizieren und zu isolieren. Lange nach der ersten Impfung kann der Erreger nun beobachtet und klassifiziert werden."
 theiler.301.f: "Der Erreger der Pocken, das Variola-Virus, gehört zur Familie der Poxviridae. Im Gegensatz zu den meisten Viren repliziert es sich vollständig im Zytoplasma der Wirtszellen. Es handelt sich um ein großes, ziegelsteinförmiges Virus, das doppelsträngige DNA enthält. Variola war das Ziel der ersten erfolgreichen Impfung, die 1796 von Edward Jenner eingeführt wurde, und wurde 1980 als erster menschlicher Erreger durch Impfung ausgerottet."
 theiler.301.g: "Wie konnte etwas so Kleines ganze Reiche zu Fall bringen?"
 theiler.401.t: "Rickettsia Prowazekii"
 theiler.401.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Typhus-Erreger zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.401.f: "Henrique da Rocha Lima entdeckte dieses Bakterium im Jahr 1916. Er benannte es nach seinem Kollegen Stanislaus von Prowazek, der 1915 an Typhus gestorben war. Sowohl Prowazek als auch Rocha Lima hatten sich mit Typhus infiziert, während sie dessen Erreger in einem Kriegsgefangenenlagerkrankenhaus in Cottbus, Deutschland, untersuchten. Dieses Bakterium hat keine Geißeln und ist aerob. Es wird als gramnegativ eingestuft, da seine Zellwände die Kristallviolett-Gram-Färbung nicht zurückhalten; gramnegative Bakterien sind im Allgemeinen resistenter gegen viele Antibiotika wie Penicillin."
 theiler.401.g: "Ein kleiner, grimmiger Anhalter!"
 theiler.501.t: "Orthoflavivirus Flavi"
 theiler.501.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Erreger des Gelbfiebers zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.501.f: "Das Gelbfiebervirus wurde erstmals 1927 bei einem Patienten in Ghana isoliert. Es gehört zur Familie der Flaviviridae und trägt ein einzelsträngiges, positiv orientiertes RNA-Genom. Das Virus wird durch Aedes-Mücken, vor allem Aedes aegypti, übertragen. Eine Infektion kann Fieber, Muskelschmerzen und Gelbsucht verursachen und in schweren Fällen zu Blutungen und Organversagen führen."
 theiler.501.g: "Einer der grausamsten Tricks der Natur wird enthüllt."
 theiler.601.t: "Masern Morbillivirus"
 theiler.601.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Erreger der Masern zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.601.f: "Das Masernvirus gehört zur Gattung Morbillivirus innerhalb der Familie Paramyxoviridae. Es handelt sich um ein umhülltes Virus mit einem einzelsträngigen Negativ-RNA-Genom. Die Übertragung erfolgt über Tröpfcheninfektion, und das Virus ist eines der ansteckendsten, die dem Menschen bekannt sind. Masern verursachen Fieber, Husten, Bindehautentzündung und einen charakteristischen Hautausschlag und können zu schweren Komplikationen wie Lungenentzündung oder Enzephalitis führen."
 theiler.601.g: "Ein winziger Terrorist, der seine Angriffe auf das Immunsystem ausführt."
 theiler.701.t: "Streptococcus Pyogenes"
 theiler.701.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Erreger der Scharlacherkrankung zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.701.f: "Das Bakterium Streptococcus pyogenes ist ein grampositives Kokkuszell, das in Ketten angeordnet ist. Es wird als β-hämolytischer Streptokokkus der Gruppe A klassifiziert und wurde erstmals im 19. Jahrhundert mit Scharlach in Verbindung gebracht. Seine Virulenz beruht auf sekretierten Exotoxinen, darunter das erythrogene Toxin, das für den Hautausschlag verantwortlich ist. Dieser Organismus verursacht auch Halsentzündungen, Impetigo und rheumatisches Fieber."
 theiler.701.g: "Was für ein schlauer kleiner Schlingel..."
 theiler.801.t: "Yersinia Pestis"
 theiler.801.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Erreger der Pest zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.801.f: "Yersinia pestis wurde 1894 von Alexandre Yersin während eines Ausbruchs in Hongkong entdeckt. Es handelt sich um ein gramnegatives, nicht bewegliches Kokkobazillus. Das Bakterium wird durch Flöhe übertragen, die sich von infizierten Nagetieren ernähren, vor allem von schwarzen Ratten. Es verursacht drei Formen der Pest: Beulenpest, septikämische Pest und Lungenpest. Ohne Behandlung ist die Sterblichkeitsrate extrem hoch."
 theiler.801.g: "Das ist also der mikroskopische Sensenmann?"
 theiler.901.t: "Corynebacterium diphtheriae"
 theiler.901.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Erreger der Diphtherie zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.901.f: "Dieses grampositive, keulenförmige Bakterium wurde 1883 von Edwin Klebs als Ursache für Diphtherie identifiziert und im folgenden Jahr von Friedrich Löffler kultiviert. C. diphtheriae ist aerob und nicht beweglich. Seine gefährlichste Eigenschaft ist das Diphtherietoxin, das von einem Bakteriophagen kodiert wird und Herz- und Nervengewebe schädigt. Die Krankheit war einst eine der häufigsten Todesursachen bei Kindern, wird heute jedoch durch Impfungen kontrolliert."
 theiler.901.g: "Täuschend einfach, verheerend grausam."
 theiler.1001.t: "Poliovirus"
 theiler.1001.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] gelang es, den Polio-Erreger zu identifizieren und zu isolieren. Dies ist ein Meilenstein für die Entwicklung eines wirksamen Impfstoffs."
 theiler.1001.f: "Das Poliovirus gehört zur Familie der Picornaviridae und wurde erstmals 1909 isoliert. Es handelt sich um ein kleines, nicht umhülltes Virus mit einem einzelsträngigen, positiv orientierten RNA-Genom. Das Virus verbreitet sich hauptsächlich über den fäkal-oralen Weg und befällt die Motoneuronen im Rückenmark, was manchmal zu einer irreversiblen Lähmung führt. Durch weltweite Impfkampagnen ist das Poliovirus fast vollständig ausgerottet worden."
 theiler.1001.g: "Wie kann etwas Unsichtbares so viel zerstören?"
 theiler.102.t: "Cholera-Impfstoff"
 theiler.102.d: "Nach zahlreichen Experimenten, Rückschlägen und Tests gelang Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] ein Durchbruch: Der Impfstoff gegen Cholera ist nicht mehr nur ein Traum, sondern Realität. Eine medizinische und biologische Revolution!"
 theiler.102.f: "Der erste Cholera-Impfstoff wurde 1885 vom spanischen Arzt Jaime Ferrán entwickelt, der lebende abgeschwächte Vibrio cholerae-Stämme verwendete. Seine Feldversuche während eines Ausbruchs in Valencia waren eine der frühesten Massenimpfungen gegen eine bakterielle Erkrankung. Spätere Impfstoffe basierten auf abgetöteten Ganzzellpräparaten und schließlich auf modernen oralen Formulierungen, die abgetötete Bakterien mit der rekombinanten B-Untereinheit des Cholera-Toxins kombinierten."
 theiler.102.g: "Die Wissenschaft schlägt zurück."
 theiler.202.t: "Tuberkulose-Impfstoff"
 theiler.202.d: "Nach zahlreichen Experimenten, Rückschlägen und Tests gelang Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] ein Durchbruch: Der Impfstoff gegen Tuberkulose ist nicht mehr nur ein Traum, sondern Realität. Eine medizinische und biologische Revolution!"
 theiler.202.f: "Der Bacillus Calmette-Guérin (BCG)-Impfstoff wurde 1921 von den französischen Wissenschaftlern Albert Calmette und Camille Guérin eingeführt. Er basiert auf einem lebenden, abgeschwächten Stamm von Mycobacterium bovis, einem Verwandten von M. tuberculosis. Der Impfstoff bietet einen variablen Schutz gegen Lungentuberkulose, ist jedoch hochwirksam bei der Vorbeugung schwerer Formen bei Kindern, wie Miliartuberkulose und tuberkulöser Meningitis."
 theiler.202.g: "Ein Funke der Verteidigung gegen den stillen Stalker."
 theiler.402.t: "Typhus-Impfstoff"
 theiler.402.d: "Nach zahlreichen Experimenten, Rückschlägen und Tests gelang Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] ein Durchbruch: Der Impfstoff gegen Typhus ist nicht mehr nur ein Traum, sondern Realität. Eine medizinische und biologische Revolution!"
 theiler.402.f: "Der erste wirksame Typhus-Impfstoff wurde in den 1930er Jahren vom polnischen Biologen Rudolf Weigl entwickelt. Er züchtete Rickettsia prowazekii im Darm von Läusen und verwendete inaktivierte Bakterien zur Immunisierung. Während des Zweiten Weltkriegs nutzte sein Labor in Lemberg die Impfstoffproduktion heimlich, um Menschen, die von der Verfolgung durch die Nazis bedroht waren, zu beherbergen und zu beschäftigen. Moderne Impfstoffe gegen epidemischen Typhus werden heute nur noch selten verwendet."
 theiler.402.g: "Wir haben den Anhalter überlistet."
 theiler.502.t: "Gelbfieberimpfung"
 theiler.502.d: "Nach zahlreichen Experimenten, Rückschlägen und Tests gelang Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] ein Durchbruch: Der Impfstoff gegen Gelbfieber ist nicht mehr nur ein Traum, sondern Realität. Eine medizinische und biologische Revolution!"
 theiler.502.f: "Der Gelbfieberimpfstoff wurde in den 1930er Jahren vom südafrikanischen Virologen Max Theiler entwickelt, der später 1951 den Nobelpreis erhielt. Er schwächte das Virus ab, indem er es mehrfach in Hühnerembryonen passagierte und so den Stamm 17D herstellte. Dieser lebende, abgeschwächte Impfstoff ist nach wie vor einer der wirksamsten Impfstoffe, die je entwickelt wurden, und verleiht nach einer einzigen Dosis eine lang anhaltende Immunität."
 theiler.502.g: "Ein Schlag gegen die durch Mücken übertragene Krankheit."
 theiler.602.t: "Masern-Impfung"
 theiler.602.d: "Nach zahlreichen Experimenten, Rückschlägen und Tests gelang Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] ein Durchbruch: Der Impfstoff gegen Masern ist nicht mehr nur ein Traum, sondern Realität. Eine medizinische und biologische Revolution!"
 theiler.602.f: "Der Masernimpfstoff wurde 1963 zugelassen und von John Enders und seinen Kollegen entwickelt, nachdem sie das Virus erfolgreich in Hühnerembryozellen gezüchtet hatten. Der lebende, abgeschwächte Impfstoff reduzierte die Zahl der Masern-Todesfälle weltweit drastisch. Später wurde er mit Impfstoffen gegen Mumps und Röteln kombiniert, um den MMR-Impfstoff zu bilden, der nach wie vor ein Eckpfeiler der routinemäßigen Impfungen im Kindesalter ist."
 theiler.602.g: "Das kleine Monster hat seinen Meister gefunden."
 theiler.802.t: "Pest-Impfstoff"
 theiler.802.d: "Nach zahlreichen Experimenten, Rückschlägen und Tests gelang Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] ein Durchbruch: Der Impfstoff gegen die Pest ist nicht mehr nur ein Traum, sondern Realität. Eine medizinische und biologische Revolution!"
 theiler.802.f: "Der erste Pestimpfstoff wurde 1897 von Waldemar Haffkine eingeführt, der während einer Epidemie in Bombay tätig war. Er verwendete durch Hitze abgetötete Yersinia pestis-Bakterien, um einen injizierbaren Impfstoff herzustellen. Dieser senkte zwar die Sterblichkeitsrate, bot jedoch nur begrenzten und kurzzeitigen Schutz. Neuere Forschungen konzentrieren sich auf Subunit-Impfstoffe, die auf die F1- und V-Antigene des Bakteriums abzielen."
 theiler.802.g: "Die letzte Stunde des Sensenmannes ist gekommen!"
 theiler.902.t: "Diphtherie-Impfstoff"
 theiler.902.d: "Nach zahlreichen Experimenten, Rückschlägen und Tests gelang Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] ein Durchbruch: Der Impfstoff gegen Diphtherie ist nicht mehr nur ein Traum, sondern Realität. Eine medizinische und biologische Revolution!"
 theiler.902.f: "Der Diphtherie-Toxoid-Impfstoff wurde in den 1920er Jahren entwickelt, nachdem Gaston Ramon in Frankreich und Alexander Glenny in England entdeckt hatten, dass mit Formaldehyd behandeltes Diphtherietoxin Immunität hervorrufen kann, ohne eine Erkrankung zu verursachen. Der Impfstoff, der häufig mit Tetanus- und Pertussis-Antigenen kombiniert wird (DTP-Impfstoff), hat Mitte des 20. Jahrhunderts die Kindersterblichkeit drastisch gesenkt."
 theiler.902.g: "Das Keuchen in der Nacht ist vorbei."
 theiler.1002.t: "Polio-Impfstoff"
 theiler.1002.d: "Nach zahlreichen Experimenten, Rückschlägen und Tests gelang Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] ein Durchbruch: Der Impfstoff gegen Polio ist nicht mehr nur ein Traum, sondern Realität. Eine medizinische und biologische Revolution!"
 theiler.1002.f: "Im 20. Jahrhundert wurden zwei wirksame Polio-Impfstoffe entwickelt. Jonas Salk entwickelte 1955 den inaktivierten Polio-Impfstoff (IPV) unter Verwendung chemisch abgetöteter Polioviren. Einige Jahre später führte Albert Sabin den oralen Polio-Impfstoff (OPV) ein, der auf lebenden abgeschwächten Stämmen basierte, einfacher zu verabreichen war und eine Immunität im Darm bewirkte. Beide Impfstoffe spielten eine zentrale Rolle bei den weltweiten Bemühungen zur Ausrottung der Kinderlähmung."
 theiler.1002.g: "Keine Gnade für diesen Mörder von Kinderträumen!"
