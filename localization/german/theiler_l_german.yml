 je_theiler_improve_agriculture_project_reason: "Ihr [concept_theiler_biologist] Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] konzentriert sich auf die Verbesserung der Produktion des [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nDas Projekt wird jeden Monat Fortschritte machen. Jedes Mal, wenn der Fortschritt 24 erreicht, erhält das aktuelle Gebäude einen neuen Modifikator. Sobald alle für dieses Projekt ausgewählten Gebäude die Modifikatoren haben, ist das Projekt beendet.\n\nEs gibt insgesamt 3 Modifikatoren. Jeder neue Modifikator erfordert, dass der Fortschritt erneut aufgefüllt wird.\n$mr_divider_for_je$\nAktuelles Gebäude: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_3_type')]\n\nGesamtzahl der verbleibenden Gebäude (ohne aktuelles): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n\nAktueller monatlicher Fortschritt: #underline #tooltip:[GetRawTextTooltipTag('theiler_monthly_biologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('theiler_improve_agriculture_project_progress_value')|+2]#!#!"
