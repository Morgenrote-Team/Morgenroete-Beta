 theiler_electron_microscope_modifier: "Elektronenmikroskop"
 theiler.11.t: "Das achromatische Mikroskop"
 theiler.11.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] und [GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName] haben heute ihr neues Mikroskop vorgestellt."
 theiler.11.f: "1868 erfand Ernst Abbe die apochromatische Linse, eine Mikroskoplinse, die sowohl die primäre als auch die sekundäre Farbverzerrung eliminiert. Bis 1870 erfand Abbe den Abbe-Kondensor, der zur Beleuchtung von Mikroskopen verwendet wird. Im Jahr 1871 entwarf er das erste Refraktometer, das er in einer 1874 veröffentlichten Broschüre beschrieb. Bis 1872 entwickelte er die Gesetze der Abbildung nicht leuchtender Objekte. Die Zeiss Optische Werke begannen 1872 mit dem Verkauf seiner verbesserten Mikroskope, darunter Modelle mit homogenem Immersionsobjektiv ab 1877 und seine apochromatischen Objektivmikroskope ab 1886."
 theiler.11.g: "Eine Revolution für die Mikrobiologie."
 theiler.12.t: "Das Elektronenmikroskop"
 theiler.12.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] und [GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName] haben heute ihr neues Mikroskop vorgestellt."
 theiler.12.f: "Bis heute ist umstritten, wer das Transmissionselektronenmikroskop erfunden hat. 1928 beauftragte Adolf Matthias an der Technischen Hochschule in Charlottenburg Max Knoll, ein Forscherteam zu leiten, um die Forschung zu Elektronenstrahlen und Kathodenstrahl-Oszilloskopen voranzutreiben. Das Team bestand aus mehreren Doktoranden, darunter Ernst Ruska. Im Jahr 1931 gelang es Max Knoll und Ernst Ruska, vergrößerte Bilder von Gittergittern zu erzeugen, die über einer Anodenöffnung angebracht waren. Unabhängig davon arbeitete Reinhold Rüdenberg bei Siemens-Schuckert an einem ähnlichen Projekt. Nach dem Patentrecht ist er der Erfinder des Elektronenmikroskops, aber es ist unklar, wann er ein funktionierendes Gerät hatte."
 theiler.12.g: "Es soll sogar in der Lage sein, Viren zu erkennen!"
