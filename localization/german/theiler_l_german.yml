 theiler.10.t: "The Birth of Microbiology"
 theiler.10.d: "A new study is causing a stir in the biological and medical communities. Its author, Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName], has made discoveries about bacteria that could change our view of the world."
 theiler.10.f: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName]'s systematic work on bacterial classification has yielded remarkable results. [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis|U] 'Research on Bacteria' has established bacteria as a distinct taxonomic group with reproducible characteristics. [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe|U] has demonstrated that bacteria can be cultured, studied, and classified just as rigorously as plants or animals. Most significantly, [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis] methods allow researchers to distinguish between harmless and pathogenic bacteria. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName]'s methods may provide the foundation for a entirely new branch of medical science - one that could finally explain the mechanisms of infectious disease."
 theiler.10.g: "A breakthrough in the search for microorganisms."
 theiler.10.h: "A breakthrough for germ theory."
