 je_theiler_cydia_pesticide: "Cydia-Pestizid"
 je_theiler_cydia_pesticide_reason: "Mit Grundkenntnissen über Insektizide kann ein Biologe in Zusammenarbeit mit einem Chemiker ein wirksames Mittel gegen den Apfelwickler finden.\n\nWenn der Biologe oder Chemiker während seiner Arbeit stirbt, wird die Arbeit an dem Pestizid eingestellt, aber sobald beide Wissenschaftler wieder verfügbar sind, wird sie fortgesetzt."
 je_theiler_cydia_pesticide_success: "Ein [concept_theiler_biologist] hat mindestens #ORANGE 12 Monate#! an einem neuen Pestizid gearbeitet."
 je_theiler_cydia_pesticide_goal: ""
 je_theiler_lead_arsenate: "Bleihydrogenarsenat"
 je_theiler_lead_arsenate_reason: "Unsere Obstbauern können den Apfelwickler und andere Schädlinge mit dem neu entwickelten Bleiarzenat bekämpfen, vorausgesetzt, es gibt keinen Bleimangel auf dem Markt. Es sollte möglich sein, den Parasiten jeden Monat unter Kontrolle zu bringen."
 theiler.31.t: "Bleihydrogenarsenat"
 theiler.31.d: "In Zusammenarbeit mit Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] hat Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] ein wirksames Pestizid entwickelt, dessen Massenproduktion die Landwirtschaft revolutionieren könnte. Der Apfelwickler hat seine letzte Mahlzeit in Äpfeln beendet!"
 theiler.31.f: "Bleihydrogenarsenat (PbHAsO₄) wurde 1892 von Melville Thurston Cook in Massachusetts zur Bekämpfung des Apfelwicklers (Cydia pomonella) in Obstplantagen entwickelt. Es war eine stabilere, pflanzenfreundlichere Alternative zum giftigen Kupferarsenit („Paris Green“). Das Pulver tötete Insekten beim Fressen, haftete lange Zeit an Blättern und Früchten und ermöglichte erstmals eine wirksame Bekämpfung in der kommerziellen Obstproduktion. Bleiarzenat blieb bis zur Einführung synthetischer Pestizide wie DDT weit verbreitet, obwohl es schädlich für die Umwelt und die menschliche Gesundheit war."
 theiler.31.g: "Wir vergiften sie buchstäblich?"
 theiler.31.tt: "Von nun an werden Landwirte in ihren Obstgärten Bleiarzenat einsetzen, um den Cydia-Modifikator zu beseitigen."
 theiler.32.t: "Der Apfelwickler breitet sich auf [SCOPE.sState('theiler_state_scope').GetName] aus!"
 theiler.32.d: "The codling moth has expanded its home range: from a neighboring region it has also spread into [SCOPE.sState('theiler_state_scope').GetName] to infest the orchards there."
 theiler.32.f: "Der Apfelwickler (Cydia pomonella) stammt ursprünglich aus Eurasien und verbreitete sich im 19. Jahrhundert mit dem Apfelanbau in Mitteleuropa, Norditalien, auf dem Balkan, in Ungarn, in Teilen Russlands westlich des Urals, in Nordamerika und Australien. Nordische, sehr heiße oder trockene Regionen blieben weitgehend verschont. Im 20. Jahrhundert erreichte er fast alle gemäßigten Apfelanbaugebiete weltweit, darunter Skandinavien, die baltischen Staaten und Südamerika, und wurde zu einem der bedeutendsten Schädlinge in Obstplantagen."
 theiler.32.g: "Die Obstpreise werden offenbar steigen."
 theiler.33.t: "Der Apfelwickler breitet sich nach Südamerika aus!"
 theiler.33.d: "Naturforscher und Biologen haben heute einen Bericht vorgelegt, der Landwirte und Händler gleichermaßen beunruhigt. Der berüchtigte Apfelwickler, der in Europa und Westasien heimisch ist, wurde zum ersten Mal in unseren Obstgärten entdeckt. Dies ist die erste Sichtung in Südamerika!"
 theiler.33.g: "So habe ich mir die Vorteile des internationalen Handels nicht vorgestellt..."
 theiler.34.t: "Der Apfelwickler breitet sich nach Südafrika aus!"
 theiler.34.d: "Naturforscher und Biologen haben heute einen Bericht vorgelegt, der Landwirte und Händler gleichermaßen beunruhigt. Der berüchtigte Apfelwickler, der in Europa und Westasien heimisch ist, wurde zum ersten Mal in unseren Obstgärten entdeckt. Dies ist die erste Sichtung in Südafrika!"
 theiler.35.t: "Der Apfelwickler breitet sich nach Ozeanien aus!"
 theiler.35.d: "Naturforscher und Biologen haben heute einen Bericht vorgelegt, der Landwirte und Händler gleichermaßen beunruhigt. Der berüchtigte Apfelwickler, der in Europa und Westasien heimisch ist, wurde zum ersten Mal in unseren Obstgärten entdeckt. Dies ist die erste Sichtung in Ozeanien!"
 theiler.41.t: "[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]"
 theiler.41.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat bei mehreren Behandlungen mit #V [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#! festgestellt, dass es über ein hohes Heilungspotenzial verfügt. Allerdings erfordert dies eine größere Beschaffungsmenge – und gründliche Untersuchungen, um den Wirkstoff zu isolieren. Dies würde ein völlig neues Medikament ermöglichen!"
 theiler.41.g: "Also, [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)] ist eine neue Wunderpflanze?"
