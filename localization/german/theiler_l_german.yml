 theiler.2101.t: "Mikrobiologisches Institut"
 theiler.2101.d: "Die intensive Erforschung des Erregers hat führende Wissenschaftler des Teams [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] dazu veranlasst, ein mikrobiologisches Institut zu gründen, um die Forschung effizienter voranzutreiben."
 theiler.2101.f: "Nach seinen Erfolgen bei der Identifizierung von Krankheitserregern (Anthrax 1876, Tuberkulose 1882, Cholera 1884) erhielt Robert Koch Unterstützung von der preußischen Regierung, um ein eigenes Institut zu gründen. Es war das erste Forschungszentrum, das sich systematisch und institutionell mit Mikroorganismen als Ursache von Krankheiten befasste. Louis Pasteurs „Laboratoire de Chimie Physiologique” in Paris (ab 1887) zeigte bereits den Charakter einer solchen Forschungseinrichtung. Offiziell gilt jedoch das Robert-Koch-Institut (1891) als das erste mikrobiologische Institut im modernen Sinne."
 theiler.2101.g: "Das Institut sollte sich der allgemeinen Forschung widmen."
 theiler.2101.h: "Das Institut sollte sich der Erregerforschung widmen."
 theiler.2102.t: "Verbesserte Labormethode"
 theiler.2102.d: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] modernisierte die Ausstattung des mikrobiologischen Labors, führte neue Färbemethoden und verbesserte Mikroskope ein und erzielte damit einen Durchbruch in der Erforschung von Krankheitserregern."
 theiler.2102.f: "Seit den 1860er Jahren revolutionierten synthetische Anilinfarbstoffe die Mikrobiologie. Methylenblau, Fuchsin und später Gram- (1884) und Ziehl-Neelsen-Färbungen ermöglichten erstmals die Unterscheidung von Bakterien. Um 1900 kamen spezielle Färbungen für Sporen, Kapseln und Diphtheriebazillen hinzu; ab 1920 verbreiteten sich Giemsa- und Silberfärbungen, und in den 1940er Jahren tauchten die ersten Fluoreszenzverfahren auf."
 theiler.2102.g: "Gut."
 theiler.2103.t: "Internationale Zusammenarbeit"
 theiler.2103.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scopet').GetLastName] aus [SCOPE.sCountry('theiler_country_scope').GetName] schrieb einen Brief. Der Biologe, ein Freund von Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], lieferte einige Hinweise für [ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis]e Forschung zu Krankheitserregern."
 theiler.2103.f: "Ab 1885 arbeitete der japanische Arzt Shibasaburo Kitasato am Berliner Institut von Robert Koch. Unter Kochs Anleitung gelang ihm 1889 die erste Reinkultur des Tetanus-Erregers, ein Meilenstein in der Bakteriologie. Gemeinsam legten sie den Grundstein für die Serumtherapie, die später zur Behandlung von Tetanus und Diphtherie eingesetzt wurde. Ihre Zusammenarbeit gilt als frühes Beispiel für erfolgreiche internationale Forschung."
 theiler.2103.g: "Dies wird die Erforschung von Krankheitserregern beschleunigen."
 theiler.2103.h: "Dieses Wissen verschafft uns weitere Einblicke."
 theiler.2104.t: "Laborunfall"
 theiler.2104.d: "Bei der Suche nach dem Krankheitserreger kam es zu einem schweren Zwischenfall: Aufgrund laxer Sicherheitsvorkehrungen infizierten sich unsere Forscher. Zahlreiche Mitarbeiter müssen unter Quarantäne gestellt werden, und die wissenschaftlichen Arbeiten könnten für Monate unterbrochen werden."
 theiler.2104.f: "Die Arbeit mit Krankheitserregern war äußerst riskant. Zahlreiche Mikrobiologen infizierten sich während ihrer Forschungen: Robert Koch erkrankte wiederholt an Anthrax und Tuberkulose, Emil von Behring infizierte sich bei Experimenten mit Diphtherietoxin und Max von Pettenkofer nahm Cholera-Bakterien zu sich, um seine Theorie zu überprüfen. Die Schutzmaßnahmen waren rudimentär, sodass viele Forscher an leichten bis schweren Infektionen litten. Diese Erfahrungen trugen später zur Entwicklung moderner Laborsicherheitsstandards bei."
 theiler.2104.g: "Eine Katastrophe!"
 theiler.2104.h: "Wir müssen das Labor um jeden Preis neu organisieren!"
 theiler.2105.t: "Kontaminierte Proben"
 theiler.2105.d: "Wie sich herausstellte, waren einige der Proben, mit denen das wissenschaftliche Team von Doktor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] arbeitete, kontaminiert, was die Suche nach dem Erreger leider zurückwarf."
 theiler.2105.f: "Arbeiten zu Anthrax, Tuberkulose oder Diphtherie waren häufig durch Schimmel, andere Bakterien oder unreine Serumproben kontaminiert. Auch Pasteurs frühe Impfstoffexperimente litten darunter. Solche Kontaminationen führten zu falschen Schlussfolgerungen über Krankheitserreger und trieben die Entwicklung von Reinkulturtechniken, Sterilisation und aseptischen Verfahren erheblich voran. Durch die Zellkulturforschung sind solche Vorfälle weniger wahrscheinlich."
 theiler.2105.g: "Which scientist was responsible for this?"
 theiler.2106.t: "Streit unter Forschern"
 theiler.2106.d: "Es ist eine hochrangige wissenschaftliche Kontroverse über die Suche nach Krankheitserregern entbrannt. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], einer der führenden Ärzte unseres Landes, hat in einem Austausch mit Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] dessen bisherige Entdeckungen kritisiert. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] behauptet, der Biologe sei auf dem völlig falschen Weg. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] hingegen behauptet, der Arzt habe überhaupt keine Ahnung von diesem Thema."
 theiler.2106.f: "„Deine Experimente stinken schlimmer als eine Petrischale nach zwei Wochen!“\n„Und du diagnostizierst Krankheiten mit der Sicherheit eines Münzwurfs!“\n„Bitte, ich rette Leben, während du Bakterien wie Haustiere streichelst!“\n„Ha! Bessere Haustiere als Patienten, die deine Pillen in Panik schlucken!“\n„Mikroskop-Plünderer!“\n„Stethoskop-Sodomit!“"
 theiler.2106.g: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat Recht."
 theiler.2106.h: "Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] hat Recht."
 theiler.2106.i: "Sie sollten recherchieren, nicht streiten!"
 theiler.2107.t: "Wissenschaftliche Mitarbeiter"
 theiler.2107.d: "Unser Biologe Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] hat vorgeschlagen, einige Studenten und Assistenten aus der akademischen Welt abzuziehen und sie ins Labor zu schicken, um bei [ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis]er Forschung zu unterstützen."
 theiler.2107.f: "'We could ruin their careers, but hey, it's in the name of SCIENCE!'"
 theiler.2107.g: "Hire additional assistants."
 theiler.2107.h: "Young academics are needed elsewhere."
 theiler.2111.t: "Military Vaccine Use"
 theiler.2111.d: "The vaccine Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is working on has achieved significant success. The military is already showing great interest in it as a way to ensure the health of its soldiers and reduce casualties in the next war."
 theiler.2111.f: "Vaccinations provided decisive advantages in war: British troops in India used smallpox variolation and vaccination, which protected them against epidemics. Similarly, yellow fever vaccination in tropical zones in the early 20th century reduced casualties due to epidemics. Vaccinated soldiers remained fit for duty, while unvaccinated troops were weakened by disease—vaccines thus acted like strategic weapons."
 theiler.2111.g: "The military has priority for vaccination."
 theiler.2111.h: "Use the knowledge from this field study to improve the vaccine."
 theiler.2112.t: "Lucky Find"
 theiler.2112.d: "An assistant unexpectedly discovered a sample in a waste jar containing a surprisingly effective preparation."
 theiler.2112.f: "Louis Pasteur discovered that an 'old' bacterial culture of chicken cholera did not make chickens sick. This coincidence led to the development of an attenuated vaccine that provided protection. Jonas Salk exploited the discovery that polio viruses could grow in cell cultures and be inactivated simultaneously. This led to the creation of the first safe polio vaccine. Alexander Fleming accidentally noticed that mold killed bacteria, which led to the discovery of penicillin."
 theiler.2112.g: "Reward the assistant."
 theiler.2113.t: "Successful Test"
 theiler.2113.d: "An initial trial of the new vaccine has proven unexpectedly effective. Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] is considering starting mass production and mass vaccination much sooner. This is a happy day for vaccinology!"
 theiler.2113.f: "An outstanding example of a successful vaccine pilot trial is the cholera and plague vaccine developed by Waldemar Haffkine at the end of the 19th century. Haffkine, a Russian-Jewish microbiologist, conducted the first clinical trials of a cholera vaccine in India in 1892, which was later used on a large scale. In 1897, he developed a vaccine against the plague, which was tested in India in 1898 and led to a drastic reduction in deaths. His work is considered a milestone in modern vaccine development."
 theiler.2113.g: "A major step forward for vaccine development!"
 theiler.2113.h: "These are new clues for medical research."
 theiler.2114.t: "Unintended Side Effects"
 theiler.2114.d: "In [SCOPE.sState('theiler_state_scope').GetCityHubName], Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]'s new vaccine has shown drastic side effects. Many of the test subjects became seriously ill, and some even died. The trial has not only shaken public confidence but could also significantly set back vaccine development."
 theiler.2114.f: "In the 1930s, a serious vaccination incident occurred in Lübeck: 251 newborns received a BCG vaccine against tuberculosis that was contaminated with virulent tuberculosis bacteria due to faulty manufacturing. 208 children became ill, and 77 died. The 'Lübecker Impfunglück' (Lübeck Vaccination Incident) triggered a public scandal, delayed the introduction of the BCG vaccine in Germany, and led to the introduction of stricter safety standards in vaccine production."
 theiler.2114.g: "Who could have foreseen this?"
 theiler.2114.h: "Still carry out the experiments in the area."
 theiler.2115.t: "Allegation of Plagiarism"
 theiler.2115.d: "A foreign biologist from [SCOPE.sCountry('theiler_country_scope').GetName] has thoroughly investigated the production of the new vaccine currently being developed by Dr. [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]. [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] makes serious allegations: [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] claims it is a plagiarism of a very similar serum that Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] intended to patent."
 theiler.2115.f: "Between the 19th and early 20th centuries, the lack of patent protection and international standards led to disputes over authorship in vaccinology. Pasteur claimed credit for the bovine cholera vaccine, even though his collaborator Toussaint had experimented earlier. Later, BCG strains and Haffkine's cholera and plague vaccines sparked controversy. Debates over priority and 'plagiarism' were typical of a time when vaccination methods were highly sensitive and valuable."
 theiler.2115.g: "Apologize."
 theiler.2115.h: "This is mere coincidence."
 theiler.2116.t: "Cost Explosion"
 theiler.2116.d: "It looks like Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] underestimated the cost of the new vaccine. [SCOPE.sCharacter('theiler_biologist_scope').GetHerHis|U] optimistic estimate could now jeopardize the entire development."
 theiler.2116.f: "'Money? Money?! Filthy lucre! Have you no idea that I'm sacrificing my life for science? After all, this is about the final victory over death! About eradicating a scourge of humanity! And you have the nerve to come to me with lists, tables, and balance sheets? What are you? An accountant? Get out of my lab!'"
 theiler.2116.g: "Subsidizes the new vaccine."
 theiler.2116.h: "Recruit more academics as temporary workers."
 theiler.2116.i: "Deal with it."
 theiler_state_trait_cochliomyia: "Cochliomyia hominivorax"
 theiler_state_trait_cydia: "Cydia pomonella"
 je_theiler_cochliomyia_eredication: "Cochliomyia Eradication"
 je_theiler_cochliomyia_eredication_reason: "With the most modern methods available, the eradication of the dangerous New World screwworm fly might be possible, freeing humans and animals from this plague. A biologist can develop a theory and conduct field experiments to find a suitable solution to this problem.\n\nIf the biologist dies during his work, work on eradicating the parasite will be stopped but will continue as soon as a biologist is available again."
 je_theiler_cochliomyia_eredication_success: "A [concept_theiler_biologist] has worked at least #ORANGE 12 months#! to find a method to eredicate cochliomyia."
 je_theiler_cochliomyia_eredication_goal: ""
 theiler.21.t: "Sterile Insect Technique"
 theiler.21.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] has developed an unorthodox but groundbreaking idea: instead of destroying the parasites with pesticides, a promising method would be to breed sterile males so that the females cannot produce offspring with them. "
 theiler.21.f: "The Sterile Insect Technique (SIT) was developed in the 1950s by Raymond C. Bushland and Edward F. Knipling. Male flies are sterilized with gamma radiation, usually from cobalt-60 or cesium-137 sources. This high-energy radiation destroys the DNA in the germ cells without significantly affecting the animals' vitality or ability to mate. The sterilized males are then released en masse. Since they continue to mate successfully with wild females but fail to produce viable offspring, the population gradually collapses. The method was particularly successful against the New World screwworm fly, whose eradication in North and Central America prevented massive economic and veterinary damage."
 theiler.21.g: "We literally nuke them?"
 theiler.22.t: "Cochliomyia Eradication in [SCOPE.sState('theiler_state_scope').GetName]"
 theiler.22.d: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] reports that the New World screwworm fly has been eradicated in another region."
 theiler.22.g: "Screw the worms!"
 theiler_cochliomyia_experiment_lab_modifier: "Cochliomyia Experimental Laboratory"
 je_theiler_sti: "Sterile Insect Technique"
 je_theiler_sti_reason: "Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] is trying to eradicate the screwworm fly in a region using modern technology."
 je_theiler_sti_success: "A [concept_theiler_biologist] has worked at least #ORANGE 36 months#! on the eradication of cochliomyia."
 je_theiler_sti_goal: ""
 je_theiler_cydia_pesticide: "Cydia Pesticide"
 je_theiler_cydia_pesticide_reason: "With a basic knowledge of insecticides, a biologist, in collaboration with a chemist, can find an effective remedy against the codling moth.\n\nIf the biologist or chemist dies during their work, work on the pesticide will be stopped but will continue as soon as both academics are available again."
 je_theiler_cydia_pesticide_success: "A [concept_theiler_biologist] has worked at least #ORANGE 12 months#! on a new pesticide."
 je_theiler_cydia_pesticide_goal: ""
 je_theiler_lead_arsenate: "Lead Arsenate"
 je_theiler_lead_arsenate_reason: "Our fruit growers can control the codling moth and other pests with the newly invented lead arsenate, assuming there is no lead shortage on the market. It should be possible to bring the parasite under control in a state every month."
 theiler.31.t: "Lead Arsenate"
 theiler.31.d: "In collaboration with Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName], Dr. [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] has developed an effective pesticide whose mass production could revolutionize agriculture. The codling moth has finished its last meal in apples!"
 theiler.31.f: "Lead arsenate (PbHAsO₄) was developed in 1892 by Melville Thurston Cook in Massachusetts to control the codling moth (Cydia pomonella) in orchards. It was a more stable, plant-friendly alternative to the toxic copper arsenite ('Paris Green'). The powder killed insects as they fed, adhered to leaves and fruit for a long time, and enabled effective control in commercial fruit production for the first time. Lead arsenate remained widely used until the introduction of synthetic pesticides such as DDT, despite being harmful to the environment and human health."
 theiler.31.g: "We literally poison them?"
 theiler.31.tt: "From now on, farmers will use lead arsenate on their orchards to get rid of the Cydia modifier."
 theiler.32.t: "The Codling Moth Spreads to [SCOPE.sState('theiler_state_scope').GetName]!"
 theiler.32.d: "The codling moth has expanded its home range: from a neighboring region it has also spread into STAAT to infest the orchards there."
 theiler.32.f: "The codling moth (Cydia pomonella) originates from Eurasia and spread with apple cultivation in the 19th century across Central Europe, Northern Italy, the Balkans, Hungary, parts of Russia west of the Urals, North America, and Australia. Nordic, very hot, or dry regions were largely spared. In the 20th century, it reached almost all temperate apple-growing regions worldwide, including Scandinavia, the Baltic States, and South America, and became one of the most significant pests in orchards."
 theiler.32.g: "Fruit prices will raise, it seems."
 theiler.33.t: "The Codling Moth Spreads to South America!"
 theiler.33.d: "Naturalists and biologists today presented a report that is worrying farmers and traders alike. The infamous codling moth, native to Europe and Western Asia, has been discovered in our orchards for the first time. This is the first sighting in South America!"
 theiler.33.g: "This is not how I imagined the benefits of international trade would be..."
 theiler.34.t: "The Codling Moth Spreads to South Africa!"
 theiler.34.d: "Naturalists and biologists today presented a report that is worrying farmers and traders alike. The infamous codling moth, native to Europe and Western Asia, has been discovered in our orchards for the first time. This is the first sighting in South Africa!"
 theiler.35.t: "The Codling Moth Spreads to Oceania!"
 theiler.35.d: "Naturalists and biologists today presented a report that is worrying farmers and traders alike. The infamous codling moth, native to Europe and Western Asia, has been discovered in our orchards for the first time. This is the first sighting in Oceania!"
 theiler.41.t: "[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]"
 theiler.41.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] has discovered in several treatments with #V [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#! that it has advanced healing potential. However, this requires a larger procurement quantity—and thorough investigation to isolate the active ingredient. This would make a completely new medicine possible!"
 theiler.41.g: "So, [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)] is a new miracle plant?"
 theiler_pharmaceutical_strychnine_flag: "Strychnos Nux-Vomica"
 theiler_pharmaceutical_emetine_flag: "Carapichae Ipecacuanha"
 theiler_pharmaceutical_atropine_flag: "Atropa Bella-Donna"
 theiler_pharmaceutical_aloin_flag: "Aloe Vera"
 theiler_pharmaceutical_digitoxin_flag: "Digitalis Purpurea"
 theiler_pharmaceutical_quinine_flag: "Cinchona Pubescens"
 theiler_pharmaceutical_thymol_flag: "Thymus Vulgaris"
 theiler_pharmaceutical_pilocarpine_flag: "Pilocarpus Pennatifolius"
 theiler_pharmaceutical_ephedrine_flag: "Ephedra Sinica"
 theiler_pharmaceutical_strophantine_flag: "Strophantus Gratus"
 theiler.41.strychnine: "Strychnos nux-vomica is a tropical tree native to India and Southeast Asia. Its seeds contain the alkaloids strychnine and brucine, both highly toxic. Strychnine affects the nervous system, causing severe muscle convulsions and potentially death. Despite its toxicity, in small, controlled doses, extracts were historically used in medicine as a stimulant and to treat digestive or nervous disorders."
 theiler.41.emetine: "Carapichea ipecacuanha is a tropical plant native to South America, especially Brazil. Its roots contain the alkaloids emetine and cephaeline, which induce vomiting and have antiparasitic effects. Traditionally, ipecac root was used as an emetic to treat poisoning and as an expectorant in cough syrups."
 theiler.41.atropine: "Atropa belladonna, also known as deadly nightshade, is a perennial plant native to Europe, North Africa, and Western Asia. It contains toxic alkaloids such as atropine, scopolamine, and hyoscyamine, which affect the nervous system by blocking acetylcholine receptors. Historically, it was used as a sedative, pain reliever, and to dilate pupils. In modern medicine, purified atropine is used in ophthalmology and to treat bradycardia or poisoning by organophosphates."
 theiler.41.aloin: "Aloe vera is a succulent plant native to North Africa and the Arabian Peninsula. Its thick leaves contain a gel rich in polysaccharides, vitamins, and enzymes with soothing and moisturizing properties. The gel is widely used in cosmetics and medicine to treat burns, wounds, and skin irritations. Dried latex from the leaf's inner layer contains aloin, a compound with strong laxative effects."
 theiler.41.digitoxin: "Digitalis purpurea, or foxglove, is a biennial plant native to Europe. Its leaves contain cardiac glycosides such as digoxin and digitoxin, which strengthen heart contractions and regulate heartbeat. Traditionally, extracts were used to treat heart failure and arrhythmias. Purified cardiac glycosides are carefully dosed in medicine for heart conditions, while the raw plant is avoided due to severe poisoning risks."
 theiler.41.quinine: "Cinchona pubescens is a tree native to South America, especially the Andean regions. Its bark contains quinine and other alkaloids, which have strong antimalarial properties. Traditionally, the bark was used to treat fever and malaria. Even today, quinine and its derivatives remain important in medicine for managing malaria. The tree is also cultivated in tropical regions for its medicinal bark."
 theiler.41.thymol: "Thymus vulgaris, or common thyme, is a small perennial herb native to the Mediterranean. Its leaves and oil contain thymol, carvacrol, and other essential oils with antimicrobial, antioxidant, and anti-inflammatory properties. Traditionally, thyme has been used to treat respiratory infections, coughs, and digestive issues. It is widely used in herbal medicine, aromatherapy, and as a natural preservative or flavoring agent in food."
 theiler.41.pilocarpine: "Pilocarpus pennatifolius is a tropical shrub native to Brazil. Its leaves contain the alkaloid pilocarpine, which stimulates salivary and sweat glands. Traditionally, it was used to treat dry mouth and eye conditions. In modern medicine, pilocarpine is used to manage glaucoma by reducing intraocular pressure and to treat xerostomia (dry mouth) caused by radiation or medications. The plant is valued primarily for its pharmacologically active alkaloids."
 theiler.41.ephedrine: "Ephedra sinica, also known as ma huang, is a shrub native to China and Central Asia. Its stems contain ephedrine and pseudoephedrine, alkaloids that stimulate the nervous system and bronchodilation. It was used in Chinese medicine to treat asthma, bronchitis, and nasal congestion. Its use is limited due to risks of hypertension, heart problems, and other side effects."
 theiler.41.strophantine: "Strophanthus gratus is a climbing plant native to West Africa. Its seeds contain cardiac glycosides such as ouabain, which strongly affect heart contractions. Traditionally, extracts were used as arrow poisons and in small doses to treat heart conditions. Ouabain has been studied for heart failure and arrhythmias."
