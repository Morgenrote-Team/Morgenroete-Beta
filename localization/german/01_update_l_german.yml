 douglas.103.t: "Gebirgsjäger-Regiment" #deepl:459726214
 douglas.103.d: "Aufgrund seiner beeindruckenden Erfahrung bei der Eroberung und Verteidigung von Gebirgen beschloss [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName], seine überlegenen Fähigkeiten zu nutzen, um eine Elitetruppe von Gebirgsjägern aufzustellen." #deepl:3198382874
 douglas.103.f: "Die Gebirgsjäger, die Alpini oder die Chasseurs Alpins sind nur einige Beispiele für Elitetruppen aus einigen Ländern, die sich auf den Krieg in den Höhen spezialisiert haben. Die Alpini wurden 1872 gegründet und sind die älteste aktive Gebirgsinfanterie der Welt. Ihre ursprüngliche Aufgabe war es, die Grenze Italiens zu Frankreich und Österreich-Ungarn zu schützen." #deepl:3963027024
 douglas.103.g: "Sie werden sein Erbe in die Zukunft tragen." #deepl:1701012348

