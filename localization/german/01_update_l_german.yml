 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] genießt weltweites Renommee als einer der bedeutendsten Architekten der Zeit [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. Um den Namen [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] zu verewigen, arbeitet [ROOT.Var('gaudi_architect_var').GetCharacter.GetHeShe] an einem Entwurf für ein herausragendes Denkmal, das unser Land in der ganzen Welt als ein Zentrum der architektonischen Kunst erstrahlen lassen wird." #deepl:2632883859

 gaudi.81.t: "Meisterwerk der Architekten" #deepl:681011782
 gaudi.81.d: "In den letzten Jahren ist [THIS.GetCountry.GetName] zu einer der führenden Nationen auf dem Gebiet der Architektur aufgestiegen. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] hat bei dieser Entwicklung eine bedeutende Rolle gespielt. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] nahm den Auftrag an, ein Monument zu entwerfen, das mit den großen Wundern der Antike, des Mittelalters und der Moderne konkurrieren sollte." #deepl:2672646441
 gaudi.81.f: "Das Architektendenkmal basiert auf dem bevorzugten Stil des großen Architekten: \n\nArt-Deco-Architekten werden das [GetBuildingType('building_gaudi_people_monument').GetName] gestalten. \nBauhaus-Architekten werden das [GetBuildingType('building_gaudi_forum_monument').GetName] anbieten. \nNeoklassische Architekten werden das [GetBuildingType('building_gaudi_people_palace').GetName] gestalten." #deepl:4088582525
 gaudi.81.g: "Prächtig." #deepl:573443058

