 lepsius.1502_peking_d: "\nAlong with Java Man, Peking Man is believed to be the first Homo Erectus found and reinforced the belief that humanity originally came from Asia. The bones are said to be 400,000 to 780,000 years old." #please replace

 lepsius_state_trait_heidelbergensis_cave: "Prähistorische Höhle" #deepl:59949327

 lepsius.1326.t: "Homo Heidelbergensis abgeschlossen" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] hat genügend Knochen gesammelt, um konkrete Rückschlüsse auf die ausgestorbene Art zu ziehen. Der Homo Heidelbergensis ist für die Wissenschaft kein Rätsel mehr und kann nun mit einem gewissen Grad an Sicherheit im menschlichen Stammbaum verortet werden, auch wenn noch viele Fragen offen sind." #deepl:4182329393
 lepsius.1326.f: "Der Unterkiefer des Homo heidelbergensis wurde 1907 von dem Arbeiter Daniel Hartmann in einer Sandgrube bei Mauer in der Nähe von Heidelberg entdeckt und 1908 von dem Anatomen Otto Schoetensack beschrieben; der etwa 600.000 Jahre alte Fund gilt als ältester Beleg für den Frühmenschen in Europa, steht morphologisch zwischen Homo erectus und Homo sapiens, weist auf eine weite Verbreitung dieser Hominidenform in Afrika, Europa und Asien hin und lässt aufgrund seiner Robustheit und des geschätzten Hirnvolumens Rückschlüsse auf eine fortgeschrittene körperliche Anpassung, Werkzeugnutzung und soziale Organisation zu." #deepl:2078634084
 
 lepsius.1336.t: "Heidelberger" #deepl:140239375
 lepsius.1336.d: "Ein Arbeiter machte in einem Bergwerk in Mauer, einer Stadt in der Nähe von Heidelberg, eine bemerkenswerte Entdeckung. Ein Professor der Universität Heidelberg erkannte sofort seinen Wert." #deepl:3838910430
 lepsius.1336.f: "Der Unterkiefer des Homo heidelbergensis wurde 1907 von dem Arbeiter Daniel Hartmann in einer Sandgrube bei Mauer in der Nähe von Heidelberg entdeckt und 1908 von dem Anatomen Otto Schoetensack beschrieben; der etwa 600.000 Jahre alte Fund gilt als ältester Beleg für den Frühmenschen in Europa, steht morphologisch zwischen Homo erectus und Homo sapiens, weist auf eine weite Verbreitung dieser Hominidenform in Afrika, Europa und Asien hin und lässt aufgrund seiner Robustheit und des geschätzten Hirnvolumens Rückschlüsse auf eine fortgeschrittene körperliche Anpassung, Werkzeugnutzung und soziale Organisation zu." #deepl:2078634084

 lepsius.1501_heidelbergensis_human_fossils: "\n#G [ROOT.Var('lepsius_heidelbergensis_human_fossil').GetValue] #! #E  Fossilien des Homo Heidelbergensis#!." #deepl:2264692604
 lepsius.1501_taxonomy_heidelbergensis: "\n#E Homo Heidelbergensis#! wurde von [SCOPE.sCountry('lepsius_heidelbergensis_systemizer_country').GetName] klassifiziert." #deepl:2785417142
 lepsius.1502_mauer_t: "T Homo Heidelbergensis#! entdeckt von [SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetName]" #deepl:2213050324
 lepsius.1502_mauer_d: "\Der in der Nähe von Heidelberg entdeckte Unterkiefer des Homo heidelbergensis gilt als der älteste Nachweis eines Frühmenschen in Europa und markiert einen wichtigen Übergang zwischen Homo erectus und späteren Homininen." #deepl:219138034

