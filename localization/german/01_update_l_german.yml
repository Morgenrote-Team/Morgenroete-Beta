 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T Moderne Pracht#!\nMit einer modernen Architekturschule können wir die Hauptstadt unseres Landes in einen wahren Traum kühner architektonischer Experimente verwandeln. Das Art déco gilt als das prestigeträchtigste, aber die Umwandlung wird länger dauern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4119465333
