 douglas.201.t: "Bergsteigerexpedition - Stufe 1" #deepl:3784620623
 douglas.201.d: "Der Bergsteigerverein hat eine Auswahl von Bergen zusammengestellt, die nur ein primitives Minimum an Bergsteigerausrüstung erfordern, um eine Besteigung zu wagen." #deepl:3440213430
