 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T Das Meisterwerk eines Architekten#!\nEin [concept_gaudi_great_architect] kann einmal einen Entwurf für ein einzigartiges Nationaldenkmal im modernen Stil entwerfen. Dieses Lebenswerk wird den Namen des Architekten verleugnen und unserem Land ein eigenes architektonisches Weltwunder schenken.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4293486340
