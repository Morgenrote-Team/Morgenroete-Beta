 gaudi.12.f: "#G Ein [GetBuildingType('building_gaudi_park').GetName] verringert die Umweltverschmutzung#!. \nA [GetBuildingType('building_gaudi_luna').GetName] verbessert #G das Steueraufkommen#! des Staates, in dem es sich befindet. [GetTechnology('curtiss_tourism_tech').GetName] ist erforderlich. \nA [GetBuildingType('building_gaudi_parade').GetName] wirkt sich positiv auf #G die Wehrpflicht#! aus. [GetTechnology('nationalism').GetName] ist erforderlich." #deepl:4066407048
