 gaudi.82.t: "Das Lebenswerk eines Architekten" #deepl:1436757673
 gaudi.82.d: "Nach monatelangen Vorbereitungen hat [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] Pläne, Berechnungen, Statistiken und ein handgefertigtes Modell vorgelegt. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ehrgeiziges Monument gilt schon jetzt als Traum der Baukunst. Die einzige Frage, die bleibt, ist, wer diesen Traum wahr werden lassen wird." #deepl:1546320616
 gaudi.82.f: "Morgen werden wir schöne Dinge tun". -Antoni Gaudí" #deepl:3107908861
 gaudi.82.g: "Ein Denkmal für uns selbst." #deepl:3586195485

