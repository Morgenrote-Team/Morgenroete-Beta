 gaudi.10.t: "Architekt verbessert Reputation" #deepl:3290657742
 gaudi.10.d: "In den letzten Jahren hat [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] sein Fachwissen bei der Sanierung und dem Bau neuer Gebäude im ganzen Land unter Beweis gestellt und damit das Ansehen und die Kompetenz von [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] erheblich gesteigert." #deepl:1621312069
 gaudi.10.f: ""Die Mutterkunst ist die Architektur. Ohne eine eigene Architektur haben wir keine Seele unserer eigenen Zivilisation." -Frank Lloyd Wright" #deepl:2640014774
 gaudi.10.g: "Auf zu neuen architektonischen Aufgaben!" #deepl:4140846455

