 gaudi.35.t: "Jugendstilviertel in [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]" #deepl:1088148255
 gaudi.35.d: "Die neue künstlerische Entwicklung hat auch vor [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName] nicht Halt gemacht: In einem Viertel, das heute als Avantgarde-Viertel gilt, werden neue Jugendstilgebäude errichtet." #deepl:3696139674
 gaudi.35.f: "Das Debüt der Jugendstilarchitektur in Brüssel wurde von einer Welle der dekorativen Kunst in diesem neuen Stil begleitet. Zu den bedeutenden Künstlern gehörten Gustave Strauven, der mit Schmiedeeisen barocke Effekte an Brüsseler Fassaden erzielte, der Möbeldesigner Gustave Serrurier-Bovy, der für seine höchst originellen Stühle und gelenkigen Metallmöbel bekannt war, und der Schmuckdesigner Philippe Wolfers, der Schmuck in Form von Libellen, Schmetterlingen, Schwänen und Schlangen anfertigte. Der Stil wurde schnell im benachbarten Frankreich wahrgenommen. Nach dem Besuch des Hôtel Tassel von Horta baute Hector Guimard das Castel Béranger, eines der ersten Pariser Gebäude in diesem neuen Stil. Guimards origineller und malerischer Stil findet bei den Parisern großen Anklang; das Castel Béranger wird zu einer der besten neuen Fassaden in Paris gewählt und begründet Guimards Karriere. Die Pariser Weltausstellung von 1900 stellt den Höhepunkt des Jugendstils dar. Zwischen April und November 1900 zog sie fast fünfzig Millionen Besucher aus der ganzen Welt an und präsentierte die Architektur, das Design, die Glaswaren, die Möbel und die dekorativen Gegenstände des Stils. Die Pariser Ausstellung war zwar die bei weitem größte, aber auch andere Ausstellungen trugen viel zur Popularisierung des Stils bei." #deepl:3102882922
 gaudi.35.g: "Eine lebendige neue Kultur." #deepl:3379987285

 gaudi.22.t: "Linien und Maße" #deepl:2020920879
 gaudi.22.d: "Unser Architekt kehrt zurück - dieses Mal mit einem Vermessungsstab in der Hand und einem neuen Blick für das Land." #deepl:505021070
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] begnügte sich einst damit, auf den Plätzen der Städte Fassaden zu skizzieren, Schatten und Ornamente nachzuzeichnen. Jetzt zeichnet [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] Linien in die Erde.\n\nAuf den Reisen von [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] verließ [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] die Städte und zog ins Hinterland. In der Wildnis Galiziens, in den Sümpfen des Po-Deltas und über die Eisenbahntrassen der Midlands wanderte [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] mit Ingenieuren, Bauern und Vorarbeitern. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] lernte, das Gelände zu lesen wie andere die Schrift. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] Ich kann Ihnen sagen, wohin das Wasser fließen wird, wohin sich der Lehm verschieben wird, wo ein Fundament in fünf Wintern Risse bekommen wird.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] spricht jetzt von Steigungen und geodätischen Punkten. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Notizbücher sind nicht mit Schnörkeln gefüllt, sondern mit Winkeln, Höhen und Entfernungen, die zentimetergenau gemessen werden. Manche sagen, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sei trocken geworden - zu anspruchsvoll, zu starr. Aber wenn [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] über ein leeres Feld blickt, sieht [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] bereits, wo die Wege verlaufen könnten." #deepl:3503840059
 gaudi.22.g: "Ein Gebäude beginnt lange vor der Grundsteinlegung." #deepl:960677900
 gaudi.23.t: "Der Architekt, der zählt" #deepl:2805524520
 gaudi.23.d: "Nach zwei Jahren des Studiums kehrt unser Architekt zurück -[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mit schärferem Verstand, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] mit seltsameren Zeichnungen." #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] skizzierte einst nach Instinkt. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] Jetzt skizziert [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] mit Logik.[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] verbrachte seine Zeit nicht unter Maurern oder Bauarbeitern, sondern in Hörsälen. Paris, Göttingen, sogar St. Petersburg. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] saß unter Kreidetafeln voller Symbole, studierte unter Männern, die nichts mit ihren Händen bauten, sondern alles mit ihrem Verstand. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] spricht jetzt von Symmetrie, von Modulen, von Belastungskurven, die durch elegante Formeln beschrieben werden.\n\nVorbei sind die schwungvollen handgezeichneten Schnörkel. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] neue Pläne sind streng, seltsam, fast fremd in ihrer Präzision. Auf manche wirken sie kalt und unmenschlich. Doch dann erklärt [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]: Die Schönheit einer Kuppel liegt nicht in ihrer Verzierung, sondern in der Perfektion ihrer Rundung.\n\nDie Beamten sind unsicher, was sie mit [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] anfangen sollen. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Kollegen tuscheln von Unpraktikabilität. Aber andere - vor allem die jungen - hören zu." #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] baut, was andere sich nur vorstellen." #deepl:2581034432
 gaudi.24.t: "Papier vor Stein" #deepl:3533867777
 gaudi.24.d: "Unser Architekt kommt nicht mit Werkzeugen oder Gleichungen zurück, sondern mit Stempeln, Unterschriften und einem Netzwerk von Beamten." #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] kämpft nicht mehr am Zeichenbrett. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] gleitet jetzt durch die Büros.\n\n In zwei Jahren im Ausland hat [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] nicht nur Architektur studiert -[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] hat die Verwaltung studiert. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] lernte, wie ein Projekt nicht durch einen Entwurf, sondern durch einen Erlass lebt oder stirbt. In Wien beobachtete [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] Ministerien bei der Arbeit; in Brüssel beschattete [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] Genehmigungsbeamte; in Marseille nahm [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] an Ratssitzungen teil, in denen Kanalisationen über Skylines entschieden.\n\nNun, zurück in der Heimat, weiß [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], welche Dokumente wann einzureichen sind, welche Verordnung zu zitieren ist, wem man schmeicheln und wen man ignorieren muss. Regeln, sagt [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], sind keine Mauern, sondern Gerüste - sie können verschoben, aufgeweicht, umgestaltet werden. Und irgendwie kommen die Genehmigungen schneller denn je." #deepl:3047390249
 gaudi.24.g: "Jede große Struktur beginnt mit einem unterzeichneten Formular." #deepl:3498658136
 gaudi.25.t: "Der Architekt kehrt zurück... Irgendwann" #deepl:2911431628
 gaudi.25.d: "Unser Architekt ist endlich von der großen Tournee [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] zurückgekehrt. Keiner weiß genau, was [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] mitbringt - außer Geschichten." #deepl:3640320352
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] kehrt mit Zigarillos und Anekdoten zurück. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] hat Namen fallen zu lassen, Meinungen zu äußern und Schulden [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] gibt vor, sich nicht zu erinnern.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] spricht schön, sogar überzeugend von Strukturen, die [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] nie gemessen hat. Wenn man [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] nach Plänen fragt, wechselt er das Thema. Wenn man ihn nach Ergebnissen fragt, lächelt [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] und versichert, dass Brillanz nicht überstürzt werden kann.\n\n Manche sagen, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sei ein Betrüger. Andere nennen [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] ein missverstandenes Genie. Und die Wahrheit? Wahrscheinlich irgendwo zwischen einem Café in Triest und einem verpassten Zug in Neapel." #deepl:3339735037
 gaudi.25.g: "Was hat [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] die ganze Zeit über getan?!" #deepl:3328871879
 gaudi.26.t: "Im Schatten eines Meisters" #deepl:1494314704
 gaudi.26.d: "Unser Architekt kehrt zurück - klüger, gefestigter und mit dem Zeichen eines großen Lehrers." #deepl:2040369888
 gaudi.26.f: "Während andere weit reisten, zog [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] die Tiefe der Entfernung vor. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] verbrachte die meisten seiner Jahre unter der Anleitung einer einzigen Figur - einem alternden Architekten von legendärem Ruf. Nicht nur in Hörsälen, sondern auch auf Gerüsten und in der Stille lernte [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], die Struktur hinter dem Ornament, die Absicht hinter der Fassade zu sehen. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Linien wurden sauberer. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Blick kritischer. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] wurde nicht nur gelehrt, wie man baut, sondern warum. Die [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] Mentorenschaft hat sich bereits vor [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] herumgesprochen. Junge Lehrlinge suchen bereits [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] auf, und Stadtbeamte begrüßen ihn mit unerwarteter Ehrerbietung. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] kehrt als jemand zurück, der von Kontinuität, von Tradition und vielleicht - eines Tages - von Vermächtnis geprägt ist." #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] trägt das Gewicht der Weisheit eines anderen Mannes" #deepl:1891012360

 je_gaudi_study_trip: "Architekten-Studienreise" #deepl:471476780
 je_gaudi_study_trip_reason: "Unser Architekt, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], ist derzeit auf Reisen zu architektonischen Sehenswürdigkeiten, Akademien und Treffen mit anderen Künstlern. Wir werden ihn zwei Jahre lang nicht erreichen können." #deepl:840922178
 je_gaudi_study_trip_success: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] kehrt nach zwei Jahren zurück." #deepl:130151750
 je_gaudi_study_trip_result: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] erhält Erfahrung und (in den meisten Fällen) eine neue Eigenschaft." #deepl:1095907610
