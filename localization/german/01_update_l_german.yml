 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], unser Bergsteiger, führt derzeit ein Bergsteigerteam auf einer Expedition in [SCOPE.sState('douglas_location_scope').GetName]. Das Ziel ist die Erstbesteigung eines Gipfels. Die Geschwindigkeit des Aufstiegs hängt weitgehend von seiner Erfahrung und seinen Charaktereigenschaften ab. Je nach Schwierigkeitsgrad des Berges können auch größere Gefahren auftreten. Erreicht die Expedition ihr Ziel nicht innerhalb eines bestimmten Zeitrahmens, bricht [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] die Gipfelbesteigung ab. Sollte die Expedition aus irgendeinem Grund in die größte denkbare Gefahr abdriften, dann wird das Schlimmste passieren." #deepl:488000629

