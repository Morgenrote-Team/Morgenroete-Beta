 ### Athletes ###

 athletes.2.t: "Unser Bergsteiger, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], geht in den Ruhestand" #deepl:814507835
 athletes.2.d: "Nachdem er Jahrzehnte seines [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] Lebens damit verbracht hat, Gipfel zu erklimmen, unbekannte Routen zu kartographieren und Expeditionen durch gefährliches Terrain zu leiten, hat [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] beschlossen, sich zur Ruhe zu setzen. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] wird nicht länger als unser [concept_douglas_mountaineer] dienen." #deepl:3082522384
 athletes.2.f: ""
 athletes.2.g: "Der Gipfel war nie das Ende - nur die Aussicht vor dem Abstieg." #deepl:3095673486
 athletes.12.t: "Unser Mountaineer stirbt" #deepl:3903757311
 athletes.12.d: "Nach einem Leben, das damit verbracht wurde, Gipfel zu bezwingen und andere durch die tückischsten Kletterpartien zu führen, ist unser verehrtester [concept_douglas_mountaineer] von uns gegangen. Wer wird uns nun den Weg in die Wolken weisen?" #deepl:820605549
 athletes.12.f: ""
 athletes.12.g: "Ihr Seil mag verschwunden sein, aber ihre Spur bleibt." #deepl:3208123983

 athletes.52.t: "Ein neuer Mountaineer" #deepl:1807684299
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] ist ein vielversprechendes Talent, das eines Tages zu den Größten gehören könnte, die unsere Gipfel erklimmen." #deepl:1736780592
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] klettert zielstrebig." #deepl:1012883623

 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ist jetzt ein Veteran der Bergsteiger!" #deepl:4259800261
 athletes.102.d: "Nachdem er Gletschern getrotzt, Kammlinien überquert und Expeditionen ins Unbekannte geleitet hat, ist unser [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] nun bekannt genug, um als Bergsteiger-Veteran bezeichnet zu werden!" #deepl:334481273
 athletes.102.f: ""
 athletes.102.g: "Ein Meister der Berge!" #deepl:1052077048

 ### MR Concepts ###

 concept_gaudi_architectural_splendour: "Architectural Splendour" #please replace
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater." #please replace
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer] - [concept_gaudi_architect]" # Please replace
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!" #Please replace
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]." #Please replace
 concept_douglas_mountaineering: "Bergsteigen" #deepl:2724886722
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering." #Please replace

 concept_gaudi_great_architect: "#PURPLE #b Großer Architekt#!#!" #deepl:2311505900
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!" #You can use this for plural: [Concept('concept_gaudi_great_architect','$concept_gaudi_great_architects$')]
 concept_gaudi_great_architect_desc: "#b Große Architekten#! sind [Concept('concept_gaudi_architect','$concept_gaudi_architects$')], die als die wichtigsten Köpfe auf ihrem Gebiet gelten. #b Architekten#!, die 500 [concept_artists_experience] erreichen, werden zu #b Großen Architekten#!. Wenn ein Künstler diesen besonderen Rang erreicht, kann er oder sie die Blaupause für ein wirklich herausragendes [concept_gaudi_custom_monument] entwerfen, das den Geist der Nation verkörpert." #deepl:3535354395

 concept_gaudi_monuments: "Denkmäler in #R Morgenröte#!" #deepl:3575665350
 concept_gaudi_monuments_desc: "Viele Nationen erhielten neue #b Denkmäler#! in [concept_morgenroete]: der #b Kölner Dom#! in Deutschland, die #b Gotthardbahn#! in der Schweiz, der #b Cristo Redentor#! in Brasilien, die #b Mole Antonelliana#! in Italien, der #b Sommerpalast#! in China, die #b Sagrada Família#! in Spanien, das #b Schloss Neuschwanstein#! in Bayern, der #b Palacio de Bellas Artes#! in Mexiko und der #b Gyeongbokgung Palace#! in Korea.\nAlle Gebäude außer dem #b Sommerpalast#! und dem #b Campanile#! müssen von ihrem Besitzer errichtet werden, das #b Sächsische Schloss#! kann von einer polnischen Nation reaktiviert werden. Es gibt auch neue Monumente zu Spielbeginn, wie die #b Buddhas von Bamiyan#! oder den #b Potala-Palast#!\nEs gibt auch die Möglichkeit, ein [concept_gaudi_custom_monument] von einem [concept_gaudi_great_architect] entwerfen zu lassen. \n\nIm Gegensatz zum Vanilla-Spiel werden #b Monumente#! nicht direkt gebaut, sondern durch eine Entscheidung. Der Bau erfolgt in mehreren Phasen, je nach Größe des Gebäudes, und kann Jahre oder sogar Jahrzehnte dauern - und ist deutlich teurer." #deepl:1566202277

 concept_athletes_athlete: "Athleten" #deepl:850847351
 concept_athletes_athletes: "Athletes" #You can use this for plural: [Concept('concept_athletes_athlete','$concept_athletes_athletes$')]
 concept_athletes_athlete_desc: "In [concept_morgenroete] #b  sind Athleten#! spezielle Charaktere, die es dir erlauben, bestimmte Mechaniken des Mods zu nutzen.#b Athleten#! werden normalerweise durch Ereignisse oder über eine Schaltfläche erstellt. Wie andere Charaktere verfügen #b Athleten#! über Erfahrungen, die einen größeren Erfolg in ihrem Bereich garantieren.\nZurzeit gibt es diese #b Athleten#!:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]" #deepl:1061453309

 concept_gaudi_independent_architect: "Unabhängiger Architekt" #deepl:2730756570
 concept_gaudi_independent_architects: "Independent Architects" #You can use this for plural: [Concept('concept_gaudi_independent_architect','$concept_gaudi_independent_architects$')]
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] Diejenigen, die nicht von einem Land angestellt werden, sind #b Unabhängige Architekten#!. Im Gegensatz zu vielen anderen Künstlern gibt es nur wenige Voraussetzungen, um einen #b Unabhängigen Architekten#! einzustellen, abgesehen von einer minimalen technischen Anforderung. Sie sind wahre Globetrotter und verlangen in der Regel nur eine gute Bezahlung." #deepl:4188716455

 concept_gaudi_architectural_blueprint: "Architektonischer Bauplan" #deepl:4294565305
 concept_gaudi_architectural_blueprints: "Architectural Blueprints" #You can use this for plural [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]
 concept_gaudi_architectural_blueprint_desc: "Architektonische Entwürfe können über [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] recherchiert werden. Sie sind wichtig für den Bau von speziellen [concept_gaudi_blueprint_buildings], die nur einmal in einer Nation errichtet werden können. Es gibt insgesamt 15 verschiedene Gebäude in fünf verschiedenen Kategorien. Bestimmte Baupläne erfordern Technologien, die erforscht werden müssen. Da die Forschung manchmal Jahre dauern kann, ist es ratsam, sich vorher zu überlegen, welche Baupläne am wichtigsten sind. Die Gebäude können potenziell in jedem Staat errichtet werden, erfordern aber ein gewisses Maß an Urbanisierung. In einigen Fällen kann es zusätzliche Anforderungen geben.\n\n#R Wichtig#!: Sie können nur ein Gebäude einer bestimmten Kategorie in einem Staat bauen. Wenn sich also ein Brunnen in einem Staat befindet, kann der Triumphbogen oder die Statue nicht ebenfalls dort stehen." #deepl:1017261789
 concept_gaudi_blueprint_buildings: "Blueprint-Gebäude" #deepl:2672159620
 concept_gaudi_blueprint_buildings_desc: "Blueprint-Gebäude sind Gebäude, die einen von [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] erforschten Bluprint benötigen. In einem Staat kann nur ein Gebäude einer bestimmten Kategorie gebaut werden. Es gibt 15 verschiedene Gebäude:\n\n#b Monument#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Public Square#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Service Buildings#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Health Institutions#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b National Academies#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]" #deepl:3852362262

 concept_gaudi_custom_monument: "Benutzerdefiniertes Monument" #deepl:2715885677
 concept_gaudi_custom_monument_desc: "Ein maßgeschneidertes Denkmal ist das größtmögliche Meisterwerk von [concept_gaudi_architect]. Es kann mit anderen, gewöhnlichen Denkmälern konkurrieren. Nur ein [concept_gaudi_great_architect] kann solche Pläne entwerfen. Sie erfordern die Erforschung der modernsten architektonischen Technologien. Die Art des Denkmals, das ein Architekt entwirft, hängt weitgehend von seinem Architekturstil ab. Art-Déco-Architekten entwerfen das [GetBuildingType('building_gaudi_people_monument').GetName], Bauhaus-Architekten das [GetBuildingType('building_gaudi_people_forum').GetName] und neoklassische Architekten das [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:759442240

 concept_douglas_mountaineer: "Bergsteiger" #deepl:3785520222
 concept_douglas_mountaineers: "Bergsteiger" #deepl:2642597122
 concept_douglas_mountaineer_desc: "#n Dieser Eintrag wird derzeit überarbeitet.#!" #deepl:1338387803
 concept_vikelas_olympian: "Olympia" #deepl:3681680819
 concept_vikelas_olympian_desc: "#n Dieser Eintrag wird derzeit überarbeitet.#!" #deepl:1338387803

 concept_douglas_mountain_summit: "Berggipfel" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "Berggipfel sind das begehrte Ziel aller Alpinisten. Sie markieren den höchsten Punkt eines Berges. Jeder Gipfel hat drei verschiedene Eigenschaften, die bestimmen, wie schwierig es ist, ihn erfolgreich zu erreichen.\n\n#V Höhe#!: Die Höhe bestimmt, wie viele Schritte erforderlich sind, um einen Berg zu besteigen - dies spiegelt die Gesamtlänge einer Expedition wider. Pro 1.000 Meter ist ein Aufstiegsschritt erforderlich. Der Wert wird aufgerundet, d. h. für den 4.421 Meter hohen Mount Whitney sind 5 Schritte erforderlich, für den 7.134 Meter hohen Kauffmann Peak dagegen 8. Das Prestige eines Berges wird auf der Grundlage seiner Höhe berechnet: Die Gesamthöhe wird durch 250 geteilt. Ein idealer Berg von 5.000 Metern Höhe gewährt also 20 Prestige.\n\n#V Stufe#!: Die Stufe eines Berges entspricht den Anforderungen an die Ausrüstung, die für seine Besteigung erforderlich ist. Sie ist nicht strikt an seine Höhe gebunden. Zum Beispiel ist der Citlaltépetl trotz seiner 5.636 Meter nur Stufe 1 und erfordert nur eine Grundausrüstung. Im Gegensatz dazu gilt das Matterhorn mit einer Höhe von nur 4.478 Metern als wesentlich anspruchsvoller (Stufe 3) und erfordert zumindest eine Erste-Hilfe-Ausrüstung für alpine Notfälle.\n\n#V Risiko#!: Die Risikostufe eines Berges gibt die Wahrscheinlichkeit an, dass negative Ereignisse eine Expedition beeinträchtigen. Sie ist sowohl von der Höhe als auch vom Niveau unabhängig. Lawinen, Nebel und schlechtes Wetter sind die Hauptrisiken. Der Popocatépetl konnte bereits in der frühen Neuzeit aufgrund seiner gastfreundlichen Umgebung bestiegen werden. Der wesentlich kleinere Großvenediger mit nur 3.666 Metern stellte dagegen noch bis ins frühe 19. Jahrhundert eine ernsthafte Bedrohung für österreichische Expeditionen dar.\n\nWeitere Informationen zu den einzelnen Gipfeln finden Sie unter [concept_douglas_mountain_summit_list]." #deepl:3359948048
 concept_douglas_mountain_range: "Bergkette" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "Ein Gebirgszug ist definiert als eine Gebirgsformation, die das Potenzial für [concept_douglas_mountaineering] Training über große Entfernungen bietet. Klassische Gebirgszüge sind die Rocky Mountains, die Anden, die Alpen und der Kaukasus. Im Gegensatz zu den [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')], die es zu bezwingen gilt, gibt es auch viele weniger anspruchsvolle Berge, bei denen für [concept_douglas_mountaineer] keine Gefahr eines tödlichen Sturzes besteht. Vielmehr sollten sie als Trainingsstrecke betrachtet werden. Länder mit Gebirgsketten bringen eher Bergsteiger hervor als Länder ohne diese geografische Besonderheit." #deepl:2685064578
 concept_douglas_alpine_heritage: "Alpines Erbe" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "Alpine Heritage ist ein Sammelbegriff für die Verbundenheit mit den Bergen und die Spezialisierung auf das Bergsteigen. Er bezieht sich auch auf das Potenzial zur Anwerbung neuer [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]- denn in den meisten Fällen kommen erfahrene Bergsteiger aus Bergregionen. Dies verschafft Ländern mit [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] oder [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] immer einen Vorteil. Die Rekrutierung eines neuen Bergsteigers sowie verschiedene andere Maßnahmen kosten das alpine Erbe." #deepl:707449492

 concept_douglas_mountain_summit_list: "Liste von Berggipfeln" #deepl:4208448161
 concept_douglas_mountain_summit_list_desc: "Es gibt viele [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')], die bestiegen werden können.\n\n#V Nordamerika:#!\n#b Mount McKinley#! (Alaska), Höhe 6190 Meter, Schwierigkeitsgrad 4\n#b Mount Logan#! (Yukon Territory), Höhe 5959 Meter, Schwierigkeitsgrad 4\n#b Citlaltépetl#! (México), Höhe 5636 Meter, Schwierigkeitsgrad 1\n#b Mount Whitney#! (California), Höhe 4421 Meter, Schwierigkeitsgrad 1\n\n#V Südamerika:#!\n#b Aconcagua#! (Mendoza), Höhe 6267 Meter, Level 3\n#b Huascarán#! (Lima Territory), Höhe 6768 Meter, Level 5\n#b Illimani#! (La Paz), Höhe 6438 Meter, Level 4\n#b Chimborazo#! (Ecuador), Höhe 6267 Meter, Level 1\n\n#V Europa:#!\n#b Shkara#! (Großer Kaukasus), Höhe 5642 Meter, Ebene 4\n#b Dufourspitze#! (Dufourspitze), Höhe 4634 Meter, Ebene 2\n#b Matterhorn#! (Westschweiz), Höhe 4478 Meter, Ebene 3\n#b Aiguille Verte#! (Savoyen), Höhe 4122 Meter, Ebene 3\n#b Pico de Aneto#! (Aragon), Höhe 3404 Meter, Ebene 1\n\n#V Afrika:#!\n#b Kibo#! (Tanganyika), Höhe 5895 Meter, Ebene 2\n#b Batian#! (Kenia), Höhe 5199 Meter, Ebene 3\n#b Mount Stanley#! (Uganda), Höhe 5109 Meter, Ebene 3\n#b Mount Cameroon#! (Süd-Kamerun), 4095 Meter, Ebene 1\n\n#V Asien:#!\n#b Kamet#! (Delhi), Höhe 7756 Meter, Ebene\n#b Chogolisa#! (Kaschmir), Höhe 7665 Meter, Ebene 5\n#b Kabru#! (Himalaya), Höhe 7412 Meter, Ebene 5\n#b Kaufmann Peak#! (Tadschikistan), Höhe 7134 Meter, Ebene 4\n\n#V Australien &amp; Ozeanien:#!\n#b Mount Wilhelm#! (Ost-Neuguinea), Höhe 4121 Meter, Ebene 2\n#b Mount Cook#! (Südinsel), Höhe 3724 Meter, Ebene 2" #deepl:721187631

