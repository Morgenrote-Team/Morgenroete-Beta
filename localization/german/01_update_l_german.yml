 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Einen Bergsteigerverein gründen#!\nEin Bergsteigerverein ist der erste Schritt eines Landes zum organisierten Alpinismus. Er muss von einem erfahrenen Mann (oder einer erfahrenen Frau) gegründet werden, der/die sich mit dem Bergsteigen auskennt. Aus diesem Club können dann neue Bergsteiger hervorgehen, um die Gipfel der Welt zu erobern!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2346036384

 MR_ALPINE_CLUB_BUTTON: "Alpenverein" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T Gründung des Alpenvereins#!\nDer 1857 in London gegründete Alpenverein ist die älteste Bergsteigerorganisation der Welt. Seine Gründung markierte den Beginn des organisierten Alpinismus im viktorianischen England. Ziel des Clubs war es, die wissenschaftliche, geografische und sportliche Erkundung der Alpen zu fördern. Zu den Gründungsmitgliedern gehörte Edward Whymper, dem 1865 die Erstbesteigung des Matterhorns gelang. Der Alpenverein spielte eine Schlüsselrolle während des "Goldenen Zeitalters des Alpinismus" und veröffentlichte einflussreiche Werke, darunter das Alpine Journal. Er setzte Maßstäbe für künftige Bergsteigervereine auf der ganzen Welt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
