 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "Blaupausen: Städtische Denkmäler" #deepl:3587838353
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T Entwürfe: Stadtdenkmäler#!\nEin Architekt kann in der Kategorie "Denkmäler" drei mögliche Entwürfe entwickeln: den [GetBuildingType('building_gaudi_statue').GetName], den [GetBuildingType('building_gaudi_fountain').GetName] und den [GetBuildingType('building_gaudi_arch').GetName]. Einige Entwürfe erfordern Technologien, und einige Gebäude haben besondere Anforderungen in ihren jeweiligen Staaten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1470268006
