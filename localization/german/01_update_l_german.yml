 gaudi.11.t: "Blueprint-Auswahl: Stadtmonument" #deepl:3177181239
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], der bedeutendste Architekt unseres Landes, hat die wichtige Aufgabe übernommen, einen Entwurf für ein neues Gebäude zu entwerfen. Die Frage bleibt: Was für ein Gebäude soll entworfen werden?" #deepl:1652669912
