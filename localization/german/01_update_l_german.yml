 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Kapitalerweiterung#!\nEin Architekt kann seine theoretischen Ideen zur Architektur einmal in seinem Leben zusammenfassen. Seine Ergebnisse können von einem anderen Architekten übertroffen werden, wenn dieser besser ist. Das Ergebnis hängt weitgehend von der Erfahrung ab. Ein Architekt, der an einer Abhandlung arbeitet, ist ein Jahr lang nicht erreichbar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2275758248
