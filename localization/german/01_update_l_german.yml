 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T Baupläne: Öffentliche Plätze#!\nEin Architekt kann drei mögliche Entwürfe in der Kategorie "Plätze" entwickeln: [GetBuildingType('building_gaudi_park').GetName], [GetBuildingType('building_gaudi_luna').GetName] und [GetBuildingType('building_gaudi_parade').GetName]. Einige Entwürfe erfordern Technologien, und einige Gebäude haben besondere Anforderungen in ihren jeweiligen Staaten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:435233593
