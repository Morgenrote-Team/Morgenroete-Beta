 gaudi.16.t: "Eine neue Blaupause" #deepl:4025940977
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] hat heute seine Arbeit an dem Entwurf abgeschlossen und ihn dem Auftraggeber übergeben." #deepl:3235089264
 gaudi.16.f: "Ornamentik ist verschwendete Arbeit und damit verschwendete Gesundheit. Heute bedeutet sie auch vergeudetes Material, und beides bedeutet vergeudetes Kapital. Der moderne Mensch, der Mensch mit den modernen Nerven, hat keinen Bedarf an Ornamenten, er verabscheut sie. -Adolf Loos" #deepl:1476970686
 gaudi.16.g: "Ein neues Gebäude!" #deepl:1359643446

