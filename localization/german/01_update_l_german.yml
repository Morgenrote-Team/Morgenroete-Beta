 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Bergsteigerische Expedition: Level 4 Summits#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 4 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak und Mount Gongga. Weitere Informationen finden Sie unter [concept_douglas_mountain_summit_list]. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1095839829
