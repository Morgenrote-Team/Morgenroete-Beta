 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "Blaupausen: Service-Gebäude" #deepl:647432200
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T Baupläne: Dienstleistungsgebäude#!\nEin Architekt kann drei mögliche Entwürfe in der Kategorie "Dienstleistung" entwickeln: [GetBuildingType('building_gaudi_almshouse').GetName], [GetBuildingType('building_gaudi_school').GetName] und [GetBuildingType('building_gaudi_prison').GetName]. Einige Entwürfe erfordern Technologien, und einige Gebäude haben spezielle Anforderungen in ihren jeweiligen Staaten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4211878095
