 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Öffentliches Bauen#!\nAufgrund ihres architektonischen Stils können Architekten auf nationaler Ebene Baupunkte zur Förderung des öffentlichen Bauwesens beisteuern. Nach fünf Jahren kontinuierlicher Arbeit erhalten sie einen Reputationsschub.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3434490324

