 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Bergsteigerische Expedition: Level 1 Summits#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 1 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, und Mount Giluwe. Weitere Informationen finden Sie unter [concept_douglas_mountain_summit_list]. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1466134091
