 je_gaudi_urban_planning_project_reason: "Ihr [concept_gaudi_architect] [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] konzentriert sich auf die Modernisierung der Produktionsmethoden des [JournalEntry.GetTarget.GetBuilding.GetName] in [JournalEntry.GetTarget.GetBuilding.GetState.GetName]. \n$mr_divider_for_je$\nDas Projekt wird jeden Monat Fortschritte machen. Jedes Mal, wenn der Fortschritt 100% erreicht, erhält das Gebäude einen neuen Modifikator.\nEs gibt insgesamt 3 Modifikatoren zu gewinnen. Für jeden neuen Modifikator muss der Fortschritt wieder aufgefüllt werden." #deepl:1188825980

