 je_gaudi_capital_expansion_project: "Kapitalerweiterung" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "Zwischen 1836 und 1936 erlebten die viktorianischen Hauptstädte einen tiefgreifenden städtebaulichen Wandel. Paris wurde durch Haussmanns breite Boulevards und axiale Durchblicke umgestaltet. Wien riss 1857 seine Stadtmauern ab und ersetzte sie durch die große Ringstraße. Berlin expandierte rasch mit Mietskasernen, Industrievierteln und später mit modernistischen Wohnsiedlungen. London dehnte sich durch Eisenbahnvororte, Infrastrukturprojekte und die erste U-Bahn der Welt aus. Auf dem gesamten europäischen Kontinent entwickelten sich die Königsstädte zu modernen Metropolen - Monumente der Macht, des Ehrgeizes und der wachsenden sozialen Spannungen." #deepl:4052914498

 gaudi.41.t: "Eine ungebundene Stadt" #deepl:1231776512
 gaudi.41.d: "Die alten Mauern reißen ein. An ihre Stelle treten Luft, Licht und das Versprechen von Wachstum." #deepl:2117769530
 gaudi.41.f: "Jahrhundertelang war [ROOT.GetCountry.GetCapital.GetCityHubName] ummauert: stolz, kompakt und in sich geschlossen. Doch jetzt wird das Mauerwerk abgetragen. Die mittelalterlichen Festungsanlagen sind abgerissen worden. An ihrer Stelle erheben sich breite Boulevards, gesäumt von Bäumen und edlen Hausfassaden. Marktwagen und flanierende Paare schreiten nun dort, wo einst Wachen marschierten. Die Boulevards sind mehr als nur Straßen - sie sind Ausdruck von Zuversicht, von Expansion, von einer Zukunft, die zu groß ist, um sie einzudämmen.\n\n Manche beklagen den Verlust der alten Tore. Aber [ROOT.GetCountry.GetCapital.GetCityHubName] hat endlich seinen ersten tiefen Atemzug getan." #deepl:4076900735
 gaudi.41.g: "Wir bauen nach außen - mit Vision und Tatkraft" #deepl:1116241139
 gaudi.42.t: "Der Ring des Fortschritts" #deepl:3156235256
 gaudi.42.d: "Ein neuer Ring von Boulevards verbindet Stadt und Land miteinander." #deepl:3367270166
 gaudi.42.f: "Wo einst schlammige Dämme standen, herrschen jetzt Stein und Eisen. Die große Allee schlängelt sich wie eine Halskette um das Herz von [ROOT.GetCountry.GetCapital.GetCityHubName] und verbindet die Stadtteile in Bewegung und Licht. Ganze Häuserblocks wurden neu gezeichnet, Parks angelegt, Denkmäler in perfekter Perspektive eingerahmt. Gaslaternen blühen in der Abenddämmerung wie geordnete Sterne. Mit jedem gepflasterten Meter wird [ROOT.GetCountry.GetCapital.GetCityHubName] lesbarer - kaiserlicher.\n\n Die Beamten sprechen von "städtischer Harmonie". Und die Menschen? Sie spazieren herum und bestaunen Statuen, die sie nie zuvor gesehen haben, auf Straßen, die sie einst fürchteten, zu betreten." #deepl:3543082084
 gaudi.42.g: "Ein Ring nicht zur Verteidigung, sondern zur Orientierung." #deepl:2497263912
 gaudi.43.t: "Wege der Autorität" #deepl:4104296278
 gaudi.43.d: "Der neue Präfekt formt [ROOT.GetCountry.GetCapital.GetCityHubName]neu - eine Achse nach der anderen. Breit, gerade und kompromisslos." #deepl:2867872335
 gaudi.43.f: "Das ist keine Expansion. Es ist eine Operation.\n\nGanze Stadtteile fallen unter den Kompass und den Plan. Straßen werden wie Boulevards durch einstmals labyrinthische Viertel geschliffen. Alte Gassen verschwinden. An ihrer Stelle entstehen Linien - lang, gerade und immer zu einem Denkmal, einer Kaserne oder einem Ministerium führend.\n\nWiderstand regt sich, aber Genehmigungen werden unterschrieben, Häuser enteignet und Fassaden ausgerichtet. [ROOT.GetCountry.GetCapital.GetCityHubName] spricht nun die Sprache der Ordnung: Sichtbarkeit, Zirkulation, Kontrolle. Hinter der Pracht verbirgt sich eine Absicht.\n\nDie Armen nennen es die "Säuberung". Die Beamten nennen es 'Modernisierung'.' Der Präfekt nennt es "notwendig"." #deepl:4133801679
 gaudi.43.g: "Niemand soll dem Plan entkommen" #deepl:2017759053
 gaudi.44.t: "Der Metropolen-Horizont" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] ist nicht mehr nur eine Hauptstadt. Sie ist dabei, die Welt in Miniatur zu werden." #deepl:101717450
 gaudi.44.f: "Die alte Stadt hatte Kanten. Diese hat keine.\n\nStahl und Glas durchdringen, wo einst Stein dominierte. Bahnlinien kreuzen sich unter öffentlichen Gärten. Elektrische Lichter verwischen die Grenzen zwischen Dämmerung und Morgengrauen. Botschaften, Banken, Galerien und Cafés blühen wie Orchideen im eisernen Wintergarten eines neuen Zeitalters.\n\nFremde Zungen hallen in den Arkaden wider. Wolkenkratzer fordern Kathedralen heraus. [ROOT.GetCountry.GetCapital.GetCityHubName] bittet nicht mehr um Erlaubnis zu wachsen - es erwartet zu führen. Aus jedem Viertel dringt eine einzige Wahrheit hervor: Dies ist nicht mehr die Stadt einer Nation. Sie ist eine Stadt der Nationen." #deepl:3494578230
 gaudi.44.g: "Wir erheben uns, weil die Welt bereits zusieht." #deepl:1129952378

