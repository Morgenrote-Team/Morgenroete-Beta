 je_gaudi_bauhaus_architecture: "Bauhaus-Architektur" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "Das Bauhaus war eine deutsche Kunstschule, die von 1919 bis 1933 tätig war und Handwerk und bildende Kunst miteinander verband. Berühmt wurde die Schule für ihren Designansatz, der versuchte, individuelle künstlerische Visionen mit den Prinzipien der Massenproduktion und der Betonung der Funktion zu vereinen. Ihr lag die Idee zugrunde, ein Gesamtkunstwerk zu schaffen, in dem schließlich alle Künste zusammengeführt werden sollten. Der Bauhaus-Stil wurde später zu einer der einflussreichsten Strömungen des modernen Designs, der modernistischen Architektur und der Architekturausbildung." #deepl:1381087306
 je_gaudi_neoclassical_architecture: "Neoklassizistische Architektur" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "Der Neoklassizismus war zu Beginn des 20. Jahrhunderts eine architektonische und künstlerische Wiederbelebungsbewegung, die an die formale Klarheit, Symmetrie und Erhabenheit der griechisch-römischen Antike anknüpfen wollte. Als Gegenpol zu den Exzessen des Historismus und der zunehmenden Abstraktion der modernen Kunst betonte dieser Stil Monumentalität, geometrische Ordnung und die Verwendung traditioneller Formen in einer rationalen, oft staatlich sanktionierten Sprache. Er war eng mit der nationalen Identität und der bürgerlichen Architektur verbunden und verkörperte Ideale von Beständigkeit, Autorität und disziplinierter Schönheit." #deepl:2628512539
 je_gaudi_art_deco_architecture: "Art-Déco-Architektur" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "Die Art-Déco-Bewegung entstand in den 1920er Jahren als ein dekorativer und architektonischer Stil, der die Modernität aufgriff und gleichzeitig Elemente der klassischen Ordnung beibehielt. Mit seiner charakteristischen Verwendung stilisierter Formen, reicher Materialien und ornamentaler Geometrie verband das Art Déco die Opulenz der Handwerkskunst mit der aufkommenden Maschinenästhetik. Mit Motiven, die von Industrie, Geschwindigkeit und Exotik inspiriert waren, feierte es den technischen Fortschritt und die urbane Dynamik." #deepl:2018331500

 je_gaudi_splendour_bauhaus: "Der Triumph des Bauhauses" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "Mit der Einführung des Bauhaus-Gedankens haben die Architekten begonnen, Ornamente und Illusionen zugunsten von Klarheit, Präzision und Materialtreue abzuschaffen. Das Ziel ist nicht mehr, durch Opulenz zu beeindrucken oder die Größe vergangener Imperien zu beschwören, sondern der Gesellschaft zu dienen, indem man Räume schafft, die funktional, ehrlich und modern sind. Das Bauhaus ist nicht nur eine Ästhetik, sondern eine Designphilosophie, die auf der Überzeugung beruht, dass Architektur und tägliches Leben durch Einfachheit, Nützlichkeit und Einheit von Form und Zweck in Einklang gebracht werden müssen. Eine Hauptstadt, die sich die Bauhaus-Prinzipien zu eigen macht, signalisiert nicht nur Modernität, sondern Fortschritt in seiner reinsten Form: die Vorrangstellung der Funktion vor der Fassade, der Innovation vor der Tradition." #deepl:3357423326
 je_gaudi_splendour_neoclassical: "Neoklassizistische Wiedergeburt" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "Der Neoklassizismus ist ein Stil, der seine Wurzeln in der rationalen Harmonie der Antike hat, in der architektonischen Grammatik von Säulen, Giebeln und symmetrischen Grundrissen. Doch im frühen 20. Jahrhundert wurde er mit modernen Bautechniken, klareren Linien und oft monumentalen Ausmaßen neu interpretiert. Sie stand nicht nur für die Tradition, sondern auch für eine disziplinierte Vision der Zukunft - eine Vision, in der das öffentliche Leben, das Recht und die Kultur von Gebäuden umrahmt werden, die Ehrfurcht und Einigkeit vermitteln. Eine Architektur, die diese Grundsätze beherzigt, würde unsere Hauptstadt mit Schwere und Größe ausstatten und sie in den Augen der Welt zu einem Leuchtturm der Ordnung, Widerstandsfähigkeit und kultivierten Macht machen." #deepl:605890088
 je_gaudi_splendour_art_deco: "Ein Traum von Art Deco" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "Mit der Einführung des Art déco revolutionierten die Architekten die Kunstwelt, indem sie zum Beispiel mit dem starren Historismus der Vergangenheit brachen. Doch im Gegensatz zu vielen modernen Schulen waren ihre Bauten nicht Ausdruck reiner Funktionalität und Sachlichkeit. Art Deco ist eine Entwicklung inmitten des allgemeinen Aufbruchs der klassischen Moderne, bei der die kreative Verbindung von Eleganz der Form, Kostbarkeit der Materialien, Kraft der Farben und Sinnlichkeit des Themas im Vordergrund stand. In ihrer Blütezeit stand sie für Luxus, Glamour, Überschwang und den Glauben an den gesellschaftlichen und technischen Fortschritt. Eine Architektur, die diese Prinzipien respektiert, würde unser Land zu einem Aushängeschild der Moderne und des Wohlstands machen." #deepl:980834049

