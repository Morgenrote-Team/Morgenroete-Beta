 gaudi_capital_expansion_project_progress_bar_desc: "Kapitalerweiterung: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%] #! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)" #deepl:707314599

 gaudi.511.d: "Als es um die Verschönerung von [ROOT.GetCountry.GetCapital.GetCityHubName] ging, herrschte Uneinigkeit in der Stadtplanung." #deepl:2161912626
 gaudi.512.t: "Statuen auf der Ringstraße" #deepl:1070850347
 gaudi.512.d: "Auf der neuen Umgehungsstraße [ROOT.GetCountry.GetCapital.GetCityHubName] soll eine neue Figurengruppe aufgestellt werden, aber es ist unklar, welche mythologische Figur einen besonderen Platz erhalten wird." #deepl:275330526
 gaudi.513.f: "Ein neues Ministerium sollte als Aushängeschild der Regierung gebaut werden, doch ständige Planänderungen, Erweiterungen und latente Korruption haben dazu geführt, dass sich der Bau des Gebäudes in die Länge gezogen hat und alle Mittel bis zur Fertigstellung verbraucht wurden. Das unfertige Gebäude könnte mit einigen provisorischen Maßnahmen in einen funktionsfähigen Zustand gebracht werden, was aber wohl nicht im Interesse der Regierung ist, die sich mit kleineren Büros und weniger Komfort als erwartet zufrieden geben müsste. Ein Weiterbau ist möglich, wird aber wahrscheinlich teuer werden." #deepl:3580582680

 gaudi.511.t: "Springbrunnen oder Pavillon?" #deepl:2151137688
 gaudi.511.f: "Man könnte es mit einem Streit um des Kaisers Bart verwechseln: Aus einer Petitesse ist ein handfester politischer Streit geworden. Es geht um ein Bauprojekt auf einem repräsentativen Platz von hohem ästhetischen Wert. Die eine Fraktion möchte dort einen Pavillon zum Verweilen errichten, die andere plädiert für den Bau eines Brunnens. Da es nur ein Grundstück gibt, kann nur eines der Projekte gebaut werden; ein Kompromiss ist nicht möglich." #deepl:1541667756
 gaudi.511.g: "Wir bauen den Pavillon." #deepl:2064679099
 gaudi.511.h: "Wir bauen den Springbrunnen." #deepl:2431357846
 gaudi.511.i: "Ich habe meine eigenen Pläne für diesen Ort..." #deepl:53271135
 gaudi.512.f: "Bei der Planung der Umgehungsstraße sind noch einige Details unklar. Es ist noch nicht festgelegt, welche Figuren an prominenter Stelle aufgestellt werden sollen. Klar ist, dass es sich um Figuren aus dem römischen Pantheon handeln soll. Bestimmte Bevölkerungsgruppen identifizieren sich mit den jeweiligen Figuren - die Kapitalisten haben zum Beispiel vorgeschlagen, Merkur, den Gott des Handels, in die Mitte zu stellen. Die Aristokraten hingegen bestehen auf Jupiter, dem Vater der Götter. Die Militärs bevorzugen Mars, die Akademiker wollen Apollo in der Mitte." #deepl:3457913174
 gaudi.512.g: "Jupiter." #deepl:641978563
 gaudi.512.h: "Quecksilber." #deepl:4064282680
 gaudi.512.i: "Apollo." #deepl:2704921915
 gaudi.512.j: "Mars." #deepl:4251022611
 gaudi.513.t: "Ministeriumsgebäude übersteigt Kosten" #deepl:3536337121
 gaudi.513.d: "Der Bau eines neuen Ministeriumsgebäudes entwickelt sich zu einem kleinen Skandal." #deepl:3745484689
 gaudi.513.g: "Es gab ein Budget und dieses Budget muss eingehalten werden." #deepl:2982007153
 gaudi.513.h: "Das ist bedauerlich, aber in diesem Bereich üblich." #deepl:3799202878
 gaudi.513.i: "Dieses Projekt sollte so viel Geld und Zeit bekommen, wie es braucht." #deepl:3703152475
 gaudi.514.t: "Neues Kaffeehaus" #deepl:760472506
 gaudi.514.d: "In der Ringstraße hat ein neues Kaffeehaus eröffnet." #deepl:977697169
 gaudi.514.f: "Das Kaffeehaus ist unser bester Ort der Erziehung zu allem Neuen geblieben. Um das zu verstehen, muss man wissen, dass das Wiener Kaffeehaus eine Institution besonderer Art ist, die mit keiner vergleichbaren Einrichtung auf der Welt verglichen werden kann. Es ist eigentlich eine Art demokratischer Klub, der für eine billige Tasse Kaffee für jedermann zugänglich ist und in dem jeder Gast für dieses kleine Entgelt stundenlang sitzen, diskutieren, schreiben, Karten spielen, seine Post erhalten und vor allem eine unbegrenzte Anzahl von Zeitungen und Zeitschriften konsumieren kann. In einem besseren Wiener Kaffeehaus gab es alle Wiener Zeitungen, und nicht nur die Wiener, sondern die des gesamten Deutschen Reiches, französische, englische, italienische und amerikanische, sowie alle wichtigen Literatur- und Kunstzeitschriften der Welt. Wir wussten also alles, was in der Welt geschah, aus erster Hand, wir hörten von jedem Buch, das veröffentlicht wurde, von jeder Aufführung, wo immer sie stattfand, und verglichen die Rezensionen in allen Zeitungen. Vielleicht hat nichts so sehr zur intellektuellen Flexibilität und internationalen Ausrichtung des Österreichers beigetragen, wie die Tatsache, dass er sich im Kaffeehaus so umfassend über alle Geschehnisse in der Welt orientieren und gleichzeitig in geselliger Runde darüber diskutieren konnte. Wir saßen dort jeden Tag stundenlang und haben nichts verpasst.' - Stefan Zweig" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] sollte sie besuchen." #deepl:3567062403
 gaudi.514.h: "Das wird den Lebensstandard in Wien erhöhen." #deepl:993415000
 gaudi.515.t: "Ringstraße Palais" #deepl:2889767777
 gaudi.515.d: "Ein Adliger hat sich beim Bau eines Palastes im neuen Stadtviertel [ROOT.GetCountry.GetCapital.GetCityHubName] übernommen. Die halbfertige Bauruine droht zum Schandfleck zu werden." #deepl:3082201997
 gaudi.515.f: "Ringstraßenpalais ist die Bezeichnung für die prächtigen Paläste an der Wiener Ringstraße. Diese Gebäude wurden meist vom alten Adel oder von Bankiers und Industriellen im späten 19. Jahrhundert erbaut. Die Paläste wurden in einer Mischung aus Neobarock und Neorenaissance bzw. Neomanierismus errichtet. Sie waren auch ein Symbol des Aufstiegs und des Status. Einer der Bauherren hat sich jedoch kürzlich übernommen und steht vor dem Bankrott. Die Bevölkerung spottet bereits über den Schandfleck, der im schlimmsten Fall wieder abgerissen werden müsste, wodurch sich die Fertigstellung des gesamten Projekts verzögern würde." #deepl:2482976903
 gaudi.515.g: "Wir teilen die Kosten." #deepl:1778759255
 gaudi.515.h: "Das geht uns nichts an." #deepl:2515722656
 gaudi.516.t: "Kapitalerweiterung: Gute Fortschritte" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] hat erklärt, dass die Kapitalerweiterung früher abgeschlossen werden könnte." #deepl:1876608469
 gaudi.516.f: "Aus unbekannten Gründen geht alles schneller voran: sei es die Liebe zum Vaterland, hohe Löhne, die freundliche Unterstützung durch die lokalen Eliten oder einfach das bessere Wetter." #deepl:771529955
 gaudi.516.g: "Wunderbar." #deepl:1621308786
 gaudi.517.t: "Kapitalerweiterung: Langsame Fortschritte" #deepl:4246146058
 gaudi.517.d: "Leider musste die Bauleitung unter [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] heute einräumen, dass der Bau eines neuen Stadtteils in [ROOT.GetCountry.GetCapital.GetCityHubName] im Verzug ist." #deepl:984753109
 gaudi.517.f: "Aus unbekannten Gründen geht alles langsamer voran: sei es die Agitation feindlicher politischer Elemente, die Untergrabung der Arbeitsmoral durch die Gewerkschaften, eine Verschwörung der Illuminaten oder einfach schlechtes Wetter." #deepl:967308050
 gaudi.517.g: "Das ist bedauerlich." #deepl:1477108256
 gaudi.518.t: "Monument für [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "Für die Ringstraße ist ein neues Denkmal geplant: Es handelt sich um eine Statue unseres Königs [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:642834231
 gaudi.518.f: "Die Ringstraße diente der Veranschaulichung der österreichischen Geschichte. Einerseits wurde die lange Reihe der Monarchen aus dem Herrscherhaus der Habsburger verewigt, von denen Maria Theresia das opulenteste Denkmal erhielt. Aber auch Generäle wie Eugen von Savoyen oder Schwarzberg bereicherten das Wiener Stadtbild. Das Bürgertum hingegen legte großen Wert auf die Verewigung seiner Exponenten, namentlich der Dichterfürsten Goethe und Schiller, aber auch der großen Komponisten Schubert, Mozart und Beethoven." #deepl:795951503
 gaudi.518.g: "Es ist gut, die [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] zu sein." #deepl:2477877691
 gaudi.518.h: "Schön - aber konzentrieren Sie sich lieber auf die Fertigstellung der Ringstraße." #deepl:1336009648
 gaudi.519.t: "Feuer!" #deepl:3279516897
 gaudi.519.d: "Ein verheerender Brand zerstörte mehrere Gebäude auf einer Baustelle in [ROOT.GetCountry.GetCapital.GetCityHubName]." #deepl:603406045
 gaudi.519.f: "Die bekannteste Katastrophe auf der Ringstraße war der Brand des Ringtheaters am 8. Dezember 1881. Er ist eine der größten Brandkatastrophen des 19. Jahrhunderts. Schätzungen gehen von hunderten, wenn nicht gar mehr als tausend Opfern aus. Die Ursache war ein Fehler in der Gasbeleuchtung, der dazu führte, dass das Gas entweichen und beim nächsten Zündversuch explodieren konnte. Das daraus resultierende Feuer griff auf die Kulissenzüge über, bevor es sich rasch auf den Rest der Bühne und schließlich den Zuschauerraum ausbreitete. Der Brand hatte national und international Auswirkungen auf den vorbeugenden Brandschutz, insbesondere im Theaterbereich, und die entsprechenden gesetzlichen Bestimmungen für den Theaterbau in Österreich. Der Komponist Anton Bruckner, der Karten für die Abendvorstellung hatte, entging dem Tod nur dadurch, dass er zu Hause blieb, weil er sich unwohl fühlte." #deepl:1763422665
 gaudi.519.g: "Ein schrecklicher Tag." #deepl:3953408834
 gaudi.520.t: "Vorurteile gegen die Stadterweiterung" #deepl:3932558777
 gaudi.520.d: "Die Vertreter der Landbevölkerung sehen in der Entwicklung von [ROOT.GetCountry.GetCapital.GetCityHubName] einen Nachteil für die Landbevölkerung." #deepl:3359656956
 gaudi.520.f: "Die Regierung macht mit ihrem unsäglichen Getue in der Hauptstadt deutlich, dass sie aus abgehobenen Stadtbewohnern besteht, die nur ein paar Straßen weiter denken und nie [ROOT.GetCountry.GetCapital.GetCityHubName] verlassen haben. Dort werden enorme Summen verschleudert, die nur in der Hauptstadt ankommen, von denen das gemeine Landvolk in den Kleinstädten oder Dörfern aber nichts mitbekommt. Die Ideologie, die dahinter steht, begünstigt den Zentralismus, begünstigt die Bürokratie, begünstigt und unterstützt den Staatsapparat; aber welche Perspektive bietet ein solch dekadentes Projekt dem einfachen Menschen?" #deepl:2119590629
 gaudi.520.g: "Wie wäre es mit einem freundlichen Geschenk zugunsten der hart arbeitenden Landbevölkerung?" #deepl:1425408969
 gaudi.520.h: "Stadt und Provinz sind gleich." #deepl:154752402
 gaudi.520.i: "Wen interessiert schon dieses dumme Bauerngeschwätz?" #deepl:1424618973
 gaudi.521.t: "Industrielle Residenz" #deepl:1054941492
 gaudi.521.d: "Ein reicher Geschäftsmann ließ einen neuen Palast bauen und bereicherte damit [ROOT.GetCountry.GetCapital.GetCityHubName] um ein großes Gebäude." #deepl:2324185893
 gaudi.521.f: "Die Paläste von Industriellen und Bankiers wurden als Möglichkeit gesehen, ihre neue Stellung im Staat zu betonen. Auch die Vermögenden jüdischer Herkunft konnten damit ihre Emanzipation unterstreichen. Die Entwicklung Wiens im 19. Jahrhundert ist dafür ein gutes Beispiel. Eines der berühmtesten Ringstraßenpalais ist das Palais Epstein. Es wurde für den Industriellen und Bankier Gustav Ritter von Epstein erbaut. Der Architekt war Theophil Freiherr von Hansen, der auch das benachbarte österreichische Parlamentsgebäude entworfen hat. Es ist bis zu fünf Stockwerke hoch und im zeittypischen Neorenaissancestil erbaut." #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] wächst und gedeiht." #deepl:2259204183
 gaudi.522.t: "Erweiterung der Kaserne" #deepl:3408528723
 gaudi.522.d: "Die Erweiterung von [ROOT.GetCountry.GetCapital.GetCityHubName] bietet die Möglichkeit, die Kaserne zu modernisieren und zu erweitern." #deepl:933440251
 gaudi.522.f: "Die Franz-Josephs-Kaserne war ein Wiener Kasernengebäude im Bereich der heutigen Ringstraße und lange Zeit ein Hindernis für den Bau des Großprojekts. Die Kaserne wurde nach Kaiser Franz Joseph I. benannt und in den Jahren 1854-1857 im Zuge der Revolution von 1848 erbaut. Kurz nach ihrer Errichtung stand die Kaserne dem 1857 begonnenen Ausbau der Wiener Ringstraße im Weg, doch es dauerte vier Jahrzehnte, bis das Heer wieder von hier wegzog. Zuvor musste daher eine neue Kaserne errichtet werden, um den Verlust der Franz-Joseph-Kaserne aufzufangen." #deepl:4162429863
 gaudi.522.g: "Erweitern Sie die Kaserne." #deepl:2381627455
 gaudi.522.h: "Investieren wir die Zeit lieber anderswo." #deepl:3269234038
 gaudi.523.t: "Ausweitung des Bausektors" #deepl:2392547084
 gaudi.523.d: "Der Ausbau von [ROOT.GetCountry.GetCapital.GetCityHubName] bietet die Möglichkeit, den Bausektor zu erweitern. " #deepl:3106227577
 gaudi.523.f: "Wir nennen die Künstlernatur im Allgemeinen die Summe der Eigenschaften, die den Künstler daran hindern zu produzieren. - Arthur Schnitzler" #deepl:2115168723
 gaudi.523.g: "Erweitern Sie das Baubüro." #deepl:771559939
 gaudi.524.t: "Ein wunderschöner Park" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]Der neue Park ist fertiggestellt und steht nun allen Bürgern für Spaziergänge zur Verfügung." #deepl:2209166008
 gaudi.524.f: "Die Tore des neuen Stadtparks schwingen auf. Rasenflächen wallen wie Samt. Wege schlängeln sich zwischen Blumenbeeten und Statuen. Aber was die Menschen am meisten anzieht, ist nicht der Rasen, sondern der Klang. Ein Musikpavillon, ein kleines Orchester, ein Walzer, der in der Brise dahinweht. Öffentliche Musik, die einst den Salons und Palästen vorbehalten war, ist heute für alle hörbar. In Städten wie Wien war der Kursalon zu einem bürgerlichen Tempel der Melodie geworden. Das prächtige Gebäude im Stil der italienischen Renaissance befindet sich in der Johannesgasse und verfügt über eine große Terrasse im Park. Zu Zeiten der Brüder Strauss war der Kursalon ein beliebter Ort für Tanz und Konzerte." #deepl:556984663
 gaudi.524.g: "Lass uns einen Spaziergang machen." #deepl:3870101360
 gaudi.524.h: "Lasst uns mit einem Konzert feiern!" #deepl:3249539672
 gaudi.525.t: "Die Erweiterung der Oper" #deepl:3647447347
 gaudi.525.d: "Die Erweiterung von [ROOT.GetCountry.GetCapital.GetCityHubName] bietet die Möglichkeit, die Oper zu modernisieren und zu erweitern." #deepl:1640821642
 gaudi.525.f: "Inmitten von Boulevards und Arkaden, Brunnen und Ministerien wirkt das bestehende Opernhaus allmählich bescheiden, ja sogar provinziell. Der Vorschlag: ein neues Gebäude oder eine große Erweiterung. Mehr Sitzplätze, bessere Akustik, monumentale Fassaden. Ein Kulturtempel, der der Größe der Stadt gerecht wird. In ganz Europa sind solche Gesten zu Symbolen des nationalen Ansehens geworden. In Paris erhebt sich die Opéra Garnier mit Marmortreppen und goldenen Decken. In Wien verankert die 1869 eröffnete Staatsoper die Ringstraße mit Eleganz und Stolz." #deepl:2327891128
 gaudi.525.g: "Erweiterung des Opernhauses." #deepl:4005131669
 gaudi.526.t: "Erweiterung des Rathauses" #deepl:857877700
 gaudi.526.d: "Die Erweiterung von [ROOT.GetCountry.GetCapital.GetCityHubName] bietet die Möglichkeit, das Rathaus zu modernisieren und zu erweitern." #deepl:3575590115
 gaudi.526.f: "Das alte Rathaus trägt noch das Wappen aus einem anderen Jahrhundert. Im Inneren: enge Treppen, überfüllte Büros und Bücher, die sich höher als die Wandverkleidung stapeln. Der Schreibtisch des Bürgermeisters ist kaum groß genug für seinen Papierkram, geschweige denn für Macht. Nun der Vorschlag: ein neues Rathaus, das die wachsende Rolle der Stadt in Verwaltung, Wirtschaft und bürgerlicher Identität widerspiegelt. Hoch aufragende Türme oder zurückhaltender Klassizismus - so oder so muss es Autorität signalisieren. In ganz Europa haben sich die Städte dieser Herausforderung gestellt. In Wien wurde das neugotische Rathaus (1883 fertiggestellt) zu einem Symbol des städtischen Selbstbewusstseins. Paris restaurierte sein Hôtel de Ville nach 1871 mit Pracht und Stolz. Das Rote Rathaus in Berlin entstand als eine Verschmelzung von Renaissanceformen und preußischer Funktion." #deepl:2422046000
 gaudi.526.g: "Vergrößerung des Rathauses." #deepl:5728920
 gaudi.527.t: "Heldenplatz" #deepl:959071592
 gaudi.527.d: "Nach der Fertigstellung des Heldenplatzes drängen einige führende politische Persönlichkeiten auf eine angemessene Einweihung." #deepl:1468121085
 gaudi.527.f: "Beim Bau der Ringstraße wurde der "äußere Burgplatz" unter Kaiser Franz Joseph als Teil des Kaiserforums geplant, das jedoch nie fertig gestellt wurde. Geplant war ein rechteckiger Platz, der vom Leopoldinischen Trakt, der Neuen Hofburg, den Habsburgischen Sammlungen und von einem nie errichteten Gegenstück des Neuen Schlosses an der Stelle des Volksgartens eingerahmt werden sollte. Der Name Heldenplatz wurde 1878 festgelegt; er stammt von den beiden Reiterdenkmälern, die beide von Anton Dominik Fernkorn stammen. Das ältere ist das von Erzherzog Karl, das 1860 enthüllt wurde. Das Gegenstück, das Reiterstandbild von Prinz Eugen, wurde ebenfalls 1865 fertiggestellt. Nach dem verlorenen Ersten Weltkrieg, dem Zusammenbruch der österreichisch-ungarischen Doppelmonarchie unter der Herrschaft der Dynastie Habsburg-Lothringen und der Gründung der ersten österreichischen Republik diente der Heldenplatz als Sammelpunkt aller politischen Lager und als Exerzierplatz für die österreichische Armee." #deepl:562832934
 gaudi.527.g: "Veranstalten Sie eine Parade und laden Sie unsere Freunde ein." #deepl:99539180
 gaudi.527.h: "Einrichtung einer ständigen Militärparade für die nächsten Jahre." #deepl:3502479331
 gaudi.527.i: "Und wer soll das alles bezahlen?" #deepl:3263444788
 gaudi.528.t: "Ausweitung der Universität" #deepl:2548530815
 gaudi.528.d: "Der Ausbau von [ROOT.GetCountry.GetCapital.GetCityHubName] bietet die Möglichkeit, die Universität zu modernisieren und zu erweitern." #deepl:966048719
 gaudi.528.f: "Was ist eine große Stadt ohne Gedanken? Inmitten von Eisenbahnlinien, Ministerien und Theatern beginnt die Universität unter ihrem eigenen Erfolg zu leiden. Zu viele Studenten für zu wenige Säle. Fachbereiche verteilen sich auf gemietete Gebäude. Professoren drängeln sich zwischen Bibliotheken und Labors um Platz. Der Vorschlag ist klar: ein neuer Campus oder eine große Erweiterung - moderne Hörsäle, eigene Fakultäten, eine monumentale Bibliothek. Solche Projekte sind mehr als nur Infrastrukturen; sie sind Erklärungen für intellektuelle Ambitionen. In Wien wurde die Universität umgesiedelt und in den 1870er Jahren entlang der Ringstraße wieder aufgebaut, mit einer prächtigen Fassade und einem symbolischen Mittelpunkt. In Paris wurde die Sorbonne unter Jules Ferrys Reformen gründlich erweitert, um der wachsenden akademischen Klasse Frankreichs gerecht zu werden." #deepl:3542359765
 gaudi.528.g: "Die Universität ausbauen." #deepl:4228402238
 gaudi.529.t: "Erweiterung der Kunstakademie" #deepl:1188603187
 gaudi.529.d: "Der Ausbau von [ROOT.GetCountry.GetCapital.GetCityHubName] bietet die Möglichkeit, die Kunstakademie zu modernisieren und zu erweitern." #deepl:2971034584
 gaudi.529.f: "Mit dem Wachstum der Stadt wächst auch ihr Appetit auf Kunst. Dennoch drängen sich Maler und Bildhauer in kleinen Ateliers und düsteren Dachböden und lernen nicht von Meistern, sondern von Gerüchten und geliehenen Skizzen. Der Vorschlag: eine richtige Kunstakademie mit lichtdurchfluteten Ateliers, anatomischen Theatern und Galerien, die für öffentliche Ausstellungen geöffnet sind. In ganz Europa prägen solche Akademien den nationalen Geschmack. Die École des Beaux-Arts in Paris setzt klassische Maßstäbe für einen halben Kontinent. In Wien verankert der Prachtbau der Akademie der bildenden Künste das kulturelle Prestige der Ringstraße." #deepl:2427288221
 gaudi.529.g: "Erweitern Sie die Akademie." #deepl:3521772928
 gaudi.530.t: "Urania" #deepl:3604286803
 gaudi.530.d: "Mit der Urania wurde in Wien ein sogenanntes "Volksbildungszentrum" eröffnet, dessen genauer Zweck noch umstritten ist." #deepl:2388110616
 gaudi.530.f: "Im Jahr 1883 kam der deutsche Astronom Max Wilhelm Meyer nach Wien, um als Assistent an der Universität Wien historische und zukünftige Sonnenfinsternisse zu berechnen. Er hielt auch volkskundliche Vorlesungen und entwickelte die Idee einer volksbildnerischen Einrichtung. Da er jedoch 1885 nach Berlin berufen wurde, entwickelte er seine Ideen dort weiter. Die Urania in Wien wurde nach dem Vorbild der Urania in Berlin errichtet: Sie bot Platz für 800 Personen und enthielt einen Hörsaal für 200 Personen, Räume für wissenschaftliche Vorführungen und eine Sternwarte. Diese "provisorische" Urania konnte jedoch den Besucheransturm kaum bewältigen, so dass bald ein Neubau in der Ringstraße notwendig wurde. Die Urania erweiterte nicht nur ihr Bildungsangebot (z.B. durch Sprachkurse), sondern wurde auch zum Veranstaltungsort für Konzerte mit eigenem Urania-Sinfonieorchester und Urania-Chor. Die unkonventionelle Form und Bauweise sorgte in Wien für den üblichen Skandal. Den Wienern gefiel das Gebäude jedoch, und die Urania etablierte sich bald als eines der Wahrzeichen Wiens." #deepl:2564552960
 gaudi.530.g: "Es ist ein architektonisches Wahrzeichen." #deepl:631489671
 gaudi.530.h: "Es handelt sich in erster Linie um eine Unterhaltungseinrichtung." #deepl:1069754801
 gaudi.530.i: "Dies ist in erster Linie eine Sternwarte." #deepl:2017455388

 gaudi.9.t: "Stadtplanung abgeschlossen" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] hat heute die städtebaulichen Arbeiten in einer wichtigen Provinzstadt abgeschlossen. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] ist nun wieder vollständig verfügbar." #deepl:60424068
 gaudi.9.f: "Die Architektur erreicht ihre höchste Stufe erst, wenn sie von Phantasie und Vorstellungskraft durchdrungen ist - nicht von undisziplinierter Phantasie oder kapriziöser Vorstellungskraft -, so dass das geordnete Gewebe das Auge jedes intelligenten Betrachters erfreut und Gefühle wie ein Gedicht hervorruft. -Henry van Brunt" #deepl:2388189232
 gaudi.9.g: "So viele Projekte, so wenig Zeit." #deepl:224764128

 gaudi_architecture_treatise_modifier: "Abhandlung über Architektur" #deepl:1594143488

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]Abhandlung über Architektur" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] hat die Arbeit [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] abgeschlossen. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Abhandlung über historische und zeitgenössische Architektur, angereichert mit [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] theoretischen Überlegungen, wird zukünftige Generationen von Architekten beeinflussen." #deepl:66798799
 gaudi.8.f: "Die Architektur hat die großen Ideen des Menschengeschlechts aufgezeichnet. Nicht nur jedes religiöse Symbol, sondern jeder menschliche Gedanke hat seine Seite in diesem großen Buch. -Victor Hugo" #deepl:864116211
 gaudi.8.g: "Ein Werk für die Nachwelt." #deepl:575316054

 je_gaudi_architecture_treatise: "Abhandlung über Architektur" #deepl:1594143488
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] hat sich für ein Jahr komplett zurückgezogen, um [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] bisheriges Wissen über architektonische Kunst in einem Buch zusammenzufassen. Es soll ein Manifest des [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] Lebens sein, das alle [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] Erfahrungen und Theorien zur Architektur zusammenfasst. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Ruf spielt eine entscheidende Rolle bei der Bestimmung des Wertes des Werkes. Aber auch Charaktereigenschaften wie $literary$, $erudite$, $innovative$, und $aesthete$ sind wertvoll." #deepl:9152525
 je_gaudi_architecture_treatise_success: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] kehrt nach einem Jahr zurück." #deepl:2379549832
