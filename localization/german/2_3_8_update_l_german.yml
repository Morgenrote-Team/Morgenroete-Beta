 concept_verrier_venus_transit: "Venus-Transit" #deepl:3328636769
 concept_verrier_venus_transit_desc: "Der Venustransit ist ein seltenes Ereignis, bei dem der Mond zwischen Erde und Venus vorbeizieht. Im 19. Jahrhundert fand er jedoch zweimal statt: 1874 und 1882. Da die Beobachtung des Venustransits Rückschlüsse auf die Größe des Sonnensystems und eine genauere Bestimmung der Größe der Astronomischen Einheit (AE) ermöglicht, waren dies bedeutende wissenschaftliche Ereignisse. Länder, die sich auf der Website [concept_verrier_venus_transit_zone] befinden, können das Ereignis von dort aus beobachten; andere Länder müssen Expeditionen entsenden. Der Erfolg der Beobachtung hängt von der Erfahrung der [concept_verrier_astronomer], der Verfügbarkeit eines [concept_gaudi_engineer] und einer Portion Glück ab: Manchmal kann das Wetter ein gutes Bild verhindern. Je besser die Beobachtung, desto größer die Prämie." #deepl:1890935103
 concept_verrier_venus_transit_zone: "Venus-Transitzone" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "Die Venus-Transitzone bezieht sich auf den Teil der Erde, von dem aus ein vollständiger (und nicht nur teilweiser) Venustransit beobachtet werden kann. Im Jahr 1874 galt dies insbesondere für die ostasiatisch-pazifische Region und im Jahr 1882 für fast den gesamten amerikanischen Kontinent. Eine detaillierte Aufschlüsselung der strategischen Regionen findet sich im Folgenden.\n\n#V Venus-Transit 1874:#!\nIndonesien, Indochina, Ozeanien, Südchina, Nordchina, Mandschurei, Japan, Zentralindien, Madras, Bengalen, Himalaya; außerdem der Staat des Indischen Ozeans.\n\n#V Venus-Transit 1882:#!\nBrasilien, La Plata, Anden, Gran Columbia, Mexiko, Mittelamerika, Karibik, Mittlerer Westen, Dixie, Neuengland; außerdem die Staaten Ontario und Quebec." #deepl:1055797749
 concept_vikelas_coach: "Trainer" #deepl:3572285288
 concept_vikelas_coach_desc: "Trainer sind die Nationaltrainer eines Landes in einer bestimmten nationalen Sportart. Zu den nationalen Sportarten gehören [concept_vikelas_football], Baseball, Basketball und Kricket. Trainer sorgen für Boni für die jeweilige Mannschaft bei Wettkämpfen - sei es bei internationalen Weltmeisterschaften oder bei Länderspielen. Letztere werden in regelmäßigen Abständen heimlich ausgetragen und erhöhen bei einem Sieg den Erfahrungswert des Trainers. Hohe Erfahrungspunkte und positive [Concept('concept_character_trait','$concept_character_traits$')] erhöhen die Chance, eine Weltmeisterschaft zu gewinnen. Positive Eigenschaften sind solche, die die Spieler besonders motivieren - wie z. B. ehrgeizig oder charismatisch -, während demotivierende Eigenschaften die Chance auf einen Sieg verringern. Dazu gehören Eigenschaften wie rücksichtslos oder grausam.\n\n#R HINWEIS: Im Moment ist nur Fußball integriert.#!" #deepl:183600896
 concept_vikelas_coaches: "Coaches" #deepl:3998480532
 concept_vikelas_football: "Fußball" #deepl:3334413449
 concept_vikelas_football_desc: "Fußball ist ein möglicher Nationalsport. Die ersten Fußballvereine können in Europa und Südamerika gegründet werden; dies setzt ein relativ liberales Rechtssystem, ein starkes Kleinbürgertum oder einen beachtlichen durchschnittlichen Lebensstandard voraus. Danach könnten gelegentliche Fußballspiele ausgetragen werden. Mit der Gründung der FIFA werden auch internationale Spiele und die Fußballweltmeisterschaft möglich. Die acht besten Mannschaften sind automatisch für die Weltmeisterschaft qualifiziert. Die Mannschaften werden nach dem National Football Team Value (NFTV) berechnet, der sich aus den Parametern Lebensstandard (Fitness der Bevölkerung), Stärke des Kleinbürgertums (Vereinssystem), Bildung (Taktik) und Tradition (Nationalsport: ja oder nein?) ergibt. Bei Spielen wird nicht nur der NFTV berücksichtigt, sondern auch die Charaktereigenschaften und die Erfahrung der [concept_vikelas_coach]." #deepl:3000477120
 country_artists_decorative_can_promote_architect_boolean_desc: "Wenn Sie mindestens eine [GetBuildingType('building_arts_academy').GetName] mit der [concept_pm_artists_academy_school] haben, können Sie eine [concept_gaudi_architect] in der Künstlerübersicht bewerben." #deepl:738833409
