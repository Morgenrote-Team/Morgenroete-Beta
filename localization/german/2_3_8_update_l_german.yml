 vikelas.21.d: "In einer Turnhalle von [SCOPE.sState('vikelas_basketball_state').GetName] wurde ein neues Spiel erfunden, das eines Tages in Hallen und Stadien auf der ganzen Welt widerhallen könnte." #deepl:3471187932
 vikelas.21.f: "Nicht schießen. Kein Laufen mit dem Ball. Und zwei Pfirsichkörbe, die an eine Galerie genagelt sind.'\n\nIn [TimeKeeper.GetCurrentDate.Format('y')], an einer Schule in [SCOPE.sState('vikelas_basketball_state').GetFarmHubName], stand Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] vor einem Problem: Wie sollte man [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] unruhige Schüler im Winter drinnen aktiv halten. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Lösung war einfach - und seltsam. Ein Fußball, zwei erhöhte Pfirsichkörbe und dreizehn Regeln.\nDie Jungen fanden es zunächst seltsam. Kein Kontakt. Kein Dribbling. Nur vorsichtiges Passen und bogenförmige Würfe. Aber irgendetwas daran blieb hängen. Das Spiel verbreitete sich in anderen Schulen und dann in anderen Städten. In weniger als einem Jahrzehnt hallten Turnhallen von New York bis Tokio vom Rhythmus der aufspringenden Bälle und den Rufen "Basket!" wider. Es ist schnell, teamorientiert, an das moderne Leben angepasst - und vor allem [ROOT.GetCountry.GetAdjectiveNoFormatting]-geboren." #deepl:3707830614
 vikelas.21.g: "Führen Sie es in Schulen und Sporthallen ein." #deepl:2248999233
 vikelas.21.t: "Das Spiel mit dem Pfirsichkorb" #deepl:2623215155
 vikelas.401.d: "Der heutige Internationale Fußballverband wurde auf [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName] gegründet. Sein vollständiger Name lautet Fédération Internationale de Football Association (FIFA)." #deepl:3487975302
 vikelas.401.f: "Am 21. Mai 1904 unterzeichneten Delegierte aus sieben Nationen - Belgien, Dänemark, Frankreich, den Niederlanden, Spanien, Schweden und der Schweiz - eine Charta. Das Ziel: die Fußballregeln zu vereinheitlichen, internationale Spiele zu organisieren und das Spiel auf ein globales Niveau zu heben. Das war die Geburtsstunde der Fédération Internationale de Football Association - FIFA. In den ersten Jahrzehnten war die FIFA bescheiden: eine Teilzeitpräsidentschaft, Amateurspieler und regionale Streitigkeiten. Doch unter der Oberfläche wuchs eine globale Bewegung heran. England zögerte mit dem Beitritt, da es die Einmischung aus dem Ausland fürchtete. Die Südamerikaner begannen, ihre eigenen Konföderationen zu gründen. 1924 und 1928 zeigten die olympischen Turniere die wahre Reichweite des Fußballs: 60.000 Zuschauer in Paris, die nicht Armeen, sondern Mannschaften anfeuerten." #deepl:2154770056
 vikelas.401.g: "Treten Sie der FIFA bei und unterstützen Sie den internationalen Wettbewerb." #deepl:1192623767
 vikelas.401.t: "Internationaler Fußballverband (Fédération Internationale de Football Association)" #deepl:2948752940
 vikelas.411.d: "Die FIFA hat entschieden, dass die diesjährige Weltmeisterschaft in [SCOPE.sCountry('vikelas_fifa_host_scope').GetName] stattfinden wird. Nach der Vorrunde wird die Liste der Favoriten auf acht Mannschaften eingegrenzt." #deepl:1721956240
 vikelas.411.f: "#V Die folgenden Nationalmannschaften haben sich für das Viertelfinale qualifiziert#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "Möge sich das beste Team durchsetzen." #deepl:900366891
 vikelas.411.t: "Fußball-Weltmeisterschaft [TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "Unsere Mannschaft hat auf der Weltbühne triumphiert und die besten Mannschaften aus allen Kontinenten besiegt. Im ganzen Land bricht ein Jubel aus!" #deepl:1604872733
 vikelas.412.f: "In einem hitzigen Spiel gegen [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] hat sich unsere Mannschaft im Finale der Weltmeisterschaft in [SCOPE.sCountry('vikelas_fifa_host_scope').GetName] durchgesetzt. Unsere Nationalmannschaft hat die goldene Trophäe geholt. Der Schlusspfiff hallte durch Radios, Cafés und Kasernen. Von den Bergarbeitern im Norden bis zu den Kaufleuten im Hafen brüllten die Menschen gemeinsam. Der Kapitän weint auf dem Podium. Eine neue Generation schaut zu und träumt." #deepl:1159882054
 vikelas.412.g: "Wir sind die Champions." #deepl:2663168066
 vikelas.412.t: "Champions der Welt" #deepl:3853223886
 vikelas.413.d: "Unsere Fußballmannschaft hat das Finale erreicht - und scheiterte nur knapp am Ruhm. Im ganzen Land mischen sich Stolz und Herzschmerz gleichermaßen." #deepl:80141764
 vikelas.413.f: "Leider war das Beste unserer Mannschaft nicht gut genug. In einem nervenaufreibenden Spiel gegen [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] zogen unsere Männer den Kürzeren. Wochenlang trugen sie die Hoffnungen einer ganzen Nation. Auf schlammigen Feldern und bei sengender Hitze rannten sie, kämpften sie, glaubten sie. Spiel für Spiel wurden sie zu Legenden. Sie hielten ihre Köpfe hoch, als die andere Hymne gespielt wurde. Keine Tränen, nur Stille - und dann ein langsam ansteigender Beifall." #deepl:3695564906
 vikelas.413.g: "Das wurde von uns gestohlen!" #deepl:3624655051
 vikelas.413.t: "Silberner Ruhm in [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "Unsere Nationalmannschaft ist bei der FIFA-Weltmeisterschaft [SCOPE.sCountry('vikelas_fifa_host_scope').GetName] vorzeitig ausgeschieden. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] besiegte [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] im Finale." #deepl:317995881
 vikelas.414.f: "Es gab Hoffnung - echte, greifbare Hoffnung. Siege wurden auf Fabrikhöfen bejubelt, Radiokommentare in Kirchen geflüstert, Kinder spielten Tore in Gassen nach. Die Mannschaft stand für mehr als nur Fußball: für Ehrgeiz, für Stolz, für den Glauben, dass wir über uns hinauswachsen können. Doch das letzte Spiel veränderte alles. Ein einziges Tor wurde kassiert. Ein ungesehenes Handspiel. Eine verpasste Chance. Jetzt ist der Traum vorbei, und die Welt geht weiter." #deepl:640236906
 vikelas.414.g: "Wir haben geglaubt. Das war genug." #deepl:4069550601
 vikelas.414.t: "Der Traum endet früh" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] hat sich einen Namen gemacht, indem er eine ganze Generation von Spielern trainiert und gefördert hat. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] ist jetzt berühmt genug, um als Senior Coach zu gelten!" #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "Eine Auszeichnung für die Fähigkeit, auf dem Spielfeld schamlos zu schreien." #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] ist jetzt ein Senior Coach!" #deepl:454610152
 vikelas.495.d: "Eine neue [concept_vikelas_coach] hat [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself] eingeführt. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] heißt [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]." #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] wird unsere Jungs zum Sieg führen." #deepl:1930939286
 vikelas.495.t: "Ein neuer Trainer" #deepl:2806014865
 vikelas.601.d: "Auf den Boulevards ist eine neue Erfindung aufgetaucht: ein zweirädriges Gefährt, das durch direkt am Vorderrad angebrachte Pedale angetrieben wird. Es wird "Veloziped" genannt." #deepl:497189807
 vikelas.601.f: "In den Parks und auf den breiten Straßen der Hauptstadt drehen sich die Köpfe. Herren mit Hüten und Westen sitzen auf seltsamen Eisengestellen, treten wild in die Pedale und schwanken durch die aufgeschreckten Menschenmassen. Einige stürzen. Einige fliegen. Kinder lachen. Ältere Staatsmänner heben die Brauen. Die Zeitungen nennen es le vélocipède - halb Spielzeug, halb Versprechen. Dieser von einem Kutschenbauer erfundene "Knochenschüttler" ist ebenso schwer wie revolutionär. Auf Kopfsteinpflaster erschüttert er die Wirbelsäule. Aber auf glatten Promenaden bewegt er sich mit überraschender Anmut. Es wird gemunkelt, dass es sich nicht um eine bloße Neuheit handelt, sondern um den Keim einer neuen Art von Bewegung." #deepl:2987098471
 vikelas.601.g: "Eine amüsante Mode!" #deepl:3063453559
 vikelas.601.t: "Pedale auf dem Bürgersteig" #deepl:583302045
 vikelas.602.d: "Es gibt ein neues Fahrraddesign mit gleich großen Rädern, einer kettengetriebenen Hinterachse und einer besseren Balance. Im Gegensatz zu den wackeligen Hochrädern ist dieses "Sicherheitsfahrrad" stabil, erschwinglich und entwickelt sich schnell zu einer Sensation. Sein Erfinder? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!" #deepl:1082254426
 vikelas.602.f: "Die alten Velozipedes erschütterten Knochen und Nerven gleichermaßen. Die hoch aufragenden Hochräder boten Geschwindigkeit, aber zu einem Preis, den nur wenige zu zahlen bereit waren - eine falsche Bewegung und der Fahrer flog. Jetzt macht sich in den Werkstätten unserer Hauptstadt eine neue Art von Fahrrad breit: kompakt, elegant und sicher. Mit einem Kettenantrieb für das Hinterrad und Luftreifen beginnen sogar Damen und Arbeiter zu fahren. Auf den Straßen, die einst von Kutschen beherrscht wurden, ertönt nun das leise Summen von Gummi auf Stein. In Cafés und Fabriken ist man sich einig: Das ist kein Spielzeug. Es ist die Freiheit - schnell, leise und plötzlich zum Greifen nah." #deepl:2048166631
 vikelas.602.g: "Lassen Sie alle Bürgerinnen und Bürger in das moderne Zeitalter eintreten." #deepl:158167297
 vikelas.602.t: "Das Fahrrad der Zukunft" #deepl:3168239488
 vikelas.611.d: "Der Tag ist gekommen. Fahrer aus dem ganzen Land versammeln sich an der Startlinie, begierig darauf, Mensch und Maschine auf der offenen Straße zu testen. Die Luft knistert vor Vorfreude." #deepl:3817467534
 vikelas.611.f: "Die Sonne geht über dem Boulevard auf, der bereits von Zuschauern bevölkert ist. Fahnen flattern. Der Geruch von Schmiere und Staub liegt in der Morgenluft. Dutzende von Fahrern steigen auf ihre Räder - einige glänzende Maschinen frisch aus der Fabrik, andere in Hinterhofwerkstätten zusammengeflickt. Jubel bricht aus. Und die Räder beginnen sich zu drehen.\nSie fahren durch die Stadttore und hinaus aufs Land. Bauern machen eine Pause auf ihren Feldern. Kinder rennen am Straßenrand. Priester segnen sie. Zyniker spotten. Und doch, während der Staub hinter ihnen zurückbleibt, kommt in der Menge ein seltsames Gefühl auf: Dies fühlt sich an wie der Beginn von etwas Größerem." #deepl:872369825
 vikelas.611.g: "Jede Stadt soll das Rauschen des Fortschritts hören." #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "Der Sieger des nationalen Radrennens hat mehr als nur die Ziellinie erobert - er hat die Fantasie der Nation erobert. Jetzt richten sich alle Augen auf das, wofür er steht." #deepl:2904065614
 vikelas.621.f: "Die Zeitungen nennen ihn den "Eisernen Reiter". Geboren in einer Weberfamilie, mit zwölf Jahren Waise, mit sechzehn Fabrikarbeiter. Sein Sieg auf einem ramponierten Sicherheitsfahrrad - sorgfältig geflickt, geschrottet und geölt - war kein bloßer sportlicher Triumph. Er war ein Gleichnis. Menschenmengen singen seinen Namen. Maler skizzieren ihn. Kinder ahmen seine Körperhaltung nach. Aber nicht nur das, auch Ideologen nehmen ihn zur Kenntnis. Einige nennen ihn das Gesicht der Stärke der Arbeiterschaft. Andere sagen, er beweise die Vitalität der Nation. Die Presse streitet darüber, ob er ein Arbeiter, ein Patriot - oder etwas ganz anderes ist.\n Der Reiter selbst spricht wenig. Er lächelt, nickt und reitet." #deepl:2953543537
 vikelas.621.g: "Machen Sie ihn zu einem Helden der Arbeiterklasse." #deepl:2363628364
 vikelas.621.h: "Feiern Sie ihn als eine nationale Ikone." #deepl:255033591
 vikelas.621.i: "Machen Sie ihn zu einem Symbol des Fortschritts und des modernen Menschen." #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "Während des nationalen Radrennens hat sich ein tragischer Unfall ereignet. Ein Fahrer ist tot, mehrere andere sind verletzt. Der Jubel ist verstummt." #deepl:644341100
 vikelas.622.f: "Ein Rad hat eine Spurrille erwischt. Ein Schrei, ein Aufprall, und dann ein Schrei. Die Zuschauer stürmten nach vorne, während die Fahrräder wie Dominosteine umkippten. Blut vermischte sich mit Staub. Helme zerbrachen. Knochen brachen. Ein junger Mann - siebzehn, ein Fabriklehrling - starb beim Aufprall. Die Zeitungen sind geteilter Meinung. Die einen nennen es einen notwendigen Preis des Fortschritts, die anderen beklagen die Rücksichtslosigkeit des öffentlichen Sports." #deepl:1135060049
 vikelas.622.g: "Ehre die Gefallenen." #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "Eine bestimmte Etappe des Rennens hat die Herzen der Öffentlichkeit erobert. Die Zuschauer sprechen nicht nur von einem Wettbewerb, sondern von einer Legende." #deepl:438486236
 vikelas.623.f: "Im Morgengrauen verschwanden die Reiter in den Hügeln. Was nun folgte, war kein Rennen mehr, sondern ein Test des Geistes. Ein Dutzend fiel zurück. Drei kollabierten. Einer stürzte in einer Haarnadelkurve, stand blutend auf und winkte Hilfe herbei. Aber einer fuhr durch den Nebel in die Herzen von Tausenden. Die ganze Nation spricht von nichts anderem." #deepl:130901318
 vikelas.623.g: "Die Straße soll sich über Generationen hinweg an seinen Einsatz erinnern." #deepl:3983380699
 vikelas.623.h: "Geben Sie ein Gemälde des Augenblicks in Auftrag." #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "Nach der letzten Etappe des Rennens sind Anschuldigungen laut geworden. Ein Fahrer wurde beim Schummeln erwischt - obwohl einige behaupten, er habe nur das getan, was alle tun, nur weniger diskret." #deepl:3963790231
 vikelas.624.f: "Sie sagten, er habe hinter der Scheune die Fahrräder gewechselt. Andere sagen, er wurde von einem versteckten Draht den Hügel hinaufgezogen.'\n\Die Fakten sind unklar. Was klar ist, ist dies: Der Fahrer war zu schnell. Spektakulär schnell. Zu frisch nach einem brutalen Anstieg. Seine Konkurrenten wüten. Die Zuschauer staunen. Die Presse wittert Blut. Auf einem Foto ist ein zweiter Mann in gleicher Kleidung zu sehen. Ein anderer Zeuge behauptet, er habe gesehen, wie der Fahrer während der Nachtetappe von einem Auto gestoßen wurde. Der Beschuldigte streitet alles ab und nennt es Neid und Politik." #deepl:2810733320
 vikelas.624.g: "Disqualifizieren Sie den Fahrer und decken Sie den Betrug auf." #deepl:2198835421
 vikelas.624.h: "Verdecken Sie es zum Wohle des Sports." #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "Die diesjährige Rennsaison steht ganz im Zeichen einer erbitterten Rivalität. Zwei Fahrer - gleich stark, gegensätzlich im Stil - haben die Nation in zwei Lager gespalten." #deepl:2483368762
 vikelas.625.f: "Der eine ist Feuer: rücksichtslos, kühn, von der Jugend verehrt. Er wirft seine Kappe in die Menge, lacht, während er in die Pedale tritt, und greift ohne Vorwarnung an.\nDer andere ist Eis: ruhig, berechnend, fast mathematisch. Er spart seine Kräfte, gewinnt in Sekundenschnelle und spricht nur, wenn es nötig ist.\n\n Ihre Namen werden von den Dächern gerufen. Die Städte ergreifen Partei. Plakate werden in Rot oder Blau gedruckt. Schneider verkaufen Mützen in ihren Farben. Kinder ahmen ihre Haltung auf hölzernen Fahrrädern nach.\nDie Zeitungen sprechen von mehr als nur einer Ethnie. Sie sprechen von Charakter, von Philosophie, davon, wer die Menschen sein wollen. Und keiner der Fahrer gibt einen Zentimeter nach." #deepl:1380551122
 vikelas.625.g: "Dies wird der Zeitungskultur zugute kommen." #deepl:3508242265
 vikelas.625.h: "Nutzen Sie die Rivalität zum politischen Vorteil." #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "Die diesjährige Rennsaison steht ganz im Zeichen einer erbitterten Rivalität. Zwei Fahrer - gleich stark, gegensätzlich im Stil - haben die Nation in zwei Lager gespalten." #deepl:2483368762
 vikelas.626.f: "Sie fanden ihn in einer Dorfschmiede, den Hammer in der Hand, das Gesicht rußgeschwärzt, allein. Eine falsch eingeschätzte Kurve, ein Knirschen von Schotter - und die Vordergabel brach. Sein Fahrrad klappte zusammen wie ein verwundeter Vogel. Die meisten hätten angehalten. Aber nicht er.\n Er humpelte bergab und schleppte den Rahmen kilometerweit. In einem abgelegenen Dorf fand er eine Schmiede. Keine Mechaniker. Kein Mannschaftswagen. Nur Blasebalg, Amboss und seine eigenen Hände.\n Stundenlang arbeitete er - mit aufgekrempelten Ärmeln und zusammengebissenem Kiefer - und formte die Vorderradgabel aus dem Gedächtnis und nach Gefühl. Als die Offiziellen eintrafen, hielt er nur kurz inne, um sie anzustarren und zu sagen: "Fassen Sie das nicht an. Keine Chance auf den Sieg. Doch entlang der Strecke jubelte die Menge - nicht dem Sieger zu, sondern demjenigen, der sich weigerte, anzuhalten." #deepl:896070649
 vikelas.626.f: "Sie fanden ihn in einer Dorfschmiede, den Hammer in der Hand, das Gesicht rußgeschwärzt, allein. Eine falsch eingeschätzte Kurve, ein Knirschen von Schotter - und die Vordergabel brach. Sein Fahrrad klappte zusammen wie ein verwundeter Vogel. Die meisten hätten angehalten. Aber nicht er.\n Er humpelte bergab und schleppte den Rahmen kilometerweit. In einem abgelegenen Dorf fand er eine Schmiede. Keine Mechaniker. Kein Mannschaftswagen. Nur Blasebalg, Amboss und seine eigenen Hände.\n Stundenlang arbeitete er - mit aufgekrempelten Ärmeln und zusammengebissenem Kiefer - und formte die Vorderradgabel aus dem Gedächtnis und nach Gefühl. Als die Offiziellen eintrafen, hielt er nur kurz inne, um sie anzustarren und zu sagen: "Fassen Sie das nicht an. Keine Chance auf den Sieg. Doch entlang der Strecke jubelte die Menge - nicht dem Sieger zu, sondern demjenigen, der sich weigerte, anzuhalten." #deepl:896070649
 vikelas.626.g: "Eine inspirierende Geschichte." #deepl:3324986220
 vikelas.626.h: "Genehmigung von Notreparaturen." #deepl:385201552
 vikelas.626.i: "Ehre ihn!" #deepl:581594471
