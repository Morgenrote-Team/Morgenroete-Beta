 khaldun.101.d: "Vor Jahrhunderten war Al-Qarawiyyin ein Zentrum der Wissenschaft und des Lernens. Jetzt hat sie ihren Platz als eine der wichtigsten Universitäten der Welt wieder eingenommen." #deepl:2097299752
