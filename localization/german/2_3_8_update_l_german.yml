 je_khaldun_al_qarawiyyin_bar_goal_tt: "Der Fortschrittsbalken hat #V 2000 erreicht.#!" #deepl:3077461812
 je_khaldun_al_qarawiyyin_reason: "Das Al-Qarawiyyin war einst ein großes Zentrum des Lernens und ist seit Jahrhunderten im Niedergang begriffen. Aber vielleicht können wir seinen Kurs umkehren und es wieder zu einem wichtigen Wissenschaftszentrum machen." #deepl:1953836253
 je_verrier_venus_transit_1874: "Venusübergang von 1874 in [SCOPE.sCountry('target').GetName]" #deepl:3052931223
 je_verrier_venus_transit_1874_reason: "Ein seltenes Himmelsereignis steht bevor. Der Planet Venus wird direkt zwischen der Erde und der Sonne vorbeiziehen und seinen winzigen Schatten auf die Sonnenscheibe werfen. Observatorien auf der ganzen Welt bereiten sich auf dieses flüchtige Phänomen vor, das dazu beitragen könnte, die Ausmaße unseres Sonnensystems zu definieren.\n$mr_divider_for_je$\nWährend dieser Expedition erhalten Sie eine Erfolgschance. Am Ende der Expedition erhältst du einen Modifikator. Je höher deine Erfolgschance ist, desto größer ist die Wirkung des Modifikators.\n#V Aktueller Erfolg:#! [GetPlayer.MakeScope.Var('verrier_venus_transit_success_var').GetValue|0+]" #please replace
 je_verrier_venus_transit_1874_on_complete_tt: "Am Ende der Expedition besteht eine #n 25%ige Chance auf schlechtes Wetter#! was deinen Erfolgswert senkt. Am Ende erhältst du einen #V Modifikator#!, der #V basierend auf deinem Erfolgswert#! ist."
