 dubois_poor_megalodon_paleontologist_loc: "\nDer #o Megalodon#!, der von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert wurde, scheint ein bisschen... daneben zu sein. Der riesige Kopf ist an einem sehr dünnen Hals befestigt und anscheinend hatte der Hai seltsame Stacheln, die seinen ganzen Körper bedeckten." #deepl:3797074524
