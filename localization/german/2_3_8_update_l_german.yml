 nationalization.11.d: "Unter [TimeKeeper.GetCurrentDate.Format('y')] wurde in Italien ein bahnbrechendes Kochbuch veröffentlicht, das die italienische Esskultur für immer verändern sollte. Der Autor, Pellegrino Artusi, leistete damit seinen Beitrag zur Etablierung einer international anerkannten italienischen Küche, die die Einheit und Größe der Nation betont." #deepl:4223602969
 nationalization.11.f: "Das 1891 veröffentlichte Buch "La scienza in cucina e l'arte di mangiare bene" von Pellegrino Artusi gilt weithin als das erste moderne italienische Kochbuch. Zu einer Zeit, als Italien gerade begann, eine nationale Identität zu schaffen, spielte Artusis Werk eine entscheidende Rolle bei der Vereinigung der verschiedenen regionalen Küchen zu einer kohärenten nationalen kulinarischen Tradition. Seine akribische Sammlung von Rezepten, die er mit Witz und Klarheit präsentierte, setzte nicht nur einen neuen Standard für die kulinarische Literatur, sondern trug auch wesentlich zur Verbesserung des Lebensstandards der Nation bei, indem er Qualität, Innovation und Stolz auf die lokale Gastronomie förderte." #deepl:2207143835
 nationalization.11.g: "Ein Triumph der kulinarischen Kunst!" #deepl:1345745332
 nationalization.11.t: "Die Wissenschaft in der Küche und die Kunst, sich gut zu ernähren" #deepl:3987888764
 pius.101.d: "Zwei Kinder in den Bergen Südostfrankreichs behaupten, eine Erscheinung der Jungfrau Maria erlebt zu haben, was in der gesamten katholischen Welt eine Welle geistlicher Begeisterung - und Besorgnis - auslöst." #deepl:1912784731
 pius.101.f: "'Kommt näher, meine Kinder, habt keine Angst. Ich bin hier, um euch eine große Nachricht zu bringen...'\n\Hoch auf den Almen oberhalb des Dorfes La Salette, in der Nähe von Corps im Südosten Frankreichs, berichten zwei Hirtenkinder von einer Vision, die heute die Herzen der ganzen Christenheit bewegt. Eine lichtdurchflutete, in Trauer gehüllte Frau erschien ihnen. Sie weinte - Tränen über eine Welt, die sich von Gott abgewandt hatte. Sie sprach von schamlos geäußerten Gotteslästerungen, von entweihten Sonntagen und von Hunger und Verderben, die kommen würden, wenn die Menschen nicht umkehrten.\n Was zunächst wie eine ländliche Legende erschien, ist zu einer Bewegung geworden. Pilger strömen zu dem abgelegenen Berghang. Mönche und Journalisten klettern auf denselben Pfaden. Die Kirche schwankt: Einige begrüßen die Vision als göttlichen Aufruf zur Buße, andere fürchten den Aufstieg eines populären Mystizismus und einer irrationalen Inbrunst.\n Der Bischof von Grenoble stimmt vorsichtig zu. Die weltlichen Behörden bleiben misstrauisch.\Und Rom? Rom schaut zu - schweigend. Aber die Glocken läuten bereits." #deepl:2145205681
 pius.101.g: "Eine himmlische Warnung." #deepl:3313498992
 pius.101.h: "Bleiben Sie rational." #deepl:499500707
 pius.101.t: "Die Erscheinung in La Salette" #deepl:3065761669
 pius.102.d: "In der kleinen Stadt Lourdes behauptet ein vierzehnjähriges Mädchen, eine strahlende Frau in einer Grotte gesehen zu haben. Ihre Visionen ziehen bald Pilger, Kontroversen - und die Aufmerksamkeit Roms auf sich." #deepl:1624678567
 pius.102.f: "'Sie war jung, barfuß und arm. In einer abgelegenen Grotte in der Nähe von Lourdes, in den Ausläufern der Pyrenäen, erzählt ein Bauernmädchen namens Bernadette Soubirous von einer weiß gekleideten Frau mit einer blauen Schärpe und goldenen Rosen an den Füßen. Die Vision sagt zunächst nichts - sie lächelt nur. Dann spricht sie: von der Buße, vom Gebet, vom Leiden und von der göttlichen Barmherzigkeit. Sie nennt sich einfach: Die Unbefleckte Empfängnis.\nDie Dorfbewohner spotten zunächst. Aber als Bernadette eine verborgene Quelle entdeckt und behauptet, sie sei eine Quelle der Heilung, kommen Tausende - hoffend, betend, weinend. Krücken werden zurückgelassen. Zeugnisse verbreiten sich. Skeptiker beklagen Hysterie. Ärzte, Priester und Politiker strömen nach Lourdes.\nDie Kirche stellt Nachforschungen an. Der Staat schaut misstrauisch zu. Und trotzdem kommen die Menschen." #deepl:580789021
 pius.102.g: "Ein Heiligtum der Heilung und Hoffnung." #deepl:2629250679
 pius.102.h: "Halluzinationen!" #deepl:3891021600
 pius.102.t: "Die Erscheinung in Lourdes" #deepl:1767463178
 pius.103.d: "In dem irischen Dorf Knock berichten fünfzehn Zeugen von einer stillen Erscheinung der Jungfrau Maria, des heiligen Josef und des heiligen Johannes des Evangelisten. Die Vision rührt ein Volk, das lange unter Armut, Exil und Fremdherrschaft gelitten hat." #deepl:143567078
 pius.103.f: "Sie sagten kein einziges Wort. Doch in diesem Schweigen hörte eine Nation die Hoffnung.'\n\nDer Regen ergoss sich unaufhörlich über die Pfarrkirche von Knock in der Grafschaft Mayo. Und doch standen fünfzehn Dorfbewohner wie gebannt. Vor ihnen, an der südlichen Giebelwand in Licht getaucht, stand eine schweigende Versammlung: die Jungfrau Maria in betender Haltung, der heilige Josef an ihrer Seite, der heilige Johannes der Evangelist, in Gewand und mit einem Evangelium in der Hand. Hinter ihnen ein Lamm auf einem Altar und ein Kreuz. Keine Botschaft wurde gesprochen. Keine Bewegung wurde gemacht. Und doch schworen die Zeugen auf das, was sie sahen - Junge und Alte, Männer und Frauen gleichermaßen.\n In einem Land, das von Hungersnot, Auswanderung und spiritueller Sehnsucht gezeichnet war, hallte die stille Vision lauter als Predigten. Bald kamen Pilger, die Heilung, Zeichen und Trost suchten. Die englischen Behörden verhöhnten sie. Einige in der Kirche zögerten. Doch unter den Armen und Frommen Irlands wurde Knock zu einem heiligen Schrei nach Würde." #deepl:216954390
 pius.103.g: "Ein Licht im Regen." #deepl:4199802423
 pius.103.h: "Tun Sie es als Folklore ab." #deepl:2853965001
 pius.103.t: "Die stille Vision bei Knock" #deepl:3086062832
 pius.104.d: "In Zentralportugal berichten drei Hirtenkinder von wiederholten Erscheinungen der Jungfrau Maria, die in einem wundersamen Phänomen gipfeln, das von Tausenden bezeugt wird. Ihre Visionen enthalten Prophezeiungen über Krieg, Leid und die Zukunft der Kirche." #deepl:3494130064
 pius.104.f: "In der Nähe der Stadt Fátima, in den ländlichen Hügeln von Cova da Iria, sprechen drei Kinder - Lucia, Francisco und Jacinta - von einer Frau, die heller als die Sonne ist, gekleidet in Glanz und Trauer. Über sechs Monate hinweg erscheint sie immer wieder und warnt vor einem weltweiten Krieg, dem Aufkommen gottloser Ideologien und der Verfolgung der Gläubigen. Sie ruft zur Buße, zum Gebet und zur Weihe Russlands an ihr Herz auf.\Am 13. Oktober 1917, als Zehntausende im strömenden Regen stehen, scheint sich die Sonne vom Himmel zu lösen, sich zu drehen und am Himmel zu zerschellen. Einige fallen auf die Knie. Andere fliehen. Als das Licht verblasst, ist ihre Kleidung trocken. Die Menge zerstreut sich schweigend, ehrfürchtig und ängstlich.\nDie Kirche ist vorsichtig. Die Presse ist gespalten. Aber unter den Menschen - vor allem unter den Armen, den Verwundeten und den Gläubigen - brennt eine neue Flamme: eine Flamme der Hoffnung, eine Flamme der Warnung, eine Flamme, die die Jungfrau nicht nur als Mutter, sondern als Wächterin des kommenden Zeitalters sieht." #deepl:2513437425
 pius.104.g: "Beachtet die Warnungen von Fátima." #deepl:1664428204
 pius.104.h: "Entlarven Sie das Sonnenwunder." #deepl:958137642
 pius.104.t: "Die Geheimnisse von Fátima" #deepl:1100906175
 pius.105.d: "In einem abgelegenen Dorf in der Nähe von [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] wird von einer Erscheinung der Jungfrau Maria berichtet. Die Geschichte verbreitet sich schnell und zieht Pilger, Skeptiker und die Aufmerksamkeit der kirchlichen Behörden auf sich." #deepl:45703861
 pius.105.f: "Sie stand über den Feldern, in einer Krone aus Licht, und schaute auf uns, als ob sie den Kummer jeder Seele kennen würde.'\n\Der erste, der sprach, war ein Kind - die Augen weit vor Ehrfurcht, die Stimme zitternd. Es sprach von einer Frau, heller als die Morgenröte, eingehüllt in Glanz und Trauer, die in der Stille erschien und die Welt mit tiefem, wissendem Kummer betrachtete. Auch andere behaupteten, sie zu sehen. Einige fielen auf die Knie. Andere rannten. Alle erinnerten sich an die Stille, die folgte.\nDie Geschichte verbreitete sich über das Dorf hinaus. Pilger kamen an, Kerzen in der Hand. Die Gläubigen beteten. Die Betrübten hofften. Priester debattierten. Beamte zogen die Augenbrauen hoch. Aber die Menschen kamen immer wieder - angezogen nicht von der Gewissheit, sondern von etwas Älterem: dem Bedürfnis zu glauben.\nOb Wunder, Vision oder Mythos, das Ereignis hat bereits die Herzen derer geprägt, die es miterlebt haben - und das Leben derer, die nun entscheiden müssen, was es bedeutet." #deepl:3063415784
 pius.105.g: "Ein Zeichen für die Gläubigen." #deepl:1177288670
 pius.105.h: "Die Hysterie unterdrücken." #deepl:1037767630
 pius.105.t: "Unsere Liebe Frau von [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "Trotz des behördlichen Verbots öffentlicher Darbietungen hat eine Schar von Gläubigen eine spontane Prozession zum Ort der Marienerscheinung unter [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] begonnen." #deepl:3379456873
 pius.111.f: "Wir zündeten keine Fackeln an, wir trugen keine Fahnen. Nur Rosenkränze, Schweigen und unsere Füße im Staub.'\n\n Sie kamen im Morgengrauen, zu zweit und zu dritt, gingen durch Felder und Dörfer und flüsterten Gebete. Gegen Mittag waren es Hunderte, die über die Landstraßen strömten, einige barfuß, andere weinend. Frauen hielten Blumen. Alte Männer murmelten Litaneien. Kinder umklammerten aus Holz geschnitzte Ikonen. Die Behörden hatten die Stätte für geschlossen erklärt. Soldaten standen Wache. Doch niemand hielt die Menge auf. Vielleicht war es der Gesang. Vielleicht die Stille. Vielleicht war es etwas Unsichtbares.\Nachdem die Gläubigen den Ort der Vision erreicht hatten, knieten sie nieder, murmelten Gebete und zündeten Kerzen in der Erde an. Keine Stimme donnerte vom Himmel. Kein Wunder war zu sehen. Aber etwas hatte sich bereits verändert. Ein Volk hatte gehandelt - nicht gegen das Gesetz, sondern im Gehorsam gegenüber etwas, das älter war als das Gesetz." #deepl:2369382513
 pius.111.g: "Sie sollen beten." #deepl:2163336687
 pius.111.h: "Beobachten Sie in aller Ruhe." #deepl:3862482018
 pius.111.h_tt: "Es ist sehr wahrscheinlich, dass es weitere Ereignisse im Gefolge der Marienerscheinung geben wird." #deepl:2612943668
 pius.111.i: "Vertreiben Sie sie mit Gewalt." #deepl:1733449904
 pius.111.i_tt: "Die Wahrscheinlichkeit eines blutigen Zusammenstoßes ist sehr hoch." #deepl:202372566
 pius.111.t: "Die ungebetene Prozession" #deepl:3613794317
 pius.112.d: "Eine Konfrontation zwischen den Behörden und den Gläubigen am Ort der verbotenen Marienprozession ist gewalttätig geworden. Der Boden, auf dem einst Visionen die Hoffnung weckten, ist nun mit Blut befleckt." #deepl:2719807490
 pius.112.f: "Es wurde gebetet, und dann wurde geschrien. Die Kerzen flackerten noch, als die Soldaten kamen. Stimmen wurden laut, erst verwirrt, dann flehend. Eine Frau stürzte. Ein Junge schrie auf. Niemand weiß, wer den Befehl gab - aber Musketen knallten, Knüppel schwangen, Stiefel bewegten sich durch Weihrauch und Erde. Als die Stille zurückkehrte, war sie schwerer als zuvor.\nDie Kirche ist erschüttert. Die Gläubigen sind empört. Die Presse spricht in gedämpften Tönen - einige nennen es einen Unfall, andere ein Massaker. Der Ort, der einst als heilig geflüstert wurde, ist nun durch die Erinnerung verflucht. Und doch versammeln sich die Menschen - nicht mit Blumen, sondern mit Wut, mit Schweigen, mit einem Blick, den kein Gesetz auslöschen kann." #deepl:2186004653
 pius.112.g: "Wir bedauern, was geschehen ist." #deepl:3313805008
 pius.112.h: "Sie haben sich das selbst zuzuschreiben." #deepl:402397332
 pius.112.t: "Blut auf dem Heiligen Grund" #deepl:1312740775
 pius.113.d: "Ein örtlicher Priester ist zum wichtigsten Verteidiger der Marienerscheinung auf [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] aufgestiegen. Seine Predigten ziehen Menschenmassen an, seine Worte wecken Hoffnung - und fordern die staatliche Autorität heraus. Sein Name ist Pater [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]." #deepl:1046441460
 pius.113.f: "Sie ist den Geringen erschienen, nicht den Mächtigen. Und vielleicht ist das der Grund, warum sie sie zum Schweigen bringen wollen.'\n\In der Steinkirche oberhalb des Dorfes hat ein Priester namens Pater [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] begonnen zu predigen - nicht nur über die Barmherzigkeit der Jungfrau, sondern auch über ihre Gerechtigkeit. Seine Worte hallen über das Kirchenschiff hinaus: 'Wenn der Himmel hier gesprochen hat, dann kann keine Regierung sein Echo verbieten. Sein Name verbreitet sich im Flüsterton und in den Gesangbüchern. Er mahnt zum Frieden, aber seine Anwesenheit löst Unruhe aus. Manche nennen ihn einen Propheten. Andere einen Rebellen in Gewändern. Die Behörden werden unruhig. Das Militär spricht von Aufwiegelung. Die Kirchenhierarchie zögert - hin- und hergerissen zwischen Dogma und Diplomatie. Ein leiser Vorschlag landet auf Ihrem Schreibtisch: Er könnte entfernt werden. Still und leise. Diskret.\nAber manche Männer, die zum Schweigen gebracht werden, sprechen noch lauter." #deepl:2395659126
 pius.113.g: "Lass ihn predigen." #deepl:3471579290
 pius.113.h: "Holen Sie ihn zu Verhandlungen in die Hauptstadt." #deepl:1641636788
 pius.113.i: "Lassen Sie ihn verschwinden." #deepl:3010062703
 pius.113.t: "Die Stimme auf der Kanzel" #deepl:3682486724
 pius.114.d: "Überall im Land haben katholische Gläubige mit öffentlichen Demonstrationen zur Unterstützung der Marienerscheinung begonnen. Was als ländliche Wallfahrt begann, hat sich zu einer nationalen Bewegung entwickelt." #deepl:3473602537
 pius.114.f: "Sie gingen mit Rosenkränzen in den Händen, ihren Kindern auf den Schultern und dem Namen der Jungfrau Maria auf den Lippen.'\n\nOb in Fischerdörfern oder Fabrikstädten, die Zeichen sind dieselben: Kerzen brennen in den Fenstern, Hymnen hallen über die Plätze, Tausende versammeln sich in Stille. Es werden keine Fahnen geschwenkt - nur Statuen, Ikonen und ein einziger Name, der immer wieder gemurmelt wird: Maria. Was als Andacht begann, ist zum Trotz geworden. Als Reaktion auf die Gewalt an der heiligen Stätte [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] sind die Gläubigen auf die Straße gegangen. Sie schreien nicht. Sie beten. Aber ihre Zahl wächst täglich.\nEinige in der Regierung mahnen zur Toleranz. Andere fordern ein hartes Durchgreifen. Das Militär ist unruhig. Und in den Häusern im ganzen Land fragen sich selbst die Zweifler: Wenn so viele glauben, kann es dann noch eine Lüge sein?" #deepl:3107082794
 pius.114.g: "Erlauben Sie die nationale Prozession." #deepl:3918828179
 pius.114.h: "Verbot der nationalen Prozession." #deepl:1813497751
 pius.114.t: "Die Prozession, die die Nation erschütterte" #deepl:738056863
 pius.115.d: "In mehreren ländlichen Regionen von [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] ist es zu schweren Ernteausfällen gekommen. Unter den Gläubigen beginnt sich ein gefährliches Gerücht zu verbreiten: dass die Jungfrau, die einst vom Staat zum Schweigen gebracht wurde, nun weint - und straft." #deepl:3238123436
 pius.115.f: "Sie bat um Gebete. Wir gaben ihr Soldaten.'\n\nDer Regen blieb aus. Der Weizen vergilbte zu früh. Kartoffeln verfaulten unter der Erde, ungesehen und bitter. Dorfbewohner sprechen von Feldern, die sich... verlassen anfühlen. Nicht nur von den Menschen, sondern auch von der Gnade.\n Und so flüstern sie. Von der Frau im Licht, die einst erschien - und verspottet wurde. Von dem Priester, der verschwunden ist. Von dem versiegelten Schrein und den geschlagenen Pilgern. Jetzt, so sagen sie, hat sie ihr Gesicht abgewandt.\nKerzen brennen wieder, aber jetzt hinter verschlossenen Fenstern. Mütter taufen ihre Kinder im Geheimen. Alte Männer vergraben Brotkrusten als Opfergaben. Die Kirche wagt nicht zu sprechen, aber das Volk glaubt bereits: Das ist ihr Kummer. Oder ihre Warnung." #deepl:2485032935
 pius.115.g: "Aberglaube! Ich hoffe..." #deepl:2447781343
 pius.115.t: "Die Felder sind menschenleer" #deepl:3151937266
 pius.116.d: "Nach Jahren der Unterdrückung und der Verleugnung von Wundern haben viele einst gläubige Bürger begonnen, ihren Glauben an [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] aufzugeben. Eine wachsende Zahl bezeichnet sich nicht mehr als katholisch, sondern als gar nicht mehr katholisch." #deepl:1323000478
 pius.116.f: "Sie kommt nicht mehr. Nicht in Träumen, nicht in Visionen. Die Kerzen brennen nicht mehr.'\n\Der Schrein ist verschlossen. Der Priester ist fort. Die Felder sind still.\nEs gab eine Zeit, in der selbst die Ärmsten vor dem Schlafengehen Ave Marias flüsterten, in der Ikonen neben den Herden hingen und beim Klang der Glocken Tränen flossen. Jetzt stehen die Kirchen leer. Kinder fragen, was die "Beichte" war. Die Jungen sprechen von Vernunft, von Fortschritt, von Nichts.\nDas Volk hat sich nicht der Ideologie zugewandt. Sie haben sich der Asche zugewandt. Sie sind keine Radikalen. Sie sind erschöpft. Und irgendwo in der hohlen Stille verharrt die Frage: "Hat sie uns verlassen - oder haben wir sie verlassen?" #deepl:231766477
 pius.116.f: "Sie kommt nicht mehr. Nicht in Träumen, nicht in Visionen. Die Kerzen brennen nicht mehr.'\n\Der Schrein ist verschlossen. Der Priester ist fort. Die Felder sind still.\nEs gab eine Zeit, in der selbst die Ärmsten vor dem Schlafengehen Ave Marias flüsterten, in der Ikonen neben den Herden hingen und beim Klang der Glocken Tränen flossen. Jetzt stehen die Kirchen leer. Kinder fragen, was die "Beichte" war. Die Jungen sprechen von Vernunft, von Fortschritt, von Nichts.\nDas Volk hat sich nicht der Ideologie zugewandt. Sie haben sich der Asche zugewandt. Sie sind keine Radikalen. Sie sind erschöpft. Und irgendwo in der hohlen Stille verharrt die Frage: "Hat sie uns verlassen - oder haben wir sie verlassen?" #deepl:231766477
 pius.116.g: "Das Zeitalter des Glaubens ist vorbei." #deepl:146424195
 pius.116.t: "Die Stille hinter der Glocke" #deepl:2179217507
 pius.119.d: "Die neu eingesetzte atheistische Regierung hat die Schließung des Marienwallfahrtsortes angeordnet. Was einst ein Ort des Lichts und des Gebets war, ist nun abgesperrt, still und unter staatlicher Aufsicht." #deepl:1939840262
 pius.119.f: "Keine Glocken läuteten. Keine Kerzen brannten. Die Tore wurden vor Sonnenaufgang verschlossen.'\n\Der Schrein, der einst Tausende anzog, steht jetzt allein. An die Tür der Kapelle wurde ein Zettel genagelt: "Auf Anordnung der Volksversammlung wird dieses Bauwerk für nicht lebensnotwendig erklärt. Wachen halten Wache, nicht um zu schützen, sondern um zu verhindern.\nEs wurde keine Gewalt angewendet. Proteste wurden nicht zugelassen. Die Veränderung erfolgte leise und bürokratisch - eher durch Abwesenheit als durch eine Explosion. Doch in den Häusern im ganzen Land zittern die Hände älterer Menschen. Großmütter verstecken ihre Rosenkränze. Kinder fragen, warum die Pilger nicht mehr singen. Der Klerus schweigt. Die Partei spricht von Wissenschaft, Vernunft und Fortschritt. Und irgendwo hinter verschlossenen Türen flackert eine Frage wie eine halb erloschene Kerze: War das wirklich notwendig?" #deepl:3255413028
 pius.119.f: "Keine Glocken läuteten. Keine Kerzen brannten. Die Tore wurden vor Sonnenaufgang verschlossen.'\n\Der Schrein, der einst Tausende anzog, steht jetzt allein. An die Tür der Kapelle wurde ein Zettel genagelt: "Auf Anordnung der Volksversammlung wird dieses Bauwerk für nicht lebensnotwendig erklärt. Wachen halten Wache, nicht um zu schützen, sondern um zu verhindern.\nEs wurde keine Gewalt angewendet. Proteste wurden nicht zugelassen. Die Veränderung erfolgte leise und bürokratisch - eher durch Abwesenheit als durch eine Explosion. Doch in den Häusern im ganzen Land zittern die Hände älterer Menschen. Großmütter verstecken ihre Rosenkränze. Kinder fragen, warum die Pilger nicht mehr singen. Der Klerus schweigt. Die Partei spricht von Wissenschaft, Vernunft und Fortschritt. Und irgendwo hinter verschlossenen Türen flackert eine Frage wie eine halb erloschene Kerze: War das wirklich notwendig?" #deepl:3255413028
 pius.119.g: "Wir bauen keine Denkmäler mehr für Illusionen." #deepl:702720701
 pius.119.t: "Schließung des Heiligtums" #deepl:589514149
 pius.121.d: "Die Marienerscheinung auf [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] ist offiziell als positives Zeichen anerkannt worden. Aber selbst jetzt bleibt seine wahre Bedeutung offen für Interpretationen." #deepl:181746716
 pius.121.f: "In den Wochen, seit die strahlende Gestalt den Dorfbewohnern erschienen ist, sind keine weiteren Zeichen gefolgt. Kein Feuer vom Himmel. Keine Stimme in den Wolken. Nur ein ruhiger Himmel und das anhaltende Echo der Verwunderung.\Noch sprechen die Menschen - von Frieden, von Heilung, davon, dass sich etwas in der Seele der Nation verändert hat. Die Pilger kommen nicht im Rausch, sondern in Ehrfurcht. Die Geistlichen predigen sanft. Die Presse berichtet ausnahmsweise ohne Spott: Was hat dieses Wunder zu bedeuten?" #deepl:3589438214
 pius.121.g: "Ein Segen für das einfache Volk." #deepl:560950828
 pius.121.h: "Ein göttliches Zeichen für unseren Klerus." #deepl:2114621818
 pius.121.h_tt: "Diese Maßnahme kann unbekannte, schwerwiegende Folgen haben." #deepl:1123613034
 pius.121.i: "Ein Hinweis auf die Legitimität unserer Regierung." #deepl:1976662076
 pius.121.t: "Was meint sie damit?" #deepl:1525290236
 pius.122.d: "Der Ort der Marienerscheinung ist inzwischen zu einem anerkannten Wallfahrtsort geworden, der immer mehr Gläubige aus nah und fern anzieht." #deepl:3557311135
 pius.122.f: "Wo einst nur Weideland war, stehen jetzt Kerzen, Rosen und die leisen Schritte von Tausenden.'\n\Die Straßen sind breiter geworden. Die Felder sind gerodet worden. Eine bescheidene Kapelle erhebt sich in der Nähe der Stelle, an der die Kinder einst von einer in Licht gekleideten Frau sprachen. Jeden Tag kommen Pilger: Bauern mit ihren Söhnen, Witwen in Schwarz, Soldaten auf Urlaub, Mütter, die Gebete für ihre Ungeborenen flüstern.\nDie Kirche hat die Heiligkeit des Ortes anerkannt. Es wird ein Schrein gebaut. An seinen Rändern blühen Märkte, auf denen Brot, Medaillen, Rosenkränze und Wein angeboten werden. Was einst in den Salons bezweifelt wurde, ist nun in den Knochen der Nation zu spüren.\n Und während die Glocken im Tal läuten, fragt man sich: Ist dieser Glaube wiedergeboren - oder ein Keim von etwas Größerem, das noch kommen wird?" #deepl:307938956
 pius.122.g: "Totus tuus." #deepl:314650754
 pius.122.t: "Das Heiligtum der [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:3872076082
