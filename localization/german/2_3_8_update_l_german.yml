 theme_mr_paleontology_desc: "Eine von der Paläontologie, Fossilien und Dinosaurierknochen inspirierte Benutzeroberfläche." #deepl:415348285
 verrier.308.d: "Astronomen haben einen Venustransit in der australisch-indonesisch-pazifischen Region im #ORANGE 1874#! vorausgesagt. Die wissenschaftliche Gemeinschaft von [ROOT.GetCountry.GetNameNoFlag] fordert, dieses einmalige astronomische Ereignis zu beobachten." #deepl:1738426681
 verrier.308.f: "Ein Venustransit ist ein Durchgang des Planeten Venus vor der Sonne. Diese Erscheinung tritt nur viermal in etwa 243 Jahren auf. Historisch gesehen war die genaue Messung solcher Durchgänge von großer Bedeutung für die Bestimmung der Entfernung zwischen Erde und Sonne (astronomische Einheit) und gab Anlass zu zahlreichen Expeditionen und Messkampagnen wichtiger Institute und Wissenschaftler. Der Venusdurchgang im Jahr 1874 war für astronomische Messungen relativ ungünstig. Er blieb von fast ganz Europa aus unsichtbar, lange Transitzeiten wurden nur von Asien aus beobachtet und kurze Transitzeiten von Australien, den Inseln des Südpazifiks und dem südlichen Indischen Ozean (insbesondere dem Kerguelen-Archipel). Dennoch wurden etwa 60 Expeditionen ausgesandt." #deepl:3786277450
 verrier.308.g: "Das sollten wir uns nicht entgehen lassen." #deepl:2334937119
 verrier.308.t: "Venusübergang 1874" #deepl:3101017563
 verrier.309.d: "Astronomen haben für #ORANGE 1882#! einen weiteren Venustransit für die Regionen Süd-, Mittel- und Nordost-Amerika vorhergesagt. Die wissenschaftliche Gemeinschaft von [ROOT.GetCountry.GetNameNoFlag] fordert, dieses einmalige astronomische Ereignis zu beobachten." #deepl:3366532829
 verrier.309.f: "Ein Venustransit ist ein Durchgang des Planeten Venus vor der Sonne. Diese Erscheinung tritt nur viermal in etwa 243 Jahren auf. Historisch gesehen war die genaue Messung solcher Durchgänge von großer Bedeutung für die Bestimmung der Entfernung zwischen Erde und Sonne (astronomische Einheit) und gab Anlass zu zahlreichen Expeditionen und Messkampagnen wichtiger Institute und Wissenschaftler. Der Venustransit von 1882 hatte gegenüber dem Transit von 1874 einige Vorteile, da er in einigen besser zugänglichen Regionen sichtbar war. So war der Transit auf dem gesamten amerikanischen Kontinent sichtbar, mit Ausnahme des Nordens und Nordostens Nordamerikas." #deepl:1503344549
 verrier.309.t: "Venusübergang 1882" #deepl:2995649523
 verrier.311.d: "Ein seltenes astronomisches Ereignis steht bevor: Der Planet Venus wird die Sonne durchqueren. Überall auf der Welt beginnen Observatorien und Regierungen mit den Vorbereitungen." #deepl:4200477530
 verrier.311.f: "Das Datum ist auf die Sekunde genau berechnet worden. Die Teleskope werden verpackt. Die Uhren werden synchronisiert. Der Planet Venus wird das Antlitz der Sonne kreuzen. Astronomen glauben, dass der Transit die genaue Messung der astronomischen Einheit, der grundlegenden Skala des Sonnensystems, ermöglichen wird. Doch der Erfolg des Vorhabens hängt ganz von der Sichtbarkeit ab - von Standort, Wetter und Koordination." #deepl:2621945333
 verrier.311.g: "Wir beobachten den Transit von zu Hause aus." #deepl:2383387639
 verrier.311.h: "Wir schicken eine Expedition in eines unserer Protektorate." #deepl:1098022190
 verrier.311.i: "Wir schicken eine Expedition in ein fernes Land." #deepl:381412623
 verrier.311.j: "Wir sollten noch einmal darüber nachdenken." #deepl:1178423846
 verrier.311.t: "Venus-Transit Vorbereitung" #deepl:967668025
 verrier.319.d: "Eine Expedition von [SCOPE.sCountry('verrier_venus_transit_leader').GetName] ist in unserem Gebiet angekommen, um das seltene astronomische Phänomen des Venustransits zu beobachten." #deepl:853589
 verrier.319.f: "Sie gingen mit Kisten voller Linsen, Uhren und Karten an Land. Ihre Sprecher trafen sich mit Universitätsbeamten und boten einen freundlichen Briefwechsel und technische Einweisungen an. Die Mitarbeiter der Sternwarte sind neugierig, die Zeitungen neutral, aber wachsam. Mehrere Abteilungen debattieren über die Auswirkungen: wissenschaftliche Zusammenarbeit, ja - aber auch Datenaustausch, logistische Souveränität und Sichtbarkeit auf der Weltbühne." #deepl:209223472
 verrier.319.g: "Die Wissenschaft soll unsere gemeinsame Sprache sein." #deepl:183308092
 verrier.319.t: "Fremde Augen zum Himmel" #deepl:4019861958
 verrier.321.d: "Während der Überfahrt wurde das Expeditionsschiff von einem heftigen Sturm heimgesucht. Inmitten krachender Wellen und chaotischer Takelage wurden mehrere Kisten vom Deck gerissen und gingen im Meer verloren - darunter auch empfindliche Transitinstrumente." #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] klammerte sich an die Reling, als der Himmel zerbrach. Die See hatte sich wie ein Feind erhoben und schleuderte Taue und Fässer über das Deck. Die Kisten - zwei an der Zahl - glitten in einem furchtbaren Bogen, bevor sie in der Schwärze verschwanden.\n\n Später, als der Sturm vorüber war und nur noch Stille herrschte, wurden die Schäden gezählt. Das Hauptheliometer. Eine Doppellinse aus Königsberg. Mehrere präzise Zeitmesser.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stand inmitten der durchnässten Mannschaft und des zerbrochenen Holzes und starrte auf die Leere, in der die Geräte gestanden hatten. Es gab Sicherungen. Aber keine von ihnen war fehlerfrei. Und die Zeit - wie die Venus - wartet auf niemanden." #deepl:2744264311
 verrier.321.g: "Machen Sie weiter. Wir haben noch genug zu tun." #deepl:1985224258
 verrier.321.t: "Sturm über dem Transit" #deepl:2256455346
 verrier.322.d: "Während der nächtlichen Kalibrierung des Sternenfeldes bemerkte der Astronom der Expedition unregelmäßige Bewegungen und feste Punkte, wo es keine geben sollte. Ein weiterer Vergleich mit verfügbaren Sternkarten bestätigte es: Das Team hat möglicherweise neue, unbekannte Himmelskörper entdeckt." #deepl:2064965258
 verrier.322.f: "Das Schiff trieb unter einem samtenen Himmel. Die Wolken hatten sich schon vor Stunden aufgelöst und eine so reine Klarheit hinterlassen, dass es sich unnatürlich anfühlte. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] lehnte sich wieder in das Okular. Dort - zwischen Altair und dem Rand des Sextantengitters - war Bewegung. Zu langsam für einen Kometen. Zu gleichmäßig für einen Fehler.\n\nNacht für Nacht kehrte [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] zu demselben Fleck am Himmel zurück, skizzierte, berechnete, verglich. Schließlich bestätigten die Notizen von [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] das Ergebnis: ein kleinerer Planet. Möglicherweise zwei. Nicht katalogisiert.\n\nVenus würde warten. Aber die Sterne hatten bereits etwas anderes geboten." #deepl:1791725592
 verrier.322.g: "Es ist bekannt, dass der Himmel noch immer Geheimnisse birgt." #deepl:1342826733
 verrier.322.t: "Unerwartete Lichter" #deepl:1561684464
 verrier.323.d: "Während einer Reisepause begab sich das Expeditionsteam ins Landesinnere, um mögliche Höhenpunkte für astronomische Beobachtungen zu erkunden. Was sie stattdessen vorfanden, war ein Hain mit unbekannten Pflanzen, von denen keine in den verfügbaren botanischen Aufzeichnungen zu finden ist." #deepl:3286240010
 verrier.323.f: "Es begann mit einem Duft. Ein subtiler, zitrusscharfer Duft, der aus den Farnen am Waldrand aufstieg. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] folgte dem Duft durch das dichte Unterholz und fand eine Lichtung, auf der sich das Licht wie Wasser sammelte. Dort blühten Stängel von tiefem Violett in einer perfekten Spirale. Rotes Moos überzog obsidianfarbene Steine. Hoch oben wiegten sich Rankenbüschel in Form von baumelnden Sternen in der Brise. Niemand konnte sie benennen.\n\n Einer der jüngeren Assistenten flüsterte: 'Es sieht aus, als wäre der Himmel in die Erde gefallen.'\n\n Sie waren gekommen, um den Planeten Venus zu jagen. Aber hier, in der ruhigen Luft und dem gefilterten Licht, fanden sie eine andere Art von Wunder." #deepl:808904157
 verrier.323.g: "Sammeln Sie Proben und bewahren Sie sie für Studien auf." #deepl:1767661174
 verrier.323.t: "Ein Garten zwischen den Sternen" #deepl:2845961206
 verrier.324.d: "Auf der Suche nach einem erhöhten Beobachtungsplatz stieß die Expedition auf einen Ort von großem geologischen Interesse. Das umgebende Gestein weist Muster und Einschlüsse auf, die selten - wenn überhaupt - zuvor gesehen wurden." #deepl:539957699
 verrier.324.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] fuhr mit der Hand [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] über die geschichtete Oberfläche des Aufschlusses. Sie schimmerte schwach im Morgenlicht und war von metallisch schimmernden Nähten durchzogen. Wirbel von tiefem Grün schlängelten sich um orangefarbene Kristallkerne und bildeten ein Muster, das fast absichtlich so aussah.\n\n In der Nähe zeigte eine andere Platte eine versteinerte Blase - hohl und noch intakt. Ein Geologe aus dem Team vermutete einen vulkanischen Ursprung. Ein anderer schüttelte den Kopf: "Das ist älter als alles, was ich bisher gesehen habe."\n\nDie Instrumente, die sie mitbrachten, wurden zur Beobachtung des Himmels gebaut. Aber hier, in dem Felsen unter ihren Stiefeln, befand sich ein Fragment des tiefen Gedächtnisses der Erde selbst." #deepl:908721635
 verrier.324.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] fuhr mit der Hand [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] über die geschichtete Oberfläche des Aufschlusses. Sie schimmerte schwach im Morgenlicht und war von metallisch schimmernden Nähten durchzogen. Wirbel von tiefem Grün schlängelten sich um orangefarbene Kristallkerne und bildeten ein Muster, das fast absichtlich so aussah.\n\n In der Nähe zeigte eine andere Platte eine versteinerte Blase - hohl und noch intakt. Ein Geologe aus dem Team vermutete einen vulkanischen Ursprung. Ein anderer schüttelte den Kopf: "Das ist älter als alles, was ich bisher gesehen habe."\n\nDie Instrumente, die sie mitbrachten, wurden zur Beobachtung des Himmels gebaut. Aber hier, in dem Felsen unter ihren Stiefeln, befand sich ein Fragment des tiefen Gedächtnisses der Erde selbst." #deepl:908721635
 verrier.324.g: "Dieser Fund gehört zur Geschichte der Erde selbst." #deepl:2450655201
 verrier.324.t: "Stein jenseits der Zeit" #deepl:2335051515
 verrier.325.d: "Die Expedition ist am Einreisehafen angekommen - doch die Zollbehörden verweigern die sofortige Freigabe. Mehrere Kisten mit wissenschaftlicher Ausrüstung wurden zur Inspektion zurückgehalten, und die Beamten verlangen zusätzliche Unterlagen, die nie zuvor verlangt wurden." #deepl:2525277400
 verrier.325.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stand mit zusammengebissenen Zähnen neben dem Ladungsverzeichnis. Die Quecksilberlinsen, die Präzisionsuhren, das polierte Messinggehäuse - sie saßen träge in einem Lagerhaus hinter einem verschlossenen Tor und warteten auf Tinte und Stempel. Der Zollbeamte war höflich, aber bestimmt: "Wissenschaftlich oder nicht, alle ausländischen Instrumente müssen deklariert, inspiziert und besteuert werden, es sei denn, sie sind vertraglich ausgenommen. Und die Venus würde nicht auf die Bürokratie warten." #deepl:34765689
 verrier.325.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stand mit zusammengebissenen Zähnen neben dem Ladungsverzeichnis. Die Quecksilberlinsen, die Präzisionsuhren, das polierte Messinggehäuse - sie saßen träge in einem Lagerhaus hinter einem verschlossenen Tor und warteten auf Tinte und Stempel. Der Zollbeamte war höflich, aber bestimmt: "Wissenschaftlich oder nicht, alle ausländischen Instrumente müssen deklariert, inspiziert und besteuert werden, es sei denn, sie sind vertraglich ausgenommen. Und die Venus würde nicht auf die Bürokratie warten." #deepl:34765689
 verrier.325.g: "Bezahlen Sie die Gebühr und beschleunigen Sie die Abfertigung." #deepl:240478226
 verrier.325.t: "Barrieren unter dem Himmel" #deepl:2346862710
 verrier.340.d: "Nach wochenlangen Vorbereitungen ist der Beobachtungsposten für den Venustransit fertig. Die Instrumente sind kalibriert. Die Karten sind überprüft. Die einzige Unbekannte ist nun der Himmel." #deepl:1138273071
 verrier.340.f: "Die Kuppel erhob sich wie ein Leuchtturm aus Messing und ruhiger Absicht. Ob aus Stein in der Heimat oder aus Segeltuch und Nieten in der Fremde gebaut, sie beherbergte nun die atemlose Stille der Erwartung.  Im Inneren glänzte das Heliometer im Lampenlicht. Zahnräder drehten sich mit einem Flüstern. Timer klickten in Erwartung. Draußen wischten Assistenten Staub von den Linsen. Selbst die Luft schien zu zögern. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stand an der Tür und berührte die Schwelle. Monatelang hatte sich alles auf diesen Moment hinbewegt. Jetzt gab es nichts mehr zu bauen, nur noch zu warten. Über ihnen, irgendwo am unsichtbaren Himmel, zog die Venus ihre Bahn." #deepl:2967275520
 verrier.340.g: "Präzision beginnt mit ruhigen Händen." #deepl:2872475059
 verrier.340.t: "Sternwarte bereit für Venustransit" #deepl:966063237
 verrier.341.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] hat eine kleine, aber bedeutende Änderung am internen Stabilisator des Hauptteleskops vorgeschlagen. Die Änderung könnte die internen Vibrationen reduzieren und die optische Schärfe im Moment des Kontakts erhöhen." #deepl:491784908
 verrier.341.f: "Es geschah nicht in der Kuppel, sondern in dem Werkstatt-Zelt dahinter. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] war gerade dabei, die Tabellen zu studieren, als Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] mit einem fettverschmierten Notizblock auf ihn zukam. Eine neu berechnete Pufferspannung. Eine überarbeitete Halterung für den inneren Messingring. Die anderen hörten mit respektvoller Skepsis zu - bis die Tests es bewiesen: Das Bild war um Bruchteile eines Grades stabiler. Genug, um die Grenze zwischen Unschärfe und Klarheit zu verschieben." #deepl:2995793810
 verrier.341.g: "Eine kleine Änderung mit großer Präzision." #deepl:1641676745
 verrier.341.t: "Die stille Anpassung" #deepl:3486983252
 verrier.342.d: "Ein kürzlich erzielter Durchbruch in der elektromagnetischen Theorie hat es ermöglicht, eine neue Methode der optischen Filterung auf das Beobachtungsprotokoll des Teleskops anzuwenden. Die Störung durch atmosphärische Lichtstreuung kann nun besser berücksichtigt werden, was zu klareren visuellen Daten führt." #deepl:2503805121
 verrier.342.f: "Die Idee stammte weder von der Kuppel noch von der Werkbank des Linsenmachers, sondern von einer Seite. Es war eine Verfeinerung der Wellengleichungen - wie sich Licht nicht einfach als Teilchen oder Strahl, sondern als schwingendes Feld verhält. Damit konnte ein neues Modell der Interferenz vorhergesagt und eine Korrektur vorgenommen werden. Filter wurden neu zugeschnitten. Die Belichtungszeiten wurden angepasst. Die Ingenieure überprüften ihre Zweifel erneut. Als Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] in jener Nacht durch das Testobjektiv blickte, zuckten die Sterne nicht mehr. Sie standen - präzise, kalt, real. Der Himmel hatte aufgehört zu zittern." #deepl:914121255
 verrier.342.g: "Mathematik schärft den Blick." #deepl:2639991371
 verrier.342.t: "Die Gleichung der Klarheit" #deepl:1039194191
 verrier.351.d: "Über Kontinente und Ozeane hinweg, von Yokohama bis Réunion, von den Kerguelen bis Peking, haben Astronomen beobachtet, wie der Planet Venus das Antlitz der Sonne überquerte. Der Transit von 1874 ist abgeschlossen - und viele Teams melden Erfolg." #deepl:3119534429
 verrier.351.f: "Sie kamen mit Dampfschiffen, auf dem Rücken von Kamelen, mit der Eisenbahn und zu Fuß. Ingenieure, Botaniker, Kartographen. Sie bauten Observatorien in Dschungeln und Wüsten. Sie studierten das Wetter, bestimmten die Schatten, polierten die Linsen, bis sie in ihren Händen zitterten. Und am 9. Dezember 1874 beobachteten sie sechs Stunden lang, wie ein schwarzer Punkt über die Sonnenscheibe glitt.\n\nVenus trat wie ein Flüstern ein und verließ sie wie ein Geheimnis. Die Messungen waren nicht perfekt, aber ausreichend. Die Triangulation konnte beginnen. Zum ersten Mal würde die Menschheit die wahren Ausmaße ihres Sonnensystems kennen - nicht in Mythen oder Metaphern, sondern in Zahlen, die von Schatten gezeichnet wurden. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] schloss [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] Notebook und atmete aus: Es war vollbracht." #deepl:1827747392
 verrier.351.g: "Es ist wunderschön" #deepl:2882436754
 verrier.351.t: "Der Transit von 1874" #deepl:2395808814
 verrier.352.d: "Am 6. Dezember 1882 zog der Planet Venus noch einmal an der Sonne vorbei. Zum letzten Mal in einem Jahrhundert richteten Beobachter auf der ganzen Welt ihre Instrumente in den Himmel - und hielten die schwarze Scheibe der Venus im Flug fest." #deepl:3903856343
 verrier.352.f: "Diesmal liefen die Schiffe früher aus. Die Observatorien waren stabiler. Die Uhren präziser. Die 1874 gelernten Lektionen leiteten jede Hand, jeden Schatten, jede Berechnung.\n\nVon New Jersey bis Patagonien, von Mexiko bis Australien stand die Welt still für einen Punkt auf der Sonne.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stellte den letzten Filter ein. Die Scheibe erschien und glitt langsam über das gleißende Weiß. Es gab keinen Jubel, nur das Rascheln von Stiften, das Klicken von Fensterläden, das leise Atmen des Triumphs. Es würde weitere 121 Jahre dauern, bis die Venus zurückkehren würde. Aber hier, in diesem Moment, war die Zeit selbst gemessen worden." #deepl:907305697
 verrier.352.g: "Den nächsten werden wir nie sehen." #deepl:2603880366
 verrier.352.t: "Der Transit von 1882" #deepl:2224364038
 verrier.353.d: "Als der lang erwartete Moment näher rückt, beginnen sich die Wetterbedingungen zu verschlechtern. Wolken ziehen auf - nicht dicht genug, um alles zu verdunkeln, aber genug, um Klarheit und Timing zu stören." #deepl:1325753029
 verrier.353.f: "Der Himmel hatte sich nicht ganz geschlossen, aber er gehorchte nicht mehr. Wolkenschichten legten sich wie ein Mull über die Sonne. Das Licht verdunkelte sich und flackerte in ungleichmäßigen Pulsen. Jede Linse kämpfte um ihr Gleichgewicht, jede Assistentin um ihren Atem.\n\Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] hielt [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] Auge durch den Filter fest. Die Silhouette der Venus tauchte auf - schwach, gebrochen, tanzend zwischen Dampf und Berechnung.\n\n Es war kein sauberer Bogen. Keine Beobachtung wie aus dem Lehrbuch. Aber es waren Daten. Hart erarbeitete Daten unter einem kapriziösen Himmel." #deepl:1908038831
 verrier.353.g: "Wenn der Himmel uns Stücke gibt, müssen wir sie zusammenfügen." #deepl:1646978536
 verrier.353.t: "Durch Schleier des Lichts" #deepl:674640397
 verrier.354.d: "Während des Venustransits erfasste ein Team von Beobachtern nicht nur präzise Daten, sondern auch Bilder. Dutzende von fotografischen Platten wurden nacheinander belichtet und später zu einem Film zusammengesetzt. Zum ersten Mal in der Geschichte wurde ein Planetentransit als Film aufgezeichnet." #deepl:2258153461
 verrier.354.f: "Es flackert. Es zittert. Aber sie bewegt sich. Auf einer Reihe von behandelten Platten tritt die Venus vom Rand her ein, ein perfekter schwarzer Punkt, der über die Sonnenscheibe gleitet. Nicht nur eine Berechnung, nicht nur eine Skizze - Bewegung. Eingefangen in der Zeit. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] stand mit erhobener Laterne in der Dunkelkammer und sah zu, wie sich die kurze Sequenz wieder und wieder wiederholte. Sechs Stunden Messung, verdichtet zu Sekunden des Staunens. Die Astronomen applaudierten. Sie wussten, dass sie etwas Neues gemacht hatten. Sie hatten den Himmel in Bewegung gebracht." #deepl:1856959975
 verrier.354.g: "Analysieren Sie die Bilder, um die Modelle der Planetenbewegung zu verbessern." #deepl:3348594448
 verrier.354.t: "Ein bewegter Schatten" #deepl:969441096
 verrier.355.d: "Inspiriert von der weltweiten Aufregung um den Venustransit von 1882 hat [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] ein neues feierliches Stück geschrieben. Der Marsch, der vor einem breiten Publikum uraufgeführt wurde, fängt sowohl die Majestät des Ereignisses als auch den Rhythmus eines neuen wissenschaftlichen Jahrhunderts ein." #deepl:1566390789
 verrier.355.f: "Ein Jahr nach dem Venustransit von 1882 erhielt John Philip Sousa den Auftrag, eine Prozession für die Enthüllung einer Bronzestatue des 1878 verstorbenen amerikanischen Physikers Joseph Henry zu komponieren. Als Freimaurer war Sousa fasziniert von dem, was die Gruppe als mystische Qualitäten in ansonsten natürlichen Phänomenen betrachtete. Das Stück wurde zu Sousas Lebzeiten nie gespielt. Es wurde viele Jahre lang nicht gespielt, nachdem Sousas Manuskriptkopien der Musik bei einer Überschwemmung zerstört worden waren." #deepl:3349639062
 verrier.355.g: "Manche Musik wird für die Geschichte geschrieben, nicht für die Massen." #deepl:1666827653
 verrier.355.t: "Der Marsch der Venus" #deepl:1281729794
