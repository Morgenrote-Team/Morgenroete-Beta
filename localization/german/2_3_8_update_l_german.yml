 dubois.2171.j: "Megalodon." #deepl:1809322411
 dubois.2173.f: "Plesiosaurus ist eine Ordnung der maritimen Reptilien. Ihre Fossilien sind überall auf der Welt zu finden. Je nach Art waren die Tiere zwischen 1,5 und 15 Meter lang. Je nach Art ernährten sie sich wahrscheinlich von verschiedenen Tieren. Von Schnecken und Muscheln bis hin zu Fischen und anderen Beutetieren. Mit ihrem U-förmigen Kiefer und den scharfen Zähnen, die an eine Fischreuse erinnern, verfügten sie über ein nützliches Werkzeug." #deepl:1725138010
 dubois.2173.t: "Plesiosaurus" #deepl:3684543079
 dubois.2174.f: "Basilosaurus ist kein Dinosaurier, sondern eine prähistorische Form des Wals. Sein langer Körper erinnert an eine lange Schlange, aber mit einer Länge von bis zu 20 Metern ist er ähnlich lang wie ein Pottwal." #deepl:4279559397
 dubois.2174.t: "Basilosaurus" #deepl:3895138572
 dubois.2175.f: "Der gigantische Hai Megalodon ist wahrscheinlich der größte Hai, den es je gegeben hat. Seine Länge zu schätzen ist jedoch schwierig, da bisher nur Zähne und Wirbel gefunden wurden. Unsere Paläontologen schätzen seine Länge auf etwa 9 bis 30 Meter. Wie auch immer, das Haiskelett ist atemberaubend und eines der Kronjuwelen unserer Sammlung." #deepl:1066794911
