 custom_animal_documentation_topic_1: "Eine detaillierte Untersuchung der Balz- und Paarungsrituale der Tiere."
 custom_animal_documentation_topic_2: "Der Autor schildert anschaulich und aus erster Hand Begegnungen mit dem Tier in seinem natürlichen Lebensraum."
 custom_animal_documentation_topic_3: "Das Buch ist reich illustriert und erweckt die Welt der Tiere in leuchtenden Farben zum Leben."
 custom_animal_documentation_topic_4: "Eine pointierte Kritik an den Auswirkungen der modernen Gesellschaft auf die schrumpfende Umwelt der Tiere."
 custom_animal_documentation_topic_5: "Ein genauer Blick auf die Fütterungsgewohnheiten und das bevorzugte Futter des Tieres."
 custom_animal_documentation_topic_6: "Die Wissenschaftler betrachten das Werk mit Belustigung und finden seinen Ansatz unkonventionell."
 custom_animal_documentation_topic_7: "Die Presse lobte das Buch für seinen Einblick und seine fesselnde Erzählung."
 custom_animal_documentation_topic_8: "Das Buch bietet einen umfassenden Überblick über die täglichen Abläufe und Verhaltensweisen der Tiere."
 custom_animal_documentation_topic_9: "Das Buch ist eine aufrichtige Hommage und drückt eine tiefe Zuneigung zu dem Tier aus."
 custom_animal_documentation_topic_10: "Diese Arbeit bietet einen umfassenden Überblick über die [ROOT.GetCountry.GetAdjectiveNoFormatting|l]e Natur."
