 dubois.11.capybara: "Das Wasserschwein."
 dubois.1041.capybara: "Besuchen Sie die #o Wasserschwein#!"
 dubois.1302.capybara: "Wasserschweine"
 dubois.118.t: "Wasserschwein"
 dubois.118.d: "Unser Zoo ist um ein neues, exotisches Tier reicher: Heute ist das lange erwartete #O Wasserschwein#! in sein neues Gehege eingezogen."
 dubois.118.f: "Das Wasserschwein, das größte Nagetier der Welt, ist in Südamerika heimisch. Mit seinen Schwimmhäuten und seiner semiaquatischen Lebensweise gedeiht es in Feuchtgebieten und an Flussufern. Wasserschweine sind sehr soziale Tiere, die oft in Gruppen von 10 bis 20 Individuen leben. Sie ernähren sich hauptsächlich von Gräsern und Wasserpflanzen und sind für ihre sanfte und gelehrige Art bekannt. Trotz ihrer Größe sind sie ausgezeichnete Schwimmer und können unter Wasser bleiben, um Raubtieren zu entgehen."
 dubois.118.g: "Es ist ein riesiges Meerschweinchen!"
 visit_capybara_tt: "Sie besuchen das Gehege der #o Wasserschweine#!"
