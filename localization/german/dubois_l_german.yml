 dubois.1019.t: "Erdmännchengehege"
 dubois.1019.d: "Das #o Erdmännchen#!gehege war von Felsen mit Höhlen dominiert. Sofort fielen viele der kleinen Tiere auf, die dort herumstanden und herumliefen."
 dubois.1019.f1: "\"Erdmännchen zeichnen sich durch ihre hoch organisierte Sozialstruktur aus\", erklärt der Tierpfleger. \"Jedes Mitglied der Gruppe, bekannt als ‚Mob‘ oder ‚Gang‘, übernimmt abwechselnd die Funktion eines Wachpostens und hält nach Raubtieren Ausschau, während andere auf Nahrungssuche sind oder sich ausruhen. Ihre Kommunikation ist scharf und deutlich; unterschiedliche Rufe signalisieren unterschiedliche Bedrohungsstufen. Diese ständige Wachsamkeit und Zusammenarbeit sind der Schlüssel zu ihrem Überleben in der Wildnis.\""
 dubois.1019.f2: "\"Erdmännchen sind hervorragende Gräber\", erzählt der Tierpfleger. \"Sie können in wenigen Minuten mehrere Fuß tief graben, was für die Suche nach Nahrung wie Insekten, kleinen Reptilien und Wurzeln unerlässlich ist. Dieses Grabverhalten spielt auch eine entscheidende Rolle bei der Schaffung ihrer komplexen Höhlensysteme, in denen sie in Gruppen leben und ihre Jungen aufziehen. Diese unterirdischen Netzwerke bieten Schutz vor Raubtieren und extremen Wetterbedingungen.\""
 dubois.1019.f3: "\"Erdmännchen verfügen über ein breites Spektrum an Lautäußerungen', erklärt der Tierpfleger. 'Ihre Lautäußerungen reichen von Alarmrufen zur Koordination ihrer Bewegungen bis hin zu sanfteren Rufen, mit denen sie den Kontakt innerhalb der Gruppe aufrechterhalten. Wenn ein Tier Nahrung findet, ruft es oft, um den Fund mit den anderen zu teilen und betont damit den Gemeinschaftscharakter ihrer Gesellschaft. Diese stimmliche Kommunikation ist für ihr Überleben unerlässlich und hilft ihnen, in Verbindung zu bleiben und sich zu koordinieren.\""
