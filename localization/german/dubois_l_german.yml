 smuggle_zoo_animal_desc: "Zwingende Umstände – etwa unfreundschaftliche Beziehungen – können es erforderlich machen, dass [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] mit \"Sondermaßnahmen\" dringend in unseren Zoo überführt werden müssen."
