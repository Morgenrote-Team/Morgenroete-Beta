 dubois.3000.t: "Verliert Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]en Verstand?"
 dubois.3000.d: "Ihr [concept_dubois_naturalist], [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], scheint immer mehr Dinge zu vergessen. Vielleicht ist es an der Zeit, dass [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] als Naturforscher zurücktritt?"
 dubois.3000.f: "Moment mal... Wo habe ich meinen Tee hingestellt? Oh, ist es hier? Oder war das die giftige Pflanze? Und warum sitzt eine riesige Spinne in der Ecke des Zimmers?"
 dubois.3000.g: "Ich denke nicht, dass [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] weiter arbeiten sollte."
 dubois.3000.h: "Pff, das ist völlig normal!"
 dubois.3010.t: "Exemplare verloren"
 dubois.3010.d: "Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] kann plötzlich einige Exemplare in [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]er Sammlung nicht mehr finden. [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] sagte, dass sie einfach...verschwunden sind."
 dubois.3010.f: "Ich bin mir absolut sicher, dass ich sie einfach hier auf diese Pins gesteckt habe. Aber jetzt sind sie weg. Das waren großartige Insekten! Vielleicht habe ich sie einfach woanders hingelegt?"
 dubois.3010.g: "Wie sind sie verschwunden? Ich dachte, sie wären tot..."
 dubois.3011.t: "Naturforscher verkauft Teile der Sammlung"
 dubois.3011.d: "Anscheinend hatte Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] riesige Schulden angehäuft. Es scheint, dass die einzige Lösung, die [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] sah, darin bestand, Teile unserer Sammlung zu verkaufen."
 dubois.3011.f: "\"Nein, bitte tu meiner kleinen Hope nichts. Sie hat nichts falsch gemacht! Ich werde alles tun, um an das Geld zu kommen! Bitte! Tu ihr einfach nichts. Sie ist nur eine unschuldige kleine Spinne!\""
 dubois.3011.g: "[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe|U] hat was getan?!"
 dubois_botanist: "Botaniker"
 dubois_botanist_desc: "Vom Dschungel bis zur Wüste, vom Baum bis zum Moos – dieser Charakter widmete seine Zeit der Erforschung von Pflanzen auf der ganzen Welt."
 dubois_entomologist: "Entomologe"
 dubois_entomologist_desc: "Warum sollte sich jemand mit der Erforschung von Käfern beschäftigen? Nun, diese Figur tut es und ist ein Spezialist geworden."
 dubois_marine_biologist: "Meeresbiologe"
 dubois_marine_biologist_desc: "Ach, das Meer! Wäre es nicht toll, einmal dort zu leben? Nur vielleicht nicht als Seemann. Dieser Charakter kann sein Leben damit verbringen, alle Lebensformen im Meer zu erforschen. Was für ein wunderbares Leben!"
 dubois_zoologist: "Zoologe"
 dubois_zoologist_desc: "Tiere sind spannend! Sie sind faszinierend! Und dieser Charakter möchte sie alle kennen!"
