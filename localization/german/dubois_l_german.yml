 dubois_getting_sealion: "\n- Sie können die #n Neuseeländischen Seelöwen#! im Staat #bold Südinsel#! in #bold Neuseeland#! finden"
 dubois.1032.t: "Meeresschildkrötengehege"
 dubois.1032.d: "Der #o Meeresschildkröten#!pavillon besteht im Wesentlichen aus einem breiten Becken mit klarem Wasser, das von bescheidenen Sandstränden umgeben ist. Eine verglaste Öffnung unterhalb der Wasserlinie erlaubt es den Neugierigen, die Tiere in ihrem natürlichen Lebensraum zu beobachten."
 dubois.1032.f1: "Die Grüne Meeresschildkröte (Chelonia mydas) ist ein bewundernswertes Lebewesen. Mit ihrem olivgrünen Panzer und den kräftigen Brustflossen durchquert sie tropische und subtropische Meere und wandert in unglaublicher Länge zu Stränden, an die sie sich immer wieder gerne erinnert. Seine ruhige Haltung zeugt von einer Ausdauer, die der Weite des Ozeans angemessen ist."
 dubois.1032.f2: "Der Generationszyklus wird mit zunehmender Schwerkraft durchgeführt. Nach der Paarung auf See erklimmt das Weibchen nachts einen geeigneten Strand, gräbt in geduldiger Arbeit eine Nestgrube und legt ihre Eier ab, bevor es sie mit Sand bedeckt. Zu gegebener Zeit eilen die Jungtiere, vom himmlischen Licht und vom Instinkt gleichermaßen geleitet, zur See, um ihre gefahrvolle Bewährungszeit zu beginnen."
 dubois.1032.f3: "In der Wirtschaft der Natur ist die Grüne Meeresschildkröte keine untätige Zierde. Ihr Abweiden von Seegras beschneidet und erneuert die Unterwasserwiesen, während ihr gelegentliches Fressen von Medusen zu einem heilsamen Gleichgewicht beiträgt. Auf diese Weise bewahrt dieses Reptil sowohl die Weideflächen als auch den pelagischen Bereich vor einem Übermaß."
 dubois.1032.k: "Kehren Sie zu den australischen und ozeanischen Gehegen zurück"
 zoo_australian_enclosures_tt: "Sie kehren zu den australischen und ozeanischen Gehegen des Zoos zurück."
 dubois.1033.t: "Mantarochengehege"
 dubois.1033.d: "Ein großes Aquarium beherbergt mehrere #o Riesenmantas#!; ein gläserner Tunnel erlaubt es dem Besucher, diese sanften Lebewesen zu beobachten, wie sie sich mit feierlicher Anmut drehen."
 dubois.1033.f1: "Der Riesenmanta (Mobula, allgemein Manta genannt) gehört zu den edelsten aller Rochen. Mit seiner rhomboiden Scheibe und seinen riesigen Brustflossen durchschneidet er das Wasser wie ein lebendiger Drachen, wobei er manchmal eine Spannweite von mehr als sechs Metern erreicht. Seine Gewohnheiten sind friedlich, seine Nahrung besteht aus den kleinsten pelagischen Lebewesen."
 dubois.1033.f2: "Als treue Aasfresser der sonnenbeschienenen Meere zerren Mantas unzählige Plankter durch ihre feinen Kiemenharken und zähmen so den Überschwang dieser winzigen Wirte. An bevorzugten Stellen bitten sie um die Aufmerksamkeit kleinerer Fische, die ihre Haut reinigen - eine in der Natur nicht unübliche Form des gegenseitigen Dienstes."
 dubois.1033.f3: "Naturforscher haben bei diesen Rochen gesellige Tendenzen festgestellt: geordnete Kreisläufe, wiederholte Rückkehr zu bekannten Futterplätzen und sogar eine rudimentäre Balz, die von gemessenen Kreiseln geleitet wird. Solche Beobachtungen zeugen von einem Gedächtnis und einer Beständigkeit, die bemerkenswert sind."
 dubois.1034.t: "Koalagehege"
 dubois.1034.d: "Ein Hain aus Eukalyptusbäumen, der mit Rücksicht auf Schatten und Schutz gepflanzt wurde, bietet dem #o Koala#! eine Umgebung, die seiner Baumheimat sehr ähnlich ist."
 dubois.1034.f1: "Der Koala (Phascolarctos cinereus) ist ein Baumbewohner und sesshaft. Mit seinen Greifhänden und beweglichen Fingern klettert er auf die Eukalyptusbäume und ernährt sich fast ausschließlich von deren Blättern. Ein langsamer Puls und eine gemessene Atmung zeugen von einer an die karge Kost angepassten Ökonomie."
 dubois.1034.f2: "Die Aufgaben der Mütter sind beispielhaft. Das winzige und noch nicht ausgewachsene Jungtier wird bei der Geburt in den sicheren Beutel gelegt, wo es gesäugt wird und wächst. Zu gegebener Zeit gewöhnt das Muttertier es an die besondere Nahrung der Art, und danach reitet es auf ihrem Rücken und lernt die Stationen und Eigenheiten der Bäume kennen."
 dubois.1034.f3: "Obwohl die Art eher schweigend als sprechend lebt, nutzt sie tiefe Bälge und schroffe Töne - vor allem die Männchen -, um Besitz und Jahreszeit zu verkünden. Diese Äußerungen mit ihrer unerwarteten Tiefe tragen weit in die Stille des Hains hinein."
 dubois.1035.t: "Kängurugehege"
 dubois.1035.d: "Eine steppenähnliche Koppel mit langem Gras und verstreuten roten Felsen ist den #o Kängurus#! zugeteilt, deren einzigartige Fortbewegungsart man hier in aller Ruhe studieren kann."
 dubois.1035.f1: "Das Rote Riesenkänguru (Osphranter rufus) ist ein Wunderkind der Fortbewegung im Sprung. Die elastischen Sehnen der hinteren Gliedmaßen und der kräftige Schwanz ermöglichen ausdauernde Sprünge mit bemerkenswerter Geschwindigkeit; das Schauspiel einer Gesellschaft in Bewegung bietet eine Lektion in mechanischer Technik der Natur."
 dubois.1035.f2: "Die mütterliche Fürsorge bei Kängurus ist von besonderem Interesse. Das winzige Neugeborene, kaum mehr als ein lebender Keim, erreicht den Beutel ohne Hilfe und vervollkommnet dort seine Entwicklung an der Zitze. Naturforscher berichten, dass das Muttertier mit bewundernswerter Sparsamkeit mehrere Junge aufziehen kann."
 dubois.1035.f3: "Die soziale Ordnung wird durch Haltung und Zeichen aufrechterhalten: das Aufstampfen mit dem Fuß bei Alarm, Zischen und leises Knurren bei Streitigkeiten und förmliche Zurschaustellung unter den Männchen. So werden Rang und Recht ohne übermäßige Gewalt durchgesetzt."
 dubois.1036.t: "Schnabeltiergehege"
 dubois.1036.d: "Ein klarer, kühler Bach mit schattigen Ufern bildet den Schauplatz für das #o Schnabeltier#!, das den größten Teil seiner Stunden im Wasser oder in einer Höhle verbringt."
 dubois.1036.f1: "Das Schnabeltier (Ornithorhynchus anatinus) ist ein Monotrem - ein eierlegendes Säugetier, dessen Aussehen die Fachwelt bei seiner ersten Entdeckung in Erstaunen versetzte. Mit seinem weichen Schnabel, den Schwimmfüßen und dem dichten Fell ist es hervorragend an den Fluss angepasst; das Männchen trägt einen giftigen Sporn am Hinterfuß, vor dem Vorsicht geboten ist."
 dubois.1036.f2: "Seine Hauswirtschaft ist kurios. Das Weibchen bereitet eine Höhle vor, baut ein Nest aus Blättern und legt ein kleines Gelege ab. Die blind und nackt geschlüpften Jungtiere werden mit Milch aus der Haut genährt - es gibt keine Zitze -, bis sie sich selbst versorgen können."
 dubois.1036.f3: "Das Schnabeltier ist zwar sparsam mit der Stimme, macht aber durch Zeichen und Geruch auf sich aufmerksam; die Reviere der Männchen werden vor allem in der Saison mit einigem Nachdruck verteidigt. Ihr Tauchen und das Durchsuchen des Bodens nach Insektenlarven sind eine erfreuliche Zurschaustellung von Fleiß."
 dubois.1036.f4: "#o Schnabeltier Perry aus den Gärten verlegt#!\nEine kurze Aufregung gab es, als entdeckt wurde, dass eines unserer Schnabeltiere - Perry genannt - nicht ohne weiteres in seinem Versteck zu finden war. Die Pfleger, die Herren Phineas Flynn und Ferb Fletcher, raten zur Geduld: \"Unser Perry pflegt sich dort zu verstecken, wo niemand hinschaut, und er taucht immer wieder auf, bevor der Tag zu Ende ist.\"\n\n#o Ein Mann der Wissenschaft, konserviert von einer Labormischung#!\nDr. Heinz Doofenschmirtz entging nur knapp einer Verletzung, als ein Experiment in einer Explosion endete. Dank des Glücks - oder des rechtzeitigen Eingreifens eines unbekannten Wohltäters - trug der Gelehrte keine bleibenden Schäden davon."
 dubois.1032.g: "Ein Schnabeltier? Perry das Schnabeltier!"
 dubois_unknown_hero_modifier: "Unbekannter Held"
 dubois.1037.t: "Kasuargehege"
 dubois.1037.d: "Ein dicht bepflanztes Viertel, das wie ein Streifen Regenwald gestaltet ist, beherbergt die #o Helmkasuare#!- die berühmten \"Gärtner\" dieser Gefilde."
 dubois.1037.f1: "Der Helmkasuar (Casuarius casuarius) ist ein großer, flugunfähiger Vogel, dessen düsteres Gefieder und kobaltblaue Haut durch eine hornartige Haube hervorgehoben wird. Er ist ein wichtiger Fleischfresser, der viele Waldsamen unversehrt verstreut und so wesentlich zur Erneuerung der Wälder beiträgt."
 dubois.1037.f2: "Die Kappe, deren Funktion umstritten ist, kann beim Scheren von dichtem Kraut oder bei der Schallführung helfen. Die Beine sind kräftig und mit einer gewaltigen Innenklaue bewaffnet; der Vogel setzt sie mehr zur Entschlossenheit als zur Aggression ein, doch ist er umsichtig."
 dubois.1037.f3: "In ihrer häuslichen Umgebung teilen sich die Geschlechter die Verantwortung ungleich auf. In der Regel ist es der Hahn, der die gestreiften Küken ausbrütet und eskortiert, während die Henne ihre Freiheit wiedererlangt. Diese Art von Sparsamkeit ist zwar ungewöhnlich für Vögel, aber bei diesem Stamm üblich."
 dubois.1038.t: "Gehege für neuseeländische Seelöwen"
 dubois.1038.d: "Ein breiter, von Felsen und Felsvorsprüngen umgebener Pool bietet den #o Neuseeländischen Seelöwen#! sowohl einen Rastplatz als auch ein Tauchgebiet; eine Unterwasseraussicht würde künftige Generationen zweifellos begeistern."
 dubois.1038.f1: "Der Neuseeländische Seelöwe (Phocarctos hookeri), der von Natur aus auf die südlichen Inseln beschränkt ist, ist ein robustes Tier mit einnehmenden Manieren. Im Wasser ist er ein anmutiges Geschöpf, an Land ist er gesellig und steht seiner Kolonie treu zur Seite."
 dubois.1038.f2: "Mit seiner stromlinienförmigen Form und den kräftigen Vorderflossen jagt er unter den Wellen nach Fischen und Kopffüßern. Die großen Augen, die gut an den Halbschatten angepasst sind, helfen bei der Erkennung von Beute, wo nur wenig Licht vorhanden ist."
 dubois.1038.f3: "In der Brutzeit verkünden die Bullen ihren Besitzanspruch durch tiefes Brüllen und ihre Haltung auf den Felsen; solche Demonstrationen reichen in der Regel aus, um den Vorrang zu regeln und sich die Aufmerksamkeit der Kühe zu sichern. Auf diese Weise wird die Ordnung in der Kolonie aufrechterhalten, ohne dass es zu ständigen Auseinandersetzungen kommt."
