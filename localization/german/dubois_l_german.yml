 building_dubois_national_park: "Wildtierschutzgebiet"
 building_dubois_national_park_desc: "Wildschutzgebiete sind Zufluchtsorte, in denen die wilde Welt Raum zum Atmen hat - uralte Wälder, weitläufige Wiesen und versteckte Täler, die vor dem unerbittlichen Vormarsch der Zivilisation geschützt sind. Ob als königliche Jagdgründe eingerichtet oder als Nationalparks gefeiert - diese Zufluchtsorte bieten seltenen Kreaturen Zuflucht und einen Blick auf die Größe der Natur, ungestört und dauerhaft."
