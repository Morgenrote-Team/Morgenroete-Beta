 dubois.1061.t: "Die südamerikanischen Gehege"
 dubois.1061.d: "Die südamerikanische Anlage bot verschiedene, sehr unterschiedliche Lebensräume. Von tropischen Regenwäldern über trockenere Gebiete bis hin zu riesigen Felsen und der Pampa."
