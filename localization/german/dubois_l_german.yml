 dubois.35.t: "Tier flieht!"
 dubois.35.d: "Als das Safariteam versucht, dem Tier zu folgen, läuft es plötzlich weg. – Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]s Assistenten drohen abgeschüttelt zu werden!"
 dubois.35.f: "\"Wir sind noch weit davon entfernt, das Tierleben erkannt zu haben, und wir studieren Tiere immer noch mit der Absicht, uns selbst kennenzulernen.\" -Alfred Edmund Brehm"
 dubois.35.g: "Wir können nichts tun ..."
 dubois.36.t: "Tierangriffe!"
 dubois.36.d: "Als das Safari-Team die Fallen aufstellen wollte, erschreckten sie das Tier – und es ging zum Angriff über!"
 dubois.36.f: "\"Es ist falsch zu sagen, dass der Elefant ein reizbares Tier ist. Sein Wesen ist sanft und ruhig. Er lebt in Freundschaft und Frieden mit jedem Geschöpf.\" - Alfred Edmund Brehm"
 dubois.36.g: "Flieht, ihr Narren!"
 dubois.36.h: "Legen Sie die Fallen trotzdem aus!"
 dubois.36.i: "Unser Naturforscher hat alles im Griff."
 dubois.37.t: "Safari-Unfall"
 dubois.37.d: "Aus Unachtsamkeit hatte sich das Safari-Team mit dem falschen Tier angelegt. Dieses zerschmetterte sämtliche Fallen, verletzte Helfer und rannte dann davon. Wochenlange Arbeit war innerhalb weniger Stunden zunichte gemacht. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] musste die Safari deshalb abbrechen."
 dubois.37.f: "\"Wenn ich jemals Magie gesehen habe, dann war es in Afrika.\" -Ernest Hemingway"
 dubois.37.g: "Schrecklich!"
 dubois.36.success_tt: "Dem Safari-Team gelingt es trotzdem noch, seine Fallen aufzustellen."
 dubois.36.fail_tt: "Ein schwerer Unfall führt zum vorzeitigen Abbruch der Safari."
 dubois_safari_zoologist_tt: "Dies ist möglich, weil unser Naturforscher die Eigenschaft Zoologe besitzt."
 dubois.38.t: "Safari-Extras"
 dubois.38.d: "Auch der technologische Fortschritt revolutioniert das Safari-Erlebnis, sei es in Form neuer Waffen oder Fahrzeuge."
 dubois.38.f: "\"Ich habe in Afrika noch nie einen Morgen erlebt, an dem ich nicht glücklich aufgewacht bin.\" -Ernest Hemingway"
 dubois.38.machine_guns_tt: "Mit der Erfindung des Maschinengewehrs ist unser Team sowohl menschlichen als auch tierischen Bedrohungen weit überlegen."
 dubois.38.combustion_engine_tt: "Mit der Erfindung des Verbrennungsmotors können wir jedes Tier problemlos einholen."
 dubois.38.g: "Dies verleiht 'Heia Safari!' eine ganz neue Bedeutung."
 dubois.40.d: "Am Ende einer erfolglosen Suche, die nichts als Entbehrungen mit sich brachte, gibt Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] auf und kehrt mit seinem Team [ROOT.GetCountry.GetAltNameNoFlag('NACH')] zurück."
