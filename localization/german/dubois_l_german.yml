 dubois.228.t: "Haast-Adler"
 dubois.228.f: "\"Zuerst fanden wir eine riesige Kralle und nahmen an, dass sie zu einem Dinosaurier gehörte, aber dann fanden wir weitere Knochen und es wurde immer deutlicher, dass es sich um einen Adler handelte. Zum Glück ist dieser Adler heute ausgestorben, denn er hätte wahrscheinlich Menschen töten können.\""
 dubois.228.g: "Das ist beängstigend!"
