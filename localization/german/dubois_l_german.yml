 dubois.1021.t: "Die Galerien für asiatische Naturgeschichte"
 dubois.1021.d: "Innerhalb des Zoologischen Gartens sind die asiatischen Pavillons mit nüchterner didaktischer Absicht eingerichtet: Kioske und Pagoden aus Holz, lackierte Paravents und dezente Embleme umrahmen die charakteristische Fauna. Der aufmerksame Besucher wird zu einem gemessenen Spaziergang durch die vielfältigen Reiche Asiens eingeladen."
