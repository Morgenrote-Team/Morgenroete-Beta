 dubois.158.d: "Unser Zoo ist um ein neues, exotisches Tier reicher: Heute ist der lange erwartete #O Beutelwolf#! in sein neues Gehege eingezogen."
 dubois.158.f: "Der Beutelwolf, auch Tasmanischer Tiger genannt, war ein fleischfressendes Beuteltier, das in Tasmanien und Australien heimisch war. Er hatte einen charakteristischen gestreiften Rücken und war hauptsächlich nachtaktiv. Beutelwölfe waren Einzelgänger und verließen sich auf ihre Heimlichkeit, um Beute wie kleine Säugetiere und Vögel zu fangen. Leider gilt der Beutelwolf aufgrund von Jagd und Lebensraumverlust heute als ausgestorben."
 dubois.158.g: "Wie süß!"
