 dubois.139.t: "Gorilla"
 dubois.139.d: "Unser Zoo ist um ein neues, exotisches Tier reicher: Heute ist der lange erwartete #O Gorilla#! in sein neues Gehege eingezogen."
 dubois.139.f: "Der Gorilla, der in den Wäldern Zentralafrikas beheimatet ist, ist der größte der Menschenaffen. Mit seinem kräftigen Körperbau und seinem intelligenten Blick lebt er in sozialen Gruppen, die von einem dominanten Männchen, dem Silberrücken, angeführt werden. Gorillas sind hauptsächlich Pflanzenfresser und ernähren sich von Blättern, Stängeln und Früchten. Trotz ihrer Größe und Stärke sind sie im Allgemeinen sanft und scheu und verbringen die meiste Zeit mit der Nahrungssuche und beim Ausruhen in ihrem Waldlebensraum."
 dubois.139.g: "Sie sind riesig!"
 visit_gorilla_tt: "Sie besuchen das Gehege der #o Gorillas#!"
