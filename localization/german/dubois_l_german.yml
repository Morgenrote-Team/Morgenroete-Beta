 je_dubois_paleontological_expedition_reason: "Der Paläontologe führt eine [concept_dubois_paleontological_expedition] durch.\n$mr_divider_for_je$\nDer Abschluss der Expedition wird 12 Monate dauern. Nach Abschluss der Expedition erhalten Sie [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')], abhängig vom #V Erfolg#! der Expedition.\n$mr_divider_for_je$\nJeden Monat wird ein kleiner Betrag an #V Erfolgschance#! hinzugefügt. Zusätzlich können zufällige Ereignisse Erfolg hinzufügen oder abziehen.\n\nAktuelle geschätzte monatliche Erfolgsänderung: #underline #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_monthly_progress_tt')] [Country.MakeScope.Var('dubois_paleontological_expedition_estimated_progress_var').GetValue|2+]#!#! (Maximum: 1)\n$mr_divider_for_je$\nSie können eine [concept_dubois_paleontological_excavation] einrichten, wenn Sie ein freies [concept_dubois_paleontological_team] haben. Eine Ausgrabung wird passiv mehr Fossilien und Knochen produzieren.\n$mr_divider_for_je$\nAktueller #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_yield_tt')] #underline #b geschätzter Ertrag#!#!#! der Expedition:\n[GetPlayer.GetCustom('je_dubois_paleontological_expedition_yield_type')]"
 je_dubois_paleontological_expedition_yield_tt: "Sie erhalten mehr Fossilien und Knochen abhängig von Ihrer #V Erfolgschance#!:\n0 - 3: $je_dubois_paleontological_expedition_yield_level_1_loc$\n4 - 7: $je_dubois_paleontological_expedition_yield_level_2_loc$\n8 - 11: $je_dubois_paleontological_expedition_yield_level_3_loc$\n12 - 14: #p 4#! @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und #p 1#! @dubois_dinosaur_bone! [concept_dubois_dinosaur_bone]\n15: #p 5#! @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und #p 2#! @dubois_dinosaur_bone! [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]\n"
