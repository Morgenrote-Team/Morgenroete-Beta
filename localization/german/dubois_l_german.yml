 je_dubois_mount_dinosaur_skeleton_reason: "Der Paläontologe montiert ein [concept_dubois_dinosaur_skeleton].\n$mr_divider_for_je$\nWenn er fertig ist, erhalten Sie ein Dinosaurierskelett. Abhängig von verschiedenen Faktoren, wie z.B. der [concept_academics_experience] Ihres Paläontologen, erhalten Sie ein #p Perfektes#!, #y Unvollkommenes#! oder #n Schlechtes#! Skelett. Die Qualität des Skeletts beeinflusst das paläontologische Prestige Ihrer [Concept('concept_dubois_paleontological_collection','Paläontologischen Sammlung')].$je_dubois_mount_dinosaur_skeleton_progress_and_success_chance_loc$"
