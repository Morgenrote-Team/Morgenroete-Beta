 dubois.10.h: "Moment, wir haben noch keinen Zoo!"
 alert_dubois_paleontologist_unused_alert_hint: "Ihr [concept_dubois_paleontologist] ist gerade inaktiv und könnte für etwas verwendet werden. Überlegen Sie Zugriff auf eine [concept_dubois_formation] mit einer [concept_dubois_paleontological_licence] zu erhalten, wenn Sie keine Formation haben oder lassen Sie ihn an einer anderen Aufgabe arbeiten. Sie können ihn in der akademischen Übersicht im #V Morgenröte-Fenster#! entsenden."
 dubois.39.d: "Nach wochenlangen Fehlversuchen und endlosen Anstrengungen konnte das lang ersehnte Tier endlich gefangen werden. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ist überglücklich. Die Helden kehren mit dem errungenen Tier nach Hause zurück. Sicherlich wird es sich im schönen Nationalzoo [ROOT.GetCountry.GetAltNameNoFlag('GEN')] wohler fühlen als in dieser ungemütlichen Natur!"
