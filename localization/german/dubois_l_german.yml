 dubois.1012.t: "Flusspferdgehege"
 dubois.1012.d: "Das #o Flusspferd#!gehege beherbergt eine Menge dieser riesigen Kreaturen. Zum Glück sind sie durch einen großen Wassergraben von den Besuchern getrennt."
 dubois.1012.f1: "Die Flusspferde schwammen in ihrem Gehege im Wasser. Es passierte nicht viel. Du hast dich gefragt, ob sie jemals etwas getan haben, wenn ein Tierpfleger neben dir auftauchte.\n\n\"Es ist so faszinierend, wie Flusspferde tagsüber normalerweise einfach herumschweben. Aber nach Einbruch der Dunkelheit werden sie sehr aktiv und beginnen mit der Nahrungssuche. Aber das ist so.\" Das liegt auf der Hand, wenn man weiß, wie heiß es in ihrem natürlichen Lebensraum ist. Das Wasser kühlt sie tagsüber ab und abends und nachts können sie endlich losstreifen.\""
 dubois.1012.f2: "Plötzlich tauchte ein Flusspferd aus dem Wasser auf. Das haben Sie noch nie gesehen, obwohl Sie das Gehege mehrere Minuten lang beobachtet haben. Es muss schon eine ganze Weile im Wasser gewesen sein.\n\nEine Person neben Ihnen begann zu sprechen: \"Ist das nicht faszinierend? Diese Flusspferde können fünf Minuten unter Wasser bleiben. Wenn sie untertauchen, bleiben ihre Nasenlöcher und Ohren hängen.\" verschlossen, damit kein Wasser eindringen kann.\""
 dubois.1012.f3: "Eines der Flusspferd öffnete sein riesiges Maul und zeigte seine langen, gebogenen Zähne. Dann fing es an zu grunzen und zu planschen.\n\nSie haben einmal gelesen, dass männliche Flusspferde dies tun, um Rivalen abzuschrecken, da sie ihr Revier sehr schützen. Auch männliche Flusspferde markieren mit ihrem Kot bestimmte Punkte in ihrem Revier. Manchmal starren sie sogar andere männliche Flusspferde als eine Form der Dominanz an."
 dubois.1012.k: "Kehren Sie zu den afrikanischen Gehegen zurück"
 zoo_african_enclosures_tt: "Sie kehren zu den afrikanischen Gehegen des Zoos zurück."
 dubois.1013.t: "Afrikanisches Löwengehege"
 dubois.1013.d: "Ein Rudel #o Afrikanischer Löwen#! kann in diesem Gehege beobachtet werden, das mit schattenspendenden Bäumen und einem flachen Becken ausgestattet ist, wie es den Gewohnheiten der Art entspricht."
 dubois.1013.f1: "Inmitten seiner Familie liegend, trägt das ausgewachsene Männchen eine üppige, dunkel gefärbte Mähne zur Schau - eine Zierde, die mit dem Alter und der Kraft zunimmt. Naturwissenschaftler gehen davon aus, dass die Mähne eine doppelte Funktion hat: erstens als Instrument der sexuellen Selektion, das die Gesundheit und den Rang des Trägers verkündet, und zweitens als Verteidigungskragen, der Hals und Nacken im Kampf mit rivalisierenden Männchen schützt. In kühleren Klimazonen und insbesondere in Menagerien fern von Afrika neigt die Mähne dazu, länger und voller zu werden und manchmal eine Länge von mehr als 16 cm zu erreichen, ein Umstand, der wahrscheinlich mit Temperatur und Konstitution zusammenhängt."
 dubois.1013.f2: "Afrikanische Löwen leben in sozialen Gemeinschaften, die als Rudel bezeichnet werden und in der Regel aus miteinander verwandten Weibchen und deren Nachkommen bestehen, mit einem oder mehreren erwachsenen Männchen als zeitweiligen Besitzern. Die Weibchen, die philopatrisch bleiben, übernehmen den größten Teil der Nahrungssuche und der Jagd; ihre kooperativen Bemühungen führen zu bemerkenswerten Erfolgen gegen große Huftiere. Die Männchen ihrerseits verteidigen das Rudel und sein Revier, und wenn sie eine große Beute erlegen, kann ein erwachsenes Tier bis zu 40 Kilogramm Fleisch in einem einzigen Mahl verzehren."
 dubois.1013.f3: "Die gemessene Gangart des Löwen - die der aufmerksame Besucher so oft bemerkt - kann mit der Wanderung eines Wächters verglichen werden, denn sie spiegelt die angeborene Neigung des Tieres wider, Grenzen zu patrouillieren, Gerüche zu erkunden und in den dämmrigen Stunden Wache zu halten. In freier Wildbahn wird das Territorium durch Brüllen, das Markieren mit Urin und Drüsensekreten und die bewusste Inspektion vertrauter Wege und Orientierungspunkte gesichert; in Gefangenschaft zeigen sich diese uralten Impulse in geordneten Rundgängen durch das Gehege."
 dubois.1013.f4: "Im Zoo wurde [SCOPE.sCharacter('dubois_prinz_eugen').GetFullName] lange Zeit dabei beobachtet, wie er den alten Löwen jeden Tag besuchte, als ob Veteran und Tier ineinander eine Geschichte von Prüfungen und Triumphen erkannten. Als der Mann drei Tage lang nicht mehr auftauchte, verweigerte die Kreatur die Nahrungsaufnahme und schritt in offensichtlicher Unruhe umher. Um die dritte Stunde des Morgens brüllte der Löwe gewaltig; in diesem Augenblick läutete die Glocke der Kapelle das Ableben des großen Generals ein [SCOPE.sCharacter('dubois_prinz_eugen').GetLastName]. Solche Übereinstimmungen sind zwar nicht als wissenschaftlicher Beweis zu werten, bewegen aber selbst die kämpferischste Brust."
 dubois.1014.t: "Afrikanisches Elefantengehege"
 dubois.1014.d: "In dieser weiten Koppel fühlen sich die #o Afrikanischen Elefanten#! wohl. Ihre Größe und Klugheit machen sie zu einer der Hauptattraktionen der Gärten."
 dubois.1014.f1: "Sehen Sie sich die Matriarchin an - die erfahrenste ihrer Sippe -, um die sich die Herde ordnet. Die Gesellschaft der Elefanten ist eindeutig matrilinear: Erwachsene Weibchen bleiben mit ihren Töchtern und Schwestern zusammen, lenken die Bewegungen zu Wasser und Futter und zeigen auffällige Fürsorge für Kälber und Verwandte. Naturforscher haben Fälle aufgezeichnet, die auf Trauer und Gedenken an den Verlust von Gefährten hindeuten, ein Zeugnis für das ungewöhnliche Gedächtnis und das soziale Gefühl der Tiere."
 dubois.1014.f2: "Die Trompete, die so aufregend für das Ohr ist, ist nur eine Stimme im umfangreichen Wortschatz der Elefanten. Neben diesen sonoren Tönen und dem gutturalen Grollen stößt die Spezies auch Infraschall aus, der unterhalb der menschlichen Hörschwelle liegt und sich über große Entfernungen in der Luft und auf dem Boden verbreitet. Auf diese Weise koordinieren die Herden ihre Märsche, rufen Hilfe herbei und kündigen ihre Anwesenheit in der Savanne an."
 dubois.1014.f3: "Der gewaltige Rüssel, der Nase und Oberlippe verbindet, ist ein Wunderwerk der Muskulatur, das aus vielen Zehntausenden von Fasern bestehen soll und zu den feinsten Manipulationen fähig ist. Die Stoßzähne sind in Wirklichkeit verlängerte Schneidezähne, die ständig wachsen und beim Graben, Entrinden und Verteidigen auf vielfältige Weise eingesetzt werden. Elefanten können sich Orte und Personen lange merken; sie erinnern sich zielsicher an Wasserstellen, die sie in der Vergangenheit besucht haben, und können Individuen auch nach längerer Zeit anhand von Geruch und Gestalt unterscheiden."
 dubois.1015.t: "Giraffengehege"
 dubois.1015.d: "Die #o Giraffen#! sind schon von weitem zu sehen, ihre hoch aufragenden Köpfe grasen zwischen den höheren Ästen, wie es die Natur vorgesehen hat."
 dubois.1015.f1: "Die bläulich gefärbte Zunge, die fast eine halbe Elle lang ist, eignet sich hervorragend zum Ergreifen dorniger Zweige, die ein weniger spezialisiertes Maul verletzen würden. Mit feinem Gespür streift das Tier Akazienblätter ab, ohne die Stacheln zu berühren, und kann so an einem Tag fast dreißig Kilogramm Laub verzehren. In der Tat ist die Giraffe mit ihrer Nahrung so gut versorgt, dass sie sich nur selten zum Trinken bücken muss."
 dubois.1015.f2: "Wenn Männchen um den Vorrang ringen, machen sie die kuriose Übung des \"Necking\", wobei sie den Kopf wie ein Pendel schwingen, um die Flanke des Rivalen zu treffen. Im Laufe der Jahre werden die Schädelknochen (Ossicones) massiver und ihre Spitzen oft kahl, ein Zeichen von Alter und Rang. Giraffen bilden in der Regel lose Gruppen, deren Zusammensetzung sich im Laufe der Zeit ändert, während Kühe mit Jungtieren gemeinsam unterwegs sind."
 dubois.1015.f3: "Das Fell, ein Mosaik aus Flecken auf einem helleren Grund, bietet sowohl Schutz vor dem gebrochenen Licht als auch, so wird angenommen, eine Wärmeregulierung durch reichlich versorgte Gefäße unter jeder Platte. Das gewaltige Herz und die dicken Arterien der Giraffe stützen den hohen Kopf gegen die Anforderungen der Schwerkraft; dennoch bewegt sich die Kreatur mit einer Anmut, die die Last ihrer Statur widerlegt."
 dubois.1016.t: "Brillenpinguingehege"
 dubois.1016.d: "Einige #o Brillenpinguine#! treiben im Wasser Sport, während andere in Gesellschaft an Land stehen und ihr prächtiges Federkleid putzen."
 dubois.1016.f1: "Diese Art (Spheniscus demersus), die wegen ihres brüllenden Rufs auch Eselspinguin genannt wird, lebt an den gemäßigten Küsten des südlichen Afrikas, vor allem in Namibia und am Kap. Im Gegensatz zu ihren antarktischen Vettern fühlen sie sich in milderen Gewässern wohl, und ihre gegensätzliche Farbe schützt sie vor Feinden von oben und unten. Sie ernähren sich hauptsächlich von kleinen Fischen und Kopffüßern, die sie mit großer Gewandtheit unter den Wellen verfolgen."
 dubois.1016.f2: "Brillenpinguine bauen häufig Höhlen in alten Guanoablagerungen, in denen sie ihre Jungen ablegen und aufziehen, wobei sich die Eltern bei der Bebrütung und der Nahrungssuche abwechseln. Ein Gelege besteht zumeist aus zwei Eiern. Dort, wo der Mensch den Guano entfernt hat, gibt es keine geeigneten Nistplätze mehr; es ist zu hoffen, dass ein aufgeklärtes Management diesen Schaden mit der Zeit beheben wird."
 dubois.1016.f3: "Ihr Gefieder ist außerordentlich dicht und gut gepolstert, was ihnen sowohl Isolierung als auch Wasserdichtigkeit verleiht. Im Wasser erreichen die Vögel eine beachtliche Geschwindigkeit und steuern mit ihren versteiften Brustflossen und dem Schwanz mit bewundernswerter Präzision. An Land sind sie gesellig und verständigen sich durch ein Repertoire von Rufen, von denen jeder Ton für ihre Artgenossen inmitten des Lärms der Kolonie verständlich ist."
 dubois.1017.t: "Nacktmullgehege"
 dubois.1017.d: "Da diese Nagetiere die meiste Zeit ihres Lebens unter der Erde verbringen, ist das Gehege als Erdhügel mit verglasten Gängen angelegt, die dem neugierigen Auge ihre Kammern und Galerien offenbaren."
 dubois.1017.f1: "Der Nacktmull (Heterocephalus glaber) ist unter den Säugetieren wegen seiner unbehaarten Haut, seiner wärmeangepassten Lebensweise und seiner bemerkenswerten Toleranz gegenüber dünner Luft einzigartig - Qualitäten, die für das Leben in tiefen, mephitischen Tunneln gut geeignet sind. Seine gewaltigen Schneidezähne, die vor den geschlossenen Lippen arbeiten, werden beim Graben als Spitzhacken eingesetzt; die Lippen selbst dichten hinter den Zähnen ab und halten den Staub zurück. Das unscheinbare, aber sehr fleißige Tier legt mit unermüdlichem Eifer lange Gänge und große Lagerräume an."
 dubois.1017.f2: "Diese Art weist ein seltenes eusoziales System auf: Eine einzige brütende \"Königin\", die von ihren Gefährtinnen begleitet wird, steht einer Vielzahl von sterilen Arbeitern und Soldaten vor. Erstere bauen die Höhlen aus, holen Vorräte und kümmern sich um die Jungen; letztere verteidigen das Gemeinwesen gegen Schlangen und andere Eindringlinge. Eine solche Organisation, wie sie bei Insekten häufiger anzutreffen ist, liefert dem Naturphilosophen viel Stoff zum Nachdenken."
 dubois.1017.f3: "In ihren warmen Rückzugsgebieten scharen sich die Tiere zusammen und tauschen Wärme und Streicheleinheiten durch häufiges Putzen aus. Ihre Stimmen sind zwar klein, aber vielfältig und sorgen für Vertrautheit unter den Mitgliedern der Kolonie. Für dieses kleine Tier wurde eine ungewöhnliche Langlebigkeit und eine bemerkenswerte Widerstandsfähigkeit gegenüber bestimmten Krankheiten festgestellt, die das Interesse von Ärzten und Zoologen geweckt hat."
 dubois.1018.t: "Steppenzebragehege"
 dubois.1018.d: "Diese ebene, grasbewachsene und schattige Koppel ähnelt im Kleinen dem afrikanischen Veld; hier ist das #o Steppenzebra#! zu Hause."
 dubois.1018.f1: "Das kühne schwarz-weiße Gewand des Zebras ist zwar für unser Auge auffällig, dient aber im Schimmer und Schatten der Savanne dazu, die Einschätzung von Fliegen und Feinden gleichermaßen zu verwirren. Das Muster jedes Einzelnen ist einzigartig, wie eine Signatur. Diese Equiden leben üblicherweise in Familienverbänden: ein Hengst, mehrere Stuten und ihre Jungen, die durch gegenseitige Pflege und Wachsamkeit gegenüber Raubtieren für Ordnung sorgen."
 dubois.1018.f2: "Die Dominanz der Männchen wird durch förmliche Zurschaustellung - Ohren nach hinten, Hals gewölbt, Vorderbeine angeschlagen - und manchmal auch durch Beißen und schnelle Tritte deutlich gemacht. Die Kommunikation erfolgt durch Brüllen, Schnauben und hohes Wiehern, mit einer ausdrucksstarken Sprache aus Ohren und Schwanz. Junggesellengruppen jüngerer Männchen verkehren getrennt, bis sie um die Stuten kämpfen."
 dubois.1018.f3: "Als frühreifes Fohlen steht und läuft es schon eine Stunde nach der Geburt, denn auf der offenen Ebene liegt die Sicherheit in der frühen Flinkheit. Es prägt sich der Mutter durch ihren Geruch und ihr Muster ein und wird von ihr mit bemerkenswerter Hingabe betreut. Zu gegebener Zeit lernen die Jungtiere die Wege der Herde kennen - wo sie grasen, wann sie sich fortbewegen und wie sie von den vielen Augen ihrer Gefährten profitieren können."
