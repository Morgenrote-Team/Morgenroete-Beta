 dubois.1039.t: "Beutelwolfgehege"
 dubois.1039.d: "Im schattigen Gehege des Zoos streift der schwer zu fassende #o Beutelwolf#! anmutig umher. Sein gestreifter Rücken und sein schlanker Körperbau verleihen ihm ein beinahe mythisches Aussehen. Besucher, die von seiner überirdischen Präsenz fasziniert sind, versammeln sich, um dieses seltene Geschöpf zu beobachten. Sie sind neugierig auf seine Herkunft und wenden sich an einen Tierpfleger, um weitere Informationen zu erhalten."
 dubois.1039.f1: "\"Der Beutelwolf oder Tasmanische Tiger ist ein faszinierendes Beispiel konvergenter Evolution\", erklärt der Tierpfleger. \"Obwohl er mit seinem hundeartigen Körper und dem gestreiften Fell wie ein Hund aussieht, ist er eigentlich ein Beuteltier und näher mit Kängurus und Koalas verwandt. Der Beutelwolf ist in Tasmanien und auf dem australischen Festland heimisch und war einst das größte Raubtier seines Lebensraums. Seine markanten Streifen halfen ihm, sich in die dichten Wälder und Graslandschaften einzufügen, in denen er jagte.\""
 dubois.1039.f2: "\"Beutelwölfe waren hauptsächlich nachtaktive Jäger\", erzählt der Tierpfleger. \"Sie verließen sich auf ihren scharfen Seh- und Hörsinn, um Beute aufzuspüren, und jagten oft allein oder zu zweit. Im Gegensatz zu vielen anderen Raubtieren waren Beutelwölfe relativ leise und näherten sich ihrer Beute mit Heimlichkeit und Geduld. Ihre Nahrung bestand hauptsächlich aus kleinen bis mittelgroßen Tieren, darunter Wallabys, Vögel und Nagetiere.\""
 dubois.1039.f3: "\"Die Lautäußerungen des Beutelwolfs waren selten, aber einprägsam\", erklärt der Tierpfleger. \"Sie stießen eine Reihe von Kläff-, Knurr- und Heulauten aus, insbesondere während der Brutzeit oder wenn sie sich bedroht fühlten. Diese Rufe wurden verwendet, um über weite Distanzen mit anderen Beutelwölfen zu kommunizieren, insbesondere in den dichten Wäldern Tasmaniens. Obwohl ihr Stimmumfang nicht so vielfältig war wie der anderer Raubtiere, waren die Rufe des Beutelwolfs ein wesentlicher Teil seines Verhaltens und trugen zu seiner Mystik bei.\""
