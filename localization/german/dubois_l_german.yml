 dubois.52.t: "Hochwertige Forstwirtschaft"
 dubois.52.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] hat [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis] Ziel erreicht. Durch die sorgfältige Auswahl besonders widerstandsfähiger Setzlinge, Maßnahmen zur natürlichen Schädlingsbekämpfung und die Untersuchung mehrerer Tiere und Pflanzen in Symbiose hat [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] die Forstwirtschaft unseres Landes nachhaltig gestärkt. Diese ökologischen Maßnahmen dürften auch ökonomische Vorteile bringen."
 dubois.52.f: "\"Wie bitte? Wollen Sie die Bäume FÄLLEN? Ich habe mir die ganze Mühe gemacht, sie großzuziehen, zu hegen und zu pflegen, und jetzt wollen diese kapitalistischen Monster meine Lieblinge töten? Oh mein Gott, was habe ich getan!\""
 dubois.52.g: "Mehr Holz für alle!"
 dubois.53.t: "Hochwertige Gummibäume"
 dubois.53.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] hat [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis] Ziel erreicht. Durch die sorgfältige Auswahl besonders widerstandsfähiger Setzlinge, Maßnahmen zur natürlichen Schädlingsbekämpfung und die Untersuchung mehrerer Tiere und Pflanzen in Symbiose hat [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] die Forstwirtschaft unseres Landes nachhaltig gestärkt. Diese ökologischen Maßnahmen dürften auch ökonomische Vorteile bringen."
 dubois.53.f: "\"Warum interessieren sich alle für den völlig nutzlosen Kautschuk? Ich habe das nur gemacht, weil ich mich für die Neohesperialist-Sumpfmücke interessiere. Dieses kleine, leicht tödliche Tier vermehrt sich nur in diesem Klima.\""
 dubois.53.g: "Mehr Gummi für alle!"
 dubois.22.t: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] dokumentiert [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]"
 dubois.22.d: "Nach monatelanger Beobachtung des Tieres in seinem natürlichen Lebensraum hat [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]e Beobachtungen abgeschlossen. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis|U]e Abhandlung #YELLOW \"[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]\"#! ist nun verfügbar. [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]"
