 je_dubois_improve_forestry_project_reason: "Ihr [concept_dubois_naturalist] Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] konzentriert sich auf besseres Saatgut und eine bessere Auswahl der Setzlinge im [JournalEntry.GetTarget.GetBuilding.GetName] in [JournalEntry.GetTarget.GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nDas Projekt wird jeden Monat Fortschritte machen. Jedes Mal, wenn der Fortschritt [JournalEntry.GetTotalGoalValue|V0] erreicht, erhält das Gebäude einen neuen Modifikator.\nEs gibt insgesamt 3 Modifikatoren:\n- $dubois_building_throughput_add_modifier_with_tooltip$\n- $dubois_building_production_mult_modifier_with_tooltip$\n- $dubois_building_goods_input_mult_modifier_with_tooltip$\n\nJeder neue Modifikator muss den Fortschritt wieder auffüllen.\n$mr_divider_for_je$\nAktueller monatlicher Fortschritt: #underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.GetVariable('dubois_monthly_naturalist_improvement_progress_var').GetValue|2+]#!#!"
