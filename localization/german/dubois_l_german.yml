 dubois_add_zoo_animal_platypus_tt: "Fügt dem [concept_dubois_zoo] ein #O Schnabeltier#! hinzu."
 dubois_add_zoo_animal_cassowary_tt: "Fügt dem [concept_dubois_zoo] einen #O Helmkasuar#! hinzu."
 dubois_add_zoo_animal_sealion_tt: "Fügt dem [concept_dubois_zoo] einen #O Neuseeländischen Seelöwen#! hinzu."
 dubois_leave_fossils_tt: "Verlasse die Paläontologische Sammlung."
 dubois_set_paleontologist_to_north_america_tt: "Der Professor begibt sich auf eine Expedition, um in den urzeitlichen Schichten Nordamerikas #O versteinerte Relikte#! zu finden."
 dubois_set_paleontologist_to_south_america_tt: "Der Professor wird prähistorische Überreste untersuchen, die in den weiten Landschaften Südamerikas vergraben sind."
 dubois_set_paleontologist_to_europe_tt: "Der Professor wird eine formelle Untersuchung der #O paläontologischen Vorkommen#! in Europas geschichtsträchtigem Terrain durchführen."
 dubois_set_paleontologist_to_africa_tt: "Der Professor soll in den urzeitlichen Formationen des afrikanischen Kontinents nach #O fossilen Exemplaren#! suchen."
 dubois_set_paleontologist_to_asia_tt: "Der Professor reist nach Asien auf der Suche nach #O versteinerten Beweisen#! für urzeitliches Leben."
 dubois_set_paleontologist_to_australia_tt: "Der Professor begibt sich nach Australien, um die abgelegenen und rätselhaften #O Fossil-Lagerstätten#! zu untersuchen."
 dubois_set_paleontologist_to_default_tt: "Rufen Sie den Professor auf, von seinem Einsatz zurückzukehren und seinen Dienst zu Hause wieder aufzunehmen."
 dubois_set_naturalist_to_amazonas_tt: "Der Professor wird sich in den Amazonas wagen und inmitten des Urwalds nach #O seltenen Exemplaren#! suchen."
 dubois_set_naturalist_to_congo_tt: "Der Professor unternimmt eine wissenschaftliche Expedition in den Kongo-Regenwald auf der Suche nach #O exotischen Lebensformen#!."
 dubois_set_naturalist_to_borneo_tt: "Der Professor wird nach Borneo geschickt, um #O biologische Kuriositäten#! aus den dichten tropischen Baumkronen zu sammeln."
 dubois_set_naturalist_to_indochina_tt: "Der Professor nimmt Kurs auf die Regenwälder Indochinas, um #O zoologische Exemplare#! von Bedeutung zu sichern."
 dubois_set_naturalist_to_default_tt: "Rufen Sie den Professor aus dem Feld zurück und stellen Sie [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHim] [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]e Hauspost wieder zu."
 dubois_has_formation_tt: "Verfügt über mindestens einen Staat, der entweder eine bemerkenswerte geologische Formation oder eine anerkannte große geologische Formation aufweist."
 dubois_has_rainforest_tt: "Kontrolliert mindestens einen Staat, in dem es einen Regenwald gibt. Zu den anerkannten Regenwaldregionen gehören: der Amazonaswald, der Kongowald, der Borneo-Wald und der Indochinesische Wald."
 dubois_has_mountains_tt: "Erhebt territorialen Anspruch auf mindestens einen Staat, der von einer bedeutenden Gebirgskette durchzogen wird."
 dubois_unconquered_summit_tt: "Sie besitzen eine Genehmigung für den Zugang zu einem unbestiegenen Gipfel - entweder innerhalb der nationalen Grenzen oder über eine Bergsteigercharta einer ausländischen Macht."
 dubois_has_active_naturalist_tt: "Ein [concept_dubois_naturalist] ist zur Zeit verfügbar und nicht mit Feldarbeit beschäftigt."
 dubois_has_active_paleontologist_tt: "Ein [concept_dubois_paleontologist] steht bereit, der nicht durch aktuelle Expeditionen oder Forschung beschäftigt ist."
 dubois_naturalist_sick_tt: "Der [concept_dubois_naturalist] ist krankheitsbedingt verhindert und kann zur Zeit keine Feldstudien durchführen."
 dubois_botanical_expedition_banned_tt: "Botanische Expeditionen wurden aufgrund der herrschenden politischen Zwänge ausgesetzt."
 dubois_chemical_warfare_tt: "Ermöglicht wird dieses Unterfangen durch die Entwicklung von #O Chemischen Waffen#! - eine düstere, aber entscheidende Innovation."
 dubois_triage_tt: "Diese Maßnahme wird durch die Übernahme des #O Triage#!-Systems aus der Gefechtsfeldmedizin ermöglicht."
 dubois_logistics_tt: "Unterstützt wird dies durch die Beherrschung der modernen #O Logistik#!, die eine rechtzeitige Lieferung und Koordination gewährleistet."
 dubois_hide_animal_decisions: "Tierentscheidungen ausblenden"
 dubois_hide_animal_decisions_desc: "Alle Tierentscheidungen ausblenden."
 dubois_hide_animal_decisions_tt: "Alle Tierentscheidungen ausblenden."
 dubois_show_animal_decisions: "Tierentscheidungen anzeigen"
 dubois_show_animal_decisions_desc: "Alle Tierentscheidungen anzeigen."
 dubois_show_animal_decisions_tt: "Alle Tierentscheidungen anzeigen."
 dubois_extend_zoo_small_decision: "Erweitern Sie den [concept_dubois_zoo] (klein)"
 dubois_extend_zoo_small_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind das Glück aller: Die Menschen zerstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen und internationales Ansehen wird denjenigen zuteil, die die größtmögliche Anzahl fremder Tiere zeigen können. Mit jeder Erweiterung steigt das Ansehen einer Nation. Einige Ausbaustufen erfordern nicht nur das Sammeln vieler Tiere, sondern auch aus verschiedenen Teilen der Welt."
 dubois_extend_zoo_medium_decision: "Erweitern Sie den [concept_dubois_zoo] (mittel)"
 dubois_extend_zoo_medium_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind das Glück aller: Die Menschen zerstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Ansehen einer Nation. Einige Ausbaustufen erfordern nicht nur das Sammeln vieler Tiere, sondern auch aus verschiedenen Teilen der Welt."
 dubois_extend_zoo_large_decision: "Erweitern Sie den [concept_dubois_zoo] (groß)"
 dubois_extend_zoo_large_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind das Glück aller: Die Menschen zerstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen und internationales Ansehen wird denjenigen zuteil, die die größtmögliche Anzahl fremder Tiere zeigen können. Mit jeder Erweiterung steigt das Ansehen einer Nation. Einige Ausbaustufen erfordern nicht nur das Sammeln vieler Tiere, sondern auch aus verschiedenen Teilen der Welt."
 dubois_extend_zoo_famous_decision: "Erweitern Sie den [concept_dubois_zoo] (berühmt)"
 dubois_extend_zoo_famous_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind das Glück aller: Die Menschen zerstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Ansehen einer Nation. Einige Ausbaustufen erfordern nicht nur das Sammeln vieler Tiere, sondern auch aus verschiedenen Teilen der Welt."
 dubois_catch_local_animal_decision: "Einheimische Fauna fangen"
 dubois_catch_local_animal_decision_desc: "Unser Land verfügt über Tierlebensräume mit faszinierenden Arten, die in einem [concept_dubois_zoo] dargestellt werden könnten. Ein Tierexperte soll ein Jahr lang durch das Land reisen, um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] für einen Zoo zu sammeln."
 dubois_visit_zoo_decision: "Besichtigung des Zoologischen Gartens"
 dubois_visit_zoo_decision_desc: "Startet eine besonderes Event, bei der Sie durch Ihren Zoologischen Garten schlendern und die ganze Bandbreite exotischer Tiere beobachten können, die Sie mit Hilfe von Expeditionen und Bemühungen gesammelt haben."
 dubois_ban_animal_export_decision: "Faunenexporte verbieten"
 dubois_ban_animal_export_decision_desc: "Mit dem Verbot der Ausfuhr von lebenden Exemplaren machen wir unser souveränes Recht geltend, unsere Naturschätze zu behalten. Ausländische Regierungen werden ihre Bittgesuche einstellen."
 dubois_allow_animal_export_decision: "Faunenexporte erlauben"
 dubois_allow_animal_export_decision_desc: "Die Erteilung von Lizenzen für die Ausfuhr ausgewählter Tiere bietet sowohl diplomatisches Wohlwollen als auch eine beachtliche zusätzliche Einnahmequelle."
 dubois_collect_specimen_decision: "Kommerzielle [concept_dubois_specimen]sammlung"
 dubois_collect_specimen_decision_desc: "Die Zusammenstellung einer bedeutenden Sammlung von [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]- sowohl aus der Flora als auch aus der Fauna - bringt nicht nur unsere wissenschaftlichen Einrichtungen voran, sondern verkündet auch den Forschergeist und den aufgeklärten Fortschritt unserer Nation."
 dubois_safari_decision: "Beginn der Afrika-Safari"
 dubois_safari_decision_desc: "Schicken Sie eine Expeditionsgruppe tief in die afrikanische Wildnis auf der Suche nach furchterregendem Wild für unseren [concept_dubois_zoo]. Durch sorgfältiges Aufspüren und sorgfältiges Aufstellen von Fallen kann es gelingen, ein lebendes Exemplar zu sichern. Pro Safari kann nur eine Kreatur erworben werden. Als Leitsatz gilt: Je größer und schwerfälliger das Tier, desto mehr Fallen werden benötigt, während leichtfüßige Kreaturen eine unermüdliche Verfolgung erfordern."
 je_dubois_safari: "Afrika-Safari-Expedition"
 je_dubois_safari_reason: "Ein Team von erfahrenen Jägern und Naturforschern wurde auf eine Safari nach Afrika geschickt, um ein seltenes Exemplar zu finden, das in unserem [concept_dubois_zoo] ausgestellt werden soll. Um erfolgreich zu sein, muss sich die Expedition auf ein gleiches Maß an Gerissenheit, Ausdauer und wissenschaftlichen Methoden verlassen. Schwere Tiere erfordern zahlreiche Fallen; schwer fassbare Beute muss mit geschickter Fährte verfolgt werden. Pro Expedition darf nur ein Tier zurückgebracht werden."
 je_dubois_safari_goal: "Die Afrika-Safari soll ein halbes Jahr dauern. Sollte es der Expedition nicht gelingen, in dieser Zeit ein Exemplar zu finden, wird die Gruppe mit leeren Händen zurückkehren, da ihre Bemühungen nicht belohnt wurden."
 je_dubois_safari_fail: "Die Safari ist erfolglos zu Ende gegangen. Trotz monatelanger Entbehrungen und Bemühungen kehrt das Team ohne ein Exemplar zurück, das seine Arbeit belohnt."
 je_dubois_dinosaur_excavation: "Dinosaurier-Ausgrabung"
 je_dubois_dinosaur_excavation_reason: "Nach der Ausgrabung eines versteinerten Dinosaurierknochens hat Professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] eine umfassende paläontologische Ausgrabung eingeleitet. Im Laufe eines Jahres und je nach seiner Erfahrung und seinem Scharfsinn wird unser geschätzter [concept_dubois_paleontologist] vielleicht ein bis drei weitere fossile Fragmente finden. Nach Abschluss der Expedition ist eine weitere Entdeckung möglich - was unterstreicht, dass das gesamte Skelett noch nicht vollständig rekonstruiert ist. Für eine vollständige Rekonstruktion sind fünf Knochen erforderlich, um ein Exemplar in die paläontologische Sammlung aufzunehmen."
 je_dubois_dinosaur_excavation_goal: "Nach Ablauf von zwölf Monaten wird unser [concept_dubois_paleontologist] einen offiziellen Bericht über die Funde und die geborgenen Überreste verfassen."
 dubois_specimen_tt: "Sammeln Sie mindestens #G 50.000#! @dubois_specimen! #O Biologische [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#! - repräsentieren Sie ein blühendes Archiv zoologischer und botanischer Entdeckungen."
 notification_dubois_paleontological_report_notification_name: "Jährlicher paläontologischer Bericht"
 notification_dubois_paleontological_report_notification_desc: "Unsere [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] haben dieses Jahr [GetPlayer.MakeScope.Var('dubois_fossils_notification_var').GetValue|0+=] neue Fossilien gefunden."
 notification_dubois_java_man_notification_name: "[INITIATOR_COUNTRY.GetAltName('NOM')] entdeckt Java-Mann"
 notification_dubois_java_man_notification_desc: "Ein [concept_dubois_paleontologist] aus [INITIATOR_COUNTRY.GetAltName('AKK')] hat auf Java ein wichtiges Skelett entdeckt, das Fragen zur menschlichen Evolution beantworten könnte."
 dubois.1.t: "Einweihung des Zoologischen Gartens"
 dubois.1.d: "Die feierliche Eröffnung des neuen [concept_dubois_zoo] hat Scharen von neugierigen Besuchern angezogen, die sich die versammelte Menagerie ansehen wollten. Der Enthusiasmus des Publikums ist so groß, dass bereits Forderungen nach dem Bau weiterer Gehege und der Anschaffung zusätzlicher Arten laut werden."
 dubois.1.f: "\"Vor zwei Nächten sah ich die Tiger in Exeter Change. Abgesehen von Veli Pachas Löwen in der Morea, der dem arabischen Pfleger wie ein Hund folgte, amüsierte mich die Zuneigung der Hyäne zu ihrem Pfleger am meisten. Was für eine Konversation! - Es gab ein 'Flusspferd', das Lord Liverpool im Gesicht glich, und das 'Ursine Faultier' hatte die gleiche Stimme und das gleiche Benehmen wie mein Diener - aber der Tiger redete zu viel. Der Elefant nahm und gab mir mein Geld wieder - nahm meinen Hut ab, öffnete eine Tür, schwang eine Peitsche und benahm sich so gut, dass ich wünschte, er wäre mein Butler. Das schönste Tier der Welt ist ein Puma; aber die armen Antilopen waren tot. Ich würde es hassen, hier eine zu sehen: Der Anblick des Kamels ließ mich wieder nach Kleinasien sehnen.\" -Lord Byron"
 dubois.1.g: "Ein glänzender Anfang für die nationale Menagerie."
 dubois.2.t: "Über die Entstehung der Arten"
 dubois.2.d: "Mit der Veröffentlichung einer revolutionären Abhandlung hat Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] eine kühne neue Theorie vorgestellt, die den Ursprung der Arten durch natürliche Prozesse erklären soll."
 dubois.2.f: "\"Infolge dieses Kampfes um das Leben wird jede Veränderung, wie gering sie auch sein mag und welche Ursache sie auch haben mag, wenn sie für ein Individuum einer Art in seinen unendlich komplexen Beziehungen zu anderen organischen Lebewesen und zur äußeren Natur in irgendeiner Weise vorteilhaft ist, zur Erhaltung dieses Individuums beitragen und im Allgemeinen an seine Nachkommen vererbt werden ... Ich habe dieses Prinzip, durch das jede geringfügige Veränderung, wenn sie nützlich ist, erhalten bleibt, mit dem Begriff der natürlichen Auslese bezeichnet, um seine Beziehung zur menschlichen Selektionskraft zu kennzeichnen.\" -Charles Darwin"
 dubois.2.g: "Eine Theorie zur Neugestaltung der Naturwissenschaften."
 dubois.2.h: "Ein weiterer Schlag gegen den Aberglauben durch die Wissenschaft."
 dubois.3.t: "Rückkehr der Beagle"
 dubois.3.d: "Die HMS Beagle ist von einer jahrelangen wissenschaftlichen Expedition zurückgekehrt. Das Schiff brachte eine Fülle von natürlichen Exemplaren, versteinerten Überresten, detaillierten Skizzen und Beobachtungsdaten mit. Unter der Besatzung befand sich auch der bekannte [concept_dubois_naturalist] [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], dessen Beiträge bereits als bedeutend bezeichnet werden."
 dubois.3.f: "\"Als ich als Naturforscher an Bord der HMS Beagle war, beeindruckten mich bestimmte Tatsachen in der Verteilung der Bewohner Südamerikas und in den geologischen Beziehungen zwischen den heutigen und den früheren Bewohnern dieses Kontinents. Diese Tatsachen schienen mir etwas Licht auf den Ursprung der Arten zu werfen - das Mysterium der Mysterien, wie es von einem unserer größten Philosophen genannt wurde.\" -Charles Darwin"
 dubois.3.g: "Eine bahnbrechende Reise. Welche Enthüllungen könnten folgen?"
 dubois.4.t: "Kosmos"
 dubois.4.d: "Alexander von Humboldts monumentales Werk \"Kosmos\" ist veröffentlicht worden - ein ehrgeiziger Versuch, die Wissenschaften in einem philosophischen Rahmen zu vereinen. Ursprünglich als Vorlesungen in Berlin gehalten, hat es nun Leser in aller Welt erreicht und bietet eine enzyklopädische Vision der Natur und der menschlichen Forschung."
 dubois.4.f: "\"Am späten Abend eines geschäftigen Lebens übergebe ich dem deutschen Publikum ein Werk, dessen vages Bild seit fast einem halben Jahrhundert vor meiner Seele schwebt.\" In vielen Stimmungen hielt ich dieses Werk für undurchführbar, und als ich es aufgegeben hatte, kehrte ich, vielleicht unvorsichtig, wieder zu ihm zurück. Ich widme es meinen Zeitgenossen mit der Schüchternheit, die ein berechtigtes Misstrauen gegenüber dem Maß meiner Kräfte in mir hervorrufen muss. Ich versuche zu vergessen, dass lang erwartete Schriften normalerweise weniger Freude bereiten.\" -Alexander von Humboldt"
 dubois.4.g: "Ein Eckpfeiler des zeitgenössischen wissenschaftlichen Denkens."
 dubois.4.h: "Dieses Werk soll künftige Generationen aufklären."
 dubois.5.t: "Mendels Erbe"
 dubois.5.d: "Die lange übersehenen Experimente des Abtes Gregor Mendel wurden jetzt wiederentdeckt und haben eine Revolution in der Erforschung der Vererbung ausgelöst. Die einfachen, aber wirkungsvollen Prinzipien, die er formulierte und die heute als Mendelsche Gesetze bekannt sind, bilden die Grundlage für eine neue Wissenschaft: die Genetik."
 dubois.5.f: "\"Die Erfahrungen mit der künstlichen Düngung, wie sie bei Zierpflanzen zur Erzielung neuer Farbvariationen vorgenommen wird, haben zu den Experimenten geführt, die hier besprochen werden sollen.\" Die auffallende Regelmäßigkeit, mit der dieselben Hybridformen immer dann wieder auftauchten, wenn zwischen denselben Arten eine Befruchtung stattfand, veranlasste die Durchführung weiterer Experimente, deren Ziel es war, die Entwicklung der Hybriden in ihren Nachkommen zu verfolgen.\" — Gregor Mendel"
 dubois.5.g: "Das Entstehen der modernen Genetik."
 dubois.6.t: "Entdeckung des Java-Fossils"
 dubois.6.d: "In Niederländisch-Ostindien hat [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName], ein Arzt und Anatom, die versteinerten Überreste eines prähistorischen menschlichen Vorfahren entdeckt - und damit sowohl Aufregung als auch Kontroversen in der wissenschaftlichen Gemeinschaft ausgelöst."
 dubois.6.f: "Die Fossilien, die [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] im Jahr 1891 am Solo-Fluss in Ostjava entdeckte, wurden als Java-Mensch bekannt. Diese Überreste, die auf etwa eine Million Jahre vor heute datiert werden, waren der erste fossile Hominin, der außerhalb Europas entdeckt wurde, und der zweite seiner Art nach dem Neandertaler. Ursprünglich als *Anthropopithecus* und später als *Pithecanthropus erectus* klassifiziert, wird das Exemplar heute allgemein als *Homo erectus* anerkannt, gelegentlich auch als *Homo erectus javanensis* bezeichnet. Wie der Paläoanthropologe Ralph von Koenigswald später bemerkte: \"Keine andere paläontologische Entdeckung hat ein solches Aufsehen erregt und zu einer solchen Vielfalt an widersprüchlichen wissenschaftlichen Meinungen geführt."
 dubois.11.t: "Ein neues [concept_dubois_zoo_animal]"
 dubois.11.d: "[SCOPE.sCountry('dubois_animal_country').GetAltName('NOM')] hat freundlicherweise der Verbringung eines seltenen Exemplars zur Ausstellung in unserem geschätzten Zoologischen Garten zugestimmt."
 dubois.11.f: "In Übereinstimmung mit den Protokollen des wissenschaftlichen Austauschs darf immer nur ein einziges Tier für den Zoologischen Garten angeschafft werden. Nach dem Erwerb muss das Tier mehrere Wochen lang transportiert werden und sich an seine neue Umgebung gewöhnen. Erst nach einer angemessenen und würdigen Einführung in die Sammlung können weitere diplomatische Bemühungen um zusätzliche Exemplare unternommen werden. Welches herausragende Tier soll unsere Menagerie bereichern?"
