 je_naturalist_dies_tt: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] stirbt"
 dubois.442.t: "Geologisches Wissen"
 dubois.442.d: "Während seines Aufenthalts in den Bergen untersuchte [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] den Berg im Detail, kartierte ihn und machte wissenschaftliche Interpretationen. Zur Überraschung des gesamten Bergsteigerteams überraschte er sie am nächsten Morgen mit einer Reliefkarte, auf der die Fallstricke und sanfteren Anstiege des Berges zu sehen waren."
 dubois.442.f: "\"Warum habe ich das gemacht? Ach, mir war nur ein bisschen langweilig und ich hatte auch meine Mineralien katalogisiert. Es ist nichts Besonderes! Ich habe es nicht einmal koloriert …\""
 dubois.442.g: "Gott sei Dank haben wir Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]"
 dubois.443.t: "Ein edles Mineral"
 dubois.443.d: "Die Bergsteigergruppe beschwerte sich bereits über die Trödelei des Geologen, der als Wissenschaftler eher eine Last als eine Hilfe sei; doch wie sich herausstellte, entdeckte Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] beim Besteigen des Gipfels ein seltenes Mineral."
 dubois.443.g: "Was für eine schöne kleine Überraschung."
