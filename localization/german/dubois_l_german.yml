 dubois_nature_reserve_survey_decision: "Naturschutzgebietsuntersuchung"
 dubois_nature_reserve_survey_decision_desc: "Führen Sie eine Untersuchung durch, um einen Platz für ein Naturschutzgebiet zu finden. Eine solche Untersuchung kann #n mehrere Monate#! dauern."
 dubois.1210.t: "Lebensraum in [ROOT.GetState.GetName] gefährdet"
 dubois.1210.d: "Das immer größere Ausmaß der Zivilisation kollidiert mit den [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] in [ROOT.GetState.GetName]. Wenn wir unsere lokale Tierwelt nicht durch den Bau eines [Concept('concept_dubois_nature_reserve','Naturschutzgebietes')] schützen, werden die Tiere in etwa 10 Jahren ausgestorben sein."
 dubois.1210.f: "Gefräßige Maschinen, die sich in den Boden fressen. Ausufernde Städte, die immer mehr Land verschlingen. Bahnlinien, die die blühenden Weiten durchschneiden. Jeden Tag verlieren die Tiere mehr von ihrem Reich. Schritt für Schritt greift der Mensch darin ein."
 dubois.1210.g: "Wir müssen diese Tiere schützen!"
 dubois.1210.h: "Fortschritte über alles andere!"
 dubois_endangered_habitat_tt: "Wenn ein [concept_dubois_habitat] gefährdet wird, wird es nach 10 Jahren entfernt. Sie können dies verhindern, indem Sie im Staat ein [concept_dubois_nature_reserve] erbauen. Auf diese Weise schützen Sie die [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] vor dem Aussterben."
 dubois_habitat_endangered_modifier: "Lebensraum gefährdet"
 dubois_habitat_endangered_timer_modifier: "Zeit bis zum Verlust des Lebensraumes"
 dubois_habitat_protection_path_modifier: "Bereitschaft, den Lebensraum zu schützen"
 dubois_habitat_destruction_path_modifier: "Fortschritt über alles andere"
 dubois.1211.t: "Lebensraum in [ROOT.GetState.GetName] wird zerstört"
 dubois.1211.d: "Da es uns nicht gelungen ist, die [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] in [ROOT.GetState.GetName] durch die Einrichtung eines [Concept('concept_dubois_nature_reserve','Naturschutzgebietes')] zu schützen, wurde der Lebensraum nun zerstört."
 dubois.1211.f: "Leider ging die Gründung des Bergbauunternehmens mit der Zerstörung des Lebensraums eines der Tiere unseres Landes einher. Aber wen interessiert das? Es erwarten uns Gewinne!"
 dubois.1211.g: "Oh nein. Wie auch immer."
 dubois_breeding_animal_trigger_tt: "Sie können [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] züchten, wenn Sie einen Staat mit einem [concept_dubois_nature_reserve] haben, in dem das spezifische Tier aus derselben Region wie das #b Naturschutzgebiet#! noch nicht vorhanden ist, und wenn Sie dieses Tier in Ihrem [concept_dubois_zoo] haben.\n\nWenn Sie ein #b Naturschutzgebiet#! in einem europäischen Staat haben und dort den #b Alpensteinbock#! züchten möchten, können Sie das nur tun, wenn der Staat noch keinen Alpensteinbock-[concept_dubois_habitat] hat und Sie #b Alpensteinböcke#! in Ihrem #b Zoo#! haben."
