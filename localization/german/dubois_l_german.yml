 dubois.271.t_cretaceous: "Prähistorische Landschaft: Kreidezeit"
 dubois.271.t_jurassic: "Prähistorische Landschaft: Jura"
 dubois.271.t_triassic: "Prähistorische Landschaft: Trias"
 dubois.271.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] hat heute eine Gruppe von Kollegen eingeladen, die neue prähistorische Landschaft zu besichtigen. Die Wissenschaftler lobten [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]en Sinn für Details."
 dubois.271.f_cretaceous: "Das Klima in der Kreidezeit war im Allgemeinen warm und ausgeglichen. Es ermöglichte einigen Dinosauriern, zumindest während der Sommermonate hohe südliche und nördliche Breiten zu erreichen. Die Pole waren eisfrei und der Meeresspiegel war entsprechend sehr hoch und erreichte seinen Höchstwert im Unter-Turon. Erst am Ende der Kreidezeit im Maastrichtium kam es zu einer Abkühlung und einem deutlichen Rückgang. Wie in der vorangegangenen Jurazeit wurde die terrestrische Makrofauna und Megafauna von Dinosauriern dominiert. In der Unterkreide waren Bärlappgewächse, Farne, Baumfarne, Ginkgoartige, Bennettitales und Nadelbäume die vorherrschenden Pflanzen. In der Oberkreide konkurrierten viele Laubbäume wie Ahorn, Eiche und Walnuss mit Nadelbäumen wie Sequoia und Geinitzia. Gräser breiteten sich über das Festland aus und veränderten das Erosionsverhalten stark."
 dubois.271.f_jurassic: "Die Unterjurazeit endete wahrscheinlich mit massiven Eruptionen in einer großen magmatischen Provinz auf Gondwana. Dies führte zu einer globalen Erwärmung, verbunden mit einem Massenaussterben zweiter Ordnung. Kleinblättrige, an Dürre angepasste Nadelbäume wurden dann zu einem wichtigen Teil der Flora und unter den Dinosauriern entwickelten sich moderne Sauropoden. Die Jurazeit, insbesondere die späte Jurazeit (Oberjura), war die erste Blütezeit der Dinosaurier, mit großen Theropoden wie Allosaurus und riesigen Sauropoden wie Diplodocus und Giraffatitan. Die Flora wurde von den Gymnospermen dominiert (darunter die Nadelbäume wie Mammutbäume und Kiefern, aber auch Ginkgobäume und Palmfarne). Die Jurazeit wird auch als Zeitalter der Palmfarne bezeichnet, da sie sehr häufig waren. Farne und Schachtelhalme bildeten den Unterwuchs der Wälder."
 dubois.271.f_triassic: "Während der Trias herrschte fast durchgängig warmes Klima, obwohl dies zu Beginn des Zeitraums starken Schwankungen unterlag. Auch weltweit scheint das Klima eher trocken gewesen zu sein: Grund war die Form des Superkontinents Pangaea und ein daraus resultierender Monsuneffekt. Im Landesinneren gab es vermutlich ausgedehnte Wüsten. Mit der Wende vom Perm zur Trias geht ein ausgeprägter Faunenwandel einher. Dieser ist so drastisch, dass die Wende vom Perm zur Trias aufgrund der deutlich veränderten Fossilienfunde nicht nur die Grenze zwischen zwei Perioden, sondern auch zwischen zwei Epochen der Erdgeschichte darstellt, dem Paläozoikum und dem Mesozoikum. In der Folge verschwinden zahlreiche Gruppen mariner Wirbelloser ganz oder dauerhaft aus den Fossilfunden. Auch die terrestrische Wirbeltierfauna erfährt deutliche Veränderungen. Der bereits im Perm erfolgte Wandel der Pflanzenwelt von Farnen zu Nacktsamern setzte sich in der Trias fort."
 dubois.271.g: "Wunderschön!"
 dubois.272.t: "Material"
 dubois.272.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] beweist bei der Fertigstellung seiner prähistorischen Landschaft bemerkenswerten Perfektionismus. Deshalb hat [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] sein Budget bereits aufgebraucht."
 dubois.272.f: "War es das eigens für die Ausstellung bestellte Dinosaurier-Ei? Die erlesenen Samen? Oder das Trinkgeld von 300 Pfund, das der Pförtner für die Naturerde erhielt? Aus Gründen, die Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] kaum erklären kann, fließt ihm das Geld einfach durch die Hände."
 dubois.272.g: "Mehr Geld für ein paar Kunstpflanzen und Eidechsen? Vergiss es!"
 dubois.272.h: "Wir wollen ein schönes Diorama, scheuen Sie keine Kosten!"
 dubois.273.t: "Ein lächerlicher Job?"
 dubois.273.d: "Einige akademische 'Kollegen' verspotten Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] wegen [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]er Obsession mit prähistorischen Landschaften nicht nur hinter [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]s Rücken, sondern mittlerweile auch ganz direkt. Manche Forscher halten [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]e Tätigkeit für ein absurdes Hobby und das Projekt für eine grundsätzlich lächerliche Angelegenheit."
 dubois.273.f: "\"Die extreme Seltenheit von Übergangsformen im Fossilienbestand bleibt das Betriebsgeheimnis der Paläontologie.\" -Søren Kierkegaard"
 dubois.273.g: "Paläontologie ist eine ernsthafte Wissenschaft!"
 dubois.273.h: "Zugegeben, unser Paläontologe ist etwas schrullig."
 dubois.273.i: "Kaufen Sie diesen fiesen Gelehrten ein paar Flaschen Sherry, damit sie den Arzt in Ruhe lassen."
 dubois.274.t: "Studentisches Interesse"
 dubois.274.d: "Seit einigen Wochen beobachten Studierende der Uni mit wachsendem Interesse, wie Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] eine prähistorische Landschaft aufbaut. Was die einen als skurriles Unterfangen empfinden, sehen die anderen als Inspiration – plötzlich wird die ferne Vergangenheit greifbar."
 dubois.274.f: "Der \"Dinosaur Court\" im Crystal Palace Park im Süden Londons ist ein geologischer und paläontologischer Themenpark. Bekannt ist er für die Tierskulpturen, die von Benjamin Waterhouse Hawkins Mitte des 19. Jahrhunderts als weltweit erste lebensgroße figürliche Darstellungen ausgestorbener Tiere geschaffen wurden. Der Park sollte sowohl der Unterhaltung als auch der Bildung seiner viktorianischen Besucher dienen. Auf den Inseln des Sees im als englischer Landschaftsgarten gestalteten Teil der Anlage wurde ein Themenpark gestaltet, der die geologische Geschichte Großbritanniens widerspiegelte. Nach einem Konzept, das auf dem Geologen David Thomas Ansted beruhte, wurde jede der drei Inseln einer Epoche des Phanerozoikums zugeordnet und mit den in dieser Zeit entstandenen Sedimenten gestaltet. Hawkins wurde dabei vom Paläontologen Richard Owen beraten. Obwohl die prähistorischen Tiere nicht mehr dem Stand der Forschung im selben Jahrhundert entsprachen, erregten sie großes Interesse und vermittelten großen Teilen der Bevölkerung ein grundlegendes paläontologisches Wissen."
 dubois.274.g: "Eine neue Generation von Gelehrten!"
 dubois.274.h: "Sie sollten dem Doktor helfen."
 je_dubois_safari_hippopotamus: "Afrika-Safari: Flusspferd"
 je_dubois_safari_hippopotamus_reason: "Auf einer Afrika-Safari kann durch ständiges Aufspüren und Einfangen von Großwild gefangen und anschließend zu einem [concept_dubois_zoo] transportiert werden. Pro Safari kann nur ein Tier gefangen werden. Je nach Tierart unterscheidet sich, ob man Fallen benötigt oder der Spur folgen muss. Als Faustregel gilt, dass große, träge Tiere mehr Fallen benötigen, während schnelle Tiere mehr Aufspüren erfordern. Die Safari dauert 300 Tage. Wird bis dahin kein Tier gefangen, verlässt das Safariteam das Land wieder – erfolglos.\n\nAggressive Tiere können sich beim Einfangen von Fallen verteidigen und angreifen. Scheue Tiere ergreifen die Flucht. Ein [concept_dubois_naturalist] mit der Eigenschaft Zoologe kann solche Situationen ohne Nachteil lösen. Neue Technologien wie #ORANGE Maschinengewehr#! oder #ORANGE Verbrennungsmotor#! erleichtern das Aufspüren und Einfangen von Tieren."
