 dubois.1011.t: "Die Galerien für afrikanische Naturgeschichte"
 dubois.1011.d: "Treten Sie ein in die afrikanischen Pavillons des Zoologischen Gartens, wo ausgewählte Lebensräume und diskrete architektonische Pastiches die vielfältige Physiographie des Kontinents widerspiegeln. Diese Gehege wurden unter der Beratung von Naturwissenschaftlern entworfen und bieten dem interessierten Besucher die Möglichkeit, die charakteristische Fauna der Savanne, des Flusses und des Küstenstreifens unter lehrreichen und angemessenen Bedingungen zu beobachten."
