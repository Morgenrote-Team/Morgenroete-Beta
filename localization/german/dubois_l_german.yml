 dubois.7.t: "Der Birkenspanner entwickelt sich weiter!"
 dubois.7.d: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] bemerkte, dass sich das Aussehen des Birkenspanners in den letzten Jahren verändert hat, was ein klarer Beweis für die Evolutionstheorie ist."
 dubois.7.f: "\"Da die Birken, auf denen der Birkenspanner lebt, aufgrund der Umweltverschmutzung immer dunkler werden, können wir sehen, dass die Anzahl der dunklen Motten deutlich zugenommen hat. Je mehr weiße Motten von Raubtieren gefressen werden, weil sie viel besser sichtbar sind, desto dunkler werden die dunklen.\" Motten beginnen die Macht zu übernehmen.\nDies ist ein klarer Beweis für die Evolution in kurzer Zeit. Meine Beobachtungen sind faszinierend und beweisen, dass die Evolutionstheorie eindeutig richtig ist.\"\n\n#b Historisch gesehen#! wurde die evolutionäre Farbveränderung des Pfeffermotts bereits 1848 in Manchester festgestellt. Erst 1896 zeigte J. W. Tutt, dass es sich um natürliche Selektion handelte.\nHeutzutage ist der weiße Phänotyp des Pfefferspanners wieder vorherrschend, da die Luft wieder sauberer wurde und die meisten Birken wieder weiß sind."
 dubois.7.g: "Klarer Beweis für die Evolution!"
