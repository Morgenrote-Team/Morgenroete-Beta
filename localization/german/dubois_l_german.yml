 dubois_rating_naturalist_zoologist_information_tt: "Ein Naturforscher mit der Eigenschaft #V $dubois_zoologist$#! erhält mehr Ereignisse rund um Tiere und züchtet Tiere schneller. Wenn ein Naturforscher eine [concept_dubois_pacific_expedition] begleitet, hat er beispielsweise eine höhere Chance, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] zu finden."
