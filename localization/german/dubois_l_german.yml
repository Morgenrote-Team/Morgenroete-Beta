 je_systemize_fossils_reason: "[ROOT.GetCountry.GetCustom('je_systemize_fossils_active_type')]Ein [concept_dubois_paleontologist], der nicht beschäftigt ist, wird Fossilien systematisieren, indem er international bekannte Fossilienfunde studiert und klassifiziert und Verwandtschaftsbeziehungen und Abstammung feststellt.\n$mr_divider_for_je$\nSie werden jeden Monat Fortschritte machen und sobald der Fortschritt 6 erreicht, werden Sie ein @dubois_fossil! [concept_dubois_fossil] erhalten.\n$mr_divider_for_je$\nAktueller monatlicher Fortschritt: #underline #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_monthly_progress_tt')] [JournalEntry.MakeScope.GetVariable('mr_monthly_progress_var').GetValue|2+]#!#!\nAktueller Gesamtfortschritt: [JournalEntry.MakeScope.GetVariable('mr_je_progress_var').GetValue|2+] / 6"
