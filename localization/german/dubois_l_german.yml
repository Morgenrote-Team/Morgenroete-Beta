 dubois.1030.t: "Manulgehege"
 dubois.1030.d: "Das Gehege der #o Manule#! war ein felsiges Gelände mit Spalten und kleinen Höhlen. Auf den ersten Blick schien die dicke, flauschige Katze fast unsichtbar und passte perfekt in ihre Umgebung. Dann entdeckte man sie – ihre runden, großen Augen lugten vorsichtig hinter einem Felsbrocken hervor und beobachteten still alles um sie herum."
 dubois.1030.f1: "Im Felsgehege des Zoos lugt der Manul hinter einem Felsbrocken hervor und mustert mit großen, runden Augen die Umgebung. Mit ihrem dicken, silbrigen Fell, das sich gegen die Kälte aufgeplustert hat, sieht sie aus wie ein kleiner, wilder Flaumball. Anders als viele andere Wildkatzen haben Manule einen gedrungenen Körperbau und kurze Beine und ist damit perfekt an die kalten Höhenregionen Zentralasiens angepasst, in denen sie lebt."
 dubois.1030.f2: "Wenn der Manul aus ihrem Versteck zwischen den Felsen hervorkommt, verleihen ihr ihr flaches Gesicht und ihre großen, ausdrucksstarken Augen ein fast komisches Aussehen. Besucher sind oft überrascht von ihrer geringen Größe und ihrem flauschigen Fell, das ihr hilft, mit ihrer verschneiten Umgebung zu verschmelzen. Der Manul ist von Natur aus ein Einzelgänger und wird in freier Wildbahn selten gesehen. Tagsüber zieht sie es vor, sich in Felsspalten und Höhlen zu verstecken und im Morgen- oder Abendgrauen zum Jagen hervorzukommen."
 dubois.1030.f3: "Inmitten der kühlen, Steppen-ähnlichen Umgebung seines Geheges bewegt sich der Manul mit ruhiger Präzision, wobei sein dicker Schwanz wie eine Feder hinter ihm herweht. Diese kleine Wildkatze ist für ihr schwer zu fassendes Verhalten bekannt, bevorzugt die Einsamkeit und verlässt sich auf ihr tarnendes Fell, um nicht von Raubtieren und Beutetieren entdeckt zu werden. Da sich der Manul hauptsächlich von kleinen Säugetieren ernährt, ist er ein geschickter Jäger, der sein scharfes Sehvermögen nutzt, um Bewegungen im offenen Gelände zu erkennen."
