 dubois.1022.t: "Gehege für Große Pandas"
 dubois.1022.d: "Dieser Zufluchtsort für den #o Großen Panda#! kombiniert schattige Pagoden und Bambusdickichte, die an die gemäßigten Bergwälder erinnern sollen."
 dubois.1022.f1: "Eine Mutter mit ihrem winzigen Jungtier hält Hof unter dem Bambus. Die Fortpflanzung des Großen Pandas ist notorisch sparsam; das Weibchen ist jedes Jahr nur kurz im Brunstzustand, und das Neugeborene - oft kaum mehr als zweihundert Gramm schwer - kommt blind und hilflos zur Welt. Die mütterliche Fürsorge ist daher extrem, und die Jungen werden gepflegt und bewacht, bis sie genügend Kraft und Koordination erreicht haben."
 dubois.1022.f2: "Spielen, auch wenn es scheinbar müßig ist, hat einen offensichtlichen Nutzen. Jungtiere üben sich im Ringen und Taumeln, was die Gliedmaßen kräftigt, das Gleichgewicht auf unebenem Boden schult und die elementaren Höflichkeiten ihrer Art einübt. Auch erwachsene Tiere treiben gelegentlich Sport, ein Hinweis darauf, dass Bewegung in der Menagerie ebenso gesundheitsfördernd ist wie in freier Wildbahn."
 dubois.1022.f3: "Der Große Panda ist ein einzigartiger Urtier, dessen Nahrung fast ausschließlich aus Bambus besteht. Seine Backenzähne sind verbreitert, um faserige Triebe zu zerquetschen, und ein bemerkenswertes radiales Sesamoid - der so genannte falsche Daumen - hilft beim Greifen der Halme. Um die karge Nahrung zu kompensieren, muss er über längere Zeiträume fressen und seine Kräfte durch einen bedächtigen Gang aufsparen."
 dubois.1022.k: "Kehren Sie zu den asiatischen Gehegen zurück"
 zoo_asian_enclosures_tt: "Sie kehren zu den asiatischen Gehegen des Zoos zurück."
 dubois.1023.t: "Orang-Utan-Gehege"
 dubois.1023.d: "In der malaiischen Sprache bedeutet Orang-Utan \"Mann des Waldes\". Hier genießen diese #o Borneo-Orang-Utans#! erhöhte Spaziergänge, Netze und reichlich Holz, wie es sich für ein Leben gehört, das hauptsächlich in den Zweigen stattfindet."
 dubois.1023.f1: "Der Orang-Utan ist der größte Baumbewohner unter den Menschenaffen. Mit seiner enormen Armspannweite und hochflexiblen Händen und Füßen überwindet er die Baumkronen durch Brachialbewegung und vorsichtiges Klettern. Jeden Abend baut er sich eine ordentliche Schlafplattform aus gebogenen Ästen, eine Angewohnheit, die sowohl in Freiheit als auch in gut ausgestatteter Gefangenschaft zu beobachten ist."
 dubois.1023.f2: "Die mütterliche Bindung ist langwierig und beispielhaft. Ein Kalb bleibt jahrelang bei seinem Muttertier und lernt die Kunst des Nestbaus, die Auswahl der Früchte und das vorsichtige Reisen. Diese Geduld und Unterweisung zeugen von hoher Intelligenz und einer sozialen Ökonomie, die dem einsamen Waldleben angemessen ist."
 dubois.1023.f3: "Ausgewachsene Männchen, insbesondere solche mit ausgeprägten Wangenklappen, stoßen lange, klangvolle Rufe aus, die über große Entfernungen übertragen werden. Diese Rufe verkünden die Anwesenheit der Tiere, schrecken Rivalen ab und dienen vermutlich dazu, den Abstand zwischen den Tieren im dichten Wald zu vergrößern."
 dubois.1024.t: "Tigergehege"
 dubois.1024.d: "Zuerst scheint die Koppel leer zu sein; dann, vom Schatten in die Sonne, bewegt sich ein #o Bengalischer Tiger#! mit gemächlicher Meisterschaft, sein gestreiftes Fell löst die Umrisse wie von Geisterhand auf."
 dubois.1024.f1: "Der Bengalische Tiger ist die größte asiatische Raubkatze. Als Einzelgänger und Revierjäger jagt er hauptsächlich heimlich und verlässt sich dabei auf sein kräftiges Vorderteil, seine einziehbaren Krallen und seinen plötzlichen Vorstoß aus kurzer Entfernung. Die berühmte Bemalung - Balken auf rötlichem Grund - dient dazu, die Form inmitten von Schilf und Waldschatten zu unterbrechen."
 dubois.1024.f2: "Die Tigerin ist eine aufmerksame Mutter. Nach einer kurzen Tragezeit zieht sie sich in eine abgelegene Höhle zurück, wo sie zwei bis vier Junge zur Welt bringt. Nach und nach macht sie sie mit dem Fleisch, dem Geruch und der Fährte vertraut und lehrt sie die unerlässlichen Lektionen der Vorsicht, der Geduld und des entschlossenen Sprunges."
 dubois.1024.f3: "Die Stimme des Tigers umfasst Husten, Stöhnen und das hallende Brüllen, das in der Dämmerung die Besetzung eines Gebietes ankündigt. Solche Äußerungen vermindern unnötige Streitereien und kündigen in der Saison die Anwesenheit einer geeigneten Gefährtin an."
 dubois.1025.t: "Schabrackentapirgehege"
 dubois.1025.d: "Dieses schattige Gehege für den #o Schabrackentapir#! bietet Deckung, Nahrung und Wasser, wie in den immergrünen Wäldern seiner Heimat."
 dubois.1025.f1: "Das Schabrackentapir zeichnet sich durch eine auffällige schwarz-weiße Färbung aus, die im Gegenlicht die Umrisse des Tieres verdeckt. Er ist hauptsächlich nachtaktiv und stöbert mit seiner Greifschnauze auf Trieben und Blättern, wobei er sich gerne ins Wasser begibt, um sich vor der Hitze zu schützen und zu fliehen."
 dubois.1025.f2: "Nach einer langen Tragezeit bringt das Muttertier ein einziges Kalb zur Welt, das hübsch gestreift und gefleckt ist - eine Kindertarnung, die mit dem Alter verblasst. Die Mutter führt es mit sanfter Beharrlichkeit auf sicheren Wegen zum Futter und zum Teich."
 dubois.1025.f3: "Tapire verständigen sich durch zarte Pfiffe und leises Rumpeln. Diese Töne dienen der Kontaktaufnahme im Dickicht, der Balz und, wie man annimmt, der ruhigen Regulierung ihres einsamen Verkehrs durch den Wald."
 dubois.1026.t: "Komodowarangehege"
 dubois.1026.d: "In dieser warmen, felsigen Umgebung sonnen sich mehrere #o Komodowarane#! oder patrouillieren mit stattlichem Schritt, wobei sie mit ihren Zungen die Luft sondieren."
 dubois.1026.f1: "Der Komodowaran, die größte lebende Eidechse, ist ein Hinterhaltjäger und Aasfresser von bemerkenswerter Kraft. Mit seinen gezackten Zähnen und seinem gewaltigen Hals kann er tiefe Wunden schlagen; mit Hilfe von giftigen Sekreten und Infektionen kann selbst eine kräftige Beute nach einer kurzen Verfolgung erliegen."
 dubois.1026.f2: "Die Art ist an karge Inseln angepasst und lebt von Genügsamkeit und Geduld. Sehkraft und Chemorezeption sind scharf; ein entfernter Kadaver kann mit überraschender Sicherheit entdeckt werden. In Haltung und Miene vermittelt das Tier einen urzeitlichen Eindruck."
 dubois.1026.f3: "Zu den Zeichen der Vorherrschaft gehören das Aufblähen der Kehle, das Kopfstoßen und das Fauchen. Solche Zeremonien sind zwar beeindruckend, ersparen den Kämpfern aber ruinösere Auseinandersetzungen und reichen aus, um den Vorrang am Kadaver oder an der Liegestelle zu regeln."
 dubois.1027.t: "Schneeleopardengehege"
 dubois.1027.d: "Ein Revier aus Felsen und Felsvorsprüngen kommt dem #o Schneeleoparden#! entgegen, dessen Heimatgebiet in den kalten Höhen Asiens liegt."
 dubois.1027.f1: "Der Schneeleopard ist hervorragend für das alpine Gelände geformt: breite Füße für den Halt, ein langer Schwanz für Gleichgewicht und Wärme und ein blasses, geflecktes Fell, das mit Geröll und Schnee verschmilzt. Er bewegt sich mit einer lautlosen, elastischen Anmut und überquert Böden, die kleinere Tiere vor Probleme stellen würden."
 dubois.1027.f2: "Er ernährt sich hauptsächlich von wilden Schafen und Ziegen, bei Gelegenheit auch von Murmeltieren und Hasen. Er ist ein Einzelgänger, der weit herumkommt und in der Dämmerung am aktivsten ist."
 dubois.1027.f3: "In der Paarungszeit verkünden leises Miauen und andere gedämpfte Rufe Nähe und Absicht. Diese Stimmen sind zwar bescheidener als die des Löwen, reichen aber in der dünnen Luft aus, um die Paare über das unwegsame Gelände zusammenzuführen."
 dubois.1028.t: "Gehege für Asiatische Geparden"
 dubois.1028.d: "Dieser weite, offene Lauf erinnert an die kargen Ebenen des Nahen Ostens, wo der #o Asiatische Gepard#! einst weit verbreitet war."
 dubois.1028.f1: "Der asiatische Gepard ist das Sinnbild für Schnelligkeit schlechthin. Sein schlanker Körperbau, sein tiefer Brustkorb und seine langen Gliedmaßen, gepaart mit den halb einziehbaren Krallen, die ihm Halt geben, ermöglichen ihm eine unter Vierbeinern unerreichte Schnelligkeit. Leider gibt es nur noch wenige Exemplare dieses Tieres, das dringend geschützt werden muss."
 dubois.1028.f2: "Die Kunst des Jägers liegt in der Tarnung, dem Sprint und dem Trippelschritt. Die dunklen Streifen unter den Augen vermindern die Blendung, und die flexible Wirbelsäule hilft bei der gewaltigen Schrittlänge. Gazellen und andere kleine Antilopen sind seine übliche Beute."
 dubois.1028.f3: "Die Männchen stoßen tiefe, pulsierende Rufe aus, um ihre Zugehörigkeit und Eignung zu verkünden, die den Streit zwischen Rivalen verringern und potenziellen Partnern den Weg weisen. In der Tierhaltung hat sich das sorgfältige Studium dieser Stimmen als nützlich für das Wohlergehen der Art erwiesen."
