 je_dubois_native_animal_reason: "Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] untersucht ein einheimisches Tier in seinem natürlichen Lebensraum. Erfahrung, Fähigkeiten und Charaktereigenschaften sowie eine Universität mit naturhistorischem Schwerpunkt haben Einfluss darauf, wie lange dieser Prozess dauert. #ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#! ist das Tier, das [ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe] untersucht."
