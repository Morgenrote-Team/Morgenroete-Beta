 dubois_had_expedition_modifier: "Kürzliche paläontologische Expedition"
 dubois_paleontologist_on_excavation_modifier: "Paläontologe auf Ausgrabung"
 dubois_paleontologist_had_recent_excavation: "Paläontologe für Ausgrabungen nicht verfügbar"
 dubois_send_paleontologist_to_excavation_button: "Paläontologe entsenden "
 dubois_send_paleontologist_to_excavation_button_desc: "Schicken Sie Ihren [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] zur [Concept('concept_dubois_paleontological_excavation','Paläontologischen Ausgrabung')]. \nEin anwesender Paläontologe erhöht die Menge an [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] aus der Ausgrabung. \n\nSie können den Paläontologen jederzeit zurückrufen, aber er kann ein Jahr lang nicht zu einer Ausgrabung zurückkehren."
 dubois_recall_paleontologist_from_excavation_button: "Paläontologe zurückrufen"
 dubois_recall_paleontologist_from_excavation_button_desc: "Rufen Sie Ihren [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] von der [Concept('concept_dubois_paleontological_excavation','Paläontologischen Ausgrabung')] zurück.\nSie erhalten keine zusätzlichen [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] mehr von der Ausgrabung.\n\nDer Paläontologe kann #n ein Jahr lang#! #n keine#! weitere Ausgrabung durchführen."
 dubois_recall_excavation_button: "Team zurückrufen"
 dubois_recall_excavation_button_desc: "Rufen Sie ihr [concept_dubois_paleontological_team] von der [Concept('concept_dubois_paleontological_excavation','Paläontologischen Ausgrabung')] zurück. Dadurch wird die paläontologische Ausgrabung entfernt."
 dubois_recall_paleontological_excavation_tt: "Entfernt diesen [concept_dubois_paleontological_excavation]-Journaleintrag. #V Hinweis:#! Es dauert einen Tag, um das Ausgrabungsteam zurückzurufen."
