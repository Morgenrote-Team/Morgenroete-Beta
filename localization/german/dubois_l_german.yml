 dubois.1041.t: "Die europäischen Gehege"
 dubois.1041.d: "Die europäische Gehege wird von einem großen Waldgebiet dominiert, aber es gab auch noch andere. Einige Besucher aßen und tranken etwas in einem Restaurant, das in einem traditionellen europäischen Fachwerkhaus untergebracht war."
