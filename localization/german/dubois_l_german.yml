 dubois.2171.t: "Abteilung für allgemeine Skelette"
 dubois.2171.d: "Welches Skelett wollen Sie besuchen?"
 dubois.2171.f: "Einige Skelette sind rund um den Globus zu finden. Die meisten von ihnen waren Meeressaurier oder andere Kreaturen der Meere."
 dubois.2171.g: "Mosasaurus."
 dubois.2172.t: "Mosasaurus"
 dubois.2172.f: "Mosasaurus ist eigentlich kein Dinosaurier, sondern ein Meeresreptil. Sie lebten in den Ozeanen der Kreidezeit. Es gibt viele verschiedene Arten von Mosasaurus, die sich an verschiedene Regionen angepasst haben. Viele von ihnen waren Spitzenprädatoren und machten Jagd auf Fische, Haie und andere Dinosaurier und Meeresreptilien."
