 dubois.1069.t: "Wasserschweingehege"
 dubois.1069.d: "Das Wasserschweingehege bestand aus einer üppigen, grasbewachsenen Fläche, die einen großen Teich umgab. Sofort fielen einem mehrere dieser großen, sanften Nagetiere auf, die am Wasserrand lagen, während andere gemächlich durch das seichte Wasser wateten. Ihr entspanntes Verhalten und ihr enges Gruppenverhalten zogen sofort die Aufmerksamkeit der Besucher auf sich."
 dubois.1069.f1: "Im sonnendurchfluteten Wasserschweingehege entspannt sich eine kleine Gruppe dieser großen Nagetiere am Wasserrand. Einige knabbern träge Gras, während andere im Schatten faulenzen. Ihr ruhiges, soziales Verhalten erregt sofort die Aufmerksamkeit der Besucher. Sie sind neugierig auf ihren Lebensstil und wenden sich an einen Tierpfleger, um weitere Informationen zu erhalten.\n\"Wasserschweine sind unglaublich soziale Tiere\", erklärt der Tierpfleger. \"Sie leben in Gruppen, manchmal aus 20 oder mehr Tieren, und werden selten allein gesehen. Ihre starken sozialen Bindungen sind der Schlüssel zu ihrem Überleben, denn sie bieten ihnen Schutz vor Raubtieren und helfen ihnen, ihre eng verbundene Familienstruktur aufrechtzuerhalten. Sie kommunizieren mit einer Vielzahl von Geräuschen, darunter Schnurren und Pfeifen, um miteinander in Verbindung zu bleiben.\""
 dubois.1069.f2: "Im geschäftigen Lebensraum der Wasserschweine watet ein besonders abenteuerlustiges Wasserschwein in den Teich und taucht bis zur Nase ein, während die anderen ihm folgen und spielerisch im Wasser plantschen. Der Anblick dieser großen Nagetiere, die ihr Schwimmen genießen, fesselt die Zuschauer. Sie sind von diesem Verhalten fasziniert und fragen einen Tierpfleger nach weiteren Einzelheiten.\n\"Wasserschweine sind semiaquatische Tiere und ausgezeichnete Schwimmer \", erzählt der Tierpfleger. \"Sie verbringen viel Zeit im Wasser, was ihnen hilft, ihre Körpertemperatur zu regulieren und Raubtieren zu entkommen. Sie können sogar im Wasser schlafen, wobei nur ihre Nase über der Oberfläche ist. Diese Affinität zum Wasser ist ein wesentlicher Teil ihres natürlichen Verhaltens und dort fühlen sie sich am wohlsten.\""
 dubois.1069.f3: "Während Sie die Wasserschweine in ihrem Gehege beobachten, fällt Ihnen plötzlich eine hektische Bewegung auf. Eines der jüngeren Wasserschweine hat ein besonders leckeres Stück Gras gefunden und mampft aufgeregt darauf herum, woraufhin sich die anderen um es versammeln und mitmachen. Die gemeinsame Fütterung ist herzerwärmend anzusehen, und Sie beschließen, mehr darüber zu erfahren, indem Sie mit einem Tierpfleger sprechen.\n\"Wasserschweine sind Pflanzenfresser und verbringen viel Zeit damit, gemeinsam zu grasen\", erklärt der Tierpfleger. \"Ihre Nahrung besteht hauptsächlich aus Gräsern und Wasserpflanzen, die sie bereitwillig miteinander teilen. Sie haben ein einzigartiges Verdauungssystem, das es ihnen ermöglicht, ein Maximum an Nährstoffen aus ihrer faserigen Nahrung zu extrahieren, wobei sie ihre Nahrung oft erneut verdauen, um sicherzustellen, dass sie alle Nährstoffe erhalten, die sie benötigen. Ihre Gruppenfütterungsgewohnheiten stärken ihre starken sozialen Bindungen und tragen dazu bei, die Harmonie innerhalb der Gruppe aufrechtzuerhalten.\""
