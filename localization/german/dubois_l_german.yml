 dubois.231.t: "Rivale zerstörte Ausgrabungsstätte"
 dubois.231.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] war einem vielversprechenden Hinweis auf der Spur. Als er dort ankam, stellte er jedoch fest, dass ein Rivale bereits viele Knochen ausgegraben und das Gelände dann in die Luft gesprengt hatte."
 dubois.231.f: "Wenn ich diese Knochen nicht haben kann, wird auch niemand sie haben!"
 dubois.231.g: "Warum sollten sie das tun!"
 dubois.232.t: "Einheimische teilen Informationen"
 dubois.232.d: "Die Bewohner eines kleinen Dorfes hatten in der Nähe verschiedene Fossilien gefunden. Sie teilten sie gerne mit Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]. Das bringt [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] der Entdeckung einer neuen Ausgrabungsstätte einen Schritt näher!"
 dubois.232.f: "So fand mein Urgroßvater einmal ein Einhornhorn. Ich weiß, was du denkst, aber ich glaube, es war der Knochen eines Dinosauriers! Leider hat er es verkauft. Aber er erzählte mir, wo er es überhaupt gefunden hatte. Es war unten am Flussbett. Ich bin mir sicher, dass Sie in der Nähe des Flusses einige Knochen finden werden!"
 dubois.232.g: "Dankeschön!"
 dubois.233.t: "Lokaler Paläontologe teilt Forschung"
 dubois.233.d: "Ein Bewohner eines kleinen Dorfes ist offenbar auch ein Hobby-Paläontologe. Da [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] zu alt ist, um mögliche Standorte noch auszugraben, teilte er sein gesamtes Wissen mit Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.233.f: "Ich habe schon als Kind angefangen, Fossilien zu sammeln, und habe nie damit aufgehört. Aber jetzt bin ich zu alt, um auf die Knie zu gehen und mich zu graben. Ich hoffe also, dass ich Ihnen zumindest dabei helfen kann, einige Dinosaurierknochen und Fossilien zu finden. Und wenn Sie welche finden, zeigen Sie sie mir bitte!"
 dubois.233.g: "Das ist eine erstaunliche Sammlung!"
 dubois.234.t: "Schlammlawine begräbt eine vielversprechende Ausgrabungsstätte"
 dubois.234.d: "Nur einen Tag nachdem Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] und [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] Team einen vielversprechenden Standort entdeckt hatten, wurde dieser von einer gewaltigen Schlammlawine verschüttet. Es würde Monate oder sogar Jahre dauern, um herauszufinden, was sich unter all dem Dreck verbirgt."
 dubois.234.f: "Zuerst war es zu heiß zum Graben, dann war es zu nass zum Graben und jetzt ist es zu schlammig zum Graben? Vielleicht magst du einfach nicht graben!"
 dubois.234.g: "Verdammtes Wetter!"
 dubois.235.t: "Eine neue Spur"
 dubois.235.d: "Die harte Arbeit von Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] scheint sich endlich auszuzahlen. Nachdem [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] Berichte über die Felsen und Formationen gesammelt hat, hat er verschiedene vielversprechende Standorte lokalisiert. Hoffentlich findet [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] an einem dieser Orte Dinosaurierknochen."
 dubois.235.f: "Sie sehen, diese Sedimente enthalten oft Dinosaurierknochen. Sie kommen an diesen Stellen an die Oberfläche, also werden wir mit Sicherheit an einer dieser Stellen Knochen finden! Also hoffentlich. Vielleicht."
 dubois.235.g: "Gute Arbeit!"
