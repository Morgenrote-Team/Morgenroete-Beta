 dubois_paleontological_excavation_explanation_loc: "Ihr [concept_dubois_paleontological_team] führt gerade eine [concept_dubois_paleontological_excavation] durch. Eine Ausgrabung liefert Ihnen eine bestimmte Menge an [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] pro Jahr.\nSie können Ihren [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] zur Ausgrabung schicken, um die jährliche Menge an Knochen und Fossilien zu erhöhen. Wenn sie den Paläontologen zurückrufen, können Sie ihn jedoch 1 Jahr lang nicht mehr hinschicken."
