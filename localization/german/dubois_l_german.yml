 dubois_theory_of_evolution_tech: "Evolutionstheorie"
 dubois_theory_of_evolution_tech_desc: "Die entscheidende Abkehr von der Lehre von den unveränderlichen biologischen Typen wurde durch die Theorie der Evolution durch natürliche Selektion erreicht. Darwin stellte fest, dass ein unkontrolliertes Bevölkerungswachstum unweigerlich zu einem \"Kampf ums Dasein\" führen würde, bei dem vorteilhafte Varianten erhalten bleiben, während andere eliminiert werden. Dieser Mechanismus bietet eine rationale Erklärung für die Vielfalt von Flora und Fauna, die auf einen gemeinsamen Ursprung zurückgeht. Die Implikationen verunsicherten viele, da sie nahelegten, dass die Menschheit in der natürlichen Ordnung keine privilegierte Stellung einnimmt."
 dubois_paleontology_tech: "Paläontologie"
 dubois_paleontology_tech_desc: "Das Interesse an der Vorgeschichte der Erde und an ausgestorbenen Organismen lässt sich bis in die Antike zurückverfolgen, erreichte aber mit den vergleichenden anatomischen Studien von Georges Cuvier um 1800 einen bedeutenden Meilenstein. Die Veröffentlichung von \"Über die Entstehung der Arten\" markierte einen Wendepunkt in den Biowissenschaften und insbesondere in der Paläontologie. Der darauf folgende wissenschaftliche Diskurs führte zu einer systematischen Suche nach Übergangsfossilien und empirischen Beweisen für evolutionäre Prozesse in der geologischen Aufzeichnung."
 dubois_genetics_tech: "Genetik"
 dubois_genetics_tech_desc: "Die moderne Genetik hat ihren Ursprung in den akribischen Experimenten von Gregor Johann Mendel, einem Augustinermönch. Die Wiederentdeckung von Mendels Werk im Jahr 1900 führte zu raschen Fortschritten auf diesem Gebiet. Bis 1915 waren die Grundsätze der Mendelschen Vererbung bei verschiedenen Organismen, insbesondere bei der Fruchtfliege Drosophila melanogaster, geklärt worden. Gleichzeitig entwickelten Mathematiker den statistischen Rahmen der Populationsgenetik und integrierten die genetische Theorie in die umfassendere Studie"
 dubois_naturalist: "Naturforscher"
 dubois_naturalist_desc: "Ein Gelehrter, der die Natur studiert und mit dem Sammeln von Exemplaren und dem Live-Erfassen exotischer Tiere beauftragt ist."
 dubois_naturalist_experienced: "Erfahrener Naturforscher"
 dubois_naturalist_experienced_desc: "Dieser Naturforscher hat sich durch sorgfältige Feldarbeit und wertvolle Beiträge zur Katalogisierung der Vielfalt der Natur verdient gemacht."
 dubois_naturalist_famous: "Renommierter Naturforscher"
 dubois_naturalist_famous_desc: "Gefeiert für ihre bahnbrechenden Expeditionen und Beiträge zur Naturphilosophie, gehört diese Person zu den angesehensten Gelehrten ihrer Zeit."
 dubois_paleontologist: "Paläontologe"
 dubois_paleontologist_desc: "Ein Wissenschaftler, der sich dem Studium versteinerter Überreste widmet und die verlorenen Welten prähistorischen Lebens erforscht."
 dubois_paleontologist_experienced: "Ausgezeichneter Paläontologe"
 dubois_paleontologist_experienced_desc: "Dieser Wissenschaftler, der für eine Reihe bemerkenswerter Ausgrabungen bekannt ist, hat sich bei den geologischen Gesellschaften unserer Zeit ein hohes Ansehen erworben."
 dubois_paleontologist_famous: "Berühmter Paläontologe"
 dubois_paleontologist_famous_desc: "Dieser Paläontologe gilt aufgrund seiner umfangreichen Forschungen und gefeierten Entdeckungen als führende Autorität auf dem Gebiet des urzeitlichen Lebens."
 ask_for_zoo_animal: "Exotisches Tier erwerben"
 ask_for_zoo_animal_desc: "Sollte diese Nation über ein [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] verfügen, das noch nicht in unserer Sammlung vertreten ist, können wir einen formellen Antrag auf dessen Erwerb stellen."
