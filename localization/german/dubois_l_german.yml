 dubois.261.t: "Systematisierung abgeschlossen"
 dubois.261.d: "In jahrelanger Arbeit hat Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]e Theorien zu Verwandtschaftsverhältnissen in der prähistorischen Tier- und Pflanzenwelt veröffentlicht. Die Publikation wurde bereits von einer Stiftung für ihre neuen Erkenntnisse zum Stammbaum der Lebewesen ausgezeichnet."
 dubois.261.f: "\"Ich werde Pflanzen und Fossilien sammeln und mit den besten Instrumenten astronomische Beobachtungen durchführen. Doch das ist nicht der Hauptzweck meiner Reise. Ich werde versuchen herauszufinden, wie die Kräfte der Natur aufeinander einwirken und auf welche Weise die geografische Umgebung ihren Einfluss auf Tiere und Pflanzen ausübt. Kurz gesagt, ich muss die Harmonie in der Natur herausfinden.\" -Alexander von Humboldt"
 dubois.261.g: "Es ist wirklich ... HÖCHST INTERESSANT."
 dubois.262.t: "Stammbaum eines Tieres"
 dubois.262.d: "Nachdem Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] lokale und internationale Berichte über die Fossilien einer bestimmten Tierart verglichen hat, stellt [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] die bisher geglaubten Fakten über die Evolution dieser Art grundsätzlich in Frage."
 dubois.262.f: "\"In die spezielle Untersuchung vertieft, schenkte ich dem Gebäude, das sich inzwischen unbewusst selbst aufbaute, keine Beachtung. Nachdem ich jedoch den Vergleich der fossilen Arten in Paris abgeschlossen hatte, wollte ich, um eine einfache Überarbeitung derselben zu ermöglichen, eine Liste gemäß ihrer Abfolge in geologischen Formationen erstellen, um die Merkmale genauer zu bestimmen und sie durch ihre Aufzählung deutlicher hervorzuheben. Zu meiner Freude und Überraschung stellte ich fest, dass die einfachste Aufzählung der fossilen Fische gemäß ihrer geologischen Abfolge auch eine vollständige Darstellung der natürlichen Beziehungen der Familien untereinander war; dass man daher die genetische Entwicklung der gesamten Klasse in der Schöpfungsgeschichte ablesen konnte, wobei die Darstellung der Gattungen und Arten in den verschiedenen Familien darin bestimmt wurde; mit einem Wort, dass die genetische Abfolge der Fische perfekt mit ihrer zoologischen Klassifizierung übereinstimmt und zwar mit genau der von mir vorgeschlagenen Klassifizierung.\" -Louis Agassiz"
 dubois.262.g: "Haben wir dieses Tier im Zoo?"
 dubois.263.t: "Eine kleine Akquisition"
 dubois.263.d: "Während seines Studiums kam Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] mit einem anderen Paläontologen in Kontakt. Über Verhandlungskanäle konnte [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] – teilweise auf Kosten der Universität – ein Fossil erwerben, das seine neueste These stützt."
 dubois.263.f: "\"Auf die Stimme der vergleichenden Anatomie hin nahm jeder Knochen und jedes Knochenfragment seinen Platz wieder ein. Ich kann keine Worte finden, um meine Freude auszudrücken, als ich sah, wie sich bei der Entdeckung eines Merkmals alle daraus vorhergesagten Konsequenzen nach und nach bestätigten; die Füße wurden in Übereinstimmung mit den Merkmalen gefunden, die die Zähne angekündigt hatten; die Zähne in Übereinstimmung mit denen, die die Füße vorher angedeutet hatten; die Knochen der Unter- und Oberschenkel und jedes Verbindungsstück der Extremitäten wurden genau so zusammengefunden, wie ich sie angeordnet hatte, bevor meine Vermutungen durch die Entdeckung der gesamten Teile bestätigt wurden: Kurz gesagt, jede Art wurde sozusagen aus einem einzigen ihrer Bestandteile rekonstruiert.\" - William Buckland"
 dubois.263.g: "War es das wert?"
 dubois.264.t: "Geologische Vorschläge"
 dubois.264.d: "Im Gespräch mit [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] über die Fundorte von Fossilien in Gesteinsschichten gewann [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] wichtige neue Erkenntnisse zur zeitlichen Bestimmung."
 dubois.264.f: "\"Warum hat niemand erkannt, dass Fossilien allein die Grundlage für eine Theorie über die Entstehung der Erde waren, und dass ohne sie niemand jemals auf die Idee gekommen wäre, dass es bei der Entstehung des Globus mehrere aufeinanderfolgende Epochen gab.\" – Georges Cuvier"
 dubois.264.g: "Ah, die Synergien von Geologie und Paläontologie!"
 dubois.265.t: "Ein beeindruckender Vortrag"
 dubois.265.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] hat in diesem Semester an [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]er Universität eine viel beachtete Vorlesungsreihe gehalten, die als inspirierend für die Paläontologie gilt. Viele neue Studierende haben sich für das Fach eingeschrieben."
 dubois.265.f: "\"Wenn man von Naht zu Naht, von Schicht zu Schicht vordringt und unter den Steinbrüchen von Montmartre oder in den Schiefern des Urals jene Tiere entdeckt, deren versteinerte Überreste zu vorsintflutlichen Zivilisationen gehören, wird der Geist überrascht, wenn er einen Blick auf die Milliarden von Jahren und Millionen von Völkern erhascht, die das schwache Gedächtnis des Menschen und eine unzerstörbare göttliche Tradition vergessen haben und deren Asche, die auf der Oberfläche unseres Globus aufgehäuft ist, die zwei Fuß Erde bildet, die uns Brot und Blumen liefern.\" - Honoré de Balzac"
 dubois.265.g: "Ein beliebter Professor!"
