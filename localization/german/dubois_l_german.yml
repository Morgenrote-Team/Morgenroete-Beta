 dubois_paleontological_research_modifier_desc: "Das Land lebt vom Nervenkitzel der Entdeckung. Jedes ausgegrabene Fossil ist ein Fenster in eine verschwundene Welt, und jede Ausgrabung regt die Fantasie von Wissenschaftlern und der Öffentlichkeit gleichermaßen an. Die Suche nach antikem Leben ist zu einer nationalen Faszination geworden, die sowohl den Ehrgeiz der Wissenschaftler als auch das Staunen der Bevölkerung anregt."
 dubois_paleontologist_travell_to_location_modifier_desc: "Mit Notizbüchern in der Hand und Träumen von prähistorischen Giganten macht sich unser Paläontologe auf den Weg durch unwegsames Gelände und trotzt den Elementen auf der Suche nach in Stein gehauenen Geheimnissen. Die Reise ist ebenso abenteuerlich wie wissenschaftlich - ein Wettlauf gegen die Zeit, um die Relikte der fernen Vergangenheit der Erde zu entdecken."
 dubois_paleontologist_travell_from_location_modifier_desc: "Nach Monaten im Feld kehrt der Paläontologe erschöpft, aber triumphierend zurück. Die Schulranzen sind prall gefüllt mit Fossilien, Skizzen und Geschichten über Entdeckungen. Jeder Fund verspricht, die Geschichtsbücher neu zu schreiben und eine neue Generation von Wissenschaftlern zu inspirieren."
 notification_dubois_paleontological_report_notification_tooltip: "Von der Expedition von Professor Dubois ist ein paläontologischer Bericht eingetroffen, der bemerkenswerte Fossilienfunde enthält."
 notification_dubois_java_man_notification_tooltip: "Ein neuer paläoanthropologischer Bericht von Professor Dubois deutet auf die Entdeckung eines uralten menschlichen Vorfahren hin, der vorläufig \"Java-Mensch\" genannt wird."
 notification_dubois_animal_breeding_notification_tooltip: "Eines unserer Zooexemplare hat sich in Gefangenschaft erfolgreich fortgepflanzt. Dies stellt einen Durchbruch in unserem Verständnis der Art dar."
 ask_for_zoo_animal_proposal_third_party_accepted_name: "Anfrage von einer dritten Partei angenommen"
 ask_for_zoo_animal_proposal_third_party_accepted_desc: "Eine dritte Partei hat sich bereit erklärt, uns ein Exemplar eines Zootiers zur Verfügung zu stellen. Die Expedition wird unter ihrem Schutz stattfinden."
 ask_for_zoo_animal_proposal_third_party_declined_name: "Anfrage von einer Dritten Partei abgelehnt"
 ask_for_zoo_animal_proposal_third_party_declined_desc: "Der Dritte hat sich geweigert, ein Zootier zur Verfügung zu stellen oder eine Abholung zuzulassen. Möglicherweise muss der diplomatische Weg neu überdacht werden."
