 dubois.149.t: "Der Manul kommt an"
 dubois.149.d: "Unser Zoo ist um ein neues, exotisches Tier reicher: Heute ist der lange erwartete #O Manul#! in sein neues Gehege eingezogen."
 dubois.149.f: "Der Manul ist eine kleine Wildkatze, die in den Graslandschaften und Bergregionen Zentralasiens lebt. Sie ist für ihr dichtes, flauschiges Fell und ihren stämmigen Körperbau bekannt und ist gut an kalte Umgebungen angepasst. Manule sind Einzelgänger und schwer zu fassen. Sie verstecken sich oft in Felsspalten oder Höhlen, um Raubtieren zu entgehen. Sie jagen hauptsächlich kleine Säugetiere wie Nagetiere und Vögel und nutzen dabei ihr scharfes Sehvermögen und ihre Heimlichkeit."
 dubois.149.g: "Schön!"
 visit_pallas_tt: "Sie besuchen das Gehege der #o Manuls#!"
