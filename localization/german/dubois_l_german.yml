 dubois.443.f: "Eine Stunde hatten die Männer auf den Akademiker gewartet, der irgendwo an einem Abhang stehen geblieben war und plötzlich [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] Werkzeug hervorgeholt hatte. Zunächst den Kopf schüttelnd, hatten sie beschlossen, das Unangenehme mit dem Nützlichen zu verbinden und hatten das Essen vorverlegt, um nicht unnötig Zeit zu verlieren. Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] hatte allerdings weder die Absicht zu essen, noch zu kommen. Als der Leiter drohte, die Expedition ohne den Geologen fortzusetzen, schloss [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] sich plötzlich wieder der Gruppe an – mit einem funkelnden Stein in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]er Hand, dessen Schönheit alle [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] Kollegen beeindruckte."
