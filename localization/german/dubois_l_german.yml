 dubois.11.sealion: "Der Neuseeländische Seelöwe."
 dubois.11.no: "Schließlich darf man die Gehege nicht überfüllen."
 dubois.12.t: "Schmuggler gelangen in den Lebensraum eines Tieres"
 dubois.12.d: "Professor [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] hat sich erfolgreich heimlich Zugang zu einem abgelegenen Tierlebensraum [SCOPE.sCountry('dubois_animal_country').GetAltName('IN')] verschafft. Nun stellt sich die heikle Frage: Welches Exemplar soll im Namen des wissenschaftlichen Fortschritts \"erworben\" werden?"
 dubois.12.f: "\"Wie kann es ungesetzlich sein, eine Kreatur der Wildnis zu fangen? Sicherlich ist es nicht im Besitz eines Rechtstitels\", sinnierte der Professor nach seiner Rückkehr, als ein anderes Expeditionsmitglied vorsichtig nachfragte, ob sie die Grenzen der Legalität überschritten hätten."
 dubois.13.t: "Schmuggler festgenommen!"
 dubois.13.d: "Aus [SCOPE.sCountry('dubois_animal_country').GetAltName('AKK')] erreichen uns bedauerliche Nachrichten: Die kleine Gruppe von Schmugglern, die ein zoologisches Exemplar beschaffen sollte, wurde abgefangen. Der darauf folgende Vorfall hat einen diplomatischen Skandal ausgelöst - unsere Nation wird nun öffentlich der Wilderei beschuldigt."
 dubois.13.f: "Berichten zufolge wurde die Gruppe zunächst von örtlichen Förstern entdeckt, die umgehend die Behörden alarmierten. Unser Botschafter wurde inzwischen vorgeladen, um sich den offiziellen Protesten zu stellen. Glücklicherweise gelang es Professor [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName], das Land vor der Verhaftung zu verlassen und so den wissenschaftlichen Ruf vor irreparablem Schaden zu bewahren."
 dubois.13.g: "Es lief nicht wie geplant."
 dubois.21.t: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] kehrt mit seltenen Exemplaren zurück"
 dubois.21.d: "Nach einer einjährigen Expedition in die Wildnis ist Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] triumphierend zurückgekehrt. Mit Hilfe von örtlichen Führern, Jägern und Fallenstellern gelang es der Expedition, mehrere bemerkenswerte [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] für wissenschaftliche Studien und öffentliche Ausstellungen zu erwerben."
 dubois.21.f: "Anzahl der sichergestellten Tiere: #G [ROOT.Var('dubois_catch_animal_total').GetValue]#!"
 dubois.21.g: "Ein großartiger Triumph für die Wissenschaft und die Nation!"
 dubois.31.t: "Die Safari beginnt"
 dubois.31.d: "Die Expedition unter der Leitung des geschätzten Professors [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] ist auf dem afrikanischen Kontinent angekommen. Ihr Ziel: ein bemerkenswertes Exemplar für den nationalen [concept_dubois_zoo] zu sichern. Welches Tier sollen sie verfolgen?"
 dubois.31.f: "Nicht alle Tiere lassen sich auf die gleiche Weise fangen. Einige allgemeine Ratschläge: Der Elefant benötigt eine Fülle von Fallen, während die Giraffe leichter zu fangen ist. Löwen sind ruhelos und wechseln häufiger das Revier als das schwerfällige Flusspferd."
 dubois.31.g: "Jage das Flusspferd."
 dubois.31.h: "Jage den Afrikanischen Löwen."
 dubois.31.i: "Jage den Afrikanischen Elefanten."
 dubois.31.j: "Jage die Giraffe."
 dubois.31.k: "Jage das Steppenzebra."
 dubois.32.t.hippopotamus_1: "Ein riesiges Flusspferd"
 dubois.32.t.hippopotamus_2: "Zweite Sichtung eines Flusspferdes"
 dubois.32.t.hippopotamus_3: "Ein weiteres Flusspferd"
 dubois.32.t.lion_1: "Ein Majestätischer Löwe"
 dubois.32.t.lion_2: "Zweite Sichtung eines Löwen"
 dubois.32.t.lion_3: "Ein weiterer Löwe"
 dubois.32.t.elephant_1: "Ein Riesiger Elefant"
 dubois.32.t.elephant_2: "Zweite Sichtung eines Elefanten"
 dubois.32.t.elephant_3: "Ein weiterer Elefant"
 dubois.32.t.giraffe_1: "Eine elegante Giraffe"
 dubois.32.t.giraffe_2: "Zweite Sichtung einer Giraffe"
 dubois.32.t.giraffe_3: "Eine weitere Giraffe"
 dubois.32.t.zebra_1: "Ein schnelles Zebra"
 dubois.32.t.zebra_2: "Zweite Sichtung eines Zebras"
 dubois.32.t.zebra_3: "Ein weiteres Zebra"
 dubois.32.d: "Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] hat die betreffende Kreatur aufgespürt. Jetzt muss das Team sie mit Geduld und Geschick in eine Position bringen, in der sie gefangen werden kann."
 dubois.32.f.hippopotamus.1: "Im Schatten des großen Flusses sprechen die Dorfbewohner in gedämpftem Ton über die Tiere, die in der Dämmerung das Wasser aufwühlen. Ein einheimischer Jäger erzählt von einer kürzlichen Nacht, in der ein Flusspferd-Muttertier ein Krokodil unter seinem Gewicht zerquetschte, um sein Kalb zu verteidigen - eine Szene, die Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] durch die Untersuchung der zerschmetterten Überreste des Reptils bestätigte. Ihr tiefes Brüllen ist bis tief in die Nacht hinein zu hören und erinnert daran, dass die Flusspferde hier nicht nur Bewohner sind, sondern auch Herrscher."
 dubois.32.f.hippopotamus.2: "Als die Sonne den Morgennebel durchbrach, entdeckte das Team eine titanische Gestalt, die aus dem Fluss aufstieg - dickhäutig und dampfend im frühen Licht. Die Dorfbewohner nennen sie \"Geisterbullen\", denn sie verschwinden spurlos unter Wasser und schlagen mit schrecklicher Kraft zu. Ihre Stoßzähne glänzen wie poliertes Elfenbein, ihr Temperament ist schnell zornig. Selbst die Löwen machen einen großen Bogen um diese Tiere. Doch Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], mit eisernen Nerven und einem Notizbuch in der Hand, schreitet unbeirrt voran."
 dubois.32.f.hippopotamus.3: "An den Lagerfeuern und auf den Karawanenrouten erzählt man sich Geschichten über ein einsames Tier - das \"Elfenbeinungeheuer\" -, von dem man sagt, dass es Knochenplatten besitzt, die so blass und stark sind wie geschützter Stein. Manche sagen, es sei unsterblich, andere, sein Atem rufe Stürme herbei. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] glaubt, dass es sich um ein Exemplar von seltener Größe und seltenem Alter handelt, dessen Verehrung durch die einheimische Bevölkerung auf mythische Größe schließen lässt. Wenn es gefangen wird, würde es jede zoologische Sammlung der Welt krönen."
 dubois.32.f.lion.1: "Über die goldenen Weiten der Savanne bewegt sich ein Schatten mit kaiserlicher Anmut. Der Löwe, der eine Mähne wie eine vom Wind verwehte Flamme trägt, ist hier nicht nur zu Hause, er herrscht. Einheimische Fährtenleser sprechen voller Ehrfurcht von der \"Königin der Savanne\", einer Löwin, die so stark ist, dass sie ein ganzes Hyänenrudel abwehrte, um ihre Jungen zu schützen. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], obwohl erfahren, findet ihre Spur entmutigend. Das Land selbst scheint sich vor ihrem Weg zu verneigen."
 dubois.32.f.lion.2: "Eine gedämpfte Spannung ergreift das Lager: Abdrücke - massiv und bedächtig - führen zu einem in Staub und Sonne gehüllten Dickicht. Der \"Goldene Herrscher\", flüstern die Einheimischen, ist nahe. Es heißt, er habe mit einem Kapbüffelbullen gekämpft und sei blutig, aber unversehrt wieder aufgetaucht, und die Mähne dieses Löwen wird in ihrer Wut mit der Sonne verglichen. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] weiß, dass dies kein gewöhnliches Raubtier ist. Es ist ein Monarch, dessen Herrschaftsgebiet in Stille und Angst gemessen wird und dessen Blick erwachsene Jäger in die Flucht schlägt."
 dubois.32.f.lion.3: "Zwischen dem Zirpen der Zikaden und dem windgepeitschten Gras regt sich etwas. Das Brüllen des Löwen - tief, guttural und widerhallend - rollt über die Ebenen wie ein entfernter Donner. Die Legende spricht von einem Patriarchen, dessen bloße Anwesenheit Rivalen zum Schweigen bringt und Elefanten auf ihrem Weg aufhält. In dieses uralte Drama von Raubtier und Beute tritt nun Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ein, ein einsamer Gelehrter auf der Suche nach dem sagenumwobenen Herrscher der Natur."
 dubois.32.f.elephant.1: "Die Sonne brennt auf die schimmernde Savanne, als ein fernes Grollen näher kommt. Es ist kein Donner, sondern die feierliche Prozession der Elefanten. Eine Matriarchin führt ihre Sippe über die staubbedeckte Ebene und hält nur unter einem Akazienhain inne, wo ihre Rüssel wie Periskope in Richtung der Baumkronen ragen. Durch sein Fernglas beobachtet Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] schweigend die Tiere und ist nicht nur von ihrer Größe beeindruckt, sondern auch von dem sanften Rhythmus ihrer Gesellschaft. Doch hinter ihm ertönt das Geflüster von ungeduldigen Wohltätern: Die Nation hat diese Reise nicht aus Sentimentalität finanziert."
 dubois.32.f.elephant.2: "Die Herde bewegt sich mit einer Anmut, die für so große Tiere unerwartet ist, jeder Schritt ist wohlüberlegt, jeder Blick zwischen ihnen ist voller Bedeutung. Angeführt von einer erfahrenen Matriarchin, deren Augen schon viele Wanderungen gesehen haben, marschieren sie in feierlicher Einigkeit. In der Abenddämmerung, an einer flachen Wasserstelle, ertönen ihre Trompeten - ein Klang, der irgendwo zwischen Musik und Trauer liegt. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], mit dem Notizbuch in der Hand, spürt die Anwandlungen des Zweifels. Ist es die Wissenschaft oder das Spektakel, das ihn zu dieser Suche treibt?"
 dubois.32.f.elephant.3: "Unter den riesigen, uralten Affenbrotbäumen scheint die Zeit stillzustehen. Dort erblickt Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] einen ebenso edlen wie traurigen Anblick: Eine Gruppe von Elefanten, deren Ohren gefächert sind und deren Stoßzähne wie poliertes Elfenbein glänzen, steht gelassen da. Sie drohen nicht und fliehen nicht - sie sind einfach da. Und doch würde es wie eine Wunde durch die Herde hallen, wenn man einen aus dieser Gemeinschaft herausreißen würde, wenn man den Herrscher einer solchen Ebene einsperren würde. Der Professor kennt die Namen von Knochen und Arten, aber das hier - das ist etwas ganz anderes."
 dubois.32.f.giraffe.1: "Tagelang wanderte das Team unter der unerbittlichen Sonne und fand keine Spur von ihrer Beute. Doch eines Morgens, als die Dämmerung über den Horizont brach, tauchten Silhouetten auf - groß und still wie Statuen. Vor dem rötlichen Feuer des Morgenhimmels ragten die Hälse mehrerer Giraffen über die Akazien und bildeten eine lebendige Silhouette. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] gab das Signal. Die Jagd - nach Wissen - begann."
 dubois.32.f.giraffe.2: "Als das Sonnenlicht wie verstreutes Gold durch die Bäume fiel, traten die Giraffen ins Blickfeld. Hoch aufragend, gelassen und gemustert wie abstrakte Mosaike, bewegten sie sich wie zu einer Musik, die nur sie hören konnten. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], der fasziniert war, ging langsam mit Notizbuch und Fernrohr in der Hand weiter. Die Eleganz der Kreaturen war unübertroffen - jeder ihrer Schritte war eine Studie der Gelassenheit. Der Naturforscher wusste, dass dies mehr als eine zoologische Gelegenheit war; es war ein Blick auf das Erhabene."
 dubois.32.f.giraffe.3: "Weit entfernt von der nächsten Siedlung, tief in einer unberührten Ecke der Savanne, fand das Team eine einsame Giraffe, die anders war als alle zuvor beschriebenen. Ihr Fell trug seltsame Markierungen - fast sternförmig - und ihre Bewegungen waren ungewöhnlich schnell. Einheimische Führer flüsterten von einem Omen, einem heiligen Tier, das nur selten von Menschen gesehen wird. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], Skeptiker und Gelehrter zu gleichen Teilen, bereitete sich auf eine sorgfältige Beobachtung vor. Könnte es sich wirklich um eine eigene Unterart handeln - oder nur um einen Trick von Licht und Legende?"
 dubois.32.f.zebra.1: "Die Ebenen waren ruhig, als die Sonne tief stand, bis schwarze und weiße Streifen zwischen dornigen Büschen und verwitterten Bäumen auftauchten. Eine Zebraherde, ruhig und ahnungslos, graste gerade außerhalb der Reichweite. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] beobachtete sie schweigend, fasziniert von ihren Streifen - dem Rätsel der Evolution, das in lebendigem Kontrast dargestellt wurde. Der Wunsch, sie genauer zu studieren, kämpfte mit dem Zwang zur Eile: Wenn man zu lange wartet, kann der Moment für immer vergehen."
 dubois.32.f.zebra.2: "Wochen verstrichen mit einer erfolglosen Verfolgung, bis sich das Team an einen wichtigen Hinweis von einheimischen Fährtenlesern erinnerte: Zebras wagen sich nur selten weit weg von Wasser. Sie schlugen ihr Lager in der Nähe der nächsten zuverlässigen Wasserstelle auf, und tatsächlich, gerade als die Dämmerung hereinbrach, kündigte das vertraute Schnauben und Schwanzwedeln einer gestreiften Herde ihre Ankunft an. Endlich eine zweite Chance - und vielleicht, mit Glück und Vorsicht, ein lebendiger Fang."
 dubois.32.f.zebra.3: "Die Savanne war ein stummer Zeuge der Gewalt: Vor uns lag der verstümmelte Kadaver eines Zebras, frisch aus dem Hinterhalt eines Löwen. Sein Tod war zwar grausam, aber es gab Anzeichen - Spuren, Geräusche, Bewegung. Von der Dringlichkeit angespornt, ging das Team weiter. Als sie eine niedrige Anhöhe erklommen, sahen sie eine Szene wilder Harmonie: eine Zebraherde in Bewegung, deren Schreie eine seltsame Mischung aus Pferd und Esel sind, ihre Streifen tanzen im Wind. Für Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] mischte sich bei diesem Anblick Tragik mit Triumph."
 dubois.32.g: "Weisen Sie das Team an, Fallen aufzustellen."
 dubois.32.h: "Lassen Sie das Team die Spur des Tieres aufnehmen."
 dubois.33.t: "Eine Wiese mit seltenen Blüten"
 dubois.33.d.hippopotamus: "Auf der Suche nach dem schwer fassbaren #O Flusspferd#! stieß die Safari auf ein Feld mit bemerkenswerter Flora. Helle Blüten unbekannter Herkunft erregten die Aufmerksamkeit des Professors. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] erwägt nun einen Abstecher von der Jagd, da seine wissenschaftliche Neugierde geweckt ist."
 dubois.33.d.lion: "Bei der Verfolgung des #O Löwen#! stieß das Team auf ein Wäldchen mit einer seltenen und lebendigen Flora. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] spricht sich dafür aus, die Verfolgung aufzuschieben - diese Pflanzen könnten Geheimnisse bergen, die so großartig sind wie die eines jeden Tieres."
 dubois.33.d.elephant: "Auf der Suche nach dem #O Elefanten#! stieß das Team auf eine seltene und leuchtende Blüte. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] scheint versucht zu sein, zu verweilen und diese seltsamen Pflanzen zu sammeln."
 dubois.33.d.giraffe: "Auf der Suche nach der #O Giraffe#! stieß das Safari-Team auf eine Region, die reich an Blumenvielfalt ist. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] schlug einen kurzen Halt vor, um Proben zu sammeln."
 dubois.33.d.zebra: "Bei der Verfolgung des #O Zebras#! stieß die Safarigruppe auf einen seltsamen Hain mit unbekannter Flora. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] erwog, eine Pause einzulegen, um Proben zu sammeln."
 dubois.33.f: "Die Safari kam zum Stillstand, als Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], der einen ungewöhnlichen Duft wahrnahm, der Kolonne befahl, anzuhalten. Vor ihnen lag eine Lichtung, die mit leuchtenden, unbekannten Blumen geschmückt war. Selbst eine flüchtige Untersuchung ergab, dass sie möglicherweise medizinische Eigenschaften hatten. Der Professor stand nun vor einem Dilemma: Entweder er lenkte seine Aufmerksamkeit auf das Sammeln dieser wertvollen botanischen Exemplare oder er verfolgte das Tier weiter."
 dubois.33.g: "Sammeln Sie die Blumen - dieser Fund ist zu wertvoll, um ihn zu ignorieren."
 dubois.33.h: "Die Zeit ist knapp. Der Steinbruch muss unsere Priorität bleiben."
 dubois.34.t: "Ein Schwarm von Entdeckungen"
 dubois.34.d.hippopotamus: "Als das Team auf der Suche nach dem #O Flusspferd#! tiefer in das Feuchtgebiet vordrang, bemerkten sie plötzlich, dass Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] fehlte. Seine Fußspuren führen zu einem eingestürzten Termitenhügel, in dem es vor Käfern nur so wimmelt - ein Beweis dafür, dass er von einer anderen Kuriosität der Natur weggelockt worden sein könnte."
 dubois.34.d.lion: "Die Safari auf der Suche nach dem #O Löwen#! ist auf ein unerwartetes Chaos gestoßen. Irgendwo im Gebüsch ist Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] verschwunden - abgelenkt vielleicht von etwas, das nicht weniger wild oder faszinierend ist als der Löwe selbst."
 dubois.34.d.elephant: "Die Safari für den #O Elefanten#! wurde abrupt unterbrochen. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ist im Gebüsch verschwunden - vielleicht auf der Suche nach dem großen Tier, vielleicht aber auch auf der Suche nach einer tieferen Frage, die nur er beantworten kann."
 dubois.34.d.giraffe: "Die Safari auf der Suche nach der #O Giraffe#! wurde unterbrochen - Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ist ohne ein Wort im Laub verschwunden. Die Besorgnis wird immer größer."
 dubois.34.d.zebra: "Die Safari, die das #O Zebra#! sichern sollte, wurde gestört - Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ist nirgends zu finden."
 dubois.34.f: "Nach einer kurzen Pause bemerkte das Safari-Team die plötzliche Abwesenheit ihres Leiters. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] fand sich bald auf einem ausgetrockneten Termitenhügel wieder, fasziniert von einer sich windenden Masse von Käfern - schillernde Blautöne, leuchtende Rottöne, schimmernde Grüntöne. Mit kindlichem Enthusiasmus katalogisierte der Professor die scheinbar zahlreichen nicht dokumentierten Insektenarten."
 dubois.34.g: "Sammeln Sie Insektenexemplare für wissenschaftliche Untersuchungen."
 dubois.34.h: "Jetzt ist keine Zeit für Käfer - weiter geht die Jagd!"
 dubois.39.t: "Eine erfolgreiche Jagd"
 dubois.39.f: "\"Alles in Afrika beißt, aber das Safarifieber ist am schlimmsten.\" -Ernest Hemingway"
 dubois.39.g: "Ein Triumph für die Wissenschaft!"
 dubois.40.t: "Die Safari endet"
 dubois.40.d.success: "Nachdem das Ziel gesichert und die Expedition abgeschlossen ist, kehrt Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] im Triumph nach Hause zurück. Die neue Ergänzung des Nationalen Zoos [ROOT.GetCountry.GetAltNameNoFlag('GEN')] wird zweifellos sowohl die Öffentlichkeit als auch das wissenschaftliche Interesse wecken."
 dubois.40.d.fail: "Nach Monaten der Entbehrungen und leerer Wege kehrt Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ohne einen Fang [ROOT.GetCountry.GetAltNameNoFlag('NACH')] zurück. Die Expedition ist beendet, ihr Versprechen nicht erfüllt."
 dubois.40.f: "\"Alles, was ich wollte, war, zurück nach Afrika zu kommen. Wir hatten es noch nicht verlassen, aber wenn ich nachts aufwachte, lag ich da und lauschte und hatte schon Heimweh danach...\" - Ernest Hemingway"
 dubois.40.g: "Auf geht's zur nächsten Expedition."
 dubois.41.t: "Exotische Pflanzen"
 dubois.41.d: "Die Expedition stieß auf eine wundersame Vielfalt an exotischen Pflanzen, doch die Sicherheit dieses grünen Ortes bleibt ungewiss."
 dubois.41.f: "Die Expeditionsteilnehmer hatten Flüsse überquert, Bergrücken erklommen und sich durch dichtes Waldgestrüpp geschlagen. Doch nichts bereitete sie auf die Majestät dieser riesigen, blühenden Pflanzen vor - breitblättrige Giganten, die in unwahrscheinlichen Farben blühen. [SCOPE.sCharacter('expedition_leader').GetFullName] erklärte zunächst, dass sie nicht verweilen würden, erlaubte dann aber einem Forschungsassistenten, einige Proben zu sammeln. Der wissenschaftliche Nutzen war zu überzeugend, um ihn zu ignorieren. Dennoch hallten aus dem Dschungel seltsame Geräusche - weder von Vögeln noch von Tieren, vielleicht nicht einmal von Menschen -, die den Leiter innehalten ließen."
 dubois.41.g: "Sammeln Sie einige Pflanzenproben."
 dubois.41.h: "Sammeln Sie so viele Exemplare wie möglich."
 dubois.42.t: "Schmetterlinge"
 dubois.42.d: "Zu ihrer Überraschung betrat die Expedition eine sonnenüberflutete Lichtung, auf der Zehntausende von Schmetterlingen in der Luft tanzten."
 dubois.42.f: "\"Dies sind Blumen, die fliegen und alles andere als singen.\" - Robert Frost"
 dubois.42.g: "Unsere Naturforscher zu Hause werden begeistert sein."
 dubois.43.t: "Flussfisch"
 dubois.43.d: "Bei der Durchquerung eines Flusses bemerkten mehrere Expeditionsmitglieder unbekannte Fische [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], die im seichten Wasser schwammen. [SCOPE.sCharacter('expedition_leader').GetFullName] hatten jedoch ihre eigenen Vorstellungen."
 dubois.43.f: "Schimmernde, juwelenfarbene Kreaturen schwammen knapp unter der Oberfläche - schön, geheimnisvoll und völlig unbekannt. Für das wissenschaftliche Team waren sie ein Wunder, das katalogisiert werden musste. Für den Expeditionsleiter waren sie eine dringend benötigte Ergänzung für den Kochtopf. Der anschließende Streit war kurz, und das Feuer brannte bereits."
 dubois.43.g: "Sammeln und untersuchen Sie die Fische."
 dubois.43.h: "Kochen und essen Sie den Fisch."
 dubois.44.t: "Proben verloren"
 dubois.44.d: "Vor einigen Tagen hat die Expedition Proben von großem wissenschaftlichem Interesse gesammelt - jetzt sind sie zum Entsetzen aller verschwunden."
 dubois.44.f: "Ein plötzlicher Alarmschrei ertönte am Mittag. [SCOPE.sCharacter('expedition_leader').GetFullName] befürchtete einen Hinterhalt - feindlich gesinnte Einheimische oder wilde Tiere -, aber es war nur ein verzweifelter und blasser Forschungsassistent. Die Kisten mit Insekten, Blättern und konservierten Exemplaren waren verschwunden. Der Assistent forderte die Expedition auf, umzukehren, aber die Träger weigerten sich und der Leiter verwarf die Idee: zu gefährlich und zu viel Zeit, die bereits mit dem Sammeln von Unkraut verschwendet wurde. Der Assistent drohte damit, dieses Versäumnis einigen gut platzierten Freunden in Wissenschaft und Politik zu melden."
 dubois.44.g: "Verfolgen Sie Ihre Schritte zurück und stellen Sie die Sammlung wieder her."
 dubois.44.h: "Lassen Sie den \"Schrott\" hinter sich und gehen Sie weiter."
 dubois.45.t: "Eine kostbare Sammlung"
 dubois.45.d: "Auf einer abgelegenen Lichtung entdeckte die Expedition einen einsamen Naturforscher, der die Zivilisation vor Jahren verlassen hatte und eine bemerkenswerte Sammlung seltener Exemplare zusammengetragen hatte."
 dubois.45.f: "Er war eine hagere Gestalt mit ungepflegtem Haar und von der Einsamkeit eingefallenen Augen. Doch in seinem Unterschlupf wimmelte es nur so von sorgfältig konservierten Käfern, Schmetterlingen, Samen und kommentierten Skizzen. [SCOPE.sCharacter('expedition_leader').GetFullName] erkannte schnell, dass der Mann nicht verrückt war, sondern brillant - und ängstlich. Aus Angst vor seinen Gläubigern und seinem Ruf zögerte der Einsiedler, nach Hause zurückzukehren. Doch seine Sammlung war von unschätzbarem Wert, sowohl wissenschaftlich als auch anderweitig. Hier boten sich Möglichkeiten, und zwar nicht nur botanische."
 dubois.45.g: "Kaufen Sie die Sammlung für unsere Institution."
 dubois.45.h: "Wir sind mehr daran interessiert, was er weiß."
 dubois.72.t: "Geologische Formation entdeckt"
 dubois.72.d: "In [SCOPE.sState('dubois_formation_state').GetName] haben [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] Millionen Jahre alte Felsformationen entdeckt. Sie vermuten, dass dort noch unbekannte Fossilien zu finden sind."
 dubois.72.f: "Formationen mit uralten Gesteinsschichten sind ein Paradies für Paläontologen. Alle Felsformationen enthalten kleinere Fossilien, die dort zu finden sind. Große Formationen können sogar die Skelette riesiger Dinosaurier enthalten. Ihre Paläontologie erfolgt in mehreren Etappen. Um Fossilien aus Formationen zu bergen, braucht es einen Paläontologen. Sie werden auf eigene Faust Formationen untersuchen und jedes Jahr Fossilien finden."
 dubois.72.g: "Wir sollten genauer hinsehen."
 dubois.73.t: "Große geologische Formation entdeckt"
 dubois.73.d: "In [SCOPE.sState('dubois_formation_state').GetName] haben Paläontologen Millionen Jahre alte Felsformationen entdeckt. In dieser gewaltigen Formation dürften zahlreiche Fossilien schlummern, vermutlich sogar gut erhaltene Skelette, von denen wir bisher nur träumen konnten."
 dubois.101.t: "Der Eisbär kommt an"
 dubois.101.d: "Ein neues Wunder hat in unserem zoologischen Garten Einzug gehalten: der lang erwartete #O Eisbär#! wurde sicher in sein Gehege gebracht."
 dubois.101.f: "Der Eisbär (*Ursus maritimus*) ist ein mächtiges Raubtier des eisigen Nordens, angepasst an das Leben auf dem treibenden Meereis der Arktis. Er jagt Robben in den eisigen Gewässern und legt auf der Suche nach Nahrung riesige Entfernungen zurück. Obwohl er sehr stark ist, ist er weniger territorial als seine Vettern und zieht sich oft zurück, anstatt zu kämpfen. Als lebendiger Widerspruch - gefürchtet und bedroht zugleich - verkörpert er die raue Schönheit der kältesten Regionen der Welt."
 dubois.101.g: "Eine majestätische Ergänzung."
 dubois.102.t: "Der Grizzlybär kommt an"
 dubois.102.d: "Die zoologischen Gärten sind in heller Aufregung: Der gefürchtete und verehrte #O Grizzlybär#! spaziert jetzt durch unsere Sammlung."
 dubois.102.f: "Der Grizzlybär (*Ursus arctos horribilis*), manchmal auch als nordamerikanischer Braunbär bekannt, ist eine Kreatur von immenser Kraft und legendärer Wildheit. Der Name selbst hat eine doppelte Bedeutung - grizzlyfarbenes Fell und grausame Kraft. Dieses gewaltige Tier, das einst frei auf dem amerikanischen Kontinent lebte, ist heute ein Zeugnis für die Macht der Natur und die zerstörerische Vergangenheit des Menschen. Es ist keine bloße Kuriosität, sondern eine Mahnung."
 dubois.102.g: "Eine beeindruckende Präsenz."
 dubois.103.t: "Der Weißkopfseeadler kommt an"
 dubois.103.d: "Heute stellen wir ein nationales Wahrzeichen und Naturwunder vor: der #O Weißkopfseeadler#! ziert nun unsere Voliere."
 dubois.103.f: "Der Weißkopfseeadler (*Haliaeetus leucocephalus*) ist ein in Nordamerika beheimateter Raubvogel, der am häufigsten in der Nähe von Flüssen, Seen und Küstengewässern anzutreffen ist. Seine edle Silhouette und sein durchdringender Schrei sind zu Symbolen für Freiheit und Stärke geworden. Trotz seines Namens ist er nicht kahlköpfig, sondern hat einen weiß gefiederten Kopf, der im Kontrast zu seinem dunklen Körper steht. Opportunistisch und einfallsreich, wird er nicht nur als Raubtier, sondern auch als kulturelle Ikone der amerikanischen Republik verehrt."
 dubois.103.g: "Ein edler Raubvogel."
 dubois.104.t: "Der Amerikanische Bison kommt an"
 dubois.104.d: "Unsere Sammlung wird immer beeindruckender: Der kultige #O Amerikanische Bison#! streift jetzt durch unser sorgfältig vorbereitetes Präriegehege."
 dubois.104.f: "Der Amerikanische Bison (*Bison bison*), manchmal auch Büffel genannt, donnerte einst in riesigen Herden über die Ebenen Nordamerikas. Diese zotteligen Riesen wurden durch unkontrolliertes Abschlachten und das Vordringen der Siedlungen fast zum Aussterben gebracht. Ihre Rückkehr in geschützte Gefangenschaft ist ein Denkmal für die Rücksichtslosigkeit der Vergangenheit und die Verantwortung der Gegenwart. Es ist eine Kreatur von uralter Stärke, ein lebendes Symbol der Widerstandsfähigkeit auf einem umgestalteten Kontinent."
 dubois.104.g: "Ein zotteliger Titan."
 dubois.105.t: "Der Florida-Panther kommt an"
 dubois.105.d: "Heute betritt der #O Florida-Panther#! unseren zoologischen Garten und bietet den Besuchern einen seltenen Blick auf diese schwer zu fassende Raubkatze."
 dubois.105.f: "Der Florida-Panther (*Puma concolor coryi*) ist eine zurückgezogen lebende Unterart des nordamerikanischen Pumas, der die sumpfigen Wälder und das subtropische Dickicht des Südostens der Vereinigten Staaten heimsucht. Dieses flinke Raubtier mit blassem Fell, dunkler Schwanzspitze und dunklen Ohren wird häufiger gehört als gesehen. Seine leisen Laute - Zirpen, Knurren und Zischen - stehen im Gegensatz zu seinen lautlosen Schritten. Lange Zeit verfolgt und jetzt geschützt, bleibt er eines der seltensten großen Säugetiere Nordamerikas."
 dubois.105.g: "Ein Geist der Lichtungen."
 dubois.106.t: "Der Mississippi-Alligator kommt an"
 dubois.106.d: "Ein furchterregendes Relikt aus einer vergangenen Ära ist jetzt bei uns zu Hause: der #O Mississippi-Alligator#! ist da."
 dubois.106.f: "Der Mississippi-Alligator (*Alligator mississippiensis*) ist ein beeindruckendes Reptil und ein Meister der Feuchtgebiete. Als Spitzenprädator und Ingenieur des Ökosystems formt er seine Umgebung, indem er Wasserlöcher gräbt und die Beutepopulationen reguliert. Sein tiefes Brüllen hallt in den Sümpfen wider, sowohl bei der Balz als auch bei der Dominanz. Trotz seines furchteinflößenden Aussehens ist dieses uralte Lebewesen für die Gesundheit seines Lebensraums und jetzt auch für die Aufklärung der Öffentlichkeit von entscheidender Bedeutung."
 dubois.106.g: "Zahn und Schrecken."
 dubois.107.t: "Der Axolotl kommt an"
 dubois.107.d: "Ein rätselhaftes Wunder der Unterwasserwelt kommt in unsere Obhut: der #O Axolotl#! ist jetzt zu sehen."
 dubois.107.f: "Der Axolotl (*Ambystoma mexicanum*) ist ein dauerhaft im Wasser lebender Salamander, der in den alten Seen Mexikos heimisch ist. Einzigartig ist, dass er sein ganzes Leben lang seine jugendlichen Merkmale beibehält und das Erwachsenenalter erreicht, ohne sich zu metamorphosieren. Seine erstaunliche Fähigkeit, verlorene Gliedmaßen und sogar Teile seines Herzens oder Gehirns zu regenerieren, fasziniert Wissenschaftler seit Generationen. Er wird schon seit Humboldts Zeiten erforscht und ist nach wie vor ein Symbol für biologische Geheimnisse und Anpassungsfähigkeit."
 dubois.107.g: "Ein lebendes Wunder."
 dubois.111.t: "Das Braunkehl-Faultier kommt an"
 dubois.111.d: "Ein besonderer Schatz aus den Baumkronen ist jetzt in unseren Gärten zu Hause: Das #O Braunkehl-Faultier#! wurde sanft in sein Gehege eingeführt."
 dubois.111.f: "Das Braunkehl-Faultier (*Bradypus variegatus*) ist ein sich langsam bewegendes, baumlebendes Säugetier, das in der Neotropis Mittel- und Südamerikas vorkommt. Es bevorzugt die Baumkronen und verbringt den größten Teil seines Lebens kopfüber hängend, wobei es nur einmal alle acht Tage auf den Waldboden hinabsteigt, um seinen Kot abzusetzen. Dieses Faultier hat einen bemerkenswert kleinen Lebensraum und ist oft auf eine oder zwei bevorzugte Baumarten spezialisiert. Trotz seiner Trägheit ist es ein Meister der Tarnung und ein Sinnbild für die Geduld der Evolution."
 dubois.111.g: "Der langsamste Philosoph."
 dubois.112.t: "Der Jaguar kommt an"
 dubois.112.d: "Mit leisen Schritten und glühenden Augen schleicht der #O Jaguar#! nun durch die Schatten der begrünten Gehege unseres Zoos."
 dubois.112.f: "Der Jaguar (*Panthera onca*) ist das Spitzenraubtier des tropischen Amerikas und die drittgrößte Katzenart der Welt. Der Jaguar ist bekannt für seinen muskulösen Körperbau, sein auffälliges, rosettenartiges Fell und seinen außergewöhnlich kräftigen Biss, mit dem er Beutetieren mit einem einzigen Schlag den Schädel durchbohren kann. Sein Name leitet sich von dem Tupi-Guarani-Wort *yaguara* ab, was so viel bedeutet wie \"der, der mit einem Sprung tötet\". Die scheue und einzelgängerische Katze ist ein Meister der Tarnung und der Überraschung im dichten Regenwald."
 dubois.112.g: "Die fleischgewordene Tarnung."
 dubois.113.t: "Der Große Ameisenbär kommt an"
 dubois.113.d: "Ein exzentrischer Insektenfresser wandelt nun unter uns: der #O Große Ameisenbär#! hat seine ersten Schritte in seinem neuen Zuhause gemacht."
 dubois.113.f: "Der Große Ameisenbär (*Myrmecophaga tridactyla*) ist die größte der Ameisenbärenarten und in den Grasländern und Wäldern Mittel- und Südamerikas beheimatet. Dieses einzelgängerische Säugetier zeichnet sich durch seine verlängerte Schnauze und Zunge aus, die bis zu 60 cm lang werden kann, sowie durch seine gewaltigen Krallen, mit denen es Termitenhügel und Ameisenhaufen aufreißt. Trotz seines unbeholfenen Gangs ist er auf einzigartige Weise an seine spezielle Ernährung und Lebensweise angepasst. Trotz seiner ruhigen Erscheinung kann er sich bei Bedrohung heftig verteidigen."
 dubois.113.g: "Ein Aristokrat unter den Insektenfressern."
 dubois.114.t: "Das Neunbinden-Gürteltier kommt an"
 dubois.114.d: "Eine Kreatur in einer lebenden Rüstung huscht jetzt in unsere Ausstellung: das #O Neunbinden-Gürteltier#! ist da."
 dubois.114.f: "Das Neunbinden-Gürteltier (*Dasypus novemcinctus*) ist die am weitesten verbreitete Gürteltierart in Amerika. Es ist an seinem segmentierten, knöchernen Panzer und seinem scheuen Wesen zu erkennen und ist ein ausgezeichneter Gräber und Insektenfresser. Es ist ein bemerkenswerter Teilnehmer am Great American Biotic Interchange und hat sein Verbreitungsgebiet in den letzten Jahrzehnten erheblich nach Norden erweitert. Ihre eigentümliche Fortbewegungsart umfasst die Fähigkeit, schwimmend oder gehend den Flussgrund zu durchqueren, was sie zu einem Wunder an biologischer Widerstandsfähigkeit und Anpassungsfähigkeit macht."
 dubois.114.g: "Umhüllt von Neugierde."
 dubois.115.t: "Der Andenkondor kommt an"
 dubois.115.d: "Hoch über den Felsen und Gipfeln, die er einst erklomm, breitet der #O Andenkondor#! jetzt seine mächtigen Schwingen über unserer Voliere aus."
 dubois.115.f: "Der Andenkondor (*Vultur gryphus*) ist einer der größten fliegenden Vögel der Welt, gemessen an Flügelspannweite und Gewicht, und ist in den Anden und an der Pazifikküste Südamerikas beheimatet. Dieser Aasfresser spielt in seinen Gebirgslebensräumen eine entscheidende ökologische Rolle. Sein federloser Kopf und sein Hals wechseln je nach Gefühl oder Temperatur die Farbe, und seine riesigen Flügel ermöglichen stundenlanges Gleiten ohne einen einzigen Flügelschlag. In der andinen Mythologie wird er als Symbol der Freiheit verehrt und ist majestätisch und bedroht zugleich."
 dubois.115.g: "Monarch der Aufwinde."
 dubois.116.t: "Der Karibik-Manati kommt an"
 dubois.116.d: "Ein sanfter Schwimmer aus den Untiefen der Karibik ist in unserer Obhut aufgetaucht: der #O Karibik-Manati#! ist jetzt bei uns."
 dubois.116.f: "Der Karibik-Manati (*Trichechus manatus*) ist ein sich langsam bewegender Wasserpflanzenfresser, der in den warmen Küstengewässern der Karibik, des Golfs von Mexiko und des Südostens der Vereinigten Staaten lebt. Die manchmal auch als \"Seekühe\" bezeichneten Seekühe ernähren sich von der Unterwasservegetation und sind für ihr gutmütiges Temperament bekannt. Trotz ihrer Größe sind sie flinke Schwimmer, die sich mit ihren kräftigen, paddelförmigen Schwänzen fortbewegen. In Ermangelung natürlicher Raubtiere haben sie stark unter dem Eindringen des Menschen, Bootsunfällen und dem Verlust ihres Lebensraums gelitten."
 dubois.116.g: "Ein schwebender Philosoph."
 dubois.117.t: "Das Totenkopfäffchen kommt an"
 dubois.117.d: "Klein in der Statur, aber riesig in der Ausstrahlung, hat sich das #O Totenkopfäffchen#! unserer Menagerie angeschlossen."
 dubois.117.f: "Totenkopfäffchen (*Gattung Saimiri*) sind sehr soziale Primaten der tropischen Wälder Mittel- und Südamerikas. Sie wiegen weniger als ein Kilogramm und sind flinke Kletterer, schnelle Springer und unendlich neugierige Geschöpfe. Sie leben in großen Trupps, die von dominanten Weibchen angeführt werden, und ihr Leben ist erfüllt von komplexer Kommunikation - Zirpen, Gackern und Pfeifen, die ihre komplizierten sozialen Bindungen widerspiegeln. Ihre ausdrucksstarken Gesichter und ihre unbändige Energie machen sie zu einem Forschungsobjekt und einem Publikumsliebling."
 dubois.117.g: "Winzige Akrobaten mit mächtigem Charme."
 dubois.121.t: "Der Pardelluchs kommt an"
 dubois.121.d: "Ein neuer und schwer fassbarer Bewohner hat sich unserer Menagerie angeschlossen: der seltene und anmutige #O Pardelluchs#! bewohnt jetzt sein Gehege."
 dubois.121.f: "Der Pardelluchs (*Lynx pardinus*) ist eine vom Aussterben bedrohte Raubkatze, die nur auf der Iberischen Halbinsel heimisch ist. Er zeichnet sich durch sein geflecktes, gelbbraunes Fell, schwarze Ohrbüschel und einen kurzen Schwanz aus und ist deutlich kleiner als sein eurasischer Verwandter. Sein Gehör ist sehr gut ausgebildet, was durch die ausgeprägten Pinselhaare an den Ohren unterstützt wird - Experimente haben gezeigt, dass die Entfernung dieser Büschel die Richtungswahrnehmung beeinträchtigt. Der einzelgängerische und territoriale iberische Luchs war einst in Spanien und Portugal weit verbreitet, doch heute versucht er, durch strenge Schutzmaßnahmen zu überleben."
 dubois.121.g: "Ein seltenes Juwel von der Halbinsel."
 dubois.122.t: "Der Eurasische Wolf kommt an"
 dubois.122.d: "Mit ruhigem Schritt und wachsamen Augen bewohnt der #O Eurasische Wolf#! nun unsere zoologischen Gärten."
 dubois.122.f: "Der eurasische Wolf (*Canis lupus lupus*) ist die am weitesten verbreitete Unterart des grauen Wolfs und bewohnt große Teile Europas und Asiens. Mit seinem grauen bis rostroten Fell und dem charakteristischen schwarzen Sattel auf dem Rücken ist er ein gerissenes und geselliges Raubtier. Sein Heulen ist länger und melodischer als das seiner amerikanischen Verwandten - ein unheimliches Lied der alten Welt. Diese Wölfe haben jahrhundertelange Verfolgung und Folklore überstanden, überleben aber immer noch in abgelegenen Wäldern und Steppen."
 dubois.122.g: "Ein geisterhafter Wächter."
 dubois.123.t: "Der Europäische Dachs kommt an"
 dubois.123.d: "Heute ist ein hartnäckiger Gräber in unsere Sammlung aufgenommen worden: der #O Europäische Dachs#! wurde erfolgreich untergebracht."
 dubois.123.f: "Der Europäische Dachs (*Meles meles*) ist ein stämmiger, nachtaktiver Mustelid, der in weiten Teilen Europas vorkommt. Er ist an seinen schwarz-weißen Gesichtsstreifen zu erkennen und wohnt in großen, komplexen Höhlensystemen, die als Baue bezeichnet werden und die er oft mit seinen Verwandten teilt. Diese sozialen Fleischfresser ernähren sich von Regenwürmern, Insekten und Knollen und bauen ausgedehnte unterirdische Behausungen, die von Generation zu Generation weitergegeben werden. Ihre jahreszeitlichen Gewichtsschwankungen spiegeln die Strapazen des Winterschlafs und das Klima wider."
 dubois.123.g: "Ein unerschütterlicher Unterirdischer."
 dubois.124.t: "Das Hermelin kommt an"
 dubois.124.d: "Unsere Säugetiersammlung wird wieder einmal erweitert: Das geschmeidige und tödliche #O Hermelin#! ziert nun unseren Zoo."
 dubois.124.f: "Der Hermelin (*Mustela erminea*), ist ein kleiner fleischfressender Mustelid, der in Eurasien und Nordamerika beheimatet ist. Mit seinem langen Körper, den kurzen Gliedmaßen und dem schwarz gespitzten Schwanz ist er für die schnelle Verfolgung von Nagetieren, seiner Hauptbeute, geeignet. Es ist bemerkenswert, dass er Tiere angreift, die ein Vielfaches seiner Größe haben. Sein geschätztes weißes Winterfell ziert seit Jahrhunderten königliche Gewänder und macht dieses sonst so geheimnisvolle Tier zu einem dauerhaften Symbol des Adels."
 dubois.124.g: "Ein in Hermelin gehüllter Mörder."
 dubois.125.t: "Der Fischotter kommt an"
 dubois.125.d: "Die Gewässer unseres zoologischen Gartens beherbergen jetzt einen eleganten neuen Bewohner: der #O Fischotter#! ist da."
 dubois.125.f: "Der Fischotter (*Lutra lutra*) ist ein semiaquatisches Raubtier, das in ganz Europa und weiten Teilen Asiens verbreitet ist. Er ernährt sich hauptsächlich von Fischen und durchstreift Flüsse und Seen mit bemerkenswerter Gewandtheit. Sein Fell gehört zu den dichtesten im Tierreich und besteht aus ineinandergreifenden Haaren, die isolierende Luft einschließen und Wasser abweisen. So bleibt er auch bei eisigen Temperaturen trocken und warm. Der scheue, aber neugierige Otter ist ein Zeichen für gesunde Süßwasserökosysteme und ein Triumph für den Naturschutz in seinem gesamten Verbreitungsgebiet."
 dubois.125.g: "Der Geist des Stroms."
 dubois.126.t: "Der Alpensteinbock kommt an"
 dubois.126.d: "Der #O Alpensteinbock#! erklimmt die Höhen unserer alpinen Ausstellung und steht nun stolz auf den Felsen."
 dubois.126.f: "Der Alpensteinbock (*Capra ibex*) ist eine Wildziegenart der europäischen Alpen, die für ihre dramatischen Hörner und ihre trittsichere Anmut bekannt ist. Die männlichen Tiere besitzen große, gebogene Hörner, die während der Paarungszeit im rituellen Kampf eingesetzt werden. Diese Tiere sind in einzigartiger Weise an vertikales Gelände angepasst, ernähren sich von spärlicher alpiner Vegetation und ertragen steiles, felsiges Klima. Einst fast bis zur Ausrottung gejagt, wurde die Art durch königlichen Erlass und Schutzbemühungen wieder in den Bergen angesiedelt."
 dubois.126.g: "Ein König der Berge."
 dubois.127.t: "Der Europäische Bison (Wisent) kommt an"
 dubois.127.d: "Europas uraltes Tier ist zurückgekehrt: der #O Europäische Bison (Wisent)#! schreitet nun auf seiner grünen Koppel umher."
 dubois.127.f: "Der Wisent (*Bison bonasus*), auch Europäisches Bison genannt, ist das schwerste noch lebende Landsäugetier Europas. Einst von Spanien bis zum Ural beheimatet, wurde er zu Beginn des 20. Jahrhunderts in freier Wildbahn ausgerottet. Alle lebenden Exemplare stammen von einem knappen Dutzend in Zoos konservierter Exemplare ab. Im Vergleich zu seinem amerikanischen Verwandten ist der Wisent größer und schlanker und an das Leben in Misch- und Laubwäldern angepasst. Er ist ein lebendes Sinnbild für das Überleben trotz widriger Umstände."
 dubois.127.g: "Ein wiedergeborenes Relikt."
 dubois.131.t: "Das Flusspferd kommt an"
 dubois.131.d: "Unser zoologischer Garten hat Zuwachs bekommen: Das schwerfällige #O Flusspferd#! wurde in seinem Wassergehege installiert."
 dubois.131.f: "Das Flusspferd (*Hippopotamus amphibius*) ist ein semiaquatischer Paarhufer aus Afrika südlich der Sahara und nach dem Elefanten und dem Nashorn das drittgrößte Säugetier auf dem Lande. Sein Name, der sich vom griechischen Wort für Flusspferd ableitet, täuscht darüber hinweg, dass sein Verhalten weitaus unbeständiger ist als das eines Pferdes. Tagsüber bleibt es in Flüssen oder Sümpfen untergetaucht und taucht nur gelegentlich zum Atmen auf, während es nachts allein weidet. Obwohl das Flusspferd ein Pflanzenfresser ist, gehört es zu den gefährlichsten Tieren Afrikas und kann, wenn es provoziert wird, erstaunlich schnell und aggressiv werden."
 dubois.131.g: "Ein Leviathan der Untiefen."
 dubois.132.t: "Der Afrikanische Löwe kommt an"
 dubois.132.d: "Eine Kreatur von königlichem Gebaren und altem Ruf hat sich in unsere Obhut begeben: der #O Afrikanische Löwe#! durchstreift nun sein Reich in unseren Gärten."
 dubois.132.f: "Der Löwe (*Panthera leo*) ist eine mächtige Raubkatze, die in den Grasländern und Savannen Afrikas und Teilen Indiens heimisch ist. Anders als die meisten Katzen sind Löwen gesellige Tiere, die in komplexen Familienverbänden, den Rudeln, leben. Die prächtige Mähne des Männchens dient sowohl als Zierde als auch als Schutz. Seit jeher wird der Löwe in der Heraldik, in der Bildhauerei und in Versen verehrt und gilt als starkes Symbol für Souveränität, Mut und Herrschaft. Doch hinter dem Mythos verbirgt sich ein furchterregendes Raubtier, dessen Kooperation bei der Jagd seine rohe individuelle Stärke verdeckt."
 dubois.132.g: "Die souveräne Bestie."
 dubois.133.t: "Der Afrikanische Elefant kommt an"
 dubois.133.d: "Das größte Landtier der Erde ist da: Heute begrüßen wir den #O Afrikanischen Elefanten#! in seinem speziell eingerichteten Lebensraum."
 dubois.133.f: "Der Afrikanische Elefant (*Loxodonta africana*) ist ein kolossaler Pflanzenfresser, der für seine Intelligenz, sein Gedächtnis und seine matriarchalische Gesellschaft bekannt ist. Seine riesigen Ohren dienen der Wärmeregulierung, während sein Rüssel - eine außergewöhnliche Verschmelzung von Nase und Oberlippe - taktilen, olfaktorischen und manipulativen Zwecken dient. Elefanten sind dafür bekannt, dass sie um ihre Toten trauern und komplexe soziale Verhaltensweisen an den Tag legen. Einst Herrscher über weite Ebenen, sind sie heute Symbole für Größe und Zerbrechlichkeit in einer sich verändernden Welt."
 dubois.133.g: "Ein Musterbeispiel an Gedächtnis und Kraft."
 dubois.134.t: "Die Giraffe kommt an"
 dubois.134.d: "Die alles überragende #O Giraffe#! hat nun ihren Platz in unseren zoologischen Gärten eingenommen."
 dubois.134.f: "Die Giraffe (*Giraffa camelopardalis*) ist das größte lebende Landtier und leicht an ihrem langgestreckten Hals und ihrem gefleckten Fell zu erkennen. Sie ist in afrikanischen Savannen und Wäldern beheimatet und ernährt sich von Akazienblättern in für andere Pflanzenfresser unerreichbarer Höhe. Trotz ihrer schlaksigen Erscheinung bewegt sich die Giraffe mit überraschender Anmut und Geschwindigkeit. Das Tier fasziniert die Menschen seit langem - ein beständiges Sinnbild für Eleganz und außergewöhnliches Design."
 dubois.134.g: "Ein Hals über den Rest."
 dubois.135.t: "Der Brillenpinguin kommt an"
 dubois.135.d: "Ein unerwarteter Gast aus südlichen Meeren watschelt in unsere Sammlung: der #O Brillenpinguin#! ist jetzt zu sehen."
 dubois.135.f: "Der Brillenpinguin (*Spheniscus demersus*) ist die einzige Pinguinart, die auf dem afrikanischen Kontinent brütet. Er zeichnet sich durch seine schwarze Gesichtsmaske und die rosafarbenen Augenflecken aus und ist ein Verfolgungstaucher, der sich von Fischen und Tintenfischen ernährt. Da er an ein gemäßigtes Klima angepasst ist, gedeiht er auch in küstennahen Gebieten, ohne dass er auf kalte Bedingungen angewiesen ist. Hinter seinem komischen Gang verbirgt sich ein Vogel mit bemerkenswerter Beweglichkeit und Ausdauer auf See - ein Dauerbrenner bei Besuchern und Naturforschern gleichermaßen."
 dubois.135.g: "Ein formell gekleideter Seevogel."
 dubois.136.t: "Der Nacktmull kommt an"
 dubois.136.d: "Eine einzigartige Kuriosität der Natur gräbt sich jetzt unter unseren Blicken ein: der #O Nacktmull#! ist da."
 dubois.136.f: "Der Nacktmull (*Heterocephalus glaber*) ist ein außergewöhnliches Nagetier, das an das unterirdische Leben in den Böden Ostafrikas angepasst ist. Er ist fast unbehaart und kaltblütig. Er ist der einzige Thermokonformer unter den Säugetieren und eines der wenigen eusozialen Säugetiere, dessen Kolonien von einer brütenden Königin und ihren Gefährtinnen regiert werden. Diese bescheidene Kreatur, die besonders widerstandsfähig gegen Krebs ist und nahezu anoxische Bedingungen ertragen kann, ist zu einem Gegenstand intensiver wissenschaftlicher Untersuchungen geworden, insbesondere im Bereich der Langlebigkeit und der Zellreparatur."
 dubois.136.g: "Ein Wunderwerk der Biologie, wenn nicht gar der Schönheit."
 dubois.137.t: "Das Steppenzebra kommt an"
 dubois.137.d: "Der gestreifte Bewohner der offenen Ebenen Afrikas hat sich unserer Sammlung angeschlossen: Sehen sie das #O Steppenzebra#! in seinem neuen Zuhause."
 dubois.137.f: "Das Zebra (*Equus quagga*) ist eine ausschließlich in Afrika beheimatete Gattung wilder Einhufer. Zebras sind vor allem für ihre schwarz-weiße Streifung bekannt und leben in Savannen, Grasland und sogar in Bergregionen. Der evolutionäre Zweck ihres einzigartigen Fells bleibt umstritten - er reicht von Tarnung und Verwirrung von Raubtieren bis hin zur Thermoregulation und Abschreckung von stechenden Insekten. Als Herdentiere mit scharfem Sehvermögen und scharfen Hufen sind Zebras sowohl anmutig als auch äußerst wachsam."
 dubois.137.g: "Ordnung in Streifen."
 dubois.141.t: "Der Große Panda kommt an"
 dubois.141.d: "Ein einzigartiges Wahrzeichen des Ostens ziert nun unsere Gärten: der #O Große Panda#! hat sich in seinem eigens errichteten Gehege niedergelassen."
 dubois.141.f: "Der Große Panda (*Ailuropoda melanoleuca*) ist ein Bär, der in den gemäßigten Bergwäldern Zentralchinas beheimatet ist. Er zeichnet sich durch sein auffälliges schwarz-weißes Fell und seinen schwerfälligen Gang aus. Unter den Ursids en zu ist er einzigartig, weil er sich hauptsächlich von Pflanzen ernährt - fast ausschließlich von Bambus. Obwohl er zur Ordnung der Fleischfresser (Carnivora) gehört, ist sein Verdauungssystem nur schlecht an die gewählte Nahrung angepasst, so dass er ständig gefüttert werden muss. Der Panda ist von Natur aus ein Einzelgänger, der in einem bestimmten Gebiet umherstreift und außerhalb der kurzen Paarungszeit nur selten mit anderen Tieren in Kontakt kommt. Einst war er für westliche Naturforscher eine fast mythische Kreatur, heute ist er eine lebende Ikone des Naturschutzes."
 dubois.141.g: "Der Botschafter von China."
 dubois.142.t: "Der Borneo-Orang-Utan kommt an"
 dubois.142.d: "Heute begrüßen wir eine Kreatur von großem Intellekt und Baumgrazie: der #O Borneo-Orang-Utan#! hat sich in seiner Baumkronen-Oase niedergelassen."
 dubois.142.f: "Der Borneo-Orang-Utan (*Pongo pygmaeus*) ist ein großer Menschenaffe, der in den Regenwäldern von Borneo und Sumatra beheimatet ist. Er ist bekannt für seine verlängerten Arme und sein rotbraunes Fell. Er ist der baumlebendigste aller Menschenaffen und baut seine nächtlichen Nester auf Ästen hoch in den Baumkronen. Die Männchen haben große Gesichtsränder und stoßen laute Rufe aus, um ihre Anwesenheit zu verdeutlichen. Als einsame und kontemplative Spezies beschränken sich die sozialen Bindungen in der Regel auf die mütterliche Fürsorge. Orang-Utans verfügen über außergewöhnliche Problemlösungsfähigkeiten, Werkzeuggebrauch und Gedächtnis und gelten als die intelligentesten nicht-menschlichen Tiere."
 dubois.142.g: "Ein Gelehrter der Zweige."
 dubois.143.t: "Der bengalische Tiger kommt an"
 dubois.143.d: "Ein König der Wälder und Wiesen ist endlich da: der #O Bengalische Tiger#! regiert jetzt in seinem stattlichen Gehege."
 dubois.143.f: "Der Bengalische Tiger (*Panthera tigris tigris*) ist ein furchterregendes Raubtier, das auf dem indischen Subkontinent beheimatet ist. Mit seinem leuchtenden, von kräftigen schwarzen Streifen geprägten Fell gehört er zu den größten und auffälligsten Raubkatzen der Welt. Der Tiger bevorzugt das Einzelgängerdasein und jagt heimlich und kraftvoll, wobei er seine Beute oft mit tödlicher Präzision aus dem Hinterhalt angreift. Sein Revier umfasst Wälder, Sümpfe und Grasland, überall dort, wo große Huftiere zu finden sind. Der Tiger hat seit langem die Phantasie von Dichtern, Prinzen und Jägern gleichermaßen beflügelt - ein beständiges Symbol für Majestät und Wildheit."
 dubois.143.g: "Ein wahrer ungekrönter König."
 dubois.144.t: "Der Schabrackentapir kommt an"
 dubois.144.d: "Der #O Schabrackentapir#! mit seiner einzigartigen Form und seinen seltsamen Gewohnheiten gehört jetzt zu unserer Sammlung exotischer Tiere."
 dubois.144.f: "Der Schabrackentapir (*Tapirus indicus*) ist der größte und auffälligste Tapir und der einzige Vertreter seiner Gattung, der außerhalb Amerikas vorkommt. Seine Färbung - ein starker Schwarz-Weiß-Kontrast - dient als störende Tarnung im gedämpften Licht der tropischen Wälder Südostasiens. Da er schlecht sieht, aber gut hört und riecht, ist er ein heimlicher Nachtschwärmer. Obwohl sein eigenartiges Aussehen die frühen Zoologen verwirrte, wird er heute als Relikt eines alten Stammbaums geschätzt."
 dubois.144.g: "Der Illusionist der Natur."
 dubois.145.t: "Der Komodowaran kommt an"
 dubois.145.d: "Ein echsenartiger Schrecken von den fernen Inseln streift jetzt durch unser Gelände: der #O Komodowaran#! wurde sicher in seinem Lebensraum untergebracht."
 dubois.145.f: "Der Komodowaran (*Varanus komodoensis*) ist die größte lebende Echse der Welt und auf mehreren indonesischen Inseln beheimatet. Dieses Spitzenraubtier kann eine Länge von bis zu drei Metern erreichen und verfügt über einen kräftigen Schwanz, gezackte Zähne und Giftdrüsen, die seine Beute überwältigen. Als geschickter Jäger aus dem Hinterhalt verzehrt er Aas ebenso bereitwillig wie er lebende Beute überwältigt. Sein furchterregender Ruf und seine späte Entdeckung durch die westliche Wissenschaft im Jahr 1910 verliehen ihm eine Aura des Mythischen. Auch heute noch ist er ein mächtiges Symbol für ursprüngliche Stärke."
 dubois.145.g: "Ein Echo aus dem Zeitalter der Reptilien."
 dubois.146.t: "Der Schneeleopard kommt an"
 dubois.146.d: "Der schwer fassbare #O Schneeleopard#! ist vom Dach der Welt herabgestiegen und hat sich unserer Sammlung angeschlossen."
 dubois.146.f: "Der Schneeleopard (*Panthera uncia*), auch als Unze bekannt, bewohnt die kalten Hochebenen Zentral- und Südasiens. Er ist in ein rauchfarbenes Fell gehüllt, hat ein dickes Fell, kräftige Gliedmaßen und einen langen, ausbalancierten Schwanz und ist hervorragend an das bergige Terrain angepasst. Lautlos und selten zu sehen, durchstreift er die Alpenpässe auf der Suche nach wilden Schafen und Ziegen. Im Gegensatz zu anderen Großkatzen kann er nicht brüllen, sondern kommuniziert mit einem Repertoire aus Zischen, Knurren und klagendem Miauen. Der Schneeleopard wird in der zentralasiatischen Folklore seit langem verehrt und ist in der Natur wie in der Kultur eine geisterhafte Erscheinung."
 dubois.146.g: "Der Geist der Berge."
 dubois.147.t: "Der asiatische Gepard kommt an"
 dubois.147.d: "Flink wie der Wüstenwind ist der seltene #O Asiatische Gepard#! angekommen, um unsere Besucher zu verblüffen und aufzuklären."
 dubois.147.f: "Der asiatische Gepard (*Acinonyx jubatus venaticus*) ist eine vom Aussterben bedrohte Unterart des Gepards, die früher im gesamten Nahen Osten und in Indien verbreitet war. Er zeichnet sich durch sein helleres Fell und seinen schlankeren Körperbau aus und ist nach wie vor das schnellste Landsäugetier der Erde - fähig zu explosiven Sprints, die eine enorme innere Hitze erzeugen. Seine historische Verbindung zum indischen Adel, der ihn für die Jagd abrichtete, hat ihn zu einem Symbol für Anmut und Niedergang gemacht. Der asiatische Gepard, der heute nur noch eine schwache Population im Iran hat, ist ein lebendes Denkmal für verschwundene Arten."
 dubois.147.g: "Entschwindende Geschwindigkeit."
 dubois.148.t: "Der Rote Panda kommt an"
 dubois.148.d: "Eine seltene und zurückhaltende Kreatur aus dem nebligen Himalaya ist aufgetaucht: der #O Rote Panda#! ziert jetzt unsere Bäume."
 dubois.148.f: "Der Rote Panda (*Ailurus fulgens*) ist ein baumbewohnendes Säugetier, das in den gemäßigten Wäldern des östlichen Himalaya und im Südwesten Chinas beheimatet ist. Obwohl er seinen Namen mit dem Großen Panda teilt, gehört er zu seiner eigenen Familie. Der Rote Panda, der für sein rostrotes Fell, seinen Ringelschwanz und sein liebenswertes Gesicht bekannt ist, ist ein nachtaktiver und dämmerungsaktiver Fresser, der sich hauptsächlich von Bambus ernährt. Er ist hitzeempfindlich und von Natur aus ein Einzelgänger und verbringt seine Tage schlafend in luftiger Höhe, den Schwanz schützend über die Nase gewickelt. Er ist ein seltenes Juwel der Baumkronen und wird geschätzt, ist aber dennoch bedroht."
 dubois.148.g: "Schwer fassbar und exquisit."
 dubois.151.t: "Die Grüne Meeresschildkröte kommt an"
 dubois.151.d: "Eine altehrwürdige Meeresbewohnerin hat einen sicheren Hafen gefunden: die #O Grüne Meeresschildkröte#! wohnt jetzt in unserem Wasserpavillon."
 dubois.151.f: "Die Grüne Meeresschildkröte (*Chelonia mydas*) ist ein großes Meeresreptil, das für seine ausgedehnten Wanderungen zwischen Futterplätzen und Niststränden bekannt ist. Ihr stromlinienförmiger, tropfenförmiger Panzer und ihre breiten, flossenartigen Gliedmaßen machen sie zu einem geschickten Schwimmer. Ihre Färbung ist typischerweise olivfarben bis schwarz, variiert aber je nach Region. Erwachsene Schildkröten ernähren sich fast ausschließlich von Seegras und gestalten durch Abweiden ganze Unterwasserwiesen. Die langlebige, geduldige und rätselhafte Grüne Schildkröte ist seit Jahrhunderten ein Begleiter der Seefahrer und ein Symbol für Ausdauer."
 dubois.151.g: "Uralt und beständig."
 dubois.152.t: "Der Riesenmanta kommt an"
 dubois.152.d: "Ein riesiger, schweigsamer Leviathan hat sich unter der Wasseroberfläche niedergelassen: der #O Riesenmanta#! gleitet jetzt in unserem großen Salzwasserbecken."
 dubois.152.f: "Der Riesenmanta (*Mobula birostris*) ist der größte unter den Rochen und erreicht eine Flügelspannweite von bis zu 7 Metern und mehr. Diese sanftmütigen Filtrierer, die in tropischen und subtropischen Meeren leben, gleiten mit einer Anmut durch den Ozean, die ihre Größe nicht vermuten lässt. Da sie nur wenige natürliche Feinde haben, ist der Mensch ihre einzige wirkliche Bedrohung. Ihre Haut ist glatt und mit unverwechselbaren Mustern versehen, so dass jedes Individuum eindeutig identifizierbar ist. Der Mantarochen gilt als eine der majestätischsten Kreaturen des Ozeans und ruft seit langem Ehrfurcht bei Seefahrern und Naturforschern gleichermaßen hervor."
 dubois.152.g: "Ein Phantom mit Flügeln."
 dubois.153.t: "Das Rote Riesenkänguru kommt an"
 dubois.153.d: "Aus den sonnenverbrannten Ebenen Australiens kommt unser neuester Gast: das #O Rote Riesenkänguru#! hat seinen ersten Sprung in Gefangenschaft gemacht."
 dubois.153.f: "Das Rote Riesenkänguru (*Osphranter rufus*) ist das größte lebende Beuteltier und ein starkes Symbol für das australische Outback. Die Männchen, die als \"Big Reds\" bekannt sind, sind besonders imposant und können im Stehen eine Gesamtlänge von über 2,4 Metern erreichen. Ihre kräftigen Hinterbeine und elastischen Sehnen ermöglichen es ihnen, große Entfernungen mit einer Geschwindigkeit von bis zu 60 km/h zurückzulegen. Das Rote Känguru ist ein wahres Wunderwerk der Evolution. Es ist in einzigartiger Weise an seine raue und trockene Heimat angepasst und vereint Anmut, Ausdauer und rohe Athletik."
 dubois.153.g: "Entsprungen von einem Kontinent der Extreme."
 dubois.154.t: "Der Koala kommt an"
 dubois.154.d: "Mit schläfriger Beharrlichkeit klammert sich der #O Koala#! an seine Sitzstange und schlummert nun zufrieden in unserem Eukalyptushain."
 dubois.154.f: "Der Koala (*Phascolarctos cinereus*) ist ein Beuteltier von einzigartigem Charakter, das für seine sesshafte Lebensweise und seine Abhängigkeit von Eukalyptusblättern bekannt ist. Mit seinem gedrungenen Körper, den markanten Ohren und der löffelförmigen Nase ist es sofort erkennbar und sehr beliebt. Trotz seines knuddeligen Aussehens ist der Koala sehr wählerisch bei seiner Ernährung und von Natur aus territorial. Er verbringt bis zu 20 Stunden am Tag schlafend, um Energie zu sparen, und ist eher nachdenklich als gesellig - ein Einsiedler in einer Baumhöhle, der gut zu seiner nährstoffarmen Nahrungsquelle passt."
 dubois.154.g: "Die schlafende Schönheit des australischen Busches."
 dubois.155.t: "Das Schnabeltier kommt an"
 dubois.155.d: "Das Rätsel eines Naturforschers und die Neugier eines Schuljungen gleichermaßen: Heute wird das #O Schnabeltier#! der Öffentlichkeit vorgestellt."
 dubois.155.f: "Das Schnabeltier (*Ornithorhynchus anatinus*) ist ein in Ostaustralien und Tasmanien beheimatetes Monotrem. Das eierlegende Säugetier mit einem entenartigen Schnabel, Schwimmfüßen und einem biberähnlichen Schwanz verwirrte die europäischen Wissenschaftler des 18. Jahrhunderts, die zunächst eine Fälschung vermuteten. Die Männchen haben giftige Sporne an den Hinterbeinen, und alle Schnabeltiere besitzen Elektrorezeptoren im Schnabel, mit denen sie Beute in trüben Gewässern aufspüren können. Ihre evolutionäre Abstammung unterscheidet sich so stark von der anderer Säugetiere, dass sie immer wieder für Faszination sorgen und die Grenze zwischen dem Vertrauten und dem Unglaubwürdigen überschreiten."
 dubois.155.g: "Ein Beweis dafür, dass die Natur keine Widersprüche fürchtet."
 dubois.156.t: "Der Helmkasuar kommt an"
 dubois.156.d: "Aus dem Schatten des Regenwaldes tritt ein rätselhafter Vogel von nicht geringem Ruf: der #O Helmkasuar#! patrouilliert jetzt auf seiner bewaldeten Koppel."
 dubois.156.f: "Der Helmkasuar (*Casuarius casuarius*) ist ein flugunfähiger Vogel von großer Statur und furchterregendem Temperament, der in den tropischen Wäldern Nordaustraliens und Neuguineas lebt. Der Kasuar zeichnet sich durch seine große Kappe, seine leuchtend blaue Haut und seine dolchartigen Krallen aus. Er ernährt sich frugivor, aber nicht von seiner Veranlagung her. Obwohl er in freier Wildbahn scheu ist, kann er bei Provokation gefährlich aggressiv werden. Die Funktion des Kasacks bleibt umstritten - sie reicht von der sexuellen Zurschaustellung über akustische Resonanz bis hin zum Schutz des Kopfes im dichten Gebüsch. Sie ist sowohl Relikt als auch Rätsel einer längst vergangenen Vogelwelt."
 dubois.156.g: "Am besten mit Respekt beobachten."
 dubois.157.t: "Der neuseeländische Seelöwe kommt an"
 dubois.157.d: "Ein treuer Vertreter der subantarktischen Küsten hat sich unserer Meeresausstellung angeschlossen: der #O Neuseeländische Seelöwe#! ruht jetzt auf den Felsen."
 dubois.157.f: "Der Neuseeländische Seelöwe (*Phocarctos hookeri*) gehört zu den seltensten und am stärksten lokal begrenzten Robben der Welt. Die Männchen - imposant und dunkelhäutig - können bis zu 2,45 Meter lang werden, während die kleineren Weibchen gelbbraun und zierlicher sind. Durch die Robbenjagd im 19. Jahrhundert fast ausgerottet, erholen sich ihre Kolonien heute unter Schutz, insbesondere auf den abgelegenen Auckland-Inseln. Der Seelöwe ist eine gesellige Küstenart, die durch ihren kräftigen Körperbau, ihre ausdrucksstarken Gesichter und ihre familiären Bindungen zu einem Objekt von bleibendem Reiz und wissenschaftlichem Interesse geworden ist."
 dubois.157.g: "Einst gejagt, jetzt geheiligt."
 dubois.200.t: "Einweihung des Naturkundemuseums"
 dubois.200.d: "Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] hat das Naturkundemuseum, das der Förderung der Naturphilosophie und der Evolutionsforschung gewidmet ist, feierlich eingeweiht."
 dubois.200.f: "Als Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] die Eröffnung des ersten Naturkundemuseums unserer Nation ankündigte, erinnerten sich nur wenige an die beträchtlichen Anstrengungen, die nötig waren, um diese Einrichtung zu verwirklichen. Das Nationalmuseum, das bis dahin für die Naturgeschichte zuständig war, hatte sich gegen die Abtrennung gewehrt, da es die Naturgeschichte für eine untergeordnete Aufgabe hielt. Dank der Beharrlichkeit und des Einflusses von Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] setzte sich das Projekt durch. Das neue Museum verspricht, die paläontologische Forschung voranzutreiben, und die Öffentlichkeit zeigt bereits reges Interesse an den Geheimnissen ausgestorbener Arten und den Ursprüngen der Menschheit. Einst als bloßes Anhängsel der Geologie betrachtet, ist die Paläontologie heute eine anerkannte Disziplin, die mit ihren eigenen Institutionen zu den führenden Wissenschaften unserer Zeit gehört."
 dubois.200.g: "Eine höchst erbauliche Einrichtung!"
 dubois_natural_history_museum_modifier: "Naturkundemuseum"
 dubois.201.t: "Paläontologisches Expeditionsziel"
 dubois.201.f: "Ein [concept_dubois_paleontologist] kann zu geologischen Formationen entsandt werden, wo jährliche Ausgrabungen Fossilien zutage fördern. Große Formationen können auch Dinosaurierknochen enthalten, je nach Kontinent unterschiedlich. Der direkteste Zugang erfolgt über die souveräne Kontrolle des Territoriums, obwohl wissenschaftliche Lizenzen durch diplomatische Absprachen erworben werden können."
 dubois.201.g: "Vielleicht ein anderes Mal."
 dubois.202.t: "Fossile Haifischzähne"
 dubois.202.d: "Eine paläontologische Untersuchung hat eine Sammlung versteinerter Haifischzähne hervorgebracht, Relikte aus alten Meeren."
 dubois.202.f: "Versteinerte Haifischzähne, oft die einzigen Überreste dieser verschwundenen Kreaturen, gehören zu den häufigsten Fossilien überhaupt, da die Zähne der lebenden Haie ständig ersetzt werden. Bereits 1616 wies Fabio Colonna in seiner Abhandlung De Glossopetris Dissertatio nach, dass die so genannten \"Viperzungen\" in Wirklichkeit Haifischzähne waren. Die Gattung Squalicorax pristodontus mit ihren flachen, gezackten Zähnen blühte in der Kreidezeit auf und war weltweit verbreitet. Solche Zähne wurden aus mesozoischen Schichten in ganz Amerika, Afrika, Asien und Europa geborgen und sind stumme Zeugen der Antike und der Allgegenwärtigkeit dieser gewaltigen Raubtiere."
 dubois.202.g: "Eine schöne Ergänzung der Sammlung."
 dubois.203.t: "Dinosaurier-Fußabdrücke?"
 dubois.203.d: "[SCOPE.sCharacter('pb_leader').GetFullName] äußert sich skeptisch über eine neue Entdeckung von Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]."
 dubois.203.f: "Nach der Bekanntgabe eines neuen Fundes in einer geologischen Formation kam der Anführer des Kleinbürgertums, um die angeblichen Dinosaurierfußabdrücke zu begutachten. Mit wenig Verständnis für die Beweise tat [SCOPE.sCharacter('pb_leader').GetFullName] die Abdrücke als unscheinbar ab. Diese spießbürgerliche Haltung provozierte einen heftigen Streit mit dem Professor, der eine sofortige Entschuldigung verlangte. Der Streit eskalierte bald und spaltete die Anhänger von [SCOPE.sCharacter('pb_leader').GetLastName] und den akademischen Kreis von Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]."
 dubois.203.g: "Dies sind unverkennbar Dinosaurierspuren."
 dubois.203.h: "Die Beweise sind nach wie vor nicht schlüssig."
 dubois.204.t: "Paläosinopa"
 dubois.204.d: "Ein Team von Wissenschaftlern hat das Skelett eines frühen Säugetiers entdeckt, das in einem bemerkenswerten Zustand erhalten ist."
 dubois.204.f: "Palaeosinopa, eine Gattung der heute ausgestorbenen Pantolestidae, hatte ihre Blütezeit vom oberen Paläozän bis zum unteren Eozän, vor etwa 59 bis 48 Millionen Jahren. Fossile Funde, vor allem aus Nordamerika und gelegentlich aus Europa, zeigen einen robusten Körperbau und einen verlängerten Schwanz mit kürzeren Vorder- und längeren Hinterbeinen. Diese Morphologie deutet auf eine halb-aquatische Lebensweise hin, ähnlich wie beim modernen Otter, während die Zahnstruktur auf eine Ernährung mit tierischen Stoffen hindeutet. Die fossilen Schichten der Green-River- und der Willwood-Formation sind besonders reich an Exemplaren und bieten wertvolle Einblicke in die Evolutionsgeschichte der frühen Säugetiere."
 dubois.204.g: "Ein äußerst lehrreiches Exemplar."
 dubois.204.h: "Ein passendes Andenken für einen Kollegen."
 dubois.205.t: "Knochenfund im Minenschacht"
 dubois.205.d: "Bergleute in [SCOPE.sState('dubois_excavation_state').GetName] haben die Knochen einer prähistorischen Spezies ausgegraben. Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] wurde gerufen, um die Sache zu untersuchen."
 dubois.205.f: "Die Entdeckung der Knochen in der Mine löste gemischte Reaktionen aus. Während der Paläontologe mit einer wissenschaftlichen Ausgrabung beginnen wollte, befürchtete die Minenleitung eine Unterbrechung des Betriebs. Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] stellte fest, dass eine ordnungsgemäße Ausgrabung eine vorübergehende Einstellung des Bergbaus erforderlich machen würde, was zu Protesten der Industriellen führte. Der Fund wird so zu einer Angelegenheit von öffentlichem Interesse, und die Intelligenz setzt sich für eine wissenschaftliche Untersuchung ein. Einige schlagen einen Kompromiss vor, nämlich eine reine Dokumentation ohne Ausgrabung, um die Industrie nicht zu behindern, was jedoch eine direkte Bergung der Fossilien ausschließen würde."
 dubois.205.g: "Die Fossilien müssen für die Wissenschaft gesichert werden."
 dubois.205.h: "Lassen Sie nur eine flüchtige Prüfung zu."
 dubois.205.i: "Lassen Sie die Bergleute ungestört arbeiten."
 dubois.206.t: "Composita"
 dubois.206.d: "Dieses Jahr haben [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] unter der Leitung von Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] an der Ausgrabungsstätte in [SCOPE.sState('dubois_excavation_state').GetName] schöne Exemplare von Composita geborgen."
 dubois.206.f: "Composita, eine ausgestorbene Gattung der Brachiopoden, war vom späten Devon bis zum späten Perm verbreitet und hatte eine kosmopolitische Verbreitung. Die glatte Schale, die ausgeprägte Falte und der Sulcus sowie die runde Stielöffnung sind charakteristische Merkmale. Composita gehört zur Familie der Athyrididae, Unterfamilie Spirigerellinae. Diese Fossilien, die auf allen Kontinenten mit Ausnahme der Antarktis gefunden wurden, werden von Naturforschern wegen ihres Altertums und ihres lehrreichen Wertes geschätzt, der weit über die bloße Kuriosität einer Muschel hinausgeht."
 dubois.206.g: "Eine würdige Ergänzung für unser Kabinett."
 dubois.207.t: "Trilobit"
 dubois.207.d: "Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] hat ein beispielhaftes Trilobiten-Exemplar für die paläontologische Sammlung zur Verfügung gestellt. Es wird auf ein Alter von 400 Millionen Jahren geschätzt und ist von großem wissenschaftlichem Wert."
 dubois.207.f: "Trilobiten, eine ausgestorbene Klasse mariner Arthropoden, existierten während des gesamten Paläozoikums, vom Kambrium bis zum Perm. Ihre mit Kalzit verstärkten Exoskelette sind häufig erhalten und ermöglichen die Rekonstruktion ihrer evolutionären Vielfalt. Mit neun Ordnungen, über 150 Familien, 5000 Gattungen und mehr als 15 000 beschriebenen Arten dienen Trilobiten als wichtige Leitfossilien für das Paläozoikum und sind für geologische und paläontologische Studien unverzichtbar."
 dubois.207.g: "Unser Dank gilt dem Professor."
 dubois.208.t: "Ammoniten"
 dubois.208.d: "Die in [SCOPE.sState('dubois_excavation_state').GetName] entdeckten Ammoniten bereichern die paläontologischen Bestände unseres Landes weiter."
 dubois.208.f: "Ammoniten (Ammonoidea), eine ausgestorbene Ordnung der Kopffüßer, waren mit über 1500 Gattungen und vielleicht 30.000 bis 40.000 Arten außerordentlich vielfältig. Ihre Schalen, die in der Regel einen Durchmesser von 1 bis 30 cm haben, finden sich in Meeressedimenten vom Devon bis zur Kreide-Paleogen-Grenze. Ammoniten sind unschätzbare Leitfossilien, die bei der chronologischen Einordnung von Schichten helfen. Der Name \"Ammonis cornua\" (Ammons Hörner) geht auf die Antike zurück, und ihre Erforschung steht nach wie vor im Mittelpunkt der viktorianischen Geologie und Paläontologie."
 dubois.208.g: "Reservieren Sie eins für das Museum."
 dubois.209.t: "Versteinerte Flora"
 dubois.209.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] haben versteinerte Pflanzen aus einem Steinbruch geborgen, die sehr alt sind."
 dubois.209.f: "In der Karbonzeit (vor ca. 360-300 Millionen Jahren) bildeten riesige Wälder aus Farnen, Schachtelhalmen und Bärlappgewächsen die Grundlage für die heutigen Kohlelagerstätten. Die frühesten fossilen Farne stammen aus dem Unterdevon (vor etwa 400 Millionen Jahren), also noch vor dem Auftreten von Samenpflanzen. Diese alte Flora ist für Naturphilosophen von großem Interesse, da sie Aufschluss über die Ursprünge der terrestrischen Vegetation und die geologischen Prozesse gibt, die das Industriezeitalter geprägt haben."
 dubois.209.g: "Die Wurzel von Industrie und Fortschritt."
 dubois.210.t: "Dinosaurier-Eier"
 dubois.210.d: "Objekte, die einst für Steine gehalten wurden, entpuppten sich bei näherer Betrachtung als versteinerte Eier - mit ziemlicher Sicherheit von einer Dinosaurierart."
 dubois.210.f: "Die ersten wissenschaftlich dokumentierten Fossilien von Dinosauriereiern wurden 1859 in Südfrankreich entdeckt, obwohl sie zunächst Riesenvögeln zugeschrieben wurden. Im Jahr 1923 entdeckte eine Expedition des American Museum of Natural History in der Mongolei Eier, von denen heute bekannt ist, dass sie zu Oviraptor und nicht, wie zunächst angenommen, zu Protoceratops gehören. Die Häufung solcher Funde hat zu konkurrierenden Klassifizierungsschemata geführt, und die Untersuchung von Dinosauriereiern ist nach wie vor Gegenstand lebhafter viktorianischer Debatten."
 dubois.210.g: "Lassen Sie uns diese mit äußerster Sorgfalt behandeln."
 dubois.211.t: "Dinosaurier-Ausgrabung"
 dubois.211.d: "Bei der Erforschung einer großen Formation hat Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] einen bemerkenswerten Fund gemacht: einen Dinosaurierknochen! Der [concept_dubois_paleontologist] organisiert sofort eine umfassende Ausgrabung, in der Hoffnung, weitere Überreste zu finden."
 dubois.211.f: "Die Kombination solcher Merkmale - einige davon sind einzigartig unter den Reptilien, andere sind von heute getrennten Gruppen entlehnt -, die von Kreaturen gezeigt werden, die die größten lebenden Reptilien an Größe weit übertreffen, wird vermutlich als ausreichender Grund für die Einrichtung eines eigenen Stammes oder einer Unterordnung der Saurierreptilien angesehen, für die ich den Namen Dinosauria vorschlage. -Richard Owen"
 dubois.211.g: "Lasst die Ausgrabung beginnen!"
 dubois.213.t: "Fossile Fragmente"
 dubois.213.d: "An der Dinosaurier-Ausgrabungsstätte haben Wissenschaftler kleinere Fossilienstücke geborgen."
 dubois.213.f: "\"Es mag nicht der Preis sein, den wir gesucht haben, aber jedes Fragment trägt zu unserem Verständnis bei.\" -[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 dubois.213.g: "Sammelt die Fossilien!"
 dubois.214.t: "Dinosaurierknochen"
 dubois.214.d: "Das Team von Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] hat an der Ausgrabungsstätte einen neuen Dinosaurierknochen entdeckt."
 dubois.214.f: "\"Beim Anblick eines einzelnen Knochens, eines einzelnen Knochenstücks erkenne und rekonstruiere ich den Teil des Ganzen, aus dem es entnommen worden wäre. Das ganze Wesen, zu dem dieses Fragment gehörte, erscheint vor meinem geistigen Auge. -Georges Cuvier"
 dubois.214.g: "Fügen Sie ihn der Sammlung hinzu."
 dubois.215.t: "Dinosaurierschädel"
 dubois.215.d: "Bei Ausgrabungen wurde ein prächtiger Dinosaurierschädel gefunden."
 dubois.215.f: "Der Kopf war so lang oder länger als der eines ausgewachsenen Grizzlybären, und die Kiefer waren im Verhältnis zu ihrer Länge tiefer. Die Schnauze war kürzer und tiefer als die eines Bulldogs. Die Zähne waren allesamt scharfe, zylindrische Reißzähne, glatt und glänzend, und von unregelmäßiger Größe. In jedem Kiefer ragten sie in einem bestimmten Abstand drei Zoll über das Zahnfleisch hinaus und waren einen Zoll in den Kieferrand versenkt, so dass sie so lang wie die Reißzähne eines Tigers, aber schlanker waren. Zwei solcher Reißzähne kreuzten sich auf jeder Seite der Mitte des Vorderkiefers. Neben den kleineren Fischen deckten die Reptilien zweifellos den Bedarf seines Appetits. -Edward Drinker Cope"
 dubois.215.g: "Ein spektakulärer Fund!"
 dubois.216.t: "Dinosaurierskelett"
 dubois.216.d: "Nach monatelanger sorgfältiger Arbeit hat Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] ein beeindruckendes Dinosaurierskelett freigelegt, von dem mehrere Knochen in hervorragendem Zustand sind."
 dubois.216.f: "Das Skelett selbst war im Museum der Akademie der Wissenschaften in Philadelphia entsprechend dieser Restaurierung arrangiert, und als Professor Cope es mir zeigte und seine Besonderheiten erläuterte, bemerkte ich, dass die Gelenke der Wirbel vertauscht waren, und wies ihn sanft darauf hin, dass er das ganze Ding mit dem falschen Ende vor sich hatte. Seine Entrüstung war groß, und er behauptete mit Nachdruck, er habe das Tier viele Monate lang studiert und müsse zumindest ein Ende vom anderen unterscheiden können. -Othniel Charles Marsh"
 dubois.216.g: "Faszinierend."
 dubois.220.t: "Ausgrabung abgeschlossen"
 dubois.220.d: "Die [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] haben ihre Ausgrabungen am Dinosaurierstandort abgeschlossen. Eine wichtige wissenschaftliche Untersuchung geht zu Ende."
 dubois.220.f: "\"Der Fossilienjäger muss zuallererst ein wissenschaftlicher Enthusiast sein. Er muss bereit sein, alle Arten von Strapazen zu ertragen, Kälte im frühen Frühling und in den späten Herbst- und frühen Wintermonaten zu ertragen, starke Hitze und das grelle Sonnenlicht in den Sommermonaten zu ertragen, und er muss bereit sein, alkalisches Wasser zu trinken , und in einigen Regionen zur Abwehr des Befalls durch Mücken und andere Schädlinge. Er muss so etwas wie ein Ingenieur sein, um große Steinmassen handhaben und über straßenlose Wüstenöden zum nächsten Verschiffungspunkt transportieren zu können; Er muss über ein feines und geschicktes Gespür verfügen, um bei einem Bruch auch die kleinsten Knochenfragmente zu bewahren. er muss sich mit einem sehr einfachen Leben zufrieden geben, weil der Beruf selten, wenn überhaupt, einträglich ist und er fast ausnahmslos unterbezahlt ist; Er muss seine größte Belohnung und seinen größten Anreiz im Sinne von Entdeckungen und im Versand von Exemplaren an Museen finden, die er noch nie gesehen hat, zum Nutzen einer Öffentlichkeit, die wenig Wissen oder Wertschätzung für die Selbstaufopferung hat, die der Fossilienjäger erbracht hat.\" -Henry Fairfield Osborn"
 dubois.220.g: "Ich erwarte zumindest ein neues Dinosaurierskelett für unsere Sammlung."
 dubois.221.t: "Eusthenopteron"
 dubois.221.d: "Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] hat einen seltenen prähistorischen Fisch entdeckt, der möglicherweise einen entscheidenden Schritt beim Übergang vom aquatischen zum terrestrischen Leben darstellt."
 dubois.221.f: "Eusthenopteron ist eine ausgestorbene Gattung der Lappenflosser (Sarcopterygii) aus dem Oberdevon Nordamerikas und Europas. Sie gilt als ein klassisches Beispiel für die frühen Tetrapodomorpha. Eusthenopteron besaß sowohl Kiemen und eine primitive Lungen-Schwimmblase als auch ein robustes Flossenskelett. Bemerkenswert ist, dass seine Vorderflossen bereits die drei Gliedmaßenknochen von Landwirbeltieren aufweisen: Oberarmknochen, Elle und Speiche. Diese Anpassungen lassen vermuten, dass er sich kurzzeitig außerhalb des Wassers bewegen konnte. Seine beiden Rückenflossen waren weit nach hinten versetzt, Becken- und Afterflossen lagen gegenüber."
 dubois.221.g: "Eine bemerkenswerte evolutionäre Entwicklung."
 dubois.222.t: "Archaeopteryx"
 dubois.222.d: "Bei einer Ausgrabung im bayerischen Kalkstein bei Solnhofen machte Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] eine Entdeckung, die die wissenschaftliche Welt in Erstaunen versetzte: ein Fossil, das möglicherweise eine Brücke zwischen Reptilien und Vögeln schlägt."
 dubois.222.f: "Archaeopteryx ist eines der berühmtesten Übergangsfossilien aus dem Spätjura. Mit gefiederten Flügeln, Zähnen und einem langen knöchernen Schwanz vereint er Merkmale von Vögeln und Reptilien. Seine Entdeckung lieferte überzeugende Beweise für Darwins Evolutionstheorie, die besagt, dass sich Vögel aus kleinen theropoden Dinosauriern entwickelt haben."
 dubois.223.t: "Megatherium"
 dubois.223.d: "Bei einer paläontologischen Untersuchung fand das Team von Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] die Knochen eines Riesenfaultiers."
 dubois.223.f: "Megatherium war eine Gattung riesiger Bodenfaultiere, die bis vor etwa 10.000 Jahren in Südamerika lebten. Diese langsamen Pflanzenfresser, die die Größe von Elefanten erreichten, gestalteten ihre Umwelt, indem sie Bäume entwurzelten und nach Wurzeln gruben. Ihr Aussterben wird mit dem Klimawandel und menschlichen Aktivitäten in Verbindung gebracht."
 dubois.224.t: "Ichthyosaurus"
 dubois.224.d: "Der Leiter der paläontologischen Ausgrabungen berichtet über die Entdeckung eines prähistorischen Reptils, das sowohl einem Fisch als auch einem Delfin ähnelt."
 dubois.224.f: "Ichthyosaurus war ein Meeresreptil aus der Jurazeit, das an das Leben im offenen Ozean angepasst war. Sein stromlinienförmiger Körper, seine lange Schnauze und seine großen Augen machten ihn zu einem effizienten Raubtier. Anders als die meisten Reptilien brachte er lebende Junge zur Welt und ist ein eindrucksvolles Beispiel für eine konvergente Evolution mit modernen Delfinen."
 dubois.225.t: "Smilodon"
 dubois.225.d: "Die naturgeschichtliche Abteilung verkündet stolz einen neuen Fund: Unser Paläontologe hat das Skelett einer Säbelzahnkatze entdeckt."
 dubois.225.f: "Smilodon, oft auch Säbelzahntiger genannt, war im Pleistozän ein furchterregendes Raubtier auf dem amerikanischen Kontinent. Seine verlängerten Eckzähne und sein kräftiger Körperbau machten ihn zu einem erstklassigen Fleischfresser. Fossilien aus Teergruben offenbaren sein Sozialverhalten und dramatische Begegnungen mit anderen eiszeitlichen Megafauna."
 dubois.226.t: "Pterodactylus"
 dubois.226.d: "Die Knochen eines kleinen Flugsauriers haben die wissenschaftliche Gemeinschaft begeistert und wurden bereits an die paläontologische Sammlung geschickt."
 dubois.226.f: "Pterodactylus war einer der frühesten Pterosaurier, fliegende Reptilien aus dem späten Jura. Mit einer Flügelspannweite von bis zu 1,5 Metern schwebte er über Küstenlagunen und jagte Fische und Kleintiere. Seine Entdeckung trug dazu bei, die Vielfalt des prähistorischen Lebens und die Evolution des Fliegens zu belegen."
 dubois.227.t: "Ichthyostega"
 dubois.227.d: "Als der Zeppelin landete, fand die Expedition im Ewigen Eis ein außergewöhnliches Fossil, das die Paläontologie revolutionieren könnte. Es wurde schnell an den führenden Paläontologen des Landes, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], geschickt. Angeblich ist es das fehlende Bindeglied zwischen Fisch und Landtier!"
 dubois.227.f: "Ichthyostega ist einer der frühesten bekannten Tetrapoden aus dem späten Devon. Seine robusten Gliedmaßen und Lungen markieren eine Schlüsselphase in der Entwicklung vom Wasser- zum Landleben. Das Fossil zeigt eine Mischung aus Fisch- und Amphibienmerkmalen und beleuchtet die Ursprünge des Wirbeltierlebens an Land."
 dubois.301.t: "Botanisches Expeditionsziel"
 dubois.301.d: "Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ist bereit, sich auf eine botanische Reise zu begeben. Welches Regenwaldgebiet soll der Schwerpunkt dieser Expedition sein?"
 dubois.301.f: "Ein [concept_dubois_naturalist] kann in einen Regenwald geschickt werden, wo jedes Jahr neue Exemplare gesucht werden, bis er zurückgerufen wird. Regenwaldstaaten sind durch einen speziellen Modifikator gekennzeichnet und umfassen Amazonien, Kongo, Borneo und Indochina. Direkte Kontrolle über diese Staaten gewährt Zugang, aber eine botanische Lizenz kann auch für den friedlichen Zugang ausgehandelt werden."
 dubois.301.g: "Entsendung in den Regenwald des Amazonas."
 dubois.301.h: "Entsendung in den kongolesischen Regenwald."
 dubois.301.i: "Entsendung in das Borneanische Tiefland."
 dubois.301.j: "Entsendung in die indochinesischen Regenwälder."
 dubois.302.t: "Victoria amazonica"
 dubois.302.d: "Während seiner botanischen Expedition stieß Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] auf eine bemerkenswerte Seerose, die an Pracht nicht zu überbieten war."
 dubois.302.f: "Victoria amazonica, die Amazonas-Riesenseerose, gehört zur Gattung Victoria in der Familie der Seerosengewächse (Nymphaeaceae). Sie ist in den langsam fließenden Gewässern des Amazonasbeckens heimisch und wurde zu Ehren von Königin Victoria benannt. Ihr untergetauchter Blattstiel kann bis zu 8 Meter lang werden, und die schwimmenden Blätter - gesäumt und tief eingeschnitten - erreichen in der Natur einen Durchmesser von bis zu 3 Metern. Diese Einschnitte verhindern das Zerreißen und ermöglichen das Abfließen von überschüssigem Wasser nach starken Regenfällen. In botanischen Gärten erreichen die Blätter in der Regel einen Durchmesser von 2 Metern."
 dubois.302.g: "Dieses Exemplar wird ein Highlight in unserer Ausstellung sein."
 dubois.302.h: "Katalogisieren und untersuchen Sie das Exemplar für die wissenschaftliche Forschung."
 dubois.303.t: "Atlasspinner"
 dubois.303.d: "Obwohl sich die Expedition auf Pflanzen konzentrierte, war Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] von einer Kolonie spektakulärer Atlasspinner im Regenwald fasziniert."
 dubois.303.f: "Der Atlasspinner (Attacus atlas) ist einer der größten Nachtfalter der Welt, benannt nach dem Titanen Atlas aus der griechischen Mythologie. Die Weibchen sind größer als die Männchen. Aus den Kokons wird Fagaraseide gewonnen, die hellbraun und deutlich robuster als gewöhnliche Seide ist."
 dubois.304.t: "Titanenwurz"
 dubois.304.d: "In Indonesien hat Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] einen gigantischen Titanenwurz entdeckt, wahrscheinlich die größte Blume der Welt. Der Naturforscher ist begeistert, doch der Rest des Teams beschwert sich über den stechenden Geruch."
 dubois.304.f: "Die Gattung Amorphophallus ist mit rund 200 Arten in den Regenwäldern der Alten Welt von Neuguinea bis Westafrika verbreitet. A. titanum bildet den größten unverzweigten Blütenstand im Pflanzenreich. Die mehr als drei Meter hohe Blüte riecht nach Aas, erzeugt Wärme (bis zu 37 °C) und lockt so Käfer an, die für die Bestäubung sorgen. Die spektakulären Blüteereignisse des Titanenwurz sind eine Hauptattraktion in botanischen Gärten auf der ganzen Welt."
 dubois.305.t: "Goliath"
 dubois.305.d: "Die Entdeckung eines Goliath-Käfers lenkt Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] kurzzeitig von seinen botanischen Forschungen ab."
 dubois.305.f: "Goliathkäfer (Goliathus) gehören zu den größten und schwersten Insekten der Erde und gehören zur Unterfamilie der Rosenkäfer (Cetoniinae). Die Larven können bis zu 110 Gramm wiegen. Tote Exemplare werden von Sammlern sehr geschätzt und erzielen hohe Preise."
 dubois.306.t: "Eine Fundgrube für Orchideen"
 dubois.306.d: "Die Botanische Expedition hat tief im Regenwald eine schillernde Vielfalt von Orchideenarten entdeckt, von denen viele der Wissenschaft bisher unbekannt waren."
 dubois.306.f: "Orchideen sind berühmt für ihre außergewöhnliche Vielfalt - keine andere Pflanzenfamilie weist eine solche Bandbreite an Formen, Größen und Farben auf. Ihre Blüten können so klein wie ein Stecknadelkopf oder so groß wie ein Essteller sein, und ihre Palette reicht von zartem Weiß und Grün bis hin zu leuchtenden Rot-, Blau- und Gelbtönen, oft in auffälligen Kombinationen. Mit über tausend Gattungen und Zehntausenden von Arten sind Orchideen nach den Gänseblümchen die zweitgrößte Gruppe unter den blühenden Pflanzen. Jede neue Entdeckung bereichert unser Verständnis für den Einfallsreichtum der Natur."
 dubois.306.g: "Eine wunderbare Ergänzung unserer Sammlung."
 dubois.307.t: "Regenwald-Heilmittel"
 dubois.307.d: "Die Expedition hat im Regenwald mehrere bemerkenswerte Kräuter identifiziert, die vielversprechende medizinische Eigenschaften haben."
 dubois.307.f: "Pflanzen sind seit langem die Grundlage der Medizin - mehr als die Hälfte aller bekannten Heilmittel stammen aus pflanzlichen Quellen. Weidenrinde zum Beispiel enthält Salicin, den Vorläufer des modernen Aspirins, und lindert seit Jahrhunderten Schmerzen und Fieber. Die reiche Flora des Regenwaldes könnte noch neue Heilmittel hervorbringen, die darauf warten, erforscht und verstanden zu werden."
 dubois.307.g: "Analysieren Sie die Pflanzen für wissenschaftliche Untersuchungen."
 dubois.307.h: "Sammeln Sie die Kräuter für die spätere Verwendung."
 dubois.308.t: "Rätselhafte Blumen"
 dubois.308.d: "Die Expedition wagte sich in eine unbekannte Ecke des Regenwaldes und stieß auf eine Fülle von unbekannten und auffälligen Blumen."
 dubois.308.f: "Ihre Schönheit ist unbestreitbar, doch die örtlichen Führer warnen, dass diese Blüten gefährlich - vielleicht sogar giftig - sein könnten. Das Team steht vor einem Dilemma: entweder die Blumen in großen Mengen sammeln und dabei unvorhergesehene Folgen riskieren oder vorsichtig vorgehen und sie zunächst untersuchen. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] muss entscheiden, wie er Neugier und Vorsicht am besten in Einklang bringen kann."
 dubois.308.g: "Weisen Sie das Personal an, die Blumen einzusammeln."
 dubois.308.h: "Lassen Sie den Expeditionsleiter die Blüten sammeln und untersuchen."
 dubois.308.i: "Lassen Sie diese geheimnisvollen Blumen unberührt."
 dubois.309.t: "Opposition kritisiert Botanische Expedition"
 dubois.309.d: "[SCOPE.sCharacter('dubois_sceptical_leader').GetLastName] prangert die botanische Expedition als verschwenderischen Umgang mit öffentlichen Geldern an und argumentiert, dass die Mittel anderweitig eingesetzt werden sollten. Sein Protest ist ebenso laut wie hartnäckig."
 dubois.309.f: "Eine weitere Expedition? Erst die Zeppeline, dann der Pazifik, jetzt Botaniker, die durch den Dschungel wandern. Archäologen, Paläontologen, Zoologen - wann hört das endlich auf? Das ist nichts als bürokratischer Überfluss!"
 dubois.309.g: "Rufen Sie Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] sofort zurück."
 dubois.309.h: "Die wissenschaftliche Forschung muss über der Politik stehen."
 dubois.310.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] wird krank "
 dubois.310.d: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] hat beim Sammeln botanischer Proben im Regenwald eine Vergiftung erlitten. Die Schwere der Erkrankung zwingt zu einem abrupten Abbruch der Expedition."
 dubois.310.f: "Solange der Naturforscher unpässlich ist, wird die botanische Expedition ausgesetzt. Bis zur Genesung werden keine neuen Exemplare verschickt."
 dubois.310.g: "Eine beunruhigende Entwicklung."
 dubois.311.t: "Entdeckung von exotischem Saatgut"
 dubois.311.d: "Während der botanischen Expedition entdeckte Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] seltene Samen mit bedeutendem wissenschaftlichen und landwirtschaftlichen Potenzial."
 dubois.311.f: "Der weltweite Austausch von Nutzpflanzen hat die Landwirtschaft seit Jahrhunderten geprägt. Zuckerrohr, das einst im Mittelmeerraum angebaut wurde, florierte in Südamerika; 1876 schmuggelte Henry Wickham Kautschuksamen von Brasilien nach Asien und veränderte damit Wirtschaft und Landschaft."
 dubois.311.g: "Nehmen Sie die Samen in unsere wissenschaftliche Sammlung auf."
 dubois.311.h: "Führen Sie das neue Saatgut in die lokale Landwirtschaft ein."
 dubois.1000.t: "Le Carnaval des animaux"
 dubois.1000.d: "Bei einem Besuch des Zoologischen Gartens ließ sich ein Komponist von Löwen, Elefanten, Kängurus und Schildkröten inspirieren, was zu einer skurrilen musikalischen Suite mit dem Titel \"Karneval der Tiere\" führte."
 dubois.1000.f: "Der \"Karneval der Tiere\" (Grande fantaisie zoologique) wurde 1886 von Camille Saint-Saëns während eines Aufenthalts in einem kleinen österreichischen Dorf komponiert. Auf der Grundlage früherer Skizzen, die er während seiner Lehrtätigkeit in Paris angefertigt hatte, schuf Saint-Saëns dieses verspielte Kammermusikwerk auf Drängen seiner Studenten, die sich an musikalischen Parodien erfreuten. Aus Sorge um seinen Ruf hielt der Komponist das Werk, das auf humorvolle Weise Tiergeräusche nachahmt und andere Komponisten leicht persifliert, zu Lebzeiten von der Veröffentlichung zurück. Erst nach Saint-Saëns' Tod gelangte das Werk dank des Verlegers Jacques Durand an die Öffentlichkeit."
 dubois.1000.g: "Ein zoologisches Meisterwerk der Musik?"
 dubois.1001.t: "Eingang des Zoologischen Gartens"
 dubois.1001.d: "Willkommen am Haupteingang des Zoologischen Gartens. Von hier aus können Sie die verschiedenen Tiergehege erkunden."
 dubois.1001.g: "Besuchen Sie die Tiere #yellow Afrikas#!"
 visit_animals_africa_tt: "Sie besuchen die Tiere #yellow Afrikas#!."
 dubois.1001.h: "Besuchen Sie die Tiere #yellow Asiens#!"
