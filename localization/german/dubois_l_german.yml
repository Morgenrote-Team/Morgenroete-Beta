 dubois.31.l: "Jage den Gorilla."
 dubois.32.t.gorilla_1: "Ein starker Gorilla"
 dubois.32.t.gorilla_2: "Zweite Gorilla-Sichtung"
 dubois.32.t.gorilla_3: "Noch ein Gorilla"
 dubois.32.f.gorilla.1: "In den nebelverhangenen Wäldern des Hochlandes hallt ein tiefer, resonanter Brustschlag durch das dichte Unterholz – ein Geräusch, das jedem Lebewesen in Hörweite einen Schauer über den Rücken jagt. Dort, zwischen den uralten Bäumen, macht der Silberrücken-Gorilla seine Anwesenheit bekannt. Er ist hoch aufragend und furchteinflößend und zugleich Beschützer und Herrscher seiner Truppe. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] beobachtet voller Ehrfurcht, wie der große Affe seine Dominanz geltend macht und seine Familie mit einer Anmut anführt, die seine enorme Kraft Lügen straft. Der Naturforscher, hin- und hergerissen zwischen Bewunderung und Pflicht, bereitet seine Ausrüstung vor, wohl wissend, dass das Einfangen dieses majestätischen Geschöpfs für den Zoo die bisher entmutigendste Aufgabe sein könnte."
 dubois.32.f.gorilla.2: "Als die Sonne hinter dem bergigen Horizont zu versinken beginnt, erwacht der Dschungel mit den Geräuschen der Natur zum Leben. Durch das dichte Blätterdach kriecht eine Gorillafamilie hervor, deren Bewegungen bedächtig und zielstrebig sind. Der jüngste Gorilla klammert sich an den Rücken seiner Mutter, während der imposante Silberrücken die Nachhut bildet und mit seinen wachsamen Augen nach jedem Anzeichen von Gefahr Ausschau hält. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] hält den Atem an und richtet sein Fernglas auf diesen seltenen und flüchtigen Blick in das Leben dieser edlen Geschöpfe. Der Gedanke, eine solche Familie zu trennen, lastet schwer auf ihm, aber der Druck der Zoobesucher lässt ihm keine andere Wahl – er muss weitermachen, auch wenn dies bedeutet, die Harmonie des Dschungels zu stören."
 dubois.32.f.gorilla.3: "Tief im Herzen des Regenwalds, wo die Luft erfüllt ist vom Duft der Erde und den Rufen unsichtbarer Kreaturen, leben die Gorillas. Der hoch aufragende Silberrücken mit seinem silbern gestreiften Fell und den weisen, wissenden Augen ist der unangefochtene Anführer seiner Truppe. Seine riesigen Hände wiegen sanft einen jungen Gorilla, eine seltene Zurschaustellung von Zärtlichkeit bei einem so mächtigen Wesen. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] beobachtet diesen intimen Moment aus der Ferne, hin- und hergerissen von dem ethischen Dilemma, das vor ihm liegt. Die Zoobesucher erwarten Ergebnisse, aber als er die komplexen sozialen Bindungen zwischen diesen bemerkenswerten Tieren beobachtet, beginnt er zu hinterfragen, ob ein Käfig jemals wirklich den Geist der Wildnis beherbergen könnte."
 dubois.33.d.gorilla: "Auf der Suche nach dem #O Gorilla#!, ist unser Safari-Team auf eine erstaunliche Flora gestoßen. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ist geneigt, eine Pause einzulegen."
 dubois.34.d.gorilla: "Die Safari mit dem Ziel den # O Gorilla#! einzufangen, muss unterbrochen werden. Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] wird vermisst!"
 je_dubois_safari_gorilla: "Afrika-Safari: Gorilla"
 je_dubois_safari_gorilla_reason: "Auf einer Afrika-Safari kann durch ständiges Aufspüren und Einfangen von Großwild gefangen und anschließend zu einem [concept_dubois_zoo] transportiert werden. Pro Safari kann nur ein Tier gefangen werden. Je nach Tierart unterscheidet sich, ob man Fallen benötigt oder der Spur folgen muss. Als Faustregel gilt, dass große, träge Tiere mehr Fallen benötigen, während schnelle Tiere mehr Aufspüren erfordern. Die Safari dauert 300 Tage. Wird bis dahin kein Tier gefangen, verlässt das Safariteam das Land wieder – erfolglos.\n\nAggressive Tiere können sich beim Einfangen von Fallen verteidigen und angreifen. Scheue Tiere ergreifen die Flucht. Ein [concept_dubois_naturalist] mit der Eigenschaft Zoologe kann solche Situationen ohne Nachteil lösen. Neue Technologien wie #ORANGE Maschinengewehr#! oder #ORANGE Verbrennungsmotor#! erleichtern das Aufspüren und Einfangen von Tieren."
 dubois.228.d: "Wer hätte erwartet, dass ein majestätischer Adler ausgerechnet aus Neuseeland kommt? Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] fand mehrere Knochen eines gigantischen Adlers mit einer gewaltigen Flügelspannweite von 2,6 Metern. Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] vermutet, dass dieser Vogel die Legende von Pouākai, einem Mythos der Māori, inspiriert haben könnte."
