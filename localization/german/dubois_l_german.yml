 dubois.1302.gila: "Gila-Krustenechsen"
 dubois.108.t: "Gila-Krustenechse"
 dubois.108.d: "Unser Zoo ist um ein neues, exotisches Tier reicher: Heute ist die lange erwartete #O Gila-Krustenechse#! in ihr neues Gehege eingezogen."
 dubois.108.f: "Das Gila-Krustenechse ist eine giftige Echse, die im Südwesten der USA und im Nordwesten Mexikos heimisch ist. Es ist an seinen charakteristischen schwarz-orangen Markierungen erkennbar und eine der wenigen giftigen Echsen der Welt. Gila-Krustenechse bewegen sich langsam und sind hauptsächlich nachtaktiv. Sie ernähren sich von kleinen Säugetieren, Vögeln und Eiern. Sie speichern Fett in ihren Schwänzen, wodurch sie lange Zeit ohne Nahrung überleben können."
 dubois.108.g: "Sie sieht nicht so gefährlich aus..."
 visit_gila_tt: "Sie besuchen das Gehege der #o Gila-Krustenechsen#!"
