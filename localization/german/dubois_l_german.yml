 notification_dubois_animal_breeding_notification_name: "Zuchtbericht"
 notification_dubois_animal_breeding_notification_desc: "In diesem Jahr hat sich die Anzahl der [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] in unserem [concept_dubois_nature_reserve] um [GetPlayer.MakeScope.Var('dubois_animal_breeding_change_var').GetValue|0+=] geändert. Derzeit gibt es [GetPlayer.MakeScope.Var('dubois_breeding_animal_amount_var').GetValue|0+] [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]."
 dubois.1321.t: "Eine neue Heimat für den [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]"
 dubois.1321.d: "Unser [concept_dubois_nature_reserve] beherbergt jetzt genug [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] für einen stabilen [concept_dubois_habitat]."
 dubois.1321.f: "Dies ist ein großartiger Tag für [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]. Jetzt werden sie für die Zukunft geschützt!"
 dubois.1321.g: "Wunderbar!"
 dubois.1322.t: "Das Züchten der [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] ist fehlgeschlagen"
 dubois.1322.d: "Leider ist unser Versuch, einen neuen stabilen [concept_dubois_habitat] im [concept_dubois_nature_reserve] von [ROOT.Var('dubois_breeding_state_var').GetState.GetName] zu schaffen, gescheitert. Wenn wir wollen, können wir es noch einmal versuchen und hoffen, dass wir dieses Mal mehr Glück haben."
 dubois.1322.f: "Wir trauern um diesen Verlust von [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]."
 dubois.1322.g: "Was für ein trauriger Tag."
 dubois.2001.t: "Paläontologische Sammlung"
 dubois.2001.d: "Willkommen in der Paläontologischen Sammlung."
 dubois.2001.f_paleontologist: "Unsere Sammlung wird derzeit von unserem [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] verwaltet. Sie enthält:\n\n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fossilien\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Spezielle Fossilien.\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! Menschliche Fossilien\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]#! @dubois_dinosaur_bone! Dinosaurierknochen\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#! @dubois_dinosaur_skeleton! Dinosaurierskelette\n\nUnsere #T Dinosaurier-Bewertung#! als Bewertung für alle unsere ausgestellten Dinosaurierskelette ist [ROOT.Var('dubois_dinosaur_rating').GetValue]."
 dubois.2001.f_no_paleontologist: "Unsere Sammlung wird derzeit von #R niemandem#! verwaltet. Sie enthält:\n\n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fossilien\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Besondere Fossilien.\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! Menschliche Fossilien\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]#! @dubois_dinosaur_bone! Dinosaurierknochen\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#! @dubois_dinosaur_skeleton! Dinosaurierskelette\n\nUnsere #T Dinosaurier-Bewertung#! als Bewertung für alle unsere ausgestellten Dinosaurierskelette ist [ROOT.Var('dubois_dinosaur_rating').GetValue]."
 dubois.2001.g: "Verlassen Sie die Paläontologische Sammlung."
 dubois.2001.h: "Zurück zur Haupthalle."
 dubois.2001.i: "Besuchen Sie den [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]."
 dubois.2001.j: "Besuchen Sie die Besondere-Fossilien-Sammlung."
 dubois.2001.k: "Besuchen Sie die Ausstellung zur Menschlichen Evolution."
 dubois.2001.l: "Besuchen Sie die Dinosaurierknochen-Sammlung."
 dubois.2001.m: "Besuchen Sie die Dinosaurierskelett-Sammlung."
 dubois.2011.t: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]"
 dubois.2011.d_north_america: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] führt derzeit Untersuchungen in einer Felsformation in #YELLOW Nordamerika#! durch."
 dubois.2011.d_south_america: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] führt derzeit Untersuchungen in einer Felsformation in #YELLOW Südamerika#! durch."
 dubois.2011.d_europe: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] führt derzeit Untersuchungen in einer Felsformation in #YELLOW Europa#! durch."
 dubois.2011.d_africa: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] führt derzeit Untersuchungen in einer Felsformation in #YELLOW Afrika#! durch."
 dubois.2011.d_asia: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] führt derzeit Untersuchungen in einer Felsformation in #YELLOW Asien#! durch."
 dubois.2011.d_australia: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] führt derzeit Untersuchungen in einer Felsformation in #YELLOW Australien#! durch."
 dubois.2011.d_to_location: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] reist derzeit zu einer Felsformation, um diese genauer zu untersuchen."
 dubois.2011.d_from_location: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] kommt gerade von einer Fossiliensuche zurück."
 dubois.2011.d_default: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] hat derzeit keinen Auftrag."
 dubois.2011.d_other: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ist der führende [concept_dubois_paleontologist] unseres Landes. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] ist im Moment woanders beschäftigt."
 dubois.2011.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] hat eine paläontologische [concept_academics_experience] von #G [ROOT.Var('dubois_paleontologist_var').GetVariable('dubois_paleontologist_experience_var').GetValue]#!\n\nPaläontologen können jedes Jahr neue Fossilien in Formationen finden. Große Formationen haben auch die Chance, seltene Dinosaurierknochen zu entdecken, die zur Rekonstruktion von Skeletten verwendet werden können. Dazu muss der [concept_dubois_paleontologist] einer Formation zugeordnet werden. Befindet sich keine Formation innerhalb der eigenen Grenzen, kann auch ein paläontologischer Lizenzvertrag mit einem Land ausgehandelt werden, das über eine große Formation verfügt. Ohne Zuordnung zu einer Formation bleibt der Paläontologe inaktiv. Während dieser Zeit kann [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] jedoch für Expeditionen, die Rekonstruktion von Dinosaurierknochen, den Skelettbau oder den Wiederaufbau des Skeletts verwendet werden."
 dubois.2011.g: "Untersuchen Sie Formationen in Nordamerika."
 dubois.2011.h: "Untersuchen Sie Formationen in Südamerika."
 dubois.2011.i: "Untersuchen Sie Formationen in Europa."
 dubois.2011.j: "Untersuchen Sie Formationen in Afrika."
 dubois.2011.k: "Untersuchen Sie Formationen in Asien."
 dubois.2011.l: "Untersuchen Sie Formationen in Australien."
 dubois.2021.t: "Besondere Fossilien"
 dubois.2021.d: "Diese Sammlung beherbergt einige der außergewöhnlichsten Fossilien, die bisher gefunden wurden."
 dubois.2021_amber: "#T Bernstein#!\nDas Harz hat ein Millionen Jahre altes Insekt konserviert.\n\n"
 dubois.2021_ammonite: "#T Ammoniten#!\nZehntausende von Ammonitenarten haben die Meere 350 Millionen Jahre lang geprägt.\n\n"
 dubois.2021_archaeopteryx: "#T Archaeopteryx#!\nDieser \"Urvogel\" wird von einigen Forschern als mögliche Verbindung zwischen Reptilien und Vögeln angesehen.\n\n"
 dubois.2021_composita: "#T Composita#!\nComposita waren eine weit verbreitete Art, die vom späten Devon bis zum späten Perm lebte.\n\n"
 dubois.2021_eusthenopteron: "#T Eusthenopteron#!\nDiese Fische haben möglicherweise in einem ausgetrockneten Flussbecken überlebt und gelten als wichtiger Schritt in Richtung Amphibien.\n\n"
 dubois.2021_ichthyosaurus: "#T Ichthyosaurier#!\nDieses Reptil hatte nicht nur große Ähnlichkeit mit einem Delphin, sondern war auch lebendgebärend.\n\n"
 dubois.2021_ichthyostega: "#T Ichthyostega#!\nEine mögliche fehlende Verbindung zwischen Fischen und Tetrapoden.\n\n"
 dubois.2021_megatherium: "#T Megatherium#!\nEin riesiges Bodenfaultier. Leider auch eine ausgestorbene Art.\n\n"
 dubois.2021_pterodactylus: "#T Pterodactylus#!\nEin kleiner Kurzschwanz-Flugsaurier, der wahrscheinlich an Küsten lebte.\n\n"
 dubois.2021_smilodon: "#T Smilodon#!\nEins der bekanntesten Säbelzahn-Raubtiere.\n\n"
 dubois.2021_trilobite: "#T Trilobit#!\nDie zahlreichen Vorkommen und die Schichtung dieser Arthropoden machen sie zu wichtigen Leitfossilien für das Paläozoikum."
 dubois.2041.t: "Dinosaurierknochen"
 dubois.2041.d: "Hier können Dinosaurierknochen aus Fossilien rekonstruiert und Dinosaurierknochen zu Dinosaurierskeletten aufgebaut werden."
 dubois.2041.f: "Aus fünf Dinosaurierknochen aus einer kontinentalen Region kann ein [concept_dubois_paleontologist] einen vollständigen Dinosaurier rekonstruieren. Ein erfahrener Paläontologe kann auch versuchen, einen Dinosaurierknochen aus 20 fossilen Fragmenten zu rekonstruieren. Ein Dinosaurierknochen kann nur dann rekonstruiert werden, wenn mindestens ein Dinosaurierknochen zur Orientierung zur Verfügung steht und der Paläontologe nicht erschöpft oder beschäftigt ist. Sein Erfolg hängt weitgehend von seiner paläontologischen Erfahrung ab.\n\n#G [ROOT.Var('dubois_north_american_dinosaur_bone').GetValue]#! Nordamerikanische Dinosaurierknochen\n#G [ROOT.Var('dubois_south_american_dinosaur_bone').GetValue]#! Südamerikanische Dinosaurierknochen\n#G [ROOT.Var('dubois_european_dinosaur_bone').GetValue]#! Europäische Dinosaurierknochen\n#G [ROOT.Var('dubois_african_dinosaur_bone').GetValue]#! Afrikanische Dinosaurierknochen\n#G [ROOT.Var('dubois_asian_dinosaur_bone').GetValue]#! Asiatische Dinosaurierknochen\n#G [ROOT.Var('dubois_australian_dinosaur_bone').GetValue]#! Australische Dinosaurierknochen"
 dubois.2041.g: "Rekonstruieren Sie einen Dinosaurierknochen aus Fossilien."
 dubois.2042.t: "Dinosaurierknochen rekonstruiert"
 dubois.2042.d: "Professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] hatte vollen Erfolg: Mit Hilfe seiner wissenschaftlichen Erkenntnisse gelang es ihm, aus fossilen Fragmenten einen Dinosaurierknochen zu rekonstruieren."
 dubois.2042.f: "Es war ein anregendes Puzzlespiel, das jedoch kein Problem für die herausragenden Fähigkeiten unseres [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] darstellte. Nach einigen Monaten des Studiums und ausgefeilter Kombinatorik gelang es ihm, aus streichholzgroßen Fossilresten Knochenstücke und damit die Schlüsselteile einer Dinosaurierart zu rekonstruieren, von der bisher nur lose Knochen bekannt waren."
 dubois.2042.g: "Prächtig!"
 dubois.2043.t: "Ratloser Professor"
 dubois.2043.d: "Trotz monatelanger Tests konnte Professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] keine Ergebnisse hinsichtlich der verwendeten Materialien erzielen. Schade um die Fossilien!"
 dubois.2043.f: "Wo gehörte dieses Teil nochmal hin? Und das? Aber wenn dieses Teil zu diesem gehörte, dann passte das andere nicht mehr. Irgendwann hielt es der [concept_dubois_paleontologist] nicht mehr aus. Er hatte sich die ganze Nacht den Kopf zerbrochen, aber es konnte und wollte ihm nicht gelingen, aus den gefundenen Objekten brauchbare Erkenntnisse darüber abzuleiten, wie das Dinosaurierskelett einst ausgesehen haben muss."
 dubois.2043.g: "Der Professor hat unsere Fossilien verschwendet!"
 dubois.2044.t: "Perfekt zusammengebautes Skelett"
 dubois.2044.d: "Unser [concept_dubois_paleontologist] hat beim Zusammensetzen des Skeletts hervorragende Arbeit geleistet und der naturhistorischen Sammlung ein bedeutendes Stück hinzugefügt."
 dubois.2044.f: "Tosender Applaus erfüllte die Ausstellung, als der Professor das neu zusammengesetzte Dinosaurierskelett der Öffentlichkeit präsentierte. Damit löste er einige Probleme, die Experten jahrelang beschäftigten und zeigte einen völlig neuen Ansatz zur Interpretation der Knochen des Dinosauriers auf. Die anwesenden internationalen Paläontologen suchten das Gespräch mit dem Professor und wollen auf ganz ähnliche Weise ähnliche Funde in ihren Sammlungen aufbauen. Einige gingen sogar so weit, [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] als Puzzle-Genie zu bezeichnen, da er das, wofür andere Jahrzehnte gebraucht hatten, auf Anhieb schaffte."
 dubois.2044.g: "Ausgezeichnete Arbeit, Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.2045.t: "Unvollkommen zusammengebautes Skelett"
 dubois.2045.d: "Professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] hat sein Bestes gegeben, aber leider weist das zusammengebaute Dinosaurierskelett einige Fehler auf."
 dubois.2045.f: "Als das neue Dinosaurierskelett in der Naturkundesammlung präsentiert wurde, gab es höflichen, aber eher verhaltenen Applaus. Obwohl der führende Paläontologe des Landes alles versucht hatte, konnten Berufskollegen am Tag der Präsentation einige Mängel entdecken, die die Leistung trübten. Dennoch genügt das Skelett zumindest im Großen und Ganzen den Anforderungen und dürfte die Ausstellung bereichern, auch wenn in den kommenden Jahren eine Nachbesserung nötig sein wird."
 dubois.2045.g: "Es funktioniert, nicht wahr?"
 dubois.2046.t: "Schlecht zusammengebautes Skelett"
 dubois.2046.d: "Das von [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] zusammengestellte Skelett ließ Experten... staunen. Allerdings nicht so, wie die Paläontologische Gesellschaft gehofft hatte."
 dubois.2046.f: "Es war ein denkwürdiger Tag, der nur noch von der Bizarrheit des Ereignisses übertroffen wurde. Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] enthüllte mit dramatischen Gesten und erwartetem tosenden Applaus das neue Dinosaurierskelett unter einer Plane. Stattdessen: Stille. Es folgte Flüstern. Dann: Belustigung. Die beteiligten Forscher lächelten, andere rissen sich zusammen, bis schließlich ein Kollege halb lachend, halb ungläubig auf die zusammengebastelte Chimäre zeigte und rief: \"Ist das ein dreiköpfiger Dinosaurier?\""
 dubois.2046.g: "Das muss ein Witz sein!"
 dubois.2051.t: "Dinosaurierskelette"
 dubois.2051.d: "Dinosaurierskelette sind der Stolz jeder naturhistorischen Sammlung. Perfekt zusammengesetzte Skelette wirken sich positiv auf unsere Dinosaurier-Bewertung aus."
 dubois.2051.f: "Unsere Dinosauriersammlung besteht aus folgenden Skeletten:\n\n"
 dubois.2051.ankylosaurus: "Ankylosaurus"
 dubois.2051.diplodocus: "Diplodocus"
 dubois.2051.triceratops: "Triceratops"
 dubois.2051.tyrannosaurus: "Tyrannosaurus Rex"
 dubois.2051.stegosaurus: "Stegosaurus"
 dubois.2051.antarctosaurus: "Antarctosaurus"
 dubois.2051.argyrosaurus: "Argyrosaurus"
 dubois.2051.iguanodon: "Iguanodon"
 dubois.2051.plateosaurus: "Plateosaurus"
 dubois.2051.giraffatitan: "Giraffatitan"
 dubois.2051.spinosaurus: "Spinosaurus"
 dubois.2051.psittacosaurus: "Psittacosaurus"
 dubois.2051.velociraptor: "Velociraptor"
 dubois.2051.muttaburrasaurus: "Muttaburrasaurus"
 dubois.2051.rhoetosaurus: "Rhoetosaurus"
 dubois.2051.g: "Besuchen Sie die nordamerikanischen Skelette."
 dubois.2051.h: "Besuchen Sie die südamerikanischen Skelette."
 dubois.2051.i: "Besuchen Sie die europäischen Skelette."
 dubois.2051.j: "Besuchen Sie die afrikanischen Skelette."
 dubois.2051.k: "Besuchen Sie die asiatischen Skelette."
 dubois.2051.l: "Besuchen Sie die australischen Skelette."
 dubois.2101.t: "Ein verbessertes Skelett"
 dubois.2101.d: "Die Bemühungen unseres [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] haben Früchte getragen: Das zuvor defekte Skelett wurde deutlich verbessert."
 dubois.2101.f: "Es dauerte eine Weile, über das prähistorische Tier, seine Fortbewegung, seine ökologische Umgebung und viele andere Umstände nachzudenken, bis Professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] auf die entscheidende Idee kam, einige Knochen an ihren richtigen Platz zu bringen. Das gesamte Skelett wurde dadurch deutlich aufgewertet."
 dubois.2101.g: "Es sieht viel besser aus!"
 dubois.2102.t: "Ein unverändertes Skelett"
 dubois.2102.d: "Trotz zahlreicher Versuche, das Skelett zu verbessern, war unser [concept_dubois_paleontologist] erfolglos."
 dubois.2102.f: "Professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] pflegte bei der Behandlung des Skeletts große Sorgfalt. Im Bemühen, nicht zu viel zu zerstören und behutsam vorzugehen, blieb er so vorsichtig, dass er fast nichts veränderte."
 dubois.2102.g: "Unverändert? Wofür wird dieser [concept_dubois_paleontologist] eigentlich bezahlt?"
 dubois.2103.t: "Ein verschlechtertes Skelett"
 dubois.2103.d: "Vielleicht wäre es besser gewesen, [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] nicht an einem Dinosaurierskelett arbeiten zu lassen."
 dubois.2103.f: "Es war für alle Beteiligten äußerst überraschend, als Professor [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] die \"überarbeitete Version\" des Skeletts vorstellte. Nicht zuletzt, weil eine Hüfte nun auf einer der Schultern ruhte und ein stattlicher zweiter Schwanz das Tier ergänzte – auf der Stirn."
 dubois.2103.g: "Dieser Idiot hat es noch schlimmer gemacht!"
 dubois.2111.t: "Abteilung für nordamerikanische Dinosaurier"
 dubois.2111.d: "Welches Dinosaurierskelett wollen Sie besuchen?"
 dubois.2111.f: "Nordamerikanische Dinosaurier gehören zu den bekanntesten ihrer Art. Ende des 19. Jahrhunderts wurden in der Morrison-Formation zahlreiche Dinosaurierarten gefunden. Bekannte Exemplare sind Ankylosaurus, Diplodocus, Triceratops und Tyrannosaurus Rex."
 dubois.2111.g: "Ankylosaurus."
 dubois.2111.h: "Diplodocus."
 dubois.2111.i: "Triceratops."
 dubois.2111.j: "Tyrannosaurus Rex."
 dubois.2111.k: "Stegosaurus."
 dubois.2112.t: "Ankylosaurus"
 dubois.2112.f: "Ankylosaurus ist eine bemerkenswerte Gattung gepanzerter Dinosaurier, die in der späten Kreidezeit vor etwa 68 bis 66 Millionen Jahren gedieh. Dieses prähistorische Lebewesen gehört zur Gruppe der pflanzenfressenden Dinosaurier, die als Ankylosauriden bekannt sind, und wird für seine ausgeprägten und beeindruckenden Verteidigungsanpassungen gefeiert.\nAnkylosaurus zeichnete sich durch einen robusten und schwer gepanzerten Körper aus und besaß ein breites, niedriges Profil, das mit Knochenplatten oder Osteodermen verziert war , eingebettet in seine Haut, bietet hervorragenden Schutz vor potenziellen Raubtieren. Sein ikonischstes Merkmal war die Schwanzkeule, die aus einem dichten Knochenknäuel an der Schwanzspitze bestand und wahrscheinlich sowohl zur Abschreckung von Angreifern als auch als Werkzeug für intraspezifische Kämpfe diente.\nMit einer Länge von etwa 20 bis 30 Fuß, Ankylosaurus war ein vierbeiniger Pflanzenfresser, der seinen breiten Schnabel zum Abschneiden der Vegetation nutzte. Sein im Vergleich zu seinem kräftigen Körper relativ kleiner Kopf weist auf eine selektive Fressgewohnheit an tiefliegenden Pflanzen und Sträuchern hin."
 dubois.2113.t: "Diplodocus"
 dubois.2113.f: "Diplodocus stellt eine symbolträchtige Gattung kolossaler, langhalsiger Dinosaurier dar, die während der späten Jurazeit vor etwa 154 bis 152 Millionen Jahren ihre Blütezeit erlebten. Diplodocus wird als Sauropod klassifiziert und ist bekannt für seinen bemerkenswert langen Hals und seine immense Größe, die die Erhabenheit des prähistorischen Lebens verkörpern.\nDiplodocus zeichnete sich durch seinen ausgeprägten Körperbau aus und besaß einen verlängerten Hals und Schwanz sowie einen relativ kleinen Kopf mit zapfenähnlichen Merkmalen Zähne, die zum Absuchen der Vegetation geeignet sind. Seine beeindruckende Länge von bis zu 90 Fuß machte ihn zu einem der längsten Landtiere, die es je gab, während sein relativ leichtes Skelett und seine vierbeinige Haltung eine effiziente Bewegung ermöglichten.\nEs wird angenommen, dass Diplodocus ein Pflanzenfresser war, der seinen langen Hals nutzte, um die Vegetation zu erreichen hoch über dem Boden, um die Konkurrenz mit anderen Pflanzenfressern zu vermeiden. Fossile Beweise deuten darauf hin, dass diese Dinosaurier wahrscheinlich üppige Umgebungen entlang von Flussufern bewohnten, wo reichlich Pflanzenleben vorhanden war."
 dubois.2114.t: "Triceratops"
 dubois.2114.f: "Triceratops gilt als eine ikonische Gattung gehörnter Dinosaurier, die in der späten Kreidezeit vor etwa 68 bis 66 Millionen Jahren gedieh. Der als Ceratopsid klassifizierte Triceratops wird für sein unverwechselbares Aussehen gefeiert, das durch eine beeindruckende Reihe von Gesichtshörnern und eine knöcherne Rüsche am Hinterkopf gekennzeichnet ist.\nTriceratops zeichnete sich durch seine beeindruckenden Verteidigungsmerkmale aus und hatte einen großen, robusten Körper und einen massiven Körper Der Kopf ist mit einem markanten Nasenhorn über der Schnauze und zwei länglichen Stirnhörnern über den Augen geschmückt. Seine mit Fenstern und komplizierten Mustern verzierte Rüsche spielte wahrscheinlich eine Rolle bei der Artenerkennung, der Wärmeregulierung und möglichen Kampfdarstellungen.\nTriceratops war ein pflanzenfressender Vierbeiner, der in verschiedenen Umgebungen von Wäldern bis hin zu Ebenen lebte. Sein robuster Schnabel ermöglichte es ihm, Pflanzen effizient zu beschneiden, und seine kräftigen Kiefer konnten zähes Pflanzenmaterial zerkleinern. Versteinerte Beweise für Triceratops-Knochen deuten darauf hin, dass der Tier möglicherweise an sozialen Verhaltensweisen und hierarchischen Interaktionen innerhalb von Herden beteiligt war."
 dubois.2115.t: "Tyrannosaurus Rex"
 dubois.2115.f: "Tyrannosaurus rex, allgemein als T. rex bezeichnet, ist ein ikonischer und kolossaler Raubdinosaurier, der in der späten Kreidezeit, vor etwa 68 bis 66 Millionen Jahren, die Erde durchstreifte. T. rex gehörte zur Gruppe der Theropoden der Dinosaurier und stand an der Spitze der prähistorischen Nahrungskette als einer der größten Landraubtiere aller Zeiten.\nT. rex war für seine besonderen Merkmale bekannt und verfügte über eine gewaltige Statur mit einer Länge von bis zu 40 Fuß und etwa 15 bis 20 Fuß groß. Sein imposanter Schädel, ausgestattet mit gezackten, bananengroßen Zähnen, deutet auf eine fleischfressende Ernährung hin, die hauptsächlich aus anderen Dinosauriern bestand. Seine kräftigen Hinterbeine waren für schnelle Bewegungen geeignet, während seine unverhältnismäßig kleinen Arme, die an verkümmerte Strukturen erinnern, weiterhin wissenschaftliche Untersuchungen fesseln.\nPaläontologische Beweise deuten darauf hin, dass T. rex ein Raubtier an der Spitze gewesen sein könnte, das seinen ausgeprägten Geruchssinn nutzte, Fernglas Vision und beeindruckende Kieferkraft, um sich seinen Platz an der Spitze des prähistorischen Ökosystems zu sichern. Die Debatte über sein Jagdverhalten, sei es als aktiver Raubtier oder Aasfresser, bleibt Gegenstand laufender Forschung und Spekulationen."
 dubois.2116.t: "Stegosaurus"
 dubois.2116.f: "Stegosaurus ist eine ikonische Gattung pflanzenfressender Dinosaurier, die in der späten Jurazeit vor etwa 155 bis 150 Millionen Jahren gedieh. Der als Thyreophoran eingestufte Stegosaurus wird für sein unverwechselbares und markantes Aussehen gefeiert.\nStegosaurus war ein mittelgroßer Dinosaurier mit einem einzigartigen Profil und zeichnete sich durch seine doppelte Reihe großer Knochenplatten entlang seines Rückens und die Reihe beeindruckender Stacheln oder Schwanz-Thagomizer aus. Der Zweck seiner Platten, sei es zur Temperaturregulierung, zur Präsentation oder zur Verteidigung, bleibt Gegenstand wissenschaftlicher Debatten.\nMit einer Länge von bis zu 30 Fuß und einem relativ kleinen Kopf, der mit einem Schnabel und Backenzähnen zur Verarbeitung von Pflanzenmaterial ausgestattet ist, ist Stegosaurus war ein spezialisierter Pflanzenfresser. Wahrscheinlich fraß er in seiner jurassischen Umgebung tief liegende Vegetation.\nFossilien von Stegosaurus wurden hauptsächlich im Westen Nordamerikas, einschließlich Colorado und Utah, entdeckt und bieten wertvolle Einblicke in die Anatomie, das Verhalten und die Evolutionsgeschichte der Thyreophoran-Dinosaurier. Die Besonderheit des Stegosaurus hat ihn zu einer beliebten und dauerhaften Figur in der Paläontologie und Populärkultur gemacht."
 dubois.2112.h: "Zurück zur nordamerikanischen Abteilung."
 dubois.2121.t: "Abteilung für südamerikanische Dinosaurier"
 dubois.2121.d: "Welches Dinosaurierskelett wollen Sie besuchen?"
 dubois.2121.f: "Ende des 19. Jahrhunderts wurden in den patagonischen Massiven Südamerikas zunehmend Dinosaurierknochen gefunden. Zu den frühesten Vertretern zählen Antarctosaurus und Argyrosaurus."
 dubois.2121.g: "Antarctosaurus."
 dubois.2121.h: "Argyrosaurus."
 dubois.2122.t: "Antarctosaurus"
 dubois.2122.f: "Antarctosaurus stellt eine bemerkenswerte Gattung sauropoder Dinosaurier dar, die in der späten Kreidezeit, vor etwa 70 bis 65 Millionen Jahren, auf dem antiken Kontinent Gondwana lebten. Antarctosaurus gehört zu den Titanosauriern und ist ein Beispiel für die Vielfalt der Sauropodenformen, die einst die Erde durchstreiften.\nAntarctosaurus zeichnete sich durch seine enorme Größe aus und war ein kolossaler, vierbeiniger Pflanzenfresser, der eine Länge von bis zu 60 Fuß oder mehr erreichte. Sein verlängerter Hals und Schwanz sowie der relativ kleine Kopf weisen auf eine Anpassung an die Nahrungsaufnahme von Vegetation hoch über dem Boden hin. Dieser Titanosaurier ist für seine robuste Gliedmaßenstruktur bekannt, die wahrscheinlich sein Gewicht trug und seine Bewegung erleichterte.\nFossilien von Antarctosaurus wurden hauptsächlich auf den südlichen Kontinenten, einschließlich Südamerika und der Antarktis, entdeckt, wo sie wertvolle Einblicke in die Entwicklung und Verbreitung lieferten von Sauropoden in der Oberkreide. Diese Erkenntnisse tragen zu unserem Verständnis der einzigartigen Ökosysteme bei, die in dieser Zeit in Gondwana existierten."
 dubois.2123.t: "Argyrosaurus"
 dubois.2123.f: "Argyrosaurus ist eine bedeutende Gattung sauropoder Dinosaurier, die während der späten Kreidezeit, vor etwa 90 bis 70 Millionen Jahren, die antiken Landschaften Südamerikas durchstreifte. Argyrosaurus gehört zur Untergruppe der Sauropoden, die als Titanosaurier bekannt sind, und bietet Einblicke in die vielfältige prähistorische Fauna der Region.\nWährend bestimmte Aspekte seiner Biologie und seines Verhaltens spekulativ bleiben, bleibt Argyrosaurus ein fesselndes Thema paläontologischer Studien, das Licht auf die Größe und Komplexität von Argyrosaurus wirft Die prähistorische Vergangenheit der Erde auf der Südhalbkugel."
 dubois.2122.h: "Zurück zur südamerikanischen Abteilung."
 dubois.2131.t: "Abteilung für europäische Dinosaurier"
 dubois.2131.d: "Welches Dinosaurierskelett wollen Sie besuchen?"
 dubois.2131.f: "Seit dem frühen 19. Jahrhundert wurden in europäischen Bergmassiven immer wieder neue Dinosaurierfossilien ausgegraben, nicht zuletzt als Folge des zunehmenden Bergbaus. Bekannt sind unter anderem Iguanodon und Plateosaurus."
 dubois.2131.g: "Iguanodon."
 dubois.2131.h: "Plateosaurus."
 dubois.2132.t: "Iguanodon"
 dubois.2132.f: "Iguanodon ist eine bemerkenswerte Gattung pflanzenfressender Dinosaurier, die in der frühen Kreidezeit vor etwa 140 bis 120 Millionen Jahren gedieh. Iguanodon wurde als Iguanodontid klassifiziert und spielte eine entscheidende Rolle bei der Gestaltung unseres Verständnisses der Anatomie und des Verhaltens von Dinosauriern.\nIguanodon zeichnete sich durch seinen charakteristischen Daumendorn und seine schnabelartige Schnauze aus eine faszinierende Kombination aus zweibeiniger und vierbeiniger Fortbewegung. Es wird angenommen, dass sein Daumendorn, der einst für ein Horn gehalten wurde, zur Verteidigung gegen Raubtiere oder zur Manipulation der Vegetation verwendet wurde.\nIguanodon bewohnte verschiedene Umgebungen, darunter Wälder und Ebenen, und war ein geschickter Pflanzenfresser, der seinen zahnlosen Schnabel zum Ernten nutzte Vegetation. Mit einer Länge von bis zu 33 Fuß war er ein bedeutender Pflanzenfresser seiner Zeit und beeinflusste die Ökosysteme, in denen er lebte. Fossilien von Iguanodon wurden erstmals in Europa entdeckt, insbesondere in Belgien und England, und ihre Erforschung spielte eine entscheidende Rolle bei der Entwicklung des Fachgebiets der Paläontologie."
 dubois.2133.t: "Plateosaurus"
 dubois.2133.f: "Plateosaurus ist eine bedeutende Gattung pflanzenfressender Dinosaurier, die während der späten Trias vor etwa 214 bis 204 Millionen Jahren blühte. Der als Prosauropod klassifizierte Plateosaurus bietet entscheidende Einblicke in die frühe Entwicklung der Dinosaurier und ihre Anpassungen an unterschiedliche Umgebungen.\nPlateosaurus zeichnete sich durch seinen verlängerten Hals, seinen kleinen Kopf und seinen relativ langen Schwanz aus und zeigte eine zweibeinige und vierbeinige Fortbewegung, was ein Übergangsstadium der Dinosaurier widerspiegelt Evolution. Seine robusten Gliedmaßen und seine Fähigkeit, Gewichte zu tragen, ermöglichten es ihm, effizient nach Vegetation zu suchen und sich in seinem Lebensraum zurechtzufinden.\nMit einer geschätzten Länge von bis zu 30 Fuß war Plateosaurus ein dominanter Pflanzenfresser seiner Zeit und bewohnte verschiedene Landschaften, von Überschwemmungsgebieten bis hin zu Hochlandwäldern. Seine breiten, blattförmigen Zähne erleichterten den Verzehr von Pflanzenmaterial."
 dubois.2132.h: "Zurück zur europäischen Abteilung."
 dubois.2141.t: "Abteilung für afrikanische Dinosaurier"
 dubois.2141.d: "Welches Dinosaurierskelett wollen Sie besuchen?"
 dubois.2141.f: "Erst zu Beginn des 20. Jahrhunderts erlebte die Paläontologie in Afrika einen bedeutenden Aufschwung, wobei vor allem Tansania und Südafrika, aber auch Ägypten hervorzuheben sind. Wichtige Entdeckungen waren der Giraffatitan und der Spinosaurus."
 dubois.2141.g: "Giraffatitan."
 dubois.2141.h: "Spinosaurus."
 dubois.2142.t: "Giraffatitan"
 dubois.2142.f: "Giraffatitan, früher bekannt als Brachiosaurus, ist eine bemerkenswerte Gattung kolossaler, langhalsiger Dinosaurier, die während der späten Jurazeit vor etwa 154 bis 150 Millionen Jahren blühten. Der als Sauropod klassifizierte Giraffatitan ist für seine außergewöhnliche Größe und seine einzigartigen Anpassungen bekannt.\nGiraffatitan zeichnet sich durch seinen verlängerten Hals und seinen relativ kurzen Schwanz aus und zeigte eine charakteristische Haltung, bei der die Vorderbeine länger als die Hinterbeine waren, was es ihm ermöglichte, die Vegetation hoch über ihm zu erreichen Boden. Mit einer Höhe von bis zu 39 Fuß und einer Länge von über 80 Fuß galt es als eines der höchsten und längsten Landtiere, die es je gab.\nGiraffatitan war ein Pflanzenfresser, der wahrscheinlich üppige Umgebungen wie Flusstäler und Überschwemmungsgebiete bewohnte es konnte auf reichlich pflanzliche Nahrung zugreifen. Seine große Körpermasse wurde von robusten Gliedmaßenknochen und einer massiven, tonnenförmigen Brust getragen. Fossile Beweise für Giraffatitan wurden vor allem in Afrika ausgegraben, insbesondere im heutigen Tansania und Simbabwe."
 dubois.2143.t: "Spinosaurus"
 dubois.2143.f: "Spinosaurus ist eine bemerkenswerte Gattung fleischfressender Dinosaurier, die in der Kreidezeit, vor etwa 112 bis 93 Millionen Jahren, Nordafrika bewohnte. Der als Theropod klassifizierte Spinosaurus wird für seine besonderen Merkmale und einzigartigen Anpassungen gefeiert.\nEs wird angenommen, dass Spinosaurus ein semiaquatisches Raubtier war, das sich wahrscheinlich auf die lange Schnauze, die segelartige Rückenflosse und die kräftigen, krokodilähnlichen Kiefer spezialisiert hat Jagd auf Wasserbeute wie Fische und andere Meerestiere. Sein Segel könnte eine Rolle bei der Thermoregulation oder der Artenerkennung gespielt haben.\nMit einer geschätzten Länge von bis zu 50 bis 59 Fuß gilt Spinosaurus als einer der größten theropoden Dinosaurier. Seine robusten Gliedmaßen und sein verlängerter Schädel lassen auf Anpassungen für den Fang und Verzehr von Wasserbeute schließen und unterstreichen seine ökologische Nische. Fossile Überreste des Spinosaurus wurden zunächst in Ägypten und später in Marokko entdeckt."
 dubois.2142.h: "Zurück zur afrikanischen Abteilung."
 dubois.2151.t: "Abteilung für asiatische Dinosaurier"
 dubois.2151.d: "Welches Dinosaurierskelett wollen Sie besuchen?"
 dubois.2151.f: "Eine erste US-Expedition in die Mongolei im ersten Drittel des 20. Jahrhunderts sollte zur Entdeckung neuer Dinosaurierarten in Asien führen. Psittacosaurus und Velociraptor gehören zu den am längsten bekannten Arten."
 dubois.2151.g: "Psittacosaurus."
 dubois.2151.h: "Velociraptor."
 dubois.2152.t: "Psittacosaurus"
 dubois.2152.f: "Psittacosaurus ist eine bemerkenswerte Gattung kleiner, pflanzenfressender Dinosaurier, die in der frühen Kreidezeit, vor etwa 126 bis 101 Millionen Jahren, in Asien lebten. Psittacosaurus gilt als Ceratopsier und zeichnet sich durch seine faszinierenden Merkmale und Beiträge zu unserem Verständnis der Dinosaurierevolution aus.\nPsittacosaurus zeichnete sich durch seinen papageienähnlichen Schnabel, seinen gedrungenen Körper und die charakteristische Reihe von gesäumten, federartigen Strukturen entlang seines Schwanzes und Körpers aus ein einzigartiges Aussehen unter Dinosauriern. Es wird angenommen, dass diese Federkielknöpfe borstenartige Strukturen trugen, möglicherweise zur Darstellung oder zur Wärmeregulierung.\nMit einer Länge von etwa 3 bis 6,5 Fuß bewohnte Psittacosaurus eine Vielzahl von Umgebungen, darunter Wälder und Ebenen. Sein Schnabel und seine speziellen Zähne lassen auf Anpassungen für die Verarbeitung vielfältiger Pflanzenmaterialien schließen. Fossile Überreste des Psittacosaurus wurden vor allem in China und der Mongolei entdeckt."
 dubois.2153.t: "Velociraptor"
 dubois.2153.f: "Velociraptor ist eine bekannte Gattung kleiner bis mittelgroßer fleischfressender Dinosaurier, die in der späten Kreidezeit vor etwa 75 bis 71 Millionen Jahren Teile Asiens durchstreiften. Der als dromaeosaurider Theropod klassifizierte Velociraptor wird für seine bemerkenswerten Anpassungen und seine Rolle bei der Gestaltung der öffentlichen Wahrnehmung von Dinosauriern gefeiert.\nVelociraptor zeichnete sich durch seine scharfen, gebogenen Zehenklauen und gut entwickelten Raubtiermerkmale aus und war ein agiles und intelligentes Raubtier. Er besaß einen schlanken Körper, einen langen Schwanz und eine markante sichelförmige Klaue an jedem Fuß, die er wahrscheinlich zum Zerschneiden seiner Beute benutzte.\nIm Gegensatz zu früheren Darstellungen war Velociraptor mit einer Länge von etwa 6,5 ​​Fuß und einem Gewicht relativ klein etwa 50 Pfund. Seine scharfen Sinne, scharfen Zähne und sein Rudeljagdverhalten, wie aus Fossilienfunden und Studien hervorgeht, trugen zu seinem Ruf als beeindruckendes Raubtier bei."
 dubois.2152.h: "Zurück zur asiatischen Abteilung."
 dubois.2161.t: "Abteilung für australische Dinosaurier"
 dubois.2161.d: "Welches Dinosaurierskelett wollen Sie besuchen?"
 dubois.2161.f: "1926 wurden in Australien erstmals Dinosaurierknochen entdeckt, was den Beginn intensiverer Forschungen markierte. Später erlangte der Muttaburrasaurus Berühmtheit."
 dubois.2161.g: "Muttaburrasaurus."
 dubois.2161.h: "Rhoetosaurus."
 dubois.2162.t: "Muttaburrasaurus"
 dubois.2162.f: "Muttaburrasaurus ist eine bemerkenswerte Gattung ornithopodischer Dinosaurier, die Australien während der frühen Kreidezeit vor etwa 112 bis 99 Millionen Jahren bewohnte. Muttaburrasaurus gilt als Leguanzahnarzt und bietet wertvolle Einblicke in die prähistorische Fauna dieser Region.\nMuttaburrasaurus zeichnete sich durch seinen markanten, hohlen und abgerundeten Kamm auf der Schnauze aus und besaß einen mittelgroßen Körper, der eine Länge von etwa 20 bis 30 Fuß erreichte. Seine kräftigen Kiefer waren mit einer Reihe von Zähnen ausgestattet, die zum Zermahlen von Pflanzenmaterial geeignet waren, was auf eine pflanzenfressende Ernährung schließen lässt.\nDas Vorhandensein des Schädelkamms, der möglicherweise als Resonanzkammer für Lautäußerungen oder als Anzeigestruktur gedient hat, unterscheidet Muttaburrasaurus von anderen Ornithopoden . Seine robusten Gliedmaßen und seine relativ große Größe lassen auf Anpassungen für eine effiziente Fortbewegung und Pflanzenfresser schließen."
 dubois.2163.t: "Rhoetosaurus"
 dubois.2163.f: "Rhoetosaurus ist eine bemerkenswerte Gattung sauropoder Dinosaurier, die im Mittleren Jura vor etwa 165 Millionen Jahren in Australien lebten. Rhoetosaurus gehört zur Gruppe der Sauropodomorphen und bietet einen entscheidenden Einblick in die alte Geschichte der australischen Dinosaurier.\nRhoetosaurus zeichnete sich durch seine enorme Größe aus und war ein kolossaler, pflanzenfressender Vierbeiner mit langem Hals, robusten Gliedmaßen und einem relativ kleinen Kopf. Obwohl Rhoetosaurus im Vergleich zu einigen seiner Sauropoden-Verwandten relativ kleiner ist, war er immer noch etwa 50 Fuß lang und damit eines der größten Tiere seiner Zeit in Australien.\nDie Fossilien von Rhoetosaurus wurden erstmals in Queensland, Australien, entdeckt und sind einige davon der früheste Nachweis von Sauropodendinosauriern in dieser Region. Seine anatomischen Merkmale, wie sein langer Hals und sein relativ verlängerter Schwanz, spiegeln Anpassungen an die Pflanzenfresser und die Nutzung einer Vielzahl pflanzlicher Ressourcen wider."
 dubois.2162.h: "Zurück zur australischen Abteilung."
 dubois.2112.d_perfect_dinosaur: "Dieses Dinosaurierskelett gilt als perfekt zusammengebaut. Es muss nicht geändert werden und gibt eine maximale Dinosaurier-Bewertung."
 dubois.2112.d_imperfect_dinosaur: "Dieses Dinosaurierskelett gilt als unvollständig zusammengebaut. Es gibt nur die Hälfte der möglichen Dinosaurier-Bewertung. Es kann von einem [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] wieder zusammengesetzt werden, sofern er nicht beschäftigt oder erschöpft ist."
 dubois.2112.d_poor_dinosaur: "Dieses Dinosaurierskelett gilt als schlecht zusammengebaut. Es schadet unserer Dinosaurier-Bewertung massiv. Es kann von einem [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] neu zusammengesetzt werden, sofern er nicht beschäftigt oder erschöpft ist."
 dubois.2112.g: "Bauen Sie dieses Dinosaurierskelett wieder zusammen."
