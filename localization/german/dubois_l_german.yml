 dubois.138.t: "Erdmännchen"
 dubois.138.d: "Unser Zoo ist um ein neues, exotisches Tier reicher: Heute ist das lange erwartete #O Erdmännchen#! in sein neues Gehege eingezogen."
 dubois.138.f: "Das Erdmännchen ist ein kleines Mungo, das in Afrika lebt. Erdmännchen sind äußerst sozial und leben in Rudeln von bis zu 30 Tieren zusammen. Normalerweise leben sie in Höhlen oder Bauten, in denen sie sich vor Raubtieren verstecken können. Normalerweise ist mindestens ein Erdmännchen damit beschäftigt, nach Gefahren Ausschau zu halten und das Rudel zu warnen. Die Aufgabe des Aufpassens wird zwischen den Tieren abwechselnd übernommen."
 dubois.138.g: "Wie süß!"
 visit_meerkat_tt: "Sie besuchen das Gehege der #o Erdmännchen#!"
