 dubois.1031.t: "Die Galerien für australische Naturgeschichte"
 dubois.1031.d: "Eine didaktische Promenade in der Art einer ethnographischen und naturkundlichen Ausstellung: bescheidene Pavillons, die an die Antipoden erinnern, geschnitzte Ornamente aus Ozeanien und ockerfarbene Felsen, die an das Innere Australiens erinnern. Hier wird dem interessierten Publikum die charakteristische Fauna Australasiens in lehrreicher und anständiger Weise präsentiert."
 dubois.1031.g: "Besuchen Sie die #o Grünen Meeresschildkröten#!"
 visit_turtle_tt: "Sie besuchen das Gehege der #o Grünen Meeresschildkröten#!"
 dubois.1031.h: "Besuchen Sie die #o Riesenmantas#!"
 visit_manta_tt: "Sie besuchen das Gehege der #o Riesenmantas#!"
 dubois.1031.i: "Besuchen Sie die #o Koalas#!"
 visit_koala_tt: "Sie besuchen das Gehege der #o Koalas#!"
 dubois.1031.j: "Besuchen Sie die #o Roten Riesenkängurus#!"
 visit_kangaroo_tt: "Sie besuchen das Gehege der #o Roten Riesenkängurus#!"
