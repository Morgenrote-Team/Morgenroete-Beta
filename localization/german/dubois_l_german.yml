 dubois.1049.t: "Elchgehege"
 dubois.1049.d: "Im Waldgehege des Zoos steht ein majestätischer europäischer #o Elch#!, dessen gewaltiges Geweih zum Himmel ragt."
 dubois.1049.f1: "Das ruhige Wesen und die imposante Größe des Elchs ziehen die Aufmerksamkeit der Besucher auf sich, die die schiere Größe dieses sanften Riesen bewundern. Neugierig auf sein beeindruckendes Geweih, wenden Sie sich an einen Tierpfleger, um weitere Informationen zu erhalten.\n\"Europäische Elche oder Elche, wie sie in Nordamerika genannt werden, sind die größten Mitglieder der Hirschfamilie\", erklärt der Tierpfleger. \"Ihr Geweih kann einen Durchmesser von bis zu 1,80 Metern haben und wird hauptsächlich während der Brunftzeit verwendet, wenn die Männchen um ihre Partnerinnen konkurrieren. Dieses Geweih wird jedes Jahr abgeworfen und nachgewachsen, wobei das neue Geweih mit zunehmendem Alter des Elchs größer und komplexer wird.\""
 dubois.1049.f2: "In einer schattigen Ecke des Elchgeheges senkt ein großer männlicher europäischer Elch seinen massiven Kopf, um zarte Triebe und Blätter abzugrasen. Die ruhige, rhythmische Bewegung seines Kiefers beim Kauen ist fast hypnotisch und zieht eine Menge Zuschauer an. Fasziniert von den Fressgewohnheiten des Elchs suchen Sie einen Tierpfleger auf, um mehr zu erfahren.\n\"Elche sind Laubfresser\", erklärt der Tierpfleger. \"Im Gegensatz zu Weidetieren, die hauptsächlich Gras fressen, ernähren sich Elche bevorzugt von einer Vielzahl von Pflanzen, darunter Blätter, Rinde und Wasserpflanzen. Sie haben einen ausgeprägten Geruchssinn, der ihnen hilft, die nährstoffreichsten Pflanzen in ihrer Umgebung zu finden. In freier Wildbahn können sie bis zu 30 Kilogramm Nahrung pro Tag verzehren, was für die Erhaltung ihrer großen Körper notwendig ist.\""
 dubois.1049.f3: "Inmitten der raschelnden Bäume des Geheges stößt ein europäischer Elch plötzlich ein tiefes, hallendes Brüllen aus, dessen Ruf durch die Luft hallt. Der Klang erregt die Aufmerksamkeit aller in der Nähe, die innehalten, um diesem Urschrei zu lauschen. Neugierig auf die Bedeutung dieses Lauts, wenden Sie sich an einen Tierpfleger, um mehr zu erfahren.\n\"Das war ein Brunftruf\", erklärt der Tierpfleger. \"Während der Paarungszeit verwenden männliche Elche diese lauten Laute, um ihre Dominanz zu beweisen und Weibchen anzulocken. Der Ruf ist über weite Entfernungen zu hören und wird oft von Geweihpräsentationen und aggressivem Gehabe begleitet. Er ist eine eindringliche Erinnerung an die Rolle des Elchs als dominante Kraft in seinem natürlichen Lebensraum.\""
