 dubois.128.t: "Elch"
 dubois.128.d: "Unser Zoo ist um ein neues, exotisches Tier reicher: Heute ist der lange erwartete #O Elch#! in sein neues Gehege eingezogen."
 dubois.128.f: "Der Europäische Elch, in Nordamerika auch als Moose bekannt, ist das größte Mitglied der Hirschfamilie. Diese einzelgängerischen Riesen sind in den Wäldern Europas und Asiens beheimatet und für ihr gewaltiges Geweih bekannt, das die Männchen jedes Jahr abwerfen und nachwachsen lassen. Elche sind Laubfresser, die sich von Blättern, Rinde und Wasserpflanzen ernähren. Trotz ihrer Größe sind sie wendig und gut an ihre kalten, bewaldeten Lebensräume angepasst."
 dubois.128.g: "Majestätisch!"
 visit_elk_tt: "Sie besuchen das Gehege der #o Elche#!"
