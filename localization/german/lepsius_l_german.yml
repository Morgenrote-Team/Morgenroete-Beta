 lepsius.17.manco: "Die #E Mascapaicha von Huayna Capac#! ist das herausragendste Artefakt aus dem Inka-Reich.\n"
 lepsius_mascapaicha_knowledge_modifier: "Wissen der Ältesten"
 je_lepsius_mascapaicha: "Entschlüsselung des Quipu"
 je_lepsius_mascapaicha_reason: "Die Quipu-Untersuchung hat bisher mehr Fragen aufgeworfen als beantwortet. Fest steht: Es handelt sich um eine Benennung von Orten, die einer Reihenfolge zugeordnet werden können, wobei Zahlen verschiedene Stämme repräsentieren, deren Reihenfolge wiederum eine Art Route angibt. Kurz gesagt: Der Quipu ist eine Art Schatzkarte. Nur ein erfahrener Archäologe kann dieses Geheimnis vollständig entschlüsseln. Was die Inkas so sorgfältig verbargen, ist noch unklar; um es zu bergen, sollten wir ein kleines Spezialteam zusammenstellen, das nicht aus einem gewöhnlichen Expeditionsteam besteht: Neben dem Archäologen und dem Attaché brauchen wir auch einen Piloten, der uns direkt in die Anden fliegt."
 je_lepsius_mascapaicha_success: "Hat den Quipu entschlüsselt."
 lepsius_decode_quipu_button: "Entschlüsseln Sie den Quipu"
 lepsius_decode_quipu_button_desc: "Um das Quipu erfolgreich zu entschlüsseln, bedarf es eines erfahrenen oder berühmten Archäologen und einer auf mesoamerikanische Artefakte spezialisierten Abteilung."
 lepsius_decode_quipu_tt: "Der Quipu wird nach einiger Zeit entschlüsselt."
 lepsius_decode_quipu_done_tt: "Entschlüsseln Sie den Quipu."
 lepsius.474.t: "Der geheimnisvolle Quipu"
 lepsius.474.d: "Der peruanische Führer führte das Expeditionsteam zu einem geheimen Ort, von dem selbst viele Einheimische nichts wissen. Sie finden einen seltsamen Gegenstand in einem verlassenen Tempelgebäude, das seit mindestens vierhundert Jahren nicht mehr betreten wurde."
 lepsius.474.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] spürt sofort, dass dieser Ort etwas Einzigartiges hat. Dieser Tempel scheint vor der spanischen Eroberung verlassen worden zu sein. Nicht die Invasion, sondern das Vergessen führte zum Untergang des Gebäudes. Auf den ersten Blick gab es enttäuschend wenige Überreste, die Aufschluss über das Leben der Inkas vor Francisco Pizarros Ankunft geben. Das Team begnügt sich mit den obligatorischen archäologischen Übungen, als ein Assistent einen ominösen Gegenstand auf einem altarähnlichen Block findet. Es ist ein Quipu, das Knotenbündel, mit dem die Inka Zahlen, Statistiken und Daten übermittelten. Allerdings ist es so komplex, dass es vor Ort nur schwer zu entschlüsseln ist."
 lepsius.474.g: "Es sollte zu Hause genauer untersucht werden."
 lepsius.571.t: "Geheimnis des Quipu"
 lepsius.571.d: "Selbst den Akademikern zu Hause fällt es schwer, den Quipu zu entschlüsseln, den die letzte Peru-Expedition mitgebracht hat. Wissenschaftler sind sich mittlerweile einig, dass es sich um mehr als nur eine Zahlenaufzeichnung handelt."
 lepsius.571.f: "Nach näherer Betrachtung und Vergleichen mit bisher bekannten Knotensystemen kamen Wissenschaftler mehrerer Universitäten und Mitarbeiter des Archäologischen Museums zu dem Schluss, dass es sich bei den Knoten um ein bereits bekanntes System handelt. Auf den ersten Blick machte das wenig Sinn – vorausgesetzt, es handelte sich um eine reine Steuerliste oder eine Volkszählung. In Wirklichkeit handelt es sich um eine Ansammlung von Orten. Die Namen waren aus anderen Quipu-Aufzeichnungen bekannt, beziehen sich jedoch weniger auf Ortsnamen als vielmehr auf die Siedlungspunkte bestimmter Clans. Die am weitesten verbreitete Theorie besagt, dass er einer Wegbeschreibung ähnelt. Wohin er führt, ist unklar."
 lepsius.571.g: "Dieses Knotenbündel... ist eine Karte?"
 lepsius.572.t: "Suche nach der Mascapaicha"
 lepsius.572.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] glaubt nicht nur, dass [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] den Ort entdeckt hat, zu dem die verschlüsselte Karte führt – [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] hat auch eine Theorie darüber, wohin sie führen könnte. Zusammen mit [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] und [SCOPE.sCharacter('lepsius_archaeologist_attache').GetFullName] begibt sich [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] auf eine Sondermission in die höchsten Höhen der Anden."
 lepsius.572.f: "Es war schwierig, dem Quipu das Geheimnis zu entlocken. Es wurde bestätigt, dass die Notizen geografischer Natur waren und zu einem Ort führen sollten; Ein Ort, der so abgelegen war, dass er fast unmöglich zu erreichen war. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] hatte darauf hingewiesen, dass man sich keine allzu großen Hoffnungen machen sollte, in dieser unwirtlichen Gegend eine Landebahn zu finden, die groß genug ist, um ein Flugzeug wieder zum Boden zu bringen. Den militärischen Aufzeichnungen zufolge befand sich für diesen Zweck jedoch ein geeignetes Plateau in der Nähe des Zielortes. Davon waren es nur etwa 10 Meilen zu Fuß. Auf dem Flug nach Peru erläuterte Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] den beiden [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis]e Theorie darüber, was dort sein könnte. Die Tatsache, dass das Gebäude, in dem sich das Quipu befand, lässt vermuten, dass es wahrscheinlich zur Zeit des Kaisers Huayna Capac erbaut wurde, bevor das Inkareich im Bürgerkrieg zwischen Huascar und Atahualpa unterging. An der Stelle, so spekulierte er, könnte sich etwas aus der Zeit vor dem Zusammenbruch des Reiches und seinem anschließenden Untergang befinden. Etwas, das die imperiale Einheit und Größe der Inkas repräsentierte und so wertvoll war, dass es Atahualpa verborgen blieb, weil er von vielen für einen illegitimen Herrscher gehalten wurde, der einen Putsch gegen seinen Bruder Huascar inszeniert hatte. Ein Objekt, das wie kein anderes die Macht der Sapa-Inka repräsentierte und als verschollen galt: die Krone von Huayna Capac. Die Mascapaicha."
 lepsius.572.g: "Das wäre eine archäologische Sensation."
 lepsius.573.d: "[SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] findet einen geeigneten Landeplatz in der Nähe des Ziels. Doch auf dem Weg zum vermuteten Standort der Mascapaicha stößt das Trio bald auf eine spektakuläre Entdeckung."
 lepsius.573.f: "Mit dem Quipu in [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis]er Hand führte [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] die kleine Gruppe wie eine Wünschelrutenroute zu einem Berghang. Stufen waren dort wie Keile in schwindelerregender Höhe angebracht. Das Trio steigt die ersten Meter hinauf und findet dann einen verwilderten Weg. Eine kurze Besichtigung durch den Archäologen lässt keinen Zweifel. Die präzise platzierten Quader stammen eindeutig aus der Zeit der Inkas. Sie folgen der Inkastraße in ein von Nebel dominiertes Tal, das vom Flugzeug aus nicht sichtbar war. Sie waten Kilometer für Kilometer durch. Plötzlich entdeckt [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] etwas. Trotz des Nebels sticht ein Funkeln aus dem Dunst hervor. Es ist Gold. Reines Gold. Massives Gold! Ein riesiges Idol, so hoch wie ein dreistöckiges Gebäude, ragt aus dem Nebel hervor. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] verlässt den Weg und nähert sich. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] möchte [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] zurückrufen, dass dies eine Falle sein könnte. Die Ablenkung könnte gefährlich sein. [SCOPE.sCharacter('lepsius_attache_scope').GetLastName] bleibt jedoch unentschieden."
 lepsius.573.g: "Ein bisschen Gold kann nicht schaden."
 lepsius.573.h: "Nur der bescheidene Mann wird die Mascapaicha finden."
 lepsius.574.d: "Das Trio setzte seinen Weg fort. Doch plötzlich findet [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] etwas, das ihn aufhält. [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] und [SCOPE.sCharacter('lepsius_attache_scope').GetFullName] sind bereits mehrere Meter gelaufen, als sie bemerken, dass der Professor fehlt."
 lepsius.574.f: "Es war eine Inschrift. Eine Inschrift? Epigraphische Quellen in den Anden? In einer Gesellschaft, deren Knotensystem keine dem Alphabet entsprechende Funktion hatte? Das allein war eine unglaubliche Entdeckung! Die Maya stützten sich auf Hieroglyphen, die Azteken stützten ihre Kodizes auf Piktogramme. Aber das war eine Schriftart mit buchstabenähnlichen Akzenten. Könnte das passiert sein? Und was [SCOPE.sCharacter('lepsius_archaoelogist_scope').GetLastName] noch mehr verblüffte:\n[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] konnte sie lesen.\nOhne Vorkenntnisse. Ohne zu studieren. Ohne jemals auch nur annähernd zu verstehen, wie das passieren konnte. Es war, als ob [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] einen Finger in die geschnitzte Schrift tauchte und den Inhalt aufnahm. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] hat sie nicht gelesen. Die Schrift sprach zu [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim]. Und je länger [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] eintauchte, desto überwältigender war, was [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] lernte. Denn hier wurde Wissen gespeichert. Jahrhundertealtes, jahrtausendealtes Wissen aus allen Kulturen Süd- und Mittelamerikas. Völlig in diese glorreiche Entdeckung vertieft, bemerkt [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] nicht, wie der Attaché [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] schüttelt, versuchte [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] wegzuzerren – der Pilot steht unentschlossen daneben und betrachtet die absurde Szene vor sich."
 lepsius.574.g: "Wissen ist keine Sünde."
 lepsius.575.d: "Die Gruppe erreicht ein Gebäude, das dem Tempel, in dem einst der mysteriöse Quipu gefunden wurde, nicht unähnlich ist. Sie betreten das Gebäude, angeführt von [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], der sich forschend umsieht. Das schreckliche Bild eines Dämons nimmt die Wand vor ihnen ein."
 lepsius.575.f: "Der ewige Nebel, der das unbekannte Tal plagte, verdunkelte auch den Tempel. Es bedeckte Wände und Statuen wie ein schönes Kleid. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] zündete sich eine Zigarette an und fügte dem Nebel eine Nikotinnote hinzu. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] suchte die Gegend nach Hinweisen ab. Aber [SCOPE.sCharacter('lepsius_attache_scope').GetLastName] hat nichts bemerkt. [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] stand dem Dämonenbild wie hypnotisiert gegenüber. [SCOPE.sCharacter('lepsius_attache_scope').GetHerHis]e Augen blickten in die Grimasse des Urwesens. Der Wind flüsterte in [SCOPE.sCharacter('lepsius_attache_scope').GetHerHis]e Ohren. Wind, der zu Worten wurde. Worte, die [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] zuflüsterten, niederzuknien. Es war heiliger Boden, auf dem [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] stand. Der Boden eines Gottes, vor dem [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] sich beugen musste. Ein Gott, der ein Herr der Welt war. Der Bettler zu Königen erhob und ihnen die Königreiche der Welt anvertraute. Ein Gott, der alle Herrscher der Welt, ob Fürsten oder Gewählte, vor [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] zu Fall brachte. \"Ich werde dir die ganze Macht und Herrlichkeit dieser Königreiche geben; denn sie gehören mir und ich gebe sie, wem ich will. Wenn du dich vor mir niederwirfst und mich anbetest, wird alles dir gehören.\"\nZigarettenrauch wirbelte um [SCOPE.sCharacter('lepsius_attache_scope').GetLastName]. Der Pilot sprach in wirren Worten und versuchte, [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] etwas Sinnvolles einzuhauchen. Der Archäologe ist nur als Zuschauer da."
 lepsius.575.g: "Sie müssen entscheiden, ob Sie Mascapaicha wollen."
 lepsius.576.t: "Die Mascapaicha"
 lepsius.576.d: "Zum ersten Mal seit ihrer Ankunft im Tal lichtete sich der Nebel. In einer verborgenen Kammer, die Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] freigelegt hat, gibt es nichts als ein Podest. Darüber thront ein Schatten. Es ist der Schatten eines gefallenen Reiches. Der Schatten verschwundenen Wissens. Der Schatten von verlorenem Gold. Es ist der Schatten der Mascapaicha, der Krone des Sapa Inca."
 lepsius.576.f: "Der Mascaipacha war das kaiserliche Symbol, das nur vom Sapa-Inka als König von Cusco und Kaiser der Tawantinsuyu getragen wurde. Es handelte sich um einen Kranz aus Schichten vielfarbiger Zöpfe, an dem der Latu hing, eine Franse aus feinster roter Wolle mit roten Quasten, die an goldenen Röhren befestigt waren. Es war mit Goldfäden und einem Büschel verziert, das zwei oder drei aufrechte Federn des Bergkarakaras trug, eines heiligen Vogels, der auf Spanisch Corequenque genannt wird. Es war der physische Ausdruck der ultimativen politischen Macht im Inkareich. Bei einigen Zeremonien trug der Sapa-Inka den Mascaipacha in der Hand, während er einen Kriegskopfschmuck (einen mit Federn verzierten Helm) trug."
 lepsius.576.g: "Das muss die Krone von Huayna Capac sein!"
 lepsius.577.t: "Tod in den Anden"
 lepsius.577.d: "Die Sondermission in den Anden wurde nie wieder gesehen. Kein Lebenszeichen. Keine Spuren. Es scheint, dass die Suche der Expedition nach dem Mascapaicha tödlich endete."
 lepsius.577.f: "Als Wissenschaftler und Geheimdienstler vom Fortgang der Expedition in den Anden erfahren, können sie keine Hinweise darauf erhalten. Nur das Flugzeug der vermissten Besatzung bleibt als einziger Beweis dafür übrig, dass es stattgefunden haben muss. Die Einheimischen sagen, dass der Landeplatz ganz in der Nähe eines verfluchten Tals liegen würde. Verflucht, weil die Leute, die es betreten, dort verschwinden. Dort fielen sie den Versuchungen der Dämonen zum Opfer und starben elend. Wissenschaftler haben vermutet, dass Sporen unbekannter Pflanzen, Schwefeldämpfe oder andere Gase für den nebelartigen Dunst verantwortlich sein könnten, der zu Halluzinationen führen könnte."
 lepsius.577.g: "Sind sie Opfer ihrer eigenen Illusionen geworden?"
 lepsius_specialization_egypt_tech: "Ägyptologie"
 lepsius_specialization_egypt_tech_desc: "Der Fokus auf das alte Ägypten führt dazu, dass unsere Archäologen von Anfang an über die Eigenschaft Ägyptologie verfügen. Darüber hinaus erhalten wir für jede Ausgrabung in Ägypten jedes Jahr ein weiteres Artefakt."
 lepsius_specialization_mesopotamia_tech: "Assyriologie"
 lepsius_specialization_mesopotamia_tech_desc: "Der Fokus auf Mesopotamien führt dazu, dass unsere Archäologen von Anfang an über die Eigenschaft Assyriologie verfügen. Darüber hinaus erhalten wir für jede Ausgrabung in Mesopotamien jedes Jahr ein weiteres Artefakt."
 lepsius_specialization_aegean_tech: "Ägäische Archäologie"
 lepsius_specialization_aegean_tech_desc: "Der Fokus auf die ägäischen Zivilisationen führt dazu, dass unsere Archäologen von Anfang über die Eigenschaft Ägäische Archäologie verfügen. Darüber hinaus erhalten wir für jede Ausgrabung in Griechenland oder Kreta jedes Jahr ein weiteres Artefakt."
 lepsius_specialization_precolumbian_tech: "Präkolumbianische Archäologie"
 lepsius_specialization_precolumbian_tech_desc: "Der Fokus auf präkolumbianische Kulturen führt dazu, dass unsere Archäologen von Anfang an über die Eigenschaft Präkolumbianische Archäologie verfügen. Darüber hinaus erhalten wir für jede Ausgrabung in Mittel- oder Südamerika jedes Jahr ein weiteres Artefakt."
 lepsius_has_archaeologist_egypt_specialist_tt: "[GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] mit der Eigenschaft #V Spezialisierung: Ägyptologie#!."
 lepsius_has_archaeologist_mesopotamia_specialist_tt: "[GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] mit der Eigenschaft #V Spezialisierung: Assyriologie#!."
 lepsius_has_archaeologist_aegean_specialist_tt: "[GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] mit der Eigenschaft #V Spezialisierung: Ägäische Archäologie#!."
 lepsius_has_archaeologist_precolumbian_specialist_tt: "[GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] mit der Eigenschaft #V Spezialisierung: Präkolumbianische Archäologie#!."
 je_lepsius_mascapaicha_goal: ""
 je_lepsius_specialization: "Archäologische Spezialisierung"
 je_lepsius_specialization_reason: "Eine Nation kann einmalig einen archäologischen Schwerpunkt wählen. Abhängig von der archäologischen Unterkategorie erhält das Land pro Jahr ein weiteres Artefakt (ägyptisch, mesopotamisch, ägäisch, präkolumbianisch) für jede Ausgrabung. Neue Archäologen erhalten die entsprechende Spezialisierungseigenschaft und finden am Ende der Expedition 5 weitere Artefakte."
 je_lepsius_specialization_success: "[GetPlayer.GetAltName('NOM')] hat eine archäologische Spezialisierung ausgewählt."
 lepsius_archaeological_expedition_specialization_tt: "Dank der Spezialisierung unseres Archäologen erhalten wir zusätzlich #G 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]."
 lepsius_add_1_specialization_clue_tt: "Dank der Spezialisierung unseres Archäologen erhalten wir #G 1#! zusätzlichen Hinweis."
 je_lepsius_alexander: "Das Grab von Alexander"
 je_lepsius_alexander_reason: "Alexander der Große war einer der bedeutendsten Feldherren aller Zeiten und gründete ein Weltreich, aus dem die hellenistischen Reiche hervorgingen. Sein sowohl verehrtes als auch gefürchtetes Grab wurde in der Antike zu einem Wallfahrtsort. Doch spätestens ab dem 5. Jahrhundert n. Chr. war der genaue Standort des Grabes unbekannt. Die meisten Quellen sprechen von Alexandria als letzter Grabstätte, doch auch dies ist nicht ganz unumstritten. Unser vorrangiges Ziel ist die Durchführung einer Ausgrabung – sei es mit Genehmigung oder mit Gewalt – an Orten, an denen Spuren Alexanders gefunden wurden. Indem wir den Hinweisen folgen, können wir das Grab genauer lokalisieren. Dazu müssen wir uns allerdings wie bei einer Schnitzeljagd von einer Ausgrabungsstätte zur nächsten bewegen."
 je_lepsius_alexander_success: "Wenn wir genügend #V Mysteriöse Hinweise#! zu Alexanders Grab finden, können wir es lokalisieren."
 je_lepsius_alexander_goal: ""
 je_lepsius_ark: "Die Bundeslade"
 je_lepsius_ark_reason: "Die Bundeslade ist von höchstem religiösen und archäologischen Wert. Das Volk Israel betrachtete es als Mittelpunkt seines Heiligtums, den Tempel von Jerusalem. Seit den Zeiten Moses war es als Hüter der Zehn Gebote ein Begleiter bei der Rückeroberung des Heiligen Landes. Die Bundeslade war der Garant für die Gegenwart Gottes inmitten der Menschen. Seit der Eroberung Jerusalems durch Nebukadnezar II. (587/586 v. Chr.) gilt es als verschollen. Unser vorrangiges Ziel ist es, an Orten, an denen Spuren der Arche gefunden wurden, eine Ausgrabung durchzuführen – sei es mit Genehmigung oder mit Gewalt. Indem wir den Hinweisen folgen, können wir den wahren Standort genauer lokalisieren. Dazu müssen wir uns allerdings wie bei einer Schnitzeljagd von einer Ausgrabungsstätte zur nächsten bewegen."
 je_lepsius_ark_success: "Wenn wir genügend #V Mysteriöse Hinweise#! zur Arche finden, können wir sie lokalisieren."
 je_lepsius_ark_goal: ""
 je_lepsius_atlantis: "Das Schicksal von Atlantis"
 je_lepsius_atlantis_reason: "Atlantis ist einer der größten menschlichen Mythen der Weltgeschichte. Der Untergang der legendären Stadt ist zum Symbol geworden: Er steht für den Verlust eines Paradieses, die Prophezeiung eines großen Landes im Westen und den Untergang einer hochentwickelten Zivilisation. Zum ersten Mal erwähnt Platon die angeblich mächtige Seemacht, die weite Teile des Mittelmeers beherrschte, bis eine Naturkatastrophe ihr Schicksal besiegelte. Die mögliche Existenz von Atlantis wurde bereits in der Antike diskutiert. Während Autoren wie Plinius der Ältere die Existenz des betreffenden Inselreichs bestritten, hielten andere, wie Krantor, Poseidonios und Strabo, dessen Existenz für denkbar. Unser vorrangiges Ziel ist es, Ausgrabungen – sei es mit Lizenz oder mit Gewalt – an Orten durchzuführen, an denen Spuren von Atlantis gefunden wurden. Indem wir den Hinweisen folgen, können wir die Position der Stadt genauer lokalisieren. Dazu müssen wir uns allerdings wie bei einer Schnitzeljagd von einer Ausgrabungsstätte zur nächsten bewegen."
 je_lepsius_atlantis_success: "Wenn wir genügend #V Mysteriöse Hinweise#! auf Atlantis finden, können wir es lokalisieren."
 je_lepsius_atlantis_goal: ""
 je_lepsius_eldorado: "Die Suche nach El Dorado"
 je_lepsius_eldorado_reason: "Verfolgten die Konquistadoren bloße Märchen und Lügenmärchen? Ohne die Geschichten legendärer Goldvölker hätte Balboa den Pazifik nicht gefunden, Hernando de Soto hätte nicht durch das Gebiet der heutigen USA gewandert. Die Entdeckung der Neuen Welt wäre anders verlaufen. Der Fall Cortés und der Fall Pizarro bestätigten die Legenden. Vielleicht hat es etwas mit der Tatsache zu tun, dass es auf dem amerikanischen Kontinent noch eine unentdeckte, bedeutende Stadt gibt – die archäologischen Fakten sprechen für sich. Unser vorrangiges Ziel ist es, an Orten, an denen Spuren von El Dorado gefunden wurden, Ausgrabungen – sei es mit Genehmigung oder mit Gewalt – durchzuführen. Indem wir Hinweisen folgen, können wir die Stadt genauer lokalisieren. Dazu müssen wir uns allerdings wie bei einer Schnitzeljagd von einer Ausgrabungsstätte zur nächsten bewegen."
 je_lepsius_eldorado_success: "Wenn wir genügend #V Mysteriöse Hinweise#! zu El Dorado finden, können wir es lokalisieren."
