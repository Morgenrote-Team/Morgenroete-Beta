 andersson_anthropologist_desc: "Anthropologen leisten einen wichtigen Beitrag zur Erforschung der frühesten Menschheitsgeschichte, von der Evolution in Afrika bis hin zum Menschen der Steinzeit."
 andersson_anthropologist_experienced_desc: "Dieser Anthropologe hat auf dem Gebiet der Frühgeschichte der Menschheit einige bedeutende Leistungen erbracht und gilt als wissenschaftliche Autorität."
 andersson_anthropologist_famous_desc: "Die zahlreichen Beiträge dieses Forschers zur Anthropologie haben ihn zu einer der bedeutendsten internationalen Persönlichkeiten auf seinem Gebiet gemacht."
 andersson_state_trait_neanderthalensis_cave: "Prähistorische Höhle"
 andersson_state_trait_erectus_cave: "Prähistorische Höhle"
 andersson_state_trait_paranthropus_cave: "Prähistorische Höhle"
 andersson_anthropology_tech: "Anthropologie"
 andersson_anthropology_tech_desc: "Die Paläoanthropologie oder einfach Anthropologie ist ein Teilgebiet der Paläontologie und der Anthropologie, das darauf abzielt, die frühe Entwicklung des anatomisch modernen Menschen – einen Prozess, der als Hominisierung bezeichnet wird – durch die Rekonstruktion evolutionärer Verwandtschaftslinien innerhalb der Familie der Hominidae zu verstehen, wobei biologische Funde (wie versteinerte Skelettreste, Knochenfragmente und Fußabdrücke) sowie kulturelle Funde (wie Steinwerkzeuge, Artefakte und Siedlungsstätten) herangezogen werden."
 lepsius.2105.t: "Der Hildesheimer Schatz"
 lepsius.2105.d: "Archäologen haben in Hildesheim einen bedeutenden Silberfund ausgegraben. Überraschenderweise besteht er aus zahlreichen wertvollen römischen Artefakten!"
 lepsius.2105.f: "Der Hildesheimer Schatz, der am 17. Oktober 1868 von preußischen Soldaten in der Nähe des Galgenbergs entdeckt wurde, gilt nach wie vor als einer der bedeutendsten Funde römischer Silberschmiedekunst außerhalb der Reichsgrenzen. Die Sammlung umfasst etwa 70 exquisite Silbergefäße, darunter die berühmte Minervaschale, und stammt überwiegend aus dem 1. Jahrhundert n. Chr. Die Sammlung ist ein Meisterwerk der Handwerkskunst der augusteischen Zeit, löste jedoch bei ihrer Entdeckung heftige nationalistische und wissenschaftliche Debatten aus. Frühe Interpretationen brachten den Schatz häufig mit der Schlacht im Teutoburger Wald (9 n. Chr.) in Verbindung und spekulierten, es handele sich um das verlorene Gepäck des römischen Feldherrn Varus. Spätere Wissenschaftler betrachteten ihn als diplomatisches Geschenk oder als Reisegeschirr eines hochrangigen Offiziers."
 lepsius.2105.g: "Römisches Silber im Herzen Germaniens?"
 lepsius.2115.t: "Der Oxus-Schatz"
 lepsius.2115.d: "Am Ufer des Oxus haben Archäologen einen spektakulären Goldfund gemacht, der die Pracht des alten Persischen Reiches widerspiegelt."
 lepsius.2115.f: "Der Oxus-Schatz ist die bedeutendste Sammlung achämenidischer persischer Goldschmiedekunst, die je entdeckt wurde. Der um 1877 in der Nähe des Oxus (im heutigen Tadschikistan) gefundene Schatz umfasst etwa 180 Gold- und Silberobjekte sowie über 200 Münzen. Die Sammlung zeugt von einer außergewöhnlichen Verschmelzung persischer, skythischer und griechischer künstlerischer Einflüsse. Zu den wichtigsten Artefakten zählen ein berühmter goldener Miniaturwagen, aufwendig gearbeitete Armreifen mit geflügelten Greifen sowie zahlreiche Votivtafeln, die Priester und Krieger darstellen. Der Schatz wurde bekanntlich von einem britischen Offizier vor Banditen gerettet, bevor er ins British Museum gelangte. Historisch gesehen dient er als primäre Quelle für das Verständnis des Reichtums und der künstlerischen Raffinesse des Achämenidenreichs und spiegelt die ausgedehnten Handelsnetzwerke und die kulturelle Synthese der antiken persischen Welt wider. Seine Entdeckung lieferte Wissenschaftlern den ersten bedeutenden materiellen Beweis für den legendären Reichtum des Reiches."
 lepsius.2115.g: "Diese wunderbaren Exponate verdienen einen eigenen Raum im Museum!"
 lepsius.2135.t: "Die Statue von Xōchipilli"
 lepsius.2135.d: "Einheimische haben zwischen Vulkangestein eine alte Statue gefunden. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ist völlig begeistert: Es könnte sich um die am besten erhaltene Statue aus dem Aztekenreich handeln!"
 lepsius.2135.f: "Die aus vulkanischem Andesit gehauene sitzende Männerfigur, die in den 1880er Jahren an den Hängen des Vulkans Popocatépetl entdeckt wurde, wurde schnell zum Gegenstand von Spekulationen über die aztekische Zivilisation. Die Statue zeigt einen Mann in einer rituellen, mit gekreuzten Beinen hockenden Haltung auf einem reich verzierten Sockel. Der gesamte Körper der Figur sowie der Thron sind mit fein geschnitzten Reliefs aus stilisierten Blumen und Schmetterlingen bedeckt, die eine auffällige Ähnlichkeit mit den halluzinogenen Pflanzen des mexikanischen Hochlands aufweisen. Der leicht nach hinten geneigte Kopf mit seinen weit geöffneten Augen und dem leicht geöffneten Mund vermittelt den Eindruck einer ekstatischen Trance oder eines göttlichen Dialogs. Die maskenartigen Gesichtszüge und die florale Ikonografie – darunter Darstellungen von Winden und Tabak – veranlassten Forscher, ihn als den „Prinzen der Blumen“, die Gottheit Xōchipilli, zu identifizieren, der über Tanz, Gesang und heilige Träume der Azteken herrschte."
 lepsius.2135.g: "Diese Statue ist unheimlich, beunruhigend, faszinierend und wunderbar."
 lepsius.2145.t: "Die Ksour-Essef-Brustplatte"
 lepsius.2145.d: "Archäologen haben bei Ausgrabungen in der Nähe des antiken Karthago eine erstaunliche Entdeckung gemacht."
 lepsius.2145.f: "Der Panzer von Ksour Essef ist ein antikes Rüstungsstück, das 1909 in einem punischen Grab in der Nähe von Ksour Essef in Tunesien entdeckt wurde. Dieser Bronzebrustpanzer, der sich durch seine charakteristische anatomische Formgebung und kunstvollen Gravuren auszeichnet, ist ein Meisterwerk süditalienischer oder kampanischer Handwerkskunst aus dem 3. Jahrhundert v. Chr. Der Kürass zeigt Darstellungen der punischen Göttin Tanit, Greifen und florale Motive, die Schutz und Status symbolisieren. Da er historisch mit dem Zweiten Punischen Krieg in Verbindung gebracht wird, glauben viele Wissenschaftler, dass er einem hochrangigen Offizier in Hannibals Armee gehörte und möglicherweise während der Feldzüge in Italien erworben wurde."
 lepsius.2145.g: "Eine antike italienische Rüstung aus der punischen Region!"
 lepsius.2155.t: "Der Gundestrup-Kessel"
 lepsius.2155.d: "In Himmerland, Jütland, haben Archäologen überraschenderweise ein prächtiges keltisches Artefakt geborgen."
 lepsius.2155.f: "Der Gundestrup-Kessel, der 1891 in einem Torfmoor in Dänemark ausgegraben wurde, ist das größte bekannte Beispiel für Silberschmiedekunst aus der Eisenzeit. Das Gefäß besteht aus mehreren ursprünglich vergoldeten Silberplatten, die hochreliefierte Darstellungen komplexer mythologischer Erzählungen zeigen. Seine Entdeckung versetzte die archäologische Welt in Staunen, da es weit nördlich der keltischen Kerngebiete gefunden wurde. Der Kessel wurde wahrscheinlich in der unteren Donauregion (dem heutigen Rumänien oder Bulgarien) von thrakischen Silberschmieden für eine keltische Kundschaft angefertigt. Im späten 19. und frühen 20. Jahrhundert wurde er zu einem zentralen Bezugspunkt für das Verständnis antiker europäischer religiöser Praktiken und der ausgedehnten, miteinander verbundenen Handelsnetzwerke, die sich vom Balkan bis zur Nordsee erstreckten."
 lepsius.2155.g: "Kann man darin noch Suppe kochen?"
 lepsius.2185.t: "Der Mechanismus von Antikythera"
 lepsius.2185.d: "Schwammtaucher haben vor der Küste von Antikythera ein Schiffswrack entdeckt. Das Schiff aus der Römerzeit enthält nicht nur archäologisch bedeutende Artefakte, sondern auch ein Gerät, das unser Verständnis der hellenistischen Antike auf den Kopf stellt."
 lepsius.2185.f: "Der Mechanismus von Antikythera wird von Historikern und Wissenschaftlern weithin als das früheste bekannte Beispiel für einen analogen Computer angesehen. Er stammt aus dem 2. oder frühen 1. Jahrhundert v. Chr., und seine Komplexität fand in der westlichen Welt erst 1.500 Jahre später wieder ihr Pendant. Der Mechanismus bestand ursprünglich aus mindestens 30 Bronzenzahnrädern, die in einem Holzgehäuse untergebracht waren, das etwa die Größe einer Kaminuhr hatte. Er wurde über eine Handkurbel betätigt und verfügte über mehrere Zifferblätter mit griechischen Inschriften. Die Herkunft des Mechanismus ist nach wie vor Gegenstand intensiver wissenschaftlicher Debatten. Während sein genauer Schöpfer unbekannt ist, halten sich mehrere Theorien – einige vermuten sogar eine Verbindung zu Archimedes von Syrakus."
 lepsius.2185.g: "Ein Kompass? Ein astronomisches Instrument? Eine Zeitmaschine?"
 lepsius.2205.t: "Das fliegende Pferd von Gansu"
 lepsius.2205.d: "Unsere Forscher haben in der nördlichen Grenzregion des ehemaligen Reiches die vielleicht bedeutendste Persönlichkeit der Han-Zeit entdeckt."
 lepsius.2205.f: "Das „Fliegende Pferd von Gansu“, auch bekannt als „Galoppierendes Pferd, das auf eine fliegende Schwalbe tritt“, ist eine ikonische Bronzeskulptur aus der Östlichen Han-Dynastie (25–220 n. Chr.). Es wurde 1969 im Grab eines Generals in Leitai entdeckt und stellt den Höhepunkt der antiken chinesischen Bronzegusskunst dar. Das Artefakt zeigt ein mächtiges „himmlisches Pferd“ – die legendäre Ferghana-Rasse –, eingefangen im vollen Galopp. In einer Meisterleistung aus Gleichgewicht und kinetischer Energie wird das Pferd von einem einzigen Huf getragen, der auf einer fliegenden Schwalbe ruht, was auf eine Geschwindigkeit hindeutet, die selbst den schnellsten Vogel übertrifft. Bei seiner ersten Untersuchung wurde das Werk als Symbol der Seidenstraße gefeiert, das die militärische Macht und den kulturellen Austausch repräsentiert, die Chinas Expansion prägten."
 lepsius.2205.g: "Es ist schneller und eleganter als jeder Vogel!"
 lepsius.2215.t: "Die Goldkronen von Silla"
 lepsius.2215.d: "In Gyeongju, der alten Hauptstadt des Königreichs Silla, haben Archäologen die Königsgräber entdeckt und freigelegt. Die dort gemachten Funde sorgen in der Wissenschaft für Aufsehen!"
 lepsius.2215.f: "Die Silla-Goldkronen zählen zu den spektakulärsten Schätzen der alten koreanischen Geschichte und wurden vor allem in den Königsgräbern von Gyeongju entdeckt. Während Gerüchte über goldene Relikte schon seit Jahrhunderten kursierten, gelang 1921 der erste wissenschaftliche Durchbruch mit der zufälligen Entdeckung des Geumgwanchong (Goldkronengrab) während eines Bauprojekts. Die aus hochreinem Gold gefertigten und mit Magatama (kommaförmigen Jadeperlen) verzierten Kronen weisen aufrechte, baumartige Strukturen und Geweihmotive auf. Zu Beginn des 20. Jahrhunderts interpretierten Archäologen und Historiker diese Designs als Symbole schamanischer Königsherrschaft, was auf eine kulturelle Verbindung zu den Steppenvölkern Sibiriens und Zentralasiens hindeutet."
 lepsius.2215.g: "Diese Kronen verdienen einen Ehrenplatz in der nächsten Ausstellung."
 lepsius.2225.t: "Der Haniwa-Krieger"
 lepsius.2225.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte heute ein exquisites Artefakt präsentieren. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] selbst bezeichnet es als die „archäologische Krönung“ [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Karriere. Das Stück gilt bereits als Paradebeispiel für die Kunst der Yamato-Zeit."
 lepsius.2225.f: "Der Begriff „Haniwa-Krieger“ bezieht sich auf die ikonischen Tonfiguren aus der japanischen Kofun-Zeit. Diese Figuren wurden auf großen Grabhügeln aufgestellt, um den Verstorbenen zu beschützen und den heiligen Raum des Grabes abzugrenzen. Der bedeutendste Fund erfolgte 1924 in Oizumi in der Präfektur Gunma. Diese bemerkenswert gut erhaltene Figur, der Krieger in Keiko-Rüstung, bietet einen seltenen dreidimensionalen Einblick in die militärische Ausrüstung des 6. Jahrhunderts, darunter Lamellenpanzer und ein traditioneller Langbogen. Das Artefakt, das heute als Nationalschatz gilt, verschaffte Historikern Einblicke in die sich entwickelnde Militärgeschichte des Yamato-Staates. Romantiker könnten den Soldaten als eine Art „Urgroßvater“ der Samurai-Klasse betrachten."
 lepsius.2225.g: "Japans Vergangenheit liegt nicht länger im Dunkeln!"
 lepsius.2235.t: "Der Priesterkönig"
 lepsius.2235.d: "Das archäologische Team hat bei seinen Untersuchungen zur Indus-Kultur den bislang bedeutendsten Fund gemacht: eine kleine Figur eines unbekannten Mannes in meditativer Haltung. Sie gilt bereits als eines der bedeutendsten Artefakte der Bronzezeit."
 lepsius.2235.f: "Der Fund einer kleinen, aus Speckstein gehauenen, sitzenden Männerfigur während der Ausgrabungen in Mohenjo-Daro in den Jahren 1925–26 wurde schnell zum Mittelpunkt wissenschaftlicher Spekulationen über die politische und religiöse Struktur der Harappa-Zivilisation. Diese fragmentarische Statue war zwar nur 17,5 Zentimeter hoch, wies jedoch ein bemerkenswertes Maß an skulpturaler Detailtreue auf und stellte einen bärtigen Mann mit einem sorgfältig gepflegten Schnurrbart und halb geschlossenen Augen in einem nachdenklichen oder meditativen Blick dar. Er war mit einem gemusterten Umhang dargestellt, der über eine Schulter drapiert war und mit Kleeblattmotiven verziert war, die eine auffällige Ähnlichkeit mit religiösen Symbolen aus dem zeitgenössischen Mesopotamien und Ägypten aufwiesen. Das Vorhandensein eines kreisförmigen Stirnbandes und eines Armbands deutete auf eine Persönlichkeit von bedeutendem gesellschaftlichem oder rituellem Rang hin, was die Archäologen jener Zeit dazu veranlasste, ihn als „Priesterkönig“ zu bezeichnen."
 lepsius.2235.g: "Das Gesicht eines untergegangenen Reiches."
 lepsius.2245.t: "Der liegende Vishnu"
 lepsius.2245.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] verkündet, dass [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] die prächtigste Buddha-Bronzestatue gefunden hat, die ganz Südostasien zu bieten hat. Die Tatsache, dass es sich eigentlich um eine Darstellung von Vishnu handelt, dringt angesichts [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Begeisterung nicht zu [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] durch."
 lepsius.2245.f: "Der liegende Vishnu von West Mebon ist eine monumentale Bronzeskulptur aus dem 11. Jahrhundert aus dem Khmer-Reich, die im West-Baray-Stausee in Angkor, Kambodscha, entdeckt wurde. Sie zeigt Vishnu in der Anantasayin-Pose – auf der Schlange Shesha im kosmischen Ozean liegend – und ist ein Meisterwerk des Baphuon-Stils. Ihre Bedeutung liegt in ihrer Größe und Symbolik. Als eine der größten antiken Bronzestatuen Südostasiens zeugt sie von der außergewöhnlichen metallurgischen Kunstfertigkeit der Khmer. In religiöser Hinsicht verwandelte ihre Platzierung in der Mitte eines riesigen künstlichen Sees das Reservoir in eine physische Darstellung des hinduistischen Urmeeres und legitimierte damit die göttliche Autorität des Königs. Seit 1936 in Fragmenten geborgen, sind der erhaltene Torso und der Kopf heute ikonische Schätze des Nationalmuseums von Kambodscha."
 lepsius.2245.g: "Buddha oder Vishnu? Wen interessiert’s, das gehört ins Museum!"
 lepsius.2255.t: "Der Obelisk von Axum"
 lepsius.2255.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat sich in letzter Zeit intensiv mit dem sogenannten „Obelisken“ von Axum beschäftigt. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Meinung nach handelt es sich tatsächlich um eine Stele, die dazu diente, eine Grabstätte zu kennzeichnen. Der Archäologe betrachtet das Objekt als eines der prächtigsten Artefakte des alten Königreichs Axum."
 lepsius.2255.f: "Der Obelisk von Axum (auch bekannt als Stele 2) ist ein 24 Meter hoher Granitmonolith aus dem 4. Jahrhundert n. Chr., der die Handwerkskunst des aksumitischen Reiches im heutigen Äthiopien verkörpert. Die Stele ist mit kunstvollen „Scheintüren“ und Fenstern verziert, die ein mehrstöckiges Gebäude nachahmen, und diente als Grabstätte für die Elite. Das Denkmal erlangte auch durch seine moderne Odyssee internationale Bekanntheit: 1937 wurde es auf Befehl von Benito Mussolini als Raubkunst nach Rom gebracht. Erst nach jahrzehntelangen diplomatischen Bemühungen wurde der Obelisk 2005 in drei Teilen nach Äthiopien zurückgebracht."
 lepsius.2255.g: "Ein stolzes Symbol unserer Vorfahren!"
 lepsius.2255.h: "Bringt den Obelisken nach [ROOT.GetCountry.GetCapital.GetCityHubName]!"
 lepsius.2265.t: "Die Malden-Platten"
 lepsius.2265.d: "Bei Ausgrabungen in einem der Kerngebiete der Mississippi-Kultur haben Archäologen eine überraschende Entdeckung gemacht: Wunderschöne Kupfergegenstände kommen nach Jahrhunderten wieder ans Tageslicht."
 lepsius.2265.f: "Die Malden-Platten (auch als „Wulfing-Fund“ bekannt) bestehen aus acht geprägten Kupferplatten, die 1906 von Ray Grooming in Malden, Missouri, entdeckt wurden. Diese außergewöhnlichen Artefakte stammen aus der Mississippi-Kultur (ca. 1200–1400 n. Chr.) und wurden auf einem Feld vergraben gefunden, wo sie wahrscheinlich zur sicheren Aufbewahrung oder als rituelles Opfer versteckt worden waren. Die Platten sind Meisterwerke der präkolumbianischen Metallkunst und zeigen die komplexe Ikonografie des Southeastern Ceremonial Complex. Sie stellen vorwiegend den Falkentänzer dar – eine anthropomorphe Figur mit Vogelzügen, Flügeln und ritueller Insignien –, der ein mächtiges übernatürliches Wesen oder eine schamanische Verwandlung symbolisiert."
 lepsius.2265.g: "War Amerika zivilisiert, bevor es zivilisiert war?"
 lepsius.2275.t: "Der Quimbaya-Schatz"
 lepsius.2275.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat einen Fund entdeckt, der als der bislang größte Goldschatz Kolumbiens gilt. Bei Ausgrabungsarbeiten wurden Hunderte von Artefakten zutage gefördert. Es scheint, als sei [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] auf den Schatz einer ganzen untergegangenen Zivilisation gestoßen."
 lepsius.2275.f: "Der Quimbaya-Schatz ist eine weltberühmte Sammlung präkolumbianischer Artefakte aus Gold und Tumbaga, die von der Quimbaya-Zivilisation im heutigen Kolumbien gefertigt wurden. Der Schatz, der hauptsächlich aus dem 4. bis 10. Jahrhundert n. Chr. stammt, wurde 1890 in der Nähe von Filandia entdeckt. Die Sammlung umfasst etwa 122 Stücke, darunter Schmuck, Figuren und Ritualgefäße, die als Poporos (Kalkbehälter) bekannt sind. Diese Objekte zeugen von einer außergewöhnlichen Beherrschung der Wachsausschmelztechnik, die sich durch glatte, abgerundete Oberflächen und raffiniert stilisierte menschliche Formen auszeichnet. Im Jahr 1893 schenkte die kolumbianische Regierung den Schatz der spanischen Regentin Maria Christina."
 lepsius.2275.g: "Ich habe noch nie so viel Gold gesehen!"
 lepsius.2201.t: "Malereien in den Han-Gräbern"
 lepsius.2201.d: "Ausgrabungen in den Gräbern hochrangiger Persönlichkeiten aus der Han-Dynastie haben Einblicke in das Leben und den Alltag längst vergangener Zeiten gewährt."
 lepsius.2201.f: "Zwar waren bereits viele Artefakte aus der Han-Zeit bekannt, doch die Entdeckung bemalter Grabstätten aus der Han-Dynastie zu Beginn des 20. Jahrhunderts brachte umfangreiche Wandgemäldezyklen zum Vorschein, die seit dem 2. Jahrhundert n. Chr. verschlossen waren. Diese Wandmalereien zeigen lebhafte Szenen aus dem Alltag: prächtige Bankette, akrobatische Darbietungen und geschäftige Umzüge mit Pferdewagen. Sie bewiesen, dass die Han-Chinesen schon lange vor der Tang-Dynastie eine ausgefeilte perspektivische und narrative Malerei entwickelt hatten. Die leuchtenden Farben – Rot-, Ocker- und Schwarztöne – gehören nach wie vor zu den am besten erhaltenen Beispielen der frühen chinesischen Bildkunst."
 lepsius.2201.g: "Bislang war unser Wissen über die Han-Gesellschaft unzureichend."
 lepsius.2202.t: "Han-Lackwaren"
 lepsius.2202.d: "Bei ihrer jüngsten Entdeckung haben Archäologen zahlreiche Lackwaren ausgegraben."
 lepsius.2202.f: " Obwohl Lack schon seit Jahrtausenden verwendet wurde, entwickelte sich seine Herstellung erst in der Han-Zeit (206 v. Chr. – 220 n. Chr.) zu einer riesigen, staatlich kontrollierten Industrie. Bedeutende Funde zu Beginn des 20. Jahrhunderts, insbesondere in nördlichen Außenposten wie Lelang (dem heutigen Nordkorea), offenbarten die unglaubliche Haltbarkeit und Kunstfertigkeit dieser Objekte. Lackwaren waren am Han-Hof weitaus wertvoller als Bronze und wurden wegen ihrer Beständigkeit gegen Hitze, Feuchtigkeit und Verfall geschätzt. Die Objekte – von Weinkelchen und Kosmetikdosen bis hin zu verzierten Särgen – waren typischerweise in einer auffälligen Rot-Schwarz-Farbpalette mit fließenden, wolkenartigen Schnörkeln und Fabelwesen bemalt."
 lepsius.2202.g: "Weitere Exponate für die nächste Ausstellung."
 lepsius.2203.t: "Han-Keramikfiguren"
 lepsius.2203.d: "Bei einer Ausgrabung wurden zahlreiche Grabbeigaben geborgen. Die vielen Keramikgegenstände lassen auf einen sehr wohlhabenden Verstorbenen schließen. Besonders die Figuren und Miniaturhäuser weckten das Interesse des Teams."
 lepsius.2203.f: "Die als „Mingqi“ (Geisterobjekte) bekannten Tonfiguren aus der Han-Dynastie reichen von Hoftänzern und Infanteristen bis hin zu bemerkenswert detaillierten Miniaturmodellen von Häusern, Getreidespeichern und Wachtürmen. Für Archäologen dieser Zeit waren diese Architekturmodelle von unschätzbarem Wert, da sie die einzigen erhaltenen Zeugnisse der Holzbauweise im Han-Stil darstellten, die in der realen Welt längst verfallen war. Die Figuren und Modelle galten als vollständiger Mikrokosmos der Han-Welt und sollten dem Verstorbenen im Jenseits einen voll funktionsfähigen Nachlass bieten – komplett mit Vieh, Küchen und Unterhaltungsmöglichkeiten."
 lepsius.2203.g: "Könnte man damit ein Modell der Stadt Chang'an bauen?"
 lepsius.2204.t: "Han Bronze Art"
 lepsius.2204.d: "Bei den jüngsten Ausgrabungen haben Archäologen einen Schatz an Bronzegegenständen aus der Han-Dynastie zutage gefördert. Besonders beeindruckt waren die Forscher von einem wunderschön verzierten Ding."
 lepsius.2204.f: "Die Entdeckung von Bronzeschätzen aus der Han-Zeit im späten 19. und frühen 20. Jahrhundert offenbarte eine Zivilisation, die die Metallverarbeitung sowohl für rituelle Zwecke als auch für den Alltag perfektioniert hatte. Diese Schätze, die häufig in Nordchina und in Grenzgebieten wie Gansu gefunden wurden, enthielten oft kunstvolle Räuchergefäße, Spiegel und Gefäßgruppen, die zwei Jahrtausende lang verborgen geblieben waren. Ein Markenzeichen dieser Funde ist der Boshan Lu (Berg-Räuchergefäß), ein bronzenes Räuchergefäß in Form eines heiligen Berges, der in Nebel gehüllt ist. Für die Wissenschaftler jener Zeit bewies der Fund massiver Bronzelampen und Weingefäße (hu) in Han-Gräbern, dass Bronze auch lange nach der Einführung von Eisen ein Symbol für hohen Status blieb."
 lepsius.2204.g: "Hervorragende Neuzugänge für unser Museum."
 lepsius.2211.t: "Silla-Teich-Artefakte"
 lepsius.2211.d: "Nachdem ein Teich in der Nähe eines alten Palastes aus der Zeit des Vereinigten Silla-Königreichs trockengelegt worden war, fanden Archäologen im Schlamm zahlreiche Artefakte aus dieser Epoche."
 lepsius.2211.f: "Im Gegensatz zu den feierlichen Opfergaben, die in Grabstätten gefunden wurden, handelte es sich bei den aus dem Schlamm des Teiches geborgenen Gegenständen größtenteils um Überreste des täglichen Palastlebens und prunkvoller Festlichkeiten. Zu den faszinierendsten Funden zählten vergoldete Bronze-Buddhas, verzierte Dachziegel (ebwadang) und einzigartige Spielwürfel aus Holz, die bei königlichen Banketten verwendet wurden. Diese Artefakte zeugten von einem Lebensstil voller extremer Dekadenz und künstlerischer Raffinesse. Sie spiegeln Sillas Rolle als wichtiger Knotenpunkt der Seidenstraße wider, mit ästhetischen Einflüssen aus dem Tang-China und sogar dem fernen Persien."
 lepsius.2211.g: "Überbleibsel eines goldenen Zeitalters."
 lepsius.2212.t: "Silla-Münzschätze"
 lepsius.2212.d: "Archäologen haben in einer koreanischen Provinzstadt fast zufällig einen riesigen Münzfund gemacht. Die Münzen stammen überwiegend aus der chinesischen Tang-Dynastie, dem großen Nachbarn des vereinigten Königreichs Silla."
 lepsius.2212.f: "Im alten Korea wurde in der Regel mit Waren gehandelt – wobei Textilien und Getreide eine besonders wichtige Rolle spielten – oder mit Messermünzen. Dennoch sind ausländische Münzen häufig belegt. Insbesondere China übte als mächtiger Nachbar des Silla-Königreichs durch sein Währungssystem, vor allem durch die ab der Han-Dynastie geprägte Wu-Zhu-Münze, erheblichen Einfluss auf seine Nachbarn aus. Darauf folgte die Kaiyuan-Tongbao-Münze der Tang-Dynastie. Als Teil der Seidenstraße gelangten so zahlreiche chinesische Münzen über den internationalen Handel nach Korea."
 lepsius.2212.g: "Ob koreanisch oder chinesisch...die Münzen gehören uns."
 lepsius.2213.t: "Silla-Holzschnitte"
 lepsius.2213.d: "Bei archäologischen Untersuchungen in der Nähe einer Pagode entdeckten Forscher mehrere buddhistische Texte. Sie stammen aus der Silla-Zeit und wurden im Holzschnittverfahren gedruckt."
 lepsius.2213.f: "Die Dokumente belegen, dass das Königreich Silla bereits im 8. Jahrhundert über die Technik des Holzschnittdrucks verfügte, was die theoretische Möglichkeit für den Massendruck eröffnete. Für Forscher sind dies daher nicht nur wertvolle religiöse Texte, sondern auch Belege für eine technologisch fortgeschrittene Gesellschaft, mit der man bislang nicht gerechnet hatte."
 lepsius.2213.g: "Faszinierend!"
 lepsius.2214.t: "Die Seokguram-Grotte"
 lepsius.2214.d: "Ein Postbote machte das Archäologische Institut auf einen spektakulären Fund in der Nähe der alten Hauptstadt Gyeongju aufmerksam, der ein völlig neues Licht auf die Silla-Zeit wirft."
 lepsius.2214.f: "Die Seokguram-Grotte, eine monumentale Einsiedelei, die zum Tempelkomplex Bulguksa gehört, wurde 1909 von einem örtlichen Postboten wiederentdeckt, der dort Schutz vor einem Sturm suchte. Diese künstliche Granitgrotte auf dem Berg Toham in Gyeongju – erbaut im 8. Jahrhundert während der Zeit des vereinigten Silla – war in Vergessenheit geraten und teilweise eingestürzt; jahrhundertelang lag sie unter Erde und Schutt begraben. Die Grotte gilt als Meisterwerk der östlichen buddhistischen Kunst und zeigt einen ruhigen, kolossalen Sakyamuni-Buddha, umgeben von aufwendig geschnitzten Flachreliefs von Wächtern, Devas und Schülern. Zu Beginn des 20. Jahrhunderts wurde die Entdeckung zu einem Schwerpunkt der Archäologie der Kolonialzeit. Gelehrte und Ingenieure jener Zeit waren fasziniert von ihrer ausgeklügelten architektonischen Gestaltung, bei der eine einzigartige Kuppelkonstruktion zur Regulierung von Temperatur und Luftfeuchtigkeit zum Einsatz kam."
 lepsius.2214.g: "Ein Juwel aus der Silla-Zeit."
 lepsius.2221.t: "Haniwa-Figuren"
 lepsius.2221.d: "Bei einer Ausgrabung wurden zahlreiche Grabbeigaben geborgen. Die vielen Keramikgegenstände lassen auf einen sehr wohlhabenden Verstorbenen schließen. Besonders die Figuren und Miniaturhäuser weckten das Interesse des Teams."
 lepsius.2221.f: "Haniwa sind unglasierte Keramikskulpturen, die für die Kofun-Zeit (Yamato-Zeit) charakteristisch sind und speziell dafür geschaffen wurden, auf oder um monumentale Grabhügel herum aufgestellt zu werden. Diese Wächterfiguren aus Terrakotta galten als schützende Begrenzung des heiligen Grabraums. Diese Objekte, die zwischen dem 3. und 6. Jahrhundert n. Chr. entstanden, entwickelten sich von einfachen zylindrischen Gefäßen zu komplexen Figuren, die die gesamte soziale und materielle Welt des Verstorbenen darstellten. Sie gehörten zu den ersten Artefakten, die von japanischen Archäologen wissenschaftlich katalogisiert wurden."
 lepsius.2221.g: "Früher bewachten sie Gräber, heute schmücken sie Museen."
 lepsius.2222.t: "Das wird reichen"
 lepsius.2222.d: "Unser archäologisches Team hat eine große Anzahl kleiner Jade-Magatama aus der Yamato-Zeit gefunden."
 lepsius.2222.f: "Magatama sind gebogene, kommaförmige Perlen, die als eines der markantesten Kennzeichen der japanischen Yamato-Zeit (Kofun-Zeit) gelten. Diese Schmuckstücke, die typischerweise aus Edelsteinen wie Jadeit, Jaspis, Nephrit oder Karneol gefertigt wurden, waren sowohl als Statussymbole der Elite als auch als mächtige religiöse Amulette hochgeschätzt. Der Fund von Magatama in monumentalen, schlüssellochförmigen Grabstätten weckte großes archäologisches Interesse hinsichtlich der Ursprünge der japanischen Kultur. Wissenschaftler jener Zeit stellten auffällige Ähnlichkeiten zwischen diesen Schmuckstücken und denen fest, die in den Konföderationen Silla und Gaya auf der koreanischen Halbinsel gefunden wurden. Über ihren ästhetischen Wert hinaus nahmen Magatama einen heiligen Platz im nationalen Bewusstsein ein; als einer der drei heiligen Schätze der kaiserlichen Insignien Japans wurde ihre Ausgrabung aus antiken Stätten oft als tiefgreifende Wiederverbindung mit der göttlichen Abstammungslinie des Yamato-Staates angesehen."
 lepsius.2222.g: "Darf ich eins haben?"
 lepsius.2223.t: "Rüstungen und Waffen der Yamato"
 lepsius.2223.d: "Unsere Archäologen vermuten, dass sie ein Schlachtfeld entdeckt haben. Es wurden Schwerter und Rüstungen aus der Yamato-Zeit gefunden. Besonders gut erhalten ist die Rüstung eines Kriegers, eines Tankō."
 lepsius.2223.f: "Die Yamato-Zeit war eine Ära intensiver militärischer Konsolidierung und Expansion, die durch den weitverbreiteten Einsatz fortschrittlicher Eisenverarbeitungstechniken gekennzeichnet war. Bei archäologischen Ausgrabungen von Kofun-Gräbern wurden riesige Mengen an militärischer Ausrüstung zutage gefördert, darunter geradklingige Schwerter (Chokutō), Pfeilspitzen und hochentwickelte Plattenrüstungen. Zwei Haupttypen von Rüstungen prägten dieses Zeitalter: die Tankō, ein massiver Brustpanzer aus vernieteten Eisenplatten, und die Keikō, eine flexiblere Lamellenrüstung, die für den Kampf zu Pferd konzipiert war."
 lepsius.2223.g: "Japan blickt auf eine große militärische Vergangenheit zurück."
 lepsius.2224.t: "Yamato-Bronzespiegel"
 lepsius.2224.d: "Archäologen haben zahlreiche Grabbeigaben gefunden, unter denen die Bronzespiegel als Relikte der glorreichen Yamato-Zeit besonders hervorstechen."
 lepsius.2224.f: "Bronzespiegel, auch Shinju-kyo genannt, gehören zu den spirituell bedeutendsten Artefakten, die aus Kofun-Gräbern der Yamato-Zeit geborgen wurden. Diese Spiegel, die oft in der Nähe des Kopfes oder der Brust des Verstorbenen gefunden wurden, wurden als heilige Ritualgegenstände verehrt, die Licht reflektieren und einfangen konnten – eine Eigenschaft, die mit göttlicher Autorität und der Sonnengöttin Amaterasu in Verbindung gebracht wurde. Viele in Japan entdeckte Spiegel wurden als „Gottheit-und-Tier“-Spiegel identifiziert, die aus der chinesischen Wei-Dynastie importiert worden waren, während andere lokale japanische Nachahmungen waren, die als Bosharyo-kyo bekannt sind. Für Historiker der Meiji- und Taisho-Epochen diente die Verbreitung dieser Spiegel als politische Landkarte des alten Japans; die Entdeckung identischer Spiegel in geografisch weit voneinander entfernten Gräbern deutete darauf hin, dass der Yamato-Hof diese kostbaren Objekte an lokale Stammesführer als Symbole eines vereinten politischen Bündnisses verteilte."
 lepsius.2224.g: "Ein Spiegelbild der Vergangenheit Japans."
 lepsius.2231.t: "Indus Keramik"
 lepsius.2231.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] gab heute bekannt, dass im Indus-Tal ein Fundort mit zahlreichen Keramikfunden entdeckt wurde."
 lepsius.2231.f: "Die Töpfer der Indus-Kultur verwendeten bereits vor über 4.000 Jahren hochentwickelte, schnell drehende Töpferscheiben. Besonders auffällig ist die sogenannte „Schwarz-auf-Rot-Keramik“: Gefäße, die mit einer tiefroten Tonengobe überzogen und anschließend mit feinen schwarzen Pigmenten bemalt wurden. Die Motive sind entweder streng geometrisch oder stellen die reiche Flora und Fauna des Subkontinents dar – von Pfauen bis hin zu den charakteristischen Pipalblättern. Die riesigen Mengen dieser langlebigen Artefakte lieferten den wichtigsten Beweis für die Urbanisierung des Indusbeckens und belegen, dass eine komplexe, standardisierte Gesellschaft bereits lange vor Beginn der aufgezeichneten Geschichte des Subkontinents florierte."
 lepsius.2231.g: "Jetzt ist es an der Zeit, die Bruchstücke zusammenzufügen."
 lepsius.2232.t: "Indus-Perlen"
 lepsius.2232.d: "Ein Team von Archäologen unter der Leitung von Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat heute in einer antiken Indus-Siedlung einen wertvollen Fund gemacht, der die handwerkliche Kunstfertigkeit der Harappa-Zivilisation bestätigt."
 lepsius.2232.f: "Die Entdeckung aufwendiger Schmuckstücke und Perlenarbeiten lieferte einige der überzeugendsten Belege für den immensen Reichtum und die hochspezialisierte Handwerkskunst der Indus-Kultur. Diese Ornamente wurden aus einer Vielzahl von Materialien gefertigt, darunter Gold, Silber, Lapislazuli, Türkis und verschiedene Arten von Terrakotta. Es war jedoch die Herstellung langer Karneolperlen, die als Markenzeichen der technischen Meisterschaft der Harappan-Kultur galt. Archäologen waren beeindruckt von der Präzision, mit der diese harten Steine gebohrt und mit filigranen weißen Alkalimuster verziert wurden – ein Verfahren, das hochspezialisierte Brennöfen und Bohrer aus Kupferlegierungen erforderte. Über ihren ästhetischen Reiz hinaus lieferten diese Schmuckfunde wichtige Hinweise auf die ausgedehnten See- und Landhandelsnetze der Bronzezeit. Das Vorkommen unverkennbarer Perlenstile aus Harappa in den Königsgräbern mesopotamischer Stadtstaaten bestätigte zudem die Rolle des Subkontinents als wichtigster Exporteur von Luxusgütern."
 lepsius.2232.g: "Diese alte Kultur unterhielt weitreichende Handelsbeziehungen!"
 lepsius.2233.t: "Indus-Schrift"
 lepsius.2233.d: "Archäologen haben in einem Gebäude, das offenbar ein Lagerhaus der Indus-Kultur war, mehrere Siegel mit Inschriften gefunden. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ist es jedoch bislang nicht gelungen, die Inschriften zu entziffern."
 lepsius.2233.f: "Der Fund kleiner, quadratischer Steatit-Siegel gilt nach wie vor als der rätselhafteste Befund der Ausgrabungen im Indus-Tal. Diese Artefakte waren in der Regel mit exquisiten Tierdarstellungen – vor allem dem „Einhorn“-Stier, Elefanten und Nashörnern – in Tiefprägung verziert und trugen darüber eine Reihe standardisierter Symbole, die als Indus-Schrift bekannt sind. Ihre Entdeckung in großen Mengen in Lagerbezirken lässt vermuten, dass sie als offizielle Kennzeichen für Eigentum oder Autorität dienten und dazu verwendet wurden, Tonmarken auf Handelswaren anzubringen, die für lokale und ausländische Märkte bestimmt waren. Die Kürze und die Wiederholungen in den Inschriften führten Wissenschaftler zu dem Schluss, dass die Schrift wahrscheinlich Namen, Titel oder bürokratische Vermerke darstellte und keine langen erzählenden Texte. Trotz gründlicher sprachwissenschaftlicher Analysen blieb die zugrunde liegende Sprache Gegenstand intensiver Debatten."
 lepsius.2233.g: "Das Schreiben und die Sprache werden für künftige Generationen ein Rätsel bleiben."
 lepsius.2234.t: "Kontakte zwischen dem Indus-Tal und Mesopotamien"
 lepsius.2234.d: "Landwirte informierten das Archäologische Institut über antike Bauwerke in dem Gebiet, in dem man die Harappa-Zivilisation vermutet. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] machte dort eine überraschende Entdeckung: zylindrische Siegel aus Mesopotamien!"
 lepsius.2234.f: "Die Ausgrabung von eindeutig dem Nahen Osten zuzuordnenden Artefakten in den Ruinen von Harappa und Mohenjo-Daro lieferte den ersten eindeutigen archäologischen Beweis für direkte Kontakte zwischen dem Indus-Tal und den Zivilisationen Mesopotamiens. Zu den bedeutendsten Funden zählten zylindrische Siegel, die sich deutlich von den im Indus-Becken heimischen quadratischen, flachen Stempelsiegeln unterschieden. Diese importierten Objekte, die typischerweise aus Steinen wie Hämatit oder Lapislazuli gefertigt waren, wiesen die für die akkadischen und sumerischen Stadtstaaten charakteristische narrative und mythologische Ikonografie auf. Neben den Siegeln identifizierten Archäologen mehrere spezifische Luxusgüter, darunter Fragmente von Keramik im „Persischen-Golf“-Stil und bestimmte Arten von Waffen aus Bronzeguss, die ihren Ursprung im Westen hatten."
 lepsius.2234.g: "Mesopotamische Artefakte? Hier? Wir müssen nicht einmal eine Expedition entsenden?"
