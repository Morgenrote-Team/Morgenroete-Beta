 notification_lepsius_heidelbergensis_systemized_notification_desc: "Wissenschaftler haben zum ersten Mal die Knochen des Homo Heidelbergensis identifiziert und analysiert und die Art detailliert beschrieben."
 lepsius_ishtar_gate_modifier: "Ischtar-Tor"
 lepsius.313.h: "Wir brauchen Dr. [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] woanders dringender."
 lepsius.321.t: "Katalogisierung abgeschlossen"
 lepsius.321.d: "Nach vielen Monaten mühsamen Ordnens, Identifizierens, Nummerierens und Auswertens der auf der Expedition gefundenen Überreste hat Doktor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] wieder freie Hand."
 lepsius.321.f: "\"Letztlich sind wir die Buchhalter der Geschichte - nur dass unsere Bilanzen immer im Minus sind. Wir fassen die Unwissenheit in Tabellenform zusammen. Der einzige Trost ist, dass wir, anders als Archivare, manchmal die Sonne sehen.\""
 lepsius.321.g: "Wenn Sie dies zu lange tun, werden Sie am Ende den gleichen Staub wie die Artefakte ansammeln."
 je_lepsius_cataloging: "Archäologische Katalogisierung"
 je_lepsius_cataloging_reason: "Unter archäologischer Katalogisierung versteht man den systematischen Prozess der Dokumentation, Beschreibung und Eingabe von Funden aus archäologischen Ausgrabungen oder bestehenden Sammlungen in eine Datenbank oder ein Inventarsystem. Jeder Fund wird mit seinen kontextuellen Daten verknüpft: Ort, Stratigraphie, Fundumstände, Material, Abmessungen oder Datierung.\n\nDieser Prozess dauert wesentlich länger als eine Expedition und ist oft der Grund, warum es so lange dauert, bis ein archäologisches Team ein neues Ziel ins Visier nimmt. Aber welcher Archäologe wäre nicht stolz darauf, diese höchst spannende Aufgabe zu erfüllen?"
 je_archaeologist_dies_tt: "Der Journaleintrag wird fehlschlagen, wenn der [concept_lepsius_archaeologist] stirbt."
