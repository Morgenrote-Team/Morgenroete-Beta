 lepsius.1601.t: "[SCOPE.sCharacter('lepsius_donator_scope').GetLastName]s Spende"
 lepsius.1601.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] gilt als Sammler seltener ägyptischer Raritäten. Seine ägyptologischen Interessen haben dazu geführt, dass er heute eine bemerkenswerte Sammlung besitzt. Er hat großzügig angeboten, seine exquisiten Artefakte dem Archäologischen Museum zu spenden."
 lepsius.1602.d: "Es ist eine wohlbekannte Tatsache, dass [SCOPE.sCharacter('lepsius_donator_scope').GetFullName] die wahrscheinlich beeindruckendste Privatsammlung mesopotamischer Artefakte besitzt. Er hat der Regierung signalisiert, dass diese Sammlung in staatliche Hände übergehen könnte, obwohl einige kritische Beobachter warnen, dass er möglicherweise eine Gegenleistung verlangen könnte."
 lepsius.1603.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] gilt vielleicht nicht als besonders kunstbegeisterter Mensch, aber wie es der Zufall wollte, entdeckte er auf seinem Grundstück einige archäologische Schätze von großem Wert, die er seit einigen Jahren unter Verschluss hält. Da er mit ihnen nicht viel anfangen kann, hat er der Regierung angeboten, sie dem Archäologischen Museum zu spenden."
 lepsius.1604.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] hat in den letzten Jahren mehrere Reisen durch Südamerika unternommen und dabei wichtige Relikte der mesoamerikanischen und andinen Kulturen als Souvenirs gesammelt. Nun hat er angekündigt, diese Artefakte dem Museum spenden zu wollen."
 lepsius.1605.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] war beeindruckt von den alten ägäischen Kulturen. Er sammelt seit einigen Jahren Artefakte aus Kreta und hat sogar ein ganzes minoisches Fresko in seine Villa bringen lassen. Da er jedoch seine sozialen Verpflichtungen kannte, beschloss er, seine Schätze den [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Leuten zu spenden."
 lepsius.1601.f: "Zahlreiche archäologische Sammlungen gehen auf die Renaissancefürsten zurück, die antike Kunstgegenstände sammelten und über Händler kauften. Im Jahr 1824 erwarb König Charles Felix das Material aus der Drovetti-Sammlung (5.268 Stücke, darunter 100 Statuen, 170 Papyri, Stelen, Mumien und andere Gegenstände), die der französische Generalkonsul Bernardino Drovetti während seines Aufenthalts in Ägypten errichtet hatte. Dies wurde später zur Grundlage des Ägyptischen Museums in Turin. Auch reiche Unternehmer und einflussreiche Eliten hatten ein Interesse an der Sammlung von Statussymbolen, die sie oft in ihrem Testament der Öffentlichkeit schenkten. Oftmals wollte man durch solche Spenden nicht nur das eigene Ansehen verbessern, sondern erhoffte sich auch ein besseres Ansehen in der Gesellschaft."
 lepsius.1601.g: "Eine wunderbare Spende für unser Museum!"
 lepsius.1601.h: "Dieser Speichellecker versucht nur, etwas auszunutzen."
 lepsius.1606.t: "Ägyptomanie"
 lepsius.1606.d: "Eine Gruppe von Menschen, die eine Leidenschaft für Ägypten haben, hat sich zusammengeschlossen. Die Gruppe wird von [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] geleitet. Manche teilen vielleicht nicht die geradezu fanatische Bewunderung für das alte Ägypten, aber der Schein mag Vorteile haben."
 lepsius.1606.f: "Obwohl das 19. Jahrhundert in vielerlei Hinsicht als fortschrittlich und vom wissenschaftlichen Geist dominiert gilt, verbreiteten sich gerade in dieser Zeit verschiedene Formen okkulter und pseudowissenschaftlicher Phänomene. Der bekannteste davon ist der Spiritualismus, der die Existenz von Geistern beweisen wollte. Die archäologische Forschung inspirierte nicht nur viele fehlgeleitete Theorien, sondern auch pseudowissenschaftliche und esoterische Strömungen wie den Panbabylonismus, den Mayaismus und den Atlantisglauben. Obwohl solche Phänomene oft eine zersetzende Wirkung auf die Wissenschaft haben könnten, erfreuten sich bestimmte Phänomene einer gewissen Mode und verbreiteten in der wissenschaftlichen Forschung die Erkenntnis, dass sie recht fruchtbare Nebenwirkungen haben könnten."
 lepsius.1606.g: "Lassen Sie sie ihrem kleinen Kult frönen."
 lepsius.1606.h: "Verbietet diesen Humbug."
 lepsius.1607.t: "Mayanismus"
 lepsius.1607.d: "Einige Eliten in unserem Land sind dem seltsamen Missverständnis verfallen, dass die Welt einem alten Kalender folgt, der auf die Maya zurückgeht. Darüber hinaus hätte dieses Volk über Wissen verfügt, das die Geheimnisse des Universums birgt. Man könnte über diese absurden Ideen lachen, wenn die einflussreiche Gruppe nicht von [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] angeführt würde."
 lepsius.1608.t: "Panbabylonismus"
 lepsius.1608.d: "Eine Gruppe von Menschen hat in Gesellschaft und Wissenschaft für Aufsehen gesorgt, indem sie darauf bestanden, dass alles Wissen aus Babylon stamme; Selbst die jüdische und die christliche Religion sind bloße Nachahmungen. [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] engagiert sich auch in diesem \"Club der Panbabylonisten\", die versuchen, ihre Ideen zu verbreiten."
 lepsius.1608.g: "Das ist Pseudowissenschaft!"
 lepsius.1608.h: "Großartig."
 lepsius.1609.t: "Atlantismus"
 lepsius.1609.d: "[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] leitet eine esoterisch-pseudowissenschaftliche Gruppe, die behauptet, Atlantis sei kein Mythos, sondern eine historische Stadt, die in der Eiszeit über fortschrittliche Technologie verfügte. Darüber hinaus stammten alle Kulturen von Atlantis ab. In wöchentlichen Séancen möchte er Kontakt zu den Geistern der Atlantiden aufnehmen."
 lepsius.1609.h: "Wer kann sagen, ob es wahr ist oder nur eine Legende?"
 lepsius.1609.i: "Es gibt solide Beweise für Atlantis."
 lepsius.1610.t: "Archäologische Investition"
 lepsius.1610.d: "Der Direktor des Archäologischen Museums hat angeboten, die Ausbildung neuer Fachkräfte zu unterstützen. Allerdings wäre dies mit zusätzlichen Kosten verbunden."
 lepsius.1610.f: "Das Institut hat gehört, dass die Regierung derzeit ein besonderes Interesse daran hat, die Archäologie in unserem Land zu fördern. \"Zusätzliche finanzielle Unterstützung könnte helfen, neue, vielversprechende Assistenten zu gewinnen.\""
 lepsius.1610.g: "Geben Sie dem Museum eine zusätzliche Finanzspritze."
 lepsius.1610.h: "Das ist es nicht wert."
 lepsius.1611.t: "Museumstickets"
 lepsius.1611.d: "Um die steigenden Kosten zu decken, ist das Museum gezwungen, die Eintrittspreise zu erhöhen. Der Staat könnte sich die zusätzlichen Gewinne sichern. Dies könnte jedoch unserem Ruf leicht schaden."
 lepsius.1611.f: "\"Kein Ticket!\""
 lepsius.1611.g: "Ticketpreise erhöhen."
 lepsius.1611.h: "Senken Sie die Ticketpreise."
 lepsius.1611.i: "Tickets? Der Eintritt ins Museum sollte frei sein!"
 lepsius.1612.t: "Das Vermächtnis des Regisseurs [SCOPE.sCharacter('lepsius_director_scope').GetLastName]"
 lepsius.1612.d: "Der kürzlich verstorbene Museumsdirektor [SCOPE.sCharacter('lepsius_director_scope').GetLastName] war ein angesehener Mann. Er genoss einen hervorragenden wissenschaftlichen Ruf. Doch eine aktuelle Entdeckung könnte sein Vermächtnis trüben."
 lepsius.1612.f: "Eine Untersuchung ergab, dass [SCOPE.sCharacter('lepsius_director_scope').GetFullName] während seiner Amtszeit wiederholt private Spenden von anonymen Personen erhalten hat. Allerdings gab er diese Artefakte nie dem Museum, sondern behielt sie für sich. Obwohl es sich nur um wenige Einzelstücke handelt, sind sie nicht minder wertvoll. Der gesamten Intelligenzia droht ein echter Skandal."
 lepsius.1612.g: "Die Wahrheit muss ans Licht kommen!"
 lepsius.1612.h: "[SCOPE.sCharacter('lepsius_director_scope').GetFullName] war ein ehrenhafter Mann."
 je_lepsius_pompeii: "Moderne Ausgrabungen in Pompeji"
 je_lepsius_pompeii_reason: "Die antike römische Stadt Pompeji, die 79 n. Chr. durch einen Ausbruch des Vesuvs verschüttet wurde, wird seit dem 18. Jahrhundert ausgegraben. In vielerlei Hinsicht lässt sich diese Art der Erkundung jedoch weitgehend als Plünderung, Zerstörung wissenschaftlichen Materials zum Erwerb von Kunstschätzen oder als Zerstörung wertvollen Materials aus purer Unwissenheit bezeichnen. Neue archäologische Methoden könnten die Forschung in Pompeji erheblich verbessern."
 je_lepsius_teotihuacan: "Teotihuacán"
 je_lepsius_teotihuacan_reason: "Teotihuacán galt bereits bei den Azteken als geheimnisvoller Ort, der lange vor ihrer Herrschaft entstanden war – für sie musste diese zerstörte Stadt der Geburtsort der Götter sein. Tatsächlich deuten viele Beweise darauf hin, dass Teotihuacán eine antike Stadt war, die Jahrhunderte vor dem Aztekenreich einen Großteil Mittelamerikas beeinflusste und eine der größten präkolumbianischen Stätten in Amerika ist. Die mexikanische Regierung hat daher nicht nur wissenschaftliche Gründe, diesen Ort genauer zu erforschen. Teotihuacán kann als Symbol einer langen, ununterbrochenen Kultur in Mexiko und damit als Vorläufer unserer Nation angesehen werden. Der Wiederaufbau der teilweise zerstörten Sonnenpyramide von Teotihuacán vor dem 100. Jahrestag der Unabhängigkeit soll diese Symbolik unterstreichen und die nationale Einheit und Geschichte feiern."
 je_lepsius_harappa: "Die Industal-Zivilisation"
 je_lepsius_harappa_reason: "Obwohl die Ruinenstätte in Harappa schon seit einiger Zeit bekannt ist und erstmals 1844 von Charles Masson in seinem Buch \"Narrative of Different Journeys in Balochistan, Afghanistan and The Panjab\" als \"eine zerstörte Festung aus Ziegeln\" beschrieben wurde, ist ihre Bedeutung doch groß immer noch nicht ganz geklärt. Vielleicht gibt es auch in Indien bisher völlig unbekannte archäologische Schätze?"
 je_lepsius_first_emperor: "Das Grab des Ersten Kaisers"
 je_lepsius_first_emperor_reason: "China ist eine junge Nation auf dem Gebiet der Archäologie. Unsere Forscher müssen in die Welt hinausgehen und Erfahrungen sammeln, um ihr Wissen zu vertiefen. Erst wenn wir genug Erfolg haben und unsere Archäologen ausreichend ausgebildet sind, können wir das größte archäologische Abenteuer wagen: nämlich die Untersuchung des Grabes des Ersten Kaisers, eine Aufgabe, an die sich bisher noch niemand getraut hat."
 lepsius.7.t: "Die Ausgrabung von Pompeji"
 lepsius.7.d: "In Pompeji sollen unter der Leitung von Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] neue wissenschaftliche Methoden erprobt werden. Dies ist ein Wendepunkt in der Ausgrabungsgeschichte von Pompeji. Der Schwerpunkt der Forschung muss jedoch noch festgelegt werden."
 lepsius.7.f: "Die Ausgrabungen von Giuseppe Fiorelli eröffneten ein neues Kapitel in der Erforschung und Ausgrabung von Pompeji. Bei frühen Ausgrabungen der Ausgrabungsstätte wurden gelegentlich Hohlräume in der Ascheschicht gefunden, die menschliche Überreste enthielten. Fiorelli erkannte, dass es sich dabei um Hohlräume handelte, die von den verwesten Körpern zurückgeblieben waren, und entwickelte daher die Technik, Gips hineinzuspritzen, um die Formen der Opfer des Vesuvs nachzubilden. Diese Technik wird auch heute noch verwendet, wobei anstelle von Gips ein klares Harz verwendet wird, da es haltbarer ist und die Knochen nicht zerstört, was eine weitere Analyse ermöglicht. Fiorelli führte auch die wissenschaftliche Dokumentation ein. Er teilte die Stadt in die heutigen neun Bereiche und Blöcke ein und nummerierte die Eingänge der einzelnen Häuser. Fiorelli veröffentlichte auch die erste Zeitschrift mit Ausgrabungsberichten. Unter seinen Nachfolgern wurde der gesamte Westteil der Stadt freigelegt."
 lepsius.7.g: "Wir interessieren uns vor allem für Artefakte."
 lepsius.7.h: "Wir müssen mehr über die Vergangenheit wissen."
 lepsius.7.i: "Wir wollen eine neue Generation von Wissenschaftlern ausbilden."
 lepsius.8.t: "Die Sonnenpyramide von Teotihuacán"
 lepsius.8.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] betrachtet das Panorama von Teotihuacán vom höchsten Punkt der rekonstruierten Pyramide: Dieses prestigeträchtige Projekt hat eine wichtige Hürde genommen, aber es ist noch unklar, welchen konkreten Nutzen das Land aus den Ausgrabungen ziehen wird."
 lepsius.8.f: "Teotihuacán im zentralen Hochland von Mexiko ist eine der bedeutendsten prähistorischen Ruinenmetropolen Amerikas und vor allem für seine Stufentempel wie die Große Sonnenpyramide bekannt. Das Gebiet von Teotihuacán war seit dem 6. Jahrhundert v. Chr. dauerhaft bewohnt. Zwischen 100 und 650 n. Chr. war die Stadt das dominierende kulturelle, wirtschaftliche und militärische Zentrum Mesoamerikas. Auf dem Höhepunkt seiner Entwicklung dürfte es bis zu 200.000 Einwohner gehabt haben. Zu ihrer Zeit war sie die mit Abstand größte Stadt auf dem amerikanischen Kontinent und eine der größten der Welt. Ab etwa 650 nahm seine Bedeutung ab, bis es um 750 aus nicht vollständig geklärten Gründen weitgehend aufgegeben wurde. Ihre kulturellen Einflüsse prägten Zentralmexiko bis zur spanischen Eroberung Mexikos."
 lepsius.9.t: "Eine unbekannte Zivilisation"
 lepsius.9.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] ist völlig verblüfft. Es scheint, dass er Spuren einer bisher völlig unbekannten Kultur gefunden hat, die sich vor Tausenden von Jahren im Indus-Tal niederließ – und daher eine Wiege der Zivilisation wie Ägypten oder Babylon sein würde. Es stehen jahrzehntelange Forschungsarbeiten an – doch wo liegen die Prioritäten?"
 lepsius.9.f: "Die bronzezeitliche Indus-Zivilisation, auch Indus-Zivilisation oder Harappan-Kultur genannt, war eine der frühesten städtischen Zivilisationen. Sie existierte zwischen etwa 2800 v. Chr. und 1800 v. Chr. entlang des Indus im Nordwesten des indischen Subkontinents. Die Indus-Zivilisation erstreckte sich über fast das gesamte heutige Pakistan sowie Teile Indiens und Afghanistans. Im Jahr 1912 fand J. Fleet im damaligen Britisch-Indien Siegel mit unbekannten Zeichen, was das Interesse der wissenschaftlichen Öffentlichkeit in Europa weckte. Unter der Leitung von John Marshall, dem damaligen Direktor des British Antiquities Service, wurden dann 1921/22 Ausgrabungen in Harappa und Mohenjo-Daro durchgeführt. Die Ähnlichkeit der beiden ausgegrabenen Städte machte schnell klar, dass hier eine bisher unbekannte Hochkultur entdeckt worden war."
 lepsius.70.t: "Eine Armee aus Terrakotta"
 lepsius.70.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] hat eine erstaunliche Entdeckung gemacht, als er die Gegend um das Mausoleum des Ersten Qin-Kaisers untersuchte: Eine Armee, die vollständig aus Terrakotta besteht und den toten Kaiser bis heute verteidigt."
 lepsius.70.f: "\"Im neunten Monat wurde der Erste Kaiser auf dem Berg Li beigesetzt. Die Ausgrabungs- und Vorbereitungsarbeiten am Berg Li begannen, als der Erste Kaiser zum ersten Mal den Thron bestieg. Später, nachdem er sein Reich geeint hatte, wurden 700.000 Männer aus seinem gesamten Reich dorthin geschickt. Sie gruben durch drei Grundwasserschichten und gossen Bronze für den äußeren Sarg ein. Es wurden Paläste und Aussichtstürme für hundert Beamte errichtet und das Grab mit seltenen Artefakten und wunderbaren Schätzen gefüllt. Handwerkern wurde befohlen, Armbrüste und Pfeile herzustellen, die darauf vorbereitet waren, auf jeden zu schießen, der das Grab betritt. Mit Quecksilber wurden die hundert Flüsse Jangtsekiang, Gelber Fluss und das Große Meer simuliert und mechanisch fließen lassen. Oben waren die Himmelskonstellationen dargestellt, unten die Merkmale des Landes. Kerzen wurden aus dem Fett von \"Menschenfischen\" hergestellt, das dazu bestimmt ist, lange zu brennen und nicht zu erlöschen. -Sima Qian"
 lepsius.70.g: "Chinas alte Größe ist erstaunlich."
 lepsius.61.t: "Die Ausgrabung in [SCOPE.sState('lepsius_excavation_state').GetName]"
 lepsius.61.d: "Während der Besetzung von [SCOPE.sState('lepsius_excavation_state').GetName] fielen archäologische Teams und Artefakte in unsere Hände. Die Archäologen bestehen darauf, die wissenschaftliche Arbeit nicht zu unterbrechen und die Ausgrabungsstätte zu schützen. Einige Beamte bestehen jedoch darauf, dass wir uns an der Beute bedienen sollten."
 lepsius.61.f: "Leider sind Plünderungen wichtiger Ausgrabungsstätten keine Seltenheit. Die anrückenden Heere wurden ihrem Ruf, Kunstschätze zu bewahren und zu schützen, nicht immer gerecht. In manchen Fällen weckte nur die Aussicht auf eine Rückkehr mit zusätzlicher Beute das Verlangen ehrgeiziger Männer – warum sollte das, was zu Sullas Zeiten galt, heute anders sein?"
 lepsius.61.g: "Plündere die Ausgrabungsstätte!"
 lepsius.61.h: "Schützen Sie die Ausgrabungsstätte."
 lepsius.62.t: "Ausgrabungsstätte geplündert!"
 lepsius.62.d: "Der Krieg in einem unserer Ausgrabungsländer hat seine Spuren hinterlassen: Feindliche Truppen haben die Region, in der eine archäologische Ausgrabungsstätte erforscht wird, besetzt und die von unserem Team dort gefundenen Artefakte kurzerhand beschlagnahmt – eine Spur der Zerstörung hinterlassend."
 lepsius.62.f: "Archäologische Ausgrabungsstätten können Opfer von Krieg und Zerstörung werden – davon sind auch neutrale Archäologenteams betroffen, die nicht als Dritter Teil einer kriegführenden Nation sind. Raubgierige Nationen können sich dann die Artefakte zunutze machen, die noch nicht in ihre jeweiligen Heimatländer zurückgegeben wurden. Keine Sorge: Das Grabungsteam bleibt vor Ort und die Ausgrabung geht nicht verloren. Allerdings wird es noch drei Jahre dauern, bis die Archäologen die Schäden soweit behoben haben, dass ein normaler Betrieb wieder möglich ist. Während dieser Zeit gelangen keine jährlichen Artefakte dieser archäologischen Ausgrabungsstätte in unsere Museen."
 lepsius.62.g: "Diese Barbaren!"
 lepsius_excavation_sacked_state_modifier: "Geplünderte archäologische Stätte"
 lepsius_excavation_protected_state_modifier: "Geschützte archäologische Stätte"
 lepsius_4_excavation_team_needed_tt: "Verfügen Sie über mindestens #G 4#! Ausgrabungsteams."
 lepsius.2101.t: "Überreste einer römischen Schlacht"
 lepsius.2101.f: "\"Sir, ich habe einen weiteren Nagel gefunden!\"\n\"Fabelhaft! Das bestärkt die Theorie, dass dieser Ort Schauplatz einer alten Schlacht war! Ich hoffe, wir werden bald auch ein paar Knochen finden!\""
 lepsius.2101.g: "Keine prestigeträchtige, aber eine wichtige Entdeckung!"
 lepsius.2102.t: "Villa Rustica entdeckt"
 lepsius.2102.f: "\"Eine Villa Rustica war nicht nur ein bedeutender Hersteller von landwirtschaftlichen Gütern, Nahrungsmitteln und Getränken. Darüber hinaus ermöglichte sie den Reisenden, sich auf ihren Reisen auszuruhen, und war maßgeblich an der Versorgung der Legionen beteiligt. Diese Überreste ermöglichen es uns, Rückschlüsse auf die Nahrungsmittelproduktion und das Leben der Römer zu ziehen und Landwirtschaft im Imperium Romanum."
 lepsius.2102.g: "Dies wird uns viel über das Leben der ländlichen Römer erzählen!"
 lepsius.2103.t: "Antike römische Tafeln entdeckt"
 lepsius.2103.f: "Claudia Severa grüßt ihre Lepidina.\nAm 11. September, Schwester, zum Tag der Feier meines Geburtstages lade ich Dich herzlich ein, dass Du zu uns kommst, um mir den Tag durch Dein Kommen noch angenehmer zu machen , wenn Sie anwesend sind. Grüße Deine Cerialis von mir. Mein Aelius und mein kleiner Sohn grüßen ihn.\nIch werde dich erwarten, Schwester. Lebe wohl, Schwester, meine liebste Seele, ich hoffe, dass es dir gut geht und ich grüße dich.\nAn Sulpicia Lepidina, Frau von Cerialis, aus Cl. Severa."
 lepsius.2103.g: "Nicht alle Schätze bestehen aus Silber und Gold!"
 lepsius.2104.t: "Römischer Münzschatz entdeckt"
 lepsius.2104.d: "Römische Münzschätze sind ein seltener Fund. Dennoch wurde einer in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] gefunden. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte den Schatz zurückholen, der wahrscheinlich während einer Krisenzeit des Imperium Romanum verborgen war."
 lepsius.2104.f: "\"Ich frage mich, ob Archäologen eines Tages von uns hinterlassene Münzen finden und sich fragen werden, wie sie dort gelandet sind.\""
 lepsius.2104.g: "Mein Schatz!"
 lepsius.2111.t: "Alter persischer Sarkophag"
 lepsius.2111.f: "\"Vorsicht, vorsichtig. Wir dürfen nicht zulassen, dass dieser Fund beschädigt wird. Bitte verwenden Sie kein Brecheisen darauf!\""
 lepsius.2111.g: "Was für ein toller Fund!"
 lepsius.2112.t: "Hort im Perserpalast"
 lepsius.2112.d: "Der Hinweis eines Bauern hat [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] zu einem verlorenen persischen Palast aus der Zeit der Achämeniden geführt. Bei der anschließenden Ausgrabung gab es eine Überraschung."
 lepsius.2112.f: "Mesopotamien war eine der Kernprovinzen des alten Persischen Reiches. Während der Eroberung brachten die Achäminiden zahlreiche Kunstwerke sowie Keilschrifttafeln mit in ihre Heimat. Dennoch war es für das Archäologenteam überraschend, in einem Teil des Palastes ein ganzes Archiv mesopotamischer Tafeln freizulegen."
 lepsius.2112.g: "Sammle sie alle!"
 lepsius.2113.t: "Ägyptische Statue im persischen Grab"
 lepsius.2113.d: "Bei einer kleinen Ausgrabung im Grab eines persischen Adligen wurde eine kleine Figur des ägyptischen Gottes Thot freigelegt."
 lepsius.2113.f: "Die Perser regierten Ägypten mehr als ein Jahrhundert lang. Aber auch davor und danach gab es einen kulturellen Austausch zwischen den beiden Zivilisationen, auch wenn es zwischen beiden Reichen häufig zu Kriegen kam."
 lepsius.2113.g: "Wie kam das Artefakt hierher?"
 lepsius.2114.t: "Monumentale Inschrift"
 lepsius.2114.d: "Ein Erdrutsch hat eine monumentale Felsinschrift in einem Berg freigelegt, die zuvor als verschollen galt. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] machte sich direkt daran, den alten Bericht auszuwerten."
 lepsius.2114.f: "Persische Felsinschriften oder Reliefs haben einen festen Platz in der Kunst des untergegangenen Reiches. Die berühmteste ist die Behistun-Inschrift, eine mehrsprachige achämenidische Königsinschrift und ein großes Felsrelief auf einer Klippe am Berg Behistun in der iranischen Provinz Kermanshah, die von Darius dem Großen errichtet wurde. Sie war wichtig für die Entschlüsselung der Keilschrift, da es sich um die älteste bekannte dreisprachige Keilinschrift handelt, die in Altpersisch, Elamitisch und Babylonisch (einer Varietät des Akkadischen) verfasst wurde."
 lepsius.2114.g: "Eine wichtige Primärquelle zur persischen Geschichte!"
 lepsius_state_trait_tikal: "Tikal – Stadt im Dschungel\n#G +1#! @lepsius_local_minor! lokales Artefakt aus archäologischen Projekten"
 je_lepsius_tikal: "Tikal – Stadt im Dschungel"
 je_lepsius_tikal_reason: "Die Expedition von Stephens und Catherwood stieß auf großes Interesse, insbesondere nachdem ein Buch zahlreiche Illustrationen verlorener Maya-Städte enthielt. Doch die beiden Abenteurer hatten nicht alle Orte gefunden. Zahlreiche unbekannte Orte warteten noch darauf, wiederentdeckt zu werden. Einer von ihnen war der legendäre Tikal."
 lepsius.71.t: "Tikal – Stadt im Dschungel"
 lepsius.71.d: "Nach einer mühsamen Suche tief im Dschungel Guatemalas hat eine Expedition unter der Leitung von Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] die legendäre Maya-Stadt Tikal gefunden. Ein historisches Ereignis für unser Land – aber welche Schlussfolgerung sollten wir daraus ziehen?"
 lepsius.71.f: "Tikal ist eine alte Maya-Stadt im Petén-Regenwald im Norden Guatemalas mit bemerkenswerten Stufentempeln. Sie war eine der bedeutendsten Städte der klassischen Maya-Zeit (3. bis 9. Jahrhundert) und ist eine der am besten erforschten Maya-Städte. Die ersten Siedlungsspuren reichen bis ins frühe 1. Jahrtausend v. Chr. zurück. Im 2. Jahrhundert begann die eigentliche Stadtentwicklung mit dem Bau von Tempeln, Stelen und Palast-Tempel-Anlagen. Ein erster Höhepunkt wurde im 5. Jahrhundert erreicht, als eine mächtige Herrscherdynastie einen Kleinstaat nach dem anderen in der Nachbarschaft unterwarf und zu Vasallenkönigreichen machte, was zu einem langfristigen Konflikt mit dem mächtigen Nachbarstaat Calakmul führte. Einen zweiten Höhepunkt erlebte Tikal im 8. Jahrhundert, nachdem Calakmul als Rivale besiegt wurde. Im frühen 9. Jahrhundert schwand die Macht von Tikal und der Bau wurde eingestellt. Spätestens im 10. Jahrhundert war die Stadt völlig verlassen."
 LEPSIUS_NO_MORE_EXPEDITIONS_FOR_YEARS_TT: "Sie werden #n keine#! [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] für #n 3 bis 5 Jahre#! durchführen können, da Ihr [concept_lepsius_archaeologist] mit der Katalogisierung der Funde beschäftigt sein wird."
 LEPSIUS_SUB_TEAM_WITH_EXPLANATION_TT: "Verliere #R 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]. Sie können es #p nach der [Concept('concept_lepsius_expedition','Archäologischen Expedition')] zurückholen#! oder es dort für die Etablierung einer [concept_lepsius_excavation] belassen, wenn Sie die Technologie #V Frühe Archäologie#! erforscht haben."
 lepsius_long_expedition_tt: "Eine lange [concept_lepsius_expedition] dauert etwa #V 1 Jahr#!. Nach der Expedition muss der [concept_lepsius_archaeologist] die Funde katalogisieren, und Sie werden für #n 5 Jahre#! #p nicht#! in der Lage sein, eine weitere Expedition durchzuführen."
 lepsius_medium_expedition_tt: "Eine mittellange [concept_lepsius_expedition] dauert ca. #V 10 Monate#!. Nach der Expedition muss der [concept_lepsius_archaeologist] die Funde katalogisieren, und Sie werden für #n 4 Jahre#! #p nicht#! in der Lage sein, eine weitere Expedition durchzuführen."
 lepsius_short_expedition_tt: "Eine kurze [concept_lepsius_expedition] dauert ca. #V 8 Monate#!. Nach der Expedition muss der [concept_lepsius_archaeologist] die Funde katalogisieren, und Sie werden für #n 3 Jahre#! #p nicht#! in der Lage sein, eine weitere Expedition durchzuführen."
 lepsius_leave_team_for_excavation_tt: "Sie lassen Ihr [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] eine [concept_lepsius_excavation] einrichten, die normalerweise #V 1#! [concept_lepsius_artifact] #V jährlich#! erbringt."
 lepsius.2101.d: "Als ein Bürger in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] einen Eisendolch fand, stellte [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] ein Team zusammen und begann mit der Ausgrabung. Sie fanden verschiedene Überreste einer antiken römischen Schlacht, von Teilen eines Schildes über Nägel bis hin zu einigen Münzen. Mithilfe der Münzen konnten die Archäologen die Schlacht ziemlich genau datieren."
 lepsius.2102.d: "Ein Bauer fand auf einem seiner Felder antike Überreste. Zum Glück kontaktierte er die Universität und Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] eine alte Villa Rustica freilegen. Die Vielfalt der archäologischen Funde lässt Rückschlüsse auf das Leben der römischen Bevölkerung auf dem Land zu."
 lepsius.2103.d: "Die Entdeckung verschiedener römischer Tafeln aus dünnem Holz in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wird von Archäologen gefeiert. Obwohl Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] mit heutigen Methoden nur die Bedeutung einiger Tafeln herausfinden konnte, öffnen selbst diese wenigen Tafeln ein Fenster in das römische Leben."
 lepsius.2111.d: "Ein außergewöhnlicher Fund aus dem antiken Persischen Reich wurde in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] gemacht. Ein Bauer fand einen alten Bronzesarkophag und kontaktierte Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]. Dank [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Expertise konnte Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] den Sarkophag öffnen und entdeckte ein Skelett, das mit luxuriösem Schmuck bedeckt war. Der Schmuck lässt darauf schließen, dass es sich um einen achämenidischen Würdenträger handelte."
 je_lepsius_dreamtime: "Die Traumzeit"
 je_lepsius_dreamtime_reason: "Der britische Ethnologe Walter Baldwin Spencer und sein australischer Kollege Francis James Gillen übersetzten das Wort alcheringa aus der zentralaustralischen Sprache Arrernte mit \"Träumen\". Für die Aborigines geht es in der Traumzeit um die spirituelle, natürliche und moralische Ordnung des Kosmos. Träumen bedeutet in diesem Zusammenhang die kollektive Fähigkeit, die Welt und ihre Zusammenhänge richtig zu verstehen und zu nutzen, im Rahmen einer Kulthandlung über die mythische Welt nachzudenken und über Lebenskraft zu verfügen. Eine Reihe von Kultstätten, die mit dieser Traumzeit, anderen Mythen der Aborigines sowie archäologischen und anthropologischen Überresten in Zusammenhang stehen, sind über ganz Australien verteilt. Es ist Zeit, die Vergangenheit des letzten Kontinents gründlich zu untersuchen."
 lepsius_2_excavation_team_needed_tt: "Verfügen Sie über mindestens #G 2#! Ausgrabungsteams."
 lepsius.72.t: "Traumzeit"
 lepsius.72.d: "Während ihrer Reise durch Australien haben die Professoren [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] und [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] wertvolle wissenschaftliche Forschungen durchgeführt, die Licht auf die bisher unerforschte Vergangenheit des Kontinents werfen."
 lepsius.72.f: "Nach ihrer Rückkehr überraschten die Wissenschaftler die Akademische Gesellschaft mit einer ganzen Reihe beeindruckender Funde. Sie hatten Zeichnungen und Skizzen von Höhlenmalereien angefertigt, Jahrtausende alte Knochen mitgebracht, Artefakte der alten und neueren Geschichte geborgen und die Mythen und Geschichten der Aborigines aufgezeichnet. Mit so einer satten Beute hätte keiner der Kollegen gerechnet."
 lepsius.72.g: "Oh, es gibt sogar ein Didgeridoo!"
 je_lepsius_gwanggaeto: "Die Gwanggaeto-Stele"
 je_lepsius_gwanggaeto_reason: "Die Gwanggaeto-Stele ist ein Gedenkstein für Gwanggaeto, der von 391 bis zu seinem Tod König von Goguryeo war. Die Stele steht in China nahe der Grenze zu Nordkorea. Die in die Stele eingravierte Inschrift ist die älteste und detaillierteste erhaltene Quelle zur Geschichte des Goguryeo-Königreichs. Als das Königreich Goguryeo und sein Nachfolger Balhae im Jahr 668 fielen, verlor die Region um Guonei und Wandu an Bedeutung. Nach der Eroberung des Chinesischen Reiches durch die Mandschu im Jahr 1644 erklärten die Kaiser der neuen Qing-Dynastie eine weite Zone nördlich des Yalu-Flusses zum Sperrgebiet. Erst in der zweiten Hälfte des 19. Jahrhunderts wurde das Gebiet wieder für die Besiedlung freigegeben. Um 1876 entdeckte ein chinesischer Beamter die Stele wieder, die völlig überwuchert und teilweise im Boden versunken war."
 lepsius_gwanggaeto_modifier: "Vermächtnis von Goguryeo"
 lepsius.73.t: "Gwanggaeto-Stele"
 lepsius.73.d: "Der zufällige Fund einer großen Stele aus der Zeit des untergegangenen Reiches Goguryeo gewährt nicht nur einen Einblick in eine bisher unbekannte Vergangenheit, sondern wirft auch Rätsel auf – Rätsel, die politischen Sprengstoff bergen."
 lepsius.74.t: "Goguryeo – Ein koreanisches Reich"
 lepsius.74.d: "Nach der Entdeckung einer König Gwanggaeto gewidmeten Stele behauptete China mutig, dies sei ein Beweis dafür, dass Goguryeo kein koreanischer, sondern ein chinesischer Staat sei – oder zumindest ein von China abhängiger Staat. Japan behauptet jedoch, es beweise die japanische Herrschaft im Süden Koreas."
 lepsius.75.t: "Die Invasion von Wa"
 lepsius.75.d: "Die kürzlich entdeckte Gwanggaeto-Stelo liefert den Beweis für eine erfolgreiche japanische Invasion in Südkorea und die Unterwerfung dortiger Staaten."
 lepsius.73.f: "Die von [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] entdeckte Stele ist ein gewaltiges Monument, möglicherweise sogar die größte existierende Stele der Welt. Obwohl sie eine einzigartige Quelle für die Konstruktion der Geschichte des Goguryeo-Staates in Nordkorea und der südlichen Mandschurei ist, haben schwer lesbare Teile sowie der Streit über die Identität des Goguryeo-Königreichs politische Konsequenzen, die nicht von der Hand zu weisen sind, insbesondere in einer Zeit, in der der Nationalismus auch in den fernöstlichen Staaten erwachte. Das Königreich Goguryeo ist historisch und kulturell eng mit den modernen koreanischen Volksgruppen verbunden, aber China ist nicht zu Unrecht besorgt, dass der multiethnische Teil der Südmandschurei, der ein Zentrum von Goguryeo war, von irredentistischen koreanischen Nationalisten beansprucht werden könnte. Andererseits hat eine Passage über eine mögliche Invasion Japans (Wa) Anlass zu Spekulationen über eine japanische Herrschaft in Südkorea gegeben, während die koreanische Interpretation für eine Invasion Japans durch koreanische Staaten spricht."
 lepsius.73.g: "Eine lehrreiche Vergangenheit, die es zu entschlüsseln lohnt."
 lepsius.73.h: "Goguryeo war ein wichtiger chinesischer Staat."
 lepsius.73.i: "Dies unterstreicht, dass die Südmandschurei ursprünglich koreanisches Land war."
 lepsius.73.j: "Ein Hinweis auf japanischen Einfluss auf Korea."
 lepsius.2131.t: "Schädelfragmente in einer aztekischen Siedlung gefunden"
 lepsius.2131.d: "In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde eine grausame Entdeckung gemacht. Verschiedene Schädelfragmente ließen Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] vermuten, dass sich hier ein Tzompantli, ein Schädelständer, befand."
 lepsius.2131.f: "Die Azteken neigten dazu, die Gefangenen der Blumenkriege zu opfern. Oftmals wurden die Schädel dieser Menschenopfer dann in einem Tzompantli oder Schädelständer gesammelt. Oft wurden die Schädel einfach übereinander gestapelt, so dass eine Art Schädelwand entstand. Einige Tempel haben sogar Steinwände, in die Steinmetze als Dekoration Schädel geschnitzt haben."
 lepsius.2131.g: "Wie gemein!"
 lepsius.2132.t: "Aztekische Inschrift von einem örtlichen Gelehrten gerettet"
 lepsius.2132.d: "Als in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] ein Pflaster ersetzt wurde, dachte niemand, dass die Pflastersteine ​​einen archäologischen Fund ans Licht bringen würden, aber ein örtlicher Gelehrter fand verschiedene aztekische Inschriften auf den Steinen. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] wurde vor Ort gerufen und konnte die Inschriften retten."
 lepsius.2132.f: "Der Fund stellt eine Art Schlacht dar, die von den Mexica geführt wurde. Wir sind uns noch nicht sicher, was Nahuatl alles bedeutet, aber es gibt viele Toponyme. So können wir zumindest herausfinden, welche Orte erwähnt werden."
 lepsius.2132.g: "Gott sei Dank konnte er es finden, bevor es als Pflaster endete."
 lepsius.2133.t: "Aztekenruinen entdeckt"
 lepsius.2133.d: "In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurden alte aztekische Ruinen entdeckt. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] begann sofort mit den Ausgrabungen. Leider war außer den Gebäuden selbst nicht viel zu finden."
 lepsius.2133.f: "\"Obwohl die Ruinen bereits geplündert waren, ermöglichen sie Einblicke in das Leben des mexikanischen Volkes vor der Ankunft der Europäer. Dies ist immer noch ein wichtiger Fund für uns!\""
 lepsius.2133.g: "Interessant."
 lepsius.2134.t: "Obsidianspiegel entdeckt"
 lepsius.2134.d: "In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde ein Meisterwerk aztekischer Handwerkskunst entdeckt. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte einen perfekten Obsidianspiegel finden, den die Azteken bei ihren religiösen Ritualen verwendeten."
 lepsius.2134.f: "\"Es wurde angenommen, dass Obsidianspiegel ein Mittel zur Kommunikation mit der Unterwelt waren. Ein Gott, Tezcatlipoca, wurde sogar so dargestellt, dass er einen Spiegel anstelle eines Fußes hatte. Das ist ein großartiger archäologischer Fund!\""
 lepsius.2134.g: "Unglaublich!"
 lepsius.2141.t: "Karthagisches Schiffswrack entdeckt"
 lepsius.2141.d: "Perlentaucher in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] entdeckten ein altes karthagisches Schiffswrack. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] entschied, dass das Schiff vorerst im Meer bleiben soll, aber dank der Taucher konnte die Ladung analysiert und aufgezeichnet werden, was neue Erkenntnisse über die karthagischen Handelsrouten ermöglichte."
 lepsius.2141.f: "\"Es gibt viele violette Stoffe, die wahrscheinlich für den Adel verschiedener Länder bestimmt waren.\""
 lepsius.2141.g: "Die größten Händler des Mittelmeerraums!"
 lepsius.2142.t: "Gestrandetes punisches Kriegsschiff"
 lepsius.2142.d: "Wer hätte gedacht, dass die Karthager, die Herren des Meeres, gestrandet sind. Nun, es ist anscheinend in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] passiert. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte viele Fundstücke aus dem einst mächtigen Schlachtschiff bergen. Das Holz war jedoch bereits größtenteils zersetzt."
 lepsius.2142.f: "\"Ist das eine Bireme, eine Trireme, eine Quinquireme oder eine noch größere Reme?\""
 lepsius.2142.g: "Ein einst prächtiges Schiff!"
 lepsius.2143.t: "Punischer Hafen entdeckt"
 lepsius.2143.d: "In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde ein alter Hafen von Karthago entdeckt. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ordnete eine gründliche Untersuchung des Geländes an. Leider konnten nur Teile geborgen werden, da ein reicher Industrieller dort sofort eine neue Fabrik errichten wollte."
 lepsius.2143.f: "\"Wenigstens konnten wir einige Amphoren finden. Sie werden uns bestimmt viel über den antiken Mittelmeerhandel erzählen.\""
 lepsius.2143.g: "Ein völlig unbekannter Hafen! Was für eine Entdeckung!"
 lepsius.2144.t: "Münzen aus dem antiken Karthago entdeckt"
 lepsius.2144.d: "Ein Bauer hat in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] einen Schatz antiker Münzen ausgegraben. Leider ergab auch eine gründliche Untersuchung durch Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] keine weiteren punischen Artefakte. Es ist ein Rätsel, wie die Münzen in dieses Feld gelangten."
 lepsius.2144.f: "\"Diese Münze zeigt Hasdrubal, den Bruder von Hanibal. Es muss offensichtlich eine relativ neue Münze sein.\""
 lepsius.2144.g: "Ich bin jetzt reich!"
 lepsius.2151.t: "Keltischer Kessel entdeckt"
 lepsius.2151.d: "Die Kelten verwendeten Kessel aus vielen Gründen. Nun wurde einer dieser riesigen Kessel in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] gefunden. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte dieses riesige Stück Metallwaren in unsere Sammlung aufnehmen."
 lepsius.2151.f: "\"Es gibt eine Legende, dass ein großer Krieger in einen Kessel voller Zaubertrank fiel, der jedem, der daraus trank, unmenschliche Kräfte verlieh. Anscheinend war dieser Krieger so stark, dass er riesige Steine ​​heben konnte. Er liebte es auch, gegen Römer zu kämpfen.\""
 lepsius.2151.g: "Ich hoffe, dass noch niemand in den Zauberkessel gefallen ist!"
 lepsius.2152.t: "Keltische Bronzeschildabdeckung gefunden"
 lepsius.2152.d: "Im schlammigen Flussbett in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde eine Bronzeplatte gefunden. Als Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] eintraf, konnte [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] feststellen, dass die Metallplatte einst Teil eines keltischen Schildes war."
 lepsius.2152.f: "\"Einige Geschichten besagen, dass keltische Häuptlinge auf Schilden getragen wurden, aber das ist mit Sicherheit eine Kindergeschichte. Tacitus erzählt uns jedoch, dass Häuptlinge auf einem Schild hochgehoben wurden, als sie zu neuen Häuptlingen erklärt wurden. Dies könnte die historische Quelle sein für diese Geschichten.\""
 lepsius.2152.g: "Ein Schild, der eines großen Häuptlings würdig ist!"
 lepsius.2153.t: "Keltischer Bronzehelm geborgen"
 lepsius.2153.d: "In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde ein gehörnter Bronzehelm gefunden. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] stellte schnell fest, dass es sich tatsächlich nicht um einen im Kampf getragenen Helm, sondern um einen keltischen Kultgegenstand handelte."
 lepsius.2153.f: "\"Vielleicht haben Sie Abbildungen von Kelten gesehen, die Helme mit Flügeln oder Hörnern trugen, aber diese Darstellungen sind falsch. In einer Schlacht wäre ein solcher Helm ein Hindernis gewesen. Solche Helme existierten, waren aber oft nur Kultgegenstände, die sich auf bestimmte keltische Götter bezogen.\" \""
 lepsius.2153.g: "Was für ein großartiger Helm!"
 lepsius.2154.t: "Alter Menhir entdeckt"
 lepsius.2154.d: "Auf einer von [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Wanderungen durch die Landschaft fand Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] einen seltsamen Stein. Es stellte sich heraus, dass es sich um einen keltischen Menhir handelte, der einst vom örtlichen keltischen Stamm errichtet wurde. Jetzt studiert Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] den Menhir gründlich."
 lepsius.2154.f: "\"Wir wissen nicht, warum die Kelten Menhire errichteten, da sie keine schriftlichen Zeugnisse hinterlassen haben. Aber es könnte sich durchaus um eine Art Kultstätte handeln. Einige Einheimische haben ihre eigene Geschichte über einen berühmten Krieger und seinen mächtigen Hund. Dieser Obelix war offenbar perfekt hat Menhire geformt und sie ohne Hilfe errichtet. Das ist aber nur eine alberne Geschichte.\""
 lepsius.2154.g: "War das das Werk von Obelix?"
 lepsius.2161.t: "Ägäisches Fresko gefunden"
 lepsius.2161.d: "Bei einer örtlichen Ausgrabung einer ägäischen Ruine wurde in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] ein prächtiges Fresko freigelegt. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ordnete die Anfertigung von Zeichnungen des Fundes an, da das Fresko mit den Ruinen in Verbindung gebracht wird."
 lepsius.2161.f: "\"Diese Muster sind erstaunlich! Ich wünschte, wir würden in der heutigen Zeit solch eine Schönheit schaffen!\""
 lepsius.2161.g: "Das ist Kunst!"
 lepsius.2162.t: "Ägäische Ruinen entdeckt"
 lepsius.2162.d: "Bei Bauarbeiten in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde eine antike ägäische Ruine entdeckt. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] begann mit einer gründlichen Untersuchung der Stätte. Leider sind nicht mehr viele Funde übrig, aber die Ruinen können helfen, das Leben der Menschen zu verstehen, die einst hier lebten."
 lepsius.2162.f: "\"Diese Bögen stehen hier seit Jahrtausenden. Ich frage mich, ob unsere Gebäude so lange überleben werden ...\""
 lepsius.2162.g: "Dies wird uns viel über das Leben in der alten Ägäis erzählen."
 lepsius.2163.t: "Ägäischer Schmuck ausgegraben"
 lepsius.2163.d: "Durch einen glücklichen Zufall stolperte ein Bauer über einen faszinierenden Fund in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Als Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ankam, konnte [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] nur über den faszinierenden ägäischen Schmuck staunen."
 lepsius.2163.f: "\"So hübscher Schmuck. Ich wünschte, wir könnten heute ähnliche Schmuckstücke herstellen!\""
 lepsius.2163.g: "Wunderbare Handwerkskunst!"
 lepsius.2164.t: "Goldener Pokal ägäischen Ursprungs"
 lepsius.2164.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte in einer unserer örtlichen Ausgrabungsstätten einen goldenen Pokal freilegen. Niemand hätte solch einen wunderbaren Fund erwartet, aber anscheinend [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. bietet immer noch viele Möglichkeiten für tolle Funde."
 lepsius.2164.f: "\"Der Pokal zeigt eine Szene mit einem Mann und mehreren Bullen. Die Bullen sind recht dynamisch und in verschiedenen Posen.\""
 lepsius.2164.g: "Ich hätte gerne so eine Tasse!"
 lepsius.2171.t: "Ägyptische Wandmalereien"
 lepsius.2171.d: "Altägyptische Wandmalereien wurden von Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] auf einer [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Reisen nach [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] gefunden. Die Wandgemälde zeigen Szenen aus dem alten Ägypten."
 lepsius.2171.f: "\"Das Faszinierende ist, dass die Wände immer noch bemalt sind, während in Griechenland alles nur weiß ist. Aber offenbar waren die Ägypter entweder viel farbenfroher oder die Wüste hielt die Farben besser intakt.\""
 lepsius.2171.g: "Wundervolle Bilder!"
 lepsius.2172.t: "Altägyptischer Tempel ausgegraben"
 lepsius.2172.d: "Wer hätte gedacht, dass es in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] noch unbekannte Tempel gibt? Anscheinend gibt es sie und Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat eines unter dem Sand gefunden. Es ist ein toller Fund, auch wenn alles Wertvolle schon lange weg war."
 lepsius.2172.f: "\"Sehen Sie sich diesen Tempel an! Können Sie sich die religiösen Zeremonien vorstellen, die hier stattfinden? Ist das nicht erstaunlich?\""
 lepsius.2172.g: "Hier gibt es so viel zu lernen!"
 lepsius.2173.t: "Ägyptische Statue geborgen"
 lepsius.2173.d: "Obwohl die Statue zerbrochen ist, handelt es sich immer noch um ein großartiges Werk eines unbekannten ägyptischen Steinmetzes. Die in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] gefundene Statue stellte wahrscheinlich einen Falken dar, bevor er zerbrach. Das glaubt zumindest Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]."
 lepsius.2173.f: "\"Es sieht vielleicht nicht nach viel aus, aber diese Statue wird uns viel darüber erzählen, wie die Ägypter solche Statuen hergestellt haben!\""
 lepsius.2173.g: "Das sind fantastische Steinmetzarbeiten!"
 lepsius.2174.t: "Ägyptische Mumie entdeckt"
 lepsius.2174.d: "Mumien gehören wohl zu den häufigsten Fundstücken in Ägypten. Dieser wurde in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] gefunden. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] begann, es sehr sorgfältig zu untersuchen, aber einige Leute haben ... andere Ideen."
 lepsius.2174.f: "\"Stellen Sie sich vor, wir könnten anhand dieser Mumien herausfinden, was die Menschen im alten Ägypten aßen, was sie tranken und wie gesund sie waren. Das wäre fantastisch!\""
 lepsius.2174.g: "Tod ist nur der Anfang."
 lepsius.2174.h: "Ich habe gehört, dass manche Leute gerne Mumien essen! Lass es uns verkaufen!"
 lepsius.2181.t: "Hellenische Schlachtstätte entdeckt"
 lepsius.2181.d: "Die Kriege der Diadochen verwüsteten viele Gebiete der Welt. In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] zum Beispiel scheint es einen begrenzten Kampf gegeben zu haben. Ob es Teil des Diadochenkrieges war, muss noch geklärt werden – Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] fand verschiedene Waffen und Rüstungsteile."
 lepsius.2181.f: "\"Hier muss es eine kleine Schlacht gegeben haben. Nicht so groß wie andere, aber dennoch wichtig. Ich bin sicher, wir werden mehr über diese Seite herausfinden!\""
 lepsius.2181.g: "Wie schade, dass diese Kriege waren..."
 lepsius.2182.t: "Hellenische Münzen gefunden"
 lepsius.2182.d: "Die alten Hellenen hinterließen ihre Spuren in weiten Teilen der Welt, vom Mittelmeer bis nach Indien. Oftmals können Münzen gefunden werden, wie es in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] passiert ist. Dank der Münzen wird Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] in der Lage sein, die griechische Präsenz in der Region zu bestimmen."
 lepsius.2182.f: "\"Ich schätze, ich bin jetzt reich!\""
 lepsius.2182.g: "Faszinierend!"
 lepsius.2183.t: "Hellenische Ruinen ausgegraben"
 lepsius.2183.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] ist die neueste Stätte, die eine hellenische Ruine anbietet. Hellenische Städte gibt es von Spanien bis nach Indien. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ist der Meinung, dass diese spezielle Stadt uns mehr über griechische Siedlungen verraten wird"
 lepsius.2183.f: "\"Können Sie sich vorstellen, dass eine Kultur eine so große Distanz überspannt? Es ist wirklich unglaublich!\""
 lepsius.2183.g: "Griechische Städte gibt es einfach überall, nicht wahr?"
 lepsius.2184.t: "Darstellung eines griechischen Gottes"
 lepsius.2184.d: "Die griechischen Götter und ihre Religion reisten in weit entfernte Länder. In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde kürzlich eine Darstellung eines griechischen Gottes entdeckt. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] stellte fest, dass es sich um Dionysos handeln musste, den griechischen Gott des Weines."
 lepsius.2184.f: "\"Die griechische Geschichte besagt, dass Dionysos kaum geboren wurde, als Zeus ihm einen Oberschenkel zunähte und ihn nach Nysa in Äthiopien jenseits von Ägypten trug; und was Pan betrifft, wissen die Griechen nicht, was aus ihm wurde nach seiner Geburt. Daher ist es für mich klar, dass die Griechen die Namen dieser beiden Götter später als die Namen aller anderen erfuhren und die Geburt beider auf die Zeit zurückführen, als sie das Wissen erlangten.\"\n- Herodot"
 lepsius.2184.g: "Trinken wir etwas Wein zu dieser Entdeckung!"
 lepsius.2500.t: "Neue archäologische Karte von [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]"
 lepsius.2500.d: "Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat hart daran gearbeitet, alle archäologischen Funde der letzten Jahre in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] auf einer Karte festzuhalten. Diese Karte lässt Rückschlüsse darauf zu, wo weitere Funde möglich sind."
 lepsius.2500.f: "\"Hier haben wir ein paar Nägel gefunden und dort drüben haben wir die Knochen eines Schafes gefunden! Ist das nicht unglaublich?!\""
 lepsius.2500.g: "Dies wird Türen zu neuen Funden öffnen!"
 lepsius.2501.t: "Ein illustrierter archäologischer Katalog [GetPlayer.GetAltName('GEN')]"
 lepsius.2501.d: "Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ist nicht nur ein hervorragender Archäologe, sondern auch ein großartiger Künstler. Dank dieser Fähigkeit konnte er einen illustrierten archäologischen Katalog [GetPlayer.GetAltNameNoFormatting('GEN')] veröffentlichen, der von vielen Laien als erstaunlicher Einstieg in die Archäologie angesehen wird."
 lepsius.2501.f: "\"Sehen Sie sich diese Illustrationen an! Es sieht aus, als wären wir in einem Museum und könnten die Objekte direkt vor uns sehen! Erstaunlich!\""
 lepsius.2501.g: "Ein wunderbares Buch!"
 lepsius.2502.t: "Neuer Katalog aller archäologischen Funde [GetPlayer.GetAltName('GEN')]"
 lepsius.2502.d: "Mit [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]em neuen Katalog aller archäologischen Funde [GetPlayer.GetAltNameNoFormatting('GEN')] hat Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] eine sorgfältige Arbeit geleistet, die kaum jemand für möglich gehalten hätte. Dank [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er außergewöhnlichen Arbeit liegt uns nun ein präziser Katalog aller bisherigen Funde in 7 Bänden vor."
 lepsius.2502.f: "\"Nummer 7342: Ein Stück Stein, wahrscheinlich neolithisch, mit dem Namen Rocky.\""
 lepsius.2502.g: "Das wird in Zukunft hilfreich sein!"
 lepsius.2503.t: "Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] stoppt den Artefaktschmuggel"
 lepsius.2503.d: "Nach monatelanger Arbeit gelang es Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] einen Schmugglerring zu verhaften, der Artefakte durch unser Land schmuggelte. Die Artefakte wurden beschlagnahmt und sind nun sicher in unserer Sammlung verstaut."
 lepsius.2503.f: "\"Ihr habt wertvolle archäologische Erkenntnisse zerstört, ihr Schurken!\""
 lepsius.2503.g: "Das gehört in ein Museum!"
 lepsius.2600.t: "Der verlorene Stern"
 lepsius.2600.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] war immer verwirrt von alten Darstellungen der Sterne, da sie anscheinend nicht die Sterne widerspiegelten, die wir heute sehen. Dank der Hilfe von Professor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] konnte er endlich herausfinden, was los war. Gemeinsam entdeckten sie einen neuen Stern am Nachthimmel."
 lepsius.2600.f: "\"Da! Da ist er, wie mir die alten Ägypter sagten! Endlich haben wir den verlorenen Stern gefunden!\""
 lepsius.2600.g: "Eine gewaltige wissenschaftliche Entdeckung!"
 lepsius.2601.t: "Schätzung der Daten historischer Ereignisse mithilfe astronomischer Kenntnisse über Sonnenfinsternisse"
 lepsius.2601.d: "In einer gemeinsamen Anstrengung konnten Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] und Professor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] modernes astronomisches Wissen über Sonnenfinsternisse nutzen, um bestimmte historische Ereignisse in Primärquellen zu datieren."
 lepsius.2601.f: "\"Offensichtlich sprach Thales von Milet von der Sonnenfinsternis am 28. Mai 585 n. Chr. und nicht von irgendeiner anderen Sonnenfinsternis!\""
 lepsius.2601.g: "Das ist ein großer Schritt für die Archäologie"
 lepsius.2602.t: "Überblick über das astronomische Wissen vergangener Kulturen"
 lepsius.2602.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] und Professor [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] haben ein neues Buch veröffentlicht, das einen Überblick über das astronomische Wissen antiker Zivilisationen bietet."
 lepsius.2602.f: "\"Ja, sie wussten, dass die Erde nicht der Mittelpunkt von irgendetwas war. Nein, schon damals waren sie nicht dumm genug zu glauben, dass die Erde flach ist. Ja, da bin ich mir absolut sicher.\""
 lepsius.2602.g: "Eine interessante Lektüre!"
 lepsius.2603.t: "Die Dampfmaschine des Helden wurde rekonstruiert"
 lepsius.2603.d: "Als Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] mit Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] über Heros alte Dampfmaschine sprach, war dieser sofort Feuer und Flamme für eine Rekonstruktion. Gemeinsam bauten sie eine kleine Rekonstruktion des Aeolipile."
 lepsius.2603.f: "\"Wie Sie sehen, fehlt dem Aeolipile ein Mittel zur Kraftübertragung. Daher ist es eher ein Spielzeug als eine echte Maschine. Leider wurde es nie weiterentwickelt.\""
 lepsius.2603.g: "Wie kam es dazu, dass sie sich nicht industrialisierten?"
 lepsius_illustrated_archaeological_catalog_modifier: "Verfasste einen illustrierten Archäologiekatalog"
 lepsius.12.f: "Derzeit verfügt die Ägyptische Sammlung über #p [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor! kleinere Artefakte und #p [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major! bedeutende Artefakte.\n\nMöglicherweise kann die ägyptische Sammlung #T neu geordnet werden#! und damit eine neue Ausstellung initiiert werden. Dies erfordert jedoch eine gewisse Anzahl an Artefakten.\n\nEine #T kleine Ausstellung#! erfordert #p 10#! @lepsius_egypt_minor! Artefakte, eine #T mittlere Ausstellung#! erfordert #p 25#! @lepsius_egypt_minor! Artefakte, eine #T große Ausstellung#! erfordert #p 50#! @lepsius_egypt_minor! und eine #T ausgezeichnete Ausstellung#! erfordert #p 100#! @lepsius_egypt_minor!. Darüber hinaus erfordert die #T ausgezeichnete Ausstellung#! #p 1#! @lepsius_egypt_major! bedeutendes Artefakt.\n\nDie Neuordnung der Sammlung und die Vorbereitungen für eine neue Ausstellung werden etwa ein halbes Jahr dauern. Die Boni einer Ausstellung bleiben dauerhaft bestehen – bis sie erneut neu geordnet wird."
 lepsius.13.f: "Derzeit verfügt die mesopotamische Sammlung über #p [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor! kleinere Artefakte und #p [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major! bedeutende Artefakte.\n\nMöglicherweise kann die mesopotamische Sammlung #T neu geordnet werden#! und damit eine neue Ausstellung initiiert werden. Dies erfordert jedoch eine gewisse Anzahl an Artefakten. \n\nEine #T kleine Ausstellung#! erfordert #p 10#! @lepsius_mesopotamia_minor! Artefakte, eine #T mittlere Ausstellung#! erfordert #p 25#! @lepsius_mesopotamia_minor! Artefakte, eine #T große Ausstellung#! erfordert #p 50#! @lepsius_mesopotamia_minor!, und eine #T ausgezeichnete Ausstellung#! erfordert #p 100#! @lepsius_mesopotamia_minor!. Darüber hinaus erfordert die #T ausgezeichnete Ausstellung#! #p 1#! @lepsius_mesopotamia_major! bedeutendes Artefakt.\n\nDie Neuordnung der Sammlung und die Vorbereitungen für eine neue Ausstellung werden etwa ein halbes Jahr dauern. Die Boni einer Ausstellung bleiben dauerhaft bestehen – bis sie erneut neu geordnet wird."
 lepsius.14.f: "Derzeit hat die Aegean Collection #p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! kleinere Artefakte und #p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! bedeutende Artefakte. \n\nMöglicherweise kann die Ägäis-Sammlung #T neu geordnet werden#! und damit eine neue Ausstellung initiiert werden. Dies erfordert jedoch eine gewisse Anzahl an Artefakten. \n\nEine #T kleine Ausstellung#! erfordert #p 10#! @lepsius_aegean_minor! Artefakte, eine #T mittlere Ausstellung#! erfordert #p 25#! @lepsius_aegean_minor! Artefakte, eine #T große Ausstellung#! erfordert #p 50#! @lepsius_aegean_minor! und eine #T ausgezeichnete Ausstellung#! erfordert #p 100#! @lepsius_aegean_minor!. Darüber hinaus erfordert die #T ausgezeichnete Ausstellung#! #p 1#! @lepsius_aegean_major! bedeutendes Artefakt.\n\nDie Neuordnung der Sammlung und die Vorbereitungen für eine neue Ausstellung werden etwa ein halbes Jahr dauern. Die Boni einer Ausstellung bleiben dauerhaft bestehen – bis sie erneut neu geordnet wird."
 lepsius.15.f: "Derzeit verfügt die Präkolumbianische Sammlung über #p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! kleinere Artefakte und #p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! bedeutende Artefakte.\n\nDie präkolumbianische Sammlung kann möglicherweise #T neu geordnet werden#! und damit eine neue Ausstellung initiieren. Dies erfordert jedoch eine gewisse Anzahl an Artefakten.\n\nEine #T kleine Ausstellung#! erfordert #p 10#! @lepsius_precolumbian_minor! Artefakte, ee #T mittlere Ausstellung#! erfordert #p 25#! @lepsius_precolumbian_minor! Artefakte, eine #T große Ausstellung#! erfordert #p 50#! @lepsius_precolumbian_minor!, und eine #T ausgezeichnete Ausstellung#! erfordert #p 100#! @lepsius_precolumbian_minor!. Darüber hinaus erfordert die #T ausgezeichnete Ausstellung#! #p 1#! @lepsius_precolumbian_major! bedeutendes Artefakt.\n\nDie Neuordnung der Sammlung und die Vorbereitungen für eine neue Ausstellung werden etwa in halbes Jahr dauern. Die Boni einer Ausstellung bleiben dauerhaft bestehen – bis sie erneut neu geordnet wird."
 lepsius.99.t: "Umzug des Archäologischen Museums"
 lepsius.99.d: "Aus irgendeinem Grund haben wir einen [GetBuildingType('building_lepsius_archaeological_museum').GetName], aber er befindet sich nicht in unserer wunderbaren Hauptstadt. Offensichtlich müssen wir es in die Hauptstadt verlegen!"
 lepsius.99.f: "\"Bitte seien Sie vorsichtig mit den Vasen, sie sind sehr zerbrechlich! Nein! Man kann sie nicht einfach so in eine Kiste werfen, sie brauchen eine Art Polsterung! Ich finde das wirklich keine tolle Idee!\""
 lepsius.99.g: "Jetzt kann ich jeden Tag dorthin gehen!"
 lepsius.140.d: "Unser Archäologe hat [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]e Verbindungen genutzt, um hochqualifiziertes Personal für die Expedition zu rekrutieren."
 lepsius.250.f: "Es begann mit einem Streit, dem Flüche, Drohungen und schließlich Handgreiflichkeiten folgten. Der Vorfall endete in einer regelrechten Kneipenschlägerei. Mittendrin: unser Expeditionsleiter. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Temperament hat uns viel Ansehen gekostet. Ein Bericht über den Fauxpas erreichte heute Morgen einen hohen Würdenträger. Wir haben einen großen diplomatischen Zwischenfall abgewendet, aber der schlechte Eindruck wird noch lange anhalten."
 lepsius.260.f: "Gute Nachrichten! Wie sich herausstellte, erwies sich unser Expeditionsleiter während [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Reise als tadelloser [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')]. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis|U] taktvolles und charismatisches Auftreten wird mit typischem [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Verhalten gleichgesetzt. Das Ansehen unseres Landes ist dort deutlich gestiegen."
 lepsius.270.d: "Der Leiter unserer Expedition sticht vor allem dadurch hervor, dass [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] jeden Tag im Café sitzt, Limonade trinkt und Eis isst."
 lepsius.270.f: "Es gibt ehrgeizige Führungskräfte, die den ganzen Tag nur arbeiten. Sie wollen Großes erreichen oder Reichtum anhäufen. Manche wollen für ihre Taten berühmt werden. Andere sind besessen von jedem Detail. Nicht so unser archäologischer Direktor. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] hat es sich zur Gewohnheit gemacht, jeden Tag der Hitze zu trotzen, indem er Limonade trinkt und Eis schluckt. Man könnte das Faulheit nennen. Für andere ist es ein Zeichen menschlicher Eleganz, guten Geschmacks und der richtigen Prioritäten im Leben."
 lepsius.280.d: "Das diplomatische Geschick unseres Expeditionsleiters hat dazu geführt, dass [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] vom örtlichen Gouverneur eingeladen und belohnt wurde."
 lepsius.311.d: "Der Leiter der letzten archäologischen Expedition im Ausland hat beschlossen, das Tagebuch zu veröffentlichen, das [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] während der Reise geschrieben hat."
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName] hat beschlossen, die wissenschaftliche Arbeit, die [SCOPE.sCharacter('lepsius_scientific_writer').GetSheHe] während der Reise verfasst hat, zu veröffentlichen."
 lepsius.408.f: "Ein Nazar ist ein Amulett, das vor dem bösen Blick schützen soll. Einen solchen Aberglauben gibt es in weiten Teilen des Orients, aber auch in Teilen des Mittelmeerraums. Natürlich wäre es absurd zu glauben, dass ein wissenschaftlich geschulter Geist sich mit einem Talisman schützen könnte, um zu verhindern, dass böse Mächte auf der Expedition Chaos anrichten. Anders sieht es bei den örtlichen Helfern und Trägern aus. Sie bitten den Anführer, eines der Amulette zu besorgen, in der Überzeugung, dass [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] sonst großes Unglück droht. Was auch immer die Fähigkeiten des Nazar sein mögen: Wenn es keinen Einfluss auf die Expedition hat, dann zumindest auf die Moral unserer Diener."
 lepsius.409.f: "Als unsere Expedition entlang der Küste voranschritt, stießen sie bald auf eine breite Bucht, deren äußerste Vorgebirge sich fast berührten. Anstatt den langen Umweg zu machen, boten uns einige griechische Fischer an, uns über die Bucht zu bringen. Der Expeditionsleiter nahm das Angebot schnell an. In einem Gespräch mit den Fischern konnte [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] auch wichtige Informationen über eine nicht weit entfernte Ruine erhalten, die wahrscheinlich aus vorklassischer Zeit stammt."
 lepsius.421.d: "Unser Archäologe hat einen kleinen ägyptischen Lapislazuli-Skarabäus gefunden, den [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] gerne behalten würde."
 lepsius.452.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] hatte in der Vergangenheit immer wieder gehört, dass es in der Gegend historische Aufzeichnungen über längst zerstörte archäologische Stätten geben müsse. Vor ein paar Tagen erhielt [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] einen hilfreichen Tipp: Ein Kaufmann besaß ein Manuskript aus dem 16. Jahrhundert, das eine Kopie längst verlorener Aufzeichnungen enthielt. Die Originale sind wahrscheinlich für immer verloren, aber es besteht zumindest die Möglichkeit einer Rekonstruktion."
 lepsius.461.f: "Da war dieses seltsame, erdrückende Gefühl. Mitten in der Nacht. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stand auf und glaubte an den Wind, der gegen das aufgestellte Zelt im Wüstensand schlug; aber es war mehr als nur Wind. Es war ein seltsames Flüstern. Ein Murmeln, das zu dissonanten Tönen anstieg, bis es sich zu einem melodischen Lied steigerte. Wie ein Sirenengesang betörte es – und trübte die Sinne. Das behauptete zumindest [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName], als [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] nach stundenlangem Suchen in den Pfoten der Großen Sphinx von Gizeh gefunden wurde, wo er wie ein Verrückter grub, überzeugt davon, dass sich unter der Sphinx eine geheime Kammer befand, aus der Wissen stammen sollte gefunden, die seit Tausenden von Jahren verborgen waren. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] Zustand hat sich seitdem kaum verbessert. Dieser Ort hat einen wirklich schlechten Einfluss auf [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.462.f: "Da war dieses seltsame, erdrückende Gefühl. Mitten in der Nacht. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] stand auf und glaubte an den Wind, der gegen das aufgestellte Zelt im Wüstensand schlug; aber es war mehr als nur Wind. Es war ein seltsames Flüstern. Ein Murmeln, das zu dissonanten Tönen anstieg, bis es sich zu einem melodischen Lied steigerte. Wie ein Sirenengesang betörte es – und trübte die Sinne. Das behauptete zumindest [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName], als [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] nach stundenlangem Suchen in den Pfoten der Großen Sphinx von Gizeh gefunden wurde, wo er wie ein Verrückter grub, überzeugt davon, dass sich unter der Sphinx eine geheime Kammer befand, aus der Wissen stammen sollte gefunden, die seit Tausenden von Jahren verborgen waren. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] Zustand hat sich seitdem kaum verbessert. Dieser Ort hat einen wirklich schlechten Einfluss auf [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]."
 lepsius.465.f: "Unser Expeditionsleiter macht keinen Hehl daraus, woher er kommt, welche Sprache [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] spricht, welches Essen [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] bevorzugt und welche Kultur [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] für überlegen hält. Die Beleidigungen gegen die Einheimischen nehmen von Tag zu Tag zu – sei es gegen angeworbenes Personal oder gegen zufällige Personen. Auf seiner Reise durch verschiedene Dörfer hat [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] die Einstellung entwickelt, die Bürgermeister wie [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]e Untergebene zu behandeln. Selbst die gastfreundlichste Geste reicht für [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] nicht aus. Es gab bereits mehrere Beschwerden aus verschiedenen Teilen der lokalen Verwaltung über das arrogante und diffamierende Verhalten von [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] und unsere Expedition verkommt zunehmend zu einer negativen Publicity-Kampagne für unser Land."
 lepsius.467.f: "Vom ehemals christlichen Nahen Osten ist nicht mehr viel übrig geblieben – und doch gibt es die verstreuten christlichen Gemeinschaften der Kopten, Maroniten, Chaldäer und Armenier, die Jahrhunderte überlebt haben. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], der eigentlich keine religiösen Absichten hatte, als [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] die Reise antrat, ließ sich gestern Abend von einem örtlichen Priester zu einer längst vergessenen Kirche führen. Archäologisch und historisch interessant enthüllte der Geistliche erst später einen Reliquienschrein mit einer verschollen geglaubten Reliquie eines Kirchenvaters. Da es schon spät war und das Lager weit entfernt war, blieb der Expeditionsleiter eine Nacht und einen Morgen dort. Ein Traum, der [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] seitdem nicht ruhen lässt und über den [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] kaum noch spricht, bedeutet, dass [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Leben in wesentlichen Bereichen ändern möchte. Der Priester hat angeboten, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] einen Teil der vergessenen Reliquie zu geben, um [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] in seinem neu gefundenen Glauben zu stärken."
 lepsius.467.g: "Hatte [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] eine selige Vision?"
 lepsius.471.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] sollte sich Zeit nehmen und so viel wie möglich über den Ort herausfinden."
 lepsius.471.h: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] darf länger dort bleiben – wenn [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] einige Artefakte mitbringt."
 lepsius.471.i: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] darf den Ort besuchen, jedoch nur so lange wie nötig."
 lepsius.472.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] hat eine unglaubliche Erklärung für den enormen Verlust an Menschen und Material. Es ist sowohl empörend als auch beschämend – insbesondere für den Verstand eines einigermaßen aufgeklärten Menschen. Der Expeditionsleiter behauptet, dass er [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] und [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]e Männer eine Woche lang verloren waren, bevor sie im undurchdringlichen Yucatán-Wald auf ein unbekanntes Tal stießen, das von hohen Bergen umgeben war. In der Hoffnung, eine bisher unbekannte Maya-Ausgrabungsstätte zu finden, schmiedeten sie einen Plan, das Tal zu erkunden – ein großer Fehler, wie sich herausstellte. Denn das Tal ist die Heimat schrecklicher Monster, mächtiger Echsen. Tatsächlich erklärte [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] uns, dass ausgestorbene Dinosaurier seit Millionen von Jahren in dieser \"verlorenen Welt\" lebten und überlebten, weil sie isoliert waren. Die Bestien terrorisierten das Expeditionsteam und zerfleischten mehrere Träger und Forscher rücksichtslos. Auf der Flucht hätte [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] auf einen Großteil der Ausrüstung verzichten müssen. Jetzt fleht [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] uns an, die gesamte Expedition neu auszurüsten. Wir wissen nicht, warum [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] glaubt, dass [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] uns mit dieser Märchengeschichte beeindrucken kann – vielmehr werden Zweifel geäußert, ob [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] noch die richtige Person ist, um dieses Unternehmen zu leiten!"
 lepsius.472.g: "Sagt [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe], dass Dinosaurier unsere Expedition gefressen haben?!"
 lepsius.501.h: "Lassen Sie [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] die Sache weiter untersuchen."
 lepsius.506.f_engine: "Leider hatten unsere Expeditionsteilnehmer kaum Zeit, das Grab des unbekannten Pharaos genauer zu erkunden. Steine ​​bröckelten von der Decke und Sand sickerte durch die oberen Risse, während unsere Archäologen sich einen Weg durch die Grabkammer bahnten. Offenbar bestand die Umgebung aus einem viel poröseren Gestein als angenommen; und der abgetrennte Felsbrocken hatte den Bau beendet. Mit schnellem Verstand blieb [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] trotz des Risikos auf Kurs und erkämpfte sich den Weg zum Sarkophag, damit alle verfügbaren Männer ihn herausnehmen konnten. Ein prachtvolles Einzelstück, das uns vermutlich über den Verlust der restlichen Funde trösten wird – schließlich droht das gesamte Königsgrab innerhalb weniger Minuten einzustürzen ..."
 lepsius.506.f_muscular: "Es war ein wahrhaft historisches Erlebnis, als [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] die eigentliche Grabkammer betrat. Eine besondere Überraschung erwartete [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]: Der Sarkophag ruhte zusammen mit der Mumie des unbekannten Pharaos noch immer dort, wo er vor mehr als 3.000 Jahren begraben wurde! Wieder sollte uns der unvergleichlich starke Paduaner helfen – und den hölzernen Sarkophag und die Mumie aus der Graniteinfriedung heben. Doch so glücklich unsere Archäologen zunächst waren, so groß war ihr späteres Unglück. Als das Team in der Mittagspause in der geschmückten Galerie sein Brot teilte, ertönte aus der Grabkammer ein schreckliches Knirschen und Knacken. Zum Entsetzen der Grabungshelfer und unseres Expeditionsleiters hatte sich auch der riesige Muskelprotz eine Pause gegönnt – und setzte sich aus Versehen auf den Sarkophag. Von der Königsmumie und dem Holzsarg sind nur noch Reste übrig..."
 lepsius.532.f: "Der Militärattaché hat wiederholt davor gewarnt, kurdisches Gebiet zu betreten. Frühere Expeditionen in dieses Gebiet haben mit den Einheimischen keine guten Erfahrungen gemacht. Die Kurden gelten als frei, ehrenhaft – aber auch stolz. Das Eindringen in ihr Territorium könnte sie verärgern. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] hat daher darauf bestanden, mehrere Männer zu bewaffnen, um unangenehme Zwischenfälle wirksamer bekämpfen zu können. Während der Attaché das Schlimmste erwartet, möchte [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] den kurdischen Stamm so schnell wie möglich ausfindig machen, um mit ihm zu verhandeln und eine gütliche Einigung zu finden, um die Lamassu schnell in eigene Hände zu bekommen [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] schlägt vor, die Truppen aufzuteilen: Die unbewaffneten Männer, ungeschulten Träger und der Großteil der Vorräte und Ausrüstung sollten zurückbleiben, während [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] mit dem Militärattaché weitermacht, um eine flexiblere Truppe zu schaffen, die effizient nach den Lamassu suchen kann. Der Attaché hingegen äußerte seine Besorgnis darüber, dass der verbleibende Teil der Expedition dann im Falle eines kurdischen Angriffs völlig hilflos sein würde."
 lepsius.534.f: "Viel zu spät erkannte der Expeditionsleiter, dass sein jüngster Versuch, die Gunst der einheimischen Stämme zu gewinnen, das Gegenteil von dem bewirkte, was [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] beabsichtigt hatte. Ein Schrei ging durch das Zelt und instinktiv griffen einige der Untergebenen bereits zu ihren Waffen. Von da an herrschte Spannung, und der Militärattaché sah sich in seiner Sorge bestätigt, dass dieser Konflikt nicht mit Diplomatie, sondern nur mit Gewalt beigelegt werden könne. Für die Aufstellung der mitgebrachten Männer bleibt ihm nur wenig Zeit. Einige wissenschaftliche Mitarbeiter bestehen bereits darauf, ihre Sachen zu packen und möglichst viel Abstand zu gewinnen."
 lepsius.551.f: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] had worked late that day. The Greek sun brooded on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] head, the wind from the mountains and from the sea remained absent. The boring and tedious cataloging of dull archaeological objects dragged on for days. The finds often amounted to only measly fragments of broken glass and chicken bones left behind, which the archaeologist attributed less to the Minoan food culture and more to the proletarian eating manners of the excavation helpers. In a mood of weariness and resignation, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] strolled the sprawling grounds of a little-explored palace complex. The last time [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was sighted was near a structure classified as late Bronze Age or early Archaic. A crash echoed through the Cretan hills, drowning out cicadas and startling doves as the archaeologist broke through the ground - and despite a two-day search could not be found."
 lepsius.552.d: "When [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] regains consciousness, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] finds [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] in an unfamiliar subterranean building."
 lepsius.552.f: "It was perhaps the strangest experience in the archaeological leader's life. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] thought [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had fallen down a meter-long rabbit hole; the shaft had been so narrow, accompanied at the same time by sand and mud, which had pressed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] down like quicksand in excruciating lengths. Impossible that anyone could have followed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]; and impossible to see anything as no sunlight followed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] down the shaft. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] felt plates under [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] palms upon impact. In the glow of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] lighter [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] recognizes the smoothly hewn walls, to which remains of paint are stuck. Frescoes from a lost culture, which [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] initially wants to assign to the Minoan, but soon no longer knows which century they come from. Apparently there are smooth transitions between Minoan and Mycenaean influences. Looking around, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] finds [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] in a hall not unlike a Megaron. The archaeologist slowly feels [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way forward, hearing [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own footsteps echoing in the hollow space. Corridors without ornaments, without objects, without distinguishable details follow; forks in the road; chambers; and dead ends. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] realizes that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has ended up in an ancient labyrinth that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has no overview of. The more [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] thinks [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s exploring it, the bigger and more unknown it becomes..."
 lepsius.553.d: "After some time of trial and error, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] realizes that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has arrived at the starting point of the labyrinth..."
 lepsius.553.f: "Legs heavy, head foggy - could it be that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had been here before? The spot on the plates where [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] landed when [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] fell from above is unmistakable. And with growing horror the question arises: how long was [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] here? How many hours had passed? Maybe days? And would [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] find out before hunger and thirst tormented him to death...?"
 lepsius.554.d: "In the labyrinth, the missing person comes across a mosaic. The question is whether [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] chooses one of the two corridors or the stairs."
 lepsius.554.f: "After corridors and stairs without distinction, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] reaches a larger room. A corridor opens to the left and right, and a staircase leads up and down. A mosaic on the floor catches the eye. A sea scene confirms the thesis that the walls may come from Minoan times, while the rare jewelry bears witness to Mycenaean influences. The gods depicted are predecessors of the classical Greek pantheon. Surrounded by dolphins, father of the gods Zeus stretches his arm in the air with a thunderbolt. Demeter and Persephone point to the west, ears of corn in hand; Artemis is accompanied by two lions looking east. Finally Poseidon, the father of the gods of the Mycenaeans: with a trident he makes the earth tremble beneath him."
 lepsius.557.d: "In a hall, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] again encounters a riddle."
 lepsius.557.f: "Four passes. Four pictures. Above each passage, the prisoner of the labyrinth can see outlines engraved in stone. It takes some time before [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] realizes that these are the shores of islands. Based on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] experiences on Crete, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] can roughly assign them. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] assigns the first passage to the island of Rhodes; the second of the island of Delos; the third of the island of Euoboea; the fourth of the island of Naxos. Unfortunately, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] cannot find any further clues."
 lepsius.558.d: "After several days, our excavation team found the missing archaeologist near a cliff. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] was completely exhausted - and has been mentally confused ever since."
 lepsius.558.f: "It remains a mystery where [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] has been for the past 72 hours. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] was found a few miles from the actual excavation site - in a pitiful condition, as if mauled by a wild animal. Although [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has since regained consciousness, the expedition doctor believes [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] must have received a severe blow to the head. At least [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] language center seems disturbed. Again and again [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] falls into an almost delusional style when [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has to tell what happened. The team has left the area because they are concerned [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] might go on a quest again - to prove [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s not crazy."
 lepsius.559.f: "The police examined the body of the former archaeologist yesterday evening. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] became known to the public mainly because of a mental illness after [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] went missing under mysterious circumstances during an excavation on Crete and was found again days later under just as mysterious circumstances. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] just hasn't been the same person since then. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] feared being alone, thought [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] saw monsters in the shadows. In the end [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] only slept when the light was on because nightmares kept [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] awake all night. In the last days of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] life, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] had not only become heavily dependent on medication and had visibly deteriorated both physically and mentally, but [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had also drawn the ridicule of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] academic colleagues because of abstruse claims about [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Crete research. Despised by the scientific world, ridiculed in newspapers and visually reduced to a caricature of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] former self, investigators agree that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] took [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own life."
 lepsius.560.f: "At first Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was surprised how far away from the old excavation site [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] finally saw the sun again. It was several hours before [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] rejoined the rest of the digging mission, much to the relief of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] colleagues. There, to the surprise of those present, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] was able to report on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] find - a truly magnificent discovery that could perhaps change the way we have interpreted the myths of the ancient Greeks. A mysterious ball of fabric that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] found there allows only one conclusion."
 lepsius.561.f: "Dunst hängt über den Hügeln von Yucatec, als die Kolonne durch die Selva fährt. In der Ferne heulen Jaguare, in der Luft schwirren Moskitos, und mehr als einer unserer Helfer wird von Fieber befallen. Was bleibt, ist eine Gruppe von drei Personen und ein paar Träger. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] signalisiert einen Halt. Stelen und gemeißelte Steine zieren den Boden; halb vergrabene, moosbewachsene Stufen führen zu einer zerbrochenen Terrasse. Die Umrisse einer Maya-Pyramide zeichnen sich ab. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] spitzt ein Ohr, als ein Träger die Hand hebt und ruft: \"Patrón-eine Öffnung!"
 lepsius.562.f: "Der Expeditionsleiter, der darauf besteht, allein einzutreten, kommt an den gebleichten Knochen eines früheren Eindringlings vorbei und steht vor einer mit Glyphen überfüllten Tafel. Vier vertiefte Kartuschen - Ansichten großer Götter - können wie Tasten gedrückt werden. Darunter steht das Distichon: derjenige, der im Osten aufsteigt, im Zenit leuchtet, in der Abenddämmerung herabsteigt und die Tage zählt. Das Gerät ist ganz klar ein Test; ein Fehler könnte [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] Verhängnis werden."
 lepsius.563.f: "Schritte hallen in einem engen Gang wider. Im Fackelschein schimmern die Wände mit Gravuren; Wurzeln von Baumriesen beißen sich durch einen umgestürzten Türsturz. Dahinter öffnet sich eine Kammer, in deren Zentrum ein niedriger Altar steht und ein Götzenbild schwach im Dämmerlicht schimmert. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] wiegt einen Beutel mit Sand in [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]er linken Hand, schätzt mit der rechten die Masse des Götzen und hält [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]en Atem an. Ein sauberer Austausch - dann raus."
 lepsius.564.d: "Vielleicht hat [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] das Rätsel falsch gelesen - oder die Baumeister haben einfach niemandem vertraut. Ein Donner rollt; eine Steinkugel reißt sich los und rast den Korridor hinunter auf [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] zu."
 lepsius.564.f: "Der Schalter wird umgelegt, die Tasche bleibt auf dem Altar liegen. Einen Herzschlag lang bewegt sich nichts. Dann entsteht ein dumpfes Beben, Staub rieselt von der Decke, und von oben ertönt ein Brüllen - es ist ein gigantischer rollender Felsbrocken!"
 lepsius.565.d_wrong: "Als [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] ins Licht stolpert, erwartet ihn eine noch schlimmere Überraschung: Das Lager ist überrannt worden, und bewaffnete Männer fordern das Götzenbild - oder [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] Leben."
 lepsius.565.f_right: "Es war eine Sache des Verstandes, nicht der Muskeln. Die Wahl von K'inich Ajaw, dem Sonnengott, der \"die Tage zählt\", verschonte [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] vor der Bosheit des Geräts. Unversehrt schlüpft [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] durch die Vorrichtungen, sichert das Idol und eilt hinaus; [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] erfährt, dass eine rivalisierende Gruppe auf dem Weg ist, und so verlässt das Team die Stätte sofort."
 lepsius.565.f_wrong_right: "Als [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] aus dem Gang flieht, erwischt [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] eine Wurzel und schwingt sich davon, während der Stein an ihm vorbeirauscht und im Dschungel zerplatzt. Draußen liegen verstreute Speere und gefallene Männer - die Trümmer eines Hinterhalts, der durch dieselbe Falle vereitelt wurde. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] kann es nicht beweisen, aber die Szene trägt den Hauch eines fremden Rivalen, der uns die Gefahren für ihn auslösen lassen wollte. Egal, es ist Zeit, weiterzumachen."
 lepsius.565.f_wrong: "Mit einem letzten Sprung erreicht [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] die Schwelle - nur um von Bogenschützen umringt zu werden. Eine sanfte Stimme mit leichtem [SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag|l]en Akzent dringt aus den Bäumen, als ein Mann in blassem Leinen vortritt: \"Endlich eine Freude. Aber dieses Stück gehört in bessere Hände.\" In der Unterzahl und mit den erschlagenen Trägern gibt [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] das Idol ab. \"Schade, dass die Hovitos dich nicht so gut kennen wie ich\", murmelt [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] - und nutzt die Gelegenheit, mit leeren Händen zu entkommen."
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] hat ein persönliches Anliegen vorgebracht: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] möchte beweisen, dass die \"Verlorene Welt\" tatsächlich existiert und damit seine Ehre wiederherstellen. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] sammelt Geld für eine private Expedition."
 lepsius.581.f: "Mehrere Jahre sind vergangen, seit ein Großteil der Yucatán-Expedition auf mysteriöse Weise verschwunden ist. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] ist seitdem zum Gespött der Akademie geworden. Cartoons in den Zeitungen stellen [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] als verrückt dar und [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]e \"Dino-Geschichten\". Das Trauma hat tiefe Narben hinterlassen: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] ist besessen davon, der Welt zu beweisen, dass das angebliche Tal real ist. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] soll nun [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] gesamtes Erbe ausgegeben haben, um auf [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] eigene Kosten eine Expedition auf die Beine zu stellen. Natürlich hat [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] auch den Staat um Unterstützung für [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]e völlig verrückte Reise gebeten. Unsere Experten raten von diesem Himmelfahrtskommando ab – jeder weiß, wie die letzte Expedition nach Yucatán verlaufen ist. Es gibt daher Stimmen, die eine solche Expedition ganz verbieten wollen. Dies könnte jedoch [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]en psychischen Zustand nur verschlimmern. Wieder andere sind der Meinung, dass [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] aufgehoben werden sollte, jedoch ohne weitere offizielle Einmischung; Schließlich möchte niemand mit der Reise eines scheinbar psychisch gestörten Mannes in Verbindung gebracht werden. Nur eine Minderheit denkt überhaupt daran, für diesen Wahnsinn den Geldbeutel zu öffnen. Sie argumentieren, dass wir eine angebliche Verantwortung für [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]e Verfassung haben ..."
 lepsius.581.h: "Soll [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]e Dinosaurier jagen."
 lepsius.582.f: "Monate nachdem [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] in den Wäldern von Yucatán verschwunden war, tauchte der erschöpfte Abenteurer in der Provinzhauptstadt Mérida wieder auf. Wieder einmal hatte [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] viele Helfer verloren und der Rest [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] Truppe befand sich in einem erbärmlichen Zustand. Neben einer Reihe von Zeugen hatte [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] jedoch einen überzeugenden Beweis: Dank moderner Fotografien, die von mehreren Wissenschaftlern als authentisch bestätigt wurden, hat [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] unschlagbare Ansprüche auf [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]e wilde Geschichten. Und tatsächlich: Auf den Abbildungen sind deutlich Flugsaurier und pflanzenfressende Brontosaurier zu erkennen! Das Volk feiert [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] als Idol, die Fachwelt ist schockiert und unsere Regierung gilt als hartnäckige Gruppe von Ignoranten, die einem Nationalhelden den Ruhm verweigert, den [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] verdient!"
 lepsius.583.d: "Wir haben seit Monaten nichts von [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] gehört. Anscheinend ist [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] in den unbekannten Tiefen des Yucatán-Waldes verloren gegangen."
 lepsius.583.f: "Vielleicht könnten eines Tages tragische Theaterstücke über die Angelegenheit gedreht werden. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], der kurz vor [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]em Leben dem Wahnsinn nahe war, suchte offenbar bis zuletzt nach Spuren des angeblichen Sauriertals. Krankheit und feindliche Maya-Stämme töteten [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]e Expedition. Einer der wenigen Überlebenden berichtet, dass [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] zuletzt behauptete, die Hänge des Plateaus, in dem das Tal liegt, wiederentdeckt zu haben. Aber der letzte der Männer hätte meutert und wäre nach Hause gegangen. Niemand weiß, was aus [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] geworden ist. Wir haben jedoch Grund zu der Annahme, dass [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] allein und abgemagert kaum eine Chance hatte, das zu überleben, was [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim] letztendlich tötete."
 lepsius.583.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] war wirklich kein Bösewicht. Ein schlechter Entdecker ja, aber immer noch ein Bösewicht."
 lepsius.584.f: "Eigentlich hatten alle damit gerechnet, dass diese Reise nicht lange dauern würde: Entweder weil die Umstände die Männer zum Tode verurteilten oder es zu einer Meuterei kommen würde. Umso erstaunlicher war die Entdeckung eines Morgens. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] hatte die Truppe tagelang wie ein manischer Goldsucher durch die undurchdringlichen Wälder Yucatáns geführt. Es schien, als würde [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] jeden Baum und jeden Stein erkennen. Die anderen Expeditionsteilnehmer hielten dies entweder für Wahnsinn oder für Teil eines ausgeklügelten Plans, sie zu täuschen und ihnen falsche Hoffnungen zu machen. Aber jetzt, an den Hängen eines riesigen Plateaus, in dessen Senke das sagenumwobene Tal liegt, von dem [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] seit Jahren spricht, revidieren einige ihre Ansichten. Der Schrei eines Flugsauriers hallt durch die Luft und dringt so tief in die Ohren der Teilnehmer, dass alle Zweifel zerstreut sind."
 lepsius.586.f: "Eigentlich sollte [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] erfüllt sein: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] hatte mit allen [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]en Ansprüchen Recht. Das Team hat bereits eine ganze Reihe von Beweisen gesammelt, die zu Hause für Aufsehen sorgen dürften. Doch bei näherer Erkundung der Verlorenen Welt stellt sich immer mehr heraus, dass [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] nicht der erste Mensch in diesem Tal war. Tatsächlich scheint es in dieser Gegend vor etwa 1.500 Jahren eine bedeutende Maya-Präsenz gegeben zu haben. Offenbar kamen in regelmäßigen Abständen die Bewohner einer bis dahin unbekannten Maya-Stadt in dieses Tal. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] spekuliert, dass die Tradition des Menschenopfers hier ihren Ursprung haben könnte. Wie dem auch sei, es gibt starke Beweise dafür, dass das Tal eine religiöse Funktion hatte. Ein Mitarbeiter hat kürzlich Maya-Artefakte ausgegraben, was darauf hindeutet, dass ihre Entdeckung noch größeres Aufsehen erregen könnte als ein paar verstreute Riesenechsen. Das Problem: Die vermutete Maya-Ausgrabungsstätte liegt mitten in einem von Greifvögeln bewohnten Gebiet! Die meisten Expeditionsteilnehmer bestehen daher darauf, sofort nach Hause zurückzukehren, anstatt ein Himmelfahrtskommando auf das nächste folgen zu lassen."
 lepsius.587.f: "Nur ein Überlebender. Von der Expedition ist nichts mehr übrig. Es handelt sich um einen jungen wissenschaftlichen Mitarbeiter an der Universität. Er ist traumatisiert und körperlich in einem schlechten Zustand. So berichtet ein Telegramm aus Yucatán. Man konnte nicht viel aus ihm herausquetschen. Anscheinend hat unser Expeditionsleiter einen entscheidenden, tragischen Fehler gemacht, als er versuchte, eine Maya-Ausgrabungsstätte in der Verlorenen Welt zu untersuchen. Ein Fehler, den fast alle Expeditionsteilnehmer mit ihrem Leben bezahlten. Der Vorfall löste einen solchen Schock aus, dass alle Reisen nach Yucatán, die nicht rein archäologischen Zwecken dienten, auf unbestimmte Zeit verboten wurden."
 lepsius.587.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] hat ... schlecht gewählt."
 lepsius.588.f: "Kukulkan war bei den Mayas als gefiederte Schlange bekannt – eine Gottheit, die von den Azteken unter dem Namen Quetzalcoatl verehrt wurde. War es ein Zufall, dass die Maya von diesem Tal wussten? Gab es eine Verbindung zwischen der Verlorenen Welt und dem Kukulkan-Kult? [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] kann dies noch nicht entscheiden. Was [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] jedoch entdeckte, war, dass zwischen Greifvogelnestern ein längst vergessenes Heiligtum lag, das die gefiederte Schlange darstellte, die hierzulande Kukulkan genannt wird. Auffällig war ein geheimnisvoller Edelstein in einem Amulett. Es ist von so erstaunlicher Schönheit, dass der Expeditionsleiter es das \"Juwel von Kulkulkan\" nannte – die Gottheit besaß ein Juwel, mit dem sie den Wind kontrollieren konnte. Es ist wahrscheinlich einer der größten archäologischen Funde Mittel- und Südamerikas."
 lepsius.588.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] hat mit Bedacht gewählt."
 lepsius.589.d: "Unsere Expedition aus der Verlorenen Welt unter der Leitung von [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] ist zurückgekehrt. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] und sein Team werden vom Volk als Helden gefeiert."
 lepsius.589.g: "Ehre sei [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]!"
 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] hat seine Reisevorbereitungen abgeschlossen. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe|U] wird heute aufbrechen, um das Wissen an einer bereits etablierten Ausgrabungsstätte zu vertiefen."
 lepsius.803.f: "Die Abwesenheit unseres Archäologen wird voraussichtlich etwa ein Jahr dauern, kann aber je nach Situation variieren. Am Ende [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis]er Aktivität öffnet [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] eine neue Ausgrabungsstätte, deren Qualität variieren kann. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] findet auch Hinweise auf bisher unbekannte archäologische Stätten."
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] berichtet, dass [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] ein kleines Grab im Tal der Könige entdeckt hat. Grabräuber haben offenbar bereits zahlreiche Gegenstände gestohlen und Graffiti belegen, dass es auch in der Spätantike bekannt war. Die Expeditionsleiter beschlossen, dort eine Ausgrabung durchzuführen, in der Hoffnung, später weitere Funde melden zu können."
 lepsius.811.f_ass: "Die Ausgrabung in Assyrien hatten von Anfang an ihre Schwierigkeiten. Nach ein paar Tagen konnte [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] immer noch keine gute Ausgrabungsstätte finden, also begnügte sich [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] mit der nächstbesten Stätte. Bisher haben sie lediglich die Fundamente eines Schreins freigelegt, der einst Teil eines größeren Komplexes gewesen sein könnte."
 lepsius.812.f_bab: "Die Zeiten haben nicht alle Zeichen der babylonischen Größe in Mesopotamien verschlungen. Nachdem [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis]e Wasservorräte aufgefrischt hatte, erzählten Einheimische [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHim] von einer seltsamen Ruine, die die gläubigen Muslime in der Region aufgrund ihrer heidnischen Herkunft meiden. Wie sich herausstellte, handelte es sich um den Rest einer Zikkurat. Die Anlage ist überraschend gut erhalten und neuesten Berichten zufolge haben unsere Archäologen sogar erste Funde ausgegraben."
 lepsius.813.f_vok: "Heute Morgen ist ein aufsehenerregendes Telegramm eingetroffen. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] berichtet, dass [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] das Grab einer Königin entdeckt hat. Die Identität der verstorbenen Gemahlin ist nicht ganz klar, ersten Berichten zufolge ist die Grabkammer jedoch überraschend intakt. Wandmalereien und wertvolle Artefakte geben einen wertvollen Einblick in das alte Ägypten, der lange Zeit nicht bekannt war."
 lepsius.813.f_bab: "Legenden über die babylonischen Tore und Stadtmauern sind seit Jahrtausenden erhalten. Aber es ist immer etwas anderes, wenn sie vor einem stehen. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] konnte es zunächst nicht glauben, als [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] Wand für Wand entlangging und die enormen Ausmaße einer verlorenen Stadt entdeckte. Diese Entdeckung wird uns noch viele Jahre lang beschäftigen."
 lepsius.813.f_ass: "Die Assyrer waren nicht nur eine große Militärmacht, sondern auch für ihre Gärten berühmt. Einige behaupten sogar, dass sich die berühmten Gärten Babylons tatsächlich in der assyrischen Hauptstadt Ninive befanden. Bei der Ausgrabung einer Palastanlage und angrenzender Terrassen konnte [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] für [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerselfHimself] die Pracht der assyrischen Kultur erkennen. Die Museumsleitung freut sich."
 lepsius.2191.t: "Inka-Badekomplex ausgegraben"
 lepsius.2191.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] einen spektakulären Fund ausgegraben. Die Ausgrabungsstätte hat einen Badekomplex des Inka-Reiches freigelegt. Erste Vermutungen gehen davon aus, dass die Anlage für rituelle Zeremonien genutzt wurde."
 lepsius.2191.f: "\"Ist es nicht ironisch, dass wir ein Bad ausgegraben haben und jetzt selbst ein Bad gebrauchen könnten?\""
 lepsius.2191.g: "Ein Bad wäre jetzt toll!"
 lepsius.2192.t: "Inka-Schädel mit Loch entdeckt"
 lepsius.2192.d: "In [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde ein seltsamer Fund gemacht. Bei der Ausgrabung einer Inka-Ausgrabungsstätte stieß Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] auf eine große Anzahl von Knochen. Ein Schädel fiel [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] besonders ins Auge. Der Schädel hatte ein Loch, das offenbar absichtlich gemacht worden war. Offenbar überlebte der Verstorbene den Prozess, da sich das Loch teilweise wieder geschlossen hatte."
 lepsius.2192.f: "\"Ich bin mir sicher, dass es ein Menschenopfer gewesen sein muss! Was denken Sie?\""
 lepsius.2192.g: "Außerirdische!"
 lepsius_recent_excavation_inspection_modifier: "Aktuelle archäologische Inspektion"
 lepsius.2193.t: "Bergmumien der Inkas"
 lepsius.2193.d: "Während einer Expedition mit [SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName] in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] machte Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] eine schockierende Entdeckung. Auf einem Berg fanden sie die Überreste eines jungen Mädchens, das nun mumifiziert war. Es scheint, dass sie ein \"qhapaq hucha\" der Inkas war, ein Kinderopfer. Obwohl es ein trauriger Fund ist, könnte er zu verschiedenen neuen Erkenntnissen über die Inka führen."
 lepsius.2193.f: "\"Es war eiskalt, der Wind zerrte an unserer Kleidung und wir konnten kaum etwas sehen. Als wir die Leiche bemerkten, dachten wir zunächst, es sei ein Bergsteiger, der unter ähnlichen Umständen wie wir gestorben war. Doch bald merkten wir, dass es sich nicht um einen Bergsteiger, sondern um ein junges Mädchen handelte.\""
 lepsius.2193.g: "Das ist sehr traurig."
 lepsius.2194.t: "Inka-Ruinen"
 lepsius.2194.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] machte eine Entdeckung in einer weit entfernten Region von [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Er fand verschiedene Ruinen aus der Zeit des Inka-Reiches. Die meisten Ruinen sind verbrannt und es wurden einige europäische Ausrüstungsgegenstände gefunden, was zu der Annahme führte, dass diese Siedlung von den Spaniern zerstört wurde. Wahrscheinlich haben sie die Siedlung auch geplündert, da keine weiteren Funde gemacht wurden. Alles, was von Wert war, schien entfernt worden zu sein."
 lepsius.2194.f: "\"Vor langer Zeit müssen diese Ruinen gut gebaute Behausungen gewesen sein. Sie scheinen sogar Erdbeben standhalten zu können. Nur... Spanische Invasoren sind anscheinend stärker als Erdbeben.\""
 lepsius.2194.g: "Kein Gold? Warum sich überhaupt die Mühe machen?"
