 lepsius.1502_peking_d: "\nNeben dem Java-Menschen gilt der Peking-Mensch als der erste gefundene Homo Erectus und bestärkt die Annahme, dass die Menschheit ursprünglich aus Asien stammt. Die Knochen sollen 400.000 bis 780.000 Jahre alt sein."
 lepsius_state_trait_heidelbergensis_cave: "Prähistorische Höhle"
 lepsius.1326.t: "Homo Heidelbergensis abgeschlossen"
 lepsius.1326.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] hat genügend Knochen gesammelt, um konkrete Rückschlüsse auf die ausgestorbene Art zu ziehen. Der Homo Heidelbergensis ist für die Wissenschaft kein Rätsel mehr und kann nun mit einem gewissen Grad an Sicherheit im menschlichen Stammbaum verortet werden, auch wenn noch viele Fragen offen sind."
 lepsius.1326.f: "Der Unterkiefer des Homo heidelbergensis wurde 1907 von dem Arbeiter Daniel Hartmann in einer Sandgrube bei Mauer in der Nähe von Heidelberg entdeckt und 1908 von dem Anatomen Otto Schoetensack beschrieben; der etwa 600.000 Jahre alte Fund gilt als ältester Beleg für den Frühmenschen in Europa, steht morphologisch zwischen Homo erectus und Homo sapiens, weist auf eine weite Verbreitung dieser Hominidenform in Afrika, Europa und Asien hin und lässt aufgrund seiner Robustheit und des geschätzten Hirnvolumens Rückschlüsse auf eine fortgeschrittene körperliche Anpassung, Werkzeugnutzung und soziale Organisation zu."
 lepsius.1336.t: "Heidelberger Mensch"
 lepsius.1336.d: "Ein Arbeiter machte in einem Bergwerk in Mauer, einer Stadt in der Nähe von Heidelberg, eine bemerkenswerte Entdeckung. Ein Professor der Universität Heidelberg erkannte sofort seinen Wert."
 lepsius.1336.f: "Der Unterkiefer des Homo heidelbergensis wurde 1907 von dem Arbeiter Daniel Hartmann in einer Sandgrube bei Mauer in der Nähe von Heidelberg entdeckt und 1908 von dem Anatomen Otto Schoetensack beschrieben; der etwa 600.000 Jahre alte Fund gilt als ältester Beleg für den Frühmenschen in Europa, steht morphologisch zwischen Homo erectus und Homo sapiens, weist auf eine weite Verbreitung dieser Hominidenform in Afrika, Europa und Asien hin und lässt aufgrund seiner Robustheit und des geschätzten Hirnvolumens Rückschlüsse auf eine fortgeschrittene körperliche Anpassung, Werkzeugnutzung und soziale Organisation zu."
 lepsius.1501_heidelbergensis_human_fossils: "\n#G [ROOT.Var('lepsius_heidelbergensis_human_fossil').GetValue]#! #E Fossilien des Homo Heidelbergensis#!."
 lepsius.1501_taxonomy_heidelbergensis: "\n#E Homo Heidelbergensis#! wurde von [SCOPE.sCountry('lepsius_heidelbergensis_systemizer_country').GetAltName('DAT')]] klassifiziert."
 lepsius.1502_mauer_t: "#T Homo heidelbergensis#! entdeckt von [SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetName]"
 lepsius.1502_mauer_d: "\nDer in der Nähe von Heidelberg entdeckte Unterkiefer des Homo heidelbergensis gilt als der älteste Nachweis eines Frühmenschen in Europa und markiert einen wichtigen Übergang zwischen Homo erectus und späteren Homininen."
