 je_lepsius_excavation_harappa: "Ausgrabungen von Harappa"
 je_lepsius_excavation_harappa_reason: "#T Die Ruinen von Palmyra in Syrien sind ein faszinierender Ort für Archäologen.#!\n$mr_divider_for_je$\nJeden Monat lang machen Sie Fortschritte, die von vielen verschiedenen Faktoren abhängen. An bestimmten Punkten der Ausgrabung erhalten Sie ein Ereignis, das Ihnen [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] Erfahrung gewährt und die Staatseigenschaft ändert, was zu mehr [concept_curtiss_tourism] Einkommen führt.\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_excavation_harappa_0_loc: "Die Ruinen sind größtenteils noch in demselben Zustand, in dem sie sich über Jahrhunderte befanden."
 je_lepsius_excavation_harappa_1_loc: "Die jüngsten Ausgrabungen und teilweisen Restaurierungen des Bel-Tempels haben mehr Menschen angezogen, die diese antike Ausgrabungsstätte besuchen möchten."
 je_lepsius_excavation_harappa_2_loc: "Unsere Archäologen haben verschiedene Tempel ausgegraben und restauriert, wie den Tempel des Bel, das Tal der Gräber mit seinen Turmgräbern und viele andere Orte. Dies führt zu immer mehr Besuchern."
 lepsius.5020.t: "Die Ausgrabungsstätte von Harappa"
 lepsius.5020.d: "Wir wissen noch nicht viel über die Ausgrabungsstätte von Harappa, aber unsere Archäologen brennen darauf, die Geheimnisse der antiken Stadt zu lüften."
 lepsius.5020.f: "Derzeit ist nicht bekannt, wie groß der Schaden ist, den die Ausgrabungsstätte in all dieser Zeit erlitten hat. Unsere Archäologenteams bereiten jedoch bereits Ausgrabungen vor und untersuchen verschiedene Stellen, um zu sehen, wo Grabungen am erfolgversprechendsten sind."
 lepsius.5020.g: "Ein Ort von großer Bedeutung für Indien"
 lepsius.5021.t: "Eine gitterartige Stadt"
 lepsius.5021.d: "Bei der Ausgrabung wurde eine gitterförmige Stadt freigelegt. Die Stadt muss riesig gewesen sein, und wir wissen noch nicht, wie viele Menschen hier einst gelebt haben könnten."
 lepsius.5021.f: "\"Es ist ziemlich faszinierend, dass es neben Mesopotamien und Ägypten noch einen weiteren Ort gab, an dem die Zivilisation ihren Ursprung hatte. Ich hätte nie gedacht, dass ausgerechnet Indien die Heimat einer der größten Städte der Welt aus der Bronzezeit sein könnte.' – Einer Ihrer Archäologen"
 lepsius.5021.g: "Eine neue Wiege der Zivilisation"
 lepsius.5022.t: "Die Mauern von Harappa"
 lepsius.5022.d: "Unsere Archäologen haben einen Ort ausgegraben, den sie jetzt Zitadelle nennen. Es ist noch nicht klar, warum die Menschen von Harappa einen befestigten Ort in ihrer Stadt brauchten."
 lepsius.5022.f: "\"Ich bin absolut sicher, dass sie die Invasion der Seeleute fürchteten!\"\n\"Die Seeleute waren im Mittelmeer, nicht hier draußen! Ich glaube, sie mussten ihre Nahrung vor diesen lästigen Bauern schützen!\"\n\"Das bezweifle ich stark. Sie müssen einen befestigten Tempel für ihre Götter errichtet haben!\""
 lepsius.5022.g: "Das ist faszinierend!"
 lepsius.5023.t: "Entwässerungssystem von Harappa"
 lepsius.5023.d: "Unsere Ausgrabungen haben ein komplexes Abwasser- und Abfallentsorgungssystem freigelegt. Es scheint sogar einige Toiletten zu geben, die an diese Abwasserkanäle angeschlossen waren."
 lepsius.5023.f: "\"Ich habe nicht einmal eine so moderne Toilette wie die Harappaner! Sie müssen extrem fortschrittlich gewesen sein!\""
 lepsius.5023.g: "Und wenn man bedenkt, dass wir bis heute mit Abwasser zu kämpfen haben..."
 je_lepsius_petra: "Petra – Erbe der Nabatäer"
 je_lepsius_petra_reason: "Um 1800 wussten nur wenige Wissenschaftler von einer sagenumwobenen, aus dem Fels gehauenen Stadt im Nahen Osten. Petra wurde erst 1812 vom schweizerisch-arabischen Abenteurer Johann Ludwig Burckhardt wiederentdeckt. Obwohl seitdem viele Reisende die Ausgrabungsstätte besucht haben, steht eine detaillierte archäologische Untersuchung Petras noch immer aus."
 lepsius.77.t: "Erbe der Nabatäer"
 lepsius.77.d: "Doktor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] führte die erste ernsthafte archäologische Untersuchung der Stadt Petra durch und barg Relikte aus der Vergangenheit. Eine inspirierende wissenschaftliche Leistung!"
 lepsius.77.f: "Petra, eine Ruinenstätte im heutigen Jordanien, war in der Antike die Hauptstadt des Nabatäerreichs. Wegen seiner monumentalen Grabtempel, deren Fassaden direkt aus dem Fels gehauen wurden, gilt es als einzigartiges Kulturdenkmal. Die Geschichte der Stadt ist eng mit der des Nabatäerreichs verknüpft, dem ersten arabischen Reich der Geschichte. Abgesehen von einer Reihe von Inschriften hinterließen die Nabatäer jedoch kaum eigene schriftliche Zeugnisse. Ihre Geschichte und die von Petras lässt sich daher nur fragmentarisch und indirekt über biblische, griechische und römische Quellen nachvollziehen. Das bekannteste Bauwerk in Petra ist das im hellenistischen Stil erbaute, fast 40 Meter hohe und 25 Meter breite Khazne al-Firaun. Die ‚Schatzkammer des Pharaos‘, wie sie von den Beduinen genannt wurde, war tatsächlich eines von zahlreichen Felsengräbern. Möglicherweise wurde sie für den Nabatäerkönig Aretas IV. angelegt, der im 1. Jahrhundert v. Chr. regierte. Andere Forscher datieren die Khazne allerdings erst ins 2. Jahrhundert n. Chr., in die Zeit Kaiser Hadrians."
 lepsius.77.g: "Dies ist ein Ort, an dem man auch christliche okkulte Artefakte verstecken könnte."
