 country_lepsius_decorative_local_artifacts_add: "@lepsius_local_minor! #V Lokales Artefakt#! aus archäologischen Projekten"
 je_lepsius_angkor: "Das Herz des Khmer-Reiches"
 je_lepsius_angkor_reason: "Die Ruinen von Angkor sind nie wirklich in Vergessenheit geraten. Sie waren nicht nur den Einheimischen bekannt, sondern auch europäischen Missionaren und Reisenden der Frühen Neuzeit, die von Tempeln im Dschungel berichteten. Um die Khmer-Herrschaft der Vergangenheit gründlich zu erforschen, mussten die Ruinen zunächst vollständig von Vegetation befreit und die archäologische Stätte freigelegt werden, bevor mit den Untersuchungen begonnen werden konnte."
 je_lepsius_cliff: "Das Geheimnis des Pueblo"
 je_lepsius_cliff_reason: "Im Gegensatz zu vielen anderen Bewohnern des westlichen Nordamerikas sind die Pueblo-Indianer sesshaft. Sie leben in Steinhäusern und kleinen Siedlungen und betreiben Ackerbau. Es geht das Gerücht um, dass es in ihrem Gebiet zahlreiche verlassene Städte gibt. Könnte es wirklich sein, dass in diesem Teil Amerikas eine untergegangene Zivilisation existiert?"
 je_lepsius_guatavita: "Das Geheimnis der Muisca"
 je_lepsius_guatavita_reason: "Der Guatavita-See ist nach wie vor von Geheimnissen umgeben. Der Ort galt den Muisca, einem der legendären Goldvölker Kolumbiens, als heilig. Sie standen in engem Kontakt mit den Inka und ihre Goldschmiedekunst zählte zu den fortschrittlichsten der präkolumbianischen Zeit. Die Echos der Vergangenheit hallen noch immer nach: Im See könnten immense Reichtümer verborgen liegen. Eine kleine Ausgrabung könnte Gewissheit bringen."
 lepsius.78.t: "Cliff Palace"
 lepsius.78.d: "Eher durch Zufall als durch Absicht entdeckten Archäologen in Colorado bei der Suche nach antiken Artefakten der amerikanischen Ureinwohner eine in den Fels gehauene Pueblo-Siedlung. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] reiste sofort dorthin, um die Stätte genauer zu untersuchen."
 lepsius.78.f: "Cliff Palace ist die größte Felsbehausung Nordamerikas und befindet sich im Mesa-Verde-Nationalpark in Colorado. Der Komplex wurde zwischen 1190 und 1260 n. Chr. von den Ancestral Puebloans erbaut und umfasst über 150 Räume sowie 23 Kivas. Obwohl indigene Gruppen eine angestammte Verbindung zu diesem Ort pflegten, erfolgte die dokumentierte Entdeckung durch Euro-Amerikaner am 18. Dezember 1888. Die Rancher Richard Wetherill und Charlie Mason entdeckten die Ruinen vom Rand einer Schlucht aus, als sie während eines Schneesturms nach verlorenen Rindern suchten. Beeindruckt von der Größe der in der Sandstein-Nische geschützten Mauerwerke, nannten sie sie „Cliff Palace“. Diese Entdeckung weckte internationales Interesse an der Archäologie des Südwestens und trug dazu bei, dass der Ort 1906 unter Bundesschutz gestellt wurde."
 lepsius.79.t: "Angkor wiederhergestellt"
 lepsius.79.d: "Nach vielen Monaten haben Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] und seine Assistenten die Ruinen der alten Khmer-Hauptstadt Angkor freigelegt. Die archäologische Stätte kann nun wieder für eingehende Forschungen genutzt werden."
 lepsius.79.f: "„Es unterscheidet sich in der Tat von jenen großen Klassikern des Mittelmeerraums, die seit langem unsere Bewunderung auf sich ziehen: Es sind nicht mehr diese majestätischen Säulenhallen, diese großen, ruhigen Flächen Griechenlands oder Ägyptens; es sind im Gegensatz dazu mühsame, komplexe, gequälte Formen: Überlagerungen, vielfache Rücksprünge, Labyrinthe, vom Tageslicht abgeschirmte Galerien, zerklüftete Türme, Pyramiden mit unzähligen Stockwerken und Spitzen, eine große Fülle an Ornamenten und Skulpturen, ständige Licht- und Schatteneffekte, die das Ganze bereichern, ohne seine Erhabenheit zu beeinträchtigen, und sich wunderbar mit dem intensiven Licht und der üppigen tropischen Vegetation verbinden: es ist, kurz gesagt, eine andere Form der Schönheit.“ – Louis Delaporte"
 lepsius.751.t: "Das goldene Floß von Siecha"
 lepsius.751.d: "Bei Ausgrabungen wurde ein geheimnisvolles und wunderschönes Floß aus Gold entdeckt. Es gilt bereits als Schlüsselartefakt der untergegangenen Muisca-Kultur – und lässt alte Legenden wieder aufleben."
 lepsius.751.f: "Im Jahr 1856 legten zwei Brüder aus Siecha namens Joaquín und Bernardino Tovar eine nahegelegene Lagune teilweise trocken und fanden ein Opferfloß, das sie mit der in der Legende von El Dorado erwähnten Zeremonie in Verbindung brachten. Es befand sich im Besitz des Diplomaten Salomón Koppel, der es an ein Museum in Deutschland, das Ethnologische Museum, verkaufte. Leider wurde es bei seiner Ankunft in Deutschland durch einen Brand zerstört. Das Siecha-Floß ist eines von nur zwei goldenen Flößen aus der Muisca-Kultur. Das andere, das Pasca-Floß, wurde erst 100 Jahre später gefunden."
 lepsius.751.g: "Es wird das schönste Ausstellungsstück unserer Sammlung sein."
 lepsius.751.h: "Wir haben kein Museum dafür. Wir sollten es verkaufen und dafür Geld, wissenschaftliche Unterstützung und einen politischen Gefallen erhalten."
 lepsius.752.d: "Da [SCOPE.sCountry('lepsius_raft_country').GetAltName('NOM')] über kein eigenes Museum verfügt, wandte sich das Land mit einem spektakulären Artefakt an uns. Es stammt aus Siecha am Ufer des Guatavita-Sees und zeigt ein goldenes Floß, das mit kunstvollen Figuren in einer Prozession verziert ist. Während die Wissenschaftler darauf drängen, das Stück um jeden Preis zu erwerben, haben die Politiker Vorbehalte hinsichtlich der Vertragsbedingungen."
 lepsius.752.g: "Wir brauchen dieses Artefakt um jeden Preis!"
 lepsius.752.h: "Das können wir nicht kaufen."
 lepsius.734.t: "Stierkopf-Rhyton"
 lepsius.734.d: "Im Rahmen der aktuellen Ausgrabungen im Palast von Knossos hat Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] eine sensationelle Entdeckung gemacht, die der griechischen Mythologie rund um Kreta und seinen legendären König Minos eine ganz neue Bedeutung verleiht."
 lepsius.734.f: "Das Stierkopf-Rhyton wurde von Sir Arthur Evans im „Kleinen Palast“ in Knossos auf Kreta entdeckt und stammt aus der Neopalastzeit (ca. 1550–1500 v. Chr.). Dieses zeremonielle Gefäß ist aus einem einzigen Block schwarzen Specksteins geschnitzt. Seine Augen bestehen aus Bergkristall und rotem Jaspis, was ihm einen lebensechten Ausdruck verleiht, während die Schnauze fein mit weißer Muschel eingelegt ist. Als Rhyton diente es als rituelles Trankgefäß; Flüssigkeit wurde in den Hals gegossen und floss durch ein Loch in der Schnauze wieder heraus. Als Symbol für Macht und Fruchtbarkeit veranschaulicht es die zentrale Rolle des Stiers in der minoischen Religion."
 lepsius_no_artifact_export_modifier: "Ausfuhrverbot für Kulturgüter"
 building_lepsius_needle: "Nadeln der Kleopatra"
 building_lepsius_obelisk: "Obelisk von Axum"
 pmg_lepsius_obelisk: "Obelisk"
 pm_lepsius_obelisk: "Obelisk"
 je_lepsius_cleopatras_needle: "Nadeln der Kleopatra"
 je_lepsius_cleopatras_needle_reason: "Seit Jahrhunderten ziehen die beiden Obelisken in Alexandria, bekannt als „Nadeln der Kleopatra“, internationales Interesse auf sich. Einer davon wurde bereits dem Vereinigten Königreich geschenkt, doch London ist es bislang nicht gelungen, diesen Obelisken zu bergen. Vielleicht könnten wir diesem Beispiel folgen und die ägyptischen Behörden fragen, ob wir die andere „Nadel“ haben könnten? Um dies zu erreichen, müssten wir natürlich zu einer führenden Nation in der Ägyptologie werden."
 je_lepsius_cleopatras_needle_fail: "Jedes Land hat das Recht, die Nadeln der Kleopatra zu transportieren."
 je_lepsius_cleopatras_needle_transport: "Nadeln der Kleopatra – Transport"
 je_lepsius_cleopatras_needle_transport_reason: "Den Transport eines Obelisken ist ein weitaus schwierigeres Unterfangen, als man vielleicht denkt. Kein Wunder, dass die Franzosen nur einen behalten haben, der auf der Place de la Concorde steht – der zweite Obelisk, der ihnen versprochen worden war, steht noch immer in Luxor."
 je_lepsius_cleopatras_needle_transport_success: "Sobald der Obelisk die Hauptstadt erreicht hat, muss ein Archäologe ihn restaurieren und vorbereiten, und ein Ingenieur muss bei seiner Aufstellung helfen.\n\n#R Wichtig:#! Die Restaurierungsarbeiten des Archäologen und die Aufstellungsarbeiten des Ingenieurs beginnen erst, wenn der Obelisk angekommen ist."
 je_lepsius_ishtar_gate: "Ischtar-Tor"
 je_lepsius_ishtar_gate_reason: "Bereits 1815 erstellte Claudius Rich eine topografische Vermessung der Ruinen von Babylon. Schon damals vermutete er, dass es sich bei einem großen Hügel um einen Palast oder sogar um den Turm zu Babel handeln könnte. Wie viel von diesem Palastkomplex noch erhalten ist und ob sich daraus etwas bergen lässt, ist bislang unbekannt – doch moderne Untersuchungen könnten Aufschluss über die Beschaffenheit des Hügels geben. Natürlich sollten wir auch sicherstellen, dass wir die Erlaubnis haben, das Material mit nach Hause zu nehmen."
 je_lepsius_ishtar_gate_fail: "Jedes Land hat das Ishtar-Tor entdeckt."
 je_lepsius_ishtar_gate_transport: "Ishtar-Tor – Verkehr"
 je_lepsius_ishtar_gate_transport_reason: "Nachdem bei einer Expedition nach Babylonien Überreste des legendären Ishtar-Tors geborgen worden waren, haben wir unsere Ausgrabungsgenehmigung erweitert, um die babylonischen Ziegel in unser Museum transportieren zu lassen."
 je_lepsius_ishtar_gate_transport_success: "Insgesamt werden 200.000 Ziegelsteine benötigt, um das Tor wieder in seinem früheren Glanz erstrahlen zu lassen. Es wird erwartet, dass jährlich etwa 20.000 Ziegelsteine bei uns eintreffen – sofern keine Probleme auftreten. Neue Lieferungen werden nur so lange eintreffen, wie wir die Ausgrabungen in Babylonien fortsetzen.\n\n#R Wichtig:#! Die Arbeiten des Archäologen an der Restaurierung und die Arbeiten des Ingenieurs am Wiederaufbau werden erst beginnen, wenn mindestens 100.000 Ziegelsteine eingetroffen sind."
 je_lepsius_piedras_negras: "Stele von Piedras Negras"
 je_lepsius_piedras_negras_reason: "Piedras Negras ist eine bedeutende Maya-Stadt in Guatemala, die seit dem 7. Jahrhundert v. Chr. bewohnt ist. Sie war ein unabhängiger Stadtstaat, der insbesondere vom 7. bis zum 9. Jahrhundert eine kulturelle Blütezeit erlebte und über zahlreiche monumentale Stelen verfügt. Vielleicht können wir ein ganz besonderes Exponat für unser Museum erwerben?"
 je_lepsius_piedras_negras_fail: "Jedes Land bringt die Stele von Piedras Negras in sein Museum."
 je_lepsius_piedras_negras_transport: "Stele von Piedras Negras – Transport"
 je_lepsius_piedras_negras_transport_reason: "In den 1930er Jahren führte das Museum der University of Pennsylvania umfangreiche Expeditionen durch, um mehrere tonnenschwere Stelen unter extrem schwierigen Bedingungen aus dem dichten guatemaltekischen Dschungel zu transportieren. Da es keine Straßen gab, mussten die massiven Monolithen mühsam auf Holzschlitten und Flößen über den tückischen Fluss Usumacinta befördert werden."
 je_lepsius_piedras_negras_transport_success: "Sobald die Stele von Piedras Negras in der Hauptstadt eingetroffen ist, muss ein Archäologe sie restaurieren und vorbereiten, und ein Ingenieur muss bei ihrer Aufstellung helfen.\n\n#R Wichtig:#! Die Restaurierungsarbeiten des Archäologen und die Aufstellungsarbeiten des Ingenieurs beginnen erst, wenn der Obelisk eingetroffen ist."
 je_lepsius_axum_obelisk_transport: "Axum-Obelisk – Transport"
 je_lepsius_axum_obelisk_transport_reason: "Historisch gesehen war der Transport des Obelisken von Axum nach Rom und seine Wiederaufstellung im Jahr 1937 ein gewaltiges Unterfangen. Er wurde dort mithilfe von Metallstangen, die in die Stele eingesetzt wurden, befestigt und aufgestellt."
 je_lepsius_axum_obelisk_transport_success: "Sobald der Obelisk die Hauptstadt erreicht hat, muss ein Archäologe ihn restaurieren und vorbereiten, und ein Ingenieur muss bei seiner Aufstellung helfen.\n\n#R Wichtig:#! Die Restaurierungsarbeiten des Archäologen und die Aufstellungsarbeiten des Ingenieurs beginnen erst, wenn der Obelisk angekommen ist."
