 building_lepsius_archaeological_museum: "Archäologisches Museum"
 building_lepsius_archaeological_museum_desc: "Jede Nation mit etwas Selbstachtung verfügt in ihrer Hauptstadt über ein einzigartiges Museum, in dem alle Kulturgüter ausgestellt sind, die sie durch waghalsige Abenteuer oder wissenschaftliche Expeditionen von höchster Qualität erworben hat. Die Anzahl der Artefakte und die Anzahl der verschiedenen Sammlungen steigern nicht nur das Ansehen in der Welt, sondern haben auch einen pädagogischen Wert."
