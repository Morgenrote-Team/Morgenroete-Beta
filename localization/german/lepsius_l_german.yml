 je_lepsius_persepolis: "Das Juwel des Achämenidenreichs"
 je_lepsius_persepolis_reason: "Persepolis wurde bereits von antiken Schriftstellern und Historikern gepriesen. Diese Stätte, die jahrhundertelang Reisende aus fernen Ländern anzog, geriet nie wirklich in Vergessenheit – nicht zuletzt wegen des Mythos um Alexander den Großen, der diese alte Hauptstadt des Persischen Reiches ins Visier nahm. Eine moderne Ausgrabung steht jedoch noch aus."
 lepsius.69.t: "Persepolis"
 lepsius.69.d: "Fast zweieinhalb Jahrtausende sind vergangen, seit Alexanders Truppen das prächtige Persepolis zerstörten – doch das Team um [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] und [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Team daran, zu retten, was zu retten ist, wiederherzustellen, was wiederherzustellen ist, und zu verstehen, was zu verstehen ist. Endlich, nach all der Plünderung und Zerstörung, kann eine wissenschaftliche Untersuchung der Stadt stattfinden."
 lepsius.69.f: "„Persepolis war die Hauptstadt des persischen Reiches. Alexander beschrieb sie den Makedoniern als die verabscheuungswürdigste aller Städte Asiens und überließ sie seinen Soldaten zur Plünderung, mit Ausnahme der Paläste. Es war die reichste Stadt unter der Sonne, und die Privathäuser waren im Laufe der Jahre mit Reichtümern aller Art ausgestattet worden. Die Makedonier stürmten hinein, metzelten alle Männer nieder, denen sie begegneten, und plünderten die Wohnhäuser; viele der Häuser gehörten dem einfachen Volk und waren reichlich mit Möbeln und Kleidung aller Art ausgestattet.“\n – Diodorus Siculus"
 lepsius.2271.t: "Tairona-Anhänger"
 lepsius.2271.d: "Bei einer archäologischen Ausgrabung vor Ort wurden wertvolle Goldanhänger gefunden. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat die exklusiven Stücke bereits eingehend untersucht und betrachtet sie als Meisterwerke der präkolumbianischen Kunst."
 lepsius.2271.f: "Die Tairona waren eine hochentwickelte präkolumbianische Zivilisation in der Sierra Nevada de Santa Marta im heutigen Kolumbien. Bekannt für ihre herausragenden ingenieurtechnischen Fähigkeiten, bewältigten sie das steile Gelände durch den Bau komplexer Steinterrassen, Entwässerungssysteme und gepflasterter Wege. Ihre Gesellschaft war in rivalisierende Stammesgebiete wie Bonda und Pocigüeica gegliedert, die durch eine einflussreiche Priesterkaste spirituell vereint waren. Die Tairona sind berühmt für ihr „verlorenes Gold“ – exquisite Goldarbeiten in der Tumbaga-Technik, die oft schamanische Verwandlungen und den verehrten Jaguar darstellten."
 lepsius.2271.g: "Kolumbien ist voller archäologischer Schätze!"
 lepsius.2272.t: "Statue des Heiligen Augustinus"
 lepsius.2272.d: "Im Süden Kolumbiens haben Bauern von einer verlassenen Stätte berichtet, an der sich angeblich mehrere geheimnisvolle Statuen befinden. Ein archäologisches Team hat eine dieser rätselhaften Figuren genauer untersucht."
 lepsius.2272.f: "Die geheimnisvolle San-Agustín-Kultur hinterließ im kolumbianischen Hochland eine der bedeutendsten archäologischen Stätten Südamerikas. Zwischen 200 v. Chr. und 800 n. Chr. schufen unbekannte Bildhauer über 500 monumentale Statuen aus Vulkangestein, die über eine weitläufige Berglandschaft verstreut sind. Diese Skulpturen, von denen einige über vier Meter hoch sind, bewachen monumentale Grabstätten und zeremonielle Zentren. Die Darstellungen sind oft anthropozoomorph: Menschliche Züge verschmelzen mit den Zähnen von Raubtieren, Adlerkrallen oder schlangenartigen Attributen, was auf einen tief verwurzelten Schamanismus und Ahnenkult hindeutet. Besonders auffällig sind die Darstellungen des „doppelten Selbst“, bei denen eine Figur eine andere auf dem Rücken trägt. Da diese Kultur Jahrhunderte vor der Ankunft der Spanier verschwand und keine schriftlichen Aufzeichnungen hinterließ, bleiben die steinernen Wächter von Orten wie dem Bosque de las Estatuas ein Rätsel der Andenarchäologie."
 lepsius.2272.g: "Eine Kultur, die so viele Fragen offen lässt!"
 lepsius.2273.t: "Zenú-Artefakte"
 lepsius.2273.d: "Archäologische Ausgrabungen haben zahlreiche Alltagsgegenstände der Zenú-Kultur zutage gefördert und dem Museum in [ROOT.GetCountry.GetCapital.GetCityHubName] neue Erkenntnisse geliefert."
 lepsius.2273.f: "Das Volk der Zenú (oder Sinú) blühte in den fruchtbaren Tiefebenen und Flusstälern Nordkolumbiens auf. Ihr bleibendes Vermächtnis ist ein monumentales Wasserwirtschaftssystem: Im Laufe der Jahrhunderte schufen sie ein ausgedehntes Netz künstlicher Kanäle, die über 500.000 Hektar Land kontrolliert entwässerten und so eine intensive Landwirtschaft in einer hochwassergefährdeten Region ermöglichten. Sozial waren sie in drei Provinzen unterteilt, die jeweils auf Produktion, Religion und Bestattungsriten spezialisiert waren. Ihr handwerkliches Können zeigte sich in filigraner Goldschmiedekunst – meist in Form von Wasser- und Landtieren – sowie in der Webkunst. Die Tradition des Sombrero Vueltiao, heute ein nationales Symbol Kolumbiens, hat ihre Wurzeln im Korbflechthandwerk der Zenú."
 lepsius.2273.g: "Ein Volk mit großem handwerklichem Geschick."
 lepsius.2274.t: "Muisca Gold"
 lepsius.2274.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] schwärmt von einem Schatzfund, den [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] und [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Team kürzlich in den Anden entdeckt haben. Er enthielt mehrere wertvolle Artefakte. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] ist sich absolut sicher: Diese Schätze gehörten einst den legendären Muisca."
 lepsius.2274.f: "Die Muisca (oder Chibcha) bewohnten das kühle Hochland der Anden im heutigen Zentralkolumbien. Zusammen mit den Inka, Maya und Azteken bildeten sie eine der vier am weitesten entwickelten Zivilisationen Amerikas, verzichteten jedoch zugunsten von Holz und Strohdächern auf monumentale Steinarchitektur. Politisch war ihr Gebiet in der Muisca-Konföderation organisiert, angeführt vom Zipa (Bacatá) und dem Zaque (Hunza). Ihre Wirtschaft basierte auf einem ausgedehnten Handelsnetzwerk für Salz, Smaragde und Textilien. Weltberühmt wurden sie durch die Legende von El Dorado: Bei der Amtseinführung eines neuen Herrschers bedeckte dieser sich rituell mit Gold und opferte Goldfiguren (Tunjos) im Guatavita-See. Diese prächtigen Goldschmiedearbeiten dienten nicht als Währung, sondern als spirituelle Opfergaben."
 lepsius.2274.g: "Ein winziger Blick auf das Gold, das einst verloren war..."
 lepsius.550.tt: "Eine Spezialisierung auf die Archäologie der Ägäis kann das Geheimnis lüften."
 lepsius.550.t: "Der geheimnisvolle minoische Palast"
 lepsius.550.d: "Während der Expedition entdeckte Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] unweit von Knossos Ruinen, die offenbar noch nie zuvor katalogisiert worden waren."
 lepsius.550.f: "Natürlich waren von dem ehemaligen Komplex nur noch sehr bescheidene Überreste erhalten. Die Archäologen vermuten, dass der größte Teil des Palastes unter der Erde liegen könnte. Dies würde jedoch ein umfangreiches Ausgrabungsprojekt erfordern, was im Rahmen dieser allgemeinen Expedition nicht möglich wäre. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] beschließt, die Stätte in Zukunft eingehend zu untersuchen und zu erforschen."
 lepsius.550.g: "Welche Geheimnisse mögen in diesem Palast verborgen sein?"
 je_lepsius_mysterious_minoan_palace: "Der geheimnisvolle minoische Palast"
 je_lepsius_mysterious_minoan_palace_reason: "Während einer Expedition entdeckte unser archäologisches Team in der Nähe von Knossos einen geheimnisvollen Palast. Die Ausgrabungen erfordern eine intensive Auseinandersetzung mit der ägäischen Archäologie, um seine Geheimnisse zu entschlüsseln."
 je_lepsius_the_labyrinth_fail: "Wenn sich Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] zu oft verirrt, besteht die Gefahr, dass [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] etwas sehr, sehr Schlimmes zustößt..."
 je_lepsius_the_labyrinth_success: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] findet den Weg aus dem Labyrinth, ohne sich allzu sehr zu verlaufen."
