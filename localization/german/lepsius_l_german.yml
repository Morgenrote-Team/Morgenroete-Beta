 lepsius.2241.t: "Khmer-Tempel"
 lepsius.2241.d: "Eine lokale archäologische Expedition in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] unter der Leitung von Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat einen bisher unbekannten Tempel aus dem Angkor-Reich entdeckt!"
 lepsius.2241.f: "Die Architektur des Khmer-Reiches, die zwischen dem 9. und 13. Jahrhundert ihren Höhepunkt erreichte, war vor allem durch die „Tempelberg“-Bauweise geprägt. Diese Sandsteinbauten wurden errichtet, um den Berg Meru, die mythische Wohnstätte der Götter, darzustellen. Die Architekten verwendeten raffinierte Kragbögen, um weitläufige, von Galerien umgebene Anlagen zu schaffen, die oft von riesigen Gräben umgeben waren, die den kosmischen Ozean symbolisierten. Die Ästhetik wird durch den Prasat, den Lotusknospenturm, und durch Flachreliefschnitzereien geprägt, die die Steinmauern in narrative Wandteppiche der hinduistischen Mythologie und der kaiserlichen Geschichte verwandeln. Wie am ikonischen Angkor Wat zu sehen ist, erreichte dieser Stil eine perfekte Balance aus Symmetrie, gewaltiger Größe und aufwendigen Details."
 lepsius.2241.g: "Erstaunlich."
 lepsius.2242.t: "Khmer-Skulpturen"
 lepsius.2242.d: "Im Dschungel entdeckte Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] einige prächtige Khmer-Statuen, deren exquisite Ästhetik zahlreiche Kollegen beeindruckt hat. Allerdings herrscht nach wie vor Uneinigkeit darüber, wie mit ihnen verfahren werden soll..."
 lepsius.2242.f: "Die Khmer-Bildhauerkunst der Angkor-Zeit ist bekannt für ihren Übergang von der hinduistischen Ikonografie zu einer eigenständigen, regional geprägten Ästhetik, die Gelassenheit und spirituelle Autorität betont. Im Gegensatz zu den dynamischen Posen der indischen Kunst zeichnen sich Khmer-Statuen durch eine hieratische Stille und ein Gefühl monumentaler Beständigkeit aus. Frühe Werke stellten oft hinduistische Gottheiten wie Vishnu und Shiva mit kraftvollen, athletischen Körpern dar. Der „Angkor-Wat-Stil“ führte jedoch feinere Proportionen und aufwendigen Schmuck ein. Gegen Ende des 12. Jahrhunderts verlagerte sich unter König Jayavarman VII. der Schwerpunkt auf den Mahayana-Buddhismus. In dieser Epoche entstand der ikonische „Bayon-Stil“, berühmt für das „Angkor-Lächeln“ – einen Gesichtsausdruck mit geschlossenen Augen und leicht nach oben gezogenen Lippen, der inneren Frieden und losgelöste Erleuchtung symbolisiert."
 lepsius.2242.g: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sollte die Statuen gründlich untersuchen und erforschen."
 lepsius.2242.h: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sollte die Statuen zerschneiden und ins Museum schicken."
 lepsius.2243.t: "Khmer-Artefakte"
 lepsius.2243.d: "Das archäologische Team in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] hat einen Fund von Artefakten aus der Zeit des Angkor-Reiches entdeckt. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat Bronzegefäße und Keramiken geborgen."
 lepsius.2243.f: "Zwar stehen monumentale Architektur und Skulptur im Mittelpunkt der Geschichte, doch zeichnete sich das handwerkliche Können der Khmer in vielfältigen Bereichen aus. Der Bronzeguss war ein Höhepunkt ihrer metallurgischen Fertigkeiten; unter Verwendung der Wachsausschmelztechnik schufen die Handwerker kunstvolle Ritualgefäße, Sänftenbeschläge und Glocken, die oft mit aufwendigen Blumenmotiven oder Fabelwesen wie dem Garuda verziert waren. Keramik spielte eine ebenso wichtige Rolle, insbesondere das charakteristische Steingut mit „brauner Glasur“, das in Öfen in den Provinzen hergestellt wurde. Diese Gefäße, oft in Form von Tieren wie Elefanten oder Eulen, dienten als Behälter für Kalk, der zum Kauen von Betelnüssen verwendet wurde, oder als Aufbewahrungsgefäße für kostbare Öle. Darüber hinaus waren die Khmer Meister der Schmuck- und Goldschmiedekunst und schmiedeten schwere Halsketten, Armbänder und Diademe aus gehämmertem Gold, um sowohl die Königsfamilie als auch hölzerne Kultfiguren zu schmücken."
 lepsius.2243.g: "Neue Exponate für unser Museum."
 lepsius.2244.t: "Khmer-Geschichte"
 lepsius.2244.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat sein gesammeltes Wissen über das Khmer-Reich von Angkor in einer Monografie zusammengefasst. Das Buch gilt bereits als Standardwerk."
 lepsius.2244.f: "Das Khmer-Reich, auch bekannt als Angkor-Reich, entwickelte sich im frühen 9. Jahrhundert zur dominierenden Macht in Südostasien und erstreckte sich über weite Teile des heutigen Kambodschas, Thailands, Laos und Vietnams. Das Reich wurde 802 n. Chr. von Jayavarman II. gegründet, der sich selbst zum „Weltherrscher“ (Chakravartin) ernannte, und vereinte die verstreuten Fürstentümer durch eine ausgefeilte Mischung aus hinduistisch-buddhistischer Herrschaft und fortschrittlicher Wasserbaukunst. Der Wohlstand des Reiches beruhte auf einem komplexen System aus Barays (Stauseen) und Kanälen, das einen intensiven Reisanbau ermöglichte und eine riesige Bevölkerung ernährte. Auf dem Höhepunkt im 12. Jahrhundert erreichten die Khmer einen künstlerischen und politischen Zenit und errichteten monumentale Hauptstädte wie Angkor Thom. Im 14. und 15. Jahrhundert ging das Reich jedoch aufgrund einer Kombination aus ökologischen Problemen, dem Aufstieg mächtiger thailändischer Königreiche und der Verlagerung von Handelswegen unter, was schließlich zur Aufgabe von Angkor führte."
 lepsius.2244.g: "Dieses Buch gehört in die Nationalbibliothek."
 lepsius.2251.t: "Aksumitischer Münzfund"
 lepsius.2251.d: "Bei archäologischen Ausgrabungen in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde ein reichhaltiger Münzfund aus der Spätantike entdeckt – dabei konnten römische und aksumitische Münzen geborgen werden."
 lepsius.2251.f: "Die Münzprägung wurde im Reich von Aksum um 270 n. Chr. unter König Endubis eingeführt. Aksum war der erste bedeutende Staat in Subsahara-Afrika, der eigene Münzen prägte, und stellte Münzen aus Gold, Silber und Bronze her. Diese Ausgaben sollten den internationalen Handel, insbesondere mit Rom und Byzanz, erleichtern und wiesen oft griechische Inschriften auf – die Verkehrssprache des Handels am Roten Meer. Frühe Ausgaben zeigen traditionelle polytheistische Symbole wie Halbmond und Scheibe, während Münzen, die nach der Bekehrung von König Ezana im 4. Jahrhundert geprägt wurden, deutlich das christliche Kreuz zeigen."
 lepsius.2251.g: "Das wird Numismatiker begeistern."
 lepsius.2252.t: "Palast von Aksum"
 lepsius.2252.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] und seinem Team ist es kürzlich gelungen, in mühevoller Arbeit die Fundamente eines riesigen Palastkomplexes freizulegen, der zweifellos aus der Zeit des Aksum-Reiches stammt."
 lepsius.2252.f: "Die Palastarchitektur des Aksumitischen Reiches zeichnet sich durch massive, mehrstöckige Pavillons aus, die auf erhöhten gemauerten Plattformen errichtet wurden. Das berühmteste Beispiel ist Dungur in Aksum – der sogenannte Palast der Königin von Saba. Architektonisch nutzten diese Paläste die charakteristische „Affenkopf“-Technik, bei der horizontale Holzbalken zur strukturellen Verstärkung in Steinmauern eingelassen wurden, wobei ihre hervorstehenden Enden ein rhythmisches äußeres Muster bildeten. Die Fundamente bestanden aus fein behauenen Granitblöcken, oft mit zurückgesetzten Wänden, um ästhetische Tiefe und Stabilität zu verleihen."
 lepsius.2252.g: "Paläste, die König Salomon würdig wären!"
 lepsius.2253.t: "Ge'ez-Literatur"
 lepsius.2253.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte für das Museum eine wertvolle Schriftrolle aus dem alten aksumitischen Reich erwerben."
 lepsius.2253.f: "Die Literatur des aksumitischen Reiches ist untrennbar mit der Einführung des Christentums und der Entwicklung von Ge'ez, einer einzigartigen südsemitischen Schrift, verbunden. Während frühe aksumitische Inschriften auf Steinmonumenten oft mehrsprachig waren – unter Verwendung von Griechisch und Sabäisch –, förderte das Reich schließlich eine reiche einheimische literarische Tradition, deren Schwerpunkt auf religiösen und königlichen Texten lag. Das bedeutendste literarische Unterfangen war die Übersetzung der Bibel und verschiedener apokrypher Texte aus dem Griechischen ins Ge'ez im 5. und 6. Jahrhundert. Werke wie die Garima-Evangelien mit ihren atemberaubenden Illuminationen gehören zu den ältesten christlichen Handschriften der Welt."
 lepsius.2253.g: "Ein wertvolles literarisches Werk!"
 lepsius.2254.t: "Die Geschichte der Aksumiten"
 lepsius.2254.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat sein gesammeltes Wissen über das Reich von Aksum in einer Monografie zusammengefasst. Das Buch gilt bereits als Standardwerk."
 lepsius.2254.f: "Das Aksumitische Reich (ca. 100–940 n. Chr.) entstand im Hochland des heutigen Äthiopiens und Eritreas und entwickelte sich neben Rom, Persien und China zu einer der vier Großmächte der Antike. Sein Wohlstand beruhte auf der strategischen Kontrolle über die Handelswege am Roten Meer, die das Römische Reich mit Indien verbanden. Über den Hafen von Adulis exportierte Aksum Gold, Elfenbein und Smaragde und importierte Seide und Gewürze. Unter König Ezana im 4. Jahrhundert erreichte Aksum seinen politischen Höhepunkt und wurde eines der ersten großen Reiche, das das Christentum als Staatsreligion annahm. Dieser Wandel beeinflusste die Kunst, Architektur und die Entwicklung der Ge’ez-Schrift in der Region tiefgreifend. Im 7. Jahrhundert jedoch führte der Aufstieg islamischer Kalifate zu einer Verlagerung der Handelswege und isolierte das Reich. Ökologische Zerstörung und innere Unruhen führten schließlich zu seinem Niedergang, doch sein kulturelles und religiöses Erbe bildet nach wie vor das Fundament des modernen äthiopischen Staates."
 lepsius.2254.g: "Dieses Buch gehört in die Nationalbibliothek."
 lepsius.2261.t: "Mississippi-Figuren"
 lepsius.2261.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] stellte der Presse heute kunstvolle Figuren vor, die die Kreativität der amerikanischen Ureinwohner der Mississippi-Kultur widerspiegeln. Sie wurden in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] gefunden."
 lepsius.2261.f: "Die Steinstatuen der Mississippi-Kultur, die auf den Zeitraum von etwa 800 bis 1500 n. Chr. datiert werden, stellen einen Höhepunkt der prähistorischen figurativen Kunst Nordamerikas dar. Diese anthropomorphen Figuren, die hauptsächlich aus Fluorspat, Sandstein oder Bauxit geschnitzt wurden, spielten eine zentrale Rolle im Ahnenkult des Southeastern Ceremonial Complex. Die Statuen, die typischerweise paarweise in Tempel-Grabkomplexen auf Erdhügeln zu finden sind, stellen sitzende oder kniende Männer und Frauen dar. Sie zeichnen sich durch eine monumentale Stille aus, gekennzeichnet durch starre Körperhaltungen, stilisierte Frisuren (wie den „Haarknoten“) und gelassene, stoische Gesichtsausdrücke. Es wird angenommen, dass diese Figuren die Geister hochrangiger Vorfahren oder Stammväter verkörpern."
 lepsius.2261.g: "Sammle so viele wie möglich."
 lepsius.2262.t: "Mississippi-Hügel"
 lepsius.2262.d: "Archäologen haben einen gewaltigen Hügel entdeckt, der fast so groß ist wie die bekannten Bauwerke der Maya und Azteken. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] wurde umgehend herbeigerufen, um dieses faszinierende Überbleibsel der Mississippi-Kultur genauer zu untersuchen."
 lepsius.2262.f: "Das charakteristische Merkmal der Mississippi-Kultur ist der Bau gewaltiger Erdhügel, die die Überschwemmungsgebiete des amerikanischen Mittleren Westens und Südostens in komplexe Stadtlandschaften verwandelten. Im Gegensatz zu den kegelförmigen Grabhügeln früherer Epochen handelte es sich bei den Mississippi-Hügeln typischerweise um Pyramiden mit flacher Spitze oder Plattformhügel, die dazu dienten, hölzerne Tempel, Ratshäuser oder die Wohnstätten der elitären „Sonnen“-Gottheiten zu tragen. Diese von Hand aus Erdkörben errichteten Bauwerke dienten als zeremonielles und politisches Zentrum der Stammesfürstentümer. Das berühmteste Beispiel, der Monks Mound in Cahokia, erhebt sich 30 Meter in die Höhe und erstreckt sich über mehr als 5 Hektar, womit er in seiner Grundfläche mit der Großen Pyramide von Gizeh konkurriert."
 lepsius.2262.g: "Lehm-Pyramiden!"
 lepsius.2263.t: "Mississippi-Keramiken"
 lepsius.2263.d: "Bei lokalen Ausgrabungen in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] wurde ein Keramikfund entdeckt, der auf das späte 1. Jahrtausend v. Chr. datiert wird und offenbar mit der städtischen Kultur der Mississippi-Kultur in Verbindung steht."
 lepsius.2263.f: "Die Keramik der Mississippi-Kultur zeichnete sich vor allem durch die Verwendung von zerkleinerten Muschelschalen als Schmelzmittel aus. Diese Innovation ermöglichte es den Töpfern, dünnere, stabilere Wände und komplexere Formen zu schaffen als bei früheren Verfahren mit Sand als Schmelzmittel. Die Keramik ist bekannt für ihre vielfältigen Formen, darunter Wasserflaschen mit Haube, Teller und „Effigie“-Krüge in Form von Tieren, menschlichen Köpfen oder Fabelwesen. Die ästhetischen Stile variierten je nach Region; die „Avenue Polychrome“ zeichnete sich durch lebhafte rote und weiße Engobe-Muster aus, während andere tiefe Ritzungen oder Negativmalerei verwendeten. Viele Gefäße dienten rituellen Zwecken und waren mit Motiven aus dem Southeastern Ceremonial Complex verziert, wie dem „Hand- und Auge“- oder dem „Sonnenstrahl“-Motiv."
 lepsius.2263.g: "Moment mal, die bestehen aus Muscheln?"
 lepsius.2264.t: "Mississippi-Grabstätten"
 lepsius.2264.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat verborgene Gräber der Mississippi-Kultur entdeckt und dabei einige bemerkenswerte Funde gemacht."
 lepsius.2264.f: "Die Bestattungsbräuche der Mississippi-Kultur waren eng mit der sozialen Hierarchie und kosmologischen Vorstellungen verflochten und spiegelten eine stark stratifizierte Gesellschaft wider. Angehörige der Elite wurden oft in Totentempeln auf Plattformhügeln oder in speziellen Grabhügeln beigesetzt. Diese Gräber von hohem Rang enthielten häufig prestigeträchtige Grabbeigaben wie geprägte Kupferplatten, Halsklemmen aus Meeresmuscheln und fein gearbeitete Keramik, die den Verstorbenen ins Jenseits begleiten sollten. Im Gegensatz dazu wurden einfache Bürger in der Regel auf einfacheren Grabstätten in der Nähe von Wohngebieten beigesetzt. Ein charakteristisches Merkmal dieser Zeit war die Verwendung von Steinkistengräbern, bei denen die Verstorbenen in mit Kalkstein- oder Sandsteinplatten ausgekleideten Steinkisten beigesetzt wurden."
 lepsius.2264.g: "Faszinierend!"
 lepsius.2281.t: "Skythische Waffen"
 lepsius.2281.d: "Bei Ausgrabungen in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] haben Archäologen einen skythischen Waffenfund entdeckt. Zaumzeug, Bögen und Krummsäbel zeugen von der Bewaffnung dieses alten Steppenvolkes."
 lepsius.2281.f: "Die Kriegsführung der Skythen zeichnete sich durch Mobilität und Durchschlagskraft auf große Entfernung aus. Die Hauptwaffe war der Kompositbogen aus Holz, Horn und Sehnen. Er wurde in einem Gorytos getragen, einer speziellen Ledertasche, in der sowohl der Bogen als auch bis zu 200 Pfeile mit Bronzespitzen Platz fanden, was ein schnelles und anhaltendes Feuer vom Pferderücken aus ermöglichte. Für den Nahkampf setzten die Skythen den Akinakes ein, ein charakteristisches kurzes Eisenschwert oder einen Dolch mit einer rechteckigen oder „nierenförmigen“ Parierstange. Zu den archäologischen Funden gehört häufig auch der Sagaris, eine schmalblättrige Streitaxt, die Helme durchbohren konnte. Der Schutz bestand aus Schuppenpanzern, bei denen sich überlappende Eisen- oder Bronzepanzerplatten auf Lederwesten aufgenäht waren."
 lepsius.2281.g: "Kein Wunder, dass sie die Steppe beherrschten!"
 lepsius.2282.t: "Skythischer Kurgan"
 lepsius.2282.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] konnte dem Museum heute eine sehr gute Nachricht überbringen: Offenbar hat [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Team einen bisher unbekannten Kurgan – einen skythischen Grabhügel – entdeckt."
 lepsius.2282.f: "Die skythischen Kurgane der pontischen Steppe sind Grabhügel, die sowohl als Grabstätten für die Elite als auch als territoriale Markierungen dienten. Sie bestehen typischerweise aus einer zentralen Holzkammer aus massiven Eichen- oder Lärchenstämmen, die tief in die Erde eingelassen ist. Zu Ehren der Verstorbenen wurden riesige Mengen an Erde und Torf darüber aufgeschüttet, wobei „königliche“ Kurgane wie Chertomlyk oft eine Höhe von über 20 Metern erreichten. Neben der Hauptbestattung enthalten diese Hügel häufig Seitenkammern für geopferte Diener und separate Gruben für Dutzende von Kriegspferden, die vollständig mit Bronzebits und Zaumzeug ausgestattet waren."
 lepsius.2282.g: "Normalerweise schrecke ich hoch, wenn ein Professor den Raum betritt und verkündet: „Gute Nachrichten! …“"
 lepsius.2283.t: "Skythische Siedlung"
 lepsius.2283.d: "Archäologen haben eine großflächige Siedlung der alten Skythen entdeckt. Bei den bisherigen Ausgrabungen wurden Artefakte und menschliche Überreste gefunden, die unser Wissen über diese alte Steppenkultur erweitern."
 lepsius.2283.f: "Das bekannteste Beispiel für eine skythische Siedlung ist die Festungsanlage von Belsk, ein vorstädtischer Komplex, der von über 30 Kilometer langen Erdwällen umgeben ist. Diese Siedlungen lagen strategisch günstig an Flusswegen, um den Handel zu kontrollieren und das Vieh zu schützen. Archäologische Ausgrabungen haben dauerhafte Holzhäuser, Vorratsgruben und spezialisierte Werkstätten für die Eisenverhüttung, den Bronzeguss und das Weben zutage gefördert. Diese Zentren fungierten als wirtschaftliche Knotenpunkte, an denen Nomaden Rohstoffe gegen griechische Luxusgüter wie Wein und Keramik eintauschten."
 lepsius.2283.g: "Riesige Dörfer..."
 lepsius.2284.t: "Skythische Babas"
 lepsius.2284.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat im Gebiet von [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] eine antike Stele gefunden. Sie stammt aus der Zeit der alten Skythen."
 lepsius.2284.f: "Skythische Stelen, auch „Stein-Babas“ genannt, sind monumentale Sandsteinplatten, die die Gipfel der Kurgane in der pontischen Steppe markieren. Als Ahnenmonumente dienen diese Statuen der Darstellung verstorbener Krieger in einer starren, frontalen Haltung. Im Gegensatz zu den stilisierten „Hirschsteinen“ des Ostens sind diese Figuren anthropomorph und weisen detaillierte Gravuren skythischer Kriegsausrüstung auf. Im Mittelpunkt ihrer Ikonografie steht der Gürtel des Kriegers, an dem der Akinakes (Dolch), der Gorytos (Bogenköcher) und Schleifsteine zu sehen sind. Viele Figuren halten ein rituelles Trinkhorn (Rhyton) an ihre Brust, was hohen Status und kultische Bankette symbolisiert. Die „Babas“ dienten als Gebietsmarkierungen und als Mittelpunkt für Bestattungsrituale."
 lepsius.2284.g: "Nimm Baba ins Museum."
 lepsius.2285.t: "Der goldene Kamm"
 lepsius.2285.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat in Solokha die bislang bedeutendste Entdeckung in der skythischen Archäologie gemacht: Der dortige Kurgan birgt einen riesigen Goldschatz. Das Prunkstück ist ein goldener Kamm, auf dem Kampfszenen dargestellt sind."
 lepsius.2285.f: "Der Solokha-Kurgan am linken Ufer des Dnjepr in der heutigen Ukraine ist eine der bedeutendsten Fundstätten der skythischen Archäologie, die 1912 von Nikolai Veselovsky entdeckt wurde. Dieser monumentale Grabhügel aus dem frühen 4. Jahrhundert v. Chr. war 18 Meter hoch. Er enthielt zwei königliche Grabkammern: ein älteres zentrales Grab, das bereits in der Antike geplündert worden war, und ein intaktes Seitengrab. Letzteres enthüllte die Überreste eines skythischen Königs, eines Mundschenks und eines Wächters, begleitet von fünf Opferpferden. Neben den berühmten Goldartefakten umfasst der Fund eine große Auswahl an griechischen Amphoren, Bronzewaffen und einem silbernen Ritualgefäß."
 lepsius.2285.g: "Es ist viel zu schön, um es zum Kämmen der Haare zu benutzen..."
 lepsius.2291.t: "Wikinger-Runenstein"
 lepsius.2291.d: "In einem abgelegenen Winkel von [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] entdeckte Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] einen Runenstein. Er stammt aus der Wikingerzeit."
 lepsius.2291.f: "Ein Wikinger-Runenstein ist ein aufgerichtetes Denkmal, das in der Regel aus Granit oder Sandstein besteht und mit Runenzeichen des Jüngeren Futharks versehen ist. Diese Steine wurden vor allem zwischen dem 9. und 11. Jahrhundert in ganz Skandinavien aufgestellt, wobei die größte Dichte im heutigen Schweden zu finden ist. Im Gegensatz zu Grabsteinen wurden Runensteine selten direkt über einem Grab aufgestellt; stattdessen dienten sie als öffentliche Denkmäler, um der Verstorbenen zu gedenken, Erbschaften zu dokumentieren oder bedeutende Errungenschaften und Expeditionen zu preisen."
 lepsius.2291.g: "Entziffern Sie den Runenstein."
 lepsius.2291.h: "Bring den Runenstein ins Museum."
 lepsius.2292.t: "Wikingersiedlung"
 lepsius.2292.d: "Ein Landwirt aus [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] machte die Behörden auf seltsame Funde auf seinem Feld aufmerksam. Forscher untersuchten das Gebiet und legten Artefakte aus der Wikingerzeit frei. Ein Team erfahrener Archäologen legte daraufhin eine ganze Siedlung frei."
 lepsius.2292.f: "Das grundlegende architektonische Element der Wikingersiedlungen war das Langhaus (langhús), ein rechteckiger Gemeinschaftsbau, der in der Regel eine Länge von 15 bis 30 Metern hatte. Diese Gebäude zeichneten sich durch geschwungene, „bootförmige“ Wände aus Holz, Torf oder Stein aus und verfügten über eine zentrale Feuerstelle zum Heizen und Kochen. Im Nordatlantik passten sich die Siedlungen an die lokalen Gegebenheiten an; in Regionen mit Holzmangel wie Island und Grönland wurde Torf zum wichtigsten Baumaterial. Archäologische Ausgrabungen an Stätten wie L’Anse aux Meadows in Neufundland haben bestätigt, dass sich diese Siedlungsmuster zeitweise sogar bis auf den nordamerikanischen Kontinent erstreckten."
 lepsius.2292.g: "Es ist kaum zu glauben, dass diese mörderischen Plünderer zu Hause auch liebevolle Familienväter sein könnten."
 lepsius.2293.t: "Wikingerschiff"
 lepsius.2293.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat die erhaltenen Überreste eines ehemaligen Wikingerschiffs gefunden. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] und sein Team haben mehrere Fundstücke geborgen."
 lepsius.2293.f: "Das Wikingerschiff war ein spezieller Typ von Seeschiff, das von den Nordländern während der Wikingerzeit für Handel, Erkundung und Kriegsführung entwickelt und eingesetzt wurde. Seine Konstruktion zeichnet sich durch einen langen, schlanken Holzrumpf, einen geringen Tiefgang sowie einen symmetrischen Bug und Heck aus, was hohe Geschwindigkeiten und die Navigation sowohl auf dem offenen Meer als auch in flachen Binnengewässern ermöglichte. Beim Bau kam typischerweise die Klinkerbauweise zum Einsatz, bei der überlappende Holzplanken – hauptsächlich aus Eiche – mit Eisennieten befestigt wurden. Dies verlieh dem Rumpf die nötige Flexibilität, um den Torsionskräften der Atlantikwellen standzuhalten. Der Antrieb erfolgte durch eine Kombination aus einem einzigen großen Rahsegel und Ruderreihen, wobei letztere es den „Drachenbooten“ ermöglichten, unabhängig von der Windrichtung an Land zu gehen und taktische Manöver durchzuführen."
 lepsius.2293.g: "Kannst du es wieder seetüchtig machen? Nein? Dann bring es ins Museum!"
 lepsius.2294.t: "Wikinger-Schiffsgrab"
 lepsius.2294.d: "Eine archäologische Sensation! Vor der Küste von [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] haben Archäologen unter der Leitung von Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ein vollständig erhaltenes Wikingerschiff entdeckt, das offenbar als Grabstätte diente. Zahlreiche wertvolle Artefakte wurden dem verstorbenen Häuptling beigelegt!"
 lepsius.2294.f: "Ein Wikingerschiffbegräbnis ist ein Bestattungsbrauch, bei dem ein Verstorbener, in der Regel von hohem gesellschaftlichem Rang, in einem Seeschiff beigesetzt wurde. Diese Praxis spiegelte den Glauben wider, dass das Schiff als Transportmittel ins Jenseits dienen würde, etwa nach Walhall oder Folkvangr. Das Bestattungsritual sah vor, den Verstorbenen in eine Kammer auf dem Schiff zu legen, oft begleitet von einer umfangreichen Auswahl an Grabbeigaben, darunter Opfertiere (Pferde und Hunde), Waffen, luxuriöse Textilien und gelegentlich auch versklavte Menschen. Diese Fundstätten – wie das berühmte Oseberg-Schiff – waren reich an Grabbeigaben, darunter kunstvoll verzierte Waffen, Silberschmuck und Haushaltsgeräte, die Einblicke in die nordische Handwerkskunst gewähren."
 lepsius.2294.g: "Valhalla für sie, Artefakte für uns!"
 lepsius.2106.t: "Augustus von Prima Porta"
 lepsius.2106.d: "In Prima Porta machte Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] eine völlig unerwartete Entdeckung: In der Villa Livia in der Nähe von Rom haben [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] und [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Team eine kolossale Statue des ersten römischen Kaisers, Augustus, ausgegraben!"
 lepsius.2106.f: "Der Augustus von Prima Porta ist eine etwa 2,04 Meter hohe Marmorstatue des ersten römischen Kaisers, die 1863 in der Villa der Livia in der Nähe von Rom entdeckt wurde. Die Statue zeigt Augustus in der Pose eines Feldherrn (adlocutio), der zu seinen Truppen spricht. Von besonderer historischer Bedeutung ist der reich verzierte Brustpanzer. Die zentralen Reliefs stellen die Rückgabe der Legionärsadler dar, die 20 v. Chr. von den Parthern erobert worden waren – ein diplomatischer Triumph, den Augustus als Wiederherstellung der römischen Ehre inszenierte. Zu seinen Füßen reitet ein kleiner Amor auf einem Delphin, was die göttliche Abstammung der julischen Dynastie von der Göttin Venus unterstreicht. Die Statue gilt als eines der bedeutendsten Beispiele für kaiserliche Selbstdarstellung und römischen Klassizismus."
 lepsius.2106.g: "Das muss eine der schönsten Statuen der römischen Antike sein."
 lepsius.2116.t: "Cyrus-Zylinder"
 lepsius.2116.d: "Das archäologische Team hat bei Ausgrabungen in Babylon eine überraschende Entdeckung gemacht: ein Tontafel-Dokument, das dem persischen Großkönig Kyros zugeschrieben wird. Darin erläutert er die Rückkehr zahlreicher Völker in ihre Heimatländer und ihre Freiheit, ihre Religion auszuüben. Handelt es sich hierbei um eine antike Erklärung der Menschenrechte?"
 lepsius.2116.f: "„Ich bin Kyros – der König des Weltreiches, der große und mächtige König, der König von Babylonien, der König von Sumer und Akkad, der König der vier Weltteile, Sohn von Kambyses, dem großen König von Anshan, Enkel von Kyros I., Nachkomme von Teispes – dessen Herrschaft Bel und Nabu begünstigten. Ich holte die Götter zurück, die (jenseits des Tigris) wohnten. Ich versammelte all ihre Völker und brachte sie in ihre Heimat zurück. Inmitten von Jubel und Freude richtete ich meinen königlichen Sitz im Palast des Herrschers in Babylon ein. Tag für Tag widmete ich mich der Verehrung Marduks. Ich ließ zu, dass im ganzen Land Sumer und Akkad kein Unruhestifter aufstand. Ich beschützte die Stadt Babylon und all ihre Kultstätten in Wohlstand. Ich ließ die Bewohner, die dort gegen den Willen der Götter ein unwürdiges Joch trugen, in ihrer Erschöpfung ruhen. Marduk, der große Herr, segnete mich, Cyrus, und Kambyses, meinen eigenen Sohn, sowie alle meine Truppen."
 lepsius.2116.g: "Ein wertvolles persisches Artefakt in Babylon? Erstaunlich."
