 notification_lepsius_rosellini_notification_name: "Lepsius' Brief an Rosellini"
 notification_lepsius_rosellini_notification_desc: "Der deutsche Philologe Karl Richard Lepsius stellte seine verbesserte Form der Hieroglyphenübersetzung in einem Brief an den italienischen Ägyptologen Ippolito Rosellini vor. Es werden Stimmen laut, eine Expedition nach Ägypten zu unternehmen."
 notification_lepsius_stephens_catherwood_expedition_notification_name: "Stephens & Catherwood-Expedition"
 notification_lepsius_stephens_catherwood_expedition_notification_desc: "Der amerikanische Entdecker John Lloyd Stephens und der britische Künstler Frederick Catherwood sind von einer abenteuerlichen Reise auf der Halbinsel Yucatán zurückgekehrt – und erzählen von sagenumwobenen Ruinen im Dschungel. Wissenschaftler haben Interesse bekundet, die Maya-Kultur genauer zu erforschen."
 notification_lepsius_decipherment_akkadian_notification_name: "Entschlüsselung der akkadischen Sprache"
 notification_lepsius_decipherment_akkadian_notification_desc: "Alle Zeitungen des Landes berichten über einen Durchbruch renommierter Forscher unter der Leitung eines erfahrenen Archäologen: Die alten Sprachen Mesopotamiens sind kein Geheimnis mehr. Einer ernsthaften Erkundung Babyloniens und Assyriens steht nichts im Wege."
 notification_lepsius_support_schliemann_notification_name: "Schliemann entdeckt Troja!"
 notification_lepsius_support_schliemann_notification_desc: "Der deutsche Geschäftsmann Heinrich Schliemann entdeckte das lange als Märchen abgetane Troja. Archäologen auf der ganzen Welt haben eine neue Leidenschaft für das antike Griechenland – wenn auch eine, die in der mythischen Antike liegt."
 notification_lepsius_machu_picchu_notification_name: "Machu Picchu"
 notification_lepsius_machu_picchu_notification_desc: "Eine archäologische Expedition hat tief in den Anden die verlorene Inkastadt Machu Picchu entdeckt. Forscher fordern eine intensivere Erforschung der Region."
 notification_lepsius_excavation_artifacts_notification_name: "Neue Ausgrabungsartefakte"
 notification_lepsius_excavation_artifacts_notification_desc: "Heute Morgen erhielt unser Archäologisches Museum eine Lieferung neuer Artefakte von unseren Ausgrabungsstätten."
 lepsius_hide_archaeological_decisions: "Archäologische Entscheidungen ausblenden"
 lepsius_hide_archaeological_decisions_desc: "Blenden Sie alle archäologischen Entscheidungen aus, um einen besseren Überblick zu behalten."
 lepsius_show_archaeological_decisions: "Archäologische Entscheidungen anzeigen"
 lepsius_show_archaeological_decisions_desc: "Alle archäologischen Entscheidungen anzeigen."
 lepsius_cancel_excavation_decision: "Rufen Sie eines unserer Ausgrabungsteams zurück"
 lepsius_cancel_excavation_decision_desc: "In manchen Situationen kann es sinnvoll sein, ein Grabungsteam zurückzurufen. Unsere erworbenen Artefakte und Sammlungen bleiben bestehen, aber unsere permanente Ausgrabung wird enden."
 lepsius_gather_first_excavation_team_decision: "Stellen Sie ein neues Archäologenteam zusammen"
 lepsius_gather_first_excavation_team_decision_desc: "Wir können ein zusätzliches Team von Archäologen ausbilden. Dadurch sind mehrere Ausgrabungen gleichzeitig möglich."
 lepsius_gather_second_excavation_team_decision: "Stellen Sie ein neues Archäologenteam zusammen"
 lepsius_gather_second_excavation_team_decision_desc: "Wir können ein zusätzliches Team von Archäologen ausbilden. Dadurch sind mehrere Ausgrabungen gleichzeitig möglich."
 lepsius_gather_third_excavation_team_decision: "Lassen Sie einen Archäologen ein neues Team zusammenstellen"
 lepsius_gather_third_excavation_team_decision_desc: "Wir können ein zusätzliches Team von Archäologen ausbilden. Dadurch sind mehrere Ausgrabungen gleichzeitig möglich."
 lepsius_upper_egypt_expedition_decision: "Das Tal der Könige"
 lepsius_upper_egypt_expedition_decision_desc: "Mit der alten Hauptstadt Theben und dem Tal der Könige gilt Oberägypten als Mekka der Ägyptologie. Wir sollten eine Ausgrabungslizenz für das Gebiet erwerben und nach ägyptischen Schätzen suchen."
 lepsius_lower_egypt_expedition_decision: "Die Pyramiden"
 lepsius_lower_egypt_expedition_decision_desc: "Seit jeher faszinieren die ägyptischen Pyramiden die Menschheit. Es wird gesagt, dass andere Gräber, Tempel und sogar Städte, die im Sand Unterägyptens verschwunden sind, darauf warten, wiederentdeckt zu werden."
 lepsius_babylonia_expedition_decision: "Die Wiege der Zivilisation"
 lepsius_babylonia_expedition_decision_desc: "Babylonien, der südliche Teil Mesopotamiens, verdankt seinen Namen der einst mächtigen Stadt Babylon. Die Region gilt als \"Wiege der Zivilisation\", wo immer wieder wertvolle archäologische Artefakte entdeckt werden. Sie gehören definitiv in ein Museum."
 lepsius_assyria_expedition_decision: "Die Gärten von Assyrien"
 lepsius_assyria_expedition_decision_desc: "Unter Assyrien versteht man den nördlichen Teil Mesopotamiens mit den beiden wichtigen Städten Assur und Ninive. Das spärliche Wissen über das Land lässt sich immer noch auf die Bibel als Quelle zurückführen – aber vielleicht gibt es historische Beweise, die zuverlässiger sind?"
 lepsius_argolis_expedition_decision: "Agamemnons Stadt"
 lepsius_argolis_expedition_decision_desc: "Nach der Entdeckung Trojas wird selbst skeptischen Wissenschaftlern klar, dass die Mythen der alten Griechen mehr als nur Märchen sind. Bis heute sollen in Argolis Überreste bronzezeitlicher Städte liegen, die bekannteste davon ist Mykene. Davon sollten wir uns überzeugen."
 lepsius_crete_expedition_decision: "Die Geschichte vom Minotaurus"
 lepsius_crete_expedition_decision_desc: "Der legendäre König Minos soll einst über Kreta geherrscht haben. Ähnlich wie in Troja und Mykene scheint auch an dieser Geschichte etwas dran zu sein: Auf der Insel werden zunehmend Artefakte aus der sagenumwobenen minoischen Kultur gefunden. Auch unsere Nation sollte sich einige davon sichern."
 lepsius_yucatan_expedition_decision: "Verlorene Städte der Maya"
 lepsius_yucatan_expedition_decision_desc: "Berichte über unbekannte und riesige Städte mitten im Dschungel häuften sich. Wir sollten weitere Nachforschungen anstellen und eine archäologische Expedition nach Yucatán schicken."
 lepsius_peru_expedition_decision: "Das verborgene Erbe der Inkas"
 lepsius_peru_expedition_decision_desc: "Piloten berichten von seltsamen Festungen und ummauerten Bauwerken in den Anden, die sie auf ihren Flügen über Peru gesehen haben. Vielleicht haben die Spanier die Kultur der Inkas nicht vollständig zerstört? Einige Städte mit indigenem Widerstand wurden bis heute nicht gefunden."
 lepsius_found_archaeological_museum_decision: "Ein Archäologisches Museum gefunden"
 lepsius_found_archaeological_museum_decision_desc: "Jede Nation mit etwas Selbstachtung verfügt in ihrer Hauptstadt über ein einzigartiges Museum, in dem alle Kulturgüter ausgestellt sind, die sie durch waghalsige Abenteuer oder wissenschaftliche Expeditionen von höchster Qualität erworben hat. Die Anzahl der Artefakte und die Anzahl der verschiedenen Sammlungen steigern nicht nur das Ansehen in der Welt, sondern haben auch einen pädagogischen Wert."
 lepsius_visit_archaeological_museum_decision: "Besuchen Sie das Archäologische Museum"
 lepsius_visit_archaeological_museum_decision_desc: "Sehen Sie sich die Statistiken zu Ihren erworbenen Artefakten an und ordnen Sie sie in prestigeträchtigen Ausstellungen neu."
 lepsius_appoint_lead_scientist_decision: "Ernennen Sie einen leitenden Wissenschaftler"
 lepsius_appoint_lead_scientist_decision_desc: "Ernennt einen neuen leitenden Wissenschaftler für das Archäologische Museum. Der Charakter wird diese Position etwa 15 bis 20 Jahre lang innehaben. Die Benennung wird ihn davor bewahren, in dieser Zeit von der politischen Bühne zu verschwinden."
 lepsius_found_archaeological_society_decision: "Gründung einer Archäologischen Gesellschaft"
 lepsius_found_archaeological_society_decision_desc: "Nicht nur das Interesse an der Archäologie nimmt in unserem Land stetig zu. Nach vielen Jahren der Expeditionen, Ausgrabungen und Artefaktentdeckungen hat unser Land eine erstaunliche archäologische Expertise aufgebaut. Ein herausragender Archäologe könnte eine Archäologische Gesellschaft gründen, um die wissenschaftlichen und intellektuellen Kräfte zu bündeln und neue Impulse zu geben. Dies würde nicht nur unsere wissenschaftliche Leistung verbessern, sondern auch die Erfahrung nachfolgender Generationen von Archäologen verbessern."
 lepsius_inspect_excavation_decision: "Organisieren Sie eine eingehende archäologische Inspektion"
 lepsius_inspect_excavation_decision_desc: "Wir können einen erfahrenen Archäologen in ein Gebiet schicken, in dem wir graben, um unsere Bemühungen dort zu intensivieren. Unser Archäologe wird in etwa einem Jahr eine neue Ausgrabungsstätte erschließen und intensive Recherchen durchführen, bei denen wir weitere Hinweise auf bisher unbekannte, große archäologische Funde finden können. Der Erfolg hängt maßgeblich von der Erfahrung unseres Archäologen ab. Auch die Gründung einer Archäologischen Gesellschaft erhöht unsere Chancen."
 lepsius.2.t: "Brief an M. le Professeur Rosellini"
 lepsius.2.d: "Der deutsche Philologe [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] stellte seine verbesserte Form der Hieroglyphenübersetzung in einem Brief an den italienischen Ägyptologen Ippolito Rosellini vor. Es werden Stimmen laut, eine Expedition nach Ägypten zu unternehmen."
 lepsius.2.f: "Nach dem Tod von François Champollion kam die Hieroglyphenforschung zum Erliegen. Im Jahr 1837 schrieb der junge deutsche Philologe [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] einen Brief an Ippolito Rosellini, einen engen Weggefährten Champollions und Mitverantwortlicher für die französisch-toskanische Ägyptenexpedition von 1829. Lepsius systematisierte und präsentierte das von Champollion gesammelte Wissen und war maßgeblich an der Weiterentwicklung der Ägyptologie beteiligt eine ernsthafte Wissenschaft. Andererseits überzeugte er die politischen Eliten Europas von künftigen Expeditionen nach Ägypten."
 lepsius.2.a: "Wir werden die Wunder Ägyptens erkunden!"
 lepsius.3.t: "Stephens und Catherwood"
 lepsius.3.d: "Der amerikanische Entdecker John Lloyd Stephens und der britische Künstler Frederick Catherwood sind von einer abenteuerlichen Reise auf der Halbinsel Yucatán zurückgekehrt – und erzählen von sagenumwobenen Ruinen im Dschungel. Wissenschaftler haben Interesse bekundet, die Maya-Kultur genauer zu erforschen."
 lepsius.3.f: "War die Neue Welt nur die Heimat von Wilden und Barbaren, bevor die Europäer den Kontinent erreichten? Die Entdecker John Lloyd Stephens und Frederick Catherwood erschütterten dieses Weltbild zutiefst. Mehrere Jahre lang durchstreiften der Amerikaner und der Brite den Dschungel der Halbinsel Yucatan und besuchten nach eigenen Angaben 44 verschiedene Orte einer längst vergangenen mesoamerikanischen Kultur. Die Einheimischen erzählen schon seit langem Geschichten von längst vergessenen Städten im Dschungel und im Dschungel versteckten Tempeln; Aber Stephens‘ Berichte und insbesondere Catherwoods atemberaubende Lithographien eröffnen eine bisher völlig unbekannte Welt. Die Bilder von Tempeln, Statuen und Stelen beflügeln nicht nur die Fantasien von Romantikern. In den USA und Europa breitet sich eine Welle des Interesses an der unbekannten Zivilisation aus, das von Neugier über Verherrlichung bis hin zu echtem wissenschaftlichem Interesse reicht."
 lepsius.3.a: "Wir sollten uns mit feinen Lederjacken eindecken."
 lepsius.4.t: "Entschlüsselung der akkadischen Sprache"
 lepsius.4.d: "Alle Zeitungen des Landes berichten über einen Durchbruch renommierter Forscher unter der Leitung eines erfahrenen Archäologen: Die alten Sprachen Mesopotamiens sind kein Geheimnis mehr. Einer ernsthaften Erkundung Babyloniens und Assyriens steht nichts im Wege."
 lepsius.4.f: "Bereits unter dem deutschen Mathematiker Carsten Niebuhr hatten die Keilschrifttafeln im 18. Jahrhundert das Interesse der Gelehrten geweckt und es wurden Anstrengungen unternommen, sie zu entschlüsseln und die Sprachen zu übersetzen. Georg Friedrich Grotefend, Anquetil-Duperron und Antoine Isaac Silvestre de Sacy spielten eine entscheidende Rolle bei der Entschlüsselung altpersischer Keilschriften; Ihre Studien wurden durch die Entschlüsselung der Hieroglyphen und der viersprachigen \"Kalyusvase\" bestätigt. Nach der Entdeckung der monumentalen Inschrift von Behistun, die neben dem mittlerweile bekannten Persisch auch ältere Sprachen Mesopotamiens enthielt, war es nur eine Frage der Zeit, bis Elamitisch, Babylonisch und Akkadisch nach Jahrhunderten wieder verständlich sein würden. Nachdem wir verschiedene Assyriologen eingeladen hatten, die behaupten, diese alten Sprachen zu verstehen, testete eine unserer Akademien sie: Unabhängig davon sollten sie dieselbe Inschrift übersetzen. Erstaunlicherweise stimmten die Übersetzungen aller Gelehrten überein. Nun kann eine ernsthafte Erforschung der ältesten Kulturen der Menschheit in Mesopotamien beginnen."
 lepsius.4.a: "Wir sind die Erben von Champollion."
 lepsius.5.t: "Schliemann entdeckt Troja!"
 lepsius.5.d: "Der deutsche Geschäftsmann Heinrich Schliemann entdeckte das lange als Märchen abgetane Troja. Archäologen auf der ganzen Welt haben eine neue Leidenschaft für das antike Griechenland – wenn auch eine, die in der mythischen Antike liegt."
 lepsius.5.f: "Wo endet die Wissenschaft, wo beginnt der Mythos? Die Gegenwart hat alles getan, um Religion und Wissen zu trennen. Wir haben Legenden und Sagen, die vor Jahrzehnten für die Realität geglaubt hatten, in den Bereich der Märchen verbannt. Doch dann schallt es in die Welt hinaus, erst in die Zeitungen, dann in die Akademien: Troja ist entdeckt! Die sagenumwobene Stadt des Priamos, von der Homer in seiner Ilias besang, die Geschichte, die jeder gebildete Bürger des Abendlandes kennt – sie ist mehr als nur ein Mythos. Der deutsche Kaufmann Heinrich Schliemann ließ sich von der Ernüchterung der Welt nicht beeindrucken und behauptet sogar, er habe einen wertvollen Schatz gefunden: den Schatz des Priamos. Die archäologische Welt war von diesem Ereignis schockiert und fasziniert – sind andere Geschichten aus der fernen Vergangenheit vielleicht doch wahr? Liegen noch weitere versunkene Städte an den Küsten der Ägäis, die wiederentdeckt werden müssen?"
 lepsius.5.a: "Menin aeide, thea, Pelejadeo Achileos ..."
 lepsius.6.t: "Machu Picchu"
 lepsius.6.d: "Eine archäologische Expedition hat tief in den Anden die verlorene Inkastadt Machu Picchu entdeckt. Forscher fordern eine intensivere Erforschung der Region."
 lepsius.6.f: "Es gibt bestimmte Erzählungen, die unsere Gegenwart dominieren. Alles ist erobert, alles entdeckt und alles gesagt. Es gibt kein Stück Land, das nicht bereits eine Kolonialflagge trägt, kein Dorf, das nicht an die Eisenbahn angeschlossen ist, und keine bahnbrechende Technologie, die wir bereits kennen. Und doch gibt es Momente, in denen der Nihilismus der Elite bricht. Der Wettlauf zu den Polen, die Eroberung des Himmels und die Beschäftigung mit den letzten Geheimnissen der Menschheit zeigen, dass die Geschichte noch nicht vorbei ist. Die Entdeckung der Stadt Machu Picchu ist nur ein Fragment, das zeigt, wie wenig wir über die Welt wissen, die wir zu verstehen und zu kontrollieren glauben. Vielleicht ist etwas dran an den Geschichten über unbekannte Inkastädte, die als irreführend für die Spanier interpretiert wurden. Vilcabamba, die letzte Hauptstadt der freien Inkas, wurde bis heute nicht gefunden..."
 lepsius.6.a: "Zeit, mir meinen Fedora zu schnappen!"
 lepsius.10.t: "Museumseinweihung"
 lepsius.10.d: "Das Archäologische Museum wurde heute in einer feierlichen Zeremonie eröffnet."
 lepsius.10.f: ""
 lepsius.10.g: "Ich kann es kaum erwarten, das Museum zu besuchen!"
 lepsius.10.h: "Champagner! Champagner!"
 lepsius.11.t: "Besuch im Museum"
 lepsius.11.d: "Willkommen im Archäologischen Museum."
 lepsius.11.f: "Unsere Museumssammlung umfasst derzeit #T insgesamt #G [ROOT.Var('lepsius_total_artifacts').GetValue]#! Artefakte.#! \n\nDie Artefakte sind in die folgenden Sammlungen unterteilt: \n\n#T Ägyptische Sammlung:#! \n#G [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor! kleinere Artefakte und #G [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major! bedeutende Artefakte. \n\n#T Mesopotamische Sammlung:#!\n#G [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor! kleinere Artefakte und #G [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major! bedeutende Artefakte. \n\n#T Ägäische Sammlung:#!\n#G [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! kleinere Artefakte und #G [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! bedeutende Artefakte. \n\n#T Präkolumbianische Sammlung:#!\n#G [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! kleinere Artefakte und #G [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! bedeutende Artefakte.\n\n#T Archäologische Teams:#!\nWir haben #G [ROOT.Var('lepsius_excavation_teams').GetValue]#! verfügbare Teams von insgesamt #G [ROOT.Var('lepsius_total_excavation_teams').GetValue]#!."
 lepsius.11.g: "Das war ziemlich lehrreich. Bis zum nächsten Mal!"
 lepsius.11.h: "Besuchen Sie die Ägyptische Sammlung"
 lepsius.11.i: "Besuchen Sie die Mesopotamische Sammlung"
 lepsius.11.j: "Besuchen Sie die Ägäis-Sammlung"
 lepsius.11.k: "Besuchen Sie die präkolumbianische Sammlung"
 lepsius.11.l: "Besuchen Sie den leitenden Wissenschaftler"
 lepsius.11.m: "Besuchen Sie die bedeutenden Artefakte"
 lepsius.11.n: "Besuchen Sie die Weltkulturen-Sammlung"
 lepsius.11.o: "Zeig mir die Länder mit den meisten Artefakten!"
 lepsius.12.t: "Ägyptische Sammlung"
 lepsius.12.d: "Dieser Abschnitt umfasst Artefakte aus Ober- und Unterägypten."
 lepsius.12.g: "Veranstalten Sie eine kleine Ausstellung."
 lepsius.12.h: "Organisieren Sie eine mittelgroße Ausstellung."
 lepsius.12.i: "Organisieren Sie eine große Ausstellung."
 lepsius.12.j: "Organisieren Sie eine hervorragende Ausstellung."
 lepsius.12.k: "Zurück zur Haupthalle."
 lepsius.12.l: "Verlassen Sie das Museum."
 lepsius.13.t: "Mesopotamische Sammlung"
 lepsius.13.d: "Dieser Abschnitt umfasst Artefakte aus Babylonien und Assyrien."
 lepsius.14.t: "Ägäische Sammlung"
 lepsius.14.d: "Dieser Abschnitt enthält Artefakte aus Argolis und Kreta."
 lepsius.15.t: "Präkolumbianische Sammlung"
 lepsius.15.d: "Dieser Abschnitt umfasst Artefakte aus Yucatán und Peru."
 lepsius.16.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]"
 lepsius.16.d: "Dies ist das Büro des führenden Archäologen unseres Landes, Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.16.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] hat insgesamt eine archäologische Erfahrung von #G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!\n\n Gesamtzahl der von unserer Nation finanzierten Expeditionen: #G [ROOT.Var('lepsius_total_expeditions').GetValue]#!\n\n Gesamtzahl der großen Entdeckungen, die unsere Nation gemacht hat: #G [ROOT.Var('lepsius_total_discoveries').GetValue]#!"
 lepsius.16.g: "Veranstalten Sie einen großen archäologischen Kongress"
 lepsius.17.t: "Bedeutende Artefakte"
 lepsius.17.d: "Dies ist eine Übersicht aller bedeutenden Artefakte im Museum."
 lepsius.17.egypt: "\n#T Ägypten:#!\n"
 lepsius.17.sarcophagus: "Wir haben den #E Sarkophag des unbekannten Pharaos#! in einem verlorenen Grab im Tal der Könige gefunden.\n"
 lepsius.17.nefertiti: "Die #E Büste der Nofretete#! war der Lohn sorgfältiger Ausgrabungen und diplomatischer Auseinandersetzungen.\n"
 lepsius.17.tut: "#E Tutanchamuns Totenmaske#! ist das Juwel in der Krone des legendären Grabes im Tal der Könige.\n"
 lepsius.17.narmer: "Die #E Palette von Narmer#! ist einer der ältesten schriftlichen Funde der Menschheit und wird von manchen als Gründungsdokument Ägyptens angesehen.\n"
 lepsius.17.mesopotamia: "\n#T Mesopotamien:#!\n"
 lepsius.17.lamassu: "Wir haben #E König Sargons Lamassu#! auf abenteuerliche Weise aus Assyrien erhalten.\n"
 lepsius.17.meskalamdug: "Wir haben den #E Helm von Meskalamdug#! nach einer intensiven Ausgrabung in Babylonien gefunden.\n"
 lepsius.17.sargon: "Wir haben die #E Maske von Sargon#! bei einer gründlichen Ausgrabung der alten assyrischen Hauptstadt Ninive gefunden.\n"
 lepsius.17.gilgamesh: "Nach ständiger Suche nach neuen Teilen und modernster Forschung ist es uns gelungen, Teile des #E Gilgamesch-Epos#! zu rekonstruieren.\n"
 lepsius.17.greece: "\n#T Griechenland:#!\n"
 lepsius.17.agamemnon: "Die #E Maske von Agamamenon#! war der Hauptfund unserer großen Entdeckung in Mykene.\n"
 lepsius.17.priam: "Wir haben #E den Schatz des Priamos#! als Geschenk von Heinrich Schliemann erhalten.\n"
 lepsius.17.snake: "Auf etwas unorthodoxe Weise konnten wir die sogenannte #E Schlangengöttin#! von Kreta, eines der wichtigsten Artefakte der minoischen Kultur, in unser Museum holen.\n"
 lepsius.17.diskos: "Nach hartnäckiger Ausgrabungsarbeit haben wir den #E Diskos von Phaistos#! ausgegraben.\n "
 lepsius.17.southamerica: "\n#T Südamerika:#!\n"
 lepsius.17.kukulkan: "Der #E Edelstein von Kukulkan#! wurde von einem unserer Archäologen auf einer fantastischen und gefährlichen Reise gefunden.\n"
 lepsius.17.pakal: "Unsere Archäologen haben nach jahrelangen Ausgrabungen in Palenque den #E Grabschatz von Pakal#! sichergestellt.\n"
 lepsius.17.other: "\n#T Sonstiges:#!\n"
 lepsius.17.abraham: "Der #E Stab Abrahams#! wurde von einem unserer Archäologen auf einer spirituellen Reise gefunden.\n"
 lepsius.17.arne: "In einem fantastischen Abenteuer fanden unsere mutigen Archäologen das #E Manuskript von Arne Saknussemm#! als Beweis dafür, dass er im 16. Jahrhundert zum Mittelpunkt der Erde reiste.\n"
 lepsius.17.skull: "Wir haben einen höchst mysteriösen #E Kristallschädel#! von einem vertrauenswürdigen Antiquitätenhändler erworben.\n"
 lepsius.17.hoa: "Die mysteriöse Statue von #E Moai Hoa Hakananai'a#! wurde von einem Abenteurer auf der Osterinsel gefunden.\n"
 lepsius.17.summer: "Während des Brandes der chinesischen Kaiserresidenz haben wir eine beträchtliche Menge wertvoller #E Beute aus dem Sommerpalast#!. erbeutet"
 lepsius.18.t: "Sammlung Weltkulturen"
 lepsius.18.d: "Dieser Abschnitt umfasst Artefakte aus verschiedenen Kulturen der Welt."
 lepsius.18.f: "Bei dieser Sammlung handelt es sich um eine anthropologische sowie archäologische Sammlung verschiedener Kulturen, von denen einige noch existieren. #G 10#! Artefakte reichen aus, um eine Ausstellung zu beherbergen. Größere Sammlungen gibt es nicht, die Einzelsammlungen sind jedoch wertvoller. Derzeit besteht diese Sammlung aus den folgenden Abschnitten:\n\n#G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]#! @lepsius_oceanian_minor! kleinere Artefakte aus Ozeanien\n#G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]#! @lepsius_oceanian_major! bedeutende Artefakte aus Ozeanien\n\n#G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]#! @lepsius_east_asian_minor! kleinere Artefakte aus Fernost\n#G [ROOT.Var('lepsius_fareastern_artifact_major').GetValue]#! @lepsius_east_asian_major! bedeutende Artefakte aus Fernost\n"
 lepsius.18.g: "Veranstalten Sie eine fernöstliche Ausstellung."
 lepsius.18.h: "Organisieren Sie eine Ozeanausstellung."
 lepsius.22.d: "Die versammelte Elite unserer Hauptstadt ist auf den Beinen: Das Archäologische Museum wartet mit einer neuen Ausstellung auf."
 lepsius.22.f: "Menschen aus der Ober- und Mittelschicht drängen sich am Morgen vor dem Eingang des Museums. Die neue Ausstellung beginnt mit einem Vortrag eines führenden Archäologen, der aus erster Hand über die jüngste Expedition und die Ausgrabungen an diesem Ort berichtet. Anschließend können Kunstliebhaber und Schaulustige die Exponate selbst in Augenschein nehmen. Die Presse ist vor Ort und bereitet ihre Artikel vor. Ein großer Tag für [ROOT.GetCountry.GetAltNameNoFlag('AKK')], national und international; die Großmächte blicken mit Neid auf unsere prestigeträchtige Sammlung."
 lepsius.22.g: "Ich hoffe, ich bekomme noch ein Ticket."
 lepsius.24.t: "Neue Ägäis-Ausstellung"
 lepsius.25.t: "Neue präkolumbianische Ausstellung"
 lepsius.26.t: "Archäologischer Kongress endet"
 lepsius.26.d: "Der von unserer Archäologischen Gesellschaft organisierte Kongress neigt sich heute dem Ende zu. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] hat dabei sein Wissen erweitert."
 lepsius.26.f: "Mehrere Wochen mit Sitzungen, Lesungen, Konferenzen und gemütlichem Beisammensein gehen zu Ende. Der Gesellschaft nahestehende nationale und internationale Archäologen tauschten sich über Entdeckungen, Expeditionen und Theorien aus. Die Veranstaltung war ein voller Erfolg - und hat die Horizonte aller Beteiligten erweitert."
 lepsius.26.g: "Immer diese Diskussionen darüber, wer die schönsten Lederjacken hat..."
 lepsius.27.t: "Neue Ausstellung über die Kulturen der Welt"
 lepsius.30.t: "Neuer leitender Wissenschaftler"
 lepsius.30.d: "Das Archäologische Museum hat einen neuen leitenden Wissenschaftler ernannt. Es ist [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]."
 lepsius.30.f: ""
 lepsius.30.g: "Glückwunsch!"
 lepsius.31.t: "Leitender Wissenschaftler wird Museumsdirektor"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] hatte die Ehre, zum neuen Museumsdirektor ernannt zu werden. Er wird damit aus dem aktiven Dienst ausscheiden."
 lepsius.31.f: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] widmet sein Leben seit Jahren der Wissenschaft und Kultur und ist der Politik längst überdrüssig. Für viele war die Entscheidung, sich ausschließlich auf den Museumsbetrieb zu konzentrieren, keine Überraschung. Er wird weder politisch noch für Expeditionen mehr zur Verfügung stehen. Es gibt Beförderungen, die bedauerlich sind."
 lepsius.31.g: "Lebewohl..."
 lepsius.80.t: "Ein neues Zeitalter der Archäologie!"
 lepsius.80.d_egypt: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] nutzte neue archäologische Methoden, um viele Details eines alten ägyptischen Dorfes aufzudecken. Die Verwendung der Stratigraphie und des Drei-Alter-Systems sowie die Dokumentation [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Funde markiert ein neues Zeitalter in der Archäologie."
 lepsius.80.d_mesopotamia: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] nutzte neue archäologische Methoden, um viele Details eines alten mesopotamischen Dorfes aufzudecken. Die Verwendung der Stratigraphie und des Drei-Alter-Systems sowie die Dokumentation [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Funde markiert ein neues Zeitalter in der Archäologie."
 lepsius.80.d_aegean: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] nutzte neue archäologische Methoden, um viele Details eines alten ägäischen Dorfes aufzudecken. Die Verwendung der Stratigraphie und des Drei-Alter-Systems sowie die Dokumentation [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Funde markiert ein neues Zeitalter in der Archäologie."
 lepsius.80.d_precolumbian: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] nutzte neue archäologische Methoden, um viele Details eines alten präkolumbianischen Dorfes aufzudecken. Die Verwendung der Stratigraphie und des Drei-Alter-Systems sowie die Dokumentation [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Funde markiert ein neues Zeitalter in der Archäologie."
 lepsius.80.f: "\"Die Bodenschichten, in denen wir die Artefakte dieses Dorfes gefunden haben, sagen uns viel über das Dorf. Eine Schicht zum Beispiel enthält eine Menge Kohle und markiert das Ende der Funde aus dieser Zeit. Das bedeutet wahrscheinlich, dass ein Feuer das Dorf zerstörte und es aufgegeben wurde. Außerdem gibt es keine Metallgegenstände, was bedeutet, dass es sich um ein steinzeitliches Dorf handeln muss. Die menschlichen Überreste, die wir fanden, waren ebenfalls faszinierend, denn sie waren unterernährt und hatten abgenutzte Zähne.\""
 lepsius.80.g: "So zivilisiert!"
 lepsius.100.t: "Vorbereitung der [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Archäologischen Expedition"
 lepsius.100.d: "Die Vorbereitungen für die archäologische Expedition laufen. Allerdings ist noch unklar, wie lange die Reise finanziert werden soll."
 lepsius.100.f: "Nicht nur die Finanzierung als solche, sondern auch die Dauer der Expedition sollte bald zu einem politischen Thema werden, nachdem [ROOT.GetCountry.GetAltName('NOM')] beschlossen hatte, den Wünschen seiner Akademiker nachzugeben und die mit Spannung erwartete Expedition zu entsenden. Allein die Hin- und Rückfahrt würde kostbare Zeit kosten, während die Geizhalse im Kabinett darauf bestanden, nur ein paar Unterhändler zu schicken, um ein paar Artefakte vom Antiquitätenhändler zu erwerben."
 lepsius.100.g: "Machen Sie keine halben Sachen – das wird eine lange Reise werden."
 lepsius.100.h: "Eine mittellange Reise ist ein guter Kompromiss."
 lepsius.100.i: "Eine kurze Reise genügt."
 lepsius.110.t: "Kontroverse um Führung"
 lepsius.110.d: "Die Intelligenzia sieht sich als Favorit dafür, dass einer ihrer Vertreter die archäologische Expedition anführt. Doch es gibt zahlreiche Gegenstimmen."
 lepsius.110.f: "Die Eliten des Landes sind gespalten. Die staatliche Unterstützung der Expedition hat Kritiker und Neider auf den Plan gerufen. Die Intelligenzia des Landes betrachtet das Unternehmen als ihre Souveränität. Sowohl Opposition als auch Regierungstruppen fordern, dass ihnen ein Posten als Beobachter zugewiesen wird. Es lässt sich nicht leugnen, dass ein Vertreter der IG Intellektuelle für diese Aufgabe am besten geeignet wäre, aber es gibt auch andere Möglichkeiten ..."
 lepsius.110.g: "Die Intelligenzia ist am qualifiziertesten."
 lepsius.110.h: "Ein Regierungsvertreter soll die Expedition begleiten."
 lepsius.110.i: "Hierfür eignet sich ein Oppositionspolitiker."
 lepsius.110.j: "Jemand mit archäologischer Erfahrung sollte die Arbeit machen."
 lepsius.110.k: "Diese Ehre gebührt nur dem Thronfolger."
 lepsius.120.t: "Militärattache"
 lepsius.120.d: "Es wird dringend empfohlen, für die archäologische Expedition einen Militärattaché zu rekrutieren."
 lepsius.120.f: "Das Militär hat drei mögliche Kandidaten als Militärattachés für die Expedition vorgeschlagen. Die Entscheidung wurde heute vom Kriegsministerium mitgeteilt. Die Auswahl muss noch bestätigt werden."
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]."
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]."
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]."
 lepsius.130.t: "Künstler nehmen an der Expedition teil"
 lepsius.130.d: "Eine Gruppe von Künstlern unserer Akademie hat Interesse an der Teilnahme an der bevorstehenden Archäologischen Expedition bekundet."
 lepsius.130.f: "An der Kunstakademie hat sich herumgesprochen, dass bald eine Expedition auf der Suche nach verlorenen Städten und unbekannten Kunstschätzen sein wird. Schon auf Napoleons Ägypten-Expedition ließen sich Zeichner und Maler von der Atmosphäre, den Farben und den Szenen inspirieren. Es gibt genügend Bewerber, die für uns Zeichnungen und Skizzen archäologischer Stätten anfertigen möchten. Es versteht sich von selbst, dass eine solche Ausweitung der Expedition zusätzliche Kosten verursacht, sich aber auf jeden Fall lohnt."
 lepsius.130.a: "Sie sind herzlich eingeladen."
 lepsius.130.b: "Danke, aber nein danke."
 lepsius.140.t: "Archäologe rekrutiert erfahrene Wissenschaftler"
 lepsius.140.f: "Gemeinsame Interessen verbinden uns: Unser Leiter hat Verbindungen zu anderen archäologischen, historischen und anthropologisch versierten Wissenschaftlern. Eine solche Erweiterung der Expeditionsteilnehmer würde sich sicherlich positiv auf das Geschäftsergebnis des Unternehmens auswirken. Allerdings ist das kein freundlicher Dienst: Der Staat muss für Kost, Logis und Gehalt aufkommen. Manche mögen eine solche Versorgung durch die \"Freunde\" des Expeditionsleiters als Vetternwirtschaft bezeichnen, aber er hat uns versichert, dass die Logik hinter der Erweiterung rein wissenschaftlicher Natur ist."
 lepsius.140.a: "Eine Bereicherung für das Team."
 lepsius.140.b: "Wir bezahlen die Cliquen unserer Archäologen nicht!"
 lepsius.150.t: "Naturwissenschaftler schließen sich der Expedition an"
 lepsius.150.d: "Wissenschaftler wollen auf der kommenden Expedition Experimente durchführen."
 lepsius.150.f: "Auch die Universitäten unseres Landes sind von den aktuellen Ereignissen nicht unberührt geblieben. Manche Wissenschaftler würden die Expedition gerne begleiten, um die geografischen Verhältnisse zu studieren, astronomische Berechnungen zu vergleichen oder Wetterexperimente durchzuführen. Andere glauben, dass Gesteins- und Holzproben die wissenschaftlichen Ergebnisse der Expedition verbessern können. Aus vielen der ausgewählten Wissenschaftler geht hervor, dass sie schon seit Ewigkeiten auf die Stunde warten, um zu solchen Anlässen in die lang ersehnten fremden Länder zu reisen: Sie warten nur auf einen Vorwand, um als kostenlose Passagiere mitzukommen. Und sie haben auch teure Wünsche!"
 lepsius.150.a: "Eine großartige Idee!"
 lepsius.150.b: "Wir können nicht jeden zotteligen Bart bedienen ..."
 lepsius.200.t: "Die Expedition erreicht den Ausgangspunkt"
 lepsius.200.d: "Die Expedition hat ihren Ausgangspunkt erreicht. Zeit, vor der Abreise noch ein paar letzte Vorbereitungen zu treffen."
 lepsius.200.f_ex_upe: "\"Luxor, Luxor!\" Der Schrei geht durch die Reihen, während der Tempel von Karnak am Horizont auftaucht. Das Boot droht in den Nil zu kippen, als sich die Expeditionsteilnehmer an der Reling drängen und einen Blick auf die Silhouette der Stadt werfen, die im alten Ägypten als Theben bekannt war. Ruinen jahrtausendealter Bauwerke säumen das Nilufer, zwischen verfallenen Häusern und Zelten erheben sich Obelisken. Am anderen Ufer des Nils erheben sich jedoch die sandbraunen Gebirgsketten, in denen sich das sagenumwobene Tal der Könige verbirgt und wo es angeblich noch unbekannte Pharaonengräber gibt. Aber bevor wir dazu kommen, müssen wir in Luxor noch ein paar Dinge regeln ..."
 lepsius.200.f_ex_loe: "Die \"Mutter der Welt\" liegt über dem Wasser des Nils, das in der Sonne glitzert. Minarette und Kuppeln schmücken das Panorama und erzählen von der Macht und Bedeutung dieser Stadt, die einst und heute das Schicksal des Nahen Ostens mitbestimmte. Bunte Basare und Teppiche prägen die Straßen ebenso wie die feine Verzierung der Architektur der Fatimiden. Doch der Blick geht weiter – weit darüber hinaus, wo die Spitzen der Pyramiden eine längst vergangene Zeit ankündigen, die das eigentliche Ziel unserer Reise ist. Doch vorher müssen wir in Kairo noch ein paar Vorkehrungen treffen."
 lepsius.200.f_ex_bab: "In Bagdad, der größten Stadt Mesopotamiens, herrscht reges Treiben. Wie Kairo ist es ein Zentrum der arabischen Welt; Wie Kairo war es der Sitz von Macht und Prestige. Aber anders als in Kairo, wo die fernen Pyramiden von Gizeh eine noch ältere Welt ankündigen, gibt es in Bagdad kaum etwas, das an die Reiche Babylon und Akkad erinnert. Sogar die angeblichen Antiquitäten, die ein etwas unvorsichtiges Expeditionsmitglied bei einem zwielichtigen Händler gekauft hatte, haben sich als Fälschungen herausgestellt. Während die Steinbauten der Ägypter und Maya noch heute von den untergegangenen Zivilisationen zeugen, gibt es hier kaum etwas Vergleichbares. Wir werden wahrscheinlich bei Null anfangen müssen."
 lepsius.200.f_ex_ass: "Was gibt es sonst noch in Assyrien zu finden, nachdem Layard in Nimrud gegraben hat? Ziemlich viel, so ein Händler in Mossul. Erst vor einem Monat tauchte der Kopf eines Lamassu aus dem Sand auf. Und der Basar biete immer gute Stücke, erzählt er uns. Dass eine ganze Reihe von Stücken nicht geborgen werden konnte, hat auch mit den kurdischen Clans in der Gegend zu tun, die nicht jedem erlauben, in ihren Gebieten zu wildern – unabhängig von der Grabungslizenz. Wir nehmen die Warnung mit – und besorgen uns das Nötigste, bevor wir die Reise antreten."
 lepsius.200.f_ex_arg: "Ah, gutes altes Athen! Nicht alt genug für das, was unser Expeditionsteam sucht, aber gut genug, um zusätzliche Tage in Attika zu verbringen. Griechenland hat nicht viele Großstädte, daher bleibt unserem Expeditionsteam kaum eine andere Wahl, als dort die nötigsten Vorbereitungen zu treffen, bevor es ins Grüne geht. Unser Archäologieführer gibt uns viel Druck, da einige Wissenschaftler viel zu viel Zeit mit Ablenkungen verbringen – sei es klassischer Marmor oder griechischer Wein. Die warme Sonne, der Schatten der Olivenbäume und die akkadische Idylle laden zum Verweilen und Entspannen ein – manche scheinen bereits vergessen zu haben, warum wir eigentlich hier sind."
 lepsius.200.f_ex_cre: "Eine leichte Brise weht von der Ägäis, als unsere Expedition den Hafen von Heraklion erreicht. Alte venezianische Bastionen erinnern an die Zeit, als Candia im Mittelalter ein Handelszentrum war. Nachdem die Ladung unter Möwengeschrei entladen wird und die Teilnehmer an Land gehen, folgt auf den freundlichen Empfang bittere Realität. Während sich einige Teilnehmer über die lokale Küche beschweren und eine bessere Unterbringung fordern, hat der leitende Archäologe wenig Verständnis für solche weniger intellektuellen Wünsche. Denn Heraklion ist für ihn nur eine Zwischenstation – im Inneren der Insel warten die Schätze der Minoer."
 lepsius.200.f_ex_yuc: "In Mérida trifft unser Ausgrabungsteam die letzten Vorbereitungen vor dem großen Aufbruch. Die Spuren der spanischen Eroberung und Kolonialisierung prägen die Stadt, die trotz ihrer überschaubaren Größe zeigt, dass sie einst zusammen mit Campeche der Ort war, von dem aus die Spanier die Kontrolle über die Halbinsel ausübten. Weniger als 100 Meilen entfernt sollen sich einige Maya-Stätten befinden, die der Dschungel in den letzten Jahrhunderten zurückerobert hat. Unseren Expeditionsteilnehmern bleibt es nicht erspart, noch tiefer ins Unterholz zu graben, wenn sie neue Tempel oder gar Städte entdecken wollen..."
 lepsius.200.f_ex_per: "Die Anden ragen wie Könige über die Häupter ihrer Untertanen; Ihre Gipfel blicken majestätisch auf uns herab, als wollten sie unsere Würdigkeit testen, ihre Täler zu betreten. Die Reise nach Cuzco war beschwerlich, aber der technologische Fortschritt führt dazu, dass Expeditionen nicht mehr zu abenteuerlichen Reisen voller Unvorhersehbarkeit werden. In den Straßen der ehemaligen Hauptstadt der Inkas verbindet sich die historische spanische Dominanz mit dem Charme der Andenarchitektur. Dazwischen zeugen fugenlose Zyklopenmauern noch heute von der Architektur der einstigen Herrscher. Die Ruinen der Inka-Festung Sacsayhuamán, nur einen Katzensprung vom Stadtzentrum entfernt, sind ein Vorgeschmack darauf, wonach die Expeditionsteilnehmer auf dieser Reise suchen werden."
 lepsius.200.g: "Ach, Ägypten."
 lepsius.200.h: "Ah, Mesopotamien."
 lepsius.200.i: "Ach, Griechenland."
 lepsius.200.j: "Ah, Mücken und tödliche Krankheiten."
 lepsius.200.k: "Ach, Peru."
 lepsius.210.t: "Die Dolmetscher und der mysteriöse Führer"
 lepsius.210.d: "Unter den Expeditionsteilnehmern herrscht Uneinigkeit darüber, ob wir unser verbleibendes Geld lieber für ein paar qualifizierte Dolmetscher oder einen mysteriösen Führer ausgeben sollen."
 lepsius.210.f: "Dabei geht es nicht um Quantität oder Qualität, auch wenn einige unserer Expeditionsteilnehmer es so ausdrücken. Dolmetscher haben nicht nur den Vorteil, dass sie die Sprache sprechen, sondern auch, dass die Menschen vor Ort ihnen schneller vertrauen. Die Chance, Informationen über Artefakte zu erhalten, ist deutlich höher. Andererseits könnte uns der geheimnisvolle Führer zu besonderen Orten führen, die wir sonst nicht oder nur sehr schwer finden würden – Orte mit besonderen Artefakten und unbekannten Herausforderungen."
 lepsius.210.a: "Wir könnten einige Dolmetscher gebrauchen."
 lepsius.210.b: "Wir brauchen einen Führer, der die Geheimnisse der Gegend kennt."
 lepsius.220.t: "Archäologe kauft Artefakte"
 lepsius.220.d: "Unser Expeditionsleiter hat auf dem lokalen Markt einige wertvolle Artefakte gefunden und erworben."
 lepsius.220.f: "Grabräuber, Schatzsucher und Abenteurer durchstreiften die Ausgrabungsstätten der Welt, lange bevor der erste Archäologe den Boden betrat. Das ist eine bittere Wahrheit. In vielen Fällen gehen Artefakte spurlos verloren, landen in Privatsammlungen oder werden – wenn sie aus Edelmetallen bestehen – sogar eingeschmolzen. Aber selbst die Funde, die geborgen werden können, haben den Nachteil, dass ihre Herkunft möglicherweise nie geklärt wird. Erfahrene Archäologen haben ein Gespür dafür, Artefakte nicht nur auszugraben, sondern sie auch im Handel zu finden und ihre Herkunft zu rekonstruieren."
 lepsius.220.g: "Was für eine schöne Überraschung."
 lepsius.230.t: "Ein Tagebuch schreiben"
 lepsius.230.d: "Inspiriert von der exotischen Umgebung und den täglichen Eindrücken hat unser Expeditionsleiter begonnen, ein Tagebuch zu führen."
 lepsius.230.f: "Jedes Land und jeder Ort hat seine eigenen Farben und Gerüche. Die Mystik des Orients, die Magie Griechenlands und die Legenden der Mayas und Inkas faszinierten die Menschen. Andere ließen sich vom unbekannten Alltag, den unverständlichen Sprachen oder der Fremdartigkeit der Welt inspirieren, in die ein Abenteurer hineingestoßen wurde. Manchmal reichte schon das Schreiben, um die Wirkung der Eindrücke zu verarbeiten – und festzuhalten."
 lepsius.230.g: "Unverbesserlicher romantischer Geist."
 lepsius.240.t: "Eine Abhandlung schreiben"
 lepsius.240.d: "Unser Expeditionsleiter hat beschlossen, eine wissenschaftliche Arbeit über den Verlauf der Expedition zu verfassen."
 lepsius.240.f: "Es mag überraschend erscheinen, aber nicht jeder hat die Zeit, neben seiner eigentlichen Arbeit auch eigene Aufzeichnungen zu führen. Manche Themen finden in offiziellen Berichten keinen Platz, vielleicht weil sie zu weit vom eigentlichen Thema abweichen – oder die These noch nicht ausgereift genug ist. Wie dem auch sei: Unser Expeditionsleiter hat offenbar ein Thema gefunden, das er abseits der offiziellen Berichterstattung bearbeiten und später veröffentlichen möchte."
 lepsius.240.g: "Hoffen wir, dass etwas Nützliches dabei herauskommt."
 lepsius.250.t: "Tavernenkampf"
 lepsius.250.d: "Die schlechten Eigenschaften unseres Expeditionsleiters haben zu einem diplomatischen Zwischenfall geführt."
 lepsius.250.g: "Peinlich ..."
 lepsius.260.t: "Anerkennung"
 lepsius.260.d: "Die guten Qualitäten unseres Expeditionsleiters haben zu einer breiten Anerkennung unseres archäologischen Unternehmens geführt."
 lepsius.260.g: "Wunderbar"
 lepsius.270.t: "Eis und Limonade"
 lepsius.270.g: "Man muss mit Stil reisen."
 lepsius.280.t: "Eine Audienz"
 lepsius.280.f: "Der örtliche Gouverneur hatte von der Expedition erfahren und den Leiter der archäologischen Mission zu sich gerufen. Er interessierte sich für die Tore und war äußerst neugierig auf den Gast. Im anschließenden Gespräch gelang es unserem Leiter nicht nur, den Gastgeber gut zu unterhalten, sondern beeindruckte ihn auch so sehr mit seinen Fähigkeiten, dass der Gouverneur seine Hilfe anbot. Wie sich herausstellte, besaß er ein wertvolles Artefakt, das er unserer Expedition als freundliche Geste schenkte."
 lepsius.280.g: "Ein wunderbares Geschenk!"
 lepsius.290.t: "Attaché heuert Wachen an"
 lepsius.290.d: "Der Militärattaché unserer archäologischen Expedition hat einige Söldner angeheuert, um die Sicherheit unserer Reise zu gewährleisten."
 lepsius.290.f: "Anscheinend hatte das Kriegsministerium bei der Auswahl unseres Militärattachés eine glückliche Hand. Seine Fähigkeiten haben ihm die Zustimmung eines örtlichen Militäroffiziers eingebracht und er hat mit ihm darüber gesprochen, eine Gruppe Wachen zum Schutz unserer Expedition zu entsenden. Im Gegenzug stattete er einem Truppenkontingent des Gastlandes einen Besuch ab und teilte sein Fachwissen."
 lepsius.290.g: "Das Militär hat den richtigen Mann ausgewählt."
 lepsius.300.t: "Die archäologische Expedition beginnt!"
 lepsius.300.d: "Die Sachen sind gepackt, die letzten Helfer sind rekrutiert, der Expeditionsplan steht – die Reise kann beginnen."
 lepsius.300.f: ""
 lepsius.300.g: "Auf geht's!"
 lepsius.310.t: "Die archäologische Expedition endet"
 lepsius.310.d: "Die archäologische Expedition ist beendet. Zeit, den Ertrag zu zählen!"
 lepsius.310.f: "Es war eine beschwerliche Reise mit vielen Strapazen und Hindernissen, aber unser Land hat im Laufe der Expedition nicht nur sein Wissen über die Vergangenheit erweitert, sondern auch wertvolle Artefakte für das Museum erworben. Einige Helfer haben sich bereits verabschiedet, einige Grabungsmitarbeiter sehnen sich nach Hause. Währenddessen zählt der Expeditionsleiter die erworbenen, kleineren Stücke, die den Erfolg der Expedition ausmachen. Die trockene Katalogisierung folgt dem romantischen Abenteuer."
 lepsius.310.g: "Ein Hoch auf die Wissenschaft! Bringt jetzt unsere Jungs zurück."
 lepsius.310.h: "Dies ist erst der Anfang – eine langfristige archäologische Ausgrabung durchführen."
 lepsius.311.t: "Archäologe veröffentlicht Tagebuch"
 lepsius.311.f: ""
 lepsius.311.g: "Eine Inspiration für uns alle."
 lepsius.312.t: "Archäologe veröffentlicht wissenschaftliche Arbeit"
 lepsius.312.f: ""
 lepsius.312.g: "Wir sollten ein Exemplar für die Nationalbibliothek besorgen."
 lepsius.313.t: "Expeditionsleiter kehrt nach Hause zurück"
 lepsius.313.d: "[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetFullName] ist von einer archäologischen Expedition zurückgekehrt. Die Erlebnisse auf der Reise haben einen tiefen Eindruck hinterlassen. Dennoch steht nun die mühsame Auswertung der gefundenen Artefakte an - auch der weniger bedeutsamen Stücke, wie Scherben, Stofffetzen und Holzstücke."
 lepsius.313.f: "Die eigentliche archäologische Arbeit, das trockene Katalogisieren aller Objekte, ihre Klassifizierung und die Schlussfolgerungen über die Vergangenheit in muffigen Universitätsmauern, ist weniger reizvoll und abenteuerlich, als es das Leben des Archäologen vermuten lässt. #V Es wird normalerweise drei Jahre dauern.#! Sollte die Nation ihren Archäologen dennoch brauchen - vielleicht für eine lokale Ausgrabung - wäre es vielleicht besser, den Wissenschaftler sofort von [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetHerHis]en Aufgaben zu entbinden. Doktor [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] könnte sogar dankbar dafür sein."
 lepsius.313.g: "Lassen Sie uns katalogisieren!"
 lepsius.401.t_bedouin: "Beduinenüberfall"
 lepsius.401.t_kurdish: "Kurdischer Überfall"
 lepsius.401.d: "Unsere archäologische Expedition wurde von einheimischen Stämmen angegriffen."
 lepsius.401.f_bedouin: "Nicht alle Gebiete in der Wüste stehen unter der vollständigen Kontrolle der Regierung. Einige Beduinenstämme wehren sich erfolgreich gegen die Modernisierung des Staates und den sozialen Wandel. Die Clans leben noch immer wie ihre Vorfahren vor Jahrhunderten. Überfälle auf Wohnwagen und unvorsichtige Reisende gehören zum Alltag. Ein Beduinenangriff beeinträchtigte auch unsere Expedition: Wertgegenstände und archäologische Ausrüstung wurden gestohlen und Kamele entführt. Der Expeditionsleiter bittet uns, mit der Regierung zu sprechen, damit sich solche Vorfälle, die die Expedition gefährden, nicht wiederholen. Natürlich wird dies als Einmischung in innere Angelegenheiten gewertet..."
 lepsius.401.f_kurdish: "Das Zagros-Gebirge, das im Norden und Osten an Mesopotamien grenzt, war historisch gesehen die Heimat kurdischer Stämme, die nur lose unter der Kontrolle der lokalen Regierung standen. Viele von ihnen handeln auf eigene Faust und erkennen nur ihren Stamm als Autorität an. Immer wieder nehmen sie an Raubzügen teil. Diesmal war auch unsere Expedition von einem kurdischen Angriff betroffen: Wertgegenstände und archäologische Ausrüstung wurden gestohlen und Kamele entführt. Der Expeditionsleiter bittet uns, mit der Regierung zu sprechen, damit sich solche Vorfälle, die die Expedition gefährden, nicht wiederholen. Natürlich wird dies als Einmischung in innere Angelegenheiten gewertet..."
 lepsius.401.g: "Reichen Sie eine formelle Beschwerde bei der Regierung ein."
 lepsius.401.h: "Wir arrangieren uns."
 lepsius.401.i: "Bestrafe sie!"
 lepsius.401.j: "Wachen!"
 lepsius.402.t_desert: "Wüstensturm"
 lepsius.402.t_tropical: "Tropensturm"
 lepsius.402.d: "Unsere archäologische Expedition steht vor einem verheerenden Sturm!"
 lepsius.402.f_desert: "Zunächst war es nur eine leichte Brise, die unserem Expeditionsteam Sand in die Augen wehte. Doch dann wurde der Wind so stark, dass er Menschen und Lasttiere überwältigte. Auch nach Stunden verlor der Wüstensturm nichts von seiner Heftigkeit. Als unsere Archäologen einen Einheimischen nach dem Phänomen fragten, sagte er, dass diese Art von Stürmen für diese Jahreszeit normal sei. Diese Wüstenstürme könnten unsere gesamte Expedition gefährden!"
 lepsius.402.f_tropical: "Dem plötzlichen Regen, der eines Nachmittags über unsere Expeditionsteams hinwegfegte, gingen weder Donner noch Blitz voraus. Zuerst suchten sie Schutz, doch im Laufe einiger Stunden wurde ihnen klar, dass dieser Tropensturm sich stark von den üblichen Niederschlägen in dieser Region unterschied. Einer unserer Träger vermutete sogar, dass es sich um einen ausgewachsenen Hurrikan handeln könnte!"
 lepsius.402.g: "Diese milde Brise wird uns nicht aufhalten."
 lepsius.402.h: "Die Situation ist zu gefährlich, die Expedition muss warten."
 lepsius.403.t: "Nebel in den Anden"
 lepsius.403.d: "Nachdem der Militärattaché unsere Expedition erneut in eine gefährliche Situation gebracht hat, fordern die anderen Teilnehmer Konsequenzen."
 lepsius.403.f: "Die Besatzung unserer Expedition in den Anden schimpft über den Militärattaché. Bei mehreren Gelegenheiten hat er die Gruppe auf der Suche nach einer alten Inka-Ausgrabungsstätte in die falsche Richtung geführt. Kürzlich kam es sogar vor, dass er in seinem Ehrgeiz, möglichst schnell ans Ziel zu kommen, nicht mit dem Nebel in den Bergen rechnete. Dadurch verlor die Expedition wichtige Zeit. Einige Männer drängen darauf, einen neuen Anführer zu ernennen."
 lepsius.403.g: "Er sollte von seinen Pflichten entbunden werden."
 lepsius.403.h: "Er hat gute Arbeit geleistet."
 lepsius.404.t_aegean: "Kaputte Brücke"
 lepsius.404.t_peru: "Kaputte Hängebrücke"
 lepsius.404.d: "Eine zerstörte Brücke verhindert das Fortschreiten unserer Expedition."
 lepsius.404.f_aegean: "Griechenland und Kreta sind für ihre rauen Landschaften bekannt. Als unsere Expedition eine Schlucht erreicht, stellt sich heraus, dass ein Brückenpfeiler kürzlich bei einem Erdrutsch weggeschwemmt wurde. Wir stehen vor der Entscheidung, ob wir die Brücke reparieren und unser ursprüngliches Ziel anstreben oder an einen anderen Ort gehen. Die letztere Option ist schneller und kostengünstiger, aber wahrscheinlich von weniger archäologischem Erfolg gekrönt."
 lepsius.404.f_peru: "Nach einem beschwerlichen Aufstieg über Andenpässe und enge Bergstraßen steht unsere archäologische Expedition vor einem unerwarteten Problem. Eine Hängebrücke, von der Einheimische sagen, dass sie zu einem sagenumwobenen Tempel führt, wurde vollständig zerstört. Einige Expeditionsteilnehmer raten dazu, die Suche abzubrechen und sich zu einer einfacheren archäologischen Ausgrabungsstätte zu begeben – die Einheimischen meinen jedoch, dass sich die Mühe lohnen würde. Wenn wir die Brücke jedoch wieder aufbauen wollen, würde uns das Zeit und Geld kosten."
 lepsius.404.g: "Baue die Brücke wieder auf."
 lepsius.404.h: "Finde einen anderen Weg."
 lepsius.405.t_mesopotamia: "Schlechte Straßen in Mesopotamien"
 lepsius.405.t_yucatan: "Schlechte Straßen in Yucatán"
 lepsius.405.d: "Der schlechte Zustand der Straßen stellt unsere Expedition vor ungeahnte Herausforderungen."
 lepsius.405.f_mesopotamia: "Leider haben nicht alle Straßen die Qualität, die man eigentlich erwarten sollte. Insbesondere die Nebenstraßen und Wege abseits der Haupthandelsrouten sind in einem auffallend schlechten Zustand. Doch die möglichen Ziele unserer Reise liegen weit entfernt von den Zentren der Zivilisation. Die Reise ist beschwerlich und einige Expeditionsteilnehmer beschweren sich bereits darüber, dass wir eine andere Route hätten nehmen sollen."
 lepsius.405.f_yucatan: "Der Dschungel von Yucatán ist selbst in der heutigen Zeit noch unentwickelt. Dies macht sie zu lohnenswerten archäologischen Zielen, da viele Ruinen seit Jahrhunderten nicht näher von Menschen untersucht wurden. Andererseits ist die Reise voller Strapazen. Außer ein paar ausgetretenen Waldwegen gibt es fast keine Straßen. Expeditionsteilnehmer beschweren sich bereits über die Entscheidung, diese Route einzuschlagen."
 lepsius.405.g: "Versuchen Sie es mit einem anderen Weg."
 lepsius.405.h: "Investieren Sie in neue Männer und Lasttiere, um die Reise angenehmer zu gestalten."
 lepsius.405.i: "Wir bleiben auf diesem Weg."
 lepsius.406.t: "Expeditionsschiffbruch!"
 lepsius.406.d: "Unser Militärattaché ist für ein äußerst unglückliches Ereignis verantwortlich."
 lepsius.406.f: "Eines unserer Expeditionsschiffe erlitt in der Ägäis Schiffbruch. Zum Glück wurde niemand verletzt, aber ein Großteil unserer archäologischen Ausrüstung ging vor der Küste unter. Die Mehrheit unseres Expeditionsteams gibt unserem Kapitän die Schuld, dass er eine Untiefe übersehen hat. Er verteidigte sich jedoch damit, dass er die Reise schnell beenden wolle und das Riff auf keiner Karte verzeichnet sei. Unter den Männern besteht ein wachsender Konsens darüber, dass unsere Erfolgsaussichten mit der derzeitigen Führungskraft sinken."
 lepsius.406.g: "Er ist verantwortlich."
 lepsius.406.h: "Kaufen Sie neue Ausrüstung und tun wir so, als wäre nichts passiert."
 lepsius.407.t: "Die Oase"
 lepsius.407.d: "Auf ihrer Reise entdeckten unsere Archäologen eine bisher unbekannte Oase und erneuerten ihre Wasservorräte."
 lepsius.407.f: "Eigentlich hatten die Expeditionsteilnehmer damit gerechnet, einige Tage der Strapazen zu ertragen: Eine altägyptische Ruine, die sie erkunden wollten, sollte zwei bis drei Tagesmärsche entfernt irgendwo in der Wüste liegen. Zu ihrer großen Überraschung stellten sie jedoch fest, dass sich unterwegs eine Oase befand: Palmen mit dicken Datteln und Feigenbäume mit süßen Früchten erwarteten sie. Die Wasservorräte wurden wieder aufgefüllt und einige Teilnehmer nutzten die Gelegenheit, in der ägyptischen Sonne zu baden."
 lepsius.407.g: "Erfrischende Neuigkeiten."
 lepsius.408.t: "Nazar-Amulett"
 lepsius.408.d: "Einige der angeheuerten Träger glauben, dass unser archäologischer Leiter vom \"bösen Blick\" verfolgt wird. Sie drängen ihn, ein Amulett zu kaufen."
 lepsius.408.g: "Kaufen Sie das Amulett."
 lepsius.408.h: "Dieser Aberglaube widerspricht jeder wissenschaftlichen Überzeugung!"
 lepsius.409.t: "Freundliche Fischer"
 lepsius.409.d: "Einige freundliche Fischer, die an der Küste vorbeikamen, haben angeboten, die Ausrüstung unserer Expedition für ein paar Meilen mitzunehmen."
 lepsius.409.g: "Sehr hilfreich."
 lepsius.410.t_yucatan: "Papagei-Maskottchen"
 lepsius.410.t_peru: "Bedrohlicher Kondor"
 lepsius.410.d_yucatan: "Seit wir in den Dschungel von Yucatán eingetaucht sind, begleitet uns ein kleiner, bunter Papagei."
 lepsius.410.d_peru: "Seit wir die Anden bestiegen haben, hängt jeden Tag der Schatten eines mächtigen Kondors über uns."
 lepsius.410.f_yucatan: "Die Wälder Yucatáns stecken voller Gefahren: In den Büschen lauern Jaguare, Schlangen und giftige Insekten. Gleichzeitig sind die Expeditionsteilnehmer fasziniert von der Flora und Fauna – insbesondere von einem kleinen, bunten Papagei, der über Hüte und Helme hinwegfliegt und den Reisenden nicht von der Seite weicht. Der Vogel wirkt äußerst schlau und kann inzwischen sogar regelmäßig gefüttert werden. Der Expeditionsleiter hat den Papagei nun zum Maskottchen des Unternehmens erklärt und will ihn nach Ende der Reise mit nach Hause nehmen."
 lepsius.410.f_peru: "Der Kondor ist der König der Anden. Die riesigen Vögel beherrschen die Luft, ihr Schatten bläht sich zu ungeahnter Größe auf. Seit Beginn der Expedition schwebt er geradezu bedrohlich über den Alpakas und Trägern. Die Einheimischen trauen dem Tier nicht. Als Geier kreist er bekanntlich eher über Leichen als über Lebenden. Bei manchen Teilnehmern macht sich ein mulmiges Gefühl breit."
 lepsius.410.g: "Ein gutes Omen."
 lepsius.410.h: "Er sollte einen Papagei als Haustier bekommen."
 lepsius.410.i: "Ein schlechtes Omen."
 lepsius.410.j: "Er wird uns gehören."
 lepsius.411.t: "Erschöpfte Lasttiere"
 lepsius.411.d: "Es scheint, als hätten wir unsere Lasttiere überarbeitet."
 lepsius.411.f: "Tagelang haben wir unsere Lasttiere beansprucht. Manche sagen sogar: zu lang. Jetzt machen sich Ermüdungserscheinungen bemerkbar. Manche Tiere verweigern sogar die Weiterreise und lassen sich nur mit Schlägen fortbewegen. Heute Morgen ist unser erstes Tier zusammengebrochen."
 lepsius.411.g: "Sie können ruhen, wenn sie tot sind."
 lepsius.411.h: "Lass sie ruhen!"
 lepsius.412.t: "Archäologische Expedition verloren!"
 lepsius.412.d: "Seit zwei Monaten ist jeglicher Kontakt zu unserer archäologischen Expedition unterbrochen."
 lepsius.412.f: "Manchmal hat man einfach Pech. Einige abergläubische Einheimische behaupten sogar, unser gesamtes Unternehmen stehe unter einem schlechten Stern. So oder so: Der Kontakt zu unserer archäologischen Expedition ist komplett verloren gegangen. Die letzte Nachricht hat lange auf sich warten lassen. Wir sind sicher, dass die Archäologen bald nachhelfen werden, aber so wie es aussieht, scheint das gesamte Personal den Überblick verloren zu haben."
 lepsius.412.g: "Flüche!"
 lepsius.413.t: "Exotische Krankheiten"
 lepsius.413.d: "Einige Teilnehmer unserer archäologischen Expedition sind schwer erkrankt."
 lepsius.413.f: "Krankheiten haben lange Reisen schon immer erschwert. Ob in den Tropen, in Wüsten, Sümpfen oder im Hochgebirge: Unsere Expeditionsteilnehmer sind die Bedingungen nicht gewohnt und überall lauern unbekannte Krankheitserreger. Vor allem Malaria fordert immer wieder ihre Opfer. Auf der Reise erkranken manche Männer so schwer, dass sie einfach nicht mehr arbeiten können."
 lepsius.413.g: "Wir warten und heilen sie."
 lepsius.413.h: "Lass sie zurück."
 lepsius.414.t: "Korruption"
 lepsius.414.d: "Unsere Expedition wird von örtlichen Beamten belästigt und am Fortgang gehindert."
 lepsius.414.f: "Seit Beginn unserer Expedition waren die Teilnehmer einer ganzen Reihe von Schikanen ausgesetzt. Kleine und mittlere Beamte machen uns mit Stempeln und Sondergebühren das Leben schwer. Einer stellte sogar unser Visum in Frage und wollte uns eine Geldstrafe auferlegen. Die Situation ist äußerst verwirrend. Ohne gute Kontakte oder familiäre Bindungen kommt man in diesem Land offenbar nicht weiter."
 lepsius.414.g: "Räuber!"
 lepsius.414.h: "Diebe!"
 lepsius.414.i: "Politiker!"
 lepsius.415.t: "Das Hochwasser"
 lepsius.415.d: "Während eine Überschwemmung das Land verwüstet, sieht unser Expeditionsleiter, wie eine Frau von den Fluten weggespült wird."
 lepsius.415.f: "Die ständigen Regenfälle der letzten Tage haben das Wasser über die Ufer treten lassen; Außergewöhnliches Wetter, aber nichts, worauf unsere Expeditionsteilnehmer nicht vorbereitet waren. Während sich der Fluss in einen reißenden Strom verwandelt hat, setzen unsere Männer die Reise fort – bis zu dem Moment, als vom Ufer her ein Schrei ertönt. Für einen Moment sieht unser Expeditionsleiter, wie ein buntes Bündel weggeschwemmt wird. Jetzt gilt es, schnell zu reagieren, auch wenn dies eine entscheidende Verzögerung der Reise bedeuten könnte."
 lepsius.415.g: "Rette sie!"
 lepsius.415.h: "Die Expedition kann nicht erwarten!"
 lepsius.416.t: "Gutes Wetter"
 lepsius.416.d: "Die archäologische Expedition kommt überraschend gut voran."
 lepsius.416.f: "Unser Expeditionsteam kommt gut voran. Manchmal sind keine Nachrichten die besten Nachrichten, und in diesem Fall sind unsere Archäologen zuversichtlich, eine gute bis sehr gute Problemstelle zu finden. Ansonsten gibt es nichts Berichtenswertes – außer dem guten Wetter!"
 lepsius.416.g: "Wie befriedigend."
 lepsius.417.t: "Gastfreundliche Einheimische"
 lepsius.417.d: "Die Einheimischen begrüßten unsere Expedition freundlich, aber vielleicht konnten wir noch mehr daraus machen ..."
 lepsius.417.f: "Unsere Expedition machte in einem kleinen Dorf Halt. Die Bewohner sind äußerst gastfreundlich und haben dem Team einen guten Ruheplatz geboten und die Tiere mit Futter versorgt. Im Gespräch mit den Einheimischen wurde angedeutet, dass sie vielleicht mehr über die Gegend wüssten – einschließlich alter Hinterlassenschaften ..."
 lepsius.417.g: "Wir müssen alles herausfinden."
 lepsius.417.h: "Es ist in Ordnung, so wie es ist."
 lepsius.418.t: "Lokaler Führer"
 lepsius.418.d: "Ein lokaler Führer bot unserer Expedition seine Dienste an."
 lepsius.418.f: "Manchmal muss man einfach Glück haben. Unsere Expedition hat einen lokalen Führer gewonnen, der sich hervorragend in der Gegend auskennt – und mehr über die Sehenswürdigkeiten der Region weiß."
 lepsius.418.g: "Perfekt!"
 lepsius.419.t: "Abkürzung"
 lepsius.419.d: "Der Militärattaché der Expedition hat eine Abkürzung zu einer Ruine gefunden, verlangt aber eine Gegenleistung."
 lepsius.419.f: "Unser Militärattaché meldet eine Abkürzung. Als wir gestern Nachmittag eine Pause machten, nutzte er dies, um die Gegend zu erkunden und behauptet, eine alte Straße gefunden zu haben, die auf keiner Karte verzeichnet ist. Wenn das wahr ist, könnte es unserer Expedition weiterhelfen, aber es bedeutet auch, ihn gut zu belohnen ..."
 lepsius.419.g: "Belohnen Sie ihn und folgen Sie ihm!"
 lepsius.419.h: "Machen wir ihn nicht wichtiger, als er ist."
 lepsius.420.t: "Motivierte Männer"
 lepsius.420.d: "Unsere Expedition hatte das Glück, besonders motivierte Männer einzustellen. Dadurch verbessern sich unsere Erfolgsaussichten deutlich."
 lepsius.420.f: "Schon von weitem sind Pfiffe und Gesänge zu hören. Die archäologische Expedition kommt überraschend gut voran. Das Team ist hochmotiviert und erfolgszuversichtlich. Männer gehen Hindernisse und Probleme gelassener an. Wir wissen nicht, was die Ursache dafür war, vielleicht hatten wir ein glückliches Händchen bei der Auswahl unserer Leute. Auf jeden Fall erhöhen sich dadurch unsere Erfolgschancen enorm."
 lepsius.420.g: "Carpe Diem."
 lepsius.421.t: "Der Skarabäus"
 lepsius.421.f: "Leider hat unser Ausgrabungsteam bei einer kleineren Ausgrabung in der Nähe einer Mastaba nichts gefunden – mit Ausnahme eines kleinen, lapislazuliblauen Skarabäus. Der Skarabäus galt im alten Ägypten als Glücksbringer. Das Verhalten des Skarabäus, Mistkugeln vor sich herrollen zu lassen, stand im Zusammenhang mit Re und seiner Reise über den Himmel auf dem Sonnenkahn. Unser Expeditionsleiter fragte, ob wir vielleicht eine kleine Ausnahme machen und das eigentlich zweitrangige Stück als Andenken für ihn behalten könnten."
 lepsius.421.g: "Er darf das Artefakt behalten."
 lepsius.421.h: "Alle gefundenen Artefakte sind ausnahmslos einem Museum zu übergeben!"
 lepsius.422.t: "Tempel im Sand"
 lepsius.422.d: "Unsere Archäologen fanden etwas, das wie ein mazedonischer Tempel aussieht."
 lepsius.422.f: "Zuerst dachten unsere Männer, es sei eine Düne – doch ein winziger Gipfel aus bearbeitetem Kalkstein verriet unseren Archäologen, dass der ungewöhnliche Sandberg in der ägyptischen Wüste ein Geheimnis birgt. Innerhalb weniger Tage entdeckte die Expedition einen Tempel. Für einige war das Ergebnis enttäuschend, da es nicht an ein altägyptisches Bauwerk erinnerte, sondern sich als Bauwerk aus der Zeit Alexanders des Großen herausstellte. Experten sagen jedoch, dass der Tempel ein Beweis für die Aktivitäten des griechischen Feldherrn in Ägypten war – dessen Grab bis heute nicht gefunden wurde."
 lepsius.422.g: "Auf den Spuren Alexanders des Großen..."
 lepsius.422.h: "Alles Ammenmärchen."
 lepsius.423.t: "Ein geflügelter Löwe"
 lepsius.423.d: "Unsere Archäologen haben in Mesopotamien eine Statuette ausgegraben, die wie ein Cherub aussieht."
 lepsius.423.f: "Mischwesen aus Mensch und Tier sind im Orient weit verbreitet. Unsere Expedition hatte das Glück, bei der Suche nach einer Ausgrabungsstätte eine außergewöhnlich schöne und gut erhaltene Statuette zu ergattern; es ist bereits auf dem Weg zu unserem Museum. Aufschlussreich ist auch eine Keilinschrift, die das Wesen als Tempelwächter ausweist. Unsere Archäologen haben die Theorie aufgestellt, dass diese Tempelwächter eine Verbindung zu den in der Bibel erwähnten israelitischen Cherubim darstellen. Zwei von ihnen schützten auch die Bundeslade, die im Jerusalemer Tempel stand."
 lepsius.423.g: "Sprechen wir über die verlorene Arche?"
 lepsius.423.h: "Heiliger Markus, bist du das?"
 lepsius.423.i: "Alles Ammenmärchen."
 lepsius.424.t: "Keilschriftdepot"
 lepsius.424.d: "Unsere Archäologen haben zahlreiche mesopotamische Artefakte entdeckt."
 lepsius.424.f: "Als unsere Archäologen eine antike Stadtmauer am Rande einer Kleinstadt untersuchten, hatten sie eigentlich nicht damit gerechnet, viel zu finden. Erst als sie den Stein betasteten, bemerkten sie, dass sich in der Struktur Hohlräume befanden. Nach eingehender Untersuchung brachen sie an einer bestimmten Stelle die Mauer auf – wie sich herausstellte, waren Keilschrifttafeln in die Mauer eingebaut! Das Depot ist überraschend gut erhalten und bietet einige Informationen über das antike Mesopotamien."
 lepsius.424.g: "Eine erstaunliche Entdeckung!"
 lepsius.425.t: "Orichalkum?"
 lepsius.425.d: "Unsere Archäologen haben ein Artefakt gefunden, das aus einem seltsamen, unbekannten Material besteht."
 lepsius.425.f: "Während einer unserer Griechenland-Expeditionen machten unsere Archäologen eine merkwürdige Entdeckung. Am Morgen traf eine kleine Kugel bei der Museumsleitung ein. Der Direktor verstand zunächst nicht, warum seine Männer ihm eine Murmel zurückschickten; Unter normalen Umständen war es nur ein trivialer Fund. Doch die bernsteinfarbene Kugel besteht aus einem unbekannten Material, das uns sonst nirgendwo begegnet ist. Bisher waren sich Experten nicht sicher, was sie von dem Artefakt halten sollten, und einige gingen davon aus, dass es sich um eine Fälschung handelte. Andere behaupten, dies sei ein Hinweis darauf, dass unser Wissen über die Welt der Ägäis völlig unzureichend sei."
 lepsius.425.g: "Hat Platon so etwas nicht in seinem Kritias-Dialog erwähnt ...?"
 lepsius.425.h: "Alles Ammenmärchen."
 lepsius.426.t: "Keramikhort"
 lepsius.426.d: "Unsere Archäologen haben zahlreiche Artefakte aus der Ägäis entdeckt."
 lepsius.426.f: "Was für die Alten Müll war, ist für einen Archäologen eine Fundgrube. Dieses Motto wurde erst kürzlich wahr, als unsere Expedition auf der Suche nach einer Ausgrabungsstätte an einer kleineren Ruine Halt machte und bei näherer Betrachtung eine Grube mit einem Töpferdepot fand. Viele der Scherben müssen noch repariert werden, aber die zahlreichen Funde werden unsere Museumssammlung auf jeden Fall bereichern."
 lepsius.426.g: "Und alles gehört uns!"
 lepsius.427.t: "Maya Jade"
 lepsius.427.d: "Unsere Archäologen haben wertvolle Maya-Artefakte aus Jade gefunden."
 lepsius.427.f: "Jade war ein Material, das die Maya häufig in den Bereichen Kunst und Religion verwendeten. Die Elite schmückte sich mit Jade und auch der Sonnengott wurde in Jadeschmuck dargestellt. Allerdings stellten die Völker Mittelamerikas auch Werkzeuge aus Jade her, da es sich um eines der härtesten Materialien handelte, die man aus der Neuen Welt kannte. Unsere Archäologen hatten das Glück, bei ihrer letzten Ausgrabung einige solcher Jadeartefakte zu finden."
 lepsius.427.g: "Das würde in unserer Sammlung gut aussehen."
 lepsius.428.t: "Inka-Idol"
 lepsius.428.d: "Unsere Archäologen haben ein mysteriöses goldenes Inka-Idol ausgegraben."
 lepsius.428.f: "Eine goldene Statuette des Inkagottes Inti ist heute Morgen per Expresslieferung im Museum eingetroffen. Unsere Archäologen sagen nicht, wie oder wo sie es bekommen haben. Eine Grimasse, schrecklich und schön zugleich, blickt den Betrachter an. Einige Experten äußerten bereits Zweifel, ob das Stück überhaupt Inka-Ursprung ist. Das Design weist auf eine unbekannte Kultur hin. Darüber hinaus wurde fast das gesamte Inka-Gold aus Peru gestohlen. Es ist vielleicht das bisher einzigartigste Stück unserer präkolumbianischen Sammlung. Der Museumsdirektor flüstert bereits hinter verschlossenen Türen, dass manche Legenden doch wahr sein könnten."
 lepsius.428.g: "El Dorado, irgendjemand?"
 lepsius.428.h: "Alles Ammenmärchen."
 lepsius.429.t: "Der Kristallschädel"
 lepsius.429.d: "Unsere Archäologen haben ... etwas gefunden."
 lepsius.429.f: "Ein vertrauenswürdiger Händler, unser Bagger schwört, habe ihm kürzlich ein außerordentlich interessantes, aber auch unheimliches Stück gezeigt. Es handelt sich um einen menschlichen Schädel – komplett aus mesoamerikanischem Quarz gefertigt. Die Oberfläche ist erstaunlich gut poliert und die Arbeit übertrifft alles, was wir bisher über die Kulturen des südamerikanischen Kontinents wussten. Doch die Zweifel sind groß. Selbst unser Chefarchäologe ist sich nicht hundertprozentig sicher, was er von dem Artefakt halten soll."
 lepsius.429.g: "Wir fügen es der Sammlung hinzu."
 lepsius.429.h: "Auf jeden Fall eine Fälschung."
 lepsius.430.t: "Gefälschter Kristallschädel"
 lepsius.430.d: "Das angebliche Artefakt, das uns vor Jahren als Sensation verkauft wurde, ist in Wirklichkeit eine Fälschung."
 lepsius.430.f: "Wie konnte das passieren? Waren wir zu nachlässig? Zu egoistisch, weil wir von Sensation zu Sensation hetzen und nur das glauben, was wir glauben wollen? Der legendäre Kristallschädel, den unser Museum vor Jahren als Attraktion erworben hat, ist eine billige Fälschung. Es wird Jahre dauern, bis unser Ansehen in der archäologischen Welt wiederhergestellt ist!"
 lepsius.430.g: "Eine nationale Schande für unsere Archäologie!"
 lepsius.431.t: "Einheimische kennen die Ruine"
 lepsius.431.d: "Ein hilfsbereiter Einheimischer konnte uns bei der Suche nach Artefakten helfen."
 lepsius.431.f: "Als unsere Expedition in einer kleinen Stadt auf unserer Route Halt macht, treffen wir einen älteren Bauern, der von unserem Ziel gehört hat. Gegen etwas Brot, Salz und Wasser ist er äußerst entgegenkommend. \"Die anderen Dorfbewohner haben mir bereits gesagt, wonach Sie suchen\", erklärt er. Er nimmt uns mit auf eine halbtägige Reise durch unbekanntes Terrain. Unsere Archäologen sind überrascht, als er uns direkt zu einer antiken Ruine führt. Zur Sicherstellung konnten wir einige Artefakte für unser Museum finden."
 lepsius.431.g: "Das muss unser Glückstag sein!"
 lepsius.432.t: "Artefakt des lokalen Handels"
 lepsius.432.d: "Ein Einheimischer möchte uns ein Artefakt verkaufen."
 lepsius.432.f: "Unsere Expedition macht Halt in einer größeren Stadt. Als die Träger Futter für die Lasttiere kauften, meldete sich ein Händler zu Wort. Offenbar hat sich die Nachricht von unserer Reise auch unter den Einheimischen weit verbreitet. Für einen guten Preis ist er bereit, ein wertvolles Kunstwerk zu verkaufen, das er von einem Grabräuber erhalten hat. Die Herkunft des Artefakts ist unklar, aber das Angebot ist attraktiv – auch wenn es seinen Preis hat."
 lepsius.432.g: "\"It belongs in a museum.\""
 lepsius.432.h: "An solch dubiosen Deals sind wir nicht interessiert."
 lepsius.433.t: "Authentisch oder gefälscht?"
 lepsius.433.d: "Ein Antiquitätenhändler mit zweifelhaftem Ruf möchte uns ein Artefakt verkaufen."
 lepsius.433.f: "Nicht alle Händler vermeintlich wertvoller archäologischer Artefakte sind vertrauenswürdig. Das gilt zum Beispiel für einen Händler, der uns etwas übereifrig einen Kunstschatz verkaufen möchte. Der Eingriff und sein flexibler Preismechanismus, der uns angeblich einen \"freundlichen Preis\" verspricht, haben bei unseren Expeditionsleitern Zweifel geweckt, ob es sich wirklich um ein sicheres Angebot handelt. Deshalb fragten sie das Museum, ob sie das Artefakt aus den zwielichtigen Händen des Händlers annehmen sollten."
 lepsius.433.g: "Wir müssen das Risiko eingehen."
 lepsius.433.h: "Vertraue ihm nicht."
 lepsius.434.t: "Grabräuber gefasst"
 lepsius.434.d: "Unsere Expedition hat eine Gruppe von Grabräubern und ihre Beute gefangen genommen, aber wir sind uns nicht sicher, was wir mit ihnen machen sollen."
 lepsius.434.f: "Unsere Archäologen dachten, sie hätten bereits eine gute Ausgrabungsstätte gefunden, bis ihnen klar wurde, dass die Stätte jahrhundertelang geplündert worden war. Als sie ihre Sachen wieder zusammenpackten, konnten einige Lagerfeuerwächter mehrere zwielichtige Gestalten festnehmen, die versuchten, ein Artefakt aus der verlassenen Ausgrabungsstätte zu schmuggeln. Eigentlich sollten wir die Männer den Behörden übergeben und das gestohlene Kunstwerk zurückgeben. Einige Leute meinen jedoch, wir sollten das Artefakt für uns beanspruchen und das Schweigen der Grabräuber erkaufen."
 lepsius.434.g: "Das Artefakt sollte uns gehören."
 lepsius.434.h: "Reichen Sie eine Beschwerde ein und geben Sie das Artefakt an die örtlichen Behörden zurück."
 lepsius.435.t: "Versteigerung"
 lepsius.435.d: "Politischer Druck veranlasst uns, über den Verkauf eines kürzlich gefundenen Artefakts nachzudenken."
 lepsius.435.f: "Einige Regierungsmitglieder befürchten, dass unsere archäologischen Unternehmungen im Ausland nichts anderes als Geldverschwendung sind und die Wirtschaftsleistung unseres Landes den Elite-Elfenbeintürmen einer kleinen Clique von Wissenschaftlern opfern. Sie wollen nicht nur wissenschaftliche Ergebnisse, sondern auch monetäre Beweise dafür, dass diese Expeditionen Sinn machen. Eine Gruppe von Politikern fordert daher den Verkauf eines kürzlich gefundenen Artefakts, um die Kosten zu decken, die durch unsere archäologischen Abenteuer entstehen."
 lepsius.435.g: "Verkaufe es auf einer Auktion."
 lepsius.435.h: "\"But it belongs in a museum!\""
 lepsius.436.t: "Versteckte Kammer"
 lepsius.436.d: "Unsere Archäologen fanden ein Grab, das offenbar von Räubern geplündert wurde. Doch als sie weitere Nachforschungen anstellten, fanden sie eine Kammer hinter einer falschen Wand."
 lepsius.436.f: "Der letzte Stopp begann mit einer Enttäuschung. Unser Expeditionsleiter hatte von der historischen Ausgrabungsstätte einiges erwartet: Es handelte sich um das Grab eines hohen Adelsbeamten, vielleicht auch mit sakraler Funktion. Die Angaben einiger Landwirte deuteten jedenfalls darauf hin, dass dies der Fall war. Umso größer ist die Enttäuschung vor Ort: Das Grab ist leer, die Wände sind kahl und es gibt nicht einmal ein Zeichen von historischer Bedeutung. Auf den ersten Blick sah es aus wie eine glatt gehauene Höhle. Dies änderte sich jedoch schlagartig, als der wissenschaftliche Mitarbeiter zufällig die Umrisse eines Türrahmens entdeckte, als er an der vermeintlichen Wand lehnte. Es dauerte zwei Stunden, Trümmer, Fensterläden und Steine ​​freizulegen – und den Zugang zu einer zuvor verborgenen Kammer freizulegen."
 lepsius.436.g: "Mein Schatz!"
 lepsius.437.t: "Verlassenes Lager"
 lepsius.437.d: "Wir haben das verlassene Lager eines ausländischen Grabungsteams gefunden. Nachdem wir dort zwei Artefakte sichergestellt haben, beansprucht der Botschafter des Landes die Stücke für sich."
 lepsius.437.f: "Als unsere Männer das Ausgrabungslager erreichten, untersuchten sie gerade die Überreste einer Expedition, die nur wenige Monate zuvor einen nahegelegenen Tempel erkundet hatte. Wie sich herausstellte, räumten die Grabungsarbeiter das Gelände etwas zu schnell: In einer Kiste wurden zwei nicht abgeholte Artefakte gefunden. Unsere Archäologen sicherten den Fund, bekamen aber bald Besuch vom Botschafter des Landes, der die gefundenen Artefakte von seinem Land zurückforderte. Der Fall hat einen diplomatischen Zwischenfall mit großer Macht ausgelöst."
 lepsius.437.g: "Wir haben es gefunden, es gehört uns."
 lepsius.437.h: "Teilen wir die Artefakte."
 lepsius.437.i: "Stattdessen teilen wir unser Wissen."
 lepsius.437.j: "Sie sind die rechtmäßigen Eigentümer."
 lepsius.438.t: "Der Eremit"
 lepsius.438.d: "Leider ist ein Einsiedler, der über ein Artefakt verfügt, nur bedingt zur Kooperation bereit."
 lepsius.438.f: "Wir haben die Nachricht von einem seltsamen Einsiedler gehört, der angeblich ein Artefakt besitzt. Er verfügt über ein beeindruckendes Wissen über die Vergangenheit und ein umfangreiches Gedächtnis. In vielerlei Hinsicht sind selbst die Gelehrten unserer Expedition von seinem Wissen erstaunt. Der mürrische alte Mann würde uns gerne mehr erzählen, aber er wird das Artefakt auf keinen Fall hergeben. Offenbar müssen wir Gewalt anwenden."
 lepsius.438.g: "Ich will dieses Artefakt und ich will es jetzt!"
 lepsius.438.h: "Hören Sie ihm einfach zu."
 lepsius.439.t: "Dynamit?"
 lepsius.439.d: "Manchmal erfordern besondere Herausforderungen besondere Maßnahmen."
 lepsius.439.f: "Bei einer Ausgrabung kommt unser Führer zu dem Schluss, dass ein Durchgang möglicherweise hinter einer Mauer verborgen ist; zumindest behauptet er, hinter der Wand einen Hohlraum entdeckt zu haben. Drastische Maßnahmen waren in den Anfängen der Archäologie an der Tagesordnung, und dazu gehörte auch der Einsatz von Sprengstoffen, um höhere wissenschaftliche Ziele zu erreichen. Natürlich könnten wir mit nichts davonkommen, wenn der angebliche Hohlraum eine Täuschung ist und wir die zuvor gesicherte Ausgrabungsstätte gefährden."
 lepsius.439.g: "KA-BOOM!"
 lepsius.439.h: "Es ist barbarisch, nur darüber nachzudenken."
 lepsius.440.t: "Ein kaputtes Stück"
 lepsius.440.d: "Wir haben ein kaputtes Artefakt gefunden. Das fehlende Stück befindet sich im Besitz einer unbedeutenden Macht."
 lepsius.440.f: "Bei einer Ausgrabung haben Archäologen einen wertvollen Kunstschatz gefunden – zumindest einen Teil davon. Es stellt sich heraus, dass das andere Stück in den Händen einer Kleinmacht ist, die es vor einigen Jahren von einem Antiquitätenhändler gekauft hat. Wir könnten unseren diplomatischen Dienst nutzen, um das fehlende Teil zu beschaffen und das Artefakt zusammenzubauen, aber der Botschafter hat bereits deutlich gemacht, dass dies eine politische Verpflichtung wäre."
 lepsius.440.g: "Wir bitten sie höflich darum."
 lepsius.440.h: "Die Sache ist doch nicht so wichtig."
 lepsius.441.t: "Ein vergessener Obelisk"
 lepsius.441.d: "Ein unvollendeter Obelisk gibt unseren Wissenschaftlern Aufschluss über antike Baupraktiken."
 lepsius.441.f: "In einem altägyptischen Steinbruch haben unsere Archäologen etwas gefunden, das einem unvollendeten Obelisken ähnelt. Die Arbeiten an dem massiven Monolithen wurden offenbar nie abgeschlossen. Obwohl es keine Hieroglyphen trägt und aufgrund seiner Ausmaße nicht abtransportiert werden kann, haben unsere Wissenschaftler neue Erkenntnisse darüber gewonnen, wie die alten Ägypter diese Bauwerke anfertigten und errichteten."
 lepsius.441.g: "Sehr interessant."
 lepsius.442.t: "Mumifizierte Tiere"
 lepsius.442.d: "Der Umgang mit kürzlich entdeckten mumifizierten Tieren hat unter Archäologen Kontroversen ausgelöst."
 lepsius.442.f: "Vor einigen Tagen entdeckten Archäologen eine Grabkammer mit einem besonderen Fund: Neben dem dort begrabenen Adligen wurden auch kleinere Sarkophage mit Tieren gefunden. Ihrem Aussehen nach zu urteilen, handelt es sich um eine Katze, einen Hund und einen Affen. Nach einem Fund ist unter Wissenschaftlern eine Diskussion entbrannt: Die mumifizierten Tiere könnten Aufschluss über ihre Haltung und das Leben der Haustiere im alten Ägypten geben, bedeuten aber gleichzeitig die Zerstörung dieser seltenen Artefakte."
 lepsius.442.g: "Sie bedürfen einer gründlichen Untersuchung."
 lepsius.442.h: "Fassen Sie sie nicht an, es sind wichtige Museumsausstellungen!"
 lepsius.443.t: "Streit um ein Krokodil"
 lepsius.443.d: "Ein seltsamer Streit über ein totes Krokodil entzweit unsere Wissenschaftler und den Militärattaché."
 lepsius.443.f: "Die Fauna des Nils inspirierte unsere Wissenschaftler dazu, ihre biologischen Studien zu intensivieren. Besonderes Augenmerk legen sie auf das Nilkrokodil, dem die Wissenschaftler sowohl mit Angst und Ekel als auch mit Faszination begegnen. Auf Wunsch unserer Wissenschaftler hat unser Militärattaché ein Krokodil getötet. Nun weigert er sich jedoch, das Tier herauszugeben: Er möchte es lieber ausstopfen und über seinen Schornstein hängen."
 lepsius.443.g: "Er soll das Krokodil den Forschern übergeben."
 lepsius.443.h: "Es lebe die Tierpräparation!"
 lepsius.443.i: "Das ist tatsächlich ein hübsches Krokodil..."
 lepsius.444.t: "Fluch des Pharaos"
 lepsius.444.d: "Nach einigen mysteriösen Vorfällen glauben nun nicht nur die einheimischen Helfer, sondern sogar einige Wissenschaftler, dass unser Unterfangen in Ägypten verflucht ist!"
 lepsius.444.f: "Alles begann, nachdem unser Expeditionsleiter ein ägyptisches Grab geöffnet hatte: Im Sarkophag befand sich eine abscheulich aussehende Mumie, die innerhalb weniger Minuten vor den Augen der Teilnehmer verweste. Nur wenige Tage später wurden fast alle Teilnehmer von einer mysteriösen Krankheit heimgesucht. Ein wissenschaftlicher Mitarbeiter, der bei der Enthüllung der Mumie anwesend war, starb. Einen Tag später machte ein Sandsturm die Arbeit eine Woche lang unmöglich. Heute Morgen stellte sich heraus, dass die Wasservorräte verunreinigt und ungenießbar waren; es schimmert in einer kupfergelben Farbe. Immer mehr Beteiligte sind nun davon überzeugt, dass sie für die Grabschändung bezahlen müssen: Der Fluch des unbekannten Pharaos ruht auf ihnen!"
 lepsius.444.g: "Was ist das? Komet gesichtet?!"
 lepsius.445.t: "Teil des Gilgamesch-Epos"
 lepsius.445.d: "Wissenschaftler haben ein Stück des berühmten Gilgamesch-Epos gefunden. Es gilt als das älteste Stück menschlicher Literatur."
 lepsius.445.f: "Das Gilgamesch-Epos ist der Inhalt einer Gruppe literarischer Werke, die überwiegend aus dem babylonischen Raum stammt und eines der ältesten erhaltenen, schriftlichen Siegel enthält. Das Gilgamesch-Epos ist in seinen verschiedenen Fassungen das bekannteste Werk der akkadischen und sumerischen Literatur. Das Epos erzählt die Geschichte von Gilgamesch, einem König von Uruk, seinen Heldentaten und Abenteuern, seiner Freundschaft mit Enkidu, seinem Tod und Gilgameschs Streben nach Unsterblichkeit. #T @lepsius_gilgamesh_fragment! Zur Rekonstruktion einer Grundversion werden fünf Teile des Epos benötigt.#!"
 lepsius.445.g: "Wir müssen mehr Stücke finden."
 lepsius.445.h: "Das ist das letzte Stück!"
 lepsius.445.i: "Weitere Stücke sind jederzeit willkommen."
 lepsius.446.t: "Minoisches Fresko"
 lepsius.446.d: "Bei Recherchen auf Kreta stieß unser Ausgrabungsteam auf Überreste der minoischen Kultur."
 lepsius.446.f: "Ein wunderschönes Fresko hat die Aufmerksamkeit unserer Archäologen auf sich gezogen. Fragmente von Fischern, Tänzern und Ballspielern vermitteln einen Eindruck vom Alltag der antiken minoischen Zivilisation. Die Mauer, die das Expeditionsteam auf Kreta freigelegt hat, weist sogar Farbspuren auf – nach 4.000 Jahren! Es ist sicher, dass dieser sagenhaften Entdeckung noch weitere Funde folgen werden."
 lepsius.446.g: "Eine verlorene Kultur wird vor unseren Augen lebendig."
 lepsius.447.t: "Zyklopenmauern"
 lepsius.447.d: "Bei Recherchen in der Argolis hat unser Ausgrabungsteam Überreste der mykenischen Kultur freigelegt."
 lepsius.447.f: "Nach mehreren Rückschlägen haben Archäologen in Griechenland etwas gefunden, das die Einheimischen zunächst als Terrasse für Olivenbäume bezeichneten, in Wirklichkeit aber nur die Spitze einer Zyklopenmauer war. Die Expeditionsteilnehmer haben bisher nicht viel gefunden, aber es ist zumindest ein Anfang."
 lepsius.447.g: "Wie konnten sie damals so nahtlos aufbauen?"
 lepsius.448.t: "Maya-Stele"
 lepsius.448.d: "Das Archäologenteam in Yucatán hat Fortschritte bei der Entzifferung der Maya-Hieroglyphen gemacht."
 lepsius.448.f: "Tief im Dschungel von Yucatán stießen unsere Expeditionsteilnehmer auf eine Inschrift aus der Maya-Zeit. Wissenschaftler datieren sie grob auf das 6. Jahrhundert v. Chr. Die Entdeckung hat unser Wissen über die verlorene Kultur erheblich erweitert, doch einige Hieroglyphen bleiben für unsere Archäologen immer noch ein Rätsel. Allerdings machen die Beteiligten Hoffnung, dass die Entschlüsselung der Maya-Schrift nur eine Frage der Zeit ist."
 lepsius.448.g: "Wir müssen es entschlüsseln."
 lepsius.449.t: "Maya-Höhle"
 lepsius.449.d: "Das Expeditionsteam hat Spuren der Maya-Kultur gefunden, kann aber wenig davon vorweisen."
 lepsius.449.f: "Einst nutzten die Maya Höhlen, um darin ihre Rituale zu feiern. Was der genaue Inhalt war, ist bis heute nicht geklärt. Vielleicht können unsere Archäologen in Zukunft mehr darüber berichten. Sie fanden den Eingang zu einer Maya-Höhle im Norden Guatemalas. Bisher waren die Ergebnisse allerdings eher dürftig."
 lepsius.449.g: "Wofür werden Sie eigentlich bezahlt?"
 lepsius.450.t: "Andenmumien"
 lepsius.450.d: "Auf einem Berggipfel haben unsere Wissenschaftler die Leichen von Inka-Kindern entdeckt, die Opfer eines Rituals waren – die Kälte bewahrte sie über Jahrhunderte hinweg."
 lepsius.450.f: "Capacocha war ein wichtiger Opferritus der Inka, bei dem typischerweise Kinder geopfert wurden. Kinder beiderlei Geschlechts wurden aus dem gesamten Inkareich ausgewählt, um sie in Capacocha-Zeremonien zu opfern, die an wichtigen Schreinen im ganzen Reich durchgeführt wurden. Als Beweggrund für diese Art von Opferritual wird typischerweise der Versuch der Inka verstanden, sicherzustellen, dass die Besten der Menschheit zu ihren Gottheiten geschickt werden. Den Kindern, die für eine Capacocha-Zeremonie als Opfer ausgewählt wurden, wurden üblicherweise Alkohol und Kokablätter verabreicht und am Ort der Zeremonie deponiert. Besondere Aufmerksamkeit widmeten die Inka einer Reihe zeremonieller Wak'a-Stätten in sehr hohen Lagen. In einer Reihe von Fällen, typischerweise am wichtigsten dieser Berge, enthalten diese Stätten die mumifizierten Überreste von Kindern, die bei Capacocha-Zeremonien geopfert wurden."
 lepsius.450.g: "Unangenehm, aber wertvoll."
 lepsius.451.t: "Eine Statue"
 lepsius.451.d: "Archäologen haben auf ihrer Reise eine bemerkenswerte Statue gefunden. Leider können sie aufgrund ihrer Größe nicht abtransportiert werden."
 lepsius.451.f: "Auf dem Weg zur nächsten Ausgrabungsstätte stieß unsere Expedition in einem rauen, bisher wenig erforschten Gebiet auf eine kolossale Statue. Es war selbst vielen örtlichen Helfern und Trägern unbekannt; und es faszinierte die wissenschaftlichen Weggefährten vom ersten Moment an. Unser Expeditionsleiter schlug sofort vor, die Statue abzutransportieren, doch ihre Größe und die Verankerung im Boden machen ein solches Vorhaben schwierig. Die meisten Teilnehmer hielten es daher für das Beste, alle Inschriften auf der Statue nachzuzeichnen und eine genaue Zeichnung des Denkmals anzufertigen. Es gibt jedoch ein paar vereinzelte, ruchlose Stimmen, die sagen, dass dieser schöne Fund zerschnitten und in unsere Hauptstadt verschifft werden sollte ..."
 lepsius.451.g: "Sie sollten eine genaue Zeichnung anfertigen und die Schrift sorgfältig abschreiben."
 lepsius.451.h: "Schneiden Sie die Statue in Stücke und schicken Sie sie nach Hause."
 lepsius.452.t: "Ein Transkript"
 lepsius.452.d: "Unser Expeditionsleiter hat eine alte Aufzeichnung erhalten, die Material zeigt, das längst zerstört wurde."
 lepsius.452.g: "Besser als nichts."
 lepsius.453.t: "Künstler halten die Landschaft auf Papier fest"
 lepsius.453.d: "Die Künstler, die wir auf die archäologische Expedition mitgenommen haben, zeichnen die Landschaft mit einer solchen Klarheit auf, dass die Aufzeichnungen den Wissenschaftlern noch in den kommenden Jahrzehnten von Nutzen sein werden."
 lepsius.453.f: "Im Laufe der Geschichte haben archäologische Expeditionen nicht nur klassische Gelehrte begleitet, sondern oft auch eine Vielzahl unterschiedlicher wissenschaftlicher Persönlichkeiten wie Geographen, Biologen, Mathematiker, Astronomen oder Künstler, die die Umwelt mit Stift und Papier aufzeichneten. Alle Beteiligten brachten wichtige Kenntnisse mit, um den nicht teilnehmenden Wissenschaftlern zu Hause eine möglichst genaue Beschreibung der jeweiligen archäologischen Ausgrabungsstätte bieten zu können. Gerade dieser interdisziplinäre Ansatz macht Expeditionen seit Napoleons Einmarsch in Ägypten zu einem vielschichtigen Unterfangen, bei dem auf mehreren Gebieten gleichzeitig wissenschaftliche Meilensteine ​​erreicht wurden."
 lepsius.453.g: "Ich bin froh, dass wir sie engagiert haben."
 lepsius.454.t: "Wissenschaftler forschen"
 lepsius.454.d: "Unsere Wissenschaftler haben vor Ort verschiedene Experimente durchgeführt und dabei nicht nur Vergleiche angestellt, sondern unseren Archäologen auch nützliche Ratschläge gegeben."
 lepsius.454.f: "Im Laufe der Geschichte haben archäologische Expeditionen nicht nur klassische Gelehrte begleitet, sondern oft auch eine Vielzahl unterschiedlicher wissenschaftlicher Persönlichkeiten wie Geographen, Biologen, Mathematiker, Astronomen oder Künstler, die die Umwelt mit Stift und Papier aufzeichneten. Alle Beteiligten brachten wichtige Kenntnisse mit, um den nicht teilnehmenden Wissenschaftlern zu Hause eine möglichst genaue Beschreibung der jeweiligen archäologischen Ausgrabungsstätte bieten zu können. Gerade dieser interdisziplinäre Ansatz macht Expeditionen seit Napoleons Einmarsch in Ägypten zu einem vielschichtigen Unterfangen, bei dem auf mehreren Gebieten gleichzeitig wissenschaftliche Meilensteine ​​erreicht wurden."
 lepsius.455.t: "Rivalisierende Expedition"
 lepsius.455.d: "Ein paar Meilen in der Wildnis trifft das Team unseres Expeditionsleiters auf eine Gruppe abgemagerter Männer. Es sind die elenden Überreste einer ausländischen Expedition."
 lepsius.455.f: "Unsere Archäologen sind nicht die Einzigen, die sich in unerforschtes Gebiet vorwagen. Eine kleine private Expedition eines exzentrischen Gelehrten durchquert unser Staatsunternehmen. Im Gegensatz zu unserem eigenen Team sind die Männer des Konkurrenzunternehmens schlecht ausgerüstet. Man kann ihnen den Mangel und die Entbehrungen ansehen. Der Seelsorger unserer Expedition schlägt vor, ihnen zu helfen – was im Heimatland auch als wohlwollende Geste interpretiert werden könnte. Andere Expeditionsteilnehmer wiederum sehen die Chance zum Wissensaustausch mit ausländischen Wissenschaftlern. Der Militärattaché hingegen sieht die Möglichkeit, Hilfe anzubieten – als Gegenleistung dafür, dass er aus dem Expeditionsfonds ein wertvolles Artefakt erhält."
 lepsius.455.g: "Hilf ihnen."
 lepsius.455.h: "Wir helfen ihnen im Austausch für ihr Wissen."
 lepsius.455.i: "Nahrung und Hilfe nur, wenn sie uns ihren Schatz hinterlassen."
 lepsius.461.t: "Die flüsternde Sphinx"
 lepsius.461.d: "Sein mehr als fragwürdiger Lebensstil trägt dazu bei, dass unser Expeditionsleiter [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] unter denkwürdigen Halluzinationen leidet."
 lepsius.462.d: "Sein mehr als fragwürdiger Lebensstil trägt dazu bei, dass unser Militärattaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName] unter denkwürdigen Halluzinationen leidet."
 lepsius.461.g: "Dieser Mann muss seinen Lebensstil wirklich überdenken."
 lepsius.463.t: "Bastet, die Katzengöttin"
 lepsius.463.d: "Auf seiner Reise entdeckte [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] durch sein Studium sein Faible für Katzen."
 lepsius.463.f: "Unter den verschiedenen Gottheiten mit Tiergestalt kannte das alte Ägypten auch die Katzengöttin Bastet. Katzen wurden einst von den Ägyptern sehr verehrt, weil sie Ungeziefer wie Mäuse, aber auch Schlangen aus den Getreidespeichern fernhielten. Im Zuge seiner Faszination für Ägypten begann sich unser Expeditionsleiter intensiv für diese Göttin zu interessieren und begann, eine eigene Katze unter seine Fittiche zu nehmen. Der tierische Begleiter hat auch dazu geführt, dass sein harter Charakter etwas geschwächt ist."
 lepsius.463.g: "Es gibt Katzenmenschen und Hundemenschen."
 lepsius.464.t: "Jagen mit einem Saluki"
 lepsius.464.d: "Unser Militärattaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName] erwarb auf einer Reise in Mesopotamien einen einheimischen Jagdhund."
 lepsius.464.f: "Hunde haben im Nahen Osten normalerweise keinen guten Ruf. Eine Ausnahme bilden Windhunde wie der Saluki. Die Beduinen betrachten ihn als edlen Begleiter, der auch bei der Jagd auf Kaninchen oder Gazellen hervorragende Arbeit leistet. Unser Militärattaché hat von einem Einheimischen einen so hervorragenden Hund geschenkt bekommen und seit einigen Wochen entsteht eine tiefe Bindung zwischen Mensch und Tier."
 lepsius.464.g: "Es gibt Hundemenschen und Katzenmenschen."
 lepsius.465.t: "Ein problematisches Überlegenheitsverhalten"
 lepsius.465.d: "Der arrogante Charakter von [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] hat in unserem Expeditionsland zu Unmut geführt."
 lepsius.465.g: "Warum sollten wir uns die Mühe machen? Schließlich sind sie Barbaren!"
 lepsius.465.h: "Wir sollten diesen diplomatischen Fauxpas um jeden Preis beheben."
 lepsius.466.t: "Der Kartograph"
 lepsius.466.d: "Während der archäologischen Expedition entwickelte der Militärattaché ein großes Interesse für die Kartographie und erstellte eigenes Kartenmaterial. Es scheint, dass er ein Talent für die Landvermessung hat."
 lepsius.466.f: "Von Beginn der Expedition an führte der Militärattaché ein genaues Protokoll über die Bewegungen und Fortschritte der Truppen und erstellte eigene Karten. Bei einem Briefing stellte sich heraus, dass er bereits über eine beeindruckende Sammlung verfügt. Ein wissenschaftlicher Mitarbeiter hat ihn in der letzten Woche immer wieder begleitet und unter seinen Armen ein wenig dabei geholfen, seine kartografischen Erkenntnisse zu erweitern; Jetzt kann er auch mit den Messgeräten durchgehen. Der wissenschaftliche Mitarbeiter schlägt ihm eine Ausbildung zum Fachvermesser vor."
 lepsius.466.g: "Er hat eine große Karriere vor sich!"
 lepsius.466.h: "Seine Karten sind gut, aber er sollte sich auf militärische Angelegenheiten konzentrieren."
 lepsius.467.t: "Ein vergessenes Relikt"
 lepsius.467.d: "Der Leiter unserer archäologischen Expedition hat Kontakt zu einer kleinen christlichen Minderheit im Orient aufgenommen. Er hat Erstaunliches dazu zu sagen."
 lepsius.467.h: "Er sollte das Relikt studieren."
 lepsius.468.t: "Attaché wurde beim Diebstahl von Artefakten erwischt"
 lepsius.468.d: "Heute Morgen hat einer unserer Bagger im Zelt unseres Militärattachés zwei Artefakte gefunden, die seit einigen Wochen verschollen galten. Er wollte sie offensichtlich für sich behalten."
 lepsius.468.f: "Jeder kennt die Geschichte unseres Attachés, aber die anderen Expeditionsmitglieder hatten eigentlich damit gerechnet, dass [SCOPE.sCharacter('lepsius_military_attache').GetFullName] nicht in alte Muster zurückfallen würde. Aber sie lagen offensichtlich falsch: Einmal Bandit, immer Bandit. Denn nachdem ein Grabungsarbeiter zufällig zwei Artefakte der jüngsten Ausgrabung gefunden hat, worüber der Attaché nicht berichtet hat, lässt sich nur die Schlussfolgerung ziehen, dass er sie entweder für sich behalten oder verkaufen wollte. Der Expeditionsleiter hat ihn bisher nicht direkt mit den Vorwürfen konfrontiert, hält aber eine Einigung über das weitere Vorgehen für sinnvoller, bevor aus diesem Fall Konsequenzen gezogen werden."
 lepsius.468.g: "Schweigen Sie über die Angelegenheit."
 lepsius.468.h: "Gehen Sie vorsichtig mit der Angelegenheit um, bestehen Sie jedoch darauf, dass er die Artefakte zurückgibt."
 lepsius.468.i: "Stellen Sie ihn öffentlich bloß und disziplinieren Sie ihn!"
 lepsius.471.t_karnak: "Karnak"
 lepsius.471.t_memphis: "Memphis"
 lepsius.471.t_uruk: "Uruk"
 lepsius.471.t_niniveh: "Ninive"
 lepsius.471.t_tiryns: "Tiryns"
 lepsius.471.t_phaistos: "Phaistos"
 lepsius.471.t_itza: "Chichen Itza"
 lepsius.471.t_olla: "Ollantaytombo"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] möchte einen Ausflug zu einer berühmten Sehenswürdigkeit machen. Obwohl die Ausgrabungsstätte eine große archäologische Bedeutung hat, würde dies unsere Expedition enorm behindern."
 lepsius.471.f_karnak: "Der Karnak-Tempel nördlich von Luxor gilt als einer der größten Tempelkomplexe der Antike. Nach der Erhebung des Amun-Re von Theben zum Lokalgott und späteren Kaisergott begannen die Herrscher des frühen Mittleren Reiches mit dem Bau eines Tempels, der über Jahrtausende hinweg zur heutigen Tempelanlage ausgebaut wurde, in der die Priesterschaft ihren Sitz hatte von Amun leitete den täglichen Tempeldienst. 30 Pharaonen sollen darauf gebaut haben."
 lepsius.471.f_memphis: "Manetho berichtet, dass Memphis der Legende nach im Jahr 3000 v. Chr. von König Menes gegründet wurde. Während des Alten Reiches war sie die Hauptstadt Ägyptens und blieb eine wichtige Stadt in der ägyptischen Geschichte. Memphis stand unter dem Schutz des Gottes Ptah, dem Schutzpatron der Handwerker, dessen Tempel Hut-Ka-Ptah sich im Zentrum der Stadt befand. Aufstieg und Fall von Memphis sind untrennbar mit der Geschichte des gesamten Landes verbunden."
 lepsius.471.f_uruk: "Uruk ist der Ort der ersten Schrift. Es war bereits im späten 4. Jahrtausend v. Chr. eines der führenden politischen Zentren der frühen sumerischen Zeit. In der Antike lag die mesopotamische Stadt direkt am Fluss. In Mythen und Literatur war Uruk als Hauptstadt von Gilgamesch, dem Helden des Gilgamesch-Epos, berühmt. Gelehrte identifizieren Uruk als das biblische Erech (Genesis 10:10), die zweite von Nimrod in Schinar gegründete Stadt."
 lepsius.471.f_niniveh: "Ninive liegt am Ostufer des Tigris und war mehrere Jahrzehnte lang die Hauptstadt und größte Stadt des Neuassyrischen Reiches sowie die größte Stadt der Welt. Während des Neo-Assyrischen Reiches, insbesondere ab der Zeit von Ashurnasirpal II., kam es zu erheblichen architektonischen Erweiterungen. Einige der Haupttüren wurden von kolossalen Lamassu-Türfiguren aus Stein flankiert, die bis zu 30.000 Kilogramm (30 Tonnen) wogen."
 lepsius.471.f_tiryns: "Tiryns erreichte seinen Höhepunkt zwischen 1400 und 1200 v. Chr., als es zu einem der wichtigsten Zentren der mykenischen Welt und insbesondere der Argolis wurde. Zu den bemerkenswertesten Merkmalen zählten der Palast, die Zyklopentunnel und vor allem die Mauern, die der Stadt den homerischen Beinamen \"mächtiges ummauertes Tiryns\" gaben. Tiryns wurde mit den Mythen rund um Herakles in Verbindung gebracht, da die Stadt während seiner Arbeit die Residenz des Helden war und einige Quellen sie als seinen Geburtsort bezeichnen."
 lepsius.471.f_phaistos: "Der Legende nach wurde die Stadt Phaistos von König Minos gegründet und nach einem Sohn oder Enkel des Herakles (Heros Phaistos) benannt, der von Idomeneus, dem Enkel des Minos und späteren König von Kreta, getötet wurde. Der erste Herrscher über Phaistos soll Rhadamanthys, der Bruder des Minos, gewesen sein. Die Stadt verfügt nach Knossos über den zweitgrößten Palastkomplex auf Kreta."
 lepsius.471.f_itza: "Chichén Itzá ist eine der bedeutendsten Ruinen auf der mexikanischen Halbinsel Yucatán. Es liegt etwa 120 Kilometer östlich von Mérida im Staat Yucatán. Seine Ruinen stammen aus der späten Maya-Zeit. Mit einer Fläche von 1.547 Hektar ist Chichén Itzá einer der ausgedehntesten Standorte in Yucatán. Das Zentrum wird von zahlreichen monumentalen Repräsentationsbauten mit religiösem und politischem Hintergrund eingenommen, aus denen eine große, weitgehend erhaltene Stufenpyramide hervorragt."
 lepsius.471.f_olla: "Während des Inka-Reiches war Ollantaytambo der königliche Besitz von Kaiser Pachacuti, der die Region eroberte und die Stadt und ein Zeremonienzentrum errichtete. Zur Zeit der spanischen Eroberung Perus diente es als Festung für Manco Inca Yupanqui, den Anführer des Inka-Widerstands. Ollantaytambo ist das einzige verbliebene Beispiel der Inka-Stadtplanung. Die Gebäude und Inka-Terrassen sowie die engen Gassen der Stadt sind noch im Originalzustand. Die geraden und engen Straßen bilden 15 quadratische Blöcke (Canchas), von denen jeder über einen Eingang zum zentralen, von Häusern umgebenen Innenhof verfügt."
 lepsius.471.j: "Auf keinen Fall – die Expedition hat Vorrang!"
 lepsius.472.t: "Eine verlorene Welt?"
 lepsius.472.d: "Nachdem sich unsere Expedition längere Zeit nicht gemeldet hat, meldet sie große Verluste an Menschen, Lasttieren und Werkzeugen. Die Entschuldigung des Expeditionsleiters dafür ist höchst erstaunlich."
 lepsius.501.t: "Grab eines unbekannten Pharaos"
 lepsius.501.d: "Unser Expeditionsleiter [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] hörte von einem verlorenen Grab im Tal der Könige. Es gehört offenbar einem bisher unbekannten Pharao. Die Einheimischen behaupten, den Eingang dazu gefunden zu haben."
 lepsius.501.f: "Vor mehr als 3.000 Jahren wurden die Pharaonen Ägyptens im sagenumwobenen Tal der Könige begraben. Viele dieser Gräber waren bereits in der Antike bekannt und galten als Touristenattraktionen – römische und griechische Graffiti zeugen davon. Die koptischen Christen verwandelten sogar einige offene Gräber in Kapellen. Seit Jahrhunderten stehlen Grabräuber aus nahe gelegenen Orten Kunstwerke aus Gräbern und Tempeln und verkaufen sie auf dem Markt. Aus diesem Grund sind von vielen Gräbern nichts weiter als Hohlräume übrig geblieben. Und doch stießen Menschen von nah und fern immer wieder auf inzwischen vergessene Gräber mit Fundstücken, Bildern oder ungeöffneten Kammern. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] hat vor Kurzem eine Benachrichtigung über ein Grab erhalten, das möglicherweise in gutem Zustand ist."
 lepsius.501.g: "Wir haben dafür keine Zeit."
 lepsius.502.t: "Sand, viel Sand"
 lepsius.502.d: "Als die Archäologen vor Ort eintreffen, stellen sie fest, dass es zwar Hinweise auf ein Königsgrab gibt, die Ausgrabungsstätte jedoch vollständig mit Sand begraben ist."
 lepsius.502.f: "Niemand hätte gedacht, dass die Ausgrabung einfach sein würde. Doch als ein Einheimischer die Archäologen dorthin führt, wo sich angeblich das Grab befindet, sehen die Expeditionsteilnehmer als Erstes eine senkrechte Felswand, an der sich eine Düne aus Sand und Schlamm festklammert. Von einem Grab ist nirgends eine Spur zu sehen. Auf Nachfrage erklärt der Einheimische, dass er den Eingang zum Grab nie gesehen habe; Aber sein Großvater wusste es immer noch und sein Vater sah es als Kind zumindest ansatzweise. Aufgrund der Regenfälle ist das Tal der Könige anfällig für Schlammverschiebungen; und der Wind und der ägyptische Sand sind dafür berüchtigt, jahrhundertealte Stätten zu verbergen. Obwohl einige der Assistenten Zweifel daran äußern, dass die Grabstätte überhaupt existiert, bleibt [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] entschlossen, nach dem verlorenen Grab zu suchen. Um die über die Jahre angehäuften Sandmassen abzutransportieren, bedarf es allerdings einiger zusätzlicher Mittel."
 lepsius.502.g: "Wir brauchen mehr Werkzeuge!"
 lepsius.503.t: "Der Felsbrocken"
 lepsius.503.d: "Nachdem das Team beharrlich alle zum Verkauf stehenden Schaufeln in einem Umkreis von 10 Meilen verbraucht hatte, grub es den Eingang aus – nur um sich mit einem massiven Felsbrocken konfrontiert zu sehen, der den Eingang blockierte."
 lepsius.503.f: "Tagelanges mühsames Sand- und Schlammschaufeln sollte belohnt werden – so hofften es zumindest die Expeditionsteilnehmer. Als der Türsturz der Grabanlage tatsächlich entdeckt wurde, steigerte sich die deprimierte Stimmung der erschöpften Männer zur Euphorie. In nur wenigen Stunden wurde die Fassade des Eingangs freigelegt. Doch kaum war man weiter vorangeschritten, entdeckte man den Grund, warum dieses Grab von Plünderungen verschont geblieben war: Ein riesiger Felsbrocken, der vermutlich vor Jahrzehnten, wenn nicht Jahrhunderten, aus der Felswand herausgebrochen war, versperrte den Eingang. Nicht einmal ein kleiner Junge konnte sich an ihm vorbeidrängen, denn Schutt und erstarrter Schlamm füllten den Rest des Korridors wie Mörtel. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] stand vor einer wichtigen Entscheidung: Wie sollte man versuchen, das Hindernis vom Grabeingang zu entfernen?"
 lepsius.503.g: "Wir nutzen ausgefeilte Methoden."
 lepsius.503.h: "Wir verwenden ausgefeilte Mechanik."
 lepsius.503.i: "Wir verwenden hochentwickeltes Nitroglycerin."
 lepsius.503.j: "Wir verwenden reine Muskelkraft."
 lepsius.504.t: "Grab durch Nitroglycerin zerstört"
 lepsius.504.d: "Leider brachte der Einsatz von Sprengstoff mehr Probleme als Nutzen: Die Explosion zerstörte nicht nur den Felsen, sondern die gesamte Grabanlage!"
 lepsius.504.f: "Die Organisation von Sprengstoffen war zwar nicht das einfachste Unterfangen, konnte aber innerhalb weniger Tage gelöst werden, als das Team die Reserven zu einem guten Preis von einem Geologen kaufen konnte. Keiner der Expeditionsteilnehmer hätte sich selbst als Abbruchexperten bezeichnet, doch [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] war der Meinung, dass der Umgang mit hochgefährlichem Nitroglycerin keine besonders große Herausforderung darstelle. Vielleicht wäre es besser gewesen, vorher einen Experten zu konsultieren, denn unsere Leute haben die benötigte Menge wohl falsch eingeschätzt: Statt nur den Felsbrocken zu sprengen, hat die archäologische Expedition die gesamte Felswand gesprengt! Nur durch ein Wunder konnten sich die Expeditionsteilnehmer retten, bevor eine Kaskade von Felsbrocken vom nächsten Berg herabstürzte und das gesamte Gebiet in Schutt und Asche legte. Was auch immer sich hinter dem Eingang befand: Es muss nun unwiederbringlich zerstört sein ..."
 lepsius.504.g: "Vielleicht war das übertrieben?"
 lepsius.505.t_archaeology: "Galeriegemälde"
 lepsius.505.t_engine: "Eine zerstörte Galerie"
 lepsius.505.t_muscular: "Galeriegemälde"
 lepsius.505.d_archaeology: "Nach einer ausführlichen archäologischen Untersuchung und anschließender sorgfältiger Entfernung des Felsbrockens mit modernsten Methoden betreten unsere Archäologen die gut erhaltene Galerie des Pharaonengrabs."
 lepsius.505.d_engine: "Mithilfe einer Maschine gelingt es dem Team, den Felsbrocken zu entfernen – mit negativen Nebenwirkungen."
 lepsius.505.d_muscular: "Nachdem wir einen mächtigen Italiener angeheuert hatten, konnten wir den Felsbrocken entfernen – und die gut erhaltene archäologische Ausgrabungsstätte betreten."
 lepsius.505.f_archaeology: "Ähnlich einer komplizierten Operation näherten sich die Archäologen dem Felsbrocken. Sie obduzierten den Stein, überprüften das Material und pflückten ihn mit Schaufeln und Spitzhacken. Nach eingehender Untersuchung entschieden sie, den Klumpen in einem aufwendigen und langwierigen Verfahren in kleinen Schichten so zu entfernen, dass die Hieroglyphen am Eingang nicht beschädigt wurden. Es war ein arbeitsintensiver Prozess, der sich aber definitiv gelohnt hat. Mit Öllampen in der Hand tappten sie den ersten Korridor entlang und erblickten die Schönheit des alten Ägypten: An den Wänden flackerten Gemälde in bemerkenswertem Zustand, die Bauern auf den Feldern, den Hof des Pharaos und die Götter des Gerichts zeigten. Auch wenn die Archäologen keine Artefakte finden konnten – Spuren von Plünderungen ließen sich durchaus finden –, lädt allein das vielversprechende Ensemble zu einer gründlichen Erkundung des Grabes ein."
 lepsius.505.f_engine: "Modernste Technik soll bei unserer Ausgrabung am Grab des unbekannten Pharaos helfen: mit einer Maschine, die den Felsbrocken über einen Mörtel aus dem Eingangsschacht ziehen soll. Zunächst bewegte sich der Stein nicht, also stellten unsere Wissenschaftler den Motor auf volle Leistung. Ein verhängnisvoller Fehler: Denn obwohl sich der Stein kurzzeitig aus seinem Halt löste und den Hang hinaufgeschleift wurde, löste er sich bald vom Gürtel und rollte mit voller Wucht zurück in Richtung Grab – und richtete dort tödliche Zerstörungen an! [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] und seine Assistenten stürmten schnell in den freigelegten Gang, stellten jedoch schockiert fest, dass der Stein nicht nur eine einst wunderschön bemalte Galerie völlig zerstört hatte, sondern auch eine wichtige Wand, die für die Statik der gesamten Anlage diente, schwer beschädigt hatte ..."
 lepsius.505.f_muscular: "Zurück in Luxor fanden unsere Expeditionsteilnehmer eine beeindruckende Figur. Es war ein Mann aus Padua, der ursprünglich nach Ägypten gekommen war, um dem Pascha ein hydraulisches Gerät zu zeigen, das bei der Überschwemmung des Nils helfen sollte. Das Geschäft war jedoch erfolglos. Der Riese, etwa zwei Meter groß und mit den Muskeln eines Stiers ausgestattet, sagte, er habe zuvor als \"Herkules von Patagonien\" im Zirkus gearbeitet. Einer glaubwürdigen Aussage seines englischen Dieners zufolge konnte er sechs Männer auf einmal heben. Es waren diese besonderen Fähigkeiten, die uns überzeugten, ihn mit der Freischaltung des Zugangs zu beauftragen. Kaum an der Stelle angekommen, rollte er den Stein mit einer bewundernswerten Aktion zur Seite. Mit Öllampen in der Hand bewaffnet stürmten unsere Archäologen in den Korridor und erblickten die Schönheit des alten Ägypten: An den Wänden flackerten Gemälde in bemerkenswertem Zustand von Bauern auf Feldern, dem Gericht des Pharaos und den Göttern des Gerichts. Allein das vielversprechende Ensemble lädt zu einer gründlichen Erkundung des Grabes ein."
 lepsius.505.g: "Die Pracht des alten Ägypten!"
 lepsius.505.h: "Hoppla."
 lepsius.506.t_archaeology: "Ein schöner Sarkophag"
 lepsius.506.t_engine: "Ein gefährdeter Sarkophag"
 lepsius.506.t_muscular: "Ein zerbrochener Sarkophag"
 lepsius.506.d_archaeology: "Mit Staunen und Ehrfurcht betreten unsere Archäologen die Königskammer – und sichern einen wunderschönen Sarkophag und eine Mumie aus der 20. Dynastie."
 lepsius.506.d_engine: "Der durch die Maschine verursachte Schaden ist in der Grabkammer deutlich zu erkennen: Die Archäologen haben kaum Zeit für eine Bestandsaufnahme, stattdessen bemühen sie sich, den Sarkophag so schnell wie möglich nach draußen zu schaffen!"
 lepsius.506.d_muscular: "Unseren Archäologen gelingt es, in die unversehrte und wunderschön dekorierte Grabkammer des unbekannten Pharaos zu gelangen – doch dann passiert ein unvorhergesehenes ... Missgeschick."
 lepsius.506.f_archaeology: "Es war ein wahrhaft historisches Erlebnis, als unsere Archäologen unter der Leitung von [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] die eigentliche Grabkammer betraten. Neben einigen Krügen mit Opfergaben und einem mumifizierten Hund erwartete sie eine besondere Überraschung: Tatsächlich ruhte der Sarkophag zusammen mit der Mumie des Unbekannten Pharaos noch dort, wo er vor mehr als 3.000 Jahren begraben wurde! Die Wissenschaftler betasteten den überraschenden Fund sorgfältig, wischten den Staub weg und erkannten einen gut erhaltenen Holzsarg, nachdem er den Deckel entfernt hatte, der von Grabräubern beschädigt worden war. Unser Museum wurde um ein einzigartiges Zeugnis der ägyptischen Kultur bereichert!"
 lepsius.506.g: "Die Archäologie hat den Tag gerettet."
 lepsius.506.h: "Bewegen Sie ihn schnell!"
 lepsius.506.i: "Hoppla."
 lepsius.511.t: "Eine Frage der Ehre"
 lepsius.511.d: "Nach Angaben einiger Bauern hisste vor einigen Tagen eine ausländische Expedition die Flagge ihres Landes auf der Cheops-Pyramide. Die Patriots in unserem Team fühlen sich herausgefordert – und wollen das Gleiche tun."
 lepsius.511.f: "Die Expedition befand sich in der Nähe von Kairo, als die Nachricht alle Teilnehmer schockierte: Letzte Woche hatte offenbar jemand die Flagge seines eigenen Landes auf der Spitze der Pyramide von Gizeh angebracht! Solche Allüren sind in der Wissenschaft eigentlich verboten, und es bleibt unbekannt, ob der Pascha einer solch triumphalen Geste zustimmte. Nur eines ist klar: Während der gesamten Expedition herrschte das brennende Gefühl, dasselbe zu tun, und sei es nur, um die eigene Heimat nicht unehrenhaft erscheinen zu lassen."
 lepsius.511.g: "Wir haben dafür keine Zeit."
 lepsius.511.h: "Wir machen es – für [ROOT.GetCountry.GetAltName('AKK')]!"
 lepsius.512.t: "Dämmerung"
 lepsius.512.d: "Die Expedition bricht am frühen Morgen auf, um die Große Pyramide von Gizeh zu besteigen!"
 lepsius.512.f_wine: "Die Teilnehmer der Pyramidenbesteigung stehen bereits um 5 Uhr morgens auf; Gestern haben sie eine fünf Meter hohe Flagge vorbereitet und das riesige Banner an der großen Sphinx vorbei zur Cheopspyramide gerollt. Ein kalter Truthahn steht zum Frühstück bereit, einige sind noch erschöpft von der gestrigen Arbeit an der Fahne. Ein Teil der Expedition bleibt mit einem aufgeschlagenen Zelt am Fuße der Sphinx, der Rest macht sich auf den Weg zur Pyramide. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] verspricht, dass es an der Spitze der Pyramide eine extra gerettete Flasche Wein zur Feier geben wird."
 lepsius.512.f_no_wine: "Die Teilnehmer der Pyramidenbesteigung stehen bereits um 5 Uhr morgens auf; Gestern haben sie eine fünf Meter hohe Flagge vorbereitet und das riesige Banner an der großen Sphinx vorbei zur Cheopspyramide gerollt. Ein kalter Truthahn steht zum Frühstück bereit, einige sind noch erschöpft von der gestrigen Arbeit an der Fahne. Ein Teil der Expedition bleibt mit einem aufgeschlagenen Zelt am Fuße der Sphinx, der Rest macht sich auf den Weg zur Pyramide. Erst als sich die Gruppe der Großen Pyramide nähert, wird dem Militärattaché klar, dass [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] heute Morgen das Wichtigste vergessen hat: den Wein zum Anstoßen!"
 lepsius.512.g: "Ich hoffe, er bringt den besten Wein ..."
 lepsius.512.h: "Er hat den Wein vergessen?"
 lepsius.513.t: "Der Aufstieg"
 lepsius.513.d: "Der archäologische Leiter und der Militärattaché stehen am Fuß der großen Pyramide. Es herrscht Uneinigkeit darüber, wer das waghalsige Unternehmen leiten soll."
 lepsius.513.f: "Unser Team erreicht den Fuß der Großen Pyramide des Pharaos Cheops. Es stellt sich die Frage, wie viele Schritte es braucht, um in den Himmel zu gelangen – und [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] kann genau antworten, dass es 203 sind. Es gibt so viele Steinschichten, die es zu überwinden gilt. Unterdessen stellt sich die Frage, wer den Aufstieg anführen soll. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] hat bereits behauptet, dass er als Bergsteiger genauso geeignet sei ..."
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] soll uns weiterführen."
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName] soll uns weiterführen."
 lepsius.514.t: "Der ursprüngliche Eingang"
 lepsius.514.d: "Unser Team ist eine niedrigere Ebene der Pyramide erklommen. Sie befinden sich jetzt auf der siebzehnten Stufe, ganz in der Nähe des ursprünglichen Eingangs zur Grabkammer."
 lepsius.514.f: "Die erste Etappe ist geschafft. Unsere Expedition ist immer noch sehr nahe am Boden, hat aber eine Pause eingelegt. Unser Expeditionsleiter möchte den historischen Eingang zur Cheops-Pyramide genauer erkunden und mit einigen Ausgrabungshelfern ins Innere absteigen. Einige Expeditionsteilnehmer machen eine Pause, um zu Mittag zu essen. Jeder weiß, dass der Aufstieg von nun an gefährlicher wird."
 lepsius.514.i: "Dieser Ort ist gut genug für unsere Flagge."
 lepsius.515.t: "100 Schritte"
 lepsius.515.d: "Unser Team hat die hundertste Stufe der Pyramide erklommen. Die Truppe hat nun fast die Hälfte des Aufstiegs hinter sich."
 lepsius.515.f: "Hundert Schritte scheinen nicht viel zu sein, aber bei einer großen Gruppe, Gepäck und begrenztem Platz ist die Herausforderung ganz anders. Unser Banner wird immer noch aufgerollt und von fünf Männern getragen. Einige Mitglieder des Expeiditon verkünden bereits, dass die Aussicht zum jetzigen Zeitpunkt hoch genug sei. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] blickt derweil besorgt nach oben – denn die riskanteste Phase des Aufstiegs steht bevor."
 lepsius.516.t: "Der Herbst"
 lepsius.516.d: "Während der letzten Pyramidenstufe haben sich unser Anführer und seine Leute offenbar übertrieben – es kam zu einem verheerenden Zwischenfall!"
 lepsius.516.f: "Vielleicht war es ein menschlicher Fehler, vielleicht hat ein Plan nicht funktioniert, aber vielleicht hat uns das Schicksal für unsere Arroganz bestraft. Beim Aufstieg auf die Pyramiden rutschte jedoch ein Helfer auf einer Pyramidenstufe aus und riss die anderen Expeditionsteilnehmer samt Lasten mit in den Abgrund. Unser Expeditionsleiter und unser Militärattaché konnten das Schlimmste verhindern, wurden jedoch schwer verletzt. Manche Träger kamen mit Nachschub davon, andere klagen über Knochenbrüche. Das ehrgeizige Unterfangen, unsere Flagge auf der Großen Pyramide zu hissen, mussten wir abbrechen."
 lepsius.516.g: "Schade für uns alle."
 lepsius.517.t: "Auf der Spitze der Großen Pyramide"
 lepsius.517.d: "Ein wirklich herausragender Tag für das Expeditionsteam und unser Land – die [ROOT.GetCountry.GetAdjectiveNoFlag|l]e Flagge weht über der Großen Pyramide von Gizeh!"
 lepsius.517.f: "Ein großartiger Moment für die Archäologie, ein großartiger Moment für [ROOT.GetCountry.GetAltName('AKK')]. Unsere Expedition bestieg die Spitze der Cheops-Pyramide und feierte diesen Erfolg mit einer kleinen Feier. Die Namen von Champollion, Lepsius und Rosellini erklangen im Einklang mit einem herzlichen \"Hip-Hip-Hurra!\" und schließlich hissten die Patrioten die Flagge. Im Licht der untergehenden Sonne erstrahlt unser Banner nun über dem gesamten Niltal!"
 lepsius.517.g: "Hissen Sie die Flagge [ROOT.GetCountry.GetAltName('GEN')] – und Prost!"
 lepsius.517.h: "Hissen Sie die Flagge [ROOT.GetCountry.GetAltName('GEN')]!"
 lepsius.521.t: "Das Ischtar-Tor"
 lepsius.521.d: "Bei ihren Ausgrabungen in Babylon haben Archäologen die kolossalen Überreste des sagenumwobenen Ischtar-Tors entdeckt. Das historische Stadttor ist in bemerkenswert gutem Zustand."
 lepsius.521.f: "Bei ihren Ausgrabungen auf dem Gelände der antiken babylonischen Hauptstadt fanden Ausgrabungsarbeiter zunächst glasierte Ziegelsteine, die auf einen repräsentativen, repräsentativen Bau schließen ließen. Je weiter die Archäologen vor Ort gruben, desto mehr Funde machten sie. Schließlich konnten sie sogar die Mauern und Türme des hervorragend erhaltenen Stadttors erkennen, auf dem Löwen, Stiere und Fabelwesen stolzierten. Expeditionsleiter [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] präsentierte unserer Regierung einen gewagten Plan: Das gesamte Tor demontieren und in der Hauptstadt originalgetreu wieder aufbauen. Ein kostspieliges Unterfangen mit vielen Unwägbarkeiten – und zugleich so attraktiv, dass sich führende Intellektuelle und die Museumsleitung der Idee angeschlossen haben."
 lepsius.521.g: "Nimm einfach ein paar Teile. Es soll dort bleiben, wo es ist."
 lepsius.521.h: "Es soll nach [SCOPE.sState('capital_scope').GetCityHubName] transportiert und rekonstruiert werden."
 lepsius.522.t: "Transport von Ziegeln aus Mesopotamien"
 lepsius.522.d: "Eine vollständige Charge Ziegel für die Ziegelrekonstruktion ist heute im Museum unter [SCOPE.sState('capital_scope').GetCityHubName] eingetroffen."
 lepsius.522.f: ""
 lepsius.522.g: "Ich liebe den Geruch mesopotamischer Ziegel am Morgen."
 lepsius.523.t: "Ischtar-Ziegel in fremder Hand"
 lepsius.523.d: "Wir sind nicht die Einzigen, die in den letzten Jahrzehnten in Babylon gegraben haben. Es stellt sich heraus, dass eine ausländische Nation auch einige Lieferungen der Ziegel besitzt, die für den Wiederaufbau des Ischta-Tors benötigt werden. Wir sind gezwungen, demütig zu fragen."
 lepsius.523.f: ""
 lepsius.523.g: "Wir werden uns wahrscheinlich demütigen."
 lepsius.523.h: "Für ein paar wertlose Ziegelsteine? Niemals!"
 lepsius.524.t: "Der Feind blockiert unseren Ziegeltransport!"
 lepsius.524.d: "Die lang erwartete Lieferung mesopotamischer Ziegel für den Wiederaufbau des Ischtar-Tors in unserem Museum ist nach Monaten nicht eingetroffen. Wir erhielten die Nachricht, dass der Transport während des Krieges blockiert war."
 lepsius.524.f: ""
 lepsius.524.g: "Das ist Sabotage!"
 lepsius.525.t: "Eine besondere Gebühr"
 lepsius.525.d: "Offenbar versucht das Ausgrabungsland, aus dem die Ziegel für das Ischtar-Tor stammen, von unserem Vorhaben zu profitieren. Beim Export der Ziegel wurde eine \"Sondergebühr\" auf die Ziegel erhoben!"
 lepsius.525.f: ""
 lepsius.525.g: "Wir bezahlen jedes Stück Stein ..."
 lepsius.526.t: "Kleiner Transport von Ziegeln aus Mesopotamien"
 lepsius.526.d: "Unbekannte Umstände haben dazu geführt, dass unser Schiff dieses Mal nur zur Hälfte mit den Ziegeln des Ischtar-Tors gefüllt war."
 lepsius.526.f: ""
 lepsius.526.g: "Was ist so schwer daran, ein paar Steine ​​zu versenden?"
 lepsius.527.t: "Eine Schiffsladung Ziegel kommt im Hafen an"
 lepsius.527.d: "Eine ungewöhnlich große Menge an Ziegeln, die für den Wiederaufbau des Ischtar-Tors benötigt wurden, sind heute im Museum angekommen. Offenbar geht die Verladung in Mesopotamien besser voran als erwartet."
 lepsius.527.f: ""
 lepsius.527.g: "Ah, noch mehr Steine!"
 lepsius.528.t: "Schlechte Steine"
 lepsius.528.d: "Als wir uns die in [SCOPE.sState('capital_scope').GetCityHubName] eingetroffenen Steine ​​ansahen, stellten unsere Kuratoren leider fest, dass einige der Kisten völlig unbrauchbar waren. Im Guten wie im Schlechten müssen wir auf sie verzichten."
 lepsius.528.f: ""
 lepsius.528.g: "Meine wertvollen Steine ​​– nein!"
 lepsius.529.t: "Diplomatische Niederwerfung"
 lepsius.529.d: "Eine fremde Nation hat sich vor der Weltöffentlichkeit gedemütigt, nur um uns um einige wertlose archäologische Artefakte zu betteln, die uns ein Antiquar vor ein paar Jahren verkauft hat. Natürlich haben wir die Geste gerne angenommen und uns von diesem Schrott befreit."
 lepsius.529.f: ""
 lepsius.529.g: "Beeindruckend!"
 lepsius.530.t: "Ischtar-Tor rekonstruiert!"
 lepsius.530.d: "Nach jahrelanger Arbeit und mühsamer Zusammenstellung von Zehntausenden babylonischen Fragmenten erstrahlt das legendäre Ischtar-Tor in neuem Glanz – und zwar in Originalgröße in unserem Museum!"
 lepsius.530.f: "Das Ischtar-Tor war das achte Tor zur Innenstadt Babylons. Es wurde etwa 575 v. Chr. im Auftrag von König Nebukadnezar II. auf der Nordseite der Stadt errichtet. Es war Teil eines großen ummauerten Prozessionswegs, der in die Stadt führte. Die Wände bestanden aus glasierten Ziegeln, größtenteils in Blau, mit Tieren und Gottheiten in Flachreliefs in Abständen, auch diese aus Ziegeln, die unterschiedlich geformt und gefärbt waren. Die Vorderseite des Tores weist ein Flachrelief mit einem sich wiederholenden Muster aus Bildern von zwei der Hauptgötter des babylonischen Pantheons auf. Marduk, die nationale Gottheit und Hauptgottheit, mit seinem Dienerdrachen Mušḫuššu. wird als Drache mit schlangenartigem Kopf und Schwanz, einem schuppigen Löwenkörper und kräftigen Krallen als Hinterfüßen dargestellt. Marduk galt als göttlicher Kämpfer des Guten gegen das Böse, und die Beschwörungen der Babylonier suchten oft seinen Schutz. Der zweite Gott, der im Reliefmuster des Ischtar-Tors dargestellt ist, ist Adad (auch bekannt als Ishkur), dessen heiliges Tier der Auerochse war, ein inzwischen ausgestorbener Vorfahre des Viehs. Adad hatte Macht über zerstörerische Stürme und wohltuenden Regen. Das Design des Ischtar-Tors umfasst auch lineare Ränder und Rosettenmuster, die oft als Symbole der Fruchtbarkeit angesehen werden. Die Ziegel des Ischtar-Tors wurden aus fein strukturiertem Ton hergestellt, der in Holzformen gepresst wurde. Jedes der Tierreliefs wurde ebenfalls aus Ziegeln hergestellt, die durch das Pressen von Ton in wiederverwendbare Formen geformt wurden."
 lepsius.530.g: "Großartig!"
 lepsius.531.t: "Die Legende vom Lamassu"
 lepsius.531.d: "Unsere Archäologen haben die Geschichte eines außergewöhnlich prächtigen Lamassu gehört, der vor langer Zeit verloren gegangen sein soll und sich irgendwo in der kurdischen Region befindet."
 lepsius.531.f: "Es war an einem Abend, als unser Team die Zelte aufbaute, das Lagerfeuer anzündete und das Hammelfleisch zum Abschluss des Tages zubereitete. In den schwelenden Schwarz-, Blau- und Rottönen der Morgendämmerung kam ein alter Hirte im Lager an und bat um Proviant. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] gehorchte und bekam eine erstaunliche Geschichte erzählt. Vor etwa 30 Jahren soll eine weitere archäologische Expedition in dieser Gegend nach Schätzen und außergewöhnlichen Kunstwerken gesucht haben, um die örtliche Museumsleitung zu beeindrucken und mit Ruhm und Ehre nach Hause zurückzukehren. Der Höhepunkt der Ausgrabung war ein riesiger Lamassu, der den Einheimischen aufgrund seiner monumentalen Größe und seines guten Zustands noch heute bekannt ist. Doch beim Transport kam es zu einem Unfall. Während Dutzende Männer die riesige Statue des mesopotamischen Hybriden bewegten, überwarfen sich die Expeditionsleiter mit dem örtlichen kurdischen Stamm. Offenbar wollten sie die angeworbenen kurdischen Helfer um ihren Lohn prellen. Also überfiel der Stamm die Expeditionsmitglieder und nahm, was angeblich ihnen gehörte. Der Lamassu blieb jedoch dort, wo er war – und wartet immer noch darauf, in der kurdischen Region geborgen zu werden. Der Hirte hat angeboten, uns als Gegenleistung für unsere Hilfe den Standort des legendären Lamassu zu verraten."
 lepsius.531.g: "Es ist viel zu gefährlich, sich wegen solcher Märchen unnötig in Gefahr zu bringen."
 lepsius.531.h: "Wir müssen dieses Lamassu um jeden Preis zurückgewinnen!"
 lepsius.532.t: "Auf der Suche nach dem Lamassu"
 lepsius.532.d: "Unsere Expedition hat sich auf die gefährliche Reise in die Kurdenregion begeben. Manche plädieren wegen der größeren Erfolgsaussichten für eine Trennung."
 lepsius.532.g: "Wir sollten uns nicht trennen."
 lepsius.532.h: "Wir sollten die Expedition aufteilen."
 lepsius.533.t: "Geschenke"
 lepsius.533.d: "Unsere Expedition hat sich mit den Clanführern getroffen, um die Erlaubnis zu erhalten, das Gebiet friedlich zu durchqueren und die Lamassu zu bergen."
 lepsius.533.f: "Es erwies sich als unerwarteter Vorteil, die Expedition nicht aufzuteilen: Die Trägheit des Gepäckzuges führte dazu, dass die Anführer des örtlichen kurdischen Clans uns schneller fanden, als wir erwartet hätten. Bald wurden der Expeditionsleiter und der Militärattaché vor die Patriarchen gebracht, die als die eigentlichen Herrscher dieser Gegend gelten. Sie stießen auf ein unangenehmes Misstrauen. Offenbar leben bei ihnen unangenehme Erinnerungen an die letzte archäologische Expedition weiter. Es wird auch erwartet, dass wir als Gäste Geschenke mitbringen. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] hatte für diesen Fall Vorkehrungen getroffen, aber offenbar reichen die beschafften Materialien für viele der Anführer einfach nicht aus, um sie von unseren Absichten zu überzeugen."
 lepsius.533.g: "Wir bieten edle Stoffe an."
 lepsius.533.h: "Erinnern Sie sie an ihre Ehre und Gastfreundschaft."
 lepsius.533.i: "Zeigen Sie ihnen eine Geste der Unterwerfung."
 lepsius.534.t: "Beleidigt"
 lepsius.534.d: "Der Versuch, die kurdischen Patriarchen für sich zu gewinnen, scheiterte völlig – stattdessen brachten wir sie gegen uns auf. Eine Eskalation der Lage gefährdet unsere gesamte Expedition!"
 lepsius.534.g: "Wachen!"
 lepsius.534.h: "Verteidigen!"
 lepsius.534.i: "Fliehen!"
 lepsius.535.t: "Expeditionsteilnehmer von Kurden entführt"
 lepsius.535.d: "Nach einer erfolglosen Suche der verkleinerten Expedition müssen sie bei ihrer Rückkehr mit Entsetzen feststellen, dass einige Mitglieder des zurückgebliebenen Teams Opfer eines kurdischen Angriffs waren."
 lepsius.535.f: "Die Strategie der Aufteilung der Expedition erwies sich später als verheerender Fehler. Offenbar wartete ein kurdischer Stamm nur auf Beute und nutzte die Gelegenheit, als sich der bewaffnete Teil unter dem Militärattaché vom Rest des Konvois trennte. Da die meisten der mitgenommenen Materialien für die Plünderer von geringem Wert waren, entführten sie unvermittelt ein gutes Dutzend Helfer als Geiseln, offenbar in der Überzeugung, ein Lösegeld für sie erpressen zu können. Das Expeditionsteam entschied sich jedoch, ein solches Angebot nicht anzunehmen – es könnte Präzedenzfälle für die Zukunft schaffen. Während [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] darauf besteht, mit den kurdischen Führern zu verhandeln, besteht [SCOPE.sCharacter('lepsius_military_attache').GetFullName] darauf, das kurdische Lager anzugreifen und den Plünderern eine Lektion zu erteilen."
 lepsius.535.g: "Versuchen Sie zu verhandeln."
 lepsius.535.h: "Greife sie an!"
 lepsius.536.t: "Verhandlung gescheitert!"
 lepsius.538.t: "Die Nacht der Sorgen"
 lepsius.538.d: "Die Suche nach dem Lamassu scheiterte."
 lepsius.538.f: "Das Expeditionsteam verlässt die Kurdenregion mit leeren Händen. Wie getretene Hunde bahnen sie sich nachts ihren Weg durch die Hügel, um den alten Weg wieder aufzunehmen. Der Verlust von Menschen und Material bedrückt alle Expeditionsteilnehmer. Die Frage nach der Sinnhaftigkeit der gesamten Reise hinterlässt Melancholie und Niedergeschlagenheit."
 lepsius.538.g: "Wir werden zurück kommen..."
 lepsius.539.t: "Ein edler Tod"
 lepsius.539.d: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName], unser Militärattaché, ist im Kampf mit den Kurden gefallen!"
 lepsius.539.f: "Es war ein erbitterter Kampf, aber unsere wenig ausgebildeten Truppen konnten den bewährten und mutigen kurdischen Kämpfern kaum etwas entgegensetzen. Der Attaché befahl den Rückzug und blieb mit seinen eigenen Männern zurück, um unseren Rücken zu decken. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] konnte nur einen letzten Blick zurück werfen und sehen, wie er geschlagen zu Boden fiel. Er verschaffte dem Team wertvolle Zeit, sich in Sicherheit zu bringen, während für ihn selbst jede Hilfe zu spät kam."
 lepsius.539.g: "Er hat sein Leben für unseres gegeben."
 lepsius.540.t: "Der Lamassu"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] konnte die Kurden von unserem Anliegen überzeugen. Der Weg zur Wiederherstellung der Lamassu ist klar."
 lepsius.540.d_victory: "Wir haben einen militärischen Sieg über den einheimischen kurdischen Stamm errungen und uns den Weg zum legendären Lamassu geebnet!"
 lepsius.540.f: "Es war nicht einfach, die Kurden von unseren guten Absichten zu überzeugen, aber die nützlichen Eigenschaften unseres Expeditionsleiters machten dieses scheinbar unmögliche Unterfangen zu einem Erfolg. Nach nur wenigen Tagen der Suche fanden wir das beschriebene Lamassu in der Nähe einer Klippe. Eine majestätische Erscheinung, die über das ganze Tal strahlt! Unsere Archäologen konnten mit Freude feststellen, dass der Koloss nahezu unbeschädigt ist. Es ist bereits klar, dass es das Hauptausstellungsstück unserer mesopotamischen Sammlung sein wird."
 lepsius.540.f_victory: "Nach einem harten und erbitterten Kampf gelang es unserem heldenhaften Attaché [SCOPE.sCharacter('lepsius_military_attache').GetFullName] dank seiner überlegenen Fähigkeiten (und ein wenig Hilfe seiner Soldaten), den Feind in die Flucht zu schlagen. Beeindruckt von dieser Lektion wagten die Kurden es nicht länger, der Wiederherstellung der Lamassu im Wege zu stehen. Nach nur wenigen Tagen der Suche fanden wir das beschriebene Lamassu in der Nähe einer Klippe. Eine majestätische Erscheinung, die über das ganze Tal strahlt! Unsere Archäologen konnten mit Freude feststellen, dass der Koloss nahezu unbeschädigt ist. Es ist bereits klar, dass es das Hauptausstellungsstück unserer mesopotamischen Sammlung sein wird."
 lepsius.540.g: "Es ist wunderbar!"
 lepsius.551.t: "Der archäologische Unfall"
 lepsius.551.d: "There was a terrible accident on an excavation site - Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has disappeared!"
 lepsius.551.g: "Was ist mit [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] passiert?"
 lepsius.552.t: "Das Labyrinth"
 lepsius.552.g: "Ich hoffe, dass uns keine stierähnlichen Fabelwesen begegnen…"
 lepsius.553.t: "Das Labyrinth – noch einmal"
 lepsius.553.g: "Es ist ein echtes Déjà-vu!"
 lepsius.554.t: "Halle der Delfine"
 lepsius.554.g: "Zeus - go left."
 lepsius.554.h: "Demeter and Persephone - go right."
 lepsius.554.i: "Artemis - go upstairs."
 lepsius.554.j: "Poseidon - go downstairs."
 lepsius.555.t: "Halle der Sonne"
 lepsius.555.d: "Das Ende eines Korridors gabelt sich in drei Fahrspuren. An der Wand sind Reste eines Freskos zu finden."
 lepsius.555.f: "On the fresco, the blue color shines towards [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]. The sky takes up the whole wall. Eos, the goddess of dawn, stands in the east and dominates the scene. Opposite her to the west is her husband Astraios, who is only recognizable as a silhouette at night. In between the sun shines at noon."
 lepsius.555.g: "Eos - take the left corridor."
 lepsius.555.h: "Astraios - take the right corridor."
 lepsius.555.i: "Helios - take the middle corridor."
 lepsius.556.t: "Halle der Frauen"
 lepsius.556.d: "Der Verlorene erreicht einen Raum, an dessen Ende sich vier offene Türen befinden. Davor stehen die kleinen Skulpturen von vier Frauen."
 lepsius.556.f: "The four sculptures show women of different ages and sexes. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] cannot determine whether they are goddesses or mortals. Their forms are primitive and limited to the essentials. Her color has long faded; what makes them different is the objects in their hands. The first holds a ball of yarn in her hand, from which she plucks a thread. The second is holding a mirror and looking at herself. The third is holding a snake. The last leads an arch."
 lepsius.556.g: "The Ball of Yarn - door I."
 lepsius.556.h: "The Mirror - door II."
 lepsius.556.i: "The Snake - door III."
 lepsius.556.j: "The Arch - door IV."
 lepsius.557.t: "Halle der Inseln"
 lepsius.557.g: "Rhodos."
 lepsius.557.h: "Delos."
 lepsius.557.i: "Euböa."
 lepsius.557.j: "Naxos."
 lepsius.558.t: "Zorn des Minotaurus"
 lepsius.558.g: "Was ist gerade da unten passiert?"
 lepsius.559.t: "The Tragic Death of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]"
 lepsius.559.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was found dead in his apartment under mysterious circumstances."
 lepsius.559.g: "Aber war es wirklich Selbstmord?"
 lepsius.560.t: "Aus dem Labyrinth entkommen!"
 lepsius.560.d: "After finally escaping the maze, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] can tell [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] colleagues about the incredible discovery. To prove that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] hadn't gone mad, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] brought with [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] a striking piece of evidence that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had found in the depths of the labyrinth."
 lepsius.560.g: "Könnte dies ... das legendäre Labyrinth von Daidalos gewesen sein?"
 lepsius.561.t: "Die geheimnisvolle Pyramide"
 lepsius.561.d: "Unsere archäologische Expedition hat eine bisher unentdeckte Pyramide entdeckt, die von der Selva von Yucatec halb verschluckt wurde. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] ist bereits auf Überlieferungen über diesen Ort gestoßen und beschließt, einen Eintrag zu versuchen..."
 lepsius.561.g: "Ich habe da ein ganz mieses Gefühl."
 lepsius.561.h: "Interessant. Du gehst zuerst."
 lepsius.562.t: "Das Glyphen-Rätsel"
 lepsius.562.d: "Am Ende eines langen, mit Kragsteinen versehenen Ganges steht eine Tafel aus behauenem Stein, die ein Rätsel enthält. Vier vertiefte Kartuschen, jede mit dem Antlitz eines großen Maya-Gottes, können eingedrückt werden; das Mauerwerk riecht förmlich nach einer mechanischen Vorrichtung. Darunter steht ein Distichon: \"Ich erhebe mich im Osten in feuriger Herrlichkeit; im Zenit glühe ich wie Jade; in der Dämmerung steige ich den Weg unter die Erde hinab. Ich zähle die Tage und setze die Herrscher.\" Eine Kartusche muss gepresst werden."
 lepsius.562.g: "K'inich Ajaw (Sonnengott)."
 lepsius.562.h: "Chaac (Regen/Donner)."
 lepsius.562.i: "Itzamnaaj (Schöpfer/Himmel)."
 lepsius.562.j: "Kukulkan (Gefiederte Schlange)."
 lepsius.563.t: "Das Götterbild"
 lepsius.563.d_right: "Unser Archäologe erreicht das Ziel seines Vorhabens; der Mechanismus gibt nach und ein Heiligtum öffnet sich."
 lepsius.563.d_wrong: "Unser Archäologe gelangt in die innere Kammer, doch der leichte Zugang beleidigt die Vernunft - sicher hat das Gerät noch nicht sein letztes Wort gesprochen."
 lepsius.563.g: "Sanft ... vorsichtig ... tu es ..."
 lepsius.563.h: "Ich kenne diese Szene – es klappt nie. Schnapp dir das verdammte Artefakt und renne los!"
 lepsius.564.t: "Es ist eine Falle!"
 lepsius.564.g: "LAUFEN!"
 lepsius.564.h: "Ich hatte das kommen sehen, verdammt!"
 lepsius.565.t_right: "Verlassen der Pyramide"
 lepsius.565.t_wrong: "Ein archäologischer Rivale"
 lepsius.565.d_right: "Wider Erwarten überlebt [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] die Machenschaften in der Pyramide und schafft es, das Artefakt zu sichern!"
 lepsius.565.g: "Charlie, starte den Motor!"
 lepsius.565.h: "Ich kann diesen Kerl nicht ausstehen."
 lepsius.566.t: "Ein archäologisches Angebot"
 lepsius.566.d: "Ein privater Archäologe bietet uns ein hervorragendes Gut an, das er zuvor einem ausländischen Konkurrenten entrissen hatte."
 lepsius.566.f: "Eine private Expedition hat von einer Maya-Pyramide tief in der Selva von Yucatán berichtet. Ihr Leiter - leider ein Landsmann - behauptet, ein heiliges Idol beschafft zu haben, das durch eine seltsame Wendung gerade einem Fedora-tragenden [PREV.GetCountry.GetAdjectiveNoFlag|l]en Archäologen entrissen worden war. Letzterer, so heißt es, kam kurz darauf in einem heftigen Gefecht mit Hovitos-Tibesmännern ums Leben. Wie schattig die Umstände auch sein mögen, das Stück wäre eine einzigartige Attraktion für die präkolumbianische Sammlung unseres Museums - vorausgesetzt, wir können die Preisvorstellung erfüllen."
 lepsius.566.g: "Dieses Artefakt wird sich in unserer Sammlung prächtig machen!"
 lepsius.566.h: "Wir kaufen keine Artefakte von skrupellosen Grabräubern."
 lepsius.581.t: "Kehre in die verlorene Welt zurück"
 lepsius.581.g: "Er sollte seine Ehre wiederherstellen."
 lepsius.581.i: "Unsere nationalen Interessen übertrumpfen die verletzten Egos mieser Individuen."
 lepsius.582.t: "Der unbeachtete Entdecker kehrt triumphierend zurück"
 lepsius.582.d: "Zur Überraschung der gesamten wissenschaftlichen Welt ist [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] aus Yucatán zurückgekehrt – und hat Beweise für seine bizarren Behauptungen!"
 lepsius.582.g: "Er...hatte recht?"
 lepsius.583.t: "Der vernachlässigte Entdecker verschwindet in Yucatán"
 lepsius.584.t: "Betreten der verlorenen Welt"
 lepsius.584.d: "Nach Wochen hat die Expedition ein völlig unbekanntes Tal erreicht. Es scheint, dass [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] mit seinen fantastischen Behauptungen tatsächlich recht hat!"
 lepsius.584.g: "Unglaublich!"
 lepsius.585.t: "Fotografieren von Dinosauriern"
 lepsius.585.d: "Die neuen technischen Möglichkeiten ermöglichen es, die einzigartige Flora und Fauna der Verlorenen Welt auf der Kamera festzuhalten."
 lepsius.585.f: "Es ist, als würde man durch ein Fenster in eine Welt vor Millionen von Jahren blicken: Flugsaurier beherrschen den Himmel, riesige Brontosaurier erschüttern die Erde und gefährliche Raubvögel jagen unvorsichtige Beute. Auch die Pflanzen unterscheiden sich hier völlig von denen in anderen Teilen Yucatáns. Ein wissenschaftlicher Begleiter nutzte den Moment und machte mit seiner Kamera eine ganze Reihe Fotos, die als Beweis für die Heimat dienen. Möglicherweise können die Wissenschaftler dort die Frühgeschichte der Erde noch besser rekonstruieren."
 lepsius.585.g: "Bitte machen Sie \"ROAR\"!"
 lepsius.586.t: "Maya-Präsenz"
 lepsius.586.d: "Nach einer gründlichen Erkundung des Tals fasste der Expeditionsleiter einen riskanten Plan."
 lepsius.586.g: "Eine einmalige Gelegenheit!"
 lepsius.586.h: "Nehmen wir nur die notwendigsten Beweise mit."
 lepsius.587.t: "Die Expedition endet in einer schrecklichen Katastrophe"
 lepsius.587.d: "Nach einem Raubvogelangriff hat die Expedition die schlimmste Wendung genommen."
 lepsius.588.t: "Juwel von Kukulkan"
 lepsius.588.d: "Allen Widrigkeiten zum Trotz ist es unserem Expeditionsleiter gelungen, das legendäre Juwel von Kukulkan zu ergattern!"
 lepsius.589.t: "Helden kehren aus der verlorenen Welt zurück"
 lepsius.589.f: "Was für ein Tag! Nach einer gefährlichen und abenteuerlichen Reise bis ans Ende der Welt konnte unsere Expedition ihre außergewöhnlichen Funde teilen und der Öffentlichkeit beweisen, dass [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] kein Verrückter, sondern tatsächlich ein angesehener Wissenschaftler ist – und ein echter Held! Presse und Bevölkerung haben ihre Haltung eingehend revidiert und erkennen auch die Unterstützung der Regierung als die richtige Entscheidung an. Der Expeditionsleiter hat sich jedoch verpflichtet, die wahre Lage des Tals geheim zu halten, um die dortige Flora und Fauna zu schützen und die Gefahr von Wilderern zu verringern."
 lepsius.701.t: "Ausländer wollen unser Erbe stehlen"
 lepsius.701.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag]e Archäologen wurden heute beim Versuch erwischt, ein bedeutendes Artefakt illegal außer Landes zu bringen. Wie sollen wir reagieren?"
 lepsius.701.f: "Ausländer aus [SCOPE.sCountry('lepsius_smuggler_country').GetAltName('DAT')], denen wir Ausgrabungslizenzen erteilt haben, wurden heute beim Versuch erwischt, ein äußerst wertvolles Artefakt außer Landes zu transportieren. Nach geltendem Recht sind ausländische Archäologen verpflichtet, die Hälfte der gefundenen Artefakte an das Ausgrabungsland zu übergeben. Offenbar haben sie versucht, den Fund nach Hause zu schmuggeln, ohne dass wir ihn besichtigen konnten."
 lepsius.701.g: "Protest!"
 lepsius.701.h: "Was machen wir mit diesem alten Kauderwelsch?"
 lepsius.702.t: "Diplomatischer Vorfall"
 lepsius.702.d: "Leider haben die Behörden [SCOPE.sCountry('lepsius_protest_country').GetAltName('IN')] unseren Versuch bemerkt, das wertvolle Artefakt in unser Land zu bringen. Wie sollen wir reagieren?"
 lepsius.702.f: "Ab Ende des 19. Jahrhunderts basierte die häufigste Form der archäologischen Grabungsgenehmigung auf der gemeinsamen Nutzung von Fundstücken: Der Ausgräber übergab die Hälfte der gefundenen Artefakte an das Land, in dem er eine Ausgrabung durchführte. Die Behörden besichtigten die Fundstücke und achteten besonders darauf, dass die wertvollsten Stücke nicht außer Landes gebracht wurden. Allerdings kam es immer wieder vor, dass einige Länder darauf bestanden, ein ausgegrabenes Stück nicht herauszugeben; in anderen Fällen einigten sich die Parteien in einem Deal auf das weitere Vorgehen."
 lepsius.702.g: "Wer es findet, darf es behalten."
 lepsius.702.h: "Wir werden auf jeden Fall eine einvernehmliche Einigung finden."
 lepsius.702.i: "Spenden Sie das Artefakt als Zeichen unserer Philanthropie."
 lepsius.703.t: "Ausländer lachen uns aus!"
 lepsius.703.d: "Die Barbaren aus [SCOPE.sCountry('lepsius_smuggler_country').GetAltName('DAT')] machten sich über unsere Ansprüche lustig. Sie hätten nicht im Traum daran gedacht, uns an dem Fund teilhaben zu lassen – und haben das Artefakt in ihre Heimat zurückgeschmuggelt."
 lepsius.703.f: "Im viktorianischen Zeitalter gibt es unzählige Geschichten über Artefakte, die insbesondere von europäischen Mächten illegal aus dem Land gebracht wurden. Teilweise bestehen bis heute noch Erstattungsansprüche von Museen."
 lepsius.703.g: "Diese Arroganz ist unglaublich!"
 lepsius.704.t: "Konzessionen gewährt"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAltName('NOM')] ist uns entgegengekommen und hat unsere Ansprüche als berechtigt anerkannt. Diplomatisch und finanziell wollen sie uns Zugeständnisse machen. Sie bieten uns auch eine Reihe weiterer Fundstücke an, die uns zur Übergabe des kostbaren Schatzes ermutigen sollen."
 lepsius.704.f: "In vielen Fällen mutmaßlicher schwerer Raubüberfälle oder Diebstähle kamen die europäischen Mächte den Ausgrabungsländern entgegen. Nach den Ausgrabungen in Troja musste sich Schliemann beispielsweise der Hohen Pforte stellen, weil er Artefakte ins Ausland geschmuggelt hatte. Schliemann gab nicht nur einige Fundstücke ab, sondern zahlte auch das Fünffache der geforderten Summe. Sicherlich war ein solches Vorgehen nicht die charmanteste Art, international zu verhandeln, aber es war immer besser, als das Ausgrabungsland gänzlich zu betrügen, und wurde von den klagenden Ländern oft als eine gütliche Einigung akzeptiert."
 lepsius.704.g: "Ich bin froh, dass sie erkannt haben, dass sie falsch lagen."
 lepsius.706.t: "Bedeutendes Artefakt angekommen!"
 lepsius.706.d: "Mit etwas Verspätung ist das wertvolle Artefakt heute endlich im Museum angekommen. Dafür hat sich der Regisseur bereits einen ganz besonderen Ort ausgesucht!"
 lepsius.706.f: "Bedeutende Artefakte sind der Stolz jeder Ausstellung und jedes Museums. Glücklich, dass ein Land solche Juwelen sein Eigen nennen kann!"
 lepsius.711.t: "Maske von Tutanchamun"
 lepsius.711.d: "Nach der Entdeckung des verlorenen Grabes von Tutanchamun konnten unsere Archäologen ein ganz besonderes Artefakt bergen: die Maske des Pharaos!"
 lepsius.711.f: "Die Maske von Tutanchamun ist eine goldene Maske des altägyptischen Pharaos Tutanchamun aus der 18. Dynastie. Die Totenmaske ist eines der bekanntesten Kunstwerke der Welt und ein herausragendes Symbol des alten Ägypten. Es trägt das Abbild von Osiris, dem ägyptischen Gott des Jenseits, ist 54 Zentimeter groß, wiegt über 10 Kilogramm oder 321,5 Feinunzen und ist mit Halbedelsteinen verziert. Auf den Schultern der Maske ist in Hieroglyphen ein alter Zauberspruch aus dem Totenbuch eingraviert. Das Gesicht stellt das Standardbild des Pharaos dar, und das gleiche Bild wurde von Ausgräbern an anderer Stelle im Grab gefunden, insbesondere in den Wächterstatuen. Laut dem Ägyptologen Nicholas Reeves ist die Maske \"nicht nur das typische Bild aus Tutanchamuns Grab, sie ist vielleicht das bekannteste Objekt aus dem alten Ägypten selbst.\""
 lepsius.711.g: "Es wird das schönste Exponat unserer Sammlung sein."
 lepsius.711.h: "Wir sollten versuchen, das Artefakt sicher außer Landes zu bringen ..."
 lepsius.712.t: "Büste der Nofretete"
 lepsius.712.d: "Bei unseren Ausgrabungen in Ägypten haben unsere Archäologen ein wirklich herausragendes Artefakt gefunden: die Büste der Nofretete!"
 lepsius.712.f: "Die Nofretete-Büste ist eine bemalte, mit Stuck beschichtete Kalksteinbüste von Nofretete, der großen königlichen Gemahlin des ägyptischen Pharaos Echnaton. Es ist eines der meistkopierten Werke des alten Ägypten. Nofretete ist zu einer der berühmtesten Frauen der Antike und zu einer Ikone weiblicher Schönheit geworden. Über Nofretete ist wenig bekannt. Theorien besagen, dass sie eine gebürtige ägyptische Königin, eine ausländische Prinzessin oder die Tochter eines hohen Regierungsbeamten namens Ay gewesen sein könnte, der nach Tutanchamun Pharao wurde. Sie könnte die Mitregentin von Ägypten mit Echnaton gewesen sein, der von 1352 v. Chr. bis 1336 v. Chr. regierte. Die Büste weist keine Inschriften auf, kann aber aufgrund der charakteristischen Krone, die sie auf anderen erhaltenen Darstellungen trägt, sicher als Nofretete identifiziert werden."
 lepsius.713.t: "Palette von Narmer"
 lepsius.713.d: "Unsere Archäologen haben bei ihren Ausgrabungen ein außergewöhnliches Artefakt entdeckt: die Palette von Narmer!"
 lepsius.713.f: "Die Narmer-Palette, auch bekannt als die Große Hierakonpolis-Palette oder die Palette von Narmer, ist ein bedeutender ägyptischer archäologischer Fund aus dem 31. Jahrhundert v. Chr., der zumindest nominell zur Kategorie der Kosmetikpaletten gehört. Es enthält einige der frühesten jemals gefundenen Hieroglypheninschriften. Manche gehen davon aus, dass die Tafel die Vereinigung von Ober- und Unterägypten unter König Narmer darstellt. Zusammen mit dem Skorpion-Keulenkopf und den Narmer-Keulenköpfen, die ebenfalls zusammen in der Hauptlagerstätte von Nekhen gefunden wurden, ist die Narmer-Palette eine der frühesten bekannten Darstellungen eines ägyptischen Königs. Die Palette zeigt viele der klassischen Konventionen der altägyptischen Kunst, die zum Zeitpunkt der Erstellung der Palette bereits formalisiert sein müssen. Der Ägyptologe Bob Brier hat die Narmer-Palette als \"das erste historische Dokument der Welt\" bezeichnet."
 lepsius.722.t: "Maske von Sargon"
 lepsius.722.d: "Bei Ausgrabungen in Ninive im Zuge der Entdeckung der Hängenden Gärten fanden unsere Archäologen ein bemerkenswertes Artefakt: die Maske von Sargon!"
 lepsius.722.f: "Der bronzene Kopf eines Königs, der den Perückenhelm der alten sumerischen Herrscher trägt, ist wahrscheinlich Sargon selbst. Obwohl ihm die eingelegten Augen fehlen und er an anderer Stelle leicht beschädigt ist, gilt dieser Kopf zu Recht als eines der großen Meisterwerke der antiken Kunst. Der Kopf ist eine lebensgroße Bronzebüste, die in Ninive gefunden wurde. Die komplizierten Locken und Muster des Bartes und die komplexe Frisur lassen auf Königtum, Macht und Reichtum eines idealen Mannes in der Gesellschaft schließen. Abgesehen von seinen ästhetischen Merkmalen ist dieses Stück spektakulär, da es sich um die früheste Hohlgussskulptur handelt, von der bekannt ist, dass sie im Wachsausschmelzverfahren gegossen wird. Die linke Seite des Gesichts und des Auges ist absichtlich beschädigt, was darauf hindeutet, dass die Büste zu einem späteren Zeitpunkt absichtlich aufgeschlitzt wurde, um politischen Bildersturm zu demonstrieren."
 lepsius.723.t: "Helm von Meskalamdug"
 lepsius.723.d: "Bei unseren Ausgrabungen in Babylonien stießen unsere Archäologen auf einen besonderen Fund: den Helm von Meskalamdug!"
 lepsius.723.f: "Der Helm von Meskalamdug ist einer der berühmtesten Funde aus den Königsgräbern von Ur. Meskalamdug war ein früher sumerischer Herrscher der ersten Dynastie von Ur im 26. Jahrhundert v. Chr. Der Helm war in Goldblech geprägt und eignete sich daher kaum als Schutzkleidung für den Krieg. Möglicherweise wurde es eher im zeremoniellen/kultischen Bereich verwendet. Abgesehen von den an den Seiten ausgearbeiteten Ohren ähnelt das Gesamtwerk eher einer Perücke, da seine feinen Gravuren eine Wellenfrisur imitieren. Auf der Seite hingegen befinden sich Locken, die durch einen Zopf um den Kopf von der Wellenfrisur getrennt werden. Der Zopf wird am Ende des Kopfes zu einem Knopf verknotet. Der Helm weist am Rand eine Reihe kleiner Löcher auf, an denen vermutlich ein Futter befestigt war."
 lepsius.731.t: "Maske von Agamemnon"
 lepsius.731.d: "Nachdem wir die Schätze in Mykene entdeckt hatten, fiel uns ein Artefakt besonders ins Auge: eine goldene Totenmaske, die sogenannte Maske des Agamemnon!"
 lepsius.731.f: "\"Maske des Agamemnon\" ist der Name einer goldenen Grabmaske, die an der antiken griechischen Ausgrabungsstätte Mykene entdeckt wurde. Der deutsche Archäologe Heinrich Schliemann, der das Artefakt 1876 entdeckte, glaubte, die Leiche des mykenischen Königs Agamemnon gefunden zu haben, dem Anführer der Achäer in Homers Epos des Trojanischen Krieges, der Ilias. Moderne archäologische Forschungen legen jedoch nahe, dass die Maske aus dieser Zeit stammt um 1600 v. Chr., 300-400 Jahre vor der Zeit des legendären Trojanischen Krieges. Die Maske besteht aus gelb-rötlichem, kräftigem Goldblech und hat eine Höhe von etwa 26 cm und eine Breite von 26,5 cm. In das Blech ist das Gesicht eines Mannes mit Bart, Schnurrbart und Augenbrauen eingeprägt. Neben jedem Ohrläppchen befindet sich ein Loch, das vermutlich zur Befestigung diente. Die Maske wurde von Cathy Gere als \"Mona Lisa der Vorgeschichte\" beschrieben."
 lepsius.732.t: "Diskus von Phaistos"
 lepsius.732.d: "Ausgrabungen auf Kreta haben ein eigenwilliges und mysteriöses Artefakt zutage gefördert: den Diskus von Phaistos!"
 lepsius.732.f: "Die Phaistos-Scheibe ist eine Scheibe aus gebranntem Ton aus dem minoischen Palast von Phaistos auf der Insel Kreta und stammt möglicherweise aus der mittleren oder späten minoischen Bronzezeit (zweites Jahrtausend v. Chr.). Die Scheibe hat einen Durchmesser von etwa 15 cm und ist auf beiden Seiten mit einer Spirale aus eingeprägten Symbolen bedeckt. Sein Zweck und sein ursprünglicher Herstellungsort bleiben umstritten. Die Scheibe wurde 1908 vom italienischen Archäologen Luigi Pernier im minoischen Palast von Phaistos entdeckt und enthält 241 Zeichen, darunter 45 verschiedene Zeichen, die offenbar durch das Einpressen hieroglyphischer \"Siegel\" in eine Scheibe aus weichem Ton hergestellt wurden im Uhrzeigersinn spiralförmig in Richtung der Mitte der Scheibe. Die Scheibe von Phaistos erregte die Fantasie von Amateur- und professionellen Archäologen, und es wurden viele Versuche unternommen, den Code hinter den Zeichen der Scheibe zu entschlüsseln."
 lepsius.733.t: "Schlangengöttin"
 lepsius.733.d: "Bei Ausgrabungen auf Kreta fiel uns ein minoisches Artefakt von besonderer künstlerischer und historischer Bedeutung in die Hände: die Schlangengöttin!"
 lepsius.733.f: "Zwei minoische Schlangengöttinnenfiguren wurden 1903 im minoischen Palast von Knossos auf der griechischen Insel Kreta ausgegraben. Die Knossos-Figuren, beide sehr unvollständig, stammen aus der Zeit gegen Ende der neopalastartigen Periode der minoischen Zivilisation, etwa 1600 v. Chr. Es war Evans, der die größere seiner beiden Figuren eine \"Schlangengöttin\" und die kleinere eine \"Schlangenpriesterin\" nannte; Seitdem wird darüber diskutiert, ob Evans Recht hatte oder ob beide Figuren Priesterinnen darstellen oder ob beide dieselbe Gottheit oder unterschiedliche Gottheiten darstellen. Die Kombination aus aufwändiger Kleidung, die die Brüste völlig entblößt, und \"Schlangenkampf\" erregte große Aufmerksamkeit, ganz zu schweigen von verschiedenen Fälschungen, und insbesondere die kleinere Figur bleibt ein beliebtes Symbol für minoische Kunst und Religion, auf die heute auch allgemein Bezug genommen wird als \"Schlangengöttin\"."
 lepsius.771.t: "Grabschatz von Pakal"
 lepsius.771.d: "Nachdem wir das Grab von König Pakal entdeckt hatten, konnten wir einige besondere Artefakte bergen: Pakals Grabschätze!"
 lepsius.771.f: "Es ist bemerkenswert, dass die Maya, die über keine Metallwerkzeuge verfügten, viele Objekte aus einem sehr dicken und dichten Material, Jade (Jadeit), herstellten, insbesondere alle Arten von (königlichen) Kleidungselementen, wie Gürtelplaketten – oder Kelten – Ohrspulen, Anhänger und auch Masken. In Kelten (d. h. flache, keltenförmige Ornamente) war manchmal eine stelenartige Darstellung des Königs eingraviert (z. B. die frühklassische \"Leyden-Platte\"). Das bekannteste Beispiel einer Maske ist wohl die Totenmaske des Palenque-Königs Pakal, bedeckt mit unregelmäßig geformten Marmorplatten und mit Augen aus Perlmutt und Obsidian. Pacal der Große war ein Anführer des Maya-Stadtstaates Palenque in der Spätklassik der präkolumbianischen mesoamerikanischen Chronologie. Er bestieg im Juli 615 den Thron und regierte bis zu seinem Tod. Er regierte 68 Jahre lang."
 lepsius.772.t: "Gürtelplakette"
 lepsius.772.d: "Bei Ausgrabungen in Yucatán fiel uns ein präkolumbianisches Artefakt von besonderer künstlerischer und historischer Bedeutung in die Hände: die Gürtelplakette!"
 lepsius.772.f: "Die Leyden-Plakette ist ein bedeutendes Maya-Artefakt aus hellgrünem Jadeit, das als Gürtelanhänger diente. Sie wurde 1864 in der Nähe von Puerto Barrios in Guatemala entdeckt und gilt als eines der ältesten datierten Objekte der Maya-Zivilisation. Die Plakette weist auf beiden Seiten feine, eingeritzte Zeichnungen auf. Die Vorderseite zeigt einen Maya-Herrscher – oft als Siyaj Chan K'awiil I. von Tikal identifiziert –, der im Profil steht und einen gefesselten Gefangenen mit Füßen tritt. Die Rückseite trägt ein Datum nach der Langen Zählung (8.14.3.1.12), das dem September 320 n. Chr. entspricht und die Thronbesteigung des Herrschers markiert. Als Primärquelle für die Geschichte der Maya der Frühen Klassik liefert sie wichtige Einblicke in die frühe königliche Ikonografie und Epigraphik. Benannt nach der Stadt, in der sie aufbewahrt wird, befindet sich die Plakette derzeit im Nationalmuseum für Völkerkunde in Leiden, Niederlande."
 lepsius.721.t: "Das Gilgamesch-Epos"
 lepsius.721.d: "Unseren Assyriologen ist es gelungen, anhand der gefundenen Keilschrifttafeln die Grundzüge des Gilgamesch-Epos zu rekonstruieren."
 lepsius.721.f: "Gilgamish stand auf, deutete Träume und wandte sich an seine Mutter.\n \"Meine Mutter!\" Während meiner Nacht\n war ich lüstern geworden und wanderte\n inmitten der Vorzeichen umher.\n Und es kamen Sterne am Himmel hervor,\n Wie ein ... vom Himmel fiel er auf mich.\n Ich gebar ihn, aber er war zu schwer für mich.\n Er trug ein Netz, aber ich konnte es nicht tragen.\n Ich rief das Land zusammen, sich zu ihm zu versammeln,\n damit Helden seine Füße küssen könnten.\n Er stand vorher auf Und sie standen mir gegenüber. Ich hob ihn auf und trug ihn zu dir.\""
 lepsius.721.g: "Das älteste Epos der Menschheitsgeschichte..."
 lepsius.741.t: "Der Schatz des Priamos"
 lepsius.741.d: "Nach seiner bahnbrechenden Entdeckung Trojas ist Heinrich Schliemann auf der Suche nach einem geeigneten Museum, dem er den Schatz des Priamos schenken kann."
 lepsius.741.f: "Obwohl Schliemann mit seinen Ausgrabungen die Fachwelt aufrüttelte und sich in ganz Europa großer Beliebtheit erfreute, stieß er vor allem wegen seiner Forschungsmethoden auf Widerstand in der Fachwelt. Es gab noch eine Reihe von Vorbehalten. Beispielsweise bezweifelten Historiker und Archäologen, dass der sogenannte Schatz des Priamos tatsächlich aus einer Schicht stammen könnte, die dem homerischen Troja entsprach. Als Schliemann außerdem beschloss, seine Funde einem Museum zu spenden, erhielt er nicht die erwartete Resonanz; alte Gäste waren abweisend. Auch berühmte Museen wie die Eremitage oder der Louvre lehnten ab. Der Entdecker stellte den Schatz vorübergehend in London aus, bis er 1881 beschloss, den Fund \"dem deutschen Volk zum ewigen Besitz und zur sicheren Aufbewahrung in der Reichshauptstadt\" zu vermachen."
 lepsius.741.g: "... und ich kenne den perfekten Ort für diesen Schatz!"
 lepsius.743.t: "Schliemann stiftet den Schatz des Priamos"
 lepsius.743.d: "Nach langem Überlegen beschloss [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], den Schatz des Priamos unserem Museum anzuvertrauen!"
 lepsius.743.g: "Wir werden dafür eine Halle einrichten – und sie nach Schliemann benennen!"
 lepsius.743.h: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] ist der wahre Schatz!"
 lepsius.744.t: "Schliemann schenkt den Schatz des Priamos einem Museum"
 lepsius.744.d: "Heute erreichte uns leider die Nachricht, dass Heinrich Schliemann den Schatz des Priamos einem Museum vermacht hat. Leider gehört es nicht uns."
 lepsius.744.g: "Wie konnte er uns so verraten?"
 lepsius.801.t: "Ausgrabungsstätte"
 lepsius.801.d: "Zu welcher Ausgrabungsstätte sollen wir unseren Archäologen schicken?"
 lepsius.801.f: "Als Mr. Coffeecake erkannte, dass die beeindruckend realistisch aussehende Schatzkarte tatsächlich aus einem Kaugummiautomaten stammte, musste er seine archäologischen Reisepläne auf noch nie dagewesene Weise ändern."
 lepsius.801.g: "Nördliches Ägypten."
 lepsius.801.h: "Unterägypten."
 lepsius.801.i: "Babylonien."
 lepsius.801.j: "Assyrien."
 lepsius.801.k: "Argolis."
 lepsius.801.l: "Yucatan."
 lepsius.801.m: "Egal."
 lepsius.802.t: "Archäologe"
 lepsius.802.d: "Welchen Archäologen sollten wir entsenden, um eine neue Ausgrabungsstätte einzurichten?"
 lepsius.802.f: "In den meisten Ländern gibt es nur einen Archäologen, der oft auch die Position des Leitenden Wissenschaftlers innehat; Sollte eine Nation jedoch – aus welchen Gründen auch immer – über erfahrenere Archäologen verfügen, besteht hier die Möglichkeit, eine zweite Person auszuwählen."
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "Abfahrt"
 lepsius.803.g: "Viel Glück!"
 lepsius.811.t_vok: "Grab eines Adligen"
 lepsius.811.t_pyr: "Schrein von Bastet"
 lepsius.811.t_bab: "Sumerisches Grab"
 lepsius.811.t_ass: "Assyrisches Heiligtum"
 lepsius.811.t_arg: "Mykenisches Heiligtum"
 lepsius.811.t_yuc: "Lagerhaus"
 lepsius.811.d: "Unser Archäologe hat eine mittelmäßige Ausgrabungsstätte angelegt."
 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] hat in einem sumpfigen Teil des unterägyptischen Nildeltas die Ruinen einer altägyptischen Tempelanlage gefunden – so schien es zunächst. Leider stellte sich heraus, dass es sich um einen deutlich kleineren Fund handelte: Bei dem vermeintlichen Tempel handelte es sich eher um einen Schrein, der der Katzengöttin Bastet geweiht war. Dennoch haben unsere Forscher mit der Ausgrabung begonnen – schließlich muss man irgendwo anfangen."
 lepsius.811.f_bab: "Die Sumerer sind vielleicht die älteste Zivilisation der Welt. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] entdeckte in Babylonien zufällig ein Grab des antiken Volkes, das das Rad und die Schrift erfunden haben soll. Leider stellte sich jedoch nach kurzer Zeit heraus, dass die meisten Artefakte gestohlen oder zerstört worden waren. Archäologen haben mit der Arbeit begonnen."
 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "Leider hatte unser Ausgrabungsteam in Yucatán bei der Suche nach Überresten der Maya-Kultur wenig Erfolg. In einem Seitental fanden die Archäologen ein altes Lagerhaus, in dem früher nur zerbrochene Keramik angeboten wurde. In einem Telegramm bestätigte [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], dass in Zukunft noch mehr zu erwarten sei."
 lepsius.811.g: "Ein mittelmäßiger Ort, aber es gehört uns ..."
 lepsius.812.t_vok: "Grab eines Prinzen"
 lepsius.812.t_pyr: "Tempel von Ra"
 lepsius.812.t_bab: "Zikkurat des Mondes"
 lepsius.812.t_ass: "Assyrische Festung"
 lepsius.812.t_arg: "Kammergrab"
 lepsius.812.t_yuc: "Maya-Observatorium"
 lepsius.812.d: "Unser Archäologe hat eine gute Ausgrabungsstätte eingerichtet."
 lepsius.812.f_vok: "Gute Nachrichten aus Ägypten! Nach vielen Strapazen entdeckte [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] ein bisher unbekanntes Grab. Nach ersten Informationen handelt es sich um die letzte Ruhestätte eines altägyptischen Prinzen. Obwohl einige Artefakte fehlen, die möglicherweise in der Vergangenheit von Einheimischen gestohlen und verkauft wurden, ist es ansonsten ein guter Ausgangspunkt für weitere archäologische Ausgrabungen."
 lepsius.812.f_pyr: "Unter einem klaren ägyptischen Himmel blitzt der letzte Rest eines Elektrons auf der Spitze eines Obelisken am Horizont auf – und markiert den Eingang zu einem Tempel des Sonnengottes Ra! [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] sicherte sofort das Gelände und begann mit den Ausgrabungen."
 lepsius.812.f_ass: "Bis heute zeichnet die Bibel das Bild der Assyrer bei Juden und Christen in einem eher negativen Licht. Berüchtigt als Kriegervolk, das die Israeliten wiederholt bedrängte und schließlich das Nordreich zerstörte, ging es als militärische Großmacht in die Geschichte ein. Obwohl nicht alle dieser negativen Propaganda wahr sind, hat die Entdeckung einer assyrischen Festung gezeigt, dass die alten Herrscher des Nahen Ostens über eine beeindruckende Militärkultur verfügten."
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] hat kürzlich ein mykenisches Kammergrab gefunden. Diese Form der Bestattungsarchitektur wurde in der Spätbronzezeit in den Gebieten unter dem kulturellen Einfluss der Ägäis genutzt. Die Gräber sind aus Fels gehauen und haben eine dreiteilige Struktur (Kammer, Stomion und Dromos), oft mit zusätzlichen Nischen und Seitenkammern, in denen primäre oder sekundäre Bestattungen stattfanden. Der Direktor unseres Museums hat eine Flasche Champagner kalt gestellt."
 lepsius.812.f_yuc: "Die Maya hatten ein großes Interesse an der Astronomie. Offenbar verfügten sie über ein ausgeprägtes Wissen über Himmelsphänomene, das dem der alten Griechen in vielerlei Hinsicht überlegen war. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] hat im Dschungel ein Gebäude entdeckt, an dessen Spitze sich eine Wendeltreppe in Form einer Schlange befindet. Unsere Forscher sind gespannt, welche Erkenntnisse und Artefakte diese Entdeckung bereithält."
 lepsius.812.g: "Ein schöner Ort für eine Ausgrabung."
 lepsius.813.t_vok: "Grab einer Königin"
 lepsius.813.t_pyr: "Unbekannte Pyramide"
 lepsius.813.t_bab: "Babylonisches Tor und Mauern"
 lepsius.813.t_ass: "Assyrischer Palast"
 lepsius.813.t_arg: "Mykenische Zitadelle"
 lepsius.813.t_yuc: "Maya-Pyramide"
 lepsius.813.d: "Unser Archäologe hat eine hervorragende Ausgrabungsstätte eingerichtet."
 lepsius.813.f_pyr: "Als heute das neueste Telegramm von [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] eintraf, wollten unsere Forscher es zunächst nicht glauben: Offenbar haben unsere Archäologen eine bisher unbekannte Pyramide in der ägyptischen Wüste wiederentdeckt. Obwohl Einheimische bereits über das vollständig mit Sand bedeckte Objekt gesprochen haben, haben sie keinen Eingang gefunden. Unser Land kann zahlreiche Funde aus dem Alten Reich sein Eigen nennen!"
 lepsius.813.f_arg: "Wurden die antiken Städte wirklich von Halbgöttern oder Zyklopen erbaut? Eine beeindruckende mykenische Zitadelle erhebt sich über den griechischen Hügeln, während unser Expeditionsteam eine Woche nach der Entdeckung von einem Erfolg nach dem anderen berichtet. Nicht nur die Architektur ist überwältigend, auch die Funde aus Ton und Gold versprechen weitere Entdeckungen in der Zukunft. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] sagte sogar, dass der Ring des Menelaos gefunden worden sei."
 lepsius.813.f_yuc: "Als der Regen nach Stunden nachließ und vom Schauer nur noch ein sanfter Nebelfilm übrig blieb, der die Baumwipfel des Dschungels umhüllte, bot sich der Expedition ein grandioses Bild. Über den Baumwipfeln ragten unzählige, von Unterholz und Lianen bedeckte Stufen in den Himmel: Eine mächtige Stufenpyramide nahm das Panorama ein, mitten in der Wildnis, bevölkert von Vögeln und Tapiren. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] sicherte sofort einige der ersten Funde und schickte sie per Expresslieferung an das Museum."
 lepsius.813.g: "Dieser Ort ist perfekt!"
 lepsius.190.t: "Das Archäologenteam rief zurück"
 lepsius.190.d: "Von welcher archäologischen Ausgrabungsstätte aus sollten wir unser Team zurückrufen?"
 lepsius.190.f: "Irgendjemand muss Henry J. verleumdet haben, denn ohne eigenes Verschulden wurde er eines Morgens von seiner Ausgrabungsstätte zurückgerufen."
 lepsius.190.g: "Nördliches Ägypten"
 lepsius.190.h: "Unterägypten"
 lepsius.190.i: "Babylonien"
 lepsius.190.j: "Assyrien"
 lepsius.190.k: "Argolis"
 lepsius.190.l: "Kreta"
 lepsius.190.m: "Yucatan"
 lepsius.190.n: "Peru"
 lepsius.190.o: "Weitermachen."
 lepsius.901.t: "Grab von Tutanchamun"
 lepsius.901.d: "Es ist ein sensationeller Tag für die internationale Wissenschaft. Wir haben eine großartige Entdeckung gemacht: Das Grab von Tutanchamun wurde heute von [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Archäologen freigelegt!"
 lepsius.901.f: "Während wir zusahen, kam es uns vor, als würden langsam, verzweifelt langsam die Überreste des Durchgangsschutts, der den unteren Teil der Tür blockierte, entfernt, bis wir schließlich die gesamte Tür frei vor uns hatten. Der entscheidende Moment war gekommen. Mit zitternden Händen machte ich einen kleinen Riss in der oberen linken Ecke. Dunkelheit und leere Räume, so weit ein eiserner Prüfstab reichte, zeigten, dass alles, was dahinter lag, leer und nicht gefüllt war wie der Durchgang, den wir gerade freigemacht hatten. Als Vorsichtsmaßnahme gegen mögliche faulige Gase wurden Kerzentests durchgeführt, und dann weitete ich das Loch ein wenig, steckte die Kerze hinein und spähte hinein. Zuerst konnte ich nichts sehen, die heiße Luft, die aus der Kammer entwich, ließ die Kerzenflamme flackern. Aber plötzlich, als sich meine Augen an das Licht gewöhnten, tauchten langsam Details des Raums darin aus dem Nebel auf, seltsame Tiere, Statuen und Gold – überall das Glitzern von Gold. Für einen Moment – ​​den anderen Umstehenden muss es wie eine Ewigkeit vorgekommen sein – war ich sprachlos vor Staunen, und als mein Kollege, der die Spannung nicht länger ertragen konnte, besorgt fragte: \"Können Sie etwas sehen?\" Es war alles, was ich tun konnte, um die Worte \"Ja, wundervolle Dinge\" herauszubekommen."
 lepsius.901.g: "Wirklich wunderbare Dinge."
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetAltName('NOM')] hat eine tolle Entdeckung gemacht: Das Grab von Tutanchamun wurde heute freigelegt!"
 lepsius.902.f: ""
 lepsius.902.g: "Hoffentlich trifft sie der Fluch des Pharaos."
 lepsius.911.t: "Schiff von Khufu"
 lepsius.911.d: "Es ist ein sensationeller Tag für die internationale Wissenschaft. Wir haben eine großartige Entdeckung gemacht: Khufus Schiff wurde heute von [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Archäologen freigelegt!"
 lepsius.911.f: "Er atmete tief durch, schloss die Augen, um sie an die Dunkelheit seines Grabens zu gewöhnen, und öffnete sie dann langsam. Mit ruhiger Hand begann er erneut zu schneiden. Er arbeitete schnell, als die Hülle nachgab und zerfiel. Er machte das Loch tief genug, um seinen Körper in eine andere Position nach unten zu drehen und arbeitete nur wenige Zentimeter von seinem Kopf entfernt. Er schnitt und schnitt weiter. Zeit bedeutete nichts. Er war sich nicht bewusst, dass er müde war oder in einer senkrechten Position lag. Er hat nachgeforscht. Er schnitt. Plötzlich und wie durch ein Wunder verschwanden seine Hände im Nichts. Er lag wie in Trance. Er schloss die Augen. Ein kaum wahrnehmbarer Geruch kroch ihm in die Nase. Er konnte nicht definieren, was es war. Es war fast süß. Es konnte kein Weihrauch sein. Oder war es? War es vielleicht der Geruch der Geschichte? Dann wusste er es. Es war Zedernholz! Seine Augen waren noch ungeöffnet. Er holte tief Luft und stellte fest, dass es sich tatsächlich um Zedernholz handelte. Er verspürte ein Gefühl der Erfüllung, wie er es noch nie zuvor gekannt hatte. Glück durchströmte ihn. Seine Augen waren immer noch geschlossen. Er flüsterte ein Dankesgebet zu Gott. Sein fragender Geist begann wieder zu funktionieren. Wenn er tatsächlich Zedernholz von einem Solarboot unten roch, bedeutete das nicht, dass die weiße Ameise nicht beschäftigt gewesen war. Vielleicht war das kostbare Holz von Horden weißer Ameisen zerfressen worden. \"Es ist das Boot!\", rief er. \"Es ist das Boot!\""
 lepsius.911.g: "Kann es nach über 4.000 Jahren tatsächlich noch auf dem Wasser segeln?"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetAltName('NOM')] hat eine großartige Entdeckung gemacht: Khufus Schiffsgrab wurde heute freigelegt!"
 lepsius.912.f: ""
 lepsius.912.g: "Sicherlich ein wichtiger Teil ihrer neuen Flotte."
 lepsius.921.t: "Turm von Babylon"
 lepsius.921.d: "Es ist ein sensationeller Tag für die internationale Wissenschaft. Wir haben eine großartige Entdeckung gemacht: Der Turmbau zu Babel wurde heute von [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Archäologen freigelegt!"
 lepsius.921.f: "Jenseits dieses Bergrückens erstreckt sich eine ziemlich beträchtliche und bemerkenswert gleichmäßige Ebene zum Hügel Amran Ibn Ali, durch den diagonal die Straße von unserem Dorf Kweiresh nach Hilleh verläuft. Man nennt es \"Sachn\", wörtlich: die Pfanne, meint aber im heutigen Sprachgebrauch den von Arkaden umgebenen freien Raum, der sich rund um die großen Wallfahrtsmoscheen wie die von Karbala oder Nedschef erstreckt. Aber unser \"Sachn\" ist nichts anderes als das heutige Erscheinungsbild des alten heiligen Bezirks, in dem sich der Zikurrat Etemenanki, der \"Grundstein von Himmel und Erde\", der Turm Babylons, erhob, umgeben von einer Ringmauer, zu der er gehörte alle Arten von Gebäuden, die mit dem Kult zu tun haben. Wir kennen die volle Höhe des Turms nicht. Aber Nabupolassar legt wie Nebukadnezar in seiner Zylinderinschrift aus Etemenanki besonderen Wert auf sie. Ersterer sagt: \"Zu dieser Zeit befahl mir Marduk, den Turm von Babylon, der in den Tagen vor mir geschwächt und niedergerissen worden war, fest auf die Brust der Unterwelt zu gründen, während seine Spitze zum Himmel strebte.\" .\""
 lepsius.921.g: "Die Bibel hatte also doch nicht Unrecht."
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetAltName('NOM')] hat eine tolle Entdeckung gemacht: Der Turm zu Babel wurde heute freigelegt!"
 lepsius.922.f: ""
 lepsius.922.g: "Man kann sich nur wünschen, dass sie hinterher genauso verwirrt sind wie die Erbauer des Turms."
 lepsius.931.t: "Gärten von Sanherib"
 lepsius.931.d: "Es ist ein sensationeller Tag für die internationale Wissenschaft. Wir haben eine großartige Entdeckung gemacht: Die Hängenden Gärten wurden heute von [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Archäologen freigelegt!"
 lepsius.931.f: "Waren die Hängenden Gärten wirklich in Babylon? Nach den neuesten Erkenntnissen hat sich diese Behauptung als falsch erwiesen. Tatsächlich haben unsere fähigsten Archäologen beim Vergleich historischer Quellen herausgefunden, dass nur sehr wenige Quellen die legendären Gärten in Babylon belegen. Darüber hinaus waren es die Assyrer und nicht die Babylonier, die für ihre raffinierten Gartentechniken bekannt waren. Reliefs zeugen von weitläufigen Gärten auf mehreren Etagen. Ein Archäologenteam hat dies zum Anlass genommen, Probegrabungen am großen Palast des assyrischen Königs Sanherib in einem als wenig erforschten Teil durchzuführen. Der Befund ist eindeutig: Das verlorene Weltwunder befand sich eindeutig in Ninive. Unsere Archäologen profitieren daher nicht nur von der Entdeckung, sondern auch von der Aufklärung eines seit zweieinhalb Jahrtausenden bestehenden Rätsels."
 lepsius.931.g: "Bedeutet das also, dass es sich tatsächlich um die Hängenden Gärten von Ninive handelte?"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetAltName('NOM')] hat eine tolle Entdeckung gemacht: Die Hängenden Gärten wurden heute freigelegt!"
 lepsius.932.f: ""
 lepsius.932.g: "Hier liegt mit ziemlicher Sicherheit eine Verwechslung vor."
 lepsius.941.t: "Schätze von Mykene"
 lepsius.941.d: "Es ist ein sensationeller Tag für die internationale Wissenschaft. Wir haben eine großartige Entdeckung gemacht: Die Schätze von Mykene wurden heute von [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Archäologen freigelegt!"
 lepsius.941.f: "Die mit Abstand wichtigste und lohnenswerteste Ausgrabung fand direkt hinter dem Löwentor statt. Bereits bei seinen Probegrabungen im Jahr 1874 hatte Schliemann festgestellt, dass der Fels am tiefsten Punkt der Burg am tiefsten mit Geröll bedeckt war. Nach den Worten von Pausanias hielt er es für wahrscheinlich, dass sich die Gräber der Herrscherfamilie innerhalb der Burgmauer befanden, und musste sich an die Worte erinnern, als kurz nach Beginn der Arbeiten in einer Tiefe von 300 m drei Grabsteine ​​mit antiken Reliefs gefunden wurden 3 bis 5 Meter. Als die Steine ​​entfernt wurden, so Schliemann, stellte sich heraus, dass sie nicht, wie bisher angenommen, auf dem Boden standen, sondern auf Erde, die die Schächte füllte, die zur Herstellung der Gräber senkrecht in den Fels getrieben worden waren. Sie gruben in fünf solcher Schächte, und nachdem in einer gewissen Tiefe Steinschichten abgetragen worden waren, die nach der Bestattung der Toten als Altäre gedient hatten, schlug die Axt etwa 6 Meter tief in den Boden ein. Auf dem Boden lagen fünfzehn Leichen ausgebreitet in den fünf Gräbern, geschmückt mit reichem, man könnte sagen märchenhaftem Goldschmuck. Goldene Masken, die die Gesichtszüge der Verstorbenen nachahmten, lagen über den Gesichtern der Männer, goldene Teller, reich mit Spiralen verziert, bedeckten ihre Brüste, die Gewänder der Frauen waren mit Gold beladen."
 lepsius.941.g: "Agamemnon, bist du das?"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetAltName('NOM')] hat eine großartige Entdeckung gemacht: Die Schätze von Mykene wurden heute freigelegt!"
 lepsius.942.f: ""
 lepsius.942.g: "Im Zweifelsfall haben diese Betrüger diese \"Schätze\" selbst dort versteckt."
 lepsius.961.t: "Vermächtnis von Pakal"
 lepsius.961.d: "Es ist ein sensationeller Tag für die internationale Wissenschaft. Wir haben eine großartige Entdeckung gemacht: Die Grab- und Grabschätze von Pakal wurden heute von [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Archäologen freigelegt!"
 lepsius.961.f: "Mein erster Eindruck war ein Mosaik aus Grün, Rot und Weiß. Dann löste es sich in Details auf – grüne Jadeornamente, rot bemalte Zähne und Knochen und Fragmente einer Maske. Ich starrte auf das Totengesicht dessen, für den all dieses gewaltige Werk – die Krypta, die Skulptur, die Treppe, die große Pyramide mit ihrem krönenden Tempel – gebaut worden war, die sterblichen Überreste eines der größten Männer von Palenque! Dies war ein Sarkophag, der erste, der jemals in einer Maya-Pyramide gefunden wurde!"
 lepsius.961.g: "Das Tutanchamun-Grab von Südamerika!"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetAltName('NOM')] hat eine großartige Entdeckung gemacht: Die Grab- und Grabschätze von Pakal wurden heute freigelegt!"
 lepsius.962.f: ""
 lepsius.962.g: "Die Maske war sowieso ziemlich abscheulich."
 lepsius_local_excavation_modifier: "Lokale Ausgrabung"
 lepsius_local_excavation_state_modifier: "Lokale Ausgrabung"
 lepsius_local_excavation_cost_modifier: "Lokale Ausgrabungskosten"
 lepsius.1101.t: "Archäologischer Kongress: Der Exodus"
 lepsius.1101.d: "Unser Land hat alle relevanten Vorbereitungen getroffen, um den nächsten Archäologenkongress abzuhalten. Im Mittelpunkt steht die Rolle der Bibel in der Archäologie und Altertumsforschung. Einladungen werden an alle wichtigen Archäologen weltweit verschickt. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wird die Sitzung leiten."
 lepsius.1101.f: "Bereits in der Römerzeit führte der Mangel an Quellen zum alten Ägypten dazu, dass historische Schriften auf Sekundärquellen wie Herodot basierten. Die Entwicklung setzte sich im Mittelalter fort. Die Bibel bot Anhaltspunkte und galt lange Zeit als seriöse Quelle für die Geschichte des Nahen Ostens – auch weil es einfach keine anderen Überlieferungen gab. Mit der Entschlüsselung der Hieroglyphen und dem Beginn der modernen Ägyptologie versuchten sowohl Befürworter als auch Kritiker der Bibel, Beweise dafür zu liefern, dass die biblischen Berichte falsch oder richtig waren. Mit Beginn der Erforschung des alten Babylonien verstärkte sich dieser Trend noch weiter. Ein Beispiel für den Streit um die Historizität der biblischen Geschichten war der Exodus – der Auszug des Volkes Israel aus Ägypten – für den es in ägyptischen Quellen keine Belege gab."
 lepsius.1101.g: "Die archäologische Welt soll unser Gast sein."
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetAltName('NOM')] hat zu einem archäologischen Kongress eingeladen. Thematisiert wird die Historizität der Bibel am Beispiel des Exodus. Unser Archäologe Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] hat eine herzliche Einladung erhalten."
 lepsius.1102.g: "Immer diese Auseinandersetzungen darüber, wer die schönsten Lederjacken hat..."
 lepsius.1103.t_laughed: "Der Spott der Archäologischen Gesellschaft"
 lepsius.1103.t_respected: "Ein souveräner Auftritt"
 lepsius.1103.t_lauded: "Bewunderung und Glückwünsche"
 lepsius.1103.d_laughed: "Das Erscheinen von Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wurde mit Belustigung aufgenommen. [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] steht nicht gerade im Ruf, auf dem Gebiet der Ägyptologie etwas Herausragendes geleistet zu haben. Es gab eindeutig Witze hinter verschlossenen Türen."
 lepsius.1103.d_respected: "Vor Beginn des Archäologenkongresses wurde unser Archäologe herzlich begrüßt und die üblichen Bräuche ausgetauscht. [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] genießt in der Forschungswelt einen anerkannten Ruf."
 lepsius.1103.d_lauded: "Die Ankunft von Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wurde mit großer Freude begrüßt. Er gilt als einer der am meisten erwarteten Gäste. Schnell bildete sich eine Menschenmenge um ihn, denn [ROOT.GetCountry.GetAltNameNoFlag('NOM')] gilt als Pionier auf dem Gebiet der Ägyptologie."
 lepsius.1103.f_laughed: "\"Warum bekommen [ROOT.GetCountry.GetAdjectiveNoFlag|l]e Archäologen keine Mädchen?\n\nWeil sie die schlechtesten Dating-Techniken haben!\""
 lepsius.1103.f_respected: "Bei seiner Ankunft führte Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] ein paar angenehme Gespräche mit Kollegen über meist langweilige Ruinen, die ein Nicht-Wissenschaftler als noch langweiligere Felsformationen abgetan hätte."
 lepsius.1103.f_lauded: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] schien von dem Ansturm fast überwältigt zu sein. So viele Kollegen suchten das Gespräch mit ihm und wollten von seinen Expeditionen und seinen Erfahrungen profitieren. Einige drängten ihn sogar, einen Privatvortrag zu halten."
 lepsius.1103.g: "Wie peinlich!"
 lepsius.1103.h: "Endlich unter Gleichgesinnten."
 lepsius.1103.i: "Wir sind eine führende archäologische Nation!"
 lepsius.1104.t: "Der Exodus: Historischer Verdienst oder Erfindung?"
 lepsius.1104.d: "Aus der themenspezifischen Tagung entwickelte sich schnell eine Grundsatzfrage. Zunächst wollte man nur über den biblischen Exodus und die ägyptischen Quellen diskutieren, doch schnell entwickelte sich daraus eine Debatte über den Wert der Bibel in Geschichte und Archäologie. Zwei Gelehrtenlager stehen sich nun unversöhnlich gegenüber."
 lepsius.1104.f: "Eigentlich wollte [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] einen Vortrag über die Erinnerungskultur des israelischen Volkes und den Stand des Exodus halten, als [SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName] die provokante und berechtigte Frage stellte, ob eine solche Aussage nicht nur Zeitverschwendung sei – denn letztlich wäre sie das auch gewesen Es muss geklärt werden, ob die Bibel als Quelle in Frage kommt, da es keine archäologische Überlieferung gibt, die für die Historizität des Exodus spricht. Auch in den nun übersetzten Texten gab es keine Überlieferung. Deshalb sollte man sich grundsätzlich die Frage stellen, ob die fünf Bücher Mose tatsächlich erfundene Geschichten und daher nutzlos sind. \"In der Archäologie geht es um Fakten, nicht um Wahrheit\", schlussfolgerte er. [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] entgegnete auf diese Vorwürfe, dass man die Bibeltexte nicht als Augenzeugenberichte verstehen dürfe, sondern als Sekundärquelle über Ereignisse, die ein Puzzleteil der antiken Erinnerungskultur seien. \"Die Bibel komplett abzulehnen ist genauso Unsinn, wie jedes Wort davon als historische Tatsache zu akzeptieren.\" \"Es geht mehr darum, die richtigen Fragen zu stellen\", sagte er."
 lepsius.1104.g: "Die Bibel hat als Sekundärquelle einen gewissen historischen Wert."
 lepsius.1104.h: "Die Bibel hat überhaupt keinen historischen Wert."
 lepsius.1105.t: "Archäologen untereinander"
 lepsius.1105.d: "Abseits des aktuellen Archäologenkongresses freundete sich unser Archäologe mit einem ausländischen Kollegen an und tauschte sich aus."
 lepsius.1105.f: "Der Kongress lief schon seit Tagen und Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] hatte zunächst nur in den Pausen Zeit, sich mit einem bisher unbekannten Kollegen zu unterhalten. Im Anschluss an das Treffen gab es ein gemeinsames Essen und je länger die Wissenschaftler miteinander redeten, desto mehr lernten sie übereinander – und voneinander. Wie sich herausstellt, ist [SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName] eine Person mit großem Erfahrungsschatz."
 lepsius.1105.g: "Ein weiterer Freund der Archäologie!"
 lepsius.1106.t: "Das Artefakt eines Unterhändlers"
 lepsius.1106.d: "Der Verhandlungsführer eines Antiquitätenbesitzers nahm am Archäologischen Kongress [SCOPE.sCountry('lepsius_congress_host_country').GetAltName('IN')] teil. Im Auftrag eines geheimen Aristokraten versucht er, ein Artefakt an ein interessiertes Museum zu verkaufen. Bisher hat er keinen Kunden gefunden."
 lepsius.1106.f: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] konnte sich von der Echtheit des Artefakts überzeugen. Angesichts des hohen Preises zögert er jedoch mit dem Kauf und wartet auf die Zusage der Hauptstadt, bevor er Maßnahmen ergreift."
 lepsius.1106.g: "Teuer, aber wertvoll."
 lepsius.1106.h: "Nicht wertvoll genug."
 lepsius.1107.t: "Freundliches Gespräch"
 lepsius.1107.d: "Am Rande des Archäologenkongresses [SCOPE.sCountry('lepsius_congress_host_country').GetAltName('IN')] präsentierte unser Archäologe [ROOT.GetCountry.GetAltNameNoFlag('AKK')] im Gespräch mit mehreren Kollegen in einem sehr positiven Licht."
 lepsius.1107.f: "Es ist nicht bekannt, was Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] genau gesagt hat, aber offenbar hat er bei den anderen Archäologen den Nerv der Zeit getroffen. Sie werden diesen positiven Eindruck sicherlich in ihrem Heimatland verbreiten."
 lepsius.1107.g: "Lasst uns unsere Beziehungen verbessern."
 lepsius.1107.h: "Lassen Sie uns unseren Ruf verbessern."
 lepsius.1108.t: "Ein Assistent"
 lepsius.1108.d: "Ein aufstrebender junger Mann, der Zutritt zum Archäologischen Kongress erhalten wollte, aber von den Türwächtern daran gehindert wurde, erregt die Aufmerksamkeit von Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1108.f: "Natürlich wurde dem Studenten der Eintritt in die Halle mit der erlesenen Gesellschaft internationaler Archäologen verwehrt, aber die Beharrlichkeit beeindruckte [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] so sehr, dass er den jungen Mann näher kennenlernen wollte. Es stellte sich heraus, dass er für sein Alter umfangreiche Kenntnisse sowohl in alten Sprachen als auch in Geographie erworben hatte. Schon nach wenigen Stunden beschloss der Professor, ihn nach dem Kongress zu seinem Assistenten zu machen, in der Hoffnung, dass er die akademische Welt bald bereichern könnte."
 lepsius.1108.g: "Wir erwarten eine akademische Laufbahn."
 lepsius.1109.t_merit: "Der Exodus: Mehr als eine Geschichte"
 lepsius.1109.t_invention: "Der Exodus: Fiktion, keine Tatsache"
 lepsius.1109.d_merit: "Nach vielen Treffen, Debatten und Auseinandersetzungen ging der Archäologische Kongress zu Ende und es wurde eine Abschlusserklärung verfasst. Dementsprechend ist die Bibel keine primäre historische Quelle, hat aber dennoch in mancher Hinsicht historischen Wert, auch wenn dies möglicherweise nicht direkt auf Ägypten und Babylon übertragbar ist."
 lepsius.1109.d_invention: "Nach vielen Treffen, Debatten und Auseinandersetzungen ging der Archäologische Kongress zu Ende und es wurde eine Abschlusserklärung verfasst. Dementsprechend hat die Bibel weder für die Archäologie noch für die Geschichte einen Wert. Vielmehr handelt es sich größtenteils um eine Reihe von Erfindungen, die das Studium der Antike eher behindern als unterstützen."
 lepsius.1109.f_merit: "Eine kleinere Gruppe von Archäologen betrachtete die Erklärung als Kompromiss, andere hingegen erkannten darin eine differenziertere Herangehensweise an die Vergangenheit, die über absolute Positionen hinausging. Trotz eines direkten Hinweises auf den Exodus hoben einige Archäologen eine kürzlich entdeckte Passage von Pharao Merenptah hervor, in der von Verwüstung für das Volk Israel die Rede ist. Eine andere Gruppe wies darauf hin, dass Pharao Shishak laut dem von Champollion übersetzten Bubastis-Portal tatsächlich Jerusalem geplündert habe. All dies deutet darauf hin, dass es weniger darauf ankommt, das Buch wörtlich zu nehmen, sondern es als Puzzlestück in der Erforschung älterer Geschichte zu betrachten. Falsche Interpretationen sind unvermeidlich, aber das gilt für alle Bereiche der Wissenschaft."
 lepsius.1109.f_invention: "Am Ende konnte sich die Gruppe der Skeptiker mit ihrer Maximalforderung durchsetzen. Von nun an sollten die biblischen Geschichten keinen größeren Wert mehr haben als beispielsweise die Legenden um die 7 Könige von Rom oder die griechischen Mythengeschichten – die herausragende Stellung der Bibel war dann zumindest in der westlichen Welt zu Ende in dieser Gegend. Die verzweifelten Verweise auf Zufälle zwischen archäologischen Funden und Bibelstellen wurden als das erkannt, was sie waren: Zufälle. Die Frage, was mit der Bibel geschehen soll, war daher lediglich eine Aufgabe der Literatur. Einige Archäologen erwähnten auch die Möglichkeit, dass die Bibelgeschichten höchstens ägyptischen Geschichten oder babylonischen Mythen entnommen seien. Dabei würde es sich lediglich um die notwendige Untersuchung der Abhängigkeit handeln. Ansonsten war der Fall für Archäologie und Geschichte abgeschlossen: Die Bibel war größtenteils eine Sammlung erfundener Geschichten ohne Wert für die Wissenschaft."
 lepsius.1109.g: "Sie müssen die Texte richtig einordnen und interpretieren."
 lepsius.1109.h: "Die Bibel ist ein nutzloses Bilderbuch."
 lepsius.1109.i: "Das wussten wir schon vorher."
 lepsius.1111.t: "Archäologischer Kongress: Der Aufstieg der Zivilisation"
 lepsius.1111.d: "Unser Land hat alle relevanten Vorbereitungen getroffen, um den nächsten Archäologenkongress abzuhalten. Im Mittelpunkt steht die Frage, wo die Zivilisation ursprünglich entstanden ist. Nach neuesten Informationen handelt es sich hierbei wahrscheinlich um Babylonien. Dies wirft weiterhin die Frage auf, inwieweit die babylonische Kultur andere Kulturen beeinflusst hat. Einladungen werden an alle wichtigen Archäologen weltweit verschickt. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wird die Sitzung leiten."
 lepsius.1111.f: "Das Wissen, dass es eine babylonische Zivilisation gegeben hatte, ging nie ganz verloren – schon zur Zeit der Griechen gab es Informationen über Babylonier und Assyrer. Allerdings ergab die Entschlüsselung des Akkadischen, dass es deutlich ältere Kulturen wie die Sumerer gegeben hatte, deren Geschichte altersmäßig sogar die der Ägypter in den Schatten stellte. Eine ganze Reihe zivilisationstypischer Erfindungen prägten den Alltag dieser antiken Völker und viele Philologen und Archäologen vermuteten bald, dass Babylon die eigentliche Wiege der Zivilisation sei. Die Faszination für das antike Mesopotamien führte bald dazu, dass alle Bereiche der Zivilisation auf Babylon zurückgeführt wurden: Nicht nur die Bibel, sondern auch Kulturen der Levante und Persiens, selbst die Ägypter, waren nur bloße \"Kulturempfänger\" oder \"Kulturübermittler\". ' der ursprünglichen babylonischen Kultur. Diese wissenschaftliche Enge erhielt bald einen spöttischen Namen, den ihre Anhänger für sich selbst verwendeten: Panbabylonismus."
 lepsius.1111.g: "Die archäologische Welt soll unser Gast sein."
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetAltName('NOM')] hat zu einem archäologischen Kongress eingeladen. Im Mittelpunkt steht die Frage, wo die Zivilisation ursprünglich entstanden ist. Nach neuesten Informationen handelt es sich hierbei wahrscheinlich um Babylonien. Dies wirft weiterhin die Frage auf, inwieweit die babylonische Kultur andere Kulturen beeinflusst hat. Unser Archäologe Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] hat eine herzliche Einladung erhalten."
 lepsius.1112.g: "Immer diese Auseinandersetzungen darüber, wer die schönsten Lederjacken hat..."
 lepsius.1113.d_laughed: "Das Erscheinen von Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wurde mit Belustigung aufgenommen. [ROOT.GetCountry.GetAltNameNoFlag('NOM')] steht nicht gerade im Ruf, auf dem Gebiet der Assyriologie etwas Herausragendes geleistet zu haben. Es gab eindeutig Witze hinter verschlossenen Türen."
 lepsius.1113.d_respected: "Vor Beginn des Archäologenkongresses wurde unser Archäologe herzlich begrüßt und die üblichen Bräuche ausgetauscht. [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] genießt in der Forschungswelt einen anerkannten Ruf."
 lepsius.1113.d_lauded: "Die Ankunft von Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wurde mit großer Freude begrüßt. Er gilt als einer der am meisten erwarteten Gäste. Schnell bildete sich eine Menschenmenge um ihn, denn [ROOT.GetCountry.GetAltNameNoFlag('NOM')] gilt als Pionier auf dem Gebiet der Assyriologie."
 lepsius.1114.t: "Babylon: Die Wiege der Zivilisation?"
 lepsius.1114.d: "Im Verlauf des Kongresses entwickelte sich die Frage nach dem Ursprung der Zivilisation zunehmend zu der Frage, ob und inwieweit Babylon alle Kulturen des Nahen Ostens und des östlichen Mittelmeerraums beeinflusste. Manche gehen davon aus, dass fast jede Idee, die später eine Rolle spielte, im alten Babylon erdacht wurde!"
 lepsius.1114.f: "Professor [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] eröffnete mit einem sehr interessanten Beitrag über die kulturellen Errungenschaften und den hohen babylonischen Wissensstand vor mehr als 4.000 Jahren: \"Die sumerisch-babylonische Kulturwelt setzt eine Welttheorie voraus, nach der alle staatlichen und gesellschaftlichen Organisationen geregelt wurden.\" Alle Wissenschaften und Künste gehen auf eine vom Himmel offenbarte Urweisheit zurück, nach der Eigentum verwaltet und geschützt wird. \"Der Panbabylonismus will beweisen, dass diese astrale Weltanschauung ihre Spuren in allen Kulturen und Religionen der Welt hinterlassen hat.\" Diese Ansicht löste jedoch heftigen Widerstand bei zahlreichen Wissenschaftlern aus, deren Sprecher sich bald als [SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName] herausstellte. Er lehnte die Idee ab, dass alle Mythen von den Babyloniern stammten. \"Was [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] sagte, waren mehr Konstruktionen als Fakten.\" \"Die Vorstellung, dass es keine parallelen Entwicklungen geben könnte, ist weit hergeholt – die ägyptischen Hieroglyphen beispielsweise wurden nicht von der Keilschrift inspiriert.\" Und während die Panbabylonisten versuchten, eine Priorität zu schaffen, die Mesopotamien ins Zentrum und alle anderen Mythologien an die Peripherie verbannte, übersahen sie völlig die Tatsache, dass Kulturen auf einem gemeinsamen Spektrum leben können."
 lepsius.1114.g: "Babylon ist die Wiege der Zivilisation."
 lepsius.1114.h: "Die Zivilisation entstand an mehreren Orten."
 lepsius.1119.t_panbabylonism: "Aufstieg der Zivilisation: Der Panbabylonismus triumphiert"
 lepsius.1119.t_antipanbabylonism: "Aufstieg der Zivilisation: Panbabylonismus widerlegt"
 lepsius.1119.d_panbabylonism: "Nach einer leidenschaftlichen Debatte, die zu Meinungsverschiedenheiten zwischen zahlreichen Wissenschaftlern führte, konnte sich der Kongress auf eine Abschlusserklärung einigen. Demnach ist Mesopotamien nicht nur die Wiege der Zivilisation, sondern auch Ausgangspunkt aller mythologischen Vorstellungen des Nahen Ostens."
 lepsius.1119.d_antipanbabylonism: "Die Kämpfe sind vorbei und nach einigen hitzigen verbalen Auseinandersetzungen konnten sich die Gelehrten zusammenreißen und eine Abschlusserklärung unterzeichnen, die die endgültige Niederlage des panbabylonischen Lagers besiegelte. Zwar galt Mesopotamien als eine der wichtigsten Wiegen der Zivilisation; aber nicht der einzige. Der Versuch, jede Mythologie auf die Babylonier zurückzuführen, wurde im Keim erstickt."
 lepsius.1119.f_panbabylonism: "Die Abschlusserklärung bestätigte alle Theorien der panbabylonischen Anhänger: Die Abhängigkeit der Mythologie und Literatur des Orients von der babylonischen Kultur war offensichtlich. Sowohl die Bibel als auch die ägyptischen Mythen basieren offensichtlich auf bekannten babylonischen Ideen, wie sie beispielsweise im Gilgamesch-Epos zu finden sind. Letztlich war die gesamte Entwicklung des Nahen Ostens kulturell stark von der Astronomie und Astrologie dieser Urkultur geprägt, deren Ideen mal mehr, mal weniger offensichtlich waren."
 lepsius.1119.f_antipanbabylonism: "Die Anhänger des Panbabylonismus befanden sich zuletzt in der Minderheit. Wissenschaftler erkannten, dass viele der Errungenschaften der mesopotamischen Kulturen zum Kern des intellektuellen Unterbaus des Nahen Ostens gehörten. Allerdings lehnten die Wissenschaftler in der Abschlusserklärung den Anspruch auf Absolutheit, ja sogar den Anspruch auf eine \"ursprüngliche Kultur\" ab. Die astronomische Forschung, die als Ausgangspunkt des babylonischen Denkens galt, wurde als eine spätere Entwicklung entlarvt, die fälschlicherweise an den Anfang gestellt worden war. Auch eine Priorität der babylonischen Tradition konnten die Wissenschaftler nicht erkennen: Vielmehr stellte sich heraus, dass die verschiedenen \"babylonischen\" Geschichten tatsächlich ein gemeinsames Erbe von Traditionen in der Region waren, die die Babylonier tatsächlich zuerst niedergeschrieben hatten. Als besonders bitter sticht ein Satz hervor, in dem der Panbabylonismus kurzerhand zur Pseudowissenschaft erklärt wird: \"Diese mystische Weisheit hat nicht mehr wissenschaftliche Bedeutung als die ‚ursprüngliche Offenbarung‘ aller Dimensionen der Welt in der großen Pyramide, die leider immer noch Anhänger findet.\""
 lepsius.1119.g: "Alles begann in Mesopotamien."
 lepsius.1119.h: "Es gibt nicht nur einen Ursprung allein."
 lepsius.1121.t: "Archäologischer Kongress: Der Status von Troja"
 lepsius.1121.d: "Unser Land hat alle relevanten Vorbereitungen getroffen, um den nächsten Archäologenkongress abzuhalten. Die Konferenz soll die Troja-Frage endgültig klären. Trotz der spektakulären Ausgrabungen Heinrich Schliemanns ist die Frage durchaus berechtigt, was Heinrich Schliemann tatsächlich gefunden hat, ob es sich wirklich um Troja handelte und ob Troja in dieser Form überhaupt existierte. Einladungen werden an alle wichtigen Archäologen weltweit verschickt. Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wird die Sitzung leiten."
 lepsius.1121.f: "Nachdem Schliemann die Entdeckung Trojas bekannt gegeben hatte, dauerte es einige Zeit, bis skeptische Geister ihren Schockzustand überwanden. Spätere Inspektionen ergaben nicht nur, dass Schliemann in der falschen Schicht gegraben hatte, sondern auch, dass der angebliche \"Schatz des Priamos\", den er gefunden hatte, viel älter war als das homerische Troja. Bald verbreitete sich das Gerücht, Schliemann hätte möglicherweise die falsche Stadt ausgegraben. Andere bestanden darauf, dass nichts ausgegraben werden dürfe, was nicht existierte. Wieder andere verteidigten Schliemanns Entdeckung und sahen den Beweis erbracht, da Schliemann sich auf antike Beschreibungen gestützt habe. Römische Funde bewiesen auch, dass die Griechen und Römer diesen Ort auch als Schauplatz des Trojanischen Krieges betrachteten. Die Entdeckung Trojas beendete den Gelehrtenstreit nicht, sondern markierte lediglich eine neue Phase."
 lepsius.1121.g: "Die archäologische Welt soll unser Gast sein."
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetAltName('NOM')] hat zu einem archäologischen Kongress eingeladen. Die Konferenz soll die Troja-Frage endgültig klären. Trotz der spektakulären Ausgrabungen Heinrich Schliemanns ist die Frage durchaus berechtigt, was Heinrich Schliemann tatsächlich gefunden hat, ob es sich wirklich um Troja handelte und ob Troja in dieser Form überhaupt existierte. Unser Archäologe Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] hat eine herzliche Einladung erhalten."
 lepsius.1122.g: "Immer diese Auseinandersetzungen darüber, wer die schönsten Lederjacken hat..."
 lepsius.1123.d_laughed: "Das Erscheinen von Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wurde mit Belustigung aufgenommen. [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] steht nicht gerade im Ruf, auf dem Gebiet der Ägäischen Archäologie etwas Herausragendes geleistet zu haben. Es gab eindeutig Witze hinter verschlossenen Türen."
 lepsius.1123.d_respected: "Vor Beginn des Archäologenkongresses wurde unser Archäologe herzlich begrüßt und die üblichen Bräuche ausgetauscht. [ROOT.GetCountry.GetAltNameNoFlag('NOM')|U] genießt in der Forschungswelt einen anerkannten Ruf."
 lepsius.1123.d_lauded: "Die Ankunft von Professor [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] wurde mit großer Freude begrüßt. Er gilt als einer der am meisten erwarteten Gäste. Schnell bildete sich eine Menschenmenge um ihn, denn [ROOT.GetCountry.GetAltNameNoFlag('NOM')] gilt als Pionier auf dem Gebiet der Ägäischen Archäologie."
 lepsius.1124.t: "Troja: Nur ein Mythos?"
 lepsius.1124.d: "Die Debatte über den Status Trojas ist noch kontroverser als erwartet. Es sind nicht nur zwei, sondern drei Lager entstanden. Die erste Gruppe besteht aus leidenschaftlichen Schliemann-Anhängern, die völlig davon überzeugt sind, dass alle von ihm aufgestellten Thesen richtig sind. Dem steht ein unversöhnliches Gegenlager gegenüber, das nur sehr dürftige Beweise dafür sieht, dass homerisches Troja etwas mit der Ausgrabungsstätte Schliemanns zu tun hat. Eine dritte Gruppe glaubt, dass Schliemann schwerwiegende Fehler begangen hat, dass dies jedoch tatsächlich die Stadt war, die er suchte."
 lepsius.1124.f: "\"Wenn Schliemann Troja nicht gefunden hat, was hat er dann gefunden?\" Er findet einen Ort, der den Beschreibungen der Ilias und der antiken Autoren entspricht. Er findet eine Struktur, die diesmal passt. Und wir finden ein Bauwerk, das offenbar von Feinden zerstört wurde. Wie viele weitere Beweise werden benötigt? Prof. [SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName] begann seinen Vortrag, wurde dann aber von vielen Fragen seines Kollegen [SCOPE.sCharacter('lepsius_troy_attacker_scope').GetLastName] unterbrochen. Beispielsweise wussten die alten Griechen nicht mehr, wo sich Troja in der klassischen Zeit befand, und hatten diesen Ort bereits fälschlicherweise mit Troja identifiziert. Dass der Name der Stadt unbekannt ist und es keinen Hinweis darauf gibt, in welcher Beziehung sie zur griechischen Welt stand. Und dass es nie verlässliche historische Quellen zu einem Trojanischen Krieg in irgendeiner Form gegeben hat, die Homers Beschreibungen ähneln. Dann intervenierte Herr [SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName]: \"Liebe Kolleginnen und Kollegen, Schliemann hat sicherlich Fehler gemacht – aber wollen wir den Blick für das große Ganze verlieren?\""
 lepsius.1124.g: "Schliemann hat Troja gefunden."
 lepsius.1124.h: "Schliemann hat \"Troja\" gefunden, aber die Sache ist komplizierter."
 lepsius.1124.i: "Es gibt keinen wirklichen Beweis dafür, dass es sich hier wirklich um Troja handelt."
 lepsius.1129.t_homeric: "Troja: Geschichte, kein Mythos"
 lepsius.1129.t_historical: "Troja: Geschichte und Mythos"
 lepsius.1129.t_myth: "Troja: Mythos, nicht Geschichte"
 lepsius.1129.t_disputed: "Troja: Ein ungelöstes Rätsel"
 lepsius.1129.d_homeric: "Nach heftigen Debatten und vielen Vorträgen konnte sich das Lager der Schliemann-Anhänger durchsetzen, die den homerischen Ilion auf dem Hügel von Hisarlik erkannten. Nicht nur die Historizität Trojas, sondern auch der Trojanische Krieg und andere Elemente der homerischen Epen werden als historische Realität anerkannt."
 lepsius.1129.d_historical: "Die auf dem Kongress [SCOPE.sCountry('lepsius_congress_host_country').GetAltName('IN')] versammelten Archäologen kamen zu dem Schluss, dass zumindest Teile der homerischen Überlieferung einen Kern Wahrheit enthalten. Auch wenn sich Schliemann bei der Ausgrabung geirrt hat, gibt es einige Hinweise darauf, dass Hisarlik dem Ort entspricht, der in der Literatur und Geschichtsschreibung allgemein als Troja anerkannt wird – der Rest ist eine Frage der Klärung von Details."
 lepsius.1129.d_myth: "Der Kongress kam zu dem Schluss, dass die Troja-Debatte nach Jahrhunderten beendet sei: Die vermeintliche Entdeckung Trojas habe die Kritiker gestärkt, die noch stärker vermuten, dass es sich bei den homerischen Epen um reine Fiktion handele. Was auch immer Schliemann ausgegraben hat, es kann nicht Troja sein, weil es nie existiert hat."
 lepsius.1129.d_disputed: "Der Stellungskrieg zwischen Wissenschaftlern hat zuletzt zu großer Ernüchterung und Apathie geführt. Eine Lösung der Troja-Frage ist nicht in Sicht – nicht einmal auf eine gemeinsame Abschlusserklärung konnte man sich einigen. Einige Vertreter gingen vorzeitig, andere verbrachten ihre Zeit mit weiteren sinnlosen Diskussionen."
 lepsius.1129.f_homeric: "Die Schliemann-Anhänger feiern heute einen großen Triumph: Sie schickten begeistert ein Telegramm an den Entdecker Trojas, in dem sie alle seine Thesen bestätigten und ihn sogar zum Ehrenmitglied der Gesellschaft ernannten. Er hat Troja definitiv ausgegraben und damit den Beweis erbracht, dass der Trojanische Krieg der homerischen Epen keine Erfindung, keine vage Erinnerung, sondern ein historisches Ereignis war. Jetzt ist es umso wichtiger, die Ägäisregion nach weiteren Artefakten zu durchsuchen, die noch mehr Informationen über das einst als \"mythisch\" getarnte Zeitalter liefern könnten. Der Enthusiasmus der Forscher dürfte dafür sorgen, dass bald intensivere Ausgrabungen zur Untermauerung von Schliemanns Thesen stattfinden: Vielleicht findet man bald das Haus des Odysseus, das Grab des Achilleus oder die Badewanne, in der Agamemnon getötet wurde? Es ist überraschend, dass Schliemann noch nicht auf das Telegramm geantwortet hat ..."
 lepsius.1129.f_historical: "Nach langen Diskussionen und viel Überzeugungsarbeit konnte unter den meisten Kongressmitgliedern ein Kompromiss erzielt werden. Die überwiegende Mehrheit der internationalen Archäologenversammlung ist der Meinung, dass Schliemann bei der Ausgrabung von Troja schwerwiegende Fehler gemacht hat – unter anderem ist klar, dass er in der falschen Ausgrabungsschicht gesucht hat. Dies bedeutet jedoch lediglich, dass Schliemann das \"falsche\" Troja am \"richtigen\" Ort gefunden hat. Eine andere Schicht könnte tatsächlich die Stadt enthalten, die aus der Zeit des Trojanischen Krieges stammt. Ob es sich hierbei um ein reales historisches Ereignis handelte, konnten die Archäologen letztlich nicht feststellen; Tatsache ist, dass der Hügel, auf dem Troja liegt, mehrmals Opfer von Bränden und Kriegen wurde. Was die Identität der Stadt betrifft, bestätigt sich die These eines hethitischen Einflusses. Die Wissenschaftler haben angekündigt, diese Ergebnisse zum Anlass für eine intensivere Forschung zu nehmen und die Troja-Frage weiter intensiv zu diskutieren."
 lepsius.1129.f_myth: "Nach heftigen Auseinandersetzungen konnten sich die Archäologen und Historiker – zum Teil nur mit viel Knurren im Magen – dazu durchringen, eine gemeinsame Erklärung zu unterzeichnen. Dementsprechend sehen sie in den homerischen Epen lediglich literarische Produkte, die möglicherweise auf ältere Ereignisse verweisen, die jedoch für die moderne Archäologie nur schwer zu rekonstruieren sind. Es könnte vielmehr sein, dass der Trojanische Krieg als \"Krieg als solcher\" betrachtet wird, in dem sich die gesamte menschliche Erfahrung widerspiegelte. Troja könnte also etwa so viel historischen Inhalt haben wie Atlantis: eine Art Utopie, ein literarischer Ort, an dem Ideen ausgefochten werden. Grundsätzlich erklärte der Kongress die Troja-Forschung zu einer Tätigkeit \"am Rande der Pseudowissenschaft\", die sowohl sinn- als auch zwecklos sei. Die Archäologie sollte sich lohnenderen Bereichen zuwenden."
 lepsius.1129.f_disputed: "\"Na ja, wenigstens war das Essen gut!\""
 lepsius.1129.g: "Schliemann hat also tatsächlich Troja gefunden!"
 lepsius.1129.h: "Schliemann hat das falsche Troja ausgegraben, aber der Standort stimmt."
 lepsius.1129.i: "Troja ist höchstwahrscheinlich reine Literatur."
 lepsius.1129.j: "Dieser gesamte Kongress war reine Zeitverschwendung!"
 lepsius.1201.t: "Lokale Ausgrabungsstätte in [SCOPE.sState('lepsius_excavation_site').GetName]"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] hat in [SCOPE.sState('lepsius_excavation_site').GetName] eine neue Ausgrabungsstätte identifiziert. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] und [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Team begannen sofort mit der Arbeit. Allerdings ist noch nicht klar, wie lange die Ausgrabung finanziert wird."
 lepsius.1201.f: "Eine Ausgrabung kann für 5, 7 oder 10 Jahre genehmigt werden. Im Gegensatz zu einer Ausgrabung im Ausland kann diese zu keinem Zeitpunkt abgebrochen werden. Der leitende Archäologe bleibt bis zu seiner Rückkehr je nach Amtszeit 6, 12 oder 18 Monate an der Ausgrabungsstätte. Er ist in dieser Zeit nicht erreichbar."
 lepsius.1201.g: "10 Jahre."
 lepsius.1201.h: "7 Jahre."
 lepsius.1201.i: "5 Jahre."
 lepsius.1202.t: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] kehrt von der Ausgrabungsstätte zurück"
 lepsius.1202.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] hat in den letzten Monaten beim Aufbau der archäologischen Ausgrabungsstätte in [SCOPE.sState('lepsius_excavation_site').GetName] mitgeholfen und erste Entdeckungen gemacht. Er kehrt zur Auswertung an seine Universität zurück, während das Team die Ausgrabungen in den nächsten Jahren selbstständig fortsetzt, bis die Finanzierung aufgebraucht ist."
 lepsius.1202.f: "\"Bei wenigen Arbeiten hängen die Ergebnisse so direkt von der Persönlichkeit des Arbeiters ab wie beim Ausheben.\" Das alte Sprichwort, dass ein Mann in einem Thema findet, wonach er sucht, ist zu wahr; oder wenn er nicht genug Einsicht hat, um sicherzustellen, dass er findet, wonach er sucht, ist es zumindest traurig, dass er nichts findet, was er nicht sucht.\" -Flinders Petrie"
 lepsius.1202.g: "Willkommen zurück."
 lepsius.1203.t: "Lokale Ausgrabung abgeschlossen"
 lepsius.1203.d: "Das Grabungsteam hat die Ausgrabung vor Ort abgeschlossen und einige letzte Fundstücke verstaut. Es steht nun wieder für andere Ausgrabungen oder Expeditionen zur Verfügung."
 lepsius.1203.f: "\"Dunkel sind des Schicksals Wege,\nungewiß der Zukunft Stern,\neh ich mich zu Bette lege,\ntrink ich einen Kognak gern.\" -Robert Koldewey"
 lepsius.1203.g: "Wir sollten bald eine weitere Ausgrabung durchführen."
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] erfindet das Drei-Zeitalter-System"
 lepsius.2000.d: "Der Direktor des Dänischen Nationalmuseums, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], hat ein System zur Klassifizierung archäologischer Funde in den drei Perioden #b Steinzeit#!, #b Bronzezeit#! und #b Eisenzeit#! erfunden. Das ist revolutionär für die Archäologie!"
 lepsius.2000.f: "\"Sehen Sie, manche Artefakte tauchen immer zusammen auf und manche Materialien tauchen nie bei derselben Ausgrabung auf. Silber zum Beispiel findet man nur dort, wo auch Eisenwerkzeuge und Waffen gefunden werden. Gold hingegen kann sowohl mit Eisen als auch mit Bronze gefunden werden.\" Werkzeuge.\nEs ist auch faszinierend, dass einige Materialien nur in bestimmten Grabformen vorkommen. Steinwerkzeuge können nur bei nicht eingeäscherten Leichen und Steinkammergräbern gefunden werden. Eisen findet man in Kammergräbern in Hügelgräbern.\nAll dies ermöglicht es uns Datieren Sie unsere Erkenntnisse viel genauer. Zuerst gab es Steinwerkzeuge, dann gab es Bronzewerkzeuge und erst danach gab es Eisenwerkzeuge."
 lepsius.2000.g: "Solch ein großartiger Geist muss für uns arbeiten!"
 lepsius.2000.h: "Er kann in seinem Museum bleiben..."
