 je_lepsius_palmyra: "Palmyra – Stadt der Palmen"
 je_lepsius_palmyra_reason: "#T Die Ruinen von Palmyra in Syrien sind ein faszinierender Ort für Archäologen.#!\n$mr_divider_for_je$\nJeden Monat lang machen Sie Fortschritte, die von vielen verschiedenen Faktoren abhängen. An bestimmten Punkten der Ausgrabung erhalten Sie ein Ereignis, das Ihnen [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] Erfahrung gewährt und die Staatseigenschaft ändert, was zu mehr [concept_curtiss_tourism] Einkommen führt.\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_palmyra_1_loc: "Die Ruinen sind größtenteils noch in dem Zustand, in dem sie sich über Jahrhunderte befanden."
 je_lepsius_palmyra_2_loc: "Die jüngsten Ausgrabungen und teilweisen Restaurierungen des Bel-Tempels haben mehr Menschen angezogen, die diese antike Ausgrabungsstätte besuchen möchten."
 je_lepsius_palmyra_3_loc: "Unsere Archäologen haben verschiedene Tempel ausgegraben und restauriert, wie den Tempel des Bel, das Tal der Gräber mit seinen Turmgräbern und viele andere Orte. Dies führt zu immer mehr Besuchern."
