 je_lepsius_palmyra_reason: "#T Die Ruinen von Palmyra in Syrien sind ein faszinierender Ort für Archäologen.#!\n$mr_divider_for_je$\nJeden Monat lang machen Sie Fortschritte, die von vielen verschiedenen Faktoren abhängen. An bestimmten Punkten der Ausgrabung erhalten Sie ein Ereignis, das Ihnen [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] Erfahrung gewährt und die Staatseigenschaft ändert, was zu mehr [concept_curtiss_tourism] Einkommen führt.\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
