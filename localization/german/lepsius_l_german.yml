 andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_loc: "Anhand einiger weniger Fossilien und dank des Einsatzes moderner Werkzeuge und [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]es unvergleichlichen Genies konnte Professor [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastNameNoFormatting] als erster #o Homo Heidelbergensis#! klassifizieren."
