 lepsius.5000.t: "Die Ruinen von Palmyra"
 lepsius.5000.d: "In unserem Land befinden sich die Ruinen der antiken Stadt Palmyra. Unsere Archäologen können es kaum erwarten, mit der Ausgrabung der Ausgrabungsstätte zu beginnen und so viel wie möglich daraus zu lernen."
 lepsius.5000.f: "Palmyra ist eine antike Stadt in Syrien, die über Jahrhunderte existierte. Die Stadt war für ihre Kaufleute bekannt. Die reichen Kaufleute errichteten viele Monumente, die die Zeit überdauerten. Infolgedessen wurden viele der antiken Gebäude verändert, was für die Archäologen eine schwierige Situation darstellte.\nDie Stadt ist nicht nur für ihre Kaufleute berühmt, sondern auch für Zenobia, Königin des kurzlebigen Palmyrischen Reiches. Sie übernahm für einige Zeit die Kontrolle über den Osten des Römischen Reiches, bis Kaiser Aurelian den Osten zurückeroberte und die Stadt Palmyra zerstörte."
 lepsius.5000.g: "Ich frage mich, was wir finden werden!"
 lepsius.5001.t: "Tempel des Bel restauriert"
 lepsius.5001.d: "Unsere Archäologen haben unermüdlich daran gearbeitet, den Bel-Tempel wiederherzustellen. Anbauten und Veränderungen aus der muslimischen Zeit der Stadt mussten entfernt und vergrabene Gebäudeteile freigelegt werden."
 lepsius.5001.f: "Der Tell oder Hügel, auf dem der Tempel errichtet wurde, wurde bereits 3000 v. Chr. von Menschen genutzt, wie unsere stratigraphische Analyse ergab. Der Tempel, den wir so weit wie möglich rekonstruiert haben, ist ein römischer Tempel aus dem späten ersten und der ersten Hälfte des zweiten Jahrhunderts n. Chr..\nSpäter wurde der Tempel in eine christliche Kirche umgewandelt und nach der Eroberung der Region durch die Araber in eine Moschee umgewandelt.\n\n#V Heute:#! Leider wurde der Tempel des Bel 2015 von ISIS zerstört. Es gibt jedoch Pläne, den Tempel mit den noch vorhandenen Teilen wieder aufzubauen."
 lepsius.5001.g: "Ich frage mich, was wir finden werden!"
 lepsius.5002.t: "Tal der Gräber ausgegraben"
 lepsius.5002.d: "Westlich von Palmyra befinden sich zahlreiche Gräber. Sie beherbergen eindrucksvolle Grabtürme, die unsere Archäologen ausgegraben und teilweise restauriert haben."
 lepsius.5002.f: "Die Nekropole Tal der Gräber beherbergt viele Turmgräber. Der älteste stammt aus dem Jahr 9 v. Chr. und heißt Turm des Atenaten. Ein weiterer Turm, der Turm des Elahbel, wurde während der Herrschaft Kaiser Trajans vom palmyrenischen Aristokraten Marcus Ulpius Elahbelus errichtet. Elahbelus scheint römischer Bürger geworden zu sein, als Kaiser Trajan an der Macht war, da sie den gleichen Vor- und Nachnamen haben.\nEin weiterer interessanter Fund sind Seidenfragmente, die wahrscheinlich aus China mitgebracht wurden.\n\n#V Heute:#! Viele der Gräber wurden zerstört, als ISIS Palmyra kontrollierte. Darunter befanden sich der Turm des Elahbel und der Turm des Iamblichus."
 lepsius.5002.g: "Beeindruckend!"
 lepsius.5003.t: "Palmyra – Stadt der Palmen"
 lepsius.5003.d: "Unsere Archäologen haben viele Jahre damit verbracht, die Überreste von Palmyra freizulegen und so viel wie möglich wieder aufzubauen. Jetzt ist die einst wohlhabende Stadt wieder einen Besuch wert."
 lepsius.5003.f: "Die Ruinen von Palmyra ziehen wieder Besucher an. Viele Menschen wollen die Ruinen der einst so großen Stadt sehen, die es sogar mit Rom aufnahm, aber verlor. Die majestätischen Grabtürme, die Große Kolonnade, der Tempel des Bel und der Tempel des Baalshamin zeigen alle den einst so großen Reichtum der Stadt. Es muss ein fantastischer Anblick gewesen sein, als die Stadt der Palmen ihre Blütezeit erlebte!"
 lepsius.5003.g: "Ein wunderbarer Ort für einen Besuch!"
