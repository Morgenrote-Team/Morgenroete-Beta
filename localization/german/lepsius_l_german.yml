 lepsius_expedition_general_information_loc: "\n$mr_divider_for_je$\nIhre [concept_lepsius_expedition] erhält jeden Monat ein Ereignis, das Ihrer Expedition Fortschritt verleiht. Sobald der Fortschritt das Limit erreicht, endet Ihre Expedition.\n$mr_divider_for_je$\nDer Erfolgswert zeigt Ihnen, wie erfolgreich Ihre Expedition ist. Je mehr Erfolg Sie erzielen, desto mehr [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] erhalten Sie am Ende der Expedition. Sie erhalten eine maximale Anzahl an Artefakten, wenn Ihr Erfolg #V 15#! erreicht.\nViele Faktoren können Ihren Erfolg beeinflussen, von Ereignissen bis zu Ihrer Vorbereitung. 10 Universitätsstufen mit [concept_pm_academics_university_humanities] gewähren Ihnen beispielsweise 1 Erfolgspunkt zu Beginn einer Expedition. Beachten Sie, dass Sie durch Universitätsspezialisierungen maximal 4 Punkte erhalten können."
