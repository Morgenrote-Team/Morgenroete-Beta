 je_ishtar_gate: "Rekonstruktion des Ischtar-Tors"
 je_ishtar_gate_reason: "Nachdem eine Expedition nach Babylonien Überreste des legendären Ischtar-Tors geborgen hatte, verlängerten wir unsere Ausgrabungslizenz, um die babylonischen Ziegelsteine ​​an unser Museum liefern zu lassen."
 je_ishtar_gate_success: "Insgesamt werden 200.000 Ziegelsteine ​​benötigt, um dem Tor seinen früheren Glanz zurückzugeben. Voraussichtlich erreichen uns jährlich etwa 20.000 Steine ​​– sofern es keine Probleme gibt."
 je_ishtar_gate_goal: ""
 je_lepsius_priams_treasure: "Der Schatz des Priamos"
 je_lepsius_priams_treasure_reason: "Heinrich Schliemann ist auf der Suche nach einem geeigneten Ort für den sagenumwobenen Schatz des Priamos, den er angeblich in Troja gefunden hat. Während ernsthafte Wissenschaftler bezweifeln, dass diese Leistungen wirklich in die von Schliemann vorgeschlagene Zeitepoche passen, ist dies zweitrangig. Schließlich ist es eine einmalige Gelegenheit, in den Besitz eines der größten archäologischen Schätze des Jahrhunderts zu gelangen. Unser Museum wäre dafür der perfekte Ort."
 je_lepsius_priams_treasure_fail: "Wenn ein Konkurrent Schliemanns Wünsche schneller erfüllt als wir, verlieren wir die einmalige Chance, an den Schatz des Priamos zu gelangen."
 je_lepsius_the_labyrinth: "Das Labyrinth"
 je_lepsius_the_labyrinth_reason: "Trapped in a strange, ancient labyrinth, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] must find [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way back out. If [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] makes too many mistakes, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] risks getting lost down there forever!"
 je_lepsius_discovery_tut: "Untersuchung im Tal der Könige"
 je_lepsius_discovery_tut_reason: "Wir haben allen Grund zu der Annahme, dass das Tal der Könige eine verborgene Ausgrabungsstätte von großem historischen Wert enthalten könnte. Die Suche könnte Jahre dauern. Wem diese Entdeckung gelingt, sollte einen Platz in der Geschichte erhalten."
 je_lepsius_disovery_tut_success: "Sollte es uns gelingen, in Oberägypten zehn Hinweise zu finden, haben wir genug Material gesammelt, um einen verlorenen Ort von großer historischer Bedeutung wiederzuentdecken."
 je_lepsius_disovery_tut_fail: "Unsere Bemühungen werden vergeblich sein, wenn eine andere Nation vor uns zehn Hinweise in Oberägypten findet."
 je_lepsius_discovery_ship: "Untersuchungen in der Nähe der Pyramiden"
 je_lepsius_discovery_ship_reason: "Wir haben allen Grund zu der Annahme, dass die Pyramiden etwas von großem historischen Wert verbergen könnten. Die Suche könnte Jahre dauern. Wem diese Entdeckung gelingt, sollte einen Platz in der Geschichte erhalten."
 je_lepsius_disovery_ship_success: "Sollte es uns gelingen, in Unterägypten zehn Hinweise zu finden, haben wir genug Material gesammelt, um einen verlorenen Ort von großer historischer Bedeutung wiederzuentdecken."
 je_lepsius_disovery_ship_fail: "Unsere Bemühungen werden vergeblich sein, wenn eine andere Nation vor uns zehn Hinweise in Unterägypten findet."
 je_lepsius_discovery_babylon: "Untersuchungen in Babylon"
 je_lepsius_discovery_babylon_reason: "Wir haben allen Grund zu der Annahme, dass es in der Region Babylon etwas Größeres geben könnte, das wir noch nicht entdeckt haben. Die Suche könnte Jahre dauern. Wem diese Entdeckung gelingt, sollte einen Platz in der Geschichte erhalten."
 je_lepsius_disovery_babylon_success: "Sollte es uns gelingen, in Babylonien zehn Hinweise zu finden, haben wir genug Material gesammelt, um einen verlorenen Ort von großer historischer Bedeutung wiederzuentdecken."
 je_lepsius_disovery_babylon_fail: "Unsere Bemühungen werden vergeblich sein, wenn eine andere Nation vor uns zehn Hinweise in Babylonien findet."
 je_lepsius_discovery_semiramis: "Untersuchungen in Assyrien"
 je_lepsius_discovery_semiramis_reason: "Wir haben allen Grund zu der Annahme, dass Assyrien ein Wunder verbergen könnte, von dem niemand etwas weiß. Die Suche könnte Jahre dauern. Wem diese Entdeckung gelingt, sollte einen Platz in der Geschichte erhalten."
 je_lepsius_disovery_semiramis_success: "Sollte es uns gelingen, in Assyrien zehn Hinweise zu finden, haben wir genug Material gesammelt, um einen verlorenen Ort von großer historischer Bedeutung wiederzuentdecken."
 je_lepsius_disovery_semiramis_fail: "Unsere Bemühungen werden vergeblich sein, wenn vor uns eine andere Nation in Assyrien zehn Hinweise findet."
 je_lepsius_discovery_mycenae: "Untersuchungen in Mykene"
 je_lepsius_discovery_mycenae_reason: "Wir haben allen Grund zu der Annahme, dass die antike Stadt Mykene noch immer ein Geheimnis birgt. Die Suche könnte Jahre dauern. Wem diese Entdeckung gelingt, sollte einen Platz in der Geschichte erhalten."
 je_lepsius_disovery_mycenae_success: "Sollte es uns gelingen, in Argolis zehn Hinweise zu finden, haben wir genug Material gesammelt, um einen verlorenen Ort von großer historischer Bedeutung wiederzuentdecken."
 je_lepsius_disovery_mycenae_fail: "Unsere Bemühungen werden vergeblich sein, wenn eine andere Nation vor uns zehn Hinweise in Argolis findet."
 je_lepsius_discovery_pakal: "Untersuchungen in Yucatán"
 je_lepsius_discovery_pakal_reason: "Wir haben allen Grund zu der Annahme, dass noch nicht alle Geheimnisse der Maya gelöst sind. Die Suche könnte Jahre dauern. Wem diese Entdeckung gelingt, sollte einen Platz in der Geschichte erhalten."
 je_lepsius_disovery_pakal_success: "Sollte es uns gelingen, in Yucatán zehn Hinweise zu finden, haben wir genug Material gesammelt, um einen verlorenen Ort von großer historischer Bedeutung wiederzuentdecken."
 je_lepsius_disovery_pakal_fail: "Unsere Bemühungen werden vergeblich sein, wenn eine andere Nation vor uns zehn Hinweise in Yucatán findet."
 je_lepsius_archaoelogical_society: "Gründung einer Archäologischen Gesellschaft"
 je_lepsius_archaoelogical_society_reason: "Nicht nur das Interesse an der Archäologie nimmt in unserem Land stetig zu. Nach vielen Jahren der Expeditionen, Ausgrabungen und Artefaktentdeckungen hat unser Land eine erstaunliche archäologische Expertise aufgebaut. Ein herausragender Archäologe könnte eine Archäologische Gesellschaft gründen, um die wissenschaftlichen und intellektuellen Kräfte zu bündeln und neue Impulse zu geben. Dies würde nicht nur unsere wissenschaftliche Leistung verbessern, sondern auch die Erfahrung nachfolgender Generationen von Archäologen verbessern."
