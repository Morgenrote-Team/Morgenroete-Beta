 lepsius_specialization_egypt_button: "Ägyptologie"
 lepsius_specialization_egypt_button_desc: "Die Ägyptologie erforscht alle Bereiche der altägyptischen Zivilisation (Alltagsleben, Sprache und Literatur, Geschichte, Religion, Kultur und Kunst, Wirtschaft, Recht, Ethik und Geistesleben) ab der Vorgeschichte des 5. Jahrtausends v. Chr. Chr. (zum Beispiel die Negade- und Badari-Kultur) bis zum Ende der römischen Herrschaft im 4. Jahrhundert n. Chr."
 lepsius_specialization_mesopotamia_button: "Assyriologie"
 lepsius_specialization_mesopotamia_button_desc: "Assyriologie, auch bekannt als Keilschriftkunde oder Altorientalistik, ist die archäologische, anthropologische, historische und linguistische Untersuchung der Kulturen, die Keilschrift verwendeten. Das Feld umfasst das vordynastische Mesopotamien, Sumer, die frühen sumero-akkadischen Stadtstaaten, das Akkadische Reich, Ebla, die akkadisch- und kaiserlich-aramäischsprachigen Staaten Assyrien, Babylonien und die Sealand-Dynastie, die ausländischen Einwandererdynastien im südlichen Mesopotamien, einschließlich der Gutianer, Amoriter, Kassiten, Aramäer, Suteaner und Chaldäer."
 lepsius_specialization_aegean_button: "Ägäische Archäologie"
 lepsius_specialization_aegean_button_desc: "Ägäische Zivilisation ist ein allgemeiner Begriff für die bronzezeitlichen Zivilisationen Griechenlands rund um das Ägäische Meer. Es gibt drei verschiedene, aber kommunizierende und interagierende geografische Regionen, die unter diesen Begriff fallen: Kreta, die Kykladen und das griechische Festland. Kreta ist seit der frühen Bronzezeit mit der minoischen Zivilisation verbunden. Die kykladische Zivilisation konvergierte während der frühhelladischen Zeit mit dem Festland und in der mittelminoischen Zeit mit Kreta. Von c. 1450 v. Chr. (Späthelladisch, Spätminoisch) breitet sich die griechisch-mykenische Zivilisation wahrscheinlich durch militärische Eroberung auf Kreta aus."
 lepsius_specialization_precolumbian_button: "Präkolumbianische Archäologie"
 lepsius_specialization_precolumbian_button_desc: "In der Geschichte Amerikas reicht die präkolumbianische Ära von der ursprünglichen Besiedlung Amerikas im Jungpaläolithikum bis zur europäischen Kolonisierung, die mit der Reise von Christoph Kolumbus im Jahr 1492 begann. Normalerweise umfasst die Ära die Geschichte der indigenen Kulturen bis zu ihrem bedeutenden Einfluss von Europäern. Dies kann für bestimmte Kulturen Jahrzehnte oder sogar Jahrhunderte nach Kolumbus geschehen sein."
 lepsius_alexander_search_clue_button: "Finden Sie weitere Hinweise"
 lepsius_alexander_search_clue_button_desc: "Wir können eine spezielle archäologische Expedition unternehmen, um einen weiteren Hinweis auf das Grab Alexanders des Großen zu finden."
 lepsius_ark_search_clue_button: "Finden Sie weitere Hinweise"
 lepsius_ark_search_clue_button_desc: "Wir können eine spezielle archäologische Expedition unternehmen, um einen weiteren Hinweis auf die Bundeslade zu finden."
 lepsius_atlantis_search_clue_button: "Finden Sie weitere Hinweise"
 lepsius_atlantis_search_clue_button_desc: "Wir können eine spezielle archäologische Expedition unternehmen, um einen weiteren Hinweis auf Atlantis zu finden."
 lepsius_eldorado_search_clue_button: "Finden Sie weitere Hinweise"
 lepsius_eldorado_search_clue_button_desc: "Wir können eine spezielle archäologische Expedition unternehmen, um einen weiteren Hinweis auf El Dorado zu finden."
 lepsius_legendary_expedition_modifier: "Legendäre archäologische Expedition"
 lepsius_alexander_intensive_study_button: "Siwa"
 lepsius_alexander_intensive_study_button_desc: "Die Siwa-Oase gilt als einer der Schlüsselorte in Alexanders Leben. Einige behaupten sogar, dass er hier und nicht in Alexandria begraben wurde, da er eine starke Verbindung zum ägyptischen Gott Ammon hatte, dessen Orakel sich hier befand. Aufgrund unserer herausragenden Kenntnisse auf dem Gebiet der Ägyptologie können wir hier leicht einen zusätzlichen Hinweis finden. Unser Archäologe reist privat und heimlich, ohne den Aufwand einer Expedition."
 lepsius_ark_intensive_study_button: "Jerusalem"
 lepsius_ark_intensive_study_button_desc: "Es wird angenommen, dass der Jerusalemer Tempelberg der letzte Ort war, an dem die Bundeslade aufbewahrt wurde, bevor sie verschwand. Es ist sehr wahrscheinlich, dass es unter dem Tempelberg noch wichtige Hinweise darauf gibt, was im Chaos der babylonischen Eroberung tatsächlich geschehen sein könnte. Aufgrund unserer herausragenden Kenntnisse auf dem Gebiet der Assyriologie können wir hier leicht einen zusätzlichen Hinweis finden. Unser Archäologe reist privat und heimlich, ohne den Aufwand einer Expedition."
 lepsius_atlantis_intensive_study_button: "Santorin"
 lepsius_atlantis_intensive_study_button_desc: "Santorini (Thera) ist berühmt für seinen gewaltigen Vulkanausbruch, der eine minoische Stadt auf der Insel und möglicherweise die gesamte minoische Zivilisation schwer in Mitleidenschaft gezogen hat. Die These, dass der Ausbruch des Vulkans der Ursprung von Platons Geschichte vom Untergang von Atlantis war, ist eine der vielen Lokalisierungshypothesen über Atlantis. Aufgrund unserer herausragenden Kenntnisse auf dem Gebiet der Ägäischen Archäologie können wir hier leicht einen zusätzlichen Hinweis finden. Unser Archäologe wird privat und heimlich reisen, ohne den Aufwand einer Expedition."
 lepsius_eldorado_intensive_study_button: "Bogotá"
 lepsius_eldorado_intensive_study_button_desc: "Bogotá gilt als ehemalige Hauptstadt der Muisca, einer Zivilisation, die mit dem Goldmythos El Dorado verbunden ist. Jeder neue Herrscher der Muisca brachte dem Sonnengott bei seinem Amtsantritt ein Opfer dar, wobei sein nackter Körper mit einer Paste aus Goldstaub bedeckt war. Aufgrund unserer herausragenden Kenntnisse auf dem Gebiet der präkolumbianischen Archäologie können wir hier leicht einen zusätzlichen Hinweis finden. Unser Archäologe wird privat und heimlich reisen, ohne den Aufwand einer Expedition."
 lepsius_2_sub_archaeological_team_tt: "Verliere #R 2#! Ausgrabungsteams."
 lepsius_egypt_specialist: "Spezialisierung: Ägyptologie"
 lepsius_egypt_specialist_desc: "Dieser Archäologe ist ein Experte auf dem Gebiet des alten Ägypten und findet daher Artefakte und Hinweise leichter."
 lepsius_mesopotamia_specialist: "Spezialisierung: Assyriologie"
 lepsius_mesopotamia_specialist_desc: "Dieser Archäologe ist ein Experte auf dem Gebiet des antiken Mesopotamiens und findet daher Artefakte und Hinweise leichter."
 lepsius_aegean_specialist: "Spezialisierung: Ägäische Archäologie"
 lepsius_aegean_specialist_desc: "Dieser Archäologe ist Experte für die mykenische und minoische Zivilisation und findet daher Artefakte und Hinweise leichter."
 lepsius_precolumbian_specialist: "Spezialisierung: Präkolumbianische Archäologie"
 lepsius_precolumbian_specialist_desc: "Dieser Archäologe ist Experte für präkolumbianische Zivilisationen und findet daher Artefakte und Hinweise leichter."
 lepsius_state_trait_alexander: "Spuren Alexanders"
 lepsius_state_trait_ark: "Spuren der Arche"
 lepsius_state_trait_atlantis: "Spuren von Atlantis"
 lepsius_state_trait_eldorado: "Spuren von El Dorado"
 lepsius.1001.t: "Alexanders Ruf"
 lepsius.1001.d: "Die Einweihung einer weltweit führenden, hervorragenden Sammlung ägyptischer Artefakte weckt eine Erinnerung, die einige Wissenschaftler des Archäologischen Museums lange verdrängt hatten ..."
 lepsius.1001.f: "Die Erinnerung an den mazedonischen Tempel im Sand wird wach, wenn [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] die Ausstellung betrachtet. Denn es gibt weitere Stücke aus der Ptolomäerzeit, einige sogar aus der Zeit der griechischen Eroberung. Puzzleteile, die bisher nicht zu interpretieren waren, ergeben plötzlich einen Sinn. Ein Hinweis darauf, dass in der ägyptischen Wüste noch mehr schlummern könnte. Etwas so Großes und Massives, dass die gesamte Sahara nicht ausreicht, um es zu begraben. Die letzte Ruhestätte Alexanders des Großen ist bis heute ein Rätsel. Doch die vielen Funde, das enorme Wissen und die brillante archäologische Expertise von Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sind eine Mischung, die historisch einzigartig ist. Der Archäologe ist sich sicher: Alexander war ein Mann, der den Lebenden gehörte, nicht den Toten. Und wer jemals seine ewige Ruhestätte finden würde, würde ewigen Ruhm erlangen."
 lepsius.1001.g: "Der Traum eines jeden Archäologen ..."
 lepsius.1002.t: "Die Arche"
 lepsius.1002.d: "Die Einweihung einer weltweit führenden, hervorragenden Sammlung mesopotamischer Artefakte weckt eine Erinnerung, die einige Wissenschaftler des Archäologischen Museums schon lange verdrängt hatten ..."
 lepsius.1002.f: "Cherubim schmückten die Bundeslade. Mischwesen, wie sie in Mesopotamien vorkommen. Abraham, der Stammvater Israels und dreier Weltreligionen, stammte aus Ur. Der Schöpfungsbericht weist Parallelen zu den babylonischen Mythen auf. Babylon ist zugleich ein Schicksalsort für Israel: Es waren die Herrscher Mesopotamiens, die die ersten jüdischen Staaten zerstörten, den Tempel in Schutt und Asche legten und die Bevölkerung deportierten. Seit diesem Tag ist auch die Bundeslade, in die Moses die Zehn Gebote gelegt haben soll, spurlos verschwunden. Es ist eines der bedeutendsten verlorenen Artefakte der Weltgeschichte. Mit Blick auf die perfekte Sammlung hat [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] Hinweise gefunden, die zeigen, dass die Bundeslade möglicherweise nicht für immer verloren war – und seit 2.500 Jahren auf ihre Bergung wartet."
 lepsius.1003.t: "Der größte Mythos von allen"
 lepsius.1003.d: "Die Einweihung einer weltweit führenden, hervorragenden Sammlung ägäischer Artefakte weckt eine Erinnerung, die einige Wissenschaftler des Archäologischen Museums lange verdrängt hatten ..."
 lepsius.1003.f: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] blickte auf das Orichalcum zwischen [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]en Fingern. Eine kleine glänzende Kugel. Ein Material, das nicht existieren durfte. Es war [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] in die Hände gefallen, nachdem das Archäologische Museum seine großartige Ausstellung eröffnet hatte. Eine Ausstellung, in der auch andere Exponate aus dem minoisch-ägäischen Raum [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] die Meinung festigten, dass es sich hier um eine Schnittstelle zwischen Wissenschaft und Mythos handelte. Darf ein Archäologe träumen? Niemand glaubte Schliemann, als er nach Troja suchte. Auch der Turmbau zu Babel wurde als bloße Metapher abgetan. Aber was ist mit dem größten Mythos aller Zeiten? Ein Mythos, der so groß war, dass selbst die Antike nicht mehr zu wissen schien, was Erzählung oder Geschichte war.\nDr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] schaut in die glänzende kleine Kugel, in der sich [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Gesicht spiegelt. Das Schicksal einer ganzen verlorenen Zivilisation blickt zurück."
 lepsius.1004.t: "Der Fluch des Goldes"
 lepsius.1004.d: "Die Einweihung einer weltweit führenden, hervorragenden Sammlung präkolumbianischer Artefakte weckt eine Erinnerung, die einige Wissenschaftler des Archäologischen Museums lange verdrängt hatten ..."
 lepsius.1004.f: "Seit der Ankunft der Europäer in Amerika kursieren Gerüchte. Tödliche Gerüchte. Unzählige Menschen kamen ums Leben, weil ihre Gier nach Gold sie trieb: in die Arme verfeindeter Stämme, in malariaverseuchte Sümpfe und in Stürme auf See. Ponce de Léon war auf der Suche nach dem Jungbrunnen. Vázquez de Coronado suchte nach den sieben goldenen Städten. Hernando de Soto durchquerte weite Teile Nordamerikas auf der Suche nach unbekannten Reichtümern. Die Hoffnung, berühmt und reich zu werden wie Cortés und Pizarro, war zu verführerisch, wenn auch trügerisch. Doch nun, da [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] sich von dem angeblichen Inka-Idol inspirieren lässt und es mit anderen Artefakten aus der reichen präkolumbianischen Ausstellung vergleicht, befürchtet [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] selbst, dass [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] dem gleichen Goldfieber erliegen könnte. Sollte es am Ende die Wissenschaft sein, die [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] zum Weg nach El Dorado führte?"
 je_lepsius_archaeology_start_in_egypt: "Die Geburt der Ägyptologie"
 je_lepsius_archaeology_start_in_egypt_reason: "In den Wüsten Ägyptens warten noch viele Schätze darauf, entdeckt zu werden. Wird einer unserer Archäologen eine neue Ära der Ägyptologie einläuten und [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] nach Ägypten ermöglichen?"
 lepsius.22.t: "Die Geburt der Ägyptologie"
 lepsius.22.d_egyptology: "Nach einer Expedition nach Ägypten stellte Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]e Forschungsergebnisse vor. Dank der Entschlüsselung der Hieroglyphen konnte [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] nicht nur verschiedene neue Fundstellen finden, auch [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]e Funde weckten neues Interesse an der Region."
 lepsius.22.f_egyptology: "#b Historischer Kontext:#! Nach dem Tod von François Champollion kam die Hieroglyphenforschung zum Erliegen. Im Jahr 1837 schrieb der junge deutsche Philologe Karl Richard Lepsius einen Brief an Ippolito Rosellini, einen engen Weggefährten Champollions und Mitverantwortlicher für die französisch-toskanische Ägyptenexpedition von 1829. Lepsius systematisierte und präsentierte das von Champollion gesammelte Wissen und trug maßgeblich zur Weiterentwicklung der Ägyptologie bei zu einer ernsthaften Wissenschaft. Andererseits überzeugte er die politischen Eliten Europas von künftigen Expeditionen nach Ägypten."
 notification_lepsius_birth_of_egyptology_notification_name: "Die Geburt der Ägyptologie"
 notification_lepsius_birth_of_egyptology_notification_desc: "Ein Archäologe aus [GetGlobalVariable('lepsius_egyptology_invented_country_global_var').GetCountry.GetAltName('DAT')] hat sich zu einer Expedition nach Ägypten aufgemacht und damit eine neue Ära der Ägyptologie eingeläutet. Wir sollten wie alle großen Nationen auch einen Archäologen nach Ägypten schicken!"
 je_lepsius_yucatan_expedition: "Expedition nach Yucatán"
 je_lepsius_yucatan_expedition_reason: "Es gibt Gerüchte über antike Ruinen im Dschungel von Yucatán. Man sagt, dass auf einen mutigen Entdecker fantastische Schätze warten. Vielleicht kann ein Archäologe die Maya-Schätze für uns finden? Dies würde es uns und anderen Nationen ermöglichen, [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] nach Yucatán zu bereisen."
 lepsius.23.t: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]s Expedition"
 lepsius.23.d: "Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] und [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Team verbrachte Monate im Dschungel von Yucatán. Jetzt sind sie mit Schätzen, Informationen und verschiedenen Zeichnungen der gefundenen Ruinen zurückgekehrt. Dies wird eine neue Ära der Archäologie in Mittelamerika einleiten."
 lepsius.23.f: "#b Historischer Kontext:#! War die Neue Welt nur die Heimat von Wilden und Barbaren, bevor die Europäer den Kontinent erreichten? Die Entdecker John Lloyd Stephens und Frederick Catherwood erschütterten dieses Weltbild zutiefst. Mehrere Jahre lang durchstreiften der Amerikaner und der Brite den Dschungel der Halbinsel Yucatan und besuchten nach eigenen Angaben 44 verschiedene Orte einer längst vergangenen mesoamerikanischen Kultur. Die Einheimischen erzählen schon seit langem Geschichten von längst vergessenen Städten im Dschungel und im Dschungel versteckten Tempeln; Aber Stephens‘ Berichte und insbesondere Catherwoods atemberaubende Lithographien eröffnen eine bisher völlig unbekannte Welt. Die Bilder von Tempeln, Statuen und Stelen beflügeln nicht nur die Fantasien von Romantikern. In den USA und Europa breitet sich eine Welle des Interesses an der unbekannten Zivilisation aus, das von Neugier über Verherrlichung bis hin zu echtem wissenschaftlichem Interesse reicht."
 notification_lepsius_yucatan_expedition_notification_name: "Yucatán-Expedition"
 notification_lepsius_yucatan_expedition_notification_desc: "Ein Archäologe aus [GetGlobalVariable('lepsius_yucatan_expedition_country_global_var').GetCountry.GetAltName('DAT')] ist von einer abenteuerlichen Reise auf der Halbinsel Yucatán zurückgekehrt – und erzählt von legendären Ruinen im Dschungel. Wissenschaftler haben Interesse bekundet, die Maya-Kultur genauer zu erforschen."
 lepsius.1011.t: "[SCOPE.sState('lepsius_location_state').GetNameNoFormatting]"
 lepsius.1011.d_alexander: "Ein weiteres Kapitel auf der Suche nach dem Grab des mächtigsten Mannes der Antike beginnt. Die bisherigen Informationen deuten darauf hin, dass es in [SCOPE.sState('lepsius_location_state').GetName] einen Hinweis geben könnte, der bei der Lokalisierung des Alexander-Mausoleums helfen könnte. Die Ausgrabungsteams und Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sind bereit."
 lepsius.1011.d_ark: "Ein warmer Wind aus der Wüste berührt das Expeditionsteam und Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], als sie mit [SCOPE.sState('lepsius_location_state').GetName] das Ziel ihrer Suche erreichen. Hier wird das Geheimnis der Bundeslade noch einmal gelüftet."
 lepsius.1011.d_atlantis: "War [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] ein Narr? Einer von Tausenden in Tausenden von Jahren? Wie viele hatten Platons Geschichte geglaubt und waren entweder nie zurückgekehrt – oder voller Scham und Trauer? Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] weiß: Auf dieser Reise gab es nur Erfolg. Alles andere bedeutete das Ende [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]er Karriere."
 lepsius.1011.d_eldorado: "Die Expeditionsteilnehmer beschweren sich über das tropische Klima. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] kühlt sich mit einem Ventilator ab. Der Weg führt in eine abgelegene Gegend. Einige Träger munkeln, dass sie auf der Suche nach Gold genauso verloren gehen könnten wie so viele spanische Konquistador-Truppen ..."
 lepsius.1011.f: "\"Fragen Sie sich: Warum suchen Sie den Kelch Christi?' Ist es zu Seiner Ehre oder zu Deiner?‘"
 lepsius.1011.g: "Grab tiefer."
 lepsius.1012.t: "Erfolgreiche Rückkehr"
 lepsius.1012.d_alexander: "Die unerträgliche Hitze verschwindet für einen Moment. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] schaut sich [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]e Notizen an. Neue Verbindungen werfen neues Licht auf die Suche nach dem Mausoleum Alexanders des Großen. Ein Gedanke geht durch [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]en Kopf. Es würde nicht lange dauern, bis [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] der Geschichte begegnen würde...und Geschichte schreiben würde."
 lepsius.1012.d_ark: "Die Suche nach der Bundeslade war mehr als eine Suche nach einem archäologischen Artefakt. Es war die Suche nach einem verlorenen Kultgegenstand, der den Kontakt mit Gott versprach. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hatte dies auf dieser Reise immer wieder erlebt. Doch wie viele archäologische Pilgerfahrten musste [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] über sich ergehen lassen, bevor dieser Kontakt zustande kam?"
 lepsius.1012.d_atlantis: "Der Mythos von Atlantis lebt weiter. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] weiß, dass die Reise noch nicht zu Ende ist. Während [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] über das Meer am Hafen blickt und die Vögel kreisen sieht, philosophiert [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] darüber, wie viele Herausforderungen noch zu bewältigen sind, bevor sie endlich ihr Ziel erreichen."
 lepsius.1012.d_eldorado: "Zur Überraschung des restlichen Expeditionsteams kehren die Wissenschaftler lebend und unversehrt zurück. Für einen Moment scheint es vergessen zu sein, dass Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] sie auf eine Selbstmordmission geschickt hat. Der erfolgreiche Abschluss dieser Etappe auf dem Weg nach El Dorado gibt [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] Recht."
 lepsius.1012.f: "\"Die Suche nach dem Gral ist die Suche nach dem Göttlichen in uns allen.' Aber wenn Sie Fakten wollen, kann ich Ihnen keine geben. 'In meinem Alter bin ich bereit, einiges im Glauben anzunehmen.\""
 lepsius.1012.g: "Ein weiteres Fragment eines großen Mosaiks."
 lepsius.1013.t_alexander: "Siwa"
 lepsius.1013.d_alexander: "Als Beduine verkleidet konnte Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] im Alleingang Zugang zum zerstörten Orakel von Ammon finden. Bei der Untersuchung fand [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] in einem bisher unzugänglichen Gebiet erhaltene Papyri aus der frühen Herrschaft der Ptolomäer, die Aufschluss über den Alexanderkult geben."
 lepsius.1013.t_ark: "Jerusalem"
 lepsius.1013.d_ark: "Wo sonst als in der Heiligen Stadt ließe sich mit größerer Sicherheit ein Hinweis auf das Schicksal der Bundeslade finden? Mit einer Mischung aus Bestechung und Gesetzesbruch gelang es Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], das verborgene Tunnelsystem unter dem Felsendom zu durchsuchen und einen entscheidenden Hinweis auf den Verbleib des kostbaren Artefakts zu finden."
 lepsius.1013.t_atlantis: "Santorin"
 lepsius.1013.d_atlantis: "Unter den Trümmern des gewaltigen Ausbruchs vor Tausenden von Jahren sind auf Santorini noch immer minoische Spuren zu sehen. Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat einen alten Palast untersucht, der der Katastrophe zum Opfer fiel; [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] hat eine ganze Reihe vergrabener Fresken freigelegt und restauriert. Eine davon zeigt eine Karte, die überraschenderweise die Merkmale des Mittelmeers und der atlantischen Westküste präzise wiedergibt."
 lepsius.1013.t_eldorado: "Bogotá"
 lepsius.1013.d_eldorado: "Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hat die Gegend um Bogotá erkundet, wo einst das mysteriöse Volk der Musica lebte. Hinweise der Einheimischen führten [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] zu einem bisher unbekannten Ort, wo zahlreiche Muisca-Artefakte weitere Informationen über das Ritual des 'Goldenen Mannes' liefern."
 lepsius.1013.f: "Länder, die sich im Einklang mit dem Ziel einer legendären Expedition auf einen bestimmten archäologischen Zweig konzentrieren, haben weitreichende Vorteile bei ihrer Suche nach einer archäologischen Sensation. Dabei geht es nicht nur darum, einen zusätzlichen Hinweis zu erhalten, der Ihre Suche beschleunigt."
 lepsius.1013.g: "Ein weiteres Fragment eines großen Mosaiks."
 lepsius_discovery_vilcabamba_modifier: "Die Entdeckung von Vilcabamba"
 lepsius_peru_inspection_modifier: "Unser Archäologe besucht unser Ausgrabungsteam in Peru, um eine neue Ausgrabungsstätte einzurichten."
 lepsius_add_1_vilcabamba_clue_tt: "Erhalte #G 1#! neuen Hinweise auf eine bedeutende archäologische Entdeckung in Peru."
 lepsius_add_2_vilcabamba_clue_tt: "Erhalte #G 2#! neue Hinweise auf eine bedeutende archäologische Entdeckung in Peru."
 lepsius_add_3_vilcabamba_clue_tt: "Erhalte #G 3#! neue Hinweise auf eine bedeutende archäologische Entdeckung in Peru."
 je_lepsius_discovery_vilcabamba: "Ermittlungen in Peru"
 je_lepsius_discovery_vilcabamba_reason: "Wir haben allen Grund zu der Annahme, dass noch nicht alle Geheimnisse der Inkas gelöst sind. Die Suche könnte Jahre dauern. Wem diese Entdeckung gelingt, sollte einen Platz in der Geschichte erhalten."
 je_lepsius_discovery_vilcabamba_goal: ""
 je_lepsius_disovery_vilcabamba_success: "Sollte es uns gelingen, in Peru zehn Hinweise zu finden, haben wir genug Material gesammelt, um einen verlorenen Ort von großer historischer Bedeutung wiederzuentdecken."
 je_lepsius_disovery_vilcabamba_fail: "Unsere Bemühungen werden vergeblich sein, wenn eine andere Nation vor uns zehn Hinweise in Peru findet."
 lepsius.801.n: "Peru"
 lepsius.811.t_per: "Grab eines Konquistadors"
 lepsius.811.f_per: "Mit großem Interesse entdeckten die Archäologen ein verschlossenes Tor, das angeblich den Zugang zur verlorenen Grabstätte eines Inka-Prinzen, vielleicht sogar eines Herrschers, ermöglichte. Leider musste das Team feststellen, dass es sich nicht um das Grab eines hochrangigen Inkas, sondern eines spanischen Eroberers handelte. Allerdings hat Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] festgestellt, dass zumindest die Innenausstattung und einige Artefakte aus der Inkazeit stammen, weshalb sich zumindest einige Schlussfolgerungen ziehen lassen."
 lepsius.812.t_per: "Inka-Mine"
 lepsius.812.f_per: "In den Tiefen der Anden fand Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] einen verlorenen Pfad, der ihn in eine Grube führte. Zunächst schien es keine Bedeutung zu haben, bis das Team die Trümmer vorsichtig entfernte. Wie sich herausstellte, war die Grube der Eingang zu einem komplexen, künstlich angelegten Höhlensystem. Bei weiteren Untersuchungen wurden Bergbauwerkzeuge, Alltagsgegenstände und bemalte Wände entdeckt. War dies eine der großen Gold- und Silberabbaustätten, aus denen die Inkas ihre Kunstgegenstände herstellten?"
 lepsius.813.t_per: "Tempel der Sonne"
 lepsius.813.f_per: "Ein Glücksfall für die Archäologie: Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] berichtet, dass er in den Bergen Perus eine bisher völlig unbekannte Tempelanlage gefunden hat. Es handelt sich offenbar um eine Kultstätte für den Sonnengott Inti. Vor Ort fanden die Wissenschaftler nicht nur zahlreiche Artefakte, sondern auch Gemälde und Tempelgewänder. Diese Entdeckung ist eine kleine Sensation in der präkolumbianischen Archäologie."
 lepsius.971.t: "Entdeckung von Vilcabamba"
 lepsius.971.d: "Es ist ein sensationeller Tag für die internationale Wissenschaft. Wir haben eine großartige Entdeckung gemacht: Die verlorene Stadt Vilcabamba wurde heute von [ROOT.GetCountry.GetAdjectiveNoFlag|l]en Archäologen entdeckt!"
 lepsius.971.f: "Vilcabamba war von 1539 bis 1572 die Hauptstadt des Neo-Inka-Staates. Der Neo-Inka-Staat war der letzte Zufluchtsort des Inka-Reiches, bis er 1572 an die Spanier und ihre indigenen Verbündeten fiel, was das Ende des Inka-Widerstands gegen die spanische Herrschaft bedeutete . Anschließend wurde Vilcabamba aufgegeben und sein Standort geriet in Vergessenheit. Im Jahr 1911 identifizierte der Entdecker Hiram Bingham die verlassene Ruine von Machu Picchu fälschlicherweise als Vilcabamba, besuchte aber auch eine Ruine, die von den einheimischen Peruanern Espiritu Pampa genannt wurde. Im Jahr 1964 identifizierte Gene Savoy Espiritu Pampa als das sagenumwobene Vilcabamba, eine Bezeichnung, die von Archäologen und Historikern weithin akzeptiert wird."
 lepsius.971.g: "Was nicht einmal die Konquistadoren schafften, taten wir."
 lepsius.972.d: "[SCOPE.sCountry('lepsius_vilcabamba_discoverer').GetAltName('NOM')] hat eine großartige Entdeckung gemacht: Die verlorene Stadt Vilcabamba wurde heute entdeckt!"
 lepsius.972.f: ""
 lepsius.972.g: "Schade, dass sie nicht verloren gegangen sind."
 je_lepsius_nazca: "Die seltsamen Linien von Nazca"
 je_lepsius_nazca_reason: "Die seltsamen Linien in der Landschaft nahe der Stadt Nazca werfen seit der spanischen Eroberung Fragen auf. Manche halten sie für Überreste eines Straßennetzes oder von Wasserrinnen. Ein Archäologe könnte sich vielleicht mit Hilfe eines Piloten den richtigen Überblick verschaffen."
 lepsius.76.t: "Das Geheimnis von Nazca vom Himmel aus"
 lepsius.76.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetLastName] nahm Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] mit auf einen Flug. Jetzt kann der Wissenschaftler viel klarer erkennen, was die Linien auf dem Boden bedeuten. Aus geeigneter Höhe betrachtet wirken die Linien etwas komplexer. Es gibt Dutzende zerkratzte Bilder von Tieren und Figuren aus präkolumbianischer Zeit. Eine unglaubliche archäologische Entdeckung!"
 lepsius.76.f: "Die Nazca-Linien sind über 1.500 riesige Kratzbilder (Geoglyphen) in der Wüste in der Nähe von Nazca und Palpa in Peru, die nur aus der Luft und von den umliegenden Hügeln aus gesehen und erkannt werden können. Die Linien, die Wüste und die Kultur sind nach der Stadt Nazca benannt, die nicht weit von der Ebene entfernt liegt. Als Begründer der Linien gelten die Paracas-Kultur und die Nazca-Kultur. Auf einer Fläche von 500 km² zeigt die Nazca-Ebene bis zu 20 km lange schnurgerade Linien, Dreiecke und Trapezflächen sowie etwa zehn bis mehrere hundert Meter große Figuren, zum Beispiel Bilder von Menschen, Affen, Vögeln usw Wale. Die figurbildenden Linien sind oft nur wenige Zentimeter tief. Aufgrund ihrer enormen Größe sind sie nur aus großer Entfernung, von den umliegenden Hügeln oder von Flugzeugen aus zu sehen. In diesem Sinne wurden die Nazca-Linien erst in den 1920er oder spätestens in den 1930er Jahren entdeckt, als regelmäßig Flugzeuge über die Nazca-Wüste flogen. Im Jahr 1926 wurden die Nazca-Linien erstmals wissenschaftlich beschrieben."
 lepsius.76.g: "Aber was könnte die wahre Bedeutung dieser Bilder sein?"
