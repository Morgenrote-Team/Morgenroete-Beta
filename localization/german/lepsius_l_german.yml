 je_lepsius_archaeological_default_project_reason: "[ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_active_type')]Ein [concept_lepsius_archaeologist], der nicht beschäftigt ist, arbeitet an verschiedenen archäologischen Projekten in seinem Land. Archäologen, die über längere Zeiträume hinweg vor Ort Ausgrabungen durchführen, können die [concept_character_trait] #V $lepsius_local_specialist$#! erwerben. Jedes Arbeitsjahr führt zu einem neuen [concept_lepsius_artifact].\n$mr_divider_for_je$\nSie können diese Arten von [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] erhalten:[ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_egyptian_artifacts_possible_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_mesopotamian_artifacts_possible_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_aegean_artifacts_possible_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_precolumbian_artifacts_possible_type')]\n- @lepsius_local_minor! Kleinere #V Lokale Artefakte#!\n\n$mr_divider_for_je$\nZusätzlich zu diesem jährlichen Artefakten können Archäologen je nach den folgenden Faktoren weitere @lepsius_local_minor! kleinere #V lokale Artefakte#! pro Jahr finden, abhängig von den folgenden Faktoren:\n[ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_early_archaeology_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_modern_archaeology_type')] [ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_minor_site_type')][ROOT.GetCountry.GetCustom('je_lepsius_archaeological_default_project_local_archaeologist_trait_type')]\n\n$mr_divider_for_je$\nArchäologen, die über die [concept_character_trait] $lepsius_archaeologist_famous$ und $lepsius_local_specialist$ verfügen, können auch @lepsius_local_major! Bedeutende #V Lokale Artefakte#! finden."
