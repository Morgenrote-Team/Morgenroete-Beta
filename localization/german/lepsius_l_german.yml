 lepsius.714.t: "Nadeln der Kleopatra"
 lepsius.714.d: "Nachdem die abschließenden Verhandlungen mit den lokalen Behörden nun abgeschlossen sind, steht dem Abbau, dem Transport und dem Wiederaufbau der „Kleopatra-Nadel“ nichts mehr im Wege. Dies ist ein bedeutendes archäologisches und bautechnisches Projekt!"
 lepsius.714.f: "Vor ihrer historischen Bergung standen die beiden „Nadeln“ jahrhundertelang als halb vergessene Denkmäler im Caesareum von Alexandria, wobei nur eine der Nadeln noch aufrecht stand, während die andere bereits im Wüstensand versunken war. In der Ära des frühen Kolonialismus und der Ägyptomanie entstanden zahlreiche Ideen, diese Monolithen als mächtige Symbole staatlicher Souveränität und wissenschaftlicher Eroberung in westliche Hauptstädte zu transportieren, doch solche Pläne scheiterten zunächst an den immensen logistischen Hürden jener Zeit. In der Wahrnehmung europäischer Reisender bildeten die Nadeln zusammen mit der imposanten Pompeius-Säule – einer der größten monolithischen Säulen der Antike – das ikonische Trio der Skyline von Alexandria und markierten den Übergang von der Pracht der Pharaonen zur griechisch-römischen Blütezeit. Während die Pompeius-Säule aufgrund ihrer massiven Bauweise und ihrer festen Verankerung auf dem Serapeum-Plateau stets als unbewegliches Denkmal an Ort und Stelle blieb, wurden die Obelisken zunehmend als diplomatische Handelsgüter betrachtet, bis sie schließlich als prestigeträchtige Geschenke des Vizekönigs Muhammad Ali Pascha ihre Reise über den Ozean antraten."
 lepsius.714.g: "Bringt den Obelisken nach [ROOT.GetCountry.GetCapital.GetCityHubName]!"
 lepsius.715.t: "Nadeln der Kleopatra"
 lepsius.715.d: "Der Obelisk wurde heute in [ROOT.GetCountry.GetCapital.GetCityHubName] im Rahmen einer großen öffentlichen Feier empfangen und von der Bevölkerung begeistert gefeiert."
 lepsius.715.f: "Die Londoner „Needle“ traf 1878 in einem eigens dafür gebauten schwimmenden Eisenzylinder in der Stadt ein, der während eines schweren Sturms in der Bizaya-Bucht beinahe gesunken wäre und dabei sechs Seeleuten das Leben kostete. Der New Yorker Obelisk wurde 1881 im Central Park aufgestellt, nachdem er in einem aufwendig umgebauten Dampfschiff transportiert und dann in New York mithilfe eines massiven Holzgerüsts Zentimeter für Zentimeter an seinen Bestimmungsort gerollt worden war. Beide Denkmäler wurden bei ihrer Ankunft mit großen öffentlichen Feierlichkeiten gewürdigt und dienen bis heute als eindrucksvolle Symbole des alten Ägyptens inmitten moderner Metropolen."
 lepsius.715.g: "Das wird unsere imperialen Ambitionen auf der Weltbühne stärken!"
 lepsius.773.t: "Stele von Piedras Negras"
 lepsius.773.d: "Nachdem die abschließenden Verhandlungen mit den lokalen Behörden nun abgeschlossen sind, steht dem Abbau, dem Transport und dem Wiederaufbau einer Stele aus Piedras Negras nichts mehr im Wege. Dies ist ein bedeutendes archäologisches und bautechnisches Projekt!"
 lepsius.773.f: "Die Stelen von Piedras Negras sind eine Reihe monumentaler Steinskulpturen aus der alten Maya-Stadt Piedras Negras, die im heutigen Guatemala liegt. Die im „Peten-Stil“ gearbeiteten Stelen zeigen häufig Herrscher in aufwendigen Gewändern, die manchmal in Nischen sitzen oder über Gefangenen stehen. Diese Denkmäler sind weltweit bekannt für ihre außergewöhnliche künstlerische Qualität und ihre historische Bedeutung. Heute werden viele dieser Stelen im Nationalmuseum für Archäologie und Ethnologie in Guatemala-Stadt und im Universitätsmuseum von Pennsylvania aufbewahrt."
 lepsius.773.g: "Bringt die Stele nach [ROOT.GetCountry.GetCapital.GetCityHubName]!"
 lepsius.774.t: "Stele von Piedras Negras"
 lepsius.774.d: "Im Rahmen einer öffentlichen Ausstellung in [ROOT.GetCountry.GetCapital.GetCityHubName] stellte das Archäologische Museum heute die Stele von Piedras Negras der Öffentlichkeit und interessierten Besuchern vor."
 lepsius.774.f: "Nach ihrer Ankunft im Museum der University of Pennsylvania (Penn Museum) in Philadelphia wurden die Stelen zum Herzstück der neu gestalteten Maya-Sammlungen, wo sie erstmals einem breiten westlichen Publikum präsentiert wurden. Die monumentalen Skulpturen wurden unter Einsatz umfangreicher technischer Ausrüstung dauerhaft installiert, um ihre filigranen Reliefs vor weiterem Verfall zu schützen und sie für die Forschung zugänglich zu machen. Bis heute dienen sie als Schlüsselobjekte für die Entzifferung der Maya-Hieroglyphen und zeugen von der einstigen Pracht der Stadt Piedras Negras."
 lepsius.774.g: "Riesige Artefakte. Das gefällt mir!"
 lepsius.2256.t: "Obelisk von Axum"
 lepsius.2256.d: "Der Obelisk wurde heute in [ROOT.GetCountry.GetCapital.GetCityHubName] im Rahmen einer großen öffentlichen Feier empfangen und von der Bevölkerung begeistert gefeiert."
 lepsius.2256.f: "Der Obelisk von Axum gelangte 1937 als Kriegsbeute des faschistischen Italiens nach Rom, nachdem er auf Befehl Mussolinis in Äthiopien zerlegt und unter enormen logistischen Aufwänden per Schiff transportiert worden war. Er wurde vor dem Gebäude des Kolonialministeriums wieder aufgestellt und diente jahrzehntelang als imperiales Triumphsymbol im römischen Stadtbild. Erst nach langwierigen diplomatischen Verhandlungen und technischen Vorbereitungen wurde das 150 Tonnen schwere Monument 2005 nach Äthiopien zurückgebracht und dort 2008 in seinem ursprünglichen archäologischen Park wieder aufgerichtet."
 lepsius.2256.g: "Das wird unsere imperialen Ambitionen auf der Weltbühne stärken!"
