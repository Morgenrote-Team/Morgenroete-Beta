l_german:
 mr_swe_nor_union_decision_1: "Generalgouverneur für Norwegen ernennen"
 mr_swe_nor_union_decision_1_desc: "Der Dienstposten in Christiania ist derzeit unbesetzt. Wir sollten eine Entscheidung darüber treffen, wer in Abwesenheit des Königs zum neuen Chef der norwegischen Regierung ernannt werden soll."
 mr_swe_nor_union_decision_2: "Teilname unserer Minister an den Parlamentsdebatten fordern"
 mr_swe_nor_union_decision_2_desc: "Zurzeit ist es unseren Ministern verboten, ihre Stimme im Stortinget zu einzubringen. Dies kann nicht hingenommen werden."
 mr_swe_nor_union_decision_3: "Entfernung der Unions-Symbole von der Flagge fordern"
 mr_swe_nor_union_decision_3_desc: "Wir sollten eine reine norwegische Flagge verwenden, ohne Symbole der Union."
 mr_swe_nor_union_decision_4: "Norwegische konsularische Vertretungen fordern"
 mr_swe_nor_union_decision_4_desc: "Angesichts der Zunahme des norwegischen Seeverkehrs reichen die schwedischen Konsulatsbüros nicht mehr aus. Wir brauchen norwegische Vertretungen."
 mr_swe_nor_union_decision_5: "Erfüllung der Versprechen Karls XV fordern"
 mr_swe_nor_union_decision_5_desc: "Mit der Krönung Karls XV. zum König von Schweden und zum König von Norwegen ist es an der Zeit, dass er sein Versprechen einlöst, den Posten des Generalgouverneurs abzuschaffen."
 da_appoint_governor_general: "Generalgouverneur ernennen"
 da_appoint_governor_general_desc: "Ändert den Generalgouverneur von [concept_subject]. [concept_liberty_desire] kann sich je nach gewähltem Kandidaten ändern."
 da_appoint_governor_general_action_name: "Generalgouverneur ernennen"
 da_appoint_governor_general_action_notification_name: "[TARGET_COUNTRY.GetAltName('NOM')] bekommt einen neuen Generalgouverneur"
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetAltName('NOM')] hat den [TARGET_COUNTRY.GetAdjective]en Generalgouverneur durch einen neuen Beamten ersetzt."
 da_appoint_governor_general_action_notification_third_party_name: "[TARGET_COUNTRY.GetAltName('NOM')] bekommt einen neuen Generalgouverneur"
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetAltName('NOM')] hat den [TARGET_COUNTRY.GetAdjective]en Generalgouverneur durch einen neuen Beamten ersetzt."
 mr_swe_nor_union_event.1.t: "Ernennung eines neuen Generalgouverneurs"
 mr_swe_nor_union_event.1.d: "Die Position des Generalgouverneurs in Christiania ist vakant. Vielleicht sollten wir darüber nachdenken, jemanden für diese Rolle zu ernennen."
 mr_swe_nor_union_event.1.f: "Gemäß der norwegischen Verfassung von 1814 konnte ein Generalgouverneur schwedischer oder norwegischer Staatsangehörigkeit ernannt werden, um die norwegische Regierung in Abwesenheit des in Stockholm residierenden Königs zu führen. In Schweden glauben viele, dass es für einen Generalgouverneur, der im Namen des schwedischen Königs handelt, unbedingt erforderlich ist, schwedische Staatsangehörigkeit zu besitzen. Alles andere wird als potenzielle Gefährdung der nationalen Sicherheit angesehen."
 mr_swe_nor_union_event.1.a: "Ernennung eines schwedischen Generalgouverneurs"
 mr_swe_nor_union_event.1.b: "Ernennung eines norwegischen Generalgouverneurs"
 mr_swe_nor_union_event.1.c: "Lassen Sie die Stelle für die nächsten 5 Jahre unbesetzt"
 mr_swe_nor_union_event.2.t: "Norwegische Minister"
 mr_swe_nor_union_event.2.d: "Das Stortinget ermöglicht norwegischen Ministern, an parlamentarischen Diskussionen teilzunehmen."
 mr_swe_nor_union_event.2.f: "Das norwegische Parlament, Stortinget, hat dafür gestimmt, norwegischen Ministern die Teilnahme an parlamentarischen Diskussionen und Verhandlungen zu gestatten. Nun wartet es auf die Zustimmung des Königs zu seiner Entscheidung."
 mr_swe_nor_union_event.2.a: "Weigern Sie sich, ihre Entscheidung anzuerkennen"
 mr_swe_nor_union_event.2.b: "Ihre Entscheidung genehmigen"
 mr_swe_nor_union_event.3.t: "Die norwegische Flagge"
 mr_swe_nor_union_event.3.d: "Norwegen fordert das Recht, eine saubere norwegische Flagge zu verwenden."
 mr_swe_nor_union_event.3.f: "Stortinget, das norwegische Parlament, hat für eine neue 'saubere' Flagge ohne die üblichen Symbole der schwedisch-norwegischen Union gestimmt. Sollen wir ihre Entscheidung unterstützen oder ihnen das Recht verweigern, die Flagge ihrer Wahl zu verwenden?"
 mr_swe_nor_union_event.3.a: "Sie behalten ihre aktuelle Flagge"
 mr_swe_nor_union_event.3.b: "Lassen Sie sie die Flagge ihrer Wahl verwenden"
 mr_swe_nor_union_event.4.t: "Norwegische Konsularbüros"
 mr_swe_nor_union_event.4.d: "Norwegen fordert das Recht, weltweit eigene Konsulate zu eröffnen."
 mr_swe_nor_union_event.4.f: "Die Konsularbüros der Gewerkschaft wurden bisher vom Außenministerium in Stockholm betrieben, doch angesichts der zunehmenden Bedeutung der norwegischen Schifffahrtsindustrie argumentieren die Norweger, dass ein norwegisches Konsulat notwendig sei. \nIn Schweden wird die norwegische Forderung als erster Schritt in Richtung eines norwegischen Außenministeriums und als potenzielle künftige Forderung nach einer norwegischen Unabhängigkeit betrachtet."
 mr_swe_nor_union_event.4.a: "An unseren Büros ist nichts auszusetzen"
 mr_swe_nor_union_event.4.b: "Je mehr Büros, desto besser"
 mr_swe_nor_union_event.5.t: "Das Versprechen Karls XV."
 mr_swe_nor_union_event.5.d: "Norwegen verlangt vom neuen König Karl XV., sein Versprechen einzulösen und die Position des Generalgouverneurs in Christiania abzuschaffen."
 mr_swe_nor_union_event.5.f: "Als Erbe dem norwegischen Volk Versprechen zu machen, ist eine Sache, Herrscher über zwei Länder zu sein, eine ganz andere. Sollte diese Position wie versprochen abgeschafft werden und ein norwegischer Premierminister den Generalgouverneur in Christiania ersetzen?"
 mr_swe_nor_union_event.5.a: "Wir brauchen eine eigene Person in Christiania"
 mr_swe_nor_union_event.5.b: "Ein Versprechen muss eingehalten werden"
 mr_swe_nor_union_event.6.t: "Das Versprechen des Kronprinzen"
 mr_swe_nor_union_event.6.d: "Thronfolger Karl Bernadotte gelobt, das Amt des Generalgouverneurs in Christiania nach seiner Krönung abzuschaffen"
 mr_swe_nor_union_event.6.f: "Um die Gunst des norwegischen Volkes zu gewinnen, gelobt der zukünftige König feierlich, das Amt des Generalgouverneurs in Christiania nach seiner Krönung abzuschaffen. Die Reaktionen schwedischer Landbesitzer und des Militärs werfen wenig überraschend einen Schatten auf den Vorschlag des jungen Erben."
 mr_swe_nor_union_event.6.a: "Hoffentlich weiß er, was er tut"
 mr_swe_nor_union_concessions_none: "Abgelehnte Zugeständnisse an Norwegen"
 mr_swe_nor_union_concessions_minor: "Kleinere Zugeständnisse an Norwegen"
 mr_swe_nor_union_concessions_major: "Große Zugeständnisse an Norwegen"
 mr_swe_nor_clean_flag: "Norwegen entfernt alle Unionssymbole aus seiner Flagge"