l_german:
 first_line_filler: "" #Is necessary for the overview in VS Code because, everything turns red if the first command has a 1 after its colon
  
 mr_swe_nor_union_decision_1:1 "Ernennung eines neuen Generalgouverneurs in Norwegen" #1!
 mr_swe_nor_union_decision_1_desc:1 "Die Stelle in Christiania ist derzeit vakant. Wir sollten eine Entscheidung darüber treffen, wer in Abwesenheit des Königs zum neuen Regierungschef Norwegens ernannt werden soll." #1!
  
 mr_swe_nor_union_decision_2:1 "Fordern Sie, dass unsere Minister an parlamentarischen Debatten teilnehmen können" #1!
 mr_swe_nor_union_decision_2_desc:1 "Derzeit ist es den Ministern verboten, im Stortinget mitzureden. Das kann nicht hingenommen werden." #1!
  
 mr_swe_nor_union_decision_3:1 "Fordern Sie, dass alle Symbole der Union von unserer Flagge entfernt werden" #1!
 mr_swe_nor_union_decision_3_desc:1 "Wir sollten eine saubere norwegische Flagge ohne Unionssymbole verwenden." #1!
  
 mr_swe_nor_union_decision_4:1 "Fordern Sie nach norwegischen Konsulaten" #1!
 mr_swe_nor_union_decision_4_desc:1 "Angesichts der Zunahme des norwegischen Schiffsverkehrs reichen die schwedischen Konsularbüros nicht mehr aus. Wir brauchen norwegische Büros." #1!
  
 mr_swe_nor_union_decision_5:1 "Fordern Sie, dass König Karl XV. sein Versprechen einhält" #1!
 mr_swe_nor_union_decision_5_desc:1 "Mit der Krönung Karls XV. zum König von Schweden und König von Norwegen ist es für ihn an der Zeit, sein Versprechen einzulösen und den Posten des Generalgouverneurs abzuschaffen." #1!
  
 da_appoint_governor_general:1 "Ernennung zum Generalgouverneur" #1!
 da_appoint_governor_general_desc:1 "Ändert den Generalgouverneur von [concept_subject]. [concept_liberty_desire] kann sich je nach gewähltem Kandidaten ändern." #1!
 da_appoint_governor_general_action_name:1 "Ernennung zum Generalgouverneur" #1!
 da_appoint_governor_general_action_notification_name:1 "[TARGET_COUNTRY.GetName] bekommt einen neuen Generalgouverneur" #1!
 da_appoint_governor_general_action_notification_desc:1 "[INITIATOR_COUNTRY.GetName] hat den Generalgouverneur von [TARGET_COUNTRY.GetName] durch einen neuen Beamten ersetzt." #1!
 da_appoint_governor_general_action_notification_third_party_name:1 "[TARGET_COUNTRY.GetName] bekommt einen neuen Generalgouverneur" #1!
 da_appoint_governor_general_action_notification_third_party_desc:1 "[INITIATOR_COUNTRY.GetName] hat den Generalgouverneur von [TARGET_COUNTRY.GetName] durch einen neuen Beamten ersetzt." #1!
  
 mr_swe_nor_union_event.1.t:1 "Ernennung eines neuen Generalgouverneurs" #1!
 mr_swe_nor_union_event.1.d:1 "Die Position des Generalgouverneurs in Christiania ist vakant. Vielleicht sollten wir darüber nachdenken, jemanden für diese Rolle zu ernennen." #1!
 mr_swe_nor_union_event.1.f:1 "Gemäß der norwegischen Verfassung von 1814 konnte ein Generalgouverneur schwedischer oder norwegischer Staatsangehörigkeit ernannt werden, um die norwegische Regierung in Abwesenheit des in Stockholm residierenden Königs zu führen. In Schweden glauben viele, dass es für einen Generalgouverneur, der im Namen des schwedischen Königs handelt, unbedingt erforderlich ist, schwedische Staatsangehörigkeit zu besitzen. Alles andere wird als potenzielle Gefährdung der nationalen Sicherheit angesehen." #1!
 mr_swe_nor_union_event.1.a:1 "Ernennung eines schwedischen Generalgouverneurs" #1!
 mr_swe_nor_union_event.1.b:1 "Ernennung eines norwegischen Generalgouverneurs" #1!
 mr_swe_nor_union_event.1.c:1 "Lassen Sie die Stelle für die nächsten 5 Jahre unbesetzt" #1!
  
 mr_swe_nor_union_event.2.t:1 "Norwegische Minister" #1!
 mr_swe_nor_union_event.2.d:1 "Das Stortinget ermöglicht norwegischen Ministern, an parlamentarischen Diskussionen teilzunehmen." #1!
 mr_swe_nor_union_event.2.f:1 "Das norwegische Parlament, Stortinget, hat dafür gestimmt, norwegischen Ministern die Teilnahme an parlamentarischen Diskussionen und Verhandlungen zu gestatten. Nun wartet es auf die Zustimmung des Königs zu seiner Entscheidung." #1!
 mr_swe_nor_union_event.2.a:1 "Weigern Sie sich, ihre Entscheidung anzuerkennen" #1!
 mr_swe_nor_union_event.2.b:1 "Ihre Entscheidung genehmigen" #1!
  
 mr_swe_nor_union_event.3.t:1 "Die norwegische Flagge" #1!
 mr_swe_nor_union_event.3.d:1 "Norwegen fordert das Recht, eine saubere norwegische Flagge zu verwenden." #1!
 mr_swe_nor_union_event.3.f:1 "Stortinget, das norwegische Parlament, hat für eine neue 'saubere' Flagge ohne die üblichen Symbole der schwedisch-norwegischen Union gestimmt. Sollen wir ihre Entscheidung unterstützen oder ihnen das Recht verweigern, die Flagge ihrer Wahl zu verwenden?" #1!
 mr_swe_nor_union_event.3.a:1 "Sie behalten ihre aktuelle Flagge" #1!
 mr_swe_nor_union_event.3.b:1 "Lassen Sie sie die Flagge ihrer Wahl verwenden" #1!
  
 mr_swe_nor_union_event.4.t:1 "Norwegische Konsularbüros" #1!
 mr_swe_nor_union_event.4.d:1 "Norwegen fordert das Recht, weltweit eigene Konsulate zu eröffnen." #1!
 mr_swe_nor_union_event.4.f:1 "Die Konsularbüros der Gewerkschaft wurden bisher vom Außenministerium in Stockholm betrieben, doch angesichts der zunehmenden Bedeutung der norwegischen Schifffahrtsindustrie argumentieren die Norweger, dass ein norwegisches Konsulat notwendig sei. \n In Schweden wird die norwegische Forderung als erster Schritt in Richtung eines norwegischen Außenministeriums und als potenzielle künftige Forderung nach einer norwegischen Unabhängigkeit betrachtet." #1!
 mr_swe_nor_union_event.4.a:1 "An unseren Büros ist nichts auszusetzen" #1!
 mr_swe_nor_union_event.4.b:1 "Je mehr Büros, desto besser" #1!
  
 mr_swe_nor_union_event.5.t:1 "Das Versprechen Karls XV." #1!
 mr_swe_nor_union_event.5.d:1 "Norwegen verlangt vom neuen König Karl XV., sein Versprechen einzulösen und die Position des Generalgouverneurs in Christiania abzuschaffen." #1!
 mr_swe_nor_union_event.5.f:1 "Als Erbe dem norwegischen Volk Versprechen zu machen, ist eine Sache, Herrscher über zwei Länder zu sein, eine ganz andere. Sollte diese Position wie versprochen abgeschafft werden und ein norwegischer Premierminister den Generalgouverneur in Christiania ersetzen?" #1!
 mr_swe_nor_union_event.5.a:1 "Wir brauchen eine eigene Person in Christiania" #1!
 mr_swe_nor_union_event.5.b:1 "Ein Versprechen muss eingehalten werden" #1!
  
 mr_swe_nor_union_event.6.t:1 "Das Versprechen des Kronprinzen" #1!
 mr_swe_nor_union_event.6.d:1 "Thronfolger Karl Bernadotte gelobt, das Amt des Generalgouverneurs in Christiania nach seiner Krönung abzuschaffen" #1!
 mr_swe_nor_union_event.6.f:1 "Um die Gunst des norwegischen Volkes zu gewinnen, gelobt der zukünftige König feierlich, das Amt des Generalgouverneurs in Christiania nach seiner Krönung abzuschaffen. Die Reaktionen schwedischer Landbesitzer und des Militärs werfen wenig überraschend einen Schatten auf den Vorschlag des jungen Erben." #1!
 mr_swe_nor_union_event.6.a:1 "Hoffentlich weiß er, was er tut" #1!
  
 mr_swe_nor_union_concessions_none:1 "Abgelehnte Zugeständnisse an Norwegen" #1!
 mr_swe_nor_union_concessions_minor:1 "Kleinere Zugeständnisse an Norwegen" #1!
 mr_swe_nor_union_concessions_major:1 "Große Zugeständnisse an Norwegen" #1!
  
 mr_swe_nor_clean_flag:1 "Norwegen entfernt alle Unionssymbole aus seiner Flagge" #1!
