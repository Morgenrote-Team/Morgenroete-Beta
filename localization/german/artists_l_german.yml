 je_artists_realism: "Salon der Kunst"
 je_artists_realism_reason: "Der Realismus als Kunstform gewinnt zunehmend an Popularität. Maler an verschiedenen Orten haben sich bereits dieser neuen Schule verschrieben. Dem Realismus fehlt jedoch noch ein eigenes, wirkliches Zentrum. Die Abneigung der traditionellen künstlerischen Elite gegen den neuen Stil hat dazu geführt, dass er bisher nur ein Phänomen außerhalb der Akademien geblieben ist. Wir brauchen eine eigene Kunstakademie, die diesen Stil lehrt, mit einer Galerie, in der die realistische Malerei ihren Platz findet - und natürlich einen [concept_klimt_painter], der die Vorbildfigur des Realismus in unserem Land ist. Die Einrichtung eines Kunstsalons wird es uns auch ermöglichen, Malwettbewerbe zu organisieren."
 je_artists_realism_success: "Wir brauchen #G 250#! @klimt_painting_tradition! [concept_klimt_painting_tradition]."
 je_artists_realism_goal: ""
 je_artists_realism_trigger: "Es #G existiert kein#! [concept_artists_center_of_arts] für den Realismus."
 je_artists_realism_fail: "Es #R existiert ein#! [concept_artists_center_of_arts] für den Realismus."
 je_artists_irrationalism: "Festival der Musik"
 je_artists_irrationalism_reason: "Eine neue, revolutionäre Form der Musik nimmt Gestalt an, die sich als 'Gesamtkunstwerk' versteht. Es liegt an einem außergewöhnlichen Komponisten, diese Form der Musik in die Welt zu setzen. Allein diese Musik könnte in einem eigenen Festsaal gespielt werden und zu einem Wallfahrtsort für internationale Musikliebhaber werden: Es wäre ein Zentrum des Irrationalismus! Die Einrichtung eines Musikfestivals wird es uns auch ermöglichen, Musikwettbewerbe zu organisieren."
 je_artists_irrationalism_success: "Wir brauchen #G 500#! @elgar_music_tradition! [concept_elgar_musical_tradition]."
 je_artists_irrationalism_goal: ""
 je_artists_irrationalism_trigger: "Es #G existiert kein#! [concept_artists_center_of_arts] für den Irrationalismus."
 je_artists_irrationalism_fail: "Es #R existiert#! ein [concept_artists_center_of_arts] für den Irrationalismus."
 artists.2007.t: "Das Zentrum des Realismus"
 artists.2007.d: "[SCOPE.sState('elgar_culture_capital').GetCityHubName] entwickelt sich zum Zentrum des realistischen Kunststils. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] spielte dabei eine wesentliche Rolle und gilt heute als Leitfigur der realistischen Malschule."
 artists.2007.f: "Als Realismus bezeichnet man in der Kunstgeschichte eine Mitte des 19. Jahrhunderts in Europa einsetzende neue Kunstauffassung, die sich gegen Darstellungen des Klassizismus und der Romantik wandte. In der Kunst versucht der Realismus, die Realität so genau wie möglich nachzubilden. Charakteristisch für den Realismus ist die Aneignung der Realität durch den Künstler und deren anschließende Verwandlung in ein Kunstwerk sowie deren politische Konnotationen. Er fördert Alltäglichkeit und Objektivität. Sein bekanntester Vertreter war der französische Maler Gustave Courbet, der sich den Begriff der realistischen Kunst aneignete und ihn aufgrund seiner provokativen Wirkung für seine Kunst verwendete."
 artists.2007.g: "Aber kann man wahre Schönheit in der Realität finden?"
 artists.2008.t: "Das Zentrum des Irrationalismus"
 artists.2008.d: "Die Gründung von [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]s Festspielhauses gilt als einer der Höhepunkte der Musikkultur des 19. Jahrhunderts."
 artists.2008.f: "Das [SCOPE.sState('elgar_culture_capital').GetCityHubName] Festival ist ein jährlich stattfindendes Musikfestival, bei dem Opernaufführungen des Komponisten [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] des 19. Jahrhunderts präsentiert werden. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] selbst konzipierte und förderte die Idee eines besonderen Festivals zur Präsentation seiner eigenen Werke, insbesondere seines monumentalen Zyklus \"Der Ring des Nibelungen\" und \"Parsifal\". Die Aufführungen finden in einem eigens dafür eingerichteten Theater statt, dem [SCOPE.sState('elgar_culture_capital').GetCityHubName] Festspielhaus. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] überwachte persönlich den Entwurf und den Bau des Theaters, das viele architektonische Innovationen enthielt, um den riesigen Orchestern, für die [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] schrieb, sowie der besonderen Vision des Komponisten hinsichtlich der Inszenierung seiner Werke gerecht zu werden. Das Festival ist zu einem Pilgerziel für Liebhaber klassischer Musik geworden."
 artists.2008.g: "Ein Höhepunkt der [GetPlayer.GetDefinition.GetPrimaryCulture.GetName|l]en Kultur!"
 artists.2011.t: "Fin de Siecle"
 artists.2011.d: "Mit Beginn eines neuen Jahrhunderts verschwinden Gewissheiten und Unsicherheiten nehmen zu. Dies gilt auch für die Kunst. Der Impressionismus, einst selbst eine Innovation, schafft Platz für neue Kunstrichtungen. Die Ergebnisse sind noch völlig offen – und auch, welche Künstler dieser Aufbruch hervorbringen wird."
 artists.2011.f: "Das Fin de Siècle, auch \"Décadence\" genannt, bezieht sich auf die künstlerischen Strömungen und das Lebensgefühl der letzten zwei Jahrzehnte des 19. Jahrhunderts und im weiteren Sinne parallel zur Belle Époque bis zum Beginn des Ersten Weltkriegs Krieg. Der Begriff bezieht sich auf die Tatsache, dass es sich um eine kulturelle Bewegung handelte, die den kulturellen Niedergang zu ihrem Gegenstand machte. Die Zeit war geprägt vom Schwanken zwischen Aufbruchstimmung, Zukunftseuphorie, diffuser Zukunftsangst und Rückschritt, Endzeitstimmung, Lebensmüdigkeit, Weltschmerz, Faszination für Tod und Vergänglichkeit, Unbeschwertheit, Frivolität und Dekadenz . Eine allgemeine Krise erfasste die führenden Gesellschaftsschichten, weil Grundwerte des gesellschaftlichen Lebens gefährdet zu sein schienen. Ein Gefühl der Machtlosigkeit wurde charakteristisch für Intellektuelle, Künstler und Schriftsteller, weil sie sich angezogen und abgestoßen fühlten angesichts einer großstädtischen Gesellschaft, die einerseits von Marktgesetzen und anonymen Massen dominiert wurde und andererseits von einer Welt, die zunehmend von Natürlichkeit geprägt war Wissenschaften und Technologie. Sie flüchteten in ästhetische Gegenwelten."
 artists.2011.g: "Musik ist die Königin der Künste."
 artists.2011.h: "Malen ist unsere Stärke."
 artists.2011.i: "Wir widmen uns ganz der Literatur."
 artists.2012.d: "Mit Beginn eines neuen Jahrhunderts verschwinden Gewissheiten und Unsicherheiten nehmen zu. Dies gilt auch für die Kunst. Der Expressionismus, einst selbst eine Innovation, schafft Platz für neue Kunstrichtungen. Die Ergebnisse sind noch völlig offen – und auch, welche Künstler dieser Aufbruch hervorbringen wird."
 artists.2013.d: "Mit Beginn eines neuen Jahrhunderts verschwinden Gewissheiten und Unsicherheiten nehmen zu. Dies gilt auch für die Kunst. Der Jugendstil, einst selbst eine Innovation, macht Platz für neue Kunstrichtungen. Die Ergebnisse sind noch völlig offen – und auch, welche Künstler dieser Aufbruch hervorbringen wird."
