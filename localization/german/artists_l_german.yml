 artists.101.t: "[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] ist jetzt ein Großer Komponist!"
 artists.101.d: "Konzerte auf der ganzen Welt, Melodien, die jeder kennt, Opern gespielt in jedem guten Opernhaus. Nach all diesen Errungenschaften ist die Reputation unseres [Concept('concept_elgar_composer','$concept_elgar_composers$')] [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] nun so groß, dass [ROOT.Var('elgar_composer_var').GetCharacter.GetSheHe] als \"Großer Komponist\" gelten kann!"
 artists.101.f: ""
 artists.101.g: "Ein Titan der Musik!"
 artists.102.t: "[ROOT.Var('manzoni_writer_var').GetCharacter.GetFullName] ist jetzt ein Großer Schriftsteller!"
 artists.102.d: "Nachdem er viele Bücher, Artikel und andere literarische Werke veröffentlicht hat, ist unser [concept_manzoni_writer] [ROOT.Var('manzoni_writer_var').GetCharacter.GetFullName] nun berühmt genug, um als Großer Schriftsteller zu gelten!"
 artists.102.f: ""
 artists.102.g: "Ein Riese der Literatur!"
 artists.103.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] ist jetzt ein Großer Maler!"
 artists.103.d: "Nachdem er viele Kunstwerke, darunter viele Gemälde, geschaffen hat, ist unser [concept_klimt_painter] [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] nun berühmt genug, um als Großer Maler angesehen zu werden!"
 artists.103.f: ""
 artists.103.g: "Ein Meister der Malerei!"
