 je_artists_impressionism: "Impressionismus"
 je_artists_impressionism_reason: "[concept_elgar_impressionism] ist ein Stil in der Kunstgeschichte, der sich durch die stimmungsvolle Darstellung flüchtiger Momentaufnahmen einer Szene auszeichnet. Sie entstand aus einer Bewegung innerhalb der Malerei in Frankreich in der zweiten Hälfte des 19. Jahrhunderts. Der Begriff Impressionismus wurde auch auf bestimmte Musik-, Literatur-, Film- und Fotografiestile angewendet. Während viele Naturalisten wie Heinrich Hart Musik als Ausdrucksmittel eines \"wahrheitssuchenden Aktionismus\" ablehnten, empfanden die Impressionisten das \"gegenstandslose Vorausträumen\" zu fein abgestuften bunten Akkorden oft als Vergnügen."
 je_artists_impressionism_success: "Wir brauchen #G 850#! @elgar_music_tradition! [concept_elgar_musical_tradition]."
 je_artists_expressionism: "Expressionismus"
 je_artists_expressionism_reason: "[concept_elgar_expressionism] ist ein Stil in der Kunst. Seine Anfänge und Vorläufer sind im späten 19. Jahrhundert zu finden. Der Expressionismus ist wie Impressionismus, Symbolismus und Fauvismus eine Bewegung gegen die Tendenzen des Naturalismus. Im Expressionismus überwiegt die expressive Ebene die ästhetische, appellative und sachliche Ebene. Der Künstler möchte seine Erfahrung für den Betrachter darstellen. Im Gegensatz zum musikalischen Impressionismus, der die Wahrnehmung der äußeren Erscheinung von Dingen darstellt, formulieren die expressionistischen Kunstrichtungen die Emotionen der menschlichen Seele."
 je_artists_expressionism_success: "Wir brauchen #G 850#! @elgar_music_tradition! [concept_elgar_musical_tradition]."
 je_artists_art_nouveau: "Jugendstil"
 je_artists_art_nouveau_reason: "[concept_elgar_art_nouveau], meist im Zusammenhang mit Italien auch Stile liberty, ist eine kunsthistorische Epoche an der Wende vom 19. zum 20. Jahrhundert. Strömungen, die dem Jugendstil zugeordnet werden können, sind der Reformstil (nach der Reformbewegung), der Secession-Stil (nach der Wiener Secession), der Modernisme in Katalonien, in der Schweiz der Stil Sapin und in den USA der Tiffany-Stil. Neben dem im Französischen, Englischen und Italienischen vorherrschenden Ausdruck Art nouveau wird im Englischen auch Modern Style und im Italienischen Stile Floreale verwendet. Zeitlich gesehen gehört der Jugendstil zum Fin de Siècle."
 je_artists_mass_culture: "Popkultur"
 je_artists_mass_culture_reason: "\"Die verständnislose Feindseligkeit der Masse gegenüber allen Traditionen, die für die Kultur stehen, die scharfe und kalte Intelligenz, die die Weisheit des Bauern verwirft, der neu entdeckte Naturalismus, der in Bezug auf alle Fragen des Geschlechts und der Gesellschaft weit auf ganz primitive Instinkte und Zustände zurückgeht, das Wiederauftauchen des panem et circenses in Form von Lohnstreitigkeiten und Sportstadien - all diese Dinge deuten auf die endgültige Schließung der Kultur und den Beginn einer ganz neuen Phase der menschlichen Existenz hin.\" - Oswald Spengler, Untergang des Abendlandes"
 je_artists_mass_culture_goal: ""
 je_artists_biennale: "Die Biennale"
 je_artists_biennale_reason: "Die Biennale ist eine Ausstellung, die alle zwei Jahre stattfindet. Ihr historisches Vorbild ist die Biennale von Venedig, die schnell internationale Bekanntheit erlangte und zu einem Mekka für den Wettbewerb zeitgenössischer Künstler aller Sparten wurde. Die Künstler aus aller Welt würden ihrer Heimat internationale Anerkennung verschaffen und ihre Stellung als Kulturmächte festigen."
 je_artists_biennale_fail_tt: "Wir können keine Biennale organisieren, wenn uns ein anderes Land zuvorkommt."
 artists.1001.t: "Biennale gegründet"
 artists.1001.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName] gilt als hervorragender Standort für eine internationale Kunstausstellung zeitgenössischer Werke. Die Organisatoren haben mit den Vorbereitungen für die Durchführung der ersten Biennale im nächsten Jahr begonnen."
 artists.1001.f: "Nach der ersten Biennale wird in unserem Land alle zwei Jahre eine neue Biennale stattfinden, auf der die Nationen geehrt werden, die sich im künstlerischen Bereich hervortun. Ausschlaggebend ist der gemeinsame Reputationswert aller Künstler einer Nation. Die Biennale wird immer von dem Land organisiert, dem der Biennale-Veranstaltungsort gehört. Wenn [SCOPE.sState('artists_biennale_city').GetCityHubName] von ausländischen Mächten erobert wird, dürfen die neuen Eigentümer die Biennale ausrichten."
 artists.1001.g: "Wir bereiten die erste Biennale vor."
 artists.1002.t: "[SCOPE.sState('artists_biennale_city').GetCityHubName] Biennale [TimeKeeper.GetCurrentDate.Format('y')]"
 artists.1002.d: "Die Biennale in [SCOPE.sState('artists_biennale_city').GetCityHubName] läuft nun schon seit einigen Wochen. Bei den ausstellenden Künstlern zeichnet sich bereits ein Trend ab. Als Favoriten gelten die Aussteller aus [SCOPE.sCountry('artists_biennale_first_winner_scope').GetAltName('DAT')]. [SCOPE.sCountry('artists_biennale_second_winner_scope').GetAltName('NOM')] und [SCOPE.sCountry('artists_biennale_third_winner_scope').GetAltName('NOM')] haben auch einige interessante Exponate, aber das wird nicht reichen."
 artists.1002.f: "Die Biennale von Venedig wurde 1895 gegründet und gewann in den ersten Jahrzehnten des 20. Jahrhunderts zunehmend an Internationalität. Ab 1907 errichteten mehrere Länder nationale Pavillons auf der Ausstellung, der erste war Belgien. 1910 wurden die ersten international bekannten Künstler gezeigt: ein Gustav Klimt gewidmeter Raum, eine Einzelausstellung für Renoir, eine Retrospektive von Courbet. Ein Werk von Picasso \"Familie der Saltimbanques\" wurde aus dem spanischen Salon im zentralen Palazzo entfernt, weil man befürchtete, dass seine Neuheit die Öffentlichkeit schockieren könnte. Bis 1914 wurden sieben Pavillons errichtet: Belgien (1907), Ungarn (1909), Deutschland (1909), Großbritannien (1909), Frankreich (1912) und Russland (1914)."
 artists.1002.g: "Die Richter sollten zusammenkommen."
 artists.1003.d: "Nach einstimmiger Entscheidung der Jury der [SCOPE.sState('artists_biennale_city').GetCityHubName] Biennale präsentierten unsere Künstler in diesem Jahr die innovativsten und hochwertigsten Exponate und sind führend in den Bereichen Malerei, Literatur und Musik. Glückwunsch!"
 artists.1003.f: "[GetPlayer.GetAltName('NOM')] dominierte zweifellos die diesjährige Biennale und belegte den ersten Platz. Die Künstler aus [SCOPE.sCountry('artists_biennale_second_winner_scope').GetAltName('DAT')] gewannen den zweiten Preis, auch die Künstler aus [SCOPE.sCountry('artists_biennale_third_winner_scope').GetName] konnten überzeugen."
 artists.1003.g: "Dies ist der Anbruch einer neuen Kultur."
 artists.2001.t: "Die Geburt des Impressionismus"
 artists.2001.d: "Unsere Hauptstadt [SCOPE.sState('elgar_culture_capital').GetCityHubName] entwickelt sich zum Zentrum des impressionistischen Kunststils."
 artists.2001.f: "[concept_elgar_impressionism] ist ein Stil in der Kunstgeschichte, der sich durch die stimmungsvolle Darstellung flüchtiger Momentaufnahmen einer Szene auszeichnet. Sie entstand aus einer Bewegung innerhalb der Malerei in Frankreich in der zweiten Hälfte des 19. Jahrhunderts. Der Begriff Impressionismus wurde auch auf bestimmte Musik-, Literatur-, Film- und Fotografiestile angewendet. Während viele Naturforscher wie Heinrich Hart Musik als Ausdrucksmittel eines \"wahrheitssuchenden Aktionismus\" ablehnten, empfanden die Impressionisten das \"gegenstandslose Vorausträumen\" zu fein abgestuften bunten Akkorden oft als Vergnügen."
 artists.2001.g: "Wir sind eine führende Kulturnation"
 artists.2002.t: "Die Geburt des Expressionismus"
 artists.2002.d: "Unsere Hauptstadt [SCOPE.sState('elgar_culture_capital').GetCityHubName] entwickelt sich zum Zentrum des expressionistischen Kunststils."
 artists.2002.f: "[concept_elgar_expressionism] ist ein Stil in der Kunst. Seine Anfänge und Vorläufer sind im späten 19. Jahrhundert zu finden. Der Expressionismus ist wie Impressionismus, Symbolismus und Fauvismus eine Bewegung gegen die Tendenzen des Naturalismus. Im Expressionismus überwiegt die expressive Ebene die ästhetische, appellative und sachliche Ebene. Der Künstler möchte seine Erfahrung für den Betrachter darstellen. Im Gegensatz zum musikalischen Impressionismus, der die Wahrnehmung der äußeren Erscheinung von Dingen darstellt, formulieren die expressionistischen Kunstrichtungen die Emotionen der menschlichen Seele."
 artists.2003.t: "Die Geburt des Jugendstils"
 artists.2003.d: "Unsere Hauptstadt [SCOPE.sState('elgar_culture_capital').GetCityHubName] entwickelt sich zum Zentrum des Jugendstils."
 artists.2003.f: "[concept_elgar_art_nouveau], meist im Zusammenhang mit Italien auch Stile liberty, ist eine kunsthistorische Epoche an der Wende vom 19. zum 20. Jahrhundert. Strömungen, die dem Jugendstil zugeordnet werden können, sind der Reformstil (nach der Reformbewegung), der Secession-Stil (nach der Wiener Secession), der Modernisme in Katalonien, in der Schweiz der Stil Sapin und in den USA der Tiffany-Stil. Neben dem im Französischen, Englischen und Italienischen vorherrschenden Ausdruck Art nouveau wird im Englischen auch Modern Style und im Italienischen Stile Floreale verwendet. Zeitlich gesehen gehört der Jugendstil zum Fin de Siècle."
 artists.2004.t: "[concept_elgar_impressionism] breitet sich aus"
 artists.2004.d: "Der Trend des Impressionismus ist von einem Nachbarland auf unsere Hauptstadt übergeschwappt und hat sich zur dominierenden Kunstrichtung entwickelt."
 artists.2004.g: "Impressionistisch."
 artists.2005.t: "Der Expressionismus breitet sich aus"
 artists.2005.d: "Der Trend des Expressionismus ist von einem Nachbarland auf unsere Hauptstadt übergeschwappt und hat sich zur dominierenden Kunstrichtung entwickelt."
