 artists.11.t: "Unser Komponist ist gestorben"
 artists.11.d: "Nach Jahrzehnten als [concept_elgar_composer] ist unser ehemaliger Spitzenmusiker gestorben. Werden wir einen solch erstaunlichen Künstler jemals ersetzen können?"
 artists.11.g: "Dies ist das Ende seiner Melodie."
 artists.11_tt: "Manchmal tötet das Spiel Charaktere. Ein Mod kann das nicht verhindern. Durch dieses Ereignis wird die [concept_character_role] dieses Künstlers aus dem Spiel entfernt, sodass Sie nicht von einem Geist dieses Künstlers heimgesucht werden."
 artists.12.t: "Unser Schriftsteller ist gestorben"
 artists.12.d: "Nach Jahrzehnten als [concept_manzoni_writer] ist unser ehemaliger Spitzen-Literat gestorben. Werden wir jemals in der Lage sein, einen so erstaunlichen Schriftsteller zu ersetzen?"
 artists.12.g: "Was waren wohl die letzten Worte?"
 artists.13.t: "Unser Maler ist gestorben"
 artists.13.d: "Nach Jahrzehnten als [concept_klimt_painter] ist unser größtes künstlerisches Talent gestorben. Werden wir einen solch erstaunlichen Künstler jemals ersetzen können?"
 artists.13.g: "Die Farbe ist getrocknet."
 artists.51.t: "Ein neuer Komponist"
 artists.51.d: "[SCOPE.sCharacter('elgar_new_composer_scope').GetFullName] ist ein vielversprechendes musikalisches Talent, das unser [concept_elgar_composer] werden könnte."
 artists.51.g: "[SCOPE.sCharacter('elgar_new_composer_scope').GetSheHe|U] wird für uns nützlich sein."
