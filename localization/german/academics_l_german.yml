 academics.2110.t: "Museumsdirektor will ein wichtiges Artefakt" #deepl:3474840739
 academics.2110.d: "Der Direktor des Archäologischen Museums hat heute im Namen von [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] einen offenen Brief an die Regierung geschrieben." #deepl:4285517141
 academics.2110.f: "Mit großem Bedauern muss ich feststellen, dass es unserem Museum trotz des reichen Fundus an Artefakten immer noch an einer großen Attraktion fehlt, die man als Prunkstück der Sammlung bezeichnen könnte. Leider hat es die Regierung bisher versäumt, bei den Objekten nicht auf Quantität, sondern auf Qualität als archäologischen Standard zu setzen. Ich rate daher dringend, diesen Missstand in den nächsten Jahren zu beheben, sonst wird unsere Nation bestenfalls als Erbsenzähler in der wissenschaftlichen Welt eingestuft.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums" #deepl:2743358226
 academics.2110.g: "Ein prestigeträchtiges Unterfangen." #deepl:188915989
 academics.2110.h: "Das ist die Mühe nicht wert." #deepl:2540856050
 academics.2110_goal_tt: "Sie werden #p 1#! [concept_lepsius_major_artifact] in #n 15#! Jahren sammeln müssen." #deepl:2575784350
 academics.2111.t: "Die Pracht des Museums" #deepl:2343732829
 academics.2111.d: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat in ihrem heutigen Schreiben ihre Dankbarkeit zum Ausdruck gebracht." #deepl:3941886525
 academics.2111.f: "Ich gratuliere zu der Entscheidung, die Archäologie zur nationalen Priorität des Landes zu machen. Das kürzlich erworbene, außergewöhnliche Exemplar wird in den nächsten Wochen in einer Sonderausstellung zu sehen sein. Die Welt beneidet uns!\n\nUnterzeichnet, Der Direktor des Archäologischen Museums" #deepl:2413453851
 academics.2111.g: "Wunderbar." #deepl:2942415708
 academics.2112.t: "Ein staubiger Ort" #deepl:3711619803
 academics.2112.d: "Der Direktor des Archäologischen Museums hat heute in einem offenen Brief im Namen von [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sein Bedauern darüber zum Ausdruck gebracht, dass die Archäologie in unserem Land kein Gehör findet." #deepl:3768587203
 academics.2112.f: "Nie wurde so viel von so wenigen in so kurzer Zeit zerstört.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums" #deepl:2705492426
 academics.2112.g: "Und?" #deepl:3438539412

 je_academics_major_artifact: "Fokus auf Archäologie: Wichtige Artefakte" #deepl:369180025
 je_academics_major_artifact_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mindestens #p 1#! [concept_lepsius_major_artifact] finden. Wichtige Artefakte können durch große Entdeckungen, durch permanente Ausgrabungen oder in zufälligen Ereignisketten während Expeditionen gewonnen werden." #deepl:3368672664
 je_academics_major_artifact_success: "Haben #p 1#! [concept_lepsius_major_artifact] ." #deepl:230059646

 academics.2113.t: "Museumsdirektor fordert archäologische Exzellenz" #deepl:2641211910
 academics.2113.d: "Der Direktor des Archäologischen Museums hat darauf hingewiesen, dass nur noch wenig fehlt, um die Ausstellung nahezu perfekt zu machen." #deepl:3093571161
 academics.2113.f: "Ich bin ein bescheidener Mann. Wie Sie wissen, sind meine Forderungen nicht besonders extravagant. Ich habe diese Regierung nie um einen ausgefallenen Gefallen gebeten. Ich habe mich immer zurückgehalten, wie es sich für den Kurator einer so großartigen Einrichtung gehört. Außerdem: Ein letztes kleines Sahnehäubchen fehlt noch, um unsere schöne Sammlung zur Weltklasse zu erheben. Alles, was es braucht, ist eine hervorragende Ausstellung. Nicht mehr. 100 Artefakte aus einer Region und ein bedeutendes Artefakt zu bekommen, wird hoffentlich nicht schwierig sein, oder?\n\nUnterzeichnet, Der Direktor des Archäologischen Museums" #deepl:1242310531
 academics.2113.g: "Eine willkommene Herausforderung." #deepl:3179496181
 academics.2113.h: "Das ist zu riskant." #deepl:2194504540
 academics.2112_goal_tt: "Sie müssen eine exzellente Ausstellung in #n 20#! Jahren organisieren." #deepl:3391285943
 academics.2114.t: "Archäologie auf ihrem Höhepunkt" #deepl:1059863993
 academics.2114.d: "Heute erreichte uns ein aufgeweichtes, kaum lesbares Schreiben des Archäologischen Museums." #deepl:2291947985
 academics.2114.f: "Nur der Absender konnte noch entziffert werden. Die Unterschrift gehörte eindeutig dem Museumsdirektor. Der Sekretär vermutet Tränen der Freude, als er den Brief schreibt." #deepl:4069914377
 academics.2114.g: "Er ist glücklich und wir sind es auch." #deepl:4113086890
 academics.2115.t: "Rückschlag für die Archaoelogie" #deepl:3823657534
 academics.2115.d: "Heute erreichte uns ein aufgeweichtes, kaum lesbares Schreiben des Archäologischen Museums." #deepl:2291947985
 academics.2115.f: "Nur der Absender konnte noch entziffert werden. Die Unterschrift gehörte eindeutig dem Museumsdirektor. Die Sekretärin vermutet, dass ihm beim Schreiben Tränen in die Augen gestiegen sind. Unser Misserfolg bei der letzten archäologischen Mission muss ihn in eine tiefe Depression gestürzt haben." #deepl:1515462432
 academics.2115.g: "Er ist traurig und wir sind es auch." #deepl:4220661029

 je_academics_excellent_collection: "Fokus auf Archäologie: Ausgezeichnete Sammlung" #deepl:476847686
 je_academics_excellent_collection_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir eine hervorragende Ausstellung erstellen. Wir brauchen dazu #G 100#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] und #p 1#! [Concept('concept_lepsius_major_artifact')] aus einer archäologischen Region." #deepl:4048482210

 academics.2116.t: "Wir müssen mehr Artefakte finden als [SCOPE.sCountry('rival_scope').GetName]" #deepl:234395790
 academics.2116.d: "Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind unglücklich darüber, dass [SCOPE.sCountry('rival_scope').GetName] mehr [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] gesammelt hat als unsere Nation. Sie fordern uns auf, in 10 Jahren mehr #b Artefakte#! insgesamt zu finden als [SCOPE.sCountry('rival_scope').GetName]." #deepl:1814615178
 academics.2116.f: "Es ist eine Schande, dass eine so unbedeutende Nation wie [SCOPE.sCountry('rival_scope').GetName] eine größere Sammlung von Artefakten besitzt als wir. Wir müssen diese Grabräuber überholen, die nur nach Schätzen graben und nicht einmal echte Archäologie betreiben! Wie viel Wissen ist durch diese Barbaren verloren gegangen?\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2246042559
 academics.2116_goal_tt: "Sie müssen in 10#! Jahren mehr [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] sammeln als Ihr Konkurrent, [SCOPE.sCountry('rival_scope').GetName], #n . Sie haben [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+], wir haben [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]." #deepl:747142136
 academics.2116_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Genehmigungen#! und Sie erhalten #p 10%#! mehr Prestige für 4 Jahre." #deepl:2294292191
 academics.2116.g: "Ich bin ein Archäologe und ich grabe ein Loch!" #deepl:2302010303
 academics.2116.h: "Archäologie ist keine Schnitzeljagd!" #deepl:3471502949

