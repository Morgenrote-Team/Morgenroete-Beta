 academics.51.f: "[Concept('concept_academics_academic','$concept_academics_academics$')] sind Wissenschaftler mit besonderen Fähigkeiten. Zum Beispiel kann [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] auf Forschungsexpeditionen zusätzliche Exemplare sammeln, auf Safari gehen und [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] einfangen. [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] erhöht die Anzahl der [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], die jedes Jahr gefunden werden. [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] verdoppelt die Geschwindigkeit beim Bau großer [Concept('concept_elgar_architecture','$concept_elgar_architectural_projects$')]. [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] sind für die Altertumsforschung unerlässlich. Wenn ein neuer Akademiker auftaucht, können Sie sich dafür entscheiden, seinen Vorgänger in diesem Beruf zu ersetzen - dies kann von Vorteil sein, wenn der Tod oder die Pensionierung eines Akademikers bevorsteht, sollte aber vor allem bei Archäologen, Naturwissenschaftlern, Paläontologen und Astronomen gut überlegt sein - schließlich haben sie spezielle [concept_academics_experience], die verloren gehen können." #deepl:2209993597
