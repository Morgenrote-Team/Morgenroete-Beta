 je_goettinger_seven_monument: "Göttinger Siebener-Denkmal" #deepl:3259022547
 je_goettinger_seven_monument_reason: "Eine geeinte deutsche Nation könnte das Andenken der Göttinger Sieben ehren - vorausgesetzt, die führende einigende Kraft hat sich bereits historisch für sie eingesetzt. Ein Denkmal würde Generationen von Wissenschaftlern inspirieren! Das setzt natürlich voraus, dass die deutsche Regierung die liberalen Ideen der legendären Professoren teilt." #deepl:2398627700

 academics.3101.t: "Die Verfassung von Hannover" #deepl:68936375
 academics.3101.d: "Als eine seiner ersten Amtshandlungen kündigte der König an, dass er die Verfassung, das sogenannte Staatsgrundgesetz, abschaffen werde. Ernest Augustus hat betont, dass er sich nicht daran gebunden fühlt." #deepl:3959994355
 academics.3101.f: "Hannover hatte 1819 seine erste Verfassung erhalten, die vom Prinzregenten bewilligt worden war; sie bedeutete nicht viel mehr als die Umwandlung Hannovers von einem Kurfürstentum in ein Königreich, das durch den Wiener Kongress garantiert wurde. Der Herzog von Cambridge empfahl in seiner Eigenschaft als Vizekönig Wilhelms in Hannover eine gründliche Neuorganisation der hannoverschen Regierung. Wilhelm IV. hatte 1833 einer neuen Verfassung zugestimmt; die Zustimmung des Herzogs von Cumberland war weder erbeten noch erhalten worden, und er hatte formell gegen die Annahme der Verfassung ohne seine Zustimmung protestiert. Unmittelbar nach seiner Ankunft in Hannover löste der König das hannoversche Parlament auf, das unter der umstrittenen Verfassung einberufen worden war. Er verkündete die Aussetzung der Verfassung mit der Begründung, dass er nicht um seine Zustimmung gebeten worden war und dass sie nicht den Bedürfnissen des Königreichs entsprach." #deepl:3488408173
 academics.3101.g: "Aussetzung der Verfassung." #deepl:573807506
 academics.3101.h: "Der König steht nicht über dem Gesetz." #deepl:913968923
 academics.3102.t: "Die Göttinger Sieben" #deepl:3407815147
 academics.3102.d: "Der Historiker und Politiker Friedrich Christoph Dahlmann wandte sich gegen Ernests Pläne, die Verfassung in seinem Sinne zu ändern, da Dahlmann selbst an der Ausarbeitung der Verfassung mitgewirkt hatte. Sechs weitere berühmte Professoren der Universität Göttingen schlossen sich dem Protest an und verteidigten die Verfassung von 1833. Bald waren die Männer als die "Göttinger Sieben" bekannt - und ein Ärgernis für den König." #deepl:1966971962
 academics.3102.f: "Dahlmanns Schrift fand reißenden Absatz - die Studenten der Universität produzierten viele Hunderte oder gar Tausende von Kopien und verbreiteten sie in ganz Deutschland. Die anderen sechs Demonstranten waren die germanistischen Brüder Wilhelm und Jacob Grimm (berühmte Märchen- und Volksmärchenschriftsteller und -erzähler, bekannt als die Brüder Grimm), der Jurist Wilhelm Eduard Albrecht, der Historiker Georg Gottfried Gervinus, der Physiker Wilhelm Eduard Weber und der Theologe und Orientalist Heinrich Georg August Ewald. Die Wirkung des Protests zwang den König zum Handeln, und die sieben widerspenstigen Professoren wurden vor dem Universitätsgericht verhört." #deepl:1139766668
 academics.3102.g: "Sie sollten aus ihren Positionen entfernt und verbannt werden!" #deepl:2837043273
 academics.3102.h: "Geben Sie ihren Forderungen nach, bevor die Situation eskaliert." #deepl:1933345658
 academics.3103.d: "Nach der Thronbesteigung von Königin Victoria im Vereinigten Königreich herrschte eine gewisse Traurigkeit über den Verlust der Personalunion mit Hannover, die über 120 Jahre gedauert hatte. Aber nach den jüngsten Ereignissen in Deutschland kann man getrost sagen: Es ist gut, dass wir getrennte Wege gehen." #deepl:571890520
 academics.3103.f: "Nur wenige Monate nach der Thronbesteigung des neuen Königs löst Hannover die unter britischer Herrschaft erlassene Verfassung auf. Der neue König Ernest Augustus sieht sich nun einer ganzen Opposition von Akademikern gegenüber. Dieser Streit ist bereits in ganz Deutschland in aller Munde. Wahrlich, sobald ein Land den segensreichen britischen Einflussbereich verlässt, fällt es in die Barbarei." #deepl:561017331
 academics.3103.g: "Es ist so schön, Brite zu sein." #deepl:3924998733
 academics.3104.d: "Der Konflikt zwischen dem König von Hannover und sieben aufmüpfigen Professoren erschüttert die Staaten des Deutschen Bundes: Nachdem König Ernst Augustus die Verfassung aufgehoben hatte, rebellierten die "Göttinger Sieben" gegen ihn. Sie haben ihre Ämter verloren - aber viele Sympathien im liberalen deutschen Lager gewonnen." #deepl:1372337101
 academics.3104.f: "Der Historiker und Politiker Friedrich Christoph Dahlmann wandte sich gegen Ernests Pläne, die Verfassung in seinem Sinne zu ändern, da Dahlmann selbst an der Ausarbeitung der Verfassung mitgewirkt hatte. Sechs weitere berühmte Professoren der Universität Göttingen schlossen sich dem Protest an und verteidigten die Verfassung von 1833. Die anderen sechs Demonstranten waren die germanistischen Brüder Wilhelm und Jacob Grimm (berühmte Märchen- und Volksmärchenautoren und -erzähler, die zusammen als Brüder Grimm bekannt sind), der Jurist Wilhelm Eduard Albrecht, der Historiker Georg Gottfried Gervinus, der Physiker Wilhelm Eduard Weber und der Theologe und Orientalist Heinrich Georg August Ewald. Die direkten Auswirkungen des Protests hielten sich in Grenzen, aber das öffentliche Aufsehen und das Medieninteresse waren in Deutschland und weiten Teilen Europas groß, und die sieben waren in der breiten Öffentlichkeit beliebt." #deepl:1228085903
 academics.3104.g: "Bei allem Respekt, der König ist zu weit gegangen." #deepl:2618606585
 academics.3104.h: "Dieser akademische Pöbel hat seine gerechte Strafe erhalten." #deepl:2528641519
 academics.3105.t: "Eine hitzige Debatte über Hannover" #deepl:165600154
 academics.3105.d: "Der Konflikt mit den "Göttinger Sieben" ist in den anderen Staaten des Deutschen Bundes nicht unbemerkt geblieben. Auch in Großbritannien ist man irritiert, dass der König die Verfassung außer Kraft gesetzt hat." #deepl:1766150110
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName] ist eines der zahlreichen deutschen Länder, die das Vorgehen von Ernest Augustus kritisiert haben. Es gibt aber auch Länder, vor allem autoritär regierte, die Verständnis für den Prozess gezeigt haben. Dazu gehört [SCOPE.sCountry('academics_pro_hanover_country').GetName]." #deepl:3005181781
 academics.3105.g: "Das geht sie nichts an!" #deepl:1946697568
 academics.3106.t: "Studentische Propaganda" #deepl:2924662671
 academics.3106.d: "Trotz aller Bemühungen des Staates, die Verbreitung von Propaganda zugunsten der "Göttinger Sieben" zu verhindern, gelang es liberalen Studentenkreisen, Flugblätter in großem Umfang in den Großstädten zu verteilen." #deepl:4163416441
 academics.3106.f: "Erinnert euch an unsere Helden! Erinnert euch an die Göttinger Sieben! Rühmt ihre Tugenden!' Als Professor Dahlmann seine Dokumente gegen den hannoverschen König veröffentlichte, fand sie bei deutschen Studenten und Liberalen großen Anklang. Sie hatte einen explosiven Einfluss in den Staaten des Deutschen Bundes. Die Studenten der Universität Göttingen produzierten viele Hunderte oder sogar Tausende von Kopien und verbreiteten sie in ganz Deutschland." #deepl:1382646427
 academics.3106.g: "Dieses krawallige Studentenpaket!" #deepl:110187614
 academics.3107.t: "Jacob Grimm in [ROOT.GetCountry.GetNameNoFlag]" #deepl:71748693
 academics.3107.d: "Der berühmte deutsche Gelehrte und Jurist Jacob Grimm ist nach seiner Verbannung aus Hannover auf der Suche nach einer neuen Heimat. Unsere Sympathie für die "Göttinger Sieben" hat sich auf ihn übertragen, weshalb er auf einen neuen Job hofft." #deepl:2603957141
 academics.3107.f: "Jacob Ludwig Karl Grimm war ein deutscher Schriftsteller, Sprachwissenschaftler, Philologe, Jurist und Volkskundler. Er formulierte das Grimmsche Gesetz der Sprachwissenschaft und war Mitverfasser des Deutschen Wörterbuchs, Autor der Deutschen Mythologie und Herausgeber der Grimmschen Märchen. Er war der ältere Bruder von Wilhelm Grimm; zusammen bildeten sie das als Brüder Grimm bekannte literarische Duo." #deepl:479664539
 academics.3107.g: "Heißen Sie ihn willkommen." #deepl:2488445716
 academics.3107.h: "Wir brauchen nicht noch einen verschrobenen Akademiker." #deepl:3772468206
 academics.3108.t: "Wilhelm Eduard Weber in [ROOT.GetCountry.GetNameNoFlag]" #deepl:3697951196
 academics.3108.d: "Der berühmte Physiker Wilhelm Eduard Weber ist nach seiner Verbannung aus Hannover auf der Suche nach einer neuen Heimat. Unsere Sympathien für die "Göttinger Sieben" haben sich auf ihn übertragen, weshalb er auf eine neue Stelle hofft." #deepl:2778926135
 academics.3108.f: "Wilhelm Eduard Weber war ein deutscher Physiker und zusammen mit Carl Friedrich Gauß der Erfinder des ersten elektromagnetischen Telegraphen." #deepl:1473868804
 academics.3111.t: "Der Grimm" #deepl:153111894
 academics.3111.d: "Die Brüder Jacob und Wilhelm Grimm haben den ersten Band eines deutschen Wörterbuchs vorgelegt, das den gesamten deutschen Wortschatz umfassen soll. Eine Mammutaufgabe, aber eine, die die deutsche Kulturnation noch näher zusammenrücken lässt." #deepl:1546168190
 academics.3111.f: "Das Deutsche Wörterbuch (The German Dictionary) ist eines der wichtigsten Wörterbücher der deutschen Sprache. Es ist für die deutsche Sprache das, was das Oxford English Dictionary für die englische Sprache ist. Es enthält detaillierte historische Informationen über den Ursprung und die Verwendung deutscher Wörter im Laufe der Zeit, mit Beispielen aus aktuellen Dokumenten. Auf Deutsch ist das Wörterbuch auch als "Der Grimm" bekannt. Es wurde 1838 von den Brüdern Grimm ins Leben gerufen. Ursprünglich gingen sie davon aus, dass das Projekt zehn Jahre dauern und 6 oder 7 Bände umfassen würde. Tatsächlich wurde der erste Band aber erst 1854 veröffentlicht. Wilhelm Grimm starb 1859 und Jacob 1863, während er an dem Eintrag für "Frucht" arbeitete. Nach dem Tod der beiden waren mehrere Institutionen an der Arbeit beteiligt, darunter die Preußische Akademie der Wissenschaften und die Berliner Akademie, aber auch ein Zentrum in Göttingen. Das 1961 fertig gestellte Wörterbuch wird 32 Bände umfassen und etwa 350.000 Haupteinträge enthalten. Der "Grimm" war nicht nur ein wissenschaftliches, sondern auch ein nationales Werk." #deepl:2733659396
 academics.3111.g: "Dies sollte in jedem deutschen Bundesland veröffentlicht werden!" #deepl:1626083622
 academics.3112.g: "Ich hatte gehofft, dass sie stattdessen ein neues Märchenbuch machen..." #deepl:1426349830
 academics.3113.t: "Erster Germanistentag in Frankfurt" #deepl:1466181867
 academics.3113.d: "Mehrere deutsche Intellektuelle haben Gleichgesinnte zu einer Konferenz in Frankfurt eingeladen, dem "Germanistentag". Während viele diese Zusammenkunft nur als kulturelles Ereignis sehen wollen, ist die politische Botschaft ebenso klar." #deepl:886663733
 academics.3113.f: "Die "Germanistentage" waren, anders als der Name vermuten lässt, keine Veranstaltung nur für Germanisten. Sie waren eine Initiative deutscher Universitätswissenschaftler im Rahmen der Entwicklung eines deutschen Nationalgefühls. Im Gegensatz zu heute hatte der Begriff Germanistik im Vormärz eine breitere Bedeutung: Er verband Historiker, Juristen und Sprach- und Literaturwissenschaftler, die sich mit der deutschen Geschichte, dem deutschen Recht und der deutschen Sprache beschäftigten. Auf dem ersten Germanistentag, der 1846 von dem Tübinger Juristen August Ludwig Reyscher in Frankfurt initiiert wurde, sprachen Friedrich Christoph Dahlmann, Georg Waitz und Johann Gustav Droysen über die Unteilbarkeit Schleswig-Holsteins. Jacob Grimm sprach über den "Wert der ungenauen Wissenschaften", sein Bruder Wilhelm über das Deutsche Wörterbuch. Die Konferenzen fanden im Frankfurter Römer statt. Ein zweiter Germanistentag folgte 1847 in Lübeck. Der dritte Germanistentag, der 1848 in Nürnberg stattfinden sollte, kam wegen der Märzrevolution nicht zustande." #deepl:1168056597
 academics.3113.g: "Deutschland ist eine Kulturnation." #deepl:4128550296
 academics.3113.h: "Ihre liberalen Ideale dienen uns als Richtschnur." #deepl:1713936281
 academics.3115.t: "Kontroverse über das Knien" #deepl:3694302961
 academics.3115.d: "Mit den Annexionen der umliegenden Länder im napoleonischen Zeitalter gewann Bayern große Gebiete, die protestantisch waren. In dieser Zeit förderte der König eine tolerantere Politik gegenüber seinen Untertanen. Ein Beispiel dafür war das Edikt, dass protestantische Soldaten nicht vor einer katholischen Messe oder Prozession knien durften. Minister Karl von Abel hat jedoch vorgeschlagen, dies zu ändern." #deepl:877795574
 academics.3115.f: "Der so genannte Kniebeugestreit fand in der ersten Hälfte des 19. Jahrhunderts im Königreich Bayern statt. Er begann mit einem Erlass des bayerischen Ministers Karl von Abel, der auch protestantische Soldaten dazu verpflichtete, sich während des Militärgottesdienstes vor dem Allerheiligsten niederzuknien. Der Erlass wurde als "Kniefalldekret" bekannt. Dies führte zu einem heftigen Streit in der Abgeordnetenkammer, der sich über mehrere Jahre hinzog." #deepl:2386870750
 academics.3115.g: "Wir sind ein katholisches Land und die Menschen knien hier!" #deepl:648344394
 academics.3115.h: "Aber was ist mit unseren protestantischen Landsleuten?" #deepl:1424260626

