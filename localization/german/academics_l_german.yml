 academics.21.t: "Unser [concept_tesla_engineer] ist gestorben"
 academics.21.d: "Nachdem er jahrzehntelang als [concept_tesla_engineer] tätig war, ist unser ehemaliger #b #ORANGE Chefingenieur#!#! gestorben. Werden wir jemals in der Lage sein, einen so erstaunlichen Wissenschaftler zu ersetzen?"
 academics.21.g: "Das ist ein großer Verlust!"
 academics.21_tt: "Manchmal tötet das Spiel Charaktere. Ein Mod kann dies nicht verhindern. Dieses Ereignis entfernt diese Person aus dem Spiel, so dass Sie nicht von seinem Geist heimgesucht werden."
 academics.22.t: "Unser [concept_verrier_astronomer] ist gestorben"
 academics.22.d: "Nachdem er jahrzehntelang als [concept_verrier_astronomer] tätig war, ist unser ehemaliger #b #ORANGE Chefastronom#!#! gestorben. Werden wir jemals in der Lage sein, einen so erstaunlichen Wissenschaftler zu ersetzen?"
 academics.26.t: "Unser [concept_dubois_naturalist] ist gestorben"
 academics.26.d: "Nachdem er jahrzehntelang als [concept_dubois_naturalist] tätig war, ist unser ehemaliger #b #GREEN Chefnaturforscher#!#! gestorben. Werden wir jemals in der Lage sein, einen so erstaunlichen Wissenschaftler zu ersetzen?"
 academics.27.t: "Unser [concept_dubois_paleontologist] ist gestorben"
 academics.27.d: "Nachdem er jahrzehntelang als [concept_dubois_paleontologist] tätig war, ist unser ehemaliger #b #GREEN Chefpaläontologe#!#! gestorben. Werden wir jemals in der Lage sein, einen so erstaunlichen Wissenschaftler zu ersetzen?"
