 je_academics_first_railway: "Fokus auf die Industrie: Bau der ersten Eisenbahn [SCOPE.GetRootScope.GetCountry.GetAltName('IN')]"
 je_academics_first_railway_reason: "Nun, da sich die Erfindung der Eisenbahn [SCOPE.GetRootScope.GetCountry.GetAltName('IN')] verbreitet hat, wollen viele unserer Industriellen, dass wir ein solches Gerät bauen, um den Transport von Waren zu erleichtern. Dies würde uns helfen, ein industrielles Kraftzentrum zu werden."
 academics.2400.t: "Wir brauchen Eisenbahnen!"
 academics.2400.d: "Mit der Eisenbahn können Waren leichter transportiert werden. Deshalb fordern die Industriekapitäne [SCOPE.GetRootScope.GetCountry.GetAltName('GEN')] den Bau einer Eisenbahn in unserem Land in den nächsten 5 Jahren."
 academics.2400.f: "\"Wir transportieren unsere Produkte immer noch auf Feldwegen und Flüssen. Diese Situation ist inakzeptabel. Hätten wir eine bessere Möglichkeit, Waren und Ressourcen zu transportieren, würden unsere Gewinne in die Höhe schnellen und wir könnten mehr Fabriken bauen, was zu besseren Lebensbedingungen für alle führen würde. Baut jetzt eine Eisenbahn!\""
 academics.2400.g: "Können wir sie bauen?"
 academics_industrialists_happy_modifier: "Industrielle zufrieden"
 academics_industrialists_discontent_modifier: "Industriellen unzufrieden"
 academics_first_railway_modifier: "Erste Eisenbahn"
 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]"
 academics_spanisch_broetli_title_loc: "Spanisch-Brötli-Bahn"
 academics_ferrovia_torino_genova_title_loc: "Ferrovia Torino-Genua"
 academics_generic_title_loc: "Die erste Eisenbahnlinie [SCOPE.GetRootScope.GetCountry.GetAltName('GEN')]"
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]"
 academics_spanisch_broetli_desc_loc: "Die Schweiz hat ihre erste Zugverbindung zwischen der Stadt Zürich und der Stadt Baden eingerichtet. Die Bahnlinie wird hoffentlich den Transport von Waren, Personen und Post erleichtern und die Industrie in Baden und Zürich ankurbeln. Zumindest ermöglicht sie es dem reichen Zürcher Adel, seine Diener morgens nach Baden zu schicken, um frische Spanische Brötli zu holen, ein berühmtes süßes Brötchen, das von einem berühmten Bäcker in Baden hergestellt wurde. Die Industriellen freuen sich über diese neue Bahnlinie."
 academics_ferrovia_torino_desc_title_loc: "Die Ferrovia Torino-Genova wurde in Anwesenheit von [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] offiziell eröffnet. Die Bahnlinie von Turin nach Genua ist ein Meisterwerk der italienischen Ingenieurskunst. Die zweigleisige Strecke ist 169 Kilometer lang, hat über 30 Brücken und mit dem 3259 Meter langen Giovi-Tunnel den längsten Tunnel der Welt.\nDie Bahnlinie wird hoffentlich den Güter- und Personenverkehr zwischen Torino und Genua beschleunigen und zur Entwicklung unserer Industrie beitragen. Natürlich freuen sich unsere Industriekapitäne über diese erste Eisenbahnlinie."
 academics_generic_desc_loc: "Der Bau unserer ersten Eisenbahnlinie war weder einfach noch billig. Aber dank der hervorragenden Technik von [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting|l]en Ingenieuren wurde sie in Rekordzeit fertiggestellt. Die Industriellen sind sehr zufrieden, denn diese Strecke bietet ihnen eine schnelle Möglichkeit, ihre Waren und Ressourcen zu transportieren."
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]"
 academics_spanisch_broetli_flavor_loc: "Der köstliche Geruch eines Spanischen Brötli steigt Ihnen in die Nase. Das köstliche Gebäck wurde mit dem ersten Zug der Schweiz geliefert, der Zürich mit der Stadt Baden verband.\n\n#b Historisch gesehen#! wurde die Eisenbahn von Zürich nach Baden 1847 fertiggestellt, kurz vor dem Schweizer Bürgerkrieg, dem \"Sonderbundskrieg\". Es gab 4 Lokomotiven, die vier Verbindungen pro Tag ermöglichten. Sie waren in der Lage, die 23 Kilometer in etwa 45 Minuten zurückzulegen. Die Schweizerische Nordbahn, wie sie offiziell hieß, hatte wenig wirtschaftlichen Erfolg, und schon bald wurden die Expansionspläne nach Aarau verworfen und eine der täglichen Verbindungen eingestellt.\n\nEine Rekonstruktion der \"Spanisch-Brötli-Bahn\" existiert und wird manchmal als historischer Zug auf den modernen Bahnstrecken in der Schweiz betrieben."
 academics_ferrovia_torino_genova_flavor_loc: "Der Erzbischof von Genua taufte die erste Lokomotive. Dann setzte sich das Ungetüm in Bewegung. Es war der erste Zug, der von Genua bis nach Turin fuhr.\n\n#b Historisch gesehen#! war die Strecke die erste Eisenbahnlinie in Sardinien-Piemont. Sie wurde am 18. Juli 1844 von König Carlo Alberto I. in Auftrag gegeben. Noch vor der Fertigstellung der Strecke wurden nach und nach erste eingleisige Streckenabschnitte eröffnet. Am 6. Dezember 1853 wurde die Strecke offiziell eröffnet.\nDie Bahnlinie wurde schnell zur meistgenutzten Strecke in Italien. Vor allem, weil sie den Transport von Waren aus dem Hafen von Genua ermöglichte. 1889 wurde eine alternative Strecke über den Giovi-Pass gebaut, die eine geringere Steigung als die alte Strecke aufwies.\n1898 erstickte das Zugpersonal im Giovi-Tunnel und die Lokomotive fuhr ohne Lokführer weiter. Sie rammte einen wartenden Zug und insgesamt 13 Menschen kamen ums Leben. Infolgedessen wurde die Strecke elektrifiziert."
 academics_generic_flavor_loc: "\"Es war auch höchste Zeit, dass wir eine eigene Bahnlinie bekommen! Wir liegen weit hinter unserer Konkurrenz zurück! Jetzt können wir endlich alle unsere Produkte anständig transportieren!\""
 academics.2401.g: "Yes we can!"
 academics.2402.t: "Wir haben es nicht geschafft, unsere erste Eisenbahnlinie zu bauen"
 academics.2402.d: "Es ist 5 Jahre her, dass die Industriellen uns nach dem Bau der ersten Eisenbahnlinie in unserem Land gefragt haben. Wir konnten die Strecke nicht rechtzeitig fertigstellen. Das wird sich sicherlich auf die Meinung der Industriellen über unsere Regierung auswirken."
 academics.2402.f: "\"Ihr könnt nicht einmal eine Eisenbahnlinie bauen. Eure Regierung ist ein absoluter Versager. Schande über euch!\""
 academics.2402.g: "Nein, konnten wir nicht"
