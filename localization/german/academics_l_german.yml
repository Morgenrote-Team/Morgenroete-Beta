 setting_academics_historical_focus_rule_desc: "Einige Länder beginnen mit ihrer historischen technischen Schule. Preußen zum Beispiel beginnt mit dem militärisch-industriellen Komplex, Frankreich mit der Avantgarde-Intelligenz." #deepl:370631180
