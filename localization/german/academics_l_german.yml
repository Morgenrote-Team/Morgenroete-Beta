 je_academics_giant_of_the_past: "Paläontologischer Schwerpunkt: Giganten der Vergangenheit" #deepl:243698090
 je_academics_giant_of_the_past_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat darum gebeten, [concept_dubois_dinosaur_bone,'$concept_dubois_dinosaur_bones$] zu sammeln und ein [concept_dubois_dinosaur_skeleton] zu rekonstruieren. In welchem Zustand es ist, bleibt zweitrangig - Hauptsache, wir haben ein opulentes Stück in unserer Sammlung. Dinosaurierknochen werden in großen Formationen gefunden. Wenn wir keine in unserem Gebiet haben, wäre eine [concept_dubois_paleontological_licence] von Vorteil, damit unsere Paläontologen im Ausland suchen können." #deepl:3181076370

 academics.2303.t: "Gigant der Vergangenheit" #deepl:2169740648
 academics.2303.d: "Einige führende Wissenschaftler haben beklagt, dass wir trotz unserer paläontologischen Fortschritte noch kein vollständiges Dinosaurierskelett ausstellen konnten. Auch unsere Wissenschaftliche Gesellschaft hat diese unglückliche Situation in einem Schreiben zutiefst bedauert und möchte, dass dieser Zustand behoben wird." #deepl:2732752391
 academics.2303.f: "WIR WOLLEN EINEN DINOSAUR, UND WIR WOLLEN IHN JETZT!\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:102275957
 academics.2303.g: "Eine ausgezeichnete Initiative!" #deepl:3680559001
 academics.2303.h: "Dies ist kein Vergnügungspark für kleine Jungs, sondern ein wissenschaftliches Institut." #deepl:641880906
 academics.2304.t: "Die Eidechse" #deepl:1550261248
 academics.2304.d: "Der neue Dinosaurier ist das spektakulärste Stück der paläontologischen Sammlung. Jeden Tag strömen neue Besucher in die Ausstellung, um das Skelett zu sehen." #deepl:2683400109
 academics.2304.f: "Können wir noch einen haben?\n\nUnterschrieben, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:4237155273
 academics.2304.g: "Unser eigener Dinosaurier!" #deepl:2716486272
 academics.2305.t: "Keine Eidechse" #deepl:4290851265
 academics.2305.d: "Die für das geplante Dinosaurierskelett vorgesehene Plattform bleibt leer. Die Wissenschaftliche Gesellschaft hat darauf mit großer Irritation reagiert." #deepl:4265331817
 academics.2305.f: "Müssen wir noch deutlicher werden?\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3507755545
 academics.2305.g: "Finde ein anderes Spielzeug!" #deepl:2346697765

 academics.2306_goal_tt: "Finde #G 3#! #O  Besondere Fossilien#!" #deepl:2872873090
 academics.2306_reward_tt: "Als Belohnung erhält unser [concept_dubois_paleontologist] #p  50 Erfahrungspunkte#! Wenn wir noch keine [concept_dubois_paleontologist] haben, bekommen wir eine. Außerdem erhalten wir eine große Tech-Investition." #deepl:4213193258

 je_academics_special_fossils: "Paläontologischer Schwerpunkt: Besondere Fossilien" #deepl:2080453927
 je_academics_special_fossils_reason: "Besondere Fossilien sind einzigartige Fossilien, die aufgrund ihres außergewöhnlichen Status gesondert behandelt werden. Dazu gehören Übergangsformen wie Archeopteryx oder Ichthyostega, aber auch große ausgestorbene Säugetierarten wie das Riesenfaultier Megatherium oder der delphinartige Ichthyosaurus. Aber auch kleinere Fossilien, die zur Definition einer Epoche herangezogen werden - die bekanntesten sind Ammoniten und Trilobiten - gehören zu dieser Kategorie. Insgesamt gibt es ein Dutzend besonderer Fossilien, die nicht nur in Formationen, sondern auch auf wissenschaftlichen Expeditionen gefunden werden können." #deepl:2959240579
 je_academics_special_fossils_success: "Finde #G 3#! #O  Besondere Fossilien#!" #deepl:2872873090

 academics.2306.t: "Außergewöhnliche Fossilien" #deepl:3148834181
 academics.2306.d: "Die Wissenschaftliche Gesellschaft hat eine außergewöhnliche Anfrage an uns bezüglich außergewöhnlicher Fossilien." #deepl:180645004
 academics.2306.f: "Die Abstammungsgeschichte der Tiere ist ein Geheimnis der Natur, das unsere Forscher jeden Tag ein wenig mehr lüften. Eine besondere Rolle spielen dabei jene Formen, die an den Schwellen zwischen den Arten liegen, so genannte "Missing Links". Gleichzeitig gibt es auf unserem Planeten außergewöhnliche Lebewesen, die nicht unbedingt Dinosaurier sein müssen, um zu beeindrucken: ausgestorbene Säugetiere wie Säbelzahntiger oder Riesenfaultiere. Wenn wir mindestens 3 besondere Fossilien sammeln würden, könnten wir den Ruf unseres Instituts in der Welt weiter stärken.\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:1481224513
 academics.2306.g: "Besondere Fossisls für eine besondere Sammlung." #deepl:1382165318
 academics.2306.h: "Können wir unsere wissenschaftlichen Kapazitäten nicht auf etwas Sinnvolleres konzentrieren?" #deepl:2657476496
 academics.2307.t: "Erstaunliche Fossiliensammlung" #deepl:2566840530
 academics.2307.d: "Das Nationale Paläontologische Institut besitzt zweifelsohne eine der bedeutendsten internationalen Sammlungen. Es gibt kaum einen vergleichbaren Ort mit solch außergewöhnlichen Stücken." #deepl:2667608939
 academics.2307.f: "Besondere Fossilien sind vielleicht nicht immer so beeindruckend, wie man zunächst denken mag, aber sie haben einen großen wissenschaftlichen Wert. Deshalb hat die Wissenschaftliche Gesellschaft ein Dankesschreiben verschickt. In den nächsten Tagen wird es eine Sonderausstellung geben." #deepl:1074910647
 academics.2307.g: "Prächtig." #deepl:1381795657
 academics.2308.t: "Besondere Enttäuschung" #deepl:2579052096
 academics.2308.d: "Die Wissenschaftliche Gesellschaft hat ihre Bestürzung über den jüngsten paläontologischen Misserfolg zum Ausdruck gebracht." #deepl:1973262450
 academics.2308.f: "Es ist eine nationale Tragödie, dass die naturkundlichen Belange des Landes völlig ignoriert werden. Paläontologische Forschungen werden als Unsinn über tote Vögel und Eidechsen abgetan, Unterstützungszahlungen für spezielle Expeditionen werden selten geleistet und selbst kleinste Wünsche werden ignoriert. J'Accuse!\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:62654013
 academics.2308.g: "Oh je." #deepl:3604799720

 ademics_no_paleontological_hero_modifier: "Kein Held der Paläontologie" #deepl:2094234066

 academics.2309_goal_tt: "Haben Sie eine #o berühmte#! [concept_dubois_paleontologist]" #deepl:1974990082
 academics.2309_reward_tt: "Als Belohnung erhalten wir #p 120#! [concept_academics_progress] ." #deepl:3353328432

 je_academics_famous_paleontologist: "Paläontologischer Fokus: Berühmte Paläontologen" #deepl:1975913922
 je_academics_famous_paleontologist_reason: "Der Aufstieg eines [concept_dubois_paleontologist] wird von der Verbesserung seiner Erfahrung begleitet. Wie jeder Akademiker erhält auch ein Paläontologe jährlich 5 Erfahrungspunkte. Zusätzliche Erfahrung gewinnt er durch die erfolgreiche Erforschung von paläontologischen Formationen. Außerdem kann ein Paläontologe auf Bergsteiger- und Pazifikexpeditionen eingesetzt werden. Auch das erfolgreiche Konstruieren und Zusammensetzen von Dinosaurierskeletten trägt zur Erfahrungssteigerung eines Paläontologen bei." #deepl:2916282154

 academics.2310.g: "Eine Inspiration für die Jugend." #deepl:535907627
 academics.2311.t: "Kein Held der Paläontologie" #deepl:2094234066
 academics.2311.d: "Aus welchen Gründen auch immer waren wir nicht in der Lage, einen Paläontologen zu fördern und ihn weltberühmt werden zu lassen." #deepl:1519588667
 academics.2311.f: "Leider hat das Scheitern dazu geführt, dass die wissenschaftlichen Disziplinen weiterhin als Orchideenthemen abgetan werden und sich die Begeisterung für ein akademisches Studium und den Einstieg in den aktiven Forschungsdienst in Grenzen hält. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] spüren die Unzufriedenheit in Gesprächen. Die intellektuelle Elite macht die Regierung für diese Situation verantwortlich." #deepl:1620448081
 academics.2311.g: "Enttäuschend." #deepl:1131565686

 academics_splendid_dinosaur_collection_modifier: "Prächtige Dinosaurier-Kollektion" #deepl:1684897777

 academics.2312_goal_tt: "Du hast eine #o Dinosaurier-Bewertung#! von mindestens #G 5 #!" #deepl:2700561447
 academics.2312_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Bewilligungen#!. Zusätzlich erhalten Sie #p 10%#! mehr Prestige und die Kosten für die Gesellschaftstechnologie werden #p 5%#! für 10 Jahre reduziert. " #deepl:1767873572

 je_academics_dinosaur_rating: "Paläontologischer Schwerpunkt: Dinosaurier-Bewertung" #deepl:1331762685
 je_academics_dinosaur_rating_reason: "Um die #O Dinosaurierbewertung#! zu verbessern, werden nicht nur neue Dinosaurierskelette benötigt, sondern auch eine perfekte Rekonstruktion derselben. Dies kann Jahre dauern. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat daher beschlossen, keine zeitliche Begrenzung festzulegen." #deepl:37669324
 je_academics_dinosaur_rating_success: "Du hast eine #o Dinosaurier-Bewertung#! von mindestens #G 5 #!" #deepl:2700561447

 academics.2312.t: "Die Pracht der Paläontologie" #deepl:3656108030
 academics.2312.d: "Der paläontologische Zweig unserer wissenschaftlichen Forschung hat bereits einen guten Ruf. Jetzt ist es an der Zeit, ihn weltweit bekannt zu machen, indem wir unsere Dinosaurier-Ausstellung deutlich verbessern." #deepl:607099509
 academics.2312.f: "Wir möchten vielleicht einen anderen Dinosaurier in unserer Ausstellung zeigen. Eine größere Anzahl von Skeletten würde nicht nur der wissenschaftlichen Forschung zugute kommen, sondern auch unserem nationalen Ansehen. Die ganze Welt gräbt nach Dinosaurierknochen und ist fasziniert von der bisher unbekannten Vorgeschichte. Es sollte nicht nur um Quantität gehen, sondern auch um Qualität. Wir sollten uns zum Ziel setzen, Spitzenreiter bei der Rekonstruktion von Dinosaurierskeletten zu sein.\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:4016750437
 academics.2312.g: "Das wird ein kolossales Unterfangen sein!" #deepl:933384390
 academics.2312.h: "Nicht schon wieder dieser paläontologische Blödsinn." #deepl:2386316769
 academics.2313.t: "Eine prächtige Sammlung" #deepl:2859853005
 academics.2313.d: "Die Wissenschaftliche Gesellschaft war stolz darauf, heute eine Sonderausstellung von Dinosaurierskeletten anzukündigen." #deepl:2932098411
 academics.2313.f: "Wir sind der Regierung zu großem Dank verpflichtet, dass sie endlich eine Dinosauriersammlung besitzt, die das hohe Niveau der paläontologischen Forschung in unserem Land unterstreicht. Es gibt kaum eine exquisitere Sammlung als diese. Es hat viel harte Arbeit und Mühe gekostet, aber auch Forschungsdrang und Beharrlichkeit. Die Gesellschaft kann mit Stolz auf diese Arbeit blicken, während das Ausland mit Neid auf sie schaut. Meine Herren: Dies ist ein großer Tag für die Wissenschaft im Allgemeinen und die Paläontologie im Besonderen!\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:26329575
 academics.2313.g: "Wunderbar!" #deepl:2825298509

