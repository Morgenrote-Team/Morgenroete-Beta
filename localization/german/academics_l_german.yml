 academics_recruit_foreign_scientist_desc: "Rekrutieren Sie einen [Concept('concept_academics_academic','$concept_academics_scientist$')] aus einem anderen Land, das fortschrittlicher ist als wir. Da die besten Wissenschaftler in ihrem Herkunftsland bleiben werden, werden wir nicht in der Lage sein, die besten Wissenschaftler zu bekommen. Daher wird der angeworbene Wissenschaftler länger brauchen, um Erfahrungen zu sammeln."
 academics_recruit_foreign_scientist_proposal_notification_name: "Wissenschaftler [INITIATOR_COUNTRY.GetAltName('NACH')] entsenden"
 academics_recruit_foreign_scientist_proposal_notification_desc: "[INITIATOR_COUNTRY.GetAltName('NOM')] bittet uns, einen unserer [Concept('concept_academics_academic','$concept_academics_scientists$')] gegen eine Geldsumme zu schicken, da sie nicht in der Lage sind, selbst einen zu rekrutieren. Dadurch verlieren Wir keinen Wissensschaftler, stattdessen senden wir [INITIATOR_COUNTRY.GetAltNameNoFormatting('DAT')] einen neuen, unerfahrenen Wissenschaftler."
 academics_recruit_foreign_scientist_proposal_notification_effects_desc: "Wir erhalten @money! #p 250K#! und schicken einen unserer unbedeutenderen [Concept('concept_academics_academic','$concept_academics_scientists$')] an [INITIATOR_COUNTRY.GetAltName('AKK')]."
