 je_academics_tech_school: "Akademischer Schwerpunkt" #deepl:2089492057
 je_academics_tech_school_reason: "Unter bestimmten Bedingungen kann eine Nation ihren Forschungsschwerpunkt verlagern, wenn sie ihre Universitäten auf ein bestimmtes Gebiet spezialisiert oder sie mischt. Eine Spezialisierung (die so genannte "Tech School") hat einen Vorteil gegenüber der traditionellen akademischen Ausrichtung, führt aber dazu, dass mindestens ein Forschungsbereich gegenüber einem anderen bevorzugt wird. Um sich einer Tech School zuzuwenden, muss eine bestimmte Interessengruppe an der Macht sein, und in bestimmten Fällen müssen zusätzliche Voraussetzungen erfüllt sein - Seemacht ohne Schiffe ist ebenso unmöglich wie Tycoon-Kapitalismus ohne Fabriken. Einige Länder beginnen zu Beginn des Spiels mit einer gewählten Tech-Schule." #deepl:4127711160

 academics_change_to_avantgarde_school_button: "Avantgarde-Intelligenzia" #deepl:3131737499
 academics_change_to_avantgarde_school_button_desc: "Eine Clique von Akademikern mit klaren kulturellen, soziologischen und anthropologischen Vorstellungen bestimmt den wissenschaftlichen Alltag. Praktische Bereiche sind dagegen von untergeordneter Bedeutung.\n#R Hinweis#!: Erhöht das Erscheinungsbild der Akademiker um einen Punkt pro Monat." #deepl:4121191853
 academics_change_to_practical_school_button: "Praktische Wissenschaft" #deepl:427209815
 academics_change_to_practical_school_button_desc: "Die Wissenschaftler in unserem Land sind unermüdlich bemüht, Entdeckungen aus allen Bereichen für den praktischen Alltag nutzbar zu machen. Dies soll dem allgemeinen Fortschritt und dem Frieden der Menschheit dienen.\n#R Hinweis#!: Erhöht das Erscheinungsbild der Akademiker um einen Punkt pro Monat." #deepl:1298839864
 academics_change_to_military_school_button: "Militärisch-industrieller Komplex" #deepl:2351624172
 academics_change_to_military_school_button_desc: "Durch die Zusammenarbeit zwischen privaten Industriellen und dem Militär hat sich ein besonders bedeutendes Geflecht von Verbindungen, persönlichen Beziehungen und Bekanntschaften entwickelt, das sich am besten als militärisch-industrieller Komplex bezeichnen lässt - mit einem ganz leichten Hauch von Korruption." #deepl:2647825191
 academics_change_to_business_school_button: "Business Schools &amp; Tycoon-Kapitalismus" #deepl:1165160092
 academics_change_to_business_school_button_desc: "Das eigenständige Individuum in Verbindung mit einer prosperierenden Zeit des Fortschritts hat zu einer Mentalität geführt, in der Berufsschulen, mittelständische Unternehmen und Großkonzerne die Wissenschaft des Landes entscheidend prägen. Umgekehrt arbeiten die Universitäten daran, den erworbenen Wohlstand der Nation durch neue Technologien zu mehren und gesellschaftliche Ideen durch Fortschritt voranzutreiben." #deepl:426357733
 academics_change_to_seapower_school_button: "Seemacht und Handelsmarine" #deepl:3065054416
 academics_change_to_seapower_school_button_desc: "Die Marine und der internationale Handel spielen für unser Land eine immense Rolle. Die Steigerung des Wohlstands durch fortschrittliche Produktion und den weltweiten Handel mit unseren Produkten ist ebenso wichtig wie die Verteidigung des bereits Erreichten." #deepl:3868569406
 academics_change_to_useful_school_button: "Nützlicher Elfenbeinturm" #deepl:2482418130
 academics_change_to_useful_school_button_desc: "Die Akademie gilt in unserem Land als Zufluchtsort für exzentrische Geister, die Käfer zählen, alte Vasen polieren und sich mit seltsamen Dingen beschäftigen. Es lässt sich jedoch nicht leugnen, dass die Abgeschiedenheit des Elfenbeinturms von der Gesellschaft auch ihre Vorteile hat. Ungestört arbeitet so mancher Professor besser.\n#R Hinweis#!: Erhöht das Aussehen von Akademikern um einen Punkt pro Monat." #deepl:1848191907

