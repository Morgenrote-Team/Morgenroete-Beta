 academics.7.d: "Nachdem er Jahrzehnte seines [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] Lebens damit verbracht hat, neue Fossilien zu entdecken, Dinosaurier und andere ausgestorbene Arten zu rekonstruieren, hat [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] beschlossen, in den Ruhestand zu gehen. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht mehr als unser [concept_dubois_paleontologist] arbeiten." #deepl:2654532442
 academics.9.d: "Nachdem er Jahrzehnte seines [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] Lebens mit der Entdeckung von Relikten alter Zivilisationen verbracht hat, hat [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] beschlossen, sich zur Ruhe zu setzen. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht mehr als unser [concept_lepsius_archaeologist] arbeiten." #deepl:2392332882
