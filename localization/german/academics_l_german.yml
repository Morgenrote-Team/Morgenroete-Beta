 academics.29.d: "Nachdem er jahrzehntelang als [concept_lepsius_archaeologist] tätig war, ist unser ehemaliger #b #BLUE Chefarchäologe#!#! gestorben. Werden wir jemals in der Lage sein, einen so erstaunlichen Wissenschaftler zu ersetzen?"
