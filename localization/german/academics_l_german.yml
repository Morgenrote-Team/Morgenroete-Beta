 academics.113.f: ""
 academics.113.g: "Wird [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] Ruhm so lange halten wie die Dinosaurierknochen?"
 academics.116.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] ist jetzt ein erfahrener Archäologe"
