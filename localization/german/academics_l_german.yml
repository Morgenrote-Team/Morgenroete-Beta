 academics.1010.t: "Studieren Sie Frauen?" #deepl:3924041855
 academics.1010.d: "Einige Frauen haben sich für ein Studium an einer unserer Universitäten beworben. Nun stellte sich die Frage, ob es legal ist, dass sie studieren, und wie die offizielle Haltung unserer Regierung zum Studium von Frauen ist." #deepl:3971142751
 academics.1010.f: "\"Die Gehirne von Frauen sind nicht für logisches Denken gemacht, sondern eher für Emotionen. Sie sollten nicht studieren dürfen!\"\n\n\"Sie haben nur Angst, dass eine Frau eine fähigere Wissenschaftlerin wird als Sie. Das wird mit Sicherheit passieren, denn Ihre Argumente entbehren jeder wissenschaftlichen Grundlage! Lasst die Frauen unter den gleichen Bedingungen wie die Männer studieren!\"" #deepl:2653977447
 academics.1010.g: "Sie sollen lernen!" #deepl:2724890484
 academics.1010.h: "Moment, sie konnten bisher nicht studieren?" #deepl:864325608
 academics.1010.i: "Frauen gehören an den Herd!" #deepl:1709521937

 academics.1011.t: "Eine brillante Wissenschaftlerin" #deepl:758456841
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] hat ihr Studium an einer unserer Universitäten als Klassenbeste abgeschlossen. In einem von Männern dominierten Fachgebiet konnte sie ihr Studium in Rekordzeit abschließen und ist begierig darauf, in ihrem Bereich zu arbeiten. Sie ist eine brillante..." #deepl:2004432585
 academics.1011.f: "Meine aufrichtigen Glückwünsche an Sie zu Ihrem unglaublichen Abschluss! Wer hätte das für eine Frau für möglich gehalten!" #deepl:2507040821
 academics.1011.g: "...Ingenieur" #deepl:1499525423
 academics.1011.h: "...Astronom" #deepl:244115550
 academics.1011.i: "...Naturalist" #deepl:543692567
 academics.1011.j: "...Paläontologe" #deepl:325723956
 academics.1011.k: "...Archäologe" #deepl:1010360691
 academics.1011.l: "...Anthropologe" #deepl:2995455499
 academics.1011.m: "Wir brauchen sie nicht." #deepl:567041128

