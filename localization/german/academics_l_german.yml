 je_academics_first_railway: "Fokus auf die Industrie: Bau der ersten Eisenbahn von [SCOPE.GetRootScope.GetCountry.GetName]" #deepl:907729698
 je_academics_first_railway_reason: "Nun, da sich die Erfindung der Eisenbahn auf [SCOPE.GetRootScope.GetCountry.GetName] verbreitet hat, wollen viele unserer Industriellen, dass wir ein solches Gerät bauen, um den Transport von Waren zu erleichtern. Dies würde uns helfen, ein industrielles Kraftzentrum zu werden." #deepl:2588220227

 academics.2400.t: "Wir brauchen Eisenbahnen!" #deepl:2114476013
 academics.2400.d: "Mit der Eisenbahn können Waren leichter transportiert werden. Deshalb fordern die Industriekapitäne von [SCOPE.GetRootScope.GetCountry.GetName] den Bau einer Eisenbahn in unserem Land in den nächsten 5 Jahren." #deepl:3786328599
 academics.2400.f: ""Wir transportieren unsere Produkte immer noch auf Feldwegen und Flüssen. Diese Situation ist inakzeptabel. Hätten wir eine bessere Möglichkeit, Waren und Ressourcen zu transportieren, würden unsere Gewinne in die Höhe schnellen und wir könnten mehr Fabriken bauen, was zu besseren Lebensbedingungen für alle führen würde. Baut jetzt eine Eisenbahn!"" #deepl:963458682
 academics.2400.g: "Können wir sie bauen?" #deepl:4067754051

