 academics_smaller_tech_advance_than_best_30_percent_tt: "[GetPlayer.GetAltName('NOM')] ist #V nicht#! eines der #V 30% technologisch fortschrittlichsten Länder#!. Derzeit gehören wir zu den [GetPlayer.MakeScope.Var('academics_country_tech_advance_var').GetValue|%+0] fortschrittlichsten Ländern."
