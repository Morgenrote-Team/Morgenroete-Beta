 academics.2101.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert ein Museum"
 academics.2101.d: "Als eine der mächtigsten Nationen der Welt fehlt es uns bisher jegliches achäologisches Prestige. Deshalb fordert uns die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] auf, ein Archäologisches Museum zu bauen."
 academics.2101.f: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bittet Sie, Ihr Engagement für die Archäologie zu verstärken. Die Erforschung der Vergangenheit, die Entdeckung vergessener Kulturen und die Bergung wertvoller Artefakte ist sowohl für die Wissenschaft als auch für das nationale Prestige von größter Bedeutung.\nDeshalb bitten wir Sie, ein Archäologisches Museum zu gründen, um das Wissen und die hervorragenden Kunstwerke vergangener Kulturen zu vermehren, zu vermitteln und zu bewahren.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2101.g: "Wir werden auf Schatzsuche gehen!"
 academics.2101.h: "Kein Bedarf für ein verstaubtes Museum."
 academics.2101_goal_tt: "Sie müssen in #n 10#! Jahren #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] sammeln und ein archäologisches Museum bauen."
 academics.2102.t: "Einweihung des Archäologischen Museums"
 academics.2102.d: "Die Vertreter der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] zeigten sich bei der heutigen Eröffnung des Archäologischen Museums sehr zufrieden."
 academics.2102.f: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] freut sich, dass das neue Museum der Öffentlichkeit zugänglich gemacht wurde und zahlreiche Bürgerinnen und Bürger nun die gefundenen Artefakte bewundern können. Sie sind auch von großem wissenschaftlichen Wert. Da dies jedoch nur ein Anfang sein kann, haben wir bereits mit dem Museumsdirektor vereinbart, dass er die künftige Beschaffung von Artefakten anmahnen soll. Er ist - natürlich - auch Mitglied unserer Gesellschaft.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2102.g: "Jetzt brauchen wir noch etwas, das dort hinein gehört..."
 academics.2103.t: "Eine archäologische Schande"
 academics.2103.d: "Zur großen Bestürzung der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wurde heute festgestellt, dass trotz des Versprechens, die Archäologie des Landes zu fördern, keinerlei Anstrengungen in dieser Richtung unternommen wurden."
 academics.2103.f: "Wir, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], sind zutiefst enttäuscht über die Ignoranz der Regierung. Ist ein kleines Museum wirklich zu viel verlangt?\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2103.g: "Wer braucht schon dieses verstaubte Museum?"
 academics.2104.t: "Museumsdirektor schlägt eine ägyptische Ausstellung vor"
 academics.2105.t: "Museumsdirektor schlägt eine mesopotamische Ausstellung vor"
 academics.2106.t: "Museumsdirektor schlägt eine ägäische Ausstellung vor"
 academics.2107.t: "Museumsdirektor schlägt eine präkolumbianische Ausstellung vor"
 academics.2104.d: "Der Direktor des Archäologischen Museums hat davor gewarnt, dass unser Museum im internationalen Vergleich zurückfallen könnte, wenn wir nicht dringend fehlende Artefakte in einer Ausstellung zusammenführen."
 academics.2104.f: "Als stolzes Mitglied der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bedaure ich die Vernachlässigung unseres schönen Museums. Die ganze Welt sammelt ägyptische Artefakte, und kürzlich habe ich aus dem Ausland von der katzenartigen Bastet-Statue gehört. Der absolute letzte Schrei, sage ich Ihnen! Sie soll auch rosa sein, habe ich gehört. Und wir haben nicht einmal genug Skarabäen, um eine richtige Ausstellung zu organisieren. Wenn wir nicht bald wenigstens genug Artefakte für eine mittelgroße Ausstellung sammeln, bin ich pessimistisch, was die Zukunft der Archäologie in unserem Land angeht.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums"
 academics.2105.f: "Als begeistertes Mitglied der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bedaure ich die Vernachlässigung unseres angesehenen Museums. Mesopotamische Artefakte sind heutzutage der letzte Schrei, und die großen Nationen können einfach nicht genug davon bekommen. Natürlich bin ich der Meinung, dass nicht die Größe eines Lamassu seinen Wert bestimmt, sondern das, was man mit ihm macht. Wir haben aber nicht einmal genug Keilschrifttafeln, um eine richtige Ausstellung zu organisieren. Wenn wir nicht bald wenigstens genug Artefakte für eine mittelgroße Ausstellung sammeln, bin ich pessimistisch, was die Zukunft der Archäologie in unserem Land angeht.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums"
 academics.2106.f: "Als wichtiges Mitglied der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bedaure ich die Vernachlässigung unseres stolzen Museums. Ägäische Artefakte gehen weg wie warme Semmeln, das ist die Erfahrung der letzten Jahre. Die homerischen Epen sind seit der Wiederentdeckung Trojas zur Populärkultur geworden, und jeder Neureiche hat jetzt eine antike Statue in seinem Garten. Und wir? Wir haben nicht einmal ein paar abscheuliche mykenische Grabbeigaben vorzuweisen! Wenn wir nicht bald wenigstens genug Artefakte für eine mittelgroße Ausstellung sammeln, bin ich pessimistisch, was die Zukunft der Archäologie in unserem Land angeht.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums"
 academics.2107.f: "Als schönes Mitglied der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bedaure ich die Vernachlässigung unseres wichtigen Museums. Der Mayaismus kennt keine Grenzen mehr. Esoterische Mitglieder unserer Gesellschaft geben viel Geld aus, um die exotischsten Stücke aus Mittel- und Südamerika zu erwerben. Der Grabraub und die Zerstörung wertvoller historischer Güter ist in vollem Gange. Ich habe gehört, dass ein Expeditionsleiter sogar die Pyramiden von Tikal versetzen wollte! Wir hingegen haben nicht einmal ein paar okkulte Steinmasken, um Kinder im Museum zu erschrecken. Wenn wir nicht bald wenigstens genug Artefakte für eine mittelgroße Ausstellung sammeln, bin ich pessimistisch, was die Zukunft der Archäologie in unserem Land angeht.\n\nGezeichnet, Der Direktor des Archäologischen Museums"
 academics.2104.g: "Glück und Ruhm!"
 academics.2104.h: "Wir haben Besseres zu tun als auf Schatzsuche zu gehen."
 academics.2108.t: "Eine neue archäologische Sammlung"
 academics.2108.d: "Der Museumsdirektor hat seine Freude darüber geäußert, dass sein Anliegen bezüglich neuer Artefakte erhört wurde, und seine Freunde bei der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] darüber informiert, dass das Museum bald eine neue Ausstellung zeigen wird."
 academics.2108.f: "Das Institut dankt der Regierung dafür, dass sie dazu beigetragen hat, das wissenschaftliche Ansehen des Landes zu verbessern. Die zahlreichen neuen Artefakte sind ein Ausdruck der Kunstfertigkeit und des unermüdlichen Forschungsdrangs der besten Männer und Frauen dieses Landes.\n\nUnterzeichnet haben die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2108.g: "Erfolgreich!"
 academics.2109.t: "Archäologische Enttäuschung"
 academics.2109.d: "Verblüfft, bestürzt und schockiert über die Ablehnung seiner dringenden Anliegen hat sich der Museumsdirektor weinend und verschlossen in sein Büro zurückgezogen und weigert sich, mit jemandem zu sprechen."
 academics.2109.f: "Gut gemacht, gut gemacht. Das letzte Mal, als der Museumsdirektor in diesem Zustand war, hat er sich fast aus dem Fenster gestürzt. Es ist wirklich gefühllos, wie sich einige Regierungsbeamte verhalten. Er wollte nur ein paar Artefakte. Ein paar schäbige kleine Artefakte. Er hat nichts auf der Welt außer ein paar verstaubten Statuetten und zerbrochenen Vasen! Ich hoffe, du bist jetzt glücklich. Der arme Mann ist am Boden zerstört.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]\""
 academics.2109.g: "Scheitern..."
 academics.2104_goal_tt: "Sie müssen #p 25#! ägyptische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] in #n 15#! Jahren sammeln."
 academics.2105_goal_tt: "Sie werden #p 25#! mesopotamische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] in #n 15#! Jahren sammeln müssen."
 academics.2106_goal_tt: "Sie müssen #p 25#! ägäische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] in #n 15#! Jahren sammeln."
 academics.2107_goal_tt: "Sie müssen #p 25#! präkolumbische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] in #n 15#! Jahren sammeln."
 je_academics_found_archaeological_museum: "Fokus auf Archäologie: Ein Museum gründen"
 je_academics_found_archaeological_museum_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir ein Archäologisches Museum bauen, um das Wissen, aber auch den Lebensstandard unserer Intellektuellen zu verbessern. Für den Bau eines Museums werden #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] benötigt, die von einem [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] auf einer [concept_lepsius_expedition] gefunden werden müssen, sollten wir nicht das unverschämte Glück haben, sie durch ein zufälliges Geschenk oder eine lokale Ausgrabung zu erwerben.\nEs ist auch sehr wichtig, weil der professionelle archäologische Slogan „Das gehört in ein Museum!“ ohne ein tatsächliches Museum wenig Sinn ergeben würde.\n\nTatsächlich wäre es sogar ziemlich peinlich."
 je_academics_egyptian_artifacts: "Fokus auf Archäologie: Ägyptische Artefakte"
 je_academics_egyptian_artifacts_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mindestens #p 25#! ägyptische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] finden, die von einem [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] auf einer [concept_lepsius_expedition] oder [concept_lepsius_excavation] gefunden werden müssen, sollten wir nicht das unverschämte Glück haben, sie durch ein zufälliges Geschenk oder eine lokale Ausgrabung zu erwerben."
 je_academics_egyptian_artifacts_success: "Sammeln #p 25#! #b Ägyptische Artefakte#!"
