 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]" #deepl:2301161423
 academics_spanisch_broetli_title_loc: "Spanisch-Brötli-Bahn" #deepl:1720868257
 academics_ferrovia_torino_genova_title_loc: "Ferrovia Torino-Genua" #deepl:2616403707
 academics_generic_title_loc: "Die erste Eisenbahnlinie der [SCOPE.GetRootScope.GetCountry.GetName]" #deepl:1683601637

 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]" #deepl:573966156
 academics_spanisch_broetli_desc_loc: "Die Schweiz hat ihre erste Zugverbindung zwischen der Stadt Zürich und der Stadt Baden eingerichtet. Die Bahnlinie wird hoffentlich den Transport von Waren, Personen und Post erleichtern und die Industrie in Baden und Zürich ankurbeln. Zumindest ermöglicht sie es dem reichen Zürcher Adel, seine Diener morgens nach Baden zu schicken, um frische Spanische Brötli zu holen, ein berühmtes süßes Brötchen, das von einem berühmten Bäcker in Baden hergestellt wurde. Die Industriellen freuen sich über diese neue Bahnlinie." #deepl:3730688026
 academics_ferrovia_torino_desc_title_loc: "Die Ferrovia Torino-Genova wurde in Anwesenheit von [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] offiziell eröffnet. Die Bahnlinie von Turin nach Genua ist ein Meisterwerk der italienischen Ingenieurskunst. Die zweigleisige Strecke ist 169 Kilometer lang, hat über 30 Brücken und mit dem 3259 Meter langen Giovi-Tunnel den längsten Tunnel der Welt.\nDie Bahnlinie wird hoffentlich den Güter- und Personenverkehr zwischen Torino und Genua beschleunigen und zur Entwicklung unserer Industrie beitragen. Natürlich freuen sich unsere Industriekapitäne über diese erste Eisenbahnlinie." #deepl:1196369535
 academics_generic_desc_loc: "Der Bau unserer ersten Eisenbahnlinie war weder einfach noch billig. Aber dank der hervorragenden Technik von [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] wurde sie in Rekordzeit fertiggestellt. Die Industriellen sind sehr zufrieden, denn diese Strecke bietet ihnen eine schnelle Möglichkeit, ihre Waren und Ressourcen zu transportieren." #deepl:1968994970

 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]" #deepl:4274571732
 academics_spanisch_broetli_flavor_loc: "Der köstliche Geruch eines Spanischen Brötli steigt Ihnen in die Nase. Das köstliche Gebäck wurde mit dem ersten Zug der Schweiz geliefert, der Zürich mit der Stadt Baden verband.\n\n#b Historisch gesehen#! wurde die Eisenbahn von Zürich nach Baden 1847 fertiggestellt, kurz vor dem Schweizer Bürgerkrieg, dem \"Sonderbundskrieg\". Es gab 4 Lokomotiven, die vier Verbindungen pro Tag ermöglichten. Sie waren in der Lage, die 23 Kilometer in etwa 45 Minuten zurückzulegen. Die Schweizerische Nordbahn, wie sie offiziell hieß, hatte wenig wirtschaftlichen Erfolg, und schon bald wurden die Expansionspläne nach Aarau verworfen und eine der täglichen Verbindungen eingestellt.\n\n Eine Rekonstruktion der \"Spanisch-Brötli-Bahn\" existiert und wird manchmal als historischer Zug auf den modernen Bahnstrecken in der Schweiz betrieben." #deepl:1626354705
 academics_ferrovia_torino_genova_flavor_loc: "Der Erzbischof von Genua taufte die erste Lokomotive. Dann setzte sich das Ungetüm in Bewegung. Es war der erste Zug, der von Genua bis nach Turin fuhr.\n\n#b Historisch gesehen,#! war die Strecke die erste Eisenbahnlinie in Sardinien-Piemont. Sie wurde am 18. Juli 1844 von König Carlo Alberto I. in Auftrag gegeben. Noch vor der Fertigstellung der Strecke wurden nach und nach erste eingleisige Streckenabschnitte eröffnet. Am 6. Dezember 1853 wurde die Strecke offiziell eröffnet.\nDie Bahnlinie wurde schnell zur meistgenutzten Strecke in Italien. Vor allem, weil sie den Transport von Waren aus dem Hafen von Genua ermöglichte. 1889 wurde eine alternative Strecke über den Giovi-Pass gebaut, die eine geringere Steigung als die alte Strecke aufwies.\n1898 erstickte das Zugpersonal im Giovi-Tunnel und die Lokomotive fuhr ohne Lokführer weiter. Sie rammte einen wartenden Zug und insgesamt 13 Menschen kamen ums Leben. Infolgedessen wurde die Strecke elektrifiziert." #deepl:2893503231
 academics_generic_flavor_loc: ""Es war auch höchste Zeit, dass wir eine eigene Bahnlinie bekommen! Wir liegen weit hinter unserer Konkurrenz zurück! Jetzt können wir endlich alle unsere Produkte anständig transportieren!"" #deepl:2440740577

 academics.2401.g: "Ja, wir können!" #deepl:3380295388

 academics.2402.t: "Wir haben es nicht geschafft, unsere erste Eisenbahnlinie zu bauen" #deepl:3611031781
 academics.2402.d: "Es ist 5 Jahre her, dass die Industriellen uns mit dem Bau der ersten Eisenbahnlinie in unserem Land beauftragt haben. Wir konnten die Strecke nicht rechtzeitig fertigstellen. Das wird sich sicherlich auf die Meinung der Industriellen über unsere Regierung auswirken." #deepl:2552716447
 academics.2402.f: ""Ihr könnt nicht einmal eine Eisenbahnlinie bauen. Eure Regierung ist ein absoluter Versager. Schande über euch!"" #deepl:1607613028
 academics.2402.g: "Nein, wir konnten nicht" #deepl:2090609359

