 academics.2117.t: "Wundersame Artefaktsammlung" #deepl:2271109344
 academics.2117.d_rival: "Wir haben eine größere Sammlung von Artefakten zusammengetragen als unser Rivale [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!" #deepl:2277834386
 academics.2117.d_rival_gone: "Unser archäologischer Rivale ist verschwunden. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!" #deepl:253023574
 academics.2117.f: "Es sollte offensichtlich sein, dass unsere Nation eine bessere archäologische Sammlung haben muss als diese Barbaren. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ist mit dieser Sammlung zufrieden. Obwohl es noch mehr Artefakte gibt, die vor diesen Wilden gerettet werden müssen.\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:906269682
 academics.2117.g: "So viele gerettete Artefakte!" #deepl:3685743419

 academics.2118.t: "Es ist uns nicht gelungen, unsere archäologische Sammlung zu erweitern." #deepl:1182541568
 academics.2118.d: "Wir waren nicht in der Lage, unsere archäologische Sammlung weiter auszubauen als unsere Konkurrenten auf [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind zutiefst enttäuscht." #deepl:2082503980
 academics.2118.f: "Die schmutzigen Hände dieser Wilden beschmutzen die gesamte Geschichte der Menschheit. Wie konntest du zulassen, dass all diese Artefakte von diesen Grabräubern geplündert werden. So viel Wissen wird verloren gegangen sein, weil sie lieber Schätze wollen, als unsere Geschichte zu bewahren. Abscheulich!\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3337718506
 academics.2118.g: "Wir brauchen diese verstaubten Artefakte nicht." #deepl:4152517367

 academics.2200.t: "Wir müssen mehr Exemplare finden als [SCOPE.sCountry('rival_scope').GetName]" #deepl:2250308244
 academics.2200.d: "Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind unglücklich darüber, dass [SCOPE.sCountry('rival_scope').GetName] mehr [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] gesammelt hat als unsere Nation. Sie fordern uns auf, in 10 Jahren mehr #b Exemplare#! zu finden als [SCOPE.sCountry('rival_scope').GetName] insgesamt." #deepl:710347416
 academics.2200.f: "Unsere Exemplarsammlungen sind nichts im Vergleich zu denen auf [SCOPE.sCountry('rival_scope').GetName]. Sie haben alles, wonach wir uns sehnen! Ich habe sogar gehört, dass sie eine gigantische Blume haben, die nach verfaulten Leichen riecht. Unser ganzer Stolz ist ein orangefarbener Schmetterling. Wir müssen neue Exemplare finden, Exemplare, die niemand vor uns gefunden hat! Sonst könnten sie diesen Tierschlächtern in die Hände fallen!\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2133540061
 academics.2200_goal_tt: "Sie müssen in 10#! Jahren mehr [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sammeln als Ihr Konkurrent, [SCOPE.sCountry('rival_scope').GetName], #n . Sie haben [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], wir haben [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]." #deepl:266757848
 academics.2200_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Genehmigungen#! und Sie erhalten #p 10%#! mehr Prestige für 4 Jahre." #deepl:2294292191
 academics.2200.g: "Wir müssen unseren Naturalisten sofort losschicken!" #deepl:4228373912
 academics.2200.h: "Was für eine Zeitverschwendung!" #deepl:3896591158

 academics_no_competition_with_rival_specimen: "Verlorener Run auf das Exemplar" #deepl:3505958969
 academics_competition_with_rival_won_specimen: "Hat den Run auf das Exemplar gewonnen" #deepl:2471812758

 je_academics_rivalry_for_specimen: "Fokus auf Naturalismus: Der Run auf die Exemplare" #deepl:3869890766
 je_academics_rivalry_for_specimen_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mehr [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] finden als unsere Konkurrenten [SCOPE.sCountry('target').GetName]. \n\nUnsere #b Gesamtzahl der Exemplare#!: [ROOT.Var('dubois_specimen').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'s #b Gesamtzahl der Exemplare#!: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]" #deepl:2222854634
 je_academics_rivalry_for_specimen_success: "Sie ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) haben mehr [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] als [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])." #deepl:1288746223

 academics.2201.t: "Erstaunliche Probensammlung" #deepl:3299170673
 academics.2201.d_rival: "Wir haben eine größere Sammlung von [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] gesammelt als unser Rivale [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!" #deepl:2333126698
 academics.2201.d_rival_gone: "Unser Rivale in unserem Streben nach einer riesigen biologischen Sammlung ist verschwunden. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!" #deepl:2973823762
 academics.2201.f: "Endlich haben wir eine #b Mustersammlung#! die unserer großen Nation würdig ist. Es ist an der Zeit, dass wir die faszinierendsten Lebewesen auf diesem Planeten ausstellen können. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ist mit unserer Sammlung im Moment zufrieden. Natürlich müssen wir unsere Sammlung weiter ausbauen, um andere Nationen davon abzuhalten, diese armen Tiere und Pflanzen abzuschlachten.\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3434615480
 academics.2201.g: "Eine würdige Sammlung!" #deepl:3195714097

 academics.2202.t: "Es ist uns nicht gelungen, mehr Exemplare zu sammeln als [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]" #deepl:3388281713
 academics.2202.d: "Wir waren nicht in der Lage, unsere Probensammlung weiter auszubauen als unsere Konkurrenten von [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind völlig niedergeschlagen." #deepl:1678042108
 academics.2202.f: "Jetzt haben sie auch das faszinierendste Tier der Welt gefunden. Eine fliegende Eidechse. Sie haben sie nach dem Präsidenten der Akademie der Wissenschaften benannt. Sie haben versagt. \n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2496662918
 academics.2202.g: "Davon werde ich mich wissenschaftlich nie erholen!" #deepl:3702922876

 academics.2203.t: "Die [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] wollen [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren Zoo" #deepl:2810551749
 academics.2203.d: "Die [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] hat unsere Regierung ersucht, in 10 Jahren [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unsere [concept_dubois_zoo] zu erwerben." #deepl:3747920817
 academics.2203.f: "Unserem Zoo fehlt eine [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]. Wir brauchen unsere Regierung, um [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] zu finden und es in unseren Zoo zu bringen. Wir können nicht zulassen, dass unser Zoo dieses wunderbare Tier nicht mehr hat.\n\nUnterzeichnet, die Vertreter der [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]" #deepl:871931867
 academics.2203_goal_tt: "In 10 Jahren werden Sie eine [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unsere [concept_dubois_zoo] erwerben müssen." #deepl:2066113283
 academics.2203_reward_tt: "Als Belohnung erhält die [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] #p  5#! Zustimmung Ihrer Regierung und #p 5%#! mehr Anziehungskraft und Ihr Land erhält #p 5%#! mehr Prestige für 5 Jahre." #deepl:3957802921
 academics.2203.g: "Wir müssen sie alle fangen!" #deepl:1103260762
 academics.2203.h: "Ich führe eine große Nation. Ich habe nichts mit einem Zoo zu tun!" #deepl:3005626564

 je_academics_get_exotic_animal: "Fokus auf Naturalismus: Erwerben Sie [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren Zoo" #deepl:25317684
 je_academics_get_exotic_animal_reason: "Die [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] möchte, dass wir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unsere [concept_dubois_zoo] erwerben. \n Es gibt verschiedene Möglichkeiten, eine solche [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] zu erwerben." #deepl:1056052260

 academics.2204.t: "Ein neues Zuhause für [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]" #deepl:2579552720
 academics.2204.d: "Es ist uns gelungen, [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unsere [concept_dubois_zoo] zu gewinnen. Das wird die [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] sicher freuen." #deepl:2436895721
 academics.2204.f: "Ihre Regierung hat erfolgreich [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unser glorreiches Land erworben. Dies zeigt, dass unser Land mächtig genug ist, seine Ressourcen zur Belustigung unserer Bevölkerung einzusetzen. Danke!\n\nUnterzeichnet, die Vertreter der [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]" #deepl:1675947499
 academics.2204.g: "Ein wunderbares Tier!" #deepl:3217982460

 academics.2205.t: "Kein neues Tier in unserem Zoo" #deepl:3445399114
 academics.2205.d: "Es ist uns nicht gelungen, [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren Zoo zu gewinnen. Die [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] wird nicht amüsiert sein." #deepl:4002015731
 academics.2205.f: "Sie können nicht einmal ein Tier für unseren Zoo erwerben. Wie sollen wir Ihnen zutrauen, dieses Land zu führen?\n\nUnterzeichnet, die Vertreter der [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]" #deepl:2237098754
 academics.2205.g: "Wir haben keine Zeit für irgendwelche beliebigen Tiere!" #deepl:3542528377

 academics_exotic_animal_acquired_ig_modifier: "Exotische Tiere erworben" #deepl:1984245444
 academics_exotic_animal_not_acquired_ig_modifier: "Exotisches Tier nicht erworben" #deepl:3717916871
 academics_exotic_animal_acquired_country_modifier: "Exotische Tiere erworben" #deepl:1984245444

 academics.2206.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert einen Zoo" #deepl:3886173700
 academics.2206.d: "Die bisherigen wissenschaftlichen Erfolge im Bereich der Naturforschung sind als mager zu bezeichnen. Einige einflussreiche Vertreter der Wissenschaft haben sich deshalb mit einer Petition an die Regierung gewandt." #deepl:2044280668
 academics.2206.f: "Um die biologische Forschung im Allgemeinen und die zoologische Forschung im Besonderen zu stärken, ist ein Zoo mit einer Sammlung seltener Tiere unerlässlich. Eine solche Einrichtung würde auch das Wohlbefinden der Bevölkerung erheblich verbessern. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] schlägt daher vor, dass alle Mittel für die Einrichtung eines nationalen Zoos genutzt werden sollten und würde auch die Ausbildung eines tatkräftigen Zoologen unterstützen.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:1501027510
 academics.2206.g: "Ein paar Tiere sind sicherlich zu finden." #deepl:4035859412
 academics.2206.h: "Haben diese Leute niemanden sonst, den sie ärgern können?" #deepl:2633467100
 academics.2207.t: "Der neue Zoo" #deepl:2153190306
 academics.2207.d: "Einige Vertreter der Wissenschaftlichen Gesellschaft nahmen persönlich an der Einweihung des neuen Zoos teil." #deepl:3111285263
 academics.2207.f: "Ausgezeichnet, wirklich ausgezeichnet der neue Zoo. Die Mitglieder hatten einen wunderbaren Tag und freuen sich besonders über das kostenlose Tierfutter. Wir hoffen, dass dies nur ein Anfang ist und dass der soeben eröffnete Zoo bald erweitert und mit noch mehr wertvollen, exotischen und wunderbaren Kreaturen gefüllt wird.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2936530328
 academics.2207.g: "Lass mir ein paar Erdnüsse übrig!" #deepl:2639901700
 academics.2208.t: "Kein Zoo" #deepl:921152523
 academics.2208.d: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat sich heute in einem bitteren Brief darüber beschwert, dass der Wunsch nach einem neuen Zoo nicht erfüllt wurde." #deepl:3938358584
 academics.2208.f: "Zu unserem großen Bedauern haben wir festgestellt, dass die derzeitige Regierung aus ausgesprochenen Feinden der Wissenschaft, der Biologie im Allgemeinen und der Zoologie im Besonderen zu bestehen scheint, oder zumindest aus einem Haufen menschenverachtender Tierhasser. Vielleicht würden in einem solchen Umfeld die prächtigen Tiere umsonst vergeudet werden.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3836099635
 academics.2208.g: "Wenn Sie stur sind, werden Sie sicher keine Wünsche erfüllt bekommen." #deepl:2273156032

 academics.2206_goal_tt: "Sie müssen #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] sammeln und eine [concept_dubois_zoo] in #n 5#! Jahren bauen. " #deepl:619751087
 academics.2206_reward_tt: "Als Belohnung erhält unser Naturforscher #p 50 Erfahrungspunkte#! Wenn wir noch keinen Naturforscher haben, werden wir einen bekommen." #deepl:1838991140

 academics.2209.t: "Zoo-Erweiterung" #deepl:2208162233
 academics.2209.d: "Ein offener Brief von [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] beklagt, dass der National Zoo wenig Abwechslung bietet." #deepl:1403952681
 academics.2209.f: "Obwohl unsere Hauptstadt heute über eine Zooanlage verfügt, die sowohl für Wissenschaftler zur Erforschung von Tieren als auch für das zahlende Publikum eine gewisse Abwechslung bietet, hat diese Einrichtung kaum den Standard erreicht, der der Größe der Stadt und unserer nationalen Bedeutung angemessen ist. Um das Prestige zu steigern, die Bevölkerung zu unterhalten und die Wissenschaft voranzubringen, empfehlen wir daher, den derzeitigen Zoo zumindest zu einem mittelgroßen Zoo auszubauen.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2636048430
 academics.2209.g: "Bringt mehr Tiere herein!" #deepl:2862704805
 academics.2209.h: "Wir haben Besseres zu tun." #deepl:62857443
 academics.2210.t: "Ein noch größerer Zoo" #deepl:1371378515
 academics.2210.d: "Ein offener Brief von [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] beklagt, dass der National Zoo wenig Abwechslung bietet." #deepl:1403952681
 academics.2210.f: "Obwohl wir unseren Zoo in der Vergangenheit zu einer respektablen Größe haben anwachsen lassen, genießt er noch nicht die internationale Bedeutung, die er haben könnte und sollte, um andere Nationen mit unserer zoologischen Leidenschaft zu beeindrucken. Wir brauchen mehr und mehr exotische Tiere. Hier geht es nicht nur um die Wissenschaft, sondern auch um unser Ansehen. Wir raten dringend dazu, unseren Zoo zu einem Großzoo auszubauen.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2934315446
 academics.2211.t: "Ein blühender Zoologischer Garten" #deepl:839860843
 academics.2211.d: "Der vergrößerte Zoologische Garten ist eine der Hauptattraktionen der Hauptstadt und erfreut sich bei Gelehrten und Bürgern gleichermaßen großer Beliebtheit. Die Wissenschaftliche Gesellschaft freut sich, dass ihr Wunsch in Erfüllung gegangen ist." #deepl:3014523195
 academics.2211.f: "Gut gemacht! Der neue Zoo ist geräumiger und erfüllt den Anspruch, ein breiteres Spektrum der weltweiten Tierwelt abzubilden. Ich hoffe, Sie haben auch an ein Schnabeltier gedacht? Wir würden gerne eine Patenschaft für es übernehmen. Heißt es zufällig Perry?\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3322598271
 academics.2211.g: "Die Tiere der Welt in unserem Haus!" #deepl:367243730
 academics.2212.t: "Zoologische Enttäuschung" #deepl:518057859
 academics.2212.d: "Die Wissenschaftliche Gesellschaft fragt sich, ob es sich noch lohnt, sich an die Regierung zu wenden, wenn ihre Anliegen so mit Füßen getreten werden wie bei der winzigen Anfrage nach ein paar Zootieren." #deepl:2491606980
 academics.2212.f: "Wir sind sehr, sehr enttäuscht.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:1990655002
 academics.2212.g: "Sie sollten forschen, anstatt sich im Zoo zu vergnügen." #deepl:3802049129

 academics.2209_goal_tt: "Sie müssen Ihren [concept_dubois_zoo] in #n 10#! Jahren auf #p Größe 3#! (mittelgroßer Zoo) vergrößern." #deepl:2952943057
 academics.2210_goal_tt: "Sie müssen Ihre [concept_dubois_zoo] auf #p Größe 4#! (großer Zoo) in #n 10#! Jahren vergrößern." #deepl:96759713
 academics.2209_reward_tt: "Als Belohnung erhält unser Naturforscher #p 50 Erfahrungspunkte#! Wenn wir noch keinen Naturforscher haben, werden wir einen bekommen." #deepl:1838991140

 je_academics_found_zoo: "Fokus auf Naturalismus: Gründung eines Zoos" #deepl:3929050651
 je_academics_found_zoo_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir einen [concept_dubois_zoo] bauen, um das Wissen, aber auch den Lebensstandard unserer Intellektuellen zu verbessern. Für den Bau eines Zoos werden #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] benötigt, die von einem [concept_dubois_naturalist] auf einer lokalen zoologischen Expedition oder einer Heia-Safari gefangen werden können. Es können auch Tiere aus anderen Ländern gekauft werden." #deepl:3640621696
 je_academics_medium_zoo: "Fokus auf Naturalismus: Den Zoo vergrößern" #deepl:3093292404
 je_academics_medium_zoo_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat eine Verlängerung des [concept_dubois_zoo] beantragt. Wir haben insgesamt zehn Jahre Zeit, um unseren Zoo zu einem #p mittelgroßen Zoo#! auszubauen. Dazu werden mehr [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] benötigt, die von [concept_dubois_naturalist] auf einer lokalen zoologischen Expedition oder einer Heia-Safari gefangen werden können. Es können auch Tiere aus anderen Ländern gekauft werden." #deepl:193210036
 je_academics_large_zoo: "Fokus auf Naturalismus: Den Zoo vergrößern" #deepl:3093292404
 je_academics_large_zoo_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat eine Verlängerung des [concept_dubois_zoo] beantragt. Wir haben insgesamt zehn Jahre Zeit, um unseren Zoo zu einem #p großen Zoo#! auszubauen. Dafür werden mehr [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] benötigt, die von [concept_dubois_naturalist] auf einer lokalen zoologischen Expedition oder einer Heia-Safari gefangen werden können. Es können auch Tiere aus anderen Ländern gekauft werden." #deepl:1998832180

 academics.2300.t: "Wir müssen mehr Fossilien finden als [SCOPE.sCountry('rival_scope').GetName]" #deepl:2614642039
 academics.2300.d: "Wir haben nicht genug [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] für eine größere Sammlung als [SCOPE.sCountry('rival_scope').GetName]. Deshalb wollen die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], dass wir insgesamt mehr #b Fossilien#! finden als [SCOPE.sCountry('rival_scope').GetName]. Sie würden es sicher sehr schätzen, wenn wir diesen Konkurrenten schlagen könnten." #deepl:3578239322
 academics.2300.f: "Während unsere Konkurrenten auf [SCOPE.sCountry('rival_scope').GetName] über eine Vielzahl von Fossilien aus verschiedenen Zeitaltern und an verschiedenen Orten der Welt verfügen, ist unsere Sammlung sowohl zeitlich als auch geografisch sehr begrenzt. Das ist eine große Schande und unangemessen für eine so große Nation wie die unsere.\n Wir müssen unsere Fossiliensammlung sofort erweitern!\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:1448043828
 academics.2300_goal_tt: "Sie müssen in 10#! Jahren mehr [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] sammeln als Ihr Konkurrent, [SCOPE.sCountry('rival_scope').GetName], #n . Sie haben [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], wir haben [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]." #deepl:694035025
 academics.2300_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Genehmigungen#! und Sie erhalten #p 10%#! mehr Prestige für 4 Jahre." #deepl:2294292191
 academics.2300.g: "Ah, eine Fossilienfehde!" #deepl:1930031106
 academics.2300.h: "Wir brauchen keine staubigen Felsen..." #deepl:1082859492

