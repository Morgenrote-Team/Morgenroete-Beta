 je_academics_found_archaeological_museum: "Fokus auf Archäologie: Ein Museum gründen" #deepl:1531872983
 je_academics_found_archaeological_museum_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir ein Archäologisches Museum bauen, um das Wissen, aber auch den Lebensstandard unserer Intellektuellen zu verbessern. Für den Bau eines Museums werden #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] benötigt, die von einem [concept_lepsius_archaeologist] auf einem [concept_lepsius_expedition] gefunden werden müssen, sollten wir nicht das unverschämte Glück haben, sie durch ein zufälliges Geschenk oder eine lokale Ausgrabung zu erwerben.\n Es ist auch sehr wichtig, weil der professionelle archäologische Spruch "Das gehört in ein Museum!" #deepl:3438099402
 
