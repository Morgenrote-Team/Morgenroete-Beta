 academics.117.f: ""
 academics.117.g: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] braucht jetzt einen Fedora!"
 academics.118.t: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] ist jetzt ein erfahrener Anthropologe"
