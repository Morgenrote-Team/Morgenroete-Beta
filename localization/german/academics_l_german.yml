 academics.2004.f: "Sehr geehrter Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]\n\n Wir hoffen sehr, dass Sie in der Lage sein werden, eine neue Sternkarte mit vielen neuen Sternen zu erstellen. Nach Ihren exzellenten Fähigkeiten zu urteilen, sollte dies überhaupt kein Problem sein. Daher erwarten wir eine hervorragende neue Sternkarte innerhalb von 10 Jahren.\n\nUnterzeichnet, Ihre Kollegen vom [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:1402818594

 academics.1.d: "Nachdem er jahrzehntelang [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] Brücken, Maschinen und Gebäude entworfen und gebaut hat, geht [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] nun in den Ruhestand. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht mehr als unser [concept_gaudi_engineer] tätig sein." #deepl:837692125
 academics.1.g: "[SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] verdienter [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] Ruhestand!" #deepl:3353179357
 academics.2.d: "Nachdem er Jahrzehnte seines [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] Lebens mit der Entdeckung neuer Sterne, Nebel und anderer astronomischer Phänomene verbracht hat, hat [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] beschlossen, in den Ruhestand zu gehen. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht mehr als unser [concept_verrier_astronomer] arbeiten." #deepl:1849612416
