 ###################ARCHAEOLOGICAL MISSIONS##################

 academics.2101.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert ein Museum" #deepl:841442400
 academics.2101.d: "Als eine der mächtigsten Nationen der Welt haben wir bisher kein archäologisches Prestige gehabt. Deshalb fordert uns die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] auf, ein Archäologisches Museum zu bauen." #deepl:4072613025
 academics.2101.f: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bittet Sie, Ihr Engagement für die Archäologie zu verstärken. Die Erforschung der Vergangenheit, die Entdeckung vergessener Kulturen und die Bergung wertvoller Artefakte ist sowohl für die Wissenschaft als auch für das nationale Prestige von größter Bedeutung.\n Deshalb bitten wir Sie, ein Archäologisches Museum zu gründen, um das Wissen und die hervorragenden Kunstwerke vergangener Kulturen zu vermehren, zu vermitteln und zu bewahren.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2153630681
 academics.2101.g: "Wir werden auf Schatzsuche gehen!" #deepl:661947687
 academics.2101.h: "Kein Bedarf für ein verstaubtes Museum." #deepl:2368743182
 academics.2101_goal_tt: "Sie müssen #p 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] sammeln und in #n 10#! Jahren ein archäologisches Museum bauen." #deepl:2753162087
 academics.2102.t: "Einweihung des Archäologischen Museums" #deepl:110335931
 academics.2102.d: "Die Vertreter der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] zeigten sich bei der heutigen Eröffnung des Archäologischen Museums sehr zufrieden." #deepl:143315252
 academics.2102.f: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] freut sich, dass das neue Museum der Öffentlichkeit zugänglich gemacht wurde und zahlreiche Bürgerinnen und Bürger nun die gefundenen Artefakte bewundern können. Sie sind auch von großem wissenschaftlichen Wert. Da dies jedoch nur ein Anfang sein kann, haben wir bereits mit dem Museumsdirektor vereinbart, dass er die künftige Beschaffung von Artefakten anmahnen soll. Er ist - natürlich - auch Mitglied unserer Gesellschaft.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3177394596
 academics.2102.g: "Jetzt brauchen wir noch etwas, das dort hinein gehört..." #deepl:3883036158
 academics.2103.t: "Eine archäologische Schande" #deepl:1391652606
 academics.2103.d: "Zur großen Bestürzung der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wurde heute festgestellt, dass trotz des Versprechens, die Archäologie des Landes zu fördern, keinerlei Anstrengungen in dieser Richtung unternommen wurden." #deepl:653209833
 academics.2103.f: "Wir, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], sind zutiefst enttäuscht über die Ignoranz der Regierung. Ist ein kleines Museum wirklich zu viel verlangt?\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:563098009
 academics.2103.g: "Wer braucht schon dieses verstaubte Museum?" #deepl:1184256665

 academics.2104.t: "Museumsdirektor schlägt eine ägyptische Ausstellung vor" #deepl:3959031514
 academics.2105.t: "Museumsdirektor schlägt eine mesopotamische Ausstellung vor" #deepl:4047049598
 academics.2106.t: "Museumsdirektor schlägt eine Ägäis-Ausstellung vor" #deepl:928824034
 academics.2107.t: "Museumsdirektor schlägt eine präkolumbianische Ausstellung vor" #deepl:3391517726
 academics.2104.d: "Der Direktor des Archäologischen Museums hat davor gewarnt, dass unser Museum im internationalen Vergleich zurückfallen könnte, wenn wir nicht dringend fehlende Artefakte in einer Ausstellung zusammenführen." #deepl:1088716292
 academics.2104.f: "Als stolzes Mitglied der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bedaure ich die Vernachlässigung unseres schönen Museums. Die ganze Welt sammelt ägyptische Artefakte, und kürzlich habe ich aus dem Ausland von der katzenartigen Bastet-Statue gehört. Der absolute letzte Schrei, sage ich Ihnen! Sie soll auch rosa sein, habe ich gehört. Und wir haben nicht einmal genug Skarabäen, um eine richtige Ausstellung zu organisieren. Wenn wir nicht bald wenigstens genug Artefakte für eine mittelgroße Ausstellung sammeln, bin ich pessimistisch, was die Zukunft der Archäologie in unserem Land angeht.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums" #deepl:3542787193
 academics.2105.f: "Als begeistertes Mitglied der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bedaure ich die Vernachlässigung unseres angesehenen Museums. Mesopotamische Artefakte sind heutzutage der letzte Schrei, und die großen Nationen können einfach nicht genug davon bekommen. Natürlich bin ich der Meinung, dass nicht die Größe eines Lamassu seinen Wert bestimmt, sondern das, was man mit ihm macht. Wir haben aber nicht einmal genug Keilschrifttafeln, um eine richtige Ausstellung zu organisieren. Wenn wir nicht bald wenigstens genug Artefakte für eine mittelgroße Ausstellung sammeln, bin ich pessimistisch, was die Zukunft der Archäologie in unserem Land angeht.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums" #deepl:3181095347
 academics.2106.f: "Als wichtiges Mitglied der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bedaure ich die Vernachlässigung unseres stolzen Museums. Ägäische Artefakte gehen weg wie warme Semmeln, das ist die Erfahrung der letzten Jahre. Die homerischen Epen sind seit der Wiederentdeckung Trojas zur Populärkultur geworden, und jeder Neureiche hat jetzt eine antike Statue in seinem Garten. Und wir? Wir haben nicht einmal ein paar abscheuliche mykenische Grabbeigaben vorzuweisen! Wenn wir nicht bald wenigstens genug Artefakte für eine mittelgroße Ausstellung sammeln, bin ich pessimistisch, was die Zukunft der Archäologie in unserem Land angeht.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums" #deepl:2200809473
 academics.2107.f: "Als schönes Mitglied der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bedaure ich die Vernachlässigung unseres wichtigen Museums. Der Mayaismus kennt keine Grenzen mehr. Esoterische Mitglieder unserer Gesellschaft geben viel Geld aus, um die exotischsten Stücke aus Mittel- und Südamerika zu erwerben. Der Grabraub und die Zerstörung wertvoller historischer Güter ist in vollem Gange. Ich habe gehört, dass ein Expeditionsleiter sogar die Pyramiden von Tikal versetzen wollte! Wir hingegen haben nicht einmal ein paar okkulte Steinmasken, um Kinder im Museum zu erschrecken. Wenn wir nicht bald wenigstens genug Artefakte für eine mittelgroße Ausstellung sammeln, bin ich pessimistisch, was die Zukunft der Archäologie in unserem Land angeht." #deepl:2121156309
 academics.2104.g: "Glück und Ruhm!" #deepl:1959350999
 academics.2104.h: "Wir haben Besseres zu tun als auf Schatzsuche zu gehen." #deepl:2331567219
 academics.2108.t: "Eine neue archäologische Sammlung" #deepl:2818358559
 academics.2108.d: "Der Museumsdirektor hat seine Freude darüber geäußert, dass seine Bedenken bezüglich der neuen Artefakte erhört wurden, und hat seine Freunde auf der Website [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] darüber informiert, dass das Museum bald eine neue Ausstellung zeigen wird." #deepl:1200769421
 academics.2108.f: "Die Firma dankt der Regierung dafür, dass sie dazu beigetragen hat, das wissenschaftliche Ansehen des Landes zu verbessern. Die zahlreichen neuen Artefakte sind ein Ausdruck der Kunstfertigkeit und des unermüdlichen Forschungsdrangs der besten Männer und Frauen dieses Landes.\n\nUnterzeichnet haben die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:576887497
 academics.2108.g: "Erfolgreich!" #deepl:2291373343
 academics.2109.t: "Archäologische Enttäuschung" #deepl:2551151427
 academics.2109.d: "Verblüfft, bestürzt und schockiert über die Ablehnung seiner dringenden Anliegen hat sich der Museumsdirektor weinend und verschlossen in sein Büro zurückgezogen und weigert sich, mit jemandem zu sprechen." #deepl:1176592292
 academics.2109.f: "Gut gemacht, gut gemacht. Das letzte Mal, als der Museumsdirektor in diesem Zustand war, hat er sich fast aus dem Fenster gestürzt. Es ist wirklich gefühllos, wie sich einige Regierungsbeamte verhalten. Er wollte nur ein paar Artefakte. Ein paar schäbige kleine Artefakte. Er hat nichts auf der Welt außer ein paar verstaubten Statuetten und zerbrochenen Vasen! Ich hoffe, du bist jetzt glücklich. Der arme Mann ist am Boden zerstört.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"" #deepl:1465977614
 academics.2109.g: "Scheitern ..." #deepl:152311253
