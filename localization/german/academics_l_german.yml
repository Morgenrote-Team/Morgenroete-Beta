 academics.2110.t: "Museumsdirektor will ein bedeutendes Artefakt"
 academics.2110.d: "Der Direktor des Archäologischen Museums hat heute im Namen der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] einen offenen Brief an die Regierung geschrieben."
 academics.2110.f: "Mit großem Bedauern muss ich feststellen, dass es unserem Museum trotz des reichen Fundus an Artefakten immer noch an einer großen Attraktion fehlt, die man als Prunkstück der Sammlung bezeichnen könnte. Leider hat es die Regierung bisher versäumt, bei den Objekten nicht auf Quantität, sondern auf Qualität als archäologischen Standard zu setzen. Ich rate daher dringend, diesen Missstand in den nächsten Jahren zu beheben, sonst wird unsere Nation bestenfalls als Erbsenzähler in der wissenschaftlichen Welt eingestuft.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums"
 academics.2110.g: "Ein prestigeträchtiges Unterfangen."
 academics.2110.h: "Das ist die Mühe nicht wert."
 academics.2110_goal_tt: "Sie werden #p 1#! [concept_lepsius_major_artifact] in #n 15#! Jahren sammeln müssen."
 academics.2111.t: "Die Pracht des Museums"
 academics.2111.d: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat in ihrem heutigen Schreiben ihre Dankbarkeit zum Ausdruck gebracht."
 academics.2111.f: "Ich gratuliere zu der Entscheidung, die Archäologie zur nationalen Priorität des Landes zu machen. Das kürzlich erworbene, außergewöhnliche Exemplar wird in den nächsten Wochen in einer Sonderausstellung zu sehen sein. Die Welt beneidet uns!\n\nUnterzeichnet, Der Direktor des Archäologischen Museums"
 academics.2111.g: "Wunderbar."
 academics.2112.t: "Ein staubiger Ort"
 academics.2112.d: "Der Direktor des Archäologischen Museums hat heute in einem offenen Brief im Namen der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sein Bedauern darüber zum Ausdruck gebracht, dass die Archäologie in unserem Land kein Gehör findet."
 academics.2112.f: "Nie wurde so viel von so wenigen in so kurzer Zeit ruiniert.\n\nUnterzeichnet, Der Direktor des Archäologischen Museums"
 academics.2112.g: "Und?"
 je_academics_major_artifact: "Fokus auf Archäologie: Bedeutendes Artefakt"
 je_academics_major_artifact_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mindestens #p 1#! [concept_lepsius_major_artifact] finden. Bedeutende Artefakte können durch große Entdeckungen, durch permanente Ausgrabungen oder in zufälligen Ereignisketten während Expeditionen gewonnen werden."
 je_academics_major_artifact_success: "Hat #p 1#! [concept_lepsius_major_artifact]."
 academics.2113.t: "Museumsdirektor fordert archäologische Exzellenz"
 academics.2113.d: "Der Direktor des Archäologischen Museums hat darauf hingewiesen, dass nur noch wenig fehlt, um die Ausstellung nahezu perfekt zu machen."
 academics.2113.f: "Ich bin ein bescheidener Mann. Wie Sie wissen, sind meine Forderungen nicht besonders extravagant. Ich habe diese Regierung nie um einen ausgefallenen Gefallen gebeten. Ich habe mich immer zurückgehalten, wie es sich für den Kurator einer so großartigen Einrichtung gehört. Außerdem: Ein letztes kleines Sahnehäubchen fehlt noch, um unsere schöne Sammlung zur Weltklasse zu erheben. Alles, was es braucht, ist eine hervorragende Ausstellung. Nicht mehr. 100 Artefakte aus einer Region und ein bedeutendes Artefakt zu bekommen, wird hoffentlich nicht schwierig sein oder?\n\nUnterzeichnet, Der Direktor des Archäologischen Museums"
 academics.2113.g: "Eine willkommene Herausforderung."
 academics.2113.h: "Das ist zu riskant."
 academics.2112_goal_tt: "Sie müssen eine exzellente Ausstellung in #n 20#! Jahren organisieren."
 academics.2114.t: "Archäologie auf ihrem Höhepunkt"
 academics.2114.d: "Heute erreichte uns ein aufgeweichtes, kaum lesbares Schreiben des Archäologischen Museums."
 academics.2114.f: "Nur der Absender konnte noch entziffert werden. Die Unterschrift gehörte eindeutig dem Museumsdirektor. Der Sekretär vermutet Tränen der Freude, als er den Brief schreibt."
 academics.2114.g: "Er ist glücklich und wir sind es auch."
 academics.2115.t: "Rückschlag für die Archaoelogie"
 academics.2115.d: "Heute erreichte uns ein aufgeweichtes, kaum lesbares Schreiben des Archäologischen Museums."
 academics.2115.f: "Nur der Absender konnte noch entziffert werden. Die Unterschrift gehörte eindeutig dem Museumsdirektor. Die Sekretärin vermutet, dass ihm beim Schreiben Tränen in die Augen gestiegen sind. Unser Misserfolg bei der letzten archäologischen Mission muss ihn in eine tiefe Depression gestürzt haben."
 academics.2115.g: "Er ist traurig und wir sind es auch."
 je_academics_excellent_collection: "Fokus auf Archäologie: Ausgezeichnete Sammlung"
 je_academics_excellent_collection_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir eine hervorragende Ausstellung erstellen. Wir brauchen dazu #G 100#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] und #p 1#! [concept_lepsius_major_artifact] aus einer archäologischen Region."
 academics.2116.t: "Wir müssen mehr Artefakte finden als [SCOPE.sCountry('rival_scope').GetAltName('NOM')]"
 academics.2116.d: "Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind unglücklich darüber, dass [SCOPE.sCountry('rival_scope').GetAltName('NOM')] mehr [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] gesammelt hat als unsere Nation. Sie fordern uns auf, in 10 Jahren mehr #b Artefakte#! insgesamt zu finden als [SCOPE.sCountry('rival_scope').GetName]."
 academics.2116.f: "Es ist eine Schande, dass eine so unbedeutende Nation wie [SCOPE.sCountry('rival_scope').GetAltName('NOM')] eine größere Sammlung von Artefakten besitzt als wir. Wir müssen diese Grabräuber überholen, die nur nach Schätzen graben und nicht einmal echte Archäologie betreiben! Wie viel Wissen ist durch diese Barbaren verloren gegangen?\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2116_goal_tt: "Sie müssen in #n 10#! Jahren mehr [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] sammeln als Ihr Konkurrent, [SCOPE.sCountry('rival_scope').GetAltName('NOM')]. Sie haben [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+], wir haben [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]."
 academics.2116_reward_tt: "Als Belohnung erhält die Intelligenzia #p 5 Zustimmung#! und Sie erhalten #p 10%#! mehr Prestige für 4 Jahre."
 academics.2116.g: "Ich bin ein Archäologe und ich grabe ein Loch!"
 academics.2116.h: "Archäologie ist keine Schnitzeljagd!"
 academics_no_competition_with_rival_total_artifacts: "Schatzjagd verloren"
 academics_competition_with_rival_won_total_artifacts: "Schatzjagd gewonnen "
 je_academics_rivalry_for_artifacts: "Fokus auf Archäologie: Die Schatzjagd"
 je_academics_rivalry_for_artifacts_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] will, dass wir mehr [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] finden als unser Konkurrent [SCOPE.sCountry('target').GetAltName('NOM')].\n\nUnsere #b Artefakte insgesamt#!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+]\n #b Artefakte [SCOPE.sCountry('target').GetAltName('VON')] insgesamt#!: [ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]"
 je_academics_rivalry_for_artifacts_success: "Sie ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]) haben mehr [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] als [SCOPE.sCountry('target').GetAltName('NOM')] ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+])."
 academics.2117.t: "Wundersame Artefaktsammlung"
 academics.2117.d_rival: "Wir haben eine größere Sammlung von Artefakten zusammengetragen als unser Rivale [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetAltName('NOM')]. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!"
 academics.2117.d_rival_gone: "Unser archäologischer Rivale ist erledigt. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!"
 academics.2117.f: "Es sollte offensichtlich sein, dass unsere Nation eine bessere archäologische Sammlung haben muss als diese Barbaren. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ist mit dieser Sammlung zufrieden. Obwohl es noch mehr Artefakte gibt, die vor diesen Wilden gerettet werden müssen.\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2117.g: "So viele gerettete Artefakte!"
 academics.2118.t: "Es ist uns nicht gelungen, unsere archäologische Sammlung zu erweitern."
 academics.2118.d: "Wir waren nicht in der Lage, unsere archäologische Sammlung weiter auszubauen als unsere Konkurrenten [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetAltName('IN')]. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind zutiefst enttäuscht."
 academics.2118.f: "Die schmutzigen Hände dieser Wilden beschmutzen die gesamte Geschichte der Menschheit. Wie konntest du zulassen, dass all diese Artefakte von diesen Grabräubern geplündert werden. So viel Wissen wird verloren gegangen sein, weil sie lieber Schätze wollen, als unsere Geschichte zu bewahren. Abscheulich!\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "Wir brauchen diese verstaubten Artefakte nicht."
 academics.2200.t: "Wir müssen mehr Exemplare finden als [SCOPE.sCountry('rival_scope').GetAltName('NOM')]"
 academics.2200.d: "Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind unglücklich darüber, dass [SCOPE.sCountry('rival_scope').GetAltName('NOM')] mehr [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] gesammelt hat als unsere Nation. Sie fordern uns auf, in 10 Jahren mehr #b Exemplare#! zu finden als [SCOPE.sCountry('rival_scope').GetName] insgesamt."
 academics.2200.f: "Unsere Exemplarsammlungen sind nichts im Vergleich zu denen [SCOPE.sCountry('rival_scope').GetAltName('IN')]. Sie haben alles, wonach wir uns sehnen! Ich habe gehört, dass sie sogar eine riesige Blume haben, die nach faulenden Leichnamen riecht. Unser ganzer Stolz ist ein orangefarbener Schmetterling. Wir müssen neue Exemplare finden, Exemplare, die vor uns noch niemand gefunden hat! Sonst könnten sie diesen Tierschlächtern in die Hände fallen!\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2200_goal_tt: "Sie müssen in #n 10#! Jahren mehr [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sammeln als Ihr Konkurrent, [SCOPE.sCountry('rival_scope').GetAltName('NOM')]. Sie haben [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], wir haben [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]."
 academics.2200_reward_tt: "Als Belohnung erhält die Intelligenzia #p 5 Zustimmung#! und Sie erhalten #p 10%#! mehr Prestige für 4 Jahre."
 academics.2200.g: "Wir müssen unseren Naturforscher sofort losschicken!"
 academics.2200.h: "Was für eine Zeitverschwendung!"
 academics_no_competition_with_rival_specimen: "Wettlauf um Exemplare verloren"
 academics_competition_with_rival_won_specimen: "Wettlauf um Exemplare gewonnen"
 je_academics_rivalry_for_specimen: "Fokus auf Naturalismus: Der Wettlauf um Exemplare"
 je_academics_rivalry_for_specimen_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mehr [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] finden als unser Konkurrent [SCOPE.sCountry('target').GetAltName('NOM')].\n\nUnsere #b Gesamtzahl der Exemplare#!: [ROOT.Var('dubois_specimen').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'s #b Gesamtzahl der Exemplare#!: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]"
 je_academics_rivalry_for_specimen_success: "Sie ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) haben mehr [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] als [SCOPE.sCountry('target')GetAltName('NOM')] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])."
 academics.2201.t: "Erstaunliche Belegsammlung"
 academics.2201.d_rival: "Wir haben eine größere Sammlung von [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] gesammelt als unser Rivale [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetAltName('NOM')]. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!"
 academics.2201.d_rival_gone: "Unser Rivale in unserem Streben nach einer riesigen biologischen Sammlung ist erledigt. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!"
 academics.2201.f: "Endlich haben wir eine #b Belegsammlung#! die unserer großen Nation würdig ist. Es ist an der Zeit, dass wir die faszinierendsten Lebewesen auf diesem Planeten ausstellen können. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ist mit unserer Sammlung im Moment zufrieden. Natürlich müssen wir unsere Sammlung weiter ausbauen, um andere Nationen davon abzuhalten, diese armen Tiere und Pflanzen abzuschlachten.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2201.g: "Eine würdige Sammlung!"
 academics.2202.t: "Es ist uns nicht gelungen, mehr Exemplare zu sammeln als [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetAltName('NOM')]"
 academics.2202.d: "Wir waren nicht in der Lage, unsere Belegsammlung weiter auszubauen als unsere Konkurrenten aus [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetAltName('DAT')]. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind völlig niedergeschlagen."
 academics.2202.f: "Jetzt haben sie auch das faszinierendste Tier der Welt gefunden. Eine fliegende Eidechse. Sie haben sie nach dem Präsidenten der Akademie der Wissenschaften benannt. Sie haben versagt.\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "Davon werde ich mich wissenschaftlich nie erholen!"
 academics.2203.t: "Die IG \"[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]\" will [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren Zoo"
 academics.2203.d: "Die IG \"[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]\" hat unsere Regierung ersucht, in 10 Jahren [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren [concept_dubois_zoo] zu erwerben."
 academics.2203.f: "Unserem Zoo fehlt ein [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]. Wir brauchen unsere Regierung, um [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] zu finden und es in unseren Zoo zu bringen. Wir können nicht zulassen, dass unser Zoo dieses wunderbare Tier nicht hat.\n\nUnterzeichnet, die Vertreter der [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2203_goal_tt: "In 10 Jahren werden Sie [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren [concept_dubois_zoo] erwerben müssen."
 academics.2203_reward_tt: "Als Belohnung erhält die IG \"[GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]\" #p 5#! Zustimmung und #p 5%#! mehr Anziehungskraft und Ihr Land erhält #p 5%#! mehr Prestige für 5 Jahre."
 academics.2203.g: "Wir müssen sie alle fangen!"
 academics.2203.h: "Ich führe eine große Nation. Ich habe nichts mit einem Zoo zu tun!"
 je_academics_get_exotic_animal: "Fokus auf Naturalismus: Erwerben Sie [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren Zoo"
 je_academics_get_exotic_animal_reason: "Die IG \"[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]\" möchte, dass wir [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren [concept_dubois_zoo] erwerben.\nEs gibt verschiedene Möglichkeiten, ein solche [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] zu erwerben."
 academics.2204.t: "Ein neues Zuhause für [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2204.d: "Es ist uns gelungen, [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren [concept_dubois_zoo] zu gewinnen. Das wird die IG \"[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]\" sicher freuen."
 academics.2204.f: "Ihre Regierung hat erfolgreich [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unser glorreiches Land erworben. Dies zeigt, dass unser Land mächtig genug ist, seine Ressourcen zur Belustigung unserer Bevölkerung einzusetzen. Danke!\n\nUnterzeichnet, die Vertreter der [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2204.g: "Ein wunderbares Tier!"
 academics.2205.t: "Kein neues Tier in unserem Zoo"
 academics.2205.d: "Es ist uns nicht gelungen, [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] für unseren Zoo zu gewinnen. Die IG \"[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]\" wird nicht amüsiert sein."
 academics.2205.f: "Sie können nicht einmal ein Tier für unseren Zoo erwerben. Wie sollen wir Ihnen zutrauen, dieses Land zu führen?\n\nUnterzeichnet, die Vertreter der [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2205.g: "Wir haben keine Zeit für irgendwelche beliebigen Tiere!"
 academics_exotic_animal_acquired_ig_modifier: "Exotisches Tier erworben"
 academics_exotic_animal_not_acquired_ig_modifier: "Exotisches Tier nicht erworben"
 academics_exotic_animal_acquired_country_modifier: "Exotisches Tier erworben"
 academics.2206.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert einen Zoo"
 academics.2206.d: "Die bisherigen wissenschaftlichen Erfolge im Bereich der Naturforschung sind als mager zu bezeichnen. Einige einflussreiche Vertreter der Wissenschaft haben sich deshalb mit einer Petition an die Regierung gewandt."
 academics.2206.f: "Um die biologische Forschung im Allgemeinen und die zoologische Forschung im Besonderen zu stärken, ist ein Zoo mit einer Sammlung seltener Tiere unerlässlich. Eine solche Einrichtung würde auch das Wohlbefinden der Bevölkerung erheblich verbessern. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] schlägt daher vor, dass alle Mittel für die Einrichtung eines nationalen Zoos genutzt werden sollten und würde auch die Ausbildung eines tatkräftigen Zoologen unterstützen.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2206.g: "Ein paar Tiere sind sicherlich zu finden."
 academics.2206.h: "Haben diese Leute niemanden sonst, den sie ärgern können?"
 academics.2207.t: "Der neue Zoo"
 academics.2207.d: "Einige Vertreter der Wissenschaftlichen Gesellschaft nahmen persönlich an der Einweihung des neuen Zoos teil."
 academics.2207.f: "Ausgezeichnet, wirklich ausgezeichnet der neue Zoo. Die Mitglieder hatten einen wunderbaren Tag und freuen sich besonders über das kostenlose Tierfutter. Wir hoffen, dass dies nur ein Anfang ist und dass der soeben eröffnete Zoo bald erweitert und mit noch mehr wertvollen, exotischen und wunderbaren Kreaturen gefüllt wird.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2207.g: "Lass mir ein paar Erdnüsse übrig!"
 academics.2208.t: "Kein Zoo"
 academics.2208.d: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat sich heute in einem bitteren Brief darüber beschwert, dass der Wunsch nach einem neuen Zoo nicht erfüllt wurde."
 academics.2208.f: "Zu unserem großen Bedauern haben wir festgestellt, dass die derzeitige Regierung aus ausgesprochenen Feinden der Wissenschaft, der Biologie im Allgemeinen und der Zoologie im Besonderen zu bestehen scheint, oder zumindest aus einem Haufen menschenverachtender Tierhasser. Vielleicht würden in einem solchen Umfeld die prächtigen Tiere umsonst vergeudet werden.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2208.g: "Wenn Sie stur sind, werden Sie sicher keine Wünsche erfüllt bekommen."
 academics.2206_goal_tt: "Sie müssen in #n 5#! Jahren #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] sammeln und einen [concept_dubois_zoo] bauen. "
 academics.2206_reward_tt: "Als Belohnung erhält unser Naturforscher #p 50 Erfahrungspunkte#! wenn wir noch keinen Naturforscher haben, werden wir einen bekommen."
 academics.2209.t: "Zoo-Erweiterung"
 academics.2209.d: "Ein offener Brief der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] beklagt, dass der Nationale Zoo wenig Abwechslung bietet."
 academics.2209.f: "Obwohl unsere Hauptstadt heute über eine Zooanlage verfügt, die sowohl für Wissenschaftler zur Erforschung von Tieren als auch für das zahlende Publikum eine gewisse Abwechslung bietet, hat diese Einrichtung kaum den Standard erreicht, der der Größe der Stadt und unserer nationalen Bedeutung angemessen ist. Um das Prestige zu steigern, die Bevölkerung zu unterhalten und die Wissenschaft voranzubringen, empfehlen wir daher, den derzeitigen Zoo zumindest zu einem mittelgroßen Zoo auszubauen.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2209.g: "Bringt mehr Tiere!"
 academics.2209.h: "Wir haben Besseres zu tun."
 academics.2210.t: "Ein noch größerer Zoo"
 academics.2210.d: "Ein offener Brief der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] beklagt, dass der Nationale Zoo wenig Abwechslung bietet."
 academics.2210.f: "Obwohl wir unseren Zoo in der Vergangenheit zu einer respektablen Größe haben anwachsen lassen, genießt er noch nicht die internationale Bedeutung, die er haben könnte und sollte, um andere Nationen mit unserer zoologischen Leidenschaft zu beeindrucken. Wir brauchen mehr und mehr exotische Tiere. Hier geht es nicht nur um die Wissenschaft, sondern auch um unser Ansehen. Wir raten dringend dazu, unseren Zoo zu einem Großzoo auszubauen.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.t: "Ein blühender Zoologischer Garten"
 academics.2211.d: "Der vergrößerte Zoologische Garten ist eine der Hauptattraktionen der Hauptstadt und erfreut sich bei Gelehrten und Bürgern gleichermaßen großer Beliebtheit. Die Wissenschaftliche Gesellschaft freut sich, dass ihr Wunsch in Erfüllung gegangen ist."
 academics.2211.f: "Gut gemacht! Der neue Zoo ist geräumiger und erfüllt den Anspruch, ein breiteres Spektrum der weltweiten Tierwelt abzubilden. Ich hoffe, Sie haben auch an ein Schnabeltier gedacht? Wir würden gerne eine Patenschaft für es übernehmen. Heißt es zufällig Perry?\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.g: "Die Tiere der Welt in unserem Haus!"
 academics.2212.t: "Zoologische Enttäuschung"
 academics.2212.d: "Die Wissenschaftliche Gesellschaft fragt sich, ob es sich noch lohnt, sich an die Regierung zu wenden, wenn ihre Anliegen so mit Füßen getreten werden wie bei der winzigen Anfrage nach ein paar Zootieren."
 academics.2212.f: "Wir sind sehr, sehr enttäuscht.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2212.g: "Sie sollten forschen, anstatt sich im Zoo zu vergnügen."
 academics.2209_goal_tt: "Sie müssen Ihren [concept_dubois_zoo] in #n 10#! Jahren auf #p Größe 3#! (mittelgroßer Zoo) vergrößern."
 academics.2210_goal_tt: "Sie werden Ihren [concept_dubois_zoo] auf #p Größe 4#! (großer Zoo) in #n 10#! Jahren vergrößern müssen."
 academics.2209_reward_tt: "Als Belohnung erhält unser Naturforscher #p 50 Erfahrungspunkte#! wenn wir noch keinen Naturforscher haben, werden wir einen bekommen."
 je_academics_found_zoo: "Fokus auf Naturalismus: Gründung eines Zoos"
 je_academics_found_zoo_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir einen [concept_dubois_zoo] bauen, um das Wissen, aber auch den Lebensstandard unserer Intellektuellen zu verbessern. Für den Bau eines Zoos werden #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] benötigt, die von einem [concept_dubois_naturalist] auf einer lokalen zoologischen Expedition oder einer Heia-Safari gefangen werden können. Es können auch Tiere aus anderen Ländern gekauft werden."
 je_academics_medium_zoo: "Fokus auf Naturalismus: Den Zoo vergrößern"
 je_academics_medium_zoo_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat eine Verlängerung des [concept_dubois_zoo] beantragt. Wir haben insgesamt zehn Jahre Zeit, um unseren Zoo zu einem #p mittelgroßen Zoo#! auszubauen. Dazu werden mehr [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] benötigt, die von [concept_dubois_naturalist] auf einer lokalen zoologischen Expedition oder einer Heia-Safari gefangen werden können. Es können auch Tiere aus anderen Ländern gekauft werden."
 je_academics_large_zoo: "Fokus auf Naturalismus: Den Zoo vergrößern"
 je_academics_large_zoo_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat eine Verlängerung des [concept_dubois_zoo] beantragt. Wir haben insgesamt zehn Jahre Zeit, um unseren Zoo zu einem #p großen Zoo#! auszubauen. Dafür werden mehr [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] benötigt, die von [concept_dubois_naturalist] auf einer lokalen zoologischen Expedition oder einer Heia-Safari gefangen werden können. Es können auch Tiere aus anderen Ländern gekauft werden."
 academics.2300.t: "Wir müssen mehr Fossilien finden als [SCOPE.sCountry('rival_scope').GetAltName('NOM')]"
 academics.2300.d: "Wir haben nicht genug [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] für eine größere Sammlung als [SCOPE.sCountry('rival_scope').GetName]. Deshalb wollen die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], dass wir insgesamt mehr #b Fossilien#! finden als [SCOPE.sCountry('rival_scope').GetAltName('NOM')]. Sie würden es sicher sehr schätzen, wenn wir diesen Konkurrenten schlagen könnten."
 academics.2300.f: "Während unsere Rivalen [SCOPE.sCountry('rival_scope').GetAltName('IN')] über verschiedene Fossilien aus unterschiedlichsten Epochen und Orten auf der ganzen Welt verfügen, sind unsere sowohl zeitlich als auch geografisch recht begrenzt. Das ist eine große Schande und für eine so große Nation wie die unsrige unakzeptabel.\nWir müssen unsere Fossiliensammlung umgehend erweitern!\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2300_goal_tt: "Sie müssen in #n 10#! Jahren mehr [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] sammeln als Ihr Konkurrent, [SCOPE.sCountry('rival_scope').GetAltName('NOM')]. Sie haben [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], wir haben [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]."
 academics.2300_reward_tt: "Als Belohnung erhält die Intelligenzia #p 5 Zustimmung#! und Sie erhalten #p 10%#! mehr Prestige für 4 Jahre."
 academics.2300.g: "Ah, eine Fossilienfehde!"
 academics.2300.h: "Wir brauchen keine staubigen Felsen..."
 academics_no_competition_with_rival_fossils: "Fossilienfehde verloren"
 academics_competition_with_rival_won_fossils: "Fossilienfehde gewonnen"
 je_academics_rivalry_for_fossils: "Fokus auf Paläontologie: Die Fossilienfehde"
 je_academics_rivalry_for_fossils_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mehr [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] sammeln als unsere Konkurrenten [SCOPE.sCountry('target').GetAltName('NOM')]. \n\nUnsere #b Fossilien insgesamt#!: [ROOT.Var('dubois_fossil').GetValue|0+]\n#b Fossilien [SCOPE.sCountry('target').GetAltName('DAT')] insgesamt#!: [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]"
 je_academics_rivalry_for_fossils_success: "Sie ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]) haben mehr [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] als [SCOPE.sCountry('target').GetAltName('NOM')] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+])."
 academics.2301.t: "Fantastische Fossiliensammlung"
 academics.2301.d_rival: "Wir haben eine größere Sammlung von [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] als unser Rivale [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetAltName('NOM')]. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!"
 academics.2301.d_rival_gone: "Unser Rivale in unserem Streben nach einer riesigen Fossiliensammlung ist erledigt. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!"
 academics.2301.f: "Es war von Anfang an klar, dass wir eine größere Fossiliensammlung brauchen als unser Rivale. Jetzt, wo wir so viele Fossilien vom Kambrium bis zum Quartär und von Amerika bis zu den pazifischen Inseln gesammelt haben, haben wir wirklich eine würdige Sammlung! Natürlich hätte das schon vor Jahren der Fall sein müssen, und wir sollten diese Sammlung noch weiter ausbauen. Im Moment ist die Situation \"gut genug\", wie die Bauern sagen.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2301.g: "Damit ist diese Fehde zu Ende!"
 academics.2302.t: "Wir haben es nicht geschafft, mehr Fossilien zu sammeln als [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetAltName('NOM')]"
 academics.2302.d: "Wir waren nicht in der Lage, unsere Fossiliensammlung weiter auszubauen als unsere Konkurrenten aus [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetAltName('DAT')]. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind nicht amüsiert."
 academics.2302.f: "Ihre Sammlung erstreckt sich über Äonen, sie haben alles, und wir haben ein paar staubige Felsen mit schlecht sichtbaren Fossilien... Es ist furchtbar. Dies ist eine beschämende Zeit für unsere Nation! Ekelhaft.\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "Ich brauche sowieso keine alten Steine..."
