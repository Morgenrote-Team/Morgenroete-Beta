 academics.1010.t: "Studierende Frauen?"
 academics.1010.d: "Einige Frauen haben sich für ein Studium an einer unserer Universitäten beworben. Nun stellte sich die Frage, ob es legal ist, dass sie studieren, und wie die offizielle Haltung unserer Regierung zum Studium von Frauen ist."
 academics.1010.f: "\"Die Gehirne von Frauen sind nicht für logisches Denken gemacht, sondern eher für Emotionen. Sie sollten nicht studieren dürfen!\"\n\n\"Sie haben nur Angst, dass eine Frau eine fähigere Wissenschaftlerin wird als Sie. Das wird mit Sicherheit passieren, denn Ihre Argumente entbehren jeder wissenschaftlichen Grundlage! Lasst die Frauen unter den gleichen Bedingungen wie die Männer studieren!\""
 academics.1010.g: "Lasst sie studieren!"
 academics.1010.h: "Moment, sie konnten bisher nicht studieren?"
 academics.1010.i: "Frauen gehören an den Herd!"
 academics.1011.t: "Eine brillante Wissenschaftlerin"
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] hat ihr Studium an einer unserer Universitäten als Klassenbeste abgeschlossen. In einem von Männern dominierten Fachgebiet konnte sie ihr Studium in Rekordzeit abschließen und ist begierig darauf, in ihrem Bereich zu arbeiten. Sie ist eine brillante..."
 academics.1011.f: "Meine aufrichtigen Glückwünsche an Sie zu Ihrem unglaublichen Abschluss! Wer hätte das für eine Frau für möglich gehalten!"
 academics.1011.g: "...Ingenieurin"
