 je_academics_rivalry_for_fossils: "Fokus auf Paläontologie: Die Fossilienfehde" #deepl:3466127007
 je_academics_rivalry_for_fossils_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mehr [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] sammeln als unsere Konkurrenten [SCOPE.sCountry('target').GetName]. \n\nUnsere #b Fossilien insgesamt#!: [ROOT.Var('dubois_fossil').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'s #b Fossilien insgesamt#!: [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]" #deepl:4216839294
 je_academics_rivalry_for_fossils_success: "Sie ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]) haben mehr [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] als [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+])." #deepl:3649809504

 academics.2301.t: "Fantastische Fossiliensammlung" #deepl:3592112160
 academics.2301.d_rival: "Wir haben eine größere Sammlung von [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] gesammelt als unser Rivale [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!" #deepl:1901426222
 academics.2301.d_rival_gone: "Unser Rivale in unserem Streben nach einer riesigen Fossiliensammlung ist verschwunden. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!" #deepl:2769921447
 academics.2301.f: "Es war von Anfang an klar, dass wir eine größere Fossiliensammlung brauchen als unser Rivale. Jetzt, wo wir so viele Fossilien vom Kambrium bis zum Quartär und von Amerika bis zu den pazifischen Inseln gesammelt haben, haben wir wirklich eine würdige Sammlung! Natürlich hätte das schon vor Jahren der Fall sein müssen, und wir sollten diese Sammlung noch weiter ausbauen. Im Moment ist die Situation \"gut genug\", wie die Bauern sagen.\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2767030383
 academics.2301.g: "Damit ist diese Fehde zu Ende!" #deepl:391831805

 academics.2302.t: "Wir haben es nicht geschafft, mehr Fossilien zu sammeln als [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]" #deepl:3590290747
 academics.2302.d: "Wir waren nicht in der Lage, unsere Fossiliensammlung weiter auszubauen als unsere Konkurrenten von [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind nicht amüsiert." #deepl:3401654733
 academics.2302.f: "Ihre Sammlung erstreckt sich über Äonen, sie haben alles, und wir haben ein paar staubige Felsen mit schlecht sichtbaren Fossilien... Es ist furchtbar. Dies ist eine beschämende Zeit für unsere Nation! Ekelhaft.\n\n Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2585306074
 academics.2302.g: "Ich brauche sowieso keine alten Steine..." #deepl:2098843215

