 academics.2303_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Zustimmung#! und Sie erhalten #p 5%#! mehr Prestige für 4 Jahre. Wir werden auch eine mittlere Investition in eine Technologie erhalten."
 je_academics_giant_of_the_past: "Paläontologischer Schwerpunkt: Giganten der Vergangenheit"
 je_academics_giant_of_the_past_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat darum gebeten, [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] zu sammeln und ein [concept_dubois_dinosaur_skeleton] zu rekonstruieren. In welchem Zustand es ist, bleibt zweitrangig - Hauptsache, wir haben ein opulentes Stück in unserer Sammlung. Dinosaurierknochen werden in großen Formationen gefunden. Wenn wir keine in unserem Gebiet haben, wäre eine [concept_dubois_paleontological_licence] von Vorteil, damit unsere Paläontologen im Ausland suchen können."
 academics.2303.t: "Giganten der Vergangenheit"
 academics.2303.d: "Einige führende Wissenschaftler haben beklagt, dass wir trotz unserer paläontologischen Fortschritte noch kein vollständiges Dinosaurierskelett ausstellen konnten. Auch unsere Wissenschaftliche Gesellschaft hat diese unglückliche Situation in einem Schreiben zutiefst bedauert und möchte, dass dieser Zustand behoben wird."
 academics.2303.f: "WIR WOLLEN EINEN DINOSAURIER, UND WIR WOLLEN IHN JETZT!\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2303.g: "Eine ausgezeichnete Initiative!"
 academics.2303.h: "Dies ist kein Vergnügungspark für kleine Jungs, sondern ein wissenschaftliches Institut."
 academics.2304.t: "Die Eidechse"
 academics.2304.d: "Der neue Dinosaurier ist das spektakulärste Stück der paläontologischen Sammlung. Jeden Tag strömen neue Besucher in die Ausstellung, um das Skelett zu sehen."
 academics.2304.f: "Können wir noch einen haben?\n\nUnterschrieben, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2304.g: "Unser eigener Dinosaurier!"
 academics.2305.t: "Keine Eidechse"
 academics.2305.d: "Die für das geplante Dinosaurierskelett vorgesehene Plattform bleibt leer. Die Wissenschaftliche Gesellschaft hat darauf mit großer Irritation reagiert."
 academics.2305.f: "Müssen wir noch deutlicher werden?\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2305.g: "Finde ein anderes Spielzeug!"
 academics.2306_goal_tt: "Finde #G 3#! #O Besondere Fossilien#!"
 academics.2306_reward_tt: "Als Belohnung erhält unser [concept_dubois_paleontologist] #p 50 Erfahrungspunkte#! wenn wir noch keinen [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] haben, bekommen wir einen. Außerdem erhalten wir eine große Investition in eine Technologie."
 je_academics_special_fossils: "Paläontologischer Fokus: Besondere Fossilien"
 je_academics_special_fossils_reason: "Besondere Fossilien sind einzigartige Fossilien, die aufgrund ihres außergewöhnlichen Status gesondert behandelt werden. Dazu gehören Übergangsformen wie Archeopteryx oder Ichthyostega, aber auch große ausgestorbene Säugetierarten wie das Riesenfaultier Megatherium oder der delphinartige Ichthyosaurus. Aber auch kleinere Fossilien, die zur Definition einer Epoche herangezogen werden - die bekanntesten sind Ammoniten und Trilobiten - gehören zu dieser Kategorie. Insgesamt gibt es ein Dutzend besonderer Fossilien, die nicht nur in Formationen, sondern auch auf wissenschaftlichen Expeditionen gefunden werden können."
 je_academics_special_fossils_success: "Finde #G 3#! #O Besondere Fossilien#!"
 academics.2306.t: "Außergewöhnliche Fossilien"
 academics.2306.d: "Die Wissenschaftliche Gesellschaft hat eine außergewöhnliche Anfrage an uns bezüglich außergewöhnlicher Fossilien."
 academics.2306.f: "Die Abstammungsgeschichte der Tiere ist ein Geheimnis der Natur, das unsere Forscher jeden Tag ein wenig mehr lüften. Eine besondere Rolle spielen dabei jene Formen, die an den Schwellen zwischen den Arten liegen, so genannte \"Missing Links\". Gleichzeitig gibt es auf unserem Planeten außergewöhnliche Lebewesen, die nicht unbedingt Dinosaurier sein müssen, um zu beeindrucken: ausgestorbene Säugetiere wie Säbelzahntiger oder Riesenfaultiere. Wenn wir mindestens 3 besondere Fossilien sammeln würden, könnten wir die Reputation unseres Instituts in der Welt weiter stärken.\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2306.g: "Besondere Fossisls für eine besondere Sammlung."
 academics.2306.h: "Können wir unsere wissenschaftlichen Kapazitäten nicht auf etwas Sinnvolleres konzentrieren?"
 academics.2307.t: "Erstaunliche Fossiliensammlung"
 academics.2307.d: "Das Nationale Paläontologische Institut besitzt zweifelsohne eine der bedeutendsten internationalen Sammlungen. Es gibt kaum einen vergleichbaren Ort mit solch außergewöhnlichen Stücken."
 academics.2307.f: "Besondere Fossilien sind vielleicht nicht immer so beeindruckend, wie man zunächst denken mag, aber sie haben einen großen wissenschaftlichen Wert. Deshalb hat die Wissenschaftliche Gesellschaft ein Dankesschreiben verschickt. In den nächsten Tagen wird es eine Sonderausstellung geben."
 academics.2307.g: "Prächtig."
 academics.2308.t: "Besondere Enttäuschung"
 academics.2308.d: "Die Wissenschaftliche Gesellschaft hat ihre Bestürzung über den jüngsten paläontologischen Misserfolg zum Ausdruck gebracht."
 academics.2308.f: "Es ist eine nationale Tragödie, dass die naturkundlichen Belange des Landes völlig ignoriert werden. Paläontologische Forschungen werden als Unsinn über tote Vögel und Eidechsen abgetan, Unterstützungszahlungen für spezielle Expeditionen werden selten geleistet und selbst kleinste Wünsche werden ignoriert. J'Accuse!\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2308.g: "Oh je."
 ademics_no_paleontological_hero_modifier: "Kein Held der Paläontologie"
 academics.2309_goal_tt: "Einen #o berühmten#! [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] haben"
 academics.2309_reward_tt: "Als Belohnung erhalten wir #p 120#! [concept_academics_progress]."
 je_academics_famous_paleontologist: "Paläontologischer Fokus: Berühmter Paläontologe"
 je_academics_famous_paleontologist_reason: "Der Aufstieg eines [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] wird von der Verbesserung seiner Erfahrung begleitet. Wie jeder Akademiker erhält auch ein Paläontologe jährlich 5 Erfahrungspunkte. Zusätzliche Erfahrung erhält er durch die erfolgreiche Erforschung von paläontologischen Formationen. Außerdem kann ein Paläontologe auf Bergsteiger- und Pazifikexpeditionen eingesetzt werden. Auch das erfolgreiche Konstruieren und Zusammensetzen von Dinosaurierskeletten trägt zur Erfahrungssteigerung eines Paläontologen bei."
 academics.2310.g: "Eine Inspiration für die Jugend."
 academics.2311.t: "Kein Held der Paläontologie"
 academics.2311.d: "Aus welchen Gründen auch immer waren wir nicht in der Lage, einen Paläontologen zu werben und ihn weltberühmt werden zu lassen."
 academics.2311.f: "Leider hat das Scheitern dazu geführt, dass die wissenschaftlichen Disziplinen weiterhin als Orchideenthemen abgetan werden und sich die Begeisterung für ein akademisches Studium und den Einstieg in den aktiven Forschungsdienst in Grenzen hält. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] spüren die Unzufriedenheit in Gesprächen. Die intellektuelle Elite macht die Regierung für diese Situation verantwortlich."
 academics.2311.g: "Enttäuschend."
 academics_splendid_dinosaur_collection_modifier: "Prächtige Dinosaurier-Kollektion"
 academics.2312_goal_tt: "Sie haben eine #o Dinosaurier-Bewertung#! von mindestens #G 5#!"
 academics.2312_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Zustimmung#!. Zusätzlich erhalten Sie #p 10%#! mehr Prestige und die Kosten für Gesellschaftstechnologie werden um #p 5%#! für 10 Jahre reduziert. "
 je_academics_dinosaur_rating: "Paläontologischer Schwerpunkt: Dinosaurier-Bewertung"
 je_academics_dinosaur_rating_reason: "Um die #O Dinosaurier-Bewertung#! zu verbessern, werden nicht nur neue Dinosaurierskelette benötigt, sondern auch eine perfekte Rekonstruktion derselben. Dies kann Jahre dauern. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hat daher beschlossen, keine zeitliche Begrenzung festzulegen."
 je_academics_dinosaur_rating_success: "Sie haben eine #o Dinosaurier-Bewertung#! von mindestens #G 5#!"
 academics.2312.t: "Die Pracht der Paläontologie"
 academics.2312.d: "Der paläontologische Zweig unserer wissenschaftlichen Forschung hat bereits eine gute Reputation. Jetzt ist es an der Zeit, ihn weltweit bekannt zu machen, indem wir unsere Dinosaurier-Ausstellung deutlich verbessern."
 academics.2312.f: "Wir möchten vielleicht einen anderen Dinosaurier in unserer Ausstellung zeigen. Eine größere Anzahl von Skeletten würde nicht nur der wissenschaftlichen Forschung zugute kommen, sondern auch unserem nationalen Ansehen. Die ganze Welt gräbt nach Dinosaurierknochen und ist fasziniert von der bisher unbekannten Vorgeschichte. Es sollte nicht nur um Quantität gehen, sondern auch um Qualität. Wir sollten uns zum Ziel setzen, Spitzenreiter bei der Rekonstruktion von Dinosaurierskeletten zu sein.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2312.g: "Das wird ein kolossales Unterfangen sein!"
 academics.2312.h: "Nicht schon wieder dieser paläontologische Blödsinn."
 academics.2313.t: "Eine prächtige Sammlung"
 academics.2313.d: "Die Wissenschaftliche Gesellschaft war stolz darauf, heute eine Sonderausstellung von Dinosaurierskeletten anzukündigen."
 academics.2313.f: "Wir sind der Regierung zu großem Dank verpflichtet, dass sie endlich eine Dinosauriersammlung besitzt, die das hohe Niveau der paläontologischen Forschung in unserem Land unterstreicht. Es gibt kaum eine exquisitere Sammlung als diese. Es hat viel harte Arbeit und Mühe gekostet, aber auch Forschungsdrang und Beharrlichkeit. Die Gesellschaft kann mit Stolz auf diese Arbeit blicken, während das Ausland mit Neid auf sie schaut. Meine Herren: Dies ist ein großer Tag für die Wissenschaft im Allgemeinen und die Paläontologie im Besonderen!\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2313.g: "Wunderbar!"
 academics_royalist_reaction_modifier: "Royalistische Reaktion"
 academics_royalist_weakness_modifier: "Royalistische Schwäche"
 academics_constitution_suspended_modifier: "Staatsgrundgesetz ausgesetzt"
 academics_constitution_confirmed_modifier: "Staatsgrundgesetz bestätigt"
 academics_academic_purge_modifier: "Akademische Säuberung\n#R -1#! #o Akademischer Fortschritt#!"
 academics_good_to_be_british_modifier: "Es ist gut, Brite zu sein"
 academics_supported_hanover_modifier: "Unterstützte Hannover"
 academics_supported_goettinger_seven_modifier: "Unterstützte die Göttinger Sieben"
 academics_kneeling_decree_modifer: "Kniefall-Dekret"
 academics_germanistentag_modifier: "Germanistentag"
 je_goettinger_seven_monument: "Denkmal der Göttinger Sieben"
 je_goettinger_seven_monument_reason: "Eine geeinte deutsche Nation könnte das Andenken der Göttinger Sieben ehren - vorausgesetzt, die führende einigende Kraft hat sich bereits historisch für sie eingesetzt. Ein Denkmal würde Generationen von Wissenschaftlern inspirieren! Das setzt natürlich voraus, dass die deutsche Regierung die liberalen Ideen der legendären Professoren teilt."
 academics.3101.t: "Die Verfassung von Hannover"
 academics.3101.d: "Als eine seiner ersten Amtshandlungen kündigte der König an, dass er die Verfassung, das sogenannte Staatsgrundgesetz, abschaffen werde. Ernst Augustus hat betont, dass er sich nicht daran gebunden fühlt."
 academics.3101.f: "Hannover hatte 1819 seine erste Verfassung erhalten, die vom Prinzregenten bewilligt worden war; sie bedeutete nicht viel mehr als die Umwandlung Hannovers von einem Kurfürstentum in ein Königreich, das durch den Wiener Kongress garantiert wurde. Eine Standversammlung hatte lediglich eine beratende Funktion bei der Gesetzgebung\nDer 1831 eingesetzte Duke of Cambridge empfahl in seiner Eigenschaft als Generalstatthalter Wilhelms in Hannover eine gründliche Neuorganisation der hannoverschen Regierung. Wilhelm IV. hatte 1833 einer neuen Verfassung zugestimmt; die Zustimmung des Dukes of Cumberland, Prinz Ernst August, war weder erbeten noch erhalten worden, und er hatte formell gegen die Annahme der Verfassung ohne seine Zustimmung protestiert. Unmittelbar nach seiner Ankunft in Hannover löste dieser nun als König Ernst August II. das hannoversche Parlament auf, das unter der umstrittenen Verfassung einberufen worden war. Er verkündete die Aussetzung der Verfassung mit der Begründung, dass er nicht um seine Zustimmung gebeten worden war und dass sie nicht den Bedürfnissen des Königreichs entsprach."
 academics.3101.g: "Aussetzung der Verfassung."
 academics.3101.h: "Der König steht nicht über dem Gesetz."
 academics.3102.t: "Die Göttinger Sieben"
 academics.3102.d: "Der Historiker und Politiker Friedrich Christoph Dahlmann wandte sich gegen die Pläne von Ernst August II., die Verfassung in seinem Sinne zu ändern, da Dahlmann selbst an der Ausarbeitung der Verfassung mitgewirkt hatte. Sechs weitere berühmte Professoren der Universität Göttingen schlossen sich dem Protest an und verteidigten die Verfassung von 1833. Bald waren die Männer als die \"Göttinger Sieben\" bekannt - und ein Ärgernis für den König."
 academics.3102.f: "Dahlmanns Schrift fand reißenden Absatz - die Studenten der Universität produzierten viele Hunderte oder gar Tausende von Kopien und verbreiteten sie in ganz Deutschland. Die anderen sechs Demonstranten waren die germanistischen Brüder Wilhelm und Jacob Grimm (berühmte Märchen- und Volksmärchenschriftsteller und -erzähler, bekannt als die Brüder Grimm), der Jurist Wilhelm Eduard Albrecht, der Historiker Georg Gottfried Gervinus, der Physiker Wilhelm Eduard Weber und der Theologe und Orientalist Heinrich Georg August Ewald. Die Wirkung des Protests zwang den König zum Handeln, und die sieben widerspenstigen Professoren wurden vor dem Universitätsgericht verhört."
 academics.3102.g: "Sie sollten aus ihren Positionen entfernt und verbannt werden!"
 academics.3102.h: "Geben Sie ihren Forderungen nach, bevor die Situation eskaliert."
 academics.3103.d: "Nach der Thronbesteigung von Königin Victoria im Vereinigten Königreich herrschte eine gewisse Traurigkeit über den Verlust der Personalunion mit Hannover, die über 120 Jahre gedauert hatte. Aber nach den jüngsten Ereignissen in Deutschland kann man getrost sagen: Es ist gut, dass wir getrennte Wege gehen."
 academics.3103.f: "Nur wenige Monate nach der Thronbesteigung des neuen Königs löst Hannover die unter britischer Herrschaft erlassene Verfassung auf. Der neue König Ernst Augustus sieht sich nun einer ganzen Opposition von Akademikern gegenüber. Dieser Streit ist bereits in ganz Deutschland in aller Munde. Wahrlich, sobald ein Land den segensreichen britischen Einflussbereich verlässt, fällt es in die Barbarei."
 academics.3103.g: "Es ist so schön, Brite zu sein."
 academics.3104.d: "Der Konflikt zwischen dem König von Hannover und sieben aufmüpfigen Professoren erschüttert die Staaten des Deutschen Bundes: Nachdem König Ernst Augustus die Verfassung aufgehoben hatte, rebellierten die \"Göttinger Sieben\" gegen ihn. Sie haben ihre Ämter verloren - aber viele Sympathien im liberalen deutschen Lager gewonnen."
 academics.3104.f: "Der Historiker und Politiker Friedrich Christoph Dahlmann wandte sich gegen Ernsts Pläne, die Verfassung in seinem Sinne zu ändern, da Dahlmann selbst an der Ausarbeitung der Verfassung mitgewirkt hatte. Sechs weitere berühmte Professoren der Universität Göttingen schlossen sich dem Protest an und verteidigten die Verfassung von 1833. Die anderen sechs Demonstranten waren die germanistischen Brüder Wilhelm und Jacob Grimm (berühmte Märchen- und Volksmärchenautoren und -erzähler, die zusammen als Brüder Grimm bekannt sind), der Jurist Wilhelm Eduard Albrecht, der Historiker Georg Gottfried Gervinus, der Physiker Wilhelm Eduard Weber und der Theologe und Orientalist Heinrich Georg August Ewald. Die direkten Auswirkungen des Protests hielten sich in Grenzen, aber das öffentliche Aufsehen und das Medieninteresse waren in Deutschland und weiten Teilen Europas groß, und die sieben waren in der breiten Öffentlichkeit beliebt."
 academics.3104.g: "Bei allem Respekt, der König ist zu weit gegangen."
 academics.3104.h: "Dieser akademische Pöbel hat seine gerechte Strafe erhalten."
 academics.3105.t: "Eine hitzige Debatte über Hannover"
 academics.3105.d: "Der Konflikt mit den \"Göttinger Sieben\" ist in den anderen Staaten des Deutschen Bundes nicht unbemerkt geblieben. Auch in Großbritannien ist man irritiert, dass der König die Verfassung außer Kraft gesetzt hat."
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName] ist eines der zahlreichen deutschen Länder, die das Vorgehen von Ernest Augustus kritisiert haben. Es gibt aber auch Länder, vor allem autoritär regierte, die Verständnis für den Prozess gezeigt haben. Dazu gehört [SCOPE.sCountry('academics_pro_hanover_country').GetAltName('NOM')]."
 academics.3105.g: "Das geht sie nichts an!"
 academics.3106.t: "Studentische Propaganda"
 academics.3106.d: "Trotz aller Bemühungen des Staates, die Verbreitung von Propaganda zugunsten der \"Göttinger Sieben\" zu verhindern, gelang es liberalen Studentenkreisen, Flugblätter in großem Umfang in den Großstädten zu verteilen."
 academics.3106.f: "\"Erinnert euch an unsere Helden! Erinnert euch an die Göttinger Sieben! Rühmt ihre Tugenden!\" Als Professor Dahlmann seine Dokumente gegen den hannoverschen König veröffentlichte, fand sie bei deutschen Studenten und Liberalen großen Anklang. Sie hatte einen explosiven Einfluss in den Staaten des Deutschen Bundes. Die Studenten der Universität Göttingen produzierten viele Hunderte oder sogar Tausende von Kopien und verbreiteten sie in ganz Deutschland."
 academics.3106.g: "Dieses krawallige Studentenpaket!"
 academics.3107.t: "Jacob Grimm [ROOT.GetCountry.GetAltNameNoFlag('IN')]"
 academics.3107.d: "Der berühmte deutsche Gelehrte und Jurist Jacob Grimm ist nach seiner Verbannung aus Hannover auf der Suche nach einer neuen Heimat. Unsere Sympathie für die \"Göttinger Sieben\" hat sich auf ihn übertragen, weshalb er auf einen neuen Job hofft."
 academics.3107.f: "Jacob Ludwig Karl Grimm war ein deutscher Schriftsteller, Sprachwissenschaftler, Philologe, Jurist und Volkskundler. Er formulierte das Grimmsche Gesetz der Sprachwissenschaft und war Mitverfasser des Deutschen Wörterbuchs, Autor der Deutschen Mythologie und Herausgeber der Grimmschen Märchen. Er war der ältere Bruder von Wilhelm Grimm; zusammen bildeten sie das als Brüder Grimm bekannte literarische Duo."
 academics.3107.g: "Heißen Sie ihn willkommen."
 academics.3107.h: "Wir brauchen nicht noch einen verschrobenen Akademiker."
 academics.3108.t: "Wilhelm Eduard Weber [ROOT.GetCountry.GetAltNameNoFlag('IN')]"
 academics.3108.d: "Der berühmte Physiker Wilhelm Eduard Weber ist nach seiner Verbannung aus Hannover auf der Suche nach einer neuen Heimat. Unsere Sympathien für die \"Göttinger Sieben\" haben sich auf ihn übertragen, weshalb er auf eine neue Stelle hofft."
 academics.3108.f: "Wilhelm Eduard Weber war ein deutscher Physiker und zusammen mit Carl Friedrich Gauß der Erfinder des ersten elektromagnetischen Telegraphen."
 academics.3111.t: "Der Grimm"
 academics.3111.d: "Die Brüder Jacob und Wilhelm Grimm haben den ersten Band eines deutschen Wörterbuchs vorgelegt, das den gesamten deutschen Wortschatz umfassen soll. Eine Mammutaufgabe, aber eine, die die deutsche Kulturnation noch näher zusammenrücken lässt."
 academics.3111.f: "Das Deutsche Wörterbuch ist eines der wichtigsten Wörterbücher der deutschen Sprache. Es ist für die deutsche Sprache das, was das Oxford English Dictionary für die englische Sprache ist. Es enthält detaillierte historische Informationen über den Ursprung und die Verwendung deutscher Wörter im Laufe der Zeit, mit Beispielen aus aktuellen Dokumenten. Auf Deutsch ist das Wörterbuch auch als \"Der Grimm\" bekannt. Es wurde 1838 von den Brüdern Grimm ins Leben gerufen. Ursprünglich gingen sie davon aus, dass das Projekt zehn Jahre dauern und 6 oder 7 Bände umfassen würde. Tatsächlich wurde der erste Band aber erst 1854 veröffentlicht. Wilhelm Grimm starb 1859 und Jacob 1863, während er an dem Eintrag für \"Frucht\" arbeitete. Nach dem Tod der beiden waren mehrere Institutionen an der Arbeit beteiligt, darunter die Preußische Akademie der Wissenschaften und die Berliner Akademie, aber auch ein Zentrum in Göttingen. Das 1961 fertig gestellte Wörterbuch wird 32 Bände umfassen und etwa 350.000 Haupteinträge enthalten. Der \"Grimm\" war nicht nur ein wissenschaftliches, sondern auch ein nationales Werk."
 academics.3111.g: "Dies sollte in jedem deutschen Bundesland veröffentlicht werden!"
 academics.3112.g: "Ich hatte gehofft, dass sie stattdessen ein neues Märchenbuch machen..."
 academics.3113.t: "Erster Germanistentag in Frankfurt"
 academics.3113.d: "Mehrere deutsche Intellektuelle haben Gleichgesinnte zu einer Konferenz in Frankfurt eingeladen, dem \"Germanistentag\". Während viele diese Zusammenkunft nur als kulturelles Ereignis sehen wollen, ist die politische Botschaft ebenso klar."
 academics.3113.f: "Die \"Germanistentage\" waren, anders als der Name vermuten lässt, keine Veranstaltung nur für Germanisten. Sie waren eine Initiative deutscher Universitätswissenschaftler im Rahmen der Entwicklung eines deutschen Nationalgefühls. Im Gegensatz zu heute hatte der Begriff Germanistik im Vormärz eine breitere Bedeutung: Er verband Historiker, Juristen und Sprach- und Literaturwissenschaftler, die sich mit der deutschen Geschichte, dem deutschen Recht und der deutschen Sprache beschäftigten. Auf dem ersten Germanistentag, der 1846 von dem Tübinger Juristen August Ludwig Reyscher in Frankfurt initiiert wurde, sprachen Friedrich Christoph Dahlmann, Georg Waitz und Johann Gustav Droysen über die Unteilbarkeit Schleswig-Holsteins. Jacob Grimm sprach über den \"Wert der ungenauen Wissenschaften\", sein Bruder Wilhelm über das Deutsche Wörterbuch. Die Konferenzen fanden im Frankfurter Römer statt. Ein zweiter Germanistentag folgte 1847 in Lübeck. Der dritte Germanistentag, der 1848 in Nürnberg stattfinden sollte, kam wegen der Märzrevolution nicht zustande."
 academics.3113.g: "Deutschland ist eine Kulturnation."
 academics.3113.h: "Ihre liberalen Ideale dienen uns als Richtschnur."
 academics.3115.t: "Kontroverse über das Knien"
 academics.3115.d: "Mit den Annexionen der umliegenden Länder im napoleonischen Zeitalter gewann Bayern große Gebiete, die protestantisch waren. In dieser Zeit förderte der König eine tolerantere Politik gegenüber seinen Untertanen. Ein Beispiel dafür war das Edikt, dass protestantische Soldaten nicht vor einer katholischen Messe oder Prozession knien mussten. Minister Karl von Abel hat jedoch vorgeschlagen, dies zu ändern."
 academics.3115.f: "Der so genannte Kniebeugestreit fand in der ersten Hälfte des 19. Jahrhunderts im Königreich Bayern statt. Er begann mit einem Erlass des bayerischen Ministers Karl von Abel, der auch protestantische Soldaten dazu verpflichtete, sich während des Militärgottesdienstes vor dem Allerheiligsten niederzuknien. Der Erlass wurde als \"Kniefalldekret\" bekannt. Dies führte zu einem heftigen Streit in der Abgeordnetenkammer, der sich über mehrere Jahre hinzog."
 academics.3115.g: "Wir sind ein katholisches Land und die Menschen knien hier!"
 academics.3115.h: "Aber was ist mit unseren protestantischen Landsleuten?"
 mr_is_special_character_tt: "#default_text [concept_character] ist ein #V Spezieller Charakter#! (z. B. ein [concept_tesla_engineer]).#!"
 academics.2004.f: "Sehr geehrter Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]\n\nWir hoffen sehr, dass Sie in der Lage sein werden, eine neue Sternkarte mit vielen neuen Sternen zu erstellen. Nach Ihren exzellenten Fähigkeiten zu urteilen, sollte dies überhaupt kein Problem sein. Daher erwarten wir eine hervorragende neue Sternkarte innerhalb von 10 Jahren.\n\nUnterzeichnet, Ihre Kollegen von der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.1.d: "Nachdem [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe] jahrzehntelang Brücken, Maschinen und Gebäude entworfen und gebaut hat, geht [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] nun in den Ruhestand. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht mehr als unser [concept_tesla_engineer] tätig sein."
 academics.1.g: "[SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] verdient [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis]en Ruhestand!"
 academics.2.d: "Nachdem [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe] Jahrzehnte [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis]es Lebens mit der Entdeckung neuer Sterne, Nebel und anderer astronomischer Phänomene verbracht hat, hat [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] beschlossen, in den Ruhestand zu gehen. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht mehr als unser [concept_verrier_astronomer] arbeiten."
 academics.2.f: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetCustom('verrier_astronomer_achievements_switch_to_character_scope_type')]"
 academics.6.d: "Nachdem [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe] Jahrzehnte [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis]es Lebens damit verbracht hat, neue [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], Pflanzen und andere Lebensformen zu entdecken, hat [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] beschlossen, sich zur Ruhe zu setzen. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht länger als unser [concept_dubois_naturalist] arbeiten."
 academics.7.d: "Nachdem [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe] jahrzehntelang damit verbracht hat, neue Fossilien zu entdecken und Dinosaurier und andere ausgestorbene Arten zu rekonstruieren, hat [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] beschlossen, in den Ruhestand zu gehen. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht länger als unser [concept_dubois_paleontologist] arbeiten."
 academics.7.f: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetCustom('dubois_paleontologist_achievements_switch_to_character_scope_type')]"
 academics.9.d: "Nachdem [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe] Jahrzehnte seines Lebens damit verbracht hat, die Relikte antiker Zivilisationen zu entdecken, hat [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] beschlossen, sich zurückzuziehen. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht mehr als unser [concept_lepsius_archaeologist] arbeiten."
 academics.10.d: "Nachdem [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe] Jahrzehnte [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis]es Lebens mit der Entdeckung von Relikten prähistorischer Menschen verbracht hat, hat [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] beschlossen, sich zur Ruhe zu setzen. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] wird nicht mehr als unser [concept_andersson_anthropologist] arbeiten."
