 academics.80.t: "Doktor [SCOPE.sCharacter('academic_scientist_scope').GetLastName] Academic schlägt den Bau eines Observatoriums vor"
 academics.80.d: "Zu [SCOPE.sCharacter('academic_scientist_scope').GetHerHis]en Bedauern hat unser neuer Wissenschaftler [SCOPE.sCharacter('academic_scientist_scope').GetFullName] festgestellt, dass es derzeit kein Observatorium gibt, in dem [SCOPE.sCharacter('academic_scientist_scope').GetSheHe] seine Forschungen durchführen kann. [SCOPE.sCharacter('academic_scientist_scope').GetSheHe|U] hat daher einen raschen Bau vorgeschlagen und würde diesen - mit staatlicher Unterstützung - in Angriff nehmen. Die akademische Welt blickt nun erwartungsvoll auf die Regierung."
