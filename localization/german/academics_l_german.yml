 academics.30.d: "Nachdem er jahrzehntelang als [concept_andersson_anthropologist] tätig war, ist unser ehemaliger #b #BLUE Chefanthropologe#!#! gestorben. Werden wir jemals in der Lage sein, einen so erstaunlichen Wissenschaftler zu ersetzen?"
