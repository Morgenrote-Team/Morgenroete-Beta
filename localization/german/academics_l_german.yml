 je_academics_aegean_artifacts: "Fokus auf Archäologie: Ägäische Artefakte"
 je_academics_aegean_artifacts_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert uns auf, mindestens #p 25#! ägäische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] zu finden. Ein [concept_lepsius_archaeologist] kann sie auf einer [concept_lepsius_expedition] oder [concept_lepsius_excavation] finden, sollten wir nicht das unglaubliche Glück haben, sie durch ein zufälliges Geschenk oder eine lokale Ausgrabung zu erhalten."
