 academics.2101_reward_tt: "Als Belohnung steigt der #p Lebensstandard#! der Mittelschicht in jedem Staat mit einer Universität für 5 Jahre um einen Punkt, zusätzlich erhält die IG \"[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]\" #p 5 Zustimmung#! und die Kosten für Produktionstechnologie werden für 3 Jahre um #p 5%#! reduziert."
 academics.2104_reward_tt: "Als Belohnung erhalten wir #p 5% Prestige#! für 5 Jahre, zusätzlich erhält die IG \"[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]\" #p 5 Zustimmung#! und die Kosten für Produktionstechnologie werden für 3 Jahre um #p 5%#! reduziert. Unser Archäologe wird #p 15 Erfahrung#! erhalten."
 academics.2110_reward_tt: "Als Belohnung erhalten wir #p 5% Prestige#! für 5 Jahre, zusätzlich erhält die IG \"[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]\" #p 5 Zustimmung#! und die Kosten für Produktionstechnologie werden für 3 Jahre um #p 5%#! reduziert. Unser Archäologe wird #p 25 Erfahrung#! erhalten."
 academics.2112_reward_tt: "Als Belohnung erhalten wir #p 10% Prestige#! für 5 Jahre, zusätzlich erhält die IG \"[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]\" #p 5 Zustimmung#! und die Kosten für Produktionstechnologie werden um #p 5%#! reduziert. Unser Volk wird auch #p 1 Lebensstandard#! mehr genießen. Unser Archäologe erhält #p 50 Erfahrung#!"
 academics.2309.t: "Der Ehrgeiz von [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 academics.2309.d: "Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] gilt als eine nationale Referenz auf dem Gebiet der Paläontologie. Die wissenschaftliche Gesellschaft möchte [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] zu einer international gefragten Persönlichkeit machen, um [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] als akademisches Aushängeschild zu nutzen."
 academics.2309.f: "Wir sind zu der festen Überzeugung gelangt, dass unser Kollege Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting] bestens geeignet wäre, unseren Wissenschaftsstandort zu repräsentieren. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] sollte jede erdenkliche Unterstützung erhalten, um [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] Ansehen zu steigern. Dies würde insbesondere junge Menschen motivieren, selbst eine wissenschaftliche Laufbahn einzuschlagen.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] wird berühmt werden."
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] sollte nicht größenwahnsinnig werden."
 academics.2310.t: "Paläontologischer Ruhm"
 academics.2310.d: "Mit [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis]en Aufstieg als Paläontologe ist [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] nun das wissenschaftliche Aushängeschild, das die wissenschaftliche Gesellschaft wollte."
 academics.2310.f: "Wir empfangen jetzt viele neue Studenten, die von der Größe und dem Ruhm von Professor [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting] inspiriert sind. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe|U] hat nicht nur sein eigenes Fach mit Leben erfüllt, sondern auch eine grundlegende Faszination für die Wissenschaften geweckt. Wissenschaftler zu sein ist nicht mehr als ein skurriler Beruf mit wenig Perspektiven, sondern ein spannender Job, der Ruhm und Abenteuer verspricht.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
