 academics.119.t: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] ist jetzt ein berühmter Anthropologe"
 academics.119.d: "Nach langjähriger Beschäftigung mit der Erforschung und Entdeckung der Artefakte der Urmenschen ist unser [concept_andersson_anthropologist] Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] nun in der Welt der Anthropologie berühmt!"
 academics.119.f: ""
 academics.119.g: "Eine neue Art von Mensch!"
 academics.108.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] ist jetzt ein erfahrener Geologe"
 academics.108.d: "Nach Jahren des Grabens und Lernens ist unser [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] nun erfahren!"
 academics.108.f: ""
 academics.108.g: "Ich steh’ drauf!"
 academics.109.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] ist jetzt ein berühmter Geologe"
 academics.109.d: "Nachdem er mehr Zeit mit Steinen als mit Menschen verbracht hat, ist unser [concept_agassiz_geologist] Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] jetzt in der Welt der Geologie berühmt!"
 academics.109.f: ""
 academics.109.g: "Ein echter Rockstar!"
 academics.140.t: "Unser Ingenieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], ist jetzt ein Bauingenieur"
 academics.140.d: "Die jahrelange Arbeit im Bauwesen hat sich ausgezahlt. Nach dem Bau zahlreicher Brücken und Tunnel gilt Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] nun als wahrer [concept_tesla_civil_engineer]. Das wird seinen Projekten sicherlich Auftrieb geben!"
 academics.140.f: ""
 academics.140.g: "Der Ingenieur unserer Zukunft!"
 academics.141.t: "Unser Ingenieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], ist jetzt ein Maschinenbauingenieur"
 academics.141.d: "Die jahrelange Arbeit mit Maschinen hat sich ausgezahlt. Die vielen Erfindungen und neuen Maschinen, die Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] geschaffen hat, haben ihn schließlich zu einem wahren [concept_tesla_mechanical_engineer] werden lassen. Wir hoffen auf weitere verblüffende Projekte!"
 academics.141.f: ""
 academics.141.g: "Ein wahrer Motor des Fortschritts!"
 academics.142.t: "Unser Ingenieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], ist jetzt ein Militäringenieur"
 academics.142.d: "Die jahrelange Arbeit für das Militär hat sich gelohnt. Nachdem [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] jahrelang Festungen gebaut, neue Waffen konstruiert und unsere Soldaten ausgerüstet hat, gilt Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] nun als ein echter [concept_tesla_military_engineer]. Hoffentlich wird [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] unserer Nation weiterhin dienen!"
 academics.142.f: ""
 academics.142.g: "Die Basis unserer militärischen Stärke wird geschaffen!"
 academics.143.t: "Unser Ingenieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], ist jetzt ein Elektroingenieur"
 academics.143.d: "Die Kraft der Elektrizität nutzbar zu machen, war schon immer ein Traum von Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]. Nach vielen Durchbrüchen auf diesem Gebiet gilt [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] heute als [concept_tesla_electrical_engineer]."
 academics.143.f: ""
 academics.143.g: "Ein Funke des Wissens!"
 academics.144.t: "Unser Ingenieur, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], ist jetzt ein Luftfahrtingenieur"
 academics.144.d: "Lange Zeit träumten die Menschen vom Fliegen. Nun, da die Ära des Fliegens begonnen hat, ist Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] an der Spitze der Luftfahrttechnik. Nach vielen Durchbrüchen auf diesem Gebiet gilt [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] heute als [concept_tesla_aeronautical_engineer]."
 academics.144.f: ""
 academics.144.g: "Auf in den Himmel!"
 notification_academics_yearly_experience_gain_notification_name: "Jährlicher Erfahrungsgewinn Ihrer Akademiker"
 notification_academics_yearly_experience_gain_notification_desc: "Jeder Akademiker, der Erfahrung sammeln kann, hat zwischen #p 0#! und #p 5#! Erfahrung erhalten."
 dubois_humanities_receive_promotion_loc: "Die Grabräuber und Nekrophilen tragen überhaupt nichts zu unserer Gesellschaft bei!"
 dubois_natural_history_receive_promotion_loc: "Warum bekommen die Schmetterlingssammler und Monsterbauer alle Mittel und wir müssen uns mit den Resten begnügen?"
 dubois_mathematics_receive_promotion_loc: "Es ist absolut idiotisch, dass den verrückten Tüftlern und Sternguckern alle Wünsche von den Lippen abgelesen werden, während wir uns mit den Krümeln abfinden müssen!"
 academics_engineer_focus_atmospheric_engine_loc: "Wir versuchen, die Kraft des Dampfes zu nutzen, um Arbeiter durch Maschinen zu ersetzen. Das würde es billiger machen, Ressourcen abzubauen oder Dinge zu produzieren!"
 academics_engineer_focus_computer_loc: "Wir versuchen, eine Maschine zu bauen, die alle Arten von Berechnungen durchführen kann. Das würde menschliche Computer überflüssig machen. Wir könnten alles mit höchster Präzision und ohne jeden Fehler berechnen!"
 academics_engineer_focus_washing_machine_loc: "Unser Ziel ist es, eine Maschine zu entwickeln, die Wäsche waschen kann, ohne dass man dafür arbeiten muss. Das würde unsere Gesellschaft revolutionieren, da wir unsere Zeit nicht mehr mit dem Waschen unserer schmutzigen Wäsche verschwenden müssten!"
 academics_engineer_focus_lighter_loc: "Können Sie sich vorstellen, wie nützlich ein kleines Taschenfeuerzeug sein könnte? Eines, das eine große Flamme erzeugt und Kerzen oder Zigaretten anzünden kann? Das ist ein Vermögen, das darauf wartet, gehoben zu werden!"
 academics_engineer_focus_rocket_loc: "Wir wollen eine Rakete bauen, die den Weltraum erreichen kann. Man stelle sich die militärischen Anwendungen einer solchen Rakete vor. Man könnte seine Feinde treffen und sie könnten nichts dagegen tun!"
 academics_engineer_focus_telephone_loc: "Stellen Sie sich ein Gerät vor, mit dem Sie über große Entfernungen mit jemandem sprechen können! Daran arbeiten wir gerade in unserem Labor!"
 academics_engineer_focus_combustion_engine_loc: "Züge sind toll, aber sie sind riesig und brauchen Schienen. Wie wäre es, wenn wir einen kleinen Motor bauen könnten, der ein kleines Fahrzeug antreiben kann. Dann könnte jeder überall hinfahren. Es gibt viele nützliche Anwendungen für einen solchen Motor. Und genau daran arbeitet mein Team im Moment!"
 academics_engineer_focus_basic_research_alloys_loc: "Wir betreiben Grundlagenforschung, um so viele nützliche Legierungen wie möglich zu finden. Wenn wir die richtigen Legierungen finden, könnte das zu besseren Konstruktionen, effizienteren Maschinen und Geräten führen, die derzeit noch als unmöglich gelten!"
 academics_engineer_focus_basic_research_factory_machinery_loc: "Mein Team arbeitet daran, die in den Fabriken eingesetzten Maschinen zu verbessern. Das könnte zu einem massiven Anstieg unserer Produktion und des Wohlstands unserer Nation führen!"
 academics_engineer_focus_basic_research_housing_loc: "Wir suchen nach der effizientesten Art, Häuser zu bauen, um kostengünstig Wohnraum zu schaffen. Dies könnte der Bevölkerung helfen, sich bessere Lebensbedingungen zu leisten, und würde unseren Bausektor ankurbeln."
 academics_engineer_focus_basic_research_urban_planing_loc: "Unsere Städte sind nicht effizient genug. Deshalb müssen wir herausfinden, wie wir die Städte effizienter machen können, um den Lebensstandard der Menschen zu erhöhen!"
 academics.2001.t: "Sie werden von der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] aufgefordert, uns auf die Vermessung des Himmels zu konzentrieren"
 academics.2001.d: "In unserem Land gibt es noch nicht viel astronomische Forschung und wir haben noch nicht einmal einen [Concept('concept_verrier_astronomer','Chefastronomen')]. Deshalb möchte die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], dass wir eine neue Sternenkarte erstellen und einen Chefastronomen ernennen."
 academics.2001.f: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bittet Sie, Ihr Engagement für die Astronomie zu verstärken. Ein solcher Schwerpunkt würde es uns ermöglichen, neue Erkenntnisse über den Himmel und das Universum zu gewinnen.\nDeshalb bitten wir Sie, erstens eine neue, aktualisierte Sternkarte zu erstellen und zweitens einen Chefastronomen einzustellen.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2001.g: "Ad Astra!"
 academics.2001.h: "Sterne? Wir haben Besseres zu tun!"
 academics_unhappy_intelligentsia: "Die wissenschaftliche Gesellschaft ist unglücklich"
 academics.2001_goal_tt: "Sie müssen #p 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdecken und einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] anstellen in #n 10#! Jahrenn."
 academics.2001_reward_tt: "Als Belohnung erhält ihr Astronom #p 15 Erfahrung#!, zusätzlich erhält die IG Intellektuelle #p 5 Zustimmung#! und die Kosten für Produktionstechnologie werden um #p 5%#! für 3 Jahre reduziert."
 je_academics_find_more_stars: "Fokus auf Astronomie: Die Sternkarte"
 je_academics_find_more_stars_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir [JournalEntry.GetGoalAddValue] neue [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] finden, um eine neue Sternkarte zu erstellen und einen neuen [Concept('concept_verrier_astronomer','$Chefastronomen$')] ernennen.\n\nBisher haben wir [JournalEntry.GetGoalProgressValue] #b Astronomische Objekte#! gefunden."
 je_academics_find_more_stars_success: "Finden Sie #p 75#! neue #b Astronomische Objekte#!"
 je_academics_find_more_stars_event_tt: "Unser neuer [concept_verrier_astronomer] wird die neue Sternkarte präsentieren"
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] präsentiert eine neue Sternkarte"
 academics.2002.d: "Wir konnten eine neue Sternkarte erstellen und haben einen neuen [Concept('concept_verrier_astronomer','$Chefastronomen$')] gefunden. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wird sich freuen!"
 academics.2002.f: "\"Diese neue Sternkarte ist sehr präzise! Ich habe sie mit denen anderer Nationen verglichen, und unsere ist offensichtlich besser. Außerdem haben wir viele neue Sterne gefunden, von denen einige sehr faszinierend sind! Dieser hier hat zum Beispiel mehr rotes Licht als normal...\""
 academics.2002.g: "Hurra!"
 academics_scientific_society_happy: "Die wissenschaftliche Gesellschaft ist glücklich"
 academics.2003.t: "Unser Fokus auf Astronomie ist gescheitert!"
 academics.2003.d: "Wir waren nicht in der Lage, uns ausreichend auf die Astronomie zu konzentrieren, um die Ziele zu erreichen, die uns die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] vorgegeben hat!"
 academics.2003.f: "\"Es scheint, dass Krieg, Wirtschaft und sogar Wein und Alkohol für unsere Politiker wichtiger sind als die Wissenschaft. Wir sind enttäuscht. Hoffentlich kehrt der Fokus unserer großen Nation bald zur Wissenschaft zurück!\""
 academics.2003.g: "Wie schade!"
 academics.2004.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert eine neue Sternkarte von unserem [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]"
 academics.2004.d: "Der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] zufolge muss sich unsere Nation auf die Vermessung des Himmels konzentrieren. Sie forderten Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] auf, neue Sterne und andere [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] zu finden und eine neue Sternkarte zu erstellen."
 academics.2004_goal_tt: "Sie werden #p 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] in #n 10#! Jahren entdecken müssen."
 academics.2004_reward_tt: "Als Belohnung erhält ihr Astronom #p 25 Erfahrung#!, zusätzlich erhält die IG Intellektuelle #p 5 Zustimmung#! und die Kosten für Produktionstechnologie werden um #p 5%#! für 3 Jahre reduziert."
 je_academics_create_star_chart: "Fokus auf Astronomie: Die Sternkarte unseres Astronomen"
 je_academics_create_star_chart_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass unser [concept_verrier_astronomer] [JournalEntry.GetGoalAddValue] neue [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] findet, um eine neue Sternkarte zu erstellen.\n\nBislang haben wir [JournalEntry.GetGoalProgressValue] #b Astronomische Objekte#! gefunden."
 je_academics_create_star_chart_success: "#p 100#! neue #b Astronomische Objekte#! finden"
 je_academics_create_star_chart_event_tt: "Unser [concept_verrier_astronomer] wird die neue Sternkarte vorstellen."
 je_academics_create_star_chart_event_without_astronomer_tt: "Unsere neue Sternkarte wird veröffentlicht."
 je_academics_create_star_chart_failed_event_tt: "Unser [concept_verrier_astronomer] scheitert bei der Erstellung der neuen Sternenkarte."
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Nachdem wir unseren [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] verloren haben, werden wir keine Sternkarte erstellen können."
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] präsentiert eine neue Sternkarte"
 academics.2005.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] war von [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]en Kollegen umringt, als sie miteinander auf ihn anstießen.\n\n\"Lieber Freund, ich wusste, dass du das leicht schaffen würdest. Ihre neue Sternkarte ist außergewöhnlich! Ein wahres Meisterwerk!\""
 academics.2006.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] hat versagt!"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] hat es nicht geschafft, eine neue Sternkarte zu erstellen. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] war nicht in der Lage, genügend Sterne und andere [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] zu finden, um sie zu erstellen. Der Rest der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ist sehr enttäuscht über [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]en Misserfolg."
 academics.2006.f: "Lieber [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName],\n\nWir haben festgestellt, dass Sie nicht in der Lage waren, eine neue Sternkarte einzureichen, was einmal mehr zeigt, dass Sie andere Aktivitäten der Wissenschaft vorziehen. Leider wirft dies ein schlechtes Licht auf unsere Gesellschaft. Für die Zukunft erwarten wir Besseres!\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2006.g: "Wie schade!"
 academics.2007.t: "Eine neue Sternkarte"
 academics.2007.d: "In Abwesenheit unseres ehemaligen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] wurde die neue Sternkarte in der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] vorgestellt. Die Akademiker scheinen mit der neuen Karte recht zufrieden zu sein."
 academics.2007.f: "\"Dank dieser neuen Sternkarte werden wir den Himmel noch besser studieren können! Hoffentlich werden wir viele neue Erkenntnisse darüber finden, wie sich diese Körper bewegen!\nDas war nur möglich dank der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]! Einen Toast auf uns, meine Herren!\""
 academics.2008.t: "Kein Astronom, keine Sternkarte"
 academics.2008.d: "Der Verlust unseres [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] führte zu weniger Entdeckungen von Sternen und anderen [Concept('concept_verrier_astronomical_object','Astronomischen Objekten')], als wir erwartet hatten. Wir waren daher nicht in der Lage, genug zu finden, um eine neue Sternkarte zu erstellen. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ist über dieses Ergebnis nicht erfreut."
 academics.2008.f: "\"Unsere Regierung hat nicht nur ihren brillanten Chefastronomen verloren, sie war auch nicht in der Lage, unsere Astronomen bei ihrer Arbeit ausreichend zu unterstützen. Das Ergebnis sind weit weniger Beobachtungen. Das bedeutet, dass wir in unserer astronomischen Forschung zurückfallen werden. Das ist wirklich schrecklich!\""
 academics.2009.t: "Wir müssen mehr Sterne finden als [SCOPE.sCountry('rival_scope').GetAltName('NOM')]"
 academics.2009.d: "Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind unglücklich darüber, dass [SCOPE.sCountry('rival_scope').GetAltName('NOM')] mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt hat als unsere Nation. Sie fordern uns auf, in 10 Jahren mehr #b Astronomische Objekte#! insgesamt als [SCOPE.sCountry('rival_scope').GetAltName('NOM')] zu finden."
 academics.2009.f: "Es ist eine Schande, dass eine so unbedeutende Nation wie [SCOPE.sCountry('rival_scope').GetAltName('NOM')] mehr astronomische Objekte gefunden hat als wir. Wir müssen diese unzivilisierten Amateurastronomen so bald wie möglich überholen und insgesamt mehr astronomische Objekte finden als sie.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2009_goal_tt: "Sie müssen in #n 10#! Jahren mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdecken als Ihr Konkurrent, [SCOPE.sCountry('rival_scope').GetAltName('NOM')]. Sie haben [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], wir haben [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]."
 academics.2009_reward_tt: "Als Belohnung erhält die Intelligenzia #p 5 Zustimmung#! und Sie erhalten #p 10%#! mehr Prestige für 4 Jahre."
 academics.2009.g: "Lasst sie uns schlagen!"
 academics.2009.h: "Dies ist kein Wettlauf ins All..."
 academics_no_competition_with_rival: "Das Rennen um die Sterne verloren"
 academics_competition_with_rival_won: "Gewann das Rennen um die Sterne"
 je_academics_rivalry_for_stars: "Fokus auf Astronomie: Der Wettlauf der Sterne"
 je_academics_rivalry_for_stars_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] finden als unser Konkurrent [SCOPE.sCountry('target').GetAltName('NOM')].\n\nUnsere #b Astronomischen Objekte#!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'s #b Astronomische Objekte#!: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]"
 je_academics_rivalry_for_stars_success: "Sie ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) haben mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] als [SCOPE.sCountry('target').GetAltName('NOM')] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])."
 academics.2010.t: "Wir haben den Wettlauf um die Sterne gewonnen"
 academics.2010.d_rival: "Wir haben mehr astronomische Objekte entdeckt als [ROOT.Var('je_rival_nation_var').GetCountry.GetAltName('NOM')]. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!"
 academics.2010.d_rival_gone: "Unser Rivale im Rennen um die Sterne ist weg. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!"
 academics.2010.f: "Wir, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], sind sehr glücklich über unseren wissenschaftlichen Sieg über unseren Rivalen. Deren Wissenschaftler haben bewiesen, dass sie in der Steinzeit feststecken und nicht in der Lage sind, weitere astronomische Objekte zu entdecken. Dies ist ein großer Tag für unsere Nation!\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2011.t: "Wir haben das Rennen um die Sterne verloren"
 academics.2011.d: "Wir konnten nicht mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] als [ROOT.Var('je_rival_nation_var').GetCountry.GetAltName('NOM')] finden. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind zutiefst enttäuscht."
 academics.2011.f: "Dieses Versagen unserer Akademiker beweist einmal mehr, dass der Schwerpunkt unserer Nation nicht auf der Wissenschaft und dem wissenschaftlichen Fortschritt liegt. Wir schlagen daher vor, die Feindseligkeiten und diese Welteroberungspläne zugunsten der Wissenschaft einzustellen.\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert ein [concept_verrier_observatory]"
 academics.2012.d: "Die Mitglieder unserer [Concept('concept_academics_scientific_society','Wissenschaftlichen Gesellschaft')] fordern, dass wir in 10 oder weniger Jahren ein modernes [concept_verrier_observatory] aufbauen. Dies würde es uns ermöglichen, [concept_verrier_astronomy] zu betreiben und [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] zu finden."
 academics.2012.f: "Da heutzutage jede große Nation ein Observatorium besitzt, fordern wir, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], den Bau eines Observatoriums. Ohne ein Observatorium werden wir niemals an der Spitze der Wissenschaft stehen. Daher ist ein Observatorium eindeutig eine Notwendigkeit.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.g: "Ich brauche sofort unsere besten Architekten und Ingenieure!"
 academics.2012.h: "Wer braucht schon ein Observatorium?"
 academics.2012_goal_tt: "Sie werden ein [concept_verrier_observatory] in #n 10#! Jahren bauen müssen."
 academics.2012_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Zustimmung#! und die Kosten für die Produktionstechnologie werden um #p 5%#! für 5 Jahre reduziert, Sie werden auch #p 5%#! Loyalisten unter den Akademikern gewinnen."
 je_academics_build_observatory: "Schwerpunkt Astronomie: Bau eines Observatoriums"
 je_academics_build_observatory_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir ein [concept_verrier_observatory] bauen. Um ein Observatorium zu bauen, müssen wir mindestens eine Universität haben und entweder #b Moderne Astronomie#! erforscht haben oder einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] haben."
 academics.2013.t: "Neues Observatorium nimmt Beobachtung auf"
 academics.2013.d: "Ein neues [concept_verrier_observatory] hat seine Pforten geöffnet und mit der Beobachtung des Himmels begonnen. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind zufrieden... vorerst."
 academics.2013.f: "Nach dem Bau eines Observatoriums ist unser Land nun endlich in der Lage, den Nachthimmel zu erforschen. Ich gratuliere. Jetzt können wir tatsächlich als ein wissenschaftlich fortgeschrittenes Land betrachtet werden.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2013.g: "Wir werden die Geheimnisse des Nachthimmels lüften!"
 academics.2014.t: "Ein astronomischer Fehlschlag "
 academics.2014.d: "Wir waren nicht in der Lage, ein [concept_verrier_observatory] zu bauen. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind tief enttäuscht!"
 academics.2014.f: "Der Bau eines Observatoriums muss eine äußerst schwierige Aufgabe sein, denn unsere Nation hat es in 10 Jahren nicht geschafft! In dieser Zeit hätten wir einen neuen Planeten und Hunderte von Sternen finden oder die Bewegung vieler Kometen berechnen können. Aber ohne ein richtiges Teleskop ist das nicht möglich. Eine beschämende Vorstellung.\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "Es war die Schuld des Kometen!"
 academics.2015.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] will, dass wir den Planeten X finden"
 academics.2015.d: "Die Mitglieder unserer [Concept('concept_academics_scientific_society','Wissenschaftlichen Gesellschaft')] sind überzeugt, dass die Entdeckung des Planeten X der größte wissenschaftliche Erfolg dieses Jahrhunderts sein wird. Sie bitten uns, uns darauf zu konzentrieren, den mysteriösen Planeten zu finden, bevor es jemand anderes tut..."
 academics.2015.f: "Wir haben gehört, dass andere Nationen den Planeten X finden wollen. Aber dieser Durchbruch gehört uns allein! Wir müssen alle anderen bei dieser kolossalen Aufgabe schlagen!\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2015.g: "Konzentrieren Sie alle unsere Ressourcen auf die Suche nach diesem Planeten!"
 academics.2015.h: "Planet X? Wohl eher Planet Y..."
 academics.2015_goal_tt: "Sie müssen #b Planet X#! vor allen anderen finden. Um eine Chance zu haben, ihn zu entdecken, brauchen wir einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] und #p 1500#! entdeckte [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.2015_reward_tt: "Als Belohnung erhält die Intelligenzia #p 5 Zustimmung#! und die Kosten für die Produktionstechnologie werden um #p 5%#! für 10 Jahre gesenkt, Sie werden auch #p 10%#! Loyalisten unter den Akademikern gewinnen und Ihr [concept_verrier_astronomer] wird #p 50#! [concept_academics_experience] gewinnen."
 je_academics_find_planet_x: "Fokus auf Astronomie: Suche nach Planet X"
 je_academics_find_planet_x_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir den geheimnisvollen #o Planet X#! finden. Um eine Chance zu haben, ihn zu entdecken, brauchen wir einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] und #p 1500#! entdeckte [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 je_academics_find_planet_x_complete_tt: "Entdecken Sie #o Planet X#! vor allen anderen."
 je_academics_find_planet_x_fail_tt: "Jemand anderes hat #o Planet X#! vor Ihnen entdeckt."
 academics.2016.t: "Wir haben Planet X gefunden"
 academics.2016.d: "Wir sind die ersten, die den Planeten X gefunden haben! Das wird die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hoffentlich freuen."
 academics.2016.f: "Der Brief war mit seltsamen Formeln und Diagrammen vollgekritzelt. Es gab Flecken, die aussahen, als hätte jemand eine Flüssigkeit über den Brief geschüttet, und wenn man raten müsste, könnte man schwören, dass auch Reste von Kaviar auf dem Papier waren. Man konnte nicht aufhören, sich zu fragen, was hier passiert war."
 academics.2016.g: "Dies ist die wichtigste astronomische Entdeckung des Jahrhunderts!"
 academics.2017.t: "Wir waren zu spät dran, um Planet X zu finden"
 academics.2017.d: "Eine andere Nation hat den Planeten X vor uns entdeckt. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind von dieser Niederlage niedergeschmettert!"
 academics.2017.f: "Inakzeptabel.\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2017.g: "Das ist sowieso kein richtiger Planet!"
