 academics.141.g: "Ein wahrer Motor des Fortschritts!" #deepl:1332739962

 academics.142.t: "Unser Ingenieur, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ist jetzt ein Militäringenieur" #deepl:1283947160
 academics.142.d: "Die jahrelange Arbeit für das Militär hat sich gelohnt. Nachdem er jahrelang Festungen gebaut, neue Waffen konstruiert und unsere Soldaten ausgerüstet hat, gilt Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] nun als ein echter [concept_gaudi_military_engineer]. Hoffentlich wird er unserer Nation weiterhin dienen!" #deepl:1541338736
 academics.142.f: ""
 academics.142.g: "Das Fundament unseres Militärs entwickeln!" #deepl:2020603716

 academics.143.t: "Unser Ingenieur, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ist jetzt ein Elektroingenieur" #deepl:2329964252
 academics.143.d: "Die Kraft der Elektrizität nutzbar zu machen, war schon immer ein Traum von Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName]. Nach vielen Durchbrüchen auf diesem Gebiet gilt [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] heute als [concept_gaudi_electrical_engineer]." #deepl:1828565867
 academics.143.f: ""
 academics.143.g: "Ein Funke des Wissens!" #deepl:1064508285

 academics.144.t: "Unser Ingenieur, [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ist jetzt ein Luftfahrtingenieur" #deepl:381936232
 academics.144.d: "Lange Zeit träumten die Menschen vom Fliegen. Nun, da das Fliegen begonnen hat, war Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] an der Spitze der Luftfahrttechnik. Nach vielen Durchbrüchen auf diesem Gebiet gilt [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] heute als [concept_gaudi_aeronautical_engineer]." #deepl:1385548017
 academics.144.f: ""
 academics.144.g: "Auf in den Himmel!" #deepl:587530142

 notification_academics_yearly_experience_gain_notification_name: "Akademiker jährlich Erfahrungsgewinn" #deepl:3314794411
 notification_academics_yearly_experience_gain_notification_desc: "Jeder Akademiker, der Erfahrung sammeln kann, hat #p 5#! Erfahrung." #deepl:2695732410

 academics.1000.t: "Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] beantragt Finanzierung" #deepl:87116952
 academics.1000.d: "Unser [concept_gaudi_engineer], Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName], ist unzufrieden mit der Finanzierung der Abteilung [ROOT.Var('gaudi_engineer_var').GetCharacter.GetHerHis]. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] fordert wesentlich mehr Mittel für die Forschung [ROOT.Var('gaudi_engineer_var').GetCharacter.GetHerHis]." #deepl:1420622139
 academics.1000.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Ich hingegen betreibe echte Forschung! Forschung mit wissenschaftlichem Nutzen...\nMeine Abteilung sollte mehr Mittel erhalten! Ich arbeite gerade an einem Projekt, das unsere Welt verändern wird!\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_engineer_focus_custom_loc')]\n\nAber um das zu erreichen, brauchen wir zusätzliche Mittel!" #deepl:3713602489
 academics.1000.g: "Finanzieren Sie ihre Forschung!" #deepl:1426445985
 academics.1000.h: "Wen interessieren schon ein paar Ingenieure?" #deepl:4178489944
 academics_additional_funding_engineer_modifier: "Zusätzliche Finanzmittel für Ingenieure" #deepl:900568862
 academics_no_funding_engineer_modifier: "Keine Finanzierung von Ingenieuren" #deepl:3913664111

 dubois_humanities_receive_promotion_loc: "Die Grabräuber und Nekrophilen tragen überhaupt nichts zu unserer Gesellschaft bei!" #deepl:173083985
 dubois_natural_history_receive_promotion_loc: "Warum bekommen die Schmetterlingssammler und Monsterbauer alle Mittel und wir müssen uns mit den Resten begnügen?" #deepl:2857072473
 dubois_mathematics_receive_promotion_loc: "Es ist absolut idiotisch, dass den verrückten Tüftlern und Sternguckern alle Wünsche von den Lippen abgelesen werden, während wir uns mit den Krümeln abfinden müssen!" #deepl:1690048759

 academics_engineer_focus_atmospheric_engine_loc: "Wir versuchen, die Kraft des Dampfes zu nutzen, um Arbeiter durch Maschinen zu ersetzen. Das würde es billiger machen, Ressourcen abzubauen oder Dinge zu produzieren!" #deepl:2634301340
 academics_engineer_focus_computer_loc: "Wir versuchen, eine Maschine zu bauen, die alle Arten von Berechnungen durchführen kann. Das würde menschliche Computer überflüssig machen. Wir könnten alles mit höchster Präzision und ohne jeden Fehler berechnen!" #deepl:170889960
 academics_engineer_focus_washing_machine_loc: "Unser Ziel ist es, eine Maschine zu entwickeln, die Wäsche waschen kann, ohne dass man dafür arbeiten muss. Das würde unsere Gesellschaft revolutionieren, da wir unsere Zeit nicht mehr mit dem Waschen unserer schmutzigen Wäsche verschwenden müssten!" #deepl:3113803465
 academics_engineer_focus_lighter_loc: "Können Sie sich vorstellen, wie nützlich ein kleines Taschenfeuerzeug sein könnte? Eines, das eine große Flamme erzeugt und Kerzen oder Zigaretten anzünden kann? Das ist ein Vermögen, das darauf wartet, gehoben zu werden!" #deepl:3096580613
 academics_engineer_focus_rocket_loc: "Wir wollen eine Rakete bauen, die den Weltraum erreichen kann. Man stelle sich die militärischen Anwendungen einer solchen Rakete vor. Man könnte seine Feinde treffen und sie könnten nichts dagegen tun!" #deepl:1592089927
 academics_engineer_focus_telephone_loc: "Stellen Sie sich ein Gerät vor, mit dem Sie über große Entfernungen mit jemandem sprechen können! Daran arbeiten wir gerade in unserem Labor!" #deepl:235672702
 academics_engineer_focus_combustion_engine_loc: "Züge sind toll, aber sie sind riesig und brauchen Schienen. Wie wäre es, wenn wir einen kleinen Motor bauen könnten, der ein kleines Fahrzeug antreiben kann. Dann könnte jeder überall hinfahren. Es gibt viele nützliche Anwendungen für einen solchen Motor. Und genau daran arbeitet mein Team im Moment!" #deepl:1429155959
 academics_engineer_focus_basic_research_alloys_loc: "Wir betreiben Grundlagenforschung, um so viele nützliche Legierungen wie möglich zu finden. Wenn wir die richtigen Legierungen finden, könnte das zu besseren Konstruktionen, effizienteren Maschinen und Geräten führen, die derzeit noch als unmöglich gelten!" #deepl:940762923
 academics_engineer_focus_basic_research_factory_machinery_loc: "Mein Team arbeitet daran, die in den Fabriken eingesetzten Maschinen zu verbessern. Das könnte zu einem massiven Anstieg unserer Produktion und des Wohlstands unserer Nation führen!" #deepl:103114009
 academics_engineer_focus_basic_research_housing_loc: "Wir suchen nach der effizientesten Art, Häuser zu bauen, um kostengünstig Wohnraum zu schaffen. Dies könnte der Bevölkerung helfen, sich bessere Lebensbedingungen zu leisten, und würde unseren Bausektor ankurbeln." #deepl:1812006884
 academics_engineer_focus_basic_research_urban_planing_loc: "Unsere Städte sind nicht effizient genug. Deshalb müssen wir herausfinden, wie wir die Städte effizienter machen können, um den Lebensstandard der Menschen zu erhöhen!" #deepl:477003040

 academics.1001.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] beantragt Finanzierung" #deepl:2871916919
 academics.1001.d: "Unsere [concept_verrier_astronomer], [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], fordert wesentlich mehr Mittel für [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] Observatorium. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] argumentiert, dass ohne zusätzliche Gründung, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] Team nicht in der Lage sein wird, neue [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] zu entdecken." #deepl:3703412469
 academics.1001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Unsere Arbeit ist wichtig, um die Geheimnisse von Raum und Zeit zu enträtseln. Wir könnten so viele großartige Dinge finden, wenn wir nur genug Geld hätten!\n Wir brauchen ein modernes Teleskop, mit dem wir allen anderen Ländern weit voraus sein können! Hier geht es um nationales Prestige!" #deepl:657468704
 academics.1001.g: "Finanzieren Sie ihr neues Teleskop!" #deepl:787121125
 academics.1001.h: "Was noch? Sie werden keine Sterne mehr entdecken?" #deepl:2535581125
 academics_additional_funding_astronomer_modifier: "Zusätzliche Fördermittel für Astronomen" #deepl:39747944
 academics_no_funding_astronomer_modifier: "Keine Fördermittel für Astronomen" #deepl:4036128852

 academics.1002.t: "Dr. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] beantragt Finanzierung" #deepl:3251721757
 academics.1002.d: "Unser [concept_dubois_naturalist], [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName], möchte eine Forschungsexpedition in einen wilden Teil der Welt unternehmen, der voller unbekannter Pflanzen und Tiere ist. In einer solchen Region hofft [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName], viele neue [concept_dubois_specimen] zu entdecken." #deepl:875885768
 academics.1002.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Ich hingegen versuche, alle Arten der Welt zu finden! Das könnte in der Zukunft sehr wichtig sein, denn man weiß nie, wie einem neue Arten weiterhelfen. Und stell dir vor, ich könnte sogar ein neues Tier oder eine neue Pflanze nach dir benennen! Wäre das nicht toll?\n Ich brauche nur genug Geld, um diese Expedition durchzuführen." #deepl:8991383
 academics.1002.g: "Finanzieren Sie ihre Expedition!" #deepl:3287141175
 academics.1002.h: "Wir haben schon genug Arten zu Hause." #deepl:352945300
 academics_additional_funding_naturalist_modifier: "Zusätzliche Mittel für Naturalisten" #deepl:621213466
 academics_no_funding_naturalist_modifier: "Keine Finanzierung für Naturalist" #deepl:431197400

 academics.1003.t: "Dr. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] beantragt Finanzierung" #deepl:4083948850
 academics.1003.d: "Unser [concept_dubois_paleontologist], [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName], braucht dringend Geld für sein Dinosauriermuseum. Damit könnte [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] mehr [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] und [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ausstellen und so zum Ruhm unserer Nation beitragen." #deepl:527544442
 academics.1003.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\Und das alles, während ich ein prestigeträchtiges Museum habe, das ich mir kaum leisten kann. Diese Dinosaurier sind das größte Wunder der Welt, und sie verstauben einfach! \nWenn ich genügend Geld hätte, könnte ich das Museum erweitern und mit neuen Skeletten dekorieren. Es wäre eine fantastische Sammlung, die Tausende von Besuchern in unser Land bringen würde!\nOhne Geld müsste ich meine Assistenten entlassen, und wer weiß, ob ich ohne ihre Hilfe wüsste, wo Dinosaurier ihre Köpfe haben!" #deepl:693862238
 academics.1003.g: "Finanzieren Sie das Museum!" #deepl:132716262
 academics.1003.h: "Die nächste [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe] möchte Finanzmittel für einen Jurassic Park oder ähnliches. Nein danke!" #deepl:2211441692
 academics_additional_funding_paleontologist_modifier: "Zusätzliche Mittel für Paläontologen" #deepl:1528212916
 academics_no_funding_paleontologist_modifier: "Keine Finanzierung für Paläontologen" #deepl:2002617469

 academics.1004.t: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] beantragt Finanzierung" #deepl:948289961
 academics.1004.d: "Unser [concept_lepsius_archaeologist], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName], braucht dringend Geld, um weitere Expeditionen und Ausgrabungen zu organisieren. Nur so kann unser Land mit den anderen Mächten mithalten." #deepl:1795194423
 academics.1004.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\nAlle anderen Länder schicken täglich neue Expeditionen in die ganze Welt und plündern die archäologischen Schätze, während unser Museum leer bleibt. Das ist inakzeptabel!\n Meine Teams brauchen dringend Geld, um mithalten zu können. Was, wenn wir ein Königsgrab verpassen, nur weil wir nicht genug Geld haben? Stellen Sie sich vor, unsere Rivalen werden von der ganzen Welt gefeiert und wir haben keinen Erfolg!" #deepl:4181940162
 academics.1004.g: "Geben Sie ihnen mehr Mittel!" #deepl:1684802854
 academics.1004.h: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] will nur Mittel für [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] verschwenderischen Lebensstil!" #deepl:926585882
 academics_additional_funding_archaeologist_modifier: "Zusätzliche Mittel für Archäologen" #deepl:153876987
 academics_no_funding_archaeologist_modifier: "Keine Finanzierung für Archäologen" #deepl:3304639149

 academics.1005.t: "Dr. [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] beantragt Finanzierung" #deepl:1844592950
 academics.1005.d: "Unser [concept_lepsius_anthropologist], [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName], braucht dringend Geld, um weitere Expeditionen und Ausgrabungen zu organisieren. Nur so kann unser Land mit den anderen Mächten mithalten." #deepl:1422789159
 academics.1005.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\nAlle anderen Länder konzentrieren sich darauf, das älteste fehlende Glied in unserer Evolution zu finden, während wir einige Knochen aus dem Mittelalter haben... Das ist inakzeptabel!\nMeine Teams brauchen dringend Geld, um mithalten zu können. Stellen Sie sich vor, die Knochen des ersten Menschen liegen in unserem Land und werden dann von irgendwelchen Arbeitern zerstört, die sich überhaupt nicht darum kümmern. Wenn wir keine Finanzierung erhalten, haben wir keine Chance, diese Skelette zu finden! Was, wenn unsere Konkurrenten den ersten Menschen finden und beweisen, dass ihr Land den Ursprung der Menschheit beherbergt?" #deepl:2256368946
 academics.1005.g: "Geben Sie ihnen mehr Mittel!" #deepl:1684802854
 academics.1005.h: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe] um einen Schädel zu schmieden und berühmt zu werden!" #deepl:3157980678
 academics_additional_funding_anthropologist_modifier: "Zusätzliche Mittel für Anthropologen" #deepl:4210527371
 academics_no_funding_anthropologist_modifier: "Keine Finanzierung für Anthropologen" #deepl:3602687298

 academics.2001.t: "Die Website [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert uns auf, uns auf die Beobachtung des Himmels zu konzentrieren." #deepl:2512556470
 academics.2001.d: "In unserem Land gibt es noch nicht viel astronomische Forschung und wir haben noch nicht einmal einen Leiter [concept_verrier_astronomer]. Deshalb möchte die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], dass wir eine neue Sternenkarte erstellen und einen Chefastronomen ernennen." #deepl:2445206218
 academics.2001.f: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] bittet Sie, Ihr Engagement für die Astronomie zu verstärken. Ein solcher Schwerpunkt würde es uns ermöglichen, neue Erkenntnisse über den Himmel und das Universum zu gewinnen.\n Deshalb bitten wir Sie, erstens eine neue, aktualisierte Sternkarte zu erstellen und zweitens einen Chefastronomen einzustellen.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:317824818
 academics.2001.g: "Ad Astra!" #deepl:1676220937
 academics.2001.h: "Sterne? Wir haben Besseres zu tun!" #deepl:2692491505
 academics_unhappy_intelligentsia: "Die wissenschaftliche Gesellschaft ist unglücklich" #deepl:3969456497
 academics.2001_goal_tt: "Sie müssen #p 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdecken und eine [concept_verrier_astronomer] in #n 10#! Jahren erhalten." #deepl:3550654559
 academics.2001_reward_tt: "Als Belohnung erhält dein Astronom #p 15 Erfahrung#!, zusätzlich erhält die Intelligenz #p 5 Zulassung#! und die Kosten für Produktionstechnologie werden um #p 5%#! für 3 Jahre reduziert." #deepl:2809120345

 je_academics_find_more_stars: "Fokus auf Astronomie: Die Sternkarte" #deepl:264882775
 je_academics_find_more_stars_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir [JournalEntry.GetGoalAddValue] neue [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] finden, um eine neue Sternkarte zu erstellen und einen neuen Chef [concept_verrier_astronomer] zu ernennen. \n\nBisher haben wir [JournalEntry.GetGoalProgressValue] #b  Astronomische Objekte#! gefunden." #deepl:2485551159
 je_academics_find_more_stars_success: "Finden Sie #p 75#! neue #b Astronomische Objekte#!" #deepl:153013758
 je_academics_find_more_stars_event_tt: "Unsere neue [concept_verrier_astronomer] wird die neue Sternkarte präsentieren" #deepl:1726606037
 je_academics_find_more_stars_goal: ""

 academics.2002.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] präsentiert eine neue Sternkarte" #deepl:3376312827
 academics.2002.d: "Wir konnten eine neue Sternkarte erstellen und haben einen neuen Chef [concept_verrier_astronomer] gefunden. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wird sich freuen!" #deepl:1234105435
 academics.2002.f: "\"Diese neue Sternkarte ist sehr präzise! Ich habe sie mit denen anderer Nationen verglichen, und unsere ist offensichtlich die beste. Außerdem haben wir viele neue Sterne gefunden, von denen einige sehr faszinierend sind! Dieser hier hat zum Beispiel mehr rotes Licht als sonst...\"" #deepl:117455019
 academics.2002.g: "Hurra!" #deepl:847704960
 academics_scientific_society_happy: "Die wissenschaftliche Gesellschaft ist glücklich" #deepl:3817744160

 academics.2003.t: "Unser Fokus auf Astronomie ist gescheitert!" #deepl:2191076072
 academics.2003.d: "Wir waren nicht in der Lage, uns ausreichend auf die Astronomie zu konzentrieren, um die Ziele zu erreichen, die uns die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] vorgegeben hat." #deepl:2429320559
 academics.2003.f: "\"Es scheint, dass Krieg, Wirtschaft und sogar Wein und Alkohol für unsere Politiker wichtiger sind als die Wissenschaft. Wir sind enttäuscht. Hoffentlich kehrt der Fokus unserer großen Nation bald zur Wissenschaft zurück!\"" #deepl:3786453677
 academics.2003.g: "Wie schade!" #deepl:255439877

 academics.2004.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert eine neue Sternkarte von unserem [concept_verrier_astronomer]" #deepl:2421592170
 academics.2004.d: "Der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] zufolge muss sich unsere Nation auf die Vermessung des Himmels konzentrieren. Sie forderten Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] auf, neue Sterne und andere [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] zu finden und eine neue Sternkarte zu erstellen." #deepl:1500639254

 academics.2004_goal_tt: "Sie werden #p 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] in #n 10#! Jahren entdecken müssen." #deepl:3179593989
 academics.2004_reward_tt: "Als Belohnung erhält dein Astronom #p 25 Erfahrung#!, zusätzlich erhält die Intelligenz #p 5 Zulassung#! und die Kosten für Produktionstechnologie werden um #p 5%#! für 3 Jahre reduziert." #deepl:1313875586

 je_academics_create_star_chart: "Fokus auf Astronomie: Die Sternkarte unseres Astronomen" #deepl:1435663704
 je_academics_create_star_chart_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass unsere [concept_verrier_astronomer] [JournalEntry.GetGoalAddValue] neue [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] findet, um eine neue Sternkarte zu erstellen.\n\nBislang haben wir [JournalEntry.GetGoalProgressValue] #b  Astronomische Objekte#! gefunden." #deepl:379085582
 je_academics_create_star_chart_success: "#p 100#! neue #b Astronomische Objekte finden#!" #deepl:516378880
 je_academics_create_star_chart_event_tt: "Unsere [concept_verrier_astronomer] wird die neue Sternkarte vorstellen." #deepl:2992828281
 je_academics_create_star_chart_event_without_astronomer_tt: "Unsere neue Sternkarte wird veröffentlicht." #deepl:4123861580
 je_academics_create_star_chart_failed_event_tt: "Unsere [concept_verrier_astronomer] stellt die neue Sternenkarte nicht zur Verfügung." #deepl:3685287000
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Nachdem wir [concept_verrier_astronomer] verloren haben, werden wir keine Sternkarte zur Verfügung stellen." #deepl:1052146365
 je_academics_create_star_chart_goal: ""

 academics.2005.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] präsentiert eine neue Sternkarte" #deepl:3376312827
 academics.2005.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] war von seinen Kollegen umringt, als sie miteinander auf ihn anstießen.\n\n\"Lieber Freund, ich wusste, dass du das leicht schaffen würdest. Ihre neue Sternkarte ist außergewöhnlich! Ein wahres Meisterwerk!\"" #deepl:272531185

 academics.2006.t: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] hat versagt!" #deepl:1483103483
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] hat es nicht geschafft, eine neue Sternkarte zu erstellen. Er war nicht in der Lage, genügend Sterne und andere [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] zu finden, um sie zu erstellen. Der Rest von [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ist sehr enttäuscht über seinen Misserfolg." #deepl:366679177
 academics.2006.f: "Sehr geehrte [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName],\n\n Wir haben festgestellt, dass Sie nicht in der Lage waren, eine neue Sternkarte einzureichen, was einmal mehr zeigt, dass Sie andere Aktivitäten der Wissenschaft vorziehen. Leider wirft dies ein schlechtes Licht auf unsere Gesellschaft. Für die Zukunft erwarten wir Besseres!\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:864588379
 academics.2006.g: "Wie schade!" #deepl:255439877

 academics.2007.t: "Eine neue Sternkarte" #deepl:1288082103
 academics.2007.d: "In Abwesenheit unseres ehemaligen [concept_verrier_astronomer] wurde die neue Sternkarte auf der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] vorgestellt. Die Akademiker scheinen mit der neuen Karte recht zufrieden zu sein." #deepl:4283345433
 academics.2007.f: "\"Dank dieser neuen Sternkarte werden wir den Himmel noch besser studieren können! Hoffentlich werden wir viele neue Erkenntnisse darüber finden, wie sich diese Körper bewegen!\nDas war nur möglich dank der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]! Einen Toast auf uns, meine Herren!\"" #deepl:3801738038

 academics.2008.t: "Kein Astronom, keine Sternkarte" #deepl:1105397347
 academics.2008.d: "Der Verlust unserer [concept_verrier_astronomer] führte zu weniger Entdeckungen von Sternen und anderen [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], als wir erwartet hatten. Wir waren daher nicht in der Lage, genug zu finden, um eine neue Sternkarte zu erstellen. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ist über dieses Ergebnis nicht erfreut." #deepl:1577949371
 academics.2008.f: "\"Unsere Regierung hat nicht nur ihren brillanten Chefastronomen verloren, sie war auch nicht in der Lage, unsere Astronomen bei ihrer Arbeit ausreichend zu unterstützen. Das Ergebnis sind weit weniger Beobachtungen. Das bedeutet, dass wir in unserer astronomischen Forschung zurückfallen werden. Das ist wirklich schrecklich!\"" #deepl:4018258376

 academics.2009.t: "Wir müssen mehr Sterne finden als [SCOPE.sCountry('rival_scope').GetName]" #deepl:1308967876
 academics.2009.d: "Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind unglücklich darüber, dass [SCOPE.sCountry('rival_scope').GetName] mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt hat als unsere Nation. Sie fordern uns auf, in 10 Jahren mehr #b Astronomische Objekte#! insgesamt als [SCOPE.sCountry('rival_scope').GetName] zu finden." #deepl:1905001335
 academics.2009.f: "Es ist eine Schande, dass eine so unbedeutende Nation wie [SCOPE.sCountry('rival_scope').GetName] mehr astronomische Objekte gefunden hat als wir. Wir müssen diese unzivilisierten Amateurastronomen so bald wie möglich überholen und insgesamt mehr astronomische Objekte finden als sie.\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:1163003051
 academics.2009_goal_tt: "Sie müssen in 10#! Jahren mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdecken als Ihr Konkurrent, [SCOPE.sCountry('rival_scope').GetName], #n . Sie haben [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], wir haben [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]." #deepl:3357639812
 academics.2009_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Genehmigungen#! und Sie erhalten #p 10%#! mehr Prestige für 4 Jahre." #deepl:2294292191
 academics.2009.g: "Lasst sie uns schlagen!" #deepl:2707466735
 academics.2009.h: "Dies ist kein Weltraumrennen..." #deepl:940727870

 academics_no_competition_with_rival: "Das Rennen um die Sterne verloren" #deepl:2253230611
 academics_competition_with_rival_won: "Gewann das Rennen um die Sterne" #deepl:3288586222

 je_academics_rivalry_for_stars: "Fokus auf Astronomie: Der Wettlauf der Sterne" #deepl:1047627516
 je_academics_rivalry_for_stars_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] finden als unsere Konkurrenten [SCOPE.sCountry('target').GetName]. \n\nUnsere #b Astronomischen Objekte#!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'s #b Astronomische Objekte#!: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]" #deepl:949466737
 je_academics_rivalry_for_stars_success: "Sie ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) haben mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] als [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])." #deepl:1873291883

 academics.2010.t: "Wir haben das Race for the Stars gewonnen" #deepl:1835179177
 academics.2010.d_rival: "Wir haben mehr astronomische Objekte entdeckt als [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!" #deepl:3996896664
 academics.2010.d_rival_gone: "Unser Rivale im Rennen um die Sterne ist weg. Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] und unsere Bevölkerung sind begeistert von diesem Sieg unserer Nation!" #deepl:1551446723
 academics.2010.f: "Wir, die Mitglieder von [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], sind sehr glücklich über unseren wissenschaftlichen Sieg über unseren Rivalen. Deren Wissenschaftler haben bewiesen, dass sie in der Steinzeit feststecken und nicht in der Lage sind, weitere astronomische Objekte zu entdecken. Dies ist ein großer Tag für unsere Nation!\n\nUnterzeichnet, die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2059487175

 academics.2011.t: "Wir haben das Rennen um die Sterne verloren" #deepl:2741713553
 academics.2011.d: "Wir konnten nicht mehr [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] als [ROOT.Var('je_rival_nation_var').GetCountry.GetName] finden. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind zutiefst enttäuscht." #deepl:18327329
 academics.2011.f: "Dieses Versagen unserer Akademiker beweist einmal mehr, dass der Schwerpunkt unserer Nation nicht auf der Wissenschaft und dem wissenschaftlichen Fortschritt liegt. Wir schlagen daher vor, die Feindseligkeiten und diese Welteroberungspläne zugunsten der Wissenschaft einzustellen.\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3826354617

 academics.2012.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] fordert eine [concept_verrier_observatory]" #deepl:4153805773
 academics.2012.d: "Die Mitglieder unserer [concept_academics_scientific_society] fordern, dass wir in 10 oder weniger Jahren eine moderne [concept_verrier_observatory] aufbauen. Dies würde es uns ermöglichen, [concept_verrier_astronomy] zu betreiben und [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] zu finden." #deepl:374993013
 academics.2012.f: "Da heutzutage jede große Nation ein Observatorium besitzt, fordern wir, die Mitglieder von [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], den Bau eines Observatoriums. Ohne eine Sternwarte werden wir niemals an der Spitze der Wissenschaft stehen. Daher ist eine Sternwarte eindeutig eine Notwendigkeit.\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:2576601799
 academics.2012.g: "Ich brauche sofort unsere besten Architekten und Ingenieure!" #deepl:2501026154
 academics.2012.h: "Wer braucht schon eine Sternwarte?" #deepl:1102319739
 academics.2012_goal_tt: "Sie werden eine [concept_verrier_observatory] in #n 10#! Jahren bauen müssen." #deepl:26532360
 academics.2012_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Genehmigungen#! und die Kosten für die Produktionstechnologie werden um #p 5%#! für 5 Jahre reduziert, Sie werden auch #p 5%#! Loyalisten unter den Akademikern gewinnen." #deepl:1927198809

 je_academics_build_observatory: "Schwerpunkt Astronomie: Bau eines Observatoriums" #deepl:1507024410
 je_academics_build_observatory_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir eine [concept_verrier_observatory] bauen. Um ein Observatorium zu bauen, müssen wir mindestens eine Universität haben und entweder #b Moderne Astronomie#! erforschen oder eine [concept_verrier_astronomer] haben." #deepl:1556891984

 academics.2013.t: "Neue Sternwarte nimmt Beobachtung auf" #deepl:3100495651
 academics.2013.d: "Ein neues [concept_verrier_observatory] hat seine Pforten geöffnet und mit der Beobachtung des Himmels begonnen. Die Mitglieder von [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind zufrieden... vorerst." #deepl:3703943128
 academics.2013.f: "Nach dem Bau eines Observatoriums ist unser Land nun endlich in der Lage, den Nachthimmel zu erforschen. Ich gratuliere. Jetzt können wir tatsächlich als ein wissenschaftlich fortgeschrittenes Land betrachtet werden.\n\nUnterzeichnet, die Mitglieder des [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3755135551
 academics.2013.g: "Wir werden die Geheimnisse des Nachthimmels lüften!" #deepl:2292371615

 academics.2014.t: "Ein astronomischer Fehlschlag " #deepl:2209981656
 academics.2014.d: "Wir waren nicht in der Lage, eine [concept_verrier_observatory] zu bauen. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind tief enttäuscht!" #deepl:2581956418
 academics.2014.f: "Der Bau eines Observatoriums muss eine äußerst schwierige Aufgabe sein, denn unsere Nation hat es in 10 Jahren nicht geschafft! In dieser Zeit hätten wir einen neuen Planeten und Hunderte von Sternen finden oder die Bewegung vieler Kometen berechnen können. Aber ohne ein richtiges Teleskop ist das nicht möglich. Eine beschämende Vorstellung.\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3274119837
 academics.2014.g: "Es war die Schuld des Kometen!" #deepl:1837389975

 academics.2015.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] will, dass wir den Planeten X finden" #deepl:685044251
 academics.2015.d: "Die Mitglieder unserer [concept_academics_scientific_society] sind überzeugt, dass die Entdeckung des Planeten X der größte wissenschaftliche Erfolg dieses Jahrhunderts sein wird. Sie bitten uns, uns darauf zu konzentrieren, den mysteriösen Planeten zu finden, bevor es jemand anderes tut..." #deepl:3513971832
 academics.2015.f: "Wir haben gehört, dass andere Nationen den Planeten X finden wollen. Aber dieser Durchbruch gehört uns allein! Wir müssen alle anderen bei dieser kolossalen Aufgabe schlagen!\n\nUnterzeichnet, Der Rat der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]" #deepl:3912107366
 academics.2015.g: "Konzentrieren Sie alle unsere Ressourcen auf die Suche nach diesem Planeten!" #deepl:1997309097
 academics.2015.h: "Planet X? Wohl eher Planet Y..." #deepl:653842949
 academics.2015_goal_tt: "Sie müssen #b Planet X#! vor allen anderen finden. Um eine Chance zu haben, ihn zu entdecken, brauchen wir eine [concept_verrier_astronomer] und #p 1500#! entdeckt [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #deepl:934678875
 academics.2015_reward_tt: "Als Belohnung erhält die Intelligencia #p 5 Genehmigungen#! und die Kosten für die Produktionstechnologie werden um #p 5%#! für 10 Jahre gesenkt, Sie werden auch #p 10%#! Loyalisten unter den Akademikern gewinnen und Ihre [concept_verrier_astronomer] wird #p 50#! [concept_academics_experience] gewinnen." #deepl:2004971909

 je_academics_find_planet_x: "Fokus auf Astronomie: Suche nach Planet X" #deepl:2096220937
 je_academics_find_planet_x_reason: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] möchte, dass wir den geheimnisvollen #o Planet X#! finden. Um eine Chance zu haben, ihn zu entdecken, brauchen wir eine [concept_verrier_astronomer] und #p 1500#! entdeckte [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]." #deepl:2620583512
 je_academics_find_planet_x_complete_tt: "Entdecken Sie #o Planet x#! vor allen anderen." #deepl:3672752360
 je_academics_find_planet_x_fail_tt: "Jemand anderes hat #o Planet x#! vor Ihnen entdeckt." #deepl:424285330

 academics.2016.t: "Wir haben Planet X gefunden" #deepl:3584438705
 academics.2016.d: "Wir sind die ersten, die den Planeten X gefunden haben! Das wird die [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] hoffentlich freuen." #deepl:2188131610
 academics.2016.f: "Der Brief war mit seltsamen Formeln und Diagrammen vollgekritzelt. Es gab Flecken, die aussahen, als hätte jemand eine Flüssigkeit über den Brief geschüttet, und wenn man raten müsste, könnte man schwören, dass auch Reste von Kaviar auf dem Papier waren. Man konnte nicht aufhören, sich zu fragen, was hier passiert war." #deepl:43871735
 academics.2016.g: "Dies ist die wichtigste astronomische Entdeckung des Jahrhunderts!" #deepl:2235595021

 academics.2017.t: "Wir waren zu spät dran, um Planet X zu finden" #deepl:3726034679
 academics.2017.d: "Eine andere Nation hat den Planeten X vor uns entdeckt. Die Mitglieder der [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] sind von dieser Niederlage niedergeschmettert!" #deepl:1021798119
 academics.2017.f: "Inakzeptabel.\n\nDie [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]." #deepl:2239395352
 academics.2017.g: "Das ist sowieso kein richtiger Planet!" #deepl:190298822

