 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
 mendelejew_chemist_achievements_intro_loc: "#V Errungenschaften dieses Chemikers#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein versierter Chemiker.#!"
 mendelejew_chemist_theorized_elementes_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V theorisiert [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Elemente#!.#!"
 mendelejew_chemist_discovered_elementes_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V entdeckt [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Elemente#!.#!"
 mendelejew_chemist_isolated_elementes_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V isolierte [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Elemente#!.#!"
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] ist berühmt für die #V Erfindung des Periodensystems#!.#!"
 mendelejew_chemist_achievement_invented_dynamite_loc: "\n #indent_newline:3 • Mit der #V Erfindung des Dynamits#! hat [Scope.GetCharacter.GetFullNameNoFormatting] die Welt verändert, sei es im Bergbau, im Bauwesen oder im Krieg.#!"
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n #indent_newline:3 • Die #V Entdeckung der Edelgase#! machte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zu einem der berühmtesten Chemiker aller Zeiten.#!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n #indent_newline:3 • Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] entdeckte den Grund für die Fraunhofer-Linien und legte damit den Grundstein für die Astrospektroskopie.#!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] machte es möglich, #V Öl synthetisch zu erzeugen#!.#!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n #indent_newline:3 • Mit der #V Erfindung von synthetischem Kautschuk#! befreite Dr. [Scope.GetCharacter.GetLastNameNoFormatting] die Welt von der Notwendigkeit, Kautschuk von Bäumen zu sammeln.#!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war einer der Teilnehmer des #V ersten Internationalen Chemiker-Kongresses#!.#!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat viel Zeit damit verbracht zu erforschen, wie #V Düngemittel und ihre Herstellung verbessert werden können#!.#!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist ein Pionier in der Herstellung von #V verbesserten Sprengstoffen und den chemischen Reaktionen zu deren Herstellung#!.#!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n #indent_newline:3 • Bekannt für [Scope.GetCharacter.GetHerHis]e Arbeiten zur Verbesserung von #V Kunststoffen und deren Herstellung#!, ist Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bei anderen Chemikern und der chemischen Industrie sehr angesehen.#!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] erreichte den wissenschaftlichen Meilenstein, #V die erste Person zu sein, die Radioaktivität entdeckte#!.#!"
 mendelejew_chemist_achievements_no_chemist_loc: "The #V Achievements of this [concept_mendelejew_chemist]#! will be displayed here, once you have one."