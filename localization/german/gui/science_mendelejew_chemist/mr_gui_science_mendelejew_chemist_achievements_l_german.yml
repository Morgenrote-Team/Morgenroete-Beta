calizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)]" #deepl:3647271493
 mendelejew_chemist_no_chemist_loc: "Die #V Errungenschaften dieser [concept_mendelejew_chemist]#! werden hier angezeigt, sobald Sie eine haben." #deepl:991875360
 mendelejew_chemist_achievements_intro_loc: "#V Errungenschaften dieses Chemikers#!\n[Scope.GetCharacter.GetFullName] ist ein erfahrener Chemiker." #deepl:4244956880

 mendelejew_chemist_theorized_elementes_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  theorisiert [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] Elemente#!." #deepl:634278548
 mendelejew_chemist_discovered_elementes_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckt [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] Elemente#!." #deepl:156380566
 mendelejew_chemist_isolated_elementes_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  isolierte [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Elemente#!." #deepl:2897673687
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] ist berühmt für die #V Erfindung des Periodensystems#!." #deepl:3277759785
 mendelejew_chemist_achievement_invented_dynamite_loc: "\nMit der #V Erfindung des Dynamits#! hat [Scope.GetCharacter.GetFullNameNoFormatting] die Welt verändert, sei es im Bergbau, im Bauwesen oder im Krieg." #deepl:1710785871
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\nDie #V Entdeckung der Edelgase#! machte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zu einem der berühmtesten Chemiker aller Zeiten." #deepl:4129935898
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\nDr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] entdeckte den Grund für die Fraunhofer-Linien und legte damit den Grundstein für die Astrospektroskopie." #deepl:518694575
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n[Scope.GetCharacter.GetSheHe] wurde es möglich, #V Öl synthetisch zu erzeugen#!." #deepl:226827889
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\nMit der #V Erfindung von synthetischem Kautschuk#! befreite Dr. [Scope.GetCharacter.GetLastNameNoFormatting] die Welt von der Notwendigkeit, Kautschuk von Bäumen zu sammeln." #deepl:179466189
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] war einer der Teilnehmer des #V ersten Internationalen Chemiker-Kongresses#!." #deepl:2235467193
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat viel Zeit damit verbracht zu erforschen, wie #V Düngemittel und ihre Herstellung#! verbessert werden können." #deepl:3581929820
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n[Scope.GetCharacter.GetSheHe] ist ein Pionier in der Herstellung von #V verbesserten Sprengstoffen und den chemischen Reaktionen zu deren Herstellung#!." #deepl:3224674643
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\nBekannt für [Scope.GetCharacter.GetHerHis] Arbeiten zur Verbesserung von #V Kunststoffen und deren Herstellung#!, ist Dr. [Scope.GetCharacter.GetLastNameNoFormatting] bei anderen Chemikern und der chemischen Industrie sehr angesehen." #deepl:2742424092
