l_german:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "Die #V Errungenschaften dieser [concept_klimt_painter]#! werden hier angezeigt, sobald Sie eine haben."
 klimt_painter_achievements_intro_loc: "#V Errungenschaften dieses Malers#!\n[Scope.GetCharacter.GetFullName] ist ein [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')].\n[Scope.GetCharacter.GetSheHe] hat [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0] Gemälde geschaffen, von denen [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0] als Meisterwerke angesehen werden."
 klimt_painter_achievement_vernissage_loc: "\n[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] hat seine Bilder in einer großen Vernissage ausgestellt."
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe|U] hat eine neue Kunstgalerie mit [Scope.GetCharacter.GetHerHis]en wunderbaren Gemälden eingeweiht. Sicherlich wird die Galerie in Zukunft noch viele weitere große Maler sehen!"