 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "Die #V Errungenschaften dieser [concept_dubois_naturalist]#! werden hier angezeigt, sobald Sie eine haben."
 ito_naturalist_achievements_intro_loc: "#V Achievements of this Naturalist#!\n[Scope.GetCharacter.GetFullName] is an accomplished naturalist who collected [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 ito_naturalist_achievement_total_zoo_animals_loc: "\nWährend der Amtszeit von [Scope.GetCharacter.GetHerHis] als Naturforscher wurden insgesamt [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] gefangen und zu [GetPlayer.MakeScope.GetCountry.GetName] gebracht."
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] ist bekannt für die Dokumentation von [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] in ihrem natürlichen Lebensraum."
 ito_naturalist_achievement_invented_evolution_theory_loc: "\nEine der größten Errungenschaften von [Scope.GetCharacter.GetHerHis] war das Buch \"#V On the Origin of Species#!\", in dem die Evolutionstheorie zum ersten Mal beschrieben wurde."
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] nahm an der Debatte teil, in der es darum ging, ob der Mensch einzigartig ist oder nur ein Tier wie alle anderen."
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] hat gezeigt, dass sich die #V Pfeffermotte#! entwickelt, um sich an ihre veränderte Umgebung anzupassen. Ein Beweis für die Evolutionstheorie."
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\n Auf einer #V Expedition zum Pazifischen Ozean#! erforschte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ausgiebig die Flora und Fauna dieses Wunderlandes. [Scope.GetCharacter.GetSheHe] entdeckte viele neue Arten."
 ito_naturalist_achievement_wallace_line_discovered_loc: "\nWährend einer Reise durch den Pazifik stellte [Scope.GetCharacter.GetLastNameNoFormatting] eine #V deutliche Trennung zwischen der asiatischen und der australischen Flora und Fauna#! fest. Dieser Befund unterstützt die Evolutionstheorie und deutet auf eine massive Trennung der Inseln in der Vergangenheit hin."
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] war maßgeblich an der #V Eröffnung des Zoos#! beteiligt. Ein Ort, an dem man Tiere aus fernen Ländern aus nächster Nähe sehen kann."
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\n Auf einer botanischen Expedition in den Amazonas-Regenwald fand Professor [Scope.GetCharacter.GetLastNameNoFormatting] eine #V Riesenseerose#!. Eine einzigartige Pflanze, die Blätter mit einem Durchmesser von bis zu 3 Metern bilden kann."
 ito_naturalist_achievement_found_attacus_atlas_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat während einer botanischen Expedition in Indochina einen #V Titanenfalter#! gefunden. Er ist einer der größten Schmetterlinge der Welt und produziert eine sehr robuste Seide."
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\nWährend einer botanischen Expedition auf Borneo fand Professor [Scope.GetCharacter.GetLastNameNoFormatting] eine #V Riesenblume#!, die bis zu 3 Meter hoch wächst. Ein wahres botanisches Wunder."
 ito_naturalist_achievement_found_goliathus_loc: "\nDie Regenwälder des Kongo beherbergen viele Wunder. Eines davon wurde von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] auf einer botanischen Expedition entdeckt. Der #V Goliath-Käfer#! ist eines der größten Insekten der Welt und offenbar recht selten."
 ito_natualist_achievement_forestry_improvement_finished_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] ist bekannt für seine [Scope.GetCharacter.GetHerHis] Arbeit über Wälder und die Verbesserung der Forstwirtschaft."
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n[Scope.GetCharacter.GetHerHis|U] Arbeit in Kautschukplantagen und Experimente mit den besten Anbaubedingungen ermöglichten es unserem Land, die Kautschukproduktion massiv zu verbessern."