 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "Die #V Errungenschaften dieses [Concept('concept_dubois_naturalist','#b #GREEN Naturforschers#!#!')]#! sollen hier festgehalten werden, sobald eine solche Auszeichnung erlangt wurde."
 ito_naturalist_achievements_intro_loc: "#V Errungenschaften dieses Naturforschers#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein angesehener Naturforscher, dessen fleißige Bemühungen [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] hervorgebracht haben, wodurch die Grenzen der wissenschaftlichen Erkenntnis erweitert wurden.#!"
 ito_naturalist_achievement_total_zoo_animals_loc: "\n #indent_newline:3 • Während [Scope.GetCharacter.GetHerHis]er Amtszeit als Naturforscher, wurden insgesamt [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] beschafft und an [GetPlayer.MakeScope.GetCountry.GetAltName('AKK')] weitergegeben, wodurch die zoologischen Sammlungen der Nation bereichert und die Aufklärung der Öffentlichkeit gefördert wurde.#!"
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('ito_naturalist_var').GetCharacter.GetFullName] hat der Wissenschaft einen unschätzbaren Dienst erwiesen, indem er die Dokumentation [GetPlayer.MakeScope.Var('ito_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] in ihren heimischen Lebensräumen dokumentiert und damit zum Fortschritt der Naturgeschichte beigetragen hat.#!"
 ito_naturalist_achievement_invented_evolution_theory_loc: "\n #indent_newline:3 • Zu [Scope.GetCharacter.GetHerHis]en bedeutendsten Errungenschaften gehört die Abhandlung \"#V Über die Entstehung der Arten#!\", in der die Evolutionstheorie erstmals dargelegt wurde und die den Lauf der biologischen Wissenschaft für immer veränderte.#!"
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] nahm am angesehenen Hippocampus-Kongress teil und führte eine intensive Debatte über die Einzigartigkeit des Menschen innerhalb des Tierreichs.#!"
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] erbrachte den empirischen Nachweis der Anpassung der #V Birkenspanner#! und untermauerte damit die Grundsätze der Evolutionstheorie durch sorgfältige Beobachtung.#!"
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • Auf einer #V Expedition in den Pazifischen Ozean#! führte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] erschöpfende Untersuchungen der Flora und Fauna der Region durch und entdeckte dabei zahlreiche Arten, die der Wissenschaft bisher unbekannt waren.#!"
 ito_naturalist_achievement_wallace_line_discovered_loc: "\n #indent_newline:3 • Bei der Durchquerung des Pazifiks entdeckte [Scope.GetCharacter.GetLastNameNoFormatting] eine #V deutliche Abgrenzung zwischen der asiatischen und der australischen Tierwelt#!, eine Offenbarung, die der Evolutionstheorie Glaubwürdigkeit verlieh und die uralte Trennung dieser Länder beleuchtete.#!"
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] spielte eine zentrale Rolle bei der #V Gründung der Zoologischen Gärten#!, die der Öffentlichkeit die Möglichkeit boten, exotische Arten zu beobachten und die wissenschaftliche Bildung zu fördern.#!"
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\n #indent_newline:3 • Während einer botanischen Expedition zum Amazonas entdeckte Professor [Scope.GetCharacter.GetLastNameNoFormatting] die #V Riesenseerose#!, ein Wunder der Natur, dessen Blätter einen stolzen Durchmesser von drei Metern erreichen können.#!"
 ito_naturalist_achievement_found_attacus_atlas_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] stieß auf den #V Atlasspinner#!, einen riesigen Nachtfalter aus Indochina, der durch seine Größe und die Widerstandsfähigkeit seiner Seide bemerkenswert ist und damit das entomologische Wissen bereichert.#!"
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\n #indent_newline:3 • Bei der Erkundung Borneos entdeckte Professor [Scope.GetCharacter.GetLastNameNoFormatting] die #V Amorphophallus Titanum#!, eine kolossale Blume, die bis zu drei Meter hoch wird, ein botanisches Phänomen von einzigartigem Interesse.#!"
 ito_naturalist_achievement_found_goliathus_loc: "\n #indent_newline:3 • In den Regenwäldern des Kongo fand Dr. [Scope.GetCharacter.GetLastNameNoFormatting] den #V Goliath-Käfer#!, eines der größten bekannten Insekten, dessen Seltenheit und Erhabenheit die Wissenschaft in ihren Bann gezogen hat.#!"
 ito_natualist_achievement_forestry_improvement_finished_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] ist bekannt für [Scope.GetCharacter.GetHerHis]e bahnbrechende Studien in der Forstwirtschaft, die Methoden für die nachhaltige Bewirtschaftung und Verbesserung von Waldressourcen vorantreiben.#!"
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n #indent_newline:3 • Durch fleißiges Experimentieren im Kautschukanbau haben [Scope.GetCharacter.GetHerHis]e Bemühungen die Produktivität der Plantagen stark erhöht, was der Nation einen erheblichen Nutzen bringt.#!"
 ito_naturalist_achievement_great_barrier_reef_discovered_loc: "\n #indent_newline:3 • Auf einer wissenschaftlichen Reise in den Pazifik untersuchte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] das #V Great Barrier Reef#! gründlich und erkannte als erster seine immense ökologische Bedeutung.#!"