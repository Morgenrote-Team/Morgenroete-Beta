l_german:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Das Transatlantik-Kabel#!\nDie Telegrafie ermöglicht den Austausch von Informationen mit einer bisher unbekannten Geschwindigkeit. Durch die Einrichtung einer Telegrafenstation auf beiden Seiten des Atlantiks besteht die Möglichkeit, ein unterseeisches Telegrafenkabel zu verlegen, um Europa und Amerika einander näher zu bringen. Dies erfordert jedoch eine geeignete Ausrüstung und einen entwickelten Nachrichtensektor, der erhebliche Investitionen tätigen würde, um ein solch kostspieliges Unterfangen lukrativ zu machen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_: "Das Suez-Indien-Kabel"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T Suez-Indien-Kabel#!\nMit der Eröffnung des Suezkanals hat die Aussicht auf die Verlegung eines direkten Unterseekabels nach Indien neue Dringlichkeit erhalten. Eine permanente telegrafische Verbindung würde die Kommunikationszeiten drastisch verkürzen und Asien enger an Europa binden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "Das Transpazifikkabel"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T Das Transpazifikkabel#!\nMit der Intensivierung des transozeanischen Handels und den Dampfschifffahrtsrouten, die Amerika mit Asien und Ozeanien verbinden, wird der Bedarf an einer ständigen telegrafischen Verbindung über den Pazifik deutlich. Ein Unterseekabel würde Monate der Kommunikation in Minuten umwandeln und Einfluss und Koordination über große maritime Entfernungen hinweg verankern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat die $mr_basic_telegraphy$-[concept_company].#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V Niemand#! hat bisher einen #V Funkspruch über den Atlantik gesendet#!.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text Der [GetBuildingType('building_suez_canal').GetName] existiert.#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_investment_pool] von mindestens #V 5 Millionen#!.#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_investment_pool] von mindestens #V 10 Millionen#!.#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_investment_pool] von mindestens #V 20 Millionen#!.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat nicht den $tesla_transatlantic_cable_expedition_failed_modifier$ Modifikator. #!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat nicht den $tesla_suez_india_cable_expedition_failed_modifier$ Modifikator. #!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat nicht den $tesla_transpacific_cable_expedition_failed_modifier$ Modifikator. #!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Das Transatlantikkabel#!\n#p Derzeit läuft eine Expedition zur Verlegung des Transatlantikkabels.#!\nDie Telegrafie ermöglicht den Austausch von Informationen mit einer bisher unbekannten Geschwindigkeit. Durch die Einrichtung einer Telegrafenstation auf beiden Seiten des Atlantiks besteht die Möglichkeit, ein unterseeisches Telegrafenkabel zu verlegen, um Europa und Amerika einander näher zu bringen. Dies erfordert jedoch eine geeignete Ausrüstung und einen entwickelten Nachrichtensektor, der erhebliche Investitionen tätigen würde, um ein solch teures Unterfangen lukrativ zu machen."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T Das Suez-Indien-Kabel#!\n#p Derzeit läuft eine Expedition zur Verlegung des Suez-Indien-Kabels.#!\nMit der Öffnung des Suezkanals hat die Aussicht auf die Verlegung eines direkten Unterseekabels nach Indien neue Dringlichkeit gewonnen. Eine ständige telegraphische Verbindung würde die Kommunikationszeiten drastisch verkürzen und Asien enger an Europa binden."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T Das Transpazifikkabel#!\n#p Derzeit läuft eine Expedition zur Verlegung des Transpazifikkabels.#!\nDa der transozeanische Handel zunimmt und die Dampfschifffahrtsrouten Amerika mit Asien und Ozeanien verbinden, wird der Bedarf an einer ständigen telegrafischen Verbindung über den Pazifik deutlich. Ein Unterseekabel würde die Kommunikation von Monaten auf Minuten verkürzen und den Einfluss und die Koordination über große Entfernungen hinweg verankern."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "Das Suez-Indien-Kabel"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n Kein#! Land hat [GetTechnology('dreadnought').GetName] oder [GetTechnology('destroyer').GetName] erforscht. Das Jahr ist auch #V vor#! 1896.#!"