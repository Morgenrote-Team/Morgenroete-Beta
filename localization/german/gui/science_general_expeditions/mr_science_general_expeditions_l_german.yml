l_german:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Das Transatlantik-Kabel#!\nDie viktorianische Wissenschaft hat das Wunder der Telegrafie vollbracht, das es ermöglicht, Informationen über große Entfernungen in nie dagewesener Geschwindigkeit zu übermitteln. Durch die Einrichtung von Telegrafenstationen auf beiden Seiten des Atlantiks entsteht die Vision, ein Unterseekabel zu verlegen - ein Kunststück, das fortschrittliche Technik und einen florierenden Nachrichtensektor erfordert, der bereit ist, in dieses ehrgeizige Unternehmen zu investieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T Suez-Indien-Kabel#!\nDie Eröffnung des Suezkanals, ein Triumph des viktorianischen Einfallsreichtums, hat das Bestreben verstärkt, Europa und Indien mit einem direkten Unterseekabel zu verbinden. Eine solche Verbindung würde die Kommunikation revolutionieren und die Kontinente durch die Kraft des wissenschaftlichen Fortschritts miteinander verbinden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "Das Transpazifikkabel"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T Das Transpazifik-Kabel#!\nWährend Dampfschiffe und Handelswege aufblühen, winkt die viktorianische Wissenschaft mit der Verlegung eines Unterseekabels über den Pazifik. Dieser technologische Sprung würde die monatelange Korrespondenz auf nur wenige Minuten verkürzen und den Einfluss und die Koordination über den größten Ozean der Welt ausweiten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat die $mr_basic_telegraphy$en [concept_company].#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V Niemand#! hat bisher einen #V Funkspruch über den Atlantik gesendet#!.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text Der [GetBuildingType('building_suez_canal').GetName] existiert.#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_investment_pool] von mindestens #V 5 Millionen#!.#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_investment_pool] von mindestens #V 10 Millionen#!.#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_investment_pool] von mindestens #V 20 Millionen#!.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat nicht den $tesla_transatlantic_cable_expedition_failed_modifier$ Modifikator.#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat nicht den $tesla_suez_india_cable_expedition_failed_modifier$ Modifikator.#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat nicht den $tesla_transpacific_cable_expedition_failed_modifier$ Modifikator.#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Das Transatlantik-Kabel#!\n#p Derzeit läuft eine Expedition zur Verlegung des Transatlantik-Kabels.#!\nDie viktorianische Wissenschaft hat das Wunder der Telegrafie erschlossen, das es ermöglicht, Informationen über große Entfernungen in nie dagewesener Geschwindigkeit zu übermitteln. Durch die Einrichtung von Telegrafenstationen auf beiden Seiten des Atlantiks entstand die Vision, ein Unterseekabel zu verlegen - ein Kunststück, das fortschrittliche Technik und einen florierenden Nachrichtensektor erfordert, der bereit ist, in dieses ehrgeizige Unternehmen zu investieren."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T Das Suez-Indien-Kabel#!\n#p Derzeit findet eine Expedition zur Verlegung des Suez-Indien-Kabels statt.#!\nDie Eröffnung des Suezkanals, ein Triumph des viktorianischen Einfallsreichtums, hat das Bestreben verstärkt, Europa und Indien mit einem direkten Unterseekabel zu verbinden. Eine solche Verbindung würde die Kommunikation revolutionieren und die Kontinente durch die Kraft des wissenschaftlichen Fortschritts miteinander verbinden."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T Das Transpazifikkabel#!\n#p Derzeit läuft eine Expedition zur Verlegung des Transpazifikkabels.#!\nWährend Dampfschiffe und Handelsrouten florieren, winkt die viktorianische Wissenschaft mit der Verlegung eines Unterseekabels über den Pazifik. Dieser technologische Sprung würde die monatelange Korrespondenz auf wenige Minuten verkürzen und den Einfluss und die Koordination über den größten Ozean der Welt ausweiten."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "Das Suez-Indien-Kabel"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n Kein#! Land hat [GetTechnology('dreadnought_tech').GetName] oder [GetTechnology('destroyer').GetName] erforscht. Das Jahr ist #V vor#! 1896.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NOT_ONGOING_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat nicht den #V $je_tesla_transatlantic_cable$#! Journaleintrag.#!"