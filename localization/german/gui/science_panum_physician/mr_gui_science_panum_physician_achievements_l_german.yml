ar('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "Die #V Errungenschaften dieses [Concept('concept_panum_physician','#b #BLUE Arztes#!#!')]#! werden hier angezeigt, sobald Sie einen haben."
 panum_physician_achievements_intro_loc: "#V Errungenschaften dieses Arztes#!\n[Scope.GetCharacter.GetFullName] ist ein erfolgreicher Arzt."
 panum_physician_achievement_successful_treatments_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] ist erfahren in der Behandlung von Patienten und hat #o erfolgreich [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] Patienten behandelt#!."
 panum_physician_achievement_epidemiologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat Krankheiten ausgiebig untersucht und ist zu einem #o $panum_epidemiologist$#! geworden."
 panum_physician_achievement_surgeon_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat viele Operationen durchgeführt und gilt daher als guter #o $panum_surgeon$#!."
 panum_physician_achievement_psychiatrist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat die menschliche Psyche ausgiebig studiert und ist ein #o renommierter $panum_psychiatrist$#!."
 panum_physician_achievement_military_physician_loc: "\nAls #o $panum_military_physician$#! hat [Scope.GetCharacter.GetSheHe] sie die Schrecken des Krieges gesehen und weiß, wie man Menschen unter schrecklichen Umständen behandelt."
 panum_physician_achievement_germ_theory_inventor_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat die #o Keimtheorie#! erfunden, die bereits Tausende von Menschenleben gerettet hat."
 panum_physician_achievement_pneumothorax_inventor_loc: "\nEine der größten Erfindungen von [Scope.GetCharacter.GetHerHim] ist ein #o Gerät zur Herbeiführung eines künstlichen Pneumothorax#!. Dadurch kollabiert die Lunge, was zur Behandlung von Tuberkulose beitragen kann."
 panum_physician_achievement_thoracoplasty_inventor_loc: "\nDank [Scope.GetCharacter.GetHerHis]er chirurgischen Fähigkeiten erfand Doktor [Scope.GetCharacter.GetLastNameNoFormatting] ein #o Verfahren, das die Lungenchirurgie revolutionierte, die so genannte Thorakoplastik#!, und ermöglichte so eine bessere Behandlung von Tuberkulosepatienten."
 panum_physician_achievement_attended_medical_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] participated in at least one #o Medical Congress#! and shared [Scope.GetCharacter.GetHerHis] ideas."
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\nDr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] gilt als der Haupterfinder von #o Aspirin#! und hat nicht nur unzähligen Patienten Schmerzlinderung verschafft, sondern auch die Pharmaindustrie revolutioniert."
 panum_physician_achievement_xray_inventor_loc: "\nMit der Entdeckung von #o Röntgenstrahlen#! gilt Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] als einer der international führenden Physiker, der Medizin und Physik gleichermaßen revolutioniert hat."
 panum_physician_achievement_bloodtypes_inventor_loc: "\nMit der Entdeckung der verschiedenen #o Blutgruppen, nämlich A, B, AB und 0#!, hat Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wesentlich dazu beigetragen, dass wir mehr über Blut als solches wissen - und dass Bluttransfusionen erfolgreicher sind."
 panum_physician_achievement_ecg_inventor_loc: "\nDas #o EKG#!, eine Erfindung von Dr. [Scope.GetCharacter.GetLastNameNoFormatting], ermöglichte die Messung der elektrischen Aktivität des Herzens und stellt einen Meilenstein im Krankenhausbetrieb dar."
 panum_physician_achievement_transplantation_inventor_loc: "\nMit der #o ersten Transplantation#! hat sich Dr. [Scope.GetCharacter.GetLastNameNoFormatting] einen Platz in der Medizingeschichte gesichert."
 panum_physician_achievement_stereotactic_method_inventor_loc: "\nBis heute gilt die #o Stereotaktische Methode#!, die [Scope.GetCharacter.GetSheHe] erfand, als bahnbrechend für die Gehirnchirurgie."
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\nMit der Entwicklung eines #o Kardiopulmonalen Bypass#! hat Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ein Meisterwerk der modernen Medizin geschaffen."
 panum_physician_achievement_endoscope_inventor_loc: "\n[Scope.GetCharacter.GetHerHis|U]e Erfindung des #o Endoskops#!, mit dem erstmals das Innere des Menschen untersucht werden konnte, ist ebenfalls besonders in Erinnerung geblieben."
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] erfand einen Apparat, der die Untersuchung von Augenkrankheiten erleichtert, und leistete damit der Augenheilkunde einen unschätzbaren Dienst: #o Das Ophthalmoskop#!."
 panum_physician_achievement_chemotherapy_inventor_loc: "\nDie #o Chemotherapie#!, die [Scope.GetCharacter.GetSheHe] entwickelte, um selbst die hartnäckigsten Krankheiten mit einer Vielzahl von Medikamenten zu behandeln, gibt selbst Krebspatienten Hoffnung, dass nicht alles umsonst ist."
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U]e #o Konstruktion der ersten eisernen Lunge#! zur Lebenserhaltung von Polio-Patienten in akuter Not gilt als eine der faszinierendsten technischen Errungenschaften unserer Zeit."
 panum_physician_achievement_military_medicine_project_finished_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat #o die neuesten Methoden auf dem Gebiet der Feldmedizin erfunden#! und den militärischen Sanitätsdienst zu einem der anerkanntesten der Welt gemacht."
 panum_physician_achievement_inaugurated_asylum_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] spielte eine entscheidende Rolle bei der Gründung des ersten psychiatrischen Asyls des Landes#o #!, um psychisch Kranken umfassende und humane Hilfe zukommen zu lassen."
 panum_physician_achievement_anthrax_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich #o auf Anthrax spezialisiert#! und wirksame Präventions- und Behandlungsmethoden dafür entwickelt."
 panum_physician_achievement_goiter_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich #o auf die Struma spezialisiert#! und wirksame Präventions- und Behandlungsmethoden dafür entwickelt."
 panum_physician_achievement_nephrolithiasis_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich #o auf Nephrolithen spezialisiert#! und wirksame Präventions- und Behandlungsmethoden dafür entwickelt."
 panum_physician_achievement_pellagra_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich #o auf die Pellagra spezialisiert#! und wirksame Präventions- und Behandlungsmethoden dafür entwickelt."
 panum_physician_achievement_rickets_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich #o auf die Rachitis spezialisiert#! und hat wirksame Präventions- und Behandlungsmethoden dafür entwickelt."
 panum_physician_achievement_syphilis_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich #o auf die Syphilis spezialisiert#! und hat wirksame Präventions- und Behandlungsmethoden dafür entwickelt."
 panum_physician_achievement_tetanus_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich #o auf Tetanus spezialisiert#! und wirksame Präventions- und Behandlungsmethoden dafür entwickelt."
 panum_physician_achievement_basketball_inventor_loc: "\n[Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] hat Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o eine neue Mannschaftssportart namens Basketball erfunden#!"