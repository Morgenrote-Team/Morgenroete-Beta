 panum_physician_no_physician_loc: "Die #V Errungenschaften dieser [concept_panum_physician]#! werden hier angezeigt, sobald Sie eine haben." #deepl:3202202811
 panum_physician_achievements_intro_loc: "#V Errungenschaften dieses Arztes#!\n[Scope.GetCharacter.GetFullName] ist ein erfolgreicher Mediziner." #deepl:2011576622

 panum_physician_achievement_successful_treatments_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] ist erfahren in der Behandlung von Patienten und hat #o erfolgreich [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] Patienten#! behandelt." #deepl:2185896488
 panum_physician_achievement_epidemiologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat Krankheiten ausgiebig untersucht und ist zu einem #o $panum_epidemiologist$ #! geworden." #deepl:1702393838
 panum_physician_achievement_surgeon_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat viele Operationen durchgeführt und gilt daher als guter #o $panum_surgeon$ #! ." #deepl:3171499380
 panum_physician_achievement_psychiatrist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat die menschliche Psyche ausgiebig studiert und ist ein #o renommierter $panum_psychiatrist$#! ." #deepl:60079648
 panum_physician_achievement_military_physician_loc: "\nAls #o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] hat sie die Schrecken des Krieges gesehen und weiß, wie man Menschen unter schrecklichen Umständen behandelt." #deepl:696092700
 panum_physician_achievement_germ_theory_inventor_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat die #o Keimtheorie#! erfunden, die bereits Tausende von Menschenleben gerettet hat." #deepl:2770995117
 panum_physician_achievement_pneumothorax_inventor_loc: "\nEine der größten Erfindungen von [Scope.GetCharacter.GetHerHim] ist ein #o Gerät zur Herbeiführung eines künstlichen Pneumothorax#!. Dadurch kollabiert die Lunge, was zur Behandlung von Tuberkulose beitragen kann." #deepl:304953214
 panum_physician_achievement_thoracoplasty_inventor_loc: "\nDank [Scope.GetCharacter.GetHerHis] chirurgischen Fähigkeiten erfand Doktor [Scope.GetCharacter.GetLastNameNoFormatting] ein #o Verfahren, das die Lungenchirurgie revolutionierte, die so genannte Thorakoplastik#!, und ermöglichte so eine bessere Behandlung von Tuberkulosepatienten." #deepl:3014173894
 panum_physician_achievement_attended_medical_congress_loc: "\n[Scope.GetCharacter.GetSheHe] hat an mindestens einem #o Medizinischen Kongress#! teilgenommen und [Scope.GetCharacter.GetHerHis] Ideen ausgetauscht." #deepl:1479296090
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\nDr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] gilt als der Haupterfinder von #o Aspirin#! und hat nicht nur unzähligen Patienten Schmerzlinderung verschafft, sondern auch die Pharmaindustrie revolutioniert." #deepl:2162525717
 panum_physician_achievement_xray_inventor_loc: "\nMit der Entdeckung von #o Röntgenstrahlen#! gilt Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] als einer der international führenden Physiker, der Medizin und Physik gleichermaßen revolutioniert hat." #deepl:34275984
 panum_physician_achievement_bloodtypes_inventor_loc: "\nMit der Entdeckung der verschiedenen #o Blutgruppen, nämlich A, B, AB und 0#!, hat Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wesentlich dazu beigetragen, dass wir mehr über Blut als solches wissen - und dass Bluttransfusionen erfolgreicher sind." #deepl:3740473168
 panum_physician_achievement_ecg_inventor_loc: "\nDas #o EKG#!, eine Erfindung von Dr. [Scope.GetCharacter.GetLastNameNoFormatting], ermöglichte die Messung der elektrischen Aktivität des Herzens und stellt einen Meilenstein im Krankenhausbetrieb dar." #deepl:2321856106
 panum_physician_achievement_transplantation_inventor_loc: "\nMit der #o ersten Transplantation#! hat sich Dr. [Scope.GetCharacter.GetLastNameNoFormatting] einen Platz in der Medizingeschichte gesichert." #deepl:2933890993
 panum_physician_achievement_stereotactic_method_inventor_loc: "\nBis heute gilt die #o Stereotaktische Methode#! [Scope.GetCharacter.GetSheHe] als bahnbrechend für die Gehirnchirurgie." #deepl:147308326
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\nMit der Entwicklung eines #o Cardiopulmonalen Bypasses#! hat Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ein Meisterwerk der modernen Medizin geschaffen." #deepl:3531788201
 panum_physician_achievement_endoscope_inventor_loc: "\n[Scope.GetCharacter.GetHerHis|U] besonders in Erinnerung geblieben ist auch die Erfindung des #o Endoskops#!, mit dem erstmals das Innere des Menschen untersucht werden konnte." #deepl:2202274893
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] erfand einen Apparat, der die Untersuchung von Augenkrankheiten erleichtert, und leistete damit der Augenheilkunde einen unschätzbaren Dienst: #o Das Ophthalmoskop#!." #deepl:657308744
 panum_physician_achievement_chemotherapy_inventor_loc: "\nDie #o Chemotherapie#! [Scope.GetCharacter.GetSheHe] entwickelt, um selbst die hartnäckigsten Krankheiten mit einer Vielzahl von Medikamenten zu behandeln, gibt selbst Krebspatienten Hoffnung, dass nicht alles umsonst ist." #deepl:1291980204
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  Der Bau der ersten eisernen Lunge#! zur Lebenserhaltung von Polio-Patienten in akuter Not gilt als eine der faszinierendsten technischen Errungenschaften unserer Zeit." #deepl:2605796385
 panum_physician_achievement_military_medicine_project_finished_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat #o die neuesten Methoden auf dem Gebiet der Feldmedizin#! erfunden und den militärischen Sanitätsdienst zu einem der anerkanntesten der Welt gemacht." #deepl:3753274088
 panum_physician_achievement_inaugurated_asylum_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] spielte eine entscheidende Rolle bei der Gründung des ersten psychiatrischen Asyls des Landes #o #! , um psychisch Kranken umfassende und humane Hilfe zukommen zu lassen." #deepl:2471346129
 panum_physician_achievement_anthrax_disease_loc: "#o \nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich auf Anthrax#! spezialisiert und wirksame Präventions- und Behandlungsmethoden dafür entwickelt." #deepl:2201385397
 panum_physician_achievement_goiter_disease_loc: "#o \nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich auf den Kropf#! spezialisiert und wirksame Präventions- und Behandlungsmethoden dafür entwickelt." #deepl:693298154
 panum_physician_achievement_nephrolithiasis_disease_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich #o auf die Nephrolithiasis#! spezialisiert und wirksame Präventions- und Behandlungsmethoden dafür entwickelt." #deepl:3950905505
 panum_physician_achievement_pellagra_disease_loc: "#o \nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich auf die Pellagra#! spezialisiert und wirksame Präventions- und Behandlungsmethoden dafür entwickelt." #deepl:1987809959
 panum_physician_achievement_rickets_disease_loc: "#o \nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich auf die Rachitis#! spezialisiert und hat wirksame Präventions- und Behandlungsmethoden dafür entwickelt." #deepl:660217329
 panum_physician_achievement_syphilis_disease_loc: "#o \nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich auf die Syphilis#! spezialisiert und hat wirksame Präventions- und Behandlungsmethoden dafür entwickelt." #deepl:908555016
 panum_physician_achievement_tetanus_disease_loc: "#o \nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sich auf den Tetanus#! spezialisiert und wirksame Präventions- und Behandlungsmethoden dafür entwickelt." #deepl:1982558023
 panum_physician_achievement_basketball_inventor_loc: "\nIn [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] hat Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #o  eine neue Mannschaftssportart namens Basketball erfunden.#!" #deepl:207476415
