 MR_BAN_ARTIFACT_EXPORT_BUTTON: "Artefakt-Export verbieten"
 MR_BAN_ARTIFACT_EXPORT_BUTTON_TT: "#T Exportverbot für Artefakte#!\nMit dem Verbot des Exports von Artefakten machen wir deutlich, dass wir es vorziehen, unsere archäologischen Schätze im Boden zu belassen, anstatt zu riskieren, dass sie von Ausländern ausgegraben und entfernt werden. Grundsätzlich werden wir keine Ausgrabungsgenehmigungen erteilen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ARTIFACT_EXPORT_BUTTON: "Artefakt-Export zulassen"
 MR_ALLOW_ARTIFACT_EXPORT_BUTTON_TT: "#T Artefakt-Export zulassen#!\nMit einer Exportgenehmigung für Artefakte können wir uns ein nettes Zusatzeinkommen sichern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"