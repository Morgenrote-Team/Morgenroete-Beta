 lepsius_archaeologist_no_archaeologist_loc: "Die #V Errungenschaften dieser [concept_lepsius_archaeologist]#! werden hier angezeigt, sobald Sie eine haben." #deepl:2404800686
 lepsius_archaeologist_achievements_intro_loc: "#V Errungenschaften dieses Archäologen#!\n[Scope.GetCharacter.GetFullName] ist [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')] der insgesamt [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] gesammelt hat." #deepl:2747108283

 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "eine berühmte [concept_lepsius_archaeologist]" #deepl:1164713858
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "ein erfahrener [concept_lepsius_archaeologist]" #deepl:370998510
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "ein vollendeter [concept_lepsius_archaeologist]" #deepl:139829371
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] ist Experte für #V Ägyptische Archäologie#!, von wo aus [Scope.GetCharacter.GetSheHe] kleinere Artefakte [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] gesammelt hat." #deepl:2806539652
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] ist Experte für #V Mesopotamische Archäologie#!, von wo aus [Scope.GetCharacter.GetSheHe] kleinere Artefakte [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] sammelte." #deepl:4145665032
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] ist Experte für #V Ägäische Archäologie#!, wo [Scope.GetCharacter.GetSheHe] kleinere Artefakte [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] gesammelt hat." #deepl:3137059405
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] ist Experte für #V Präkolumbianische Archäologie#!, von wo aus [Scope.GetCharacter.GetSheHe] kleinere Artefakte sammelte [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V]." #deepl:1609585460
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] ist Experte für #V Fareastern Archaeology#!, von wo aus [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] kleinere Artefakte gesammelt hat." #deepl:3392738081
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] ist Experte für #V Ozeanische Archäologie#!, von wo aus [Scope.GetCharacter.GetSheHe] kleinere Artefakte [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] gesammelt hat." #deepl:2787251010
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] nahm an dem #V Archäologischen Kongress zur Historizität des Exodus#! teil." #deepl:3946194799
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] nahm an dem #V Archäologischen Kongress über den Ursprung der Zivilisation#! teil." #deepl:395174587
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] besuchte den #V Archäologischen Kongress über die Historizität von Troja.#!" #deepl:3218356213
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\nEine der größten Errungenschaften von [Scope.GetCharacter.GetHerHis] ist die #V Erfindung des Drei-Zeitalter-Systems#!, das es den Archäologen ermöglicht, Artefakte in die Zeitabschnitte Steinzeit, Bronzezeit und Eisenzeit einzuteilen." #deepl:3435944138
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\nDurch die Anwendung stratigrafischer Methoden und die ausführliche Dokumentation der [Scope.GetCharacter.GetHerHis] Funde revolutionierte [Scope.GetCharacter.GetLastNameNoFormatting] #V  die Archäologie#! und machte sie zu einer echten Wissenschaft." #deepl:1482092133
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] war maßgeblich an der #V Einrichtung des Archäologischen Museums#! beteiligt, in dem [Scope.GetCharacter.GetSheHe] alle Artefakte auf sinnvolle Weise ausgestellt werden." #deepl:2255139215
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] entwickelte #V neue Methoden, um die Funde in Pompeji#! zu erhalten." #deepl:3277007049
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] war die zentrale Figur bei der #V Rekonstruktion des Sonnentempels in Teotihuacán#!." #deepl:715105555
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte die Indus-Tal-Zivilisation#! an der Stätte von Harappa." #deepl:823513117
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte das Grab des ersten Qin-Kaisers#!, das von einer Armee aus Terrakotta bewacht wurde." #deepl:3326302787
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte die Maya-Stadt Tikal#! im Dschungel von Guatemala." #deepl:960255002
 lepsius_archaeologist_achievement_explored_petra_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  erkundete die Stadt Petra#! in den sengenden Wüsten des Nahen Ostens." #deepl:230969931
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\nDie Entdeckung des #V Sarkophags eines unbekannten Pharaos#! ist eine der größten Errungenschaften von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:397069606
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\nObwohl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] das #V Grab eines unbekannten Pharaos#! entdeckte, wurde diese Entdeckung durch die Zerstörung der Mumie des Pharaos durch einen unglücklichen Unfall zunichte gemacht." #deepl:4134291227
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\nEin Meilenstein in der Karriere von [Scope.GetCharacter.GetHerHis] war die Entdeckung des unversehrten Grabes von #V Pharao Tutanchamun#!." #deepl:830597516
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\nDie Entdeckung des #V Schiffes von Khufu#! wird den Namen von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] für immer in den Geschichtsbüchern verewigen." #deepl:263837328
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\nWährend [Scope.GetCharacter.GetHerHis] Zeit in Mesopotamien fand [Scope.GetCharacter.GetSheHe] den #V Turm von Babylon#!, der unter Archäologen als Zikurrat Etemenanki bekannt ist. Ein wundervoller Fund!" #deepl:3958757656
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] ist wahrscheinlich die einzige Person, die sich rühmen kann, eines der sieben Weltwunder wiederentdeckt zu haben. |U[Scope.GetCharacter.GetSheHe] hat die #V Hängenden Gärten#! tatsächlich gefunden." #deepl:1376956218
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\nSicher, für einen Archäologen ist alles ein Schatz, aber die Entdeckung von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist sicherlich ein wahrer Schatz. Die #V Schätze von Mykene#! bestanden aus vielen Dingen, von denen die meisten aus Gold waren, wie die Goldenen Masken." #deepl:3793568389
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\nDas #V Grab von Pakal#!, das Dr. [Scope.GetCharacter.GetLastNameNoFormatting] entdeckt hat, war sehr beeindruckend. So beeindruckend, wie es für den größten König der Maya sein sollte." #deepl:3301250790
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\nWährend seiner Arbeit in Ägypten hisste [Scope.GetCharacter.GetSheHe] #V  eine Flagge auf der Großen Pyramide von Gizeh#!." #deepl:453060665
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] hat das #V Ishtar-Tor#! nicht nur gefunden, sondern auch rekonstruiert. Jetzt erstrahlt es wieder in seiner ganzen Pracht." #deepl:3899648836
 lepsius_archaeologist_achievement_found_lamassu_loc: "\Nach einem großen Abenteuer voller Gefahren fand [Scope.GetCharacter.GetSheHe] den majestätischen #V Lamassu#!." #deepl:1325115031
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] entkam aus einem #V Mythischen Labyrinth#! voller Gefahren." #deepl:3205955848
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\nManchmal ist Archäologie gefährlich. Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat seine Reise durch eine geheimnisvolle #V Maya-Pyramide#! überlebt, die mehr Abenteuer als Archäologie war." #deepl:2309875301
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] hat #V Vilacamba#!, die letzte Zuflucht der Inka, wiederentdeckt." #deepl:1401010459
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  hat in der Wüste von Nazca#! riesige Zeichnungen gefunden, die nur vom Himmel aus wirklich sichtbar sind." #deepl:3398521121
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] wird von der wissenschaftlichen Gemeinschaft verspottet. Er behauptet, dass seine #V Expeditionsmitglieder von Dinosauriern gefressen wurden#!. Ist diese Behauptung lächerlich oder die Wahrheit?" #deepl:491140794
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] lieferte fotografische Beweise für #V lebende Dinosaurier#!, obwohl niemand daran glaubte [Scope.GetCharacter.GetHerHim]." #deepl:1970351488
 lepsius_archaeologist_achievement_photo_support_loc: "\nMit der Unterstützung der Regierung konnte Professor [Scope.GetCharacter.GetLastNameNoFormatting] fotografische Beweise für #V lebende Dinosaurier#! vorlegen, obwohl er zuvor belächelt wurde." #deepl:278106961
