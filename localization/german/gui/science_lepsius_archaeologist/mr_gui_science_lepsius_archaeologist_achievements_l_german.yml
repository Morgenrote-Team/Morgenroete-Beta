chaeologist_achievement_tomb_first_emperor_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achivement_found_treasury_of_atreus_var').IsSet , Scope.Var('lepsius_archaeologist_achivement_found_treasury_of_atreus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_lost_world_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_lost_world_var').GetFlagName)]"
 lepsius_archaeologist_no_archaeologist_loc: "Die #V Errungenschaften dieses [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]#! werden hier angezeigt, sobald Sie eine haben."
 lepsius_archaeologist_achievements_intro_loc: "#V Errungenschaften dieses Archäologen#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')], der insgesamt [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')].#!"
 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "eine berühmter [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "ein erfahrener [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "ein versierter [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist Experte für #V Ägyptische Archäologie#!, wo [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] kleinere Artefakte gesammelt hat.#!"
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist Experte für #V Mesopotamische Archäologie#!, wo [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] kleinere Artefakte gesammelt hat.#!"
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist Experte für #V Ägäische Archäologie#!, wo [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] kleinere Artefakte gesammelt hat.#!"
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist Experte für #V Präkolumbianische Archäologie#!, wo [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] kleinere Artefakte gesammelt hat.#!"
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist Experte für #V Fernöstliche Archäologie#!, wo [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] kleinere Artefakte gesammelt hat.#!"
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist Experte für #V Ozeanische Archäologie#!, wo [Scope.GetCharacter.GetSheHe] [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] kleinere Artefakte gesammelt hat.#!"
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] nahm an dem #V Archäologischen Kongress zur Historizität des Exodus#! teil.#!"
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] nahm an dem #V Archäologischen Kongress über den Ursprung der Zivilisation#! teil.#!"
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] besuchte dem #V Archäologischen Kongress über die Historizität von Troja#!.#!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\n #indent_newline:3 • Eine der größten [Scope.GetCharacter.GetHerHis]er Errungenschaften ist die #V Erfindung des Drei-Zeitalter-Systems#!, das es den Archäologen ermöglicht, Artefakte in die Zeitabschnitte Steinzeit, Bronzezeit und Eisenzeit einzuteilen.#!"
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\n #indent_newline:3 • Durch die Anwendung stratigrafischer Methoden und die ausführliche Dokumentation [Scope.GetCharacter.GetHerHis]er Funde revolutionierte [Scope.GetCharacter.GetLastNameNoFormatting] #V die Archäologie#! und machte sie zu einer echten Wissenschaft.#!"
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war maßgeblich an der #V Einrichtung des Archäologischen Museums#! beteiligt, in dem [Scope.GetCharacter.GetSheHe] alle Artefakte auf sinnvolle Weise ausgestellt werden.#!"
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] entwickelte neue Methoden, um die Funde in Pompeji #V intakt zu halten#!.#!"
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war die zentrale Figur bei der #V Rekonstruktion des Sonnentempels in Teotihuacán#!.#!"
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V entdeckte die Indus-Tal-Zivilisation#! an der Ausgrabungsstätte von Harappa.#!"
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V entdeckte das Grab des ersten Qin-Kaisers#!, das von einer Armee aus Terrakotta bewacht wurde.#!"
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V entdeckte die Maya-Stadt Tikal#! im Dschungel von Guatemala.#!"
 lepsius_archaeologist_achievement_explored_petra_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V erkundete die Stadt Petra#! in den sengenden Wüsten des Nahen Ostens.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\n #indent_newline:3 • Die Entdeckung des #V Sarkophags eines unbekannten Pharaos#! ist eine der größten Errungenschaften von Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\n #indent_newline:3 • Obwohl Dr. [Scope.GetCharacter.GetLastNameNoFormatting] das #V Grab eines unbekannten Pharaos#! entdeckte, wurde diese Entdeckung durch die Zerstörung der Mumie des Pharaos durch einen unglücklichen Unfall zunichte gemacht.#!"
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\n #indent_newline:3 • Ein Meilenstein in [Scope.GetCharacter.GetHerHis]e Karriere war die Entdeckung des unversehrten Grabes von #V Pharao Tutanchamun#!.#!"
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\n #indent_newline:3 • Die Entdeckung des #V Schiffes von Khufu#! wird den Namen von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] für immer in den Geschichtsbüchern verewigen.#!"
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\n #indent_newline:3 • Während [Scope.GetCharacter.GetHerHis]er Zeit in Mesopotamien fand [Scope.GetCharacter.GetSheHe] den #V Turm von Babylon#!, der unter Archäologen als Zikurrat Etemenanki bekannt ist. Ein wundervoller Fund!#!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist wahrscheinlich die einzige Person, die sich rühmen kann, eines der sieben Weltwunder wiederentdeckt zu haben. [Scope.GetCharacter.GetSheHe|U] hat die #V Hängenden Gärten von Babylon#! tatsächlich gefunden.#!"
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\n #indent_newline:3 • Sicher, für einen Archäologen ist alles ein Schatz, aber die Entdeckung von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist sicherlich ein wahrer Schatz. Die #V Schätze von Mykene#! bestanden aus vielen Dingen, von denen die meisten aus Gold waren, wie die Goldenen Masken.#!"
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\n #indent_newline:3 • Das #V Grab von Pakal#!, das Dr. [Scope.GetCharacter.GetLastNameNoFormatting] entdeckt hat, war sehr beeindruckend. So beeindruckend, wie es für den größten König der Maya sein sollte.#!"
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\n #indent_newline:3 • Während seiner Arbeit in Ägypten hisste [Scope.GetCharacter.GetSheHe] #V eine Flagge auf der Großen Pyramide von Gizeh#!.#!"
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat das #V Ischtar-Tor#! nicht nur gefunden, sondern auch rekonstruiert. Jetzt erstrahlt es wieder in seiner ganzen Pracht.#!"
 lepsius_archaeologist_achievement_found_lamassu_loc: "\n #indent_newline:3 • Nach einem großen Abenteuer voller Gefahren fand [Scope.GetCharacter.GetSheHe] den majestätischen #V Lamassu#!.#!"
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] entkam aus einem #V Mythischen Labyrinth#! voller Gefahren.#!"
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n #indent_newline:3 • Manchmal ist Archäologie gefährlich. Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat [Scope.GetCharacter.GetHerHis]e Reise durch eine geheimnisvolle #V Maya-Pyramide#! überlebt, die mehr Abenteuer als Archäologie war.#!"
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat #V Vilacamba#!, die letzte Zuflucht der Inka, wiederentdeckt."
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V hat in der Wüste von Nazca#! riesige Zeichnungen gefunden, die nur vom Himmel aus wirklich sichtbar sind.#!"
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wird von der Wissenschaftsgemeinde verspottet. [Scope.GetCharacter.GetSheHe|U] behauptet, dass [Scope.GetCharacter.GetHerHis]e #V Expeditionsmitglieder von Dinosauriern gefressen wurden#!. Ist diese Behauptung lächerlich oder die Wahrheit?#!"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] lieferte fotografische Beweise für #V lebende Dinosaurier#!, obwohl [Scope.GetCharacter.GetHerHim] niemand glaubte.#!"
 lepsius_archaeologist_achievement_photo_support_loc: "\n #indent_newline:3 • Mit der Unterstützung der Regierung konnte Professor [Scope.GetCharacter.GetLastNameNoFormatting] fotografische Beweise für #V lebende Dinosaurier#! vorlegen, obwohl er zuvor belächelt wurde.#!"