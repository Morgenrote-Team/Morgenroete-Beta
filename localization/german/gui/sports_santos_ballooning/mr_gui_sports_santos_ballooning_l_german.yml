l_german:
 MR_GORDON_BENNETT_CUP_BUTTON: "Der Gordon-Bennett-Cup"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T Gordon-Bennett-Cup#!\nDer Gordon-Bennett-Pokal (oder Coupe Aéronautique Gordon Bennett) ist das älteste Gasballonrennen der Welt. Die Veranstaltung, die als das \"Blaue Band\" der Luftfahrt bezeichnet wird, wurde von James Gordon Bennett Jr. gesponsert, dem millionenschweren Sportler und Besitzer der Zeitung New York Herald. Nach Angaben der Organisatoren ist das Ziel des Wettbewerbs einfach: die weiteste Entfernung vom Startplatz zu fliegen\". Der Wettbewerb lief von 1906 bis 1938, unterbrochen von 1914 bis 1919 durch den Ersten Weltkrieg und 1931.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat insgesamt #V 10 oder mehr [GetBuildingType('building_manzoni_publishing_industry').GetName]-Gebäudestufen#!.#!"