 theme_mr_paleontology: "Morgenröte: Paleontology (Erdfarben)" #Already in English Folder
 theme_mr_paleontology_desc: "A User Interface inspired by Paleontology, Fossils and Dinosaur Bones." #Already in English Folder


 mr_papermap_coprolite: "Paläontologie: Koprolith"
 mr_papermap_coprolite_desc: "Es scheint, dass ein Paläontologe derzeit an der Vorbereitung eines Koprolithen arbeitet. Sie fragen sich, was Koprolith ist? Es ist versteinerter Kot. In diesem Fall wahrscheinlich von einem Dinosaurier."
 mr_papermap_belemnite: "Paläontologie: Belemnit" #Please replace
 mr_papermap_belemnite_desc: "Ein von einem Paläontologen gefundenes Belemnit-Fossil. Diese Kreaturen lebten vor 358 bis 66 Millionen Jahren in den Meeren." #Please replace
 mr_papermap_ammonite: "Paläontologie: Ammonit" #Please replace
 mr_papermap_ammonite_desc: "Eines der berühmtesten Fossilien. Dieser Ammonit durchstreifte einst das Meer vor Millionen von Jahren. Jetzt ist er eine schöne Dekoration für Ihren Tisch." #Please replace
 mr_papermap_trilobite: "Paläontologie: Trilobiten"
 mr_papermap_trilobite_desc: "Trilobiten gehörten zu den ersten Arthropoden und waren sehr erfolgreich. Leider sind sie im Perm ausgerottet worden. Glücklicherweise wurden einige von ihnen versteinert und man kann sie als Souvenir auf dem Tisch aufbewahren."

 mr_papermap_battenberg_cake: "Kulinarik: Battenberg-Torte"
 mr_papermap_battenberg_cake_desc: "Sind Sie hungrig? Dann sollten Sie diese köstliche Torte auf den Tisch stellen. Es handelt sich um einen mit Marzipan überzogenen Biskuitkuchen, der nach Prinz Ludwig von Battenberg benannt ist."
 mr_papermap_cucumber_ice_cream: "Kulinarik: Gurkeneis"
 mr_papermap_cucumber_ice_cream_desc: "Die Sonne strahlt vom Himmel, es ist ein heisser Sonnentag. Was wäre da besser als ein wunderbar erfrischendes Gurkeneis?"
 mr_papermap_croissant_hot_chocolate: "Kulinarik: Croissant and heisse Schokolade"
 mr_papermap_croissant_hot_chocolate_desc: "Ein Croissant und eine heiße Schokolade am Morgen sind die beste Art, den Tag zu beginnen. Ganz gleich, was Sie erwartet."
