l_german:
 theme_mr_paleontology: "Morgenröte: Paläontologie (irden)"
 theme_mr_paleontology_desc: "Eine Benutzeroberfläche, die von Paläontologie, Fossilien und Dinosaurierknochen inspiriert ist."
 mr_papermap_coprolite: "Paläontologie: Koprolith"
 mr_papermap_coprolite_desc: "Scheinbar arbeitet ein Paläontologe derzeit an der Vorbereitung eines Koproliths. Sie fragen sich, was ein Koprolith ist? Es ist versteinerter Kot. In diesem Fall wahrscheinlich von einem Dinosaurier."
 mr_papermap_belemnite: "Paläontologie: Belemnit"
 mr_papermap_belemnite_desc: "Ein von einem Paläontologen gefundenes Belemnit-Fossil. Diese Kreaturen durchstreiften vor etwa zwischen 358 bis 66 Millionen Jahren die Meere."
 mr_papermap_ammonite: "Paläontologie: Ammonit"
 mr_papermap_ammonite_desc: "Eines der berühmtesten Fossilien. Dieser Ammonit durchstreifte einst vor Millionen von Jahren das Meer. Jetzt ist es eine schöne Dekoration für Ihren Tisch."
 mr_papermap_trilobite: "Paläontologie: Trilobit"
 mr_papermap_trilobite_desc: "Trilobiten gehörten zu den ersten Arthropoden und waren sehr erfolgreich. Leider sind sie im Perm ausgestorben. Zum Glück waren einige jedoch versteinert und Sie können sie als Souvenir auf Ihrem Tisch haben."
 mr_papermap_battenberg_cake: "Kulinarisches: Battenbergkuchen"
 mr_papermap_battenberg_cake_desc: "Sind Sie hungrig? Vielleicht sollten Sie diesen köstlichen Kuchen auf Ihren Tisch legen. Es ist ein Biskuitkuchen, der mit Marzipan bedeckt und nach Prinz Louis von Battenberg benannt wurde."
 mr_papermap_old_fashioned: "Kulinarisches: Old Fashioned"
 mr_papermap_old_fashioned_desc: "Was könnte besser sein als ein guter Old Fashioned am Ende eines langen Tages? Sicherlich wird Sie Ihr Barkeeper mit diesem Cocktail in eine glückliche Stimmung bringen!"
 mr_papermap_cucumber_ice_cream: "Kulinarisches: Gurkeneis"
 mr_papermap_cucumber_ice_cream_desc: "Die Sonne scheint vom Himmel, es ist ein heißer sonniger Tag. Was gäbe es besseres als ein wunderbar erfrischendes Gurkeneis?"
 mr_papermap_croissant_hot_chocolate: "Kulinarisches: Croissant und heiße Schokolade"
 mr_papermap_croissant_hot_chocolate_desc: "Ein Croissant und eine heiße Schokolade zum Frühstück sind der beste Weg, um den Tag zu beginnen. Egal was Sie erwartet."