 andersson_anthropologist_achievement_discovered_neoanthropus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] erlangte internationale Bekanntheit durch die Entdeckung eines bislang unbekannten #V Exemplars des Neoanthropus#!.#!"
