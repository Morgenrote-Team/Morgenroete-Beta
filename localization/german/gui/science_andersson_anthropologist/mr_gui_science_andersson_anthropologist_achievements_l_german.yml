 andersson_anthropologist_achievement_attended_origin_congress_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] nahm an dem Kongress über den #V Ursprung des modernen Menschen#! teil." #deepl:2823441805
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\nDank [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] wurde der #V Piltdown-Mensch als Betrug#! entlarvt." #deepl:1017420061
 andersson_anthropologist_achievement_invented_anthropology_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist der erste Wissenschaftler, der menschliche Knochen und Skelette akribisch und sehr präzise aufzeichnet. [Scope.GetCharacter.GetSheHe] gilt als #V Pionier der Anthropologie#!." #deepl:3155653452
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "#V \n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] hat den Cro-Magnon#! zum ersten Mal wissenschaftlich klassifiziert." #deepl:69566943
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] war die erste Person, die #V den Neandertaler in die Systematik des prähistorischen Menschen#! einordnete." #deepl:523665278
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\nEs ist das Verdienst von [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis], dass der bis dahin unbekannte #V Homo Erectus als menschliche Spezies#! fassbar wurde." #deepl:991432050
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] war der erste, dem es gelang, die ersten #V Geheimnisse von Australopithecus#! zu entschlüsseln und Rückschlüsse auf seine Lebensweise und sein Aussehen zu ziehen." #deepl:994811918
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\nNicht vielen Menschen ist es #V gelungen, aus wenigen Knochen einen prähistorischen Menschen#! zu rekonstruieren und damit Rückschlüsse auf seine Lebensumstände zu ziehen. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist dies mit dem #V Paranthropus#! gelungen." #deepl:2683346481
