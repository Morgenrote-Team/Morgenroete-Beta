t_achievement_completed_erectus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_erectus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').GetFlagName)]"
 lepsius_anthropologist_no_anthropologist_loc: "Die #V Errungenschaften dieser [concept_lepsius_anthropologist]#! werden hier angezeigt, sobald Sie eine haben."
 lepsius_anthropologist_achievements_intro_loc: "#V Die Errungenschaften dieses Anthropologen#!\n[Scope.GetCharacter.GetFullName] ist [Scope.GetCharacter.GetCustom('lepsius_anthropologist_experience_level_type')]."
 andersson_anthropologist_achievement_famous_level_anthropologist_overview_loc: "eine berühmte [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_experienced_level_anthropologist_overview_loc: "ein erfahrener [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "ein vollendeter [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat insgesamt [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0] menschliche Fossilien gefunden. Diese Fossilien bestehen aus "
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat noch keine menschlichen Fossilien gefunden"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0] Cro-Magnon Fossilien, "
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0] Cro-Magnon Fossilien"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] Neanderthaler Fossilien, "
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] Neanderthaler Fossilien"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0] Homo Erectus Fossilien, "
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0] Homo Erectus Fossilien"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] Fossilien von Australopithecus, "
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] Australopithecus-Fossilien"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0] Paranthropus Fossilien"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] wurden insgesamt [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] menschliche Fossilien gefunden."
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] nahm an dem Kongress über den #V Ursprung des modernen Menschen#! teil."
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\nDank [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] wurde der #V Piltdown-Mensch als Betrug#! entlarvt."
 andersson_anthropologist_achievement_invented_anthropology_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist der erste Wissenschaftler, der menschliche Knochen und Skelette akribisch und sehr präzise aufzeichnet. [Scope.GetCharacter.GetSheHe] gilt als #V Pionier der Anthropologie#!."
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "#V \n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] hat den Cro-Magnon#! zum ersten Mal wissenschaftlich klassifiziert."
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] war die erste Person, die #V den Neandertaler in die Systematik des prähistorischen Menschen#! einordnete."
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\nEs ist das Verdienst von [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis], dass der bis dahin unbekannte #V Homo Erectus als menschliche Spezies#! fassbar wurde."
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] war der erste, dem es gelang, die ersten #V Geheimnisse von Australopithecus#! zu entschlüsseln und Rückschlüsse auf seine Lebensweise und sein Aussehen zu ziehen."
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\nNicht vielen Menschen ist es #V gelungen, aus wenigen Knochen einen prähistorischen Menschen#! zu rekonstruieren und damit Rückschlüsse auf seine Lebensumstände zu ziehen. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist dies mit dem #V Paranthropus#! gelungen."