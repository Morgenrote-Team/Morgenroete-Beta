 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] identifizierte insgesamt [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] menschliche Fossilien.#!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] nahm an dem Kongress über den #V Ursprung des modernen Menschen#! teil.#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • Dank [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim] wurde der #V Piltdown-Mensch als Betrug#! entlarvt.#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist der erste Wissenschaftler, der menschliche Knochen und Skelette akribisch und sehr präzise aufzeichnet. [Scope.GetCharacter.GetSheHe|U] gilt als #V Pionier der Anthropologie#!.#!"
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] hat #V Cro-Magnon zum ersten Mal wissenschaftlich klassifiziert#!.#!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war die erste Person, die #V den Neandertaler in die Systematik des prähistorischen Menschen#! einordnete.#!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n #indent_newline:3 • Es ist [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] Verdienst, dass der bis dahin unbekannte #V Homo Erectus als menschliche Spezies fassbar wurde#!.#!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] war der erste, dem es gelang, die ersten #V Geheimnisse von Australopithecus#! zu entschlüsseln und Rückschlüsse auf seine Lebensweise und sein Aussehen zu ziehen.#!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n #indent_newline:3 • Nicht vielen Menschen ist es gelungen, aus wenigen Knochen #V einen prähistorischen Menschen zu rekonstruieren#! und damit Rückschlüsse auf seine Lebensumstände zu ziehen. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist dies mit dem #V Paranthropus#! gelungen.#!"