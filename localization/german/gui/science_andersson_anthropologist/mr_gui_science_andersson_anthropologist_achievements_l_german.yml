 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "ein versierter [concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat insgesamt [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0] menschliche Fossilien gefunden. Diese Fossilien bestehen aus "
