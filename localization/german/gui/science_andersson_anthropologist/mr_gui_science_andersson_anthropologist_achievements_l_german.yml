 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0] Neanderthaler Fossilien, "
