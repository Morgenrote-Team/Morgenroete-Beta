ist_achievement_completed_erectus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_erectus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').GetFlagName)]"
 andersson_anthropologist_no_anthropologist_loc: "Die #V Errungenschaften dieses [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]#! werden hier angezeigt, sobald Sie einen haben."
 andersson_anthropologist_achievements_intro_loc: "#V Die Errungenschaften dieses Anthropologen#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein [Scope.GetCharacter.GetCustom('andersson_anthropologist_experience_level_type')].#!"
