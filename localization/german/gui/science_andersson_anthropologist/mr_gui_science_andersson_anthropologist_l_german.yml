l_german:
 MR_ACTIVE_ANTHROPOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_andersson_archaeologist','$concept_andersson_archaeologists$')], der #V nicht beschäftigt#! ist.#!"
 MR_HAS_ANTHROPOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist ein [concept_andersson_anthropologist].#!"
 MR_ANTHROPOLOGY_10_COUNTRIES_WITH_ANTHROPOLOGIST_TRIGGER_TT: "#default_text 10 oder mehr Länder haben einen [Concept('concept_andersson_archaeologist','$concept_andersson_archaeologists$')].#!"
 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON: "Höhlenerkundung"
 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON_TT: "#T Höhlenerkundung#!\nMit Hilfe eines [Concept('concept_andersson_archaeologist','$concept_andersson_archaeologists$')] können die bisher bekannten [Concept('concept_andersson_cave','$concept_andersson_caves$')] auf nationalem Gebiet erkundet werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HAS_CAVE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine [concept_andersson_cave].#!"
 MR_ANTHROPOLOGIST_NOT_HAS_CAVE_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName] does #n not#! have the #V $andersson_cave_exploration_modifier$#! Modifier.#!"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON: "Skelettrekonstruktion"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON_TT: "#T Skelettrekonstruktion#!\nMit Hilfe eines [Concept('concept_andersson_archaeologist','$concept_andersson_archaeologists$')] können [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] verwendet werden, um ein [concept_andersson_skeleton] zu rekonstruieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_CAN_RECONSTRUCT_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 5#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] of a skeleton which has not been reconstructed yet.#!"
 MR_ANTHROPOLOGIST_HAS_INTITUTE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat ein [GetBuildingType('building_andersson_institute').GetName].#!"
 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T Anthropologen zurückrufen#!\nManchmal kann es vorkommen, dass du eine Höhlenerkundung vorzeitig beenden musst. Der [concept_andersson_anthropologist] steht dir dann noch vor Ablauf der Frist zur Verfügung, bringt jedoch keine Beute mit.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ORIGIN_CONGRESS_BUTTON: "Kongress zum Ursprung des Menschen"
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Kongress über den Ursprung des modernen Menschen#!\nMit der Entdeckung prähistorischer menschlicher Knochen stellte sich auch die Frage nach dem ursprünglichen Ursprung des Menschen. Während Darwin von einem afrikanischen Ursprung ausging, gingen andere von mehreren parallelen Entwicklungen aus. Ab der Jahrhundertwende war die vorherrschende Ansicht, dass sich der moderne Mensch in Asien entwickelt habe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_INSTITUTE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat ein [GetBuildingType('building_andersson_institute').GetName].#!"
 MR_ORIGIN_CONGRESS_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens #V 30#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ORIGIN_CONGRESS_SPECIAL_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens #V 10#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] einer dieser Arten: #V Pithecanthropus#! oder #V Australopithecus#!.#!"
 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text Mindestens #V 250#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] wurden weltweit gefunden (derzeit wurden [GetGlobalVariable('dubois_global_human_fossil').GetValue|+0] @andersson_human_fossil! gefunden).#!"
 NEOANTHROPUS_VAR: "@andersson_neoanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_neoanthropus_fossil_var').GetValue|V0]"
 NEOANTHROPUS_VAR_TT: "#header Neoanthropus [Concept('concept_andersson_human_fossil','Fossilien')]#!\n[GetPlayer.GetAltName('NOM')] hat @andersson_neoanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_neoanthropus_fossil_var').GetValue|V0] Neoanthropus-[Concept('concept_andersson_human_fossil','Fossilien')] gefunden\n\nNeoanthropus-Fossilien:\n[GetPlayer.GetCustom('andersson_vero_fossil_discovered_type')][GetPlayer.GetCustom('andersson_lagoa_santa_fossil_discovered_type')][GetPlayer.GetCustom('andersson_cro_magnon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_boskop_fossil_discovered_type')][GetPlayer.GetCustom('andersson_tianyuan_fossil_discovered_type')][GetPlayer.GetCustom('andersson_talgai_fossil_discovered_type')]"
 PALAEANTHROPUS_VAR: "@andersson_palaeanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_palaeanthropus_fossil').GetValue|V0]"
 PALAEANTHROPUS_VAR_TT: "#header Palaeanthropus-[Concept('concept_andersson_human_fossil','Fossilien')]#!\n[GetPlayer.GetAltName('NOM')] hat @andersson_palaeanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_palaeanthropus_fossil').GetValue|V0] Palaeanthropus-[Concept('concept_andersson_human_fossil','Fossilien')] gefunden.\n\nPalaeanthropus-Fossilien:\n[GetPlayer.GetCustom('andersson_neanderthal_fossil_discovered_type')][GetPlayer.GetCustom('andersson_gibraltar_fossil_discovered_type')][GetPlayer.GetCustom('andersson_spy_fossil_discovered_type')][GetPlayer.GetCustom('andersson_krapina_fossil_discovered_type')][GetPlayer.GetCustom('andersson_galilee_fossil_discovered_type')]"
 PITHECANTHROPUS_VAR: "@andersson_pithecanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0]"
 PITHECANTHROPUS_VAR_TT: "#header Pithecanthropus-[Concept('concept_andersson_human_fossil','Fossilien')]#!\n[GetPlayer.GetAltName('NOM')] hat @andersson_pithecanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0] Pithecanthropus-[Concept('concept_andersson_human_fossil','Fossilien')] gefunden.\n\nPithecanthropus-Fossilien:\n[GetPlayer.GetCustom('andersson_heidelberg_fossil_discovered_type')][GetPlayer.GetCustom('andersson_rhodesian_fossil_discovered_type')][GetPlayer.GetCustom('andersson_peking_fossil_discovered_type')][GetPlayer.GetCustom('andersson_java_fossil_discovered_type')]"
 AUSTRALOPITHECUS_VAR: "@andersson_australopithecus_fossil! [GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0]"
 AUSTRALOPITHECUS_VAR_TT: "#header Australopithecus-[Concept('concept_andersson_human_fossil','Fossilien')]#!\n[GetPlayer.GetAltName('NOM')] hat @andersson_australopithecus_fossil! [GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0] Australopithecus-[Concept('concept_andersson_human_fossil','Fossilien')] gefunden\n\nAustralopithecus-Fossilien:\n[GetPlayer.GetCustom('andersson_australopithecus_fossil_discovered_type')]"
 PREHISTORIC_ARTIFACTS_VAR: "@andersson_prehistoric_artifact!  [GetPlayer.MakeScope.Var('andersson_prehistoric_artifact_var').GetValue|V0]"
 PREHISTORIC_ARTIFACTS_VAR_TT: "#header [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]#!\n[GetPlayer.GetAltName('NOM')] hat @andersson_prehistoric_artifact! [GetPlayer.MakeScope.Var('andersson_prehistoric_artifact_var').GetValue|V0] [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')] gefunden"
 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON: "Anthropologische Forschung"
 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON_TT: "#T Anthropologische Forschung#!\nEin [concept_andersson_anthropologist] konzentriert sich in seiner Arbeit vor allem auf die Suche nach [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] und [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')] und sucht dabei nach Fundstätten im ganzen Land.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON: "Hominiden-Prospektion"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON_TT: "#T Hominiden-Prospektion#!\nEin [concept_andersson_anthropologist] und sein Team können nach archäologischen Fundstätten suchen, um gezielt nach ausgestorbenen Menschenarten zu finden. [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] und [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')] können geborgen werden. Archaische Menschentypen können nur mithilfe moderner Produktionsmethoden in unserem [GetBuildingType('building_andersson_institute').GetName] gefunden werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #n at least one#! state in these geographic regions: [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName].#!"
 MR_ANTHROPOLOGIST_IS_SPELEOLOGIST_TRIGGER_TT: "#default_text Der [concept_andersson_anthropologist] hat die [concept_character_trait] #V $andersson_speleologist$#!.#!"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON: "Den [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Menschen-Betrug aufdecken"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON_TT: "#T Den [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Menschen-Betrug aufdecken#!\nEs ist sehr wahrscheinlich, dass das mittlerweile berüchtigte [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Fossil eine Fälschung ist. Allerdings wird [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName] dieses äußerst prestigeträchtige Fossil wahrscheinlich um jeden Preis durch seine Forscher verteidigen. Es ist an der Zeit, diese Lüge aufzudecken!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_RATING_PILTDOWN_FRAUD_TT: "#default_text [GetPlayer.GetName] has at least #V 100#! Anthropological Prestige.#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_RECENT_TRY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] verfügt nicht über den Modifikator #V $andersson_piltdown_debate_lost_modifier$#!.#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_CURRENT_DEBATE_TRIGGER_TT: "#default_text Es gibt #R derzeit keine Debatte#! über den [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Menschen.#!"
 MR_ANTHROPOLOGY_PILTDOWN_CAN_BE_EXPOSED_TRIGGER_TT: "#default_text [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName] hat den [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Menschen in den letzten 5 Jahren nicht erfolgreich verteidigt.#!"
 TOTAL_HUMAN_FOSSILS_VAR: "@andersson_human_fossil!  [GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0]"
 TOTAL_HUMAN_FOSSILS_VAR_TT: "#header Gesamte [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetAltName('NOM')] hat @andersson_human_fossil! [GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0] von @andersson_human_fossil! [GetGlobalVariable('andersson_global_human_fossil_global_var').GetValue|V0] [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] gefunden"
 SPECIAL_HUMAN_FOSSILS_VAR: "@andersson_special_human_fossil_var!  [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0]"
 SPECIAL_HUMAN_FOSSILS_VAR_TT: "#header Special [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName] has found @andersson_special_human_fossil_var! [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0] Special [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\nSpecial Fossils:\n[GetPlayer.GetCustom('andersson_piltdown_fossil_discovered_type')][GetPlayer.GetCustom('andersson_paranthropus_fossil_discovered_type')][GetPlayer.GetCustom('andersson_clovis_fossil_discovered_type')][GetPlayer.GetCustom('andersson_dragon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_floresiensis_fossil_discovered_type')]"
 PREHISTORIC_VENUSES_VAR: "@andersson_prehistoric_venus!  [GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0]"
 PREHISTORIC_VENUSES_VAR_TT: "#header [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_venuses$')]#!\n[GetPlayer.GetAltName('NOM')] hat @andersson_prehistoric_venus! [GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0] [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_venuses$')] gefunden"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON: "Hominiden-Expedition"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON_TT: "#T Hominiden-Expedition#!\nEin [concept_andersson_anthropologist] und sein Team können eine Expedition starten, um in bestimmten Ländern nach ausgestorbenen Menschenarten zu suchen. Es gelten ähnliche Bedingungen wie bei der Hominiden-Suche im eigenen Gebiet.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #n at least one#! direct subject which owns a state in these geographic regions: [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName].#!"
 MR_ANTHROPOLOGIST_NOT_HAS_EXPEDITION_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName] does #n not#! have the #V $andersson_hominid_expedition_modifier$#! Modifier.#!"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON: "Craniometry"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON_TT: "#T Craniometry#!\nSkull measurement is considered one of the most prestigious tasks for an anthropologist. Once in their career, an anthropologist can completely immerse themselves in their beloved skulls, thereby enhancing their experience and acquiring new skills.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANDERSSON_25_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 25#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ANTHROPOLOGIST_NOT_DONE_CRANIOMETRY_TRIGGER_TT: "#default_text Our anthropologist has #R not yet done#! any craniometry.#!"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON: "The Neolithic Age"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON_TT: "#T The Neolithic Age#!\nFor many ordinary people, the past of early humans remains abstract. An anthropologist can set up rooms at a university to make life in that era more vivid. Only one scenery is possible per university. In this case let your Anthropologist build a scenery from the Neolithic Age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON: "The Mesolithic Age"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON_TT: "#T The Mesolithic Age#!\nFor many ordinary people, the past of early humans remains abstract. An anthropologist can set up rooms at a university to make life in that era more vivid. Only one scenery is possible per university. In this case let your Anthropologist build a scenery from the Mesolithic Age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON: "The Upper Paleolithic Age"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON_TT: "#T The Upper Paleolithic Age#!\nFor many ordinary people, the past of early humans remains abstract. An anthropologist can set up rooms at a university to make life in that era more vivid. Only one scenery is possible per university. In this case let your Anthropologist build a scenery from the Upper Paleolithic Age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANDERSSON_NEOANTHROPUS_FOSSIL_TRIGGER: "#default_text [GetPlayer.GetName] has at least #V 1#! @andersson_neoanthropus_fossil! Neoanthropus Fossil.#!"
 MR_ANDERSSON_NEOANTHROPUS_SKELETON_TRIGGER: "#default_text [GetPlayer.GetName] has at least #V 1#! @andersson_neoanthropus_skeleton! Neoanthropus Skeleton.#!"
 MR_ANDERSSON_20_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 20#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ANDERSSON_50_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 50#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ANDERSSON_100_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 100#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_NO_OUR_ANCESTORS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least one University without a #V History of Our Ancestors#!.#!"
 MR_ANDERSSON_PALAEANTHROPUS_SKELETON_TRIGGER: "#default_text [GetPlayer.GetName] has at least #V 1#! @andersson_palaeanthropus_skeleton! Palaeanthropus Skeleton.#!"
 MR_ANDERSSON_PITHECANTHROPUS_SKELETON_TRIGGER: "#default_text [GetPlayer.GetName] has at least #V 1#! @andersson_pithecanthropus_skeleton! Pithecanthropus Skeleton.#!"
 MR_ANDERSSON_200_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 200#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ANDERSSON_300_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 300#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ANTHROPOLOGIST_NEW_SYSTEMATIZATION_BUTTON: "New Systematization"
 MR_ANTHROPOLOGIST_NEW_SYSTEMATIZATION_BUTTON_TT: "#T New Systametization#!\nFThe current classification of finds as different 'men' depending on their location has led to an almost unmanageable abundance of fragmentary names. An experienced anthropologist can use a new theory and systematization to relegate outdated categories and modernize anthropology.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_AT_LEAST_200_EXPERIENCE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an [concept_andersson_anthropologist] with at least #V 200#! Experience#!.#!"
 MR_ANTHROPOLOGIST_CAN_SYSTEMIZE_NEOANTHROPUS_TRIGGER_TT: "#default_text All six different species of Neoanthropus have been discovered.#!"
 MR_ANTHROPOLOGIST_CAN_SYSTEMIZE_PALAEANTHROPUS_TRIGGER_TT: "#default_text All five different species of Palaeanthropus have been discovered.#!"
 MR_ANTHROPOLOGIST_CAN_SYSTEMIZE_PITHECANTHROPUS_TRIGGER_TT: "#default_text All four different species of Pithecanthropus have been discovered.#!"
 andersson.800.tt: "The [concept_andersson_anthropologist] will redefine the existing systematization of types in anthropology."