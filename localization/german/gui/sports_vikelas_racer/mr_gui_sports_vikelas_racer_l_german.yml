 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON: "Automobilclub gründen"
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON_TT: "#T Automobilclub gründen#!\nDie Gründung eines Automobilclubs ist der erste Schritt zum Aufbau weiterer Einrichtungen, die für den Motorsport unerlässlich sind.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_LONG_DISTANCE_BUTTON: "Langstreckenrennen"
 MR_AUTORACING_LONG_DISTANCE_BUTTON_TT: "#T Ein Langstreckenrennen ausrichten#!\nLangstreckenrennen, oft von Stadt zu Stadt, waren in den Anfängen des Automobilrennsports die Norm und wurden bis in die Mitte des 20. In Italien sind Rennen wie die Targa Florio oder die Mille Miglia die bekanntesten Beispiele. Sie stellten Mensch und Maschine auf eine besondere Probe und galten lange Zeit als die wahren nationalen Autorennen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON: "Grand Prix gründen"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TT: "#T Grand-Prix-Rennen gründen#!\nIm Jahr 1906 wurde mit dem Rennen um den Grand Prix de l'ACF der erste offizielle Grand Prix der Automobilgeschichte veranstaltet. Unabhängig vom Herkunftsland waren bis zu drei Rennwagen pro Automobilhersteller zugelassen, wie ursprünglich von den Vertretern der französischen Industrie gefordert. Entsprechend seinem Status als wichtigster aller Wettbewerbe wurde das Rennen über eine Distanz von mehr als 1200 km und an zwei aufeinanderfolgenden Tagen ausgetragen. Im Jahr 1925 wurde auf Betreiben des Automobilclubs von Italien schließlich die Einführung einer offiziellen Weltmeisterschaft angekündigt. Die drei offiziellen Grand-Prix-Rennen der Saison (Frankreich, Italien und Belgien) wurden zu Rennen erklärt, ebenso wie Indianapolis als wichtigstes amerikanisches Rennereignis.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TRIGGER_TT: "#default_text #V Mindestens 5 andere Länder#! haben einen #V Automobilclub#! und haben [GetTechnology('vikelas_international_sports_tech').GetName] erforscht.#!"
 MR_AUTORACING_RACE_TRACK_BUTTON: "Rennstrecke bauen"
 MR_AUTORACING_RACE_TRACK_BUTTON_TT: "#T Eine Rennstrecke bauen#!\nMit den Grand-Prix-Rennen wird die feste Rennstrecke immer mehr zur Norm für Autorennen. Eine eigene Rennstrecke würde nicht nur internationale Rennveranstaltungen an einem Ort zentralisieren, sondern als Teststrecke auch unseren Rennfahrern jedes Jahr einen Erfahrungsbonus geben.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_vikelas_racer].#!"
 MR_AUTORACING_RACE_TRACK_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_incorporated_state] mit einem [GetBuildingType('building_urban_center').GetName] der #V Stufe 15 oder höher#!.#!"
 MR_AUTORACING_FOUND_TEAM_BUTTON: "Rennteam gründen"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TT: "#T Ein Rennteam gründen#!\nEin eigener Rennwagenhersteller macht uns unabhängig von Importen und kann uns helfen, unsere eigenen Rennwagen zu entwickeln. Dazu braucht man eine eigene Autoindustrie und einen Ingenieur, der die Grundpläne ausarbeitet.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens eine [GetBuildingType('building_automotive_industry').GetName] der Stufe #p 2#! oder höher mit der [concept_production_method] #V Automobil-Produktion#!.#!"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON: "Für Grand-Prix-Strecke bewerben"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON_TT: "#T Für Grand-Prix-Strecke bewerben#!\nAls Mitglied der International Automobile Association und Besitzer einer hochmodernen Rennstrecke können wir beantragen, dass unsere Strecke eine offizielle Grand Prix-Strecke wird. Dann würden dort jedes Jahr Grand-Prix-Rennen stattfinden, was den Status der Strecke erheblich verbessern würde.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACE_TRACK_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens eine [GetBuildingType('building_vikelas_circuit').GetName].#!"
 MR_MAXIMUM_5_RACE_TRACKS_TT: "#default_text Weniger als 5 Länder haben eine [GetBuildingType('building_vikelas_circuit').GetName].#!"
 MR_AIACR_PRESIDENT_BUTTON: "Präsident des AIACR werden"
 MR_AIACR_PRESIDENT_BUTTON_TT: "#T Präsident des AIACR werden#!\nWenn es keinen aktiven Präsidenten der AIACR gibt, können wir diese Position übernehmen. Das setzt voraus, dass wir den Hauptsitz der International Automobile Association kontrollieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AIACR_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] kontrolliert den [GetBuildingType('building_vikelas_aiacr').GetName].#!"
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON: "Grand-Prix-Strecke ausrufen"
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON_TT: "#T Grand-Prix-Strecke ausrufen#!\nAls Präsident der AIACR haben wir das Privileg, eine unserer Rennstrecken als Grand-Prix-Strecke zu deklarieren.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IS_AIACR_PRESIDENT_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist #V Präsident der AIACR#!.#!"
 MR_AUTORACING_FOUND_AIACR_BUTTON: "Der Automobilverband"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T Der Automobilverband#!\nRennsport wird mehr und mehr zu einem internationalen Sport, bei dem die Fahrer mit verschiedenen Automarken aus verschiedenen Ländern gegeneinander antreten. Viele Nationen haben begonnen, ihre eigenen Rennen ohne jegliche Vereinbarungen zu veranstalten. Um die Regeln und Bedingungen besser zu koordinieren, ist die Gründung eines internationalen Gremiums notwendig: die International Automobile Association.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TRIGGER_TT: "#default_text #V Mindestens 10 andere Länder#! haben einen #V Automobilclub#!.#!"
 MR_AUTORACING_NO_PARTICIPATION_BUTTON_TT: "#T Rennteilnahme absagen#!\nIn bestimmten Situationen, z. B. wenn ein Fahrer als zu hitzköpfig oder ein Auto als zu unreif angesehen wird, was zu einem verheerenden Unfall führen könnte, kann es sinnvoll sein, die Rennteilnahme auf Eis zu legen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_no_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] wird an keinen Rennen teilnehmen, bis die Teilnahme an Rennen wieder erlaubt ist."
 MR_AUTORACING_PARTICIPATION_BUTTON_TT: "#T Rennteilnahme#!\nErmöglicht dem Rennfahrer, wieder an allen Rennen teilzunehmen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] wird wieder wie gewohnt an Rennen teilnehmen."
 MR_AUTORACING_LONG_DISTANCE_NOT_ONGOING_TRIGGER_TT: "#default_text #R Kein#! anderes Land veranstaltet derzeit ein #V Langstreckenrennen#!.#!"
 MR_AUTORACING_LONG_DISTANCE_STATE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens #V 5 [Concept('concept_state', '$concept_states$')]#!.#!"
 MR_AUTORACING_LONG_DISTANCE_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat vor kurzem #R kein#! #V Langstreckenrennen#! veranstaltet.#!"
