 MR_PADDOCK_MOTOR_INDUSTRY_LEVEL_5_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat insgesamt #V 5 oder mehr [GetBuildingType('building_automotive_industry').GetName] Gebäudestufen#!.#!"
 MR_PADDOCK_MOTOR_INDUSTRY_LEVEL_10_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat insgesamt #V 10 oder mehr [GetBuildingType('building_automotive_industry').GetName] Gebäudestufen#!.#!"
 MR_PADDOCK_TOOLING_WORKSHOPS_LEVEL_5_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat insgesamt #V 5 oder mehr [GetBuildingType('building_tooling_workshops').GetName] Gebäudestufen#!.#!"
 MR_PADDOCK_TOOLING_WORKSHOPS_LEVEL_10_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat insgesamt #V 10 oder mehr [GetBuildingType('building_tooling_workshops').GetName] Gebäudestufen#!.#!"
 MR_PADDOCK_HAS_RACING_CIRCUIT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [GetBuildingType('building_vikelas_circuit').GetName].#!"
 MR_PADDOCK_FIRE_MECHANIC_BUTTON: "Mechaniker feuern"
 MR_PADDOCK_FIRE_MECHANIC_BUTTON_TT: "#T Mechaniker feuern#!\nRennteams können einen Mechanikerposten neu besetzen, wenn der derzeitige Mechaniker die erwarteten Anforderungen nicht erfüllt. Ein neuer Mechaniker kann jedoch erst nach einem Intervall von zwei Jahren rekrutiert werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_FIRE_RACER_BUTTON: "Rennfahrer feuern"
 MR_PADDOCK_FIRE_RACER_BUTTON_TT: "#T Rennfahrer feuern#!\nIm Gegensatz zu den Fahrern der alten Herren sind die Rennteamfahrer nicht unersetzlich. Nachdem ein neuer Rennfahrer eingestellt wurde, kann diese Position zwei Jahre lang nicht neu besetzt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_MECHANIC_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_vikelas_mechanic].#!"
 MR_NOT_HAS_NEW_MECHANIC_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat in den #V letzten zwei Jahren#! #R keinen#! [concept_vikelas_mechanic] eingestellt.#!"
 MR_NOT_HAS_NEW_RACER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat in den #V letzten zwei Jahren#! #R keinen#! [concept_vikelas_racer] eingestellt.#!"
 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON: "Mechanische Innovation umwandeln"
 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON_TT: "#T Mechanische Innovation umwandeln#!\nWandle mechanische Innovation in Forschungspunkte um, damit die ganze Nation von den Errungenschaften des Motorsports profitiert.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
