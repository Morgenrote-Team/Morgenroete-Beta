l_german:
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON: "Motor verbessern"
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON_TT: "#T Motor verbessern#!\nEin neuer Motor verbessert die Zuverlässigkeit und Geschwindigkeit eines Fahrzeugs.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON: "Sicherheit verbessern"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON_TT: "#T Sicherheit verbessern#!\nEin Mechaniker kann sich verschiedene neue Sicherheitstechniken ausdenken, um das Leben eines Rennfahrers zu sichern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_BODY_BUTTON: "Karosserie verbessern"
 MR_PADDOCK_IMPROVE_BODY_BUTTON_TT: "#T Karosserie verbessern#!\nDie Verbesserung der Karosserie sorgt für eine bessere Aerodynamik und damit für mehr Geschwindigkeit, während die Verbesserung des Materials für mehr Sicherheit sorgt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANIC_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_vikelas_mechanic].#!"
 MR_PADDOCK_50_MECHANIC_INNOVATION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 50 oder mehr#! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')] (derzeit [GetPlayer.MakeScope.Var('vikelas_mechanical_innovation_var').GetValue|0+]).#!"
