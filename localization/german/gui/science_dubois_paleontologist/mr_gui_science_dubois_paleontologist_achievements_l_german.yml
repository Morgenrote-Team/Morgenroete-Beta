me)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]"
 dubois_paleontologist_no_paleontologist_loc: "Die #V Errungenschaften dieser [concept_dubois_paleontologist]#! werden hier angezeigt, sobald Sie eine haben."
 dubois_paleontologist_achievements_intro_loc: "#V Errungenschaften dieses Paläontologen#!\n[Scope.GetCharacter.GetFullNameNoFormatting] ist [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] der insgesamt [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] gesammelt hat."
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n[Scope.GetCharacter.GetSheHe|U] gründete das #V erste paläontologische Museum#! der Welt, in dem verschiedene Fossilien ausgestellt wurden."
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] nahm an einem Kongress teil, auf dem untersucht wurde, wie die Dinosaurier ausstarben."
 dubois_paleontologist_achievement_fossil_amber_loc: "\n[Scope.GetCharacter.GetSheHe|U] wurde ein einzigartiges Stück #V Bernstein#! gefunden, in dem eine kleine Mücke eingeschlossen war. Vielleicht befindet sich sogar etwas Dinosaurierblut darin?"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] hat einen #V Ammoniten#! gefunden, der bei der chronologischen Abgrenzung von Meeressedimenten helfen wird."
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\nViele halten die Entdeckung von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] für den ersten Vogel. In der Tat scheint der #V Archaeopteryx#! ein fehlendes Bindeglied zwischen Dinosauriern und Vögeln zu sein."
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Compositas#! sind Muscheln, die vor Millionen von Jahren auf fast allen Kontinenten lebten. Professor [Scope.GetCharacter.GetLastNameNoFormatting] fand eine davon bei einer [Scope.GetCharacter.GetHerHis]er Ausgrabungen."
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\nInteressanterweise hat der #V Eusthenopteron#!, den [Scope.GetCharacter.GetSheHe] gefunden hat, bereits einen ausgeprägten Oberarmknochen, eine Elle und eine Speiche in seiner Vorderflosse. Diese Knochen sind bei allen landlebenden Wirbeltieren vorhanden."
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V Ichthyosaura#!, von dem Dr. [Scope.GetCharacter.GetLastNameNoFormatting] eines gefunden hat, ist ein sehr einzigartiges Reptil. Es ähnelt Delphinen und legt keine Eier, sondern bringt die Jungen lebend zur Welt, was bei Reptilien sehr selten ist."
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\nMit der Entdeckung von #V Ichthyostega#! hat Professor [Scope.GetCharacter.GetLastNameNoFormatting] eines der frühesten landlebenden Tiere gefunden. Es ist das fehlende Bindeglied zwischen Fischen und Tetrapodomorphen mit Gliedmaßen."
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\nFaultiere sind heute klein, aber in der Vergangenheit gab es riesige Faultiere, wie eine der Entdeckungen von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zeigt. Das #V Megatherium#! war bis zu 6 Meter lang."
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n[Scope.GetCharacter.GetSheHe|U] entdeckte ein Fossil von #V Pterodactylus#!, einem geflügelten Dinosaurier, der wahrscheinlich in der Nähe von Seen und Flüssen lebte."
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\nDer #V Smilodon#! ist ein furchterregendes Raubtier, das bis vor ein paar tausend Jahren lebte. Professor [Scope.GetCharacter.GetLastNameNoFormatting] fand ein sehr gut erhaltenes Skelett eines solchen Tieres."
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\nEine [Scope.GetCharacter.GetHerHis]er kleineren Entdeckungen sind verschiedene #V Trilobiten#!. Obwohl sie nicht spektakulär sind, sind sie großartige Leitfossilien."
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\nIn Neuseeland machte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] eine faszinierende Entdeckung, als [Scope.GetCharacter.GetSheHe] einen gigantischen Adler fand, der jetzt #V Haast Eagle#! genannt wird."
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] hat einen #V Ankylosaurus#! in perfekter Weise rekonstruiert. Andere Paläontologen staunen über die Rekonstruktion."
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] hat einen #V Ankylosaurus#! rekonstruiert, allerdings auf unvollkommene Weise."
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] hat einen #V Ankylosaurus#! rekonstruiert, aber es war ein schrecklicher Versuch und wird von anderen Paläontologen belächelt."
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] Rekonstruktion eines #V Diplodocus#! ist absolut perfekt und wird von jedem paläontologischen Museum beneidet."
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] Rekonstruktion eines #V Diplodocus#! ist gut genug."
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] Die Rekonstruktion eines #V Diplodocus#! ist katastrophal und wird als Abscheulichkeit angesehen."
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\nDie Perfektion der #V Triceratops#! Rekonstruktion von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist weithin bekannt und hat das Ansehen unserer paläontologischen Sammlung erhöht."
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\nDie mittelmäßige Rekonstruktion von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V Triceratops#! ist gut genug für unser Museum, aber nichts Außergewöhnliches."
 dubois_paleontologist_achievement_poor_triceratop_loc: "Der Terror von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Triceratops#! Rekonstruktion ist eine Schande für unsere Sammlung."
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\nEin #V Tyrannosaurus Rex#! ist ein wundervoller Anblick. Besonders der, den Professor [Scope.GetCharacter.GetLastNameNoFormatting] perfekt zusammengesetzt hat."
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\nEin #V Tyrannosaurus Rex#! ist ein großartiger Anblick. Auch wenn er nicht so perfekt zusammengebaut ist wie der, den Professor [Scope.GetCharacter.GetLastNameNoFormatting] rekonstruiert hat."
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\nEin #V Tyrannosaurus Rex#! ist ein großartiger Anblick. Aber nicht derjenige, den Professor [Scope.GetCharacter.GetLastNameNoFormatting] zusammengebaut hat. Dieser hier ist einfach eine absurde Monstrosität."
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\nDas mächtige #V Stegosaurus#! Skelett, das [Scope.GetCharacter.GetSheHe] zusammengestellt hat, ist ein perfektes Stück für unsere Dinosaurier-Ausstellung."
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\nDas #V Stegosaurus#! Skelett, das [Scope.GetCharacter.GetSheHe] zusammengesetzt hat, ist ein gutes Stück für unsere Dinosaurier-Ausstellung."
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\nDas grauenhafte #V Stegosaurus#! Skelett, das [Scope.GetCharacter.GetSheHe] zusammengebaut hat, ist eine Platzverschwendung in unserer Dinosaurier-Ausstellung."
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\nicht jeder kann einen #V Antarctosaurus#! so perfekt zusammenbauen wie Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Er ist eines der Highlights in unserer Sammlung."
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\nDas Zusammensetzen eines #V Antarctosaurus#! ist eine schwierige Aufgabe, aber Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat sie sehr gut gelöst."
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\nNicht jeder kann einen #V Antarctosaurus#! zusammenbauen. Aber nicht viele Leute bauen ihn so schrecklich schlecht zusammen wie Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Er ist die Schande unserer Sammlung."
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\nDas wunderbare #V Argyrosaurus#! Skelett in unserer Sammlung ist das Werk von Professor [Scope.GetCharacter.GetLastNameNoFormatting]. Ein wahrhaft wundervolles Skelett."
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\nDas #V Argyrosaurus#! Skelett in unserer Sammlung ist das Werk von Professor [Scope.GetCharacter.GetLastNameNoFormatting]. Ein ziemlich gut gemachtes Skelett."
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\nDas monströse #V Argyrosaurus#! Skelett in unserer Sammlung ist das Werk von Professor [Scope.GetCharacter.GetLastNameNoFormatting]. A offensichtlich das Werk eines stümperhaften Paläontologen."
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat ein #V Iguanodon-Skelett#! perfekt zusammengesetzt."
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat ein #V Iguanodon#! Skelett zusammengesetzt."
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat ein #V Iguanodon#! Skelett furchtbar falsch zusammengesetzt."
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] gelang es, das Skelett eines #V Plateosaurus#! perfekt zu rekonstruieren. Ein tolles Exponat für unsere Sammlung."
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] gelang es, das Skelett eines #V Plateosaurus#! zu rekonstruieren."
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] gelang es, das Skelett eines #V Plateosaurus#! zu rekonstruieren. Aber es sieht sehr seltsam und deformiert aus."
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\nDie Rekonstruktion eines #V Giraffatitan#! ist harte Arbeit und braucht viel Platz. Glücklicherweise konnte Professor [Scope.GetCharacter.GetLastNameNoFormatting] die Größe unseres Museums nutzen, um ein prächtiges Skelett des Dinosauriers herzustellen."
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\nDie Rekonstruktion eines #V Giraffatitan#! ist harte Arbeit und braucht viel Platz. Zum Glück konnte Professor [Scope.GetCharacter.GetLastNameNoFormatting] die Größe unseres Museums nutzen, um das Skelett des Dinosauriers zu präparieren."
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\nDie Rekonstruktion eines #V Giraffatitan#! ist harte Arbeit und braucht viel Platz. Obwohl [Scope.GetCharacter.GetSheHe] das ganze Museum für seine Arbeit zur Verfügung hat, konnte Professor [Scope.GetCharacter.GetLastNameNoFormatting] nur eine absurde Version des Dinosauriers bauen"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\nDas gruselige #V Spinosaurus#! Skelett in unserer Sammlung wurde von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zusammengestellt und ist ein Kunstwerk."
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\nDas gruselige #V Spinosaurus#! Skelett in unserer Sammlung wurde von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zusammengestellt."
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\nDas lustige #V Spinosaurus#! Skelett in unserer Sammlung wurde von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zusammengestellt. Es ist schlecht gemacht und sieht eher wie ein Huhn als ein Dinosaurier aus."
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\nMit seinem Maul, das einem Schnabel ähnelt, war der #V Psittacosaurus#!, den Professor [Scope.GetCharacter.GetLastNameNoFormatting] zusammensetzte, ein außergewöhnliches Skelett."
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\nMit seinem Maul, das einem Schnabel ähnelt, war der #V Psittacosaurus#!, den Professor [Scope.GetCharacter.GetLastNameNoFormatting] zusammensetzte, ein schönes Skelett."
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\nHatte der #V Psittacosaurus#! wirklich einen seltsamen Schnabel auf dem Rücken und einen Rüssel statt eines Mundes? Zumindest Professor [Scope.GetCharacter.GetLastNameNoFormatting] glaubt das, aber er könnte der Einzige sein."
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\nDer gruselige #V Velociraptor#! ist eines der Meisterwerke von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Er ist perfekt zusammengesetzt."
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\nDer gruselige #V Velociraptor#! ist ein gutes Werk von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] hat es ganz gut zusammengestellt."
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\nDer gruselige #V Velociraptor#! ist eines der schlechtesten Werke von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Erstens ist er viel zu klein, zweitens hatte er sicher keine 10 Klauen als Krone..."
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\nDer #V Muttaburrasaurus#!, den Professor [Scope.GetCharacter.GetLastNameNoFormatting] rekonstruiert hat, war nicht nur wegen seiner Größe beeindruckend."
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\nDer #V Muttaburrasaurus#!, den Professor [Scope.GetCharacter.GetLastNameNoFormatting] rekonstruiert hat, war vor allem wegen seiner Größe sehr beeindruckend."
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\nDer #V Muttaburrasaurus#!, den Professor [Scope.GetCharacter.GetLastNameNoFormatting] rekonstruiert hat, war grauenhaft. Jeder andere Paläontologe stellte fest, dass der Kopf nicht am Schwanz befestigt ist und die Knie in die andere Richtung gebogen sind."
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\nDie Größe von #V Rhoetosaurus#! ist beeindruckend. Aber ohne die Fähigkeiten von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wäre es sicher nicht so beeindruckend gewesen."
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\nDie Größe von #V Rhoetosaurus#! ist beeindruckend. Aber ohne die Fähigkeiten von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wäre es definitiv weniger beeindruckend gewesen."
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\nDie Idee, dass der Schwanz auf den Rücken des #V Rhoetosaurus#! gehört, war wohl die dümmste Idee von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Zumindest bisher..."
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\nDer #o Msasaurus#!, den Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert hat, ist ein gigantisches Ungeheuer aus dem Meer."
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\nDer #o Mosasaurus#!, dass Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] ein großes Ungeheuer aus dem Meer rekonstruiert hat."
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\nDer #o Mosasaurus#!, den Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert hat, war grauenhaft. Es ist ziemlich sicher, dass Mosasaurus im Ozean lebte, aber irgendwie ist das Skelett mit Beinen gelandet."
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\nDer #o Plesiosaurus#!, der von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert wurde, ist ein riesiges Meeresreptil."
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\nDer von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruierte #o Plesiosaurus#! ist ein Meeresreptil, das zur Zeit der Dinosaurier lebte."
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\nDer #o Plesiosaurus#!, der von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert wurde, ist etwas seltsam. Er hat 4 schlangenartige Gliedmaßen und einen sehr kurzen Schwanz und keinen Schwanz."
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\nDer von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruierte #o Basilosaurus#! ist ein prähistorischer Wal, der vor Jahrtausenden lebte."
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\nDer #o Basilosaurus#!, der von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert wurde, ist ein prähistorischer Wal."
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\nDer #o Basilosaurus#!, der von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert wurde, hat eine sehr seltsame Physiologie. Er sieht mehr wie ein Ball aus als irgendetwas anderes, was ziemlich falsch erscheint."
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\nDer #o Megalodon#! rekonstruiert von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] ist ein gigantischer Hai. Ein wahrhaft beeindruckendes Skelett."
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\nDer #o Megalodon#!, der von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert wurde, ist ein gigantischer Hai."
 dubois_paleontologist_achievement_poor_megalodon_loc: "\nDer #o Megalodon#!, der von Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruiert wurde, scheint ein bisschen... daneben zu sein. Der riesige Kopf ist an einem sehr dünnen Hals befestigt und anscheinend hatte der Hai seltsame Stacheln, die seinen ganzen Körper bedeckten."