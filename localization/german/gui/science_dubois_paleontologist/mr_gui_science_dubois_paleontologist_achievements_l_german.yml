 dubois_paleontologist_no_paleontologist_loc: "Die #V Errungenschaften dieses [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]#! werden hier angezeigt, sobald Sie einen haben."
 dubois_paleontologist_achievements_intro_loc: "#V Errungenschaften dieses Paläontologen#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] ist ein [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] der insgesamt [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] gesammelt hat.#!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] gründete das #V erste paläontologische Museum#! der Welt, in dem verschiedene Fossilien ausgestellt wurden.#!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] nahm an einem Kongress teil, auf dem untersucht wurde, wie die Dinosaurier ausstarben.#!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] hat ein seltenes Stück #V Bernstein#! entdeckt, das eine prähistorische Mücke enthält, möglicherweise mit Dinosaurierblut.#!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat einen #V Ammoniten#! ausgegraben, der bei der Erforschung alter mariner Sedimente hilft.#!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s Fund des #V Archaeopteryx#! wird als wichtiges Bindeglied zwischen Dinosauriern und Vögeln gefeiert.#!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n #indent_newline:3 • #V Compositas#!, uralte Muscheln, die von Professor [Scope.GetCharacter.GetLastNameNoFormatting] gefunden wurden, bieten Einblicke in das prähistorische Leben.#!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n #indent_newline:3 • Das von [Scope.GetCharacter.GetHerHim] entdeckte Fossil #V Eusthenopteron#! zeigt frühe Anpassungen an das Leben auf dem Land.#!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n #indent_newline:3 • #V Ichthyosaurus#!, gefunden von Dr. [Scope.GetCharacter.GetLastNameNoFormatting], war ein delphinähnliches Reptil, das lebende Junge zur Welt brachte.#!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] deckte #V Ichthyostega#! auf, eines der frühesten Landwirbeltiere.#!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] entdeckte das riesige #V Megatherium#!, ein prähistorisches Faultier, das bis zu 6 Meter groß wurde.#!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] hat ein #V Pterodactylus#! Fossil gefunden, einen geflügelten Dinosaurier aus alten Seeufern.#!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat ein gut erhaltenes #V Smilodon#! ausgegraben, das legendäre Säbelzahnraubtier.#!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n #indent_newline:3 • Unter den [Scope.GetCharacter.GetHerHis]-Funden befinden sich #V Trilobiten#!, wichtige Leitfossilien für die Datierung von Gesteinsschichten.#!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n #indent_newline:3 • In Neuseeland entdeckte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] den massiven #V Haastadler#!, einen riesigen Raubvogel.#!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat eine makellose Rekonstruktion eines #V Ankylosaurus#! erreicht, die von Kollegen bewundert wird.#!"
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat einen #V Ankylosaurus#! mit einigen Unvollkommenheiten rekonstruiert.#!"
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\n #indent_newline:3 • Der Versuch von Professor [Scope.GetCharacter.GetLastNameNoFormatting], einen #V Ankylosaurus#! zu rekonstruieren, wurde mit Spott bedacht.#!"
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] perfekte #V Diplodocus#! Rekonstruktion ist der Stolz des Museums.#!"
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U]e #V Diplodocus#! Rekonstruktion ist zufriedenstellend.#!"
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U]e #V Diplodocus#! Rekonstruktion wird als Katastrophe angesehen.#!"
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s #V Triceratops#! Rekonstruktion ist berühmt und steigert das Prestige des Museums.#!"
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s #V Triceratops#! Rekonstruktion ist für die Ausstellung ausreichend.#!"
 dubois_paleontologist_achievement_poor_triceratop_loc: "Der Horror von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s #V Triceratops#! Rekonstruktion ist eine Schande für unsere Sammlung.#!"
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat einen perfekten #V Tyrannosaurus Rex#! zusammengebaut, ein Wunderwerk zum Anschauen.#!"
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Tyrannosaurus Rex#! ist beeindruckend, wenn auch nicht makellos.#!"
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Tyrannosaurus Rex#! ist ein bizarrer und komischer Anblick.#!"
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] hat ein perfektes #V Stegosaurus#!-Skelett für die Dinosaurier-Ausstellung zusammengestellt.#!"
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] hat ein gutes #V Stegosaurus#! Skelett für das Exponat zusammengebaut.#!"
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] baute ein schlecht konstruiertes #V Stegosaurus#! Skelett zusammen.#!"
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s perfekter #V Antarctosaurus#! ist ein Highlight der Sammlung.#!"
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat einen respektablen #V Antarctosaurus#!.#!"
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s #V Antarctosaurus#! ist der Schandfleck des Museums.#!"
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Argyrosaurus#! Skelett ist ein Wunder der Paläontologie.#!"
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Argyrosaurus#! Skelett ist gut gemacht.#!"
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Argyrosaurus#! Skelett ist ein ungeschickter Versuch.#!"
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] hat ein #V Iguanodon#! Skelett perfekt zusammengesetzt.#!"
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] baute ein #V Iguanodon#! Skelett zusammen.#!"
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] hat ein #V Iguanodon#! Skelett mit vielen Fehlern zusammengesetzt.#!"
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] rekonstruierte ein perfektes #V Plateosaurus#! Skelett für die Sammlung.#!"
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat das Skelett eines #V Plateosaurus#! rekonstruiert.#!"
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]s #V Plateosaurus#! Rekonstruktion sieht merkwürdig und deformiert aus.#!"
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat ein prächtiges #V Giraffatitan#! Skelett geschaffen, das den Raum des Museums nutzt.#!"
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] hat ein anständiges #V Giraffatitan#! Skelett gebaut.#!"
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]s #V Giraffatitan#! ist eine absurde Version des Dinosauriers.#!"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s #V Spinosaurus#! Skelett ist ein wahres Stück Kunst.#!"
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat ein #V Spinosaurus#! Skelett zusammengesetzt.#!"
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s #V Spinosaurus#! Skelett sieht eher aus wie ein Huhn als ein Dinosaurier.#!"
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Psittacosaurus#! Skelett, mit seinem schnabelähnlichen Maul, ist außergewöhnlich.#!"
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]s #V Psittacosaurus#! ist eine nette Ergänzung.#!"
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]s #V Psittacosaurus#! Rekonstruktion ist höchst fragwürdig.#!"
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]s #V Velociraptor#! ist ein perfekt zusammengebautes Meisterwerk.#!"
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat ein gutes #V Velociraptor#! Skelett zusammengesetzt.#!"
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Velociraptor#! ist komisch klein und seltsam verziert.#!"
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]s #V Muttaburrasaurus#! Rekonstruktion ist beeindruckend in Größe und Detail.#!"
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Muttaburrasaurus#! ist bemerkenswert für seine Größe.#!"
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Muttaburrasaurus#! Rekonstruktion ist anatomisch falsch.#!"
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s Geschicklichkeit machte das #V Rhoetosaurus#! Skelett wirklich beeindruckend.#!"
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s Geschicklichkeit machte das #V Rhoetosaurus#! Skelett angemessen beeindruckend.#!"
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Rhoetosaurus#! hat seinen Schwanz an der falschen Stelle - ein denkwürdiger Fehler.#!"
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruierte einen gigantischen #o Mosasaurus#! aus dem Meer.#!"
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruierte einen großen #o Mosasaurus#! aus dem Meer.#!"
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]'s #o Mosasaurus#! endete mit Beinen-eine ungewöhnliche Interpretation.#!"
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] hat einen riesigen #o Plesiosaurus#! rekonstruiert, ein Meeresreptil.#!"
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] hat einen #o Plesiosaurus#! aus der Zeit der Dinosaurier rekonstruiert.#!"
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]'s #o Plesiosaurus#! hat seltsame Merkmale und Proportionen.#!"
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] hat einen prähistorischen #o Basilosaurus#! Wal rekonstruiert.#!"
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] hat einen #o Basilosaurus#! Wal rekonstruiert.#!"
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]'s #o Basilosaurus#! sieht eher wie ein Ball als ein Wal aus.#!"
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] hat einen gigantischen #o Megalodon#! rekonstruiert, einen beeindruckenden prähistorischen Hai.#!"
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] rekonstruierte einen gigantischen #o Megalodon#!-Hai.#!"
 dubois_paleontologist_achievement_poor_megalodon_loc: "\n #indent_newline:3 • Professor [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]'s #o Megalodon#! hat seltsame Proportionen und Stacheln.#!"