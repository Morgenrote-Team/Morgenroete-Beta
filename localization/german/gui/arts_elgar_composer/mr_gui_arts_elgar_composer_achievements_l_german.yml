 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_1_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_2_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_3_type')]"
 elgar_composer_achievements_no_composer_loc: "Die #V Errungenschaften des [Concept('concept_elgar_composer','$concept_elgar_composers$')]#! werden hier gezeigt, sobald Sie einen haben."
 elgar_composer_achievements_intro_loc: "#V Errungenschaften dieses Komponisten#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein Komponist mit einer Reputation von [Scope.Var('elgar_composer_experience').GetValue|V0].#!\n #indent_newline:3 • Bisher hat [Scope.GetCharacter.GetSheHe] [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] Tourneen gemacht.#!\n #indent_newline:3  • Aus [Scope.GetCharacter.GetHerHis]en zahlreichen Werken ragen [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] besonders heraus.#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist ein #V Virtuose#!.#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] gilt als ein berühmter #V Dirigent#!.#!"
 elgar_composer_achievement_has_masterpiece_loc: "\n • [Scope.GetCharacter.GetSheHe|U] hat [Scope.Var('elgar_composer_num_masterworks_var').GetValue|V0] Meisterwerke komponiert:#!"
 elgar_composer_achievement_masterwork_1_loc: "#indent_newline:6 \n • [Scope.Var('elgar_masterpiece_1_var').GetFlagName)]#!"
 elgar_composer_achievement_masterwork_2_loc: "#indent_newline:6 \n • [Scope.Var('elgar_masterpiece_2_var').GetFlagName)]#!"
