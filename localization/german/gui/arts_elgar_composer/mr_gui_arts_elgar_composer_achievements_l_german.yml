l_german:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "Die #V Leistungen des [concept_elgar_composer]#! werden hier gezeigt, sobald Sie einen haben."
 elgar_composer_achievements_intro_loc: "#V Errungenschaften dieses Komponisten#!\n[Scope.GetCharacter.GetFullName] ist ein Komponist mit einer Reputation von [Scope.Var('elgar_composer_experience').GetValue|V0]. Bisher hat [Scope.GetCharacter.GetSheHe] [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] Tourneen gemacht. Aus [Scope.GetCharacter.GetHerHis]en zahlreichen Werken ragt [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] besonders heraus."
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n[Scope.GetCharacter.GetSheHe|U] ist ein ausgezeichneter #V Virtuoso#!."
 elgar_composer_achievement_is_composer_conductor_loc: "\n[Scope.GetCharacter.GetSheHe|U] gilt als ein berühmter #V Dirigent#!."