 elgar_composer_achievements_intro_loc: "#V Errungenschaften dieses Komponisten#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein Komponist mit einer Reputation von [Scope.Var('elgar_composer_experience').GetValue|V0]. Bisher hat [Scope.GetCharacter.GetSheHe] [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] Tourneen gemacht. Aus [Scope.GetCharacter.GetHerHis]en zahlreichen Werken ragen [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0] besonders heraus.#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] ist ein #V Virtuose#!.#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] gilt als ein berühmter #V Dirigent#!.#!"