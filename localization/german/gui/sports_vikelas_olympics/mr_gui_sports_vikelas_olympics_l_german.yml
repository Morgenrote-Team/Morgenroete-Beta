 VISIT_IOC_BUTTON: "Visit the IOC"
 MR_VISIT_IOC_POSSIBLE_FOUNDED_TT: "#default_text The #V International Olympic Comitee was founded#!.#!"
 MR_VISIT_IOC_POSSIBLE_TT: "#default_text You are #V not currently visiting the IOC#!.#!"
 VISIT_IOC_BUTTON_TT: "#T Visit the International Olympic Comitee#!\nVisit the International Olympic Committee to obtain information about members, the next Olympics or the international medal table.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_BUTTON: "Found the IOC"
 MR_IOC_FOUNDATION_BUTTON_TT: "#T Found the International Olympic Comitee#!\nThe International Olympic Committee (IOC) is a non-governmental organization in the legal form of an association. The purpose of the committee is to organize and supervise the modern Olympic Games. The founding country has a permanent seat on the board that decides on the venues for the Olympic Games. Shortly after the IOC is founded, the first of the Olympic Games, which from then on will take place every four years, can be organized. Under certain conditions, other countries can join the IOC as regular members, but the number of seats on the board is limited.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least one [concept_academics_academic].#!"
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName] is at Peace.#!"
 MR_IOC_MEMBER_BUTTON: "Join the IOC"
 MR_IOC_MEMBER_BUTTON_TT: "#T Become a Member of the IOC#!\nJoin the International Olympic Committee to compete in the quadrennial Olympic Games. IOC members also have the chance to hold the games in their own country.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]'s infamy is lower than #n 50#!.#!"
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName] is #V not unrecognized#!.#!"
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist #V nicht der aktuelle Olympia-Gastgeber#!.#!"
 MR_IOC_BRIBE_BUTTON: "Besteche das IOC"
 MR_IOC_BRIBE_BUTTON_TT: "#T Besteche das IOC#!\nMit einer großzügigen \"Spende\" an den IOC-Vorstand können wir uns das Wohlwollen der Mitglieder sichern und als vierter Kandidat bei der Vergabe der nächsten Olympischen Spiele berücksichtigt werden. Allerdings gibt es keine Garantie dafür, dass wir anschließend ausgewählt werden. Die anderen IOC-Mitglieder könnten unsere Großzügigkeit auch missverstehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V besticht nicht schon das IOC#!.#!"
 MR_OLYMPIC_FLAME_BUTTON: "Die olympische Flamme"
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T Die olympische Flamme#!\nDie Olympische Flamme, angelehnt an das immer brennende Herdfeuer der griechischen Göttin Hestia, wurde erstmals bei den Olympischen Spielen 1928 in Amsterdam eingeführt. Die Tradition des damit verbundenen olympischen Fackellaufs wurde bei den Sommerspielen 1936 in Berlin eingeführt. Entgegen der landläufigen Meinung stammte die Idee nicht von den Nationalsozialisten, sondern von dem deutsch-jüdischen Archäologen Alfred Schiff. Die Einführung dieser Tradition sollte nicht nur den Olympischen Spielen ein neues Identifikationssymbol geben, sondern auch die Bevölkerung jedes Jahr zusammenführen und als aufbauendes Symbol von anderen Missständen ablenken.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] bereitet sich #V auf die Veranstaltung der nächsten Olympischen Spiele vor#!.#!"
 MR_IOC_PRESIDENT_BUTTON: "Werde Präsident des IOC"
 MR_IOC_PRESIDENT_BUTTON_TT: "#T Werden Präsident des IOC#!\nOhne einen aktiven Präsidenten des IOC können wir diese Position einnehmen. Das setzt voraus, dass wir den Hauptsitz des Olympischen Komitees kontrollieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] kontrolliert den [GetBuildingType('building_vikelas_ioc').GetName]#!.#!"
 MR_IOC_DISCIPLINE_BUTTON: "Olympische Disziplin einführen"
 MR_IOC_DISCIPLINE_BUTTON_TT: "#T Olympische Disziplin einführen#!\nJe größer das IOC und je mehr Länder an den Olympischen Spielen teilnehmen, desto mehr Disziplinen können eingeführt werden. Mehr Disziplinen bedeuten mehr Medaillen. Insgesamt können 20 Disziplinen - einschließlich der nationalen Sportarten - eingeführt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_15_MEMBERS_TRIGGER_TT: "#default_text Das IOC hat mindestens #G 15#! #V Mitglieder#!.#!"
 MR_IOC_20_MEMBERS_TRIGGER_TT: "#default_text Das IOC hat mindestens #G 20#! #V Mitglieder#!.#!"
 MR_IOC_25_MEMBERS_TRIGGER_TT: "#default_text Das IOC hat mindestens #G 25#! #V Mitglieder#!.#!"
 MR_IOC_30_MEMBERS_TRIGGER_TT: "#default_text Das IOC hat mindestens #G 30#! #V Mitglieder#!.#!"
 MR_IOC_40_MEMBERS_TRIGGER_TT: "#default_text Das IOC hat mindestens #G 40#! #V Mitglieder#!.#!"
 MR_IOC_50_MEMBERS_TRIGGER_TT: "#default_text Das IOC hat mindestens #G 50#! #V Mitglieder#!.#!"
 MR_IOC_60_MEMBERS_TRIGGER_TT: "#default_text Das IOC hat mindestens #G 60#! #V Mitglieder#!.#!"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON: "Aus [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] eine olympische Disziplin machen"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON_TT: "#T Aus [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] eine olympische Disziplin machen#!\nDer Präsident des IOC kann seine nationale Sportart zu einer olympischen Pflichtdisziplin machen. Dies ist eine einzigartige Entscheidung.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_NO_BRIBE_BUTTON: "Stoppe die Bestechung des IOC"
 MR_IOC_NO_BRIBE_BUTTON_TT: "#T Stoppe die Bestechung des IOC#!\nWenn wir kürzlich die Olympischen Spiele ausgerichtet haben, wäre es klug, die Bestechung einzustellen, da wir uns nicht so schnell wieder bewerben können.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_AT_LEAST_3_YEARS_TRIGGER_TT: "#default_text Die IOC-Bestechung ist so angelegt, dass sie #V mindestens vier Jahre#! andauert, bevor sie eingestellt werden kann.#!"