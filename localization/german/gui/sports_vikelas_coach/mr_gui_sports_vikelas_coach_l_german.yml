 MR_FIFA_BOARD_TOOLTIP: "#header FIFA-Vorstand#!\nDie folgenden Länder sind Mitglied im FIFA-Vorstand:\n\n[GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 MR_FIFA_PRESIDENT_TOOLTIP: "#header FIFA-Präsident#!\n[GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName] ist Präsident der FIFA."
 MR_HIRE_COACH_BUTTON_TT: "#T Einen Nationaltrainer einstellen#!\nNationaltrainer tragen mit ihren Fähigkeiten zur Verbesserung der Spielergebnisse bei. Der Hintergrund eines Nationaltrainers - Cricket, Baseball, Fußball, Basketball - hängt von der jeweiligen nationalen Sportart ab. Wenn ein Trainer die Erwartungen nicht erfüllt, kann er nach spätestens drei Jahren ersetzt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ADAPT_NATIONAL_SPORT_BUTTON: "Nationalsport annehmen"
 MR_ADAPT_NATIONAL_SPORT_BUTTON_TT: "#T Nationalsport annehmen#!\nWir können eine bestimmte Sportart, die in unserem Land populär geworden ist, zum Nationalsport erklären und so die Gründung von Vereinen und die Verbreitung der Sportart in anderen Ländern fördern. Dies ist eine Voraussetzung für eine nationale Sportorganisation.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_NATIONAL_SPORT_BUTTON: "Nationalsport ändern"
 MR_CHANGE_NATIONAL_SPORT_BUTTON_TT: "#T Nationalsport ändern#!\nDie Änderung des Nationalsports ist nur möglich, wenn mindestens eine andere Sportart populär geworden ist. Die etablierte Sportgemeinschaft wird darüber nicht glücklich sein.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_sports_coach_national_sport: "Nationalsport"
 vikelas_national_sport_loc: "[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]"
 vikelas_no_national_sport_loc: "Keine"
 MR_SCHOOL_SPORTS_STADIUM_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] mindestens eine [GetBuildingType('building_vikelas_sports').GetName] mit der #V [concept_production_method] Sportstadion#!.#!"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON: "Commonwealth Championship"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON_TT: "#T Commonwealth Championship#!\nAls Anführer eines Machtblocks oder als Oberherr mehrerer Vasallen können wir eine internationale Meisterschaft unter unseren Untertanen abhalten, wenn sie denselben nationalen Sport betreiben wie wir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INTERNATIONAL_SPORTS_MEMBER_TRIGGER_TT: "#default_text #default_text [GetPlayer.GetAltName('NOM')] hat mindestens #G 3#! andere #V Blockmitglieder#! oder #G 4#! #V Subjekte#! die [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName] als Nationalsport haben.#!"
 MR_INTERNATIONAL_SPORTS_NO_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist #R nicht#! Mitglied der FIFA.#!"
 MR_INTERNATIONAL_SPORTS_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #R nicht#! die [Concept('concept_modifier','$concept_modifiers$')] #V $vikelas_international_sports_event_modifier$#! oder #V $vikelas_recent_international_sports_event_modifier$#!.#!"
 MR_FIFA_MEMBER_TRIGGER_TT: "#default_text Mindestens #BLUE 16#! Länder sind #V FIFA Mitglieder#!. Derzeit hat die FIFA #G [GetGlobalVariable('vikelas_num_fifa_members_global_var').GetValue]#! Mitglieder.#!"
 MR_JOIN_FIFA_BUTTON: "FIFA beitreten"
 MR_JOIN_FIFA_BUTTON_TT: "#T Der FIFA beitreten#!\nDer Beitritt zur FIFA ist Voraussetzung für die Teilnahme an der Fußball-Weltmeisterschaft.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_BUTTON: "Verlasse die FIFA"
 MR_LEAVE_FIFA_BUTTON_TT: "#T Verlasse die FIFA#!\nDie FIFA hat alle ihre Ideale verraten und ist eine korrupte, kommerzialisierte NGO, die man am besten hinter sich lässt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist #R weder#! #V Präsident#! #R noch#! #V Vorstandsmitglied#! der FIFA.#!"
 MR_SCHOOL_SPORTS_BUTTON: "Schulsport einführen"
 MR_SCHOOL_SPORTS_BUTTON_TT: "#T Schulsport [GetPlayer.GetAltName('IN')] einführen#!\nMit der Einführung von Schulsport können wir die allgemeine Chance erhöhen, dass Persönlichkeiten mit Athleteneigenschaften zur Verfügung stehen und die Chancen bei den Olympischen Spielen verbessern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHOOL_SPORTS_PUBLIC_SCHOOLS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat das [concept_law] [GetLawType('law_public_schools').GetName].#!"
 MR_SCHOOL_SPORTS_IG_ATHLETE_LEADER_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen Charakter mit der Eigenschaft #V Athlet#! als Anführer einer #V [concept_interest_group] [concept_in_government]#!.#!"
 MR_SCHOOL_SPORTS_SPORTS_FACILITIES_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] mindestens eine [GetBuildingType('building_government_administration').GetName] mit der #V [concept_production_method] Sportanlage#!.#!"
 MR_WORLDCUP_BUTTON: "Fußball-Weltmeisterschaft"
 MR_WORLDCUP_BUTTON_TT: "#T Organisieren Sie die Fußballweltmeisterschaft#!\nDie Weltmeisterschaft ist ein Fußballwettbewerb für Nationalmannschaften. Alle vier Jahre können sich Mannschaften für die Endrunde der Weltmeisterschaft qualifizieren. In einem vierwöchigen Turnier wird die beste Nationalmannschaft zum Weltmeister gekürt. Der Weltfußballverband Fédération Internationale de Football Association (FIFA) organisiert und vermarktet das Turnier. Die erste Weltmeisterschaft fand 1930 in Uruguay statt und wurde von der Gastgebermannschaft gewonnen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#default_text Es gibt mindestens #G 10#! Länder mit einem Fußballverband.#!"
 MR_FIFA_BUTTON_TT: "#T Gründe die FIFA#!\nMit der zunehmenden Zahl von Länderspielen und der Verbreitung des Fußballs entstand der Bedarf an einem globalen Dachverband. Die FIFA (französisch: Fédération Internationale de Football Association) ist ein internationaler Selbstregulierungsverband für Vereinsfußball, Futsal und Beach Soccer. Sie ist eine der ältesten und größten Nichtregierungsorganisationen der Welt und wurde am 21. Mai 1904 gegründet. Die Gründung der FIFA ermöglicht internationale Spiele zwischen einzelnen Nationen, deren Trainer sich durch gewonnene Spiele verbessern können. Dies führt schließlich zur Einrichtung einer Fußballweltmeisterschaft.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_TRIGGER_TT: "#default_text Es gibt mindestens #G 6#! Länder mit einem Fußballverband.#!"
