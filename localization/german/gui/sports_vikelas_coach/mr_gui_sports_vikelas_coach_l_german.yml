 MR_FIFA_PRESIDENT_BUTTON: "Werde Präsident der FIFA"
 MR_FIFA_PRESIDENT_BUTTON_TT: "#T Werde Präsident der FIFA#!\nWenn es keinen aktiven Präsidenten der FIFA gibt, können wir diese Position übernehmen. Das setzt voraus, dass wir den Hauptsitz des Internationalen Fußballverbandes kontrollieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
