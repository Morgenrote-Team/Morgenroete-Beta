l_german:
 MR_SPORTS_COACH_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'vikelas_coach_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'vikelas_coach_no_coach_achievements_loc')]"
 vikelas_coach_achievements_loc: "$vikelas_coach_achievements_intro_loc$[AddLocalizationIf( Scope.Var('vikelas_coach_world_championship_var').IsSet , Scope.Var('vikelas_coach_world_championship_var').GetFlagName)][AddLocalizationIf( Scope.Var('vikelas_coach_vice_world_championship_var').IsSet , Scope.Var('vikelas_coach_vice_world_championship_var').GetFlagName)]"
 vikelas_coach_no_coach_achievements_loc: "Die #V Errungenschaften dieses [concept_vikelas_coach]es#! werden hier angezeigt, sobald Sie eine haben."
 vikelas_coach_achievements_intro_loc: "#V Errungenschaften dieses Coaches#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein erfolgreicher Coach.#!"
 vikelas_coach_world_championship_loc: "\n #indent_newline:3 • [Scope.Var('vikelas_coach_world_championship_year_var').GetValue|0] führte [Scope.GetCharacter.GetLastNameNoFormatting] [Scope.GetCharacter.GetHerHis]e Mannschaft zum #V Sieg bei der FIFA-Fußballweltmeisterschaft#!.#!"
 vikelas_coach_vice_world_championship_loc: "\n #indent_newline:3 • [Scope.Var('vikelas_coach_vice_world_championship_year_var').GetValue|0] führte [Scope.GetCharacter.GetLastNameNoFormatting] [Scope.GetCharacter.GetHerHis]e Mannschaft zum #V zweiten Platz bei der FIFA-Fußballweltmeisterschaft#!.#!"