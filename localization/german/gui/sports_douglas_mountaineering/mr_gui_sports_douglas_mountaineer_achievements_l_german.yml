l_german:
 MR_SPORTS_MOUNTAINEERN_TT: "[AddLocalizationIf( Scope.IsSet , 'douglas_mountaineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'douglas_mountaineer_no_mountaineer_achievements_loc')]"
 douglas_mountaineer_achievements_loc: "$douglas_mountaineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').IsSet , Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').GetFlagName)]"
 douglas_mountaineer_no_mountaineer_achievements_loc: "Die #V Errungenschaften dieses [Concept('concept_douglas_mountaineer','Bergsteigers')]#! werden hier angezeigt, sobald Sie einen haben."
 douglas_mountaineer_achievements_intro_loc: "#V Errungenschaften dieses Bergsteigers#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein Bergsteiger mit einer Erfahrung von [Scope.Var('douglas_mountaineer_experience_var').GetValue|V0]. Bislang hat [Scope.GetCharacter.GetSheHe] [Scope.Var('douglas_mountaineer_num_mountain_ascents_var').GetValue|V0] Aufstiege gemacht. Davon waren [Scope.Var('douglas_mountaineer_num_summits_reached_var').GetValue|V0] erfolgreich, [Scope.Var('douglas_mountaineer_num_climbs_aborted_var').GetValue|V0] wurden abgebrochen und [Scope.Var('douglas_mountaineer_num_disasters_suffered_var').GetValue|V0] endeten in einer Katastrophe.#!"
 douglas_mountaineer_achievement_mount_everest_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] gilt als der erste Mensch, der den #V Mount Everest#! bestieg, und ist damit als einer der berühmtesten Bergsteiger aller Zeiten.#!"