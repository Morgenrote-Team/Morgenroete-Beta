l_german:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat einen #V General#! mit der #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, oder #V $explorer$#! [concept_character_trait] #!."
 MR_MOUNTAINEERING_CLUB_BUTTON: "Bergsteigerverein"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Einen Bergsteigerverein gründen#!\nEin Bergsteigerverein ist der erste Schritt eines Landes zum organisierten Alpinismus. Er muss von einem erfahrenen Mann (oder einer erfahrenen Frau) gegründet werden, der/die sich mit dem Bergsteigen auskennt. Aus diesem Club können dann neue Bergsteiger hervorgehen, um die Gipfel der Welt zu erobern!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "Alpenverein"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Gründe den Alpenverein #!\n1857 in London gegründet, ist der Alpine Club die älteste Bergsteigerorganisation der Welt. Seine Gründung markierte den Beginn des organisierten Alpinismus im viktorianischen England. Ziel des Clubs war es, die wissenschaftliche, geografische und sportliche Erkundung der Alpen zu fördern. Zu den Gründungsmitgliedern gehörte Edward Whymper, dem 1865 die Erstbesteigung des Matterhorns gelang. Der Alpenverein spielte eine Schlüsselrolle während des \"Goldenen Zeitalters des Alpinismus\" und veröffentlichte einflussreiche Werke, darunter das Alpine Journal. Er setzte Maßstäbe für künftige Bergsteigervereine auf der ganzen Welt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text Es gibt mindestens #G 6#! Länder mit einem Bergsteigerverein. #!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Werde Präsident des Alpenvereins"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Präsident des Alpenvereins werden #!\nWenn es keinen aktiven Präsidenten des Alpenvereins gibt, können wir diese Position übernehmen. Das setzt voraus, dass wir das Hauptquartier des Alpenvereins kontrollieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] kontrolliert den [GetBuildingType('building_douglas_alpine_club').GetName]#!"
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName] wird Mitglied im Vorstand des Alpenvereins."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName] wird Präsident des Alpenvereins."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text Der Bergsteiger hat mindestens #p 50#! #V Erfahrung#!.#!"
 MR_ALPINE_CLUB_ASCENTS_TRIGGER_TT: "#default_text Der Bergsteiger hat mindestens #p 2 #!#V Aufstiege gemacht#!.#!"
 MR_ALPINE_CLUB_SUMMITS_TRIGGER_TT: "#default_text Der Bergsteiger hat mindestens den #p 1 #!#V Gipfel bezwungen#!.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "Bergsteiger rekrutieren"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Bergsteiger rekrutieren#!\nMit einem Bergsteigerclub ist es möglich, neue Bergsteiger zu rekrutieren. Dies erfordert natürlich ausreichend [concept_douglas_alpine_heritage].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat einen #V Bergsteigerverein #!.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat mindestens #G 50! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Gebirgsjäger-Regiment"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Gebirgsjägerregiment#!\nEin geeigneter General kann, sofern eine Gebirgsregion mit einer dem Vaterland leidenschaftlich ergebenen Bevölkerung vorhanden ist, ein in Gebirgsinfanterietaktik ausgebildetes Regiment aufstellen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat mindestens #G 50! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Bergsteigerausrüstung"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Bergsteigerausrüstung #!\nBessere #V Bergsteigerausrüstung #! bietet bessere Erfolgschancen. Dadurch werden für jeden Schritt neue Technologien angefordert.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat den #V $douglas_mountaineering_equipment_level_1_modifier$#!-Modifikator.#!"
 MR_MOUNTAIN_EQUIPMENT_2_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat den #V $douglas_mountaineering_equipment_level_2_modifier$#!-Modifikator.#!"
 MR_MOUNTAIN_EQUIPMENT_3_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat den #V $douglas_mountaineering_equipment_level_3_modifier$#!-Modifikator.#!"
 MR_MOUNTAIN_EQUIPMENT_4_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat den #V $douglas_mountaineering_equipment_level_4_modifier$#!-Modifikator.#!"
 MR_MOUNTAIN_EQUIPMENT_5_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat den #V $douglas_mountaineering_equipment_level_5_modifier$#!-Modifikator.#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen uneroberten #V Level 1#! [concept_douglas_mountain_summit] oder haben eine #V Mountaineering Licence#! bei einer Nation, die einen solche besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen uneroberten #V Level 2#! [concept_douglas_mountain_summit] oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die eine solche besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen uneroberten #V Level 3#! [concept_douglas_mountain_summit] oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die einen solchen besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen uneroberten #V Level 4#! [concept_douglas_mountain_summit] oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die einen solchen besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen unbezwungenen #V Level 5#! [concept_douglas_mountain_summit] oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die einen solchen besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Bergsteigerexpedition: Gipfel der Stufe 1"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 1#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 1 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, und Mount Giluwe. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Bergsteigerexpedition: Gipfel der Stufe 2"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 2#!\nDiese Kategorie von Bergen kann mit Level 2 Bergsteigerausrüstung bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Kibo (Kilimandscharo), Dufourspitze, Mount Cook, und Mount Wilhelm. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Bergsteigerexpedition: Gipfel der Stufe 3"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 3#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 3 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Batian (Mount Kenia) und Mount Stanley. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Bergsteigerexpedition: Gipfel der Stufe 4"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 4#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 4 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak und Mount Gongga. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Bergsteigerexpedition: Gipfel der Stufe 5"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 5#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 5 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Huascarán, Chigolisa und Kabru. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"