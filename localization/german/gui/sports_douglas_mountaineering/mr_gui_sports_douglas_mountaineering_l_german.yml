l_german:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen #V General#! mit der [concept_character_trait] #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#! oder #V $explorer$#!.#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "Bergsteigerverein"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Bergsteigerverein gründen#!\nEin Bergsteigerverein ist der erste Schritt eines Landes zum organisierten Alpinismus. Er muss von einem erfahrenen Mann (oder einer erfahrenen Frau) gegründet werden, der/die sich mit dem Bergsteigen auskennt. Aus diesem Club können dann neue Bergsteiger hervorgehen, um die Gipfel der Welt zu erobern!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "Alpenverein"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Alpenverein gründen#!\n1857 in London gegründet, ist der Alpenverein die älteste Bergsteigerorganisation der Welt. Seine Gründung markierte den Beginn des organisierten Alpinismus im viktorianischen England. Ziel des Clubs war es, die wissenschaftliche, geografische und sportliche Erkundung der Alpen zu fördern. Zu den Gründungsmitgliedern gehörte Edward Whymper, dem 1865 die Erstbesteigung des Matterhorns gelang. Der Alpenverein spielte eine Schlüsselrolle während des \"Goldenen Zeitalters des Alpinismus\" und veröffentlichte einflussreiche Werke, darunter das Alpine Journal. Er setzte Maßstäbe für künftige Bergsteigervereine auf der ganzen Welt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text Es gibt mindestens #G 6#! Länder mit einem Bergsteigerverein.#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Werde Präsident des Alpenvereins"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Präsident des Alpenvereins werden#!\nWenn es keinen aktiven Präsidenten des Alpenvereins gibt, können wir diese Position übernehmen. Das setzt voraus, dass wir das Hauptquartier des Alpenvereins kontrollieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] kontrolliert den [GetBuildingType('building_douglas_alpine_club').GetName]#!."
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetAltName('NOM')] wird Mitglied im Vorstand des Alpenvereins."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetAltName('NOM')] wird Präsident des Alpenvereins."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text Der Bergsteiger hat mindestens #p 50#! #V Erfahrung#!.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "Bergsteiger rekrutieren"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Bergsteiger rekrutieren#!\nMit einem Bergsteigerclub ist es möglich, neue Bergsteiger zu rekrutieren. Dies erfordert natürlich ausreichend [concept_douglas_alpine_heritage].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen #V Bergsteigerverein#!.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Gebirgsjäger-Regiment"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Gebirgsjägerregiment#!\nEin geeigneter General kann, sofern eine Gebirgsregion mit einer dem Vaterland leidenschaftlich ergebenen Bevölkerung vorhanden ist, ein in Gebirgsinfanterietaktik ausgebildetes Regiment aufstellen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens #G 25#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Bergsteigerausrüstung"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Bergsteigerausrüstung#!\nBessere #V Bergsteigerausrüstung#! bietet bessere Erfolgschancen. Es werden für jede Stufe neue Technologien benötigt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat den #V $douglas_mountaineering_equipment_level_1_modifier$#! Modifikator.#!"
 MR_MOUNTAIN_EQUIPMENT_2_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat den #V $douglas_mountaineering_equipment_level_2_modifier$#! Modifikator.#!"
 MR_MOUNTAIN_EQUIPMENT_3_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat den #V $douglas_mountaineering_equipment_level_3_modifier$#! Modifikator.#!"
 MR_MOUNTAIN_EQUIPMENT_4_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat den #V $douglas_mountaineering_equipment_level_4_modifier$#! Modifikator.#!"
 MR_MOUNTAIN_EQUIPMENT_5_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat den #V $douglas_mountaineering_equipment_level_5_modifier$#! Modifikator.#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt mindestens einen unbezwungenen #V Stufe 1#! [concept_douglas_mountain_summit] oder haben eine #V Bergsteigerlizenz#! bei einer Nation, die einen solche besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt mindestens einen unbezwungenen #V Stufe 2#! [concept_douglas_mountain_summit] oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die eine solche besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt mindestens einen unbezwungenen #V Stufe 3#! [concept_douglas_mountain_summit] oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die einen solchen besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt mindestens einen unbezwungenen #V Stufe 4#! [concept_douglas_mountain_summit] oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die einen solchen besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt mindestens einen unbezwungenen #V Stufe 5#! [concept_douglas_mountain_summit] oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die einen solchen besitzt. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Expedition: Gipfel der Stufe 1"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 1#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 1 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Mount Whitney, Citlaltépetl, Popocatépetl, Chimborazo, Pico Aneto, Mont Blanc, Großvenediger, Mount Cameroon, Ras Dashen, und Mount Giluwe. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Expedition: Gipfel der Stufe 2"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 2#!\nDiese Kategorie von Bergen kann mit Level 2 Bergsteigerausrüstung bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Kibo (Kilimandscharo), Dufourspitze, Mount Cook, und Mount Wilhelm. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Expedition: Gipfel der Stufe 3"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 3#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 3 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Mount Kenya (Mount Kenia) und Mount Stanley. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Expedition: Gipfel der Stufe 4"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 4#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 4 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Mount Logan, Mount McKinley, Illimani, Monte Pissis, Shkara, Kamet, Kaufmann Peak und Mount Gongga. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Expedition: Gipfel der Stufe 5"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Bergsteigerexpedition: Gipfel der Stufe 5#!\nDiese Kategorie von Bergen kann mit Bergsteigerausrüstung der Stufe 5 bestiegen werden. Die Stufe sagt nichts über die Höhe oder das Risiko aus. Zu diesen Gipfeln gehören: Huascarán, Chigolisa und Kabru. Weitere Informationen finden Sie in der [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "Bergsteigertraining"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T Bergsteigertraining#!\nLänder können ihre Bergsteiger trainieren, wenn sie über Gebirgszüge oder bezwungene Gipfel verfügen, die als sicher gelten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "Expeditionen"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "Organisation"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "Verein"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "Starte eine internationale Expedition"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T Starte eine internationale Expedition#!\nDer Präsident des Alpenvereins hat das Recht, eine internationale Bergsteigerexpedition zu initiieren. Dies ist nur alle zehn Jahre möglich.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "Internationale Expedition vorschlagen"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T Eine internationale Expedition vorschlagen#!\nAlpenverein-Vorstandsmitglieder haben das Recht, eine internationale Bergsteigerexpedition vorzuschlagen. Dies muss vom Präsidenten genehmigt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "Teilnahme an internationaler Expedition"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T Teilnahme an internationaler Expedition#!\nAls Vorstandsmitglied des Alpenvereins sind wir aufgerufen, an der Internationalen Bergsteigerexpedition teilzunehmen, um deren Erfolg zu sichern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Die letzte internationale Expedition ist mindestens 10 Jahre her.#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text Der Präsident des Alpenvereins hat kein Veto gegen eine internationale Expedition eingelegt.#!"
 MR_MOUNTAIN_EQUIPMENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Der Präsident verfügt über die notwendige Ausrüstung (Stufe 3, Stufe 4 oder Stufe 5), um eine internationale Expedition durchzuführen.#!"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Es ist noch mindestens ein Gipfel zu bezwingen mit demnLevel 2, Level 3 oder Level 4.#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text Der Präsident hat einen [concept_douglas_mountaineer], der #V nicht beschäftigt#! ist.#!"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "Mount Everest Expedition"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T Mount Everest Expedition#!\nAls höchster Berg der Welt ist der Mount Everest das Traumziel aller Bergsteiger - aber ist eine Expedition dorthin wirklich die Erfüllung aller Bergsteigerträume oder eher Größenwahn?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_MOUNT_EVEREST_SUMMIT_TRIGGER_TT: "#default_text Der Mount Everest ist noch #R nicht#! bezwungen worden.#!"
 MR_MOUNTAIN_7000_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen Berg mit einer Höhe von mindestens #V 7000 Metern#! bezwungen. Weitere Informationen findest du in der [concept_douglas_mountain_summit_list].#!"
