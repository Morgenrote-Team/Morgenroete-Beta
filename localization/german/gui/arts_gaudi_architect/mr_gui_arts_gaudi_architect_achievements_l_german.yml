l_german:
 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]"
 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]"
 gaudi_architect_achievements_no_architect_loc: "Die #V Errungenschaften dieser [concept_gaudi_architect]#! werden hier angezeigt, sobald Sie eine haben."
 gaudi_architect_achievements_intro_loc: "#V Errungenschaften dieses Architekten#!\n[Scope.GetCharacter.GetFullName] ist ein [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]. [Scope.GetCharacter.GetSheHe|U] hat [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0] #V  Blaupausen#! in [Scope.GetCharacter.GetHerHis]er architektonischen Karriere so weit erstellt."
 gaudi_architect_achievement_study_trip_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] hat #V eine Architekten-Studienreise#! unternommen."
 gaudi_architect_achievement_urban_planning_loc: "\nMit [Scope.GetCharacter.GetHerHis]er #V  Stadtplanung#! hat [Scope.GetCharacter.GetSheHe] dazu beigetragen, das Leben in den Städten zu verbessern."
 gaudi_architect_achievement_treatise_loc: "\n[Scope.GetCharacter.GetHerHis|U] #V  Abhandlung über Architektur#! gilt als Standardwerk."
 gaudi_architect_achievement_custom_monument_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] ist berühmt dafür, dass er den Entwurf für ein #V Einzigartiges Denkmal#! geschaffen hat - ein architektonisches Meisterwerk!"
 gaudi_architect_achievement_art_deco_splendour_loc: "\nEine der herausragendsten Leistungen in der [Scope.GetCharacter.GetHerHis]er Karriere war die vollständige #V Stadtumgestaltung im Art-Déco-Stil#!."
 gaudi_architect_achievement_neoclassical_splendour_loc: "\nEine der herausragendsten Leistungen der [Scope.GetCharacter.GetHerHis]er Karriere war die vollständige #V Stadtumgestaltung im neoklassizistischen Stil#!."
 gaudi_architect_achievement_bauhaus_splendour_loc: "\nEine der herausragendsten Leistungen in [Scope.GetCharacter.GetHerHis]er Karriere war die vollständige #V Stadtumgestaltung im Bauhaus-Stil#!."
 gaudi_architect_achievement_capital_expansion_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] arbeitete unermüdlich an der Entwicklung einer Hauptstadt."