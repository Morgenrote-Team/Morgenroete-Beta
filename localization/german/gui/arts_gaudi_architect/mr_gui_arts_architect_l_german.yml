 MR_ARCHITECT_VISIT_CAPITAL_BUTTON: "Hauptstadt"
 MR_ARCHITECT_VISIT_CAPITAL_BUTTON_TT: "#T Besuchen Sie die Hauptstadt#!\nIhre Hauptstadt ist der Ort, den Sie besuchen sollten, um die wunderbare Architektur Ihres Landes zu sehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_VISIT_CAPITAL_BUTTON_TRIGGER_TT: "#default_text #r Die Hauptstadt wird bald in Morgenröte verfügbar sein.#!#!"
 MR_ARCHITECT_INDEPENDENT_ARCHITECT: "Unabhängige Architekten"
 MR_INDEPENDENT_ARCHITECT_NAME: "#tooltip:[Character.GetTooltipTag],gaudi_architect_rating_tt_loc [Character.GetCustom('gaudi_architect_rating_icon_type')]#! [Character.GetLastName]"
