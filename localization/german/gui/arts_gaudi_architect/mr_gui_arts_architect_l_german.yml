 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT: "Architekten einladen"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_TT: "#T Laden Sie diesen Architekten ein#!\nDas Einladen von [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] ist eine Möglichkeit, einen neuen Architekten zu bekommen, wenn Ihr Land nicht genügend gute Architekten zur Verfügung stellen kann oder wenn Ihr derzeitiger Architekt Sie nicht zufrieden stellt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_architect', Scope.GetCharacter.MakeScope ).End)]"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_EFFECT_TT: "[SCOPE.sCharacter('chosen_architect').GetFullName] wird zu Ihrem neuen [Concept('concept_gaudi_architect','$concept_gaudi_architects$')].[GetPlayer.GetCustom('artists_replacement_architect_custom_type')]"
 MR_ARCHITECT_NOT_HIRED_INDEPENDENT_ARCHITECT_RECENTLY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #n nicht#! kürzlich einen [Concept('concept_gaudi_independent_architect','Unabhängigen Architekten')] eingestellt (siehe den Modifikator für die verbleibende Zeit).#!"
 MR_ARCHITECT_WAS_NOT_RECENTLY_SENT_AWAY_TT: "#default_text Dieser Architekt ist für [GetPlayer.GetAltName('AKK')] nicht verfügbar, weil [GetPlayer.GetAltNameNoFormatting('NOM')] ihn in den letzten 5 Jahren abgelehnt hat.#!"
