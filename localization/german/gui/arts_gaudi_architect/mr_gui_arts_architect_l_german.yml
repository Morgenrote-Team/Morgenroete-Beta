l_german:
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "Moderne Pracht"
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T Moderne Pracht#!\nMit einer modernen Architekturschule können wir unsere Hauptstadt in einen wahren Traum kühner architektonischer Experimente verwandeln. Art Deco gilt als das prestigeträchtigste, aber die Umwandlung wird länger dauern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_gaudi_architect','$concept_gaudi_architects$')], der #V nicht beschäftigt#! ist.#!"
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen der folgenden Modifikatoren: #V Bauhaus Architektur#!, #V Neoklassische Architektur#! oder #V Art Deco Architektur#!.#!"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "Blaupausen: Städtische Denkmäler"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T Blaupausen: Städtische Denkmäler#!\nEin Architekt kann drei mögliche Blaupausen in der Kategorie \"Städtische Denkmäler\" entwickeln: den [GetBuildingType('building_gaudi_statue').GetName], den [GetBuildingType('building_gaudi_fountain').GetName] und den [GetBuildingType('building_gaudi_arch').GetName]. Einige Blaupausen erfordern Technologien, und einige Gebäude haben spezielle Anforderungen an ihre entsprechenden Staaten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_statue').GetName] erfordert [GetTechnology('elgar_classicism_tech').GetName].\n[GetBuildingType('building_gaudi_fountain').GetName] hat keine Anforderungen.\n[GetBuildingType('building_gaudi_arch').GetName] erfordert [GetTechnology('napoleonic_warfare').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "Blaupausen: Öffentliche Plätze"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T Blaupausen: Öffentliche Plätze#!\nEin Architekt kann drei mögliche Blaupausen in der Kategorie 'Plätze' entwickeln: den [GetBuildingType('building_gaudi_park').GetName], den [GetBuildingType('building_gaudi_luna').GetName] und den [GetBuildingType('building_gaudi_parade').GetName]. Einige Blaupausen erfordern Technologien; und einige Gebäude haben spezielle Anforderungen an ihre entsprechenden Staaten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_park').GetName] hat keine Anforderungen.\n[GetBuildingType('building_gaudi_luna').GetName] erfordert [GetTechnology('curtiss_tourism_tech').GetName].\n[GetBuildingType('building_gaudi_parade').GetName] erfordert [GetTechnology('nationalism').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "Blaupausen: Service-Gebäude"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T Blaupausen: Service-Gebäude#!\nEin Architekt kann drei mögliche Blaupausen in der Kategorie 'Service' entwickeln: das [GetBuildingType('building_gaudi_almshouse').GetName], die [GetBuildingType('building_gaudi_school').GetName] und das [GetBuildingType('building_gaudi_prison').GetName]. Einige Blaupausen erfordern Technologien, und einige Gebäude haben spezielle Anforderungen an ihre entsprechenden Staaten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_almshouse').GetName] erfordert [GetTechnology('egalitarianism').GetName].\n[GetBuildingType('building_gaudi_school').GetName] erfordert [GetTechnology('empiricism').GetName].\n[GetBuildingType('building_gaudi_prison').GetName] erfordert [GetTechnology('law_enforcement').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "Blaupausen: Gesundheitseinrichtungen"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T Blaupausen: Gesundheitseinrichtungen#!\nEin Architekt kann drei mögliche Blaupausen in der Kategorie 'Gesundheit' entwickeln: die [GetBuildingType('building_gaudi_canalization').GetName], das [GetBuildingType('building_gaudi_hospital').GetName] und die [GetBuildingType('building_gaudi_health').GetName]. Einige Blaupausen erfordern Technologien, und einige Gebäude haben spezielle Anforderungen an ihre entsprechenden Staaten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_canalization').GetName] erfordert [GetTechnology('modern_sewerage').GetName].\n[GetBuildingType('building_gaudi_hospital').GetName] erfordert [GetTechnology('theiler_microbiology_tech').GetName].\n[GetBuildingType('building_gaudi_health').GetName] erfordert [GetTechnology('pharmaceuticals').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "Blaupausen: Nationale Akademien"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T Blaupausen: Nationale Akademien#!\nEin Architekt kann drei mögliche Blaupausen in der Kategorie 'Akademien' entwickeln: das [GetBuildingType('building_gaudi_science').GetName], das [GetBuildingType('building_gaudi_arts').GetName] und das [GetBuildingType('building_gaudi_sports').GetName]. Einige Blaupausen erfordern Technologien, und einige Gebäude haben spezielle Anforderungen an ihre entsprechenden Staaten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_science').GetName] erfordert [GetTechnology('dialectics').GetName].\n[GetBuildingType('building_gaudi_arts').GetName] erfordert [GetTechnology('romanticism').GetName]].\n[GetBuildingType('building_gaudi_sports').GetName] erfordert [GetTechnology('vikelas_international_sports_tech').GetName].#!"
 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('urban_planning').GetName] erforscht.#!"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "Öffentliches Bauwesen"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Öffentliches Bauwesen#!\nJe nach Architekturstil kann ein Architekt Baupunkte auf nationaler Ebene beisteuern, um den öffentlichen Bau voranzutreiben. Nach fünf Jahren ununterbrochener Arbeit erhalten sie einen Reputationsschub.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "Meisterwerk eines Architekten"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T Meisterwerk eines Architekten#!\nEin [concept_gaudi_great_architect] kann einmal einen Entwurf für ein einzigartiges Nationaldenkmal im modernen Stil entwerfen. Dieses Lebenswerk wird den Namen des Architekten verleugnen und unserem Land ein eigenes architektonisches Weltwunder bescheren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] mit der [concept_character_trait] #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! oder #V $gaudi_art_deco_style$#!.#!"
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_gaudi_architect','$concept_gaudi_architects$')].#!"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "Stadtplanung"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T Stadtplanung#!\nArchitekten können die Stadtzentren einer Nation besuchen und die Bedingungen dort durch vorausschauende Planung und Bauvorschriften erheblich verbessern.\nDadurch werden Ihrem Gebäude mit der Zeit drei Modifikatoren hinzugefügt: $gaudi_urban_building_throughput_add_modifier_with_tooltip$, $gaudi_urban_building_production_mult_modifier_with_tooltip$ und $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text Mindestens ein [GetBuildingType('building_urban_center').GetName] der Stufe 1 oder höher hat nicht alle drei [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_ARCHITECT_STUDY_TRIP_BUTTON: "Architekten-Studienreise"
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T Architekten-Studienreise#!\nSchicken Sie Ihren Architekten für zwei Jahre weg, um neue Kenntnisse und Fähigkeiten in architektonischen Angelegenheiten zu erwerben. Der Architekt wird während dieser Zeit nicht verfügbar sein.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text Unser Architekt hat #R noch keine#! Studienreisenunternommen.#!"
 mr_gui_has_modern_sewerage_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('modern_sewerage').GetName] erforscht.#!"
 mr_gui_has_steel_frame_buildings_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('steel_frame_buildings').GetName] erforscht.#!"
 mr_gui_has_elevator_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('elevator').GetName] erforscht.#!"
 mr_gui_has_art_deco_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('elgar_art_deco_tech').GetName] erforscht.#!"
 mr_gui_has_neoclassicism_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('elgar_neoclassicism_tech').GetName] erforscht.#!"
 mr_gui_has_new_objectivity_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('elgar_new_objectivity_tech').GetName] erforscht.#!"
 mr_gui_has_defense_in_depth_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('defense_in_depth').GetName] erforscht.#!"
 mr_gui_has_logistics_tech_trigger_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat [GetTechnology('logistics').GetName] erforscht.#!"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "Hauptstadterweiterung"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T Hauptstadterweiterung#!\nNeue Architekturstile und neue Bautechnologien eröffnen die Möglichkeit, unsere Hauptstadt von einer verschlafenen Kleinstadt über ein Jahrhundert zu einer der wichtigsten Metropolen unserer Zeit zu entwickeln.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] mit der [concept_character_trait] #V $gaudi_historicism_style$#!, #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! oder #V $gaudi_art_deco_style$#!.#!"
 MR_ARCHITECT_TREATISE_BUTTON: "Abhandlung über Architektur"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Architektur-Abhandlung#!\nEin Architekt kann seine theoretischen Ideen zur Architektur einmal in seinem Leben zusammenfassen. Seine Ergebnisse können von einem anderen Architekten übertroffen werden, wenn dieser besser ist. Das Ergebnis hängt weitgehend von der Erfahrung ab. Ein Architekt, der an einer Abhandlung arbeitet, ist ein Jahr lang nicht erreichbar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TREATISE_TRIGGER_TT: "#default_text Unser Architekt hat #R noch keine#! Abhandlung geschrieben.#!"
 MR_ARCHITECT_TREATISE_EXPERIENCE_TRIGGER_TT: "#default_text Der Architekt hat mindestens ein #V Repuation#! von #p 250#!.#!"
 MR_BETTER_TREATISE_TRIGGER_TT: "#default_text Die potentielle Abhandlung des Architekten ist #G besser#! als die letzte Abhandlung.#!"
 MR_HAS_ARCHITECTURE_SCHOOL_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine #V $pm_artists_arts_academy_school$#! in einer [GetBuildingType('building_art_academy').GetName].#!"
