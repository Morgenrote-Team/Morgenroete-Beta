 theiler_gui_current_microscope_compound_tooltip_loc: "Ihre Wissenschaftler verwenden derzeit ein $theiler_early_compound_microscope_flag$.\n\nSobald Sie [GetTechnology('theiler_microbiology_tech').GetName] erforscht haben, können Sie mit der Entwicklung eines $theiler_achromatic_microscope_flag$ beginnen. Um die Entwicklung abzuschließen, müssen Ihr [concept_tesla_engineer] und Ihr [concept_theiler_biologist] #V 12 Monate#! daran arbeiten. Zusätzlich benötigen Sie ein [GetBuildingType('building_glassworks').GetName]-Gebäude der Stufe #V 3#!."
 theiler_gui_current_microscope_achromatic_tooltip_loc: "Ihre Wissenschaftler verwenden derzeit ein $theiler_achromatic_microscope_flag$.\n\nSobald Sie [GetTechnology('verrier_nuclear_physics_tech').GetName] erforscht haben, können Sie mit der Entwicklung eines $theiler_electron_microscope_flag$ beginnen. Um die Entwicklung abzuschließen, müssen Ihr [concept_tesla_engineer] und Ihr [concept_theiler_biologist] #V 12 Monate#! daran arbeiten. Zusätzlich benötigen Sie ein [GetBuildingType('building_glassworks').GetName]-Gebäude der Stufe #V 5#!."
 theiler_gui_current_microscope_electron_tooltip_loc: "Ihre Wissenschaftler verwenden derzeit ein $theiler_electron_microscope_flag$.\n\nDies ist das modernste Mikroskop."
 MR_AUTOMATE_BIOLOGIST_TT: "#T Automatisierung des [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]#!\nWenn Sie die Aufgaben automatisieren, müssen Sie Ihrem Biologen keine Aufgaben mehr zuweisen.\nSie arbeiten selbstständig und führen die Aufgaben aus, die gerade sinnvoll sind. Sie erhalten jedoch weiterhin einige Benachrichtigungen."
 mr_biologist_automation_gui_tt: "Starten Sie die Automatisierung der Aufgaben des [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]."
 mr_stop_biologist_automation_gui_tt: "Stoppen Sie die Automatisierung der Aufgaben des [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]."
 MR_STOP_AUTOMATE_BIOLOGIST_TT: "#T Automatisierung des [Concept('concept_theiler_biologist','$concept_theiler_biologists$')] stoppen#!\nDie Arbeit Ihres Biologen wird nicht länger automatisiert sein."