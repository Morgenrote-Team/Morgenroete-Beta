l_german:
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON: "Mikroorganismenforschung"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON_TT: "#T Mikroorganismenforschung#!\nDie Suche nach neuen [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], ihre Untersuchung und die damit verbundenen Experimente sind ein wesentlicher Bestandteil der mikrobiologischen Arbeit. Biologen können nicht nur Vorarbeiten für die Suche nach einem Krankheitserreger leisten, sondern auch zufällige Entdeckungen machen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_ACTIVE_TT: "#T Mikroorganismenforschung#!\nIhr [concept_theiler_biologist] ist derzeit auf der Suche nach neuen [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], untersucht diese und führt Experimente mit ihnen durch. Biologen können nicht nur Vorarbeiten für die Suche nach einem Krankheitserreger leisten, sondern auch zufällige Entdeckungen machen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON: "Krankheitserreger finden"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON_TT: "#T Krankheitserreger finden#!\nDie Suche nach einem [concept_theiler_pathogen] ist eine Voraussetzung für die anschließende Entwicklung eines Impfstoffs. Je nach Pathogen kann der Entdeckungsprozess länger dauern oder nur unter bestimmten Bedingungen beginnen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_ACTIVE_TT: "#T Krankheitserreger finden#!\nIhr [concept_theiler_biologist] sucht derzeit nach einem [concept_theiler_pathogen], der eine Voraussetzung für die anschließende Entwicklung eines Impfstoffs ist. Je nach Erreger kann der Entdeckungsprozess länger dauern oder nur unter bestimmten Bedingungen beginnen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACTIVE_BIOLOGIST_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_theiler_biologist','$concept_theiler_biologists$')], der #V nicht beschäftigt#! ist.#!"
 MR_ACHROMATIC_MICROSCOPE_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] verwendet mindestens ein #V Achromatisches Mikroskop#!.#!"
 MR_BIOLOGIST_CAN_FIND_PATHOGEN_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine Krankheit beschrieben, für die es noch kein Krankheitserreger entdeckt wurde, und verfügt auch über ein hochentwickeltes Mikroskop, um diesen zu finden (achromatisches Mikroskop für Bakterien, Elektronenmikroskop für Viren). Je kleiner der Krankheitserreger ist, desto mehr Mikroorganismen müssen bekannt sein, bevor mit der Suche begonnen werden kann. Um beispielsweise den Choleraerreger (den Krankheitserreger mit der geringsten Hürde) zu finden, müssen mindestens 1.000 Mikroorganismen im Voraus bekannt sein.#!"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON: "Impfstoff entwickeln"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON_TT: "#T Impfstoff entwickeln#!\nIhr [concept_theiler_biologist] entwickelt derzeit einen Impfstoff, das Nonplusultra der Arbeit eines Biologen. Dazu muss zunächst der [concept_theiler_pathogen] erforscht werden, der die Krankheit verursacht. Unter bestimmten Umständen können [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] den Ausbruch der Krankheit vollständig verhindern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CREATE_VACCINE_ACTIVE_TT: "#T Impfstoff entwickeln#!\nDie Entwicklung von Impfstoffen ist das höchste Ziel eines Biologen. Dazu muss zunächst der [concept_theiler_pathogen] erforscht werden, der die Krankheit verursacht. Unter bestimmten Umständen kann [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] den Ausbruch der Krankheit vollständig verhindern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CAN_CREATE_VACCINE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen Krankheitserreger entdeckt, für den es noch keinen Impfstoff gibt, und verfügt auch über die entsprechende Technologie.#!"
 MR_10000_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 10.000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (derzeit [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Botanische Expedition#!\nBotanische Expeditionen (manchmal auch als „Pflanzenjagd” bezeichnet) sind wissenschaftliche Reisen, deren Ziel es ist, die Flora einer bestimmten Region zu erforschen. Ein [concept_dubois_naturalist] ist für die Identifizierung, Beschreibung und Sammlung von Exemplaren und [concept_ito_medicinal_plants] verantwortlich.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Botanische Expeditionen wurden aus #V politischen Gründen#! verboten.#!"
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt einen Staat mit einer [concept_ito_medicinal_plants]-Eigenschaft. Sollte der Staat ein #V Malaria-Staat#! sein, müssen Sie zusätzlich die [concept_technology] [GetTechnology('malaria_prevention').GetName] erforscht haben.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Naturforscher von botanischer Expedition zurückrufen#!\nBefiehlt dem [concept_dubois_naturalist], seine botanische Forschung zu unterbrechen, um ihn für andere Zwecke einzusetzen – beispielsweise zum Fangen von Tieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text Ihr [concept_dubois_naturalist] ist #V weder auf Reisen noch krank#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Ihr [concept_dubois_naturalist] ist nicht mehr beschäftigt."
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON: "Ausrottung der Schraubenwurmfliege"
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON_TT: "#T Ausrottung der Schraubenwurmfliege#!\nAngesichts der umfangreichen technologischen Möglichkeiten könnte ein Biologe mit staatlicher Unterstützung eine Methode erforschen, um die lästige Schraubenwurmfliege endgültig auszurotten. Dies würde die landwirtschaftlichen Erträge in den betroffenen Regionen verbessern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_COCHLIOMYIA_STATE_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens einen Staat mit dem [concept_modifier] #V $theiler_state_trait_cochliomyia$#!.#!"
 MR_BIOLOGIST_STI_BUTTON: "Sterile-Insekten-Technik"
 MR_BIOLOGIST_STI_BUTTON_TT: "#T Sterile-Insekten-Technik#!\nIn einem von Schraubenwurmfliegen heimgesuchten Bundesstaat kann ein Biologe versuchen, den Parasiten in einem dreijährigen Versuch auszurotten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CYDIA_PESTICIDE_BUTTON: "Cydia-Pestizid"
 MR_BIOLOGIST_CYDIA_PESTICIDE_BUTTON_TT: "#T Cydia-Pestizid#!\nEin Biologe kann ein wirksames Pestizid entwickeln, um die Obstbauern unseres Landes von den Ernteausfällen zu befreien, die durch den Apfelwickler verursacht werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CYDIA_STATE_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens einen Staat mit dem [concept_modifier] #V $theiler_state_trait_cydia$#!.#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON: "Landwirtschaft verbessern"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON_TT: "#T Landwirtschaft verbessern#!\nIhr Biologe kann seine Fähigkeiten einsetzen, um die landwirtschaftlichen Gebäude in Ihrem Land zu verbessern. Dadurch wird eines Ihrer [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] oder [GetBuildingGroup('bg_plantations').GetName]-Gebäude verbessert.\n\nModifikatoren, die das Gebäude erhält:\n$theiler_building_throughput_add_modifier_with_tooltip$\n$theiler_building_production_mult_modifier_with_tooltip$\n$theiler_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_TRIGGER_TT: "#default_text Mindestens ein [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] oder [GetBuildingGroup('bg_plantations').GetName]-Gebäude der Stufe 1 oder höher verfügt nicht über alle drei [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_ACTIVE_TT: "#T Landwirtschaft verbessern#!\n#p Ihr Biologe verbessert derzeit ein [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] oder [GetBuildingGroup('bg_plantations').GetName]-Gebäude.#!"