 theiler_biologist_no_biologist_achievements_loc: "Die #V Errungenschaften dieses [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]#! werden hier angezeigt, sobald Sie einen haben."
 theiler_biologist_achievements_intro_loc: "#V Errungenschaften dieses Biologen#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein erfolgreicher Biologe.#!"
 theiler_microbiology_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] gilt als Begründer der modernen Mikrobiologie.#!"
 theiler_cholera_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] entdeckte als Erster das Bakterium, das Cholera verursacht, und beschrieb und isolierte es anschließend.#!"
 theiler_tuberculosis_pathogen_achievement_loc: "\n #indent_newline:3 • Der Erreger der Tuberkulose wurde erstmals von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] entdeckt, der ihn auch charakterisierte und isolierte.#!"
 theiler_smallpox_pathogen_achievement_loc: "\n #indent_newline:3 • Es war Dr. [Scope.GetCharacter.GetLastNameNoFormatting], der als Erster den Mikroorganismus entdeckte, der die Pocken verursacht, und ihn dokumentierte und isolierte.#!"
 theiler_typhus_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] identifizierte den Erreger von Typhus und beschrieb und isolierte ihn erfolgreich.#!"
 theiler_yellow_fever_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war der bahnbrechende Wissenschaftler, der den Erreger des Gelbfiebers entdeckte, beschrieb und isolierte.#!"
 theiler_measles_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] entdeckte den Masernerreger, beschrieb ihn und isolierte ihn.#!"
 theiler_scarlet_pathogen_achievement_loc: "\n #indent_newline:3 • Der erste, der das Bakterium entdeckte, das Scharlach verursacht, war Dr. [Scope.GetCharacter.GetLastNameNoFormatting], der es auch beschrieb und isolierte.#!"
 theiler_plague_pathogen_achievement_loc: "\n #indent_newline:3 • Der Erreger der Seuche wurde ursprünglich von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] entdeckt, der ihn beschrieb und erfolgreich isolierte.#!"
 theiler_diphteria_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] identifizierte als Erster den Mikroorganismus, der Diphtherie verursacht, und beschrieb und isolierte ihn später.#!"
 theiler_polio_pathogen_achievement_loc: "\n #indent_newline:3 • Die Entdeckung, Beschreibung und Isolierung des Polio-Erregers gelang erstmals Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_cholera_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war ein Pionier bei der Entwicklung, Erprobung und Herstellung eines wirksamen Cholera-Impfstoffs.#!"
 theiler_tuberculosis_vaccine_achievement_loc: "\n #indent_newline:3 • Der erste Wissenschaftler, der einen Tuberkulose-Impfstoff entwickelt, getestet und hergestellt hat, war Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_smallpox_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war der Erste, der einen Impfstoff gegen Pocken entwickelt, getestet und hergestellt hat.#!"
 theiler_typhus_vaccine_achievement_loc: "\n #indent_newline:3 • Die Entwicklung, Erprobung und Herstellung des ersten wirksamen Typhus-Impfstoffs wurde von Dr. [Scope.GetCharacter.GetLastNameNoFormatting] durchgeführt.#!"
 theiler_yellow_fever_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] leitete die ersten erfolgreichen Bemühungen zur Entwicklung, Erprobung und Herstellung eines Impfstoffs gegen Gelbfieber.#!"
 theiler_measles_vaccine_achievement_loc: "\n #indent_newline:3 • Der erste, der einen wirksamen Masernimpfstoff entwickelte, testete und herstellte, war Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_scarlet_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war der bahnbrechende Wissenschaftler hinter dem ersten getesteten und produzierten Impfstoff gegen Scharlach.#!"
 theiler_plague_vaccine_achievement_loc: "\n #indent_newline:3 • Die Entwicklung, Erprobung und Herstellung eines wirksamen Impfstoffs gegen die Pest gelang erstmals Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_diphteria_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat den ersten wirksamen Impfstoff gegen Diphtherie erfolgreich entwickelt, getestet und hergestellt.#!"
 theiler_polio_vaccine_achievement_loc: "\n #indent_newline:3 • Die Entwicklung, Erprobung und Herstellung eines wirksamen Polio-Impfstoffs gelang erstmals Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_pharmaceutical_strychnine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] gilt als derjenige, der als Erster ein Medikament auf Strychninbasis entdeckt hat.#!"
 theiler_pharmaceutical_emetine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] gilt als Pionier in der Entwicklung eines auf Emetin basierenden Medikaments.#!"
 theiler_pharmaceutical_atropine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] gilt als der erste Entdecker eines Medikaments auf Atropinbasis.#!"
 theiler_pharmaceutical_aloin_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wird die erste Entdeckung eines auf Aloin basierenden Medikaments zugeschrieben.#!"
 theiler_pharmaceutical_digitoxin_achievement_loc: "\n #indent_newline:3 • Die Entdeckung eines Medikaments auf Digitoxinbasis geht auf Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zurück.#!"
 theiler_pharmaceutical_quinine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war der Erste, der ein Medikament auf der Basis von Chinin entwickelte.#!"
 theiler_pharmaceutical_thymol_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] wird die erste Entdeckung eines Arzneimittels auf Thymolbasis zugeschrieben.#!"
 theiler_pharmaceutical_pilocarpine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] gilt als Entdecker eines auf Pilocarpin basierenden Medikaments.#!"
 theiler_pharmaceutical_ephedrine_achievement_loc: "\n #indent_newline:3 • Die erste Entdeckung eines Medikaments auf Ephedrinbasis wird Dr. [Scope.GetCharacter.GetLastNameNoFormatting] zugeschrieben.#!"
 theiler_pharmaceutical_strophantine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] gilt als derjenige, der als Erster ein Medikament auf Strophanthinbasis entdeckt hat.#!"