l_german:
 MR_AUTOMATE_ENGINEER_TT: "#T Automatisierung des [Concept('concept_tesla_engineer','#b #ORANGE Ingenieurs#!#!')]#!\nSie müssen Ihren Ingenieur keine Aufgaben mehr geben, wenn Sie sie automatisieren.\nSie werden unabhängig arbeiten und Aufgaben ausführen, die im Moment sinnvoll sind. Sie werden aber immer noch einige Ereignisse erhalten.\n\n#n Beachten Sie, dass die Automatisierung wahrscheinlich weniger effizient ist, als wenn Sie den Ingenieur direkt steuern.#!"
 mr_engineering_automation_gui_tt: "Starte die Automatisierung der Aufgaben des [Concept('concept_tesla_engineer','#b #ORANGE Ingenieurs#!#!')]."
 mr_stop_engineering_automation_gui_tt: "Stoppe die Automatisierung der Aufgaben des [Concept('concept_tesla_engineer','#b #ORANGE Ingenieurs#!#!')]."
 MR_STOP_AUTOMATE_ENGINEER_TT: "#T Stoppt die Automatisierung des [Concept('concept_tesla_engineer','#b #ORANGE Ingenieurs#!#!')]#!\nIhr Ingenieur wird nicht mehr automatisiert arbeiten."
 MR_ENGINEER_RANKING_BUTTON: "Ingenieure"
 MR_RANKING_BY_ENGINEER: "Ranking aller [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] in der Welt anzeigen."
 ENGINEER_ENGINEER_RANKING_HEADER: "#V [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] der Welt, geordnet nach [concept_academics_experience]"
 tesla_experience_current_specialization_civil_loc: "[Character.MakeScope.GetVariable('tesla_civil_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_mechanical_loc: "[Character.MakeScope.GetVariable('tesla_mechanical_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_military_loc: "[Character.MakeScope.GetVariable('tesla_military_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_electrical_loc: "[Character.MakeScope.GetVariable('tesla_electrical_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_aeronautical_loc: "[Character.MakeScope.GetVariable('tesla_aeronautical_engineer_experience_var').GetValue|V0]"