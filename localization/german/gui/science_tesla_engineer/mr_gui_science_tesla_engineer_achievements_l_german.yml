 tesla_engineer_achievements_no_engineer_loc: "Die #V Errungenschaften dieser [concept_gaudi_engineer]#! werden hier angezeigt, sobald Sie eine haben." #deepl:2624550252
 tesla_engineer_achievements_intro_loc: "#V Errungenschaften dieses Ingenieurs#!\n" #deepl:3891137056

 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] baute das erste #V Gebäude in Stahlrahmenbauweise#!. Diese Bauweise verbreitete sich in der ganzen Welt wie ein Lauffeuer." #deepl:3716706247
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\nIn [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] erfand er ein #V Auto mit einem Verbrennungsmotor#! und fuhr damit eine lange Strecke. Dies war der Beginn der explosionsartigen Verbreitung des Automobils." #deepl:88145422
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] verbesserte #V Straßennetze#!. Dank der Arbeiten von [Scope.GetCharacter.GetHerHis] zur Modernisierung der Straßen gelten diese nun als die modernsten der Welt." #deepl:2097415548
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] wurden viele #V neue Brücken#! gebaut, was zu einer besseren Infrastruktur führte." #deepl:2671184667
 tesla_engineer_achievements_finished_tunnel_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] arbeitete an der Konstruktion vieler #V Tunnel#!, die kleine Wunderwerke der Technik sind." #deepl:922154902
 tesla_engineer_achievements_finished_railway_project_loc: "\n[Scope.GetCharacter.GetSheHe] massiv #V verbesserte Eisenbahnlinien#! durch die Einführung neuer Technologien und anderer Verbesserungen." #deepl:721890021
 tesla_engineer_achievements_finished_construction_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  verbesserte den Bausektor#! durch die Einführung moderner Ausrüstung und Bautechniken." #deepl:987346687
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] hat eine neue #V Topographische Karte#! erstellt, die zukünftige Bauprojekte erleichtert." #deepl:2317700588
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  hat neue Lokomotiven#! entwickelt, die den Eisenbahnen Auftrieb geben werden." #deepl:2246312284
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat verschiedenen Unternehmen geholfen, #V ihre Produktion#! zu verbessern." #deepl:3837789510
 tesla_engineer_achievements_finished_rifles_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  hat ein neues Gewehr#! entworfen, das eines der modernsten der Welt ist." #deepl:373585695
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] ist ein #V Pionier des Tankdesigns und -baus#! der unsere Tanks modernisiert hat." #deepl:1266234006
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  revolutionierte die Feldarbeit und die Verteidigung#!, was vielen Soldaten das Leben rettete." #deepl:3300715553
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] half bei der Durchführung geomagnetischer Forschung, indem er #V ein geomagnetisches Observatorium#! errichtete." #deepl:2611684424
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] hat ein #V Telegrafienetz#! aufgebaut." #deepl:3900781177
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  hat ein Funknetz#! aufgebaut." #deepl:494089721
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  hat die Flughäfen#! modernisiert." #deepl:4174187253
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] entwickelt #V Moderne Flugzeuge für das Militär#!." #deepl:3583316823
 tesla_engineer_achievements_bicycle_invented_loc: "In [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  wurde das erste Bycycle#! erfunden. Eine großartige neue Art zu reisen, indem man nur seine eigene Energie nutzt." #deepl:1060401141
