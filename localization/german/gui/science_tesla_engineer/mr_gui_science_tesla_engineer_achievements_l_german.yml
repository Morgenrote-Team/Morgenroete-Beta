 tesla_engineer_achievements_loc: "$tesla_engineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_iron_lung_inventor_var').IsSet , Scope.Var('panum_physician_achievement_iron_lung_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_road_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_road_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_irrigation_project_finished_engineer_var').IsSet , Scope.Var('tesla_irrigation_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_railway_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_railway_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_construction_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_construction_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "Die #V Errungenschaften dieser [concept_gaudi_engineer]#! werden hier angezeigt, sobald Sie eine haben."
 tesla_engineer_achievements_intro_loc: "#V Errungenschaften dieses Ingenieurs#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] baute das erste #V Gebäude in Stahlrahmenbauweise#!. Diese Bauweise verbreitete sich in der ganzen Welt wie ein Lauffeuer."
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] war die erste Person, die mittels eines von [Scope.GetCharacter.GetHerHim] erfundenen Alphabets ein #V Telegram verschickt hat#! ."
 tesla_engineer_achievements_invented_automobile_loc: "\nIn [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] erfand er ein #V Auto mit einem Verbrennungsmotor#! und fuhr damit eine lange Strecke. Dies war der Beginn der explosionsartigen Verbreitung des Automobils."
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] verbesserte #V Straßennetze#!. Dank der Arbeiten von [Scope.GetCharacter.GetHerHis] zur Modernisierung der Straßen gelten diese nun als die modernsten der Welt."
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] wurden viele #V neue Brücken#! gebaut, was zu einer besseren Infrastruktur führte."
 tesla_engineer_achievements_finished_tunnel_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] arbeitete an der Konstruktion vieler #V Tunnel#!, die kleine Wunderwerke der Technik sind."
 tesla_engineer_achievements_finished_railway_project_loc: "\n[Scope.GetCharacter.GetSheHe] massiv #V verbesserte Eisenbahnlinien#! durch die Einführung neuer Technologien und anderer Verbesserungen."
 tesla_engineer_achievements_finished_construction_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  verbesserte den Bausektor#! durch die Einführung moderner Ausrüstung und Bautechniken."
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] hat eine neue #V Topographische Karte#! erstellt, die zukünftige Bauprojekte erleichtert."
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  hat neue Lokomotiven#! entwickelt, die den Eisenbahnen Auftrieb geben werden."
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] hat verschiedenen Unternehmen geholfen, #V ihre Produktion#! zu verbessern."
 tesla_engineer_achievements_finished_rifles_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  hat ein neues Gewehr#! entworfen, das eines der modernsten der Welt ist."
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] ist ein #V Pionier des Tankdesigns und -baus#! der unsere Tanks modernisiert hat."
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  revolutionierte die Feldarbeit und die Verteidigung#!, was vielen Soldaten das Leben rettete."
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] half bei der Durchführung geomagnetischer Forschung, indem er #V ein geomagnetisches Observatorium#! errichtete."
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] hat ein #V Telegrafienetz#! aufgebaut."
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  hat ein Funknetz#! aufgebaut."
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  hat die Flughäfen#! modernisiert."
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] entwickelt #V Moderne Flugzeuge für das Militär#!."
 tesla_engineer_achievements_bicycle_invented_loc: "In [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  wurde das erste Bycycle#! erfunden. Eine großartige neue Art zu reisen, indem man nur seine eigene Energie nutzt."