l_german:
 mr_science_geologist_tab_organization: "Organisation"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "Der Höchste Berg"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T Der höchste Berg#!\nSeit dem 18. Jahrhundert ist das bestehende geologische Weltbild zunehmend ins Wanken geraten. Während die Anden lange Zeit als das höchste Gebirge der Welt galten, rückt der Himalaya immer mehr in den Vordergrund. Die Suche nach dem höchsten Berg hat die Phantasie der Geologen beflügelt - ist aber noch lange nicht zu Ende.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat ein Interesse an der Himalaya-Region.#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text Keine andere Nation ist derzeit auf der Suche nach dem höchsten Berg im Himalaya.#!"
 MR_GEOLOGIST_URANIUM_BUTTON: "Uran-Expedition"
 MR_GEOLOGIST_URANIUM_BUTTON_TT: "#T Uran-Expedition#!\nEin Geologe kann im Ausland nach Uranvorkommen suchen und dort möglicherweise eine eigene Mine errichten. Um das Uran in unserem Land zu erhalten, müssen wir jedoch einen separaten Vertrag abschließen. Dieser Prozess kann bis zu fünf Jahre dauern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_FIND_URANIUM_TRIGGER_TT: "#default_text Es gibt mindestens ein unentdecktes Uranvorkommen.#!"
 MR_GEOLOGIST_URANIUM_STOP_BUTTON_TT: "#T Uran-Expedition#!\nIhr [concept_agassiz_geologist] ist derzeit auf der Suche nach unbekannten Uranvorkommen auf der ganzen Welt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_uranium_stop_button_effect_tt: "Ihr [concept_agassiz_geologist] wird die Suche nach Uran einstellen."