l_german:

 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]" #deepl:4065666483

 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]" #deepl:1006055885
 agassiz_geologist_no_geologist_loc: "Die #V Errungenschaften dieser [concept_agassiz_geologist]#! werden hier angezeigt, sobald Sie eine haben." #deepl:2266901269
 agassiz_geologist_achievements_intro_loc: "#V Errungenschaften dieses Geologen#!\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] ist ein versierter Geologe, der [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] und [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] gesammelt hat. [Scope.GetCharacter.GetHerHis|U] Forschung in der Geologie hat uns [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] geliefert." #deepl:2506244890

 agassiz_geologist_achievement_invented_seismology_loc: "\nDie #V Erfindung der Seismologie#! ist eine der größten Leistungen von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]. Mit ihr lassen sich Erdbeben und Vulkanausbrüche vorhersagen." #deepl:4027906331
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\nIst die #V Erfindung der Theorie der Plattentektonik#! eine der größten Leistungen von Dr. [Scope.GetCharacter.GetLastNameNoFormatting]? Da nicht alle [Scope.GetCharacter.GetHerHis] Kollegen die Theorie akzeptieren, wird nur die Zukunft zeigen, ob sie als [Scope.GetCharacter.GetHerHis] wichtigste Entdeckung angesehen wird oder ob sie in Vergessenheit gerät." #deepl:1012351458
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  nahm an dem Geologischen Kongress über Plattentektonik#! teil." #deepl:941722190
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V Die Erforschung eines Vulkans#! ist ein gefährliches Unterfangen, aber Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hat bei der Expedition auf einem Vulkan eine Menge gelernt." #deepl:3489984187
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] war die erste Person, die #V Helium auf der Erde#! entdeckte, das in Zukunft sicherlich eine sehr nützliche Ressource sein wird." #deepl:1490724762
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting] nahm an einer #V Pazifik-Expedition#! teil." #deepl:1964542330
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] hat angeblich #V den Mittelpunkt der Erde#! erreicht und ist von dort wieder zurückgekehrt. Aber ist diese Geschichte wirklich wahr?" #deepl:3298936682
