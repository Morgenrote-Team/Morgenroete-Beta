l_german:
 MR_STANDARD_TIME_BUTTON: "Einführung der Standardzeit"
 MR_STANDARD_TIME_BUTTON_TT: "#T Einführung einer Standardzeit#!\nMit der zunehmenden Bedeutung von Minuten und Stunden in einer Welt, die nicht mehr im Takt von Glockentürmen, sondern von Bahnhofsuhren schlägt, ist es zu einem wichtigen Anliegen geworden, die Zeit im ganzen Land mit einer Standardzeit zu vereinheitlichen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PRIME_MERIDIAN_BUTTON: "Der Nullmeridian"
 MR_PRIME_MERIDIAN_BUTTON_TT: "#T Der Nullmeridian#!\nMit der zunehmenden Einführung nationaler Standardzeiten ist ein neues Problem entstanden: die Suche nach einem Nullmeridian, der als Bezugspunkt für internationale Zeitzonen dienen könnte.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_3_GREAT_POWERS_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text Mindestens #V 3 Großmächte#! haben eine Standardzeit eingeführt. #!"
 MR_20_COUNTRIES_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text Mindestens #V 20 Länder#! haben eine Standardzeit eingeführt.#!"