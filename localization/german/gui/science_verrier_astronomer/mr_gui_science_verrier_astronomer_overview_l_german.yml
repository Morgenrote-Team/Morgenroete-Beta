l_german:
 MR_AUTOMATE_ASTRONOMER_TT: "#T Automatisierung des [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]#!\nSie müssen Ihren Astronomen keine Aufgaben mehr geben, wenn sie ihn automatisieren.\nSie werden unabhängig arbeiten und Aufgaben ausführen, die im Moment Sinn machen. Sie werden aber immer noch einige Ereignisse erhalten."
