l_german:
 MR_AUTOMATE_ASTRONOMER_TT: "#T Automatisierung des [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]#!\nSie müssen Ihren Astronomen keine Aufgaben mehr geben, wenn sie ihn automatisieren.\nSie werden unabhängig arbeiten und Aufgaben ausführen, die im Moment Sinn machen. Sie werden aber immer noch einige Ereignisse erhalten."
 mr_astronomy_automation_gui_tt: "Starte die Automatisierung der Aufgaben des [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]."
 mr_stop_astronomy_automation_gui_tt: "Stoppe die Automatisierung der Aufgaben des [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]."
 MR_STOP_AUTOMATE_ASTRONOMER_TT: "#T Automatisierung des [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] stoppen#!\nIhr Astronom wird nicht mehr automatisiert arbeiten."
 MR_ASTRONOMER_RANKING_BUTTON: "Astronomen"
 MR_RANKING_BY_ASTRONOMER: "Ranking aller [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] in der Welt anzeigen."
