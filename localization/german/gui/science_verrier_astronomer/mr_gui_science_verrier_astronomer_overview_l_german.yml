 MR_ASTRONOMY_MERIDIAN_TT: "#T Nullmeridian#!\nDer Nullmeridian ist der Meridian, der für die allgemeine mittlere Zeit verwendet wird.\nZurzeit befindet sich der Prime Meridian in: [GetPlayer.GetCustom('verrier_prime_meridian_city')|V]"