 verrier_astronomer_achievement_moon_fission_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] gilt als Begründer der Theorie, dass der #V Mond ein Teil der Erde#! war und sich abgespalten hat.#!"
 verrier_astronomer_achievement_moon_capture_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] gilt als Begründer der Theorie, dass der #V Mond ein Fremdkörper ist, der von der Erde eingefangen wurde#!.#!"
 verrier_astronomer_achievement_centaur_discoverer_loc: "\n #indent_newline:3 • While searching for Planet X, [Scope.GetCharacter.GetSheHe] #V found the first Centaur#!, a separate class of asteroids located between Jupiter and Neptune.#!"