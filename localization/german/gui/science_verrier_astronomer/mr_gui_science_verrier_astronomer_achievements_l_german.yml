 verrier_astronomer_achievements_no_astronomer_loc: "Die #V Errungenschaften dieses [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]#! werden hier angezeigt, sobald Sie einen haben."
 verrier_astronomer_achievements_intro_loc: "#V Errungenschaften dieses Astronomen#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] ist ein versierter Astronom, der [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt hat.#!"
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n #indent_newline:3 • Durch die Messung der #V Entfernung von 61 Cygni mit 11,4 Lichtjahren#! gelang es [Scope.GetCharacter.GetLastNameNoFormatting], auf einen Schlag zu zeigen, dass das Universum viel größer ist als bisher angenommen.#!"
 verrier_astronomer_achievement_helium_discovered_loc: "\n #indent_newline:3 • Einer [Scope.GetCharacter.GetHerHis]er größten Erfolge ist die #V Entdeckung des Elements Helium#! bei der Untersuchung des elektromagnetischen Spektrums der Sonne.#!"
 verrier_astronomer_achievement_uranus_discoverer_loc: "\n #indent_newline:3 • Niemand erwartete die Entdeckung eines neuen Planeten, aber Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V entdeckte den Planeten Uranus#!. Diese Entdeckung führte zur Suche nach weiteren Planeten in unserem Sonnensystem.#!"
 verrier_astronomer_achievement_ceres_discoverer_loc: "\n #indent_newline:3 • Viele Astronomen suchten nach dem Planeten zwischen Mars und Jupiter. Aber Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war derjenige, der #V Ceres gefunden hat#!.#!"
 verrier_astronomer_achievement_pallas_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V fand den Planeten Pallas#! in der Region zwischen Mars und Jupiter.#!"
 verrier_astronomer_achievement_vesta_discoverer_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V fand den Planeten Vesta#! in der Region zwischen Mars und Jupiter.#!"
 verrier_astronomer_achievement_juno_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V fand den Planeten Juno#! in der Region zwischen Mars und Jupiter.#!"
 verrier_astronomer_neptune_discoverer_loc: "\n #indent_newline:3 • Eine [Scope.GetCharacter.GetHerHis]er größten Taten war die #V Entdeckung des Planeten Neptun#!. Diese Entdeckung sicherte [Scope.GetCharacter.GetHerHim] für immer einen Platz in den Geschichtsbüchern.#!"
 verrier_astronomer_achievement_pluto_discoverer_loc: "\n #indent_newline:3 • Obwohl es umstritten war, ob #V Pluto#! überhaupt existiert, #V entdeckte#! Professor [Scope.GetCharacter.GetLastNameNoFormatting] tatsächlich den kleinen Planeten. Eine große astronomische Leistung!#!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\n #indent_newline:3 • #V 1843#! war [Scope.GetCharacter.GetSheHe] der erste Mensch, der#V den Großen Komet entdeckt#!, der deshalb nach [Scope.GetCharacter.GetLastNameNoFormatting] benannt wurde.#!"
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\n #indent_newline:3 • Als der #V Große Komet von 1858#! an der Erde vorbeizog, war Dr. [Scope.GetCharacter.GetLastNameNoFormatting] der erste Mensch, der den Kometen sah. Infolgedessen wurde der Komet nach [Scope.GetCharacter.GetHerHim] benannt.#!"
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\n #indent_newline:3 • Als der erste Mensch, der den #V Großen Kometen von 1861#! in der Dunkelheit des Nachthimmels entdeckte, wurde Professor [Scope.GetCharacter.GetLastNameNoFormatting] zum Namensgeber des Himmelsobjekts.#!"
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n #indent_newline:3 • Als der #V Große Komet von 1874#! zum ersten Mal erschien, war es Dr. [Scope.GetCharacter.GetLastNameNoFormatting], der ihn zuerst bemerkte. Nun wird der Komet für alle Zeiten [Scope.GetCharacter.GetHerHis]en Namen tragen.#!"
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\n #indent_newline:3 • Das Jahr #V 1882#! war aus astronomischer Sicht spektakulär. Professor [Scope.GetCharacter.GetLastNameNoFormatting] entdeckte einen #V Großen Kometen#! bei seinem Vorbeiflug an der Erde. Ein unglaubliches Spektakel.#!"
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • Während einer #V Pazifikexpedition#! entdeckte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] verschiedene neue #V Astronomische Objekte#! in der südlichen Hemisphäre.#!"
 verrier_astronomer_achievement_observed_venus_transit_loc: "\n #indent_newline:3 • Im Jahr #V 1874#! beobachtete Professor [Scope.GetCharacter.GetLastNameNoFormatting] den #V Venustransit#! im Pazifischen Ozean. Normalerweise ist das ein Ereignis, das nur einmal im Leben stattfindet.#!"
 verrier_astronomer_achievement_observed_carrington_event_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] beobachtete die #V Massiven Sonneneruptionen#! in [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue].#!"
 verrier_astronomer_achievement_observed_corona_loc: "\n #indent_newline:3 • Entdeckte die #V [Scope.GetCharacter.GetLastNameNoFormatting]s Perlen#!, die nach [Scope.GetCharacter.GetHerHim] benannt wurden.#!"
 verrier_astronomer_achievement_sun_photo_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] ist der Autor des #V ersten Fotos einer Sonnenfinsternis#!.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V entdeckte den natürlichen Satelliten des Mars, Deimos#!.#!"
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V entdeckte den natürlichen Trabanten des Mars, Phobos#!.#!"
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V entdeckte Jupiters natürlichen Satelliten Amalthea#!.#!"
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V entdeckte Jupiters natürlichen Satelliten Himalia#!.#!"
