 verrier_astronomer_achievements_no_astronomer_loc: "Die #V Errungenschaften dieses [concept_verrier_astronomer]#! werden hier angezeigt, sobald Sie eine haben."
 verrier_astronomer_achievements_intro_loc: "#V Errungenschaften dieses Astronomen#!\n[Scope.GetCharacter.GetFullName] ist ein erfolgreicher Astronom, der [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt hat."
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\nDurch die Messung der #V Entfernung von 61 Cygni bei 11,4 Lichtjahren#! gelang es [Scope.GetCharacter.GetLastNameNoFormatting], auf einen Schlag zu zeigen, dass das Universum viel größer ist als bisher angenommen."
 verrier_astronomer_achievement_helium_discovered_loc: "\nEiner [Scope.GetCharacter.GetHerHis]er größten Erfolge ist die #V Entdeckung des Elements Helium#! bei der Untersuchung des elektromagnetischen Spektrums der Sonne."
 verrier_astronomer_achievement_uranus_discoverer_loc: "\Niemand erwartete die Entdeckung eines neuen Planeten, aber Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den Planeten Uranus#!. Diese Entdeckung führte zur Suche nach weiteren Planeten in unserem Sonnensystem."
 verrier_astronomer_achievement_ceres_discoverer_loc: "\nViele Astronomen suchten nach dem Planeten zwischen Mars und Jupiter. Aber Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war derjenige, der #V Ceres#! gefunden hat."
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  fand den Planeten Pallas#! in der Region zwischen Mars und Jupiter."
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] #V  fand den Planeten Vesta#! in der Region zwischen Mars und Jupiter."
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  fand den Planeten Juno#! in der Region zwischen Mars und Jupiter."
 verrier_astronomer_neptune_discoverer_loc: "\nEine [Scope.GetCharacter.GetHerHis]er größten Taten war die #V Entdeckung des Planeten Neptun#!. Diese Entdeckung sicherte [Scope.GetCharacter.GetHerHim] für immer einen Platz in den Geschichtsbüchern."
 verrier_astronomer_achievement_pluto_discoverer_loc: "\nObwohl es umstritten war, ob #V Pluto#! überhaupt existiert, entdeckte Professor [Scope.GetCharacter.GetLastNameNoFormatting] tatsächlich #V #! den kleinen Planeten. Eine große astronomische Leistung!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\nIn #V 1843#! [Scope.GetCharacter.GetSheHe] wurde als erster #V der Große Komet#! entdeckt, der deshalb nach [Scope.GetCharacter.GetLastNameNoFormatting] benannt wurde."
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\nAls der #V Große Komet von 1858#! an der Erde vorbeizog, war Dr. [Scope.GetCharacter.GetLastNameNoFormatting] der erste, der den Kometen sah. Infolgedessen wurde der Komet nach [Scope.GetCharacter.GetHerHim] benannt."
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\nAls der erste, der den #V Großen Kometen von 1861#! in der Dunkelheit des Nachthimmels entdeckte, wurde Professor [Scope.GetCharacter.GetLastNameNoFormatting] zum Namensgeber des Himmelsobjekts."
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\nAls der #V Große Komet von 1874#! zum ersten Mal erschien, war es Dr. [Scope.GetCharacter.GetLastNameNoFormatting], der ihn zuerst bemerkte. Nun wird der Komet für alle Zeiten [Scope.GetCharacter.GetHerHis]en Namen tragen."
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\nDas Jahr #V 1882#! war aus astronomischer Sicht spektakulär. Professor [Scope.GetCharacter.GetLastNameNoFormatting] entdeckte einen #V Großen Kometen#! bei seinem Vorbeiflug an der Erde. Ein unglaubliches Spektakel."
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\nWährend einer #V Pazifik-Expedition#! entdeckte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] verschiedene neue #V Astronomische Objekte#! in der südlichen Hemisphäre."
 verrier_astronomer_achievement_observed_venus_transit_loc: "\nIm Jahr #V 1874#! beobachtete Professor [Scope.GetCharacter.GetLastNameNoFormatting] den #V Venustransit#! im Pazifischen Ozean. Normalerweise ist das ein Ereignis, das nur einmal im Leben stattfindet."
 verrier_astronomer_achievement_observed_carrington_event_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] beobachtete die #V Massive Solar Flare#! in [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]."
 verrier_astronomer_achievement_observed_corona_loc: "\nEntdeckte die #V [Scope.GetCharacter.GetLastNameNoFormatting] 's Perlen#!, die nach [Scope.GetCharacter.GetHerHim] benannt wurden."
 verrier_astronomer_achievement_sun_photo_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] ist der Autor des #V ersten Fotos einer Sonnenfinsternis.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten des Mars, Deimos#!."
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Trabanten des Mars, Phobos#!."
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte Jupiters natürlichen Satelliten Amalthea#!."
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte Jupiters natürlichen Satelliten Himalia#!."
 verrier_astronomer_achievement_elara_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten des Jupiters Elara#!."
 verrier_astronomer_achievement_pasiphae_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Satelliten des Jupiters Pasiphae#!."
 verrier_astronomer_achievement_sinope_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten des Jupiters Sinope#!."
 verrier_astronomer_achievement_lysithea_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Satelliten des Jupiters Lysithea#!."
 verrier_astronomer_achievement_carme_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten des Jupiters Carme#!."
 verrier_astronomer_achievement_enceladus_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Saturntrabanten Enceladus#!."
 verrier_astronomer_achievement_mimas_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten Mimas#! des Saturn."
 verrier_astronomer_achievement_hyperion_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Saturntrabanten Hyperion#!."
 verrier_astronomer_achievement_phoebe_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten Phoebe#! des Saturn."
 verrier_astronomer_achievement_titania_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Satelliten des Uranus, Titania#!."
 verrier_astronomer_achievement_oberon_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten des Uranus, Oberon#!."
 verrier_astronomer_achievement_ariel_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Satelliten des Uranus, Ariel#!."
 verrier_astronomer_achievement_umbriel_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten des Uranus, Umbriel#!."
 verrier_astronomer_achievement_miranda_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Satelliten des Uranus, Miranda#!."
 verrier_astronomer_achievement_triton_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Trabanten des Neptun, Triton#!."
 verrier_astronomer_achievement_nereid_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Trabanten des Neptun, Nereid#!."
 verrier_astronomer_achievement_moon_fission_loc: "\n[Scope.GetCharacter.GetSheHe|U] gilt als Begründer der Theorie, dass der #V Mond ein Teil der Erde#! war und sich abgespalten hat."
 verrier_astronomer_achievement_moon_capture_loc: "\n[Scope.GetCharacter.GetSheHe|U] is considered the founder of the theory that the #V Moon is a foreign body that was captured by the Earth#!."