 verrier_astronomer_achievements_no_astronomer_loc: "Die #V Errungenschaften dieser [concept_verrier_astronomer]#! werden hier angezeigt, sobald Sie eine haben." #deepl:2150212353

 verrier_astronomer_achievements_intro_loc: "#V Errungenschaften dieses Astronomen#![Scope.GetCharacter.GetFullName] ist ein erfolgreicher Astronom, der [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt hat." #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\nDurch die Messung der #V Entfernung von 61 Cygni bei 11,4 Lichtjahren#! gelang es [Scope.GetCharacter.GetLastNameNoFormatting], auf einen Schlag zu zeigen, dass das Universum viel größer ist als bisher angenommen." #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "\n Einer der größten Erfolge von [Scope.GetCharacter.GetHerHis] ist die #V Entdeckung des Elements Helium#! bei der Untersuchung des elektromagnetischen Spektrums der Sonne." #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\Niemand erwartete die Entdeckung eines neuen Planeten, aber Professor [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den Planeten Uranus#!. Diese Entdeckung führte zur Suche nach weiteren Planeten in unserem Sonnensystem." #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\nViele Astronomen suchten nach dem Planeten zwischen Mars und Jupiter. Aber Dr. [Scope.GetCharacter.GetLastNameNoFormatting] war derjenige, der #V Ceres#! gefunden hat." #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  fand den Planeten Pallas#! in der Region zwischen Mars und Jupiter." #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] #V  fand den Planeten Vesta#! in der Region zwischen Mars und Jupiter." #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  fand den Planeten Juno#! in der Region zwischen Mars und Jupiter." #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "\nEine der [Scope.GetCharacter.GetHerHis] größten Taten war die #V Entdeckung des Planeten Neptun#!. Diese Entdeckung sicherte [Scope.GetCharacter.GetHerHim] für immer einen Platz in den Geschichtsbüchern." #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\nObwohl es umstritten war, ob #V Pluto#! überhaupt existiert, entdeckte Professor [Scope.GetCharacter.GetLastNameNoFormatting] tatsächlich #V #! den kleinen Planeten. Eine große astronomische Leistung!" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\nIn #V 1843#! [Scope.GetCharacter.GetSheHe] wurde als erster #V der Große Komet#! entdeckt, der deshalb nach [Scope.GetCharacter.GetLastNameNoFormatting] benannt wurde." #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\nAls der #V Große Komet von 1858#! an der Erde vorbeizog, war Dr. [Scope.GetCharacter.GetLastNameNoFormatting] der erste, der den Kometen sah. Infolgedessen wurde der Komet nach [Scope.GetCharacter.GetHerHim] benannt." #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\nAls der erste, der den #V Großen Kometen von 1861#! in der Dunkelheit des Nachthimmels entdeckte, wurde Professor [Scope.GetCharacter.GetLastNameNoFormatting] zum Namensgeber des Himmelsobjekts." #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\nAls der #V Große Komet von 1874#! zum ersten Mal erschien, war es Dr. [Scope.GetCharacter.GetLastNameNoFormatting], der ihn zuerst bemerkte. Nun wird der Komet für alle Zeiten den Namen [Scope.GetCharacter.GetHerHis] tragen." #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\nDas Jahr #V 1882#! war aus astronomischer Sicht spektakulär. Professor [Scope.GetCharacter.GetLastNameNoFormatting] entdeckte einen #V Großen Kometen#! bei seinem Vorbeiflug an der Erde. Ein unglaubliches Spektakel." #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\nWährend einer #V Pazifik-Expedition#! entdeckte Dr. [Scope.GetCharacter.GetLastNameNoFormatting] verschiedene neue #V Astronomische Objekte#! in der südlichen Hemisphäre." #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\nIm Jahr #V 1874#! beobachtete Professor [Scope.GetCharacter.GetLastNameNoFormatting] den #V Venustransit#! im Pazifischen Ozean. Normalerweise ist das ein Ereignis, das nur einmal im Leben stattfindet." #deepl:885972622
 verrier_astronomer_achievement_observed_carrington_event_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] beobachtete die #V Massive Solar Flare#! in [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]." #deepl:2882246181
 verrier_astronomer_achievement_observed_corona_loc: "\nEntdeckte die #V [Scope.GetCharacter.GetLastNameNoFormatting] 's Perlen#!, die nach [Scope.GetCharacter.GetHerHim] benannt wurden." #deepl:2736282257
 verrier_astronomer_achievement_sun_photo_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] ist der Autor des #V ersten Fotos einer Sonnenfinsternis.#!" #deepl:3755032771
 verrier_astronomer_achievement_deimos_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte den natürlichen Satelliten des Mars, Deimos#!." #deepl:69884165
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte den natürlichen Trabanten des Mars, Phobos#!." #deepl:473150176
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  entdeckte Jupiters natürlichen Satelliten Amalthea#!." #deepl:2237798027
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  entdeckte Jupiters natürlichen Satelliten Himalia#!." #deepl:1236646813
