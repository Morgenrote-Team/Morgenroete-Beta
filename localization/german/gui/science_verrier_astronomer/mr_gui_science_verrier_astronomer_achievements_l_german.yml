 verrier_astronomer_achievement_triton_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V entdeckte den natürlichen Trabanten des Neptun, Triton#!.#!"
