 verrier_astronomer_achievement_mimas_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V entdeckte den natürlichen Satelliten Mimas#! des Saturn.#!"
