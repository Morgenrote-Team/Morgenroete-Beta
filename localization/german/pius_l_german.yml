 pius.101.t: "Die Erscheinung in La Salette"
 pius.101.d: "Zwei Kinder in den Bergen Südostfrankreichs behaupten, eine Erscheinung der Jungfrau Maria erlebt zu haben, was in der gesamten katholischen Welt eine Welle geistlicher Begeisterung - und Besorgnis - auslöst."
 pius.101.f: "\"Kommt näher, meine Kinder, habt keine Angst. Ich bin hier, um euch eine große Nachricht zu bringen...\"\n\nHoch auf den Almen über dem Dorf La Salette, in der Nähe von Corps im Südosten Frankreichs, berichten zwei Hirtenkinder von einer Vision, die heute die Herzen der ganzen Christenheit bewegt. Eine lichtdurchflutete, in Trauer gehüllte Frau erschien ihnen. Sie weinte - Tränen über eine Welt, die sich von Gott abgewandt hatte. Sie sprach von schamlos geäußerten Gotteslästerungen, von entweihten Sonntagen und von Hunger und Verderben, die kommen würden, wenn die Menschen nicht umkehrten.\n Was zunächst wie eine ländliche Legende erschien, ist zu einer Bewegung geworden. Pilger strömen zu dem abgelegenen Berghang. Mönche und Journalisten klettern auf denselben Pfaden. Die Kirche schwankt: Einige begrüßen die Vision als göttlichen Aufruf zur Buße, andere fürchten den Aufstieg eines populären Mystizismus und einer irrationalen Inbrunst.\n Der Bischof von Grenoble stimmt vorsichtig zu. Die weltlichen Behörden bleiben misstrauisch.\nUnd Rom? Rom schaut zu - schweigend. Aber die Glocken läuten bereits."
 pius.101.g: "Eine himmlische Warnung."
 pius.101.h: "Bleiben Sie rational."
 pius.102.t: "Die Erscheinung in Lourdes"
 pius.102.d: "In der kleinen Stadt Lourdes behauptet ein vierzehnjähriges Mädchen, eine strahlende Frau in einer Grotte gesehen zu haben. Ihre Visionen ziehen bald Pilger, Kontroversen - und die Aufmerksamkeit Roms auf sich."
 pius.102.f: "\"Sie war jung, barfuß und arm. Dennoch sprach sie mit einer Schönheit, die keine Worte beschreiben können.\"\n\nIn einer abgelegenen Grotte in der Nähe von Lourdes, in den Ausläufern der Pyrenäen, erzählt ein Bauernmädchen namens Bernadette Soubirous von einer weiß gekleideten Frau mit einer blauen Schärpe und goldenen Rosen an den Füßen. Die Vision sagt zunächst nichts - sie lächelt nur. Dann spricht sie: von der Buße, vom Gebet, vom Leiden und von der göttlichen Barmherzigkeit. Sie nennt sich einfach: Die Unbefleckte Empfängnis.\nZuerst spotten die Dorfbewohner. Doch als Bernadette eine verborgene Quelle entdeckt und behauptet, sie sei eine Quelle der Heilung, kommen Tausende - hoffend, betend, weinend. Krücken werden zurückgelassen. Zeugnisse verbreiten sich. Skeptiker beklagen Hysterie. Ärzte, Priester und Politiker strömen nach Lourdes.\nDie Kirche stellt Nachforschungen an. Der Staat schaut misstrauisch zu. Und trotzdem kommen die Menschen."
 pius.102.g: "Ein Schrein der Heilung und Hoffnung."
 pius.102.h: "Halluzinationen!"
 pius.103.t: "Die stille Vision von Knock"
 pius.103.d: "In dem irischen Dorf Knock berichten fünfzehn Zeugen von einer stillen Erscheinung der Jungfrau Maria, des heiligen Josef und des heiligen Johannes des Evangelisten. Die Vision wühlt ein Volk auf, das lange unter Armut, Exil und Fremdherrschaft gelitten hat."
 pius.103.f: "\"Sie sagten kein einziges Wort. Doch in diesem Schweigen hörte eine Nation die Hoffnung.\"\n\nDer Regen ergoss sich unaufhörlich über die Pfarrkirche von Knock in der Grafschaft Mayo. Und doch standen fünfzehn Dorfbewohner wie gebannt. Vor ihnen, an der südlichen Giebelwand in Licht getaucht, stand eine schweigende Versammlung: die Jungfrau Maria in betender Haltung, der heilige Josef an ihrer Seite, der heilige Johannes der Evangelist, in Gewand und mit einem Evangelium in der Hand. Hinter ihnen ein Lamm auf einem Altar und ein Kreuz.\nKeine Botschaft wurde gesprochen. Keine Bewegung wurde gemacht. Und doch schworen die Zeugen auf das, was sie sahen - Junge und Alte, Männer und Frauen gleichermaßen.\nIn einem Land, das von Hungersnot, Auswanderung und spiritueller Sehnsucht gezeichnet war, hallte die stille Vision lauter als Predigten. Bald kamen Pilger, die Heilung, Zeichen und Trost suchten. Die englischen Behörden verhöhnten sie. Einige in der Kirche zögerten. Doch unter den Armen und Frommen Irlands wurde Knock zu einem heiligen Schrei nach Würde."
 pius.103.g: "Ein Licht im Regen."
 pius.103.h: "Tun Sie es als Folklore ab."
 pius.104.t: "Die Geheimnisse von Fátima"
 pius.104.d: "In Zentralportugal berichten drei Hirtenkinder von wiederholten Erscheinungen der Jungfrau Maria, die in einem wundersamen Phänomen gipfeln, das von Tausenden bezeugt wird. Ihre Visionen enthalten Prophezeiungen über Krieg, Leid und die Zukunft der Kirche."
 pius.104.f: "\"Am Ende wird mein Unbeflecktes Herz triumphieren.\"\n\nIn der Nähe der Stadt Fátima, in den ländlichen Hügeln von Cova da Iria, sprechen drei Kinder - Lucia, Francisco und Jacinta - von einer Frau, die heller als die Sonne ist, gekleidet in Glanz und Trauer. Über sechs Monate hinweg erscheint sie immer wieder und warnt vor einem weltweiten Krieg, dem Aufkommen gottloser Ideologien und der Verfolgung der Gläubigen. Sie ruft zur Buße, zum Gebet und zur Weihe Russlands an ihr Herz auf.\nAm 13. Oktober 1917, als Zehntausende im strömenden Regen stehen, scheint sich die Sonne vom Himmel zu lösen, sich zu drehen und am Himmel zu zerschellen. Einige fallen auf die Knie. Andere fliehen. Als das Licht verblasst, ist ihre Kleidung trocken. Die Menge zerstreut sich schweigend, ehrfürchtig und ängstlich.\nDie Kirche ist vorsichtig. Die Presse ist gespalten. Aber unter den Menschen - vor allem unter den Armen, den Verwundeten und den Gläubigen - brennt eine neue Flamme: eine Flamme der Hoffnung, eine Flamme der Warnung, eine Flamme, die die Jungfrau nicht nur als Mutter, sondern als Wächterin des kommenden Zeitalters sieht."
 pius.104.g: "Beachtet die Warnungen von Fátima."
 pius.104.h: "Entlarven Sie das Sonnenwunder."
 pius.105.t: "Unsere Lady von [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.105.d: "In einem abgelegenen Dorf in der Nähe von [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] tauchen Berichte über eine Marienerscheinung auf. Die Geschichte verbreitet sich schnell und zieht Pilger, Skeptiker und die Aufmerksamkeit der Kirchenbehörden auf sich."
 pius.105.f: "\"Sie stand über den Feldern, in einer Krone aus Licht, und schaute auf uns, als ob sie den Kummer jeder Seele kennen würde.\"\n\nDer erste, der sprach, war ein Kind - die Augen weit vor Ehrfurcht, die Stimme zitternd. Es sprach von einer Frau, heller als die Morgenröte, eingehüllt in Glanz und Trauer, die in der Stille erschien und die Welt mit tiefem, wissendem Kummer betrachtete. Auch andere behaupteten, sie zu sehen. Einige fielen auf die Knie. Andere rannten. Alle erinnerten sich an die Stille, die folgte.\nDie Geschichte verbreitete sich über das Dorf hinaus. Pilger kamen an, Kerzen in der Hand. Die Gläubigen beteten. Die Betrübten hofften. Priester debattierten. Beamte zogen die Augenbrauen hoch. Aber die Menschen kamen immer wieder - angezogen nicht von der Gewissheit, sondern von etwas Älterem: dem Bedürfnis zu glauben.\nOb Wunder, Vision oder Mythos, das Ereignis hat bereits die Herzen derer geprägt, die es miterlebt haben - und das Leben derer, die nun entscheiden müssen, was es bedeutet."
 pius.105.g: "Ein Zeichen für die Gläubigen."
 pius.105.h: "Die Hysterie unterdrücken."
 pius.111.t: "Die ungebetene Prozession"
 pius.111.d: "Trotz des behördlichen Verbots öffentlicher Veranstaltungen hat eine Menge von Gläubigen eine spontane Prozession zum Ort der Marienerscheinung in [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] begonnen."
 pius.111.f: "\"Wir zündeten keine Fackeln an, wir trugen keine Fahnen. Nur Rosenkränze, Schweigen und unsere Füße im Staub.\"\n\nSie kamen im Morgengrauen, zu zweit und zu dritt, gingen durch Felder und Dörfer und flüsterten Gebete. Gegen Mittag waren es Hunderte, die über die Landstraßen strömten, einige barfuß, andere weinend. Frauen hielten Blumen. Alte Männer murmelten Litaneien. Kinder umklammerten aus Holz geschnitzte Ikonen.\nDie Behörden hatten die Ausgrabungsstätte für geschlossen erklärt. Soldaten standen Wache. Doch niemand hielt die Menge auf. Vielleicht war es der Gesang. Vielleicht die Stille. Vielleicht war es etwas Unsichtbares.\nNachdem die Gläubigen den Ort der Vision erreicht hatten, knieten sie nieder, murmelten Gebete und zündeten Kerzen in der Erde an. Keine Stimme donnerte vom Himmel. Kein Wunder war zu sehen. Aber etwas hatte sich bereits verändert. Ein Volk hatte gehandelt - nicht gegen das Gesetz, sondern im Gehorsam gegenüber etwas, das älter war als das Gesetz."
 pius.111.g: "Lasst sie beten."
 pius.111.h: "Beobachte es in aller Ruhe."
 pius.111.i: "Vertreiben Sie sie mit Gewalt."
 pius.112.t: "Blut auf dem Heiligen Grund"
 pius.112.d: "Eine Konfrontation zwischen den Behörden und den Gläubigen am Ort der verbotenen Marienprozession ist gewalttätig geworden. Der Boden, auf dem einst Visionen die Hoffnung weckten, ist nun mit Blut befleckt."
 pius.112.f: "\"Es wurde gebetet, und dann wurde geschrien.\"\n\nDie Kerzen flackerten noch, als die Soldaten kamen. Stimmen wurden laut, erst verwirrt, dann flehend. Eine Frau stürzte. Ein Junge schrie auf. Niemand weiß, wer den Befehl gab - aber Musketen knallten, Knüppel schwangen, Stiefel bewegten sich durch Weihrauch und Erde. Als die Stille zurückkehrte, war sie schwerer als zuvor.\nDie Kirche ist erschüttert. Die Gläubigen sind empört. Die Presse spricht in gedämpften Tönen - einige nennen es einen Unfall, andere ein Massaker. Der Ort, der einst als heilig geflüstert wurde, ist nun durch die Erinnerung verflucht. Und doch versammeln sich die Menschen - nicht mit Blumen, sondern mit Wut, mit Schweigen, mit einem Blick, den kein Gesetz auslöschen kann."
 pius.112.g: "Wir bedauern, was geschehen ist."
 pius.112.h: "Sie haben sich das selbst zuzuschreiben."
 pius.113.t: "Die Stimme auf der Kanzel"
 pius.113.d: "Ein lokaler Priester hat sich in [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] zum wichtigsten Verfechter der Marienerscheinung entwickelt. Seine Predigten ziehen Menschenmassen an, seine Worte wecken Hoffnung - und fordern die staatliche Autorität heraus. Sein Name ist Pater [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]."
 pius.113.f: "\"Sie ist den Geringen erschienen, nicht den Mächtigen. Und vielleicht ist das der Grund, warum sie sie zum Schweigen bringen wollen.\"\n\nIn der steinernen Kirche oberhalb des Dorfes hat ein Priester namens Pater [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] begonnen zu predigen - nicht nur von der Barmherzigkeit der Jungfrau, sondern auch von ihrer Gerechtigkeit. Seine Worte hallen über das Kirchenschiff hinaus: \"Wenn der Himmel hier gesprochen hat, dann kann keine Regierung sein Echo verbieten.\"\nPilger strömen zu seinen Predigten. Sein Name verbreitet sich im Flüsterton und in den Gesangbüchern. Er mahnt zum Frieden, aber seine Anwesenheit löst Unruhe aus. Manche nennen ihn einen Propheten. Andere einen Rebellen in Gewändern.\nDie Behörden werden unruhig. Das Militär spricht von Aufwiegelung. Die Kirchenhierarchie zögert - hin- und hergerissen zwischen Dogma und Diplomatie. Ein leiser Vorschlag landet auf Ihrem Schreibtisch: Er könnte entfernt werden. Still und leise. Diskret.\nAber manche Männer, die zum Schweigen gebracht werden, sprechen noch lauter."
 pius.113.g: "Lass ihn predigen."
 pius.113.h: "Holen Sie ihn zu Verhandlungen in die Hauptstadt."
 pius.113.i: "Lassen Sie ihn verschwinden."
 pius.114.t: "Die Prozession, die die Nation erschütterte"
 pius.114.d: "Überall im Land haben katholische Gläubige mit öffentlichen Demonstrationen zur Unterstützung der Marienerscheinung begonnen. Was als ländliche Wallfahrt begann, hat sich zu einer nationalen Bewegung entwickelt."
 pius.114.f: "\"Sie gingen mit Rosenkränzen in den Händen, ihren Kindern auf den Schultern und dem Namen der Jungfrau Maria auf den Lippen.\"\n\nOb in Fischerdörfern oder Fabrikstädten, die Zeichen sind dieselben: Kerzen brennen in den Fenstern, Hymnen erklingen auf den Plätzen, Tausende versammeln sich in Stille. Es werden keine Fahnen geschwenkt - nur Statuen, Ikonen und ein einziger Name, der immer wieder gemurmelt wird: Maria. Was als Andacht begann, ist zum Trotz geworden.\nAls Reaktion auf die Gewalt an der heiligen Ausgrabungsstätte [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] sind die Gläubigen auf die Straße gegangen. Sie schreien nicht. Sie beten. Aber ihre Zahl wächst täglich.\nEinige in der Regierung mahnen zur Toleranz. Andere fordern ein hartes Durchgreifen. Das Militär ist unruhig. Und in den Häusern im ganzen Land fragen sich selbst die Zweifler: Wenn so viele glauben, kann es dann noch eine Lüge sein?"
 pius.114.g: "Erlauben Sie die nationale Prozession."
 pius.114.h: "Verbieten Sie die nationale Prozession."
 pius.115.t: "Die Felder sind menschenleer"
 pius.115.d: "In mehreren ländlichen Regionen von [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] ist es zu schweren Ernteausfällen gekommen. Unter den Gläubigen beginnt sich ein gefährliches Geflüster zu verbreiten: dass die Jungfrau, die einst vom Staat zum Schweigen gebracht wurde, nun weint - und straft."
 pius.115.f: "\"Sie bat um Gebete. Wir gaben ihr Soldaten.\"\n\nDer Regen blieb aus. Der Weizen vergilbte zu früh. Kartoffeln verfaulten unter der Erde, ungesehen und bitter. Dorfbewohner sprechen von Feldern, die sich... verlassen anfühlen. Nicht nur von den Menschen, sondern auch von der Gnade.\nUnd so flüstern sie. Von der Frau im Licht, die einst erschien - und verspottet wurde. Von dem Priester, der verschwunden ist. Von dem versiegelten Schrein und den geschlagenen Pilgern. Jetzt, so sagen sie, hat sie ihr Gesicht abgewandt.\nKerzen brennen wieder, aber jetzt hinter verschlossenen Fenstern. Mütter taufen ihre Kinder im Geheimen. Alte Männer vergraben Brotkrusten als Opfergaben. Die Kirche wagt nicht zu sprechen, aber das Volk glaubt bereits: Das ist ihr Kummer. Oder ihre Warnung."
 pius.115.g: "Aberglaube! Hoffe ich..."
 pius.116.t: "Die Stille hinter der Glocke"
 pius.116.d: "Nach Jahren der Unterdrückung und der Ablehnung von Wundern haben viele einst gläubige Bürger begonnen, ihren Glauben an [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] aufzugeben. Eine wachsende Zahl bezeichnet sich nun nicht mehr als katholisch - sondern als gar nichts."
 pius.116.f: "\"Sie kommt nicht mehr. Nicht in Träumen, nicht in Visionen. Die Kerzen brennen nicht mehr.\"\n\nDer Schrein ist verschlossen. Der Priester ist fort. Die Felder sind still.\nEs gab eine Zeit, in der selbst die Ärmsten vor dem Schlafengehen Ave Marias flüsterten, in der Ikonen neben den Herden hingen und beim Klang der Glocken Tränen flossen. Jetzt stehen die Kirchen leer. Kinder fragen, was die \"Beichte\" war. Die Jungen sprechen von Vernunft, von Fortschritt, von Nichts.\nDas Volk hat sich nicht der Ideologie zugewandt. Sie haben sich der Asche zugewandt. Sie sind keine Radikalen. Sie sind erschöpft. Und irgendwo in der hohlen Stille verharrt die Frage:\n\"Hat sie uns verlassen - oder haben wir sie verlassen?\""
 pius.116.g: "Das Zeitalter des Glaubens ist vorbei."
 pius.119.t: "Schließung des Schreins"
 pius.119.d: "Die neu eingesetzte atheistische Regierung hat die Schließung des Marienwallfahrtsortes angeordnet. Was einst ein Ort des Lichts und des Gebets war, ist nun abgesperrt, still und unter staatlicher Aufsicht."
 pius.119.f: "\"Keine Glocken läuteten. Keine Kerzen brannten. Die Tore wurden vor Sonnenaufgang verschlossen.\"\n\nDer Schrein, der einst Tausende anzog, steht jetzt allein. An die Tür der Kapelle wurde ein Zettel genagelt: \"Auf Anordnung der Volksversammlung wird dieses Bauwerk für nicht lebensnotwendig erklärt. Wachen halten Wache, nicht um zu schützen, sondern um zu verhindern.\nEs wurde keine Gewalt angewendet. Proteste wurden nicht zugelassen. Die Veränderung erfolgte leise und bürokratisch - eher durch Abwesenheit als durch eine Explosion. Doch in den Häusern im ganzen Land zittern die Hände älterer Menschen. Großmütter verstecken ihre Rosenkränze. Kinder fragen, warum die Pilger nicht mehr singen.\nDer Klerus schweigt. Die Partei spricht von Wissenschaft, Vernunft und Fortschritt. Und irgendwo hinter verschlossenen Türen flackert eine Frage wie eine halb erloschene Kerze: War das wirklich notwendig?"
 pius.119.g: "Wir bauen keine Denkmäler mehr für Illusionen."
 pius.121.t: "Was meint sie damit?"
 pius.121.d: "Die Marienerscheinung in [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] wurde offiziell als positives Zeichen anerkannt. Aber selbst jetzt bleibt seine wahre Bedeutung offen für Interpretationen."
 pius.121.f: "In den Wochen, seit die strahlende Gestalt den Dorfbewohnern erschienen ist, sind keine weiteren Zeichen gefolgt. Kein Feuer vom Himmel. Keine Stimme in den Wolken. Nur ein ruhiger Himmel und das anhaltende Echo der Verwunderung.\nNoch sprechen die Menschen - von Frieden, von Heilung, davon, dass sich etwas in der Seele der Nation verändert hat. Die Pilger kommen nicht im Rausch, sondern in Ehrfurcht. Die Geistlichen predigen sanft. Die Presse berichtet ausnahmsweise ohne Spott: Was hat dieses Wunder zu bedeuten?"
 pius.121.g: "Ein Segen für das einfache Volk."
 pius.121.h: "Ein göttliches Zeichen für unseren Klerus."
 pius.121.i: "Ein Hinweis auf die Legitimität unserer Regierung."
 pius.122.t: "Der Schrein von [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.122.d: "Der Ort der Marienerscheinung ist inzwischen zu einem anerkannten Wallfahrtsort geworden, der immer mehr Gläubige aus nah und fern anzieht."
 pius.122.f: "\"Wo einst nur Weideland war, stehen jetzt Kerzen, Rosen und die leisen Schritte von Tausenden.\"\n\nDie Straßen sind breiter geworden. Die Felder sind gerodet worden. Eine bescheidene Kapelle erhebt sich in der Nähe der Stelle, an der die Kinder einst von einer in Licht gekleideten Frau sprachen. Jeden Tag kommen Pilger: Bauern mit ihren Söhnen, Witwen in Schwarz, Soldaten auf Urlaub, Mütter, die Gebete für ihre Ungeborenen flüstern.\nDie Kirche hat die Heiligkeit des Ortes anerkannt. Es wird ein Schrein gebaut. An seinen Rändern blühen Märkte, auf denen Brot, Medaillen, Rosenkränze und Wein angeboten werden. Was einst in den Salons bezweifelt wurde, ist nun in den Knochen der Nation zu spüren.\nUnd während die Glocken im Tal läuten, fragt man sich: Ist dieser Glaube wiedergeboren - oder ein Keim von etwas Größerem, das noch kommen wird?"
 pius.122.g: "Totus tuus."