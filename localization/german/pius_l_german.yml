 pius.111.h_tt: "Es ist sehr wahrscheinlich, dass es weitere Ereignisse in Folge der Marienerscheinung geben wird."
 pius.111.i_tt: "Die Wahrscheinlichkeit eines blutigen Zusammenstoßes ist sehr hoch."
