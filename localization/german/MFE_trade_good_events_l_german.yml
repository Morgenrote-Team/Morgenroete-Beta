l_german:
 MFE_trade_good_events.1.t: "Kugeln für [SCOPE.sW('active_war').GetName]"
 MFE_trade_good_events.1.d: "Wir haben Berichte gehört, dass die Munitionsfabriken in [SCOPE.sC('munitions_state').GetName] kürzlich modernisiert wurden."
 MFE_trade_good_events.1.f: "\"Die [SCOPE.sC('munitions_state').GetAdjective]e-Presse hat über diese beeindruckende Leistung gejubelt, und wir geben ihnen keinen Vorwurf. \""
 MFE_trade_good_events.1.a: "Pünktlich zum Krieg"
 MFE_trade_good_events.2.t: "Betteln um Munition"
 MFE_trade_good_events.2.d: "Der [SCOPE.sW('active_war').GetName], an dem [SCOPE.sC('ally').GetName] beteiligt ist, hat die Knappheit ihrer Munitionsvorräte offengelegt, und sie flehen uns an, ihnen Munition zu geben."
 MFE_trade_good_events.2.f: "\"Nennen Sie Ihren Preis, [ROOT.GetCountry.GetName], und sobald wir diesen Krieg gewinnen, gehört er Ihnen.\""
 MFE_trade_good_events.2.a: "Wir können ein paar Kugeln entbehren"
 MFE_trade_good_events.2.b: "Wie sollen wir unsere Feinde ohne Kugeln erschießen?!"
 MFE_trade_good_events.3.t: "[SCOPE.sC('ally').GetName] stellt eine geheime Anfrage"
 MFE_trade_good_events.3.d: "Es scheint, dass [SCOPE.sW('active_war').GetName] festgestellt hat, dass [SCOPE.sC('ally').GetName] auf einen solchen Konflikt unvorbereitet ist, und dass ihnen bereits das Material, insbesondere die Munition, ausgeht.\n\nSie haben heimlich ihre Diplomaten zu uns geschickt, die uns alle möglichen Versprechungen machen, wenn wir können Helfen Sie mit der Artillerie."
 MFE_trade_good_events.3.f: "\"Glauben Sie mir – [SCOPE.sC('ally').GetName] kann diesen Krieg wirklich gewinnen, aber wir werden etwas Hilfe brauchen! Verlass uns nicht in unserer verzweifeltsten Stunde!\""
 MFE_trade_good_events.3.a: "Wir können ein paar Artilleriegeschütze entbehren"
 MFE_trade_good_events.3.b: "Ich fürchte, unsere eigenen Vorräte sind zu gering"
 MFE_trade_good_events.4.t: "Ein Verstoß gegen die Sicherheit"
 MFE_trade_good_events.4.d: "Unsere Spionageagenturen haben berichtet, dass es bei [SCOPE.sS('arms_state').GetName] zu Einbrüchen in ihren Militärfabriken gekommen ist und dass große Mengen Sprengstoff verschwunden sind."
 MFE_trade_good_events.4.f: "Wie konnten sie zulassen, dass so etwas passierte?"
 MFE_trade_good_events.4.a: "Hoffentlich sind sie nicht in die falschen Hände geraten..."
 MFE_trade_good_events.5.t: "Eine Rekordernte in [SCOPE.sS('arable_state').GetName]"
 MFE_trade_good_events.5.d: "Wir hören immer wieder Berichte, dass die Regenfälle in [SCOPE.sS('arable_state').GetName] auf den Bauernhöfen in der Region Wunder gewirkt haben und die bereits beeindruckende landwirtschaftliche Produktion gesteigert haben, die über das hinausgeht, was man hätte erwarten können."
 MFE_trade_good_events.5.f: "\"Die Ernten sind dieses Jahr so ​​gut, dass wir in dieser Saison mehr Arbeitskräfte einstellen müssen, aber zum Glück können wir es uns leisten.\""
 MFE_trade_good_events.5.a: "Es hätte keinen besseren Zeitpunkt geben können"
 MFE_trade_good_events.6.t: "Verrückter in der Panzerfabrik"
 MFE_trade_good_events.6.d: "Die lokalen Zeitungen sind voller schrecklicher Schlagzeilen aus [SCOPE.sS('tank_state').GetName] – ein Verrückter beschlagnahmte irgendwie einen Panzer und verübte einen mörderischen Amoklauf, zerstörte ein ganzes Dorf und tötete Dutzende Unschuldige, bevor er von der Polizei gestoppt wurde."
 MFE_trade_good_events.6.f: "\"Niemand weiß, warum diese sinnlose Tragödie passiert ist, und wir werden den Grund nie herausfinden.\""
 MFE_trade_good_events.6.a: "Wir trauern mit ihnen, können aber in keiner Weise helfen"
 MFE_trade_good_events.6.b: "Gib ihnen alles, was sie brauchen – das ist einfach schrecklich ..."
 MFE_trade_good_events.7.t: "Investitionen starten in [SCOPE.sS('plane_state').GetName]"
 MFE_trade_good_events.7.d: "Luftfahrtinvestoren strömen immer wieder zu [SCOPE.sS('plane_state').GetName] und überbieten sich gegenseitig, um sich ihre eigenen Verträge mit den örtlichen Fabriken zu sichern."
 MFE_trade_good_events.7.f: "\"So etwas haben wir noch nie gesehen – die Industriellen kämpfen darum, ein Stück vom Kuchen abzubekommen, bevor es zu spät ist.\""
 MFE_trade_good_events.7.a: "Es ist eine tolle Zeit zum Leben [SCOPE.GetRootScope.GetCountry.GetAltName('IN')]"
 MFE_trade_good_events.8.t: "Schlechte Handwerkskunst"
 MFE_trade_good_events.8.d: "[SCOPE.sS('ironclad_state').GetName] erlangt schnell den Ruf, die Boote, die sie exportieren, seien mangelhaft."
 MFE_trade_good_events.8.f: "\"Diese Schiffe liegen noch nicht länger als einen Monat im Wasser und sind schon völlig verrostet? Das bedeutet mehr als alles andere, dass hochwertiges Eisen schlecht ist.\""
 MFE_trade_good_events.8.a: "Hoffentlich werden ihre Vorräte besser"
 MFE_trade_good_events.9.t: "Ein undankbarer Job"
 MFE_trade_good_events.9.d: "Eine Getreideknappheit in [SCOPE.sS('grain_state').GetName] beginnt soziale Probleme zu verursachen und radikale Elemente der Intelligenzia nutzen diesen Moment, um das Missmanagement der Krise durch [SCOPE.GetRootScope.GetCountry.GetAltName('AKK')] anzugreifen."
 MFE_trade_good_events.9.f: "\"Eine Regierung, die ihre Bürger nicht ernähren kann, sollte nicht vom Volk mit der Macht betraut werden.\""
 MFE_trade_good_events.9.a: "Aber brauchen sie wirklich Nahrung zum Leben?"
 MFE_trade_good_events.9.b: "Leiten Sie einige Gelder an [SCOPE.sS('grain_state').GetName] um"
 MFE_trade_good_events.9.c: "Als ich das letzte Mal nachgesehen habe, gab es in den Geschäften von [SCOPE.sS('grain_state').GetName] jede Menge Kuchen zum Essen"
 MFE_trade_good_events.10.t: "Pikante Garnelen und Barsch"
 MFE_trade_good_events.10.d: "In letzter Zeit haben die Fischkutter aus [SCOPE.sS('fish_state').GetName] einen übel schmeckenden Fang eingebracht; Alle Arten von Meeresfrüchten hatten eine fettige, ölige Konsistenz, die nach verrottendem Fisch schmeckte."
 MFE_trade_good_events.10.f: "\"Ugh, kannst du das riechen? Natürlich kannst du; Sobald man das Gebäude betrat, wollte man es verlassen. Nicht einmal die Gassenkatzen wollen dieses Zeug.\""
 MFE_trade_good_events.10.a: "Wie kann Fisch zu fischig sein?"
 MFE_trade_good_events.11.t: "Die Werften von [SCOPE.sS('ship_state').GetName]"
 MFE_trade_good_events.11.d: "Der Hafenmeister in [SCOPE.sS('ship_state').GetName] meldet, dass die dort im Bau befindlichen Kriegsschiffe fertig sind."
 MFE_trade_good_events.11.f: "\"Ich hoffe, Sie haben eine Flasche Champagner mitgebracht, da es üblich ist, eine Taufe abzuhalten, wenn ein Kriegsschiff vom Stapel gelassen wird.\""
 MFE_trade_good_events.11.a: "Fantastische Neuigkeiten! Und früher als geplant"
 MFE_trade_good_events.11.b: "Dann brauchen wir mehr Champagner!"
 MFE_trade_good_events.12.t: "Textilien aus [SCOPE.sS('fabric_state').GetName]"
 MFE_trade_good_events.12.d: "Die in [SCOPE.sS('fabric_state').GetName] hergestellten Stoffe erlangen weltweit Ansehen für ihre hervorragende Verarbeitung."
 MFE_trade_good_events.12.f: "\"Schauen Sie sich an, wie das Material im Sonnenlicht seine Farbe ändert; Glaubst du, das ist ägyptische Baumwolle?\""
 MFE_trade_good_events.12.a: "Wir freuen uns immer zu hören, wenn die Branche floriert"
 MFE_trade_good_events.12.b: "Es ist Haute Couture!"
 MFE_trade_good_events.13.t: "Feuer in den Sägewerken"
 MFE_trade_good_events.13.d: "Zeitungen in [SCOPE.sS('sawmill_fire_state').GetName] berichten von einem schrecklichen Feuer, das weite Teile der Stadt niedergebrannt hat."
 MFE_trade_good_events.13.f: "\"Unmittelbar am Stadtrand fing ein Haufen öliger Lumpen Feuer, bei der daraus resultierenden Feuersbrunst kamen 139 Menschen ums Leben.\""
 MFE_trade_good_events.13.a: "Was für eine Katastrophe! Diese armen, armen Seelen"
 MFE_trade_good_events.13.b: "Sofort Hilfe schicken!"
 MFE_trade_good_events.14.t: "Das feinste Holz aus [SCOPE.sS('hardwood_state').GetName]"
 MFE_trade_good_events.14.d: "Möbelhersteller in ganz [SCOPE.sS('hardwood_state').GetName] verwenden bekanntermaßen Hartholz aus den örtlichen Wäldern."
 MFE_trade_good_events.14.f: "\"Los, schauen Sie sich die Holzmaserung an und klopfen Sie auf die Planke...hören Sie das Geräusch? Das ist ein robustes, starkes Zeug...das hundert Jahre hält.\""
 MFE_trade_good_events.14.a: "Das ist eine gute Sache, oder?"
 MFE_trade_good_events.14.b: "Das klingt gut! Lasst uns Instrumente aus Holz bauen!"
 MFE_trade_good_events.15.t: "Organisierte Verbrechensserie in [SCOPE.sS('grocery_state').GetName]"
 MFE_trade_good_events.15.d: "In [SCOPE.sS('grocery_state').GetName] arbeiten Banden hungernder Einheimischer zusammen, um Gemüse- und Feinkostläden auszurauben."
 MFE_trade_good_events.15.f: "\"Welche Optionen bleiben dem einfachen Mann, wenn ein Pfund Roastbeef doppelt so viel kostet wie vor sechs Monaten?\""
 MFE_trade_good_events.15.a: "Hoffentlich klärt die Polizei die Angelegenheit auf"
 MFE_trade_good_events.15.b: "Lasst uns Entlastung statt Gewalt senden!"
 MFE_trade_good_events.16.t: "Ein erbärmlicher Zustand"
 MFE_trade_good_events.16.d: "Der Anstieg der Baumwollpreise hat dazu geführt, dass die Kleidungspreise in [SCOPE.sS('clothes_state').GetName] in die Höhe geschossen sind."
 MFE_trade_good_events.16.f: "\"Oh ja, es wird definitiv schlimmer. Ich habe Straßenkinder gesehen, die Mehlsäcke als eine Art Tunika trugen, und glauben Sie mir, das sind die Glücklichen.\""
 MFE_trade_good_events.16.a: "Das ist eine Tragödie, aber außerhalb unserer Kontrolle..."
 MFE_trade_good_events.16.b: "Ich schätze, wir können uns für jeden einen Mehlsack leisten..."
 MFE_trade_good_events.17.t: "Eine Tragödie im Showroom"
 MFE_trade_good_events.17.d: "[SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName] brach nach dem Besuch einer Möbelfabrik in [SCOPE.sS('furniture_state').GetName] plötzlich auf einem Stuhl sitzend zusammen und starb."
 MFE_trade_good_events.17.f: "\"Die massive Polizeipräsenz in [SCOPE.sS('furniture_state').GetName] macht es schwierig, Einzelheiten über den Vorfall zu erfahren, aber das ist eindeutig eine Katastrophe.\""
 MFE_trade_good_events.17.a: "War das ein unglücklicher Unfall oder ist etwas Bösartiges passiert?"
 MFE_trade_good_events.17.b: "Hm...Ein Mordstuhl. Das fehlt uns in unserer Sammlung."
 MFE_trade_good_events.18.t: "Das beste Papier der Welt"
 MFE_trade_good_events.18.d: "Die Papierproduktion in [SCOPE.sS('paper_state').GetName] hat alle Erwartungen übertroffen und die Region wird als Industriehochburg bekannt."
 MFE_trade_good_events.18.f: "\"Noch vor zwanzig Jahren gab es in der Stadt keine Fabriken, aber jetzt gibt es in jedem Häuserblock eine.\""
 MFE_trade_good_events.18.a: "Wir werden unseren Überschuss für die Art von Papier verkaufen, das sich falten lässt, wenn Sie verstehen, was ich meine"
 MFE_trade_good_events.18.b: "Papier, bitte!"
 MFE_trade_good_events.19.t: "Schalten Sie die Sterne aus"
 MFE_trade_good_events.19.d: "Der zunehmende Stromverbrauch in [SCOPE.sS('power_state').GetName], insbesondere der Straßenlaternen, hat zu einer erhöhten Lichtverschmutzung geführt."
 MFE_trade_good_events.19.f: "\"Früher konnte man den Großen Wagen in einer klaren Nacht vom Stadtplatz aus sehen, aber jetzt muss man aufs Land hinaus, wenn man den Himmel betrachten will.\""
 MFE_trade_good_events.19.a: "Der Fortschritt hat unbeabsichtigte Folgen, könnte man sagen"
 MFE_trade_good_events.19.b: "Schalten Sie nachts ein paar Lichter aus!"
 MFE_trade_good_events.20.t: "Eine explosive Situation"
 MFE_trade_good_events.20.d: "Eine gewaltige Explosion in den Schwefelminen in der Nähe von [SCOPE.sS('sulfur_state').GetName] zerstörte die Baustelle und tötete Hunderte von Arbeitern."
 MFE_trade_good_events.20.f: "\"Es schien, als würde es ein normaler Tag wie jeder andere werden, aber dann bebte der Boden und es gab ein schreckliches Geräusch...\""
 MFE_trade_good_events.20.a: "Gibt es Männer, die unter der Erde gefangen sind? Das ist fürchterlich"
 MFE_trade_good_events.20.b: "Wo ist der Schwefel? Ist es sicher? Ist alles in Ordnung?"
 MFE_trade_good_events.21.t: "Seltsame Szenen in der Bleimine"
 MFE_trade_good_events.21.d: "Es gab einen Unfall in den Bleiminen von [SCOPE.sS('lead_state').GetName]; alles ist verloren gegangen."
 MFE_trade_good_events.21.f: "\"Arbeiter versuchen immer noch, die unter der Erde Eingeschlossenen zu retten, aber es sieht nicht gut aus …\""
 MFE_trade_good_events.21.a: "Wir beklagen diesen tragischen und sinnlosen Verlust von Menschenleben"
 MFE_trade_good_events.21.b: "Das war unsere führende Bleimine!"
 MFE_trade_good_events.22.t: "Auswaschung schädlicher Chemikalien"
 MFE_trade_good_events.22.d: "Die Bleiminen in der Nähe von [SCOPE.sS('lead_state').GetName] verunreinigen die örtliche Trinkwasserversorgung."
 MFE_trade_good_events.22.f: "\"Die Bauern sagen, dass das Wasser Nierenerkrankungen und Haarausfall verursacht, und bitten [SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName], als Zeichen der Solidarität aus einem örtlichen Brunnen zu trinken.\""
 MFE_trade_good_events.22.a: "Das mache ich nicht! Nehmen Sie das Glas Wasser weg!"
 MFE_trade_good_events.22.b: "Das ist das beste Wasser, das ich je hatte!"
 MFE_trade_good_events.23.t: "Der Beginn eines neuen Zeitalters"
 MFE_trade_good_events.23.d: "Die wundersame Substanz \"Gummi\" verändert das Leben überall, von der Hauptstadt bis zum Dorf."
 MFE_trade_good_events.23.f: "\"Obwohl das wie eine Übertreibung klingen mag, kann man mit Fug und Recht sagen, dass wir in ein neues Zeitalter eintreten – aus dieser wundersamen Substanz kann praktisch alles gemacht werden!\""
 MFE_trade_good_events.23.a: "Wir begrüßen die technologischen Fortschritte, die dieses Material verspricht"
 MFE_trade_good_events.23.b: "Machen Sie einfach mehr!"
 MFE_trade_good_events.24.t: "Das Schwarze Gold von [SCOPE.sS('oil_state').GetName]"
 MFE_trade_good_events.24.d: "Die in [SCOPE.sS('oil_state').GetName] gefundene Ölmenge hat über Nacht Menschen zu Millionären gemacht und das nationale Interesse am Bergbau erhöht."
 MFE_trade_good_events.24.f: "\"Dieses Zeug sieht vielleicht nicht nach viel aus, aber ich sage Ihnen, das ist Gold wert!\""
 MFE_trade_good_events.24.a: "Unsere Schwerindustrie benötigt so viel Öl wie möglich, daher ist das erfreulich"
 MFE_trade_good_events.24.b: "Ich bevorzuge echtes Gold!"
 MFE_trade_good_events.25.t: "Stahlfabrik zerstört lokale Gemeinschaften"
 MFE_trade_good_events.25.d: "Die Menschen in [SCOPE.sState('steel_state').GetName] beginnen, die Stahlfabriken in der Stadt zu bereuen und beklagen den Verlust ihrer traditionellen Lebensweise."
 MFE_trade_good_events.25.f: "\"Zuerst waren wir nur dankbar für die Jobs, aber 16-Stunden-Schichten, sieben Tage die Woche … ist das eine Art zu leben?\""
 MFE_trade_good_events.25.a: "Die Zukunft [ROOT.GetCountry.GetAltName('GEN')] erfordert eine robuste Stahlindustrie"
 MFE_trade_good_events.25.b: "Reduzieren Sie zumindest ihre Schichten ..."