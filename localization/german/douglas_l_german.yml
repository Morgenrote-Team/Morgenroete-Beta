 je_douglas_mountaineering_expedition: "Bergsteigerexpedition"
 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], unser Bergsteiger, leitet derzeit ein Team auf einer Expedition, um den #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! zum ersten Mal zu besteigen. Das Ziel ist die Erstbesteigung eines Gipfels. Die Geschwindigkeit des Aufstiegs hängt weitgehend von seiner Erfahrung und seinen Charaktereigenschaften ab. Je nach Schwierigkeitsgrad des Berges können auch größere Gefahren auftreten. Erreicht die Expedition ihr Ziel nicht innerhalb einer bestimmten Zeitspanne, bricht [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] die Gipfelbesteigung ab. Sollte die Expedition aus irgendeinem Grund in die größte denkbare Gefahr abdriften, dann wird das Schlimmste passieren."
