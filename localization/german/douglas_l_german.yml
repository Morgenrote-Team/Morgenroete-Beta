 douglas.210.t: "Scientific Support"
 douglas.210.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] has offered the service of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] assistant to aid the expedition in studying the mountain's structure."
 douglas.210.f: "The letter was written in a precise hand, the seal unbroken until now. In it, Professor [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] offers the temporary assignment of [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] most promising assistant—a quiet, observant young man with a knack for mineral classification and slope analysis. The professor hopes for detailed reports. The assistant arrives with measuring rods, notebooks, and boundless curiosity. He knows little of climbing—but much of stone."
 douglas.210.g: "Welcome the assistant."
 douglas.214.t: "A Mountain Symphony"
 douglas.214.d: "Inspired by the recent success of [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] has announced that [ROOT.Var('elgar_composer_var').GetCharacter.GetSheHe] wants to write a major musical work about the mountains and man's struggle against nature. The music world is already in agreement that this will be an important work."
 douglas.214.f: "An Alpine Symphony op. 64 is a symphonic poem by the composer Richard Strauss, which was first performed in 1915. The work is based on the composer's concept of using musical means to depict the ascent of an Alpine peak and the return to the valley in one day. The idea for the program goes back to an experience from Strauss' childhood. In the summer of 1879 he lost his footing in the Heimgarten in the Bavarian Alps and was caught in a thunderstorm. The next day he presented this event at the piano. From this memory he developed the concept. It was the composer's declared intention to enable the listener to experience the stages of a mountain hike as a sound painting in an immediately sensual way. According to many music critics, the work achieves this goal in an impressive manner."
 douglas.214.g: "Hopefully there won't be any alpenhorns in it."
 douglas.215.t: "From Summit to Science"
 douglas.215.d: "One of the expedition's companions has chosen a new path. Moved by what [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] witnessed in the high mountains, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] begins a career in geology."
 douglas.215.f: "As the snow crunched beneath [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] boots and the sun rose over jagged peaks, something changed in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]. The layers of rock, the silent power of folded strata, the volcanic scars—all etched themselves into [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] memory more deeply than any summit. After the descent, while others celebrated, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] sought books, maps, hammers. The expedition planted more than a flag: it awakened a mind."
 douglas.215.g: "Encourage [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] studies!"
 douglas.221.t: "An Easy Climb"
 douglas.221.d: "The mountaineering team is making easy progress in their attempt to conquer the #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!. There are no notable occurrences."
 douglas.221.f: "'He is lucky who, in the full tide of life, has experienced a measure of the active environment he most desires. In these days of upheaval and violent change, when the basic values of to-day are the vain and shattered dreams of to-morrow, there is much to be said for a philosophy which aims at living a full life while the opportunity offers. There are few treasures of more lasting worth than the experience of a way of life that is in itself wholly satisfying. Such, after all, are the only possessions of which no fate, no cosmic catastrophe can deprive us; nothing can alter the fact if for one moment in eternity we have really lived.' -Eric Shipton"
 douglas.221.g: "Go ahead!"
 douglas.222.t: "A Slope"
 douglas.222.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] has spotted a small slope in the mountains, but this shouldn't pose a major problem for the climbers."
 douglas.222.f: "The higher a mountaineering team climbs, the greater the challenges. A slope can be an obstacle, but should not be a problem for a moderately well-equipped expedition."
 douglas.222.g: "The team will master this."
 douglas.222.h: "This is too risky."
 douglas.223.t: "Steep Wall"
 douglas.223.d: "A cliff presents a major obstacle for climbers on their trek to the summit, but [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] is confident that [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] will master this task."
 douglas.223.f: "From mountains with an altitude of 2,000 meters, the mountaineering group can encounter cliffs. For low mountains they are the last obstacle before the summit, but in many cases it is more of a warm-up program. From here on, a normal mountain hike differs from a real mountain climb."
 douglas.224.t: "Avalanche!"
 douglas.224.d: "A dangerous avalanche has broken loose in the heights of the #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!, threatening the mountaineering endeavor. With debris now threatening the direct route, finding an alternate route might be safer, but cost valuable time. Some climbers suggest waiting - which includes the possibility that the trail could become more blocked."
 douglas.224.f: "Avalanches occur from snow-covered heights and have been a danger to everyone who lived in the mountains since time immemorial - not just summiteers. Their treacherous nature has already led many to their deaths. From now on the wheat is separated from the chaff."
 douglas.224.g: "That cannot shake a climber."
 douglas.224.h: "Search an alternative route."
 douglas.225.t: "Abyss"
 douglas.225.d: "A dangerous gorge opens up in front of [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] when he has reached the last rock formation. The seemingly insurmountable obstacle poses a challenge for the mountaineers."
 douglas.225.f: "'Alpinism is the art of climbing mountains by confronting the greatest dangers with the greatest prudence. Art is used here to mean the accomplishment of knowledge in action. You cannot always stay on the summits. You have to come down again. So what's the point? Only this: what is above knows what is below, what is below does not know what is above. One climbs, one sees. One descends, one sees no longer, but one has seen. While climbing, take note of all the difficulties along your path. During the descent, you will no longer see them, but you will know that they are there if you have observed carefully.' -René Daumal"
 douglas.226.t: "Death Step"
 douglas.226.d: "Shortly before the summit, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] is confronted with one last, ultimate challenge: a cliff towering almost vertically in front of him decides victory or defeat. The climbers are already rumoring that this is a death trap; or a death step."
 douglas.226.f: "'After an hour's steady going we reached the foot of the most formidable-looking problem on the ridge - a rock step some forty feet high. We realised that at this altitude it might well spell the difference between success and failure. The rock itself, smooth and almost holdless, might have been an interesting Sunday afternoon problem for a group of expert rock climbers in the Lake District, but here it was a barrier beyond our feeble strength to overcome. I could see no way of turning it on the steep rock bluff on the west, but fortunately another possibility of tackling it still remained. On its east side was another great cornice, and running up the full forty feet of the step was a narrow crack between the cornice and the rock. Leaving Tenzing to belay me as best he could, I jammed my way into this crack, then kicking backwards with my crampons I sank their spikes deep into the frozen snow behind me and levered myself off the ground. Taking advantage of every little rock hold and all the force of knee, shoulder and arms I could muster, I literally cramponed backwards up the crack, with a fervent prayer that the cornice would remain attached to the rock.' -Edmund Hillary"
 douglas.226.i: "This is completely hopeless!"
 douglas.227.t: "Weather Change"
 douglas.227.d: "A change in the weather in the mountains of [SCOPE.sState('douglas_location_scope').GetName] presents mountaineers with a life-threatening problem. There is still a window of opportunity to reach a more sheltered location at higher altitudes, but it is a dangerous undertaking. The mountaineers would find safe shelter in the base camp - but that would ruin the progress of the last few days, if not weeks."
 douglas.227.f: "Weather changes in the mountains can be one of the most threatening events that can happen on a mountain tour. This applies to rain, storms and snow. Particularly at the highest altitudes, a sudden snowfall can mean that a summit attempt has to be aborted because the unpredictable elements can end in a tragedy."
 douglas.227.g: "That cannot shake a climber."
 douglas.227.h: "Back to the last camp!"
 douglas.228.t: "Rockfall!"
 douglas.228.d: "A sudden landslide has struck the camp. Several climbers are injured, and essential equipment has been lost!"
 douglas.228.f: "It started with a sharp crack—then a roar. The slope above the bivouac gave way like a slumbering beast. Rocks, dust, and boulders came crashing down in a terrifying cascade. One porter was hit by a stone, a rope was torn apart, and a crate of supplies smashed to splinters. Those who managed to scramble to safety now stare at the wreckage in silence. No one says it out loud, but all know: this could have ended in tragedy. The route seemed secure—but the mountain is no friend."
 douglas.228.g: "Secure the camp and aid the wounded."
 douglas.229.t: "Dizzying Heights"
 douglas.229.d: "As the summit draws nearer, the mountain's thin air and exposed ridgelines begin to take their toll on the climbers."
 douglas.229.f: "The sky is dark even at midday, the air razor-thin. Every step feels like lifting a boulder. Breath comes in short, shallow bursts, and the wind seems to pull the soul straight from the lungs. Some stare too long into the abyss below, and their knees begin to shake. Others hallucinate: voices in the ice, shadows in the snow. The mountain reveals no mercy here—only height, wind, and silence. At this altitude, even courage begins to freeze."
 douglas.229.g: "Push forward, heads down."
 douglas.229.h: "Time for a break."
 douglas.230.t: "Readings in Stone"
 douglas.230.d: "Our geological assistant has analyzed the terrain in detail—and identified hidden risks before they could turn deadly."
 douglas.230.f: "While the others unpacked ropes and checked their boots, the geologist studied the stone. Layer by layer, grain by grain, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s assistant noted tiny fractures, subtle shifts in coloration, the angle of sedimentary bands. 'This slope is unstable,'' he murmured, pointing at what had seemed a safe path. And he was right. A smaller scouting team confirmed the signs of a previous slide. Thanks to his quiet precision, the route was changed in time—and lives perhaps were saved. The mountain may be vast, but its patterns can be read by those who look closely."
 douglas.230.g: "Trust in science."
 douglas.231.t: "Mountain Science"
 douglas.231.d: "The unfamiliar heights of the #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! offer the geological assistant a whole range of new insights, which he collects and writes down during the mountain tour."
 douglas.231.f: "Scientists had often studied the unusual flora and fauna of the area in the early stages of mountain expeditions. Geological investigations were of particular interest - not only for general scientific reasons, but also often to simplify future climbs."
 douglas.231.g: "For Science!"
 douglas.232.t: "A Fine Mineral"
 douglas.232.d: "The mountaineering group was already complaining about the dilly-dallying nature of the geologist, who as a scientist was more of a burden than a help; but as it turns out, he discovered a rare material while climbing the peak."
 douglas.232.f: "The men had been waiting for an hour for the academic, who had stopped somewhere on a slope and suddenly pulled out his tools. Shaking their heads at first, they had decided to combine the unpleasant with the useful and had brought the meal forward so as not to waste time unnecessarily. However, Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]'s assistant had no intention of eating or coming. When [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] threatened to continue the expedition without the geologist, the latter suddenly rejoined the group - with a sparkling stone in his hand."
 douglas.232.g: "What a lovely little surprise."
 douglas.233.t: "A Lost Animal"
 douglas.233.d: "On the lower level of the Himalayas, our naturalist [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] has made a strange discovery: a single, abandoned animal roams there, stricken by hunger and cold."
 douglas.233.f: "It was a strange sight for [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] to find such a small, tender creature, who was otherwise said to live in the bamboo forests of Nepal, in this deserted wasteland. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] knew illustrations from books and knew that locals lived in the nearest forests; but how could a single animal get here? Over this distance? Without food? It remained a mystery. Had the little red panda also caught the mountaineering bug? Or had he fled from predators? Be that as it may, the mountaineer takes care of the exhausted animal and nurses it back to health. It is agreed that a research assistant will bring the red panda to the base camp - and from there prepare it for its journey to the local zoo."
 douglas.233.g: "Is this the legendary 43rd animal?"
