 douglas.209.t: "Fortgeschrittene Ausrüstung"
 douglas.209.d: "Schon zu Beginn der Besteigung des #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! stellt [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] fest, dass die gute Ausrüstung für die Anforderungen, die der Berg stellt, fast überqualifiziert ist."
 douglas.209.f: "Wenn das Ausrüstungsniveau einer Bergsteiger-Expedition besser ist als das Niveau des Berges, verringert dies das anfängliche Risiko einer Bergsteiger-Expedition und gibt einen Fortschrittsbonus."
 douglas.209.g: "Wir sehen uns auf dem Gipfel!"
 douglas.216.t: "Demotivation"
 douglas.216.d: "Unser Bergsteigerteam erhielt heute die Nachricht, dass eine andere Nation als erste den #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! bezwungen hat. Es gibt erste Anzeichen von Uneinigkeit innerhalb des Teams; einige kehren um, und [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] hat offen den Gedanken geäußert, die Besteigung aufzugeben."
 douglas.216.f: "Wenn eine andere Nation den Gipfel eines Berges zuerst erklimmt, ist es fast sicher, dass der Versuch, den Berg zu besteigen, aufgegeben wird."
 douglas.216.g: "Diese Expedition hat ihren Sinn verloren."
 douglas_mountaineer_speech_tt: "Die Bergsteigerexpedition wird #YELLOW noch 60 Tage länger dauern#! bis der Zeitablauf eintritt."
 douglas.208.t: "Worte vor dem Aufstieg"
 douglas.208.d: "Vor dem letzten Vorstoß zum Gipfel wendet sich [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] an das Team. Der Berg #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! - aber so auch [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis]e Stimme."
 douglas.208.f: "\"Über uns liegt der Gipfel - kalt, still, unbewegt. Er kümmert sich nicht um Mut. Er stellt uns keine Fragen. Aber wir antworten ihm - bei jedem Schritt. Dort oben gibt es keine Trommeln, keinen Ruhm. Nur die Aussicht hinter uns und der Stolz, es gewagt zu haben. Wir sind nicht hier, um dem Berg zu begegnen. Wir sind hier, um ihn zu bezwingen. Jeder von euch hat das Recht, sich zu fürchten. Aber keine Angst wird uns zurückhalten. Nicht heute.\""
 douglas.208.g: "Mit [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFirstName] trotzen wir dem Berg!"
 douglas_alpine_club_new_board_tt: "Ein neuer Vorstand für den Alpenverein wurde gewählt."
 douglas.302.t: "Alpenverein: Neuer Vorstand"
 douglas.302.d: "Der Alpenverein hat auf seiner heutigen Sitzung in [SCOPE.sState('douglas_alpine_club_state').GetStateRegion.GetCityHubName] neue Vorstandsmitglieder ernannt."
 douglas.302.f: "Der Alpenverein hat sich für folgende Zusammensetzung entschieden:\n\n#V Präsident: [GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V]#!\n\n#V Vorstand: [GetGlobalVariable('douglas_alpine_club_board_member_1_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_2_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_3_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_4_global_var').GetCountry.GetName|V] [GetGlobalVariable('douglas_alpine_club_board_member_5_global_var').GetCountry.GetName|V]"
 douglas.302.g: "Wir gratulieren den neuen Vorstandsmitgliedern."
 douglas.302.h: "Und es war keine Bestechung im Spiel?"
 douglas_mountaineering_international_expedition_modifier: "Aktuelle internationale Bergsteigerexpedition"
 douglas_mountaineering_international_expedition_setback_modifier: "Rückschlag im Alpenverein"
 douglas.311.t: "Vorschlag für eine internationale Bergsteigerexpedition"
 douglas.311.d: "[SCOPE.sCountry('douglas_board_scope').GetAltName('NOM')], ein Vorstandsmitglied des Alpenvereins, hat die Organisation einer internationalen Bergsteigerexpedition beantragt. Das Land würde die Provisionen zahlen. Der Präsident des Alpenvereins kann jedoch ein Veto gegen dieses Angebot einlegen."
 douglas.311.f: "\"Meine Herren, die Berge kümmern sich nicht um Flaggen oder Grenzen. Sie erheben sich über die kleinlichen Streitigkeiten der Nationen und sind unempfindlich gegenüber unseren Rivalitäten. Deshalb stehe ich heute mit einer Vision vor Ihnen: ein Gipfel jenseits der Politik, jenseits der Blutlinien - ein Gipfel der Menschheit selbst. Lasst uns die besten Bergsteiger aus ganz Europa, Amerika und sogar aus dem fernen Asien versammeln und den Berg nicht als Portugiesen, Franzosen oder Sachsen in Angriff nehmen, sondern als eine Gemeinschaft derer, die es wagen. Es soll ein Triumph nicht nur des Willens und des Seils sein, sondern der Diplomatie, des Vertrauens und des gemeinsamen Ruhms. Dies soll unser Vermächtnis sein: nicht Eroberung, sondern Zusammenarbeit.\""
 douglas.311.g: "Ein guter Vorschlag."
 douglas.311.h: "Nein."
 douglas.312.t: "Veto"
 douglas.312.d: "[SCOPE.sCountry('douglas_president_scope').GetAltName('NOM')], der Präsident des Alpenvereins, hat ein Veto gegen eine internationale Bergsteigerexpedition angekündigt."
 douglas.312.f: "\"Klettern mit den Franzosen? Mit den Schweizern? Ich würde lieber mit einem Bären in Pantoffeln ringen. Haben Sie je versucht, sich mit einem Engländer über Tee zu unterhalten, geschweige denn über Zelte? Nein, danke. Das letzte Mal, als wir ein ausländisches Team einluden, brachten sie vier Fässer Schnaps mit und vergaßen die Karten. Außerdem, meine Herren, geht der Berg nirgendwohin - und ich auch nicht. Wenn wir Ruhm ernten wollen, dann mit unseren Stiefeln im Schnee und nicht mit einem Picknick der Vereinten Nationen auf einem Gletscher. Wir werden mit Würde klettern - oder gar nicht!\""
 douglas.312.g: "Wer hat diesen Präsidenten eigentlich gewählt?"
 douglas.321.t: "Die Wahl des Gipfels"
 douglas.321.d: "Nachdem die internationale Expedition genehmigt wurde, diskutiert der Club nun die ultimative Frage: Welcher Gipfel soll das Schlachtfeld des Ruhmes sein?"
 douglas.321.f: "Der Alpenverein kann beschließen, jeden Berg zu besteigen, der sich auf dem Gebiet eines Landes befindet, in dem es einen Bergsteigerverein gibt. Eine Lizenz ist nicht erforderlich. Der Berg muss jedoch den Level 2, 3 oder 4 entsprechen."
 douglas.321.g: "Der Berg sollte nicht allzu schwierig sein."
 douglas.321.h: "Nehmen wir einen der üblichen klassischen Berge."
 douglas.321.i: "Der Berg sollte eine Herausforderung sein!"
 douglas.331.t: "Alpenverein-Expedition"
 douglas.331.d: "Der Alpenverein hat ein kühnes Ziel verkündet: einen benannten Gipfel, der von einem internationalen Bergsteigerteam bezwungen werden soll, das aus seinen eigenen führenden Mitgliedern besteht. Das Ziel ist der #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!"
 douglas.331.f: "Alle Vorstandsmitglieder des Alpenvereins können an einer internationalen Bergsteigerexpedition teilnehmen, die vom Alpenverein organisiert wird. Voraussetzung dafür ist, dass ein aktiver Bergsteiger an der Expedition des Vereins teilnimmt. Internationale Expeditionen haben eine fast sichere Erfolgschance, finden aber selten statt. Der Vereinsvorsitzende hat im Falle einer erfolgreichen Besteigung Anspruch auf die Erstbesteigung und erhält das meiste Prestige, aber auch alle anderen Vorstandsmitglieder, die teilgenommen haben, werden belohnt."
 douglas.331.g: "Der Gipfel soll eine gemeinsame Fahne tragen."
 douglas.341.t: "Der Aufstieg der Nationen"
 douglas.341.d: "Flaggen werden gehisst. Proviant wird gepackt. Die internationale Expedition bereitet sich darauf vor, dorthin aufzusteigen, wo noch nie jemand gestanden hat."
 douglas.341.f: "Eine Stille legte sich über das Basislager, wo sich Akzente aus der ganzen Welt mit der frischen Morgenluft vermischten. Einige zogen schweigend ihre Stiefel an, andere tauschten letzte nervöse Witze aus. Am Rande des Lagers stand [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] still und betrachtete den in Wolken gehüllten Gipfel.\n\n'Man sagt, er sei noch nie bestiegen worden', murmelte der Franzose und zündete sich eine Zigarette an.\n\n'Dann wird es Zeit dafür', antwortete die Engländerin mit einem leisen Lächeln."
 douglas.341.g: "Lasst die Welt gemeinsam klettern."
 douglas.351.t: "Gipfel Triumph"
 douglas.351.d: "Nach Wochen der Entbehrungen ist der Gipfel erreicht. [GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetAltName('NOM')|V] hat den Gipfel im Namen des Alpenvereins in Besitz genommen."
 douglas.351.f: "Sie standen Schulter an Schulter in der dünnen Luft, Eiskristalle klebten an Bärten und Wimpern, die Erschöpfung stand ihnen in jede Falte ihres Gesichts geschrieben. Doch keiner wich zurück, als der Präsident des Alpenvereins die Fahne der Expedition entfaltete und sie fest in den Schnee steckte.\n\nDie anderen versammelten sich. Eine Kamera - mühsam in diese unmögliche Höhe geschleppt - wurde vorbereitet. Hinter ihnen öffneten sich die Wolken und enthüllten das Tal unter ihnen wie eine gemalte Landkarte.\n\n\"Halten Sie still\", sagte der Fotograf. \"Das ist eins für die Ewigkeit\"\n\nDer Auslöser klickte.\n\nDieses eine Foto sollte die Salons, Hörsäle und Zeitungen auf der ganzen Welt schmücken. Darauf steht der Präsident aufrecht mit der Fahne, umringt von grinsenden, erfrorenen Bergsteigern - geeint nicht durch die Nation, sondern durch die Eroberung."
 douglas.351.g: "Für die Wissenschaft, für den Ruhm, für die Menschheit."
 douglas_add_international_expedition_effect_tt: "#default_text [GetPlayer.GetAltName('NOM')] schließt eine Alpenverein-Expedition ab"
 je_douglas_international_mountaineering_expedition_preparation: "Vorbereitung auf die Alpenvereinsexpedition"
 je_douglas_international_mountaineering_expedition_preparation_reason: "Alle Vorstandsmitglieder des Alpenvereins können an einer internationalen Bergsteigerexpedition teilnehmen, die vom Alpenverein organisiert wird. Voraussetzung dafür ist, dass ein aktiver Bergsteiger an der Expedition des Vereins teilnimmt. Internationale Expeditionen haben eine fast sichere Erfolgschance, finden aber selten statt. Der Vereinspräsident hat im Falle einer erfolgreichen Besteigung Anspruch auf die Erstbesteigung und erhält das meiste Prestige, aber auch alle anderen Vorstandsmitglieder, die daran teilgenommen haben, werden belohnt.\n\nUm an einer internationalen Expedition teilzunehmen, müssen Sie der Expedition unter 'Verein' im Bergsteigermenü beitreten. Dies ist möglich, solange dieser Journaleintrag noch nicht abgelaufen ist."
 je_douglas_international_mountaineering_expedition: "Alpenverein-Expedition"
 je_douglas_international_mountaineering_expedition_reason: "Der Erfolg einer vom Alpenverein geleiteten Bergsteigerexpedition ist in der Regel garantiert. Seine Dauer hängt jedoch weitgehend von der Anzahl der teilnehmenden Vorstandsmitglieder ab. Der Vereinspräsident hat im Falle einer erfolgreichen Besteigung Anspruch auf die Erstbesteigung und erhält das meiste Prestige, aber auch alle anderen Vorstandsmitglieder, die teilgenommen haben, werden belohnt."
 douglas_international_mountain_expedition_progress_bar: "Alpenverein-Expedition"
 douglas_international_mountain_expedition_progress_bar_desc: "Expeditionsfortschritt: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/10)"
 douglas_international_mountain_expedition_progress_bar_at_full_tt: "Der Bergexpeditions-Fortschrittsbalken hat #variable 100%#! erreicht"
 douglas_mountain_expedition_progress_1_member_tt: "#default_text Mindestens ein Vorstandsmitglied nimmt an der Expedition teil.#!"
 douglas_mountain_expedition_progress_2_member_tt: "#default_text Zwei Vorstandsmitglieder nehmen an der Expedition teil.#!"
 douglas_mountain_expedition_progress_3_member_tt: "#default_text Drei Vorstandsmitglieder nehmen an der Expedition teil.#!"
 douglas_mountain_expedition_progress_4_member_tt: "#default_text Vier Vorstandsmitglieder nehmen an der Expedition teil.#!"
 douglas_mountain_expedition_progress_5_member_tt: "#default_text Fünf Vorstandsmitglieder nehmen an der Expedition teil.#!"
 ACHIEVEMENT_GROUP_douglas_achievement_group: "Douglas Errungenschaften"
 ACHIEVEMENT_douglas_president: "Capitol Hill"
 ACHIEVEMENT_DESC_douglas_president: "Werden Sie Präsident des Alpenvereins."
 ACHIEVEMENT_douglas_seven: "Sieben Gipfel"
 ACHIEVEMENT_DESC_douglas_seven: "Besteigen Sie sieben Berggipfel."
 ACHIEVEMENT_douglas_everest: "Mallorys letzter Wunsch"
 ACHIEVEMENT_DESC_douglas_everest: "Besteigen Sie den Mount Everest vor 1953."
 je_douglas_mount_everest_expedition_preparation: "Vorbereitung auf die Mount Everest-Expedition"
 je_douglas_mount_everest_expedition_preparation_reason: "Die Bezwingung des höchsten Berges der Welt erfordert nicht nur einen hervorragenden Bergsteiger, sondern auch eine umfassende Vorbereitung. Je mehr wir uns auf unseren Aufstieg vorbereiten, desto geringer ist das Grundrisiko."
 je_douglas_mount_everest_expedition: "Mount Everest Expedition"
 je_douglas_mount_everest_expedition_reason: "Der Mount Everest ist der König der Berge. Der Fortschritt wird hier ausschließlich durch den Ausgang von Ereignissen gemessen. Ob ein Bergsteiger Erfolg hat, hängt von seinen Fähigkeiten ab. Da das Grundrisiko des Mount Everest sehr hoch ist, kann davon ausgegangen werden, dass sich die Expedition im Vorfeld umfassend wissenschaftlich beraten ließ, um zu verhindern, dass kleine Unachtsamkeiten zu einer Katastrophe führen."
 je_mount_everest_metereologist_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_curie_physicist] mit der [concept_character_trait] #V $curie_meteorologist$#!.#!"
 je_mount_everest_mechanical_engineer_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_tesla_engineer] mit der [concept_character_trait] #V $gaudi_mechanical_engineer$#!.#!"
 je_mount_everest_good_physician_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_panum_physician] mit der [concept_character_trait] #V $panum_physician_experienced$#! oder #V $panum_physician_famous$#!.#!"
 je_mount_everest_good_ethnologist_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_roy_ethnologist','$concept_roy_ethnologists$')] mit der [concept_character_trait] #V $roy_ethnologist_experienced$#! oder #V $roy_ethnologist_famous$#!."
 je_mount_everest_good_geologist_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] mit der [concept_character_trait] #V $agassiz_geologist_experienced$#! oder #V $agassiz_geologist_famous$#!.#!"
 douglas.401.t: "Am Fuße des heiligen Berges"
 douglas.401.d: "Die Expedition erreicht den Himalaya - und muss nun ihren Weg zum Gipfel der Welt wählen."
 douglas.401.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] rollte die Karte aus und breitete sie auf dem Felsen aus. Zwei Zeilen. Zwei Möglichkeiten.\n\nNach Norden: ein bekannter Weg durch Tibet. Diplomatische Freigabe, ältere Vermessungen und der Geist früherer Expeditionen.\n\nIn den Süden: das verbotene Tal von Nepal. Unbekanntes Terrain, Geflüster des göttlichen Zorns. Doch die Hänge könnten freundlicher sein.\n\nSie konnten nicht beide besteigen.\n\nDer Berg erlaubte nur einen Versuch."
 douglas.401.g: "Folgen Sie der North Face Route."
 douglas.401.h: "Folgen Sie der South Face Route."
 douglas.411.t: "Das Verbotene Tal"
 douglas.411.d: "Nach monatelangen Verhandlungen setzt die Expedition nach Nepal über, um eine südliche Besteigung des Chomolungma zu versuchen."
 douglas.411.f: "Sie nannten es das \"verbotene Tal\". Jahrzehntelang hatte kein Fremder einen Fuß über den letzten Pfosten von Darjeeling gesetzt. Doch an diesem Morgen lichtete sich der Nebel, und [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] und das Team schlüpften über den letzten Kamm.\n\nDer Fluss, der sich durch den Wald schlängelte, war auf keiner Karte mehr verzeichnet. Es gab keine Pfade. Nur Ziegenpfade und gedämpfte Stimmen aus den nahe gelegenen Dörfern. Selbst die Sherpa wirkten unruhig. In der Nacht trug der Wind ein Geräusch heran, wie man [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] es in den Alpen oder den Anden noch nie gehört hatte - eine tiefe, atmende Stille, die von den Gletschern selbst zu kommen schien. Die Männer sprachen wenig. Die Lasttiere wurden unruhig. Und der Arzt meldete die ersten Fälle von Höhenkrankheit, viel früher als erwartet. Doch niemand kehrte um. Denn jenseits der Bäume, jenseits des Nebels, jenseits der letzten Biegung des Tals, lag das Gesicht des Everest - unberührt vom Süden.\n\nEs war wunderschön. Und es sah aus, als wollte es sie tot sehen."
 douglas.411.g: "Auf diesem Weg gibt es keine Straßen."
 douglas.412.t: "Die Gletschererscheinung"
 douglas.412.d: "Die Expedition erreicht den Fuß des Khumbu-Eisfalls - ein Labyrinth aus Schneeschollen und klaffenden Gletscherspalten."
 douglas.412.f: "Der Gletscher bewegte sich lautlos. Er knarrte, bewegte sich, seufzte unter ihren Füßen wie etwas Lebendiges. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] hatte schon öfter Eis gesehen, aber noch nie so etwas. Dies waren keine alpinen Hänge - es waren Monolithen, hohl und schief, blau wie gefrorene Lungen und genauso zerbrechlich.\n\nGegen Mittag stieg die Temperatur. Ein dumpfes Krachen ertönte von links, dann ein weiteres - und ein Block von der Größe eines Hauses löste sich und fiel wie Glas. Die Sherpa zerstreuten sich. Ein Mann verlor in der Nähe einer Gletscherspalte den Halt und wurde im letzten Moment zurückgezogen. Die Karte war unbrauchbar. Seile froren ein, rissen. Das Sonnenlicht ließ die Tritte schneller schmelzen, als sie klettern konnten.\n\nSie hatten kaum die Hälfte geschafft.\n\nSie gingen weiter voran. Hoffen, dass der Gletscher hält. Oder sich zurückziehen und es vor dem Morgengrauen noch einmal versuchen, wenn die Kälte das Eis zum Stillstand bringt.\n\nAber jede Stunde, die sie hier verschwendeten, war eine weitere Stunde ohne Luft über achttausend Metern."
 douglas.412.g: "Weiter vorwärts. Wir sind hier, um zu klettern."
 douglas.412.h: "Dies ist ein unmögliches Hindernis."
 douglas.413.t: "Der Weiße Ofen"
 douglas.413.d: "Das Team betritt das Tal des Schweigens - ein breites Gletschertal zwischen hoch aufragenden Eiswänden, in denen sich die Sonne von allen Seiten spiegelt."
 douglas.413.f: "Es sollte der einfachere Teil sein. Eine flache Strecke, eine kurze Verschnaufpause vor der Lhotse-Wand. Aber niemand hatte sie vor der Hitze gewarnt.\n\nGegen Mittag war das Tal des Schweigens zu einem Ofen geworden. Der Schnee verwandelte sich unter ihren Stiefeln in Schneematsch. Die Sonnenbrillen beschlugen oder zersplitterten. Die Eiswände auf beiden Seiten reflektierten die Sonne in gleißendem Glanz, bis es ihnen vorkam, als würden sie auf brennendem Glas laufen. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] versuchte zu sprechen, aber [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] konnte [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis]e Zunge nicht mehr spüren.\n\nEin Träger brach zusammen. Ein anderer erbrach sich. Erfrierungen wichen Sonnenbränden. Der Gletscher ächzte unter den Füßen, als würde er ihnen ihr Gewicht übel nehmen. Es gab keinen Wind, kein Geräusch, keinen Schatten - nur Blendung, Hitze und das schleichende Gefühl, auf dem Dach der Welt lebendig gekocht zu werden.\n\nUnd doch winkte die Wand vor ihnen. Das Lhotse-Wand ragte blau und senkrecht auf.\n\nZu warten bedeutete, mehr Zeit, mehr Nahrung, mehr Kraft zu opfern.\n\nSich zu bewegen bedeutete, gegen die Sonne zu spielen."
 douglas.413.g: "Weiter. Wir können jetzt nicht aufhören."
 douglas.413.h: "Beenden Sie diesen Wahnsinn."
 douglas.414.t: "Die Blaue Wand"
 douglas.414.d: "Um den südlichen Pass zu erreichen, muss das Team die steile und ausgesetzte Lhotse-Wand unter sich verschlechternden Bedingungen hinaufsteigen."
 douglas.414.f: "Sie kletterte nicht mehr, sondern kroch gegen die Schwerkraft nach oben. Das Eis unter ihren Füßen war hart wie Marmor, blau wie Stahl. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] trat mit beiden Stiefeln zu, schlug die Axt und betete, dass sie hielt. Jeder Schritt dauerte Minuten. Jeder Atemzug ein Krieg.\n\nWeit unten schimmerte der Western Cwm in falscher Gelassenheit. Über ihnen erstreckte sich die Wand ins Unendliche. Der Wind war zurückgekehrt - kein Sturm, sondern ein trockenes, schabendes Zischen, das ihnen die Wärme aus den Knochen saugte. Die Seile erstarrten. Die Finger wurden steif. Aber es gab keinen Spielraum für Fehler. Ein Ausrutscher konnte drei Männer zu Fall bringen.\n\nJemand hustete hinter [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]. Blut im Schnee. Ein Sherpa war ins Straucheln geraten. Zu hoch, zu schnell. Aber sie waren bereits fest entschlossen.\n\nDie Wand bot keinen Schutz. Keine Rast. Nur Aufstieg.\n\nUnd der Grat über ihnen schien nicht näher zu sein als noch vor zwei Stunden."
 douglas.414.g: "Klettern. Wir sind zu weit gekommen, um umzukehren."
 douglas.414.h: "Flieht, ihr Narren!"
 douglas.415.t: "Das letzte Camp"
 douglas.415.d: "Das Team erreicht den Südsattel. Nur noch der Gipfelgrat liegt vor ihnen - und die endgültige Entscheidung."
 douglas.415.f: "Es war wie Camping auf dem Mond. Die Luft war brüchig, der Wind gnadenlos. Die Zelte zitterten unter jeder Böe wie verwundete Tiere. Keine Vögel, keine Stimmen, nicht einmal das Knistern des Gletschers. Nur dünne, rasselnde Atemzüge. Der Südsattel war kein Ort zum Ausruhen - es war ein Ort, an dem man entweder auf den Ruhm oder den Tod wartete.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] saß zusammengekauert in der Stoffhülle des Zeltes und starrte mit zitternder Hand auf die Karte. Der Weg zum Gipfel war klar: entlang des Südostgrats zum Gipfel der Welt.\n\nAber der Sauerstoff ging zur Neige. Die Vorräte gingen zur Neige. Die Finger waren geschwärzt. Ein Mann hatte seit Sonnenaufgang nicht mehr gesprochen.\n\nDer Treibstoff reichte gerade noch für einen Versuch. Ein letzter Versuch. Der Gipfel war weniger als 1.000 Höhenmeter entfernt - aber in der Todeszone konnten es genauso gut tausend Meilen sein.\n\nAußen heulte der Wind wie etwas Lebendiges. Es war Zeit, sich zu entscheiden.\n\nAuf oder ab.\n\nLeben oder versuchen."
 douglas.415.g: "Starten Sie den Gipfelversuch."
 douglas.415.h: "Brechen Sie den Aufstieg ab. Überleben Sie und kehren Sie in einem anderen Jahr zurück."
 douglas.416.t: "Der [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]-Schritt"
 douglas.416.d: "Kurz unterhalb des Gipfels versperrt ein unerwartetes Hindernis den letzten Kamm - eine senkrechte Wand aus Fels und Eis."
 douglas.416.f: "Die Sonne war noch nicht aufgegangen. Der Gipfelkamm glühte blass im Licht der Morgendämmerung, und für einen Moment glaubte [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName], der Weg sei frei. Die Luft war zu dünn zum Sprechen. Der Wind biss durch Handschuhe und Schutzbrillen. Aber dann - hielt es sie auf.\n\nEine Steilwand. Zehn, vielleicht zwölf Meter. Zu steil, um zu gehen, zu ausgesetzt, um sie zu umgehen. Ein einziger senkrechter Monolith schnitt wie eine Klinge quer über den Grat - und es gab keine Seile, keine Haken, keine Route. Er war nicht auf den Karten verzeichnet. Kein Bericht hatte ihn erwähnt. Niemand hatte sie gewarnt.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] starrte die Wand hinauf. Der Schnee war dünner geworden. Es war Granit, schwarz und von Reif umrandet. Ein Sherpa versuchte, nach links zu spähen - steiler Abgrund. Ein anderer versuchte es rechts - nichts als Himmel.\n\nDer Berg hatte sich einen letzten Trick aufgehoben. Ein letztes Hindernis.\n\nEs gab keinen Weg drum herum. Nur drüber.\n\nSpäter würden sie ihn nach demjenigen benennen, der ihn zuerst gesehen hatte."
 douglas.416.g: "Klettert den [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]-Schritt."
 douglas.416.h: "Es ist zu gefährlich. Wir kehren um."
 douglas.421.t: "Das Verbotene Gesicht"
 douglas.421.d: "Mit Erlaubnis der örtlichen Behörden bricht die Expedition auf, um den Everest von Norden her durch das Rongbuk-Tal zu besteigen."
 douglas.421.f: "Es gab keinen Empfang, nur Wind. Die Gebetsfahnen flatterten farblos. Die Mönche starrten wie Geister von den Bergkuppen, unbeweglich, wortlos. Der Weg endete dort, wo der Gletscher begann - und der Gletscher führte in die Stille.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] hatte die Berichte gelesen. Mallory, Norton, Finch. Ihre Karten waren unvollständig, ihre Aufzeichnungen kryptisch. Aber der Berg war da, genau so, wie sie ihn beschrieben hatten: hoch aufragend, grau, kahl.\n\nDie Yaks hielten in der Nähe des Rongbuk-Klosters. Von hier an würden sie alles auf dem Rücken tragen. Die Expedition war nicht mehr theoretisch. Sie bestand aus Stein, Eis und Höhe. Der Himmel über ihnen war dünn und brüchig. Der Schnee fiel nicht - er hing. Der Gletscher knarrte in der Nacht wie etwas Uraltes, das sich im Schlaf drehte.\n\nEiner der Träger flüsterte etwas von einem Gott, der auf dem Berg lebte und noch nicht besänftigt worden war.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] fragte nicht nach einer Übersetzung."
 douglas.421.g: "Der Norden erteilt die Erlaubnis - heißt aber nicht willkommen."
 douglas.422.t: "Der Gletscher knackt"
 douglas.422.d: "Der östliche Rongbuk-Gletscher offenbart seine Gefahren - einstürzende Gletschererscheinungen und verborgene Gletscherspalten bedrohen das Vorankommen der Karawane."
 douglas.422.f: "Die Sonne wärmte kaum den Talboden, als das erste Geräusch erklang - ein hohles, ächzendes Knacken tief unter dem Eis. Dann ein weiteres. Die Männer erstarrten. Die Yaks wurden unruhig. Schnee fiel in langsamen, zischenden Flocken von den Klippen über uns herunter.\n\nDer östliche Rongbuk-Gletscher sah aus der Ferne ruhig aus, aber aus der Nähe war er ein Labyrinth aus blauen Graten, Gletscherspalten und schiefen Türmen. Jeder Schritt war eine Vermutung. Jeder Fußabdruck ein Glücksspiel.\n\nSie versuchten, einen Grat auf der linken Seite zu umschiffen. Das Eis gab nach. Ein Gepäckträger verschwand ohne einen Laut. Ein zweiter Mann baumelte schreiend an einem Seil. Seine Steigeisen schabten über das glatte Eis, fanden aber nichts. Sie zogen ihn hoch - blutverschmiert, mit großen Augen. Lange Zeit sprach niemand.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] blickte nach vorn. Es waren noch drei Kilometer Gletscher, bevor der Hang flacher wurde. Sie konnten durchstoßen - jetzt, schnell - oder sich zurückziehen, kühlere Stunden abwarten und es erneut versuchen, wenn das Eis steifer wurde.\n\nAber Wetter könnte sich ändern. Die Wolken rollten wie Trommeln. Eine Verzögerung könnte Sturm bedeuten."
 douglas.423.t: "Die Eiswand"
 douglas.423.d: "Um den Nordsattel zu erreichen, muss das Team einen steilen und ausgesetzten Eishang erklimmen, der von Wind und Schatten umweht wird."
 douglas.423.f: "Der Weg führte in einem steilen Winkel nach oben. Eine Gletscherzunge, hart wie Eisen, führte direkt in den Himmel. Der Nordsattel schwebte über ihnen wie ein in Eis gemeißeltes Versprechen. Aber es gab keinen Weg - nur Hang, nur Wind, nur Angst.\n\nJe höher sie stiegen, desto stärker wurde der Wind. Er heulte nicht - er schrie. Er schälte den Schnee von der Wand und schleuderte ihn ihnen wie Glas ins Gesicht. Die Anker weigerten sich, einzuschlagen. Die Seile versteiften sich. Die Sonne verschwand hinter Wolken, als würde sie sich schämen.\n\nEin Mann rutschte aus. Sein Schrei war kurz. Sie hielten ihn - gerade noch. Aber das Seil war jetzt ausgefranst.\n\nEinige Sherpa weigerten sich, weiterzugehen, knieten im Schnee und flüsterten Gebete an unsichtbare Götter.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] stand am Fuß der letzten Seillänge. Die Gratlinie schimmerte darüber wie eine Halluzination. Sie konnten sich den Weg nach oben erzwingen - oder absteigen, sich ausruhen und es mit stärkeren Seilen und wärmerem Wetter noch einmal versuchen.\n\nAber bei einer Verzögerung riskierten sie Stürme. Oder schlimmer - Zweifel."
 douglas.424.t: "Die Grenze des Atems"
 douglas.424.d: "Das Team schlägt ein letztes Lager oberhalb des Nordsattels auf, wo es dem Wind und dem Gewicht des Gipfels ausgesetzt ist."
 douglas.424.f: "Es gab keinen Schutz. Nur der Wind und das Geräusch von Lungen, die nach Luft suchten, die nicht da war. Die Zelte bogen sich bei jedem Windstoß nach innen, als würde der Berg selbst versuchen, sie zu verschlucken.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] kroch in einen Schlafsack, der noch immer mit Frost überzogen war. Das Thermometer war nutzlos. Die Kälte war keine Zahl mehr - sie war eine Bedingung der Existenz. Kein Feuer. Kein Appetit. Nur Zittern und das unerbittliche Zischen des Sauerstoffs, der durch die bereits vereisten Ventile in die Masken geblasen wurde.\n\nEiner der Sherpa sprach nicht mehr. Er saß still, die Augen offen, unbeweglich. Seine Finger waren grau geworden. Ein anderer flüsterte immer wieder von zu Hause, obwohl niemand danach gefragt hatte.\n\nSie waren jetzt über 8.000 Meter hoch. Die Todeszone. Die Muskeln heilten nicht mehr. Der Körper verbrauchte sich selbst, um am Leben zu bleiben. Selbst das Atmen war eine Entscheidung.\n\nDer Gipfelkamm lag vor ihnen. Entweder würden sie ihn morgen erreichen - oder nie wieder davon sprechen."
 douglas.425.t: "Der zweite Schritt"
 douglas.425.d: "Kurz unterhalb des Gipfels erreicht das Team eine steile Fels- und Eiswand - das größte Hindernis auf dem Nordgrat."
 douglas.425.f: "Sie ragte aus dem Bergrücken wie eine Mauer, die für Riesen bestimmt war. Zehn Meter hoch, schwarz, senkrecht, mit Reif umrandet. Die zweite Stufe.\n\nEs hatte keine Warnung gegeben. Keine Karte hatte dies gezeigt.\n\nDer Weg endete hier. Auf der einen Seite, tausend Meter Luft. Auf der anderen ein schmaler Felsvorsprung, nicht breiter als ein Stiefel. Der Wind kratzte an ihren Jacken. Der Sauerstoff zischte durch die Masken wie Dampf.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] starrte nach oben. Es gab keinen offensichtlichen Haltegriff. Kein Riss. Nur blanker Fels, glitschig von gefrorenem Atem. Der Sherpa würde nicht weitergehen. Die anderen warteten mit leeren Augen, zu müde, um zu sprechen.\n\nEin Mann schlug vor, es ohne Gepäck zu versuchen. Ein anderer bot an, zu klettern und ein Seil zu befestigen. Aber es gab keine Seile mehr.\n\nSie hatten den Ort erreicht, an dem Männer umkehren. Oder verschwanden."
 douglas.425.g: "Versuchen Sie, die zweite Stufe zu erklimmen."
 douglas.425.h: "Kehren Sie um. Dies ist das Ende."
 douglas.431.t: "Das Dach der Welt"
 douglas.431.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] erreicht den Gipfel des Chomolungma - der erste Mensch, der über der Welt steht."
 douglas.431.f: "Es war windstill. Kein Geräusch. Nur das Knirschen des Schnees unter [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis]en Stiefeln und die hohle Stille einer zurückgelassenen Welt.\n\nDie letzten Schritte fühlten sich wie ein Traum an. Die Lungen brannten, die Augen waren verschwommen, der Körper zitterte - und dann: nichts mehr oben.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] stand allein auf dem Gipfel, die Sonne schlug wie eine Flamme auf den Schnee. Weit unten trieben die Wolken wie Ozeane. Gipfel, die einst mächtig schienen, lagen nun wie zerknittertes Pergament da.\n\nDie Erde krümmte sich. Die Zeit blieb stehen. Nur ein einziger Moment, gemeißelt in Eis und atemlosem Himmel."
 douglas.431.g: "Der dritte Pol gehört uns."
 douglas.432.t: "Der Berg wartet"
 douglas.432.d: "Angesichts von Verlust, Erschöpfung und schwindender Hoffnung wird die Expedition vor Erreichen des Gipfels abgebrochen."
 douglas.432.f: "Keine Entscheidung fiel mir leicht. Es war nicht der Sturm, die Erfrierungen oder der Hunger, der sie beendete. Es war die Stille um das Feuer. Die Augen, die sich nicht mehr hoben. Die Männer, die nicht mehr fragten \"wie weit\", sondern \"warum\".\n\nDie Karten waren zerrissen, die Seile steif vor Eis. Die Träger murmelten Gebete in der Dunkelheit. Selbst [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] schaute nicht mehr auf den Gipfel - nur noch in den Himmel.\n\nSie begruben, was sie nicht tragen konnten. Sie hinterließen eine Fahne auf einem Steinhaufen unterhalb des Passes.\n\nAuf dem langen Abstieg sprach niemand mehr. Aber in ihrem Schweigen lag keine Scham."
 douglas.432.g: "Ein Scheitern am Everest ist keine Niederlage. Nur Verzögerung."
 douglas.433.t: "Sie kamen nie zurück"
 douglas.433.d: "Nach dem letzten Stoß war kein Wort mehr zu hören. Der Berg bewahrte sein Schweigen."
 douglas.433.f: "Das letzte Signal kam in der Abenddämmerung. Ein flackerndes Licht auf dem Bergrücken. Eine Silhouette, die sich knapp unter dem Himmel bewegte. Dann - nichts.\n\nTagelang suchten sie die Flanken ab. Sherpa durchkämmten den Gletscher. Kein Seil. Kein Handschuh. Nur verwehte Spuren, die ins Nichts führten.\n\nNiemand wusste, wie weit sie es geschafft hatten. Ob sie den Gipfel erreichten. Ob sie auf die Welt herabblickten und sie als Ganzes sahen.\n\nNur eines war sicher: Sie waren nicht zurückgekehrt.\n\nManche sagten, sie seien gestürzt. Andere, dass sie einfach unter dem Schnee lagen, einen Arm gen Himmel gestreckt.\n\nAber einige flüsterten etwas anderes - dass der Berg sie angenommen hatte. Und dass sie immer noch dort sein würden, im Eis und im Stein, und darauf warteten, dass ihnen jemand folgte."
 douglas.433.g: "Die Expedition ist in die Geschichte eingegangen."
 douglas_third_pole_modifier: "Der dritte Pol"
 douglas_mount_everest_physicist_button: "Wettervorhersagen im Himalaya"
 douglas_mount_everest_physicist_button_desc: "Veränderliche Wetterbedingungen waren in der Vergangenheit oft der Grund für gescheiterte Expeditionen. Ein Physiker mit den Fähigkeiten eines Meteorologen könnte einen geeigneten Zeitpunkt für eine Expedition berechnen, an dem der Gipfelversuch die beste Aussicht hätte."
 douglas_mount_everest_engineer_button: "Verbesserte Sauerstoffversorgung"
 douglas_mount_everest_engineer_button_desc: "Die Verwendung von Sauerstoffflaschen für das Bergsteigen in extremen Höhen steckt noch in den Kinderschuhen. Ein Ingenieur könnte aus dieser experimentellen Technologie ein besseres Gerät entwickeln."
 douglas_mount_everest_physician_button: "Forschung zur Höhenkrankheit"
 douglas_mount_everest_physician_button_desc: "Die Höhenkrankheit gilt als eine der gefährlichen Begleiterscheinungen des Bergsteigens im Himalaya. Ein erfahrener Arzt kann den Zustand näher untersuchen."
 douglas_mount_everest_ethnologist_button: "Lokale Sherpa"
 douglas_mount_everest_ethnologist_button_desc: "Die erfolgreichsten Routen zu den Gipfeln des Himalaya führen über das Wissen der Einheimischen, die das Gebiet am besten kennen. Ein Ethnologe könnte einen erfahrenen Sherpa als Partner für die Expedition anwerben."
 douglas_mount_everest_geologist_button: "Geologische Untersuchung"
 douglas_mount_everest_geologist_button_desc: "Ein Geologe kann ein Profil des Berges erstellen und aussichtsreichere Routen auf dem Berg aufzeigen sowie bessere Wege zur Besteigung vorschlagen."
 douglas_mount_everest_risk_decrease_tt: "Das Anfangsrisiko bei der Besteigung des Mount Everest ist geringer."
 douglas.402.t: "Eine Wettervorhersage"
 douglas.402.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] liefert das erste Langstrecken-Wettermodell für den Himalaya - Tage bevor die Expedition von [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] abfährt."
 douglas.402.f: "Monatelang hatte der Arzt im Stillen gearbeitet. Diagramme. Barometrische Daten. Windaufzeichnungen aus Indien. Und eine Theorie - radikal vielleicht, aber elegant: dass die großen Winde Zentralasiens saisonalen Korridoren folgten, nicht dem Chaos.\n\nNun, mit kreideverschmierten Ärmeln und rissigen Fingerspitzen, stand Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] vor der Bergsteigertafel und deutete auf das Papier: eine von Hand gezeichnete Folge von Isobaren, die ein zehntägiges atmosphärisches Fenster entlang des Himalaya-Kamms vorhersagten.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] verengte [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis]e Augen. \"Bist du sicher?\"\n\nDer Physiker rückte die Brille zurecht.\n\n\"So sicher wie man sein kann - wenn man mit einem Berg spricht.\""
 douglas.402.g: "Nutzen Sie die Vorhersage, um den Zeitpunkt des Aufstiegs zu bestimmen."
 douglas.403.t: "Luft für die Todeszone"
 douglas.403.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] stellt ein neues Sauerstoffgerät vor, das für das Überleben in großen Höhen entwickelt wurde."
 douglas.403.f: "Bisher war Sauerstoff oberhalb von 8.000 Metern ein Experiment - eine unangenehme, zischende Last auf dem Rücken von Männern, die kaum laufen konnten. Undichte Ventile. Eingefrorene Schläuche. Tanks, die zu schwer für atemlose Schultern waren.\n\n[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] änderte das.\n\nMit Druckreglern, die auf Mikro-Toleranzen abgestimmt waren, isolierten Schläuchen und einem modularen Gurtsystem wog das neue Gerät nur noch halb so viel und lieferte einen doppelt so stabilen Fluss. Die Tanks können nun in der Kleidung getragen werden, was ein Einfrieren verhindert. Die Maske schmiegte sich an das Gesicht wie die zweite Haut eines Tauchers.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] hob das Gerät mit einer behandschuhten Hand an und nickte.'Wird es über 26.000 Fuß funktionieren?'\n\nDer Ingenieur lächelte.\n\n\"Es wurde gebaut, um dort zu funktionieren, wo nichts anderes funktioniert.\""
 douglas.403.g: "Rüsten Sie das Team mit dem verbesserten System aus."
 douglas.404.t: "Die unsichtbare Gefahr"
 douglas.404.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] unterrichtet das Team darüber, wie man die Höhenkrankheit während des Aufstiegs erkennt und verhindert."
 douglas.404.f: "Die Frostbeulen wären sichtbar. Auf die Stürze konnte man sich vorbereiten. Aber das - das war etwas anderes.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] stand vor der Expedition und begann, die Symptome zu beschreiben: die Kopfschmerzen, die Atemlosigkeit, die subtile Verwirrung, die zu fatalen Entscheidungen führte.\n\n\"Es beginnt wie Trunkenheit,\" sagte [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], \"aber endet wie Ertrinken.\"\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] hörte schweigend zu. Es war ein Rezept zum Überleben."
 douglas.404.g: "Halten Sie sich genau an das Protokoll des Arztes."
 douglas.405.t: "Der Mann, der den Berg kennt"
 douglas.405.d: "Durch stilles Verhandeln und kulturelles Verständnis sichert sich Dr. [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName] die Unterstützung eines altgedienten Sherpa mit unübertroffenem Wissen über die Hänge des Everest."
 douglas.405.f: "Er hatte keine Karten dabei. Er sprach nicht viel Englisch. Und doch antwortete der Berg, wenn er auf ihn zeigte.\n\nEs war [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName], der ihn fand - nicht in einer Namensliste, sondern in einem ruhigen Dorf zwei Täler weiter.\n\n\"Er war höher als jeder von uns', sagte der Ethnologe, 'und kehrte mehr als einmal zurück.\"\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] streckte eine Hand aus. Der Sherpa nahm sie schweigend. Keine Zeremonie. Kein Zweifel.\n\n\"Sie haben vielleicht den Gipfel studiert,\" murmelte Dr. [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName] \"aber er hat mit seinem Schatten gesprochen.\""
 douglas.405.g: "Stellen Sie einen erfahrenen Sherpa als Führer ein."
 douglas.406.t: "Die Knochen des Berges"
 douglas.406.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] untersucht das Terrain und entdeckt eine sicherere Aufstiegsroute durch uralte Formationen."
 douglas.406.f: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe|U] fuhr mit den Fingern über die schwarzen Rillen im Stein und nickte langsam. Schiefer, dann Gneis, dann eine Tasche aus gebrochenem Kalkstein. Verwerfungslinien wie Narben. Druckfalten wie gefrorene Wellen.\n\n\"Der Berg steht nicht still\", sagte der Geologe, \"nur langsam.\"\n\nStundenlang ging Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] vor dem Team her, den Hammer in der Hand, klopfte, hörte, las. Der Wissenschaftler markierte einen Grat, der einen gefährlichen Eisfall umging. Ein anderer, der diagonal durch windexponiertes Geröll führte, ersparte zwei Tage Kletterei.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] sah schweigend zu.\n\n\"Können Sie vorhersagen, was halten wird?\"\n\nDr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] zuckte mit den Schultern.\n\n\"Nein\" sagte [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]. \"Aber ich kann Ihnen sagen, was in den letzten zehn Millionen Jahren gegolten hat.\"\n\nUnd manchmal war das genug."
 douglas.406.g: "Befolgen Sie die Empfehlungen des Geologen."
 douglas.121.t: "Mut, zu Hause geschmiedet"
 douglas.121.d: "Jahrelanges Training in den [ROOT.GetCountry.GetAdjective]en Bergen hat ihm Ruhe eingeflößt, wo einst Zögern herrschte. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] kehrt mit einer ruhigeren Hand und einem mutigeren Herzen zurück."
 douglas.121.f: "\"Ich dachte immer, Angst sei etwas, das man überwinden muss\", sagte [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]. \"Aber in Wahrheit ist sie etwas, das man in sich trägt, ohne sich von ihr beherrschen zu lassen.\"\n\nMonatelang kletterte [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] die Bergkämme und Gletscher seiner Heimat erklommen - allein, in aller Stille, oft auf derselben Route, um zu bemerken, was einst ungesehen geblieben war.\n\nDie Gipfel wuchsen nicht, aber [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] schon. Steinschlag, Kälte und ein weißer Himmel wurden zu vertrauten Gegnern. Und obwohl keine der Besteigungen Schlagzeilen machte, hinterließ jede von ihnen Spuren - nicht in Form von Ruhm, sondern in Form von Nerven."
 douglas.121.g: "Lasst die hohen Tiere kommen."
 douglas.122.t: "Schritte sind nie vergebens"
 douglas.122.d: "Wo andere umkehrten, ging [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] einfach weiter. Selbst das Scheitern wurde zum Treibstoff - und jeder Weg zu einer Lektion."
 douglas.122.f: "Der Gipfel war nie das Ziel. Nicht ganz.\n\nAuf einem Grat zog der Sturm zu, bevor [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] die letzte Seillänge erreichte. In einem anderen Fall hat eine Lawine die Route über Nacht ausgelöscht. Manchmal gingen die Lebensmittel zur Neige oder die Bergführer gaben den Versuch auf. Aber [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] blieb. Zurückgekehrt. Angepasst.\n\nEin Berg gibt nicht nach, wenn er stur ist. Aber er erkennt Hartnäckigkeit an.\n\nMonatelang erklomm [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] vertraute Gipfel auf ungewohnte Weise - erforschte neue Wege, testete Werkzeuge, kartierte versteckte Abhänge. Was andere als fruchtlose Wiederholung betrachteten, wurde zur Grundlage für etwas, das schwerer zu verdienen ist als Ruhm: Ausdauer."
 douglas.122.g: "Kein Weg, der zweimal gegangen wird, ist jemals derselbe."
 douglas.123.t: "Jenseits der bekannten Karten"
 douglas.123.d: "Die Neugierde trieb [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] jenseits der Routen, denen andere vertrauten. Dort, in den leeren Räumen, fand [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] einen Sinn - und einen Weg."
 douglas.123.f: "Die alten Karten zeigten die Grenzen des Wissens, nicht nur die des Landes. Die meisten Bergsteiger blieben innerhalb dieser Grenzen. Nicht [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName].\n\nWährend andere etablierte Routen verfolgten, wanderte [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] jenseits davon - die zerbröckelten Grate, die niemand kartiert hatte, die Täler ohne Namen, die Klippen, die zu weit von jeder Stadt entfernt waren, um Touristen oder Ruhmsuchende anzulocken.\n\nAuf einer solchen Reise kampierte [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] in der Nähe eines vergessenen Gletschers, katalogisierte Gesteinsschichten, die auf uralte Umwälzungen hindeuteten, und kartografierte eine Schlucht, über die die Einheimischen flüsterten, die sie aber nie zu betreten gewagt hatten. Es war keine Erstbesteigung. Aber es war ein erstes Verstehen."
 douglas.123.g: "Es gibt keine größere Freude, als das zu finden, was niemand erwartet hat."
 douglas.124.t: "Stahl und Stein"
 douglas.124.d: "Als [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] auf General [SCOPE.sCharacter('douglas_general_scope').GetLastName] traf, trafen Erfahrung und Instinkt aufeinander - und beide gingen verändert daraus hervor."
 douglas.124.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] hatte die Haltung eines Menschen, der es gewohnt war, über Artilleriegeschütze hinweg zu schreien, und eine Uniform, die noch den alpinen Schneestaub trug. General [SCOPE.sCharacter('mountain_general').GetFullName] hatte in den Höhen gekämpft, Männer durch Frost und Stille geführt und den Berg nicht als Hindernis, sondern als Schlachtfeld begriffen.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] kam, um von [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] zu lernen. Und doch war schon nach wenigen Tagen klar, dass der Austausch auf Gegenseitigkeit beruhte.\n\n\"Wir planen Kampagnen. Sie planen das Überleben\", murmelte der General, während [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] die Felshaken und Höhenkarten untersuchte.\n\n\"Sie bewegen Armeen\", kam die Antwort, \"ich bewege mich allein. Aber der Berg beurteilt uns beide gleich.\""
 douglas.124.g: "Der Berg lehrt alle, in verschiedenen Sprachen."
 douglas_mount_everest_highest_mountain_flag: "Mount Everest (Himalaya)"
 douglas_kangchenjunga_highest_mountain_flag: "Kangchendzönga (Himalaya)"
 douglas_dhalaugiri_highest_mountain_flag: "Dhalaugiri (Himalayas)"
 douglas_chimborazo_highest_mountain_flag: "Chimborazo (Ekuador)"
 douglas.217.t: "Fußabdrücke im Schnee"
 douglas.217.d: "\"Sie waren zu groß für einen Menschen und viel zu tief für einen Schneeleoparden\", erklärte [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] dem Korrespondenten von The Penny Illustrated Paper. Der Artikel verbreitete sich schnell in Teeläden und Salons von London bis Kalkutta und löste gleichermaßen Gelächter und Erstaunen aus. Eine Kreatur, groß wie ein Bär und leise wie eine Flocke, soll die eisigen Flanken von Kabru, Kamet und Everest durchstreifen. Selbst die Sherpa-Führer hatten keinen Zweifel - sie nannten es Metoh-Kangmi."
 douglas.217.f: "\"Ich habe viele Dinge auf diesen Bergen gesehen - Eisstürze, plötzliche Stürme, Männer, die ihre Finger verloren und Gott gefunden haben. Aber ich schwöre bei den Stiefeln Ihrer Majestät, ich habe etwas hinter unserem Lagerfeuer gehen sehen. Und es hat uns beobachtet.\"\n\nBrief von [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], veröffentlicht in [TimeKeeper.GetCurrentDate.Format('y')]"
 douglas.217.g: "Die Menschen interessieren sich für Geschichten wie diese."
 douglas.217.h: "Diese Berichte schaden dem Ruf unseres Bergsteigers!"
