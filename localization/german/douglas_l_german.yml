 douglas_mountaineer: "Bergsteiger"
 douglas_mountaineer_desc: "Ein Bergsteiger ist eine Person, die Berge besteigt, oft aus sportlichen oder abenteuerlichen Gründen. Sie sind geübt darin, sich in schwierigem Gelände zurechtzufinden und unter harten Bedingungen zu überleben. Bergsteiger sind bekannt für ihre körperliche Ausdauer, geistige Zähigkeit und ihren tiefen Respekt vor der Natur."
 notification_douglas_mountaineer_brave_name: "Bergsteiger wird mutig"
 notification_douglas_mountaineer_brave_desc: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], unser [concept_douglas_mountaineer] hat nun die [concept_character_trait] #V $brave$#!"
