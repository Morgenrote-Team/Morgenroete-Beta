 douglas.101.t: "Mountaineering Club gegründet" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] ruft - und der Berg antwortet. Die Gründung des Mountaineering Club markiert eine neue Ära für alle, die höher hinaus wollen." #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] Expeditionen führten [SCOPE.sCharacter('douglas_president_scope').GetHerHim] durch Stürme und Lawinen - doch nun versucht [SCOPE.sCharacter('douglas_president_scope').GetSheHe], das Erbe von [SCOPE.sCharacter('douglas_president_scope').GetHerHis] weiterzugeben. Auf [ROOT.GetCountry.GetCapital.GetCityHubName] gründet [SCOPE.sCharacter('douglas_president_scope').GetSheHe] den Mountaineering Club of [GetPlayer.GetName], nicht allein, sondern an der Seite eines vielversprechenden Neulings: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] Ein aufstrebender Bergsteiger mit scharfen Augen und eisernem Willen. [SCOPE.sCharacter('douglas_president_scope').GetFullName] sieht in [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] nicht nur Ehrgeiz, sondern eine zukünftige Legende. Gemeinsam stehen sie an der Schwelle eines Weges, der nicht nur zu Gipfeln führt, sondern zu Ruhm, Mut - und vielleicht zu einem Platz in der Geschichte. Der Club ist offen für alle, die den Ruf der Berge hören. Der Aufstieg beginnt." #deepl:3771164746
 douglas.101.g: "Der Berg ruft!" #deepl:249284577

 douglas.102.t: "Der Alpenverein" #deepl:1599559370
 douglas.102.d: "Der Alpenverein wurde offiziell unter [ROOT.GetCountry.GetCapital.GetCityHubName] [TimeKeeper.GetCurrentDate.Format('y')] gegründet und gilt als die erste internationale Bergsteigerorganisation der Welt. Seine Gründung markiert den institutionellen Beginn des modernen Alpinismus." #deepl:3982546221
 douglas.102.f: "Historisch gesehen kam 1857 eine Gruppe britischer Herren in London zusammen, um einen Club zu gründen, der sich dem Bergsteigen widmete. Unter der Leitung von Persönlichkeiten wie John Ball und Edward Kennedy wollte der Alpine Club die systematische Erforschung der Alpen fördern und dabei die körperliche Herausforderung mit geografischen und naturkundlichen Studien verbinden. Der Club bot einen strukturierten Rahmen für den Wissensaustausch, die Organisation von Expeditionen und die Förderung des Gemeinschaftsgefühls unter Bergsteigern. Seine Mitglieder spielten eine Schlüsselrolle in dem, was später als das "Goldene Zeitalter des Alpinismus" bekannt werden sollte, indem sie zahlreiche Erstbesteigungen durchführten und ihre Erfahrungen dokumentierten. Kurz darauf begann die Veröffentlichung des Alpinjournals, das zur aufkommenden Literatur des Bergsteigens beitrug. Die Gründung des Alpenvereins legte den Grundstein für das organisierte Klettern auf der ganzen Welt und setzte bleibende Maßstäbe für die Erforschung der Berge." #deepl:4126383378
 douglas.102.g: "Gemeinsam zum Gipfel!" #deepl:2506053391

