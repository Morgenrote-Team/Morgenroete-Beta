 douglas.211.t: "Der Gipfel"
 douglas.211.d: "Nach einem beschwerlichen Aufstieg erreicht die Bergsteigergruppe schließlich den Gipfel. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ist der erste Mensch, der diesen Flecken Erde für [ROOT.GetCountry.GetNameNoFormatting] stürmt. Jetzt bleibt nichts anderes übrig, als diesen Moment des Triumphs auszukosten."
 douglas.211.f: "Die erste Frage, die Sie mir stellen werden und die ich versuchen muss zu beantworten, lautet: \"Was nützt es, den Mount Everest zu besteigen?\" und meine Antwort muss sofort lauten: 'Es hat keinen Zweck.' Es gibt nicht die geringste Aussicht auf irgendeinen Gewinn.\n\nOh, wir werden vielleicht ein wenig über das Verhalten des menschlichen Körpers in großen Höhen lernen, und vielleicht können Mediziner unsere Beobachtungen für die Zwecke der Luftfahrt nutzen. Aber ansonsten wird nichts dabei herauskommen. Wir werden kein einziges Stück Gold oder Silber zurückbringen, keinen Edelstein, keine Kohle und kein Eisen. Wir werden keinen einzigen Fuß Erde finden, der mit Pflanzen bepflanzt werden kann, um Nahrungsmittel anzubauen. Es ist sinnlos.\n\n Wenn Sie also nicht verstehen können, dass es etwas im Menschen gibt, das auf die Herausforderung dieses Berges reagiert und sich ihr stellt, dass der Kampf der Kampf des Lebens selbst ist, aufwärts und für immer aufwärts, dann werden Sie nicht verstehen, warum wir gehen. Was wir von diesem Abenteuer haben, ist einfach nur Freude.\n\ Und Freude ist schließlich das Ziel des Lebens. Wir leben nicht, um zu essen und Geld zu verdienen. Wir essen und verdienen Geld, um das Leben genießen zu können. Das ist es, was das Leben bedeutet und wozu es da ist.'- George Leigh Mallory"
 douglas.211.g: "Genießen wir die Morgendämmerung!"
 douglas.212.t: "Aufstieg abgebrochen"
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]Der Versuch, den Gipfel zu erreichen, ist vorerst gescheitert. Unser Bergsteiger ist gezwungen, das Unternehmen abzubrechen und zurückzukehren."
 douglas.212.f: "Es kann viele Gründe geben, warum ein Bergsteiger den Aufstieg abbricht. Manchmal reicht schon ein Wetterumschwung, manchmal erweist sich ein vermeintlicher Zugang zum Gipfel als zu tückisch. Oft dauert ein Aufstieg zu lange und überschreitet ein Zeitfenster, weil bestimmte Tageszeiten und Veränderungen den Aufstieg schwierig oder unmöglich machen. Und manchmal hat man einfach den falschen Weg gewählt."
 douglas.212.g: "Enttäuschend."
 douglas.213.t: "Bergsteigerische Katastrophe!"
 douglas.213.d: "Beim Klettern in den Bergen [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] wurde ein schrecklicher Fehler begangen, der die Expedition in einer Katastrophe endete - mehrere Menschen starben, Proviant und Ausrüstung stürzten mit ihnen herab. Die ganze Nation steht unter Schock!"
 douglas.213.f: "Jede Nacht, verstehst du, sehe ich meine Kameraden vom Matterhorn auf dem Rücken gleiten, die Arme ausgestreckt, einer nach dem anderen, in perfekter Reihenfolge und in gleichen Abständen - zuerst Croz, der Führer, dann Hadow, dann Hudson und zuletzt Douglas. Ja, ich werde sie immer sehen ...'- Edward Whymper"
 douglas.213.g: "Eine Tragödie!"
 douglas_mountaineering_expedition_cost_modifier: "Bergsteigen Exedition Kosten"
 douglas.201.t: "Bergsteigerexpedition - Stufe 1"
 douglas.201.d: "Der Bergsteigerverein hat eine Auswahl von Bergen zusammengestellt, die nur ein primitives Minimum an Bergsteigerausrüstung erfordern, um eine Besteigung zu wagen."
 douglas.202.t: "Bergsteigerexpedition - Stufe 2"
 douglas.202.d: "Der Mountaineering Club hat eine Auswahl von Bergen zusammengestellt, für deren Besteigung eine Standard-Bergsteigerausrüstung erforderlich ist."
 douglas.203.t: "Bergsteigerexpedition - Stufe 3"
 douglas.203.d: "Der Bergsteigerverein hat eine Auswahl von Bergen zusammengestellt, die eine gute Bergsteigerausrüstung erfordern, um sie zu besteigen."
 douglas.204.t: "Bergsteigerexpedition - Stufe 4"
 douglas.204.d: "Der Mountaineering Club hat eine Auswahl von Bergen zusammengestellt, die eine hochwertige Bergsteigerausrüstung erfordern, um sie zu besteigen."
 douglas.205.t: "Bergsteigerexpedition - Stufe 5"
 douglas.205.d: "Der Mountaineering Club hat eine Auswahl von Bergen zusammengestellt, für deren Besteigung die beste Bergsteigerausrüstung erforderlich ist."
