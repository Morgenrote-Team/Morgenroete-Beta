 douglas.111.t: "Der erste Schritt"
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] stattet das Team mit einer grundlegenden Kletterausrüstung aus."
 douglas.111.f: "Die Zeit der improvisierten Aufstiege ist vorbei. Unter der Leitung eines [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] erhält das Team seine erste standardisierte Ausrüstung: Seile, Eispickel, Pickel und robuste Rucksäcke. Diese Hilfsmittel sind nicht nur lebensrettend - sie verändern auch die Wahrnehmung des Berges. Die Besteigung wird methodischer und kalkulierter. Wo früher nur Mut und rohe Kraft zählten, stehen jetzt Technik und Vorbereitung im Mittelpunkt. Es ist ein bescheidener, aber epochaler Schritt für jeden, der sich in die gnadenlose Welt von Eis und Fels wagt."
 douglas.111.g: "Jetzt gehören die Berge den Vorbereiteten."
 douglas.112.t: "Gefesselt durch ein Seil"
 douglas.112.d: "Unser Bergsteiger [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] hat eine neue Idee: Um die Sicherheit zu erhöhen, werden Klettersteige eingeführt."
 douglas.112.f: "Jeder Schritt in den Bergen birgt Risiken - aber heute klettert niemand mehr allein. Die Einführung von Seilschaften markiert einen Mentalitätswandel: Nicht mehr der Einzelne kämpft gegen den Berg, sondern eine Kette von Bergsteigern, die durch Vertrauen - und durch ein geflochtenes Seil - verbunden sind. Diese Veränderung bringt Ordnung, Disziplin und ein tiefes Gefühl der gemeinsamen Verantwortung mit sich. Wenn einer stürzt, halten ihn die anderen. Die Gefahr ist nicht gebannt, sondern umverteilt. Der Berg bleibt wild - aber unsere Antwort auf ihn ist nicht mehr heroisch, sondern kooperativ."
 douglas.112.g: "Ein Seil. Ein Wille. Ein Team."
 douglas.113.t: "Der zerbrechliche Körper"
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] insists on introducing a first-aid system for the team."
 douglas.113.f: "Blasen, Knochenbrüche, Erfrierungen - der Berg kennt keine Gnade. Was früher als Teil des Risikos akzeptiert wurde, wird heute systematisch behandelt. Ein kleiner Verbandskasten kann, klug eingesetzt, ein Leben retten. Eine schnell errichtete Unterkunft kann Zeit gewinnen. Zum ersten Mal sind medizinische Grundkenntnisse Teil der Ausbildung. Der Berg verlangt immer noch alles, aber mit der Einführung von Erste-Hilfe-Kits und Notfallplänen reagiert das Team mit mehr als nur Schneid. Der menschliche Körper wird nicht länger ignoriert - er wird geschützt."
 douglas.113.g: "Auch die Stärksten können fallen."
 douglas.114.t: "Stein spricht"
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] hat wissenschaftliche Methoden in den Bergsport eingeführt: Geologisches Wissen wird eingeführt, um die Analyse des Geländes zu verbessern."
 douglas.114.f: "Was einst als Hintergrund erschien - Geröll, Sediment, Gestein - wird nun zu einer Sprache, die gelesen werden muss. Ein Teammitglied bringt geologisches Fachwissen mit: Schichten verraten uralte Bewegungen, Gesteinsarten warnen vor Lawinen, Verwerfungslinien zeigen sichere Routen an. Der Berg ist nicht länger ein Mythos, sondern ein Archiv. Die Wissenschaft kommt mit Notizbüchern und Hämmern, und plötzlich sind die Expeditionen nicht mehr nur Abenteuer, sondern Feldstudien. Es ist eine neue Art des Sehens - eine stille Revolution."
 douglas.114.g: "Lasst uns lernen, bevor wir klettern."
 douglas.115.t: "Der Atem der Höhe"
 douglas.115.d: "Warum sollte man die Erfahrungen aus der chemischen Kriegsführung nicht für Bergsteigerprojekte nutzen? Die neue Technologie ermöglicht die Verwendung von Sauerstoffmasken in extremen Höhen."
 douglas.115.f: "Ab einer bestimmten Höhe wird der Himmel dünner. Das Atmen wird zum Kampf, der Körper protestiert. Doch mit Hilfe mechanischer Geräte gelangen die Menschen nun an Orte, für die sie nie bestimmt waren. Sauerstoffmasken - einst eine Kuriosität der Wissenschaft - werden zum Standard. Sie definieren die Grenzen des Möglichen neu. Die Welt oberhalb von 7.000 Metern wird zugänglich, wenn auch um den Preis, dass der Bergsteiger nicht mehr wirklich allein ist, sondern Teil eines Lebenserhaltungssystems. Der Triumph über den Berg wird nicht geschmälert, sondern nur kälter."
 douglas.115.g: "Wir atmen künstlich, aber wir setzen uns durch."
