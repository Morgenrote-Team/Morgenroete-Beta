 douglas.211.t: "Der Gipfel" #deepl:3152681021
 douglas.211.d: "Nach einem beschwerlichen Aufstieg erreicht die Bergsteigergruppe schließlich den Gipfel. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ist der erste Mensch, der diesen Flecken Erde für [ROOT.GetCountry.GetNameNoFormatting] stürmt. Jetzt bleibt nichts anderes übrig, als diesen Moment des Triumphs auszukosten." #deepl:2761012191
 douglas.211.f: "Die erste Frage, die Sie mir stellen werden und die ich versuchen muss zu beantworten, lautet: "Was nützt es, den Mount Everest zu besteigen?" und meine Antwort muss sofort lauten: 'Es hat keinen Zweck.' Es gibt nicht die geringste Aussicht auf irgendeinen Gewinn.\n\nOh, wir werden vielleicht ein wenig über das Verhalten des menschlichen Körpers in großen Höhen lernen, und vielleicht können Mediziner unsere Beobachtungen für die Zwecke der Luftfahrt nutzen. Aber ansonsten wird nichts dabei herauskommen. Wir werden kein einziges Stück Gold oder Silber zurückbringen, keinen Edelstein, keine Kohle und kein Eisen. Wir werden keinen einzigen Fuß Erde finden, der mit Pflanzen bepflanzt werden kann, um Nahrungsmittel anzubauen. Es ist sinnlos.\n\n Wenn Sie also nicht verstehen können, dass es etwas im Menschen gibt, das auf die Herausforderung dieses Berges reagiert und sich ihr stellt, dass der Kampf der Kampf des Lebens selbst ist, aufwärts und für immer aufwärts, dann werden Sie nicht verstehen, warum wir gehen. Was wir von diesem Abenteuer haben, ist einfach nur Freude.\n\ Und Freude ist schließlich das Ziel des Lebens. Wir leben nicht, um zu essen und Geld zu verdienen. Wir essen und verdienen Geld, um das Leben genießen zu können. Das ist es, was das Leben bedeutet und wozu es da ist.'- George Leigh Mallory" #deepl:2116445992
 douglas.211.g: "Genießen wir die Morgendämmerung!" #deepl:3916807741
 douglas.212.t: "Aufstieg abgebrochen" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]Der Versuch, den Gipfel zu erreichen, ist vorerst gescheitert. Unser Bergsteiger ist gezwungen, das Unternehmen abzubrechen und zurückzukehren." #deepl:641296697
 douglas.212.f: "Es kann viele Gründe geben, warum ein Bergsteiger den Aufstieg abbricht. Manchmal reicht schon ein Wetterumschwung, manchmal erweist sich ein vermeintlicher Zugang zum Gipfel als zu tückisch. Oft dauert ein Aufstieg zu lange und überschreitet ein Zeitfenster, weil bestimmte Tageszeiten und Veränderungen den Aufstieg schwierig oder unmöglich machen. Und manchmal hat man einfach den falschen Weg gewählt." #deepl:430022267
 douglas.212.g: "Enttäuschend." #deepl:1131565686
 douglas.213.t: "Bergsteigerische Katastrophe!" #deepl:285221578
 douglas.213.d: "Beim Klettern in den Bergen [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] wurde ein schrecklicher Fehler begangen, der die Expedition in einer Katastrophe endete - mehrere Menschen starben, Proviant und Ausrüstung stürzten mit ihnen herab. Die ganze Nation steht unter Schock!" #deepl:2272067559
 douglas.213.f: "Jede Nacht, verstehst du, sehe ich meine Kameraden vom Matterhorn auf dem Rücken gleiten, die Arme ausgestreckt, einer nach dem anderen, in perfekter Reihenfolge und in gleichen Abständen - zuerst Croz, der Führer, dann Hadow, dann Hudson und zuletzt Douglas. Ja, ich werde sie immer sehen ...'- Edward Whymper" #deepl:3038127729
 douglas.213.g: "Eine Tragödie!" #deepl:1503732790

