 douglas.210.t: "Wissenschaftliche Unterstützung"
 douglas.210.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] hat die Dienste [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]es Assistenten angeboten, um die Expedition bei der Untersuchung der Struktur des Berges zu unterstützen."
 douglas.210.f: "Der Brief wurde mit präziser Hand geschrieben, das Siegel ist bis heute nicht gebrochen. Darin bietet Professor [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] die vorübergehende Zuweisung [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]es vielversprechendsten Assistenten an - eines ruhigen, aufmerksamen jungen Mannes mit einem Händchen für die Klassifizierung von Mineralien und Hanganalysen. Der Professor hofft auf detaillierte Berichte. Der Assistent kommt mit Messlatten, Notizbüchern und grenzenloser Neugierde. Er weiß wenig über das Klettern, aber viel über Steine."
 douglas.210.g: "Begrüßen Sie den Assistenten."
 douglas.214.t: "Eine Bergsinfonie"
 douglas.214.d: "Angeregt durch den jüngsten Erfolg von [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] hat [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] angekündigt, dass [ROOT.Var('elgar_composer_var').GetCharacter.GetSheHe] ein großes musikalisches Werk über die Berge und den Kampf des Menschen gegen die Natur schreiben will. Die Musikwelt ist sich bereits einig, dass dies ein wichtiges Werk sein wird."
 douglas.214.f: "Eine Alpensinfonie op. 64 ist eine symphonische Dichtung des Komponisten Richard Strauss, die 1915 uraufgeführt wurde. Das Werk basiert auf der Idee des Komponisten, mit musikalischen Mitteln den Aufstieg auf einen Alpengipfel und die Rückkehr ins Tal an einem Tag darzustellen. Die Idee zu diesem Programm geht auf ein Erlebnis aus Strauss' Kindheit zurück. Im Sommer 1879 verlor er im Heimgarten in den bayerischen Alpen den Halt und geriet in ein Gewitter. Am nächsten Tag präsentierte er dieses Ereignis am Klavier. Aus dieser Erinnerung heraus entwickelte er das Konzept. Es war die erklärte Absicht des Komponisten, die Etappen einer Bergwanderung als Klanggemälde unmittelbar sinnlich erfahrbar zu machen. Dieses Ziel erreicht das Werk nach Meinung vieler Musikkritiker auf beeindruckende Weise."
 douglas.214.g: "Hoffentlich sind da keine Alphörner drin."
 douglas.215.t: "Vom Gipfel zur Wissenschaft"
 douglas.215.d: "Einer der Gefährten der Expedition hat einen neuen Weg eingeschlagen. Bewegt von dem, was [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] im Hochgebirge gesehen hat, beginnt [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] eine Karriere in der Geologie."
 douglas.215.f: "Als der Schnee unter [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]en Stiefeln knirschte und die Sonne über zerklüfteten Gipfeln aufging, veränderte sich etwas in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]. Die Gesteinsschichten, die stille Kraft der gefalteten Schichten, die vulkanischen Narben - sie alle prägten sich tiefer in [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] Gedächtnis ein als jeder Gipfel. Nach dem Abstieg, während andere feierten, suchte [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] nach Büchern, Karten und Hämmern. Die Expedition hat mehr als nur eine Fahne gesetzt: Sie hat einen Geist geweckt."
 douglas.215.g: "Fördern Sie [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]e Studien!"
 douglas.221.t: "Ein leichter Aufstieg"
 douglas.221.d: "Das Bergsteigerteam macht leichte Fortschritte bei ihrem Versuch, den #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! zu bezwingen. Es gibt keine nennenswerten Vorkommnisse."
 douglas.221.f: "\"Glücklich ist derjenige, der in der vollen Flut des Lebens ein gewisses Maß an aktiver Umwelt erfahren hat, die er sich am meisten wünscht. In diesen Tagen des Umbruchs und des gewaltsamen Wandels, in denen die Grundwerte von heute die eitlen und zerbrochenen Träume von morgen sind, spricht viel für eine Philosophie, die darauf abzielt, ein erfülltes Leben zu leben, solange sich die Gelegenheit dazu bietet. Es gibt nur wenige Schätze, die von größerem Wert sind als die Erfahrung einer Lebensweise, die in sich selbst vollkommen befriedigend ist. Das sind schließlich die einzigen Besitztümer, die uns kein Schicksal, keine kosmische Katastrophe nehmen kann; nichts kann die Tatsache ändern, dass wir einen Moment in der Ewigkeit wirklich gelebt haben.\" - Eric Shipton"
 douglas.221.g: "Nur zu!"
 douglas.222.t: "Ein Hang"
 douglas.222.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] hat einen kleinen Abhang in den Bergen entdeckt, aber das sollte kein großes Problem für die Bergsteiger darstellen."
 douglas.222.f: "Je höher ein Bergsteigerteam aufsteigt, desto größer sind die Herausforderungen. Ein Hang kann ein Hindernis sein, sollte aber für eine mäßig gut ausgerüstete Expedition kein Problem darstellen."
 douglas.222.g: "Das Team wird das meistern."
 douglas.222.h: "Das ist zu riskant."
 douglas.223.t: "Steile Wand"
 douglas.223.d: "Eine Klippe stellt ein großes Hindernis für Bergsteiger auf ihrem Weg zum Gipfel dar, aber [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ist zuversichtlich, dass [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] diese Aufgabe meistern wird."
 douglas.223.f: "Ab einer Höhe von 2.000 Metern kann die Bergsteigergruppe auf Felsen treffen. Bei niedrigen Bergen sind sie das letzte Hindernis vor dem Gipfel, aber in vielen Fällen handelt es sich eher um ein Aufwärmprogramm. Von hier an unterscheidet sich eine normale Bergwanderung von einer echten Bergbesteigung."
 douglas.224.t: "Lawine!"
 douglas.224.d: "Eine gefährliche Lawine ist in den Höhen des #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! losgebrochen und bedroht das Bergsteigerprojekt. Da die Trümmer nun den direkten Weg bedrohen, ist die Suche nach einer alternativen Route zwar sicherer, kostet aber wertvolle Zeit. Einige Bergsteiger schlagen vor, zu warten - was die Möglichkeit einschließt, dass der Weg noch mehr blockiert werden könnte."
 douglas.224.f: "Lawinen kommen aus schneebedeckten Höhen und sind seit jeher eine Gefahr für alle, die in den Bergen leben - nicht nur für Gipfelstürmer. Ihre tückische Natur hat schon viele in den Tod geführt. Von nun an trennt sich die Spreu vom Weizen."
 douglas.224.g: "Das kann einen Kletterer nicht erschüttern."
 douglas.224.h: "Suchen Sie eine alternative Route."
 douglas.225.t: "Abgrund"
 douglas.225.d: "Eine gefährliche Schlucht tut sich vor [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] auf, als [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] die letzte Felsformation erreicht hat. Das scheinbar unüberwindbare Hindernis stellt eine Herausforderung für die Bergsteiger dar."
 douglas.225.f: "\"Alpinismus ist die Kunst, Berge zu besteigen, indem man den größten Gefahren mit der größten Umsicht begegnet. Mit Kunst ist hier die Verwirklichung von Wissen in Aktion gemeint. Man kann nicht immer auf den Gipfeln bleiben. Man muss auch wieder herunterkommen. Worum geht es also? Nur dies: Was oben ist, weiß, was unten ist, was unten ist, weiß nicht, was oben ist. Man steigt hinauf, man sieht. Wenn man absteigt, sieht man nicht mehr, aber man hat gesehen. Nimm beim Aufstieg alle Schwierigkeiten auf deinem Weg zur Kenntnis. Beim Abstieg wirst du sie nicht mehr sehen, aber du wirst wissen, dass sie da sind, wenn du sie genau beobachtet hast.\" - René Daumal"
 douglas.226.t: "Todesschritt"
 douglas.226.d: "Kurz vor dem Gipfel wird [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] mit einer letzten, ultimativen Herausforderung konfrontiert: Eine fast senkrecht vor ihm aufragende Klippe entscheidet über Sieg oder Niederlage. Die Bergsteiger munkeln bereits, dass es sich um eine Todesfalle handelt; oder um eine Todesstufe."
 douglas.226.f: "\"Nach einer Stunde stetigen Gehens erreichten wir den Fuß des am furchterregendsten aussehenden Problems auf dem Grat - eine etwa vierzig Fuß hohe Felsstufe. Uns war klar, dass sie in dieser Höhe über Erfolg und Misserfolg entscheiden konnte. Der Felsen selbst, glatt und fast grifflos, wäre vielleicht ein interessantes Sonntagnachmittagsproblem für eine Gruppe erfahrener Felskletterer im Lake District gewesen, aber hier war er eine Barriere, die wir mit unseren schwachen Kräften nicht überwinden konnten. Ich sah keine Möglichkeit, ihn an der steilen Felswand im Westen umzudrehen, aber zum Glück gab es noch eine andere Möglichkeit, ihn zu bewältigen. An der Ostseite befand sich eine weitere große Wächte, und über die gesamte Länge der Stufe verlief ein schmaler Spalt zwischen der Wächte und dem Felsen. Während Tenzing mich so gut wie möglich sicherte, quetschte ich mich in diesen Riss, trat mit den Steigeisen nach hinten und versenkte die Zacken tief in den gefrorenen Schnee hinter mir, um mich vom Boden abzuheben. Ich nutzte jeden noch so kleinen Halt im Fels und die ganze Kraft meiner Knie, Schultern und Arme, die ich aufbringen konnte, und kletterte buchstäblich rückwärts den Riss hinauf, wobei ich inständig darum betete, dass das Gesims am Felsen haften bleiben möge.\" - Edmund Hillary"
 douglas.226.i: "Das ist völlig hoffnungslos!"
 douglas.227.t: "Wetterwechsel"
 douglas.227.d: "Ein Wetterumschwung in den Bergen von [SCOPE.sState('douglas_location_scope').GetName] stellt Bergsteiger vor ein lebensbedrohliches Problem. Es besteht zwar noch die Möglichkeit, einen geschützteren Ort in größerer Höhe zu erreichen, aber das ist ein gefährliches Unterfangen. Die Bergsteiger würden im Basislager einen sicheren Unterschlupf finden - aber das würde die Fortschritte der letzten Tage, wenn nicht Wochen zunichte machen."
 douglas.227.f: "Wetterumschwünge in den Bergen können zu den bedrohlichsten Ereignissen gehören, die auf einer Bergtour passieren können. Das gilt für Regen, Sturm und Schnee. Gerade in den höchsten Lagen kann ein plötzlicher Schneefall dazu führen, dass ein Gipfelversuch abgebrochen werden muss, weil die unberechenbaren Elemente in einer Tragödie enden können."
 douglas.227.g: "Das kann einen Kletterer nicht erschüttern."
 douglas.227.h: "Zurück zum letzten Lager!"
 douglas.228.t: "Felssturz!"
 douglas.228.d: "Ein plötzlicher Erdrutsch hat das Lager heimgesucht. Mehrere Bergsteiger sind verletzt und wichtige Ausrüstung ist verloren gegangen!"
 douglas.228.f: "Es begann mit einem scharfen Knacken, dann mit einem Brüllen. Der Hang oberhalb des Biwaks gab nach wie eine schlummernde Bestie. Felsen, Staub und Geröll stürzten in einer furchtbaren Kaskade herab. Ein Träger wurde von einem Stein getroffen, ein Seil wurde zerrissen und eine Kiste mit Vorräten zersplitterte. Diejenigen, die sich in Sicherheit bringen konnten, starren nun schweigend auf die Trümmer. Keiner spricht es laut aus, aber alle wissen: Das hätte tragisch enden können. Der Weg schien sicher zu sein - aber der Berg ist kein Freund."
 douglas.228.g: "Sichern Sie das Lager und versorgen Sie die Verwundeten."
 douglas.229.t: "Schwindelerregende Höhen"
 douglas.229.d: "Je näher der Gipfel rückt, desto mehr fordern die dünne Luft und die ausgesetzten Grate ihren Tribut von den Bergsteigern."
 douglas.229.f: "Der Himmel ist selbst zur Mittagszeit dunkel, die Luft hauchdünn. Jeder Schritt fühlt sich an, als würde man einen Felsbrocken hochheben. Der Atem kommt in kurzen, flachen Stößen, und der Wind scheint die Seele direkt aus der Lunge zu ziehen. Manche starren zu lange in den Abgrund unter ihnen, und ihre Knie beginnen zu zittern. Andere haben Halluzinationen: Stimmen im Eis, Schatten im Schnee. Der Berg kennt hier keine Gnade - nur Höhe, Wind und Stille. In dieser Höhe beginnt sogar der Mut zu erfrieren."
 douglas.229.g: "Nach vorne drücken, Köpfe nach unten."
 douglas.229.h: "Zeit für eine Pause."
 douglas.230.t: "Den Fels lesen"
 douglas.230.d: "Unser geologischer Assistent hat das Gelände im Detail analysiert und versteckte Risiken erkannt, bevor sie tödlich werden können."
 douglas.230.f: "Während die anderen die Seile auspackten und ihre Stiefel überprüften, untersuchte der Geologe den Stein. Schicht für Schicht, Maserung für Maserung bemerkte der Assistent von Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] winzige Brüche, subtile Farbverschiebungen, den Winkel der Sedimentbänder. Dieser Hang ist instabil\", murmelte er und deutete auf einen scheinbar sicheren Weg. Und er hatte Recht. Ein kleineres Erkundungsteam bestätigte die Anzeichen eines früheren Abrutschens. Dank seiner ruhigen Präzision konnte die Route rechtzeitig geändert werden - und vielleicht sogar Leben gerettet werden. Der Berg mag riesig sein, aber wer genau hinschaut, kann seine Muster erkennen."
 douglas.230.g: "Vertrauen in die Wissenschaft."
 douglas.231.t: "Bergwissenschaft"
 douglas.231.d: "Die ungewohnten Höhen des #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! bieten dem geologischen Assistenten eine ganze Reihe neuer Erkenntnisse, die er während der Bergtour sammelt und aufschreibt."
 douglas.231.f: "Wissenschaftler hatten in der Anfangsphase von Bergexpeditionen oft die ungewöhnliche Flora und Fauna des Gebiets untersucht. Geologische Untersuchungen waren von besonderem Interesse - nicht nur aus allgemeinen wissenschaftlichen Gründen, sondern oft auch, um zukünftige Besteigungen zu vereinfachen."
 douglas.231.g: "Für die Wissenschaft!"
 douglas.232.t: "Ein edles Mineral"
 douglas.232.d: "Die Bergsteigergruppe beklagte sich bereits über die Trödelei des Geologen, der als Wissenschaftler eher eine Last als eine Hilfe war; doch wie sich herausstellte, entdeckte er bei der Besteigung des Gipfels ein seltenes Material."
 douglas.232.f: "Die Männer hatten eine Stunde lang auf den Akademiker gewartet, der irgendwo an einem Hang stehen geblieben war und plötzlich sein Werkzeug zückte. Zunächst kopfschüttelnd, hatten sie beschlossen, das Unangenehme mit dem Nützlichen zu verbinden und das Essen vorzuziehen, um nicht unnötig Zeit zu verlieren. Der Assistent von Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] hatte jedoch nicht die Absicht, zu essen oder zu kommen. Als [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] drohte, die Expedition ohne den Geologen fortzusetzen, stieß dieser plötzlich wieder zu der Gruppe - mit einem funkelnden Stein in der Hand."
 douglas.232.g: "Was für eine schöne kleine Überraschung."
 douglas.233.t: "Ein verlorenes Tier"
 douglas.233.d: "Auf der unteren Ebene des Himalaya hat unser Naturforscher [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] eine seltsame Entdeckung gemacht: Ein einzelnes, verlassenes Tier streift dort umher, geplagt von Hunger und Kälte."
 douglas.233.f: "Es war ein seltsamer Anblick für [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName], ein so kleines, zartes Geschöpf, das sonst in den Bambuswäldern Nepals leben sollte, in dieser verlassenen Einöde zu finden. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] kannte Illustrationen aus Büchern und wusste, dass in den nächstgelegenen Wäldern Einheimische lebten; aber wie konnte ein einzelnes Tier hierher kommen? Über diese Entfernung? Ohne Nahrung? Es blieb ein Rätsel. Hatte der kleine rote Panda auch das Bergsteigerfieber gepackt? Oder war er vor Raubtieren geflohen? Wie dem auch sei, der Bergsteiger kümmert sich um das erschöpfte Tier und pflegt es wieder gesund. Es wird vereinbart, dass ein Forschungsassistent den Roten Panda ins Basislager bringt - und ihn von dort aus für die Reise in den örtlichen Zoo vorbereitet."
 douglas.233.g: "Ist dies das legendäre 43. Tier?"
