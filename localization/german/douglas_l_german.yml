 douglas.104.t: "Der Berg im Inneren" #deepl:2079471330
 douglas.104.d: "Nach fünf zermürbenden Jahren des Kletterns und der Ausbildung kehrt [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] zurück." #deepl:862787273
 douglas.104.f: "Der Berg hat keine Stimme, aber er lehrt. In fünf langen Jahren hat unser Bergsteiger Schneeblindheit, brüchige Felswände, beißenden Wind und eine Stille erlebt, die tiefer schneidet als jede Klinge. Doch jede Härte hat Wissen in Muskeln und Geduld in Atem verwandelt. Was als Ehrgeiz begann, hat sich zu Können gemildert. Der Kletterer hat gelernt, auf den Stein zu hören, Stürme durch Geruch vorherzusagen, Knoten mit geschlossenen Augen und ruhigem Herzen zu knüpfen. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] kehrt verwandelt zurück. Dies ist der Beginn der Meisterschaft." #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] bezwingt nicht mehr den Berg -[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] versteht ihn" #deepl:2453485277

