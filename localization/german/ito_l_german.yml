l_german:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat keine aktive [concept_dubois_botanical_expedition] oder #V wählt gerade aus, wohin sie eine senden wollen#!.#!"
 je_ito_botanical_expedition: "Botanische Expedition"
 je_ito_botanical_expedition_reason: "Ihr [concept_dubois_naturalist] befindet sich derzeit auf einer [concept_dubois_botanical_expedition], um neue [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] zu sammeln.\n$mr_divider_for_je$\nDie Expedition wird jeden Monat [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] erbringen und hat die Chance auf Ereignisse, die zusätzliche [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] oder sogar spezielle Pflanzen hinzufügen.\n$mr_divider_for_je$\nAktueller Ertrag der Expedition: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\nGeschätzter monatlicher Ertrag: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "Der Fortschrittsbalken hat #V 24#! erreicht."
 ito_botanical_expedition_progress_bar: "Expeditionsfortschritt"
 ito_botanical_expedition_progress_bar_desc: "Expeditionsfortschritt: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/24)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "Monatlicher Fortschritt"
 ito_naturalist_is_dead_tt: "#default_text Sie haben keinen [concept_dubois_naturalist]."
 dubois.390.t: "Botanische Expedition kehrt zurück"
 dubois.390.d: "Unsere [concept_dubois_botanical_expedition] unter der Leitung von [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] ist zurück. Sie haben insgesamt @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] gesammelt"
 dubois.390.f: "\"Ich habe hier eine faszinierende Pflanze gefunden, die noch niemand beansprucht hat! Ich werde sie [SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]a nennen!\""
 dubois.390.g: "Willkommen zurück!"
 ito_total_specimen_collected_on_expedition_tt: "Insgesamt wurden @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] auf dieser [concept_dubois_botanical_expedition] gesammelt."
 ito_state_trait_medicinal_plant_aloe_vera: "Aloe Vera"
 ito_state_trait_medicinal_plant_atropa_belladonna: "Atropa Bella-Donna"
 ito_state_trait_medicinal_plant_carapichae_ipecacuanha: "Carapichae Ipecacuanha"
 ito_state_trait_medicinal_plant_cinchona_pubescens: "Cinchona Pubescens"
 ito_state_trait_medicinal_plant_digitalis_purpurea: "Digitalis Purpurea"
 ito_state_trait_medicinal_plant_ephedra_sinica: "Ephedra Sinica"
 ito_state_trait_medicinal_plant_pilocarpus_pennatifolius: "Pilocarpus Pennatifolius"
 ito_state_trait_medicinal_plant_strophanthus_gratus: "Strophantus Gratus"
 ito_state_trait_medicinal_plant_strychnos_nuxvomica: "Strychnos Nux-Vomica"
 ito_state_trait_medicinal_plant_thymus_vulgaris: "Thymus Vulgaris"
 dubois_botany_sickness_modifier: "Pflanzenkrankheit"
 je_ito_specimen_collection: "Exemplare sammeln"
 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')]\nEin [concept_dubois_naturalist], der nicht beschäftigt ist, wird nach [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]n in Ihrem Land suchen. Solange kein anderes Projekt aktiv ist, werden Sie passiv einige Exemplare erhalten.\n$mr_divider_for_je$\nDie geschätzte Ausbeute beträgt derzeit @dubois_specimen! [ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_specimen_collection_active_loc: "#p Dieses Projekt ist derzeit aktiv.#!\n$mr_divider_for_je$\n"
 je_ito_specimen_collection_inactive_loc: "#n Dieses Projekt ist derzeit inaktiv.#!.\n$mr_divider_for_je$\n"