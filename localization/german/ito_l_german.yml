l_german:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetAltName('NOM')] hat keine aktive [concept_dubois_botanical_expedition].#!"
 je_ito_botanical_expedition: "Botanische Expedition"
 je_ito_botanical_expedition_reason: "Ihr [concept_dubois_naturalist] befindet sich derzeit auf einer [concept_dubois_botanical_expedition], um [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] und neue [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] zu sammeln.\n$mr_divider_for_je$\nJeden Monat macht die Expedition Fortschritte beim Sammeln von [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]. Während einer botanischen Expedition können maximal 10 [concept_ito_medicinal_plants] gesammelt werden\n\nZusätzlich bringt die Expedition jeden Monat [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] ein und es besteht die Chance auf Ereignisse, die zusätzliche [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] oder sogar besondere Pflanzen hinzufügen.\n$mr_divider_for_je$\nAktueller Ertrag der Expedition: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\nGeschätzter monatlicher Ertrag: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "Der Balken $ito_botanical_expedition_progress_bar$ hat #V 12#! erreicht."
 ito_botanical_expedition_progress_bar: "Expeditionsfortschritt"
 ito_botanical_expedition_progress_bar_desc: "Expeditionsfortschritt: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/12)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "Monatlicher Fortschritt"
 ito_naturalist_is_dead_tt: "#default_text Sie haben keinen [concept_dubois_naturalist]."
 dubois.390.t: "Botanische Expedition kehrt zurück"
 dubois.390.d: "Unsere [concept_dubois_botanical_expedition] unter der Leitung von [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] ist zurückgekehrt. Insgesamt haben sie [SCOPE.GetValue('medicinal_herbs_scope_value')|0+] [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] und @dubois_specimen! gesammelt [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*0+] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 dubois.390.f: "\"Ich habe hier eine faszinierende Pflanze gefunden, die noch niemand beansprucht hat! Ich werde sie [SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]a nennen!\""
 dubois.390.g: "Willkommen zurück!"
 ito_total_specimen_collected_on_expedition_tt: "Insgesamt wurden @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] auf dieser [concept_dubois_botanical_expedition] gesammelt."
