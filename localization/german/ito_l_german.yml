 ito_state_trait_madagascar_forest: "Madagaskar-Regenwald"
 je_ito_improve_forestry_project: "Forstwirtschaft verbessern"
 je_ito_improve_forestry_project_reason: "Ihr [concept_dubois_naturalist] Dr. [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] konzentriert sich auf die Verbesserung der Produktion des [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nDas Projekt wird jeden Monat Fortschritte machen. Jedes Mal, wenn der Fortschritt 24 erreicht, erhält das aktuelle Gebäude einen neuen Modifikator. Sobald alle für dieses Projekt ausgewählten Gebäude die Modifikatoren haben, endet das Projekt.\nEs gibt insgesamt 3 Modifikatoren. Jeder neue Modifikator erfordert, dass der Fortschritt erneut aufgefüllt wird.\nSobald ein [GetBuildingType('building_logging_camp').GetName] alle Modifikatoren hat, erhalten Sie außerdem #p 500#! @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')].\n$mr_divider_for_je$\nAktuelles Gebäude: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_3_type')]\n\nGesamtzahl der verbleibenden Gebäude (ohne aktuelles): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n$concept_dubois_specimens$ aus Projekt: [JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0] @dubois_specimen!\n\nAktueller monatlicher Fortschritt: #underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('ito_naturalist_improvement_project_progress_value')|+2]#!#!"
