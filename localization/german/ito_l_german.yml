 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')]\nEin [concept_dubois_naturalist], der nicht beschäftigt ist, wird nach [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]n in Ihrem Land suchen. Solange kein anderes Projekt aktiv ist, werden Sie passiv einige Exemplare erhalten.\n$mr_divider_for_je$\nDie geschätzte Ausbeute beträgt derzeit @dubois_specimen! [ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
