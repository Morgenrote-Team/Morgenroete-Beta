 khaldun.101.t: "Al-Qarawiyyin: Zentrum des Lernens"
 khaldun.101.d: "Vor Jahrhunderten war Al-Qarawiyyin ein Zentrum der Wissenschaft und des Lernens. Jetzt hat sie ihren Platz als eine der wichtigsten Universitäten der Welt wieder eingenommen."
 khaldun.101.f: "\"Al-Qarawiyyin ist schon länger eine Universität als alle Universitäten in Europa. Sie hat viele Bücher beherbergt, ist aber leider im Niedergang begriffen. Heute ist der Tag, an dem diese Universität ihren rechtmäßigen Platz wieder einnimmt!\""
 khaldun.101.g: "Al-Qarawiyyin wird ein Leuchtturm des Lernens sein!"
 khaldun.101.h: "Al-Qarawiyyin wird ein Leuchtturm der Mathematik und Technik sein!"
 khaldun.101.i: "Al-Qarawiyyin wird ein Leuchtturm der Naturgeschichte sein!"
 khaldun.101.j: "Al-Qarawiyyin wird ein Leuchtturm der Geisteswissenschaften sein!"