 khaldun_reorganize_library_button_desc: "Die Bibliothek verfügt über viele alte Bände und Bücher, wurde aber im Laufe der Jahre vernachlässigt. Eine Neuordnung der Werke ist dringend erforderlich."
 khaldun_accquire_modern_books_button: "Erwerben Sie moderne Bücher"
 khaldun_accquire_modern_books_button_desc: "Es gibt Länder, die uns wissenschaftlich weit voraus sind. Wir sollten versuchen, einige ihrer Bücher zu erwerben, damit unsere Bibliothek wieder zu einer Quelle des Wissens wird."
