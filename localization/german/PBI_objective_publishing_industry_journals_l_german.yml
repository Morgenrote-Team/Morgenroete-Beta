 pbi_je_objective_from_the_battlefield_reason: "\"Um 11:35 Uhr blieb kein einziger britischer Soldat außer den Toten und Sterbenden vor diesen blutigen Moskauer Waffen zurück …\"\nWilliam Howard Russell (Der Angriff der Leichten Brigade)"
