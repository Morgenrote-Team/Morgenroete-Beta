 pbi_je_objective_bestseller: "Ein beliebter Zeitungsroman"
 pbi_je_objective_bestseller_reason: "\"Wie allgemein bekannt ist, lässt spekulatives Handeln den spirituellen Wert der verkauften Waren kaum oder gar nicht außer Acht. Solange sich die Ware gut verkauft und das Geschäft gut läuft, spielt es keine Rolle, ob die öffentliche Gesundheit dadurch gestärkt oder beeinträchtigt wird. Von Natur aus ist die Spekulation blind und unsensibel, sie verkauft Opium an die Chinesen und Romane an die Franzosen.\"\nMitglied der französischen Abgeordnetenkammer"
 pbi_je_objective_bestseller_flag_character_in_writing: "Es ist ein [concept_character] [THIS.GetCountry.GetAltName('IN')] vorhanden, der einen Fortsetzungsroman schreibt"
