l_german:
 athletes.2.t: "Unser Bergsteiger, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], geht in den Ruhestand"
 athletes.2.d: "Nach dem [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe] Jahrzehnte lang Gipfel bestiegen, unbekannte Routen kartiert und Expeditionen durch gefährliches Gelände angeführt hat, hat [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] beschlossen in den Ruhestand zu gehen. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] wird nicht länger als unser [concept_douglas_mountaineer] arbeiten."
 athletes.2.f: ""
 athletes.2.g: "Der Gipfel war nie das Ende - es war nur die Aussicht vor dem Abstieg."
 athletes.12.t: "Unser Bergsteiger stirbt"
 athletes.12.d: "Nach einem Leben, das damit verbracht wurde, Gipfel zu bezwingen und andere durch die gefährlichsten Anstiege zu führen, ist unser verehrter [concept_douglas_mountaineer] verstorben. Wer wird jetzt den Weg in die Wolken führen?"
 athletes.12.f: ""
 athletes.12.g: "Das Seil mag gehen, aber ihre Spur bleibt."
 athletes.52.t: "Ein neuer Bergsteiger"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] ist ein vielversprechender talentierter Bergsteiger der eines Tages zu den Größten gehören könnten, die unsere Gipfel erklimmen."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] klettert mit Bestimmung."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ist nun ein Bergsteiger-Veteran!"
 athletes.102.d: "Nachdem [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] Gletschern getrotzt, Bergkämme überquert und Expeditionen ins Unbekannte geleitet wurden, ist unser [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] nun berühmt genug, um als Bergsteiger-Veteran bezeichnet zu werden!"
 athletes.102.f: ""
 athletes.102.g: "Ein Meister der Berge!"
 athletes.53.t: "Ein neuer Coach"
 athletes.53.d: "Ein neuer [concept_vikelas_coach] hat sich vorgestellt. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] Name ist [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]."
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] wird unsere Jungs zum Sieg führen."
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] ist jetzt ein Senior Coach!"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] hat sich durch das Training und die Entwicklung einer ganzen Generation von Spielern einen Namen gemacht. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe|U] ist jetzt berühmt genug, um als Senior Coach zu gelten!"
 athletes.103.f: ""
 athletes.103.g: "Eine Auszeichnung für die Fähigkeit, auf dem Spielfeld schamlos zu schreien."
 curtiss_pilot_will_become_part_of_academia_tt: "[SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] wird dem [Concept('concept_character', '$NATIONAL_CAST$')] von [SCOPE.GetRootScope.GetCountry.GetName] hinzugefügt."