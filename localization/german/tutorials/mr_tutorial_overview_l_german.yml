l_german:
 thriving_culture_lesson_start_tutorial_button_loc: "Tutorial starten"
 mr_tutorial_buttons: "Morgenröte Schaltflächen"
 mr_tutorial_buttons_desc: "Die meisten Dinge in Morgenröte sind in den Morgenröte-Fenstern zu finden. Sie können Sie durch Anklicken der Schaltflächen in der Seitenleiste aufrufen. Derzeit gibt es diese Fenster:\n\n\n- #V Wissenschaftsfenster#!: Hier finden Sie Ihre [Concept('concept_academics_academic','$concept_academics_academics$')], Ihre Aktivitäten, Ihren [concept_academics_progress] und wissenschaftlichen Expeditionen.\n\n- #V Kunstfenster#!: Hier finden Sie Ihre [Concept('concept_artists_artist','$concept_artists_artists$')], Ihre Aktivitäten, Ihren [concept_artistic_progress] und [Concept('concept_artists_art_style','$concept_artists_art_styles$')]. \n\n- #V Sportfenster#!: Hier finden Sie verschiedene Sportarten und Personen, die mit Sport und Luftfahrt zu tun haben, sowie deren Aktivitäten und internationale Sportorganisationen."
 mr_tutorial_science_window_open: "Öffnen Sie das Fenster Wissenschaft"
 mr_tutorial_science_window_open_desc: "Nun werden wir uns das Wissenschaftsfenster genauer ansehen. Öffnen Sie das Wissenschaftsfenster, indem Sie auf die Schaltfläche klicken oder die Taste \"M\" auf Ihrer Tastatur drücken."
 mr_tutorial_science_window_open_tt: "Öffnen Sie das Wissenschaftsfenster, indem Sie auf die Schaltfläche \"Wissenschaft\" klicken oder die Taste \"M\" drücken."
 mr_tutorial_science_tab: "Das Wissenschaftsfenster"
 mr_tutorial_science_tab_desc: "Das Wissenschaftsfenster ist der Ort, an dem Sie Informationen und Aktionen für Ihre wissenschaftlichen Unternehmungen finden.\n\n\nEs ist in 4 Reiter unterteilt:\n\n- #V Übersicht#! Dieser Reiter enthält den [concept_academics_progress], #V Allgemeine wissenschaftliche Expeditionen#! und den #V Wissenschaftlilchen Fokus#!\n\n- #V Mathematisch-Technisch#!: Dieser Reiter enthält den [concept_tesla_engineer], [concept_mendelejew_chemist] und [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]\n\n- [concept_dubois_natural_history]: Dieser Reiter enthält den [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] und [concept_dubois_naturalist]\n\n- #V Humanwissenschaftlich-Anthropologisch#!: Diesr Reiter enthält die [concept_panum_physician], [concept_lepsius_archaeologist] und [concept_lepsius_anthropologist]"
 mr_tutorial_science_tab_tt: "Das Wissenschaftsfenster wird geöffnet"
 mr_tutorial_science_overview_tab_open: "Öffnen Sie den Übersichts-Reiter"
 mr_tutorial_science_overview_tab_open_desc: "Über den Übersichts-Reiter haben Sie Zugriff auf [concept_academics_progress], #V Allgemeine wissenschaftliche Expeditionen#! und #V Wissenschaftlicher Fokus#!\n\nKlicken Sie auf den Übersichts-Reiter, indem Sie auf die Schaltfläche \"Register\" klicken."
 mr_tutorial_science_overview_tab_open_tt: "Wechseln Sie zum Übersichts-Reiter, indem Sie auf die entsprechende Schaltfläche klicken."
 mr_tutorial_science_overview_tab_promote_academics: "Förderung von Akademikern"
 mr_tutorial_science_overview_tab_promote_academics_desc: "Das Herzstück von Morgenröte sind die Charaktere. Aber wie bekommt man diese Charaktere?\n\nUm einen neuen [concept_academics_academic] zu bekommen, muss man genug [concept_academics_progress] sammeln. Sie können mit dem Mauszeiger über den Fortschrittsbalken fahren, um zu sehen, welche Faktoren den Fortschrittsgewinn beeinflussen.\n\nSie können einen bestimmten Akademiker fördern, wenn sie eine Universität mit einer [concept_academics_university_specialization] haben.\n\nSie können auch Geld investieren, um den akademischen Fortschritt schneller zu erreichen.\n\n\nAlternativ können Sie Akademiker durch Ereignisse oder durch den Kauf eines Akademikers mit einer diplomatischen Aktion bekommen, wenn du eine Nation bist, die nicht zu den wissenschaftlich fortschrittlichsten Ländern gehört."
 mr_tutorial_science_overview_tab_scientific_focus: "Wissenschaftlicher Fokus"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Manchmal möchten Sie sich vielleicht auf eine bestimmte Art von Forschung konzentrieren. Sie können die wissenschaftlichen Schwerpunkte nutzen, wenn Sie deren Anforderungen erfüllen. Sie werden grundsätzlich die Forschung bestimmter Technologiegruppen fördern und die Effizienz anderer verringern."
 mr_tutorial_science_overview_tab_scientific_expedition: "Wissenschaftliche Expeditionen"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Wissenschaftliche Expeditionen sind Expeditionen, die ihr Land starten kann. Je nach Art der Expedition kann dies zu einem großen Segen für Ihr Land führen.\n\nZurzeit gibt es diese Expeditionen:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Expedition\n- Expedition zur Entdeckung der Nordwestpassage\n- Zeppelin-Expedition\n- Expedition zur Verlegung eines Transatlantikkabels"
 mr_tutorial_science_natural_history_tab_open: "Öffnen Sie den Reiter Naturgeschichte"
 mr_tutorial_science_natural_history_tab_open_desc: "Werfen wir nun einen Blick auf eine der [Concept('concept_academics_academic','$concept_academics_academics$')]. Öffnen Sie den Reiter Naturgeschichte, um fortzufahren."
 mr_tutorial_science_natural_history_tab_open_tt: "Wechseln Sie zum Reiter Naturgeschichte, indem Sie auf die entsprechende Schaltfläche klicken."
 mr_tutorial_science_natural_history_tab_character: "Akademiker"
 mr_tutorial_science_natural_history_tab_character_desc: "Das Herzstück von Morgenröte sind seine Charaktere. In dem Reiter Wissenschaft sind die Charaktere die [Concept('concept_academics_academic','$concept_academics_academics$')] sind.\n\nAuf der linken Seite jeder neuen Charakterrolle können Sie ein Porträt Ihres Akademikers und zusätzliche Informationen über ihn sehen."
 mr_tutorial_science_natural_history_tab_character_rating: "Charakter Bewertung"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Bei den meisten Charakteren finden Sie ein kleines Symbol neben ihrem Namen. Dieses Symbol zeigt ihre Eignung für ihre Rolle an. Sie können sehen, welche Faktoren diese Bewertung beeinflussen, indem Sie mit dem Mauszeiger über das Symbol fahren.\n\nErläuterung der Symbole:\n@mr_rating_fantastic! Perfekt\n@mr_rating_very_good! Sehr gut\n@mr_rating_good! Gut\n@mr_rating_mediocre! Mittelmäßig\n@mr_rating_bad! Schlecht\n@mr_rating_very_bad! Sehr schlecht"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Charakter-Erfahrung"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Jeder Charakter hat [concept_academics_experience] in seinem Fachgebiet. Je höher die Erfahrung, desto besser ist die Leistung des Charakters bei verschiedenen Aufgaben.\n\nErfahrung wird jedes Jahr passiv und aktiv durch das Erfüllen von Aufgaben und Erfolgen gesammelt. [Concept('concept_academics_academic','$concept_academics_academics$')] erhalten bessere Eigenschaften, wenn sie 100 (erfahren) und 300 (berühmt) Erfahrung erreichen."
 mr_tutorial_science_natural_history_tab_character_achievements: "Errungenschaften des Charakters"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] vollbringen manchmal beeindruckende Taten. Sie können jederzeit überprüfen, was Ihr Akademiker bisher erreicht hat, indem Sie den Mauszeiger über dieses Symbol bewegen."
 mr_tutorial_science_natural_history_tab_currencies: "Entdeckungen und Werte"
 mr_tutorial_science_natural_history_tab_currencies_desc: "Den meisten Zeichen in Morgenröte sind Werte zugeordnet. Diese Werte werden in der Mitte eines jeden Akademikers angezeigt. Bei Geologie siehst du zum Beispiel, wie viele Mineralien gefunden wurden oder wie viel geologisches Wissen du hast.\n\nOft kannst du mehr über bestimmte Werte herausfinden, indem du mit dem Mauszeiger darüber fährst."
 mr_tutorial_science_natural_history_visit_button: "Besuchen-Schaltfläche"
 mr_tutorial_science_natural_history_visit_button_desc: "Die meisten [Concept('concept_academics_academic','$concept_academics_academics$')] haben spezielle Besuchsschaltflächen, über die Sie mehr über diese spezielle akademische Einrichtung erfahren können.\n\nDer [concept_dubois_naturalist] hat zum Beispiel einen Button zum Besuch des Zoos, wo Sie mehr über Ihre Zootiere erfahren können."
 mr_tutorial_science_natural_history_ranking: "Rangliste"
 mr_tutorial_science_natural_history_ranking_desc: "Vielleicht vergleichen Sie sich gerne mit anderen Ländern. In diesem Fall könnte die Rangliste für Sie interessant sein. Wenn Sie über dieses Symbol fahren, können Sie verschiedene Listen ansehen, die Ihnen zeigen, wie gut Sie in einem bestimmten Aspekt von Morgenröte im Vergleich zu anderen Nationen abschneiden.\n\nDer [concept_agassiz_geologist] ermöglicht Ihnen zum Beispiel einen Vergleich Ihrer geologischen Punktzahl, Ihres geologischen Wissens, Ihres ozeanischen Wissens, Ihres Mineralien und seltenen Mineralien."
 mr_tutorial_science_natural_history_project_buttons: "Projekt-Schaltflächen und andere Schaltflächen"
 mr_tutorial_science_natural_history_project_buttons_desc: "Dieser Teil der Benutzeroberfläche ist einer der wichtigsten Teile für Sie. Hier können Sie Ihre [Concept('concept_academics_academic','$concept_academics_academics$')] mit Projekten beauftragen und andere wichtige Interaktionen starten.\n\nEin [concept_agassiz_geologist] kann auf Expeditionen gehen, Ihre Industrien verbessern, das Alter der Erde neu berechnen und Sie können ein Mineralienkabinett gründen oder einen Kongress zur Kontinentaldrift starten."
 mr_tutorial_science_natural_history_view_switch_buttons: "Ändern Sie das Layout"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Wenn Sie ein dichteres Interfacedesign bevorzugen, können Sie mit dieser Schaltfläche das Aussehen ändern. Für das Spiel selbst ist es unerheblich, welche Variante Sie verwenden. Wählen Sie also die Variante, die Ihnen besser gefällt."
 mr_start_culture_tutorial_button_loc: "Kultur-Tutorial"
 mr_tutorial_not_yet_implemented_tt: "Dieses Tutorial ist noch nicht fertig."
 mr_tutorial_arts_window_open: "Öffne das Kunstfenster"
 mr_tutorial_arts_window_open_desc: "Nun werden wir uns das Kunstfenster genauer ansehen. Öffnen Sie das Kunstfenster, indem Sie auf die Schaltfläche klicken oder die Tasten \"Strg + A\" auf Ihrer Tastatur drücken."
 mr_tutorial_arts_window_open_tt: "Öffnen Sie das Fenster \"Kunst\", indem Sie auf die Schaltfläche \"Wissenschaft\" klicken oder die Tastenkombination \"Strg + A\" drücken."
 mr_tutorial_arts_tab: "Kunst-Reiter"
 mr_tutorial_arts_tab_desc: "Kunst war ein wichtiger Bestandteil des 19. und 20. Jahrhunderts. Große [Concept('concept_artists_artist','$concept_artists_artists$')] dieser Epoche sind noch heute bekannt.\n\nMorgenröte bietet verschiedene Arten von Künstlern und ihren Kunstwerken.\n\nDas Kunstfenster selbst hat zwei Reiter. Der eine zeigt Ihnen eine Übersicht über die Kunst in Ihrem Land, im anderen können Sie Ihre Künstler finden und Künstler aus anderen Ländern anwerben."
 mr_tutorial_arts_tab_cultural_tradition: "Kulturelle Tradition"
 mr_tutorial_arts_tab_cultural_tradition_desc: "Kulturelle Tradition ist ein Wert, der die kulturellen Errungenschaften Ihres Landes repräsentiert.\nEr besteht aus [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] und [concept_klimt_painting_tradition].\n\nKulturelle Tradition wird nach folgender Formel berechnet:\nMusikalische Tradition / 4 + Malerische Tradition / 3 + Literarische Tradition / 2\n\nSie erhalten zusätzliches [concept_prestige] durch Ihre künstlerischen Tradition. Alle 5 Punkte der künstlerischen Tradition bringen 1 zusätzliches Prestige."
 mr_tutorial_arts_overview_tab_open_tt: "Öffnen Sie den Kunstübersichts-Reiter"
 mr_tutorial_arts_tab_artist_progress: "Künstlerischer Fortschritt"
 mr_tutorial_arts_tab_artist_progress_desc: "Sie können neue [Concept('concept_artists_artist','$concept_artists_artists$')] auf verschiedene Weise erhalten: Sie können sie rekrutieren, durch Ereignisse erhalten oder durch das Sammeln von genügend [concept_artistic_progress].\n\nWährend Ereignisse und Rekrutierung nicht für jede Nation möglich sind, ist es möglich, Künstler durch das Füllen der Künsterlerischen-Fortschritts-Leiste zu erhalten, sobald sie ein $building_elgar_opera$ oder eine $building_art_academy$ besitzt.\nDie vollständige Liste der Faktoren, die den monatlichen Gewinn beeinflussen, können Sie sehen, wenn sie mit dem Mauszeiger über den Fortschrittsbalken fahren.\n\nZusätzlich können Sie die Künste mäzenatisch unterstützen, um mehr Fortschritt zu erhalten und bestimmte Künstler zu fördern, wenn Sie die notwendige [concept_production_method] in Ihrer $building_art_academy$ haben."
 mr_tutorial_arts_tab_center_of_arts: "Zentrum der Künste"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] sind die Orte, an denen ein [concept_artists_art_style] geboren wurde.\nEinige Zentren der Künste sind bei Spielbeginn bereits vorhanden. Andere können durch [Concept('concept_journal_entry','$concept_journal_entries$')] oder durch Drücken einer der Tasten, die du hier siehst, freigeschaltet werden. Bewegen Sie den Mauszeiger über das Zentrum der Künste, um zu sehen, wie Sie es erlangen können.\n\nZentren der Künste sind für Sie und Ihr Land offensichtlich nützlich, da sie Ihnen Zugang zu Boni verschaffen."
 mr_tutorial_arts_tab_artists_tab_open: "Öffnen Sie die Künstler-Reiter"
 mr_tutorial_arts_tab_artists_tab_open_desc: "Schauen wir uns nun das [Concept('concept_artists_artist','$concept_artists_artists$')] genauer an.\n\nÖffnen Sie den Künstler-Reiter, indem Sie auf die entsprechende Schaltfläche klicken."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Öffnen Sie die Künstler-Reiter"
 mr_tutorial_arts_tab_artists: "Künstler-Reiter"
 mr_tutorial_arts_tab_artists_desc: "Die [Concept('concept_artists_artist','$concept_artists_artists$')] sehen den Akademikern sehr ähnlich, funktionieren aber etwas anders.\n\nDerzeit gibt es 3 Künstler:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "Künstler einladen"
 mr_tutorial_arts_tab_artists_accquisation_desc: "Wie bereits erwähnt, kann man [Concept('concept_artists_artist','$concept_artists_artists$')] nicht nur werben, indem man genügend [concept_artistic_progress] sammelt, sondern auch, indem man sie einfach einlädt.\n\nJede Art von Künstler hat andere Anforderungen. Sie können [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] aus der ganzen Welt einladen, aber Ihr Land muss mit genügend $building_elgar_opera$ und einer ausreichend hohe [concept_elgar_musical_tradition] besitzen.\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] können nur eingeladen werden, wenn sie eine ähnliche Kultur haben. \n\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] hingegen können überhaupt nicht eingeladen werden."
 mr_tutorial_arts_tab_artists_character: "Allgemeine Informationen"
 mr_tutorial_arts_tab_artists_character_desc: "Der linke Teil des Fensters zeigt Ihnen einige grundlegende Informationen über Ihren Künstler an.\n\nHier sehen Sie:\n-Das Porträt\n-Der Name und die Bewertung\n-Die [concept_artists_experience]\n- Die [Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "Wichtige Werte der Kunst"
 mr_tutorial_arts_tab_artists_currencies_desc: "In diesem Teil der Benutzeroberfläche können Sie allgemeine Informationen zu diesem speziellen Aspekt der Kunst einsehen.\nFür den [Concept('concept_elgar_composer','$concept_elgar_composers$')] werden die [concept_elgar_musical_tradition], die Kompositionen und Meisterwerke Ihres Komponisten und eine Übersicht über die fünf besten Komponisten der Welt angezeigt.\n\nZusätzlich finden Sie eine Rangliste, wenn Sie den Mauszeiger über das kleine Symbol in der oberen rechten Ecke bewegen."
 mr_tutorial_arts_tab_artists_actions: "Künstler-Aktionen"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] haben auch Aktionen. Hier könnrn Sie sehen, woran Ihre Künstler arbeiten können oder welche Entscheidungen Sie mit Ihrer Nation treffen können.\n\nDas waren die wichtigsten Informationen zu den Künstlern. Sie können von hier aus mit dem Tutorial für Sport weitermachen oder Ihr Spiel fortsetzen."
 mr_start_sports_tutorial_button_loc: "Sport-Tutorial"
 mr_tutorial_sports_window_open: "Öffnen Sie das Sportfenster"
 mr_tutorial_sports_window_open_desc: "Nun werden wir uns das Sportfenster genauer ansehen. Öffnen Sie das Sportfenster, indem Sie auf die Schaltfläche klicken oder die Tasten \"Strg + S\" auf Ihrer Tastatur drücken."
 mr_tutorial_sports_window_open_tt: "Öffnen Sie das Sportfenster, indem Sie auf die Schaltfläche \"Wissenschaft\" klicken oder \"Strg + S\" drücken."
 mr_tutorial_sports_window: "Sportfenster"
 mr_tutorial_sports_window_desc: "Das Sport-Fenster ermöglicht den Zugriff auf alle verschiedenen Sportarten und Charaktere, die für die Sportarten relevant sind.\n\nDas Fenster ist in normale Sportarten und Aeronautik unterteilt.\n\nZu den normalen Sportarten gehören:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Ballsportarten\n- [concept_vikelas_car_racing]\n\nZur Aeronautik gehören:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "Sport-Reiter"
 mr_tutorial_sports_tab_desc: "Der Sport-Reiter gibt dir einen Überblick über verschiedene sportbezogene Aktivitäten und Charaktere.\nIm Gegensatz zu den Akademikern und Künstlern sind die Charaktere im Sport-Reiter oft nur Generäle oder Politiker."
 mr_tutorial_sports_tab_open_tt: "Öffnen Sie den Sport-Reiter"
 mr_tutorial_sports_tab_character_overview: "Charakter-Übersicht"
 mr_tutorial_sports_tab_character_overview_desc: "Dieser Teil der Benutzeroberfläche gibt dir einen Überblick über die [concept_character].\n\nEinige Charaktere wie der [concept_vikelas_coach] und der Rennfahrer sind Charaktere, die du bekommen kannst und daher [concept_academics_experience] haben. Andere wie der Bergsteigern haben keine Erfahrung."
 mr_tutorial_sports_tab_currencies: "Werte und Informationen"
 mr_tutorial_sports_tab_currencies_desc: "In der Mitte werden wichtige Informationen zu dieser Sportart angezeigt.\n\nDie [Concept('concept_vikelas_olympic_games','Olympischen Spiele')] bietet zum Beispiel einen Überblick über den Präsidenten und den Vorstand des [concept_vikelas_ioc], die Anzahl der Mitglieder und die Anzahl der bisher gesammelten Medaillen."
 mr_tutorial_sports_tab_actions: "Aktionen"
 mr_tutorial_sports_tab_actions_desc: "Auf der rechten Seite können Sie bestimmte Aktionen für diese Sportart auswählen.\nDiese Aktionen sind im Grunde Entscheidungen, die es Ihnen ermöglichen, Ihre [Concept('concept_character', '$concept_characters$')] zu nutzen oder etwas Neues wie das [concept_vikelas_ioc] einzurichten."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Reiter \"Luftfahrt\" öffnen"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Schauen wir uns nun den Reiter \"Luftfahrt\" genauer an. Öffnen Sie den Reiter, indem Sie auf die Schaltfläche klicken."
 mr_tutorial_aeronautics_tab_open_tt: "Öffnen Sie den Reiter \"Luftfahrt\""
 mr_tutorial_aeronautics_tab: "Luftfahrt-Reiter"
 mr_tutorial_aeronautics_tab_desc: "Der Reiter \"Luftfahrt\" sieht größtenteils genauso aus wie der Reiter \"Sport\".\n\nEin großer Unterschied liegt in den Charakteren selbst. Sie können einen [concept_curtiss_balloonist] sponsern und automatisieren und ein [concept_curtiss_pilot] wird unter verschiedenen Umständen auftauchen.\n\nDies ist das Ende des Übersichtstutorials. Bitte nutzen Sie die Vickypedia oder die von uns eingefügten Konzepte, wenn Sie mehr über die Charaktere von Morgenröte erfahren wollt."
 mr_tutorial_lesson_button_finish: "Tutorial beenden"
