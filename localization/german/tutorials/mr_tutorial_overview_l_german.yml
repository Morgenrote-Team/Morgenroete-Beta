l_german:

 thriving_culture_lesson_start_tutorial_button_loc: "Tutorial starten" #deepl:1296206908

 mr_tutorial_buttons: "Morgenröte Knöpfe" #deepl:3232304745
 mr_tutorial_buttons_desc: "Die meisten Dinge in Morgenröte sind in den Morgenröte-Fenstern zu finden. Du kannst sie durch Anklicken der Schaltflächen in der Seitenleiste aufrufen. Derzeit gibt es diese Fenster:\n\n\n- #V Wissenschaftsfenster#!: Hier findest du deine [Concept('concept_academics_academic','$concept_academics_academics$')], ihre Aktivitäten, deine [concept_academics_progress] und wissenschaftlichen Expeditionen.\n\n- #V Kunstfenster#!: Hier findest du dein [Concept('concept_artists_artist','$concept_artists_artists$')], ihre Aktivitäten, dein [concept_artistic_progress] und [Concept('concept_artists_art_style','$concept_artists_art_styles$')]. \n\n- #V Sportfenster#!: Hier finden Sie verschiedene Sportarten und Personen, die mit Sport und Luftfahrt zu tun haben, sowie deren Aktivitäten und internationale Sportorganisationen." #deepl:3017682288

 mr_tutorial_science_window_open: "Öffnen Sie das Fenster Wissenschaft" #deepl:734722697
 mr_tutorial_science_window_open_desc: "Nun werden wir uns das Wissenschaftsfenster genauer ansehen. Öffnen Sie das Wissenschaftsfenster, indem Sie auf die Schaltfläche klicken oder die Taste \"M\" auf Ihrer Tastatur drücken." #deepl:1849505402
 mr_tutorial_science_window_open_tt: "Öffnen Sie das Wissenschaftsfenster, indem Sie auf die Schaltfläche "Wissenschaft" klicken oder die Taste \"M\" drücken." #deepl:1188172678

 mr_tutorial_science_tab: "Das Wissenschaftsfenster" #deepl:1054166281
 mr_tutorial_science_tab_desc: "Das Wissenschaftsfenster ist der Ort, an dem Sie Informationen und Aktionen für Ihre wissenschaftlichen Unternehmungen finden.\n\n\n Es ist in 4 Registerkarten unterteilt:\n\n- #V Übersicht#!: Diese Registerkarte enthält [concept_academics_progress], #V Allgemeine wissenschaftliche Expeditionen#! und die #V Wissenschaftliche Schwerpunkte#!\n\n- #V Mathematisch-Technische#!: Diese Registerkarte enthält die [concept_gaudi_engineer], [concept_mendelejew_chemist] und [concept_verrier_astronomer]\n\n- #V Geisteswissenschaften-Anthropologische#!: Diese Registerkarte enthält die Seiten [concept_panum_physician], [concept_lepsius_archaeologist] und [concept_lepsius_anthropologist]\n\n- [concept_dubois_natural_history]: Diese Registerkarte enthält die Seiten [concept_agassiz_geologist], [concept_dubois_paleontologist] und [concept_dubois_naturalist]\n\n- #V Geisteswissenschaftlich-anthropologische#!: Diese Registerkarte enthält die Seiten [concept_panum_physician], [concept_lepsius_archaeologist] und [concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "Das Wissenschaftsfenster wird geöffnet" #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "Öffnen Sie die Registerkarte Übersicht" #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "Über die Registerkarte "Übersicht" haben Sie Zugriff auf [concept_academics_progress], #V Allgemeine wissenschaftliche Expeditionen#! und #V Wissenschaftlicher Schwerpunkt#!\n\nKlicken Sie auf die Registerkarte "Übersicht", indem Sie auf die Schaltfläche "Register" klicken." #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "Wechseln Sie zur Registerkarte Übersicht, indem Sie auf die Schaltfläche Registerkarte klicken." #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "Förderung von Akademikern" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "Das Herzstück von Morgenröte sind die Charaktere. Aber wie bekommt man diese Charaktere?\n\nUm einen neuen [concept_academics_academic] zu bekommen, muss man genug [concept_academics_progress] sammeln. Du kannst mit dem Mauszeiger über den Fortschrittsbalken fahren, um zu sehen, welche Faktoren den Fortschrittsgewinn beeinflussen.\n\nDu kannst einen bestimmten Akademiker fördern, wenn du eine Universität mit einer [concept_academics_university_specialization] hast. \n\nDu kannst auch Geld investieren, um den akademischen Fortschritt schneller zu erreichen.\n\n\nAlternativ kannst du Akademiker durch Ereignisse oder durch den Kauf eines Akademikers mit einer diplomatischen Aktion bekommen, wenn du eine Nation bist, die nicht zu den wissenschaftlich fortschrittlichsten Ländern gehört." #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "Wissenschaftlicher Schwerpunkt" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Manchmal möchten Sie sich vielleicht auf eine bestimmte Art von Forschung konzentrieren. Sie können die wissenschaftlichen Schwerpunkte nutzen, wenn Sie deren Anforderungen erfüllen. Sie werden grundsätzlich die Forschung bestimmter Technologiegruppen fördern und die Effizienz anderer verringern." #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "Wissenschaftliche Expeditionen" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Wissenschaftliche Expeditionen sind Expeditionen, die dein Land starten kann. Je nach Art der Expedition kann dies zu einem großen Segen für Ihr Land führen.\n\nZurzeit gibt es diese Expeditionen:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Expedition\n- Expedition zur Entdeckung der Nordwestpassage\n- Zeppelin-Expedition\n- Expedition zur Verlegung eines Transatlantikkabels" #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "Öffnen Sie die Registerkarte Naturgeschichte" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "Werfen wir nun einen Blick auf eine der [Concept('concept_academics_academic','$concept_academics_academics$')]. Öffnen Sie die Registerkarte Naturgeschichte, um fortzufahren." #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "Wechseln Sie zur Registerkarte Naturgeschichte, indem Sie auf die Schaltfläche Registerkarte klicken." #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "Akademiker" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "Das Herzstück von Morgenröte sind seine Charaktere. In der Registerkarte Wissenschaft sind diese Charaktere die [Concept('concept_academics_academic','$concept_academics_academics$')]. Auf der linken Seite jeder neuen Charakterrolle kannst du ein Porträt deines Akademikers und zusätzliche Informationen über ihn sehen." #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "Charakter Bewertung" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Bei den meisten Charakteren finden Sie ein kleines Symbol neben ihrem Namen. Dieses Symbol zeigt ihre Eignung für ihre Rolle an. Du kannst sehen, welche Faktoren diese Bewertung beeinflussen, indem du mit dem Mauszeiger über das Symbol fährst.\n\nErläuterung der Symbole:\n@mr_rating_fantastic!  Perfekt\n@mr_rating_very_good!  Sehr gut\n@mr_rating_good!  Gut\n@mr_rating_mediocre!  Mittelmäßig\n@mr_rating_schlecht!  Schlecht\n@mr_rating_sehr_schlecht!  Sehr schlecht" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "Charakter-Erfahrung" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Jeder Charakter hat [concept_academics_experience] in seinem Fachgebiet. Je höher die Erfahrung, desto besser ist die Leistung des Charakters bei verschiedenen Aufgaben.\n\nErfahrung wird jedes Jahr passiv und aktiv durch das Erfüllen von Aufgaben und Erfolgen gesammelt. [Concept('concept_academics_academic','$concept_academics_academics$')] erhält höhere Eigenschaften, wenn sie 100 (erfahren) und 300 (berühmt) Erfahrung erreichen." #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "Errungenschaften des Charakters" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] manchmal beeindruckende Taten vollbringen. Sie können jederzeit überprüfen, was Ihr Akademiker bisher erreicht hat, indem Sie den Mauszeiger über dieses Symbol bewegen." #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "Diskurse und Werte" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "Den meisten Zeichen in Morgenröte sind Werte zugeordnet. Diese Werte werden in der Mitte eines jeden Akademikers angezeigt. Bei Geologie siehst du zum Beispiel, wie viele Mineralien gefunden wurden oder wie viel geologisches Wissen du hast. Oft kannst du mehr über bestimmte Werte herausfinden, indem du mit dem Mauszeiger darüber fährst." #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "Schaltfläche besuchen" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "Die meisten [Concept('concept_academics_academic','$concept_academics_academics$')] haben spezielle Besuchsschaltflächen, über die Sie mehr über diese spezielle akademische Einrichtung erfahren können.\n\n Auf [concept_dubois_naturalist] gibt es zum Beispiel eine Schaltfläche zum Besuch des Zoos, wo Sie mehr über Ihre Zootiere erfahren können." #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "Rangliste" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "Vielleicht vergleichen Sie sich gerne mit anderen Ländern. In diesem Fall könnte die Rangliste für Sie interessant sein. Wenn du über dieses Symbol fährst, kannst du verschiedene Listen sehen, die dir zeigen, wie gut du in einem bestimmten Aspekt von Morgenröte im Vergleich zu anderen Nationen abschneidest.\n\nDie [concept_agassiz_geologist] ermöglicht dir zum Beispiel einen Vergleich deiner geologischen Punktzahl, deines geologischen Wissens, deines ozeanischen Wissens, deiner Mineralien und seltenen Mineralien." #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "Projekt-Schaltflächen und andere Schaltflächen" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "Dieser Teil der Benutzeroberfläche ist einer der wichtigsten Teile für dich. Hier können Sie Ihre [Concept('concept_academics_academic','$concept_academics_academics$')] mit Projekten beauftragen und andere wichtige Interaktionen starten. [concept_agassiz_geologist] kann auf Expeditionen gehen, Ihre Industrien verbessern, das Alter der Erde neu berechnen und Sie können ein Mineralienkabinett gründen oder einen Kongress zur Kontinentaldrift starten." #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "Ändern Sie das Layout" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Wenn Sie ein dichteres Interfacedesign bevorzugen, können Sie mit dieser Schaltfläche das Aussehen des Interfacedesigns ändern. Für das Spiel selbst ist es unerheblich, welche Variante Sie verwenden. Wählen Sie also die Variante, die Ihnen besser gefällt." #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "Kultur-Tutorial" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "Dieses Tutorial ist noch nicht fertig." #deepl:1971937521

 mr_tutorial_arts_window_open: "Das Fenster der Künste öffnen" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "Nun werden wir uns das Kunstfenster genauer ansehen. Öffnen Sie das Kunstfenster, indem Sie auf die Schaltfläche klicken oder die Tasten \"Strg + A\" auf Ihrer Tastatur drücken." #deepl:53394483
 mr_tutorial_arts_window_open_tt: "Öffnen Sie das Fenster "Kunst", indem Sie auf die Schaltfläche "Wissenschaft" klicken oder die Tastenkombination "Strg + A" drücken." #deepl:2950751548

 mr_tutorial_arts_tab: "Registerkarte Kunst" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "Kunst war ein wichtiger Bestandteil des 19. und 20. Jahrhunderts. Große [Concept('concept_artists_artist','$concept_artists_artists$')] dieser Epoche sind noch heute bekannt.\n\nMorgenröte bietet verschiedene Arten von Künstlern und ihren Kunstwerken.\n\nDas Kunstfenster selbst hat zwei Registerkarten. Der eine zeigt dir eine Übersicht über die Kunst in deinem Land, im anderen kannst du deine Künstler finden und Künstler aus anderen Ländern anwerben." #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "Kulturelle Tradition" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "Kulturelle Tradition ist ein Wert, der die kulturellen Errungenschaften deines Landes repräsentiert.\n Er besteht aus [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] und [concept_klimt_painting_tradition]. \n\nKulturelle Tradition wird nach folgender Formel berechnet:\nMusikalische Tradition / 4 + Malerei-Tradition / 3 + Literarische Tradition / 2\n\nDu erhältst zusätzlich [concept_prestige] von deiner Kunsttradition. Alle 5 Punkte der Kunsttradition bringen 1 zusätzliches Prestige." #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "Öffnen Sie die Registerkarte Kunstübersicht" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "Künstlerischer Fortschritt" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "Du kannst neue [Concept('concept_artists_artist','$concept_artists_artists$')] auf verschiedene Weise erhalten: Du kannst sie rekrutieren, durch Events gewinnen oder indem du genug [concept_artistic_progress] sammelst. \n\nWährend Events und Rekrutierung nicht für jede Nation möglich sind, ist es möglich, Künstler durch das Füllen des Fortschrittsbalkens zu gewinnen, sobald du ein $building_elgar_opera$ oder ein $building_arts_academy$ besitzt. \nDie vollständige Liste der Faktoren, die den monatlichen Gewinn beeinflussen, kannst du sehen, wenn du mit dem Mauszeiger über den Fortschrittsbalken fährst. \n\nZusätzlich kannst du die Künste fördern, um mehr Fortschritt zu erhalten und bestimmte Künstler zu befördern, wenn du die notwendigen [concept_production_method] in deinem $building_arts_academy$ hast." #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "Zentrum der Künste" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] sind die Orte, an denen ein [concept_artists_art_style] geboren wurde.\n Einige Zentren der Künste sind bei Spielbeginn bereits vorhanden. Andere können durch [Concept('concept_journal_entry','$concept_journal_entries$')] oder durch Drücken einer der Tasten, die du hier siehst, freigeschaltet werden. Bewege den Mauszeiger über das Zentrum der Künste, um zu sehen, wie du es erlangen kannst.\n\nNatürlich sind Zentren der Künste für dich und dein Land nützlich, da sie dir Zugang zu Boni verschaffen." #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "Öffnen Sie die Registerkarte Künstler" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "Schauen wir uns nun die Website [Concept('concept_artists_artist','$concept_artists_artists$')] genauer an. Öffnen Sie die Registerkarte "Künstler", indem Sie auf die Schaltfläche "Register" klicken." #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Öffnen Sie die Registerkarte Künstler" #deepl:974477655

 mr_tutorial_arts_tab_artists: "Registerkarte Künstler" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "Die [Concept('concept_artists_artist','$concept_artists_artists$')] sehen den Akademikern sehr ähnlich, funktionieren aber etwas anders. Derzeit gibt es 3 Künstler:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "Künstler einladen" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "Wie bereits erwähnt, kann [Concept('concept_artists_artist','$concept_artists_artists$')] nicht nur durch das Sammeln von genügend [concept_artistic_progress] erworben werden, sondern auch, indem man sie einfach einlädt.\n\nJede Art von Künstler hat unterschiedliche Anforderungen. Ihr könnt [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] aus der ganzen Welt einladen, aber ihr müsst ein Land mit genügend $building_elgar_opera$und einem ausreichend guten [concept_elgar_musical_tradition] sein. \n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] kann nur eingeladen werden, wenn sie eine ähnliche Kultur haben. \n\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] hingegen kann überhaupt nicht eingeladen werden." #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "Allgemeine Informationen" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "Der linke Teil des Fensters zeigt Ihnen einige grundlegende Informationen über Ihren Künstler an. Hier sehen Sie:\n-Das Porträt\n-Der Name und die Bewertung\n-Die [concept_artists_experience]\n- Die [Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "Wichtige Werte der Kunst" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "In diesem Teil der Benutzeroberfläche können Sie allgemeine Informationen zu diesem speziellen Aspekt der Kunst einsehen.\nFür die Website [concept_elgar_composer] werden beispielsweise [concept_elgar_musical_tradition], die Kompositionen und Meisterwerke Ihres Komponisten und eine Übersicht der fünf besten Komponisten der Welt angezeigt.\n\nZusätzlich können Sie eine Rangliste einsehen, wenn Sie den Mauszeiger über das kleine Symbol in der oberen rechten Ecke bewegen." #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "Künstler-Aktionen" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] haben auch Aktionen. Hier kannst du sehen, woran deine Künstler arbeiten können oder welche Entscheidungen du mit deiner Nation treffen kannst. Das waren die wichtigsten Informationen zu den Künstlern. Du kannst von hier aus mit dem Tutorial für Sport weitermachen oder dein Spiel fortsetzen." #deepl:746856108
 mr_start_sports_tutorial_button_loc: "Sport-Tutorial" #deepl:826655861

 mr_tutorial_sports_window_open: "Öffnen Sie das Sportfenster" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "Nun werden wir uns das Sportfenster genauer ansehen. Öffnen Sie das Sportfenster, indem Sie auf die Schaltfläche klicken oder die Tasten \"Strg + S\" auf Ihrer Tastatur drücken." #deepl:243246943
 mr_tutorial_sports_window_open_tt: "Öffnen Sie das Sportfenster, indem Sie auf die Schaltfläche "Wissenschaft" klicken oder "Strg + S" drücken." #deepl:1482293542

 mr_tutorial_sports_window: "Sport-Fenster" #deepl:4243980162
 mr_tutorial_sports_window_desc: "Das Sport-Fenster ermöglicht den Zugriff auf alle verschiedenen Sportarten und Charaktere, die für die Sportarten relevant sind.\n\nDas Fenster ist in normale Sportarten und Aeronautik unterteilt.\n\nZu den normalen Sportarten gehören:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Ballsportarten\n- [concept_vikelas_car_racing]\n\nAeronautik gehören:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "Registerkarte Sport" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "Die Registerkarte "Sport" gibt dir einen Überblick über verschiedene sportbezogene Aktivitäten und Charaktere. Im Gegensatz zu den Akademikern und Künstlern sind die Charaktere in der Registerkarte "Sport" oft nur Generäle oder Politiker." #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "Öffnen Sie die Registerkarte Sport" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "Charakter-Übersicht" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "Dieser Teil der Benutzeroberfläche gibt dir einen Überblick über die [concept_character]. \n\nEinige Charaktere wie der [concept_vikelas_coach] und der Car Racer sind Charaktere, die du bekommen kannst und daher [concept_academics_experience] haben. Andere wie der Mountaineer haben keine Erfahrung." #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "Werte und Informationen" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "In der Mitte werden wichtige Informationen zu dieser Sportart angezeigt.\n\nAuf [concept_vikelas_olympic_games] finden Sie zum Beispiel eine Übersicht über den Präsidenten und den Vorstand der [concept_vikelas_ioc], wie viele Mitglieder es gibt und wie viele Medaillen Sie bisher gesammelt haben." #deepl:1125108675

 mr_tutorial_sports_tab_actions: "Aktionen" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "Auf der rechten Seite können Sie bestimmte Aktionen für diese Sportart durchführen.\nDiese Aktionen sind im Grunde Entscheidungen, die es Ihnen ermöglichen, Ihre [Concept('concept_character', '$concept_characters$')] zu nutzen oder etwas Neues wie [concept_vikelas_ioc] einzurichten." #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "Registerkarte "Luftfahrt" öffnen" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Schauen wir uns nun die Registerkarte "Luftfahrt" genauer an. Öffnen Sie die Registerkarte, indem Sie auf die Schaltfläche klicken." #deepl:2671641916
 mr_tutorial_aeronautics_tab_open_tt: "Öffnen Sie die Registerkarte Aeronautics" #deepl:2187560588

 mr_tutorial_aeronautics_tab: "Registerkarte Aeronautik" #deepl:2661687945
 mr_tutorial_aeronautics_tab_desc: "Die Registerkarte "Luftfahrt" sieht größtenteils genauso aus wie die Registerkarte "Sport".\n\nEin großer Unterschied liegt in den Charakteren selbst. Du kannst die [concept_curtiss_balloonist] sponsern und automatisieren und die [concept_curtiss_pilot] wird unter verschiedenen Umständen spawnen.\n\nDies ist das Ende des Übersichtstutorials. Bitte nutzt die Vickypedia oder die von uns eingefügten Konzepte, wenn ihr mehr über die Charaktere von Morgenröte erfahren wollt." #deepl:851922845
 mr_tutorial_lesson_button_finish: "Tutorial beenden" #deepl:895117430

