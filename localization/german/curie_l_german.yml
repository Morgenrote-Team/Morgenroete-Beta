 pm_curie_nuclear_reactor: "Kernreaktor"
 curie_nuclear_reactor_tech: "Kernreaktor"
 curie_nuclear_reactor_tech_desc: "Der Weg zur kontrollierten Kernspaltung begann 1942 mit dem „Chicago Pile-1“, dem weltweit ersten künstlichen Kernreaktor, der unter den Tribünen eines Stadions eine sich selbst erhaltende Kettenreaktion demonstrierte. Darauf aufbauend folgte der Graphitreaktor X-10 in Tennessee, der als Pilotanlage diente, um die großtechnische Produktion von Plutonium und den Umgang mit intensiver Strahlung zu erproben. Der Höhepunkt dieser Ära war der B-Reaktor in Hanford, der weltweit erste Produktionsreaktor in Originalgröße, der die industrielle Nutzung der Kernenergie schließlich Wirklichkeit werden ließ."
 curie_the_bomb_tech: "Die Bombe"
 curie_the_bomb_tech_desc: "„Nun bin ich der Tod geworden, der Zerstörer der Welten.“"
 curie_nuclear_fission_tech: "Kernspaltung"
 curie_nuclear_fission_tech_desc: "In den späten 1930er Jahren gelang es Forschern erstmals, schwere Atomkerne durch Beschuss mit Neutronen zu spalten und damit eine zuvor unvorstellbare Energiequelle in der Materie freizusetzen. Dieser wissenschaftliche Durchbruch markierte den Übergang von der theoretischen Physik zur praktischen Beherrschung der Kräfte, die das Universum zusammenhalten."
 curie_facility_can_construct_only_facility_tt: "Wir verfügen noch nicht über eine Kernforschungsanlage."
 curie_rocket_science_tech: "Raketenwissenschaft"
 curie_rocket_science_tech_desc: "Um die Wende zum 20. Jahrhundert entwickelte sich die Raketenwissenschaft von Science-Fiction zu einem stringenten theoretischen Rahmen, der vor allem vom russischen Visionär Konstantin Ziolkowski begründet wurde. In seinem bahnbrechenden Werk von 1903 leitete Ziolkowski die grundlegende Raketengleichung her und bewies, dass Raumfahrt durch mehrstufige Raketen und flüssige Treibstoffe mathematisch möglich war. Der transsilvanisch-deutsche Physiker Hermann Oberth entwickelte in den 1920er Jahren unabhängig davon die Prinzipien der Raumfahrt und lieferte die technischen Entwürfe, die später die erste Generation praktischer Raketeningenieure inspirieren sollten."
 curie_modern_rockets_tech: "Moderne Raketen"
 curie_modern_rockets_tech_desc: "Robert Goddard leitete den Übergang der Raketenwissenschaft in die Praxis ein, indem er die ersten Flüssigkeitsraketen startete und grundlegende Systeme wie die gyroskopische Stabilisierung entwickelte. In Deutschland intensivierte sich die Forschung durch den Verein für Raumschiffahrt, wo ein junger Wernher von Braun begann, die für großtechnische Antriebe erforderlichen technischen Lösungen zu verfeinern. In dieser Zeit vollzog sich schließlich der technologische Wandel von privaten Experimenten hin zu massiven staatlich finanzierten Projekten, der in der Entwicklung der ersten Raketen gipfelte, die den Rand des Weltraums erreichen konnten."
 alert_curie_physicist_will_retire_soon_alert_name: "[concept_curie_physicist] kurz vor Ruhestand"
 alert_curie_physicist_will_retire_soon_alert_desc: "Ihr [concept_curie_physicist] steht kurz vor dem Ruhestand. Möglicherweise möchten Sie einen Ersatz finden."
 curie_physicist_will_retire_soon_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! [concept_curie_physicist] kurz vor Ruhestand"
 alert_curie_physicist_will_retire_soon_alert_hint: "Ihr [concept_curie_physicist] wird irgendwann in den nächsten #V 5 Jahren#! in den Ruhestand gehen. Vielleicht möchten Sie einen neuen Physiker als Nachfolger suchen."
 alert_curie_physicist_will_retire_soon_alert_action: "$mr_alert_send_to_science_mathematics$"
 curie_differential_geometry_tech: "Differentialgeometrie"
 curie_differential_geometry_tech_desc: "Die Differentialgeometrie, die im 19. Jahrhundert von Gauß begründet wurde, nutzt komplexe mathematische Verfahren, um das Verhalten von Kurven und Flächen in der realen Welt zu beschreiben. Ursprünglich entwickelt, um genauere Karten zu erstellen und die Erde zu vermessen, ermöglichte sie es Wissenschaftlern, Formen und Entfernungen mithilfe von Formeln zu berechnen, anstatt sie nur zu betrachten."