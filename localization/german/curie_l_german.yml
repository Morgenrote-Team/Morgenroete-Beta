 curie.11.t: "Uran gefunden!"
 curie.11.d: "Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] hat bei Probensammlungen in [SCOPE.sState('curie_uranium_state_scope').GetName] außergewöhnlich reiche Uranvorkommen gefunden. Physiker und Chemiker empfehlen, die Lagerstätte direkt auszubeuten."
 curie.11.f: "Uran (benannt nach dem Planeten Uranus) ist ein chemisches Element mit dem Elementsymbol U und der Ordnungszahl 92. Uranverbindungen wurden im 19. Jahrhundert zum Färben von Glas und Keramik, Vasen und Ziergegenständen, aber auch von Alltagsgegenständen wie Schalen oder Gläsern verwendet. Glashersteller in Joachimsthal (Böhmen) verwendeten diese Technik bereits 1826. Uran wurde bis Mitte des 20. Jahrhunderts zum Färben von Glas verwendet, erst dann wurde es durch andere, weniger schädliche Farbmineralien ersetzt. Uranhaltige keramische Glasuren, die von Orange bis zu leuchtendem Rot reichten, wurden für alles von Geschirr bis zu architektonischen Accessoires verwendet. Diese Keramik, die in den USA aufgrund des Namens eines Herstellers \"Fiestaware\" genannt wird, ist wahrscheinlich einer der radioaktivsten Gegenstände, die noch in vielen amerikanischen Haushalten zu finden sind."
 curie.11.g: "Bauen Sie genau dort eine Uranmine!"
 curie.12.t: "Joachimsthal"
 curie.12.d: "Bisher hat das Uranbergwerk in Joachimsthal, Böhmen, nur geringe Mengen produziert. Angesichts der gestiegenen Nachfrage aufgrund der potenziellen Verwendung von Uran in der Industrie und der Wissenschaft ist nun eine erhebliche Steigerung der Produktion geplant."
 curie.12.g: "Joachimsthal wird das Zentrum der Uranproduktion sein!"
