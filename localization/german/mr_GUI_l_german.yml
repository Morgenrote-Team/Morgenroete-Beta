 MR_GEOLOGIST_OIL_STOP_BUTTON_TT: "#T Stoppen Sie die Suche nach Öl#!\nIhr [concept_agassiz_geologist] sucht derzeit nach neuen Ölquellen in der Nähe bereits bestehender Bohrinseln und steigert so die Produktion.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3306097242
