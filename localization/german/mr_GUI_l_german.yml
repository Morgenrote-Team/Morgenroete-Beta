 MR_NATURALIST_IMPROVE_RUBBER_BUTTON_TT: "#T Kautschukplantagen verbessern#!\n Ihr Naturalist kann seine Fähigkeiten einsetzen, um die [GetBuildingType('building_rubber_plantation').GetName] Ihres Landes zu verbessern.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_IMPROVE_RUBBER_TRIGGER_TT: "#default_text Mindestens ein [GetBuildingType('building_rubber_plantation').GetName] Gebäude der Stufe 1 oder höher verfügt nicht über alle drei [Concept('concept_modifier','$concept_modifiers$')].#!"
