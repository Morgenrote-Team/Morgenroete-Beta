 MR_FOSSIL_IDENTIFICATION_BUTTON_TT: "#T Fossilien identifizieren#!\nEin [concept_lepsius_anthropologist] kann einen unbekannten Knochen im Laufe der Zeit analysieren und ihn einer bestimmten menschlichen oder vormenschlichen Art zuordnen. Wenn es ihm gelingt, drei Knochen derselben Art zuzuordnen, kann er diese Art erfolgreich systematisieren. Wie lange es dauert, einen Knochen richtig zu identifizieren, hängt von der Erfahrung des Anthropologen ab.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1284308543

