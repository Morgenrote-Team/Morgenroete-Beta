 MR_AUTORACING_LONG_DISTANCE_BUTTON: "Langstreckenrennen" #deepl:2377738021
 MR_AUTORACING_LONG_DISTANCE_BUTTON_TT: "#T Organisieren Sie ein Langstreckenrennen#!\nLangstreckenrennen, oft von Stadt zu Stadt, waren in den Anfängen des Automobilrennsports die Norm und wurden bis in die Mitte des 20. In Italien sind Rennen wie die Targa Florio oder die Mille Miglia die bekanntesten Beispiele. Sie stellten Mensch und Maschine auf eine besondere Probe und galten lange Zeit als die wahren nationalen Autorennen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:418295669

 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON: "Grand Prix gefunden" #deepl:518329656
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TT: "#T Gründung des Grand-Prix-Rennens#!\n 1906 wurde mit dem Rennen um den Grand Prix de l'ACF der erste offizielle Grand Prix der Automobilgeschichte veranstaltet. Unabhängig vom Herkunftsland waren bis zu drei Rennwagen pro Automobilhersteller zugelassen, wie ursprünglich von den Vertretern der französischen Industrie gefordert. Entsprechend seinem Status als wichtigster aller Wettbewerbe wurde das Rennen über eine Distanz von mehr als 1200 km und an zwei aufeinanderfolgenden Tagen ausgetragen. Im Jahr 1925 wurde auf Betreiben des Automobilclubs von Italien schließlich die Einführung einer offiziellen Weltmeisterschaft angekündigt. Die drei offiziellen Grand-Prix-Rennen der Saison (Frankreich, Italien und Belgien) wurden zu Rennen erklärt, ebenso wie Indianapolis als wichtigstes amerikanisches Rennereignis.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2279262554
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TRIGGER_TT: "#default_text #V Mindestens 5 weitere Länder#! haben einen #V Automobilclub#! und recherchierten [GetTechnology('organized_sports').GetName].#!" #deepl:1416542152

 MR_AUTORACING_RACE_TRACK_BUTTON: "Eine Rennstrecke bauen" #deepl:1074713138
 MR_AUTORACING_RACE_TRACK_BUTTON_TT: "#T Bau einer Rennstrecke#!\nMit den Grand-Prix-Rennen wird die feste Rennstrecke immer mehr zur Norm für Autorennen. Eine eigene Rennstrecke würde nicht nur internationale Rennveranstaltungen an einem Ort zentralisieren, sondern als Teststrecke auch unseren Rennfahrern jedes Jahr einen Erfahrungsbonus verschaffen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2043388285
