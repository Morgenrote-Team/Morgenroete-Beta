 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T Geologische Forschung#!\n Ein Geologe kann 5 Jahre lang durch das Land reisen, um sein Wissen zu erweitern. Auf diese Weise kann er auch geologische Formationen, Höhlen oder (später) sogar Uran finden. Geologen, die die Eigenschaft Mineraloge besitzen, verdoppeln die Anzahl der jährlich erworbenen Mineralien. Am Ende ihrer Suche erhalten Geologen zusätzliche Mineralien, Erfahrung und die Eigenschaft Mineraloge, falls sie diese nicht bereits besitzen.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1921046048
