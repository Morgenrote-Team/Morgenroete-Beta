 VISIT_SCIENTIFIC_SOCIETY_BUTTON_TT: "#T Besuchen Sie die Wissenschaftliche Gesellschaft#!\nDie [concept_academics_scientific_society] bietet einen Überblick über Ihre [Concept('concept_academics_academic','$concept_academics_academics$')] und deren Leistungen und die wissenschaftlichen Theorien.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_SCIENTIFIC_SOCIETY_TRIGGER_TT: "#default_text Sie besuchen #V derzeit nicht#! die #V Wissenschaftlichen Gesellschaft#!.#!"
 MR_VISIT_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat ein [GetBuildingType('building_verrier_observatory').GetName].#!"
 MR_VISIT_OBSERVATORY_TRIGGER_TT: "#default_text Sie sind #V derzeit nicht#! im #V Observatorium#!.#!"
 VISIT_ZOO_BUTTON: "Zoo"
 VISIT_ZOO_BUTTON_TT: "#T Besuchen Sie den Zoo#!\nDee [concept_dubois_zoo] gibt Ihnen einen Überblick über alle Ihre [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] und ermöglicht Ihnen, sie zu besuchen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
