 MR_TOTAL_MASTERWORKS_COUNTRY_TT: "#T [GetPlayer.GetAdjectiveNoFormatting]e Meisterwerke:#!\n@klimt_masterwork_classicism! [GetPlayer.MakeScope.Var('klimt_classic_masterwork_var').GetValue] Klassizismus\n@klimt_masterwork_romanticism! [GetPlayer.MakeScope.Var('klimt_romantic_masterwork_var').GetValue] Romantik\n@klimt_masterwork_realism! [GetPlayer.MakeScope.Var('klimt_realistic_masterwork_var').GetValue] Realismus\n@klimt_masterwork_impressionism! [GetPlayer.MakeScope.Var('klimt_impressionistic_masterwork_var').GetValue] Impressionismus\n@klimt_masterwork_expressionism! [GetPlayer.MakeScope.Var('klimt_expressionistic_masterwork_var').GetValue] Expressionismus\n@klimt_masterwork_art_nouveau! [GetPlayer.MakeScope.Var('klimt_art_nouveau_masterwork_var').GetValue] Jugendstil"
 MR_VISIT_GALLERY_BUTTON: "Galerie"
 MR_VISIT_GALLERY_BUTTON_TT: "#T Besuchen Sie die Galerie#!\nDer Gesamtwert unserer Malerischen Tradition und ihrer Kunstwerke kann in der Galerie überprüft werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_GALLERY_BUTTON_TRIGGER_TT: "#default_text Sie #V besuchen derzeit nicht#! die Galerie.#!"
 MR_PAINTER_TRIP_BUTTON: "Bildungsreise"
 MR_PAINTER_TRIP_BUTTON_TT: "#T Bildungsreise#!\nAuf einer [concept_klimt_painter_trip] kann ein Künstler einen bisher unbekannten Kunststil erlernen und so die jährliche [concept_klimt_painting_tradition] verbessern. Sie können auch andere positive und negative Eigenschaften während ihres Aufenthalts in einem fremden [concept_artists_center_of_arts] erwerben. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "Ein Meisterwerk erwerben"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T Ein Meisterwerk erwerben#!\nWir können im Ausland ein Meisterwerk eines Stils erwerben, den wir noch nicht besitzen. Dies setzt jedoch voraus, dass eine andere Nation mindestens mehr als ein Meisterwerk dieses Stils besitzt. Außerdem brauchen wir eine Nationalgalerie, um das Gemälde aufzuhängen. Zusätzlich zu den Beschaffungskosten müssen wir auch einige unserer Gemälde eintauschen, was uns #R 100#! [concept_klimt_painting_tradition] kostet. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VERNISSAGE_BUTTON: "Vernissage"
 MR_VERNISSAGE_BUTTON_TT: "#T Vernissage#!\nAuf einer Vernissage kann ein [concept_klimt_painter] einige seiner Bilder ausstellen und im Gegenzug Reputation und [concept_klimt_painting_tradition] erwerben. Eine Vernissage ist nur einmal im Leben eines Malers möglich.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INDEPENDENT_PAINTER: "Unabhängige Maler"
 MR_INDEPENDENT_PAINTER_EXPERIENCE_TOOLTIP: "[Character.GetFullName] hat eine Reputation von [FixedPointToFloat(Character.MakeScope.GetVariable('klimt_painter_experience').GetValue)|+0]"
 GUI_klimt_independent_painter_experience_text_progressing_loc: "[ROOT.GetVariable('klimt_painter_experience').GetValue|V0]#b  / 500#!"
 GUI_klimt_independent_painter_experience_text_500_loc: "#V 500#!#b  / 500#!"
 MR_INVITE_INDEPENDENT_PAINTER: "Maler einladen"
 MR_INVITE_INDEPENDENT_PAINTER_TT: "#T Laden Sie diesen Maler ein#!\nDas Einladen eines [Concept('concept_klimt_painter','#PURPLE #b Malers#!#!')] ist eine Möglichkeit, einen neuen Maler zu bekommen, wenn Ihr Land nicht genügend Maler zur Verfügung stellen kann oder wenn Ihr derzeitiger Maler Sie nicht zufrieden stellt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_painter', Scope.GetCharacter.MakeScope ).End)]"
 MR_INVITE_INDEPENDENT_PAINTER_EFFECT_TT: "[SCOPE.sCharacter('chosen_painter').GetFullName] wird zu Ihrem neuen [concept_klimt_painter]. [GetPlayer.GetCustom('artists_replacement_painter_custom_loc')]"
 MR_NOT_HIRED_INDEPENDENT_PAINTER_RECENTLY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #n nicht#! kürzlich einen [concept_klimt_independent_painter] eingestellt (siehe den Modifikator für die verbleibende Zeit).#!"
 MR_PAINTER_WAS_NOT_RECENTLY_SENT_AWAY_TT: "#default_text Dieser Maler ist für [GetPlayer.GetAltName('AKK')] nicht verfügbar, weil [GetPlayer.GetAltNameNoFormatting('NOM')] ihn in den letzten 5 Jahren abgelehnt hat.#!"
