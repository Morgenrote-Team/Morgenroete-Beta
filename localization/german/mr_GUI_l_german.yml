 ELEMENT_INFO_CHEMICAL_SYMBOL_TT: "#V Elementsymbol:#! Das Elementsymbol ist die Abkürzung, die für ein chemisches Element verwendet wird.\n\nHistorisch gesehen verwenden viele der früheren Elemente lateinische oder griechische Wörter anstelle bestimmter anderer Sprachen. Pb für Blei stammt zum Beispiel aus dem lateinischen Plumbum."
