 MR_STOP_CREATING_MASTERWORK_BUTTON_TT: "#T Stoppen Sie die Erstellung eines musikalischen Meisterwerks#!\nIhre [concept_elgar_composer] wird die Erstellung eines musikalischen Meisterwerks beenden. #n Wichtig:#! der Fortschritt des Meisterwerks geht verloren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOZART_MONUMENT_BUTTON: "Bau des Mozart-Denkmals"
 MR_MOZART_MONUMENT_BUTTON_TT: "#T Errichten Sie das Mozart-Denkmal#!\nWolfgang Amadeus Mozart ist einer der bedeutendsten Komponisten aller Zeiten, aber manche verweigern ihm immer noch diese Anerkennung. In jüngerer Zeit hat ihn eine ganze Generation von Komponisten als Ausgangspunkt für die zeitgenössische Musik wiederentdeckt. Die Errichtung eines Mozart-Denkmals in seiner Geburtsstadt Salzburg wird künftige Generationen dazu inspirieren, in seine Fußstapfen zu treten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
