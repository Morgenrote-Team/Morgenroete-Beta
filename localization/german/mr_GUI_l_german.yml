 MR_ASTEROID_CONGRESS_BUTTON: "Kongress über Asteroiden"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Kongress über Asteroiden#!\nSeit der Entdeckung von Ceres im Jahr 1801 haben die Astronomen immer mehr Himmelskörper gefunden, weshalb die Zahl der Planeten im Sonnensystem weiter gestiegen ist. Die Entdeckung des Neptun warf die Frage auf, ob eine neue Kategorie für die zahlreichen kleineren Objekte, die insbesondere zwischen Mars und Jupiter zu finden sind, nicht sinnvoller wäre. Insbesondere die Erfindung neuer astronomischer Symbole und ihre relativ geringe Größe veranlassten die Astronomen zu der Annahme, dass es sich eher um \"kleine Sterne\" oder \"kleine Planeten\" handelte. Natürlich würde diese Kategorisierung bedeuten, dass einige der zuvor als Planeten betrachteten Objekte ihren Status verlieren und zu bloßen Felsbrocken degradiert würden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V Neptun#! ist entdeckt worden.#!"
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat ein [GetBuildingType('building_verrier_observatory').GetName].#!"
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text Hat einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 1500#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell wurden [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Carte du Ciel"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T Kongress zur Carte du Ciel#!\nEin umfangreiches und beispielloses internationales Sternkartierungsprojekt wurde 1887 vom Direktor des Pariser Observatoriums, Amédée Mouchez, initiiert, der das Potenzial des neuen fotografischen Trockenplattenverfahrens erkannte, das Verfahren zur Erstellung von Sternkarten zu revolutionieren. Als Ergebnis des Astrographenkongresses, der im April 1887 in Paris stattfand und an dem mehr als 50 Astronomen teilnahmen, erklärten sich 20 Observatorirn aus der ganzen Welt bereit, sich an dem Projekt zu beteiligen. Wir können einen solchen Kongress ausrichten, um das astronomische Wissen der internationalen Gemeinschaft zu teilen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text Es hat in den #V letzten 5 Jahren#! #V keinen Astronomiekongress#! gegeben (der letzte Gastgeber hat nicht den Modifikator \"Gastgeber eines astronomischen Kongresses\").#!"
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 7000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine [GetBuildingType('building_university').GetName] der #V Stufe 10 oder höher#!.#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Große Debatte"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T Die große Debatte#!\nDie Shapley-Curtis-Debatte, auch bekannt als Die große Debatte (english The Great Debate), bündelte die Diskussionen des frühen 20. Jahrhunderts, die schließlich zu einem neuen Verständnis der Natur von Galaxien und der Größe des Universums führten. Sie drehte sich um die Größe der Milchstraße und die Frage, ob die damals als Spiralnebel bekannten Galaxien kleine Objekte in der Milchstraße sind oder viel weiter entfernt und von der Milchstraße getrennt. An diesem Tag hielten die beiden Wissenschaftler unabhängige Fachvorträge über die Größenordnung des Universums, gefolgt von einer öffentlichen Diskussion am Abend. Wir können einen solchen Kongress veranstalten, um die letzten Geheimnisse des Universums zu erörtern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 12000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!"
 SPECIMEN_VAR: "@dubois_specimen! [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|*V0]"
 SPECIMEN_VAR_TT: "#header [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!\n[GetPlayer.GetAltName('NOM')] hat @dubois_specimen! [GetPlayer.MakeScope.GetVariable('dubois_specimen').GetValue|V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] gesammelt."
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T Heia Safari#!\nAuf einer Afrika-Safari kann durch ständiges Aufspüren und Fallenstellen Großwild gefangen und dann zu einer [concept_dubois_zoo] transportiert werden. Es ist nur möglich, ein Tier pro Safari zu fangen. Je nach Tierart ist es unterschiedlich, ob man Fallen benötigt oder ihnen auf der Spur bleiben muss. Als Faustregel gilt, dass große, träge Tiere mehr Fallen benötigen, während schnelle Tiere mehr Fährtenarbeit erfordern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_dubois_naturalist] der #V nicht beschäftigt#! ist.#!"
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text Sie haben einen [concept_dubois_zoo], der mindestens #V klein#! ist.#!"
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V besitzt mindestens einen afrikanischen Lebensraum#! mit Großwild oder es gibt einen solchen Lebensraum in einem Staat #V im Besitz einer dezentralen Nation#!.#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist nicht #V auf einer Safari#! oder #V hatte kürzlich eine#!.#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Fangen Sie einheimische Tiere#!\nUnser Land verfügt über Tierlebensräume mit faszinierenden Arten, die in einem [concept_dubois_zoo] ausgestellt werden könnten. Ein [concept_dubois_naturalist] reist ein Jahr lang durch das ganze Land, um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] für einen Zoo zu sammeln.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt mindestens einen Lebensraum, der ein [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] beherbergt, das nicht in unserem [concept_dubois_zoo] lebt.#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V fängt derzeit keine einheimischen Tiere#!.#!"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Hippocampus-Kongress"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Hippocampus-Kongress#!\nWie einzigartig ist der Mensch? Wie sehr ist er ein Tier? Schon die alten Griechen hatten eine Nähe zwischen Menschen und Affen festgestellt. Die Tatsache, dass Carl Linneaus Affen und Menschen als Primaten einstufte - den \"höchsten\" Rang unter den Tieren - zeigt, dass das Thema einst nicht so umstritten war. Mit der Formulierung der Evolutionstheorie und der vermuteten Abstammung des Menschen von einem affenähnlichen Verwandten sind jedoch Konflikte entstanden, die es nun zu lösen gilt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_dubois_naturalist]#!"
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text Mindestens #V 5 Länder#! haben einen [concept_dubois_naturalist].#!"
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 20000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (derzeit [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sind weltweit gesammelt worden (derzeit [GetGlobalVariable('dubois_global_specimen').GetValue|0+]).#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "Erweitern Sie den [concept_dubois_zoo] (klein)"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine kleine Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind das Glück aller: Die Menschen verteilen sich im Zoo, die Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl ausländischer Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V insgesamt 10#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 2 afrikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 asiatische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) oder #V 2 ozeanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+])."
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V erweitert derzeit nicht#! den [concept_dubois_zoo].#!"
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "Erweitern Sie den [concept_dubois_zoo] (mittel)"
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine mittlere Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind das Glück aller: Die Menschen verteilen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl ausländischer Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V insgesamt 20#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 5 afrikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 5 asiatische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]), #V 5 ozeanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]) oder #V 5 südamerikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_south_america').GetValue|0+]).#!"
 MR_EXTEND_ZOO_LARGE_BUTTON: "Erweitern Sie den [concept_dubois_zoo] (groß)"
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine große Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind das Glück aller: Die Menschen verstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_30_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V insgesamt 30#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Erweitern Sie den [concept_dubois_zoo] (berühmt)"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T Erweitern Sie den Zoo zu einer berühmten Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind das Glück aller: Die Menschen verteilen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V insgesamt 40#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]. Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]#!"
 MR_SPECIMEN_GARDEN_BUTTON: "Botanischen Garten eröffnen"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Gründung eines botanischen Gartens#!\nEin botanischer Garten in Ihrem Zoo wird Ihnen noch mehr Prestige verleihen. Wir können alle exotischen Pflanzen pflanzen, die unser [concept_dubois_naturalist] gesammelt hat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 50000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (derzeit [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_SPECIMEN_GARDEN_NO_BOTANICAL_GARDEN_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat noch keine #V Botanischen Garten#!.#!"
 MR_SPECIMEN_GARDEN_EFFECT_TT: "Ihr [GetBuildingType('building_dubois_zoo').GetName] erhält einen #V botanischen Garten#!, der Ihnen 50 Prestige und einen kleinen Anstieg Ihres Lebensstandards beschert."
 MR_SPECIMEN_COLLECTION_BUTTON: "Belegsammlung eröffnen"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Probensammlung eröffnen#!\nDie Aufstellung all unserer exotischen Insekten, Schmetterlinge und anderer [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] würde der Welt zeigen, wie wissenschaftlich fortschrittlich unser Land ist.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat noch keine #V Belegsammlung#!.#!"
 MR_SPECIMEN_COLLECTION_EFFECT_TT: "Ihr [GetBuildingType('building_dubois_zoo').GetName] erhält eine #V Probensammlung#!, die dir 50 Prestige und einen kleinen Forschungsschub verleiht."
 MR_BAN_ANIMAL_EXPORT_BUTTON: "Tierexportverbot"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Tierexportverbot#!\nMit einem Tierexportverbot machen wir grundsätzlich klar, dass wir nicht bereit sind, unsere Tiere ins Ausland zu verkaufen. Andere Nationen werden von Anfragen absehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "Export von Tieren zulassen"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T Export von Tieren zulassen#!\nMit einer Ausfuhrgenehmigung für Tiere können wir ein nettes Zusatzeinkommen erzielen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_BUTTON: "Tiere züchten"
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T Züchten Sie Tiere in Ihrem Naturschutzgebiet#!\nVersuchen Sie, neue [Concept('concept_dubois_habitat','$concept_dubois_habitats$')] für [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] in einem Staat mit einem [concept_dubois_nature_reserve] zu etablieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text Sie können [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] züchten, wenn Sie einen Staat mit einem [concept_dubois_nature_reserve] haben, der das spezifische Tier aus derselben Region wie das #V Naturschutzgebiet#! noch nicht hat und wenn Sie dieses Tier in Ihrem [concept_dubois_zoo] haben.\nWenn Sie zum Beispiel ein #b Naturschutzgebiet#! in einem europäischen Staat haben und den #b Alpensteinbock#! darin züchten wollen, können Sie das nur tun, wenn der Staat noch keinen Steinbock-[concept_dubois_habitat] hat und wenn Sie #b Alpensteinböcke#! in Ihrem #b Zoo#! haben.#!"
 FOSSIL_VAR: "@dubois_fossil! [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|V0]"
