 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON: "Mechanische Forschung"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON: "Neue Lokomotiven"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON_TT: "#T Entwickeln Sie neue Lokomotiven#!\nLassen Sie [concept_gaudi_engineer] sich darauf konzentrieren, neue Lokomotiven zu bauen, die einen Bonus für Ihre [GetBuildingType('building_railway').GetName] Gebäude geben. Dadurch werden Ihrem Land #n Kosten#! hinzugefügt. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
