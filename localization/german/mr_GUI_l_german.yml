 NUMBER_PLANETS_VAR: "@verrier_planets! #underline [GetGlobalVariable('verrier_planets_number').GetValue|V0]#!"
 MR_ASTEROID_CONGRESS_BUTTON: "Kongress über Asteroiden"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Kongress über Asteroiden#!\nSeit der Entdeckung von Ceres im Jahr 1801 haben die Astronomen immer mehr Himmelskörper gefunden, weshalb die Zahl der Planeten im Sonnensystem weiter gestiegen ist. Die Entdeckung des Neptun warf die Frage auf, ob eine neue Kategorie für die zahlreichen kleineren Objekte, die insbesondere zwischen Mars und Jupiter zu finden sind, nicht sinnvoller wäre. Insbesondere die Erfindung neuer astronomischer Symbole und ihre relativ geringe Größe veranlassten die Astronomen zu der Annahme, dass es sich eher um \"kleine Sterne\" oder \"kleine Planeten\" handelte. Natürlich würde diese Kategorisierung bedeuten, dass einige der zuvor als Planeten betrachteten Objekte ihren Status verlieren und zu bloßen Felsbrocken degradiert würden.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V Neptun#! ist entdeckt worden.#!"
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_verrier_observatory').GetName].#!"
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text Hat eine [concept_verrier_astronomer].#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 1500#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell wurden [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Carte du Ciel"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T Congress on the Carte du Ciel#!\nA vast and unprecedented international star-mapping project was initiated in 1887 by Paris Observatory director Amédée Mouchez, who realized the potential of the new dry plate photographic process to revolutionize the process of making maps of the stars. As a result of the Astrographic Congress of more than 50 astronomers held in Paris in April 1887, 20 observatories from around the world agreed to participate in the project. We can host such a congress to share the astronomical knowledge of the international community.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text #V hat in den letzten 5 Jahren kein Astronomiekongress#! stattgefunden #V #! (der letzte Gastgeber hat nicht den Modifikator \"Hosted an Astronomical Congress\").#!"
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 7000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_university').GetName] von #V Stufe 10 oder höher#!.#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Große Debatte"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T The Great Debate#!\nDie Shapley-Curtis-Debatte, auch bekannt als The Great Debate, bündelte die Diskussionen des frühen 20. Jahrhunderts, die schließlich zu einem neuen Verständnis der Natur von Galaxien und der Größe des Universums führten. Sie drehte sich um die Größe der Milchstraße und die Frage, ob die damals als Spiralnebel bekannten Galaxien kleine Objekte in der Milchstraße sind oder viel weiter entfernt und von der Milchstraße getrennt. An diesem Tag hielten die beiden Wissenschaftler unabhängige Fachvorträge über die Größenordnung des Universums, gefolgt von einer öffentlichen Diskussion am Abend. Wir können einen solchen Kongress veranstalten, um die letzten Geheimnisse des Universums zu erörtern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 12000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!"
 SPECIMEN_VAR: "@dubois_specimen! [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|*V0]"
 SPECIMEN_VAR_TT: "[Concept('concept_dubois_specimen','$concept_dubois_specimens$')] gesammelt von [GetPlayer.GetName]"
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T Heia Safari#!\nAuf einer afrikanischen Safari kann durch ständiges Aufspüren und Fallenstellen Großwild gefangen und dann zu einer [concept_dubois_zoo] transportiert werden. Es ist nur möglich, ein Tier pro Safari zu fangen. Je nach Tierart ist es unterschiedlich, ob man Fallen benötigt oder ihnen auf der Spur bleiben muss. Als Faustregel gilt, dass große, träge Tiere mehr Fallen benötigen, während schnelle Tiere mehr Fährtenarbeit erfordern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [concept_dubois_naturalist] die #V nicht besetzt ist#!.#!"
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text Sie haben eine [concept_dubois_zoo], die mindestens #V klein ist#!.#!"
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V  besitzt mindestens ein afrikanisches Tierhabitat#! mit Großwild oder es gibt ein solches Habitat in einem Staat #V im Besitz einer dezentralen Nation#!.#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist nicht #V auf einem Safari#! oder #V hatte kürzlich einen#!.#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Fangen Sie einheimische Tiere#!\nUnser Land verfügt über Tierlebensräume mit faszinierenden Arten, die in einem [concept_dubois_zoo] ausgestellt werden könnten. Ein [concept_dubois_naturalist] reist ein Jahr lang durch das ganze Land, um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] für einen Zoo zu sammeln.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen Tierlebensraum, der ein [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] beherbergt, das nicht in unserem [concept_dubois_zoo] lebt.#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] fängt derzeit keine einheimischen Tiere #V #! .#!"
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Botanische Expedition#!\nBotanische Expeditionen (manchmal auch \"Pflanzenjagd\" genannt) sind wissenschaftliche Reisen zur Erforschung der Flora einer bestimmten Region. Eine [concept_dubois_naturalist] wäre für die Identifizierung, Beschreibung und Sammlung von Exemplaren verantwortlich.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Botanische Expeditionen sind aus #V politischen Gründen verboten worden#!.#!"
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V  besitzt einen Regenwald#! in mindestens einem Staat. Regenwälder haben die folgenden Zustandsmodifikatoren: #V Amazonas-Wald#!, #V Kongo-Wald#!, #V Borneo-Wald#! und #V Indochinesischer Wald#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Rückruf des Naturforschers von der botanischen Expedition#!\nDer [concept_dubois_naturalist] wird von seinen botanischen Forschungen zurückbeordert, um ihn für andere Zwecke zu verwenden - zum Beispiel zum Einfangen von Tieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text Ihr [concept_dubois_naturalist] ist #V weder auf Reisen noch krank#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Ihre [concept_dubois_naturalist] ist nicht mehr besetzt."
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Hippocampus-Kongress"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Hippocampus-Kongress#!\nWie einzigartig ist der Mensch? Wie sehr ist er ein Tier? Schon die alten Griechen hatten eine Nähe zwischen Menschen und Affen festgestellt. Die Tatsache, dass Carl Linneaus Affen und Menschen als Primaten einstufte - den \"höchsten\" Rang unter den Tieren - zeigt, dass das Thema einst nicht so umstritten war. Mit der Formulierung der Evolutionstheorie und der vermuteten Abstammung des Menschen von einem affenähnlichen Verwandten sind jedoch Konflikte entstanden, die es nun zu lösen gilt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [concept_dubois_naturalist]#!"
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text Mindestens #V 5 Länder#! haben eine [concept_dubois_naturalist].#!"
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 20000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (derzeit [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sind weltweit gesammelt worden (derzeit [GetGlobalVariable('dubois_global_specimen').GetValue|0+]).#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "Erweitern Sie die [concept_dubois_zoo] (klein)"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine kleine Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind alle glücklich: Die Menschen verteilen sich im Zoo, die Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V insgesamt 10#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] . Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 2 afrikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 asiatische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) oder #V 2 ozeanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+])."
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName] wird #V derzeit nicht erweitert#! die [concept_dubois_zoo].#!"
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "Erweitern Sie die [concept_dubois_zoo] (mittel)"
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine mittlere Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind alle glücklich: Die Menschen verstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl ausländischer Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 20 insgesamt#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] . Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 5 afrikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 5 asiatische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]), #V 5 ozeanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]) oder #V 5 südamerikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_south_america').GetValue|0+]).#!"
 MR_EXTEND_ZOO_LARGE_BUTTON: "Erweitern Sie die [concept_dubois_zoo] (groß)"
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine große Fläche#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind alle glücklich: Die Menschen verstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_30_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 30 insgesamt#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] . Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Erweitern Sie die [concept_dubois_zoo] (berühmt)"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T Erweitern Sie den Zoo zu berühmter Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind alle glücklich: Die Menschen verstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V insgesamt 40#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] . Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]#!"
 MR_SPECIMEN_GARDEN_BUTTON: "Botanischer Garten gefunden"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Gefundener Botanischer Garten#!\n Ein Botanischer Garten in Ihrem Zoo wird ihm noch mehr Prestige verleihen. Wir können alle exotischen Pflanzen pflanzen, die unser [concept_dubois_naturalist] gesammelt hat. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 50000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (derzeit [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_SPECIMEN_GARDEN_NO_BOTANICAL_GARDEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat noch keine #V Botanical Garden#!.#!"
 MR_SPECIMEN_GARDEN_EFFECT_TT: "Dein [GetBuildingType('building_dubois_zoo').GetName] erhält eine #V Botanischer Garten#!, die dir 50 Prestige und einen kleinen Anstieg deines Lebensstandards beschert."
 MR_SPECIMEN_COLLECTION_BUTTON: "Fundstücksammlung"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Fundstücksammlung#!\nDie Bestellung all unserer exotischen Insekten, Schmetterlinge und anderer [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] würde der Welt zeigen, wie wissenschaftlich fortschrittlich unser Land ist.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetName] verfügt noch nicht über eine #V Probenentnahme#!.#!"
 MR_SPECIMEN_COLLECTION_EFFECT_TT: "Dein [GetBuildingType('building_dubois_zoo').GetName] erhält eine #V Probensammlung#!, die dir 50 Prestige und einen kleinen Forschungsschub verleiht."
 MR_BAN_ANIMAL_EXPORT_BUTTON: "Verbot der Ausfuhr von Tieren"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Tierexportverbot#!\nMit einem Tierexportverbot machen wir grundsätzlich klar, dass wir nicht bereit sind, unsere Tiere ins Ausland zu verkaufen. Andere Nationen werden von Anfragen absehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "Export von Tieren zulassen"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T Erlauben Sie die Ausfuhr von Tieren#!\nMit einer Ausfuhrgenehmigung für Tiere können wir ein nettes Zusatzeinkommen erzielen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_BUTTON: "Rasse-Tiere"
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T Züchten Sie Tiere in Ihrem Naturschutzgebiet#!\nVersuchen Sie, ein neues [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] [concept_dubois_habitat] in einem Staat mit einem [concept_dubois_nature_reserve] einzurichten. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text Sie können [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] züchten, wenn Sie einen Staat mit einem [concept_dubois_nature_reserve] haben, der das spezifische Tier aus derselben Region wie das #V Naturreservat#! noch nicht hat und wenn Sie dieses Tier in Ihrem [concept_dubois_zoo] haben.\nWenn Sie zum Beispiel ein #b Naturschutzgebiet#! in einem europäischen Staat haben und den #b Alpensteinbock#! darin züchten wollen, können Sie das nur tun, wenn der Staat noch keinen Steinbock [concept_dubois_habitat] hat und wenn Sie #b Alpensteinböcke#! in Ihrem #b Zoo#! haben.#!"
