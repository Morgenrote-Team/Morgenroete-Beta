 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON: "Bewerben Sie sich für Grand Prix Circuit" #deepl:4162560589
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON_TT: "#T Bewerben Sie sich für eine Grand-Prix-Strecke#!\nAls Mitglied des Internationalen Automobilverbands und Besitzer einer hochmodernen Rennstrecke können wir beantragen, dass unsere Strecke eine offizielle Grand-Prix-Strecke wird. Dann würden dort jedes Jahr Grand-Prix-Rennen stattfinden, was den Status der Strecke erheblich verbessern würde.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3606761117
