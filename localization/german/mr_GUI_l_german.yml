 MR_VENUS_TRANSIT_POSSIBLE_1874_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt inkorporiertes Land im [concept_verrier_venus_transit_zone], oder hat einen Untertan im [concept_verrier_venus_transit_zone], oder hat gute Beziehungen zu einem Land im [concept_verrier_venus_transit_zone]. Im letzteren Fall darf sich das Zielland nicht im Krieg befinden, nicht revolutionär sein und kein Untertan eines anderen Landes sein. Die Beziehungen müssen zumindest freundschaftlich sein." #deepl:2260965617

