 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Akademische Investitionen#!\nEine allgemeine staatliche Investition in unsere Universitäten wird den #O Akademischen Fortschritt#! um #G +1#! pro Monat erhöhen. Die Finanzierung ist für 10 Jahre vorgesehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:826984624
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "[GetPlayer.GetAdjective] nicht bereits in die Academia investiert." #deepl:2522459796

#Avantgarde Intelligentsia
 MR_ACADEMICS_AVANTGARDE_TT: "#T Avantgarde Intelligentsia#!\n Eine Clique von Akademikern mit klaren kulturellen, soziologischen und anthropologischen Vorstellungen bestimmt den wissenschaftlichen Alltag. Praktische Bereiche sind dagegen von untergeordneter Bedeutung.\n#R Hinweis#!: Erhöht das Erscheinungsbild der Akademiker um einen Punkt pro Monat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2225127001
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] hat noch nicht den #b Avantgarde Intelligentsia#! Fokus und hat seinen Fokus nicht kürzlich geändert.#!" #deepl:1049163708
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 50%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_humanities].#!" #deepl:1502953304
#Practical Academia
 MR_ACADEMICS_PRACTICAL_TT: "#T Praktische Academia#!\nDie Wissenschaftler in unserem Land sind unermüdlich bemüht, Entdeckungen aus allen Bereichen für den praktischen Alltag nutzbar zu machen. Dies soll dem allgemeinen Fortschritt und dem Frieden der Menschheit dienen.\n#R Hinweis#!: Erhöht das Aussehen der Akademiker um einen Punkt pro Monat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2936552864
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetName] hat den Schwerpunkt Practical Academia noch nicht und hat seinen Schwerpunkt in letzter Zeit auch nicht geändert. #b #!#!" #deepl:2972262694
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 50%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_natural_history].#!" #deepl:1607801676
#Military-Industrial Complex
 MR_ACADEMICS_MILITARY_TT: "#T Militärisch-industrieller Komplex#!\nDie Zusammenarbeit zwischen privaten Industriellen und dem Militär hat zur Entwicklung eines besonders bedeutenden Netzes von Verbindungen, persönlichen Beziehungen und Bekanntschaften geführt, mit einem nur sehr leichten Hauch von Korruption, das am besten als militärisch-industrieller Komplex beschrieben werden kann.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1851105478
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] hat noch nicht den #b Militärisch-Industrieller Komplex#! Fokus und hat seinen Fokus nicht kürzlich geändert.#!" #deepl:896993589
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 50%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_mathematics].#!" #deepl:410988697
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName] hat mindestens eine [GetBuildingType('building_war_machine_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plants').GetName] oder [GetBuildingType('building_artillery_foundries').GetName] der Stufe #p 5#! oder höher.#!" #deepl:4221785878
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text Die [GetPlayer.GetAdjective] Armee hat mindestens die Größe #b 50#! oder größer.#!" #deepl:2731854891
#Business Schools & Tycoon Capitalism
 MR_ACADEMICS_BUSINESS_TT: "#T Business Schools &amp; Tycoon Capitalism#!\nDas unabhängige Individuum in Verbindung mit einer prosperierenden Zeit des Fortschritts hat zu einer Mentalität geführt, in der Handelsschulen, mittelständische Unternehmen und Großkonzerne die Wissenschaft des Landes entscheidend prägen. Umgekehrt arbeiten die Universitäten daran, den erworbenen Wohlstand der Nation durch neue Technologien zu mehren und gesellschaftliche Ideen durch Fortschritt voranzutreiben.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:36462352
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] hat den #b Business Schools &amp; Tycoon Capitalism#! Fokus noch nicht und hat seinen Fokus nicht kürzlich geändert.#!" #deepl:2468336892
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_mathematics].#!" #deepl:395135460
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_humanities].#!" #deepl:248210757
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] hat entweder [GetBuildingType('building_textile_mills').GetName] oder [GetBuildingType('building_furniture_manufacturies').GetName] von mindestens Level #p 15#! oder entweder [GetBuildingType('building_tooling_workshops').GetName] oder [GetBuildingType('building_steel_mills').GetName] von mindestens Level #p 10#! oder entweder [GetBuildingType('building_motor_industry').GetName] oder [GetBuildingType('building_electrics_industry').GetName] von mindestens Level #p 5#!.#!" #deepl:1837086172
#Sea Power & Merchant Marine
 MR_ACADEMICS_SEAPOWER_TT: "#T Seemacht &amp; Handelsmarine#!\nDie Marine und der internationale Handel spielen für unser Land eine immense Rolle. Die Steigerung des Wohlstands durch fortschrittliche Produktion und weltweiten Handel mit unseren Produkten ist ebenso wichtig wie die Verteidigung des bereits Erreichten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2222018589
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] hat noch nicht den #b Sea Power &amp; Merchant Marine#! Fokus und hat seinen Fokus nicht kürzlich geändert.#!" #deepl:3021938836
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_mathematics].#!" #deepl:395135460
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_natural_history].#!" #deepl:3912868081
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text Die Marine [GetPlayer.GetAdjective] hat mindestens die Größe #b 50#! oder größer.#!" #deepl:3529425451
#Useful Ivory Tower
 MR_ACADEMICS_USEFUL_TT: "#T Nützlicher Elfenbeinturm#!\nDie Akademie gilt in unserem Land als Zufluchtsort für exzentrische Köpfe, die Käfer zählen, alte Vasen polieren und sich mit seltsamen Dingen beschäftigen. Es lässt sich jedoch nicht leugnen, dass die Abgeschiedenheit des Elfenbeinturms von der Gesellschaft auch ihre Vorteile hat. Ungestört arbeitet so mancher Professor besser.\n#R Hinweis#!: Erhöht das Aussehen von Akademikern um einen Punkt pro Monat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1179653177
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] hat noch nicht den #b Nützlicher Elfenbeinturm#! Fokus und hat seinen Fokus nicht kürzlich geändert.#!" #deepl:2500641973
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_humanities].#!" #deepl:248210757
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective] Universitäten haben die [concept_pm_academics_university_natural_history].#!" #deepl:3912868081
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] hat entweder ein [GetBuildingType('building_lepsius_archaeological_museum').GetName], ein [GetBuildingType('building_verrier_observatory').GetName] oder ein [GetBuildingType('building_dubois_zoo').GetName].#!" #deepl:1809313750

#Mountain Expedition
 MR_MOUNTAIN_EXPEDITION_TT: "#T Gebirgsexpedition#!\nMit der Besteigung des Mont Blanc im Jahr 1786 begann eine neue Ära der Eroberung der höchsten Gipfel der Erde; ein Trend, der sich im 19. und 20. Jahrhundert nur noch verstärkte. Sollten wir in einem unserer Territorien ein Gebirge haben, das noch nicht bestiegen wurde, könnten wir die Eroberung an einen fähigen General mit den entsprechenden Fähigkeiten delegieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3756771545
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen #V Unbezwungenen Gipfel#! oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die einen solchen besitzt.#!" #deepl:3069787983
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [concept_general] mit einer dieser Eigenschaften: #V Bergsteiger#!, #V Entdecker#!, #V Gebirgsjäger#! oder #V Landvermesser#!.#!" #deepl:3611508796
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat nicht vor kurzem erfolgreich einen neuen Berg erreicht oder eine Bergexpedition nicht bestanden.#!" #deepl:627095544

#Zeppelin Expedition
 MR_ZEPPELIN_EXPEDITION_TT: "#T Zeppelin-Expedition#!\nDie Aeroarctic, die "Internationale Studiengesellschaft zur Erforschung der Arktis durch Luftschiffe", war eine nichtstaatliche wissenschaftliche Vereinigung, die sich den Einsatz von Luftschiffen in der Polarforschung zum Ziel gesetzt hatte. Sie wurde hauptsächlich auf Initiative des Aeronauten und späteren Generalsekretärs der Gesellschaft, Walther Bruns, gegründet. Gründungspräsident im Jahr 1924 war Fridtjof Nansen. Nach mehrjähriger Vorbereitungsarbeit gelang es der Gesellschaft 1931, erstmals ein Luftschiff für eine rein wissenschaftliche Polarexpedition einzusetzen. Durch die Arktisfahrt des LZ 127 Graf Zeppelin wurde das Wissen über die Geographie der überflogenen Polargebiete wesentlich erweitert. Bereits 1926 überflog Umberto Nobile mit seinem Luftschiff "Norge" den Nordpol und unternahm später eine Expedition mit der "Italia". [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4203695765
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_verrier_observatory').GetName] mit der #V Wetterstation Produktionsmethode#!.#!" #deepl:1725101232
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt entweder einen [concept_curtiss_airspace_convention] oder hat Zugang zu einem dieser Staaten: #V Grönland#!, #V Nordnorwegen#!, #V Alaska#!, #V Nunavut #! oder #V Nenetsia#!.#!" #deepl:3275159917
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist nicht #V auf einer Zeppelin Expedition#! oder #V hatte kürzlich eine#!.#!" #deepl:3586732072

#Pacific Expedition
 MR_PACIFIC_EXPEDITION_TT: "#T Pazifik-Expedition#!\nNeben den Polen ist der Pazifische Ozean eines der letzten Gebiete der Erde, das noch Geheimnisse birgt. Wissenschaftler aus verschiedenen Disziplinen sind an einer Forschungsmission interessiert, um naturwissenschaftliche, paläontologische, astronomische und ozeanografische Studien durchzuführen. Für die Großmächte wiederum könnte es eine prestigeträchtige Angelegenheit sein, um ihren Einfluss am Ende der Welt zu demonstrieren.\n\n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4158357150
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist entweder eine #V Großmacht#! oder eine #V Großmacht#!.#!" #deepl:239417310
 MR_PACIFIC_PORT_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_port').GetName].#!" #deepl:1150266156
 MR_PACIFIC_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_university').GetName].#!" #deepl:967905573
 MR_PACIFIC_15_FLOTILLAS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 15 oder mehr Flottilas#!.#!" #deepl:3665873738
 MR_PACIFIC_ADMIRAL_AVAILABLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat einen #V Admiral#! der #V nicht beschäftigt ist#!.#!" #deepl:1036146523
 MR_PACIFIC_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist nicht #V auf einer Pazifik-Expedition#! oder #V hatte kürzlich eine#!.#!" #deepl:1836738775

