 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "Riesenflugzeug"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T Riesenflugzeug#!\nDer Himmel ist die letzte Grenze. Was einst das Zeitalter der Entdeckungen in der frühen Neuzeit war, ist heute die Eroberung des Himmels. Doch im Vergleich zu den Galeonen der Spanier sind die Himmelsschiffe von heute nur noch Nussschalen. Ozeanriesen befahren heute die Meere, aber der Himmel wird bisher nur von kleinen Maschinen beherrscht. Der Traum vom Bau eines gigantischen Flugzeugs, das nicht nur Dutzende, sondern Hunderte von Menschen transportieren kann, scheint utopisch zu sein. Doch eine florierende Flugzeugindustrie und eine mächtige Fluggesellschaft unter der Führung des richtigen Mannes könnten die Welt auf den Kopf stellen...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
