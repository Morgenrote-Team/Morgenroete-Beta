 MR_SCHOOL_SPORTS_BUTTON: "Schulsport einführen"
 MR_SCHOOL_SPORTS_BUTTON_TT: "#T Einführung des Schulsports in [GetPlayer.GetName]#! \nMit der Einführung des Schulsports können wir die allgemeine Chance erhöhen, dass Persönlichkeiten mit Athleteneigenschaften zur Verfügung stehen und die Chancen bei den Olympischen Spielen verbessern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
