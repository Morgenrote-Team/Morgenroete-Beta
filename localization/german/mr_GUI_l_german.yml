 MR_VENUS_TRANSIT_1874_EXPEDITION_BUTTON_TT: "#T Beobachten Sie den Venustransit#!\nDie Beobachtung des Venustransits, eines der bedeutendsten astronomischen Ereignisse des 19. Jahrhunderts, ist in den Jahren 1872 und 1884 möglich. Zwei Jahre vor dem Zieljahr können die Vorbereitungen getroffen werden, um diese Gelegenheit nicht zu verpassen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
