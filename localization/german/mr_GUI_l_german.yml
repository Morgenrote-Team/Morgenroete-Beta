 VISIT_ANTHROPOLOGICAL_COLLECTION_BUTTON_TT: "#T Besuchen Sie die Anthropologische Sammlung#!\nEine Sammlung von [Concept('concept_lepsius_human_fossil','Menschlichen Fossilien ')] und eine Übersicht über frühe klassifizierte vormenschliche Arten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
