 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Das Transatlantikkabel#!\nDie Telegrafie ermöglicht den Austausch von Informationen in einer bisher unbekannten Geschwindigkeit. Durch die Einrichtung einer Telegrafenstation auf beiden Seiten des Atlantiks besteht die Möglichkeit, ein unterseeisches Telegrafenkabel zu verlegen, um Europa und Amerika einander näher zu bringen. Dies erfordert jedoch eine geeignete Ausrüstung und einen entwickelten Nachrichtendienst, der erhebliche Investitionen tätigen würde, um ein solch kostspieliges Unterfangen lukrativ zu machen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
