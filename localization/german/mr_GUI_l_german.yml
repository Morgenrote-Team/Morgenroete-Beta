 VISIT_SCIENTIFIC_SOCIETY_BUTTON_TT: "#T Besuchen Sie die Wissenschaftliche Gesellschaft#!\nDie [concept_academics_scientific_society] bietet einen Überblick über Ihre [Concept('concept_academics_academic','$concept_academics_academics$')] und deren Leistungen und die wissenschaftlichen Theoreme.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_SCIENTIFIC_SOCIETY_TRIGGER_TT: "#default_text Sie sind #V derzeit nicht#! der Wissenschaftlichen Gesellschaft #V #! .#!"
