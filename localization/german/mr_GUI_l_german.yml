 DINOSAUR_BONE_VAR_TT: "[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] found by [GetPlayer.GetName]:\n#yellow Africa:#!\n[GetPlayer.MakeScope.Var('dubois_african_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_african_dinosaur_bone_total').GetValue|V0] (total)\n#yellow Asia:#!\n[GetPlayer.MakeScope.Var('dubois_asian_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_asian_dinosaur_bone_total').GetValue|V0] (total)\n#yellow Australia:#!\n[GetPlayer.MakeScope.Var('dubois_australian_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_australian_dinosaur_bone_total').GetValue|V0] (total)\n#yellow Europe:#!\n[GetPlayer.MakeScope.Var('dubois_european_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_european_dinosaur_bone_total').GetValue|V0] (total)\n#yellow North America:#!\n[GetPlayer.MakeScope.Var('dubois_north_american_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_north_american_dinosaur_bone_total').GetValue|V0] (total)\n#yellow South America:#!\n[GetPlayer.MakeScope.Var('dubois_south_american_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_south_american_dinosaur_bone_total').GetValue|V0] (total)\n#yellow General:#!\n[GetPlayer.MakeScope.Var('dubois_general_dinosaur_bone').GetValue|V0] (unused) / [GetPlayer.MakeScope.Var('dubois_general_dinosaur_bone_total').GetValue|V0] (total)"
 MR_AUTOMATE_PALEONTOLOGIST_TT: "#T  [concept_dubois_paleontologist]#! automatisieren \nSie müssen Ihren Paläontologen keine Aufgaben mehr geben, wenn Sie sie automatisieren.\nSie werden selbstständig arbeiten und Aufgaben ausführen, die im Moment sinnvoll sind. Sie müssen weiterhin abrufen oder einrichten. Sie werden auch weiterhin Ereignisse erhalten. [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')]"
 mr_paleontology_automation_gui_tt: "Starten Sie die Automatisierung der Aufgaben der [concept_dubois_paleontologist]."
 mr_stop_paleontology_automation_gui_tt: "Stoppen Sie die Automatisierung der Aufgaben von [concept_dubois_paleontologist]."
 MR_STOP_AUTOMATE_PALEONTOLOGIST_TT: "#T Stoppen Sie die Automatisierung von [concept_dubois_paleontologist]#! \nIhr Paläontologe wird nicht mehr automatisiert sein.\nSie werden selbstständig arbeiten und Aufgaben ausführen, die im Moment sinnvoll sind. Sie müssen weiterhin [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] abrufen oder [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')] einrichten. Sie werden auch weiterhin Ereignisse erhalten."
