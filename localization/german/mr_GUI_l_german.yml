 MR_FIFA_BUTTON: "Internationaler Fußballverband (Fédération Internationale de Football Association)"
 MR_FIFA_BUTTON_TT: "#T Gründung der FIFA#!\nDa die Zahl der Länderspiele mit der Ausbreitung des Fußballs zunahm, entstand der Bedarf an einem weltweiten Dachverband. Die FIFA (französisch: Fédération Internationale de Football Association) ist ein internationaler Selbstregulierungsverband für Vereinsfußball, Futsal und Beach Soccer. Sie ist eine der ältesten und größten Nichtregierungsorganisationen der Welt und wurde am 21. Mai 1904 gegründet. Die Gründung der FIFA ermöglicht internationale Spiele zwischen einzelnen Nationen, deren Trainer sich durch gewonnene Spiele verbessern können. Dies wird schließlich zur Einrichtung einer Weltmeisterschaft führen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_TRIGGER_TT: "#default_text Es gibt mindestens #G 6#! Länder mit einem Fußballverband.#!"
