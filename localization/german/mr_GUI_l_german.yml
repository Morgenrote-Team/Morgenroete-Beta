 MR_BAN_ANIMAL_EXPORT_BUTTON: "Verbot der Ausfuhr von Tieren" #deepl:2163468533
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Tierexportverbot#!\nMit einem Tierexportverbot machen wir grundsätzlich klar, dass wir nicht bereit sind, unsere Tiere ins Ausland zu verkaufen. Andere Nationen werden von Anfragen absehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:243840645
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "Export von Tieren zulassen" #deepl:1927643491
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T Erlauben Sie die Ausfuhr von Tieren#!\nMit einer Ausfuhrgenehmigung für Tiere können wir ein nettes Zusatzeinkommen erzielen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1845031089
 MR_BREEDING_ANIMALS_BUTTON: "Rasse-Tiere" #deepl:3668108273
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T Züchten Sie Tiere in Ihrem Naturschutzgebiet#!\nVersuchen Sie, ein neues [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] [concept_dubois_habitat] in einem Staat mit einem [concept_dubois_nature_reserve] einzurichten. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3201693338
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text Sie können [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] züchten, wenn Sie einen Staat mit einem [concept_dubois_nature_reserve] haben, der das spezifische Tier aus derselben Region wie das #V Naturreservat#! noch nicht hat und wenn Sie dieses Tier in Ihrem [concept_dubois_zoo] haben.\nWenn Sie zum Beispiel ein #b Naturschutzgebiet#! in einem europäischen Staat haben und den #b Alpensteinbock#! darin züchten wollen, können Sie das nur tun, wenn der Staat noch keinen Steinbock [concept_dubois_habitat] hat und wenn Sie #b Alpensteinböcke#! in Ihrem #b Zoo#! haben.#!" #deepl:3415756356

