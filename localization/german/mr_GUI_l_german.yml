 MR_PALEONTOLOGICAL_EXPEDITION_NOT_TRAVELLING_TRIGGER: "#default_text Die [GetPlayer.GetAdjective] [concept_dubois_paleontologist] ist #V derzeit nicht unterwegs#!.#!"
 MR_ACTIVE_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] hat einen [concept_dubois_paleontologist] der #V nicht beschäftigt ist#!.#!"
 MR_PALEONTOLOGICAL_EXPEDITION_HAS_ACCESS_FORMATION_TRIGGER: "#default_text [GetPlayer.GetName] hat entweder direkten Zugang zu einem [Concept('concept_dubois_formation','$concept_dubois_geological_formation$')] oder verfügt über ein [concept_dubois_paleontological_licence].#!"
 MR_PALEONTOLOGICAL_EXPEDITION_NOT_CHOOSING_CURRENTLY_TRIGGER: "#default_text [GetPlayer.GetName] ist #V derzeit nicht dabei, eine paläontologische Expedition#! zu senden.#!"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "Paläontologische Expedition zurückrufen"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Rückruf Paläontologische Expedition#!\nDer Paläontologe zieht sich von seiner paläontologischen Untersuchung zurück, um sich anderen Aufgaben zu widmen - wie dem Bau oder der Umgestaltung von Dinosaurierskeletten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_BUTTON: "Dinosaurier-Skelett konstruieren"
 MR_MOUNT_SKELETON_BUTTON_TT: "#T Baue ein Dinosaurierskelett#!\n Dein [concept_dubois_paleontologist] kann ein neues [concept_dubois_dinosaur_skeleton] mit 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] aus demselben Kontinent bauen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text Sie sind noch nicht #V Sie überlegen, eine [concept_dubois_dinosaur_skeleton]#! zu erstellen.#!"
 MR_MOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] von einem Kontinent, von dem wir noch nicht alle [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] haben#!.#!"
 MR_REMOUNT_SKELETON_BUTTON: "Dinosaurier-Skelett ummontieren"
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T Dinosaurierskelett remontieren#!\nWenn Sie ein unvollkommenes [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] haben, können Sie Ihr [concept_dubois_paleontologist] versuchen lassen, es zu remontieren. Wenn Ihr Paläontologe erfahren genug ist, könnte das neu montierte Skelett von besserer Qualität sein.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_REMOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text Sie sind noch nicht #V Sie erwägen, eine [concept_dubois_dinosaur_skeleton]#! zu remounten.#!"
 MR_REMOUNT_SKELETON_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] hat eine [concept_dubois_paleontologist] die #V nicht besetzt oder erschöpft ist#!.#!"
 MR_REMOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat mindestens einen #V unvollkommenen#! [concept_dubois_dinosaur_skeleton] .#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON: "Vom Fossil zum Knochen"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T Fossilien in einen Knochen umwandeln#!\nEin erfahrener oder berühmter [concept_dubois_paleontologist] kann 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] in einen [concept_dubois_dinosaur_bone] umwandeln, wenn du bereits mindestens einen Knochen besitzt und nicht zu viele Knochen von jedem Kontinent hast.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSFORM_FOSSILS_TO_BONES_TRANSFORMABLE_DINOSAUR_BONE_TRIGGER: "#default_text [GetPlayer.GetName] hat bereits #V mindestens 1#! [concept_dubois_dinosaur_bone] und hat #V noch nicht alle notwendigen Bones von jedem Kontinent#!.#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_FOSSILS_TRIGGER: "#default_text [GetPlayer.GetName] hat #V 20 oder mehr#! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] .#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] hat einen erfahrenen oder berühmten [concept_dubois_paleontologist], der im Moment nicht beschäftigt ist.#!"
 MR_EXTINCTION_CONGRESS_BUTTON: "Kongress zum Thema Aussterben"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Aussterbekongress#!\nEines der rätselhaftesten Rätsel der Naturgeschichte bleibt das Verschwinden der Dinosaurier. Der Vater der Paläontologie, Georges Cuvier, entdeckte, dass es am Ende der Kreidezeit ein Massenaussterben gegeben hatte, bei dem auch die Dinosaurier ausstarben. Aber wie konnten die grausamen Echsen, die Millionen Jahre lang die Erde beherrschten, plötzlich überflüssig werden?[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_PALEONTOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [concept_dubois_paleontologist].#!"
 MR_EXTINCTION_CONGRESS_15_PALEONTOLOGISTS_TRIGGER_TT: "#default_text 15 Länder haben eine [concept_dubois_paleontologist]#!"
 MR_EXTINCTION_CONGRESS_HAS_DINOSAUR_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat mindestens #p 1#! @dubois_dinosaur_skeleton! [concept_dubois_dinosaur_skeleton].#!"
 MR_EXTINCTION_CONGRESS_5_COUNTRIES_DINOSAUR_SKELETON_TRIGGER_TT: "#default_text Mindestens #V 5 Länder#! haben mindestens #p 1#! @dubois_dinosaur_skeleton! [concept_dubois_dinosaur_skeleton].#!"
 MR_EXTINCTION_CONGRESS_GLOBAL_FOSSIL_TT: "#default_text Mindestens #V 500#! @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] wurden weltweit gefunden (aktuell [GetGlobalVariable('dubois_global_fossil').GetValue|+0] @dubois_fossil! wurden gefunden)#!"
