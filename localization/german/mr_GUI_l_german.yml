 MR_VISIT_ANTHROPOLOGICAL_COLLECTION_REQUIREMENTS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat entweder ein [concept_lepsius_anthropologist] oder [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')].#!"
