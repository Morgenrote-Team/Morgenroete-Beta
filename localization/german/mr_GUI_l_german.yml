 MR_ACADEMICS_PROMOTE_ENGINEER_EFFECT_TT: "Ihr nächster Wissenschaftler wird ein [concept_tesla_engineer] sein."
 MR_ACADEMICS_PROMOTE_ASTRONOMER_EFFECT_TT: "Ihr nächster Wissenschaftler wird ein [concept_verrier_astronomer] sein."
