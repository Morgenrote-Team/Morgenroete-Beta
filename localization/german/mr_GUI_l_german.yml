 MR_RED_CROSS_BUTTON: "[concept_panum_red_cross] gründen"
 MR_RED_CROSS_BUTTON_TT: "#T Gründung des [Concept('concept_panum_red_cross','Roten Kreuzes')]#!\nDas Internationale Rote Kreuz ist eine der ersten supranationalen Institutionen. Die Gründung dieser Organisation war ein wichtiger Schritt in Richtung Völkerrecht. Sie wurde gegründet, um menschliches Leben und Gesundheit zu schützen, die Achtung aller Menschen zu gewährleisten und menschliches Leid zu verhindern und zu lindern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat weniger als #V 35 [concept_infamy]#!.#!"
 MR_JOIN_RED_CROSS_BUTTON: "Beitritt zum [Concept('concept_panum_red_cross','Roten Kreuz')]"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T Treten Sie dem [Concept('concept_panum_red_cross','Roten Kreuz')] bei#!\nUnser Land kann dem Internationalen Roten Kreuz beitreten und sein Ansehen durch internationale Vereinbarungen verbessern - auf Kosten einer rücksichtslosen Kriegsführung.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_FIRST_CONVENTION_BUTTON: "Erste Konvention unterzeichnen"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Unterzeichnung der Ersten Konvention#!\nDie Erste Genfer Konvention, offiziell das Übereinkommen zur Verbesserung des Loses der Verwundeten der im Felde befindlichen Heere, legt 'die Grundlage fest, auf der die Regeln des Völkerrechts zum Schutz der Opfer bewaffneter Konflikte beruhen'. Eine ihrer wichtigsten Bestimmungen ist die Immunität aller Einrichtungen zur Behandlung verwundeter und kranker Soldaten vor Gefangennahme und Zerstörung sowie die unparteiische Aufnahme und Behandlung aller Kombattanten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "Zweite Konvention unterzeichnen"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T Unterzeichnung der Zweiten Konvention#!\nDie Haager Konventionen von 1899 und 1907 sind eine Reihe von internationalen Verträgen und Erklärungen, die auf zwei internationalen Friedenskonferenzen in Den Haag in den Niederlanden ausgehandelt wurden. Beide Konferenzen umfassten Verhandlungen über Abrüstung, Kriegsrecht und Kriegsverbrechen. Die Konferenz von 1907 konzentrierte sich verstärkt auf die Seekriegsführung.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Dritte Konvention unterzeichnen"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Unterzeichnung der Dritten Konvention#!\nDas Protokoll über das Verbot der Verwendung von erstickenden, giftigen oder anderen Gasen sowie von bakteriologischen Mitteln im Kriege, das üblicherweise als Genfer Protokoll bezeichnet wird, ist ein Vertrag, der den Einsatz von chemischen und biologischen Waffen in internationalen bewaffneten Konflikten verbietet. Es wurde am 17. Juni 1925 in Genf unterzeichnet.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_RED_CROSS_BUTTON: "Verlassen Sie das Rote Kreuz"
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T Verlassen Sie das Rote Kreuz#!\nHomo homini lupus.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T Einführung medizinischer Techniken#!\nWeist den Arzt an, moderne Geräte, Methoden und neuartige Behandlungsverfahren in medizinischen Einrichtungen im ganzen Land einzuführen. Manchmal kann ein Arzt spektakuläre neue Erfindungen entwickeln.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_ACTIVE_TT: "#T Einführung medizinischer Techniken#!\nIhr Arzt führt derzeit moderne Geräte, Methoden und neuartige Behandlungen in medizinischen Einrichtungen im ganzen Land ein. Manchmal kann ein Arzt spektakuläre neue Erfindungen entwickeln."
