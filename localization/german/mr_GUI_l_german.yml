 MR_ARCHAEOLOGY_5_COUNTRIES_WITH_ARCHAEOLOGIST_TRIGGER_TT: "#default_text 5 oder mehr Länder haben einen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')].#!"
 MR_ARCHAEOLOGY_10_COUNTRIES_WITH_ARCHAEOLOGIST_TRIGGER_TT: "#default_text 10 oder mehr Länder haben einen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')].#!"
 MR_ARCHAEOLOGY_15_COUNTRIES_WITH_ARCHAEOLOGIST_TRIGGER_TT: "#default_text 15 oder mehr Länder haben einen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')].#!"
 MR_UPPER_EGYPT_EXPEDITION_TT: "#T Schicken Sie eine Expedition ins Tal der Könige#!\nMit der alten Hauptstadt Theben und dem Tal der Könige gilt Oberägypten als das Mekka der Ägyptologie. Wir sollten eine Ausgrabungslizenz für das Gebiet erwerben und nach ägyptischen Schätzen suchen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Lepsius schrieb einen Brief an Rosellini#!, mit dem die Archäologie in Ägypten begann.#!"
 MR_UPPER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V finanziert derzeit keine#! [concept_lepsius_expedition] nach Oberägypten.#!"
 MR_UPPER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder #V Eigentümer des Staates Oberägypten#! oder hat eine [concept_lepsius_excavation_licence] von seinem Eigentümer.#!"
 MR_LOWER_EGYPT_EXPEDITION_TT: "#T Schicken Sie eine Expedition zu den Pyramiden#!\nSeit Anbeginn der Zeit haben die ägyptischen Pyramiden die Menschheit fasziniert. Man sagt, dass weitere Gräber, Tempel und sogar Städte, die im Sand von Unterägypten verschwunden sind, darauf warten, wiederentdeckt zu werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V finanziert derzeit keine#! [concept_lepsius_expedition] nach Unterägypten.#!"
 MR_LOWER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder #V Eigentümer des Staates Unterägypten#! oder hat eine [concept_lepsius_excavation_licence] von seinem Eigentümer.#!"
 MR_BABYLONIA_EXPEDITION_TT: "#T Schicken Sie eine Expedition in die Wiege der Zivilisation#!\nBabylonien, der südliche Teil Mesopotamiens, verdankt seinen Namen der einst mächtigen Stadt Babylon. Die Region gilt als \"Wiege der Zivilisation\", in der immer wieder wertvolle archäologische Artefakte entdeckt werden. Sie gehören definitiv in ein Museum.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Die akkadische Sprache wurde entschlüsselt#!, was die Archäologie in Mesopotamien ermöglicht.#!"
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V finanziert derzeit keine#! [concept_lepsius_expedition] nach Babylonien.#!"
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder #V Eigentümer des Staates Bagdad#! oder hat eine [concept_lepsius_excavation_licence] von seinem Eigentümer.#!"
 MR_ASSYRIA_EXPEDITION_TT: "#T Schicken Sie eine Expedition in die Gärten von Assyrien#!\nAssyrien bezeichnet den nördlichen Teil Mesopotamiens mit den beiden bedeutenden Städten Assur und Ninive. Das spärliche Wissen über das Land lässt sich immer noch auf die Bibel als Quelle zurückführen - aber vielleicht gibt es ja historische Belege, die zuverlässiger sind?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V finanziert derzeit keine#! [concept_lepsius_expedition] nach Assyrien.#!"
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder #V Eigentümer des Staates Mossul#! oder hat eine [concept_lepsius_excavation_licence] von seinem Eigentümer.#!"
 MR_ARGOLIS_EXPEDITION_TT: "#T Schicken Sie eine Expedition zu Agamemnons Stadt#!\nNach der Entdeckung von Troja wird selbst skeptischen Wissenschaftlern klar, dass die Mythen der alten Griechen mehr als nur Märchen sind. In der Argolis sollen bis heute die Überreste bronzezeitlicher Städte liegen, die bekannteste davon ist Mykene. Davon sollten wir uns selbst überzeugen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Schliemann entdeckte Troja#! und ermöglichte die Archäologie in Griechenland.#!"
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V finanziert derzeit keine#! [concept_lepsius_expedition] nach Argolis.#!"
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder #V Eigentümer des Staates Peloponnes#! oder hat eine [concept_lepsius_excavation_licence] von seinem Eigentümer.#!"
 MR_CRETE_EXPEDITION_TT: "#T Schicken Sie eine Expedition zu den Palästen von Kreta#!\nDer legendäre König Minos soll einst über Kreta geherrscht haben. Ähnlich wie bei Troja und Mykene scheint auch an dieser Geschichte etwas dran zu sein: Auf der Insel werden zunehmend Artefakte aus der legendären minoischen Kultur gefunden. Auch unser Land sollte sich einige davon sichern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V finanziert derzeit keine#! [concept_lepsius_expedition] nach Kreta.#!"
 MR_CRETE_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder #V Eigentümer des Staates Kreta#! oder hat eine [concept_lepsius_excavation_licence] von seinem Eigentümer.#!"
 MR_YUCATAN_EXPEDITION_TT: "#T Schicken Sie eine Expedition zu den verlorenen Städten der Maya#!\nDie Berichte über unbekannte und riesige Städte mitten im Dschungel nehmen zu. Wir sollten weiter nachforschen und eine archäologische Expedition nach Yucatán schicken.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Stephens & Catherwood unternahmen eine Expedition#!, die Archäologie in Yucatán ermöglichte.#!"
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V finanziert derzeit keine#! [concept_lepsius_expedition] nach Yucatán.#!"
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder #V Eigentümer des Staates Yucatán#! oder hat eine [concept_lepsius_excavation_licence] von seinem Eigentümer.#!"
 MR_PERU_EXPEDITION_TT: "#T Schicken Sie eine Expedition auf die Suche nach dem verborgenen Erbe der Inkas#!\nPiloten berichten von seltsamen Festungen und ummauerten Strukturen in den Anden, die sie bei ihren Flügen über Peru gesehen haben. Vielleicht haben die Spanier die Kultur der Inkas nicht vollständig zerstört? Einige Städte des indigenen Widerstands sind bis heute nicht gefunden worden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Bingham entdeckte Machu Picchu#! und ermöglichte die Archäologie in Peru.#!"
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] #V finanziert derzeit keine#! [concept_lepsius_expedition] nach Peru.#!"
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder #V Eigentümer des Staates $STATE_ICA$#! oder hat eine [concept_lepsius_excavation_licence] von seinem Eigentümer.#!"
 MR_EXODUS_CONGRESS_BUTTON: "Kongress über den Exodus"
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T Kongress über den Exodus#!\nMit der zunehmenden Erforschung Ägyptens und der Levante stellt sich die Frage nach der Historizität der biblischen Ereignisse erneut. Insbesondere die Nichterwähnung des Exodus, d.h. des Auszugs der Hebräer aus Ägypten, hat die Frage aufgeworfen, ob die Fünf Bücher Mose nicht nur bloße Erfindungen sind. Radikale Wissenschaftler fordern sogar, dass alle biblischen Geschichten völlig ignoriert werden sollten. Eine andere Gruppe argumentiert, dass die biblischen Geschichten nicht wörtlich genommen werden können, aber dennoch einen wissenschaftlichen Wert haben.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetAltName('NOM')] benötigt mindestens #V 25#! @lepsius_egypt_minor! ägyptische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (derzeit [GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+]).#!"
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Mindestens #V 150#! @lepsius_egypt_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] wurden weltweit gefunden (aktuell [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_egypt_minor! wurden gefunden).#!"
 MR_CIVILIZATION_CONGRESS_BUTTON: "Kongress zur Zivilisation"
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T Kongress zur Entstehung der Zivilisation#!\nJahrhunderte lang glaubte man nicht nur in Europa, sondern auch in anderen Ländern des Mittelmeerraums und des Nahen Ostens, dass Ägypten die älteste Zivilisation sei. Doch mit der täglichen Zunahme von Funden aus Assyrien und Babylonien ist diese Theorie deutlich erschüttert worden. Vielmehr stellt sich heraus, dass die Schrift offenbar in Mesopotamien erfunden wurde - wie viele andere Errungenschaften, die mit dem Beginn der Zivilisation einhergingen. Ist es vielleicht so, dass jede Zivilisation letztlich aus Babylon hervorgegangen ist - und jede Form von Religion sich von babylonischen Mythen ableitet? Ist das Gilgamesch-Epos vielleicht die Inspiration für jede Art von Literatur - von der Bibel bis zu den homerischen Epen?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetAltName('NOM')] benötigt mindestens #V 25#! @lepsius_mesopotamia_minor! mesopetanische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (derzeit [GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+]).#!"
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Mindestens #V 300#! @lepsius_mesopotamia_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] wurden weltweit gefunden (aktuell [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_mesopotamia_minor! wurden gefunden).#!"
 MR_TROY_CONGRESS_BUTTON: "Kongress über Troja"
 MR_TROY_CONGRESS_BUTTON_TT: "#T Kongress über Troja#!\nSchliemann hat Troja gefunden. Zumindest behauptet er das. Obwohl die kritischen Stimmen, die Troja für eine bloße Erfindung hielten, verstummt sind, bleibt eine ganze Reihe von Fragen offen. Ist das von Schliemann gefundene Troja das homerische Troja? Und was war Troja überhaupt? Eine Reihe von Wissenschaftlern bleibt skeptisch. Und neue Funde aus Anatolien könnten ein ganz neues Licht auf die Entdeckungen werfen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetAltName('NOM')] benötigt mindestens #V 25#! @lepsius_aegean_minor! ägäische [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] (derzeit [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+]).#!"
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Mindestens #V 300#! @lepsius_aegean_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] wurden weltweit gefunden (aktuell [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_aegean_minor! wurden gefunden).#!"
 MR_INSPECT_EXCAVATION_BUTTON: "Ausgrabung inspizieren"
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T Ausgrabungen inspizieren#!\nWir können einen erfahrenen Archäologen in ein Gebiet schicken, in dem wir Ausgrabungen durchführen, um unsere Bemühungen dort zu intensivieren. Unser Archäologe wird in etwa einem Jahr eine neue Ausgrabungsstätte erschließen und intensive Untersuchungen durchführen, bei denen wir weitere Hinweise auf bisher unbekannte, bedeutende archäologische Entdeckungen finden können. Der Erfolg hängt weitgehend von der Erfahrung unseres Archäologen ab. Auch die Gründung einer Archäologischen Gesellschaft erhöht unsere Chancen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V mindestens eine laufende [concept_lepsius_excavation]#! in einem Gebiet, in dem noch keine größeren archäologischen Funde gemacht wurden.#!"
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] muss #V mindestens 30 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]#! in einer bestimmten Region studiert haben, bevor es dort auf Spurensuche gehen kann.#!"
 MR_CANCEL_EXCAVATION_BUTTON: "Ausgrabung abbrechen"
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T Ausgrabung abbrechen#!\nIn manchen Situationen kann es sinnvoll sein, ein Ausgrabungsteam zurückzurufen. Unsere erworbenen Artefakte und Sammlungen bleiben erhalten, aber unsere permanente Ausgrabung wird beendet.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens #V 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')], das eine [concept_lepsius_excavation].#!"
 MR_LOCAL_EXCAVATION_BUTTON: "Lokale Ausgrabung"
 MR_LOCAL_EXCAVATION_BUTTON_TT: "#T Lokale Ausgrabung#!\nArchäologische Schätze warten nicht nur in der Ferne darauf, entdeckt zu werden. Lokale Ausgrabungen gelten zwar als weniger prestigeträchtig als die Suche nach den berühmten Artefakten, geben aber einen Einblick in die meist prähistorische Epoche unserer Heimatregion. Im Gegensatz zu Ausgrabungen im Anschluss an eine Expedition können lokale Ausgrabungen erst abgeschlossen werden, wenn die Finanzierung ausläuft.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGICAL_MUSEUM_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat ein [GetBuildingType('building_lepsius_archaeological_museum').GetName].#!"
 MR_LITERACY_RATE_33_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine [concept_literacy] #V Rate von 33%#! oder höher.#!"
 MR_LITERACY_RATE_66_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine [concept_literacy] #V von 66%#! oder höher.#!"
 MR_ARCHAEOLOGY_EXPERIENCED_ARCHAEOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen #V Erfahrenen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]#!.#!"
 MR_ARCHAEOLOGY_FAMOUS_ARCHAEOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen #V Berühmten [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]#!.#!"
 MR_FIRST_EXCAVATION_TEAM_BUTTON: "Erstes archäologisches Team"
 MR_FIRST_EXCAVATION_TEAM_BUTTON_TT: "#T Erstes archäologisches Team#!\nWir können ein zusätzliches Team von Archäologen ausbilden. Das bedeutet, dass mehrere Ausgrabungen gleichzeitig möglich sind.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
