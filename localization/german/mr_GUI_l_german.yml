 MR_FOUND_ASYLUM_BUTTON_TT: "#T Gründung einer psychiatrischen Anstalt#!\nDie Trennung von Sträflingen in einem Gefängnis und psychisch gestörten Menschen in einer separaten Einrichtung war ein erster Schritt zur modernen Psychiatrie. Eine spezialisierte psychiatrische Anstalt wird dazu beitragen, dass diejenigen, die Hilfe brauchen, an einem besseren Ort untergebracht werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
