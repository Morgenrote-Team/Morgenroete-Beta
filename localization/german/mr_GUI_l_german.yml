 MR_NATURALIST_IMPROVE_FORESTRY_BUTTON_TT: "#T Forstwirtschaft verbessern#!\nIhr Naturforscher kann seine Fertigkeiten einsetzen, um die Wälder Ihres Landes zu verbessern, wodurch eines Ihrer [GetBuildingType('building_logging_camp').GetName] verbessert wird.\n\nModifikatoren, die das Gebäude erhält:\n$dubois_building_throughput_add_modifier_with_tooltip$\n$dubois_building_production_mult_modifier_with_tooltip$\n$dubois_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_IMPROVE_FORESTRY_TRIGGER_TT: "#default_text Mindestens ein [GetBuildingType('building_logging_camp').GetName] Gebäude der Stufe 1 oder höher verfügt nicht über alle drei [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_IMPROVE_FORESTRY_ACTIVE_TT: "#T Verbessern Sie die Forstwirtschaft#!\n#p Ihr Naturforscher ist gerade dabei, [GetBuildingType('building_logging_camp').GetName] zu verbessern.#!"
 MR_NATURALIST_IMPROVE_RUBBER_BUTTON_TT: "#T Gummiplantagen verbessern#!\nIhr Naturforscher kann seine Fertigkeiten einsetzen, um das [GetBuildingType('building_rubber_plantation').GetName] eures Landes zu verbessern.\n\nModifikatoren, die das Gebäude erhält:\n$dubois_building_throughput_add_modifier_with_tooltip$\n$dubois_building_production_mult_modifier_with_tooltip$\n$dubois_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_IMPROVE_RUBBER_TRIGGER_TT: "#default_text Mindestens ein [GetBuildingType('building_rubber_plantation').GetName] Gebäude der Stufe 1 oder höher verfügt nicht über alle drei [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_IMPROVE_RUBBER_ACTIVE_TT: "#T Verbessern Sie die Forstwirtschaft#!\n#p Ihr Naturforscher ist gerade dabei, [GetBuildingType('building_rubber_plantation').GetName] zu verbessern.#!"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON: "Synthesekautschuk"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON_TT: "#T Synthesekautschuk#!\nGummi ist auf eine sehr kleine Klimazone beschränkt. Ohne Kolonien oder Importe ist es kaum möglich, diesen wertvollen Rohstoff zu erhalten. Aber vielleicht können die Möglichkeiten der Chemie das ausgleichen, was uns an anderer Stelle fehlt?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_BUTTON: "Lokale Fauna dokumentieren"
 MR_ANIMAL_DOCUMENTATION_BUTTON_TT: "#T Dokumentieren der heimischen Fauna#!\nDie heimische Fauna sollte bei allen Ambitionen, möglichst exotische Tiere zu erforschen, nicht vernachlässigt werden. Ein Naturforscher kann Tiere in Lebensräumen, die in seinen Kernprovinzen leben, genau studieren und wissenschaftliche Abhandlungen über sie verfassen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_ACTIVE_TT: "#T Dokumentieren der einheimischen Fauna#!\n#p Ihr Naturforscher dokumentiert derzeit die einheimische Tierwelt.#!\nDie einheimische Fauna sollte bei allen Bestrebungen, möglichst exotische Tiere zu erforschen, nicht vernachlässigt werden. Ein Naturforscher kann Tiere in Lebensräumen, die in seinen Kernprovinzen leben, genau studieren und wissenschaftliche Abhandlungen über sie verfassen."
 MR_CAN_DOCUMENT_ANIMAL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt mindestens einen inkorporierten Staat mit einem Tierlebensraum, in dem ein undokumentiertes [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] lebt.#!"
 MR_GEOLOGIST_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] der #V nicht beschäftigt#! ist.#!"
 MR_GEOLOGIST_FIND_ORE_TRIGGER_TT: "#default_text Mindestens ein Minengebäude der Stufe 1 oder höher hat nicht den $agassiz_building_production_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_GEOLOGIST_FIND_OIL_TRIGGER_TT: "#default_text Mindestens eine Ölbohranlage der Stufe 1 oder höher hat nicht den $agassiz_building_production_2_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON: "Seltene Mineralien für Mineralien"
 MR_SELL_MINERALS_FOR_RARE_MINERAL_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 20.000 oder mehr#! [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')].#!"
 MR_MINERAL_CABINET_BUTTON: "Mineralienkabinett gründen"
 MR_MINERAL_CABINET_BUTTON_TT: "#T Mineralienkabinett grünsen#!\nEin Mineralienkabinett in Ihrem Zoo macht ihn noch repräsentativer. Wir können dort alle Mineralien ausstellen, die von unseren [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] gesammelt worden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MINERAL_CABINET_NUMBER_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 50 oder mehr#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] (derzeit [GetPlayer.MakeScope.Var('agassiz_rare_minerals_var').GetValue|0+]).#!"
 MR_MINERAL_CABINET_EFFECT_TT: "Ihr [GetBuildingType('building_dubois_zoo').GetName] erhält ein #V Mineralienkabinett#!, das Ihnen 50 Prestige und einen kleinen Anstieg des Lebensstandards beschert."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T Erforschen Sie das Atlantikgebirge#!\nNachdem bei der Verlegung des Transatlantikkabels Hinweise auf unterseeische Erhebungen gefunden wurden, fragen sich führende Geologen, was die Ursache dafür sein könnte. Moderne Messgeräte und ein erfahrener Geologe könnten das Geheimnis lüften.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_EXPERIENCED_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen #O erfahrenen#! oder #O berühmten#! [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')].#!"
 MR_GEOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen #O berühmten#! [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')].#!"
 MR_PALEONTOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen #O berühmten#! [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')].#!"
 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T Erz suchen#!\nEin [concept_agassiz_geologist] kann in der Nähe von bereits bestehenden Minen nach neuen Rohstoffvorkommen suchen und so die Produktion des Erzes erhöhen.\n\nDas Gebäude würde den $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier] erhalten\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Stoppe die Suche nach Erz#!\nIhr [concept_agassiz_geologist] sucht derzeit nach neuen Rohstoffvorkommen in der Nähe bereits bestehender Minen und erhöht damit die Produktion des Erzes.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T Öl suchen#!\nEin [concept_agassiz_geologist] kann nach neuen Ölquellen in der Nähe bereits bestehender Ölbohranlagen suchen und so die Produktion steigern.\n\nDas Gebäude würde den $agassiz_building_production_2_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')] erhalten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "Planetarium"
 VISIT_OBSERVATORY_BUTTON_TT: "#T Planetarium besuchen#!\nDas Planetarium bietet Ihnen einen Überblick über das astronomische Wissen Ihres Landes, anderer Länder und der Wissenschaftsgemeinde."
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Mineralien für seltene Mineralien verkaufen#!\nEin [concept_agassiz_geologist] kann [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] von Kollegen, Sammlern und anderen geologischen Enthusiasten kaufen. Dafür muss er eine beträchtliche Menge an gewöhnlichen Mineralien eintauschen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "Interdisziplinäres Symposium"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Geologisch-Paläontologisches Symposium#!\nDie Schnittmengen zwischen Geologie und Paläontologie sind groß. Wir sollten die Koryphäen auf diesem Gebiet zusammenbringen und die Synergien nutzen, die sich aus diesem Austausch ergeben, um neue wissenschaftliche Theorien über die Erdgeschichte zu entwickeln.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Geologen werben#!\n#p Sie werben gerade einen Geologen.#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] studieren Mineralien, Vulkane und andere geologische Formationen."
 MR_ACADEMICS_PROMOTE_GEOLOGIST_EFFECT_TT: "Ihr nächster Wissenschaftler wird ein [concept_agassiz_geologist] sein."
 AGE_OF_EARTH_VAR: "[GetPlayer.MakeScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 AGE_OF_EARTH_VAR_TT: "Dieses Alter wurde von [GetPlayer.MakeScope.GetCountry.GetCustom('agassiz_earth_age_calculator_type')] geschätzt."
 agassiz_earth_age_calculator_loc: "[GetGlobalVariable('agassiz_current_age_of_earth_calculator_global_var').GetCountryDefinition.GetName|V]"
