 vikelas_custom_racer_loc: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ist ein [concept_vikelas_racer] mit einer Erfahrung von [GetPlayer.MakeScope.Var('vikelas_racer_var').GetVariable('vikelas_racer_experience').GetValue|+0] / 150. Wenn er eine Erfahrung von 150 erreicht, erhöht sich seine Eigenschaft auf #V Berühmter Rennfahrer#!."
