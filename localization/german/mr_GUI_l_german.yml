 TOTAL_GEOLOGICAL_KNOWLEDGE_VAR_TT: "[GetPlayer.GetAdjective] [concept_agassiz_geological_knowledge] im Vergleich zum internationalen #b Geologisches Wissen#!"
 mr_geologist_ore_vein_stop_effect_tt: "Ihre [concept_agassiz_geologist] hört auf, nach Erzen zu schürfen."
 TOTAL_RARE_MINERALS_VAR: "@agassiz_rare_mineral! [GetPlayer.MakeScope.Var('agassiz_rare_minerals_var').GetValue|*V0]"
 TOTAL_RARE_MINERALS_VAR_TT: "[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] gesammelt von [GetPlayer.GetName]"
 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Berechnen Sie das Alter der Erde#!\n Ein Geologe kann einmal in seinem Leben das Alter der Erde berechnen und seine Theorie allen anderen Geologen vorlegen. Wenn sie zustimmen, ist seine Erdzeitbestimmung die entscheidende. Wird er abgelehnt, kann er es nach einer Periode der Depression erneut versuchen. Um eine neue Theorie präsentieren zu können, muss die nationale geologische Punktzahl höher sein als die Punktzahl, mit der das letzte Erdzeitalter bestimmt wurde.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_AGE_EARTH_ACTIVE_TT: "#T Berechnen Sie das Alter der Erde#!\n#p Ihr Geologe ist gerade dabei, das Alter der Erde zu berechnen.#!"
 MR_GEOLOGIST_CAN_CALCULATE_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] hat noch keine international verbindliche Bestimmung des Alters der Erde vorgelegt.#!"
 MR_GEOLOGIST_CALCULATE_AGE_TRIGGER_TT: "#default_text Der nationale geologische Wert ist höher als der Wert, der zur Bestimmung des letzten Erdzeitalters verwendet wurde.#!"
 MR_GEOLOGIST_NO_AGE_DEBATE_TRIGGER_TT: "#default_text Über das Alter der Erde gibt es derzeit keine Debatte.#!"
 MR_GEOLOGIST_NOT_DEMOTIVATED_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] ist nicht demotiviert.#!"
 MR_GEOLOGIST_OIL_STOP_BUTTON_TT: "#T Stoppen Sie die Suche nach Öl#!\nIhr [concept_agassiz_geologist] sucht derzeit nach neuen Ölquellen in der Nähe bereits bestehender Bohrinseln und steigert so die Produktion.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_oil_stop_button_effect_tt: "Ihre [concept_agassiz_geologist] wird aufhören, nach Öl zu schürfen."
 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T Geologische Forschung#!\n Ein Geologe kann 5 Jahre lang durch das Land reisen, um sein Wissen zu erweitern. Auf diese Weise kann er auch geologische Formationen, Höhlen oder (später) sogar Uran finden. Geologen, die die Eigenschaft Mineraloge besitzen, verdoppeln die Anzahl der jährlich erworbenen Mineralien. Am Ende ihrer Suche erhalten Geologen zusätzliche Mineralien, Erfahrung und die Eigenschaft Mineraloge, falls sie diese nicht bereits besitzen.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_STOP_BUTTON_TT: "#T Stoppen Sie die geologische Forschung#!\nLassen Sie Ihre [concept_agassiz_geologist] ihre Forschung stoppen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_geological_research_stop_effect_tt: "Ihre [concept_agassiz_geologist] wird ihre geologischen Forschungen einstellen."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_ACTIVE_TT: "#T Erkundung der Atlantic Mountains#!\n#p Ihr [concept_agassiz_geologist] erkundet gerade die Atlantic Mountains.#!"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON: "Kongress zur Kontinentalverschiebung"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T Kongress über Kontinentalverschiebung#!\n Jahrhunderte lang herrschte der Glaube vor, dass die Kontinente fest und unbeweglich seien. Ein hervorragender Geologe mit beträchtlichem geologischem Wissen könnte dieses Mantra zu Fall bringen. Ob ihm das gelingen wird, ist eher fraglich.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_CONGRESS_KNOWLEDGE_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 50 oder mehr#! @agassiz_geological_knowledge! [concept_agassiz_geological_knowledge] (derzeit [GetPlayer.MakeScope.Var('agassiz_geological_knowledge_var').GetValue|0+]).#!"
 MR_ASTRONOMER_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat einen [concept_verrier_astronomer] der #V nicht beschäftigt ist#!.#!"
 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T Karte des Mondes#!\nMit Hilfe der Kamera und moderner Teleskope ist es möglich, den gesamten Erdbegleiter in noch nie dagewesener Qualität zu kartieren. Eine Mondkarte wäre ein Meilenstein in der Astronomie. Allerdings wird ein Astronom weniger astronomische Objekte finden, wenn er selenographische Studien betreibt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_MOON_MAP_ACTIVE_TT: "Kartieren Sie den Mond\n#p Ihr [concept_verrier_astronomer] kartiert gerade den Mond, indem es [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')] aufnimmt.#!"
 NUMBER_MOONS_VAR: "@verrier_moons!  [GetPlayer.MakeScope.Var('verrier_num_discovered_moons_var').GetValue|V0] / #V [GetGlobalVariable('verrier_moon_number_global_var').GetValue]#!"
 NUMBER_MOONS_VAR_TT: "[Concept('concept_verrier_satellite','$concept_verrier_satellites$')] entdeckt von [GetPlayer.GetName] von allen entdeckten [Concept('concept_verrier_satellite','$concept_verrier_satellites$')]"
 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T Neue Satelliten entdecken#!\nViele Planeten im Sonnensystem haben noch unentdeckte natürliche [Concept('concept_verrier_satellite','$concept_verrier_satellites$')] ähnlich dem Mond der Erde. Je nach dem Stand der Technik, den Produktionsmethoden in unserer Sternwarte und den Fähigkeiten des Astronomen kann sich die Möglichkeit ergeben, einen bisher völlig unbekannten Planetenbegleiter zu finden. Allerdings wird ein Astronom weniger astronomische Objekte finden, wenn er nach neuen Trabanten sucht.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_CAN_DISCOVER_SATELLITES_TRIGGER_TT: "#default_text Es gibt natürliche [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], die entdeckt werden können.#!"
 MR_ASTRONOMER_DISCOVER_SATELLITES_ACTIVE_TT: "Entdecken Sie neue Satelliten\n#p Ihr [concept_verrier_astronomer] sucht derzeit nach neuen [Concept('concept_verrier_satellite','$concept_verrier_satellites$')].#!"
