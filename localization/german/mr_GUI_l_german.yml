 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "Paläontologische Expedition zurückrufen" #deepl:4148374484
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Rückruf Paläontologische Expedition#!\nDer Paläontologe zieht sich von seiner paläontologischen Untersuchung zurück, um sich anderen Aufgaben zu widmen - wie dem Bau oder der Umgestaltung von Dinosaurierskeletten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2201984602
 MR_MOUNT_SKELETON_BUTTON: "Dinosaurier-Skelett konstruieren" #deepl:3508642261
 MR_MOUNT_SKELETON_BUTTON_TT: "#T Baue ein Dinosaurierskelett#!\n Dein [concept_dubois_paleontologist] kann ein neues [concept_dubois_dinosaur_skeleton] mit 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] aus demselben Kontinent bauen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3979647708
 MR_MOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text Sie sind noch nicht #V Sie überlegen, eine [concept_dubois_dinosaur_skeleton]#! zu erstellen.#!" #deepl:82476747
 MR_MOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] von einem Kontinent, von dem wir noch nicht alle [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] haben#!.#!" #deepl:201414494
 MR_REMOUNT_SKELETON_BUTTON: "Dinosaurier-Skelett ummontieren" #deepl:1364288898
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T Dinosaurierskelett remontieren#!\nWenn Sie ein unvollkommenes [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] haben, können Sie Ihr [concept_dubois_paleontologist] versuchen lassen, es zu remontieren. Wenn Ihr Paläontologe erfahren genug ist, könnte das neu montierte Skelett von besserer Qualität sein.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2631341568
 MR_REMOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text Sie sind noch nicht #V Sie erwägen, eine [concept_dubois_dinosaur_skeleton]#! zu remounten.#!" #deepl:558017724
