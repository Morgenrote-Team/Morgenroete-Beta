 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON: "Gründung Automobilclub" #deepl:3955225653
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON_TT: "#T Gründung eines Automobilclubs#!\nDie Gründung eines Automobilclubs ist der erste Schritt zum Aufbau weiterer Einrichtungen, die für den Motorsport unerlässlich sind.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2509720606
