 MR_INVITE_INDEPENDENT_PAINTER: "Painter einladen"
 MR_INVITE_INDEPENDENT_PAINTER_TT: "#T Laden Sie diesen Maler ein#!\nDas Einladen eines [concept_klimt_painter] ist eine Möglichkeit, einen neuen Maler zu bekommen, wenn Ihr Land nicht genügend Maler zur Verfügung stellen kann oder wenn Ihr derzeitiger Maler Sie nicht zufrieden stellt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_painter', Scope.GetCharacter.MakeScope ).End)]"
