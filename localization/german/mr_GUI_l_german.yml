 MR_AIACR_PRESIDENT_BUTTON_TT: "#T Werden Sie Präsident der AIACR#!\nOhne einen aktiven Präsidenten der AIACR können wir dieses Amt übernehmen. Das setzt voraus, dass wir den Hauptsitz des Internationalen Automobilverbandes kontrollieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1876758781
