 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON: "Vom Fossil zum Knochen" #deepl:2668752307
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T Fossilien in einen Knochen umwandeln#!\nEin erfahrener oder berühmter [concept_dubois_paleontologist] kann 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] in einen [concept_dubois_dinosaur_bone] umwandeln, wenn du bereits mindestens einen Knochen besitzt und nicht zu viele Knochen von jedem Kontinent hast.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1518594234
 MR_TRANSFORM_FOSSILS_TO_BONES_TRANSFORMABLE_DINOSAUR_BONE_TRIGGER: "#default_text [GetPlayer.GetName] hat bereits #V mindestens 1#! [concept_dubois_dinosaur_bone] und hat #V noch nicht alle notwendigen Bones von jedem Kontinent#!.#!" #deepl:4140914359
