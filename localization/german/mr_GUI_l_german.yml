 MR_VISIT_GALLERY_BUTTON: "Galerie besuchen" #deepl:3218187256
 MR_VISIT_GALLERY_BUTTON_TT: "#T Besuchen Sie die Galerie#!\nDer Gesamtwert unserer Maltradition und ihrer Kunstwerke kann in der Galerie überprüft werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3307131598
 MR_VISIT_GALLERY_BUTTON_TRIGGER_TT: "#default_text Sie sind #V derzeit nicht zu Besuch#! der Galerie.#!" #deepl:1707531258

 MR_PAINTER_TRIP_BUTTON: "Bildungsreise" #deepl:3093861624
 MR_PAINTER_TRIP_BUTTON_TT: "#T Bildungsreise#!\n Auf einer [concept_klimt_painter_trip] kann ein Künstler einen bisher unbekannten Kunststil erlernen und so die jährliche [concept_klimt_painting_tradition] verbessern. Sie können auch andere positive und negative Eigenschaften während ihres Aufenthalts in einem fremden [concept_artists_center_of_arts] erwerben. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1291977569
 MR_ACQUIRE_MASTERWORK_BUTTON: "Erwerben Sie ein Meisterwerk" #deepl:1571501476
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T Ein Meisterwerk erwerben#!\nWir können im Ausland ein Meisterwerk eines Stils erwerben, den wir noch nicht besitzen. Dies setzt jedoch voraus, dass eine andere Nation mindestens mehr als ein Meisterwerk dieses Stils besitzt. Außerdem brauchen wir eine Nationalgalerie, um das Gemälde aufzuhängen. Zusätzlich zu den Beschaffungskosten müssen wir auch einige unserer Gemälde eintauschen, was uns #R 100#! [concept_klimt_painting_tradition] kostet. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2847106033
 MR_VERNISSAGE_BUTTON: "Vernissage" #deepl:210639194
 MR_VERNISSAGE_BUTTON_TT: "#T Vernissage#!\nAuf einer Vernissage kann ein [concept_klimt_painter] einige seiner Bilder ausstellen und im Gegenzug Ansehen und [concept_klimt_painting_tradition] erwerben. Eine Vernissage ist nur einmal im Leben eines Malers möglich.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:518345281

