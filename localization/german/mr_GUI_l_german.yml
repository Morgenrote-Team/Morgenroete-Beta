 MR_READING_TOUR_BUTTON_TT: "#T Schriftsteller auf Lesereise schicken#!\nEin international anerkannter Schriftsteller, der mit ausländischen Verlegern in Kontakt steht, kann den eigenen Bekanntheitsgrad steigern, wenn er auf Lesereise geht. Dies fördert nicht nur die gegenseitigen Beziehungen, sondern auch seinen Ruf.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:952097969
