 VISIT_PALEONTOLOGICAL_COLLECTION_BUTTON_TT: "#T Besuchen der paläontologischen Sammlung#!\nDie [concept_dubois_paleontological_collection] bietet weitere Informationen über unsere [concept_dubois_fossil] Funde, unseren [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] und unsere [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
