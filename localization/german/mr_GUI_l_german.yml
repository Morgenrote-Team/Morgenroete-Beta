 MR_CHEMIST_SYNTHETIC_OIL_BUTTON_TT: "#T Synthetisches Öl#!\nErdöl gibt es nur in Regionen mit Erdölreserven. Aber was wäre, wenn wir Öl selbst herstellen könnten? Dann wäre es nicht mehr nötig, fremde Regionen nur wegen ihres Öls zu erobern. Lassen Sie Ihren [concept_mendelejew_chemist] versuchen, synthetisches Öl zu erzeugen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHEMIST_FERTILIZER_BUTTON: "#T Verbesserte Düngemittel#!\nLassen Sie Ihren [concept_mendelejew_chemist] die Produktion von Düngemitteln in [GetBuildingType('building_chemical_plant').GetName] verbessern.\nDadurch werden im Laufe der Zeit drei Modifikatoren zu Ihrem Gebäude hinzugefügt: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ und $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nDieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHEMIST_FERTILIZER_ACTIVE_TT: "#T Verbesserte Düngemittel#!\n#p Ihr [concept_mendelejew_chemist] verbessert derzeit die Produktion von Düngemitteln in [GetBuildingType('building_chemical_plant').GetName].#!"
 MR_CHEMIST_EXPLOSIVES_BUTTON: "#T Verbesserung von Sprengstoffen#!\nLassen Sie Ihren [concept_mendelejew_chemist] die Produktion von Sprengstoff in einem [GetBuildingType('building_explosives_factory').GetName] verbessern.\nDadurch werden Ihren Gebäude im Laufe der Zeit drei Modifikatoren hinzugefügt: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ und $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nDieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHEMIST_EXPLOSIVES_ACTIVE_TT: "#T Verbesserung von Sprengstoffen#!\n#p Ihr [concept_mendelejew_chemist] verbessert derzeit die Produktion von Sprengstoffen in einem [GetBuildingType('building_explosives_factory').GetName].#!"
 MR_CHEMIST_SYNTHETICS_BUTTON: "#T Synthetika verbessern#!\nLassen Sie Ihren [concept_mendelejew_chemist] die Produktion von Kunststoffen in [GetBuildingType('building_synthetics_plant').GetName] oder [GetBuildingType('building_mendelejew_hydrogenation_plants').GetName] verbessern.\nDiesem Gebäude wird mit der Zeit drei Modifikatoren hinzugefügt: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ und $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nDieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
