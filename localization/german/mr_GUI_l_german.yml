 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text Die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] hat eine [concept_approval] von #V 5 oder höher#!.#!" #deepl:187102457
 MR_EXPRESSIONISM_BUTTON: "Expressionismus" #deepl:2794637433
 MR_EXPRESSIONISM_BUTTON_TT: "#T Wählen Sie Expressionismus#!\n[concept_elgar_expressionism] ist eine Stilrichtung in der Kunst. Seine Anfänge und Vorläufer sind im späten 19. Jahrhundert zu finden. Wie der Impressionismus, der Symbolismus und der Fauvismus ist der Expressionismus eine Bewegung gegen die Tendenzen des Naturalismus. Im Expressionismus überwiegt die expressive Ebene gegenüber der ästhetischen, appellativen und sachlichen Ebene. Der Künstler will seine Erfahrung für den Betrachter darstellen. Im Gegensatz zum musikalischen Impressionismus, der die Wahrnehmung der äußeren Erscheinung der Dinge darstellt, formulieren die expressionistischen Kunstströmungen die Emotionen der menschlichen Seele.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3221842536
