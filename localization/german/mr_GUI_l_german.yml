 MR_PROMOTING_ENGINEER_TT: "#T Ingenieur werben#!\n#p Sie werben gerade einen Ingenieur.#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] sind vielseitige Techniker im Militär und im Bauwesen. Sie beschleunigen auch den Bau von Monumenten um das Doppelte."
 MR_PROMOTING_ASTRONOMER_TT: "#T Astronom werben#!\n#p Sie werben gerade einen Astronomen.#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] finden neue astronomische Objekte, entdecken Sterne und Planeten oder nehmen an astronomischen Kongressen teil."
 MR_PROMOTING_NATURALIST_TT: "#T Naturforscher werben#!\n#p Sie werben gerade einen Naturforscher.#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] können Tiere in der Heimat oder in Übersee einfangen, Exemplare finden oder botanische Expeditionen leiten."
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T Paläontologen werben#!\n#p Sie werben gerade einen Paläontologen.#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] kann geologische Formationen auf Fossilien und Dinosaurierknochen untersuchen oder sie auf Expeditionen finden."
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T Archäologen werben#!\n#p Sie werben gerade einen Archäologen.#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] kann Artefakte finden, wichtige Entdeckungen machen und an archäologischen Konferenzen teilnehmen.\n"
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T Anthropologen werben#!\n#p Sie werben derzeit einen Anthropologen.#!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] studieren die Ursprünge des Menschen, vom Beginn der menschlichen Evolution bis zur Steinzeit.#T Akademische Investitionen#!"
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T Akademische Investitionen#!\n#p Sie investieren in die Akademie.#!\nEine allgemeine staatliche Investition in unsere Universitäten wird #O den akademischen Fortschritt#! um #G +1#! pro Monat erhöhen. Die Finanzierung ist für 10 Jahre vorgesehen."
 MR_PROMOTING_COMPOSER_TT: "#T Komponisten werben#!\n#p Sie werben gerade einen Komponisten.#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] sind notwendig, um eine blühende Musikkultur zu schaffen. Sie werden einem Land helfen, mehr [concept_elgar_musical_tradition] zu schaffen."
 MR_PROMOTING_WRITER_TT: "#T Schriftsteller werben#!\n#p Sie werben einen Schriftsteller.#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] sind Meister des Geschichtenerzählens und arbeiten an Büchern und anderer Literatur. Mit ihrer Arbeit stärken sie ein Land [concept_manzoni_literary_tradition]."
 MR_PROMOTING_PAINTER_TT: "#T Maler werben#!\n#p Sie werben gerade einen Maler.#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] fangen Eindrücke, Landschaften und die Wunder der Welt auf Leinwand ein. Durch ihre Meisterwerke stärken sie die [concept_klimt_painting_tradition] eines Landes."
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T Avantgarde Intelligenzia#!\n#p Avantgarde Intelligentsia ist Ihr aktiver wissenschaftlicher Schwerpunkt.#!\nEine Clique von Akademikern mit klaren kulturellen, soziologischen und anthropologischen Vorstellungen bestimmt den wissenschaftlichen Alltag. Praktische Bereiche sind dagegen von untergeordneter Bedeutung.\n#R Hinweis#!: Erhöht den Akademischen Fortschritt um einen Punkt pro Monat."
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T Angewandte Wissenschaft#!\n#p Angewandte Wissenschaft ist Ihr aktiver Wissenschaftsschwerpunkt.#!\nDie Wissenschaftler unseres Landes sind unermüdlich bemüht, Entdeckungen aus allen Bereichen für den praktischen Alltag nutzbar zu machen. Dies soll dem allgemeinen Fortschritt und dem Frieden der Menschheit dienen.\n#p Hinweis#!: Erhöht das Aussehen der Akademiker um einen Punkt pro Monat."
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T Militärisch-industrieller Komplex#!\n#p Der militärisch-industrielle Komplex ist derzeit Ihr aktiver wissenschaftlicher Schwerpunkt.#!\nDurch die Zusammenarbeit zwischen privaten Industriellen und dem Militär hat sich ein besonders bedeutendes Geflecht von Verbindungen, persönlichen Beziehungen und Bekanntschaften entwickelt, das sich am besten als militärisch-industrieller Komplex beschreiben lässt, mit einem ganz leichten Hauch von Korruption."
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T Wirtschaftsschulen & Tycoon-Kapitalismus#!\n#p Wirtschaftshochschulen & Tycoon-Kapitalismus ist derzeit Ihr aktueller wissenschaftlicher Schwerpunkt.#!\nDas unabhängige Individuum in Verbindung mit einer prosperierenden Zeit des Fortschritts hat zu einer Mentalität geführt, in der Berufsschulen, mittelständische Unternehmen und Großkonzerne die Wissenschaft des Landes maßgeblich beeinflussen. Umgekehrt arbeiten die Hochschulen daran, den erworbenen Wohlstand der Nation durch neue Technologien zu mehren und gesellschaftliche Ideen durch Fortschritt voranzutreiben."
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T Seemacht & Handelsmarine#!\n#p Seemacht & Handelsmarine ist derzeit Ihr aktiver wissenschaftlicher Fokus.#!\nDie Marine und der internationale Handel spielen für unser Land eine immense Rolle. Die Steigerung des Wohlstands durch fortschrittliche Produktion und den weltweiten Handel mit unseren Produkten ist ebenso wichtig wie die Verteidigung des bereits Erreichten."
 MR_IVORY_TOWER_ACTIVE_TT: "#T Nützlicher Elfenbeinturm#!\n#p Nützlicher Elfenbeinturm ist derzeit Ihr aktiver wissenschaftlicher Schwerpunkt.#!\nDie Akademie gilt in unserem Land als Zufluchtsort für exzentrische Köpfe, die Käfer zählen, alte Vasen polieren und sich mit Kuriositäten beschäftigen. Es lässt sich jedoch nicht leugnen, dass die Abgeschiedenheit des Elfenbeinturms von der Gesellschaft auch ihre Vorteile hat. Ungestört arbeitet so mancher Professor besser.\n#p Hinweis#!: Erhöht das Aussehen von Akademikern um einen Punkt pro Monat."
 MR_ON_PACIFIC_EXPEDITION_TT: "#T Pazifik-Expedition#!\n#p Derzeit läuft eine Pazifik-Expedition.#!\nDer Pazifische Ozean ist neben den Polen eines der letzten Gebiete der Erde, das noch Geheimnisse birgt. Wissenschaftler aus verschiedenen Disziplinen sind an einer Forschungsmission interessiert, um naturwissenschaftliche, paläontologische, astronomische und ozeanografische Studien durchzuführen. Für die Großmächte wiederum könnte es eine prestigeträchtige Angelegenheit sein, um ihren Einfluss am Ende der Welt zu demonstrieren."
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T Die Nordwestpassage#!\n#p Derzeit läuft eine Expedition zur Entdeckung der Nordwestpassage.#!\nBereits um die Jahrhundertwende erkundeten kühne Abenteurer die äußeren Teile des Eismeeres. Ein alter Traum bleibt unerfüllt: die Entdeckung der Nordwestpassage zwischen Kanada und dem Nordpolarmeer. Doch wer würde eine solch gefährliche Expedition wagen?"
 MR_ON_ARCTICA_EXPEDITION_TT: "#T Zeppelin-Expedition#!\n#p Derzeit läuft eine Zeppelin-Expedition.#!\nDie Aeroarctic, die \"Internationale Studiengesellschaft zur Erforschung der Arktis durch Luftschiffe\", war eine nichtstaatliche wissenschaftliche Vereinigung, die sich zum Ziel gesetzt hatte, Luftschiffe in der Polarforschung einzusetzen. Sie wurde hauptsächlich auf Initiative des Aeronauten und späteren Generalsekretärs der Gesellschaft, Walther Bruns, gegründet. Gründungspräsident im Jahr 1924 war Fridtjof Nansen. Nach mehrjähriger Vorbereitungsarbeit gelang es der Gesellschaft 1931, erstmals ein Luftschiff für eine rein wissenschaftliche Polarexpedition einzusetzen. Durch die Arktisfahrt des LZ 127 Graf Zeppelin wurde das Wissen über die Geographie der überflogenen Polargebiete wesentlich erweitert. Bereits 1926 überflog Umberto Nobile mit seinem Luftschiff \"Norge\" den Nordpol und unternahm später eine Expedition mit der \"Italia\"."
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_tesla_civil_engineer]#!\nIhr [concept_tesla_engineer] konzentriert sich auf [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]."
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_tesla_mechanical_engineer]#!\nIhr [concept_tesla_engineer] konzentriert sich auf [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]."
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_tesla_military_engineer]#!\nIhr [concept_tesla_engineer] konzentriert sich auf [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]."
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_tesla_electrical_engineer]#!\nIhr [concept_tesla_engineer] konzentriert sich auf [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')]."
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_tesla_aeronautical_engineer]#!\nIhr [concept_tesla_engineer] konzentriert sich auf [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]."
 MR_SAFARI_ACTIVE_TT: "#T Heia Safari#!\n#p Ihr Naturforscher befindet sich gerade auf einer Safari.#!\nAuf einer Afrika-Safari kann durch ständiges Aufspüren und Fallenstellen Großwild gefangen und dann zu einer [concept_dubois_zoo] transportiert werden. Es ist nur möglich, ein Tier pro Safari zu fangen. Je nach Tierart ist es unterschiedlich, ob man Fallen benötigt oder ihnen auf der Spur bleiben muss. Als Faustregel gilt, dass große, träge Tiere mehr Fallen benötigen, während schnelle Tiere mehr Fährtenarbeit erfordern."
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Fangen Sie einheimische Tiere#!\n#p Ihr Naturforscher fängt gerade einheimische Tiere ein.#!\nUnser Land hat Tierlebensräume mit faszinierenden Arten, die in einem [concept_dubois_zoo] ausgestellt werden könnten. Ein [concept_dubois_naturalist] soll ein Jahr lang durch das Land reisen, um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] für einen Zoo zu sammeln."
