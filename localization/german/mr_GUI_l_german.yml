 MR_PHYSICIAN_HAS_HOSPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens eine #V [GetBuildingType('building_government_administration').GetName] mit aktiver Krankenhaus [concept_production_method]#!.#!"
 MR_MUSIC_TRADITION_250_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 250#! oder mehr @elgar_music_tradition! [concept_elgar_musical_tradition].#!"
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON: "Allgemeinen Deutschen Musikverein gründen"
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T Gründung des Allgemeinen Deutschen Musikvereins#!\nDer Allgemeine Deutsche Musikverein (ADMV) war ein deutscher Musikverein, der 1861 von Franz Liszt und Franz Brendel gegründet wurde, um die musikalischen Ideale der Neudeutschen Schule der Musik zu verkörpern. Der ADMV zielte sowohl auf musikalische Leistung als auch auf praktische Unterstützung ab. Zu den künstlerischen Zielen des ADMV gehörten jährliche Tonkünstlerversammlungen an verschiedenen Orten mit Aufführungen bedeutender, selten gehörter und vor allem neuer Musikwerke aller Art. Aber auch ältere, selten oder gar nicht gehörte, aber wegen ihrer Bedeutung interessante Werke sollten aufgeführt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_BUTTON_TT: "#T Eisenbahnprojekt#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Verbesserung der [GetBuildingType('building_railway').GetName]en [GetPlayer.GetAltName('IN')] konzentrieren. Sie werden in der Lage sein, Staaten zu priorisieren und die Eisenbahnen in diesen Staaten werden den $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier] erhalten, was den [concept_throughput] der Gebäude verbessert.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine [GetBuildingType('building_railway').GetName] ohne den $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier].#!"
 MR_CIVIL_ENGINEER_IRRIGATION_BUTTON_TT: "#T Bewässerungsprojekt#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Verbesserung der Bewässerung [GetPlayer.GetAltName('IN')] konzentrieren. Sie werden in der Lage sein, Staaten zu priorisieren, und diese Staaten werden die Staatseigenschaft #V $tesla_state_trait_irrigation$#! erhalten, die den [concept_throughput] landwirtschaftlicher Gebäude und die Resistenz gegen verschiedene [Concept('concept_harvest_condition', '$concept_harvest_conditions$')] verbessert.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_IRRIGATION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_state] ohne die #V $tesla_state_trait_irrigation$#! Staatseigenschaft.#!"
