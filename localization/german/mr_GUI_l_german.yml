 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Gefundener Botanischer Garten#!\n Ein Botanischer Garten in Ihrem Zoo wird ihm noch mehr Prestige verleihen. Wir können alle exotischen Pflanzen pflanzen, die unser [concept_dubois_naturalist] gesammelt hat. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1727331284
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 50000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (derzeit [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!" #deepl:856083816
