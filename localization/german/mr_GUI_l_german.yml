 MR_INVITE_WRITER_BUTTON_TT: "#T Ernennen Sie diesen Schreiber zum nationalen Schriftsteller Ihres Landes#!\nDie Ernennung eines [Concept('concept_manzoni_writer','#PURPLE #b Schriftstellers#!#!')] ermöglicht es Ihnen, die Fähigkeiten des Schriftstellers auf verschiedene Weise zu nutzen. Wenn Sie bereits einen nationalen Schriftsteller haben, wird dieser Schriftsteller ein [concept_manzoni_local_writer].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_writer', Scope.GetCharacter.MakeScope ).End)]"
