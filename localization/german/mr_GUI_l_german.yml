 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T Anthropologe zurückrufen#!\nGelegentlich kann es vorkommen, dass Sie eine Höhlenerkundung vorzeitig beenden müssen. Der [concept_lepsius_anthropologist] steht dann vor Ablauf der Frist zur Verfügung, bringt aber keinen Ertrag mit.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:577616460

 MR_ORIGIN_CONGRESS_BUTTON: "Kongress über die menschliche Herkunft" #deepl:3969658381
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Kongress über den Ursprung des modernen Menschen#!\nMit der Entdeckung prähistorischer Menschenknochen stellte sich auch die Frage nach dem ursprünglichen Ursprung des Menschen. Während Darwin von einem afrikanischen Ursprung ausging, postulierten andere mehrere parallele Entwicklungen. Seit der Jahrhundertwende herrschte die Ansicht vor, dass sich der moderne Mensch in Asien entwickelt hat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3943148191

