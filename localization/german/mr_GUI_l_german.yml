 MR_BEETHOVEN_MONUMENT_BUTTON: "Bau des Beethoven-Denkmals" #deepl:226756622
 MR_BEETHOVEN_MONUMENT_BUTTON_TT: "#T Errichten Sie das Beethoven-Denkmal#!\nEs besteht kein Zweifel, dass Ludwig van Beethoven der größte Komponist aller Zeiten war und dass die gesamte romantische Musik aus seinem Werk hervorgegangen ist. Jeder zeitgenössische Künstler schuldet ihm eine Hommage. Umso erstaunlicher ist es, dass er immer noch viel zu wenig gewürdigt wird. Nach einem Aufruf von Robert Schumann sammelten jedoch mehrere Verbände, Städte, Fürsten und Regierungen Geld, um in seiner Geburtsstadt Bonn ein Denkmal zu errichten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3693000140

