 MR_TRANSFORM_FOSSILS_TO_BONES_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName] hat einen erfahrenen oder berühmten [concept_dubois_paleontologist], der im Moment nicht beschäftigt ist.#!" #deepl:593574290
 MR_EXTINCTION_CONGRESS_BUTTON: "Kongress zum Thema Aussterben" #deepl:2240539032
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Aussterbekongress#!\nEines der rätselhaftesten Rätsel der Naturgeschichte bleibt das Verschwinden der Dinosaurier. Der Vater der Paläontologie, Georges Cuvier, entdeckte, dass es am Ende der Kreidezeit ein Massenaussterben gegeben hatte, bei dem auch die Dinosaurier ausstarben. Aber wie konnten die grausamen Echsen, die Millionen Jahre lang die Erde beherrschten, plötzlich überflüssig werden?[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2700608412

