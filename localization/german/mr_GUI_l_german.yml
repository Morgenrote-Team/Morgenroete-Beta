 MR_CIVIL_ENGINEER_RESEARCH_BUTTON: "Forschung im Bauwesen"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON: "Infrastrukturprojekt"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON_TT: "#T Infrastrukturprojekt#!\nLassen Sie Ihr [concept_gaudi_engineer] auf den Ausbau der Infrastruktur in [GetPlayer.GetName] konzentrieren. Es gibt verschiedene Projekte, die [Concept('concept_modifier','$concept_modifiers$')], die [concept_infrastructure] zu deinen Staaten hinzufügen. Jedes Mal wird der Staat mit der geringsten Infrastruktur den Modifikator erhalten. Dieses Projekt fügt #n Ausgaben#! zu deinem Land hinzu.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
