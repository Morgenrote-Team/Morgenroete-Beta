 MR_CHEMIST_SYNTHETIC_OIL_BUTTON_TT: "#T Synthetisches Öl#!\nErdöl gibt es nur in Regionen mit Erdölreserven. Aber was wäre, wenn wir Öl selbst herstellen könnten? Dann wäre es nicht mehr nötig, fremde Regionen nur wegen ihres Öls zu erobern. Lassen Sie Ihren Chemiker versuchen, synthetisches Öl zu erzeugen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
