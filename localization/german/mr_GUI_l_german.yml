 MR_VENUS_TRANSIT_1874_EXPEDITION_BUTTON: "Beobachten Sie die [concept_verrier_venus_transit] im Jahr 1874"
 MR_VENUS_TRANSIT_1874_EXPEDITION_BUTTON_TT: "#T Beobachten Sie den Venustransit#!\nDie Beobachtung des Venustransits, eines der bedeutendsten astronomischen Ereignisse des 19. Jahrhunderts, ist in den Jahren 1872 und 1884 möglich. Zwei Jahre vor dem Zieljahr können die Vorbereitungen getroffen werden, um diese Gelegenheit nicht zu verpassen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VENUS_YEAR_1872_TRIGGER_TT: "#default_text Das Jahr ist mindestens 1872, aber nicht 1874.#!"
 MR_VENUS_TRANSIT_POSSIBLE_1874_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt inkorporiertes Land im [concept_verrier_venus_transit_zone], oder hat einen Untertan im [concept_verrier_venus_transit_zone], oder hat gute Beziehungen zu einem Land im [concept_verrier_venus_transit_zone]. Im letzteren Fall darf sich das Zielland nicht im Krieg befinden, nicht revolutionär sein und kein Untertan eines anderen Landes sein. Die Beziehungen müssen zumindest freundschaftlich sein."
