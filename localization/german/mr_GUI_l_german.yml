 MR_PADDOCK_IMPROVE_ENGINE_BUTTON_TT: "#T Verbesserung des Motors#!\nEin neuer Motor verbessert die Zuverlässigkeit und Geschwindigkeit eines Fahrzeugs.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON: "Verbesserung der Sicherheit"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON_TT: "#T Verbesserung der Sicherheit#!\n Ein Mechaniker kann sich verschiedene neue Sicherheitstechniken einfallen lassen, um das Leben eines Rennfahrers zu sichern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_BODY_BUTTON: "Körper verbessern"
 MR_PADDOCK_IMPROVE_BODY_BUTTON_TT: "#T Verbesserung der Karosserie#!\nDie Verbesserung der Karosserie sorgt für eine bessere Aerodynamik und damit für mehr Geschwindigkeit, während die Verbesserung des Materials für mehr Sicherheit sorgt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
