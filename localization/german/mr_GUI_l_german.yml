 MR_MEDICAL_CONGRESS_BUTTON_TT: "#T Host Medical Congress#!\nMit der Revolution in der medizinischen Forschung und der gleichzeitigen Ausbreitung gefährlicher Epidemien wuchs das Bedürfnis, Entdeckungen auf internationalen Kongressen zum Nutzen der Menschheit auszutauschen. Mit etwas Glück können dort Kenntnisse über Krankheitsbilder, Erreger, Behandlungsmethoden und Impfstoffe ausgetauscht werden. Mediziner dominieren die Veranstaltung, aber auch Mikrobiologen sind anwesend.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
