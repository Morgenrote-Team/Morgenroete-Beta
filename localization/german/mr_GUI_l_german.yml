 MR_CIVIL_ENGINEER_TOPOGRAPHIC_MAP_BUTTON_TT: "#T Erstellen Sie eine topografische Karte#!\nLassen Sie [concept_gaudi_engineer] sich darauf konzentrieren, eine topografische Karte von [GetPlayer.GetName] zu erstellen, die das Bauen und den Transport erleichtert. Dieses Projekt wird #n Kosten#! Ihrem Land hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
