 MR_ACADEMICS_PROMOTE_UNIVERSITY_MATHEMATICS_TT: "#default_text [GetPlayer.GetName] hat mindestens eine Universität mit einer [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_NATURAL_HISTORY_TT: "#default_text [GetPlayer.GetName] hat mindestens eine Universität mit einer [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_HUMANITIES_TT: "#default_text [GetPlayer.GetName] hat mindestens eine Universität mit einer [concept_pm_academics_university_humanities].#!"
