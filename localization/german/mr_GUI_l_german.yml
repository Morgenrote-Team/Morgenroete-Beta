 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON_TT: "#T Paleontological Expedition#!\nSend your [concept_dubois_paleontologist] on a [concept_dubois_paleontological_expedition]. An Expedition takes 1 year and results in an amount of [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].\n\nAt the end of an Expedition you can leave a [concept_dubois_paleontological_team] to set up a [concept_dubois_paleontological_excavation].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PALEONTOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Laufende paläontologische Expedition#!\nIhre [concept_dubois_paleontologist] befindet sich derzeit auf einer [concept_dubois_paleontological_expedition]. Eine Expedition dauert 1 Jahr und führt zu einer Menge von [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. \n\nAm Ende einer Expedition können Sie eine [concept_dubois_paleontological_team] hinterlassen, um eine [concept_dubois_paleontological_excavation] einzurichten."
 MR_PALEONTOLOGY_FIRST_TEAM_BUTTON: "Erstes paläontologisches Team"
 MR_PALEONTOLOGY_FIRST_TEAM_BUTTON_TT: "#T Erstes paläontologisches Team#!\nErstellen Sie ein [concept_dubois_paleontological_team]. Sie können paläontologische Teams verwenden, um [Concept('concept_dubois_paleontological_excavation','$concept_dubois_paleontological_excavations$')] einzurichten \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PALEONTOLOGY_SECOND_TEAM_BUTTON: "Zweites paläontologisches Team"
 MR_PALEONTOLOGY_SECOND_TEAM_BUTTON_TT: "#T Zweites paläontologisches Team#!\nErstellen Sie ein [concept_dubois_paleontological_team]. Sie können paläontologische Teams verwenden, um [Concept('concept_dubois_paleontological_excavation','$concept_dubois_paleontological_excavations$')] einzurichten \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NO_RECENT_PALEONTOLOGICAL_EXPEDITION_TRIGGER: "#default_text [GetPlayer.GetName] hat #V nicht kürzlich eine [concept_dubois_paleontological_expedition]#! gesendet ([GetPlayer.GetName] hat nicht den #V $dubois_had_expedition_modifier$ #! Modifier).#!"
