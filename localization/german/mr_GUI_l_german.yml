 MR_AUTORACING_FOUND_TEAM_BUTTON_TT: "#T Gründung eines Rennteams#!\nEin eigener Rennwagenhersteller macht uns unabhängig von Importen und kann uns helfen, eigene Rennwagen zu entwickeln. Dazu braucht man eine eigene Autoindustrie und einen Ingenieur, der die Grundpläne ausarbeitet.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1310277132
