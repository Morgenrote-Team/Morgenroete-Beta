 MR_CRETACEOUS_SCENERY_BUTTON_TT: "#T Bauen Sie eine Kreidezeit-Landschaft#!\nSobald das weltweite geologische Wissen einen bestimmten Stand erreicht hat, können Paläontologen an Universitäten einen Raum mit prähistorischen Landschaften einrichten. Pro Universität ist nur eine Landschaft möglich. In diesem Fall lassen Sie Ihren Paläontologen eine Landschaft aus der Kreidezeit bauen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETACEOUS_SCENERY_BUTTON_STOP_TT: "#T Stoppen Sie den Bau einer Kreidezeit-Landschaft#!\nLassen Sie Ihren Paläontologen den Bau eine Kreidezeit-Landschaft #n stoppen#! und machen Sie ihn wieder verfügbar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_JURASSIC_SCENERY_BUTTON_TT: "#T Bauen Sie eine Jura-Landschaft#!\nSobald das weltweite geologische Wissen einen bestimmten Stand erreicht hat, können Paläontologen an Universitäten einen Raum mit prähistorischen Landschaften einrichten. Pro Universität ist nur eine Landschaft möglich. In diesem Fall lassen Sie Ihren Paläontologen eine Landschaft aus der Jurazeit bauen\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_JURASSIC_SCENERY_BUTTON_STOP_TT: "#T Stoppen Sie den Bau einer Jura-Kulisse#!\nLassen Sie Ihren Paläontologen den Bau einer Jura-Kulisse #n stoppen#! und machen Sie ihn wieder verfügbar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
