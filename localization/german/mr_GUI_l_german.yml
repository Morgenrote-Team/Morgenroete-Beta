 MR_TRIASSIC_SCENERY_BUTTON_TT: "#T Bauen Sie eine Trias-Landschaft#!\nSobald das weltweite geologische Wissen einen bestimmten Stand erreicht hat, können Paläontologen an Universitäten einen Raum mit prähistorischen Landschaften einrichten. Pro Universität ist nur eine Landschaft möglich. In diesem Fall lassen Sie Ihren Paläontologen eine Landschaft aus der Triaszeit bauen\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
