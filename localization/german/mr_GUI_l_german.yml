 MR_SYSTEMIZE_FOSSILS_BUTTON: "Fossilien systematisieren"
 MR_SYSTEMIZE_FOSSILS_BUTTON_TRIGGER: "#T Systematisierung von Fossilien#!\nPaläontologen, die nicht unterwegs sind, können sich mehr mit theoretischer Arbeit beschäftigen und versuchen, Fossilien zu systematisieren, die Stammbäume von Tieren zu rekonstruieren oder die Entwicklung von Pflanzen im Laufe der Erdgeschichte nachzuvollziehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_NOT_HAS_RECENT_VOLCANO_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V nicht#! den #V Kürzliche Vulkanexpedition#! Modifikator.#!"
 MR_PROMOTE_ENGINEER_TT: "#T Ingenieur werben#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] sind vielseitige Techniker im Militär und im Bauwesen. Sie beschleunigen auch den Bau von Monumenten um das Doppelte.\n\n#n Hinweis:#! Sie können immer nur einen Ingenieur auf einmal haben.[GetPlayer.GetCustom('mr_promote_has_engineer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ASTRONOMER_TT: "#T Astronomen werben#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] finden neue astronomische Objekte, entdecken Sterne und Planeten oder können an astronomischen Kongressen teilnehmen.\n\n#n Hinweis:#! Sie können immer nur einen Astronomen haben.[GetPlayer.GetCustom('mr_promote_has_astronomer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_CHEMIST_TT: "#T Chemiker werben#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] sind Wissenschaftler, die sich auf die Entdeckung neuer Elemente und die Verbesserung Ihrer chemischen Industrie konzentrieren.\n\n#n Hinweis:#! Sie können immer nur einen Chemiker haben.[GetPlayer.GetCustom('mr_promote_has_chemist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_GEOLOGIST_TT: "#T Geologen werben#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] untersuchen Mineralien, Vulkane und andere geologische Formationen.\n\n#n Hinweis:#! Sie können immer nur einen Geologen haben.[GetPlayer.GetCustom('mr_promote_has_geologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T Naturforscher werben#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] können Tiere in der Heimat oder in Übersee einfangen, Exemplare finden oder botanische Expeditionen leiten.\n\n#n Hinweis:#! Sie können immer nur einen Naturforscher haben.[GetPlayer.GetCustom('mr_promote_has_naturalist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T Paläontologen werben#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] können geologische Formationen auf Fossilien und Dinosaurierknochen untersuchen oder sie auf Expeditionen finden.\n\n#n Hinweis:#! Sie können immer nur einen Paläontologen haben.[GetPlayer.GetCustom('mr_promote_has_paleontologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T Archäologen werben#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] können Artefakte finden, wichtige Entdeckungen machen und an archäologischen Konferenzen teilnehmen.\n\n#n Hinweis:#! Sie können immer nur einen Archäologen haben.[GetPlayer.GetCustom('mr_promote_has_archaeologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T Anthropologen werben#!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] erforschen die Ursprünge des Menschen, vom Beginn der menschlichen Evolution bis zur Steinzeit.\n\n#n Hinweis:#! Sie können immer nur einen Anthropologen haben.[GetPlayer.GetCustom('mr_promote_has_anthropologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_COMPOSER_TT: "#T Komponisten werben#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] werden benötigt, um eine blühende Musikkultur zu schaffen. Sie helfen einem Land, mehr [concept_elgar_musical_tradition] zu schaffen.\n\n#n Hinweis:#! Sie können immer nur einen Komponisten haben.[GetPlayer.GetCustom('mr_promote_has_composer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_WRITER_TT: "#T Schriftsteller werben#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] sind Meister des Geschichtenerzählens und arbeiten an Büchern und anderer Literatur. Mit ihrer Arbeit stärken sie die [concept_manzoni_literary_tradition] eines Landes.\n\n#n Hinweis:#! Sie können immer nur einen nationalen Schriftsteller und 3 lokale Schriftsteller haben.[GetPlayer.GetCustom('mr_promote_has_writers_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T Maler werben#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] halten Eindrücke, Landschaften und die Wunder der Welt auf Leinwand fest. Durch ihre Meisterwerke stärken sie die [concept_klimt_painting_tradition] eines Landes.\n\n#n Hinweis:#! Sie können immer nur einen Maler haben.[GetPlayer.GetCustom('mr_promote_has_painter_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
