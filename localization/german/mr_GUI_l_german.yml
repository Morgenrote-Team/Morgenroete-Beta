 MR_SPECIMEN_COLLECTION_BUTTON: "Fundstücksammlung" #deepl:4190649197
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Fundstücksammlung#!\nDie Bestellung all unserer exotischen Insekten, Schmetterlinge und anderer [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] würde der Welt zeigen, wie wissenschaftlich fortschrittlich unser Land ist.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:473611639
