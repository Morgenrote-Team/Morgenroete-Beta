 MR_PADDOCK_IMPROVE_BODY_BUTTON_TT: "#T Verbesserung der Karosserie#!\nDie Verbesserung der Karosserie sorgt für eine bessere Aerodynamik und damit für mehr Geschwindigkeit, während die Verbesserung des Materials für mehr Sicherheit sorgt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3892473471

