 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text Entweder die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] oder [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] haben eine [concept_approval] von #V 5 oder höher#!.#!" #deepl:458136429
 MR_ART_NOUVEAU_BUTTON: "Art Nouveau" #deepl:2591394517
 MR_ART_NOUVEAU_BUTTON_TT: "#T Wählen Sie Art Nouveau#!\n[concept_elgar_art_nouveau], meist in Verbindung mit Italien auch Stile Liberty, ist eine kunsthistorische Epoche an der Wende vom 19. zum 20. Strömungen, die dem Jugendstil zugeordnet werden können, sind der Reformstil (nach der Reformbewegung), der Sezessionsstil (nach der Wiener Sezession), Modernisme in Katalonien, in der Schweiz Style Sapin und in den USA Tiffany Style. Neben dem Ausdruck Art nouveau, der im Französischen, Englischen und Italienischen vorherrscht, wird im Englischen auch Modern Style und im Italienischen Stile Floreale verwendet. Zeitlich gesehen gehört der Jugendstil zum Fin de Siècle.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3175141798
