 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Berechnen Sie das Alter der Erde#!\n Ein Geologe kann einmal in seinem Leben das Alter der Erde berechnen und seine Theorie allen anderen Geologen vorlegen. Wenn sie zustimmen, ist seine Erdzeitbestimmung die entscheidende. Wird er abgelehnt, kann er es nach einer Periode der Depression erneut versuchen. Um eine neue Theorie präsentieren zu können, muss die nationale geologische Punktzahl höher sein als die Punktzahl, mit der das letzte Erdzeitalter bestimmt wurde.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1657619069
 MR_GEOLOGIST_AGE_EARTH_ACTIVE_TT: "#T Berechnen Sie das Alter der Erde#!\n#p Ihr Geologe ist gerade dabei, das Alter der Erde zu berechnen.#!" #deepl:3935481741
