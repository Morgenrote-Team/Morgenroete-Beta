 MR_RED_CROSS_BUTTON: "Fand die [concept_panum_red_cross]" #deepl:1923939404
 MR_RED_CROSS_BUTTON_TT: "#T Gründung der [concept_panum_red_cross]#! \nDas Internationale Rote Kreuz ist eine der ersten supranationalen Institutionen. Die Gründung dieser Organisation war ein wichtiger Schritt in Richtung Völkerrecht. Sie wurde gegründet, um menschliches Leben und Gesundheit zu schützen, die Achtung aller Menschen zu gewährleisten und menschliches Leid zu verhindern und zu lindern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:658224931
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat weniger als #V 35 [concept_infamy]#! .#!" #deepl:4084298076
 MR_JOIN_RED_CROSS_BUTTON: "Beitritt zum [concept_panum_red_cross]" #deepl:2407688154
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T Treten Sie dem [concept_panum_red_cross] bei#!\nUnser Land kann dem Internationalen Roten Kreuz beitreten und sein Ansehen durch internationale Vereinbarungen verbessern - auf Kosten einer rücksichtslosen Kriegsführung.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2246636786

 MR_IOC_PRESIDENT_BUTTON: "Präsident des IOC werden" #deepl:3135278531
 MR_IOC_PRESIDENT_BUTTON_TT: "#T Werden Sie Präsident des IOC#!\nOhne einen aktiven IOC-Präsidenten können wir dieses Amt übernehmen. Das setzt voraus, dass wir den Hauptsitz des Olympischen Komitees kontrollieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3807322167
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] steuert die [GetBuildingType('building_vikelas_ioc').GetName]#! .#!" #deepl:438731137

 MR_SIGN_FIRST_CONVENTION_BUTTON: "Unterzeichnen Sie das erste Übereinkommen" #deepl:4099037447
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Unterzeichnung der Ersten Konvention#!\nDie Erste Genfer Konvention, offiziell das Übereinkommen zur Verbesserung des Loses der Verwundeten der im Felde befindlichen Heere, legt 'die Grundlage fest, auf der die Regeln des Völkerrechts zum Schutz der Opfer bewaffneter Konflikte beruhen'. Eine ihrer wichtigsten Bestimmungen ist die Immunität aller Einrichtungen zur Behandlung verwundeter und kranker Soldaten vor Gefangennahme und Zerstörung sowie die unparteiische Aufnahme und Behandlung aller Kombattanten.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:826575553
 MR_SIGN_SECOND_CONVENTION_BUTTON: "Unterzeichnen Sie das zweite Übereinkommen" #deepl:2998362336
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T Unterzeichnung der Zweiten Konvention#!\nDie Haager Konventionen von 1899 und 1907 sind eine Reihe von internationalen Verträgen und Erklärungen, die auf zwei internationalen Friedenskonferenzen in Den Haag in den Niederlanden ausgehandelt wurden. Beide Konferenzen umfassten Verhandlungen über Abrüstung, Kriegsrecht und Kriegsverbrechen. Die Konferenz von 1907 konzentrierte sich verstärkt auf die Seekriegsführung.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1144244870
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Unterzeichnen Sie das Dritte Übereinkommen" #deepl:1145249607
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Unterzeichnung des Dritten Übereinkommens#!\nDas Protokoll über das Verbot der Verwendung von erstickenden, giftigen oder anderen Gasen sowie von bakteriologischen Mitteln im Kriege, das üblicherweise als Genfer Protokoll bezeichnet wird, ist ein Vertrag, der den Einsatz von chemischen und biologischen Waffen in internationalen bewaffneten Konflikten verbietet. Es wurde am 17. Juni 1925 in Genf unterzeichnet.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2476775188
 MR_LEAVE_RED_CROSS_BUTTON: "Verlassen Sie das Rote Kreuz" #deepl:3641231755
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T Lassen Sie das Rote Kreuz#!\nHomo homini lupus.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:108150025

 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T Einführung medizinischer Techniken#!\nleitet den Arzt dazu, moderne Geräte, Methoden und neuartige Behandlungen in medizinischen Einrichtungen im ganzen Land einzuführen. Manchmal kann ein Arzt spektakuläre neue Erfindungen entwickeln.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:215141202
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_ACTIVE_TT: "#T Einführung medizinischer Techniken#!\n Ihr Arzt führt derzeit moderne Geräte, Methoden und neuartige Behandlungen in medizinischen Einrichtungen im ganzen Land ein. Manchmal kann ein Arzt spektakuläre neue Erfindungen entwickeln." #deepl:3392580254

