 MR_EXAMINE_CAVE_BUTTON_BUTTON_TT: "#T Untersuchen Sie die Höhle#!\nMit Hilfe eines [concept_lepsius_anthropologist] können die bisher bekannten [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] auf nationalem Gebiet erforscht werden. [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_bones$')] und prähistorische Artefakte können geborgen werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4182467375
