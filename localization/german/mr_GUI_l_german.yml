 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON_TT: "#T Veranstalten Sie das nächste Schneider-Trophy-Rennen#!\nAls Sieger des letzten Rennens haben wir die Ehre, das Rennen im folgenden Jahr auszurichten. Wenn wir drei Rennen in Folge gewinnen, dürfen wir die legendäre Schneider-Trophy für immer behalten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON_NO_BREAK_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V nicht#! den #V Schneider-Trophy-Unterbrechung#! Modifikator.#!"
 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON_WATER_PORT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat entweder einen [concept_incorporated_state] mit einem [GetBuildingType('building_port').GetName] und einem [GetBuildingType('building_urban_center').GetName] #V der Stufe 10 oder höher#! #p ODER#! ist die #V Schweiz#! und hat einen Staat mit einem [GetBuildingType('building_urban_center').GetName] #V der Stufe 10 oder höher#!.#!"
 MR_CURTISS_FOUND_PILOT_SCHOOL_BUTTON: "Eröffnung der Pilotenschule"
 MR_CURTISS_FOUND_PILOT_SCHOOL_BUTTON_TT: "#T Wir haben eine Pilotenschule gefunden#!\nEine Pilotenschule erhöht die Wahrscheinlichkeit, dass zufällig Charaktere mit der Eigenschaft Pilot auftauchen. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CURTISS_FOUND_PILOT_SCHOOL_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [concept_character] mit der [Concept('concept_curtiss_pilot','$concept_curtiss_pilots$')]-Ass #V Eigenschaft#! #p ODER#! einen Charakter, der ein Schneider-Trophy-Veteran ist und eine [GetBuildingType('building_automotive_industry').GetName] der Stufe #V 3#! oder höher #p ODER#! einen Charakter mit der Pilot-Eigenschaft, eine [GetBuildingType('building_automotive_industry').GetName] der Stufe #V 5#! oder höher und einen [GetBuildingType('building_airport').GetName] der Stufe #V 2#! oder höher.#!"
 MR_CHANGE_TO_CIVIL_EGINEER_BUTTON_TT: "#T Ändern Sie die Spezialisierung Ihres Ingenieurs zum [concept_tesla_civil_engineer]#!\nIhr [concept_tesla_engineer] wird sich auf [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')] konzentrieren. Dies könnte seine Effizienz verringern. Sie können die Spezialisierung für #n 5 Jahre#! nicht mehr ändern. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_CIVIL_EGINEER_BUTTON_HAS_NO_CIVIL_ENGINEER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat keinen [concept_tesla_civil_engineer].#!"
 MR_CHANGE_TO_MECHANICAL_EGINEER_BUTTON_TT: "#T Ändern Sie die Spezialisierung Ihres Ingenieurs zum [concept_tesla_mechanical_engineer]#!\nIhr [concept_tesla_engineer] wird sich auf [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')] konzentrieren. Dies könnte seine Effizienz verringern. Sie können die Spezialisierung für #n 5 Jahre#! nicht mehr ändern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_MECHANICAL_EGINEER_BUTTON_HAS_NO_MECHANICAL_ENGINEER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat keinen [concept_tesla_mechanical_engineer].#!"
 MR_CHANGE_TO_MILITARY_EGINEER_BUTTON_TT: "#T Ändern Sie die Spezialisierung Ihres Ingenieurs zum [concept_tesla_military_engineer]#!\nIhr [concept_tesla_engineer] wird sich auf [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')] konzentrieren. Dies könnte ihre Effizienz verringern. Sie können die Spezialisierung für #n 5 Jahre#! nicht mehr ändern. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_MILITARY_EGINEER_BUTTON_HAS_NO_MILITARY_ENGINEER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat keinen [concept_tesla_military_engineer].#!"
 MR_CHANGE_TO_ELECTRICAL_EGINEER_BUTTON_TT: "#T Ändern Sie die Spezialisierung Ihres Ingenieurs zum [concept_tesla_electrical_engineer]#!\nIhr [concept_tesla_engineer] wird sich auf [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')] konzentrieren. Dies könnte ihre Effizienz verringern. Sie können die Spezialisierung für #n 5 Jahre#! lang nicht mehr ändern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_ELECTRICAL_EGINEER_BUTTON_HAS_NO_ELECTRICAL_ENGINEER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat keinen [concept_tesla_electrical_engineer].#!"
 MR_CHANGE_TO_AERONAUTICAL_EGINEER_BUTTON_TT: "#T Ändern Sie die Spezialisierung Ihres Ingenieurs zum [concept_tesla_aeronautical_engineer]#!\nIhr [concept_tesla_engineer] wird sich auf [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')] konzentrieren. Dies könnte ihre Effizienz verringern. Sie können die Spezialisierung für #n 5 Jahre#! nicht mehr ändern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_AERONAUTICAL_EGINEER_BUTTON_HAS_NO_AERONAUTICAL_ENGINEER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat keinen [concept_tesla_aeronautical_engineer].#!"
 MR_STOP_ENGINEERING_PROJECT_BUTTON: "Projekt stoppen"
 MR_STOP_ENGINEERING_PROJECT_BUTTON_TT: "#T Stoppen des technischen Projekt#!\nStoppen Sie Ihr aktuelles technisches Projekt. Ihr technischer Fortschritt geht verloren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RESEARCH_BUTTON: "Bauingenieursforschung"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON: "Infrastrukturprojekt"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON_TT: "#T Infrastrukturprojekt#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf den Ausbau der Infrastruktur [GetPlayer.GetAltName('IN')] konzentrieren. Es gibt verschiedene Projekte, die [Concept('concept_modifier','$concept_modifiers$')] hinzufügen, die [concept_infrastructure] zu Ihren Staaten hinzufügen. Jedes Mal wird der Staat mit der geringsten Infrastruktur den Modifikator erhalten. Dieses Projekt fügt #n Ausgaben#! für ihr Land hinzu.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_TRIGGER_TT: "#default_text Irgendein Staat in Ihrem Land verfügt nicht über alle Infrastruktur [Concept('concept_modifier','$concept_modifiers$')]. Ein Staat benötigt eine [GetBuildingType('building_railway').GetName], um den Eisenbahnmodifikator zu erhalten.#!"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON: "Bauprojekt"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON_TT: "#T Bauprojekt#!\nLasst euren [concept_tesla_engineer] sich darauf konzentrieren, [GetBuildingType('building_construction_sector').GetName]en [GetPlayer.GetAltName('IN')] zu modernisieren.\n\nDies wird im Laufe der Zeit drei Modifikatoren zu deinem Gebäude hinzufügen: $gaudi_new_construction_methods_modifier_with_tooltip$, $gaudi_faster_construction_methods_modifier_with_tooltip$ und $gaudi_efficient_construction_methods_modifier_with_tooltip$.\n\nDieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_CONSTRUCTION_TRIGGER_TT: "#default_text Mindestens ein [GetBuildingType('building_construction_sector').GetName] der Stufe 1 oder höher verfügt nicht über alle drei [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON: "Maschinenbauforschung"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON: "Neue Lokomotiven"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON_TT: "#T Entwickeln Sie neue Lokomotiven#!\nLassen Sie Ihren [concept_tesla_engineer] sich darauf konzentrieren, neue Lokomotiven zu bauen, die einen Bonus für Ihre [GetBuildingType('building_railway').GetName]en geben. Dadurch werden Ihrem Land #n Ausgaben#! hinzugefügt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_TRIGGER_TT: "#default_text Mindestens eine [GetBuildingType('building_railway').GetName] der Stufe 1 oder höher verfügt nicht über alle fünf Lokomotiven [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON: "Industriemodernisierung"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON_TT: "#T Industriemodernisierung#!\nLassen Sie Ihren [concept_tesla_engineer] sich darauf konzentrieren, die Produktionsmethoden eines Gebäudes zu modernisieren. Dies wird Ihrem Gebäude kleine Boni auf [concept_throughput], [concept_good_production] und [concept_input_mult] hinzufügen. Dieses Projekt fügt Iherem Land #n Ausgaben#! hinzu.\n\nModifikatoren, die das Gebäude erhält:\n$gaudi_building_throughput_add_modifier_with_tooltip$\n$gaudi_building_production_mult_modifier_with_tooltip$\n$gaudi_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_TRIGGER_TT: "#default_text Mindestens ein Industriegebäude der Stufe 1 oder höher verfügt nicht über alle drei [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON: "Militärische Forschung"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON: "Marineforschung"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON: "Fortgeschrittene Gewehre"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T Entwickeln Sie fortgeschrittene Gewehre#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Entwicklung fortgeschrittener Gewehre konzentrieren. Dies wird es Ihnen ermöglichen, eine neue [concept_mobilization_option] zu verwenden oder die Stufe zu erhöhen. Dieses Projekt fügt #n Ausgaben#! zu Ihrem Land hinzu.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON: "Fortgeschrittene Panzer"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON_TT: "#T Entwickeln Sie fortgeschrittene Panzer#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Entwicklung fortgeschrittener Panzer konzentrieren. Dies wird es Ihnen ermöglichen, eine neue [concept_mobilization_option] zu verwenden oder die Stufe zu erhöhen. Dieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON: "Fortgeschrittene Feldbefestigungen"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON_TT: "#T Entwickeln Sie fortgeschrittene Feldbefestigungen#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Entwicklung fortschrittlicher Feldbefestigungen konzentrieren. Dies wird es Ihnen ermöglichen, eine neue [concept_mobilization_option] zu verwenden oder die Stufe zu erhöhen. Dieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON: "Elektrische Forschung"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Magnetischen Verein beitreten"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Treten Sie dem Magnetischen Verein bei#!\nDer Beitritt zum Magnetischen Verein in Göttingen ist eine zwingende Voraussetzung, um unsere Forschungen auf dem Gebiet des Erdmagnetismus aufzunehmen und ein Geomagnetisches Observatorium einzurichten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Telegrafienetz"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Aufbau eines Telegrafienetzes#!\nDie Telegrafie revolutioniert die Kommunikation eines Landes und verbessert die Dienstleistungen und die Infrastruktur in Regionen, in denen ein Telegrafienetz existiert. Die Verkabelung eines Landes wird umso schwieriger, je größer das Land ist. Telegrafenmasten können nur in einem Staat errichtet werden, dessen Nachbarstaat ebenfalls über einen Telegrafenmast verfügt. Für die Telegrafie in Übersee werden sowohl der elektrische Telegraf als auch der Elektromagnetismus benötigt, um Unterseekabel zu verlegen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine [GetBuildingType('building_railway').GetName] in der Hauptstadt.#!"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine [GetBuildingType('building_railway').GetName] in #p 65%#! aller Staaten.#!"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Funknetz"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T Bauen Sie ein Funknetz#!\nDie Zeit des lästigen Kabelsalats ist vorbei! Mit der Erfindung der Funktechnik können nun Nachrichten über Antenne gesendet werden. Damit ist es nicht nur möglich, Nachrichten auszutauschen, sondern auch Radioprogramme zu etablieren. Zuvor muss natürlich ein landesweites Netz von Radiosendern aufgebaut werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Eisenvorkommen suchen"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Suche nach einem Eisenvorkommen#!\nGeophysik und Geomagnetismus haben viele praktische Anwendungen. Vor allem der Bergbau profitierte von der Aufdeckung möglicher Lagerstätten. Große Unternehmen nutzten geophysikalische Erkenntnisse, um bisher unbekannte Eisen-, Blei- und Ölvorkommen aufzuspüren. Zusammen mit den richtigen Technologien und der Kartierung des Erdmagnetfeldes sollte es ein Leichtes sein, das aktuelle theoretische Wissen produktiv zu nutzen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat ein [GetBuildingType('building_verrier_observatory').GetName] mit dem #V Geomagnetisches Observatorium#! [concept_production_method].#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Bleivorkommen suchen"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Suche nach einem Bleivorkommen#!\nGeophysik und Geomagnetismus haben viele praktische Anwendungen. Vor allem der Bergbau profitierte von der Aufdeckung möglicher Lagerstätten. Große Unternehmen nutzten geophysikalische Erkenntnisse, um bisher unbekannte Eisen-, Blei- und Ölvorkommen aufzuspüren. Zusammen mit den richtigen Technologien und der Kartierung des Erdmagnetfeldes sollte es ein Leichtes sein, das aktuelle theoretische Wissen produktiv zu nutzen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "Ölvorkommen suchen"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON_TT: "#T Suche nach einem Ölvorkommen#!\nGeophysik und Geomagnetismus haben viele praktische Anwendungen. Vor allem der Bergbau profitierte von der Aufdeckung möglicher Lagerstätten. Große Unternehmen nutzten geophysikalische Erkenntnisse, um bisher unbekannte Eisen-, Blei- und Ölvorkommen aufzuspüren. Zusammen mit den richtigen Technologien und der Kartierung des Erdmagnetfeldes sollte es ein Leichtes sein, das aktuelle theoretische Wissen produktiv zu nutzen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON: "Luftfahrtforschung"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON: "Modernisierung von Flughäfen"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON_TT: "#T Modernisierung von Flughäfen#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Modernisierung Ihrer [GetBuildingType('building_airport').GetName]-Gebäude konzentrieren. Die Flughäfen werden Modifikatoren erhalten, die [concept_throughput] und [concept_good_production] erhöhen und den [concept_input_mult] senken. Dadurch werden Ihrem Land #n Ausgaben#! hinzugefügt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [GetBuildingType('building_airport').GetName] der Stufe 1 oder höher, der noch nicht über die drei [Concept('concept_modifier','$concept_modifiers$')] verfügt.#!"
 MR_AERONAUTICAL_ENGINEER_ADVANCED_AIRCRAFTS_BUTTON: "Militärische Flugzeuge"
 MR_AERONAUTICAL_ENGINEER_ADVANCED_AIRCRAFTS_BUTTON_TT: "#T Entwickeln Sie fortgeschrittene Militärflugzeuge#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Entwicklung fortschrittlicher Militärflugzeuge konzentrieren. Dies wird es Ihnen ermöglichen, eine neue [concept_mobilization_option] zu verwenden oder die Stufe zu erhöhen. Dieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHNEIDER_TROPHY_INFORMATION: "#T Schneider-Trophy#!\nSiege: @curtiss_schneider_point! [GetPlayer.MakeScope.Var('curtiss_schneider_trophy_victories_var').GetValue|V0] [GetPlayer.GetCustom('GUI_curtiss_last_trophy_winner_for_gui_type')]\n\n[GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_1_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_2_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_3_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_4_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_5_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_6_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_7_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_8_global_type')]"
