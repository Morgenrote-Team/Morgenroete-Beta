 MR_ACADEMICS_PROMOTE_ARCHAEOLOGIST_EFFECT_TT: "Ihr nächster Wissenschaftler wird ein [concept_lepsius_archaeologist] sein."
 MR_ACADEMICS_PROMOTE_ANTHROPOLOGIST_EFFECT_TT: "Ihr nächster Wissenschaftler wird ein [concept_lepsius_anthropologist] sein."
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Akademische Investitionen#!\nEine allgemeine staatliche Investition in unsere Universitäten wird den #O Akademischen Fortschritt#! um #G +1#! pro Monat erhöhen. Die Finanzierung ist für 10 Jahre vorgesehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "[GetPlayer.GetAltName('NOM')] investiert nicht bereits in die Akademie."
 MR_ACADEMICS_AVANTGARDE_TT: "#T Avantgarde Intelligenzia#!\nEine Clique von Akademikern mit klaren kulturellen, soziologischen und anthropologischen Vorstellungen bestimmt den wissenschaftlichen Alltag. Praktische Bereiche sind dagegen von untergeordneter Bedeutung.\n#R Hinweis#!: Erhöht das Auftreten von Akademikern um einen Punkt pro Monat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat noch nicht den #b Avantgarde Intelligenzia#! Fokus und hat seinen Fokus nicht kürzlich geändert.#!"
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 50%#! der [GetPlayer.GetAdjective|l]en Universitäten haben [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_PRACTICAL_TT: "#T Angewandte Wissenschaft#!\nDie Wissenschaftler in unserem Land sind unermüdlich bemüht, Entdeckungen aus allen Bereichen für den praktischen Alltag nutzbar zu machen. Dies soll dem allgemeinen Fortschritt und dem Frieden der Menschheit dienen.\n#R Hinweis#!: Erhöht das Auftreten von Akademikern um einen Punkt pro Monat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetAltName('NOM')] hat den #b Angewandte Wissenschaft#! Fokus noch nicht und hat seinen Fokus in letzter Zeit auch nicht geändert.#!"
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 50%#! der [GetPlayer.GetAdjective|l]en Universitäten haben [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_MILITARY_TT: "#T Militärisch-industrieller Komplex#!\nDie Zusammenarbeit zwischen privaten Industriellen und dem Militär hat zur Entwicklung eines besonders bedeutenden Netzes von Verbindungen, persönlichen Beziehungen und Bekanntschaften geführt, mit einem nur sehr leichten Hauch von Korruption, das am besten als militärisch-industrieller Komplex beschrieben werden kann.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat noch nicht den #b Militärisch-Industrieller Komplex#! Fokus und hat seinen Fokus nicht kürzlich geändert.#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 50%#! der [GetPlayer.GetAdjective|l]en Universitäten haben [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens eine [GetBuildingType('building_automotive_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plant').GetName] oder [GetBuildingType('building_artillery_foundry').GetName] der Stufe #p 5#! oder höher.#!"
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text Die [GetPlayer.GetAdjective]e Armee hat die Größe #b 50#! oder größer.#!"
 MR_ACADEMICS_BUSINESS_TT: "#T Wirtschaftsschulen & Tycoon-Kapitalismus#!\nDas unabhängige Individuum in Verbindung mit einer prosperierenden Zeit des Fortschritts hat zu einer Mentalität geführt, in der Handelsschulen, mittelständische Unternehmen und Großkonzerne die Wissenschaft des Landes entscheidend prägen. Umgekehrt arbeiten die Universitäten daran, den erworbenen Wohlstand der Nation durch neue Technologien zu mehren und gesellschaftliche Ideen durch Fortschritt voranzutreiben.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat den #b Wirtschaftsschulen & Tycoon-Kapitalismus#! Fokus noch nicht und hat seinen Fokus nicht kürzlich geändert.#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective]en Universitäten haben [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective]en Universitäten haben [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat entweder [GetBuildingType('building_textile_mill').GetName] oder [GetBuildingType('building_furniture_manufactory').GetName] mindestens der Stufe #p 15#! oder entweder [GetBuildingType('building_tooling_workshop').GetName] oder [GetBuildingType('building_steel_mill').GetName] mindestens der Stufr #p 10#! oder entweder [GetBuildingType('building_motor_industry').GetName] oder [GetBuildingType('building_electrics_industry').GetName] mindestens der Stufe #p 5#!.#!"
 MR_ACADEMICS_SEAPOWER_TT: "#T Seemacht & Handelsmarine#!\nDie Marine und der internationale Handel spielen für unser Land eine immense Rolle. Die Steigerung des Wohlstands durch fortschrittliche Produktion und weltweiten Handel mit unseren Produkten ist ebenso wichtig wie die Verteidigung des bereits Erreichten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat noch nicht den #b Seemacht & Handelsmarine#! Fokus und hat seinen Fokus nicht kürzlich geändert.#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective]en Universitäten haben [concept_pm_academics_university_mathematics].#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective]en Universitäten haben [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text Die [GetPlayer.GetAdjective]e Marine hat die Größe #b 50#! oder größer.#!"
 MR_ACADEMICS_USEFUL_TT: "#T Nützlicher Elfenbeinturm#!\nDie Akademie gilt in unserem Land als Zufluchtsort für exzentrische Köpfe, die Käfer zählen, alte Vasen polieren und sich mit seltsamen Dingen beschäftigen. Es lässt sich jedoch nicht leugnen, dass die Abgeschiedenheit des Elfenbeinturms von der Gesellschaft auch ihre Vorteile hat. Ungestört arbeitet so mancher Professor besser.\n#R Hinweis#!: Erhöht das Auftreten von Akademikern um einen Punkt pro Monat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat noch nicht den #b Nützlicher Elfenbeinturm#! Fokus und hat seinen Fokus nicht kürzlich geändert.#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective]en Universitäten haben [concept_pm_academics_university_humanities].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text Mindestens #p 35%#! der [GetPlayer.GetAdjective]en Universitäten haben [concept_pm_academics_university_natural_history].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat entweder ein [GetBuildingType('building_lepsius_archaeological_museum').GetName], ein [GetBuildingType('building_verrier_observatory').GetName] oder einen [GetBuildingType('building_dubois_zoo').GetName].#!"
 MR_MOUNTAIN_EXPEDITION_TT: "#T Bergexpedition#!\nMit der Besteigung des Mont Blanc im Jahr 1786 begann eine neue Ära der Eroberung der höchsten Gipfel der Erde; ein Trend, der sich im 19. und 20. Jahrhundert nur noch verstärkte. Sollten wir in einem unserer Territorien ein Gebirge haben, das noch nicht bestiegen wurde, könnten wir die Eroberung an einen fähigen General mit den entsprechenden Fähigkeiten delegieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt mindestens einen #V unbezwungenen Gipfel#! oder hat eine #V Bergsteigerlizenz#! bei einer Nation, die einen solchen besitzt.#!"
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat nicht vor kurzem erfolgreich einen neuen Berg bezwungen oder eine Bergexpedition ist gescheitert.#!"
 MR_ZEPPELIN_EXPEDITION_TT: "#T Zeppelin-Expedition#!\nDie Aeroarctic, die \"Internationale Studiengesellschaft zur Erforschung der Arktis durch Luftschiffe\", war eine nichtstaatliche wissenschaftliche Vereinigung, die sich den Einsatz von Luftschiffen in der Polarforschung zum Ziel gesetzt hatte. Sie wurde hauptsächlich auf Initiative des Aeronauten und späteren Generalsekretärs der Gesellschaft, Walther Bruns, gegründet. Gründungspräsident im Jahr 1924 war Fridtjof Nansen. Nach mehrjähriger Vorbereitungsarbeit gelang es der Gesellschaft 1931, erstmals ein Luftschiff für eine rein wissenschaftliche Polarexpedition einzusetzen. Durch die Arktisfahrt des LZ 127 Graf Zeppelin wurde das Wissen über die Geographie der überflogenen Polargebiete wesentlich erweitert. Bereits 1926 überflog Umberto Nobile mit seinem Luftschiff \"Norge\" den Nordpol und unternahm später eine Expedition mit der \"Italia\".\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat ein [GetBuildingType('building_verrier_observatory').GetName] mit der #V Wetterstation Produktionsmethode#!.#!"
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] besitzt entweder ein [concept_curtiss_airspace_convention] oder hat Zugang zu einem dieser Staaten: #V Grönland#!, #V Nordnorwegen#!, #V Alaska#!, #V Nunavut#! oder #V Nenetsia#!.#!"
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist nicht #V auf einer Zeppelin Expedition#! oder #V hatte kürzlich eine#!.#!"
 MR_PACIFIC_EXPEDITION_TT: "#T Pazifik-Expedition#!\nNeben den Polen ist der Pazifische Ozean eines der letzten Gebiete der Erde, das noch Geheimnisse birgt. Wissenschaftler aus verschiedenen Disziplinen sind an einer Forschungsmission interessiert, um naturwissenschaftliche, paläontologische, astronomische und ozeanografische Studien durchzuführen. Für die Großmächte wiederum könnte es eine prestigeträchtige Angelegenheit sein, um ihren Einfluss am Ende der Welt zu demonstrieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] ist entweder eine #V Mittelmacht#! oder eine #V Großmacht#!.#!"
 MR_PACIFIC_PORT_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [GetBuildingType('building_port').GetName].#!"
