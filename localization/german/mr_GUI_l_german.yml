 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T Riesen-Zeppelin#!\nDie Luftschifffahrt hat ihren Höhepunkt erreicht. Unser Land gilt als Geburtsort der größten und trostlosesten Zeppeline der Welt. Es ist an der Zeit, die ganze Welt mit einem gigantischen Luftschiff zu verblüffen und den Globus zu bereisen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3621212246
