 MR_CRETACEOUS_SCENERY_BUTTON_TT: "#T Bauen Sie eine Kreidezeit-Kulisse#!\nSobald das weltweite geologische Wissen einen bestimmten Stand erreicht hat, können Paläontologen an Universitäten einen Raum mit prähistorischen Kulissen einrichten. Pro Universität ist nur eine Kulisse möglich. In diesem Fall lassen Sie Ihren Paläontologen eine Kulisse aus der Kreidezeit bauen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETACEOUS_SCENERY_BUTTON_STOP_TT: "#T Stoppen Sie den Bau einer Kreidezeit-Szenerie#!\nLassen Sie Ihren Paläontologen #n aufhören,#! eine Kreidezeit-Szenerie zu bauen und machen Sie sie wieder verfügbar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_JURASSIC_SCENERY_BUTTON_TT: "#T Bauen Sie eine Jurassic Scenery#!\nSobald das weltweite geologische Wissen einen bestimmten Stand erreicht hat, können Paläontologen an Universitäten einen Raum mit prähistorischen Kulissen einrichten. Pro Universität ist nur eine Kulisse möglich. In diesem Fall lassen Sie Ihren Paläontologen eine Szenerie aus der Jurazeit bauen\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_JURASSIC_SCENERY_BUTTON_STOP_TT: "#T Stoppen Sie den Bau einer Jurassic Scenery#!\nLassen Sie Ihren Paläontologen #n den Bau einer Jurassic Scenery#! stoppen und sie wieder verfügbar machen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
