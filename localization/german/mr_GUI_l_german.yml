 MR_IMPRESSIONISM_BUTTON: "Impressionismus" #deepl:2964141432
 MR_IMPRESSIONISM_BUTTON_TT: "#T Wählen Sie Impressionismus#!\n[concept_elgar_impressionism] ist ein Stil in der Kunstgeschichte, der sich durch die atmosphärische Darstellung flüchtiger Momentaufnahmen einer Szene auszeichnet. Er entstand aus einer Bewegung innerhalb der französischen Malerei in der zweiten Hälfte des 19. Jahrhunderts. Der Begriff Impressionismus wurde auch auf bestimmte Musik-, Literatur-, Film- und Fotostile angewandt. Während viele Naturalisten wie Heinrich Hart die Musik als Ausdrucksmittel eines "wahrheitssuchenden Aktionismus" ablehnten, betrachteten die Impressionisten das "gegenstandslose Vorträumen" zu fein abgestuften farbigen Akkorden oft als Genuss.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3084227701
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] sind [concept_powerful].#!" #deepl:3745834234
