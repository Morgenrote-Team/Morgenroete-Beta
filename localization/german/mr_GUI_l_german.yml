 MR_PACIFIC_15_FLOTILLAS_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 15 oder mehr Flotten#!.#!"
 MR_PACIFIC_ADMIRAL_AVAILABLE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen #V Admiral#! der #V nicht beschäftigt ist#!.#!"
