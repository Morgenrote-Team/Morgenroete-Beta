 MR_RECRUIT_PHYSICIAN_BUTTON: "Arzt rekrutieren"
 MR_RECRUIT_PHYSICIAN_BUTTON_TT: "#T Rekrutierung eines Arztes#!\nDer Besitz eines großen Allgemeinkrankenhauses bietet die einmalige Gelegenheit, sofort Ärzte aus dem Praxisdienst zu rekrutieren. Darüber hinaus kann ein Arzt nach seinem Fachgebiet ausgewählt werden. Dies ermöglicht eine wesentlich gezieltere medizinische Forschung.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
