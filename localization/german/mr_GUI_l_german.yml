 MR_VISIT_PALEONTOLOGICAL_COLLECTION_TRIGGER_TT: "#default_text Sie besuchen #V derzeit nicht#! die #V Paläontologischen Sammlung#!.#!"
 VISIT_MUSEUM_BUTTON: "Museum"
 VISIT_MUSEUM_BUTTON_TT: "#T Besuchen Sie das Archäologische Museum#!\nDas [concept_lepsius_museum] ist der Ort, an dem alle Ihre [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] präsentiert werden. Es bietet einen Überblick über Ihre archäologische Sammlung.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
