 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "Paläontologische Expedition zurückrufen"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Rückruf Paläontologische Expedition#!\nDer Paläontologe zieht sich von seiner paläontologischen Untersuchung zurück, um sich anderen Aufgaben zu widmen - wie dem Bau oder das Remontieren von Dinosaurierskeletten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_BUTTON: "Dinosaurierskelett konstruieren"
 MR_MOUNT_SKELETON_BUTTON_TT: "#T Baue ein Dinosaurierskelett#!\nIhr [concept_dubois_paleontologist] kann ein neues [concept_dubois_dinosaur_skeleton] mit 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] vom selben Kontinent bauen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text Sie erwägen noch nicht, #V ein [concept_dubois_dinosaur_skeleton] zu konstruieren#!.#!"
 MR_MOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] von einem Kontinent, von dem wir noch nicht alle [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] haben#!.#!"
 MR_REMOUNT_SKELETON_BUTTON: "Dinosaurierskelett remontieren"
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T Dinosaurierskelett remontieren#!\nWenn Sie unvollkommene [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] haben, können Sie Ihren [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] versuchen lassen, sie zu remontieren. Wenn Ihr Paläontologe erfahren genug ist, könnte das neu montierte Skelett von besserer Qualität sein.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_REMOUNT_SKELETON_ACTIVE_BUTTON_TRIGGER: "#default_text Sie erwägen nicht, #V ein [concept_dubois_dinosaur_skeleton] zu montieren#!.#!"
 MR_REMOUNT_SKELETON_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] der #V nicht beschäftigt#! ist.#!"
 MR_REMOUNT_SKELETON_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens ein #V unvollkommenes#! [concept_dubois_dinosaur_skeleton].#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON: "Fossilien zu Knochen"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T Fossilien in einen Knochen umwandeln#!\nEin erfahrener oder berühmter [concept_dubois_paleontologist] kann 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] in einen [concept_dubois_dinosaur_bone] umwandeln, wenn du bereits mindestens einen Knochen besitzt und nicht zu viele Knochen von jedem Kontinent hast.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSFORM_FOSSILS_TO_BONES_TRANSFORMABLE_DINOSAUR_BONE_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat bereits #V mindestens 1#! [concept_dubois_dinosaur_bone] und hat #V noch nicht alle notwendigen Knochen von jedem Kontinent#!.#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_FOSSILS_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat #V 20 oder mehr#! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')].#!"
 MR_TRANSFORM_FOSSILS_TO_BONES_PALEONTOLOGIST_TRIGGER: "#default_text [GetPlayer.GetAltName('NOM')] hat einen erfahrenen oder berühmten [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], der im Moment nicht beschäftigt ist.#!"
 MR_EXTINCTION_CONGRESS_BUTTON: "Aussterbekongress"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Aussterbekongress#!\nEines der rätselhaftesten Rätsel der Naturgeschichte bleibt das Verschwinden der Dinosaurier. Der Vater der Paläontologie, Georges Cuvier, entdeckte, dass es am Ende der Kreidezeit ein Massenaussterben gegeben hatte, bei dem auch die Dinosaurier ausstarben. Aber wie konnten die grausamen Echsen, die Millionen Jahre lang die Erde beherrschten, plötzlich überflüssig werden?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_PALEONTOLOGIST_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat einen [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')].#!"
 MR_EXTINCTION_CONGRESS_15_PALEONTOLOGISTS_TRIGGER_TT: "#default_text 15 Länder haben einen [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]#!"
