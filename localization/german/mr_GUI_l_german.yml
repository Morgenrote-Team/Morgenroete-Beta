 MR_CIVIL_ENGINEER_RESEARCH_BUTTON_TT: "#T Bauingenieurforschung#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Erforschung von Bautechnologien konzentrieren. Dieses Projekt wird Ihrem Land #n Ausgaben#! verursachen, aber die Forschung regelmäßig ankurbeln.\nTechnologie für den nächsten Schub: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_civil_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Maschinenbauforschung#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Erfindung neuer mechanischer Innovationen konzentrieren. Dies wird Ihrem Land #n Ausgaben#! aufbürden, Ihnen aber regelmäßig Forschungsschübe bescheren.\nTechnologie für den nächsten Schub: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_mechanical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON_TT: "#T Militärforschung#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Erfindung neuer militärischer Innovationen konzentrieren. Dies wird Ihrem Land #n Ausgaben#! aufbürden, Ihnen aber regelmäßig Forschungsschübe bescheren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON_TT: "#T Marineforschung#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Erfindung neuer maritimer Innovationen konzentrieren. Dies wird Ihrem Land #n Ausgaben#! aufbürden, Ihnen aber regelmäßig Forschungsschübe bescheren.\nTechnologie für den nächsten Schub: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_military_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Elektrotechnische Forschung#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Erfindung neuer Anwendungen von Elektrizität konzentrieren. Dies wird Ihrem Land #n Ausgaben#! aufbürden, Ihnen aber regelmäßig Forschungsschübe bescheren.\nTechnologie für den nächsten Schub: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_electrical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Luftfahrttechnische Forschung#!\nLassen Sie Ihren [concept_tesla_engineer] sich auf die Erforschung von Technologien in der Luftfahrttechnik konzentrieren. Dieses Projekt wird Ihrem Land #n Ausgaben#! verursachen, aber die Forschung regelmäßig ankurb\nTechnologie für den nächsten Schub: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_aeronautical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_MEDICAL_RESEARCH_BUTTON_TT: "#T Medizinische Forschung#!\nDieses Projekt ist aktiv, wenn der [concept_panum_physician] nicht mit einem anderen Projekt beschäftigt ist.\n\nWenn ein [concept_panum_physician] die medizinische Forschung vorantreibt, kann er nicht nur technologische Boni für eine Nation freischalten, sondern manchmal auch Behandlungen für alltägliche Krankheiten erforschen und finden.\nTechnologie für den nächsten Boost: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MISSING_CMF_HEADER: "Fehlendes Community Mod Framework"
 MR_MISSING_CMF_HEADER_LOC: "Morgenröte benötigt das #V Community Mod Framework#! um zu funktionieren. Bitte lade das Framework entweder auf Steam oder der GitHub-Seite herunter.\n\nWenn du das #V Community Mod Framework#! nicht finden kannst, schaue bitte in der Beschreibung von Morgenröte im Steam Workshop nach. Dort gibt es einen Link sowohl für die Steam- als auch für die GitHub-Version."
