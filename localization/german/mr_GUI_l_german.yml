 MR_CIVIL_ENGINEER_TOPOGRAPHIC_MAP_BUTTON: "Topographische Karte erstellen"
 MR_CIVIL_ENGINEER_TOPOGRAPHIC_MAP_BUTTON_TT: "#T Erstelle eine topografische Karte#!\nLass deinen [concept_tesla_engineer] sich auf die Erstellung einer topografischen Karte [GetPlayer.GetAltName('GEN')] konzentrieren. Dies fügt den $gaudi_topographic_state_map_modifier_with_tooltip$ [concept_modifier] zu Staaten hinzu, was den Bau und den Transport erleichtert. Dieses Projekt wird #n Ausgaben#! zu Ihrem Land hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_TOPOGRAPHIC_MAP_TRIGGER_TT: "#default_text Mindestens ein [concept_state] verfügt nicht über die #V Topographische Karte#! [concept_modifier].#!"
