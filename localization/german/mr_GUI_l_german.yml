#Naturalist Buttons
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T Heia Safari#!\nAuf einer afrikanischen Safari kann durch ständiges Aufspüren und Fallenstellen Großwild gefangen und dann zu einer [concept_dubois_zoo] transportiert werden. Es ist nur möglich, ein Tier pro Safari zu fangen. Je nach Tierart ist es unterschiedlich, ob man Fallen benötigt oder ihnen auf der Spur bleiben muss. Als Faustregel gilt, dass große, träge Tiere mehr Fallen benötigen, während schnelle Tiere mehr Fährtenarbeit erfordern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1078205560
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [concept_dubois_naturalist] die #V nicht besetzt ist#!.#!" #deepl:1140993008
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text Sie haben eine [concept_dubois_zoo], die mindestens #V klein ist#!.#!" #deepl:3269473207
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V  besitzt mindestens ein afrikanisches Tierhabitat#! mit Großwild oder es gibt ein solches Habitat in einem Staat #V im Besitz einer dezentralen Nation#!.#!" #deepl:3849104050
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist nicht #V auf einem Safari#! oder #V hatte kürzlich einen#!.#!" #deepl:4093718702
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Fangen Sie einheimische Tiere#!\nUnser Land verfügt über Tierlebensräume mit faszinierenden Arten, die in einem [concept_dubois_zoo] ausgestellt werden könnten. Ein [concept_dubois_naturalist] reist ein Jahr lang durch das ganze Land, um [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] für einen Zoo zu sammeln.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:748539405
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen Tierlebensraum, der ein [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] beherbergt, das nicht in unserem [concept_dubois_zoo] lebt.#!" #deepl:1274435592
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] fängt derzeit keine einheimischen Tiere #V #! .#!" #deepl:1703923624
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Botanische Expedition#!\nBotanische Expeditionen (manchmal auch "Pflanzenjagd" genannt) sind wissenschaftliche Reisen zur Erforschung der Flora einer bestimmten Region. Eine [concept_dubois_naturalist] wäre für die Identifizierung, Beschreibung und Sammlung von Exemplaren verantwortlich.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3461602955
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Botanische Expeditionen sind aus #V politischen Gründen verboten worden#!.#!" #deepl:3635257612
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V  besitzt einen Regenwald#! in mindestens einem Staat. Regenwälder haben die folgenden Zustandsmodifikatoren: #V Amazonas-Wald#!, #V Kongo-Wald#!, #V Borneo-Wald#! und #V Indochinesischer Wald#!.#!" #deepl:3748841329
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Rückruf des Naturforschers von der botanischen Expedition#!\nDer [concept_dubois_naturalist] wird von seinen botanischen Forschungen zurückbeordert, um ihn für andere Zwecke zu verwenden - zum Beispiel zum Einfangen von Tieren.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2320927130
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text Ihr [concept_dubois_naturalist] ist #V weder auf Reisen noch krank#!.#!" #deepl:3246911635
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Ihre [concept_dubois_naturalist] ist nicht mehr besetzt." #deepl:3237572503
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Hippocampus-Kongress" #deepl:241549767
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Hippocampus-Kongress#!\nWie einzigartig ist der Mensch? Wie sehr ist er ein Tier? Schon die alten Griechen hatten eine Nähe zwischen Menschen und Affen festgestellt. Die Tatsache, dass Carl Linneaus Affen und Menschen als Primaten einstufte - den "höchsten" Rang unter den Tieren - zeigt, dass das Thema einst nicht so umstritten war. Mit der Formulierung der Evolutionstheorie und der vermuteten Abstammung des Menschen von einem affenähnlichen Verwandten sind jedoch Konflikte entstanden, die es nun zu lösen gilt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3122477668
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [concept_dubois_naturalist]#!" #deepl:3044267997
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text Mindestens #V 5 Länder#! haben eine [concept_dubois_naturalist].#!" #deepl:230362769
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 20000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] (derzeit [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!" #deepl:101749085
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text #V 100000 oder mehr#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sind weltweit gesammelt worden (derzeit [GetGlobalVariable('dubois_global_specimen').GetValue|0+]).#!" #deepl:3525572780
 MR_EXTEND_ZOO_SMALL_BUTTON: "Erweitern Sie die [concept_dubois_zoo] (klein)" #deepl:2992708407
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine kleine Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind alle glücklich: Die Menschen verteilen sich im Zoo, die Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3721135756
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V insgesamt 10#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] . Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!" #deepl:452636919
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 2 afrikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 asiatische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) oder #V 2 ozeanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+])." #deepl:1518858253
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName] wird #V derzeit nicht erweitert#! die [concept_dubois_zoo].#!" #deepl:952817649
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "Erweitern Sie die [concept_dubois_zoo] (mittel)" #deepl:2477369325
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine mittlere Größe#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind alle glücklich: Die Menschen verstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl ausländischer Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2741412050
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 20 insgesamt#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] . Sie haben derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!" #deepl:4038999373
 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 5 afrikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 5 asiatische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]), #V 5 ozeanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]) oder #V 5 südamerikanische#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (derzeit [GetPlayer.MakeScope.Var('dubois_zoo_animal_south_america').GetValue|0+]).#!" #deepl:2395715230
 MR_EXTEND_ZOO_LARGE_BUTTON: "Erweitern Sie die [concept_dubois_zoo] (groß)" #deepl:3093863356
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T Erweitern Sie den Zoo auf eine große Fläche#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] sind alle glücklich: Die Menschen verstreuen sich im Zoo, Wissenschaftler können ihre zoologischen Studien fortsetzen, und internationales Ansehen genießt derjenige, der die größtmögliche Anzahl fremder Tiere zeigen kann. Mit jeder Erweiterung steigt das Prestige einer Nation. In einigen Ausbaustufen müssen nicht nur viele Tiere gesammelt werden, sondern auch aus verschiedenen Teilen der Welt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1782607413
