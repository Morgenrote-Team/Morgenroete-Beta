 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text Mindestens #V 50#! @lepsius_human_fossil! [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] wurden weltweit gefunden (aktuell [GetGlobalVariable('dubois_global_human_fossil').GetValue|+0] @lepsius_human_fossil! wurden gefunden).#!"
