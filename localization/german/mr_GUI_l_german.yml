 MR_WORLDCUP_BUTTON: "Fußball-Weltmeisterschaft" #deepl:2864672655
 MR_WORLDCUP_BUTTON_TT: "#T Organisieren Sie die Fußballweltmeisterschaft#!\nDie Weltmeisterschaft ist ein Fußballwettbewerb für Nationalmannschaften. Alle vier Jahre können sich Mannschaften für die Endrunde der Weltmeisterschaft qualifizieren. In einem vierwöchigen Turnier wird die beste Nationalmannschaft zum Weltmeister gekürt. Der Weltfußballverband Fédération Internationale de Football Association (FIFA) organisiert und vermarktet das Turnier. Die erste Weltmeisterschaft fand 1930 in Uruguay statt und wurde von der Gastgebermannschaft gewonnen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2541572983

