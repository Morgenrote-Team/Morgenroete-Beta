 MR_MOUNT_SKELETON_ACTIVE_TT: "#T Dinosaurierskelett konstruieren#!\n#p Dein Paläontologe konstruiert gerade ein Dinosaurierskelett.#!\nDein [concept_dubois_paleontologist] kann ein neues [concept_dubois_dinosaur_skeleton] mit 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] vom selben Kontinent bauen."
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T Dinosaurierskelett wieder zusammensetzen#!\n#p Dein Paläontologe setzt gerade ein Dinosaurierskelett wieder zusammen.#!\nWenn du ein unvollkommenes [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] hast, kannst du deinen [concept_dubois_paleontologist] versuchen lassen, es wieder zusammenzusetzen. Wenn dein Paläontologe erfahren genug ist, könnte das neu montierte Skelett von besserer Qualität sein."
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expedition ins Tal der Könige#!\n#p Ihr Archäologe befindet sich derzeit auf einer Expedition ins Tal der Könige.#!\nMit der alten Hauptstadt Theben und dem Tal der Könige gilt Oberägypten als das Mekka der Ägyptologie. Wir sollen eine Ausgrabungslizenz für das Gebiet erwerben und nach ägyptischen Schätzen suchen."
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Expedition zu den Pyramiden#!\n#p Ihr Archäologe befindet sich derzeit auf einer Expedition zu den Pyramiden.#!\nSeit Anbeginn der Zeit haben die ägyptischen Pyramiden die Menschheit fasziniert. Man sagt, dass andere Gräber, Tempel und sogar Städte, die im Sand von Unterägypten verschwunden sind, darauf warten, wiederentdeckt zu werden."
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T Expedition nach Babylonien#!\n#p Ihr Archäologe befindet sich derzeit auf einer Expedition nach Babylonien.#!\nBabylonien, der südliche Teil von Mesopotamien, verdankt seinen Namen der einst mächtigen Stadt Babylon. Die Region gilt als \"Wiege der Zivilisation\", in der immer wieder wertvolle archäologische Artefakte entdeckt werden. Sie gehören unbedingt in ein Museum."
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T Expedition nach Assyrien#!\n#p Ihr Archäologe befindet sich derzeit auf einer Expedition nach Assyrien.#!\nAssyrien bezeichnet den nördlichen Teil Mesopotamiens mit den beiden wichtigen Städten Assur und Ninive. Das spärliche Wissen über das Land geht immer noch auf die Bibel als Quelle zurück - aber vielleicht gibt es historische Beweise, die zuverlässiger sind?"
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T Expedition nach Argolis#!\n#p Ihr Archäologe befindet sich derzeit auf einer Expedition nach Argolis.#!\nNach der Entdeckung von Troja wird selbst skeptischen Wissenschaftlern klar, dass die Mythen der alten Griechen mehr als nur Märchen sind. In der Argolis sollen bis heute die Überreste bronzezeitlicher Städte liegen, die bekannteste davon ist Mykene. Davon sollten wir uns selbst überzeugen."
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T Expedition nach Kreta#!\n#p Ihr Archäologe befindet sich derzeit auf einer Expedition nach Kreta.#!\nDer legendäre König Minos soll einst über Kreta geherrscht haben. Ähnlich wie bei Troja und Mykene scheint auch an dieser Geschichte etwas dran zu sein: Immer häufiger werden auf der Insel Artefakte aus der legendären minoischen Kultur gefunden. Auch unser Land sollte ein paar davon sichern."
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T Expedition nach Yucatán#!\n#p Ihr Archäologe befindet sich derzeit auf einer Expedition nach Yucatán.#!\nDie Berichte über unbekannte und riesige Städte mitten im Dschungel häufen sich. Wir sollten weitere Nachforschungen anstellen und eine archäologische Expedition nach Yucatán schicken."
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T Expedition nach Peru#!\n#p Ihr Archäologe befindet sich derzeit auf einer Expedition nach Peru.#!\nPiloten berichten von seltsamen Festungen und ummauerten Strukturen in den Anden, die sie bei ihren Flügen über Peru gesehen haben. Vielleicht haben die Spanier die Kultur der Inkas nicht völlig zerstört? Einige Städte des indigenen Widerstands sind bis heute nicht gefunden worden."
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T Fossilien identifizieren#!\n#p Ihr Anthropologe ist gerade dabei, Fossilien zu identifizieren.#!\nAn [concept_lepsius_anthropologist] hat die Fähigkeit, einen unbekannten Knochen im Laufe der Zeit zu analysieren und ihn einer bestimmten menschlichen oder vormenschlichen Art zuzuordnen. Wenn es ihm gelingt, drei Knochen derselben Art zuzuordnen, kann er diese Art erfolgreich systematisieren. Wie lange es dauert, einen Knochen korrekt zu identifizieren, hängt von der Erfahrung des Anthropologen ab."
 MR_CONDUCTING_ACTIVE_TT: "#p Ihr Komponist dirigiert derzeit eine Saison an der Oper.#!\n[Localize('concept_elgar_conducting_desc')]"
 MR_MUSIC_TOUR_ACTIVE_TT: "#p Ihr Komponist befindet sich derzeit auf einer Musiktournee.#!\n[Localize('concept_elgar_musical_tour_desc')]"
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T Zeitungsroman#!\n#p Ihr Autor schreibt gerade einen Zeitungsroman.#!\nIm 19. Jahrhundert garantierte der Zeitungsroman vielen Autoren ein sicheres Einkommen und nationalen Ruhm. Viele bekannte Schriftsteller dieser Zeit, wie Tolstoi, Dostojewski, Flaubert und Dumas, veröffentlichten ihre Romane zunächst als Fortsetzungsromane in Zeitungen, bevor sie als Bücher veröffentlicht wurden."
 MR_READNG_TOUR_ACTIVE_TT: "#T Lesereise#!\n#p Ihr Autor befindet sich derzeit auf Lesereise.#!\nEin international anerkannter Schriftsteller, der mit ausländischen Verlagen in Kontakt steht, kann den eigenen Bekanntheitsgrad steigern, wenn er auf Lesereise geht. Dies fördert nicht nur die gegenseitigen Beziehungen, sondern auch seinen Ruf."
 MR_PAINTER_TRIP_ACTIVE_TT: "#T Bildungsreise#!\n#p Ihr Maler befindet sich gerade auf einer Bildungsreise.#!\n Auf einer [concept_klimt_painter_trip] kann ein Künstler einen bisher unbekannten Kunststil erlernen und so die jährliche [concept_klimt_painting_tradition] verbessern. Sie können während ihres Aufenthalts in einem fremden [concept_artists_center_of_arts] auch andere positive und negative Eigenschaften erwerben."
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T Gebirgsexpedition#!\n#p Derzeit findet eine Gebirgsexpedition statt.#!\nMit der Besteigung des Mont Blanc im Jahr 1786 begann eine neue Ära der Eroberung der höchsten Gipfel der Erde; ein Trend, der sich im 19. und 20. Sollten wir in einem unserer Territorien ein Gebirge haben, das noch nicht bestiegen wurde, könnten wir die Eroberung an einen fähigen General mit den entsprechenden Fähigkeiten delegieren."
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T Luftkampfeinsatz#!\n#p Ihr Pilot befindet sich gerade in einem Luftkampfeinsatz.#!"
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T Aircraft Parade#!\n#p Ihr Pilot nimmt gerade an einer Flugzeugparade teil.#!"
