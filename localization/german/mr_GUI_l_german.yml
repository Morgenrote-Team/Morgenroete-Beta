 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist #V nicht der aktuelle Olympic Host#!.#!" #deepl:6608650
 MR_IOC_BRIBE_BUTTON: "Bestechung des IOC" #deepl:708066668
 MR_IOC_BRIBE_BUTTON_TT: "#T Bestechung des IOC#!\nMit einer großzügigen "Spende" an den IOC-Vorstand können wir uns das Wohlwollen der Mitglieder sichern und als vierter Kandidat bei der Vergabe der nächsten Olympischen Spiele platziert werden. Allerdings gibt es keine Garantie dafür, dass wir anschließend ausgewählt werden. Die anderen IOC-Mitglieder könnten unsere Großzügigkeit auch missverstehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3805098383
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist #V nicht bereits Bestechung des IOC#!.#!" #deepl:4223709539
 MR_OLYMPIC_FLAME_BUTTON: "Die olympische Flamme" #deepl:1885057234
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T Die olympische Flamme#!\nDie olympische Flamme, die dem immer brennenden Herdfeuer der griechischen Göttin Hestia nachempfunden ist, wurde zum ersten Mal bei den Olympischen Spielen 1928 in Amsterdam entzündet. Die Tradition des damit verbundenen olympischen Fackellaufs wurde bei den Sommerspielen 1936 in Berlin eingeführt. Entgegen der landläufigen Meinung stammte die Idee nicht von den Nationalsozialisten, sondern von dem deutsch-jüdischen Archäologen Alfred Schiff. Die Einführung dieser Tradition sollte nicht nur den Olympischen Spielen ein neues Identifikationssymbol geben, sondern auch die Bevölkerung alljährlich zusammenführen und als erhebendes Symbol von anderen Missständen ablenken.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:671214454
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName] bereitet sich #V auf die Ausrichtung der nächsten Olympischen Spiele#! vor.#!" #deepl:1979136339

