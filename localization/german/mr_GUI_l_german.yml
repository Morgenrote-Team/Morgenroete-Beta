 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON: "Mechanische Innovation umsetzen"
 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON_TT: "#T Wandeln Sie mechanische Innovationen um#!\nWandeln Sie mechanische Innovationen in Forschungspunkte um, damit die gesamte Nation von den Errungenschaften des Motorsports profitiert.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_NO_PARTICIPATION_BUTTON_TT: "#T Absage der Rennteilnahme#!\n In bestimmten Situationen, z. B. wenn ein Fahrer als zu hitzköpfig gilt oder ein Auto zu unreif ist, was zu einem verheerenden Unfall führen könnte, kann es sinnvoll sein, die Rennteilnahme auf Eis zu legen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
