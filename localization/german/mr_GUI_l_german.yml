 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON: "Synthetischer Kautschuk"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON_TT: "#T Synthesekautschuk#!\nGummi ist auf eine sehr kleine Klimazone beschränkt. Ohne Kolonien oder Importe ist es kaum möglich, diesen wertvollen Rohstoff zu gewinnen. Aber vielleicht können die Möglichkeiten der Chemie das ausgleichen, was uns an anderer Stelle fehlt?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_BUTTON: "Dokumentieren Sie ein einheimisches Tier"
 MR_ANIMAL_DOCUMENTATION_BUTTON_TT: "#T Dokumentieren Sie einheimische Tiere#!\nDie einheimische Fauna sollte bei allen Bestrebungen, möglichst exotische Tiere zu erforschen, nicht vernachlässigt werden. Ein Naturforscher kann Tiere in Lebensräumen, die in ihren Kernprovinzen leben, genau studieren und wissenschaftliche Arbeiten über sie verfassen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_ACTIVE_TT: "#T Dokumentieren Sie ein einheimisches Tier#!\n#p Ihr Naturforscher dokumentiert derzeit die örtliche Tierwelt.#!\nDie einheimische Fauna sollte bei allen Bestrebungen, möglichst exotische Tiere zu erforschen, nicht vernachlässigt werden. Ein Naturforscher kann Tiere in Lebensräumen, die in seinen Kernprovinzen leben, genau studieren und wissenschaftliche Abhandlungen über sie schreiben."
 MR_CAN_DOCUMENT_ANIMAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] besitzt mindestens einen integrierten Staat mit einem Tierlebensraum, in dem ein undokumentierter [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] lebt.#!"
 MR_GEOLOGIST_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat einen [concept_agassiz_geologist] der #V nicht beschäftigt ist#!.#!"
 MR_GEOLOGIST_FIND_ORE_TRIGGER_TT: "#default_text Mindestens ein Minengebäude der Stufe 1 oder höher verfügt nicht über die #ORANGE Neue Erzader#! [Concept('concept_modifier','$concept_modifiers$')] .#!"
 MR_GEOLOGIST_FIND_OIL_TRIGGER_TT: "#default_text Mindestens eine Bohrinsel der Stufe 1 oder höher verfügt nicht über die #ORANGE Neue Ölquelle#! [Concept('concept_modifier','$concept_modifiers$')] .#!"
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON: "Verkaufen Mineralien für seltene Mineralien"
 MR_SELL_MINERALS_FOR_RARE_MINERAL_TRIGGER: "#default_text [GetPlayer.GetName] hat #V 20.000 oder mehr#! [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] .#!"
 MR_MINERAL_CABINET_BUTTON: "Fundstück Mineralienkabinett"
 MR_MINERAL_CABINET_BUTTON_TT: "#T Fundstück Mineralienkabinett#!\n Ein Mineralienkabinett in Ihrem Zoo macht ihn noch repräsentativer. Wir können dort alle Mineralien ausstellen, die von unseren [concept_agassiz_geologist]. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MINERAL_CABINET_NUMBER_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 50 oder mehr#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] (derzeit [GetPlayer.MakeScope.Var('agassiz_rare_minerals_var').GetValue|0+]).#!"
 MR_MINERAL_CABINET_EFFECT_TT: "Ihr [GetBuildingType('building_dubois_zoo').GetName] erhält ein #V Mineralienkabinett#!, das Ihnen 50 Prestige und einen kleinen Anstieg des Lebensstandards beschert."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T Erforschen Sie das Atlantikgebirge#!\n Nachdem bei der Verlegung des Transatlantikkabels Hinweise auf unterseeische Erhebungen gefunden wurden, fragen sich führende Geologen, was die Ursache dafür sein könnte. Moderne Messgeräte und ein erfahrener Geologe könnten das Geheimnis lüften.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_EXPERIENCED_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat ein #O erfahren#! oder #O bekannt#! [concept_agassiz_geologist] .#!"
 MR_GEOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine #O berühmte#! [concept_agassiz_geologist] .#!"
 MR_PALEONTOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine #O berühmte#! [concept_dubois_paleontologist] .#!"
 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T Prospect Ore#!\nA [concept_agassiz_geologist] can search for new raw material deposits near already established mines and thus increase the production of the ore.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Stop Prospecting Ore#!\nA Your [concept_agassiz_geologist] is currently searching for new raw material deposits near already established mines and thus increasing the production of the ore.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T Prospect Oil#!\nA [concept_agassiz_geologist] can search for new oil wells near already established oil rigs and thus increase production.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "Visit Planetarium"
 VISIT_OBSERVATORY_BUTTON_TT: "#T Visit the Planetarium#!\nThe Planetariun offers you an overview of the astronomical knowledge of your country, other countries and the scientific community."
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Sell Minerals for Rare Minerals#!\nA [concept_agassiz_geologist] can purchase [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] from colleagues, collectors, and other geological enthusiasts. For this he has to exchange a considerable amount of common minerals.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "Interdisciplinary Symposium"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Geological-Paleontological Symposium#!\nThe intersections between geology and paleontology are large. We should bring together the luminaries in the field and use the synergies that arise from this exchange to create new scientific theories about Earth's history.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Geologe befördern#!\n#p Sie befördern gerade den Geologen.#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] studieren Mineralien, Vulkane und andere geologische Formationen."
 MR_ACADEMICS_PROMOTE_GEOLOGIST_EFFECT_TT: "Ihr nächster Wissenschaftler wird ein [concept_agassiz_geologist] sein."
