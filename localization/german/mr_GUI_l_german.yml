 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON: "Bauprojekt"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON_TT: "#T Bauprojekt#!\nLassen Sie Ihr [concept_gaudi_engineer] auf die Modernisierung des [GetBuildingType('building_construction_sector').GetName] von [GetPlayer.GetName] konzentrieren. Dies wird Ihrem Gebäude kleine Boni auf [concept_throughput], [concept_good_production] und [concept_input_mult] hinzufügen. Dieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
