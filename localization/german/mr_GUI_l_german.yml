 MR_ANIMAL_DOCUMENTATION_BUTTON_TT: "#T Dokumentieren Sie einheimische Tiere#!\nDie einheimische Fauna sollte bei allen Bestrebungen, möglichst exotische Tiere zu erforschen, nicht vernachlässigt werden. Ein Naturforscher kann Tiere in Lebensräumen, die in ihren Kernprovinzen leben, genau studieren und wissenschaftliche Arbeiten über sie verfassen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2700816422
 MR_ANIMAL_DOCUMENTATION_ACTIVE_TT: "#T Dokumentieren Sie ein einheimisches Tier#!\n#p Ihr Naturforscher dokumentiert derzeit die örtliche Tierwelt.#!\nDie einheimische Fauna sollte bei allen Bestrebungen, möglichst exotische Tiere zu erforschen, nicht vernachlässigt werden. Ein Naturforscher kann Tiere in Lebensräumen, die in seinen Kernprovinzen leben, genau studieren und wissenschaftliche Abhandlungen über sie schreiben." #deepl:1151565866
