 MR_AUTORACING_PARTICIPATION_BUTTON_TT: "#T Rennteilnahme#!\nErmöglicht dem Rennfahrer die erneute Teilnahme an allen Rennen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
