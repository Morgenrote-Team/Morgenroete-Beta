 MR_INVITE_COMPOSER_BUTTON_TT: "#T Laden Sie diesen Komponisten ein#!\nDas Einladen eines [Concept('concept_elgar_composer','$concept_elgar_composers$')] ist eine Möglichkeit, einen neuen Komponisten zu bekommen, wenn Ihr Land keinen ausreichend guten Komponisten zur Verfügung stellen kann oder wenn Ihr aktueller Komponist Sie nicht zufriedenstellt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_composer', Scope.GetCharacter.MakeScope ).End)]"
