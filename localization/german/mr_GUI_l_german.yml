 MR_EXAMINE_CAVE_BUTTON_BUTTON_TT: "#T Untersuchen Sie die Höhle#!\nMit Hilfe eines [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] können die bisher bekannten [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] auf nationalem Gebiet erforscht werden. [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_bones$')] und prähistorische Artefakte können geborgen werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXAMINE_CAVE_HAS_CAVE_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat eine [concept_lepsius_cave].#!"
 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T Anthropologen zurückrufen#!\nGelegentlich kann es vorkommen, dass Sie eine Höhlenerkundung vorzeitig beenden müssen. Der [concept_lepsius_anthropologist] steht dann vor Ablauf der Frist zur Verfügung, bringt aber keinen Ertrag mit.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ORIGIN_CONGRESS_BUTTON: "Kongress zum menschlichen Ursprung"
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Kongress über den Ursprung des modernen Menschen#!\nMit der Entdeckung prähistorischer Menschenknochen stellte sich auch die Frage nach dem ursprünglichen Ursprung des Menschen. Während Darwin von einem afrikanischen Ursprung ausging, postulierten andere mehrere parallele Entwicklungen. Seit der Jahrhundertwende herrschte die Ansicht vor, dass sich der moderne Mensch in Asien entwickelt hat.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ORIGIN_CONGRESS_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetAltName('NOM')] hat mindestens #V 10#! @lepsius_human_fossil! [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')].#!"
