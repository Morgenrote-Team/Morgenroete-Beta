 VISIT_IOC_BUTTON: "Besuchen Sie das IOC"
 MR_VISIT_IOC_POSSIBLE_FOUNDED_TT: "#default_text Das Internationale Olympische Komitee #V wurde gegründet#!.#!"
 MR_VISIT_IOC_POSSIBLE_TT: "#default_text Sie sind #V und besuchen derzeit nicht das IOC#!.#!"
 MR_IOC_FOUNDATION_BUTTON: "Das IOC gefunden"
 MR_IOC_FOUNDATION_BUTTON_TT: "#T Gründung des Internationalen Olympischen Komitees#!\nDas Internationale Olympische Komitee (IOC) ist eine nichtstaatliche Organisation in der Rechtsform eines Vereins. Der Zweck des Komitees ist die Organisation und Überwachung der modernen Olympischen Spiele. Das Gründungsland hat einen ständigen Sitz in dem Gremium, das über die Austragungsorte der Olympischen Spiele entscheidet. Kurz nach der Gründung des IOC können die ersten der Olympischen Spiele, die von nun an alle vier Jahre stattfinden, organisiert werden. Unter bestimmten Bedingungen können andere Länder dem IOC als ordentliche Mitglieder beitreten, die Zahl der Sitze im Vorstand ist jedoch begrenzt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat mindestens eine [concept_academics_academic].#!"
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist im Frieden.#!"
 MR_IOC_MEMBER_BUTTON: "Beitritt zum IOC"
 MR_IOC_MEMBER_BUTTON_TT: "#T Werden Sie Mitglied des IOC#!\nDer Beitritt zum Internationalen Olympischen Komitee ermöglicht die Teilnahme an den alle vier Jahre stattfindenden Olympischen Spielen. IOC-Mitglieder haben auch die Möglichkeit, die Spiele in ihrem eigenen Land auszurichten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]'s infamy is lower than #n 50#!.#!"
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist #V nicht unerkannt#!.#!"
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist #V nicht der aktuelle Olympic Host#!.#!"
 MR_IOC_BRIBE_BUTTON: "Bestechung des IOC"
 MR_IOC_BRIBE_BUTTON_TT: "#T Bestechung des IOC#!\nMit einer großzügigen \"Spende\" an den IOC-Vorstand können wir uns das Wohlwollen der Mitglieder sichern und als vierter Kandidat bei der Vergabe der nächsten Olympischen Spiele platziert werden. Allerdings gibt es keine Garantie dafür, dass wir anschließend ausgewählt werden. Die anderen IOC-Mitglieder könnten unsere Großzügigkeit auch missverstehen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist #V nicht bereits Bestechung des IOC#!.#!"
 MR_OLYMPIC_FLAME_BUTTON: "Die olympische Flamme"
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T Die olympische Flamme#!\nDie olympische Flamme, die dem immer brennenden Herdfeuer der griechischen Göttin Hestia nachempfunden ist, wurde zum ersten Mal bei den Olympischen Spielen 1928 in Amsterdam entzündet. Die Tradition des damit verbundenen olympischen Fackellaufs wurde bei den Sommerspielen 1936 in Berlin eingeführt. Entgegen der landläufigen Meinung stammte die Idee nicht von den Nationalsozialisten, sondern von dem deutsch-jüdischen Archäologen Alfred Schiff. Die Einführung dieser Tradition sollte nicht nur den Olympischen Spielen ein neues Identifikationssymbol geben, sondern auch die Bevölkerung alljährlich zusammenführen und als erhebendes Symbol von anderen Missständen ablenken.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName] bereitet sich #V auf die Ausrichtung der nächsten Olympischen Spiele#! vor.#!"
 MR_OLYMPICS_AND_SPORTS_INFORMATION: "#T Das IOC#!\nPräsident: [GetPlayer.GetCustom('vikelas_ioc_president_type')]\nMitglieder: [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue|V0]\nVeranstaltete Olympische Spiele: [GetGlobalVariable('vikelas_olympic_games_number_global_var').GetValue|V0]\n\n#T Sportarten in [GetPlayer.GetFlagTextIcon]#! \nOlympische Goldmedaillen: [GetPlayer.MakeScope.Var('vikelas_gold_medals_var').GetValue|V0] @vikelas_gold_medals![GetPlayer.GetCustom('vikelas_has_football_league_type')][GetPlayer.GetCustom('vikelas_has_baseball_league_type')]"
