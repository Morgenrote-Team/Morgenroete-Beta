 MR_IMPRESSIONISM_BUTTON: "Impressionismus"
 MR_IMPRESSIONISM_BUTTON_TT: "#T Wählen Sie Impressionismus#!\n[concept_elgar_impressionism] ist ein Stil in der Kunstgeschichte, der sich durch die atmosphärische Darstellung flüchtiger Momentaufnahmen einer Szene auszeichnet. Er entstand aus einer Bewegung innerhalb der französischen Malerei in der zweiten Hälfte des 19. Jahrhunderts. Der Begriff Impressionismus wurde auch auf bestimmte Musik-, Literatur-, Film- und Fotostile angewandt. Während viele Naturalisten wie Heinrich Hart die Musik als Ausdrucksmittel eines \"wahrheitssuchenden Aktionismus\" ablehnten, betrachteten die Impressionisten das \"gegenstandslose Vorträumen\" zu fein abgestuften farbigen Akkorden oft als Genuss.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] sind [concept_powerful].#!"
 MR_NOT_POWERFUL_INTELLIGENTSIA_TRIGGER_TT: "#default_text Die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] ist nicht [concept_powerful].#!"
 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text Die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] hat eine [concept_approval] von #V 5 oder höher#!.#!"
 MR_EXPRESSIONISM_BUTTON: "Expressionismus"
 MR_EXPRESSIONISM_BUTTON_TT: "#T Wählen Sie Expressionismus#!\n[concept_elgar_expressionism] ist eine Stilrichtung in der Kunst. Seine Anfänge und Vorläufer sind im späten 19. Jahrhundert zu finden. Wie der Impressionismus, der Symbolismus und der Fauvismus ist der Expressionismus eine Bewegung gegen die Tendenzen des Naturalismus. Im Expressionismus überwiegt die expressive Ebene gegenüber der ästhetischen, appellativen und sachlichen Ebene. Der Künstler will seine Erfahrung für den Betrachter darstellen. Im Gegensatz zum musikalischen Impressionismus, der die Wahrnehmung der äußeren Erscheinung der Dinge darstellt, formulieren die expressionistischen Kunstströmungen die Emotionen der menschlichen Seele.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text Entweder die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] oder [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] sind [concept_powerful].#!"
 MR_NOT_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text Die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] sind nicht [concept_powerful].#!"
 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text Entweder die [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] oder [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] haben eine [concept_approval] von #V 5 oder höher#!.#!"
 MR_ART_NOUVEAU_BUTTON: "Art Nouveau"
 MR_ART_NOUVEAU_BUTTON_TT: "#T Wählen Sie Art Nouveau#!\n[concept_elgar_art_nouveau], meist in Verbindung mit Italien auch Stile Liberty, ist eine kunsthistorische Epoche an der Wende vom 19. zum 20. Strömungen, die dem Jugendstil zugeordnet werden können, sind der Reformstil (nach der Reformbewegung), der Sezessionsstil (nach der Wiener Sezession), Modernisme in Katalonien, in der Schweiz Style Sapin und in den USA Tiffany Style. Neben dem Ausdruck Art nouveau, der im Französischen, Englischen und Italienischen vorherrscht, wird im Englischen auch Modern Style und im Italienischen Stile Floreale verwendet. Zeitlich gesehen gehört der Jugendstil zum Fin de Siècle.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
