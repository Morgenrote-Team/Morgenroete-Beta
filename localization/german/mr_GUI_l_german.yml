 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON_TT: "#T Paleontological Expedition#!\nSend your [concept_dubois_paleontologist] on a [concept_dubois_paleontological_expedition]. An Expedition takes 1 year and results in an amount of [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].\n\nAt the end of an Expedition you can leave a [concept_dubois_paleontological_team] to set up a [concept_dubois_paleontological_excavation].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #please replace
 MR_PALEONTOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Laufende paläontologische Expedition#!\nIhre [concept_dubois_paleontologist] befindet sich derzeit auf einer [concept_dubois_paleontological_expedition]. Eine Expedition dauert 1 Jahr und führt zu einer Menge von [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. \n\nAm Ende einer Expedition können Sie eine [concept_dubois_paleontological_team] hinterlassen, um eine [concept_dubois_paleontological_excavation] einzurichten." #deepl:3717515369

