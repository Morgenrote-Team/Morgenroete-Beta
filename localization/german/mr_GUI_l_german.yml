 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON_TT: "#T Paläontologische Expedition#!\nSchicken Sie Ihren [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] auf eine [concept_dubois_paleontological_expedition]. Eine Expedition dauert 1 Jahr und bringt [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].\n\nAm Ende einer Expedition kannst du ein [concept_dubois_paleontological_team] zurücklassen, um eine [concept_dubois_paleontological_excavation] zu gründen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PALEONTOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Laufende paläontologische Expedition#!\nIhre [concept_dubois_paleontologist] befindet sich derzeit auf einer [concept_dubois_paleontological_expedition]. Eine Expedition dauert 1 Jahr und führt zu einer Menge von [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. \n\nAm Ende einer Expedition können Sie ein [concept_dubois_paleontological_team] dort lassen, um eine [concept_dubois_paleontological_excavation] einzurichten."
 MR_PALEONTOLOGY_FIRST_TEAM_BUTTON: "Erstes paläontologisches Team"
 MR_PALEONTOLOGY_FIRST_TEAM_BUTTON_TT: "#T Erstes paläontologisches Team#!\nErstellen Sie ein [concept_dubois_paleontological_team]. Sie können paläontologische Teams verwenden, um [Concept('concept_dubois_paleontological_excavation','$concept_dubois_paleontological_excavations$')] einzurichten \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
