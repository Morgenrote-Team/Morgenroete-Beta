 MR_PHYSICIAN_DESCRIBE_DISEASE_BUTTON_TT: "#T Krankheitsbeschreibung#!\n Ein Arzt kann eine bisher unbeschriebene Krankheit wissenschaftlich genauer beschreiben, wenn sie als Epidemie im Staatsgebiet wütet. Dies ist eine wichtige Vorstufe für die Entwicklung einer späteren Behandlungsmethode.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T Krankheitsbeschreibung#!\n#p Ihr $concept_panum_physician$ arbeitet derzeit an einer ersten Beschreibung einer Krankheit.#!\n Ein Arzt kann eine bisher unbeschriebene Krankheit wissenschaftlich genauer beschreiben, wenn sie als Epidemie im nationalen Gebiet wütet. Dies ist eine wichtige Vorstufe für die Entwicklung einer späteren Behandlungsmethode."
 MR_ACTIVE_PHYSICIAN_TRIGGER: "#default_text [GetPlayer.GetName] hat einen [concept_panum_physician] der #V nicht beschäftigt ist#!.#!"
 MR_PHYSICIAN_CAN_DESCRIBE_LOCAL_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] leidet an einer epidemischen Krankheit, die noch nicht vollständig beschrieben wurde.#!"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T Medizinische Beobachtungsexpedition#!\n Ein Arzt kann eine Expedition in ein fernes Land unternehmen, in dem eine Epidemie wütet, und die Krankheit dort beschreiben. Dieser Vorgang dauert länger als eine Diagnose in seinem eigenen Land.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T Medizinische Beobachtungsexpedition#!\n#p Ihr $concept_panum_physician$ befindet sich derzeit auf einer medizinischen Beobachtungsexpedition.#!\n Ein Arzt kann eine Expedition in ein fernes Land unternehmen, in dem eine Epidemie wütet, und die Krankheit dort beschreiben. Dieser Prozess dauert länger als eine Diagnose in seinem eigenen Land."
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] interessiert sich für ein Land, das an einer epidemischen Krankheit leidet, die noch nicht vollständig beschrieben worden ist.#!"
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T Krankheitsbehandlung#!\n Ein Arzt kann eine Behandlung für eine Krankheit finden, die als Epidemie im nationalen Gebiet wütet. Die Behandlung wird die Krankheit zwar nicht verhindern, aber ihre Auswirkungen erheblich einschränken. Bei bestimmten Krankheiten ist die Erforschung einer bestimmten Technologie erforderlich, bevor eine Behandlungsmethode gefunden werden kann.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_ACTIVE_TT: "#T Krankheitsbehandlung#!\n#p Ihr $concept_panum_physician$ sucht eine Behandlung für eine Krankheit.#!\n Ein Arzt kann eine Behandlung für eine Krankheit finden, die als Epidemie im nationalen Gebiet wütet. Eine Behandlung wird die Krankheit zwar nicht verhindern, aber ihre Auswirkungen erheblich einschränken. Bei bestimmten Krankheiten ist die Erforschung einer bestimmten Technologie erforderlich, bevor eine Behandlungsmethode gefunden werden kann."
 MR_PHYSICIAN_CAN_FIND_LOCAL_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] leidet an einer Epidemie, die zwar beschrieben ist, für die es aber noch keine Behandlung und auch keine entsprechende Technologie gibt.#!"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_BUTTON_TT: "#T Medizinische Forschungsexpedition#!\n Ein Arzt kann eine Expedition in ein fernes Land unternehmen, in dem eine Epidemie wütet, und die Krankheit dort untersuchen, um eine Behandlung zu finden. Dieser Prozess dauert länger als in seinem eigenen Land. Bei bestimmten Krankheiten ist die Erforschung einer bestimmten Technologie erforderlich, bevor eine Behandlungsmethode gefunden werden kann.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_ACTIVE_TT: "#T Medizinische Forschungsexpedition#!\n#p Ihr $concept_panum_physician$ ist auf der Suche nach einer Behandlung für eine Krankheit.#!\n Ein Arzt kann eine Expedition in ein fernes Land unternehmen, in dem eine Epidemie wütet, und die Krankheit dort untersuchen, um eine Behandlung zu finden. Dieser Prozess dauert länger als in seinem eigenen Land. Bei bestimmten Krankheiten ist die Erforschung einer bestimmten Technologie erforderlich, bevor eine Behandlungsmethode gefunden werden kann."
 MR_PHYSICIAN_CAN_FIND_FOREIGN_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat ein Interesse an einem Land, das an einer epidemischen Krankheit leidet, die zwar beschrieben wurde, für die es aber noch keine Behandlung gibt, und das auch über die entsprechende Technologie verfügt.#!"
