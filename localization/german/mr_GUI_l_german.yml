 VISIT_ZOO_BUTTON: "Zoo besuchen"
 VISIT_ZOO_BUTTON_TT: "#T Besuchen Sie den Zoo#!\nDie [concept_dubois_zoo] gibt Ihnen einen Überblick über alle Ihre [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] und ermöglicht Ihnen, sie zu besuchen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_ZOO_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_dubois_zoo').GetName].#!"
 MR_VISIT_ZOO_TRIGGER_TT: "#default_text Sie sind #V derzeit nicht#! den #V Zoo#! besuchen.#!"
 VISIT_PALEONTOLOGICAL_COLLECTION_BUTTON: "Paläontologisches Institut besuchen"
 VISIT_PALEONTOLOGICAL_COLLECTION_BUTTON_TT: "#T Besuchen Sie die paläontologische Sammlung#!\nDie [concept_dubois_paleontological_collection] bietet weitere Informationen über unsere [concept_dubois_fossil] Funde, unsere [concept_dubois_paleontologist] und unsere [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_PALEONTOLOGICAL_COLLECTION_REQUIREMENTS_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat entweder ein [concept_dubois_paleontologist], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] oder [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].#!"
