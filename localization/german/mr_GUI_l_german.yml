 MR_IOC_FOUNDATION_BUTTON: "Das IOC gefunden" #deepl:3656112782
 MR_IOC_FOUNDATION_BUTTON_TT: "#T Gründung des Internationalen Olympischen Komitees#!\nDas Internationale Olympische Komitee (IOC) ist eine nichtstaatliche Organisation in der Rechtsform eines Vereins. Der Zweck des Komitees ist die Organisation und Überwachung der modernen Olympischen Spiele. Das Gründungsland hat einen ständigen Sitz in dem Gremium, das über die Austragungsorte der Olympischen Spiele entscheidet. Kurz nach der Gründung des IOC können die ersten der Olympischen Spiele, die von nun an alle vier Jahre stattfinden, organisiert werden. Unter bestimmten Bedingungen können andere Länder dem IOC als ordentliche Mitglieder beitreten, die Zahl der Sitze im Vorstand ist jedoch begrenzt.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:71917043
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat mindestens eine [concept_academics_academic].#!" #deepl:3048009287
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName] ist im Frieden.#!" #deepl:2480476357
 MR_IOC_MEMBER_BUTTON: "Beitritt zum IOC" #deepl:3979462093
 MR_IOC_MEMBER_BUTTON_TT: "#T Werden Sie Mitglied des IOC#!\nDer Beitritt zum Internationalen Olympischen Komitee ermöglicht die Teilnahme an den alle vier Jahre stattfindenden Olympischen Spielen. IOC-Mitglieder haben auch die Möglichkeit, die Spiele in ihrem eigenen Land auszurichten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2722337173
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]'s infamy is lower than #n 50#!.#!" #deepl:2260435686
