 MR_AUTORACING_FOUND_AIACR_BUTTON: "Der Automobilverband" #deepl:1409845651
 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T Der Automobilverband#!\nRennsport wird mehr und mehr zu einem internationalen Sport, bei dem die Fahrer mit verschiedenen Automarken aus verschiedenen Ländern gegeneinander antreten. Viele Nationen haben begonnen, ihre eigenen Rennen ohne jegliche Vereinbarungen zu veranstalten. Um die Regeln und Bedingungen besser zu koordinieren, ist die Gründung eines internationalen Gremiums notwendig: der Internationale Automobilverband. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3957005871
 MR_AUTORACING_FOUND_AIACR_BUTTON_TRIGGER_TT: "#default_text #V In mindestens 10 weiteren Ländern#! gibt es einen #V Automobilclub#!.#!" #deepl:2640741978

 MR_PADDOCK_FIRE_MECHANIC_BUTTON: "Feuerwehrmechaniker" #deepl:2739152043
 MR_PADDOCK_FIRE_MECHANIC_BUTTON_TT: "#T Feuerwehrmechaniker#!\nRennteams können einen Mechanikerposten neu besetzen, wenn der derzeitige Mechaniker die erwarteten Anforderungen nicht erfüllt. Ein neuer Mechaniker kann jedoch erst nach einem Abstand von zwei Jahren eingestellt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1326601437
 MR_PADDOCK_FIRE_RACER_BUTTON: "Feuer-Rennfahrer" #deepl:769373669
 MR_PADDOCK_FIRE_RACER_BUTTON_TT: "#T Fire Racer#!\nIm Gegensatz zu den Fahrern der alten Herren sind die Rennfahrer nicht unersetzlich. Nachdem ein neuer Rennfahrer eingestellt wurde, kann diese Position zwei Jahre lang nicht wieder besetzt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2738281977

