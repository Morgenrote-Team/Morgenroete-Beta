 MR_MUSIC_TRADITION_250_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat #V 250#! oder mehr @elgar_music_tradition! [concept_elgar_musical_tradition].#!" #deepl:1887944889
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON: "Gründung des Allgemeinen Deutschen Musikbundes" #deepl:2786281151
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T Gründung des Allgemeinen Deutschen Musikvereins#!\nDer Allgemeine Deutsche Musikverein (ADMV) war ein deutscher Musikverein, der 1861 von Franz Liszt und Franz Brendel gegründet wurde, um die musikalischen Ideale der Neuen Deutschen Schule der Musik zu verkörpern. Der ADMV zielte sowohl auf musikalische Leistung als auch auf praktische Unterstützung ab. Zu den künstlerischen Zielen des ADMV gehörten jährliche Tonkünstler-Versammlungen an verschiedenen Orten mit Aufführungen bedeutender, selten gehörter und vor allem neuer Musikwerke aller Art. Aber auch ältere, selten oder gar nicht gehörte, aber wegen ihrer Bedeutung interessante Werke sollten aufgeführt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:897752309

 MR_CIVIL_ENGINEER_RAILWAY_BUTTON_TT: "#T Eisenbahnprojekt#!\nLassen Sie Ihr [concept_gaudi_engineer] sich auf die Verbesserung der [GetBuildingType('building_railway').GetName] in [GetPlayer.GetName] konzentrieren. Sie werden in der Lage sein, Staaten zu priorisieren und die Eisenbahnen in diesen Staaten werden die #V $tesla_modernized_railway_lines_building_modifier$ #! [concept_modifier] erhalten, was die [concept_throughput] des Gebäudes und die [concept_infrastructure] des Staates verbessert.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1511314515
 MR_CIVIL_ENGINEER_RAILWAY_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat ein [GetBuildingType('building_railway').GetName] ohne das #V $tesla_modernized_railway_lines_building_modifier$ #! [concept_modifier] .#!" #deepl:1769754351

 MR_CIVIL_ENGINEER_IRRIGATION_BUTTON_TT: "#T Bewässerungsprojekt#!\nLassen Sie [concept_gaudi_engineer] sich auf die Verbesserung der Bewässerung in [GetPlayer.GetName] konzentrieren. Sie werden in der Lage sein, Staaten zu priorisieren, und diese Staaten werden das #V $tesla_state_trait_irrigation$ #! State Trait erhalten, das die [concept_throughput] landwirtschaftlichen Gebäude und die Resistenz gegen verschiedene [Concept('concept_harvest_condition', '$concept_harvest_conditions$')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:829784856
