 MR_HIRE_COACH_BUTTON: "Einen Nationaltrainer engagieren"
 MR_HIRE_COACH_BUTTON_TT: "#T Einstellung eines Nationaltrainers#!\nach der Gründung der FIFA und den ersten internationalen Spielen kann ein Nationaltrainer eingestellt werden. Nationaltrainer tragen mit ihren Fähigkeiten zur Verbesserung der Spielergebnisse bei. Erfüllt ein Trainer die Erwartungen nicht, kann er nach spätestens drei Jahren ersetzt werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
