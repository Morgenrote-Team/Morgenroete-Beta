 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T Hochgeschwindigkeitsflugzeug#!\nUnser Luftfahrtingenieur kann ein Hochgeschwindigkeitsflugzeug bauen, das den bestehenden Rekord bricht. Um das schnellste Flugzeug der Welt zu bauen, braucht man nicht nur einen Ingenieur, sondern auch einen Piloten, der das Flugzeug fliegt. Der Erfolg hängt von der Erfahrung des Ingenieurs und des Piloten sowie von fortschrittlichen Technologien ab.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
