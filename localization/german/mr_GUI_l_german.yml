 MR_TRIASSIC_SCENERY_BUTTON_TT: "#T Bauen Sie eine Trias-Kulisse#!\nSobald das weltweite geologische Wissen einen bestimmten Stand erreicht hat, können Paläontologen an Universitäten einen Raum mit prähistorischen Kulissen einrichten. Pro Universität ist nur eine Kulisse möglich. In diesem Fall lassen Sie Ihren Paläontologen eine Szenerie aus der Triaszeit bauen\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
