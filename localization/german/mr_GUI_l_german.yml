#Astronomer Buttons
 MR_ASTEROID_CONGRESS_BUTTON: "Kongress über Asteroiden" #deepl:1250347107
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Kongress über Asteroiden#!\nSeit der Entdeckung von Ceres im Jahr 1801 haben die Astronomen immer mehr Himmelskörper gefunden, weshalb die Zahl der Planeten im Sonnensystem weiter gestiegen ist. Die Entdeckung des Neptun warf die Frage auf, ob eine neue Kategorie für die zahlreichen kleineren Objekte, die insbesondere zwischen Mars und Jupiter zu finden sind, nicht sinnvoller wäre. Insbesondere die Erfindung neuer astronomischer Symbole und ihre relativ geringe Größe veranlassten die Astronomen zu der Annahme, dass es sich eher um "kleine Sterne" oder "kleine Planeten" handelte. Natürlich würde diese Kategorisierung bedeuten, dass einige der zuvor als Planeten betrachteten Objekte ihren Status verlieren und zu bloßen Felsbrocken degradiert würden.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2027885274
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V Neptun#! ist entdeckt worden.#!" #deepl:2272882883
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_verrier_observatory').GetName].#!" #deepl:186730489

 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text Hat eine [concept_verrier_astronomer].#!" #deepl:2382278841
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 1500#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell wurden [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!" #deepl:3722939271
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Carte du Ciel" # 2.0.1
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T Congress on the Carte du Ciel#!\nA vast and unprecedented international star-mapping project was initiated in 1887 by Paris Observatory director Amédée Mouchez, who realized the potential of the new dry plate photographic process to revolutionize the process of making maps of the stars. As a result of the Astrographic Congress of more than 50 astronomers held in Paris in April 1887, 20 observatories from around the world agreed to participate in the project. We can host such a congress to share the astronomical knowledge of the international community.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" # 2.0.1
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text #V hat in den letzten 5 Jahren kein Astronomiekongress#! stattgefunden #V #! (der letzte Gastgeber hat nicht den Modifikator \"Hosted an Astronomical Congress\").#!" #deepl:1691585842
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 7000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!" #deepl:3361886911
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_university').GetName] von #V Stufe 10 oder höher#!.#!" #deepl:1359653869
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Große Debatte" #deepl:4032014242
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T The Great Debate#!\nDie Shapley-Curtis-Debatte, auch bekannt als The Great Debate, bündelte die Diskussionen des frühen 20. Jahrhunderts, die schließlich zu einem neuen Verständnis der Natur von Galaxien und der Größe des Universums führten. Sie drehte sich um die Größe der Milchstraße und die Frage, ob die damals als Spiralnebel bekannten Galaxien kleine Objekte in der Milchstraße sind oder viel weiter entfernt und von der Milchstraße getrennt. An diesem Tag hielten die beiden Wissenschaftler unabhängige Fachvorträge über die Größenordnung des Universums, gefolgt von einer öffentlichen Diskussion am Abend. Wir können einen solchen Kongress veranstalten, um die letzten Geheimnisse des Universums zu erörtern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3022092469
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Insgesamt wurden weltweit mindestens #BLUE 12000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdeckt (aktuell [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! gefunden).#!" #deepl:2097604963

