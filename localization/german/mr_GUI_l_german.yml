 MR_EXTINCTION_CONGRESS_5_COUNTRIES_DINOSAUR_SKELETON_TRIGGER_TT: "#default_text Mindestens #V 5 Länder#! haben mindestens #p 1#! @dubois_dinosaur_skeleton! [concept_dubois_dinosaur_skeleton].#!"
 MR_EXTINCTION_CONGRESS_GLOBAL_FOSSIL_TT: "#default_text Mindestens #V 500#! @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] wurden weltweit gefunden (aktuell [GetGlobalVariable('dubois_global_fossil').GetValue|+0] @dubois_fossil! wurden gefunden)#!"
