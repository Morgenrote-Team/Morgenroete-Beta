 MR_MILITARY_ENGINEER_RESEARCH_BUTTON: "Militärische Forschung"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON: "Naval Research"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON: "Fortgeschrittene Gewehre"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T Entwickeln Sie fortgeschrittene Gewehre#!\nLassen Sie Ihr [concept_gaudi_engineer] auf die Entwicklung fortgeschrittener Gewehre konzentrieren. Dies wird es Ihnen ermöglichen, ein neues [concept_mobilization_option] zu verwenden oder seine Stufe zu erhöhen. Dieses Projekt fügt #n Ausgaben#! zu Ihrem Land hinzu.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON: "Fortgeschrittene Panzer"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON_TT: "#T Entwickeln Sie fortgeschrittene Panzer#!\nLassen Sie Ihr [concept_gaudi_engineer] auf die Entwicklung fortgeschrittener Panzer konzentrieren. Dies wird es Ihnen ermöglichen, einen neuen [concept_mobilization_option] zu verwenden oder seine Stufe zu erhöhen. Dieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON: "Erweiterte Feldarbeiten"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON_TT: "#T Entwickeln Sie fortgeschrittene Feldarbeit#!\nLassen Sie Ihr [concept_gaudi_engineer] auf die Entwicklung fortgeschrittener Feldarbeitstechniken konzentrieren. Dies wird es Ihnen ermöglichen, ein neues [concept_mobilization_option] zu verwenden oder seine Stufe zu erhöhen. Dieses Projekt wird Ihrem Land #n Ausgaben#! hinzufügen. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON: "Elektrische Forschung"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Geomagnetic Association beitreten"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Treten Sie der Geomagnetischen Vereinigung bei#!\nDer Beitritt zur Magnetischen Vereinigung in Göttingen ist eine zwingende Voraussetzung, um unsere Forschungen auf dem Gebiet des Erdmagnetismus aufzunehmen und ein Geomagnetisches Observatorium einzurichten.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Telegrafisches Netz"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Aufbau eines Telegrafienetzes#!\nDie Telegrafie revolutioniert die Kommunikation eines Landes und verbessert die Dienstleistungen und die Infrastruktur in Regionen, in denen ein Telegrafienetz existiert. Die Verkabelung eines Landes wird umso schwieriger, je größer das Land ist. Telegrafenmasten können nur in einem Staat errichtet werden, dessen Nachbarstaat ebenfalls über einen Telegrafenmast verfügt. Für die Telegrafie in Übersee werden sowohl der elektrische Telegraf als auch der Elektromagnetismus benötigt, um Unterseekabel zu verlegen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_railway').GetName] in der Hauptstadt.#!"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_railway').GetName] in #p 65%#! aller Staaten.#!"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Radio Netzwerk"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T Bauen Sie ein Funknetz#!\nDie Zeit des lästigen Kabelsalats ist vorbei! Mit der Erfindung der Funktechnik können nun Nachrichten über Antenne gesendet werden. Damit ist es nicht nur möglich, Nachrichten auszutauschen, sondern auch Radioprogramme zu etablieren. Zuvor muss natürlich ein landesweites Netz von Radiosendern aufgebaut werden.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Suche Eisenvorkommen"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Suche nach einem Eisenvorkommen#!\nGeophysik und Geomagnetismus haben viele praktische Anwendungen. Vor allem der Bergbau profitierte von der Aufdeckung möglicher Lagerstätten. Große Unternehmen nutzten geophysikalische Erkenntnisse, um bisher unbekannte Eisen-, Blei- und Ölvorkommen aufzuspüren. Zusammen mit den richtigen Technologien und der Kartierung des Erdmagnetfeldes sollte es ein Leichtes sein, das aktuelle theoretische Wissen produktiv zu nutzen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] hat eine [GetBuildingType('building_verrier_observatory').GetName] mit dem #V Geomagnetischen Observatorium#! [concept_production_method] .#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Suche Lead Deposit"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Suche nach einem Bleivorkommen#!\nGeophysik und Geomagnetismus haben viele praktische Anwendungen. Vor allem der Bergbau profitierte von der Aufdeckung möglicher Lagerstätten. Große Unternehmen nutzten geophysikalische Erkenntnisse, um bisher unbekannte Eisen-, Blei- und Ölvorkommen aufzuspüren. Zusammen mit den richtigen Technologien und der Kartierung des Erdmagnetfeldes sollte es ein Leichtes sein, das aktuelle theoretische Wissen produktiv zu nutzen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "Suche nach Ölvorkommen"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON_TT: "#T Suche nach einem Ölvorkommen#!\nGeophysik und Geomagnetismus haben viele praktische Anwendungen. Vor allem der Bergbau profitierte von der Aufdeckung möglicher Lagerstätten. Große Unternehmen nutzten geophysikalische Erkenntnisse, um bisher unbekannte Eisen-, Blei- und Ölvorkommen aufzuspüren. Zusammen mit den richtigen Technologien und der Kartierung des Erdmagnetfeldes sollte es ein Leichtes sein, das aktuelle theoretische Wissen produktiv zu nutzen.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON: "Forschung in der Luftfahrt"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON: "Modernisierung von Flughäfen"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON_TT: "#T Modernisierung von Flughäfen#!\nLassen Sie Ihr [concept_gaudi_engineer] auf die Modernisierung Ihres [GetBuildingType('building_airport').GetName] konzentrieren. Die Flughäfen werden Modifikatoren erhalten, die [concept_throughput] und [concept_good_production] erhöhen und [concept_input_mult] senken. Dadurch werden Ihrem Land #n Ausgaben#! hinzugefügt.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
