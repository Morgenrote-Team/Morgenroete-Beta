 MR_PADDOCK_IMPROVE_ENGINE_BUTTON_TT: "#T Verbesserung des Motors#!\nEin neuer Motor verbessert die Zuverlässigkeit und Geschwindigkeit eines Fahrzeugs.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1170651502
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON: "Verbesserung der Sicherheit" #deepl:3257333317
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON_TT: "#T Verbesserung der Sicherheit#!\n Ein Mechaniker kann sich verschiedene neue Sicherheitstechniken einfallen lassen, um das Leben eines Rennfahrers zu sichern.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1115016033
