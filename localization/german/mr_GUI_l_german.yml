 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON: "Modernisierung der Industrie"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON_TT: "#T Modernisierung von Industrien#!\nLassen Sie Ihre [concept_gaudi_engineer] auf die Modernisierung der Produktionsmethoden eines Gebäudes konzentrieren. Dies wird Ihrem Gebäude kleine Boni auf [concept_throughput], [concept_good_production] und [concept_input_mult] hinzufügen. Dieses Projekt fügt Ihrem Land #n Ausgaben#! hinzu.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
