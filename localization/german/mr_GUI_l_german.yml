 MR_SEND_CHARACTER_TO_ASYLUM_BUTTON_TT: "#T Jemanden ins Asyl einweisen#!\nEs gibt zahlreiche Politiker, Agitatoren und sogar Machthaber, die aufgrund von psychischen Störungen, Süchten oder Demenz grundsätzlich nicht mehr für ihre Aufgaben geeignet sind. Ein Psychiater kann diese Menschen für unzurechnungsfähig erklären - auch wenn er sie gar nicht untersucht hat. Der politische Missbrauch der Psychiatrie ist jedoch für das Volk und die Opposition durchschaubar und kann Konsequenzen haben...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
