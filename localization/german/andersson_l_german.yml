 andersson.10.t: "Institut für Anthropologie und Ethnologie"
 andersson.10.d: "In einer feierlichen Zeremonie weihte [SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('andersson_ruler').GetFullName] heute persönlich das Institut für Anthropologie und Ethnologie ein."
 andersson.10.f: "Die Eröffnungsfeier war ein feierlicher und allgemein positiv aufgenommener Anlass, der bei Presse, Fachleuten und der Öffentlichkeit auf Zustimmung stieß, doch es fehlte nicht an Kritikern. Ein weiteres Gebäude, das prestigeträchtige Kuriositäten beherbergt, getrieben von einer gewissen Sammelleidenschaft, ohne jeden wirklichen Wert? Eine oppositionelle Zeitung sprach von Geldverschwendung und einfallslosen Inhalten. Der Regierung, so wurde behauptet, habe nichts Neues zu bieten. Die einen sammelten Artefakte, die anderen Heilpflanzen, dann gab es noch diese Dinosaurier-Fetischisten – und nun menschliche Knochen! Glücklicherweise blieben diese negativen Kommentare in der absoluten Minderheit und trübten nicht die anhaltende Begeisterung für das neue Gebäude, dessen Bedeutung [SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('andersson_ruler').GetFullName] erneut unterstrich."
 andersson.10.g: "Institut besuchen."
 andersson.21.t: "Der Vero-Mensch"
 andersson.21.d: "Elias Sellards sorgte mit dem Fund einiger alter Knochen in Florida landesweit für Aufsehen."
 andersson.21.f: "Der „Vero-Mensch“ bezeichnet einen bedeutenden Fund von menschlichen Überresten aus dem Pleistozän, die der Geologe Elias Sellards zwischen 1915 und 1916 in Vero Beach, Florida, entdeckte. Der Fund war zunächst höchst umstritten, da die Überreste in derselben geologischen Schicht wie die der ausgestorbenen Megafauna der Eiszeit gefunden wurden, was die vorherrschende wissenschaftliche Auffassung in Frage stellte, dass Menschen Amerika erst viel später erreicht hätten. Moderne Radiokarbondatierungen und fortschrittliche archäologische Techniken haben seitdem bestätigt, dass es sich bei dieser Fundstätte um eine der ältesten Spuren menschlicher Besiedlung in Nordamerika handelt, die etwa 13.000 Jahre zurückreicht."
 andersson.21.g: "Faszinierend."
 andersson.22.t: "Der Lagoa Santa Mensch"
 andersson.22.d: "Ein dänischer Wissenschaftler hat in einer brasilianischen Höhle eine überraschende Entdeckung gemacht."
 andersson.22.f: "Der Begriff „Lagoa-Santa-Mensch“ bezieht sich auf eine Sammlung paläoindianischer Skelettreste, die Mitte des 19. Jahrhunderts vom dänischen Naturforscher Peter Wilhelm Lund in den Kalksteinhöhlen von Minas Gerais in Brasilien entdeckt wurden. Moderne genetische Untersuchungen und archäologische Analysen haben diese Überreste inzwischen als Teil der frühesten Besiedlungswelle in Südamerika eingeordnet, die etwa 10.000 bis 12.000 Jahre zurückliegt."
 andersson.23.t: "Der Cro-Magnon-Mensch"
 andersson.23.d: "Louis Lartet hat mehrere Skelette prähistorischer Menschen gefunden, die deutlich mehr Ähnlichkeit mit dem modernen Menschen als mit den Neandertalern aufweisen. Nach der Fundstätte „Abri de Cro-Magnon“ werden diese ersten Europäer als Cro-Magnon-Menschen bezeichnet."
 andersson.23.f: "Der Cro-Magnon-Mensch bezeichnet die ersten frühen modernen Menschen (Homo sapiens) des europäischen Jungpaläolithikums, die 1868 vom Geologen Louis Lartet in einem Felsunterstand bei Les Eyzies in Frankreich entdeckt wurden. An dieser Fundstelle wurden fünf Skelette sowie Steinwerkzeuge, geschnitzte Geweihe und Tierreste gefunden, was den ersten eindeutigen Beweis dafür lieferte, dass physisch moderne Menschen in Europa neben der ausgestorbenen pleistozänen Fauna gelebt hatten. Diese Funde waren entscheidend für die Etablierung der menschlichen Paläontologie, da sie die Fundstücke auf ein Alter von etwa 28.000 bis 30.000 Jahren datierten und sie von den zuvor gefundenen, robusteren Neandertalern unterschieden."
 andersson.24.t: "Der Boskop-Mensch"
 andersson.24.d: "Der Fund eines Schädels hat bei einigen Landarbeitern für Aufregung gesorgt. Die zuständige wissenschaftliche Stelle wurde benachrichtigt."
 andersson.24.f: "Der „Boskop-Mensch“ bezeichnet eine versteinerte Schädeldecke eines Hominiden, die 1913 von Landarbeitern in der Region Transvaal in Südafrika entdeckt wurde und sich durch ihr ungewöhnlich großes geschätztes Schädelvolumen auszeichnet. Zu Beginn des 20. Jahrhunderts stuften einige Anthropologen das Exemplar fälschlicherweise als eigene Spezies, den Homo capensis, ein und stellten die Theorie auf, dass eine Rasse von Menschen mit „großem Gehirn“ den modernen Bevölkerungsgruppen in der Region vorausgegangen sei. Spätere paläoanthropologische Forschungen und genauere Datierungen haben diese Behauptungen inzwischen widerlegt und die Überreste als die eines modernen Menschen (Homo sapiens) identifiziert, der mit der Abstammungslinie der indigenen Khoesan-Völker übereinstimmt."
 andersson.25.t: "Der Shandong-Mensch"
 andersson.25.d: "Heute wurden in einer Höhle oberhalb der Fundstätte Zhoukoudian menschliche Fossilien entdeckt, was auf eine frühe Besiedlung Nordchinas hindeutet."
 andersson.25.f: "Der Begriff „Shandingdong-Mensch“ bezieht sich auf eine Gruppe früher moderner Menschen (Homo sapiens), die 1933–1934 in der Oberen Höhle der Fundstätte Zhoukoudian in der Nähe von Peking, China, entdeckt wurde. Diese Fossilien, die unter der Leitung von Pei Wenzhong ausgegraben und später von Franz Weidenreich untersucht wurden, sind etwa 30.000 bis 10.000 Jahre alt. Historisch gesehen galt der Shandingdong-Mensch als das asiatische Pendant zum europäischen Cro-Magnon-Menschen. Die Überreste, bestehend aus drei vollständigen Schädeln und verschiedenen Knochenfragmenten, wurden zusammen mit hochentwickelten Werkzeugen, Knochennadeln und durchbohrten Zahnschmuckstücken gefunden, was auf eine komplexe Kultur hindeutet. Weidenreichs ursprüngliche Hypothese besagte, dass diese Individuen die „proto-mongolischen“ Vorfahren der modernen Asiaten darstellten, obwohl die zeitgenössische Paläoanthropologie sie als Teil einer breiteren, vielfältigen Migration früher Menschen durch Ostasien betrachtet, bevor sich regionale Merkmale vollständig stabilisierten."
 andersson.26.t: "Der Talgai-Mensch"
 andersson.26.d: "In der Nähe des Bahnhofs von Talgai wurde ein Knochen gefunden, der völlig neue Erkenntnisse über die früheste Besiedlung Australiens liefert."
 andersson.26.f: "Der „Talgai-Mann“ bezeichnet einen prähistorischen menschlichen Schädel, der 1884 von einem Zäunungsarbeiter auf der Talgai-Station in der Nähe von Allora, Queensland, entdeckt wurde und einen der frühesten Belege für menschliche Besiedlung in Australien darstellt. Obwohl er aufgrund seiner robusten Merkmale und starken Mineralisierung zunächst für eine viel ältere Hominidenart gehalten wurde, hat eine spätere Radiokarbondatierung des Bodenkarbonats ergeben, dass das Exemplar etwa 13.500 Jahre alt ist. Die Entdeckung war historisch bedeutsam, da sie bestätigte, dass die Vorfahren der australischen Aborigines neben ausgestorbenen Großtieren lebten, und stellte somit eine entscheidende Verbindung für das Verständnis der langen Geschichte der Ureinwohner des Kontinents dar."
 andersson.31.t: "Der Neandertaler"
 andersson.31.d: "Ein Forscher der Universität Bonn hat heute gemeinsam mit einem wissenschaftlichen Kollegen die Entdeckung einer ausgestorbenen frühen Menschenart bekannt gegeben."
 andersson.31.f: "Mitte August 1856 entdeckten italienische Steinbrucharbeiter in einem Abschnitt des Neandertals, der kurz zuvor dem Kalksteinabbau zum Opfer gefallen war, einige Knochenfragmente. Diese wurden zunächst achtlos in den Schutt geworfen, fielen jedoch den Steinbruchbesitzern Wilhelm Beckershoff und Friedrich Wilhelm Pieper ins Auge, die 16 größere Knochenstücke bergen ließen und sie Johann Carl Fuhlrott zur Untersuchung übergaben. Der Bonner Anatom Hermann Schaaffhausen, der durch Presseberichte davon erfahren hatte, untersuchte die Knochen ebenfalls und kam zu demselben Schluss wie zuvor Fuhlrott: Es handelte sich um eine uralte Form des modernen Menschen. Fuhlrott und Schaaffhausen stellten den Fund im Juni 1857 auf der Generalversammlung der Naturforschenden Gesellschaft des preußischen Rheinlandes vor. Ihre Interpretation fand jedoch bei dem Fachpublikum keine Zustimmung. Dieser Fund, benannt als Neandertal 1, ist das Typusexemplar der Gattung Homo neanderthalensis."
 andersson.32.t: "Der Gibraltar-Mensch"
 andersson.32.d: "Kapitän Edmund Flint hat in der Nähe von Gibraltar eine fast unglaubliche Entdeckung gemacht."
 andersson.32.f: "Der „Gibraltar-Mensch“ (genauer gesagt „Gibraltar 1“) bezeichnet einen bemerkenswert gut erhaltenen Schädel einer erwachsenen Frau, der 1848 von Kapitän Edmund Flint im Forbes-Steinbruch entdeckt wurde und das erste Neandertaler-Fossil darstellt, das jemals von der modernen Wissenschaft gefunden wurde. Obwohl das Exemplar acht Jahre vor der berühmten Entdeckung im deutschen Neandertal geborgen wurde, wurde seine Bedeutung als eigenständiger Verwandter des Menschen erst in den 1860er Jahren vollständig erkannt, nachdem sich der Name „Neandertaler“ bereits etabliert hatte. Nachfolgende Ausgrabungen an dieser Fundstelle und in der nahegelegenen Gorham's Cave haben gezeigt, dass Gibraltar als einer der letzten bekannten Rückzugsorte für Neandertaler diente, wobei einige Hinweise darauf hindeuten, dass sie dort bis vor etwa 28.000 bis 32.000 Jahren überlebten."
 andersson.33.t: "Der Spy-Mensch"
 andersson.33.d: "In der Nähe von Spy haben Wissenschaftler eine bedeutende anthropologische Entdeckung gemacht, die mehr Aufschluss über die prähistorische Geschichte Belgiens gibt als je zuvor."
 andersson.33.f: "Der „Spy-Mensch“ bezeichnet zwei nahezu vollständige Neandertaler-Skelette, die 1886 vom Archäologen Marcel de Puydt und dem Geologen Maximin Lohest in der Höhle „Betche aux Rotches“ in der Nähe von Spy (Belgien) entdeckt wurden. Diese Entdeckung war ein Wendepunkt in der Paläoanthropologie, da die Überreste in eindeutigem Zusammenhang mit Steinwerkzeugen aus der Moustérien-Kultur und ausgestorbenen Eiszeit-Säugetieren gefunden wurden, was endgültig bewies, dass Neandertaler alte, prähistorische Menschen und keine pathologischen modernen Individuen waren. Die Spy-Fossilien, die sich durch ihren robusten Körperbau und markante Augenbrauenwülste auszeichnen, gehören nach wie vor zu den wichtigsten Fundstücken für das Verständnis der Anatomie und des Verhaltens der späten europäischen Neandertaler, die auf einen Zeitraum vor etwa 36.000 bis 40.000 Jahren datiert werden."
 andersson.34.t: "Der Krapina-Mensch"
 andersson.34.d: "In der Nähe von Krapina haben Forscher eine riesige Fundstätte mit prähistorischen menschlichen Knochen entdeckt, die die Geschichte des gesamten Balkans auf den Kopf stellt."
 andersson.34.f: "Der „Krapina-Mensch“ bezeichnet eine umfangreiche Sammlung von etwa 800 Neandertaler-Fossilfragmenten, die zwischen 1899 und 1905 vom Paläontologen Dragutin Gorjanović-Kramberger in der Felshöhle am Hušnjakovo-Hügel in Kroatien entdeckt wurden. Diese Entdeckung war für ihre Zeit bahnbrechend, da Gorjanović-Kramberger stratigraphische Analysen einsetzte und Pionierarbeit bei der Verwendung von Röntgenstrahlen leistete, um das Alter der Fossilien nachzuweisen und zu zeigen, dass Neandertaler ein direkter Teil der menschlichen Evolutionsgeschichte waren. Die Fundstätte, die etwa 120.000 bis 130.000 Jahre alt ist, gilt nach wie vor als der größte und bedeutendste Neandertalerfund der Welt und liefert umfangreiche Daten zu ihrer körperlichen Variation, ihrer Gesundheit und möglichen rituellen Verhaltensweisen."
 andersson.35.t: "Der Galilee-Mensch"
 andersson.35.d: "Es scheint sich zu bestätigen, dass das Heilige Land tatsächlich eine der ältesten Wiegen der Menschheit ist – eine sensationelle Entdeckung, die nun in der internationalen Wissenschaftsgemeinschaft bekannt geworden ist."
 andersson.35.f: "Der „Galilee-Mann“ bezeichnet einen Teilschädel, genauer gesagt ein Stirnbein, das als „Zuttiyeh-Schädel“ bekannt ist und 1925 von Francis Turville-Petre in der Höhle Mugharet el-Zuttiyeh im heutigen Israel entdeckt wurde. Es handelte sich um das erste jemals in Westasien gefundene Fossil eines Hominiden, und aufgrund seiner einzigartigen Übergangsmerkmale löste es zunächst eine Debatte darüber aus, ob es sich um einen Neandertaler oder einen frühen modernen Menschen handelte. Aktuelle paläoanthropologische Ansichten stufen das Exemplar, das auf einen Zeitraum von etwa 200.000 bis 350.000 Jahren zurückgeht, häufig als späten Homo heidelbergensis oder als Mitglied einer Population ein, die sowohl den Neandertalern als auch dem Homo sapiens als Vorfahr diente."
 andersson.41.t: "Heidelberger Mensch"
 andersson.41.d: "In der Nähe von Heidelberg glauben Forscher, den „ältesten Deutschen“ der Geschichte gefunden zu haben."
 andersson.41.f: "Der Begriff „Heidelberger Mensch“ bezieht sich auf die Spezies Homo heidelbergensis, die anhand eines versteinerten Unterkiefers definiert wurde, der 1907 von Daniel Hartmann in einer Kiesgrube bei Mauer in Deutschland entdeckt wurde. Dieses Exemplar, bekannt als der Unterkiefer „Mauer 1“, ist etwa 600.000 Jahre alt und zeichnet sich durch seine massive, robuste Struktur und das Fehlen eines Kinns aus, besitzt jedoch Zähne, die denen des modernen Menschen auffallend ähnlich sind. Heute gilt der Heidelberger Mensch weithin als entscheidender Vorfahr aus dem mittleren Pleistozän, der vermutlich der gemeinsame Vorfahr sowohl der Neandertaler in Europa als auch des Homo sapiens in Afrika ist."
 andersson.42.t: "Der Rhodesien-Mensch"
 andersson.42.d: "Der Schweizer Bergmann Tom Zwiglaar machte fast zufällig eine der bislang bedeutendsten anthropologischen Entdeckungen in Afrika."
 andersson.42.f: "Der „Rhodesian-Mensch“ bezeichnet einen fast vollständigen fossilen Schädel, der 1921 vom Schweizer Bergmann Tom Zwiglaar in der Blei- und Zinkmine von Broken Hill in Nordrhodesien (heute Kabwe, Sambia) entdeckt wurde. Das offiziell als „Kabwe 1“ klassifizierte Exemplar war das erste bedeutende menschliche Fossil, das jemals in Afrika gefunden wurde, und zeichnet sich durch eine Kombination aus primitiven Merkmalen, wie massiven Augenbrauenwülsten, und einem Gehirn moderner Größe aus. Jüngste hochpräzise Datierungen deuten darauf hin, dass der Schädel etwa 299.000 Jahre alt ist, was ihn als Mitglied des Homo heidelbergensis (oder Homo rhodesiensis) und als einen wahrscheinlich spät überlebenden Zeitgenossen der frühesten Homo sapiens einstuft."
 andersson.43.t: "Der Peking-Mensch"
 andersson.43.d: "Der jüngste Fund von Überresten früher Menschen in der Nähe von Peking untermauert die Theorie, dass der Mensch seinen Ursprung in Asien hat."
 andersson.43.f: "Fossilien, die seit den 1920er Jahren in der Nähe von Zhoukoudian, etwa 40 km südwestlich des Stadtzentrums von Peking, entdeckt wurden, werden als „Peking-Mensch“ bezeichnet und der Gattung Homo zugeordnet. Im Jahr 1927 gab Davidson Black den Fossilienfunden, die im Wesentlichen auf einem einzigen Zahn beruhten, den neuen Art- und Gattungsnamen Sinanthropus pekinensis Black & Zdansky. Im Jahr 1940 wurden die Funde – die nun auf mehrere Dutzend Fossilien basierten – von Wilfrid Le Gros Clark als eng mit den „Java-Menschen“ verwandt interpretiert und, wie diese, mit dem 1892 von Eugène Dubois gewählten Art- und Gattungsnamen Pithecanthropus erectus benannt. Die ursprünglichen Fossilien gingen während des Zweiten Weltkriegs verloren."
 andersson.44.t: "Der Java-Mensch"
 andersson.44.d: "In Niederländisch-Indien hat der Arzt und Anatom Eugène Dubois die versteinerten Überreste eines prähistorischen Vorfahren des Menschen entdeckt – was in der wissenschaftlichen Gemeinschaft sowohl Begeisterung als auch Kontroversen ausgelöst hat."
 andersson.44.f: "Die Fossilien, die Eugène Dubois 1891 erstmals am Ufer des Solo-Flusses bei Trinil in Ostjava entdeckte, werden als „Java-Mensch“ bezeichnet. Nach heutigem Kenntnisstand sollen sie etwa eine Million Jahre alt sein. Es handelte sich um die ersten außerhalb Europas entdeckten Fossilien von Hominiden und – nach den Neandertalern – um den zweiten fossilen Nachweis von Verwandten des anatomisch modernen Menschen (Homo sapiens). Die Funde von Java wurden zunächst als Anthropopithecus und später als Pithecanthropus erectus bezeichnet. Heute werden sie von den meisten Paläoanthropologen der Art Homo erectus zugeordnet, wobei ihre Herkunft gelegentlich – wie von Franz Weidenreich 1940 vorgeschlagen – durch den Zusatz eines Unterartnamens hervorgehoben wird: Homo erectus javanensis. Mehr als 50 Jahre nach Dubois’ Fund erinnerte sich Ralph von Koenigswald: „Kein anderer paläontologischer Fund hat eine solche Sensation ausgelöst und zu einer solchen Vielfalt widersprüchlicher wissenschaftlicher Meinungen geführt.“"
 andersson.51.t: "Das Taung-Kind"
 andersson.51.d: "Der Australier Raymond Dart machte in Taung eine außergewöhnliche Entdeckung: Der Kopf eines affenähnlichen Kindes deutet auf einen aufrechten Gang hin. Auch die Zähne und das Gehirn scheinen vor-menschlich zu sein. Das Taung-Kind könnte ein „fehlendes Glied“ zwischen Menschen und anderen Primaten sein."
 andersson.51.f: "Das „Taung-Kind“ bezeichnet den versteinerten Schädel eines jungen Hominiden, der 1924 von Steinbrechern in einem Kalkwerk in Taung, Südafrika, entdeckt und später vom Anatom Raymond Dart beschrieben wurde. Dieses Exemplar diente als Typusfossil für die Gattung Australopithecus africanus und stellte den ersten Fall dar, in dem der Begriff „Affenmensch“ wissenschaftlich auf einen in Afrika gefundenen zweibeinigen Vorfahren des Menschen angewendet wurde. Obwohl die Entdeckung zunächst auf Skepsis in der wissenschaftlichen Gemeinschaft stieß, die davon überzeugt war, dass die Menschheit ihren Ursprung in Asien oder Europa habe, verlagerte sie schließlich den Schwerpunkt der Paläoanthropologie nach Afrika und datierte das Kind auf vor etwa 2,8 Millionen Jahren."
 andersson.101.t: "Prähistorische Höhle entdeckt"
 andersson.101.d: "Nach einer langen Erkundungsphase hat [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] den Eingang zu einer Höhle gefunden, in der [SCOPE.sCharacter('andersson_anthropologist_scope').GetSheHe] die Überreste prähistorischer Menschen oder menschlicher Vorfahren vermutet."
 andersson.101.f: "In prähistorischen Höhlen finden sich oft Fossilien von Menschen oder menschenähnlichen Arten sowie andere Funde anthropologischer oder archäologischer Natur. Die Erforschung erfordert eine Expedition unter der Leitung eines Anthropologen, um die Funde zu bewerten. Diese Forschung kann Aufschluss über die Herkunft der Menschheit geben."
 andersson.101.g: "Diese Höhle sollte so bald wie möglich untersucht werden."
 andersson.201.t: "Hominiden-Prospektion: Typ"
 andersson.201.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat die hervorragende Idee, eine spektakuläre – oder zumindest einigermaßen erfolgreiche – Suche nach menschlichen Fossilien auf dem Gebiet von [GetPlayer.GetAltName('NOM')] zu starten. Alle verfügbaren Optionen liegen auf [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]em Schreibtisch."
 andersson.201.f: "„Sehr geehrte Herren, hiermit lade ich Sie alle zu einem allgemeinen Gespräch über bekannte und hypothetische Hominidenarten ein. Ich hoffe, dass viele von Ihnen daran teilnehmen werden. Alle Namensvorschläge werden in eine Lostrommel geworfen und dann nach dem Zufallsprinzip ausgewählt. Ich zähle auf Ihre Kreativität!“\n\nUnterzeichnet: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.201.g: "Vergessen Sie's."
 andersson.201.h: "Neoanthropus."
 andersson.201.i: "Palaeanthropus."
 andersson.201.j: "Pithecanthropus."
 andersson.201.k: "Australopithecus."
 andersson.211.t: "Hominiden-Prospektion: Abgeschlossen"
 andersson.211.d: "Die anthropologische Forschungsgruppe hat ihre Arbeit erfolgreich abgeschlossen und kehrt nun mit den Ergebnissen nach [ROOT.GetCountry.GetCapital.GetCityHubName] zurück."
 andersson.211.f: "„Ich hoffe, wir haben alle etwas gelernt, meine Herren! Der Ursprung der Menschheit bleibt ein Rätsel, aber es ist ein Rätsel, auf das wir zumindest etwas Licht werfen konnten. Dr. Jackson konnte anhand der Abnutzungsmuster an den Zähnen Rückschlüsse auf die prähistorische Zahnhygiene ziehen; Dr. Fittipaldi hat die gefundenen Werkzeuge in einen Zusammenhang gestellt und Feinheiten in den alten Techniken erkannt; und Professor Schabernack weiß nun endlich, warum er nicht ständig auf Stalagmiten sitzen sollte!“\n\nMit freundlichen Grüßen: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.211.g: "Eine anthropologische Errungenschaft."
 andersson.212.t: "Wunder in der Höhle"
 andersson.212.d: "Unser Anthropologe hat in [SCOPE.sState('andersson_cave_state_scope').GetName] eine Höhle entdeckt, deren Wandmalereien so überwältigend sind, dass viele Forscher zu Hause behaupten, es müsse sich um eine Fälschung handeln – Menschen in diesem primitiven Entwicklungsstadium seien zu solchen Leistungen schlichtweg nicht fähig!"
 andersson.212.f: "„Setzt man die Erkundung des ersten Saals fort, genau dort, wo die Ablagerungen mit Knochen und Muscheln enden, wird der Betrachter erstaunt sein, eine große Anzahl von Tierdarstellungen an der Höhlen Decke zu entdecken. Diese großformatigen Malereien scheinen mit schwarzem und rotem Ocker angefertigt worden zu sein, und die meisten zeigen Tiere, die aufgrund ihrer buckligen Gestalt Bison ähneln; zwei davon sind vollständig und von der Seite dargestellt, während andere keinen Kopf haben und einige in unverständlichen Posen abgebildet sind. Wir können auch eine ganze Hirschkuh sehen, die sehr gekonnt dargestellt ist, sowie einen Kopf, der dem eines Pferdes zu gehören scheint.“ – MARCELINO SANZ DE SAUTUOLA"
 andersson.212.g: "Die Sixtinische Kapelle der Steinzeit!"
 andersson.221.t: "Der [SCOPE.sState('andersson_cave_state_scope').GetMineHubName]-Mensch"
 andersson.221.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat eine sensationelle Entdeckung gemacht! Die Fossilien eines frühen Menschen deuten auf eine Siedlung hin, die Zehntausende von Jahren zurückliegt. Es muss sich um einen völlig unbekannten Vertreter des Neoanthropus handeln."
 andersson.221.f: "Neoanthropus ist ein historischer taxonomischer Begriff, der in der Anthropologie des 19. und frühen 20. Jahrhunderts verwendet wurde, um anatomisch moderne Menschen von „primitiveren“ fossilen Hominiden abzugrenzen. Innerhalb der linearen Evolutionsmodelle jener Zeit diente der Begriff dazu, die letzte Stufe der menschlichen Entwicklung abzugrenzen, und wurde häufig verwendet, um moderne Populationen den neu entdeckten „paleoanthropischen“ Abstammungslinien gegenüberzustellen. Die Klassifizierung umfasste in erster Linie den Homo sapiens und konzentrierte sich insbesondere auf Funde aus dem späten Pleistozän wie den Cro-Magnon-Menschen, der als direkter Vorfahr der heutigen Europäer angesehen wurde. Im intellektuellen Kontext des 19. Jahrhunderts war das Konzept des Neoanthropus entscheidend für die Festlegung einer chronologischen Grenze zwischen den „vor der Sintflut“ ausgestorbenen Arten, wie den Neandertalern, und dem Auftreten moderner körperlicher Merkmale."
 andersson.221.g: "Der [SCOPE.sState('andersson_cave_state_scope').GetMineHubName]-Mensch? Das gefällt mir."
 andersson.222.t: "Der [SCOPE.sState('andersson_cave_state_scope').GetFarmHubName]-Mensch"
 andersson.222.d: "Die neuesten Forschungsergebnisse von Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] haben eine sensationelle Entdeckung zutage gefördert: Offenbar lebte in der Höhle eine bisher unbekannte Unterart des Palaeanthropus."
 andersson.222.f: "Palaeoanthropus ist eine veraltete anthropologische Bezeichnung, die im 19. und frühen 20. Jahrhundert verwendet wurde, um Hominiden des mittleren bis späten Pleistozäns zu klassifizieren, die „archaischere“ oder „primitivere“ Merkmale aufwiesen als der moderne Mensch. In den Entwicklungshierarchien der Wissenschaft der viktorianischen Ära stellte diese Kategorie ein entscheidendes evolutionäres Zwischenstadium dar, das die Lücke zwischen den ältesten affenartigen Vorfahren und der späteren Entstehung des Neoanthropus überbrückte. Der Begriff wurde am häufigsten auf Neandertaler angewendet. Für Forscher des 19. Jahrhunderts war die Definition von Palaeoanthropus von zentraler Bedeutung für die Debatte darüber, ob diese ausgestorbenen Formen direkte Vorfahren des modernen Menschen waren oder eine evolutionäre Sackgasse, die von überlegenen Abstammungslinien abgelöst worden war."
 andersson.222.g: "Der [SCOPE.sState('andersson_cave_state_scope').GetFarmHubName]-Mensch – klingt gut!"
 andersson.223.t: "Der [SCOPE.sState('andersson_cave_state_scope').GetCityHubName]-Mensch"
 andersson.223.d: "Die Knochen, die Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] bei [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]er letzten Ausgrabung gefunden hat, könnten mehrere hunderttausend Jahre alt sein. Sollte dies zutreffen, handelt es sich um einen Pithecanthropus, wie wir ihn noch nie zuvor gesehen haben."
 andersson.223.f: "„Pithecanthropus“ ist eine wegweisende taxonomische Bezeichnung, die wörtlich „Affenmensch“ bedeutet. Sie wurde von Ernst Haeckel eingeführt und später von Eugène Dubois auf seinen 1891 entdeckten Java-Menschen (Pithecanthropus erectus) angewendet. In der Anthropologie des 19. Jahrhunderts stand der Begriff für das „fehlende Glied“, von dem man annahm, dass es zwischen nichtmenschlichen Primaten und den weiter entwickelten Abstammungslinien des Palaeoanthropus oder Neoanthropus existiere. Die Klassifizierung basierte ursprünglich auf in Indonesien gefundenen Fossilien, die sich durch eine niedrige Schädelwölbung und ausgeprägte Augenbrauenwülste auszeichneten, was als Beweis für ein evolutionäres Übergangsstadium angesehen wurde. Während die moderne Taxonomie diese Exemplare als Homo erectus neu klassifiziert hat, war das Konzept des Pithecanthropus historisch bedeutsam, da es den ersten physischen Beweis für eine menschliche Evolution lieferte, die außerhalb Europas und in einem viel früheren zeitlichen Rahmen stattfand."
 andersson.223.g: "Der [SCOPE.sState('andersson_cave_state_scope').GetCityHubName]...okay."
 andersson.224.t: "Der Australopithecus"
 andersson.224.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]s jüngster Fund macht [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim] sprachlos. Die Fossilien, die [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] auf [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]er letzter Expedition ausgegraben hat, müssen mindestens eine Million Jahre alt sein, wenn nicht sogar älter. Dieser Australopithecus – ist er eher Affe oder eher Mensch?"
 andersson.224.f: "Australopithecus ist eine Gattung ausgestorbener Hominiden, die nach der Entdeckung des „Taung-Kindes“ im Jahr 1924 wissenschaftliche Bedeutung erlangte und als entscheidendes Bindeglied zwischen den Affen des Miozäns und der Gattung Homo gilt. Obwohl der Begriff Anfang des 20. Jahrhunderts von Raymond Dart geprägt wurde, bestätigte er die evolutionären Vorhersagen des 19. Jahrhunderts, indem er ein Lebewesen vorstellte, das zweibeinigen Gang mit einem relativ kleinen, affenähnlichen Gehirn verband. Für die Paläoanthropologie verlagerte die Identifizierung von Australopithecus die wahrgenommene „Wiege der Menschheit“ nach Afrika und richtete die Suche nach den Ursprüngen des Menschen grundlegend neu aus, weg von den zuvor bevorzugten Schauplätzen in Europa und Asien."
 andersson.224.g: "Ich vermisse die guten alten Zeiten, als wir einfach irgendeinen Ortsnamen mit dem Wort „Mann“ kombiniert haben."
 andersson.231.t: "Sackgasse?"
 andersson.231.d: "Bei der Erkundung der archäologischen Stätte in [SCOPE.sState('andersson_cave_site').GetName] musste sich das Team zudem mit unwegsamem Gelände und engen Höhlengängen auseinandersetzen. Wie sich herausstellte, befand sich der Höhleneingang an einer ganz anderen Stelle, als Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] angenommen hatte."
 andersson.231.f: "Wie sich herausstellt, befindet sich der Höhleneingang nicht auf einem Felsvorsprung, sondern fast 1.000 Meter tiefer. Dem Team steht vom archäologischen Fundort aus ein langer Umweg – oder ein sehr gefährlicher Weg – bevor."
 andersson.231.g: "Das Team wird einen Umweg nehmen müssen, ob es ihm gefällt oder nicht."
 andersson.231.h: "Der Arzt sollte es wagen, die Abkürzung zu nehmen!"
 andersson.232.t: "Höhlenmalereien"
 andersson.232.d: "Die [SCOPE.sState('andersson_cave_site').GetName]-Höhle enthält Felszeichnungen und Darstellungen, die Tausende von Jahren alt sind. Ihre Bedeutung und ihr Hintergrund bleiben jedoch rätselhaft."
 andersson.232.f: "Mit den Anfängen der prähistorischen Archäologie und Anthropologie ging man auf der Grundlage der Evolutionstheorie davon aus, dass die Menschen früherer Zeiten keine abstrakten Konzepte kannten. Künstlerischer Ausdruck wurde daher ausgeschlossen. Diese Überzeugung führte dazu, dass man bei der Entdeckung von Höhlenmalereien – am bekanntesten ist das Beispiel von Altamira – davon ausging, dass es sich um Fälschungen handeln müsse. Erst als um 1900 immer mehr Höhlenmalereien auftauchten, insbesondere im Südwesten Frankreichs, kamen Wissenschaftler zu dem Schluss, dass sie authentisch sein mussten."
 andersson.232.g: "Unsere Vorfahren waren nicht so primitiv, wie wir dachten."
 andersson.233.t: "Erfolgreiche Studien"
 andersson.233.d: "In den letzten Monaten hat [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] seine Forschungen vertieft. Er hat nun zahlreiche Fundstücke in der Höhle [SCOPE.sState('andersson_cave_site').GetName] katalogisiert und das Höhlensystem für künftige Generationen dokumentiert."
 andersson.233.f: "Wie lange es den Menschen schon gab, war selbst über weite Teile des 19. Jahrhunderts hinweg unklar. Zu Beginn des Jahrhunderts hatten viele Wissenschaftler die Vorstellung, die Menschheitsgeschichte umfasse nur wenige tausend Jahre, bereits aufgegeben; doch als Boucher de Perthes in den 1840er Jahren weitaus ältere Steinwerkzeuge als Beweis dafür anführte, dass Menschen mit ausgestorbenen Säugetierarten koexistierten, stieß dies auf taube Ohren. Erst die unermüdliche Sammlung und Auswertung prähistorischer Funde vervollständigte bald das Bild, dass Menschen schon deutlich länger auf der Erde gelebt hatten als zuvor angenommen."
 andersson.233.g: "Das wird ihm gut tun."
 andersson.233.h: "Das wird der Wissenschaft zugutekommen."
 andersson.234.t: "Höhlenunfall"
 andersson.234.d: "Bei der Erkundung der Höhle in [SCOPE.sState('andersson_cave_site').GetName] ereignete sich ein Unfall. Ein Assistent stürzte zusammen mit einem Packesel. Es gab nur leichte Verletzungen, doch die Ausrüstung muss ersetzt werden."
 andersson.234.f: "„Arbeite doch mal mit Profis zusammen!“"
 andersson.234.g: "Oh nein!"
 andersson.236.t: "Höhlenlabyrinth"
 andersson.236.d: "Die Sammlung von Knochen und prähistorischen Überresten verzögert sich, berichtet Dr. [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName]. Mehrere bedeutende Funde verzögern den Übergang zur Knochenidentifizierung. Das sind erhebliche, sehr erhebliche Verzögerungen. Tatsächlich gab es seit Wochen keinen Kontakt mehr zwischen dem Team und dem Institut. Das kann nur eines bedeuten."
 andersson.236.f: "Sie haben sich völlig verlaufen."
 andersson.236.g: "Idioten!"
 andersson.237.t: "Werkzeuge aus der Steinzeit"
 andersson.237.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] hat in der Höhle prähistorische Steinwerkzeuge gefunden, die Aufschluss über die Vergangenheit geben können."
 andersson.237.f: "Im 19. Jahrhundert bezeichnete der Begriff „Anthropologie“ eine Wissenschaft, die sich in erster Linie mit der prähistorischen Geschichte der Menschheit befasste – dazu gehörten neben Knochenfunden auch Waffen oder Werkzeuge aus der sogenannten Steinzeit, die damals weniger ein wissenschaftlicher Begriff als vielmehr eine als barbarisch empfundene Epoche war. Sie war geprägt vom Klischee des primitiven Höhlenmenschen und weniger von der historischen Realität. Dennoch bot die Suche nach immer mehr Artefakten und Überresten aus dieser Zeit die Möglichkeit, dieses Bild in den folgenden Jahren zu differenzieren und eine echte prähistorische Archäologie zu etablieren."
 andersson.237.g: "Untersuche die Werkzeuge."
 andersson.237.h: "Sie gehören in ein Museum!"
 andersson.238.t: "Menschliche Knochen"
 andersson.238.d: "Unser Anthropologe hat bei seiner Höhlenerkundung weitere Knochen gefunden."
 andersson.238.f: "Es herrscht allgemein die Meinung, dass im 19. und frühen 20. Jahrhundert nur wenige menschliche Fossilienfunde gemacht wurden. Das stimmt jedoch nur teilweise. Oftmals wurden zahlreiche Knochenfunde früher Menschen nicht als solche erkannt. Obwohl der Name Neandertaler vom Fundort im Neandertal stammt, waren Neandertaler-Knochen bereits zuvor mehrfach gefunden worden. Selbst nach seiner Entdeckung stellten bedeutende Wissenschaftler wie Rudolf Virchow dessen Echtheit und Alter in Frage. Das Problem war nicht die Anzahl der Funde, sondern vielmehr deren Identifizierung als tatsächliche menschliche Überreste aus der Vorzeit."
 andersson.238.g: "Lecker."
 andersson.239.t: "Assistent findet Fossilien"
 andersson.239.d: "Ein studentischer Hilfskraft spielte eine entscheidende Rolle bei der Sicherung eines anthropologischen Fundes in der Höhle bei [SCOPE.sState('andersson_cave_site').GetName]. [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] weist jedoch darauf hin, dass er als Forschungsleiter für den Fund verantwortlich ist."
 andersson.239.f: "„Erinnerst du dich an die Geschichte von dem klugen jungen Athener, der nach Ruhm strebte? Er suchte das Orakel auf und fragte: ‚Was muss ich tun, um ein großer Mann zu werden?‘ Das Orakel antwortete: ‚Töte einen!‘“ – Richard Owen."
 andersson.239.g: "Diese Entdeckung machte der junge Anthropologe."
 andersson.239.h: "Diese Entdeckung wurde von unserem leitenden Anthropologen gemacht."
 andersson.240.t: "Korb verloren"
 andersson.240.d: "Ein etwas peinlicher Vorfall verzögerte den Beginn der Knochenidentifizierung."
 andersson.240.f: "Als das Forschungsteam seine Sammelarbeiten abgeschlossen hatte und einen anderen Bereich der archäologischen Stätte erkundete, stellte der leitende Forscher, Dr. [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName], etwas zu spät fest, dass die gesammelten Knochen und Artefakte verloren gegangen waren. Der Expeditionskorb mit den bisher gefundenen archäologischen Objekten musste wohl verlegt worden sein. Vor Wochen."
 andersson.240.g: "Jeder Knochen ist wertvoll."
 andersson.240.h: "Beeilung!"
 andersson_conference_anthropologist_double_vote_tt: "Dank unserer erfahrenen Anthropologin haben wir #G zwei#! Stimmen."
 andersson_conference_anthropologist_triple_vote_tt: "Dank unseres berühmten Anthropologen haben wir #G drei#! Stimmen."
 andersson_cave_exploration_decrease_10_tt: "Verliere #R 10#! #V Erkundungsfortschritte#!."
 andersson_cave_exploration_decrease_20_tt: "Verliere #R 20#! #V Erkundungsfortschritte#!."
 andersson_cave_collection_decrease_10_tt: "Verliere #R 10#! #V Sammlungsfortschritte#!."
 andersson_cave_collection_decrease_20_tt: "Verliere #R 20#! #V Sammlungsfortschritte#!."
 andersson.301.a: "Rekonstruktionstypen-Auswahl"
 andersson.301.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] zog sich mit einigen Fossilien in seine Knochensammlung zurück und ordnete die Fundstücke sorgfältig nach Fundort und Ähnlichkeit. Anscheinend passten die Knochen zusammen und bildeten ein Skelett. Aber welches?"
 andersson.301.f: "„Der Schädelknochen ist verbunden mit – dem Rippenbein\nDas Rippenbein ist verbunden mit dem – Beinknochen\nDer Beinknochen ist verbunden mit dem – Hüftknochen\nDer Hüftknochen ist verbunden mit dem – Armknochen.\nDer Armknochen ist verbunden mit dem – Schädelknochen.\nDer Schädelknochen ist verbunden mit dem – Rippenbein.“"
 andersson.301.g: "Der [GetPlayer.GetCustom('andersson_fossil_vero')]-Mensch."
 andersson.301.h: "Der [GetPlayer.GetCustom('andersson_fossil_lagoa_santa')]-Mensch."
 andersson.301.i: "Der [GetPlayer.GetCustom('andersson_fossil_cro_magnon')]-Mensch."
 andersson.301.j: "Der [GetPlayer.GetCustom('andersson_fossil_boskop')]-Mensch."
 andersson.301.k: "Der [GetPlayer.GetCustom('andersson_fossil_tianyuan')]-Mensch."
 andersson.301.l: "Der [GetPlayer.GetCustom('andersson_fossil_talgai')]-Mensch."
 andersson.301.m: "Der [GetPlayer.GetCustom('andersson_fossil_neanderthal')]-Mensch."
 andersson.301.n: "Der [GetPlayer.GetCustom('andersson_fossil_gibraltar')]-Mensch."
