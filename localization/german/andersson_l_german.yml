 andersson.311.t: "Neues prähistorisches Skelett"
 andersson.311.d: "Bei einer öffentlichen Veranstaltung stellte Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] das neue prähistorische Skelett der Öffentlichkeit vor. Die wissenschaftliche Gemeinschaft hat die Rekonstruktion zur Kenntnis genommen."
 andersson.311.f: "„Man kann nur so weit in die Zukunft blicken, wie man in die Vergangenheit zurückblicken kann.“ – Raymond Dart"
 andersson.311.g: "[GetPlayer.GetAltName('NOM')] ist eine wissenschaftliche Nation von Weltklasse!"
 andersson.911.t: "Anthropologischer Kongress: Der Ursprung des modernen Menschen"
 andersson.911.d: "Unser Land wird Gastgeber des bedeutendsten Kongresses in der Geschichte der Anthropologie sein. Eine der großen Fragen der Menschheit, nämlich die nach ihrem Ursprung, soll geklärt werden. Anthropologen aus aller Welt werden darüber diskutieren, ob dies in Europa, Asien oder Afrika geschah. [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] wird die Debatte leiten."
 andersson.911.f: "Woher kommt der Mensch? Die biblische Erzählung vom Vertreibung aus dem Paradies enthält bereits den Kern dieser Frage – er stammt offensichtlich nicht aus der Region, in der er heute lebt. Folglich hielt man in Europa lange Zeit alte menschliche Knochen für die Überreste jener Menschen, die bei der Sintflut umgekommen waren – genauso wie man Dinosaurier lange Zeit für Tiere hielt, die keinen Platz auf der Arche hatten. Mit der Aufstellung der Eiszeit-Theorie und nachfolgenden geologischen und paläontologischen Untersuchungen, die zeigten, dass die Erde wesentlich älter war als erwartet, wuchs das Interesse an „Höhlenmenschen“. Spätestens mit der Evolutionstheorie und der Entdeckung prähistorischer Knochen, die mehr als nur einige tausend Jahre alt waren, wurde die Frage nach dem Ursprungsort des modernen Menschen immer dringlicher."
 andersson.911.g: "Wo liegt die Wiege der Menschheit?"
 andersson.912.d: "[SCOPE.sCountry('andersson_congress_host_country').GetAltName('NOM')] hat zu einem internationalen Wissenschaftskongress eingeladen. Das Thema wird die Herkunft des modernen Menschen sein. Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] hat eine herzliche Einladung erhalten."
 andersson.914.t: "Entstand der moderne Mensch in Europa, Asien oder Afrika?"
 andersson.914.d: "Die Wissenschaft hat sich in drei Lager gespalten. Die Frage nach der Wiege der Menschheit ist nicht nur mit einem gewissen Nationalstolz verbunden, sondern auch mit weiteren Thesen zur menschlichen Evolution."
 andersson.914.f: "In einer anregenden Debatte tauschten die jeweiligen Vertreter der drei Lager ihre Argumente aus. [SCOPE.sCharacter('andersson_europe_defender_scope').GetLastName] brachte Europa ins Spiel, da die bisherigen Funde bei europäischen Fossilien das größte Gehirnvolumen zeigten. Da das größere Gehirn dem aufrechten Gang vorausging, sei dies unvermeidlich. [SCOPE.sCharacter('andersson_asia_defender_scope').GetLastName] bezweifelte diese Theorie. In Asien seien bereits Fossilien von aufrecht gehenden, menschenähnlichen Vertretern gefunden worden – das Gehirn habe sich daher erst nach dem aufrechten Gang entwickelt. [SCOPE.sCharacter('andersson_africa_defender_scope').GetLastName] wies hingegen darauf hin, dass die bekannten Affenarten, die dem Menschen am nächsten stehen, aus Afrika stammten, nicht aus Asien. So wie es der Begründer der Evolutionstheorie dargelegt hatte, musste der Ursprung der Menschheit dort zu finden sein."
 andersson.914.g: "Der moderne Mensch hat sich in Europa entwickelt."
 andersson.914.h: "Alles deutet auf einen asiatischen Ursprung hin."
 andersson.914.i: "Die Wiege der Menschheit liegt in Afrika."
 andersson.915.t: "Respektierte Rede"
 andersson.915.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] hielt vor den versammelten Wissenschaftlern in [SCOPE.sCountry('andersson_congress_host_country').GetName] einen Vortrag, der sowohl das Publikum als auch junge Wissenschaftler begeisterte."
 andersson.915.f: "„Die Erde ist die Wiege der Menschheit, doch die Menschheit kann nicht für immer in dieser Wiege bleiben.“\n – Konstantin Ziolkowski."
 andersson.915.g: "Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] hinterlässt einen bleibenden Eindruck."
 andersson.916.t: "Ein wertvoller Beitrag zur Debatte"
 andersson.916.d: "Ein brillanter wissenschaftlicher Vortrag von Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] erweiterte auf dem Wissenschaftskongress [SCOPE.sCountry('andersson_congress_host_country').GetAltName('IN')] den Horizont der akademischen Welt. Er wird wahrscheinlich eine nachhaltige Wirkung haben."
 andersson.916.f: "„Er vertrat zu vielen Dingen sehr seltsame Theorien. Einmal war er sogar vor der British Association aufgestanden und hatte erklärt, dass Affen in ihrem Gehirn ebenso wie Menschen einen Hippocampus hätten. Das war eine schockierende Behauptung; denn wenn dem so wäre, was würde dann aus dem Glauben, der Hoffnung und der Nächstenliebe von Millionen Unsterblichen werden? Du magst vielleicht denken, dass es andere, wichtigere Unterschiede zwischen dir und einem Affen gibt, wie zum Beispiel die Fähigkeit zu sprechen, Maschinen zu bauen, Recht von Unrecht zu unterscheiden, deine Gebete zu sprechen und andere Kleinigkeiten dieser Art; aber das ist eine kindische Einbildung, meine Liebe. Man darf sich auf nichts anderes verlassen als auf den großen Nilpferd-Test. Wenn du einen „Hippopotamus major“ in deinem Gehirn hast, bist du kein Affe, auch wenn du vier Hände und keine Füße hättest und affenartiger wärst als alle Affen in allen Affenparks.“ – Charles Kingsley"
 andersson.917.t: "Anthropologisches Erbe"
 andersson.917.d: "Auf dem Kongress wurde die traurige Nachricht bekannt gegeben, dass ein renommierter Anthropologe wenige Tage zuvor verstorben war. Seine Privatsammlung soll versteigert werden."
 andersson.917.f: "„Der Mann hatte keine Kinder, keine Frau und keine Freunde, aber jede Menge alte Steine und Knochen. Was für ein gesegnetes Leben!“"
 andersson.917.g: "Jeder Knochen ist für unsere Sammlung wertvoll."
 andersson.917.h: "...aber wir haben genug Knochen."
 andersson.919.t_europe: "Der moderne Mensch stammt aus Europa"
 andersson.919.t_asia: "Der moderne Mensch stammt aus Asien"
 andersson.919.t_africa: "Der moderne Mensch stammt aus Afrika"
 andersson.919.d_europe: "Die internationale Wissenschaft ist sich einig, dass die moderne Menschheit ihren Ursprung in Europa hat. Nicht-europäische Wissenschaftler haben diese Einschätzung als Suprematismus kritisiert."
 andersson.919.d_asia: "Der Internationale Anthropologiekongress hat sich kürzlich auf den Kompromiss geeinigt, dass der Mensch aus Asien stammen muss. Die meisten Mitglieder der Versammlung schlossen sich dieser Ansicht an."
 andersson.919.d_africa: "Nach einer sehr kontroversen Abschlussdebatte konnten sich die Wissenschaftler mit knapper Mehrheit darauf einigen, dass der Ursprung der Menschheit in Afrika zu verorten ist."
 andersson.919.f_europe: "Historisch gesehen war die Frage nach dem tatsächlichen Ursprungsort der Menschheit zu Beginn des 20. Jahrhunderts noch nicht geklärt. Während eine kleine Gruppe, teilweise durch die Entdeckung des sogenannten Piltdown-Menschen in die Irre geführt, den Ursprung des modernen Menschen in Europa vermutete – weniger aus wissenschaftlichen als aus ideologischen Gründen –, fand die Asien-Theorie die größte Zustimmung. Die Funde auf Java und die Entdeckung des Peking-Menschen spielten dabei eine große Rolle. Erst ab der Mitte des 20. Jahrhunderts begannen immer mehr Funde in Afrika, diese Ansicht zu erschüttern."
 andersson.919.f_asia: "Historisch gesehen war die Frage nach dem tatsächlichen Ursprungsort der Menschheit zu Beginn des 20. Jahrhunderts noch nicht geklärt. Während eine kleine Gruppe, teilweise durch die Entdeckung des sogenannten Piltdown-Menschen in die Irre geführt, den Ursprung des modernen Menschen in Europa vermutete – weniger aus wissenschaftlichen als aus ideologischen Gründen –, fand die Asien-Theorie die größte Zustimmung. Die Funde auf Java und die Entdeckung des Peking-Menschen spielten dabei eine große Rolle. Erst ab der Mitte des 20. Jahrhunderts begannen immer mehr Funde in Afrika, diese Ansicht zu erschüttern."
 andersson.919.f_africa: "Historisch gesehen war die Frage nach dem tatsächlichen Ursprungsort der Menschheit zu Beginn des 20. Jahrhunderts noch nicht geklärt. Während eine kleine Gruppe, teilweise durch die Entdeckung des sogenannten Piltdown-Menschen in die Irre geführt, den Ursprung des modernen Menschen in Europa vermutete – weniger aus wissenschaftlichen als aus ideologischen Gründen –, fand die Asien-Theorie die größte Zustimmung. Die Funde auf Java und die Entdeckung des Peking-Menschen spielten dabei eine große Rolle. Erst ab der Mitte des 20. Jahrhunderts begannen immer mehr Funde in Afrika, diese Ansicht zu erschüttern."
 andersson.919.g: "Wie erwartet entwickelte sich die Menschheit in Europa."
 andersson.919.h: "Alle Hinweise deuten darauf hin, dass sich die Menschheit in Asien entwickelt hat."
 andersson.919.i: "„Out of Africa“ ist nun eine anerkannte These."
