 andersson_evolutionist: "Evolutionist"
 andersson_evolutionist_desc: "Ein Evolutionist ist ein Anthropologe, der Kulturen durch eigenständige Entwicklung erklärt."
 andersson_diffusionist: "Diffusionist"
 andersson_diffusionist_desc: "Ein Diffusionist ist ein Anthropologe, der Kulturen vor allem durch die Verbreitung von Ideen zwischen Gesellschaften erklärt."
