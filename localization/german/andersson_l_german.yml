 andersson.401.t: "Jagdcamp"
 andersson.401.d: "Im Rahmen seiner speläologischen Suche stieß Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] in [SCOPE.sState('andersson_state_scope').GetName] auf eine mutmaßliche Jagdsiedlung, die er auf die Mittelsteinzeit datiert."
 andersson.401.f: "Nach einer kurzen Suche gelang es dem Anthropologen, zahlreiche prähistorische Artefakte zu sichern. Darunter befanden sich Speere und Pfeilspitzen sowie eine Handaxe, die möglicherweise aus der Jungsteinzeit stammt. Genauere Untersuchungen werden an der Universität durchgeführt."
 andersson.401.g: "Das wird uns neue Einblicke in die Vergangenheit verschaffen."
 andersson.402.t: "Keramik"
 andersson.402.d: "Anthropologen und Archäologen konnten in [SCOPE.sState('andersson_state_scope').GetName] einige Keramikfunde bergen. Diese werden in der Museumssammlung gut zur Geltung kommen."
 andersson.402.f: "Die Gefäße, die die Anthropologen gefunden haben, könnte man als primitiv bezeichnen, wüsste man nicht, dass sie bereits mehrere tausend Jahre alt sind. Aus dieser Perspektive wirken sie geradezu raffiniert. Experten wurden bereits damit beauftragt, die Töpferwaren auf Farbreste zu untersuchen."
 andersson.402.g: "Bitte vorsichtig behandeln!"
 andersson.403.t: "Neolithisches Dorf"
 andersson.403.d: "Ein anthropologisches Team in [SCOPE.sState('andersson_state_scope').GetName] meldet gute Nachrichten: Mit etwas Glück haben sie die Überreste einer Siedlung aus der Jungsteinzeit gefunden. Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] ist sich sicher, dass zahlreiche Artefakte und neue Erkenntnisse aus dieser Epoche gewonnen werden können."
 andersson.403.f: "Wie sich herausstellte, verfügte die Siedlung bereits über eine palisadenartige Umfriedung; außerdem konnten ein Brunnen, Stallungen sowie ein Getreidespeicher kartiert werden. Dies könnte eine der ersten dokumentierten Siedlungen in unserem Land sein."
 andersson.403.g: "Eine wissenschaftliche Sensation!"
 andersson.404.t: "Menschliche Knochen"
 andersson.404.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat einige neue Knochen gefunden."
 andersson.404.f: "Unter der Leitung von Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] gelang es einem Team von Anthropologen, eine Grabstätte mit jahrtausendealten Knochen zu sichern, darunter einige außergewöhnlich gut erhaltene Fundstücke."
 andersson.404.g: "Ich hoffe, es wird nicht wieder so eine Enttäuschung wie bei den Suppenknochen."
 andersson.406.t: "Eine prähistorische Knochenflöte"
 andersson.406.d: "Ein Wanderer stolperte in einer Höhle in [SCOPE.sState('andersson_state_scope').GetName] über einen seltsamen Knochen. Nach Rücksprache mit der örtlichen Universität wurde Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] zur Höhle geschickt. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] fand einen Knochen, aber es war nicht irgendein Knochen, sondern eine prähistorische Knochenflöte!"
 andersson.406.f: "„Der klare, hohe Ton einer Knochenflöte ist ein engelsgleicher Klang, der jeden auf unheimliche Weise in seinen Bann zieht.“"
 andersson.406.g: "Kann es noch Musik abspielen?"
 andersson.408.t: "Gefundene Knochen und Steinwerkzeuge"
 andersson.408.d: "In [SCOPE.sState('andersson_state_scope').GetName] wurde eine große Menge an Steinwerkzeugen und Knochen ausgegraben. Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] wurde umgehend zur Untersuchung dorthin entsandt. ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] fand tatsächlich eine Menge Knochen, offenbar von allen möglichen Tieren, sowie einige Steinartefakte."
 andersson.408.f: "„Ich glaube, das ist ein Hirschknochen. Oder von einem Menschen? Vielleicht von einem Dinosaurier? Einem Hai? Einem riesigen Affen? Mit Knochen kenne ich mich wirklich nicht aus ...“"
 andersson.408.g: "Moment mal! Was für Knochen sind das denn? Aus der heutigen Zeit? Aus der Urzeit? Von Dinosauriern?"
 andersson.409.t: "Prähistorische Venus entdeckt"
 andersson.409.d: "In [SCOPE.sState('andersson_state_scope').GetStateRegion.GetMineHubName] wurde eine prähistorische Figur aus der Steinzeit entdeckt. Vielen gefällt ihr Aussehen nicht, da die kleine Elfenbeinfigur offenbar breite Hüften und große Brüste hat. Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] ist sich noch nicht sicher, wozu die Figur diente – war sie eine Göttin oder nur ein Talisman?"
 andersson.409.f: "Die Venusfigurinen sind kleine prähistorische Frauenfiguren, die im Jungpaläolithikum, insbesondere in der Gravettien-Kultur (ca. 30.000–22.000 v. Chr.), entstanden sind. Sie wurden in ganz Europa und bis nach Sibirien gefunden und sind typischerweise aus Stein, Elfenbein oder Knochen geschnitzt oder aus Ton geformt. Viele zeigen übertrieben dargestellte Brüste, Hüften und einen ausgeprägten Bauch, während Gesichtsdetails oft fehlen. Berühmte Beispiele sind die Venus von Willendorf und die Venus von Dolní Věstonice. Über ihren Zweck wird nach wie vor diskutiert; zu den Interpretationen zählen Fruchtbarkeitssymbole, rituelle Objekte, Selbstdarstellungen oder Ausdruck sozialer Identität. Venusfigurinen gelten als wichtige Beispiele früher symbolischer Kunst."
 andersson.409.g: "Sie wird als die Venus von [SCOPE.sState('andersson_state_scope').GetStateRegion.GetMineHubName] bekannt werden."
