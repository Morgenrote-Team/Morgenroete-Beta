l_german:
 rule_andersson_anthropology_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! Anthropologie-Regeln"
 setting_andersson_anthropology_historical_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_andersson_anthropology_historical_rule_desc Historisch#!#!"
 setting_andersson_anthropology_historical_rule_desc: "Ab einem bestimmten historischen Zeitpunkt werden [Concept('concept_andersson_human_fossil','$MR_FOSSILS$')] gefunden. Menschliche Fossilien, die im Zusammenhang mit einem historischen Ereignis entdeckt werden, genießen kein anthropologisches Ansehen. Wenn in einem Land vor diesem historischen Zeitpunkt ein menschliches Fossil entdeckt wird, wird diese Entdeckung allgemein nach dem Fundort benannt."
 setting_andersson_anthropology_free_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_andersson_anthropology_free_rule_desc Frei#!#!"
 setting_andersson_anthropology_free_rule_desc: "Es gibt keine spezifischen historischen Ereignisse, die mit dem Fund [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] in Verbindung stehen. Alle Funde werden allgemein nach dem Ort benannt, an dem sie entdeckt wurden."
 andersson_has_active_anthropologist_tt: "Es gibt einen [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')], der gerade nicht beschäftigt ist."
 andersson.106.t: "Anthropologisches Team reist ab"
 andersson.106.d: "Nachdem das anthropologische Team seine Arbeit abgeschlossen hat, kehren die wissenschaftlichen Mitarbeiter in ihre Heimatländer zurück. Die von ihnen entdeckten Höhlen stehen nun auch unseren Wissenschaftlern zur Verfügung."
 andersson.106.f: "„Kein Mensch ist uns zuvor in diese Tiefen vorgedrungen, niemand weiß, wohin wir gehen oder was wir sehen, noch nie wurde uns etwas so seltsam Schönes offenbart, und spontan stellen wir uns gegenseitig dieselbe Frage: Träumen wir nicht?“ – Charles Lyell"
 andersson.106.g: "Das war früher sinnvolle Entwicklungshilfe."
 andersson_anthropologist_dies_tt: "Der Journaleintrag schlägt fehl, wenn Ihr [concept_andersson_anthropologist] stirbt."
 je_andersson_reconstruct_prehistoric_skeleton: "Rekonstruktion eines prähistorischen Skeletts"
 je_andersson_reconstruct_prehistoric_skeleton_reason: "Anthropologen rekonstruieren Skelette anhand ihrer Erfahrungen und Merkmale. Das erste Skelett einer Menschenart – Neoanthropus, Palaeanthropus, Pithecanthropus oder Australopithecus – wird zusätzlich im Institut ausgestellt und gewährt einen Prestigebonus. Anthropologen können zudem alle anderen Skelette der verschiedenen Menschenarten rekonstruieren und so zusätzliches anthropologisches Prestige sammeln."
