 andersson.801.t: "Homo Sapiens"
 andersson.801.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat die Verwirrung um die verschiedenen Arten des sogenannten Neoanthropus aufgeklärt und sieht sie letztendlich nur als Varianten einer einzigen Art: Homo Sapiens."
 andersson.801.f: "Der Übergang vom Neoanthropus zum Homo sapiens markiert einen entscheidenden Wendepunkt in der Paläoanthropologie des 20. Jahrhunderts. Der Begriff Neoanthropus („neuer Mensch“), der zwischen den 1920er und 1950er Jahren populär wurde, war eine typologische Kategorie, die dazu diente, den modernen Menschen von archaischen Abstammungslinien wie den Neandertalern zu unterscheiden. Der Begriff war zentral für die heute überholte „Presapiens-Theorie“. Während der Modernen Synthese der 1950er Jahre drängten Evolutionsbiologen – allen voran Ernst Mayr – auf eine strenge, populationsbasierte Taxonomie. Sie sprachen sich gegen die Verbreitung redundanter Gattungsnamen aus und plädierten für die Rückkehr zur linneanischen Bezeichnung Homo sapiens (1758). Diese Neuklassifizierung ersetzte starre morphologische „Typen“ durch ein einheitliches biologisches Artenkonzept. Infolgedessen wurde Neoanthropus aufgegeben, wodurch alle modernen Menschen in einem einzigen Taxon zusammengefasst wurden, was die evolutionäre Kontinuität betonte."
 andersson.801.g: "Die Anthropologie wächst aus ihren Kinderschuhen heraus."
 andersson.802.t: "Homo neanderthalensis"
 andersson.802.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat die Verwirrung um die verschiedenen Arten des sogenannten Palaeanthropus aufgeklärt und sieht sie letztendlich nur als Varianten einer einzigen Art: Homo Neanderthalensis."
 andersson.802.f: "Der Übergang vom Palaeanthropus zum Homo neanderthalensis steht für die Konsolidierung der Hominiden-Taxonomie Mitte des 20. Jahrhunderts. Ursprünglich diente der Begriff „Palaeanthropus“ („Ur-Mensch“) als weit gefasste Kategorie für archaische Menschen, vor allem Neandertaler, um diese von den modernen Abstammungslinien abzugrenzen. Diese Terminologie spiegelte das typologische Denken des frühen 20. Jahrhunderts wider, das archaische Formen oft als separate, lineare „Evolutionsstufen“ betrachtete. Während der Modernen Synthese (1940er–1950er Jahre) plädierten Wissenschaftler wie Ernst Mayr für eine einheitliche Klassifizierung unter der Gattung Homo. Der vage Begriff „Palaeanthropus“ wurde zugunsten von „Homo neanderthalensis“ (oder „Homo sapiens neanderthalensis“) verworfen, wodurch Neandertaler als biologische Population und nicht als eigenständiger „primitiver“ Typ behandelt wurden. Dieser Wandel betonte die evolutionäre Kontinuität und etablierte den heutigen Rahmen, der Neandertaler als spezialisierte Schwesterlinie des modernen Menschen anerkennt."
 andersson.803.t: "Homo erectus"
 andersson.803.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat die Verwirrung um die verschiedenen Arten des sogenannten Pithecanthropus aufgeklärt und sieht sie letztendlich nur als Varianten einer einzigen Art: Homo erectus."
 andersson.803.f: "Der Übergang vom Pithecanthropus zum Homo erectus steht für die Zusammenfassung verschiedener regionaler Fossilienfunde zu einer einzigen, weltweit verbreiteten Art. Der Begriff Pithecanthropus („Affenmensch“) wurde ursprünglich 1891 von Eugène Dubois für seinen Fund des „Java-Menschen“ geprägt und sollte ein „fehlendes Glied“ zwischen nichtmenschlichen Primaten und dem modernen Menschen bezeichnen. Im Laufe des frühen 20. Jahrhunderts sorgten verschiedene Bezeichnungen wie Sinanthropus (Peking-Mensch) für weitere Verwirrung in der Taxonomie der Hominiden. Der entscheidende Wandel vollzog sich während der Modernen Synthese (um 1950), die von Ernst Mayr vorangetrieben wurde. Mayr argumentierte, dass anatomische Variationen zwischen asiatischen und afrikanischen Exemplaren eher Unterschiede auf Populationsebene als generische Unterscheidungsmerkmale darstellten. Durch die Neuklassifizierung dieser Fossilien als Homo erectus wandten sich die Wissenschaftler von der typologischen „Suche nach Verbindungsgliedern“ ab und hin zu einem einheitlichen biologischen Artenkonzept, das einen weit verbreiteten, äußerst anpassungsfähigen Vorfahren innerhalb der Gattung Homo anerkannte."
 andersson_institute_can_construct_only_institute_tt: "Wir haben noch kein Institut für Anthropologie und Ethnologie."
 andersson_je_no_hominid_prospecting_tt: "[GetPlayer.GetAltName('NOM')] hat keinen Zugriff mehr auf den Staat, in dem die Suche stattfindet."
