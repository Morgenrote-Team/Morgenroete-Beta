 andersson.801.t: "Homo Sapiens"
 andersson.801.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has clarified the confusion surrounding the various types of so-called Neoanthropus and ultimately sees them as only variants of one type: Homo Sapiens."
 andersson.801.f: "The transition from Neoanthropus to Homo sapiens marks a pivotal shift in 20th-century paleoanthropology. Initially popularized between the 1920s and 1950s, Neoanthropus ('new man') was a typological category used to distinguish modern humans from archaic lineages, such as Neanderthals. The term was central to the now-obsolete 'Presapiens theory.' During the Modern Synthesis of the 1950s, evolutionary biologists—most notably Ernst Mayr—pushed for a rigorous, population-based taxonomy. They argued against the proliferation of redundant generic names, advocating for the return to the Linnaean designation, Homo sapiens (1758). This reclassification replaced rigid morphological 'types' with a unified biological species concept. Consequently, Neoanthropus was abandoned, consolidating all modern humans into a single taxon emphasizing evolutionary continuity."
 andersson.801.g: "Anthropology is outgrowing its infancy."
 andersson.802.t: "Homo Neanderthalensis"
 andersson.802.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has clarified the confusion surrounding the various types of so-called Palaeanthropus and ultimately sees them as only variants of one type: Homo Neanderthalensis."
 andersson.802.f: "The transition from Palaeanthropus to Homo neanderthalensis represents the mid-20th-century consolidation of hominid taxonomy. Originally, Palaeanthropus ('ancient man') served as a broad category for archaic humans, primarily Neanderthals, to distinguish them from modern lineages. This terminology reflected early 20th-century typological thinking, which often viewed archaic forms as separate, linear 'evolutionary stages.' During the Modern Synthesis (1940s-1950s), scientists like Ernst Mayr advocated for a unified classification under the genus Homo. The vague Palaeanthropus was discarded in favor of Homo neanderthalensis (or Homo sapiens neanderthalensis), treating Neanderthals as a biological population rather than a distinct 'primitive' type. This shift emphasized evolutionary continuity and established the current framework, which recognizes Neanderthals as a specialized sister lineage of modern humans."
 andersson.803.t: "Homo Erectus"
 andersson.803.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has clarified the confusion surrounding the various types of so-called Pithecanthropus and ultimately sees them as only variants of one type: Homo Erectus."
 andersson.803.f: "The transition from Pithecanthropus to Homo erectus represents the consolidation of diverse regional fossil finds into a single, global species. Originally coined by Eugène Dubois in 1891 for his 'Java Man' discovery, Pithecanthropus ('ape-man') was intended to signify a 'missing link' between non-human primates and modern humans. Throughout the early 20th century, various names like Sinanthropus (Peking Man) further cluttered hominid taxonomy. The definitive shift occurred during the Modern Synthesis (c. 1950), driven by Ernst Mayr. Mayr argued that anatomical variations among Asian and African specimens were population-level differences rather than generic distinctions. By reclassifying these fossils as Homo erectus, scientists moved from typological 'link-hunting' toward a unified biological species concept, recognizing a widespread, highly adaptable ancestor within the genus Homo."
