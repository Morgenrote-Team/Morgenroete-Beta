 andersson.61.t: "Der [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Mensch"
 andersson.61.d: "Zwei führende Anthropologen haben heute eine Entdeckung vorgestellt, die die wissenschaftliche Welt erschüttern könnte: Sie haben nichts Geringeres als den ersten modernen Menschen gefunden, der eindeutig aus [ROOT.GetCountry.GetAltNameNoFlag('DAT')] stammte."
 andersson.61.f: "Bei einer Tagung der Geological Society of London verkündeten Arthur Smith Woodward und Charles Dawson, dass die in einer Kiesgrube nahe dem Dorf Piltdown gefundenen Schädelstücke eines frühen Menschen einen epochalen Fund darstellten. Woodwards Rekonstruktion auf der Grundlage der gefundenen Fragmente ähnelte weitgehend dem Schädel eines modernen Menschen, mit Ausnahme des Hinterkopfes, einer Region an der Verbindung von Schädel und Wirbelsäule, sowie der Größe des Gehirns, das nur etwa zwei Drittel der Größe eines modernen Menschen hatte, und der Zähne und des Kieferknochens, die nur annähernd menschenähnlich waren. Gestützt auf die hohe wissenschaftliche Autorität des British Museum interpretierte Woodward die Funde von Piltdown als fehlendes Bindeglied zwischen Menschenaffen und Menschen. Trotz anfänglicher Zweifel schätzten Wissenschaftler des Natural History Museum in London das Alter des Fundes auf 200.000 bis 500.000 Jahre. Damit wäre er deutlich älter gewesen als die Neandertaler. Die Bekanntgabe der Entdeckung stieß sofort auf großes Interesse sowohl bei Experten als auch in der britischen Bevölkerung. Die Nachricht von der Entdeckung in Piltdown sorgte weltweit für Aufsehen."
 andersson.61.g: "Der erste moderne Mensch war also [ROOT.GetCountry.GetAdjectiveNoFormatting|l]. Das überrascht überhaupt nicht!"
 andersson.61.h: "Dieser Fund ist äußerst zweifelhaft."
 andersson.62.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName], der führende Anthropologe unseres Landes, hat heute eine Entdeckung vorgestellt, die die wissenschaftliche Welt erschüttern könnte: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] fand nichts Geringeres als den ersten modernen Menschen, der eindeutig aus [ROOT.GetCountry.GetAltNameNoFlag('DAT')] stammte."
 andersson.62.f: "Bei einer Tagung der Anthropologischen Gesellschaft von [ROOT.GetCountry.GetCapital.GetCityHubName] verkündete [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName], dass die Schädelfragmente eines frühen Menschen, die in einer Kiesgrube in der Nähe des Dorfes [GetPlayer.GetCustom('andersson_fossil_piltdown')] gefunden wurden, einen epochalen Fund darstellten. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]s Rekonstruktion auf der Grundlage der gefundenen Fragmente ähnelte weitgehend dem Schädel eines modernen Menschen, mit Ausnahme des Hinterkopfes, einer Region an der Verbindung von Schädel und Wirbelsäule, sowie der Größe des Gehirns, das nur etwa zwei Drittel der Größe eines modernen Menschen hatte, und der nur annähernd menschenähnlichen Zähne und des Kieferknochens. Gestützt auf die hohe wissenschaftliche Autorität des [ROOT.GetCountry.GetAdjectiveNoFormatting|l]en Museums interpretierte [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] die [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Funde als fehlendes Bindeglied zwischen Menschenaffen und Menschen. Trotz anfänglicher Zweifel schätzten Wissenschaftler des Naturkundemuseums in [ROOT.GetCountry.GetCapital.GetCityHubName] das Alter des Fundes auf 200.000 bis 500.000 Jahre. Damit wäre er deutlich älter gewesen als die Neandertaler. Die Bekanntgabe der Entdeckung stieß sofort auf großes Interesse sowohl bei Experten als auch in der [ROOT.GetCountry.GetAdjectiveNoFormatting|l]en Bevölkerung. Die Nachricht von der Entdeckung des [GetPlayer.GetCustom('andersson_fossil_piltdown')] sorgte weltweit für Aufsehen."
 andersson.63.t: "Paranthropus"
 andersson.63.d: "Während einer Exkursion nach Transvaal überreichte ein Schüler Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] einige Fossilien zur Untersuchung. Der Anthropologe wollte sofort wissen, wo der Junge sie gefunden hatte. Als er am Fundort ankam, gelang [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim] eine Reihe unglaublicher Entdeckungen – die auf eine völlig unbekannte Spezies hindeuteten, vielleicht keinen Vorfahren, aber einen sehr entfernten Verwandten des Menschen."
 andersson.63.f: "Paranthropus ist eine Gattung ausgestorbener Hominiden, die zwei weithin anerkannte Arten umfasst: P. robustus und P. boisei. Die Gültigkeit der Gattung Paranthropus ist jedoch umstritten, und sie wird manchmal als Synonym für Australopithecus angesehen. Sie lebten vor etwa 2,9 bis 1,2 Millionen Jahren (mya), vom Ende des Pliozäns bis zum mittleren Pleistozän. Paranthropus zeichnet sich durch robuste Schädel aus, mit einem markanten, gorillaähnlichen Scheitelkamm entlang der Mittellinie, der auf starke Kaumuskulatur hindeutet – sowie durch breite, pflanzenfressende Zähne, die zum Zermahlen dienten. Sie werden mit Knochenwerkzeugen in Verbindung gebracht und gelten als umstrittener frühester Beweis für die Nutzung von Feuer. Sie bewohnten typischerweise Waldgebiete und lebten mit einigen frühen Menschenarten zusammen, nämlich A. africanus, H. habilis und H. erectus."
 andersson.63.g: "Wenn das das Ergebnis ist, sollte der Arzt öfter Urlaub machen."
 andersson_add_piltdown_fossil_effect_tt: "Erhalte #G 1#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_special_human_fossil$')]: [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Mensch."
 andersson_add_paranthropus_fossil_effect_tt: "Erhalte #G 1#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_special_human_fossil$')]: Paranthropus."
 andersson.202.a: "Hominiden-Prospektion: Ziel"
 andersson.202.d: "Hominiden-Prospektion ist vielleicht nicht so abenteuerlich wie eine archäologische Expedition oder eine Pazifik-Expedition, kann aber manchmal ihre ganz eigenen kniffligen Herausforderungen mit sich bringen. Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] wartet bereits darauf, mit der eingehenden Untersuchung der menschlichen Knochen zu beginnen. Die Frage bleibt: In welcher Region soll das Team suchen?"
 andersson.202.f: "„Sehr geehrte Herren, wir begeben uns auf eine spannende Reise zu den Ursprüngen der Menschheit! Ich erwarte wissenschaftliche Neugier, leidenschaftlichen Entdeckergeist und unerschütterliche Disziplin!\n\nP.S.: Bitte lassen Sie Ihre Hunde zu Hause. Das gilt auch für Sie, Professor Schabernack!“\n\nUnterzeichnet: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
