 je_andersson_anthropological_research_reason: "[ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_active_type')]Ein [concept_andersson_anthropologist], der gerade keine anderen Aufgaben hat, betreibt in seinem Land anthropologische Forschung. Manchmal entdeckt er dabei eine [concept_andersson_cave]. Anthropologen, die über längere Zeiträume Höhlenerkundungen und Ausgrabungen durchführen, können die [concept_character_trait] #V $dubois_paleontologist$#! oder #V $lepsius_archaeologist$#! erwerben – jedoch nur eine der beiden. Jedes Arbeitsjahr führt zu einem @andersson_human_fossil! [concept_andersson_human_fossil].\n\n$mr_divider_for_je$\nAnthropologen können auch zusätzliche @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] oder @andersson_prehistoric_artifact! [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')], abhängig von den folgenden Faktoren:\n[ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_paleontologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_archaeologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_speleologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_cave_type')]"
 je_andersson_hominid_prospecting_neoanthropus: "Hominiden-Prospektion: Neoanthropus"
 je_andersson_hominid_prospecting_neoanthropus_reason: "#p Derzeit finden in [SCOPE.sState('target').GetName] Prospektionsarbeiten nach Hominiden statt.#!\n$mr_divider_for_je$\nDie Suche nach menschlichen Fossilien durch Anthropologen gliedert sich in drei Schritte: Erkundung, Sammlung und Identifizierung. Während der Erkundung sucht der Anthropologe das Gebiet nach einer geeigneten Fundstelle ab. Erst dann beginnt er mit der Sammlung von Fossilien. Sobald genügend Fossilien gefunden wurden, beginnt er mit dem Identifizierungsprozess. Erkundung und Sammlung gipfeln in einem Entdeckungsereignis. Während des Identifizierungsprozesses kann auch eine neue Hominidenart identifiziert werden.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName] ist eine weltweit verbreitete Art. Traditionell werden die folgenden Arten zu dieser Kategorie gezählt:\n- [GetGeographicRegion('andersson_geographic_region_vero').GetName]\n- [GetGeographicRegion('andersson_geographic_region_lagoa_santa').GetName]\n- [GetGeographicRegion('andersson_geographic_region_cro_magnon').GetName]\n- [GetGeographicRegion('andersson_geographic_region_boskop').GetName]\n- [GetGeographicRegion('andersson_geographic_region_tianyuan').GetName]\n- [GetGeographicRegion('andersson_geographic_region_talgai').GetName]"
 je_andersson_hominid_prospecting_palaeanthropus: "Hominiden-Prospektion: Palaeanthropus"
 je_andersson_hominid_prospecting_palaeanthropus_reason: "#p Derzeit finden in [SCOPE.sState('target').GetName] Prospektionsarbeiten nach Hominiden statt.#!\n$mr_divider_for_je$\nDie Suche nach menschlichen Fossilien durch Anthropologen gliedert sich in drei Schritte: Erkundung, Sammlung und Identifizierung. Während der Erkundung sucht der Anthropologe das Gebiet nach einer geeigneten Fundstelle ab. Erst dann beginnt er mit der Sammlung von Fossilien. Sobald genügend Fossilien gefunden wurden, beginnt er mit dem Identifizierungsprozess. Erkundung und Sammlung gipfeln in einem Entdeckungsereignis. Während des Identifizierungsprozesses kann auch eine neue Hominidenart identifiziert werden.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName] kommt in Europa und im Nahen Osten vor. Traditionell werden die folgenden Arten dieser Kategorie zugeordnet:\n- [GetGeographicRegion('andersson_geographic_region_neanderthal').GetName]\n- [GetGeographicRegion('andersson_geographic_region_gibraltar').GetName]\n- [GetGeographicRegion('andersson_geographic_region_spy').GetName]\n- [GetGeographicRegion('andersson_geographic_region_krapina').GetName]\n- [GetGeographicRegion('andersson_geographic_region_galilee').GetName]"
 je_andersson_hominid_prospecting_pithecanthropus: "Hominiden-Prospektion: Pithecanthropus"
 je_andersson_hominid_prospecting_pithecanthropus_reason: "#p Derzeit finden in [SCOPE.sState('target').GetName] Prospektionsarbeiten nach Hominiden statt.#!\n$mr_divider_for_je$\nDie Suche nach menschlichen Fossilien durch Anthropologen gliedert sich in drei Schritte: Erkundung, Sammlung und Identifizierung. Während der Erkundung sucht der Anthropologe das Gebiet nach einer geeigneten Fundstelle ab. Erst dann beginnt er mit der Sammlung von Fossilien. Sobald genügend Fossilien gefunden wurden, beginnt er mit dem Identifizierungsprozess. Erkundung und Sammlung gipfeln in einem Entdeckungsereignis. Während des Identifizierungsprozesses kann auch eine neue Hominidenart identifiziert werden.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName] kommt in Europa, Afrika und Asien vor. Traditionell werden die folgenden Arten zu dieser Kategorie gezählt:\n- [GetGeographicRegion('andersson_geographic_region_heidelberg').GetName]\n- [GetGeographicRegion('andersson_geographic_region_rhodesian').GetName]\n- [GetGeographicRegion('andersson_geographic_region_peking').GetName]\n- [GetGeographicRegion('andersson_geographic_region_java').GetName]"
 je_andersson_hominid_prospecting_australopithecus: "Hominiden-Prospektion: Australopithecus"
 je_andersson_hominid_prospecting_australopithecus_reason: "#p Derzeit finden in [SCOPE.sState('target').GetName] Prospektionsarbeiten nach Hominiden statt.#!\n$mr_divider_for_je$\nDie Suche nach menschlichen Fossilien durch Anthropologen gliedert sich in drei Schritte: Erkundung, Sammlung und Identifizierung. Während der Erkundung sucht der Anthropologe das Gebiet nach einer geeigneten archäologischen Fundstelle ab. Erst dann beginnt er mit dem Sammeln von Fossilien. Sobald genügend Fossilien gefunden wurden, beginnt er mit dem Identifizierungsprozess. Erkundung und Sammlung gipfeln in einem Entdeckungsereignis. Während des Identifizierungsprozesses kann auch eine neue Hominidenart identifiziert werden.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_australopithecus').GetName] befindet sich in Afrika"
 je_andersson_cave_exploration: "Höhlenerkundung"
 je_andersson_cave_exploration_reason: "#p Derzeit finden in [SCOPE.sState('target').GetName] Höhlenerkundungen statt.#!\n$mr_divider_for_je$\nDie Höhlenerkundung stützt sich ausschließlich auf speleologische Untersuchungen. Erfahrene Anthropologen können Höhlen daher schneller erkunden. Welche Geheimnisse könnten die Höhlen in [SCOPE.sState('target').GetNameNoFormatting] bergen?"
