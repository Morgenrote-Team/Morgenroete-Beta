 je_andersson_anthropological_research: "Anthropological Research"
 je_andersson_anthropological_research_reason: "[ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_active_type')]Ein [concept_andersson_anthropologist], der gerade keine anderen Aufgaben hat, betreibt in seinem Land anthropologische Forschung. Manchmal entdeckt er dabei eine [concept_andersson_cave]. Anthropologen, die über längere Zeiträume Höhlenerkundungen und Ausgrabungen durchführen, können die [concept_character_trait] #V $dubois_paleontologist$#! oder #V $lepsius_archaeologist$#! erwerben – jedoch nur eine der beiden. Jedes Arbeitsjahr führt zu einem @andersson_human_fossil! [concept_andersson_human_fossil].\n\n$mr_divider_for_je$\nAnthropologen können auch zusätzliche @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] oder @andersson_prehistoric_artifact! [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')], abhängig von den folgenden Faktoren:\n[ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_paleontologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_archaeologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_speleologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_cave_type')]"
 je_andersson_hominid_prospecting_neoanthropus: "Hominid Prospecting: Neoanthropus"
 je_andersson_hominid_prospecting_neoanthropus_reason: "#p Hominid prospecting is currently taking place in [SCOPE.sState('target').GetName].#!\n$mr_divider_for_je$\nThe search for human fossils by anthropologists is divided into three steps: exploration, collection, and identification. During exploration, the anthropologist searches the area for a suitable anthropological site. Only then does he begin collecting fossils. Once enough fossils have been found, he begins the identification process. Exploration and collection culminate in a discovery event. During the identification process, a new hominid type may also be identified.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName] is a globally distributed species. Traditionally, the following types are counted in this category:\n- [GetGeographicRegion('andersson_geographic_region_vero').GetName]\n- [GetGeographicRegion('andersson_geographic_region_lagoa_santa').GetName]\n- [GetGeographicRegion('andersson_geographic_region_cro_magnon').GetName]\n- [GetGeographicRegion('andersson_geographic_region_boskop').GetName]\n- [GetGeographicRegion('andersson_geographic_region_tianyuan').GetName]\n- [GetGeographicRegion('andersson_geographic_region_talgai').GetName]"
 je_andersson_hominid_prospecting_palaeanthropus: "Hominid Prospecting: Palaeanthropus"
 je_andersson_hominid_prospecting_palaeanthropus_reason: "#p Hominid prospecting is currently taking place in [SCOPE.sState('target').GetName].#!\n$mr_divider_for_je$\nThe search for human fossils by anthropologists is divided into three steps: exploration, collection, and identification. During exploration, the anthropologist searches the area for a suitable anthropological site. Only then does he begin collecting fossils. Once enough fossils have been found, he begins the identification process. Exploration and collection culminate in a discovery event. During the identification process, a new hominid type may also be identified.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName] is found in Europe and the Near East. Traditionally, the following types are counted in this category:\n- [GetGeographicRegion('andersson_geographic_region_neanderthal').GetName]\n- [GetGeographicRegion('andersson_geographic_region_gibraltar').GetName]\n- [GetGeographicRegion('andersson_geographic_region_spy').GetName]\n- [GetGeographicRegion('andersson_geographic_region_krapina').GetName]\n- [GetGeographicRegion('andersson_geographic_region_galilee').GetName]"
 je_andersson_hominid_prospecting_pithecanthropus: "Hominid Prospecting: Pithecanthropus"
 je_andersson_hominid_prospecting_pithecanthropus_reason: "#p Hominid prospecting is currently taking place in [SCOPE.sState('target').GetName].#!\n$mr_divider_for_je$\nThe search for human fossils by anthropologists is divided into three steps: exploration, collection, and identification. During exploration, the anthropologist searches the area for a suitable anthropological site. Only then does he begin collecting fossils. Once enough fossils have been found, he begins the identification process. Exploration and collection culminate in a discovery event. During the identification process, a new hominid type may also be identified.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName] is found in Europe, Africa and Asia. Traditionally, the following types are counted in this category:\n- [GetGeographicRegion('andersson_geographic_region_heidelberg').GetName]\n- [GetGeographicRegion('andersson_geographic_region_rhodesian').GetName]\n- [GetGeographicRegion('andersson_geographic_region_peking').GetName]\n- [GetGeographicRegion('andersson_geographic_region_java').GetName]"
 je_andersson_hominid_prospecting_australopithecus: "Hominid Prospecting: Australopithecus"
 je_andersson_hominid_prospecting_australopithecus_reason: "#p Hominid prospecting is currently taking place in [SCOPE.sState('target').GetName].#!\n$mr_divider_for_je$\nThe search for human fossils by anthropologists is divided into three steps: exploration, collection, and identification. During exploration, the anthropologist searches the area for a suitable anthropological site. Only then does he begin collecting fossils. Once enough fossils have been found, he begins the identification process. Exploration and collection culminate in a discovery event. During the identification process, a new hominid type may also be identified.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_australopithecus').GetName] is found in Africa."
 je_andersson_cave_exploration: "Cave Exploration"
 je_andersson_cave_exploration_reason: "#p Cave exploration is currently taking place in [SCOPE.sState('target').GetName].#!\n$mr_divider_for_je$\nCave exploration relies solely on speleological investigation. Experienced anthropologists can therefore explore caves more quickly. What secrets might cave in [SCOPE.sState('target').GetNameNoFormatting] hold?"
