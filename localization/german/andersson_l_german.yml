 andersson.501.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]-Mensch ist ein Betrug!"
 andersson.501.d: "Nach eingehenden Untersuchungen durch Dr. [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName] hat [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetSheHe] nachgewiesen, dass es sich bei den angeblichen menschlichen Überresten um eine Fälschung handelt. Dies ist eine große Blamage für [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName]. Der [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting|l]e Chefanthropologe, Dr. [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName], wurde als Betrüger entlarvt!"
 andersson.501.f: "Seit der Entdeckung des [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Menschen hatten mehrere nicht-[SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting|l]e Wissenschaftler erhebliche Zweifel an dessen Echtheit geäußert und die „Entdeckung“ vielmehr dem [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting|l]en Bedürfnis nach Anerkennung zugeschrieben. Mehrere Versuche angesehener Wissenschaftler, den Betrug zu beweisen, sind bisher gescheitert. Doch [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetFullName] hat der Welt endlich offenbart, was hinter dieser Entdeckung wirklich steckt: der größte Schwindel in der Geschichte der Anthropologie. Nicht nur war der Schädel viel jünger als behauptet und stammte lediglich aus dem Mittelalter; der Fälscher hatte den menschlichen Oberkopf mit dem Kiefer eines Orang-Utans kombiniert."
 andersson.501.g: "Am Ende setzt sich die seriöse Wissenschaft durch."
 andersson.502.t: "Eine wissenschaftliche Katastrophe!"
 andersson.502.g: "Eine internationale Blamage, die ihresgleichen sucht!"
 andersson.503.t: "Debatte verloren"
 andersson.503.d: "Trotz [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetHerHis]er zahlreicher Argumente gelang es Dr. [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName] letztlich nicht, die wissenschaftliche Welt davon zu überzeugen, dass der [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Mensch tatsächlich eine Fälschung ist. Dr. [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName] hat sich als hervorragender Redner erwiesen."
 andersson.503.f: "Anscheinend hatte der [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting|l]e Wissenschaftler am Tag der Debatte noch ein paar Asse im [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetHerHis]em Ärmel. Unser Anthropologe macht Voreingenommenheit, Bestechung und ein schlechtes Frühstück für das Scheitern verantwortlich."
 andersson.503.g: "Vielleicht ist der Fund doch echt...?"
 andersson.504.t: "Ein wissenschaftlicher Triumph"
 andersson.504.d: "Der Versuch eines unbedeutenden Wissenschaftlers aus einem noch unbedeutenderen Land, unseren wertvollen [GetPlayer.GetCustom('andersson_fossil_piltdown')]-Menschen als Fälschung zu entlarven, ist gescheitert. Das Anthropologische Institut geht gestärkt aus dieser Auseinandersetzung hervor."
 andersson.504.f: "Es ist absolut offensichtlich, dass der moderne Mensch aus [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAltName('DAT')] stammen muss, wenn das alles ist, was andere Länder mit ihren albernen Argumenten zu bieten haben."
 andersson.504.g: "Der Nächste bitte!"
 andersson.511.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]-Mensch: Vorbereitung auf die Debatte"
 andersson.511.d: "Dr. [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName] ist dabei, ein bedeutendes Fossil als Fälschung zu entlarven. [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetSheHe|U] wird von Dr. [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName] bekämpft werden. Beide verteidigen ihre Ehre und die ihres Landes."
 andersson.511.f: "Die Debattierstärke eines Anthropologen beruht in erster Linie auf seiner Erfahrung und in zweiter Linie auf seinen Charaktereigenschaften. Es gibt auch einen kleinen Zufallsfaktor, da tägliche Formschwankungen berücksichtigt werden. Das Land, in dessen Besitz sich das Fossil befindet, hat einen leichten Vorteil, da sich eine neue Theorie zunächst gegen eine etablierte durchsetzen muss. Der Anthropologe mit der höheren Debattierstärke gewinnt die Debatte. Bei einem Unentschieden gewinnt ebenfalls der Verteidiger.\n\n[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetFullNameNoFormatting] aus [SCOPE.sCountry('andersson_piltdown_attacker_country_scope').GetAltName('DAT')]: [SCOPE.GetValue('andersson_piltdown_attacker_points_scope')|0+] #V Debattierkunst#!\n\n[SCOPE.sCharacter('andersson_piltdown_defender_scope').GetFullNameNoFormatting] aus [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAltName('DAT')]: [SCOPE.GetValue('andersson_piltdown_defender_points_scope')|0+] #V Debattierkunst#!"
 andersson.511.g: "Wir stellen den [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName] zur öffentlichen wissenschaftlichen Diskussion!"
 andersson.511.h: "Wenn ich es mir recht überlege, scheint das keine gute Idee zu sein."
