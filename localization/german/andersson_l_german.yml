 andersson.405.t: "Die Megalithen von [SCOPE.sState('andersson_state_scope').GetFarmHubName]"
 andersson.405.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat ein starkes Interesse an den Megalithen in [SCOPE.sState('andersson_state_scope').GetFarmHubName] entwickelt und deren Hintergründe eingehend untersucht. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] veröffentlichte kürzlich [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]e – größtenteils spekulative – Studien zu diesen neolithischen Bauwerken und erregte damit Aufmerksamkeit in der anthropologischen Fachwelt."
 andersson.405.f: "Die Megalithkultur bezeichnet ein Phänomen der Jungsteinzeit, bei dem Gemeinschaften zwischen 4500 und 1500 v. Chr. massive Steinblöcke zum Bau monumentaler Kult- und Grabstätten verwendeten. Von der Atlantikküste bis zum Mittelmeer prägten diese Bauwerke Europas erste dauerhafte sakrale Landschaft. Die Formen reichen von einzelnen Menhiren und kilometerlangen Steinreihen, wie beispielsweise in Carnac, bis hin zu tischartigen Dolmen, die als Gemeinschaftsgräber dienten. Besonders komplex sind die kreisförmigen Henges, von denen das berühmteste, Stonehenge, eine präzise astronomische Ausrichtung aufweist. Der Transport und die Errichtung der mehrere Tonnen schweren Megalithen erforderten eine enorme soziale Organisation sowie fortgeschrittene Kenntnisse in Statik und Logistik."
 andersson.405.g: "Und das haben unsere Vorfahren wirklich vor 5.000 Jahren gebaut?"
 andersson.407.t: "Totenköpfe, Totenköpfe und noch mehr Totenköpfe!"
 andersson.407.d: "In [SCOPE.sState('andersson_state_scope').GetName] herrscht tiefstes Elend. Alle leiden unter der weitreichenden Zerstörung. Alle? Nein! Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat zahlreiche junge menschliche Schädel gefunden, die [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] zur Untersuchung gesammelt hat!"
 andersson.407.f: "„So viele schöne Schädel für meine kraniologischen Studien!“"
 andersson.407.g: "Das ist ziemlich makaber."
