 je_andersson_hominid_expedition: "Hominiden-Expedition"
 je_andersson_hominid_expedition_reason: "#p Derzeit findet eine Hominiden-Expedition in [SCOPE.sState('target').GetName], [SCOPE.sState('target').GetCountry.GetName] statt.#!\n$mr_divider_for_je$\nDie Suche nach menschlichen Fossilien durch Anthropologen gliedert sich in drei Schritte: Erkundung, Sammlung und Identifizierung. Während der Erkundung sucht der Anthropologe das Gebiet nach einer geeigneten anthropologischen Fundstelle ab. Erst dann beginnt er mit dem Sammeln von Fossilien. Sobald genügend Fossilien gefunden wurden, beginnt er mit dem Identifizierungsprozess. Erkundung und Sammlung gipfeln in einem Entdeckungsereignis. Während des Identifizierungsprozesses kann auch eine neue Hominidenart identifiziert werden."
 andersson_je_no_subject_anymore_tt: "[GetPlayer.GetAltName('NOM')] ist nicht mehr der Besitzer des Staates, in dem eine Expedition stattfindet."
 andersson_hominid_expedition_modifier: "Hominiden-Expedition"
 andersson.205.t: "Hominiden-Expedition: Typ"
 andersson.205.d: "Bevor Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] eine Expedition zusammenstellen kann, muss zunächst entschieden werden, um welche Art von Hominiden es sich bei dem Zielobjekt handeln soll."
 andersson.205.f: "„Ist die Evolution eine Theorie, ein System oder eine Hypothese? Sie ist viel mehr: Sie ist eine allgemeine Bedingung, der sich alle Theorien, alle Hypothesen, alle Systeme beugen müssen und die sie fortan erfüllen müssen, wenn sie denkbar und wahr sein sollen.“ – Pierre Teilhard de Chardin"
 andersson.206.t: "Hominiden-Expedition: Region"
 andersson.206.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat sich bereits von seinen Assistenten Karten der fremden Gebiete bringen lassen, die für eine Expedition in Frage kommen. Die Entscheidung ist noch nicht gefallen."
 andersson.206.f: "„Ich habe mir in der Frage, ob es im frühen Pleistozän in Europa Hominiden gab, alle Möglichkeiten offen gehalten.“ – Louis Leakey"
 andersson.213.t: "Hominiden-Expedition: Abgeschlossen"
 andersson.213.d: "Nach einer anstrengenden, aber lohnenden Expedition sind Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] und sein Team wohlbehalten zurückgekehrt. Das Anthropologische Institut ist nun um einige Knochen reicher."
 andersson.213.f: "Nun ist das fertig … und ich auch. – Robert Broom (als er kurz vor seinem Tod seine Monografie über den Australopithecus vollendete)"
 andersson.225.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] hat in einer Höhle [SCOPE.sCountry('andersson_cave_country_scope').GetAltName('IN')] eine spektakuläre Entdeckung gemacht!"
