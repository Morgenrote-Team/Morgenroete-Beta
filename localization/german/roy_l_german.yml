 alert_roy_ethnologist_will_retire_soon_alert_desc: "Ihr [concept_roy_ethnologist] steht kurz vor dem Ruhestand. Möglicherweise möchten Sie einen Ersatz finden."
 roy_ethnologist_will_retire_soon_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! [concept_roy_ethnologist] kurz vor Ruhestand"
 alert_roy_ethnologist_will_retire_soon_alert_hint: "Ihr [concept_roy_ethnologist] wird irgendwann in den nächsten #V 5 Jahren#! in den Ruhestand gehen. Vielleicht möchten Sie einen neuen Ethnologen als Nachfolger suchen."
