 roy_ethnology_tech: "Ethnologie"
 roy_ethnology_tech_desc: "Im 19. Jahrhundert entwickelte sich die Ethnologie zu einer eigenständigen wissenschaftlichen Disziplin und wandelte sich von beiläufigen Beobachtungen auf Reisen hin zu einer systematischen Erforschung menschlicher Kulturen und ihrer Ursprünge. Beeinflusst durch den Aufstieg der Evolutionstheorie und die koloniale Expansion versuchten frühe Ethnologen, die weltweite Vielfalt durch vergleichende Methoden und die Sammlung materieller Artefakte zu klassifizieren. Im Laufe der Jahrzehnte wandte sich das Fachgebiet von rein spekulativen Rassenhierarchien ab und hin zu einer strengeren ethnografischen Feldforschung, wodurch es den Grundstein für die moderne Sozialanthropologie legte."
