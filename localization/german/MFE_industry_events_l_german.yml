 mfe_industry_events.1.t:0 "Eisenbahngesellschaft entsteht"
 mfe_industry_events.1.d:0 "Ein Politiker mit Verbindungen, [SCOPE.sCharacter('rich_dude').GetFullName], möchte eine neue Eisenbahngesellschaft finanzieren, aber die IG \"[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]\" unterstützt den neuen Vorschlag nicht."
 mfe_industry_events.1.f:0 "\"Das Eisenbahnfieber erfasst die ganze Welt und bietet viele Möglichkeiten, Geld zu verdienen, aber wir müssen handeln, und zwar schnell. Was sagen Sie dazu?\""
 mfe_industry_events.1.a:0 "Erlauben Sie [SCOPE.sCharacter('rich_dude').GetFullName], das Geschäft fortzusetzen"
 mfe_industry_events.1.b:0 "Blockieren Sie alle weiteren Bemühungen"
 mfe_industry_events.1.c:0 "Subventionieren Sie ihre Bemühungen"
 mfe_industry_events.2.t:0 "Aufstrebendes Eisenbahnunternehmen"
 mfe_industry_events.2.d:0 "Die neuen Eisenbahnstrecken in [SCOPE.sState('railway_state').GetName] sind ein voller Erfolg bei den Einheimischen, die sie voll und ganz angenommen haben."
 mfe_industry_events.2.f:0 "\"Früher dauerte die Fahrt von [SCOPE.sState('railway_state').GetName] nach [ROOT.GetCountry.GetCapital.GetName] drei Stunden, aber diese neuen Routen verkürzen die Reisezeit um die Hälfte.\""
 mfe_industry_events.2.a:0 "Das ist toll!"
 mfe_industry_events.3.t:0 "Eisenbahngesellschaft in Schwierigkeiten"
 mfe_industry_events.3.d:0 "Plötzliche Veränderungen am Aktienmarkt haben die IG \"[SCOPE.gsInterestGroup('ig_industrialists').GetName]\" unter Druck gesetzt, Kapitalquellen versiegen lassen und überforderte Eisenbahngesellschaften in [SCOPE.sState('railway_state').GetName] scheitern."
 mfe_industry_events.3.f:0 "\"Natürlich hat die Presse damit großen Spaß – jeden Tag gibt es Artikel von Mitgliedern der IG \"[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]\", die unsere Verzweiflung bejubeln – es sollte etwas getan werden.\""
 mfe_industry_events.3.a:0 "Subventionieren Sie die Schienen!"
 mfe_industry_events.3.b:0 "Die IG \"[SCOPE.gsInterestGroup('ig_industrialists').GetName]\" war diejenigen, die einen freien Markt wollten ..."
 subsidize_rail_state_tt:0 "Beginnen Sie mit der Subventionierung der Eisenbahnen in [SCOPE.sState('railway_state').GetName]"