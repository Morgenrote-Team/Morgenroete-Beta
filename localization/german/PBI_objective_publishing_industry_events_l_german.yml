l_german:
 pbi_objective_publishing_industry_events.200.t: "Ein gelungener Zeitungsroman"
 pbi_objective_publishing_industry_events.200.d: "[SCOPE.sCharacter('target_character').GetFullName]s Roman wurde in einer [SCOPE.sState('target_state').GetName]-Zeitung veröffentlicht und nach einer sehr beliebten Auflage endete die Serie."
 pbi_objective_publishing_industry_events.200.f: "Während der Veröffentlichungsphase verdreifachten sich die Zeitungsverkäufe schließlich. Der Verlag veröffentlichte ein Buch mit einer Zusammenfassung der Veröffentlichung und übersetzte das Buch sogar für den internationalen Markt, und der Verkauf dieser Bücher stieg stetig an."
 pbi_objective_publishing_industry_events.200.a: "Gute Arbeit!"
 pbi_objective_publishing_industry_events.200.good: "Der Fortschritt beim Schreiben des Romans wird #positive_value erhöht#!"
 pbi_objective_publishing_industry_events.200.bad: "Der Fortschritt beim Schreiben des Romans wird #negative_value reduziert#!"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value Erhöht die Wahrscheinlichkeit zukünftiger neuartiger Fortschrittsrückschläge#!"
 pbi_objective_publishing_industry_events.201.t: "Abbruch der Veröffentlichung"
 pbi_objective_publishing_industry_events.201.d: "Der Roman, der in einer [SCOPE.sState('target_state').GetName]-Zeitung veröffentlicht wurde, endete unvollendet, da der Autor nicht mehr weiterschreiben konnte."
 pbi_objective_publishing_industry_events.201.f: "Viele Leser werden die Fortsetzung der Fortsetzungsromane, auf die sie so sehnsüchtig gewartet haben, nicht mehr lesen können."
 pbi_objective_publishing_industry_events.201.a: "Schade"
 pbi_objective_publishing_industry_events.202.t: "Großer Schriftsteller der Zukunft"
 pbi_objective_publishing_industry_events.202.d: "Ein [SCOPE.sState('target_state').GetName] Zeitungsunternehmen möchte eine neue Zeitung herausgeben.\nSie suchen einen neuen Romanautor für diese ambitionierte Zeitung."
 pbi_objective_publishing_industry_events.202.f: "Heutzutage ist es nicht mehr das politische Statement, der witzige Leitartikel des Chefredakteurs oder der aufsehenerregende dreiseitige Artikel, der über den Umsatz einer Zeitung entscheidet, sondern das Interesse an der Fortsetzungsliteratur."
 pbi_objective_publishing_industry_events.202.a: "[SCOPE.sCharacter('target_character_1').GetFullName] ist der große Schriftsteller der Zukunft!"
 pbi_objective_publishing_industry_events.202.a.tt: "Beginnen Sie mit dem Schreiben einer Romanreihe"
 pbi_objective_publishing_industry_events.202.b: "Ich spüre eine überströmende Intelligenz von [SCOPE.sCharacter('target_character_2').GetFullName]!"
 pbi_objective_publishing_industry_events.202.c: "[SCOPE.sCharacter('target_character_3').GetFullName]s Schreiben hat eine unwiderstehliche Anziehungskraft!"
 pbi_objective_publishing_industry_events.202.e: "Es muss noch andere Rohedelsteine ​​geben, die glänzen!"
 pbi_objective_publishing_industry_events.202.e.tt: "Wir werden nach weiteren Kandidaten suchen"
 pbi_objective_publishing_industry_events.203.t: "Weiterschreiben nicht möglich"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName] hat Schwierigkeiten, mit dem Roman [SCOPE.sCharacter('target_character').GetHerHis] voranzukommen. Wenn dies so weitergeht, wird die Veröffentlichung wahrscheinlich gestoppt."
 pbi_objective_publishing_industry_events.203.f: "Ein verantwortlicher Redakteur besuchte [SCOPE.sCharacter('target_character').GetLastName] am frühen Morgen zu Hause, um den Fortschritt des Manuskripts zu überprüfen, aber [SCOPE.sCharacter('target_character').GetSheHe] war nicht da. Der Diener sagte, der Herr sei seit drei Tagen nicht zu Hause gewesen und wisse nicht, wo [SCOPE.sCharacter('target_character').GetSheHe] sei."
 pbi_objective_publishing_industry_events.203.a: "Binde [SCOPE.sCharacter('target_character').GetHerHim] an einen Stuhl, aber schreib weiter [SCOPE.sCharacter('target_character').GetHerHim]!"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetFullName] braucht einen Tapetenwechsel"
 pbi_objective_publishing_industry_events.204.t: "Wem gehört das Manuskript?"
 pbi_objective_publishing_industry_events.204.d: "Der Autor verweigert dem Verlag die Überprüfung des Inhalts eines Romans, den [SCOPE.sCharacter('target_character').GetFullName] als Fortsetzung veröffentlicht."
 pbi_objective_publishing_industry_events.204.f: "Der Verlag befürchtet, dass die Darstellung bestimmter Charaktere im Roman als Verspottung bestimmter Politiker aufgefasst werden könnte."
 pbi_objective_publishing_industry_events.204.a: "Verlage haben Rezensionsrechte"
 pbi_objective_publishing_industry_events.204.b: "Der Wille des Autors ist zu respektieren"
 pbi_objective_publishing_industry_events.205.t: "Unmoralischer Inhalt"
 pbi_objective_publishing_industry_events.205.d: "Die IG \"[SCOPE.gsInterestGroup('target_ig').GetName]\" fordert wegen ihres unmoralischen Inhalts Verbesserungen an den Fortsetzungsromanen von [SCOPE.sCharacter('target_character').GetFullName]."
 pbi_objective_publishing_industry_events.205.f: "\"Der Inhalt von [SCOPE.sCharacter('target_character').GetLastName]s umstrittenem Roman, der in Zeitungen veröffentlicht wurde, ist inakzeptabel.\""
 pbi_objective_publishing_industry_events.205.a: "Große Werke sind für alte Werte inakzeptabel"
 pbi_objective_publishing_industry_events.205.b: "Wir müssen den Inhalt überprüfen"
 pbi_objective_publishing_industry_events.206.t: "Verdacht auf Plagiat"
 pbi_objective_publishing_industry_events.206.d: "Mehrere Romanautoren haben behauptet, dass ihre Arbeit in [SCOPE.sCharacter('target_character').GetFullName]s Fortsetzungsroman plagiiert wurde."
 pbi_objective_publishing_industry_events.206.f: "\"Die angebliche Kreativität Ihres ach so geschätzten Schriftstellers ist reiner Betrug.' Diese Szene, die er angeblich erfunden hat, basiert auf dem Kapitel eines meiner Bücher. Wie kann man das leugnen? Die Szene mit der badenden Frau ist völlig einzigartig. Ich beanspruche mein Urheberrecht!\""
 pbi_objective_publishing_industry_events.206.a: "Das ist eine falsche Anschuldigung"
 pbi_objective_publishing_industry_events.207.t: "Ein Roman wie eine Prophezeiung"
 pbi_objective_publishing_industry_events.207.d: "Der Inhalt der Fortsetzungsromane von [SCOPE.sCharacter('target_character').GetFullName] hat durch seine auffällige Ähnlichkeit mit einem kürzlichen bizarren Mord in [SCOPE.sState('target_state').GetName] Aufmerksamkeit erregt."
 pbi_objective_publishing_industry_events.207.f: "\"Es besteht kein Zweifel, dass das Armutsproblem, mit dem unsere Gesellschaft derzeit konfrontiert ist, der Grund für das Auftreten solcher Vorfälle ist.' Und es ist überraschend, dass der Roman von [SCOPE.sCharacter('target_character').GetLastName], der derzeit als Fortsetzung erscheint, genau die gleiche Beschreibung enthält, als würde er das Eintreten einer solchen Situation vorhersagen.\""
 pbi_objective_publishing_industry_events.207.a: "Es ist ein Stück, das die Zeit einfängt"
 pbi_objective_publishing_industry_events.208.t: "Positive Buchrezensionen von Prominenten"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.sCharacter('target_character_1').GetFullName], ein einflussreiches Mitglied der IG \"[SCOPE.gsInterestGroup('target_ig_1').GetName]\", hat eine positive Rezension des Romans von [SCOPE.sCharacter('target_character').GetFullName] veröffentlicht."
 pbi_objective_publishing_industry_events.208.f: "\"Alle Zeitungen veröffentlichen Romane, aber der Roman von [SCOPE.sCharacter('target_character').GetFullName] ist der interessanteste von allen. Ehrlich gesagt bin ich erstaunt, dass [SCOPE.sCharacter('target_character').GetSheHe] solch ein literarisches Talent hat.\""
 pbi_objective_publishing_industry_events.208.a: "[SCOPE.sCharacter('target_character_1').GetLastName] hat Augen um zu Sehen"
 pbi_objective_publishing_industry_events.208.b: "Ich brauche [SCOPE.sCharacter('target_character_1').GetHerHis]e Gefälligkeiten nicht"
 pbi_objective_publishing_industry_events.209.t: "Kritische Buchrezensionen von Prominenten"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.sCharacter('target_character_1').GetFullName], ein prominentes Mitglied der IG \"[SCOPE.gsInterestGroup('target_ig_1').GetName]\", hat eine kritische Rezension eines Romans herausgegeben, den [SCOPE.sCharacter('target_character').GetFullName] als Fortsetzung veröffentlicht."
 pbi_objective_publishing_industry_events.209.f: "\"Die Hässlichkeit der Fortsetzungsromane von [SCOPE.sCharacter('target_character').GetLastName] ist im Vergleich zu den Fortsetzungsromanen der letzten Jahre herausragend. Insbesondere der in dieser Woche veröffentlichte Roman war unauffällig. Es ist nicht mehr möglich, diese kaputte Geschichte zu reparieren. Ich habe sogar Mitleid mit [SCOPE.sCharacter('target_character').GetLastName], der weiterhin Romane schreiben muss, obwohl [SCOPE.sCharacter('target_character').GetSheHe] zum Gespött der Welt geworden ist.\""
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName] offenbart seine eigene Unwissenheit"
 pbi_objective_publishing_industry_events.210.t: "Romanserien erregen Aufmerksamkeit"
 pbi_objective_publishing_industry_events.210.d: "[SCOPE.sCharacter('target_character').GetFullName]s Romane, die in [SCOPE.sState('target_state').GetName]-Zeitungen veröffentlicht werden, gewinnen mit jeder Folge immer mehr Aufmerksamkeit."
 pbi_objective_publishing_industry_events.210.f: "Die Geschichte der Nöte und Anstrengungen des Protagonisten, basierend auf seinem eigenen Leben, hat die Herzen vieler Leser erobert."
 pbi_objective_publishing_industry_events.210.a: "Ich kann es kaum erwarten, den Rest zu sehen!"
 pbi_objective_publishing_industry_events.211.t: "Begeisterte Fans"
 pbi_objective_publishing_industry_events.211.d.rich: "Die Zeitungsromane von [SCOPE.sCharacter('target_character').GetFullName] sind bei der [concept_upper_strata] von [SCOPE.sState('target_state').GetName] beliebt."
 pbi_objective_publishing_industry_events.211.d.middle: "Die Zeitungsromane von [SCOPE.sCharacter('target_character').GetFullName] sind bei der [concept_middle_strata] von [SCOPE.sState('target_state').GetName] beliebt."
 pbi_objective_publishing_industry_events.211.d.poor: "Die Zeitungsromane von [SCOPE.sCharacter('target_character').GetFullName] sind bei der [concept_lower_strata] von [SCOPE.sState('target_state').GetName] beliebt."
 pbi_objective_publishing_industry_events.211.f: "Während man in [SCOPE.sState('target_state').GetName] Romane aus einer Vielzahl von Zeitungen genießen kann, erfreuten sich die Werke von [SCOPE.sCharacter('target_character').GetFullName] in den letzten Jahren großer Beliebtheit."
 pbi_objective_publishing_industry_events.211.a: "Haben Sie Signierveranstaltungen geplant?"
 pbi_objective_publishing_industry_events.212.t: "Aussetzung der Serialisierung"
 pbi_objective_publishing_industry_events.212.d: "Das Gericht ordnete an, dass die Zeitungsromane von [SCOPE.sCharacter('target_character').GetFullName] nicht mehr veröffentlicht werden, mit der Begründung, dass die darin enthaltenen Charaktere bestimmte Politiker verleumden."
 pbi_objective_publishing_industry_events.212.f: "Jeder, der den Roman gelesen hat, weiß, dass die Charaktere in [SCOPE.sCharacter('target_character').GetFullName]s Roman bestimmten Politikern nachempfunden sind."
 pbi_objective_publishing_industry_events.212.a: "Ach du lieber Gott"
 pbi_objective_publishing_industry_events.300.t: "Journalisten auf dem Schlachtfeld"
 pbi_objective_publishing_industry_events.300.d: "Artikel, die von Reportern, die im [SCOPE.sWar('target_war').GetName]-Krieg gedient haben, von der [SCOPE.sFront('target_front').GetName] verschickt wurden, stießen auf großes Interesse."
 pbi_objective_publishing_industry_events.300.f: "\"General [SCOPE.sCharacter('target_character').GetFullName] befahl wiederholte Angriffe und schaffte es schließlich, den Feind zum Rückzug zu zwingen, aber auch unsere Streitkräfte erlitten enormen Schaden. Das Ergebnis dieses Kampfes, der einen halben Tag dauerte, war nur ein Vorsprung von 100 Metern auf unsere Stellung.\""
 pbi_objective_publishing_industry_events.300.a: "Lasst uns Freiwillige rekrutieren"
 pbi_objective_publishing_industry_events.300.b: "Lasst uns Spenden sammeln"
 pbi_objective_publishing_industry_events.400.t: "Den diplomatischen Kampf gewinnen"
 pbi_objective_publishing_industry_events.400.d: "Über unsere veröffentlichten Gespräche mit [SCOPE.sCountry('target_country').GetName] wurde in der [SCOPE.sCountry('target_country').GetName]-Presse massenhaft berichtet. Während dies [Concept('concept_radical', '$concept_radicals$')] [SCOPE.sCountry('target_country').GetAltName('IN')] in Schwung brachte, löste es in den beteiligten Ländern auch eine Verurteilung von [SCOPE.sCountry('target_country').GetName] aus."
 pbi_objective_publishing_industry_events.400.f: "\"Als Reaktion auf die #bold unverschämte Bitte#! des Diplomaten aus [SCOPE.sCountry('target_country').GetAltName('DAT')], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] #bold weigerte sich#!, sich mit dem Diplomaten zu treffen und teilte ihm durch #bold einen Unteroffizier#! mit, dass er #bold nichts weiter zu sagen habe#!.\""
 pbi_objective_publishing_industry_events.400.a: "Sogar Narren und Zeitungen können in den Händen einer klugen Person nützlich sein"
 pbi_objective_publishing_industry_events.402.t: "Informationskrieg"
 pbi_objective_publishing_industry_events.402.d: "Zeitungen haben mittlerweile mehr Macht als die Rede eines Politikers. Wenn wir diese Kraft effektiv nutzen, sollten wir in der Lage sein, unseren Feinden Schaden zuzufügen."
 pbi_objective_publishing_industry_events.402.f: "\"Sie liefern die Bilder und ich liefere den Krieg.\"\nWilliam Randolph Hearst"
 pbi_objective_publishing_industry_events.402.a: "[SCOPE.sCountry('target_country_1').GetAltName('NOM')] ist unser Feind"
 pbi_objective_publishing_industry_events.402.b: "Wir können [SCOPE.sCountry('target_country_2').GetAltName('AKK')] nicht weiter wachsen lassen"
 pbi_objective_publishing_industry_events.402.c: "Wir müssen uns um das Problem mit [SCOPE.sCountry('target_country_3').GetAltName('DAT')] kümmern"
 pbi_objective_publishing_industry_events.402.e: "Wir sollten es sorgfältig abwägen"
 pbi_objective_publishing_industry_events.402.tt: "Wir werden die Entscheidung über das Zielland um einen Monat verschieben"
 pbi_objective_publishing_industry_events.403.t: "Pulvermagazin"
 pbi_objective_publishing_industry_events.403.d: "Zeitungen aus [SCOPE.sCountry('target_country').GetAltName('DAT')] haben sich darüber beschwert, dass unsere Ansprüche in der [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName]-Region ungerechtfertigt seien."
 pbi_objective_publishing_industry_events.403.f: "Für [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName], eine [concept_strategic_region] sowohl für uns als auch für [SCOPE.sCountry('target_country').GetAltName('AKK')], berufen sich die Zeitungen aus [SCOPE.sCountry('target_country').GetAltName('DAT')] ständig auf die Legitimität ihrer Rechte. Probleme in diesem Bereich werden die öffentliche Stimmung [SCOPE.sCountry('target_country').GetAltName('IN')] stark anregen."
 pbi_objective_publishing_industry_events.403.a: "Es gibt keine Möglichkeit, dies nicht auszunutzen"
 pbi_objective_publishing_industry_events.404.t: "Unverschämte Bitte"
 pbi_objective_publishing_industry_events.404.d: "Die [SCOPE.sCountry('target_country').GetAdjective]e Regierung bittet uns über ihre Diplomaten um Zugeständnisse und strebt ein geheimes Treffen mit [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] an."
 pbi_objective_publishing_industry_events.404.f: "Die öffentliche Meinung [SCOPE.sCountry('target_country').GetAltName('IN')] beginnt darauf zu bestehen, dass ein Krieg eröffnet werden sollte, wenn ihre Überlegenheit in der [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName]-Region nicht anerkannt wird. Es ist fast sicher, dass die jüngste Forderung der [SCOPE.sCountry('target_country').GetAdjective]en Regierung ihren Wunsch widerspiegelt, einen Krieg zu vermeiden, indem sie die öffentliche Meinung im Land unterdrückt, die zunehmend vom Lager der Befürworter eines offenen Krieges dominiert wird."
 pbi_objective_publishing_industry_events.404.a: "Sie wollen den Vorhang zurückziehen.\nUnd zwar so, wie es für sie am besten ist!"
 pbi_objective_publishing_industry_events.405.t: "Telegramm des Schicksals"
 pbi_objective_publishing_industry_events.405.d: "Ein Telegramm wurde an [SCOPE.sCharacter('target_character').GetFullName] zugestellt, in dem [SCOPE.sCharacter('target_character').GetSheHe] über den Inhalt eines geheimen Treffens mit [SCOPE.sCountry('target_country'). GetAdjective]en Diplomaten in [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]s Villa in [SCOPE.sState('target_state_2').GetName] informiert wurde. Der [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] sagt, dass [ROOT.GetCountry.GetRuler.GetSheHe] es der Regierung überlassen würde, zu entscheiden, ob der Inhalt veröffentlicht werden soll."
 pbi_objective_publishing_industry_events.405.f: "\"Die [SCOPE.sCountry('target_country'). GetAdjective]en Diplomaten forderten nicht nur energisch ein Treffen mit [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], sie verlangten auch, unser [concept_interest] in der [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName]-Region zurückzuziehen und als Beweis ihres Engagements abzudanken. Der [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] antwortete, indem er die Diplomaten darüber informierte, dass [ROOT.GetCountry.GetRuler.GetSheHe] eine solche Verpflichtung nicht eingehen könne und sollte und dass [ROOT.GetCountry.GetRuler.GetSheHe] bei dem Treffen nichts weiter zu sagen habe und dass die Verhandlungen nicht abgeschlossen seien.\""
 pbi_objective_publishing_industry_events.405.a: "Machen Sie es öffentlich. Aber ein wenig aufregend"
 pbi_objective_publishing_industry_events.405.a.tt: "Die Dinge entwickeln sich zu einem [concept_diplomatic_incident]"
 pbi_objective_publishing_industry_events.405.b: "Darf nicht veröffentlicht werden"
 pbi_objective_publishing_industry_events.405.b.tt: "Die Situation wird einvernehmlich gelöst"
 pbi_objective_publishing_industry_events.500.t: "Lass Licht an"
 pbi_objective_publishing_industry_events.500.d: "Da Zeitungen beginnen, Fotos statt Illustrationen zu veröffentlichen, wird die rohe Realität unserer Gesellschaft ans Licht gebracht."
 pbi_objective_publishing_industry_events.500.f: "Das Foto zeigt eine Favela mit mangelnder Sicherheit und schlechten sanitären Einrichtungen. Viele Arbeiter sind gezwungen, gefährliche Arbeiten für niedrige Löhne zu verrichten. Kinder werden zur Arbeit gezwungen, weil sie nicht zur Schule gehen dürfen."
 pbi_objective_publishing_industry_events.500.a: "Wir müssen uns auf die Ausweitung der Wohlfahrt konzentrieren."
 pbi_objective_publishing_industry_events.500.b: "[SCOPE.sCharacter('target_character_1').GetLastName] scheint seine Meinung über [GetLawGroup('lawgroup_childrens_rights').GetName] geändert zu haben"
 pbi_objective_publishing_industry_events.500.c: "[SCOPE.sCharacter('target_character_2').GetLastName] scheint seine Meinung über [GetLawGroup('lawgroup_welfare').GetName] geändert zu haben"
 pbi_objective_publishing_industry_events.500.e: "[SCOPE.sCharacter('target_character_3').GetLastName] scheint seine Meinung über [GetLawGroup('lawgroup_citizenship').GetName] geändert zu haben"
 gaudi_transatlantic_cable_expedition_modifier: "Transatlantikkabel-Expedition"
 gaudi_transatlantic_cable_expedition_failed_modifier: "Gescheiterte Transatlantikkabel-Expedition"