l_german:
 matsuura.101.t: "Ein junger Mann möchte nach Ezo reisen"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] ist ein junger Mann, der nach Ezo im Norden reisen möchte. Die Matsumae-Domäne hat jedoch Reisebeschränkungen. Sollte es dem jungen Mann erlaubt sein, zu den Inseln im Norden zu reisen?"
 matsuura.101.f: "\"Ich möchte überall hinreisen! Ezo, Morokoshi, Tenjiku! Bitte lass mich die Wunder der Welt sehen!\""
 matsuura.101.g: "Er könnte dort die Landschaft studieren!"
 matsuura.101.h: "Ich habe gehört, dass er ein Dichter ist, vielleicht wird er von seinen Reisen inspiriert?"
 matsuura.101.i: "Vielleicht könnte er Gemälde von der Region anfertigen?"
 matsuura.101.j: "Niemand darf gehen."
 matsuura_allowed_travels_modifier: "Erlaubte Reisen nach Ezo"
 matsuura.102.t: "Westliche Chemie"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] hat jahrelang Rangaku, westliche Studien, studiert. Jetzt ist er dabei, ein Buch über etwas namens \"Chemie\" zu schreiben. Vielleicht wäre es eine gute Idee, ihn zu unterstützen."
 matsuura.102.f: "\"Siehst du, ein Mann aus einem fernen Land hat Experimente durchgeführt...\"\n \"Du willst wissen, was Experimente sind? Wenn du eine Theorie hast...\"\n \"Oh, du weißt auch nicht, was eine Theorie ist...\""
 matsuura.102.g: "Was ist diese \"Chemie\", von der er spricht?"
 matsuura.102.h: "Barbarische Ideen!"
 matsuura_barbarian_ideas_modifier: "Barbarische Ideen"
 matsuura_nintendo_modifier: "Nintendo Hanafuda Karten"
 matsuura.103.t: "Nintendo"
 matsuura.103.d: "In Kyoto gründete Fusajirō Yamauchi eine Spielkartenfabrik, die sich ganz der Herstellung der beliebten Hanafuda-Karten widmete. Sie stieg schnell zum Marktführer in ganz Japan auf. Der Name des Unternehmens ist Nintendo."
 matsuura.103.f: "\"Lehnen Sie sich zurück und entspannen Sie sich, mein Freund\nDie heutige Lektion wird nicht allzu lange dauern\nUnd um sie interessanter zu machen\nSie hat die Form dieses nerdigen Liedes\nDas Jahr ist 1889, vor den Auszeichnungen und Preisen\nNintendo begann mit der Herstellung von Hanafuda-Karten\nDas Unternehmen wuchs und plante ein Jahrhundert lang, was sich verkaufen lässt\nSie stellten Staubsauger und Ultra Hand und Love Tester und Love Hotels her\n Aber schon bald konzentrierten sie sich auf Spiele wie Game & Watch und Color TV\n81 stellten sie Donkey Kong her und der Rest ist Geschichte!\n\nDies ist die Geschichte von Nintendo\nÜber die Jahre hinweg, von Hanafuda bis Mario\nDirekt aus Kyoto, mit einem Typen namens Miyamoto\nDies ist die Geschichte von Nintendo\"\n\n-Matthew Taranto"
 matsuura.103.g: "Gibt es Spiele, die beliebter sein könnten als Hanafuda-Karten?"