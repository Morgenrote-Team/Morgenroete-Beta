 je_panum_measles: "Masernepidemie" #NT!
 je_panum_measles_reason: "Masern sind eine hoch ansteckende Krankheit, die für ihre typischen roten Hautflecken bekannt ist. Sie kann katastrophale Folgen haben, insbesondere bei Bevölkerungsgruppen ohne vorherige Immunität. Als überregionale Krankheit können sich Masern auf andere Gebiete ausbreiten.\n\nDie Erfindung von #ORANGE Antibiotika#! ist im Kampf gegen Masern von besonderer Bedeutung. Mit dieser Technologie kann eine [concept_panum_physician] Behandlung von Masern#! gefunden werden. Nur ein sehr gutes Gesundheitssystem kann helfen. Dies alles führt zu einer besseren Vorbeugung und Heilung der Krankheit.\n\nLeider liegt die Erfindung eines #V Impfstoffs gegen Masern#! außerhalb des viktorianischen Zeitrahmens." #NT!
 je_panum_scarlet: "Scharlach-Epidemie" #NT!
 je_panum_scarlet_reason: "Scharlach ist eine weit verbreitete Krankheit, die bis Anfang des 20. Jahrhunderts eine der häufigsten Todesursachen bei Kindern war.\n\nDie Erfindung von #ORANGE Antitoxinen#! ist im Kampf gegen Scharlach von besonderer Bedeutung. Mit dieser Technologie kann [concept_panum_physician] eine #V Behandlung für Scharlach#! gefunden werden. Ein gutes Gesundheitssystem wird dabei helfen. Dies alles führt zu einer besseren Vorbeugung und Heilung der Krankheit.\n\nDie Entwicklung eines #V Impfstoffs gegen Scharlach#! durch [concept_theiler_biologist] ist möglich, aber sehr schwierig." #NT!
 je_panum_plague: "Pestepidemie" #NT!
 je_panum_plague_reason: "Die Beulenpest wird mit dem „Schwarzen Tod“ des Mittelalters gleichgesetzt, der zu den schlimmsten Katastrophen der Geschichte zählt. Man dachte, sie sei verschwunden, bis sie Ende des 19. Jahrhunderts wieder auftauchte. In Ländern mit geringem Wohlstand und schwachen Gesundheitssystemen kann sich die Pest über mehrere Gebiete ausbreiten.\n\nDie Erfindung von #ORANGE Antitoxinen#! ist im Kampf gegen die Pest von besonderer Bedeutung. Mit dieser Technologie kann ein [concept_panum_physician] eine #V Behandlung für die Pest#! finden. Schon ein rudimentäres Gesundheitssystem wird helfen. Dies alles führt zu einer besseren Vorbeugung und Heilung der Krankheit.\n\nUm die Pest ein für alle Mal zu besiegen, ist ein #V Impfstoff gegen die Pest#! erforderlich, der von einem [concept_theiler_biologist] entwickelt wird." #NT!
 je_panum_diphteria: "Diphterie-Epidemie" #NT!
 je_panum_diphteria_reason: "Diphtherie ist eine gefährliche Krankheit, die zu lebensbedrohlichen Komplikationen und langfristigen Folgen führen kann. Aufgrund der damit verbundenen Kindersterblichkeit und Atemwegsproblemen wird Diphtherie auch „Würgeengel der Kinder“ genannt. Die Auswirkungen bleiben lokal begrenzt.\n\nDie Erfindung von #ORANGE Antitoxinen#! ist von besonderer Bedeutung im Kampf gegen Diphterie. Mit dieser Technologie kann eine [concept_panum_physician] eine #V Behandlung für Diphterie#! finden. Nur ein gutes Gesundheitssystem kann helfen. Dies alles führt zu einer besseren Prävention und Heilung der Krankheit.\n\nUm Diphterie ein für alle Mal zu besiegen, ist ein #V Impfstoff gegen Diphterie#! erforderlich, der von einer [concept_theiler_biologist] entwickelt wird." #NT!
 je_panum_polio: "Polio" #NT!
 je_panum_polio_reason: "Poliomyelitis ist eine Krankheit, die vor allem Kinder befällt und oft zum Tod oder zu lebenslangen körperlichen Komplikationen führt. Während Polio früher nur sporadisch auftrat, wurde sie im 19. Jahrhundert endemisch. Polio verbreitet sich nicht über den Staat hinaus, in dem sie auftritt.\n\nDie Erfindung von #ORANGE Antitoxinen#! ist im Kampf gegen Polio von besonderer Bedeutung. Mit dieser Technologie kann eine [concept_panum_physician] Behandlung für Polio#! gefunden werden. Nur ein gutes Gesundheitssystem kann helfen. All dies führt zu einer besseren Vorbeugung und Heilung der Krankheit.\n\nLeider liegt die Erfindung eines #V Impfstoffs gegen Polio#! außerhalb des viktorianischen Zeitrahmens." #NT!
  
