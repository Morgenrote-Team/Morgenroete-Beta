 je_panum_cholera_description_expedition_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] leitet eine medizinische Expedition in [SCOPE.sCountry('target').GetName] um wertvolle Erkenntnisse über #YELLOW Cholera zu gewinnen.#!. Solange die Krankheit im Land wütet, hat [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] monatlich die Chance neue Erkenntnisse zu gewinnen um ein umfassendes wissenschaftliches Gutachten über die Krankheit zu verfassen.\n\nSollte die Krankheit abklingen, gehen die wissenschaftlichen Erkenntnisse nicht verloren, sondern werden auch bei der nächsten Untersuchung präsent sein." #NT!
