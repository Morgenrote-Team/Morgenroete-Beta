 je_panum_military_medicine_project: "Militärmedizin" #NT!
 je_panum_military_medicine_project_reason: "Militärärzte und Rotkreuzmediziner haben die einmalige Chance, die medizinische Versorgung auf dem Schlachtfeld zu verbessern und dadurch viele Leben zu retten – und möglicherweise einen Krieg zu entscheiden. Je nach Charaktereigenschaften und Erfahrung erfolgt diese Verbesserung unterschiedlich schnell. Nach [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Militärmedizinreform wird eine [concept_mobilization_option] oder eine höhere Stufe freigeschaltet." #NT!
 panum_military_medicine_progress_bar_at_full_tt: "Die Militärmedizin-Leiste hat #variable 100%#! erreicht" #NT!
  
 panum.2500.t: "Erweiterte medizinische Unterstützung" #NT!
 panum.2500.d: "Unser [concept_panum_physician] Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] arbeitet seit Jahren daran, die medizinische Versorgung im Krieg zu verbessern. Die neuen Methoden und Mittel können nun auf dem Schlachtfeld eingesetzt werden!" #NT!
 panum.2500.f: "\n'Achte auf die genaue Anwendung dieser Spritze. Und halte immer genügend Serum bereit. Und Verbandszeug. Am besten ein Erste-Hilfe-Set. Weißt du überhaupt, was Sterilisation bedeutet?'" #NT!
 panum.2500.g: "Die Soldaten werden dem Arzt eines Tages ein Denkmal errichten." #NT!
 panum_advanced_medical_support_mobilization_option_tt: "Sie erhalten Zugriff auf ein neues [concept_mobilization_option] oder eine neue Stufe davon." #NT!
  
