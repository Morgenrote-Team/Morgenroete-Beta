 je_panum_medical_techniques_project: "Medizinische Techniken vorstellen" #NT!
 je_panum_medical_techniques_project_reason: "Das Ziel von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ist es, die neueste Medizintechnik in [GetPlayer.GetName] zu verbreiten. Wie schnell dieser Prozess abläuft, hängt von [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Charaktereigenschaften und Erfahrung ab. Nach Abschluss der medizinischen Reform erhält unsere Nation einen besseren Modifikator, der den alten ersetzt. In einigen Fällen kann ein [concept_panum_physician] seine eigenen Erfindungen entwickeln, die die Geschichte der Medizin revolutionieren." #NT!
 panum_medical_techniques_advance_tt: "Die medizinischen Techniken in [GetPlayer.GetName] verbessern sich um eine Stufe" #NT!
  
 panum.2401.t: "Impfung" #NT!
 panum.2401.d: "Die Einführung eines allgemeinen Impfprogramms stieß in der Bevölkerung zunächst auf Skepsis, doch nachdem Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mehrere Provinzen des Landes besuchte und das Verfahren demonstrierte, haben sich die meisten Patienten daran gewöhnt." #NT!
 panum.2401.f: "Zumindest anfangs hatte es einigen Widerstand gegen die Idee einer Impfkampagne gegeben. Besorgte Mütter mit ihren verängstigten Kindern, runzlige alte Herren, die diesem neuen Wunder skeptisch gegenüberstanden, und sehr Fromme, die befürchteten, die Wissenschaft würde an etwas herumbasteln, das sie nicht verstehen konnten. Aufklärung klärte diesen Widerstand – Erklärungen, wie und warum die Impfung funktionierte – aber die Ergebnisse waren noch viel mehr als das. Kinder, die ihr Augenlicht und ihre Gesundheit behielten und nicht die schrecklichen Folgen einer der tödlichsten Krankheiten erlitten, die die Menschheit je erlebt hatte. Nur wenige mussten überzeugt werden, als sie sahen, dass sie frei von Narben und voller Leben waren." #NT!
 panum.2401.g: "Dies ist eine medizinische Revolution!" #NT!
 panum.2401.h: "Unsere medizinischen und hygienischen Standards steigen." #NT!
 panum.2402.t: "Anästhesie" #NT!
 panum.2402.d: "Mittlerweile hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in mehreren Kliniken die neue Narkosemethode vorgeführt. Sie gilt heute als Standardmethode bei besonders unangenehmen Operationen." #NT!
 panum.2402.f: "'Zzz.'" #NT!
 panum.2402.g: "Medizinische Operationen ohne Bewusstsein? Ist das erlaubt?" #NT!
 panum.2403.t: "Spritzen und Pinzetten" #NT!
 panum.2403.d: "Die neuen medizinischen Geräte, die Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eingeführt hat, sind zwar gewöhnungsbedürftig, gehören aber mittlerweile in jeder Arztpraxis zum Standard." #NT!
 panum.2403.f: "'Was ist das für ein Werkzeug, Herr Doktor?'\n'Kein Werkzeug, sondern eine Spritze. Damit kann man Flüssigkeit injizieren.'\n'Und das ist für die Zahnchirurgie, nehme ich an?'\n'Nein, eine Zange.'\n'Gut, gut. Und das ist ein neues Skalpell?'\n'Mein Besteck fürs Mittagessen.'" #NT!
 panum.2403.g: "Die Professionalisierung auf diesem Gebiet ist einfach erstaunlich." #NT!
 panum.2404.t: "Sterilisation" #NT!
 panum.2404.d: "Nachdem Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Wichtigkeit der Sterilisation erfolgreich bewiesen hat, hat er es für alle Ärzte in [GetPlayer.GetName] zur Standardpraxis gemacht, ihre Hände zu waschen und ihre Instrumente zu reinigen!" #NT!
 panum.2404.f: "'Natürlich gibt es immer noch Leute, die glauben, dass diese Praktiken unnötig sind, und viele von ihnen sind gelehrte Herren, die schon viele Leben gerettet haben. Diesen ehrwürdigen Männern sage ich: Hören Sie sich die Beweise an. Die Entdeckung der Keimtheorie hat bewiesen, dass Krankheiten von mikroskopisch kleinen Lebewesen ausgehen, die lange vor der Infektion zerstört werden können, wodurch Leben gerettet werden, die sonst verloren gegangen wären. Nirgendwo ist dies so deutlich wie in der Entbindungsstation des größten Krankenhauses von [ROOT.GetCountry.GetCapital.GetCityHubName], wo die Sterberate junger Mütter einen Monat später von 18,3 % auf nur 2,2 % gesenkt wurde.'\n'Die Ergebnisse sprechen eindeutig für sich, meine Herren.'" #NT!
 panum.2404.g: "Wer hätte gedacht, dass es so wichtig ist, sich nach dem Berühren kranker Menschen die Hände zu waschen?" #NT!
 panum.2404.h: "Ah, ein Arzt hat also einen weiteren Grund für eine Flasche Schnaps!" #NT!
 panum.2404.i: "Hmmm. Das scheint eine bequeme Ausrede zu sein ..." #NT!
 panum.2405.t: "Krankenakten" #NT!
 panum.2405.d: "Doctor[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat den Patientenaufenthalt, sei es in der Arztpraxis oder im Krankenhaus, durch eine bessere Registrierung und das Anlegen von Krankenakten weitgehend modernisiert." #NT!
 panum.2405.f: "Eine Krankenakte beschreibt die systematische Dokumentation der Krankengeschichte und Behandlung eines einzelnen Patienten im Laufe der Zeit im Zuständigkeitsbereich eines bestimmten Gesundheitsdienstleisters. Die Krankengeschichte ist eine Längsschnittaufzeichnung dessen, was dem Patienten seit seiner Geburt widerfahren ist. Sie zeichnet Krankheiten, schwere und leichte Erkrankungen sowie Wachstumsereignisse auf. Sie gibt dem Arzt ein Gefühl dafür, was dem Patienten zuvor widerfahren ist. Daher kann sie oft Hinweise auf den aktuellen Krankheitszustand geben. Die Krankengeschichte umfasst mehrere Untergruppen wie Operationsgeschichte, Medikamente und medizinische Allergien, Gewohnheiten oder Impfgeschichte. In der Krankenakte werden einzelne medizinische Begegnungen durch diskrete Zusammenfassungen der Krankengeschichte eines Patienten durch einen Arzt, eine Krankenschwester oder einen Arzthelfer gekennzeichnet und können verschiedene Formen annehmen. Wenn ein Patient ins Krankenhaus eingeliefert wird, werden tägliche Aktualisierungen in die Krankenakte eingetragen, die klinische Veränderungen dokumentieren." #NT!
 panum.2405.g: "Statistik, Mathematik, Bürokratie und Medizin – endlich vereint!" #NT!
 panum.2406.t: "Einführung des Krankenwagens" #NT!
 panum.2406.d: "Vor einigen Tagen spendete ein reicher Unternehmer in [ROOT.GetCountry.GetCapital.GetCityHubName] dem örtlichen Krankenhaus großzügig ein neues Fahrzeug: den ersten selbstfahrenden Krankenwagen in ganz [GetPlayer.GetName]" #NT!
 panum.2406.f: "'... und da sah ich es. Der neue Krankenwagen war strahlend weiß gestrichen und stolz mit einem Kreuz geschmückt. Er brauchte weder die Hilfe von Pferden noch die Kraft von Männern, sondern verfügte über die Kraft seines eigenen Motors. Zum ersten Mal konnten verwundete Männer und Frauen, die dringend Hilfe brauchten, schnell in die Annehmlichkeiten und Obhut des Krankenhauses gebracht werden. Das würde sicherlich das Leben unzähliger Seelen retten, die sonst verloren wären. Es berührte mein Herz, das zu sehen, denn hier wurde das Beste des Menschen, die Liebe, die er für Fremde empfinden könnte, für alle sichtbar zur Schau gestellt.'\n\nAuszug aus einer Lokalzeitung, der [ROOT.GetCountry.GetCapital.GetCityHubName] Gazette, [TimeKeeper.GetCurrentDate.Format('y')]." #NT!
 panum.2406.g: "Großartig! Jetzt fehlt nur noch eine Sirene..." #NT!
 panum.2406.h: "Ausgezeichnet! Unsere Krankenhäuser werden davon großen Nutzen haben!" #NT!
 panum.2407.t: "Der Rettungshubschrauber" #NT!
 panum.2407.d: "Gerade hat die Hauptstadt die Nachricht von etwas Unglaublichem erreicht: Ein Pilot hat soeben eine Frau in den Wehen aus einer ländlichen Gegend in ein Krankenhaus geflogen. Es war der erste Ambulanzflug in der Geschichte von [GetPlayer.GetName]!" #NT!
 panum.2407.f: "'... natürlich war es ziemlich schwer, sich zu konzentrieren. Ein Flugzeug hat nicht viele Sitzplätze, wissen Sie, und man konnte das Wehen fast über dem Lärm des Propellers und des Motors hören. Natürlich sind das nur Kleinigkeiten im Vergleich zur Tat selbst – es gibt keine Seele auf dieser Erde, die die Schreie einer Frau in Not übertönen könnte, also tat ich, als die Wehen auf dem Aussichtspunkt einsetzten, was jede gute Seele tun würde, und übergab sie so schnell wie möglich in die erfahrenen und fähigen Hände eines Krankenhauses. Man sagte mir, es wäre eine gefährliche Steißgeburt gewesen, aber da ich so schnell dort war, konnte der Arzt die Position des Kindes korrigieren, bevor es eine gesunde, natürliche Geburt gab.\nJa, ich glaube, das Kind wurde nach mir benannt.'\n\nInterview aus einer Lokalzeitung, der [ROOT.GetCountry.GetCapital.GetCityHubName] Gazette, [TimeKeeper.GetCurrentDate.Format('y')]." #NT!
 panum.2407.g: "Babys kommen also tatsächlich mit dem Flugzeug!" #NT!
 panum.2407.h: "Ein Seufzer der Erleichterung für alle Mütter!" #NT!
  
