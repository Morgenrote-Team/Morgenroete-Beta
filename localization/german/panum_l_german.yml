 panum.2221.t: "Die Wollsortierer-Krankheit" #NT!
 panum.2221.d: "Bei der Untersuchung der sogenannten 'Woolsorter-Krankheit' stellte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fest, dass es sich tatsächlich um Milzbrand handelte." #NT!
 panum.2221.f: "Milzbrand beim Menschen trat vor allem als Berufskrankheit bei Gerbereiarbeitern und bei Menschen auf, die Pelze, Borsten und Haare verarbeiteten, aber auch bei Hafen- und Transportarbeitern, die mit diesen Materialien umgingen, sowie bei Kürschnern. Der Höhepunkt des Auftretens waren Krisenzeiten in der Lederindustrie, als immer mehr billige Tierhäute aus Regionen importiert wurden, in denen die Schlachtung kaum oder gar nicht veterinärmedizinisch kontrolliert wurde. Der mysteriöse Ursprung der Krankheit war lange Zeit unbekannt. Man glaubte, es handele sich um eine Vergiftung, und die Menschen nannten sie 'Wollsortiererkrankheit'. Mit dem Fortschritt der Mikrobiologie und der Durchsetzung der Keimtheorie wurden die tatsächlichen Zusammenhänge zwischen der wirtschaftlich äußerst schädlichen Tierkrankheit und der für den Menschen tödlichen Krankheit festgestellt und führten zu neuen Vorschriften und Regelungen, die den Schutz der Arbeitnehmer gewährleisten sollten." #NT!
 panum.2221.g: "Treffen Sie strenge Schutzmaßnahmen." #NT!
 panum.2222.t: "Die Kropferkrankung" #NT!
 panum.2222.d: "Nachdem Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mehrere Menschen in abgelegenen Bergtälern mit riesigen Kropferkrankungen untersucht hatte, experimentierte er mit einer Behandlung mit Jod. Nach mehreren Versuchen war die Therapie erfolgreich." #NT!
 panum.2222.f: "In Alpenregionen der Steiermark, Tirols und der Schweiz, aber auch in anderen Bergregionen oder den englischen Midlands waren Kropfe eine alltägliche Krankheit. Schon früh vermutete man, dass die Kropfbildung etwas mit dem Wasser in einem bestimmten Gebiet zu tun hatte. Paracelsus vermutete den Mangel an bestimmten Mineralien und empfahl, bleihaltiges Wasser zu trinken. Im alten China empfahlen Ärzte den Verzehr von Meeresalgen und Schwämmen. Mit einem besseren Verständnis der Funktion der Schilddrüse und der Bedeutung von Jod begannen schließlich die ersten Heilbemühungen. Ab 1918 führte der Schweizer Arzt Otto Bayard in den Gemeinden seines Praxisgebietes Nikolaital Jodsalz durch die richtig dosierte Zugabe von Jodkali zum Speisesalz ein und zeigte, dass sich damit Entwicklungsstörungen, Schilddrüsenvergrößerungen, Kropf- und Knotenbildungen ohne unerwünschte Wirkungen und Schäden erfolgreich behandeln lassen." #NT!
 panum.2222.g: "Es handelt sich also um eine ernährungsbedingte Erkrankung!" #NT!
 panum.2223.t: "Nephrolithiasis" #NT!
 panum.2223.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat ein Verfahren entwickelt, um Patienten mit Nierensteinen erfolgreich zu operieren." #NT!
 panum.2223.f: "Nierensteine ​​sind ein Phänomen, das in der gesamten Menschheitsgeschichte bekannt ist; selbst Napoleon litt darunter. Obwohl seit der Renaissance mehrere Verfahren zur Entfernung von Nierensteinen entwickelt wurden, blieb die Operation gefährlich. Dem amerikanischen Chirurgen Henry Jacob Bigelow gelang ein Durchbruch: Er führte die medizinische Technik der Litholapaxie ein. 1878 veröffentlichte er 'Lithotrity by a Single Operation', in dem er seine Technik zum 'Zerkleinern und Entfernen eines Steins aus der Blase in einer Sitzung' beschrieb. Zuvor zerkleinerten Chirurgen einen Blasenstein und brauchten dann nur wenige Minuten, um die Stücke zu entfernen. Mit dieser neuen Methode sank die Sterblichkeitsrate von etwa 24 % auf 2,4 %." #NT!
 panum.2223.g: "Ich werde schon ganz unruhig, wenn ich nur daran denke." #NT!
 panum.2224.t: "Pellagra" #NT!
 panum.2224.d: "Wie Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nach jahrelanger Forschung herausfand, ist Pellagra eine Krankheit, die durch einen Mangel an Nicotinsäure verursacht wird." #NT!
 panum.2224.f: "Nach der Entdeckung Amerikas durch Christoph Kolumbus wurde Mais als eine der ersten Pflanzen nach Europa gebracht, wo er sich aufgrund seiner hohen Ernteerträge rasch verbreitete. Bald trat in Gegenden mit hohem Maiskonsum eine seltsame Krankheit auf, die nach dem Leitsymptom Pellagra 'raue Haut' genannt wurde. Der Zusammenhang zwischen Pellagra und hohem Maiskonsum (z. B. in Form von Polenta) wurde erstmals im 18. Jahrhundert vermutet. Als Erklärungen wurden damals schimmeliger oder vergifteter Mais, Infektionen oder Vererbung genannt. Joseph Goldberger und Kollegen wiesen dann zu Beginn des 20. Jahrhunderts nach, dass sowohl das sogenannte Pellagra beim Menschen als auch die Schwarzzungenkrankheit beim Hund auf Unterernährung zurückzuführen sind, die Conrad Elvehjem auf einen Mangel an Nicotinsäure zurückführen konnte. Die Entdeckung, dass Pellagra mit Bierhefe behandelt werden kann, führte zu einem schlagartigen Rückgang der Zahl der Psychiatriepatienten in den betroffenen Gebieten." #NT!
 panum.2224.g: "Die bloße Folge einer unausgewogenen Ernährung?" #NT!
 panum.2225.t: "Rachitis" #NT!
 panum.2225.d: "Nach langjähriger Untersuchung von Rachitis-Patienten kommt Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zum Schluss, dass die Knochenkrankheit auf einen Nährstoffmangel zurückzuführen ist – und empfiehlt zur Vorbeugung Lebertran und Sonnenlicht." #NT!
 panum.2225.f: "Obwohl es im Laufe der Zeit viele wissenschaftliche Beschreibungen der Rachitis gab, blieben ihre Ursachen lange Zeit unbekannt. Führende Pathologen schlugen im 19. Jahrhundert eine Reihe von Ursachen für Rachitis vor, darunter angeborene Syphilis und eine väterliche Tuberkuloseinfektion. Ein wirklich modernes Verständnis der pathophysiologischen Grundlagen der Rachitis begann erst im frühen 20. Jahrhundert. 1919 entdeckte und veröffentlichte Edward Mellanby das '4. Vitamin' und stellte fest: 'Rachitis ist eine Mangelkrankheit, die sich infolge des Fehlens eines oder mehrerer zusätzlicher Nahrungsmittelfaktoren entwickelt. Es scheint daher wahrscheinlich, dass die Ursache der Rachitis eine verminderte Aufnahme eines antirachitischen Faktors ist, der entweder fettlöslicher Faktor A ist oder eine ähnliche Verteilung wie dieser aufweist.'" #NT!
 panum.2225.g: "Sprechen wir von Vitamin D?" #NT!
 panum.2226.t: "Syphilis" #NT!
 panum.2226.d: "Syphilis, die uralte Geißel der Menschheit, scheint von der Wissenschaft bald an die Kette gelegt zu werden – Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] behauptet, mit modernsten medizinischen Methoden ein Wundermittel erfunden zu haben." #NT!
 panum.2226.f: "Bis zum Beginn des 20. Jahrhunderts wurde Syphilis vorwiegend mit giftigem Quecksilber behandelt, das großflächig auf den Körper der Patienten aufgetragen wurde, was neben anderen unerwünschten Wirkungen meist einen völligen Verlust der Körperbehaarung und aller Zähne sowie den rapiden Verfall sämtlicher Körperfunktionen einleitete. Quecksilber war bereits mehrere Jahrhunderte zuvor als mehr oder weniger wirksames Therapeutikum gegen Lepra und verschiedene andere Hauterkrankungen eingesetzt worden. Versuche mit Arsenpräparaten wie Atoxyl und Arsacetin sowie dem nur im Tierversuch erfolgreichen Präparat 418 (Arsenophenylglycin), die 1907/1908 von Paul Uhlenhuth und Paul Ehrlich entwickelt und erprobt wurden, schlugen vor allem wegen der schweren Nebenwirkungen fehl. 1909 entwickelten Sahachiro Hata und Paul Ehrlich die organische Arsenverbindung Arsphenamin (Salvarsan), mit der erstmals eine gezielte chemotherapeutische Behandlung der Syphilis versucht wurde." #NT!
 panum.2226.g: "Rettung... was?" #NT!
 panum.2227.t: "Tetanus" #NT!
 panum.2227.d: "Nach mehreren Tests gab Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] heute bekannt, dass er ein Gegengift gegen Tetanus gefunden hat." #NT!
 panum.2227.f: "Tetanus war den alten Zivilisationen wohlbekannt, die den Zusammenhang zwischen Wunden und tödlichen Muskelkrämpfen erkannten. 1884 isolierte Arthur Nicolaier das Strychnin-ähnliche Toxin von Tetanus aus freilebenden, anaeroben Bodenbakterien. Er entdeckte den Tetanus-Erreger im Boden, indem er Versuchstieren Gartenerde inokulierte. Die Ätiologie der Krankheit wurde 1884 von Antonio Carle und Giorgio Rattone, zwei Pathologen der Universität Turin, weiter aufgeklärt, die erstmals die Übertragbarkeit von Tetanus nachwiesen. 1891 wurde C. tetani von Kitasato Shibasaburō aus einem menschlichen Opfer isoliert, der später zeigte, dass der Organismus bei Injektion in Tiere Krankheiten hervorrufen konnte und dass das Toxin durch spezifische Antikörper neutralisiert werden konnte. 1890 gelang es Kitasato und Emil von Behring schließlich, ein spezifisches Tetanus-Antitoxin zu erhalten, das Tieren Immunität gegen Tetanus ermöglichen konnte. Mit dieser Antitoxin-Produktion legte Behring (ebenso wie mit der Entdeckung des Diphtherie-Antitoxins, ebenfalls im Jahr 1890) den Grundstein für die 'Serumtherapie'." #NT!
 panum.2227.g: "Wer hätte gedacht, dass Gartenerde so gefährlich sein kann?" #NT!
  
 country_panum_kidney_stone_treatment_success_chance_mult: "Erfolgschancen bei der Behandlung von Nierensteinen" #NT!
 country_panum_syphilis_treatment_success_chance_mult: "Erfolgschancen bei der Syphilis-Behandlung" #NT!
  
 panum_physician_achievement_anthrax_disease_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] hat #o sich auf Anthrax#! spezialisiert und wirksame Präventions- und Behandlungsmethoden dafür entwickelt." #NT!
 panum_physician_achievement_goitre_disease_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] hat #o sich auf den Kropf#! spezialisiert und hierfür wirksame Präventions- und Behandlungsmethoden entwickelt." #NT!
 panum_physician_achievement_nephrolithiasis_disease_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] hat #o sich auf die Nephrolithiasis#! spezialisiert und hierfür wirksame Präventions- und Behandlungsmethoden entwickelt." #NT!
 panum_physician_achievement_pellagra_disease_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] hat #o sich auf die Krankheit Pellagra#! spezialisiert und hierfür wirksame Präventions- und Behandlungsmethoden entwickelt." #NT!
 panum_physician_achievement_rickets_disease_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] hat #o sich auf die Rachitis#! spezialisiert und hierfür wirksame Präventions- und Behandlungsmethoden entwickelt." #NT!
 panum_physician_achievement_syphilis_disease_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] hat #o sich auf die Syphilis#! spezialisiert und hierfür wirksame Präventions- und Behandlungsmethoden entwickelt." #NT!
 panum_physician_achievement_tetanus_disease_loc: "\nDr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] hat #o sich auf Tetanus#! spezialisiert und hierfür wirksame Präventions- und Behandlungsmethoden entwickelt." #NT!
  
 panum.922.t: "Kruppe" #NT!
 panum.922.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat festgestellt, dass viele Ärzte in der Regel nicht zwischen dem eher harmlosen Krupp und der gefährlichen Diphtherie unterscheiden können, und hat in einem Artikel auf die Unterschiede hingewiesen." #NT!
 panum.922.f: "Als der aus Preußen stammende Arzt Abraham Jacobi 1860 auf einem Ärztekongress feststellte, dass es in New York rund 122 Fälle von Diphtherie gebe, staunten seine Kollegen: Sie hatten im gleichen Zeitraum überhaupt keine Diphtherie diagnostiziert. Die mangelnden Kenntnisse auf dem Gebiet der Kinderkrankheiten waren einer der Gründe für die Gründung der ersten Kinderkrankenhäuser in den USA, in denen die Diphtherie eine besondere Rolle spielte. Jacobi gilt als Vater der amerikanischen Pädiatrie." #NT!
 panum.923.t: "Lederner Kehlkopf" #NT!
 panum.923.d: "Als eines der Hauptmerkmale der Diphtherie hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die lederartige Pseudomembran identifiziert, die sich bis zum Kehlkopf ausdehnt und zum Ersticken führt. Dieses Merkmal ist typisch für die Krankheit und unterscheidet sie von anderen." #NT!
 panum.923.f: "'Wir können die maligne Angina pectoris auf vier Arten identifizieren:\n\nDurch umfangreiche Forschungen zur krankhaften Anatomie der Krankheit, wobei im Verlauf weniger Monate sechzig Autopsien durchgeführt wurden;\n\nDurch klinische Beobachtungen, mit denen wir nachwiesen, dass die Angina pectoris, wenn sie sich selbst überlassen wird, fast immer dazu neigt, den Kehlkopf anzugreifen und so Krupp-Symptome hervorzurufen;\n\nDurch chemische Untersuchungen, mit denen er die identische Zusammensetzung der falschen Membran im Rachenraum mit der in der Luftröhre nachwies;\n\nDurch das Studium der Arbeiten früherer Autoren.'" #NT!
  
 panum.940.t: "Das Gegenmittel gegen Diphtherie" #NT!
 panum.940.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] gab heute öffentlich bekannt, dass die Experimente mit dem hergestellten Diphtherie-Antitoxin [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ein voller Erfolg waren." #NT!
 panum.940.f: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] erklärte der erstaunten Menge, dass [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] Pferde mit einem abgeschwächten Diphtherie-Toxin infiziert und aus deren Blut wiederum ein Serum gewonnen habe, das hochwirksam gegen Diphtherie sei. Obwohl dies ein großer Fortschritt sei, betonte [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] auch, dass dies nicht mit einer Impfung verwechselt werden dürfe, da es das Immunsystem des Patienten nicht aktiviere. 'Hier ist noch viel Arbeit zu leisten', so [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Aber alle Eltern, die nachts um das Leben ihrer nach Luft schnappenden Kinder bangen mussten, können ab sofort deutlich ruhiger schlafen." #NT!
 panum.940.g: "Wir schneiden der Diphtherie die Luft ab, bevor sie uns das Gleiche antut." #NT!
  
 panum.941.t: "Eisenperchlorat" #NT!
 panum.941.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fand in älteren Aufzeichnungen, dass Eisenperchlorat als Heilmittel gegen Diphtherie empfohlen wurde. Tatsächlich scheint es eine Wirkung zu haben." #NT!
 panum.941.f: "'Überraschenderweise hat dieses alchemistische Rezept bei einigen Patienten eine Wirkung gezeigt. Anscheinend ist es eines der wenigen Heilmittel gegen Diphtherie.'\n\nEine kurze Notiz von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zu Diphtherie" #NT!
 panum.941.g: "Aber bringt uns das wirklich weiter?" #NT!
 panum.942.t: "Intubation" #NT!
 panum.942.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] versuchte einem Patienten mittels Intubation Luft zuzuführen. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] konnte einen kleinen Erfolg gegen Diphtherie erzielen." #NT!
 panum.942.f: "'Der Prozess ist kompliziert und kritisch, aber jeder Hinweis zur Bekämpfung von Diphtherie ist mir im Moment nützlich.'\n\nEine kurze Notiz von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zur Diphtherie" #NT!
 panum.942.g: "Aber das kann doch keine langfristige Lösung sein?" #NT!
 panum.943.t: "Tracheotomie" #NT!
 panum.943.d: "Die Erfahrungen von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mit der Tracheotomie sind eher gemischt, obwohl alle [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Ärztekollegen diesen operativen Eingriff zur Behandlung der Diphtherie durchführen." #NT!
 panum.943.f: "'Ich kann beim besten Willen nicht verstehen, warum all diese Diphtherie-Experten – oder zumindest diejenigen, die behaupten, welche zu sein – Erfolge vermelden konnten. Trousseau behauptet, fast der Hälfte seiner Diphtherie-Patienten das Leben gerettet zu haben, aber meiner beruflichen Erfahrung nach ist es weniger als einer von zehn.'\n\nEine kurze Anmerkung von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zu Diphtherie" #NT!
 panum.943.g: "Und nun?" #NT!
 panum.944.t: "Quecksilber" #NT!
 panum.944.d: "Unglücklicherweise endete eine Quecksilberbehandlung gegen Diphtherie genau wie von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] erwartet - mit einer Vergiftung." #NT!
 panum.944.f: "'Hätte ich es besser wissen müssen? Ja! Aber die Fachliteratur lässt keinen Zweifel daran, dass Quecksilber seit Jahrhunderten gegen Diphtherie hilft. Angeblich! Ab jetzt finde ich andere Mittel, die angeblich helfen: Silbernitrat zum Beispiel. Oder Salzsäure! Hat sich jemand wirklich mit dieser Krankheit befasst?'\n\nEine kurze Anmerkung von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zur Diphtherie" #NT!
 panum.944.g: "Das alles klingt noch tödlicher als Diphtherie." #NT!
 panum.945.t: "Blutung" #NT!
 panum.945.d: "Experten empfehlen bei Diphtherie einen guten Aderlass. Arzt [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat das [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] in zwei Fällen ausprobiert – und festgestellt, dass die Methode eher kontraproduktiv ist." #NT!
 panum.945.f: "'Einen geschwächten Patienten noch weiter zu schwächen, wäre, als würde man einen weiteren Pfeiler einer Brücke mit einem wackeligen Pfeiler einreißen. Was jeder Ingenieur versteht, gilt in der Medizin als Ketzerei.'\n\nEine kurze Anmerkung von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zu Diphtherie" #NT!
 panum.945.g: "Ist keine Besserung erkennbar?" #NT!
  
 panum.951.t: "Das Rasseln in der Nacht" #NT!
 panum.951.d: ""
 panum.951.f: "Die Sonne war hinter den Häusern verschwunden. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ging im Schatten. Es war ein weiterer Tag voller Misserfolge gewesen. Drei weitere tote Kinder. Wie immer die gleiche Todesursache. Auch wenn der Höhepunkt der Seuche vorüber war. Es blieb ein Restrisiko, dass der Kindertod durch die Straßen streunen und ihnen seine Sense ins Maul stoßen würde. Ertrinken und Ersticken gehörten zu den grausamsten Todesarten.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hatte sich jahrelang auf Seuchenkrankheiten spezialisiert. Aber Diphtherie war anders. Es war nicht nur eine Kinderkrankheit wie Masern oder Scharlach, die einen milden Verlauf haben konnten. Diphtherie ließ Kinder nach Luft schnappen. Diphtherie erwürgte das Kind in der Nacht wie ein Racheengel.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hatte der Diphtherie den Krieg erklärt. Aber es schien ein aussichtsloser Krieg. Jedem Schritt, den [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] unternahm, folgte die Krankheit – und kehrte [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] wieder um. Alle überlieferten Methoden erwiesen sich als nutzlos. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] rang mit dem Tod. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] rang mit dem Teufel.\n\nUnd sie ließen [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Verzweiflung und Hilflosigkeit spüren. In dieser Nacht, als [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] nach Hause kam. Als ein Keuchen [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] in der Dunkelheit begrüßte. Denn dort wartete ein Patient auf [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim], den [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] nicht auf der Liste hatte. Die Diphtherie hatte sich ausgebreitet. Bis zur [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Straße. Bis zum [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Haus.\n\nBis zum Bett des [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Sohns." #NT!
 panum.951.g: "Haben die Experimente des Arztes...?" #NT!
 panum.952.t: "Behandlung von Diphterie" #NT!
 panum.952.d: ""
 panum.952.f: "Ein verzweifeltes Schlucken. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hatte sich an dieses Geräusch gewöhnt. Normalerweise hörte man es kaum, wenn andere Leute schluckten. Aber es war dieselbe Qual, die [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] schon so oft gehört hatte. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte das Geräusch auswendig gelernt. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] konnte [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Sohn ein kaltes Tuch auf den Kopf legen. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] konnte beruhigend auf ihn einreden.\n\nAber [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] konnte nichts für ihn tun. Nicht mehr, als [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] für die anderen Kinder getan hatte. Für die vielen anderen, Dutzende toter Kinder.\n\nWenn es jemanden gab, der wusste, wie wenig diese Diphtherie-Medikamente wert waren, dann war es [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Quecksilber, das den Körper vergiftete. Silbernitrat und Eisenperchlorat mit unterschiedlicher Wirkung. Tracheotomie, die als höchste chirurgische Kunst galt – und fast immer fehlschlug.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte es so oft gemacht. Und doch war es anders. Es ging nicht mehr um die Krankheit. Es ging jetzt um [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Diese verhasste Epidemie rächte sich an [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. Weil [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sich dagegen wehren wollte. Weil [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sie ausrotten wollte, wie sie es mit kleinen Kindern tat. Sie rächte sich. Sie wollte [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] das Kostbarste nehmen, was er besaß. Nicht [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Ehre als Arzt, nicht [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Hoffnung auf Heilung.\n\nDas Rasseln in der Nacht kehrt zurück. Flüssigkeiten glitzern in kleinen Fläschchen. Ein Skalpell glänzt im Mondlicht." #NT!
 panum.952.g: "Behandeln Sie den Jungen mit Eisenperchlorat." #NT!
 panum.952.h: "Führen Sie eine Tracheotomie durch." #NT!
 panum.952.i: "Untersuchen Sie eine Gewebeprobe unter dem Mikroskop." #NT!
 panum.953.t: "Der Würgeengel" #NT!
 panum.953.d: ""
 panum.953.f: "Kein Rasseln mehr. Das Geräusch, das [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] gequält, das [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] begleitet und [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] das Fürchten gelehrt hatte – verschwunden. Aber es gab keinen Triumph. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hatte das Geräusch verachtet.\n\nAber jetzt wünschte sich [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] das schreckliche Geräusch zurück.\n\nStille. Totenstille, wie [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sie seit Monaten kannte. Es war der Moment, in dem man Stille hören konnte. Eine unheimliche Friedhofsstille, die sich ausbreitete und jede Lebenskraft aussaugte. Stille konnte man hören und fühlen. Sie erfüllte den Körper mit Leere. Das war kein Widerspruch. Es war logisch. Es war empirisch.\n\nAber Logik und Empirismus ließen [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] in dieser Nacht im Stich. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Finger umklammerten eine kalte Kinderhand. Blass wie das Mondlicht, das durch die Fenster schien. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte die Diphtherie herausgefordert.\n\nUnd die Diphtherie stampfte [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in den Boden und quälte [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] mit Vergnügen, weil [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]1s Arroganz [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] geblendet hatte." #NT!
 panum.953.g: "Damit wird der Arzt kaum zurechtkommen." #NT!
 panum.954.t: "Nicht Kehlkopf, sondern Herz und Augen" #NT!
 panum.954.d: ""
 panum.954.f: "Der Mond war untergegangen. Die Sonne war wieder aufgegangen. Die Tage waren im Wechsel von nächtlicher Dunkelheit und heruntergelassenen Jalousien vergangen. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hatte am Krankenbett gewartet. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte bis dahin keine Patienten geheilt. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] hatte sich nicht auf Menschen, sondern auf Krankheiten konzentriert. Es war leicht, Silbernitrat zu verabreichen, wenn man damit experimentierte; es war leicht, ein Serum zu injizieren, wenn es nur ein Versuch war; und es war leicht, eine Operation an der Luftröhre durchzuführen, wenn man keinen Menschen behandelte, sondern nur Haut, nur Muskel, nur Fleisch, nur Knochen.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hatte schon früher Krankheiten behandelt. Diphtherie hatte Menschen zu Patienten gemacht, Krankengeschichten zu Krankenakten und Leiden zu Symptomen. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] wollte Menschen von Atemnot befreien. Doch es war [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], der Heilung brauchte. Nicht im Kehlkopf. Aber in [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Augen und Herz.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] konnte wieder sehen. Und ein zahmes Lächeln strahlte [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] an." #NT!
 panum.954.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hat es geschafft!" #NT!
 panum.955.t: "Das Opfer" #NT!
 panum.955.d: ""
 panum.955.f: "Eine Seele verloren. Eine Welt gewonnen. Mikroben tummelten sich unter dem Mikroskop. Mikroben wie jene, die in vielen anderen Fällen gefunden worden waren. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte es bisher ausgeschlossen. Aber es war die vernünftigste Erklärung. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Sohn hatte keinen Kontakt mit Diphtheriepatienten.\n\nNur [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hatte. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] hatte die Keime in dieses Haus gebracht. Über Tage. Vielleicht über Wochen. Ohne es zu merken. Von den anderen Dutzend kranken Kindern. Von den anderen Dutzend toten Kindern.\n\nDie nun um ein Opfer reicher waren.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hatte eine Probe. Und [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hatte Meerschweinchen und Kaninchen, um die sich kein Kind mehr kümmerte; mit denen kein Kind mehr spielte. Sie würden ein Opfer sein. So wie [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] Opfer gebracht hatte. Wenn sie krank wurden, war das ein Beweis. Es ging darum, Diphtherie auszurotten. Das war ein größeres Ziel als [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself].\n\nUnd größer als jedes andere Ziel." #NT!
 panum.955.g: "Ein Opfer, das nicht ungestraft bleiben wird." #NT!
 panum.956.t: "Radikale Änderung des Theorems" #NT!
 panum.956.d: ""
 panum.956.f: "Die letzten Wochen haben für [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eine bedeutende Zäsur ausgelöst. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] würde es sicher nicht als kopernikanische Wende bezeichnen. Aber selten hat ein Ereignis [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] dazu veranlasst, die Methoden von [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] und [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] so sehr in Frage zu stellen. Die Ohnmacht angesichts der Diphtherie wirkt nachhaltig nach. Und [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] weiß, dass sie wiederkommen wird.\n\nNur eine erfolgreiche, langfristige Lösung kann verhindern, dass sich diese Episode wiederholt.\n\nIn der Arztpraxis stapeln sich deshalb die Gläser. Medizinbücher und Abhandlungen stapeln sich. Und Medikamente. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] greift manisch nach allem, was angeblich über Diphtherie bekannt ist.\n\nJedes angebliche Heilmittel. Jedes angebliche Handbuch. Jedes angebliche Traktat.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] räumt den Tisch ab. Wirft alles, was darauf liegt, in den Müll. Sie haben sich alle geirrt. Bretonneau. Guersant. Trousseau. Bochut. Daviot!\n\nDie Ursache der Diphtherie zu entschlüsseln, bedeutete, Diphtherie endlich zu heilen. Und nach allem, was [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bisher gelesen und versucht hatte, blieb nur eine Möglichkeit offen. Diphtherie war ansteckend. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] eigenen Sohn nach Kontakt mit anderen Patienten angesteckt. Es gab einen Erreger. Egal, was die Experten sagten.\n\nEs musste einen Erreger geben." #NT!
 panum.956.g: "Alle Anstrengungen konzentrieren sich nun auf die Suche nach dem Erreger." #NT!
 panum.956.h: "Der Fokus der Forschung dürfte bereits jetzt auf einem möglichen Impfstoff liegen." #NT!
  
 panum.961.t: "Das Diphterietoxin" #NT!
 panum.961.d: ""
 panum.961.f: "Ein Gift war der Schlüssel. Gift, wie es der Diphtherie-Erreger absondert. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hatte gehört, dass ein Biologe damit experimentierte. Das Toxin war zu stark, um aufzuhalten. Wenn man Tiere damit infizierte, starben sie.\n\nAber [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] wusste, dass diese Information die wissenschaftliche Welt erschüttern würde. Man konnte in den Fachzeitschriften darüber lesen. Und es gab weltweit Nachahmer, die das Diphtherie-Toxin ebenfalls isolierten, in der Hoffnung, bei einem Tier eine immunologische Wirkung hervorzurufen, ohne dass es auf dieselbe Weise starb wie die Millionen Kinder, deren Leichen als Tribut auf dem Altar der Diphtherie lagen.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] würde nachforschen. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] musste das Toxin finden. Und [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] eigene Experimente durchführen." #NT!
 panum.961.g: "Dies ist vielleicht der entscheidende Schritt ..." #NT!
 panum.961.h: "Dieser Vorgang ist bereits von der Herstellung des Tetanustoxins bekannt..." #NT!
 panum.961.i: "Die richtige Menge Jod könnte hierbei Abhilfe schaffen." #NT!
 panum.962.t: "Das Diphterie-Antitoxin" #NT!
 panum.962.d: ""
 panum.962.f: "Ein Durchbruch. Ein entscheidender Durchbruch, der all die Opfer, all das Leid, all die Tode wettmachte, die [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe], auch die trauernden Eltern und Angehörigen, miterleben musste. Die tränenreichen Abschiede. Die Verzweiflung und Hoffnungslosigkeit.\n\nEs war so einfach. Und so effizient. Das Gift musste abgeschwächt werden. Endlich würde eine Jodlösung helfen. Pferde waren die perfekten Testobjekte. Der Rest war einfach. Das Tier entwickelte Immunkräfte gegen das Gift – und war damit Lieferant eines Serums. Eines Gegengifts gegen Diphtherie.\n\nAls [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] an diesem Tag das Fläschchen in der Hand hielt, empfand [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ein Gefühl der Genugtuung. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte die ersten Tests durchgeführt. Nicht alle Kinder reagierten. Aber mehr, als [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] zu träumen gewagt hatte. Nun musste diese Waffe gegen den unsichtbaren Feind in Massenproduktion hergestellt – und verteilt werden. In jeder Klinik. In jeder Arztpraxis.\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]s Krieg gegen Diphtherie war noch nicht vorbei. Es fing gerade erst an." #NT!
 panum.962.g: "Bestellen Sie so viel von diesem Serum wie möglich!" #NT!
 panum.963.t: "Der Schatten" #NT!
 panum.963.d: ""
 panum.963.f: "Diphtherie muss ausgerottet werden! Sie muss verschwinden!\n\nEs mag ein manischer Gedanke gewesen sein. Aber es war ein Gedanke, der Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] am Leben hielt. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]s Krieg gegen Diphtherie trug Früchte. So viele Leben wurden gerettet. So viele Kinder, die in einer anderen Welt Qualen erlitten und gestorben wären!\n\nDas Wohl der Vielen überwog das Wohl des Einzelnen. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hätte sein eigenes Leben gegeben, wenn [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] die Diphtherie hätte vernichten können. Aber das Schicksal meinte es nicht gut mit [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] nicht an den Teufel verkauft - sondern [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Sohn. Das hatte [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] entschieden. Für ihn.\n\nSeit jener Nacht hatte sich ein Schleier über [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] gelegt. Ein Zorn auf die Krankheit. Aber [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hatte ihn ausgelöscht. Mit rationalen Gedanken, die den Groll gegen [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] in Arbeit und Rache ertränkten. Doch vor ein paar Tagen war dieser Zorn verflogen. Paradoxerweise wurde [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] immer klarer, je mehr Kinder er rettete.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] sah [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]. Und [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] verabscheute, was [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sah.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]s Arroganz hatte [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] getäuscht. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] glaubte, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] rette Menschenleben. Und doch hatte sich [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] für eines entschieden. Wie ein Henker. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte nicht einmal das Skalpell berührt. Oder wenigstens ein Gläschen Silbernitrat. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte der Probe und dem Erreger mehr Wert beigemessen – als [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Patient. Ein Mensch.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] aus Fleisch und Blut.\n\nSeitdem war [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] davon angewidert. Und in [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]s einsamer Wohnung hatte [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] nur noch Urkunden, Preise und Fotos mit wichtigen Politikern und Akademikern als Gefährten. Ansonsten nur ein leeres Bett. Und ein Gedanke, der immer stärker wurde. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Kopf pochte. Es wurde zu einem quälenden Kopfschmerz: Ich muss ausgelöscht werden. Ich muss verschwinden.\n\n'Mein Sohn. Mein lieber Sohn...'" #NT!
 panum.963.g: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]... Doktor!" #NT!
  
 panum.640.t: "'Beobachtungen während der Masernepidemie'" #NT!
 panum.640.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat Empfehlungen zur Behandlung von Masern vorgelegt, die dazu beitragen sollen, die Ursachen und die Übertragung der Krankheit besser zu verstehen, um künftige Ausbrüche einzudämmen und zu verhindern." #NT!
 panum.640.f: "'Die Seuche verbreitete sich sehr schnell im dicht besiedelten Thorshavn und wurde von dort mit Booten auf die anderen Inseln getragen. Fahrten zu und von den Handelsplätzen, der Besuch von Kirche und Schule und die Straßenfahrten verbreiteten die Infektion in die anderen Dörfer. Die Seuche wurde von Thorshavn aus durch eine identifizierte Person nach Suderø eingeschleppt, und bei Untersuchungen konnte fast überall nachgewiesen werden, wie und durch wen die Infektion in jedes Dorf gebracht worden war. Ob die Infektion durch Dinge wie Kleidung, Wäsche und Briefe übertragen werden kann, scheint eher fraglich, und ich habe während der Epidemie keine Beispiele für eine solche Übertragung gesehen oder davon gehört.' -Peter Panum, Beobachtungen während der Masernepidemie auf den Färöer-Inseln im Jahr 1846" #NT!
 panum.640.g: "Ein neuer Peter Panum!" #NT!

 ### 2.3.4a ###

 panum.52.m: "Die Scharlach-Epidemie in [SCOPE.sCountry('panum_scarlet_country_scope').GetName]." #NT!
 panum.52.q: "Eigentlich ist das ein schlechter Plan..." #NT!
 panum_no_expedition_effect_tt: "Ihr [concept_panum_physician] ist wieder frei für die Ausübung anderer Tätigkeiten." #NT!

 ### 2.3.5 ###

 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], einer der führenden Köpfe der medizinischen Gesellschaft von [GetPlayer.GetName], hat sich bereit erklärt, in einen von der Epidemie betroffenen Staat zu reisen und dort die Krankheit zu erforschen. Der Arzt hofft, dass dies zu einer vollständigen Beschreibung der Krankheit führen könnte." #NT!
 panum.53.d: "Die grassierende Epidemie hat [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] dazu veranlasst, sie genauer zu untersuchen, um die Ursachen zu ermitteln und neue Methoden zur Behandlung dieser schrecklichen Krankheit zu entwickeln." #NT!
  
