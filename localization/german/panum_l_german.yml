 panum_foreign_medical_expedition_modifier: "Ausländische medizinische Expedition" #NT!
  
 panum.137.t: "Expedition will Krankheit erforschen" #NT!
 panum.137.d: "Eine ausländische Expedition hat die Grenzen unseres Landes erreicht. Sie besteht hauptsächlich aus Ärzten, Wissenschaftlern und ihren Assistenten. Sie wollen offenbar die grassierende Epidemie erforschen." #NT!
 panum.137.f: "Medizinische Expeditionen können in andere Länder reisen, um dort Krankheitsbehandlungen wissenschaftlich zu erforschen und Krankheitsbeschreibungen für deren Heimat zu verfassen. Die Gastländer wiederum profitieren davon, weil Ärzte Patienten in den Seuchengebieten untersuchen." #NT!
 panum.137.g: "Heißen Sie diese tapferen Männer und Frauen willkommen." #NT!
  
 panum.2202.t: "Antike Krankheit" #NT!
 panum.2202.d: "Unser Doktor hat wertvolle Erkenntnisse zur Arbeit unseres Anthropologen beigetragen!" #NT!
 panum.2202.f: "'…aber wenn man diesen Teil ihres Schädels untersucht, kann man natürlich sehen, dass die Wunden bereits zu heilen begonnen hatten.'\n\n'Dann war das definitiv nicht die Todesursache?'\n\n'Höchstwahrscheinlich! Ein heftiger Schlag, aber nicht tödlich. Ich schätze, sie haben noch etwa sechs Monate überlebt, bevor sie eine weitere Verletzung erlitten haben oder die Wunde sich verschlimmert hat.'\n\n'Hmmm. Faszinierend. Nach der Art des Schlags zu urteilen, dachte ich, es wäre wahrscheinlich eine Art … stumpfer Gegenstand gewesen.'\n\n'Etwa eine Keule oder vielleicht ein Werkzeug mit einem stumpfen Stein. Ich denke, diese Rippe ist die wahre Todesursache. Beachten Sie die Verengung der Knochen hier und hier.'\n\n'Verletzung?'\n\n'Etwa Tuberkulose. Ich würde wetten, Ihr Mann ist nach Jahren des Kampfes gegen diesen weißen Tod gestorben.'" #NT!
 panum.2202.g: "Die fächerübergreifende Wissenschaft bleibt die beste Wissenschaft." #NT!
 panum.2203.t: "Seltsame Medizin" #NT!
 panum.2203.d: "In etwas gemeinsamer Freizeit haben unser Arzt und unser Archäologe ihre Forschungsergebnisse geteilt!" #NT!
 panum.2203.f: "'Ah, aber da wird es interessant, Doktor! Diese Gefäße stammen aus Ägypten und enthalten, wie wir glauben, Proben antiker Medizin.'\n\nFaszinierend, faszinierend. Ist das das Mumiaöl?'\n\n'… findet man das nicht auf den Körpern und hat es heilende Eigenschaften? Das Harz um ihre Umhüllungen?'\n\n'Oh nein, ganz und gar nicht! Mumia ist eine Art Öl, das man aus dem Boden gewinnt, ähnlich wie Erdöl. Warum?'\n\n'… Ich denke, wir sollten diese Medikamente genauer untersuchen. Es gibt alle möglichen Tinkturen. Bitte sehen Sie sie sich an, ich bin gleich wieder da. Ich muss … etwas entsorgen.'\n\n'Also, diese hier scheinen parfümiert gewesen zu sein und – essen Sie da etwas?'" #NT!
 panum.2203.g: "...du isst doch nicht die Mumie, oder?" #NT!
 panum.2204.t: "Pflanzliche Heilmittel?" #NT!
 panum.2204.d: "Nachdem unser Naturforscher etwas Zeit hatte, seine Funde zu untersuchen, hat er Pflanzen mit potenziell medizinischen Eigenschaften an die Praxis unseres Arztes geliefert." #NT!
 panum.2204.f: "'Ah, da sind Sie ja! Ich habe einige der Proben katalogisiert, die wir von der letzten botanischen Expedition mitgebracht haben, und habe einige gefunden, die für Sie von Interesse sein könnten.'\n\n'Oh, wirklich? Wieso?'\n\n'Einige davon sind mit Pflanzen verwandt, die bekannte medizinische Eigenschaften haben, wie etwa Entzündungen oder Fieber bekämpfen. Einige davon sind uns völlig fremd, aber die Einheimischen haben gute Worte dafür und sind eine nähere Untersuchung wert.'\n\n'Kräutermedizin ist keine besonders gute Wissenschaft … aber man weiß ja nie. Da könnte etwas Interessantes drin sein. Sie wissen ja, welche Wunder sie in der Mohnpflanze gefunden haben.'\n\n'Ah, Morphium!'\n\n'In der Tat, in der Tat! Ich werde meine Assistenten damit beauftragen, einige pulverisierte Proben für eine genauere Untersuchung vorzubereiten.'" #NT!
 panum.2204.g: "Besonders faszinierend finde ich das Kokablatt, Herr Doktor." #NT!
  
