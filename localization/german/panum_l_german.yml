 panum.2103.t: "Krankenhaus in [SCOPE.sState('panum_clinic_state').GetName]" #NT!
 panum.2103.d: "Unter großem öffentlichen Interesse und Anwesenheit der Presse eröffnete Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] heute in [SCOPE.sState('panum_clinic_state').GetCityHubName] das erste moderne Krankenhaus des Landes, das mit seinen Operationssälen und modernster medizinischer Ausstattung einen Wendepunkt einläutet." #NT!
 panum.2103.f: "„Es ist der Fluch der Menschheit, dass sie durch Gewöhnung lernt, selbst die schrecklichsten Situationen zu ertragen.“ -Rudolf Virchow" #NT!
 panum.2103.g: "Bravo!" #NT!
  
