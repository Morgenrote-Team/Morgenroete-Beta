 je_panum_disease_investigation: "Krankheitsuntersuchung" #NT!
 je_panum_disease_investigation_reason: "Manchmal kommt es vor, dass sich ein Mediziner während seiner üblichen medizinischen Forschung in die Erforschung einer ganz bestimmten Krankheit stürzt. Dabei handelt es sich nicht um eine Seuche, sondern um Alltagskrankheiten, Kinderkrankheiten oder Volkskrankheiten. Beispiele hierfür sind etwa Rachitis, Nierensteine ​​oder Syphilis.\n\nAnders als in anderen Fällen betreibt der Mediziner diese Forschungen nebenher, das heißt er ist nicht beschäftigt und steht für weitere Aktivitäten nicht zur Verfügung. Stirbt ein Arzt, ist das Projekt nicht verloren, sondern wird auf Eis gelegt, bis ein anderer Arzt übernimmt." #NT!
  
