 ### 2.1.3 ###

 panum.101.t: "Dritte Cholera-Pandemie" #NT!
 panum.101.d: "Beunruhigende Nachrichten aus dem Gangesdelta erreichten heute die Hauptstadt. Dort haben die Krankheitsfälle rasant zugenommen. Nach einer kurzen Untersuchung durch die örtlichen Ärzte stellen diese mit Schock fest, dass die Cholera erneut ihr hässliches Haupt erhoben hat." #NT!
 panum.101.g: "Irgendwie kehrte die Cholera zurück." #NT!
 panum.1000.t: "Polio-Epidemie" #NT!
 panum.1000.d: "In einem unserer Staaten ist eine Epidemie ausgebrochen: #YELLOW Polio#! wütet in [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.1000.f: "Schon Bilder aus dem alten Ägypten lassen darauf schließen, dass Poliomyelitis schon lange existiert und endemisch ist. Den Status einer Epidemie erreichte sie jedoch erst gegen Ende des 19. Jahrhunderts, als sie plötzlich in Schweden und den USA ausbrach. Ab 1910 wurden Epidemien in der gesamten entwickelten Welt zu einem regelmäßigen Ereignis, vor allem in Städten während der Sommermonate. Auf ihrem Höhepunkt in den 1940er und 1950er Jahren lähmte oder tötete Polio jedes Jahr über eine halbe Million Menschen weltweit. Die Angst und die kollektive Reaktion auf diese Epidemien führten zu außergewöhnlichen öffentlichen Reaktionen und Mobilisierungen, die die Entwicklung neuer Methoden zur Vorbeugung und Behandlung der Krankheit ankurbelten und die medizinische Philanthropie revolutionierten." #NT!
 panum.1000.g: "Krücken und Rollstühle werden zu Alltagsgegenständen..." #NT!
 je_panum_germ_theory_success: "[GetPlayer.GetName] hat mindestens #V 20 Beweisstücke#! gesammelt, um die Keimtheorie zu untermauern und die Miasmentheorie zu widerlegen." #NT!
  
