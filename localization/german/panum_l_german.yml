 panum.440.t: "Typhus - Ein soziales Problem" #NT!
 panum.440.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] legte in seiner Abhandlung [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] besonderen Wert auf die Tatsache, dass Typhus eine vermeidbare Krankheit ist, wenn politische und soziale Kräfte zusammenwirken." #NT!
 panum.440.f: "'Beengte Verhältnisse, verlauste Kleidung und heruntergekommene Wohnungen oder Soldatenzimmer boten mir ein einprägsames Bild. Fleckfieber war dort allgegenwärtig. Wo immer Menschen in denselben beengten Verhältnissen, aber unter den hygienischen Bedingungen eines Krankenzimmers lebten, konnte keine Ausbreitung beobachtet werden. Medizin darf nicht als Pflege des Einzelnen, sondern als öffentliche Gesundheitsfürsorge betrachtet werden, was auch die Lösung sozialer Probleme einschließt. Es kann kein Zweifel daran bestehen, dass eine solche epidemische Ausbreitung des Fleckfiebers, wie wir sie in letzter Zeit erlebt haben, nur unter Lebensbedingungen wie Armut und mangelnder Bildung möglich war. Wenn diese Umstände wegfallen, bin ich sicher, dass wir erhebliche Verbesserungen im Kampf gegen die Krankheit erleben werden.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in seinem Memorandum an die Regierung" #NT!
 panum.440.g: "Der Typhus verliert seinen Schrecken." #NT!
  
 panum.441.t: "Eine Autopsie" #NT!
 panum.441.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] führte in [SCOPE.sState('panum_disease_state').GetCityHubName] mehrere Autopsien an Typhus-Toten durch und gelangte zu entscheidenden Erkenntnissen." #NT!
 panum.441.f: "'Es ist seit langem bekannt, dass Typhus und Fleckfieber zwei verschiedene Krankheiten sind. Aber es gibt immer noch einige Forscher, die glauben, dass eine schlechte Ernährung, eine Infektion des Darmtrakts oder zumindest ein Nährstoffmangel mit dem Ausbruch von Fleckfieber in Verbindung stehen könnten. Ernährungsbedingte Gründe gelten immer noch als mögliche Ursache vieler Krankheiten. Bei meinen Untersuchungen fand ich nichts, was in irgendeiner Weise auf eine Verdauungsstörung hindeutete. Fleckfieber hat nichts mit Ernährung oder Verdauung zu tun.'\n\nAus einem Autopsiebericht von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.441.g: "Aber was könnte es sein?" #NT!
 panum.442.t: "Ungewaschen und verfilzt" #NT!
 panum.442.d: "Bei seiner Suche nach der Ursache der Typhusepidemie wurde Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] klar, dass bisherige Erkenntnisse in Frage gestellt werden mussten." #NT!
 panum.442.f: "'Ich habe in meiner Laufbahn mehrmals gehört, dass mangelnde Hygiene ein Weg dafür ist, dass Miasmen oder Keime – was auch immer die Leute glauben mögen – sich in der Kleidung festsetzen und zu Krankheiten beitragen. Ich halte das im Detail für fragwürdig, aber nicht in der Grundaussage. Soldaten, Sträflinge, Arme, Kriminelle und Prostituierte gehören zu den klassischen Opfern der Typhusepidemie. Aber sind die Ungewaschenen arm, weil sie ungewaschen sein wollen, oder sind sie nicht eher ungewaschen, weil sie arm sind? Ich will nicht glauben, dass Tuberkulose eine Künstlerkrankheit ist, genauso wenig wie Typhus nur Kriminelle befällt, weil sie moralisch verdorben sind. Es gibt zahlreiche reiche Kriminelle, die bei dieser Epidemie nicht vom Typhus betroffen sind. Es gibt tadellose Priester in den Slums, die sich für andere aufopfern und selbst der Krankheit erliegen. Welche Verbindung zwischen den Opfern ist also überzeugender?'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.442.g: "Will [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] damit behaupten, dass Typhus auch ehrliche Menschen befallen kann?" #NT!
 panum.443.t: "Wärme und Kälte" #NT!
 panum.443.d: "Nach mehreren Hausbesuchen bei an Typhus erkrankten Familien kommt Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zu dem Schluss, dass es sich nicht, wie oft behauptet, um eine saisonale Erkrankung handelt." #NT!
 panum.443.f: "'Es gibt saisonale Erkrankungen und das scheint auch beim Typhus der Fall zu sein. Bisherige Berichte deuten auf eine Zunahme in den kälteren Jahreszeiten hin, wozu auch ein nasser Frühling oder Herbst zählen kann. Dass Kälte und Hitze einen Einfluss auf die Erkrankung haben, halte ich für erwiesen. Ob es von den Jahreszeiten abhängt, ist fraglich. In einem dicht gefüllten, beheizten Raum kann es genauso warm werden. Die Krankheit trat nicht überall zur gleichen Jahreszeit auf. Wäre das der Fall, müssten nicht nur bestimmte Stadtteile, sondern die ganze Stadt gleichermaßen betroffen sein. Sie trat aber immer dort auf, wo Menschen zusammengedrängt waren. Dies konnte ich bei mehreren Hausbesuchen feststellen.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.443.g: "Dies widerspricht früheren Studien." #NT!
 panum.444.t: "Schweiß und Atem" #NT!
 panum.444.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ist mittlerweile der festen Überzeugung, dass es sich beim Fleckfieber um eine ansteckende Krankheit handeln muss, auch wenn noch nicht alle Umstände geklärt sind." #NT!
 panum.444.f: "'Zu Beginn meiner Untersuchung war ich fest davon überzeugt, dass Typhus keine ansteckende Krankheit ist. Als jedoch die Zahl der Typhuspatienten in meiner Familie zunahm, glaubte ich fest an die Ansteckungsgefahr der Krankheit und betonte die ansteckende Wirkung des Schweißes. Ich sah einen Krankenpfleger, der beim Rasieren eines sterbenden Patienten den Atem des Patienten einatmete. Der Krankenpfleger beschrieb den Atem des Patienten als 'übelriechend' und wurde fast sofort krank. Ebenso pflegte ein Assistent einen anderen Patienten, der kurz darauf starb. Er spürte den stechenden Schweiß des Patienten auf seiner Haut und wurde sofort von den Symptomen des Typhus erfasst. Es ist klar, dass die Nähe zu Typhuspatienten das Risiko einer Ansteckung mit der Krankheit erhöht.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.444.g: "Dies kann hilfreich sein, aber ist die Krankheit wirklich von Mensch zu Mensch übertragbar?" #NT!
 panum.445.t: "Ist es Hunger?" #NT!
 panum.445.d: "In einem hitzigen Streit mit einem Kollegen in [SCOPE.sState('panum_disease_state').GetCityHubName] widerlegte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] dessen Theorien." #NT!
 panum.445.f: "'Ist es eine spezielle Art von Fleckfieber, nämlich Hungerfleckfieber?'\n\n'Hungerfleckfieber?'\n\n'Es lässt sich beobachten, dass überall, wo Fleckfieber auftritt, Unterernährung vorherrscht. Demnach ist Hunger, oder besser gesagt Hungersnot, ein Auslöser von Fleckfieber. Auch Blutveränderungen haben vermutlich damit zu tun.'\n\n'1726, 1727 und 1728 waren Hungerjahre, aber es gab kein Fleckfieber. 1829 war ein Wohlstandsjahr, aber es gab Fleckfieber. Es ist verständlich, dass ein geschwächter Körper eher krank wird – aber die Ursache?'" #NT!
 panum.445.g: "Die Bezeichnung Hungerfieber ist daher unzutreffend." #NT!
 panum.446.t: "Nicht der Standort, sondern die Situation" #NT!
 panum.446.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] glaubt, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] habe herausgefunden, dass es nicht so sehr darauf ankommt, wie Menschen mit Typhus leben, sondern wo sie leben." #NT!
 panum.446.f: "'Bei meinem Besuch in [SCOPE.sState('panum_disease_state').GetCityHubName] stellte ich fest, dass die Krankheit nur einen einzigen Teil der Stadt betraf. Die Gegend ist für ihre Armut und moralische Verkommenheit bekannt, was einige Theorien stützt, dass Typhus eine Krankheit moralisch minderwertiger Individuen ist. Aber soweit ich das beurteilen kann, liegt es an der dicht besiedelten Nachbarschaft und der wirtschaftlichen Situation der Betroffenen. Meiner Meinung nach ist die Ausbreitung der Krankheit nicht auf moralische Verkommenheit zurückzuführen, sondern auf körperliche Nähe.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.446.g: "Dies bedeutet zumindest, dass die Krankheit theoretisch überwunden werden kann…" #NT!
 panum.447.t: "Läuse" #NT!
 panum.447.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat eine höchst umstrittene Theorie aufgestellt, die, obwohl [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sie nicht beweisen kann, das Verständnis der Typhus-Erkrankung in der Zukunft verändern könnte." #NT!
 panum.447.f: "'Wenn mir bei meinen vielen Beobachtungen eines aufgefallen ist, dann war es, dass fast alle Patienten in einem von Läusen befallenen Zustand waren. Ob die Soldaten in den überfüllten Kasernen, die Familien mit ihren unzähligen Kindern, die Sträflinge in ihren heruntergekommenen Zellen. Ich glaube nicht mehr, dass dies ein Zufall ist. Natürlich fehlen mir Beweise. In den letzten Jahren konnten mehrere Wissenschaftler immer wieder nachweisen, dass Krankheiten zwischen Tieren und Menschen übertragen werden können. Wenn es in dieser Situation anders ist, würde ich mich freuen, wenn mir das Gegenteil bewiesen wird. Im Moment glaube ich, dass das Typhus-Rätsel nicht gelöst werden kann, ohne die Rolle der Läuse genauer zu untersuchen.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.447.g: "Wie kann etwas so Kleines eine solche Zerstörung anrichten?" #NT!
 panum.447.h: "Etwas so Kleines muss so viel Zerstörung anrichten." #NT!
 panum.448.t: "Ein hygienisches Krankenhaus" #NT!
 panum.448.d: "Bei einem Besuch in einem vorbildlichen Krankenhaus konnte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] davon überzeugen, dass die Übertragung der Krankheit unter günstigen Bedingungen nur minimal ist." #NT!
 panum.448.f: "'Als man begann, Kranke hier und da in Spitäler zu bringen, befürchtete man, dass sich die Lage durch mögliche Ansteckungen noch weiter verschlechtern könnte. Man ging davon aus, dass sich neue Infektionsherde bilden könnten, von denen aus die Epidemie mit noch größerer Gewalt ausbrechen würde. Nichts davon geschah, obwohl man in vielen Fieberschuppen einen solchen Effekt beobachtet hatte. Wie ich in anderen Fällen beobachtet habe, machten die günstigeren hygienischen Bedingungen den Unterschied.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.448.g: "Es liegt also nicht an der Enge als solcher, sondern an den Bedingungen." #NT!
 panum.449.t: "Seuchenhilfe" #NT!
 panum.449.d: "Durch die Lieferung von Nahrungsmitteln, Decken und Medikamenten an [SCOPE.sState('panum_disease_state').GetCityHubName] konnte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] für ein leichtes Abklingen der Epidemie sorgen." #NT!
 panum.449.f: "'Es mag banal klingen, aber mit einer Warenlieferung, die das Elend der Bewohner lindern sollte, kam es in der vergangenen Woche zu Krankheitsausbrüchen. Ähnliches war bereits in anderen Gebieten zu beobachten, in denen früher Typhus wütete. Hilfskräfte verteilten Reis und Erbsen, errichteten improvisierte Zeltkrankenhäuser und brachten auch Medikamente und neue Kleidung. Der Fall beweist vor allem eines: Typhus ist keine Erbkrankheit. Es hängt definitiv von Umweltfaktoren ab.'\n\nEin Brief von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] an Dr. Dementive" #NT!
 panum.449.g: "Manchmal ist die Anwendung von Ausschlusskriterien der einzige Weg zu einer Lösung." #NT!
 panum.450.t: "Kontaminierte Kleidung?" #NT!
 panum.450.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ist in einer Fieberhütte ein merkwürdiger Fall aufgefallen, der ähnlichen Erlebnissen entspricht." #NT!
 panum.450.f: "‚Ist dies ein Beweis für eine angebliche Ansteckung? Zweifellos entspricht dieser Fall ganz ähnlichen Erfahrungen, die ich an anderen Orten gemacht habe. Mal sind es Mäntel, mal Jacken oder Hemden. Ein Typhuskranker hatte einen Bruder, der ihm den Mantel wegnahm. Wenige Tage später war auch er krank. Kinder, die mit dem Mantel spielten, sollen sich auf ähnliche Weise angesteckt haben. In den ärmeren Schichten ist es durchaus üblich, Kleidung von Verwandten weiterzugeben, besonders in den kalten Jahreszeiten. Ob die Kleidung nun verseucht ist oder nicht – das Wechseln der Kleidung scheint eine der sinnvollen Maßnahmen zur Vermeidung von Typhus zu sein.‘\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.450.g: "Männer sollen Socken und Unterwäsche wechseln? Unmöglich!" #NT!
  
 panum.451.t: "Typhus Klima" #NT!
 panum.451.d: "Nachdem ein ausländischer Arzt eine neue Hypothese über die Entstehung des Typhus vorgelegt hatte, zweifelte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] an [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] seinen eigenen Forschungen." #NT!
 panum.451.f: "'Ein 'Kollege' hat mir vor zwei Tagen seinen Band über die Ursachen des Fleckfiebers geschickt. Ich bin ziemlich erstaunt, um nicht zu sagen demotiviert. Er hat sehr präzise und streng formuliert, wie Wetter und Witterungsbedingungen mit der Krankheitsentstehung zusammenhängen. Demnach bildet sich das Miasma, wenn Feuchtigkeit in der Erde vorhanden ist und dann in die Luft aufsteigt. Das würde das häufige Auftreten des Fleckfiebers in kalten und nassen Monaten erklären. Ist es also doch Miasma?'\n\nAus dem Tagebuch von [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.451.g: "Aber ist das wirklich die richtige Lösung?" #NT!
 panum.452.t: "Fäulnis" #NT!
 panum.452.d: "Einige der Erkenntnisse, die Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] kürzlich zusammengefasst hat, passen einfach nicht zu [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]s bisheriger Theorie." #NT!
 panum.452.f: "'Bisher habe ich nicht viel von der Theorie gehalten, dass Fäulnisprozesse eine entscheidende Rolle bei der Verbreitung von Krankheiten spielen. Aber wo immer ich hingehe, wo immer Typhus wütet, finde ich Tiere, finde ich Ausdünstungen, finde ich menschliches, tierisches und pflanzliches Material. Könnte es sich tatsächlich auflösen und Miasma hinterlassen – oder vielleicht Gifte?'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.452.g: "Ein unangenehmer Rückschlag." #NT!
 panum.453.t: "Negative Luftströmungen" #NT!
 panum.453.d: "Eine Veröffentlichung eines anerkannten deutschen Arztes erschüttert die bisherigen Erkenntnisse von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Demnach gilt als erwiesen, dass Luftströmungen für die Entstehung von Typhus verantwortlich sind." #NT!
 panum.453.f: "'Solche warme und feuchte Luft kann durch eine äquatoriale Luftströmung in nördliche Breiten getragen werden, und wir werden dann in relativ warmen Jahreszeiten unter der Dominanz der südlichen und westlichen Winde Typhus ausbrechen sehen. Ein solches Verhältnis muss im Sommer am besten sein, wenn die Sonne in ihrer nördlichen Position steht, die Küsten des Mittelmeeres in die Ausdehnung der Passatwinde einbezogen sind und bei uns der Kampf mit der nördlichen Strömung in einer Regenzeit mit wechselndem Charakter stattfindet. So lassen sich die Typhusepidemien des Sommers und Frühherbstes erklären.'\n\nDr. Angelika Hasenbein, 'Wie Luftströmungen Typhus und Herbstregen Grippe verursachen'" #NT!
 panum.453.g: "Das ist tatsächlich sehr überzeugend." #NT!
 panum.454.t: "Krank" #NT!
 panum.454.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] geht es seit einigen Tagen schlechter. Hat sich [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] angesteckt?" #NT!
 panum.454.f: "'Wo ist Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]? [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] wollte heute den Typhuspatienten im Zimmer fünf besuchen?'\n\n'Es sieht so aus, als ob Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] krank ist.'" #NT!
 panum.454.g: "Der Doktor sollte sich ausruhen." #NT!
 panum.454.h: "Der Doktor sollte weiterarbeiten!" #NT!
 panum.455.t: "Dokumente verloren" #NT!
 panum.455.d: "Der Doktor verprasste einige seiner Banknoten, die bei der Entwicklung eines Medikaments gegen Typhus hilfreich gewesen wären." #NT!
 panum.455.f: "- - - - - - - - - -\n\n- - - - - - - - - -\n\n- - - - - - - - - -\n\nNICHT aus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.455.g: "Wie peinlich." #NT!
  
 panum.461.t: "Klassen und Häuser" #NT!
 panum.461.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat eine Tabelle mit den verschiedenen Typhuskranken in [SCOPE.sState('panum_disease_state').GetCityHubName] erstellt, in der angegeben ist, wo sie leben und welchen Lebensstandard sie haben. Typhus ist daher eine 'soziale' Krankheit." #NT!
 panum.461.f: "'Die statistischen Tabellen zeigen, wie groß der Einfluss von Wohnungen auf die Gesundheit der Bewohner ist. Bei einer Untersuchung des Vororts CITY stellte ich beispielsweise fest, dass die Sterberate in den Straßen zweiter Klasse 18 Prozent und in den Straßen dritter Klasse 68 Prozent höher war als in den Straßen erster Klasse; und dass die Sterberate in Häusern zweiter Klasse 31 Prozent und in Häusern dritter Klasse 78 Prozent höher war als in Häusern erster Klasse. In den verbesserten schlechten Straßen hatte sich die Sterberate um 25 Prozent verbessert.'\n\n'Von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]' 'Tabellen und Statistiken zur Typhusepidemie in [SCOPE.sState('panum_disease_state').GetCityHubName]'" #NT!
 panum.461.g: "Der Arzt ist also auch ein Gesellschaftskritiker?" #NT!
  
 panum_typhus: "Typhus" #NT!
 panum_typhus_desc: "Diese Person leidet an Typhus, einer gefährlichen Krankheit." #NT!
  
 panum.12.t: "Der erste Impfstoff" #NT!
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName] hat eine bahnbrechende Erfindung gemacht. Mit einem neuen Verfahren, der Impfung, gelang es ihm, einen wirksamen Schutz gegen die gefürchteten Pocken zu erfinden." #NT!
 panum.12.f: "Laut Edward Jenners Biographen John Baron soll Jenner den Volksglauben ausgenutzt haben, dass Milchmädchen, die mit Kuhpocken infiziert waren, normalerweise keine Pocken bekamen (‚Milchmädchenmythos‘). John Fewster hatte beobachtet, dass ein Patient, der zuvor (harmlose) Kuhpocken hatte, nicht mit Pocken varioliert werden konnte. Jenner stellte daher die Hypothese auf, dass eine Impfung mit Kuhpocken dieselbe Immunität wie Kuhpocken bieten würde und daher einen Schutz vor Pocken bieten würde. Jenner sammelte zunächst Fall- und Beobachtungsstudien von Menschen, die zuvor Kuh- oder Pferdepocken hatten, sich dann aber im Falle einer späteren Variolation oder bei einem echten Pockenausbruch als immun erwiesen. Am 14. Mai 1796 impfte er den 8-jährigen James Phipps mit Kuhpocken- oder Vacciniaviren, die er aus einer Kuhpockenpustel aus der Hand der an Kuhpocken erkrankten Milchmädchen Sarah Nelmes entnommen hatte. Ungefähr sechs Wochen später, am 1. Juli 1796, infizierte Jenner den Jungen mit Pockeneiter; er erwies sich als immun." #NT!
 panum.12.g: "Ein Held der Medizin!" #NT!
  
 je_panum_vaccine: "Der Impfstoff" #NT!
 je_panum_vaccine_reason: "Unser Land ist gerade dabei, erstmals einen bekannten Impfstoff in unser Land einzuführen und landesweit zu verteilen." #NT!
 je_panum_vaccine_success: "[GetPlayer.GetName] hat mindestens #ORANGE 4 Impfstoffhinweise#!. gesammelt" #NT!
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName] hat mindestens #ORANGE 3 Behandlungshinweise#!. gesammelt" #NT!
  
 panum.351.t: "Der alte Feind" #NT!
 panum.351.d: "Die Pocken, die vielleicht tödlichste Krankheit der Menschheit, sind in unseren Ländern wieder aufgetaucht." #NT!
 panum.351.f: "Pocken sind ein bekannter und gefährlicher Feind. Auf ihrem Weg durch die Länder von [GetPlayer.GetName] könnten sie ein Drittel der Infizierten das Leben kosten und andere für den Rest ihres Lebens blind machen. Fast alle Infizierten werden für immer die Visitenkarte dieses Mörders auf ihrer Haut tragen – die ikonischen Narben auf Gesicht und Körper, das unsterbliche, zeitlose Symbol einer Krankheit, die fast so alt ist wie die Zivilisation selbst. Sie hat jeden Winkel der Erde heimgesucht, vom alten Nahen Osten bis zur Neuen Welt, eine Armee, deren Marsch Imperien verwüstet, Millionen getötet und die größten Führer aller Zeiten gedemütigt hat. Wohin der Mensch auch ging, die Pocken sind ihm gefolgt, ein Jäger, der seine Beute für immer verfolgt.\n\nJetzt hat sie in unseren Ländern neue Opfer gefunden, genug, um aus ihrer endemischen Form auszubrechen und erneut zu einer Epidemie zu werden." #NT!
 panum.351.g: "Und so kämpfen wir erneut gegen die Pocken ..." #NT!
 panum.352.t: "Gerüchte über Pockenbehandlung" #NT!
 panum.352.d: "Aufgrund von Gerüchten über eine Pockenbehandlung haben unsere Leute begonnen, seltsame Praktiken mit den Pusteln selbst auszuprobieren!" #NT!
 panum.352.f: "Der Anblick eines gelehrten Herrn, der die Krusten von Pockeninfizierten isst, mag ein gleichermaßen abstoßender und grauenhafter Anblick sein, aber es ist die verzweifelte Heilung, nach der ein verzweifelter Mann greift. Es gibt Gerüchte über eine Behandlung dieser schrecklichen Krankheit irgendwo anders auf der Welt, und angeblich funktioniert sie auf ähnliche Weise ... aber wie? Welche Zauberei, welche Wissenschaft kann sie von dieser schrecklichen Seuche befreien? Aus den fernen Ländern Europas kommen Nachrichten, dass die Geißel der Pocken zurückgedrängt wurde und ganze Städte ohne auch nur einen einzigen Fall auskommen können.\n\nFür manche ist dies ein Grund zur Hoffnung. Wenn es dort besiegt werden kann, dann können wir es hier vielleicht besiegen.\n\nFür manche ist dies eine Lüge. Unsere größten Köpfe haben es bisher nicht geschafft, eine Behandlung zu finden, aber vielleicht, vielleicht ..." #NT!
 panum.352.g: "...hätten sie Erfolg haben können, was uns nicht gelungen ist?" #NT!
 panum.353.t: "Die Geißel der Pocken" #NT!
 panum.353.d: "Unbehandelt und unheilbar verwüstet die Pockenkrankheit unsere Gesellschaft ... und insbesondere unsere junge Generation." #NT!
 panum.353.f: "Schluchzen. Wehklagen. Die verzweifelten Schreie der Verzweifelten, die kaum eine Sekunde vom letzten keuchenden Atemzug entfernt sind, bevor sie in Trauer verfallen, aus der sie keine Hand mehr ziehen kann. Väter schlagen mit den Fäusten gegen die Wände, bis ihre Handflächen rot vom Blut sind und ihre Knöchel gebrochen und flach liegen. Mütter werfen mit Riesenkraft Pfleger von sich für eine letzte Berührung, für eine letzte Liebkosung einer kalten, blassen Wange. Solche Anblicke sind in [GetPlayer.GetName] alltäglich, denn die Pocken haben es auf die Verletzlichsten von uns allen abgesehen: unsere Kinder, geborene und ungeborene. Mehr als achtzig Prozent der mit Pocken infizierten Säuglinge werden sterben, diese Krankheit bahnt sich ihren Weg in die Zukunft unserer Länder.\n\nUnd ohne Behandlung bleibt uns nichts anderes übrig, als um die Leben zu weinen, die es hätte geben sollen." #NT!
 panum.353.g: "Dieser Albtraum muss ein Ende haben …" #NT!
 panum.354.t: "Der Pockenimpfstoff" #NT!
 panum.354.d: "Unsere Diplomaten bringen mehr als nur Neuigkeiten mit – sie bringen Proben eines 'Impfstoffs' gegen Pocken mit!" #NT!
 panum.354.f_generic: "Bei einem Besuch im fernen Europa entdeckten unsere Würdenträger etwas Faszinierendes: Sie haben eine scheinbar *wirksame* Behandlung gegen Pocken. Tatsächlich haben sie etwas über die Geschichte dieser Krankheit erfahren! Anscheinend wurde im Osmanischen Reich die Praxis der Variolation beobachtet, also die Verwendung von Proben getrockneter Pockenkrusten von genesenden Kranken, um Kindern eine 'schwächere' Form dieser Krankheit zu verabreichen... doch dies war eine fehlerhafte Lösung, gefährlich, denn es war ein Tanz mit dem Teufel - kam man ihm zu nahe, schnappten ihn die Pocken genauso leicht weg, wie man sie überwand.\n\nDoch heute haben die Europäer ein Mittel entwickelt, um Kuhpocken, eine fast harmlose Krankheit, als Schutz vor ihrem tödlichen älteren Bruder zu verwenden. Dies bietet einen sicheren, wirtschaftlichen und praktisch garantierten Schutz gegen die Pockenplage.\n\nUnsere skeptischen Ärzte haben dieses Heilmittel zunächst zu glaubwürdig getestet... und es *funktioniert*. Zum ersten Mal in unserer Geschichte können wir die Pocken bekämpfen." #NT!
 panum.354.g_generic: "Wir...wir müssen das sofort importieren!" #NT!
 panum.354.f_fareast: "Während eines Besuchs im fernen Europa entdeckten unsere Würdenträger etwas Faszinierendes: Sie haben eine scheinbar *wirksame* Behandlung gegen Pocken. Tatsächlich haben sie etwas über die Geschichte dieser Krankheit gelernt! Obwohl unsere Ärzte mit der Praxis der Variolation bestens vertraut sind, bei der getrocknete Krusten von Genesenden verwendet werden, um Nichtinfizierte zu schützen, scheinen sie einen noch besseren Schutz entdeckt zu haben. Unter Verwendung von Proben von relativ harmlosen Kuhpocken haben die Europäer einen 'Impfstoff' entwickelt, mit dem Kinder oder sogar frisch Infizierte geimpft werden können ... ein Impfstoff, der ihre Überlebenschancen enorm erhöhen kann.\n\nUnsere gebildetsten Ärzte könnten das kaum glauben. Nur diejenigen, die nach europäischer Art ausgebildet sind und den Titel 'Doktor' tragen, können für sein Potenzial als sicherer, wirtschaftlicher und wirksamer Schutz gegen Pocken bürgen. Darüber hinaus haben sie bereits begonnen, es an unseren Leuten zu testen, und festgestellt, dass diese Behauptungen nicht nur Behauptungen sind, oh nein, sondern Fakten.\n\nDamit haben wir eine Waffe im Kampf gegen Pocken." #NT!
 panum.354.g_fareast: "Es scheint, unsere neuen ... Ärzte ... haben sich bewährt. Importieren Sie dies sofort." #NT!
 panum.354.f_latino: "Bei einem Besuch im Mutterland in Europa entdeckten unsere Würdenträger etwas Faszinierendes: Sie haben eine scheinbar *wirksame* Behandlung gegen Pocken. Obwohl wir seit langem mit der Praxis der Variolation vertraut sind, bei der unsere Ärzte Proben von Genesenden verwenden, um sie denen zu geben, die dringend Schutz benötigen, haben sie inzwischen eine weitaus ausgefeiltere Behandlung entwickelt. Anstatt Pockenschorf zu verwenden und eine Infektion mit dieser tödlichen Krankheit zu riskieren, verwenden sie Materialien, die von Kuhpocken stammen, einer weit verbreiteten und normalerweise harmlosen Krankheit. Dieses neue Serum ist sowohl billig, weit verbreitet als auch, was am wichtigsten ist, wirksam.\n\nDa unsere Ärzte nun Zugriff auf die neuesten medizinischen Fachzeitschriften haben, können sie diese Entdeckung nur feiern. Pocken sind in Amerika kein Fremdwort, denn sie haben die Ureinwohner dieser Länder dezimiert ... aber jetzt haben wir eine mächtige Waffe, um diese Geißel der Vergangenheit anzugehören." #NT!
 panum.354.g_latino: "Senden Sie Ihrem Vaterland Ihren Dank und die Bitte, eine Sendung zur sofortigen Verwendung zu importieren." #NT!
 panum.355.t: "Impfung beginnt" #NT!
 panum.355.d: "Da es in Indien mittlerweile einen wirksamen Impfstoff gegen Pocken gibt, hat die Regierung eine Impfkampagne eingeleitet." #NT!
 panum.355.f: "Es gab zumindest anfangs einigen Widerstand gegen die Idee einer Impfkampagne. Besorgte Mütter mit ihren verängstigten Kindern, runzlige alte Herren, die diesem neuen Wunder skeptisch gegenüberstanden, die ganz Frommen, die befürchteten, die Wissenschaft würde an etwas herumbasteln, das sie nicht verstehen konnten. Aufklärung klärte diesen Widerstand – Erklärungen, wie und warum es funktionierte – aber die Ergebnisse waren noch viel mehr als das. Kinder, die ihr Augenlicht und ihre Gesundheit behielten und nicht die schrecklichen Folgen einer der tödlichsten Krankheiten ertragen mussten, die die Menschheit je erlebt hatte. Nur wenige mussten überzeugt werden, als sie sahen, dass sie frei von Narben und voller Leben waren.\n\nNach und nach, einer nach dem anderen, wurden die Schlangen länger. In Schulen, Arztpraxen und am Arbeitsplatz nahm die Impfkampagne Fahrt auf … und mit ihr begann die Pockenepidemie zurückzugehen." #NT!
 panum.355.g: "Autsch. Ich hasse Nadeln, aber wenn es mir Sicherheit gibt ..." #NT!
 panum.356.t: "Eine Krankheit auf dem Rückzug" #NT!
 panum.356.d: "Nach zahllosen Jahrhunderten des Todes und des Elends hat die Verbreitung der Pockenimpfung in jüngster Zeit diesen alten Feind völlig auf die Flucht getrieben." #NT!
 panum.356.f: "Es hat unzählige unermüdliche Anstrengungen von Händen und Köpfen erfordert, aber in unserem geliebten [GetPlayer.GetName] ist die Pockenplage eine Bedrohung, die langsam aber sicher der Vergangenheit angehört. Als Ergebnis einer umfangreichen Kampagne zur Impfung der Jugend des Landes und aller, die bereit sind, sich die Nadel zu geben, schwindet die Fähigkeit der Pocken, sich ihren Weg durch unsere Familien und Gemeinden zu bahnen, und es besteht die Hoffnung, dass die Kinder von heute nicht die Narben ihrer Großeltern tragen werden. Mit jedem Nadelstich wird die Klinge der Pocken immer stumpfer und die Natur dieser Seuche gehört noch mehr der Vergangenheit an.\n\nEs ist eine bedeutsame Errungenschaft, ein glorreicher Tag in unserer Geschichte: Obwohl die Schlacht noch nicht gewonnen ist, ist der Sieg in Sicht. Die Pocken werden hier sterben, und wenn nicht durch unsere Hand, dann durch die unserer Erben." #NT!
 panum.356.g: "Eines Tages, eines Tages werden wir dieses abscheuliche Biest endgültig erlegen." #NT!
  
 panum_smallpox_vaccination_character_modifier: "Geimpft" #NT!
  
 panum.340.t: "Variolation" #NT!
 panum.340.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat eine Behandlungsmethode gegen Pocken gefunden – die allerdings nicht ganz harmlos ist." #NT!
 panum.340.f: "Unter Variolation (auch Inokulation) versteht man die Übertragung des Pustelinhalts von Pocken von Mensch zu Mensch durch Inokulation. Es handelt sich dabei um eine Technik zur Impfung gegen Viruserkrankungen, die vor allem in China und dem Nahen Osten bis ins 18. Jahrhundert bei Menschen angewandt wurde. Hierbei wurden Viruskollektive aus den Wunden von Pockenkranken verwendet, die die Krankheit überstanden hatten. Üblicherweise wurde bei Erkrankten mittels einer Lanzette Material aus einer Pustel entnommen, welches anschließend subkutan, also durch kleine Wunden, in den Arm oder das Bein von Gesunden eingeführt wurde. Gesunden Menschen wurden also abgeschwächte Viren verabreicht. Durch die Vermehrung der Viren sollte die Immunreaktion ausgelöst werden. Allerdings konnten die Viren bei der Vermehrung durch Rückmutation wieder krankheitserregend werden, was zu einer relativ hohen Sterblichkeit (2-3%) unter den so Behandelten führte." #NT!
 panum.340.g: "Ein...Fortschritt." #NT!
  
