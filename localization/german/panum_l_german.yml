 panum_ecg_modifier: "Elektrokardiographie" #NT!
 panum_transplantation_modifier: "Transplantationen" #NT!
 panum_stereotactic_method_modifier: "Stereotaktische Methode" #NT!
 panum_cardiopulmonary_bypass_modifier: "Herz-Lungen-Bypass" #NT!
 panum_chemotherapy_modifier: "Chemotherapie" #NT!
  
 panum.2007.t: "Medizinische Erfindungen" #NT!
 panum.2007.d: "Auf dem Kongress sprach es sich herum, dass es Spezialisten gibt, denen medizinische Innovationen gelungen sind. Sie sind bereit, ihr Wissen zu teilen." #NT!
 panum.2007.f: "Einzigartige Innovationen in der Medizin, wie Transplantationen, die Entwicklung von Röntgenstrahlen oder Chemotherapie, sind für die Menschheit von so großer Bedeutung, dass die Erfinder das Wissen vorbehaltlos teilen. Letztlich geht es um das Wohl aller Menschen." #NT!
 panum.2007.g: "Ein Hoch auf die Menschlichkeit!" #NT!
  
 panum.2205.t: "Tierversuche" #NT!
 panum.2205.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] gilt als eiskalter Wissenschaftler mit einem gewissen Hang zur Grausamkeit. Die Zahl der Tiere, die [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] 'zum Nutzen der Wissenschaft' tötet, soll dreistellig sein. Dennoch haben diese Experimente ihre Erfolge." #NT!
 panum.2205.f: "Obwohl es Tierversuche für die Medizin schon seit der Antike gibt, fanden sie erst im 19. Jahrhundert in einem bis dahin unbekannten Ausmaß statt. Insbesondere im Zuge der Entdeckung der Keimtheorie – und danach – wurden zahlreiche Experimente durchgeführt, bei denen die Tiere unzählige Male bewusst mit Krankheitserregern infiziert wurden und buchstäblich zu 'Versuchskaninchen' für neue Medikamente wurden. In diese Phase fiel auch die flächendeckende Einführung von Tierversuchen und Vivisektionen an Universitäten für Studenten." #NT!
 panum.2205.g: "Dem Arzt steht es frei, wie er will." #NT!
 panum.2205.h: "Die Schüler sollen lernen, wie man Tiere seziert." #NT!
 panum.2205.i: "Das geht eindeutig zu weit." #NT!
  
 panum.2411.t: "Aspirin" #NT!
 panum.2411.d: "Unser Apotheker Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] hat ein wahres medizinisches Wunder erfunden, das die Pharmazie revolutionieren könnte: Aspirin. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat die schmerzstillende Wirkung bestätigt." #NT!
 panum.2411.f: "Salicylsäure wird seit der Antike medizinisch verwendet. Medikamente aus Weidenholz und anderen salicylatreichen Pflanzen erscheinen auf Tontafeln aus dem alten Sumer und im Papyrus Ebers aus dem alten Ägypten. Hippokrates bezog sich 400 v. Chr. auf die Verwendung von Salicyltee zur Fiebersenkung. Salicylatreiche Pflanzen waren in der klassischen Antike und im Mittelalter Teil der Pharmakopöe der westlichen Medizin. Weidenrindenextrakt wurde Mitte des 18. Jahrhunderts für seine spezifischen Wirkungen auf Fieber, Schmerzen und Entzündungen bekannt. Im 19. Jahrhundert experimentierten und verschrieben Apotheker eine Vielzahl von Chemikalien, die mit Salicin, dem aktiven Bestandteil des Weidenextrakts, in Verbindung standen. 1853 behandelte der Chemiker Charles Frédéric Gerhardt zum ersten Mal Acetylchlorid mit Natriumsalicylat, um Acetylsalicylsäure herzustellen. Im Jahr 1897 begannen Wissenschaftler der Arzneimittel- und Farbenfabriken von Bayer, Acetylsalicylsäure als weniger magenreizenden Ersatz für herkömmliche Salicylat-Medikamente zu untersuchen und entwickelten einen neuen synthetischen Weg ohne Verunreinigungen. Ab 1899 nannte Bayer dieses Präparat Aspirin und verkaufte es weltweit." #NT!
 panum.2411.g: "Das Medikament wird der Ausgangspunkt für weitere medizinische Forschung sein." #NT!
 panum.2411.h: "Die Chemie wird sicherlich noch weitere spektakuläre Entdeckungen ermöglichen." #NT!
 panum.2411.i: "Die Pharmaindustrie wird hiervon profitieren." #NT!
 panum.2412.t: "Röntgenaufnahmen" #NT!
 panum.2412.d: "Unser Physiker Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] hat eine spektakuläre Entdeckung gemacht: [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] hat bisher unbekannte Strahlen entdeckt, mit denen sich der Körper beleuchten lässt. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat die Möglichkeiten für die Medizin aufgezeigt." #NT!
 panum.2412.f: "Röntgenstrahlen sind elektromagnetische Wellen mit Quantenenergien über etwa 100 eV, was Wellenlängen unter etwa 10 nm entspricht. Röntgenstrahlen liegen im elektromagnetischen Spektrum im Energiebereich oberhalb des ultravioletten Lichts. Röntgenstrahlen wurden 1895 vom deutschen Wissenschaftler Wilhelm Conrad Röntgen entdeckt, der sie als Bezeichnung für eine unbekannte Strahlungsart 'X-Strahlung' bezeichnete. Röntgenstrahlen können viele feste Substanzen wie Baumaterialien und lebendes Gewebe durchdringen, daher wird die Röntgenradiographie häufig in der medizinischen Diagnostik (z. B. zur Überprüfung von Knochenbrüchen) und in der Materialwissenschaft (z. B. zur Identifizierung einiger chemischer Elemente und zum Erkennen von Schwachstellen in Baumaterialien) eingesetzt." #NT!
 panum.2412.g: "Unheimlich – als ob man seinen eigenen Tod sehen würde." #NT!
 panum.2413.t: "Blutgruppen" #NT!
 panum.2413.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] hat eine erstaunliche Entdeckung gemacht, die erklären würde, warum sich menschliches Blut manchmal vermischt und manchmal verklumpt: Offenbar gibt es unterschiedliche Blutgruppen. Dies ist ein entscheidender Durchbruch für Blutspenden und Bluttransfusionen." #NT!
 panum.2413.f: "'Ich habe kürzlich beobachtet und festgestellt, dass das Serum normaler Menschen die roten Blutkörperchen anderer gesunder Personen verklumpen kann … Wie allgemein ausgedrückt kann man sagen, dass in diesen Fällen mindestens zwei verschiedene Arten von Agglutininen existieren, eine Art in A, die andere in B, beide zusammen in C. Die Zellen sind von Natur aus unempfindlich gegenüber den Agglutininen in ihrem eigenen Serum.' - Karl Landsteiner" #NT!
 panum.2413.g: "Die Blutgruppenforschung muss gefördert werden." #NT!
 panum.2413.h: "Die Ambulanz soll Blutgruppen sammeln und für Bluttransfusionen bereitstellen." #NT!
 panum.2414.t: "Elektrokardiographie" #NT!
 panum.2414.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] hat ein erstaunliches Gerät erfunden, das die elektrische Aktivität der Herzmuskelfasern aufzeichnet. Der Arzt nennt das Gerät einen Elektrokardiographen – ein EKG." #NT!
 panum.2414.f: "1843 erkannte Carlo Matteucci durch Experimente an Taubenherzen, dass die Herztätigkeit auf elektrischen Prozessen beruht. 1882 führte der Physiologe Augustus Desiré Waller das erste EKG an seinem Hund Jimmy durch, indem er dessen vier Pfoten in leitfähige Natriumchloridlösung tauchte. 1887 konnte er mit einem Kapillarelektrometer erstmals Herzströme aufzeichnen. Wesentliche Verbesserungen erfuhren die Instrumente 1903 durch Willem Einthoven, der auf Grundlage seines 1895 entwickelten Saitengalvanometers das EKG zu einem brauchbaren Diagnoseverfahren weiterentwickelte und in die Klinik einführte. Die von ihm eingeführte Terminologie wird bis heute verwendet." #NT!
 panum.2414.g: "Dieses Gerät sollte in jedem Krankenhaus vorhanden sein." #NT!
 panum.2415.t: "Erste Transplantation" #NT!
 panum.2415.d: "Das chirurgische Talent von Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] ist im ganzen Land bekannt, doch kürzlich überraschte [ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe] die Experten mit einem gewagten Eingriff: Der Arzt transplantierte menschliches Schilddrüsengewebe unter die Haut und in die Bauchhöhle eines jungen Mannes." #NT!
 panum.2415.f: "Die erste Transplantation im modernen Sinne – die Implantation von Organgewebe, um eine Organfunktion zu ersetzen – war 1883 eine Schilddrüsentransplantation. Sie wurde von dem Schweizer Chirurgen und späteren Nobelpreisträger Theodor Kocher durchgeführt. In den vorangegangenen Jahrzehnten hatte Kocher die Entfernung von überschüssigem Schilddrüsengewebe bei Kropferkrankungen so weit perfektioniert, dass er das gesamte Organ entfernen konnte, ohne dass der Patient an der Operation starb. In einigen Fällen führte Kocher die vollständige Entfernung des Organs durch, um einem erneuten Kropf vorzubeugen. In den folgenden Jahren verwendeten Kocher und andere Chirurgen die Schilddrüsentransplantation auch zur Behandlung von Schilddrüsenunterfunktionsstörungen, die spontan, ohne vorherige Organentnahme, auftraten. Die Schilddrüsentransplantation wurde zum Vorbild für eine völlig neue Therapiestrategie: die Organtransplantation." #NT!
 panum.2415.g: "Und die Leute dachten, Frankenstein sei ein Horrorroman!" #NT!
 panum.2416.t: "Stereotaktische Methode" #NT!
 panum.2416.d: "Das chirurgische Genie von Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] kennt keine Grenzen: Mit einer neuen Gehirnoperation revolutionierte der Arzt die Neurochirurgie." #NT!
 panum.2416.f: "Stereotaktische Hirnchirurgie bezeichnet minimalinvasive Eingriffe der Neurochirurgie und Strahlentherapie, bei denen der Kopf des Patienten und die medizinischen Instrumente in einem fest verschraubten Rahmen fixiert werden, um maximale Genauigkeit zu erreichen. Erstmals wurden in den letzten Jahren des 19. Jahrhunderts isolierte Operationen am freigelegten Gehirn mit einem Verfahren durchgeführt, das damals schon als Stereotaxie bekannt war. Während des Eingriffs wurden der Körper des Patienten und insbesondere der Kopf starr in ein zuverlässig starres Rahmensystem eingespannt. Das Austesten der Möglichkeiten im Rahmen von Forschungsneugier und psychiatrischer Chirurgie war damals noch sehr begrenzt und einfach. In späteren Jahrzehnten wurden die Werkzeuge und die Methodik verfeinert." #NT!
 panum.2416.g: "Genial!" #NT!
 panum.2417.t: "Kardiopulmonaler Bypass" #NT!
 panum.2417.d: "Mit der Entwicklung des Herz-Lungen-Bypasses ist Dr. Hasenbein ein Meisterwerk der modernen Medizin gelungen. Es wird nicht mehr lange dauern, bis Menschen wieder problemlos am Herzen operiert werden können." #NT!
 panum.2417.f: "Bei einem kardiopulmonalen Bypass verlässt das Blut den Körper über ein Kanülen- und Schlauchsystem, wird mit Sauerstoff angereichert und wieder zurückgepumpt. Man spricht dann von extrakorporaler Zirkulation. Der Weg des Blutes verläuft dabei meist aus der Hohlvene oder dem rechten Herzvorhof sowie aus den Herzkammern und eröffneten Herzkranzgefäßen im Operationsgebiet und nach Filterung, Sauerstoffanreicherung und Kohlendioxideliminierung sowie Erwärmung und erneuter Filterung über die Hauptschlagader oder eine Leistenarterie zurück. Die Idee der extrakorporalen Zirkulation publizierte der französische Physiologe Le Gallois 1812. 1885 konstruierten Maximilian von Frey und sein Kollege Max von Gruber an der Universität Leipzig mit einem Filmoxygenator mit Kolbenpumpe den Vorläufer der heutigen Herz-Lungen-Maschinen zur ersten Anwendung der Blutzirkulation in einem geschlossenen extrakorporalen System." #NT!
 panum.2417.g: "Dies ist die Geburtsstunde der modernen Herzchirurgie!" #NT!
 panum.2418.t: "Endoskop" #NT!
 panum.2418.d: "Eine neue Erfindung von Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] könnte bei medizinischen Untersuchungen unschätzbar wertvolle Dienste leisten – sie ermöglicht es, das Körperinnere zu betrachten!" #NT!
 panum.2418.f: "Ein Endoskop ist ein Gerät, mit dem das Innere von Organismen oder technischen Hohlräumen untersucht und manipuliert werden kann. Die Verwendung des Endoskops, bekannt als Endoskopie, wurde ursprünglich für die medizinische Diagnostik am Menschen entwickelt. Nach der Erfindung von Thomas Edison war die Verwendung von elektrischem Licht ein wichtiger Schritt zur Verbesserung des Endoskops. Die ersten dieser Lichter waren extern, hatten jedoch eine ausreichende Beleuchtungsstärke, um Zystoskopie, Hysteroskopie und Sigmoidoskopie sowie die Untersuchung der Nasenhöhlen (und später der Brusthöhlen) zu ermöglichen, wie sie Sir Francis Cruise (unter Verwendung seines eigenen im Handel erhältlichen Endoskops) ab 1865 im Mater Misericordiae Hospital in Dublin, Irland, routinemäßig an menschlichen Patienten durchführte." #NT!
 panum.2418.g: "Ein nützliches medizinisches Gerät." #NT!
 panum.2419.t: "Augenspiegel" #NT!
 panum.2419.d: "Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] erfand ein Gerät, das die Untersuchung von Augenkrankheiten erleichtert und leistete damit der Augenheilkunde unschätzbare Dienste." #NT!
 panum.2419.f: "Unter Augenspiegelung oder Fundoskopie versteht man die Untersuchung der sichtbaren Teile des Auges mit Hilfe eines Augenspiegels. Insbesondere können dabei die Netzhaut und die sie versorgenden Blutgefäße untersucht werden. Das 1850 erfundene Augenspiegelung wurde von seinem Erfinder Hermann von Helmholtz Anfang Oktober 1851 erstmals beschrieben. Mit dem Augenspiegel lassen sich Erkrankungen des Sehnervs, der Netzhaut, der Aderhaut und des Glaskörpers erkennen. Damit begann die Geschichte der Augenheilkunde als eigenständige medizinische und wissenschaftliche Disziplin. Danach gewann das Augenspiegelungssystem zunehmend an Bedeutung für die Diagnostik innerer Erkrankungen." #NT!
 panum.2419.g: "Ein interessantes medizinisches Gerät." #NT!
 panum.2420.t: "Chemotherapie" #NT!
 panum.2420.d: "Ein neues medizinisches Verfahren, das Dr. [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] derzeit testet, könnte für viele Kranke einen Hoffnungsschimmer bieten – selbst Krebs wäre dann zwar nicht heilbar, aber zumindest teilweise behandelbar." #NT!
 panum.2420.f: "Chemotherapie ist eine medikamentöse Therapie bei Krebs oder Infektionen. Unter Chemotherapie versteht Paul Ehrlich die Behandlung von Infektionskrankheiten mit chemischen Substanzen, die direkt gegen den Erreger wirken. 1904 entdeckte er Trypanrot als erstes wirksames Chemotherapeutikum, mit dem er Mäuse heilte, die an der Schlafkrankheit litten. Weitere Experimente begann Ehrlich am 31. August 1909 in Frankfurt am Main, indem er Ratten Syphilis-Erreger injizierte und sie anschließend mit Hilfe chemotherapeutischer Verfahren behandelte. Diese Experimente zeigten eine so überzeugende Wirkung, dass sie als neue 'Waffe' der Medizin gegen Infektionskrankheiten angesehen wurden. Ehrlich wurde in der Folge als 'Schöpfer der Chemotherapie' bezeichnet. Die eingesetzten Medikamente werden entweder künstlich hergestellt oder sind Derivate natürlich vorkommender Substanzen." #NT!
 panum.2420.g: "Könnte dies eine Antwort auf das Leid von Krebspatienten sein?" #NT!
  
 panum.2100.t: "Ärzterekrutierung" #NT!
 panum.2100.d: "Einer der vielversprechendsten Ärzte des Allgemeinen Krankenhauses ist [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] wäre ein hervorragender Kandidat für den Posten des neuen Chefarztes. [SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U]s Fachgebiet ist..." #NT!
 panum.2100.f: "$concept_panum_physician_desc$\n\nDer #V neue#! Arzt, [SCOPE.sCharacter('panum_new_physician_scope').GetFullName], ist ein #tooltip:[SCOPE.sCharacter('panum_new_physician_scope').GetTooltipTag],panum_physician_rating_tt_loc [SCOPE.sCharacter('panum_new_physician_scope').GetCustom('panum_physician_rating_new_physician_icon_text_type')]#! Arzt.[GetPlayer.GetCustom('panum_physician_rating_display_existing_physician_type')]" #NT!
