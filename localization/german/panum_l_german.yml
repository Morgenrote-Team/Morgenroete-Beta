 je_panum_medical_research_project_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] treibt derzeit die medizinische Forschung voran. Neben medizinischen Innovationen kann Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] auch Heilmittel für Krankheiten finden, die nicht zu den zehn klassischen Seuchen zählen. Jedes Mal, wenn der Fortschritt [JournalEntry.GetTotalGoalValue|V0] erreicht, erhalten wir einen kleinen Technologieschub. #n Dieses Projekt wird auf unbestimmte Zeit fortgesetzt. Mit der Schaltfläche können Sie es stoppen.#!" #NT!
  
