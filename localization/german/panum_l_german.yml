 panum.1000.t: "Forderungen nach medizinischen Reformen" #NT!
 panum.1000.d: "Da eine gefährliche Krankheit in [GetPlayer.GetName] wütet, ruft der örtliche Arzt [SCOPE.sCharacter('panum_medical_reformer_scope').GetFullName] dazu auf, eine Gesundheitsfürsorge für die Bevölkerung einzuführen. Dies in der Hoffnung, dass die Epidemie dank der medizinischen Versorgung gestoppt werden kann." #NT!
 panum.1000.f: "'Sie sterben auf den Straßen! Das ist inakzeptabel! Wir müssen etwas tun!'" #NT!
 panum.1000.g: "Ich denke, [SCOPE.sCharacter('panum_medical_reformer_scope').GetSheHe] würde [GetLawType('law_public_health_insurance').GetName] bevorzugen!" #NT!
 panum.1000.h: "Ich denke, [SCOPE.sCharacter('panum_medical_reformer_scope').GetSheHe] würde [GetLawType('law_private_health_insurance').GetName] bevorzugen!" #NT!
 panum.1000.i: "Ich denke, [SCOPE.sCharacter('panum_medical_reformer_scope').GetSheHe] würde [GetLawType('law_charitable_health_system').GetName] bevorzugen!" #NT!
  
 panum.51.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] reist in den Epidemic State" #NT!
 panum.51.f: "Eine vollständige Beschreibung einer Krankheit ist ein erster Schritt zum Verständnis und späteren Kampf gegen sie. Beschreibungen haben noch keine direkte Wirkung auf die Linderung, sind aber Grundlage einer späteren Behandlungsmethode. Ärzte, die eine Epidemie im eigenen Land studieren, arbeiten effektiver als Ärzte auf einer Auslandsreise." #NT!
  
