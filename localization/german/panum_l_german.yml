 panum.131.t: "Abgebrochene Krankheitsstudien" #NT!
 panum.131.d: "Da die gefährliche Epidemie in [GetPlayer.GetName] zu Ende ist und die letzten Patienten inzwischen genesen sind, hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Studien von [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] vorerst abgeschlossen. Der Arzt konnte zwar einige wichtige Informationen sammeln, die eine künftige wissenschaftliche Beschreibung der Krankheit vereinfachen sollen, doch [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hat noch keinen Durchbruch erzielt." #NT!
 panum.131.f: "„Alle Spekulationen über den Ursprung und die Ursachen, wenn überhaupt Ursachen gefunden werden können, die eine so große Störung hervorrufen, überlasse ich anderen Autoren, seien es Laien oder Fachleute. Ich selbst werde lediglich die Natur der Krankheit darlegen und die Symptome erklären, an denen der Student sie vielleicht erkennen kann, falls sie jemals wieder ausbrechen sollte. Dies kann ich umso besser tun, da ich selbst an der Krankheit litt und ihre Wirkung bei anderen beobachtet habe.“ – Thukydides" #NT!
 panum.131.g: "Ein weiterer Schritt wurde getan." #NT!
 panum.133.t: "Abgebrochene medizinische Expedition" #NT!
 panum.133.d: "Die medizinische Expedition hat ihre Arbeit vorerst beendet, da die Epidemie vorüber ist. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] konnte keine wissenschaftliche Beschreibung fertigstellen, aber die Studien von [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] dürften für die Zukunft von Nutzen sein." #NT!
 panum.134.d: "Die schreckliche Epidemie, die unser Land heimgesucht hat, ist vorüber. Das bedeutet aber auch, dass Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] seine Untersuchungen vorerst einstellen muss, da [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] keine weiteren Experimente durchführen kann, um eine Behandlungsmethode für die Krankheit zu finden. Dennoch hat der Arzt wertvolle Erkenntnisse gewonnen, die ihm in Zukunft sicherlich von Nutzen sein werden." #NT!
 panum.134.f: "„Die Ansteckung geht von einer Sache auf eine andere über und wird ursprünglich durch die Infektion eines nicht wahrnehmbaren Partikels verursacht.“ -Girolamo Fracastoro" #NT!
 panum.134.g: "Es ist nur eine Frage der Zeit, bis wir ein Heilmittel finden." #NT!
 panum.136.d: "Leider wurde die medizinische Forschungsexpedition vorerst ohne endgültige Ergebnisse beendet. Da die Epidemie das Land verlassen hat, konnte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Theorien von [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] nicht überprüfen. Die Zwischenergebnisse werden [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] und zukünftigen Generationen zur Verfügung stehen, um endlich eine Behandlungsmethode zu finden." #NT!
  
