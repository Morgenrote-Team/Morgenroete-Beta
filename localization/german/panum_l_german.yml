 panum_physician_achievement_aspirin_inventor_loc: "\nDr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] gilt als der Haupterfinder von #o Aspirin#! und hat nicht nur unzähligen Patienten Schmerzlinderung verschafft, sondern auch die Pharmaindustrie revolutioniert." #NT!
 panum_physician_achievement_xray_inventor_loc: "\nMit der Entdeckung der #o Röntgenstrahlen#!, gilt Dr. [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastName] als einer der international führenden Physiker, der Medizin und Physik gleichermaßen revolutionierte." #NT!
 panum_physician_achievement_bloodtypes_inventor_loc: "\nMit der Entdeckung der verschiedenen #o Blutgruppen A, B, AB und 0#!, hat Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] maßgeblich dazu beigetragen, dass wir mehr über Blut als solches verstehen – und Bluttransfusionen erfolgreicher sind." #NT!
 panum_physician_achievement_ecg_inventor_loc: "\nDas von Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] erfundene #o EKG#!, ermöglichte die Messung der elektrischen Aktivität des Herzens und stellt einen Meilenstein im Krankenhausbetrieb dar." #NT!
 panum_physician_achievement_transplantation_inventor_loc: "\nMit der #o ersten Transplantation#!, verdiente sich Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] einen Platz in der Medizingeschichte." #NT!
 panum_physician_achievement_stereotactic_method_inventor_loc: "\nBis heute gilt die erfundene #o Stereotaktische Methode#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] als bahnbrechend in der Gehirnchirurgie." #NT!
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\nMit der Entwicklung eines #o Herz-Lungen-Bypasses#!, ist Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ein Meisterwerk der modernen Medizin gelungen." #NT!
 panum_physician_achievement_endoscope_inventor_loc: "In besonderer Erinnerung bleibt auch die Erfindung des #o Endoskops#!,, mit dem erstmals das menschliche Innere untersucht werden konnte." #NT!
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] erfand ein Gerät, das die Untersuchung von Augenkrankheiten erleichterte und damit der Augenheilkunde unschätzbare Dienste leistete: #o Das Ophthalmoskop#!." #NT!
 panum_physician_achievement_chemotherapy_inventor_loc: "\nDie zur Behandlung selbst hartnäckigster Erkrankungen entwickelte #o Chemotherapie#! [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe] mit einer Vielzahl von Medikamenten gibt auch Krebspatienten Hoffnung, dass nicht alles umsonst ist." #NT!
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('gaudi_engineer_var').GetCharacter.GetHerHis|U] #o Der Bau der ersten Eisernen Lunge#! zur Lebenserhaltung von Poliopatienten in kritischer Not gilt als eine der faszinierendsten ingenieurstechnischen Errungenschaften unserer Zeit." #NT!
 panum_physician_achievement_military_medicine_project_finished_loc: "\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat #o die neuesten Methoden auf dem Gebiet der Feldmedizin erfunden#!, und damit den militärischen Sanitätsdienst zu einem der anerkanntesten der Welt gemacht." #NT!
 panum_physician_achievement_inaugurated_asylum_loc: "\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] spielte eine entscheidende Rolle bei der Gründung der #o Ersten Irrenanstalt#! des Landes, um psychisch Kranken umfassende und menschliche Hilfe zu bieten." #NT!

