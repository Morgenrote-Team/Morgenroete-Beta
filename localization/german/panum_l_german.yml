 panum.641.t: "Eine meldepflichtige Krankheit" #NT!
 panum.641.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat einen dringenden Brief an die Behörden geschrieben, in dem er fordert, Masern nicht mehr als harmlose Krankheit zu behandeln, sondern sie meldepflichtig zu machen." #NT!
 panum.641.f: "'Ich musste mir von Kollegen, sogar von sehr einflussreichen Kollegen in den höchsten staatlichen und universitären Gremien, Vorwürfe anhören, ich würde die Gefahr der Masern übertreiben. Mir wurde sogar vorgeworfen, ich würde das Masernproblem größer machen, als es ist, nur um meine Position zu verbessern. Es stimmt, dass die Sterberate bei Masern zwischen 2 und 5 Prozent liegt. Aber wenn wir nur davon ausgehen, dass etwa 2 von 100 Menschen an Masern sterben, dann sind das in einem Land mit 10 Millionen Einwohnern mehrere Tausend Tote. Es gibt weltweit Millionen von Todesfällen, die mit einfachen Schutzmaßnahmen vermieden werden könnten. Ist es nicht besser, wenn wir alle einfach ein bisschen mehr aufpassen und die Regeln befolgen, um Menschenleben zu retten? Wollen wir die gleichen Fehler machen wie Wöchnerinnen und die Arroganz der Ärzte, sich nicht die Hände zu waschen, obwohl es eine kleine Investition an Zeit mit großer Wirkung ist?'\n\nAuszug aus einem Brief von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] an die Kommunalverwaltung in [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.641.g: "Kleine Dinge können eine große Wirkung haben." #NT!
 panum.642.t: "Tierinfektionen mit Masern" #NT!
 panum.642.d: "In einem viel beachteten Tierexperiment infizierte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Affen mit Masern." #NT!
 panum.642.f: "'Angesichts der großen Bedeutung des Themas und der offensichtlichen Unempfindlichkeit anderer Tiere erschien es uns äußerst wünschenswert, die Frage der Empfänglichkeit von Affen für eine Infektion mit Masern weiter zu untersuchen.\nWir begannen vor einem Jahr mit der Arbeit und möchten nun einige Ergebnisse mitteilen, die unserer Meinung nach zeigen, dass der Rhesusaffen durch Blut aus dem allgemeinen Kreislauf eines Masernpatienten infiziert werden kann und dass ein derart infizierter Affe eine deutliche Fieberreaktion zeigen kann, die dem Temperaturverlauf bei einigen Masernarten beim Menschen ähnelt, mit oder ohne generalisiertes Exanthem.\nAusführliche Informationen zu unserer Arbeit werden in einem derzeit in Vorbereitung befindlichen Artikel gegeben.'\n\nBericht von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] an die Medizinische Fakultät." #NT!
 panum.642.g: "Dies wird dazu beitragen, eine erfolgreiche Behandlung zu finden." #NT!
 panum.642.h: "Dies hilft bei der Suche nach dem Erreger." #NT!
 panum.643.t: "Eine altersabhängige Krankheit" #NT!
 panum.643.d: "Herr Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat in [SCOPE.sState('panum_disease_state').GetName] mehrere Krankheitsfälle untersucht und dabei erhebliche Unterschiede in der Patientensterblichkeit festgestellt." #NT!
 panum.643.f: "'Masern gelten als harmlose Kinderkrankheit. Meine Untersuchungen haben jedoch ergeben, dass dies nur zutrifft, wenn die Kinder im Kindergartenalter sind. Im Gegensatz dazu ist die Sterblichkeit bei Kindern im Alter zwischen 6 Monaten und 3 Jahren besonders hoch. Danach sinkt die Sterblichkeit recht schnell. Obwohl Masern bei Erwachsenen als harmlos gelten, haben Berichte von Ludvig Panum von den Färöer-Inseln gezeigt, dass es besser ist, wenn die Immunisierung im Kindesalter erfolgt – erfahrene Fischer berichten auch von schweren Krankheitsverläufen und sogar Todesfällen.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.643.g: "Es gibt also besondere Risikogruppen." #NT!
 panum.644.t: "Hoch ansteckend" #NT!
 panum.644.d: "Bei einem Besuch in einer Schule in [SCOPE.sState('panum_disease_state').GetName] konnte sich Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] für [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] davon überzeugen, dass sich die Krankheit, ist sie einmal ausgebrochen, nahezu unaufhaltsam ausbreitet." #NT!
 panum.644.f: "'Danke, dass Sie gekommen sind, Herr Doktor.'\n'Die Freude ist auf meiner Seite, Fräulein. Wie viele Masernfälle gibt es derzeit an der Schule?'\n'Leider haben wir den Überblick völlig verloren. Gestern waren es noch 35, mittlerweile dürften es aber über 40 sein.'\n'Wann wurde der erste Masernfall dokumentiert?'\n'Letzte Woche.'" #NT!
 panum.644.g: "Besorgniserregend." #NT!
 panum.645.t: "Niesen und Husten" #NT!
 panum.645.d: "Um die Ausbreitung von Masern einzudämmen, empfiehlt Arzt [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Quarantänemaßnahmen, wie sie auch bei Grippe oder Tuberkulose empfohlen werden." #NT!
 panum.645.f: "'Masern werden nicht als Atemwegserkrankung wahrgenommen, aber mein Verdacht hat sich bestätigt, dass dies die einzige Möglichkeit ist, ihre Ausbreitung zu stoppen. Masern – eine der ansteckendsten Krankheiten des Menschen – werden offenbar durch Tröpfcheninfektion übertragen. Es gibt Berichte, dass sich Personen im Zimmer eines Kranken angesteckt haben, obwohl sie zwei Stunden lang nicht im Zimmer waren. Anscheinend bleiben infektiöse Sekrete auch später noch ansteckend.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.645.g: "Glücklicherweise handelt es sich hierbei um bekannte Methoden." #NT!
 panum.646.t: "Antibiotika" #NT!
 panum.646.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sieht in einigen neuen Antibiotika die Möglichkeit, einige der Nebenwirkungen von Masern zu lindern." #NT!
 panum.646.f: "'Dass Masern als Krankheit oft nicht ernst genommen werden, liegt auch daran, dass sie oft keine weiteren Nebenwirkungen haben. Leider ist das nicht immer der Fall. Folgeerkrankungen, wie Infektionen im Ohr oder in der Lunge, sind oft der Ausschlag zwischen einem milden, schweren und tödlichen Verlauf. Antibiotika können Masern zwar nicht heilen, aber ihnen den Schrecken nehmen.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.646.g: "Besorgen Sie sich mehr Antibiotika!" #NT!
 panum.646.h: "Diese Erkenntnisse sollen bei der Suche nach dem eigentlichen Erreger helfen." #NT!
 panum.647.t: "Statistiken" #NT!
 panum.647.d: "Besondere Leistungen erbrachte Herr Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bei der statistischen Erfassung der Masernfälle, der Bearbeitung der infizierten Haushalte und der Auswertung der Daten." #NT!
 panum.647.f: "'Bei einer sorgfältigen Untersuchung der verfügbaren Daten der letzten Jahre habe ich die Sterblichkeitsraten von Masernkranken in 22 Ländern untersucht und bin zu folgenden Schlussfolgerungen gekommen: ‚\n\nChile 4,84 %, Ungarn 4,43 %, Australien 0,24 %, Schottland 0,35 %, Spanien 3,85 %, Italien, England und Wales 2,91 %, USA 1,08 %. In Ländern, in denen Masern endemisch waren, kommt es nach der Bevölkerungserneuerung alle drei bis fünf Jahre zu epidemischen Ausbrüchen. In der Folgezeit wurden viel höhere Raten gemeldet, die bis zu 10 % erreichten, insbesondere auf den pazifischen Inseln und in Afrika.' \n\nBericht von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] an die Medizinische Fakultät." #NT!
 panum.647.g: "Nützlich." #NT!
 panum.647.h: "Der Arzt hat Talent, [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sollte [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] sein Studium vertiefen." #NT!
 panum.648.t: "Multiplikation" #NT!
 panum.648.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat erstaunliche Zahlen zur Verbreitung und Ansteckung von Masern veröffentlicht." #NT!
 panum.648.f: "'Masern sind extrem ansteckend und es wird geschätzt, dass 90 % der nicht immunen Menschen, die Kontakt mit einer infizierten Person haben, die Krankheit bekommen. Mathematische Modelle schätzen die grundlegende Reproduktionszahl auf 12–18; das ist die durchschnittliche Anzahl von Sekundärinfektionen, die auf eine einmalige Ansteckung mit einer anfälligen Bevölkerung folgen. Masern sind extrem ansteckend: neun von zehn Menschen, die nicht immun sind und mit einer infizierten Person zusammenleben, werden infiziert.'\n\nBericht von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] an die Medizinische Fakultät." #NT!
 panum.648.g: "Was früher nur durch die Wahrnehmung erkannt wurde, ist heute durch die Wissenschaft bewiesen." #NT!
 panum.649.t: "Infektion ohne Symptome" #NT!
 panum.649.d: "Nach einigen Beobachtungen vor Ort ging Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] davon aus, dass Masern auch von asymptomatischen Patienten übertragen werden, noch bevor äußere Anzeichen auftreten." #NT!
 panum.649.f: "'Die hohe Verbreitung von Masern ist ein bekanntes Phänomen und das Infektionsrisiko ist seit der Antike bekannt. Ein großes Problem ist, dass auch scheinbar gesunde Menschen die Krankheit in sich tragen, selbst wenn sie noch nicht ausgebrochen zu sein scheint. Dies widerlegt viele Annahmen, die bisher gültig waren. Die Ansteckungsgefahr beginnt - wie mehrere Beobachtungen in [SCOPE.sState('panum_disease_state').GetName] gezeigt haben - 4 Tage vor dem Auftreten des Ausschlags und dauert im Allgemeinen bis 4 Tage nach dem Auftreten des Ausschlags. Es scheint, dass die Ansteckungsgefahr kurz vor dem Auftreten des Ausschlags besteht.'\n\nBericht von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] an die Medizinische Fakultät." #NT!
 panum.649.g: "Daher sind gründlichere Untersuchungen erforderlich." #NT!
 panum.650.t: "Kasernendesinfektion" #NT!
 panum.650.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] besuchte eine Kaserne in [SCOPE.sState('panum_disease_state').GetName], die vorbildliche Maßnahmen zur Verhinderung der Ausbreitung von Masern unter jungen Männern umgesetzt hat." #NT!
 panum.650.f: "'Einige dieser Maßnahmen umfassten eine längere und strengere Isolierung der ankommenden Rekruten als zuvor; Polizeipräsenz, um Ansammlungen in Baracken, Kantinen, Theatern und anderswo zu verhindern; Kopf-an-Fuß-Versetzung der benachbarten Feldbetten; ständiges Nasswischen und Desinfizieren von Böden, Wänden, Tischen und Türklinken. Alle Mitarbeiter trugen Kittel und Mullmasken, wechselten diese und wuschen sich zwischen dem Kontakt mit Patienten die Hände mit Seife, Wasser oder Desinfektionsmitteln, was zuvor unüblich war. Einige Stationen verpflichteten das Personal, Gummihandschuhe zu tragen. Die Patienten wurden in Isolationskabinen untergebracht, ihre Bettlaken hingen an Drähten, die um das Bett gespannt waren, und sie mussten Masken tragen. Die Laken der Kabinen wurden manchmal regelmäßig mit Desinfektionsmitteln besprüht. Maskentragende Patienten durften die Toiletten nur einzeln und unter Aufsicht eines Pflegepersonals betreten.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.650.g: "Moderne Methoden zur Masernbekämpfung." #NT!
 panum.651.t: "Fehlgeschlagene Impfung" #NT!
 panum.651.d: "Der Versuch von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], mit einem der Pockenvariolation ähnlichen Verfahren gegen Masern zu immunisieren, erwies sich als kolossaler Misserfolg." #NT!
 panum.651.f: "1757 entdeckte der schottische Arzt Francis Home, dass Masern durch einen Krankheitserreger verursacht wurden: Er übertrug die Krankheit mithilfe des Blutes infizierter Patienten auf gesunde Personen und wies nach, dass sie durch einen Infektionserreger verursacht wurde. Er testete eine Gruppe von 12 Kindern, von denen 10 nach einer Inkubationszeit von 6–7 Tagen einen charakteristischen mittelschweren fiebrigen Ausschlag entwickelten und zwei nicht infiziert wurden. Dieser Ansatz wurde aufgrund technischer Schwierigkeiten schnell wieder aufgegeben, insbesondere bei der Beschaffung von Masernmaterial zum richtigen Zeitpunkt, um die Krankheit zu impfen." #NT!
 panum.651.g: "Zeitverschwendung." #NT!
 panum.652.t: "Gurgeln im Hals" #NT!
 panum.652.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat mehrere Gurgelmittel ausprobiert, die von Kollegen seit Jahren als Heilmittel gegen Masern angepriesen wurden. Sie alle erwiesen sich als Fehlschlag." #NT!
 panum.652.f: "'Nach dem letzten Experiment bleibt bei mir mehr als nur ein bitterer Nachgeschmack. Einerseits, weil selbst Schlangenöl bessere Wirkungen hat. Andererseits, weil wir in unserer Ärztezunft immer mehr Schlangenölverkäufer und Quacksalber dulden, die dringend aussortiert werden müssen.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.652.g: "Was meinen Sie damit, Schlangenöl ist nutzlos?" #NT!
 panum.653.t: "Desinfektionsspray" #NT!
 panum.653.d: "In einer Kaserne haben Soldaten, die an einem Masernausbruch leiden, kürzlich begonnen, desinfizierende Zunge zu sich zu nehmen. Der Arzt hält das für ein törichtes Unterfangen und musste viel Überzeugungsarbeit leisten." #NT!
 panum.653.f: "'Wir sollten wirklich kleine Bilder auf die Etiketten von chemischen und medizinischen Produkten drucken, die auch dem kleinsten Idioten zeigen, was man mit einer Flüssigkeit, einem Spray oder einer anderen Substanz auf keinen Fall tun sollte.'\n\nAus einem Brief von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] an Doktor Angelika Hasenbein" #NT!
 panum.653.g: "Das ist wertvolle Zeit, die wir bei der Suche nach einer Behandlung verlieren!" #NT!
 panum.661.t: "Nehmen Sie Ihre Vitamine!" #NT!
 panum.661.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat festgestellt, dass die Einnahme von Vitaminen während einer Masernerkrankung hilfreich ist, um unangenehme Nebenwirkungen zu vermeiden." #NT!
 panum.661.f: "'Die Wirkung von Vitaminen ist bekannt, aber bei Masern hat mich ihre Wirkung überrascht. Kinder mit Vitamin-A-Mangel laufen Gefahr, schwer zu erkranken oder sogar zu erblinden. Vitamin-A-Präparate können das allgemeine Immunsystem stärken, die Krankheit jedoch nicht heilen.'\n\nBericht von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] an die Medizinische Fakultät." #NT!
 panum.661.g: "Sehr gut." #NT!
  
 panum.900.t: "Diphterie-Epidemie" #NT!
 panum.900.d: "In einem unserer Bundesländer ist eine Epidemie ausgebrochen: #YELLOW Diphterie#! wütet in [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.900.f: "Diphtherie ist eine akute Infektionskrankheit, die vor allem bei Kindern auftritt und durch eine Infektion der oberen Atemwege (Rachendiphtherie) verursacht wird. Pierre Fidèle Bretonneau führte den Begriff Diphtherie 1826 als Diphtherit ('Diphtheritis') in den medizinischen Sprachgebrauch ein. Gemeint sind damit die hellbraunen, dunklen Pseudomembranen (lederartige braune Ablagerungen in Kehlkopf und Luftröhre) aus abgestorbener Schleimhaut und Blutbestandteilen im Rachen. Diphtherie ist seit der Antike bekannt; schon Hippokrates hatte die Krankheit beschrieben. In 5–10 % der Fälle verläuft Diphtherie tödlich. Bei Kindern unter fünf Jahren und Erwachsenen über 40 Jahren kann die Sterblichkeitsrate bis zu 20 % betragen." #NT!
 panum.900.g: "Mir ist auch die Kehle zugeschnürt." #NT!
 panum.920.t: "Ende der Diphterie-Epidemie" #NT!
 panum.920.d: "Die schwere Diphtherie-Epidemie, die unser Land im Würgegriff hielt, ist zu Ende. Ärzte und Behörden geben Entwarnung, Kinder trauen sich wieder auf die Straße, ältere Menschen sind erleichtert." #NT!
 panum.920.f: "'In einer nasskalten Jahreszeit trat in Kingston, einer Stadt im Landesinneren von New Hampshire, die in einer Tiefebene liegt, eine Krankheit unter Kindern auf, die gemeinhin als ‚Halsstaupe‘ bezeichnet wird. Sie war von äußerst bösartiger Art und bei weitem die tödlichste, die je in diesem Land bekannt war.' - Sogar Noah Webster" #NT!
  
