 panum.541.t: "Ins fiebrige Herz" #NT!
 panum_yellow_fever_fork_note_tt: "#R HINWEIS:#! Die zweite Option ist möglich, wenn der Arzt über die Eigenschaft eines Biologen oder Mikrobiologen verfügt." #NT!
 panum.165.t: "Das Herz der Infektion" #NT!
 panum_physician_health_bonus_modifier: "Vorsicht vor Nachsicht" #NT!
 panum.168.f: "'Halt! Wer ist um diese Zeit noch unterwegs? - Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Was machen Sie denn so spät?'\n\n'Ich muss meine Runden machen, und die warten nicht bis zum Sonnenaufgang. Jede Minute ist kostbar, auch die nach Mitternacht.'\n\n'Du meine Güte! Diese Straßen sind nachts nicht sicher!'\n\nUnd sie sind es auch tagsüber nicht, nicht bis diese Cholera vorbei ist. Entschuldigen Sie mich bitte, Wachtmeister, es gibt noch mehr zu tun, bevor das Öl in meiner Laterne zur Neige geht. Ich muss ein Dutzend Fläschchen mit Wasser aus den Kanälen und Pumpen füllen, Häuser besuchen und Gräben untersuchen.'\n\n'Also gut, dann gut. Sie machen nichts falsch, aber es ist trotzdem besser, wenn ich Sie eskortiere.'" #NT!
 panum.3033.d: "Die überwiegende Mehrheit der Rotkreuz-Mitglieder hat dem Dritten Internationalen Übereinkommen über den Einsatz chemischer Waffen zugestimmt. Es ist nun für alle Mitglieder verbindlich." #NT!
 notification_panum_technology_boost_from_physician_notification_name: "Forschungsschub für [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]" #NT!
 notification_panum_technology_boost_from_physician_notification_desc: "Dank Dr. [GetPlayer.MakeScope.GetVariable('panum_physician_var').GetCharacter.GetLastName] erhielt [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')] einen Forschungsschub." #NT!
 je_panum_medical_research_project_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] treibt derzeit die medizinische Forschung voran. Neben medizinischen Innovationen kann Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] auch Heilmittel für Krankheiten finden, die nicht zu den zehn klassischen Seuchen zählen. Jedes Mal, wenn der Fortschritt [JournalEntry.GetTotalGoalValue|V0] erreicht, erhalten wir einen kleinen Technologieschub.\nTechnologie für den nächsten Schub: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]\n#n Dieses Projekt wird auf unbestimmte Zeit fortgesetzt. Mit der Schaltfläche können Sie es stoppen.#!" #NT!

 panum.2611.t: "Institutionalisierung" #NT!
 panum.2611.d: "Angesichts der unhaltbaren Zustände in manchen Irrenanstalten drängen Ärzte und Politiker auf eine Reform der dortigen Praktiken. Sie plädieren für abgeschiedene Orte, wo Psychiater fernab vom Verkehr ein einsames Leben mit ihren Patienten führen können." #NT!
 panum.2611.f: "Die moderne Ära der institutionalisierten Versorgung von Geisteskranken begann im frühen 19. Jahrhundert mit einer großen staatlichen Initiative. Nach der Verabschiedung des County Asylums Act von 1808 wurden in Großbritannien öffentliche Irrenanstalten eingerichtet. Dies ermächtigte Richter, in jedem County durch Steuern finanzierte Anstalten zu errichten, um die vielen 'armen Geisteskranken' unterzubringen. Der Lunacy Act von 1845 war ein wichtiger Meilenstein in der Behandlung von Geisteskranken, da er den Status von Geisteskranken ausdrücklich in Patienten änderte, die einer Behandlung bedurften. Das Gesetz schuf die Lunacy Commission unter der Leitung von Lord Shaftesbury, die sich auf die Reform der Geisteskrankheitsgesetzgebung konzentrieren sollte. Das General Journal of Psychiatry sollte als Organ der deutschen Anstaltspsychiatrie zwischen 1830 und 1860 erwähnt werden. Es wurde 1844 von Heinrich Damerow zusammen mit Carl Friedrich Flemming und Christian Friedrich Wilhelm Roller gegründet." #NT!
 panum.2611.g: "Die psychiatrische und psychologische Forschung macht Fortschritte." #NT!
 panum.2612.t: "Erkrankung des Gehirns" #NT!
 panum.2612.d: "In der Psychiatrie geht die Evolutionstheorie mit wesentlichen Veränderungen einher. Eine neue Generation von Psychiatern postuliert, dass Geisteskrankheiten Erkrankungen des Gehirns sind. Die wissenschaftlich orientierte Psychiatrie löst die bisher vorherrschende geisteswissenschaftliche Sichtweise ab." #NT!
 panum.2612.f: "Wilhelm Griesinger gilt als einer der bedeutendsten Köpfe der wissenschaftlichen Wende in der Psychiatrie. Er lernte François Magendie kennen, den Begründer der experimentellen Physiologie und Autor des ersten modernen Lehrbuchs der Physiologie, dessen Forschungsansatz ihn stark beeinflusste. 1839 zog er als praktizierender Arzt nach Friedrichshafen am Bodensee. Im Jahr darauf, 1840, erhielt er ein Angebot, als Sekundärarzt in der Irrenanstalt Winnenthal zu arbeiten. In den folgenden zwei Jahren, die er dort arbeitete, sammelte Griesinger eine Fülle praktischer Erfahrungen, die zur Grundlage seines 1845 erschienenen Hauptwerks 'Zur Pathologie und Therapie der Geisteskrankheiten' wurden, das eine neue Ära in der Psychiatrie einleitete. Darin versuchte er, die Psychiatrie auf der Grundlage der medizinischen Physiologie und Pathologie zu begründen. So findet sich gleich auf der ersten Seite Griesingers berühmte Aussage, wonach es zum Verständnis jedes Krankheitssymptoms notwendig sei, das jeweilige Phänomen zu lokalisieren und alle psychischen Erkrankungen als Erkrankungen des Gehirns zu erkennen." #NT!
 panum.2613.t: "Klassifizierung psychischer Störungen" #NT!
 panum.2613.d: "Psychiater und Psychologen haben begonnen, Geisteskrankheiten nach einem Schema zu klassifizieren, das bisher nur in der übrigen Medizin verfügbar war. Während sie früher nur 'Schwachsinn' und 'Wahnsinn' kannten, kennen sie heute 7 Kategorien: Manie, Melancholie, Monomanie, Parese, Demenz, Dipsomanie und Epilepsie." #NT!
 panum.2613.f: "Das triadische System der deutschen psychiatrischen Tradition ist ein System psychiatrischer Erkrankungen, das nach ihren Ursachen klassifiziert wird. Die erste Beschreibung geht auf Emil Kraepelin zurück; Kraepelin wiederum stützte sich auf die Vorarbeiten von Karl Ludwig Kahlbaum. Kraepelin gab bekannt, er habe eine neue Sichtweise auf Geisteskrankheiten gefunden, wobei er die traditionelle Sichtweise als 'symptomatisch' und seine Sichtweise als 'klinisch' bezeichnete. Dies erwies sich als seine paradigmensetzende Synthese der Hunderten von Geisteskrankheiten, die im 19. Jahrhundert klassifiziert wurden, indem er Krankheiten auf der Grundlage der Klassifizierung von Syndromen – gemeinsame Symptommuster im Laufe der Zeit – gruppierte, statt wie seine Vorgänger auf der Grundlage einfacher Ähnlichkeit der Hauptsymptome." #NT!
 panum.2614.t: "Gesprächstherapie" #NT!
 panum.2614.d: "Trotz vieler Vorbehalte erfreut sich der psychologische Ansatz unter Psychiatern zunehmender Beliebtheit. Der Fall einer jungen Frau, die durch langwierige Gespräche geheilt schien, gilt als Musterbeispiel für eine neue Wende in der Behandlung psychisch Kranker." #NT!
 panum.2614.f: "Die Erfahrungen, die Josef Breuer 1880/1881 bei der Behandlung von Bertha Pappenheim (Pseudonym: Anna O.) machte, bildeten die Grundlage für die 1895 gemeinsam mit Sigmund Freud veröffentlichten Studien zur Hysterie. Diese Arbeit (und die ihr zugrunde liegende Krankengeschichte) bezeichnete Freud als Wurzel und Ausgangspunkt der Psychoanalyse. Nach Sigmund Freuds Pionierarbeit begannen sich auch in der Psychiatrie Ideen aus der psychoanalytischen Theorie durchzusetzen. Die psychoanalytische Theorie wurde unter Psychiatern populär, weil sie es ermöglichte, die Patienten in Privatpraxen zu behandeln, anstatt sie in Irrenanstalten unterzubringen." #NT!
 panum.2615.t: "Psychologie und Philosophie" #NT!
 panum.2615.d: "Neben dem Einfluss psychologischer Schulen auf die Psychiatrie ist auch ein wachsendes Verständnis philosophischer Einflüsse zu verzeichnen. Die Dominanz der Naturwissenschaften scheint gebrochen." #NT!
 panum.2615.f: "Karl Jaspers gehörte zu den ersten Psychiatern des 20. Jahrhunderts, die die philosophischen Annahmen ihrer Disziplin untersuchten und reflektierten. Jaspers' ‚Allgemeine Psychopathologie‘ (1913) gilt als Beginn einer methodisch reflektierten psychopathologischen Forschung – neben Wilhelm Griesinger, der Geisteskrankheiten als Krankheiten des Gehirns definierte, und Emil Kraepelin, der als erster ein brauchbares nosologisches Bezugssystem in die Psychiatrie einführte. Jaspers bezog sich dabei auf Husserls Frühwerk zur deskriptiven Psychologie und Wilhelm Diltheys vieldiskutierte Unterscheidung zwischen ‚Erklären‘ und ‚Verstehen‘, mit der er die Psychopathologie auch in methodologischer Hinsicht ergänzte." #NT!
  
 panum.2131.t: "Ein Teller zum Gewinnen" #NT!
 panum.2131.d: "Als bekannt wurde, welche Rolle Armut bei der Entstehung von Rachitis spielen könnte, haben sich die Gewerkschafter dem Kampf für kostenlose Schulmahlzeiten und Milch verschrieben!" #NT!
 panum.2131.f: "Es begann langsam - hier und da parkte ein Wagen vor der Schule und gab den Kindern Milch, Suppe und ein bisschen Brot. Jetzt ist es viel mehr geworden: Die Arbeitergewerkschaften, Sozialisten und Arbeiteraktivisten der Nation haben sich der Sache verschrieben, nicht nur für die Klasse des Proletariats zu kämpfen, sondern auch für ihre Kinder. Plakate mit Bildern von Kindern mit leeren Schüsseln und flehenden Augen sind auf den Straßen immer häufiger anzutreffen, und das Versagen der Regierung, für ihre jüngsten und schwächsten Bürger zu sorgen, ist ein leichtes Schlaginstrument, um sie und ihr System zu verurteilen.\n\nDie Idee einer kostenlosen Schulmahlzeit und Milch verbreitet sich wie ein Lauffeuer und wird sogar von den extremsten Zweigen der Bewegung unterstützt - wenn man der Regierung nicht vertrauen kann, dass sie für die Kinder der Nation sorgt, für wen ist sie dann wirklich da?" #NT!
 panum.2131.g: "Wir werden unsere kostenlose Milchrechnung bekommen, ja, das werden wir, ja, das werden wir!" #NT!
 panum.2131.h: "Es gibt keine kostenlose Milch." #NT!
 panum_free_milk_modifier: "Kostenlose Milch" #NT!
 panum_no_free_milk_modifier: "Keine kostenlose Milch" #NT!
  
 panum_medical_techniques_level_rises_tt: "[GetPlayer.GetName]s Level der medizinischen Techniken steigt." #NT!
  
 panum.561.t: "Der Weg zu einem Impfstoff?" #NT!
 panum.561.d: "Auf Anweisung der Hauptstadt hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] begonnen, zu untersuchen, wie Gelbfieber behandelt oder sogar geheilt werden kann." #NT!
 panum.561.f: "'…und doch frage ich mich, ob ich vielleicht zu selbstsicher war in meiner Einschätzung, dass ich das Gelbfieber tatsächlich besiegen könnte. Es gibt nur wenige bekannte Gewissheiten über die Krankheit, und selbst ihre Übertragungswege sind ein Mysterium, ganz zu schweigen von ihrem Ursprung. Ist es, so könnte man meinen, eine Wiederbelebung der alten Miasmentheorie? Wer kann angesichts solcher Mysterien Gewissheit beanspruchen?\n\nDoch trotz all dieser Mysterien gibt es etwas, das wir wissen. Nicht alle, die diesem rätselhaften Tod begegnen, werden davon getötet; manche haben kaum Anzeichen dafür, dass es überhaupt dieses Gelbfieber war, und nicht wenige erholen sich, bevor es lebensbedrohlich wird. Gelbfieber zu erleben ist sicherlich ein Tanz mit dem Tod, aber es ist nicht sicher, dass es Sie ereilen wird …'" #NT!
 panum.561.g: "... und wenn wir es irgendwo stoppen können, können wir es vielleicht auch überall stoppen." #NT!
 panum.562.t: "Das Waisenhaus" #NT!
 panum.562.d: "Während er sämtliche Fälle einer Genesung vom Gelbfieber untersucht, gelangt Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zu einem Heim mit vielen Überlebenden – einem Waisenhaus." #NT!
 panum.562.f: "'Ah, hallo, Sie müssen die Leiterin dieses Waisenhauses sein ... Ich sehe, die Kinder haben heute mit Farbe gespielt.'\n'Glauben Sie mir, ich habe nicht die geringste Ahnung, wo sie es her haben – oh, Sie müssen der Arzt sein, von dem sie sagten, er würde vorbeikommen! Ich fürchte, der Husten ist bereits abgeklungen, also gibt es keine –'\n'Ich fürchte, ich bin nicht dieser Arzt, Ma’am. Ich komme aus der Hauptstadt und untersuche Gelbfieber. Mir wurde gesagt, dass die Krankheit … hier durchgekommen ist?'\n'Oh ja, die Kleinen. Sie haben es gehabt, sehr viele sogar. Einige kommen aus Familien, die von der Krankheit ausgelöscht wurden, die Armen, aber die Kinder scheint sie zu verschonen.'\nFaszinierend. Haben Sie irgendwelche Theorien –'\n'Kinder! Kommen Sie, kommen Sie! Es ist ein netter Mann aus der Hauptstadt hier, der mit Ihnen sprechen möchte!'\n'Oh … hallo, Kinder. Mein Name ist Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] und ich möchte über Gelbfieber sprechen …" #NT!
 panum.562.g: "Was ist der Grund dafür, dass die Eltern sterben, die Kinder jedoch überleben?" #NT!
 panum.563.t_america: "Das alte Blut" #NT!
 panum.563.d_america: "Um mehr über Gelbfieber herauszufinden, hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] beschlossen, die Familien einiger der ersten Siedler dieser Länder zu besuchen." #NT!
 panum.563.f_america: "'… und doch sind nicht alle der ersten Familien dieser Länder verschwunden. Es gibt noch einige, die ihre Geschichte bis zu den allerersten Expeditionen hierher zurückverfolgen können, ob groß oder klein. Diesen Familien habe ich meine Untersuchung gewidmet, denn einige von ihnen bewahren noch immer wertvolle Tagebücher und Aufzeichnungen auf, die uns einen Blick in die Vergangenheit vor den eigentlichen historischen Archiven gewähren. Dabei kommt etwas besonders Faszinierendes ans Licht: Die ersten Fälle von Gelbfieber traten in diesen Ländern um 1685 auf.\n\nDoch seit seinem Auftreten sind einige dieser Größen von [ROOT.GetCountry.GetNameNoFlag] als Forscher und Abenteurer ins Ausland gereist … und einige, die hier Gelbfieber hatten und wieder genesen sind, sind dort in Afrika an dieser Krankheit erkrankt und trotzdem nie erkrankt. Das führt mich zu einer Wahrheit.'" #NT!
 panum.563.g_america: "Es handelt sich um dieselbe Krankheit. Wer gegen die eine immun ist, ist auch gegen die andere immun." #NT!
 panum.563.t_africa: "Die Stammesangehörigen" #NT!
 panum.563.d_africa: "Um mehr über Gelbfieber herauszufinden, hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] diejenigen aufgesucht, die am meisten Erfahrung mit Gelbfieber haben – die einheimischen Afrikaner." #NT!
 panum.563.f_africa: "'... und doch, während wir schnell aussterben, halten die einheimischen Afrikaner durch. Es ist eine Krankheit, mit der sie sehr vertraut sind; obwohl die Sprachbarriere ein erhebliches Hindernis darstellt, brauchen sie nur ein paar Beschreibungen, um die Krankheit zu verstehen, von der ich spreche. Haben sie eine natürliche Resistenz dagegen, ähnlich der, die die Europäer gegen die Pocken haben könnten, die Amerika verwüsteten? Vielleicht, aber diejenigen afrikanischer Abstammung, die in unseren Städten arbeiten, sterben genauso schnell wie wir – also muss ein anderer Faktor eine Rolle spielen. Ernährung? Kultur?\n\nDer Schlüssel liegt vielleicht darin, dass die Stämme schon in der Kindheit damit in Berührung kommen. Es ist möglich, dass sie in jungen Jahren dem Gelbfieber ausgesetzt werden und so eine dauerhafte Immunität entwickeln, ähnlich wie Kuhpocken Schutz vor Pocken bieten.'" #NT!
 panum.563.g_africa: "Und wenn man sie immun machen kann, ... dann sollte es möglich sein, einen Impfstoff herzustellen." #NT!
 panum.564.t: "Die Natur des Feindes" #NT!
 panum.564.d: "Um eine Krankheit zu bekämpfen, muss man mehr über ihre Natur herausfinden, und Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat einen faszinierenden Test entwickelt." #NT!
 panum.564.f: "'...doch seit der Enthüllung, dass Cholera eine durch Wasser übertragene Krankheit ist, hatten wir die Gelegenheit, die Möglichkeit zu untersuchen, solche Krankheiten durch geeignete Filterung aus dem Wasser zu entfernen. Es dauerte eine Weile, bis es geliefert wurde, aber dann fiel mir ein Berkefeld-Filter in die Hände, ein fantastisches Gerät, das Wasser durch Kieselgur filtern kann. Es ist ein äußerst präzises Gerät, das sogar Bakterien entfernen kann. Ich bereitete ein Fläschchen mit Blut von mehreren Infizierten vor, verdünnte es mit destilliertem Wasser und goss es dann durch den Filter. Herauskam eine klare, reine Flüssigkeit ... dachte ich zumindest.\n\nUnd dann die Überraschung: Was auch immer es ist, es hat es durch den Filter geschafft, was ein Freiwilliger bewies, der mutig genug war, es sich injizieren zu lassen. Sie sind krank geworden und kämpfen nun um ihr Leben. Dies beweist jedoch, dass Gelbfieber kein bloßer Mikroorganismus ist, sondern etwas, das noch kleiner als ein Bakterium ist, etwas, das wir nicht sehen können.\n\nIch hätte es für unmöglich gehalten, aber ich fand in einer medizinischen Fachzeitschrift einen Hinweis darauf. Sie nennen es ein Virus.'" #NT!
 panum.564.g: "Kenne den Feind, vernichte den Feind." #NT!
 panum.565.t: "Unheilbar?" #NT!
 panum.565.d: "In der Hoffnung auf Anzeichen einer angemessenen Behandlung hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] örtliche Kliniken und Krankenhäuser besucht, um ihre Behandlungspraktiken zu untersuchen." #NT!
 panum.565.f: "Ah, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], es ist mir eine Freude, Sie kennenzulernen! Wir hier in der Klinik -'\n'Ich fürchte, wir müssen die Höflichkeiten abbrechen, Doktor. Ich muss bis zum Einbruch der Dunkelheit noch andere Kliniken, Krankenhäuser, Stationen besuchen, ungefähr zwei Dutzend. Erzählen Sie mir von der Wirksamkeit Ihrer Behandlung.'\n'Ah, äh... also, wir befolgen die festgelegten Richtlinien -'\n'Mit Erfolg? Lassen Sie mich mir Notizen machen.'\n'Ähm... ohne.'\n'Sterblichkeit?'\n'Ziemlich... hoch.'\n'Wie viele haben Sie diese Woche verloren?'\n'176.'\n'Das macht Sie und die letzten sechs Kliniken, was uns auf weit über dreitausend Todesfälle bringt. Sie halten sich an die Behandlungsrichtlinien, richtig?'\n'Ja, Herr Doktor!'\n'Dann scheiden pflanzliche Arzneimittel, Elektrotherapie, Strahlentherapie, Hydrotherapie, Volksmedizin, moderne Medizin und ... hm, praktisch jede uns bekannte Behandlungsform aus, einschließlich der Abschirmung vor dem Nachthimmel, falls diese astrologischer Natur ist.'\n'Dann ... bedeutet das nicht, dass es keine Behandlung gibt, Herr Doktor?'\n'Tatsächlich scheint es wahrscheinlich, dass jede Behandlung wirkungslos ist. Schade." #NT!
 panum.565.g: "Also ein Strategiewechsel: Wir brauchen einen Impfstoff." #NT!
 panum.566.t: "Der erste Riss" #NT!
 panum.566.d: "Obwohl seine Forschungen bislang erfolglos blieben, hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] im Versuch, einen Impfstoff zu entwickeln, mit Affen experimentiert." #NT!
 panum.566.f: "Für viele wäre der Anblick eines toten Affen in einem Käfig kein Grund zum Feiern, aber für Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] und sein Team war es ein bemerkenswerter Fortschritt. Die Entwicklung eines Impfstoffs gegen diese schreckliche Krankheit erforderte die Fähigkeit, die Krankheit auf Anfrage im Labor zu erzeugen, und doch war ihnen dies trotz aller Bemühungen nicht gelungen ... bis heute. Da einheimische afrikanische Affen und Schimpansen scheinbar immun gegen die Krankheit sind, musste ein indischer Makaken auftauchen, um ein geeignetes Testobjekt bereitzustellen. Der Makake wurde mit Serum aus den Venen eines infizierten Mannes geimpft, erkrankte und starb schließlich.\n\nFür manche mag dies wie sinnlose Grausamkeit erscheinen, aber hier und jetzt stellte es einen enormen Fortschritt dar. Endlich hatten sie Versuchspersonen." #NT!
 panum.566.g: "Hmmm. Das ist ein Fortschritt... zumindest beim Töten von Affen." #NT!
 panum.567.t: "Das Geheimnis des Serums" #NT!
 panum.567.d: "Da Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] nun über einen zuverlässigen 'Testkandidaten' verfügt, hat er begonnen, Möglichkeiten zur Impfung mit dem Blut genesender Patienten zu testen." #NT!
 panum.567.f: "'1. Transfusion von Makaken zu Makaken: Krankheit übertragen, keine Immunität, Makaken verstorben. Bestätigt Übertragung durch Blut, Krankheit wird wahrscheinlich von Insekten übertragen – Moskitos?\n2. Transfusion von Mensch zu Makaken: Krankheit übertragen, keine Immunität, Makaken überlebt. Bestätigt, dass Infektion direkt auf andere Arten übertragen werden kann.\n3. Südamerikanisches und afrikanisches Gelbfieber bei überlebenden Makaken: Immunität, Makaken überlebt. Bestätigt gemeinsame Immunität gegen beide Krankheitsformen.\n4. Toter Erreger in Serum, unter extremer Hitze sterilisiert: bot keinen Schutz, Makaken starben nach Impfung mit lebendem Erreger. Erheblicher Misserfolg, schließt Möglichkeiten für einen Impfstoff mit toten Erregern aus.\n5. Übertragung von genesendem Serum auf Makaken: verhinderte zukünftige Infektion! Vielversprechend! Möglicher Ansatz für einen Impfstoff?'" #NT!
 panum.567.g: "Wo man ein Omelett macht, muss man auch ein paar Makaken zerbrechen ..." #NT!
 panum.568.t: "Der Prototyp" #NT!
 panum.568.d: "Nachdem Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Zeit hatte, die Arbeit an seinem Impfstoff fortzusetzen, hat er einen kritischen Punkt erreicht – einen Impfstoff-Prototyp." #NT!
 panum.568.f: "'Es sollte ein unglaublicher Moment sein, aber ich kämpfe darum, nüchtern zu bleiben. Mit großen Mengen menschlichen Serums, das wir von einigen genesenden Kranken genommen hatten, gelang es meinem Team und mir, es in eine destillierte Form zu verarbeiten, die den Freiwilligen möglicherweise Immunität verleihen kann. Es war ein guter erster Entwurf und ein potenzieller, entscheidender Schritt, und so begannen wir, es an den Makaken zu testen. Viele starben, viele überlebten, aber ein Makake ist kein Mensch.\n\nEs musste an lebenden Tieren getestet werden. Zehn Freiwillige, die von hier, dort und überall her zusammengesucht wurden. Einige Soldaten aus der örtlichen Garnison, ein Mitglied meines eigenen Teams, ein paar arbeitslose Männer aus der Stadt, die sich durch das Versprechen von ein paar Pence überzeugen ließen. Etwa zwei Dutzend Freiwillige für fast ebenso viele Impfungen. Von ihnen? Sieben zeigten keine Symptome, eine Woche später wurde dann Immunität bestätigt. Fünf hatten eine leichte Erkrankung, dann Immunität. Weitere sechs waren schwerer erkrankt, dann immun. Der Rest? Alle entwickelten Gelbfieber und einer starb. Es ist zweifellos ein Schritt in die richtige Richtung, aber ... was ist mit den Toten?‘" #NT!
 panum.568.g: "Die Kosten des Fortschritts sind hoch." #NT!
 panum.569.t: "Ein neues Thema" #NT!
 panum.569.d: "Da der erste Versuch, einen Impfstoff zu entwickeln, ein mäßiger Erfolg war, ist Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] entschlossen, das Verfahren zu verfeinern." #NT!
 panum.569.f: "Zur Erleichterung einiger Betreuer und zum Entsetzen anderer hatte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eine entscheidende Entdeckung gemacht - Makaken waren nicht die einzigen Tiere, die die Krankheit ausbrüten konnten, und es wurde ein neuerer, geeigneterer Wirt gefunden: die gewöhnliche Forschungsmaus. Die Rolle, die sie in der aufkeimenden Branche der medizinischen Forschung spielen könnten, kann nicht unterschätzt werden, aber hier spielen sie eine besonders wichtige Rolle: Ihre Gehirnflüssigkeit, der Schleim um ihre winzigen Gehirne, ist ein geeignetes Nährmedium für das Gelbfiebervirus. Dieser Prozess hat jedoch einen deutlichen Vorteil.\n\nJeder Durchgang von Maus zu Maus dauert weniger lang als der letzte, was das Virus schwächt. Langsam aber sicher wird dieser Menschenmörder in die Schranken gewiesen, eine Maus nach der anderen." #NT!
 panum.569.g: "Oh gut, erst die Makaken, jetzt die Mäuse..." #NT!
 panum.570.t: "Der zweite Prototyp" #NT!
 panum.570.d: "Die kontinuierliche Verfeinerung des Impfstoffs von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat zur Entwicklung einer verbesserten Version geführt." #NT!
 panum.570.f: "'Obwohl der letzte Versuch kein Fehlschlag war, wage ich es nicht, ihn als Erfolg zu bezeichnen. Diese armen Jungs haben ihr Leben in der Hoffnung gegeben, die Menschheit von dieser Krankheit zu befreien, und ich bin es ihnen schuldig, so viel wie möglich zu verbessern. Ich glaube, dass ich genau das getan habe. Indem ich die Substanz von Makaken auf Mäuse übertrug, konnte ich das Virus langsam aber sicher abschwächen und es mit der Zeit erheblich schwächen. Nach über dreißig Passagen ist das resultierende Gelbfieber ein geschwächtes Lebewesen, das für einen Impfstoff weitaus besser geeignet ist als die ersten Versuche.\n\nMit demselben Ansatz wie zuvor habe ich eine Kombination aus Immunserum und lebender, aber abgeschwächter Kultur des Virus geschaffen, wobei das vorhandene Serum das Risiko bestimmter Immunkomplikationen verringert. Es gab weniger Freiwillige als beim letzten Mal, aber einer meiner Kollegen beschloss, das Risiko einzugehen. Sie waren weder geimpft noch dem Gelbfieber ausgesetzt und wurden vor der Impfung eine Woche lang intensiv unter Quarantäne gestellt. Abgesehen von einer leichten Rötung der Stelle entwickelten sie kein Gelbfieber. Bisher sehr vielversprechende Ergebnisse.'" #NT!
 panum.570.g: "Das klingt, als kämen wir endlich weiter ..." #NT!
 panum.570.h: "… also lasst uns mit der Impfkampagne beginnen!" #NT!
 panum.571.t: "Lauffeuer" #NT!
 panum.571.d: "Katastrophe! Bei der Verteilung des von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] entwickelten Serumimpfstoffs wurden unbeabsichtigt durch Blut übertragbare Krankheiten übertragen!" #NT!
 panum.571.f: "Im Nachhinein war es ziemlich offensichtlich, dass die Herstellung eines Impfstoffs aus menschlichem Blutserum vielleicht eine schreckliche Idee war. Die Geheimnisse des menschlichen Blutes waren teilweise entschlüsselt worden, aber in einer Welt, in der das Mikroskop immer neue Mikroben enthüllte und eine neue Theorie der Viruskörper aufkam, bestand immer die drängende Sorge, dass etwas Unerwartetes, etwas Katastrophales passieren könnte.\n\nDiese Katastrophe ist nun eingetreten: Zehntausenden von Menschen wurde unwissentlich Serum injiziert, das mit einem Virus kontaminiert war, das bei jedem, von Soldaten bis zu Regierungsbeamten, Gelbsucht verursacht hat. Dieses Virus war unserer Wissenschaft bisher unbekannt und wird immer noch von vielen unserer klügsten Köpfe nicht entdeckt ... im Gegensatz zu dem Schaden an unserem nationalen Image. Obwohl es nur wenige Todesfälle gab, wenn überhaupt, hat das offensichtliche Scheitern dieses Impfprojekts unsere medizinische Gemeinschaft in Trümmer gelegt und ist auf der ganzen Welt zum Gespött geworden." #NT!
 panum.571.g: "Dies ist eine Katastrophe für unsere medizinische Forschung..." #NT!
 panum.572.t: "Letzte Anpassungen?" #NT!
 panum.572.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] steht kurz vor der Fertigstellung eines Impfstoffs und befindet sich mitten in der Endentwicklung." #NT!
 panum.572.f: "Wenn man es nicht besser wüsste, könnte man Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]s Labor für eine sehr seltsame Küche halten. Salz, Wasser, Öl und Eier lagen verstreut auf den Arbeitsflächen, neben Kochplatten, einer großen Auswahl an Gläsern und einem hochmodernen Kühlschrank. Die Szenerie schien darauf ausgerichtet zu sein, Frühstück zuzubereiten, nicht auf einen medizinischen Durchbruch, doch genau das ist im Gange. Serum ist zu teuer, um einen Impfstoff herzustellen, der in großem Maßstab verteilt werden kann, und zu umständlich, um damit in den großen Mengen zu arbeiten, die nötig sind, um eine Kolonie oder eine Stadt zu impfen. Es muss aus der Gleichung entfernt werden, aber wenn nicht das, was dann?\n\nLeise murmelnd, scheinbar am Rande des Wahnsinns, arbeitet Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] unermüdlich. Eine sorgfältig vorbereitete Auswahl von Mäusegewebe wird vorsichtig in Eigelb getaucht und dann vorsichtig, immer vorsichtig, in den Gefriertrocknungsraum gelegt. Eine frühere Charge kam heraus, ihr Inhalt ist jetzt ein feines Pulver. Fügen Sie es einer Salzlösung hinzu …\n\nDer Arzt lächelte.\n\n'Endlich', sagt der gute Arzt. 'Ich habe es.'" #NT!
 panum.572.g: "Heut'ka!" #NT!
 panum.573.t: "Der endgültige Prototyp" #NT!
 panum.573.d: "Nachdem Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Arbeit an seinem Impfstoff abgeschlossen hatte, begann er mit der Einführung in einer letzten Testgruppe." #NT!
 panum.573.f: "'Es war ein langer, harter Weg, aber das Ende ist endlich in Sicht. Die letzte Phase bestand darin, den Impfstoff leichter verfügbar zu machen, und jetzt ist er da: Nachdem das Serum durch eine Salzlösung ersetzt wurde, ähnelt das resultierende Impfstoffpaket dem für Pocken verwendeten. Es ist keine Injektion erforderlich, lediglich die gleiche Praxis der Skarifizierung. Tatsächlich könnten beide sogar gleichzeitig verabreicht werden. Allen Berichten zufolge sollte dies ein zuverlässiges, sicheres und effizientes Mittel sein, um diesen Impfstoff nicht nur an ein paar Tausend, sondern an Millionen zu verabreichen.\n\nDoch frühere Tests erfüllen mein Herz mit Angst. Es gibt nur wenige Freiwillige, bei weitem nicht genug, um eine Testgruppe zu bilden ... aber wenn man mich mit einbezieht, sind es genug. Ich habe bereits die Vorbereitungen getroffen - ein General kann nur eine bestimmte Anzahl seiner Männer in die Schusslinie schicken, bevor von ihnen erwartet wird, dass sie selbst ins Feld ziehen. Heute Abend um acht Uhr werde ich mit diesem Impfstoff geimpft. Wenn es funktioniert, werde ich, wenn ich in zwei Wochen die Gelbfieberspritze bekomme, höchstens leichte Beschwerden haben.‘" #NT!
 panum.573.g: "Wünsch [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] Glück." #NT!
 panum.574.t: "Ein Impfstoff gegen Gelbfieber" #NT!
 panum.574.d: "Die Nachricht hat die Hauptstadt erreicht: Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat erfolgreich einen Impfstoff gegen Gelbfieber entwickelt!" #NT!
 panum.574.f: "'...aber am Ende haben mein Team und ich es trotz aller Widrigkeiten geschafft, erfolgreich zu sein. Obwohl es noch immer viele ungelöste Rätsel um das Gelbfieber gibt, ist es uns gelungen, einen brauchbaren Impfstoff herzustellen, der für die Produktion im großen Maßstab bereit ist. Dafür sind zwar einige Spezialanlagen mit klugen Köpfen erforderlich, aber er kann im großen Maßstab hergestellt werden, und Millionen und Abermillionen würden von einer schnellen Impfkampagne profitieren, die das Gelbfieber der Vergangenheit angehören lassen könnte.\n\nDennoch sind viele Menschenleben verloren gegangen, darunter auch einige aus meinem eigenen Team, von einfachen Assistenten, die ihr Leben für ihre Forschung ließen, bis hin zu Freiwilligen, die sich für Tests zur Verfügung stellten. Alle sollten als die Helden anerkannt werden, die sie sind. Ein Wort des Lobes gilt auch den Makaken und Mäusen, die bei diesem Unterfangen eine entscheidende Rolle gespielt haben.\n\nDank ihres Opfers und unserer gemeinsamen Anstrengungen haben wir jetzt einen Impfstoff, der dem endemischen Gelbfieber in wenigen Jahren ein Ende bereiten und dieses Übel vielleicht eines Tages ein für alle Mal ausrotten kann.'" #NT!
 panum.574.g: "Gut gemacht, Doktor! Lassen Sie uns nun sofort mit dem Einsatz beginnen!" #NT!
  
