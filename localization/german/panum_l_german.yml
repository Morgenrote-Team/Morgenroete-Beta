 panum.2626.t: "Die Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Show" #NT!
 panum.2626.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] eine eigene Radiosendung, in der [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] Menschen Ratschläge gibt, die über ihre Probleme sprechen möchten. Das Format erfreut sich großer Beliebtheit." #NT!
 panum.2626.f: "'Hallo, Ethan. Ich höre zu.'\n'Hallo, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName].'\n'Wie alt sind Sie?'\n'Ich bin dreizehn.'\n'Also, was kann ich für Sie tun?'\n'Also, ich habe eine Menge Probleme mit den anderen Kindern in der Schule. Sie verprügeln mich dauernd.'\n'Warum glauben Sie, ist das so?'\n'Wahrscheinlich, weil ich schlau bin. Ich habe einen IQ von 160. Ich bin im Astronomieclub und hasse Sport.'\n'Nun, wissen Sie, Ethan, die anderen Kinder agieren nur aus Eifersucht und Unreife, und ich weiß, dass es im Moment nicht viel hilft, aber in den nächsten Jahren wird der Tag kommen, an dem Sie zuletzt lachen werden.'\n'Das ist alles?'\n'Ja.'\n'Ehrlich gesagt, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], finde ich diesen Rat herablassend, simpel und, ganz offen gesagt, einfallslos. Die wahre Überraschung ist, dass sie Sie dafür bezahlen, diesen Ballonsaft zu verteilen.'\n'Ethan, von wo rufen Sie an?'\n'Zuhause.'\n'Also, wenn einer von Ethans Klassenkameraden zuhört, wissen Sie, wo er ist, und er kann nicht für immer dort bleiben. Danke für Ihren Anruf.'" #NT!
 panum.2626.g: "Warte, ich kenne diese Show!" #NT!
  
