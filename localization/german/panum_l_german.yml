 je_panum_medical_system_project: "Medizinisches System erweitern" #NT!
 je_panum_medical_system_project_reason: "Ein Arzt, der das medizinische System ausbauen soll, arbeitet vorrangig vor Ort, um die Gesundheitsversorgung zu verbessern. Doch auch dort bedarf es einer administrativen Infrastruktur. Ein Arzt mit vorteilhaften Talenten, der Eindruck auf die Bürokratie macht, ist hier hilfreich. Seine Fähigkeiten und Erfahrungen treiben den monatlichen Fortschritt bei der Einrichtung und dem Bau neuer Krankenhäuser und Kliniken voran.\n\nÄrzte werden zunächst versuchen, Kliniken in besonders gut entwickelten Gebieten einzurichten, bevor sie sich Kliniken in weniger entwickelten Regionen zuwenden. Ärzte werden den Staat bevorzugen, der über die höchste Anzahl an Verwaltungsgebäuden verfügt.\n\nJedes Mal, wenn sich der Fortschrittsbalken füllt, wird eine neue Klinik/ein neues Krankenhaus aktiviert und die Arbeit wird im nächsten geeigneten Staat fortgesetzt. Ärzte werden so viele Kliniken und Krankenhäuser wie möglich als Produktionsmethode aktivieren, bis entweder keine Staaten mit den erforderlichen Voraussetzungen mehr vorhanden sind oder die Arbeit manuell gestoppt wird." #NT!
  
 panum.2101.t: "Medizinisches System erweitert" #NT!
 panum.2101.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat seine Arbeit abgeschlossen und die medizinische Versorgung vor Ort ausgebaut und modernisiert. Der Arzt steht nun wieder für andere Tätigkeiten zur Verfügung." #NT!
 panum.2101.f: "„Die Medizin ist eine Sozialwissenschaft, und die Politik ist nichts anderes als Medizin im großen Maßstab.“ – Rudolf Virchow" #NT!
 panum.2101.g: "Zurück zur Arbeit." #NT!
 panum.2102.t: "Fachklinik in [SCOPE.sState('panum_clinic_state').GetName]" #NT!
 panum.2102.d: "Mit der tatkräftigen Unterstützung von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] konnte [SCOPE.sState('panum_clinic_state').GetCityHubName] die erste Fachklinik unseres Landes gegründet werden. Der Arzt hat angekündigt, dass [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sie leiten wird [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] und sich auf einen Bereich spezialisieren wird – wobei noch nicht klar ist, auf welchen Bereich sich die Spezialisten konzentrieren sollen." #NT!
 panum.2102.f: "„Das Medizinstudium dient nicht dazu, den Studenten eine Möglichkeit zum Lebensunterhalt zu bieten, sondern um die Gesundheit der Gemeinschaft zu sichern.“ -Rudolf Virchow" #NT!
 panum.2102.g: "Operation." #NT!
 panum.2102.h: "Psychiatrie." #NT!
