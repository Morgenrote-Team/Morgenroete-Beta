 panum.112.t: "Ein Hoffnungsschimmer" #NT!
 panum.112.d: "In den Cholera-Krankenhäusern von [SCOPE.sState('panum_disease_state').GetName] hat sich ein Arzt während der aktuellen Epidemie besonders hervorgetan ([SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself]). Die Arbeitsweise von [SCOPE.sCharacter('panum_new_physician_scope').GetFullName] hat bereits landesweite Bedeutung erlangt. Dieser Arzt könnte möglicherweise eine wichtige Rolle bei der Bekämpfung der Epidemie in [GetPlayer.GetName] spielen." #NT!
 panum.209.t: "Dr. Tuberkulose" #NT!
 panum.209.d: "Der Leiter des Tuberkulose-Sanatoriums, Dr. [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], hat inmitten der grassierenden Epidemie seine Dienste angeboten." #NT!
 panum.112.f: "'Gott sprach zu mir und rief mich in seinen Dienst. Welche Form dieser Dienst annehmen sollte, verriet die Stimme nicht.' -Florence Nightingale" #NT!
 panum.112.g: "Geben Sie [SCOPE.sCharacter('panum_new_physician_scope').GetHerHim] sofort eine offizielle Position!" #NT!
 panum.112.h: "Der Arzt sollte zukünftige Generationen im Kampf gegen die nächste Epidemie ausbilden." #NT!
  
 panum.122.t: "Cholera-Inkubation" #NT!
 panum.122.d: "Nach mehreren Beobachtungen und Interviews fand Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] heraus, dass eine gewisse Zeit vergeht, bevor bei einem Patienten typische Cholera-Symptome auftreten." #NT!
 panum.122.f: "Diesen Zeitraum schätzt der Arzt auf etwa einen halben Tag bis fünf Tage, im Durchschnitt auf drei Tage. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] hat mehrere Gespräche mit Erkrankten und deren Angehörigen geführt. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] konnte daher anhand mehrerer Augenzeugenberichte die Geschehnisse rekonstruieren. Auch wenn die Ursache unklar bleibt, lassen sich aus diesen Beobachtungen später Rückschlüsse ziehen, was genau an Tag 1 passiert ist." #NT!
 panum.122.g: "Gut beobachtet." #NT!
 panum.124.g: "Genau beobachtet." #NT!
 panum.123.t: "Cholera-Symptome" #NT!
 panum.123.d: "Heute hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] der Medizinischen Fakultät eine umfassende Liste der Cholerasymptome gesandt." #NT!
 panum.123.f: "Wie bereits bekannt, aber bislang nur rudimentär aufbereitet, handelt es sich bei der Cholera um eine Erkrankung des menschlichen Dünndarms. Die Folgen sind extremer Durchfall mit einem typischen blau gefärbten 'Reiswasserstuhl' und starkes Erbrechen. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] wurde eine gewisse sadistische Ader nachgesagt, denn rechtzeitig zum akademischen Abendessen schickte [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] eine ausführliche Beschreibung dieser und weiterer äußerst unappetitlicher Symptome." #NT!
 panum.124.t: "Cholera Asiatica" #NT!
 panum.124.d: "In einem viel beachteten Bericht arbeitete Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Unterschiede zwischen Cholera und anderen choleraähnlichen Erkrankungen heraus, was als Meilenstein in der künftigen Krankheitsbeschreibung gilt." #NT!
 panum.124.f: "Der Name Cholera, der sich vom griechischen Wort für Galle ableitet, bezeichnete ursprünglich alle möglichen Formen von Durchfall oder Darmbeschwerden (‚Gallenfluss‘). Obwohl Jakob de Bondt bereits 1642 eine spezifisch indische Cholera-Erkrankung beschrieben hatte, blieb Cholera ein reiner Sammelbegriff. Erst mit dem Aufkommen der großen Cholera-Pandemien des 19. Jahrhunderts wurde dieser spezifische, neue Cholera-Typ, der sich als verheerendste Krankheit des Jahrhunderts herausstellte, zur klaren Abgrenzung auch mit einem Eigennamen definiert: Cholera Asiatica." #NT!
  
 panum.222.t: "Tuberkulose-Inkubation" #NT!
 panum.222.d: "Bei seinen Untersuchungen zur Tuberkulose fielen Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] einige Merkwürdigkeiten im Zusammenhang mit der Krankheit auf. Offenbar kann es Wochen dauern, bis ein Erkrankter tatsächlich typische Symptome zeigt." #NT!
 panum.222.f: "Ob Miasmentheorie oder Keimtheorie: Tuberkulose gibt noch immer Rätsel auf. Handelt es sich um eine Infektionskrankheit, kann es offenbar Wochen dauern, bis die Symptome ausbrechen: Der Arzt geht von zwei bis gar zwölf Wochen aus! Zudem scheint sich nicht jeder, der mit einem Erkrankten zusammenlebt, direkt anzustecken, wie [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] in zahlreichen Befragungen von Patienten und Angehörigen herausfand. Entweder liegen die Wissenschaftler mit ihrer Theorie richtig, dass Tuberkulose keine Infektionskrankheit ist und andere Faktoren dafür verantwortlich sind, oder das Ansteckungsrisiko ist geringer als zunächst angenommen." #NT!
 panum.223.t: "Tuberkulose-Symptome" #NT!
 panum.223.d: "Nachdem Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Symptome der Tuberkulose intensiv untersucht hatte, kam [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] zu einem Schluss, der sogar einige akademische Kollegen überraschte: Tuberkulose ist eine viel kompliziertere Krankheit mit einer großen Bandbreite an Symptomen, die weit über Lungenprobleme hinausgehen." #NT!
 panum.223.f: "Obwohl der Befall der Lunge und deren schmerzhafte, langsame Zerstörung zu den bekanntesten Merkmalen der Tuberkulose gehört, ist Husten nur eines von vielen Symptomen. Lungentuberkulose ist nur eine Art von Tuberkulose, die auch andere Organe befallen kann. Müdigkeit, Fieber, Appetitlosigkeit, Nachtschweiß oder Blutspucken waren bisher bekannte Symptome. Dass Tuberkulose nicht nur den Körper außerhalb der Lunge befällt, sondern dass zwei verschiedene Tuberkulosearten gleichzeitig auftreten können, hat das Weltbild mancher Mitglieder der Medizinischen Fakultät deutlich verändert." #NT!
 panum.224.t: "Tuberkulose und Skrofulose" #NT!
 panum.224.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] beschäftigte sich intensiv mit den verschiedenen Formen möglicher Tuberkulose-Erkrankungen und arbeitete trotz zahlreicher Ähnlichkeiten mit anderen Krankheitssymptomen die spezifischen Unterschiede zwischen Tuberkulose und Skrofulose heraus, betonte gleichzeitig aber auch die Zusammenhänge." #NT!
 panum.224.f: "Beschreibungen der Tuberkulose gibt es seit Jahrhunderten, vergleichbare, verheerende Auswirkungen hatte sie jedoch aufgrund der geringeren Urbanisierung erst im 19. Jahrhundert. Noch bis weit ins 19. Jahrhundert war sie unter anderen Namen bekannt – der Begriff ‚consumption‘ wurde im englischen Sprachraum bis ins 20. Jahrhundert hinein verwendet. Als einer der Pioniere der Tuberkuloseforschung gilt René Laennec, der das Stethoskop zur Lungenuntersuchung erfand. Johann Lukas Schönlein prägte 1832 den Begriff Tuberkulose und verband ihn mit einem bestimmten Krankheitsbild. Eine wichtige Erkenntnis dieser Jahre war, dass Skrofulose und Tuberkulose zwar zwei unterschiedliche Erkrankungen waren, diese jedoch aufgrund der Vielzahl der Tuberkulosesymptome kaum voneinander unterschieden werden konnten." #NT!
  
 panum.322.t: "Pockeninkubation und Symptome" #NT!
 panum.322.d: "In einer kürzlich erschienenen Zusammenfassung stellte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fest, dass die anfänglichen Symptome der Pocken denen der Grippe nicht unähnlich sind, bevor die berüchtigten Pusteln auftreten. Es kann davon ausgegangen werden, dass zwischen der Infektion und den Symptomen ein bis zwei Wochen vergehen." #NT!
 panum.322.f: "'Diejenigen, die leicht von der Pest genesen konnten, scheinen mir zuvor am ganzen Körper getrocknet und geläutert worden zu sein, denn bei einigen von ihnen kam es zu Erbrechen und bei allen war der Magen gestört. Und ebenso zeigten sich bei den bereits Geläuterten, die gerettet werden sollten, am ganzen Körper deutlich dunkle Pusteln, die meisten geschwürig, alle trocken. (...) Äußerlich fühlte sich der Körper nicht heiß an, noch war er blass; die Haut war eher rot, bläulich und hatte kleine Blasen und Geschwüre.' - Galen" #NT!
 panum.323.t: "Windpocken oder Pocken?" #NT!
 panum.323.d: "Im Rahmen der [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Beobachtung von Pockenpatienten konnte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] einen Teilbericht vorlegen, wonach es sich bei Windpocken um eine eigenständige, harmlose Erkrankung handelt. Dies war bislang eine sehr umstrittene Theorie." #NT!
 panum.323.f: "'Bei vielen Menschen bricht Windpocken ohne Krankheit oder vorherige Anzeichen aus. Bei anderen gehen ihnen leichte Frösteln, Mattigkeit, Husten, Schlafstörungen, wandernde Schmerzen, Appetitlosigkeit und drei Tage lang Fieber voraus. Die meisten von ihnen haben die übliche Größe der Pocken, aber einige sind kleiner. Ich habe sie nie zusammenfließend oder sehr zahlreich gesehen. Die größte Zahl, die ich je beobachtet habe, waren etwa zwölf im Gesicht und zweihundert am Rest des Körpers. Am zweiten oder spätestens dritten Tag nach Ausbruch scheinen so viele Pocken, wie nicht geplatzt sind, ihre volle Reife erreicht zu haben, und diejenigen, die am meisten von dieser gelben Flüssigkeit bedeckt sind, ähneln sehr stark den echten Pocken am fünften oder sechsten Tag, insbesondere wenn zufällig mehr Raum als gewöhnlich von dem extravasierten Serum eingenommen wird.' – William Heberden" #NT!
 panum.324.t: "Der Unterschied zwischen Masern und Pocken" #NT!
 panum.324.d: "Mit äußerster Sorgfalt verglich Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Symptome von Pockenkranken, Masernkranken und Windpockenkranken und konnte sie sehr genau klassifizieren." #NT!
 panum.324.f: "'Dem Ausbruch der Pocken gehen anhaltendes Fieber, Rückenschmerzen, Jucken in der Nase und Alpträume im Schlaf voraus. Dies sind die akuteren Symptome des Ausbruchs, zusammen mit einem spürbaren Rückenschmerz, der von Fieber und einem Jucken begleitet wird, das der Patient am ganzen Körper spürt. Es tritt eine Schwellung des Gesichts auf, die kommt und geht, und man bemerkt eine insgesamt entzündliche Farbe, die sich als starke Rötung auf beiden Wangen und um beide Augen herum bemerkbar macht. Man verspürt eine Schwere des ganzen Körpers und große Unruhe, die sich in häufigem Strecken und Gähnen äußert. Es treten Schmerzen im Hals und in der Brust auf und man hat Schwierigkeiten beim Atmen und Husten. Weitere Symptome sind: Trockenheit des Atems, dicker Speichel, Heiserkeit der Stimme, Schmerzen und Schweregefühl im Kopf, Unruhe, Übelkeit und Angst. Beachten Sie den Unterschied: Unruhe, Übelkeit und Angst treten bei Masern häufiger auf als bei Pocken. Andererseits sind Rückenschmerzen bei Pocken deutlicher als bei Masern.' -Rhazes" #NT!
  
 panum.422.t: "Typhus-Symptome und Inkubation" #NT!
 panum.422.d: "In einem ersten Zwischenbericht listete Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Symptome des Fleckfiebers auf und gab eine erste Einschätzung, wann diese im Krankheitsverlauf erstmals auftreten." #NT!
 panum.422.f: "'Fieber, Schüttelfrost, Kopfschmerzen, Husten, Hautausschlag, Erbrechen – all das sind Anzeichen für Fleckfieber. Allerdings finden sich all diese Symptome auch bei ähnlichen Erkrankungen. Übelkeit und Verwirrtheit hingegen sind typisch für klassisches Fleckfieber. Der typische Verlauf des Fiebers ist ein zwei- bis dreitägiger Temperaturanstieg, gefolgt von einem etwa zehntägigen Dauerfieber und anschließender Entfieberung über mehrere Tage. Nach meinen Berechnungen vergehen zwischen Ansteckung und ersten Symptomen etwa zehn bis vierzehn Tage.'" #NT!
 panum.423.t: "Das Lagerfieber" #NT!
 panum.423.d: "Nachdem Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] historische Berichte über Epidemien beim Militär mit den aktuellen Symptomen von Typhuskranken vergleicht, kommt er zu dem Schluss, dass die Gleichsetzung von Typhus und 'Lagerfieber' wenig weiterhilft." #NT!
 panum.423.f: "'Es ist sicherlich ein Lagerfieber – aber ist es DAS Lagerfieber?' Fragen wie diese von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] brachten die Mitglieder der Medizinischen Fakultät zum Nachdenken. Historisch als 'Lagerfieber' bekannt, wird es seit langem mit Epidemien in den großen Armeen oder Kasernen in Verbindung gebracht, insbesondere als die Krankheit, die der napoleonischen Armee massive Verluste zufügte. Aber nicht alle Krankheiten in der Armee, die als 'Lagerfieber' bekannt sind, können mit Typhus gleichgesetzt werden. Rückfallfieber und Schützengrabenfieber sind weitere Krankheiten, von denen bekannt ist, dass sie Militärpersonal in engen Räumen befallen haben. Die Krankheit, die während des amerikanischen Bürgerkriegs besonders wütete, wird dagegen oft als Typhus bezeichnet, war aber eigentlich Typhus." #NT!
 panum.424.t: "Typhus: Zwei Krankheiten in einer?" #NT!
 panum.424.d: "Bei der Untersuchung von Fleckfieberpatienten stellte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fest, dass eine Reihe von Annahmen grundsätzlich falsch waren. Hatten frühere Ärzte eine 'krankhafte Veränderung' im Darm diagnostiziert, konnte [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] bei den an Fleckfieber Verstorbenen nichts davon feststellen. Der Arzt geht vielmehr davon aus, dass es sich bei der Darmerkrankung um eine vom Fleckfieber abzugrenzende Krankheit handelt, die [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] als 'Typhus' bezeichnet." #NT!
 panum.424.f: "Bis Mitte des 19. Jahrhunderts unterschieden Ärzte nicht zwischen Typhus und Fleckfieber. Sie wurden einfach als Ausprägungen derselben Krankheit mit unterschiedlich ausgeprägten Symptomen betrachtet. 1836 stellte der amerikanische Arzt William Gerhard fest, dass bei manchen Typhuskranken der Darm nicht von der Krankheit betroffen war, obwohl die Krankheit bis dahin zu den am häufigsten diagnostizierten Symptomen gehörte. Ähnliche Beobachtungen führten ihn außerdem zu der Annahme, dass Fleckfieber keine Darmerkrankung sei, sondern andere Organe befalle: geistige Verwirrung und Muskelschmerzen kamen viel häufiger vor als Probleme des Verdauungstrakts. Die jahrhundertelange Gleichsetzung von Fleckfieber und Fleckfieber hat nicht nur zu einer Namensähnlichkeit geführt, sondern auch dazu, dass in manchen Sprachen Fleckfieber als Typhus bezeichnet wird, zum Beispiel im Deutschen." #NT!
  
 panum.522.t: "Zwei Verläufe des Gelbfiebers" #NT!
 panum.522.d: "Bei der genauen Beobachtung des Gelbfiebers entdeckte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], dass die Krankheit auf zwei Arten verlaufen kann." #NT!
 panum.522.f: "Der Arzt hat festgestellt, dass Gelbfieber in vielen bekannten Fällen eine milde Form hat, die nach einigen Tagen vorüber ist. Schätzungsweise fünf von sechs Patienten erkranken an dieser milden Form. Der andere Verlauf der Krankheit ist gefährlich und kann tödlich enden. Die Patienten erleiden einen zweiten, toxischen Verlauf. Er ist gekennzeichnet durch wiederkehrendes Fieber, begleitet von Gelbsucht aufgrund von Leberschäden sowie Bauchschmerzen. Blutungen in Mund, Nase, Augen und Magen-Darm-Trakt führen zu bluthaltigem Erbrochenem, daher einer der spanischen Namen für Gelbfieber, vómito negro ('schwarzes Erbrochenes'). Es können auch Nierenversagen, Schluckauf und Delirium auftreten. Schätzungsweise 20 bis 50 Prozent der Gelbfieberopfer, die dieses zweite Stadium der Krankheit erreichen, sterben – so das Fazit des Wissenschaftlers in dem vorgelegten Bericht." #NT!
 panum.523.t: "Gelbfieber-Saisons" #NT!
 panum.523.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat herausgefunden, dass Gelbfieberepidemien einem bestimmten zeitlichen Muster folgen." #NT!
 panum.523.f: "Historische Aufzeichnungen und aktuelle Daten legen nahe, dass Gelbfieber vor allem im Sommer auftritt. Warum die Krankheit nicht jährlich wie die Grippe auftritt, sondern über lange Zeiträume hinweg völlig verschwindet, konnte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] bisher nicht erklären. Auffällig ist, dass Gelbfieber besonders in regenreichen Jahren grassierte." #NT!
 panum.524.t: "Eine lokale Krankheit?" #NT!
 panum.524.d: "Bei der Beschreibung der Krankheit Gelbfieber betont Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Tatsache, dass Gelbfieber eine auf bestimmte Gebiete beschränkte Krankheit ist und sich, mit wenigen Ausnahmen, hauptsächlich in sumpfigen und tropischen Gebieten verbreitet." #NT!
 panum.524.f: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat mehrere Berichte und Aufzeichnungen über weitere Gelbfieberepidemien überprüft. Auffallend ist, dass diese in einem sehr begrenzten Gebiet stattfanden. Betroffen sind vor allem tropische Regionen und Sümpfe in Afrika und Amerika. Obwohl sich die Epidemie in einigen Fällen weiter nach Norden ausbreitet – beispielsweise nach Philadelphia in den USA und nach Barcelona in Spanien – ist der Arzt davon überzeugt, dass bestimmte Klimazonen etwas mit dem Auftreten der Krankheit zu tun haben. Dass es vereinzelte Ausbrüche der Krankheit in englischen Hafenstädten gab, stört [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] nicht – denn die Krankheit hat sich nicht viel weiter als bis in die Umgebung von Hafenstädten ausgebreitet." #NT!
  
