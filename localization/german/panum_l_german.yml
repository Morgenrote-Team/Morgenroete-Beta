 panum_vaccination_tech_desc: "Der Pockenimpfstoff ist der erste Impfstoff, der gegen eine ansteckende Krankheit entwickelt wurde. 1796 wies der britische Arzt Edward Jenner nach, dass eine Infektion mit dem relativ milden Kuhpockenvirus Immunität gegen das tödliche Pockenvirus verleiht." #NT!
  
