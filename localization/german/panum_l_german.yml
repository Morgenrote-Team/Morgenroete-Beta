 panum.2111.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]s Anatomie" #NT!
 panum.2111.d: "Im Kampf mit den örtlichen Behörden um den Ausbau der medizinischen Versorgung musste Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] feststellen, wie schlecht es um die Ausbildung junger Chirurgen bestellt ist. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] verfasste deshalb ein Standardwerk, um diesem Missstand Einhalt zu gebieten." #NT!
 panum.2111.f: "Henry Grays Anatomie des menschlichen Körpers, meist nur Gray’s Anatomy genannt, ist ein Buch über die menschliche Anatomie. Es gilt vor allem im englischsprachigen Raum als Klassiker des Faches. Die Erstausgabe erschien 1858 in Großbritannien und ein Jahr später in den USA unter dem Namen Gray’s Anatomy: Descriptive and Surgical." #NT!
 panum.2111.g: "Dieses Buch sollte jeder Schüler während seiner Ausbildung lesen." #NT!
 panum.2111.h: "Die praktische Anwendung ist wichtiger als die Lehre." #NT!
 panum.2112.t: "Diagramm der Todesursachen" #NT!
 panum.2112.d: "Bei Besuchen in Militärkrankenhäusern fiel Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] auf, wie wenig statistisches Material verwendet wurde, um junge Ärzte über die Gefahren von Infektionskrankheiten auf dem Schlachtfeld aufzuklären. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hat daher eine große Anzahl aussagekräftiger Diagramme erstellt." #NT!
 panum.2112.f: "Aufgrund einer Erkrankung, die sie sich im Krimkrieg zugezogen hatte, konnte sich Florence Nightingale kein Bild davon machen, wie die Situation in einer Kaserne, einem Lazarett oder einem Armenhaus aussehen würde. Sie konzentrierte sich daher darauf, Daten zu sammeln, diese aufzubereiten, zu analysieren und anschließend Schlussfolgerungen daraus zu ziehen. Fragebögen waren für ihre Arbeit ein wichtiges Instrument, außerdem nutzte sie vorhandenes Datenmaterial. Unter anderem wurden dadurch gravierende Probleme der militärischen Gesundheitsversorgung aufgezeigt. In ihrem Bericht an die britische Regierung fand Nightingale dafür deutliche Worte. Wenn jährlich 11 von 1.000 Zivilisten starben, von 1.000 in England stationierten Soldaten der Linieninfanterie, Artillerie und Guards jedoch 17, 19 und 20, dann wäre das ebenso verbrecherisch, wie jährlich 1.100 Mann auf die Salisbury Plain zu führen und dort zu erschießen. Florence Nightingale gilt als eine der Pionierinnen der grafischen Aufbereitung solcher Daten." #NT!
 panum.2112.g: "Diese Statistiken sollten von Sanitätern auf dem Schlachtfeld sorgfältig studiert werden." #NT!
 panum.2112.h: "Die praktische Anwendung ist wichtiger als die Lehre." #NT!
 panum.2113.t: "Omnis Zelle und Zelle" #NT!
 panum.2113.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat die bis dahin bekannte Zelltheorie um den Grundsatz erweitert, dass jede Zelle aus einer anderen Zelle entsteht und Krankheiten deshalb auch aus kranken Zellen entstehen. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hat diese These ausführlich in seinem Werk zur Zellularpathologie beschrieben, das als Handbuch in neuen Kliniken und Krankenhäusern verwendet wird." #NT!
 panum.2113.f: "Die Zellularpathologie ist eine Krankheitslehre, der zufolge Krankheiten auf Störungen der Körperzellen oder ihrer Funktionen beruhen. Sie wurde in den 1850er Jahren von Rudolf Virchow entwickelt, der 1855 auch den Begriff Zellularpathologie prägte. Sein gleichnamiges Werk wurde zu einem Standardwerk. Als zelltheoretisch begründetes Krankheitskonzept löste sie die bis dahin seit der Antike geltende Humoralpathologie ab und ist damit für eine umfassende Revolution der Vorstellungen von der Krankheitsentstehung und Krankheitsentwicklung im Allgemeinen verantwortlich. Gemeinsam mit der experimentellen Pharmakologie, Physiologie und Mikrobiologie bildet sie eine einheitliche Grundlage der klinischen Medizin und ein Fundament der naturwissenschaftlich fundierten Medizin." #NT!
 panum.2113.g: "Wissen über kranke Zellen sollte an Universitäten zum Standard gehören." #NT!
 panum.2113.h: "Dies ist eine äußerst wichtige Erkenntnis." #NT!
 panum.2114.t: "Geborener Krimineller" #NT!
 panum.2114.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat sich intensiv mit der Psyche von Kriminellen und der menschlichen Genetik beschäftigt und dabei herausgefunden, dass sich kriminelle Elemente schon an ihrer Physiognomie erkennen lassen. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]s zahlreiche Kontakte mit kranken Patienten, Geisteskranken und faulen Beamten im Zuge seiner Bemühungen, das Gesundheitswesen zu reformieren, haben [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] zutiefst inspiriert." #NT!
 panum.2114.f: "Inspiriert durch die Evolutionstheorie führte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Studien an Hunderten von Menschen in Zuchthäusern und Irrenanstalten durch und entdeckte, dass unter Kriminellen ein atavistischer Typus weit verbreitet ist. Bestimmte Formen der Kriminalität lassen sich demnach an Gesichtstypen und Schädelformen erkennen. Der Kriminelle wird nicht aus freien Stücken zum Kriminellen, sondern hat aufgrund seiner genetischen Veranlagung ein Problem, für das er 'nichts tun kann'. Der Kriminelle stellt einen eigenen anthropologischen Typus dar, den Homo deliquens. Er ist ein evolutionär rückständiger, früherer und primitiverer Menschentypus, der unmoralisch und instinktgesteuert daherkommt." #NT!
 panum.2114.g: "Sie sind also von Geburt an ein Krimineller." #NT!
  
 panum.2121.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]s Liebe zu Totenköpfen" #NT!
 panum.2121.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] setzte seine Dissertation in anthropologischer Kriminologie fort und vermaß dafür Tausende von Schädeln im ganzen Land. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] bewahrt einige davon sogar zu Hause auf." #NT!
 panum.2121.f: "'Die Kriminologie ist eine ernsthafte Naturwissenschaft, die viel zu lange in Philosophie versunken war. Meine Revolution besteht darin, sie mit demselben Empirismus auszustatten wie jede moderne Wissenschaft dieses Jahrhunderts. Biologie und Mathematik sind unbestechliche Fächer, und Psychiatrie und Kriminologie können von ihnen lernen. Wenn man jeden einzelnen Schädel misst und vergleicht - und das habe ich bei Tausenden von Kriminellen, Geisteskranken und Hingerichteten getan -, dann kann man statistische Daten sammeln, die immer wieder dasselbe statistische Ergebnis zeigen. Daraus lassen sich nahezu perfekte Werte ableiten, um auf die Asymmetrie des Gesichts des Verbrechers zu schließen. Diese präzisen Messungen sind viel sicherer als völlig haltlose Annahmen über den menschlichen Geist: hier haben wir Zahlen, Fakten, in kurzen empirischen Untersuchungen, dort bodenloses Geschwätz.'\n\nAus 'The Criminal Man' von [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.2121.g: "Ein... schönes Hobby." #NT!
 panum.2122.t: "Biologischer Determinismus" #NT!
 panum.2122.d: "Nach weiteren Monaten seines Studiums vertiefte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] seine bisherigen Thesen zum 'geborenen Verbrecher' und veröffentlichte weitere schockierende Erkenntnisse." #NT!
 panum.2122.f: "'Der Verbrecher ist ein Degenerierter. Während der Mensch sich weiterentwickelt, stellt der Verbrecher einen Rückschritt dar, eine Form des Abfalls vom Glauben. Er ist der ‚moderne Wilde‘, er lässt uns auf den Steinzeitmenschen zurückblicken, der weniger subtil, weniger schmerzempfindlich und weniger empathisch war. Der Verbrecher bemerkt das Leid des anderen nicht, ebenso wie er nur eine begrenzte Fähigkeit zum Mitgefühl hat. Da der Verbrecher aus einer kriminellen Veranlagung heraus handelt, kann man davon ausgehen, dass diese kriminelle Veranlagung vererbt wird. Man könnte also annehmen, dass, wenn Menschen ihre Taten nicht aus eigenem Willen, sondern aus biologischer Determination heraus begehen, dies ein strafmildernder Umstand sein sollte. Doch das Gegenteil ist der Fall, denn der Verbrecher lässt sich durch eine abschreckende Strafe nicht beeindrucken, er ist weder reintegrierbar noch berechenbar. Der Schutz der Gesellschaft steht im Vordergrund. Es ist daher besser, über lebenslange Haft oder die Todesstrafe nachzudenken. Wir können es nicht zulassen, dass diese gefährlichen Kriminellen unschuldigen Menschen Schaden zufügen.'\n\nAus 'Der kriminelle Mensch' von [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.2122.g: "Haben wir eine andere Wahl, als dies als vorherrschende Theorie zu akzeptieren?" #NT!
 panum.2123.t: "Ein gefährlicher Krimineller" #NT!
 panum.2123.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat die Physiognomie von [SCOPE.sCharacter('panum_victim_scope').GetFullName] und insbesondere die Schädelform von [SCOPE.sCharacter('panum_victim_scope').GetHerHis] sorgfältig studiert und ist zu dem Schluss gekommen, dass es sich bei [SCOPE.sCharacter('panum_victim_scope').GetSheHe] um eine höchstgefährliche Person mit krimineller Energie handelt, die sofort aus allen Diensten entfernt werden sollte – zum Schutz der Gesellschaft!" #NT!
 panum.2123.f: "'Die Diebe haben im Allgemeinen sehr bewegliche Gesichter und Hände; ihre Augen sind klein, unruhig, oft schielend; die Brauen sind gefaltet und aufeinander geprallt; die Nase ist krumm oder stumpf, der Bart ist spärlich, das Haar ist selten dicht, die Stirn ist fast immer klein und fliehend, das Ohr steht oft wie ein Henkel ab...\n\nDie Mörder haben einen glasigen, eisigen, starren Blick; ihre Augen sind manchmal blutunterlaufen. Die Nase ist groß, oft die eines Adlers oder eher eines Habichts; die Kiefer sind starkknochig, die Ohren lang, die Wangen breit, das Haar gelockt, voll und dunkel, der Bart oft spärlich; die Lippen sind dünn, die Eckzähne sind groß... Im Allgemeinen sind bei Kriminellen von Geburt an die Ohren henkelförmig, das Haar ist voll, der Bart ist spärlich, die Stirnhöhlen sind gewölbt, der Kiefer ist enorm, das Kinn ist eckig oder hervorstehend, die Wangenknochen sind breit.' -Cesare Lombroso" #NT!
 panum.2123.g: "Diese Person hat tatsächlich ein kriminelles Gesicht." #NT!
 panum.2123.h: "Der Arzt geht mit den [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]-Vorwürfen zu weit!" #NT!
 panum.2124.t: "Noch ein Totenkopfliebhaber!" #NT!
 panum.2124.d: "Heute hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] einen aufstrebenden Akademiker vorgestellt, der Schädel fast so sehr liebt wie [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]. Doktor [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetLastName] interessiert sich jedoch mehr für die Schädel toter Menschen." #NT!
 panum.2124.f: "'[SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetFullName] ist ein hervorragender Wissenschaftler, der versteht, wie wichtig es ist, Schädel zu untersuchen, um Rückschlüsse auf die Person zu ziehen, der der Schädel gehört. Leider beschäftigt sich [SCOPE.sCharacter('lepsius_new_anthropologist_scope').GetSheHe] nur mit den Schädeln von Menschen, die schon unermesslich lange tot sind. Unglaublich! Man kann nicht sicher sein, ob es sich wirklich um Kriminelle handelte. Was soll das bringen?'" #NT!
 panum.2124.g: "Das ist eine ... unerwartet angenehme Überraschung." #NT!
  
 panum.4003.t: "Das Ende der Pocken" #NT!
 panum.4003.d: "Trotz aller Widrigkeiten war unser Kampf gegen die Pocken ein unermesslicher Erfolg – ​​die Krankheit ist nun ausgerottet." #NT!
 panum.4003.f: "Für viele beginnt dieser Tag wie jeder andere, ohne zu wissen, was für ein großartiger Morgen das ist. Für diejenigen, die Bescheid wissen, ist es der Höhepunkt lebenslanger Arbeit, ein kaum vorstellbarer Traum, der endlich Wirklichkeit wird. Viele dachten nicht, dass dies zu ihren Lebzeiten erreicht werden könnte, dass es eine sagenhafte Arbeit für das späte zwanzigste oder sogar das einundzwanzigste Jahrhundert sein würde, und doch ist es hier und jetzt im Jahr [TimeKeeper.GetCurrentDate.Format('y')] geschafft. Der letzte bestätigte Fall endete ohne eine einzige neue infizierte Person, womit diese Krankheit der Vergangenheit angehört. Zum ersten Mal in der Geschichte schwebt die Bedrohung durch diese Krankheit über niemandem.\n\nUnd das bedeutet nur eines: Die Pocken gibt es nicht mehr.\n\nViele dachten, es wäre unmöglich... aber selbst diejenigen, die es nicht wissen, können nicht umhin, die Feierlichkeiten in Universitäten und Krankenhäusern zu hören, die Toasts von Ärzten und Wissenschaftlern zu sehen und zu wissen, dass dies ein guter Tag ist." #NT!
 panum.4003.g: "Der Mensch hat heute sein eigenes Wunder vollbracht." #NT!
  
 panum.2211.t: "Krankheitsforschung" #NT!
 panum.2211.d: "Im Laufe der [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] medizinischen Untersuchungen wurde Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] klar, dass [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] eine Krankheit eingehend erforschen wollte, über die in unserem Land nur sehr wenig veröffentlicht wurde, die sich jedoch in bestimmten Regionen zu einer weit verbreiteten Krankheit entwickelt hat." #NT!
 panum.2211.f: "Neben den großen Seuchen gibt es zahlreiche Alltags- und Volkskrankheiten, aber auch seit langem bekannte Geißeln der Menschheit, deren Ursachen und Heilungsmethoden noch immer unbekannt sind. Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] überlegt, ob er sich nicht einer ganz bestimmten Krankheit widmen sollte." #NT!
