 panum.2301.t: "Erfolgreiche Behandlung von [SCOPE.sCharacter('chosen_character').GetFullName]'s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2301.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat [SCOPE.sCharacter('chosen_character').GetFullName]s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] erfolgreich behandelt." #NT!
 panum.2301.f: "'Keine Sorge, Sir, diese Behandlung wird sicher wirken! Ich habe sie mindestens zweimal durchgeführt und nur ein Patient ist gestorben!'" #NT!
 panum.2301.g: "Gut!" #NT!
  
 panum.2302.t: "Neutrale Behandlung von [SCOPE.sCharacter('chosen_character').GetFullName]s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2302.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat [SCOPE.sCharacter('chosen_character').GetFullName]s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] behandelt, aber es hat sich nichts wirklich geändert." #NT!
 panum.2302.f: "'Ich dachte wirklich, dass es hilft, wenn ich genug Wasser trinke!'" #NT!
 panum.2302.g: "Wenigstens hat es nicht wehgetan." #NT!
  
 panum.2303.t: "Verpfuschte Behandlung von [SCOPE.sCharacter('chosen_character').GetFullName]s [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]" #NT!
 panum.2303.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] von [SCOPE.sCharacter('chosen_character').GetFullName] so schlecht behandelt, dass sich der Zustand von [SCOPE.sCharacter('chosen_character').GetHerHis] sogar noch weiter verschlechtert hat." #NT!
 panum.2303.f: "'Das ist diese Woche schon das dritte Mal passiert …'" #NT!
 panum.2303.g: "Das hätte nicht passieren dürfen!" #NT!
  
 panum.2304.t: "Tödliche [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')] Behandlung" #NT!
 panum.2304.d: "Leider war Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] während der [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]-Behandlung für den Tod des Patienten verantwortlich." #NT!
