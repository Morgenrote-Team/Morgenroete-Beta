 panum.2621.t: "Das Konzept der Angst" #NT!
 panum.2621.d: "Søren Kierkegaard, Dänemarks führender Philosoph, hat 'Der Begriff der Angst' veröffentlicht, ein ästhetisches, philosophisches und psychologisches Werk, das die Aufmerksamkeit des Kopenhagener Publikums auf sich gezogen hat." #NT!
 panum.2621.f: "'Die Möglichkeit der Freiheit ist nicht die Fähigkeit, zwischen Gut und Böse zu wählen. Die Möglichkeit ist, dazu in der Lage zu sein. In einem logischen System ist es bequem zu sagen, dass die Möglichkeit in die Wirklichkeit übergeht. In Wirklichkeit ist dies jedoch nicht so bequem, und es ist ein Zwischenbegriff erforderlich. Der Zwischenbegriff ist Angst, aber er erklärt den qualitativen Sprung ebenso wenig, wie er ihn ethisch rechtfertigen kann. Angst ist weder eine Kategorie der Notwendigkeit noch eine Kategorie der Freiheit; es ist eine verwickelte Freiheit, bei der die Freiheit nicht an sich frei, sondern verwickelt ist, nicht durch Notwendigkeit, sondern an sich.' -Sören Kierkegaard" #NT!
 panum.2621.g: "Einer der größten Köpfe Dänemarks." #NT!
 panum.2621.h: "Kierkegaard wird Dänemarks neuer Nationalschriftsteller." #NT!
 panum.2622.t: "Der seltsame Fall von [SCOPE.sCharacter('panum_phineas_gage').GetFullName]" #NT!
 panum.2622.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat den seltsamen Fall von Vorarbeiter [SCOPE.sCharacter('panum_phineas_gage').GetFullName] untersucht. Bei einer Explosion schoss eine Eisenstange von unten nach oben durch seinen Schädel und hinterließ einen großen Wundkanal. Laut Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] war er körperlich nach einigen Wochen wieder genesen und auch seine geistigen Fähigkeiten, darunter Wahrnehmung, Gedächtnis, Intelligenz, Sprachfähigkeit sowie seine Motorik waren vollständig intakt. Bei [SCOPE.sCharacter('panum_phineas_gage').GetLastName] kam es in der Zeit nach dem Unglück jedoch zu deutlichen Persönlichkeitsveränderungen." #NT!
 panum.2622.f: "'Schrecklicher Unfall. - Als [SCOPE.sCharacter('panum_phineas_gage').GetFullName], ein Vorarbeiter bei der Eisenbahn in [SCOPE.sState('panum_phineas_gage_state').GetName], gestern damit beschäftigt war, eine Sprengung vorzubereiten, explodierte das Pulver und durchbohrte seinen Kopf mit einem Eiseninstrument von einem Umfang von 1 1/4 Zoll und einer Länge von 3 Fuß und 8 Zoll, das er zu diesem Zeitpunkt benutzte. Das Eisen drang auf der rechten Seite seines Gesichts ein, zertrümmerte den Oberkiefer, ging hinter dem linken Auge hindurch und trat oben am Kopf wieder aus.\n\nDas merkwürdigste an dieser traurigen Angelegenheit ist, dass er heute Nachmittag um zwei Uhr noch am Leben und bei vollem Verstand und frei von Schmerzen war.\n\nDie [ROOT.GetCountry.GetCapital.GetCityHubName]-Chronik" #NT!
 panum.2622.g: "Also hängen Psyche und Gehirnareale zusammen?" #NT!
 panum.2623.t: "Transkulturelle Psychologie" #NT!
 panum.2623.d: "Bei einem Besuch in [SCOPE.sState('panum_colonial_state').GetName] stellte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] erstaunt fest, dass psychische Erkrankungen, wie sie in [ROOT.GetCountry.GetCapital.GetCityHubName] häufig vorkommen, in diesem Bereich kaum vorkommen." #NT!
 panum.2623.f: "Emil Kraepelin reiste 1904 für vier Monate nach Java und untersuchte in der Irrenanstalt Buitenzorg (heute Bogor) 225 Personen. Als einziger führender Psychiater seiner Zeit, der sich für die Erforschung transkultureller Phänomene in der Psychiatrie interessierte, wollte er zum einen herausfinden, ob gewisse Formen des Wahnsinns, die den Hauptinhalt unserer Anstalten bilden, auch unter ganz anderen Lebensbedingungen und bei ganz anderen Stämmen in gleicher Weise und mit gleicher Häufigkeit vorkommen wie bei uns'. Zum anderen prophezeite er, dass 'Häufigkeit und Formen des Wahnsinns einst eine reiche Fundgrube für ein tieferes Verständnis der Eigentümlichkeiten eines Volkes bilden werden'." #NT!
 panum.2623.g: "Offenbar hängen manche Neurosen mit dem kulturellen Hintergrund zusammen." #NT!
 panum.2624.t: "Medikamente" #NT!
 panum.2624.d: "Chefchemiker [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] hat in letzter Zeit auf Anregung von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mehrfach mit Substanzen experimentiert, um wirksame Psychopharmaka herzustellen. Das Ergebnis war allerdings... überraschend." #NT!
 panum.2624.f: "'Sie wollten mich dringend sehen?'\n'Ja. Ich vermute, das Experiment war erfolgreich.'\n'Sie vermuten?'\n'Das neue Medikament wirkt auf jeden Fall schmerzstillend. Es wirkt gegen Müdigkeit. Und es hilft gegen Angst. Vielleicht sogar ein bisschen zu gut.'" #NT!
 panum.2624.g: "Lysergsäurediethylamid? Was ist das?" #NT!
 panum.2624.h: "Unseren Soldaten würde etwas Panzerschokolade guttun." #NT!
 panum.2625.t: "Psychophysik" #NT!
 panum.2625.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat einige interessante Theorien über die Wechselbeziehung zwischen subjektivem psychologischem Erleben und quantitativ messbaren physischen Reizen aufgestellt." #NT!
 panum.2625.f: "Die Psychophysik untersucht quantitativ die Beziehung zwischen physikalischen Reizen und den von ihnen hervorgerufenen Empfindungen und Wahrnehmungen. Psychophysik wird als 'wissenschaftliche Untersuchung der Beziehung zwischen Reiz und Empfindung' beschrieben. Viele der klassischen Techniken und Theorien der Psychophysik wurden 1860 von Gustav Theodor Fechner formuliert. Er prägte den Begriff 'Psychophysik' und beschrieb damit Forschungen, die darauf abzielen, physikalische Reize mit Bewusstseinsinhalten wie Empfindungen in Beziehung zu setzen. Als Physiker und Philosoph wollte Fechner eine Methode entwickeln, die Materie mit dem Geist in Verbindung bringt und die öffentlich beobachtbare Welt mit den privat erlebten Eindrücken einer Person davon verbindet. Fechners Arbeit wurde von Charles S. Peirce studiert und erweitert, der von seinem Schüler Joseph Jastrow unterstützt wurde, der bald selbst ein angesehener Experimentalpsychologe wurde." #NT!
 panum.2625.g: "Ich habe kein Wort verstanden, aber die Boni sehen gut aus!" #NT!
  
