 panum.55.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] kann eine ausländische Krankheit beschreiben" #NT!
 panum.55.d: "In einem anderen Land gibt es einen Krankheitsausbruch, den Ihr [concept_panum_physician] untersuchen könnte, um die Krankheit zu beschreiben." #NT!
 panum.55.g: "Schicken Sie sofort unseren Arzt!" #NT!
 panum.55.h: "Im Moment nicht." #NT!
 panum.55.i: "Benachrichtigen Sie mich auf eine weniger aufdringliche Art und Weise." #NT!
 panum.55.j: "Erzähl mir nichts mehr davon." #NT!
 panum_foreign_disease_research_only_notification_tt: "Ab sofort werden Sie mit #V Benachrichtigungen#! über die Möglichkeit informiert, Ihre [concept_panum_physician] in Länder mit Krankheiten zu versenden." #NT!
 panum_foreign_disease_research_no_notification_tt: "Sie werden #n nicht mehr#! über die Möglichkeit informiert, Ihre [concept_panum_physician] in Länder mit Krankheiten zu senden." #NT!
  
 panum.56.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] kann eine Behandlung für eine ausländische Krankheit finden" #NT!
