 panum_cholera_condition: "Cholera" #NT!
 panum_cholera_condition_desc: "Cholera ist eine gefährliche Erkrankung des Dünndarms. Sie gilt als prägende Epidemie des 19. Jahrhunderts und forderte weltweit Millionen Todesopfer." #NT!
 panum_tuberculosis_condition: "Tuberkulose" #NT!
 panum_tuberculosis_condition_desc: "Tuberkulose gilt neben Cholera als eine der häufigsten Todesursachen im viktorianischen Zeitalter. Sie wird auch als Schwindsucht bezeichnet und befällt vor allem die Lunge." #NT!
 panum_smallpox_condition: "Pocken" #NT!
 panum_smallpox_condition_desc: "Pocken sind für ihre Pusteln bekannt, die Gesicht und Körper entstellen, und gelten seit langem als eine der tödlichsten Krankheiten der Geschichte." #NT!
 panum_typhus_condition: "Typhus" #NT!
 panum_typhus_condition_desc: "Typhus hat Soldaten über Jahrhunderte hinweg terrorisiert, insbesondere in den Napoleonischen Kriegen, als er Tausende von Soldaten tötete. Er wütete immer wieder nach Naturkatastrophen." #NT!
 panum_yellow_fever_condition: "Gelbfieber" #NT!
 panum_yellow_fever_condition_desc: "Gelbfieber befällt vor allem die tropischen Gebiete Südamerikas und Afrikas. In der Karibik hat die Krankheit mehr Soldatenleben gefordert als jeder Krieg." #NT!
 panum_measles_condition: "Masern" #NT!
 panum_measles_condition_desc: "Masern sind eine hoch ansteckende Krankheit, die für ihre typischen roten Flecken auf der Haut bekannt ist. Sie kann katastrophale Folgen haben, insbesondere bei Bevölkerungsgruppen, die nicht über eine Immunität verfügen." #NT!
 panum_scarlet_condition: "Scharlach" #NT!
 panum_scarlet_condition_desc: "Scharlach ist eine weit verbreitete Krankheit, die bis Anfang des 20. Jahrhunderts eine der häufigsten Todesursachen bei Kindern war." #NT!
 panum_plague_condition: "Pest" #NT!
 panum_plague_condition_desc: "Die Beulenpest wird mit dem 'Schwarzen Tod' des Mittelalters gleichgesetzt, der zu den schlimmsten Katastrophen der Geschichte zählt. Der Name leitet sich von den geschwollenen, schmerzhaften Beulen ab." #NT!
 panum_diphteria_condition: "Diphterie" #NT!
 panum_diphteria_condition_desc: "Diphtherie ist eine gefährliche Erkrankung, die zu lebensbedrohlichen Komplikationen und Langzeitfolgen führen kann." #NT!
 panum_polio_condition: "Polio" #NT!
 panum_polio_condition_desc: "Poliomyelitis ist eine Krankheit, die vorwiegend Kinder befällt und oft zum Tod oder zu lebenslangen körperlichen Komplikationen führt." #NT!
  
