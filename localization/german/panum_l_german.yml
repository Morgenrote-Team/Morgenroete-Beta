 panum.61.t: "Das medizinische Behandlungsteam verlässt" #NT!
 panum.61.d: "Nachdem die wissenschaftlichen Mitarbeiter unseren einheimischen Ärzten die modernen medizinischen Behandlungsmethoden aus unserem Herrscherland nähergebracht haben, verabschieden sie sich und kehren in ihre Heimat zurück." #NT!
 panum.61.f: "'Das einzig Wichtige, wenn wir gehen, werden die Spuren der Liebe sein, die wir hinterlassen.' -Albert Schweitzer" #NT!
 panum.61.g: "Unser Oberherr kümmert sich um uns?" #NT!
 panum.62.t: "Medizinisches Impfteam verlässt" #NT!
