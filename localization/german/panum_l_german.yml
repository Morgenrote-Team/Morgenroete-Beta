 panum.600.t: "Masernepidemie" #NT!
 panum.600.d: "In einem unserer Bundesländer ist eine Epidemie ausgebrochen: #YELLOW Masern#! wüten in [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.600.f: "Masern wurden wie Pocken bereits im 10. Jahrhundert vom persischen Arzt Rhazes erwähnt und scheinen im gesamten Mittelalter im eurasischen Raum weit verbreitet gewesen zu sein. In Europa waren Masern bis ins 19. Jahrhundert endemisch und gewannen mit zunehmender Urbanisierung noch mehr an Bedeutung. Ein besonderes Merkmal von Masenr ist der Ausschlag, der im Gesicht und am Hals beginnt und sich innerhalb weniger Tage über den gesamten Körper ausbreitet. Masern gelten neben Pocken als eine der Krankheiten, die im 16. Jahrhundert große Teile der indischen Urbevölkerung befielen." #NT!
 panum.600.g: "Aber das ist doch nur eine harmlose Kinderkrankheit, oder?" #NT!
 panum.620.t: "Masernepidemie beendet" #NT!
 panum.620.d: "Die Masernepidemie ist offenbar vorbei. Ein letztes Elternpaar hat sein totes Kind beerdigt." #NT!
 panum.620.f: "'Wie die Masern ist die Liebe am gefährlichsten, wenn sie spät im Leben kommt.' -Lord Byron" #NT!
  
 panum.602.t: "Masernepidemie erreicht [SCOPE.sCountry('panum_infected_country').GetName]" #NT!
 panum.602.d: "Wir haben die Meldung erhalten, dass heute in [SCOPE.sCountry('panum_infected_country').GetName] die ersten Masernfälle gemeldet wurden. Die Behörden werfen uns vor, nicht genug getan zu haben, um die Ausbreitung zu verhindern." #NT!
 panum.602.g: "Es gab keine Möglichkeit, dies zu verhindern." #NT!
 panum.603.t: "Masern töten Kinder" #NT!
 panum.603.d: "Im Jahr [SCOPE.sState('panum_disease_state').GetName] verlief der Masernausbruch weitaus heftiger als erwartet. Die Epidemie wütete besonders unter Säuglingen und Kleinkindern und schwächte eine ganze Generation dauerhaft." #NT!
 panum.603.f: "Masern wurden immer als Kinderkrankheit angesehen, obwohl sie auch Erwachsene betreffen können. Sie zeigt ihre verheerendsten Auswirkungen zwischen dem zweiten und dritten Lebensjahr. Danach sinkt die Sterberate rapide. 1963, bevor es einen Impfstoff gab, schätzten offizielle Statistiken, dass es weltweit jedes Jahr 2 Millionen Todesfälle durch Masern gab. Etwa 5 bis 10 Prozent der Krankheitsfälle endeten tödlich." #NT!
 panum.603.g: "Gibt es keine Heilung für diese schreckliche Krankheit?" #NT!
 panum.604.t: "Masern lähmen Seeleute" #NT!
 panum.604.d: "Aus mysteriösen Gründen betrafen die Masern in [SCOPE.sState('panum_disease_state').GetName] besonders Fischer und Seeleute. Die Sterberaten sind vernachlässigbar, aber der Arbeitsverlust in den Fischwerken und bei den Walfängern ist spürbar." #NT!
 panum.604.f: "Bei seinen Forschungen auf den Färöer-Inseln stellte Peter Panum fest, dass Masern auch Erwachsene betrafen, vor allem in isolierteren Bevölkerungsgruppen. Die Gründe dafür blieben lange Zeit im Dunkeln; grundsätzlich fiel aber auf, dass vor allem Fischer und ihre Familien betroffen waren, die abseits der belebteren Städte lebten." #NT!
 panum.604.g: "Aber wer fährt heute zur See?" #NT!
 panum.605.t: "Kindersprechstunde für Masern" #NT!
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName] hat festgestellt, dass in [SCOPE.sState('panum_disease_state').GetName] viele Kinder an Masern erkranken, vor allem in ärmeren Familien, wo die Sterberate höher ist. Der Politiker möchte eine Kinderklinik für Masern finanzieren und hat um eine öffentliche Spende gebeten." #NT!
 panum.605.f: "'Es ist eine Schande, die guten Eltern von [SCOPE.sState('panum_disease_state').GetName] dieser schrecklichen Krankheit ausgeliefert zu sehen. Die Politiker müssen handeln und Verantwortung übernehmen. Viel zu lange wurde von zu vielen viel zu wenig getan. Ein Kinderkrankenhaus sollte helfen, das Wertvollste zu schützen, was Eltern haben. Wir werden helfen. Das verspreche ich Ihnen. Solange ich [SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting] heiße … was soll das heißen, ich halte Wahlreden?'" #NT!
 panum.605.g: "Eine Initiative, die es wert ist, unterstützt zu werden." #NT!
 panum.605.h: "Dieser Partei geht es lediglich darum, die Krankheit für politische Zwecke auszunutzen." #NT!
 panum.606.t: "Masern Depression" #NT!
 panum.606.d: "'Die vielen kranken und toten Kinder in [SCOPE.sState('panum_disease_state').GetName] haben bei vielen Eltern Spuren hinterlassen. Manche sprechen von zahlreichen Menschen, die sich in einer Lebenskrise befinden.'" #NT!
 panum.606.f: "'Frau Miller musste diesen Monat ihr drittes Kind begraben. Sie ist nur eine von vielen Müttern, die nun kinderlos sind. Herr Miller, der in der Stadt eine Bäckerei betreibt, hat seinen Laden seit mehreren Wochen geschlossen. Wie die Millers geht es vielen Familien in dieser Gegend. Es gibt kaum einen Clan, der nicht ein Kind verloren hat. Doch der Fatalismus schlägt seit Wochen in Unzufriedenheit um. Die Menschen in dieser Region sind deutlich sensibler geworden, wenn sich die Umstände weiter verschlechtern. Viele Menschen geben inzwischen der Regierung die Schuld für ihr Elend.'\n\nArtikel aus dem [SCOPE.sState('panum_disease_state').GetCityHubName] Herald" #NT!
 panum.606.g: "Angesichts der Situation nicht ganz unverständlich." #NT!
  
 panum.622.t: "Masern-Inkubation" #NT!
 panum.622.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat eine sorgfältige Liste von Masernfällen zusammengestellt, die im Wesentlichen die Inkubationszeit der Masern zeigt." #NT!
 panum.622.f: "'Es lässt sich nicht leugnen, dass das Desquamationsstadium ansteckend sein kann, aber man sollte mit dieser Ansicht vorsichtig sein, da man aus allgemeinen Gründen das Gegenteil vermuten würde. Es scheint fast, als ob man, weil man sich eine so lange Latenzzeit nicht vorstellen konnte, ein späteres Stadium der Krankheit als das ansteckende gewählt hat. In den Dörfern Hove und Lobre auf Suderø gab es gegen Ende der Epidemie ein Intervall von mehr als vierzehn Tagen zwischen den Exanthem-Generationen im selben Haushalt, ohne dass ich eine Neuinfektion von außen nachweisen konnte; doch können diese beiden Fälle durch eine Infektion erklärt werden, die während der Rekonvaleszenz übertragen wurde. Auf Grundlage der hier vorgelegten Daten kann die Inkubationszeit der Masern meiner Meinung nach mit großer Sicherheit auf etwa vierzehn Tage geschätzt werden, ohne jedoch darauf zu bestehen, dass dieses Intervall nicht durch besondere Umstände, wie beispielsweise eine Reise, verändert werden kann; Viele Faktoren sprechen a priori gegen ein solches absolutes Diktum, ebenso wie die Analogie zur Unsicherheit der Latenzzeiten anderer Krankheiten.' -Peter Panum" #NT!
 panum.623.t: "Masern Einzigartigkeit" #NT!
 panum.623.d: "In einem neuen Zwischenschritt differenzierte Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] zwischen verschiedenen Formen der Masern und stellte dabei nicht nur die Unterschiede zu anderen, ähnlichen Erkrankungen wie Pocken, Röteln und Masern fest, sondern hob auch die spezifischen Symptome hervor." #NT!
 panum.623.f: "'Die Literatur über Masern ist im Vergleich zu anderen akuten Exanthemen wie beispielsweise Scharlach und Pocken unbedeutend und unvollständig. Abgesehen von vereinzelten Berichten in Zeitschriften über einzelne Ausbrüche gibt es nur wenige Monographien, von denen einige aus dem vorigen Jahrhundert stammen. Dieses Exanthema, das griechischen und arabischen Ärzten sicherlich unbekannt war, war selbst im letzten Jahrhundert so unzureichend differenziert, dass de Haën aufgrund der Symptome die Identität von Masern und Pocken beibehielt und Autoren vor dem Ende des 17. Jahrhunderts beide Krankheiten als zur selben Familie gehörend beschrieben.' -Peter Panum" #NT!
 panum.624.t: "Jungfernpopulationen und lebenslange Immunität" #NT!
 panum.624.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] konnte kürzlich sehr deutlich zeigen, dass eine Maserninfektion bei einem Menschen nicht wieder auftritt. Bevölkerungsgruppen, die noch nie mit der Krankheit in Berührung gekommen sind, sind daher besonders gefährdet." #NT!
 panum.624.f: "'In diesem Zusammenhang ist es jedoch recht bemerkenswert, dass von den vielen alten Menschen, die noch auf den Färöern leben und 1781 an Masern erkrankt waren, nicht einer, soweit ich durch sorgfältige Nachforschungen herausfinden konnte, ein zweites Mal angesteckt wurde. Ich selbst habe 98 solcher alten Menschen gesehen, die verschont blieben, weil sie die Krankheit in ihrer Jugend gehabt hatten. Dies war umso bemerkenswerter, als ein hohes Alter die Anfälligkeit für Masern keineswegs verringerte, da meines Wissens alle alten Menschen, die in ihrem früheren Leben keine Masern durchgemacht hatten, angesteckt wurden, als sie der Infektion ausgesetzt waren; wohingegen bestimmte junge Menschen, obwohl sie ständig der Infektion ausgesetzt waren, verschont blieben. Wenn eine Genesung von Masern vor 65 Jahren Menschen vor einem zweiten Anfall schützen konnte, könnte man annehmen, dass eine Genesung vor kürzerer Zeit einen noch größeren Schutz bietet' – Peter Panum" #NT!
  
 panum.700.t: "Scharlach-Epidemie" #NT!
 panum.700.d: "In einem unserer Bundesländer ist eine Epidemie ausgebrochen: #YELLOW Scharlach#! wütet in [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.700.f: "Scharlach ist seit der Antike bekannt und wurde im 17. Jahrhundert gut beschrieben, insbesondere von Thomas Sydenham. Obwohl Scharlach im 18. Jahrhundert anscheinend weniger gefährlich wurde, schlug er im 19. Jahrhundert in neuer Form zurück. Pierre Fidèle Bretonneau beispielsweise gab an, um 1800 keinen einzigen tödlichen Fall von Scharlach gekannt zu haben, während er 1824 in Tours eine Epidemie mit so hoher Sterblichkeit beobachtete, dass er Scharlach auf eine Stufe mit Pest und Cholera stellte. Scharlach geht mit einem charakteristischen Ausschlag einher. Im Gegensatz zu Pocken oder Masern ist Scharlach durch einen geschwollenen Mandelbereich und eine erdbeerfarbene Zunge gekennzeichnet." #NT!
 panum.700.g: "Jedes Kind muss das irgendwann durchmachen. Hoffentlich." #NT!
 panum.720.t: "Scharlach-Epidemie endet" #NT!
 panum.720.d: "Die Scharlach-Epidemie, die unser Land erfasst hat, verlässt langsam die Städte und Dörfer. Unzählige Eltern atmen erleichtert auf." #NT!
 panum.720.f: "'Es ist wie Scharlach: Man muss es überwinden.'\n\n'Dann sollte man eine Methode erfinden, Liebe zu impfen, wie eine Impfung.' -Leo Tolstoi" #NT!
  
 panum.722.t: "Altes Wissen" #NT!
 panum.722.d: "Über einen Antiquitätenhändler konnte [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] mehrere alte Bücher finden, die Beschreibungen des Scharlachs aus der Vergangenheit zusammenfassen und auch heute noch nützlich sein könnten." #NT!
 panum.722.f: "Ob Scharlach schon in der Antike bekannt war oder ob er mit ähnlichen Krankheiten wie Diphtherie, Masern und Röteln verwechselt wurde, lässt sich nicht mit Sicherheit sagen. Belege für eine dem Scharlach ähnliche Krankheit gibt es bereits bei Celsus, Caelius Aurelianus, Arataeus von Kappadokien und Aetius von Amida. Ähnliche Beschreibungen finden sich im arabisch-persischen Raum ab dem Mittelalter, nämlich bei Avicenna, Ali Abbas und Rhazes. Die erste definitive Beschreibung des Scharlachs ist eine Beschreibung von Giovanni Filippo Ingrassia aus dem Jahr 1553. Eine weitere wichtige Position nimmt der Arzt Daniel Sennert ein, ebenfalls aus dem 16. Jahrhundert. Der Name ‚Scarlatina‘ geht auf Thomas Sydenham und seine Beschreibung aus dem Jahr 1675 zurück. Obwohl Sydenhams Beschreibung als maßgeblich gilt, weist sie erhebliche Lücken auf, und auch in England scheint die Bezeichnung Scharlach bereits Mitte des 16. Jahrhunderts weit verbreitet gewesen zu sein." #NT!
 panum.723.t: "Scharlach Symptome" #NT!
 panum.723.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat in seiner Beschreibung des Scharlachses Fortschritte gemacht und erstmals die Symptome zusammengefasst." #NT!
 panum.723.f: "'Die Patienten haben Schüttelfrost und Frösteln, genau wie bei anderen Fieberanfällen. Die Symptome sind jedoch mäßig; danach ist die ganze Haut mit kleinen roten Flecken bedeckt, die dicker sind als bei Masern, aber auch breiter, rötlicher und weniger gleichmäßig. Diese bleiben zwei oder drei Tage bestehen und verschwinden dann. Der Patient hat nicht nur einen Ausschlag, sondern auch eine Mandelentzündung. Es können Komplikationen wie Rheuma und Wassersucht auftreten.'\n\nEin Brief von Doktor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] an die Medizinische Fakultät" #NT!
 panum.724.t: "Scharlach liebt den Kehlkopf nicht" #NT!
 panum.724.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat die spezifischen Unterschiede zwischen den Krankheiten Scharlach und Diphtherie identifiziert." #NT!
 panum.724.f: "'Bei Scharlach breitet sich die Entzündung weit über Mandeln, Gaumen und Rachen aus und ist nicht wie bei Diphterie zunächst auf eine Stelle beschränkt; und zweitens hat die Scharlachentzündung des Rachens keine Tendenz, sich in die Atemwege auszubreiten. Kurz gesagt: Scharlach liebt den Kehlkopf nicht.'\n\nEin Brief von Doktor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] an die Medizinische Fakultät" #NT!
  
 panum_plague_quarantine_modifier: "Pest-Quarantäne" #NT!
 panum_plague_hospitals_modifier: "Pesthäuser" #NT!
 panum_plague_burn_everything_modifier: "Verbrenne alles!" #NT!
 panum_plague_rat_killer_modifier: "Töte alles!" #NT!
 panum_plague_loss_of_trust_modifier: "Vertrauensverlust" #NT!
  
 panum.800.t: "Die Rückkehr der Pest" #NT!
 panum.800.d: "Seit einigen Jahren gibt es Gerüchte, dass die Pest in Teile unseres Landes zurückgekehrt ist. Zuvor war dies auf abgelegene ländliche Gebiete beschränkt. Mit dem Ausbruch in [SCOPE.sState('panum_disease_state').GetName] ist jedoch endgültig klar: Die Pest streckt erneut ihre knorrigen Finger aus!" #NT!
 panum.800.f: "Die dritte Pestpandemie (nach der Justinianischen Pest im 6. Jahrhundert und dem 'Schwarzen Tod' im 14. Jahrhundert) begann Ende des 19. Jahrhunderts in China. Man geht davon aus, dass die Pandemie von Yunnan ausging, wo es bereits 1792, 1855 und erneut 1866 zu Ausbrüchen kam. Ein Ausbruch in der benachbarten Stadt Guangzhou ab Januar 1894 forderte 80.000 Todesopfer. Ab März 1894 wurden britische Wissenschaftler und Ärzte in Hongkong auf den Ausbruch aufmerksam. Nach den Cholerawellen der vergangenen Jahrzehnte erwartete man, dass die Pestwelle vor allem in China und Indien viele Todesopfer fordern und letztlich zu staatlicher Instabilität führen würde. Weltweit würde sie schätzungsweise 15 Millionen Menschenleben kosten." #NT!
 panum.800.g: "Unmöglich! Die Pest ist eine Krankheit der vergessenen Vergangenheit!" #NT!
  
 panum.820.t: "Ende der Pestepidemie" #NT!
 panum.820.d: "Die schreckliche Pest, eine der schlimmsten Geißeln der Menschheit, hat unser Land wieder verlassen. Hoffen wir, dass sie dorthin zurückkehrt, wo sie hingehört: in den Abgrund der Geschichte." #NT!
 panum.820.f: "'Aber was bedeutet sie, die Pest? Sie ist das Leben, das ist alles.' -Albert Camus" #NT!
  
 panum.802.t: "Die Pest breitet sich auf [SCOPE.sCountry('panum_infected_country').GetName] aus" #NT!
 panum.802.d: "Auch jenseits unserer Grenzen werden inzwischen Pestfälle gemeldet. Offenbar gelang es den Behörden nicht, die Seuche einzudämmen. Der [SCOPE.sCountry('panum_infected_country').GetAdjectiveNoFlag] Botschafter erhob schwere Vorwürfe gegen uns." #NT!
 panum.802.g: "Auf lange Sicht kriegt die Plage jeden..." #NT!
 panum.803.t: "Pestepidemie" #NT!
 panum.803.d: "In einem unserer Staaten ist eine Epidemie ausgebrochen: #YELLOW Die Pest#! wütet in [SCOPE.sState('panum_disease_state').GetName]!" #NT!
 panum.803.g: "Der Schwarze Tod steht vor der Tür." #NT!
 panum.804.t: "Die Pest: Eine dritte Welle" #NT!
 panum.804.d: "Beunruhigende Nachrichten erreichen uns aus [SCOPE.sCountry('panum_plague_country').GetName]. Dort soll vor wenigen Wochen eine heftige Seuche gewütet haben. Ärzte sind besorgt: Es soll sich um die berüchtigte Pest handeln." #NT!
 panum.804.g: "Zur Vorbereitung darauf sollten wir eine medizinische Expedition zusammenstellen." #NT!
 panum.805.t: "Pest-Quarantäne" #NT!
 panum.805.d: "Die Lage in [SCOPE.sState('panum_disease_state').GetName] droht außer Kontrolle zu geraten. Einflussreiche Politiker, Behördenchefs und Privatpersonen fordern eine Quarantäne, um eine weitere Ausbreitung der Seuche zu verhindern. Dabei handelt es sich vor allem um Menschen, die nicht in [SCOPE.sState('panum_disease_state').GetName] leben." #NT!
 panum.805.f: "Umfangreiche, strenge Quarantänen hatten sich bereits im Mittelalter bewährt. Tatsächlich geht der Begriff Quarantäne auf das Wort 40 im Italienischen zurück und wurde offenbar erstmals zu Pestzeiten eingesetzt. Besonders die Republik Venedig war als Handelsnation mit ausgedehntem Schiffsverkehr für diese Maßnahme bekannt, da Hafen- und Handelsstädte besonders häufig von Seuchen betroffen waren." #NT!
 panum.805.g: "Das gesamte Gebiet sollte unter Quarantäne gestellt werden." #NT!
 panum.805.h: "Wir sollten nicht überdramatisieren." #NT!
 panum.806.t: "Pesthäuser" #NT!
 panum.806.d: "Die örtlichen Behörden in [SCOPE.sState('panum_disease_state').GetName] haben den Vorschlag gemacht, Pesthäuser zu errichten, um die gesunde Bevölkerung besser von der kranken Bevölkerung zu isolieren. Dies würde insbesondere die ärmeren Schichten treffen, die nicht wie die Reichen fliehen können." #NT!
 panum.806.f: "Ein Pesthaus diente der Versorgung von Pestkranken während Pestepidemien. Da die Seuche während der Hochphase dieser Krankheitswellen, im Spätmittelalter und in der frühen Neuzeit, als unheilbar galt und deshalb nur durch ärztliche Versorgung Linderung verschaffte, sollten Pesthäuser vor allem die Kranken von der gesunden Bevölkerung isolieren. Zu diesem Zweck wurden Pesthäuser ähnlich Leprosorien meist außerhalb oder am Rande einer Stadt errichtet. Ein anderer Pesthaustyp sollte der Prävention im Sinne einer Quarantänezeit dienen. Menschen, in deren unmittelbarer Umgebung die Pest aufgetreten war, wurden in das Pesthaus gebracht, das sie nur verlassen durften, wenn sie sich als nicht infiziert herausstellten." #NT!
 panum.806.g: "Es ist nur zu ihrem Besten. Auch wenn sie das nicht wollen." #NT!
 panum.806.h: "Das würde nur Unruhe provozieren." #NT!
 panum.807.t: "Der Pestarzt" #NT!
 panum.807.d: "Der leitende Arzt in einem unserer Pestkrankenhäuser in [SCOPE.sState('panum_disease_state').GetName] hat auf diesem Gebiet so viel Erfahrung gesammelt, dass er auf nationaler Ebene eine wertvolle Hilfe sein könnte." #NT!
 panum.807.f: "'Lassen Sie mich durch! Ich bin Arzt. Und ich weiß genau, wie ich mit dieser Krankheit umgehen muss.'" #NT!
 panum.807.g: "Geben Sie dem Arzt eine hochrangige Position als Arzt." #NT!
 panum.808.t: "Die Flucht der Reichen" #NT!
 panum.808.d: "Die Zahl der Auswanderer in [SCOPE.sState('panum_disease_state').GetName] nimmt täglich zu. Vor allem jene Familien, die es sich leisten können, versuchen der Pest zu entgehen. Der Unmut unter denen, die sich eine solche Flucht nicht leisten können, ist groß. Andere warnen, dass dies die Ausbreitung der Pest noch verstärken wird." #NT!
 panum.808.f: "'Einige wiederum, vielleicht die vernünftigsten im Urteil, da sie auch die schroffsten von allen waren, behaupteten, dass es kein Heilmittel für die Krankheit gäbe, das der Flucht überlegen oder gleich wirksam wäre. Nach dieser Verschreibung verließen eine Menge Männer und Frauen, die alles außer sich selbst vernachlässigten, ihre Stadt, ihre Häuser, ihren Besitz, ihre Verwandten, ihre Güter und gingen freiwillig ins Exil oder wanderten aufs Land aus, als ob Gott, wenn er die Menschen mit dieser Pest zur Vergeltung ihrer Sünden heimsuchte, sie nicht mit seinem Zorn verfolgen würde, wo immer sie auch sein mochten, sondern die Vernichtung nur derjenigen beabsichtigte, die innerhalb der Mauern der Stadt zurückblieben; oder vielleicht meinten sie, dass es jetzt Zeit für alle sei, aus der Stadt zu fliehen, und dass ihre letzte Stunde gekommen sei.' -Bocaccio" #NT!
 panum.809.t: "Berge von Leichen" #NT!
 panum.809.d: "Die Zahl der Pesttoten nahm derartige Ausmaße an, dass sie kaum noch unter Kontrolle gehalten werden konnte. Manche fordern bereits öffentliche Verbrennungen und Massengräber." #NT!
 panum.809.f: "Auf dem Höhepunkt der Pest von 1894 in Hongkong wurden durchschnittlich 80 Menschen täglich in Krankenhäuser eingeliefert, und die Zahl der Todesfälle lag bei über 100 pro Tag. Durch den Schiffsverkehr breitete sich die Epidemie nach 1894 im Rest des Landes aus und erreichte schließlich die britische Herrschaft in Indien, wo etwa zehn Millionen Inder starben. Die wichtigsten Präventivmaßnahmen waren die Einrichtung von Pestkrankenhäusern und der Einsatz von medizinischem Personal zur Behandlung und Isolierung von Pestkranken, die Durchführung von Haussuchaktionen, das Auffinden und Verlegen von Pestkranken sowie die Reinigung und Desinfektion infizierter Häuser und Gebiete, die Einrichtung ausgewiesener Friedhöfe und die Bestimmung einer Person, die für den Transport und die Beerdigung der Pesttoten verantwortlich war." #NT!
 panum.810.t: "Der Schwarze Tod fordert seinen Tribut" #NT!
 panum.810.d: "Die Pestepidemie wütet derzeit besonders stark in [SCOPE.sState('panum_disease_state').GetName]. Es wurden zahlreiche Todesfälle gemeldet, sogar mehr als sonst." #NT!
 panum.810.f: "Die Krankheit blieb mehrere Jahre lang lokal auf Südwestchina beschränkt, bevor sie sich ausbreitete. In der Stadt Kanton hatte die Krankheit ab Januar 1894 bis Juni 80.000 Menschen getötet. Der tägliche Schiffsverkehr mit der nahegelegenen Stadt Hongkong verbreitete die Pest dort rasch und während der Hongkong-Plage von 1894 starben innerhalb von zwei Monaten über 2.400 Menschen." #NT!
 panum.810.g: "Niemand entkommt dem Sensenmann!" #NT!
 panum.811.t: "Verbrenne alles!" #NT!
 panum.811.d: "Das Reinigen und Desinfizieren der Häuser der Betroffenen ist oft die einzige Möglichkeit, die Ausbreitung der Pest zu stoppen. Dazu gehört oft das Verbrennen von allem, was mit einem Pestkranken in Kontakt kommt." #NT!
 panum.811.f: "'Ich behaupte also, dass die Ansteckungskraft der besagten Pest so groß war, dass sie nicht nur von Mensch zu Mensch übertragen wurde, sondern, was noch viel überraschender ist, häufig beobachtet wurde, dass Dinge, die einem an der Krankheit Erkrankten oder Verstorbenen gehört hatten, bei Berührung durch ein anderes Lebewesen, das nicht der menschlichen Gattung angehörte, nicht nur Krankheit, sondern auch einen fast augenblicklichen Tod verursachten. Davon wurden meine eigenen Augen (wie ich kurz zuvor sagte) eines Tages unter anderem durch folgende Erfahrung Kenntnis nehmen. Die Lumpen eines armen Mannes, der an der Krankheit gestorben war, lagen auf offener Straße verstreut, zwei Schweine kamen dorthin und nahmen, nachdem sie, wie es ihre Gewohnheit ist, nicht wenig mit ihren Schnauzen herumgespielt hatten, die Lumpen zwischen ihre Zähne und warfen sie mit ihren Hinterbacken hin und her; woraufhin sie sich fast sofort ein paar Mal umdrehten und tot, wie vergiftet, auf die Lumpen fielen, die sie in einer bösen Stunde aufgewirbelt hatten.' -Boccaccio" #NT!
 panum.811.g: "Verbrennen Sie Kleidung, Möbel und wenn nötig sogar Häuser!" #NT!
 panum.811.h: "Dies ist nicht erforderlich." #NT!
 panum.812.t: "Töte alles!" #NT!
 panum.812.d: "Schon früh vermutete man, dass Ratten Überträger der Pest sein könnten. Im [SCOPE.sState('panum_disease_state').GetName] finden sich Forderungen, Tiere und Ungeziefer gezielt auszurotten, um die Ausbreitung der Krankheit zu verhindern." #NT!
 panum.812.f: "Im Zuge der dritten Pestpandemie gründeten europäische Städte regelrechte 'Anti-Ratten-Truppen', deren Aufgabe darin bestand, gezielt nach den Tieren zu suchen und sie zu töten oder sie in Eimer mit Benzin zu tauchen. Es wurde jedoch oft behauptet, dass andere Pestquellen, wie infizierte, menschenspezifische oder auf Menschen beißende Parasiten wie Flöhe und Läuse, für die Übertragung in Europa während der dritten Pandemie wichtig waren. Die geringe Zahl pestinfizierter Ratten, die während europäischer Ausbrüche gefunden wurden, lässt darauf schließen, dass sie bei der Übertragung der Pest eine relativ geringe Rolle spielten. Einige Forscher argumentierten jedoch, dass die Behörden pestinfizierte Ratten wahrscheinlich nicht finden würden, da diese sich verstecken würden." #NT!
 panum.812.g: "Vernichte die Ratten." #NT!
 panum.812.h: "Das ist zu teuer." #NT!
 panum.813.t: "Vertrauensverlust" #NT!
 panum.813.d: "Viele Einwohner in [SCOPE.sState('panum_disease_state').GetName] empfinden die derzeitige medizinische Situation als skandalös. Die vielen Todesfälle und das offensichtliche Regierungsversagen haben zu einem weit verbreiteten Vertrauensverlust in die Regierung geführt." #NT!
 panum.813.f: "Die Pestepidemie des 19. Jahrhunderts forderte vor allem in China viele Opfer und erschütterte das Vertrauen in die Regierung und das Himmlische Mandat der Qing-Kaiser schwer." #NT!
 panum.813.g: "Dann mach deine Sauerei alleine!" #NT!
  
 panum.822.t: "Der Schwarze Tod" #NT!
 panum.822.d: "Anhand mehrerer historischer Quellen konnte Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] nachweisen, dass es sich bei der neuen Pestwelle tatsächlich um eine Krankheit handelt, die dem Schwarzen Tod des Mittelalters entspricht." #NT!
 panum.822.f: "Die Entdeckung der Ausbreitung der Pest in Indien hatte eine dominierende Bedeutung in der Betrachtung der Pest in ihrer heutigen Bedeutung als moderne Krankheit. Sie führte zunächst zu der Ansicht, dass es nur einen einzigen Ausbreitungsweg der Krankheit gab. Die Forschung wurde inzwischen auf eine große Anzahl von Nagetieren und eine große Anzahl von Floharten ausgeweitet. Die hohe Sterblichkeit in den Kolonien führte zu verstärkten Forschungsanstrengungen, um die epidemischen Merkmale abzubilden. Die Tatsache, dass es sich immer um die Pest handelte, wurde als Ausgangspunkt nicht in Frage gestellt. Die Krankheit erhielt den historischen Begriff Pest. Die Identität der mittelalterlichen Pest mit der in Indien erforschten Pest wurde angenommen." #NT!
 panum.823.t: "Pestsaison" #NT!
 panum.823.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat sämtliche Aufzeichnungen durchgesehen. Ob bei dieser Epidemie oder davor, ob in der näheren oder ferneren Vergangenheit: Im Winter gibt es keine Pestepidemien. Warum das so ist, bleibt unklar, könnte aber bei der Suche nach den Gründen für den Ausbruch der Krankheit eine Rolle spielen." #NT!
 panum.823.f: "'So endet dieses Jahr ... Es ist wahr, wir haben wegen der großen Pest große Melancholie durchgemacht, und ich habe große Kosten damit getragen, meine Familie lange in Woolwich zu halten und mich und einen anderen Teil meiner Familie, meine Angestellten, in Greenwich unter meiner Obhut ... Aber jetzt ist die Pest fast auf Null zurückgegangen ... Aber viele von ihnen, die ich sehr gut kenne, sind tot. Doch zu unserer großen Freude füllt sich die Stadt schnell und die Geschäfte beginnen wieder zu öffnen. Beten Sie zu Gott, dass die Pest weiter zurückgeht – denn das hält den Hof von den Geschäftssitzen fern, und so geht alles in Bezug auf öffentliche Angelegenheiten den Bach runter, an die sie in dieser Entfernung nicht denken.' - Samuel Pepys" #NT!
 panum.824.t: "Beulenpest und Lungenpest" #NT!
 panum.824.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] konnte zeigen, dass es mehr als nur eine Form der Pest gibt." #NT!
 panum.824.f: "Unter Pest versteht man meist die Beulenpest. Die Inkubationszeit beträgt wenige Stunden bis sieben Tage. Die Symptome sind Fieber, Kopf- und Gliederschmerzen, starkes Krankheitsgefühl und Schwindel. Später treten Bewusstseinsstörungen auf. Der Name Beulenpest kommt von den stark geschwollenen, sehr schmerzhaften Beulen an Hals, Achseln und Leisten. Die Lungenpest ist deutlich seltener. Sie dürfte der Grippe ähneln, allerdings ist ihre Ausbreitungsfähigkeit deutlich schwächer. Die Ausbreitung ist so spezifisch, dass sie nur unter besonders günstigen Umständen zu einer Epidemie werden kann. Zunächst einmal sind die Infektionsquellen selten. Nur ein kleiner Teil der pestinfizierten Bevölkerung erkrankt an Lungenpest, etwa bei Beulenpest und schwacher Abwehr." #NT!
  
  
 panum.241.t: "Das Kaninchenexperiment" #NT!
 panum.241.d: "Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat ein gewagtes Experiment im Sinn, das die Ansteckungsgefahr von Tuberkulose endgültig beweisen soll. Es geht um Impfung. Und um viele tote kleine Kaninchen." #NT!
 panum.241.f: "'Für mein erstes Experiment kaufte ich ein Paar niedlicher Kaninchen im Alter von drei Wochen, um die Ansteckungsgefahr von Tuberkulose zu bestimmen. Eines davon besprühte ich mit Tuberkuloseextrakt aus dem Gewebe eines Tuberkulosepatienten, der 33 Stunden zuvor gestorben war. Ich wiederholte den Vorgang zweimal. Nach einigen Tagen sezierte ich die Tiere und stellte fest, dass das Kaninchen mit Tuberkulose infiziert war.\n\nEinen Monat später wiederholte ich das Experiment mit drei hübschen kleinen Kaninchen. Ich wiederholte den Vorgang erneut und fügte später ein Kaninchen hinzu. Dann sezierte ich an vier aufeinanderfolgenden Tagen jeden Tag eines der Kaninchen. Alle litten an Tuberkulose, allerdings in vier verschiedenen Stadien der Krankheit. Ich hatte nur das erste geimpft.\n\nBei meinem dritten Versuch erwarb ich vier Paare junger, niedlicher Kaninchen im Alter von drei Monaten …'\n\nAus Doktor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]s Experimentierheft 'Ursache und Natur der Tuberkulose'" #NT!
 panum.241.g: "Stoppen Sie diese schrecklichen Tierversuche!" #NT!
 panum.241.h: "Um sicherzugehen, wiederholen wir das Experiment." #NT!
 panum.241.i: "Ein drittes Kaninchenexperiment für die Wissenschaft!" #NT!
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U] kann so viele Kaninchen wie möglich töten, um die Theorie zu beweisen." #NT!
  
 panum.261.t: "Künstlicher Pneumothorax" #NT!
 panum.261.d: "Doktor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] hat ein Gerät erfunden, das die Lunge künstlich kollabieren lässt und so bei der Bekämpfung von Tuberkulose helfen könnte." #NT!
 panum.261.f: "Mit Hilfe seines Bruders entwarf und konstruierte Carlo Forlanini ein einfaches Gerät, mit dem Gase intrapleural verabreicht werden konnten. Das Vorhandensein von Gas in der intrapleuralen Flüssigkeit führte zum Kollaps der Lunge und damit zur Entstehung eines künstlichen Pneumothorax. Nachdem Forlanini das Gerät gebaut hatte, versuchte er, zwei Fälle von Tuberkulose zu behandeln, indem er bei den beiden Patienten einen Pneumothorax herbeiführte, und erzielte positive Ergebnisse. Im Laufe der Jahre wurde Forlaninis Technik weiterentwickelt und verbessert, wodurch die Erfolgsrate des Verfahrens zunahm. Der künstliche Pneumothorax wurde bis zur Einführung von Streptomycin weiterhin als Behandlungsmethode eingesetzt." #NT!
 panum.262.t: "Thorakoplastie" #NT!
 panum.262.d: "Dank seiner chirurgischen Fähigkeiten erfand Doktor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] ein Verfahren, das die Lungenchirurgie revolutionierte und so eine verbesserte Behandlung von Tuberkulosepatienten ermöglichte." #NT!
 panum.262.f: "Bei einer Thorakoplastik handelt es sich um einen chirurgischen Eingriff, bei dem Rippen oder Rippenteile einer Seite des Brustkorbs operativ entfernt werden, um die Lunge oder Teile der Lunge kollabieren zu lassen. Dieser Eingriff geht auf Edouarde de Cérenville zurück und wurde vor allem zur Behandlung der Lungentuberkulose eingesetzt, verlor dann aber mit der Einführung wirksamer Antibiotika zunehmend an Bedeutung." #NT!
 panum.263.t: "Der Doktor hat es wieder getan!" #NT!
 panum.263.d: "Um die Ansteckungsgefahr der Tuberkulose erneut zu beweisen, tötete Dr. [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] erneut unzählige süße Kaninchen." #NT!
 panum.263.f: "'Von den vier Paaren, die ich diesmal erwarb, tötete ich das erste Tier des ersten Paares sofort. Es wies keine Lungenschädigung auf.'\n\nAus Doktor [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]s Experimentierbüchlein 'Ursache und Natur der Tuberkulose'" #NT!
 panum.263.g: "Es geht darum, Menschenleben zu retten." #NT!
 panum.263.h: "Dieser Arzt hat ein ernstes Problem." #NT!
  
