 je_panum_cholera_description_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] untersucht derzeit mehrere Patienten, um die Symptome von #YELLOW Cholera#!. zu bestimmen. Dabei ist es entscheidend, von anderen, ähnlichen oder gleichzeitig auftretenden Krankheiten unterscheiden zu können. Am Ende seiner Arbeit stellt der Wissenschaftler seine Beschreibung der Öffentlichkeit zur Verfügung, damit zukünftige Generationen eine bessere Chance haben, die Hintergründe der Krankheit zu erkennen und Behandlungsmethoden zu finden." #NT!
 je_panum_tuberculosis_description_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] untersucht derzeit mehrere Patienten, um die Symptome von #YELLOW Tuberkulose#!. zu bestimmen. Dabei ist es entscheidend, zwischen anderen, ähnlichen oder gleichzeitig bestehenden Krankheiten unterscheiden zu können. Am Ende seiner Arbeit stellt der Wissenschaftler seine Beschreibung der Öffentlichkeit zur Verfügung, damit zukünftige Generationen eine bessere Chance haben, die Hintergründe der Krankheit zu erkennen und Behandlungsmethoden zu finden." #NT!
