 je_panum_cholera_treatment_expedition_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] leitet in [SCOPE.sCountry('target').GetName] eine medizinische Expedition um Behandlungsmethoden gegen #YELLOW Cholera#!. zu finden. Solange die Krankheit im Land wütet, hat [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] monatlich die Chance den Ursachen der Krankheit auf die Spur zu kommen und sie einzudämmen.\n\nSollte die Krankheit abklingen, geht der wissenschaftliche Fortschritt nicht verloren, sondern wird auch bei der nächsten Untersuchung präsent sein." #NT!
