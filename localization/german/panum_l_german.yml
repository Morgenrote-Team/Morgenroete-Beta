 panum_congress_attend_modifier: "Teilnahme am medizinischen Kongress" #NT!
  
 panum.2000.t: "Vorbereitungen für den Ärztekongress" #NT!
 panum.2000.d: "Bevor der nächste Internationale Ärztekongress in unserem Land stattfindet, stellt sich die Frage, ob der Kongress einer bestimmten Krankheit gewidmet sein soll oder nicht." #NT!
 panum.2000.f: "Medizinische Kongresse können sich auf eine bestimmte Krankheit konzentrieren, wenn das gastgebende Land zumindest eine Beschreibung der Krankheit hat. Für jede Krankheit kann nur einmal ein Kongress abgehalten werden. Anwesende Ärzte und Mikrobiologen erhalten zusätzliche Hinweise, damit sie ihre Forschung schneller vorantreiben können. Bei einem allgemeinen Kongress erhalten teilnehmende Länder lediglich einen Bonus auf ihren akademischen Fortschritt." #NT!
 panum.2000.g: "Dies soll eine allgemeine medizinische Konferenz sein." #NT!
 panum.2001.t: "Medizinischer Kongress" #NT!
 panum.2001.d: "Die Hauptstadt bereitet sich auf das internationale Treffen medizinischer Spezialisten vor. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] wird die Treffen als Präsident leiten. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2001.f: "Medizinische Konferenzen sind eine hervorragende Gelegenheit, medizinisches Wissen auszutauschen. Errungenschaften, die bisher nur einem Land vorbehalten waren, werden hier auf brüderliche Weise geteilt. Medizinische Konferenzen können nur von Ärzten organisiert werden, aber auch Biologen mit der Spezialisierung Mikrobiologie sind eingeladen und können ihr Wissen im Bereich Krankheitserreger und Impfstoffe teilen. Wenn ein Land sowohl einen Arzt als auch einen Mikrobiologen hat, können beide teilnehmen." #NT!
 panum.2001.g: "Verschicken Sie die Einladungen!" #NT!
 panum.2002.t: "Einladung zum Ärztekongress" #NT!
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName] lädt die führenden Medizinnationen zu einem internationalen Kongress in die Hauptstadt ein. Eingeladen sind sowohl Mediziner als auch Mikrobiologen. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]" #NT!
 panum.2002.g: "Vergessen Sie die Stethoskope und Mikroskope nicht!" #NT!
 panum.2003.t: "Beschreibungen & Behandlungen" #NT!
 panum.2003.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat auf dem Ärztekongress in [SCOPE.sCountry('panum_congress_host_country').GetName] die einmalige Chance, bahnbrechende epidemiologische Erkenntnisse zu gewinnen. Welche Krankheit soll dabei im Fokus stehen?" #NT!
 panum.2003.f: "Sollte ein Land, das am Ärztekongress teilnimmt, eine Krankheitsbeschreibung oder eine Behandlungsmethode kennen, die in einem anderen Land nicht vorhanden ist, kann dieses Land diese auf dem Kongress kennenlernen. Das Wissen über eine Krankheit kann nur verbessert werden. Wenn auf dem Kongress kein neues Wissen vermittelt werden kann, besteht immer noch die Möglichkeit, allgemeines Wissen zu sammeln und eine medizinische Technologie zu verbessern. Die Teilnahme eines Arztes ist hierfür von entscheidender Bedeutung." #NT!
 panum.2003.g: "Der Arzt sollte sich bei Kollegen allgemeine medizinische Kenntnisse einholen." #NT!
 panum.2003.h: "Cholera." #NT!
 panum.2003.i: "Tuberkulose." #NT!
 panum.2003.j: "Pocken." #NT!
 panum.2003.k: "Typhus." #NT!
 panum.2003.l: "Gelbfieber." #NT!
 panum.2003.m: "Masern." #NT!
 panum.2003.n: "Scharlach." #NT!
 panum.2003.o: "Pest." #NT!
 panum.2003.p: "Diphterie." #NT!
 panum.2003.q: "Polio." #NT!
 panum.2004.t: "Erreger und Impfstoff" #NT!
 panum.2004.d: "Mit Freude stellte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fest, dass es auf dem Kongress in [SCOPE.sCountry('panum_congress_host_country').GetName] viele Gleichgesinnte gab, die ihr mikrobiologisches Wissen gerne mit uns teilten. Die Frage ist nur, über welche der wunderbaren Krankheiten [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] in Zukunft mehr erfahren möchte?" #NT!
 panum.2004.f: "Sollte ein Land, das am Medizinkongress teilnimmt, einen Krankheitserreger oder einen Impfstoff gegen eine Krankheit kennen, den ein anderes Land nicht besitzt, dann kann dieses Land dies auf dem Kongress erfahren. Das Wissen kann nur über eine Krankheit verbessert werden. Wenn auf dem Kongress keine neuen Erkenntnisse gewonnen werden können, besteht immer noch die Möglichkeit, allgemeines Wissen anzusammeln und eine biologische Technologie zu verbessern. Die Teilnahme eines Biologen mit der Eigenschaft eines Mikrobiologen ist hierfür von entscheidender Bedeutung." #NT!
 panum.2004.g: "Unser Wissenschaftler sollte einige allgemeine biologische Kenntnisse von Kollegen sammeln." #NT!
 panum.2005.t: "Eine medizinische Vision" #NT!
 panum.2005.d_general: "Die auf dem Kongress vertretenen Mediziner und Biologen beschlossen insbesondere, die Ausbildung angehender Medizinstudenten zu modernisieren und zu verbessern und verfassten dazu eine gemeinsame Erklärung." #NT!
 panum.2005.d_special: "Angesichts des Schwerpunkts der Konferenz haben sich Ärzte und Biologen dafür ausgesprochen, in den nächsten Jahren alle Anstrengungen auf die Bekämpfung einer bestimmten Krankheit zu konzentrieren." #NT!
 panum.2005.f: "Wenn zu Beginn des Medizinkongresses ein bestimmtes Thema zum Schwerpunktthema erklärt wurde, erhalten alle beteiligten Nationen zusätzliche Hinweise zu dieser Krankheit – je nachdem, ob ein Physiker, ein Mikrobiologe oder beide anwesend sind. Handelt es sich um einen allgemeinen Kongress, liegt der Schwerpunkt auf der Ausbildung neuen medizinischen Personals." #NT!
 panum.2005.g: "Die Veranstaltung hat sich gelohnt." #NT!
  
 panum.2009.t: "Medizinischer Kongress geht zu Ende" #NT!
 panum.2009.d: "Der Ärztekongress in [SCOPE.sCountry('panum_congress_host_country').GetName] ging gestern zu Ende. Ärzte und Mikrobiologen treten wieder die Heimreise an und bringen zahlreiche Erkenntnisse mit." #NT!
 panum.2009.f: "Der Internationale Medizinische Kongress (französisch: Congrès International de Médecine) war eine Reihe internationaler wissenschaftlicher Konferenzen zur Medizin, die regelmäßig von 1867 bis 1913 stattfanden. Die Idee zu einem solchen Kongress kam 1865 während des dritten jährlichen französischen Medizinischen Kongresses auf; Professor Henri Giutrac schlug vor, 1867 eine internationale medizinische Konferenz abzuhalten und dabei die Tatsache auszunutzen, dass Ärzte und Chirurgen aus aller Welt sicherlich in Paris sein würden, um an der diesjährigen Weltausstellung teilzunehmen." #NT!
 panum.2009.g: "Ich hoffe, das Buffet war gut?" #NT!
  
 panum_surgeon: "Chirurg" #NT!
 panum_surgeon_desc: "Chirurgen sind im medizinischen Alltag zu Hause, können aber auch in der medizinischen Forschung oder bei anatomischen Abhandlungen hilfreich sein." #NT!
 panum_psychiatrist: "Psychiater" #NT!
 panum_psychiatrist_desc: "Psychiater sind an der Verbesserung des Zustands psychisch kranker Menschen interessiert und treiben die Forschung und neue Behandlungsmethoden auf diesem Gebiet voran." #NT!
 panum_military_physician: "Militärarzt" #NT!
 panum_military_physician_desc: "Dieser Arzt ist auf die Versorgung von Verletzten auf dem Schlachtfeld spezialisiert und ist besonders erfolgreich in der Verbesserung der Ersten Hilfe." #NT!
