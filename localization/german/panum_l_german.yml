 panum.840.t: "Das Geheimnis des Schwarzen Todes" #NT!
 panum.840.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat eine umfassende Abhandlung über die Ursachen, die Übertragung und die Maßnahmen gegen die Pest verfasst. Ein besonders bemerkenswerter Exkurs beschäftigt sich mit der Rolle von Ratten und Flöhen." #NT!
 panum.840.f: "In seiner Abhandlung über die Pest fasste Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] viele der neuen Erkenntnisse zusammen. Neben der Empfehlung eines Rotationssystems zur Desinfektion und eines von [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] speziell entwickelten Serums weist [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] auf den Zusammenhang zwischen Flöhen als Überträgern des Pestbazillus und der Infektion von Ratten hin. Die Übertragung erfolgt vom Floh auf die Ratte, von der Ratte auf die Ratte und von der Ratte auf den Menschen." #NT!
 panum.840.g: "Ein uralter Feind wird plötzlich zähmbar." #NT!
  
 panum.841.t: "Eine bemerkenswerte Verbreitung" #NT!
 panum.841.d: "In den letzten Wochen hat sich Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ausführlich mit dem ersten Auftreten und den Verbreitungsorten der Pest beschäftigt." #NT!
 panum.841.f: "'In den letzten Wochen habe ich mir vom Handelsministerium Karten zusenden lassen und diese mit den Akten meiner Kollegen im Ausland verglichen. Ärzte, die behaupten, dass die Krankheit mit einem bestimmten Klima oder einer bestimmten Geographie zusammenhängt, irren sich. Vielmehr kann man eine wellenförmige Ausbreitung an Land und eine Ausbreitung durch die engsten Häfen beobachten. Dies sollte nicht überraschen, da die große Pestepidemie des Mittelalters auch in Skandinavien, dem Mittelmeerraum und dem Nahen Osten wütete. Aber wird das meine Kollegen überzeugen?'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.841.g: "Es hat also wenig mit Geographie zu tun." #NT!
 panum.842.t: "Rotationsreinigung" #NT!
 panum.842.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat in [SCOPE.sState('panum_disease_state').GetName] ein neues Verfahren getestet, das sich als äußerst wirksam erweist." #NT!
 panum.842.f: "'Es wurde versucht, die Stadt systematisch zu desinfizieren, doch dies erwies sich als sehr kostspieliges Unterfangen und wurde zugunsten eines Plans zur ‚allgemeinen Hausreinigung‘ aufgegeben, bei dem ständig ein Stab europäischer Hygieneinspektoren und Kulis beschäftigt war. Die Bezirke wurden abwechselnd behandelt, so dass jedes Mietshaus mindestens dreimal im Jahr gereinigt wurde. Diese Methode hat alle Vorteile der Einfachheit, Wirksamkeit und Wirtschaftlichkeit. Jedem Inspektor wird täglich eine bestimmte Anzahl von Stockwerken zugeteilt; die Bewohner räumen ihre Haushaltsgegenstände heraus, die Böden und Kabinen werden ausgewaschen und die Bettbretter in tragbaren Eisentanks gereinigt. Es wird auf kleinere strukturelle Unregelmäßigkeiten geachtet, Schleichwege und ähnliche Löcher werden sofort mit Zement gefüllt und der gesamte Müll weggebracht.'\n\nAus den Anweisungen von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zur besseren Desinfektion von [SCOPE.sState('panum_disease_state').GetName]" #NT!
 panum.842.g: "Dieses System sollte überall eingeführt werden." #NT!
 panum.843.t: "Eine interessante Sterblichkeit" #NT!
 panum.843.d: "Bei der Durchsicht von Statistiken stellte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fest, dass die Zahl der Todesfälle unter Rattenfängern exorbitant hoch ist." #NT!
 panum.843.f: "'Der Leiter der Behörde sagte mir, ich verwechsle Korrelation und Kausalität. Es werde grundsätzlich zu viel Wert auf die Infektion von Ratten vor einem Pestausbruch gelegt', sagte er fast wörtlich. 'Ich frage mich jetzt ernsthaft, ob die Mehrheit der Behörden, wenn sie davon ausgehen, dass die Pestausbrüche etwas mit Ratten zu tun haben, bei einer ähnlich hohen Zahl von Hinweisen auf eine rein tropische Krankheit an ihrer eigenen Theorie festhalten würden. Die eklatant höhere Sterblichkeit unter Rattenfängern im Vergleich zur übrigen Bevölkerung ist mir eine ‚Korrelation‘ zu viel.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.843.g: "Wie viele weitere Beweise werden benötigt?" #NT!
 panum.844.t: "Es sind die Ratten, Dummkopf!" #NT!
 panum.844.d: "Bei der näheren Untersuchung des Pestausbruchs in [SCOPE.sState('panum_disease_state').GetName] erfuhr Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], dass vor dem Ausbruch der Pest sämtliche Ratten in der Gegend gestorben waren." #NT!
 panum.844.f: "'Ich sehe viele tote Ratten auf dem Boden liegen', schrieb Alexandre Yersin bei seiner Ankunft in Hongkong am 15. Juni 1894. 'Die Ratten sind sicherlich die wahren Verbreiter der Epidemie.'" #NT!
 panum.844.g: "Eine gewagte These." #NT!
 panum.845.t: "Ein Beispiel" #NT!
 panum.845.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] gelang es, einem Pestkranken in einer Leichenhalle eine Gewebeprobe zu entnehmen. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] musste viel Überzeugungsarbeit leisten. Oder besser gesagt: [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] musste ein paar Leute bestechen, um die Probe zu bekommen." #NT!
 panum.845.f: "'Sie liegen in ihren Särgen, die vollständig mit Kalk bedeckt sind. Ein Sarg wird geöffnet. Ich schiebe den Kalk beiseite, um die Leistengegend freizulegen. Die Beule ist deutlich sichtbar. Ich schneide sie in weniger als einer Minute heraus.' -Alexandre Yersin" #NT!
 panum.845.g: "Die Kosten werden von uns erstattet." #NT!
  
 panum.851.t: "'Einfach nur Armut und Dreck'" #NT!
 panum.851.d: "Der Bezirksarzt in [SCOPE.sState('panum_disease_state').GetName] hat im Namen der örtlichen Behörden die aktuellen Untersuchungen von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] als unbegründet zurückgewiesen. Die Ursachen und Behandlungsmethoden der Pest seien 'gut bekannt'." #NT!
 panum.851.f: "'Wir müssen unsere Überraschung darüber zum Ausdruck bringen, dass die Zentralregierung in [ROOT.GetCountry.GetCapital.GetCityHubName] es für notwendig erachtete, einen Arzt zu schicken, obwohl wir die Situation ausreichend unter Kontrolle haben. Desinfektions- und Hygienemaßnahmen haben Wirkung gezeigt, insbesondere die Reinigung der Häuser und die Verbesserung der Lebensbedingungen der Bewohner. Das Gift entsteht wahrscheinlich durch die atmosphärischen Bedingungen unter den Häusern in bestimmten Bezirken und wird einfach durch Armut und Schmutz verursacht. Im üblichen Sinne ist die Krankheit nicht ansteckend oder übertragbar.'\n\nAus einem Brief des Bezirksarztes an die Regierung" #NT!
 panum.851.g: "Der Erfolg spricht für sich..." #NT!
 panum.852.t: "Kontaminierte Lebensmittel" #NT!
 panum.852.d: "Mehrere Wissenschaftler haben in einer direkten Kontroverse mit Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] klargestellt, dass es sich bei der Pest um eine durch falsche Ernährung verursachte Darmerkrankung handelt." #NT!
 panum.852.f: "'Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] hat zwar einige spannende Theorien, aber [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hat viel zu wenig Erfahrung im Umgang mit der Krankheit. Die örtlichen Ärzte in [SCOPE.sState('panum_disease_state').GetName] haben wiederholt an die Behörden appelliert, die festgestellten Erkenntnisse nicht in Frage zu stellen. Die Fakten sind wie folgt: 40 Prozent der Pestpatienten leiden an Erbrechen, weitere 30 Prozent an Durchfall und fast 20 Prozent an Bauchschmerzen. Insgesamt wurden bei fast 60 Prozent der Patienten Magen-Darm-Beschwerden dokumentiert. Es ist also klar, dass es sich um eine Infektion des Verdauungstraktes handelt, und es ist umso klarer, dass sie offenbar auf verdorbene, schlechte oder anderweitig mangelhafte Ernährung zurückzuführen ist.'\n\n" #NT!
 panum.852.g: "Doktor, was antworten Sie?" #NT!
 panum.853.t: "Eine tropische Krankheit" #NT!
 panum.853.d: "Mehrere international renommierte Ärzte vertreten die Theorie, dass es sich bei der Pest um eine weitere Tropenkrankheit handele, die außerhalb bestimmter Klimazonen kaum und wenn doch, dann nur sporadisch auftrete. Es handele sich also um eine Klimakrankheit." #NT!
 panum.853.f: "'Wir haben bereits in der Vergangenheit festgestellt, dass ein kühleres Klima zum Abflauen der Pestwelle führte. Die Implikationen sind klar: Die Pest ist eine Krankheit, die stark mit klimatischen Veränderungen verknüpft ist. Meteorologische Daten und erhaltene Gemälde zeigen, dass die letzte Pestwelle in einer deutlich wärmeren Umgebung stattfand als heute. Das Verschwinden der Pest ab Ende des 17. Jahrhunderts korreliert mit einer Abkühlung des Wetters bis zum völligen Verschwinden der Pest. Die steigenden Temperaturen der letzten Jahre korrelieren dagegen mit der Ausbreitung der Pest in Gebieten, die bisher als kälter galten. Muss ich das weiter ausführen?'\n\nEin Brief von Doktor Angelika Hasenbein an Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetFullNameNoFormatting]" #NT!
 panum.853.g: "Also nur eine Variante des Gelbfiebers." #NT!
 panum.854.t: "Die falsche Pest" #NT!
 panum.854.d: "In den letzten Tagen war Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in mehrere Krankenhäuser beordert worden, um die dortigen Patienten zu untersuchen. Wie sich herausstellte, handelte es sich nicht um Pestkranke, sondern um Typhuskranke." #NT!
 panum.854.f: "'Der Schwarze Tod, Typhus, Cholera, Schwindsucht, Beulenpest … Oh, das waren noch Zeiten.' – Ein unbekannter Bestatter" #NT!
 panum.854.g: "Bedauerlich." #NT!
 panum.854.h: "Wenn wir Zeit verschwenden, kann der Arzt sie vielleicht nutzen?" #NT!
  
 panum.861.t: "Opium ist keine Antwort" #NT!
 panum.861.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] untersuchte eingehend die angebliche Heilwirkung des Opiums gegen Pesterkrankungen und kam zu einem eindeutigen Ergebnis." #NT!
 panum.861.f: "'Es funktioniert nicht.'\n\nFazit von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zum Opiumkonsum" #NT!
 panum.861.g: "Das ist ein wenig enttäuschend und aufschlussreich zugleich." #NT!
 panum.862.t: "Septikämie" #NT!
 panum.862.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] konnte nachweisen, dass mehrere Experimente, die eine Magen-Darm-Erkrankung als Ursache der Pest nahelegen sollten, völlig falsch interpretiert wurden." #NT!
 panum.862.f: "Die Ansicht, dass die Infektion über den Verdauungstrakt durch speziell kontaminierte Nahrungsmittel verursacht wird, war mehrere Jahre lang weithin akzeptiert, obwohl es Leute gab, die 'Ausdünstungen aus Atem und Haut' als den wichtigsten ätiologischen Faktor betrachteten. Es wurden zahlreiche Tierfütterungsversuche mit Pestmaterial durchgeführt, und die Magen-Darm-Hypothese erhielt Anklang, da viele der Tiere und Vögel an einer pestähnlichen septikämischen Krankheit starben. Die Ergebnisse waren jedoch nicht schlüssig und wurden schließlich 1904 in Hongkong vom damaligen Gesundheitsbeauftragten angefochten, der seine völlige Ablehnung dieser Ansicht zum Ausdruck brachte." #NT!
 panum.862.g: "Dies ist ein schwerer Schlag für die Theorie, dass die Pest durch verunreinigte Lebensmittel verursacht wurde." #NT!
 panum.863.t: "Antibiotika" #NT!
 panum.863.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] konnte in mehreren Experimenten zeigen, dass Pestpatienten hervorragend auf eine Antibiotikabehandlung ansprechen und empfiehlt diese Vorgehensweise ausdrücklich." #NT!
 panum.863.f: "'Meine Experimente als vollen Erfolg zu bezeichnen, wäre untertrieben. Tatsächlich war ich überrascht, wie die Antibiotika wirkten. Einige Patienten sagten sogar, sie fühlten sich wie geheilt. Wenn sich dieser Effekt bestätigt, könnte die Suche nach einem Impfstoff gegen die Pest überflüssig werden.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.863.g: "Gibt es bei Antibiotika keine Nachteile?" #NT!
 panum.864.t: "Insektizide" #NT!
 panum.864.d: "Der großflächige Einsatz von Insektiziden in einem Seuchen-Hotspot blieb wirkungslos. Laut Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ist dies ein überraschender Erfolg." #NT!
 panum.864.f: "'Sie fragen zu Recht, warum ich mich über diesen Misserfolg freue. Aber Wissenschaftler lernen auch aus vermeintlichen Niederlagen. In diesem Sinne war es keine Niederlage, sondern ein Beweis. Einige meiner Kollegen meinten, die Pest könnte eine Tropenkrankheit sein, die der Malaria nicht unähnlich ist, die, wie sich herausstellte, von einer Mücke übertragen wird. Zumindest können wir diese Annahme beiseite legen.'\n\nAus einem Interview mit Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in einer Lokalzeitung" #NT!
 panum.864.g: "Eine Option weniger." #NT!
 panum.865.t: "Latrinen" #NT!
 panum.865.d: "Bei einer Untersuchung der Hygienemaßnahmen in [SCOPE.sState('panum_disease_state').GetName] stellte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fest, dass die moderne Abwasser- und Latrineninfrastruktur insbesondere in einem von der Pest heimgesuchten Bezirk zu wünschen übrig ließ, und nahm Kontakt mit den örtlichen Behörden auf." #NT!
 panum.865.f: "'Auch wenn noch nicht abschließend geklärt ist, wie man der Pest am besten begegnet, und unabhängig davon, wie meine persönlichen Theorien und die meiner Kollegen aussehen – die Erfahrung zeigt, dass mit Fäkalien verunreinigte Böden und stehende verunreinigte Gewässer grundsätzlich zu beseitigen sind, sei es wegen der von ihnen vermuteten Miasmen oder weil sie Keimherde sind. Wollen wir in Zukunft nicht nur die Pest, sondern auch andere Krankheitsherde unter Kontrolle halten, dann müssen wir vorbeugende Maßnahmen ergreifen.'\n\nDr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in einem Brief an die Kommunalverwaltung" #NT!
 panum.865.g: "Es wird teuer, ist aber unvermeidlich." #NT!
  
 panum.870.t: "Bacillus Pestis" #NT!
 panum.870.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] untersuchte die Gewebeprobe unter dem Mikroskop und stellte endgültig fest: Die Pest wird durch einen Bazillus übertragen!" #NT!
 panum.870.f: "'20. Juni 1894. Die Beulen enthalten, klar und deutlich sichtbar, eine riesige Anzahl von Bazillen. Sie sind klein, kurz und haben abgerundete Enden. Dies ist ohne Frage die Mikrobe der Pest.' – Alexandre Yersin" #NT!
 panum.870.g: "Das ändert alles!" #NT!
 panum.871.t: "Flöhe" #NT!
 panum.871.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] machte möglicherweise eine der wichtigsten Entdeckungen in der Geschichte der Pest: den Zusammenhang zwischen Flöhen, Ratten und dem Pestausbruch." #NT!
 panum.871.f: "In [TimeKeeper.GetCurrentDate.Format('y')] entdeckte [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] den Rattenfloh, der die Krankheit überträgt. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hatte festgestellt, dass erkrankte Personen nicht in engem Kontakt miteinander stehen mussten, um sich anzustecken. In Yunnan, China, flohen die Bewohner aus ihren Häusern, sobald sie tote Ratten sahen, und auf der Insel Formosa (Taiwan) waren die Bewohner der Ansicht, der Umgang mit toten Ratten erhöhe das Risiko, an Pest zu erkranken. Diese Beobachtungen führten [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] zu der Vermutung, dass der Floh ein vermittelnder Faktor bei der Übertragung der Pest sein könnte, da sich Menschen nur dann mit der Pest infizierten, wenn sie mit Ratten in Kontakt kamen, die weniger als 24 Stunden zuvor gestorben waren. In einem mittlerweile klassischen Experiment zeigte [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], wie eine gesunde Ratte an der Pest starb, nachdem infizierte Flöhe von einer Ratte, die kürzlich an der Pest gestorben war, auf sie übergesprungen waren." #NT!
 panum.871.g: "Faszinierend." #NT!
 panum.872.t: "Anti-Pest-Serum" #NT!
 panum.872.d: "Basierend auf bisherigen Erkenntnissen zur Übertragung und Herkunft der Pest sowie Experimenten mit dem Pestbazillus hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ein hochwirksames Anti-Pest-Serum entwickelt und an einem ersten Patienten erfolgreich getestet." #NT!
 panum.872.f: "'Ab Mitternacht wird der Patient ruhiger, und um sechs Uhr morgens (…) wacht er auf und erklärt, dass er sich geheilt fühlt.' -Alexandre Yersin" #NT!
 panum.872.g: "Es klappt!" #NT!
  
