 panum_vitamins_tech_desc: "Durch die Isolierung bestimmter Nährstoffe, die der Körper benötigt, kann mehr Menschen eine gesunde und ausgewogene Ernährung ermöglicht werden." #NT!
  
 panum.2006.t: "Die Keimtheorie wird bekräftigt" #NT!
 panum.2006.d: "Der medizinische Kongress bot auch Gelegenheit für mehrere Ärzte, sich über die Ursachen der Krankheit auszutauschen. Es zeichnet sich ab, dass immer weniger Forscher an die traditionelle Miasmentheorie glauben. Die Keimtheorie gilt heute unter den angesehensten Gelehrten als Standard." #NT!
 panum.2006.f: "'In letzter Zeit ist zwar eine gewisse Anpassung eingetreten, indem die einzelnen Länder nicht mehr ganz so einseitig vorgehen wie früher und von den anderen das übernehmen, was sich an Abwehrmitteln als bewährt erweist. Bei der nach wie vor großen Vielfalt der Mittel und Wege zur Bekämpfung der Tuberkulose stellt sich jedoch die Frage, welche Maßnahmen den wissenschaftlichen Anforderungen und allgemeinen Erkenntnissen im Kampf gegen ansteckende Krankheiten tatsächlich am besten genügen.\n\nBevor wir jedoch zur Beantwortung dieser Frage kommen, müssen wir uns ganz klar machen, wie die Infektion bei der Tuberkulose zustande kommt, d. h. wie die Tuberkelbazillen in den menschlichen Organismus eindringen; denn alle vorbeugenden Maßnahmen gegen eine ansteckende Krankheit können nur darauf gerichtet sein, das Eindringen der Krankheitskeime in den Körper zu verhindern.' -Robert Koch" #NT!
 panum.2006.g: "Dieser Beweis kann nicht von der Hand gewiesen werden." #NT!
 panum.2201.t: "Miasmentheorie verliert Deutungshoheit" #NT!
 panum.2201.d: "Mit jedem Tag, an dem sich Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mehr und mehr auf neue Forschungsmethoden konzentriert, verliert die traditionelle Miasmentheorie an Relevanz. Die Keimtheorie scheint überzeugender." #NT!
 panum.2201.f: "'Meine Herren, die Mikroben werden das letzte Wort haben!' – Louis Pasteur" #NT!
 panum.2201.g: "Die Miasmentheorie ist also fragwürdig?" #NT!
  
