 panum.2600.t: "Eine neue Anstalt" #NT!
 panum.2600.d: "Mit einer Rede feierte heute Herr Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] die Einweihung der neuen Irrenanstalt." #NT!
 panum.2600.f: "Bei der Einweihung waren auch zahlreiche prominente Persönlichkeiten anwesend, darunter auch Oppositionspolitiker. Während der Arzt auf die neuen Methoden und eine ganze Reihe eindeutiger Symptome hinwies, die zur Einweisung in die Klinik geführt hatten, vermuteten skeptische Regierungsgegner, dass eine solche Einrichtung auch zum Missbrauch geeignet sein könnte." #NT!
 panum.2600.g: "Endlich der richtige Ort für Politiker, Journalisten, Schauspieler ..." #NT!
  
 panum.2601.t: "Eine dringende psychiatrische Einweisung" #NT!
 panum.2601.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat einen Bericht erstellt, aus dem hervorgeht, dass [SCOPE.sCharacter('chosen_character').GetFullName] dringend psychiatrische Behandlung benötigt. Leider wird [SCOPE.sCharacter('chosen_character').GetLastName] viele Jahre in der Irrenanstalt verbringen. Möglicherweise ... sehr viele Jahre." #NT!
 panum.2601.f: "'Da es eines Tages passieren könnte, dass ein Opfer gefunden werden muss,\nhabe ich eine kleine Liste — ich habe eine kleine Liste\nvon Gesellschaftsverbrechern, die sich möglicherweise im Untergrund befinden\nund die niemals vermisst werden — die niemals vermisst werden würden!\nDa sind die pestilentiellen Plagegeister, die Autogramme erbitten\nAlle Leute, die schlaffe Hände und ein quälendes Lachen haben\nAlle Kinder, die mit Dates auf dem Laufenden sind und einen damit umhauen\nAlle Leute, die einem beim Händeschütteln so die Hand schütteln\nUnd alle dritten Personen, die darauf bestehen, ein Tête-à-Tête zu verderben\nKeiner von ihnen würde vermisst werden — keiner von ihnen würde vermisst werden!'" #NT!
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hat sie auf der Liste – und keiner von ihnen wird vermisst werden!" #NT!
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName] verschwindet für immer in den Trakten der Irrenanstalt..." #NT!
  
 panum_physician_recent_asylum_conducted_modifier: "Kürzliche Einweisung in die Nervenheilanstalt" #NT!
 panum_send_leader_to_asylum_modifier: "Politischer Missbrauch der Psychiatrie" #NT!
  
