 panum.3031.t: "Das erste Übereinkommen wird zum verbindlichen Übereinkommen" #NT!
 panum.3031.d: "Die überwiegende Mehrheit der Rotkreuz-Mitglieder hat dem Ersten Internationalen Übereinkommen über die Versorgung von Kriegsverletzten zugestimmt. Es ist nun für alle Mitglieder verbindlich." #NT!
 panum.3031.f: "Internationale Konventionen sind in der Regel unverbindliche Absichtserklärungen. Wenn sie jedoch von genügend Mitgliedern des Roten Kreuzes unterzeichnet werden, wird sie mit der Zeit zu gültigem Völkerrecht, an das sich alle Unterzeichner halten müssen – und das auch die anderen Mitglieder unterzeichnen. Das ist der Fall, wenn 65 Prozent aller Mitglieder und die Mehrheit der Großmächte dieser Konvention zustimmen – dann sind alle anderen Mitglieder gezwungen, sich daran zu halten. Diese Konvention kann dann nicht mehr wie üblich abgeschafft werden. Um verbindliche Konventionen zu vermeiden, ist ein vollständiger Austritt aus dem Roten Kreuz notwendig – mit allen Konsequenzen." #NT!
 panum.3031.g: "Es entsteht ein weltweit gültiges Völkerrecht." #NT!
 panum.3032.t: "Das zweite Übereinkommen wird verbindlich" #NT!
 panum.3032.d: "Die überwiegende Mehrheit der Rotkreuz-Mitglieder hat dem Zweiten Internationalen Übereinkommen über Abrüstung und Seekriegsführung zugestimmt. Es ist nun für alle Mitglieder verbindlich." #NT!
 panum.3033.t: "Das Dritte Übereinkommen wird zum verbindlichen Übereinkommen" #NT!
 panum.3034.t: "Internationales Übereinkommen wird verbindlich" #NT!
 panum.3034.d: "Die überwiegende Mehrheit der Rotkreuz-Mitglieder hat einer Konvention zugestimmt. Sie ist nun für alle Mitglieder verbindlich." #NT!
 panum.3034.g: "Wir prüfen, ob dies in unserem Interesse ist." #NT!
  
