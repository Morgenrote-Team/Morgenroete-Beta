 panum_character_treatment_fatal_fallback_loc: "'Wer hätte gedacht, dass das Durchtrennen dieses Blutgefäßes den Patienten töten würde?'" #NT!
 panum_character_treatment_fatal_tripple_death_loc: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] plante eine schnelle Operation, um den Patienten [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] zu behandeln. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] konnte die Operation in etwas mehr als 2 Minuten durchführen, amputierte jedoch die Finger eines Assistenten, der später an einer Infektion starb. Leider starb auch der Patient später an einer Infektion. Außerdem brach ein Zuschauer, dessen Rockschöße ebenfalls versehentlich durchgeschnitten wurden, zusammen, weil er dachte, seine lebenswichtigen Organe seien verletzt worden. Später stellte sich heraus, dass er an einem Schock gestorben war." #NT!
 panum_character_treatment_fatal_unwashed_hands_loc: "Die Operation verlief perfekt. Der Patient war am Leben, alle Probleme waren gelöst und alle gingen davon aus, dass die Genesung schnell verlaufen würde. Einige Tage später wurde jedoch eine Infektion entdeckt, die sich wie ein Lauffeuer ausbreitete. Nur wenige Stunden später starb der Patient. Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] war sehr verwirrt, wie das passieren konnte, da [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] nach der vorherigen Operation nur wenige Minuten zuvor das Messer gewechselt hatte." #NT!
 panum_character_treatment_fatal_forgotten_snack_loc: "Nach dem Tod des Patienten wurde eine Autopsie durchgeführt. Im Inneren des Patienten wurde zur Überraschung aller ein halb gegessenes Sandwich gefunden. Niemand wusste, wie es dorthin gekommen war, bis sich ein Assistent daran erinnerte, dass Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] während der Operation ein Sandwich gegessen hatte." #NT!
 panum_character_treatment_fatal_blood_loss_loc: "Zunächst verlief die Operation gut. Es schien, als hätte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] den Patienten erfolgreich behandeln können. Der Patient erholte sich jedoch nie wieder. Offenbar ging zu viel Blut verloren, was den Patienten sehr schwächte und nach weiteren 3 Tagen zum Tod führte." #NT!
 panum_character_treatment_fatal_morphine_overdose_loc: "Die Operation schien gut zu verlaufen. Dank der Morphiumgabe verspürte der Patient während des Eingriffs keine Schmerzen. Leider verspürte der Patient überhaupt keine Schmerzen mehr, da die Morphiummenge zu hoch war und der Patient verstarb." #NT!
 panum_character_treatment_fatal_drunken_doctor_loc: "Alle waren etwas verwirrt, als Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] während der Operation anfing, den medizinischen Alkohol zu trinken. Es half auch nicht, dass [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] anfing, an den falschen Stellen zu schneiden, Assistenten anzuschreien und schließlich eine große Arterie traf. Leider konnte der Patient nicht gerettet werden, auch nachdem ein anderer Arzt zur Hilfe gerufen wurde." #NT!
 panum_character_treatment_fatal_forgotten_instruments_loc: "Nach einer erfolgreichen Operation schien es Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]s Patient besser zu gehen. Doch nur einen Tag später starb der Patient. Bei einer Autopsie wurde ein Skalpell gefunden, das irgendwie im Körper des Patienten vergessen worden war. Als sich der Patient wieder bewegte, begann das Skalpell, Gewebe und Blutgefäße zu durchtrennen, was zu inneren Blutungen führte." #NT!
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Eine sehr erfolgreiche Operation hatte leider ein schreckliches Ende. Der Patient erwachte nie wieder aus der Narkose. Niemand weiß, woran es gelegen haben könnte, aber Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] geht davon aus, dass der Körper des Patienten bereits zu geschwächt war." #NT!
 panum_character_treatment_fatal_fake_doctor_loc: "Zunächst schien die Operation ganz gut verlaufen zu sein. Als der Arzt den Raum verließ, dauerte es nicht lange, bis sich die Situation verschlechterte. Plötzlich stürmte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in den Raum und sagte, dass es [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] sehr leid täte, zu spät gekommen zu sein. Alle waren verwirrt, da der Arzt gerade die Operation durchgeführt hatte. Es schien, als hätte sich eine beliebige Person als Chirurg ausgegeben und die Operation durchgeführt. Traurigerweise starb der Patient am Ende und niemand weiß, wer für den Tod verantwortlich ist." #NT!
 panum_character_treatment_fatal_slippery_floor_loc: "Es war eine großartige Operation, bis Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]s Fuß in eine Blutlache auf dem Boden fiel. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] rutschte aus und fiel direkt auf den Patienten. Traurigerweise durchbohrte das Skalpell das Herz des Patienten, was den Tod des Patienten verursachte." #NT!
  
 panum.242.t: "Tod der Menge" #NT!
 panum.242.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] stellt fest, dass Tuberkulose in dicht besiedelten Gebieten immer wieder auftritt, in dünn besiedelten Regionen jedoch nur selten." #NT!
 panum.242.f: "'Ich habe mir einige Abhandlungen genauer angesehen, die Luftkurorte zur Heilung von Tuberkulose empfehlen. Ein Aufsatz erschien mir so wenig überzeugend, dass ich glaube, mein Kollege verwechselte Korrelation mit Kausalität. Er geht davon aus, dass die Menschen in den Bergen gesünder sind, weil die Luft gesünder ist, und deshalb nicht der Tuberkulose zum Opfer fallen. Aber ist es nicht offensichtlich, dass wir prinzipiell beobachten können, dass Tuberkulose in den Bergen nicht auftritt, weil dort weniger Menschen sind? Dies spricht für die südeuropäische Interpretation, dass wir es weniger mit Miasmen als mit Ansteckungen zu tun haben. Tuberkulose kann also doch eine ansteckende Krankheit sein.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.242.g: "Diese Theorie unterstreicht, dass Tuberkulose eine ansteckende Krankheit ist." #NT!
 panum.242.h: "Dies ist eine Theorie, die unterstreicht, dass die Miasmentheorie falsch ist." #NT!
 panum.243.t: "Ein Tuberkulose-Einsiedler" #NT!
 panum.243.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] machte im Gespräch mit einem Tuberkulose-Überlebenden eine interessante Entdeckung." #NT!
 panum.243.f: "'Du sagtest, dein Bruder sei an Tuberkulose gestorben?'\n'Richtig. Ich war damals neunzehn. Ich sah ihn vor meinen Augen sterben.'\n'Und du erkranktest später auch an Tuberkulose?'\n'Genau. Ich ging davon aus, dass ich wie er bald sterben würde. Das war für mich ungefährlich. Also zog ich mich zum Sterben in eine abgelegene Gegend zurück. Ich wollte meine letzten Tage in der Natur verbringen, fernab von der Zivilisation.'\n'Aber du hast überlebt. Was denkst du, ist der Grund dafür?'\n'Gesunde Ernährung und Bewegung. Irgendwann sammelte ich genug Kraft, um die Krankheit zu überwinden.'\n'Hm.'" #NT!
 panum.243.g: "Ist das wirklich alles?" #NT!
 panum.244.t: "Nichts Erbliches" #NT!
 panum.244.d: "Nach langwierigen Untersuchungen kommt Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zu dem Schluss, dass wenig darauf hindeutet, dass es sich bei Tuberkulose tatsächlich um eine Erbkrankheit handelt." #NT!
 panum.244.f: "'Hätte man mir während meiner Ausbildung gesagt, dass ich mich einmal der Genealogie widmen würde, hätte ich mich sehr gewundert. Aber es gab kaum eine Möglichkeit, meine Theorie zu bestätigen, außer die betroffenen Familien selbst sowie Behörden und Geistliche zu fragen. Wenn Tuberkulose tatsächlich eine Erbkrankheit ist, dann eine, die über Generationen hinweg unentdeckt bleiben kann. Es gibt ganze Stammbäume ohne einen Fall von Tuberkulose, nur um dann plötzlich eine ganze Familie auszulöschen. Und es ist eine bemerkenswerte Tatsache, dass Tuberkulose keine statische, beherrschbare Krankheit ist, sondern erst in den letzten Jahrzehnten zu der Gefahr geworden ist, die sie heute darstellt. Lassen Sie es mich so sagen: Wenn Tuberkulose eine Erbkrankheit ist, dann haben wir offensichtlich alle eine Veranlagung. Wie Sie im Anhang meiner Studie sehen können, sprechen die Statistiken für sich.'\n\nVortrag von [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] vor der Medizinischen Fakultät" #NT!
 panum.244.g: "Also kann sich theoretisch jeder anstecken?" #NT!
 panum.245.t: "Tuberkel" #NT!
 panum.245.d: "Im Rahmen einer anatomischen Untersuchung gewann Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] neue Erkenntnisse über die namensgebenden Tumoren im Lungengewebe." #NT!
 panum.245.f: "René Laennec entwickelte das Stethoskop, ursprünglich zur Untersuchung von Tuberkulose. In den darauffolgenden Jahren half es, die Krankheit früher zu erkennen, indem man frühzeitig auf Veränderungen der Atemwege hören konnte. Gleichzeitig wuchs das Wissen über die Entstehung von Tuberkulose im Körper." #NT!
 panum.245.g: "Kleine Fortschritte – aber Fortschritte." #NT!
 panum.246.t: "Lebensstil & Immunität" #NT!
 panum.246.d: "Nach eingehender Untersuchung mehrerer Patienten und ihrer Biografien hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] erhebliche Zweifel an traditionellen Theorien über die Ursachen der Tuberkulose." #NT!
 panum.246.f: "'Die Untersuchung mehrerer Patienten in [SCOPE.sState('panum_disease_state').GetCityHubName], einschließlich ihrer persönlichen Lebensgeschichten, wirft mehr Fragen auf als sie beantwortet; vorausgesetzt, man erwartet möglichst einfache Wahrheiten und nicht bloß Bruchstücke der Wahrheit. Es ist richtig, dass insbesondere das Proletariat stark von der Tuberkulose betroffen ist, aber ich halte es für fraglich, ob nicht auch ein wohlhabender Mensch im gleichen Milieu der Krankheit zum Opfer fallen würde. Ich bin überzeugt, dass gute Ernährung, frische Luft und körperliche Bewegung eine gewisse Widerstandskraft gegen Krankheiten bieten – aber ich glaube nicht, dass sie deshalb grundsätzlich ausgeschlossen werden können. Kurzum: Ich glaube, dass die Vorstellung, dass jemand Tuberkulose bekommt, weil er Künstler oder Proletarier ist, eine wissenschaftlich unhaltbare Behauptung ist. Wäre das der Fall, dann hätte die Tuberkulose in den letzten Jahren ihre Zugehörigkeit gewählt und würde heute statt Musikern und Dichtern Fabrikarbeiter als ihre hochgeistig auserwählten Opfer bevorzugen. Das kann niemand ernsthaft glauben.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.246.g: "Für einige verkannte Genies wird dies eine große Enttäuschung sein." #NT!
 panum.247.t: "Eine meldepflichtige Krankheit" #NT!
 panum.247.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat in [SCOPE.sState('panum_disease_state').GetCityHubName] mit einem Meldesystem experimentiert, das zur Eindämmung der Tuberkulose beitragen könnte." #NT!
 panum.247.f: "'Die Einstufung der Tuberkulose als meldepflichtige Krankheit durch den [SCOPE.sState('panum_disease_state').GetCityHubName] hat in der Bevölkerung zu einigem Unmut geführt, weil viele Menschen die Krankheit als Privatsache betrachten. Das ist sie aber nicht, vor allem nicht, wenn sie in epidemischer Form auftritt. In dem Moment, in dem eine Krankheit als ansteckend gilt - und im Fall der Tuberkulose spricht vieles dafür - ist sie eine öffentliche Angelegenheit, die das Gemeinwohl gefährden kann. Besser eine meldepflichtige Krankheit als eine Quarantäne. Die Isolierung einzelner Infektionsherde zeigte, dass die Ausbreitung der Tuberkulose verhindert werden konnte, ohne eine ganze Stadt in den Ausnahmezustand zu versetzen. Leider wird das Stigma, das Tuberkulose-Kraniche heute tragen, unangenehme persönliche Folgen haben. Tuberkulosekranke werden heute wie Aussätzige behandelt.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.247.g: ""
 panum.248.t: "Abtöten der Mikroben" #NT!
 panum.248.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat ein chemisches Verfahren entwickelt, das auf bisherigen Erkenntnissen über Mikroorganismen basiert. Es könnte in Zukunft Tuberkulose verhindern." #NT!
 panum.248.f: "Unter Pasteurisierung versteht man das kurzzeitige Erhitzen von flüssigen oder pastösen Lebensmitteln auf Temperaturen von mindestens 72 °C bis maximal 100 °C, um die vegetativen Phasen von Mikroorganismen abzutöten und so Lebensmittel schonend haltbar zu machen. Bei Wein wurde das Verfahren ab Mitte des 19. Jahrhunderts angewendet. Erst später kam es bei Rohmilch zum Einsatz, über die die Erreger der Rindertuberkulose auf den Menschen übertragen werden konnten. Die Pasteurisierung von Rohmilch spielte also eine Rolle bei der Eindämmung der Tuberkulose. Diese Erkenntnis ist wichtiger, als man zunächst vermuten könnte: Lange Zeit gingen Ärzte, Biologen und Chemiker davon aus, dass Tuberkulose vom Rind nicht auf den Menschen übertragbar sei. Selbst der Tuberkuloseexperte Robert Koch lag in dieser Hinsicht falsch und revidierte seine Meinung erst später – in einer Zeit, in der sich viele Kinder über Tuberkulosemilch und -butter ansteckten." #NT!
 panum.248.g: "Und ich dachte, Milch sei grundsätzlich gesund!" #NT!
 panum.249.t: "Persönlicher Spucknapf" #NT!
 panum.249.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ist ein Accessoire aufgefallen, das besonders bei Frauen mit Tuberkulose beliebt ist. Es hat ein raffiniertes blaues Glasgehäuse, das so modern aussieht, dass man vergisst, dass es ein Spucknapf ist." #NT!
 panum.249.f: "'Das haben die meisten hier oben. Bei uns hat es auch einen Namen, einen Spitznamen, ganz lustig.' Ohne jede Zurückhaltung, mit stur ignorantem Gesicht, äußerte sie den grimmigen Ausdruck 'Der blaue Heinrich'. – Thomas Mann, Zauberberg" #NT!
 panum.249.g: "Wenn jeder Kranke so etwas bei sich hätte..." #NT!
  
 panum.251.t: "Eine Zellkrankheit?" #NT!
 panum.251.d: "Die viel beachtete Studie eines deutschen Tuberkulose-Spezialisten stellt die bisherigen Erkenntnisse von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] auf den Kopf, da [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] bislang keine passende Gegenantwort finden konnte." #NT!
 panum.251.f: "'Es gibt einige Kollegen, die leidenschaftlich behaupten, dass Tuberkulose durch Infektion übertragen werden kann. Konfrontiert mit der Tatsache, dass es viele Patienten gibt, die die Krankheit entwickelt haben, ohne in der Nähe eines Tuberkulose-Kranichs gewesen zu sein, behaupten sie, dass sie sich wahrscheinlich vor Jahren irgendwo angesteckt haben. Wie soll man das beweisen? Vielmehr zeigen meine eigenen Untersuchungen, dass die Tuberkel des Lungengewebes als Zellvermehrung zu interpretieren sind. Tuberkulose muss daher, wie Karzinome, als Folge der Vermehrung lokaler Zellen interpretiert werden. Sie kann eindeutig als konstitutionelle Krankheit identifiziert werden.'\n\nDr. Angelika Hasenbein, 'Tuberkulose, eine krebsähnliche Krankheit'" #NT!
 panum.251.g: "Funktioniert Tuberkulose also wie ein Zelltumor?" #NT!
 panum.252.t: "Bronchiektasien" #NT!
 panum.252.d: "Wie Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] herausfand, waren einige angebliche Befunde, die [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] seiner Meinung nach bei Tuberkulosepatienten gewonnen hatte, falsch. Diese litten nämlich an einer völlig anderen Krankheit." #NT!
 panum.252.f: "'Leider haben sich einige Untersuchungen als Sackgasse herausgestellt. So glaubte ich, dass einige Tuberkulosepatienten unter bestimmten Umständen genesen seien. In Wirklichkeit hatten sie aber keine Tuberkulose, sondern Bronchiektasien. Es ist zwar nicht ausgeschlossen, dass Tuberkulose Bronchiektasien begünstigt, es handelt sich jedoch um zwei verschiedene Erkrankungen und nicht alle Ergebnisse sind daher übertragbar. Dies dürfte die Suche nach einer erfolgreichen Behandlungsmethode erheblich verzögern.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.252.g: "Zeitverschwendung!" #NT!
 panum.253.t: "Scharlatanerie" #NT!
 panum.253.d: "Der Besuch eines Sanatoriums in [SCOPE.sState('panum_disease_state').GetCityHubName] erwies sich für Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] als völlige Enttäuschung." #NT!
 panum.253.f: "'Viele Kollegen und anerkannte medizinische Spezialisten haben mir das Sanatorium in [SCOPE.sState('panum_disease_state').GetCityHubName] empfohlen. Es ist eine vorbildliche Einrichtung, die auf dem Gebiet der Tuberkulose mit äußerst ernsthaften Methoden operiert – sagten sie. Mehrere Patienten sprachen von medizinischen Wundern, die dort geschehen sind.\n\nNach wochenlangen Besuchen wurde mir jedoch klar, dass es sich hauptsächlich um Marketing handelte. Während mir die Ärzte vor Ort versicherten, wie groß die Heilungschancen seien, entdeckte ich das genaue Gegenteil. Als ich die Patientenakten durchsah, stellte ich fest, dass fast 50 Prozent der aufgenommenen Patienten in der ersten Woche starben. Dieses ganze Sanatorium ist ein Schwindel!\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.253.g: "Aber... aber... das Abendessen sollte ausgezeichnet sein!" #NT!
 panum.254.t: "Kontakt mit dem Weißen Tod" #NT!
 panum.254.d: "Offenbar haben die vielen Besuche bei Tuberkulosepatienten eine unbeabsichtigte Wirkung: Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat heute Blut gespuckt!" #NT!
 panum.254.f: "'Was für ein unglücklicher Tag. Mein Umgang mit Tuberkulose und mein vermeintliches Wissen über die Krankheit rächen sich jetzt. Einerseits habe ich mich auf so vielen Ebenen geirrt, dass es nur richtig ist, dass mein Stolz bestraft wird. Andererseits ist es ein Hinweis darauf, dass es sich um eine ansteckende Krankheit handelt. Aber zu welchem ​​Preis musste ich diese Entdeckung machen?\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] in [TimeKeeper.GetCurrentDate.Format('y')], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.254.g: "Der Arzt wird sich davon erholen, oder?" #NT!
  
 panum.264.t: "Die Ansteckung" #NT!
 panum.264.d: "Aufgrund des historischen Interesses von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ist [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] auf ein altes Buch aus der Renaissance gestoßen – das von unschätzbarem Wert ist." #NT!
 panum.264.f: "Schon 1546 postulierte der Veroneser Arzt Girolamo Fracastoro, dass Krankheiten vor allem durch die Infektion mit winzigen Partikeln entstehen, die an spätere Keime erinnern. Er zweifelte deshalb schon vor über 300 Jahren an der Miasmentheorie. Auch in Bezug auf Tuberkulose sagt Fracastoro, dass es sich um eine ansteckende Krankheit handelt, die durch diese Erreger übertragen wird. Das Buch ist teilweise überzeugender als viele moderne Abhandlungen. Revolutionär ist, dass Fracastoro davon ausgeht, dass diese sogenannten ‚Fomites‘ über die Atemwege oder Körperporen eindringen, um nach Nahrung zu suchen. Dadurch würde die Krankheit voranschreiten." #NT!
 panum.264.g: "Dies wird die Suche nach einer Behandlung anregen." #NT!
 panum.264.h: "Dies ist viel überzeugender als die Miasmentheorie." #NT!
 panum.264.i: "Könnte ein kleiner Erreger Tuberkulose verursachen?" #NT!
  
 panum.240.t: "Tuberkulose - eine ansteckende Krankheit" #NT!
 panum.240.d: "Durch mehrere Experimente und Patientenuntersuchungen konnte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] schlüssig beweisen, dass Tuberkulose nicht nur eine ansteckende Krankheit ist, sondern konnte in [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Abhandlung ‚[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]‘ auch mehrere Präventionsmethoden daraus ableiten." #NT!
 panum.240.f: "'Die Erkenntnis, dass Tuberkulose eine Krankheit ist, die von Mensch zu Mensch und auch von Tier zu Mensch übertragen werden kann, führt zu einer ganzen Reihe von Maßnahmen zur Vorbeugung der Krankheit.\nErstens müssen Tuberkulosekranke von der Masse ferngehalten werden.\nZweitens muss die Krankheit meldepflichtig sein, damit die Ausbreitung eingedämmt werden kann.\nDrittens müssen Vorschriften erlassen werden, um die öffentliche Hygiene zu gewährleisten – etwa ein Verbot des Spuckens in der Öffentlichkeit oder zumindest die Verwendung öffentlicher und persönlicher Spucknäpfe.\nViertens muss die öffentliche Gesundheit verbessert werden, um die Ansteckung unter Proletariern zu minimieren.\nFünftens ist die Pasteurisierung von Rohmilch unabdingbar.'\n\nAus:[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.240.g: "Tuberkulose ist kein Schicksal mehr." #NT!
  
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Dies gibt einen Hinweis...wahrscheinlich." #NT!
  
 panum.540.t: "Vorbeugen? Vorbeugen!" #NT!
 panum.540.d: "Nach wochenlanger Forschung und Studien hat unser Arzt ein Mittel entwickelt, um die Ausbreitung des Gelbfiebers zu stoppen!" #NT!
 panum.540.f: "'...aber am Ende blieb ein Beweis übrig, der sicher und unentschuldbar war. Ob durch Netze, Rauch oder Pestizide, meine Untersuchung ergab, dass die Ausbreitung des Gelbfiebers gestoppt wurde, wenn der Weg der Mücke aus irgendeinem Grund unterbrochen wurde. Es muss sich also um eine von Insekten übertragene Krankheit handeln. Wenn wir den Laichprozess unterbrechen können, können wir sehr gut verhindern, dass neue Mücken ankommen und unsere Leute infizieren. Es ist lediglich eine Frage der Mittel, und ich habe einen Drei-Punkte-Plan ausgearbeitet.\n\nI: Besprühen Sie lokale Teiche, Sümpfe und Moore mit Pestiziden, um sie für das Laichen ungeeignet zu machen. Wenn möglich, sollten kleinere Gewässer vollständig trockengelegt werden.\nII: Bringen Sie an allen Öffnungen öffentlicher Gebäude, insbesondere Krankenhäuser, Moskitonetze an, also mit Pestiziden getränkte Stoffabdeckungen.\nIII: Informieren Sie die Menschen über die Natur dieser Krankheit, die von Mücken übertragen wird, und regen Sie sie dazu an, ihre Häuser mit Netzen, Insektiziden und Rauch auszuräuchern.\n\nIch bin der festen Überzeugung, dass wir, wenn diese Methoden umgesetzt werden, noch zu unseren Lebzeiten das Ende des endemischen Gelbfiebers und damit auch dieses hartnäckigste aller Übel erleben könnten.'\n\nAus:[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] von Dr.[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]" #NT!
 panum.540.g: "Gut gemacht, Doktor. Jetzt muss ich nur noch ein paar Moskitonetze und Insektenspray besorgen ..." #NT!

 panum.541.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], unser Chefarzt, ist in [SCOPE.sState('panum_disease_state').GetName] eingetroffen, um das mysteriöse Gelbfieber zu untersuchen." #NT!
 panum.541.f_america: "'Wir kamen lange vor Tagesanbruch in [SCOPE.sState('panum_disease_state').GetCityHubName] an. Als unser Zug den Bahnhof erreichte, war der Bahnsteig leer und in der Lokomotive befand sich nur eine Thermoskanne mit heißer Suppe für den Fahrer und seine Kollegen. Nur wenige Menschen würden so früh am Morgen einen Zug verlassen, aber ich hatte kaum zur Ruhe kommen können. Die Briefe und Notizen der örtlichen Behörden lasteten schwer auf meinem Gemüt, denn sie sprachen von einer seltsamen Krankheit, dem Gelbfieber. Der Name stammt von der Gelbsucht, die mit der Krankheit einhergeht, aber das ist noch lange nicht das Ende der Beschwerden – Erbrechen, Bauchschmerzen, Augenblutungen, und viele sterben daran.\n\nAber während uns die Folgen bekannt sind und in Berichten aus der Zeit der ersten Kolonisierung dieser Länder niedergeschrieben wurden, hat sich die Natur der Krankheit selbst lange der Wissenschaft entzogen. Dort fand ich den Entschluss und die Energie, meine Kollegen zu wecken und sie aus dem Zug in die Stadt zu führen, unter dem Schein der Gaslampen, um die die Mücken unaufhörlich schwirren. Wenn wir diese Krankheit jemals besiegen wollen, müssen wir die größte Frage von allen klären. Wogegen kämpfen wir?'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt" #NT!
 panum.541.f_africa: "'Es war kurz nach Mittag, als unser Schiff in den Hafen einlief und der Kapitän uns mitteilte, dass wir unser Ziel erreicht hatten. Die lokale Verwaltung eines der großen Außenposten unseres Kolonialreichs hatte der Hauptstadt eine seltsame, tödliche Krankheit gemeldet, die sie nur schwer verstehen konnten - keine gewöhnliche Grippe, sondern das berüchtigte Gelbfieber. Es ist mir und auch niemandem, der sich gut mit der Geschichte tropischer Krankheiten auskennt, wirklich fremd ... aber trotz allem, was wir über die vielen Todesursachen wissen, wissen wir so wenig über die Krankheit selbst.\n\nIn Begleitung meiner Assistenten und einer bewaffneten Eskorte haben wir unweit des Stadtzentrums ein Labor eingerichtet. Dort könnten wir unsere Proben aufbewahren, uns ein Zuhause einrichten und die notwendigen Untersuchungen durchführen, um die Geheimnisse des Gelbfiebers zu entschlüsseln ... aber zuerst müssen wir diese Proben finden, und die ständige Anwesenheit von Moskitos ist eine unwillkommene Ablenkung. Dennoch wird es uns nicht von unserer Arbeit abhalten.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt" #NT!
 panum.541.g: "Kommen Sie, meine Herren ... gähn." #NT!
 panum.541.h: "...verdammte Mücken." #NT!
 panum.542.t: "Kriege von gestern" #NT!
 panum.542.d: "Um mehr über die Geschichte des Gelbfiebers in diesen Ländern herauszufinden, hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] beschlossen, den Kommandeur einer örtlichen Garnison zu konsultieren." #NT!
 panum.542.f: "'Ah, schön, Sie zu sehen, Doktor. Meine Männer sind immer froh, wenn sie wissen, dass sie in guten Händen sind, wenn sie krank werden. Was kann ich für Sie tun?'\n'Die Freude ist ganz auf meiner Seite, Colonel. Mir wurde gesagt, dass Sie vielleicht Aufzeichnungen von vergangenen Feldzügen hier haben. Haben Sie welche, bei denen es unter den Truppen zu einem Ausbruch von Gelbfieber gekommen sein könnte?'\n'Oh, ganz bestimmt … hier. Das war ein schrecklicher Feldzug, glauben Sie mir, und nicht nur der Feind. Viele Männer, die im Krieg sterben, sterben an den Elementen, Krankheiten, Kälte. Man nennt das Abnutzung.'\n'Diese … Abnutzung war also besonders schlimm?'\n'Schlimmer als schlimm. Zwischen der Krankheit und der Regenzeit hatte ein Mann im Lager mehr zu befürchten als auf dem Schlachtfeld. Die Hitze war auch schrecklich, und die Insekten.'" #NT!
 panum.542.g: "Insekten, Krankheiten, Regen … eine Hölle, die die Natur selbst geschaffen hat, könnte man sagen." #NT!
 panum.543.t: "Felder des Elends" #NT!
 panum.543.d: "Um mehr über das Gelbfieber zu erfahren, hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] seine Mission fortgesetzt und ist außerhalb der Siedlung zu einem scheinbaren Infektionsherd gereist – einem Bauernhof auf dem Land." #NT!
 panum.543.f: "'Ich gebe zu, ich habe fast eine Stunde gebraucht, um diesen ländlichen Akzent zu verstehen, aber der Besitzer der Farm erwies sich als sehr informativ. Obwohl es in dieser Region oft ziemlich feucht ist, müssen Bewässerungsarbeiten durchgeführt werden. Das Graben dieser Gräben erfordert jedoch viel Kraft, die von vielen Dutzenden einheimischen Arbeitern aufgebracht wird, die oft in engen, überfüllten Baracken zusammenleben. Solche Bedingungen können Krankheiten hervorrufen, und es ist keine Überraschung, dass das Gelbfieber dort bald zu finden war.\n\nDer Bauer selbst glaubt, dass es von einem fahrenden Händler oder vielleicht von Händlern kam, die die Ernte einholten oder Werkzeuge lieferten. Er kann es nicht mit Sicherheit sagen, aber ich selbst würde das bezweifeln. Es scheint eher so, als ob das Gelbfieber hier von selbst aufgetaucht ist ... aber wenn ja, wie?'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über das Gelbfieber schreibt." #NT!
 panum.543.g: "Wie konnte eine Krankheit einfach aus dem Nichts auftauchen?" #NT!
 panum.544.t: "Das Wasser...?" #NT!
 panum.544.d: "Um die Möglichkeit zu untersuchen, dass Gelbfieber eine durch Wasser übertragene Krankheit sein könnte, hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Proben aus örtlichen Wasserwegen und Brunnen gesammelt." #NT!
 panum.544.f: "'Eine Möglichkeit, die ich in Betracht gezogen hatte, war, dass diese Krankheit möglicherweise ähnlicher Natur wie Cholera sein könnte, die durch verseuchtes Wasser übertragen werden könnte. Um herauszufinden, ob dies der Fall war, befahl ich meinen Assistenten, Proben zu sammeln, bevor ich einen ruhigen Platz für mein Mikroskop suchte, an dem ich ungestört arbeiten konnte. Die feuchte und tropische Luft lenkt ab, ebenso wie das unaufhörliche Summen der Moskitos, aber schon bald begannen die Proben unter die Linse zu gleiten, sodass ich in diese winzigste aller Welten blicken konnte.\n\nLeider war dies ein vergebliches Unterfangen. Einige waren schmutziger als andere und trugen sogar winzige Würmer und dergleichen, aber diese passten nicht zum Muster der Infizierten, das sich wie ein Schrotregen über die Karte verteilt. Wie dem auch sei, ich kann in diesem Wasser keine Hinweise auf die Natur des Gelbfiebers finden …'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt" #NT!
 panum.544.g: "...aber wenn sie nicht da sind, wo verstecken sie sich dann?" #NT!
 panum.545.t: "Die Insel" #NT!
 panum.545.d: "Verwirrt durch einen scheinbaren 'Bruch' im Infektionsmuster hat sich Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] an einen ungewöhnlichen Ort gewagt – eine Inselfischerei." #NT!
 panum.545.f: "'Ah, Sie müssen Doktor sein ... oh. Entschuldigen Sie den Gestank, Doktor. Passen Sie auf, dass Sie nicht hineinfallen. Die Fische, die die Eingeweide fressen, die wir wegwerfen, würden Sie wahrscheinlich fressen, wenn sie können.'\n'... bitte, beeilen Sie sich. Erzählen Sie mir von diesem Ort.'\n'Ja, also, ich denke, Sie werden froh sein zu hören, dass es hier überhaupt keine Krankheiten gibt. Jedenfalls nicht dieses Gelbfieber.'\n'Wieso? Gibt es etwas, das Ihre Männer verschonen könnte?'\n'Vielleicht liegt es daran, dass sie so wenig Zeit an Land verbringen. Die meisten Tage sind sie auf See, und manche ziehen weiter hinaus und kommen einen Tag oder länger nicht zurück. Aber ich glaube, da muss noch mehr dahinterstecken. Sie verbringen ihre Freizeit hier auf der Insel, in den Kasernen oder in ihren Häusern, und hier gibt es überhaupt kein Fieber.'\n'Ich werde nachforschen... nein, meine Assistenten können das tun, nachdem ich zurück bin.'\n'Ich werde es auf jeden Fall allen mitteilen, Doktor... und sie haben sich nicht einmal verabschiedet.'" #NT!
 panum.545.g: "…aber zuerst ein Seifenbad. Ein sehr, sehr seifiges Bad." #NT!
 panum.546.t: "Sumpfgas?" #NT!
 panum.546.d: "In einer möglicherweise beunruhigenden Rückkehr der alten Miasmentheorie hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] überraschende Berichte gefunden: Gelbfieber könnte mit Sumpfdämpfen zusammenhängen!" #NT!
 panum.546.f: "'Es schmerzt mich, wie wenig hier Sinn zu ergeben scheint. Nichts stimmt mit den etablierten Theorien überein, die wir kennen, und ich klammere mich an jeden Strohhalm. Es gibt jedoch eine vielversprechende Quelle – Sümpfe. Meine Assistenten haben Objektträger für das Mikroskop vorbereitet, und sie wimmeln und gedeihen von Mikroben, aber nichts, was wir identifizieren könnten. Und trotzdem breitet sich die Seuche an den Küsten aus. Häuser in der Nähe dieser Sümpfe sind am schlimmsten von Gelbfieber betroffen. Einige erwähnen sogar, dass sie es in ihrer Kindheit hatten.\n\nUnd doch gibt es keinen Hinweis darauf, wie. Sie trinken das Wasser nicht, sie essen keinen Fisch, der darin gefangen wurde, und doch weht der Gestank davon mit der Brise zu ihren Häusern, überflutet sie mit dem Gestank und bald darauf folgt eine Krankheit. Die alten Texte würden 'Miasma' schreien, aber das kann nicht wahr sein...aber wenn nicht, wie sonst könnte sich die Krankheit vom Sumpf ins Haus ausbreiten?'n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt" #NT!
 panum.546.g: "... oder vielleicht ist es astrologisch ... nein, das macht keinen Sinn ... oder?" #NT!
 panum.547.t: "Der Rivale" #NT!
 panum.547.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat beschlossen, die Expertise eines örtlichen Experten einzuholen und einen potenziellen Verbündeten aufzusuchen: den örtlichen Gerichtsmediziner." #NT!
 panum.547.f: "'Ah, schön, Sie kennenzulernen, Doktor. Ich entschuldige mich, wenn wir uns nicht die Hand geben, ich habe eine Leiche auf der Platte im anderen Zimmer.'\n'Gelbfieber?'\n'Das könnte man meinen, aber nein. Malaria, können Sie das glauben? Von allen Zeiten, in denen es einen Ausbruch gibt, haben wir ihn jetzt, zur gleichen Zeit.'\n'Ein unglücklicher Zufall?'\n'Vielleicht, aber ich bin lange genug hier, um ein Muster zu erkennen. Die beiden treten in der Regel paarweise auf, und schlimmer noch, sie haben ähnliche Symptome und ähnliche Todesfälle. Es ist eine schreckliche Aufgabe, die beiden auseinanderzuhalten, das sage ich Ihnen. Ich hätte gedacht, sie wären dasselbe.'\n'Das ist … eigentlich ziemlich faszinierend. Haben Sie gute Aufzeichnungen darüber?'\n'Oh, natürlich. Ich werde meinen Assistenten bitten, sie Ihnen zu schicken, obwohl ich nicht weiß, wie hilfreich sie sein könnten. 'Ich weiß nicht, wie sich dieses Ding verbreitet, Doktor, aber ich wette, wenn Sie das eine finden, finden Sie vielleicht auch das andere.'" #NT!
 panum.547.g: "Dann könnten wir vielleicht zwei Fliegen mit einer Klappe schlagen." #NT!
 panum.548.t: "Die gegabelte Straße" #NT!
 panum.548.d: "Da ihm die Natur des Gelbfiebers Rätsel aufgab, schrieb Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zurück in die Hauptstadt und erbat weitere Anweisungen." #NT!
 panum.548.f: "'… und doch, so sehr ich es auch versuche, ich weiß nicht, wie ich weitermachen soll. Es gibt nur wenige 'Hinweise', die meine Untersuchung leiten, und obwohl ich sehr viele medizinische Fachzeitschriften durchgesehen und lokale Experten konsultiert habe, bin ich mir nicht ganz sicher, was Gelbfieber wirklich ist. Eine Krankheit, sicher, aber von welcher Art? Eine Krankheit der Luft, wie ein Miasma? Etwas im Wasser oder in der Nahrung? Wie verbreitet es sich von Mensch zu Mensch oder vielleicht vom Sumpf zum Menschen?\n\nDas sind Fragen, die ich nicht beantworten kann und deren Wahrheit ich vielleicht nie herausfinden werde. Wenn ich die Krankheit nicht finden kann, kann ich nicht hoffen, sie direkt zu bekämpfen, aber meine Untersuchung ist nicht ganz fruchtlos. Ich habe vielleicht zwei mögliche Forschungsansätze gefunden, die ich in Betracht ziehen kann:\n\nErstens könnten wir versuchen, ein Muster zu finden, wie es sich ausbreitet. Vielleicht können wir mit einer gezielten Untersuchung eine Logik erkennen, wie die Krankheit übertragen wird, und sie so unterbrechen. Vielleicht wird die Eindämmung der Ausbreitung die wahre Ursache ans Licht bringen.\n\nZweitens sollten wir versuchen, eine Art Heilmittel oder Impfstoff zu entwickeln, vielleicht indem wir die Kinder untersuchen, die sich in ihrer Jugend damit infiziert haben, aber wieder vollständig genesen sind, sowie diejenigen, die überleben. Wir kennen vielleicht nicht den Ursprung der Krankheit, aber vielleicht können wir sie noch besiegen.\n\nAus diesem Grund schreibe ich in die Hauptstadt, an Sie, geschätzte Herren der Bildung und Wissenschaft, und frage: Worauf soll der Schwerpunkt meiner Forschung hier liegen?\n\nEin Brief von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')]" #NT!
 panum.548.g: "Vorbeugen ist besser als heilen." #NT!
 panum.548.h: "Wir spielen um alles. Wir werden einen Impfstoff haben." #NT!
  
 panum.551.t: "Der Weg zur Prävention" #NT!
 panum.551.d: "Auf Anweisung der Hauptstadt hat Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mit der Untersuchung von Möglichkeiten zur Verhinderung der Ausbreitung des Gelbfiebers begonnen." #NT!
 panum.551.f: "'...natürlich ist es schwer zu bestimmen, was genau getan werden muss, um die Ausbreitung einer Krankheit zu verhindern, von der wir kaum mehr verstehen als, wie sie zum Tod führen kann. Doch wenn dies die Herausforderung ist, der ich mich stellen muss, dann soll es so sein. Ich habe bisher eine Reihe vielversprechender Spuren entdeckt; meine Karte der Infektion ist sporadisch, aber hier und da tauchen bestimmte Inseln der Unregelmäßigkeit auf ... Orte, an denen der Ausbruch deutlich oder sogar vollständig abnimmt.\n\nIch kann nicht behaupten, die Natur dieser Krankheit wirklich zu verstehen, aber Krankheit ist alles andere als unregelmäßig. Es gibt hier ein Muster, das darauf wartet, entdeckt zu werden, und wenn es gefunden werden kann, dann könnten wir dieses Rätsel sehr wohl lösen und das Gelbfieber für immer loswerden.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt" #NT!
 panum.551.g: "Wir bauen Stein für Stein eine Festung." #NT!
 panum.552.t: "Fakten zu Fillet O‘" #NT!
 panum.552.d: "Während er an einem Mittel zur Eindämmung der Gelbfieberausbreitung arbeitete, bekam Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Besuch von einem seiner Assistenten." #NT!
 panum.552.f: "'Ah, schön, dich wiederzusehen, mein Junge, und – du meine Güte! Was ist das für ein Gestank?'\n'Entschuldigen Sie, Doktor … ich bin gerade von der Fischerei zurückgekommen, die Sie mich untersuchen ließen. Ich habe etwas sehr Interessantes gefunden!'\n'So interessant, dass Sie anscheinend keine Zeit für ein Bad hatten …'\n'Verzeihen Sie mir, aber ja. Ich habe untersucht, warum die Männer in der Fischerei nicht von Gelbfieber betroffen waren, und habe angefangen, es bis zum Festland zu verfolgen. Am Ufer gibt es eine Räucherei, und die Arbeiter gehen daran vorbei, und dort bekommt niemand Gelbfieber. Und das brachte mich auf den Gedanken … vielleicht hält der Rauch es fern? Also habe ich angefangen, mich nach Orten mit viel Rauch umzusehen, und ich habe diesen Seifenmacher gefunden, und sie geben Kräuter und Öle in ihren Brenner. Kein einziger Fall von Gelbfieber in ihrem Haushalt.'\n'Hmmm … das ist faszinierende Arbeit. Setzen Sie Ihre Beobachtungen fort und halten Sie mich auf dem Laufenden, und, oh, gute Arbeit.'" #NT!
 panum.552.g: "Mit eifrigen Schritten wird der Assistent weggeschickt … der Arzt bleibt jedoch zum Nachdenken zurück." #NT!
 panum.553.t_america: "Die Mission" #NT!
 panum.553.d_america: "Die Nachforschungen von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] folgten den Lücken im Ausbruch und führten sie zu einer alten Kolonialmission." #NT!
 panum.553.f_america: "'Es dauerte nicht lange, bis wir die Mission hier fanden. Es war eines der ersten Gebäude, das nach der Kolonisierung errichtet wurde, unsere Vorfahren kamen gerade aus Ländern, die sie vielleicht nie wieder sehen würden. Es ist keine große Kathedrale, aber sie wurde mit Liebe gebaut, und im Laufe der Zeit haben Missionare und Mitglieder der Mutterkirche sie wachsen sehen, bis sie mit eigenen Stationen und Hallen explodierte. Es war einer der ersten Orte, wohin die Kranken gebracht werden konnten, wo sie von Nonnen und frommen Freiwilligen, die bereit waren zu helfen, versorgt wurden.\n\nNach allem, was man hört, hätte es sehr wohl zu einem eigenen Schlachthaus werden sollen ... und doch ist es nicht so. Während andere Krankenhäuser ihre Toten zählen und sehen, wie die Krankheit von Station zu Station springt, ist hier nichts passiert. Eine Familie wurde nach einem Hausbrand eingeliefert, aber nach einer Woche hatte sich keiner von ihnen mit Gelbfieber angesteckt, obwohl sie nur ein paar Zimmer weiter untergebracht waren. Es verwirrt mich, denn Mission und Krankenhaus sind sich ähnlich, aber es gibt einen großen Unterschied: Netze. Eine Predigt ist eine heilige Angelegenheit und darf nicht durch summende Moskitos und ihresgleichen gestört werden. Deshalb haben die Geistlichen alle Fenster mit Netzen versehen, um die Moskitos fernzuhalten, sogar die in den Kirchenbänken.\n\nUnd so schien das Gelbfieber vollständig zu verschwinden.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt." #NT!
 panum.553.g: "Denn ich werde dir deine Gesundheit wiedergeben ..." #NT!
 panum.553.t_africa: "Das Elendsviertel" #NT!
 panum.553.d_africa: "Die Nachforschungen von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], die den Spuren der Lücken im Ausbruch folgten, führten sie an einen merkwürdigen Ort – in die Slums." #NT!
 panum.553.f_africa: "Die Slums waren so nah, dass jeder an der Bedeutung unseres großen Kolonialunternehmens in diesen Ländern zweifeln konnte. Schmutzig und elend, bis zum Bersten voll mit Frauen und Kindern, die darauf warteten, dass ihre Männer von den Plantagen oder Minen oder wo auch immer sie arbeiten würden, zurückkamen. Überlastete Wasserpumpen füllen Töpfe, Fliegen summen und ein deutlicher Mangel an Hygiene – all das würde diesen Ort wie einen Hexenkessel der Krankheiten erscheinen lassen. Und das ist er auch.\n\nEin seltener Anblick an diesen Orten: Ein Arzt wie ich wurde eifrig von einheimischen Führern und in Begleitung der Polizei von Haus zu Haus geführt und gebeten, Einblicke in die eine oder andere Krankheit zu geben. Im Gegenzug stellte ich ihnen Fragen: Was ist mit Gelbfieber? Ich sah Fälle von Cholera und Ruhr, aber nicht die Krankheit, nach der ich suchte. Eine Frau zeigte auf die Fenster, oder wo sie sein sollten – statt Glas eine Wand aus Stoff, ein Netz. Für sie hielt es die Malaria ab, aber vielleicht auch das Gelbfieber ... das ihrer Meinung nach sehr wohl von Insekten übertragen werden könnte.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt" #NT!
 panum.553.h: "… und vielleicht, nur vielleicht, haben die Einheimischen recht?" #NT!
 panum.554.t: "Der größte Killer" #NT!
 panum.554.d: "Beim Durchlesen der Aufzeichnungen, die ihm von den örtlichen Streitkräften übergeben wurden, machte Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eine Entdeckung." #NT!
 panum.554.f: "'Ah, schön, Sie wiederzusehen, Colonel. Ich habe einige Fragen zu den Aufzeichnungen, die Sie mir gegeben haben. Haben Sie einen Moment Zeit?'\n'Oh, aber natürlich! Alles, was hilft.'\n'Hier wird erwähnt, dass der letzte Feldzug von einem Offizier geführt wurde, der, wie es scheint, zutiefst unter Insektenstichen litt.'\n'Ich fürchte, er litt sehr, sehr unter Insektenstichen. Stiche sind in diesem Land einfach ein Teil des Lebens, aber dort, wo sie herkamen … keine.'\n'Ich verstehe, ich verstehe … aber es wird auch erwähnt, dass die Armee sowohl von Malaria als auch von Gelbfieber heimgesucht wurde, die mehr Menschen durch Krankheit töteten als im Kampf.'\n'Ich fürchte, Abnutzung ist seit langem ein Teil der Kriegsführung.'\n'… aber nachdem sie den Einsatz von Pyrethrum angeordnet hatten, gingen die Fälle von Gelbfieber und Malaria stark zurück. Dann, eine Woche später, ordnete er an, das Gebiet zu besprühen, und wieder sanken die Zahlen. Was genau ist dieses Pyrethrum?‘" #NT!
 panum.554.g: "'Ach, Pyrethrum? Das wird verwendet, um die Truppen zu entlausen. Tötet Insekten, wissen Sie.'" #NT!
 panum.555.t_america: "Die Erinnerungen an vergangene Zeiten" #NT!
 panum.555.d_america: "Im Kampf gegen eine Krankheit, die Südamerika seit Jahrhunderten heimsucht, sucht Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] an einem seltsamen Ort nach Antworten – der Vergangenheit." #NT!
 panum.555.f_america: "'Manche sagen, die Vergangenheit sei ein anderes Land. In Amerika trifft das vielleicht mehr zu als anderswo, denn seit Kolumbus hat sich viel geändert, doch zu meiner Überraschung gehört die Krankheit, gegen die ich kämpfe, nicht dazu. Es hat Wochen gedauert, Tagebücher und Aufzeichnungen der ersten Kolonisten dieser Länder aufzuspüren, doch nun sind sie endlich in meine Hände gelangt. Es ist ein wertvoller Fund. Mit ihnen habe ich die Berichte früherer Ärzte, brillanter Köpfe, denen vielleicht die Werkzeuge gefehlt haben, die wir heute für selbstverständlich halten.\n\nDoch obwohl wir ihren unvollendeten Kampf geerbt haben, haben sie uns wertvolle Informationen hinterlassen, die es mir vielleicht ermöglichen, zu beenden, was sie begonnen haben. Es gibt eine wertvolle Offenbarung, die verborgen und ohne solche Berichte kaum zu erkennen ist. Von Zeit zu Zeit gibt es in dieser Region eine Gelbfieber-Explosion, fast wie am Schnürchen. Das allein ist nutzlos, aber es korreliert fast genau mit Tagebüchern, in denen von heftigen Regenfällen und sogar Überschwemmungen die Rede ist, die hier als weggeschwemmte Häuser in Fluten verzeichnet sind, denen dann Gelbfieber-Ausbrüche folgen. Könnten die beiden zusammenhängen?'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt" #NT!
 panum.555.g: "Wir alle stehen auf den Schultern von Riesen … sie hatten nur weniger Riesen, auf denen sie stehen konnten." #NT!
 panum.555.t_africa: "Hausmittel" #NT!
 panum.555.d_africa: "Vielleicht umstritten ist, dass Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] den Rat der Menschen eingeholt hat, die sich mit dem Gelbfieber am besten auskennen – den Einheimischen." #NT!
 panum.555.f_africa: "'Manche würden mich für verrückt erklären, weil ich die Eingeborenen und nicht eine medizinische Fachzeitschrift zu Rate ziehe, aber ich glaube, ihnen fehlt die vernünftige Begründung für ein solches Urteil. Gelbfieber ist eine Krankheit, die hier in Afrika vorkommt, und diese Menschen leben hier schon viel länger als wir. Es besteht tatsächlich die Möglichkeit, dass diese Krankheit überhaupt erst in diesem Land aufgetreten ist. Vielleicht ist das so, denn viele Ausbrüche hier töten Europäer und dergleichen mit Leichtigkeit, hinterlassen bei den einheimischen afrikanischen Menschen jedoch nicht mehr als Symptome, die einer leichten Grippe ähneln.\n\nDoch trotz allem gibt es Verständnis. Ich habe mit einer Reihe lokaler Heiler und sogar Vertretern von Stämmen weiter im Landesinneren gesprochen, und sie erwähnen bestimmte vorbeugende Praktiken … das Verbrennen von Elefantenmist und verschiedenen Pflanzen, sogar das Einbringen des Rauchs in Innenräume, der die Moskitos vertreibt, die ihrer Meinung nach mit Malaria und vielleicht auch mit Gelbfieber in Verbindung stehen. Darüber hinaus haben sie eine Möglichkeit, das Land um sie herum zu lesen und den Beginn der 'Regenzeit' vorherzusagen, die ihrer Meinung nach mit den schlimmsten Ausbrüchen von Malaria und Gelbfieber einhergeht. Es bedarf weiterer Studien und Überlegungen, aber es ist vielversprechend.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der in [SCOPE.sState('panum_disease_state').GetName], [TimeKeeper.GetCurrentDate.Format('y')] über Gelbfieber schreibt" #NT!
 panum.555.h: "Weisheit am wenigsten erwartet." #NT!
 panum.556.t: "Einfacher Stoff?" #NT!
 panum.556.d: "Obwohl sie zur Unterstützung unserer Truppen in einer Grenzgarnison gedacht waren, sind neue, mit Insektiziden imprägnierte Stoffe in derselben Stadt eingetroffen, die Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] untersucht." #NT!
 panum.556.f: "'Sind Sie in dieser Gegend zu Hause? Oh, ich verstehe, Sie sind der Arzt aus der Hauptstadt. Ich weiß nicht, ob es hier viel für Sie gibt, Doktor. Hier in der Gegend gibt es keinen einzigen Fall von diesem Fieber.'\n'… das weiß ich. Was ist das?'\n'Die Generäle zu Hause haben herausgefunden, dass sie Pestizide direkt in den Stoff mischen und die verdammten Käfer in Schach halten können. Sehen Sie? Schauen Sie auf den Boden. Dutzende dieser Mistkerle sind bereits tot.'\n'Es muss sehr effektiv sein, sie so schnell zu töten. Wie viele Männer bleiben in diesen Zelten?'\n'Der größte Teil eines Bataillons, wahrscheinlich etwa sechshundert. Der Stoff ist neu, da die alten letztes Jahr bei einem Monsun zerstört wurden. Schreckliche Zeit, überall Fieber und auch Malaria. Jetzt haben wir das hier, nichts.'" #NT!
 panum.556.g: "... hast du gerade gesagt, dass du kein einziges Fieber mehr hast, seit du diesen neuen Stoff hast?" #NT!

