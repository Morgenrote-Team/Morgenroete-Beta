 panum_antitoxins_tech: "Antitoxine" #NT!
 panum_antitoxins_tech_desc: "Ein Antitoxin ist ein Antikörper mit der Fähigkeit, ein bestimmtes Toxin zu neutralisieren. Antitoxine gegen Diphtherie- und Tetanustoxine wurden ab 1890 von Emil Adolf von Behring und seinen Kollegen hergestellt. Sie gelten als Meilensteine ​​der Medizingeschichte." #NT!
  
