 panum_physician_famous: "Berühmter Arzt" #NT!
 panum_physician_famous_desc: "Die medizinischen Innovationen und Entdeckungen dieses $panum_physician$ machen ihn auf dem Gebiet der Medizin berühmt." #NT!
  
