 panum.3000.t: "Das Rote Kreuz" #NT!
 panum.3000.d: "Angesichts der Schrecken moderner Kriegsführung wurde 1990 ein 'Internationales Komitee von Hilfsgesellschaften zur Versorgung Verwundeter' gegründet. Ziel des Komitees ist es, länderübergreifend Kriegsverletzten zu helfen." #NT!
 panum.3000.f: "Das Rote Kreuz hat folgende Beschlüsse gefasst:\n- die Gründung nationaler Hilfsgesellschaften für Kriegsverletzte\n- die Neutralität der Verwundeten\n- die Entsendung freiwilliger Krankenschwestern in die Schlachtfelder zur Hilfeleistung\n- die Organisation und Durchführung weiterer internationaler Konferenzen\n- die Einführung eines Erkennungs- und Schutzsymbols in Form einer weißen Armbinde mit einem roten Kreuz" #NT!
 panum.3000.g: "Ein entscheidender Schritt vorwärts in der internationalen Zusammenarbeit." #NT!
 panum.3001.d: "Angesichts der Schrecken moderner Kriegsführung wurde 1940 ein 'Internationales Komitee von Hilfsgesellschaften zur Versorgung Verwundeter' gegründet. Es soll länderübergreifend Kriegsverletzten helfen. Ein Gesandter fragte, ob auch unser Land diesem Verband beitreten möchte." #NT!
 panum.3001.g: "Wir treten dieser Organisation als Gründungsmitglied bei." #NT!
 panum.3001.h: "Interessant." #NT!
 panum.3002.d: "Der Schweizer Kaufmann Henry Dunant war sich der Schrecken moderner Kriegsführung bewusst und gründete ein 'Internationales Komitee von Hilfsgesellschaften zur Versorgung Verwundeter'. Ziel des Komitees ist es, länderübergreifend Kriegsverletzten zu helfen." #NT!
 panum.3002.f: "1859 stolpert der Schweizer Kaufmann Henry Dunant durch Zufall auf das Schlachtfeld von Solferino. Erschüttert von den Hilferufen der rund 40.000 sterbenden und verwundeten Soldaten beginnt er, Freiwillige aus der Gegend zu ermutigen, den Opfern zu helfen – ob Freunden oder Feinden. Sein 1862 erschienenes Buch 'Eine Erinnerung an Solferino' macht die Schrecken des modernen Krieges den Massen bewusst. Regierungen und Bürger entwickeln gleichermaßen ein Interesse an der Eindämmung des Krieges. Am 17. Februar 1863 gründet das fünfköpfige Komitee, dem Dunant angehört, das Internationale Komitee des Roten Kreuzes. Delegierte aus 16 Nationen treffen sich vom 26. bis 29. Oktober 1863 auf der 1. Genfer Konferenz, um Dunants Ideen weiterzuentwickeln. Das Rote Kreuz auf weißer Fahne wird zum internationalen Schutzsymbol für Helfer. 1901 erhält Dunant den weltweit ersten Friedensnobelpreis." #NT!
  
 panum.3011.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]-Konvention" #NT!
 panum.3011.d: "1997 wurde eine internationale Konferenz einberufen, um den Schutz der Verwundeten, die Neutralität des medizinischen Personals und das Rote Kreuz als Schutzsymbol festzulegen." #NT!
 panum.3011.f: "'Aber die Frauen von Castiglione, die sahen, dass ich keinen Unterschied zwischen den Nationalitäten machte, folgten meinem Beispiel und zeigten diesen Männern, deren Herkunft so unterschiedlich war und die für sie alle Ausländer waren, dieselbe Freundlichkeit. ‚Tutti fratelli‘, wiederholten sie gefühlvoll. Alle Ehre diesen Frauen, diesen Mädchen von Castiglione! Unerschütterlich, unermüdlich, unerschütterlich, ihre stille Selbstaufopferung machte sich wenig aus Müdigkeit und Schrecken und aus ihrer eigenen Hingabe.' - Henry Dunant" #NT!
 panum.3011.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Konvention. Klingt gut." #NT!
 panum.3012.t: "Die [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]-Verträge" #NT!
 panum.3012.d: "Für [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] wurde eine internationale Konferenz anberaumt, um die Abrüstung voranzutreiben und die bisherigen völkerrechtlichen Regeln für Landkriege auf den Seekrieg auszudehnen." #NT!
 panum.3012.f: "'Das moralische Bewusstsein für die Bedeutung menschlichen Lebens, der menschliche Wunsch, die Qualen all dieser armen Kerle ein wenig zu lindern oder ihnen ihren gebrochenen Mut wiederzugeben, die wütende und unermüdliche Aktivität, die ein Mensch in solchen Momenten aufbringt, all dies vereint sich zu einer Art Energie, die einem das regelrechte Verlangen verleiht, so viele Leiden wie möglich zu lindern.\n\nDie vielen Szenen dieser furchtbaren und ernsten Tragödie geben keine weitere Trauer.' - Henry Dunant" #NT!
 panum.3012.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Verträge. Klingt gut." #NT!
 panum.3013.t: "Das [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]-Protokoll" #NT!
 panum.3013.d: "Im Jahr 1990 wurde eine internationale Konferenz einberufen, um den Einsatz von Giftgas im Krieg zu verbieten." #NT!
 panum.3013.f: "'Täglich werden mit einer Beharrlichkeit, die eines besseren Ziels würdig wäre, neue und schreckliche Methoden der Zerstörung erfunden, und die Erfinder dieser Zerstörungsinstrumente werden in den meisten großen europäischen Staaten, die sich in einem Rüstungswettlauf befinden, bejubelt und ermutigt, und schließlich weist die Stimmung in Europa zusammen mit vielen anderen Symptomen auf die Aussicht auf zukünftige Kriege hin, deren Vermeidung früher oder später kaum möglich scheint. Warum könnte man angesichts all dessen nicht eine Zeit relativer Ruhe und Stille nutzen, um eine Frage von solch immenser und weltweiter Bedeutung sowohl aus menschlicher als auch aus christlicher Sicht zu untersuchen und zu versuchen, sie zu lösen?' – Henry Dunant" #NT!
 panum.3013.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] Protokoll. Klingt gut." #NT!
  
 panum.3021.t: "Ein Sanitäter des Roten Kreuzes" #NT!
 panum.3021.d: "Nach einer äußerst blutigen Niederlage zeichnete ein Sanitäter [SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself] im Feldlazarett aus. [SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U] gehört dem Roten Kreuz an und ist möglicherweise zu etwas Höherem als dem bloßen Felddienst berufen." #NT!
 panum.3021.f: "'In einem der Krankenhäuser von Cremona hatte ein italienischer Arzt gesagt: Wir bewahren die guten Dinge für unsere Freunde der alliierten Armee auf und geben unseren Feinden das Nötigste. Wenn sie sterben, umso schlimmer! Und um diese barbarischen Worte zu entschuldigen, fügte er hinzu, er habe von einigen italienischen Soldaten, die aus Verona und Mantua zurückgekehrt waren, gehört, die Österreicher hätten die Verwundeten der französisch-sardischen Armee unbeachtet sterben lassen. Eine edle Dame aus Cremona, die Gräfin ..., die die Worte des Arztes gehört hatte und sich mit größtem Eifer den Krankenhäusern gewidmet hatte, beeilte sich, ihre Missbilligung zu zeigen, indem sie erklärte, sie schenke den Österreichern genau die gleiche Aufmerksamkeit wie den Alliierten und mache keinen Unterschied zwischen Freunden und Feinden. Denn, sagte sie, unser Herr Jesus Christus mache keine solchen Unterschiede zwischen Menschen, wenn es darum geht, Gutes zu tun.' - Henry Dunant" #NT!
 panum.3021.g: "Willkommen, Doktor [SCOPE.sCharacter('panum_new_physician_scope').GetLastName]." #NT!
  
 panum.740.t: "Eine Kinderangst weniger" #NT!
 panum.740.d: "Nach großer Anstrengung verfasste Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] schließlich [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Abhandlung über eine erfolgreiche Behandlungsmethode für [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Sie gilt als Meilenstein in der [ROOT.GetCountry.GetAdjectiveNoFlag] Medizin." #NT!
 panum.740.f: "Mit Spannung erwartete die Medizinische Fakultät die wissenschaftliche Abhandlung über [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]s Behandlungsmethode. In [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Abhandlung beschreibt der Arzt eine ganze Reihe effizienter Maßnahmen zur Bekämpfung von Scharlach. Die moderne Medizin bietet eine ganze Reihe von Möglichkeiten, um Scharlach auch nach Ausbruch der Krankheit wirksam in Schach zu halten. Eine Schlüsselrolle spielt dabei ein neu erfundenes Antitoxin. Die Arbeit von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] trägt den Namen [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]." #NT!
 panum.740.g: "Unzählige Eltern können nun ruhiger schlafen." #NT!
  
 panum.741.t: "Der [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting] Test" #NT!
 panum.741.d: "Der Arzt [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] entwickelte ein nach [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] benanntes Verfahren, das feststellt, ob ein Patient gegen Scharlach immun ist oder nicht." #NT!
 panum.741.f: "Der Dick-Test, der 1924 von George F. Dick und Gladys Dick entwickelt wurde, diente dazu, Personen zu identifizieren, die anfällig für Scharlach sind. Beim Dick-Test wurde ein verdünnter Stamm der Streptokokken injiziert, die bekanntermaßen Scharlach verursachen. Eine Reaktion der Haut an der Injektionsstelle identifizierte Personen, die anfällig für Scharlach sind. Die Reaktion war vier Stunden nach der Injektion sichtbar, war jedoch nach 24 Stunden deutlicher zu erkennen. Wenn keine Reaktion der Haut zu sehen war, ging man davon aus, dass die Person nicht durch die Krankheit gefährdet war, da sie eine Immunität dagegen entwickelt hatte." #NT!
 panum.741.g: "Ein sinnvolles Vorgehen." #NT!
 panum.742.t: "Scharlachserum" #NT!
 panum.742.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat ein wirksames Serum gegen Scharlach entwickelt, das [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] aus Pferdeblut gewann." #NT!
 panum.742.f: "Scharlachserum wurde ab November 1900 verwendet, nachdem es im Serotherapeutischen Labor des Rudolf-Krankenhauses in Wien entwickelt worden war. Das Serum wurde aus dem Blut von Pferden gewonnen. Dr. Paul Moser injizierte es infizierten Kindern in die Bauchhaut. Die Sterblichkeitsrate bei Scharlach (auch Scarlatina genannt) sank nach der Verwendung des Blutserums deutlich. Mosers Antitoxin reduzierte die Sterblichkeit bei Scharlach um 40 %." #NT!
 panum.742.g: "Pferdeblut? Pfui." #NT!
 panum.743.t: "Das Gegengift" #NT!
 panum.743.d: "Nach mehreren Tests ist Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sicher, dass [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ein Gegengift hergestellt hat, das gegen Scharlach wirksam ist." #NT!
 panum.743.f: "'Trotz der jüngsten wichtigen Fortschritte in der Kenntnis und Behandlung von Scharlach hat diese gefürchtete Krankheit einen großen Sprung über ihre saisonale Verbreitung hinaus gemacht. Wenn ein Antitoxin früh genug verabreicht wird, verringert es die Gefahr von Scharlach und seinen häufigen Folgekomplikationen. Die Krankheit weist jedoch immer noch Aspekte auf, die ihre Ausrottung äußerst wünschenswert machen. Es wurde festgestellt, dass eine steigende Dosis des Toxins, die anfälligen Personen verabreicht wird, diese immun macht.'" #NT!
 panum.743.g: "Ein entscheidender Durchbruch!" #NT!
  
