 panum.21.t: "Zerstreuung der Kranken" #NT!
 panum.21.d: "Dr. Hasnebein hat ein modernes System entwickelt, das Kranke und Verwundete nach der Schwere ihrer Verletzungen sortiert und so die Überlebenschancen der Patienten erhöht." #NT!
 panum.21.f: "Der russische Chirurg Nikolai Ivanovich Pirogov entwickelte aus seinen Erfahrungen im Kaukasuskrieg und im Krimkrieg abgestufte chirurgische Behandlungsverfahren und das Prinzip der 'Dispersalisierung der Kranken' (verteilte Behandlung der Verletzten und Kranken), um die überfüllten Verbandsplätze zu ordnen und die Verwundeten in fünf Stufen aufzuteilen (Pirogov-Screening-Prinzip). Die preußische Armee übernahm das russische Prinzip 1866, und es wurde später auch auf die anderen Sanitätsdienste der alliierten Armeen in Europa angewendet. In der weiteren Entwicklung wurden zahlreiche Fortschritte in der Medizin und in chirurgischen Methoden auch auf die Organisation des Militärsanitätsdienstes übertragen. Das Pirogov-Prinzip blieb jedoch während des Ersten Weltkriegs bestehen." #NT!
 panum.21.g: "Es gibt also eine Hierarchie der Kranken?" #NT!
 panum.22.t: "Eine Behandlung gegen Malaria" #NT!
 panum.22.d: "Durch die erfolgreiche Extraktion von Chinin aus der Rinde des Chinabaums hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eine Behandlungsmethode erfunden, die gegen Malaria hilft." #NT!
 panum.22.f: "Die Jesuiten besaßen bereits in der Frühen Neuzeit ein faktisches Monopol auf die Verwendung von Chinarinde zur Heilung von Malaria, auch wenn es in einigen protestantischen Ländern zunächst Vorbehalte gab. Zu Beginn des 19. Jahrhunderts, kurz nach der Entdeckung des Morphins, wurde Chinin als der die Wirksamkeit der Chinarinde bestimmende Inhaltsstoff gefunden und zu einem Eckpfeiler der aufkommenden Pflanzenchemie gemacht. Es wurde 1792 von Antoine François de Fourcroy in unreinem Zustand hergestellt und 1820 von Pierre Joseph Pelletier und Joseph Bienaimé Caventou durch Extraktion mit Alkohol aus der Chinarinde isoliert. 1823 wurde Chinin erstmals im industriellen Maßstab aus der Rinde von Chinarindenarten durch den Apotheker Friedrich Koch in Oppenheim gewonnen. Das Chinin stimulierte in der Folge die pflanzenchemische Forschung." #NT!
 panum.22.g: "Ein wertvolles Arzneimittel." #NT!
 panum.23.t: "Nur eine andere Patientenkategorie" #NT!
 panum.23.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat heute einen dringenden Brief an die Regierung geschickt. Darin kritisiert [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] die Behandlung psychisch Kranker und plädiert dafür, sie als Patienten zu behandeln, die eine bessere Behandlung verdienen – und nicht als asoziale Menschen, die aus der Gesellschaft ausgeschlossen werden müssen." #NT!
 panum.23.f: "Der erste entscheidende Schritt zur psychologischen Behandlung von Patienten erfolgte im 18. Jahrhundert, als Geisteskranke und normale Sträflinge nicht mehr in denselben Räumen 'eingesperrt' wurden, sondern getrennte Anstalten in Mode kamen. Diese lagen noch weit unter jedem humanen Standard. Ein weiterer Schritt wurde getan, als die schweren Eisketten, mit denen die Geisteskranken angekettet worden waren, zugunsten einer größeren Bewegungsfreiheit abgeschafft wurden. Ab Anfang des 19. Jahrhunderts wurde klar, dass auch diese Menschen krank waren und ein Recht auf Behandlung hatten. In England war der Lunacy Act 1845 ein wichtiger Meilenstein, da er den Status von Geisteskranken ausdrücklich in Patienten änderte." #NT!
 panum.23.g: "Auch das Seelenleben dieser Menschen zählt." #NT!
 panum.24.t: "Medizinisches und pflegerisches Wissen" #NT!
 panum.24.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] erinnerte daran, dass auch weniger qualifiziertes Personal als Krankenpfleger für die vielen Opfer auf den Schlachtfeldern mitunter von großem Nutzen sein kann, und plädierte für einen vermehrten Einsatz von Frauen als Krankenpfleger." #NT!
 panum.24.f: "Während in anderen europäischen Ländern, vor allem in Frankreich und Deutschland, katholische Orden die Ausbildung von Krankenpflegern zu ihrer Aufgabe machten, geschah dies in Großbritannien und anderen protestantischen Ländern kaum. Nur sehr wenige Klöster und Orden überlebten die englische Reformation. Der britischen Öffentlichkeit wurde dies durch die Veröffentlichungen von Florence Nightingale schmerzlich bewusst. Die Ausbildung von Pflegepersonal wurde damals als nationale Aufgabe angesehen, für die Spenden gesammelt wurden. Die von Nightingale gegründete Nightingale School of Nursing am St. Thomas’ Hospital in London wurde zum Kern dieser Professionalisierung. Mit ihrem Satz 'Ärzte befassen sich mit Krankheiten, Krankenschwestern mit Menschen' soll sie den Grundstein für eine Philosophie der Krankenpflege gelegt haben." #NT!
 panum.24.g: "Frauen, nach vorne." #NT!
  
 je_panum_spanish_flu_research: "Die [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Grippe: Forschung" #NT!
 je_panum_spanish_flu_research_reason: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat sich vorgenommen, die mysteriöse Pandemie genauer zu untersuchen. Wie erfolgreich [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] dabei sein wird, ist ungewiss. Ein erfahrener Arzt dürfte jedoch bessere Erfolgsaussichten haben." #NT!
 je_panum_spanish_flu_research_complete_tt: "Aus der Pandemie lassen sich neue Erkenntnisse gewinnen: zum Beispiel über den Entstehungsort, eine Beschreibung der Krankheit oder auch des Erregers." #NT!
  
 state_harvest_condition_panum_spanish_flu_condition_impact_mult: "[GetHarvestConditionType('panum_spanish_flu_condition').GetName] [concept_panum_disease] Auswirkungen" #NT!
 state_harvest_condition_panum_spanish_flu_condition_impact_mult_desc: "Eine Zunahme oder Abnahme der Auswirkungen der Pandemie." #NT!
 panum_spanish_flu_physician_help_modifier: "Arzt bekämpft Pandemie" #NT!
  
 panum.1110.t: "Der Doktor und die Pandemie" #NT!
 panum.1110.d: "Der Ausbruch der Pandemie ist für Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eine entscheidende Stunde: Jetzt kann [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe] glänzen! Doch es stellt sich die Frage: Sollte man die Pandemie besser aktiv bekämpfen oder erforschen?" #NT!
 panum.1110.f: "'An dem Tag, als klar wurde, dass wir es nicht mit einer gewöhnlichen Grippewelle zu tun haben würden, verspürte ich eine große Motivation, meinen Teil dazu beizutragen. Und gleichzeitig spürte ich die halsbrecherische Last auf meinen Schultern. Die Erwartungen waren riesig. Würde ich jemals in der Lage sein, die in mich gesetzten Hoffnungen zu erfüllen?'\n\nTagebucheintrag von [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]" #NT!
 panum.1110.g: "Bekämpfe die Pandemie." #NT!
 panum.1110.h: "Erforschen Sie die Pandemie." #NT!
 panum.1111.t: "Erreger der Pandemie" #NT!
 panum.1111.d: "Unser Chefarzt, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], und unser Chefbiologe, Doktor [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], haben heute eine geniale Entdeckung gemacht: Sie haben den Erreger der [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe entdeckt!" #NT!
 panum.1111.f: "Als Influenza-A-Virus H1N1 (A/H1N1) bezeichnet man einen Subtyp des Influenza-A-Virus (Art Alphainfluenzavirus influenzae) aus der Familie der Orthomyxoviridae, der bei Enten, Menschen und Schweinen vorkommt, aber auch zahlreiche andere Säugetierarten infiziert. H1N1-Influenzaviren etablierten sich infolge der Spanischen Grippe 1918 bei Menschen und Schweinen. Dieser Subtyp hat zig Millionen Menschenleben gefordert.\n\nWährend der Spanischen Grippe war der Erreger noch unbekannt. Manche Forscher hatten bereits ein 'filtrierbares Virus' vermutet. In Lehrbüchern galt das heute Haemophilus influenzae genannte Bakterium als Auslöser der Grippe. Mit den üblichen Methoden der Bakteriologie ließ sich jedoch kein Erreger nachweisen: Er ließ sich weder anfärben noch auf künstlichen Nährböden züchten. Wenn es durch die Spanische Grippe einen Erkenntnisfortschritt gab, dann insofern, als der eigentliche Erreger dieser Grippevariante damals noch unbekannt war und Haemophilus influenzae als Erreger ausgeschlossen werden konnte. Erst 1996 wurde das Genom des Virus entschlüsselt." #NT!
 panum.1111.g: "Heut'ka!" #NT!
 panum.1112.t: "Ursprung der Pandemie" #NT!
 panum.1112.d_historical: "Nach einer herausragenden wissenschaftlichen Untersuchung, die Geschichte, Kriminologie und medizinisches Wissen vereint, hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eine bahnbrechende Entdeckung gemacht: Die Pandemie ist nicht in Spanien ausgebrochen, wie so oft behauptet wird, sondern in Amerika!" #NT!
 panum.1112.f_historical: "Der Entdeckung des Arztes geht eine akribische Untersuchung voraus. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] verglich Patientenakten und ging bis zu den ersten Fällen in unserem Land zurück, um ein Netzwerk von Infektionen zu rekonstruieren. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] sammelte auch Daten von Kollegen im Ausland und besuchte sie teilweise selbst. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hat die Ergebnisse anderer Ärzte ausgewertet, die in ihrem Land ähnliche Anstrengungen unternommen haben. Wo die erste Infektion stattfand, kann [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] nicht mit Sicherheit sagen, aber alles deutet auf den Bundesstaat Kansas hin. Dass die Krankheit tatsächlich in Amerika ausbrach, ist mittlerweile eine wissenschaftliche Tatsache." #NT!
 panum.1112.g_historical: "Bedeutet das, dass wir über die amerikanische Grippe sprechen sollten?" #NT!
 panum.1112.d_dynamic: "Nach einer herausragenden wissenschaftlichen Untersuchung, die Geschichte, Kriminologie und medizinisches Wissen vereint, hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eine bahnbrechende Entdeckung gemacht: Die Pandemie brach nicht in [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName] aus, wie so oft behauptet, sondern in [SCOPE.sCountry('panum_pandemic_country').GetName]!" #NT!
 panum.1112.f_dynamic: "Der Entdeckung des Arztes geht eine akribische Untersuchung voraus. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] verglich Patientenakten und ging bis zu den ersten Fällen in unserem Land zurück, um ein Netzwerk von Infektionen zu rekonstruieren. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] sammelte auch Daten von Kollegen im Ausland und besuchte sie teilweise selbst. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] hat die Befunde anderer Ärzte ausgewertet, die in ihrem Land ähnliche Anstrengungen unternommen haben. Wo die erste Infektion stattfand, kann [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] nicht mit Sicherheit sagen. Dass die Krankheit tatsächlich in [SCOPE.sCountry('panum_pandemic_country').GetNameNoFormatting] ausbrach, ist mittlerweile eine wissenschaftliche Tatsache." #NT!
 panum.1112.g_dynamic: "Bedeutet das, dass wir über die Grippe sprechen sollten?" #NT!
 panum.1113.t: "Behandlung der Pandemie" #NT!
 panum.1113.d: "Während der [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Forschung zur [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe erfand Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mehrere Heilmittel und Verfahren und entwickelte einen Aktionsplan zur Eindämmung der Krankheit. Obwohl diese Erkenntnisse alle zu spät kommen, können sie für zukünftige Generationen hilfreich sein." #NT!
 panum.1113.f: "'Mell geht es heute viel besser und sie ist gut angezogen. Ich bin fast erschöpft von Sorgen und Schlafmangel. So viel Krankheit und Tod diese Woche, aber ein großer Lichtblick und Hoffnung auf den Ausgang des Krieges, als im vergangenen Jahr Frieden einkehrte.' -Helen Viola Jackson Kent, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippeüberlebende" #NT!
 panum.1113.g: "Nun, wir haben etwas gelernt." #NT!
 panum.1114.t: "Beschreibung der Pandemie" #NT!
 panum.1114.d: "Leider hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] während der Pandemie nur wenig Fortschritte gemacht. [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe] hat jedoch eine Beschreibung der Krankheit verfasst, die möglicherweise dabei helfen könnte, die Symptome von Varianten der [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Grippe zu erkennen." #NT!
 panum.1114.f: "'Diese Männer erkranken zunächst an einer Grippe oder Grippe, und wenn sie ins Krankenhaus eingeliefert werden, entwickeln sie sehr schnell die schlimmste Form von Lungenentzündung, die je beobachtet wurde. Zwei Stunden nach der Einlieferung haben sie mahagonibraune Flecken auf den Wangenknochen, und ein paar Stunden später beginnt die Zyanose, die sich von ihren Ohren über das ganze Gesicht ausbreitet, bis es schwer ist, die farbigen Männer von den weißen zu unterscheiden. Dann dauert es nur noch ein paar Stunden, bis der Tod eintritt, und sie müssen nur noch um Luft ringen, bis sie ersticken. Es ist entsetzlich. Man kann es ertragen, wenn ein, zwei oder zwanzig Männer sterben, aber wenn man sieht, wie diese armen Teufel wie die Fliegen umfallen, geht einem das irgendwie auf die Nerven.' -N. Roy Grist, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippeüberlebender" #NT!
 panum.1114.g: "Wir haben etwas mehr erwartet." #NT!
 panum.1115.t: "Das Geheimnis der Pandemie" #NT!
 panum.1115.d: "Leider war Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] den Anforderungen der Pandemie nicht gewachsen. Antworten zur Entstehung, Bekämpfung und Beschreibung der Krankheit konnte [ROOT.Var('panum_physician_var').GetCharacter.GetGetSheHe|U] nicht finden. Dafür schrieb der Doktor ein kleines Gedicht." #NT!
 panum.1115.f: "'Ich hatte einen kleinen Vogel,\nsein Name war Enza.\nIch öffnete das Fenster,\nund bekam Grippe-Enza.'" #NT!
 panum.1115.g: "Enttäuschend." #NT!
  
