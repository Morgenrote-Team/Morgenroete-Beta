 je_panum_cholera_treatment_reason: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] untersucht derzeit mehrere Patienten, um die Ursache von #YELLOW Cholera#!. zu ermitteln. Nur die wahren Gründe für das Auftreten der Krankheit können dazu beitragen, Präventionsmaßnahmen zu ergreifen, die zu einer modernen Behandlungsmethode führen. Wenn der Arzt seine Arbeit beendet hat, wird er seine These der Öffentlichkeit vorstellen. Dies wird zukünftige Epidemien nicht verhindern – dazu ist die Identifizierung des Erregers und möglicherweise eines Impfstoffs erforderlich –, aber die Auswirkungen einer neuen Epidemie werden relativ gering sein." #NT!
