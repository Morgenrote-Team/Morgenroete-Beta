 je_panum_functionalism: "Psychologische Schule des Funktionalismus" #NT!
 je_panum_functionalism_reason: "Funktionale Psychologie oder Funktionalismus bezeichnet eine psychologische Denkschule, die eine direkte Folge des Darwinismus war und die Aufmerksamkeit auf den Nutzen und Zweck von Verhalten richtet, das sich im Laufe der Menschheitsgeschichte verändert hat. Edward L. Thorndike, der vor allem für seine Experimente mit Trial-and-Error-Lernen bekannt ist, wurde als Anführer dieser lose definierten Bewegung bekannt. Der Funktionalismus lehnt das Prinzip der Introspektion ab, das eher dazu neigt, die inneren Vorgänge des menschlichen Denkens zu untersuchen, als die biologischen Prozesse des menschlichen Bewusstseins zu verstehen.\n\nJedes Land kann nur #R eine#! psychologische Schule gründen." #NT!
 je_panum_psychoanalysis: "Psychologische Schule der Psychoanalyse" #NT!
 je_panum_psychoanalysis_reason: "Die Psychoanalyse ist eine psychologische Theorie, Kulturtheorie, psychotherapeutische Behandlungsform und Methode zur Selbsterkenntnis, die um 1890 vom Wiener Arzt Sigmund Freud begründet wurde. Der Begriff Psychoanalyse steht sowohl für das auf Freuds Theorien über die Psychodynamik des Unbewussten basierende Beschreibungs- und Erklärungsmodell der menschlichen Psyche als auch für analytische Psychotherapie und für die psychoanalytische Methodologie, die sich auch mit der Untersuchung kultureller Phänomene beschäftigt. In allen drei Aspekten wird die Psychoanalyse bis heute von Klinikern und Forschern weiterentwickelt und verändert.\n\nJedes Land kann nur #R eine#! psychologische Schule begründen." #NT!
 je_panum_analytical_psychology: "Psychologische Schule der analytischen Psychologie" #NT!
 je_panum_analytical_psychology_reason: "Die analytische Psychologie ist eine psychoanalytisch orientierte psychologische Schule, die 1913 vom Schweizer Psychiater Carl Gustav Jung begründet wurde. Ähnlich wie die Psychoanalyse beschäftigt sie sich mit den unbewussten Anteilen der menschlichen Psyche, wobei davon ausgegangen wird, dass das Unbewusste einen weitaus größeren Einfluss hat als die bewusste Wahrnehmung. Jung und seine Nachfolger betonten insbesondere die symbolischen Ausdrucksmöglichkeiten des Unbewussten und versuchten diese psychotherapeutisch zu nutzen.\n\nJedes Land kann nur #R eine#! psychologische Schule begründen." #NT!
 je_panum_behaviorism: "Psychologische Schule des Behaviorismus" #NT!
 je_panum_behaviorism_reason: "Der Behaviorismus ist das wissenschaftstheoretische Konzept, das Verhalten von Menschen und Tieren mit naturwissenschaftlichen Methoden – also ohne Introspektion oder Empathie – zu untersuchen und zu erklären. Begründet wurde der Behaviorismus Anfang des 20. Jahrhunderts von John B. Watson nach wichtigen Vorarbeiten von Edward Lee Thorndike. Auch Iwan Petrowitsch Pawlow leistete mit seinen Experimenten zur klassischen Konditionierung des Verhaltens wichtige Pionierarbeit. In den USA waren die Vertreter des Behaviorismus über Jahrzehnte die einflussreichsten Verhaltensforscher an Universitäten und entschiedene Gegner der gleichzeitig entstehenden psychoanalytischen Schulen.\n\nJedes Land kann nur #R eine#! psychologische Schule begründen." #NT!
  
 panum_functionalism_school_founded_tt: "Die psychologische Schule des Funktionalismus wurde in einem anderen Land gegründet." #NT!
 panum_psychoanalysis_school_founded_tt: "Die Psychologische Schule der Psychoanalyse wurde in einem anderen Land gegründet." #NT!
