 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]" #NT!
 panum.138.d: "Herr Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat heute die Krankheitsbeschreibung [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] von [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] vorgestellt. Die Medizinische Fakultät betrachtet sie bereits als Klassiker." #NT!
 panum.138.f: "In [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] behandelt Abhandlung [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')] [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] die Krankheit ausführlicher als jeder andere Arzt in unserem Land zuvor. Sie informiert den Leser über Symptome, Inkubationszeit und Abgrenzung zu anderen Krankheiten, sowie eine Chronologie vergangener Epidemien und andere traditionelle epidemiologische Beschreibungen." #NT!
 panum.138.g: "Jetzt kennen wir das Biest besser." #NT!
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]" #NT!
 panum.139.d: "Nach großer Anstrengung verfasste Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] schließlich sein [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] über eine erfolgreiche Behandlungsmethode für die Krankheit [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Es gilt als Meilenstein in der [ROOT.GetCountry.GetAdjectiveNoFlag] Medizin." #NT!
 panum.139.f: "Mit Spannung wartete die Medizinische Fakultät auf die wissenschaftliche Arbeit zur Behandlungsmethode von [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. Könnte diese Arbeit vielleicht einen Durchbruch bringen? [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')] könnte potenziell unzähligen Menschen das Leben retten. Die darin beschriebenen Gründe für den Ausbruch von [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] und die Möglichkeiten, wie dieser verhindert oder anschließend behandelt werden kann, könnten die bisherige Denkweise über diese Krankheit grundlegend verändern." #NT!
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] verliert seinen Schrecken." #NT!
  
 panum.140.t: "Cholera – eine durch Wasser übertragene Krankheit!" #NT!
 panum.140.d: "Dank der heldenhaften Arbeit von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] konnte der Cholera-Ausbruch in [SCOPE.sState('panum_disease_state').GetCityHubName] entscheidend eingedämmt werden!" #NT!
 panum.140.f: "„Seit Beginn meiner Zeit hier in [SCOPE.sState('panum_disease_state').GetCityHubName] habe ich eine Menge Informationen gesammelt, die alle zu einer Schlussfolgerung führen: Cholera ist eine durch Wasser übertragene Krankheit. Die Krankheit, die seit Jahrhunderten so viele Menschen dahingerafft hat, ist nicht in der Luft zu finden, als Miasma, sondern wimmelt und windet sich in Wassertropfen. Wird sie eingenommen, entwickelt sie sich im Darm und manifestiert sich in der Cholera, die wir zu bekämpfen gelernt haben. Es ist eine Lektion, die schwer zu lernen war, aber schnell umgesetzt wurde. Letzte Woche haben sie die Griffe von der Wasserpumpe entfernt, die im Zentrum dieses Ausbruchs stand. Heute ziehe ich mich in den Abend zurück, ohne dass ein einziger neuer Fall an meinen Tisch gebracht wurde. Es ist unwiderlegbar. Das Biest ist erschlagen.\n\nDennoch empfinde ich einen Anflug von Wehmut über all dies. Ich wünschte nicht, ich könnte die volle, alleinige Verantwortung für die Entdeckungen übernehmen, die wir hier gemacht haben, nur, dass sie noch früher hätten entdeckt werden können. Viele Menschenleben gingen wegen des Mangels an sauberem Trinkwasser verloren, jung und alt. Wenn wir Glück haben, soll dies das letzte Mal gewesen sein, dass wir mit Cholera konfrontiert werden.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und die Untersuchung in [SCOPE.sState('panum_disease_state').GetCityHubName] abschließt." #NT!
 panum.140.g: "Unglaublich! Das ist ein tödlicher Schlag für die Miasmentheorie!" #NT!
 panum.141.t: "Die Brauerei" #NT!
 panum.141.d: "Die Ermittlungen von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] haben [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] auf eine sichere Insel im Ausbruch geführt – eine Bierbrauerei." #NT!
 panum.141.f: "„Hallo! Mir wurde gesagt, Sie seien der Vorarbeiter hier in der Brauerei. Ich bin Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] und bin hier, um den Ausbruch zu untersuchen. Bitte erzählen Sie mir mehr.“\n\n„Nun, hier unten war es kein großes Problem. Die meisten anderen Fabriken haben geschlossen, aber wir nicht.“\n\n„Die Cholera betrifft Sie hier nicht sehr? Haben Sie irgendeine Ahnung, warum?“\n\n„Nicht die geringste Ahnung, fürchte ich. Aber wenn ich wetten müsste, dann liegt es daran, dass die Jungs nicht zu dem ganzen Gestank nach Hause gehen.“\n\n„Sie essen in der Brauerei?“\n\n„Ja, und trinken auch! Der Chef gibt uns allen zum Mittagessen ein paar der älteren Chargen, die sich nicht gut verkaufen, ein kleiner, billiger Muntermacher für die Jungs. Kein Brunnenwasser für uns, nur ein Pint Bier für fast so wenig, wie die Herstellung gekostet hat.“" #NT!
 panum.141.g: "Hmmm ... also trinken Sie nicht das örtliche Wasser. Sehr faszinierend." #NT!
 panum.142.t: "Gewohnheitstiere" #NT!
 panum.142.d: "Die Ermittlungen von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] gehen weiter – [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hat das mögliche Zentrum des Ausbruchs gefunden." #NT!
 panum.142.f: "„...aber die Fälle in der Gegend waren so häufig, dass ich erkannte, dass ich mehr Hilfe brauchte. Glücklicherweise erwies sich das örtliche Leichenbeschaubüro als äußerst hilfreich: Sie hatten die Adresse jedes Hauses aufgeschrieben, aus dem sie eine Leiche geholt oder eine Krankheit festgestellt hatten, und so konnte ich jedes dieser Häuser auf einer einfachen Karte genau einordnen. Das resultierende Gebiet ist riesig und umfasst weit über hundert Häuser, bildet aber auch einen riesigen Kreis.\n\nDas widerspricht der traditionellen Vorstellung. Wenn es sich um ein Miasma handeln würde, würde es sicherlich von der Brise getragen werden und sich mit den vorherrschenden Winden bewegen. Stattdessen bewegt es sich jenseits der Winde, rund und beunruhigend ordentlich. Ich ging in die Mitte des Ganzen, vielleicht in der Hoffnung, einen Hinweis zu finden ... und fand nichts weiter als eine Wasserpumpe. Jedes Haus auf der Karte war zu Fuß erreichbar. Es muss irgendeine Verbindung geben.“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] nachforscht." #NT!
 panum.142.g: "Könnte es irgendwie an der Pumpe liegen?" #NT!
 panum.143.t: "Die Sonderbaren" #NT!
 panum.143.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat etwas Interessantes entdeckt – einen Bruch im Muster." #NT!
 panum.143.f: "„Oh, Gott sei Dank! Sie müssen der Arzt sein, von dem die Rede ist, Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Bitte, Sie müssen uns helfen.“\n\n„Das habe ich wirklich vor, Ma’am. Bitte erzählen Sie mir so viel wie möglich über sich und Ihre Familie und lassen Sie nicht das kleinste Detail aus, wenn Sie können. Ihr Fall scheint einer der wenigen Fälle in dieser Gegend zu sein?“\n\n„Ja, ja, das sind wir! Es kam einfach aus dem Nichts! Wir haben alle möglichen Vorsichtsmaßnahmen getroffen und sogar eine dieser Blumenmasken mit all den Blumen getragen, um den Gestank in Schach zu halten!“\n\n„Dann sind Sie in das Ausbruchsgebiet gefahren? Wozu auch immer?“\n\n„Meine Mutter, meine liebe Mutter … sie mochte das Wasser aus ihrer Pumpe immer lieber, aber als ich es zurückbrachte, muss die Krankheit an meinen Kleidern kleben geblieben sein und mit mir nach Hause gekommen sein.“" #NT!
 panum.143.g: "... hast du gesagt, du hättest Wasser von ihrer Pumpe mitgebracht?" #NT!
 panum.144.t: "Die Filter" #NT!
 panum.144.d: "In seinem Bemühen, weitere Hinweise zum Ausbruch zu finden, hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] herausgefunden, dass alle Opfer ihr Wasser von derselben Firma beziehen!" #NT!
 panum.144.f: "„...aber das ist das Merkwürdigste von allem. Wenn ich die Straße entlang oder flussaufwärts zu Häusern fuhr, die von der New River Company unterstützt wurden, sank die Zahl der Cholerafälle dramatisch. Es waren nicht mehr als üblich, wenn überhaupt. Wenn man nach Süden zurückkehrt, findet man die Straßen in Flammen der Cholera, erfüllt vom Gestank von unreinem Darm und Tod. Könnte dies eine Lokalisierung von miasmatischem Boden sein?\n\nIch denke nicht. Es scheint zu klar gekennzeichnet zu sein. Ich kontaktierte die ehrenwerten Herren der New River Company und sie teilten mir mit, dass ihre Rohre kürzlich geschlossen wurden, während sie mit großem Aufwand neue Filter an ihrer Pumpstation anbrachten. Könnten diese Filter eine unsichtbare Rolle dabei spielen? Könnte es die mangelnde Sauberkeit des Wassers sein, die das Miasma in Schach hält, oder etwas anderes?“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] untersucht" #NT!
 panum.144.g: "...ist im Wasser etwas, das Krankheiten überträgt?" #NT!
 panum.145.t: "Braunes Wasser" #NT!
 panum.145.d: "Ausgestattet mit den neuesten Instrumenten für die [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]-Forschung hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mithilfe eines [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]-Mikroskops Proben des Cholera-Ausbruchs untersucht." #NT!
 panum.145.f: "Es war nicht einfach gewesen, das Mikroskop den ganzen Weg nach [SCOPE.sState('panum_disease_state').GetCityHubName] zu bringen, denn eine Bodenwelle hatte fast alle Linsen zertrümmert ... aber jetzt, da es hier war, hatte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eines der großartigsten Werkzeuge der modernen Medizin zur Verfügung. Ein paar Dutzend Proben aus dem örtlichen Wasser, sorgfältig aufbereitet und jede unter dem Mikroskop betrachtet. Einige kamen aus Gegenden mit weniger Cholera. Das waren die saubereren, bemerkte [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe].\n\nAber die schmutzigen? Die, die von Schmutz der abscheulichsten Art durchzogen waren?\n\nDas waren die aus den am schlimmsten betroffenen Gegenden. Eine gekämmte Stirn, ein kurzer Gedanke. Schmutzflocken, die in der Flüssigkeit schwammen, wie schmutzige Schneeflocken. Hier, dort die winzigen Bewegungen harmloser Mikroben, die unschuldig in der elenden Suppe herumflatterten." #NT!
 panum.145.g: "...oder bist du nicht so harmlos wie du scheinst?" #NT!
 panum.145.h: "Weitere Beweise für eine andere Theorie." #NT!
 panum.145.i: "Da muss noch mehr dahinter stecken." #NT!
 panum.146.t: "Der erste Tod" #NT!
 panum.146.d: "Nach unermüdlicher Arbeit und Untersuchung konnte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] den Ausbruch auf den ersten dokumentierten Fall zurückführen – ein Neugeborenes." #NT!
 panum.146.f: "Es gab kaum eine düsterere Erinnerung an das, was Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] getan hat, als das Haus einer Frau in tiefster Trauer zu besuchen, einer Frau, die einmal Ehefrau und einmal Mutter gewesen war, jetzt aber weder das eine noch das andere war. Kaum die Stufen ihrer Tür herunter, machte sich der Arzt schon Notizen.\n\nNeugeborener Junge von der Straße weggetragen, um Großmutter zu besuchen. Kam mit Cholera zurück. Windeln gewaschen, möglicherweise Krankheit übertragend.\n\nEhemann kam von der Arbeit zurück. Durstig nach der Schicht im Stahlwerk. Gut gegessen, gut getrunken, am Ende der Woche gestorben, Cholera.\n\nHinter ihnen Wehklagen. Vor ihnen verregnete, verlassene Straßen. Inmitten all dessen ein geflüsterter Satz." #NT!
 panum.146.g: "Bitte lass dem allen ein Ende haben." #NT!
 panum.147.t: "Die Grube" #NT!
 panum.147.d: "Während seiner [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Untersuchung hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] etwas Übersehenes entdeckt – eine Senkgrube." #NT!
 panum.147.f: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] war kein großer Fan der Miasma-Theorie, aber [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] war sehr dankbar für die Blumenmasken, die sie in Schach halten sollten. Die Senkgrube war voller verrottender Abfälle und völlig ranzig. Sogar der Polizeiinspektor wich von ihrem Rand ab.\n\n„Doktor! Eine solche Grube muss sicherlich die Quelle dieses Miasmas und der elenden Cholera sein, die es uns beschert!“\n\n„Das kann sein, aber sehen Sie mal her, Inspektor. Sehen Sie, wie der Regen hier in die Erde fließt?“\n\n„Ja, das sehe ich, aber was ist damit?“\n\n„Das Regenwasser fließt von dieser Senkgrube dort unten in Richtung der Dachrinnen. Es muss durch sie hindurchfließen, aber wenn das so ist, würde es das Wasser in die Nähe der Pumpe bringen. Wenn die Armaturen beschädigt sind …“\n\n„… dann würde das Abwasser direkt in den Griff fließen. Pfui. Zum Glück verbreiten sich Krankheiten nicht durch Wasser …“" #NT!
 panum.147.g: "...Rechts?" #NT!
 panum.147.h: "Falsch!" #NT!
 panum.148.t: "Das Herrenhaus" #NT!
 panum.148.d: "Die Ermittlungen von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] haben [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim] zu einem merkwürdigen Loch im Griff des Ausbruchs geführt – dem Haus eines reichen Mannes." #NT!
 panum.148.f: "„Ich habe heute die Residenz eines einheimischen Herrn besucht, ein prachtvolleres Gebäude innerhalb der Stadtgrenzen, gefährlich nahe am Zentrum des Ausbruchs. Es scheint ein Überbleibsel aus einer früheren Zeit in der Geschichte dieser Stadt zu sein, als dieser Teil wohlhabender war als ein kleines Elendsviertel. Der Hausherr war von der Untersuchung ziemlich fasziniert und versorgte mich mit vielen Büchern über die lokale Geschichte in der Hoffnung, dass sie Licht auf vergangene Ausbrüche werfen könnten. Interessanterweise machten sie klar, dass die Cholera ihre Mauern noch nicht überschritten hat.\n\nDas war für mich ziemlich faszinierend, denn nach den Grundsätzen der Miasmentheorie liegt die Krankheit in der Luft, im Geruch und sollte nicht auf diese Weise zwischen reich und arm unterscheiden. Sogar seine Diener sind nicht betroffen, zumindest diejenigen, die innerhalb der Quartiere leben. Sie essen aus der Vorratskammer und trinken aus dem artesischen Brunnen innerhalb der Mauern, und irgendwie sind sie dadurch nicht betroffen. Ein merkwürdiges Rätsel. Ist es etwas, das sie haben, was die anderen nicht haben?'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] untersucht" #NT!
 panum.148.g: "Oder ... fehlt den Bediensteten vielleicht etwas, was die Kranken haben könnten?" #NT!
 panum.149.t: "Der winzige Tod" #NT!
 panum.149.d: "Die Untersuchung von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat möglicherweise den Schuldigen enthüllt – eine Mikrobe!" #NT!
 panum.149.f: "„...aber trotzdem musste ich ganz sicher sein. Ich forderte frische Proben an, die ich sowohl aus dem Wasser als auch aus speziell aufbereiteten Abwässern der Kranken nahm. Unter dem Glas meines Mikroskops konnte ich in diese Flüssigkeiten hineinsehen und die Anwesenheit unseres größten Feindes in diesem Kampf bestätigen: Vibrionen.\n\nAuf den ersten Blick scheinen diese Mikroben harmlos zu sein, sie ähneln eher Röhren als großen Raubtieren. Aber jede Probe der Kranken bestätigt ihre Anwesenheit, und man kann wohl mit Sicherheit sagen, dass diese Kreaturen eine Rolle bei dieser Krankheit spielen. Sind sie... die Cholera selbst? Vielleicht. Wenn ja, ist dies ein eindeutiger Beweis für die Theorie, dass Keime wie diese Krankheiten verursachen.\n\nAber eines ist sicher: Wir haben den Feind gefunden. Jetzt müssen wir ihn töten.“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] untersucht" #NT!
 panum.149.g: "Reinigen und behandeln, bis es erledigt ist." #NT!
 panum.149.h: "Diese Entdeckung geht weit über die Cholera hinaus." #NT!
 panum.150.t: "Eine praktische Angelegenheit" #NT!
 panum.150.d: "Als seltener Verbündeter im Kampf gegen Krankheiten trifft sich Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mit dem Gerichtsmediziner in [SCOPE.sState('panum_disease_state').GetCityHubName], um ihre Ergebnisse zu besprechen." #NT!
 panum.150.f: "„Ah, Sie müssen Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] sein! Verzeihen Sie, dass ich Ihnen nicht die Hand geschüttelt habe, ich habe die letzten Tage in Leichen herumgestöbert.“\n\n„… glauben Sie mir, Sie brauchen mich nicht um Verzeihung zu bitten. Sie sind der Gerichtsmediziner vor Ort, bitte erzählen Sie mir von Ihren Erkenntnissen.“\n\n„Wie Sie wissen, ist Cholera eine Darmkrankheit. Mehr als das muss ich nicht sagen. Erbrechen, Stuhlgang, ein Darm, der so verstopft ist, dass er aussieht wie Eiweiß, jemand, der so gebildet ist wie Sie, kennt die Liste.“\n\n„Natürlich, aber was finden Sie daran interessant?“\n\n„Nun… sie sagen mir immer wieder, dass dies ein Miasma ist, dass dieser Tod in der Luft liegt… aber ehrlich gesagt, glaube ich das nicht. Wenn das so wäre, wäre ich jetzt schon tot. Ich hatte viele Leichen auf diesem Tisch, Doktor. Das stinkt nach Lebensmittelvergiftung, ist es aber nicht.“" #NT!
 panum.150.g: "Ein höchst faszinierender Gedanke. Erzähl mir mehr." #NT!
  
 panum_physician_health_bonus_modifier: "Sparen Sie mehr als Entschuldigung" #NT!
 panum_physician_health_malus_modifier: "Rastlose Arbeit" #NT!
  
 panum.151.t: "Die Werkzeugfabrik" #NT!
 panum.151.d: "Während er an [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]s Ermittlungen arbeitet, wirft der Besuch einer örtlichen Werkzeugfabrik durch Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mehr Fragen auf, als er beantwortet." #NT!
 panum.151.f: "„Als ich neulich die Werkzeugfabrik besuchte, schien mir zunächst alles ganz logisch. Diese Fabrik ist auf Messer, Metzgerwerkzeuge und dergleichen spezialisiert und verfügt daher über eine Schleifstation. Sie verwendet Wasserräder, um eine große Anzahl von Schleifsteinen zu drehen, Schleifräder, um die Schneide jeder Klinge zu schleifen. Jeder Arbeiter lag auf dem Bauch in der Nähe der Schleifmaschine und konnte mit Wasser bespritzt werden. Das alles ergibt Sinn, und wenn der Ausbruch in der Fabrik dort begrenzt geblieben wäre, hätte es auch Sinn ergeben.\n\nDas Merkwürdige ist, dass dies einen Trend durchbricht, der überall sonst zu beobachten ist. Es gibt Männer in der Fabrik, die krank werden, obwohl sie nie in der Nähe der Straße im Zentrum dieses Ausbruchs oder an den Schleifrädern waren. Wie konnte das überhaupt möglich sein?“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] nachforscht" #NT!
 panum.151.g: "Offenbar ein falscher Hinweis." #NT!
 panum.151.h: "Offenbar eine falsche Theorie." #NT!
 panum.152.t: "Das Glas" #NT!
 panum.152.d: "Unglücklicherweise ist Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] in einer Sackgasse gelandet – einem lokalen Fall von Lebensmittelvergiftung, der nichts mit der Cholera zu tun hat." #NT!
 panum.152.f: "„Heute war ein äußerst ärgerlicher Tag. Ich wurde von der Polizei gerufen, um einen plötzlichen Krankheitsausbruch in einem beliebten Hotel zu untersuchen, bei dem es sich offenbar um einen plötzlichen Ausbruch von Cholera handelte. Ich hatte alle meine Sachen zusammengesucht, um die Sache zu untersuchen, und die zuständigen Behörden alarmiert, damit sie Betten finden und sich um die Kranken kümmern, doch als ich ankam, wusste ich, dass es keine Cholera war. Die Symptome waren falsch, der plötzliche Ausbruch zu schnell. Es musste eine lokale Ursache vorliegen, und es überraschte nicht, dass alle Betroffenen dasselbe Essen gegessen hatten.\n\nEin Ausflug in die Küche enthüllte den Übeltäter: ein Glas Entenpastete, das mit Sicherheit abgelaufen war, und das von einem Koch auf feines Brot geschmiert wurde, dessen Nase durch eine Erkältung zu verstopft war, um den Fäulnisgeruch zu riechen. Eine Zeitverschwendung, wenn es je eine gab. Eine Lebensmittelvergiftung ist keine Cholera.“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] untersucht" #NT!
 panum.152.g: "... nun, zumindest wissen wir, dass wir die Schränke ausmisten müssen." #NT!
 panum.153.t: "Verlegt" #NT!
 panum.153.d: "Bei der Untersuchung von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] kam es zu einem Unfall – [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] verwechselte ihre Proben!" #NT!
 panum.153.f: "Doch mitten in der Arbeit wurde ich unterbrochen. Geschrei, Gebrüll, der Lärm einer Schlägerei auf der Straße. Eine Schlägerei unter Betrunkenen, eine Tasse zu viel. Die Polizei war schnell zur Stelle, schleifte sie weg und schrie weiter.\n\nEs dauerte nur einen Augenblick, bis ich von meinem Platz aufstand und die Fensterläden schloss, und noch weniger, bis ich meine Arbeit wieder aufnahm. Ich bin noch dümmer, als dass ich nicht bemerkte, dass ich die Proben in der falschen Reihenfolge abgelegt hatte, und wie sollte ich das tun, wenn nicht in der falschen Reihenfolge arbeiten und jede Probe in der falschen Reihenfolge protokollieren?\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] nachforscht" #NT!
 panum.153.g: "Wochenlange Arbeit, verschwendet. Verdammt." #NT!
 panum.154.t: "Der Nachahmer-Killer?" #NT!
 panum.154.d: "Die Untersuchung des Cholera-Ausbruchs in [SCOPE.sState('panum_disease_state').GetCityHubName] hat eine alarmierende Wendung genommen – es scheint, als ob es sich um eine weitere Krankheit handeln könnte!" #NT!
 panum.154.f: "„Ah, schön, Sie wiederzusehen, Doktor %Name%. An meinem Tisch war letzte Woche viel los.“\n\nIch würde es nicht schön nennen, Sie kennenzulernen, Gerichtsmediziner. Was haben wir hier?“\n\n„Es kommen immer mehr Leichen herein. Ich dachte, es wäre eher Cholera, und vielleicht ist es das auch, aber das stimmt nicht ganz.“\n\n„Lebensmittelvergiftung?“\n\nNein, nicht bei der Häufigkeit, mit der sie sterben. Meistens auch Kinder und ältere Menschen.“\n\n„Cholera ist für die Schwachen noch tödlicher als für alle anderen. Sind Sie sicher, dass es nicht das hier ist?“\n\n„Es ist ja nicht so, als würde es seinen Namen in die Adern schreiben. Ruhr, Cholera, Typhus? Eine gewöhnliche Lebensmittelvergiftung? Wer weiß das schon? Das Einzige, was ich weiß, ist, dass es nicht dasselbe zu sein scheint. Ich habe nicht die weiße Farbe wie Cholera, aber der Tod ist der gleiche.'\n\n'Dann haben wir vielleicht eine zweite Krankheit ... Verwüstung und Verdammnis. Wie können wir die beiden auseinanderhalten?'\n\n'Sie sind der Arzt, nicht ich.'" #NT!
 panum.154.g: "Ich kann keinen Plan machen, wenn ich nicht weiß, wogegen ich kämpfe." #NT!
 panum.155.t: "Das Miasma...?" #NT!
 panum.155.d: "Bei den Untersuchungen von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] und [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] ist ein Problem aufgetreten: Könnte das Miasma real sein?" #NT!
 panum.155.f: "„...aber die Ergebnisse dieses letzten Untersuchungsabschnitts widerlegen die Argumentation der Keimtheorie, und ich kann einfach nicht begreifen, warum. Die Häuser liegen neben einem seichten Kanal, der häufig von Lastkähnen befahren wird, die Kohle zu den Gießereien liefern. Außer einem alten Brunnen sind keine Wasserpumpen bequem zu Fuß zu erreichen. Das Wasser ist rein, vielleicht das reinste der Stadt.\n\nDoch aus einem mir unerklärlichen Grund ist die Cholera hier. Sie arbeiten bereits daran, den Gestank in Schach zu halten, und der Gestank, das Miasma, ist wirklich da. Der Kanal stinkt nach Abwasser...aber wenn sie dieses Wasser nicht trinken, wie können sie sonst Schaden nehmen, außer allein durch den Geruch?“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Choleraepidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] untersucht" #NT!
 panum.155.g: "„Miasma“ kann nicht richtig sein, oder doch?" #NT!
 panum.156.t: "Dekonstruiert" #NT!
 panum.156.d: "Angesichts des Hungers nach immer mehr Bauland bleibt der Entwicklung von [SCOPE.sState('panum_disease_state').GetCityHubName] keine Zeit, gestoppt zu werden, nicht einmal für die Untersuchungen von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.156.f: "„… wer bist du nochmal?“\n\n„Der Arzt, der diesen Ausbruch untersucht. Diese Straße war voller kränklicher Menschen. Wo sind sie?“\n\n„Keine Ahnung. Meine Jungs und ich sind nur hier, um diese Häuser abzureißen.“\n\n„Abreißen? Was? In diesen Häusern wohnten ein Dutzend Familien, alle mit Cholera infiziert!“\n\n„Nun, die gibt es nicht mehr. Der Vermieter hat sie alle auf die Straße gesetzt.“\n\n„Sie WAS?“\n\n„Rausgeworfen! So zahle ich keine Miete, aber das wäre auch egal. Auf dem Land soll eine Textilfabrik entstehen, und wenn es Ihnen nichts ausmacht, müssen ich und die Jungs anfangen, diese Häuser abzureißen.“" #NT!
 panum.156.g: "Ach du meine Güte, jetzt muss ich wieder die Kranken suchen... bloß nichts trinken." #NT!
 panum.157.t: "Kontaminiert" #NT!
 panum.157.d: "Schreckliche Neuigkeiten! Der Arzt hat sich mit Cholera infiziert!" #NT!
 panum.157.f: "„Ich weiß nicht, wie es passiert ist. Miasma? Ich war wochenlang von Kranken, Toten und Sterbenden umgeben, mehr als jeder andere. Keime? Ich habe das Wasser nicht getrunken, aber wie steht es mit der Ansteckung? Könnte es durch Berührung übertragen werden? In der Luft, auf Oberflächen? Ich weiß es nicht.\n\nAber ich kenne die Symptome. Die Magenverstimmung und dass sie nie aufhört. Ich könnte genauso gut nichts essen und trinken, so gut es mir auch tut. Es spricht tausend Wahrheiten aus, und eine.\n\nIch habe Cholera.“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] nachforscht" #NT!
 panum.157.g: "Oh, ich hoffe wirklich, dass es [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] bald besser geht." #NT!
  
 panum.161.t: "Ein Schuss Gin" #NT!
 panum.161.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat sich eine Auszeit von der Arbeit genommen, um seiner anderen Leidenschaft nachzugehen: dem Alkohol." #NT!
 panum.161.f: "„...aber während ich mein zweites Glas dieses wunderbaren Getränks trank, wurde mir etwas ziemlich Merkwürdiges klar. Je mehr Menschen an diesen Ort kamen, um zu trinken, desto geringer war die Wahrscheinlichkeit, dass sie an Cholera erkrankten. Tatsächlich! Meine eigene Karte zeigt, dass die Häuser, die diesem Ort am nächsten liegen, eine wesentlich geringere Wahrscheinlichkeit haben, von dieser elenden Krankheit befallen zu werden.\n\nIch habe das Gefühl, dass sich hier ein Muster abzeichnet. Ich habe mit dem Eigentümer und einigen der umgänglicheren Einheimischen gesprochen, und sie scheinen zuzustimmen. Es gibt etwas an diesem Ort, das dabei hilft, die Krankheit abzuwehren. Ich sollte das genauer untersuchen.“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] nachforscht" #NT!
 panum.161.g: "Ah, das Wunder von Geschäft und Vergnügen in einem." #NT!
 panum.162.t: "Von oben" #NT!
 panum.162.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat den mutigsten Schritt von allen gemacht: [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] hat [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] durch das Trinken von verunreinigtem Wasser mit Cholera infiziert!" #NT!
 panum.162.f: "„…natürlich ist die beste Theorie der Welt nichts ohne Praxis. Trotz aller Arbeit bleibt sie für meine Kritiker nur Zufall, da sie weiterhin behaupten, es gebe keine unwiderlegbaren Beweise, mit denen ich meine Gedanken untermauern könnte. Also gut. Ich werde ihnen direkt entgegentreten, und zwar auf die direkteste Art und Weise von allen: indem ich dasselbe Wasser trinke, das im Zentrum dieses Ausbruchs gefunden wurde und von einem treuen Boten gebracht wurde. Wenn sie Recht haben, werde ich nicht krank, selbst wenn ich von diesem Ort weggebracht werde. Wenn ja, werde ich bald um mein Leben kämpfen, aber was ist ein Leben im Vergleich zu so vielen, die gerettet werden könnten, wenn ich meine Behauptungen beweisen kann?\n\nAlso, mein liebstes Tagebuch, ein Toast auf die Gesundheit.\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] nachforscht." #NT!
 panum.162.g: "„Oh, meine Güte, ich fühle mich … oh nein.“" #NT!
 panum.162.h: "Halten Sie den Arzt von diesem tollkühnen Manöver ab!" #NT!
 panum.163.t: "Eine Karte zum Erfolg" #NT!
 panum.163.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ist es gelungen, eine hervorragende Karte des Ausbruchszentrums zu erstellen, sodass sich der Verlauf der Krankheit leicht verfolgen lässt." #NT!
 panum.163.f: "„Meine Herren, ich präsentiere Ihnen meine Karte der Infektion in [SCOPE.sState('panum_disease_state').GetName]. Sie zeigt in aller Ausführlichkeit den Ort jeder einzelnen Infektion in der Region, mit Zeitangaben und entsprechenden Stempeln, mit Namen und Anzahl der Todesfälle, Infektionen usw. Sie stellt eine schriftliche Zeitleiste des gesamten Verlaufs des Cholera-Ausbruchs in dieser Gegend dar. Ein Beispiel: Hier sehen wir eine Wasserpumpe und die Anzahl der Häuser in Gehweite.\n\nAußerdem präsentiere ich die folgenden Tabellen, die durch tabellarische Darstellung der Informationen aus dieser Karte erstellt wurden. Wenn Sie, meine Herren, selbst einen Blick darauf werfen würden, würden Sie sehen, dass die von dieser Wasserpumpe versorgten Gebiete die höchsten Sterberaten von allen aufweisen. Hier in dieser Tabelle sehen wir, dass das Wasserunternehmen [SCOPE.sState('panum_disease_state').GetName] Wells in direktem Zusammenhang mit diesen Pumpen steht, was wiederum zeigt, dass dieses Unternehmen von allen versorgten Gebieten das höchste Cholera-Risiko aufweist..." #NT!
 panum.163.g: "Daraus wird eines Tages eine Wissenschaft werden." #NT!
 panum.164.t: "Feuer und Wut" #NT!
 panum.164.d: "Der mangelnde Fortschritt bei der Bekämpfung des Cholera-Ausbruchs in [SCOPE.sState('panum_disease_state').GetName] hat die Geduld von Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] erschöpft" #NT!
 panum.164.f: "Das Geschrei war fast einen Häuserblock weit zu hören, und das Geräusch von Büchern und Tassen, die von ihrem Tisch geworfen wurden, war weit vor der Tür zu hören. Ein Schwall von Flüchen, panische, verzweifelte Entschuldigungen von verängstigten Assistenten, dann mehr Geschrei und noch mehr.\n\n„Ihr Narren! Ihr absoluten, völligen Schwachköpfe! Wir sind aus einem GRUND hier! Menschen sterben vor unserer Tür und sie erwarten von uns, dass wir sie retten, und das werden wir tun!“\n\nDoktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ballte die Hand zur Faust.\n\n„Wenn Sie nicht einmal die einfachsten Anweisungen befolgen können, sollten Sie nicht hier sein! Diejenigen von Ihnen, die es können, befolgen meine Anweisungen aufs Wort, und wir WERDEN diese elende Plage besiegen! Hören Sie mich?“\n\n„Ja, Doktor!“\n\n„Und jetzt gehen Sie wieder raus und finden Sie weitere Proben für mich! Diesmal die RICHTIGEN!“" #NT!
 panum.164.g: "Und so schickt der Arzt seine Armee in Marsch, bereit, der Krankheit selbst den Krieg zu erklären." #NT!
 panum.165.t: "Thea Herz der Infektion" #NT!
 panum.165.d: "In einem Moment äußersten Mutes hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] eines der am stärksten betroffenen Krankenhäuser in [SCOPE.sState('panum_disease_state').GetCityHubName] besucht, um die dortigen Patienten zu befragen." #NT!
 panum.165.f: "Die Station dieses provisorischen Krankenhauses war ein überfüllter Ort voller Bilder und Geräusche, aber mehr als alles andere war er von Gerüchen erfüllt. Der Geruch von Krankheit. Der Geruch von Tod. Um den Gestank in Schach zu halten, hatte man Blumen gebracht, und auch Weihrauch, aber trotzdem kamen nur wenige in diese Halle der Verdammten. Es sei zu riskant, sagten sie, zu gefährlich für ihre eigene Gesundheit. Wie konnten sie hoffen, anderen zu helfen, wenn sie selbst sterbend in einem Bett lagen?\n\nNur wenige kamen, aber nicht keiner. Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] war einer von ihnen, und sie gingen mit unaufhörlichem Mut und grenzenloser Energie durch diesen Ort des Todes und Sterbens. Sie saßen an der Seite der Kranken und Einsamen, stellten Fragen und machten sich Notizen. Jeder Gedanke, jede Antwort war wertvoll. Sie waren die Hinweise zur Erlösung, die Hinweise darauf, woher dieser Tod kommen könnte und wie er ebenfalls getötet werden könnte." #NT!
 panum.165.g: "Und durch diese Halle des Todes wandelte ein Engel des Lebens mit einem Tagebuch in der Hand." #NT!
 panum.166.t: "Die Kraft des Gebets" #NT!
 panum.166.d_christian: "Auf der Suche nach Einsicht und vielleicht auch Trost hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] einen Priester in einer örtlichen Kathedrale aufgesucht." #NT!
 panum.166.d_muslim: "Auf der Suche nach Einsicht und vielleicht auch Trost hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] einen Imam in einer örtlichen Moschee aufgesucht." #NT!
 panum.166.d_other: "Auf der Suche nach Einsicht und vielleicht auch Trost hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] einen Priester in einem örtlichen Tempel aufgesucht." #NT!
 panum.166.f_christian: "„Hallo, Vater. Ich bin Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] und wurde von der Hauptstadt geschickt, um diesen Ausbruch zu untersuchen und jede erdenkliche Hilfe anzubieten. Ich würde Sie um Ihre Hilfe bitten, wenn Sie mir helfen können.“\n\n„Ich bin nur ein bescheidener Priester, nicht der Allmächtige, aber ich werde tun, was ich kann. Sag mir, Kind. Was brauchst du?“\n\n„Ich würde gerne so viel wie möglich über die frühen Tage dieser Infektion erfahren. Wer erlag als Erster? Wo? Haben Sie eine Idee, woher sie gekommen sein könnte?“\n\n„Nur Gott kann die Antwort auf einige dieser Fragen haben, aber ja, ich weiß viel über meine Herde. Komm, komm. Ich habe schließlich meine eigenen Aufzeichnungen mitgenommen.“" #NT!
 panum.166.f_muslim: "„As-salamu alaykum, Imam. Ich bin Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] und wurde von der Hauptstadt geschickt, um diesen Ausbruch zu untersuchen und jede erdenkliche Hilfe anzubieten. Ich würde Sie um Ihre Hilfe bitten, wenn Sie mir diese geben können.“\n\n„Ich bin nur ein bescheidener Geistlicher, nicht der Allmächtige, aber ich werde tun, was ich kann. Sagen Sie mir, was Sie brauchen?“\n\n„Ich würde gerne so viel wie möglich über die frühen Tage dieser Infektion erfahren. Wer erlag als Erster? Wo? Haben Sie eine Idee, woher sie gekommen sein könnte?“\n\n„Nur Allah kann die Antwort auf einige dieser Fragen haben, aber ja, ich weiß viel über die Gemeinde hier. Kommen Sie, kommen Sie. Schließlich habe ich meine eigenen Aufzeichnungen mitgenommen.“" #NT!
 panum.166.f_other: "„Ich grüße Sie, Priester. Ich bin Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] und wurde von der Hauptstadt geschickt, um diesen Ausbruch zu untersuchen und jede erdenkliche Hilfe anzubieten. Ich würde Sie um Ihre Hilfe bitten, wenn Sie mir diese geben können.“\n\n„Ich bin nur ein bescheidener Wächter dieses Tempels, kein Gott, aber ich werde tun, was ich kann. Sagen Sie mir, Doktor. Was brauchen Sie?“\n\n„Ich würde gerne so viel wie möglich über die frühen Tage dieser Infektion erfahren. Wer erlag ihr als Erster? Wo? Haben Sie eine Idee, woher sie gekommen sein könnte?“\n\n„Nur die Geistlichen können auf einige dieser Fragen eine Antwort haben, aber ja, ich weiß viel über die Menschen hier. Kommen Sie, kommen Sie. Schließlich habe ich meine eigenen Schriften mitgenommen.“" #NT!
 panum.166.g_christian: "Sauberkeit kommt gleich nach Gottesfurcht." #NT!
 panum.166.g_muslim: "Es gibt für jede Krankheit eine Heilung." #NT!
 panum.166.g_other: "Wissen Sie genau, was Sie weiterbringt und was Sie zurückhält." #NT!
 panum.167.t: "Vorsicht vor Nachsicht" #NT!
 panum.167.d: "Um während der Untersuchung in Sicherheit zu bleiben, hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] sicher von den Infizierten isoliert." #NT!
 panum.167.f: "„Manche würden das Feigheit nennen. Ich würde es Pragmatismus nennen. Dies ist kein Kampf, der schnell gewonnen werden kann, bei dem man einfach ein Bajonett in den Bauch des Gegners rammen und ihn rasch sterben lassen kann. Es ist ein härterer Kampf gegen einen Feind, den wir weder sehen noch hören können, der aber überall um uns herum sein könnte.\n\nEs ist Torheit, keinen angemessenen Schutz zu haben. Isolation ist der größte Schlüssel. Nahrung und Wasser aus sicheren Gebieten, ein sauberer Ort zum Lernen und jeglicher Kontakt mit den Infizierten und ihren Besitztümern erfolgt über Mittelsmänner. Sicher vor Krankheiten kann ich in Ruhe forschen und all meine Bemühungen darauf konzentrieren, die Wahrheit hinter dieser Krankheit aufzudecken.“\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], der über die große Cholera-Epidemie von [TimeKeeper.GetCurrentDate.Format('y')] schreibt und in [SCOPE.sState('panum_disease_state').GetCityHubName] nachforscht." #NT!
 panum.167.g: "...aber auch [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] wird sich irgendwann die Hände schmutzig machen müssen" #NT!
 panum.168.t: "Rastlose Arbeit" #NT!
 panum.168.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ist entschlossen, zum Ursprungsort des Cholera-Ausbruchs vorzudringen und hat deshalb besonders lange gearbeitet." #NT!
 panum.168.f: "„Halt! Wer ist um diese Zeit noch unterwegs? - Doktor %Nachname%? Was machen Sie denn so spät?'\n\n„Ich muss meine Runden machen und sie werden nicht auf den Sonnenaufgang warten. Jede Minute ist kostbar, auch die nach Mitternacht.“\n\n„Du meine Güte! Diese Straßen sind nachts nicht sicher!“\n\nUnd sie sind es auch tagsüber nicht, nicht bevor diese Cholera vorbei ist. Wenn Sie mich entschuldigen würden, Wachtmeister, es gibt noch mehr zu tun, bevor das Öl in meiner Laterne zur Neige geht. Ich muss ein Dutzend Fläschchen mit Wasser aus den Kanälen und Pumpen füllen, Häuser besuchen und Gräben untersuchen.“\n\n„Also gut, also gut. Sie machen nichts falsch, aber es ist trotzdem besser, wenn ich Sie eskortiere.“" #NT!
 panum.168.g: "Dann lassen Sie uns unbedingt gemeinsam durch diese Straßen streifen, Wachtmeister." #NT!
  
 je_panum_cholera_treatment_goal: ""
  
 je_panum_germ_theory: "Keime und Miasmen" #NT!
 je_panum_germ_theory_reason: "Hippokrates von Kos gilt als Begründer der Miasmentheorie, also der giftigen Ausdünstungen aus dem Boden, die in die Luft getragen werden und so zur Verbreitung von Krankheiten beitragen. Im 19. Jahrhundert führten Ärzte und Forscher Epidemien wie Cholera aus Mangel an Wissen über Bakterien und Viren schlicht auf üble Gerüche zurück, die über ‚Miasmen‘ verbreitet würden. Diese Theorie erwies sich später als Irrweg der Medizin, obwohl das Miasmenmodell bereits teilweise erklärte, woher Epidemien kommen und wie sie sich verbreiten. Der Konflikt zwischen den Kontagionisten, die eine Ansteckung von Mensch zu Mensch behaupteten, und den Antikontagionisten, den Anhängern der Miasmentheorie, war Mitte des 19. Jahrhunderts zeitweise erbittert. Die Schwächen des Miasmenmodells wurden in London erkannt, obwohl die provisorischen Regeln zum Umgang mit Miasmen wie Sauberkeit und Isolation Epidemien in gewissem Maße einschränkten.\n\nSollte eine Nation genügend Beweise für die Keimtheorie und gegen die Miasmentheorie finden, dann wird dieser Paradigmenwechsel zu weniger negativen Ereignissen bei der Suche nach Behandlungsmethoden oder bei Epidemien führen. Der Erstentdecker der Keimtheorie erhält einen zusätzlichen Forschungsbonus." #NT!
 je_panum_germ_theory_success: "[GetPlayer.GetName] hat mindestens #V 20 Beweisstücke#! gesammelt, um die Keimtheorie zu widerlegen und die Miasmentheorie zu widerlegen." #NT!
 je_panum_germ_theory_goal: ""
  
 notification_panum_germ_theory_notification_name: "Durchbruch in der Keimtheorie" #NT!
 notification_panum_germ_theory_notification_desc: "Ein [concept_panum_physician] aus [GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName] konnte erstmals die Keimtheorie in allen ihren Facetten schlüssig belegen. Die Miasmentheorie wurde gänzlich verworfen." #NT!
  
 panum.11.t: "Die Keimtheorie" #NT!
 panum.11.d: "Angesichts der überwältigenden Beweise für die Keimtheorie und der ebenso überwältigenden Beweise gegen die Miasmentheorie hat ein medizinischer Paradigmenwechsel stattgefunden. Dass sich die Keimtheorie inzwischen durchsetzen konnte, ist nicht zuletzt Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] zu verdanken." #NT!
 panum.11.f: "Die Miasmentheorie ist ein typisches Beispiel für eine wissenschaftliche These, die sich nur schwer widerlegen lässt, da sie mutmaßlich überall bestätigt wird. Dass Reinigungs- und Hygienevorschriften für „saubere Luft“ dafür sorgten, dass manche Krankheiten tatsächlich verschwanden, schien sich im 19. Jahrhundert zu bestätigen. Zugleich verhinderte sie auf den verschiedensten Gebieten Durchbrüche der Medizin, weil die wahren Ursachen und damit die eigentlichen Heilmethoden unbekannt blieben. Ab jetzt werden Ärzte größere Erfolge bei der Suche nach Behandlungsmethoden haben – und der Weg ist frei für die Erforschung von Krankheitserregern und Impfstoffen." #NT!
 panum.11.g: "Aber wollten wir wirklich wissen, was im Wasser vor sich geht...?" #NT!
  
 panum.53.t: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] reist in den Epidemic State" #NT!
 panum.53.d: "Die grassierende Epidemie hat [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] dazu veranlasst, den Zustand von [SCOPE.sState('panum_disease_state').GetName] genauer zu untersuchen, um die Ursachen zu ermitteln und neue Methoden zur Behandlung der schrecklichen Krankheit zu entwickeln." #NT!
 panum.53.f: "Behandlungsmethoden sind der wichtigste Schritt bei der Bekämpfung einer Krankheit. Sie sind die Grundlage für einen möglichen zukünftigen Impfstoff, der eine Epidemie verhindern kann. Allerdings ist auch eine erfolgreiche Behandlungsmethode stark genug, um zukünftige Epidemien einzudämmen und ihre Dauer und Schwere zu minimieren – was zu einer deutlich geringeren Zahl von Opfern führt. Ärzte, die eine Epidemie in ihrem eigenen Land untersuchen, arbeiten effektiver als Ärzte auf einer Auslandsreise." #NT!
 panum.53.g: "Dieser Horror muss ein Ende haben!" #NT!
  
 panum.54.t: "Medizinische Forschungsexpedition" #NT!
 panum.54.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat ein kleines Team aus Experten und Assistenten zusammengestellt, die geeignet sind, eine Epidemie im Ausland intensiv zu studieren und eventuell eine neue Behandlungsmethode zu entwickeln. Es stellt sich nun die Frage, welche Krankheit in welchem ​​Land beobachtet werden sollte." #NT!
  
