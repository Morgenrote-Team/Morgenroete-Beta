 panum.1100.t: "Die [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe" #NT!
 panum.1100.d: "Mehrere Krankenhäuser, Kliniken und Arztpraxen haben ungewöhnlich viele Fälle einer seltsamen Krankheit gemeldet, die sie zunächst für eine normale Grippe gehalten hatten. Kranbetten sind mittlerweile überfüllt und öffentliche Räume müssen geräumt werden. Die schlimmsten Befürchtungen haben sich bestätigt: Es handelt sich offenbar um die gefürchtete [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Grippe, die in den Nachbarländern zugeschlagen hat." #NT!
 panum.1100.f: "Anfangs sprachen die Ärzte von einer normalen Grippeepidemie. In den ersten Tagen behauptete die Presse, es handele sich um eine seltsame Seuchenkrankheit, die jedoch harmlos und ohne Todesfälle sei.\n\nDoch das Gegenteil ist der Fall. Jeden Tag erreicht die Grippeepidemie eine neue Stadt, eine neue Region und verlangt eine völlige Neuorganisation der medizinischen Behandlung. Wo gestern noch zwei Männer in einer Kaserne an Symptomen litten, sind es heute bereits 700. Die unheilvolle Natur der Krankheit spiegelt sich darin wider, dass sie nicht wie üblich Kinder und Alte tötet, sondern junge Menschen zwischen 20 und 40 Jahren. Jeder zwanzigste Erkrankte überlebt die Grippe nicht. Wo sie herkam, wie sie kam, was sie ist: Diese Pandemie bleibt ein Rätsel.\n\nWas sich jedoch bereits abzeichnet, ist, dass diese Grippe die Normalität, wie wir sie bisher kannten, völlig verändern könnte. Der Ruf nach staatlichem Handeln wird lauter. Wie wird [GetPlayer.GetName] darauf reagieren?" #NT!
 panum.1100.g: "Es handelt sich doch um eine gutartige Erkrankung, oder?" #NT!
 panum.1101.t: "Die Spanische Grippe" #NT!
 panum.1101.d: "Mehrere Krankenhäuser, Kliniken und Arztpraxen haben ungewöhnlich viele Fälle einer seltsamen Krankheit gemeldet, die sie zunächst für eine gewöhnliche Grippe gehalten hatten. Kranbetten sind mittlerweile überfüllt und öffentliche Räume müssen geräumt werden. Die schlimmsten Befürchtungen haben sich bestätigt: Es handelt sich offenbar um eine Pandemie von bisher unbekanntem Ausmaß." #NT!
 panum.1101.f: "Die Spanische Grippe war eine Grippepandemie, die durch einen ungewöhnlich virulenten Derivat des Grippevirus verursacht wurde, sich zwischen 1918 und 1920 in drei Wellen ausbreitete und zwischen 20 und 50 Millionen Menschenleben forderte, wobei die Schätzungen von einer Weltbevölkerung von ca. 1,8 Milliarden bis hin zu 100 Millionen reichen.\nDamit starben durch die Spanische Grippe mehr Menschen als durch Kriegshandlungen im Ersten Weltkrieg (ca. 17 Millionen Tote). Insgesamt sollen sich rund 500 Millionen Menschen infiziert haben, was einer Sterblichkeitsrate von 5 bis 10 Prozent entspricht, die deutlich höher war als bei Erkrankungen durch andere Grippeerreger.\n\nEine Besonderheit der Spanischen Grippe war, dass sie eher junge Menschen (im Alter zwischen 20 und 40 Jahren) betraf, während Grippeviren sonst besonders kleine Kinder und alte Menschen gefährden. Zur 'Spanischen' Grippe wurde die Grippe, als der spanische Gesundheitsdirektor Martín Salazar am 29. Juni 1918 bekannt gab, ihm lägen im übrigen Europa keine Berichte über eine vergleichbare Erkrankung vor. In der internationalen Presse wurde ab Ende Juni 1918 immer häufiger der Begriff 'Spanische Grippe' verwendet, was auch von einigen kriegsführenden Regierungen gefördert wurde, um die tatsächliche Verbreitung zu vertuschen. Sie gilt als 'Mutter aller Pandemien'." #NT!
 panum.1101.g: "Man spricht also bereits von der Spanischen Grippe?" #NT!
 panum.1102.t: "Die große Pandemie" #NT!
 panum.1102.d: "Mehrere Krankenhäuser, Kliniken und Arztpraxen haben ungewöhnlich viele Fälle einer seltsamen Krankheit gemeldet, die sie zunächst für eine gewöhnliche Grippe gehalten hatten. Kranbetten sind mittlerweile überfüllt und öffentliche Räume müssen geräumt werden. Die schlimmsten Befürchtungen haben sich bestätigt: Es handelt sich offenbar um eine Pandemie von bisher unbekanntem Ausmaß." #NT!
 panum.1102.f: "Anfangs sprachen die Ärzte von einer normalen Grippeepidemie. In den ersten Tagen behauptete die Presse, es handele sich um eine seltsame Seuchenkrankheit, die jedoch harmlos und ohne Todesfälle sei.\n\nDoch das Gegenteil ist der Fall. Jeden Tag erreicht die Grippeepidemie eine neue Stadt, eine neue Region und verlangt eine völlige Neuorganisation der medizinischen Behandlung. Wo gestern noch zwei Männer in einer Kaserne an Symptomen litten, sind es heute bereits 700. Die unheilvolle Natur der Krankheit spiegelt sich darin wider, dass sie nicht wie üblich Kinder und Alte tötet, sondern junge Menschen zwischen 20 und 40 Jahren. Jeder zwanzigste Erkrankte überlebt die Grippe nicht. Wo sie herkam, wie sie kam, was sie ist: Diese Pandemie bleibt ein Rätsel.\n\nWas sich jedoch bereits abzeichnet, ist, dass diese Grippe die Normalität, wie wir sie bisher kannten, völlig verändern könnte. Der Ruf nach staatlichem Handeln wird lauter. Wie wird [GetPlayer.GetName] darauf reagieren?" #NT!
 panum.1102.g: "Man spricht also bereits von der [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Grippe?" #NT!
 panum.1103.t: "Pandemie-Richtlinie" #NT!
 panum.1103.a.tt: "Strenge Maßnahmen werden die Wirtschaft zwar abwürgen, aber die Wahrscheinlichkeit ist größer, dass sie schneller Wirkung zeigen und die Pandemie zumindest in einigen Staaten stoppen." #NT!
 panum.1103.b.tt: "Es wird zwar deutlich länger dauern, bis die Maßnahmen Wirkung zeigen, die Wirtschaft wird jedoch weniger geschädigt." #NT!
 panum.1103.c.tt: "Die Pandemie nimmt ihren natürlichen Verlauf und etablierte Maßnahmen werden vollständig aufgehoben." #NT!
 panum.1104.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe in [SCOPE.sState('panum_flu_fading_state').GetName] verblasst" #NT!
 panum.1104.d: "Offenbar haben die Einschränkungen in [SCOPE.sState('panum_flu_fading_state').GetName] erste Wirkungen gezeigt. Seit Wochen ist dort ein Rückgang der Todeszahlen spürbar." #NT!
 panum.1104.f: "Unter bestimmten Voraussetzungen kann eine Pandemie in einem Staat nach wenigen Wochen abklingen. Rigorose Maßnahmen, ein gutes Gesundheitssystem, ein erstklassiger Arzt oder hochentwickelte medizinische Techniken helfen, diesen Prozess in Gang zu setzen." #NT!
 panum.1104.g: "Ein Zeichen der Hoffnung." #NT!
 panum.1105.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe in [SCOPE.sState('panum_flu_disappearing_state').GetName] verschwindet" #NT!
 panum.1105.d: "Nachdem die Pandemie in [SCOPE.sState('panum_flu_disappearing_state').GetName] in den letzten Wochen merklich abgeflaut ist, wurden dort dieser Tage keine Neuinfektionen mehr registriert. Die Region ist völlig grippefrei!" #NT!
 panum.1105.f: "Damit eine Pandemie vollständig aus einem Staat verschwindet, muss sie bereits abgeklungen sein. Dann ist es möglich, dass eine Region schon vor dem Ende der eigentlichen Pandemie frei von Grippe ist. Strenge Maßnahmen, ein gutes Gesundheitssystem, ein erstklassiger Arzt oder hochentwickelte medizinische Techniken helfen, die Grippe auszumerzen." #NT!
 panum.1105.g: "Haben die Maßnahmen dazu beigetragen?" #NT!
 panum.1106.t: "Opfer der [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe" #NT!
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName] hat sich vor wenigen Tagen mit der [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Grippe angesteckt und erlebt einen schweren Krankheitsverlauf. Die Ärzte rechnen mit dem Schlimmsten." #NT!
 panum.1106.f: "'Gegen 12 Uhr wurde mir heiß. Ich hatte so viel Fieber, dass ich Angst hatte, die Kleidung zu entzünden. Ich bekam einen Husten, der mir die Eingeweide herausriss, als ich ihn nicht unterdrücken konnte. Es war dunkel; ich hatte ganz sicher eine Lungenentzündung und ich war noch nie in meinem Leben so verzweifelt und unwohl gewesen. … Dann merkte ich, dass ich in strömenden Schweiß ausbrach und obwohl es mir besser gehen sollte, war ich elender denn je. Als es endlich hell wurde, war ich ein Musterbeispiel für Elend – ich konnte nicht atmen, ohne einen entsetzlichen Husten zu bekommen und es gab keine Hoffnung für mich.' - Franklin Martin, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippeüberlebender" #NT!
 panum.1106.g: "Wir können nichts tun." #NT!
 panum.1107.t: "Grippe-Berichte erzeugen Anti-Kriegs-Stimmung" #NT!
 panum.1107.d: "Berichte über die zahlreichen Todesfälle infolge der [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe in [SCOPE.sState('panum_disease_state').GetName] schädigen die Unterstützung der Bevölkerung für unsere Kriegsanstrengungen." #NT!
 panum.1107.f: "'Es ist Wahnsinn, dass wir Männer in den Krieg schicken, während diese Seuche unsere Häuser verwüstet. Sollte der Staat nicht das Leben seiner Bürger über ihren Tod stellen?'" #NT!
 panum.1107.g: "Wir werden die freie Presse nicht beeinträchtigen." #NT!
 panum.1107.h: "Verbreiten Sie beruhigende Propaganda, die auf medizinischen wissenschaftlichen Erkenntnissen beruht." #NT!
 panum.1107.i: "Zensieren Sie Nachrichten über Sterberaten und Infektionen." #NT!
 panum.1108.t: "Pandemie-Maßnahmen tragen zur Armut bei" #NT!
 panum.1108.d: "Da viele aufgrund unserer Maßnahmen gegen die Pandemie nicht arbeiten können, haben ärmere Bürger in [SCOPE.sState('panum_disease_state').GetName] Mühe, ihre Miete zu zahlen. Frisch arbeitslos gewordene Arbeiter stehen vor der Zwangsräumung, da die Vermieter ihre Bitten um Aufschub abweisen." #NT!
 panum.1108.f: "'Sie sagten mir, ich könne nicht arbeiten, weil die Fabrik überfüllt sei. Jede Fabrik ist überfüllt! Der Vermieter, möge er im ewigen Feuer brennen, kümmert sich nicht im Geringsten um unsere Notlage und verlangt die Miete vor Ende der Woche, bei Androhung einer Räumung. Meine Familie wird mit Sicherheit aus unserem Haus vertrieben werden.'" #NT!
 panum.1108.g: "Führen Sie einen Mietenstopp und ein Räumungsverbot ein." #NT!
 panum.1108.h: "Die Sozialversicherung vorübergehend erhöhen." #NT!
 panum.1108.i: "Wir können nichts dagegen tun." #NT!
 panum.1109.t: "Die Anti-Masken-Liga" #NT!
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] hat aus Protest gegen unsere Pandemiemaßnahmen die Anti-Masken-Liga gegründet. Sie bestreiten die Wirksamkeit unserer Maßnahmen und fordern, dass wir sie zum Wohle der schwächelnden Wirtschaft aufheben." #NT!
 panum.1109.f: "'Tragen Sie eine Maske und retten Sie Ihr Leben! Der Notfall, mit dem unser Land derzeit konfrontiert ist, übersteigt die Möglichkeiten des Gesundheitsministeriums.\nWer sie nicht trägt, wird krank. Der Mann, die Frau oder das Kind, das jetzt keine Maske trägt, ist ein gefährlicher Faulpelz!'" #NT!
 panum.1109.g: "Ignoriere die Liga." #NT!
 panum.1109.h: "Geben Sie die Maßnahmen zur Seuchenbekämpfung auf." #NT!
 panum.1109.i: "Diskreditieren Sie die Liga in der medizinischen Wissenschaft." #NT!
  
 panum.1120.t: "Die [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe endet" #NT!
 panum.1120.d: "Viele hatten nicht mehr gehofft, dass dieser Tag kommen würde. Nach vielen Monaten, wie sie [GetPlayer.GetName] noch nie erlebt hat, verschwindet die [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Grippe langsam aus unserem Land. Dies war wahrlich die Mutter aller Pandemien!" #NT!
 panum.1120.f: "'Das Verbot wurde heute aufgehoben. Keine Masken mehr. Alles ist offen. ‚The Romance of Tarzan‘ läuft im Coliseum [movie theater], genau wie vor etwa 6 Wochen. Ich würde es unbedingt sehen. Die Schule beginnt diese Woche – am Donnerstag! Haben Sie das jemals gesehen? Als ob sie nicht bis Montag hätten warten können!' – Violet Harris, [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippeüberlebende" #NT!
 panum.1120.g: "Wir hoffen, dass sie nie wieder zurückkehrt." #NT!
  
 je_panum_spanish_flu: "Die [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective] Grippe" #NT!
 je_panum_spanish_flu_reason: "Die [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Grippe war eine Grippepandemie, die durch ein ungewöhnlich virulentes Derivat des Grippevirus ausgelöst wurde und zu Beginn des 20. Jahrhunderts auftrat und zwischen 20 und 50 Millionen Menschenleben forderte, wobei die Schätzungen von einer Weltbevölkerung von etwa 1,8 Milliarden bis hin zu 100 Millionen reichen. Insgesamt sollen rund 500 Millionen Menschen infiziert worden sein, was eine Sterblichkeitsrate von 5 bis 10 Prozent ergibt, die deutlich höher war als bei Erkrankungen durch andere Grippeerreger.\n\nEine Besonderheit der [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Grippe war, dass sie eher junge Menschen (im Alter zwischen 20 und 40 Jahren) betraf, während Grippeviren sonst besonders kleine Kinder und alte Menschen gefährden. Sie gilt als die 'Mutter aller Pandemien'. Die Grippe wurde zu '[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]', als der [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]-Gesundheitsdirektor bekannt gab, ihm lägen keine Berichte über eine vergleichbare Erkrankung im Rest der Welt vor. In der internationalen Presse wurde fortan zunehmend der Begriff '§0-Grippe' verwendet, der auch von manchen Regierungen gefördert wurde, um die tatsächliche Verbreitung zu vertuschen." #NT!
 panum_remove_spanish_flu_effect_tt: "Hebt alle Pandemie-Maßnahmen und deren Auswirkungen auf." #NT!
  
