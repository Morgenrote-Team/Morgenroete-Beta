 panum.1001.t: "Eine neue Epidemie" #NT!
 panum.1001.d: "Poliomyelitis ist eine Krankheit, die im 19. Jahrhundert unter vielen verschiedenen Namen bekannt war. Erschreckenderweise gibt es in [SCOPE.sState('panum_disease_state').GetName] immer mehr Nachrichten über Poliofälle, die zu Verkrüppelung und Tod führen. Was früher eine Krankheit war, die nur in Einzelfällen auftrat, scheint heute regelmäßig aufzutreten. Polio ist heute eine epidemische Krankheit." #NT!
 panum.1001.g: "Beunruhigende Nachrichten." #NT!
 panum.1002.d: "Mehrere Zeitungen berichten unabhängig voneinander, dass in [SCOPE.sState('panum_disease_country').GetName] eine schwere Polio-Epidemie wütet. Die Krankheit, die früher nur in Einzelfällen auftrat, scheint sich zu einer Epidemie ausgeweitet zu haben!" #NT!
 panum.1003.t: "Eine heftige Epidemie" #NT!
 panum.1003.d: "Die Polio-Epidemie in [SCOPE.sState('panum_disease_state').GetName] ist besonders schwerwiegend. Die Zahl der Todesfälle steigt täglich." #NT!
 panum.1003.f: "'Am Morgen des dritten Tages, an dem ich im Krankenhaus war, das war der erste oder zweite September, gab es Müsli, Saft und Schokomilch zum Frühstück. Ich weiß noch, wie ich versuchte, die Schokomilch aufzuheben, und sie mir direkt durch die Hand fiel. Ich fühlte mich so schlecht, weil ich mich nicht mehr bewegen konnte. Die Krankenschwestern eilten alle herbei und räumten das Chaos auf. Ich weiß noch, dass ich die Schokomilch wollte, aber ich bekam sie nicht. Stattdessen brachten sie mir einen Strohhalm und ich trank etwas Saft. Danach kamen einige Ärzte in mein Zimmer und ließen mich rückwärts zählen, 10-9-8-7-6, soweit ich mich erinnern kann. Ich lag zu dieser Zeit, weil ich Probleme hatte, aufrecht zu sitzen.'\n\nMarilynne R., Polio-Überlebende" #NT!
 panum.1003.g: "Gibt es keine Heilung?" #NT!
 panum.1004.t: "Eine kaputte Generation" #NT!
 panum.1004.d: "Je länger die Epidemie in [SCOPE.sState('panum_disease_state').GetName] andauert, desto offensichtlicher wird es: Es wird eine ganze Generation geben, die mit Verstümmelungen und Lähmungen leben muss." #NT!
 panum.1004.f: "'Ich erinnere mich noch sehr gut an den Tag, an dem bei mir Polio diagnostiziert wurde. An diesem Morgen war ich im Sportunterricht in der Schule und wir spielten Touch Football auf dem Fußballfeld. Ich bemerkte, dass mein Bein beim Laufen schwach wurde oder unter mir nachgab. Ich dachte mir nicht viel dabei, aber später an diesem Tag spielte ich mit der Blaskapelle meiner Highschool bei einer Polio-Benefizparade in Hibbing, das etwa 30 Meilen von Coleraine entfernt ist, wo ich aufgewachsen bin. Während des Marschs bei dieser Parade wurden meine Beine wieder schwach. Tatsächlich waren sie so schwach, dass ich aus der Marschreihe aussteigen musste und zurück zum Schulbus ging, um mich hinzulegen.'\n\nDavid K., Polio-Überlebender" #NT!
 panum.1004.g: "Dieser Effekt hält lange an..." #NT!
 panum.1005.t: "Polio-Überlebende" #NT!
 panum.1005.d: "Diejenigen, die diese Epidemie überleben, sollen eine tiefe Wut in sich tragen. Es ist eine Art Rache an der Krankheit, die diese Menschen so sehr zerstört hat. In unserem Land bilden sich immer mehr Verbände von Polioüberlebenden." #NT!
 panum.1005.f: "'Anders zu sein ist wirklich schwer, wenn man auf der Highschool ist. Ich habe am Ende einfach nicht an vielen Dingen teilgenommen, an denen ich wahrscheinlich teilgenommen hätte, wenn ich nicht behindert wäre. Ich hätte mich gerne fürs Cheerleading beworben, aber die Leute haben sich über mich lustig gemacht, nur weil ich darüber geredet habe. Also habe ich am Ende viele Gefühle für mich behalten. Ich wollte nicht zu einem Tanz gehen, weil ich mich wegen meines Hinkens unwohl fühlte. Ich wollte nicht, dass die Leute mich anstarrten, wenn ich über die Tanzfläche ging. Ich hasste es, wenn die Leute mich anstarrten und auslachten. Ich glaube, alle Teenager sind verlegen, aber wenn man eine körperliche Behinderung hat, wird diese Verlegenheit noch verstärkt. Bis heute hasse ich es, wenn die Leute auf mein Bein starren, wenn ich Shorts trage.'\n\nGail B., Polio-Überlebende" #NT!
 panum.1005.g: "Die Zivilgesellschaft engagiert sich gegen Polio." #NT!
 panum.1006.t: "Politiker gründet Polio-Stiftung" #NT!
 panum.1006.d: "Angesichts der grassierenden Polio-Epidemie, der trauernden Eltern, der Verstümmelten und Toten fasste [SCOPE.sCharacter('panum_opposition_leader').GetFullName] den Plan, eine Stiftung zur Bekämpfung der Krankheit zu gründen. Kritiker meinen, er versuche damit nur, seinen politischen Ruf aufzupolieren." #NT!
 panum.1006.f: "Der US-Präsident Franklin D. Roosevelt hatte sich seit 1924 regelmäßig im Warm Springs-Thermalbad aufgehalten und war hier 1945 verstorben. 1921 litt er an einer Lähmung der Beine, die als spinale Kinderlähmung angesehen wurde; neueren Forschungen zufolge handelte es sich um das damals noch wenig bekannte Guillain-Barré-Syndrom. Roosevelt gründete 1927 die Georgia Warm Springs Foundation, deren Hauptaufgabe zunächst die Behandlung von Rückenmarkslähmungen war. Heute heißt die Einrichtung Roosevelt Warm Springs Institute for Rehabilitation und kümmert sich in 26 verschiedenen Abteilungen um Patienten mit Behinderungen aller Art." #NT!
 panum.1006.g: "Ein wahrer Philanthrop." #NT!
 panum.1006.h: "Und die bevorstehende Wahl ist reiner Zufall, nehme ich an?" #NT!
 panum.1007.t: "Polio-Depression" #NT!
 panum.1007.d: "Die vielen lebenslang verstümmelten Kinder haben nicht nur Auswirkungen auf die körperliche Gesundheit der nächsten Generation, sondern auch auf die Eltern, die der Regierung vorwerfen, zu wenig zu tun." #NT!
 panum.1007.f: "'Ich erinnere mich noch genau an den ersten Tag, an dem ich die Orthese in der Schule trug. Es war mitten im Schultag. Anscheinend war ich an diesem Morgen zum Arzt gegangen, um mir die Orthese anpassen zu lassen. Meine Mutter setzte mich an der Tür ab und ich erinnere mich, dass sie Tränen in den Augen hatte, als ich wegging.'\n\nEdmund Sass, Polio-Überlebender" #NT!
 panum.1007.g: "Irrational, aber nicht unverständlich." #NT!
 panum.1008.t: "Polio-Klinik" #NT!
 panum.1008.d: "Um die vielen Patienten dort versorgen zu können, gründete Schwester [SCOPE.sCharacter('panum_polio_nurse').GetFirstName] in [SCOPE.sState('panum_disease_state').GetName] eine Polio-Klinik." #NT!
 panum.1008.f: "'Sie war eine sehr große und elegante Frau, und sie flößte allein durch ihr Auftreten und ihre Haltung Vertrauen ein. Sie hatte einen reizenden Akzent, der sie zu einer interessanten Zuhörerin machte. Wenn ich die Augen schließe, sehe ich sie immer noch neben meinem Bett stehen, in einem langen, schwarzen Kleid und einem großen Hut mit einer wunderschönen Straußenfeder ... Sie trug keinen Schmuck und kein Make-up. Ich erinnere mich an ihr starkes und kantiges Gesicht und ihre Augen waren sehr intensiv. Wenn sie einem in die Augen sah, verlangte diese Intensität unsere ganze Aufmerksamkeit, und wenn sie sprach, hörten die Leute ihr zu ... Jeder wusste, wer das Sagen hatte, und wir erhielten die Behandlung, die sie empfahl. Ich habe noch nie jemanden gekannt, der so durchsetzungsfähig war wie sie.'\n\nRay G., Polio-Überlebender" #NT!
 panum.1008.g: "Danke, Schwester [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]." #NT!
 panum.1009.t: "Öffentliche Panik" #NT!
 panum.1009.d: "Trotz aller Bemühungen der lokalen Regierung in [SCOPE.sState('panum_disease_state').GetName] ist die Bevölkerung einem der gefährlichsten Aspekte eines jeden Ausbruchs erlegen: der Panik." #NT!
 panum.1009.f: "Am Samstag, dem 17. Juni 1916, wurde in Brooklyn, New York, offiziell eine Polioepidemie bekannt gegeben. In diesem Jahr gab es in den Vereinigten Staaten 27.363 Fälle und 7.130 Todesfälle aufgrund von Polio, davon allein über 2.000 in New York City. Die Epidemie von 1916 löste weitverbreitete Panik aus und Tausende flohen aus der Stadt in nahegelegene Bergferienorte; Kinos wurden geschlossen, Versammlungen abgesagt, öffentliche Versammlungen fanden fast gar nicht statt und Kinder wurden gewarnt, nicht aus Wasserspendern zu trinken und Vergnügungsparks, Schwimmbäder und Strände zu meiden." #NT!
 panum.1009.g: "Verdammte Angst!" #NT!
 panum.1010.t: "Quarantäne" #NT!
 panum.1010.d: "Obwohl unklar ist, ob Polio eine ansteckende Krankheit ist, mehren sich in [SCOPE.sState('panum_disease_state').GetName] die Stimmen, die eine Quarantäne einführen wollen, um eine Ausbreitung zu verhindern." #NT!
 panum.1010.f: "Die Krankheit brach ohne Vorwarnung aus und erforderte lange Quarantänezeiten, in denen Eltern von ihren Kindern getrennt wurden. Es war unmöglich vorherzusagen, wer sich anstecken und wer verschont bleiben würde. Die Namen und Adressen von Personen mit bestätigten Poliofällen wurden täglich in der Presse veröffentlicht, ihre Häuser wurden mit Plakaten gekennzeichnet und ihre Familien wurden unter Quarantäne gestellt." #NT!
 panum.1010.g: "Dies wird mehr Schaden als Nutzen anrichten." #NT!
 panum.1010.h: "Setzen Sie eine strikte Quarantäne durch." #NT!
  
 panum.1020.t: "Polio-Epidemie endet" #NT!
 panum.1020.d: "Die Kliniken in [SCOPE.sState('panum_disease_state').GetName] berichten, dass die Poliofälle deutlich zurückgegangen sind. Die Folgen der Epidemie werden die Region noch jahrelang beschäftigen." #NT!
 panum.1020.f: "'Ich bin nicht krank. Ich bin kaputt. Aber ich bin glücklich, am Leben zu sein, solange ich malen kann.' -Frida Kahlo" #NT!
  
 panum.1022.t: "Der Beginn der Poliomyelitis" #NT!
 panum.1022.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat uns heute eine kurze Zusammenfassung der Symptome geschickt, die bei einem frühen Ausbruch der Poliomyelitis auftreten." #NT!
 panum.1022.f: "'Gesunde und meist blühend wirkende Kinder im Alter von 6 bis 36 Monaten, in Ausnahmefällen auch etwas älter, erkranken nach vorher ungestörter Gesundheit mit oder ohne vorangegangene Anzeichen von Unwohlsein, wie: Augenrollen, plötzlich unter den Erscheinungen von Hitze, Stauungs- und Reizzuständen, Fieber, Durst, Gereiztheit, Schreien, Schläfrigkeit ohne wirklichen Schlaf, sowie zuweilen mit den Symptomen gestörten Verlaufs akuter, exanthematischer Krankheitsprozesse. Bald darauf brechen Krämpfe von leichterem oder schwererem Ausmaß aus, die sich in kürzeren oder längeren Zeitabständen wiederholen.\n\nIn anderen Fällen tritt die Krankheit plötzlich ohne die aufgeführten Symptome mit Krämpfen oder Übelkeit, Zusammensacken des Körpers, Schaum vor Mund und Nase, Blaufärbung usw.\n\nManchmal fehlen jedoch alle diese Symptome oder sind nur in sehr geringem Ausmaß vorhanden und die Lähmung setzt langsam und unbemerkt ein.'" #NT!
  
 panum.1040.t: "Beiträge zur Kenntnis der Heine-Medin-Krankheit" #NT!
 panum.1040.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat heute der medizinischen Fakultät ein revolutionäres Dokument vorgestellt, das als Ausgangspunkt dienen soll, um Polio-Epidemien unter Kontrolle zu bringen – und die Behandlung von Polio-Überlebenden zu verbessern." #NT!
 panum.1040.f: "In [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] 'Beiträge zur Kenntnis der Heine-Medin-Krankheit' erwähnte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] mehrere Aspekte, die helfen sollen, Polio vorzubeugen und seine Verbreitung zu verhindern. Eine zentrale Erkenntnis ist, dass Polio eine Infektionskrankheit ist. Neben den daraus abgeleiteten Maßnahmen gibt es auch eine Vielzahl von Methoden, um Patienten zu helfen. Proteinreiche Diäten, physikalische Therapieprogramme und neue Erfindungen wie die Eiserne Lunge geben neue Hoffnung, dass Polio zwar nicht ausgerottet, aber in Zukunft besser bekämpft werden kann." #NT!
 panum.1040.g: "Wir brauchen eine Polio Hall of Fame." #NT!
  
 panum.1041.t: "Physiotherapie" #NT!
 panum.1041.d: "Der Arzt trifft eine Krankenschwester, die sein bisheriges Wissen über die Behandlung von Kinderlähmung auf den Kopf stellt." #NT!
 panum.1041.f: "'Und seit wann machen Sie das jetzt?'\n'Zehn Jahre, Herr Doktor.'\n'Sie legen den Patienten Heizkissen unter?'\n'Ja, Herr Doktor.'\n'Und Sie sagen, das hat geholfen?'\n'Ihre Skepsis kann den Erfolg nicht verdecken. Es geht nicht nur um das Heizkissen. Es braucht Massagen und Entspannungsübungen. Ein Muskel, der geschient ist, entwickelt sich nicht mehr. Er braucht Bewegung.'\n'Hmm…'" #NT!
 panum.1041.g: "Aber... Poliopatienten brauchen Ruhe und Stabilisierung!" #NT!
 panum.1042.t: "Die Straße" #NT!
 panum.1042.d: "Bei der Inspektion des Ausbruchsgebiets der Polio-Erkrankung geht Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] systematisch vor." #NT!
 panum.1042.f: "'Wenn man die Ausbreitung der in [SCOPE.sState('panum_disease_state').GetCityHubName] wütenden Poliomyelitis verfolgt, kann einem eine interessante Entdeckung nicht entgehen. Die Fälle sind wie eine Perlenkette aneinandergereiht. Man kann einer Straße folgen und die Fälle nebeneinander sehen. Ich konnte das chronologische Auftreten auf einer Eisenbahnlinie in der Gegend zurückverfolgen. Das ist kein Zufall.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1042.g: "Doch reicht dieser Nachweis für eine Ansteckung aus?" #NT!
 panum.1043.t: "Die Gemeinde" #NT!
 panum.1043.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat eine abgelegene Gemeinde im Pestgebiet besucht, um seine Forschungen zu den Ursachen der Polio-Erkrankung voranzutreiben." #NT!
 panum.1043.f: "'49 Fälle in dieser Gemeinde?'\n'Als Bürgermeister muss ich Ihnen leider Folgendes sagen, Herr Doktor.'\n'Ist Ihnen etwas aufgefallen, als Sie die Karte mit den Orten in der Gemeinde erstellt haben, an denen diese Fälle auftraten?'\n'Bei allem Respekt, ich bin kein Wissenschaftler.'\n'Die Krankheiten haben sich von einem Punkt aus verbreitet. Es ist die Dorfschule.'" #NT!
 panum.1043.g: "Ist Polio vielleicht keine Erbkrankheit, sondern ansteckend?" #NT!
 panum.1044.t: "Philanthropie" #NT!
 panum.1044.d: "Polio-Überlebende haben sich an Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] gewandt. Sie möchten die wissenschaftliche Arbeit zur Polio-Forschung mit einer Stiftung unterstützen." #NT!
 panum.1044.f: "Zu Beginn des 20. Jahrhunderts war Polio eine Krankheit, die große Teile der Gesellschaft beunruhigte, da ihre Hintergründe unbekannt waren und sogar die Mittelschicht oder wohlhabende Schichten betroffen sein konnten. Einige Polio-Überlebende, die zu Wohlstand kamen, kämpften auch ihr Leben lang gegen die Krankheit und unterstützten private und staatliche Initiativen. Polio ist eine Krankheit, bei deren Bekämpfung die Philanthropie eine wichtige Rolle gespielt hat." #NT!
 panum.1044.g: "Eine wertvolle Unterstützung." #NT!
 panum.1044.h: "Das Geld soll zu gleichen Teilen in die Impfstoffforschung fließen." #NT!
 panum.1044.i: "Darüber hinaus sollen die Stiftungsgelder auch der allgemeinen Forschung zugute kommen." #NT!
 panum.1045.t: "Antibiotika" #NT!
 panum.1045.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat durch den Einsatz von Antibiotika Erfolge bei der Behandlung von Polio erzielt." #NT!
 panum.1045.f: "'Es gibt keine Heilung für Polio. Und leider sehe ich nicht, wie das in Zukunft möglich sein soll. Es gibt nur Prävention, Erforschung der Ursachen und Vermeidung der Ausbreitung – und Behandlung zur Linderung der Symptome. Antibiotika können helfen, geschwächte Muskeln vor Infektionen zu schützen. Dies ist ein Schritt in die richtige Richtung. Hoffentlich werden weitere folgen.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1045.g: "Ein Hoch auf Antibiotika!" #NT!
 panum.1046.t: "Soziale Ächtung" #NT!
 panum.1046.d: "In einem Reformpapier wies Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] seine akademischen Kollegen darauf hin, dass die Reintegration von Polio-Überlebenden mehr bedeutet als nur die Heilung, Behandlung oder Linderung der Krankheit. Die soziale Stigmatisierung des Einzelnen müsse abgebaut – und beseitigt – werden." #NT!
 panum.1046.f: "'Ich erinnere mich, dass die größte Herausforderung für mich das Einsteigen in den Schulbus war. Der erste Schritt in den Bus kam mir wie eine Meile vor und ich konnte ihn einfach nicht tun. Eine Zeit lang kam meine Mutter mit, und es war so peinlich, weil sie diesen Hocker herausholte. Aber ich konnte die Peinlichkeit nicht ertragen, also setzten sich mein Vater und der Busfahrer (sein Name war Bill, und ich erinnere mich lebhaft an ihn) zusammen und besprachen, wie sie dieses Problem lösen könnten. Mein Vater ging zu der Haltestelle und grub einen Graben in den Boden. Bill drückte das Vorderrad des Busses in diesen Graben und senkte dadurch die Stufe so weit ab, dass sie wirklich nah am Boden war. Dann konnte ich problemlos in den Bus einsteigen. Und niemand bemerkte es wirklich …'\n\nJennifer W., Polio-Überlebende" #NT!
 panum.1046.g: "Polioüberlebende sind keine Bürger zweiter Klasse." #NT!
 panum.1047.t: "Der Preis des Fortschritts" #NT!
 panum.1047.d: "Bei seinen Untersuchungen zu den Ursachen der seit Jahren auftretenden Polio-Epidemien stieß Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] auf eine unangenehme Wahrheit." #NT!
 panum.1047.f: "'Polio ist seit der Antike bekannt, aber – soweit meine Forschungen es zulassen – war es bis zum Ende des 19. Jahrhunderts keine epidemische Krankheit wie heute. Der Grund dafür ist, wenn er sich bestätigt, paradoxerweise: bessere Gesundheitsversorgung. Vor der Einführung von Abwasser- und Sanitäranlagen waren Kinder Polio viel früher ausgesetzt, etwa im Alter von 6 Monaten bis 4 Jahren. In dieser Zeit ist die Krankheit milder und bietet Immunität. Je älter eine mit Polio infizierte Person ist, desto wahrscheinlicher tritt eine Lähmung auf. Verbesserte Gesundheitsstandards haben dazu geführt, dass weniger Menschen Immunität entwickelt haben und anfälliger für die gefährlichen Folgen der Krankheit sind.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1047.g: "Die Krankheit breitet sich aus, weil sich die öffentliche Gesundheit verbessert hat?" #NT!
 panum.1048.t: "Bazillus oder Virus?" #NT!
 panum.1048.d: "Über den Erreger der Poliomyelitis ist noch nichts bekannt. Deshalb findet Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself] in einem lebhaften Streit mit Kollegen vor." #NT!
 panum.1048.f: "Obwohl die Poliomyelitis schon lange bekannt war und mit der Entwicklung der Mikrobiologie auch klar wurde, dass es sich um einen Krankheitserreger handelt, herrschten lange Zeit unterschiedliche Auffassungen darüber, ob es sich um Polio-Bakterien oder Polio-Viren handelte." #NT!
 panum.1048.g: "Alles deutet auf einen Virus hin." #NT!
 panum.1048.h: "Dieses nutzlose Geschwätz lenkt den Arzt von seiner Arbeit ab!" #NT!
 panum.1049.t: "Rollstuhlakzeptanz" #NT!
 panum.1049.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat festgestellt, dass es nicht nur wichtig ist, Patienten mit Rollstühlen auszustatten – diese müssen auch gesellschaftlich akzeptiert sein, damit Polio-Überlebende sich problemlos wieder in das normale Leben integrieren können." #NT!
 panum.1049.f: "'Ich war ziemlich naiv, was das College angeht, und war überrascht, dass die Universität für Rollstuhlfahrer nicht zugänglich war. Aber so war das damals eben. Überall gab es Stufen und es war nicht wie in der High School, wo ich eine Gruppe von Freunden hatte, die mich herumtrugen ... Oft musste ich eine Gruppe Freiwilliger zusammentrommeln oder einfach Leute anwerben, die von einer Vorlesung zur nächsten eilten, und manchmal sagten sie: ‚Ich habe einfach keine Zeit. Ich kann dir nicht helfen.‘ Ich musste in einer Wohnung außerhalb des Campus leben, weil keines der Wohnheime barrierefrei war.'\n\n David K., Polio-Überlebender" #NT!
 panum.1049.g: "Wir unterstützen eine Kampagne für mehr Rollstuhlakzeptanz." #NT!
 panum.1049.h: "Finanzieren Sie ein Programm zur Ausstattung öffentlicher Gebäude mit rollstuhlgerechten Rampen." #NT!
  
 panum.1051.t: "Polio-Beratung" #NT!
 panum.1051.d: "Eine Handlungsempfehlung zur Polio-Erkrankung kursiert derzeit in der Wissenschaftswelt und bereitet Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] allerhand Ärger, [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] eigene Thesen zur Polio-Behandlung durchzusetzen." #NT!
 panum.1051.f: "'Sauerstoffzufuhr durch positive Elektrizität über die unteren Extremitäten. Häufige Bäder mit Mandelmehl oder oxidierendes Wasser. Anwendung von Umschlägen aus Römischer Kamille, Rotulme, Arnika, Senf, Cantharis, Mandelöl und, besonders wertvoll, Nardenöl und Xanthoxolinum. Innerlich anwenden von Koffein, Fl. Kola, trockenem Chininchlorid, Chinarindenelixier, Radiumwasser, Goldchlorid, Kalklauge und Pepsinwein.'\n\nDr. Angelika Hasenbein, 'Eine Monographie über die Epidemie der Poliomyelitis (Kinderlähmung)'" #NT!
 panum.1051.g: "Es klingt tatsächlich sehr überzeugend." #NT!
 panum.1052.t: "Gipsverbände und Zahnspangen" #NT!
 panum.1052.d: "Von mehreren 'Polio-Experten' hat Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] erfahren, dass Beinschienen die beste Möglichkeit seien, die Ausgangssituation der Patienten zu verbessern – doch [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] ist davon nicht überzeugt." #NT!
 panum.1052.f: "Patienten mit Restlähmung wurden mit Schienen behandelt und ihnen wurde beigebracht, verlorene Funktionen mithilfe von Schienen, Krücken und Rollstühlen zu kompensieren. Auch der Einsatz von Hilfsmitteln wie starren Schienen und Ganzkörpergipsen, die aufgrund der eingeschränkten Bewegung des Benutzers zu Muskelschwund führten, wurde als wirksame Behandlung angepriesen. Die meisten dieser Behandlungen erwiesen sich jedoch als wenig therapeutisch wertvoll." #NT!
 panum.1052.g: "Vielleicht hilft es...?" #NT!
 panum.1053.t: "Sinnlose Operation" #NT!
 panum.1053.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] wurde von den Chirurgen versichert, dass chirurgische Eingriffe einen positiven Effekt auf Polio hätten." #NT!
 panum.1053.f: "'Ich habe unzählige Stunden damit verbracht, Kollegen zu interviewen, Bücher zu studieren und Patienten zu untersuchen, um mich vom Erfolg chirurgischer Eingriffe bei Polio zu überzeugen. Die Ärzte sind sehr stolz auf ihre Ergebnisse. Die Art und Weise, wie sie mit den Verstümmelungen umgehen, erinnert an Feinmechaniker, die glauben, ein Uhrwerk zu montieren. Sie arbeiten mit Präzisionswerkzeugen an menschlichen Maschinen. Doch mein Eindruck ist, dass hier nicht die Krankheit, nicht der Patient im Mittelpunkt steht – sondern der Ruf der Ärzte. Mir ist bisher kein Fall bekannt, in dem diese Methode tatsächlich zu einer erfolgreichen Poliobehandlung geführt hat.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1053.g: "Eine falsche Fährte." #NT!
 panum.1054.t: "Rekonvaleszentes Serum" #NT!
 panum.1054.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] probierte ein hochgelobtes Serum aus, das in der aktuellen Poliomedizin als wirksames Mittel gilt. Obwohl [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] Kollegen von der Methode überzeugt sind, hält der Arzt sie für Zeitverschwendung." #NT!
 panum.1054.f: "'Damals hatte man eine Ahnung, dass es sich um eine Infektionskrankheit handelte, also bekam ich ein sogenanntes ‚Rekonvaleszentenserum‘, das aus dem Blut von Menschen hergestellt wurde, die Polio überwunden hatten. Diese Behandlungsform war damals in Mode. Es scheint unwahrscheinlich, dass es irgendeine Wirkung hatte, da die Krankheit zu einer ziemlich ausgeprägten Lähmung fortschritt, bei der ich keine Beine und auch keine Bauchmuskeln mehr bewegen konnte. Ich wurde isoliert und ich glaube, man hat mir gesagt, dass ich Poliomyelitis hätte. Ich wusste jedoch nicht, was Poliomyelitis ist. Niemand sagte mir, dass ich an Kinderlähmung litt, was ich erkannt hätte, da Roosevelt zu dieser Zeit Präsident war und ich wusste, dass er durch die Krankheit stark gelähmt war.'\n\nRichard O., Polio-Überlebender" #NT!
 panum.1054.g: "Aber jeder Arzt verschreibt es?" #NT!
 panum.1055.t: "Isolierung" #NT!
 panum.1055.d: "Neben der Fixierung der Gliedmaßen halten es einige Polio-Experten für ratsam, Patienten komplett zu isolieren. Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat solche Versuche selbst durchgeführt – und kam zum Schluss, dass es sich um eine ineffiziente und unmenschliche Therapie handelt." #NT!
 panum.1055.f: "'Nach der Lumbalpunktion und der Diagnose Polio wurde ich sofort isoliert und mir wurde gesagt, ich solle meinen Kopf nicht heben. Ich erinnere mich, dass sie mich in ein Kinderbettchen legten! Ich war neun Jahre alt und konnte nicht verstehen, warum man mich in ein Kinderbettchen legte. Es war sehr entwürdigend. Ich würde bestimmt nicht aus dem Bett klettern, noch würde ich mich umdrehen und herausfallen. Tatsächlich konnte ich mich kaum bewegen. Als ich dort in diesem Kinderbettchen lag, spürte ich, wie das Virus richtig einsetzte. Es war, als würde eine Tür zugeschlagen. Ich hatte das Gefühl, meine Welt hätte sich völlig verändert. Um das Ganze noch schlimmer zu machen, war es furchtbar heiß und feucht, und das war natürlich vor der Zeit der Klimaanlagen; ich erinnere mich, dass ich mich sehr unwohl fühlte …'\n\nSharon K., Polio-Überlebende" #NT!
 panum.1055.g: "Das ist inakzeptabel!" #NT!
 panum.1055.h: "Dies könnte der Beginn einer zweiten Karriere sein." #NT!
 panum.1055.i: "Lassen Sie diese Aufzeichnungen schnell verschwinden." #NT!
 panum.1056.t: "Post-Polio-Syndrom" #NT!
 panum.1056.d: "Bei einer kürzlich erfolgten Untersuchung stellte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] fest, dass es nach der eigentlichen Polio-Infektion inklusive deren Folgen zu Nachwirkungen in Form eines Post-Polio-Syndroms kommen kann. [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U] ist angesichts dieser Entwicklung völlig verzweifelt." #NT!
 panum.1056.f: "'Als ich etwa 35 oder 40 Jahre alt war, bekam ich schreckliche Schmerzen in den Gelenken und Muskeln. Ich wurde sehr schnell müde. Ich ging zum Arzt und ließ Röntgenaufnahmen und Bluttests machen. Ich bekam ein paar Tabletten und machte Physiotherapie. Nichts half.\nWährend ich darauf wartete, dass sie die Krankenakten fanden, erklärte ich der Person, die mir half, dass ich diese neuen Schmerzen hatte und hoffte, dass die Krankenakten helfen könnten, den Grund dafür zu erklären. Sie fragte mich, ob ich schon einmal vom Post-Polio-Syndrom gehört hätte. Ich sagte: ‚Nein, was ist das?‘ Sie erklärte mir, dass es 30 oder 40 Jahre nach einer Polio-Erkrankung so ist, als würde man es wieder bekommen.\nDer Gedanke daran, dass man wieder Polio bekommen könnte, war mehr, als ich ertragen konnte. Ich brach einfach zusammen. Ich rief meine Schwägerin an und erzählte ihr, was ich herausgefunden hatte. Ich erzählte es auch meiner Familie. Ich weinte viel. Ich zeigte meinen örtlichen Ärzten meine Krankenakten und erzählte von meinem Termin am Sister Kenny Institute. Sie sagten mir wieder, dass Polio der Vergangenheit angehöre. Ich sagte: 'Ja, aber jetzt bin ich hier und erlebe es noch einmal!'\n\nJanice G., Polio-Überlebende" #NT!
 panum.1056.g: "Was für eine hoffnungslose Situation." #NT!
  
 panum.1061.t: "Experimente" #NT!
 panum.1061.d: "In einem zweifelhaften, aber nicht weniger erfolgreichen Experiment infizierte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] Affen mit Polio." #NT!
 panum.1061.f: "'Ich habe kürzlich von einem Verfahren gelesen, mit dem Jean-Antoine Villemin die Ansteckungsgefahr von Tuberkulose nachweisen wollte. Er führte Experimente an Kaninchen durch, indem er sie absichtlich mit dem Gewebe von Tuberkulosekranken in Kontakt brachte. Dutzende toter Hunde später konnte er seine These beweisen. Mein Experiment mit Affen basiert auf einer ähnlichen Annahme.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1061.g: "Wenn Tiere infiziert werden können, ist dies auch bei Menschen untereinander möglich." #NT!
 panum.1062.t: "Eiserne Lunge" #NT!
 panum.1062.d: "Der brillante Ingenieur [ROOT.Var('gaudi_engineer_var').GetCharacter.GetFullName] half Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ein geniales Gerät zu bauen, das die Poliobehandlung revolutionierte." #NT!
 panum.1062.f: "Eine Eiserne Lunge war eines der ersten klinischen Geräte, das eine künstliche Beatmung eines Menschen ermöglichte. Der amerikanische Ingenieur Philip Drinker entwickelte sie um 1920 zur Beatmung von Patienten mit Lungenerkrankungen. Dabei liegt der Körper des Patienten, bis auf den Kopf, vollständig in einem Hohlzylinder. Das Gerät verschließt den Hals luftdicht und erzeugt einen Unterdruck. Dadurch presst der Umgebungsdruck Luft durch Nase und Mund des Patienten in die Lunge. Die Ausatmung erfolgt entsprechend durch den Aufbau eines Überdrucks in der Kammer. Viele Poliopatienten benötigten die Eiserne Lunge nur in der akuten Phase der Erkrankung, bis die Muskelfunktion wieder einsetzte. Manche Patienten nutzten sie nur über Nacht, andere wiederum dauerhaft." #NT!
 panum.1062.g: "Dies könnte viele Leben retten." #NT!
 panum.1063.t: "Psychologische Unterstützung" #NT!
 panum.1063.d: "Als Psychiater nutzte Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] seine Erfahrungen, um Poliopatienten das Leben zu erleichtern." #NT!
 panum.1063.f: "'Wir achten zu Recht auf die körperliche Komponente der Krankheit, wenn wir von Poliomyelitis sprechen. Aber neben dem geschädigten Körper gibt es auch eine geschädigte Seele. Polio hinterlässt nicht nur körperliche Spuren. Insbesondere bei der Arbeit mit Kindern habe ich erlebt, welche Auswirkungen diese schreckliche Krankheit auf ihr privates und soziales Leben hat. Worte können nicht heilen. Aber sie können Linderung verschaffen. Und wir müssen den Überlebenden eine Perspektive geben, damit sie nicht nur überleben, sondern auch den Willen zum Überleben haben.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1063.g: "Vielen Dank, Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]." #NT!
 panum.1064.t: "Diät" #NT!
 panum.1064.d: "Doktor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] empfiehlt eine nährstoffreiche Ernährung für Poliopatienten." #NT!
 panum.1064.f: "'Frühere Erfolge im Kampf gegen Rachitis, Jodmangel, Skorbut und Pellagra haben gezeigt, dass unsere Ernährung eine entscheidende Rolle bei der Bekämpfung von Krankheiten spielen kann. Polio ist keine Mangelkrankheit. Es ist jedoch bekannt, dass Proteine ​​eine wichtige Rolle beim Muskelaufbau spielen, und daher ist es wichtig, darauf hinzuweisen, dass die Ernährung von Poliopatienten reichhaltiger sein muss als die von normalen Menschen.'\n\nAus dem Tagebuch von Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SCOPE.sState('panum_disease_state').GetCityHubName]" #NT!
 panum.1064.g: "Endlich ein ärztliches Attest für den Verzehr von T-Bone-Steaks." #NT!
  
