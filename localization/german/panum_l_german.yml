 panum.52.t: "Medizinische Beobachtungsexpedition" #NT!
 panum.52.d: "Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] hat ein kleines Team von Experten und Assistenten zusammengestellt, die geeignet sind, eine Epidemie im Ausland genau zu beobachten und daraus Schlüsse zu ziehen. Es stellt sich nun die Frage, welche Krankheit in welchem ​​Land beobachtet werden soll." #NT!
 panum.52.f: "Es gibt zwei verschiedene Arten von medizinischen Expeditionen, die ein Arzt unternehmen kann: Beobachtungsexpeditionen und Forschungsexpeditionen. Beobachtungsexpeditionen helfen dabei, eine Krankheitsbeschreibung zu vervollständigen, Forschungsexpeditionen helfen dabei, eine Behandlungsmethode zu finden. Eine Expedition ist jedoch nicht so effizient wie die Forschung vor Ort und es können mehrere Versuche erforderlich sein, um eine Krankheit vollständig zu erforschen." #NT!
 panum.52.g: "Die Choleraepidemie in [SCOPE.sCountry('panum_cholera_country_scope').GetName]." #NT!
 panum.52.h: "Die Tuberkulose-Epidemie in [SCOPE.sCountry('panum_tuberculosis_country_scope').GetName]." #NT!
 panum.52.i: "Die Pockenepidemie in [SCOPE.sCountry('panum_smallpox_country_scope').GetName]." #NT!
 panum.52.j: "Die Typhusepidemie in [SCOPE.sCountry('panum_typhus_country_scope').GetName]." #NT!
 panum.52.k: "Die Gelbfieberepidemie in [SCOPE.sCountry('panum_yellow_fever_country_scope').GetName]." #NT!
  
