 je_noble_gases_reason: "Den ersten Hinweis darauf, dass Luft ein reaktionsträges Gas enthält, fand Henry Cavendish 1783. Er mischte Luft und Sauerstoff so, dass die darin enthaltenen Elemente Stickstoff und Sauerstoff mit Hilfe der Reibungselektrizität vollständig zu Stickoxiden reagierten. Zurück blieb ein reaktionsträges Rückstand. Er erkannte den Wert seiner Entdeckung jedoch nicht und brach seine Experimente nicht ab. Dabei könnten Hinweise auf bisher unbekannte Elemente vorliegen, die es mit modernsten Methoden zu erforschen gilt."
 je_mendelejew_noble_gases_has_famous_chemist_tt: "Hat einen berühmten [concept_mendelejew_chemist]."
 je_mendelejew_noble_gases_invalid: "Eine andere Nation entdeckt die Edelgase."
 mendelejew.901.t: "Die Edelgase"
 mendelejew.901.d: "Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] ist es gelungen, das zuvor theoretisch vermutete Helium, das auch auf der Erde nachgewiesen wurde, zu isolieren. Dabei machte er eine erstaunliche Entdeckung: In der Luft gibt es nicht nur ein, sondern mehrere unbekannte Elemente. Wegen ihrer geringen Reaktivität nannte er sie Edelgase."
 mendelejew.901.f: "Cavendishs Experimente zur Erforschung der Luft wurden ab 1888 von Lord Rayleigh fortgeführt. Er stellte fest, dass aus der Luft gewonnener Stickstoff eine andere Dichte hat als der aus der Zersetzung von Ammoniak gewonnene. Rayleigh vermutete daher, dass es einen noch unbekannten, inerten Bestandteil der Luft geben müsse. Daher versuchten er und William Ramsay, Stickstoff durch Reaktion mit Magnesium vollständig aus einer Luftprobe zu entfernen und dieses unbekannte Gas zu isolieren. Schließlich gelang es ihnen 1894, ein neues Element namens Argon spektroskopisch nachzuweisen. Nach der Bestimmung der Haupteigenschaften von Helium und Argon stellte man fest, dass diese Gase im Gegensatz zu den anderen atmosphärischen Gasen einatomig sind. William Ramsay vermutete daraufhin, dass es eine ganze Gruppe solcher Gase geben müsse, die im Periodensystem eine eigene Gruppe bilden, und er begann, nach ihnen zu suchen. 1898 gelang es ihm und Morris William Travers, Neon, Krypton und Xenon durch fraktionierte Destillation von Luft zu isolieren."
 mendelejew.901.g: "Edel? Das nenne ich faul."
 mandelejew_noble_gases_901.tt: "Theoretisieren, entdecken und isolieren Sie #YELLOW Argon#!, #YELLOW Neon#!, #YELLOW Krypton#! und #YELLOW Xenon#!."
 mendelejew_chemist_synthetic_rubber_cost_modifier: "Synthesekautschukforschung"
 mendelejew_synthetic_rubber_tech: "Synthesekautschuk"
 mendelejew_synthetic_rubber_tech_desc: "Synthesekautschuk ist ein künstliches Elastomer. Es handelt sich um Polymere, die aus Erdölnebenprodukten synthetisiert werden. Synthesekautschuk ist natürlichem Kautschuk in zwei wesentlichen Punkten überlegen: thermische Stabilität und Beständigkeit gegen Öle und ähnliche Verbindungen."
 building_mendelejew_synthetic_rubber_factory: "Synthesekautschukfabrik"
 pmg_mendelejew_isoprene: "Isopren"
 pm_mendelejew_isoprene: "Isopren"
 je_mendelejew_synthetic_rubber_reason: "Um 1860 konnte Charles Hanson Greville Williams Isopren aus Naturkautschuk destillieren und die Summenformel C5H8 bestimmen. Damit konnte Gustave Bouchardat 1879 in einem mehrmonatigen Verfahren erstmals synthetischen Kautschuk herstellen, indem er aus Kautschuk gewonnenes Isopren mit Salzsäure erhitzte und so eine gummiartige Substanz erhielt. Um 1900 stellte Ivan Kondakov aus 2,3-Dimethylbutadien den ersten vollsynthetischen Kautschuk her. Das erste Patent zur Herstellung von synthetischem Kautschuk erhielt Fritz Hofmann 1909. Aus 2,3-Dimethylbutadien wurde sogenannter Methylkautschuk polymerisiert."
 je_mendelejew_synthetic_rubber_goal: "#E Chemiefortschritt#! erreicht #ORANGE 75#! Punkte."
 mendelejew.702.t: "Gummi im Labor"
 mendelejew.702.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName] hat eine historische Leistung vollbracht, die in die Chemiegeschichte eingehen wird. Nach jahrelangem Experimentieren und dem Bau eines neuen Labors ist es unserem Chefchemiker gelungen, synthetisches Gummi herzustellen. Dies wird die gesamte Chemieindustrie revolutionieren."
 mendelejew.702.f: "Während der beiden Weltkriege verlor Deutschland den Zugang zu seinen Kautschukquellen und die Suche nach Alternativen wurde gefördert. Während des Ersten Weltkrieges wurden von 1915 bis 1918 bei Bayer in Leverkusen nach dem Fritz-Hofmann-Verfahren rund 2.500 Tonnen Methylkautschuk hergestellt. Der erste kommerziell nutzbare synthetische Kautschuk war Styrol-Butadien-Kautschuk (SBR), der 1926 von den deutschen Chemikern Walter Bock und Eduard Tschunkur im Werk der I.G.-Farbenindustrie Leverkusen entwickelt und am 15. Januar 1927 zum Patent angemeldet wurde."
 mendelejew.702.g: "Keine Latexallergie mehr!"
