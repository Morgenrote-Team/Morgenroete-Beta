 mendelejew_stop_chemistry_project_button_desc: "Stoppen Sie Ihr aktuelles Chemieprojekt. Ihr Chemiefortschritt geht verloren."
 mendelejew_stop_chemist_improving_project_tt: "Sie haben entschieden, das Projekt zu stoppen, indem Sie auf die Schaltfläche #italic Chemieprojekt stoppen#! geklickt haben oder Sie haben keinen [concept_mendelejew_chemist]."
