 je_mendelejew_improve_fertilizer_project_reason: "Ihr [concept_mendelejew_chemist] Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] konzentriert sich auf die Modernisierung der Produktionsmethoden des [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nDas Projekt wird jeden Monat Fortschritte machen. Jedes Mal, wenn der Fortschritt #V 24 Punkte#! erreicht, erhält das Gebäude einen neuen Modifikator. Insgesamt gibt es 3 Modifikatoren zu erhalten.\n$mr_divider_for_je$\nAktuelles Gebäude: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_3_type')]\n\nGesamtzahl der verbleibenden Gebäude (ohne aktuelles): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n\nAktueller monatlicher Fortschritt: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.ScriptValue('mendelejew_general_project_progress_value')|+2]#!#!"
