 je_mendelejew_synthetic_oil: "Forschung zur Kohleverflüssigung"
 je_mendelejew_synthetic_oil_reason: "Kohleverflüssigung, auch Kohlehydrierung, heute überwiegend Coal-to-Liquid (kurz CtL) genannt, ist ein kohlenstoffchemischer Prozess zur Umwandlung von Braun- oder Steinkohle in flüssige Grundchemikalien und synthetische Kraftstoffe wie Benzin, Diesel, Kerosin. Zwischen 1910 und 1925 entwickelte Friedrich Bergius ein Hochdruckverfahren, das später von Matthias Pier modifiziert wurde: das erste großtechnische Verfahren zur Kohleverflüssigung. Dabei handelt es sich um eine Direkthydrierung, die in zwei Phasen durchgeführt wird. 1925 entdeckten Franz Fischer, damals Direktor am Kaiser-Wilhelm-Institut für Kohlenforschung, und sein Kollege Hans Tropsch eine Reaktion, die zu den wichtigsten auf dem Gebiet der heterogenen Katalyse zählt und deren wissenschaftliche, wirtschaftliche und gesellschaftliche Bedeutung bis heute sichtbar ist."
 je_mendelejew_synthetic_oil_goal: "#E Chemiefortschritt#! erreicht #ORANGE 100#! Punkte."
 mendelejew.701.t: "Von Kohle zu Öl"
 mendelejew.701.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName] hat eine historische Leistung vollbracht, die in die Chemiegeschichte eingehen wird. Nach jahrelangem Experimentieren und dem Bau eines neuen Labors ist es unserem Chefchemiker gelungen, synthetischen Kraftstoff herzustellen. Dies wird die gesamte Chemieindustrie revolutionieren."
 mendelejew.701.f: "In Deutschland begann nach dem Ersten Weltkrieg die systematische Forschung nach gleichwertigen Ersatzstoffen zur Benzinherstellung. Einerseits stellten verschiedene Regierungen der Weimarer Republik aufgrund der wirtschaftlichen Lage den Import von Öl ständig infrage und strebten zunehmend eine autarke Versorgung an. Andererseits prognostizierten US-Wissenschaftler in einer weltweit ernst genommenen Studie, dass die globalen Ölreserven in kurzer Zeit erschöpft sein würden, während die Motorisierung unaufhaltsam zunahm. Vor diesem Hintergrund wandten sich Forscher und Unternehmen mit staatlicher Unterstützung mit großer Intensität dem Energieträger zu, über den Deutschland im Überfluss verfügte: der Kohle. Dass sich aus Kohle Benzol gewinnen lässt, war bereits zu Beginn des 19. Jahrhunderts bekannt – lange vor dem Petroleumbenzin. Der deutsche Chemiker Friedrich Bergius meldete 1913 das erste Patent zur Kohlenhydrierung an, wofür er gemeinsam mit Carl Bosch den Nobelpreis erhielt."
 mendelejew.701.g: "Dies bedeutet, dass wir eine autarke Ölversorgung haben."
 mendelejew_chemist_periodic_table_inventor: "Erfinder des Periodensystems"
 mendelejew_chemist_periodic_table_inventordesc: "Als Begründer des Periodensystems besitzt diese Persönlichkeit besondere Kenntnisse im Erforschen von Elementtheorien."
 mendelejew.801.t: "Das Periodensystem der Elemente"
 mendelejew.801.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName] hat es geschafft, die bisher bekannten chemischen Elemente zu ordnen und sogar Vorhersagen darüber zu treffen, welche Elemente noch fehlten. Wie bereits vermutet, wiederholen sich die Eigenschaften der Elemente in einem vorhersagbaren System periodisch – deshalb nannte Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] es \"Periodensystem der Elemente\"."
 mendelejew.801.f: "Das moderne Periodensystem wurde von Lothar Meyer und Dmitri Iwanowitsch Mendelejew entwickelt. Beide veröffentlichten ihre Ergebnisse 1869 und erhielten dafür 1882 gemeinsam die Davy-Medaille der britischen Royal Society. Mendelejew wird häufiger als Begründer des heutigen Periodensystems genannt als Meyer. Einerseits, weil Meyers Periodensystem wenige Monate später veröffentlicht wurde, und andererseits, weil Mendelejew Vorhersagen über die Eigenschaften der noch nicht entdeckten Elemente machte. In Russland heißt das Periodensystem bis heute Tabliza Mendeleyeva (Mendeleyevs Tabelle). Weder Mendelejew noch Meyer kannten die Arbeiten des jeweils anderen zum Periodensystem. Auch die Arbeiten von Béguyer de Chancourtois aus dem Jahr 1862, Newlands aus den Jahren 1863/64 oder Hinrichs aus den Jahren 1866/67 waren Mendelejew nicht bekannt."
 mendelejew.801.g: "Die Chemie ist heute eine richtige Wissenschaft."
 je_mendelejew_periodic_table: "Eine Ordnung der Elemente"
 je_mendelejew_periodic_table_reason: "Bereits zu Beginn des 19. Jahrhunderts suchte man nach Gesetzmäßigkeiten in den Beziehungen der Elemente untereinander. Hindernisse waren unter anderem die Unsicherheiten bei den Atommassen und die Tatsache, dass zahlreiche Elemente noch nicht bekannt waren. Döbereiner stellte als Erster einen Zusammenhang zwischen Atommasse und chemischen Eigenschaften einzelner Elemente her. 1824 veröffentlichte Falckner ein System natürlicher Elementfamilien. Der große Durchbruch blieb jedoch bis heute aus."
