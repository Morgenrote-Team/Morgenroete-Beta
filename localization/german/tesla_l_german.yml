 tesla.3001.t: "Ein Kabel über das Meer"
 tesla.3001.d: "[SCOPE.sCharacter('tesla_telegraph_boss_scope').GetFullName], der Direktor eines führenden Telegrafenunternehmens, hat einen ehrgeizigen Plan vorgestellt: den Bau eines Unterwassertelegrafenkabels, das entfernte Küsten miteinander verbinden und die Nationen durch sofortige Kommunikation einander näher bringen soll. Zur Finanzierung dieses Vorhabens werden nun Anteile an einer neu gegründeten Kabelgesellschaft angeboten. Als Geste des Vertrauens hat das Unternehmen offiziell um eine staatliche Beteiligung gebeten und argumentiert, dass das Projekt sowohl kommerziellen als auch nationalen Interessen dient."
 tesla.3001.f: "Sie beginnt nicht mit Schiffen oder Signallinien, sondern mit Tinte und Vertrauen. Verträge werden unterzeichnet, Prospekte gedruckt und Reden in Salons und an der Börse gehalten. Das Kabel existiert vorerst nur als Versprechen - und als Frage: Wer wird in die Zukunft investieren? Der Leiter des Unternehmens spricht von Einigkeit, Vision und Fortschritt. Andere sprechen von Risiko. Und der Staat muss nun entscheiden, welche Rolle er in diesem Unternehmen der Drähte und des Wassers spielen wird."
 tesla.3001.g: "Der Staat wird sich an diesem Vorhaben beteiligen."
 tesla.3001.h: "Das Unternehmen will das Kabel bauen, also sollte es auch dafür bezahlen."
 tesla.3002.t: "Enthusiastische Investoren"
 tesla.3002.d: "Eine Gruppe ehrgeiziger Industrieller und Finanziers aus [SCOPE.sState('tesla_fund_state').GetName] hat sich zusammengeschlossen, um die Verlegung eines Unterwassertelegrafenkabels zu unterstützen. Ihre Investition gilt als strategischer Schachzug, um die künftige Kommunikationsinfrastruktur zu sichern und frühzeitig Zugang zu den transozeanischen Märkten zu erhalten."
 tesla.3002.f: "Die Investoren sind keine Philanthropen und auch keine Visionäre im romantischen Sinne. Aber sie verstehen den Wert von Informationen - wie schnell sie sich verbreiten, wie sicher sie ankommen und wer ihren Fluss kontrolliert. Indem sie ihr Kapital in der Kabelgesellschaft bündeln, setzen sie auf eine Welt, in der Entfernungen zu einer Sache von Millisekunden werden. Die einen sehen in ihrem Enthusiasmus ein Zeichen des Fortschritts, die anderen ein Zeichen dafür, dass selbst die Kommunikation inzwischen der Spekulation unterliegt. Wie auch immer, das Projekt kommt mit neuem Schwung voran."
 tesla.3002.g: "Eine lobenswerte Initiative!"
 tesla.3003.t: "Ein politisches Kabel?"
 tesla.3003.d: "Mehrere prominente Mitglieder der IG \"[SCOPE.gsInterestGroup('tesla_fund_ig').GetName]\" haben öffentlich ihre Absicht bekundet, in das Unterseekabelprojekt zu investieren. Obwohl sie zuvor nicht mit der Telegraph Company in Verbindung standen, scheint ihre Unterstützung sowohl ideologisch als auch strategisch zu sein - sie wollen sich als Verfechter der Moderne positionieren und gleichzeitig Einfluss auf eine wichtige Kommunikationsverbindung gewinnen."
 tesla.3003.f: "Auf den ersten Blick scheint das Angebot eine willkommene Infusion von Kapital und politischem Wohlwollen zu sein. Doch hinter der Investition steht die Frage des Einflusses. Eine mächtige Oppositionspartei, die sich Anteile an einem wichtigen Teil der Infrastruktur sichert, könnte nicht nur die Marktdynamik, sondern auch das Gleichgewicht der nationalen Politik verändern. Die Kontrolle über die Kommunikation - wer sie baut, wer sie unterhält und wer sie bezahlt - war noch nie eine rein technische Angelegenheit. Einige im Unternehmen warnen, dass die Tür, die jetzt geöffnet wird, später nur schwer wieder geschlossen werden kann."
 tesla.3003.g: "Dies wird das Vertrauen in das Projekt fördern."
 tesla.3003.h: "Dies wird die Arbeit unseres Ingenieurs fördern."
 tesla.3003.i: "Diese Interessengruppe ist viel zu mächtig"
 tesla.3004.t: "Zögernde Investoren"
 tesla.3004.d: "Die Kapitalisten in [SCOPE.sState('tesla_fund_state').GetName] zeigen wenig Begeisterung für das Unterseekabelprojekt. Sie stehen dem Projekt zwar nicht feindselig gegenüber, äußern aber ernsthafte Zweifel an seiner Rentabilität und langfristigen Durchführbarkeit. Einige Mitglieder des Vorstands schlagen vor, eine Werbekampagne zu starten, um die Finanzeliten der Region zu beruhigen - was allerdings die Umleitung von Mitteln aus dem Projekt selbst erfordern würde."
 tesla.3004.f: "Sie sprechen von Risikomargen, Opportunitätskosten und technologischer Unsicherheit. Für sie ist das Kabel kein Wunderwerk, sondern eine Wette - mit ungewissem Ausgang. Ohne sichtbare Beweise für den Erfolg ziehen sie es vor, zu warten oder sich ganz herauszuhalten. Doch der Einfluss fließt mit dem Geld, und ihre Abwesenheit könnte die Glaubwürdigkeit des Projekts schwächen. Eine sorgfältig ausgearbeitete Geschichte könnte sie umstimmen - aber jede Münze, die für Überzeugungsarbeit ausgegeben wird, ist eine weniger für Stahl, Kabel und Schiffe."
 tesla.3004.g: "Sollen sie doch die Gelegenheit verpassen. Wir machen trotzdem weiter."
 tesla.3004.h: "Stellen Sie Mittel aus dem Projekt für eine Werbekampagne zur Verfügung!"
 tesla.3005.t: "Industrielle geben ihre Unterstützung"
 tesla.3005.d: "Dank des persönlichen Einsatzes des Direktors der Telegrafengesellschaft - und seiner langjährigen Beziehungen innerhalb des Kabinetts - hat die einflussreiche Industriellenfraktion beschlossen, die Unterseekabelinitiative zu unterstützen. Ihre politische Position ermöglicht es ihnen, sowohl privates Kapital als auch das Vertrauen der Öffentlichkeit in das Projekt zu lenken und ihm neuen Schwung zu verleihen."
 tesla.3005.f: "Erfolg im Geschäftsleben hängt oft nicht nur von Plänen und Berechnungen ab, sondern auch von Vertrauen. Wenn sich die richtigen Hände schütteln, beginnen selbst die zögerlichsten Investoren, die Bilanzen mit anderen Augen zu betrachten. Mit den Industriellen an Bord bekommt das Kabelprojekt einen mächtigen Verbündeten - einen, der die Mittel hat, es zu finanzieren, zu schützen und zu fördern. Manche mögen die Vermischung von öffentlichen und privaten Interessen kritisieren, aber nur wenige leugnen die Ergebnisse."
 tesla.3005.g: "Vielen Dank, [SCOPE.sCharacter('tesla_telegraph_boss_scope').GetFullName]!"
 tesla.3006.t: "Nervöse Aktionäre"
 tesla.3006.d: "In [SCOPE.sState('tesla_fund_state').GetName] ist eine Gruppe regionaler Aktionäre zunehmend unzufrieden mit dem langsamen Fortschritt und den steigenden Kosten des Unterseekabelprojekts. Aus Angst vor langfristigen Verlusten erwägen sie nun, ihre Anteile zu veräußern. Die Unternehmensführung ist der Ansicht, dass eine begrenzte Übernahme durch den Staat das Vertrauen wiederherstellen könnte - doch ein solcher Schritt könnte einen Präzedenzfall für künftige Erwartungen schaffen."
 tesla.3006.f: "Was als Geflüster in der Vorstandsetage begann, ist nun ein lautstarker Aufruf zum Ausstieg. Die Investoren führen Projektverzögerungen, unvorhergesehene technische Kosten und vage Renditen an. Einige sehen Panik, andere sehen rationale Vorsicht. Wenn sie jetzt aussteigen, könnte das Vertrauen anderswo zusammenbrechen. Aber wenn der Staat als letzter Käufer einspringt, kann er die Märkte beruhigen - um den Preis der Verstrickung."
 tesla.3006.g: "Stabilisiere den Markt - kaufe Aktien durch den Staat."
 tesla.3006.h: "Wenn es ihnen an Visionen mangelt, steht es ihnen frei, auszusteigen."
 tesla.3007.t: "Technischer Durchbruch"
 tesla.3007.d: "Der Chefingenieur des Kabelprojekts hat einen überarbeiteten Plan vorgelegt, der einige der wichtigsten technischen Unklarheiten beseitigt. [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]s Ergebnisse enthalten Verbesserungen bei der Verlegetechnik, der Haltbarkeit der Isolierung und der Signalstabilität. Der Vorstand des Unternehmens hat den neuen Ansatz einstimmig gebilligt und ihn als großen Schritt nach vorn bezeichnet."
 tesla.3007.f: "Die Schaltpläne sind akribisch. Jedes Kabelsegment, jede Relaisstation, jede Spannungseinschränkung wird berücksichtigt. Was einst weit entfernt und spekulativ schien, nimmt nun die Konturen eines praktikablen Systems an. Investoren, die zu zögern begannen, sprechen nun von einer langfristigen Strategie und dem Vermächtnis der Infrastruktur. Wenn die Vision mit der Technik übereinstimmt, wächst das Vertrauen."
 tesla.3007.g: "Wunderbare Neuigkeiten!"
 tesla.3007.h: "Dies wird die Aktionäre beruhigen."
 tesla.3011.t: "Kabelverlegungsschiff legt ab"
 tesla.3011.d: "Das Kabelverlegungsschiff ist aus dem Hafen ausgelaufen und markiert den Übergang von der Planung zur Ausführung. Es ist mit Präzisionsinstrumenten, isolierten Drähten und wichtigen Vorräten beladen und hat auch den Chefingenieur des Projekts an Bord, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], der den technischen Betrieb persönlich überwacht. Jetzt, wo das Schiff unterwegs ist, hängt der Erfolg des Kabelprojekts von der sorgfältigen Arbeit über Tausende von Kilometern auf offener See ab."
 tesla.3011.f: "Es gab keine große Zeremonie - nur das langsame Ziehen der Taue und das Rütteln der Schraube, als das Schiff in den Kanal einfuhr. Für [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] war es ein Moment der Konzentration, keine Feier. Diagramme wurden noch einmal überprüft, Toleranzen kontrolliert, Seekarten auf feuchtem Holz entrollt. Das Gewicht von Stahl und Ehrgeiz ruht nun auf einem Schiff, das weit von der Küste entfernt ist. Was früher Papier und Sprache war, ist jetzt Realität, aufgerollt, beladen und in die Tiefe geworfen."
 tesla.3011.g: "Bon voyage!"
 tesla.3012.t: "Ein blinder Passagier unter Deck"
 tesla.3012.d: "Nach einigen Tagen der Kabelverlegung entdeckt die Besatzung einen jungen Mann, der sich in den unteren Lagerräumen versteckt. Er gibt sich als Student der Naturgeschichte zu erkennen und behauptet, er habe sich an Bord geschmuggelt, um die Tiefseefauna zu studieren - ein akademisches Ziel, das er sich auf dem offiziellen Weg nicht leisten kann. Während einige Offiziere seine Anwesenheit als naive Neugier betrachten, vermuten andere Spionage im Auftrag eines ausländischen Rivalen."
 tesla.3012.f: "Der junge Mann spricht in einer präzisen, unbedrohlichen Sprache - er nennt Arten, zitiert geologische Schichten, verweist nervös auf Bücher und Vorlesungen. Doch an Bord eines Schiffes, auf dem Sicherheit oberstes Gebot ist und Störungen tödlich sein können, schöpft man schnell Verdacht. Es wird geflüstert, dass er vielleicht gar kein Student ist, sondern ein Agent, der die Mission gefährden soll. Der Kapitän steht nun vor einer schwierigen Entscheidung. Ihn ins Meer zu werfen, würde die Angelegenheit schnell beenden. Wenn er an Bord bleibt, riskiert er Verzögerung, Spaltung - und Schlimmeres."
 tesla.3012.g: "Dulden Sie seine Anwesenheit unter strenger Aufsicht."
 tesla.3012.h: "Entsorgen Sie das Problem. Über Bord."
 tesla.3013.t: "Ein zusätzlicher Passagier von den Ausgrabungen"
 tesla.3013.d: "Kurz bevor die Kabelverlegungsexpedition von Suez abfährt, bittet ein junger Assistent eines europäischen Ausgrabungsteams um die Mitreise. Sein archäologischer Auftrag im Nildelta ist beendet, und er bittet nun um Durchreise nach Bombay, wo er seine Studien über vergleichende Tempelarchitektur und antike Handelswege fortsetzen will. Er hat ein Empfehlungsschreiben dabei und bietet bei Bedarf seine Hilfe bei der Katalogisierung oder bei Übersetzungsarbeiten an."
 tesla.3013.f: "Seine Kleidung ist staubig, sein Arabisch fließend, und sein Notizbuch ist gefüllt mit Skizzen von Säulen, Kartuschen und sonnenverbrannten Statuen. Er spricht in einem Atemzug von Thutmose und Ashoka und glaubt, dass die Vergangenheit in Form von Gebäuden und Straßen weiterlebt. Die Offiziere halten ihn für harmlos, wenn auch ein wenig weitschweifig. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] nennt ihn \"einen Echosammler\". Aber irgendjemand billigt die Passage - vielleicht aus Neugier, vielleicht aus Sympathie für diejenigen, die den Sinn durch Ruinen jagen."
 tesla.3013.g: "Lasst ihn passieren. Lass die Geschichte mit uns fahren."
 tesla.3013.h: "Ablehnen. Dieses Schiff ist für Kabel, nicht für Neugierde."
 tesla.3014.t: "Ein Gelehrter des Pazifiks"
 tesla.3014.d: "Kurz vor der Abreise bittet ein junger Ethnologe um Mitfahrt an Bord des Schiffes, das die Kabel verlegen und den Pazifik überqueren soll. Sein erklärtes Ziel ist es, die sozialen Strukturen, die mündlichen Überlieferungen und die religiösen Praktiken der polynesischen Inselgemeinschaften zu studieren, auf die er entlang der Route trifft. Er ist mit Referenzmaterial, sprachlichen Notizen und einem Schreiben einer Universität in Übersee ausgestattet, die seine Feldforschung unterstützt."
 tesla.3014.f: "Er stellt sich mit sanfter Diktion und einem verwitterten Notizbuch voller Genealogien und Gesänge vor. Er stellt nur wenige Fragen an die Schiffsmaschinerie, aber viele Fragen an die Besatzung der Insel. Für die einen ist er ein harmloser Exzentriker, für die anderen ein respektvoller Beobachter dessen, was die Moderne noch nicht weggespült hat. Der Kapitän gewährt ihm einen Liegeplatz unter der Bedingung, dass er ein Passagier bleibt, aber kein Passagier mit Meinungen über die Verlegung von Kabeln."
 tesla.3014.g: "Lassen Sie ihn an Bord. Die Kultur reist anders als der Strom."
 tesla.3014.h: "Dies ist kein Kreuzfahrtschiff!"
 tesla_cable_student_gains_experience_tt: "[ROOT.Var('rapanui_adventurer_var').GetCharacter.GetFullName] gewinnt an Erfahrung, was ihm die Chance gibt, nach Abschluss der Kabelmission ein [concept_academics_academic] zu werden."
 tesla.3021.t: "Kabelbruch!"
 tesla.3021.d: "Das Hauptkabel ist während des Einsatzes gerissen. Der Fehler trat mehrere hundert Seemeilen von der Küste entfernt auf, möglicherweise aufgrund von Belastung, unebenem Gelände oder einem Herstellungsfehler."
 tesla.3021.f: "Es begann mit einem Stottern im Signal - eine Verzögerung, dann Stille. Als die Mannschaft die Winde einholte, kam die Bestätigung in Form von gerissener Isolierung und ausgefranstem Kupfer. Irgendwo auf dem Meeresgrund war die Verbindung unterbrochen worden."
 tesla.3021.g: "Dies ist die Stunde von Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]!"
 tesla.3022.t: "Kabel repariert"
 tesla.3022.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] vollbrachte das Wunder, das Kabel auf hoher See zu reparieren."
 tesla.3022.f: "Dank eines Stücks Schnur, eines zerbrochenen Bleistifts und eines Kaugummis gelang es unserem Ingenieur meisterhaft, das Unterseekabel zu reparieren - allen Unkenrufen zum Trotz."
 tesla.3022.g: "Gott sei Dank gibt es Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]!"
 tesla.3023.t: "Kabel nicht repariert..."
 tesla.3023.d: "Trotz aller Bemühungen gelang es Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] nicht, das Unterseekabel zu retten."
 tesla.3023.f: "Die Ingenieure an Bord debattieren nun über Belastungstoleranzen und Verbindungspunkte. Die Investoren zu Hause diskutieren über die Haftung. Und das Unternehmen debattiert darüber, wie viel Wahrheit die Öffentlichkeit erfahren soll."
 tesla.3023.g: "Holen Sie das beschädigte Segment zurück und reparieren Sie es, egal was es kostet."
 tesla.3023.h: "Umgehen Sie den Schaden und fahren Sie fort - nehmen Sie einen gewissen Signalverlust in Kauf."
 tesla.3024.t: "Sturmfront im Anmarsch"
 tesla.3024.d: "Der Luftdruck ist rapide gesunken, und am Horizont ziehen dunkle Wolken auf. Die Besatzung berichtet, dass sich ein Sturmsystem auf die aktuelle Position des Schiffes zubewegt. Die Verlegung des Kabels befindet sich mitten in der Phase, ein Abbruch würde den Fortschritt verzögern, doch eine Fortsetzung könnte das Kabel beschädigen oder verlieren."
 tesla.3024.f: "Der Wind nimmt in ungleichmäßigen Böen zu, und der Horizont verschwindet in Schiefer. Der Regen hat noch nicht eingesetzt, aber die See bewegt sich bereits unter den Füßen. Der Kapitän konsultiert die Karten, der Ingenieur prüft die Spannungswerte. Die Vertreter des Vorstands debattieren über die Optik einer Verzögerung gegenüber dem Risiko des Untergangs. Stürme verhandeln, anders als Märkte, nicht. Es muss eine Entscheidung getroffen werden - jetzt."
 tesla.3024.g: "Gehen Sie durch den Sturm. Wir können uns keinen Aufschub leisten."
 tesla.3024.h: "Stellen Sie den Betrieb ein und kehren Sie in sicherere Gewässer zurück."
 tesla.3025.t: "Unerwarteter Zustand des Meeresbodens"
 tesla.3025.d: "Die Besatzung berichtet, dass die Kabelverlegungsroute in einen unbekannten Tiefseegraben führt, wodurch sich die Belastung des Kabels erheblich erhöht. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] ist unsicher, ob das Kabel der zusätzlichen Spannung standhalten kann. Eine Korrektur der Route ist möglich, würde aber einen kostspieligen Umweg bedeuten."
 tesla.3025.f: "Der Meeresboden, der in der Theorie kartiert war, hat in der Praxis seine Unberechenbarkeit gezeigt. Die bathymetrischen Karten sind entweder veraltet oder falsch, und was auf dem Papier stabil aussah, zeigt nun Anzeichen von Risiken. Der Graben sinkt schnell ab und zieht das Kabel über gefährliche Konturen. Mit jeder Seemeile wägen die Ingenieure das Risiko gegen die Kosten ab. Wenn man jetzt umdreht, kann man vielleicht das Kabel retten, aber nicht das Budget."
 tesla.3025.g: "Gehen Sie wie geplant vor. Akzeptieren Sie das Risiko."
 tesla.3025.h: "Passen Sie die Route an, um den Graben zu umgehen."
 tesla.3026.t: "Kabel-Unfall"
 tesla.3026.d: "Ein Arbeiter kam bei der Handhabung einer defekten Kabeltrommel ums Leben. Der Vorfall hat die Besatzung erschüttert und Zweifel an den Sicherheitsprotokollen geweckt. Obwohl es sich um einen Unfall handelte, wird in der heimischen Presse bereits über den Tod berichtet."
 tesla.3026.f: "Die Trommel drehte sich ohne Vorwarnung, und innerhalb von Sekunden war er weg - zerquetscht unter einer Schlinge aus Eisen und Schwung. Es blieb keine Zeit zu reagieren. Seine Abwesenheit hinterlässt mehr als nur Stille; sie hinterlässt Angst. Das Meer verzeiht keine Fehler. Und die Öffentlichkeit vielleicht auch nicht."
 tesla.3026.g: "Bekräftigen Sie öffentlich Ihr Engagement für die Sicherheit. Neue Protokolle ankündigen."
 tesla.3026.h: "Konzentrieren Sie sich auf die Fortsetzung der Mission."
 tesla.3027.t: "Krankheit unter der Besatzung"
 tesla.3027.d: "Mehrere Seeleute sind erkrankt und zeigen Symptome von Fieber und Schwäche. Die medizinische Versorgung ist begrenzt, und die Ursache bleibt unklar. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] ist unter den Betroffenen."
 tesla.3027.f: "Die Arbeit verlangsamt sich. Die Gespräche werden leiser. Das Husten eines Technikers hallt lauter als das Summen der Winde. Ohne Antworten wird die Angst zu ihrer eigenen Ansteckung. Der Ozean mag die Nationen trennen, aber er bietet keine Quarantäne."
 tesla.3027.g: "Setzen Sie den Betrieb vorübergehend aus, bis sich die Kranken erholt haben."
 tesla.3028.t: "Verdächtige Aktivitäten unter Deck"
 tesla.3028.d: "[ROOT.Var('rapanui_adventurer_var').GetCharacter.GetFullName] wurde spät in der Nacht dabei erwischt, wie er sich an empfindlichen Instrumenten zu schaffen machte. Er behauptet, aus Neugierde gehandelt zu haben, und streitet jegliches Fehlverhalten ab, aber die Beamten sind nicht davon überzeugt. Die Möglichkeit einer Sabotage kann nicht ausgeschlossen werden."
 tesla.3028.f: "Auf frischer Tat ertappt, gab er nur unbeholfene Erklärungen ab: \"Ich überprüfe nur die Messwerte\", \"um sicherzustellen, dass alles funktioniert\". Niemand kann sich daran erinnern, ihm den Zutritt zum Sperrbereich erlaubt zu haben. Jetzt flüstern die Ingenieure von Sabotage. Das Kabel mag über Ozeane verlaufen, aber für einen Verrat braucht man nur ein paar Meter Draht."
 tesla.3028.g: "Diesmal entkommst du uns nicht!"
 tesla.3028.h: "[ROOT.Var('rapanui_adventurer_var').GetCharacter.GetSheHe|U] ist unschuldig."
 tesla.3029.t: "Die falsche Person"
 tesla.3029.d: "Jetzt sind neue Beweise aufgetaucht, die darauf hindeuten, dass das entlassene Besatzungsmitglied nicht die Absicht hatte, die Kabelverlegungsmission zu sabotieren. Ein verlegter Wartungsauftrag, der unter einem Stapel nicht abgelegter Unterlagen gefunden wurde, bestätigt, dass er tatsächlich mit der Inspektion der fraglichen Ausrüstung beauftragt war. Der Vorfall, der auf See in aller Stille abgewickelt wurde, ist inzwischen durch kritische Presseberichte an die Öffentlichkeit gedrungen."
 tesla.3029.f: "In den Zeitungen steht nun, was die Crew unter vier Augen gemurmelt hat: dass ein Mann aufgrund falscher Annahmen und fehlender Unterlagen ohne Gerichtsverfahren entlassen wurde. Obwohl die Beweise ihn freisprechen, ist der Schaden groß - nicht nur für ihn, sondern auch für den Ruf des Projekts. Die Investoren fragen sich, ob Panik die Expedition mehr beherrscht als Disziplin."
 tesla.3029.g: "Oh... ähm... Ich denke, es geht ihm gut?"
 tesla.3030.t: "Sanftes Vorankommen in schwierigem Fahrwasser"
 tesla.3030.d: "Ein besonders komplexer Abschnitt der Kabeltrasse, von dem man früher annahm, dass er besondere Anpassungen erforderte, wurde ohne Verzögerung oder Komplikationen erfolgreich verlegt. Die Effizienz und die Vorbereitung des Teams haben die Erwartungen übertroffen."
 tesla.3030.f: "Es wurde erwartet, dass der Meeresboden in diesem Abschnitt ein unregelmäßiges Terrain darstellen würde, aber eine sorgfältige Planung und ruhiges Wetter ermöglichten einen stetigen Fortschritt. Die Mannschaft arbeitete fast geräuschlos, das Kabel lief wie ein Faden von einer Spule. Die Ingenieure tauschten ein kurzes, zufriedenes Nicken aus, und ausnahmsweise waren keine Korrekturen erforderlich. Es ist, wie ein Offizier trocken bemerkte, \"die Art von ereignislosem Erfolg, für den man immer betet, den man aber selten bekommt\". Die Zuversicht an Bord steigt mit dem Barometer."
 tesla.3030.g: "Großartig!"
 tesla.3031.t: "Wale und Delfine"
 tesla.3031.d: "Ein einzigartiges Naturschauspiel bietet sich, wenn Wale und Delfine die Route kreuzen. [SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] verspricht sich von der Beobachtung neue biologische Erkenntnisse, doch die Besatzung zeigt wenig Interesse an dieser Art von akademischer Neugier."
 tesla.3031.f: "Ein Streit an Bord bricht aus, als der Student auch noch auf die verabscheuungswürdigen Jagdmethoden hinweist, mit denen diese bezaubernden Meeresbewohner abgeschlachtet werden. Für die meisten Seeleute, für die Wale nur als Öllager dienen, ist der Vortrag zusätzlich entnervend."
 tesla.3031.g: "Studieren Sie diese wunderbaren Lebewesen."
 tesla.3031.h: "Wir haben keine Zeit für so etwas."
 tesla.3032.t: "So viele Fische!"
 tesla.3032.d: "[SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] kann [SCOPE.sCharacter('rapanui_adventurer_var').GetHerHis] Glück kaum fassen, als [SCOPE.sCharacter('rapanui_adventurer_var').GetSheHe] im Nordatlantik Fischschwärme von bisher unbekannten Arten entdeckt. Der Student bittet den Kapitän, die Arbeit zu unterbrechen und einige Exemplare zu fangen. Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] weist darauf hin, dass es sich um ein Kabelverlegungsschiff und nicht um eine Forschungseinrichtung handelt."
 tesla.3032.f: "Glauben Sie mir also! Wir verpassen die wissenschaftliche Forschung! Diese zarten kleinen Fische sind eine völlig unentdeckte Art. Hast du das nicht gesehen - was meinst du damit, dass ich jetzt gleich mit ihnen im Wasser schwimmen kann?!"
 tesla.3032.g: "Fangt ein paar Fische."
 tesla.3033.t: "Experimente im Atlantischen Ozean"
 tesla.3033.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] nutzte die Zeit auf See, um einige seiner Instrumente einzurichten und wissenschaftliche Studien an Bord des Kabelverlegungsschiffs durchzuführen. Er hat sich noch nicht für einen Schwerpunkt entschieden."
 tesla.3033.atlantic: "\"Es gibt einen Fluss im Ozean. In den schwersten Dürren versagt er nie, und in den mächtigsten Überschwemmungen läuft er nie über. Seine Ufer und sein Grund sind aus kaltem Wasser, während sein Strom aus warmem besteht. Der Golf von Mexiko ist seine Quelle, und seine Mündung liegt im Eismeer. Er ist der Golfstrom.\" - Matthew Fontaine Maury"
 tesla.3033.indian: "\"Obwohl der Indische Ozean reich an seltenen Edelsteinen ist, gibt es weder einen klareren Himmel noch eine ruhigere See. Wenn es ein Ufer gibt, das die Wut der ungläubigen Wogen nicht fürchtet, dann ist es eine arme und enge Bucht, die den Winden unbekannt ist.\" - Pietro Metastasio"
 tesla.3033.pacific: "\"Der Pazifik ist mein Heimatmeer; ich kannte ihn zuerst, wuchs an seiner Küste auf, sammelte Meerestiere an der Küste. Ich kenne seine Stimmungen, seine Farben, sein Wesen.\" - John Steinbeck"
 tesla.3033.g: "Schwerpunkt auf magnetischen Experimenten."
 tesla.3033.h: "Schwerpunkt auf ozeanografischen Experimenten."
 tesla.3034.t: "Das Geheimnis der Tiefe"
 tesla.3034.d: "Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] macht bei der Durchsicht der Vermessungsdaten eine seltsame Entdeckung. In einem bestimmten Teil des Atlantiks hebt sich der Meeresboden ungewöhnlich stark an. Bislang hat [SCOPE.sCharacter('tesla_engineer_var').GetSheHe] nur eine Theorie zu diesem Phänomen."
 tesla.3034.f: "Eigentlich war man immer der Meinung, dass die Meere in der Mitte besonders tief sein müssten. Doch die heutige Entdeckung stellt diese Vorstellung auf den Kopf. Anstelle eines Tiefenrekords nimmt der Abstand zwischen Boden und Oberfläche ab. Das ist eine gute Nachricht für das Unternehmen, denn es wird weniger Kabellänge benötigt als zunächst angenommen. Aber für Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] ist es klar, dass dies bedeutet, dass alle bisherigen Ansichten über die Tiefsee korrigiert werden müssen. Offenbar gibt es Hügel und Täler auf dem Meeresboden. Und dieser Hügel ist etwas mehr als nur ein Hügel."
 tesla.3034.g: "Gibt es Tiefseeberge?"
 tesla.3035.t: "Der Awwam-Tempel"
 tesla.3035.d: "[SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] hat sich mit einer Bitte an den Kapitän gewandt: einen kurzen Abstecher vom Golf von Aden ins Landesinnere, um die Ruinen des Awwam-Tempels bei Ma'rib zu besuchen. Die Stätte, die Gelehrten als Zentrum der antiken sabäischen Zivilisation bekannt ist, hat sich einer systematischen Untersuchung lange entzogen. Er argumentiert, dass sich die Gelegenheit, sie aus erster Hand zu untersuchen - obwohl sie so nahe liegt -, vielleicht nicht so bald wieder bietet. Der Umweg würde jedoch den Betrieb des Kabels verzögern."
 tesla.3035.f: "[SCOPE.sCharacter('rapanui_adventurer_var').GetLastName] spricht von Mondkulten, Räucherpfaden und ungelösten epigraphischen Rätseln. Seine Finger zeichnen imaginäre Inschriften in die Luft, während er zyklopische Mauern und halb vergrabene Säulen beschreibt, die sich im Sand verlieren. Für ihn ist der Awwam-Tempel ein Rätsel, das unter dem Staub wartet. Für Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] ist es eine Verzögerung, die auf sich warten lässt."
 tesla.3035.g: "Gewähren Sie den Umweg."
 tesla.3035.h: "Das Kabel hat seinen eigenen Fahrplan."
 tesla.3036.t: "Sokotra"
 tesla.3036.d: "Während das Schiff vor Sokotra ankert, um Nachschub zu holen, bittet [SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] diskret um Erlaubnis, von Bord gehen zu dürfen. Er hat von einer Ladung Antiquitäten erfahren - kleine Statuen und Grabbeigaben, die angeblich ägyptischen Ursprungs sind - die von Schmugglern über die Insel geschmuggelt werden und für die Privatsammlung eines östlichen Fürstenhofs bestimmt sind. Er argumentiert, dass die Objekte, wenn sie jetzt erworben würden, bewahrt, katalogisiert und schließlich in die Hände der richtigen Wissenschaftler zurückgegeben werden könnten."
 tesla.3036.f: "[SCOPE.sCharacter('rapanui_adventurer_var').GetLastName] leugnet nicht den informellen Charakter der Transaktion - nur ihre Dringlichkeit. Besser eine kommentierte Kiste in einem Archiv als ein stummes Idol in einem Palastregal\", sagt er. Die Besatzung ist unruhig, der Kapitän warnt vor diplomatischen Empfindlichkeiten. Aber der Assistent spricht von einem Erbe, von Fragmenten, die dem Vergessen entrissen wurden, von Wissen, das sonst verloren gegangen wäre."
 tesla.3036.g: "Erlauben Sie ihm fortzufahren - leise."
 tesla.3036.h: "Das ist nicht unser Auftrag."
 tesla.3040.t: "Riesiger Schatten"
 tesla.3040.d: "Besatzungsmitglieder haben berichtet, dass sie beim routinemäßigen Auslegen der Kabel einen riesigen, sich langsam bewegenden Schatten unter dem Schiff beobachtet haben. Das Objekt schien weder der Strömung noch dem bekannten Verhalten von Wildtieren zu entsprechen und verschwand spurlos. Obwohl es von den Offizieren als wahrscheinlicher Wal oder optische Täuschung abgetan wurde, hat der Bericht sowohl an Bord des Schiffes als auch in der Presse zu Gerüchten geführt."
 tesla.3040.f: "Es bewegte sich leise und stetig, weit unter der Oberfläche - zu regelmäßig, um eine Strömung zu sein, zu groß für einen der Wissenschaft bekannten Wal. Manche sagen, er habe metallisch geglänzt. Andere behaupten, sie hätten Lichter gesehen. Das Logbuch vermerkt lediglich eine \"dichte Meeresmasse unbestimmter Herkunft\". Aber das Geflüster hat sich bereits verbreitet. Was bewegt sich noch unter den von uns verlegten Kabeln? Was könnte bereits beobachtet werden?"
 tesla.3040.g: "Berichten Sie der Presse, dass es sich um eine seltene Meeresbegegnung handelt."
 tesla.3041.t: "Rückkehr der Unterwasserkabelverlegungsflotte"
 tesla.3041.d: "Die Kabelverlegungsflotte ist in den Hafen zurückgekehrt. Nach wochenlanger Fahrt auf See ist die gesamte Länge der Unterwasserleitung entlang der geplanten Route verlegt worden. Die abschließenden Tests müssen jedoch noch beginnen. Das Kabel muss nun an Landstationen angeschlossen und einer Signalverifizierung unterzogen werden. Erst dann wird sich zeigen, ob das Projekt wirklich gelungen ist."
 tesla.3041.f: "An den Winden haften Rostflecken, und der Rumpf ist mit Salz beschmiert. Die Mannschaft kehrt erschöpft zurück, der Ingenieur schweigt. Das Kabel liegt da, wo es hingehört - vergraben auf dem Meeresgrund, gespannt über Felsvorsprünge, verbunden und versiegelt. Doch noch immer ist kein Wort von einem Kontinent zum anderen gedrungen. Die Schiffe mögen zu Hause sein, aber die Gewissheit ist nicht mit ihnen angekommen. Alle Augen richten sich nun auf den letzten Test."
 tesla.3041.g: "Hurra!"
 tesla.3042.t: "Ein Experte des Ozeans"
 tesla.3042.d: "Trotz der Unwägbarkeiten, die mit der Unterwasserkabelmission verbunden waren, hat ein Mann die Reise zu einem unwahrscheinlichen wissenschaftlichen Triumph gemacht. Der junge blinde Passagier, der zunächst verdächtigt und beinahe ausgewiesen wurde, dokumentierte während der Expedition die Lebensformen der Tiefsee und sammelte Hunderte von Exemplaren und detaillierte Skizzen. Nach seiner Rückkehr erregten seine Erkenntnisse die Aufmerksamkeit der naturwissenschaftlichen Gesellschaften auf dem ganzen Kontinent."
 tesla.3042.f: "Mit einer Öllampe und rationiertem Papier katalogisierte der Student biolumineszierendes Plankton, artikulierte Fischgräten und Krustentiere, die in der Küstentaxonomie unbekannt waren. Was als Verzweiflungstat begann, hat ihm akademischen Ruhm eingebracht. Die Presse nennt ihn den \"Naturforscher des Abgrunds\". Er nennt es einfach eine Sache der Beobachtung."
 tesla.3042.g: "Student? Nennen Sie ihn Doktor!"
 tesla.3042.h: "Wir brauchen diese wissenschaftlichen Dokumente."
 tesla.3043.t: "Eine Chronik der Ruinen und Routen"
 tesla.3043.d: "Während der Kabelexpedition von Suez nach Bombay machte der junge archäologische Assistent ausführliche Notizen zu Architektur, Inschriften und kulturellen Überresten, die er entlang der Route beobachtet oder diskutiert hatte. Ausgehend von seinen früheren Feldforschungen und der geografischen Vielfalt der Reise hat er einen umfassenden Bericht verfasst, der nun in akademischen Kreisen große Beachtung findet."
 tesla.3043.f: "Er beobachtete mehr als nur Küstenlinien. Sein Notizbuch folgte den Konturen verlassener Tempel, Wegstationen und vergessener Hafenstädte - Fragmente von Zivilisationen, die einst durch Handel und Glauben verbunden waren. Durch seine Aufzeichnungen kommen diese Fragmente nun wieder zu Wort. Die Veröffentlichung, die für ihre Klarheit und ihren Sinn für Kontinuität gelobt wird, gilt als ein Werk, das die Kluft zwischen Wissenschaft und Seefahrt überbrückt. Das Kabel mag die Gegenwart binden, aber seine Chronik stellt die Vergangenheit wieder her."
 tesla.3043.h: "Wir brauchen diese archäologischen Artefakte."
 tesla.3044.t: "Ein Lehrstuhl für Ethnologie"
 tesla.3044.d: "Im Anschluss an die Kabelexpedition hat der Student, der an Bord war, eine Reihe von Arbeiten veröffentlicht, in denen er die Verwandtschaftssysteme, die mündlichen Überlieferungen und die Navigationskosmologien der polynesischen Völker, denen er bei den Anlandungen und Zwischenstopps begegnete, detailliert beschreibt. Seine Arbeit wurde von Gelehrten in mehreren Ländern gelobt. Eine Universität versucht nun, ihn auf einen neuen Lehrstuhl für vergleichende Ethnologie zu berufen."
 tesla.3044.f: "Seine Schriften vermeiden Romantik, tragen aber den Rhythmus von Gesängen und die Logik der Abstammung in sich. Er beschreibt Götter, die wie Wind geformt sind, und Stammbäume, die wie Wellen geformt sind. In akademischen Salons kursiert sein Name heute neben dem Begriff \"ozeanische Epistemologie\". Für diejenigen, die sich an ihn an Bord eines Schiffes erinnern, ist es seltsam, dass eine solche stille Notiz ein ganzes Feld prägen könnte. Er nennt es Zuhören."
 tesla.3044.h: "Wir brauchen diese polynesischen Artefakte."
 tesla.3051.t: "Das erste Wort, das den Atlantik überquert"
 tesla.3051.d: "Gesendet über ein transozeanisches Unterseekabel, wurde die Nachricht von [SCOPE.sCountry('tesla_country_1').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('tesla_leader_1').GetFullName] von [SCOPE.sCountry('tesla_country_1').GetAltName('DAT')] 16 Stunden später an [SCOPE.sCountry('tesla_country_2').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('tesla_leader_2').GetFullName] von [SCOPE.sCountry('tesla_country_2').GetAltName('DAT')] überliefert."
 tesla.3051.f: "Es ist ein Triumph, der glorreicher ist, weil er der Menschheit weitaus nützlicher ist, als es je ein Eroberer auf dem Schlachtfeld war. Möge sich der Atlantische Telegraph unter dem Segen des Himmels als ein Band des ewigen Friedens und der Freundschaft zwischen den verwandten Nationen erweisen und als ein Instrument, das von der göttlichen Vorsehung dazu bestimmt ist, Religion, Zivilisation, Freiheit und Recht in der ganzen Welt zu verbreiten. -James Buchanan"
 tesla.3051.g: ".... . .-.. .-.. --- -.-.--"
 tesla.3052.t: "Schweigen"
 tesla.3052.d: "Das Kabel wurde mit der Landstation verbunden. Erste Übertragungsversuche wurden unternommen, ohne dass eine Reaktion erfolgte. Von der Gegenseite wurde noch kein Signal bestätigt. Die Techniker testen und rekalibrieren die Ausrüstung weiter, aber mit jeder Stunde schwindet das Vertrauen. Die Mission scheint gescheitert zu sein."
 tesla.3052.f: "Die Leitung ist ruhig. Kein Knistern, kein Klicken, kein Flackern der Strömung - nur eine Stille, die zu perfekt ist, um natürlich zu sein. Einige geben den Instrumenten die Schuld, andere den Relaisstellen, wieder andere dem Meer selbst. Die Ingenieure arbeiten in angespannter Stille, die Investoren flüstern von Verlust, und die Presse beginnt zu spekulieren. Vielleicht ist das Signal einfach nur verzögert. Vielleicht ist etwas schief gelaufen. Oder vielleicht war es schon immer zu viel verlangt - Botschaften unter dem Meer."
 tesla.3052.g: "Ein ganzes Vermögen wurde in der See versenkt..."
 tesla.3052.tt: "Das Unternehmen wird versuchen, eine neue Finanzierungsrunde zu starten, wenn das Vertrauen der Aktionäre nicht auf Null sinkt."
 tesla.3053.t: "Zusammenbruch des Vertrauens"
 tesla.3053.d: "Die Finanzmärkte sind von Panik ergriffen. Die Stimmung der Anleger ist zusammengebrochen. Die Aktien des Telegrafenunternehmens stürzten ab und lösten einen allgemeinen Vertrauensverlust in industrielle Innovationen und die Rolle der Regierung bei spekulativen Unternehmungen aus. Die daraus resultierende Krise breitet sich auf Banken, Unternehmen und Haushalte aus."
 tesla.3053.f: "Es begann mit der Ungewissheit, dann kam das Schweigen und jetzt die Abrechnung. Aktien, die einst als Symbole für die Zukunft gehandelt wurden, sind heute weniger wert als Papier. Büros werden geschlossen, Banken stoppen Abhebungen, und der Name der Kabelgesellschaft wird nur noch mit Bitterkeit ausgesprochen. Tausende von Kleinanlegern sehen ihre Ersparnisse innerhalb weniger Stunden verschwinden. Was Kontinente vereinen sollte, hat stattdessen die Wirtschaft einer Nation zerrüttet. Das Kabel liegt leise unter dem Meer, über ihm ist der Lärm ohrenbetäubend."
 tesla.3053.g: "Sicherlich werden sich die Märkte selbst korrigieren. Das tun sie immer...?"
 tesla.3054.t: "Geschlagen"
 tesla.3054.d: "Uns hat die Nachricht erreicht, dass eine ausländische Macht ihre eigene transozeanische Kabelverbindung erfolgreich abgeschlossen und aktiviert hat. Telegrafische Signale werden jetzt über das Meer übertragen - nur nicht über unsere Leitungen. Die Nachricht hat die Märkte erschüttert und schwierige Fragen über das Tempo und den Zweck unserer eigenen Bemühungen aufgeworfen."
 tesla.3054.f: "Die Schlagzeilen sind eindeutig und brutal: Eine Botschaft hat den Ozean überquert, aber nicht zu unseren Bedingungen. Was einst ein Wettlauf war, hat jetzt einen Gewinner - und das sind nicht wir. Investoren halten inne, Beamte lenken ab, und Rivalen nehmen stillschweigend zur Kenntnis. Das Auslandskabel transportiert mehr als nur Signale; es transportiert Einfluss, Glaubwürdigkeit und den Vorteil des Vorreiters. Unsere eigenen Schiffe treiben noch immer auf dem Meer, unsere Ingenieure rechnen noch immer. In der Zwischenzeit bewegt sich die Welt weiter - vernetzt, aber nicht durch uns."
 tesla.3054.g: "Das...ist ein Problem."
 tesla.3061.t: "Der Eastern Telegraph wurde fertiggestellt"
 tesla.3061.d: "Ein direktes Unterwassertelegrafenkabel verbindet nun Ägypten über Suez mit Indien. Nach jahrelanger Vorbereitung, Vermessung und Verlegung durch flache Meere und umstrittene Gewässer ist die Leitung nun fertig. Die Telegrafenbetreiber bestätigen, dass die Signale klar und ohne Verzögerung empfangen werden."
 tesla.3061.f: "\"Das Kabel nach Indien ist fertig.\" - Anonym"
 tesla.3061.g: "-... --- -- -... .- -.-- ..--.."
 tesla.3071.t: "Die erste Botschaft über den Pazifik"
 tesla.3071.d: "Zum ersten Mal in der Geschichte hat eine Nachricht den riesigen Pazifischen Ozean durch eine ununterbrochene Kette von Unterwasserkabeln überquert - von Australien nach Kanada. Das Kabel überspannt Tausende von Seemeilen und überträgt nun Worte in Sekundenschnelle über die Hemisphären hinweg. Die erste offizielle Übertragung war kurz, formell und historisch."
 tesla.3071.f: "\"Das Pazifikkabel ist erfolgreich verlegt worden. Das Empire ist nun durch eine Kommunikationskette verbunden, die dem Empire selbst gehört und von ihm kontrolliert wird. Diese Errungenschaft wird die Bande der Einheit und Zusammenarbeit in allen Teilen der Herrschaftsgebiete Seiner Majestät stärken.\" - Edmund Barton"
 tesla.3071.g: ".... --- --- .-. .- -.-- -.-.--"
