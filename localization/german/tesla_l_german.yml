 je_tesla_transatlantic_cable: "Das Transatlantikkabel"
 je_tesla_transatlantic_cable_reason: "Der Bau eines Unterseetelegrafenkabels besteht aus drei Phasen. In der ersten Phase werden weitere Investoren gesucht und die Planung beginnt. In der zweiten Phase wird das Kabel verlegt. In der dritten Phase werden die letzten Vorbereitungen für die Inbetriebnahme getroffen.\n\nZwei Messgrößen sind für den Erfolg des Projekts entscheidend: #O Kabelfortschritt#! und #O Vertrauen der Aktionäre#!. Der Fortschritt bestimmt, wie lange der Bau dauern wird, und die Fähigkeiten des [Concept('concept_tesla_engineer','#b #ORANGE Ingenieurs#!#!')] sind hier entscheidend. Das Vertrauen hängt stark von der [concept_executive] des Unternehmens ab. Fällt das Vertrauen auf Null, gilt das Projekt als so aussichtslos, dass es zum Scheitern verurteilt ist. Es ist wichtig, ein Absinken des Vertrauens auf Null um jeden Preis zu vermeiden.\n\nDie Verlegung des Kabels unter Wasser führt nicht unbedingt zum Erfolg. Historisch gesehen war das erste transatlantische Kabel ein Misserfolg. Das Unternehmen kann sich jedoch von einem solchen Rückschlag erholen, wenn das Vertrauen der Aktionäre stark bleibt. In diesem Fall wird ein neues Kabel verlegt. Sollte ein erster Versuch scheitern, so ist die Chance auf einen erfolgreichen zweiten Versuch garantiert."
 je_tesla_suez_india_cable: "Das Suez-Indien-Kabel"
