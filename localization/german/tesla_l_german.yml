l_german:
 tesla_prototype_mechanical_computer_modifier: "Mechanischer Computer-Prototyp"
 tesla.223.t: "Ein erster Prototyp"
 tesla.223.d: "Bei [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis]em Vorhaben, einen mechanischen Computer zu bauen, konnte Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] einen ersten Prototyp fertigstellen, der einfache Berechnungen durchführen kann. Obwohl dieses Gerät nicht so leistungsstark ist wie ein echter Computer, könnte es unseren Wissenschaftlern helfen."
 tesla.223.f: "Es kann noch nicht alle Berechnungen durchführen, aber zumindest einige. Addition, Subtraktion, Multiplikation und Division sollten kein Problem sein. Aber seien Sie sich bewusst, dass einer meiner Assistenten fast seinen Finger verloren hätte, als die Maschine lief."
 tesla.223.g: "Ich hoffe, dass [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] mehr als nur ein Prototyp wird ..."
 tesla.224.t: "Feature-Creep"
 tesla.224.d: "Es scheint, als ob Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] voller Ideen steckt. Es vergeht kein Tag, ohne dass die Pläne des Mechanischen Computers angepasst werden. Die einzige Frage ist, ob das Projekt jemals abgeschlossen wird."
 tesla.224.f: "\"Aber stellen Sie sich vor, es könnte auch Musik abspielen! Wäre das nicht großartig?\""
 tesla.224.g: "Würden Sie diesen Computer bitte einfach bauen?"
 tesla.224.h: "Mit Kürzung der Mittel drohen"
 tesla.225.t: "Feuer beschädigt mechanischen Computer"
 tesla.225.d: "Ein Großbrand hat Teile des mechanischen Computers von Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] beschädigt und einige Pläne dafür zerstört. Wir wissen noch nicht, um wie viel das Projekt dadurch zurückgeworfen wird."
 tesla.225.f: "Das Feuer brach im Druckermodul des Computers aus. Niemand weiß genau, was es verursacht hat, aber es scheint, dass der Drucker große Mengen Papier produziert hat."
 tesla.225.g: "Wird dieser Computer jemals gebaut werden?"
 tesla.225.h: "Senden Sie ihnen zusätzliche Mittel."
