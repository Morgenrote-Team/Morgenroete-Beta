 tesla_state_trait_irrigation: "Bewässerungssystem"
 je_tesla_irrigation_project: "Bewässerungssystem"
 tesla_states_with_irrigation_tt: "Alle [GetPlayer.GetAdjective]en Staaten haben die $tesla_state_trait_irrigation$-Staatseigenschaft (derzeit [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 tesla_irrigation_project_finished_engineer_loc: "\n #indent_newline:3 • Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] arbeitete an den neuen #b Bewässerungssystemen#! [GetPlayer.GetAltName('GEN')] und konnte dieses erweitern, was unseren Agrarsektor massiv verbesserte."
 gaudi.1111.t: "Das Bewässerungssystem [GetPlayer.GetAltName('VON')]"
 gaudi.1111.d: "Unser [concept_tesla_civil_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] hat das Projekt zum Bau eines modernen Bewässerungssystems [GetPlayer.GetAltNameNoFormatting('IN')] endlich abgeschlossen. Jetzt, da wir Flüsse gezähmt und Wasser auf die Felder gebracht haben, wird unsere Landwirtschaft sicherlich wachsen!"
 gaudi.1111.f: "\"Die wilden Flüsse sind jetzt gezähmt. Die Magie ist verschwunden. Jetzt sind es nur noch gerade Wasserwege. Sogar der Biber ist verschwunden …\""
 gaudi.1111.g: "Ich hoffe, das hat keine unvorhergesehenen Folgen..."
