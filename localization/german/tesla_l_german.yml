l_german:
 first_line_filler: "" #Is necessary for the overview in VS Code because, everything turns red if the first command has a 1 after its colon

 tesla_prototype_mechanical_computer_modifier: "Mechanischer Computer-Prototyp" #NT!
 tesla.223.t: "Ein erster Prototyp" #NT!
 tesla.223.d: "Bei [ROOT.Var('gaudi_engineer_var').GetCharacter.GetHerHis]s Vorhaben, einen mechanischen Computer zu bauen, konnte Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] einen ersten Prototyp fertigstellen, der einfache Berechnungen durchführen kann. Obwohl dieses Gerät nicht so leistungsstark ist wie ein echter Computer, könnte es unseren Wissenschaftlern helfen." #NT!
 tesla.223.f: "Es kann noch nicht alle Berechnungen durchführen, aber zumindest einige. Addition, Subtraktion, Multiplikation und Division sollten kein Problem sein. Aber seien Sie sich bewusst, dass einer meiner Assistenten fast seinen Finger verloren hätte, als die Maschine lief." #NT!
 tesla.223.g: "Ich hoffe, dass [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] mehr als nur ein Prototyp wird ..." #NT!
 tesla.224.t: "Feature-Creep" #NT!
 tesla.224.d: "Es scheint, als ob Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] voller Ideen steckt. Es vergeht kein Tag, ohne dass die Pläne des Mechanischen Computers angepasst werden. Die einzige Frage ist, ob das Projekt jemals abgeschlossen wird." #NT!
 tesla.224.f: "'Aber stellen Sie sich vor, es könnte auch Musik abspielen! Wäre das nicht großartig?'" #NT!
 tesla.224.g: "Würden Sie diesen Computer bitte einfach bauen?" #NT!
 tesla.224.h: "Mit Kürzung der Mittel drohen" #NT!
 tesla.225.t: "Feuer beschädigt mechanischen Computer" #NT!
 tesla.225.d: "Ein Großbrand hat Teile des mechanischen Computers von Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] beschädigt und einige Pläne dafür zerstört. Wir wissen noch nicht, um wie viel das Projekt dadurch zurückgeworfen wird." #NT!
 tesla.225.f: "Das Feuer brach im Druckermodul des Computers aus. Niemand weiß genau, was es verursacht hat, aber es scheint, dass der Drucker große Mengen Papier produziert hat." #NT!
 tesla.225.g: "Wird dieser Computer jemals gebaut werden?" #NT!
 tesla.225.h: "Senden Sie ihnen zusätzliche Mittel." #NT!

 ### 2.3.1 ###

 tesla_modernized_railway_lines_state_modifier: "Modernisierte Eisenbahnstrecken" #NT!
  
 tesla_railway_project_new_priority_button: "$tesla_topographic_map_project_new_priority_button$" #NT!
 tesla_railway_project_new_priority_button_desc: "$tesla_topographic_map_project_new_priority_button_desc$" #NT!
 tesla_topographic_map_project_new_priority_button: "Priorisierte Zustände ändern" #NT!
 tesla_topographic_map_project_new_priority_button_desc: "#T Ändere die priorisierten Zustände#!\nChange in [Concept('concept_state', '$concept_states$')] die für dieses Projekt priorisiert sind.\n#n Achtung: Pausiere das Spiel, um sicherzustellen, dass die Priorisierung richtig funktioniert.#!" #NT!
  
 tesla_state_trait_irrigation: "Bewässerungssystem" #NT!
 je_tesla_irrigation_project: "Bewässerungssystem" #NT!
  
 tesla_states_with_irrigation_tt: "Alle [GetPlayer.GetAdjective]-Zustände haben das $tesla_state_trait_irrigation$-Zustandsmerkmal (derzeit [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])." #NT!
  
 tesla_irrigation_project_finished_engineer_loc: "\nDr. [GetPlayer.MakeScope.GetVariable('gaudi_engineer_var').GetCharacter.GetLastName] arbeitete an den neuen #b Bewässerungssystemen#! von [GetPlayer.GetName] und konnte diese erweitern, was unseren Agrarsektor massiv verbesserte." #NT!
 gaudi.1111.t: "Das Bewässerungssystem von [GetPlayer.GetName]" #NT!
 gaudi.1111.d: "Unser [concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] hat das Projekt zum Bau eines modernen Bewässerungssystems in [GetPlayer.GetNameNoFormatting] endlich abgeschlossen. Jetzt, da wir Flüsse gezähmt und Wasser auf die Felder gebracht haben, wird unsere Landwirtschaft sicherlich wachsen!" #NT!
 gaudi.1111.f: "'Die wilden Flüsse sind jetzt gezähmt. Die Magie ist verschwunden. Jetzt sind es nur noch gerade Wasserwege. Sogar der Biber ist verschwunden …'" #NT!
 gaudi.1111.g: "Ich hoffe, das hat keine unvorhergesehenen Folgen …" #NT!

