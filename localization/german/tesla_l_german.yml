 je_gaudi_magnetic_station: "Bau eines Geomagnetischen Observatoriums"
 je_gaudi_magnetic_station_reason: "Mit Hilfe der Instrumente und Anweisungen aus Göttingen wird unser Ingenieur innerhalb der nächsten zwei Jahre das Geomagnetische Observatorium einrichten. Dies ist ein internationales Projekt: Je mehr Daten aus verschiedenen Ländern nach Göttingen gesendet werden, desto schneller können die Wissenschaftler dort neue Erkenntnisse über das Magnetfeld der Erde gewinnen."
