 objective_thriving_culture_name_SWE:1 "Schweden" #1!
 objective_thriving_culture_desc_SWE:1 "In den letzten 100 Jahren hat sich Schweden zu einer führenden Wissenschaftsnation entwickelt und bedeutende Beiträge zur Wissenschaft geleistet, darunter ein System zur Benennung von Organismen, die Celsius-Temperaturskala und ein System von Elementsymbolen für chemische Elemente. \n Kann Schweden seine Position an der Spitze der Wissenschaft behaupten oder ist es an der Zeit, die Aufmerksamkeit wieder auf kulturelle Bestrebungen zu richten und Schriftsteller und Komponisten zu fördern?" #1!

