 vikelas.21.h: "Aber wer könnte an einem solchen Spiel interessiert sein?"
 vikelas.31.t: "Vom Wiesenspiel zum amerikanischen Freizeitvergnügen"
 vikelas.31.d: "In [SCOPE.sState('vikelas_baseball_state').GetName] ist ein neues Spiel populär geworden, das den amerikanischen Geist repräsentiert."
 vikelas.31.f: "In den 1840er Jahren begann Baseball, aus dem Schatten seiner Vorgänger herauszutreten und eine ganz eigene Form anzunehmen. Die Vereinigten Staaten erlebten eine rasche Verstädterung, und die wachsenden Städte suchten nach Freizeitbeschäftigungen, die die Gemeinschaft fördern und gleichzeitig den Geist der neuen Nation widerspiegeln konnten. Ein entscheidender Moment kam 1845, als Alexander Cartwright und die Mitglieder des Knickerbocker Base Ball Club in New York die ersten standardisierten Regeln für das Spiel aufstellten. Diese \"Knickerbocker Rules\" legten den Grundstein für das moderne Baseballspiel: ein Diamantfeld mit vier Bases, drei Outs pro Inning und neun Spieler pro Mannschaft. Sie unterschieden sich deutlich von den weniger formellen Versionen, die bis dahin auf Rasenflächen und Feldern gespielt wurden. Am 19. Juni 1846 spielte der Knickerbocker Club in Hoboken, New Jersey, das erste dokumentierte Spiel nach diesen Regeln. Die Mannschaft verlor zwar gegen die New York Nine, aber das Ereignis markierte die symbolische Geburtsstunde des organisierten Baseballs."
 vikelas.31.g: "Homerun!"
 vikelas.41.t: "Die Anfänge des modernen Fußballs"
 vikelas.41.d: "Um die zahlreichen widersprüchlichen Regeln im Bereich der Ballspiele zu regeln und somit gemeinsame Spiele zu organisieren, haben die Vereine in [SCOPE.sState('vikelas_football_state').GetName] ein neues Fußballregelwerk vorgelegt."
 vikelas.41.f: "In der ersten Hälfte des 19. Jahrhunderts war Fußball in England noch keine einheitliche Sportart, sondern eher ein Sammelbegriff für eine Vielzahl von Ballspielen, die in Städten, Dörfern und Schulen gespielt wurden. Diese Spiele unterschieden sich oft drastisch in ihren Regeln. Den ersten Schritt zur Vereinheitlichung bildeten die Cambridge Rules von 1848, ein Versuch, einheitliche Regeln für die Studenten in Cambridge zu schaffen. Sie waren keine endgültige Lösung, aber sie legten den Grundstein für alles, was folgte. Der eigentliche Durchbruch gelang am 26. Oktober 1863, als sich elf Vereine in der Freemasons' Tavern in London trafen und den Fußballverband (FA) gründeten. Innerhalb weniger Wochen einigten sie sich auf ein Regelwerk, nach dem der Ball nur mit den Füßen gespielt werden durfte und das Tragen oder Werfen des Balls verboten war - ein Kompromiss, der die Rugby-Anhänger verärgerte, die sich daraufhin abspalteten und ihr eigenes Regelwerk entwickelten. Mit der Gründung der FA war der moderne Fußball geboren."
 vikelas.41.g: "Tor!"
 vikelas.51.t: "Das Spiel mit dem Pfirsichkorb"
 vikelas.51.d: "In einer [SCOPE.sState('vikelas_basketball_state').GetName] Sporthalle wurde ein neues Spiel erfunden - eines, das eines Tages in den Hallen und Stadien der ganzen Welt widerhallen könnte."
 vikelas.51.f: "\"Nicht schießen. Kein Laufen mit dem Ball. Und zwei an eine Galerie genagelte Pfirsichkörbe.\"\n\n [TimeKeeper.GetCurrentDate.Format('y')], an einer Schule in [SCOPE.sState('vikelas_basketball_state').GetFarmHubName], stand Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] mit einem Problem konfrontiert: Wie [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]e unruhigen Schüler während des Winters drinnen aktiv halten? [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]e Lösung war einfach - und seltsam. Ein Fußball, zwei erhöhte Pfirsichkörbe und dreizehn Regeln.\nDie Jungen fanden es zunächst seltsam. Kein Kontakt. Kein Dribbling. Nur vorsichtiges Passen und bogenförmige Würfe. Aber irgendetwas daran blieb hängen. Das Spiel verbreitete sich in anderen Schulen und dann in anderen Städten. In weniger als einem Jahrzehnt hallten Turnhallen von New York bis Tokio vom Rhythmus der aufspringenden Bälle und den Rufen \"Basket!\" wider.\nWas als Zeitvertreib bei kaltem Wetter begann, könnte zu etwas Größerem werden. Es ist schnell, teamorientiert, an das moderne Leben angepasst - und vor allem: [ROOT.GetCountry.GetAdjectiveNoFormatting]-geboren."
 vikelas.51.g: "Führen Sie es in Schulen und Sporthallen ein."
 vikelas.302.h: "Was für ein überbewertetes Spiel."
 vikelas.303.h: "Was für ein langweiliges Spiel."
 vikelas.311.g: "Verpassen wir nie wieder ein Sportergebnis!"
 vikelas.312.t: "Sport-Radio"
 vikelas.312.d: "Ein Radiohersteller in [SCOPE.sState('vikelas_radio_state').GetName] bewirbt sein Produkt vor allem für Radioübertragungen von Sportveranstaltungen. Der Wunsch der Bevölkerung, kein einziges [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Spiel zu verpassen, hat die Fabrik dazu gebracht, ihre Produktion zu optimieren."
 vikelas.312.f: "Das Radio eignete sich perfekt als neues Medium für den Sport: Es konnte die Dramatik eines Spiels live übertragen, das Brüllen der Zuschauer vermitteln und die Stimme des Kommentators zum Herzschlag des Publikums machen. In den Vereinigten Staaten begann dies am 5. August 1921, als der Sender KDKA aus Pittsburgh das erste Baseballspiel live übertrug: die Pittsburgh Pirates gegen die Philadelphia Phillies. Der Kommentator Harold Arlin saß in der Pressebox mit einem einfachen Mikrofon und beschrieb jede Aktion, als ob er sie einem Freund erzählen würde. Die Zuhörer, die von den neuen Geräten gefesselt waren, spürten, wie der Sport ihre Wohnzimmer eroberte. In Europa folgte die BBC diesem Beispiel: Am 11. Januar 1927 übertrug sie das erste Fußballspiel live - Arsenal gegen Sheffield United - mit dem Kommentator Teddy Wakelam."
 vikelas.312.g: "Es ist, als wäre man live dabei!"
 vikelas.318.t: "[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]-Verband"
 vikelas.318.g: "Den nationalen [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Verband gründen!"
 vikelas.318.f: "Ein Sportverband - sei es für Cricket, Baseball, Fußball oder Basketball - wird immer dann gegründet, wenn 35 Prozent der integrierten Heimatstaaten einen Verein für die jeweilige Sportart haben. Ein Verband ist die Grundlage für die Austragung von Ligaspielen und eines Endspiels mit einem Meistertitel. Dies ist jedoch nur möglich, wenn eine Nation mindestens zwei Vereine hat. Ein Fußballverband ist eine Voraussetzung für die Teilnahme an der FIFA-Weltmeisterschaft."
 vikelas.318.d: "[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] hat sich zu einem beliebten Sport [GetPlayer.GetAltNameNoFormatting('IN')] entwickelt. Die lebendige Vereinskultur hat nun zur Gründung eines nationalen Verbands in [ROOT.GetCountry.GetCapital.GetCityHubName] geführt."
 vikelas.321.g: "Homerun!"
 vikelas.322.t: "Baseball-Karten"
 vikelas.322.d: "Ein bekanntes Unternehmen in unserem Land begann, Baseballkarten zu Werbezwecken zu drucken. Seitdem hat sich eine regelrechte Sammelwut entwickelt."
 vikelas.322.f: "Die Geschichte der Baseball-Sammelkarten beginnt in den Jahrzehnten, in denen sich der Baseball selbst von einem regionalen Zeitvertreib zum Nationalsport der Vereinigten Staaten entwickelte. Bereits in den 1860er Jahren, als die National Association of Baseball Players (NABBP) die ersten Clubs organisierte, erschienen die ersten Spielerporträts in Form von Studiofotografien. Diese so genannten Cabinet Cards oder Trade Cards wurden in Fotostudios hergestellt und von wohlhabenderen Fans gesammelt, hatten aber noch keinen Seriencharakter. Der eigentliche Beginn der Sammelkarten im modernen Sinne geht auf die 1880er Jahre zurück. Damals entdeckten Tabakhersteller die Möglichkeit, kleine Pappbilder in Zigarettenschachteln beizulegen. Zunächst dienten diese Karten nur zur Stabilisierung der Packungen, doch die Unternehmen erkannten schnell ihren Werbewert. Als Pionier dieser Ära gilt die Firma Goodwin & Company aus New York mit ihrer Serie Old Judge (1887-1890). Die Karten zeigten Schwarz-Weiß-Fotografien von Spielern, gedruckt auf dünnem Karton, und boten Baseballfans erstmals die Möglichkeit, ganze Serien ihrer Idole zu sammeln."
 vikelas.322.g: "Wann werden die Sammelalben veröffentlicht?"
 vikelas.331.t: "Rivalisierender Fußballverein gegründet"
 vikelas.331.d: "Nach einem Streit mit einem Fußballverein im Nachbarstaat haben sich die Arbeiter in [SCOPE.sState('vikelas_football_club_state_scope').GetName] zusammengetan und ihren eigenen Verein gegründet, den sie [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')] nennen. Offenbar gibt es Feindseligkeiten zwischen den beiden Vereinen."
 vikelas.331.f: "Eine ganze Reihe von Sportvereinen hat ihren Ursprung in Spaltungen und Unstimmigkeiten mit anderen Vereinen. Inter Mailand zum Beispiel wurde von einigen verärgerten kosmopolitischen Mitgliedern des Milan Cricket and Football Club (heute AC Mailand) im Mailänder Restaurant Ristorante Orologio gegründet. Der \"Football Club Internazionale Milano\", wie sich der Verein offiziell nannte, wurde vom nationalistischen Mailänder CFC abgespalten, in dem nur Italiener spielen durften."
 vikelas.331.g: "Ist das eine aufkeimende Rivalität?"
 vikelas.332.t: "Fußball-Rivalität"
 vikelas.332.d: "Die Fußballvereine [SCOPE.sState('vikelas_rival_state_1_scope').GetCustom('vikelas_historical_football_club_names_type')] aus [SCOPE.sState('vikelas_rival_state_1_scope').GetName] und [SCOPE.sState('vikelas_rival_state_2_scope').GetCustom('vikelas_historical_football_club_names_type')] aus [SCOPE.sState('vikelas_rival_state_2_scope').GetName] haben heute ein Ligaspiel, das den diesjährigen Meister bestimmen könnte. Die Spannungen könnten hoch sein, da sich beide als Rivalen sehen und Meister werden wollen."
 vikelas.332.f: "Kick off, throw in, have a little scrimmage,\nKeep it low, a splendid rush, bravo, win or die;\nOn the ball, City!\nNever mind the danger,\nSteady on, now’s your chance,\nHurrah! We’ve scored a goal.\n - Albert T. Smith"
 vikelas.332.g: "Ich bevorzuge das Team aus [SCOPE.sState('vikelas_rival_state_1_scope').GetName]!"
 vikelas.332.h: "Das Team aus [SCOPE.sState('vikelas_rival_state_2_scope').GetName] ist besser!"
 vikelas.333.t: "Fußball-Hooligans"
 vikelas.333.d: "Das Fußballspiel um die [GetPlayer.GetAdjective]e Meisterschaft wurde von Ausschreitungen gewalttätiger Fußballfans überschattet. Sie waren mit dem Ergebnis unzufrieden und griffen die andere Mannschaft, den Schiedsrichter und beliebige Geschäfte in [ROOT.Var('vikelas_rival_state_var').GetState.GetName] an und verursachten Chaos. Glücklicherweise ist niemand gestorben."
 vikelas.333.f: "\"Wo bist du, du Angsthase von einem Schiedsrichter! Deinetwegen haben wir verloren! Da ist er ja! Holt ihn euch, Jungs!\""
 vikelas.333.g: "Was für ein Chaos!"
 vikelas.334.t: "Ein Fußball-Meister ist geboren!"
 vikelas.334.d: "Der neue [GetPlayer.GetAdjective]e Meister wurde in einem knappen Spiel entschieden, das das Team aus [ROOT.Var('vikelas_rival_state_var').GetState.GetName] für sich entscheiden konnte. Die Menschen in [ROOT.Var('vikelas_rival_state_var').GetState.GetNameNoFormatting] feiern den Sieg ihrer Mannschaft."
 vikelas.334.f: "\"Ole! Ole! Ole! Oleeee! Oleeee! Oleeee!\""
 vikelas.334.g: "We are the Champions!"
 vikelas.391.t: "Nationalsport annehmen"
 vikelas.391.d: "Welche nationale Sportart sollte [GetPlayer.GetAltNameNoFormatting('NOM')] annehmen?"
 vikelas.391.f: "\"Haben Sie schon einmal von diesem schönen Sport namens Hornussen gehört?\""
 vikelas.391.g: "Cricket."
 vikelas.391.h: "Baseball."
 vikelas.391.i: "Fußball."
 vikelas.391.j: "Basketball."
 vikelas.391.k: "Vergessen Sie's."
 vikelas.392.t: "Nationalsport ändern"
 vikelas.392.d: "Zu welchem Nationalsport sollte [GetPlayer.GetAltNameNoFormatting('NOM')] wechseln?"
 vikelas.392.f: "\"[ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName] ist so langweilig geworden, wie wäre es mit einer Partie Käserollen?\""
 vikelas.393.t: "Ein neuer Nationalsport"
 vikelas.393.d: "Abgesandte aus [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltName('DAT')] haben unserer Regierung vorgeschlagen, ihren Nationalsport in unserem Land einzuführen, und haben einen Coach geschickt, um diesen Plan umzusetzen."
 vikelas.393.f: "\"Das Spiel ist wie eine Pause, und da man nicht ununterbrochen arbeiten kann, braucht man eine Pause.\" -Aristoteles"
 vikelas.393.g: "Gib mir den Schläger!"
 vikelas.393.h: "Homerun!"
 vikelas.393.i: "Tor!"
 vikelas.393.j: "Swish!"
 vikelas.394.t: "Ein Volksport"
 vikelas.394.d: "Immer mehr Bewohner unseres Landes betrachten [ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName] als verbindendes, ideologisches Element - auch in internationalen Beziehungen. Dieser gemeinsame Nationalsport gibt ihnen das Gefühl, dass [GetPlayer.GetAltNameNoFormatting('NOM')] mehr mit unserem Suzerän ([SCOPE.sCountry('vikelas_overlord_country_scope').GetName]) gemeinsam hat als bloße Machtverhältnisse."
 vikelas.394.f: "Wenn ein Suzerän und ein Subjekt einen Volkssport teilen, wird der Freiheitsdrang reduziert."
 vikelas.394.g: "Gemeinsame Sportarten, gemeinsame Interessen."
 vikelas.395.t: "Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship"
 vikelas.395.d: "Zuschauer und Mannschaften aus verbündeten und befreundeten Ländern versammelten sich, um an der Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship teilzunehmen. Die Spiele sind auch ein Zeichen dafür, dass der [ROOT.GetCountry.GetAdjectiveNoFormatting|l]e Einflussbereich nicht nur politisch, sondern auch kulturell zusammenwächst."
 vikelas.395.f: "Seit dem späten 19. Jahrhundert gab es Testserien zwischen England und anderen Teilen des Empire, die quasi Turniercharakter hatten. Mit der Gründung der ICC (Imperial Cricket Conference) im Jahr 1909 wurde der Grundstein für einen formellen Austausch zwischen den Cricket-Mächten des Empire gelegt. Die ersten Mitglieder waren England, Australien und Südafrika, später kamen Indien, Neuseeland und die Westindischen Inseln hinzu.\n\n Die British Home Championship war ein jährliches Turnier zwischen den vier Home Nations: England, Schottland, Wales und Nordirland. Es war das älteste regelmäßig stattfindende internationale Fußballturnier. Sie galt als Symbol für die britische Vormachtstellung im Fußball.\n\nDie Idee eines umfassenden Empire Cups wurde nie vollständig verwirklicht - aber es gab einzelne Versuche und Serien, die dem nahe kamen."
 vikelas.395.g: "Lasst die Spiele beginnen!"
 vikelas.396.t: "Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship - Sieg!"
 vikelas.396.d: "Wir haben unseren Rivalen [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAltName('AKK')] im entscheidenden Spiel geschlagen! Wir haben die Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship gewonnen."
 vikelas.396.f: "Der Pass von [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting] zu [SCOPE.sCharacter('vikelas_morlock_scope').GetFullNameNoFormatting] wird durch [SCOPE.sCountry('vikelas_second_winner_team_scope').GetNameNoFormatting] blockiert - und [SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting], immer [SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting], der [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAdjectiveNoFormatting] rechte Flügelspieler, hat den Ball. Er hat den Ball - dieses Mal verloren, an [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]. [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting] geht innen durch. Kopfball - blockiert. [SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting] sollte von hinten schießen - [SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting] schießt - Tooooor! Tooooor! Tooooor! Tooor!"
 vikelas.396.g: "Die Commonwealth-Trophäe geht an [GetPlayer.GetAltNameNoFormatting('AKK')]!"
 vikelas.397.t: "Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship endet"
 vikelas.397.d: "Die Commonwealth [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] Championship ist vorbei. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetAltName('NOM')] hat [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAltName('AKK')] im Finale besiegt. Die Mannschaften und Zuschauer aus den verbündeten und befreundeten Staaten sind wieder abgereist. [GetPlayer.GetAltNameNoFormatting('NOM')|U] wird ihnen als Gastgeber und Organisator in guter Erinnerung bleiben."
 vikelas.397.f: "\"Vielleicht sind wir keine entrechteten Untertanen, kein Kanonenfutter oder eine bloße Ansammlung beeinflusster Nationen zum Nutzen eines Oberherrn, sondern ... eine Familie.\""
 vikelas.397.g: "Dies war der Völkerverständigung förderlich."
 vikelas.403.d: "Die FIFA hat auf ihrer heutigen Sitzung in [SCOPE.sState('vikelas_fifa_state').GetStateRegion.GetCityHubName] neue Vorstandsmitglied erwählt."
 vikelas_add_fifa_board_effect_tt: "Es wird ein neuer Vorstand für die FIFA gewählt."
