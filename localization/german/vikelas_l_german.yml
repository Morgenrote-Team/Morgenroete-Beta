 vikelas.100.t: "Der olympische Traum"
 vikelas.100.d: "[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] möchte die antiken Olympischen Spiele in einem modernen Gewand wiederbeleben. Alle vier Jahre soll ein internationaler Sportwettbewerb stattfinden."
 vikelas.100.f: "Inspiriert durch das alte Ideal, dass ein guter Geist auch einen guten Körper braucht, entwickelte sich immer mehr die olympische Idee. Dazu trug auch die Archäologie bei: Ende des 19. Jahrhunderts grub Ernst Curtius Olympia aus und weckte damit neues Interesse an den Olympischen Spielen. Hinzu kam die durch die Evolutionstheorie genährte gesellschaftliche Idee des \"Survival of the fittest\" und die Überzeugung, dass körperliche Betätigung im Zeitalter der Fabrikarbeit unerlässlich sei. Als internationale Veranstaltung sollten die Olympischen Spiele der Neuzeit den nationalen Egoismus überwinden und zum Frieden beitragen. Der gesellschaftliche Grenzen überwindende Fortschritt soll durch das Streben nach sportlichen Rekorden nach dem Motto \"Citius, altius, fortius\" (Schneller, Höher, Stärker) symbolisiert werden."
 vikelas.100.g: "Gründung des Internationalen Olympischen Komitees."
 vikelas.102.t: "Das Internationale Olympische Komitee"
 vikelas.102.d: "Um die Olympischen Spiele wiederzubeleben, hat [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] ein Internationales Olympisches Komitee (IOC) gegründet, das für die Aufrechterhaltung und Organisation einer modernen Form der antiken Spiele verantwortlich sein wird."
 vikelas.102.f: "Das erste IOC bestand hauptsächlich aus Vertrauten von [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]. Sie verteilen sich in einem kleinen Kreis. Später schlossen sich weitere IOC-Mitglieder an und aus der Gruppe Gleichgesinnter wurde eine internationale Organisation."
 vikelas.102.g: "Ein Fortschritt für den nationalen und internationalen Sport."
 vikelas.103.t: "Die Olympischen Spiele: eine griechische Angelegenheit?"
 vikelas.103.d: "Nach der Gründung des Internationalen Olympischen Komitees stellt sich die Frage, ob die Spiele immer in Griechenland stattfinden oder ob sie alle vier Jahre einen anderen Austragungsort haben werden."
 vikelas.103.f: "Eigentlich wollten die internationalen Vertreter, dass die Olympischen Spiele als internationale Veranstaltung international stattfinden. Demnach soll der Veranstaltungsort alle vier Jahre wechseln. Die Entscheidung über den Veranstaltungsort sollte der Vorstand treffen. Aber da Griechenland die Spiele wiederbelebt hat, ist diese Position nicht unumstritten. Abschließend brachte [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] die Frage des Austragungsortes auf eine einfache Formel: \"Unsere Spiele, unsere Regeln \". Dies würde dazu führen, dass der Vorstand eine reine Ehrensache wäre und seine Rechte stark eingeschränkt würden."
 vikelas.103.g: "Die Olympischen Spiele sind eine griechische Angelegenheit."
 vikelas.103.h: "Die Olympischen Spiele sind eine internationale Angelegenheit."
 vikelas.104.t: "Das Internationale Olympische Komitee"
 vikelas.104.d: "Um die Olympischen Spiele wiederzubeleben, hat [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] ein Internationales Olympisches Komitee (IOC) gegründet, das für die Aufrechterhaltung und Organisation einer modernen Form der antiken Spiele verantwortlich sein wird. Die Spiele sollen alle vier Jahre in Griechenland stattfinden."
 vikelas.104.f: "Das erste IOC bestand hauptsächlich aus Vertrauten von [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]. Sie verteilen sich in einem kleinen Kreis. Später schlossen sich weitere IOC-Mitglieder an und aus der Gruppe Gleichgesinnter wurde eine internationale Organisation. Eigentlich wollten die internationalen Vertreter, dass die Olympischen Spiele als internationale Veranstaltung international stattfinden. Aufgrund des starken griechischen Einflusses musste das IOC jedoch auf die Idee einer Rotation mit verschiedenen Austragungsorten verzichten. Die Olympischen Spiele finden daher alle vier Jahre in Griechenland statt."
 vikelas.104.g: "Ihre Spiele, ihre Regeln..."
 vikelas.105.t: "Die Wiederbelebung der Olympischen Spiele"
 vikelas.105.d: "Nach der Sitzung des Internationalen Olympischen Komitees (IOC) beschloss der Vorstand, dass die ersten Spiele der Neuzeit in Griechenland stattfinden sollten."
 vikelas.105.f: "Eine der ersten Aufgaben des IOC bestand darin, den Austragungsort der neuen Spiele festzulegen. Dem antiken Vorbild folgend beschloss das Komitee einstimmig, dass die Spiele in Erinnerung an die ursprünglichen Olympischen Spiele in Griechenland stattfinden sollten. Danach wird alle vier Jahre ein anderes Land die Olympischen Spiele ausrichten. Der Veranstaltungsort wird vom Vorstand ausgewählt, der alle vier Jahre neu konstituiert wird."
 vikelas.105.g: "Wir können es kaum erwarten!"
 vikelas.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_olympic_games_number_type')] Olympische Spiele beginnen"
 vikelas.106.d: "Die ersten Olympischen Spiele der Neuzeit haben begonnen! Die ganze Welt hat den Weg nach Griechenland gefunden. An dieser internationalen Veranstaltung nehmen Sportler aus #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! Nationen teil."
 vikelas.106.f: "Die ersten Olympischen Spiele der Neuzeit begannen am [TimeKeeper.GetCurrentDate.Format('wy')], nachdem die antiken Olympischen Spiele 393 n. Chr. vom römischen Kaiser Theodosius I. wegen der Verehrung heidnischer Götter verboten wurden. Obwohl die Spiele auch für die damalige Zeit kaum sportliche Spitzenleistungen hervorbrachten, galten sie allgemein als großer Erfolg und trugen maßgeblich dazu bei, dass sich die Olympischen Spiele dauerhaft etablieren konnten."
 vikelas.106.g: "Die Spiele kommen nach Hause!"
 vikelas.107.g: "Schneller höher weiter!"
 vikelas.108.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_olympic_games_number_type')] Ende der Olympischen Spiele"
 vikelas.108.d: "Die ersten Olympischen Spiele sind zu Ende. Publikum, Presse und Sportler sind begeistert: Eine jahrhundertealte Tradition wurde wiederbelebt und in eine moderne Form gebracht."
 vikelas.108.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_winners_type')] Aber auch andere Länder haben große sportliche Leistungen erbracht. Von den [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue|0V] teilnehmenden Ländern haben diese Goldmedaillen gewonnen:\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_1_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_2_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_3_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_4_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_5_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_6_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_7_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_8_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_9_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_10_this_year_global_type')]"
 vikelas.108.g: "Citius, Altius, Fortius."
 vikelas.109.d: "Griechenland hat die Welt erneut zur Teilnahme an den Olympischen Spielen eingeladen. An dieser internationalen Veranstaltung nehmen Sportler aus #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! Nationen teil."
 vikelas.109.f: "Seit Griechenland das IOC gegründet hat, war klar, dass die Spiele auch in Zukunft nur noch auf hellenischem Boden stattfinden würden. Dies sorgte nicht nur für eine gewisse Kontinuität, sondern sorgte auch dafür, dass Griechenland eine international anerkannte Rolle erhielt, die dem einst kleinen Königreich eine ganz besondere Rolle verlieh."
 vikelas.110.t: "Olympische Begeisterung"
 vikelas.110.d: "[SCOPE.sCharacter('vikelas_olympics_enthusiast_scope').GetFullName] ist fasziniert von den Olympischen Spielen, die bald in Griechenland stattfinden. Er nahm es selbst in die Hand, dass [ROOT.GetCountry.GetName] Mitglied des neu gegründeten Internationalen Olympischen Komitees werden sollte."
 vikelas.110.f: "Es ist nicht verwunderlich, dass eine Reihe von Akademikern am Erfolg der Olympischen Spiele beteiligt waren – es gab zahlreiche Antiquare, die aufgrund ihrer Neigungen an der Wiederbelebung interessiert waren. Auch wenn sie oft selbst nicht teilnahmen, versuchten sie, Kontakt zum IOC aufzunehmen. Sie empfanden es auch als nationale Ehre, wenn ihr eigenes Land bei der internationalen Veranstaltung vertreten war."
 vikelas.110.g: "Eine lobenswerte Initiative."
 vikelas.112.t: "Neuer IOC-Vorstand gewählt"
 vikelas.112.d: "Der IOC-Vorstand wurde neu gewählt."
 vikelas.112.f: "Der IOC-Vorstand wird alle vier Jahre gewählt. Im Vorstand verbleiben nur das Gründerland und das Land, aus dem der Präsident stammt. Ansonsten folgt die Verteilung diesem System: 5 Großmächte, 2 Nationen aus Europa, 2 Nationen aus Amerika, 2 Nationen aus Asien, eine Nation aus Afrika, eine Nation aus Ozeanien. Der Vorstand wählt aus den IOC-Mitgliedern ein Land aus, das die nächsten Olympischen Spiele ausrichten soll."
 vikelas.113.t: "Der nächste Olympiastandort"
 vikelas.113.d: "Die IOC-Vorstandsmitglieder haben sich getroffen, um über den Austragungsort der nächsten Olympischen Spiele zu entscheiden."
 vikelas.113.f: "Drei Länder, die Mitglieder des IOC sind und in den letzten 20 Jahren keine Olympischen Spiele ausgerichtet haben, kommen als mögliche Auswahlländer infrage. Ein viertes Land könnte aufgrund von Korruption in die Liste aufgenommen werden. Die Auswahl hängt vom Ruf und der Vernetzung des Landes ab. Vasallen und Oberherren, Verbündete und Zollunionen werden füreinander stimmen. Auch der Zustand der Beziehungen und die Schande spielen eine Rolle."
 vikelas.113.g: "[SCOPE.sCountry('vikelas_olympics_candidate_1').GetName]"
 vikelas.113.h: "[SCOPE.sCountry('vikelas_olympics_candidate_2').GetName]"
 vikelas.113.i: "[SCOPE.sCountry('vikelas_olympics_candidate_3').GetName]"
 vikelas.113.j: "[SCOPE.sCountry('vikelas_olympics_candidate_4').GetName]"
 vikelas.113.k: "[SCOPE.sCountry('vikelas_olympics_candidate_fallback').GetName]"
 vikelas.114.t: "Die nächsten Olympischen Spiele in [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]"
 vikelas.114.d: "Das IOC hat entschieden. [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetName] hat die besten Voraussetzungen, die nächsten Olympischen Spiele auszurichten."
 vikelas.114.f: "Die Ausrichtung der Olympischen Spiele ist eine prestigeträchtige Angelegenheit. Die Vorbereitung ist mit einigen Kosten verbunden, aber der Aufwand lohnt sich."
 vikelas.114.g: "Wir sehen uns in [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]!"
 vikelas.115.g: "Wir sehen uns in... Hey, Moment mal, sind wir das? Hurra!"
 vikelas.116.d: "Die ganze Welt hat sich auf den Weg zu [ROOT.GetCountry.GetName] gemacht. An dieser internationalen Veranstaltung nehmen Sportler aus #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! Nationen teil. Wir sind stolz, Gastgeber zu sein – mögen unsere Sportler vom Heimvorteil profitieren!"
 vikelas.116.f: "\"Das Wichtigste bei den Olympischen Spielen ist nicht der Sieg, sondern die Teilnahme; Das Wichtigste im Leben ist nicht der Triumph, sondern der Kampf. Das Wesentliche ist nicht, gesiegt zu haben, sondern gut gekämpft zu haben. Die Verbreitung dieser Prinzipien bedeutet den Aufbau einer starken, tapfereren und vor allem gewissenhafteren und großzügigeren Menschheit.\" -Pierre de Coubertin"
 vikelas.116.g: "Lasst die Spiele beginnen!"
 vikelas.117.d: "Die ganze Welt hat sich auf den Weg zu [SCOPE.sCountry('vikelas_olympic_country').GetName] gemacht. An dieser internationalen Veranstaltung nehmen Sportler aus #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! Nationen teil."
 vikelas.118.d: "Unsere Athleten haben tapfer gekämpft – jetzt ist es an der Zeit, den Ruhm mit nach Hause zu nehmen."
 vikelas.119.t: "Das Internationale Olympische Komitee"
 vikelas.119.d: "Um die Olympischen Spiele wiederzubeleben, hat [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] ein Internationales Olympisches Komitee (IOC) gegründet, das für die Aufrechterhaltung und Organisation einer modernen Form der antiken Spiele verantwortlich sein wird. Die Entscheidung fiel, die ersten Spiele der Neuzeit in [ROOT.GetCountry.GetName] auszurichten."
 vikelas.119.f: "Das erste IOC bestand hauptsächlich aus Vertrauten von [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]. Sie verteilen sich in einem kleinen Kreis. Später schlossen sich weitere IOC-Mitglieder an und aus der Gruppe Gleichgesinnter wurde eine internationale Organisation. Eine der ersten Entscheidungen betraf den Austragungsort der ersten Olympischen Spiele. Da es derzeit keinen souveränen griechischen Nationalstaat gibt, dem diese Aufgabe übertragen werden könnte, wurde beschlossen, die Spiele im Gründerland [ROOT.GetCountry.GetName] auszurichten. Danach würde der Vorstand alle vier Jahre einen anderen Standort bestimmen."
 vikelas.119.g: "Anschließend veranstalten wir die Spiele in unseren Räumlichkeiten."
 vikelas.120.t: "Das Internationale Olympische Komitee"
 vikelas.120.d: "Um die Olympischen Spiele wiederzubeleben, hat [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] ein Internationales Olympisches Komitee (IOC) gegründet, das für die Aufrechterhaltung und Organisation einer modernen Form der antiken Spiele verantwortlich sein wird. Die Entscheidung fiel, die ersten Spiele der Neuzeit in [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFormatting] auszurichten."
 vikelas.120.f: "Das erste IOC bestand hauptsächlich aus Vertrauten von [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]. Sie verteilen sich in einem kleinen Kreis. Später schlossen sich weitere IOC-Mitglieder an und aus der Gruppe Gleichgesinnter wurde eine internationale Organisation. Eine der ersten Entscheidungen betraf den Austragungsort der ersten Olympischen Spiele. Da es derzeit keinen souveränen griechischen Nationalstaat gibt, dem diese Aufgabe übertragen werden könnte, wurde beschlossen, die Spiele im Gründerland [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag] auszurichten. Danach würde der Vorstand alle vier Jahre einen anderen Standort bestimmen."
 vikelas.120.g: "Wir sehen uns in [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]"
 vikelas_3_winners_loc: "Die diesjährigen Olympischen Spiele haben nicht nur 1 oder 2 Gewinner, sondern gleich 3! [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName], [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName] und [GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetCountry.GetName] haben alle [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals gewonnen! Gold Medaille."
 vikelas_2_winners_loc: "Sowohl [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName] als auch [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName] haben [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals! Gold Medaille. Das bedeutet, dass beide Länder die besten Sportler der Welt beherbergen."
 vikelas_1_winner_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName] dominierte diese Olympischen Spiele mit [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals! Gold Medaille."
 vikelas_medal_rank_1_this_year_global_loc: "\n1. [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0] - [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_2_this_year_global_loc: "\n2. [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0] - [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_3_this_year_global_loc: "\n3. [GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0] - [GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetCountry.GetName]"
