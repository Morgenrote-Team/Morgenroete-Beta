 je_vikelas_baseball: "Baseball"
 je_vikelas_baseball_reason: "Baseball wurde im 19. Jahrhundert zum Nationalsport der Vereinigten Staaten und trat von dort aus seine Reise um die Welt an. Das erste dokumentierte Spiel fand 1846 in Hoboken, New Jersey, statt. In den 1860er Jahren wurde das Spiel rasch professionalisiert; 1876 wurde die National League, die erste große Profiliga, gegründet. Zur gleichen Zeit verbreitete sich Baseball durch amerikanische Soldaten, Händler und Missionare in anderen Ländern."
 je_vikelas_baseball_fail: "Irgendein Land erfindet Baseball vor [GetPlayer.GetAltName('AKK')]."
 je_vikelas_football: "Fußball"
 je_vikelas_football_reason: "In den 1840er Jahren entstanden in England die ersten einheitlichen Fußballregeln, 1863 wurde der Fußballverband gegründet, und 1872 fand das erste offizielle Länderspiel zwischen England und Schottland statt. Von Großbritannien aus verbreitete sich der Fußball auf dem Kontinent und in Südamerika. In Deutschland, Frankreich, Italien und Spanien entstanden ab den 1890er Jahren nationale Verbände und Ligen. Zur gleichen Zeit verbreitete sich der Fußball auch in Argentinien, Brasilien und Uruguay, wo britische Eisenbahnarbeiter und Emigranten die ersten Vereine gründeten."
 je_vikelas_football_fail: "Irgendein Land erfindet Fußball vor [GetPlayer.GetAltName('AKK')]."
 je_vikelas_cricket: "Cricket"
 je_vikelas_cricket_reason: "Die Ursprünge des Cricket gehen auf das späte Mittelalter zurück: Bereits im 16. Jahrhundert spielten Kinder in Kent ein einfaches Spiel mit Schläger und Ball, das in alten Dokumenten als \"creckett\" oder \"creag\" bezeichnet wird. Doch erst im 18. Jahrhundert begann sich das Spiel zu einem komplexen, geregelten Spiel zu entwickeln. In dieser Zeit entstanden die ersten organisierten Vereine, und mit der Gründung des Marylebone Cricket Club (MCC) in London im Jahr 1787 rückte das Cricket in den Mittelpunkt. Der MCC stellte die ersten verbindlichen Regeln auf, die den Ausgangspunkt für das moderne Spiel bildeten."
 je_vikelas_cricket_fail: "Irgendein Land erfindet Cricket vor [GetPlayer.GetAltName('AKK')]."
 je_vikelas_cricket_national_league: "Nationale Cricket-Liga"
 je_vikelas_cricket_national_league_reason: "Im 19. Jahrhundert begann das Cricket, das in England seit langem als Freizeitbeschäftigung der Aristokraten und des einfachen Volkes galt, eine organisierte Struktur anzunehmen. Der entscheidende Moment kam 1890 mit der Gründung der County Championship, der ersten offiziellen inländischen Kricketliga der Welt. Zuvor waren seit dem 18. Jahrhundert Spiele zwischen den Grafschaften ausgetragen worden, allerdings ohne ein formelles Punktesystem oder eine Meisterschaftstabelle. Die County Championship brachte einen standardisierten Wettbewerb in den englischen Cricket-Sport, wobei sich Yorkshire, Surrey und Lancashire in den ersten Jahren als dominierende Mannschaften herausstellten. Auch Cricket-Clubs außerhalb Englands, insbesondere in Australien und Südafrika, begannen, strukturierte Wettbewerbe zu veranstalten."
 je_vikelas_baseball_national_league: "Nationale Baseball-Liga"
 je_vikelas_baseball_national_league_reason: "In den 1860er Jahren wurde der bis dahin vor allem in New York populäre Baseball-Sport zu einem nationalen Phänomen in den Vereinigten Staaten. Ausschlaggebend dafür waren Soldaten, die das Spiel während des amerikanischen Bürgerkriegs in Militärlagern spielten und so für eine größere Verbreitung des Sports sorgten. Im Jahr 1857 wurde der erste amerikanische Baseballverband, die National Association of Base Ball Players (NABBP), gegründet. Bis 1867 traten mehr als 400 Vereine diesem Verband bei. Die stärksten Teams waren jedoch nach wie vor im Nordosten der Vereinigten Staaten, insbesondere in New York, zu finden. Die 1871 gegründete Nachfolgeorganisation der NABBP, die National Association of Professional Base Ball Players (NAPBBP) - auch bekannt als National Association (NA) - gilt als die erste professionelle Baseball-Liga der Welt."
 je_vikelas_football_national_league: "Nationale Fußballliga"
 je_vikelas_football_national_league_reason: "Ende des 19. Jahrhunderts entwickelte sich der Fußball, der zuvor ein lose organisierter Zeitvertreib in den öffentlichen Schulen und Gemeinden Englands gewesen war, zu einem nationalen Phänomen. Ausschlaggebend dafür war die Gründung der Football Association (FA) im Jahr 1863, die die Regeln kodifizierte und einen organisierten Wettbewerb ermöglichte. In den 1870er Jahren verbreitete sich die Popularität des Sports rasch, vor allem in den Arbeiterklassen der Industriestädte. 1888 wurde in England die Football League gegründet und damit die erste professionelle Fußballliga der Welt. Ihr gehörten 12 Vereine aus den Midlands und dem Norden an, darunter Teams wie Preston North End und Aston Villa, die schon früh zu den Leistungsträgern gehörten."
 je_vikelas_basketball_national_league: "Nationale Basketball-Liga"
 je_vikelas_basketball_national_league_reason: "Zu Beginn des 20. Jahrhunderts entwickelte sich der 1891 von James Naismith erfundene Basketball von einer YMCA-Trainingsaktivität zu einem Wettkampfsport. Die entscheidende Entwicklung erfolgte 1898 mit der Gründung der National Basketball League (NBL) in den Vereinigten Staaten, die als erste professionelle Basketballliga der Welt gilt. Die Liga bestand aus sechs Teams aus Pennsylvania und New Jersey und markierte die ersten Schritte des Basketballs in Richtung Professionalität. Die ursprüngliche NBL war jedoch nur von kurzer Dauer und wurde 1904 wieder aufgelöst. Erst 1946, mit der Gründung der Basketball Association of America (BAA), die später in der NBA aufging, wurde der professionelle Basketball zu einem stabilen, landesweiten Unternehmen."
