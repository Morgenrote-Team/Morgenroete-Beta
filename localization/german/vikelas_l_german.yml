 je_vikelas_bicycle_race_reason: "Unternehmer, Verleger und Fahrradhersteller schlagen einen öffentlichen Wettbewerb vor: Ein Langstreckenrennen, um die Geschwindigkeit, die Stärke und das Versprechen des neuen Sicherheitsniederrad zu beweisen."
 je_vikelas_basketball: "Basketball"
 je_vikelas_basketball_reason: "Schnell, teambasiert und für die moderne Stadt gebaut - es könnte das Spiel des Jahrhunderts sein."
 vikelas.21.t: "Das Spiel der Gentlemen"
 vikelas.21.d: "In [SCOPE.sState('vikelas_cricket_state').GetName] hat sich zum ersten Mal eine Gruppe von Kricketspielern zusammengefunden, um gemeinsam Spiele nach festgelegten Regeln auszutragen. Der Verein nimmt damit eine Vorreiterrolle in diesem Sport ein."
 vikelas.21.f: "Das 19. Jahrhundert war die Zeit, in der sich Cricket von einem ländlichen Zeitvertreib zu einem Sport von nationaler und internationaler Bedeutung entwickelte. Die englische Oberschicht machte das Spiel zu ihrem liebsten Zeitvertreib: Es wurde in Internaten wie Eton und Harrow gepflegt und als \"Gentleman-Sport\" verherrlicht. Gleichzeitig wuchs die Popularität des Spiels in der Arbeiterklasse, insbesondere in Nordengland, wo Fabrikarbeiter ihre eigenen Clubs gründeten. Diese Demokratisierung des Spiels führte zu einem beispiellosen Zuwachs an Vereinen und Zuschauern.\n\nInternationale Spiele ließen nicht lange auf sich warten. Im Jahr 1844 fand in New York das erste dokumentierte Länderspiel zwischen Kanada und den Vereinigten Staaten statt."
 vikelas.21.g: "Gib mir den Schläger!"
 vikelas.601.t: "Pedale auf dem Bürgersteig"
 vikelas.601.d: "Auf den Boulevards ist eine neue Erfindung aufgetaucht: ein zweirädriges Gefährt, das durch direkt am Vorderrad angebrachte Pedale angetrieben wird. Es wird \"Veloziped\" genannt."
 vikelas.601.f: "In den Parks und auf den breiten Straßen der Hauptstadt drehen sich die Köpfe. Herren mit Hüten und Westen sitzen auf seltsamen Eisengestellen, treten wild in die Pedale und schwanken durch die aufgeschreckten Menschenmassen. Einige stürzen. Einige fliegen. Kinder lachen. Ältere Staatsmänner heben die Brauen. Die Zeitungen nennen es le vélocipède - halb Spielzeug, halb Versprechen. Dieser von einem Kutschenbauer erfundene \"Knochenschüttler\" ist ebenso schwer wie revolutionär. Auf Kopfsteinpflaster erschüttert er die Wirbelsäule. Aber auf glatten Promenaden bewegt er sich mit überraschender Anmut. Es wird gemunkelt, dass es sich nicht um eine bloße Neuheit handelt, sondern um den Keim einer neuen Art von Bewegung."
 vikelas.601.g: "Eine amüsante Mode!"
 vikelas.602.t: "Das Fahrrad der Zukunft"
 vikelas.602.d: "Es gibt ein neues Fahrraddesign mit gleich großen Rädern, einer kettengetriebenen Hinterachse und einer besseren Balance. Im Gegensatz zu den wackeligen Hochrädern ist dieses \"Sicherheitsniederrad\" stabil, erschwinglich und entwickelt sich schnell zu einer Sensation. Sein Erfinder? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!"
 vikelas.602.f: "Die alten Velozipedes erschütterten Knochen und Nerven gleichermaßen. Die hoch aufragenden Hochräder boten Geschwindigkeit, aber zu einem Preis, den nur wenige zu zahlen bereit waren - eine falsche Bewegung und der Fahrer flog. Jetzt macht sich in den Werkstätten unserer Hauptstadt eine neue Art von Fahrrad breit: kompakt, elegant und sicher. Mit einem Kettenantrieb für das Hinterrad und Luftreifen beginnen sogar Frauen und Arbeiter zu fahren. Auf den Straßen, die einst von Kutschen beherrscht wurden, ertönt nun das leise Summen von Gummi auf Stein. In Cafés und Fabriken ist man sich einig: Das ist kein Spielzeug. Es ist die Freiheit - schnell, leise und plötzlich zum Greifen nah."
 vikelas.602.g: "Lassen Sie alle Bürgerinnen und Bürger in das moderne Zeitalter eintreten."
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.611.d: "Der Tag ist gekommen. Fahrer aus dem ganzen Land versammeln sich an der Startlinie, begierig darauf, Mensch und Maschine auf der offenen Straße zu testen. Die Luft knistert vor Vorfreude."
 vikelas.611.f: "Die Sonne geht über dem Boulevard auf, der bereits von Zuschauern bevölkert ist. Fahnen flattern. Der Geruch von Schmiere und Staub liegt in der Morgenluft. Dutzende von Fahrern steigen auf ihre Räder - einige glänzende Maschinen frisch aus der Fabrik, andere in Hinterhofwerkstätten zusammengeflickt.\nEin Schuss hallt durch die Luft. Jubel bricht aus. Und die Räder beginnen sich zu drehen.\nSie fahren durch die Stadttore und hinaus aufs Land. Bauern machen eine Pause auf ihren Feldern. Kinder rennen am Straßenrand. Priester segnen sie. Zyniker spotten. Und doch, während der Staub hinter ihnen zurückbleibt, kommt in der Menge ein seltsames Gefühl auf: Dies fühlt sich an wie der Beginn von etwas Größerem."
 vikelas.611.g: "Jede Stadt soll das Rauschen des Fortschritts hören."
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.621.d: "Der Sieger des nationalen Radrennens hat mehr als nur die Ziellinie erobert - er hat die Fantasie der Nation erobert. Jetzt richten sich alle Augen auf das, wofür er steht."
 vikelas.621.f: "Die Zeitungen nennen ihn den \"Eisernen Reiter\". Geboren in einer Weberfamilie, mit zwölf Jahren Waise, mit sechzehn Fabrikarbeiter. Sein Sieg auf einem ramponierten Sicherheitsfahrrad - sorgfältig geflickt, geschrottet und geölt - war kein bloßer sportlicher Triumph. Er war ein Gleichnis. Menschenmengen singen seinen Namen. Maler skizzieren ihn. Kinder ahmen seine Körperhaltung nach. Aber nicht nur das, auch Ideologen nehmen ihn zur Kenntnis. Einige nennen ihn das Gesicht der Stärke der Arbeiterschaft. Andere sagen, er beweise die Vitalität der Nation. Die Presse streitet darüber, ob er ein Arbeiter, ein Patriot - oder etwas ganz anderes ist.\nDer Reiter selbst spricht wenig. Er lächelt, nickt und reitet."
 vikelas.621.g: "Machen Sie ihn zu einem Helden der Arbeiterklasse."
 vikelas.621.h: "Feiern Sie ihn als eine nationale Ikone."
 vikelas.621.i: "Machen Sie ihn zu einem Symbol des Fortschritts und des modernen Menschen."
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.622.d: "Während des nationalen Radrennens hat sich ein tragischer Unfall ereignet. Ein Fahrer ist tot, mehrere andere sind verletzt. Der Jubel ist verstummt."
 vikelas.622.f: "Ein Rad hat eine Spurrille erwischt. Ein Schrei, ein Aufprall, und dann ein Schrei. Die Zuschauer stürmten nach vorne, während die Fahrräder wie Dominosteine umkippten. Blut vermischte sich mit Staub. Helme zerbrachen. Knochen brachen. Ein junger Mann - siebzehn, ein Fabriklehrling - starb beim Aufprall. Die Zeitungen sind geteilter Meinung. Die einen nennen es einen notwendigen Preis des Fortschritts, die anderen beklagen die Rücksichtslosigkeit des öffentlichen Sports."
 vikelas.622.g: "Ehre die Gefallenen."
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.623.d: "Eine bestimmte Etappe des Rennens hat die Herzen der Öffentlichkeit erobert. Die Zuschauer sprechen nicht nur von einem Wettbewerb, sondern von einer Legende."
 vikelas.623.f: "Im Morgengrauen verschwanden die Reiter in den Hügeln. Was nun folgte, war kein Rennen mehr, sondern ein Test des Geistes. Ein Dutzend fiel zurück. Drei kollabierten. Einer stürzte in einer Haarnadelkurve, stand blutend auf und winkte Hilfe herbei. Aber einer fuhr durch den Nebel in die Herzen von Tausenden. Die ganze Nation spricht von nichts anderem."
 vikelas.623.g: "Die Straße soll sich über Generationen hinweg an seinen Einsatz erinnern."
 vikelas.623.h: "Geben Sie ein Gemälde des Augenblicks in Auftrag."
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.624.d: "Nach der letzten Etappe des Rennens sind Anschuldigungen laut geworden. Ein Fahrer wurde beim Schummeln erwischt - obwohl einige behaupten, er habe nur das getan, was alle tun, nur weniger diskret."
 vikelas.624.f: "Sie sagten, er habe hinter der Scheune die Fahrräder gewechselt. Andere sagen, dass er von einem versteckten Draht den Hügel hinaufgezogen wurde.'\n\nDie Fakten sind unklar. Was klar ist, ist dies: Der Fahrer war zu schnell. Spektakulär schnell. Zu frisch nach einem brutalen Anstieg. Seine Konkurrenten wüten. Die Zuschauer staunen. Die Presse wittert Blut. Auf einem Foto ist ein zweiter Mann in gleicher Kleidung zu sehen. Ein anderer Zeuge behauptet, er habe gesehen, wie der Fahrer während der Nachtetappe von einem Auto gestoßen wurde. Der Beschuldigte streitet alles ab und nennt es Neid und Politik."
 vikelas.624.g: "Disqualifizieren Sie den Fahrer und decken Sie den Betrug auf."
 vikelas.624.h: "Verdecken Sie es zum Wohle des Sports."
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.625.d: "Die diesjährige Rennsaison steht ganz im Zeichen einer erbitterten Rivalität. Zwei Fahrer - gleich stark, gegensätzlich im Stil - haben die Nation in zwei Lager gespalten."
 vikelas.625.f: "Der eine ist Feuer: rücksichtslos, kühn, von der Jugend verehrt. Er wirft seine Kappe in die Menge, lacht, während er in die Pedale tritt, und greift ohne Vorwarnung an.\nDer andere ist Eis: ruhig, berechnend, fast mathematisch. Er spart seine Kräfte, gewinnt in Sekundenschnelle und spricht nur, wenn es nötig ist.\n\nIhre Namen werden von den Dächern gerufen. Die Städte ergreifen Partei. Plakate werden in Rot oder Blau gedruckt. Schneider verkaufen Mützen in ihren Farben. Kinder ahmen ihre Haltung auf hölzernen Fahrrädern nach.\nDie Zeitungen sprechen von mehr als nur einer Ethnie. Sie sprechen von Charakter, von Philosophie, davon, wer die Menschen sein wollen. Und keiner der Fahrer gibt einen Zentimeter nach."
 vikelas.625.g: "Dies wird der Zeitungskultur zugute kommen."
 vikelas.625.h: "Nutzen Sie die Rivalität zum politischen Vorteil."
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.626.d: "Die diesjährige Rennsaison steht ganz im Zeichen einer erbitterten Rivalität. Zwei Fahrer - gleich stark, gegensätzlich im Stil - haben die Nation in zwei Lager gespalten."
 vikelas.626.f: "\"Sie fanden ihn in einer Dorfschmiede, den Hammer in der Hand, das Gesicht rußgeschwärzt, allein.\"\n\nEine falsch eingeschätzte Kurve, ein Knirschen von Schotter - und die Vordergabel brach. Sein Fahrrad klappte zusammen wie ein verwundeter Vogel. Die meisten hätten angehalten. Aber nicht er.\nEr humpelte bergab und schleppte den Rahmen kilometerweit. In einem abgelegenen Dorf fand er eine Schmiede. Keine Mechaniker. Kein Mannschaftswagen. Nur Blasebalg, Amboss und seine eigenen Hände.\nStundenlang arbeitete er - mit aufgekrempelten Ärmeln und zusammengebissenem Kiefer - und formte die Vorderradgabel aus dem Gedächtnis und nach Gefühl. Als die Offiziellen eintrafen, hielt er nur kurz inne, um sie anzustarren und zu sagen: \"Fassen Sie das nicht an.\nAcht Stunden hinter den Führenden. Keine Chance auf den Sieg. Doch entlang der Strecke jubelte die Menge - nicht dem Sieger zu, sondern demjenigen, der sich weigerte, anzuhalten."
 vikelas.626.g: "Eine inspirierende Geschichte."
 vikelas.626.h: "Genehmigung von Notreparaturen."
 vikelas.626.i: "Ehrt ihn!"
 vikelas.401.t: "Internationaler Fußballverband"
 vikelas.401.d: "Heute wurde der Internationale Fußballverband in [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName] gegründet. Sein vollständiger Name lautet Fédération Internationale de Football Association (FIFA)."
 vikelas.401.f: "Am 21. Mai 1904 unterzeichneten Delegierte aus sieben Nationen - Belgien, Dänemark, Frankreich, den Niederlanden, Spanien, Schweden und der Schweiz - eine Charta. Das Ziel: die Fußballregeln zu vereinheitlichen, internationale Spiele zu organisieren und das Spiel auf ein globales Niveau zu heben. Das war die Geburtsstunde der Fédération Internationale de Football Association - FIFA. In den ersten Jahrzehnten war die FIFA bescheiden: eine Teilzeitpräsidentschaft, Amateurspieler und regionale Streitigkeiten. Doch unter der Oberfläche wuchs eine globale Bewegung heran. England zögerte mit dem Beitritt, weil es die Einmischung aus dem Ausland fürchtete. Die Südamerikaner begannen, ihre eigenen Konföderationen zu gründen. 1924 und 1928 zeigten die olympischen Turniere die wahre Reichweite des Fußballs: 60.000 Zuschauer in Paris, die nicht Armeen, sondern Mannschaften anfeuerten."
 vikelas.401.g: "FIFA beitreten und den internationalen Wettbewerb unterstützen."
 vikelas.411.t: "Fußball-Weltmeisterschaft [TimeKeeper.GetCurrentDate.Format('y')]"
 vikelas.411.d: "Die FIFA hat entschieden, dass die diesjährige Weltmeisterschaft [SCOPE.sCountry('vikelas_fifa_host_scope').GetAltName('IN')] stattfinden wird. Nach der Vorrunde wird die Liste der Favoriten auf acht Mannschaften eingegrenzt."
 vikelas.411.f: "#V Die folgenden Nationalmannschaften haben sich für das Viertelfinale qualifiziert#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]"
 vikelas.411.g: "Möge sich das beste Team durchsetzen."
 vikelas.412.t: "Champions der Welt"
 vikelas.412.d: "Unsere Mannschaft hat auf der Weltbühne triumphiert und die besten Mannschaften aus allen Kontinenten besiegt. Im ganzen Land bricht ein Jubel aus!"
 vikelas.412.f: "In einem hitzigen Spiel gegen [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAltName('AKK')] hat sich unsere Mannschaft im Finale der Weltmeisterschaft [SCOPE.sCountry('vikelas_fifa_host_scope').GetAltName('IN')] durchgesetzt. Unsere Nationalmannschaft hat die goldene Trophäe geholt. Der Schlusspfiff hallte durch Radios, Cafés und Kasernen. Von den Bergarbeitern im Norden bis zu den Kaufleuten im Hafen brüllten die Menschen gemeinsam. Der Kapitän weint auf dem Podium. Eine neue Generation schaut zu und träumt."
 vikelas.412.g: "Wir sind die Champions."
 vikelas.413.t: "Silberner Ruhm [SCOPE.sCountry('vikelas_fifa_host_scope').GetAltName('IN')]"
 vikelas.413.d: "Unsere Fußballmannschaft hat das Finale erreicht - und scheiterte nur knapp am Ruhm. Im ganzen Land mischen sich Stolz und Herzschmerz gleichermaßen."
 vikelas.413.f: "Leider war das Beste unserer Mannschaft nicht gut genug. In einem nervenaufreibenden Spiel gegen [SCOPE.sCountry('vikelas_first_winner_team_scope').GetAltName('AKK')] zogen unsere Männer den Kürzeren. Wochenlang waren sie die Hoffnungsträger einer ganzen Nation. Auf schlammigen Feldern und bei sengender Hitze rannten sie, kämpften sie, glaubten sie. Spiel für Spiel wurden sie zu Legenden. Sie hielten ihre Köpfe hoch, als die andere Hymne gespielt wurde. Keine Tränen, nur Stille - und dann ein langsam ansteigender Beifall."
 vikelas.413.g: "Das wurde von uns gestohlen!"
 vikelas.414.t: "Der Traum endet früh"
 vikelas.414.d: "Unsere Nationalmannschaft ist bei der FIFA-Weltmeisterschaft [SCOPE.sCountry('vikelas_fifa_host_scope').GetAltName('IN')] frühzeitig ausgeschieden. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] besiegte im Finale [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]."
 vikelas.414.f: "Es gab Hoffnung - echte, greifbare Hoffnung. Siege wurden auf Fabrikhöfen bejubelt, Radiokommentare in Kirchen geflüstert, Kinder spielten Tore in Gassen nach. Die Mannschaft stand für mehr als nur Fußball: für Ehrgeiz, für Stolz, für den Glauben, dass wir über uns hinauswachsen können. Doch das letzte Spiel veränderte alles. Ein einziges Tor wurde kassiert. Ein ungesehenes Handspiel. Eine verpasste Chance. Jetzt ist der Traum vorbei, und die Welt geht weiter."
 vikelas.414.g: "Wir haben geglaubt. Das war genug."
