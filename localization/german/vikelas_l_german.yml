 notification_vikelas_autorace_grand_prix_information_place_notification_desc: "Unser [concept_vikelas_racer] konnte zwar keinen der ersten drei Plätze erringen, ist aber sicher angekommen und gewinnt #G 10#! Erfahrung. Unser [concept_vikelas_mechanic] gewinnt #G 5#! Erfahrung. Wir gewinnen #G 10#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]."
 notification_vikelas_autorace_endurance_race_first_place_notification_name: "Langstreckenrennen: Sieg"
 notification_vikelas_autorace_endurance_race_first_place_notification_desc: "Unser [concept_vikelas_racer] belegt den ersten Platz in einem Langstreckenrennen und erhält #G 50#! Erfahrung. Unser [concept_vikelas_mechanic] erhält #G 25#! Erfahrung. Wir erhalten #G 100#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]."
 notification_vikelas_autorace_endurance_race_information_place_notification_name: "Langstreckenrennen: Informationen"
 notification_vikelas_autorace_endurance_race_information_place_notification_desc: "Unser [concept_vikelas_racer] konnte zwar nicht gewinnen, ist aber sicher angekommen und gewinnt #G 20#! Erfahrung. Unser [concept_vikelas_mechanic] gewinnt #G 10#! Erfahrung. Wir gewinnen #G 30#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]."
 vikelas_mechanic_boost_button: "Mechanische Investition"
 vikelas_mechanic_boost_button_desc: "Um den Baufortschritt unseres neuen Rennwagens zu beschleunigen, können wir zusätzliche mechanische Investitionen tätigen. Dies kostet allerdings zusätzlich [Concept('concept_vikelas_mechanic','$concept_vikelas_mechanical_innovation$')]."
 vikelas_mechanic_boost_modifier: "Mechanische Investition"
 vikelas_mechanic_improvement_cost_modifier: "Kosten für die Verbesserung des Rennwagens"
 je_vikelas_mechanic_engine: "Rennwagenmotor verbessern"
 je_vikelas_mechanic_engine_reason: "Unser Mechaniker [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] arbeitet unermüdlich an einem neuen Motor, der die Zuverlässigkeit und Geschwindigkeit des Autos verbessern wird. Die Fertigstellung hängt in erster Linie von den Eigenschaften und der Erfahrung des Mechanikers ab."
 je_vikelas_mechanic_safety: "Verbessern Sie die Sicherheit von Rennwagen"
 je_vikelas_mechanic_safety_reason: "Unser Mechaniker [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] verbessert die Sicherheit des Fahrzeugs. Die Fertigstellung hängt in erster Linie von den Eigenschaften und der Erfahrung des Mechanikers ab."
 je_vikelas_mechanic_body: "Verbesserung der Rennwagenkarosserie"
 je_vikelas_mechanic_body_reason: "Unser Mechaniker [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] baut eine neue Karosserie für das Auto, wodurch es schneller und vielleicht auch etwas sicherer wird. Die Fertigstellung hängt in erster Linie von den Eigenschaften und der Erfahrung des Mechanikers ab."
 vikelas_mechanic_progress_bar_at_full_tt: "Die Leiste 'Rennwagen verbessern' hat #variable 100 %#! erreicht."
 je_vikelas_endurance_race: "Langstreckenrennen"
 je_vikelas_endurance_race_reason: "Derzeit findet in mehreren Staaten unseres Landes ein Langstreckenrennen statt. An dem Rennen nehmen Rennfahrer aus allen rennsportbegeisterten Ländern teil. Ein Gastgeberland hat einen kleinen Vorteil und erhält zusätzliche Veranstaltungen. Anders als bei Grand-Prixs ist Zuverlässigkeit wichtiger als Geschwindigkeit, da die Autos eine lange Distanz durchhalten müssen. Auch das Risiko eines Motorschadens ist größer als bei einem tödlichen Unfall."
 je_vikelas_endurance_race_success: "[GetPlayer.GetName] hat mindestens #ORANGE 8 Endurance Race Progress#!. gesammelt"
 je_vikelas_endurance_race_goal: ""
 vikelas.501.t: "Der [ROOT.GetCountry.GetAdjectiveNoFormatting] Automobile Club"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] gilt als leidenschaftlicher Autofahrer und hat aus diesem Anlass mit Gleichgesinnten einen Automobilclub gegründet. Dieser soll die heimische Autoindustrie stärken und nationale Autoevents organisieren."
 vikelas.501.f: "Bereits Mitte der 1890er Jahre veranstaltete der 1895 als erster Automobilclub der Welt gegründete Automobile Club de France (ACF) einmal jährlich ein Rennen, welches den Höhepunkt der Saison darstellte. Dabei handelte es sich um so genannte ‚Stadt-zu-Stadt‘-Rennen auf öffentlichen Landstraßen, bei denen die Teilnehmer in zeitlichen Abständen einzeln auf die Strecke geschickt wurden. Einer der Auslöser für die Gründung des ACF war der Abstieg Albert de Dions beim Rennen Paris-Rouen 1894. In den Folgejahren begann eine rasante Entwicklung, wobei immer leistungsstärkere Fahrzeuge die Gefahren des Motorsports enorm erhöhten. Der ACF setzte daher 1901 erstmals Regeln um, welche als erstes Motorsportreglement der Welt gelten können. Eine zentrale Neuerung war dabei die Einteilung in Kategorien, die für alle vom ACF unterstützten Veranstaltungen gelten mussten. Die dadurch erreichte Gewichtsbeschränkung sollte zunächst dazu beitragen, die immense Zahl an Reifendefekten durch Überladung zu reduzieren."
 vikelas.501.g: "Ein Sport voller Nervenkitzel!"
 vikelas.502.t: "Erstes Grand-Prix-Rennen"
 vikelas.502.d: "Der Motorsport erlebt eine revolutionäre Wendung: Mit den Grand-Prix-Rennen werden in allen motorsportbegeisterten Nationen nacheinander internationale Rennen ausgetragen. Damit ist eine internationale Meisterschaft geboren. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] hat alle Nationen mit einem Automobilclub eingeladen, im kommenden Jahr an ihrem ersten Grand-Prix teilzunehmen."
 vikelas.502.f: "Die jährlichen Rennen um den Gordon-Bennett-Cup waren von 1900 bis 1905 der erste Versuch, eine Automobil-Weltmeisterschaft auszutragen. Angesichts ständig steigender Geschwindigkeiten erließ die ACF 1902 erstmals technische Vorschriften in Form einer sogenannten Rennformel, an die sich die teilnehmenden Autos halten mussten. Trotzdem nahm die Unfallhäufigkeit immer weiter zu, sodass ab 1903 nur noch Rundstreckenrennen auf abgesperrten Kursen ausgetragen werden durften. Als Nachfolger der Gordon-Bennett-Rennen lief das von der ACF organisierte Hauptrennen 1906 erstmals unter dem Namen Grand-Prix. Erster Grand-Prix-Sieger der Geschichte war der ungarische Fahrer Ferenc Szisz auf Renault."
 vikelas.502.g: "Es gibt also etwas zu gewinnen?"
 vikelas.503.t: "Association Internationale des Automobile Clubs Reconnus"
 vikelas.503.d: "Heute wurde der Internationale Automobilverband 1930 gegründet. Sein vollständiger Name lautet Association Internationale des Automobile Clubs Reconnus (AIACR)."
 vikelas.503.f: "Damit die Automobilhersteller an allen internationalen Rennen teilnehmen konnten, wurde es notwendig, die technischen und sportlichen Bestimmungen, die bis dahin der französische Automobilclub für seine Rennen in Form der jeweiligen Grand-Prix-Formel eigenständig vorgab, durch einen Internationalen Automobilverband länderübergreifend regeln zu lassen. Der Verband wurde am 20. Juni 1904 in Paris als Association Internationale des Automobile Club Reconnus (AIACR) gegründet, nachdem der Gründungsbeschluss wenige Tage zuvor von den Automobilclubs der bedeutendsten Rennsportnationen im Rahmen des Gordon-Bennett-Pokals in Bad Homburg gefasst worden war. Die AIACR sollte sich nach dem Zweiten Weltkrieg in FIA umbenennen."
 vikelas.503.g: "Ab sofort ist der Automobilrennsport international!"
 vikelas.504.t: "Neue Grand-Prix-Rennstrecke"
 vikelas.504.d: "Ein weiteres Mitglied der AIACR hat eine offizielle Grand-Prix-Strecke gebaut. Im jährlichen Rennkalender gibt es nun #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V Grand-Prix-Strecken#!."
 vikelas.504.f: "\"Autorennen, Stierkämpfe und Bergsteigen sind die einzigen echten Sportarten … alle anderen sind Spiele.\" -Ernest Hemingway"
 vikelas.504.g: "Reservieren Sie die VIP-Plätze auf der Tribüne."
 vikelas.505.t: "Standort des Rennwagenherstellers"
 vikelas.505.d: "[GetPlayer.GetName] verfügt mit [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] über sein erstes Serienrennteam. Die Autofabrik in [SCOPE.sState('vikelas_team_state').GetName] erfreut sich aufgrund der etablierten Marke mittlerweile großer Nachfrage."
 vikelas.505.f: "Mit der langsamen Entwicklung vom männlichen Einzelfahrer zum professionellen Rennteam mit Werksfahrern veränderte sich der Motorsport nachhaltig. Amateure mit selbstgebauten Autos wurden zur Seltenheit. Zwar kam es noch immer vor, dass exzentrische Aristokraten mit Lizenzen anderer Autohersteller den Nervenkitzel suchten, doch zum eigentlichen Mittelpunkt des Motorsports wurde die Autoentwicklung."
 vikelas.505.g: "Wir können jetzt unsere eigenen Rennautos entwerfen!"
 vikelas.506.t: "Rennwagenmechaniker"
 vikelas.506.d: "Chefingenieur Dr. [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName] hat aus dem Team [SCOPE.sCharacter('gaudi_engineer_scope').GetHerHis] einen hervorragenden Assistenten ausgewählt, der als Mechaniker für das neu gegründete Rennteam fungieren könnte: [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] hat sich auf den Bereich... spezialisiert."
 vikelas.506.f: "Mechaniker können Verbesserungen in den drei Bereichen eines Autos vornehmen: Motor, Sicherheit und Karosserie. Eine Spezialisierung hilft dabei, Modernisierungen in einem bestimmten Bereich doppelt so schnell durchzuführen. Grundsätzlich – aber nicht immer – gilt, dass Motoren die Zuverlässigkeit (und Geschwindigkeit) erhöhen, Sicherheitsausbauten die Sicherheit und Karosserien die Geschwindigkeit (und Sicherheit) erhöhen."
 vikelas.506.h: "Motor."
 vikelas.506.i: "Sicherheit."
 vikelas.506.j: "Körper."
 vikelas.511.t: "Das große [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]-Rennen"
 vikelas.511.d: "Die [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] hat in ihrer aktuellen Wochenausgabe ein großes Autorennen angekündigt. Das Rennen von Stadt zu Stadt soll von [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] nach [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] führen. Auch aus dem Ausland werden zahlreiche Rennfahrer erwartet."
 vikelas.511.f: "Die Anfangszeit des Motorsports war geprägt von sogenannten Gentleman-Fahrern, die mit ihrem Mechaniker, der oft auch als Chauffeur fungierte, in selbstgebauten Autos an Rennen von Stadt zu Stadt teilnahmen. Dieses Rennformat wurde oft von Zeitungen und Automobilclubs beworben, organisiert und unterstützt. Da die Mechaniker oft noch in den Kinderschuhen steckten, war es wichtiger, überhaupt am Ziel anzukommen. Tödliche Unfälle wie der von Marcel Renault beim Rennen Paris-Madrid führten dazu, dass diese Organisationsform nur eine Übergangsphase in der Geschichte des Rennsports darstellte."
 vikelas.511.g: "Bereiten Sie sich in drei Monaten auf die Veranstaltung vor."
 vikelas.512.t: "Rennteilnahme"
 vikelas.512.d: "Das bevorstehende [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]-Rennen in [SCOPE.sCountry('vikelas_race_country').GetName] hat zu Spekulationen geführt, ob auch der beste Rennfahrer unseres Landes, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], teilnehmen wird."
 vikelas.512.g: "Eine hervorragende Gelegenheit!"
 vikelas.512.h: "Das ist zu gefährlich."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] wird sich in drei Monaten auf das Rennen vorbereiten."
 vikelas.513.t: "Freie Fahrt"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] hat Glück: [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] kann auf offener Straße Vollgas geben. Der Motor geht aus, die Kurven sind geschmeidig. Beste Voraussetzungen für einen Rennfahrer."
 vikelas.513.f: "\"Wenn Geschwindigkeit im Blut liegt, muss man fahren, um zu leben.\" -Rudolf Carraciola"
 vikelas.513.g: "Fantastisch!"
 vikelas.514.t: "Wunderschöne, unberührte Natur"
 vikelas.514.d: "Während [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] von Stadt zu Stadt fährt, fällt [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] die unberührte Natur in der Gegend auf, durch die [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] fährt. Vielleicht sollte [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] ein Souvenir mitnehmen?"
 vikelas.514.f: "In der Frühphase des Motorsports bestand ein besonderer Reiz darin, durch möglichst wilde und unberührte Landschaften zu fahren, die den Fahrer vor Herausforderungen stellten. Die frühen Rennstrecken standen deshalb auch in der Kritik, da sie angeblich geringere fahrerische Fähigkeiten und Anpassungsanforderungen erforderten. Natürlich konnten auch einige abgelegene Täler, Strände und Berggebiete Überraschungen bieten."
 vikelas.514.g: "Wir müssen ein Rennen gewinnen!"
 vikelas.514.h: "Sammle ein paar Pflanzen."
 vikelas.514.i: "Sammle ein paar Steine."
 vikelas.515.t: "Zucker im Tank"
 vikelas.515.d: "Bei einem kurzen Stopp bemerkt [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName], dass sich auch das Auto von [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHis]-Konkurrent [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] in der Nähe befindet. Offenbar ist das Auto völlig unbeobachtet."
 vikelas.515.f: "\"Wer nicht betrügt, hat es nicht versucht.\""
 vikelas.515.g: "Eine süße Rache."
 vikelas.516.t: "Eine kleine Hilfe für einen Freund?"
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] steht gerade gut, sieht aber am Straßenrand das rauchende Auto von [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]. Vielleicht sollte [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] mal nachschauen, ob alles in Ordnung ist?"
 vikelas.516.f: "Motorverletzungen und Unfälle waren in der Anfangszeit des Rennsports an der Tagesordnung. Während in späteren Zeiten jedoch Streckenposten auf abgesperrten Strecken zur Verfügung standen, konnte eine Panne bei Langstreckenrennen ohne Beobachter gefährlich werden. Bei der Mille Miglia im Apennin sah man in den 1930er-Jahren noch Wölfe. Deshalb ist Hilfe unter Rennfahrerkollegen oft selbstverständlich."
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] sollte anhalten und helfen."
 vikelas.516.h: "Haha! Idioten!"
 vikelas.517.t: "Motorprobleme"
 vikelas.517.d: "Irgendetwas stimmt mit dem Motor nicht - auch [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] kann es sich nicht erklären. Eine Diagnose blieb bisher erfolglos. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] muss das Rennen möglicherweise mit reduzierter Geschwindigkeit fortsetzen."
 vikelas.517.f: "Motorprobleme gibt es in jeder Form des Motorsports – damals wie heute. Es gab zahlreiche Fahrer, die ein Rennen vorzeitig beenden mussten, weil sie in Führung lagen. Nach aktuellem Stand könnte [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] das Rennen zwar noch beenden, aber nur, wenn er langsamer fährt, was den Sieg deutlich schwieriger machen würde."
 vikelas.517.g: "Nutzen Sie alle verfügbaren mechanischen Feinabstimmungsmaßnahmen."
 vikelas.517.h: "So muss das Auto das Rennen überstehen."
 vikelas.518.t: "Nägel"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] konnte sich einen gewissen Vorsprung auf das restliche Feld erarbeiten. Vielleicht kann [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] seine Siegchancen verbessern und dem Rest des Feldes das Leben schwer machen?"
 vikelas.518.f: "\"Ich weiß, dass er betrogen hat, weil ich betrogen habe und er mich geschlagen hat.\""
 vikelas.518.g: "Hol die Nägel, Muttley."
 vikelas.518.h: "Von derartigen unsportlichen Verhaltensweisen nehmen wir Abstand."
 vikelas.519.t: "Disqualifikation"
 vikelas.519.d: "Leider kam das sportliche Fehlverhalten von [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] ans Licht. Die Rennkommission schloss [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim] deshalb umgehend von weiteren Rennen aus."
 vikelas.519.f: "\"Gemäß der Bestimmungen zum Stadtrennen gemäß Paragraph 12 Absatz 6 Zeile 9 hat der Teilnehmer gegen die allgemeinen Regeln verstoßen und wird deshalb vorzeitig ausgeschlossen. Einspruch ist nicht möglich.\""
 vikelas.519.g: "Disqualifiziert? Das ist unfair!"
 vikelas.520.f: "#V Endergebnisse#!\n\nErster Platz: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] aus [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nZweiter Platz: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] aus [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nDritter Platz: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] aus [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.520.g: "Sekt!"
 vikelas.521.t: "Sieg für [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] belegte im Stadt-zu-Stadt-Rennen in [SCOPE.sCountry('vikelas_race_country').GetName] den ersten Platz. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] fuhr einen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.521.g: "Sekt!"
 vikelas.522.t: "2. Platz für [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] belegte im Stadt-zu-Stadt-Rennen in [SCOPE.sCountry('vikelas_race_country').GetName] den zweiten Platz. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] fuhr einen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.522.g: "Bis zum nächsten Mal!"
 vikelas.523.t: "3. Platz für [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] belegte im Stadt-zu-Stadt-Rennen in [SCOPE.sCountry('vikelas_race_country').GetName] den dritten Platz. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] fuhr einen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.524.t: "Stadt-zu-Stadt-Rennen beendet"
 vikelas.524.d: "Das große Stadt-zu-Stadt-Rennen in [SCOPE.sCountry('vikelas_race_country').GetName] ist vorbei und die Sieger stehen fest. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] fuhr [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]. Zwar konnten wir keine gute Platzierung erreichen, aber immerhin sind Auto und Fahrer wohlbehalten angekommen."
 vikelas.531.t: "Langstreckenrennen"
 vikelas.531.d: "[GetPlayer.GetName] hat ein großes Langstreckenrennen organisiert und Rennfahrer aus der ganzen Welt zur Teilnahme eingeladen."
 vikelas.531.f: "Die ersten Autorennen zu Beginn des 20. Jahrhunderts waren Distanzrennen mit möglichst großer Reichweite. Sie sollten die Geschwindigkeit und Zuverlässigkeit der Rennwagen testen. Dominierte in der Anfangszeit Frankreich den Rennsport, so ging man bald zum Grand-Prix-Rennsport über. Das änderte nichts daran, dass es weiterhin bedeutende internationale Langstreckenrennen gab. Das traditionsreichste Rennen war die Targa Florio auf Sizilien. Von 1906 bis 1977 wurde sie meist im Mai als bedeutende internationale Veranstaltung, teilweise mit WM-Status, ausgetragen. Nach der Targa Florio galten die Tausend Meilen (Mille Miglia) als Klassiker unter den Straßenrennen (in den 1950er-Jahren kam die Carrera Panamericana hinzu) und Grundlage für den Begriff ,Gran Turismo‘ (GT), der schnelle Tourensportwagen für Langstreckenrennen bezeichnet, wie sie beispielsweise von Ferrari eigens für die MM entwickelt wurden."
 vikelas.531.g: "Wir sehen uns an der Ziellinie!"
 vikelas.533.t: "Reifenschaden"
 vikelas.533.d: "Mitten im Rennen führt ein geplatzter Reifen zu einer Vollbremsung von [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]. Der Fahrer blieb trotz des Zwischenfalls unverletzt und überzeugte durch sein besonnenes Handeln, verlor jedoch wichtige Zeit."
 vikelas.533.f: "Die Mille Miglia des Jahres 1931 war geprägt von massivem Reifenverschleiß. Vor der Ankunft in Rom musste Arcangeli neunmal einen Reifen wechseln. Auch Nuvolari hatte mehrere Reifenpannen, dennoch führte er in Rom mit zwei Minuten vor Caracciola. Auf der Rückfahrt an die Adria hielten die Alfa Romeos trotz der Reifenprobleme ihr flottes Tempo. Zwischendurch führte Borzacchini die Konkurrenz mit 18 Minuten Vorsprung an. Entlang der Mittelmeerküste Richtung Norden hatte Campari vier Minuten Vorsprung auf den wiedererstarkten Arcangeli. Die Führung wechselte innerhalb der Alfa Romeos mehrfach und die Italiener schienen nach zwei Dritteln der Renndistanz alles im Griff zu haben. Das lag auch an einem dichten Netz an Servicestationen, das viele Reifenwechsel ermöglichte. Die Entscheidung fiel auf den letzten 80 Kilometern, als starker Regen einsetzte und die Alfa Romeos mit erneut abgefahrenen Reifen Unfälle hatten."
 vikelas.533.g: "Pech."
 vikelas.534.t: "Der Bahnübergang"
 vikelas.534.d: "Während der Verfolgung eines anderen Fahrers ertönt plötzlich ein Warnton: Vor beiden Autos senkt sich eine Bahnschranke. Das vordere Auto rast durch. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] muss entscheiden, ob er anhält oder das Überqueren riskiert, bevor der Gegner zu viel Platz gewinnt."
 vikelas.534.f: "Die Fahrer der Mille Miglia neigten zu waghalsigen Manövern, wie etwa Hans Hermann, der 1954 startete und mit seinem Wagen unter einer sich schließenden Bahnschranke hindurchfuhr, wobei er und sein Beifahrer den Kopf einziehen mussten."
 vikelas.534.g: "Riskiere es!"
 vikelas.534.h: "Das ist zu tollkühn!"
 vikelas.538.t: "Wölfe und Revolver"
 vikelas.538.d: "Bei einer nächtlichen Bergfahrt kommt das Rennteam von der Strecke ab. Plötzlich ertönt ein Geheul. Offenbar treiben sich in der Nähe Wölfe herum."
 vikelas.538.f: "\"Wir gerieten in einen Schneesturm und wurden von Wölfen gejagt. Sie wurden jedoch durch Schüsse aus dem Revolver, den ich immer unter dem Sitzkissen aufbewahrte, und durch die Ankunft einer Gruppe von Straßenarbeitern, die mit Fackeln und Gewehren bewaffnet waren, in die Flucht geschlagen.\" -Enzo Ferrari"
 vikelas.538.g: "Töte die Wölfe."
 vikelas.538.h: "Fahren Sie großzügig in der Gegend umher."
 vikelas.538.i: "Diese Entdeckung ist viel wichtiger als ein dummes Wettrennen."
 vikelas.539.t: "Rennwagen fährt in Zuschauer!"
 vikelas.539.d: "Ein schrecklicher Unfall ereignete sich, als ein Rennwagen während des Rennens von der Strecke abkam und in die Zuschauermenge fuhr. Die Motorsportwelt ist erschüttert und die Debatte um Sicherheitsstandards flammt erneut auf."
 vikelas.539.f: "Seit der ersten Mille Miglia im Jahr 1927 war die Veranstaltung trotz der zahlreichen Zuschauer an den Straßenrändern von Unfallkatastrophen verschont geblieben. Das änderte sich am 3. April 1938 um 16:30 Uhr. Zu diesem Zeitpunkt rasten die beiden Genueser Angelo Mignanego und sein Co-Pilot Dr. Luigi Bruzzo mit ihrem Lancia Aprilia entlang der Viale Berti Pichat in Bologna. Bei einer Geschwindigkeit von knapp 100 km/h verlor der unerfahrene Mignanego auf den dort verlegten Straßenbahnschienen die Kontrolle über den Wagen. Der Lancia prallte zunächst gegen einen Baum und anschließend in eine große Gruppe von Zuschauern. Während die beiden Wageninsassen nahezu unverletzt blieben, starben bei dem Crash zehn Menschen, darunter sieben Kinder. 26 Zuschauer wurden zum Teil schwer verletzt. Bei einem weiteren Unfall in Stanghella starb ein 12-jähriges Mädchen."
 vikelas.539.g: "Ein schwarzer Tag für den Rennsport."
 vikelas.540.t: "Neuer Durchschnittsgeschwindigkeitsrekord"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] hat eine beispiellose Durchschnittsgeschwindigkeit im Langstreckenrennen erreicht. Der Rekord wird als Meilenstein in die Geschichte des Motorsports eingehen."
 vikelas.540.f: "Mit atemberaubender Präzision und technischer Meisterschaft erreichte [GetPlayer.GetCustom('vikelas_race_team_name_type')] eine Durchschnittsgeschwindigkeit, die zuvor für unmöglich gehalten wurde. Der Rekord wird lange als Höhepunkt dieser goldenen Ära des Motorsports gelten."
 vikelas.545.t: "Fan-Treffen!"
 vikelas.545.d: "Während des Langstreckenrennens zwischen zwei Städten versammelte sich eine jubelnde Menge, um [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] zu feiern, der an ihrer Stadt vorbeifuhr. Dieses Ereignis markiert den Aufstieg des Motorsports zu einer öffentlichen Sensation."
 vikelas.545.f: "Die Straßen waren gesäumt von Menschen, die sich drängten, um einen Blick auf das vorbeirasende Auto zu erhaschen. Kinder schwenkten Fahnen und Erwachsene riefen den Namen des Fahrers, dessen Können und Mut sie inspirierten. Als das Auto anhielt, überkam ihn eine Welle der Begeisterung. Blumen, Applaus und Jubel begleiteten den kurzen Stopp, bevor der Fahrer wieder losfuhr. Es war ein Moment, der in den Herzen der Menschen eine Leidenschaft für Geschwindigkeit und Technologie entfachte – ein Vorgeschmack darauf, was Motorsport in den kommenden Jahrzehnten bedeuten würde."
 vikelas.545.g: "Rennen werden populär."
 vikelas.541.t: "Ausdauerrennen endet"
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] aus [SCOPE.sCountry('vikelas_first_winner_scope').GetName] gewann das prestigeträchtige Langstreckenrennen und auch die Herzen der Zuschauer."
 vikelas.541.f: "Die letzten Kilometer waren ein wahres Spektakel: Staub wirbelte über die Strecke, die Motoren dröhnten und die Aufregung war greifbar. Als der Sieger schließlich die Ziellinie überquerte, brach tosender Jubel aus. Sein Auto, übersät mit den Spuren eines erbitterten Rennens, wurde zum Symbol seines Siegeswillens. Die Fans trugen ihn auf ihren Schultern, während die Menge den Moment feierte. Mit diesem Triumph wurde [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] zu einer der wichtigsten Persönlichkeiten im Motorsport und sein Rennteam [GetPlayer.GetCustom('vikelas_race_team_name_type')] zu einer hoch angesehenen Marke."
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "Großer Preis von [GetPlayer.GetName]"
 vikelas.551.d: "Die Rennsaison hat [GetPlayer.GetNameNoFormatting] erreicht. Zahlreiche Rennfahrer und ihre Rennteams sind bereits angereist, um sich auf den Grand-Prix vorzubereiten, der bald in unserem Land stattfinden wird."
 vikelas.551.f: "\"Rennen zu fahren bedeutet zu leben. Der Rest ist einfach nur warten.\" -Rudolf Carraciola"
 vikelas.551.g: "Möge der Schnellste gewinnen."
 vikelas.552.t: "Schnellste Runde"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] hat im Renntraining die schnellste Runde gefahren. Das sind hervorragende Voraussetzungen für das eigentliche Rennen."
 vikelas.552.f: "\"Schon vor dem Start war mir der Sieg sicher.\" -Ettore Bugatti"
 vikelas.553.t: "Ölteppich"
 vikelas.553.d: "Während des Grand-Prix-Rennens geriet [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] in den Ölteppich eines Unfallfahrzeugs und kam von der Straße ab. Fahrer und Fahrzeug konnten zwar weiterfahren, verloren im aktuellen Rennen jedoch viel Zeit."
 vikelas.553.f: "\"Ich baue Autos zum Fahren. Nicht zum Anhalten.\" -Ettore Bugatti"
 vikelas.553.g: "Oh nein!"
 vikelas.554.t: "Regen"
 vikelas.554.d: "Das Grand-Prix-Rennen wurde von einer plötzlich einsetzenden Regenfront überrascht. Einige Fahrer hielten an, um ihre Ausrüstung zu wechseln. Für [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] stellt sich die Frage, ob [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] das Rennen rücksichtslos zu Ende fahren oder sicherheitshalber langsamer fahren sollte."
 vikelas.554.f: "\"Fürchte dich vor nichts. Glaube nur.\" -Armand Peugeot"
 vikelas.554.g: "Das bringt einen Fahrer nicht aus der Bahn!"
 vikelas.554.h: "Reduzieren Sie das Tempo."
 vikelas.555.t: "Überholmanöver"
 vikelas.555.d: "Eine einmalige Chance ergibt sich, als [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] sich [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], einem Rennfahrer aus [SCOPE.sCountry('vikelas_race_country_scope').GetName], nähert. Soll [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] ein Überholmanöver versuchen?"
 vikelas.555.f: "\"Das perfekte Rennauto überquert als Erster die Ziellinie und zerfällt dann in seine Einzelteile.\" -Ferdinand Porsche"
 vikelas.555.g: "Forza!"
 vikelas.555.h: "Das ist zu riskant."
 vikelas.556.t: "Überholmanöver gelingt"
 vikelas.556.d: "Das Überholmanöver war ein voller Erfolg. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] liegt vorn und hat einen Geschwindigkeitsvorteil."
 vikelas.556.f: "\"Wenn ich einen Alfa Romeo vorbeifahren sehe, ziehe ich meinen Hut.\" - Henry Ford"
 vikelas.556.g: "Hurra!"
 vikelas.557.t: "Überholmanöver misslingt"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] gelang das Überholmanöver nicht. Der Gegner wehrte sich erfolgreich und unser Rennfahrer verlor viel Zeit."
 vikelas.557.f: "\"Es ist Pech, aber es gehört zum Spiel. Ich habe mein Bestes gegeben, und da ich verloren habe, bin ich für den Mann, der den Preis ausgesucht hat.\" - Ralph DePalma"
 vikelas.557.g: "Schade."
 vikelas.558.t: "Heimpublikum motiviert Rennfahrer"
 vikelas.558.d: "Beim Grand-Prix von [GetPlayer.GetNameNoFormatting] gilt [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] als Lokalmatador und erhält besonders viel Unterstützung vom Publikum. Das motiviert den Rennfahrer enorm!"
 vikelas.558.f: "\"Niemand erinnert sich daran, wer den zweiten Platz belegt hat, und das werde ich nie sein.\" -Enzo Ferrari"
 vikelas.558.g: "Großartig!"
 vikelas.559.t: "Autorennen-Meisterschaft"
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag] dominierte diese Rennsaison und gewann die Automeisterschaft."
 vikelas.559.f: "#V Endergebnisse#!\n\nFirst Platz: [SCOPE.sCountry('vikelas_first_winner_scope').GetName], [SCOPE.GetValue('vikelas_first_winner_points_scope')] Punkte, [SCOPE.GetValue('vikelas_first_winner_victories_scope')] Siege\nZweiter Platz: [SCOPE.sCountry('vikelas_second_winner_scope').GetName], [SCOPE.GetValue('vikelas_second_winner_points_scope')] Punkte, [SCOPE.GetValue('vikelas_second_winner_victories_scope')] Siege\nDritter Platz: [SCOPE.sCountry('vikelas_third_winner_scope').GetName], [SCOPE.GetValue('vikelas_third_winner_points_scope')] Punkte, #!\n\nFirst0 Siege\nVierter Platz: #!\n\nFirst1, #!\n\nFirst2 Punkte, #!\n\nFirst3 Siege\nFünfter Platz: #!\n\nFirst4, #!\n\nFirst5 Punkte, #!\n\nFirst6 Siege"
 vikelas.559.g: "Spielen Sie jetzt Bizet."
 vikelas.559.h: "Ich bin nicht an Statistiken interessiert."
 vikelas.559.tt: "Jährliche Statistiken zur Automobilmeisterschaft werden nicht mehr angezeigt."
 vikelas.561.t: "Grand-Prix von [GetPlayer.GetName] endet"
 vikelas.561.d: "Das Grand-Prix-Rennen ist vorbei und die Gewinner wurden ausgewählt. Der Gewinner des [GetPlayer.GetName]-Hauptpreises ist [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]. Das Rennereignis wird der Bevölkerung noch lange in Erinnerung bleiben."
 vikelas.561.f: "#V Endergebnisse#!\n\nFirst Platz: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] aus [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nZweiter Platz: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] aus [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nDritter Platz: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] aus [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.561.g: "Sekt!"
 vikelas.571.t: "Die ersten 24 Stunden von Le Mans"
 vikelas.571.d: "Im Jahr 1923 fanden die ersten 24 Stunden von Le Mans statt, die sich schnell zu einem der prestigeträchtigsten Motorsportereignisse entwickelten und Fahrer und Hersteller aus der ganzen Welt anzogen."
 vikelas.571.f: "Am 26. und 27. Mai 1923 fanden die ersten 24 Stunden von Le Mans statt, organisiert vom Automobile Club de l'Ouest. Auf der 17,3 Kilometer langen Strecke in der Region Sarthe konnten 33 Fahrzeuge antreten. Die Bedingungen waren anspruchsvoll: Regen, schlammige Straßen und eine Strecke, die durch die Stadt Le Mans und die umliegenden Landstraßen führte. Der Sieg ging an André Lagache und René Léonard, die in einem Chenard & Walcker Sport eine Distanz von 2.209 Kilometern in 24 Stunden zurücklegten. Dieses Rennen markierte den Beginn einer Tradition, die bis heute Innovation und Ausdauer im Motorsport feiert."
 vikelas.571.g: "24 Stunden? Das ist verrückt!"
 vikelas.572.t: "Die Geburt der Targa Florio"
 vikelas.572.d: "1906 wurde die Targa Florio ins Leben gerufen, ein spektakuläres Rennen, das auf den kurvenreichen Straßen Siziliens ausgetragen wurde. Organisiert von Vincenzo Florio rückte es die Region in den Mittelpunkt der Motorsportwelt."
 vikelas.572.f: "Am 6. Mai 1906 fand die erste Targa Florio statt, ein Langstreckenrennen, das die steilen Bergstraßen und malerischen Dörfer Siziliens in eine anspruchsvolle Rennstrecke verwandelte. Organisiert von Vincenzo Florio, einem Motorsport-Enthusiasten, erfüllte die Veranstaltung seine Vision einer sportlichen Herausforderung. Die Strecke war 446 Kilometer lang, aufgeteilt in drei Runden zu je 148 Kilometern. Der Sieg ging an Alessandro Cagno, der einen Itala fuhr und die Ziellinie mit einer Durchschnittsgeschwindigkeit von 46,8 km/h überquerte. Die Targa Florio wurde schnell zu einem Symbol für Mut, Können und die Leidenschaft für Geschwindigkeit."
 vikelas.572.g: "Die Targa Florio begründet eine Tradition"
 vikelas.573.t: "Das erste Semmering-Berg-Rennen"
 vikelas.573.d: "1899 fand das erste Bergrennen am Semmering statt, bei dem die Grenzen der damaligen Automobiltechnik und des fahrerischen Könnens ausgelotet wurden. Dieses Ereignis markierte einen wichtigen Meilenstein in der Geschichte des Motorsports."
 vikelas.573.f: "Am 27. August 1899 fand das erste Semmering-Bergrennen statt, organisiert vom Österreichischen Automobilclub. Die 9,8 Kilometer lange Strecke von Klamm am Semmering bis zum Gebirgspass forderte die frühen Automobile und ihre Fahrer bis an ihre Grenzen. Mit Steigungen von bis zu 7 % und scharfen Kurven war das Rennen eine Prüfung sowohl der Technik als auch des Mutes. Der Sieg ging an Graf Jenő Zichy, der ein Mors-Automobil fuhr und die Strecke mit einer Durchschnittsgeschwindigkeit von 22,2 km/h bewältigte. Das Rennen zog ein großes Publikum an und legte den Grundstein für die Tradition des Bergrennens in Europa."
 vikelas.573.g: "Das Bergrennen begeistert die Massen."
 vikelas.581.t: "Neuer Rennwagenmotor"
 vikelas.581.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Der Motor wurde verbessert. Das neueste Rennwagenmodell verwendet jetzt einen #V Sechszylindermotor#!.. Das neue Auto trägt jetzt die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.581.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Der Motor wurde verbessert. Im neuesten Rennwagenmodell kommt nun ein #V Vierzylinder-Kompressormotor zum Einsatz#!. Das neue Auto trägt nun die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.581.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Der Motor wurde verbessert. Im neuesten Rennwagenmodell kommt nun ein #V Achtzylinder-Kompressormotor zum Einsatz#!. Der neue Wagen trägt nun die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.581.f: "\"Ich baue Motoren und befestige Räder daran.\" -Enzo Ferrari"
 vikelas.581.g: "Forza!"
 vikelas_new_engine_tt: "Der aktuelle Motor wird verbessert."
 vikelas.582.t: "Neue Sicherheitseinrichtungen für Rennfahrzeuge"
 vikelas.582.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Verbesserte Sicherheitseinrichtungen. Das neueste Sicherheitszubehör für Rennwagen ist ein #V Rückspiegel#!.. Das neue Auto trägt jetzt die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.582.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Verbesserte Sicherheitseinrichtungen. Das neueste Sicherheitszubehör für Rennwagen sind #V hydraulische Bremsen#!.. Das neue Auto trägt jetzt die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.582.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Verbesserte Sicherheitseinrichtungen. Das neueste Sicherheitszubehör für Rennwagen sind #V moderne Reifen#!.. Das neue Auto trägt jetzt die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.582.f: "\"Um als Erster ins Ziel zu kommen, muss man erst einmal ins Ziel kommen.\" -Juan Manuel Fangio"
 vikelas_new_safety_tt: "Die bestehenden Sicherheitseinrichtungen werden erneuert."
 vikelas.583.t: "Neue Rennwagenkarosserie"
 vikelas.583.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Die Karosserie wurde verbessert. Der neue Rennwagen hat jetzt eine #V Torpedokarosserie#!. Der neue Wagen trägt jetzt die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.583.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Die Karosserie wurde verbessert. Der Rennwagen besitzt nun eine #V Karosserie aus Pressstahl#!. Der neue Wagen trägt nun die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.583.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] Die Karosserie wurde verbessert. Der neue Rennwagen hat jetzt eine #V stromlinienförmigere Karosserie#!.. Das neue Auto trägt jetzt die Namen [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.583.f: "\"Autorennen begannen fünf Minuten, nachdem das zweite Auto gebaut war.\" -Henry Ford"
 vikelas_new_body_tt: "Der aktuelle Aufbau wird aufgewertet."
 vikelas.584.t: "Der V-Motor"
 vikelas.584.d: "Unser Ingenieur Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] machte einen bahnbrechenden Vorschlag, wie ein neuer Motor für den Rennsport aussehen könnte und nahm Kontakt mit dem Mechaniker [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] auf."
 vikelas.584.f: "Ein V-Motor ist eine Hubkolbenmaschine mit mehreren Zylindern. Diese sind auf zwei Zylinderbänke aufgeteilt, die schräg zueinander stehen. V-Motoren sind vor allem bei höherer Zylinderzahl und begrenztem Bauraum weit verbreitet. Die kompakte Bauweise spart Material und damit Gewicht. Der erste V-Motor, ein Zweizylinder-V-Twin, wurde von Wilhelm Maybach konstruiert und 1889 im Daimler-Stahlradwagen verbaut. Der erste V8-Motor entstand 1903 in Form des Antoinette-Motors von Léon Levavasseur für Rennboote und -flugzeuge."
 vikelas.584.g: "Heut'ka!"
 vikelas.585.t: "Verbesserter Kraftstoff"
 vikelas.585.d: "Unser Chemiker Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] hat den Kraftstoff für Verbrennungsmotoren so weiterentwickelt, dass er entscheidend zur Effizienz- und Leistungssteigerung von Rennfahrzeugen beitragen könnte. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] hat großes Interesse an Testläufen bekundet."
 vikelas.585.f: "Die ersten Jahrzehnte der Ottokraftstoffe waren äußerst wechselhaft. Viele Firmen tendierten dazu, den Kraftstoff zu strecken oder mit anderen Reinkraftstoffen zu mischen. Nikolaus August Otto verwendete bereits rektifizierten Alkohol. In einigen Ländern führte die Erdölknappheit dazu, Alternativen zu entwickeln – oder die verfügbare Kraftstoffmenge effizienter zu gestalten. Im Rennsport sorgten verbesserte Kraftstoffe und Schmieröle dafür, dass die Fahrleistung optimiert wurde."
 vikelas.585.g: "Heut'ka!"
 vikelas.586.t: "Aerodynamische Kräfte"
 vikelas.586.d: "Unser Physiker Dr. [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName] hat einige Berechnungen zu aerodynamischen Kräften beschrieben, die für den Fahrzeugbau nützlich sein könnten. Automechaniker [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] hat eine Kopie der Arbeit erhalten."
 vikelas.586.f: "\"Aerodynamik ist für Leute, die keine Motoren bauen können.\" -Enzo Ferrari"
 vikelas.586.g: "Heut'ka!"
 vikelas.590.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] ist jetzt ein berühmter Rennfahrer!"
 vikelas.590.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] hat Rennen auf der ganzen Welt gewonnen und ist für seinen Rennstil berühmt. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] ist jetzt berühmt genug, um als berühmter Rennfahrer zu gelten!"
 vikelas.590.f: ""
 vikelas.590.g: "Eine lebende Legende!"
 vikelas.591.t: "Unser Autorennfahrer [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullNameNoFormatting] geht in den Ruhestand"
 vikelas.591.d: "Nachdem [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] jahrelang Autorennen auf der ganzen Welt gefahren ist, geht er jetzt in den Ruhestand. [SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe] wird nicht länger als [concept_vikelas_racer] aktiv sein."
 vikelas.591.g: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe|U] hat [SCOPE.sCharacter('vikelas_retired_racer_scope').GetHerHis] Rente verdient!"
 vikelas.591.h: "Er wäre ein großartiger Ingenieur!"
 vikelas.591.new_racer_replace_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] wird ausgemustert und [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName] wird der neue [concept_vikelas_racer] von [GetPlayer.GetName]."
 vikelas.591.racer_to_engineer_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] wird Ihr neuer [concept_gaudi_engineer]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]"
 vikelas.591.new_racer_tt: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName] wird der neue [concept_vikelas_racer] von [GetPlayer.GetName]."
 vikelas.592.t: "Unser [concept_vikelas_racer] ist gestorben"
 vikelas.592.d: "Nach Jahren als [concept_vikelas_racer] ist der bekannteste Autorennfahrer unseres Landes gestorben. Werden wir jemals in der Lage sein, solch ein erstaunliches Talent zu ersetzen?"
 vikelas.592.g: "Das ist ein großer Verlust!"
 vikelas.592_tt: "Manchmal tötet das Spiel Charaktere. Ein Mod kann das nicht verhindern. Dieses Ereignis entfernt die Rolle dieses [concept_character] aus dem Spiel, sodass Sie nicht von einem Geist dieser Charaktere heimgesucht werden."
 vikelas.593.t: "Tödlicher Autounfall"
 vikelas.593.d: "Rennfahrer [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] überstrapazierte sein Glück. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] kam mit zu hoher Geschwindigkeit von der Fahrbahn ab und verunglückte tödlich."
 vikelas.593.f: "\"Der Rennsport ist eine große Manie, für die man alles opfern muss, ohne Zurückhaltung, ohne Zögern.\" -Enzo Ferrari"
 vikelas.593.g: "Der Nächste!"
 vikelas.594.t: "Autopanne"
 vikelas.594.d: "Leider musste Rennfahrer [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] das Rennen vorzeitig aufgeben. Das Auto sei kaputt gegangen, behauptet [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]."
 vikelas.594.f: "\"Pech gibt es nicht.\" -Enzo Ferrari"
 vikelas.594.g: "Lag es am Auto oder hat der Fahrer den Motor überlastet?"
 vikelas.595.t: "Ein neuer Rennfahrer"
 vikelas.595.d: "Ein neues [concept_vikelas_racer] hat [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerselfHimself] eingeführt. Der Name von [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerHis|U] ist [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]."
 vikelas.595.g: "Hoffen wir, dass [SCOPE.sCharacter('vikelas_new_racer_scope').GetSheHe] mehr Glück hat."
 vikelas.596.t: "Ein neuer Mechaniker"
 vikelas.596.d: "Ein neues [concept_vikelas_mechanic] hat [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerselfHimself] eingeführt. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis|U] heißt [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. [SCOPE.sCountry('vikelas_new_mechanic_scope').GetHerhis] hat sich auf den Bereich ... spezialisiert."
 vikelas_autoracing_found_automobile_club_button: "Automobilclub gegründet"
 vikelas_autoracing_found_automobile_club_button_desc: "Die Gründung eines Automobilclubs ist der erste Schritt zum Aufbau weiterer Einrichtungen, die für den Motorsport unverzichtbar sind."
 vikelas_autoracing_long_distance_button: "Organisieren Sie ein Ausdauerrennen"
 vikelas_autoracing_long_distance_button_desc: "Langstreckenrennen, oft von Stadt zu Stadt, waren in den frühen Tagen des Automobilrennsports die Regel und wurden bis in die Mitte des 20. Jahrhunderts fortgesetzt. In Italien sind Rennen wie die Targa Florio oder die Mille Miglia die bekanntesten Beispiele. Sie stellten Mensch und Maschine auf eine besondere Probe und galten lange Zeit als die wahren nationalen Autorennen."
 vikelas_autoracing_found_grand_prix_button: "Grand-Prix-Rennen gefunden"
 vikelas_autoracing_found_grand_prix_button_desc: "Im Jahr 1906 wurde mit dem Rennen um den Grand-Prix de l’ACF der erste offizielle Grand-Prix der Automobilgeschichte veranstaltet. Unabhängig vom Herkunftsland waren dabei, wie ursprünglich von den Vertretern der französischen Industrie gefordert, bis zu drei Rennwagen pro Automobilhersteller zugelassen. Seinem Status als bedeutendster aller Wettbewerbe entsprechend, wurde das Rennen über eine Distanz von über 1200 km und an zwei aufeinanderfolgenden Tagen ausgetragen. Im Jahr 1925 verkündete man schließlich auf Betreiben des Automobilclubs von Italien die Einführung einer offiziellen Weltmeisterschaft. Als Rennen wurden die drei offiziellen Grand-Prix-Rennen der Saison (Frankreich, Italien und Belgien) bezeichnet, außerdem Indianapolis als bedeutendstes amerikanisches Rennereignis."
 vikelas_autoracing_race_track_button: "Baue eine Rennstrecke"
 vikelas_autoracing_race_track_button_desc: "Mit den Grand-Prix Rennen wird die feste Rennstrecke im Autorennsport immer mehr zur Normalität. Eine eigene Rennstrecke würde nicht nur das internationale Renngeschehen an einem Ort zentralisieren, sondern unseren Rennfahrern als Teststrecke jedes Jahr einen Erfahrungsbonus bescheren."
 vikelas_coach: "Trainer"
 vikelas_coach_desc: "Dieser Charakter trainiert ein Sportteam."
 vikelas_coach_senior: "Vorgesetzter Trainer"
 vikelas_coach_senior_desc: "Dieser Trainer ist eine Legende in der Sportszene aufgrund seiner vielen Jahren Erfahrung."
 vikelas_replace_coach_with_new_coach_tt: "[SCOPE.sCharacter('vikelas_new_coach_var').GetFullName] wird unser neuer[concept_vikelas_coach]. [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_replacement_coach_custom_loc')]"
