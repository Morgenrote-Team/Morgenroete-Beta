 vikelas_upper_class_organized_club_modifier: "Von der Oberschicht organisierter Club"
 vikelas.300.t: "Ein neuer Sport"
 vikelas.300.d_football: "Immer mehr unserer Bürger sind von einem neuen Spiel fasziniert: Fußball. Obwohl viele diesen \"Import\" aus [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltName('DAT')] kritisch sehen, ist der Sport inzwischen so beliebt, dass man kaum noch daran vorbeikommt."
 vikelas.300.d_baseball: "Immer mehr unserer Bürger sind von einem neuen Spiel fasziniert: Baseball. Obwohl viele diesen \"Import\" aus [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltName('DAT')] kritisch sehen, ist der Sport inzwischen so beliebt, dass man kaum noch daran vorbeikommt."
 vikelas.300.d_cricket: "Immer mehr unserer Bürger sind von einem neuen Spiel fasziniert: Cricket. Obwohl viele diesen \"Import\" aus [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltName('DAT')] kritisch sehen, ist der Sport inzwischen so beliebt, dass man kaum noch daran vorbeikommt."
 vikelas.300.f: "\"Das Spiel ist wie eine Pause, und da man nicht kontinuierlich arbeiten kann, braucht man Ruhe.\" -Aristoteles"
 vikelas.300.g: "Ziel!"
 vikelas.300.h: "Gib mir meinen Schläger!"
 vikelas.300.i: "Schöner Ball."
 vikelas.300.football.tt: "Fußball wird [GetPlayer.GetAltName('IN')] zum Nationalsport."
 vikelas.300.baseball.tt: "Baseball wird [GetPlayer.GetAltName('IN')] zum Nationalsport."
 vikelas.300.cricket.tt: "Cricket wird [GetPlayer.GetAltName('IN')] zum Nationalsport."
 vikelas.301.t: "Cricket Club gegründet"
 vikelas.301.d: "Einige einflussreiche Personen haben einen Sportverein gegründet, um ihrer Lieblingsbeschäftigung nachzugehen: den [SCOPE.GetRootScope.GetState.GetStateRegion.GetCityHubName] Cricket Club."
 vikelas.301.f: "Das 19. Jahrhundert war die Zeit, in der sich Cricket von einem ländlichen Zeitvertreib zu einem Sport von nationaler und internationaler Bedeutung entwickelte. Die englische Oberschicht machte das Spiel zu ihrem liebsten Zeitvertreib: Es wurde in Internaten wie Eton und Harrow gepflegt und als \"Gentleman-Sport\" verherrlicht. Gleichzeitig wuchs die Popularität des Spiels in der Arbeiterklasse, insbesondere in Nordengland, wo Fabrikarbeiter ihre eigenen Clubs gründeten. Diese Demokratisierung des Spiels führte zu einem beispiellosen Zuwachs an Vereinen und Zuschauern.\n\nInternationale Spiele ließen nicht lange auf sich warten. Im Jahr 1844 fand in New York das erste dokumentierte Länderspiel zwischen Kanada und den Vereinigten Staaten statt."
 vikelas.301.g: "Gib mir meinen Schläger!"
 vikelas.301.h: "Was für ein prätentiöses Spiel."
 vikelas.302.t: "Baseball Club gegründet"
 vikelas.302.d: "Baseball hat sich in [SCOPE.sState('vikelas_baseball_club_state_scope').GetName] zu einem beliebten Zeitvertreib entwickelt. Es wurde ein neuer Baseballverein gegründet, der regelmäßig Spiele austrägt: [SCOPE.sState('vikelas_baseball_club_state_scope').GetCustom('vikelas_historical_baseball_club_names_type')]."
 vikelas.302.f: "In den 1840er Jahren begann Baseball, aus dem Schatten seiner Vorgänger herauszutreten und eine ganz eigene Form anzunehmen. Die Vereinigten Staaten erlebten eine rasche Verstädterung, und die wachsenden Städte suchten nach Freizeitbeschäftigungen, die die Gemeinschaft fördern und gleichzeitig den Geist der neuen Nation widerspiegeln konnten. Ein entscheidender Moment kam 1845, als Alexander Cartwright und die Mitglieder des Knickerbocker Base Ball Club in New York die ersten standardisierten Regeln für das Spiel aufstellten. Diese \"Knickerbocker Rules\" legten den Grundstein für das moderne Baseballspiel: ein Diamantfeld mit vier Bases, drei Outs pro Inning und neun Spieler pro Mannschaft. Sie unterschieden sich deutlich von den weniger formellen Versionen, die bis dahin auf Rasenflächen und Feldern gespielt wurden. Am 19. Juni 1846 spielte der Knickerbocker Club in Hoboken, New Jersey, das erste dokumentierte Spiel nach diesen Regeln. Die Mannschaft verlor zwar gegen die New York Nine, aber das Ereignis markierte die symbolische Geburtsstunde des organisierten Baseballs."
 vikelas.302.g: "Homerun."
 vikelas.303.t: "Fußballverein gegründet"
 vikelas.303.d: "Arbeiter und Werktätige in [SCOPE.sState('vikelas_football_club_state_scope').GetName] treffen sich seit Wochen zum Fußballspielen. Jetzt haben sie einen Verein gegründet: [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')]."
 vikelas.303.f: "In der ersten Hälfte des 19. Jahrhunderts war Fußball in England noch keine einheitliche Sportart, sondern eher ein Sammelbegriff für eine Vielzahl von Ballspielen, die in Städten, Dörfern und Schulen gespielt wurden. Diese Spiele unterschieden sich oft drastisch in ihren Regeln. Den ersten Schritt zur Vereinheitlichung bildeten die Cambridge Rules von 1848, ein Versuch, einheitliche Regeln für die Studenten in Cambridge zu schaffen. Sie waren keine endgültige Lösung, aber sie legten den Grundstein für alles, was folgte. Der eigentliche Durchbruch gelang am 26. Oktober 1863, als sich elf Vereine in der Freemasons' Tavern in London trafen und den Fußballverband (FA) gründeten. Innerhalb weniger Wochen einigten sie sich auf ein Regelwerk, nach dem der Ball nur mit den Füßen gespielt werden durfte und das Tragen oder Werfen des Balls verboten war - ein Kompromiss, der die Rugby-Anhänger verärgerte, die sich daraufhin abspalteten und ihr eigenes Regelwerk entwickelten. Mit der Gründung der FA war der moderne Fußball geboren."
 vikelas.303.g: "Tor!"
 vikelas.304.t: "Basketball-Club gegründet"
 vikelas.304.d: "In [SCOPE.sState('vikelas_basketball_club_state_scope').GetName] wurde ein Basketballverein gegründet, der das Ziel hat, das Spiel [GetPlayer.GetAltName('IN')] zu verbreiten."
 vikelas.304.f: "Basketball ist die jüngste der großen modernen Sportarten. Seine Wurzeln sind eng mit den sozialen Bewegungen des späten 19. Jahrhunderts verbunden. Jahrhunderts. 1891 stand der kanadische Arzt und Sportlehrer James Naismith vor einer Herausforderung: Er sollte für die Schüler des YMCA Training Institute in Springfield, Massachusetts, ein Hallenspiel erfinden, das sie auch im kalten Winter in Neuengland spielen konnten. Der YMCA wollte mit Hilfe des Sports die körperliche und moralische Gesundheit der jungen Männer stärken - ein Erziehungsprojekt im Geiste des Protestantismus und der Urbanisierung. Basketball mit seinen schnellen Auswechslungen und klaren Regeln passte perfekt zu dieser Mission. Es war ein Spiel, das den Gemeinschaftssinn förderte und gleichzeitig den wachsenden amerikanischen Städten eine neue Freizeitbeschäftigung bot."
 vikelas.304.g: "Swish!"
 vikelas.304.h: "Was für ein dummes Spiel."
 vikelas.311.t: "Sport-Gazette"
 vikelas.311.d: "In [SCOPE.sState('vikelas_gazette_state').GetName] hat ein Verlag ein neues Zeitungsformat entwickelt, das sich ausschließlich der Sportberichterstattung widmet und sich auf [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName] konzentriert. Die Gazette verkauft sich wie geschnitten Brot."
 vikelas.311.f: "Als der Sport Ende des 19. Jahrhunderts seine Arena verließ und in die Städte, in die Cafés und in die Köpfe der Massen wanderte, brauchte er ein neues Medium. Nicht nur die Stadionbesucher mussten über Siege und Niederlagen informiert werden, sondern auch der Arbeiter am Fabriktor und der Angestellte mit der Zeitung in der Hand. In Italien war es die \"Gazzetta dello Sport\", die diesem Bedürfnis entsprach und eine neue Ära der Sportberichterstattung einläutete. Gegründet am 3. April 1896 in Mailand - kaum drei Wochen vor den ersten modernen Olympischen Spielen in Athen - war die Gazzetta von Anfang an mehr als nur eine Ergebniszeitung. Sie verstand sich als Sprachrohr des aufstrebenden Sports: für Radsport, Leichtathletik, Fußball, Fechten - und für alles, was Geschwindigkeit, Wettbewerb und Leidenschaft versprach. Anfangs erschien es zweimal wöchentlich in schwarzer Schrift auf einfachem Papier und legte mehr Wert auf Fakten als auf bloße Tatsachen: Es erzählte Geschichten, machte Sportler zu Helden und Spiele zu Dramen. Im Jahr 1899 änderte sich etwas, das die Zeitung zur Ikone machte: Die Zeitung wurde rosa. Ursprünglich ein pragmatischer Schritt, weil rosa Papier billiger war, wurde es bald zu einem Markenzeichen."
 vikelas.321.t: "Baseball"
 vikelas.321.d: "Die Menschen in unserem Land sind mit einem amerikanischen Sport in Berührung gekommen, der immer mehr Fans gewinnt. [GetPlayer.GetAltNameNoFlag('NOM')|U] ist im Baseballrausch."
 vikelas.321.f: "Obwohl Baseball in den USA als Nationalsport wahrgenommen wurde, verbreitete sich das Spiel auch in zwei anderen, grundverschiedenen Ländern, in denen es bald eine ähnliche Stellung einnehmen sollte. Das Spiel wurde 1872 von Horace Wilson nach Japan gebracht, kurz nachdem das Land geöffnet wurde. Zu einer Zeit, als Japan für westliche Innovationen offen war, wurde das Spiel schnell populär. Es sollte jedoch noch über 30 Jahre dauern, bis der Sport professioneller wurde. Auch in Kuba wurde Baseball von Nemesio Guillot populär gemacht, der den ersten großen Baseballverein des Landes gründete. In den 1870er Jahren, noch vor der amerikanischen Intervention, wurde er zur meistgespielten Sportart des Landes. Trotz seines amerikanischen Ursprungs wird Baseball stark mit dem kubanischen Nationalismus in Verbindung gebracht, da es koloniale spanische Sportarten wie den Stierkampf ablöste."
 vikelas.403.t: "FIFA: Neuer Vorstand"
 vikelas.403.f: "Die FIFA hat sich für folgende Zusammensetzung entschieden:\n\n#V Präsident: [GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName]#!\n\n#V Vorstand: [GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V][GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V][GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V][GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V][GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 vikelas.403.g: "Eine gute Auswahl."
 vikelas.403.h: "Und es war keine Bestechung im Spiel?"
