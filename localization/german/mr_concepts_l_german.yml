 concept_roy_ethnologists: "#b #ORANGE Ethnologen#!#!"
 concept_roy_ethnologist_desc: "#n Demnächst bei Morgenröte!#!"
 ag_morgenroete_desc: "Wir haben offene Alarme vom [concept_morgenroete] Mod."
 concept_tesla_engineer: "#b #ORANGE Ingenieur#!#!"
 concept_tesla_engineers: "#b #ORANGE Ingenieure#!#!"
 concept_tesla_civil_engineer: "#b #ORANGE Bauingenieur#!#!"
 concept_tesla_civil_engineers: "#b #ORANGE Bauingenieure#!#!"
 concept_tesla_civil_engineering: "#b #ORANGE Bauingenieurswesen#!#!"
 concept_tesla_mechanical_engineer: "#b #ORANGE Maschinenbauingenieur#!#!"
 concept_tesla_mechanical_engineers: "#b #ORANGE Maschinenbauingenieure#!#!"
 concept_tesla_mechanical_engineering: "#b #ORANGE Maschinenbauwesen#!#!"
 concept_tesla_military_engineer: "#b #ORANGE Militäringenieur#!#!"
 concept_tesla_military_engineers: "#b #ORANGE Militäringenieure#!#!"
 concept_tesla_military_engineering: "#b #ORANGE Militärtechnik#!#!"
 concept_tesla_electrical_engineer: "#b #ORANGE Elektroingenieur#!#!"
 concept_tesla_electrical_engineers: "#b #ORANGE Elektroingenieure#!#!"
 concept_tesla_electrical_engineering: "#b #ORANGE Elektrotechnik#!#!"
 concept_tesla_aeronautical_engineer: "#b #ORANGE Luftfahrtingenieur#!#!"
 concept_tesla_aeronautical_engineers: "#b #ORANGE Luftfahrtingenieure#!#!"
 concept_tesla_aeronautical_engineering: "#b #ORANGE Luftfahrttechnik#!#!"
 concept_tesla_engineering: "Ingenieurswesen"
 concept_tesla_engineering_desc: "#b Ingenieurwesen#! ist eine der Hauptfunktionen von [concept_morgenroete].\n\nUm Zugang zum #b Ingenieurwesen#! zu erhalten, müssen Sie einen [concept_tesla_engineer] haben. #b Ingenieure#! können je nach Spezialisierung #b Ingenieursprojekte#! starten. Es gibt fünf spezialisierte #b Ingenieure#!:\n- Der [concept_tesla_civil_engineer] konzentriert sich auf die Verbesserung der Infrastruktur eines Landes.\n- Der [concept_tesla_mechanical_engineer] konzentriert sich auf mechanische Erfindungen, die z.B. der Industrie zugute kommen.\n- Der [concept_tesla_military_engineer] konzentriert sich auf die Verbesserung der Armee und der Marine eines Landes.\n- Der [concept_tesla_electrical_engineer] konzentriert sich auf die Verbesserung der elektrischen Infrastruktur eines Landes.\n- Der [concept_tesla_aeronautical_engineer] konzentriert sich auf die Ermöglichung des menschlichen Fluges und die Verbesserung von Flugzeugen und anderen Luftfahrzeugen."
 concept_tesla_engineer_desc: "#b #ORANGE Ingenieure#!#! sind Akademiker, die beim Bau von Spezialgebäuden helfen, indem sie ihr Fachwissen zur Verfügung stellen.\nAußerdem geben #b #ORANGE Ingenieure#!#! einen Bonus auf die [concept_technology_spread] ihrer Nation. Der Bonus hängt davon ab, wie viele Nationen mehr Technologien erforscht haben als Ihre Nation."
 concept_tesla_civil_engineer_desc: "#b Bauingenieure#! konzentrieren sich auf die Verbesserung der Infrastruktur eines Landes.\nSie können #b Bauprojekte#! starten, um [Concept('concept_modifier','$concept_modifiers$')] zu Staaten hinzuzufügen, die die [concept_infrastructure] erhöhen, um Ihre #b Bausektoren#! zu verbessern oder um [Concept('concept_technology', '$concept_technologies$')] zu erforschen."
 concept_tesla_mechanical_engineer_desc: "#b Maschinenbauingenieure#! konzentrieren sich auf mechanische Innovationen, die Ihre Industrie, Ihre Maschinen oder das Leben Ihrer Bevölkerung verbessern.\nSie können #b Ingenieursprojekte#! starten um [Concept('concept_modifier','$concept_modifiers$')] zu Ihren Industriegebäuden hinzuzufügen, die [concept_throughput], [concept_good_production] und [concept_input_mult] verbessern, um Ihre #b Eisenbahnen#! mit neuen Lokomotiven zu verbessern oder um industrielle [Concept('concept_technology', '$concept_technologies$')] zu erforschen."
 concept_tesla_military_engineer_desc: "#b Militäringenieure#! konzentrieren Sie sich darauf, unsere Armee und Marine durch die Einführung neuer Innovationen zu verbessern.\nSie können #b Ingenieurprojekte#! starten, um neue [Concept('concept_mobilization_option','$concept_mobilization_options$')] durch die Erfindung von Waffen, neuen Feldbefestigungen und bessere Panzern zu erhalten oder um militärische oder maritime [Concept('concept_technology','$concept_technologies$')] zu erforschen."
 concept_tesla_electrical_engineer_desc: "#b Elektroingenieure#! konzentrieren Sie sich darauf, Ihr Land mit elektrischen Innovationen zu verbessern.\nSie können #b Ingenieurprojekte#! starten, um das geomagnetische Feld der Erde zu erforschen, Telegrafen- oder Funknetzwerke aufzubauen oder elektrische [Concept('concept_technology', '$concept_technologies$')] zu erforschen."
 concept_tesla_aeronautical_engineer_desc: "#b Luftfahrtingenieure#! konzentrieren sich auf die Entwicklung von Flugmitteln und die Verbesserung von Flugzeugen und Zeppelinen.\nSie können #b Ingenieurporjekre#! starten, um [Concept('concept_modifier','$concept_modifiers$')] zu Ihren #V Flughäfen#! hinzuzufügen, die [concept_throughput], [concept_good_production] und [concept_input_mult] verbessern, #V Fortgeschrittene Flugzeuge#! als [Concept('concept_mobilization_option','$concept_mobilization_options$')] freischalten oder die Luftfahrt-[Concept('concept_technology', '$concept_technologies$')] erforschen."
 concept_vikelas_national_sport: "Nationalsport"
 concept_vikelas_national_sport_desc: "Jedes Land kann eine der folgenden Sportarten zu seinem Nationalsport erklären: Cricket, Baseball, Fußball oder Basketball. Drei dieser vier Sportarten (mit Ausnahme von Kricket) wurden erst im 19. Jahrhundert erfunden. Das Land, das als erstes eine Sportart erfindet, gilt als das \"Mutterland\" dieser Sportart. Von diesem Zeitpunkt an verbreiten sich die Sportarten in der ganzen Welt, allerdings nicht unter denselben Bedingungen: Die Verbreitung von Kricket und Baseball ist begrenzter, während die von Fußball und Baseball weniger strengen Bedingungen unterworfen ist. Der Sport kann von einem Oberherrn unter den Untertanen verbreitet werden, um die Beziehungen zu verbessern. Innerhalb eines Landes können verschiedene Sportarten nebeneinander bestehen, aber um sich landesweit in allen Sportstätten zu verbreiten, muss es sich um einen Nationalsport."
 concept_theiler_microorganism: "Mikroorganismus"
 concept_theiler_microorganisms: "Mikroorganismen"
 concept_theiler_microorganism_desc: "Mikroorganismen sind winzige Organismen wie Bakterien, Viren und Einzeller. Sie können von einem [Concept('concept_theiler_biologist','$concept_theiler_biologists$')] durch den $je_theiler_microorganism_research$-[concept_journal_entry] gefunden werden, die Biologen durchführen, wenn sie nicht beschäftigt sind. Mikroorganismen können hauptsächlich dazu verwendet werden, [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] und [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] zu entdecken, die einem Land helfen, seine Bevölkerung vor [Concept('concept_panum_disease','$concept_panum_diseases$')] zu schützen."
 concept_theiler_biology: "Biologie"
 concept_theiler_biology_desc: "#n Demnächst bei Morgenröte!#!"
 concept_ito_medicinal_plants: "Heilpflanzen"
 concept_ito_medicinal_plants_desc: "Heilpflanzen sind Pflanzen, die medizinische Eigenschaften haben und die genutzt werden können, um Arzneimittel und andere nützliche Chemikalien herzustellen.\nSie können Heilpflanzen sammeln, indem Sie einen [concept_dubois_naturalist] auf eine [concept_dubois_botanical_expedition] schicken. Wenn genug Heilpflanzen gesammelt wurden, kann ein [concept_mendelejew_chemist] mit der Isolation der chemischen Substanz beginnen. Ist dies abgeschlossen, kann ein [concept_theiler_biologist] daraus ein Heilmittel herstellen."