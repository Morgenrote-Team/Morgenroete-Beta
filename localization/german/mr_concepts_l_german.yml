 concept_panum_psycho_point:1 "Psychotherapeutischer Punkt" #NT!
 concept_panum_psycho_points:1 "Psychotherapeutische Punkte" #NT!
 concept_panum_psycho_point_desc:1 "Psychotherapeutische Punkte sind eine abstrakte Währung, die den Fortschritt eines Landes auf dem Gebiet der Psychiatrie und Psychologie darstellen. Sie werden monatlich durch Technologien, eine Irrenanstalt oder einen [concept_panum_physician] mit #V Psychiater#! [concept_character_trait] generiert. Psychotherapeutische Punkte können auch über Ereignisse erworben werden. Eine hohe Anzahl an psychotherapeutischen Punkten führt zu einer besseren Chance, Charaktere mit Geisteskrankheiten zu heilen. Das Erreichen einer psychotherapeutischen Stufe bringt auch Forschungsboni und [concept_academics_progress]. Eine bestimmte Anzahl von psychotherapeutischen Punkten ist Voraussetzung für die meisten psychologischen Schulen." #NT!

