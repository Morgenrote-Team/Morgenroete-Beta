 concept_klimt_great_painter:1 "#PURPLE #b Großartiger Maler#!#!" #NT!
 concept_klimt_great_painters:1 "#PURPLE #b Großartige Maler#!#!" #NT!
 concept_klimt_great_painter_desc: "#b Großartige Maler#! sind [Concept('concept_klimt_painter','$concept_klimt_painters$')] die für die Ewigkeit bekannt sein werden. #b Maler#!, die 500 [concept_artists_experience] erreichen, werden zu #b Großen Malern#!. Dadurch wird ihre Effizienz erheblich gesteigert und Ihre Nation kann viel mehr gewinnen [concept_klimt_painting_tradition]." #NT!
  
 concept_klimt_independent_painter:1 "Unabhängiger Maler" #NT!
 concept_klimt_independent_painter_akk: "Unabhängigen Maler" #NT!
 concept_klimt_independent_painters:1 "Unabhängige Maler" #NT!
  
 concept_klimt_painter_trip:1 "Bildungsreise des Malers" #NT!
 concept_klimt_painter_trip_journeys:1 "Reisen" #[Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')]

 ### 2.1.2 ###
  
 concept_elgar_music_desc: "#b Musikkultur#! ist eines der Hauptmerkmale von [concept_morgenroete]. Im 19. und 20. Jahrhundert war Musik wichtig, um die Bevölkerung zu unterhalten und die Größe einer Nation zu zeigen.\n\nUm auf die meisten Musikinhalte in #r Morgenröte#! zugreifen zu können, müssen Sie einen [concept_elgar_opera] erstellen. Die #b Opera#! wird Musik produzieren, benötigt aber Instrumente zum Betrieb. Abgesehen davon, dass Sie #b Musik #! für den Konsum Ihrer Bevölkerung produzieren, werden #b Opern#! Ihrem Land langsam #!2 hinzufügen.\n\n#b Musikalische Tradition#! spiegelt die musikalischen Errungenschaften und Traditionen einer Nation wider. Die Menge an #b Musiktradition#! gibt Ihnen einen Prestigebonus und ermöglicht Ihnen, einen Weg zu wählen, auf dem die Kunst Ihrer Nation voranschreiten soll. Sie können entweder den Weg von #!7, #!8 oder #!9 gehen. Jeder dieser Kunststile hat einen anderen Schwerpunkt.\n\nEine gute Möglichkeit, noch mehr #b Musikalische Tradition#! zu erlangen, ist der Erwerb eines [concept_morgenroete]2. Ein Komponist kann [concept_morgenroete]3, [concept_morgenroete]4, [concept_morgenroete]5 weitermachen und sogar [concept_morgenroete]6 erstellen. Diese Aktionen verbessern entweder die #b Komponisten#! [concept_morgenroete]9 oder die #b Musikalische Tradition Ihrer Nation#!." #NT!
  
 concept_artists_center_of_arts_desc: "Ein #b Kunstzentrum#! ist ein Zentrum eines [concept_artists_art_style], das in einem [concept_state_region] erstellt wird, sobald ein #b Kunststil#! erfunden wird. Es gibt nur ein #b Kunstzentrum#! pro #b Kunststil#!.\n#b Kunstzentren#! sind besonders wichtig für #!1, die #!2 mitnehmen können, um dort den #b Kunststil#! zu studieren. Darüber hinaus bieten einige #b Kunstzentren#! einzigartige Veranstaltungen an, die dort stattfinden. Bei einigen können Sie beispielsweise #!7 gewinnen." #NT!
  
 concept_klimt_painting_culture: "Malkultur" #NT!
 concept_klimt_painting_culture_desc: "#b Malkultur#! ist eines der Hauptmerkmale von [concept_morgenroete]. Im 19. und 20. Jahrhundert entwickelte sich die Malerei rasant, was zu verschiedenen neuen [Concept('concept_artists_art_style','$concept_artists_art_styles$')] führte, die Einzelpersonen und Ländern große Fortschritte brachten.\n\nUm auf die meisten Malinhalte in #r Morgenröte#! zugreifen zu können, müssen Sie ein § erstellen _0 Kunstakademie#!. #b Kunstakademien#! ermöglichen es Ihnen, #!0 zu erwerben und neue #!1 zu rekrutieren\n\n#b Maler#! erstellen Gemälde und #b Meisterwerke#! für Ihr Land und geben Ihnen eine große Menge an #b Gemälden Tradition#!. Da es verschiedene [Concept('concept_artists_art_style','$concept_artists_art_styles$')] für #b Maler#! gibt, auf die sie sich konzentrieren können, können Sie sie auf einem [concept_morgenroete]3 weitere #b Kunststile#! studieren lassen. Sobald sie 40 Jahre alt werden, spezialisieren sich #b Maler#! auf einen ihrer #b Kunststile#! und konzentrieren sich auf die Schaffung von Gemälden in diesem #b Kunststil#!." #NT!
  
 concept_artists_art_style:1 "Kunststil" #NT!
 concept_artists_art_styles:1 "Kunststile" #NT!
 concept_artists_art_style_style:1 "Stil" #NT!
 concept_artists_art_style_desc:1 "Ein #b Kunststil#! ist ein spezifischer Schwerpunkt der Kunst. Einige #b Kunststile#! sind von Anfang an verfügbar, wie #b Klassizismus#! und #b Romantik#!. Die anderen, #b Realism#!, #b Irrationalism#!, [concept_elgar_impressionism], [concept_elgar_expressionism] und [concept_elgar_art_nouveau], erscheinen erst, nachdem bestimmte Bedingungen erfüllt sind. Jeder #b Kunststil#! hat ein zugehöriges [concept_artists_center_of_arts] in dem [concept_state_region], in dem die Kunstrichtung begründet wurde." #NT!
  
 concept_klimt_painter_desc:1 "#PURPLE #b Maler#!#! sind Männer und Frauen, die Gemälde und andere Kunstwerke schaffen. #b Maler#! sind spezielle Charaktere, die Sie entweder durch Ereignisse erhalten, indem Sie genug [concept_artistic_progress] sammeln, um einen in Ihrem Land zu erschaffen, oder indem Sie einem [concept_klimt_independent_painter] eine Position anbieten.\n#b Maler#! beginnen sofort zu malen und erschaffen jedes Jahr eine Anzahl von Gemälden, abhängig von ihren [Concept('concept_character_trait','$concept_character_traits$')]. Manchmal können sie sogar ein #b Meisterwerk#! erschaffen, das Ihrer Nation noch mehr [concept_klimt_painting_tradition] gibt.\n#b Maler#! können verschiedene [Concept('concept_artists_art_style','$concept_artists_art_styles$')] auf [Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')] studieren. Jeder #b Maler#! wird sich auf einen #b Kunststil#! spezialisieren, sobald er 40 Jahre alt ist, was ihm erlaubt, #b Meisterwerke#! eines bestimmten Stils zu malen." #NT!
  
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')], die nicht von einem Land angeheuert werden, sind #b Unabhängige Maler#!. #b Unabhängige Maler#! können von Ländern angeheuert werden, die einen [Concept('concept_primary_cultures','$concept_primary_culture$')] haben, der einen [concept_cultural_trait] mit der Kultur des #b Malers#!.\n§ teilt. _1 Unabhängige Maler#! haben unterschiedliche Anforderungen an ihr Gastland. Sie benötigen #b Kunstakademien#!, bestimmte #b2 oder #b3, je nach #b Kunstakademien#! #b6. Zusätzlich müssen Sie ihnen einen Geldbetrag zahlen, der von ihrem #b Ansehen#! sowie den finanziellen Möglichkeiten Ihres Landes abhängt." #NT!
  
 concept_klimt_painter_trip_desc: "Ein [concept_klimt_painter] kann auf einer #b Bildungsreise#! zu einer der [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] neue [Concept('concept_artists_art_style','$concept_artists_art_styles$')] erlernen.\nAuf einer solchen #b Reise#! kann ein Maler positive und negative [Concept('concept_character_trait','$concept_character_traits$')] gewinnen, die seine Arbeit und die Anzahl seiner Arbeiten beeinflussen Gemälde, die sie schaffen. Jedes #b Kunstzentrum#! hat leicht unterschiedliche Veranstaltungen und verleiht dem #b Maler#! am Ende eine einzigartige #b Eigenschaft#!, die später zur Spezialisierung des #b Malers#! werden kann." #NT!
  
 concept_klimt_art_prize:1 "Kunstpreis" #NT!
 concept_klimt_art_prizes:1 "Kunstpreise" #NT!
 concept_klimt_art_prize_desc: "Von Zeit zu Zeit finden künstlerische Wettbewerbe statt, bei denen Preise vergeben werden – die das Renommee eines Künstlers fördern. Nationen, die einen [concept_artists_center_of_arts] für Irrationalismus oder [concept_elgar_impressionism] haben, wählen die besten Musiker in einem alle fünf Jahre stattfindenden Wettbewerb aus. Die Besitzer eines [concept_klimt_art_gallery] oder eines #b Zentrums für Kunst des Realismus#! veranstalten alle fünf Jahre einen Malwettbewerb. Das Land, aus dem die Gewinner kommen, erhält auch Musik- oder Maltradition. Eine besondere Form des Kunstwettbewerbs ist die Biennale, die alle zwei Jahre einen umfassenden Kunstpreis an das Land vergibt, das über die Künstler mit dem höchsten Renommee verfügt, was alle kulturellen Traditionswerte steigert." #NT!
  
 concept_klimt_art_gallery:1 "Kunstgalerie" #NT!
 concept_klimt_art_gallery_desc: "Die #b Kunstgalerie#! ist ein besonderes Gebäude in der Hauptstadt einer Nation, das ab #b Realismus#! verfügbar ist. Es kann nur gebaut werden, wenn die Nation über einen [concept_klimt_painter] mit Spezialisierung verfügt. #b Maler#! mit einer Spezialisierung schalten die Sammlung ihres [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] frei – das heißt, ein Künstler mit einer Spezialisierung auf den romantischen Stil schaltet eine Sammlung der Romantik frei. Um eine Sammlung zu einer hervorragenden Sammlung aufzuwerten, bedarf es eines solchen Meisterwerks, das entweder von einem Maler gemalt oder aus dem Ausland erworben werden muss." #NT!

 ### 2.1.4 ###

 concept_artists_artist_desc: "In [concept_morgenroete] #b Künstler#! sind Sonderzeichen, die es dir ermöglichen, bestimmte Mechaniken des Mods zu nutzen. Sie können #b Künstler#! bei einigen Veranstaltungen erhalten oder indem Sie genügend [concept_artistic_progress] erwerben. Künstler haben [concept_artists_experience], der ihre Stellung in ihrem jeweiligen Bereich widerspiegelt.\nDerzeit gibt es diese #b Künstler#!:\n - [concept_elgar_composer]\n - #b0\n - #b1" #NT!
  
 concept_manzoni_writer_novelist: "Romanschriftsteller" #NT!
  
 concept_manzoni_writer_desc: "Ein #b Schriftsteller#! ist ein spezieller Charakter, der literarische Werke für Ihr Land schreiben wird. #b Schriftsteller#! beginnen normalerweise als [concept_manzoni_local_writer] und schreiben #b Publikationen#! und manchmal sogar [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. Ein #b Bestseller#! bringt dem #b Schriftsteller#! eine große Menge an [concept_artists_experience] und [concept_manzoni_literary_tradition] in Ihr Land. Es besteht die Chance, jedes Jahr einen #b Bestseller#! zu schreiben, je nachdem, wie nahe das [concept_manzoni_genre] des #b Schriftstellers#! dem [concept_manzoni_popular_taste] ist.\n\nEin bekannter #b Schriftsteller#! dessen [concept_interest_group] glücklich genug ist, kann Ihr [concept_manzoni_national_writer] werden. Ein #b Nationaler Schriftsteller#! kann [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')] erwerben oder einen Zeitungsroman schreiben. Wenn ein #b Schriftsteller#! 500 #b Renommee#! erreicht, kann er ein [concept_manzoni_great_writer] werden und Ihr Land mit noch mehr #b literarischer Tradition#! versorgen. Seien Sie vorsichtig, wenn #b Schriftsteller#! mit der politischen Situation in einem Land unzufrieden sind, können sie beschließen, [Concept('concept_agitator', '$concept_agitators$')] zu werden oder sich in den politischen Diskurs einmischen." #NT!
  
 concept_manzoni_great_writer_desc: "Ein #b großer Schriftsteller#! ist ein [concept_manzoni_writer], der auf der ganzen Welt bekannt ist. Ein #b Schriftsteller#! kann ein #b Großer Schriftsteller#! werden, sobald sein [concept_artists_experience] #V 500#! erreicht. Wenn Ihr #b Großer Schriftsteller#! Ihr #!2 ist, erhalten Sie einen Bonus auf Ihren jährlichen #!3-Gewinn." #NT!
  
 concept_manzoni_local_writer_desc: "Fast jeder [concept_manzoni_writer] beginnt als #b lokaler Autor#!. Jedes Land kann maximal 3 #b lokale Schriftsteller#! haben, die #b Veröffentlichungen erstellen#!, Ihnen [concept_manzoni_literary_tradition] gewähren, wenn ihr [concept_manzoni_genre] mit [concept_manzoni_popular_taste] übereinstimmt, und gewinnen #b0.\nEin #b Lokaler Schriftsteller#! mit einem #b Renommee#! von 150 und dessen #b5 nicht unglücklich ist, kann zu einem Land #b6 werden, das Ihnen mehr #b Literarische Tradition#! und andere zusätzliche Vorteile gewährt. \nSeien Sie sich bewusst, dass #b Lokale Schriftsteller#!, die mit der aktuellen politischen Situation unzufrieden sind, anfangen können, sich in den politischen Diskurs einzumischen oder sogar zu #!.1 werden" #NT!
  
 concept_manzoni_national_writer: "Nationaler Schriftsteller" #NT!
 concept_manzoni_national_writer_desc: "Ein #b Nationaler Schriftsteller#! ist eine Art [concept_manzoni_writer], der als das Gesicht der Literatur Ihres Landes gilt. #b Nationale Schriftsteller#! Gewähren Sie mindestens 1 und bis zu 5 [concept_manzoni_literary_tradition].\nSie können einen #b Nationalen Schriftsteller#! gewinnen, indem Sie einen Ihrer [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')] ernennen. Um einen Ihrer #b lokalen Schriftsteller#! ernennen zu können, müssen diese mindestens #!1 150#! #!3 und ihr #!4 einen positiven #!5 haben.\n" #NT!
  
 concept_manzoni_bestseller: "Bestseller" #NT!
 concept_manzoni_bestsellers: "Bestseller" #NT!
 concept_manzoni_bestseller_desc: "Ein #b Bestseller#! ist eine #b Veröffentlichung#! von einem [concept_manzoni_writer], die sich sehr gut verkauft, normalerweise weil der #b Autor#! [concept_manzoni_genre] mit dem aktuellen [concept_manzoni_popular_taste] übereinstimmt oder diesem nahe kommt.\nJedes Jahr gibt es eine Chance für einen [concept_manzoni_national_writer] oder #!0, um einen #b Bestseller#! zu schreiben. Der erste #b Bestseller#! gewährt eine große Menge an #!5 und jeder #b Bestseller#! nach dem ersten beschert dem Land eine beträchtliche Menge an #b Literarischer Tradition#!." #NT!
  
 concept_manzoni_genre: "Genre" #NT!
 concept_manzoni_genres: "Genres" #NT!
 concept_manzoni_genre_desc: "Jeder [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] hat ein bestimmtes #b Genre#! für sein Schreiben. Das #b Genre#! wird zugewiesen, wenn der #b Autor#! erstellt wird, und hängt von vielen Faktoren ab.\n#b Schriftsteller#! erhalten mehr [concept_artists_experience] und schreiben mehr #b0, wenn ihr #b Genre#! übereinstimmt oder stimmt in der Nähe des #b3 des Landes." #NT!
  
 concept_manzoni_popular_taste:1 "Popoluärer Geschmack" #NT!
 concept_manzoni_popular_taste_audience:1 "Zuschauergeschmack" #NT!
 concept_manzoni_popular_tastes_audience:1 "Zuschauergeschmack" #NT!
 concept_manzoni_popular_taste_desc:1 "Die Bevölkerung jeder Nation hat einen #b Geschmack#! für einen bestimmten [concept_manzoni_genre]. Ungefähr alle 10 Jahre ändert sich dieser #b Geschmack#! abhängig von politischen, sozialen und kulturellen Veränderungen im Land selbst.\nEin [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] wederr ein #b Genre#! hat, das dem #b Geschmack#! entspricht oder diesem nahe kommt, erhalten mehr [concept_artists_experience] und schreiben mehr [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')].\n\n#V Nahe Geschmäcker:#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$" #NT!
  
 concept_manzoni_book_licence: "Buchlizenz" #NT!
 concept_manzoni_book_licences: "Buchlizenzen" #NT!
 concept_manzoni_book_licence_desc: "Ausländische Verlage können mit einem [concept_manzoni_national_writer] Verträge abschließen und seine Bücher als Übersetzungen im eigenen Markt anbieten. Dies geschieht, wenn ein Autor den [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] im Ausland trifft. Erhält ein Autor mindestens fünf Buchlizenzen, gelten seine Bücher als Weltliteratur. Anschließend kann er auf Lesetour gehen." #NT!
  
 concept_manzoni_local_writers: "Lokale Schriftsteller" #NT!
  
 concept_manzoni_library: "Nationalbibliothek" #NT!
 concept_manzoni_library_desc: "Ihre #b Nationalbibliothek#! richtet automatisch Buchsammlungen (in Form eines [concept_production_method]) ein, wenn Sie über genügend [concept_manzoni_publications] verfügen. Die erste Buchsammlung wird ab 1.000 Publikationen angelegt. Von dort aus sind bessere Sammlungen möglich mit 2.500 (Kleine Büchersammlung), 5.000 (Kleine Büchersammlung), 10.000 (Mittlere Büchersammlung), 25.000 (Große Büchersammlung), 50.000 (Ausgezeichnete Büchersammlung) und 100.000 (Große Büchersammlung)." #NT!
 concept_manzoni_publications: "Veröffentlichungen" #NT!
 concept_manzoni_publications_desc: "#b Veröffentlichungen#! umfassen alle neu veröffentlichten Buchtitel, Zeitungen, Essays und andere ähnliche schriftliche Produkte in einem Land. Sie stimmen nicht mit @manzoni_prints überein! $manzoni_prints$ als Waren zirkulieren. Publikationen können auch unabhängig von der Verlagsbranche erscheinen, beispielsweise über die hauseigenen Druckereien von Regierungsgebäuden oder Universitäten. Auch Wissenschaftler und Privatpersonen produzieren je nach Alphabetisierungsniveau Publikationen. Der Löwenanteil entfällt jedoch auf die Verlagsbranche und entscheidend ist, ob eine moderne Produktionsmethode zum Einsatz kommt oder nicht. Eine große Anzahl an Veröffentlichungen ist für den Ausbau eines [concept_manzoni_library] von grundlegender Bedeutung." #NT!

 ### 2.1.5 ###

 concept_curtiss_tourism:1 "Tourismus" #NT!
 concept_curtiss_tourism_desc:1 "Der Tourismus verschafft einer kulturell hochstehenden Nation ein zusätzliches Einkommen. Einzigartige Denkmäler, Museen und Kunstgalerien, archäologische Stätten, Kunstzentren sowie ein hoher Wert der verschiedenen kulturellen Traditionen sind Faktoren, die ein Land zu einem attraktiven Reiseziel machen. Gesetze, die die Freizügigkeit und die wirtschaftliche Tätigkeit fördern, tragen ebenfalls zu höheren Einnahmen aus dem Tourismus bei. Auch die Infrastruktur spielt eine entscheidende Rolle - schließlich können abgelegene Orte nicht erreicht werden. Vor allem ein Flughafen revolutioniert den Tourismus und sorgt für eine deutliche Steigerung der Einnahmen." #NT!
  
 concept_curtiss_private_airline:1 "Private Fluggesellschaft" #NT!

 ### 2.2.1 ###

 concept_mendelejew_chemist:1 "#b #ORANGE Chemiker#!#!" #NT!

 ### 2.2.1a ###

 concept_manzoni_literature:1 "Literarische Kultur" #NT!
 concept_manzoni_literature_desc:1 "#b Literarische Kultur#!is eines der Hauptmerkmale von [concept_morgenroete]. Die Druckkultur und insbesondere die Zeitungskultur erlebten im 19. und 20. Jahrhundert bedeutende Umwälzungen. Die Masse der Druckerzeugnisse und des alltäglichen Gebrauchs wird durch die Druckindustrie repräsentiert. Der kulturelle Wert der produzierten Literatur spiegelt sich in der [concept_manzoni_literary_tradition] wider. Letzteres hängt weitgehend von [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] eines Landes ab. Es gibt [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')] und [Concept('concept_manzoni_national_writer','$concept_manzoni_national_writers$')]. Ob sie im Schatten leben oder zu gefeierten Schriftstellern werden, hängt vom [concept_manzoni_popular_taste] ab." #NT!

 ### 2.2.2 ###

 concept_morgenroete_desc:1 "#r Morgenröte - Dawn of Flavor #! ist eine Mod, die entwickelt wurde, um die kulturellen und wissenschaftlichen Aspekte von Victoria 3 zu erweitern. Sie enthält Inhalte zu verschiedenen Aspekten des viktorianischen Zeitalters:\n\n#V Lepsius: #! [concept_lepsius_archaeology]\n#V Verrier:#! [concept_verrier_astronomy]\n#V Gaudi:#! [concept_elgar_architecture] & [concept_gaudi_engineering]\n#V Dubois:#! [concept_dubois_natural_history]\n#V Mendelejew:#! [concept_mendelejew_chemistry]\n#V Elgar:#! [concept_elgar_music]\n#V Manzoni:#! [concept_manzoni_literature]\n#V Klimt:#! [concept_klimt_painting_culture]\n#V Curtiss:#! [concept_curtiss_aviation]\n#V Vikelas:#! [concept_vikelas_sports]" #NT!
  
 concept_agassiz_mineral:1 "Mineral" #NT!
 concept_agassiz_minerals:1 "Mineralien" #NT!
 concept_agassiz_mineral_desc:1 "Mineralien sind alle Arten von besonderen Gesteinsarten, die nicht unter die bekannten, in der Industrie verwendeten Ressourcen fallen. Eine Nation erhält jährlich eine bestimmte Anzahl von Mineralien, wenn sie die Technologie #b Geologie#! erforscht hat. Wenn ein [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] im Dienste dieser Nation steht, kann er zusätzliche Mineralien finden. Standorte von Mineralien werden durch Staatsmodifikatoren charakterisiert: Berge, Wüsten, arktische Gebiete, Rohstoffvorkommen (z.B. Kohle-, Eisen- und Schwefelgebiete) sowie geologische [Concept('concept_dubois_formation','$concept_dubois_formations$')] und Vulkane. Wüsten und arktische Gebiete gelten als arm an Mineralien, während große geologische Formationen und Vulkane als besonders reich an Mineralien gelten. Eine besonders wertvolle Form von Mineralien sind [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]." #NT!
 concept_agassiz_rare_mineral:1 "Seltenes Mineral" #NT!
 concept_agassiz_rare_minerals:1 "Seltene Mineralien" #NT!
 concept_agassiz_rare_mineral_desc:1 "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] können auf ihren Expeditionen, wie z. B. [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [Concept('concept_dubois_mountaineering','Bergsteige')]-Expeditionen, [concept_agassiz_volcano]-Expeditionen oder beim Schürfen von Mineralien, seltene Mineralien finden. Im Gegensatz zu gewöhnlichen [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] werden sie nur in sehr begrenzten Mengen gefunden. Seltene Mineralien werden für den Bau eines Mineralienkabinetts verwendet." #NT!
 concept_agassiz_geologist:1 "#b #GREEN Geologe#!#!" #NT!
 concept_agassiz_geologists:1 "#b #GREEN Geologen#!#!" #NT!
 concept_agassiz_geologist_desc:1 "#b #GREEN Geologen#!#! sind [Concept('concept_academics_academic','$concept_academics_academics$')], die hauptsächlich Gesteine und die Erdgeschichte untersuchen. Sie lokalisieren [Concept('concept_lepsius_cave','$concept_lepsius_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] und [Concept('concept_curie_uranium','$concept_curie_uranium$')]lagerstätte, was sie zu unersetzlichen Kollegen für [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] und [Concept('concept_curie_physicist','$concept_curie_physicists$')] macht. Während ihrer Expeditionen können sie zusätzliche [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] finden, die ein [concept_mendelejew_chemist] zur Entdeckung oder Isolierung von [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] nutzen kann. Sie können neue Rohstoffvorkommen finden. Sie sind auch als Vulkanologen tätig und können auf Expeditionen zu lokalen [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] gehen, um diese genauer zu erforschen. Zusammen mit [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] können sie neue Geräte, wie z. B. Seismographen, entwickeln, um mehr über das Innere der Erde zu erfahren. Geologen können an [concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] und [Concept('concept_dubois_mountaineering','Bergsteige')]-Expeditionen teilnehmen." #NT!
 concept_agassiz_volcano:1 "Vulkan" #NT!
 concept_agassiz_volcanoes:1 "Vulkane" #NT!
 concept_curie_physicist:1 "#b #ORANGE Physiker#!#!" #NT!
 concept_curie_physicists:1 "#b #ORANGE Physiker#!#!" #NT!
 concept_curie_physicist_desc:1 "#n Demnächst bei Morgenröte!#!" #NT!
 concept_curie_uranium:1 "Uran" #NT!
 concept_curie_uranium_desc:1 "Uran ist ein extrem seltenes Material, das nur in wenigen ausgewählten, historischen Provinzen von [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] gefunden werden kann. Die moderne Physik muss dafür erforscht worden sein. Auf den ersten Blick ist Uran ein sekundäres Erz, das nur in der Keramikproduktion verwendet wird. Es wird aber später gebraucht, vor allem im [concept_verrier_observatory]. Nur wenn die besten physikalischen und chemischen Produktionsmethoden mit Uran versorgt werden, können sie ihren Zweck erfüllen, sei es auf dem Gebiet der Kernphysik oder bei der Erforschung bisher unbekannter Elemente. Ohne Uran sind alle wissenschaftlichen Aktivitäten auf dem Gebiet der Radioaktivität schlicht unmöglich. Daher ist es für [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] und [Concept('concept_curie_physicist','$concept_curie_physicists$')] in der letzten Phase von Victoria 3 besonders interessant." #NT!
  
 concept_mendelejew_chemistry:1 "Chemie" #NT!
 concept_mendelejew_chemistry_desc:1 "#b Chemie#! ist eines der Hauptmerkmale von [concept_morgenroete]. Ab dem 18. Jahrhundert entwickelte sich die #b Chemie#! rasch zu einer modernen Wissenschaft. Plötzlich wurden viele neue Elemente entdeckt und chemische Verfahren erfunden. Im 19. und 20. Jahrhundert gab es noch mehr Entdeckungen in der Chemie, von neuen Elementen bis hin zur Erfindung des Dynamits oder des Haber-Bosch-Verfahrens.\n\nIn #b Morgenröte#! wird #b Chemie#! von [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] geleitet, die sich auf verschiedene Aufgaben konzentrieren können.\n Ein Schwerpunkt ist die Verbesserung der #b $building_chemical_plants$#!, #b $building_explosives_factory$#! oder #b $building_synthetics_plants$#! Ihres Landes, was diese [Concept('concept_building', '$concept_buildings$')] effizienter macht.\nWenn Sie nach einer prestigeträchtigeren Aufgabe suchen, können Sie Ihren #b Chemiker#! [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] theoretisieren, entdecken oder isolieren lassen. Jedes Element fügt ein wenig [concept_prestige] hinzu, je nachdem, ob Sie es theoretisiert, entdeckt oder isoliert haben.\nSpäter im Spiel wird der #b Chemiker#! auch in der Lage sein, #b Synthetisches Öl#! und #b Synthetischen Kautschuk#! zu erfinden. Dies schaltet die #b $building_mendelejew_hydrogenation_plants$#! oder die #b $building_mendelejew_synthetic_rubber_factory$#! frei." #NT!
  
 concept_mendelejew_chemists:1 "#b #ORANGE Chemiker#!#!" #NT!
 concept_mendelejew_chemist_desc:1 "#b #ORANGE Chemiker#!#! sind [Concept('concept_academics_academic','$concept_academics_academics$')], die, [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')], theoretisieren, entdecken und isolieren.\n#b #ORANGE Chemiker#!#! sammeln [concept_academics_experience], wenn sie #b Elemente#! erforschen oder an Konferenzen teilnehmen. Sie können auch Düngemittel, Sprengstoffe und Kunststoffe verbessern. Chemiker können das Periodensystem oder synthetischen Treibstoff erfinden, was sie für Länder ohne Zugang zu Öl wertvoll macht. Sie erhalten zudem jedes Jahr passiv #b Erfahrung#!. Dadurch können #b #ORANGE Chemiker#!#! bessere Chemiker-Eigenschaften erhalten. Sie können auch eine Spezialisierung (Theoretiker, Analytiker, Inspektor) erhalten, wenn sie erzeugt werden oder durch ein Ereignis." #NT!
 concept_mendelejew_element:1 "Chemisches Element" #NT!
 concept_mendelejew_element_no_chemical:1 "Element" #NT!
 concept_mendelejew_elements:1 "Chemische Elemente" #NT!
 concept_mendelejew_element_desc:1 "In der Antike war es üblich zu glauben, dass die Welt aus vier Elementen besteht: Feuer, Erde, Wasser und Luft. Mit dem Beginn der Emanzipation der Chemie von der Alchemie kam es zur wissenschaftlichen Analyse der chemischen Elemente. Dieser Prozess war im 19. Jahrhundert noch lange nicht abgeschlossen.\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] können diese Forschung fortsetzen, indem sie Elemente theoretisieren, entdecken und eines nach dem anderen isolieren. Erst wenn ein Element isoliert ist, gilt es als vollständig anerkannt und erhält seinen Namen; vorher ist es nur eine Nummer. Die Kategorisierung der Elemente bringt wissenschaftlichen Fortschritt und Chemiker [concept_academics_experience].\n Nicht alle Elemente können von Anfang an theoretisiert, entdeckt und isoliert werden.\n Voraussetzung ist, dass das chemische Labor im [concept_verrier_observatory] über eine entsprechende Ausstattung verfügt, in manchen Fällen auch über ein Institut für moderne Physik. Viele Elemente können nur mit Spektrografie richtig erforscht werden; gegen Ende des Spiels kann ein Zyklotron notwendig sein. Für die Entdeckung und Isolierung von chemischen Elementen sind [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] notwendig. Neben den Produktionsmethoden spielen auch die Erfahrung und die Charaktereigenschaften des Chemikers eine entscheidende Rolle für die Dauer der Forschung.\n\nDie entdeckten Elemente sind Voraussetzung für die Entwicklung des Periodensystems und die Organisation des Chemiekongresses." #NT!
  
 concept_verrier_meteorite:1 "Meteorit" #NT!
 concept_verrier_meteorites:1 "Meteoriten" #NT!

 ### 2.2.2a ###

 concept_manzoni_national_writers:1 "Nationale Schriftsteller"

 ### 2.2.3 ###

 concept_verrier_astronomy_desc: "#b Astronomie#! ist einer der Hauptinhalte von [concept_morgenroete].\n\nUm Zugang zu #b Astronomie#! zu erhalten, benötigen Sie [concept_verrier_observatory] oder [concept_verrier_astronomer].\n\nSobald Sie ein Observatorium haben, werden Sie passiv [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdecken.\n\n Wenn Sie [concept_verrier_astronomer] haben, können Sie sogar neue Planeten, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], #!0 finden und #!1 nehmen.\nManchmal kann Ihr #!2 auch #!3 finden, das von #b Astronomen#! und #!6 untersucht werden kann.\n\nJede astronomische Entdeckung gewährt Ihnen #!7, das zu #!8 hinzugefügt wird. Überprüfen Sie #!9 [concept_morgenroete]0, um Ihr #b astronomisches Prestige#! zu sehen" #NT!
  
 concept_verrier_observatory_desc: "Ein #b Observatorium#! ist das Rückgrat der [concept_verrier_astronomy] und [concept_mendelejew_chemistry] eines Landes. Von dort aus kann [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] Planeten entdecken, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] und [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')] einnehmen.\nUm ein #b Observatorium#! zu bauen, müssen Sie eine Universität haben und entweder #!1 oder #!2 #!3 erforscht haben. Außerdem kann ein #b Observatorium#! nur einmal und nur in Ihrer Hauptstadt gebaut werden." #NT!
  
 concept_verrier_astronomer_desc: "#b Astronomen#! sind Akademiker, die den Himmel erforschen und [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] und [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdecken.\n#b Astronomen#! erhalten [concept_academics_experience], wenn sie #b Astronomische Objekte#! entdecken oder Konferenzen besuchen. Sie erhalten außerdem jedes Jahr passiv #b Erfahrung#!. Dadurch können #b Astronomen#! bessere Astronomeneigenschaften erlangen.\n\nEin #b Astronom#! kann sich auf die Entdeckung neuer #b Satelliten#! oder #b Mondfotos#! konzentrieren. Dadurch verringert sich jedoch die Anzahl der entdeckten #b Astronomischen Objekte#!" #NT!
  
 concept_verrier_astronomical_prestige: "Astronomisches Prestige" #NT!
 concept_verrier_astronomical_prestige_desc: "#b Astronomisches Prestige#! ist die Menge an [concept_prestige], die Sie durch Astronomie gewinnen. Verschiedene Faktoren beeinflussen Ihr #b Astronomisches Prestige#!:\n- Wenn Sie einen neuen Planeten finden, erhalten Sie zwischen #V 15#! und #V 100#! Prestige, abhängig von der Schwierigkeit, ihn zu finden.\n- Jeder entdeckte [concept_verrier_satellite] gewährt Ihnen 10 Prestige.\n- Ein abgeschlossener #!0 gewährt Ihnen #V 25#! Prestige.\n- Ein großer Komet gewährt Ihnen 10 Prestige.\n- Jeder #!3 gewährt Ihnen #V 1#! Prestige.\n- Jeder #V 100#! #!8 gewährt Ihnen #V 1#! Prestige." #NT!
  
 concept_verrier_astronomical_object_desc: "#b Astronomische Objekte#! sind Asteroiden und Sterne, die Sie entdeckt haben. Diese Objekte können entdeckt werden, wenn Sie ein [concept_verrier_observatory] haben. Je besser Ihre Astronomietechnologie ist, desto mehr Objekte werden Sie finden. Sie werden auch mehr #b Objekte#! entdecken, wenn Sie ein [concept_verrier_astronomer] haben.\nMit genügend #b Astronomischen Objekten#! können Sie neue Planeten oder die Astrophysiktechnologie entdecken." #NT!
  
 concept_verrier_moon_map: "Mondkarte" #NT!
 concept_verrier_moon_photo_desc: "Wenn Sie ein [concept_verrier_observatory] haben und die Kameratechnologie erforscht haben, können Sie Ihren [concept_verrier_astronomer] anweisen, den Mond zu fotografieren. Dadurch verringert sich die jährliche Anzahl der [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] Ihres #b Astronomen#!, Sie erhalten jedoch jedes Jahr #b Mondfotos#!.\nWenn Sie genügend #b Mondfotos#! sammeln, erstellen Sie eine genaue Karte des Erdbegleiters. Wenn Sie die Mondkarte vervollständigen, erhält Ihre Nation [concept_verrier_astronomical_prestige]." #NT!
  
 concept_verrier_satellite: "Satellit" #NT!
 concept_verrier_satellites: "Satelliten" #NT!
 concept_verrier_satellite_desc: "#b Satelliten#! oder Monde sind [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], die einen Planeten umkreisen. Einige #b Satelliten#! wie der Mond der Erde wurden bereits entdeckt, aber ein [concept_verrier_astronomer] kann versuchen, mehr davon zu finden.\nJeder von Ihrem Land entdeckte #b Satellit#! gewährt ihm eine kleine Menge [concept_verrier_astronomical_prestige]." #NT!
  
 concept_verrier_meteorite_desc: "Meteoriten sind relativ kleine Festkörper kosmischen Ursprungs, die die Erdatmosphäre durchquert und die Erdoberfläche erreicht haben. In seltenen Fällen können Meteoritenfragmente nach einem Meteoritenschauer gefunden werden. Meteoriten, die vor Tausenden von Jahren auf die Erde gefallen sind, können von [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] auch in schwierigem Gelände wie Wüsten und arktischen Gebieten gefunden werden. Insbesondere [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] und [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] sind an Meteoriten interessiert und möchten diese möglicherweise analysieren.\n\nZusätzlich helfen #b Meteoriten#!, Ihren [concept_agassiz_geological_score] zu erhöhen und eine bessere Schätzung des [concept_agassiz_age_of_earth] zu ermöglichen." #NT!
  
 concept_agassiz_volcano_desc: "#b Vulkane#! sind eine neue Staatseigenschaft in #r Morgenröte#!. Anders als im Grundspiel für Victoria 3 sind es nicht strategische Regionen, sondern Staaten mit Vulkanen, an die gebunden ist, ob ein Vulkanausbruch stattfindet. Die vulkanische Aktivität ist deutlich größer, aber nicht immer zerstörerisch. In Ländern mit Vulkanen kann ein #b $building_agassiz_volcano_observatory$#! errichtet werden, der nicht nur hilft, Ausbrüche durch Beobachtungen vorherzusagen und abzumildern, sondern auch Ausgangspunkt für eine Vulkanexpedition ist. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] kann auf einer Vulkanexpedition neue [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], Erfahrung und die Eigenschaft Vulkanologe erwerben." #NT!
  
 concept_agassiz_geological_knowledge: "Geologisches Wissen" #NT!
 concept_agassiz_geological_knowledge_desc: "#b Geologisches Wissen#! umfasst das allgemeine Verständnis einer Nation über die Natur der Erde. Es ist eine sehr seltene Ressource, die vor allem im Laufe geologischer Meilensteine ​​erworben werden kann. #b Geologisches Wissen#! ist nicht dasselbe wie [concept_agassiz_geological_score], aber es ist dessen wichtigster Bestandteil und wird als besonders wertvoll angesehen." #NT!
 concept_agassiz_geological_score: "Geologische Punktzahl" #NT!
 concept_agassiz_geological_score_desc: "Der #b Geologische Score#! umfasst alle Errungenschaften und Kenntnisse einer Nation, die mit Geologie zu tun haben. Die wichtigste Komponente ist [concept_agassiz_geological_knowledge], aber es gibt noch viele andere wichtige Faktoren, wie die Erfahrung eines [concept_agassiz_geologist], [concept_agassiz_oceanographic_knowledge], die Anzahl der [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] oder [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] und geologische Technologien. Der Geologische Score ist entscheidend für die Neudatierung des [concept_agassiz_age_of_earth]." #NT!
 concept_agassiz_oceanographic_knowledge: "Ozeanographisches Wissen" #NT!
 concept_agassiz_oceanographic_knowledge_desc: "#b Ozeanographische Kenntnisse#! ist Bestandteil von [concept_agassiz_geological_knowledge] und entspricht Kenntnissen über die Meere, insbesondere Meeresströmungen, aber auch allgemeine Meeresforschung kombiniert mit geophysikalischen Betrachtungen. #b Ozeanographische Kenntnisse#! wird im Wesentlichen auf der Grundlage von [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] erworben. 50 #b Ozeanographische Kenntnisse#! sind Voraussetzung für den Erwerb von [concept_agassiz_geological_knowledge]." #NT!
 concept_agassiz_age_of_earth: "Alter der Erde" #NT!
 concept_agassiz_age_of_earth_desc: "Eine der großen Fragen des 19. Jahrhunderts war die Frage nach dem #b Alter der Erde#!.. Sie hatte naturgeschichtliche Implikationen, insbesondere hinsichtlich der Gültigkeit der Evolutionstheorie und der Abfolge geologischer Ereignisse. Nur ein [concept_agassiz_geologist] kann ein neues Erdalter bestimmen. Dazu muss seine Nation ein höheres [concept_agassiz_geological_score] aufweisen als die Nation, die zuletzt ein Erdalter bestimmt hat. Seine Forschungsergebnisse wird er dann mit anderen Kollegen teilen. Dabei muss er nicht unbedingt Erfolg haben – zu junge und unerfahrene Geologen finden kein Gehör. Allerdings sind fremde Nationen etwas entgegenkommender, wenn über viele Jahre keine neue Theorie vorgelegt wurde. Geologen können nur einmal in ihrem Leben das Alter der Erde schätzen – dies gilt allerdings auch nur, wenn sie erfolgreich sind. Bei Misserfolg kann man es nach einer Phase der Motivation erneut versuchen." #NT!
 concept_agassiz_geology:1 "Geologie" #NT!
 concept_agassiz_geology_desc:1 "#b Geologie#! ist eines der Hauptmerkmale von [concept_morgenroete]. Schon vor Beginn des Viktorianischen Zeitalters erlebte die Geologie einen bedeutenden Aufschwung, weshalb sie vielen Nationen zu Beginn des Spiels zur Verfügung steht. \n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] können auf verschiedene Weise verwendet werden: sie können bei einer geologischen Suche [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] und [concept_curie_uranium] Lagerstätten finden, auf [concept_agassiz_volcano] Expeditionen gehen, das [concept_agassiz_age_of_earth] bestimmen, neue Erz- und Ölvorkommen finden oder als nützliche wissenschaftliche Begleiter auf [concept_dubois_pacific_expedition] und [Concept('concept_dubois_mountaineering','Bergsteige')]-Expeditionen gehen. Ein [concept_agassiz_geological_score] bewertet das gesamte Wissen einer Nation und ist entscheidend für die Bestimmung des Alters der Erde. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] und [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] sind ein wesentlicher Bestandteil der Geologie; mit letzterem kann im [concept_dubois_zoo] ein Mineralienkabinett eingerichtet werden. Eine besondere geologische Einrichtung ist das #b $building_agassiz_volcano_observatory$#!, in dem vulkanologische und seismische Studien durchgeführt werden." #NT!

