 ### 1.9.0 ### 
  
 ###VIKELAS### 
 concept_vikelas_sports:1 "Sport" #NT!
 concept_vikelas_sports_desc:1 "#b Sport#! ist einer der Hauptinhalte von [concept_morgenroete].\n\nSobald ein Land #b Organisierter Sport#! entdeckt, erhält es Zugang zu verschiedenen sportlichen Aktivitäten. Das wichtigste ist die Gründung des [Concept('concept_vikelas_ioc', '$concept_vikelas_ioc_es$')], das mit der Organisation der [Concept('concept_vikelas_olympic_games', '$concept_vikelas_olympic_games_en$')] beginnen wird. Bei den Olympischen Spielen haben Sie die Chance, Goldmedaillen zu gewinnen, die Ihrem Land [concept_prestige] bescheren." #NT!
  
 concept_vikelas_olympic_games:1 "Olympische Spiele" #NT!
 concept_vikelas_olympic_games_en:1 "Olympischen Spiele" #NT!
 concept_vikelas_olympic_games_desc:1 "Sobald das [Concept('concept_vikelas_ioc', '$concept_vikelas_ioc_e$')] gegründet ist, können die #b Olympischen Spiele#! alle 4 Jahre stattfinden. Jedes Mal stimmt das Komitee für einen #b Gastgeber#!. Das Gastgeberland wird einen großen [concept_prestige]-Bonus erhalten.\n Während der Olympischen Spiele werden Ihre Athleten um Medaillen kämpfen. Viele Faktoren beeinflussen, wie viele Medaillen Sie erhalten. Ihre Bevölkerung hat einen kleinen Einfluss, der [concept_sol] hat einen größeren Einfluss, einige Events beeinflussen auch Ihre Chancen, ebenso wie große [Concept('concept_general', '$concept_generals$')] und große [Concept('concept_admiral', '$concept_admirals$')]. Zusätzlich geben Charakter mit der Eigenschaft #b Athlet#! und städtische Zentren mit der Produktionsmethode #b Sportanlagen#! ebenfalls kleine Boni.\nAll diese Faktoren haben Einfluss darauf, wie viele der 12 Goldmedaillen Ihr Land erhalten wird. Für jede Goldmedaille erhalten Sie 5 [concept_prestige]." #NT!
  
 concept_vikelas_ioc:1 "Internationales Olympisches Komitee" #NT!
 concept_vikelas_ioc_e:1 "Internationale Olympische Komitee" #NT!
 concept_vikelas_ioc_es:1 "Internationalen Olympischen Komitees" #NT!
 concept_vikelas_ioc_desc:1 "Eine Nation, die #b Organisierter Sport#! erforscht hat, kann das #b Internationale Olympische Komitee#! oder kurz #b IOC#! gründen. Das IOC wird dann mit der Organisation der [Concept('concept_vikelas_olympic_games', '$concept_vikelas_olympic_games_en$')] beginnen. Jedes Mitglied des IOC kann an den Olympischen Spielen teilnehmen.\n Die wichtigsten Mitglieder des IOC sind die #b Vorstandsmitglieder#!. Der Gründer des IOC wird #b Präsident#! und bleibt somit für immer Vorstandsmitglied, während die anderen Mitglieder alle 4 Jahre gewählt werden. Der Vorstand bietet Platz für 5 Großmächte, 2 europäische, 2 asiatische, 2 amerikanische, 1 afrikanische und 1 ozeanische Nation.\nDie Hauptaufgabe der Vorstandsmitglieder besteht darin, den nächsten Gastgeber der Spiele auszuwählen. Es stehen 3 Kandidaten (oder 4, wenn ein Land beschließt, den Vorstand zu bestechen) zur Auswahl.\nWenn Griechenland das IOC gründet, werden die Olympischen Spiele nur in Griechenland abgehalten, was dazu führt, dass der Vorstand weniger wichtig ist, da er nicht den Gastgeber wählt." #NT!

 ### 2.0.4 ### 
  
 ##########################################################################################
  
 concept_elgar_architecture_desc:1 "#b Architektur#! ist eines der Hauptmerkmale von [concept_morgenroete].\n\nViele Nationen erhielten neue #b Denkmäler#!: den #b Kölner Dom#! in Deutschland, die #b Gotthardbahn#! in der Schweiz, das #b Cristo Redentor#! in Brasilien, die #b Mole Antonelliana#! in Italien, die #b Wiener Ringstraße#! in Österreich, der #b Sommerpalast#! in China, die #b Sagrada Família#! in Spanien, das #b Schloss Neuschwanstein#! in Bayern, der #b Palacio de Bellas Artes#! in Mexiko und der #b Gyeongbokgung-Palast#! in Korea.\nAlle Gebäude außer dem #b Sommerpalast#!, dem #b Sächsischen Palast#! und dem #b Campanile#! müssen von ihrem Besitzer gebaut werden, der #b Sächsische Palast#! kann von einer polnischen Nation reaktiviert werden.\nEs gibt Tagebucheinträge und Ereignisse, die Sie durch den Bauprozess leiten.\nFür Nationen, die #b Art Déco#! erforscht haben, gibt es sogar noch mehr Inhalt, da sie die Umwandlung ihrer Städte beginnen können, um eine [concept_gaudi_splendid_architecture] zu erreichen" #NT!
  
 concept_gaudi_engineering:1 "Ingenieurwesen" #NT!
 concept_gaudi_engineering_desc:1 "#b Ingenieurwesen#! ist eine der Hauptfunktionen von [concept_morgenroete].\n\nUm Zugang zu #b Ingenieurwesen#! zu erhalten, müssen Sie einen [concept_gaudi_engineer] haben. #b Ingenieure#! können abhängig von ihrer Spezialisierung #b Ingenieurprojekte#! starten. Es gibt fünf spezialisierte #b Ingenieure#!:\n- Der [concept_gaudi_civil_engineer] konzentriert sich auf die Verbesserung der Infrastruktur eines Landes.\n- Der [concept_gaudi_mechanical_engineer] konzentriert sich auf mechanische Erfindungen, die z.B. der Industrie zugute kommen. \n- Der [concept_gaudi_military_engineer] konzentriert sich auf die Verbesserung der Armee und der Marine eines Landes.\n- Der [concept_gaudi_electrical_engineer] konzentriert sich auf die Verbesserung der elektrischen Infrastruktur eines Landes.\n- Der [concept_gaudi_aeronautical_engineer] konzentriert sich auf die Ermöglichung des menschlichen Fluges und die Verbesserung von Flugzeugen und anderen Luftfahrzeugen." #NT!
  
 concept_gaudi_engineer_desc:1 "#b #ORANGE Ingenieure#!#! sind Akademiker, die beim Bau von Spezialgebäuden helfen, indem sie ihr Fachwissen zur Verfügung stellen. Außerdem geben #b #ORANGE Ingenieure#!#! einen Bonus auf die [concept_technology_spread] deiner Nation. Der Bonus hängt davon ab, wie viele Nationen mehr Technologien erforscht haben als deine Nation." #NT!
  
 concept_gaudi_civil_engineer_desc:1 "#b Bauingenieure#! konzentrieren sich auf die Verbesserung der Infrastruktur eines Landes. Sie können #b Bauprojekte#! starten, um Ihre Staaten mit [Concept('concept_modifier','$concept_modifiers$')] auszustatten, welche die [concept_infrastructure] erhöhen, um Ihre #b Bausektoren#! zu verbessern oder um [Concept('concept_technology', '$concept_technologies$')] zu erforschen." #NT!
  
 concept_gaudi_mechanical_engineer_desc:1 "#b Maschinenbauingenieur#! konzentrieren sich auf mechanische Innovationen, die Ihre Industrie, Ihre Maschinen oder das Leben Ihrer Bevölkerung verbessern.\nSie können #b Ingenieurprojekte#! starten, um Ihre Industriegebäude mit [Concept('concept_modifier','$concept_modifiers$')] auszustatten, die [concept_throughput], [concept_good_production] und [concept_input_mult] verbessern, um Ihre #b Eisenbahnen#! mit neuen Lokomotiven zu verbessern oder um industrielle [Concept('concept_technology', '$concept_technologies$')] zu erforschen." #NT!
  
 concept_gaudi_military_engineer_desc:1 "#b Militäringenieure#! konzentrieren sich darauf, unsere Armee und Marine durch die Einführung neuer Innovationen zu verbessern. Sie können #b Ingenieurprojekte#! starten, um durch die Erfindung von Waffen, neuen Feldarbeiten und besseren Panzern neue [Concept('concept_mobilization_option','$concept_mobilization_options$')] zu erhalten oder um militärische oder maritime [Concept('concept_technology', '$concept_technologies$')] zu erforschen." #NT!
  
 concept_gaudi_electrical_engineer_desc:1 "#b Elektroingenieure#! konzentrieren sich darauf, Ihr Land mit elektrischen Innovationen zu verbessern. Sie können #b Ingenieurprojekte#! starten, um das geomagnetische Feld der Erde zu erforschen, Telegrafen- oder Funknetzwerke zu bauen oder elektrische [Concept('concept_technology', '$concept_technologies$')] zu erforschen." #NT!
  
 concept_gaudi_aeronautical_engineer_desc:1 "#b Luftfahrtingenieure#! konzentrieren sich auf die Entwicklung von Flugmitteln und die Verbesserung von Flugzeugen und Zeppelinen. Sie können #b Ingenieurprojekte#! starten, um Ihren #V Flughäfen#! mit [Concept('concept_modifier','$concept_modifiers$')] auszustatten, die [concept_throughput], [concept_good_production] und [concept_input_mult] verbessern, um #V Fortgeschrittene Flugzeuge#! als [Concept('concept_mobilization_option','$concept_mobilization_options$')] freizuschalten oder um Luftfahrt-[Concept('concept_technology', '$concept_technologies$')] zu erforschen." #NT!

 ### 2.1.0 ###
  
 concept_lepsius_archaeological_exhibition:1 "Archäologische Ausstellung" #NT!
  
 concept_elgar_opera_desc:1 "Die #b Oper#! ist das musikalische Zentrum einer Nation. Hier versammeln sich die wichtigsten Musiker und spielen für die Massen.\nDie #b Oper#! ist ein separates Gebäude, das in Staaten errichtet werden kann, wenn das Stadtzentrum mindestens Stufe 5 hat. Die #b Oper#! wird Musik produzieren und Instrumente verbrauchen. Je höher die Stufe der #b Oper#! ist, desto mehr [concept_elgar_musical_tradition] wird jedes Jahr produziert.\nZusätzlich erhalten Sie mit einer #b Oper#! Zugriff auf einige Entscheidungen wie den Besuch Ihrer Oper." #NT!
  
 concept_elgar_impressionism_desc: "#b Impressionismus#! ist ein Stil in der Kunstgeschichte, der sich durch die stimmungsvolle Darstellung flüchtiger Momentaufnahmen einer Szene auszeichnet. Sie entstand aus einer Bewegung innerhalb der Malerei in Frankreich in der zweiten Hälfte des 19. Jahrhunderts. Der Begriff Impressionismus wurde auch auf bestimmte Musik-, Literatur-, Film- und Fotografiestile angewendet. Während viele Naturforscher wie Heinrich Hart Musik als Ausdrucksmittel eines "wahrheitssuchenden Aktionismus" ablehnten, empfanden die Impressionisten das "gegenstandslose Vorausträumen" zu fein abgestuften bunten Akkorden oft als Vergnügen.\n\nIm Spiel #b Impressionismus#! kann nur mit einem Tagebucheintrag freigeschaltet werden, der 1000 [concept_elgar_musical_tradition], einen [concept_elgar_opera], mächtige Landbesitzer, nicht mächtige Industrielle und eine Intelligenz mit einer Zustimmung von 5 oben erfordert. Wenn Sie #b Impressionismus#! wählen, können Sie die beiden anderen Zweige nicht freischalten.\n\nDer Fokus von #b Impressionismus#! im Spiel liegt auf Musik. Daher erhalten Sie den größten Bonus für [concept_elgar_musical_tradition]." #NT!
 concept_elgar_expressionism_desc: "#b Expressionismus#! ist ein Stil in der Kunst. Ihre Anfänge und Vorläufer sind im späten 19. Jahrhundert zu finden. Der Expressionismus ist wie Impressionismus, Symbolismus und Fauvismus eine Bewegung gegen die Tendenzen des Naturalismus. Im Expressionismus überwiegt die expressive Ebene die ästhetische, appellative und sachliche Ebene. Der Künstler möchte seine Erfahrung für den Betrachter darstellen. Im Gegensatz zum musikalischen Impressionismus, der die Wahrnehmung der äußeren Erscheinung von Dingen darstellt, formulieren die expressionistischen Kunstrichtungen die Emotionen der menschlichen Seele.\n\nIm Spiel kann #b Expressionismus#! nur mit einem erforderlichen Tagebucheintrag freigeschaltet werden 1000 [concept_elgar_musical_tradition], ein [concept_elgar_opera], eine mächtige Intelligenz oder Gewerkschaften, Grundbesitzer, die nicht mächtig sind und entweder die Intelligenz oder die Gewerkschaften eine Zustimmung von 5 oder höher benötigen. Wenn Sie #b Expressionismus#! wählen, können Sie die beiden anderen Zweige nicht freischalten.\n\nDer Schwerpunkt von #b Expressionismus#! im Spiel wäre Literatur, aber es ist noch nicht implementiert." #NT!
 concept_elgar_art_nouveau_desc: "#b Jugendstil#! ist ein Kunststil, der sich aus der #italic Arts and Crafts-Bewegung#! entwickelte und von natürlichen Formen inspiriert wurde. Es konzentrierte sich oft auf Dynamik und Bewegung und verwendete moderne Materialien.\n\nIm Spiel kann #b Jugendstil#! nur mit einem Tagebucheintrag freigeschaltet werden, der 1000 [concept_elgar_musical_tradition], einen [concept_elgar_opera], mächtige Industrielle und eine Intelligenz mit Genehmigung erfordert von 5 oder höher. Wenn Sie #b Art Nouveau#! wählen, können Sie die anderen beiden Zweige nicht freischalten.\n\nDer Fokus von #b Art Nouveau#! und #b Art Déco#!, der nächsten Technologie in diesem Zweig, ist Architektur. Sie erhalten verschiedene Veranstaltungen und Tagebucheinträge zu architektonischen Taten und können einen #!4 erhalten." #NT!
 concept_elgar_composer:1 "#PURPLE #b Komponist#!#!" #NT!
 concept_elgar_composers:1 "#PURPLE #b Komponisten#!#!" #NT!
 concept_elgar_composer_desc:1 "#b Komponisten#! sind Männer und Frauen, die Musik komponieren. Komponisten sind spezielle Charaktere, die Sie entweder durch Ereignisse erhalten, indem Sie genug [concept_artistic_progress] sammeln, um einen in Ihrem Land zu erschaffen, oder indem Sie einem [concept_elgar_travelling_composer] eine Position anbieten. Sobald Sie einen #b Komponisten#! haben, können Sie ihn [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], auf [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] gehen oder ein [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] komponieren lassen. Jede Aktion unterscheidet sich darin, was der Komponist macht, was er braucht und was Sie davon haben. Der #b Komponist#! wird nach jeder Aufgabe [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')] sein und sich eine Weile ausruhen müssen, bis er wieder arbeiten kann.\nIm Laufe seines Lebens wird der #b Komponist#! [concept_artists_experience] gewinnen und manchmal wieder verlieren. Je höher das #b Renommee#! ist, desto größer sind die Vorteile der Handlungen eines #b Komponisten#!. #b Komponisten#!, die ein #b Renommee#! von 500 erreichen, bekommen die Eigenschaft [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], Titanen der Musik, bekannt in der ganzen Welt." #NT!
  
 concept_elgar_great_composer:1 "#PURPLE #b Großartiger Komponist#!#!" #NT!
 concept_elgar_great_composers:1 "#PURPLE #b Großartige Komponisten#!#!" #NT!
 concept_elgar_great_composer_desc:1 "#b Großartige Komponisten#! sind die Titanen der Musik. Diejenigen, deren Namen bis in alle Ewigkeit bekannt sein werden. [Concept('concept_elgar_composer','$concept_elgar_composers$')], die 500 [concept_artists_experience] erreichen, werden #b GroßartigeKomponisten#!. Dies erhöht ihre Effizienz und lässt Ihre Nation viel mehr [concept_elgar_musical_tradition] gewinnen. Ein #b Großartiger Komponist#! kann zum Beispiel ein [concept_elgar_musical_masterwork] viel schneller erschaffen." #NT!
  
 concept_elgar_travelling_composer:1 "Reisender Komponist" #NT!
 concept_elgar_travelling_composer_akk: "Reisenden Komponisten" #NT!
 concept_elgar_travelling_composers:1 "Reisende Komponisten" #NT!
 concept_elgar_travelling_composer_desc:1 "#b Reisende Komponisten#! sind [Concept('concept_elgar_composer','$concept_elgar_composers$')], die von keiner Nation angestellt wurden. Stattdessen reisen sie auf Konzerttourneen umher. Sie können einen #b Reisenden Komponisten#! anwerben, aber je mehr [concept_artists_experience] sie haben, desto mehr Ansprüche werden sie stellen.\nUm einen #b Reisenden Komponisten#! einzuladen, müssen Sie mindestens ein [Concept('concept_elgar_opera','$concept_elgar_opera_house$')] haben. #b Komponisten#! mit einem höheren #b Renommee#! verlangen größere Opernhäuser, moderne Musik [Concept('concept_technology', '$concept_technologies$')], eine gewisse [concept_elgar_musical_tradition] und manche können sich nur [Concept('concept_major_power', '$concept_major_power_short$')] oder [Concept('concept_great_power', '$concept_great_powers$')] anschließen.\nEin Sonderfall sind [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')], die nur für Nationen zur Verfügung stehen, die dieselbe oder eine sehr ähnliche nationale Identität haben." #NT!
  
 concept_elgar_national_composer:1 "Nationaler Komponist" #NT!
 concept_elgar_national_composers:1 "Nationale Komponisten" #NT!
 concept_elgar_national_composer_desc: "#b Nationale Komponisten#! sind [Concept('concept_elgar_composer','$concept_elgar_composers$')], die ihre Nation sehr schätzen. Sie können nicht von anderen Nationen angeheuert werden.\nOb ein #b Nationaler Komponist#! für Sie verfügbar ist oder nicht, wird durch die [Concept('concept_cultural_trait','$concept_cultural_traits$')] seiner Kultur entschieden. Eine Ihrer primären Kulturen muss sowohl eine nicht-erbliche #b Eigenschaft#! als auch eine [concept_cultural_heritage_trait] teilen. Das bedeutet, dass ein norddeutscher #b Nationaler Komponist#! sowohl für deutsche Länder als auch für die Schweiz verfügbar ist." #NT!
  
 concept_elgar_composing:1 "Komponieren" #NT!
 concept_elgar_composing_lower_case:1 "komponieren" #NT!
 concept_elgar_composing_compose:1 "komponieren" #NT!
 concept_elgar_composing_desc:1 "Ein [concept_elgar_composer], der #b komponiert#! erhält pro Jahr 5 [concept_artists_experience] und fügt dem Land 5 [concept_elgar_musical_tradition] hinzu. Außerdem schafft er jedes Jahr eine zufällige Anzahl von Kompositionen. Ein #b Komponist#! mit besonderen Fähigkeiten wie Dirigent, Virtuose, Innovativ oder Akribisch schafft eine zusätzliche Komposition pro Jahr. Die Anzahl der Kompositionen ist entscheidend für den Erfolg auf späteren [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]. Ein #b Komponist#! komponiert so lange, bis die Aktion im Journaleintrag abgebrochen wird. Ein #b Komponist#!, der komponiert, kostet das Land eine kleine jährliche Unterhaltsgebühr." #NT!
  
 concept_elgar_conducting:1 "Dirigieren" #NT!
 concept_elgar_conducting_lower_case:1 "dirigieren" #NT!
 concept_elgar_conducting_conduct:1 "dirigieren" #NT!
 concept_elgar_conducting_desc:1 "Der [concept_elgar_composer] wird sich 24 Monate lang auf das #b Dirigieren#! konzentrieren und eine Konzertsaison organisieren. Dies verbessert die Musikproduktion einer zufälligen [concept_elgar_opera] oder gibt, für 5 bis 10 Jahre, Ihrer Nation einen kleinen Schub für [concept_elgar_musical_tradition] und Ihrem #b Komponisten#! einen mittleren Schub für sein [concept_artists_experience]. Wenn Ihr #b Komponist#! noch kein Dirigent ist, kann er die [concept_character_trait] am Ende der Saison erhalten. Sie müssen den #b Komponisten#! bezahlen, solange er #b dirigiert#!." #NT!
  
 concept_elgar_musical_tour:1 "Konzerttournee" #NT!
 concept_elgar_musical_tours:1 "Konzerttourneen" #NT!
 concept_elgar_musical_tour_tour:1 "Tournee" #NT!
 concept_elgar_musical_tour_tours:1 "Tourneen" #NT!
 concept_elgar_musical_tour_desc:1 "Der [concept_elgar_composer] kann 30 Monate lang auf #b Konzerttournee#! im Ausland gehen. #b Konzerttourneen#! erhöhen das [concept_prestige] der Nation des #b Komponisten#!. Zusätzlich erhält der #b Komponist#! am Ende der #b Tournee#! einen Schub an [concept_artists_experience], das von der Anzahl der Kompositionen des #b Komponisten#!, sowie seinen Eigenschaften abhängt.\n#b Komponisten#! mit weniger als 20 Kompositionen sollten wahrscheinlich nicht auf #b Tournee#! gehen und #b Komponisten#! mit der Eigenschaft #b Zurückhaltent#! können nicht auf #b Tournee#! gehen." #NT!
  
 concept_elgar_musical_masterwork:1 "Musikalisches Meisterwerk" #NT!
 concept_elgar_musical_masterworks:1 "Musikalische Meisterwerke" #NT!
 concept_elgar_musical_masterwork_masterwork:1 "Meisterwerk" #NT!
 concept_elgar_musical_masterwork_masterworks:1 "Meisterwerke" #NT!
 concept_elgar_musical_masterwork_of_music:1 "Meisterwerk der Musik" #NT!
 concept_elgar_musical_masterworks_of_music:1 "Meisterwerke der Musik" #NT!
 concept_elgar_musical_masterwork_desc:1 "Der [concept_elgar_composer] kann mit der Komposition eines #b Meisterwerks#! beginnen, was mehrere Jahre dauern wird. Je mehr [concept_artists_experience] ein #b Komponist#! hat, desto schneller wird er fertig. Sobald das #b Meisterwerk#! komponiert ist, erhält der #b Komponist#! 50 [concept_artists_experience] und das Land erhält bis zu 150 [concept_elgar_musical_tradition], abhängig von seinem [concept_rank].\nEin #b Komponist#! kann maximal 3 #b Meisterwerke#! erschaffen und benötigt während der Arbeit daran finanzielle Unterstützung durch sein Land." #NT!
  
 concept_elgar_composer_exhaustion:1 "Erschöpfung des Komponisten" #NT!
 concept_elgar_composer_exhaustion_exhausted:1 "erschöpft" #NT!
 concept_elgar_composer_exhaustion_desc: "Sobald ein [concept_elgar_composer] [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], das Verfassen von [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] oder [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] abgeschlossen hat, ist er #b von der Arbeit erschöpft#!. Ein #b erschöpfter Komponist#! wird für einige Zeit nicht arbeiten können. Je älter der #b Komponist#!, desto länger dauert es, die #b Erschöpfung#! loszuwerden." #NT!

 concept_manzoni_writer:1 "#PURPLE #b Schriftsteller#!#!" #NT!
 concept_manzoni_writer_s:1 "#PURPLE #b Schriftstellers#!#!" #NT!
 concept_manzoni_writers:1 "#PURPLE #b Schriftsteller#!#!" #NT!
  
 concept_klimt_painter: "#PURPLE #b Maler#!#!" #NT!
 concept_klimt_painter_gen: "#PURPLE #b Malers#!#!" #NT!
 concept_klimt_painters: "#PURPLE #b Maler#!#!" #NT!
  
 concept_pm_artists_academy_conservatory: "#b #PURPLE Konservatorium#!#!" #NT!
 concept_pm_artists_academy_conservatory_gen: "#b #PURPLE Konservatoriums#!#!" #NT!
 concept_pm_artists_academy_conservatory_desc: "Ein Konservatorium wird die Kunstakademie für Musik spezialisieren. Wenn Sie ein Konservatorium haben, können Sie [Concept('concept_elgar_composer','$concept_elgar_composers$')] fördern. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Kunstakademie sowie einen #n negativen Effekt#! auf Ihren [concept_artistic_progress], wenn Sie diese Produktionsmethode ändern." #NT!
  
 concept_pm_artists_academy_salon: "#b #PURPLE Literarischer Salon#!#!" #NT!
 concept_pm_artists_academy_salon_gen: "#b #PURPLE Literarischen Salons#!#!" #NT!
 concept_pm_artists_academy_salon_desc: "Ein Literatursalon wird die Kunstakademie auf Literatur spezialisieren. Wenn Sie einen Literatursalon haben, können Sie [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] bewerben. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Kunstakademie sowie einen #n negativen Effekt#! auf Ihren [concept_artistic_progress], wenn Sie diese Produktionsmethode ändern." #NT!
  
 concept_pm_artists_academy_studio: "#b #PURPLE Kunstatelier#!#!" #NT!
 concept_pm_artists_academy_studio_gen: "#b #PURPLE Kunstateliers#!#!" #NT!
 concept_pm_artists_academy_studio_desc: "Ein Kunstatelier wird die Kunstakademie auf Malerei spezialisieren. Wenn Sie ein Kunststudio haben, können Sie [Concept('concept_klimt_painter','$concept_klimt_painters$')] bewerben. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Kunstakademie sowie einen #n negativen Effekt#! auf Ihren [concept_artistic_progress], wenn Sie diese Produktionsmethode ändern." #NT!
  
 concept_pm_artists_academy_specialization: "Schwerpunkt der Kunstakademie" #NT!
 concept_pm_artists_academy_specialization_desc: "Jede Kunstakademie kann durch Änderung ihrer Produktionsmethode spezialisiert werden.\nEine Kunstakademie mit einem [concept_pm_artists_academy_conservatory] ermöglicht es Ihnen, [Concept('concept_elgar_composer','$concept_elgar_composers$')] zu fördern.\nEine Kunstakademie mit einem [concept_pm_artists_academy_salon] ermöglicht Ihnen die Förderung von [Concept('concept_manzoni_writer','$concept_manzoni_writers$')].\nEine Kunstakademie mit einem Mit [concept_pm_artists_academy_studio] können Sie [Concept('concept_klimt_painter','$concept_klimt_painters$')] befördern.\nEine Änderung der Spezialisierung hat einen #n kurzen negativen Effekt#! für das Gebäude und Ihren [concept_artistic_progress]." #NT!
  
 concept_artists_artist:1 "Künstler" #NT!
 concept_artists_artists:1 "Künstler" #NT!
  
 concept_artistic_progress: "Künstlerischer Fortschritt" #NT!
 concept_artistic_progress_desc: "Durch den Erwerb von 1000 #b Künstlerischer Fortschritt#! können Sie einen neuen [concept_artists_artist] erhalten. Um überhaupt Zugriff auf #b Artistic Progress#! zu haben, müssen Sie entweder über eine #b Arts Academy#! oder eine #b Opera#! verfügen.\nIhr #b Artistic Progress#!-Gewinn wird von verschiedenen Faktoren beeinflusst. Je mehr #!1 du hast, desto schneller erlangst du zum Beispiel #b künstlerischen Fortschritt#!. Detaillierte Informationen zu allen Faktoren, die den künstlerischen Fortschritt beeinflussen, erhalten Sie über die Symbolleiste der künstlerischen Fortschrittsleiste im Kunstfenster." #NT!
  
 concept_artists_experience: "Renommee" #NT!
 concept_artists_experience_desc: "Jeder [concept_artists_artist] hat ein #b Renommee#!. Dieses Renommee gibt an, wie hoch das Ansehen des Künstlers ist. Künstler beginnen mit einem kleinen Renommee und können durch die Arbeit in ihrem Fachgebiet zusätzliches Renommee erlangen. Künstler, die ein Renommee von 500 erreicht haben, werden zu #Großartigen Künstlern#! und erhalten den entsprechenden [concept_character_trait]." #NT!
  
