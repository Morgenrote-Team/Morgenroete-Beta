 concept_andersson_anthropologist: "#b #BLUE Anthropologe#!#!"
 concept_andersson_anthropologists: "#b #BLUE Anthropologen#!#!"
 concept_andersson_anthropologist_desc: "#b #BLUE Anthropologen#!#! sind Wissenschaftler, die sich mit der Vorgeschichte des Menschen befassen, sowohl im paläontologischen als auch im archäologischen Sinne. Sie suchen nach [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] in [Concept('concept_andersson_cave','$concept_andersson_caves$')] oder identifizieren bisher unbekannte Knochen. Drei #b menschliche Fossilien#! reichen aus, um eine vormenschliche Spezies zu rekonstruieren. Der Fund und die Identifizierung von Knochen sowie die Systematisierung früher menschlicher Spezies verschaffen anthropologisches Ansehen. Bei der Erkundung von Höhlen können sie auch lokale Artefakte finden."
 concept_andersson_human_fossil: "Menschliches Fossil"
 concept_andersson_human_fossils: "Menschliche Fossilien"
 concept_andersson_human_bones: "Human Bones"
 concept_andersson_human_fossil_desc: "#b Menschliche Fossilien#! gehören zu einer von fünf verschiedenen Arten: Cro-Magnon, Neandertaler, Homo erectus, Australopithecus oder Paranthropus. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] können sie in [Concept('concept_andersson_cave','$concept_andersson_caves$')] finden und (in der Regel) sofort identifizieren und zuordnen. Archäologen und Paläontologen finden menschliche Fossilien jedoch nur selten. Nur #b #BLUE Anthropologen#!#! können diese „unbekannten menschlichen Fossilien“ korrekt identifizieren. Drei Knochen vervollständigen eine Spezies, was mit anthropologischem Prestige belohnt wird. Die erste Klassifizierung eines frühen Menschen bringt deutlich mehr Prestige ein. Menschliche Fossilien können so oft wie gewünscht vervollständigt werden."
 concept_andersson_cave: "Cave"
 concept_andersson_caves: "Caves"
 concept_andersson_cave_desc: "#b Prähistorische Höhlen#! sind Orte, an denen frühe menschliche oder vormenschliche Spezies möglicherweise [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils_fossils$')] und, bei weiter entwickelten Arten, Werkzeuge hinterlassen haben. Höhlen können von [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] entdeckt und erforscht werden. Einige Höhlen werden auch durch historische Ereignisse freigeschaltet. In jeder Höhle liegen nur die Fossilien einer einzigen Spezies – das bedeutet, dass die Knochen von Cro-Magnon-Menschen und Neandertalern niemals in derselben Höhle zu finden sind. Einige Höhlen sind historisch, während andere zu Beginn des Spiels zufällig auf einem der drei Kontinente Afrika, Asien und Europa verteilt sind. Sie orientieren sich grob am Verbreitungsgebiet der Vormenschen – der Australopithecus beispielsweise ist nur in Afrika zu finden."
 concept_andersson_human_evolution: "Human Evolution"
 concept_andersson_human_evolution_desc: "In the Victorian era, there was a tendency to classify human fossils and evolutionary stages according to their higher level of development. A distinction was drawn between the 'gifted' Homo sapiens, endowed with artistic talent, and their more coarse-featured ancestors or ape-like counterparts. Thus, the precursors of humanity were divided into categories such as Neoanthropus (True Man), Palaeanthropus (Cave Man) and Pithecanthropus (Ape-Man); the latter represented the actual 'missing link' between animals and humans. Although these concepts were frequently rejected by later scholarship, they served as an initial point of reference for further research into the early history of humankind. The discovery of Australopithecus (Southern Ape) in Africa was therefore, for a number of reasons, one that shook the established view."
 concept_andersson_prehistoric_artifact: "Prähistorisches Artefakt"
 concept_andersson_prehistoric_artifacts: "Prähistorische Artefakte"
