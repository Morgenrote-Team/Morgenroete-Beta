 ### 2.2.4 ###

 concept_academics_university_specialization_desc:1 "Jede Universität kann durch Änderung ihrer Produktionsmethode spezialisiert werden.\nEine Universität mit [concept_pm_academics_university_humanities] ermöglicht es Ihnen, die Forschung Ihres Landes auf gesellschaftliche Innovation zu konzentrieren und gezielt [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] und [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] zu rekrutieren.\nEine Universität mit [concept_pm_academics_university_natural_history] ermöglicht es Ihnen, die Forschung Ihres Landes auf gesellschaftliche Innovation zu konzentrieren und gezielt [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] und [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] zu rekrutieren.\nEine Universität mit [concept_pm_academics_university_mathematics] ermöglicht es Ihnen, die Forschung Ihres Landes auf Produktion und militärische Innovation zu konzentrieren und gezielt [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] oder [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] zu rekrutieren.\nEine Änderung der Spezialisierung hat einen #n kurzfristigen negativen Effekt#! für das Gebäude und Ihren [concept_academics_progress].\nSpezialisierte Universitäten können auch verschiedene Projekte beeinflussen. Universitäten mit einem $concept_pm_academics_university_mathematics$ Schwerpunkt helfen zum Beispiel bei Ingenieurprojekten." #NT!
  
 concept_pm_academics_university_humanities_desc: "Ein geisteswissenschaftlich-anthropologischer Schwerpunkt spezialisiert die Universität und ermöglicht eine nationale Fokussierung auf Gesellschaftsforschung und die gezielte Rekrutierung von [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] und [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Universität sowie einen #n negativen Effekt#! auf Ihr [concept_academics_progress], wenn Sie diese Produktionsmethode ändern.\nDie Spezialisierung Ihrer Universitäten mit dem geisteswissenschaftlich-anthropologischen Schwerpunkt gibt Ihnen einen Bonus auf die Erfolgschance von Expeditionen (maximal +4, was 40 Spezialisierungsstufen erfordert) und verbessert den Fortschritt bei einigen anderen Projekten." #NT!
  
 concept_pm_academics_university_natural_history_desc: "Ein naturhistorischer Schwerpunkt spezialisiert die Universität und ermöglicht eine nationale Fokussierung auf Gesellschaftsforschung und die gezielte Rekrutierung von [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] und [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Universität sowie einen #n negativen Effekt#! auf Ihr [concept_academics_progress], wenn Sie diese Produktionsmethode ändern.\nDie Spezialisierung Ihrer Universitäten mit dem naturhistorischen Schwerpunkt bringt Ihnen einen Bonus für verschiedene Projekte Ihrer Naturwissenschaftler." #NT!
  
 concept_pm_academics_university_mathematics_desc: "Der mathematisch-technische Schwerpunkt spezialisiert die Universität und ermöglicht eine nationale Fokussierung auf Produktion und militärische Forschung sowie die gezielte Rekrutierung von [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] oder [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Universität sowie einen #n negativen Effekt#! auf Ihr [concept_academics_progress], wenn Sie diese Produktionsmethode ändern.\nDie Spezialisierung Ihrer Universitäten mit dem mathematisch-technischen Schwerpunkt bringt Ihnen einen Bonus auf verschiedene Projekte Ihres [Concept('concept_gaudi_engineer','$concept_gaudi_engineers$')] und [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]." #NT!

 ### 2.3.0 ###

 concept_panum_physician: "#b #BLUE Arzt#!#!" #NT!
 concept_panum_physicians: "#b #BLUE Ärzte#!#!" #NT!
 concept_panum_physician_desc: "#b #BLUE Ärzte#!#! sind [Concept('concept_academics_academic','$concept_academics_academics$')], die im Bereich [concept_panum_medicine] arbeiten und forschen. Ihre Hauptaufgabe besteht darin, [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] zu schreiben und [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] zu finden. Sie können auch die medizinische Forschung verbessern, die Gesundheitsversorgung verbessern und andere Charaktere heilen.\nÄrzte erhalten während ihrer Arbeit und passiv jedes Jahr [concept_academics_experience]. Sie können bessere Stufen der Arzteigenschaft erreichen, indem sie genügend #b Erfahrung#!. sammeln." #NT!
  
 concept_panum_medicine: "Medizin" #NT!
 concept_panum_medicine_desc: "Die Medizin ist eine der größten Erweiterungen von [concept_morgenroete] für Victoria 3. Einer der Schwerpunkte liegt auf epidemischen [Concept('concept_panum_disease','$concept_panum_diseases$')] wie Cholera, Tuberkulose und Typhus, die die Menschheit seit Jahrhunderten plagen und dank wissenschaftlicher Fortschritte endlich unter Kontrolle gebracht werden konnten. Epidemische Krankheiten sind daher eines der negativen Ereignisse in [concept_morgenroete]. Die Eindämmung durch die Suche nach einem [concept_panum_disease_treatment] ist daher noch wichtiger. Ein zentraler Bestandteil der Medizin ist daher ein [concept_panum_physician], der zu den Akademikern des anthropologisch-humanistischen Universitätsschwerpunkts gehört. Er kann epidemische Krankheiten beschreiben und Behandlungen finden. Eine Behandlungsmethode erfordert normalerweise einen [concept_panum_disease_description] und eine Technologie. Ein Arzt kann auch die Forschung medizinischer Technologien verbessern oder die Gesundheitsversorgung durch Krankenhäuser ausbauen sowie neue medizinische Techniken einführen und andere Charaktere heilen. Medizinische Konferenzen helfen, medizinisches Wissen international zu verbreiten. Ein wichtiger Schritt zur Modernisierung der Medizin ist auch der Übergang von der Miasmentheorie zum [concept_panum_germ_theory]. Eine Nation, die bei medizinischen Entdeckungen führend ist, kann auch eine hohe [concept_panum_medical_prestige] vorweisen." #NT!
  
 concept_panum_disease: "Krankheit" #NT!
 concept_panum_diseases: "Krankheiten" #NT!
 concept_panum_disease_desc: "Unter dem Begriff Krankheit versteht man meist epidemische Krankheiten, die alle paar Jahre ein Land heimsuchen können. Ein [concept_panum_physician] kann ihnen entgegenwirken, indem er [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] macht und [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] bereitstellt. Epidemische Krankheiten treten meist nicht gleichzeitig auf und es dauert einige Zeit, bis epidemische Krankheiten erneut ausbrechen. Je nach Art können epidemische Krankheiten verheerende Auswirkungen haben und sich über mehrere Staaten ausbreiten. Es gibt verschiedene [concept_panum_disease_prevention] Methoden, den Ausbruch einer solchen Krankheit zu verzögern oder ihre Auswirkungen zu mildern. Die Auslöser einer Krankheit können sehr unterschiedlich sein. Gelbfieber tritt nur in tropischen Regionen auf und Cholera und Tuberkulose erfordern ein Mindestmaß an Urbanisierung, um eine Wirkung zu erzielen. Auch der Lebensstandard und der Verwüstungsgrad eines Staates spielen eine Rolle.\n\nNeben diesen besonders gefürchteten epidemischen Krankheiten gibt es auch alltägliche Krankheiten, die ein Arzt bei medizinischen Untersuchungen stichprobenartig untersuchen kann. Zu solchen Krankheiten gehören Rachitis, Pellagra und Syphilis." #NT!
  
 concept_panum_disease_description: "Krankheitsbeschreibung" #NT!
 concept_panum_disease_descriptions: "Krankheitsbeschreibungen" #NT!
 concept_panum_disease_description_desc: "Beschreibungen sind der erste Schritt zum Verständnis eines [concept_panum_disease]. Sie haben keinen Einfluss auf die Schwere einer Epidemie, sind aber grundlegend für das Finden von [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] und [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Krankheitsbeschreibungen haben keine weiteren Anforderungen: Alles, was benötigt wird, ist eine epidemische Krankheit und ein [concept_panum_physician]." #NT!
  
 concept_panum_disease_treatment: "Krankheitsbehandlung" #NT!
 concept_panum_disease_treatments: "Krankheitsbehandlungen" #NT!
 concept_panum_disease_treatment_desc: "Ein [concept_panum_physician] kann, die richtige Technologie und ein [concept_panum_disease_description] vorausgesetzt, in einem langwierigen Prozess eine Behandlung für ein [concept_panum_disease] finden. Behandlungen sind nicht dasselbe wie eine Heilung. Vielmehr findet der Arzt die Ursache einer Krankheit heraus und entwickelt auf dieser Grundlage Methoden, um einen Ausbruch zu verhindern oder deutlich einzudämmen. Krankheitsbehandlungen begrenzen die Dauer einer epidemischen Krankheit auf wenige Monate oder Wochen und verhindern zudem, dass sie sich auf mehrere Staaten ausbreitet. Krankheitsbehandlungen sind Teil möglicher [concept_panum_disease_prevention] gegen epidemische Ausbrüche." #NT!
  
 concept_panum_disease_prevention: "Krankheitsprävention" #NT!
 concept_panum_disease_prevention_no_disease: "Prävention" #NT!
 concept_panum_disease_prevention_desc: "Es gibt verschiedene Möglichkeiten, eine Epidemie zu vermeiden oder zumindest abzuschwächen [concept_panum_disease]. Die bekannteste Methode ist die von [concept_panum_disease_treatment] entwickelte [concept_panum_physician]. Sie verkürzt die Zeit, in der eine Krankheit wütet, erheblich und verringert auch die Wahrscheinlichkeit, dass sie sich auf ein anderes Land ausbreitet. Lebensstandard, Krankenhäuser, Technologien und ein hohes Niveau der Gesundheitseinrichtungen haben ebenfalls einen Einfluss. Die ultimative Prävention ist eine [concept_theiler_vaccine], die verhindert, dass eine Krankheit überhaupt auftritt. Impfstoffe werden von [Concept('concept_theiler_biologist','$concept_theiler_biologists$')] entwickelt. Sie ist jedoch nur wirksam, wenn die Gesundheitseinrichtung mindestens das in der medizinischen Fakultät festgelegte Niveau erreicht hat. Schließlich muss die Verteilung eines Impfstoffs organisiert und überwacht werden." #NT!
  
 concept_panum_disease_type: "Krankheitstyp" #NT!
 concept_panum_disease_types: "Krankheitstypen" #NT!
 concept_panum_disease_type_desc: "Epidemien [Concept('concept_panum_disease','$concept_panum_diseases$')] können nach ihrem Verbreitungsgrad unterschieden werden. #V Lokale Krankheiten#!,, wie beispielsweise Scharlach, sind auf den Staat beschränkt, in dem sie ausgebrochen sind. #V Regionale Krankheiten#!,, wie beispielsweise Tuberkulose, können sich auf einige umliegende Staaten ausbreiten, jedoch nicht darüber hinaus. #V Überregionale Krankheiten#!, von denen die Cholera die berüchtigtste ist, können sich im ganzen Land ausbreiten, auch wenn die Staaten nicht aneinander grenzen." #NT!
 concept_panum_local_disease: "Lokale Krankheit" #NT!
 concept_panum_local_diseases: "Lokale Krankheiten" #NT!
 concept_panum_regional_disease: "Regionale Krankheit" #NT!
 concept_panum_regional_diseases: "Regionale Krankheiten" #NT!
 concept_panum_transregional_disease: "Transregionale Epidemie" #NT!
 concept_panum_transregional_diseases: "Transregionale Epidemie" #NT!
  
 concept_panum_germ_theory: "Keimtheorie" #NT!
 concept_panum_germ_theory_desc: "Die Keimtheorie ist einer der grundlegenden medizinischen wissenschaftlichen Fortschritte des 19. Jahrhunderts. Sie ersetzte frühere, archaischere Theorien wie die in Europa weit verbreitete Miasmentheorie und repräsentiert alle traditionellen Versuche, die Ursache von [Concept('concept_panum_disease','$concept_panum_diseases$')] zu erklären. Die Entdeckung der Keimtheorie kommt nicht nur dem ersten Entdecker zugute. Bei der Suche nach [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] sind die Erfolgschancen etwas höher, da sie einige negative Ereignisse verhindert und mehr positive Ereignisse freisetzt." #NT!
  
 concept_panum_medical_prestige: "Medizinisches Prestige" #NT!
 concept_panum_medical_prestige_desc: "Das medizinische Prestige setzt sich aus den bisher entdeckten [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 Punkte), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 Punkte), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 Punkte) und [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 Punkte) zusammen. Erste Entdeckungen geben doppelt so viele Punkte. Weiteres medizinisches Prestige kann durch die Heilung alltäglicher Krankheiten, die Erfindung spezieller Heilmethoden oder die allgemeine Verbesserung des Gesundheitswesens über ein [concept_panum_physician] erlangt werden." #NT!
  
 concept_theiler_pathogen: "Erreger" #NT!
 concept_theiler_pathogens: "Krankheitserreger" #NT!
 concept_theiler_pathogen_desc: "#n Demnächst bei Morgenröte!#!" #NT!
  
 concept_theiler_vaccine: "Impfstoff" #NT!
 concept_theiler_vaccines: "Impfungen" #NT!
 concept_theiler_vaccine_desc: "#n Demnächst bei Morgenröte!#!" #NT!

 ### 2.3.2 ###

 concept_panum_red_cross: "Rotes Kreuz" #NT!
 concept_panum_red_cross_desc: "Das Rote Kreuz ist eine der ersten internationalen Organisationen und bietet in seltenen Fällen die Möglichkeit, im Krieg Rotkreuz-Sanitäter zu erhalten. Rotkreuz-Mitglieder erhalten zudem bestimmte Boni. Je nach Spielregel kann das Rote Kreuz historisch oder dynamisch gegründet werden; anerkannte Staaten können unter bestimmten technologischen Voraussetzungen beitreten. Der Gründer erhält das Hauptquartier des Roten Kreuzes in seiner Hauptstadt. Mitglieder können bis zu drei völkerrechtlich verbindlichen [Concept('concept_panum_convention','$concept_panum_conventions$')] beitreten." #NT!
 concept_panum_convention: "Internationale Konvention" #NT!
 concept_panum_conventions: "Internationale Konventionen" #NT!

 ### 2.3.3 ###

 concept_panum_convention_desc: "Eine internationale Konvention ist eine gemeinsame Absichtserklärung von Staaten, bestimmte Spielregeln im internationalen Verkehr festzulegen. Beispiele hierfür gab es im Laufe des 19. Jahrhunderts mehrere, etwa die Genfer Konvention oder die Haager Landkriegsordnung. Allen Konventionen ist gemeinsam, dass sie versuchen, die Schrecken des Krieges zu mildern. Militärische Optionen werden daher einer sicheren medizinischen Versorgung der Verwundeten vorgezogen und ultimative Waffen werden verboten, was zu einer gewissen Eindämmung des Krieges führt. Der Vorteil ist eine höhere Flexibilität. Während die Annahme einer Konvention positiv gesehen wird, kann die Aufhebung einer Konvention zu internationalem Unmut führen.\n\nInternationale Konventionen sind in der Regel unverbindliche Absichtserklärungen. Unterzeichnen sie jedoch genügend Mitglieder des [concept_panum_red_cross], wird sie mit der Zeit zu gültigem Völkerrecht, an das sich alle Unterzeichner halten müssen – und das auch die anderen Mitglieder unterzeichnen. Dies geschieht, wenn 65 Prozent aller Mitglieder und die Mehrheit der Großmächte dieser Konvention zustimmen – dann sind alle anderen Mitglieder gezwungen, sich daran zu halten. Dieses Übereinkommen kann dann nicht mehr wie gewohnt abgeschafft werden. Um bindende Übereinkommen zu vermeiden, ist ein vollständiger Austritt aus dem Roten Kreuz notwendig – mit allen Konsequenzen." #NT!
 
 ### 2.3.4 ###

 concept_manzoni_literary_tradition_desc: "#b Literarische Tradition#! ist eine Darstellung der literarischen Errungenschaften und Traditionen einer Nation.\nEs gibt verschiedene Möglichkeiten, #b Literarische Tradition#! zu erlangen. Wenn Sie mindestens eine $building_arts_academy$, einen oder mehrere [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], einen [concept_manzoni_national_writer] und bestimmte [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] besitzen, wird Ihrem Land passiv #b Literarische Tradition#! hinzugefügt.\nJe mehr #b Literarische Tradition#! Ihre Nation erlangt, desto höher ist Ihr Prestigebonus. Außerdem können Sie damit [concept_elgar_expressionism] [concept_artists_art_style] freischalten." #NT!
  
 concept_elgar_musical_tradition_desc: "#b Musiktradition#! ist eine Darstellung der musikalischen Errungenschaften und Traditionen einer Nation.\nEs gibt verschiedene Möglichkeiten, #b Musiktradition#! zu erlangen. Wenn Sie mindestens ein [concept_elgar_opera] haben, erhalten Sie passiv #b Musiktradition#!. Je mehr #b Opern#! Sie haben, desto mehr bekommen Sie. Sie können auch mehr #b Musiktradition#! durch Musik- und Kunsttechnologien erhalten. Jede Technologie gibt einen anderen Bonus. Sie können #b Musiktradition#! auch durch Ereignisse erhalten, insbesondere wenn Sie ein #!3 haben.\nJe mehr #b Musiktradition#! Ihre Nation erlangt, desto höher ist Ihr Prestigebonus. Außerdem können Sie damit [concept_elgar_impressionism] [concept_artists_art_style] freischalten." #NT!
  
 concept_klimt_painting_tradition_desc: "#b Maltradition#! ist eine Darstellung der Malerleistungen und -traditionen einer Nation. Sie kann durch den Besitz von #b Kunstakademien#!, einer [concept_klimt_painter], bestimmten [Concept('concept_technology', '$concept_technologies$')] oder durch Veranstaltungen erlangt werden.\n#b Maltradition#! ermöglicht es Ihnen, [concept_elgar_art_nouveau] [concept_artists_art_style] freizuschalten und wird zur Berechnung Ihrer #b Kulturtradition#! verwendet." #NT!

