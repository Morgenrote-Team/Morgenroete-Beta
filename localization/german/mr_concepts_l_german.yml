 concept_dubois_dinosaur_bone_no_dinosaur:1 "Knochen" #You can use this for plural: [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bone_no_dinosaur$')]
 concept_dubois_dinosaur_bones_no_dinosaur:1 "Knochen" #You can use this for plural: [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones_no_dinosaur$')]

 concept_dubois_paleontological_expedition_desc:1 "Ein [concept_dubois_paleontologist] kann zu [Concept('concept_dubois_formation','$concept_dubois_formations$')] entsandt werden. Es dauert 1 Jahr und je nach Erfolg der Expedition erhält man [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. Wenn man über ein [concept_dubois_paleontological_team] verfügt, kann man am Ende einer Expedition eine [concept_dubois_paleontological_excavation] aufbauen. Dadurch erhält man passiv Knochen und Fossilien aus dieser Region.\nDer einfachste Weg Zugang zu einer Formation zu erhalten ist die Kontrolle eines entsprechenden Staats. Zugang zu einer Formation kann aber auch dirch [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')] mit anderen Ländern ermöglicht werden." #please replace

 concept_dubois_paleontological_team:1 "Paläontologisches Team"
 concept_dubois_paleontological_teams:1 "Paläontologisches Teams"
 concept_dubois_paleontological_team_desc:1 "Paläontologische Teams können nach Abschluss einer [concept_dubois_paleontological_expedition] eine [concept_dubois_paleontological_excavation] einrichten. Dadurch erhalten sie passiv [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."

 concept_dubois_paleontological_excavation:1 "Paläontologische Ausgrabung"
 concept_dubois_paleontological_excavations:1 "Paläontologische Ausgrabungen"
 concept_dubois_paleontological_excavation_desc:1 "Nach dem Ende einer [concept_dubois_paleontological_expedition] kann eine Paläontologische Ausgrabung aufgebaut werden, wenn ein freies [concept_dubois_paleontological_team] verfügbar ist. Eine Paläontologische Ausgrabung ermöglicht es, passiv [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] zu erhalten."
