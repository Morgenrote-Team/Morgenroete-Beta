l_german:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "Wir haben mindestens eine mögliche Aktion für eine [concept_morgenroete]-Funktion."
 concept_morgenroete: "#r Morgenröte#!"
 concept_morgenroete_mr: "MR"
 concept_morgenroete_concept: "Konzept"
 concept_pm_academics_university_humanities: "#b #BLUE Humanwissenschaftlich-anthropologischer Schwerpunkt#!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN Naturgeschichtlicher Schwerpunkt#!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE Mathematisch-Technischer Schwerpunkt#!#!"
 concept_academics_university_specialization: "Universitätsfokus"
 concept_academics_academic: "Akademiker"
 concept_academics_academics: "Akademiker"
 concept_academics_scientist: "Wissenschaftler"
 concept_academics_scientists: "Wissenschaftler"
 concept_academics_academic_desc: "In [concept_morgenroete] sind #b Akademiker#! spezielle Charaktere, die es Ihnen ermöglichen, bestimmte Mechaniken des Mods zu nutzen. Sie können #b Akademiker#! in einigen Ereignisse erhalten oder indem Sie genügend [concept_academics_progress] erwerben.\nDerzeit gibt es diese #b Akademiker#!:\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_theiler_biologist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_lepsius_anthropologist]"
 concept_academics_progress: "Akademischer Fortschritt"
 concept_academics_progress_desc: "Durch den Erwerb von 360 #b Akademischem Fortschritt#! können Sie einen neuen [concept_academics_academic] erlangen. Um überhaupt Zugriff auf #b Akademischen Fortschritt#! zu haben, müssen Sie über die Technologie #b Hochschulwesen#! und mindestens eine #b Universität#! verfügen.\nIhr #b Akademischer Fortschrittx#!-Gewinn wird von verschiedenen Faktoren beeinflusst. Je mehr [concept_literacy] Sie haben, desto schneller erzielen Sie beispielsweise #b Akademischen Fortschritt#!. Ein weiterer Faktor ist der Prozentsatz der akademischen Pops in Ihrem Land. Sie erhalten den maximalen #b akademischen Fortschritt#! für #p 2%#! oder mehr akademische Pops. Bessere Schulen und glückliche Intellektuelle tragen auch zum #b akademischen Fortschritten#! bei. Schließlich sorgen einige der Technologieschwerpunkte und Sondergebäude wie der [concept_dubois_zoo] oder das [concept_verrier_observatory] auch für zusätzlichen #b akademischen Fortschritt#!."
 concept_academics_scientific_society: "Wissenschaftliche Gesellschaft"
 concept_academics_scientific_societies: "Wissenschaftliche Gesellschaften"
 concept_academics_scientific_society_desc: "Die #b Wissenschaftliche Gesellschaft#! ist eine Gesellschaft der klügsten Köpfe Ihres Landes. Es repräsentiert die Wissenschaftler und Akademiker Ihres Landes und ermöglicht Ihnen den Besuch Ihrer [Concept('concept_academics_academic','$concept_academics_academics$')].\n\nDie #b Wissenschaftliche Gesellschaft#! könnte Sie mit [Concept('concept_academics_academic_mission','$concept_academics_missions$')] beauftragen, die Ihnen nützliche Belohnungen einbringt."
 concept_academics_experience: "Erfahrung"
 concept_academics_experience_desc: "Einige Akademiker sammeln im Laufe ihres Lebens #b Erfahrung#!. In [concept_morgenroete] erhalten die Charaktere #b Erfahrung#!, wenn sie erstellt werden. Normalerweise erhalten sie 10 #b Erfahrung#! für jedes Jahr, das sie älter als 30 Jahre sind.\nZusätzlich erhalten sie #b Erfahrung#! durch das Erledigen ihrer Arbeit, zum Beispiel für die Suche nach neuen [Concept('concept_verrier_astronomical_object','Astronomischen Objekten')]. Sie erhalten auch jedes Jahr passiv #b Erfahrung#!.\nEin Charakter, der 100 #b Erfahrung#! erhält, erhält die #b Eigenschaft Erfahren#!. Wenn ein Charakter 300 #b Erfahrung#! erreicht, erhält er die #b Eigenschaft Berühmt#!\nJe höher die #b Erfahrung#! eines Charakters, desto besser ist seine Arbeit. Ein erfahrener oder berühmter [concept_dubois_paleontologist] findet beispielsweise mehr [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] und ist besser darin, ein [concept_dubois_dinosaur_skeleton] zu rekonstruieren."
 concept_academics_academic_mission: "Akademische Mission"
 concept_academics_academic_missions: "Akademische Missionen"
 concept_academics_mission: "Auftrag"
 concept_academics_missions: "Missionen"
 concept_academics_academic_mission_desc: "Ihre [concept_academics_scientific_society] wird Sie manchmal auffordern, ein bestimmtes Ziel zu erreichen. Solche Ziele könnten sein, eine bestimmte Menge an [Concept('concept_verrier_astronomical_object','Astronomischen Objekten')], [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] oder ähnlichem zu finden. Bei anderen #b Missionen#! müssen Sie möglicherweise Planet X finden oder eine [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')] organisiern.\nWenn Sie bei einer #b Mission#! versagen, wird Ihre #b Wissenschaftliche Gesellschaft#! unglücklich sein, aber wenn Sie eine Mission erfüllen, erhalten sie nützliche Belohnungen."
 concept_curtiss_aviation: "Luftfahrt"
 concept_curtiss_aviation_desc: "#b Luftfahrt#! ist einer der Hauptinhalte von [concept_morgenroete]. Das 19. und 20. Jahrhundert erlebte den Aufschwung der menschlichen Luftfahrt. Zuerst in Form von #b Ballons#! und #b Luftschiffen#!, dann mit #b Flugzeugen#!. Fliegen war eine prestigeträchtige Aktivität und ermöglichte das Erreichen neuer Horizonte.\n\nViele Länder beginnen ihre Reise in die Lüfte zu Beginn des Spiels, wenn sie [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')] sponsern, um Rekorde zu brechen. Wenn Sie einen der Rekorde brechen, erhält Ihr Land einen Technologieschub und einen Prestigemodifikator.\nWenn Sie die Zeppelin-Technologie erforschen, können Sie eine [concept_curtiss_arctic_expedition] durchführen, wenn Sie Zugang zum Nordpol, und einen [Concept('concept_curtiss_pilot','$concept_curtiss_pilots$')] haben.\nWeitere Forschung im Luftfahrtpfad ermöglicht Ihnen den Einsatz mehrerer neuer Spielmechaniken. Sie können [Concept('concept_curtiss_airport','$concept_curtiss_airports$')] bauen, welche das neue Handelsgut #b Flüge#!, sowie #b Dienstleistungen#! produzieren. Der #b Flughafen#! ermöglicht das Wachstum einer [concept_curtiss_airline], die es Ihnen ermöglicht, die diplomatische Aktion [concept_curtiss_airspace_convention] zu nutzen. Die #b Luftfahrtkonvention#! ermöglicht Ihnen den Zugang zu Staaten und [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] sowie zum Nordpol. Wenn Ihre #b Fluggesellschaft#! ausreichend wächst, können Sie entweder ein riesiges Luftschiff oder das größte Flugzeug der Welt bauen.\nDas aufregendste Feature kommt zu Beginn des 20. Jahrhunderts: Sie können an dem [concept_curtiss_schneider_trophy] teilnehmen. Die #b Schneider-Trophy#! ist ein Wasserflugzeugrennen, bei dem verschiedene Länder gegeneinander antreten. Wenn Sie gewinnen, erhalten Sie Prestige und können das nächste Rennen ausrichten. Und wenn es Ihnen gelingt, das Rennen dreimal zu gewinnen, behalten Sie die #b Schneider-Trophy#! für immer."
 concept_curtiss_balloonist_role: "Rolle des Ballonfahrers"
 concept_curtiss_balloonist_role_only_balloonist: "Ballonfahrer"
 concept_curtiss_balloonists_role: "Ballonfahrer"
 concept_curtiss_balloonist_role_desc: "Ein #b Ballonfahrer#! ist ein besonderer Charakter, der von einer Nation gesponsert werden kann. Normalerweise sponsern gut entwickelte oder westliche Länder #b Ballonfahrer#! und konkurrieren um Rekorde und neue Erkenntnisse. Die #b Ballonfahrer#! führen nach dem Zufallsprinzip Flüge durch und erhalten Rekorde entweder für die längste Distanz, die längste Flugzeit oder den höchsten Flug. Für jede Ballonfahrt erhält der #b Ballonfahrer#! Erfahrung und einen Rangaufstieg, was die Chance auf neue Rekorde erhöht. Bedenken Sie jedoch, dass Ballonfahren ein gefährliches Unterfangen ist und viele Ballonfahrer früh sterben, insbesondere wenn sie krank, Alkoholiker oder Drogenabhängige sind."
 concept_curtiss_arctic_expedition: "Arktische Expedition"
 concept_curtiss_arctic_expeditions: "Arktische Expeditionen"
 concept_curtiss_arctic_expedition_desc: "Wenn Sie die Technologie #b Zeppelin#! erforscht haben, über ein [concept_verrier_observatory] mit einer #b Wetterstation#!, einen [Concept('concept_curtiss_pilot','$concept_curtiss_pilots$')] und Zugang zu einem Staat in der Nähe des Nordpols verfügen, können Sie eine #b Arktische Expedition#! durchführen. Diese Staaten sind #b Grönland#!, #b Nord-Norwegen#!, #b Alaska#!, #b Nunavut#! und #b Nenzien#!. Sie erhalten Zugang, indem Sie entweder den Staat selbst besitzen oder eine [concept_curtiss_airspace_convention] mit dem Eigentümer abschließen.\nWährend einer #b Arktischen Expedition#! können Sie Forschungsreisen unternehmen, Polarstationen bauen, neue Erkenntnisse über Geographie, Meteorologie und die Biologie der Arktis erhalten und als als Erster den Pol in einem Luftschiff überqueren!"
 concept_curtiss_pilot: "Pilot"
 concept_curtiss_pilots: "Piloten"
 concept_curtiss_pilot_desc: "Ein #b Pilot#! ist ein Charakter mit der Eigenschaft #b Pilot#!. #b Piloten#! haben nach der Entdeckung der #b Frühen Luftfahrt#! eine geringe Chance, zu erscheinen. Darüber hinaus besteht bei Schlachten an einer Front, bei denen Luftaufklärung als Produktionsmethode eingesetzt wird, die Möglichkeit, dass ein #b Pilot#! durch ein Ereignis aus der Schlacht hervorgeht. Bessere Technologien wie Flugzeuge und moderne Luftfahrt, aber auch die Einrichtung einer Pilotenschule bis zu Entscheidungen erhöhen die Chance für einen Charakter, die Eigenschaft #b Pilot#! zu erhalten.\n#b Piloten#! helfen Ihnen auf unterschiedliche Weise. #b Fluggesellschaften#! könnten an #b Piloten#! interessiert sein, um ihr Image zu verbessern; im Kampf um die [concept_curtiss_schneider_trophy] haben erfahrene #b Piloten#! bessere Chancen; und ein #b Pilot#! ist notwendig, um die [concept_curtiss_arctic_expedition] durchzuführen. #b Piloten#! können über ein Ereignis auch zu Fliegerassen werden, wenn sie an einer Front eingesetzt werden."
 concept_curtiss_airport: "Flughafen"
 concept_curtiss_airports: "Flughäfen"
 concept_curtiss_airport_desc: "Ein #b Flughafen#! ist ein Gebäude, das durch die Technologie #b Moderne Luftfahrt#! freigeschaltet wird. Es ist ein rein ziviles Gebäude und bieten [GetGoods('air_travel').GetName] und #b Dienstleistungen#! an, verbraucht aber eine Vielzahl von Gütern von [GetGoods('tools').GetName] über [GetGoods('paper').GetName], bis zu [GetGoods('aeroplanes').GetName] und [GetGoods('oil').GetName]. Später benötigen Flughäfen auch noch [GetGoods('electricity').GetName], [GetGoods('telephones').GetName] und [GetGoods('radios').GetName].\nWenn Sie genug #b Flughäfen#! haben, wird eine [concept_curtiss_airline] gegründet und mit den wachsenden #b Flughäfen#! wird auch die #b Fluggesellschaft#! wachsen und mehr Vorteile anbieten."
 concept_curtiss_airline: "Fluggesellschaft"
 concept_curtiss_airlines: "Fluggesellschaften"
 concept_curtiss_airline_desc: "Eine #b Fluggesellschaft#! ist ein Unternehmen oder eine staatliche Einrichtung, die am Ende des Spiels [GetGoods('air_travel').GetName] anbietet, vom lokaler Ebene bis hin zu internationale Flügen anbietet. #b Fluggesellschaften#! bieten auch verschiedene andere Vorteile. #b Fluggesellschaften#! benötigen [Concept('concept_curtiss_airport','$concept_curtiss_airports$')], um Flüge durchzuführen. Wenn Sie Ihre #b Flughäfen#! ausbauen, wächst auch die #b Fluggesellschaft#!.\nWenn Ihre #b Fluggesellschaft#! von der Regierung betrieben wird, erhalten Sie die Möglichkeit, ein riesiges Luftschiff zu bauen und es weite Strecken zurücklegen zu lassen. Wenn Ihre #b Fluggesellschaft#! in öffentlichem oder privatem Besitz ist, erhalten Sie möglicherweise stattdessen die Chance, das größte Flugzeug aller Zeiten zu bauen."
 concept_curtiss_airspace_convention: "Luftfahrtkonvention"
 concept_curtiss_airspace_conventions: "Luftfahrtkonventionen"
 concept_curtiss_airspace_convention_desc: "Die #b Luftfahrtkonvention#! ist ein wichtiger [concept_diplomatic_pact], der es Ihnen ermöglicht, mit Regionen zu interagieren, die weit von Ihrem Einfluss entfernt sind. Wenn Sie eine #b Luftfahrtkonvention#! mit einer anderen Nation haben, die über eine [concept_lepsius_excavation_site] verfügt, können Sie eine [concept_lepsius_expedition] durchführen, ohne über ein [concept_active_interest] in der Region zu verfügen.\nEine #b Luftfahrtkonvention#! ermöglicht Ihnen das Senden einer [concept_curtiss_arctic_expedition], auch wenn Sie nicht über einen der erforderlichen Staaten verfügen."
 concept_curtiss_schneider_trophy: "Schneider-Trophy"
 concept_curtiss_schneider_trophy_desc: "Der Kampf um diese prestigeträchtige Trophäe, die der Franzose Jacques Schneider kurz vor dem Ersten Weltkrieg stiftete, sollte vor allem die Entwicklung von Wasserflugzeugen ankurbeln. Im Laufe der Zeit entwickelte sich das Rennen um diese Trophäe zu einem Rennen der Nationen, wobei vor allem Großbritannien, die USA und Italien ihre Mannschaften massiv unterstützten, um die begehrte Trophäe zu gewinnen. Tatsächlich hat die technologische Entwicklung von der #b Schneider-Trophy#! durch den Einsatz immer schnellerer und fortschrittlicherer Wasserflugzeuge profitiert.\nDie #b Schneider-Trophy#! kann gegründet werden, wenn es 5 Nationen gibt, welche die Technologie #b Wasserflugzeuge#! erfunden haben und wenn Sie einen Hafen und ein städtisches Zentrum der Stufe 10 in einem Ihrer Staaten haben.\nDer Gewinner der Trophäe wird durch einen Journaleintrag und viele Faktoren bestimmt. Ein Land mit einer Pilotenschule und einem großen [Concept('concept_curtiss_pilot','$concept_curtiss_pilots$')] wird zum Beispiel im Vorteil sein. Ein toller [concept_curtiss_pilot] und eine massive Finanzierung werden auch zum Gewinn der Trophäe beitragen.\nDer Gewinner der letzten Trophäe kann die nächste ausrichten, wenn er einen Hafen hat oder in der Schweiz mit ihren vielen Seen ist. Noch besser ist es, die Trophäe dreimal hintereinander zu gewinnen, da die Nation die Trophäe für immer behält und dafür einen Prestigebonus erhält."
 concept_curtiss_balloonist: "Ballonfahrer"
 concept_curtiss_balloonist_desc: "Dieser Charakter ist ein Ballonfahrer, der oft abenteuerliche Ballonfahrten unternimmt."
 concept_curtiss_experienced_balloonist: "Erfahrener Ballonfahrer"
 concept_curtiss_experienced_balloonist_desc: "Dieser Charakter ist ein erfahrener Ballonfahrer, der oft abenteuerliche Ballonfahrten unternimmt. Charaktere mit dieser Eigenschaft haben eine höhere Chance, bessere Rekorde aufzustellen."
 concept_curtiss_famous_balloonist: "Berühmter Ballonfahrer"
 concept_curtiss_famous_balloonist_desc: "Dieser Charakter ist ein berühmter Ballonfahrer, der oft abenteuerliche Ballonfahrten unternimmt. Charaktere mit dieser Eigenschaft haben eine höhere Chance, bessere Rekorde aufzustellen."
 concept_dubois_natural_history: "Naturgeschichte"
 concept_dubois_natural_history_desc: "#b Naturgeschichte#! ist einer der Hauptinhalte von [concept_morgenroete]. Im 19. Jahrhundert gab es viele große naturkundliche Entdeckungen: viele große Expeditionen wie die der Beagle, die Erfindung der Evolutionstheorie, die Entdeckung Hunderttausender neuer Arten und natürlich die Entdeckung der Dinosaurier.\n\nGroß- und Mittelmächte mit einer Flotte und einem Admiral können ein Schiff auf eine [concept_dubois_pacific_expedition] schicken. Auf einer #b Pazifikexpedition#! können Sie seltene Pflanzen, Tiere und Fossilien finden, ozeanografische Forschung betreiben oder astronomische Phänomene wie Sonnenfinsternisse beobachten.\n\nDie großen Tiere, die Sie finden können, die [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], können in einem [concept_dubois_zoo] ausgestellt werden. Je mehr Tiere, desto größer ist die Wirkung des #b Zoos#!. Sie können diese #b Tiere#! auf Expeditionen finden, Sie können sie in Ihrem eigenen Gebiet sammeln oder andere Länder bitten, sie Ihnen zu verkaufen.\n\nKleinere Tiere, Pflanzen und andere Organismen werden [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] genannt. Ein [concept_dubois_naturalist] kann solche #b Exemplare#! sammeln. Ein #GREEN #b Naturforscher#!#! kann auf [Concept('concept_dubois_botanical_expedition','$concept_dubois_botanical_expeditions$')] in Staaten mit einem Regenwald-Zustandsmodifikator gesendet werden. Falls Sie selbst keinen solchen Staat haben, können Sie eine [concept_dubois_botanical_licence] von einem anderen Land erwerben. Ein #GREEN #b Naturforscher#!#! erhält [concept_academics_experience], wenn er seltene Exemplare findet.\n\n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')] sind das Feld eines [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], seien es Fossilien von Pflanzen, Insekten oder anderen Kleintieren. #b Fossilien#! können auf #b Expeditionen#! oder in Staaten mit [Concept('concept_dubois_formation','$concept_dubois_formations$')] gefunden werden. Wenn Sie eine #b Große Formation#! haben, können Sie vielleicht sogar [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] finden. Ansonsten können Sie darauf zugreifen, indem Sie eine [concept_dubois_paleontological_licence] erwerben.\n\nWenn Ihr Land Zugang zu einem Gebirge hat, kann ein General [concept_douglas_mountaineering] durchführen und so bessere Eigenschaften und einen Prestigebonus erhalten."
 concept_dubois_naturalist: "#b #GREEN Naturforscher#!#!"
 concept_dubois_naturalists: "#b #GREEN Naturforscher#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN Naturforscher#!#! sind Akademiker, die [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] und [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sammeln können. Sie können auf eine [concept_dubois_pacific_expedition] oder eine [concept_dubois_botanical_expedition] geschickt werden, wo sie seltene Pflanzen und Tiere finden können, die Ihnen einen kleinen Bonus verschaffen. #b #GREEN Naturforscher#!#! erhalten [concept_academics_experience], wenn sie neue seltene Exemplare finden."
 concept_dubois_paleontologist: "#b #GREEN Paläontologe#!#!"
 concept_dubois_paleontologists: "#b #GREEN Paläontologen#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN Paläontologen#!#! sind Akademiker, die nach [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] und [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] graben. Um sie einzusammeln, benötigen Sie Zugriff auf eine [concept_dubois_formation]. Wenn Sie Zugang zu einer #b Formation#! haben, entweder indem Sie sie selbst besitzen oder von einem anderen Land eine [concept_dubois_paleontological_licence] haben, können Sie Ihren #b Paläontologen#! auf eine [concept_dubois_paleontological_expedition] schicken.\nNachdem Sie 5 #b Dinosaurierknochen#! gesammelt oder rekonstruiert haben, kann Ihr #b Paläontologe#! ein [concept_dubois_dinosaur_skeleton] rekonstruieren. Wenn #b #GREEN Paläontologen#!#! [concept_academics_experience] erhalten, werden sie besser darin, #b Dinosaurierskelette#! zu rekonstruieren, und so werden auch für die #b Skelette#! mit zunehmender Erfahrung besser. Je besser die #b Dinosaurierskelette#!, desto mehr Prestige verschafft Ihnen Ihre [concept_dubois_paleontological_collection]."
 concept_dubois_pacific_expedition: "Pazifikexpedition"
 concept_dubois_pacific_expeditions: "Pazifikexpeditionen"
 concept_dubois_pacific_expedition_desc: "Als Groß- oder Mittelmacht können Sie eine Expedition in den Pazifischen Ozean schicken. Sie müssen den #b Empirismus#!, die #b Schraubenfregatte#! und die #b Dialektik-Technologie#! erforscht haben, Sie benötigen einen Hafen und eine Universität sowie eine Marine von mindestens 15 Einheiten und einen Admiral.\nAuf einer #b Pazifikexpedition#! können Sie seltene Pflanzen, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] und [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] finden, ozeanografische Forschung betreiben oder astronomische Phänomene wie Sonnenfinsternisse beobachten. Zu Beginn der #b Expedition#! können Sie auch einen #b Wissenschaftler#! für Ihre Expedition auswählen, entweder einen #b Landvermesser#!, einen [concept_dubois_naturalist], einen [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] oder einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. Jeder einzelne wird abhängig von seinem Fachwissen dazu beitragen, bei bestimmten Ereignissen bessere Ergebnisse zu erzielen.\nIhre Expedition kann einen Schwerpunkt auf ein bestimmtes Forschungsgebiet legen. Sie kann ganz den Geheimnissen des Meeres gewidmet werden und Ihr ozeanografisches und astronomisches Wissen verbessern; In diesem Fall werden nur ozeanografische Ereignisse ausgelöst. Wer die Wunder der Natur erkundet, wird mit botanischen, zoologischen und paläontologischen Ereignisse konfrontiert. Großmächte haben auch die Möglichkeit, eine Prestige-Mission durchzuführen, bei der Sie Artefakte finden, Handelsposten errichten oder Christliche Missionen einrichten – dies ist besonders nützlich, wenn Sie keine diplomatischen Interessen in Ozeanien haben, aber versuchen möchten eine Kolonie einzurichten.\nSie müssen auch auswählen, wohin Ihre Mission genau reisen soll: Ozeanien, Australien oder Indonesien. Jede Region bietet unterschiedliche Ereignisse und Belohnungen."
 concept_dubois_habitat: "Lebensraum"
 concept_dubois_habitats: "Lebensräume"
 concept_dubois_animal_habitat: "Tierlebensraum"
 concept_dubois_habitat_desc: "Ein #b Habitat#! ist eine Region in einem Staat, in der ein bestimmtes [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] lebt. In #r Morgenröte#! gibt es für die verschiedenen Tiere #b Habitate#! in verschiedenen Staatsregion. Wenn Sie einen #b Lebensraum#! besitzen, können Sie die #b Tiere#! zum [concept_dubois_zoo] transportieren oder sie sogar in andere Länder verkaufen.\n\nWenn Ihr Staat eine [concept_urbanization] von 2000 oder höher erreicht oder kein [concept_arable_land] mehr hat , werden die #b exotischen Tiere#! #n nach 10 Jahren aussterben#!.\n\nUm die #b Tiere#! vor dem Aussterben zu bewahren, können Sie in einem Staat mit einem #b Habitat#! ein [concept_dubois_nature_reserve] errichten."
 concept_dubois_nature_reserve: "Naturschutzgebiet"
 concept_dubois_nature_reserves: "Naturschutzgebiete"
 concept_dubois_royal_hunting_reserve: "Königliches Jagdreservat"
 concept_dubois_nature_reserve_desc: "Ein #b Naturschutzgebiet#! ist ein Schutzgebiet, in dem Sie [Concept('concept_dubois_habitat','$concept_dubois_habitats$')] schützen oder etablieren können.\n\nWenn Sie bereits über ein #b Habitat#! verfügen, können Sie ihn vor der Zerstörung durch den Einfluss von Menschen schützen, indem Sie ein #b Naturschutzgebiet#! im Staat mit dem #b Habitat#! errichten. Um ein #b Naturschutzgebiet#! zu errichten, müssen Sie die #b Genetik#!-Technologie freigeschaltet haben und über einen Inkorporierten Staat mit einem #b Habitat#! verfügen, der das Heimatland einer Ihrer Primärkulturen ist.\n\nWenn Sie kein #b Habitat#! besitzen, können Sie ein #b Naturschutzgebiet#! errichten, indem Sie Ihr Land nach einem Standort durchsuchen, wenn Sie die Technologie #b Genetik#! freigeschaltet haben und mindestens ein [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] von Ihrem Kontinent in Ihrem [concept_dubois_zoo] haben.\n\nEin #b Naturschutzgebiet#! schützt nicht nur die #b Habitate#! Ihrer Tiere, sondern ermöglicht Ihnen auch die Ansiedlung von #b exotischen Tieren#! des selben Kontinents. Auf diese Weise können Sie alle #b exotischen Tiere#! Ihres Kontinents in einem einzigen Staat schützen."
 concept_dubois_zoo_animal: "Zootier"
 concept_dubois_zoo_animals: "Zootiere"
 concept_dubois_exotic_animal: "Exotisches Tier"
 concept_dubois_exotic_animals: "Exotische Tiere"
 concept_dubois_zoo_animal_desc: "Es gibt viele Tiere auf der Welt, die Ihr [concept_dubois_naturalist] fangen kann. Um ein #b Exotisches Tier#! zu fangen, benötigen Sie einen Staat mit einem [concept_dubois_habitat]. Alternativ können Sie ein #b Exotisches Tier#! aus einem Land mit einem entsprechenden #b Lebensraum#! kaufen.\nNach dem Fang können die #b Zootiere#! an Ihren [concept_dubois_zoo] gesendet werden, wodurch Sie den #b Zoo#! erweitern können."
 concept_dubois_zoo: "Zoo"
 concept_dubois_zoos: "Zoos"
 concept_dubois_zoo_desc: "Ein #b Zoo#! ist ein besonderes Gebäude, das Sie bauen können, nachdem Sie 5 [concept_dubois_zoo_animal] gesammelt haben. Der #b Zoo#! beherbergt Ihre #b Tiere#!, Ihre [concept_dubois_specimen]-Sammlung und Ihre Paläontologische Sammlung."
 concept_dubois_specimen: "Exemplar"
 concept_dubois_specimens: "Exemplare"
 concept_dubois_specimen_desc: "Die verschiedenen Insekten, Pflanzen und kleineren Tiere, die ein [concept_dubois_naturalist] sammeln kann, werden #b Exemplare#! genannt. Sie können Ihre #b Exemplare#! verwenden, um in Ihrem [concept_dubois_zoo] einen Botanischen Garten oder eine Exemplarsammlung aufzubauen."
 concept_dubois_botanical_expedition: "Botanische Expedition"
 concept_dubois_botanical_expeditions: "Botanische Expeditionen"
 concept_dubois_botanical_expedition_desc: "Sie können einen [concept_dubois_naturalist] auf eine #b Botanische Expedition#! schicken, wenn Sie Zugang zu einem Staat mit [concept_ito_medicinal_plants] haben, entweder durch den Besitz eines solchen Staates oder durch den Erwerb einer [Concept('concept_dubois_botanical_licence','Botanischen Lizenz')].\nIhr #b Naturforscher#! wird während der einjährigen Reise [concept_ito_medicinal_plants] und [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sammeln. Manchmal finden sie auch eine seltene Pflanze, die eine großartige Ergänzung für die botanische Sammlung eines [concept_dubois_zoo] darstellt."
 concept_dubois_botanical_licence: "Botanische Lizenz"
 concept_dubois_botanical_licences: "Botanische Lizenzen"
 concept_dubois_botanical_licence_desc: "Wenn Sie keinen Zugang zu einem Staat mit dem Regenwald-Modifikator haben, können Sie dennoch eine [concept_dubois_botanical_expedition] senden, indem Sie eine #b Botanische Lizenz#! von einem Land erwerben, das einen Regenwald besitzt. Sie müssen einen kleinen Geldbetrag bezahlen, aber dieser ermöglicht Ihnen, [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] und seltene Pflanzen zu finden und zu sammeln."
 concept_dubois_fossil: "Fossil"
 concept_dubois_fossils: "Fossilien"
 concept_dubois_fossil_desc: "Ein [concept_dubois_paleontologist] kann #b Fossilien#! von Pflanzen und Tieren entdecken, die längst ausgestorben sind, wenn er Zugriff auf eine [concept_dubois_formation] hat."
 concept_dubois_dinosaur_bone: "Dinosaurierknochen"
 concept_dubois_dinosaur_bones: "Dinosaurierknochen"
 concept_dubois_dinosaur_bone_desc: "Ein [concept_dubois_paleontologist] kann Dinosaurierknochen in Großen [Concept('concept_dubois_formation','$concept_dubois_formations$')] finden.\nEin #b Erfahrener Paläontologe#! kann auch versuchen, einen #b Dinosaurierknochen#! aus 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] zu rekonstruieren. Ein #b Dinosaurierknochen#! kann nur rekonstruiert werden, wenn mindestens ein Dinosaurierknochen zur Orientierung zur Verfügung steht.\nUm eine der Aktionen durchzuführen, darf der Paläontologe weder erschöpft noch beschäftigt sein. Sein Erfolg hängt weitgehend von seiner paläontologischen [concept_academics_experience] ab.\n#b Dinosaurierknochen#! werden zur Rekonstruktion von [Concept('concept_dubois_dinosaur_skeleton','Dinsosaurierskeletten')] verwendet."
 concept_dubois_dinosaur_skeleton: "Dinosaurierskelett"
 concept_dubois_dinosaur_skeletons: "Dinosaurierskelette"
 concept_dubois_dinosaur_skeleton_desc: "Aus fünf [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] aus derselben Kontinentalregion kann ein [concept_dubois_paleontologist] einen vollständigen Dinosaurier rekonstruieren.\nHoffentlich hat Ihr #b Paläontologe#! genug Erfahrung, um das #b Dinosaurierskelett#! richtig zu rekonstruieren. Andernfalls riskieren Sie einen Prestigeverlust für Ihre [concept_dubois_paleontological_collection]. Wenn ein #b Dinosaurierskelett#! falsch rekonstruiert wurde, können Sie jedoch versuchen, es zu reparieren, was normalerweise zu einer etwas besseren Rekonstruktion führt."
 concept_dubois_paleontological_collection: "Paläontologische Sammlung"
 concept_dubois_paleontological_collections: "Paläontologische Sammlungen"
 concept_dubois_paleontological_collection_desc: "Die #b Paläontologische Sammlung#! ist das Reich Ihres [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]. Dort finden Sie alle [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] und [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] Ihrer Nation.\nJe besser Ihr #b Paläontologe#! diese #b Dinosaurierskelette#! montiert hat, desto prestigeträchtiger ist Ihre #b Sammlung#!. Wenn Ihr #b Paläontologe#! die #b Skelette#! furchtbar falsch montiert hat, könnte das dazu führen, dass die Sammlung an Prestige verliert. Aber vielleicht kann derselbe oder ein anderer #b Paläontologe#! das Skelett besser rekonstruieren!"
 concept_dubois_formation: "Formation"
 concept_dubois_formations: "Formationen"
 concept_dubois_geological_formation: "Geologische Formation"
 concept_dubois_formation_desc: "Es gibt zwei Arten von #b Formationen#!, Normale Formationen ermöglichen es Ihrem [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] zu sammeln, während große Formationen die Entdeckung von [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ermöglichen.\n#b Formationen#! können von Ihrem Paläontologen oder bei der Erforschung der Technologie Paläontologie entdeckt werden.\nWenn Sie selbst keine #b Große Formation#! haben, können Sie eine [concept_dubois_paleontological_licence] von einer Nation mit einer Formation kaufen, um Zugang dazu zu erhalten."
 concept_dubois_paleontological_expedition: "Paläontologische Expedition"
 concept_dubois_paleontological_expeditions: "Paläontologische Expeditionen"
 concept_dubois_paleontological_licence: "Paläontologische Lizenz"
 concept_dubois_paleontological_licences: "Paläontologische Lizenzen"
 concept_dubois_paleontological_licence_desc: "Wenn Sie keinen Zugang zu einer [concept_dubois_formation] haben, können Sie versuchen, mit einer #b Paläontologischen Lizenz#! Zugang zu erhalten. Dieser diplomatische Pakt ermöglicht Ihnen den Zugang zu einer #b Großen Formation#!. Um sie nutzen zu können, müssen Sie eine Groß- oder Mittelmach sein und die andere Nation braucht eine #b Große Formation#!. Sie müssen der anderen Nation einen kleinen Teil Ihres Einkommens zahlen, aber hoffentlich wird es sich lohnen."
 concept_dubois_mountain: "Berg"
 concept_dubois_mountains: "Berge"
 concept_dubois_mountain_desc: "Es gibt viele #b Berge#! die bestiegen werden können.\n\n#V Nordamerika:#!\n#b Mount McKinley#! (Alaska), 6190 Meter\n#b Mount Logan#! (Yukon Territory), 5959 Meter\n#b Citlaltépetl#! (México), 5636 Meter\n#b Mount Whitney#! (California), 4421 Meter\n\n#V Südamerika:#!\n#b Aconcagua#! (Mendoza), 6267 Meter\n#b Huascarán#! (Lima-Gebiet), 6768 Meter\n#b Illimani#! (La Paz), 6438 Meter\n#b Chimborazo#! (Ecuador), 6267 Meter\n\n#V Europa:#!\n#b Shkara#! (Großer Kaukasus), 5642 Meter\n#b Dufourspitze#! (Dufourspitze), 4634 Meter\n#b Matterhorn#! (Westschweiz), 4478 Meter\n#b Aiguille Verte#! (Savoyen), 4122 Meter\n#b Pico de Aneto#! (Aragon), 3404 Meter\n\n#V Afrika:#!\n#b Kibo#! (Tanganjika), 5895 Meter\n#b Mount Kenya#! (Kenia), 5199 Meter\n#b Mount Stanley#! (Uganda), 5109 Meter\n#b Kamerunberg#! (Südkamerun), 4095 Meter\n\n#V Asien:#!\n#b Kamet#! (Delhi), 7756 Meter\n#b Chogolisa#! (Kaschmir), 7665 Meter\n#b Kabru#! (Himalaya), 7412 Meter\n#b Kaufmann Peak#! (Tadschikistan), 7134 Meter\n\n#V Australien & Ozeanien:#!\n#b Mount Wilhelm#! (Ost-Neuguinea), 4121 Meter\n#b Mount Cook#! (Südinsel), 3724 Meter"
 concept_elgar_music: "Musikkultur"
 concept_elgar_opera: "Oper"
 concept_elgar_operas: "Opern"
 concept_elgar_opera_house: "Opernhaus"
 concept_elgar_opera_houses: "Opernhäuser"
 concept_elgar_musical_tradition: "Musikalische Tradition"
 concept_elgar_impressionism: "Impressionismus"
 concept_elgar_expressionism: "Expressionismus"
 concept_elgar_art_nouveau: "Jugendstil"
 concept_elgar_architecture: "Architektur"
 concept_elgar_architectural_project: "Architekturprojekt"
 concept_elgar_architectural_projects: "Architekturprojekte"
 concept_lepsius_archaeology: "Archäologie"
 concept_lepsius_archaeology_desc: "#b Archäologie#! ist einer der Hauptinhalte von [concept_morgenroete].\n\nEs gibt 8 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] in der Welt.\n\nUm eine [concept_lepsius_expedition] senden zu können, müssen Sie die Technologie Antiquarismus erforschen, über ein [concept_lepsius_archaeological_team] verfügen und Zugang zu einer der Ausgrabungsstätten haben. Sie können Zugang erhalten, indem Sie entweder selbst Eigentümer der Ausgrabungsstätte sind oder ein Land mit einer Ausgrabungsstätte um ein [concept_lepsius_excavation_licence] bitten.\n\nHaben Sie all diese Vorgaben erfüllt, können Sie eine archäologische Expedition zu einer der Ausgrabungsstätte schicken. Ihr Team wird [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] entdecken und in sehr seltenen Fällen können Sie mit der Hilfe eines guten [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] sogar ein [concept_lepsius_major_artifact] finden.\n\nSobald Ihr Team mit den Artefakten zurückkommt, können Sie möglicherweise ein [concept_lepsius_museum] bauen. In einem Archäologischen Museum werden die Artefakte in [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')] präsentiert, die Sie sich ansehen können. Auch Ihren #b #BLUE Archäologen#!#! können Sie dort besuchen.\n\nJe mehr Artefakte und Ausstellungen Sie haben, desto mehr Prestige erhalten Sie.\n\n#b Anthropologie#! ist ein weiterer Teilbereich der Archäologie. Wenn Sie einen [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] und eine [concept_lepsius_cave] haben, können Sie [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] finden und prähistorische menschliche Spezies rekonstruieren. Jedes Skelett verleiht Ihnen mehr anthropologisches Prestige. Mit genügend anthropologischem Prestige erhalten Sie einen Prestigemodifikator für Ihr Land."
 concept_lepsius_archaeologist: "#b #BLUE Archäologe#!#!"
 concept_lepsius_archaeologists: "#b #BLUE Archäologen#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE Archäologen#!#! sind Akademiker, die Sie auf [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] entsenden können. Dort werden sie [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] sammeln. Manchmal finden sie sogar ein [concept_lepsius_major_artifact].\nArchäologen erhalten während ihrer Arbeit und passiv jedes Jahr [concept_academics_experience]. Sie können ein höheres Level der Archäologeneigenschaft erreichen, indem sie genügend #b Erfahrung#! sammeln."
 concept_lepsius_anthropologist: "#b #BLUE Anthropologe#!#!"
 concept_lepsius_anthropologists: "#b #BLUE Anthropologen#!#!"
 concept_lepsius_anthropologist_desc: "#b #BLUE Anthropologen#!#! sind Wissenschaftler, die sich mit der Vorgeschichte des Menschen befassen, sowohl im paläontologischen als auch im archäologischen Sinne. Sie suchen nach [Concept('concept_lepsius_human_fossil','Menschlichen Fossilien')] in [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] oder identifizieren bisher unbekannte Knochen. Drei #b Menschliche Fossilien#! reichen aus, um eine vormenschliche Spezies zu rekonstruieren. Das Finden und Identifizieren von Knochen sowie die Systematisierung früher menschlicher Arten bringen anthropologisches Prestige. Sie können bei der Erkundung von Höhlen auch lokale Artefakte finden."
 concept_lepsius_museum: "Archäologisches Museum"
 concept_lepsius_museum_desc: "Das #b Archäologische Museum#! ist ein Gebäude, das Sie errichten können und in dem alle entdeckten [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] Ihrer Nation ausgestellt sind."
 concept_lepsius_excavation_site: "Historische Ausgrabungsstätte"
 concept_lepsius_excavation_sites: "Historische Ausgrabungsstätten"
 concept_lepsius_excavation_site_desc: "Es gibt mehrere #b Historische Ausgrabungsstätten#! in verschiedenen Ländern, darunter: Ober- und Unterägypten, Babylonien, Assyrien, Kreta, Argolis, Yucatán und Peru. Jede #b historische Stätte#! bietet unterschiedliche [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] und Ereignisse."
 concept_lepsius_expedition: "Archäologische Expedition"
 concept_lepsius_expeditions: "Archäologische Expeditionen"
 concept_lepsius_expedition_desc: "Eine #b Archäologische Expedition#! ist eine Expedition eines [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] und seines [Concept('concept_lepsius_archaeological_team','archäologischen Teams')]. Die Expedition wird mehrere Monate dauern, in denen das Team versucht, so viele [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] wie möglich zu sammeln. #b Expeditionen#! sind eine Möglichkeit, in den Besitz [Concept('concept_lepsius_major_artifact','ärchäologischer Artefakte')] zu kommen.\nWenn Sie frühe Archäologie erforscht haben, können Sie Ihr Team an der Ausgrabungsstätte zurücklassen, um nach einer erfolgreichen #b Expedition#! eine [concept_lepsius_excavation] einzurichten."
 concept_lepsius_archaeological_team: "Archäologisches Team"
 concept_lepsius_archaeological_teams: "Archäologische Teams"
 concept_lepsius_excavation_team: "Ausgrabungsteam"
 concept_lepsius_archaeological_team_desc: "Sie benötigen ein oder mehrere #b Archäologische Teams#!, um [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] durchführen zu können. Sie können bis zu 3 #b Archäologische Teams#! erhalten, aber jedes hat höhere Anforderungen.\n\nSie können Ihr erstes #b Team#! erhalten, indem Sie die Technologie Antiquarismus erforschen, über eine Universität von mindestens Stufe 3 verfügen und Ihre Bevölkerung eine Alphabetisierung von mindestens 33 % aufweist.\n\nSie können ein weiteres Team erhalten, wenn Sie die Technologie der modernen Archäologie erforscht haben, eine Universität mit mindestens Stufe 15 und eine Alphabetisierung von 66 % haben.\n\nSie können ein weiteres #b Team#! erhalten wenn Sie die Technologie Antiquarismus erforscht haben und über einen erfahrenen [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] verfügen.\n\nSie benötigen #b Teams#! für [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] und [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]."
 concept_lepsius_excavation_licence: "Ausgrabungslizenz"
 concept_lepsius_excavation_licences: "Ausgrabungslizenzen"
 concept_lepsius_excavation_licence_desc: "Wenn Sie eine der [Concept('concept_lepsius_excavation_site','Historischen Ausgrabungsstätten')] nicht selbst besitzen, können Sie dennoch Zugang dazu erhalten, indem Sie die Diplomatische Aktion #b Ausgrabungslizenz#! verwenden.\nUm eine #b Ausgrabungslizenz#! erhalten zu können, müssen Sie mindestens eine Mittelmacht sein und ein [concept_active_interest] in der Region haben.\nSie müssen dem anderen Land einen kleinen Geldbetrag zahlen, um die #b Ausgrabungslizenz#! zu behalten."
 concept_lepsius_artifact: "Artefakt"
 concept_lepsius_artifacts: "Artefakte"
 concept_lepsius_minor_artifact: "Kleineres Artefakt"
 concept_lepsius_minor_artifacts: "Kleinere Artefakte"
 concept_lepsius_oceanic_artifact: "Ozeanisches Artefakt"
 concept_lepsius_oceanic_artifacts: "Ozeanische Artefakte"
 concept_lepsius_artifact_desc: "Sie können Artefakte erhalten, indem Sie [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')] auf [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] schicken, [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')] durchführen lassen, auf [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] oder zufällig bei Ereignissen.\n\nNormalerweise erhalten Sie kleinere #b Artefakte#!. Sie können diese kleineren #b Artefakte#! für [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')] in Ihrem [concept_lepsius_museum] verwenden.\n\n[Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')] hingegen sind einzigartige #b Artefakte#!, die nur einmal gefunden werden können und einen eindeutigen Namen haben. Sie finden sie normalerweise bei Expeditionen, Ausgrabungen und als archäologische Entdeckungen."
 concept_lepsius_major_artifact: "Bedeutendes Artefakt"
 concept_lepsius_major_artifacts: "Bedeutende Artefakte"
 concept_lepsius_major_artifact_desc: "#b Bedeutende Artefakte#! sind besondere [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], die einen Namen und eine Identität haben.\nSie können #b Bedeutende Artefakte#! auf unterschiedliche Weise finden. Einige davon finden Sie in [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. Für andere müssen Sie eine fortlaufende [concept_lepsius_excavation] aufrechterhalten, bis Sie es finden. Und einige erhalten Sie bei einer großen Entdeckung.\nDie illegale Mitnahme eines #b Bedeutenden Artefakts#! aus einem Land kann zu einem diplomatischen Zwischenfall führen, der Ihnen mehr schaden könnte als der Besitz eines #b Bedeutenden Artefakts#! einbringt. Auf der anderen Seite können Sie mit #b Bedeutenden Artefakten#! [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')] gründen, die Ihnen einen enormen Prestigebonus verschaffen und für einige [Concept('concept_academics_academic_mission','$concept_academics_academic_missions$')] benötigt werden."
 concept_lepsius_exhibition: "Ausstellung"
 concept_lepsius_exhibitions: "Ausstellungen"
 concept_lepsius_excellent_exhibition: "Ausgezeichnete Ausstellung"
 concept_lepsius_excavation: "Ausgrabung"
 concept_lepsius_excavations: "Ausgrabungen"
 concept_lepsius_excavation_desc: "Wenn Sie die Frühe Archäologie erforscht und eine [concept_lepsius_expedition] abgeschlossen haben, können Sie sich entscheiden, Ihr [concept_lepsius_archaeological_team] an der Ausgrabungsstätte zu belassen, um passiv [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] auszugraben. Sie können Ihr Team jederzeit von der #b Ausgrabung#! zurückrufen."
 concept_lepsius_human_fossil: "Menschliches Fossil"
 concept_lepsius_human_fossils: "Menschliche Fossilien"
 concept_lepsius_human_fossils_fossils: "Fossilien"
 concept_lepsius_human_bones: "Menschliche Knochen"
 concept_lepsius_human_fossil_desc: "#b Menschliche Fossilien#! gehören zu einer von fünf verschiedenen Arten: Cro-Magnon, Neandertaler, Homo Erectus, Australopithecus oder Paranthropus. [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] können sie in [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] finden und (meist) sofort identifizieren und zuordnen. Menschliche Fossilien können auch selten von Archäologen und Paläontologen gefunden werden. Nur #b #BLUE Anthropologen#!#! können diese \"unbekannten menschlichen Fossilien\" korrekt identifizieren. Drei Knochen vervollständigen eine Art, was mit anthropologischem Prestige belohnt wird. Die erste Klassifizierung eines Frühmenschen verleiht deutlich mehr Prestige. Menschliche Fossilien können beliebig oft fertiggestellt werden."
 concept_lepsius_cave: "Höhle"
 concept_lepsius_caves: "Höhlen"
 concept_lepsius_cave_desc: "#b Prähistorische Höhlen#! sind Orte, an denen Frühmenschen möglicherweise [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils_fossils$')] oder Werkzeuge zurückgelassen haben. Höhlen können von [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] entdeckt und erkundet werden. Einige Höhlen werden auch durch historische Ereignisse freigeschaltet. In jeder Höhle liegen die Fossilien nur einer Art – das bedeutet, dass sich die Knochen von Cro-Magnon-Menschen und Neandertalern nie in derselben Höhle befinden. Einige Höhlen sind historisch, andere werden zu Beginn des Spiels zufällig auf einem der drei Kontinente Afrika, Asien und Europa verteilt. Sie orientieren sich grob am Verbreitungsgebiet der Vormenschen – der Australopithecus beispielsweise wird nur in Afrika vorkommen."
 concept_verrier_astronomy: "Astronomie"
 concept_verrier_observatory: "Observatorium"
 concept_verrier_observatories: "Observatorien"
 concept_verrier_astronomer: "#b #ORANGE Astronom#!#!"
 concept_verrier_astronomers: "#b #ORANGE Astronomen#!#!"
 concept_verrier_astronomical_object: "Astronomisches Objekt"
 concept_verrier_astronomical_objects: "Astronomische Objekte"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "Himmelskörper"
 concept_verrier_celestial_bodies: "Himmelskörper"
 concept_verrier_comet: "Großer Komet"
 concept_verrier_comets: "Große Kometen"
 concept_verrier_comet_desc: "Im Viktorianischen Zeitalter gab es einige #b Große Kometen#!, die die Aufmerksamkeit der Öffentlichkeit auf sich zogen. Wenn Sie einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] haben, besteht die Chance, dass Sie einen dieser #b Großen Kometen#! zuerst entdecken, was zu einem Bonus auf Prestige und Forschung führt."
 concept_verrier_moon_photo: "Mondfoto"
 concept_verrier_moon_photos: "Mondfotos"
 concept_rapanui_christian_mission: "Christliche Mission"
 concept_rapanui_christian_missions: "Christliche Missionen"
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] oder [Concept('concept_great_power','$concept_great_powers$')] mit einem [concept_interest] in Ozeanien können versuchen, einen dezentralen Inselstaat in der Region zu bekehren – dies ist jedoch nur möglich, wenn Ihr Land nicht zu säkular ist und die Fromme Interessengruppe nicht zu schwach ist.\n\nDie Missionierung erfolgt in drei Schritten. Wenn Sie einen Missionar schicken, wird er entweder freundlich empfangen, ignoriert – oder sofort getötet. Sollte Ihre Mission scheitern, müssen Sie einige Jahre warten, bis Sie einen neuen Missionar finden, der das Wort Gottes verbreitet. Anschließend wird Ihr Missionar jedes Jahr 1% der Bevölkerung bekehren. Es kann Ereignisse geben, die die Konvertierung unterstützen oder behindern.\n\nDie zweite Phase beginnt, wenn Sie 30% der Einheimischen konvertierte haben. Jetzt wird Ihre Missionsstation dauerhaft. Sollten sich 51% der Einheimischen zum Christentum bekennen, dann wird der Häuptling zu Ihrer Religion konvertieren und sich als [concept_protectorate] unter Ihren Schutz stellen. Jahre später können diese Gebiete sogar annektiert werden, wenn Sie über die Technologie zur Malariaprävention verfügen.\n\nIn der dritten Stufe können Sie über den Journaleintrag aktiv Entscheidungen treffen. Entweder stärkt man die Mission direkt durch die Entsendung zusätzlicher Missionare, oder man kann auf den Handel setzen. Durch Handel können seltene [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] oder Perlen erworben werden, die den Lebensstandard der Oberschicht erhöhen."
 concept_manzoni_literary_tradition: "Literarische Tradition"
 concept_klimt_painters: "#PURPLE #b Maler#!#!"
 concept_klimt_painting_tradition: "Malerische Tradition"
 concept_vikelas_sports: "Sport"
 concept_vikelas_sports_desc: "#b Sport#! ist einer der Hauptinhalte von [concept_morgenroete].\n\nSobald ein Land #b Organisierter Sport#! entdeckt, erhält es Zugang zu verschiedenen sportlichen Aktivitäten. Das wichtigste ist die Gründung des [concept_vikelas_ioc], das mit der Organisation der [Concept('concept_vikelas_olympic_games','$concept_vikelas_olympic_games$')] beginnen wird. Bei den Olympischen Spielen haben Sie die Chance, Goldmedaillen zu gewinnen, die Ihrem Land [concept_prestige] bescheren."
 concept_vikelas_olympic_games: "Olympische Spiele"
 concept_vikelas_olympic_games_desc: "Sobald das [concept_vikelas_ioc] gegründet ist, können die #b Olympischen Spiele#! alle 4 Jahre stattfinden. Jedes Mal stimmt das Komitee für einen #b Gastgeber#!. Das Gastgeberland wird einen großen [concept_prestige]-Bonus erhalten.\nWährend der Olympischen Spiele werden Ihre Athleten um Medaillen kämpfen. Viele Faktoren beeinflussen, wie viele Medaillen Sie erhalten. Ihre Bevölkerung hat einen kleinen Einfluss, der [concept_sol] hat einen größeren Einfluss, einige Ereignisse beeinflussen auch Ihre Chancen, ebenso wie große [Concept('concept_general', '$concept_generals$')] und große [Concept('concept_admiral', '$concept_admirals$')]. Zusätzlich geben Charakter mit der Eigenschaft #b Athlet#! und städtische Zentren mit der Produktionsmethode #b Sportanlagen#! ebenfalls kleine Boni.\nAll diese Faktoren haben Einfluss darauf, wie viele der 12 Goldmedaillen Ihr Land erhalten wird. Für jede Goldmedaille erhalten Sie 5 [concept_prestige]."
 concept_vikelas_ioc: "Internationales Olympisches Komitee"
 concept_vikelas_ioc_desc: "Eine Nation, die #V $vikelas_international_sports_tech$#! erforscht hat, kann das #b Internationale Olympische Komitee#! oder kurz #b IOC#! gründen. Das IOC wird dann mit der Organisation der [Concept('concept_vikelas_olympic_games', '$concept_vikelas_olympic_games$')] beginnen. Jedes Mitglied des IOC kann an den Olympischen Spielen teilnehmen.\nDie wichtigsten Mitglieder des IOC sind die #b Vorstandsmitglieder#!. Der Gründer des IOC wird #b Präsident#! und bleibt somit für immer Vorstandsmitglied, während die anderen Mitglieder alle 4 Jahre gewählt werden. Der Vorstand bietet Platz für 5 Großmächte, 2 europäische, 2 asiatische, 2 amerikanische, 1 afrikanische und 1 ozeanische Nation.\nDie Hauptaufgabe der Vorstandsmitglieder besteht darin, den nächsten Gastgeber der Spiele auszuwählen. Es stehen 3 Kandidaten (oder 4, wenn ein Land beschließt, den Vorstand zu bestechen) zur Auswahl.\nWenn Griechenland das IOC gründet, werden die Olympischen Spiele nur in Griechenland abgehalten, was dazu führt, dass der Vorstand weniger wichtig ist, da er nicht den Gastgeber wählt."
 concept_lepsius_exhibition_desc: "Ihr [concept_lepsius_museum] richtet automatisch Ausstellungen ein (in Form einer [concept_production_method] für jede Region), wenn Sie genügend [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] derselben Art haben. Für normale Artefakte wird die erste Ausstellung für 10 oder mehr Artefakte erstellt. Von dort aus sind bessere Ausstellungen mit 25 (mittlere Ausstellung), 50 (große Ausstellung) und 100 kleinen Artefakten (ausgezeichnete Ausstellung) möglich. Die ausgezeichnete Ausstellung benötigt zusätzlich ein [concept_lepsius_major_artifact].\n\nLokale Artefakte haben eine weniger vielfältige Auswahl an Ausstellungen, da sie auf eine reguläre und eine große Ausstellung beschränkt sind. Für die reguläre Ausstellung sind 25 lokale Artefakte erforderlich und für die Große Ausstellung sind 50 erforderlich."
 concept_vikelas_racer: "Autorennfahrer"
 concept_vikelas_racers: "Autorennfahrer"
 concept_vikelas_racer_desc: "Ein Autorennfahrer is ein spezieller [concept_character] der an [concept_vikelas_car_racing] teilnimmt."
 concept_vikelas_car_racing: "Autorennen"
 concept_vikelas_car_racing_desc: "Autorennen sind eine Sportart, bei der [Concept('concept_vikelas_racer','$concept_vikelas_racers$')] entweder auf normalen Strassen oder Rennstrecken gegeneinander antreten."
 concept_lepsius_archaeological_exhibition: "Archäologische Ausstellung"
 concept_elgar_opera_desc: "Die #b Oper#! ist das musikalische Zentrum einer Nation. Hier versammeln sich die wichtigsten Musiker und spielen für die Massen.\nDie #b Oper#! ist ein separates Gebäude, das in Staaten errichtet werden kann, wenn das Stadtzentrum mindestens Stufe 5 hat. Die #b Oper#! wird Musik produzieren und Instrumente verbrauchen. Je höher die Stufe der #b Oper#! ist, desto mehr [concept_elgar_musical_tradition] wird jedes Jahr produziert.\nZusätzlich erhalten Sie mit einer #b Oper#! Zugriff auf einige Entscheidungen wie den Besuch Ihrer Oper."
 concept_elgar_impressionism_desc: "#b Impressionismus#! ist ein Stil in der Kunstgeschichte, der sich durch die stimmungsvolle Darstellung flüchtiger Momentaufnahmen einer Szene auszeichnet. Sie entstand aus einer Bewegung innerhalb der Malerei in Frankreich in der zweiten Hälfte des 19. Jahrhunderts. Der Begriff Impressionismus wurde auch auf bestimmte Musik-, Literatur-, Film- und Fotografiestile angewendet. Während viele Naturforscher wie Heinrich Hart Musik als Ausdrucksmittel eines \"wahrheitssuchenden Aktionismus\" ablehnten, empfanden die Impressionisten das \"gegenstandslose Vorausträumen\" zu fein abgestuften bunten Akkorden oft als Vergnügen.\n\nIm Spiel #b Impressionismus#! kann nur mit einem Tagebucheintrag freigeschaltet werden, der 1000 [concept_elgar_musical_tradition], eine [concept_elgar_opera], mächtige Landbesitzer, nicht mächtige Industrielle und Intellektuelle mit einer Zustimmung von über 5 erfordert. Wenn Sie #b Impressionismus#! wählen, können Sie die beiden anderen Zweige nicht freischalten.\n\nDer Fokus von #b Impressionismus#! im Spiel liegt auf Musik. Daher erhalten Sie den größten Bonus für [concept_elgar_musical_tradition]."
 concept_elgar_expressionism_desc: "#b Expressionismus#! ist ein Stil in der Kunst. Ihre Anfänge und Vorläufer sind im späten 19. Jahrhundert zu finden. Der Expressionismus ist wie Impressionismus, Symbolismus und Fauvismus eine Bewegung gegen die Tendenzen des Naturalismus. Im Expressionismus überwiegt die expressive Ebene die ästhetische, appellative und sachliche Ebene. Der Künstler möchte seine Erfahrung für den Betrachter darstellen. Im Gegensatz zum musikalischen Impressionismus, der die Wahrnehmung der äußeren Erscheinung von Dingen darstellt, formulieren die expressionistischen Kunstrichtungen die Emotionen der menschlichen Seele.\n\nIm Spiel kann #b Expressionismus#! nur mit einem erforderlichen Tagebucheintrag freigeschaltet werden 1000 [concept_elgar_musical_tradition], eine [concept_elgar_opera], mächtige Intellektuelle oder Gewerkschaftler haben, Grundbesitzer, die nicht mächtig sind und entweder die Intellektuellen oder die Gewerkschaftler eine Zustimmung von 5 oder höher haben. Wenn Sie #b Expressionismus#! wählen, können Sie die beiden anderen Zweige nicht freischalten.\n\nDer Schwerpunkt von #b Expressionismus#! im Spiel wäre Literatur, aber es ist noch nicht implementiert."
 concept_elgar_art_nouveau_desc: "#b Jugendstil#! ist ein Kunststil, der sich aus der #italic Arts-and-Crafts-Bewegung#! entwickelte und von natürlichen Formen inspiriert wurde. Es konzentrierte sich oft auf Dynamik und Bewegung und verwendete moderne Materialien.\n\nIm Spiel kann #b Jugendstil#! nur mit einem Tagebucheintrag freigeschaltet werden, der 1000 [concept_elgar_musical_tradition], eine [concept_elgar_opera], mächtige Industrielle und Intellektuelle mit einer Zustimmung von 5 oder höher erfordert. Wenn Sie #b Jugendstil#! wählen, können Sie die anderen beiden Zweige nicht freischalten.\n\nDer Fokus von #b Art Nouveau#! und #b Art Déco#!, der nächsten Technologie in diesem Zweig, ist Architektur. Sie erhalten verschiedene Veranstaltungen und Journaleinträge zu architektonischen Taten und können [concept_gaudi_architectural_splendour] erhalten."
 concept_elgar_composer: "#PURPLE #b Komponist#!#!"
 concept_elgar_composers: "#PURPLE #b Komponisten#!#!"
 concept_elgar_composer_desc: "#b Komponisten#! sind Männer und Frauen, die Musik komponieren. Komponisten sind spezielle Charaktere, die Sie entweder durch Ereignisse erhalten, indem Sie genug [concept_artistic_progress] sammeln, um einen in Ihrem Land zu erschaffen, oder indem Sie einem [concept_elgar_travelling_composer] eine Position anbieten.\nSobald Sie einen #b Komponisten#! haben, können Sie ihn [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], auf [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] gehen oder ein [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] komponieren lassen. Jede Aktion unterscheidet sich darin, was der Komponist macht, was er braucht und was Sie davon haben. Der #b Komponist#! wird nach jeder Aufgabe [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')] sein und sich eine Weile ausruhen müssen, bis er wieder arbeiten kann.\nIm Laufe seines Lebens wird der #b Komponist#! [concept_artists_experience] erhalten und manchmal wieder verlieren. Je höher die #b Reputation#! ist, desto größer sind die Vorteile der Handlungen eines #b Komponisten#!. #b Komponisten#!, die eine #b Reputation#! von 500 erreichen, bekommen die Eigenschaft [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], Titanen der Musik, bekannt in der ganzen Welt."
 concept_elgar_great_composer: "#PURPLE #b Großer Komponist#!#!"
 concept_elgar_great_composers: "#PURPLE #b Große Komponisten#!#!"
 concept_elgar_great_composer_desc: "#b Große Komponisten#! sind die Titanen der Musik. Diejenigen, deren Namen bis in alle Ewigkeit bekannt sein werden. [Concept('concept_elgar_composer','$concept_elgar_composers$')], die 500 [concept_artists_experience] erreichen, werden #b Große Komponisten#!. Dies erhöht ihre Effizienz und lässt Ihre Nation viel mehr [concept_elgar_musical_tradition] erhalten. Ein #b Großer Komponist#! kann zum Beispiel ein [concept_elgar_musical_masterwork] viel schneller erschaffen."
 concept_elgar_travelling_composer: "Reisender Komponist"
 concept_elgar_travelling_composers: "Reisende Komponisten"
 concept_elgar_travelling_composer_desc: "#b Reisende Komponisten#! sind [Concept('concept_elgar_composer','$concept_elgar_composers$')], die von keiner Nation angestellt wurden. Stattdessen reisen sie auf Konzerttourneen umher. Sie können einen #b Reisenden Komponisten#! anwerben, aber je mehr [concept_artists_experience] sie haben, desto mehr Ansprüche werden sie stellen.\nUm einen #b Reisenden Komponisten#! einzuladen, müssen Sie mindestens ein [Concept('concept_elgar_opera','$concept_elgar_opera_house$')] haben. #b Komponisten#! mit einer höheren #b Reputation#! verlangen größere Opernhäuser, moderne Musik [Concept('concept_technology', '$concept_technologies$')], eine gewisse [concept_elgar_musical_tradition] und manche können sich nur [Concept('concept_major_power', '$concept_major_power_short$')] oder [Concept('concept_great_power', '$concept_great_powers$')] anschließen.\nEin Sonderfall sind [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')], die nur für Nationen zur Verfügung stehen, die dieselbe oder eine sehr ähnliche nationale Identität haben."
 concept_elgar_national_composer: "Nationaler Komponist"
 concept_elgar_national_composers: "Nationale Komponisten"
 concept_elgar_national_composer_desc: "#b Nationale Komponisten#! sind [Concept('concept_elgar_composer','$concept_elgar_composers$')], die ihre Nation sehr schätzen. Sie können nicht von anderen Nationen angeheuert werden.\nOb ein #b Nationaler Komponist#! für Sie verfügbar ist oder nicht, wird durch die [Concept('concept_cultural_trait','$concept_cultural_traits$')] seiner Kultur entschieden. Eine Ihrer primären Kulturen muss sowohl eine nicht-erbliche #b Eigenschaft#! als auch eine [concept_cultural_heritage_trait] teilen. Das bedeutet, dass ein norddeutscher #b Nationaler Komponist#! sowohl für deutsche Länder als auch für die Schweiz verfügbar ist."
 concept_elgar_composing: "Komponieren"
 concept_elgar_composing_lower_case: "komponieren"
 concept_elgar_composing_compose: "komponieren"
 concept_elgar_composing_desc: "Ein [concept_elgar_composer], der #b komponiert#! erhält pro Jahr 5 [concept_artists_experience] und fügt dem Land 5 [concept_elgar_musical_tradition] hinzu. Außerdem schafft er jedes Jahr eine zufällige Anzahl von Kompositionen. Ein #b Komponist#! mit besonderen Fähigkeiten wie Dirigent, Virtuose, Innovativ oder Akribisch schafft eine zusätzliche Komposition pro Jahr. Die Anzahl der Kompositionen ist entscheidend für den Erfolg auf späteren [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]. Ein #b Komponist#! komponiert so lange, bis die Aktion im Journaleintrag abgebrochen wird. Ein #b Komponist#!, der komponiert, kostet das Land eine kleine jährliche Unterhaltsgebühr."
 concept_elgar_conducting: "Dirigieren"
 concept_elgar_conducting_lower_case: "dirigieren"
 concept_elgar_conducting_conduct: "dirigieren"
 concept_elgar_conducting_desc: "Der [concept_elgar_composer] wird sich 24 Monate lang auf das #b Dirigieren#! konzentrieren und eine Konzertsaison organisieren. Dies verbessert die Musikproduktion einer zufälligen [concept_elgar_opera], gibt, für 5 bis 10 Jahre, Ihrer Nation einen kleinen Schub für [concept_elgar_musical_tradition] und Ihrem #b Komponisten#! einen mittleren Schub für seine [concept_artists_experience]. Wenn Ihr #b Komponist#! noch kein Dirigent ist, kann er die [concept_character_trait] am Ende der Saison erhalten. Sie müssen den #b Komponisten#! bezahlen, solange er #b dirigiert#!."
 concept_elgar_musical_tour: "Konzerttournee"
 concept_elgar_musical_tours: "Konzerttourneen"
 concept_elgar_musical_tour_tour: "Tournee"
 concept_elgar_musical_tour_tours: "Tourneen"
 concept_elgar_musical_tour_desc: "Der [concept_elgar_composer] kann 30 Monate lang auf #b Konzerttournee#! im Ausland gehen. #b Konzerttourneen#! erhöhen das [concept_prestige] der Nation des #b Komponisten#!. Zusätzlich erhält der #b Komponist#! am Ende der #b Tournee#! einen Schub an [concept_artists_experience], der von der Anzahl der Kompositionen des #b Komponisten#!, sowie seinen Eigenschaften abhängt.\n#b Komponisten#! mit weniger als 20 Kompositionen sollten wahrscheinlich nicht auf #b Tournee#! gehen und #b Komponisten#! mit der Eigenschaft #b Zurückhaltend#! können nicht auf #b Tournee#! gehen."
 concept_elgar_musical_masterwork: "Musikalisches Meisterwerk"
 concept_elgar_musical_masterworks: "Musikalische Meisterwerke"
 concept_elgar_musical_masterwork_masterwork: "Meisterwerk"
 concept_elgar_musical_masterwork_masterworks: "Meisterwerke"
 concept_elgar_musical_masterwork_of_music: "Meisterwerk der Musik"
 concept_elgar_musical_masterworks_of_music: "Meisterwerke der Musik"
 concept_elgar_musical_masterwork_desc: "Der [concept_elgar_composer] kann mit der Komposition eines #b Meisterwerks#! beginnen, was mehrere Jahre dauern wird. Je mehr [concept_artists_experience] ein #b Komponist#! hat, desto schneller wird er fertig. Sobald das #b Meisterwerk#! fertig komponiert ist, erhält der #b Komponist#! 50 [concept_artists_experience] und das Land erhält bis zu 150 [concept_elgar_musical_tradition], abhängig von seinem [concept_rank].\nEin #b Komponist#! kann maximal 3 #b Meisterwerke#! erschaffen und benötigt während der Arbeit daran finanzielle Unterstützung durch sein Land."
 concept_elgar_composer_exhaustion: "Erschöpfung des Komponisten"
 concept_elgar_composer_exhaustion_exhausted: "erschöpft"
 concept_elgar_composer_exhaustion_desc: "Sobald ein [concept_elgar_composer] [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], das Erstellen von [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] oder [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] abgeschlossen hat, ist er von der Arbeit #b erschöpft#!. Ein #b erschöpfter Komponist#! wird für einige Zeit nicht arbeiten können. Je älter der #b Komponist#!, desto länger dauert es, die #b Erschöpfung#! loszuwerden."
 concept_manzoni_writer: "#PURPLE #b Schriftsteller#!#!"
 concept_manzoni_writers: "#PURPLE #b Schriftsteller#!#!"
 concept_klimt_painter: "#PURPLE #b Maler#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE Konservatorium#!#!"
 concept_pm_artists_academy_conservatory_desc: "Ein Konservatorium wird die Kunstakademie für Musik spezialisieren. Wenn Sie ein Konservatorium haben, können Sie [Concept('concept_elgar_composer','$concept_elgar_composers$')] fördern. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Kunstakademie sowie einen #n negativen Effekt#! auf Ihren [concept_artistic_progress], wenn Sie diese Produktionsmethode ändern."
 concept_pm_artists_academy_salon: "#b #PURPLE Literarischer Salon#!#!"
 concept_pm_artists_academy_salon_desc: "Ein Literarischer Salon wird die Kunstakademie auf Literatur spezialisieren. Wenn Sie einen Literatursalon haben, können Sie [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] bewerben. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Kunstakademie sowie einen #n negativen Effekt#! auf Ihren [concept_artistic_progress], wenn Sie diese Produktionsmethode ändern."
 concept_pm_artists_academy_studio: "#b #PURPLE Kunstatelier#!#!"
 concept_pm_artists_academy_studio_desc: "Ein Kunstatelier wird die Kunstakademie auf Malerei spezialisieren. Wenn Sie ein Kunstatelier haben, können Sie [Concept('concept_klimt_painter','$concept_klimt_painters$')] werben. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Kunstakademie sowie einen #n negativen Effekt#! auf Ihren [concept_artistic_progress], wenn Sie diese Produktionsmethode ändern."
 concept_pm_artists_academy_specialization: "Schwerpunkt der Kunstakademie"
 concept_pm_artists_academy_specialization_desc: "Jede Kunstakademie kann durch Änderung ihrer Produktionsmethode spezialisiert werden.\nEine Kunstakademie mit einem [concept_pm_artists_academy_conservatory] ermöglicht es Ihnen, [Concept('concept_elgar_composer','$concept_elgar_composers$')] zu werben.\nEine Kunstakademie mit einem [concept_pm_artists_academy_salon] ermöglicht Ihnen die Werbung von [Concept('concept_manzoni_writer','$concept_manzoni_writers$')].\nEine Kunstakademie mit einem [concept_pm_artists_academy_studio] ermöglicht es Ihnen [Concept('concept_klimt_painter','$concept_klimt_painters$')] zu werben.\nEine Änderung der Spezialisierung hat einen #n kurzen negativen Effekt#! für das Gebäude und Ihren [concept_artistic_progress]."
 concept_artists_artist: "Künstler"
 concept_artists_artists: "Künstler"
 concept_artistic_progress: "Künstlerischer Fortschritt"
 concept_artistic_progress_desc: "Durch den Erwerb von 1000 #b Künstlerischer Fortschritt#! können Sie einen neuen [concept_artists_artist] erhalten. Um überhaupt Zugriff auf #b Künstlerischen Fortschritt#! zu haben, müssen Sie entweder über eine #b Kunst Akademie#! oder eine #b Oper#! verfügen.\nIhr #b Künstlerischer Fortschritt#! wird von verschiedenen Faktoren beeinflusst. Je mehr [concept_literacy] du hast, desto schneller erlangst du zum Beispiel #b künstlerischen Fortschritt#!. Detaillierte Informationen zu allen Faktoren, die den künstlerischen Fortschritt beeinflussen, erhalten Sie über die Symbolleiste der künstlerischen Fortschrittsleiste im Kunstfenster."
 concept_artists_experience: "Reputation"
 concept_artists_experience_desc: "Jeder [concept_artists_artist] hat eine #b Reputation#!. Diese Reputation gibt an, wie hoch das Ansehen des Künstlers ist. Künstler beginnen mit einer kleinen Reputation und können durch die Arbeit in ihrem Fachgebiet zusätzliche Reputation erlangen. Künstler, die eine Reputation von 500 erreicht haben, werden zu #V Großartigen Künstlern#! und erhalten die entsprechende [concept_character_trait]."
 concept_manzoni_great_writer: "Großer Schriftsteller"
 concept_manzoni_local_writer: "Lokaler Schriftsteller"
 concept_artists_center_of_arts: "Zentrum der Künste"
 concept_artists_centers_of_arts: "Zentren der Künste"
 concept_artists_center_of_classicism: "Zentrum des Klassizismus"
 concept_artists_center_of_romanticism: "Zentrum der Romantik"
 concept_artists_center_of_realism: "Zentrum des Realismus"
 concept_artists_center_of_impressionism: "Zentrum des Impressionismus"
 concept_artists_center_of_expressionism: "Zentrum des Expressionismus"
 concept_artists_center_of_art_nouveau: "Zentrum des Jugendstils"
 concept_klimt_great_painter: "#PURPLE #b Großer Maler#!#!"
 concept_klimt_great_painters: "#PURPLE #b Große Maler#!#!"
 concept_klimt_great_painter_desc: "#b Großer Maler#! sind [Concept('concept_klimt_painter','$concept_klimt_painters$')] die für die Ewigkeit bekannt sein werden. #b Maler#!, die 500 [concept_artists_experience] erreichen, werden zu #b Großen Malern#!. Dadurch wird ihre Effizienz erheblich gesteigert und Ihre Nation kann viel mehr [concept_klimt_painting_tradition] erhalten."
 concept_klimt_independent_painter: "Unabhängiger Maler"
 concept_klimt_independent_painters: "Unabhängige Maler"
 concept_klimt_painter_trip: "Bildungsreise"
 concept_klimt_painter_trip_journeys: "Reisen"
 concept_elgar_music_desc: "Die #b Musikkultur#! ist eines der Hauptmerkmale von [concept_morgenroete]. Im 19. und 20. Jahrhundert war Musik ein wichtiges Mittel, um die Bevölkerung zu unterhalten und die Größe einer Nation zu zeigen.\n\nUm auf die meisten Musikinhalte in #r Morgenröte#! zugreifen zu können, müssen Sie eine [concept_elgar_opera] bauen. Die #b Oper#! wird Musik produzieren, braucht aber Instrumente, um zu funktionieren. Abgesehen von der Produktion von #b Musik#! für Ihre Bevölkerung, werden #b Opern#! langsam [concept_elgar_musical_tradition] zu Ihrem Land hinzufügen.\n\n#b Musikalische Tradition#! reflektiert die musikalischen Errungenschaften und Traditionen einer Nation. Die Höhe der #b Musikalischen Tradition#! gibt Ihnen einen Prestige-Bonus und erlaubt Ihnen, einen Weg zu wählen, auf dem die Kunst Ihrer Nation voranschreiten kann. Sie können entweder den Weg des [concept_elgar_impressionism], [concept_elgar_expressionism] oder [concept_elgar_art_nouveau] einschlagen. Jeder dieser Kunststile hat einen anderen Schwerpunkt.\n\nEine gute Möglichkeit, noch mehr #b Musikalische Tradition#! zu erlangen, ist die Anstellung eines [Concept('concept_elgar_composer','$concept_elgar_composers$')]. Ein Komponist wird in der Lage sein, [Concept('concept_elgar_composing','$concept_elgar_composing_compose$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')], auf [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] zu gehen und sogar [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')] zu erstellen. Diese Aktionen verbessern entweder die [concept_artists_experience] des #b Komponisten#! oder die #b Musikalische Tradition#! Ihrer Nation."
 concept_artists_center_of_arts_desc: "Ein #b Kunstzentrum#! ist ein Zentrum eines [concept_artists_art_style], das in einer [concept_state_region] erstellt wird, sobald ein #b Kunststil#! erfunden wird. Es gibt nur ein #b Kunstzentrum#! pro #b Kunststil#!.\n#b Kunstzentren#! sind besonders wichtig für [Concept('concept_klimt_painter','$concept_klimt_painters$')], die eine [concept_klimt_painter_trip] machen sollen, um den #b Kunststil#! dort zu studieren. Außerdem lösen einige #b Kunstzentren#! einzigartige Ereignisse aus, die dort stattfinden werden. Bei einigen kannst du zum Beispiel [Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')] gewinnen."
 concept_klimt_painting_culture: "Malereikultur"
 concept_klimt_painting_culture_desc: "Die #b Malereikultur#! ist eines der Hauptmerkmale von [concept_morgenroete]. Im 19. und 20. Jahrhundert entwickelte sich die Malerei rasant, was zu verschiedenen neuen [Concept('concept_artists_art_style','$concept_artists_art_styles$')] führte, die Einzelpersonen und Ländern viel Fortschritt brachten.\n\nUm auf die meisten Malerei-Inhalte in #r Morgenröte#! zuzugreifen, musst du eine #b Kunstakademie#! aufbauen. #b Kunstakademien#! ermöglichen es dir, [concept_klimt_painting_tradition] zu erlangen und neue [Concept('concept_klimt_painter','$concept_klimt_painters$')] zu rekrutieren.\n\n#b Maler#! werden Gemälde und #b Meisterwerke#! für Ihr Land schaffen und Ihnen eine große Menge an #b Malerische Tradition#! geben. Da es verschiedene [Concept('concept_artists_art_style','$concept_artists_art_styles$')] für #b Maler#! gibt, kannst du sie zusätzliche #b Kunststile#! auf einer [concept_klimt_painter_trip] studieren lassen. Sobald sie 40 Jahre alt sind, werden sich #b Maler#! auf einen ihrer #b Kunststile#! spezialisieren und sich auf die Erstellung von Gemälden in diesem #b Kunststil#! konzentrieren."
 concept_artists_art_style: "Kunststil"
 concept_artists_art_styles: "Kunststile"
 concept_artists_art_style_style: "Stil"
 concept_artists_art_style_desc: "Ein #b Kunststil#! ist ein spezifischer Schwerpunkt der Kunst. Einige #b Kunststile#! sind von Anfang an verfügbar, wie #b Klassizismus#! und #b Romantik#!. Die anderen, #b Realism#!, #b Irrationalism#!, [concept_elgar_impressionism], [concept_elgar_expressionism] und [concept_elgar_art_nouveau], erscheinen erst, nachdem bestimmte Bedingungen erfüllt sind. Jeder #b Kunststil#! hat ein zugehöriges [concept_artists_center_of_arts] in dem [concept_state_region], in dem die Kunstrichtung begründet wurde."
 concept_klimt_painter_desc: "#PURPLE #b Maler#!#! sind Männer und Frauen, die Gemälde und andere Kunstwerke schaffen. #b Maler#! sind spezielle Charaktere, die Sie entweder durch Ereignisse erhalten, indem Sie genug [concept_artistic_progress] sammeln, um einen in Ihrem Land zu erzeugen, oder indem Sie einem [concept_klimt_independent_painter] eine Position anbieten.\n#b Maler#! beginnen sofort zu malen und erschaffen jedes Jahr eine Anzahl von Gemälden, abhängig von ihren [Concept('concept_character_trait','$concept_character_traits$')]. Manchmal können sie sogar ein #b Meisterwerk#! erschaffen, das Ihrer Nation noch mehr [concept_klimt_painting_tradition] gibt.\n#b Maler#! können verschiedene [Concept('concept_artists_art_style','$concept_artists_art_styles$')] auf [Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')] studieren. Jeder #b Maler#! wird sich auf einen #b Kunststil#! spezialisieren, sobald er 40 Jahre alt ist, was ihm erlaubt, #b Meisterwerke#! eines bestimmten Stils zu malen."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')], die nicht von einem Land angeheuert werden, sind #b Unabhängige Maler#!. #b Unabhängige Maler#! können von Ländern angeheuert werden, die eine [Concept('concept_primary_cultures','$concept_primary_culture$')] haben, die eine [concept_cultural_trait] mit der Kultur des #b Malers#! teilt.\n#b Unabhängige Maler#! haben unterschiedliche Anforderungen an ihr Gastland. Sie benötigen #b Kunstakademien#!, bestimmte [Concept('concept_technology', '$concept_technologies$')] oder eine bestimmte [concept_klimt_painting_tradition], je nach [concept_artists_experience] des #b Malers#!. Zusätzlich müssen Sie ihnen einen Geldbetrag zahlen, der von ihrer #b Reputation#! sowie den finanziellen Möglichkeiten Ihres Landes abhängt."
 concept_klimt_painter_trip_desc: "Ein [concept_klimt_painter] kann auf einer #b Bildungsreise#! zu einer der [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] neue [Concept('concept_artists_art_style','$concept_artists_art_styles$')] erlernen.\nAuf einer solchen #b Reise#! kann ein Maler positive und negative [Concept('concept_character_trait','$concept_character_traits$')] erhalten, die seine Arbeit und die Anzahl seiner Arbeiten beeinflussen Gemälde, die sie schaffen. Jedes #b Kunstzentrum#! hat leicht unterschiedliche Veranstaltungen und verleiht dem #b Maler#! am Ende eine einzigartige #b Eigenschaft#!, die später zur Spezialisierung des #b Malers#! werden kann."
 concept_klimt_art_prize: "Kunstpreis"
 concept_klimt_art_prizes: "Kunstpreise"
 concept_klimt_art_prize_desc: "Von Zeit zu Zeit finden künstlerische Wettbewerbe statt, bei denen Preise vergeben werden – die die Reputation eines Künstlers fördern. Nationen, die einen [concept_artists_center_of_arts] für Irrationalismus oder [concept_elgar_impressionism] haben, wählen die besten Musiker in einem alle fünf Jahre stattfindenden Wettbewerb aus. Die Besitzer eines [concept_klimt_art_gallery] oder eines #b Zentrums für Kunst des Realismus#! veranstalten alle fünf Jahre einen Malwettbewerb. Das Land, aus dem die Gewinner kommen, erhält auch Musikalisch oder Malerische Tradition. Eine besondere Form des Kunstwettbewerbs ist die Biennale, die alle zwei Jahre einen umfassenden Kunstpreis an das Land vergibt, das über die Künstler mit der höchsten Reputation verfügt, was alle kulturellen Traditionswerte steigert."
 concept_klimt_art_gallery: "Kunstgalerie"
 concept_klimt_art_gallery_desc: "Die #b Kunstgalerie#! ist ein besonderes Gebäude in der Hauptstadt einer Nation, das ab dem #b Realismus#! verfügbar ist. Es kann nur gebaut werden, wenn die Nation über einen [concept_klimt_painter] mit Spezialisierung verfügt. #b Maler#! mit einer Spezialisierung schalten die Sammlung ihres [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] frei – das heißt, ein Künstler mit einer Spezialisierung auf den romantischen Stil schaltet eine Sammlung der Romantik frei. Um eine Sammlung zu einer hervorragenden Sammlung aufzuwerten, bedarf es eines solchen Meisterwerks, das entweder von einem Maler gemalt oder aus dem Ausland erworben werden muss."
 concept_manzoni_writer_novelist: "Romanschriftsteller"
 concept_manzoni_writer_desc: "Ein #b Schriftsteller#! ist ein spezieller Charakter, der literarische Werke für Ihr Land schreiben wird. #b Schriftsteller#! beginnen normalerweise als [concept_manzoni_local_writer] und schreiben #b Publikationen#! und manchmal sogar [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. Ein #b Bestseller#! bringt dem #b Schriftsteller#! eine große Menge an [concept_artists_experience] und [concept_manzoni_literary_tradition] in Ihr Land. Es besteht die Chance, jedes Jahr einen #b Bestseller#! zu schreiben, je nachdem, wie nahe das [concept_manzoni_genre] des #b Schriftstellers#! dem [concept_manzoni_popular_taste] ist.\n\nEin bekannter #b Schriftsteller#! dessen [concept_interest_group] glücklich genug ist, kann Ihr [concept_manzoni_national_writer] werden. Ein #b Nationaler Schriftsteller#! kann [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')] erwerben oder einen Zeitungsroman schreiben. Wenn ein #b Schriftsteller#! 500 #b Reputation#! erreicht, kann er ein [concept_manzoni_great_writer] werden und Ihr Land mit noch mehr #b literarischer Tradition#! versorgen.\n\nSeien Sie vorsichtig, wenn #b Schriftsteller#! mit der politischen Situation in einem Land unzufrieden sind, können sie beschließen, [Concept('concept_agitator', '$concept_agitators$')] zu werden oder sich in den politischen Diskurs einmischen."
 concept_manzoni_great_writer_desc: "Ein #b Großer Schriftsteller#! ist ein [concept_manzoni_writer], der in der ganzen Welt bekannt ist. Ein #b Schriftsteller#! kann ein #b Großer Schriftsteller#! werden, wenn seine [concept_artists_experience] #V 500#! erreicht. Wenn ihr #b Großer Schriftsteller#! Ihr [concept_manzoni_national_writer] ist, erhalten Sie einen Bonus auf Ihren jährlichen Ertrag an [concept_manzoni_literary_tradition]."
 concept_manzoni_local_writer_desc: "Nahezu jeder [concept_manzoni_writer] beginnt als #b Lokaler Schriftsteller#!. Jedes Land kann maximal 3 #b Lokale Schriftsteller#! haben, die #b Publikationen#! erstellen, Ihnen [concept_manzoni_literary_tradition] einbringen, wenn ihr [concept_manzoni_genre] mit dem [concept_manzoni_popular_taste] übereinstimmt und [concept_artists_experience] erlangen.\nEin #b Lokaler Schriftsteller#! mit einer #b Reputation#! von 150 und dessen [concept_interest_group] nicht unglücklich ist, kann [concept_manzoni_national_writer] Ihres Landes werden, was Ihnen mehr #b Literarische Tradition#! und andere zusätzliche Vorteile gewährt.\nBeachten Sie, dass #b Lokale Schriftsteller#!, die mit der aktuellen politischen Situation unzufrieden sind, anfangen können, sich in den politischen Diskurs einzumischen oder sogar [concept_agitator]en werden."
 concept_manzoni_national_writer: "Nationaler Schriftsteller"
 concept_manzoni_national_writer_desc: "Ein #b Nationaler Schriftsteller#! ist ein Art [concept_manzoni_writer], der als das Gesicht der Literatur Ihres Landes gilt. #b Nationale Schriftsteller#! gewähren Ihnen mindestens 1 und bis zu 5 [concept_manzoni_literary_tradition].\n Sie können einen #b Nationalen Schriftsteller#! erhalten, indem Sie einen Ihrer [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')] ernennen. Um einen Ihrer #b Local Writers#! ernennen zu können, müssen sie mindestens #V 150#! [concept_artists_experience] haben und seine [concept_interest_group] muss eine positive [concept_approval] haben.\n"
 concept_manzoni_bestseller: "Bestseller"
 concept_manzoni_bestsellers: "Bestseller"
 concept_manzoni_bestseller_desc: "Ein #b Bestseller#! ist eine #b Veröffentlichung#! von einem [concept_manzoni_writer], die sich sehr gut verkauft, in der Regel, weil das [concept_manzoni_genre] des #b Schriftstellers#! mit dem aktuellen [concept_manzoni_popular_taste] übereinstimmt oder diesem nahe kommt.\nJedes Jahr besteht die Chance, dass ein [concept_manzoni_national_writer] oder [concept_manzoni_local_writer] einen #b Bestseller#! schreibt. Der erste #b Bestseller#! verleiht dem Land eine große Menge an [concept_manzoni_literary_tradition] und jeder weitere #b Bestseller#! verleiht dem Land signifikante Menge an #b Literarischer Tradition#!"
 concept_manzoni_genre: "Genre"
 concept_manzoni_genres: "Genres"
 concept_manzoni_genre_desc: "Jeder [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] hat ein bestimmtes #b Genre#!. Das #b Genre#! wird zugewiesen, wenn der #b Autor#! erstellt wird, und hängt von vielen Faktoren ab.\n#b Schriftsteller#! erhalten mehr [concept_artists_experience] und schreiben mehr [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')], wenn ihr #b Genre#! mit dem [concept_manzoni_popular_taste] des Landes übereinstimmt oder ähnlich ist."
 concept_manzoni_popular_taste: "Zuschauergeschmack"
 concept_manzoni_popular_taste_audience: "Zuschauergeschmack"
 concept_manzoni_popular_tastes_audience: "Zuschauergeschmack"
 concept_manzoni_popular_taste_desc: "Die Bevölkerung jeder Nation hat einen #b Geschmack#! für ein bestimmtes [concept_manzoni_genre]. Ungefähr alle 10 Jahre ändert sich dieser #b Geschmack#! abhängig von politischen, sozialen und kulturellen Veränderungen im Land selbst.\nEin [Concept('concept_manzoni_writer','$concept_manzoni_writers$')], der ein #b Genre#! hat, das dem #b Geschmack#! entspricht oder diesem nahe kommt, erhalten mehr [concept_artists_experience] und schreiben mehr [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')].\n\n#V Verwandte Geschmäcker:#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$"
 concept_manzoni_book_licence: "Buchlizenz"
 concept_manzoni_book_licences: "Buchlizenzen"
 concept_manzoni_book_licence_desc: "Ausländische Verlage können mit einem [Concept('concept_manzoni_national_writer','Nationalen Schriftsteller')] Verträge abschließen und seine Bücher als Übersetzungen im eigenen Markt anbieten. Dies geschieht, wenn ein Autor den [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] im Ausland trifft. Erhält ein Autor mindestens fünf Buchlizenzen, gelten seine Bücher als Weltliteratur. Anschließend kann er auf Lesetour gehen."
 concept_manzoni_local_writers: "Lokale Schriftsteller"
 concept_manzoni_library: "Nationalbibliothek"
 concept_manzoni_library_desc: "Ihre #b Nationalbibliothek#! richtet automatisch Buchsammlungen (in Form eines [concept_production_method]) ein, wenn Sie über genügend [concept_manzoni_publications] verfügen. Die erste Buchsammlung wird ab 1.000 Publikationen angelegt. Von dort aus sind bessere Sammlungen möglich mit 2.500 (Kleine Büchersammlung), 5.000 (Kleine Büchersammlung), 10.000 (Mittlere Büchersammlung), 25.000 (Große Büchersammlung), 50.000 (Exzellente Büchersammlung) und 100.000 (Ausgezeichnete Büchersammlung)."
 concept_manzoni_publications: "Veröffentlichungen"
 concept_manzoni_publications_desc: "#b Veröffentlichungen#! umfassen alle neu veröffentlichten Buchtitel, Zeitungen, Essays und andere ähnliche schriftliche Produkte in einem Land. Sie stimmen nicht mit den @manzoni_prints! $manzoni_prints$ überein, die als Waren zirkulieren. Publikationen können auch unabhängig von der Verlagsbranche erscheinen, beispielsweise über die hauseigenen Druckereien von Regierungsgebäuden oder Universitäten. Auch Wissenschaftler und Privatpersonen produzieren je nach Alphabetisierungsniveau Publikationen. Der Löwenanteil entfällt jedoch auf die Verlagsbranche und entscheidend ist, ob eine moderne Produktionsmethode zum Einsatz kommt oder nicht. Eine große Anzahl an Veröffentlichungen ist für den Ausbau der [concept_manzoni_library] von grundlegender Bedeutung."
 concept_curtiss_tourism: "Tourismus"
 concept_curtiss_tourism_desc: "Der Tourismus verschafft einer kulturell hochstehenden Nation ein zusätzliches Einkommen. Einzigartige Denkmäler, Museen und Kunstgalerien, archäologische Stätten, Kunstzentren sowie ein hoher Wert der verschiedenen kulturellen Traditionen sind Faktoren, die ein Land zu einem attraktiven Reiseziel machen. Gesetze, die die Freizügigkeit und die wirtschaftliche Tätigkeit fördern, tragen ebenfalls zu höheren Einnahmen aus dem Tourismus bei. Auch die Infrastruktur spielt eine entscheidende Rolle - schließlich können abgelegene Orte nicht erreicht werden. Vor allem ein Flughafen revolutioniert den Tourismus und sorgt für eine deutliche Steigerung der Einnahmen."
 concept_curtiss_private_airline: "Private Fluggesellschaft"
 concept_mendelejew_chemist: "#b #ORANGE Chemiker#!#!"
 concept_manzoni_literature: "Literarische Kultur"
 concept_manzoni_literature_desc: "#b Literarische Kultur#! ist eines der Hauptmerkmale von [concept_morgenroete]. Die Druckkultur und insbesondere die Zeitungskultur erlebten im 19. und 20. Jahrhundert bedeutende Umwälzungen. Die Masse der Druckerzeugnisse und des alltäglichen Gebrauchs wird durch die Druckindustrie repräsentiert. Der kulturelle Wert der produzierten Literatur spiegelt sich in der [concept_manzoni_literary_tradition] wider. Letzteres hängt weitgehend von [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] eines Landes ab. Es gibt [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')] und [Concept('concept_manzoni_national_writer','$concept_manzoni_national_writers$')]. Ob sie im Schatten leben oder zu gefeierten Schriftstellern werden, hängt vom [concept_manzoni_popular_taste] ab."
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor#! ist eine Mod, die entwickelt wurde, um die kulturellen und wissenschaftlichen Aspekte von Victoria 3 zu erweitern. Sie enthält Inhalte zu verschiedenen Aspekten des viktorianischen Zeitalters:\n\n#V Lepsius:#! [concept_lepsius_archaeology]\n#V Verrier:#! [concept_verrier_astronomy]\n#V Gaudi:#! [concept_elgar_architecture] & [concept_tesla_engineering]\n#V Dubois:#! [concept_dubois_natural_history]\n#V Mendelejew:#! [concept_mendelejew_chemistry]\n#V Elgar:#! [concept_elgar_music]\n#V Manzoni:#! [concept_manzoni_literature]\n#V Klimt:#! [concept_klimt_painting_culture]\n#V Curtiss:#! [concept_curtiss_aviation]\n#V Vikelas:#! [concept_vikelas_sports]"
 concept_agassiz_mineral: "Mineral"
 concept_agassiz_minerals: "Mineralien"
 concept_agassiz_mineral_desc: "Mineralien sind alle Arten von besonderen Gesteinsarten, die nicht unter die bekannten, in der Industrie verwendeten Ressourcen fallen. Eine Nation erhält jährlich eine bestimmte Anzahl von Mineralien, wenn sie die Technologie #b Geologie#! erforscht hat. Wenn [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] im Dienste dieser Nation steht, kann er zusätzliche Mineralien finden. Standorte von Mineralien werden durch Staatsmodifikatoren charakterisiert: Berge, Wüsten, arktische Gebiete, Rohstoffvorkommen (z.B. Kohle-, Eisen- und Schwefelgebiete) sowie geologische [Concept('concept_dubois_formation','$concept_dubois_formations$')] und Vulkane. Wüsten und arktische Gebiete gelten als arm an Mineralien, während große geologische Formationen und Vulkane als besonders reich an Mineralien gelten. Eine besonders wertvolle Form von Mineralien sind [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 concept_agassiz_rare_mineral: "Seltenes Mineral"
 concept_agassiz_rare_minerals: "Seltene Mineralien"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] können auf ihren Expeditionen, wie z. B. [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [Concept('concept_douglas_mountaineering','Bergsteiger')]-Expeditionen, [concept_agassiz_volcano]-Expeditionen oder beim Schürfen von Mineralien, seltene Mineralien finden. Im Gegensatz zu gewöhnlichen [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] werden sie nur in sehr begrenzten Mengen gefunden. Seltene Mineralien werden für den Bau eines Mineralienkabinetts verwendet."
 concept_agassiz_geologist: "#b #GREEN Geologe#!#!"
 concept_agassiz_geologists: "#b #GREEN Geologen#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologen#!#! sind [Concept('concept_academics_academic','$concept_academics_academics$')], die hauptsächlich Gesteine und die Erdgeschichte untersuchen. Sie lokalisieren [Concept('concept_lepsius_cave','$concept_lepsius_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] und [Concept('concept_curie_uranium','$concept_curie_uranium$')]lagerstätte, was sie zu unersetzlichen Kollegen für [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] und [Concept('concept_curie_physicist','$concept_curie_physicists$')] macht. Während ihrer Expeditionen können sie zusätzliche [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] finden, die ein [concept_mendelejew_chemist] zur Entdeckung oder Isolierung von [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] nutzen kann. Sie können neue Rohstoffvorkommen finden. Sie sind auch als Vulkanologen tätig und können auf Expeditionen zu lokalen [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] gehen, um diese genauer zu erforschen. Zusammen mit [Concept('concept_tesla_engineer','#b #ORANGE Ingenieuren#!#!')] können sie neue Geräte, wie z. B. Seismographen, entwickeln, um mehr über das Innere der Erde zu erfahren. Geologen können an [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] und [Concept('concept_douglas_mountaineering','Bergsteiger')]-Expeditionen teilnehmen."
 concept_agassiz_volcano: "Vulkan"
 concept_agassiz_volcanoes: "Vulkane"
 concept_curie_physicist: "#b #ORANGE Physiker#!#!"
 concept_curie_physicists: "#b #ORANGE Physiker#!#!"
 concept_curie_physicist_desc: "#n Demnächst bei Morgenröte!#!"
 concept_curie_uranium: "Uran"
 concept_curie_uranium_desc: "Uran ist ein extrem seltenes Material, das nur in wenigen ausgewählten, historischen Provinzen von [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] gefunden werden kann. Die moderne Physik muss dafür erforscht worden sein. Auf den ersten Blick ist Uran ein sekundäres Erz, das nur in der Keramikproduktion verwendet wird. Es wird aber später gebraucht, vor allem im [concept_verrier_observatory]. Nur wenn die besten physikalischen und chemischen Produktionsmethoden mit Uran versorgt werden, können sie ihren Zweck erfüllen, sei es auf dem Gebiet der Kernphysik oder bei der Erforschung bisher unbekannter Elemente. Ohne Uran sind alle wissenschaftlichen Aktivitäten auf dem Gebiet der Radioaktivität schlicht unmöglich. Daher ist es für [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] und [Concept('concept_curie_physicist','$concept_curie_physicists$')] in der letzten Phase von Victoria 3 besonders interessant."
 concept_mendelejew_chemistry: "Chemie"
 concept_mendelejew_chemistry_desc: "#b Chemie#! ist eines der Hauptinhalte von [concept_morgenroete]. Ab dem 18. Jahrhundert entwickelte sich die #b Chemie#! rasch zu einer modernen Wissenschaft. Plötzlich wurden viele neue Elemente entdeckt und chemische Verfahren erfunden. Im 19. und 20. Jahrhundert gab es noch mehr Entdeckungen in der Chemie, von neuen Elementen bis hin zur Erfindung des Dynamits oder des Haber-Bosch-Verfahrens.\n\nIn #b Morgenröte#! wird #b Chemie#! von [Concept('concept_mendelejew_chemist','#b #ORANGE Chemikern#!#!')] durchgeführt, die sich auf verschiedene Aufgaben konzentrieren können.\nEin Schwerpunkt ist die Verbesserung von #b $building_chemical_plant$#!, #b $building_explosives_factory$#! oder #b $building_synthetics_plant$#! Ihres Landes, was diese [Concept('concept_building', '$concept_buildings$')] effizienter macht.\nWenn Sie nach einer prestigeträchtigeren Aufgabe suchen, können Sie Ihren #b Chemiker#! [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] theoretisieren, entdecken oder isolieren lassen. Jedes Element fügt ein wenig [concept_prestige] hinzu, je nachdem, ob Sie es theoretisiert, entdeckt oder isoliert haben.\nSpäter im Spiel wird der #b Chemiker#! auch in der Lage sein, #b Synthetisches Öl#! und #b Synthetisches Gummi#! zu erfinden. Dies schaltet die #b $building_mendelejew_hydrogenation_plants$#! und die #b $building_mendelejew_synthetic_rubber_factory$#! frei."
 concept_mendelejew_chemists: "#b #ORANGE Chemiker#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE Chemiker#!#! sind [Concept('concept_academics_academic','$concept_academics_academics$')], die [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')], theoretisieren, entdecken und isolieren.\n#b #ORANGE Chemiker#!#! sammeln [concept_academics_experience], wenn sie #b Elemente#! erforschen oder an Konferenzen teilnehmen. Sie können auch Düngemittel, Sprengstoffe und Kunststoffe verbessern. Chemiker können das Periodensystem oder synthetischen Treibstoff erfinden, was sie für Länder ohne Zugang zu Öl wertvoll macht. Sie erhalten zudem jedes Jahr passiv #b Erfahrung#!. Dadurch können #b #ORANGE Chemiker#!#! bessere Chemiker-Eigenschaften erhalten. Sie können auch eine Spezialisierung (Theoretiker, Analytiker, Inspektor) erhalten, wenn sie erschaffen werden oder durch ein Ereignis."
 concept_mendelejew_element: "Chemisches Element"
 concept_mendelejew_element_no_chemical: "Element"
 concept_mendelejew_elements: "Chemische Elemente"
 concept_mendelejew_element_desc: "In der Antike war es üblich zu glauben, dass die Welt aus vier Elementen besteht: Feuer, Erde, Wasser und Luft. Mit dem Beginn der Emanzipation der Chemie von der Alchemie kam es zur wissenschaftlichen Analyse der chemischen Elemente. Dieser Prozess war im 19. Jahrhundert noch lange nicht abgeschlossen.\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] können diese Forschung fortsetzen, indem sie Elemente theoretisieren, entdecken und eines nach dem anderen isolieren. Erst wenn ein Element isoliert ist, gilt es als vollständig anerkannt und erhält seinen Namen; vorher ist es nur eine Nummer. Die Kategorisierung der Elemente bringt wissenschaftlichen Fortschritt und Chemiker [concept_academics_experience].\nNicht alle Elemente können von Anfang an theoretisiert, entdeckt und isoliert werden.\nVoraussetzung ist, dass das chemische Labor im [concept_verrier_observatory] über eine entsprechende Ausstattung verfügt, in manchen Fällen auch über ein Institut für moderne Physik. Viele Elemente können nur mit Spektrografie richtig erforscht werden; gegen Ende des Spiels kann ein Zyklotron notwendig sein. Für die Entdeckung und Isolierung von chemischen Elementen sind [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] notwendig. Neben den Produktionsmethoden spielen auch die Erfahrung und die Charaktereigenschaften des Chemikers eine entscheidende Rolle für die Dauer der Forschung.\n\nDie entdeckten Elemente sind Voraussetzung für die Entwicklung des Periodensystems und die Organisation des Chemiekongresses."
 concept_verrier_meteorite: "Meteorit"
 concept_verrier_meteorites: "Meteoriten"
 concept_manzoni_national_writers: "Nationale Schriftsteller"
 concept_verrier_astronomy_desc: "#b Astronomie#! ist eine der Hauptinhalte von [concept_morgenroete].\n\nUm Zugang zu #b Astronomie#! zu erhalten, benötigen Sie ein [concept_verrier_observatory] oder einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].\n\nWenn Sie ein Observatorium haben, werden Sie passiv [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdecken.\n\nWenn du einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] hast, kannst du sogar neue Planeten, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] finden und [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')] aufnehmen.\nManchmal findet Ihr [concept_agassiz_geologist] auch [Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')], die vom #b Astronomen#! und vom [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] untersucht werden können.\n\nJede astronomische Entdeckung gewährt Ihnen [concept_verrier_astronomical_prestige], wodurch Ihr [concept_prestige] erhöht wird. Überprüfe den $verrier_astronomical_prestige_modifier$ [concept_modifier] um Ihr #b Astronomisches Prestige#! zu sehen."
 concept_verrier_observatory_desc: "Ein #b Observatorium#! ist das Rückgrat des [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] und des [Concept('concept_mendelejew_chemist','#b #ORANGE Chemikers#!#!')] eines Landes. Von dort aus können [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] Planeten, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] und [Concept('concept_verrier_comet','$concept_verrier_comets$')] entdecken und sie nehmen [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')] auf.\nUm ein #b Observatorium#! zu bauen, musst du eine Universität haben und entweder $verrier_astronomy_tech$ oder $verrier_chemistry_tech$ erforscht haben. Außerdem kann ein #b Observatorium#! nur einmal und nur in der eigenen Hauptstadt gebaut werden."
 concept_verrier_astronomer_desc: "#b Astronomen#! sind Akademiker, die den Himmel erforschen und [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] und [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] entdecken.\n#b Astronomen#! erhalten [concept_academics_experience], wenn sie #b Astronomische Objekte#! entdecken oder Konferenzen besuchen. Sie erhalten außerdem jedes Jahr passiv #b Erfahrung#!. Dadurch können #b Astronomen#! bessere Astronomeneigenschaften erlangen.\n\nEin #b Astronom#! kann sich auf die Entdeckung neuer #b Satelliten#! oder #b Mondfotos#! konzentrieren. Dadurch verringert sich jedoch die Anzahl der entdeckten #b Astronomischen Objekte#!"
 concept_verrier_astronomical_prestige: "Astronomisches Prestige"
 concept_verrier_astronomical_prestige_desc: "#b Astronomisches Prestige#! ist der Betrag an [concept_prestige], den Sie durch Astronomie erhalten. Verschiedene Faktoren beeinflussen Ihr #b Astronomisches Prestige#!:\n- Das Finden eines neuen Planeten gewährt Ihnen zwischen #V 15#! und #V 100#! Prestige, abhängig von der Schwierigkeit, ihn zu finden.\n- Jeder entdeckte [concept_verrier_satellite] gewährt Ihnen 10 Prestige.\n- Eine vollständiges [Concept('concept_verrier_moon_photo','$concept_verrier_moon_map$')] gewährt Ihnen #V 25#! Prestige.\n- Ein großer Komet gewährt Ihnen 10 Prestige.\n- Jeder [concept_verrier_meteorite] gewährt Ihnen #V 1#! Prestige.\n- #V 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] gewähren Ihnen jeweils #V 1#! Prestige."
 concept_verrier_astronomical_object_desc: "#b Astronomische Objekte#! sind Asteroiden und Sterne, die Sie entdeckt haben. Diese Objekte können entdeckt werden, wenn Sie ein [concept_verrier_observatory] haben. Je besser Ihre Astronomietechnologie ist, desto mehr Objekte werden Sie finden. Sie werden auch mehr #b Objekte#! entdecken, wenn Sie einen [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] haben.\nMit genügend #b Astronomischen Objekten#! können Sie neue Planeten oder die Astrophysiktechnologie entdecken."
 concept_verrier_moon_map: "Mondkarte"
 concept_verrier_moon_photo_desc: "Wenn Sie ein [concept_verrier_observatory] haben und die Kameratechnologie erforscht haben, können Sie Ihren [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] anweisen, den Mond zu fotografieren. Dadurch verringert sich die jährliche Anzahl der entdeckten [Concept('concept_verrier_astronomical_object','Astronomischen Objekten')] Ihres #b Astronomen#!. Sie erhalten jedoch jedes Jahr #b Mondfotos#!.\nWenn Sie genügend #b Mondfotos#! sammeln, erstellen Sie eine genaue Karte des Erdbegleiters. Wenn Sie die Mondkarte vervollständigen, erhält Ihre Nation [concept_verrier_astronomical_prestige]."
 concept_verrier_satellite: "Satellit"
 concept_verrier_satellites: "Satelliten"
 concept_verrier_satellite_desc: "#b Satelliten#! oder Monde sind [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], die einen Planeten umkreisen. Einige #b Satelliten#! wie der Mond der Erde wurden bereits entdeckt, aber ein [concept_verrier_astronomer] kann versuchen, mehr davon zu finden.\nJeder von Ihrem Land entdeckte #b Satellit#! gewährt Ihnen eine kleine Menge [concept_verrier_astronomical_prestige]."
 concept_verrier_meteorite_desc: "Meteoriten sind relativ kleine Festkörper kosmischen Ursprungs, die die Erdatmosphäre durchquert und die Erdoberfläche erreicht haben. In seltenen Fällen können Meteoritenfragmente nach einem Meteoritenschauer gefunden werden. Meteoriten, die vor Tausenden von Jahren auf die Erde gefallen sind, können von [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] auch in schwierigem Gelände wie Wüsten und arktischen Gebieten gefunden werden. Insbesondere [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] und [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] sind an Meteoriten interessiert und möchten diese möglicherweise analysieren.\n\nZusätzlich helfen #b Meteoriten#!, Ihre [concept_agassiz_geological_score] zu erhöhen und eine bessere Schätzung des [concept_agassiz_age_of_earth] zu ermöglichen."
 concept_agassiz_volcano_desc: "#b Vulkane#! sind eine neue Staatseigenschaft in #r Morgenröte#!. Anders als im Grundspiel für Victoria 3 sind es nicht strategische Regionen, sondern Staaten mit Vulkanen, an die gebunden ist, ob ein Vulkanausbruch stattfindet. Die vulkanische Aktivität ist deutlich größer, aber nicht immer zerstörerisch. In Ländern mit Vulkanen kann ein #b $building_agassiz_volcano_observatory$#! errichtet werden, der nicht nur hilft, Ausbrüche durch Beobachtungen vorherzusagen und abzumildern, sondern auch Ausgangspunkt für eine Vulkanexpedition ist. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] können auf einer Vulkanexpedition neues [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], Erfahrung sammeln und die Eigenschaft Vulkanologe erwerben."
 concept_agassiz_geological_knowledge: "Geologisches Wissen"
 concept_agassiz_geological_knowledge_desc: "#b Geologisches Wissen#! umfasst das allgemeine Verständnis einer Nation über die Natur der Erde. Es ist eine sehr seltene Ressource, die vor allem im Laufe geologischer Meilensteine ​​erworben werden kann. #b Geologisches Wissen#! ist nicht dasselbe wie die [concept_agassiz_geological_score], aber es ist dessen wichtigster Bestandteil und wird als besonders wertvoll angesehen."
 concept_agassiz_geological_score: "Geologische Punktzahl"
 concept_agassiz_geological_score_desc: "Die #b Geologische Punktzahl#! umfasst alle Errungenschaften und Kenntnisse einer Nation, die mit Geologie zu tun haben. Die wichtigste Komponente ist [concept_agassiz_geological_knowledge], aber es gibt noch viele andere wichtige Faktoren, wie die Erfahrung eines [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [concept_agassiz_oceanographic_knowledge], die Anzahl der [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] oder [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] und geologische Technologien. Die Geologische Punktzahl ist entscheidend für die Neudatierung des [concept_agassiz_age_of_earth]."
 concept_agassiz_oceanographic_knowledge: "Ozeanographisches Wissen"
 concept_agassiz_oceanographic_knowledge_desc: "#b Ozeanographisches Wissen#! ist Bestandteil des [Concept('concept_agassiz_geological_knowledge','Geologischen Wissens')] und entspricht Kenntnissen über die Meere, insbesondere Meeresströmungen, aber auch allgemeine Meeresforschung kombiniert mit geophysikalischen Betrachtungen. #b Ozeanographisches Wissen#! wird im Wesentlichen auf der Grundlage von [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] erworben. 50 #b Ozeanographisches Wissen#! Ist Voraussetzung für den Erwerb von [Concept('concept_agassiz_geological_knowledge','Geologischen Wissens')]."
 concept_agassiz_age_of_earth: "Alter der Erde"
 concept_agassiz_age_of_earth_desc: "Eine der großen Fragen des 19. Jahrhunderts war die Frage nach dem #b Alter der Erde#!. Sie hatte naturgeschichtliche Implikationen, insbesondere hinsichtlich der Gültigkeit der Evolutionstheorie und der Abfolge geologischer Ereignisse. Nur ein [concept_agassiz_geologist] kann ein neues Erdalter bestimmen. Dazu muss seine Nation eine höhere [concept_agassiz_geological_score] aufweisen als die Nation, die zuletzt ein Erdalter bestimmt hat. Seine Forschungsergebnisse wird er dann mit anderen Kollegen teilen. Dabei muss er nicht unbedingt Erfolg haben – zu junge und unerfahrene Geologen finden kein Gehör. Allerdings sind fremde Nationen etwas entgegenkommender, wenn über viele Jahre keine neue Theorie vorgelegt wurde. Geologen können nur einmal in ihrem Leben das Alter der Erde schätzen – dies gilt allerdings auch nur, wenn sie erfolgreich sind. Bei Misserfolg kann man es nach einer Phase der Motivation erneut versuchen."
 concept_agassiz_geology: "Geologie"
 concept_agassiz_geology_desc: "#b Geologie#! ist eines der Hauptmerkmale von [concept_morgenroete]. Schon vor Beginn des Viktorianischen Zeitalters erlebte die Geologie einen bedeutenden Aufschwung, weshalb sie vielen Nationen zu Beginn des Spiels zur Verfügung steht. \n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] können auf verschiedene Weise verwendet werden: sie können bei einer geologischen Suche [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] und [concept_curie_uranium] Lagerstätten finden, auf [concept_agassiz_volcano] Expeditionen gehen, das [concept_agassiz_age_of_earth] bestimmen, neue Erz- und Ölvorkommen finden oder als nützliche wissenschaftliche Begleiter auf [concept_dubois_pacific_expedition] und [Concept('concept_douglas_mountaineering','Bergsteiger')]-Expeditionen gehen. Die [concept_agassiz_geological_score] bewertet das gesamte Wissen einer Nation und ist entscheidend für die Bestimmung des Alters der Erde. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] und [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] sind ein wesentlicher Bestandteil der Geologie; mit letzterem kann im [concept_dubois_zoo] ein Mineralienkabinett eingerichtet werden. Eine besondere geologische Einrichtung ist das #b $building_agassiz_volcano_observatory$#!, in dem vulkanologische und seismische Studien durchgeführt werden."
 concept_theiler_biologist: "#b #GREEN Biologe#!#!"
 concept_theiler_biologists: "#b #GREEN Biologen#!#!"
 concept_theiler_biologist_desc: "Ein Biologe ist ein [concept_academics_academic], der alle Aspekte des Lebens erforscht.\nIn [concept_morgenroete] ist der Biologe hauptsächlich für die Erforschung von [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], die Verbesserung Ihrer Landwirtschaft und die Suche nach [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] und [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] verantwortlich.\nBiologen sammeln [concept_academics_experience] passiv oder durch den Abschluss von Projekten."
 concept_gaudi_architect: "#b #PURPLE Architekt#!#!"
 concept_gaudi_architects: "#b #PURPLE Architekten#!#!"
 concept_academics_university_specialization_desc: "Jede Universität kann durch Änderung ihrer Produktionsmethode spezialisiert werden.\nEine Universität mit [concept_pm_academics_university_humanities] ermöglicht es Ihnen, die Forschung Ihres Landes auf gesellschaftliche Innovation zu konzentrieren und gezielt [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] und [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] zu rekrutieren.\nEine Universität mit [concept_pm_academics_university_natural_history] ermöglicht es Ihnen, die Forschung Ihres Landes auf gesellschaftliche Innovation zu konzentrieren und gezielt [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] und [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] zu rekrutieren.\nEine Universität mit [concept_pm_academics_university_mathematics] ermöglicht es Ihnen, die Forschung Ihres Landes auf Produktion und militärische Innovation zu konzentrieren und gezielt [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] oder [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] zu rekrutieren.\nEine Änderung der Spezialisierung hat einen #n kurzfristigen negativen Effekt#! für das Gebäude und Ihren [concept_academics_progress].\nSpezialisierte Universitäten können auch verschiedene Projekte beeinflussen. Universitäten mit $concept_pm_academics_university_mathematics$ helfen zum Beispiel bei Ingenieurprojekten."
 concept_pm_academics_university_humanities_desc: "Ein Humanwissenschaftlich-anthropologischer Schwerpunkt spezialisiert die Universität und ermöglicht eine nationale Fokussierung auf Gesellschaftsforschung und die gezielte Rekrutierung von [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] und [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Universität sowie einen #n negativen Effekt#! auf Ihr [concept_academics_progress], wenn Sie diese Produktionsmethode ändern.\nDie Spezialisierung Ihrer Universitäten mit dem geisteswissenschaftlich-anthropologischen Schwerpunkt gibt Ihnen einen Bonus auf die Erfolgschance von Expeditionen (maximal +4, was 40 Spezialisierungsstufen erfordert) und verbessert den Fortschritt bei einigen anderen Projekten."
 concept_pm_academics_university_natural_history_desc: "Ein naturgeschichtlicher Schwerpunkt spezialisiert die Universität und ermöglicht eine nationale Fokussierung auf Gesellschaftsforschung und die gezielte Rekrutierung von [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')], [Concept('concept_dubois_biologist','$concept_dubois_biologists$')] und [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]. Sie erhalten einen #n negativen Durchsatzmodifikator#! für die Universität sowie einen #n negativen Effekt#! auf Ihr [concept_academics_progress], wenn Sie diese Produktionsmethode ändern.\nDie Spezialisierung Ihrer Universitäten mit dem naturhistorischen Schwerpunkt bringt Ihnen einen Bonus für verschiedene Projekte Ihrer Naturwissenschaftler."
 concept_pm_academics_university_mathematics_desc: "Der mathematisch-technische Schwerpunkt spezialisiert die Universität und ermöglicht eine nationale Fokussierung auf Produktion und militärische Forschung sowie die gezielte Rekrutierung von [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] oder [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. Sie erhalten vorübergehend einen #n negativen Durchsatzmodifikator#! für die Universität sowie einen #n negativen Effekt#! auf Ihr [concept_academics_progress], wenn Sie diese Produktionsmethode ändern.\nDie Spezialisierung Ihrer Universitäten mit dem mathematisch-technischen Schwerpunkt bringt Ihnen einen Bonus auf verschiedene Projekte Ihres [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] und [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]."
 concept_panum_physician: "#b #BLUE Arzt#!#!"
 concept_panum_physicians: "#b #BLUE Ärzte#!#!"
 concept_panum_physician_desc: "#b #BLUE Ärzte#!#! sind [Concept('concept_academics_academic','$concept_academics_academics$')], die im Bereich [concept_panum_medicine] arbeiten und forschen. Ihre Hauptaufgabe besteht darin, [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] zu schreiben und [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] zu finden. Sie können auch die medizinische Forschung verbessern, die Gesundheitsversorgung verbessern und andere Charaktere heilen.\nÄrzte erhalten während ihrer Arbeit und passiv jedes Jahr [concept_academics_experience]. Sie können bessere Stufen der Arzteigenschaft erreichen, indem sie genügend #b Erfahrung#! sammeln."
 concept_panum_medicine: "Medizin"
 concept_panum_medicine_desc: "Die Medizin ist eine der größten Erweiterungen von [concept_morgenroete] für Victoria 3. Einer der Schwerpunkte liegt auf epidemischen [Concept('concept_panum_disease','$concept_panum_diseases$')] wie Cholera, Tuberkulose und Typhus, die die Menschheit seit Jahrhunderten heimsuchen und dank wissenschaftlicher Fortschritte endlich unter Kontrolle gebracht werden konnten. Epidemische Krankheiten sind daher eines der negativen Ereignisse in [concept_morgenroete]. Die Eindämmung durch die Suche nach einer [concept_panum_disease_treatment] ist daher umso wichtiger. Ein zentraler Bestandteil der Medizin ist daher ein [concept_panum_physician], der zu den Wissenschaftlern des anthropologisch-humanistischen Schwerpunkts der Universität gehört. Er kann epidemische Krankheiten beschreiben und Behandlungsmethoden finden. Eine Behandlungsmethode erfordert in der Regel eine [concept_panum_disease_description] und eine Technologie. Ein Arzt kann auch die Forschung im Bereich der Medizintechnik verbessern oder die Gesundheitsversorgung durch Krankenhäuser ausbauen sowie neue medizinische Techniken einführen und andere Charaktere heilen. Medizinische Konferenzen tragen dazu bei, medizinisches Wissen international zu verbreiten. Ein wichtiger Schritt in der Modernisierung der Medizin ist auch der Übergang von der Miasma-Theorie zur [concept_panum_germ_theory]. Eine Nation, die bei medizinischen Entdeckungen führend ist, kann auch ein hohes [concept_panum_medical_prestige] aufweisen."
 concept_panum_disease: "Krankheit"
 concept_panum_diseases: "Krankheiten"
 concept_panum_disease_desc: "Unter dem Begriff Krankheit versteht man meist epidemische Krankheiten, die alle paar Jahre ein Land heimsuchen können. Ein [concept_panum_physician] kann ihnen entgegenwirken, indem er [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] macht und [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] bereitstellt. Epidemische Krankheiten treten meist nicht gleichzeitig auf und es dauert einige Zeit, bis epidemische Krankheiten erneut ausbrechen. Je nach Art können epidemische Krankheiten verheerende Auswirkungen haben und sich über mehrere Staaten ausbreiten. Es gibt verschiedene Methoden der [concept_panum_disease_prevention], die den Ausbruch einer solchen Krankheit zu verzögern oder ihre Auswirkungen zu mildern. Die Auslöser einer Krankheit können sehr unterschiedlich sein. Gelbfieber tritt nur in tropischen Regionen auf und Cholera und Tuberkulose erfordern ein Mindestmaß an Urbanisierung, um eine Wirkung zu erzielen. Auch der Lebensstandard und der Verwüstungsgrad eines Staates spielen eine Rolle.\n\nNeben diesen besonders gefürchteten epidemischen Krankheiten gibt es auch alltägliche Krankheiten, die ein Arzt bei medizinischen Untersuchungen stichprobenartig untersuchen kann. Zu solchen Krankheiten gehören Rachitis, Pellagra und Syphilis."
 concept_panum_disease_description: "Krankheitsbeschreibung"
 concept_panum_disease_descriptions: "Krankheitsbeschreibungen"
 concept_panum_disease_description_desc: "Beschreibungen sind der erste Schritt zum Verständnis eines [concept_panum_disease]. Sie haben keinen Einfluss auf die Schwere einer Epidemie, sind aber grundlegend für das Finden von [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] und [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Krankheitsbeschreibungen haben keine weiteren Anforderungen: Alles, was benötigt wird, ist eine epidemische Krankheit und ein [concept_panum_physician]."
 concept_panum_disease_treatment: "Krankheitsbehandlung"
 concept_panum_disease_treatments: "Krankheitsbehandlungen"
 concept_panum_disease_treatment_desc: "Ein [concept_panum_physician] kann, die richtige Technologie und eine [concept_panum_disease_description] vorausgesetzt, in einem langwierigen Prozess eine Behandlung für eine [concept_panum_disease] finden. Behandlungen sind nicht dasselbe wie eine Heilung. Vielmehr findet der Arzt die Ursache einer Krankheit heraus und entwickelt auf dieser Grundlage Methoden, um einen Ausbruch zu verhindern oder deutlich einzudämmen. Krankheitsbehandlungen begrenzen die Dauer einer epidemischen Krankheit auf wenige Monate oder Wochen und verhindern zudem, dass sie sich auf mehrere Staaten ausbreitet. Krankheitsbehandlungen sind Teil möglicher [concept_panum_disease_prevention] gegen epidemische Ausbrüche."
 concept_panum_disease_prevention: "Krankheitsprävention"
 concept_panum_disease_prevention_no_disease: "Prävention"
 concept_panum_disease_prevention_desc: "Es gibt verschiedene Möglichkeiten, eine episemische [concept_panum_disease] zu vermeiden oder zumindest abzuschwächen. Die bekannteste Methode ist die von einem [concept_panum_physician] entwickelte [concept_panum_disease_treatment]. Sie verkürzt die Zeit, in der eine Krankheit wütet, erheblich und verringert auch die Wahrscheinlichkeit, dass sie sich auf ein anderes Land ausbreitet. Lebensstandard, Krankenhäuser, Technologien und ein hohes Niveau der Gesundheitseinrichtungen haben ebenfalls einen Einfluss. Die ultimative Prävention ist eine [concept_theiler_vaccine], die verhindert, dass eine Krankheit überhaupt auftritt. Impfstoffe werden von [Concept('concept_theiler_biologist','$concept_theiler_biologists$')] entwickelt. Sie ist jedoch nur wirksam, wenn die Gesundheitseinrichtung mindestens das in der medizinischen Fakultät festgelegte Niveau erreicht hat. Schließlich muss die Verteilung eines Impfstoffs organisiert und überwacht werden."
 concept_panum_disease_type: "Krankheitstyp"
 concept_panum_disease_types: "Krankheitstypen"
 concept_panum_disease_type_desc: "Epidemische [Concept('concept_panum_disease','$concept_panum_diseases$')] können nach ihrem Verbreitungsgrad unterschieden werden. #V Lokale Krankheiten#!, wie beispielsweise Scharlach, sind auf den Staat beschränkt, in dem sie ausgebrochen sind. #V Regionale Krankheiten#!, wie beispielsweise Tuberkulose, können sich auf einige umliegende Staaten ausbreiten, jedoch nicht darüber hinaus. #V Überregionale Krankheiten#!, von denen die Cholera die berüchtigtste ist, können sich im ganzen Land ausbreiten, auch wenn die Staaten nicht aneinander grenzen."
 concept_panum_local_disease: "Lokale Krankheit"
 concept_panum_local_diseases: "Lokale Krankheiten"
 concept_panum_regional_disease: "Regionale Krankheit"
 concept_panum_regional_diseases: "Regionale Krankheiten"
 concept_panum_transregional_disease: "Überregionale Epidemie"
 concept_panum_transregional_diseases: "Überregionale Epidemie"
 concept_panum_germ_theory: "Keimtheorie"
 concept_panum_germ_theory_desc: "Die Keimtheorie ist einer der grundlegenden medizinischen wissenschaftlichen Fortschritte des 19. Jahrhunderts. Sie ersetzte frühere, archaischere Theorien wie die in Europa weit verbreitete Miasmentheorie und repräsentiert alle traditionellen Versuche, die Ursache von [Concept('concept_panum_disease','$concept_panum_diseases$')] zu erklären. Die Entdeckung der Keimtheorie kommt nicht nur dem ersten Entdecker zugute. Bei der Suche nach [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] sind die Erfolgschancen etwas höher, da sie einige negative Ereignisse verhindert und mehr positive Ereignisse freisetzt."
 concept_panum_medical_prestige: "Medizinisches Prestige"
 concept_panum_medical_prestige_desc: "Das medizinische Prestige setzt sich aus den bisher entdeckten [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 Punkte), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 Punkte), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 Punkte) und [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 Punkte) zusammen. Erste Entdeckungen geben doppelt so viele Punkte. Weiteres medizinisches Prestige kann durch die Heilung alltäglicher Krankheiten, die Erfindung spezieller Heilmethoden oder die allgemeine Verbesserung des Gesundheitswesens durch einen [concept_panum_physician] erlangt werden."
 concept_theiler_pathogen: "Erreger"
 concept_theiler_pathogens: "Krankheitserreger"
 concept_theiler_pathogen_desc: "Ein Pathogen ist die Bezeichnung für etwas, das eine [concept_panum_disease] verursacht. Dies kann alles Mögliche sein, von einem Organismus bis hin zu einem [concept_theiler_microorganism]. Oft handelt es sich um ein Bakterium, einen Parasiten oder ein Virus.\nEin Biologe, der Zugang zu einer ausreichenden Menge an Mikroorganismen hat, kann versuchen, das Pathogen zu finden, das eine Krankheit verursacht. Dies kann dazu beitragen, die Krankheit zu verhindern und einen [concept_theiler_vaccine] zu finden und herzustellen."
 concept_theiler_vaccine: "Impfstoff"
 concept_theiler_vaccines: "Impfungen"
 concept_theiler_vaccine_desc: "Die Entdeckung von Impfstoffen hat es den Menschen ermöglicht, gegen [Concept('concept_panum_disease','$concept_panum_diseases$')] immun zu werden, ohne daran zu erkranken, und kann potenziell Millionen von Menschenleben retten.\nUm einen Impfstoff herzustellen, muss ein [concept_theiler_biologist] zunächst den [concept_theiler_pathogen] finden, der eine Krankheit verursacht. Dann kann mit der Entwicklung eines Impfstoffs begonnen werden, wenn genügend [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] verfügbar sind."
 concept_panum_red_cross: "Rotes Kreuz"
 concept_panum_red_cross_desc: "Das Rote Kreuz ist eine der ersten internationalen Organisationen und bietet in seltenen Fällen die Möglichkeit, im Krieg Rotkreuz-Sanitäter zu erhalten. Rotkreuz-Mitglieder erhalten zudem bestimmte Boni. Je nach Spielregel kann das Rote Kreuz historisch oder dynamisch gegründet werden; anerkannte Staaten können unter bestimmten technologischen Voraussetzungen beitreten. Der Gründer erhält das Hauptquartier des Roten Kreuzes in seiner Hauptstadt. Mitglieder können bis zu drei völkerrechtlich verbindlichen [Concept('concept_panum_convention','Internationalen Konventionen')] beitreten."
 concept_panum_convention: "Internationale Konvention"
 concept_panum_conventions: "Internationale Konventionen"
 concept_panum_convention_desc: "Eine internationale Konvention ist eine gemeinsame Absichtserklärung von Staaten, bestimmte Spielregeln im internationalen Verkehr festzulegen. Beispiele hierfür gab es im Laufe des 19. Jahrhunderts mehrere, etwa die Genfer Konvention oder die Haager Landkriegsordnung. Allen Konventionen ist gemeinsam, dass sie versuchen, die Schrecken des Krieges zu mildern. Militärische Optionen werden daher einer sicheren medizinischen Versorgung der Verwundeten vorgezogen und ultimative Waffen werden verboten, was zu einer gewissen Eindämmung des Krieges führt. Der Vorteil ist eine höhere Flexibilität. Während die Annahme einer Konvention positiv gesehen wird, kann die Aufhebung einer Konvention zu internationalem Unmut führen.\n\nInternationale Konventionen sind in der Regel unverbindliche Absichtserklärungen. Unterzeichnen sie jedoch genügend Mitglieder des [Concept('concept_panum_red_cross','Roten Kreuzes')], wird sie mit der Zeit zu gültigem Völkerrecht, an das sich alle Unterzeichner halten müssen – und das auch die anderen Mitglieder unterzeichnen. Dies geschieht, wenn 65 Prozent aller Mitglieder und die Mehrheit der Großmächte dieser Konvention zustimmen – dann sind alle anderen Mitglieder gezwungen, sich daran zu halten. Dieses Übereinkommen kann dann nicht mehr wie gewohnt abgeschafft werden. Um bindende Übereinkommen zu vermeiden, ist ein vollständiger Austritt aus dem Roten Kreuz notwendig – mit allen Konsequenzen."
 concept_manzoni_literary_tradition_desc: "#b Literarische Tradition#! ist die Darstellung der literarischen Errungenschaften und Traditionen einer Nation.\nEs gibt verschiedene Möglichkeiten, #b Literarische Tradition#! zu erlangen. Wenn Sie mindestens eine $building_art_academy$, einen oder mehrere [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], einen [Concept('concept_manzoni_national_writer','Nationalen Schriftsteller')] und bestimmte [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] besitzen, wird Ihrem Land passiv #b Literarische Tradition#! hinzugefügt.\nJe mehr #b Literarische Tradition#! Ihre Nation erlangt, desto höher ist Ihr Prestigebonus. Außerdem können Sie damit [concept_elgar_expressionism]-[concept_artists_art_style] freischalten."
 concept_elgar_musical_tradition_desc: "#b Musikalische Tradition#! ist die Darstellung der musikalischen Errungenschaften und Traditionen einer Nation.\nEs gibt verschiedene Möglichkeiten, #b musikalische Tradition#! zu erlangen. Wenn Sie mindestens einen [Concept('concept_elgar_composer','$concept_elgar_composers$')] haben, erhalten Sie passiv #b musikalische Tradition#!. Je mehr #b Opern#! Sie haben, desto mehr bekommen Sie. Sie können auch mehr #b musikalische Tradition#! durch Musik- und Kunsttechnologien erhalten. Jede Technologie gibt einen anderen Bonus. Sie können #b musikalische Tradition#! auch durch Ereignisse erhalten, insbesondere wenn Sie einen [concept_elgar_composer]en haben.\nJe mehr #b musikalische Tradition#! Ihre Nation erlangt, desto höher ist Ihr Prestigebonus. Außerdem können Sie damit [concept_elgar_impressionism] [concept_artists_art_style] freischalten."
 concept_klimt_painting_tradition_desc: "#b Malerische Tradition#! ist eine Darstellung der Malerleistungen und -traditionen einer Nation. Sie kann durch den Besitz von #b Kunstakademien#!, einer [concept_klimt_painter], bestimmten [Concept('concept_technology', '$concept_technologies$')] oder durch Veranstaltungen erlangt werden.\n#b Malerische Tradition#! ermöglicht es Ihnen, den [concept_elgar_art_nouveau] [concept_artists_art_style] freizuschalten und wird zur Berechnung Ihrer #b Kulturtradition#! verwendet."
 concept_mendelejew_theorized_elements: "Theoretisierte Elemente"
 concept_mendelejew_discovered_elements: "Entdeckte Elemente"
 concept_mendelejew_isolated_elements: "Isolierte Elemente"
 concept_panum_psycho_point: "Psychotherapeutischer Punkt"
 concept_panum_psycho_points: "Psychotherapeutische Punkte"
 concept_panum_psycho_point_desc: "Psychotherapeutische Punkte sind eine abstrakte Währung, die den Fortschritt eines Landes auf dem Gebiet der Psychiatrie und Psychologie darstellen. Sie werden monatlich durch Technologien, eine Irrenanstalt oder einen [concept_panum_physician] mit der [concept_character_trait] #V Psychiater#! generiert. Psychotherapeutische Punkte können auch über Ereignisse erworben werden. Eine hohe Anzahl an psychotherapeutischen Punkten führt zu einer besseren Chance, Charaktere mit Geisteskrankheiten zu heilen. Das Erreichen einer psychotherapeutischen Stufe bringt auch Forschungsboni und [concept_academics_progress]. Eine bestimmte Anzahl von psychotherapeutischen Punkten ist Voraussetzung für die meisten psychologischen Schulen."
 concept_vikelas_mechanic: "Mechaniker"
 concept_vikelas_mechanic_desc: "LOREM IPSUM"
 concept_vikelas_mechanical_innovation: "Mechanische Innovation"
 concept_vikelas_race_car: "Rennwagen"
 concept_vikelas_race_car_desc: "LOREM IPSUM"
 concept_vikelas_race_car_reliability: "Zuverlässigkeit des Rennwagen"
 concept_vikelas_race_car_safety: "Sicherheit des Rennwagens"
 concept_vikelas_race_car_speed: "Rennwagengeschwindigkeit"
 concept_dubois_dinosaur_bone_no_dinosaur: "Knochen"
 concept_dubois_dinosaur_bones_no_dinosaur: "Knochen"
 concept_dubois_paleontological_expedition_desc: "Ein [concept_dubois_paleontologist] kann zu [Concept('concept_dubois_formation','$concept_dubois_formations$')] entsandt werden. Es dauert 1 Jahr und je nach Erfolg der Expedition erhält man [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. Wenn man über ein [concept_dubois_paleontological_team] verfügt, kann man am Ende einer Expedition eine [concept_dubois_paleontological_excavation] aufbauen. Dadurch erhält man passiv Knochen und Fossilien aus dieser Region.\nDer einfachste Weg Zugang zu einer Formation zu erhalten ist die Kontrolle eines entsprechenden Staats. Zugang zu einer Formation kann aber auch durch [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')] mit anderen Ländern ermöglicht werden."
 concept_dubois_paleontological_team: "Paläontologisches Team"
 concept_dubois_paleontological_teams: "Paläontologische Teams"
 concept_dubois_paleontological_team_desc: "Paläontologische Teams können nach Abschluss einer [concept_dubois_paleontological_expedition] eine [concept_dubois_paleontological_excavation] einrichten. Dadurch erhalten Sie passiv [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_dubois_paleontological_excavation: "Paläontologische Ausgrabung"
 concept_dubois_paleontological_excavations: "Paläontologische Ausgrabungen"
 concept_dubois_paleontological_excavation_desc: "Nach dem Ende einer [concept_dubois_paleontological_expedition] kann eine Paläontologische Ausgrabung aufgebaut werden, wenn ein freies [concept_dubois_paleontological_team] verfügbar ist. Eine Paläontologische Ausgrabung ermöglicht es, passiv [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] und [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] zu erhalten."
 concept_verrier_venus_transit: "Venus Transit"
 concept_verrier_venus_transit_desc: "Der Venustransit ist ein seltenes Ereignis, bei dem der Mond zwischen Erde und Venus vorbeizieht. Im 19. Jahrhundert fand er jedoch zweimal statt: 1874 und 1882. Da die Beobachtung des Venustransits Rückschlüsse auf die Größe des Sonnensystems und eine genauere Bestimmung der Größe der Astronomischen Einheit (AE) ermöglicht, waren dies bedeutende wissenschaftliche Ereignisse. Länder, die sich in der [concept_verrier_venus_transit_zone] befinden, können das Ereignis von dort aus beobachten; andere Länder müssen Expeditionen entsenden. Der Erfolg der Beobachtung hängt von der Erfahrung des [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')], der Verfügbarkeit eines [Concept('concept_tesla_engineer','#b #ORANGE Ingenieurs#!#!')] und einer Portion Glück ab: Manchmal kann das Wetter ein gutes Bild verhindern. Je besser die Beobachtung, desto größer die Prämie."
 concept_verrier_venus_transit_zone: "Venustranit-Zone"
 concept_verrier_venus_transit_zone_desc: "Die Venustransitzone bezieht sich auf den Teil der Erde, von dem aus ein vollständiger (und nicht nur teilweiser) Venustransit beobachtet werden kann. Im Jahr 1874 galt dies insbesondere für die ostasiatisch-pazifische Region und im Jahr 1882 für fast den gesamten amerikanischen Kontinent. Eine detaillierte Aufschlüsselung der strategischen Regionen findet sich im Folgenden.\n\n#V Venustransit 1874:#!\nIndonesien, Indochina, Ozeanien, Südchina, Nordchina, Mandschurei, Japan, Zentralindien, Madras, Bengalen, Himalaya; außerdem der Staat des Indischen Ozeans.\n\n#V Venus-Transit 1882:#!\nBrasilien, La Plata, Anden, Großkolumbien, Mexiko, Mittelamerika, Karibik, Mittlerer Westen, Südstaaten, Neuengland; außerdem die Staaten Ontario und Quebec."
 concept_vikelas_coach: "Coach"
 concept_vikelas_coaches: "Coaches"
 concept_vikelas_coach_desc: "Coaches sind die Nationaltrainer eines Landes in einer bestimmten nationalen Sportart. Zu den nationalen Sportarten gehören [concept_vikelas_football], Baseball, Basketball und Kricket. Coaches sorgen für Boni für die jeweilige Mannschaft bei Wettkämpfen - sei es bei internationalen Weltmeisterschaften oder bei Länderspielen. Letztere werden in regelmäßigen Abständen heimlich ausgetragen und erhöhen bei einem Sieg den Erfahrungswert des Coaches. Hohe Erfahrungspunkte und positive [Concept('concept_character_trait','$concept_character_traits$')] erhöhen die Chance, eine Weltmeisterschaft zu gewinnen. Positive Eigenschaften sind solche, die Spieler besonders motivieren - wie z. B. ehrgeizig oder charismatisch -, während demotivierende Eigenschaften die Chance auf einen Sieg verringern. Dazu gehören Eigenschaften wie rücksichtslos oder grausam.\n\n#R HINWEIS: Derzeit ist nur Fußball integriert.#!"
 concept_vikelas_football: "Fussball"
 concept_vikelas_football_desc: "Fußball ist ein möglicher Nationalsport. Die ersten Fußballvereine können in Europa und Südamerika gegründet werden; dies setzt ein relativ liberales Rechtssystem, ein starkes Kleinbürgertum oder einen beachtlichen durchschnittlichen Lebensstandard voraus. Danach könnten gelegentliche Fußballspiele ausgetragen werden. Mit der Gründung der FIFA werden auch internationale Spiele und die Fußballweltmeisterschaft möglich. Die acht besten Mannschaften sind automatisch für die Weltmeisterschaft qualifiziert. Die Mannschaften werden nach dem National Football Team Value (NFTV) berechnet, der sich aus den Parametern Lebensstandard (Fitness der Bevölkerung), Stärke des Kleinbürgertums (Vereinssystem), Bildung (Taktik) und Tradition (Nationalsport: ja oder nein?) ergibt. Bei Spielen wird nicht nur der NFTV berücksichtigt, sondern auch die Charaktereigenschaften und die Erfahrung des [Concept('concept_vikelas_coach','Coaches')]."
 concept_gaudi_architectural_splendour: "Architektonische Pracht"
 concept_gaudi_architectural_splendour_desc: "Architektonische Pracht ist ein Sammelbegriff für die spektakulären Fortschritte in der modernen Architektur und bezieht sich in erster Linie auf Art Deco, Bauhaus und Neoklassizismus, wie sie zu Beginn des 20. Jahrhunderts entstanden sind. Der Wert steht für die Umwandlung überholter Formen in eine zukunftsfähige Architektur. Um den Traum von einer Art-Déco-Stadt zu verwirklichen, muss man eine höhere Schwelle erreichen - doch der Nutzen ist größer."
 concept_artists_artist_desc: "In [concept_morgenroete] sind #b Künstler#! spezielle Charaktere, die es Ihnen erlauben, bestimmte Mechaniken des Mods zu nutzen. Sie können #b Künstler#! bei einigen Ereignissen bekommen oder indem Sie genug [Concept('concept_artistic_progress','künstlerischen Fortschritt')] erwerben. Künstler haben [concept_artists_experience], das ihr Ansehen in ihrem jeweiligen Bereich widerspiegelt.\nDie folgenden #b Künstler#! gibt es derzeit:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "Die Architektur ist eines der Kernkonzepte von [concept_morgenroete]. Es gliedert sich in zwei große Teile.\n\nZum einen wurden die [concept_gaudi_monuments] komplett neu gestaltet: Sie werden nicht mehr direkt gebaut, sondern schrittweise auf Basis von Entscheidungen ausgebaut. Zum anderen sind zahlreiche Monumente hinzugekommen - einige davon müssen gebaut werden, andere sind bereits zu Beginn des Spiels vorhanden.\n\nDer andere wichtige Punkt ist die Einführung des [Concept('concept_gaudi_architect','$concept_gaudi_architects$')], der durch die Erforschung von [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')] Städte aufwerten und bis zu 15 neue einzigartige Gebäude entwerfen kann. Architekten können ein Land auch im Bauhaus-, Neoklassik- und Art-Déco-Stil wiederaufbauen. Ein [concept_gaudi_great_architect] kann sogar sein eigenes [concept_gaudi_custom_monument] entwerfen!"
 concept_gaudi_architect_desc: "#PURPLE #b Architekten#!#! sind [Concept('concept_artists_artist','$concept_artists_artists$')], deren Fähigkeiten sich auf Stadtplanung, Gebäudedesign und Konstruktion beziehen. Sie sind besondere Charaktertypen, die man entweder durch Ereignisse erhält, wenn man genug [concept_artistic_progress] gesammelt hat, um einen solchen in seinem Land zu erschaffen, oder indem man einem [Concept('concept_gaudi_independent_architect','Unabhängigen Architekten')] eine Position anbietet.\nWährend andere Künstler eher kulturelle Traditionen anhäufen, erzeugen Architekten nur selten den sehr wertvollen [concept_gaudi_architectural_splendour], wenn sie sich mit Stadtplanung oder dem Ausbau der Hauptstadt beschäftigen - oder wenn sie das Land in einem bestimmten architektonischen Stil komplett neu gestalten. Ihre Hauptaufgabe ist eher praktischer Natur. Sie sind im öffentlichen Bauwesen tätig und verschaffen einer Nation so zusätzliche Baupunkte. Sie verbessern die Infrastruktur durch Planung und machen Hauptstädte zu lebenswerten Orten. Architekten und Architektinnen können sich auch auf einer Studienreise weiterbilden oder eine architektonische Abhandlung verfassen.\nNoch wichtiger ist der Entwurf neuer, einzigartiger Gebäude, für die sie eine [concept_gaudi_architectural_blueprint] erstellen. Insgesamt 15 dieser [concept_gaudi_blueprint_buildings] können erforscht werden - da dies sehr viel Zeit in Anspruch nimmt, lohnt es sich, darüber nachzudenken, welche davon sinnvoll sind.\nArchitekten bieten auch einen passiven Bonus: Ihre bloße Anwesenheit beschleunigt den Bau von [concept_gaudi_monuments] um 100 Prozent. Die größte Leistung eines Architekten ist der Entwurf eines eigenen [concept_gaudi_custom_monument]. Dies ist nur mit einem [Concept('concept_gaudi_great_architect','#PURPLE #b Großen Architekten#!#!')] möglich."
 concept_douglas_mountaineering: "Bergsteigen"
 concept_douglas_mountaineering_desc: "Länder, die mindestens einen [concept_douglas_mountain_summit] besitzen oder eine #b Bergsteigerlizenz#! von einem Land mit einem Berg besitzen, können #b Bergexpeditionen#! entsenden, um einen Berg zu besteigen. Um eine #b Bergexpedition#! zu starten, benötigen Sie sowohl die Technologien #b Prospektion#! und #b Nationalismus#! als auch einen General, der entweder die Eigenschaft #b Bergsteiger#!, #b Entdecker#! oder #b Gebirgskommandant#! besitzt oder #b Landvermesser#! ist.\nSobald Sie eine #b Bergexpedition#! starten, müssen Sie zunächst auswählen, welcher General der Hauptbergsteiger sein soll. Dann wählen Sie den Gipfel aus, den Sie besteigen möchten.\nJe höher die Berge, desto gefährlicher ist der Aufstieg. Die Berge werden nach ihrer Höhe in Metern klassifiziert, die von unter 4000 Metern bis über 8000 Metern reicht. Der Erfolg hängt von erforschten Militärtechnologien, dem Alter und Gesundheitszustand des Anführers sowie seinen Eigenschaften ab. Lawinen und steile Hänge können ein großes Risiko darstellen, das das gesamte Unterfangen gefährdet.\nSie können einen zusätzlichen [Concept('concept_academics_academic','$concept_academics_scientist$')] auf die Reise schicken. Entweder einen [concept_dubois_naturalist] oder einen [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]. Dieser hilft dabei, mehr über den Berg zu erfahren, den Sie bestiegen haben.\nAm Ende erhalten Sie einen Prestigebonus und Ihr General wird bessere Eigenschaften entwickeln, die ihm im Kampf und beim Bergsteigen helfen."
 concept_gaudi_great_architect: "#PURPLE #b Großer Architekt#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Große Architekten#!#!"
 concept_gaudi_great_architect_desc: "#b Große Architekten#! sind [Concept('concept_gaudi_architect','$concept_gaudi_architects$')], die als die wichtigsten Köpfe auf ihrem Gebiet gelten. #b Architekten#!, die 500 [concept_artists_experience] erreichen, werden zu #b Großen Architekten#!. Wenn ein Künstler diesen besonderen Rang erreicht, kann er oder sie die Blaupause für ein wirklich herausragendes [concept_gaudi_custom_monument] entwerfen, das den Geist der Nation verkörpert."
 concept_gaudi_monuments: "Denkmäler in #R Morgenröte#!"
 concept_gaudi_monuments_desc: "Viele Nationen erhalrne neue #b Denkmäler#! in [concept_morgenroete]: der #b Kölner Dom#! in Deutschland, die #b Gotthardbahn#! in der Schweiz, der #b Cristo Redentor#! in Brasilien, die #b Mole Antonelliana#! in Italien, der #b Sommerpalast#! in China, die #b Sagrada Família#! in Spanien, das #b Schloss Neuschwanstein#! in Bayern, der #b Palacio de Bellas Artes#! in Mexiko und der #b Gyeongbokgung Palace#! in Korea.\nAlle Gebäude außer dem #b Sommerpalast#! und dem #b Campanile#! müssen von ihrem Besitzer errichtet werden, das #b Sächsische Schloss#! kann von einer polnischen Nation reaktiviert werden. Es gibt auch neue Monumente zu Spielbeginn, wie die #b Buddhas von Bamiyan#! oder den #b Potala-Palast#!\nEs gibt auch die Möglichkeit, ein [concept_gaudi_custom_monument] von einem [concept_gaudi_great_architect] entwerfen zu lassen.\n\nIm Gegensatz zum Vanilla-Spiel werden #b Monumente#! nicht direkt gebaut, sondern durch eine Entscheidung. Der Bau erfolgt in mehreren Phasen, je nach Größe des Gebäudes, und kann Jahre oder sogar Jahrzehnte dauern - und ist deutlich teurer."
 concept_athletes_athlete: "Athleten"
 concept_athletes_athletes: "Sportler"
 concept_athletes_athlete_desc: "In [concept_morgenroete] sind #b Athleten#! spezielle Charaktere, die es dir erlauben, bestimmte Mechaniken des Mods zu nutzen.#b Athleten#! werden normalerweise durch Ereignisse oder über eine Schaltfläche erstellt. Wie andere Charaktere verfügen #b Athleten#! über Erfahrungen, die einen größeren Erfolg in ihrem Bereich garantieren.\nZurzeit gibt es diese #b Athleten#!:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "Unabhängiger Architekt"
 concept_gaudi_independent_architects: "Unabhängige Architekten"
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] Diejenigen, die nicht von einem Land angestellt werden, sind #b Unabhängige Architekten#!.\nIm Gegensatz zu vielen anderen Künstlern gibt es nur wenige Voraussetzungen, um einen #b Unabhängigen Architekten#! einzustellen, abgesehen von einer minimalen technischen Anforderung. Sie sind wahre Globetrotter und verlangen in der Regel nur eine gute Bezahlung."
 concept_gaudi_architectural_blueprint: "Architektonische Blaupause"
 concept_gaudi_architectural_blueprints: "Architektonische Blaupausen"
 concept_gaudi_architectural_blueprint_desc: "Architektonische Blaupausen können mit einem [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] erforscht werden. Sie sind wichtig für den Bau spezieller [concept_gaudi_blueprint_buildings], die nur einmal von einer Nation errichtet werden können. Es gibt insgesamt 15 verschiedene Gebäude in fünf verschiedenen Kategorien. Bestimmte Blaupausen erfordern Technologien, die erforscht werden müssen. Da die Erforschung manchmal Jahre dauern kann, ist es ratsam, sich vorher zu überlegen, welche Blaupausen am wichtigsten sind. Die Gebäude können potenziell in jedem Staat errichtet werden, erfordern aber ein gewisses Maß an Urbanisierung. In einigen Fällen kann es zusätzliche Anforderungen geben."
 concept_gaudi_blueprint_buildings: "Blaupausen-Gebäude"
 concept_gaudi_blueprint_buildings_desc: "Blaupausen-Gebäude sind Gebäude, die einen von [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] erforschten Bluprint benötigen. Diese Gebäude können nur einmal von einer Nation gebaut werden. Es gibt 15 verschiedene Gebäude:\n\n#b Monument#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Public Square#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Service Buildings#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Health Institutions#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b National Academies#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "individuelles Denkmal"
 concept_gaudi_custom_monument_desc: "Ein maßgeschneidertes Denkmal ist das größtmögliche Meisterwerk von [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. Es kann mit anderen, gewöhnlichen Denkmälern konkurrieren. Nur ein [concept_gaudi_great_architect] kann solche Pläne entwerfen. Sie erfordern die Erforschung der modernsten architektonischen Technologien. Die Art des Denkmals, das ein Architekt entwirft, hängt weitgehend von seinem Architekturstil ab. Art-Déco-Architekten entwerfen das [GetBuildingType('building_gaudi_people_monument').GetName], Bauhaus-Architekten das [GetBuildingType('building_gaudi_people_forum').GetName] und neoklassische Architekten das [GetBuildingType('building_gaudi_people_palace').GetName]."
 concept_douglas_mountaineer: "Bergsteiger"
 concept_douglas_mountaineers: "Bergsteiger"
 concept_douglas_mountaineer_desc: "#b Bergsteiger#! sind [Concept('concept_athletes_athlete','$concept_athletes_athletes$')], die unbezwungene [concept_douglas_mountain_summit] besteigen können. Sie können nach der Gründung eines Bergsteigerclubs gegen [concept_douglas_alpine_heritage] rekrutiert werden. Länder mit geografischen Merkmalen wie Bergen, Gipfeln oder Vulkanen haben daher einen Vorteil bei der Rekrutierung. Bergsteigerische Eigenschaften und Erfahrung sind die wichtigsten Faktoren für das Vorankommen bei der Bezwingung eines Berges oder der Überwindung einer gefährlichen Situation.#!"
 concept_vikelas_olympian: "Olympionike"
 concept_vikelas_olympian_desc: "#n Dieser Eintrag wird derzeit überarbeitet.#!"
 concept_douglas_mountain_summit: "Berggipfel"
 concept_douglas_mountain_summits: "Berggipfel"
 concept_douglas_mountain_summit_desc: "Berggipfel sind das begehrte Ziel aller Alpinisten. Sie markieren den höchsten Punkt eines Berges. Jeder Gipfel hat drei verschiedene Eigenschaften, die bestimmen, wie schwierig es ist, ihn erfolgreich zu erreichen.\n\n#V Höhe#!: Die Höhe bestimmt, wie viele Schritte erforderlich sind, um einen Berg zu besteigen - dies spiegelt die Gesamtlänge einer Expedition wider. Pro 1.000 Meter ist ein Aufstiegsschritt erforderlich. Der Wert wird aufgerundet, d. h. für den 4.421 Meter hohen Mount Whitney sind 5 Schritte erforderlich, für den 7.134 Meter hohen Kauffmann Peak dagegen 8. Das Prestige eines Berges wird auf der Grundlage seiner Höhe berechnet: Die Gesamthöhe wird durch 300 geteilt. Ein idealer Berg von 4.500 Metern Höhe gewährt also 15 Prestige.\n\n#V Stufe#!: Die Stufe eines Berges entspricht den Anforderungen an die Ausrüstung, die für seine Besteigung erforderlich ist. Sie ist nicht strikt an seine Höhe gebunden. Zum Beispiel ist der Citlaltépetl trotz seiner 5.636 Meter nur Stufe 1 und erfordert nur eine Grundausrüstung. Im Gegensatz dazu gilt das Matterhorn mit einer Höhe von nur 4.478 Metern als wesentlich anspruchsvoller (Stufe 3) und erfordert zumindest eine Erste-Hilfe-Ausrüstung für alpine Notfälle.\n\n#V Risiko#!: Die Risikostufe eines Berges gibt die Wahrscheinlichkeit an, dass negative Ereignisse eine Expedition beeinträchtigen. Sie ist sowohl von der Höhe als auch vom Niveau unabhängig. Lawinen, Nebel und schlechtes Wetter sind die Hauptrisiken. Der Popocatépetl konnte bereits in der frühen Neuzeit aufgrund seiner gastfreundlichen Umgebung bestiegen werden. Der wesentlich kleinere Großvenediger mit nur 3.666 Metern stellte dagegen noch bis ins frühe 19. Jahrhundert eine ernsthafte Bedrohung für österreichische Expeditionen dar.\n\nWeitere Informationen zu den einzelnen Gipfeln finden Sie unter [concept_douglas_mountain_summit_list]."
 concept_douglas_mountain_range: "Bergkette"
 concept_douglas_mountain_ranges: "Gebirgsketten"
 concept_douglas_mountain_range_desc: "Ein Gebirgszug ist definiert als eine Gebirgsformation, die das Potenzial für [concept_douglas_mountaineering]-Training über große Entfernungen bietet. Klassische Gebirgszüge sind die Rocky Mountains, die Anden, die Alpen und der Kaukasus. Im Gegensatz zu den [Concept('concept_douglas_mountain_summit','Berggipfeln')], die es zu bezwingen gilt, gibt es auch viele weniger anspruchsvolle Berge, bei denen für [concept_douglas_mountaineer] keine Gefahr eines tödlichen Sturzes besteht. Vielmehr sollten sie als Trainingsstrecke betrachtet werden. Länder mit Gebirgsketten bringen eher Bergsteiger hervor als Länder ohne diese geografische Besonderheit."
 concept_douglas_alpine_heritage: "Alpines Erbe"
 concept_douglas_alpine_heritage_desc: "Alpines Erbe ist ein Sammelbegriff für die Verbundenheit mit den Bergen und die Spezialisierung auf das Bergsteigen. Er bezieht sich auch auf das Potenzial zur Anwerbung neuer [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]- denn in den meisten Fällen kommen erfahrene Bergsteiger aus Bergregionen. Dies verschafft Ländern mit [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] oder [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] immer einen Vorteil. Die Rekrutierung eines neuen Bergsteigers sowie verschiedene andere Maßnahmen kosten das alpine Erbe."
 concept_douglas_mountain_summit_list: "Liste von Berggipfeln"
 concept_douglas_mountain_summit_list_desc: "Es gibt viele [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')], die bestiegen werden können.\n\n#V Nordamerika:#!\n#b Mount McKinley#! (Alaska), Höhe 6190 Meter, Level 4\n#b Mount Logan#! (Yukon Territory), Höhe 5959 Meter, Level 4\n#b Citlaltépetl#! (México), Höhe 5636 Meter, Schwierigkeitsgrad 1\n#b Mount Whitney#! (California), Höhe 4421 Meter, Level 1\n\n#V Südamerika:#!\n#b Aconcagua#! (Mendoza), Höhe 6267 Meter, Level 3\n#b Huascarán#! (Lima Territory), Höhe 6768 Meter, Level 5\n#b Illimani#! (La Paz), Höhe 6438 Meter, Level 4\n#b Chimborazo#! (Ecuador), Höhe 6267 Meter, Level 1\n\n#V Europa:#!\n#b Shkara#! (Großer Kaukasus), Höhe 5642 Meter, Level 4\n#b Dufourspitze#! (Dufourspitze), Höhe 4634 Meter, Level 2\n#b Matterhorn#! (Westschweiz), Höhe 4478 Meter, Level 3\n#b Aiguille Verte#! (Savoyen), Höhe 4122 Meter, Level 3\n#b Pico de Aneto#! (Aragon), Höhe 3404 Meter, Level 1\n\n#V Afrika:#!\n#b Kibo#! (Tanganyika), Höhe 5895 Meter, Level 2\n#b Mount Kenya#! (Kenia), Höhe 5199 Meter, Level 3\n#b Mount Stanley#! (Uganda), Höhe 5109 Meter, Level 3\n#b Mount Cameroon#! (Süd-Kamerun), 4095 Meter, Level 1\n\n#V Asien:#!\n#b Kamet#! (Delhi), Höhe 7756 Meter, Ebene\n#b Chogolisa#! (Kaschmir), Höhe 7665 Meter, Level 5\n#b Kabru#! (Himalaya), Höhe 7412 Meter, Level 5\n#b Kaufmann Peak#! (Tadschikistan), Höhe 7134 Meter, Level 4\n\n#V Australien &amp; Ozeanien:#!\n#b Mount Wilhelm#! (Ost-Neuguinea), Höhe 4121 Meter, Level 2\n#b Mount Cook#! (Südinsel), Höhe 3724 Meter, Ebene 2"
