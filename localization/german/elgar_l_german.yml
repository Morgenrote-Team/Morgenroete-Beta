 je_elgar_composer_masterpiece: "Komponist komponiert Meisterwerk"
 je_elgar_composer_masterpiece_reason: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] wird sich in den nächsten Monaten ganz der Komposition eines Meisterwerks widmen. Die Zeit, die ein Komponist braucht, um ein Meisterwerk zu schaffen, hängt in erster Linie von seiner Reputation ab. Ein großer Komponist kann ein Meisterwerk in nur zwei Jahren schaffen. Komponisten mit einer Reputation von weniger als 400 brauchen wesentlich länger; ein Komponist mit einer Reputation von weniger als 250 sollte es gar nicht erst versuchen. Am Ende des Arbeitsprozesses wird [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] ein herausragendes musikalisches Meisterwerk unserer Generation präsentieren."
