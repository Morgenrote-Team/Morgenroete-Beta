 je_elgar_composer_conducting:1 "Komponist dirigiert Saison" #1!
 je_elgar_composer_conducting_reason:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] wird sich 24 Monate lang darauf konzentrieren, die Konzertsaison zu organisieren und damit die Musikproduktion in einer unserer Opern zu verbessern. Danach ist er wieder verfügbar." #1!
 je_elgar_composer_conducting_goal:1 "Wenn es keine Zwischenfälle gibt, wird [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] seine Arbeit jeden Monat fortsetzen. Er hat für #G [ROOT.Var('elgar_composer_progress').GetValue]#! Monate gearbeitet." #1!
 je_elgar_composer_composing:1 "Der Komponist konzentriert sich ganz auf das Komponieren" #1!
 je_elgar_composer_composing_reason:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] wird sich in den nächsten Monaten ganz dem Komponieren widmen. Das bringt #G 5#! @elgar_music_tradition! [concept_elgar_musical_tradition] und #G 5#! #V Renommee#! jährlich. Komponisten, die komponieren, schaffen jedes Jahr eine zufällige Anzahl von Kompositionswerken. Normalerweise komponiert ein Komponist 1 bis 4 Stücke pro Jahr, aber positive oder negative Eigenschaften können die Anzahl beeinflussen. Der Erfolg einer Tournee hängt stark davon ab, wie viele Werke ein Komponist aus seinem eigenen Repertoire präsentieren kann." #1!
 je_elgar_composer_composing_goal_tt:1 "Das Komponieren kann jederzeit abgebrochen werden." #1!
 je_elgar_composer_composing_stop_tt:1 "Sie können Ihren Komponisten durch Drücken der Taste aufhören lassen, zu komponieren." #1!
