 elgar.91.t:1 "Tivoli Glashalle" #1!
 elgar.91.d:1 "Die Tivoli-Gärten erfreuen sich seit Jahren großer Beliebtheit bei den Kopenhagener Bürgern. Es ist geplant, eine Konzerthalle für rund 1'000 Personen zu bauen, um das Publikum mit anregender Musik zu unterhalten." #1!
 elgar.91.f:1 "Ein Konzertsaal gehörte zu den Attraktionen, als der Tivoli-Garten 1843 seine Tore öffnete. Es handelte sich um ein rechteckiges, hölzernes Gebäude, das von Harald Conrad Stilling entworfen wurde. Hans Christian Lumbye war von 1843 bis 1872 Musikdirektor und Chefdirigent. Er schrieb fast 700 Kompositionen für das Orchester, insbesondere Polkas, Walzer und Galoppe. Der Konzertsaal wurde 1863 von Johan Andreas Stillmann erweitert." #1!
 elgar.91.g:1 "Ich hoffe, dass Herr Lumbye mit seinen berühmten Galoppe auftauchen wird!" #1!
 elgar.92.t:1 "Gran Teatro Nacional" #1!
 elgar.92.d:1 "Mit dem Plan, ein großes Opernhaus in Mexiko-Stadt zu bauen, plant die Regierung eines der größten Bauprojekte in der Geschichte des Landes." #1!
 elgar.92.f:1 "Das Theater wurde zwischen 1840 und 1844 von dem Architekten Lorenzo de la Hidalga in Mexiko-Stadt erbaut. Historiker betrachten es als das wichtigste architektonische Werk in Mexiko-Stadt zwischen der Fertigstellung der Metropolitan-Kathedrale und dem Bau des Palacio de Bellas Artes. Das Große Nationaltheater wurde in einer der Amtszeiten von Antonio López de Santa Anna als Präsident eingeweiht. Sein Name änderte sich nach und nach, vom Großen Theater von Santa Anna in Großes Theater Vergara, dann Großes Imperiales Theater und schließlich Großes Nationaltheater. Während der Opernsaison 1852 wurden 17 Opern uraufgeführt und mehr als 60 Aufführungen geboten." #1!
 elgar.93.t:1 "Teatro Amazonas" #1!
 elgar.93.d:1 "Aufgrund des Booms, den die Region durch den Kautschukanbau erlebt, soll Manaus ein opulentes Opernhaus erhalten - mitten im Dschungel!" #1!
 elgar.93.f:1 "Das Amazonas-Theater wurde während der Belle Époque gebaut, als der Kautschukboom ein Vermögen einbrachte. Der Bau des Amazonas-Theaters wurde erstmals 1881 von einem Mitglied des örtlichen Repräsentantenhauses, Antonio Jose Fernandes Júnior, vorgeschlagen, der sich ein "Juwel" im Herzen des Amazonas-Regenwaldes vorstellte. Der architektonische Stil des Theaters wird als typisch für das Renaissance-Revival angesehen. Die Dachziegel wurden aus dem Elsass importiert, die Stahlwände aus Glasgow, Schottland, und der Carrara-Marmor für die Treppen, Statuen und Säulen aus Italien. Die Kuppel ist mit 36.000 dekorierten Keramikfliesen in den Farben der brasilianischen Nationalflagge bedeckt. Die Inneneinrichtung stammt aus Frankreich und ist im Louis-Quinze-Stil gehalten. Der italienische Künstler Domenico de Angelis der Jüngere malte die Paneele, die die Decken des Auditoriums und des Zuschauerraums schmücken." #1!
  
 elgar.101.t:1 "Ein Monument für Beethoven" #1!
 elgar.101.d:1 "Einem Aufruf des Komponisten Robert Schumann folgend, sprachen sich mehrere Intellektuelle, aber auch Bürger, Patrioten und Kunstinteressierte für die Errichtung eines Denkmals für Ludwig van Beethoven in Bonn aus." #1!
 elgar.101.f:1 "\"Das Mausoleum der zukünftigen Erinnerung steht schon persönlich vor mir - ein einigermaßen hoher Quader, darauf eine Leier mit Geburts- und Todesjahr, darüber der Himmel und daneben ein paar Bäume. Ein ganzes Volk, das sich einem Beethoven gegenübersieht, der es auf jeder Seite Größe und Stolz lehrt, sollte das nicht in der Lage sein, ihm ein tausendmal größeres Denkmal zu errichten? Wenn ich ein Fürst wäre, würde ich ihm einen Tempel im palladianischen Stil errichten! Ihn in einer gigantischen Gestalt formen, wie den heiligen Borromäus am Lago Maggiore, damit er, wie im Leben, über Berg und Berge schauen kann - und wenn die Rheinschiffe vorbeifahren und die Fremden fragen: Was bedeutet der Riese, dann kann jedes Kind antworten: Beethoven ist das - und sie werden denken, es sei ein deutscher Kaiser. Mit einem Wort: Steh auf, lass dein Phlegma los und bedenke, dass das Denkmal dein eigenes sein wird!\" - Robert Schumann" #1!
 elgar.101.g:1 "Beethoven war ein deutscher Titan der Musik!" #1!
 elgar.101.h:1 "Wir freuen uns, dass wir dieses kulturell wertvolle Projekt finanzieren können." #1!
 elgar.101.i:1 "Er kann nicht so großartig gewesen sein, wenn er nicht vorher ein Denkmal hatte." #1!
 elgar.102.t:1 "Vorbereitung des Beethovenfestes" #1!
 elgar.102.d:1 "Die letzten Arbeiten am Beethoven-Denkmal sind abgeschlossen. Jetzt ist es an der Zeit, sich auf die Einweihungsfeier vorzubereiten." #1!
 elgar.102.f:1 "Das Beethovenfest zur Einweihung des Beethoven-Denkmals war ein musikalisches Großereignis von internationalem Rang. Neben dem preußischen König war auch die britische Königin Victoria eingeladen, Geistesgrößen wie Alexander von Humboldt gehörten zu den Gästen, und Komponisten vom Range eines Hector Berlioz, Giacomo Meyerbeer und vor allem Franz Liszt prägten die vier Tage. Tausende von Menschen sollten an den Festspielen teilnehmen, was die kleine Stadt Bonn vor große Probleme stellte." #1!
 elgar.102.g:1 "Verschicken Sie die Einladungen!" #1!
 elgar.103.t:1 "Einladung zum Beethovenfest" #1!
 elgar.103.d:1 "Unsere Regierung hat eine offizielle Einladung zum Beethovenfest in Bonn erhalten, wo das Denkmal des Komponisten enthüllt werden soll." #1!
 elgar.103.g:1 "Wir werden gerne teilnehmen." #1!
 elgar.103.h:1 "Klassische Musik ist überbewertet." #1!
 elgar.104.t:1 "Bau der Beethovenhalle" #1!
 elgar.104.d:1 "Aufgrund der hohen Besucherzahlen schlug Franz Liszt vor, Männer und Material von der Baustelle des Kölner Doms nach Bonn umzuleiten, um in Rekordzeit einen Festsaal zu bauen." #1!
 elgar.104.f:1 "Die offizielle Enthüllung des Beethoven-Denkmals sollte der Höhepunkt eines dreitägigen Beethovenfestes sein. Einen Monat vor Beginn des Festes gab es keinen geeigneten Veranstaltungsort, um die erwarteten 3.000 Besucher unterzubringen. Auf Liszts Drängen hin, und erst nachdem er angeboten hatte, die gesamten Kosten selbst zu tragen, beauftragte das Komitee einen Architekten und Bauunternehmer mit dem Bau der Beethovenhalle. Als sie schließlich mit dem Bau begannen, hatten sie weniger als zwei Wochen Zeit und mussten rund um die Uhr arbeiten, um ihn rechtzeitig fertig zu stellen. Franz Liszt sprach auch mit den Bauleuten des Kölner Doms. Holz wurde von Köln über den Rhein nach Bonn verladen. Auch die in Köln gefertigten Dekorationen kamen so schnell nach Bonn. In nur elf Tagen wurde ein Festsaal aus dem Nichts geschaffen." #1!
 elgar.104.g:1 "Herrlich." #1!
 elgar.105.t:1 "Das Beethovenfest" #1!
 elgar.105.d:1 "Nach vier Tagen hochkarätiger Musik kann das Beethovenfest als voller Erfolg gewertet werden, auch wenn Veranstaltungen dieser Größenordnung nicht ohne Skandale auskommen." #1!
 elgar.105.f:1 "Die Zeremonie verlief nicht ohne heikle Momente. Das Beethoven-Monument wandte den wichtigsten Gästen, König Friedrich Wilhelm IV. von Preußen und der britischen Königin Victoria, die auf dem Balkon des Schlosses Fürstenberg Platz genommen hatten, den Rücken zu. Alexander von Humboldt rettete den Tag mit der Bemerkung, Beethoven sei schon immer ein unhöflicher Kerl gewesen. Noch peinlicher war die Tatsache, dass Liszt während der Trinksprüche beim Festbankett im "Goldenen Stern" das französische Kontingent unter der Leitung von Berlioz brüskierte und beinahe einen Aufruhr verursachte. Das Bankett wurde durch das Verhalten von Lola Montez gestört, die auf einem Tisch tanzte und Liszt in Verlegenheit brachte, indem sie darauf bestand, sein Gast bei den Feierlichkeiten zu sein, und einen ihrem Status entsprechenden Sitzplatz verlangte, womit sie die vororganisierte Sitzordnung durcheinander brachte." #1!
 elgar.105.g:1 "Beethoven kehrt uns den Rücken zu?" #1!
 elgar.105.h:1 "Alexander von Humboldt ist ein Gentleman." #1!
 elgar.105.i:1 "Diese Deutschen haben keine Eleganz." #1!
 elgar.105.j:1 "Das war sehr inspirierend." #1!
 elgar.106.t:1 "Liszt-Kantate" #1!
 elgar.106.d:1 "Franz Liszt hatte die große Ehre, die Kantate für die Einweihung des Beethoven-Denkmals zu schreiben und öffentlich aufzuführen." #1!
 elgar.106.f:1 "Wie dem auch sei, seine Kantate, die wirklich gut vorgetragen und von dreieinhalb Teilen des Saals mit warmem Beifall bedacht wurde, ist eine große und schöne Sache, die Liszt unter den Komponisten sehr hoch erhebt. Der Ausdruck ist wahrhaftig, die Intonation richtig, der Stil erhaben und neu, die Form gut durchdacht und pflichtbewusst ausgeführt, die Instrumentation bemerkenswert durch ihre Kraft und Vielfalt. Es gibt in seinem Orchester nie eine Aufeinanderfolge der gleichen Töne, was gewisse Werke, die man einst schätzte, für den Hörer so ermüdend macht; er weiß die kleinen und großen Mittel zu gebrauchen, er überfordert weder die Instrumente noch die Stimmen; mit einem Wort, er hat mit einem Schlag gezeigt, dass er in der Instrumentation und in den anderen Teilen der musikalischen Kunst Stil hat, denn man fürchtete, er hätte ihn noch nicht gefunden. - Hector Berlioz" #1!
 elgar.106.g:1 "Hoch lebe er! Hoch lebe Beethoven, hoch lebe er!" #1!
 elgar.107.t:1 "Berlioz beim Beethovenfest" #1!
 elgar.107.d:1 "Die Feierlichkeiten anlässlich der Enthüllung des Beethoven-Denkmals haben den Komponisten Hector Belrioz sehr inspiriert." #1!
 elgar.107.f:1 "\"Während dieser Reise nach Österreich, Ungarn, Böhmen und Schlesien begann ich mit der Komposition meiner Faust-Legende, über die ich schon seit langem nachgedacht hatte. Sobald ich mich entschlossen hatte, sie in Angriff zu nehmen, musste ich mich damit begnügen, auch den größten Teil des Librettos selbst zu schreiben; die Fragmente der französischen Übersetzung von Goethes Faust durch Gérard de Nerval, die ich schon vor zwanzig Jahren vertont hatte und die ich in einer revidierten Fassung in die neue Partitur aufnehmen wollte, und zwei oder drei andere Szenen, die M. Gandonnière vor meiner Abreise aus Paris nach meinen Anweisungen geschrieben hatte, machten nicht einmal ein Sechstel des gesamten Werkes aus. Während der Reise in der alten deutschen Postkutsche versuchte ich daher, die für meine Musik vorgesehenen Verse zu schreiben. Ich begann mit Fausts Anrufung der Natur, ohne zu versuchen, Goethes Meisterwerk zu übersetzen oder gar zu imitieren, sondern nur, um mich von ihm inspirieren zu lassen und die darin enthaltene musikalische Substanz herauszuziehen. Als ich einmal angefangen hatte, schrieb ich die restlichen Verse, wie es mir gerade in den Sinn kam, und ich komponierte die Partitur mit einer Leichtigkeit, die ich bei meinen anderen Werken selten erlebt habe.\" - Hector Berlioz" #1!
 elgar.107.g:1 "Hat sich die Reise also gelohnt?" #1!
 elgar.108.t:1 "Victoria besucht den Kölner Dom" #1!
 elgar.108.d:1 "Die britische Königin Victoria nahm ihren Aufenthalt im Rheinland zum Anlass, den Kölner Dom zu besuchen und sich über den gerade begonnenen Dombau zu informieren." #1!
 elgar.108.f:1 "Der frühe Abschied der königlichen Gesellschaft vom Konzert war darauf zurückzuführen, dass am Nachmittag eine Führung durch den Kölner Dom stattfand, die unter festlichem Glockengeläut stattfand. Anschließend begaben sich die Majestäten durch den Haupteingang des Mittelschiffs in den Chor, in dem eine Festkantate des Kölner Männergesangvereins mit Orgelbegleitung von Musikdirektor Weber aufgeführt wurde." #1!
 elgar.108.g:1 "Wir fühlen uns geehrt." #1!
  
 elgar.111.t:1 "Ein Monument für Mozart" #1!
 elgar.111.d:1 "Die Vorbereitungen für die Errichtung eines Denkmals für Wolfgang Amadeus Mozart sind in vollem Gange. Es werden jedoch noch Spenden gesammelt." #1!
 elgar.111.f:1 "1835 regte der aus Posen im heutigen Polen stammende Schriftsteller Julius Schilling an, dem damals in Salzburg relativ unbekannten Mozart ein Denkmal auf dem heutigen Mozartplatz zu setzen. Bedeutende Förderer im Ausland, aber auch in Wien, unterstützten schließlich den Bau des Denkmals. Der bayerische König Ludwig I. von Bayern spendete eine beträchtliche Summe und stiftete den Sockel der Bronzestatue." #1!
 elgar.111.g:1 "Mozart war ein deutscher Titan der Musik!" #1!
 elgar.113.t:1 "Das Mozart-Monument" #1!
 elgar.113.d:1 "Heute wurde das Denkmal für den größten Sohn Slazburgs in seinem Geburtshaus enthüllt." #1!
 elgar.113.f:1 "Das von Ludwig Schwanthaler entworfene und von Johann Baptist Stiglmaier gegossene Denkmal wurde am 5. September 1842 in Anwesenheit der beiden überlebenden Söhne Mozarts, Franz Xaver und Carl Thomas, feierlich eingeweiht. Mozarts Witwe konnte die Einweihung jedoch nicht mehr erleben. Sie war kurz zuvor im Haus am Mozartplatz 8 verstorben. Ein Fest mit Fackelzug, Schifffahrt, Bergbahn, Scheibenschießen und Pferderennen umrahmte die Feierlichkeiten." #1!
 elgar.114.t:1 "Ein lebendiges Denkmal" #1!
 elgar.114.d:1 "In Österreich mehren sich die Bestrebungen, ein Mozart-Denkmal zu errichten. Einige Frankfurter Bürger wollen deshalb ein Benefizkonzert veranstalten - und verbinden die Idee mit politischen Inhalten." #1!
 elgar.114.f:1 "Ursprünglich wollte die Frankfurter Bürgerschaft ein Konzert veranstalten, um genügend Spenden für ein Mozart-Denkmal zu sammeln. Denkmäler für bürgerliche Persönlichkeiten waren in Deutschland ein Novum. Die Errichtung von Denkmälern zu Ehren von nationalen Persönlichkeiten wie Künstlern oder Wissenschaftlern war daher eine willkommene Gelegenheit, patriotische Gefühle auszudrücken. In Frankfurt wurde sogar angeregt, ein nationales Sängertreffen zu veranstalten, dessen Erlös in eine Stiftung für deutsche Musiker zur Förderung des musikalischen Nachwuchses fließen sollte." #1!
 elgar.114.g:1 "Sammeln Sie Geld für unser eigenes lebendiges Denkmal - ein Fest zu Ehren von Mozart!" #1!
 elgar.114.h:1 "Spenden Sie Geld für das Denkmal in Salzburg." #1!
 elgar.115.t:1 "Einladung zum Sängerfest" #1!
 elgar.115.d:1 "Die Frankfurter Bürgerschaft hat patriotische Sängerinnen und Sänger aus unserem Land zu einem Mozart-Festival eingeladen." #1!
 elgar.115.g:1 "Eine musikalische und nationale Gelegenheit." #1!
 elgar.115.h:1 "Ich kann Kunstlieder einfach nicht ausstehen." #1!
 elgar.116.t:1 "Das Mozartfest" #1!
 elgar.116.d:1 "42 rheinische, badische, hessische und fränkische Gesangvereine trafen sich in Frankfurt, um ein dreitägiges Fest der Musik Mozarts zu feiern. Die Veranstaltung entwickelte sich jedoch zu einer Demonstration für die politische Einigung Deutschlands. Das gesammelte Geld wurde für eine Stiftung zur Förderung junger Komponisten aufgebracht." #1!
 elgar.116.f:1 "\"Die Stadt geriet ins Schwärmen. Die Häuser waren bis zu den Dachfenstern mit Menschen gefüllt. Die Mainzer, Hanauer und Offenbacher kamen mit Booten zum Klang der Kanonenschüsse, umgeben von geschmückten Booten mit Musik; durch alle Tore zogen sie ein. Es war ein mächtig ergreifender Anblick, das künstlerische Interesse wurde zweitrangig, aber das Nationale trat mächtig an uns heran; ich will nicht leugnen, dass mir helle Tränen über die Wangen liefen.\" - Heinrich Hoffmann" #1!
 elgar.116.g:1 "Musik bringt die Nation zusammen." #1!
 elgar.117.t:1 "Liberale Störenfriede machen Lärm in Frankfurt" #1!
 elgar.117.d:1 "Es ist uns nicht entgangen, dass einige jakobinisch gesinnte "Patrioten" ein angebliches Mozartfest in Frankfurt für ihre politische Agitation instrumentalisiert haben." #1!
 elgar.117.f:1 "42 rheinische, badische, hessische und fränkische Gesangvereine trafen sich in Frankfurt, um ein dreitägiges Fest der Musik Mozarts zu feiern. Die Veranstaltung entwickelte sich jedoch zu einer Demonstration für die politische Einigung Deutschlands. Ursprünglich sollte die Veranstaltung der Finanzierung des Mozart-Denkmals dienen, doch schon bald änderten die Initiatoren den Zweck der Wohltätigkeitsveranstaltung zu Gunsten ihrer eigenen Stiftung." #1!
 elgar.117.g:1 "Eine Verschwörung gegen die Ordnung im Deutschen Bund!" #1!
 elgar.117.h:1 "Lasst sie singen." #1!
  
 elgar.121.t:1 "Die Gründung des Allgemeinen Deutschen Musikvereins" #1!
 elgar.121.d:1 "Heute wurde in [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] der Allgemeine Deutsche Musikverein gegründet. Es entstand sofort eine Diskussion darüber, ob wir zur Neudeutschen Schule gehören oder ob wir die konservative Idee der Musik verteidigen." #1!
 elgar.121.f:1 "Die Neudeutsche Schule ist ein Begriff, der 1859 von Franz Brendel, dem Herausgeber der Neuen Zeitung für Musik, eingeführt wurde, um bestimmte Tendenzen in der deutschen Musik zu beschreiben. Er wurde von verschiedenen Personen zu verschiedenen Zeiten mit unterschiedlichen Bedeutungen verwendet. Es besteht allgemein Einigkeit darüber, dass Franz Liszt und Richard Wagner zu den prominentesten Vertretern der "Neuedeutschen Schule" gehörten. Es besteht auch Konsens darüber, dass Johannes Brahms nicht daran beteiligt war. Darüber hinaus gehen die Interpretationen auseinander. Der neue Begriff sollte so verstanden werden, dass er die gesamte Periode seit Beethovens Tod bezeichnet. Nach Brendel war es üblich, die Zeit von J.S. Bach und Händel als "Altdeutsche Schule" zu bezeichnen. Die darauf folgende Periode war die der Wiener Meister wie Mozart, die vom italienischen Stil beeinflusst waren. Beethoven hatte das Interesse wieder auf den deutschen Norden gelenkt und damit die "Neudeutsche Schule" eröffnet. Komponisten beider Seiten blickten auf Beethoven als ihren geistigen und künstlerischen Helden zurück; die Konservativen sahen in ihm einen unübertrefflichen Höhepunkt, die Progressiven einen Neuanfang in der Musik." #1!
 elgar.121.g:1 "Wir sind Teil der Neuedeutschen Schule." #1!
 elgar.121.h:1 "Wir verteidigen die traditionelle deutsche Schule." #1!
 elgar.122.t:1 "Mitgliedschaft im Allgemeinen Deutschen Musikverein" #1!
 elgar.122.d:1 "Künstler aus unserem Land wurden in den neu gegründeten Allgemeinen Deutschen Musikverein eingeladen. Es entstand sofort eine Diskussion darüber, ob wir zur Neuen Deutschen Schule gehören oder ob wir die konservative Idee der Musik verteidigen." #1!
 elgar.123.t:1 "Ort des nächsten Musikerkongresses" #1!
 elgar.123.d:1 "Die Mitglieder des Allgemeinen Deutschen Musikvereins haben [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] als Tagungsort für die nächste Tonkünstler-Versammlung (Musikkongress) gewählt." #1!
 elgar.123.f:1 "Im Jahr 1859 fand die erste Tonkünstlerversammlung anlässlich des 25-jährigen Bestehens der Neuen Zeitschrift für Musik in Leipzig statt. Auf der zweiten Tonkünstlerversammlung (1861) in Weimar wurden die Statuten des Allgemeinen Deutschen Musikvereins (ADMV) von über 700 Gründungsmitgliedern angenommen. Die Neue Zeitschrift für Musik wurde zum Organ des Verbandes. Am Ende des 19. Jahrhunderts stand der ADMV unter dem Protektorat des Großherzogs von Weimar. Der ADMV veranstaltete eine Reihe von großen Tonkünstlertreffen. Er orientierte sich meist an der Richtung der Neuen Deutschen Schule, die durch Franz Liszt und Richard Wagner vertreten wurde. Zu den künstlerischen Zielen des ADMV gehörte es, jährliche Tonkünstlertreffen an verschiedenen Orten zu veranstalten, bei denen wichtige, selten gehörte und vor allem neue Musikwerke aller Art aufgeführt werden sollten. Aber auch ältere, nur selten oder gar nicht gehörte, aber wegen ihrer Bedeutung interessante Werke sollten aufgeführt werden. Darüber hinaus sollten neue musikalische oder wissenschaftliche Werke gedruckt werden." #1!
 elgar.123.g:1 "Wir fühlen uns geehrt!" #1!
 elgar.124.t:1 "Musikerkongress in [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]" #1!
 elgar.124.d:1 "Die diesjährige Tonkünstler-Versammlung findet in [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName] statt. Unsere Künstler sind herzlich eingeladen, über Musik zu diskutieren und der Aufführung neuer und vergessener Musikstücke zu lauschen." #1!
 elgar.124.g:1 "Genießen wir die Musik und hören wir uns die Beiträge Gleichgesinnter an." #1!
 elgar.124.h:1 "Genau der richtige Ort, um gegen diese musikalischen Dilettanten anzutreten." #1!
 elgar.124.i:1 "Dies wird der Tag der Wahrheit sein - unsere Vorstellung von Musik ist die einzig richtige!" #1!
 elgar.125.t:1 "Krieg der Romantiker" #1!
 elgar.125.d:1 "Ein Streit zwischen Vertretern der Neuedeutschen Schule und den eher konservativen Vertretern hat zu einem öffentlichen Skandal geführt. In der Presse tobt bereits ein regelrechter Krieg zwischen den beiden Fraktionen. Es ist an der Zeit, dass [ROOT.GetCountry.GetName] sich hinter seine Künstler stellt." #1!
 elgar.125.f:1 "Der "Krieg der Romantiker" ist ein Begriff, der von einigen Musikhistorikern verwendet wird, um die Spaltung zwischen prominenten Musikern in der zweiten Hälfte des 19. Jahrhunderts zu beschreiben. Musikalische Struktur, die Grenzen der chromatischen Harmonie und Programmmusik versus absolute Musik waren die Hauptstreitpunkte. Die gegnerischen Parteien kristallisierten sich in den 1850er Jahren heraus. Die prominentesten Mitglieder des konservativen Kreises waren Johannes Brahms, Joseph Joachim, Clara Schumann und das Leipziger Konservatorium, das von Felix Mendelssohn gegründet worden war. Ihre Gegner, die radikalen Progressiven vor allem aus Weimar, wurden durch Franz Liszt und die Mitglieder der sogenannten Neudeutschen Schule sowie durch Richard Wagner vertreten. Die Kontroverse war deutschen und mitteleuropäischen Ursprungs; Musiker aus Frankreich, Italien und Russland waren nur am Rande beteiligt. Die Komponisten beider Seiten blickten auf Beethoven als ihren geistigen und künstlerischen Helden zurück; die Konservativen sahen in ihm einen unübertrefflichen Höhepunkt, die Progressiven einen Neuanfang in der Musik." #1!
 elgar.125.g:1 "Unterstützen Sie die Neudeutsche Schule!" #1!
 elgar.125.h:1 "Unterstützen Sie die Traditionelle Deutsche Schule!" #1!
 elgar.126.t_konservativ:1 "Konservative gewinnen den "Krieg der Romantiker"" #1!
 elgar.126.d_konservativ:1 "Die überwältigende Mehrheit der Anhänger der traditionellen Schule hat den Streit um die Zukunft der Musik gewonnen. Ob der Inhalt stimmt, ist zweitrangig:1 Die Masse der Beiträge zu Debatten und Polemiken bestimmt das öffentliche Bild." #1!
 elgar.126.f_konservativ:1 "Ein zentraler Streitpunkt zwischen diesen beiden Gruppen von Musikern war der zwischen traditionellen und neuen musikalischen Formen. Dies war eine Folge der Debatte über die Lebensfähigkeit der Gattung Symphonie, die sich unter Ludwig van Beethoven von einer Unterhaltungsmusik zu einer Form entwickelt hatte, die soziale, moralische und kulturelle Ideale beinhaltete. Liszt und sein Kreis favorisierten neue Schreibstile und Formen, die Musik mit erzählerischen und bildhaften Ideen verbinden sollten. Zu diesem Zweck entwickelte Liszt die symphonische Dichtung. Die Leipziger/Berliner Schule setzte sich für die von den klassischen Meistern verwendeten Formen ein, die von Musikwissenschaftlern wie Adolf Bernhard Marx im frühen 19. Auch die Gültigkeit der Programmmusik war ein Streitpunkt. In seinem 1854 erschienenen Buch Vom Musikalisch-Schönen stellte Hanslick fest, dass die Musik nichts Bestimmtes außer sich selbst darstelle und auch nicht darstellen könne.\nLetztendlich wurde #G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#! Mitglieder die Neue Deutsche Schule und #R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#! Die Mitglieder unterstützten die Traditionelle Schule." #1!
 elgar.126.g:1 "Die Traditionelle Schule hat sich durchgesetzt." #1!
 elgar.126.t_neudeutsch:1 "Progressive gewinnen den \"Krieg der Romantiker"\" #1!
 elgar.126.d_neudeutsch:1 "Die überwältigende Mehrheit der Anhänger der Neudeutschen Schule hat den Streit um die Zukunft der Musik gewonnen. Ob der Inhalt stimmt, ist zweitrangig: Die Masse der Beiträge zu Debatten und Polemiken bestimmt das öffentliche Bild." #1!
 elgar.126.f_neudeutsch:1 "" #1!
 elgar.126.h:1 "Die Neudeutsche Schule triumphiert." #1!
  
 elgar.131.t:1 "Franz Liszt beginnt seine Europatournee" #1!
 elgar.131.d:1 "Nach einer eher unglücklichen Zeit in Paris beschloss Franz Liszt, nach dem Vorbild seines Rivalen Thalberg eine Tournee zu unternehmen und ein international gefeierter Musiker zu werden. Sein erstes Ziel ist [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]." #1!
 elgar.131.f:1 "Franz Liszt war ein österreichisch-ungarischer Komponist, Pianist, Dirigent, Theaterdirektor und Musiklehrer. Liszt war einer der bedeutendsten und einflussreichsten Klaviervirtuosen und mit einem Oeuvre von über 1300 Werken und Bearbeitungen einer der produktivsten Komponisten des 19. Jahrhunderts. Obwohl ein großer Teil seines Schaffens der Klavierliteratur zuzuordnen ist, gab Liszt mit der Entwicklung der symphonischen Dichtung auch der Orchestermusik deutliche Impulse. Sein Konzept der Programmmusik und die Verwendung neuer harmonischer und formaler Mittel machten ihn - neben Richard Wagner - zum bekanntesten Protagonisten der Neuen Deutschen Schule. 1839 begann Liszt eine ausgedehnte Europatournee, die er in den folgenden acht Jahren fortsetzte. Diese Zeit war Liszts glanzvollste als Konzertpianist und er erhielt während seiner Tourneen viele Auszeichnungen und viel Bewunderung. In dieser Zeit tauchten auch die ersten Berichte über intensive Reaktionen von Liszts Fans auf, die als Lisztomanie bezeichnet wurden. Die Lisztomanie war durch eine hysterische Reaktion auf Liszt und seine Konzerte gekennzeichnet. Es wurde berichtet, dass Liszts Spiel die Stimmung des Publikums auf ein Niveau mystischer Ekstase hob." #1!
 elgar.131.g:1 "Wir wünschen ihm das Beste." #1!
 elgar.132.t:1 "Lisztomanie in [ROOT.GetCountry.GetNameNoFlag]" #1!
 elgar.132.d:1 "Der weltberühmte Pianist Franz Liszt hat unser Land als nächstes Ziel seiner Europatournee ausgewählt. Die Theater und Opernhäuser sind bereits ausgebucht!" #1!
 elgar.132.g:1 "Woher kommen plötzlich all diese schreienden Frauen?" #1!
 elgar.133.t:1 "Liszt reist ab" #1!
 elgar.133.d:1 "Liszt beendete seinen Aufenthalt und bedankte sich für die Gastfreundschaft. Die Lisztomanie wird [SCOPE.sCountry('elgar_liszt_destination_scope').GetAltNameNoFlag('IN')] weitergehen." #1!
 elgar.133.f:1 "Es wird geschätzt, dass Liszt zwischen 1839 und 1847 weit über tausend Mal öffentlich auftrat. Darüber hinaus beruhte sein großer Ruhm als Pianist, den er noch lange nach seinem offiziellen Rückzug von der Konzertbühne genießen sollte, hauptsächlich auf seinen Leistungen in dieser Zeit. Zu seinem Ruf trug auch bei, dass Liszt einen großen Teil der Erlöse aus seiner Arbeit für wohltätige und humanitäre Zwecke spendete. Er spendete große Summen an den Baufonds des Kölner Doms und der St.-Stephans-Basilika in Pest und machte private Spenden für öffentliche Einrichtungen wie Krankenhäuser und Schulen sowie für wohltätige Organisationen wie die Leipziger Musikerrentenversicherung. Nach dem Großen Brand von Hamburg im Mai 1842 gab er Konzerte zugunsten der Obdachlosen. Um das Bedürfnis seiner Bewunderer nach einer Haarlocke zu befriedigen, schaffte sich Liszt einen Hund an, dessen Fell ihm unbemerkt als Lockenquelle diente." #1!
  
 elgar.301.t:1 "Gute Proben" #1!
 elgar.301.d:1 "Die Orchesterproben, die von einem reisenden Komponisten geleitet wurden, waren sehr vielversprechend." #1!
 elgar.301.f:1 "Ein reisender Komponist hat als Dirigent das Orchester für sich begeistert und bereits bei den Proben beeindruckt!" #1!
 elgar.301.g:1 "Gut." #1!
 elgar.302.t:1 "Mittelmässige Proben" #1!
 elgar.302.d:1 "Leider waren die Orchesterproben, die von einem reisenden Komponisten geleitet wurden, nicht so gut, wie der Konzertsaal gehofft hatte..." #1!
 elgar.302.f:1 "Ob es nun an unkooperativen Kollegen, schlecht vorbereiteten Darstellern oder den Bedingungen im Konzertsaal lag - die Proben lassen nichts Gutes für die Aufführung erwarten." #1!
 elgar.302.g:1 "Nicht gut." #1!
 elgar.303.t:1 "Eine amouröse Hingabe" #1!
 elgar.303.d:1 "Eine Affäre für eine "kleine" Gefälligkeit erregt die Gemüter." #1!
 elgar.303.f:1 "Künstler waren schon immer für ihren etwas "lockeren Lebensstil" bekannt und sorgten für den einen oder anderen zwischenmenschlichen Skandal. Die Aufmerksamkeit ruht auf einer kleinen Geste, die jedoch Sprengkraft hat. Ein reisender Komponist widmete einer verheirateten Dame eine Sonate und schenkte ihr die Originalpartitur. Bei der Frau handelt es sich jedoch um die Ehefrau eines hoch angesehenen Generals unserer Armee. Das Geschenk hat Spekulationen ausgelöst und könnte dem Ansehen des Mannes in der Öffentlichkeit schaden. Das Militär fordert Maßnahmen." #1!
 elgar.303.g:1 "Ich sehe das Problem nicht?" #1!
 elgar.303.h:1 "Ungeheuerlich!" #1!
 elgar.304.t:1 "Ein abendlicher Empfang" #1!
 elgar.304.d:1 "Unser Monarch hat einen reisenden Komponisten zu einem fürstlichen Empfang eingeladen. Der Komponist hat sich mit einer Komposition bedankt." #1!
 elgar.304.f:1 "Obwohl sich die Musikkultur im 19. Jahrhundert zunehmend vom Mäzenatentum zu befreien suchte, standen Adlige und Könige immer noch an der Spitze des Mäzenatentums, und viele musikalische Werke wurden nach wie vor Fürsten und Königen gewidmet. Andererseits bedeutete die persönliche Beziehung oft, dass Komponisten, die von Akademien und Kunstkreisen ausgeschlossen waren, die Unterstützung eines wohlhabenden Mäzens finden konnten, wenn sie dessen persönlichem Geschmack entsprachen. Eine ganze Reihe von Wagners Meisterwerken wäre zum Beispiel ohne die persönliche Unterstützung von König Ludwig II. von Bayern nicht möglich gewesen." #1!
 elgar.304.g:1 "Was für eine schöne Überraschung!" #1!
 elgar.305.t:1 "Ausverkauft!" #1!
 elgar.305.d:1 "Ein Streit um eine ausverkaufte Aufführung eines großen Komponisten hat einen öffentlichen Aufschrei ausgelöst!" #1!
 elgar.305.f:1 "Am Tag einer Premiere hatte sich eine große Menschenmenge erwartungsvoll vor dem seit Tagen ausverkauften Opernhaus versammelt; selbst der auftretende Komponist konnte nur auf dem Schwarzmarkt eine Karte bekommen. Da aber ein Theaterangestellter selbst zusätzliche Karten verkauft hatte, überstieg die Zahl der verkauften Karten die Zahl der Plätze bei weitem. Im und vor dem Theater kam es zu tumultartigen Szenen, in denen die Musik fast völlig unterging; draußen schrien die einen, um eingelassen zu werden, drinnen schrien die anderen um Ruhe. Die Anfangschöre konnten noch gespielt werden, aber dann gab das Orchester auf, und der Lärm ging erst richtig los." #1!
 elgar.305.g:1 "Wer ist dafür verantwortlich?!" #1!
 elgar.306.t:1 "Überraschende Premiere" #1!
 elgar.306.d:1 "Das Werk eines Komponisten, der in seinem Heimatland gescheitert ist, hat die Herzen unseres Publikums erobert." #1!
 elgar.306.f:1 "Es hat immer wieder Fälle gegeben, in denen die Uraufführung berühmter Werke scheiterte. Solche Erfahrungen führten oft nicht nur zu ernsthaften Selbstzweifeln und dem Ende einer Karriere, sondern auch zu einem Versuch, das gleiche Stück vor einem anderen Publikum aufzuführen. Spätere Klassiker setzten sich oft erst im zweiten oder dritten Anlauf durch. Nicht der Ort der Uraufführung, sondern der Ort des Erfolgs wurde dann als die eigentliche Initialzündung erinnert. Hector Berlioz ist ein Beispiel für einen Komponisten, der mit seinen Werken in England und Deutschland mehr Erfolg hatte als zu Hause in Frankreich." #1!
 elgar.306.g:1 "Unser Publikum ist dankbarer." #1!
 elgar.307.t:1 "Musikalische Freundschaft" #1!
 elgar.307.d:1 "Ein reisender Komponist verstand sich auf Anhieb mit seinen Mitmusikern vor Ort." #1!
 elgar.307.f:1 "Das Verhältnis zwischen ausländischen und einheimischen Musikern war nicht immer einfach. Es ging nicht nur um nationale Ressentiments und persönliche Vorurteile. Manche Orchester konnten mit dem Dirigierstil eines Gastdirigenten nicht arbeiten, manchmal erforderte die Kurzfristigkeit der Aufführungen Kompromisse, für die der Gast wiederum die einheimische Musikwelt verantwortlich machte. So mancher einheimische Komponist oder Dirigent befürchtete auch einen zu großen Einfluss des Ausländers. Doch trotz all dieser Hindernisse wuchsen die Freundschaften weiter." #1!
 elgar.307.g:1 "Eine fruchtbare Freundschaft." #1!
 elgar.308.t:1 "Musikalische Rivalität" #1!
 elgar.308.d:1 "Die örtliche Musikwelt betrachtet das Erscheinen eines reisenden Komponisten mit Unmut und Misstrauen." #1!
 elgar.308.f:1 ""Zwei große Werke für die Oper, zwei weitere für die Renaissance, zwei weitere für die Opera-Comique und noch ein weiteres für das Theatre Italien? Es scheint, dass Monsieur Donizetti uns wie ein erobertes Land behandelt, es ist eine echte Invasion. Man kann nicht mehr von den Opernhäusern von Paris sprechen, sondern nur noch von den Opernhäusern von Monsieur Donizetti.\" - Hector Berlioz" #1!
 elgar.308.g:1 "Diese Musiker sollten sich zusammenreißen!" #1!
 elgar.309.t:1 "Inspirationen" #1!
 elgar.309.d:1 "Ein ausländischer Komponist hat die Mitglieder des Staatsorchesters inspiriert." #1!
 elgar.309.f:1 "Der Einfluss von außen hat in der lokalen und nationalen Musikwelt oft einen Unterschied gemacht. Unbekannte Stücke, eine fremde Musiksprache oder das Auftauchen eines charismatischen Musikers konnten oft dazu führen, dass die einheimischen Musiker eine völlig neue Perspektive bekamen." #1!
 elgar.309.g:1 "Inspiration? Ich möchte Ergebnisse sehen!" #1!
 elgar.309.h:1 "Dies wird sich positiv auf das Orchester auswirken." #1!
 elgar.310.t:1 "Manie" #1!
 elgar.310.d:1 "Das Auftauchen eines Komponisten hat zu einer beispiellosen, fast hysterischen öffentlichen Begeisterung für sein Werk geführt. Die Menschen haben nichts anderes im Kopf!" #1!
 elgar.310.f:1 "\"Als ich früher von den Ohnmachtsanfällen hörte, die in Deutschland und besonders in Berlin ausbrachen, wenn Liszt dort auftrat, zuckte ich mitleidig mit den Schultern und dachte: das stille, sabbatistische Deutschland will sich die Gelegenheit nicht entgehen lassen, das bisschen notwendige Bewegung zu bekommen, das ihm erlaubt ist... Bei ihnen, dachte ich, geht es um das Spektakel um des Spektakels willen...So erklärte ich mir diese Lisztomanie und sah sie als Zeichen der politisch unfreien Verhältnisse jenseits des Rheins an. Aber ich habe mich doch geirrt, und es ist mir erst letzte Woche im italienischen Opernhaus aufgefallen, wo Liszt sein erstes Konzert gab... Das war wahrlich kein germanisch-sentimentales, sentimentalisierendes Berliner Publikum, vor dem Liszt spielte, ganz allein, oder vielmehr, nur von seinem Genie begleitet. Und doch, wie krampfhaft wirkte sein bloßes Erscheinen auf sie! Wie stürmisch war der Beifall, der ihm entgegenschallte!... Welch ein Beifall war das! Ein wahrer Wahnsinn, ein unerhörter in den Annalen des Furors!\" - Heinrich Heine" #1!
 elgar.310.g:1 "Sie sind also völlig abgelenkt?" #1!
 elgar.311.t:1 "Musik bringt Menschen zusammen" #1!
 elgar.311.d:1 "Ein Botschafter fragt, ob wir ihm eine Karte für ein Konzert eines Komponisten besorgen können, der bei uns zu Gast ist." #1!
 elgar.311.f:1 "Der Botschafter einer Großmacht ist ein Liebhaber eines reisenden Komponisten, der gerade in unserem Land zu Besuch ist. Er würde gerne eine Aufführung besuchen, aber es sind keine Plätze mehr frei. Er hat uns daher gebeten, unseren politischen Einfluss geltend zu machen, damit er die Aufführung doch noch besuchen kann." #1!
 elgar.311.g:1 "Haha. Nein." #1!
 elgar.311.h:1 "Geben Sie ihm einen Ehrenplatz." #1!
 elgar.312.t:1 "Attentat in der Oper!" #1!
 elgar.312.d:1 "Ein schreckliches Attentat auf einen führenden Politiker unseres Landes überschattete die heutige Opernaufführung!" #1!
 elgar.312.f:1 "Seit einiger Zeit sorgt die mangelnde Legitimität unserer Regierung für Unzufriedenheit in der Bevölkerung. Ein hinterhältiger Attentäter nutzte das Konzert eines beliebten Komponisten, um während der Aufführung einen hochrangigen Regierungsbeamten zu erschießen. [SCOPE.sCharacter('elgar_leader_victim').GetFullName] wurde dabei schwer verletzt. Der Täter ist noch auf der Flucht, das lebensgefährlich verletzte Opfer wurde sofort in das nächstgelegene Krankenhaus gebracht." #1!
 elgar.312.g:1 "Wo waren die Sicherheitskräfte?!" #1!
 elgar.313.t:1 "Ein kleines Werk" #1!
 elgar.313.d:1 "Ein kleines Werk, das der große Komponist in unserem Land komponiert hat, ist vielleicht kein großer Hit, aber es hat seine Fans gefunden." #1!
 elgar.313.f:1 "Gelegenheitswerke von Komponisten, die abseits der berühmten Werke entstanden sind, mussten nicht gleich von durchschnittlicher Qualität sein. Immer wieder haben es kleine Stücke geschafft, mehr Aufmerksamkeit zu erregen als manches Lebenswerk. Trotz seiner Fülle an Werken ist Nikolai Rimski-Korsakow in der Popkultur für den "Hummelflug" (aus Zar Saltan) und Edvard Grieg für "In der Halle des Bergkönigs" (aus Peer Gynt) bekannt - zu Unrecht, aber ein Musikhit ist ein Musikhit." #1!
 elgar.313.g:1 "Manchmal sind es die kleinen Dinge, die Freude machen." #1!
 elgar.314.t:1 "Keine Inspiration" #1!
 elgar.314.d:1 "Enttäuschend ist, dass unser Gast den Aufenthalt in unserem Land völlig uninspiriert findet." #1!
 elgar.314.f:1 "Manchmal klappt es einfach nicht." #1!
 elgar.314.g:1 "Deprimierend." #1!
 elgar.315.t:1 "Privatkonzert" #1!
 elgar.315.d:1 "Neben den offiziellen Aufführungen gab unser Komponist ein Privatkonzert im kleinen Kreis." #1!
 elgar.315.f:1 "Kleine Privatkonzerte von großen Komponisten haben eine lange Tradition. Am bekanntesten ist dafür Franz Schubert mit den nach ihm benannten Schubertiaden. Bei den ersten Schubertiaden spielte Franz Schubert am Klavier, und die Baritone Johann Michael Vogl und später Carl von Schönstein sangen seine Lieder. Zu den Abenden gehörten auch Lesungen und witzige Unterhaltungsspiele, die oft unter einem bestimmten Thema standen. Sie waren eine Mischung aus freundschaftlicher Begegnung und literarisch-musikalischem Salon." #1!
 elgar.315.g:1 "Das war schön." #1!
 elgar.315.h:1 "Da capo!" #1!
 elgar.316.t:1 "Ein talentierter Student" #1!
 elgar.316.d:1 "Der große Komponist unseres Landes hat das Talent eines der führenden Politiker unseres Landes entdeckt und erwägt, ihn in seiner Kompositionskunst zu unterrichten." #1!
 elgar.316.f:1 "Man mag sich wundern, dass Politiker überhaupt künstlerisch begabt sein können und dass sie als schlechte Menschen nicht prinzipiell völlig unempfindlich gegenüber jeglicher musikalischer Kunst sein sollten. Es gab sicherlich Komponisten mit politischen Ambitionen, aber weit weniger Politiker mit musikalischen Ambitionen. Was auch immer in diesem Politiker stecken mag, vielleicht ist seine Seele doch nicht unwiederbringlich verloren." #1!
 elgar.316.g:1 "Ein vielversprechender Kandidat." #1!
 elgar.316.h:1 "Seine Energie ist anderswo besser aufgehoben." #1!
 elgar.317.t:1 "Musikalisches Desaster" #1!
 elgar.317.d:1 "Eine Aufführung in einem unserer Konzertsäle könnte als einer der größten Misserfolge in unsere Musikgeschichte eingehen." #1!
 elgar.317.f:1 "Das Orchester war unvorbereitet, der Solist erkältet, der Dirigent nicht ausgeruht und der Komponist, in dessen Beisein die Aufführung stattfand, droht damit, unser Land von seiner nächsten Tournee abzusagen. Man kann es nicht anders beschreiben als eine Katastrophe!" #1!
 elgar.317.g:1 "Eine internationale Schande!" #1!
 elgar.318.t:1 "Skandalöses Konzert" #1!
 elgar.318.d:1 "Ein skandalöses Konzert, das mit seinen "modernen" Klängen einfach nur das Publikum in Aufruhr versetzte, spaltet nicht nur die Gesellschaft, sondern hat auch rechtliche Konsequenzen." #1!
 elgar.318.f:1 "In den damaligen Presseberichten ist von tumultartigen Ausschreitungen die Rede. Die Anhänger des Komponisten, seine Schüler und Gegner schrien sich an, bewarfen sich gegenseitig, störten die Aufführung, zerstörten das Mobiliar usw. Mehrmals stiegen empörte Konservative aus dem Publikum fluchend auf die Bühne, um den Dirigenten zu ohrfeigen. Als dieser drohte, mit Hilfe der Staatsgewalt für Ordnung zu sorgen, soll der Tumult erst richtig losgegangen sein. Dann gab es eine Ohrfeige. Ein anwesender Operettenkomponist stellte in der anschließenden gerichtlichen Nachbereitung fest: Das Klatschen der Ohrfeigen "war das Wohlklingendste, was man an diesem Abend hören konnte"." #1!
 elgar.318.g:1 "Der Pöbel hat keinen Sinn für Kultur. Das war ausgezeichnet!" #1!
 elgar.318.h:1 "Nehmen Sie das Stück sofort vom Spielplan." #1!
 elgar.319.t:1 "Zeitgeist" #1!
 elgar.319.d:1 "Das moderne Stück, das ein großer Komponist heute persönlich dirigiert, trifft genau den Geschmack der Massen." #1!
 elgar.319.f:1 "Manchmal muss man einfach Glück haben." #1!
 elgar.319.g:1 "Hervorragend!" #1!
 elgar.320.t:1 "Musikpropaganda" #1!
 elgar.320.d:1 "Einige Regierungspolitiker überlegen, ob die Musik des Komponisten, der sich derzeit bei uns aufhält, ... für Propagandazwecke ausgeliehen werden könnte." #1!
 elgar.320.f:1 "Vor allem zu Beginn des 20. Jahrhunderts und der Massengesellschaft, die die totalitären Regime dieser Zeit hervorbrachten, herrschte die Idee vor, die Massen durch Musik gefügig zu machen. Während einige Musiker auch in diesen Zeiten Widerstand gegen die Diktatur leisteten, gab es andere, die ihre Arbeit direkt in den Dienst einer Ideologie stellten oder zumindest zuließen, dass ihr Talent in den Dienst einer politischen Richtung gestellt wurde." #1!
 elgar.320.g:1 "Musik sollte frei von Politik sein." #1!
 elgar.320.h:1 "Manchmal sollte die Musik der Politik dienen." #1!
 elgar.321.t:1 "Große Komponisten unter sich" #1!
 elgar.321.d:1 "Unser musikalischer Gast traf einen großen Komponisten, der in unserem Land beschäftigt ist. In stundenlangen Gesprächen und Spaziergängen tauschten sie musikalische Gedanken und Ideen aus." #1!
 elgar.321.f:1 "Große Geister denken ähnlich." #1!
 elgar.321.g:1 "Ein historisches Treffen." #1!
  
 elgar.406.t:1 "Der Tod des Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]" #1!
 elgar.406.d:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], führende musikalische Autorität [GetPlayer.GetAltName('VON')], ist heute unerwartet gestorben. Die Musikwelt trauert um diesen großen Verlust." #1!
 elgar.406.f:1 "\"Wir, die wir hier am Grabe dieses Verstorbenen stehen, sind sozusagen die Vertreter eines ganzen Volkes, die den Untergang der einen hochgefeierten Hälfte dessen beklagen, was uns von der verschwundenen Pracht der einheimischen Kunst und der patriotischen Geistesblüte geblieben war. Der Erbe und Erweiterer des Händel'schen und Bach'schen, des Haydn'schen und Mozart'schen unsterblichen Ruhmes hat sein Leben ausgelebt, und wir stehen weinend an der zerrissenen Saite des verblichenen Stückes.\nLasst mich ihn so nennen! Denn er war ein Künstler, und was er war, war er nur durch die Kunst.\" -Franz Grillparzer" #1!
 elgar.406.g:1 "Aber wer soll jetzt das Requiem schreiben?" #1!
 elgar.407.t:1 "Komponist braucht eine Pause" #1!
 elgar.407.d:1 "Nach Abschluss der letzten Aufgabe muss [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] erst einmal Kraft und Inspiration finden, bevor [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe] die nächste Aufgabe bewältigen kann. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe|U] hat angekündigt, dass [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe] sich für einige Zeit zurückziehen wird." #1!
 elgar.407.f:1 "Nach Abschluss eines jeden Auftrags ist ein Komponist für eine gewisse Zeit nicht verfügbar. Wie lange die Pause dauert, hängt vom Alter des Komponisten ab. Junge Komponisten sind nur ein paar Wochen lang nicht verfügbar, während es bei älteren Komponisten Monate dauern kann, bis sie wieder verfügbar sind." #1!
 elgar.407.g:1 "Ah, ich verstehe, 'Inspiration'..." #1!
  
 elgar.411.t:1 "Hervorragendes Konzert" #1!
 elgar.411.d:1 "Die von unserem Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] geleitete Konzertsaison hat die Erwartungen weit übertroffen!" #1!
 elgar.411.f:1 "\"Das Publikum soll streng sein, soll pfeifen, aber sein Applaus soll mich nicht zu irgendetwas verpflichten.\" - Giuseppe Verdi" #1!
 elgar.411.g:1 "Bravo!" #1!
 elgar.412.t:1 "Mittelmäßiges Konzert" #1!
 elgar.412.d:1 "Die Konzertsaison unter der Leitung unseres Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] läuft wie gewohnt. Bisher gab es noch keine herausragenden Momente." #1!
 elgar.412.f:1 "\"Man darf sich nicht für so göttlich halten, dass man seine eigenen Werke nicht gelegentlich verbessern kann.\" - Ludwig van Beethoven" #1!
 elgar.412.g:1 "*gähn*" #1!
 elgar.413.t:1 "Schlechtes Konzert" #1!
 elgar.413.d:1 "Die bisherige Konzertsaison war nicht nur unterdurchschnittlich; die Leistungen unseres Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] gelten in diesem Jahr als besonders enttäuschend. Das Publikum verlangt nicht einmal nach einer Zugabe..." #1!
 elgar.413.f:1 "\"Nach den letzten Tönen von Gotterdammerung fühlte ich mich, als wäre ich aus dem Gefängnis entlassen worden.\" - Pjotr Tchaikovsky" #1!
 elgar.413.g:1 "Boooo!" #1!
 elgar.414.t:1 "Ein Botschafter im Publikum" #1!
 elgar.414.f:1 "\"Das Vorspiel zu Tristan und Isolde erinnert mich an das alte italienische Gemälde eines Märtyrers, dessen Eingeweide auf einer Spule langsam von seinem Körper abgewickelt werden.\" - Eduard Hanslick" #1!
 elgar.414.g:1 "Der Mann weiß nicht einmal, was Musik ist." #1!
 elgar.414.h:1 "Endlich sagt es jemand!" #1!
 elgar.415.t:1 "Ballett" #1!
 elgar.415.d:1 "Ein neues modernes Ballettstück feierte heute seine Premiere." #1!
 elgar.415.f:1 "\"Ich mag die Handlung von Der Nussknacker - überhaupt nicht.\" - Pjotr Tchaikovsky" #1!
 elgar.415.g:1 "Tanzt!" #1!
 elgar.416.t:1 "Filmmusik" #1!
 elgar.416.d:1 "Heute wurde unter der Leitung unseres Chefdirigenten eine der ersten Filmmusiken für einen Spielfilm aufgenommen." #1!
 elgar.416.f:1 "\"Filmmusik sollte zum Filmdrama die gleiche Beziehung haben wie das Klavierspiel in meinem Wohnzimmer zu dem Buch, das ich gerade lese.\" - Igor Stravinsky" #1!
 elgar.416.g:1 "Ich hatte ein Drehbuch über einen Archäologen, der vor langer Zeit nach der Bundeslade suchte, aber dann wurde es gestohlen." #1!
 elgar.417.t:1 "Dirigentensaison endet" #1!
 elgar.417.d:1 "Die letzte Aufführung der Konzertsaison ist zu Ende gegangen. Die Kritiken sind bereits in der Presse. Es sieht so aus, als hätte sich [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] gut geschlagen und Anerkennung gefunden. Die Qualität des Staatsorchesters soll sich deutlich verbessert haben - was das musikalische Ansehen unserer Nation erhöht." #1!
 elgar.417.f:1 "Komponisten, die noch keine Dirigenten sind, können die Fähigkeit zum Dirigieren durch Üben am Ende einer Konzertsitzung erwerben. Spätestens nach der dritten Saison ist der Erwerb des Dirigentenstatus sicher. Dies ist eine gute Möglichkeit, nicht-virtuose Komponisten auszubilden und sie dann auf Tournee zu schicken." #1!
 elgar.417.g:1 "Da capo!" #1!
  
 elgar.421.d:1 "Unser Komponist leidet derzeit unter einer massiven Schreibblockade." #1!
 elgar.422.t:1 "Ein Spaziergang" #1!
 elgar.422.d:1 "Bei einem Spaziergang in der Natur fand [SCOPE.sCharacter('elgar_conductor').GetFullName] etwas Inspiration, die seine Arbeit vorantrieb." #1!
 elgar.422.f:1 "Die Natur hat schon viele Komponisten inspiriert. Beethoven zog sich aufs Land zurück und sammelte dort Eindrücke, die ihn später zur 6. Sinfonie inspirierten. Gustav Mahler richtete sich sogar ein eigenes kleines Komponistenhäuschen ein." #1!
 elgar.422.g:1 "In den Fußstapfen von Beethoven." #1!
 elgar.423.t:1 "Nicht genug Komfort" #1!
 elgar.423.f:1 "Sobald man Künstlern einen wichtigen Auftrag erteilt, kommen sie mit Sonderwünschen. Eine seriöse Persönlichkeit des öffentlichen Lebens wird schnell zu einer Diva, wenn man ihr das Gefühl gibt, wichtig zu sein. Ehe man sich versieht, steigt der Ruhm diesen Leuten zu Kopf." #1!
 elgar.423.g:1 "Ihm Komfort geben" #1!
 elgar.424.t:1 "Störung" #1!
 elgar.424.f:1 "Es gibt eine Person, die [SCOPE.sCharacter('elgar_conductor').GetFullName] das Leben schwer macht. Sei es ein Fan oder einfach nur eine Person, die glaubt, durch besondere Nähe zu einer berühmten Persönlichkeit des öffentlichen Lebens politischen Einfluss gewinnen zu können. Man könnte es fast einen Groupie nennen. Die Störungen sind inzwischen so schlimm, dass [SCOPE.sCharacter('elgar_conductor').GetLastName] sich über Paraonia beschwert. Leider handelt es sich bei dem 'Fan' um eine hochrangige politische Persönlichkeit, deren öffentliche Ächtung verständliche Konsequenzen hätte." #1!
 elgar.424.g:1 "Stören Sie ihn nicht!" #1!
 elgar.424.h:1 "Er muss damit fertig werden." #1!
  
 elgar.431.t:1 "Konzert für [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_concerto_instrument_name')] in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #1!
 elgar.431.d:1 "Nach mehrmonatigen Bemühungen und künstlerischer Kreativität hat [SCOPE.sCharacter('elgar_conductor').GetFullName] sein [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_concerto_instrument_name')] Konzert heute mit ihm am Pult." #1!
 elgar.431.f:1 "Unter einem Konzert versteht man seit dem Spätbarock meist eine Instrumentalkomposition, die für einen oder mehrere Solisten in Begleitung eines Orchesters oder eines anderen Ensembles geschrieben wurde. Als Gattung der Instrumentalmusik entwickelten sich die ersten Werke aus dem Concerto grosso zu Beginn des 18. Jahrhunderts. Seine volle Ausprägung findet es in der klassischen Periode. Es besteht in der Regel aus drei Sätzen, mit einem langsamen Satz in der Mitte." #1!
 elgar.432.t:1 "Symphonie Nr. [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_symphony_number_name')] in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #1!
 elgar.432.d:1 "Heute Abend findet im Konzertsaal eine ganz besondere Aufführung statt: Die High Society hat sich versammelt, um der Premiere der neuen Symphonie von [SCOPE.sCharacter('elgar_conductor').GetFullName] in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')] beizuwohnen." #1!
 elgar.432.f:1 "Eine Symphonie ist ein Begriff für Instrumentalwerke, die im Laufe der Jahrhunderte in unterschiedlicher Form und Besetzung entstanden sind. Die klassische Form der Symphonie entwickelte sich im 18. Jahrhundert und behielt bis ins 20. Jahrhundert hinein eine dominierende Stellung im Bereich der Orchestermusik. Es handelt sich um ein Werk, das aus mehreren (meist drei oder vier, seltener fünf) Sätzen für Orchester ohne Solisten besteht. Seit Ludwig van Beethovens 9. Sinfonie kommen gelegentlich auch Vokalstimmen (Solisten und/oder Chor) vor, z. B. bei Gustav Mahler, doch bleibt die Rolle des Orchesters dominant." #1!
 elgar.433.t:1 "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_opera_name')]" #1!
 elgar.433.d:1 "Die Oper '[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_opera_name')]', die Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] nach wochen- und monatelangen Bemühungen komponiert hat, gilt als neuer Höhepunkt im musikalischen Schaffen dieses künstlerischen Genies. Die bevorstehende Premiere verspricht, ein großer Erfolg zu werden." #1!
 elgar.433.f:1 "Die Oper ist eine musikalische Theatergattung, die in der Barockzeit entstanden ist. Eine Oper besteht aus der Vertonung einer dramatischen Dichtung, die von einem Ensemble von Sängern, einem begleitenden Orchester, manchmal auch einem Chor und einem Ballettensemble aufgeführt wird. Neben dem Gesang spielen und tanzen die Darsteller auf einer Theaterbühne, die durch Malerei, Architektur, Requisiten, Beleuchtung und Bühnentechnik gestaltet wird. Die Rollen der Darsteller werden durch Masken und Kostüme visuell dargestellt. Claudio Monteverdi, der mit seinem Orfeo Maßstäbe setzte, gilt als der Urvater der Oper. Im 19. Jahrhundert setzte Richard Wagner mit seinen Opern neue Maßstäbe." #1!
  
 elgar.440.t: "Folk Music" #1!
 elgar.440.d: "Travelling through the more rural parts of the country, [SCOPE.sCharacter('elgar_conductor').GetFullName] has found a great interest in learning, writing down and collecting the dances and songs of the local people." #1!
 elgar.440.f: "The nationalism of the 19th century meant that many previously reviled forms of music suddenly aroused interest because they supposedly reflected the national soul of a country. Local historians and local musicians collected traditional songs. Some composers also took inspiration from the people and set them to music in a completely new way." #1!
 elgar.440.g: "An interesting music collection." #1!
 elgar.440.h: "[SCOPE.sCharacter('elgar_conductor').GetLastName] should concentrate on high culture instead of dealing with organ grinder music." #1!
 elgar.441.t: "Sea Shanty" #1!
 elgar.441.d: "Inspired by the deeds of Admiral [SCOPE.sCharacter('elgar_admiral').GetLastName], our composer [SCOPE.sCharacter('elgar_conductor').GetFullName] wrote a little sea shanty on the side." #1!
 elgar.441.f: "The original practical purpose of the shanty as a work song has always been paramount among seafarers. Linguistic and musical aspects, on the other hand, hardly played a role. With the onset of the Industrial Revolution, faster ships were needed. The big-bellied East Indiamen disappeared and were replaced by clippers and frigates. This ultimately led to the shanties gradually losing their practical use for seafaring and being sung only for leisure and entertainment. Musicians collected old sea shanties or were inspired by them to create their own works." #1!
 elgar.441.g: "Yo Ho!" #1!
 elgar.442.t: "March" #1!
 elgar.442.d: "Inspired by the values of General [SCOPE.sCharacter('elgar_general').GetFullName], our composer [SCOPE.sCharacter('elgar_conductor').GetFullName] wrote a new military march." #1!
 elgar.442.f: "The march flourished especially in the 19th and early 20th centuries with its nationalistic and militaristic tendencies and its revolutions. An example of this is Gioachino Rossini, who not only regularly incorporated pompous marches into his operas, but also composed a number of pieces for individual princes: including a commissioned composition for the Turkish Sultan Abdülmecid I (Marcia per il Sultano), which is still regularly performed on the program of Italian military bands. Also exemplary for the tendencies of the 19th century is the production of the Strauss family in Vienna, who composed a march at every suitable opportunity to demonstrate patriotism or loyalty to the emperor, or to honor military figures." #1!
 elgar.442.g: "New material for the army." #1!
 elgar.443.t: "Kunstlied" #1!
 elgar.443.d: "Based on the poem of a great poet, [SCOPE.sCharacter('elgar_conductor').GetFullName] has written a Kunstlied as a side work." #1!
 elgar.443.f: "In Western classical music tradition, Lied is a term for setting poetry to classical music to create a piece of polyphonic music. The term is used for any kind of song in contemporary German, but among English and French speakers, lied is often used interchangeably with 'art song' to encompass works that the tradition has inspired in other languages as well. The poems that have been made into lieder often center on pastoral themes or themes of romantic love." #1!
 elgar.443.g: "Couldn't it have been something else...?" #1!
 elgar.444.t: "Piano Sonata in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #1!
 elgar.444.d: "Piano pieces are part of the standard repertoire of classical music. As finger exercise for the next major work, [SCOPE.sCharacter('elgar_conductor').GetFullName] wrote a sonata and performed it last night at a small evening party." #1!
 elgar.444.f: "In the early 19th century, the sonata form was defined, from a combination of previous practice and the works of important Classical composers, particularly Haydn, Mozart, Beethoven, but composers such as Clementi also. It is during this period that the differences between the three- and the four-movement layouts became a subject of commentary, with emphasis on the concerto being laid out in three movements, and the symphony in four. Among works expressly labeled sonata for the piano, there are the three of Frédéric Chopin, those of Felix Mendelssohn, the three of Robert Schumann, Franz Liszt's Sonata in B minor, and later the sonatas of Johannes Brahms and Sergei Rachmaninoff." #1!
 elgar.444.g: "A classic." #1!
 elgar.445.t: "Treatise on Music" #1!
 elgar.445.d: "In recent months, [SCOPE.sCharacter('elgar_conductor').GetFullName] has been working extensively on a new treatise on orchestration and the study of musical instruments. The treatise is considered a contribution to musical innovations." #1!
 elgar.445.f: "\"It takes a lot of time to find the oceans of music, but even more to learn to navigate them.\" -Hector Berlioz" #1!
 elgar.445.g: "An important theoretical work." #1!
 elgar.446.t: "Requiem" #1!
 elgar.446.d: "An influential representative of the Catholic clergy recently asked [SCOPE.sCharacter('elgar_conductor').GetFullName] to write a new sacred work following the death of a well-respected bishop." #1!
 elgar.446.f: "The liturgical form of the funeral mass is the requiem. The term describes both the liturgy of the Holy Mass at the funeral service of the Catholic Church and church music compositions for the commemoration of the dead. It is derived from the incipit of the introit Requiem aeternam dona eis, Domine ('Eternal rest, O Lord'). The proprium of the liturgy of the Requiem corresponds to that of All Souls' Day. As the first piece of the musical mass, the Introit was usually set to music by the composers, as was the Offertory, in contrast to the sequence, which is occasionally shortened or omitted entirely for various reasons. Gloria and Credo are not set to music in the Requiem because they are not sung or spoken in the liturgy of the funeral mass." #1!
 elgar.446.g: "Requiem aeternam dona eis, Domine." #1!
 elgar.447.t: "A daring Opera" #1!
 elgar.447.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName]'s latest composition met with criticism from the censorship authorities. It is certainly of high artistic value, but could cause uproar. The country's intelligentsia is already up in arms." #1!
 elgar.447.f: "In much of the 19th century, even the greatest composers of their time had to submit to censorship. The many different settings of 'Figaro' were considered highly critical because of the revolutionary theme. Suspected blasphemy or other immoralities were also a thorn in the side of the censors. At a certain point, some composers could no longer stand the harassment and left their sponsor." #1!
 elgar.447.g: "Art should uplift, not cause uproar." #1!
 elgar.447.h: "We should relax the censorship a bit." #1!
  
 elgar.448.t:1 "Komponistenduell" #1!
 elgar.448.d:1 "[SCOPE.sCharacter('rival_composer_scope').GetFullName], ein Komponist aus [SCOPE.sCountry('rival_composer_country_scope').GetName], bezeichnete in einem Anfall der für dieses Land typischen Arroganz unseren Komponisten [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] als 'unbekannte Nummer' und stellte den musikalischen Status unserer Nation grundsätzlich in Frage." #1!
 elgar.448.f:1 "\"Die Zersplitterung und Beliebigkeit unseres Musikstils wurde durch Mendelssohns Bemühen, einen unklaren, fast bedeutungslosen Inhalt so interessant und verblüffend wie möglich auszudrücken, wenn nicht herbeigeführt, so doch wenigstens auf den höchsten Gipfel gesteigert. Hatte der letzte in der Kette unserer wahren musikalischen Helden, Beethoven, den höchsten Wunsch und die wunderbare Fähigkeit zum klarsten, sichersten Ausdruck eines unaussprechlichen Inhalts durch scharf geschnittene, plastische Gestaltung seiner Klangbilder, so verwischt Mendelssohn dagegen diese erworbenen Gestalten in seinen Produktionen zu einem sich auflösenden, phantastischen Schattenbild, dessen unbestimmter Farbenschimmer willkürlich unsere kapriziöse Phantasie anregt, aber unsere rein menschliche innere Sehnsucht nach klarer künstlerischer Anschauung kaum nur mit der Hoffnung auf Erfüllung berührt.\" -Richard Wagner über Felix Mendelssohn" #1!
 elgar.448.g:1 "Wir nehmen die Herausforderung an." #1!
 elgar.448.h:1 "Wir können dieses Duell nicht überleben." #1!
 elgar.449.t:1 "Sieg im Komponistenduell" #1!
 elgar.449.d:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] hat sich als weitaus berühmterer und fähigerer Komponist erwiesen als sein schmieriger Rivale und damit den Ruf unseres Landes als kulturelles Zentrum bewahrt." #1!
 elgar.449.f:1 "\"Nichts zeigt deutlicher die Macht Wagners und die Art von Sturm und Drang, die er entfesselt hat, als diese Dekadenz, die sein Werk tatsächlich geweiht hat und die sich seit seiner Zeit immer weiter entwickelt hat. Wie mächtig muss dieser Mann gewesen sein, dass er eine im Wesentlichen musikalische Form (die Oper) mit einer solchen Energie zerstört hat, dass wir fünfzig Jahre nach seinem Tod immer noch unter dem Müll und Lärm des Musikdramas taumeln! Denn das Prestige der Synthese der Künste ist immer noch lebendig. Ist es das, was man Fortschritt nennt? Vielleicht. Es sei denn, die Komponisten finden die Kraft, dieses schwere Erbe abzuschütteln, indem sie Verdis bewundernswerte Aufforderung befolgen: Kehren wir zu den alten Zeiten zurück, und das wird der Fortschritt sein.\" -Igor Stravinsky über Richard Wagner" #1!
 elgar.449.g:1 "Es ist nun klar, welches Land die dominierende Kulturnation ist!" #1!
 elgar.450.t:1 "Niederlage im Komponistenduell" #1!
 elgar.450.d:1 "Leider wurde unser Komponist von seinem ausländischen Konkurrenten im Wettbewerb besiegt. Die ganze Welt ist nun überzeugt, dass wir musikalisch ins Hintertreffen geraten sind!" #1!
 elgar.450.f:1 "\"Ist Wagner überhaupt ein Mensch? Ist er nicht eher eine Krankheit? Er macht alles krank, was er anfasst, er hat die Musik krank gemacht.\" -Friedrich Nietzsche über Richard Wagner" #1!
 elgar.450.g:1 "Es ist nun klar, welches Land die dominierende Kulturnation ist..." #1!
  
 elgar.451.t:1 "Der Maestro reist nach [SCOPE.sCountry('elgar_composer_destination_scope').GetNameNoFlag]" #1!
 elgar.451.d:1 "Unser Komponist [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] hat alle Vorbereitungen abgeschlossen. Das erste Ziel der zweieinhalbjährigen Konzertreise wird [SCOPE.sCountry('elgar_composer_destination_scope').GetName] sein." #1!
 elgar.451.f:1 "\"Wenn die Welt jemals untergehen sollte, gehe ich nach Wien, denn dort passiert alles fünfzig Jahre später.\" - Gustav Mahler" #1!
 elgar.451.g:1 "Schicke uns eine Postkarte!" #1!
 elgar.452.t:1 "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] kommt [GetPlayer.GetAltNameNoFlag('IN')] an" #1!
 elgar.452.d:1 "Ein reisender Komponist machte auf seiner aktuellen Tournee in unserem Land Halt und beschloss, eine Weile zu bleiben." #1!
 elgar.452.f:1 "[SCOPE.sCharacter('elgar_composer_scope').GetFullName] ist ein Komponist aus [SCOPE.sCharacter('elgar_composer_scope').GetHomeCountry.GetName] mit einem Renommee von [SCOPE.sCharacter('elgar_composer_scope').MakeScope.GetVariable('elgar_composer_experience').GetValue|V0]. Bislang hat [SCOPE.sCharacter('elgar_composer_scope').GetSheHe] bereits [SCOPE.sCharacter('elgar_composer_scope').MakeScope.GetVariable('elgar_composer_num_tours_var').GetValue|V0] Touren gemacht. Von [SCOPE.sCharacter('elgar_composer_scope').GetHerHis]en zahlreichen Werken fallen [SCOPE.sCharacter('elgar_composer_scope').MakeScope.GetVariable('elgar_composer_num_compositions_var').GetValue|V0] besonders auf.[SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_is_composer_virtuoso_type')][SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_is_composer_conductor_type')]" #1!
 elgar_is_composer_virtuoso_loc:1 " [ROOT.GetCharacter.GetSheHe|U] ist ein exzellenter #V Virtuoso#!." #1!
 elgar_is_composer_conductor_loc:1 " [ROOT.GetCharacter.GetSheHe|U] gilt als ein berühmter #V Dirigent#!." #1!
 elgar.452.g:1 "Willkommen, willkommen!" #1!
 elgar.453.t:1 "Reisender Komponist reist ab" #1!
 elgar.453.d:1 "Nach einem mehrwöchigen Aufenthalt und einigen Aufführungen, die ihm die Anerkennung der einheimischen Bevölkerung einbrachten, setzte der reisende Komponist seine Tournee fort." #1!
 elgar.453.f:1 "Wohin ein Komponist geht, hängt von einer ganzen Reihe von Faktoren ab. Ein entscheidendes Kriterium sind Opernhäuser und die Nähe zum letzten Standort. Aber auch Faktoren wie Kulturtechniken, das Vorhandensein eines Zentrums der Kunst (Impressionismus, Expressionismus, Jugendstil) oder das Vorhandensein eines Konservatoriums spielen eine Rolle. Komponisten meiden Orte, an denen kürzlich eine Aufführung eines konkurrierenden Komponisten stattgefunden hat." #1!
 elgar.453.g:1 "Ich hoffe, Sie bald wiederzusehen!" #1!
 elgar.455.t:1 "Komponist kehrt von Tournee zurück" #1!
 elgar.455.d:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] ist von [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]er Tour zurückgekehrt. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe|U] hat [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]e Spuren in der Musikwelt hinterlassen und [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]en Ruf erheblich verbessert." #1!
 elgar.455.f:1 "Tourneen dienen ausschließlich dazu, das Ansehen eines Komponisten zu steigern. Je nach den Fähigkeiten eines Komponisten wird dies unterschiedlich sein. Eigene Kompositionen spielen eine Rolle, aber auch Charaktereigenschaften - innovative oder ehrgeizige Charaktere haben Vorteile. Komponisten mit der Eigenschaft Dirigent und der Eigenschaft Virtuose erhalten einen besonderen Bonus." #1!
 elgar.455.g:1 "Willkommen zurück, Maestro." #1!
  
 elgar.501.t: "Canto degli Italiani" #1!
 elgar.501.d: "In einem Klima von Volksaufständen um die Einigung und Unabhängigkeit Italiens hat der 20-jährige Student und Patriot Goffredo Mameli ein inspirierendes Lied geschrieben, das er „Das Lied der Italiener“ nannte. Es ist in kurzer Zeit sehr populär geworden." #1!
 elgar.501.f: "Il Canto degli Italiani (Das Lied der Italiener) ist den Italienern vor allem als „Inno di Mameli“ (Mamelis Hymne), nach dem Autor des Textes, oder als „Fratelli d’Italia“ (Brüder Italiens), nach der ersten Zeile, bekannt. Der Text wurde von Michele Novaro vertont. Die Hymne erfreute sich während des Risorgimento und in den folgenden Jahrzehnten großer Beliebtheit. Sie wurde auch in Genua auf Flugblättern gedruckt und am 10. Dezember veröffentlicht: Die Demonstration war offiziell dem 101. Jahrestag der Vertreibung der österreichischen Mächte aus der Stadt gewidmet – tatsächlich war dies jedoch ein Vorwand, um gegen die ausländische Besetzung Italiens zu protestieren und Carlo Alberto dazu zu bewegen, sich der italienischen Freiheitsbewegung anzuschließen. Bei dieser Gelegenheit wurde die Trikolore gezeigt und Mamelis Hymne zum ersten Mal öffentlich gesungen." #1!
 elgar.501.g: "Es sollte ein Gesetz dagegen geben..." #1!
 elgar.501.h: "Fratelli d'Italia, l'Italia s'è desta!" #1!
 elgar.503.t: "Deutschlandlied" #1!
 elgar.503.d: "Als Antwort auf Frankreichs erneuerten Expansionsdrang, der den Rhein als natürliche Grenze betrachtet, schrieb der Dichter Hoffmann von Fallersleben ein Lied, das weithin als 'Deutschlandlied' bekannt wurde."
 elgar.503.f: "Das Lied der Deutschen, auch bekannt als das Deutschlandlied, wurde von August Heinrich Hoffmann von Fallersleben auf Helgoland geschrieben. Der konkrete Anlass für Hoffmann, das Lied zu verfassen, waren französische Gebietsansprüche auf das Rheinland während der Rheinkrise. Mit dem Lied wies er diese Ansprüche zurück, wie es auch andere Rheinlieder der Zeit taten. Er ergänzte dies durch weitere Ideen, insbesondere die der deutschen Einheit, die allein die Voraussetzung für die Verteidigung gegen feindliche Angriffe jeglicher Größe bieten konnte. Der Dichter schuf sein Werk ausdrücklich zur Melodie der alten Kaiserhymne 'Gott erhalte Franz, den Kaiser' von Joseph Haydn (1797). Erst im Ersten Weltkrieg erhielt das Lied größere Bedeutung. Seit 1952 ist die dritte Strophe der Text der deutschen Nationalhymne."
 elgar.503.g: "Deutscher Wein und deutsches Lied!"
 elgar.503.h: "Deutschland, Deutschland über alles!"
 elgar.503.i: "Sie irren sich, das Lied heißt 'Gott erhalte Franz den Kaiser'."
 elgar.504.t: "Paganinis Tod"
 elgar.504.d: "Der Tod des berühmten Geigenvirtuosen Niccolò Paganini löste eine Kontroverse um seine Beerdigung aus."
 elgar.504.f: "Niccolò Paganini war ein italienischer Geiger und Komponist. Er war der gefeiertste Geigenvirtuose seiner Zeit und prägte die moderne Violintechnik maßgeblich. Seine 24 Capricen für Solo-Violine op. 1 gehören zu seinen bekanntesten Werken und inspirierten viele prominente Komponisten. Im Mai 1840 schickte der Bischof von Nizza Paganini einen örtlichen Priester, um die Sterbesakramente zu spenden. Paganini hielt dies für verfrüht und lehnte ab. Eine Woche später, am 27. Mai 1840, starb der 57-Jährige an inneren Blutungen, bevor ein Priester gerufen werden konnte. Wegen dieses Umstands und seiner angeblichen Verbindung mit dem Teufel verweigerte die Kirche ihm ein katholisches Begräbnis in Genua. Dies führte zu einer öffentlichen Debatte, wie mit Paganini umzugehen sei. Einige fordern, Druck auf die Kirche auszuüben und Paganini in Genua beizusetzen, seinem Status entsprechend und um sein Erbe zu sichern. Dies würde jedoch einen offenen Konflikt mit den kirchlichen Autoritäten bedeuten."
 elgar.504.g: "Gebt ihm ein würdiges Begräbnis und sichert sein Vermächtnis."
 elgar.504.h: "Greift in diese heikle Angelegenheit nicht ein."
 elgar.505.t: "Nabucco"
 elgar.505.d: "Giuseppe Verdi hat mit seiner neuesten Oper den größten Erfolg seiner bisherigen Karriere gefeiert. Gleichzeitig entfacht sie das Nationalgefühl des italienischen Volkes."
 elgar.505.f: "Nabucco ist eine Oper in vier Akten, komponiert 1841 von Giuseppe Verdi auf ein italienisches Libretto von Temistocle Solera. Die bekannteste Nummer der Oper ist der 'Chor der hebräischen Gefangenen', der heute in vielen Opernhäusern regelmäßig als Zugabe wiederholt wird. Nabucco gilt als das Werk, das Verdis Ruf als Komponist dauerhaft begründete. Er selbst sagte: 'Das ist die Oper, mit der meine künstlerische Laufbahn wirklich beginnt. Und obwohl ich viele Schwierigkeiten zu überwinden hatte, ist es sicher, dass Nabucco unter einem glücklichen Stern geboren wurde.' Die Geschichte der Gefangenschaft der Juden in Babylon wurde in ganz Italien zu einem Durchbruch, nicht zuletzt, weil sich die Italiener im Zeitalter des Nationalismus von fremden Mächten beherrscht fühlten. Inwieweit Verdi tatsächlich italienische Nationalgefühle mit Nabucco bediente, ist bis heute umstritten."
 elgar.505.g: "Va pensiero ..."
 elgar.505.h: "Schon wieder diese rebellischen Italiener."
 elgar.507.t: "Aida"
 elgar.507.d: "Anlässlich der Eröffnung des Suezkanals brachte Giuseppe Verdi seine ägyptisch geprägte Oper Aida zur Uraufführung – mit leichter Verzögerung."
 elgar.507.f: "Aida ist eine Oper in vier Akten von Giuseppe Verdi auf ein italienisches Libretto von Antonio Ghislanzoni, basierend auf einem Szenario, das oft dem französischen Ägyptologen Auguste Mariette zugeschrieben wird, obwohl auch Temistocle Solera als Urheber gilt. Isma'il Pascha, Khedive von Ägypten, beauftragte Verdi mit der Komposition der Oper und zahlte ihm 150.000 Francs, doch die Premiere verzögerte sich. Als Aida schließlich in Kairo uraufgeführt wurde, war der Erfolg groß. Die Kostüme und das Bühnenbild wurden von Auguste Mariette entworfen und in Paris gefertigt. Obwohl Verdi der Kairoer Premiere fernblieb, war er unzufrieden, dass das Publikum nur aus geladenen Würdenträgern, Politikern und Kritikern bestand, aber nicht aus dem allgemeinen Volk. Deshalb betrachtete er die italienische (und europäische) Premiere in der Mailänder Scala, bei der er in allen Phasen stark eingebunden war, als die eigentliche Uraufführung."
 elgar.507.g: "Ein Triumph für Italien!"
 elgar.507.h: "Ein Triumph für [ROOT.GetCountry.GetAltName('AKK')]!"
 elgar.509.t: "Franz Schubert"
 elgar.509.d: "13 Jahre nach seinem Tod wurde Franz Schuberts 5. Sinfonie der Öffentlichkeit vorgestellt."
 elgar.509.f: "Die Fünfte Sinfonie in B-Dur gilt als die gelungenste seiner Jugendsinfonien und wird oft als Schuberts erste 'reife' Sinfonie bezeichnet. Ihre Ausarbeitung ist von kammermusikalischer Perfektion, das Orchester ist kleiner besetzt als bei allen anderen Sinfonien, und die Proportionen sind fein aufeinander abgestimmt. Sie kann als Schuberts produktive Auseinandersetzung mit Mozarts Sinfonik verstanden werden und offenbart Schuberts Eigenständigkeit. Laut Schuberts eigenen Einträgen entstand das Werk zwischen September und 3. Oktober 1816; es wurde zu einer Zeit komponiert, als Schubert nach seiner eigenen musikalischen Sprache suchte. Die erste Aufführung fand mit einem kleinen Liebhaberorchester 1816 in Wien statt; die erste öffentliche Aufführung erfolgte jedoch erst am 17. Oktober 1841, dreizehn Jahre nach Schuberts Tod, unter der Leitung von Michael Leitermayer."
 elgar.509.g: "Selbst vom Himmel aus erfreut uns Schubert mit seiner Musik."
 elgar.510.t: "Kontroverse um Poliuto"
 elgar.510.d: "Ein unüberbrückbarer Streit zwischen dem König und dem Komponisten Donizetti droht dessen Entlassung auszulösen."
 elgar.510.f: "Von 1829 bis 1838 war Gaetano Donizetti Musikdirektor der Königlichen Theater von Neapel und, trotz Reisen und Aufträgen in anderen Staaten, de facto die wichtigste kulturelle Persönlichkeit des Königreichs und sein berühmtester Vertreter. In Neapel entstanden eine ganze Reihe berühmter Donizetti-Opern, die die Position des Königreichs beider Sizilien als führenden Musikstandort festigten. Dennoch musste Donizetti immer wieder gegen die neapolitanische Zensur ankämpfen, die seine Libretti entstellte oder ganze Opern verbot. Im jüngsten Streit griff der König selbst ein, um die Aufführung der Oper 'Poliuto' zu verhindern. Nach Jahren des Streits mit der Zensur ist Donizetti des Kampfes müde und bereitet seine Flucht nach Paris vor. Die politische Elite steht geschlossen hinter dem König; Donizetti an seinen Plänen zu hindern, würde nicht nur das politische und gesellschaftliche Gefüge erschüttern, sondern auch die Autorität und das Ansehen des Königs massiv schädigen."
 elgar.510.g: "Der König hat gesprochen, er kann seine Sachen packen."
 elgar.510.h: "Wir müssen alles tun, um Donizetti am Weggang zu hindern!"

 elgar.511.t: "Les Martyres, 1840"
 elgar.511.d: "Der italienische Komponist Gaetano Donizetti ist in Paris angekommen und hat dort seine Oper 'Les Martyres' aufgeführt, die vom Publikum äußerst positiv aufgenommen wurde."
 elgar.511.f: "Poliuto ist eine tragische Oper in drei Akten von Gaetano Donizetti nach einem italienischen Libretto von Salvadore Cammarano, das auf Pierre Corneilles Drama Polyeucte aus den Jahren 1641/42 basiert. Es spiegelt das Leben des frühchristlichen Märtyrers Polyeukt wider. Von einem Autor wird sie als Donizettis 'persönlichste Oper' bezeichnet, mit Musik, die 'zu den besten zählt, die Donizetti je komponierte'. Poliuto wurde 1838 für Aufführungen am Teatro San Carlo in Neapel geschrieben. Kurz vor Beginn der Proben untersagte König Ferdinand II. jedoch die Aufführung, da er das Martyrium eines christlichen Heiligen nicht auf der Bühne sehen wollte. Verärgert über diese Entscheidung und mit einem Auftrag für die Pariser Oper in Aussicht, zahlte Donizetti die Vertragsstrafe für die  Nichtaufführung und verließ Neapel in Richtung Paris. Dort überarbeitete er Poliuto zu 'Les Martyres' mit französischem Text."
 elgar.511.g: "Nicht schlecht für einen Italiener."

 elgar.512.t: "Das Stabat Mater"
 elgar.512.d: "Gaetano Donizetti ist nach Bologna gereist, um die Uraufführung von Gioachino Rossinis Stabat Mater zu dirigieren. Die Aufführung war ein voller Erfolg."
 elgar.512.f: "Als Donizetti für das Stabat Mater nach Bologna kam, besuchte Rossini die dritte Aufführung, und die beiden – beide ehemalige Schüler des Konservatoriums von Bologna – trafen sich erstmals. Rossini erklärte, Donizetti sei 'der einzige Maestro in Italien, der mein Stabat so dirigieren könne, wie ich es mir vorstelle'. Freunde, darunter sein Schwager Antonio Vasselli (genannt Totò), versuchten immer wieder, ihn zu einer akademischen Position in Bologna zu überreden, anstatt das Engagement am Wiener Hof anzunehmen, allein schon, um ihm eine feste Basis zum Arbeiten und Lehren zu geben und nicht ständig erschöpfende Reisen zwischen den Städten machen zu müssen. Donizetti berichtete über die Reaktion des Publikums: 'Die Begeisterung ist unbeschreiblich. Selbst bei der Generalprobe, die Rossini besuchte, wurde er von über 500 Personen nach Hause begleitet. Dasselbe in der Premierenacht, unter seinem Fenster, da er nicht im Saal erschien.'"
 elgar.512.g: "Rossini & Donizetti – ein himmlisches Paar!"

 elgar.513.t: "Wird Donizetti wahnsinnig?"
 elgar.513.d: "Donizettis zunehmender geistiger Verfall führte dazu, dass er in Paris in eine Irrenanstalt eingewiesen wurde."
 elgar.513.f: "Donizetti berichtete in seinen Briefen über einen langen Zeitraum, beginnend in den 1820er Jahren, von Kopfschmerzen, gelegentlichen Fieberschüben und depressiven Verstimmungen. Die enorme Arbeitsbelastung und die anstrengenden Reisen, besonders nach seinem Umzug nach Paris und später nach Wien, führten ab 1842/43 zu zunehmenden Erschöpfungserscheinungen. Kopfschmerzen und Fieberanfälle wurden von Schwindel und 'Kopfempfindungen' begleitet. 1845 verschlechterte sich Donizettis Gesundheit rapide, er brach auf offener Straße in Paris zusammen. Die Ärzte verboten ihm das Komponieren – was ihn noch mehr deprimierte. Schließlich wurde er unter Vorspiegelung falscher Tatsachen in die Anstalt von Ivry-sur-Seine gelockt und dort gegen seinen Willen festgehalten. Der kranke Komponist erkannte  schnell seine Lage als 'Gefangener' und schrieb verzweifelte Briefe an Freunde und Verwandte, in denen er um Hilfe bat."
 elgar.513.g: "Vielleicht ist es besser so."
 elgar.513.h: "Holt ihn aus der Anstalt und gebt ihm Ruhe in Bergamo."

 elgar.514.f: "Es dauerte volle 17 Monate, bis Donizetti aus der Anstalt gerettet werden konnte. Eine geplante Abreise wurde von Ärzten, aber auch vom Polizeipräfekten von Paris aus unerfindlichen Gründen verhindert. Erst durch diplomatischen Druck konnte der inzwischen völlig apathische Komponist von seinem Bruder Francesco und seinem Neffen Andrea zurückgeholt werden. Die Tochter der Baronin Rosa Rota-Basoni spielte dem Komponisten täglich Klavier und sang Arien aus seinen Werken, sein Freund Dolci sprach mit ihm im bergamaskischen Dialekt und er erhielt Besuch vom Tenor Rubini, aber Donizetti zeigte keine Reaktionen mehr. Donizetti starb eine Woche nach einem Schlaganfall mit Halbseitenlähmung, hohem Fieber und anschließenden Infektionen. Die Obduktion ergab Symptome einer 'überstandenen' Meningitis und eines teilweise beschädigten, entzündeten Rückenmarks."
 elgar.514.g: "Ein tragischer Tod."

 elgar.515.t: "Donizetti geheilt"
 elgar.515.d: "Der Komponist hat sich nach einer intensiven Kur erholt und will mit neuem Lebensmut wieder komponieren."
 elgar.515.f: "Unter Druck unserer Regierung wurde Donizetti rasch aus der Anstalt entlassen. Auf ärztliche Anweisung sollte er mehrere Monate in seiner Heimatstadt Bergamo unter besten Bedingungen verbringen. Die Rückkehr aufs Land, die Befreiung von Stress und Druck und die Rückbesinnung auf seine Wurzeln zeigten nach vielen Monaten Wirkung. Donizetti, wochenlang apathisch, reagierte auf eine seiner eigenen Arien, gesungen von Giovanna, der Tochter der Baronin Rosa Rota-Basoni. Gespräche mit Familienmitgliedern im heimischen Dialekt zeigten täglich Fortschritte. Nach Jahren der Therapie scheint der einst todkranke Komponist wieder ins Leben zurückgekehrt zu sein."
 elgar.515.g: "Ein medizinisches Wunder."

 elgar.516.t: "Liszt gegen Thalberg"
 elgar.516.d: "Zwei der berühmtesten Pianisten traten in Paris gegeneinander an: Franz Liszt forderte den wichtigsten lebenden Pianisten, Sigismund Thalberg, heraus."
 elgar.516.f: "Im Winter 1835/36 debütierte Sigismund Thalberg bei einem Privatkonzert des Sekretärs der österreichischen Botschaft in Paris. Er wurde von den anwesenden Künstlern, darunter Rossini und Meyerbeer, begeistert empfangen und als Erfinder eines neuen Klavierstils gefeiert. Während Liszts Konzerte in Lyon etwa 500–600 Francs einbrachten, verdiente Thalberg 10.000 Francs mit einem einzigen Konzert im Italienischen Theater. Bevor Thalberg bei seinem zweiten Aufenthalt in Paris auftrat, veröffentlichte Liszt eine von Anspielungen und Polemik durchzogene Rezension. Laut Liszt sei Thalbergs Erfolg allein Propaganda zu verdanken. Thalberg trat ab Februar 1837 erneut in Paris auf und wurde wieder gefeiert. Am 31. März traten beide Künstler bei einer Wohltätigkeitsveranstaltung der Prinzessin Belgiojoso gemeinsam auf."
 elgar.516.g: "Thalberg war besser."
 elgar.516.h: "Liszt war besser."
 elgar.517.t: "Von der Wiege zum Grabe"
 elgar.517.d: "In Rom vollendete Franz Liszt sein letztes sinfonisches Gedicht. Die Musikwelt weiß nicht recht, was sie von diesem jüngsten 'Fehler' des Komponisten halten soll."
 elgar.517.f: "In seinen späten Lebensjahren wandte sich Liszt zunehmend der sakralen Musik zu. Sein letztes Tongedicht, 'Von der Wiege bis zum Grabe', unterscheidet sich daher von allen Vorgängern. Liszt ließ sich von einer Zeichnung des ungarischen Malers Mihály Zichy inspirieren. Große Abschnitte des Werks benötigen kein großes Orchester, besonders der Beginn klingt wie Kammermusik; es entstehen viele Klanginseln mit wenig musikalischem Material, und Solopassagen sind vor allem am Ende der Sätze nicht selten. Die verwendeten Harmonien sind ein Vorbote kommender Zeiten. Zu Lebzeiten wurde das Werk von Musikkritikern als 'Fehler eines alten Mannes' bezeichnet." 
 elgar.517.g: "Spätere Generationen werden es verstehen."
 elgar.518.t: "Lohengrin" #1!
 elgar.518.d: "Die Uraufführung von Richard Wagners 'Lohengrin' war nicht nur ein voller Publikumserfolg – sie löste eine regelrechte Wagner-Begeisterung in Deutschland aus."
 elgar.518.f: "Lohengrin ist eine romantische Oper in drei Akten des deutschen Komponisten Richard Wagner. Mit Lohengrin schuf Wagner die neue Opernform des durchkomponierten Musikdramas. Die Komposition ist nicht in einzelne Nummern unterteilt, sondern wird Akt für Akt ohne Unterbrechung gespielt. Wagner grenzt sich damit deutlich von der konventionellen Nummernoper mit Arien, Rezitativen und Chören ab. Um das Innenleben der Bühnenfiguren in klar lesbare musikalische Motive zu übersetzen, verwendete Wagner Leitmotive (z. B. das Gralsmotiv und das Frageverbot-Motiv). Die Oper inspirierte weitere Kunstwerke. König Ludwig II. von Bayern benannte sein Schloss Neuschwanstein nach dem Schwanenritter."
 elgar.518.g: "Inspirierend."

 elgar.519.t: "Kunstwerk der Zukunft"
 elgar.519.d: "Während seines Aufenthalts in der Schweiz verfasste der Komponist Richard Wagner zahlreiche Schriften über Musik und Kunst, die für das deutsche und internationale Kunstverständnis wegweisend werden sollten."
 elgar.519.f: "Das 'Kunstwerk der Zukunft' ist eine kunsttheoretische Schrift von Richard Wagner, die er zwischen 1849 und 1852 in Zürich verfasste. Wie schon in seiner Schrift 'Die Kunst und die Revolution' beklagt Wagner den Verfall der Künste und entwickelt sein Modell der neuen Einheit der Künste, das 'Gesamtkunstwerk'. Wagner vertritt die Überzeugung, dass die griechische Kunst in Religion und Mystik eingebettet war und dass mit der Zerstörung der Religion auch die Kunst ihren Zusammenhang verlor und in 'Einzelkünste' (Drama, Musik, Tanz) zerfallen musste. Er beklagt, dass die Musik als bloße Begleitung des Wortes verkümmert sei. Im weiteren Verlauf geht Wagner ausführlich auf die Entwicklung der verschiedenen Künste ein, vom Idealzustand der Antike bis zum Verfall seiner Zeit. In seinem nächsten und wichtigsten Werk, 'Oper und Drama', erklärt Wagner dann sehr präzise (und sehr theoretisch), wie er sich die optimale 'Vereinigung' von Musik und Dichtung vorstellt. Kurz darauf begann er mit der praktischen Umsetzung und schrieb und komponierte nach jahrelanger Arbeit seinen 'Ring des Nibelungen' als das Musikdrama schlechthin."
 elgar.519.g: "Wer soll diese schwer verständlichen Schachtelsätze bloß verstehen?"

 elgar.520.t: "Tristan und Isolde"
 elgar.520.d: "Tristan und Isolde ist eine Oper in drei Akten von Richard Wagner auf ein deutsches Libretto des Komponisten, das sich weitgehend auf den Versroman Tristan und Isolde von Gottfried von Straßburg aus dem 12. Jahrhundert stützt. Die Oper war enorm einflussreich auf westliche Komponisten der klassischen Musik und inspirierte direkt Komponisten wie Gustav Mahler, Richard Strauss, Alban Berg, Arnold Schönberg und Benjamin Britten. Andere wie Claude Debussy, Maurice Ravel und Igor Strawinsky entwickelten ihren Stil im Gegensatz zu Wagners musikalischem Erbe. Viele sehen Tristan als Meilenstein auf dem Weg weg von der klassischen Harmonik und Tonalität und als Grundlage für die Entwicklung der Musik im 20. Jahrhundert."
 elgar.520.f: "\"Das Werk, das stets meine größte Bewunderung erregt hat, ist Tristan. Ein schauerndes Staunen erfasst mich vor diesem gewaltigen Bau, und es erscheint mir immer noch unglaublich, wie ein Mensch so etwas ersinnen und verwirklichen konnte. Ich halte den zweiten Akt für eine der erhabensten Schöpfungen des Geistes überhaupt. Dieser zweite Akt ist wunderbar, wunderbar, unsagbar wunderbar.\" – Giuseppe Verdi"

 elgar.521.t: "Richard-Wagner-Festspiele"
 elgar.521.d: "Die Gründung von Richard Wagners Festspielhaus gilt als einer der Höhepunkte der Musikgeschichte des 19. Jahrhunderts."
 elgar.521.f: "Die Bayreuther Festspiele sind ein jährlich stattfindendes Musikfestival, bei dem Opern des deutschen Komponisten Richard Wagner aufgeführt werden. Wagner selbst entwickelte und förderte die Idee eines eigenen Festivals zur Präsentation seiner Werke, insbesondere seines monumentalen Zyklus 'Der Ring des Nibelungen' und 'Parsifal'. Die Aufführungen finden in einem eigens dafür errichteten Theater, dem Bayreuther Festspielhaus, statt. Wagner überwachte persönlich Entwurf und Bau des Theaters, das viele architektonische Neuerungen enthielt, um die riesigen Orchester und seine besonderen Vorstellungen von Inszenierung zu ermöglichen. Das Festival ist zu einem Wallfahrtsort für Wagnerianer und Klassikliebhaber geworden. Zu den Gästen dieses einzigartigen Musikereignisses zählten Kaiser Wilhelm, Dom Pedro II. von Brasilien, König Ludwig, weitere Adelige sowie der Philosoph Friedrich Nietzsche und berühmte Komponisten wie Anton Bruckner, Edvard Grieg, Pjotr Tschaikowski, Franz Liszt und der junge Arthur Foote."
 elgar.521.g: "Ein Höhepunkt deutscher Kultur!"

 elgar.523.t: "Tannhäuser-Skandal"
 elgar.523.d: "Eine Aufführung von Richard Wagners Tannhäuser löste einen echten Skandal aus, der ganz Paris empörte. Neben Wagners Bruch mit den Gepflogenheiten der französischen Oper spielten auch die Spannungen zwischen der deutschen und der französischen Musikwelt eine Rolle."
 elgar.523.f: "Wagner hatte es in Paris immer schwer, nicht nur wegen der Konkurrenz mit dem beliebten Giacomo Meyerbeer. Um seine Oper Tannhäuser an der Grand Opéra unterzubringen, musste er sich französischen Gepflogenheiten beugen – etwa der Einbindung eines Balletts. Doch Wagner widersetzte sich den Vorgaben vehement und fügte nur ein Bacchanal ein. Gleichzeitig machte er sich mit quälend langen Proben bei den Musikern unbeliebt. Die Premiere endete im Skandal: Die Herren des Pariser 'Jockey Club' fühlten sich betrogen, als das Ballett nach der Ouvertüre nicht erschien. Sie kamen nicht wegen der Musik, sondern um die schönen Frauen zu sehen und später in der Garderobe zu besuchen. Da sie nicht bekamen, was sie wollten, sabotierten sie die Aufführung mit Pfeifen und Rufen. Auch am nächsten Tag wurde es nicht besser: Die Pariser Presse zerriss die Aufführung. Nicht nur Frankreich, sondern auch Wagners Freunde und Feinde in Deutschland werden unsere Reaktion genau beobachten."
 elgar.523.g: "Er sollte nie wieder in Paris auftreten!"
 elgar.523.h: "Wir müssen Herrn Wagner besänftigen."

 elgar.524.t: "Holberg-Suite"
 elgar.524.d: "Edvard Griegs Holberg-Suite, die in Oslo uraufgeführt wurde, entpuppte sich nicht nur als musikalisches Meisterwerk, sondern inspirierte auch das norwegische Nationalgefühl."
 elgar.524.f: "Die Holberg-Suite, mit dem Untertitel 'Suite im alten Stil', ist eine Suite in fünf Sätzen, die auf Tanzformen des 18. Jahrhunderts basiert und von Edvard Grieg 1884 zum 200. Geburtstag des dänisch-norwegischen Humanisten Ludvig Holberg (1684–1754) komponiert wurde. Sie steht exemplarisch für die Musik des 19. Jahrhunderts, die sich musikalischer Stile und Formen des vorangegangenen Jahrhunderts bedient. Ursprünglich wurde die Holberg-Suite für Klavier komponiert, ein Jahr später arrangierte Grieg sie selbst für Streichorchester. Die Suite besteht aus einer Einleitung und einer Folge von Tänzen. Sie ist ein frühes Beispiel des Neoklassizismus, ein Versuch, so viel wie damals über die Musik von Holbergs Zeit bekannt war, nachzuempfinden. Obwohl sie nicht so berühmt ist wie Griegs Bühnenmusik zu Peer Gynt, die meist als Suite aufgeführt wird, halten viele Kritiker beide Werke für gleichwertig."
 elgar.524.g: "Wunderbar!"

 elgar.525.t: "Neue Bahnen"
 elgar.525.d: "Im 'Neuen Magazin für Musik' erwähnte Robert Schumann einen neuen Künstler, der über Nacht berühmt wurde. Sein Name ist Johannes Brahms und er beeindruckte sowohl Schumann als auch dessen Frau Clara."
 elgar.525.f: "\"Und er ist gekommen, ein junger Blut, an dessen Wiege Grazien und Helden Wache hielten. Sein Name ist Johannes Brahms, er kam aus Hamburg, arbeitete dort im stillen Dunkel, wurde aber von einem ausgezeichneten und begeisterten Lehrer in schwierigen Kunstformen ausgebildet, mir kurz zuvor von einem verehrten, bekannten Meister empfohlen. Auch äußerlich trug er alle Zeichen, die uns verkünden: Er ist ein Berufener.\" – Robert Schumann"
 elgar.525.g: "Wir erwarten Großes von Herrn Brahms."

 elgar.526.t: "Gesang der Parzen"
 elgar.526.d: "Johannes Brahms' 'Gesang der Parzen' wurde in Basel uraufgeführt. Neben Wien war die Schweiz einer von Brahms' wichtigsten Aufenthaltsorten."
 elgar.526.f: "Der Gesang der Parzen ist die letzte Komposition für Chor und Orchester von Johannes Brahms. Mehr als zehn Jahre nach der Kantate Rinaldo op. 50 und der Alt-Rhapsodie op. 53 griff Brahms wieder auf einen Text von Johann Wolfgang von Goethe zurück. Laut Max Kalbeck wurde Brahms durch die Schauspielerin Charlotte Wolter inspiriert, die die Rolle der Iphigenie am Burgtheater in Wien spielte. Am 13. Juni 1896 schrieb Brahms über das Stück: 'Ich höre oft, wie über den sechsten Vers des Parzenliedes philosophiert wird. Ich denke, das Herz des ahnungslosen Zuhörers sollte beim bloßen Eintritt der Dur-Tonart weich werden und das Auge feucht; erst dann ergreift ihn das Elend der Menschheit.'"
 elgar.526.g: "So wunderbar wie verstörend."

 elgar.527.t: "Ein komponierender Orangenplantagenbesitzer"
 elgar.527.d: "Der Sohn des bekannten Wollunternehmers Julius Delius nahm Orgelunterricht und veröffentlichte einige seiner ersten Kompositionen."
 elgar.527.f: "Frederick Delius, gebürtiger Engländer, war der Sohn des deutschen Wollunternehmers Julius Delius. Der Vater wollte, dass sein Sohn Nachfolger im Unternehmen wird, doch der Sohn interessierte sich kaum für das Geschäft in Europa und mehr für Kunst und Musik. Deshalb schickte Delius senior ihn auf eine Orangenplantage in Florida, um ihn von den Einflüssen der europäischen Metropolen fernzuhalten. Doch gerade dieser Aufenthalt sollte für seine spätere musikalische Kreativität von herausragender Bedeutung sein. In Jacksonville lernte Delius den katholischen Organisten Thomas Ward kennen, der laut Delius der einzige war, der ihm wirklich etwas beibrachte. Kurz darauf veröffentlichte Delius seine ersten Kompositionen in Danville, Virginia."
 elgar.527.g: "Was soll nur aus diesem Taugenichts werden?"

 elgar.528.t: "Ein Österreicher in New York"
 elgar.528.d: "Nach Streitigkeiten in seiner österreichischen Heimat fand Gustav Mahler in New York ein Publikum, das seine Werke begeistert aufnahm. Einige Verantwortliche der US-Musikszene möchten ihn langfristig engagieren."
 elgar.528.f: "Manchem war das deutsche Doppel so eng, wenn der Name Mahler fiel. Manche aus Begeisterung, die meisten jedoch aus Ärger. Das war von Anfang an so. Er wirkte unmittelbar, aufwühlend, provozierend, alarmierend – egal: Er gehört zu den elektrischen und elektrisierenden Naturen, die Funken sprühen oder beim geringsten Anlass entflammen. Anfangs machte ihn natürlich nur seine frenetische Unbeliebtheit populär. Getragen vom Wohlwollen des Hasses, sorgfältig beleuchtet vom Neid, diesem ewig wachen und mächtigen Beschützer alles Echten, durch Spott, Neid und Verleumdung, von den lautesten Stimmen an jeder Straßenecke verkündet, wurde er berühmt. [...] Und so hörte man täglich, dass er seine Musiker misshandelte, sie zu unmenschlicher Arbeit trieb, sie fast in den Tod hetzte, und dass sie ihn, wenn sie nur könnten, am liebsten in einem Löffel Wasser ertränken würden. Es hieß, er kürze seine Sänger, drille sie wie Rekruten, spiele mit ihnen wie der Großtürke mit seinen Sklaven. [...] Die Intensität seines Wesens schien ganz New York zu erfüllen. – Felix Salten"
 elgar.528.g: "Was für ein seltsamer Kerl."
 elgar.528.h: "Mahler sollte in Amerika bleiben."

 elgar.529.t: "Skythische Suite"
 elgar.529.d: "Sergei Prokofjew, eines der vielversprechendsten jungen Talente der russischen Musik, schockierte das Publikum heute mit einer skandalösen Aufführung."
 elgar.529.f: "Prokofjew schrieb die Musik ursprünglich für das Ballett Ala i Lolli, dessen Handlung bei den Skythen spielt. Das Ballett wurde von Sergei Djagilew in Auftrag gegeben und basiert auf einem Szenario des russischen Dichters Sergej Gorodezki. Doch noch bevor die Partitur fertiggestellt war, lehnte Djagilew das Werk ab, und Prokofjew arbeitete die Musik zu einer Suite für den Konzertsaal um. Die Aufführung wurde zum größten Skandal in Prokofjews Premieren-Geschichte. Der damalige Direktor des Konservatoriums, Alexander Glasunow, verließ während des Konzerts den Saal, die Mehrheit des Publikums war empört und die Kritiken vernichtend. Prokofjew selbst ließ sich davon wenig beeindrucken und schrieb am nächsten Tag lakonisch nach Moskau, das Konzert sei 'mit richtigem Krach' verlaufen."
 elgar.529.g: "Ein Meisterwerk!"
 elgar.529.h: "Widerlich."

 elgar.530.t: "Die Rheinische Sinfonie"
 elgar.530.d: "Robert Schumann nahm eine Stelle in Düsseldorf am Rhein an und wurde plötzlich durch die Bauarbeiten am Kölner Dom zu einem neuen Werk inspiriert."
 elgar.530.f: "Robert Schumann gilt als einer der repräsentativsten Komponisten der Romantik. 1850 folgte er Ferdinand Hiller als Musikdirektor und zog nach Düsseldorf. Obwohl er für seine schlechten Dirigierfähigkeiten kritisiert und wegen seines 'kreativen Verfalls' verspottet wurde, komponierte Schumann dort seine letzte Sinfonie, die 'Rheinische'. Er nahm sich die Sinfonien von Beethoven und Mendelssohn zum Vorbild, ließ sich aber auch von seinen Eindrücken aus dem Rheinland inspirieren. Schumann selbst erklärte, dass seine Reise nach Köln und der Anblick des Doms die Hauptinspiration für diese Komposition waren, die zu seinen bekanntesten Werken zählt."
 elgar.530.g: "Es war eine gute Idee, den Dom weiterzubauen, oder?"

 elgar.531.t: "Schumanns Selbstmordversuch"
 elgar.531.d: "Der Komponist Robert Schumann wurde heute in letzter Minute aus dem Fluss gerettet – offenbar wollte er sich im Zustand geistiger Verwirrung das Leben nehmen. Es ist völlig unklar, wie mit ihm umzugehen ist."
 elgar.531.f: "Am 10. Februar 1854 verschlimmerten sich Schumanns psychische Leiden dramatisch. Er klagte vor allem über 'Hörprobleme'. Töne, Akkorde, ganze Musikstücke tobten in seinem Kopf und raubten ihm den Schlaf. Inzwischen wurde Schumann Tag und Nacht von seiner Frau und den Kindern überwacht und stand bereits unter ärztlicher Aufsicht, konnte aber am 27. Februar 1854 einen unbeobachteten Moment nutzen, um die Wohnung zu verlassen. Er ging zur nahegelegenen Pontonbrücke, kletterte über das Geländer und warf nach seinem Ehering sich selbst in den Fluss. Er wurde vom Brückenmeister und anderen Unbekannten gerettet, nach Hause gebracht und von einem herbeigerufenen Arzt versorgt. Nach seinem Selbstmordversuch wünschte er die Aufnahme in die Anstalt zur Behandlung und Pflege Geisteskranker in Endenich bei Bonn, die 1844 vom Psychiater Franz Richarz eröffnet worden war."
 elgar.531.g: "Es gibt nichts, was wir tun können."
 elgar.531.h: "Schickt ihn in die moderne Heilanstalt bei Endenich."

 elgar.532.t: "Der Tod von Schumann"
 elgar.532.d: "Nach mehreren Jahren geistiger Umnachtung starb Robert Schumann, einst ein vielversprechendes musikalisches Talent, in einer Heilanstalt, von der Welt unbeachtet."
 elgar.532.f: "Brahms sah Schumann am 31. März und 19. August 1854, ohne mit ihm sprechen zu können. Am 11. Januar, 23. Februar und 2. April 1855 konnten beide jedoch ausführlich reden. Schumann ging es so gut, dass er mit Brahms auf dem Quadratklavier musizierte und ihn unter Aufsicht eines Wächters ein Stück zum Bonner Bahnhof begleitete. Am 10. April 1856 fand Brahms Schumann in einem schlimmen Zustand. Schumann konnte kaum noch verständlich sprechen. Am 1. Mai 1856 wurde zuletzt in den Krankenakten erwähnt, dass Schumann Klavier spielte. Meist konnte er sich kaum noch verständlich ausdrücken. Clara Schumanns Plan, Schumann ab April 1856 nach Düsseldorf zu holen und dort selbst zu pflegen, wurde nicht verwirklicht. Ab Mitte Juli 1856 aß Schumann immer weniger. Am 26. Juli 1856 hatte er 'Zuckungen in verschiedenen Muskeln, im Gesicht und an den Gliedmaßen'. Rasselgeräusche deuteten auf eine Lungenentzündung hin. Robert Schumann starb am 29. Juli; niemand war anwesend."

 elgar.533.t: "Die wundersame Genesung von Robert Schumann"
 elgar.533.d: "Offenbar zeigen die modernen Methoden im Sanatorium Endenich Wirkung. Schumann zeigt Anzeichen der Besserung, auch wenn seine Rückkehr zur Arbeit noch einige Monate dauern wird."
 elgar.533.f: "Schumanns wundersame Genesung begann, nachdem er Peters im September 1854, kurz vor dem 14. Hochzeitstag, mitteilte, dass Düsseldorf untergegangen und Clara und die Kinder tot seien. Um diesen Wahn zu zerstreuen, bat Peters Clara Schumann um einen Brief an ihren Mann. Dies führte zum ersten Briefwechsel seit der Einweisung. Von nun an nahm Schumann wieder aktiv am Leben außerhalb der Anstalt teil. Er korrespondierte auch mit seinen Kindern, Johannes Brahms, Joseph Joachim und Verlegern. Zwischen September 1854 und Mai 1855 schrieb Schumann etwa 25 Briefe. In dieser Zeit äußerte er oft den Wunsch, Endenich wieder verlassen zu können. Er spielte gelegentlich Klavier. Er studierte Kompositionen von Brahms. Am 11. Januar 1855 hatte er erstmals Besuch von Johannes Brahms. Von da an besserte sich Schumanns Zustand stetig, bis die Ärzte Clara Schumann den Besuch erlaubten. Mit ihrer Unterstützung und der von Brahms begann Schumann bald wieder zu komponieren – und leitete so einen Selbstheilungsprozess ein."
 elgar.533.g: "Aber wie ist das möglich?"

 elgar.534.t: "Tango"
 elgar.534.d: "Tango-Interpret Carlos Gardel hat mit Mi noche triste seinen ersten Plattenhit aufgenommen."
 elgar.534.f: "Carlos Gardel war die herausragendste Figur in der Geschichte des Tangos. Er war einer der einflussreichsten Interpreten der populären Weltmusik in der ersten Hälfte des 20. Jahrhunderts. Gardel ist der berühmteste Tangosänger aller Zeiten und weltweit anerkannt. Mit seiner Interpretation von Pascual Contursis und Samuel Castriotas Mi noche triste schuf er 1917 den Tango-Canción. Mit 'Mi noche triste' wurde der sentimentale Tango geboren. Die neuen, nostalgischen, melodramatischen und traurigen Texte und die Musik verkörperten Buenos Aires und seine Menschen."
 elgar.534.g: "Der Triumph der argentinischen Musik."

 elgar.601.t:1 "Der Tod von [SCOPE.sCharacter('elgar_composer_scope').GetLastName]" #1!
 elgar.601.d:1 "[SCOPE.sCharacter('elgar_composer_scope').GetFullName], einer der größten künstlerischen Köpfe unseres Landes und ein funkelnder Stern am musikalischen Firmament, ist heute gestorben. Er hinterlässt eine Lücke, die kaum zu schließen ist." #1!
 elgar.601.g:1 "Ein Titan der Musikgeschichte hat uns verlassen." #1!
 elgar.603.t:1 "Rossini verlässt Bologna" #1!
 elgar.603.d:1 "Rossini hat beschlossen, Bologna zu verlassen. Diese Nachricht kam nicht nur für die Einwohner der Stadt überraschend, sondern hat auch das ganze Land traurig gemacht." #1!
 elgar.603.f:1 "Als Gioacchino Rossini beschloss, Bologna und damit den Kirchenstaat zu verlassen, waren seit seinem Rückzug von der Opernbühne rund 20 Jahre vergangen. Dennoch war Rossini immer noch eine hoch angesehene Persönlichkeit und einer der beliebtesten Komponisten Italiens. Ein Hauptgrund, warum Rossini - nach einem Zwischenspiel in Florenz - wieder nach Paris zog, dürfte nicht zuletzt seine Gesundheit gewesen sein. In seinen letzten Lebensjahren als europäischer Musikstar hatte er sich körperlich und geistig bereits verschlechtert. Paris versprach eine bessere medizinische Versorgung, weshalb Rossini daran dachte, seinen Lebensabend dort zu verbringen." #1!
 elgar.603.g:1 "Aber er hat seine Tortellini nicht aufgegessen!" #1!
 elgar.609.d:1 "Franz Lachner hat heute seinen Rücktritt vom Dirigentenpult bekannt gegeben. Er sieht keine Zukunft mehr für seine Karriere." #1!
 elgar.609.f:1 "Eine ganze Reihe von Umständen führte zu Franz Lachners vorzeitigem Ausscheiden aus der Musikwelt. Ausschlaggebend dafür war die neue Musik Richard Wagners und der Siegeszug seiner Verbündeten. Lachner, der Schubert und Beethoven gekannt hatte, konnte und wollte dieser Entwicklung nicht folgen. Ähnlich wie Rossini, der begriff, dass er als Relikt einer anderen Zeit angesehen wurde, während die Welt sich weiterentwickelt hatte, zog sich Lachner zurück, nicht zuletzt wegen des Spottes und der Häme der Wagner-treuen Kritiker." #1!
 elgar.609.g:1 "Ein Verlust für [GetPlayer.GetName]." #1!
 elgar.613.f:1 "Gaetano Donizetti ist heute Morgen nach einem langen und erfüllten Leben in den Armen seiner zweiten Frau und umgeben von seinen Söhnen friedlich verstorben. Ein Trauerzug mit mehreren Musikkapellen, Hunderten von Fackelträgern und Tausenden von Zuschauern markiert den Abschied von einem Mann, von dem es heißt, er habe ein perfektes Leben geführt." #1!
 elgar.614.f:1 "Im Jahr 1867 erhielt Berlioz die Nachricht, dass sein Sohn in Havanna an Gelbfieber gestorben war. Macdonald vermutet, dass Berlioz sich von seiner Trauer ablenken wollte, indem er eine Reihe von Konzerten in St. Petersburg und Moskau gab, aber diese Reise verjüngte ihn nicht, sondern zehrte an seinen Kräften.  Er begab sich nach Nizza, um sich im mediterranen Klima zu erholen, stürzte jedoch am Ufer auf Felsen, möglicherweise aufgrund eines Schlaganfalls, und musste nach Paris zurückkehren, wo er sich mehrere Monate lang erholte. Im August 1868 fühlte er sich in der Lage, kurz nach Grenoble zu reisen, um ein Chorfestival zu beurteilen.  Nach seiner Rückkehr nach Paris wurde er immer schwächer und starb am 8. März 1869 in seinem Haus in der Rue de Calais im Alter von 65 Jahren. Er wurde auf dem Friedhof von Montmartre zusammen mit seinen beiden Ehefrauen beigesetzt, die exhumiert und neben ihm beigesetzt wurden." #1!
 elgar.615.f:1 "Nach der gescheiterten Ehe mit Carolyne zu Sayn-Wittgenstein widmete sich Liszt verstärkt Kompositionen mit religiösen Themen. In Rom, wo er sich bis 1870 überwiegend aufhielt, führte er ein teils weltliches, teils klösterliches Leben und zog sich im Sommer 1863 in ein Kloster zurück, wo ihn auch Papst Pius IX. besuchte. Im Jahr 1865 unterzog sich Liszt der Tonsur und erhielt die vier kleinen Orden. Von nun an trug er als Kleriker den römischen Kragen und wurde als Abbé angesprochen. Im Jahr 1886 besuchte Liszt die Wagner-Festspiele. Zum Zeitpunkt der Reise war Liszt bereits schwer erkrankt und starb wenige Tage nach seiner Ankunft am 31. Juli 1886 an den Folgen einer Lungenentzündung. Bernhard Schnappauf, Arzt und Freund Richard Wagners, verbrachte die letzten Tage an seinem Sterbebett und berichtete, Liszt sei ruhig und würdevoll gestorben. Er schloss die Augen und machte die Totenmaske, wofür ihm nach altem Brauch das Leichentuch und der Kissenbezug zustanden." #1!
 elgar.616.f:1 "Am 16. September 1882 reiste Wagner mit seiner Familie nach Venedig, wo er mehrere Wochen mit Franz Liszt verbrachte. Am 25. Dezember gab er als Geburtstagsgeschenk für Cosima zum letzten Mal ein gemeinsames Konzert im Teatro La Fenice; er dirigierte seine Jugendsinfonie in C-Dur. Am 13. Februar 1883 hielt er sich im Seitenflügel des Palazzo Vendramin-Calergi auf, in dem er mit seiner Familie wohnte. Gegen 15 Uhr wartete die Familie am Tisch auf Wagner, der trotz eines Herzinfarkts in seinem Arbeitszimmer an einem Aufsatz über das Weibliche im Menschen schrieb. Das Dienstmädchen fand ihn an seinem Schreibtisch zusammengesunken über den Worten 'Der Emanzipationsprozess des Weibes verläuft jedoch nur mit ekstatischen Zuckungen. Liebe - Tragödie'. Er sagte: 'Meine Frau und der Arzt', bevor er bewusstlos wurde und gegen 15:30 Uhr in Cosimas Armen starb." #1!
 elgar.617.f:1 "Edvard Grieg starb am 4. September 1907 im Alter von 64 Jahren an Herzversagen im Städtischen Krankenhaus in Bergen, Norwegen. Er hatte eine lange Krankheit hinter sich. Seine letzten Worte waren: 'Nun, wenn es denn sein muss'. Zu seiner Beerdigung kamen zwischen 30 000 und 40 000 Menschen in die Straßen seiner Heimatstadt, um ihn zu ehren. Auf seinen Wunsch hin wurde sein eigener Trauermarsch zum Gedenken an Rikard Nordraak gespielt, orchestriert von seinem Freund Johan Halvorsen, der Griegs Nichte geheiratet hatte. Außerdem wurde der Trauermarschsatz aus Chopins Klaviersonate Nr. 2 gespielt. Grieg wurde im ersten norwegischen Krematorium, das noch im selben Jahr in Bergen eröffnet wurde, eingeäschert, und seine Asche wurde in einer Berggruft in der Nähe seines Hauses in Troldhaugen beigesetzt. Nach dem Tod seiner Frau wurde ihre Asche neben seiner beigesetzt." #1!
 elgar.618.f:1 "Brahms starb am 3. April 1897 in den frühen Morgenstunden im Alter von 63 Jahren in seiner Wohnung in der Karlsgasse 4, wo er seit 1872 lebte - nach einigen Biographien an Leberkrebs, nach neueren Angaben an einem Bauchspeicheldrüsenkrebs. Seinen letzten öffentlichen Auftritt hatte er am 7. März 1897, als er Hans Richter seine Symphonie Nr. 4 dirigieren sah; nach jedem der vier Sätze gab es eine Ovation. Nach der Aufbahrung im Trauerhaus, wo Carl Kundmann ihm die Totenmaske abnahm und Ludwig Michalek ein letztes Pastellbild anfertigte, fand am 6. April die Einsegnung in der evangelischen Stadtkirche statt." #1!
 elgar.619.f:1 "\"Morgen und Wien. Ein Chaos. Man klammert sich an Details, die noch niemand wissen kann. Er soll auf dem kleinen Friedhof in Grinzing begraben werden, neben seiner kleinen Tochter. Der Leichnam wird gebracht. Am anderen Morgen. Die Straße 'an den Langen Lüssen' führt über Land zu Zypressen. Die Kapelle ist ein kleiner Raum, nur für den Sarg und einige Kränze. Die anderen säumen die Wege zum Grab. Eine Frau kommt vorbei und sagt zu einer anderen: 'Jetzt ist er drinnen in Frieden. Alles war zu klein für ihn.' Die Kirche in Grinzing ist klein, der Kirchhof schmal. Und ein Spektakel für die Wienerinnen und Wiener steht bevor. Die Kirche und der Friedhof werden abgesperrt sein. Nur mit Karten hat man Zutritt. Wir erfahren, dass Franz Schalk, Gregor und das Direktorium darum gebeten haben, dass die Oper am Tag des Begräbnisses geschlossen bleibt. Kein Wort darüber. Der Hof, die Gemeinde Wien, rührt sich nicht. Und dann die Feier. Wir stehen vor der Kirche, als der Sarg hinausgetragen wird. Es regnet. Über einen Weinbergsweg kommen wir schneller zum Grab. Die Prozession kommt an. Der Regen hört auf. Eine Nachtigall singt, die Schollen fallen. Ein Regenbogen. Und die Hunderte sind still.\" - Paul Stefan" #1!
  
 elgar.701.t: "Grande symphonie funèbre et triomphale"
 elgar.701.d: "Zur Feier des zehnten Jahrestags der Julirevolution komponierte Hector Berlioz ein Werk, das große öffentliche Bewunderung hervorrief."
 elgar.701.f: "Die französische Regierung gab die Symphonie für die Feierlichkeiten zum zehnten Jahrestag der Julirevolution in Auftrag, die Louis-Philippe I. an die Macht gebracht hatte und für die die Julisäule auf der Place de la Bastille errichtet wurde. Berlioz hatte wenig Sympathie für das Regime, begrüßte aber die Gelegenheit, das Werk zu schreiben, weil die Regierung ihm dafür 10.000 Francs bot. Die Symphonie militaire (später in Symphonie funèbre et triomphale umbenannt) stellt im Gegensatz zu Berlioz' Romeo und Julia eine Rückkehr zu einem früheren, vor-beethoven’schen Stil in der Tradition monumentaler französischer Zeremonialmusik dar. Berlioz überarbeitete die Partitur im Januar 1842, fügte eine optionale Streicherstimme und einen Schlusschor zu einem Text von Antony Deschamps hinzu. Richard Wagner besuchte am 1. Februar 1842 eine Aufführung dieser neuen Version im Salle Vivienne. Am 5. Februar berichtete er Robert Schumann, dass Passagen im letzten Satz von Berlioz' Symphonie so 'großartig und erhaben' seien, 'dass sie nie übertroffen werden können.'"
 elgar.702.t: "Liszt in Weimar"
 elgar.702.d: "Nach vielen Jahren auf Konzertreisen erwägt der Klaviervirtuose und Komponist Franz Liszt, sich in Weimar niederzulassen."
 elgar.702.f: "Die Weimarer Jahre waren Franz Liszts künstlerisch produktivste Zeit. Hier schrieb er viele seiner Klavierwerke, wie die Klaviersonate h-Moll, den Zyklus Harmonies poétiques et religieuses, fünfzehn Ungarische Rhapsodien sowie zahlreiche Transkriptionen, Klavierauszüge und Überarbeitungen früherer Klavierwerke, etwa der Paganini-Etüden. Zwei seiner zuvor konzipierten Klavierkonzerte erhielten hier ihre endgültige Form. In Weimar dirigierte Liszt viele Werke zeitgenössischer Komponisten, von denen einige damals umstritten waren, und führte auch deren Opern auf. Er dirigierte Werke von Richard Wagner, zu dem er ein besonders enges Verhältnis hatte und dem er nach dem Dresdner Aufstand 1849 zur Flucht nach Zürich verhalf. In den Folgejahren unterstützte er Wagner finanziell und moralisch und pflegte einen regen Briefwechsel mit ihm. Später traten Liszt und Wagner oft gemeinsam als Dirigenten auf. Ab 1865, nach Wagners Beziehung mit Liszts Tochter Cosima, kühlte das Verhältnis für lange Zeit ab."
 elgar.703.t: "Rienzi"
 elgar.703.d: "Ein junger Komponist hat mit seiner Oper 'Rienzi' das Publikum in Dresden und internationale Künstler beeindruckt. Sein Name ist Richard Wagner."
 elgar.703.f: "\"Keine spätere Erfahrung hat mir auch nur annähernd ähnliche Gefühle vermittelt wie an diesem Tag der Uraufführung von Rienzi. Die allzu berechtigte Angst um den Erfolg hat meine Gefühle bei allen späteren Erstaufführungen meiner Werke so sehr beherrscht, dass ich sie nie wirklich genießen oder das Verhalten des Publikums groß beachten konnte. [...] Der anfängliche Erfolg von Rienzi war zweifellos vorprogrammiert. Aber die stürmische Art, mit der das Publikum seine Vorliebe für mich bekundete, war außergewöhnlich ... Das Publikum war gezielt darauf eingestimmt worden, da jeder, der mit dem Theater zu tun hatte, so günstige Berichte verbreitete ... dass die gesamte Bevölkerung erwartungsvoll auf das angeblich bevorstehende Wunder wartete ... Wenn ich versuche, mich an meinen Zustand an jenem Abend zu erinnern, kann ich ihn nur als traumhaft beschreiben.\" – Richard Wagner"
 elgar.704.t: "Klavierkonzert in a-Moll"
 elgar.704.d: "Ein Klavierkonzert von Edvard Grieg feierte heute in Kopenhagen seine Uraufführung. Schon jetzt ist absehbar, dass dies eines seiner beliebtesten Stücke werden wird."
 elgar.704.f: "Das Klavierkonzert in a-Moll, op. 16, komponiert von Edvard Grieg im Jahr 1868, ist das einzige Konzert, das Grieg vollendete. Das Werk zählt zu Griegs frühesten wichtigen Kompositionen und entstand 1868 im dänischen Søllerød, wo sich der damals 24-jährige Komponist zur Erholung aufhielt. Das Konzert zeigt Griegs Interesse an norwegischer Volksmusik; das eröffnende Motiv basiert auf einer fallenden kleinen Sekunde, gefolgt von einer fallenden großen Terz, was typisch für die Volksmusik seiner Heimat ist. Die Uraufführung spielte Edmund Neupert am 3. April 1869 in Kopenhagen, dirigiert von Holger Simon Paulli. Einige Quellen berichten, dass Grieg selbst, ein ausgezeichneter Pianist, als Solist vorgesehen war, aber wegen Verpflichtungen mit einem Orchester in Christiania (heute Oslo) nicht teilnehmen konnte. Unter den Zuhörern waren der dänische Komponist Niels Gade und der russische Pianist Anton Rubinstein, der für den Anlass sein Klavier zur Verfügung stellte. Grieg überarbeitete das Werk mindestens siebenmal, meist subtil, insgesamt gab es aber über 300 Unterschiede zur Originalorchestrierung."
 elgar.705.t: "Variationen über ein Thema von Haydn"
 elgar.705.d: "Der Komponist Johannes Brahms hat heute ein neues Meisterwerk aufgeführt, denkt aber gleichzeitig darüber nach, sich dauerhaft in Wien niederzulassen."
 elgar.705.f: "Die Variationen über ein Thema von Haydn op. 56a sind ein Variationswerk für Orchester von Johannes Brahms. Das Werk entstand im Sommer 1873 in Tutzing. Die Uraufführung fand am 2. November 1873 in Wien unter der Leitung von Brahms statt. Das Stück fällt in eine Epoche, in der Brahms seinen Aufenthalt in Wien feiern wollte. Einerseits hatte er Detmold und Hamburg Jahre zuvor enttäuscht verlassen, andererseits strebte er danach, dort zu leben, wo seine großen klassischen Vorbilder gewirkt hatten, und die Wiener Tradition fortzusetzen."
 elgar.706.t: "Mahlers erster Auftritt"
 elgar.706.d: "In Bad Hall trat der junge und talentierte Dirigent Gustav Mahler erstmals als Kapellmeister in Erscheinung. In den folgenden Jahren sollte er die Karriereleiter bis zur Wiener Staatsoper erklimmen."
 elgar.706.f: "\"Und da stand er persönlich im Theaterbüro, als ich von meinem ersten Besuch bei Pollini herauskam: blass, schmal, klein von Statur, langes Gesicht, die steile Stirn von tiefschwarzem Haar umrahmt, bedeutende Augen hinter Brillengläsern, Furchen des Leidens und des Humors im Antlitz, das, während es mit einem anderen sprach, die erstaunlichsten Wechsel der Miene zeigte, eine ebenso interessante, dämonische, einschüchternde Verkörperung des Kapellmeisters Kreisler, wie sie sich der jugendliche Leser von E.T.A. Hoffmanns Fantasiestücken vorstellen konnte; er fragte mich freundlich nach meiner musikalischen Begabung und Kenntnis – worauf ich ihm, zu seiner offensichtlichen Zufriedenheit, mit einer Mischung aus Schüchternheit und Selbstbewusstsein antwortete – und ließ mich in einem Zustand von Benommenheit und Erschütterung zurück. [...] Mahler erschien mir im Gesicht und Wesen als Genie und Dämon [...]\" – Bruno Walter"
 elgar.706.g: "Ist er mit seinen 20 Jahren nicht ein bisschen zu jung für eine solche Aufgabe?"
 elgar.707.t: "Klavierkonzert Nr. 2"
 elgar.707.d: "Nach vielen Rückschlägen ist dem Komponisten Sergei Rachmaninow ein beeindruckendes Comeback gelungen: Sein zweites Klavierkonzert löste frenetischen Applaus aus."
 elgar.707.f: "Nach der katastrophalen Uraufführung seiner ersten Sinfonie im Jahr 1897 erlitt Rachmaninow einen psychischen Zusammenbruch, der ihn drei Jahre lang am Komponieren hinderte. Obwohl die Depression seine Energie raubte, trat er weiterhin als Pianist und Dirigent auf, um seine finanzielle Lage zu verbessern. 1899 sollte er das zweite Klavierkonzert in London aufführen, hatte es jedoch krankheitsbedingt noch nicht komponiert, und debütierte stattdessen erfolgreich als Dirigent. Verwandte stellten ihm den Neurologen Nikolai Dahl vor, den er von Januar bis April 1900 täglich aufsuchte. Dadurch gewann er seine Gesundheit und sein Selbstvertrauen als Komponist zurück. Rachmaninow widmete das Konzert Dahl als Dank für dessen erfolgreiche Behandlung. Nach seinem Konzert 1908 in der Londoner Queen's Hall unter Serge Koussevitzky schrieb die Times: 'Der unmittelbare Ausdruck des Werks, die außergewöhnliche Präzision und Genauigkeit von Rachmaninows Spiel und sogar die strenge Ökonomie der Bewegungen von Armen und Händen trugen alle zum Eindruck einer vollkommenen Darbietung bei.'"

 elgar.708.t: "Sinfonie Nr. 1 »Klassische«"
 elgar.708.d: "Mit seiner ersten Sinfonie empfiehlt sich Sergei Prokofjew erneut als aufstrebender Komponist. Gleichzeitig drängt es den jungen Künstler hinaus in die Welt, um besser bezahlt zu werden."
 elgar.708.f: "\"Probe der Klassischen Sinfonie mit dem Staatsorchester, ich habe selbst dirigiert, völlig improvisiert, da ich die Partitur vergessen und sie nie wirklich aus Dirigentensicht studiert hatte. Ich dachte, es könnte ein völliges Debakel werden, aber nichts geschah, und in jedem Fall enthielten die Stimmen so viele Fehler, dass die Probe hauptsächlich dazu diente, Korrekturen vorzunehmen. In Kislowodsk hatte ich befürchtet, dass ein 'Revolutionäres Orchester' meinen neuen Werken ablehnend gegenüberstehen würde, aber das Gegenteil war der Fall: Das Staatsorchester, durchsetzt mit viel jungem Blut, war flexibel und aufmerksam und spielte die Sinfonie mit offensichtlicher Freude.\" – Sergei Prokofjew"

 elgar.709.t: "Romeo und Julia"
 elgar.709.d: "Pjotr Tschaikowski, ein vielversprechender junger Komponist, hat seine Ouvertüre Romeo und Julia vorgestellt. Das Publikum reagierte mit gemischten Gefühlen."
 elgar.709.f: "Nicht nur zu Beginn, sondern während seiner gesamten Karriere musste sich Tschaikowski gegen Kritiker und Konkurrenten behaupten. Die Ouvertüre Romeo und Julia etwa wurde bei ihrer Veröffentlichung als Misserfolg angesehen. Diese Kritik, die Tschaikowski sein Leben lang begleitete, führte dazu, dass er dieses und andere Werke überkritisch überarbeitete; Tschaikowski blieb Zeit seines Lebens einer der schärfsten Kritiker seines eigenen Schaffens. Ironischerweise lobten gerade die national gesinnten russischen Komponisten dieses Werk, obwohl sie später zu Tschaikowskis härtesten Kritikern zählen sollten. Dennoch wurde Tschaikowski spätestens in dieser Zeit zu einem der bedeutendsten russischen Komponisten und erreichte innerhalb weniger Jahre einen internationalen Ruhm, wie ihn kaum ein anderer Musiker des Jahrhunderts erlangte."

 elgar.710.t: "Viva Verdi"
 elgar.710.d: "Mit der Schaffung des italienischen Nationalstaats und der Eingliederung der Opernstadt Mailand in unser Territorium haben wir die einzigartige Gelegenheit, eine der wichtigsten Persönlichkeiten der italienischen Musikgeschichte zu gewinnen: Giuseppe Verdi."
 elgar.710.f: "Giuseppe Verdi war ein italienischer Komponist und Politiker, der zusammen mit anderen Protagonisten des italienischen Musiktheaters des 19. Jahrhunderts – Gioachino Rossini, Vincenzo Bellini und Gaetano Donizetti – als einer der größten Opernkünstler und Komponisten aller Zeiten gilt. Er sympathisierte mit der Risorgimento-Bewegung, die die Einigung Italiens anstrebte, und beteiligte sich zeitweise aktiv am politischen Leben; im Laufe seines langen Lebens erlangte er unter seinen Landsleuten eine einzigartige Stellung und wurde zum künstlerischen Symbol der nationalen Einheit. Einen Monat nach seinem Tod zog eine feierliche und endlose Prozession durch Mailand, begleitet von den Klängen des von ihm vor 60 Jahren komponierten 'Va, pensiero' aus Nabucco – ein Ausdruck der Gefühle der Italiener für ihren verlorenen Helden. Dies zeigt, wie sehr Verdis Musik ins nationale Bewusstsein übergegangen ist. Seine Werke gehören bis heute zu den bekanntesten und meistgespielten Opern weltweit, insbesondere Aida (1871), das erwähnte Nabucco (1842) und die sogenannte 'Verdi-Trilogie': Rigoletto (1851), Il Trovatore (1853) und La Traviata (1853)."

 elgar.711.t: "Frühlingssinfonie"
 elgar.711.d: "Robert Schumanns Erste Sinfonie wurde heute unter der Leitung von Felix Mendelssohn Bartholdy aufgeführt. Schumann ist mit der bedeutenden Pianistin Clara (geb. Wieck) verheiratet und hat bisher mehr als Musikkritiker denn als Komponist Aufmerksamkeit erregt. Über seine Klavierstücke gehen die Meinungen auseinander."
 elgar.711.f: "Mit Ausnahme von Franz Schubert wurde kein deutschsprachiger Komponist zu Lebzeiten so verkannt wie Robert Schumann. Während Schuberts Bedeutung erst nach seinem frühen Tod erkannt wurde, warf man Schumann vor, als Genie begonnen und als Talent geendet zu haben. Zeitgenossen hatten oft keinen Zugang zu seinem Werk oder verstanden es einfach nicht. Seine Klavierstücke, die heute zu seinem Ruhm beitragen, waren damals meist unbekannt. Spötter sahen in ihm nur den Mann an der Seite der Pianistin Clara Schumann. In seiner sächsischen Heimat stand er im Schatten Mendelssohns. Wagner wandte sich später gegen ihn, während Brahms ein enger Vertrauter von Clara und Robert wurde. Liszt sah in Schumann einen Wegbereiter des musikalischen Fortschritts in Deutschland, hatte jedoch beim Publikum keinen Erfolg, wenn er Schumanns Werke aufführte. Hoffnungen auf eine feste Anstellung an einer bedeutenden musikalischen Institution zerschlugen sich immer wieder. Ähnlich wie Schubert fand auch Schumann ein frühes, tragisches Ende."

 elgar.712.t: "König Olaf"
 elgar.712.d: "Edward Elgar hat sich in den letzten Jahren mit seinen Kantaten und Chorwerken hervorgetan. 'Scenes from the Saga of King Olaf', sein jüngstes Werk, wurde vom Publikum gut aufgenommen."
 elgar.712.f: "In den 1890er Jahren erarbeitete sich Edward Elgar einen wachsenden Ruf als bedeutender britischer Komponist. Anfangs stark vom Kontinent beeinflusst – auch 'King Olaf' zeigt Anklänge an den Wagner-Stil – fand er allmählich seine eigene Klangsprache, die spätere britische Komponisten zu ganz neuen Wegen ermutigen sollte. Elgar fühlte sich nicht nur musikalisch, sondern auch gesellschaftlich als Außenseiter. In von Akademikern dominierten Musikkreisen war er ein Autodidakt; im protestantischen Großbritannien wurde sein Katholizismus in manchen Kreisen mit Argwohn betrachtet; und in der klassenbewussten Gesellschaft des viktorianischen und edwardianischen Englands war er sich seiner einfachen Herkunft auch nach Anerkennung stets bewusst. Dennoch gilt Elgar als der bedeutendste britische Komponist seit Henry Purcell."

 elgar.713.t: "Hofballmusikdirektor"
 elgar.713.d: "Die Stelle des Hofballmusikdirektors ist seit Jahren vakant. Ein angesehener Posten, der eigentlich dem Komponisten Johann Strauss zugedacht war. Aus politischen Gründen wurde ihm diese Ehre jedoch bislang verwehrt. Nun mehren sich die Stimmen, die Position dem Sohn des früh verstorbenen Komponisten anzubieten."
 elgar.713.f: "Johann Strauss war ein österreichisch-deutscher Kapellmeister und Komponist und wurde international als 'Walzerkönig' anerkannt. Bereits mit sechs Jahren komponierte er seinen ersten Walzer und nahm heimlich Geigenunterricht, da sein Vater eine Beamtenlaufbahn für ihn vorgesehen hatte. Weil dieser mit der Familie gebrochen hatte, unterstützte seine Mutter gegen den Willen des Vaters die musikalische Ausbildung. Sein erster Auftritt im Casino Dommayer, einem in der Region bekannten Vergnügungslokal, war ein großer Erfolg. Tourneen führten ihn zunächst mit eigenem Orchester durch die Donaumonarchie (was die Rivalität mit seinem Vater verstärkte). Nach dem Tod des Vaters übernahm er dessen Orchester und vereinigte es mit seinem eigenen. Da er einige Werke für die Revolutionäre von 1848 komponierte und damit Sympathie für die Aufstandsbewegung zeigte, geriet er ins Visier der Zensurbehörden und fiel trotz seiner Popularität am Hof in Ungnade. Daher wurde ihm die Position des Hofballmusikdirektors bis 1863 verweigert."
 elgar.713.g: "Er hat seine Chance verpasst, aber er darf gerne komponieren."
 elgar.713.h: "Gebt dem Walzerkönig den Platz, der ihm gebührt!"

 elgar.714.t: "Staatspreis für Komposition"
 elgar.714.d: "Der Gewinner des diesjährigen Staatspreises für Komposition ist ein außergewöhnliches tschechisches Talent. Sein Name ist Antonín Dvořák."
 elgar.714.f: "Antonín Dvořák war ein tschechischer Komponist, der häufig Rhythmen und andere Elemente der Volksmusik Mährens und seiner böhmischen Heimat verwendete. Dvořák zeigte schon früh musikalische Begabung und war ab dem sechsten Lebensjahr ein talentierter Geigenschüler. 1874 reichte er Partituren von zwei Sinfonien und weiteren Werken beim österreichischen Staatspreis für Komposition ein. Ohne es zu wissen, war Johannes Brahms das führende Jurymitglied und zeigte sich sehr beeindruckt. Dvořák erhielt den Preis 1874, 1876 und 1877, als sich Brahms und der prominente Kritiker Eduard Hanslick, ebenfalls Jurymitglied, ihm zu erkennen gaben. Brahms empfahl Dvořák seinem Verleger Simrock."
 elgar.714.g: "Eine wohlverdiente Trophäe."
 elgar.714.h: "Dieses Talent sollten wir uns nicht entgehen lassen."

 elgar.715.t: "Der Bohemien-Komponist"
 elgar.715.d: "Claude Debussy startete als Gewinner des Prix de Rome, hat aber bislang wenig mit seinem nachgewiesenen Talent gemacht, außer kleine, provokante Klavierstücke zu schreiben. Was wird aus diesem Bohemien?"
 elgar.715.f: "Schon am Konservatorium gingen die Meinungen über Claude Debussys Talent weit auseinander. Einige lobten ihn als Pianisten und setzten große Hoffnungen in ihn. Andere beschrieben ihn als nachlässig. In dieser Zeit war er bereits Pianist im Haushalt von Nadeschda von Meck, Tschaikowskis Mäzenin. 1884 gewann Debussy den Prix de Rome, war während seines Aufenthalts in Rom jedoch wenig ehrgeizig. Er fand die italienische Oper langweilig und konnte mit dem vorherrschenden Stil Giuseppe Verdis wenig anfangen. Frühzeitig kehrte er nach Paris zurück und führte dort ein unstetes Leben: 'Ich bin sicher, das Institut würde das nicht gutheißen, denn es betrachtet natürlich den von ihm vorgegebenen Weg als den einzig richtigen. Aber da ist nichts zu machen! Ich liebe meine Freiheit zu sehr, bin zu sehr an meinen eigenen Ideen hängengeblieben!'"
 elgar.715.g: "Schöne Klaviermusik, aber musikalische Vagabunden haben wir genug."

 elgar.1011.t: "Don Pasquale"
 elgar.1011.d: "Ein großer Komponist hat gerade ein musikalisches Meisterwerk vollendet!"
 elgar.1011.f: "Don Pasquale ist eine Opera buffa in drei Akten. Die Oper ist eine der berühmtesten ihres Genres und gehört neben L'elisir d'amore und Lucia di Lammermoor zu den wenigen Werken Donizettis, die seit dem 19. Jahrhundert eine fast ununterbrochene Aufführungstradition haben. Die auf den Komödien von Carlo Goldoni basierenden Figuren sind mehr oder weniger eng an die Typen der Commedia dell'arte angelehnt, erhalten aber durch die Fähigkeit, Trauer, Schmerz oder Reue zu empfinden und auszudrücken, eine Differenzierung, die über ihren Typus hinausgeht, sentimentale Züge. Don Pasquale war ein sofortiger Erfolg, wie ihn zuvor nur Bellinis I puritani (1835) in Paris gehabt hatte."
 elgar.1011.g: "Bravissimo!"

 elgar.1012.t: "Dom Sébastien"
 elgar.1012.f: "Dom Sébastien ist eine französische Grand Opéra in fünf Akten von Gaetano Donizetti. Es ist ein historisches Drama über König Sebastian von Portugal (1554–1578) und dessen unglückseligen Feldzug nach Marokko im Jahr 1578. Donizetti versuchte zu dieser Zeit, eine Oper zu komponieren, die mit ähnlichen historischen Werken von Daniel Auber, Fromental Halévy und Giacomo Meyerbeer konkurrieren konnte. Ein Kritiker bezeichnete Dom Sébastien als 'ein Begräbnis in fünf Akten'. Das Werk wurde nur zögerlich aufgenommen, was Donizetti selbst als Fiasko empfand. Obwohl Donizetti seine letzte Oper für eines seiner wichtigsten Werke hielt, ist Dom Sébastien heute weitgehend vergessen. Sie entstand zu einer Zeit, als Donizetti 'nicht mehr uneingeschränkt über seine Fantasie verfügen konnte', sodass die Oper bereits von seiner beginnenden Krankheit geprägt war."

 elgar.1021.t: "Les Troyens"
 elgar.1021.f: "Les Troyens ist eine französische Grand Opéra in fünf Akten von Hector Berlioz. Das Libretto schrieb Berlioz selbst nach Vergils Epos Aeneis; die Partitur entstand zwischen 1856 und 1858. Les Troyens ist Berlioz' ehrgeizigstes Werk, die Summe seiner gesamten künstlerischen Laufbahn, doch er erlebte keine vollständige Aufführung mehr. Unter dem Titel Les Troyens à Carthage wurden die letzten drei Akte mit zahlreichen Kürzungen am 4. November 1863 am Théâtre Lyrique in Paris uraufgeführt. Nach Jahrzehnten der Vernachlässigung gilt die Oper heute manchen Musikkritikern als eine der besten überhaupt."

 elgar.1022.t: "La damnation de Faust"
 elgar.1022.f: "La damnation de Faust ist ein Werk für vier Solostimmen, vollen siebenstimmigen Chor, großen Kinderchor und Orchester von Hector Berlioz. Er nannte es eine 'légende dramatique' (dramatische Legende). Der französische Komponist ließ sich von einer Übersetzung von Goethes Faust inspirieren und schuf ein musikalisches Werk, das wie die literarische Vorlage schwer zu kategorisieren ist. Es wurde teils als Oratorium, teils als Oper konzipiert; seine Form als musikalische Reise und kosmische Perspektive machen es zu einer Herausforderung für jede szenische Umsetzung. Berlioz selbst wollte das Werk auf die Bühne bringen, musste aber einräumen, dass die Bühnentechnik seiner Zeit dafür nicht ausreichte. Berühmt wurde das Werk vor allem in Konzertaufführungen."

 elgar.1023.t: "Abhandlung über Instrumentation"
 elgar.1023.f: "\"Dieses Traité d'Instrumentation ist ein höchst paradoxes Werk. Es beginnt mit einem Vorwort, das mit dem eigentlichen Thema nichts zu tun hat, in dem der Autor gegen Musiker Stellung bezieht, die Modulationen missbrauchen und deren Vorliebe für Dissonanzen dem Geschmack gewisser Tiere für salzige Pflanzen und dornige Büsche entspricht. Dann wendet er sich den Orchesterinstrumenten zu und mischt seltsame Behauptungen mit den solidesten Wahrheiten und wertvollsten Ratschlägen.[...] In seiner Abhandlung wie in seiner Orchestrierung ist Berlioz, bei allen Eigenheiten, einfach fabelhaft. Ihm verdankt meine Generation ihre Ausbildung, und ich wage zu sagen, eine gute. Berlioz besaß die unschätzbare Gabe, die Fantasie zu entfachen und die Liebe zur Kunst, die er lehrte, zu wecken.[...] Diese scheinbar überflüssigen Musikbeispiele ließen einen träumen, sie öffneten die Tür zu einer neuen Welt, zu einem weiten und faszinierenden Blick in die Zukunft, ins Gelobte Land.\" – Camille Saint-Saëns"

 elgar.1031.t: "Les Préludes"
 elgar.1031.f: "Les Préludes ist das dritte von Franz Liszts dreizehn sinfonischen Dichtungen. Die Musik entstand zwischen 1845 und 1854 und war ursprünglich als Ouvertüre zu Liszts Chorzyklus Les quatre élémens (Die vier Elemente) gedacht, wurde dann aber als eigenständige Konzertouvertüre mit einem neuen Titel veröffentlicht, der sich auf ein Gedicht von Alphonse de Lamartine bezieht. Les Préludes ist das früheste Beispiel eines Orchesterwerks mit dem Titel 'Sinfonische Dichtung'. Liszt sieht die Phasen des Lebens als Präludien zur Melodie des Todes. Diese Lebensphasen sind Kämpfe und Stürme, Liebesglück und Schmerz, Trost, Naturerfahrung. Trotz der Kontraste in den Stimmungen ist das Werk von großer Geschlossenheit. Es beginnt mit einer melancholischen Melodie, aus der sich das erste stürmische Hauptthema entwickelt, das über einen pastoralen Teil zum zweiten Thema führt. Beide Themen werden in gleitenden Stimmungswechseln verarbeitet. In einem Höhepunkt geht das ursprüngliche Thema in eine majestätische, glanzvolle Fanfare über."

 elgar.1032.t: "Ungarische Rhapsodien"
 elgar.1032.f: "Die Ungarischen Rhapsodien sind ein Zyklus von 19 Klavierstücken, die Franz Liszt zwischen 1846 und 1853 sowie später 1882 und 1885 auf der Grundlage ungarischer Volksmelodien komponierte. Liszt arrangierte auch Fassungen für Orchester, Klavier zu vier Händen und Klaviertrio. Einige Stücke sind besonders bekannt, vor allem die Ungarische Rhapsodie Nr. 2, aber auch Nr. 6, Nr. 10, Nr. 12 und Nr. 14 (vor allem in der Orchesterfassung als Ungarische Fantasie). Liszt verarbeitete viele Melodien, die er in seiner westungarischen Heimat gehört hatte und für Volksmusik hielt, die aber oft von Mitgliedern des ungarischen Bürgertums oder Komponisten wie József Kossovits stammten. In ihrer Originalfassung für Klavier sind die Rhapsodien für ihre Schwierigkeit berüchtigt."

 elgar.1033.t: "Dante-Sinfonie"
 elgar.1033.f: "Die 'Dante-Sinfonie' ist eine Chor-Sinfonie von Franz Liszt. Sie ist im hochromantischen Stil gehalten und basiert auf Dantes Reise durch Hölle und Fegefeuer, wie sie in der Göttlichen Komödie geschildert wird. Einige Kritiker argumentieren, die Dante-Sinfonie sei weniger eine Sinfonie im klassischen Sinn als vielmehr zwei sinfonische Dichtungen. Liszts ursprüngliche Absicht war es, das Werk in drei Sätzen zu komponieren: Inferno, Purgatorio und Paradiso. Die ersten beiden sollten rein instrumental sein, das Finale ein Chor. Wagner überzeugte Liszt jedoch, dass kein irdischer Komponist die Freuden des Paradieses angemessen darstellen könne. Liszt verzichtete auf den dritten Satz, fügte aber am Ende des zweiten Satzes ein Chor-Magnificat hinzu. Liszt-Forscher Humphrey Searle meint, Liszt habe sich zwar im Inferno wohler gefühlt als im Paradies, aber die Darstellung des Himmels wäre ihm durchaus möglich gewesen."

 elgar.1041.t: "Die Meistersinger von Nürnberg"
 elgar.1041.f: "\"Die Meistersinger von Nürnberg' ist ein Musikdrama bzw. eine Oper in drei Akten von Richard Wagner. Sie ist die längste regelmäßig aufgeführte Oper und dauert fast viereinhalb Stunden, ohne die beiden Pausen zwischen den Akten, und wird traditionell nicht gekürzt. Die Meistersinger nehmen eine einzigartige Stellung im Werk Wagners ein. Es ist die einzige Komödie unter seinen reifen Opern und zudem ungewöhnlich, weil sie in einer historisch genau bestimmten Zeit und an einem realen Ort spielt, nicht in einer mythischen oder legendären Welt. Es ist auch die einzige reife Wagner-Oper mit einer völlig eigenständigen Handlung. Sie enthält viele Opernkonventionen, die Wagner in seinen theoretischen Schriften kritisiert hatte: Reimverse, Arien, Chöre, ein Quintett und sogar ein Ballett."

 elgar.1042.t: "Die Walküre"
 elgar.1042.f: "\"Die Walküre' bildet zusammen mit den Opern 'Das Rheingold', 'Siegfried' und 'Götterdämmerung' das Gesamtwerk 'Der Ring des Nibelungen'. Wagner folgte weitgehend den Prinzipien des Musikdramas, indem er Gefühle und Stimmungen musikalisch darstellte und ein System wiederkehrender Leitmotive verwendete, um Personen, Ideen und Situationen zu repräsentieren, statt der konventionellen opernhaften Einteilung in Arien, Ensembles und Chöre. Die Handlung basiert auf der nordischen Mythologie, wie sie in der Völsunga-Saga und der Lieder-Edda erzählt wird."

 elgar.1043.t: "Parsifal"
 elgar.1043.f: "Richard Wagners Parsifal enthält religiöse Elemente wie sakrale Musik, die Enthüllung der Monstranz (Gral), Taufe und das christliche Abendmahlsritual. Schon in seinen Zürcher Kunstschriften entwickelte Wagner die Idee, Kunst zur Klärung des Wesenskerns von Religion zu nutzen. Wagner erklärte, er habe, um seine gleichnishafte Botschaft von Erlösung und Erneuerung der Menschheit durch Mitgefühl – verkörpert durch den suchenden Parsifal und den leidenden Amfortas – zu vermitteln, eine Kunstform gewählt, die mit religiöser Symbolik eine 'entrückende Wirkung auf den Geist' haben solle. Wagner selbst bezeichnete das dreiteilige Werk als Bühnenweihfestspiel und bestimmte, dass es nur im Bayreuther Festspielhaus aufgeführt werden dürfe."

  elgar.1051.t: "Peer Gynt"
 elgar.1051.f: "Peer Gynt, Op. 23, ist die Bühnenmusik zu Henrik Ibsens gleichnamigem Drama von 1867, komponiert vom norwegischen Komponisten Edvard Grieg. Obwohl Grieg viele kurze Klavierstücke und Kammermusik schrieb, sticht seine Arbeit für Ibsen besonders hervor. Ursprünglich komponierte er 90 Minuten Orchestermusik für das Stück und stellte daraus später zwei Suiten zusammen. Peer Gynts Reisen um die Welt und in ferne Länder werden durch Griegs Instrumentenwahl klanglich dargestellt. Besonders bekannt wurden daraus 'Morgenstimmung', 'In der Halle des Bergkönigs' und 'Solveigs Lied'."

 elgar.1052.t: "Lyrische Stücke"
 elgar.1052.f: "Die Lyrischen Stücke sind eine Sammlung von 66 kurzen Klavierstücken von Edvard Grieg, veröffentlicht in 10 Heften zwischen 1867 und 1901. Die Sammlung enthält einige seiner bekanntesten Stücke, wie 'Hochzeitstag auf Troldhaugen', 'An den Frühling', 'Marsch der Trolle' und 'Schmetterling'. Das Thema des ersten Stücks, Arietta, war eine der Lieblingsmelodien des Komponisten. Der Pianist Andrei Gavrilov bezeichnete die Lyrischen Stücke als eine Art Tagebuch oder Bekenntnis, das Grieg sein Leben lang führte, da sie die intimsten Momente seines Lebens widerspiegeln."

 elgar.1053.t: "Norwegische Tänze"
 elgar.1053.f: "Die Norwegischen Tänze waren Griegs Antwort auf die erfolgreichen Slawischen Tänze von Antonín Dvořák und die Ungarischen Tänze von Johannes Brahms. Die Kollegen hatten ihre Tanzserien 1878 und 1881 für Klavier zu vier Händen beim Simrock-Verlag veröffentlicht. Grieg wagte zunächst keine Orchestrierung, da sein Freund Johan Svendsen mit seinen 'Norwegischen Rhapsodien' das Feld bereits besetzt hatte. Die Orchesterfassung der Norwegischen Tänze wurde daher von Robert Henriques arrangiert – sehr zu Griegs Zufriedenheit. Für den ersten Tanz nutzte Grieg den populären Sinklar-Marsch, für die letzten drei sogenannte 'Hallings', traditionelle norwegische Brauttänze für junge Männer, die schnell und akrobatisch sind."

 elgar.1061.t: "Deutsches Requiem"
 elgar.1061.f: "\"Hier gibt es wenig zu erzählen, aber ich muss dir dennoch sagen, dass ich ganz erfüllt bin von deinem Requiem, es ist ein sehr mächtiges Werk, das einen Menschen auf eine Weise ergreift, wie es nur wenige andere tun. Der tiefe Ernst, verbunden mit aller Magie der Poesie, wirkt wunderbar, erschütternd und beruhigend. Wie du weißt, kann ich das nie wirklich in Worte fassen, aber ich fühle den ganzen reichen Schatz dieses Werkes bis ins Innerste, und die Begeisterung, die aus jedem Stück spricht, bewegt mich tief, weshalb ich nicht anders kann, als zu sagen ... Ach, wenn ich es hören könnte, was würde ich dafür geben.\" – Clara Schumann"

 elgar.1062.t: "Ungarische Tänze"
 elgar.1062.f: "Die Ungarischen Tänze von Johannes Brahms sind eine Sammlung von 21 lebhaften Tanzstücken, die überwiegend auf ungarischen Themen basieren und 1879 vollendet wurden. Sie dauern jeweils etwa eine bis fünf Minuten. Die Tänze gehören zu Brahms' populärsten Werken und waren für ihn auch finanziell am erfolgreichsten. Jedes Stück wurde für eine Vielzahl von Instrumenten und Ensembles arrangiert. Brahms schrieb die Originalversion für Klavier zu vier Händen und bearbeitete die ersten zehn Tänze später für Klavier solo. Der Geiger Joseph Joachim, ein Freund von Brahms, schuf eine virtuose Fassung aller Tänze für Violine und Klavier."

 elgar.1063.t: "Sinfonie Nr. 4"
 elgar.1063.f: "Die 4. Sinfonie ist die letzte Sinfonie von Johannes Brahms. Heute zählt sie zu seinen beliebtesten und meistgespielten Orchesterwerken. Die kompromisslose Gestaltung des Werks irritierte zunächst. Als Brahms und Ignaz Brüll die Sinfonie Freunden auf zwei Klavieren vorspielten, reagierten etwa Clara Schumann und Max Kalbeck ablehnend. Eduard Hanslick soll ausgerufen haben: 'Während des ganzen Satzes war mir, als würde ich von zwei entsetzlich gescheiten Leuten durchgeprügelt.' Elisabeth von Herzogenberg beschrieb das Werk als 'eine kleine Welt für die Klugen und Wissenden, in der die im Dunkeln nur wenig Anteil haben können'. Als Brahms 1897 kurz vor seinem Tod eine Aufführung der Sinfonie besuchte, erhielt er vom Wiener Publikum stürmischen Applaus, den das Werk bis heute erfährt."

 elgar.1071.t: "Sinfonie Nr. 5"
 elgar.1071.f: "Wie einige andere Sinfonien Mahlers wurde auch die 5. Sinfonie nach ihrer Uraufführung nicht verstanden. 1905, nach einer missglückten Aufführung in Hamburg, klagte Mahler: 'Die Fünfte ist ein verfluchtes Werk. Keiner begreift sie.' Die Kritiken in den Jahren nach der Uraufführung waren meist negativ. Der Musikkritiker Ferdinand Pfohl etwa hielt die 5. Sinfonie für eine der schwächeren Arbeiten Mahlers. Nur die Neue Zeitung für Musik sprach von einem 'überwältigenden Reichtum an Schönheit'. Besonders im Vergleich zur zwei Jahre früher entstandenen 4. Sinfonie markiert sie einen bedeutenden Unterschied in Inhalt und Form. Mit der raueren Klangwelt der 5. Sinfonie beginnt Mahler eine neue Schaffensphase, die in der 6. Sinfonie fortgeführt wird. Erst nach Mahlers Tod wurde das Werk zunehmend geschätzt."

 elgar.1072.t: "Das Lied von der Erde"
 elgar.1072.f: "\"Ist es wirklich derselbe Mann, der, 'im Einklang mit dem Unendlichen', das Gebäude der Achten errichtete, den wir nun im Trinklied vom Leid der Erde finden? Der einsam im Herbst zu seinem geliebten Ruheplatz schleicht, sich nach Erquickung sehnt? Der mit freundlichem Altersblick auf die Jugend schaut, mit sanfter Rührung auf Schönheit? Der das sinnlose irdische Dasein im Rausch zu vergessen sucht und schließlich melancholisch Abschied nimmt? [...] Es ist kaum derselbe Mensch und Komponist. Alle Werke bis dahin waren aus dem Lebensgefühl heraus entstanden [...] Die Erde verschwindet, eine andere Luft weht herein, ein anderes Licht leuchtet darüber. [...] Als ich ihm das Autograph zurückbrachte, fast unfähig ein Wort darüber zu sagen, schlug er den 'Abschied' auf und sagte: 'Was meinst du? Ist das überhaupt erträglich? Bringen sich die Leute danach nicht um?' Dann wies er auf die rhythmischen Schwierigkeiten und fragte scherzhaft: 'Irgendeine Idee, wie man das dirigiert? Ich nicht!'\" – Bruno Walter"

 elgar.1073.t: "Kindertotenlieder"
 elgar.1073.f: "\"Ich kann gut verstehen, dass man solche schrecklichen Texte komponiert, wenn man keine Kinder hat oder wenn man Kinder verloren hat. Aber ich kann nicht verstehen, wie man über den Tod von Kindern singen kann, wenn man sie eine halbe Stunde vorher noch gesund und glücklich umarmt und geküsst hat!\" – Alma Mahler-Werfel, Ehefrau von Gustav Mahler"

 elgar.1081.t: "Klavierkonzert Nr. 3"
 elgar.1081.f: "Damals war Mahler der einzige Dirigent, den ich für würdig hielt, mit Nikisch verglichen zu werden. Er widmete sich dem Konzert bis zur Perfektion der Begleitung, die recht kompliziert ist, obwohl er bereits eine lange Probe hinter sich hatte. Für Mahler war jedes Detail der Partitur wichtig – eine Haltung, die unter Dirigenten selten ist. ... Obwohl die Probe um 12:30 Uhr enden sollte, spielten wir immer weiter, und als Mahler ankündigte, dass der erste Satz nochmals geprobt werde, erwartete ich Proteste oder Unmut der Musiker, aber ich bemerkte kein einziges Anzeichen von Ärger. Das Orchester spielte den ersten Satz mit noch größerem Verständnis als zuvor." – Sergei Rachmaninow

 elgar.1082.t: "Rhapsodie über ein Thema von Paganini"
 elgar.1082.f: "Das Werk besteht aus 24 Variationen über ein Thema, das Niccolò Paganini selbst als Grundlage für eine Variationsreihe verwendete. Diese Melodie diente immer wieder verschiedenen Komponisten als Vorlage, darunter Johannes Brahms und Franz Liszt. In einigen Variationen verwendet Rachmaninow eine andere, viel ältere Melodie: das 'Dies irae', einst fester Bestandteil der lateinischen Totenmesse. Rachmaninow griff dieses Thema in vielen seiner Werke auf, etwa in allen Sinfonien, den Symphonischen Tänzen, dem Tongedicht Die Toteninsel und der ersten Klaviersonate. Die Kombination aus Paganini-Thema und 'Dies irae' regt zu programmatischen Deutungen an. Der Legende nach verkaufte der große Geiger seine Seele dem Teufel, um Perfektion auf seinem Instrument und die Liebe einer Frau zu erlangen. Das 'Dies irae'-Motiv steht für den Teufel, das Paganini-Thema für den komponierenden Geiger selbst."

 elgar.1083.t: "Sinfonie Nr. 3"
 elgar.1083.f: "\"Sie wurde in New York, Philadelphia, Chicago usw. gespielt. Bei den ersten beiden Aufführungen war ich anwesend. Sie wurde wunderbar gespielt. Die Aufnahme durch Publikum und Kritiker war jedoch verhalten. Eine Kritik ist mir schmerzlich in Erinnerung geblieben: dass ich keine dritte Sinfonie mehr in mir hätte. Persönlich bin ich fest davon überzeugt, dass es ein gutes Werk ist. Aber – manchmal irren sich auch Komponisten! Wie dem auch sei, ich halte bisher an meiner Meinung fest.\" – Sergei Rachmaninow

 elgar.1091.t: "Romeo und Julia"
 elgar.1091.f: "Romeo und Julia ist Prokofjews längstes und bekanntestes Ballett und gilt als sein wichtigster Beitrag zum Genre. Es ist ein Höhepunkt seines musikalischen Schaffens. Die reiche und abwechslungsreiche Instrumentierung sowie die rhythmische Komplexität der Partitur stellen bis heute Orchester und Tänzer vor Herausforderungen. An einigen Stellen grenzen die Dissonanzen an Atonalität. Der berühmte 'Tanz der Ritter' mit seinen punktierten Rhythmen ist heute als quasi-sinfonisches Thema bekannt. Im Gegensatz dazu sind die Themen, die mit Julias Erwachen zur Liebe verbunden sind, zugleich zart und jugendlich lebendig. Prokofjew verwendete Musik aus dem Ballett in drei Orchestersuiten und einem Klavierwerk."

 elgar.1092.t: "Leutnant Kijé"
 elgar.1092.f: "Die Musik zu Leutnant Kijé wurde ursprünglich als Filmmusik für den gleichnamigen Film geschrieben. Es war Prokofjews erster Versuch im Bereich Filmmusik und sein erster Auftrag. In den frühen Tagen des Tonfilms waren viele namhafte Komponisten bereit, sich an Filmmusik zu versuchen, doch Prokofjew galt aufgrund seiner experimentellen und dissonanten Werke nicht als offensichtliche Wahl. Bald nach der Veröffentlichung des Films erhielt Prokofjew eine Einladung vom Moskauer Radiosinfonieorchester, aus der Kijé-Musik eine Orchestersuite zu erstellen – vermutlich das erste Mal, dass eine Filmmusik zu einem bedeutenden Konzertwerk umgearbeitet wurde. Während Prokofjew für die Bostoner Uraufführung in den USA war, umwarben ihn Filmproduzenten, doch obwohl er geschmeichelt war, komponierte er nie eine Hollywood-Filmmusik."

 elgar.1093.t: "Peter und der Wolf"
 elgar.1093.f: "Peter und der Wolf ist ein 'symphonisches Märchen für Kinder'. Es ist Prokofjews meistgespieltes Werk und eines der meistgespielten Stücke der gesamten klassischen Literatur. Ein Erzähler erzählt eine Kindergeschichte, während das Orchester sie illustriert, indem verschiedene Instrumente jeweils ein 'Thema' spielen, das einen Charakter der Geschichte repräsentiert: 'Jede Figur dieser Erzählung wird durch ein entsprechendes Instrument im Orchester dargestellt: Der Vogel durch eine Flöte, die Ente durch ein Oboe, die Katze durch eine Klarinette im tiefen Register, der Großvater durch ein Fagott, der Wolf durch drei Hörner, Peter durch das Streichquartett, die Schüsse der Jäger durch Pauken und große Trommel. Vor einer Orchesteraufführung empfiehlt es sich, den Kindern diese Instrumente zu zeigen und die entsprechenden Leitmotive darauf vorzuspielen. So lernen die Kinder, die Instrumente während der Aufführung zu unterscheiden.'"

 elgar.1101.t: "Die Fledermaus"
 elgar.1101.f: "Johann Strauss' Fledermaus gilt als Höhepunkt der Operettenära. Neben Der Zigeunerbaron und Eine Nacht in Venedig ist Die Fledermaus eine der drei berühmtesten Strauss-Operetten und eine der wenigen, die regelmäßig an großen internationalen Opernhäusern aufgeführt werden. Die Texte sind eingängig und voller Ironie mit zeitlosen Wahrheiten. Wesentliche Teile der Musik sollen innerhalb von 42 Tagen entstanden sein. Die Ouvertüre, in freier Sonatenform geschrieben, nimmt eine besondere Stellung ein und zählt zu Strauss' größten Schöpfungen. Sie fasst die zahlreichen musikalischen Höhepunkte des gesamten Werks zusammen und ist mit ihrer abwechslungsreichen Dynamik stets eine Herausforderung selbst für Spitzenorchester."

 elgar.1102.t: "Donauwalzer"
 elgar.1102.f: "Der Walzer 'An der schönen blauen Donau' basiert kompositorisch auf Melodien, die Johann Strauss bereits in früheren Werken verwendet hatte. Schon bei der Uraufführung begeisterte er das Publikum. Aufgrund der Vielzahl neuer Musikveröffentlichungen zur Faschingszeit setzte sich der Walzer zunächst nicht durch. Da Strauss jedoch im selben Jahr auf der Pariser Weltausstellung 1867 auftrat und neue Kompositionen präsentierte, erinnerte er sich daran, diesen Walzer ins Programm zu nehmen. Unter dem Namen 'Le beau Danube bleu' wurde das Stück während dieser Ausstellung ein großer Erfolg. Es wird angenommen, dass insbesondere die zweihändige Klavierversion in kurzer Zeit fast 1.000.000 Mal verkauft wurde. Der Walzer gilt als heimliche Hymne Österreichs und als eines der beliebtesten Stücke der gesamten Musikgeschichte."

 elgar.1103.t: "Eine Nacht in Venedig"
 elgar.1103.f: "Eine Nacht in Venedig ist eine 'komische Operette' in drei Akten. Die Handlung spielt im Venedig des mittleren 18. Jahrhunderts und ist eine Verwechslungskomödie mit Liebeswirren zwischen zwei Gesellschaftsschichten. Wie viele andere Wiener Operetten basiert das Libretto auf einer französischen Opéra-comique. Die Berliner Uraufführung war ein Misserfolg, was teils an der verworrenen Handlung, teils an den zugrunde liegenden Texten lag. Das Stück wurde daher für die Premiere am Theater an der Wien überarbeitet. Auch die Ouvertüre wurde von Strauss überarbeitet. Die berühmtesten Musiknummern sind der Lagunenwalzer und das Gondellied. 1923 und 1931 wurde das Werk von Erich Wolfgang Korngold überarbeitet; eine weitere Version schrieb Walter Felsenstein 1954; die Originalfassung wird heute nur noch selten gespielt."

 elgar.1111.t: "Rigoletto"
 elgar.1111.f: "Rigoletto ist eine Oper von Giuseppe Verdi mit einem Libretto von Francesco Maria Piave. Sie basiert auf dem Melodrama 'Le roi s'amuse' von Victor Hugo. Die Oper wurde zunächst von den Zensoren kritisiert; Verdi und Piave mussten daher unter anderem den ursprünglich vorgesehenen Titel ändern und den Schauplatz von Paris nach Mantua verlegen. Die für Verdi wesentlichen Elemente, wie die verkrüppelte Hauptfigur Rigoletto und der Sack, in den seine sterbende Tochter gelegt wird, blieben jedoch erhalten. Die Oper gilt als Verdis erstes Meisterwerk und begründete seinen Weltruhm. Verdi selbst hielt Rigoletto für eines seiner gelungensten Werke, und im Gegensatz zu anderen Verdi-Opern gibt es keine Überarbeitungen oder neuen Fassungen. Rigoletto war bei der Uraufführung ein überwältigender Erfolg und wurde in den folgenden Jahren an fast allen europäischen Opernhäusern gespielt. Die Oper steht seit über 160 Jahren auf den Spielplänen vieler Häuser und ist eine der meistgespielten italienischen Opern."

 elgar.1112.t: "La Traviata"
 elgar.1112.f: "La traviata ist eine Oper von Giuseppe Verdi und Francesco Maria Piave nach dem Roman 'Die Kameliendame' von Alexandre Dumas dem Jüngeren. Wie schon in Rigoletto und Il trovatore stellte Verdi eine von der Gesellschaft ausgestoßene und abgelehnte Person in den Mittelpunkt. Eine Oper über eine Kurtisane, die an Tuberkulose stirbt, war damals eine skandalöse Neuerung. Das Werk fiel bei der Uraufführung durch, obwohl Verdi selbst es inszeniert und vorsorglich die Handlung in die Zeit Ludwigs XIV. verlegt hatte. Nach einer Überarbeitung ließ Verdi die Oper ein Jahr später erneut aufführen – danach wurde sie eine der erfolgreichsten Opern der Musikgeschichte. In manchen Ländern ist sie die meistgespielte Oper überhaupt. Nach der Zahl der Aufnahmen wird La traviata nur von Aida übertroffen. Aus Zensurgründen wurde die Oper in Italien auch unter dem Titel 'Violetta' aufgeführt."

 elgar.1113.t: "Messa da Requiem"
 elgar.1113.f: "Unter dem Eindruck des Todes von Gioachino Rossini im Jahr 1868 lud Giuseppe Verdi die damals zwölf wichtigsten Komponisten Italiens ein, gemeinsam eine Totenmesse, die sogenannte Messa per Rossini, zu komponieren. Er selbst übernahm die Vertonung des Schlussstücks 'Libera me' in diesem Requiem. Eine Aufführung kam jedoch wegen widriger Umstände nicht zustande. Verdi beschäftigte sich erneut mit dem Requiem-Stoff, nachdem der Dichter Alessandro Manzoni 1873 gestorben war. Verdi bewunderte den hochgeschätzten Manzoni zutiefst. Er bot der Stadt Mailand die Komposition einer Messe an, die ein Jahr nach Manzonis Tod aufgeführt werden sollte. Das 'Libera me' aus der Rossini-Messe wurde nun zum Kernstück des neuen Requiems für Manzoni. Die Vertonung des 'Dies irae' aus der älteren Komposition wurde dreimal für Passagen mit gleichem oder ähnlichem Text übernommen. Die Uraufführung fand am 22. Mai 1874 in der Kirche San Marco in Mailand zum ersten Todestag Manzonis statt. Verdi selbst dirigierte."

 elgar.1121.t: "Prélude à l'après-midi d'un faune"
 elgar.1121.f: "\"Die Musik dieses Préludes ist eine sehr freie Illustration von Mallarmés schönem Gedicht. Sie beansprucht keineswegs, eine Synthese davon zu sein. Vielmehr gibt es eine Abfolge von Szenen, in denen die Wünsche und Träume des Fauns in der Hitze des Nachmittags vorbeiziehen. Dann, müde von der Verfolgung der scheuen Flucht der Nymphen und Najaden, erliegt er einem berauschenden Schlaf, in dem er seine Träume von Besitz in der universellen Natur endlich verwirklichen kann.\"\n\nDas Prélude à l'après-midi d'un faune ist eine sinfonische Dichtung für Orchester und eines der berühmtesten Werke Debussys. Das Stück gilt als Wendepunkt in der Geschichte der westlichen Kunstmusik und als Meisterwerk impressionistischer Komposition. Pierre Boulez bezeichnete die Partitur als Beginn der modernen Musik und meinte: 'Die Flöte des Fauns brachte der Musik neue Luft.'"

 elgar.1121.g: "Genieße, träume, genieße den nie endenden Moment..."

 elgar.1122.t: "La Mer"
 elgar.1122.f: "\"Das gestrige Konzert begann mit vielen impressionistischen Farbtupfern, die wild und planlos auf eine tonale Palette geschmiert wurden, ohne jeglichen Gedanken an Form oder Zweck, außer neue Klangkombinationen zu schaffen. ... Nur eines war sicher: Der Ozean des Komponisten war ein Froschteich, und einige seiner Bewohner saßen jedem Blechblasinstrument im Hals.\"\n\nZwischen 1903 und 1905 komponiert, wurde La mer im Oktober 1905 in Paris uraufgeführt. Zunächst wurde das Werk nicht gut aufgenommen. Selbst einige, die Debussys Arbeit bislang unterstützt hatten, waren wenig begeistert, obwohl das Stück drei zentrale Aspekte von Debussys Ästhetik präsentierte: Impressionismus, Symbolismus und Japonismus. In den Jahrzehnten nach der Uraufführung etablierte sich La mer als fester Bestandteil des Orchesterrepertoires."

 elgar.1123.t: "Pelléas et Mélisande"
 elgar.1123.f: "\"Als Lehrer war er pedantisch – das ist das einzige Wort. Wirklich pedantisch ... In ihm war ein Kern von Zorn und Bitterkeit – ich denke oft, er war Golaud in Pelléas gar nicht unähnlich, und doch war er es nicht. Er war – das steckt in all seiner Musik – ein sehr sinnlicher Mensch. Niemand schien ihn zu mögen. Jean Périer, der Pelléas zu meiner Mélisande spielte, wurde weiß vor Zorn, wenn man Debussys Namen erwähnte...\"\n\nPelléas et Mélisande ist eine Oper in fünf Akten. Die Gattungsbezeichnung des Komponisten Claude Debussy lautet 'Drame lyrique'. Der Text ist eine Adaption des Dramas Pelléas et Mélisande von Maurice Maeterlinck. Debussy verzichtete auf Arien und größere Soloszenen, was dem Text einen realistischen Charakter verlieh. Pelléas blieb Debussys einzige vollendete Oper. Aus diesem Grund wurde sie manchmal mit Beethovens Fidelio verglichen."

 elgar.1131.t: "Schwanensee"
 elgar.1131.f: "Schwanensee ist ein weltberühmtes Ballett zur Musik von Pjotr Iljitsch Tschaikowski, das 1877 am Bolschoi-Theater in Moskau uraufgeführt wurde und zum Standardrepertoire klassischer Ballettkompanien gehört. In Schwanensee finden sich Motive zahlreicher Märchen: insbesondere das unglücklich verzauberte Mädchen, das durch die Liebe eines Prinzen erlöst wird. Das tragische Ende des Original-Librettos ist ebenfalls ein bekanntes Märchenmotiv des Schwanenmädchens. Tschaikowski griff für seine Schwanensee-Partitur auf frühere Kompositionen zurück. Zwei Verwandte berichteten, der Komponist habe 1871 zu Hause ein kleines Ballett namens 'Der Schwanensee' geschaffen, das das berühmte Leitmotiv enthielt. Außerdem verwendete er Material aus der Oper 'Der Wojewode', die er 1868 aufgegeben hatte. Bis April 1876 war die Partitur fertiggestellt, und die Proben begannen. Der Choreograf Reisinger legte bestimmte Nummern beiseite, die er für 'untanzbar' hielt, und choreografierte sogar Tänze zu anderer Musik, doch Tschaikowski protestierte und setzte seine Stücke wieder durch."

 elgar.1132.t: "Sinfonie Nr. 6 'Pathétique'"
 elgar.1132.f: "\"Ich bin jetzt ganz von dem neuen Werk eingenommen ... und es fällt mir schwer, mich davon loszureißen. Ich glaube, es entsteht als das beste meiner Werke. Ich muss es so bald wie möglich beenden, denn ich habe noch viele Dinge zu erledigen und muss bald nach London. Ich habe dir erzählt, dass ich eine Sinfonie vollendet hatte, die mir plötzlich missfiel, und ich habe sie zerrissen. Jetzt habe ich eine neue Sinfonie komponiert, die ich sicher nicht zerreißen werde.\"\n\nZwei Jahre nach der Uraufführung seiner 5. Sinfonie in e-Moll, op. 64, plante Tschaikowski, wie er einem Freund schrieb, 'eine großartige Sinfonie zu schreiben, die den Höhepunkt meines gesamten Schaffens bildet'. Der Komponist nannte das Werk 'Die leidenschaftliche Sinfonie'. Charakteristisch ist der langsame Schlusssatz – ungewöhnlich für Sinfonien –, dessen Ende an ein Requiem erinnert."

 elgar.1133.t: "Violinkonzert D-Dur"
 elgar.1133.f: "Das Violinkonzert in D-Dur ist das einzige Violinkonzert des russischen Komponisten Pjotr Iljitsch Tschaikowski. Tschaikowski schrieb das Konzert im März und April 1878 in Clarens am Genfersee, wo er sich von einer Depression und einem schweren Nervenzusammenbruch erholte. Die positive Wirkung seines Aufenthalts spiegelte sich im Konzert wider, in dem sich seine wiedergewonnene Lebensfreude manifestierte. Die Komposition war nach drei Wochen abgeschlossen, wobei Tschaikowski den ursprünglich geplanten Mittelsatz durch das als 'Canzonetta' bekannte Andante ersetzte. Musikkritiker reagierten zunächst negativ auf das Werk. Tschaikowski nahm es gelassen und war überzeugt, dass sich das Konzert durchsetzen würde. Bis heute zählt es zu den berühmtesten, meistgespielten und meistaufgeführten Violinkonzerten der Welt."

 elgar.1141.t: "Pomp & Circumstance"
 elgar.1141.f: "Die Pomp and Circumstance Military Marches sind eine Reihe von fünf (oder sechs) Märschen für Orchester. Sie gehören zu Elgars bekanntesten Kompositionen. Der bekannteste der sechs Märsche, Pomp And Circumstance March No. 1 in D, wurde zusammen mit Nr. 2 am 19. Oktober 1901 in Liverpool uraufgeführt. Elgar und seine Frau waren anwesend, und es war ein 'frenetischer' Erfolg. Das Trio enthält die Melodie, die als 'Land of Hope and Glory' bekannt ist. 1902 wurde die Melodie in modifizierter Form für den gleichnamigen Abschnitt seiner Coronation Ode für König Edward VII. wiederverwendet. Die Worte wurden weiter angepasst, um zur Originalmelodie zu passen, und das Ergebnis ist seitdem ein fester Bestandteil der Last Night of the Proms sowie eine englische Sporthymne und patriotisches Lied."
 elgar.1141.g: "Land of Hope and Glory!"

 elgar.1142.t: "The Crown of India"
 elgar.1142.f: "The Crown of India war ein Maskenspiel, eine aufwendige Theateraufführung, die 1912 zur Feier des Besuchs von König Georg V. und Königin Mary in Delhi anlässlich ihrer Krönung zum Kaiser und zur Kaiserin von Indien inszeniert wurde. Für dieses Maskenspiel schrieb der englische Komponist Sir Edward Elgar die Musik, das Libretto stammt von Henry Hamilton. Das Maskenspiel bestand aus zwei Tableaux: 'The Cities of Ind' und 'Ave Imperator!'. Elgar extrahierte später fünf Stücke und fügte ein Intermezzo für Solo-Violine hinzu, um The Crown of India Suite zu schaffen. Die Suite wurde sofort populär: Zu Elgars Lebzeiten gab es 102 Live-Aufführungen davon bei der BBC."

 elgar.1143.t: "Enigma-Variationen"
 elgar.1143.f: "Die Enigma-Variationen sind ein Orchesterwerk, das die Menschen aus Elgars Umfeld in 14 Variationen beschreibt. Sie machten Elgar nach der Uraufführung unter Hans Richter international bekannt. Das 'Enigma' im Titel bezieht sich nicht auf die Zuordnung, welche Variation welchem Freund gewidmet ist, sondern auf ein anderes Rätsel. Laut Elgar gibt es ein anderes, größeres Thema, das sich durch die gesamte Komposition zieht, aber nicht gespielt wird, und das eigentliche Thema ist als Gegenmelodie dazu komponiert. Es wurden verschiedene Theorien aufgestellt. Besonders die 9. Variation (Nimrod) wurde sehr populär."

 elgar.1151.t: "Die 9. Sinfonie"
 elgar.1151.f: "1892 zog Dvořák in die Vereinigten Staaten und wurde Direktor des National Conservatory of Music of America in New York. Während seines Aufenthalts in den USA schrieb Dvořák eines seiner erfolgreichsten Orchesterwerke: die Sinfonie 'Aus der Neuen Welt', die seinen Ruf weltweit verbreitete. Es heißt, Dvořák ließ sich von den 'weiten Ebenen' Amerikas inspirieren, etwa von Prärien, die er auf seiner Reise nach Iowa im Sommer 1893 gesehen haben könnte. Dvořák wurde auch von Stil und Techniken früherer klassischer Komponisten wie Beethoven und Schubert beeinflusst. Die fallenden Quarten und Paukenschläge im Scherzo der Neuen Welt erinnern an das Scherzo von Beethovens 9. Sinfonie. Bei der Uraufführung in der Carnegie Hall wurde das Ende jedes Satzes mit tosendem Applaus bedacht, und Dvořák fühlte sich verpflichtet, sich zu verbeugen."

 elgar.1152.t: "Slawische Tänze"
 elgar.1152.f: "Die Slawischen Tänze sind eine Sammlung von 16 Instrumentalstücken von Antonín Dvořák, geschrieben für Klavier zu vier Händen und kurz darauf für Orchester arrangiert. Sie gehören zu den bekanntesten Werken des tschechischen Komponisten. Dvořáks Kompositionen verwenden charakteristische rhythmische Muster böhmischer und mährischer Volkstänze sowie der Nachbarländer. Dennoch sind sie vollständig eigenständige Schöpfungen des Komponisten. In der ersten Reihe gibt es zwei Furiants mit Rhythmuswechseln, zwei Sousedskás ähnlich dem Ländler, zwei Skočnás (schneller Springtanz), eine Polka und als einzigen nicht-tschechischen Tanz eine ukrainische Dumka. In der zweiten Serie überwiegen nicht-tschechische Tänze, weshalb Dvořák teils Anfeindungen ausgesetzt war. Man warf ihm vor, sich nicht genug mit seiner Heimat zu identifizieren und sich stattdessen im Ausland beliebt machen zu wollen."

 elgar.1153.t: "Rusalka"
 elgar.1153.f: "Rusalka ist Antonín Dvořáks erfolgreichste Oper. Sie entstand nach einem Libretto von Jaroslav Kvapil und basiert auf slawischen Volksmythen über die Rusalky (Wassergeister, Meerjungfrauen) und ähnelt der deutschen Geschichte 'Undine' von Friedrich de la Motte Fouqué, Hans Christian Andersens Märchen 'Die kleine Meerjungfrau' und der altfranzösischen Melusinen-Sage. Die Oper mit dem Untertitel 'Lyrisches Märchen' ist auch als 'tschechische Undine' bekannt. Zusammen mit Smetanas 'Die verkaufte Braut' ist Rusalka die bekannteste tschechische Oper. Sie nimmt einen wichtigen Platz in der Entwicklung der tschechischen dramatischen Musik ein."

 elgar.1161.t: "Fantasie in C-Dur"
 elgar.1161.f: "Die Fantasie in C-Dur ist eine der wichtigsten Klavierkompositionen Robert Schumanns. Zusammen mit der Kreisleriana und den Kinderszenen zählt sie zu seinen bekanntesten Stücken und zum Kernbestand der romantischen Klavierliteratur. Er widmete sie Franz Liszt, dem bewunderten Virtuosen, der sich Jahre später mit der großen h-Moll-Sonate revanchierte. Der visionäre Schwung dieser Klavierfantasie und die über das gesamte Werk anhaltende Kraft erinnern an die architektonische Meisterschaft Ludwig van Beethovens, aus dessen Liederkreis 'An die ferne Geliebte' Schumann im ersten Satz mehrfach zitiert, während er im dritten Satz ein Thema aus dem Allegretto der 7. Sinfonie aufnimmt."

 elgar.1162.t: "Klavierkonzert a-Moll"
 elgar.1162.f: "Das Klavierkonzert in a-Moll op. 54 ist ein romantisches Solokonzert für Klavier und Orchester, das während der Hochromantik entstand. Es trägt viele Merkmale der Epoche. Wie einige andere Klavierkonzerte des 19. Jahrhunderts hat das a-Moll-Konzert einen sinfonischen Charakter. Da das Werk zunächst als Fantasie konzipiert war, hat das gesamte Konzert romantische und phantastische Eindrücke. Schumann benötigte über fünf Jahre für die verzögerte Fertigstellung. Auf dem Titelblatt des Autographs weist Schumann auf die unterschiedlichen Entstehungszeiten der Sätze hin. Grundideen des Werks sind Sehnsucht und das Glück zweier Liebender. In diesem Werk vertont Schumann seinen Kampf um Clara Wieck. Das Hauptthema des ersten Satzes ähnelt der Melodie der Florestan-Arie aus Beethovens Oper Fidelio. Wie bei Beethoven steht dieses Thema auch für eheliche Treue und den Kampf um Freiheit bei Schumann."

 elgar.1163.t: "Kinderszenen"
 elgar.1163.f: "Die Kinderszenen sind ein Zyklus von Robert Schumann, bestehend aus dreizehn kurzen Klavierstücken. Im Gegensatz zum 'Album für die Jugend' wurden sie nicht für Kinder komponiert, sondern, so Schumann selbst, als 'Rückblick eines Erwachsenen für Erwachsene'. Das bekannteste und längste Stück des Zyklus ist die 'Träumerei'. Mit einer Spieldauer von knapp 20 Minuten gehören die Kinderszenen heute zu den beliebtesten romantischen Klavierwerken. Während Schumanns Lebzeiten waren sie wenig erfolgreich, hatten für ihn jedoch eine besondere Bedeutung. Ein Briefwechsel von 1839 zeigt, dass Schumann damals fest an die Möglichkeit einer Ehe mit Clara Wieck glaubte und die Kinderszenen aus seiner optimistischen und heiteren Seite entstanden."

 elgar.1171.t: "Violinkonzert e-Moll"
 elgar.1171.f: "Felix Mendelssohns Violinkonzert in e-Moll ist sein letztes Konzert. Es wurde bei der Uraufführung sehr gut aufgenommen und gehört bis heute zu den bedeutendsten und meistgeschätzten Violinkonzerten. Es nimmt einen zentralen Platz im Violinrepertoire ein und gilt als Pflichtstück für alle angehenden Konzertviolinisten und meist als eines der ersten romantischen Konzerte, die sie erlernen. Das Werk selbst war eines der wichtigsten Violinkonzerte der Romantik und beeinflusste viele andere Komponisten. Obwohl das Konzert aus drei Sätzen in der üblichen schnellen-langsamen-schnellen Struktur besteht und jeder Satz einer traditionellen Form folgt, war es für seine Zeit innovativ und enthielt viele neue Elemente. Auffällig ist der fast unmittelbare Einsatz der Violine zu Beginn des Werks – anstelle einer orchestralen Vorstellung der Hauptthemen, wie es in klassischen Konzerten üblich war."

 elgar.1181.t: "Etüden"
 elgar.1181.f: "Frédéric Chopin schrieb insgesamt 27 Etüden für Klavier: 12 Etüden op. 10 (erschienen 1833), 12 Etüden op. 25 (erschienen 1837) und drei weitere Etüden für den dritten Teil (Études de perfectionnement pour le piano, erschienen 1840) der Klavierschule Méthodes des Méthodes von Ignaz Moscheles und François-Joseph Fétis. Die drei Etüden wurden später separat unter dem Titel Trois nouvelles études veröffentlicht. Als 'Magna Carta des Klavierspiels' (Karl Schumann) zählen sie zu den wichtigsten Klavierkompositionen der Musikgeschichte. Große Klavierkomponisten wie Alkan, Skrjabin, Debussy und Rachmaninow orientierten sich an ihnen. Franz Liszt und Józef Wieniawski waren die ersten Pianisten, die Chopin-Etüden öffentlich aufführten."

 elgar.1191.t: "Ein Leben für den Zaren"
 elgar.1191.f: "Nach Jahren, in denen er Sänger zuhörte, Frauen mit seiner Musik umwarb und berühmte Persönlichkeiten wie Mendelssohn, Berlioz und Liszt traf, erkannte Glinka, dass seine Lebensaufgabe darin bestand, nach Russland zurückzukehren, im russischen Stil zu schreiben und für die russische Musik das zu tun, was Donizetti und Bellini für die italienische Musik getan hatten. 'Ein Leben für den Zaren' war die erste seiner beiden großen Opern. Ursprünglich hieß sie 'Iwan Susanin'. Sie spielt 1612 und erzählt die Geschichte des russischen Bauern und patriotischen Helden Iwan Susanin, der sein Leben für den Zaren opfert, indem er eine Gruppe marodierender Polen, die den Zaren jagen, in die Irre führt. Mit dieser Oper gelang Glinka die Schaffung einer eigenständigen russischen Musik; sie gilt als erste russische Oper."

 elgar.1192.t: "Ruslan und Ljudmila"
 elgar.1192.f: "Ruslan und Ljudmila ist eine 'phantastische Oper' in fünf Akten mit Musik von Michail Glinka und einem Libretto von Nestor Kukolnik und anderen nach dem gleichnamigen Gedicht von Alexander Sergejewitsch Puschkin. Puschkins Tod im berühmten Duell verhinderte, dass er das Libretto wie geplant selbst schrieb. Wie bei 'Ein Leben für den Zaren' verwendet Glinka Elemente russischer Volksmusik; zudem ist die Oper bekannt für den fantasievollen Einsatz von Dissonanzen, Chromatik und orientalischen Elementen. Besonders bemerkenswert ist der erstmalige Einsatz der Ganztonleiter in der russischen Musik. Die mitreißende Ouvertüre ist eines der bekanntesten Orchesterstücke im Westen und gilt als Albtraum für Kontrabassisten."

 elgar.1193.t: "Kamarinskaya"
 elgar.1193.f: "Kamarinskaya ist ein traditioneller russischer Volkstanz, der heute vor allem durch die gleichnamige Komposition von Michail Glinka bekannt ist. Glinkas Kamarinskaya, 1848 geschrieben, war das erste Orchesterwerk, das vollständig auf russischem Volkslied basierte und die kompositorischen Prinzipien dieses Genres zur Gestaltung der Musik nutzte. Es wurde zum Vorbild für die folgende Generation russischer Komponisten, von den westlich orientierten Pjotr Iljitsch Tschaikowski bis zur Gruppe der Nationalisten, die als 'Das Mächtige Häuflein' bekannt sind, und wurde auch im Ausland, besonders von Hector Berlioz, gelobt. Für Tschaikowski bot Kamarinskaya ein überzeugendes Beispiel für die kreativen Möglichkeiten von Volksliedern in einer sinfonischen Struktur, mit einer Vielzahl harmonischer und kontrapunktischer Kombinationen."
  
