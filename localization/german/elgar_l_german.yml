 elgar_adopt_national_anthem_decision: "Nehmen Sie eine Nationalhymne an"
 elgar_adopt_national_anthem_decision_desc: "Angesichts des wachsenden Nationalismus ist das Fehlen einer Nationalhymne gleichbedeutend mit Betrug. Es genügt, einigermaßen akzeptable zeremonielle Musik für repräsentative Zwecke auszuwählen. Komponisten können nach dem Zufallsprinzip Musikstücke erstellen, die später verwendet werden, sie können aber auch direkt in Auftrag gegeben werden. Nicht alle Hymnen müssen einen Text haben – aber es ist viel prestigeträchtiger."
