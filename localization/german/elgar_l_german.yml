 elgar_art_nouveau_tech_desc:1 "#R Diese Technologie ist nur über eine Schaltfläche im Reiter 'Kunst' der Morgenröte-Benutzeroberfläche verfügbar!#!\n\n[concept_elgar_art_nouveau] ist ein internationaler Stil in Kunst, Architektur und angewandter Kunst, insbesondere in den dekorativen Künsten. Der Stil ist in verschiedenen Sprachen unter verschiedenen Namen bekannt: Jugendstil auf Deutsch, Stile Liberty auf Italienisch, Modernisme auf Katalanisch und auch als Modern Style auf Englisch bekannt. Er wurde oft von natürlichen Formen wie den gewundenen Kurven von Pflanzen und Blumen inspiriert. Architekten und Designer suchten nach einem spirituell erhebenden Gesamtkunstwerk, das die Künste vereinen würde." #1!
 elgar_impressionism_tech_desc:1 "#R Diese Technologie ist nur über eine Schaltfläche im Reiter 'Kunst' der Morgenröte-Benutzeroberfläche verfügbar!#!\n\n[concept_elgar_impressionism] ist ein Kunststil aus dem 19. Jahrhundert, der sich durch die stimmungsvolle Darstellung flüchtiger Momentaufnahmen auszeichnet. Der Begriff Impressionismus wurde auch auf bestimmte Stile der Musik, Literatur, des Films und der Fotografie angewendet." #1!
 elgar_expressionism_tech_desc:1 "#R Diese Technologie ist nur über eine Schaltfläche im Reiter 'Kunst' der Morgenröte-Benutzeroberfläche verfügbar!#!\n\n[concept_elgar_expressionism] ist eine modernistische Bewegung, die ursprünglich in der Poesie und Malerei entstand. Ihr typisches Merkmal ist, die Welt ausschließlich aus einer subjektiven Perspektive darzustellen und sie radikal zu verzerren, um emotionale Wirkung zu erzielen und Stimmungen oder Ideen hervorzurufen." #1!
 elgar.423.d:1 "[SCOPE.sCharacter('elgar_conductor').GetFullName] beklagt sich, dass die Arbeitsbedingungen angesichts [SCOPE.sCharacter('elgar_conductor').GetHerHis]er vielfältigen Aufgaben im Büro nicht gut genug sind. Vielleicht könnte eine finanzielle Unterstützung [SCOPE.sCharacter('elgar_conductor').GetHerHis]e 'Inspiration' verbessern." #1!
 elgar.424.d:1 "[SCOPE.sCharacter('elgar_conductor').GetFullName] versucht schon seit einiger Zeit zu komponieren, aber [SCOPE.sCharacter('elgar_conductor').GetSheHe] wird immer wieder von einer bestimmten Person unterbrochen." #1!
 elgar_irrationalism_tech_desc:1 "Der Irrationalismus ist eine philosophische Strömung, die im frühen 19. Jahrhundert entstand und die nicht-rationale Dimension des menschlichen Lebens betont. Irrationalisten erklären, dass die menschliche Vernunft allein nicht in der Lage sei, die Grundlagen, Zusammenhänge und Gesetzmäßigkeiten der objektiven Wirklichkeit zu erkennen. Als Alternativen für deskriptive und normative Erklärungen der Welt werden höhere kognitive Funktionen wie beispielsweise Intuition, Glaube oder direkte Erfahrung vorgeschlagen." #1!
  
