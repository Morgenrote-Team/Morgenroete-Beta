 elgar.802.t: "Veraltete Nationalhymne"
 elgar.802.d: "Nach den jüngsten Gesetzesänderungen scheint die bisherige Nationalhymne nicht mehr zeitgemäß. Viele interpretieren sie als anachronistisches Relikt eines vergangenen politischen Systems. Der Druck, den Ballast loszuwerden, wächst."
 elgar.802.f: "\"Wir haben einen Admiral ohne Flotte. Er regiert ein Land ohne Küste. Dies ist ein Königreich ohne König.\""
 elgar.802.g: "Diese Nationalhymne repräsentiert unser Land nicht mehr."
 elgar.803.t: "Reaktionäre Nationalhymne"
 elgar.803.d: "Immer lauter werden die Stimmen, die bisherige Nationalhymne abzuschaffen. Führende Politiker fordern stattdessen ein neues Lied, das die Errungenschaften des modernen Staates, für den [ROOT.GetCountry.GetAltNameNoFormatting('AKK')] steht, deutlicher hervorhebt."
 elgar.803.f: "\"Vorwärts, o Volk, zum Gegenangriff.\nDie Rote Fahne, die Rote Fahne.\nVorwärts, o Volk, zum Gegenangriff\nDie Rote Fahne wird triumphieren.\nDie Rote Fahne wird triumphieren,\nDie Rote Fahne wird triumphieren,\nDie Rote Fahne wird triumphieren,\nEs lebe der Kommunismus und die Freiheit.\""
 elgar.811.t: "Die Hymne [ROOT.GetCountry.GetAltNameNoFormatting('GEN')]"
 elgar.811.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] erließ ein Dekret, wonach bei offiziellen Anlässen ein bestimmtes Musikstück gespielt werden solle. Die Wahl fiel auf..."
 elgar.821.t: "Musik für [ROOT.GetCountry.GetAltNameNoFormatting('AKK')]"
 elgar.821.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] erkundigte sich, ob es besondere Wünsche bezüglich der zu verfassenden Arbeit gebe und welcher Aspekt besondere Beachtung verdiene."
 elgar.821.f: "Insgesamt gibt es fünf Kategorien von Nationalhymnen. Monarchenhymnen verbessern die Legitimität, Volkshymnen mindern Unruhen, Wertehymnen erhöhen die Loyalität zu besseren Lebensbedingungen und machen die Bürger zugleich widerstandsfähiger gegen Verschlechterung, während Militärhymnen die Verteidigungskraft einer Nation stärken. Räterepubliken können Arbeiterhymnen in Auftrag geben, die die politische Macht von Gewerkschaften stärken. Je nach Staatsform ist nicht jede Hymne möglich."
 elgar.821.g: "Die Nationalhyme soll unseren Monarchen preisen."
 elgar.821.h: "Ein populäres Volkslied soll eine Bindung zwischen Regierung und Volk herstellen."
 elgar.821.i: "Komponieren Sie eine erhabene Nationalhymne, die die Werte unseres Landes repräsentiert."
 elgar.821.j: "Wir brauchen ein Lied, das unser Volk im Kampf motiviert!"
 elgar.821.k: "Akzeptabel ist nur ein Arbeiterlied, das das Proletariat verherrlicht."
 elgar.822.t: "Nationalhymnenmelodie fertiggestellt"
 elgar.822.d: "Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] hat heute die Partitur für [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]en Vorschlag für eine mögliche neue Nationalhymne vorgestellt. Es ist noch unklar, ob der Staat sie tatsächlich akzeptieren wird."
 elgar.822.f: "Es gibt zahlreiche Hymnen, die nie zur Nationalhymne wurden. Die Gründe dafür sind vielfältig. Der Staat muss sie noch immer genehmigen. Darüber hinaus sind Nationalhymnen, die sowohl eine originelle Melodie als auch einen originellen Text haben, stärker."
 elgar.822.g: "Hoffentlich findet sie Akzeptanz bei den Leuten..."
 elgar.831.t: "Nationalhymnentexte fertiggestellt"
 elgar.831.d: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] hatte schon lange die Möglichkeit in Betracht gezogen, dass dieses LAND einen würdigen Text für seine Nationalhymne brauchen könnte. Der Schriftsteller schrieb schnell die passenden Worte für die seit langem bekannten Noten."
 elgar.831.f: "\"---------\" -La Marcha Real"
