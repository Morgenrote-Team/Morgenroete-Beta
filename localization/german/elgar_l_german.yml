 elgar.1231.f: "Die „Suite Española“ ist eine Suite für Soloklavier des spanischen Komponisten Isaac Albéniz. Zusammen mit anderen Stücken wurde sie zu Ehren der spanischen Königin geschrieben.\nUrsprünglich bestand sie aus vier Teilen, die jeweils eine Region Spaniens repräsentierten und eine lokale Musikform oder einen lokalen Tanz verwendeten: Granada (Serenata), Katalonien (Courante), Sevilla (Sevillanas) und Kuba (Notturno). Später kamen Cádiz (Canción), Asturien (Leyenda), Aragón (Fantasía) und Kastilien (Seguidillas) hinzu."
 elgar.1232.f: "Die „Iberia“ ist eine Suite für Klavier des spanischen Komponisten Isaac Albéniz. Sie besteht aus vier Büchern mit jeweils drei Stücken.\nSie gilt als Albéniz' bestes, aber auch schwierigstes Musikstück. Scherzhaft wird gesagt, dass es leicht zu spielen sei, wenn man drei Hände habe."
 elgar.1233.f: "„Cataluña“ ist ein Klavierstück des spanischen Komponisten Isaac Albéniz. Obwohl es ursprünglich für das Klavier komponiert wurde, wurde es später zu einem festen Bestandteil der klassischen Gitarrenmusik."
 elgar.1241.f: "„Le lac des fées“ (Der Feensee) ist eine Grand Opéra des französischen Komponisten Daniel Auber. Die Oper erzählt die Geschichte des Studenten Albert, der sich in die Fee Zélia verliebt."
 elgar.1251.f: "„Der wunderbare Mandarin“ ist ein Pantomimenballett des ungarischen Komponisten Béla Bartók. Das Werk löste einen Skandal aus, der dazu führte, dass es aus moralischen Gründen verboten wurde. Später wurde es meist in Form einer Konzertsuite aufgeführt, was bedeutet, dass nur etwa zwei Drittel des Werks tatsächlich gespielt wurden."
 elgar.1252.f: "„Konzert für Orchester“ ist ein Orchesterwerk des ungarischen Komponisten Béla Bartók. Es gilt als eines der bekanntesten und beliebtesten Werke Bartóks."
 elgar.1253.f: "„Musik für Saiteninstrumente, Schlagzeug und Celesta“ ist eine Komposition des ungarischen Komponisten Béla Bartók, die von Paul Sacher, dem Dirigenten des Basler Kammerorchesters, in Auftrag gegeben wurde. Interessanterweise umfasst das Ensemble nicht nur Streichinstrumente, Schlaginstrumente und Celesta, sondern auch ein Klavier, das in diesem Fall aufgrund seines Hammermechanismus als Schlaginstrument betrachtet wird."