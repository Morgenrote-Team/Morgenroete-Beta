 elgar.40.d: "Nachdem die Regierung heute einer Rundfunkanstalt eine neue Lizenz erteilt hat, stellt sich die Frage, auf welchen Bereich sie sich konzentrieren soll."
 elgar.40.f: "Eine neue Lizenz mit einem neuen Schwerpunkt kann erteilt werden, wenn die alte Lizenz nach fünf Jahren abläuft."
