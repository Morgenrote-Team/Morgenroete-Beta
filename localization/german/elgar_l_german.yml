 elgar.90.g: "Bau des Opernhauses"
 elgar.90.h: "Wir sollten die kulturellen Anstrengungen in unserer Hauptstadt verstärken."
 elgar.91.t: "Tivoli Glashalle"
 elgar.91.d: "Die Tivoli-Gärten erfreuen sich seit Jahren großer Beliebtheit bei den Kopenhagener Bürgern. Es ist geplant, eine Konzerthalle für rund 1'000 Personen zu bauen, um das Publikum mit anregender Musik zu unterhalten."
 elgar.91.f: "Ein Konzertsaal gehörte zu den Attraktionen, als der Tivoli-Garten 1843 seine Tore öffnete. Es handelte sich um ein rechteckiges, hölzernes Gebäude, das von Harald Conrad Stilling entworfen wurde. Hans Christian Lumbye war von 1843 bis 1872 Musikdirektor und Chefdirigent. Er schrieb fast 700 Kompositionen für das Orchester, insbesondere Polkas, Walzer und Galoppe. Der Konzertsaal wurde 1863 von Johan Andreas Stillmann erweitert."
 elgar.91.g: "Ich hoffe, dass Herr Lumbye mit seinen berühmten Galoppe auftauchen wird!"
 elgar.92.t: "Gran Teatro Nacional"
 elgar.92.d: "Mit dem Plan, ein großes Opernhaus in Mexiko-Stadt zu bauen, plant die Regierung eines der größten Bauprojekte in der Geschichte des Landes."
 elgar.92.f: "Das Theater wurde zwischen 1840 und 1844 von dem Architekten Lorenzo de la Hidalga in Mexiko-Stadt erbaut. Historiker betrachten es als das wichtigste architektonische Werk in Mexiko-Stadt zwischen der Fertigstellung der Metropolitan-Kathedrale und dem Bau des Palacio de Bellas Artes. Das Große Nationaltheater wurde in einer der Amtszeiten von Antonio López de Santa Anna als Präsident eingeweiht. Sein Name änderte sich nach und nach, vom Großen Theater von Santa Anna in Großes Theater Vergara, dann Großes Imperiales Theater und schließlich Großes Nationaltheater. Während der Opernsaison 1852 wurden 17 Opern uraufgeführt und mehr als 60 Aufführungen geboten."
 elgar.93.t: "Teatro Amazonas"
 elgar.93.d: "Aufgrund des Booms, den die Region durch den Gummianbau erlebt, soll Manaus ein opulentes Opernhaus erhalten - mitten im Dschungel!"
 elgar.93.f: "Das Amazonas-Theater wurde während der Belle Époque gebaut, als der Kautschukboom ein Vermögen einbrachte. Der Bau des Amazonas-Theaters wurde erstmals 1881 von einem Mitglied des örtlichen Repräsentantenhauses, Antonio Jose Fernandes Júnior, vorgeschlagen, der sich ein \"Juwel\" im Herzen des Amazonas-Regenwaldes vorstellte. Der architektonische Stil des Theaters wird als typisch für das Renaissance-Revival angesehen. Die Dachziegel wurden aus dem Elsass importiert, die Stahlwände aus Glasgow, Schottland, und der Carrara-Marmor für die Treppen, Statuen und Säulen aus Italien. Die Kuppel ist mit 36.000 dekorierten Keramikfliesen in den Farben der brasilianischen Nationalflagge bedeckt. Die Inneneinrichtung stammt aus Frankreich und ist im Louis-Quinze-Stil gehalten. Der italienische Künstler Domenico de Angelis der Jüngere malte die Paneele, die die Decken des Auditoriums und des Zuschauerraums schmücken."
 elgar.101.t: "Ein Denkmal für Beethoven"
 elgar.101.d: "Einem Aufruf des Komponisten Robert Schumann folgend, sprachen sich mehrere Intellektuelle, aber auch Bürger, Patrioten und Kunstinteressierte für die Errichtung eines Denkmals für Ludwig van Beethoven in Bonn aus."
 elgar.101.f: "\"Das Mausoleum der zukünftigen Erinnerung steht schon persönlich vor mir - ein einigermaßen hoher Quader, darauf eine Leier mit Geburts- und Todesjahr, darüber der Himmel und daneben ein paar Bäume. Ein ganzes Volk, das sich einem Beethoven gegenübersieht, der es auf jeder Seite Größe und Stolz lehrt, sollte das nicht in der Lage sein, ihm ein tausendmal größeres Denkmal zu errichten? Wenn ich ein Fürst wäre, würde ich ihm einen Tempel im palladianischen Stil errichten! Ihn in einer gigantischen Gestalt formen, wie den heiligen Borromäus am Lago Maggiore, damit er, wie im Leben, über Berg und Berge schauen kann - und wenn die Rheinschiffe vorbeifahren und die Fremden fragen: Was bedeutet der Riese, dann kann jedes Kind antworten: Beethoven ist das - und sie werden denken, es sei ein deutscher Kaiser. Mit einem Wort: Steh auf, lass dein Phlegma los und bedenke, dass das Denkmal dein eigenes sein wird!\" - Robert Schumann"
 elgar.101.g: "Beethoven war ein deutscher Titan der Musik!"
 elgar.101.h: "Wir freuen uns, dass wir dieses kulturell wertvolle Projekt finanzieren können."
 elgar.101.i: "Er kann nicht so großartig gewesen sein, wenn er nicht vorher ein Denkmal hatte."
 elgar.102.t: "Vorbereitung des Beethovenfestes"
 elgar.102.d: "Die letzten Arbeiten am Beethoven-Denkmal sind abgeschlossen. Jetzt ist es an der Zeit, sich auf die Einweihungsfeier vorzubereiten."
 elgar.102.f: "Das Beethovenfest zur Einweihung des Beethoven-Denkmals war ein musikalisches Großereignis von internationalem Rang. Neben dem preußischen König war auch die britische Königin Victoria eingeladen, Geistesgrößen wie Alexander von Humboldt gehörten zu den Gästen, und Komponisten vom Range eines Hector Berlioz, Giacomo Meyerbeer und vor allem Franz Liszt prägten die vier Tage. Tausende von Menschen sollten an den Festspielen teilnehmen, was die kleine Stadt Bonn vor große Probleme stellte."
 elgar.102.g: "Verschicken Sie die Einladungen!"
 elgar.103.t: "Einladung zum Beethovenfest"
 elgar.103.d: "Unsere Regierung hat eine offizielle Einladung zum Beethovenfest in Bonn erhalten, wo das Denkmal des Komponisten enthüllt werden soll."
 elgar.103.g: "Wir werden gerne teilnehmen."
 elgar.103.h: "Klassische Musik ist überbewertet."
 elgar.104.t: "Bau der Beethovenhalle"
 elgar.104.d: "Aufgrund der hohen Besucherzahlen schlug Franz Liszt vor, Männer und Material von der Baustelle des Kölner Doms nach Bonn umzuleiten, um in Rekordzeit einen Festsaal zu bauen."
 elgar.104.f: "Die offizielle Enthüllung des Beethoven-Denkmals sollte der Höhepunkt eines dreitägigen Beethovenfestes sein. Einen Monat vor Beginn des Festes gab es keinen geeigneten Veranstaltungsort, um die erwarteten 3.000 Besucher unterzubringen. Auf Liszts Drängen hin, und erst nachdem er angeboten hatte, die gesamten Kosten selbst zu tragen, beauftragte das Komitee einen Architekten und Bauunternehmer mit dem Bau der Beethovenhalle. Als sie schließlich mit dem Bau begannen, hatten sie weniger als zwei Wochen Zeit und mussten rund um die Uhr arbeiten, um ihn rechtzeitig fertig zu stellen. Franz Liszt sprach auch mit den Bauleuten des Kölner Doms. Holz wurde von Köln über den Rhein nach Bonn verladen. Auch die in Köln gefertigten Dekorationen kamen so schnell nach Bonn. In nur elf Tagen wurde ein Festsaal aus dem Nichts geschaffen."
 elgar.104.g: "Herrlich."
 elgar.105.t: "Das Beethovenfest"
 elgar.105.d: "Nach vier Tagen hochkarätiger Musik kann das Beethovenfest als voller Erfolg gewertet werden, auch wenn Veranstaltungen dieser Größenordnung nicht ohne Skandale auskommen."
 elgar.105.f: "Die Zeremonie verlief nicht ohne heikle Momente. Das Beethoven-Denkmal wandte den wichtigsten Gästen, König Friedrich Wilhelm IV. von Preußen und der britischen Königin Victoria, die auf dem Balkon des Schlosses Fürstenberg Platz genommen hatten, den Rücken zu. Alexander von Humboldt rettete den Tag mit der Bemerkung, Beethoven sei schon immer ein unhöflicher Kerl gewesen. Noch peinlicher war die Tatsache, dass Liszt während der Trinksprüche beim Festbankett im \"Goldenen Stern\" das französische Kontingent unter der Leitung von Berlioz brüskierte und beinahe einen Aufruhr verursachte. Das Bankett wurde durch das Verhalten von Lola Montez gestört, die auf einem Tisch tanzte und Liszt in Verlegenheit brachte, indem sie darauf bestand, sein Gast bei den Feierlichkeiten zu sein, und einen ihrem Status entsprechenden Sitzplatz verlangte, womit sie die vororganisierte Sitzordnung durcheinander brachte."
 elgar.105.g: "Beethoven kehrt uns den Rücken zu?"
 elgar.105.h: "Alexander von Humboldt ist ein Gentleman."
 elgar.105.i: "Diese Deutschen haben keine Eleganz."
 elgar.105.j: "Das war sehr inspirierend."
 elgar.106.t: "Liszts Kantate"
 elgar.106.d: "Franz Liszt hatte die große Ehre, die Kantate für die Einweihung des Beethoven-Denkmals zu schreiben und öffentlich aufzuführen."
 elgar.106.f: "\"Wie dem auch sei, seine Kantate, die wirklich gut vorgetragen und von dreieinhalb Teilen des Saals mit warmem Beifall bedacht wurde, ist eine große und schöne Sache, die Liszt unter den Komponisten sehr hoch erhebt. Der Ausdruck ist wahrhaftig, die Intonation richtig, der Stil erhaben und neu, die Form gut durchdacht und pflichtbewusst ausgeführt, die Instrumentation bemerkenswert durch ihre Kraft und Vielfalt. Es gibt in seinem Orchester nie eine Aufeinanderfolge der gleichen Töne, was gewisse Werke, die man einst schätzte, für den Hörer so ermüdend macht; er weiß die kleinen und großen Mittel zu gebrauchen, er überfordert weder die Instrumente noch die Stimmen; mit einem Wort, er hat mit einem Schlag gezeigt, dass er in der Instrumentation und in den anderen Teilen der musikalischen Kunst Stil hat, denn man fürchtete, er hätte ihn noch nicht gefunden.\" - Hector Berlioz"
 elgar.106.g: "Hoch lebe er! Hoch lebe Beethoven, hoch lebe er!"
 elgar.107.t: "Berlioz beim Beethovenfest"
 elgar.107.d: "Die Feierlichkeiten anlässlich der Enthüllung des Beethoven-Denkmals haben den Komponisten Hector Belrioz sehr inspiriert."
 elgar.107.f: "\"Während dieser Reise nach Österreich, Ungarn, Böhmen und Schlesien begann ich mit der Komposition meiner Faust-Legende, über die ich schon seit langem nachgedacht hatte. Sobald ich mich entschlossen hatte, sie in Angriff zu nehmen, musste ich mich damit begnügen, auch den größten Teil des Librettos selbst zu schreiben; die Fragmente der französischen Übersetzung von Goethes Faust durch Gérard de Nerval, die ich schon vor zwanzig Jahren vertont hatte und die ich in einer revidierten Fassung in die neue Partitur aufnehmen wollte, und zwei oder drei andere Szenen, die M. Gandonnière vor meiner Abreise aus Paris nach meinen Anweisungen geschrieben hatte, machten nicht einmal ein Sechstel des gesamten Werkes aus. Während der Reise in der alten deutschen Postkutsche versuchte ich daher, die für meine Musik vorgesehenen Verse zu schreiben. Ich begann mit Fausts Anrufung der Natur, ohne zu versuchen, Goethes Meisterwerk zu übersetzen oder gar zu imitieren, sondern nur, um mich von ihm inspirieren zu lassen und die darin enthaltene musikalische Substanz herauszuziehen. Als ich einmal angefangen hatte, schrieb ich die restlichen Verse, wie es mir gerade in den Sinn kam, und ich komponierte die Partitur mit einer Leichtigkeit, die ich bei meinen anderen Werken selten erlebt habe.\" - Hector Berlioz"
 elgar.107.g: "Hat sich die Reise also gelohnt?"
 elgar.108.t: "Victoria besucht den Kölner Dom"
 elgar.108.d: "Die britische Königin Victoria nahm ihren Aufenthalt im Rheinland zum Anlass, den Kölner Dom zu besuchen und sich über den gerade begonnenen Dombau zu informieren."
 elgar.108.f: "Der frühe Abschied der königlichen Gesellschaft vom Konzert war darauf zurückzuführen, dass am Nachmittag eine Führung durch den Kölner Dom stattfand, die unter festlichem Glockengeläut stattfand. Anschließend begaben sich die Majestäten durch den Haupteingang des Mittelschiffs in den Chor, in dem eine Festkantate des Kölner Männergesangvereins mit Orgelbegleitung von Musikdirektor Weber aufgeführt wurde."
 elgar.108.g: "Wir fühlen uns geehrt."
 elgar.111.t: "Ein Denkmal für Mozart"
 elgar.111.d: "Die Vorbereitungen für die Errichtung eines Denkmals für Wolfgang Amadeus Mozart sind in vollem Gange. Es werden jedoch noch Spenden gesammelt."
 elgar.111.f: "1835 regte der aus Posen im heutigen Polen stammende Schriftsteller Julius Schilling an, dem damals in Salzburg relativ unbekannten Mozart ein Denkmal auf dem heutigen Mozartplatz zu setzen. Bedeutende Förderer im Ausland, aber auch in Wien, unterstützten schließlich den Bau des Denkmals. Der bayerische König Ludwig I. von Bayern spendete eine beträchtliche Summe und stiftete den Sockel der Bronzestatue."
 elgar.111.g: "Mozart war ein deutscher Titan der Musik!"
 elgar.113.t: "Das Mozart-Denkmal"
 elgar.113.d: "Heute wurde das Denkmal für den größten Sohn Salzburgs in seinem Geburtshaus enthüllt."
 elgar.113.f: "Das von Ludwig Schwanthaler entworfene und von Johann Baptist Stiglmaier gegossene Denkmal wurde am 5. September 1842 in Anwesenheit der beiden überlebenden Söhne Mozarts, Franz Xaver und Carl Thomas, feierlich eingeweiht. Mozarts Witwe konnte die Einweihung jedoch nicht mehr erleben. Sie war kurz zuvor im Haus am Mozartplatz 8 verstorben. Ein Fest mit Fackelzug, Schifffahrt, Bergbahn, Scheibenschießen und Pferderennen umrahmte die Feierlichkeiten."
 elgar.114.t: "Ein lebendiges Denkmal"
 elgar.114.d: "In Österreich mehren sich die Bestrebungen, ein Mozart-Denkmal zu errichten. Einige Frankfurter Bürger wollen deshalb ein Benefizkonzert veranstalten - und verbinden die Idee mit politischen Inhalten."
 elgar.114.f: "Ursprünglich wollte die Frankfurter Bürgerschaft ein Konzert veranstalten, um genügend Spenden für ein Mozart-Denkmal zu sammeln. Denkmäler für bürgerliche Persönlichkeiten waren in Deutschland ein Novum. Die Errichtung von Denkmälern zu Ehren von nationalen Persönlichkeiten wie Künstlern oder Wissenschaftlern war daher eine willkommene Gelegenheit, patriotische Gefühle auszudrücken. In Frankfurt wurde sogar angeregt, ein nationales Sängertreffen zu veranstalten, dessen Erlös in eine Stiftung für deutsche Musiker zur Förderung des musikalischen Nachwuchses fließen sollte."
 elgar.114.g: "Sammeln Sie Geld für unser eigenes lebendiges Denkmal - ein Fest zu Ehren von Mozart!"
 elgar.114.h: "Spenden Sie Geld für das Denkmal in Salzburg."
 elgar.115.t: "Einladung zum Sängerfest"
 elgar.115.d: "Die Frankfurter Bürgerschaft hat patriotische Sängerinnen und Sänger aus unserem Land zu einem Mozart-Festival eingeladen."
 elgar.115.g: "Eine musikalische und nationale Gelegenheit."
 elgar.115.h: "Ich kann Kunstlieder einfach nicht ausstehen."
 elgar.116.t: "Das Mozartfest"
 elgar.116.d: "42 rheinische, badische, hessische und fränkische Gesangvereine trafen sich in Frankfurt, um ein dreitägiges Fest der Musik Mozarts zu feiern. Die Veranstaltung entwickelte sich jedoch zu einer Demonstration für die politische Einigung Deutschlands. Das gesammelte Geld wurde für eine Stiftung zur Förderung junger Komponisten aufgebracht."
 elgar.116.f: "\"Die Stadt geriet ins Schwärmen. Die Häuser waren bis zu den Dachfenstern mit Menschen gefüllt. Die Mainzer, Hanauer und Offenbacher kamen mit Booten zum Klang der Kanonenschüsse, umgeben von geschmückten Booten mit Musik; durch alle Tore zogen sie ein. Es war ein mächtig ergreifender Anblick, das künstlerische Interesse wurde zweitrangig, aber das Nationale trat mächtig an uns heran; ich will nicht leugnen, dass mir helle Tränen über die Wangen liefen.\" - Heinrich Hoffmann"
 elgar.116.g: "Musik bringt die Nation zusammen."
 elgar.117.t: "Liberale Störenfriede machen Lärm in Frankfurt"
 elgar.117.d: "Es ist uns nicht entgangen, dass einige jakobinisch gesinnte \"Patrioten\" ein angebliches Mozartfest in Frankfurt für ihre politische Agitation instrumentalisiert haben."
 elgar.117.f: "42 rheinische, badische, hessische und fränkische Gesangvereine trafen sich in Frankfurt, um ein dreitägiges Fest der Musik Mozarts zu feiern. Die Veranstaltung entwickelte sich jedoch zu einer Demonstration für die politische Einigung Deutschlands. Ursprünglich sollte die Veranstaltung der Finanzierung des Mozart-Denkmals dienen, doch schon bald änderten die Initiatoren den Zweck der Wohltätigkeitsveranstaltung zu Gunsten ihrer eigenen Stiftung."
 elgar.117.g: "Eine Verschwörung gegen die Ordnung im Deutschen Bund!"
 elgar.117.h: "Lasst sie singen."
 elgar.121.t: "Die Gründung des Allgemeinen Deutschen Musikvereins"
 elgar.121.d: "Heute wurde in [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] der Allgemeine Deutsche Musikverein gegründet. Es entstand sofort eine Diskussion darüber, ob wir zur Neudeutschen Schule gehören oder ob wir die konservative Idee der Musik verteidigen."
 elgar.121.f: "Die Neudeutsche Schule ist ein Begriff, der 1859 von Franz Brendel, dem Herausgeber der Neuen Zeitung für Musik, eingeführt wurde, um bestimmte Tendenzen in der deutschen Musik zu beschreiben. Er wurde von verschiedenen Personen zu verschiedenen Zeiten mit unterschiedlichen Bedeutungen verwendet. Es besteht allgemein Einigkeit darüber, dass Franz Liszt und Richard Wagner zu den prominentesten Vertretern der \"Neudeutschen Schule\" gehörten. Es besteht auch Konsens darüber, dass Johannes Brahms nicht daran beteiligt war. Darüber hinaus gehen die Interpretationen auseinander. Der neue Begriff sollte so verstanden werden, dass er die gesamte Periode seit Beethovens Tod bezeichnet. Nach Brendel war es üblich, die Zeit von J.S. Bach und Händel als \"Altdeutsche Schule\" zu bezeichnen. Die darauf folgende Periode war die der Wiener Meister wie Mozart, die vom italienischen Stil beeinflusst waren. Beethoven hatte das Interesse wieder auf den deutschen Norden gelenkt und damit die \"Neudeutsche Schule\" eröffnet. Komponisten beider Seiten blickten auf Beethoven als ihren geistigen und künstlerischen Helden zurück; die Konservativen sahen in ihm einen unübertrefflichen Höhepunkt, die Progressiven einen Neuanfang in der Musik."
 elgar.121.g: "Wir sind Teil der Neudeutschen Schule."
 elgar.121.h: "Wir verteidigen die traditionelle deutsche Schule."
 elgar.122.t: "Mitgliedschaft im Allgemeinen Deutschen Musikverein"
 elgar.122.d: "Künstler aus unserem Land wurden in den neu gegründeten Allgemeinen Deutschen Musikverein eingeladen. Es entstand sofort eine Diskussion darüber, ob wir zur Neudeutschen Schule gehören oder ob wir die konservative Idee der Musik verteidigen."
 elgar.123.t: "Ort des nächsten Musikerkongresses"
 elgar.123.d: "Die Mitglieder des Allgemeinen Deutschen Musikvereins haben [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] als Tagungsort für die nächste Tonkünstlerversammlung (Musikerkongress) gewählt."
 elgar.123.f: "Im Jahr 1859 fand die erste Tonkünstlerversammlung anlässlich des 25-jährigen Bestehens der Neuen Zeitschrift für Musik in Leipzig statt. Auf der zweiten Tonkünstlerversammlung (1861) in Weimar wurden die Statuten des Allgemeinen Deutschen Musikvereins (ADMV) von über 700 Gründungsmitgliedern angenommen. Die Neue Zeitschrift für Musik wurde zum Organ des Verbandes. Am Ende des 19. Jahrhunderts stand der ADMV unter dem Protektorat des Großherzogs von Weimar. Der ADMV veranstaltete eine Reihe von großen Tonkünstlertreffen. Er orientierte sich meist an der Richtung der Neudeutschen Schule, die durch Franz Liszt und Richard Wagner vertreten wurde. Zu den künstlerischen Zielen des ADMV gehörte es, jährliche Tonkünstlertreffen an verschiedenen Orten zu veranstalten, bei denen wichtige, selten gehörte und vor allem neue Musikwerke aller Art aufgeführt werden sollten. Aber auch ältere, nur selten oder gar nicht gehörte, aber wegen ihrer Bedeutung interessante Werke sollten aufgeführt werden. Darüber hinaus sollten neue musikalische oder wissenschaftliche Werke gedruckt werden."
 elgar.123.g: "Wir fühlen uns geehrt!"
 elgar.124.t: "Musikerkongress in [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]"
 elgar.124.d: "Die diesjährige Tonkünstlerversammlung findet in [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName] statt. Unsere Künstler sind herzlich eingeladen, über Musik zu diskutieren und der Aufführung neuer und vergessener Musikstücke zu lauschen."
 elgar.124.g: "Genießen wir die Musik und hören wir uns die Beiträge Gleichgesinnter an."
 elgar.124.h: "Genau der richtige Ort, um gegen diese musikalischen Dilettanten anzutreten."
 elgar.124.i: "Dies wird der Tag der Wahrheit sein - unsere Vorstellung von Musik ist die einzig richtige!"
 elgar.125.t: "Krieg der Romantiker"
 elgar.125.d: "Ein Streit zwischen Vertretern der Neudeutschen Schule und den eher konservativen Vertretern hat zu einem öffentlichen Skandal geführt. In der Presse tobt bereits ein regelrechter Krieg zwischen den beiden Fraktionen. Es ist an der Zeit, dass [ROOT.GetCountry.GetAltName('NOM')] sich hinter seine Künstler stellt."
 elgar.125.f: "Der \"Krieg der Romantiker\" ist ein Begriff, der von einigen Musikhistorikern verwendet wird, um die Spaltung zwischen prominenten Musikern in der zweiten Hälfte des 19. Jahrhunderts zu beschreiben. Musikalische Struktur, die Grenzen der chromatischen Harmonie und Programmmusik versus absolute Musik waren die Hauptstreitpunkte. Die gegnerischen Parteien kristallisierten sich in den 1850er Jahren heraus. Die prominentesten Mitglieder des konservativen Kreises waren Johannes Brahms, Joseph Joachim, Clara Schumann und das Leipziger Konservatorium, das von Felix Mendelssohn gegründet worden war. Ihre Gegner, die radikalen Progressiven vor allem aus Weimar, wurden durch Franz Liszt und die Mitglieder der sogenannten Neudeutschen Schule sowie durch Richard Wagner vertreten. Die Kontroverse war deutschen und mitteleuropäischen Ursprungs; Musiker aus Frankreich, Italien und Russland waren nur am Rande beteiligt. Die Komponisten beider Seiten blickten auf Beethoven als ihren geistigen und künstlerischen Helden zurück; die Konservativen sahen in ihm einen unübertrefflichen Höhepunkt, die Progressiven einen Neuanfang in der Musik."
 elgar.125.g: "Unterstützen Sie die Neudeutsche Schule!"
 elgar.125.h: "Unterstützen Sie die Traditionelle Deutsche Schule!"
 elgar.126.t_konservativ: "Konservative gewinnen den \"Krieg der Romantiker\""
 elgar.126.d_konservativ: "Die überwältigende Mehrheit der Anhänger der traditionellen Schule hat den Streit um die Zukunft der Musik gewonnen. Ob der Inhalt stimmt, ist zweitrangig:1 Die Masse der Beiträge zu Debatten und Polemiken bestimmt das öffentliche Bild."
 elgar.126.f_konservativ: "Ein zentraler Streitpunkt zwischen diesen beiden Gruppen von Musikern war der zwischen traditionellen und neuen musikalischen Formen. Dies war eine Folge der Debatte über die Lebensfähigkeit der Gattung Symphonie, die sich unter Ludwig van Beethoven von einer Unterhaltungsmusik zu einer Form entwickelt hatte, die soziale, moralische und kulturelle Ideale beinhaltete. Liszt und sein Kreis favorisierten neue Schreibstile und Formen, die Musik mit erzählerischen und bildhaften Ideen verbinden sollten. Zu diesem Zweck entwickelte Liszt die symphonische Dichtung. Die Leipziger/Berliner Schule setzte sich für die von den klassischen Meistern verwendeten Formen ein, die von Musikwissenschaftlern wie Adolf Bernhard Marx im frühen 19. Auch die Gültigkeit der Programmmusik war ein Streitpunkt. In seinem 1854 erschienenen Buch Vom Musikalisch-Schönen stellte Hanslick fest, dass die Musik nichts Bestimmtes außer sich selbst darstelle und auch nicht darstellen könne.\n\nLetztendlich unterstützten #G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#! Mitglieder die Neudeutsche Schule und #R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#! Mitglieder die Traditionelle Schule."
 elgar.126.g: "Die Traditionelle Schule hat sich durchgesetzt."
 elgar.126.t_neudeutsch: "Progressive gewinnen den \"Krieg der Romantiker\""
 elgar.126.d_neudeutsch: "Die überwältigende Mehrheit der Anhänger der Neudeutschen Schule hat den Streit um die Zukunft der Musik gewonnen. Ob der Inhalt stimmt, ist zweitrangig: Die Masse der Beiträge zu Debatten und Polemiken bestimmt das öffentliche Bild."
 elgar.126.f_neudeutsch: ""
 elgar.126.h: "Die Neudeutsche Schule triumphiert."
 elgar.131.t: "Franz Liszt beginnt seine Europatournee"
 elgar.131.d: "Nach einer eher unglücklichen Zeit in Paris beschloss Franz Liszt, nach dem Vorbild seines Rivalen Thalberg eine Tournee zu unternehmen und ein international gefeierter Musiker zu werden. Sein erstes Ziel ist [SCOPE.sCountry('elgar_liszt_destination_scope').GetAltNameNoFlag('NOM')]."
 elgar.131.f: "Franz Liszt war ein österreichisch-ungarischer Komponist, Pianist, Dirigent, Theaterdirektor und Musiklehrer. Liszt war einer der bedeutendsten und einflussreichsten Klaviervirtuosen und mit einem Oeuvre von über 1300 Werken und Bearbeitungen einer der produktivsten Komponisten des 19. Jahrhunderts. Obwohl ein großer Teil seines Schaffens der Klavierliteratur zuzuordnen ist, gab Liszt mit der Entwicklung der symphonischen Dichtung auch der Orchestermusik deutliche Impulse. Sein Konzept der Programmmusik und die Verwendung neuer harmonischer und formaler Mittel machten ihn - neben Richard Wagner - zum bekanntesten Protagonisten der Neudeutschen Schule. 1839 begann Liszt eine ausgedehnte Europatournee, die er in den folgenden acht Jahren fortsetzte. Diese Zeit war Liszts glanzvollste als Konzertpianist und er erhielt während seiner Tourneen viele Auszeichnungen und viel Bewunderung. In dieser Zeit tauchten auch die ersten Berichte über intensive Reaktionen von Liszts Fans auf, die als Lisztomanie bezeichnet wurden. Die Lisztomanie war durch eine hysterische Reaktion auf Liszt und seine Konzerte gekennzeichnet. Es wurde berichtet, dass Liszts Spiel die Stimmung des Publikums auf ein Niveau mystischer Ekstase hob."
 elgar.131.g: "Wir wünschen ihm das Beste."
 elgar.132.t: "Lisztomanie [ROOT.GetCountry.GetAltNameNoFlag('IN')]"
 elgar.132.d: "Der weltberühmte Pianist Franz Liszt hat unser Land als nächstes Ziel seiner Europatournee ausgewählt. Die Theater und Opernhäuser sind bereits ausgebucht!"
 elgar.132.g: "Woher kommen plötzlich all diese schreienden Frauen?"
 elgar.133.t: "Liszt reist ab"
 elgar.133.d: "Liszt beendete seinen Aufenthalt und bedankte sich für die Gastfreundschaft. Die Lisztomanie wird [SCOPE.sCountry('elgar_liszt_destination_scope').GetAltNameNoFlag('IN')] weitergehen."
 elgar.133.f: "Es wird geschätzt, dass Liszt zwischen 1839 und 1847 weit über tausend Mal öffentlich auftrat. Darüber hinaus beruhte sein großer Ruhm als Pianist, den er noch lange nach seinem offiziellen Rückzug von der Konzertbühne genießen sollte, hauptsächlich auf seinen Leistungen in dieser Zeit. Zu seinem Ruf trug auch bei, dass Liszt einen großen Teil der Erlöse aus seiner Arbeit für wohltätige und humanitäre Zwecke spendete. Er spendete große Summen an den Baufonds des Kölner Doms und der St.-Stephans-Basilika in Pest und machte private Spenden für öffentliche Einrichtungen wie Krankenhäuser und Schulen sowie für wohltätige Organisationen wie die Leipziger Musikerrentenversicherung. Nach dem Großen Brand von Hamburg im Mai 1842 gab er Konzerte zugunsten der Obdachlosen. Um das Bedürfnis seiner Bewunderer nach einer Haarlocke zu befriedigen, schaffte sich Liszt einen Hund an, dessen Fell ihm unbemerkt als Lockenquelle diente."
 elgar.301.t: "Gute Proben"
 elgar.301.d: "Die Orchesterproben, die von einem reisenden Komponisten geleitet wurden, waren sehr vielversprechend."
 elgar.301.f: "Ein reisender Komponist hat als Dirigent das Orchester für sich begeistert und bereits bei den Proben beeindruckt!"
 elgar.301.g: "Gut."
 elgar.302.t: "Mittelmässige Proben"
 elgar.302.d: "Leider waren die Orchesterproben, die von einem reisenden Komponisten geleitet wurden, nicht so gut, wie der Konzertsaal gehofft hatte..."
 elgar.302.f: "Ob es nun an unkooperativen Kollegen, schlecht vorbereiteten Darstellern oder den Bedingungen im Konzertsaal lag - die Proben lassen nichts Gutes für die Aufführung erwarten."
 elgar.302.g: "Nicht gut."
 elgar.303.t: "Eine amouröse Hingabe"
 elgar.303.d: "Eine Affäre für eine \"kleine\" Gefälligkeit erregt die Gemüter."
 elgar.303.f: "Künstler waren schon immer für ihren etwas \"lockeren Lebensstil\" bekannt und sorgten für den einen oder anderen zwischenmenschlichen Skandal. Die Aufmerksamkeit ruht auf einer kleinen Geste, die jedoch Sprengkraft hat. Ein reisender Komponist widmete einer verheirateten Dame eine Sonate und schenkte ihr die Originalpartitur. Bei der Frau handelt es sich jedoch um die Ehefrau eines hoch angesehenen Generals unserer Armee. Das Geschenk hat Spekulationen ausgelöst und könnte dem Ansehen des Mannes in der Öffentlichkeit schaden. Das Militär fordert Maßnahmen."
 elgar.303.g: "Ich sehe das Problem nicht?"
 elgar.303.h: "Ungeheuerlich!"
 elgar.304.t: "Ein abendlicher Empfang"
 elgar.304.d: "Unser Monarch hat einen reisenden Komponisten zu einem fürstlichen Empfang eingeladen. Der Komponist hat sich mit einer Komposition bedankt."
 elgar.304.f: "Obwohl sich die Musikkultur im 19. Jahrhundert zunehmend vom Mäzenatentum zu befreien suchte, standen Adlige und Könige immer noch an der Spitze des Mäzenatentums, und viele musikalische Werke wurden nach wie vor Fürsten und Königen gewidmet. Andererseits bedeutete die persönliche Beziehung oft, dass Komponisten, die von Akademien und Kunstkreisen ausgeschlossen waren, die Unterstützung eines wohlhabenden Mäzens finden konnten, wenn sie dessen persönlichem Geschmack entsprachen. Eine ganze Reihe von Wagners Meisterwerken wäre zum Beispiel ohne die persönliche Unterstützung von König Ludwig II. von Bayern nicht möglich gewesen."
 elgar.304.g: "Was für eine schöne Überraschung!"
 elgar.305.t: "Ausverkauft!"
 elgar.305.d: "Ein Streit um eine ausverkaufte Aufführung eines großen Komponisten hat einen öffentlichen Aufschrei ausgelöst!"
 elgar.305.f: "Am Tag einer Premiere hatte sich eine große Menschenmenge erwartungsvoll vor dem seit Tagen ausverkauften Opernhaus versammelt; selbst der auftretende Komponist konnte nur auf dem Schwarzmarkt eine Karte bekommen. Da aber ein Theaterangestellter selbst zusätzliche Karten verkauft hatte, überstieg die Zahl der verkauften Karten die Zahl der Plätze bei weitem. Im und vor dem Theater kam es zu tumultartigen Szenen, in denen die Musik fast völlig unterging; draußen schrien die einen, um eingelassen zu werden, drinnen schrien die anderen um Ruhe. Die Anfangschöre konnten noch gespielt werden, aber dann gab das Orchester auf, und der Lärm ging erst richtig los."
 elgar.305.g: "Wer ist dafür verantwortlich?!"
 elgar.306.t: "Überraschende Premiere"
 elgar.306.d: "Das Werk eines Komponisten, der in seinem Heimatland gescheitert ist, hat die Herzen unseres Publikums erobert."
 elgar.306.f: "Es hat immer wieder Fälle gegeben, in denen die Uraufführung berühmter Werke scheiterte. Solche Erfahrungen führten oft nicht nur zu ernsthaften Selbstzweifeln und dem Ende einer Karriere, sondern auch zu einem Versuch, das gleiche Stück vor einem anderen Publikum aufzuführen. Spätere Klassiker setzten sich oft erst im zweiten oder dritten Anlauf durch. Nicht der Ort der Uraufführung, sondern der Ort des Erfolgs wurde dann als die eigentliche Initialzündung erinnert. Hector Berlioz ist ein Beispiel für einen Komponisten, der mit seinen Werken in England und Deutschland mehr Erfolg hatte als zu Hause in Frankreich."
 elgar.306.g: "Unser Publikum ist dankbarer."
 elgar.307.t: "Musikalische Freundschaft"
 elgar.307.d: "Ein reisender Komponist verstand sich auf Anhieb mit seinen Mitmusikern vor Ort."
 elgar.307.f: "Das Verhältnis zwischen ausländischen und einheimischen Musikern war nicht immer einfach. Es ging nicht nur um nationale Ressentiments und persönliche Vorurteile. Manche Orchester konnten mit dem Dirigierstil eines Gastdirigenten nicht arbeiten, manchmal erforderte die Kurzfristigkeit der Aufführungen Kompromisse, für die der Gast wiederum die einheimische Musikwelt verantwortlich machte. So mancher einheimische Komponist oder Dirigent befürchtete auch einen zu großen Einfluss des Ausländers. Doch trotz all dieser Hindernisse wuchsen die Freundschaften weiter."
 elgar.307.g: "Eine fruchtbare Freundschaft."
 elgar.308.t: "Musikalische Rivalität"
 elgar.308.d: "Die örtliche Musikwelt betrachtet das Erscheinen eines reisenden Komponisten mit Unmut und Misstrauen."
 elgar.308.f: "\"Zwei große Werke für die Oper, zwei weitere für die Renaissance, zwei weitere für die Opera-Comique und noch ein weiteres für das Theatre Italien? Es scheint, dass Monsieur Donizetti uns wie ein erobertes Land behandelt, es ist eine echte Invasion. Man kann nicht mehr von den Opernhäusern von Paris sprechen, sondern nur noch von den Opernhäusern von Monsieur Donizetti.\" - Hector Berlioz"
 elgar.308.g: "Diese Musiker sollten sich zusammenreißen!"
 elgar.309.t: "Inspiration"
 elgar.309.d: "Ein ausländischer Komponist hat die Mitglieder des Staatsorchesters inspiriert."
 elgar.309.f: "Der Einfluss von außen hat in der lokalen und nationalen Musikwelt oft einen Unterschied gemacht. Unbekannte Stücke, eine fremde Musiksprache oder das Auftauchen eines charismatischen Musikers konnten oft dazu führen, dass die einheimischen Musiker eine völlig neue Perspektive bekamen."
 elgar.309.g: "Inspiration? Ich möchte Ergebnisse sehen!"
 elgar.309.h: "Dies wird sich positiv auf das Orchester auswirken."
 elgar.310.t: "Manie"
 elgar.310.d: "Das Auftauchen eines Komponisten hat zu einer beispiellosen, fast hysterischen öffentlichen Begeisterung für sein Werk geführt. Die Menschen haben nichts anderes im Kopf!"
 elgar.310.f: "\"Als ich früher von den Ohnmachtsanfällen hörte, die in Deutschland und besonders in Berlin ausbrachen, wenn Liszt dort auftrat, zuckte ich mitleidig mit den Schultern und dachte: das stille, sabbatistische Deutschland will sich die Gelegenheit nicht entgehen lassen, das bisschen notwendige Bewegung zu bekommen, das ihm erlaubt ist... Bei ihnen, dachte ich, geht es um das Spektakel um des Spektakels willen...So erklärte ich mir diese Lisztomanie und sah sie als Zeichen der politisch unfreien Verhältnisse jenseits des Rheins an. Aber ich habe mich doch geirrt, und es ist mir erst letzte Woche im italienischen Opernhaus aufgefallen, wo Liszt sein erstes Konzert gab... Das war wahrlich kein germanisch-sentimentales, sentimentalisierendes Berliner Publikum, vor dem Liszt spielte, ganz allein, oder vielmehr, nur von seinem Genie begleitet. Und doch, wie krampfhaft wirkte sein bloßes Erscheinen auf sie! Wie stürmisch war der Beifall, der ihm entgegenschallte!... Welch ein Beifall war das! Ein wahrer Wahnsinn, ein unerhörter in den Annalen des Furors!\" - Heinrich Heine"
 elgar.310.g: "Sie sind also völlig abgelenkt?"
 elgar.311.t: "Musik bringt Menschen zusammen"
 elgar.311.d: "Ein Botschafter fragt, ob wir ihm eine Karte für ein Konzert eines Komponisten besorgen können, der bei uns zu Gast ist."
 elgar.311.f: "Der Botschafter einer Großmacht ist ein Liebhaber eines reisenden Komponisten, der gerade in unserem Land zu Besuch ist. Er würde gerne eine Aufführung besuchen, aber es sind keine Plätze mehr frei. Er hat uns daher gebeten, unseren politischen Einfluss geltend zu machen, damit er die Aufführung doch noch besuchen kann."
 elgar.311.g: "Haha. Nein."
 elgar.311.h: "Geben Sie ihm einen Ehrenplatz."
 elgar.312.t: "Attentat in der Oper!"
 elgar.312.d: "Ein schreckliches Attentat auf einen führenden Politiker unseres Landes überschattete die heutige Opernaufführung!"
 elgar.312.f: "Seit einiger Zeit sorgt die mangelnde Legitimität unserer Regierung für Unzufriedenheit in der Bevölkerung. Ein hinterhältiger Attentäter nutzte das Konzert eines beliebten Komponisten, um während der Aufführung einen hochrangigen Regierungsbeamten zu erschießen. [SCOPE.sCharacter('elgar_leader_victim').GetFullName] wurde dabei schwer verletzt. Der Täter ist noch auf der Flucht, das lebensgefährlich verletzte Opfer wurde sofort in das nächstgelegene Krankenhaus gebracht."
 elgar.312.g: "Wo waren die Sicherheitskräfte?!"
 elgar.313.t: "Ein kleines Werk"
 elgar.313.d: "Ein kleines Werk, das der große Komponist in unserem Land komponiert hat, ist vielleicht kein großer Hit, aber es hat seine Fans gefunden."
 elgar.313.f: "Gelegenheitswerke von Komponisten, die abseits der berühmten Werke entstanden sind, mussten nicht gleich von durchschnittlicher Qualität sein. Immer wieder haben es kleine Stücke geschafft, mehr Aufmerksamkeit zu erregen als manches Lebenswerk. Trotz seiner Fülle an Werken ist Nikolai Rimski-Korsakow in der Popkultur für den \"Hummelflug\" (aus Zar Saltan) und Edvard Grieg für \"In der Halle des Bergkönigs\" (aus Peer Gynt) bekannt - zu Unrecht, aber ein Musikhit ist ein Musikhit."
 elgar.313.g: "Manchmal sind es die kleinen Dinge, die Freude machen."
 elgar.314.t: "Keine Inspiration"
 elgar.314.d: "Enttäuschend ist, dass unser Gast den Aufenthalt in unserem Land völlig uninspiriert findet."
 elgar.314.f: "Manchmal klappt es einfach nicht."
 elgar.314.g: "Deprimierend."
 elgar.315.t: "Privatkonzert"
 elgar.315.d: "Neben den offiziellen Aufführungen gab unser Komponist ein Privatkonzert im kleinen Kreis."
 elgar.315.f: "Kleine Privatkonzerte von großen Komponisten haben eine lange Tradition. Am bekanntesten ist dafür Franz Schubert mit den nach ihm benannten Schubertiaden. Bei den ersten Schubertiaden spielte Franz Schubert am Klavier, und die Baritone Johann Michael Vogl und später Carl von Schönstein sangen seine Lieder. Zu den Abenden gehörten auch Lesungen und witzige Unterhaltungsspiele, die oft unter einem bestimmten Thema standen. Sie waren eine Mischung aus freundschaftlicher Begegnung und literarisch-musikalischem Salon."
 elgar.315.g: "Das war schön."
 elgar.315.h: "Da capo!"
 elgar.316.t: "Ein talentierter Student"
 elgar.316.d: "Der große Komponist unseres Landes hat das Talent eines der führenden Politiker unseres Landes entdeckt und erwägt, ihn in seiner Kompositionskunst zu unterrichten."
 elgar.316.f: "Man mag sich wundern, dass Politiker überhaupt künstlerisch begabt sein können und dass sie als schlechte Menschen nicht prinzipiell völlig unempfindlich gegenüber jeglicher musikalischer Kunst sein sollten. Es gab sicherlich Komponisten mit politischen Ambitionen, aber weit weniger Politiker mit musikalischen Ambitionen. Was auch immer in diesem Politiker stecken mag, vielleicht ist seine Seele doch nicht unwiederbringlich verloren."
 elgar.316.g: "Ein vielversprechender Kandidat."
 elgar.316.h: "Seine Energie ist anderswo besser aufgehoben."
 elgar.317.t: "Musikalisches Desaster"
 elgar.317.d: "Eine Aufführung in einem unserer Konzertsäle könnte als einer der größten Misserfolge in unsere Musikgeschichte eingehen."
 elgar.317.f: "Das Orchester war unvorbereitet, der Solist erkältet, der Dirigent nicht ausgeruht und der Komponist, in dessen Beisein die Aufführung stattfand, droht damit, unser Land von seiner nächsten Tournee abzusagen. Man kann es nicht anders beschreiben als eine Katastrophe!"
 elgar.317.g: "Eine internationale Schande!"
 elgar.318.t: "Skandalöses Konzert"
 elgar.318.d: "Ein skandalöses Konzert, das mit seinen \"modernen\" Klängen einfach nur das Publikum in Aufruhr versetzte, spaltet nicht nur die Gesellschaft, sondern hat auch rechtliche Konsequenzen."
 elgar.318.f: "In den damaligen Presseberichten ist von tumultartigen Ausschreitungen die Rede. Die Anhänger des Komponisten, seine Schüler und Gegner schrien sich an, bewarfen sich gegenseitig, störten die Aufführung, zerstörten das Mobiliar usw. Mehrmals stiegen empörte Konservative aus dem Publikum fluchend auf die Bühne, um den Dirigenten zu ohrfeigen. Als dieser drohte, mit Hilfe der Staatsgewalt für Ordnung zu sorgen, soll der Tumult erst richtig losgegangen sein. Dann gab es eine Ohrfeige. Ein anwesender Operettenkomponist stellte in der anschließenden gerichtlichen Nachbereitung fest: Das Klatschen der Ohrfeigen \"war das Wohlklingendste, was man an diesem Abend hören konnte\"."
 elgar.318.g: "Der Pöbel hat keinen Sinn für Kultur. Das war ausgezeichnet!"
 elgar.318.h: "Nehmen Sie das Stück sofort vom Spielplan."
 elgar.319.t: "Zeitgeist"
 elgar.319.d: "Das moderne Stück, das ein großer Komponist heute persönlich dirigierte, traf genau den Geschmack der Massen."
 elgar.319.f: "Manchmal muss man einfach Glück haben."
 elgar.319.g: "Hervorragend!"
 elgar.320.t: "Musikpropaganda"
 elgar.320.d: "Einige Regierungspolitiker überlegen, ob die Musik des Komponisten, der sich derzeit bei uns aufhält, ... für Propagandazwecke ausgeliehen werden könnte."
 elgar.320.f: "Vor allem zu Beginn des 20. Jahrhunderts und der Massengesellschaft, die die totalitären Regime dieser Zeit hervorbrachten, herrschte die Idee vor, die Massen durch Musik gefügig zu machen. Während einige Musiker auch in diesen Zeiten Widerstand gegen die Diktatur leisteten, gab es andere, die ihre Arbeit direkt in den Dienst einer Ideologie stellten oder zumindest zuließen, dass ihr Talent in den Dienst einer politischen Richtung gestellt wurde."
 elgar.320.g: "Musik sollte frei von Politik sein."
 elgar.320.h: "Manchmal sollte die Musik der Politik dienen."
 elgar.321.t: "Große Komponisten unter sich"
 elgar.321.d: "Unser musikalischer Gast traf einen großen Komponisten, der in unserem Land beschäftigt ist. In stundenlangen Gesprächen und Spaziergängen tauschten sie musikalische Gedanken und Ideen aus."
 elgar.321.f: "Große Geister denken ähnlich."
 elgar.321.g: "Ein historisches Treffen."
 elgar.406.t: "Der Tod von Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]"
 elgar.406.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], die führende musikalische Autorität [GetPlayer.GetAltNameNoFlag('IN')], ist heute unerwartet gestorben. Die Musikwelt trauert um diesen großen Verlust."
 elgar.406.f: "\"Wir, die wir hier am Grabe dieses Verstorbenen stehen, sind sozusagen die Vertreter eines ganzen Volkes, die den Untergang der einen hochgefeierten Hälfte dessen beklagen, was uns von der verschwundenen Pracht der einheimischen Kunst und der patriotischen Geistesblüte geblieben war. Der Erbe und Erweiterer des Händel'schen und Bach'schen, des Haydn'schen und Mozart'schen unsterblichen Ruhmes hat sein Leben ausgelebt, und wir stehen weinend an der zerrissenen Saite des verblichenen Stückes.\nLasst mich ihn so nennen! Denn er war ein Künstler, und was er war, war er nur durch die Kunst.\" -Franz Grillparzer"
 elgar.406.g: "Aber wer soll jetzt das Requiem schreiben?"
 elgar.411.t: "Hervorragendes Konzert"
 elgar.411.d: "Die von unserem Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] geleitete Konzertsaison hat die Erwartungen weit übertroffen!"
 elgar.411.f: "\"Das Publikum soll streng sein, soll pfeifen, aber sein Applaus soll mich nicht zu irgendetwas verpflichten.\" - Giuseppe Verdi"
 elgar.411.g: "Bravo!"
 elgar.412.t: "Mittelmäßiges Konzert"
 elgar.412.d: "Die Konzertsaison unter der Leitung unseres Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] läuft wie gewohnt. Bisher gab es noch keine herausragenden Momente."
 elgar.412.f: "\"Man darf sich nicht für so göttlich halten, dass man seine eigenen Werke nicht gelegentlich verbessern kann.\" - Ludwig van Beethoven"
 elgar.412.g: "*gähn*"
 elgar.413.t: "Schlechtes Konzert"
 elgar.413.d: "Die bisherige Konzertsaison war nicht nur unterdurchschnittlich; die Leistungen unseres Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] gelten in diesem Jahr als besonders enttäuschend. Das Publikum verlangt nicht einmal nach einer Zugabe..."
 elgar.413.f: "\"Nach den letzten Tönen von Gotterdammerung fühlte ich mich, als wäre ich aus dem Gefängnis entlassen worden.\" - Pjotr Tchaikovsky"
 elgar.413.g: "Boooo!"
 elgar.414.t: "Ein Botschafter im Publikum"
 elgar.414.f: "\"Das Vorspiel zu Tristan und Isolde erinnert mich an das alte italienische Gemälde eines Märtyrers, dessen Eingeweide auf einer Spule langsam von seinem Körper abgewickelt werden.\" - Eduard Hanslick"
 elgar.414.g: "Der Mann weiß nicht einmal, was Musik ist."
 elgar.414.h: "Endlich sagt es jemand!"
 elgar.415.t: "Ballett"
 elgar.415.d: "Ein neues modernes Ballettstück feierte heute seine Premiere."
 elgar.415.f: "\"Ich mag die Handlung von \"Der Nussknacker\" - überhaupt nicht.\" - Pjotr Tchaikovsky"
 elgar.415.g: "Tanzt!"
 elgar.416.t: "Filmmusik"
 elgar.416.d: "Heute wurde unter der Leitung unseres Chefdirigenten eine der ersten Filmmusiken für einen Spielfilm aufgenommen."
 elgar.416.f: "\"Filmmusik sollte zum Filmdrama die gleiche Beziehung haben wie das Klavierspiel in meinem Wohnzimmer zu dem Buch, das ich gerade lese.\" - Igor Stravinsky"
 elgar.416.g: "Ich hatte ein Drehbuch über einen Archäologen, der vor langer Zeit nach der Bundeslade suchte, aber dann wurde es gestohlen."
 elgar.417.t: "Die Saison endet"
 elgar.417.d: "Die letzte Aufführung der Konzertsaison ist zu Ende gegangen. Die Kritiken sind bereits in der Presse. Es sieht so aus, als hätte sich [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] gut geschlagen und Anerkennung gefunden. Die Qualität des Staatsorchesters soll sich deutlich verbessert haben - was das musikalische Ansehen unserer Nation erhöht."
 elgar.417.f: "Komponisten, die noch keine Dirigenten sind, können die Fähigkeit zum Dirigieren durch Üben am Ende einer Konzertsitzung erwerben. Spätestens nach der dritten Saison ist der Erwerb des Dirigentenstatus sicher. Dies ist eine gute Möglichkeit, nicht-virtuose Komponisten auszubilden und sie dann auf Tournee zu schicken."
 elgar.417.g: "Da capo!"
 elgar.421.d: "Unser Komponist leidet derzeit unter einer massiven Schreibblockade."
 elgar.422.t: "Ein Spaziergang"
 elgar.422.d: "Bei einem Spaziergang in der Natur fand [SCOPE.sCharacter('elgar_conductor').GetFullName] etwas Inspiration, die seine Arbeit vorantrieb."
 elgar.422.f: "Die Natur hat schon viele Komponisten inspiriert. Beethoven zog sich aufs Land zurück und sammelte dort Eindrücke, die ihn später zur 6. Sinfonie inspirierten. Gustav Mahler richtete sich sogar ein eigenes kleines Komponistenhäuschen ein."
 elgar.422.g: "In den Fußstapfen von Beethoven."
 elgar.423.t: "Nicht genug Komfort"
 elgar.423.f: "Sobald man Künstlern einen wichtigen Auftrag erteilt, kommen sie mit Sonderwünschen. Eine seriöse Persönlichkeit des öffentlichen Lebens wird schnell zu einer Diva, wenn man ihr das Gefühl gibt, wichtig zu sein. Ehe man sich versieht, steigt der Ruhm diesen Leuten zu Kopf."
 elgar.423.g: "Gib ihm Komfort"
 elgar.424.t: "Störung"
 elgar.424.f: "Es gibt eine Person, die [SCOPE.sCharacter('elgar_conductor').GetFullName] das Leben schwer macht. Sei es ein Fan oder einfach nur eine Person, die glaubt, durch besondere Nähe zu einer berühmten Persönlichkeit des öffentlichen Lebens politischen Einfluss gewinnen zu können. Man könnte es fast einen Groupie nennen. Die Störungen sind inzwischen so schlimm, dass [SCOPE.sCharacter('elgar_conductor').GetLastName] sich über Paraonia beschwert. Leider handelt es sich bei dem \"Fan\" um eine hochrangige politische Persönlichkeit, deren öffentliche Ächtung verständliche Konsequenzen hätte."
 elgar.424.g: "Stören Sie ihn nicht!"
 elgar.424.h: "Er muss damit fertig werden."
 elgar.431.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')]"
 elgar.431.d: "Nach mehrmonatigen Bemühungen und künstlerischer Kreativität hat [SCOPE.sCharacter('elgar_conductor').GetFullName] [SCOPE.sCharacter('elgar_conductor').GetHerHis] [SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')] heute mit [SCOPE.sCharacter('elgar_conductor').GetHerHim] am Pult erstmals aufgeführt."
 elgar.431.f: "Unter einem Konzert versteht man seit dem Spätbarock meist eine Instrumentalkomposition, die für einen oder mehrere Solisten in Begleitung eines Orchesters oder eines anderen Ensembles geschrieben wurde. Als Gattung der Instrumentalmusik entwickelten sich die ersten Werke aus dem Concerto grosso zu Beginn des 18. Jahrhunderts. Seine volle Ausprägung findet es in der klassischen Periode. Es besteht in der Regel aus drei Sätzen, mit einem langsamen Satz in der Mitte."
 elgar.432.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_symphony_event_type')]"
 elgar.432.d: "Heute Abend findet im Konzertsaal eine ganz besondere Aufführung statt: Die High Society hat sich versammelt, um der Premiere [SCOPE.sCharacter('elgar_conductor').GetFullName]s [SCOPE.sCharacter('elgar_conductor').GetCharacter.GetCustom('elgar_composer_masterpiece_for_event_type')] beizuwohnen."
 elgar.432.f: "Eine Symphonie ist ein Begriff für Instrumentalwerke, die im Laufe der Jahrhunderte in unterschiedlicher Form und Besetzung entstanden sind. Die klassische Form der Symphonie entwickelte sich im 18. Jahrhundert und behielt bis ins 20. Jahrhundert hinein eine dominierende Stellung im Bereich der Orchestermusik. Es handelt sich um ein Werk, das aus mehreren (meist drei oder vier, seltener fünf) Sätzen für Orchester ohne Solisten besteht. Seit Ludwig van Beethovens 9. Sinfonie kommen gelegentlich auch Vokalstimmen (Solisten und/oder Chor) vor, z. B. bei Gustav Mahler, doch bleibt die Rolle des Orchesters dominant."
 elgar.433.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]"
 elgar.433.d: "Die Oper \"[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]\", die Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] nach wochen- und monatelangen Bemühungen komponiert hat, gilt als neuer Höhepunkt im musikalischen Schaffen dieses künstlerischen Genies. Die bevorstehende Premiere verspricht, ein großer Erfolg zu werden."
 elgar.433.f: "Die Oper ist eine musikalische Theatergattung, die in der Barockzeit entstanden ist. Eine Oper besteht aus der Vertonung einer dramatischen Dichtung, die von einem Ensemble von Sängern, einem begleitenden Orchester, manchmal auch einem Chor und einem Ballettensemble aufgeführt wird. Neben dem Gesang spielen und tanzen die Darsteller auf einer Theaterbühne, die durch Malerei, Architektur, Requisiten, Beleuchtung und Bühnentechnik gestaltet wird. Die Rollen der Darsteller werden durch Masken und Kostüme visuell dargestellt. Claudio Monteverdi, der mit seinem Orfeo Maßstäbe setzte, gilt als der Urvater der Oper. Im 19. Jahrhundert setzte Richard Wagner mit seinen Opern neue Maßstäbe."
 elgar.440.t: "Folk Music"
 elgar.440.d: "Auf seinen Reisen durch die ländlicheren Gegenden des Landes hat [SCOPE.sCharacter('elgar_conductor').GetFullName] großes Interesse daran gefunden, die Tänze und Lieder der Einheimischen zu lernen, aufzuschreiben und zu sammeln."
 elgar.440.f: "Der Nationalismus des 19. Jahrhunderts führte dazu, dass viele zuvor geschmähte Musikformen plötzlich auf Interesse stießen, weil sie angeblich die nationale Seele eines Landes widerspiegelten. Lokalhistoriker und lokale Musiker sammelten traditionelle Lieder. Auch einige Komponisten ließen sich von den Menschen inspirieren und vertonten sie auf völlig neue Weise."
 elgar.440.g: "Eine interessante Musiksammlung."
 elgar.440.h: "[SCOPE.sCharacter('elgar_conductor').GetLastName] sollte sich auf Hochkultur konzentrieren, anstatt sich mit Leierkastenmusik zu beschäftigen."
 elgar.441.t: "Shanty"
 elgar.441.d: "Inspiriert von den Taten des Admirals [SCOPE.sCharacter('elgar_admiral').GetLastName], hat unser unser Komponist [SCOPE.sCharacter('elgar_conductor').GetFullName] nebenbei ein kleines Shanty (Form eines Seemannsliedes) geschrieben."
 elgar.441.f: "Der ursprüngliche praktische Zweck des Shantys als Arbeitslied stand bei den Seefahrern immer im Vordergrund. Sprachliche und musikalische Aspekte spielten demgegenüber kaum eine Rolle. Mit dem Beginn der industriellen Revolution wurden schnellere Schiffe benötigt. Die dickbäuchigen East Indiamen verschwanden und wurden durch Klipper und Fregatten ersetzt. Dies führte schließlich dazu, dass die Shanties allmählich ihren praktischen Nutzen für die Seefahrt verloren und nur noch zu Freizeit und Unterhaltung gesungen wurden. Musiker sammelten alte Seemannslieder oder ließen sich von ihnen zu eigenen Werken inspirieren."
 elgar.441.g: "Yo Ho!"
 elgar.442.t: "Marsch"
 elgar.442.d: "Inspiriert von den Werten von General [SCOPE.sCharacter('elgar_general').GetFullName] hat unser Komponist [SCOPE.sCharacter('elgar_conductor').GetFullName] einen neuen Militärmarsch geschrieben."
 elgar.442.f: "Seine Blütezeit erlebte der Marsch vor allem im 19. und frühen 20. Jahrhundert mit seinen nationalistischen und militaristischen Tendenzen und seinen Revolutionen. Jahrhundert mit seinen nationalistischen und militärischen Tendenzen und Revolutionen. Ein Beispiel dafür ist Gioachino Rossini, der nicht nur regelmäßig pompöse Märsche in seine Opern einbaute, sondern auch eine Reihe von Stücken für einzelne Fürsten komponierte: darunter eine Auftragskomposition für den türkischen Sultan Abdülmecid I. (Marcia per il Sultano), die noch heute regelmäßig auf dem Programm italienischer Militärkapellen steht. Beispielhaft für die Tendenzen des 19. Jahrhunderts ist auch die Produktion der Familie Strauss in Wien, die bei jeder passenden Gelegenheit einen Marsch komponierte, um Patriotismus oder Kaisertreue zu demonstrieren oder militärische Persönlichkeiten zu ehren."
 elgar.442.g: "Neues Material für die Armee."
 elgar.443.t: "Kunstlied"
 elgar.443.d: "Basierend auf dem Gedicht eines großen Dichters hat [SCOPE.sCharacter('elgar_conductor').GetFullName] ein Kunstlied als Nebenwerk geschrieben."
 elgar.443.f: "In der westlichen klassischen Musiktradition ist das Lied ein Begriff für die Vertonung von Gedichten zu klassischer Musik, um ein mehrstimmiges Musikstück zu schaffen. Im zeitgenössischen Deutsch wird der Begriff für jede Art von Lied verwendet, aber im englischen und französischen Sprachraum wird \"lied\" oft mit \"Kunstlied\" gleichgesetzt, um Werke zu erfassen, die diese Tradition auch in anderen Sprachen inspiriert hat. Die Gedichte, die zu Liedern verarbeitet wurden, behandeln häufig pastorale Themen oder Themen der romantischen Liebe."
 elgar.443.g: "Könnte es nicht etwas anderes gewesen sein...?"
 elgar.444.t: "Klaviersonate in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]"
 elgar.444.d: "Klavierstücke gehören zum Standardrepertoire der klassischen Musik. Als Fingerübung für das nächste große Werk hat [SCOPE.sCharacter('elgar_conductor').GetFullName] eine Sonate geschrieben und sie gestern Abend bei einer kleinen Abendgesellschaft aufgeführt."
 elgar.444.f: "Zu Beginn des 19. Jahrhunderts wurde die Sonatenform definiert, die sich aus der früheren Praxis und den Werken bedeutender klassischer Komponisten, insbesondere Haydn, Mozart, Beethoven, aber auch Komponisten wie Clementi, ergab. In dieser Zeit wurden die Unterschiede zwischen der drei- und der viersätzigen Gliederung zum Gegenstand von Kommentaren, wobei die Betonung auf dem dreisätzigen Konzert und der viersätzigen Symphonie lag. Zu den ausdrücklich als Klaviersonate bezeichneten Werken gehören die drei Sonaten von Frédéric Chopin, die von Felix Mendelssohn, die drei Sonaten von Robert Schumann, die h-Moll-Sonate von Franz Liszt und später die Sonaten von Johannes Brahms und Sergej Rachmaninow."
 elgar.444.g: "Ein Klassiker."
 elgar.445.t: "Abhandlung über Musik"
 elgar.445.d: "In den letzten Monaten hat [SCOPE.sCharacter('elgar_conductor').GetFullName] intensiv an einer neuen Abhandlung über Orchestrierung und das Studium von Musikinstrumenten gearbeitet. Die Abhandlung gilt als Beitrag zu musikalischen Innovationen."
 elgar.445.f: "\"Man braucht viel Zeit, um die Ozeane der Musik zu finden, aber noch mehr, um zu lernen, sie zu befahren.\" -Hector Berlioz"
 elgar.445.g: "Ein wichtiges theoretisches Werk."
 elgar.446.t: "Requiem"
 elgar.446.d: "Ein einflussreicher Vertreter des katholischen Klerus bat kürzlich, nach dem Tod eines angesehenen Bischofs, [SCOPE.sCharacter('elgar_conductor').GetFullName] ein neues geistliches Werk zu schreiben."
 elgar.446.f: "Die liturgische Form der Trauermesse ist das Requiem. Der Begriff bezeichnet sowohl die Liturgie der Heiligen Messe beim Begräbnisgottesdienst der katholischen Kirche als auch kirchenmusikalische Kompositionen zum Gedenken an die Verstorbenen. Er leitet sich vom Incipit des Introitus Requiem aeternam dona eis, Domine (\"Ewige Ruhe, o Herr\") ab. Das Proprium der Liturgie des Requiems entspricht dem des Allerseelenfestes. Als erstes Stück der musikalischen Messe wurde der Introitus von den Komponisten in der Regel vertont, ebenso das Offertorium, im Gegensatz zur Sequenz, die aus verschiedenen Gründen gelegentlich gekürzt oder ganz weggelassen wird. Gloria und Credo werden im Requiem nicht vertont, da sie in der Liturgie der Totenmesse nicht gesungen oder gesprochen werden."
 elgar.446.g: "Requiem aeternam dona eis, Domine."
 elgar.447.t: "Eine gewagte Oper"
 elgar.447.d: "Die jüngste Komposition von [SCOPE.sCharacter('elgar_conductor').GetFullName] stieß bei den Zensurbehörden auf Kritik. Sie ist sicherlich von hohem künstlerischen Wert, könnte aber für Aufruhr sorgen. Die Intelligenzia des Landes ist bereits in Aufruhr."
 elgar.447.f: "In weiten Teilen des 19. Jahrhunderts mussten sich selbst die größten Komponisten ihrer Zeit der Zensur beugen. Die vielen verschiedenen Vertonungen des \"Figaro\" wurden wegen des revolutionären Themas sehr kritisch betrachtet. Auch der Verdacht auf Blasphemie oder andere Unsittlichkeiten war den Zensoren ein Dorn im Auge. Irgendwann konnten einige Komponisten die Schikanen nicht mehr ertragen und verließen ihren Förderer."
 elgar.447.g: "Kunst sollte erheben, nicht aufregen."
 elgar.447.h: "Wir sollten die Zensur ein wenig lockern."
 elgar.448.t: "Komponistenduell"
 elgar.448.d: "[SCOPE.sCharacter('rival_composer_scope').GetFullName], ein Komponist aus [SCOPE.sCountry('rival_composer_country_scope').GetAltName('DAT')], bezeichnete in einem Anfall der für dieses Land typischen Arroganz unseren Komponisten [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] als 'unbekannte Nummer' und stellte den musikalischen Status unserer Nation grundsätzlich in Frage."
 elgar.448.f: "\"Die Zersplitterung und Beliebigkeit unseres Musikstils wurde durch Mendelssohns Bemühen, einen unklaren, fast bedeutungslosen Inhalt so interessant und verblüffend wie möglich auszudrücken, wenn nicht herbeigeführt, so doch wenigstens auf den höchsten Gipfel gesteigert. Hatte der letzte in der Kette unserer wahren musikalischen Helden, Beethoven, den höchsten Wunsch und die wunderbare Fähigkeit zum klarsten, sichersten Ausdruck eines unaussprechlichen Inhalts durch scharf geschnittene, plastische Gestaltung seiner Klangbilder, so verwischt Mendelssohn dagegen diese erworbenen Gestalten in seinen Produktionen zu einem sich auflösenden, phantastischen Schattenbild, dessen unbestimmter Farbenschimmer willkürlich unsere kapriziöse Phantasie anregt, aber unsere rein menschliche innere Sehnsucht nach klarer künstlerischer Anschauung kaum nur mit der Hoffnung auf Erfüllung berührt.\" -Richard Wagner über Felix Mendelssohn"
 elgar.448.g: "Wir nehmen die Herausforderung an."
 elgar.448.h: "Wir können dieses Duell nicht überleben."
 elgar.449.t: "Sieg im Komponistenduell"
 elgar.449.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] hat sich als weitaus berühmterer und fähigerer Komponist erwiesen als sein schmieriger Rivale und damit den Ruf unseres Landes als kulturelles Zentrum bewahrt."
 elgar.449.f: "\"Nichts zeigt deutlicher die Macht Wagners und die Art von Sturm und Drang, die er entfesselt hat, als diese Dekadenz, die sein Werk tatsächlich geweiht hat und die sich seit seiner Zeit immer weiter entwickelt hat. Wie mächtig muss dieser Mann gewesen sein, dass er eine im Wesentlichen musikalische Form (die Oper) mit einer solchen Energie zerstört hat, dass wir fünfzig Jahre nach seinem Tod immer noch unter dem Müll und Lärm des Musikdramas taumeln! Denn das Prestige der Synthese der Künste ist immer noch lebendig. Ist es das, was man Fortschritt nennt? Vielleicht. Es sei denn, die Komponisten finden die Kraft, dieses schwere Erbe abzuschütteln, indem sie Verdis bewundernswerte Aufforderung befolgen: Kehren wir zu den alten Zeiten zurück, und das wird der Fortschritt sein.\" -Igor Stravinsky über Richard Wagner"
 elgar.449.g: "Es ist nun klar, welches Land die dominierende Kulturnation ist!"
 elgar.450.t: "Niederlage im Komponistenduell"
 elgar.450.d: "Leider wurde unser Komponist von seinem ausländischen Konkurrenten im Wettbewerb besiegt. Die ganze Welt ist nun überzeugt, dass wir musikalisch ins Hintertreffen geraten sind!"
 elgar.450.f: "\"Ist Wagner überhaupt ein Mensch? Ist er nicht eher eine Krankheit? Er macht alles krank, was er anfasst, er hat die Musik krank gemacht.\" -Friedrich Nietzsche über Richard Wagner"
 elgar.450.g: "Es ist nun klar, welches Land die dominierende Kulturnation ist..."
 elgar.451.t: "Der Maestro reist [SCOPE.sCountry('elgar_composer_destination_scope').GetAltNameNoFlag('NACH')]"
 elgar.451.d: "Unser Komponist [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] hat alle Vorbereitungen abgeschlossen. Das erste Ziel der zweieinhalbjährigen Konzertreise wird [SCOPE.sCountry('elgar_composer_destination_scope').GetAltName('NOM')] sein."
 elgar.451.f: "\"Wenn die Welt jemals untergehen sollte, gehe ich nach Wien, denn dort passiert alles fünfzig Jahre später.\" - Gustav Mahler"
 elgar.451.g: "Schick uns eine Postkarte!"
 elgar.452.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] kommt [GetPlayer.GetAltNameNoFlag('IN')] an"
 elgar.452.d: "Ein reisender Komponist machte auf seiner aktuellen Tournee in unserem Land Halt und beschloss, eine Weile zu bleiben."
 elgar.452.f: "[SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_composer_achievements_switch_to_character_scope_type')]"
 elgar.452.g: "Willkommen, willkommen!"
 elgar.453.t: "Reisender Komponist reist ab"
 elgar.453.d: "Nach einem mehrwöchigen Aufenthalt und einigen Aufführungen, die ihm die Anerkennung der einheimischen Bevölkerung einbrachten, setzte der reisende Komponist seine Tournee fort."
 elgar.453.f: "Wohin ein Komponist geht, hängt von einer ganzen Reihe von Faktoren ab. Ein entscheidendes Kriterium sind Opernhäuser und die Nähe zum letzten Standort. Aber auch Faktoren wie Kulturtechniken, das Vorhandensein eines Zentrums der Kunst (Impressionismus, Expressionismus, Jugendstil) oder das Vorhandensein eines Konservatoriums spielen eine Rolle. Komponisten meiden Orte, an denen kürzlich eine Aufführung eines konkurrierenden Komponisten stattgefunden hat."
 elgar.453.g: "Ich hoffe, Sie bald wiederzusehen!"
 elgar.455.t: "Komponist kehrt von Tournee zurück"
 elgar.455.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] ist von [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]er Tour zurückgekehrt. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe|U] hat [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]e Spuren in der Musikwelt hinterlassen und [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]en Ruf erheblich verbessert."
 elgar.455.f: "Tourneen dienen ausschließlich dazu, das Ansehen eines Komponisten zu steigern. Je nach den Fähigkeiten eines Komponisten wird dies unterschiedlich sein. Eigene Kompositionen spielen eine Rolle, aber auch Charaktereigenschaften - innovative oder ehrgeizige Charaktere haben Vorteile. Komponisten mit der Eigenschaft Dirigent und Virtuose erhalten einen besonderen Bonus."
 elgar.455.g: "Willkommen zurück, Maestro."
 elgar.501.t: "Canto degli Italiani"
 elgar.501.d: "In einem Klima von Volksaufständen um die Einigung und Unabhängigkeit Italiens hat der 20-jährige Student und Patriot Goffredo Mameli ein inspirierendes Lied geschrieben, das er „Das Lied der Italiener“ nannte. Es ist in kurzer Zeit sehr populär geworden."
 elgar.501.f: "Il Canto degli Italiani (Das Lied der Italiener) ist den Italienern vor allem als „Inno di Mameli“ (Mamelis Hymne), nach dem Autor des Textes, oder als „Fratelli d’Italia“ (Brüder Italiens), nach der ersten Zeile, bekannt. Der Text wurde von Michele Novaro vertont. Die Hymne erfreute sich während des Risorgimento und in den folgenden Jahrzehnten großer Beliebtheit. Sie wurde auch in Genua auf Flugblättern gedruckt und am 10. Dezember veröffentlicht: Die Demonstration war offiziell dem 101. Jahrestag der Vertreibung der österreichischen Mächte aus der Stadt gewidmet – tatsächlich war dies jedoch ein Vorwand, um gegen die ausländische Besetzung Italiens zu protestieren und Carlo Alberto dazu zu bewegen, sich der italienischen Freiheitsbewegung anzuschließen. Bei dieser Gelegenheit wurde die Trikolore gezeigt und Mamelis Hymne zum ersten Mal öffentlich gesungen."
 elgar.501.g: "Es sollte ein Gesetz dagegen geben..."
 elgar.501.h: "Fratelli d'Italia, l'Italia s'è desta!"
 elgar.503.t: "Deutschlandlied"
 elgar.503.d: "Als Reaktion auf die erneuten Expansionsbestrebungen Frankreichs, das den Rhein als natürliche Grenze betrachtet, schrieb der Dichter Hoffmann von Fallersleben ein Lied, das als Deutschlandlied\" weithin bekannt ist."
 elgar.503.f: "Das Lied der Deutschen, auch bekannt als Deutschlandlied, wurde von August Heinrich Hoffmann von Fallersleben auf Helgoland geschrieben. Der konkrete Anlass für Hoffmann, das Lied zu schreiben, waren französische Gebietsansprüche auf das Rheinland während der Rheinkrise. Er wies diese Ansprüche mit dem Lied zurück, wie es auch bei anderen deutschen Rheinliedern dieser Zeit geschah. Er ergänzte dies durch weitere Gedanken, vor allem durch den der deutschen Einheit, die allein die Voraussetzung für die Abwehr feindlicher Angriffe jeder Größenordnung sein könne. Der Dichter schuf sein Werk ausdrücklich auf die Melodie der alten Kaiserhymne \"Gott schütze Franz, den Kaiser\" von Joseph Haydn (1797). Größere Bedeutung erlangte das Lied erst während des Ersten Weltkriegs. Seine dritte Strophe ist seit 1952 der Text der deutschen Nationalhymne."
 elgar.503.g: "Deutscher Wein und deutsches Lied!"
 elgar.503.h: "Deutschland, Deutschland über alles!"
 elgar.503.i: "Sie müssen sich irren, das Lied heißt 'Gott erhalte Franz den Kaiser'."
 elgar.504.t: "Paganinis Tod"
 elgar.504.d: "Der Tod des berühmten Geigenvirtuosen Niccolò Paganini löste eine Kontroverse um seine Beerdigung aus."
 elgar.504.f: "Niccolò Paganini war ein italienischer Geiger und Komponist. Er war der berühmteste Geigenvirtuose seiner Zeit und hinterließ seine Spuren als eine der Säulen der modernen Geigentechnik. Seine 24 Capricen für Violine solo op. 1 gehören zu den bekanntesten seiner Kompositionen und dienten als Inspiration für viele bedeutende Komponisten. Im Mai 1840 schickte der Bischof von Nizza einen örtlichen Pfarrer zu Paganini, um ihm die letzte Ölung zu erteilen. Paganini nahm an, dass das Sakrament verfrüht sei, und lehnte ab. Eine Woche später, am 27. Mai 1840, starb der 57-jährige Paganini an inneren Blutungen, bevor ein Priester herbeigerufen werden konnte. Aus diesem Grund und wegen der weit verbreiteten Gerüchte über seine Verbindung mit dem Teufel verweigerte die Kirche seinem Leichnam ein katholisches Begräbnis in Genua. Dies hat zu einer öffentlichen Diskussion darüber geführt, wie mit Paganini zu verfahren ist. Es gibt Stimmen, die sich dafür aussprechen, Druck auf die Kirche auszuüben und Paganini standesgemäß in Genua zu bestatten und sein Erbe zu beanspruchen. Dies würde jedoch zu einem offenen Streit mit den kirchlichen Behörden führen."
 elgar.504.g: "Geben Sie ihm ein würdiges Begräbnis und sichern Sie sein Erbe."
 elgar.504.h: "Mischen Sie sich nicht in diese heikle Angelegenheit ein."
 elgar.505.t: "Nabucco"
 elgar.505.d: "Giuseppe Verdi hat mit seiner neuesten Oper den bisher größten Erfolg seiner Karriere gefeiert. Zugleich weckt sie das Nationalgefühl des italienischen Volkes."
 elgar.505.f: "Nabucco ist eine italienischsprachige Oper in vier Akten, die 1841 von Giuseppe Verdi nach einem italienischen Libretto von Temistocle Solera komponiert wurde. Die bekannteste Nummer aus der Oper ist der \"Chor der hebräischen Sklaven\", ein Chor, der heute in vielen Opernhäusern regelmäßig als Zugabe gegeben wird. Nabucco gilt als die Oper, die Verdis Ruf als Komponist dauerhaft begründet hat. Er sagte: \"Dies ist die Oper, mit der meine künstlerische Laufbahn wirklich beginnt. Und obwohl ich mit vielen Schwierigkeiten zu kämpfen hatte, ist es sicher, dass Nabucco unter einem glücklichen Stern geboren wurde\". Die Geschichte von der Gefangenschaft der Juden in Babylonien wurde in ganz Italien zum Durchbruch, nicht zuletzt weil sich die Italiener im Zeitalter des Nationalismus von fremden Mächten beherrscht fühlten. Inwieweit Verdi mit Nabucco tatsächlich das italienische Nationalgefühl bediente, ist bis heute umstritten."
 elgar.505.g: "Va pensiero ..."
 elgar.505.h: "Wieder diese rebellischen Italiener."
 elgar.507.t: "Aida"
 elgar.507.d: "Anlässlich der Eröffnung des Suezkanals brachte Giuseppe Verdi seine ägyptisch angehauchte Oper Aida zur Uraufführung - mit leichter Verzögerung."
 elgar.507.f: "Aida ist eine Oper in vier Akten von Giuseppe Verdi nach einem italienischen Libretto von Antonio Ghislanzoni, das auf einem Szenario basiert, das oft dem französischen Ägyptologen Auguste Mariette zugeschrieben wird, obwohl behauptet wird, dass das Szenario tatsächlich von Temistocle Solera geschrieben wurde. Isma'il Pascha, der Khedive von Ägypten, beauftragte Verdi mit der Komposition der Oper und zahlte ihm 150.000 Francs, doch die Premiere verzögerte sich. Als Aida schließlich in Kairo uraufgeführt wurde, erntete sie großen Beifall. Die Kostüme und Accessoires für die Uraufführung wurden von Auguste Mariette entworfen, und er überwachte den Entwurf und den Bau der Bühnenbilder, die in Paris entworfen und nach Kairo verschifft wurden. Obwohl Verdi der Uraufführung in Kairo nicht beiwohnte, war er sehr unzufrieden mit der Tatsache, dass das Publikum aus geladenen Würdenträgern, Politikern und Kritikern bestand, aber nicht aus der breiten Öffentlichkeit. Er betrachtete daher die italienische (und europäische) Premiere an der Mailänder Scala, an der er in jeder Phase maßgeblich beteiligt war, als die eigentliche Premiere."
 elgar.507.g: "Ein Triumph für Italien!"
 elgar.507.h: "Ein Triumph für [ROOT.GetCountry.GetAltNameNoFlag('AKK')]!"
 elgar.509.t: "Franz Schubert"
 elgar.509.d: "13 Jahre nach seinem Tod wurde die 5. Sinfonie von Franz Schubert der Öffentlichkeit vorgestellt."
 elgar.509.f: "Die fünfte Sinfonie in B-Dur ist vielleicht die vollendetste seiner jugendlichen Sinfonien und wird weithin als Schuberts erste \"reife\" Sinfonie angesehen. Ihre Ausarbeitung ist von kammermusikalischer Perfektion, denn die Instrumentierung ist kleiner als bei allen anderen Sinfonien, und ihre Proportionen sind fein aufeinander abgestimmt. Sie kann als Schuberts produktive Auseinandersetzung mit Mozarts symphonischen Werken verstanden werden und offenbart Schuberts völlige Andersartigkeit und Unabhängigkeit. Nach Schuberts eigenen Eintragungen in der Partitur entstand das Werk zwischen September und 3. Oktober 1816, also in einer Zeit, in der Schubert auf der Suche nach seiner eigenen musikalischen Sprache war. Die Uraufführung von Schuberts 5. Sinfonie fand 1816 mit einem kleinen Amateurorchester in Wien statt; die erste öffentliche Aufführung hingegen erfolgte erst am 17. Oktober 1841, dreizehn Jahre nach Schuberts Tod, unter der Leitung von Michael Leitermayer."
 elgar.509.g: "Selbst vom Himmel aus erfreut uns Schubert mit seiner Musik."
 elgar.510.t: "Kontroverse über Poliuto"
 elgar.510.d: "Ein unversöhnlicher Streit zwischen dem König und dem Komponisten Donizetti droht dessen Entlassung zu bewirken."
 elgar.510.f: "Von 1829 bis 1838 war Gaetano Donizetti Musikdirektor der Königlichen Theater von Neapel und trotz Reisen und Aufträgen in anderen Staaten de facto die wichtigste kulturelle Figur des Königreichs und sein berühmtester Vertreter. In Neapel entstand eine ganze Reihe berühmter Donizetti-Opern, die die Stellung des Königreichs beider Sizilien als Musikstandort ersten Ranges festigten. Doch trotz der vielen Erfolge hatte Donizetti immer wieder mit der neapolitanischen Zensur zu kämpfen, die seine Libretti verunstaltete oder ganze Opern annullierte. Im letzten Streitfall griff der König selbst ein, um die Aufführung der Oper \"Poliuto\" zu verhindern. Nach jahrelangen Auseinandersetzungen mit der Zensur ist Donizetti der Sache überdrüssig und trifft Vorbereitungen für seine Flucht nach Paris. Die politische Elite steht geschlossen hinter dem König; Donizetti an seinen Plänen zu hindern, würde nicht nur die politische und gesellschaftliche Landschaft durcheinander bringen, sondern auch die Autorität und das Ansehen des Königs massiv beschädigen."
 elgar.510.g: "Der König hat gesprochen, er kann seine Sachen packen."
 elgar.510.h: "Wir müssen alles tun, um zu verhindern, dass Donizetti geht!"
 elgar.511.t: "Les Martyres, 1840"
 elgar.511.d: "Der italienische Komponist Gaetano Donizetti hat Paris erreicht und dort seine Oper \"Les Martyres\" aufgeführt, die vom Publikum sehr gut aufgenommen wurde."
 elgar.511.f: "Poliuto ist eine dreiaktige tragedia lirica (oder tragische Oper) von Gaetano Donizetti nach dem italienischen Libretto von Salvadore Cammarano, das auf Pierre Corneilles Theaterstück Polyeucte aus den Jahren 1641/42 basiert. Darin wird das Leben des frühchristlichen Märtyrers Polyeuctus dargestellt. Von einem Autor als Donizettis \"persönlichste Oper\" bezeichnet, mit einer Musik, die \"zum Besten gehört, was Donizetti je komponiert hat\", wurde Poliuto 1838 für Aufführungen am Teatro San Carlo in Neapel geschrieben, die noch im selben Jahr stattfinden sollten. Kurz vor Beginn der Proben weigerte sich König Ferdinand II. jedoch, das Martyrium eines christlichen Heiligen auf der Bühne zu zeigen, und verbot die Aufführung. Aus Verärgerung über diese Entscheidung und weil der Komponist einen Auftrag für die Pariser Oper erhalten hatte, zahlte Donizetti die Strafe an San Carlo, weil er kein Originalwerk als Ersatz produziert hatte, und verließ Neapel in Richtung Paris. Als seinen ersten Auftrag für Paris beschloss er, Poliuto zu überarbeiten und zwischen 1839-40 einen französischen Text mit dem Titel Les Martyres."
 elgar.511.g: "Nicht schlecht für einen Italiener."
 elgar.512.t: "Das Stabat Mater"
 elgar.512.d: "Gaetano Donizetti besucht Bologna, um die Premiere von Gioachino Rossinis Stabat Mater zu dirigieren. Die Aufführung war ein voller Erfolg."
 elgar.512.f: "Als Donizetti für das Stabat Mater nach Bologna ging, besuchte Rossini die dritte Aufführung, und die beiden Männer - beide ehemalige Studenten des Konservatoriums von Bologna - trafen sich zum ersten Mal, wobei Rossini erklärte, Donizetti sei \"der einzige Maestro in Italien, der mein Stabat so dirigieren kann, wie ich es möchte\". Freunde - darunter auch sein Schwager Antonio Vasselli (genannt Totò) - versuchten immer wieder, Donizetti davon zu überzeugen, eine akademische Stelle in Bologna anzunehmen, anstatt am Wiener Hof zu arbeiten, und sei es nur, um dem Komponisten eine Basis zu bieten, von der aus er arbeiten und lehren konnte, ohne ständig zwischen den Städten hin- und herreisen zu müssen. Donizetti berichtete über die Reaktion des Publikums: \"Die Begeisterung ist nicht zu beschreiben. Selbst bei der Generalprobe, der Rossini mitten am Tag beiwohnte, wurde er unter dem Gejohle von mehr als 500 Personen zu seinem Haus begleitet. Dasselbe in der ersten Nacht, unter seinem Fenster, da er nicht im Saal erschien."
 elgar.512.g: "Rossini & Donizetti - eine himmlische Kombination!"
 elgar.513.t: "Ist Donizetti verrückt geworden?"
 elgar.513.d: "Donizettis immer schnellerer geistiger Verfall führte dazu, dass er in eine Pariser Irrenanstalt eingewiesen wurde."
 elgar.513.f: "Donizetti berichtete in seinen Briefen über einen langen Zeitraum, beginnend in den 1820er Jahren, von Kopfschmerzen, manchmal auch von Fieberanfällen, die nur einen Tag andauerten, und auch von gelegentlichen depressiven Verstimmungen. Das außerordentliche Arbeitspensum, das er im Laufe seines Lebens zu bewältigen hatte, sowie die langen, damals besonders anstrengenden Reisen, vor allem nach seinem Umzug nach Paris und später nach Wien, führten von 1842 bis 1843 zu vermehrten Erschöpfungssymptomen. Zu den gelegentlichen Kopfschmerzen und Fieberanfällen gesellten sich Schwindelgefühle und manchmal \"Empfindungen im Kopf\". Im Jahr 1845 verschlechterte sich Donizettis Gesundheitszustand rapide und er brach in Paris auf der Straße zusammen. Die Ärzte verbieten ihm, zu komponieren, was ihn noch mehr deprimiert. Schließlich wird er unter falschem Vorwand ohne sein Wissen und gegen seinen Willen in die Irrenanstalt von Ivry-sur-Seine gelockt und dort zwangseingewiesen. Der kranke Komponist durchschaute schnell seine Lage als \"Gefangener\" und seine Einstufung als \"Wahnsinniger\" und schrieb verzweifelte und herzzerreißende Briefe an Freunde und Verwandte, in denen er um Hilfe bat."
 elgar.513.g: "Vielleicht ist das auch besser so."
 elgar.513.h: "Holen Sie ihn aus dem Irrenhaus und lassen Sie ihn in Bergamo ausruhen."
 elgar.514.f: "Es dauerte ganze 17 Monate, bis Donizetti aus der Irrenanstalt gerettet werden konnte. Eine geplante Ausreise wurde von Ärzten, aber auch vom Polizeipräfekten von Paris aus unerfindlichen Gründen verhindert. Nur mit Hilfe von diplomatischem Druck konnte der inzwischen völlig apathische Komponist von seinem Bruder Francesco und seinem Neffen Andrea zurückgeholt werden. Die Tochter der Baronin Rosa Rota-Basoni spielte täglich für den Komponisten Klavier und sang Arien aus seinen Werken, sein Freund Dolci sprach mit ihm im bergamaskischen Dialekt und der Tenor Rubini besuchte ihn, aber Donizetti zeigte keine Reaktionen mehr. Donizetti starb eine Woche nach einem Schlaganfall mit halbseitiger Lähmung, hohem Fieber und anschließenden Infektionen. Die Autopsieergebnisse zeigten Symptome einer \"vergangenen\" Meningitis und ein teilweise beschädigtes, entzündetes Rückenmark."
 elgar.514.g: "Ein tragischer Tod."
 elgar.515.t: "Donizetti geheilt"
 elgar.515.d: "Der Komponist hat sich nach einer Intensivkur erholt und will mit neuer Lebensfreude komponieren."
 elgar.515.f: "Auf Druck unserer Regierung wurde Donizetti schnell aus der Irrenanstalt entlassen. Auf ärztliche Anweisung sollte er in seiner Heimatstadt Bergamo eine mehrmonatige Kur unter den bestmöglichen Bedingungen erleben. Die Rückkehr zum Landleben, die Freiheit von Stress und Druck und die Rückbesinnung auf seine Wurzeln trugen nach vielen Monaten Früchte. Donizetti, wochenlang apathisch, reagierte auf eine seiner eigenen Arien, gesungen von Giovanna, der Tochter der Baronin Rosa Rota-Basoni. Auch die Gespräche mit Familienmitgliedern im lokalen Dialekt zeigten von Tag zu Tag Fortschritte. Nach jahrelanger Therapie scheint der einst todkranke Komponist wieder zum Leben erweckt worden zu sein."
 elgar.515.g: "Ein medizinisches Wunder."
 elgar.516.t: "Liszt versus Thalberg"
 elgar.516.d: "Zwei der berühmtesten Pianisten traten in Paris gegeneinander an: Franz Liszt forderte den bedeutendsten lebenden Pianisten, Sigismund Thalberg, heraus."
 elgar.516.f: "Im Winter 1835/36 gab Sigismund Thalberg sein Debüt in einem Privatkonzert des Sekretärs der österreichischen Botschaft in Paris. Er wird von den anwesenden Künstlern, darunter Rossini und Meyerbeer, enthusiastisch begrüßt und als Erfinder eines neuen Klavierstils gepriesen. Während die Konzerte von Franz Liszt in Lyon etwa 500-600 Francs einbrachten, verdiente Thalberg mit einem einzigen Konzert im Italienischen Theater 10.000 Francs. Bevor Thalberg bei seinem zweiten Aufenthalt in Paris auftrat, veröffentlichte Liszt eine Rezension voller Anspielungen und Polemik. Laut Liszt ist Thalbergs Erfolg nur durch Propaganda zustande gekommen. Ab Februar 1837 trat Thalberg erneut in Paris auf und wurde erneut gefeiert. Am 31. März traten beide Künstler bei einer Wohltätigkeitsveranstaltung der Prinzessin Belgiojoso auf."
 elgar.516.g: "Thalberg war besser."
 elgar.516.h: "Liszt war besser."
 elgar.517.t: "Von der Wiege zum Grabe"
 elgar.517.d: "In Rom vollendet Franz Liszt seine letzte symphonische Dichtung. Die Musikwelt weiß nicht, was sie von diesem letzten \"Fehler\" des Komponisten halten soll."
 elgar.517.f: "In seinen letzten Lebensjahren wandte sich Liszt zunehmend der Kirchenmusik zu. Seine letzte Tondichtung \"Von der Wiege bis zur Bahre\" unterscheidet sich daher von allen seinen Vorgängern. Liszt ließ sich von einer Zeichnung des ungarischen Malers Mihály Zichy inspirieren. Große Teile des Werks kommen ohne ein starkes Orchester aus, vor allem der Anfang klingt kammermusikalisch; es bilden sich viele Klanginseln, in denen das musikalische Material dürftig ist, und solistische Passagen sind vor allem am Ende der Sätze keine Seltenheit. Auch die verwendete Harmonik ist ein Vorbote der kommenden Zeiten. Zu seinen Lebzeiten stuften die Musikkritiker das Werk jedoch als \"Fehler eines alten Mannes\" ein."
 elgar.517.g: "Spätere Generationen werden das verstehen."
 elgar.518.t: "Lohengrin"
 elgar.518.d: "Die Uraufführung von Richard Wagners \"Lohengrin\" war nicht nur rappelvoll, sondern löste in Deutschland eine regelrechte Wagner-Verehrung aus."
 elgar.518.f: "Lohengrin ist eine romantische Oper in drei Akten des deutschen Komponisten Richard Wagner. Mit Lohengrin schuf Wagner die neue Opernform des durchkomponierten Musikdramas. Die Komposition ist nicht in einzelne Nummern unterteilt, sondern wird Akt für Akt ohne Unterbrechung durchgespielt. Damit setzt sich Wagner von der herkömmlichen Struktur der Nummernopern mit Arien, Rezitativen und Chorpartien ab. Um das Innenleben der Bühnenfiguren in klar lesbare musikalische Motive übersetzen zu können, verwendete Wagner Leitmotive (z. B. das Gralsmotiv und das Frage-Bann-Motiv). Die Oper hat andere Kunstwerke inspiriert. König Ludwig II. von Bayern benannte sein Schloss Neuschwanstein nach dem Schwanenritter."
 elgar.518.g: "Inspirierend."
 elgar.519.t: "Kunstwerk der Zukunft"
 elgar.519.d: "Während seines Aufenthalts in der Schweiz schrieb der Komponist Richard Wagner zahlreiche Abhandlungen über Musik und Kunst, die für das deutsche und internationale Verständnis von Ästhetik wegweisend wurden."
 elgar.519.f: "Das \"Kunstwerk der Zukunft\" ist eine kunsttheoretische Schrift Richard Wagners, die er zwischen 1849 und 1852 in Zürich verfasste. Wie in seiner Schrift \"Die Kunst und die Revolution\" beklagt Wagner den Verfall der Künste und entwickelt sein Modell der neuen Einheit der Künste, des \"Gesamtkunstwerks\". Wie in seinen früheren Schriften entwickelt Wagner seine Überzeugung, dass die griechische Kunst in die griechische Religion und Mystik eingebettet sei und dass durch die Zerstörung der Religion auch die Kunst ihren Zusammenhalt verliere und zu \"Einzelkünsten\" (Drama, Musik und Tanz) degenerieren müsse. Er beklagt, dass die Kunst der Musik als reine Begleitung des Wortes verdorrt sei. Im weiteren Verlauf seiner Ausführungen geht er sehr ausführlich auf die Entwicklung der verschiedenen Künste ein, vom Idealzustand in der Antike bis zur Dekadenz seiner Zeit. In seinem nächsten und wichtigsten schriftlichen Werk, Oper und Drama, erklärt Richard Wagner dann sehr genau (und sehr theoretisch), wie er sich die optimale \"Vereinigung\" von Musik und Dichtung vorstellt. Wenig später machte er sich an die \"praktische\" Umsetzung und schrieb und komponierte in jahrelanger Arbeit seinen \"Ring des Nibelungen\" als das Musikdrama schlechthin."
 elgar.519.g: "Wer soll diesen pseudogeologischen Unsinn glauben?"
 elgar.520.t: "Tristan und Isolde"
 elgar.520.d: "Tristan und Isolde ist eine Oper in drei Akten von Richard Wagner nach einem deutschen Libretto des Komponisten, das weitgehend auf dem Roman Tristan und Iseult von Gottfried von Straßburg aus dem 12. Die Oper hatte großen Einfluss auf die westliche Klassik und inspirierte Komponisten wie Gustav Mahler, Richard Strauss, Alban Berg, Arnold Schoenberg und Benjamin Britten direkt. Andere Komponisten wie Claude Debussy, Maurice Ravel und Igor Strawinsky formulierten ihren Stil im Gegensatz zu Wagners musikalischem Erbe. Viele sehen den Tristan als einen Meilenstein auf dem Weg weg von der üblichen Harmonie und Tonalität und sind der Ansicht, dass er den Grundstein für die Richtung der klassischen Musik im 20 Jahrhundert."
 elgar.520.f: "\"Das Werk, das immer meine größte Bewunderung erregt hat, ist Tristan. Ein schauderndes Erstaunen ergreift mich vor diesem gigantischen Bauwerk, und es erscheint mir immer noch unglaublich, wie ein Mensch es konzipieren und realisieren konnte. Ich halte den zweiten Akt für eine der erhabensten Schöpfungen des Geistes, die je geschaffen wurden. Dieser zweite Akt ist wunderbar, wunderbar, unaussprechlich wunderbar.\" - Giuseppe Verdi"
 elgar.521.t: "Richard Wagner Festival"
 elgar.521.d: "Die Gründung des Festspielhauses von Richard Wganer gilt als einer der Höhepunkte der Musikkultur des 19. Jahrhunderts."
 elgar.521.f: "Die Bayreuther Festspiele sind ein jährlich stattfindendes Musikfestival, bei dem Opern des deutschen Komponisten Richard Wagner aus dem 19. Jahrhundert aufgeführt werden. Wagner selbst konzipierte und förderte die Idee eines besonderen Festivals, um seine eigenen Werke, insbesondere seinen monumentalen Zyklus \"Der Ring des Nibelungen\" und \"Parsifal\", zu präsentieren. Die Aufführungen finden in einem eigens dafür eingerichteten Theater, dem Bayreuther Festspielhaus, statt. Wagner persönlich überwachte die Planung und den Bau des Theaters, das viele architektonische Innovationen enthielt, um die riesigen Orchester, für die Wagner schrieb, sowie die besonderen Vorstellungen des Komponisten von der Aufführung seiner Werke unterzubringen. Die Festspiele sind zu einer Pilgerstätte für Wagnerianer und Liebhaber der klassischen Musik geworden. Bei diesem einzigartigen Musikereignis waren Kaiser Wilhelm, Dom Pedro II. von Brasilien, König Ludwig und andere Mitglieder des Adels ebenso anwesend wie der Philosoph Friedrich Nietzsche und so bedeutende Komponisten wie Anton Bruckner, Edvard Grieg, Pjotr Tschaikowski, Franz Liszt und der junge Arthur Foote."
 elgar.521.g: "Ein Höhepunkt der deutschen Kultur!"
 elgar.523.t: "Tannhäuser-Skandal"
 elgar.523.d: "Eine Aufführung von Richard Wagners Tannhäuser löste einen echten Skandal aus, der die gesamte Pariser Gesellschaft empörte. Neben Wagners Verstoß gegen die guten Regeln des französischen Opernlebens spielte auch die Feindseligkeit zwischen der deutschen und der französischen Musikwelt eine Rolle."
 elgar.523.f: "Wagner hatte es in Paris schon immer schwer, nicht nur wegen seiner Konkurrenz mit dem populären Giacomo Meyerbeer. Um seine Oper Tannhäuser in der Grand Opéra unterbringen zu können, musste er sich den französischen Gepflogenheiten beugen - etwa dem Einbau eines Balletts. Doch Wagner wehrte sich vehement gegen die Vorgaben und baute lediglich ein Bacchanal ein. Zugleich machte sich Wagner mit quälend langen Proben bei den Musikern unbeliebt. Die Uraufführung sorgte für einen Skandal: Die Herren des Pariser \"Jockey Club\" fühlten sich betrogen, als das Ballett nach der Ouvertüre nicht erschien. Die Herren waren nicht wegen der Musik gekommen, sondern um die schönen Frauen zu sehen und sie später in der Garderobe zu besuchen. Da sie nicht bekamen, was sie wollten, sabotierten sie die Veranstaltung mit Pfiffen und Rufen. Am nächsten Tag war es nicht besser: Die Pariser Presse zerriss die Aufführung in der Luft. Nicht nur Frankreich, sondern auch Wagners Freunde und Feinde in Deutschland werden unsere Reaktion genau beobachten."
 elgar.523.g: "Er sollte nie wieder in Paris auftauchen!"
 elgar.523.h: "Wir müssen Herrn Wagner besänftigen."
 elgar.524.t: "Holberg-Suite"
 elgar.524.d: "Edvard Griegs Holberg-Suite, die in Oslo uraufgeführt wurde, hat sich nicht nur als musikalisches Meisterwerk erwiesen, sondern auch das norwegische Nationalgefühl inspiriert."
 elgar.524.f: "Die Holberg-Suite mit dem Untertitel \"Suite im alten Stil\" ist eine fünfsätzige Suite, die auf Tanzformen des 18. Jahrhunderts basiert und von Edvard Grieg 1884 zur Feier des 200. Geburtstags des dänisch-norwegischen Dramatikers Ludvig Holberg (1684-1754) geschrieben wurde. Sie ist ein Beispiel für die Musik des 19. Jahrhunderts, die sich der musikalischen Stile und Formen des vorangegangenen Jahrhunderts bedient. Die Holberg-Suite war ursprünglich für Klavier komponiert worden, wurde aber ein Jahr später von Grieg selbst für Streichorchester bearbeitet. Die Suite besteht aus einer Einleitung und einer Reihe von Tänzen. Sie ist ein früher Versuch des Neoklassizismus, ein Versuch, so viel wie zu Griegs Zeit bekannt war, an die Musik von Holbergs Zeit anzuknüpfen. Obwohl sie nicht so berühmt ist wie Griegs Begleitmusik zu Peer Gynt, die in der Regel in zwei Suiten aufgeführt wird, halten viele Kritiker die Werke für gleichwertig."
 elgar.525.t: "Neue Fahrspuren"
 elgar.525.d: "Im \"Neuen Magazin für Musik\" erwähnte Robert Schumann einen neuen Künstler, der plötzlich über Nacht berühmt wurde. Sein Name ist Johannes Brahms, und er machte sowohl auf Schumann als auch auf seine Frau Clara großen Eindruck."
 elgar.525.f: "\"Und er ist gekommen, junges Blut, an dessen Wiege Gnaden und Helden gewacht haben. Er heißt Johannes Brahms, kam aus Hamburg, wirkte dort in dunkler Stille, wurde aber von einem vortrefflichen und begeisterten Lehrer in schwierigen Kunstsätzen unterrichtet, mir kurz vorher von einem verehrten, bekannten Meister empfohlen. Auch äußerlich trug er alle Zeichen, die uns ankündigen: Er ist ein berufener Mann.\" - Robert Schumann"
 elgar.525.g: "Wir erwarten große Dinge von Herrn Brahms."
 elgar.526.t: "Gesang der Parzen"
 elgar.526.d: "Johannes Brahms' \"Schicksalslied\" wurde in Basel uraufgeführt. Neben Wien war die Schweiz einer der wichtigsten Aufenthaltsorte von Brahms."
 elgar.526.f: "Der Gesang der Parzen ist die letzte Komposition für Chor und Orchester von Johannes Brahms. Mehr als 10 Jahre nach der Kantate Rinaldo op. 50 und der Alt-Rhapsodie op. 53, verwendete Brahms erneut einen Text von Johann Wolfgang von Goethe. Laut Max Kalbeck wurde Brahms durch die Schauspielerin Charlotte Wolter, die am Wiener Burgtheater in der Rolle der Iphigenie auftrat, zur Komposition angeregt. Am 13. Juni 1896 schrieb Brahms über das Stück: 'Ich höre oft über die sechste Strophe des Parzenliedes philosophieren. Ich denke, das Herz des ahnungslosen Zuhörers sollte schon beim Eintritt des Majors weich und das Auge feucht werden; erst dann ergreift ihn das Elend der Menschheit\"."
 elgar.526.g: "Es ist ebenso wunderbar wie verstörend."
 elgar.527.t: "Ein komponierender Orangenplantagenbesitzer"
 elgar.527.d: "Der Sohn des bekannten Wollunternehmers Julius Delius nahm Unterricht bei einem Organisten und veröffentlichte einige seiner ersten Kompositionen."
 elgar.527.f: "Frederick Delius, ein geborener Engländer, war der Sohn des deutschen Wollunternehmers Julius Delius. Der Vater wollte, dass sein Sohn die Nachfolge in der Firma antritt, aber der Sohn kümmerte sich wenig um die Geschäfte in Europa und interessierte sich mehr für Kunst und Musik. Deshalb siedelte Delius jr. auf eine Orangenplantage in Florida über, um ihn von den Einflüssen der europäischen Metropolen fernzuhalten. Doch gerade dieser Umzug sollte für sein späteres musikalisches Schaffen von herausragender Bedeutung sein. In Jacksonville lernte Delius den katholischen Organisten Thomas Ward kennen, von dem Delius sagt, er sei der einzige gewesen, der ihn wirklich etwas gelehrt habe. Wenig später sollte Delius in Danville, Virginia, seine ersten Kompositionen veröffentlichen."
 elgar.527.g: "Was sollte aus diesem Taugenichts werden?"
 elgar.528.t: "Ein Österreicher in New York"
 elgar.528.d: "Nach Auseinandersetzungen in seiner österreichischen Heimat fand Gustav Mahler in New York ein Publikum, bei dem seine Werke sehr gut ankamen. Einige der Verantwortlichen in der amerikanischen Musikwelt würden ihn gerne langfristig engagieren."
 elgar.528.f: "Für manche war das deutsche Wams zu eng, als sie den Namen Mahler hörten. Manche aus Aufregung, die meisten aber aus Wut. So war es vom ersten Tag an. Er wirkte sofort, aufrüttelnd, provozierend, beunruhigend - egal: er gehört zu den elektrischen und elektrisierenden Naturen, die bei der kleinsten Berührung Funken sprühen oder sich entzünden. Am Anfang machte ihn natürlich nur seine frenetische Unbeliebtheit populär. Getragen von der Gunst des Hasses, sorgfältig beleuchtet vom Neid, diesem ewig schlaflosen und mächtigen Beschützer alles Wirklichen, von Spott, Neid und Verleumdung, verkündet von den lautesten Tonträgern an jeder Straßenecke, ist er berühmt geworden. (...) Und so hörte man jeden Tag, dass er seine Musiker misshandelt, sie zu unmenschlicher Arbeit peitscht, sie fast zum Tode anstachelt, und dass sie alle ihn am liebsten in einem Löffel Wasser ertränken würden, wenn sie nur könnten. Es hieß, er habe seine Sänger gekürzt, sie wie Rekruten gedrillt, mit ihnen gespielt wie der Großtürke mit seinen Sklaven. (...) Die Intensität seines Wesens schien die ganze Stadt New York zu erfüllen. - Felix Salten"
 elgar.528.g: "Was für ein seltsamer Kerl."
 elgar.528.h: "Mahler sollte in Amerika bleiben."
 elgar.529.t: "Skythische Suite"
 elgar.529.d: "Sergej Prokofjew, eines der vielversprechendsten jungen Talente der russischen Musik, schockierte heute das Publikum mit einem skandalösen Auftritt."
 elgar.529.f: "Prokofjew schrieb die Musik ursprünglich für das Ballett Ala i Lolli, dessen Geschichte bei den Skythen spielt. Das Ballett wurde von Sergej Diaghilew in Auftrag gegeben und nach einem Szenario des russischen Dichters Sergej Gorodetskij geschrieben. Als Diaghilew die Partitur jedoch noch vor ihrer Fertigstellung ablehnte, überarbeitete der Komponist die Musik zu einer Suite für eine konzertante Aufführung. Die Aufführung wurde zum größten Skandal in der Geschichte von Prokofjews Uraufführungen. Der damalige Direktor des Konservatoriums, Alexander Glasunow, verließ während des Konzerts den Saal, die Mehrheit des Publikums war empört und die Kritiken waren vernichtend. Prokofjew zeigte sich jedoch wenig beeindruckt und schrieb am nächsten Tag lapidar nach Moskau, dass die Aufführung \"mit einem richtigen Krach\" über die Bühne gegangen sei."
 elgar.529.g: "Ein Meisterwerk!"
 elgar.529.h: "Ekelerregend."
 elgar.530.t: "Die rheinische Sinfonie"
 elgar.530.d: "Robert Schumann nahm eine Stelle in Düsseldorf am Rhein an und wurde durch die Bauarbeiten am Kölner Dom plötzlich zu einem neuen Werk inspiriert."
 elgar.530.f: "Robert Schumann gilt als einer der repräsentativsten Komponisten der Romantik. Im Jahr 1850 trat er die Nachfolge von Ferdinand Hiller als Musikdirektor an und zog nach Düsseldorf. Obwohl er wegen seiner mangelhaften Dirigierfähigkeiten kritisiert und wegen seines \"kreativen Verfalls\" verspottet wurde, komponierte Schumann seine letzte Sinfonie, die \"Rheinische\". Er nahm sich Beethovens und Mendelssohns Sinfonien zum Vorbild, ließ sich aber auch von seinen Eindrücken aus dem Rheinland inspirieren. Schumann selbst gab an, dass seine Reise nach Köln und der Anblick des Doms seine Hauptinspiration für diese Komposition waren, die zu einem seiner berühmtesten Werke wurde."
 elgar.530.g: "Es war doch eine gute Idee, den Bau der Kathedrale fortzusetzen, oder nicht?"
 elgar.531.t: "Schumanns Selbstmordversuch"
 elgar.531.d: "Der Komponist Robert Schumann wurde heute in letzter Minute aus dem Fluss gerettet - er hatte sich offenbar in geistiger Verwirrung das Leben nehmen wollen. Es ist noch völlig unklar, wie mit ihm umgegangen werden soll."
 elgar.531.f: "Am 10. Februar 1854 verschlimmerte sich Schumanns psychisches Leiden dramatisch. Er klagte vor allem über \"Hörprobleme\". Töne, Akkorde, ganze Musikstücke wüteten in seinem Kopf und raubten ihm den Schlaf. Schumann wurde inzwischen Tag und Nacht von seiner Frau und seinen Kindern bewacht und stand bereits unter ärztlicher Aufsicht, konnte aber dennoch am 27. Februar 1854 in einem unbeobachteten Moment die Wohnung verlassen. Er begab sich zur nahe gelegenen Pontonbrücke, kletterte über das Geländer und stürzte sich, nachdem er seinen Ehering ins Wasser geworfen hatte, in den Fluss. Er wurde vom Brückenmeister und anderen Unbekannten gerettet, nach Hause gebracht und von einem herbeigerufenen Arzt betreut. Nach seinem Selbstmordversuch wünschte er die Aufnahme in die 1844 von dem Psychiater Franz Richarz eröffnete Heil- und Pflegeanstalt für Geisteskranke und Wahnsinnige in Endenich bei Bonn."
 elgar.531.g: "Es gibt nichts was wir tun können."
 elgar.531.h: "Schicken Sie ihn in die moderne Nervenheilanstalt bei Endenich."
 elgar.532.t: "Der Tod von Schumann"
 elgar.532.d: "Robert Schumann, einst ein vielversprechendes musikalisches Talent, starb nach mehreren Jahren der geistigen Umnachtung in einer Nervenheilanstalt, von der Welt ignoriert."
 elgar.532.f: "Brahms sah Schumann am 31. März und am 19. August 1854, ohne mit ihm sprechen zu können. Am 11. Januar, 23. Februar und 2. April 1855 konnten beide jedoch ausführlich miteinander sprechen. Schumann ging es so gut, dass er mit Brahms auf dem Tafelklavier musizieren und ihn unter Aufsicht eines Wächters einen Teil des Weges zum Bonner Bahnhof begleiten konnte. Am 10. April 1856 fand Brahms Schumann in einem prekären Zustand vor. Schumann konnte nicht mehr verständlich sprechen. Am 1. Mai 1856 wurde in den Krankenakten letztmals erwähnt, dass Schumann Klavier spielte. Die meiste Zeit konnte er sich kaum noch verständlich ausdrücken. Clara Schumanns Plan vom April 1856, Schumann nach Düsseldorf zu bringen und ihn dort selbst zu pflegen, wurde nicht verwirklicht. Ab Mitte Juli 1856 aß Schumann immer weniger. Am 26. Juli 1856 hatte er \"Zuckungen in verschiedenen Muskeln, im Gesicht und in den Gliedern\". Schleimige Rasselgeräusche deuten auf eine Lungenentzündung hin. Robert Schumann starb am 29. Juli; niemand war anwesend."
 elgar.533.t: "Die wundersame Genesung von Robert Schumann"
 elgar.533.d: "Offenbar haben die modernen Methoden im Sanatorium Endenich Wirkung gezeigt. Schumann zeigt Anzeichen der Besserung, auch wenn seine Rückkehr zur Arbeit noch einige Monate dauern wird."
 elgar.533.f: "Schumanns wundersame Genesung begann, nachdem er Peters im September 1854, kurz vor ihrem 14. Hochzeitstag, erzählt hatte, Düsseldorf sei zusammengebrochen und Clara und die Kinder seien tot. Um diese Wahnvorstellung zu zerstreuen, bat Peters Clara Schumann um einen Brief an ihren Mann. So kam es zum ersten Briefwechsel seit der Aufnahme. Von nun an nahm Schumann wieder aktiv am Leben außerhalb der Anstalt teil. Er korrespondiert auch mit seinen Kindern, Johannes Brahms, Joseph Joachim und mit Verlegern. Zwischen September 1854 und Mai 1855 schrieb er etwa 25 Briefe. In dieser Zeit äußerte Schumann oft den Wunsch, Endenich wieder verlassen zu können. Hin und wieder spielte er Klavier. Er studierte Kompositionen von Brahms. Am 11. Januar 1855 erhielt er seinen ersten Besuch von Johannes Brahms. Von da an verbesserte sich Schumanns Zustand stetig, bis die Ärzte Clara Schumann erlaubten, ihn zu besuchen. Mit ihrer und Brahms' Unterstützung begann Schumann bald wieder zu komponieren - und setzte damit einen Selbstheilungsprozess in Gang."
 elgar.533.g: "Aber wie ist das möglich?"
 elgar.534.t: "Tango"
 elgar.534.d: "Der Tango-Interpret Carlos Gardel hat mit Mi noche triste seinen ersten Plattenhit aufgenommen."
 elgar.534.f: "Carlos Gardel war die bedeutendste Figur in der Geschichte des Tangos. Er war einer der einflussreichsten Interpreten der populären Weltmusik in der ersten Hälfte des 20. Jahrhunderts. Gardel ist der berühmteste populäre Tangosänger aller Zeiten und wird in der ganzen Welt anerkannt. Mit seiner Interpretation von Pascual Contursis und Samuel Castriotas \"Mi noche triste\" schuf er 1917 den Tango-Canción. Mit \"Mi noche triste\" war die Geburtsstunde des sentimentalen Tangos gekommen. Nostalgisch, melodramatisch und traurig, verkörperten die neuen Texte und die Musik Buenos Aires und seine Menschen."
 elgar.534.g: "Der Siegeszug der argentinischen Musik."
 elgar.601.t: "Der Tod von [SCOPE.sCharacter('elgar_composer_scope').GetLastName]"
 elgar.601.d: "[SCOPE.sCharacter('elgar_composer_scope').GetFullName], einer der größten künstlerischen Köpfe unseres Landes und ein funkelnder Stern am musikalischen Firmament, ist heute gestorben. Er hinterlässt eine Lücke, die kaum zu schließen ist."
 elgar.601.g: "Ein Titan der Musikgeschichte hat uns verlassen."
 elgar.603.t: "Rossini verlässt Bologna"
 elgar.603.d: "Rossini hat beschlossen, Bologna zu verlassen. Diese Nachricht kam nicht nur für die Einwohner der Stadt überraschend, sondern hat auch das ganze Land traurig gemacht."
 elgar.603.f: "Als Gioacchino Rossini beschloss, Bologna und damit den Kirchenstaat zu verlassen, waren seit seinem Rückzug von der Opernbühne rund 20 Jahre vergangen. Dennoch war Rossini immer noch eine hoch angesehene Persönlichkeit und einer der beliebtesten Komponisten Italiens. Ein Hauptgrund, warum Rossini - nach einem Zwischenspiel in Florenz - wieder nach Paris zog, dürfte nicht zuletzt seine Gesundheit gewesen sein. In seinen letzten Lebensjahren als europäischer Musikstar hatte er sich körperlich und geistig bereits verschlechtert. Paris versprach eine bessere medizinische Versorgung, weshalb Rossini daran dachte, seinen Lebensabend dort zu verbringen."
 elgar.603.g: "Aber er hat seine Tortellini nicht aufgegessen!"
 elgar.609.d: "Franz Lachner hat heute seinen Rücktritt vom Dirigentenpult bekannt gegeben. Er sieht keine Zukunft mehr für seine Karriere."
 elgar.609.f: "Eine ganze Reihe von Umständen führte zu Franz Lachners vorzeitigem Ausscheiden aus der Musikwelt. Ausschlaggebend dafür war die neue Musik Richard Wagners und der Siegeszug seiner Verbündeten. Lachner, der Schubert und Beethoven gekannt hatte, konnte und wollte dieser Entwicklung nicht folgen. Ähnlich wie Rossini, der begriff, dass er als Relikt einer anderen Zeit angesehen wurde, während die Welt sich weiterentwickelt hatte, zog sich Lachner zurück, nicht zuletzt wegen des Spottes und der Häme der Wagner-treuen Kritiker."
 elgar.609.g: "Ein Verlust für [GetPlayer.GetAltName('AKK')]."
 elgar.613.f: "Gaetano Donizetti ist heute Morgen nach einem langen und erfüllten Leben in den Armen seiner zweiten Frau und umgeben von seinen Söhnen friedlich verstorben. Ein Trauerzug mit mehreren Musikkapellen, Hunderten von Fackelträgern und Tausenden von Zuschauern markiert den Abschied von einem Mann, von dem es heißt, er habe ein perfektes Leben geführt."
 elgar.614.f: "Im Jahr 1867 erhielt Berlioz die Nachricht, dass sein Sohn in Havanna an Gelbfieber gestorben war. Macdonald vermutet, dass Berlioz sich von seiner Trauer ablenken wollte, indem er eine Reihe von Konzerten in St. Petersburg und Moskau gab, aber diese Reise verjüngte ihn nicht, sondern zehrte an seinen Kräften. Er begab sich nach Nizza, um sich im mediterranen Klima zu erholen, stürzte jedoch am Ufer auf Felsen, möglicherweise aufgrund eines Schlaganfalls, und musste nach Paris zurückkehren, wo er sich mehrere Monate lang erholte. Im August 1868 fühlte er sich in der Lage, kurz nach Grenoble zu reisen, um ein Chorfestival zu beurteilen. Nach seiner Rückkehr nach Paris wurde er immer schwächer und starb am 8. März 1869 in seinem Haus in der Rue de Calais im Alter von 65 Jahren. Er wurde auf dem Friedhof von Montmartre zusammen mit seinen beiden Ehefrauen beigesetzt, die exhumiert und neben ihm beigesetzt wurden."
 elgar.615.f: "Nach der gescheiterten Ehe mit Carolyne zu Sayn-Wittgenstein widmete sich Liszt verstärkt Kompositionen mit religiösen Themen. In Rom, wo er sich bis 1870 überwiegend aufhielt, führte er ein teils weltliches, teils klösterliches Leben und zog sich im Sommer 1863 in ein Kloster zurück, wo ihn auch Papst Pius IX. besuchte. Im Jahr 1865 unterzog sich Liszt der Tonsur und erhielt die vier kleinen Orden. Von nun an trug er als Kleriker den römischen Kragen und wurde als Abbé angesprochen. Im Jahr 1886 besuchte Liszt die Wagner-Festspiele. Zum Zeitpunkt der Reise war Liszt bereits schwer erkrankt und starb wenige Tage nach seiner Ankunft am 31. Juli 1886 an den Folgen einer Lungenentzündung. Bernhard Schnappauf, Arzt und Freund Richard Wagners, verbrachte die letzten Tage an seinem Sterbebett und berichtete, Liszt sei ruhig und würdevoll gestorben. Er schloss die Augen und machte die Totenmaske, wofür ihm nach altem Brauch das Leichentuch und der Kissenbezug zustanden."
 elgar.616.f: "Am 16. September 1882 reiste Wagner mit seiner Familie nach Venedig, wo er mehrere Wochen mit Franz Liszt verbrachte. Am 25. Dezember gab er als Geburtstagsgeschenk für Cosima zum letzten Mal ein gemeinsames Konzert im Teatro La Fenice; er dirigierte seine Jugendsinfonie in C-Dur. Am 13. Februar 1883 hielt er sich im Seitenflügel des Palazzo Vendramin-Calergi auf, in dem er mit seiner Familie wohnte. Gegen 15 Uhr wartete die Familie am Tisch auf Wagner, der trotz eines Herzinfarkts in seinem Arbeitszimmer an einem Aufsatz über das Weibliche im Menschen schrieb. Das Dienstmädchen fand ihn an seinem Schreibtisch zusammengesunken über den Worten 'Der Emanzipationsprozess des Weibes verläuft jedoch nur mit ekstatischen Zuckungen. Liebe - Tragödie'. Er sagte: 'Meine Frau und der Arzt', bevor er bewusstlos wurde und gegen 15:30 Uhr in Cosimas Armen starb."
 elgar.617.f: "Edvard Grieg starb am 4. September 1907 im Alter von 64 Jahren an Herzversagen im Städtischen Krankenhaus in Bergen, Norwegen. Er hatte eine lange Krankheit hinter sich. Seine letzten Worte waren: \"Nun, wenn es denn sein muss\". Zu seiner Beerdigung kamen zwischen 30 000 und 40 000 Menschen in die Straßen seiner Heimatstadt, um ihn zu ehren. Auf seinen Wunsch hin wurde sein eigener Trauermarsch zum Gedenken an Rikard Nordraak gespielt, orchestriert von seinem Freund Johan Halvorsen, der Griegs Nichte geheiratet hatte. Außerdem wurde der Trauermarschsatz aus Chopins Klaviersonate Nr. 2 gespielt. Grieg wurde im ersten norwegischen Krematorium, das noch im selben Jahr in Bergen eröffnet wurde, eingeäschert, und seine Asche wurde in einer Berggruft in der Nähe seines Hauses in Troldhaugen beigesetzt. Nach dem Tod seiner Frau wurde ihre Asche neben seiner beigesetzt."
 elgar.618.f: "Brahms starb am 3. April 1897 in den frühen Morgenstunden im Alter von 63 Jahren in seiner Wohnung in der Karlsgasse 4, wo er seit 1872 lebte - nach einigen Biographien an Leberkrebs, nach neueren Angaben an einem Bauchspeicheldrüsenkrebs. Seinen letzten öffentlichen Auftritt hatte er am 7. März 1897, als er Hans Richter seine Symphonie Nr. 4 dirigieren sah; nach jedem der vier Sätze gab es eine Ovation. Nach der Aufbahrung im Trauerhaus, wo Carl Kundmann ihm die Totenmaske abnahm und Ludwig Michalek ein letztes Pastellbild anfertigte, fand am 6. April die Einsegnung in der evangelischen Stadtkirche statt."
 elgar.619.f: "\"Morgen und Wien. Ein Chaos. Man klammert sich an Details, die noch niemand wissen kann. Er soll auf dem kleinen Friedhof in Grinzing begraben werden, neben seiner kleinen Tochter. Der Leichnam wird gebracht. Am anderen Morgen. Die Straße \"an den Langen Lüssen\" führt über Land zu Zypressen. Die Kapelle ist ein kleiner Raum, nur für den Sarg und einige Kränze. Die anderen säumen die Wege zum Grab. Eine Frau kommt vorbei und sagt zu einer anderen: \"Jetzt ist er drinnen in Frieden. Alles war zu klein für ihn.\" Die Kirche in Grinzing ist klein, der Kirchhof schmal. Und ein Spektakel für die Wienerinnen und Wiener steht bevor. Die Kirche und der Friedhof werden abgesperrt sein. Nur mit Karten hat man Zutritt. Wir erfahren, dass Franz Schalk, Gregor und das Direktorium darum gebeten haben, dass die Oper am Tag des Begräbnisses geschlossen bleibt. Kein Wort darüber. Der Hof, die Gemeinde Wien, rührt sich nicht. Und dann die Feier. Wir stehen vor der Kirche, als der Sarg hinausgetragen wird. Es regnet. Über einen Weinbergsweg kommen wir schneller zum Grab. Die Prozession kommt an. Der Regen hört auf. Eine Nachtigall singt, die Schollen fallen. Ein Regenbogen. Und die Hunderte sind still.\" - Paul Stefan"
 elgar.701.g: "Das war eine wunderbare Vorstellung."
 elgar.701.h: "Stellen Sie diesen brillanten Mann ein!"
 elgar.706.g: "Ist er mit seinen 20 Jahren nicht ein bisschen zu jung für eine solche Aufgabe?"
 elgar.701.t: "Große Trauer- und Triumphsymphonie"
 elgar.701.d: "Zum zehnten Jahrestag der Julirevolution komponierte Hector Berlioz ein Stück, das in der Öffentlichkeit große Bewunderung fand."
 elgar.701.f: "Die französische Regierung gab die Sinfonie für die Feierlichkeiten zum zehnten Jahrestag der Julirevolution in Auftrag, die Louis-Philippe I. an die Macht gebracht hatte, und errichtete zu diesem Anlass die Juli-Säule auf der Place de la Bastille. Berlioz hatte wenig Sympathie für das Regime, aber er begrüßte die Gelegenheit, das Werk zu schreiben, denn die Regierung hatte ihm 10.000 Francs dafür angeboten. Die Symphonie militaire (später umbenannt in Symphonie funèbre et triomphale) folgt nicht dem Modell, das Berlioz in Romeo und Julia etabliert hatte, sondern stellt eine Rückkehr zu einem früheren, vorbeethovenschen Stil in der Tradition monumentaler öffentlicher französischer Zeremonialmusik dar. Berlioz überarbeitete die Partitur im Januar 1842 und fügte eine optionale Streicherstimme und einen Schlusschor zu einem Text von Antony Deschamps hinzu. Richard Wagner besuchte am 1. Februar 1842 eine Aufführung dieser neuen Fassung im Salle Vivienne. Am 5. Februar teilte er Robert Schumann mit, dass er die Passagen des letzten Satzes von Berlioz' Sinfonie so \"großartig und erhaben\" finde, \"dass sie niemals übertroffen werden können\"."
 elgar.702.t: "Liszt in Weimar"
 elgar.702.d: "Der Klaviervirtuose und Komponist Franz Liszt erwägt nach langjährigen Konzertreisen, sich in Weimar niederzulassen."
 elgar.702.f: "Die Weimarer Jahre waren die künstlerisch produktivste Zeit von Franz Liszt. In Weimar entstanden viele seiner Klavierwerke, wie die Klaviersonate h-Moll, der Zyklus Harmonies poétiques et religieuses, fünfzehn Ungarische Rhapsodien sowie zahlreiche Transkriptionen, Klavierauszüge und Überarbeitungen früherer Klavierwerke, wie die Paganini-Etüden. Auch zwei seiner früher konzipierten Klavierkonzerte erhielten hier ihre endgültige Form. In Weimar dirigierte Liszt viele Werke zeitgenössischer Komponisten, von denen einige damals umstritten waren, und führte auch deren Opern auf. Er dirigierte Werke von Richard Wagner, der ihm besonders nahe stand und dem er im Frühjahr 1849 nach dem Dresdner Aufstand zur Flucht nach Zürich verhalf. In den folgenden Jahren unterstützte er Wagner nicht nur finanziell, sondern auch moralisch und führte einen regen Briefwechsel mit ihm. Später traten Liszt und Wagner oft gemeinsam als Dirigenten auf. Ab 1865, nachdem Wagner ein Verhältnis mit Liszts Tochter Cosima hatte, kühlte sich das Verhältnis für lange Zeit ab."
 elgar.703.t: "Rienzi"
 elgar.703.d: "Ein junger Komponist hat das Dresdner Publikum und internationale Künstler mit seiner Oper \"Rienzi\" beeindruckt. Sein Name ist Richard Wagner."
 elgar.703.f: "\"Keine spätere Erfahrung hat mir auch nur annähernd ähnliche Gefühle vermittelt wie die, die ich an diesem Tag der ersten Aufführung von Rienzi hatte. Die nur zu gut begründete Angst vor dem Erfolg hat meine Gefühle bei allen späteren Uraufführungen meiner Werke so sehr beherrscht, dass ich sie nie wirklich genießen und das Verhalten des Publikums kaum beachten konnte. (...) Der anfängliche Erfolg von Rienzi war zweifellos von vornherein gesichert. Aber die Art und Weise, in der das Publikum seine Vorliebe für mich erklärte, war außerordentlich ... Das Publikum war zwangsläufig geneigt, die Aufführung anzunehmen, denn alle, die mit dem Theater zu tun hatten, verbreiteten so positive Berichte ..., dass die gesamte Bevölkerung sich auf das als Wunder angekündigte Werk freute ... Wenn ich versuche, mich an meinen Zustand an jenem Abend zu erinnern, so kann ich mich nur daran erinnern, dass er alle Züge eines Traums hatte.\" - Richard Wagner"
 elgar.704.t: "Klavierkonzert in a-Moll"
 elgar.704.d: "Ein Klavierkonzert von Edvard Grieg feierte heute in Kopenhagen seine Weltpremiere. Schon jetzt ist absehbar, dass es eines seiner beliebtesten Stücke sein wird."
 elgar.704.f: "Das Klavierkonzert in a-Moll, op. 16, das Edvard Grieg 1868 komponierte, war das einzige Konzert, das Grieg vollendete. Das Werk gehört zu Griegs frühesten bedeutenden Werken. Der 24-jährige Komponist schrieb es 1868 in Søllerød, Dänemark, während eines seiner Aufenthalte dort, um das Klima zu genießen. Griegs Konzert zeugt von seinem Interesse an der norwegischen Volksmusik; die eröffnende Verzierung basiert auf dem Motiv einer fallenden kleinen Sekunde, gefolgt von einer fallenden großen Terz, das typisch für die Volksmusik von Griegs Heimatland ist. Das Werk wurde am 3. April 1869 von Edmund Neupert in Kopenhagen unter der Leitung von Holger Simon Paulli uraufgeführt. Einigen Quellen zufolge war Grieg selbst, ein hervorragender Pianist, als Solist vorgesehen, doch konnte er der Uraufführung nicht beiwohnen, da er Verpflichtungen mit einem Orchester in Christiania (heute Oslo) hatte. An der Uraufführung nahmen unter anderem der dänische Komponist Niels Gade und der russische Pianist Anton Rubinstein teil, der sein Klavier zur Verfügung stellte. Grieg überarbeitete das Werk mindestens sieben Mal, meist auf subtile Art und Weise, aber die Überarbeitungen beliefen sich auf über 300 Abweichungen von der ursprünglichen Orchestrierung."
 elgar.705.t: "Variationen über ein Thema von Haydn"
 elgar.705.d: "Der Komponist Johannes Brahms hat heute ein neues Meisterwerk aufgeführt, erwägt aber gleichzeitig ein dauerhaftes Engagement in Wien."
 elgar.705.f: "Die Variationen über ein Thema von Haydn op. 56a sind ein Variationswerk für Orchester von Johannes Brahms. Entstanden ist das Werk im Sommer 1873 in Tutzing. Die Uraufführung fand am 2. November 1873 in Wien unter Brahms' Leitung statt. Das Stück fällt in eine Epoche, in der Brahms seinen Aufenthalt in Wien feiern wollte. Einerseits hatte er Detmold und Hamburg vor Jahren enttäuscht verlassen. Andererseits strebte er danach, dort zu leben, wo seine großen klassischen Vorbilder gelebt hatten, und die Wiener Tradition fortzusetzen."
 elgar.706.t: "Mahlers erster Auftritt"
 elgar.706.d: "In Bad Hall trat der junge und talentierte Dirigent Gustav Mahler zum ersten Mal die Stelle des Kapellmeisters an. In den folgenden Jahren sollte er die Karriereleiter bis zur Wiener Staatsoper erklimmen"
 elgar.706.f: "\"Und da stand er persönlich im Theaterbüro, als ich von meinem ersten Besuch bei Pollini herauskam: blass, dünn, klein von Statur, langes Gesicht, die steile Stirn von tiefschwarzem Haar umrahmt, große Augen hinter einer Brille, Furchen des Leidens und des Humors in seinem Antlitz, das, während er mit einem anderen sprach, den erstaunlichsten Ausdruckswechsel zeigte, eine ebenso interessante, dämonische, einschüchternde Inkarnation des Kapellmeisters Kreisler, wie sie sich der jugendliche Leser von E.T.A. Hoffmanns Phantasien vorstellen konnte; er fragte mich freundlich nach meinen musikalischen Fähigkeiten und Kenntnissen - worauf ich zu seiner offensichtlichen Zufriedenheit mit einer Mischung aus Schüchternheit und Selbstvertrauen antwortete - und ließ mich in einer Art benommenem und erschüttertem Zustand zurück. (...) Mahler erschien mir in Gesicht und Auftreten als Genie und Dämon (...)\" - Bruno Walter"
 elgar.707.t: "2. Klavierkonzert"
 elgar.707.d: "Nach vielen Rückschlägen hat sich der Komponist Sergej Rachmaninow eindrucksvoll zurückgemeldet: Sein zweites Klavierkonzert sorgte für frenetischen Beifall."
 elgar.707.f: "Nach der katastrophalen Uraufführung seiner Ersten Symphonie 1897 erlitt Rachmaninow einen psychischen Zusammenbruch, der ihn drei Jahre lang am Komponieren hinderte. Obwohl die Depression seine Energie schwächte, trat er weiterhin auf. Dirigieren und Klavierunterricht wurden notwendig, um seine finanzielle Lage zu verbessern. 1899 sollte er in London das zweite Klavierkonzert aufführen, das er wegen seiner Krankheit noch nicht komponiert hatte, und gab stattdessen ein erfolgreiches Debüt als Dirigent. Verwandte beschlossen, ihn dem Neurologen Nikolai Dahl vorzustellen, den er von Januar bis April 1900 täglich besuchte, was ihm half, seine Gesundheit und sein Vertrauen in die Komposition wiederherzustellen. Rachmaninow widmete Dahl das Konzert, weil er ihn erfolgreich behandelt hatte. Nachdem er 1908 sein Londoner Konzertengagement in der Queen's Hall unter Serge Koussevitzky erfüllt hatte, erschien eine schmeichelhafte Rezension der Times: \"Der direkte Ausdruck des Werks, die außerordentliche Präzision und Genauigkeit von Rachmaninoffs Spiel und sogar die strenge Sparsamkeit der Bewegung von Armen und Händen, die er ausübt, trugen alle zum Eindruck der Vollständigkeit der Aufführung bei."
 elgar.708.t: "Symphony No. 1 'Classical\""
 elgar.708.d: "Mit seiner ersten Sinfonie hat sich Sergej Prokofjew einmal mehr als aufstrebender Komponist empfohlen. Andererseits drängt es den jungen Künstler in die Welt hinaus, um besser bezahlt zu werden."
 elgar.708.f: "Die Probe der klassischen Sinfonie mit dem Staatsorchester habe ich selbst dirigiert, und zwar völlig improvisiert, da ich die Partitur vergessen und sie nie aus der Perspektive des Dirigierens studiert hatte. Ich dachte, es könnte ein komplettes Debakel werden, aber es passierte nichts, und außerdem sind in den Stimmen so viele Fehler, dass die Sitzung hauptsächlich dazu diente, Korrekturen vorzunehmen. In Kislowodsk hatte ich befürchtet, dass ein 'Revolutionsorchester', das meine neuen Werke spielt, auf Ablehnung stoßen könnte, aber das Gegenteil war der Fall: Das Staatsorchester, das mit viel neuem, jungem Blut durchsetzt ist, war flexibel und aufmerksam und spielte die Sinfonie mit offensichtlichem Vergnügen\". - Sergej Prokofjew"
 elgar.709.t: "Romeo und Julia"
 elgar.709.d: "Pjotr Tschaikowsky, ein aufstrebender junger Komponist, hat seine Ouvertüre Romeo und Julia vorgestellt. Das Publikum nahm das Werk mit gemischten Gefühlen auf."
 elgar.709.f: "Nicht nur zu Beginn, sondern während seiner gesamten Karriere musste sich Tschaikowsky gegen Kritiker und Konkurrenten durchsetzen. Die Ouvertüre \"Romeo und Julia\" zum Beispiel sollte bei ihrer Veröffentlichung ein Misserfolg werden. Andererseits führte diese Kritik, die Tschaikowsky zeitlebens immer wieder einstecken musste, dazu, dass der Komponist dieses und andere Werke überkritisch bearbeitete; Tschaikowsky blieb zeitlebens einer der größten Kritiker seines eigenen Werks. Es entbehrt auch nicht einer gewissen Ironie, dass die national-russisch gesinnten Komponisten gerade dieses Werk lobten, obwohl sie später zu den schärfsten Kritikern Tschaikowskys gehören sollten. Nichtsdestotrotz sollte Tschaikowsky spätestens ab dieser Zeit zu einem der bedeutendsten russischen Komponisten werden und in nur wenigen Jahren einen internationalen Ruhm erlangen, den kaum ein anderer Musiker des Jahrhunderts erreichte."
 elgar.710.t: "Viva Verdi"
 elgar.710.d: "Mit der Gründung des italienischen Nationalstaates und der Erweiterung unseres Territoriums um die Opernstadt Mailand haben wir die einmalige Gelegenheit, eine der wichtigsten Persönlichkeiten der italienischen Musikgeschichte zu engagieren: Giuseppe Verdi."
 elgar.710.f: "Giuseppe Verdi war ein italienischer Komponist und Politiker, der zusammen mit anderen Protagonisten des italienischen Musiktheaters des 19. Jahrhunderts als einer der größten Opernkünstler und Komponisten aller Zeiten gilt: Gioachino Rossini, Vincenzo Bellini und Gaetano Donizetti. Jahrhunderts: Gioino Rossini, Vincenz Bellini und Gaetano Donetti. Er sympathisierte mit der Risorgimento-Bewegung, die die Einigung Italiens anstrebte, und nahm für kurze Zeit aktiv am politischen Leben teil; im Laufe seines langen Lebens nahm er eine einzigartige Stellung unter seinen Landsleuten ein und wurde zu einem tiefgründigen künstlerischen Symbol für die Einheit des Landes. Aus diesem Grund zog einen Monat nach seinem Tod eine feierliche und endlose Prozession durch Mailand, die seine sterblichen Überreste mit den Noten von \"Va, pensiero\" aus Nabucco begleitete, die er 60 Jahre zuvor geschrieben hatte und die die Gefühle der Italiener gegenüber ihrem verschwundenen Helden zum Ausdruck brachten. Damit wurde deutlich, wie sehr Verdis Musik im nationalen Bewusstsein verankert war. Seine Werke gehören nach wie vor zu den bekanntesten und werden in Theatern auf der ganzen Welt aufgeführt, insbesondere Aida (1871), der bereits erwähnte Nabucco (1842) und die so genannte \"Verdi-Triade\": Rigoletto (1851), Il Trovatore (1853) und La traviata (1853)."
 elgar.711.t: "Frühlingssinfonie"
 elgar.711.d: "Robert Schumanns erste Symphonie wurde heute unter der Leitung von Felix Mendelssohn Bartholdy aufgeführt. Schumann ist mit der bedeutenden Pianistin Clara (geb. Wieck) verheiratet und ist bisher eher als Musikkritiker denn als Komponist aufgefallen. Die Meinungen über seine Klavierstücke gehen auseinander."
 elgar.711.f: "Mit Ausnahme von Franz Schubert wurde kein deutschsprachiger Komponist zu Lebzeiten so verkannt wie Robert Schumann. Während die Bedeutung Schuberts erst nach seinem frühen Tod erkannt wurde, wurde Schumann vorgeworfen, als Genie zu beginnen und als Talent zu enden. Zeitgenossen hatten oft keinen Zugang zu seinem Werk oder verstanden seine Werke einfach nicht. Seine Klavierstücke, die heute einen Teil seines Ruhms ausmachen, waren zu seiner Zeit weitgehend unbekannt. Spötter sahen ihn nur als den Mann an der Seite der Pianistin Clara Schumann. In seiner sächsischen Heimat stand er im Schatten von Mendelssohn. Wagner stellte sich später gegen ihn, während Brahms ein enger Vertrauter von Clara und Robert wurde. Liszt sah in Schumann einen Wegbereiter des musikalischen Fortschritts in Deutschland, hatte aber keinen Erfolg beim Publikum, als er Schumanns Werke in sein Repertoire aufnahm. Die Hoffnungen auf eine feste Anstellung an einer bedeutenden musikalischen Institution wurden immer wieder enttäuscht. Ähnlich wie Schubert fand auch Schumann ein vorzeitiges, tragisches Ende."
 elgar.712.t: "King Olaf"
 elgar.712.d: "Edward Elgar hat sich in den letzten Jahren mit seinen Kantaten und Chorwerken hervorgetan. \"Scenes from the Saga of King Olaf\", sein jüngstes Werk, wurde vom Publikum gut aufgenommen."
 elgar.712.f: "In den 1890er Jahren erarbeitete sich Edward Elgar einen wachsenden Ruf als bedeutender britischer Komponist. Anfänglich stark von kontinentalen Einflüssen geprägt - \"King Olaf\" zeigt auch Anklänge an den Wganer-Stil - fand er allmählich zu einer eigenen Klangsprache, die spätere britische Komponisten dazu ermutigen sollte, völlig neue Wege zu gehen. Elgar fühlte sich als Außenseiter, nicht nur musikalisch, sondern auch gesellschaftlich. In den von Akademikern dominierten Musikkreisen war er ein Autodidakt; im protestantischen Großbritannien wurde sein Katholizismus in manchen Kreisen mit Misstrauen betrachtet; und in der klassenbewussten Gesellschaft des viktorianischen und edwardianischen Großbritanniens war er selbst nach seiner Anerkennung für seine bescheidene Herkunft sehr empfindlich. Dennoch kann Elgar als der bedeutendste britische Komponist seit Henry Purcell angesehen werden."
 elgar.713.t: "Hofball-Musikdirektor"
 elgar.713.d: "Die Stelle des Hofball-Musikdirektors ist seit Jahren ausgeschrieben. Eine prestigeträchtige Position, die eigentlich an den Komponisten Johann Strauss gehen sollte. Aus politischen Gründen war ihm diese Ehre bisher verwehrt worden. Nun mehren sich die Stimmen, den Posten dem Sohn des früh verstorbenen Komponisten anzubieten."
 elgar.713.f: "Johann Strauss war ein österreichisch-deutscher Kapellmeister und Komponist und wurde international als \"Walzerkönig\" anerkannt. Seinen ersten Walzer hatte er bereits im Alter von sechs Jahren komponiert und heimlich Geigenunterricht genommen, weil sein Vater eine Beamtenkarriere geplant hatte. Da dieser mit der Familie gebrochen hatte, unterstützte seine Mutter seine musikalische Ausbildung gegen seinen Willen. Sein erster Auftritt im Casino Dommayer, einem in der Region bekannten Unterhaltungslokal, war ein großer Erfolg. Tourneen führten ihn zunächst mit seinem eigenen Orchester durch die Donaumonarchie (was die Rivalität mit seinem Vater noch verstärkte). Nach dem Tod seines Vaters übernahm er dessen Orchester und fusionierte es mit seinem. Da er einige Werke für die Revolutionäre von 1848 komponiert hatte und damit Sympathien für die Aufstandsbewegung zeigte, erregte er die Aufmerksamkeit der Zensurbehörden und fiel trotz seiner Popularität am Hof in Ungnade. Infolgedessen wurde ihm bis 1863 die Stelle des Hofballmusikdirektors verwehrt."
 elgar.713.g: "Er hat seine Chance verpasst, aber er kann gerne komponieren."
 elgar.713.h: "Gebt dem Walzerkönig den Platz, den er verdient!"
 elgar.714.t: "Preisträger des Staatspreises für Komposition"
 elgar.714.d: "Der diesjährige Träger des Staatspreises für Komposition ist ein tschechisches Ausnahmetalent. Sein Name ist Antonín Dvořák."
 elgar.714.f: "Antonín Dvořák war ein tschechischer Komponist, der häufig Rhythmen und andere Aspekte der Volksmusik Mährens und seiner böhmischen Heimat verwendete. Dvořák zeigte schon früh seine musikalische Begabung, da er bereits im Alter von sechs Jahren Geige lernte. Im Jahr 1874 reichte er eine Bewerbung für den österreichischen Staatspreis für Komposition ein, die Partituren von zwei Sinfonien und anderen Werken enthielt. Obwohl Dvořák nichts davon wusste, war Johannes Brahms das führende Mitglied der Jury und zeigte sich sehr beeindruckt. Der Preis wurde Dvořák 1874 und erneut 1876 und 1877 verliehen, als Brahms und der prominente Kritiker Eduard Hanslick, der ebenfalls der Jury angehörte, sich bei ihm meldeten. Brahms empfahl Dvořák seinem Verleger Simrock."
 elgar.714.g: "Eine wohlverdiente Trophäe."
 elgar.714.h: "Wir sollten uns dieses Talent nicht entgehen lassen."
 elgar.715.t: "Der böhmische Komponist"
 elgar.715.d: "Claude Debussy begann als Preisträger des Prix de Rome, hat aber bisher aus seinem bescheinigten Talent nicht viel mehr gemacht, als kleine, provokante Klavierstücke zu schreiben. Was wird aus dieser Bohème werden?"
 elgar.715.f: "Schon am Konservatorium gingen die Einschätzungen über Claude Debussys Talent weit auseinander. Einige lobten ihn als Pianisten und setzten große Hoffnungen in ihn. Andere bezeichneten ihn als nachlässig. Zu dieser Zeit war er bereits Pianist im Haushalt von Nadezhda von Meck, Tschaikowskys Mäzenin. 1884 gewann Debussy den Prix de Rome, war aber während seines Aufenthalts in Rom wenig ehrgeizig. Er fand die italienische Oper langweilig und konnte mit dem vorherrschenden Stil von Giuseppe Verdi wenig anfangen. Er reiste früh nach Paris zurück und führte dort ein unstetes Leben: Ich bin sicher, dass das Institut das nicht gutheißen würde, denn natürlich hält es den Weg, den es vorgibt, für den einzig richtigen. Aber es gibt keine Hilfe! Ich bin zu sehr in meine Freiheit verliebt, zu sehr auf meine eigenen Ideen fixiert!'"
 elgar.715.g: "Nette Klaviermusik, aber wir haben genug musikalische Vagabunden."
 elgar.1011.t: "Don Pasquale"
 elgar.1011.d: "Ein großer Komponist hat gerade ein musikalisches Meisterwerk vollendet!"
 elgar.1011.f: "Don Pasquale ist eine Oper buffa in drei Akten. Die Oper ist eine der berühmtesten ihres Genres und gehört neben L'elisir d'amore und Lucia di Lammermoor zu den wenigen Werken Donizettis, die seit dem 19. Jahrhundert eine fast ununterbrochene Aufführungstradition haben. Die auf den Komödien von Carlo Goldoni basierenden Figuren sind mehr oder weniger eng an die Typen der Commedia dell'arte angelehnt, erhalten aber durch die Fähigkeit, Trauer, Schmerz oder Reue zu empfinden und auszudrücken, eine Differenzierung, die über ihren Typus hinausgeht, sentimentale Züge. Don Pasquale war ein sofortiger Erfolg, wie ihn zuvor nur Bellinis I puritani (1835) in Paris gehabt hatte."
 elgar.1011.g: "Bravissimo!"
 elgar.1012.t: "Dom Sebastian"
 elgar.1012.f: "Dom Sébastien ist eine französische große Oper in fünf Akten von Gaetano Donizetti. Es handelt sich um eine historische Fiktion über König Sebastian von Portugal (1554-1578) und seine unglückliche Expedition nach Marokko im Jahr 1578. Damals versuchte Donizetti, eine Oper zu komponieren, die mit ähnlichen historischen Opern von Daniel Auber, Fromental Halévy und Giacomo Meyerbeer konkurrieren sollte. Eine kritische Beschreibung des Charakters von Dom Sébastien ist \"ein Begräbnis in fünf Akten\". Das Werk wurde mit Widerwillen aufgenommen, was Donizetti selbst als Fiasko empfand. Obwohl Donizetti seine letzte Oper als eines seiner wichtigsten Werke betrachtete, ist Dom Sébastien heute weitgehend vergessen. Sie entstand zu einer Zeit, in der Donizetti \"nicht mehr die uneingeschränkte Kontrolle über seine Phantasie hatte\", so dass die Oper bereits von Donizettis beginnender Krankheit gezeichnet war."
 elgar.1021.t: "Les Troyens"
 elgar.1021.f: "Les Troyens ist eine französische große Oper in fünf Akten von Hector Berlioz. Das Libretto wurde von Berlioz selbst auf der Grundlage von Vergils Epos Aeneis geschrieben; die Partitur wurde zwischen 1856 und 1858 komponiert. Les Troyens ist das ehrgeizigste Werk von Berlioz, die Zusammenfassung seines gesamten künstlerischen Schaffens, das er jedoch nicht mehr in seiner Gesamtheit erleben konnte. Unter dem Titel Les Troyens à Carthage wurden die letzten drei Akte mit zahlreichen Kürzungen von Léon Carvalhos Ensemble, dem Théâtre Lyrique, in seinem Theater (heute Théâtre de la Ville) am Place du Châtelet in Paris am 4. November 1863 uraufgeführt und 21 Mal wiederholt. Nachdem die Oper jahrzehntelang vernachlässigt worden war, wird sie heute von einigen Musikkritikern als eines der besten Werke angesehen, die je geschrieben wurden."
 elgar.1022.t: "La damnation de Faust"
 elgar.1022.f: "La damnation de Faust ist ein Werk für vier Solostimmen, siebenstimmigen Chor, großen Kinderchor und Orchester des französischen Komponisten Hector Berlioz. Er nannte es eine \"légende dramatique\" (dramatische Legende). Der französische Komponist ließ sich von einer Übersetzung von Goethes dramatischem Gedicht Faust inspirieren und schuf ein musikalisches Werk, das sich ebenso wie das ihm zugrunde liegende Meisterwerk einer einfachen Kategorisierung entzieht. Die Form des Reiseberichts und die kosmische Perspektive des Werks, das zu verschiedenen Zeiten als Oratorium und als Oper konzipiert wurde, machen seine Aufführung als Oper zu einer extremen Herausforderung. Berlioz selbst wollte das Werk unbedingt inszeniert sehen, musste jedoch zugeben, dass die Inszenierungstechniken seiner Zeit nicht ausreichten, um das Werk zu dramatischem Leben zu erwecken. Der größte Teil des Ruhmes des Werkes ist durch konzertante Aufführungen entstanden."
 elgar.1023.t: "Abhandlung über Instrumentierung"
 elgar.1023.f: "\"Dieses Traité d'Instrumentation ist ein höchst paradoxes Werk. Es beginnt mit einem mehrzeiligen Vorwort, das nichts mit dem Thema zu tun hat. Darin wendet sich der Autor gegen Musiker, die Modulationen missbrauchen und deren Vorliebe für Dissonanzen der Vorliebe mancher Tiere für salzige Pflanzen und dornige Sträucher entspricht. Dann wendet er sich den Orchesterinstrumenten zu und mischt seltsame Behauptungen mit den solidesten Wahrheiten und wertvollen Ratschlägen.(...) In seiner Abhandlung wie in seiner Orchestrierung ist Berlioz, trotz aller Merkwürdigkeiten, einfach fabelhaft. Ihm verdankt meine Generation ihre Bildung, und ich wage zu behaupten, eine gute. Berlioz besaß die unschätzbare Gabe, die Vorstellungskraft zu beflügeln und die Liebe zu der Kunst zu wecken, die er lehrte.(...) Diese scheinbar überflüssigen musikalischen Beispiele brachten einen zum Träumen, sie öffneten das Tor zu einer neuen Welt, zu einem weiten und faszinierenden Blick in die Zukunft, in das gelobte Land.\" - Camille Saint-Saëns"
 elgar.1031.t: "Les Préludes"
 elgar.1031.f: "Les Préludes ist die dritte der dreizehn symphonischen Dichtungen von Franz Liszt. Die Musik wurde zwischen 1845-54 komponiert und begann als Ouvertüre zu Liszts Chorzyklus Les quatre élémens (Die vier Elemente), wurde dann als eigenständige Konzertouvertüre überarbeitet und erhielt einen neuen Titel, der sich auf ein Gedicht von Alphonse de Lamartine bezieht. Les préludes ist das früheste Beispiel für ein Orchesterwerk mit dem Titel \"Symphonisches Gedicht\". Liszt sieht die Phasen des Lebens als Präludien zur Melodie des Todes. Diese Lebensphasen sind Kämpfe und Stürme, Liebesglück und Schmerz, Trost, Naturerleben. Trotz der Kontraste in diesen Stimmungen, die sich in Les Préludes widerspiegeln, ist das Werk von großer Geschlossenheit. Es beginnt mit einer melancholischen Melodie, aus der sich das erste stürmische Hauptthema entwickelt, das über einen pastoralen Teil zum zweiten Thema führt. Diese beiden Themen werden in gleitend wechselnden Stimmungen entwickelt. In einem Höhepunkt mündet das ursprüngliche Thema in das erste Hauptthema als majestätische, glanzvolle Fanfare."
 elgar.1032.t: "Ungarische Rhapsodien"
 elgar.1032.f: "Die Ungarischen Rhapsodien sind eine Reihe von 19 Klavierstücken, die auf ungarischen Volksthemen basieren und von Franz Liszt in den Jahren 1846-1853 und später in den Jahren 1882 und 1885 komponiert wurden. Liszt arrangierte auch Versionen für Orchester, Klavierduo und Klaviertrio. Einige sind bekannter als andere, wobei die Ungarische Rhapsodie Nr. 2 besonders berühmt ist und auch die Nr. 6, Nr. 10, Nr. 12 und Nr. 14 (vor allem in der Bearbeitung für Klavier und Orchester als Ungarische Fantasie) sehr bekannt sind. Liszt verarbeitete viele Themen, die er in seiner westungarischen Heimat gehört hatte und die er für Volksmusik hielt, obwohl viele von ihnen in Wirklichkeit von Mitgliedern des ungarischen Großbürgertums oder von Komponisten wie József Kossovits geschrieben wurden. In ihrer ursprünglichen Klavierform sind die Ungarischen Rhapsodien für ihre Schwierigkeit bekannt."
 elgar.1033.t: "Dante-Sinfonie"
 elgar.1033.f: "Die \"Dante-Sinfonie\" ist eine Chorsinfonie, die von Franz Liszt komponiert wurde. Sie wurde im hochromantischen Stil geschrieben und basiert auf Dante Alighieris Reise durch die Hölle und das Fegefeuer, wie sie in der Göttlichen Komödie beschrieben wird. Einige Kritiker haben argumentiert, dass die Dante-Sinfonie weniger eine Sinfonie im klassischen Sinne als vielmehr zwei beschreibende sinfonische Gedichte sind. Liszts ursprüngliche Absicht war es, das Werk in drei Sätzen zu komponieren: einem Inferno, einem Purgatorio und einem Paradiso. Die ersten beiden sollten rein instrumental sein, das Finale chorisch. Wagner überzeugte Liszt jedoch, dass kein irdischer Komponist die Freuden des Paradieses getreu wiedergeben könne. Liszt ließ den dritten Satz weg, fügte aber am Ende des zweiten Satzes ein chorisches Magnificat hinzu. Der Liszt-Forscher Humphrey Searle argumentiert, dass Liszt sich zwar in der Darstellung der höllischen Regionen wohler gefühlt haben mag als in den himmlischen, dass aber die Aufgabe, das Paradies musikalisch darzustellen, nicht jenseits seiner Kräfte gelegen hätte."
 elgar.1041.t: "Die Meistersinger von Nürnberg"
 elgar.1041.f: "\"Die Meistersinger von Nürnberg\" ist ein Musikdrama oder eine Oper in drei Akten von Richard Wagner. Mit einer Dauer von fast viereinhalb Stunden (ohne die beiden Pausen zwischen den Akten) ist es die längste Oper, die üblicherweise aufgeführt wird, und wird traditionell nicht gekürzt. Die Meistersinger von Nürnberg nehmen in Wagners Schaffen einen einzigartigen Platz ein. Sie ist die einzige Komödie unter seinen reifen Opern und auch insofern ungewöhnlich, als sie in einer historisch klar definierten Zeit und an einem historisch klar definierten Ort spielt und nicht in einer mythischen oder legendären Umgebung. Es ist die einzige reife Wagner-Oper, die auf einer völlig originellen Geschichte basiert. Sie enthält viele der Opernkonventionen, gegen die Wagner in seinen Aufsätzen über die Theorie der Oper gewettert hatte: gereimte Verse, Arien, Chöre, ein Quintett und sogar ein Ballett."
 elgar.1042.t: "Die Walküre"
 elgar.1042.f: "Die \"Walküre\" bildet zusammen mit den Opern \"Das Rheingold\", \"Siegfried\" und \"Götterdämmerung\" das Gesamtwerk \"Der Ring des Nibelungen\". Wagner hielt sich weitgehend an die Prinzipien der Form des Musikdramas, die die Gefühle und Stimmungen des Werks widerspiegeln, und verwendete ein System von wiederkehrenden Leitmotiven, um Personen, Ideen und Situationen darzustellen, anstatt die konventionellen Operneinheiten von Arien, Ensembles und Chören. Die Geschichte von Die Walküre basiert auf der nordischen Mythologie, die in der Völsunga-Saga und der Poetischen Edda erzählt wird."
 elgar.1043.t: "Parsifal"
 elgar.1043.f: "Richard Wagners Parsifal enthält religiöse Elemente wie die sakrale Musik, die Enthüllung der Monstranz (Gral), die Taufe und das christliche Abendmahlsritual. Bereits in seinen Zürcher Kunstschriften entwickelte er die Idee, mit Hilfe der Kunst den Kern der Religion zu verdeutlichen. Wagner erklärte, dass er zur Umsetzung seiner gleichnishaften Botschaft von der Erlösung und Erneuerung der Menschheit durch Mitleid - dargestellt durch den suchenden Parsifal und den leidenden Amfortas - eine Kunstform wählte, die mit religiöser Symbolik eine \"entrückende Wirkung auf das Gemüt\" haben sollte. Wagner selbst bezeichnete den Dreiakter als Bühnenweihfestspiel und verfügte, dass er nur im Bayreuther Festspielhaus aufgeführt werden dürfe."
 elgar.1051.t: "Peer Gynt"
 elgar.1051.f: "Peer Gynt, op. 23, ist die Begleitmusik zu Henrik Ibsens gleichnamigem Theaterstück aus dem Jahr 1867, geschrieben von dem norwegischen Komponisten Edvard Grieg. Obwohl er viele kurze Klavierstücke und Kammermusikwerke komponierte, ragte das Werk, das Grieg für Henrik Ibsen schrieb, heraus. Ursprünglich komponierte er 90 Minuten Orchestermusik für das Stück, doch später nahm er bestimmte Abschnitte für die Suiten heraus. Die Reisen von Peer Gynt durch die Welt und ferne Länder werden durch die von Grieg gewählten Instrumente dargestellt. Grieg schuf später zwei Suiten aus seiner Peer-Gynt-Musik. Einige der Musik aus diesen Suiten sind in der Populärkultur bekannt geworden, insbesondere die Stücke \"Morgenstimmung\", \"In der Halle des Bergkönigs\" und \"Solveigs Lied\"."
 elgar.1052.t: "Lyrische Stücke"
 elgar.1052.f: "Lyrische Stücke ist eine Sammlung von 66 kurzen Stücken für Klavier solo, die von Edvard Grieg geschrieben wurden. Sie wurden in 10 Bänden zwischen 1867 und 1901 veröffentlicht. Die Sammlung enthält einige seiner bekanntesten Stücke, wie Hochzeitstag auf Troldhaugen, An den Frühling, Marsch der Trolle und Schmetterling. Das Thema des ersten Stücks der Sammlung, Arietta, war eine der Lieblingsmelodien des Komponisten. Nach den Worten des Pianisten Andrei Gavrilow sind die Lyrischen Stücke \"eine ganz besondere Art von Tagebuch, das Grieg sein ganzes Leben lang geführt hat, oder ein Geständnis, weil sie die intimsten Momente im Leben des Komponisten widerspiegeln\"."
 elgar.1053.t: "Norwegische Tänze"
 elgar.1053.f: "Die Norwegischen Tänze waren die Antwort des Norwegers auf die überaus erfolgreichen Slawischen Tänze von Antonín Dvořák und die Ungarischen Tänze von Johannes Brahms. Die beiden Kollegen hatten ihre Tanzserie für Klavier zu vier Händen 1878 und 1881 im Simrock-Verlag veröffentlicht. Grieg wagte es damals nicht, seine Tänze zu orchestrieren, da das Terrain durch die \"Norwegischen Rhapsodien\" seines Freundes Johan Svendsen besetzt war. Die Orchesterfassung seiner Norwegischen Tänze wurde daher von Robert Henriques arrangiert - sehr zu Griegs Zufriedenheit. Für den ersten Tanz verwendete Grieg den beliebten Sinklar-Marsch, für die letzten drei so genannten \"Hallings\", traditionelle norwegische Brauttänze für junge Männer, die schnell und sehr akrobatisch zu spielen sind."
 elgar.1061.t: "Deutsches Requiem"
 elgar.1061.f: "Es gibt hier wenig zu erzählen, aber ich muss Ihnen trotzdem sagen, dass ich von Ihrem Requiem völlig erfüllt bin, es ist ein sehr kraftvolles Stück, es ergreift den ganzen Menschen wie nur wenige andere Dinge. Die tiefe Ernsthaftigkeit, verbunden mit dem ganzen Zauber der Poesie, hat eine wunderbare, erschütternde und beruhigende Wirkung. Wie Sie wissen, kann ich es nie wirklich in Worte fassen, aber ich fühle den ganzen reichen Schatz dieses Werkes bis ins Innerste, und die Begeisterung, die aus jedem Stück spricht, rührt mich zutiefst, weshalb ich nicht anders kann, als auszusprechen ... Oh, wenn ich es hören könnte, was würde ich dafür geben. - Clara Schumann"
 elgar.1062.t: "Ungarische Tänze"
 elgar.1062.f: "Die Ungarischen Tänze von Johannes Brahms sind eine Reihe von 21 lebhaften Tanzmelodien, die meist auf ungarischen Themen basieren und 1879 fertiggestellt wurden. Sie variieren in ihrer Länge von etwa einer Minute bis zu fünf Minuten. Sie gehören zu Brahms' populärsten Werken und waren für ihn die einträglichsten. Jeder Tanz wurde für eine Vielzahl von Instrumenten und Ensembles arrangiert. Brahms schrieb ursprünglich die Fassung für Klavier zu vier Händen und arrangierte später die ersten zehn Tänze für Klavier solo. Der mit Brahms befreundete Violinist Joseph Joachim schuf eine virtuose Bearbeitung aller Ungarischen Tänze für Violine und Klavier."
 elgar.1063.t: "Sinfonie Nr. 4"
 elgar.1063.f: "Die Sinfonie Nr. 4 ist die letzte Sinfonie von Johannes Brahms. Heute ist sie eines der beliebtesten und am häufigsten aufgeführten Orchesterwerke des Komponisten. Auf den ersten Blick war die kompromisslose Gestaltung des Werks befremdlich. Als Brahms und Ignaz Brüll die Sinfonie Freunden auf zwei Klavieren vorspielten, reagierten unter anderem Clara Schumann und Brahms' späterer Biograph Max Kalbeck mit Ablehnung. Eduard Hanslick soll ausgerufen haben: \"Während des ganzen Satzes kam es mir vor, als ob ich von zwei furchtbar gescheiten Leuten durchgeschlagen würde\". Elisabeth von Herzogenberg beschrieb das Werk als \"eine kleine Welt für die Klugen und Wissenden, in der die Menschen, die im Dunkeln wandeln, nur einen kleinen Teil haben können\". Als Brahms 1897, kurz vor seinem Tod, einer Aufführung der Symphonie beiwohnte, erhielt er vom Wiener Publikum tosenden Beifall, den das Werk bis heute erhalten hat."
 elgar.1071.t: "Sinfonie Nr. 5"
 elgar.1071.f: "Wie einige andere Sinfonien Mahlers wurde auch die 5. Sinfonie nach ihrer Uraufführung nicht verstanden. Nach einer misslungenen Aufführung in Hamburg beklagte Mahler 1905: \"Die Fünfte ist ein verfluchtes Werk. Niemand versteht sie. Die Musikkritiken in den Jahren nach der Uraufführung waren überwiegend negativ. So urteilte der Musikkritiker Ferdinand Pfohl, die 5. Sinfonie gehöre zu den schwächeren Werken Mahlers. Nur die Neue Zeitung für Musik stellte der Sinfonie ein wohlwollendes Zeugnis aus und sprach von einem \"überwältigenden Reichtum an Schönheit\". Gerade im Vergleich zur zwei Jahre zuvor entstandenen 4. Sinfonie stellt sie einen großen inhaltlichen und formalen Unterschied dar. Mit der raueren Klangwelt der 5. Sinfonie beginnt für Mahler eine neue Schaffensphase, die sich in der folgenden 6. Sinfonie weiterentwickelt wird. Erst nach Mahlers Tod wird das Werk mehr und mehr gewürdigt."
 elgar.1072.t: "Lied von der Erde"
 elgar.1072.f: "\"Ist es wirklich derselbe Mann, der \"in Harmonie mit dem Unendlichen\" das Bauwerk der Achten errichtete, das wir jetzt im Trinklied von den Leiden der Erde finden? Der im Herbst einsam zu seiner geliebten Ruhestätte schleicht und sich nach Erquickung sehnt? Wer blickt auf die Jugend mit dem freundlichen Blick des Alters, mit sanfter Rührung auf die Schönheit? Wer sucht in Trunkenheit das sinnlose irdische Dasein zu vergessen und nimmt schließlich in Melancholie Abschied? (...) Es ist kaum derselbe Mensch und Komponist. Alle bisherigen Werke waren aus dem Lebensgefühl heraus entstanden (...) Die Erde verschwindet, eine andere Luft weht herein, ein anderes Licht scheint über sie. (...) Als ich ihm das Autogramm zurückbrachte, fast unfähig, ein Wort darüber zu sagen, öffnete er den 'Abschied' und sagte: \"Was meinen Sie? Ist das überhaupt erträglich? Werden sich die Leute danach nicht umbringen?\" Dann wies er auf die rhythmischen Schwierigkeiten hin und fragte scherzhaft: \"Wissen Sie, wie man das dirigiert? Ich nicht!\" - Bruno Walter"
 elgar.1073.t: "Kindertotenlieder"
 elgar.1073.f: "\"Ich kann gut verstehen, dass man so schreckliche Texte schreibt, wenn man keine Kinder hat oder wenn man Kinder verloren hat. Aber ich kann nicht verstehen, wie man über den Tod von Kindern singen kann, wenn man sie eine halbe Stunde vorher noch glücklich und gesund umarmt und geküsst hat!\" - Alma Mahler-Werfel, Ehefrau von Gustav Mahler"
 elgar.1081.t: "3. Klavierkonzert"
 elgar.1081.f: "Damals war Mahler der einzige Dirigent, den ich für würdig hielt, mit Nikisch auf eine Stufe gestellt zu werden. Er widmete sich dem Konzert, bis die Begleitung, die ziemlich kompliziert ist, bis zur Perfektion geübt war, obwohl er schon wieder eine lange Probe hinter sich hatte. Mahler zufolge war jedes Detail der Partitur wichtig - eine Haltung, die unter Dirigenten zu selten ist. ... Obwohl das Ende der Probe für 12.30 Uhr angesetzt war, spielten und spielten wir weit über diese Stunde hinaus, und als Mahler ankündigte, dass der erste Satz noch einmal geprobt werden würde, erwartete ich irgendeinen Protest oder eine Szene von den Musikern, aber ich bemerkte nicht ein einziges Zeichen von Verärgerung. Das Orchester spielte den ersten Satz mit großer Aufmerksamkeit, vielleicht sogar mit größerer Aufmerksamkeit als beim letzten Mal. - Sergej Rachmaninow"
 elgar.1082.t: "Rhapsodie über ein Thema von Paganini"
 elgar.1082.f: "Das Stück besteht aus 24 Variationen über ein Thema, das Niccolò Paganini selbst als Ausgangspunkt für eine Reihe von Variationen verwendete. Diese Melodie diente wiederholt als Vorlage für verschiedene Komponisten, darunter Johannes Brahms und Franz Liszt. In einigen Variationen verwendet Rachmaninow eine andere, viel ältere Melodie: die Sequenz \"Dies irae\", die einst fester Bestandteil der lateinischen Totenmesse war. Rachmaninow hat dieses Thema immer wieder in seinen Werken verwendet. Es taucht in allen Sinfonien, den Sinfonischen Tänzen, der Sinfonischen Dichtung Die Toteninsel und der ersten Klaviersonate auf. Die Kombination eines Paganini-Themas mit dem \"Dies irae\" veranlasst zur Suche nach einem programmatischen Hintergrund des Werks. Der Legende nach verkaufte der große Geiger seine Seele an den Teufel, um sein Instrument zu perfektionieren und die Liebe einer Frau zu erlangen. Das \"Dies irae\"-Motiv steht für den Teufel, das Paganini-Thema für den komponierenden Geiger selbst."
 elgar.1083.t: "Sinfonie Nr. 3"
 elgar.1083.f: "\"Es wurde in New York, Philadelphia, Chicago usw. gespielt. Bei den ersten beiden Aufführungen war ich dabei. Es wurde wundervoll gespielt. Die Aufnahme durch das Publikum und die Kritiker war sauer. Eine Kritik hat sich mir schmerzlich eingeprägt: dass ich keine dritte Symphonie mehr in mir hätte. Ich persönlich bin fest davon überzeugt, dass dies ein gutes Werk ist. Aber - manchmal irren sich auch Komponisten! Wie dem auch sei, ich bleibe bei meiner bisherigen Meinung.\" - Sergej Rachmaninow"
 elgar.1091.t: "Romeo und Julia"
 elgar.1091.f: "Romeo und Julia ist das längste und bekannteste Ballett von Sergej Prokofjew und wird weithin als sein wichtigster Beitrag zu diesem Genre angesehen. Es gilt als ein Höhepunkt seines musikalischen Schaffens. Die reichhaltige und abwechslungsreiche Instrumentierung sowie die rhythmische Komplexität der Partitur stellen für Orchester und Tänzer immer noch eine Herausforderung dar. An einigen Stellen grenzen die Dissonanzen an Atonalität. Der berühmte \"Tanz der Ritter\" mit seinen punktierten Rhythmen ist heute besser bekannt als ein quasi-symphonisches Thema. Im Gegensatz dazu sind die Themen, die mit Julias Erwachen zur Liebe verbunden sind, gleichzeitig zart und jugendlich lebendig. Prokofjew hat die Musik des Balletts in drei Orchestersuiten und einem Soloklavierstück wiederverwendet."
 elgar.1092.t: "Leutnant Kijé"
 elgar.1092.f: "Die Musik zu Leutnant Kijé wurde ursprünglich zur Untermalung des gleichnamigen Films geschrieben. Es war Prokofjews erster Versuch, Filmmusik zu komponieren, und sein erster Auftrag. In den Anfängen des Tonfilms war Prokofjew unter den vielen namhaften Komponisten, die sich an Filmmusik versuchen wollten, nicht die erste Wahl für einen Auftrag. Er lebte fast ein Jahrzehnt lang in Paris und war bekannt für seine experimentellen und dissonanten Kompositionen. Kurz nach der Veröffentlichung des Films erhielt Prokofjew eine Einladung des Moskauer Radio-Sinfonieorchesters, eine Orchestersuite aus seiner Kijé-Filmmusik zu komponieren - wahrscheinlich das erste Mal, dass eine Filmmusik in ein bedeutendes musikalisches Werk umgesetzt wurde. Während Prokofjew zur Premiere in Boston in den Vereinigten Staaten weilte, war er bei den Filmproduzenten sehr begehrt, doch obwohl er sich durch ihre Angebote geschmeichelt und angezogen fühlte, komponierte er nie eine Filmmusik für Hollywood."
 elgar.1093.t: "Peter und der Wolf"
 elgar.1093.f: "Peter und der Wolf ist ein \"symphonisches Märchen für Kinder\". Es ist Prokofjews meistgespieltes Werk und eines der am häufigsten gespielten Werke des gesamten klassischen Repertoires. Der Erzähler erzählt eine Kindergeschichte, während das Orchester diese illustriert, indem es verschiedene Instrumente einsetzt, um ein \"Thema\" zu spielen, das für jede Figur in der Geschichte steht: \"Jede Figur dieses Märchens wird durch ein entsprechendes Instrument des Orchesters dargestellt: der Vogel durch eine Flöte, die Ente durch eine Oboe, die Katze durch eine Klarinette, die staccato in tiefer Lage spielt, der Großvater durch ein Fagott, der Wolf durch drei Hörner, Peter durch das Streichquartett, die Jagd der Jäger durch die Pauke und die große Trommel. Vor einer Orchesteraufführung ist es wünschenswert, den Kindern diese Instrumente zu zeigen und auf ihnen die entsprechenden Leitmotive zu spielen. Auf diese Weise lernen die Kinder, die Klänge der Instrumente während der Aufführung des Märchens zu unterscheiden.\""
 elgar.1101.t: "Die Fledermaus"
 elgar.1101.f: "Die Fledermaus von Johann Strauss gilt als einer der Höhepunkte der Operettenära. Neben Der Zigeunerbaron und Eine Nacht in Venedig gehört Die Fledermaus zu den drei berühmtesten Strauss-Operetten und ist auch eine der wenigen Operetten, die regelmäßig an großen internationalen Opernhäusern aufgeführt werden. Die Texte sind eingängig und voller Ironie mit zeitlosen Wahrheiten. Die wesentlichen Teile der Musik sollen innerhalb von 42 Tagen entstanden sein. Die in freier Sonatenform geschriebene Ouvertüre nimmt eine besondere Stellung ein und gehört zu den größten Schöpfungen von Johann Strauß. Sie fasst die zahlreichen musikalischen Höhepunkte des gesamten Werkes zusammen und ist mit ihrer abwechslungsreichen Dynamik auch für Spitzenorchester immer wieder eine Herausforderung."
 elgar.1102.t: "Donauwalzer"
 elgar.1102.f: "Der Walzer An der schönen blauen Donau (oft abgekürzt: Donauwalzer) basiert kompositorisch auf Melodien, die Johann Strauss bereits in früheren Werken verwendet hatte. Schon bei seiner Uraufführung löste er beim Publikum Begeisterung aus. Aufgrund der vielen musikalischen Neuerscheinungen in der damaligen Karnevalszeit konnte sich der Walzer zunächst nicht durchsetzen. Da Strauss jedoch im selben Jahr auf der Weltausstellung 1867 in Paris auftrat und dafür neue Kompositionen schuf, erinnerte er sich daran, diesen Walzer in das Programm aufzunehmen. Unter dem Namen Le beau Danube bleu wurde das Stück während dieser Ausstellung ein großer Erfolg. Es wird angenommen, dass die veröffentlichten Ausgaben des Walzers, insbesondere die zweihändige Klavierfassung, in kurzer Zeit fast 1.000.000 Mal verkauft wurden. Der Walzer gilt als heimliche Hymne Österreichs und als eines der beliebtesten Stücke in der gesamten Geschichte der klassischen Musik."
 elgar.1103.t: "Eine Nacht in Venedig"
 elgar.1103.f: "Eine Nacht in Venedig ist eine \"komische Operette\" in drei Akten. Die Handlung spielt in Venedig um die Mitte des 18. Jahrhunderts und ist eine Verkleidungs- und Verwechslungskomödie mit Liebeswirren zwischen zwei Klassen. Wie viele andere Wiener Operetten ist das Libretto eine Adaption einer französischen Opéra-comique. Die Uraufführung in Berlin war ein Misserfolg. Das lag zum Teil an der verwirrenden Handlung, zum Teil aber auch an den zugrunde liegenden Texten. Für die Uraufführung im Theater an der Wien wurde das Stück daher überarbeitet. Auch die Ouvertüre wurde von Strauss überarbeitet. Die bekanntesten musikalischen Nummern sind der Lagunenwalzer und das Gondellied. In den Jahren 1923 und 1931 wurde das Werk von Erich Wolfgang Korngold erheblich überarbeitet; eine weitere Fassung wurde 1954 von Walter Felsenstein geschrieben; die Originalfassung wird heute nur noch sehr selten aufgeführt."
 elgar.1111.t: "Rigoletto"
 elgar.1111.f: "Rigoletto ist eine Oper von Giuseppe Verdi mit einem Libretto von Francesco Maria Piave. Sie basiert auf dem Melodrama \"Le roi s'amuse\" von Victor Hugo. Die Oper wurde zunächst von der Zensur kritisiert; Verdi und Piave mussten daher unter anderem den ursprünglich vorgesehenen Titel ändern und den Schauplatz von Paris nach Mantua verlegen. Die für Verdi wesentlichen Elemente, wie die verkrüppelte Hauptfigur Rigoletto und der Sack, in den seine sterbende Tochter gesteckt wird, blieben jedoch erhalten. Die Oper gilt als Verdis erstes Meisterwerk und begründete seinen Weltruhm. Verdi selbst betrachtete Rigoletto als eines seiner vollendetsten Werke, und im Gegensatz zu anderen Verdi-Opern gibt es keine Überarbeitungen oder Neufassungen. Rigoletto war bei seiner Uraufführung ein überwältigender Erfolg und wurde in den folgenden Jahren an fast allen europäischen Opernhäusern gespielt. Die Oper gehört seit über 160 Jahren zum Repertoire vieler Opernhäuser und ist nach wie vor eine der am häufigsten aufgeführten italienischen Opern."
 elgar.1112.t: "La Traviata"
 elgar.1112.f: "La traviata ist eine Oper von Giuseppe Verdi und Francesco Maria Piave nach dem Roman La dame aux camélias von Alexandre Dumas dem Jüngeren. Wie schon in Rigoletto und Il trovatore stellt Verdi eine von der Gesellschaft geächtete und verstoßene Person in den Mittelpunkt der Handlung. Eine Oper über eine Kurtisane, die an Tuberkulose stirbt, war für die damalige Zeit eine skandalöse Neuerung. Das Werk fiel bei der Uraufführung durch, obwohl Verdi es selbst inszeniert hatte und die Handlung vorsorglich in die Zeit Ludwigs XIV. verlegt hatte. Nach der Überarbeitung ließ Verdi es ein Jahr später erneut aufführen - und es wurde zu einer der erfolgreichsten Opern der Musikgeschichte. In einigen Ländern ist sie die meistgespielte Oper aller Zeiten. Was die Anzahl der Aufnahmen angeht, wird La traviata nur noch von Aida übertroffen. Aus Zensurgründen wurde die Oper in Italien auch unter dem Titel Violetta aufgeführt."
 elgar.1113.t: "Messa da Requiem"
 elgar.1113.f: "Unter dem Eindruck des Todes von Gioachino Rossini im Jahr 1868 lud Giuseppe Verdi die zwölf damals wichtigsten Komponisten Italiens ein, gemeinsam eine Totenmesse zu komponieren, die sogenannte Messa per Rossini. Er selbst übernahm die Vertonung des Schlusssatzes \"Libera me\" in diesem Requiem. Zu einer Aufführung kam es jedoch aufgrund widriger Umstände nicht. Nach dem Tod des Dichters Alessandro Manzoni im Jahr 1873 beschäftigte sich Verdi erneut mit dem Requiem-Stoff. Verdi bewunderte den hochangesehenen Manzoni sehr. Er bot der Stadt Mailand die Komposition einer Messe an, die ein Jahr nach Manzonis Tod aufgeführt werden sollte. Das \"Libera me\" aus der Rossini-Messe wurde nun zum Kernstück des neuen Requiems für Manzoni. Die Vertonung des \"Dies irae\" aus der älteren Komposition wurde dreimal für Passagen der Sequenz mit gleichem oder ähnlichem Text aufgegriffen. Die erste Aufführung fand am 22. Mai 1874 in der Kirche San Marco in Mailand statt, dem ersten Todestag Manzonis. Verdi selbst dirigierte."
 elgar.1121.t: "Prélude à l'après-midi d'un faune"
 elgar.1121.f: "Die Musik dieses Prélude ist eine sehr freie Illustration des schönen Gedichts von Mallarmé. Sie erhebt keineswegs den Anspruch, eine Synthese desselben zu sein. Vielmehr handelt es sich um eine Abfolge von Szenen, die die Sehnsüchte und Träume des Fauns in der Hitze des Nachmittags durchlaufen. Dann, müde davon, den zaghaften Flug der Nymphen und Najaden zu verfolgen, verfällt er in einen berauschenden Schlaf, in dem er endlich seine Träume vom Besitz der universellen Natur verwirklichen kann.'\n\nPrelude to the Afternoon of a Faun ist eine symphonische Dichtung für Orchester und eines von Debussys berühmtesten Werken. Das Stück gilt als Wendepunkt in der Geschichte der abendländischen Kunstmusik und als ein Meisterwerk der impressionistischen Komposition. Pierre Boulez betrachtete die Partitur als den Beginn der modernen Musik und bemerkte, dass \"die Flöte des Fauns der Musikkunst neuen Schwung verlieh\"."
 elgar.1121.g: "Schwelgen, träumen, den unendlichen Moment genießen..."
 elgar.1122.t: "La Mer"
 elgar.1122.f: "\"Das Konzert des gestrigen Abends begann mit einer Menge impressionistischer Farbkleckse, die im Eiltempo auf eine Klangpalette geschmiert wurden, ohne einen Gedanken an Form oder Zweck, außer neue Klangkombinationen zu schaffen. ... Nur eines war sicher: Der Ozean des Komponisten war ein Froschteich, und einige seiner Bewohner hatten sich in den Rachen eines jeden Blechblasinstruments verirrt.\"\n\nDas zwischen 1903 und 1905 komponierte La mer wurde im Oktober 1905 in Paris uraufgeführt. Es wurde zunächst nicht gut aufgenommen. Selbst einige, die Debussys Werk stark unterstützt hatten, waren nicht begeistert, obwohl das Stück drei Schlüsselaspekte von Debussys Ästhetik präsentierte: Impressionismus, Symbolismus und Japonismus. In den Jahrzehnten nach der Uraufführung etablierte sich La mer im Kernrepertoire der Orchesterliteratur."
 elgar.1123.t: "Pelléas et Mélisande"
 elgar.1123.f: "Als Lehrer war er pedantisch - das ist das einzige Wort. Wirklich pedantisch ... Es gab einen Kern von Wut und Bitterkeit in ihm - ich denke oft, dass er eher wie Golaud in Pelléas war und doch war er es nicht. Er war - das sieht man in seiner ganzen Musik - ein sehr sinnlicher Mann. Keiner schien ihn zu mögen. Jean Périer, der den Pelléas an der Seite meiner Mélisande spielte, wurde weiß vor Wut, wenn man den Namen Debussy erwähnte...'\n\nPelléas et Mélisande ist eine Oper in fünf Akten. Die Gattungsbezeichnung des Komponisten Claude Debussy lautet 'Drame lyrique'. Der Text ist eine Adaption des Schauspiels Pelléas et Mélisande von Maurice Maeterlinck. Debussy vermied Arien und größere Soloszenen, was dem Text einen realistischen Charakter verlieh. Pelléas sollte Debussys einzige vollendete Oper sein. Aus diesem Grund wurde sie manchmal mit Beethovens Fidelio verglichen."
 elgar.1131.t: "Schwanensee"
 elgar.1131.f: "Schwanensee ist ein weltberühmtes Ballett zur Musik von Pjotr Iljitsch Tschaikowski, das 1877 am Bolschoi-Theater in Moskau uraufgeführt wurde und zum Standardrepertoire der klassischen Ballettkompanien gehört. In Schwanensee finden sich Motive aus zahlreichen Märchen wieder: insbesondere die unglückliche, verzauberte Prinzessin, die durch die Liebe eines Prinzen erlöst wird. Das unglückliche Ende des ursprünglichen Librettos ist ebenfalls ein bekanntes Märchenmotiv des Schwanenmädchens oder der Schwanenjungfrau. Für seine Schwanensee-Partitur griff Tschaikowsky auf frühere Kompositionen zurück. Zwei Verwandten Tschaikowskys zufolge hatte der Komponist bereits 1871 in ihrem Haus ein kleines Ballett mit dem Titel \"Der Schwanensee\" geschaffen. Dieses Ballett enthielt das berühmte Leitmotiv. Er griff auch auf Material aus der Oper \"Die Woyewoda\" zurück, die er 1868 aufgegeben hatte. Im April 1876 war die Partitur fertig, und die Proben begannen. Schon bald begann der Choreograph Reisinger, einige Nummern, die er als \"untanzbar\" bezeichnete, beiseite zu legen. Reisinger begann sogar, Tänze zu Musik anderer Komponisten zu choreografieren, aber Tschaikowsky protestierte und seine Stücke wurden wieder aufgenommen."
 elgar.1132.t: "Symphony No. 6 'Pathétique\""
 elgar.1132.f: "\"Ich bin jetzt ganz und gar mit dem neuen Werk beschäftigt ... und es fällt mir schwer, mich davon loszureißen. Ich glaube, dass es als das beste meiner Werke zustande kommt. Ich muss es so schnell wie möglich vollenden, denn ich habe viele Angelegenheiten zu erledigen und muss bald nach London gehen. Ich sagte Ihnen, dass ich eine Symphonie vollendet hatte, die mir plötzlich nicht mehr gefiel, und ich zerriss sie. Jetzt habe ich eine neue Sinfonie komponiert, die ich sicher nicht zerreißen werde.\"\n\nZwei Jahre nach der Uraufführung seiner Symphonie Nr. 5 e-Moll op. 64 plante Tschaikowsky, wie er an einen Freund schrieb, \"eine großartige Symphonie zu schreiben, die den Schlussstein meines gesamten Werkes bilden wird\". Der Komponist gab dem Werk den Titel \"Die leidenschaftliche Symphonie\". Charakteristisch für das Werk ist der für Sinfonien ungewöhnlich langsame Schlusssatz, dessen Ende an ein Requiem erinnert."
 elgar.1133.t: "Violinkonzert in D-Dur"
 elgar.1133.f: "Das Violinkonzert in D-Dur ist das einzige Violinkonzert des russischen Komponisten Pjotr Iljitsch Tschaikowsky. Tschaikowsky schrieb das Konzert im März und April 1878 in Clarens, einer Weinbaugemeinde am Genfer See. Dort erholte er sich von Depressionen und einem schweren Nervenzusammenbruch. Die positive Wirkung seines Aufenthalts spiegelte sich in dem Konzert wider, in dem sich seine neu gewonnene Lebensfreude manifestierte. Nach drei Wochen war die Komposition abgeschlossen, obwohl Tschaikowsky den ursprünglich geplanten Mittelsatz durch das als \"Canzonetta\" bekannte Andante ersetzte. Die Musikkritiker reagierten negativ auf das Werk. Tschaikowsky reagierte gelassen und war überzeugt, dass sich das Konzert durchsetzen würde. Bis heute ist es eines der berühmtesten, meistaufgeführten und meistgespielten Violinkonzerte der Welt."
 elgar.1141.t: "Pomp & Circumstance"
 elgar.1141.f: "Die Pomp and Circumstance Military Marches sind eine Serie von fünf (oder sechs) Märschen für Orchester. Sie umfassen einige von Elgars bekanntesten Kompositionen. Der bekannteste der sechs Märsche, Pomp And Circumstance March No. 1 In D, wurde zusammen mit March No. 2 am 19. Oktober 1901 in Liverpool uraufgeführt. Elgar und seine Frau nahmen daran teil, und es war ein \"frenetischer\" Erfolg. Das Trio enthält die Melodie, die als \"Land of Hope and Glory\" bekannt ist. Im Jahr 1902 wurde die Melodie in abgewandelter Form für den Abschnitt \"Land of hope and glory\" seiner Krönungs-Ode für König Edward VII. wiederverwendet. Der Text wurde weiter abgeändert, um ihn an die ursprüngliche Melodie anzupassen, und das Ergebnis ist seitdem ein fester Bestandteil der Last Night of the Proms sowie eine englische Sporthymne und ein allgemeines patriotisches Lied geworden."
 elgar.1141.g: "Land of Hope and Glory!"
 elgar.1142.t: "The Crown of India"
 elgar.1142.f: "The Crown of India war eine Maske, eine aufwendige Theateraufführung, die 1912 zur Feier des Besuchs von König Georg V. und Königin Mary in Delhi anlässlich ihrer Krönung zum Kaiser und zur Kaiserin von Indien im vorangegangenen Dezember aufgeführt wurde. Für diese Maske schrieb der englische Komponist Sir Edward Elgar die Musik, das Libretto stammte von Henry Hamilton. Die Maske bestand aus zwei Tableaus: \"The Cities of Ind\" und \"Ave Imperator!\". Später nahm Elgar fünf der Stücke heraus und fügte ein Intermezzo für Solovioline hinzu, um die Crown of India Suite zu schaffen. Die Suite wurde sofort populär: Zu Lebzeiten Elgars wurde sie 102 Mal live von der BBC aufgeführt."
 elgar.1143.t: "Enigma-Variationen"
 elgar.1143.f: "Die Enigma-Variationen sind ein Orchesterwerk, das in 14 Variationen die Menschen aus Elgars Umfeld beschreibt. Sie machten Elgar nach ihrer Uraufführung durch den Dirigenten Hans Richter international bekannt. Das \"Enigma\" aus dem Titel bezieht sich nicht auf die Zuordnung, welche Variation welchem Freund gewidmet ist, sondern auf ein anderes Rätsel. Laut Elgar gibt es ein anderes, größeres Thema, das sich durch die ganze Komposition zieht, aber nicht gespielt wird, und das eigentliche Thema ist als Gegenmelodie dazu komponiert. Bisher sind verschiedene Theorien aufgestellt worden. Vor allem die 9. Variation (Nimrod) erlangte große Popularität."
 elgar.1151.t: "Die 9. Symphonie"
 elgar.1151.f: "1892 zog Dvořák in die Vereinigten Staaten und wurde Direktor des National Conservatory of Music of America in New York City. Während seines Aufenthalts in den Vereinigten Staaten schrieb Dvořák eines seiner erfolgreichsten Orchesterwerke: die Symphonie \"Aus der Neuen Welt\", die seinen Ruf weltweit verbreitete. Es heißt, Dvořák habe sich von den \"weiten Räumen\" Amerikas inspirieren lassen, etwa von den Prärien, die er auf seiner Reise nach Iowa im Sommer 1893 gesehen haben mag. Dvořák wurde auch durch den Stil und die Techniken früherer klassischer Komponisten wie Beethoven und Schubert beeinflusst. Die fallenden Quarten und Paukenschläge im Scherzo-Satz der Neue-Welt-Symphonie erinnern an das Scherzo von Beethovens Symphonie Nr. 9. Bei der Uraufführung in der Carnegie Hall wurde das Ende jedes Satzes mit donnerndem Beifall bedacht, und Dvořák sah sich gezwungen, aufzustehen und sich zu verbeugen."
 elgar.1152.t: "Slawische Tänze"
 elgar.1152.f: "Die Slawischen Tänze sind eine Sammlung von 16 Instrumentalstücken von Antonín Dvořák, die für Klavier zu vier Händen geschrieben und jeweils kurz darauf für Orchester bearbeitet wurden. Sie gehören zu den berühmtesten Werken des tschechischen Komponisten. Dvořáks Kompositionen verwenden charakteristische rhythmische Muster der böhmischen und mährischen Volkstänze sowie der Tänze der Nachbarländer. Dennoch sind sie völlig eigenständige Schöpfungen des Komponisten. In der ersten Reihe finden sich zwei durch Rhythmuswechsel gekennzeichnete Furiants, zwei dem Ländler ähnliche Sousedskás, zwei Skočnás (schneller Springtanz), eine Polka und, als einziger nicht-tschechischer Tanz, eine ukrainische Dumka. In der zweiten Serie überwiegen die nicht-tschechischen Tänze, weshalb Dvořák einigen Anfeindungen ausgesetzt war. Man warf ihm vor, sich nicht genug mit seiner Heimat zu identifizieren und sich stattdessen im Ausland beliebt machen zu wollen."
 elgar.1153.t: "Rusalka"
 elgar.1153.f: "Rusalka ist die erfolgreichste Oper von Antonín Dvořák. Sie entstand auf der Grundlage eines Librettos von Jaroslav Kvapil und geht auf slawische Volksmythen über die Rusalky (Wassergeister, Meerjungfrauen) zurück und ähnelt der deutschen Geschichte Undine von Friedrich de la Motte Fouqué, Hans Christian Andersens Märchen Die kleine Meerjungfrau und der altfranzösischen Melusine-Sage. Die Oper mit dem Untertitel Lyrisches Märchen ist auch als \"tschechische Undine\" bekannt. Zusammen mit Bedřich Smetanas Die verkaufte Braut ist Rusalka die berühmteste tschechische Oper. Die Oper Rusalka nimmt einen herausragenden Platz in der Entwicklung der tschechischen dramatischen Musik ein."
 elgar.1161.t: "Fantasie in C-Dur"
 elgar.1161.f: "Die Fantasie in C-Dur ist eine der wichtigsten Klavierkompositionen Robert Schumanns. Zusammen mit den Kreisleriana und den Kinderszenen gehört sie zu den bekanntesten Stücken des Komponisten und gehört zum Kernbestand der romantischen Klavierliteratur. Er widmete es Franz Liszt, dem bewunderten Virtuosen, der sich Jahre später bei ihm bedankte, indem er ihm seine große h-Moll-Sonate schenkte. Der visionäre Schwung dieser Klavierfantasie und die über die gesamte Komposition anhaltende Kraft erinnern an die architektonische Meisterschaft Ludwig van Beethovens, aus dessen Liederzyklus \"An die ferne Geliebte\" Schumann im ersten Satz mehrfach zitiert, während er im dritten Satz ein Thema aus dem Allegretto der 7. Sinfonie aufgreift."
 elgar.1162.t: "Klavierkonzert in a-Moll"
 elgar.1162.f: "Das Klavierkonzert in a-Moll op. 54 ist ein romantisches Solokonzert für Klavier und Orchester, das in der Zeit der Hochromantik geschrieben wurde. Es weist viele Merkmale der romantischen Epoche auf. Wie einige andere Klavierkonzerte des 19. Jahrhunderts hat auch das a-Moll-Konzert einen symphonischen Charakter. Da das Werk ursprünglich als Fantasie konzipiert war, wirkt das gesamte Konzert romantisch und fantastisch. Für die verspätete Fertigstellung benötigte Schumann über fünf Jahre. Auf dem Titelblatt des Autographs verweist Schumann auf die verschiedenen Entstehungszeiten der Sätze. Die Grundgedanken des Werkes sind die Sehnsucht und das Glück zweier verliebter Menschen. In diesem Werk setzt Schumann seinen Kampf um Clara Wieck in Musik um. Das Hauptthema des ersten Satzes ähnelt der Melodie der Florestan-Arie aus Beethovens Oper Fidelio. Übereinstimmend mit Beethoven steht dieses Thema auch bei Schumann für eheliche Treue und den Kampf um die Freiheit."
 elgar.1163.t: "Kinderszenen"
 elgar.1163.f: "Die Kinderszenen sind ein Zyklus von Robert Schumann, der aus dreizehn kurzen Klavierstücken besteht. Im Gegensatz zum \"Album für die Jugend\" handelt es sich dabei um Stücke, die nicht für Kinder komponiert wurden, sondern, in Schumanns eigenen Worten, als \"Spiegelbild eines älteren Menschen für ältere Menschen\". Das berühmteste und längste Stück des Zyklus ist die \"Träumerei\". Mit einer Spieldauer von knapp 20 Minuten gehören die Kinderszenen heute zu den beliebtesten romantischen Klavierwerken. Obwohl die Kinderszenen zu Schumanns Lebzeiten nicht besonders erfolgreich waren, hatte das Werk zumindest für ihn eine besondere Bedeutung. Ein Briefwechsel aus dem Jahr 1839 zeigt, dass Schumann damals fest an die Möglichkeit einer ehelichen Verbindung mit Clara Wieck glaubte und dass die Kinderszenen seiner optimistischen und heiteren Seite entsprangen."
 elgar.1171.t: "Violinkonzert in e-Moll"
 elgar.1171.f: "Felix Mendelssohns Violinkonzert in e-Moll ist sein letztes Konzert. Bei seiner Uraufführung fand es großen Anklang und gehört bis heute zu den bekanntesten und am meisten beachteten Violinkonzerten. Es nimmt einen zentralen Platz im Violinrepertoire ein und hat sich den Ruf erworben, ein unverzichtbares Konzert für alle angehenden Konzertgeiger zu sein, das sie in der Regel als eines der ersten Konzerte der romantischen Ära lernen. Obwohl das Konzert aus drei Sätzen in der üblichen schnell-langsam-schnell-Struktur besteht und jeder Satz einer traditionellen Form folgt, war es innovativ und enthielt viele neuartige Merkmale für seine Zeit. Zu den charakteristischen Aspekten gehört der fast unmittelbare Einsatz der Violine zu Beginn des Werks - und nicht, wie in den Konzerten der Klassik üblich, eine Orchestervorschau auf die Hauptthemen des ersten Satzes."
 elgar.1181.t: "Ètudes"
 elgar.1181.f: "Frédéric Chopin schrieb insgesamt 27 Etüden für Klavier: 12 Etüden op. 10 (veröffentlicht 1833), 12 Etüden op. 25 (veröffentlicht 1837) und drei weitere Etüden für den dritten Teil (Études de perfectionnement pour le piano, veröffentlicht 1840) der Klavierschule Méthodes des Méthodes von Ignaz Moscheles und François-Joseph Fétis. Die drei Etüden wurden später separat unter dem Titel Trois nouvelles études veröffentlicht. Als \"Magna Carta des Klavierspiels\" (Karl Schumann) gehören sie zu den wichtigsten Klavierkompositionen der Musikgeschichte. Große Klavierkomponisten wie Alkan, Skrjabin, Debussy und Rachmaninoff orientierten sich an ihnen. Franz Liszt und Józef Wieniawski waren die ersten Pianisten, die Chopin-Etüden öffentlich aufführten."
 elgar.1191.t: "Ein Leben für den Zar"
 elgar.1191.f: "Nachdem er jahrelang Sängern zugehört, Frauen mit seiner Musik umgarnt und berühmte Leute wie Mendelssohn, Berlioz und Liszt getroffen hatte, erkannte Glinka, dass es seine Lebensaufgabe war, nach Russland zurückzukehren, auf russische Art zu schreiben und für die russische Musik das zu tun, was Donizetti und Bellini für die italienische Musik getan hatten. Ein Leben für den Zaren war die erste von Glinkas zwei großen Opern. Sie trug ursprünglich den Titel Iwan Susanin. Sie spielt im Jahr 1612 und erzählt die Geschichte des russischen Bauern und patriotischen Helden Iwan Susanin, der sein Leben für den Zaren opfert, indem er eine Gruppe marodierender Polen, die ihn jagten, in die Irre führt. Mit dieser Oper gelang es Glinka, eine eigenständige russische Musik zu schaffen; sie gilt als die erste russische Oper."
 elgar.1192.t: "Ruslan und Ljudmila"
 elgar.1192.f: "Ruslan und Ludmila ist eine \"fantastische Oper\" in fünf Akten mit Musik von Michail Glinka und einem Libretto von Nestor Kukolnik u. a. nach dem gleichnamigen Gedicht von Alexander Sergejewitsch Puschkin. Der Tod Puschkins bei dem berühmten Duell hinderte ihn daran, das Libretto wie geplant selbst zu schreiben. Wie schon bei \"Ein Leben für den Zaren\" verwendet Ruslan einige Aspekte der russischen Volksmusik; es zeichnet sich außerdem durch den fantasievollen Einsatz von Dissonanzen, Chromatik und östlichen Elementen aus. Von besonderer Bedeutung ist die Verwendung der Ganztonleiter, die zum ersten Mal in der russischen Musik verwendet wurde. Die ausgelassene Ouvertüre ist eines der bekanntesten orchestralen Paradestücke im Westen und bekannt dafür, dass sie für Bassisten ein Alptraum ist."
 elgar.1193.t: "Kamarinskaya"
 elgar.1193.f: "Kamarinskaya ist ein traditioneller russischer Volkstanz, der heute vor allem durch die gleichnamige Komposition des russischen Komponisten Michail Glinka bekannt ist. Glinkas Kamarinskaja aus dem Jahr 1848 war das erste Orchesterwerk, das vollständig auf russischen Volksliedern basierte und die Kompositionsprinzipien dieses Genres für die Form der Musik nutzte. Es wurde zu einem Prüfstein für die nachfolgende Generation russischer Komponisten, angefangen bei dem westlich orientierten Pjotr Iljitsch Tschaikowski bis hin zur Gruppe der Nationalisten, die unter dem Namen Die Fünf bekannt sind, und wurde auch im Ausland gelobt, insbesondere von dem französischen Komponisten Hector Berlioz. Für Tschaikowsky bot Kamarinskaja ein praktikables Beispiel für die kreativen Möglichkeiten von Volksliedern in einer symphonischen Struktur, die eine Vielzahl von harmonischen und kontrapunktischen Kombinationen verwendet."
 elgar_great_composer: "Großer Komponist"
 elgar_great_composer_desc: "Große Komponisten sind die Crème de la Crème der Komponisten. Sie sind einfach die Besten und sind in der ganzen Welt bekannt."
