 elgar_faido_modifier: "Fado-Musikkultur"
 elgar.535.t: "Der Klang der Saudade"
 elgar.535.d: "Aus den engen Gassen von Lissabon und den Tavernen von Alfama kommt eine neue Musikform - schwermütig, rau und zutiefst portugiesisch. Sie wird Fado genannt."
 elgar.535.f: "In den ersten Jahrzehnten des 19. Jahrhunderts hatte sich in den Arbeitervierteln und Hafenvierteln Lissabons ein ganz eigenes Genre etabliert. Fado - wörtlich \"Schicksal\" - wurde von Matrosen, Prostituierten und den städtischen Armen gesungen, oft begleitet vom leisen Weinen der portugiesischen guitarra. Die Texte sprachen von Sehnsucht, Resignation und Nostalgie, was die Einheimischen saudade nannten - ein Gefühl, das zu komplex ist, um es zu übersetzen.\n\nObwohl der Fado anfangs als vulgäre Straßenmusik abgetan wurde, erlangte er allmählich künstlerische Seriosität. Aristokraten begannen, Fadistas in ihre Salons einzuladen, und in den 1840er Jahren waren öffentliche Aufführungen in Lissabons Musiksälen üblich. Eine neue musikalische Identität nahm Gestalt an - eine einzigartige portugiesische Identität, die die Sorgen und den Stolz einer sich verändernden Nation widerspiegelte."
 elgar.535.g: "Der Fado soll als Symbol der nationalen Identität gedeihen."
 elgar.535.h: "Förderung von Formalisierung und professioneller Leistung."
