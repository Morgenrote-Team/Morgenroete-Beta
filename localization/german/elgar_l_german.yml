 elgar.801.d:1 "Mit dem wachsenden Nationalgefühl in unserem Volk wächst heute nicht nur unter den Intellektuellen, sondern auch in breiten Schichten der Bevölkerung der Wunsch nach einer Nationalhymne, die den Herrscher, das Land und das Volk angemessen repräsentiert." #1!
 elgar.801.f:1 "Schon vor der Mitte des 19. Jahrhunderts gab es in Europa und Amerika viele Länder, die bei offiziellen Anlässen bestimmte Lieder spielten, oft um den Monarchen zu repräsentieren. Manche Hymnen wurden schon früh kodifiziert, andere blieben bis ins 20. Jahrhundert inoffiziell. Manche Länder beginnen daher mit vorgegebenen Nationalhymnen, die sich durch eine Revolution oder Verfassungsänderungen ändern können. Viele Länder wiederum müssen ihre Nationalhymnen von Grund auf neu erfinden – Komponisten und Texter können dabei wertvolle Hilfe leisten." #1!
 elgar.801.g:1 "Darum kümmern wir uns später." #1!
 elgar.801.h:1 "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_monarch_anthem')]" #1!
 elgar.801.i:1 "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_folk_anthem')]" #1!
 elgar.801.j:1 "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_value_anthem')]" #1!
 elgar.801.k:1 "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_military_anthem')]" #1!
 elgar.801.l:1 "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_worker_anthem')]" #1!
 elgar.801.m:1 "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_internationale_anthem')]" #1!
 elgar.802.t:1 "Veraltete Nationalhymne" #1!
 elgar.802.d:1 "Nach den jüngsten Gesetzesänderungen scheint die bisherige Nationalhymne nicht mehr zeitgemäß. Viele interpretieren sie als anachronistisches Relikt eines vergangenen politischen Systems. Der Druck, den Ballast loszuwerden, wächst." #1!
 elgar.802.f:1 "\"Wir haben einen Admiral ohne Flotte. Er regiert ein Land ohne Küste. Dies ist ein Königreich ohne König.\"" #1!
 elgar.802.g:1 "Diese Hymne repräsentiert unser Land nicht mehr." #1!
 elgar.803.t:1 "Reaktionäre Hymne" #1!
 elgar.803.d:1 "Immer lauter werden die Stimmen, die bisherige Nationalhymne abzuschaffen. Führende Politiker fordern stattdessen ein neues Lied, das die Errungenschaften des modernen Staates, für den [ROOT.GetCountry.GetNameNoFormatting] steht, deutlicher hervorhebt." #1!
 elgar.803.f:1 "\"Vorwärts, Volk, der Erlösung entgegen.\nRote Fahne, Rote Fahne.\nVorwärts, Volk, der Erlösung entgegen.\nDie Rote Fahne wird triumphieren.\nDie Rote Fahne wird triumphieren,\nDie Rote Fahne wird triumphieren,\nDie Rote Fahne wird triumphieren,\nEs lebe der Kommunismus und die Freiheit.\"" #1!
  
 elgar.811.t:1 "Die Hymne von [ROOT.GetCountry.GetNameNoFormatting]" #1!
 elgar.811.d:1 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] erließ ein Dekret, wonach bei offiziellen Anlässen ein bestimmtes Musikstück gespielt werden solle. Die Wahl fiel auf..." #1!
  
 elgar.821.t:1 "Musik für [ROOT.GetCountry.GetNameNoFormatting]" #1!
 elgar.821.d:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] erkundigte sich, ob es besondere Wünsche bezüglich der zu verfassenden Arbeit gebe und welcher Aspekt besondere Beachtung verdiene." #1!
 elgar.821.f:1 "Insgesamt gibt es fünf Kategorien von Nationalhymnen. Monarchenhymnen verbessern die Legitimität, Volkshymnen mindern Unruhen, Wertehymnen erhöhen die Loyalität zu besseren Lebensbedingungen und machen die Bürger zugleich widerstandsfähiger gegen Verschlechterung, während Militärhymnen die Verteidigungskraft einer Nation stärken. Räterepubliken können Arbeiterhymnen in Auftrag geben, die die politische Macht von Gewerkschaften stärken. Je nach Staatsform ist nicht jede Hymne möglich." #1!
 elgar.821.g:1 "Die Hymne soll unseren Monarchen preisen." #1!
 elgar.821.h:1 "Ein populäres Volkslied soll eine Bindung zwischen Regierung und Volk herstellen." #1!
 elgar.821.i:1 "Komponieren Sie eine erhabene Hymne, die die Werte unseres Landes repräsentiert." #1!
 elgar.821.j:1 "Wir brauchen ein Lied, das unser Volk im Kampf motiviert!" #1!
 elgar.821.k:1 "Akzeptabel ist nur ein Arbeiterlied, das das Proletariat verherrlicht." #1!
  
 elgar.822.t:1 "Hymnenmelodie fertiggestellt" #1!
 elgar.822.d:1 "Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] hat heute die Partitur für [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]en Vorschlag für eine mögliche neue Nationalhymne vorgestellt. Es ist noch unklar, ob der Staat sie tatsächlich akzeptieren wird." #1!
 elgar.822.f:1 "Es gibt zahlreiche Hymnen, die nie zur Nationalhymne wurden. Die Gründe dafür sind vielfältig. Der Staat muss sie noch immer genehmigen. Darüber hinaus sind Nationalhymnen, die sowohl eine originelle Melodie als auch einen originellen Text haben, stärker." #1!
 elgar.822.g:1 "Hoffentlich findet sie Akzeptanz bei den Leuten..." #1!
  
 elgar.831.t:1 "Hymnentexte fertiggestellt" #1!
 elgar.831.d:1 "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] hatte schon lange die Möglichkeit in Betracht gezogen, dass dieses LAND einen würdigen Text für seine Nationalhymne brauchen könnte. Der Schriftsteller schrieb schnell die passenden Worte für die seit langem bekannten Noten." #1!
 elgar.831.f:1 "\"---------\" -La Marcha Real" #1!
  
