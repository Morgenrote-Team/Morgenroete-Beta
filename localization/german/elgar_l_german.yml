 elgar.91.t:1 "Tivoli Glashalle" #1!
 elgar.91.d:1 "Die Tivoli-Gärten erfreuen sich seit Jahren großer Beliebtheit bei den Kopenhagener Bürgern. Es ist geplant, eine Konzerthalle für rund 1'000 Personen zu bauen, um das Publikum mit anregender Musik zu unterhalten." #1!
 elgar.91.f:1 "Ein Konzertsaal gehörte zu den Attraktionen, als der Tivoli-Garten 1843 seine Tore öffnete. Es handelte sich um ein rechteckiges, hölzernes Gebäude, das von Harald Conrad Stilling entworfen wurde. Hans Christian Lumbye war von 1843 bis 1872 Musikdirektor und Chefdirigent. Er schrieb fast 700 Kompositionen für das Orchester, insbesondere Polkas, Walzer und Galoppe. Der Konzertsaal wurde 1863 von Johan Andreas Stillmann erweitert." #1!
 elgar.91.g:1 "Ich hoffe, dass Herr Lumbye mit seinen berühmten Galoppe auftauchen wird!" #1!
 elgar.92.t:1 "Gran Teatro Nacional" #1!
 elgar.92.d:1 "Mit dem Plan, ein großes Opernhaus in Mexiko-Stadt zu bauen, plant die Regierung eines der größten Bauprojekte in der Geschichte des Landes." #1!
 elgar.92.f:1 "Das Theater wurde zwischen 1840 und 1844 von dem Architekten Lorenzo de la Hidalga in Mexiko-Stadt erbaut. Historiker betrachten es als das wichtigste architektonische Werk in Mexiko-Stadt zwischen der Fertigstellung der Metropolitan-Kathedrale und dem Bau des Palacio de Bellas Artes. Das Große Nationaltheater wurde in einer der Amtszeiten von Antonio López de Santa Anna als Präsident eingeweiht. Sein Name änderte sich nach und nach, vom Großen Theater von Santa Anna in Großes Theater Vergara, dann Großes Imperiales Theater und schließlich Großes Nationaltheater. Während der Opernsaison 1852 wurden 17 Opern uraufgeführt und mehr als 60 Aufführungen geboten." #1!
 elgar.93.t:1 "Teatro Amazonas" #1!
 elgar.93.d:1 "Aufgrund des Booms, den die Region durch den Kautschukanbau erlebt, soll Manaus ein opulentes Opernhaus erhalten - mitten im Dschungel!" #1!
 elgar.93.f:1 "Das Amazonas-Theater wurde während der Belle Époque gebaut, als der Kautschukboom ein Vermögen einbrachte. Der Bau des Amazonas-Theaters wurde erstmals 1881 von einem Mitglied des örtlichen Repräsentantenhauses, Antonio Jose Fernandes Júnior, vorgeschlagen, der sich ein "Juwel" im Herzen des Amazonas-Regenwaldes vorstellte. Der architektonische Stil des Theaters wird als typisch für das Renaissance-Revival angesehen. Die Dachziegel wurden aus dem Elsass importiert, die Stahlwände aus Glasgow, Schottland, und der Carrara-Marmor für die Treppen, Statuen und Säulen aus Italien. Die Kuppel ist mit 36.000 dekorierten Keramikfliesen in den Farben der brasilianischen Nationalflagge bedeckt. Die Inneneinrichtung stammt aus Frankreich und ist im Louis-Quinze-Stil gehalten. Der italienische Künstler Domenico de Angelis der Jüngere malte die Paneele, die die Decken des Auditoriums und des Zuschauerraums schmücken." #1!
  
 elgar.101.t:1 "Ein Monument für Beethoven" #1!
 elgar.101.d:1 "Einem Aufruf des Komponisten Robert Schumann folgend, sprachen sich mehrere Intellektuelle, aber auch Bürger, Patrioten und Kunstinteressierte für die Errichtung eines Denkmals für Ludwig van Beethoven in Bonn aus." #1!
 elgar.101.f:1 "\"Das Mausoleum der zukünftigen Erinnerung steht schon persönlich vor mir - ein einigermaßen hoher Quader, darauf eine Leier mit Geburts- und Todesjahr, darüber der Himmel und daneben ein paar Bäume. Ein ganzes Volk, das sich einem Beethoven gegenübersieht, der es auf jeder Seite Größe und Stolz lehrt, sollte das nicht in der Lage sein, ihm ein tausendmal größeres Denkmal zu errichten? Wenn ich ein Fürst wäre, würde ich ihm einen Tempel im palladianischen Stil errichten! Ihn in einer gigantischen Gestalt formen, wie den heiligen Borromäus am Lago Maggiore, damit er, wie im Leben, über Berg und Berge schauen kann - und wenn die Rheinschiffe vorbeifahren und die Fremden fragen: Was bedeutet der Riese, dann kann jedes Kind antworten: Beethoven ist das - und sie werden denken, es sei ein deutscher Kaiser. Mit einem Wort: Steh auf, lass dein Phlegma los und bedenke, dass das Denkmal dein eigenes sein wird!\" - Robert Schumann" #1!
 elgar.101.g:1 "Beethoven war ein deutscher Titan der Musik!" #1!
 elgar.101.h:1 "Wir freuen uns, dass wir dieses kulturell wertvolle Projekt finanzieren können." #1!
 elgar.101.i:1 "Er kann nicht so großartig gewesen sein, wenn er nicht vorher ein Denkmal hatte." #1!
 elgar.102.t:1 "Vorbereitung des Beethovenfestes" #1!
 elgar.102.d:1 "Die letzten Arbeiten am Beethoven-Denkmal sind abgeschlossen. Jetzt ist es an der Zeit, sich auf die Einweihungsfeier vorzubereiten." #1!
 elgar.102.f:1 "Das Beethovenfest zur Einweihung des Beethoven-Denkmals war ein musikalisches Großereignis von internationalem Rang. Neben dem preußischen König war auch die britische Königin Victoria eingeladen, Geistesgrößen wie Alexander von Humboldt gehörten zu den Gästen, und Komponisten vom Range eines Hector Berlioz, Giacomo Meyerbeer und vor allem Franz Liszt prägten die vier Tage. Tausende von Menschen sollten an den Festspielen teilnehmen, was die kleine Stadt Bonn vor große Probleme stellte." #1!
 elgar.102.g:1 "Verschicken Sie die Einladungen!" #1!
 elgar.103.t:1 "Einladung zum Beethovenfest" #1!
 elgar.103.d:1 "Unsere Regierung hat eine offizielle Einladung zum Beethovenfest in Bonn erhalten, wo das Denkmal des Komponisten enthüllt werden soll." #1!
 elgar.103.g:1 "Wir werden gerne teilnehmen." #1!
 elgar.103.h:1 "Klassische Musik ist überbewertet." #1!
 elgar.104.t:1 "Bau der Beethovenhalle" #1!
 elgar.104.d:1 "Aufgrund der hohen Besucherzahlen schlug Franz Liszt vor, Männer und Material von der Baustelle des Kölner Doms nach Bonn umzuleiten, um in Rekordzeit einen Festsaal zu bauen." #1!
 elgar.104.f:1 "Die offizielle Enthüllung des Beethoven-Denkmals sollte der Höhepunkt eines dreitägigen Beethovenfestes sein. Einen Monat vor Beginn des Festes gab es keinen geeigneten Veranstaltungsort, um die erwarteten 3.000 Besucher unterzubringen. Auf Liszts Drängen hin, und erst nachdem er angeboten hatte, die gesamten Kosten selbst zu tragen, beauftragte das Komitee einen Architekten und Bauunternehmer mit dem Bau der Beethovenhalle. Als sie schließlich mit dem Bau begannen, hatten sie weniger als zwei Wochen Zeit und mussten rund um die Uhr arbeiten, um ihn rechtzeitig fertig zu stellen. Franz Liszt sprach auch mit den Bauleuten des Kölner Doms. Holz wurde von Köln über den Rhein nach Bonn verladen. Auch die in Köln gefertigten Dekorationen kamen so schnell nach Bonn. In nur elf Tagen wurde ein Festsaal aus dem Nichts geschaffen." #1!
 elgar.104.g:1 "Herrlich." #1!
 elgar.105.t:1 "Das Beethovenfest" #1!
 elgar.105.d:1 "Nach vier Tagen hochkarätiger Musik kann das Beethovenfest als voller Erfolg gewertet werden, auch wenn Veranstaltungen dieser Größenordnung nicht ohne Skandale auskommen." #1!
 elgar.105.f:1 "Die Zeremonie verlief nicht ohne heikle Momente. Das Beethoven-Monument wandte den wichtigsten Gästen, König Friedrich Wilhelm IV. von Preußen und der britischen Königin Victoria, die auf dem Balkon des Schlosses Fürstenberg Platz genommen hatten, den Rücken zu. Alexander von Humboldt rettete den Tag mit der Bemerkung, Beethoven sei schon immer ein unhöflicher Kerl gewesen. Noch peinlicher war die Tatsache, dass Liszt während der Trinksprüche beim Festbankett im "Goldenen Stern" das französische Kontingent unter der Leitung von Berlioz brüskierte und beinahe einen Aufruhr verursachte. Das Bankett wurde durch das Verhalten von Lola Montez gestört, die auf einem Tisch tanzte und Liszt in Verlegenheit brachte, indem sie darauf bestand, sein Gast bei den Feierlichkeiten zu sein, und einen ihrem Status entsprechenden Sitzplatz verlangte, womit sie die vororganisierte Sitzordnung durcheinander brachte." #1!
 elgar.105.g:1 "Beethoven kehrt uns den Rücken zu?" #1!
 elgar.105.h:1 "Alexander von Humboldt ist ein Gentleman." #1!
 elgar.105.i:1 "Diese Deutschen haben keine Eleganz." #1!
 elgar.105.j:1 "Das war sehr inspirierend." #1!
 elgar.106.t:1 "Liszt-Kantate" #1!
 elgar.106.d:1 "Franz Liszt hatte die große Ehre, die Kantate für die Einweihung des Beethoven-Denkmals zu schreiben und öffentlich aufzuführen." #1!
 elgar.106.f:1 "Wie dem auch sei, seine Kantate, die wirklich gut vorgetragen und von dreieinhalb Teilen des Saals mit warmem Beifall bedacht wurde, ist eine große und schöne Sache, die Liszt unter den Komponisten sehr hoch erhebt. Der Ausdruck ist wahrhaftig, die Intonation richtig, der Stil erhaben und neu, die Form gut durchdacht und pflichtbewusst ausgeführt, die Instrumentation bemerkenswert durch ihre Kraft und Vielfalt. Es gibt in seinem Orchester nie eine Aufeinanderfolge der gleichen Töne, was gewisse Werke, die man einst schätzte, für den Hörer so ermüdend macht; er weiß die kleinen und großen Mittel zu gebrauchen, er überfordert weder die Instrumente noch die Stimmen; mit einem Wort, er hat mit einem Schlag gezeigt, dass er in der Instrumentation und in den anderen Teilen der musikalischen Kunst Stil hat, denn man fürchtete, er hätte ihn noch nicht gefunden. - Hector Berlioz" #1!
 elgar.106.g:1 "Hoch lebe er! Hoch lebe Beethoven, hoch lebe er!" #1!
 elgar.107.t:1 "Berlioz beim Beethovenfest" #1!
 elgar.107.d:1 "Die Feierlichkeiten anlässlich der Enthüllung des Beethoven-Denkmals haben den Komponisten Hector Belrioz sehr inspiriert." #1!
 elgar.107.f:1 "\"Während dieser Reise nach Österreich, Ungarn, Böhmen und Schlesien begann ich mit der Komposition meiner Faust-Legende, über die ich schon seit langem nachgedacht hatte. Sobald ich mich entschlossen hatte, sie in Angriff zu nehmen, musste ich mich damit begnügen, auch den größten Teil des Librettos selbst zu schreiben; die Fragmente der französischen Übersetzung von Goethes Faust durch Gérard de Nerval, die ich schon vor zwanzig Jahren vertont hatte und die ich in einer revidierten Fassung in die neue Partitur aufnehmen wollte, und zwei oder drei andere Szenen, die M. Gandonnière vor meiner Abreise aus Paris nach meinen Anweisungen geschrieben hatte, machten nicht einmal ein Sechstel des gesamten Werkes aus. Während der Reise in der alten deutschen Postkutsche versuchte ich daher, die für meine Musik vorgesehenen Verse zu schreiben. Ich begann mit Fausts Anrufung der Natur, ohne zu versuchen, Goethes Meisterwerk zu übersetzen oder gar zu imitieren, sondern nur, um mich von ihm inspirieren zu lassen und die darin enthaltene musikalische Substanz herauszuziehen. Als ich einmal angefangen hatte, schrieb ich die restlichen Verse, wie es mir gerade in den Sinn kam, und ich komponierte die Partitur mit einer Leichtigkeit, die ich bei meinen anderen Werken selten erlebt habe.\" - Hector Berlioz" #1!
 elgar.107.g:1 "Hat sich die Reise also gelohnt?" #1!
 elgar.108.t:1 "Victoria besucht den Kölner Dom" #1!
 elgar.108.d:1 "Die britische Königin Victoria nahm ihren Aufenthalt im Rheinland zum Anlass, den Kölner Dom zu besuchen und sich über den gerade begonnenen Dombau zu informieren." #1!
 elgar.108.f:1 "Der frühe Abschied der königlichen Gesellschaft vom Konzert war darauf zurückzuführen, dass am Nachmittag eine Führung durch den Kölner Dom stattfand, die unter festlichem Glockengeläut stattfand. Anschließend begaben sich die Majestäten durch den Haupteingang des Mittelschiffs in den Chor, in dem eine Festkantate des Kölner Männergesangvereins mit Orgelbegleitung von Musikdirektor Weber aufgeführt wurde." #1!
 elgar.108.g:1 "Wir fühlen uns geehrt." #1!
  
 elgar.111.t:1 "Ein Monument für Mozart" #1!
 elgar.111.d:1 "Die Vorbereitungen für die Errichtung eines Denkmals für Wolfgang Amadeus Mozart sind in vollem Gange. Es werden jedoch noch Spenden gesammelt." #1!
 elgar.111.f:1 "1835 regte der aus Posen im heutigen Polen stammende Schriftsteller Julius Schilling an, dem damals in Salzburg relativ unbekannten Mozart ein Denkmal auf dem heutigen Mozartplatz zu setzen. Bedeutende Förderer im Ausland, aber auch in Wien, unterstützten schließlich den Bau des Denkmals. Der bayerische König Ludwig I. von Bayern spendete eine beträchtliche Summe und stiftete den Sockel der Bronzestatue." #1!
 elgar.111.g:1 "Mozart war ein deutscher Titan der Musik!" #1!
 elgar.113.t:1 "Das Mozart-Monument" #1!
 elgar.113.d:1 "Heute wurde das Denkmal für den größten Sohn Slazburgs in seinem Geburtshaus enthüllt." #1!
 elgar.113.f:1 "Das von Ludwig Schwanthaler entworfene und von Johann Baptist Stiglmaier gegossene Denkmal wurde am 5. September 1842 in Anwesenheit der beiden überlebenden Söhne Mozarts, Franz Xaver und Carl Thomas, feierlich eingeweiht. Mozarts Witwe konnte die Einweihung jedoch nicht mehr erleben. Sie war kurz zuvor im Haus am Mozartplatz 8 verstorben. Ein Fest mit Fackelzug, Schifffahrt, Bergbahn, Scheibenschießen und Pferderennen umrahmte die Feierlichkeiten." #1!
 elgar.114.t:1 "Ein lebendiges Denkmal" #1!
 elgar.114.d:1 "In Österreich mehren sich die Bestrebungen, ein Mozart-Denkmal zu errichten. Einige Frankfurter Bürger wollen deshalb ein Benefizkonzert veranstalten - und verbinden die Idee mit politischen Inhalten." #1!
 elgar.114.f:1 "Ursprünglich wollte die Frankfurter Bürgerschaft ein Konzert veranstalten, um genügend Spenden für ein Mozart-Denkmal zu sammeln. Denkmäler für bürgerliche Persönlichkeiten waren in Deutschland ein Novum. Die Errichtung von Denkmälern zu Ehren von nationalen Persönlichkeiten wie Künstlern oder Wissenschaftlern war daher eine willkommene Gelegenheit, patriotische Gefühle auszudrücken. In Frankfurt wurde sogar angeregt, ein nationales Sängertreffen zu veranstalten, dessen Erlös in eine Stiftung für deutsche Musiker zur Förderung des musikalischen Nachwuchses fließen sollte." #1!
 elgar.114.g:1 "Sammeln Sie Geld für unser eigenes lebendiges Denkmal - ein Fest zu Ehren von Mozart!" #1!
 elgar.114.h:1 "Spenden Sie Geld für das Denkmal in Salzburg." #1!
 elgar.115.t:1 "Einladung zum Sängerfest" #1!
 elgar.115.d:1 "Die Frankfurter Bürgerschaft hat patriotische Sängerinnen und Sänger aus unserem Land zu einem Mozart-Festival eingeladen." #1!
 elgar.115.g:1 "Eine musikalische und nationale Gelegenheit." #1!
 elgar.115.h:1 "Ich kann Kunstlieder einfach nicht ausstehen." #1!
 elgar.116.t:1 "Das Mozartfest" #1!
 elgar.116.d:1 "42 rheinische, badische, hessische und fränkische Gesangvereine trafen sich in Frankfurt, um ein dreitägiges Fest der Musik Mozarts zu feiern. Die Veranstaltung entwickelte sich jedoch zu einer Demonstration für die politische Einigung Deutschlands. Das gesammelte Geld wurde für eine Stiftung zur Förderung junger Komponisten aufgebracht." #1!
 elgar.116.f:1 "\"Die Stadt geriet ins Schwärmen. Die Häuser waren bis zu den Dachfenstern mit Menschen gefüllt. Die Mainzer, Hanauer und Offenbacher kamen mit Booten zum Klang der Kanonenschüsse, umgeben von geschmückten Booten mit Musik; durch alle Tore zogen sie ein. Es war ein mächtig ergreifender Anblick, das künstlerische Interesse wurde zweitrangig, aber das Nationale trat mächtig an uns heran; ich will nicht leugnen, dass mir helle Tränen über die Wangen liefen.\" - Heinrich Hoffmann" #1!
 elgar.116.g:1 "Musik bringt die Nation zusammen." #1!
 elgar.117.t:1 "Liberale Störenfriede machen Lärm in Frankfurt" #1!
 elgar.117.d:1 "Es ist uns nicht entgangen, dass einige jakobinisch gesinnte "Patrioten" ein angebliches Mozartfest in Frankfurt für ihre politische Agitation instrumentalisiert haben." #1!
 elgar.117.f:1 "42 rheinische, badische, hessische und fränkische Gesangvereine trafen sich in Frankfurt, um ein dreitägiges Fest der Musik Mozarts zu feiern. Die Veranstaltung entwickelte sich jedoch zu einer Demonstration für die politische Einigung Deutschlands. Ursprünglich sollte die Veranstaltung der Finanzierung des Mozart-Denkmals dienen, doch schon bald änderten die Initiatoren den Zweck der Wohltätigkeitsveranstaltung zu Gunsten ihrer eigenen Stiftung." #1!
 elgar.117.g:1 "Eine Verschwörung gegen die Ordnung im Deutschen Bund!" #1!
 elgar.117.h:1 "Lasst sie singen." #1!
  
 elgar.121.t:1 "Die Gründung des Allgemeinen Deutschen Musikvereins" #1!
 elgar.121.d:1 "Heute wurde in [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] der Allgemeine Deutsche Musikverein gegründet. Es entstand sofort eine Diskussion darüber, ob wir zur Neudeutschen Schule gehören oder ob wir die konservative Idee der Musik verteidigen." #1!
 elgar.121.f:1 "Die Neudeutsche Schule ist ein Begriff, der 1859 von Franz Brendel, dem Herausgeber der Neuen Zeitung für Musik, eingeführt wurde, um bestimmte Tendenzen in der deutschen Musik zu beschreiben. Er wurde von verschiedenen Personen zu verschiedenen Zeiten mit unterschiedlichen Bedeutungen verwendet. Es besteht allgemein Einigkeit darüber, dass Franz Liszt und Richard Wagner zu den prominentesten Vertretern der "Neuedeutschen Schule" gehörten. Es besteht auch Konsens darüber, dass Johannes Brahms nicht daran beteiligt war. Darüber hinaus gehen die Interpretationen auseinander. Der neue Begriff sollte so verstanden werden, dass er die gesamte Periode seit Beethovens Tod bezeichnet. Nach Brendel war es üblich, die Zeit von J.S. Bach und Händel als "Altdeutsche Schule" zu bezeichnen. Die darauf folgende Periode war die der Wiener Meister wie Mozart, die vom italienischen Stil beeinflusst waren. Beethoven hatte das Interesse wieder auf den deutschen Norden gelenkt und damit die "Neudeutsche Schule" eröffnet. Komponisten beider Seiten blickten auf Beethoven als ihren geistigen und künstlerischen Helden zurück; die Konservativen sahen in ihm einen unübertrefflichen Höhepunkt, die Progressiven einen Neuanfang in der Musik." #1!
 elgar.121.g:1 "Wir sind Teil der Neuedeutschen Schule." #1!
 elgar.121.h:1 "Wir verteidigen die traditionelle deutsche Schule." #1!
 elgar.122.t:1 "Mitgliedschaft im Allgemeinen Deutschen Musikverein" #1!
 elgar.122.d:1 "Künstler aus unserem Land wurden in den neu gegründeten Allgemeinen Deutschen Musikverein eingeladen. Es entstand sofort eine Diskussion darüber, ob wir zur Neuen Deutschen Schule gehören oder ob wir die konservative Idee der Musik verteidigen." #1!
 elgar.123.t:1 "Ort des nächsten Musikerkongresses" #1!
 elgar.123.d:1 "Die Mitglieder des Allgemeinen Deutschen Musikvereins haben [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] als Tagungsort für die nächste Tonkünstler-Versammlung (Musikkongress) gewählt." #1!
 elgar.123.f:1 "Im Jahr 1859 fand die erste Tonkünstlerversammlung anlässlich des 25-jährigen Bestehens der Neuen Zeitschrift für Musik in Leipzig statt. Auf der zweiten Tonkünstlerversammlung (1861) in Weimar wurden die Statuten des Allgemeinen Deutschen Musikvereins (ADMV) von über 700 Gründungsmitgliedern angenommen. Die Neue Zeitschrift für Musik wurde zum Organ des Verbandes. Am Ende des 19. Jahrhunderts stand der ADMV unter dem Protektorat des Großherzogs von Weimar. Der ADMV veranstaltete eine Reihe von großen Tonkünstlertreffen. Er orientierte sich meist an der Richtung der Neuen Deutschen Schule, die durch Franz Liszt und Richard Wagner vertreten wurde. Zu den künstlerischen Zielen des ADMV gehörte es, jährliche Tonkünstlertreffen an verschiedenen Orten zu veranstalten, bei denen wichtige, selten gehörte und vor allem neue Musikwerke aller Art aufgeführt werden sollten. Aber auch ältere, nur selten oder gar nicht gehörte, aber wegen ihrer Bedeutung interessante Werke sollten aufgeführt werden. Darüber hinaus sollten neue musikalische oder wissenschaftliche Werke gedruckt werden." #1!
 elgar.123.g:1 "Wir fühlen uns geehrt!" #1!
 elgar.124.t:1 "Musikerkongress in [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]" #1!
 elgar.124.d:1 "Die diesjährige Tonkünstler-Versammlung findet in [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName] statt. Unsere Künstler sind herzlich eingeladen, über Musik zu diskutieren und der Aufführung neuer und vergessener Musikstücke zu lauschen." #1!
 elgar.124.g:1 "Genießen wir die Musik und hören wir uns die Beiträge Gleichgesinnter an." #1!
 elgar.124.h:1 "Genau der richtige Ort, um gegen diese musikalischen Dilettanten anzutreten." #1!
 elgar.124.i:1 "Dies wird der Tag der Wahrheit sein - unsere Vorstellung von Musik ist die einzig richtige!" #1!
 elgar.125.t:1 "Krieg der Romantiker" #1!
 elgar.125.d:1 "Ein Streit zwischen Vertretern der Neuedeutschen Schule und den eher konservativen Vertretern hat zu einem öffentlichen Skandal geführt. In der Presse tobt bereits ein regelrechter Krieg zwischen den beiden Fraktionen. Es ist an der Zeit, dass [ROOT.GetCountry.GetName] sich hinter seine Künstler stellt." #1!
 elgar.125.f:1 "Der "Krieg der Romantiker" ist ein Begriff, der von einigen Musikhistorikern verwendet wird, um die Spaltung zwischen prominenten Musikern in der zweiten Hälfte des 19. Jahrhunderts zu beschreiben. Musikalische Struktur, die Grenzen der chromatischen Harmonie und Programmmusik versus absolute Musik waren die Hauptstreitpunkte. Die gegnerischen Parteien kristallisierten sich in den 1850er Jahren heraus. Die prominentesten Mitglieder des konservativen Kreises waren Johannes Brahms, Joseph Joachim, Clara Schumann und das Leipziger Konservatorium, das von Felix Mendelssohn gegründet worden war. Ihre Gegner, die radikalen Progressiven vor allem aus Weimar, wurden durch Franz Liszt und die Mitglieder der sogenannten Neudeutschen Schule sowie durch Richard Wagner vertreten. Die Kontroverse war deutschen und mitteleuropäischen Ursprungs; Musiker aus Frankreich, Italien und Russland waren nur am Rande beteiligt. Die Komponisten beider Seiten blickten auf Beethoven als ihren geistigen und künstlerischen Helden zurück; die Konservativen sahen in ihm einen unübertrefflichen Höhepunkt, die Progressiven einen Neuanfang in der Musik." #1!
 elgar.125.g:1 "Unterstützen Sie die Neudeutsche Schule!" #1!
 elgar.125.h:1 "Unterstützen Sie die Traditionelle Deutsche Schule!" #1!
 elgar.126.t_konservativ:1 "Konservative gewinnen den "Krieg der Romantiker"" #1!
 elgar.126.d_konservativ:1 "Die überwältigende Mehrheit der Anhänger der traditionellen Schule hat den Streit um die Zukunft der Musik gewonnen. Ob der Inhalt stimmt, ist zweitrangig:1 Die Masse der Beiträge zu Debatten und Polemiken bestimmt das öffentliche Bild." #1!
 elgar.126.f_konservativ:1 "Ein zentraler Streitpunkt zwischen diesen beiden Gruppen von Musikern war der zwischen traditionellen und neuen musikalischen Formen. Dies war eine Folge der Debatte über die Lebensfähigkeit der Gattung Symphonie, die sich unter Ludwig van Beethoven von einer Unterhaltungsmusik zu einer Form entwickelt hatte, die soziale, moralische und kulturelle Ideale beinhaltete. Liszt und sein Kreis favorisierten neue Schreibstile und Formen, die Musik mit erzählerischen und bildhaften Ideen verbinden sollten. Zu diesem Zweck entwickelte Liszt die symphonische Dichtung. Die Leipziger/Berliner Schule setzte sich für die von den klassischen Meistern verwendeten Formen ein, die von Musikwissenschaftlern wie Adolf Bernhard Marx im frühen 19. Auch die Gültigkeit der Programmmusik war ein Streitpunkt. In seinem 1854 erschienenen Buch Vom Musikalisch-Schönen stellte Hanslick fest, dass die Musik nichts Bestimmtes außer sich selbst darstelle und auch nicht darstellen könne.\nLetztendlich wurde #G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#! Mitglieder die Neue Deutsche Schule und #R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#! Die Mitglieder unterstützten die Traditionelle Schule." #1!
 elgar.126.g:1 "Die Traditionelle Schule hat sich durchgesetzt." #1!
 elgar.126.t_neudeutsch:1 "Progressive gewinnen den \"Krieg der Romantiker"\" #1!
 elgar.126.d_neudeutsch:1 "Die überwältigende Mehrheit der Anhänger der Neudeutschen Schule hat den Streit um die Zukunft der Musik gewonnen. Ob der Inhalt stimmt, ist zweitrangig: Die Masse der Beiträge zu Debatten und Polemiken bestimmt das öffentliche Bild." #1!
 elgar.126.f_neudeutsch:1 "" #1!
 elgar.126.h:1 "Die Neudeutsche Schule triumphiert." #1!
  
 elgar.131.t:1 "Franz Liszt beginnt seine Europatournee" #1!
 elgar.131.d:1 "Nach einer eher unglücklichen Zeit in Paris beschloss Franz Liszt, nach dem Vorbild seines Rivalen Thalberg eine Tournee zu unternehmen und ein international gefeierter Musiker zu werden. Sein erstes Ziel ist [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]." #1!
 elgar.131.f:1 "Franz Liszt war ein österreichisch-ungarischer Komponist, Pianist, Dirigent, Theaterdirektor und Musiklehrer. Liszt war einer der bedeutendsten und einflussreichsten Klaviervirtuosen und mit einem Oeuvre von über 1300 Werken und Bearbeitungen einer der produktivsten Komponisten des 19. Jahrhunderts. Obwohl ein großer Teil seines Schaffens der Klavierliteratur zuzuordnen ist, gab Liszt mit der Entwicklung der symphonischen Dichtung auch der Orchestermusik deutliche Impulse. Sein Konzept der Programmmusik und die Verwendung neuer harmonischer und formaler Mittel machten ihn - neben Richard Wagner - zum bekanntesten Protagonisten der Neuen Deutschen Schule. 1839 begann Liszt eine ausgedehnte Europatournee, die er in den folgenden acht Jahren fortsetzte. Diese Zeit war Liszts glanzvollste als Konzertpianist und er erhielt während seiner Tourneen viele Auszeichnungen und viel Bewunderung. In dieser Zeit tauchten auch die ersten Berichte über intensive Reaktionen von Liszts Fans auf, die als Lisztomanie bezeichnet wurden. Die Lisztomanie war durch eine hysterische Reaktion auf Liszt und seine Konzerte gekennzeichnet. Es wurde berichtet, dass Liszts Spiel die Stimmung des Publikums auf ein Niveau mystischer Ekstase hob." #1!
 elgar.131.g:1 "Wir wünschen ihm das Beste." #1!
 elgar.132.t:1 "Lisztomanie in [ROOT.GetCountry.GetNameNoFlag]" #1!
 elgar.132.d:1 "Der weltberühmte Pianist Franz Liszt hat unser Land als nächstes Ziel seiner Europatournee ausgewählt. Die Theater und Opernhäuser sind bereits ausgebucht!" #1!
 elgar.132.g:1 "Woher kommen plötzlich all diese schreienden Frauen?" #1!
 elgar.133.t:1 "Liszt reist ab" #1!
 elgar.133.d:1 "Liszt beendete seinen Aufenthalt und bedankte sich für die Gastfreundschaft. Die Lisztomanie wird in [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag] weitergehen." #1!
 elgar.133.f:1 "Es wird geschätzt, dass Liszt zwischen 1839 und 1847 weit über tausend Mal öffentlich auftrat. Darüber hinaus beruhte sein großer Ruhm als Pianist, den er noch lange nach seinem offiziellen Rückzug von der Konzertbühne genießen sollte, hauptsächlich auf seinen Leistungen in dieser Zeit. Zu seinem Ruf trug auch bei, dass Liszt einen großen Teil der Erlöse aus seiner Arbeit für wohltätige und humanitäre Zwecke spendete. Er spendete große Summen an den Baufonds des Kölner Doms und der St.-Stephans-Basilika in Pest und machte private Spenden für öffentliche Einrichtungen wie Krankenhäuser und Schulen sowie für wohltätige Organisationen wie die Leipziger Musikerrentenversicherung. Nach dem Großen Brand von Hamburg im Mai 1842 gab er Konzerte zugunsten der Obdachlosen. Um das Bedürfnis seiner Bewunderer nach einer Haarlocke zu befriedigen, schaffte sich Liszt einen Hund an, dessen Fell ihm unbemerkt als Lockenquelle diente." #1!
  
 elgar.301.t:1 "Gute Proben" #1!
 elgar.301.d:1 "Die Orchesterproben, die von einem reisenden Komponisten geleitet wurden, waren sehr vielversprechend." #1!
 elgar.301.f:1 "Ein reisender Komponist hat als Dirigent das Orchester für sich begeistert und bereits bei den Proben beeindruckt!" #1!
 elgar.301.g:1 "Gut." #1!
 elgar.302.t:1 "Mittelmässige Proben" #1!
 elgar.302.d:1 "Leider waren die Orchesterproben, die von einem reisenden Komponisten geleitet wurden, nicht so gut, wie der Konzertsaal gehofft hatte..." #1!
 elgar.302.f:1 "Ob es nun an unkooperativen Kollegen, schlecht vorbereiteten Darstellern oder den Bedingungen im Konzertsaal lag - die Proben lassen nichts Gutes für die Aufführung erwarten." #1!
 elgar.302.g:1 "Nicht gut." #1!
 elgar.303.t:1 "Eine amouröse Hingabe" #1!
 elgar.303.d:1 "Eine Affäre für eine "kleine" Gefälligkeit erregt die Gemüter." #1!
 elgar.303.f:1 "Künstler waren schon immer für ihren etwas "lockeren Lebensstil" bekannt und sorgten für den einen oder anderen zwischenmenschlichen Skandal. Die Aufmerksamkeit ruht auf einer kleinen Geste, die jedoch Sprengkraft hat. Ein reisender Komponist widmete einer verheirateten Dame eine Sonate und schenkte ihr die Originalpartitur. Bei der Frau handelt es sich jedoch um die Ehefrau eines hoch angesehenen Generals unserer Armee. Das Geschenk hat Spekulationen ausgelöst und könnte dem Ansehen des Mannes in der Öffentlichkeit schaden. Das Militär fordert Maßnahmen." #1!
 elgar.303.g:1 "Ich sehe das Problem nicht?" #1!
 elgar.303.h:1 "Ungeheuerlich!" #1!
 elgar.304.t:1 "Ein abendlicher Empfang" #1!
 elgar.304.d:1 "Unser Monarch hat einen reisenden Komponisten zu einem fürstlichen Empfang eingeladen. Der Komponist hat sich mit einer Komposition bedankt." #1!
 elgar.304.f:1 "Obwohl sich die Musikkultur im 19. Jahrhundert zunehmend vom Mäzenatentum zu befreien suchte, standen Adlige und Könige immer noch an der Spitze des Mäzenatentums, und viele musikalische Werke wurden nach wie vor Fürsten und Königen gewidmet. Andererseits bedeutete die persönliche Beziehung oft, dass Komponisten, die von Akademien und Kunstkreisen ausgeschlossen waren, die Unterstützung eines wohlhabenden Mäzens finden konnten, wenn sie dessen persönlichem Geschmack entsprachen. Eine ganze Reihe von Wagners Meisterwerken wäre zum Beispiel ohne die persönliche Unterstützung von König Ludwig II. von Bayern nicht möglich gewesen." #1!
 elgar.304.g:1 "Was für eine schöne Überraschung!" #1!
 elgar.305.t:1 "Ausverkauft!" #1!
 elgar.305.d:1 "Ein Streit um eine ausverkaufte Aufführung eines großen Komponisten hat einen öffentlichen Aufschrei ausgelöst!" #1!
 elgar.305.f:1 "Am Tag einer Premiere hatte sich eine große Menschenmenge erwartungsvoll vor dem seit Tagen ausverkauften Opernhaus versammelt; selbst der auftretende Komponist konnte nur auf dem Schwarzmarkt eine Karte bekommen. Da aber ein Theaterangestellter selbst zusätzliche Karten verkauft hatte, überstieg die Zahl der verkauften Karten die Zahl der Plätze bei weitem. Im und vor dem Theater kam es zu tumultartigen Szenen, in denen die Musik fast völlig unterging; draußen schrien die einen, um eingelassen zu werden, drinnen schrien die anderen um Ruhe. Die Anfangschöre konnten noch gespielt werden, aber dann gab das Orchester auf, und der Lärm ging erst richtig los." #1!
 elgar.305.g:1 "Wer ist dafür verantwortlich?!" #1!
 elgar.306.t:1 "Überraschende Premiere" #1!
 elgar.306.d:1 "Das Werk eines Komponisten, der in seinem Heimatland gescheitert ist, hat die Herzen unseres Publikums erobert." #1!
 elgar.306.f:1 "Es hat immer wieder Fälle gegeben, in denen die Uraufführung berühmter Werke scheiterte. Solche Erfahrungen führten oft nicht nur zu ernsthaften Selbstzweifeln und dem Ende einer Karriere, sondern auch zu einem Versuch, das gleiche Stück vor einem anderen Publikum aufzuführen. Spätere Klassiker setzten sich oft erst im zweiten oder dritten Anlauf durch. Nicht der Ort der Uraufführung, sondern der Ort des Erfolgs wurde dann als die eigentliche Initialzündung erinnert. Hector Berlioz ist ein Beispiel für einen Komponisten, der mit seinen Werken in England und Deutschland mehr Erfolg hatte als zu Hause in Frankreich." #1!
 elgar.306.g:1 "Unser Publikum ist dankbarer." #1!
 elgar.307.t:1 "Musikalische Freundschaft" #1!
 elgar.307.d:1 "Ein reisender Komponist verstand sich auf Anhieb mit seinen Mitmusikern vor Ort." #1!
 elgar.307.f:1 "Das Verhältnis zwischen ausländischen und einheimischen Musikern war nicht immer einfach. Es ging nicht nur um nationale Ressentiments und persönliche Vorurteile. Manche Orchester konnten mit dem Dirigierstil eines Gastdirigenten nicht arbeiten, manchmal erforderte die Kurzfristigkeit der Aufführungen Kompromisse, für die der Gast wiederum die einheimische Musikwelt verantwortlich machte. So mancher einheimische Komponist oder Dirigent befürchtete auch einen zu großen Einfluss des Ausländers. Doch trotz all dieser Hindernisse wuchsen die Freundschaften weiter." #1!
 elgar.307.g:1 "Eine fruchtbare Freundschaft." #1!
 elgar.308.t:1 "Musikalische Rivalität" #1!
 elgar.308.d:1 "Die örtliche Musikwelt betrachtet das Erscheinen eines reisenden Komponisten mit Unmut und Misstrauen." #1!
 elgar.308.f:1 ""Zwei große Werke für die Oper, zwei weitere für die Renaissance, zwei weitere für die Opera-Comique und noch ein weiteres für das Theatre Italien? Es scheint, dass Monsieur Donizetti uns wie ein erobertes Land behandelt, es ist eine echte Invasion. Man kann nicht mehr von den Opernhäusern von Paris sprechen, sondern nur noch von den Opernhäusern von Monsieur Donizetti.\" - Hector Berlioz" #1!
 elgar.308.g:1 "Diese Musiker sollten sich zusammenreißen!" #1!
 elgar.309.t:1 "Inspirationen" #1!
 elgar.309.d:1 "Ein ausländischer Komponist hat die Mitglieder des Staatsorchesters inspiriert." #1!
 elgar.309.f:1 "Der Einfluss von außen hat in der lokalen und nationalen Musikwelt oft einen Unterschied gemacht. Unbekannte Stücke, eine fremde Musiksprache oder das Auftauchen eines charismatischen Musikers konnten oft dazu führen, dass die einheimischen Musiker eine völlig neue Perspektive bekamen." #1!
 elgar.309.g:1 "Inspiration? Ich möchte Ergebnisse sehen!" #1!
 elgar.309.h:1 "Dies wird sich positiv auf das Orchester auswirken." #1!
 elgar.310.t:1 "Manie" #1!
 elgar.310.d:1 "Das Auftauchen eines Komponisten hat zu einer beispiellosen, fast hysterischen öffentlichen Begeisterung für sein Werk geführt. Die Menschen haben nichts anderes im Kopf!" #1!
 elgar.310.f:1 "\"Als ich früher von den Ohnmachtsanfällen hörte, die in Deutschland und besonders in Berlin ausbrachen, wenn Liszt dort auftrat, zuckte ich mitleidig mit den Schultern und dachte: das stille, sabbatistische Deutschland will sich die Gelegenheit nicht entgehen lassen, das bisschen notwendige Bewegung zu bekommen, das ihm erlaubt ist... Bei ihnen, dachte ich, geht es um das Spektakel um des Spektakels willen...So erklärte ich mir diese Lisztomanie und sah sie als Zeichen der politisch unfreien Verhältnisse jenseits des Rheins an. Aber ich habe mich doch geirrt, und es ist mir erst letzte Woche im italienischen Opernhaus aufgefallen, wo Liszt sein erstes Konzert gab... Das war wahrlich kein germanisch-sentimentales, sentimentalisierendes Berliner Publikum, vor dem Liszt spielte, ganz allein, oder vielmehr, nur von seinem Genie begleitet. Und doch, wie krampfhaft wirkte sein bloßes Erscheinen auf sie! Wie stürmisch war der Beifall, der ihm entgegenschallte!... Welch ein Beifall war das! Ein wahrer Wahnsinn, ein unerhörter in den Annalen des Furors!\" - Heinrich Heine" #1!
 elgar.310.g:1 "Sie sind also völlig abgelenkt?" #1!
 elgar.311.t:1 "Musik bringt Menschen zusammen" #1!
 elgar.311.d:1 "Ein Botschafter fragt, ob wir ihm eine Karte für ein Konzert eines Komponisten besorgen können, der bei uns zu Gast ist." #1!
 elgar.311.f:1 "Der Botschafter einer Großmacht ist ein Liebhaber eines reisenden Komponisten, der gerade in unserem Land zu Besuch ist. Er würde gerne eine Aufführung besuchen, aber es sind keine Plätze mehr frei. Er hat uns daher gebeten, unseren politischen Einfluss geltend zu machen, damit er die Aufführung doch noch besuchen kann." #1!
 elgar.311.g:1 "Haha. Nein." #1!
 elgar.311.h:1 "Geben Sie ihm einen Ehrenplatz." #1!
 elgar.312.t:1 "Attentat in der Oper!" #1!
 elgar.312.d:1 "Ein schreckliches Attentat auf einen führenden Politiker unseres Landes überschattete die heutige Opernaufführung!" #1!
 elgar.312.f:1 "Seit einiger Zeit sorgt die mangelnde Legitimität unserer Regierung für Unzufriedenheit in der Bevölkerung. Ein hinterhältiger Attentäter nutzte das Konzert eines beliebten Komponisten, um während der Aufführung einen hochrangigen Regierungsbeamten zu erschießen. [SCOPE.sCharacter('elgar_leader_victim').GetFullName] wurde dabei schwer verletzt. Der Täter ist noch auf der Flucht, das lebensgefährlich verletzte Opfer wurde sofort in das nächstgelegene Krankenhaus gebracht." #1!
 elgar.312.g:1 "Wo waren die Sicherheitskräfte?!" #1!
 elgar.313.t:1 "Ein kleines Werk" #1!
 elgar.313.d:1 "Ein kleines Werk, das der große Komponist in unserem Land komponiert hat, ist vielleicht kein großer Hit, aber es hat seine Fans gefunden." #1!
 elgar.313.f:1 "Gelegenheitswerke von Komponisten, die abseits der berühmten Werke entstanden sind, mussten nicht gleich von durchschnittlicher Qualität sein. Immer wieder haben es kleine Stücke geschafft, mehr Aufmerksamkeit zu erregen als manches Lebenswerk. Trotz seiner Fülle an Werken ist Nikolai Rimski-Korsakow in der Popkultur für den "Hummelflug" (aus Zar Saltan) und Edvard Grieg für "In der Halle des Bergkönigs" (aus Peer Gynt) bekannt - zu Unrecht, aber ein Musikhit ist ein Musikhit." #1!
 elgar.313.g:1 "Manchmal sind es die kleinen Dinge, die Freude machen." #1!
 elgar.314.t:1 "Keine Inspiration" #1!
 elgar.314.d:1 "Enttäuschend ist, dass unser Gast den Aufenthalt in unserem Land völlig uninspiriert findet." #1!
 elgar.314.f:1 "Manchmal klappt es einfach nicht." #1!
 elgar.314.g:1 "Deprimierend." #1!
 elgar.315.t:1 "Privatkonzert" #1!
 elgar.315.d:1 "Neben den offiziellen Aufführungen gab unser Komponist ein Privatkonzert im kleinen Kreis." #1!
 elgar.315.f:1 "Kleine Privatkonzerte von großen Komponisten haben eine lange Tradition. Am bekanntesten ist dafür Franz Schubert mit den nach ihm benannten Schubertiaden. Bei den ersten Schubertiaden spielte Franz Schubert am Klavier, und die Baritone Johann Michael Vogl und später Carl von Schönstein sangen seine Lieder. Zu den Abenden gehörten auch Lesungen und witzige Unterhaltungsspiele, die oft unter einem bestimmten Thema standen. Sie waren eine Mischung aus freundschaftlicher Begegnung und literarisch-musikalischem Salon." #1!
 elgar.315.g:1 "Das war schön." #1!
 elgar.315.h:1 "Da capo!" #1!
 elgar.316.t:1 "Ein talentierter Student" #1!
 elgar.316.d:1 "Der große Komponist unseres Landes hat das Talent eines der führenden Politiker unseres Landes entdeckt und erwägt, ihn in seiner Kompositionskunst zu unterrichten." #1!
 elgar.316.f:1 "Man mag sich wundern, dass Politiker überhaupt künstlerisch begabt sein können und dass sie als schlechte Menschen nicht prinzipiell völlig unempfindlich gegenüber jeglicher musikalischer Kunst sein sollten. Es gab sicherlich Komponisten mit politischen Ambitionen, aber weit weniger Politiker mit musikalischen Ambitionen. Was auch immer in diesem Politiker stecken mag, vielleicht ist seine Seele doch nicht unwiederbringlich verloren." #1!
 elgar.316.g:1 "Ein vielversprechender Kandidat." #1!
 elgar.316.h:1 "Seine Energie ist anderswo besser aufgehoben." #1!
 elgar.317.t:1 "Musikalisches Desaster" #1!
 elgar.317.d:1 "Eine Aufführung in einem unserer Konzertsäle könnte als einer der größten Misserfolge in unsere Musikgeschichte eingehen." #1!
 elgar.317.f:1 "Das Orchester war unvorbereitet, der Solist erkältet, der Dirigent nicht ausgeruht und der Komponist, in dessen Beisein die Aufführung stattfand, droht damit, unser Land von seiner nächsten Tournee abzusagen. Man kann es nicht anders beschreiben als eine Katastrophe!" #1!
 elgar.317.g:1 "Eine internationale Schande!" #1!
 elgar.318.t:1 "Skandalöses Konzert" #1!
 elgar.318.d:1 "Ein skandalöses Konzert, das mit seinen "modernen" Klängen einfach nur das Publikum in Aufruhr versetzte, spaltet nicht nur die Gesellschaft, sondern hat auch rechtliche Konsequenzen." #1!
 elgar.318.f:1 "In den damaligen Presseberichten ist von tumultartigen Ausschreitungen die Rede. Die Anhänger des Komponisten, seine Schüler und Gegner schrien sich an, bewarfen sich gegenseitig, störten die Aufführung, zerstörten das Mobiliar usw. Mehrmals stiegen empörte Konservative aus dem Publikum fluchend auf die Bühne, um den Dirigenten zu ohrfeigen. Als dieser drohte, mit Hilfe der Staatsgewalt für Ordnung zu sorgen, soll der Tumult erst richtig losgegangen sein. Dann gab es eine Ohrfeige. Ein anwesender Operettenkomponist stellte in der anschließenden gerichtlichen Nachbereitung fest: Das Klatschen der Ohrfeigen "war das Wohlklingendste, was man an diesem Abend hören konnte"." #1!
 elgar.318.g:1 "Der Pöbel hat keinen Sinn für Kultur. Das war ausgezeichnet!" #1!
 elgar.318.h:1 "Nehmen Sie das Stück sofort vom Spielplan." #1!
 elgar.319.t:1 "Zeitgeist" #1!
 elgar.319.d:1 "Das moderne Stück, das ein großer Komponist heute persönlich dirigiert, trifft genau den Geschmack der Massen." #1!
 elgar.319.f:1 "Manchmal muss man einfach Glück haben." #1!
 elgar.319.g:1 "Hervorragend!" #1!
 elgar.320.t:1 "Musikpropaganda" #1!
 elgar.320.d:1 "Einige Regierungspolitiker überlegen, ob die Musik des Komponisten, der sich derzeit bei uns aufhält, ... für Propagandazwecke ausgeliehen werden könnte." #1!
 elgar.320.f:1 "Vor allem zu Beginn des 20. Jahrhunderts und der Massengesellschaft, die die totalitären Regime dieser Zeit hervorbrachten, herrschte die Idee vor, die Massen durch Musik gefügig zu machen. Während einige Musiker auch in diesen Zeiten Widerstand gegen die Diktatur leisteten, gab es andere, die ihre Arbeit direkt in den Dienst einer Ideologie stellten oder zumindest zuließen, dass ihr Talent in den Dienst einer politischen Richtung gestellt wurde." #1!
 elgar.320.g:1 "Musik sollte frei von Politik sein." #1!
 elgar.320.h:1 "Manchmal sollte die Musik der Politik dienen." #1!
 elgar.321.t:1 "Große Komponisten unter sich" #1!
 elgar.321.d:1 "Unser musikalischer Gast traf einen großen Komponisten, der in unserem Land beschäftigt ist. In stundenlangen Gesprächen und Spaziergängen tauschten sie musikalische Gedanken und Ideen aus." #1!
 elgar.321.f:1 "Große Geister denken ähnlich." #1!
 elgar.321.g:1 "Ein historisches Treffen." #1!
  
 elgar.406.t:1 "Der Tod des Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]" #1!
 elgar.406.d:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], führende musikalische Autorität [GetPlayer.GetAltName('VON')], ist heute unerwartet gestorben. Die Musikwelt trauert um diesen großen Verlust." #1!
 elgar.406.f:1 "\"Wir, die wir hier am Grabe dieses Verstorbenen stehen, sind sozusagen die Vertreter eines ganzen Volkes, die den Untergang der einen hochgefeierten Hälfte dessen beklagen, was uns von der verschwundenen Pracht der einheimischen Kunst und der patriotischen Geistesblüte geblieben war. Der Erbe und Erweiterer des Händel'schen und Bach'schen, des Haydn'schen und Mozart'schen unsterblichen Ruhmes hat sein Leben ausgelebt, und wir stehen weinend an der zerrissenen Saite des verblichenen Stückes.\nLasst mich ihn so nennen! Denn er war ein Künstler, und was er war, war er nur durch die Kunst.\" -Franz Grillparzer" #1!
 elgar.406.g:1 "Aber wer soll jetzt das Requiem schreiben?" #1!
 elgar.407.t:1 "Komponist braucht eine Pause" #1!
 elgar.407.d:1 "Nach Abschluss der letzten Aufgabe muss [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] erst einmal Kraft und Inspiration finden, bevor [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe] die nächste Aufgabe bewältigen kann. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe|U] hat angekündigt, dass [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe] sich für einige Zeit zurückziehen wird." #1!
 elgar.407.f:1 "Nach Abschluss eines jeden Auftrags ist ein Komponist für eine gewisse Zeit nicht verfügbar. Wie lange die Pause dauert, hängt vom Alter des Komponisten ab. Junge Komponisten sind nur ein paar Wochen lang nicht verfügbar, während es bei älteren Komponisten Monate dauern kann, bis sie wieder verfügbar sind." #1!
 elgar.407.g:1 "Ah, ich verstehe, 'Inspiration'..." #1!
  
 elgar.411.t:1 "Hervorragendes Konzert" #1!
 elgar.411.d:1 "Die von unserem Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] geleitete Konzertsaison hat die Erwartungen weit übertroffen!" #1!
 elgar.411.f:1 "\"Das Publikum soll streng sein, soll pfeifen, aber sein Applaus soll mich nicht zu irgendetwas verpflichten.\" - Giuseppe Verdi" #1!
 elgar.411.g:1 "Bravo!" #1!
 elgar.412.t:1 "Mittelmäßiges Konzert" #1!
 elgar.412.d:1 "Die Konzertsaison unter der Leitung unseres Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] läuft wie gewohnt. Bisher gab es noch keine herausragenden Momente." #1!
 elgar.412.f:1 "\"Man darf sich nicht für so göttlich halten, dass man seine eigenen Werke nicht gelegentlich verbessern kann.\" - Ludwig van Beethoven" #1!
 elgar.412.g:1 "*gähn*" #1!
 elgar.413.t:1 "Schlechtes Konzert" #1!
 elgar.413.d:1 "Die bisherige Konzertsaison war nicht nur unterdurchschnittlich; die Leistungen unseres Dirigenten [SCOPE.sCharacter('elgar_conductor').GetFullName] gelten in diesem Jahr als besonders enttäuschend. Das Publikum verlangt nicht einmal nach einer Zugabe..." #1!
 elgar.413.f:1 "\"Nach den letzten Tönen von Gotterdammerung fühlte ich mich, als wäre ich aus dem Gefängnis entlassen worden.\" - Pjotr Tchaikovsky" #1!
 elgar.413.g:1 "Boooo!" #1!
 elgar.414.t:1 "Ein Botschafter im Publikum" #1!
 elgar.414.f:1 "\"Das Vorspiel zu Tristan und Isolde erinnert mich an das alte italienische Gemälde eines Märtyrers, dessen Eingeweide auf einer Spule langsam von seinem Körper abgewickelt werden.\" - Eduard Hanslick" #1!
 elgar.414.g:1 "Der Mann weiß nicht einmal, was Musik ist." #1!
 elgar.414.h:1 "Endlich sagt es jemand!" #1!
 elgar.415.t:1 "Ballett" #1!
 elgar.415.d:1 "Ein neues modernes Ballettstück feierte heute seine Premiere." #1!
 elgar.415.f:1 "\"Ich mag die Handlung von Der Nussknacker - überhaupt nicht.\" - Pjotr Tchaikovsky" #1!
 elgar.415.g:1 "Tanzt!" #1!
 elgar.416.t:1 "Filmmusik" #1!
 elgar.416.d:1 "Heute wurde unter der Leitung unseres Chefdirigenten eine der ersten Filmmusiken für einen Spielfilm aufgenommen." #1!
 elgar.416.f:1 "\"Filmmusik sollte zum Filmdrama die gleiche Beziehung haben wie das Klavierspiel in meinem Wohnzimmer zu dem Buch, das ich gerade lese.\" - Igor Stravinsky" #1!
 elgar.416.g:1 "Ich hatte ein Drehbuch über einen Archäologen, der vor langer Zeit nach der Bundeslade suchte, aber dann wurde es gestohlen." #1!
 elgar.417.t:1 "Dirigentensaison endet" #1!
 elgar.417.d:1 "Die letzte Aufführung der Konzertsaison ist zu Ende gegangen. Die Kritiken sind bereits in der Presse. Es sieht so aus, als hätte sich [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] gut geschlagen und Anerkennung gefunden. Die Qualität des Staatsorchesters soll sich deutlich verbessert haben - was das musikalische Ansehen unserer Nation erhöht." #1!
 elgar.417.f:1 "Komponisten, die noch keine Dirigenten sind, können die Fähigkeit zum Dirigieren durch Üben am Ende einer Konzertsitzung erwerben. Spätestens nach der dritten Saison ist der Erwerb des Dirigentenstatus sicher. Dies ist eine gute Möglichkeit, nicht-virtuose Komponisten auszubilden und sie dann auf Tournee zu schicken." #1!
 elgar.417.g:1 "Da capo!" #1!
  
 elgar.421.d:1 "Unser Komponist leidet derzeit unter einer massiven Schreibblockade." #1!
 elgar.422.t:1 "Ein Spaziergang" #1!
 elgar.422.d:1 "Bei einem Spaziergang in der Natur fand [SCOPE.sCharacter('elgar_conductor').GetFullName] etwas Inspiration, die seine Arbeit vorantrieb." #1!
 elgar.422.f:1 "Die Natur hat schon viele Komponisten inspiriert. Beethoven zog sich aufs Land zurück und sammelte dort Eindrücke, die ihn später zur 6. Sinfonie inspirierten. Gustav Mahler richtete sich sogar ein eigenes kleines Komponistenhäuschen ein." #1!
 elgar.422.g:1 "In den Fußstapfen von Beethoven." #1!
 elgar.423.t:1 "Nicht genug Komfort" #1!
 elgar.423.f:1 "Sobald man Künstlern einen wichtigen Auftrag erteilt, kommen sie mit Sonderwünschen. Eine seriöse Persönlichkeit des öffentlichen Lebens wird schnell zu einer Diva, wenn man ihr das Gefühl gibt, wichtig zu sein. Ehe man sich versieht, steigt der Ruhm diesen Leuten zu Kopf." #1!
 elgar.423.g:1 "Ihm Komfort geben" #1!
 elgar.424.t:1 "Störung" #1!
 elgar.424.f:1 "Es gibt eine Person, die [SCOPE.sCharacter('elgar_conductor').GetFullName] das Leben schwer macht. Sei es ein Fan oder einfach nur eine Person, die glaubt, durch besondere Nähe zu einer berühmten Persönlichkeit des öffentlichen Lebens politischen Einfluss gewinnen zu können. Man könnte es fast einen Groupie nennen. Die Störungen sind inzwischen so schlimm, dass [SCOPE.sCharacter('elgar_conductor').GetLastName] sich über Paraonia beschwert. Leider handelt es sich bei dem 'Fan' um eine hochrangige politische Persönlichkeit, deren öffentliche Ächtung verständliche Konsequenzen hätte." #1!
 elgar.424.g:1 "Stören Sie ihn nicht!" #1!
 elgar.424.h:1 "Er muss damit fertig werden." #1!
  
 elgar.431.t:1 "Konzert für [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_concerto_instrument_name')] in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #1!
 elgar.431.d:1 "Nach mehrmonatigen Bemühungen und künstlerischer Kreativität hat [SCOPE.sCharacter('elgar_conductor').GetFullName] sein [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_concerto_instrument_name')] Konzert heute mit ihm am Pult." #1!
 elgar.431.f:1 "Unter einem Konzert versteht man seit dem Spätbarock meist eine Instrumentalkomposition, die für einen oder mehrere Solisten in Begleitung eines Orchesters oder eines anderen Ensembles geschrieben wurde. Als Gattung der Instrumentalmusik entwickelten sich die ersten Werke aus dem Concerto grosso zu Beginn des 18. Jahrhunderts. Seine volle Ausprägung findet es in der klassischen Periode. Es besteht in der Regel aus drei Sätzen, mit einem langsamen Satz in der Mitte." #1!
 elgar.432.t:1 "Symphonie Nr. [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_symphony_number_name')] in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #1!
 elgar.432.d:1 "Heute Abend findet im Konzertsaal eine ganz besondere Aufführung statt: Die High Society hat sich versammelt, um der Premiere der neuen Symphonie von [SCOPE.sCharacter('elgar_conductor').GetFullName] in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')] beizuwohnen." #1!
 elgar.432.f:1 "Eine Symphonie ist ein Begriff für Instrumentalwerke, die im Laufe der Jahrhunderte in unterschiedlicher Form und Besetzung entstanden sind. Die klassische Form der Symphonie entwickelte sich im 18. Jahrhundert und behielt bis ins 20. Jahrhundert hinein eine dominierende Stellung im Bereich der Orchestermusik. Es handelt sich um ein Werk, das aus mehreren (meist drei oder vier, seltener fünf) Sätzen für Orchester ohne Solisten besteht. Seit Ludwig van Beethovens 9. Sinfonie kommen gelegentlich auch Vokalstimmen (Solisten und/oder Chor) vor, z. B. bei Gustav Mahler, doch bleibt die Rolle des Orchesters dominant." #1!
 elgar.433.t:1 "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_opera_name')]" #1!
 elgar.433.d:1 "Die Oper '[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_opera_name')]', die Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] nach wochen- und monatelangen Bemühungen komponiert hat, gilt als neuer Höhepunkt im musikalischen Schaffen dieses künstlerischen Genies. Die bevorstehende Premiere verspricht, ein großer Erfolg zu werden." #1!
 elgar.433.f:1 "Die Oper ist eine musikalische Theatergattung, die in der Barockzeit entstanden ist. Eine Oper besteht aus der Vertonung einer dramatischen Dichtung, die von einem Ensemble von Sängern, einem begleitenden Orchester, manchmal auch einem Chor und einem Ballettensemble aufgeführt wird. Neben dem Gesang spielen und tanzen die Darsteller auf einer Theaterbühne, die durch Malerei, Architektur, Requisiten, Beleuchtung und Bühnentechnik gestaltet wird. Die Rollen der Darsteller werden durch Masken und Kostüme visuell dargestellt. Claudio Monteverdi, der mit seinem Orfeo Maßstäbe setzte, gilt als der Urvater der Oper. Im 19. Jahrhundert setzte Richard Wagner mit seinen Opern neue Maßstäbe." #1!
  
 elgar.440.t: "Folk Music" #1!
 elgar.440.d: "Travelling through the more rural parts of the country, [SCOPE.sCharacter('elgar_conductor').GetFullName] has found a great interest in learning, writing down and collecting the dances and songs of the local people." #1!
 elgar.440.f: "The nationalism of the 19th century meant that many previously reviled forms of music suddenly aroused interest because they supposedly reflected the national soul of a country. Local historians and local musicians collected traditional songs. Some composers also took inspiration from the people and set them to music in a completely new way." #1!
 elgar.440.g: "An interesting music collection." #1!
 elgar.440.h: "[SCOPE.sCharacter('elgar_conductor').GetLastName] should concentrate on high culture instead of dealing with organ grinder music." #1!
 elgar.441.t: "Sea Shanty" #1!
 elgar.441.d: "Inspired by the deeds of Admiral [SCOPE.sCharacter('elgar_admiral').GetLastName], our composer [SCOPE.sCharacter('elgar_conductor').GetFullName] wrote a little sea shanty on the side." #1!
 elgar.441.f: "The original practical purpose of the shanty as a work song has always been paramount among seafarers. Linguistic and musical aspects, on the other hand, hardly played a role. With the onset of the Industrial Revolution, faster ships were needed. The big-bellied East Indiamen disappeared and were replaced by clippers and frigates. This ultimately led to the shanties gradually losing their practical use for seafaring and being sung only for leisure and entertainment. Musicians collected old sea shanties or were inspired by them to create their own works." #1!
 elgar.441.g: "Yo Ho!" #1!
 elgar.442.t: "March" #1!
 elgar.442.d: "Inspired by the values of General [SCOPE.sCharacter('elgar_general').GetFullName], our composer [SCOPE.sCharacter('elgar_conductor').GetFullName] wrote a new military march." #1!
 elgar.442.f: "The march flourished especially in the 19th and early 20th centuries with its nationalistic and militaristic tendencies and its revolutions. An example of this is Gioachino Rossini, who not only regularly incorporated pompous marches into his operas, but also composed a number of pieces for individual princes: including a commissioned composition for the Turkish Sultan Abdülmecid I (Marcia per il Sultano), which is still regularly performed on the program of Italian military bands. Also exemplary for the tendencies of the 19th century is the production of the Strauss family in Vienna, who composed a march at every suitable opportunity to demonstrate patriotism or loyalty to the emperor, or to honor military figures." #1!
 elgar.442.g: "New material for the army." #1!
 elgar.443.t: "Kunstlied" #1!
 elgar.443.d: "Based on the poem of a great poet, [SCOPE.sCharacter('elgar_conductor').GetFullName] has written a Kunstlied as a side work." #1!
 elgar.443.f: "In Western classical music tradition, Lied is a term for setting poetry to classical music to create a piece of polyphonic music. The term is used for any kind of song in contemporary German, but among English and French speakers, lied is often used interchangeably with 'art song' to encompass works that the tradition has inspired in other languages as well. The poems that have been made into lieder often center on pastoral themes or themes of romantic love." #1!
 elgar.443.g: "Couldn't it have been something else...?" #1!
 elgar.444.t: "Piano Sonata in [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')] [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]" #1!
 elgar.444.d: "Piano pieces are part of the standard repertoire of classical music. As finger exercise for the next major work, [SCOPE.sCharacter('elgar_conductor').GetFullName] wrote a sonata and performed it last night at a small evening party." #1!
 elgar.444.f: "In the early 19th century, the sonata form was defined, from a combination of previous practice and the works of important Classical composers, particularly Haydn, Mozart, Beethoven, but composers such as Clementi also. It is during this period that the differences between the three- and the four-movement layouts became a subject of commentary, with emphasis on the concerto being laid out in three movements, and the symphony in four. Among works expressly labeled sonata for the piano, there are the three of Frédéric Chopin, those of Felix Mendelssohn, the three of Robert Schumann, Franz Liszt's Sonata in B minor, and later the sonatas of Johannes Brahms and Sergei Rachmaninoff." #1!
 elgar.444.g: "A classic." #1!
 elgar.445.t: "Treatise on Music" #1!
 elgar.445.d: "In recent months, [SCOPE.sCharacter('elgar_conductor').GetFullName] has been working extensively on a new treatise on orchestration and the study of musical instruments. The treatise is considered a contribution to musical innovations." #1!
 elgar.445.f: "\"It takes a lot of time to find the oceans of music, but even more to learn to navigate them.\" -Hector Berlioz" #1!
 elgar.445.g: "An important theoretical work." #1!
 elgar.446.t: "Requiem" #1!
 elgar.446.d: "An influential representative of the Catholic clergy recently asked [SCOPE.sCharacter('elgar_conductor').GetFullName] to write a new sacred work following the death of a well-respected bishop." #1!
 elgar.446.f: "The liturgical form of the funeral mass is the requiem. The term describes both the liturgy of the Holy Mass at the funeral service of the Catholic Church and church music compositions for the commemoration of the dead. It is derived from the incipit of the introit Requiem aeternam dona eis, Domine ('Eternal rest, O Lord'). The proprium of the liturgy of the Requiem corresponds to that of All Souls' Day. As the first piece of the musical mass, the Introit was usually set to music by the composers, as was the Offertory, in contrast to the sequence, which is occasionally shortened or omitted entirely for various reasons. Gloria and Credo are not set to music in the Requiem because they are not sung or spoken in the liturgy of the funeral mass." #1!
 elgar.446.g: "Requiem aeternam dona eis, Domine." #1!
 elgar.447.t: "A daring Opera" #1!
 elgar.447.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName]'s latest composition met with criticism from the censorship authorities. It is certainly of high artistic value, but could cause uproar. The country's intelligentsia is already up in arms." #1!
 elgar.447.f: "In much of the 19th century, even the greatest composers of their time had to submit to censorship. The many different settings of 'Figaro' were considered highly critical because of the revolutionary theme. Suspected blasphemy or other immoralities were also a thorn in the side of the censors. At a certain point, some composers could no longer stand the harassment and left their sponsor." #1!
 elgar.447.g: "Art should uplift, not cause uproar." #1!
 elgar.447.h: "We should relax the censorship a bit." #1!
  
 elgar.448.t:1 "Komponistenduell" #1!
 elgar.448.d:1 "[SCOPE.sCharacter('rival_composer_scope').GetFullName], ein Komponist aus [SCOPE.sCountry('rival_composer_country_scope').GetName], bezeichnete in einem Anfall der für dieses Land typischen Arroganz unseren Komponisten [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] als 'unbekannte Nummer' und stellte den musikalischen Status unserer Nation grundsätzlich in Frage." #1!
 elgar.448.f:1 "\"Die Zersplitterung und Beliebigkeit unseres Musikstils wurde durch Mendelssohns Bemühen, einen unklaren, fast bedeutungslosen Inhalt so interessant und verblüffend wie möglich auszudrücken, wenn nicht herbeigeführt, so doch wenigstens auf den höchsten Gipfel gesteigert. Hatte der letzte in der Kette unserer wahren musikalischen Helden, Beethoven, den höchsten Wunsch und die wunderbare Fähigkeit zum klarsten, sichersten Ausdruck eines unaussprechlichen Inhalts durch scharf geschnittene, plastische Gestaltung seiner Klangbilder, so verwischt Mendelssohn dagegen diese erworbenen Gestalten in seinen Produktionen zu einem sich auflösenden, phantastischen Schattenbild, dessen unbestimmter Farbenschimmer willkürlich unsere kapriziöse Phantasie anregt, aber unsere rein menschliche innere Sehnsucht nach klarer künstlerischer Anschauung kaum nur mit der Hoffnung auf Erfüllung berührt.\" -Richard Wagner über Felix Mendelssohn" #1!
 elgar.448.g:1 "Wir nehmen die Herausforderung an." #1!
 elgar.448.h:1 "Wir können dieses Duell nicht überleben." #1!
 elgar.449.t:1 "Sieg im Komponistenduell" #1!
 elgar.449.d:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] hat sich als weitaus berühmterer und fähigerer Komponist erwiesen als sein schmieriger Rivale und damit den Ruf unseres Landes als kulturelles Zentrum bewahrt." #1!
 elgar.449.f:1 "\"Nichts zeigt deutlicher die Macht Wagners und die Art von Sturm und Drang, die er entfesselt hat, als diese Dekadenz, die sein Werk tatsächlich geweiht hat und die sich seit seiner Zeit immer weiter entwickelt hat. Wie mächtig muss dieser Mann gewesen sein, dass er eine im Wesentlichen musikalische Form (die Oper) mit einer solchen Energie zerstört hat, dass wir fünfzig Jahre nach seinem Tod immer noch unter dem Müll und Lärm des Musikdramas taumeln! Denn das Prestige der Synthese der Künste ist immer noch lebendig. Ist es das, was man Fortschritt nennt? Vielleicht. Es sei denn, die Komponisten finden die Kraft, dieses schwere Erbe abzuschütteln, indem sie Verdis bewundernswerte Aufforderung befolgen: Kehren wir zu den alten Zeiten zurück, und das wird der Fortschritt sein.\" -Igor Stravinsky über Richard Wagner" #1!
 elgar.449.g:1 "Es ist nun klar, welches Land die dominierende Kulturnation ist!" #1!
 elgar.450.t:1 "Niederlage im Komponistenduell" #1!
 elgar.450.d:1 "Leider wurde unser Komponist von seinem ausländischen Konkurrenten im Wettbewerb besiegt. Die ganze Welt ist nun überzeugt, dass wir musikalisch ins Hintertreffen geraten sind!" #1!
 elgar.450.f:1 "\"Ist Wagner überhaupt ein Mensch? Ist er nicht eher eine Krankheit? Er macht alles krank, was er anfasst, er hat die Musik krank gemacht.\" -Friedrich Nietzsche über Richard Wagner" #1!
 elgar.450.g:1 "Es ist nun klar, welches Land die dominierende Kulturnation ist..." #1!
  
 elgar.451.t:1 "Der Maestro reist nach [SCOPE.sCountry('elgar_composer_destination_scope').GetNameNoFlag]" #1!
 elgar.451.d:1 "Unser Komponist [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] hat alle Vorbereitungen abgeschlossen. Das erste Ziel der zweieinhalbjährigen Konzertreise wird [SCOPE.sCountry('elgar_composer_destination_scope').GetName] sein." #1!
 elgar.451.f:1 "\"Wenn die Welt jemals untergehen sollte, gehe ich nach Wien, denn dort passiert alles fünfzig Jahre später.\" - Gustav Mahler" #1!
 elgar.451.g:1 "Schicke uns eine Postkarte!" #1!
 elgar.452.t:1 "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] kommt in [GetPlayer.GetNameNoFlag] an" #1!
 elgar.452.d:1 "Ein reisender Komponist machte auf seiner aktuellen Tournee in unserem Land Halt und beschloss, eine Weile zu bleiben." #1!
 elgar.452.f:1 "[SCOPE.sCharacter('elgar_composer_scope').GetFullName] ist ein Komponist aus [SCOPE.sCharacter('elgar_composer_scope').GetHomeCountry.GetName] mit einem Renommee von [SCOPE.sCharacter('elgar_composer_scope').MakeScope.GetVariable('elgar_composer_experience').GetValue|V0]. Bislang hat [SCOPE.sCharacter('elgar_composer_scope').GetSheHe] bereits [SCOPE.sCharacter('elgar_composer_scope').MakeScope.GetVariable('elgar_composer_num_tours_var').GetValue|V0] Touren gemacht. Von [SCOPE.sCharacter('elgar_composer_scope').GetHerHis]en zahlreichen Werken fallen [SCOPE.sCharacter('elgar_composer_scope').MakeScope.GetVariable('elgar_composer_num_compositions_var'). GetValue|V0] besonders auf.[SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_is_composer_virtuoso_type')][SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_is_composer_conductor_type')]" #1!
 elgar_is_composer_virtuoso_loc:1 " [ROOT.GetCharacter.GetSheHe|U] ist ein exzellenter #V Virtuoso#!." #1!
 elgar_is_composer_conductor_loc:1 " [ROOT.GetCharacter.GetSheHe|U] gilt als ein berühmter #V Dirigent#!." #1!
 elgar.452.g:1 "Willkommen, willkommen!" #1!
 elgar.453.t:1 "Reisender Komponist reist ab" #1!
 elgar.453.d:1 "Nach einem mehrwöchigen Aufenthalt und einigen Aufführungen, die ihm die Anerkennung der einheimischen Bevölkerung einbrachten, setzte der reisende Komponist seine Tournee fort." #1!
 elgar.453.f:1 "Wohin ein Komponist geht, hängt von einer ganzen Reihe von Faktoren ab. Ein entscheidendes Kriterium sind Opernhäuser und die Nähe zum letzten Standort. Aber auch Faktoren wie Kulturtechniken, das Vorhandensein eines Zentrums der Kunst (Impressionismus, Expressionismus, Jugendstil) oder das Vorhandensein eines Konservatoriums spielen eine Rolle. Komponisten meiden Orte, an denen kürzlich eine Aufführung eines konkurrierenden Komponisten stattgefunden hat." #1!
 elgar.453.g:1 "Ich hoffe, Sie bald wiederzusehen!" #1!
 elgar.455.t:1 "Komponist kehrt von Tournee zurück" #1!
 elgar.455.d:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] ist von [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]er Tour zurückgekehrt. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe|U] hat [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]e Spuren in der Musikwelt hinterlassen und [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]en Ruf erheblich verbessert." #1!
 elgar.455.f:1 "Tourneen dienen ausschließlich dazu, das Ansehen eines Komponisten zu steigern. Je nach den Fähigkeiten eines Komponisten wird dies unterschiedlich sein. Eigene Kompositionen spielen eine Rolle, aber auch Charaktereigenschaften - innovative oder ehrgeizige Charaktere haben Vorteile. Komponisten mit der Eigenschaft Dirigent und der Eigenschaft Virtuose erhalten einen besonderen Bonus." #1!
 elgar.455.g:1 "Willkommen zurück, Maestro." #1!
  
 elgar.501.t: "Canto degli Italiani" #1!
 elgar.501.d: "In a climate of popular struggle for unification and independence of Italy the 20-year-old student and patriot Goffredo Mameli has written an inspiring song, calling it 'The Song of the Italians'. It has become quite popular in a short time." #1!
 elgar.501.f: "Il Canto degli Italiani (The Song of the Italians) is best known among Italians as 'Inno di Mameli' (Mameli's Hymn), after the author of the lyrics, or 'Fratelli d'Italia' (Brothers of Italy), from its opening line. The text was set to music by another Michele Novaro. The hymn enjoyed widespread popularity throughout the period of the Risorgimento and in the following decades. It was also printed on leaflets in Genoa and published on the December 10: the demonstration was officially dedicated to the 101st anniversary of the expulsion of the Austrian powers from the city - in fact it was an excuse to protest against foreign occupations in Italy and induce Carlo Alberto to embrace the Italian cause of liberty. In this occasion the tricolor flag was shown and Mameli's hymn was publicly sung for the first time." #1!
 elgar.501.g: "There should be a law against it..." #1!
 elgar.501.h: "Fratelli d'Italia, l'Italia s'è desta!" #1!
 elgar.503.t: "Deutschlandlied" #1!
 elgar.503.d: "In response to France's renewed desire for expansion, which sees the Rhine as a natural border, the poet Hoffmann von Fallersleben wrote a song that is widely popular as the 'Deutschlandlied'." #1!
 elgar.503.f: "The Song of the Germans, also known as the Deutschlandlied, was written by August Heinrich Hoffmann von Fallersleben on Heligoland. The specific reason for Hoffmann to write the song were French territorial claims to the Rhineland during the Rhine Crisis. He rejected these claims with the song, as happened with other German Rhine songs of the time. He supplemented this with further ideas, especially that of German unity, which alone could provide the prerequisite for defending against enemy attacks of any size. The poet created his work expressly to the melody of the old imperial hymn 'God Save Franz, the Emperor' by Joseph Haydn (1797). The song only gained greater importance during the First World War. Its third verse has been the text of the German national anthem since 1952." #1!
 elgar.503.g: "German wine and German song!" #1!
 elgar.503.h: "Germany, Germany above all!" #1!
 elgar.503.i: "You must be mistaken, the song is called 'Gott erhalte Franz den Kaiser'." #1!
 elgar.504.t: "Paganini's death" #1!
 elgar.504.d: "The death of the famous violin virtuoso Niccolò Paganini sparked a controversy surrounding his funeral." #1!
 elgar.504.f: "Niccolò Paganini was an Italian violinist and composer. He was the most celebrated violin virtuoso of his time, and left his mark as one of the pillars of modern violin technique. His 24 Caprices for Solo Violin Op. 1 are among the best known of his compositions and have served as an inspiration for many prominent composers. In May 1840, the Bishop of Nice sent Paganini a local parish priest to perform the last rites. Paganini assumed the sacrament was premature, and refused. A week later, on May 27, 1840, the 57-year-old Paganini died from internal hemorrhaging before a priest could be summoned. Because of this, and his widely rumored association with the devil, the Church denied his body a Catholic burial in Genoa. This has led to a public discussion about how to deal with Paganini. There are voices in favor of putting pressure on the church and burying Paganini in Genoa, befitting his status, and claiming his legacy. However, this would lead to an open dispute with the ecclesiastical authorities." #1!
 elgar.504.g: "Give him a dignified burial and secure his legacy." #1!
 elgar.504.h: "Do not intervene in this delicate matter." #1!
 elgar.505.t: "Nabucco" #1!
 elgar.505.d: "Giuseppe Verdi has celebrated the greatest success of his career so far with his latest opera. At the same time, it incites the national feeling of the Italian people." #1!
 elgar.505.f: "Nabucco is an Italian-language opera in four acts composed in 1841 by Giuseppe Verdi to an Italian libretto by Temistocle Solera. The best-known number from the opera is the 'Chorus of the Hebrew Slaves', a chorus that is regularly given an encore in many opera houses when performed today. Nabucco is the opera that is considered to have permanently established Verdi's reputation as a composer. He commented that 'this is the opera with which my artistic career really begins. And though I had many difficulties to fight against, it is certain that Nabucco was born under a lucky star.' The story of the captivity of the Jews in Babylonia became a breakthrough throughout Italy, not least because Italians felt dominated by foreign powers in the age of nationalism. To what extent Verdi actually served Italian national feelings in Nabucco is still controversial today." #1!
 elgar.505.g: "Va pensiero ..." #1!
 elgar.505.h: "Those rebellious Italians again." #1!
 elgar.507.t: "Aida" #1!
 elgar.507.d: "On the occasion of the opening of the Suez Canal, Giuseppe Verdi premiered his Egyptian-tinged opera Aida - with a slight delay." #1!
 elgar.507.f: "Aida is an opera in four acts by Giuseppe Verdi to an Italian libretto by Antonio Ghislanzoni, based on a scenario often attributed to French Egyptologist Auguste Mariette, although it has been argued that the scenario was actually written by Temistocle Solera. Isma'il Pasha, Khedive of Egypt, commissioned Verdi to write the opera, paying him 150,000 francs, but the premiere was delayed. Aida met with great acclaim when it finally opened in Cairo. The costumes and accessories for the premiere were designed by Auguste Mariette, and he oversaw the design and construction of the sets, which were created in Paris and shipped to Cairo. Although Verdi did not attend the premiere in Cairo, he was most dissatisfied with the fact that the audience consisted of invited dignitaries, politicians and critics, but no members of the general public. He therefore considered the Italian (and European) premiere, held at La Scala, Milan, and in which he was heavily involved at every stage, to be its real premiere." #1!
 elgar.507.g: "A triumph for Italy!" #1!
 elgar.507.h: "A triumph for [ROOT.GetCountry.GetNameNoFlag]!" #1!
 elgar.509.t: "Franz Schubert" #1!
 elgar.509.d: "13 years after his death, Franz Schubert's 5th symphony was presented to the general public." #1!
 elgar.509.f: "The Fifth Symphony, in B flat major, is perhaps the most accomplished of his youthful symphonies and is widely regarded as Schubert's first 'mature' symphony. Its elaboration is of chamber music perfection, for the instrumentation is smaller than that of any other symphony, and its proportions are finely tuned to one another. It can be understood as Schubert's productive examination of Mozart's symphonic works and reveals Schubert's complete otherness and independence. According to Schubert's own entries on the score, the work was composed between September and October 3, 1816; it was written at a time when Schubert was looking for his own musical language. The first performance of Schubert's 5th symphony took place with a small amateur orchestra in Vienna in 1816; the first public performance, on the other hand, only took place on October 17, 1841, thirteen years after Schubert's death, under the baton of Michael Leitermayer." #1!
 elgar.509.g: "Even from heaven, Schubert delights us with his music." #1!
 elgar.510.t: "Controversy over Poliuto" #1!
 elgar.510.d: "An irreconcilable dispute between the king and the composer Donizetti threatens to trigger his dismissal." #1!
 elgar.510.f: "From 1829 to 1838 Gaetano Donizetti was music director of the Royal Theaters of Naples and, despite travels and commissions in other states, de facto the most important cultural figure of the kingdom and its most famous representative. A whole series of famous Donizetti operas were written in Naples, which consolidated the position of the Kingdom of the Two Sicilies as a top-ranking music location. But despite the many successes, Donizetti had to fight again and again with the Neapolitan censorship, which defaced his libretti or canceled entire operas. In the most recent dispute, the king himself intervened to prevent the performance of the opera 'Poliuto'. After many years of quarrels with the censorship, Donizetti has grown weary and has made preparations to flee to Paris. The political elite has united behind the king; preventing Donizetti from his plans would not only upset the political and social landscape, but would also massively damage the king's authority and reputation." #1!
 elgar.510.g: "The king has spoken, he may pack his things." #1!
 elgar.510.h: "We must do everything to prevent Donizetti from leaving!" #1!
 elgar.511.t: "Les Martyres, 1840" #1!
 elgar.511.d: "The Italian composer Gaetano Donizetti has reached Paris and performed his opera 'Les Martyres' there, which was extremely well received by the public." #1!
 elgar.511.f: "Poliuto is a three-act tragedia lirica (or tragic opera) by Gaetano Donizetti from the Italian libretto by Salvadore Cammarano, which was based on Pierre Corneille's play Polyeucte written in 1641/42. It reflected the life of the early Christian martyr Saint Polyeuctus. Regarded by one author as Donizetti's "most personal opera" with the music being "some of the finest Donizetti was to compose", Poliuto was written in 1838 for performances planned at the Teatro San Carlo in Naples later that year. However, close to the time for rehearsals to begin, King Ferdinand II refused to allow the martyrdom of a Christian saint to be seen on stage and forbade the production. Angry at the decision and with a commission for the Paris Opéra due from the composer, Donizetti paid the penalty to the San Carlo for not producing an original work as a substitute, and left Naples for Paris. As his first commission for Paris, he decided to revise Poliuto and between 1839-40 a French text, with the title Les Martyres." #1!
 elgar.511.g: "Not bad for an Italian." #1!
 elgar.512.t: "The Stabat Mater" #1!
 elgar.512.d: "Gaetano Donizetti is visiting Bologna to conduct the premiere of Gioachino Rossini's Stabat Mater. The performance was a complete success." #1!
 elgar.512.f: "When Donizetti went to Bologna for the Stabat Mater, Rossini attended the third performance, and the two men - each former students of the Bologna Conservatory - met for the first time, with Rossini declaring that Donizetti was 'the only maestro in Italy capable of conducting my Stabat as I would have it'. Friends including his brother-in-law, Antonio Vasselli (known as Totò) - continually attempted to persuade him to take up an academic position in Bologna rather than the Vienna court engagement, if for no other reason that it would give the composer a base from which to work and teach and not be continually exhausting himself with travel between cities. Donizetti reported the public's reaction: 'The enthusiasm is impossible to describe. Even at the final rehearsal, which Rossini attended, in the middle of the day, he was accompanied to his home to the shouting of more than 500 persons. The same thing the first night, under his window, since he did not appear in the hall.\"" #1!
 elgar.512.g: "Rossini & Donizetti - a match in heaven!" #1!
 elgar.513.t: "Is Donizetti going insane?" #1!
 elgar.513.d: "Donizetti's increasingly rapid mental decline led to him being committed to an insane asylum in Paris." #1!
 elgar.513.f: "Donizetti reported in his letters over a long period of time, starting in the 1820s, about headaches, sometimes fever attacks that lasted only one day and also about occasional depressive moods. The extraordinary amount of work that he accomplished throughout his life, as well as the long journeys that were particularly strenuous at the time, especially after he moved to Paris and later to Vienna, led to increased symptoms of exhaustion from 1842 to 1843. The occasional headache and fever attacks were accompanied by dizziness and sometimes 'sensations in the head'. In 1845 Donizetti's health deteriorated rapidly and he collapsed on the street in Paris. The doctors forbade him to compose - which depressed him even more. Finally, under false pretenses, he was lured into the insane asylum at Ivry-sur-Seine without his knowledge and against his will, and was forcibly interned there. The ailing composer quickly saw through his predicament as a 'prisoner' and classification as a 'maniac' and wrote desperate and heartbreaking letters to friends and relatives asking for help." #1!
 elgar.513.g: "Maybe it's better that way." #1!
 elgar.513.h: "Get him out of the insane asylum and give him rest in Bergamo." #1!
 elgar.514.f: "It took a full 17 months for Donizetti to be rescued from the mental asylum. A planned departure was prevented by doctors, but also by the police prefect of Paris for inscrutable reasons. Only with the help of diplomatic pressure could the now completely apathetic composer be brought back by his brother Francesco and his nephew Andrea. The daughter of Baroness Rosa Rota-Basoni played the piano for the composer every day and sang arias from his works, his friend Dolci spoke to him in the Bergamasque dialect and he received a visit from the tenor Rubini, but Donizetti showed no more reactions. Donizetti died a week after an apoplectic stroke with hemiplegia, high fever and subsequent infections. Autopsy results showed symptoms of 'past' meningitis and a partially damaged, inflamed spinal cord." #1!
 elgar.514.g: "A tragic death." #1!
 elgar.515.t: "Donizetti cured" #1!
 elgar.515.d: "The composer has recovered after an intensive cure and wants to compose with renewed zest for life." #1!
 elgar.515.f: "Under pressure from our government, Donizetti was quickly expelled from the insane asylum. On doctor's orders, he was to experience a several-month cure in his hometown of Bergamo under the best possible circumstances. The return to country life, freedom from stress and pressure, and returning to his roots has borne fruit after many months. Donizetti, apathetic for weeks, responded to one of his own arias, sung by Giovanna, daughter of Baroness Rosa Rota-Basoni. Talking to family members in the local dialect also showed progress day by day. After years of therapy, the once terminally ill composer seems to have been brought back to life." #1!
 elgar.515.g: "A medical miracle." #1!
 elgar.516.t: "Liszt versus Thalberg" #1!
 elgar.516.d: "Two of the most famous pianists competed against each other in Paris: Franz Liszt challenged the most important living pianist, Sigismund Thalberg." #1!
 elgar.516.f: "In the winter of 1835/36 Sigismund Thalberg made his debut in a private concert given by the secretary of the Austrian embassy in Paris. He was greeted enthusiastically by the artists present, including Rossini and Meyerbeer, and praised as the inventor of a new style of piano. While Franz Liszt's concerts in Lyon brought in around 500-600 francs, Thalberg earned 10,000 francs from a single concert at the Italian Theater. Before Thalberg appeared on his second stay in Paris, Liszt published a review riddled with insinuations and polemics. According to Liszt, Thalberg's success came about solely through propaganda. Thalberg appeared again in Paris from February 1837 and was celebrated again. On March 31, both artists performed at a charity event organized by Princess Belgiojoso." #1!
 elgar.516.g: "Thalberg was better." #1!
 elgar.516.h: "Liszt was better." #1!
 elgar.517.t: "Von der Wiege zum Grabe" #1!
 elgar.517.d: "In Rome, Franz Liszt completed his last symphonic poem. The music community doesn't know what to make of this composer's latest 'error'." #1!
 elgar.517.f: "In the late years of his life, Liszt increasingly turned to sacred music and church music. His last tone poem, 'From the cradle to the grave' therefore differed from all his predecessors. Liszt was inspired by a drawing by the Hungarian painter Mihály Zichy. Large sections of the work do not require a powerful orchestra, especially the beginning sounds like chamber music; many islands of sound are formed in which the musical material is poor, and solo passages are not uncommon, especially at the end of the movements. The harmonics used are also a harbinger of times to come. During his lifetime, however, music critics rated the work as the 'mistake of an old man'." #1!
 elgar.517.g: "Later generations will understand." #1!
 elgar.518.t: "Lohengrin" #1!
 elgar.518.d: "The premiere of Richard Wagner's 'Lohengrin' was not only a full crowd - but triggered a veritable admiration for Wagner in Germany." #1!
 elgar.518.f: "Lohengrin is a romantic opera in three acts by the German composer Richard Wagner. With Lohengrin, Wagner created the new operatic form of through-composed musical drama. The composition is not divided into individual numbers, but is played through act by act without interruption. Wagner thus sets himself apart from the conventional structure of number operas with arias, recitatives and choral parts. In order to be able to translate the inner life of the stage characters into clearly legible musical motifs, Wagner used leitmotifs (e.g. the Grail motif and the question ban motif). The opera has inspired other works of art. King Ludwig II of Bavaria named his castle Neuschwanstein Castle after the Swan Knight." #1!
 elgar.518.g: "Inspiring." #1!
 elgar.519.t: "Kunstwerk der Zukunft" #1!
 elgar.519.d: "During his stay in Switzerland, the composer Richard Wagner wrote numerous treatises on music and art that were to become groundbreaking for the German and international understanding of aesthetics." #1!
 elgar.519.f: "The 'Artwork of the Future' is an art-theoretical writings by Richard Wagner that he wrote between 1849 and 1852 in Zurich. As in his writing 'Art and the Revolution', Wagner laments the decay of the arts and develops his model of the new unity of the arts, the 'Gesamtkunstwerk'. As in his previous writings, Wagner developed his conviction that Greek art was embedded in Greek religion and mysticism and that, through the destruction of religion, art was also loosing its cohesion and becoming 'individual arts' (drama, music and dance) had to degenerate. He complains that the art of music as a pure accompaniment to the word has withered away. In the further course of hisexplanations he goes into great detail on the development of the different arts, from the ideal state during antiquity to the decadence of his time. In his next and most important written work, Opera and Drama, Richard Wagner then explains very precisely (and very theoretically) how he imagines the optimal 'union' of music and poetry. A little later he set to work on the 'practical' execution and wrote and composed his 'Ring des Nibelungen' as the music drama par excellence after years of work." #1!
 elgar.519.g: "Who is supposed to understand these hard-to-read boxed sentences?" #1!
 elgar.520.t: "Tristan und Isolde" #1!
 elgar.520.d: "Tristan und Isolde is an opera in three acts by Richard Wagner to a German libretto by the composer, based largely on the 12th-century romance Tristan and Iseult by Gottfried von Strassburg. The opera was enormously influential among Western classical composers and provided direct inspiration to composers such as Gustav Mahler, Richard Strauss, Alban Berg, Arnold Schoenberg, and Benjamin Britten. Other composers like Claude Debussy, Maurice Ravel, and Igor Stravinsky formulated their styles in contrast to Wagner's musical legacy. Many see Tristan as a milestone on the move away from common practice harmony and tonality and consider that it lays the groundwork for the direction of classical music in the 20th century." #1!
 elgar.520.f: "\"The work that has always aroused my greatest admiration is Tristan. A shuddering astonishment seizes me in front of this gigantic building, and it still seems incredible to me how a human being could conceive and realize it. I consider the second act to be one of the most sublime creations of the spirit ever created. This second act is wonderful, wonderful, unspeakably wonderful.\" - Giuseppe Verdi" #1!
 elgar.521.t: "Richard Wagner Festival" #1!
 elgar.521.d: "The establishment of Richard Wganer's Festspielhaus is considered one of the highlights of 19th-century music culture." #1!
 elgar.521.f: "The Bayreuth Festival is a music festival held annually, at which performances of operas by the 19th-century German composer Richard Wagner are presented. Wagner himself conceived and promoted the idea of a special festival to showcase his own works, in particular his monumental cycle 'Der Ring des Nibelungen' and 'Parsifal'. Performances take place in a specially designed theatre, the Bayreuth Festspielhaus. Wagner personally supervised the design and construction of the theatre, which contained many architectural innovations to accommodate the huge orchestras for which Wagner wrote as well as the composer's particular vision about the staging of his works. The Festival has become a pilgrimage destination for Wagnerians and classical-music enthusiasts. Present at this unique musical event were Kaiser Wilhelm, Dom Pedro II of Brazil, King Ludwig, and other members of the nobility, as well as the philosopher Friedrich Nietzsche and such accomplished composers as Anton Bruckner, Edvard Grieg, Pyotr Tchaikovsky, Franz Liszt, and the young Arthur Foote." #1!
 elgar.521.g: "A peak of german culture!" #1!
 elgar.523.t: "Tannhäuser Scandal" #1!
 elgar.523.d: "A performance of Richard Wagner's Tannhäuser caused a real scandal that outraged all of Parisian society. In addition to Wagner's breach of the good rules of French opera life, animosity between the German and French musical worlds also played a role." #1!
 elgar.523.f: "Wagner has always had a difficult time in Paris, not only because of his competition with the popular Giacomo Meyerbeer. In order to accommodate his opera Tannhäuser at the Grand Opera, he had to bow to French customs - such as the installation of a ballet. But Wagner vehemently resisted the specifications and only included a bacchanal. At the same time, Wagner made himself unpopular with the musicians with agonizingly long rehearsals. The premiere caused a scandal: the gentlemen of the Paris 'Jockey Club' felt betrayed when the ballet didn't appear after the overture. The gentlemen didn't come because of the music, but to watch the beautiful women and to visit them later in the changing room. Since they didn't get what they wanted, they sabotaged the event with whistles and shouts. The next day was no better: the Parisian press teared the performance up in the air. Not only France, but also Wagner's friends and enemies in Germany will be watching our reaction closely." #1!
 elgar.523.g: "He should never show up in Paris again!" #1!
 elgar.523.h: "We have to appease Herrn Wagner." #1!
 elgar.524.t: "Holberg Suite" #1!
 elgar.524.d: "Edvard Grieg's Holberg Suite, which premiered in Oslo, has not only turned out to be a musical masterpiece, but has also inspired Norwegian national sentiment." #1!
 elgar.524.f: "The Holberg Suite, subtitled 'Suite in olden style', is a suite of five movements based on eighteenth-century dance forms, written by Edvard Grieg in 1884 to celebrate the 200th anniversary of the birth of Dano-Norwegian humanist playwright Ludvig Holberg (1684-1754). It exemplifies nineteenth-century music which makes use of musical styles and forms from the preceding century. The Holberg Suite was originally composed for the piano, but a year later was adapted by Grieg himself for string orchestra. The suite consists of an introduction and a set of dances. It is an early essay in neoclassicism, an attempt to echo as much as was known in Grieg's time of the music of Holberg's era. Although not as famous as Grieg's incidental music from Peer Gynt, which is itself usually performed as arranged in a pair of suites, many critics regard the works as of equal merit." #1!
 elgar.525.t: "New Lanes" #1!
 elgar.525.d: "In the 'Neue Magazin für Musik', Robert Schumann mentioned a new artist who suddenly became famous overnight. His name is Johannes Brahms and he made a strong impression on both Schumann and his wife Clara." #1!
 elgar.525.f: "\"And he has come, young blood, at whose cradle graces and heroes have kept watch. His name is Johannes Brahms, he came from Hamburg, worked there in a dark silence, but was trained by an excellent and enthusiastic teacher in difficult settings of art, recommended to me shortly before by a revered, well-known master. On the outside, too, he wore all the signs that announce to us: He is a called man.\" - Robert Schumann" #1!
 elgar.525.g: "We expect great things from Mr. Brahms." #1!
 elgar.526.t: "Gesang der Parzen" #1!
 elgar.526.d: "Johannes Brahms's 'Song of the Fates' was premiered in Basel. Along with Vienna, Switzerland was one of Brahms' most important places to stay." #1!
 elgar.526.f: "The Gesang der Parzen (Song of the Fates) is the last composition for choir and orchestra by Johannes Brahms. More than 10 years after the cantata Rinaldo op. 50 and the Alto Rhapsody op. 53, Brahms again used a text by Johann Wolfgang von Goethe. According to Max Kalbeck, Brahms was inspired to compose by the actress Charlotte Wolter, who appeared in the role of Iphigenia at the Burgtheater in Vienna. On June 13, 1896, Brahms wrote about the piece: 'I often hear philosophizing about the sixth verse of the Parzenlied. I think the heart of the unsuspecting listener should grow soft and the eye wet at the mere entrance of the major; only then does the misery of mankind seize him.\"" #1!
 elgar.526.g: "It's as wonderful as it is disturbing." #1!
 elgar.527.t: "A composing orange plantation owner" #1!
 elgar.527.d: "The son of the well-known wool entrepreneur Julius Delius took lessons from an organist and published some of his first compositions." #1!
 elgar.527.f: "Frederick Delius, a born Englishman, was the son of the German wool entrepreneur Julius Delius. The father wanted his son to be the successor in the company, but the son paid little attention to business in Europe and was more interested in art and music. Therefore, Delius jr. transferred to an orange plantation in Florida to keep him away from the influences of the European metropolises. However, it was this transfer that was to be of outstanding importance for his later musical creativity. In Jacksonville, Delius met the Catholic organist Thomas Ward, who Delius says was the only one who actually taught him anything. A little later Delius was to publish his first compositions in Danville, Virginia." #1!
 elgar.527.g: "What was to become of this good-for-nothing?" #1!
 elgar.528.t: "An Austrian in New York" #1!
 elgar.528.d: "After disputes in his Austrian homeland, Gustav Mahler found an audience in New York, with whom his works were very well received. Some of those responsible in the US music world would like to engage him on a long-term basis." #1!
 elgar.528.f: "For some, the German doublet was too tight when they heard the name Mahler. Some out of excitement, but most out of anger. It has been like this from day one. He had an immediate effect, inciting, provocative, alarming - it doesn't matter: he belongs to the electric and electrifying natures that give off sparks or ignite at the slightest touch. In the beginning, of course, only his frenetic unpopularity made him popular. Carried by the favor of hate, carefully illuminated by envy, that eternally sleepless and powerful protector of all that is real, by ridicule, by envy and slander, proclaimed by the loudest sound carriers on every street corner, he has become famous. […] And so it was heard every day that he mistreats his musicians, whips them into inhuman work, almost incites them to death, and that if they were only able, they would all like to drown him in a spoonful of water. It was said that he shortened his singers, drilled them like recruits, played with them like the Great Turk with his slaves. […] The intensity of his being seemed to fill the whole city of New York. - Felix Salten" #1!
 elgar.528.g: "What a strange guy." #1!
 elgar.528.h: "Mahler should stay in America." #1!
 elgar.529.t: "Scythian Suite" #1!
 elgar.529.d: "Sergei Prokofiev, one of the most promising young talents in Russian music, shocked the audience today with a scandalous performance." #1!
 elgar.529.f: "Prokofiev originally wrote the music for the ballet Ala i Lolli, the story of which takes place among the Scythians. Commissioned by Sergei Diaghilev, the ballet was written to a scenario by Russian poet Sergey Gorodetsky. But when Diaghilev rejected the score even before its completion, the composer reworked the music into a suite for concert performance. The performance became the biggest scandal in the history of Prokofiev's premieres. The director of the Conservatory at the time, Alexander Glazunov, left the hall during the concert, the majority of the audience was outraged and the reviews were devastating. However, Prokofiev was not very impressed and the next day wrote succinctly to Moscow that the performance had gone on 'with a real racket'." #1!
 elgar.529.g: "A masterpiece!" #1!
 elgar.529.h: "Disgusting." #1!
 elgar.530.t: "The Rhenish Symphony" #1!
 elgar.530.d: "Robert Schumann took a job in Düsseldorf on the Rhine and was suddenly inspired by the construction work on Cologne Cathedral to write a new work." #1!
 elgar.530.f: "Robert Schumann is regarded as one of the most representative composers of the Romantic era. In 1850, he suceeded Ferdinand Hiller as musical director and moved to Düsseldorf. Although criticized regarding his poor conductor skills and scoffed because of his 'creative decay', Schumann composed his last symphony, the 'Rhenish'. He used Beethoven's and Mendelssohn's symphonies as a model, but was also inspired by his impressions of the Rhineland. Schumann himself stated that his journey to Cologne and the sight of the cathedral were his main inspiration for this composition, which became one of his most famous works." #1!
 elgar.530.g: "It was a good idea to continue building the cathedral, wasn't it?" #1!
 elgar.531.t: "Schumann's Suicide Attempt" #1!
 elgar.531.d: "The composer Robert Schumann was rescued from the river at the last minute today - he had apparently wanted to take his own life in mental confusion. It is still completely unclear how to deal with him." #1!
 elgar.531.f: "On February 10, 1854, Schumann's psychological suffering increased dramatically. He mainly complained about 'hearing problems'. Tones, chords, entire musical pieces raged in his head and robbed him of sleep. Meanwhile, Schumann was watched day and night by his wife and children and was already under medical supervision, but was still able to leave the apartment on February 27, 1854 at an unobserved moment. He headed for the nearby pontoon bridge, climbed over the railing and, after throwing his wedding ring into the water, threw himself into the river. He was rescued by the bridge master and other unknown men, taken home and looked after by a doctor who was summoned. After his suicide attempt, he wished to be admitted to the institution for the treatment and care of mentally ill and insane people in Endenich near Bonn, which was opened in 1844 by the psychiatrist Franz Richarz." #1!
 elgar.531.g:1 "Es gibt nichts was wir tun können" #1!
 elgar.531.h: "Send him to the modern mental asylum near Endenich." #1!
 elgar.532.t:1 "Der Tod von Schumann" #1!
 elgar.532.d: "After several years of mental derangement, Robert Schumann, once a promising musical talent, died in a mental asylum, ignored by the world." #1!
 elgar.532.f: "Brahms saw Schumann on March 31 and August 19, 1854 without being able to speak to him. On January 11th, February 23rd and April 2nd, 1855, however, both were able to talk in detail. Schumann was doing so well that he was able to play music on the square piano with Brahms and accompany him part of the way to the Bonn train station under the supervision of a guard. On April 10, 1856, Brahms found Schumann in a precarious condition. Schumann could no longer speak intelligibly. On May 1, 1856, it was last mentioned in the medical records that Schumann played the piano. Most of the time he could hardly express himself intelligibly. Clara Schumann's plan from April 1856 to bring Schumann to Düsseldorf and look after him there herself was not realized. From mid-July 1856, Schumann ate less and less. On July 26, 1856 he had 'twitches in various muscles, the face and the limbs'. Mucous rales suggested pneumonia. Robert Schumann died on July 29th; no one was present." #1!
 elgar.533.t: "The miraculous recovery of Robert Schumann" #1!
 elgar.533.d: "Apparently the modern methods in the Endenich sanatorium have had an effect. Schumann is showing signs of improvement, although his return to work will still take a few months." #1!
 elgar.533.f: "Schumann's miraculous recovery began after he told Peters in September 1854, shortly before their 14th wedding anniversary, that Düsseldorf had collapsed and Clara and the children were dead. In order to dispel this delusion, Peters asked Clara Schumann for a letter to her husband. This led to the first exchange of letters since the admission. From now on, Schumann again took an active part in life outside the institution. He also corresponded with his children, Johannes Brahms, Joseph Joachim and with publishers. Between September 1854 and May 1855 he wrote around 25 letters. During this time, Schumann often expressed his wish to be able to leave Endenich again. He played the piano every now and then. He studied compositions by Brahms. On January 11, 1855 he had his first visit from Johannes Brahms. From then on, Schumann's condition steadily improved until the doctors allowed Clara Schumann to visit. With her support and that of Brahms, Schumann soon began composing again - and thus initiated a self-healing process." #1!
 elgar.533.g: "But how is that possible?" #1!
 elgar.534.t: "Tango" #1!
 elgar.534.d: "Tango interpreter Carlos Gardel has recorded his first record hit with Mi noche triste." #1!
 elgar.534.f: "Carlos Gardel was the most prominent figure in the history of tango. He was one of the most influential interpreters of world popular music in the first half of the 20th century. Gardel is the most famous popular tango singer of all time and is recognized throughout the world. He created the tango-canción in 1917 with his rendition of Pascual Contursi and Samuel Castriota's Mi noche triste. With 'Mi noche triste', the birth of sentimental tango took place. Nostalgic, melodramatic, and sad, the new lyrics and the music embodied Buenos Aires and its people." #1!
 elgar.534.g: "The Triumph of Argentine Music." #1!
  
 elgar.601.t:1 "Der Tod von [SCOPE.sCharacter('elgar_composer_scope').GetLastName]" #1!
 elgar.601.d:1 "[SCOPE.sCharacter('elgar_composer_scope').GetFullName], einer der größten künstlerischen Köpfe unseres Landes und ein funkelnder Stern am musikalischen Firmament, ist heute gestorben. Er hinterlässt eine Lücke, die kaum zu schließen ist." #1!
 elgar.601.g:1 "Ein Titan der Musikgeschichte hat uns verlassen." #1!
 elgar.603.t:1 "Rossini verlässt Bologna" #1!
 elgar.603.d:1 "Rossini hat beschlossen, Bologna zu verlassen. Diese Nachricht kam nicht nur für die Einwohner der Stadt überraschend, sondern hat auch das ganze Land traurig gemacht." #1!
 elgar.603.f:1 "Als Gioacchino Rossini beschloss, Bologna und damit den Kirchenstaat zu verlassen, waren seit seinem Rückzug von der Opernbühne rund 20 Jahre vergangen. Dennoch war Rossini immer noch eine hoch angesehene Persönlichkeit und einer der beliebtesten Komponisten Italiens. Ein Hauptgrund, warum Rossini - nach einem Zwischenspiel in Florenz - wieder nach Paris zog, dürfte nicht zuletzt seine Gesundheit gewesen sein. In seinen letzten Lebensjahren als europäischer Musikstar hatte er sich körperlich und geistig bereits verschlechtert. Paris versprach eine bessere medizinische Versorgung, weshalb Rossini daran dachte, seinen Lebensabend dort zu verbringen." #1!
 elgar.603.g:1 "Aber er hat seine Tortellini nicht aufgegessen!" #1!
 elgar.609.d:1 "Franz Lachner hat heute seinen Rücktritt vom Dirigentenpult bekannt gegeben. Er sieht keine Zukunft mehr für seine Karriere." #1!
 elgar.609.f:1 "Eine ganze Reihe von Umständen führte zu Franz Lachners vorzeitigem Ausscheiden aus der Musikwelt. Ausschlaggebend dafür war die neue Musik Richard Wagners und der Siegeszug seiner Verbündeten. Lachner, der Schubert und Beethoven gekannt hatte, konnte und wollte dieser Entwicklung nicht folgen. Ähnlich wie Rossini, der begriff, dass er als Relikt einer anderen Zeit angesehen wurde, während die Welt sich weiterentwickelt hatte, zog sich Lachner zurück, nicht zuletzt wegen des Spottes und der Häme der Wagner-treuen Kritiker." #1!
 elgar.609.g:1 "Ein Verlust für [GetPlayer.GetName]." #1!
 elgar.613.f:1 "Gaetano Donizetti ist heute Morgen nach einem langen und erfüllten Leben in den Armen seiner zweiten Frau und umgeben von seinen Söhnen friedlich verstorben. Ein Trauerzug mit mehreren Musikkapellen, Hunderten von Fackelträgern und Tausenden von Zuschauern markiert den Abschied von einem Mann, von dem es heißt, er habe ein perfektes Leben geführt." #1!
 elgar.614.f:1 "Im Jahr 1867 erhielt Berlioz die Nachricht, dass sein Sohn in Havanna an Gelbfieber gestorben war. Macdonald vermutet, dass Berlioz sich von seiner Trauer ablenken wollte, indem er eine Reihe von Konzerten in St. Petersburg und Moskau gab, aber diese Reise verjüngte ihn nicht, sondern zehrte an seinen Kräften.  Er begab sich nach Nizza, um sich im mediterranen Klima zu erholen, stürzte jedoch am Ufer auf Felsen, möglicherweise aufgrund eines Schlaganfalls, und musste nach Paris zurückkehren, wo er sich mehrere Monate lang erholte. Im August 1868 fühlte er sich in der Lage, kurz nach Grenoble zu reisen, um ein Chorfestival zu beurteilen.  Nach seiner Rückkehr nach Paris wurde er immer schwächer und starb am 8. März 1869 in seinem Haus in der Rue de Calais im Alter von 65 Jahren. Er wurde auf dem Friedhof von Montmartre zusammen mit seinen beiden Ehefrauen beigesetzt, die exhumiert und neben ihm beigesetzt wurden." #1!
 elgar.615.f:1 "Nach der gescheiterten Ehe mit Carolyne zu Sayn-Wittgenstein widmete sich Liszt verstärkt Kompositionen mit religiösen Themen. In Rom, wo er sich bis 1870 überwiegend aufhielt, führte er ein teils weltliches, teils klösterliches Leben und zog sich im Sommer 1863 in ein Kloster zurück, wo ihn auch Papst Pius IX. besuchte. Im Jahr 1865 unterzog sich Liszt der Tonsur und erhielt die vier kleinen Orden. Von nun an trug er als Kleriker den römischen Kragen und wurde als Abbé angesprochen. Im Jahr 1886 besuchte Liszt die Wagner-Festspiele. Zum Zeitpunkt der Reise war Liszt bereits schwer erkrankt und starb wenige Tage nach seiner Ankunft am 31. Juli 1886 an den Folgen einer Lungenentzündung. Bernhard Schnappauf, Arzt und Freund Richard Wagners, verbrachte die letzten Tage an seinem Sterbebett und berichtete, Liszt sei ruhig und würdevoll gestorben. Er schloss die Augen und machte die Totenmaske, wofür ihm nach altem Brauch das Leichentuch und der Kissenbezug zustanden." #1!
 elgar.616.f:1 "Am 16. September 1882 reiste Wagner mit seiner Familie nach Venedig, wo er mehrere Wochen mit Franz Liszt verbrachte. Am 25. Dezember gab er als Geburtstagsgeschenk für Cosima zum letzten Mal ein gemeinsames Konzert im Teatro La Fenice; er dirigierte seine Jugendsinfonie in C-Dur. Am 13. Februar 1883 hielt er sich im Seitenflügel des Palazzo Vendramin-Calergi auf, in dem er mit seiner Familie wohnte. Gegen 15 Uhr wartete die Familie am Tisch auf Wagner, der trotz eines Herzinfarkts in seinem Arbeitszimmer an einem Aufsatz über das Weibliche im Menschen schrieb. Das Dienstmädchen fand ihn an seinem Schreibtisch zusammengesunken über den Worten 'Der Emanzipationsprozess des Weibes verläuft jedoch nur mit ekstatischen Zuckungen. Liebe - Tragödie'. Er sagte: 'Meine Frau und der Arzt', bevor er bewusstlos wurde und gegen 15:30 Uhr in Cosimas Armen starb." #1!
 elgar.617.f:1 "Edvard Grieg starb am 4. September 1907 im Alter von 64 Jahren an Herzversagen im Städtischen Krankenhaus in Bergen, Norwegen. Er hatte eine lange Krankheit hinter sich. Seine letzten Worte waren: 'Nun, wenn es denn sein muss'. Zu seiner Beerdigung kamen zwischen 30 000 und 40 000 Menschen in die Straßen seiner Heimatstadt, um ihn zu ehren. Auf seinen Wunsch hin wurde sein eigener Trauermarsch zum Gedenken an Rikard Nordraak gespielt, orchestriert von seinem Freund Johan Halvorsen, der Griegs Nichte geheiratet hatte. Außerdem wurde der Trauermarschsatz aus Chopins Klaviersonate Nr. 2 gespielt. Grieg wurde im ersten norwegischen Krematorium, das noch im selben Jahr in Bergen eröffnet wurde, eingeäschert, und seine Asche wurde in einer Berggruft in der Nähe seines Hauses in Troldhaugen beigesetzt. Nach dem Tod seiner Frau wurde ihre Asche neben seiner beigesetzt." #1!
 elgar.618.f:1 "Brahms starb am 3. April 1897 in den frühen Morgenstunden im Alter von 63 Jahren in seiner Wohnung in der Karlsgasse 4, wo er seit 1872 lebte - nach einigen Biographien an Leberkrebs, nach neueren Angaben an einem Bauchspeicheldrüsenkrebs. Seinen letzten öffentlichen Auftritt hatte er am 7. März 1897, als er Hans Richter seine Symphonie Nr. 4 dirigieren sah; nach jedem der vier Sätze gab es eine Ovation. Nach der Aufbahrung im Trauerhaus, wo Carl Kundmann ihm die Totenmaske abnahm und Ludwig Michalek ein letztes Pastellbild anfertigte, fand am 6. April die Einsegnung in der evangelischen Stadtkirche statt." #1!
 elgar.619.f:1 "\"Morgen und Wien. Ein Chaos. Man klammert sich an Details, die noch niemand wissen kann. Er soll auf dem kleinen Friedhof in Grinzing begraben werden, neben seiner kleinen Tochter. Der Leichnam wird gebracht. Am anderen Morgen. Die Straße 'an den Langen Lüssen' führt über Land zu Zypressen. Die Kapelle ist ein kleiner Raum, nur für den Sarg und einige Kränze. Die anderen säumen die Wege zum Grab. Eine Frau kommt vorbei und sagt zu einer anderen: 'Jetzt ist er drinnen in Frieden. Alles war zu klein für ihn.' Die Kirche in Grinzing ist klein, der Kirchhof schmal. Und ein Spektakel für die Wienerinnen und Wiener steht bevor. Die Kirche und der Friedhof werden abgesperrt sein. Nur mit Karten hat man Zutritt. Wir erfahren, dass Franz Schalk, Gregor und das Direktorium darum gebeten haben, dass die Oper am Tag des Begräbnisses geschlossen bleibt. Kein Wort darüber. Der Hof, die Gemeinde Wien, rührt sich nicht. Und dann die Feier. Wir stehen vor der Kirche, als der Sarg hinausgetragen wird. Es regnet. Über einen Weinbergsweg kommen wir schneller zum Grab. Die Prozession kommt an. Der Regen hört auf. Eine Nachtigall singt, die Schollen fallen. Ein Regenbogen. Und die Hunderte sind still.\" - Paul Stefan" #1!
  
 elgar.701.g:1 "Das war eine wunderbare Vorstellung." #1!
 elgar.701.h:1 "Stellen Sie diesen brillanten Mann ein!" #1!
 elgar.706.g:1 "Ist er mit seinen 20 Jahren nicht ein bisschen zu jung für eine solche Aufgabe?" #1!
 elgar.701.t: "Grande symphonie funèbre et triomphale" #1!
 elgar.701.d: "To mark the tenth anniversary of the July Revolution, Hector Berlioz composed a piece that attracted great public admiration." #1!
 elgar.701.f: "The French government commissioned the symphony for the celebrations marking the tenth anniversary of the July Revolution which had brought Louis-Philippe I to power, for which it was erecting the July Column in the Place de la Bastille. Berlioz had little sympathy for the régime, but welcomed the opportunity to write the work because the government had offered him 10,000 francs for it. The Symphonie militaire (later renamed Symphonie funèbre et triomphale), rather than following the model Berlioz had established in Romeo and Juliet, represents a reversion to an earlier pre-Beethovenian style in the tradition of monumental French public ceremonial music. Berlioz revised the score in January 1842, adding an optional part for strings and a final chorus to a text by Antony Deschamps. Richard Wagner attended a performance of this new version at the Salle Vivienne on 1 February 1842. On 5 February, he told Robert Schumann that he found passages in the last movement of Berlioz's symphony so 'magnificent and sublime that they can never be surpassed.\"" #1!
 elgar.702.t: "Liszt in Weimar" #1!
 elgar.702.d: "After many years of concert tours, the piano virtuoso and composer Franz Liszt is considering settling in Weimar." #1!
 elgar.702.f: "The Weimar years were Franz Liszt's most artistically productive period. He wrote many of his piano works in Weimar, such as the Piano Sonata in B minor, the Harmonies poétiques et religieuses cycle, fifteen Hungarian Rhapsodies, as well as numerous transcriptions, piano reductions and revisions of earlier piano works, such as the Paganini Etudes. Two of his previously conceived piano concertos also received their final form here. In Weimar, Liszt conducted many works by contemporary composers, some of whom were controversial at the time, and also performed their operas. He conducted works by Richard Wagner, who was particularly close to him and whom he helped to flee to Zurich in the spring of 1849 after the Dresden uprising. In the years that followed, he supported Wagner financially as well as morally and maintained a lively correspondence with him. Later, Liszt and Wagner often appeared together as conductors. From 1865, after Wagner had a relationship with Liszt's daughter Cosima, the relationship cooled off for a long time." #1!
 elgar.703.t: "Rienzi" #1!
 elgar.703.d: "A young composer has impressed audiences in Dresden and international artists with his opera 'Rienzi'. His name is Richard Wagner." #1!
 elgar.703.f: "\"No subsequent experience has given me feelings even remotely similar to those I had on this day of the first performance of Rienzi. The only too well-founded anxiety as to their success has so dominated my feelings at all subsequent first performances of my works that I could never really enjoy them or take much notice of the way the audience was behaving. [...] The initial success of Rienzi was no doubt assured beforehand. But the uproarious way in which the public declared its partiality for me was extraordinary ... The public had been forcibly predisposed to accept it, because everyone connected with the theatre had been spreading such favourable reports ... that the entire population was looking forward to what was heralded as a miracle ... In trying to recall my condition that evening, I can remember it only as possessing all the features of a dream.\" - Richard Wagner" #1!
 elgar.704.t: "Piano Concerto in A minor" #1!
 elgar.704.d: "A piano concerto by Edvard Grieg celebrated its world premiere today in Copenhagen. It is already foreseeable that this will be one of his most popular pieces." #1!
 elgar.704.f: "The Piano Concerto in A minor, Op. 16, composed by Edvard Grieg in 1868, was the only concerto Grieg completed. The work is among Grieg's earliest important works, written by the 24-year-old composer in 1868 in Søllerød, Denmark, during one of his visits there to benefit from the climate. Grieg's concerto provides evidence of his interest in Norwegian folk music; the opening flourish is based on the motif of a falling minor second followed by a falling major third, which is typical of the folk music of Grieg's native country. The work was premiered by Edmund Neupert on 3 April 1869, in Copenhagen, with Holger Simon Paulli conducting. Some sources say that Grieg himself, an excellent pianist, was the intended soloist, but he was unable to attend the premiere owing to commitments with an orchestra in Christiania (now Oslo). Among those who did attend the premiere were the Danish composer Niels Gade and the Russian pianist Anton Rubinstein, who provided his piano for the occasion. Grieg revised the work at least seven times, usually in subtle ways, but the revisions amounted to over 300 differences from the original orchestration." #1!
 elgar.705.t: "Variations on a theme by Haydn" #1!
 elgar.705.d: "The composer Johannes Brahms has performed a new masterpiece today, but at the same time is considering making a permanent commitment to Vienna." #1!
 elgar.705.f: "The Variations on a Theme by Haydn op. 56a is a variation work for orchestra by Johannes Brahms. The work was created in the summer of 1873 in Tutzing. The premiere took place on November 2, 1873 in Vienna under Brahms' direction. The piece falls into an epoch in which Brahms wanted to celebrate his stay in Vienna. On the one hand he left Detmold and Hamburg disappointed years ago. On the other hand, he strived to live where his great classical role models had lived and to continue the Viennese tradition." #1!
 elgar.706.t: "Mahler's first appearance" #1!
 elgar.706.d: "In Bad Hall, the young and talented conductor Gustav Mahler took up the position of Kapellmeister for the first time. In the following years he would climb the career ladder to the Vienna State Opera" #1!
 elgar.706.f: "\"And there he was in person in the theater office when I came out from my first visit to Pollini: pale, thin, small in stature, long face, the steep forehead framed by deep black hair, important eyes behind glasses, furrows of suffering and of humor in his countenance, which, while speaking to another, showed the most amazing change of expression, just as interesting, demonic, intimidating incarnation of Kapellmeister Kreisler as the youthful reader of E.T.A. Hoffmann's fantasies could imagine; he kindly asked me about my musical ability and knowledge - to which I replied, to his evident satisfaction with a mixture of shyness and self-confidence - and left me in a sort of dazed and shaken state. [...] Mahler appeared to me in face and demeanor as genius and demon [...]\" - Bruno Walter" #1!
 elgar.707.t: "Piano Concerto No. 2" #1!
 elgar.707.d: "After many setbacks, the composer Sergei Rachmaninoff has made an impressive return: his Second Piano Concerto caused frenetic applause." #1!
 elgar.707.f: "After the disastrous 1897 premiere of his First Symphony, Rachmaninoff suffered a psychological breakdown that prevented composition for three years. Although depression sapped his energy, he still engaged in performance. Conducting and piano lessons became necessary to ease his financial position. In 1899, he was supposed to perform the Second Piano Concerto in London, which he had not composed yet due to illness, and instead made a successful conducting debut. Relatives decided to introduce him to the neurologist Nikolai Dahl, whom he visited daily from January to April 1900, which helped restore his health and confidence in composition. Rachmaninoff dedicated the concerto to Dahl for successfully treating him. After he fulfilled his 1908 London concert engagement at the Queen's Hall under Serge Koussevitzky  a flattering review by The Times emerged: 'The direct expression of the work, the extraordinary precision and exactitude of Rachmaninoff's playing, and even the strict economy of movement of arms and hands which he exercises, all contributed to the impression of completeness of performance.\"" #1!
 elgar.708.t: "Symphony No. 1 'Classical\"" #1!
 elgar.708.d: "With his first symphony, Sergei Prokofiev has once again recommended himself as an up-and-coming composer. On the other hand, it pushes the young artist out into the world to be better paid." #1!
 elgar.708.f: "\"Rehearsal of the Classical Symphony with the State Orchestra, I conducted it myself, completely improvising, having forgotten the score and never indeed having studied it from a conducting perspective. I thought it might be a complete debacle, but nothing happened and in any case the parts has so many mistakes in them that the session turned mainly into one for making corrections. In Kislovodsk, I had worried that there would be some antagonism from a 'Revolutionary Orchestra' playing my new works, but the opposite was the case: the State Orchestra, infused with much new young blood, was flexible and attentive, and played the Symphony with evident enjoyment.\" - Sergei Prokofiev" #1!
 elgar.709.t: "Romeo and Juliet" #1!
 elgar.709.d: "Pyotr Tchaikovsky, an aspiring young composer, has presented his overture Romeo and Juliet. The audience received the work with mixed feelings." #1!
 elgar.709.f: "Not only at the beginning, but throughout his entire career, Tchaikovsky had to assert himself against critics and competitors. The overture Romeo and Juliet, for example, was intended to be a failure when it was published. On the other hand, this criticism, which Tchaikovsky repeatedly received throughout his life, led the composer to overcritically edit this and other works; Tchaikovsky remained one of the greatest critics of his own work throughout his career. It was also not without irony that the national Russian-minded composers praised precisely this work, even though they would later be among Tchaikovsky's harshest critics. Nevertheless, Tchaikovsky was to become one of the most important Russian composers from this period at the latest and, in just a few years, to achieve international fame that hardly any other musician of the century achieved." #1!
 elgar.710.t: "Viva Verdi" #1!
 elgar.710.d: "With the creation of the Italian National State and the addition of the opera city of Milan to our territory, we have the unique opportunity to engage one of the most important figures in Italian musical history: Giuseppe Verdi." #1!
 elgar.710.f: "Giuseppe Verdi was an Italian composer and politician, universally recognized as one of the greatest opera artists and composers of all time, together with other protagonists of nineteenth-century Italian musical theater: Gioachino Rossini, Vincenzo Bellini and Gaetano Donizetti. He sympathized with the Risorgimento movement which pursued the unification of Italy and actively participated for a short time in political life; over the course of his long existence he established a unique position among his compatriots, becoming a profound artistic symbol of the country's unity. It was for this reason that a month after his death, a solemn and endless procession crossed Milan, accompanying his remains with the notes of 'Va, pensiero' from Nabucco, written by him 60 years earlier, effectively expressing the feelings of Italians towards their missing hero. This demonstrated the extent to which Verdi's music had been assimilated into the national consciousness. His works still remain among the best known and performed in theaters around the world, in particular Aida (1871), the aforementioned Nabucco (1842) and the so-called 'Verdi triad': Rigoletto (1851), Il Trovatore (1853) and La traviata (1853)." #1!
 elgar.711.t: "Spring Symphony" #1!
 elgar.711.d: "Robert Schumann's First Symphony was performed today under the direction of Felix Mendelssohn Bartholdy. Schumann is married to the important pianist Clara (née Wieck) and has so far attracted attention more as a music critic than as a composer. Opinions differ about his pieces for piano." #1!
 elgar.711.f: "With the exception of Franz Schubert, no German-speaking composer was as misjudged during his lifetime as Robert Schumann. While Schubert's importance was only recognized after his early death, Schumann was accused of starting as a genius and ending as a talent. Contemporaries often had no access to his work or simply did not understand his works. His piano pieces, which make up part of his fame today, were mostly unknown at the time. Mockers only saw him as the man at the side of the pianist Clara Schumann. In his native Saxony he stood in the shadow of Mendelssohn. Wagner later opposed him, while Brahms became a close confidant of Clara and Robert. Liszt saw Schumann as a pioneer of musical progress in Germany, but had no success with audiences when he included Schumann's works in his repertoire. Hopes of a permanent position at an important musical institution were repeatedly dashed. Similar to Schubert, Schumann also met a premature, tragic end." #1!
 elgar.712.t: "King Olaf" #1!
 elgar.712.d: "Edward Elgar has distinguished himself in recent years with his cantatas and choral works. 'Scenes from the Saga of King Olaf', his most recent work, was well received by audiences." #1!
 elgar.712.f: "In the 1890s, Edward Elgar built up a growing reputation as a major British composer. Initially strongly influenced by continental influence - 'King Olaf' also shows echoes of the Wganer style - he gradually found his own sound language, which would encourage later British composers to take completely new paths. Elgar felt himself to be an outsider, not only musically, but socially. In musical circles dominated by academics, he was a self-taught composer; in Protestant Britain, his Roman Catholicism was regarded with suspicion in some quarters; and in the class-conscious society of Victorian and Edwardian Britain, he was acutely sensitive about his humble origins even after he achieved recognition. Nevertheless, Elgar can be considered the most important British composer since Henry Purcell." #1!
 elgar.713.t: "Hofball Music Director" #1!
 elgar.713.d: "The position of Hofball music director has been open for years. A prestigious position that was actually supposed to go to the composer Johann Strauss. He had previously been denied this honor for political reasons. There are now increasing voices to offer the position to the son of the composer who died early." #1!
 elgar.713.f: "Johann Strauss was an Austrian-German bandmaster and composer and was internationally recognized as the 'Waltz King'. He had already composed his first waltz at the age of six and had secretly taken violin lessons because his father had planned a career as a civil servant. Because the latter had broken with the family, his mother supported his musical training against his will. His first appearance at the Casino Dommayer, an entertainment venue known throughout the region, was a huge success. Tours initially took him through the Danube Monarchy with his own orchestra (which increased his rivalry with his father). After his father's death, he took over his orchestra and merged it with his. Because he had composed some works for the revolutionaries of 1848 and thus showed sympathy for the insurrectionary movement, he attracted the attention of the censorship authorities and fell out of favor at court despite his popularity. As a result, he was denied the position of court ball music director until 1863." #1!
 elgar.713.g: "He missed his chance, but he is welcome to compose." #1!
 elgar.713.h: "Give the Waltz King the place he deserves!" #1!
 elgar.714.t: "Winner of the State Prize for Composition" #1!
 elgar.714.d: "The winner of this year's State Prize for Composition is an exceptional Czech talent. His name is Antonín Dvořák." #1!
 elgar.714.f: "Antonín Dvořák was a Czech composer, who frequently employed rhythms and other aspects of the folk music of Moravia and his native Bohemia. Dvořák displayed his musical gifts at an early age, being an apt violin student from age six. In 1874, he made a submission to the Austrian State Prize for Composition, including scores of two symphonies and other works. Although Dvořák was not aware of it, Johannes Brahms was the leading member of the jury and was highly impressed. The prize was awarded to Dvořák in 1874 and again in 1876 and in 1877, when Brahms and the prominent critic Eduard Hanslick, also a member of the jury, made themselves known to him. Brahms recommended Dvořák to his publisher, Simrock." #1!
 elgar.714.g: "A well deserved trophy." #1!
 elgar.714.h: "We shouldn't miss this talent." #1!
 elgar.715.t: "The Bohemian Composer" #1!
 elgar.715.d: "Claude Debussy started out as the winner of the Prix de Rome, but has so far done little with his certified talent other than writing small, provocative piano pieces. What will become of this bohemian?" #1!
 elgar.715.f: "Even at the conservatory, assessments of Claude Debussy's talent varied widely. Some praised him as a pianist and had great hopes for him. Others described him as careless. During this time he was already a pianist in the household of Nadezhda von Meck, Tchaikovsky's patron. In 1884 Debussy won the Prix de Rome, but was unambitious during his stay in Rome. He found Italian opera boring and had little use for the prevailing style of Giuseppe Verdi. He traveled back to Paris early and lived an unstable life there: 'I am sure the Institute would not approve, for, naturally it regards the path which it ordains as the only right one. But there is no help for it! I am too enamoured of my freedom, too fond of my own ideas!\"" #1!
 elgar.715.g: "Nice piano music, but we have enough musical vagabonds." #1!
  
 elgar.1011.t:1 "Don Pasquale" #1!
 elgar.1011.d:1 "Ein großer Komponist hat gerade ein musikalisches Meisterwerk vollendet!" #1!
 elgar.1011.f:1 "Don Pasquale ist eine Oper buffa in drei Akten. Die Oper ist eine der berühmtesten ihres Genres und gehört neben L'elisir d'amore und Lucia di Lammermoor zu den wenigen Werken Donizettis, die seit dem 19. Jahrhundert eine fast ununterbrochene Aufführungstradition haben. Die auf den Komödien von Carlo Goldoni basierenden Figuren sind mehr oder weniger eng an die Typen der Commedia dell'arte angelehnt, erhalten aber durch die Fähigkeit, Trauer, Schmerz oder Reue zu empfinden und auszudrücken, eine Differenzierung, die über ihren Typus hinausgeht, sentimentale Züge. Don Pasquale war ein sofortiger Erfolg, wie ihn zuvor nur Bellinis I puritani (1835) in Paris gehabt hatte." #1!
 elgar.1011.g:1 "Bravissimo!" #1!
 elgar.1012.t: "Dom Sébastien" #1!
 elgar.1012.f: "Dom Sébastien is a French grand opera in five acts by Gaetano Donizetti.  It is a historic-fiction about King Sebastian of Portugal (1554-1578) and his ill-fated 1578 expedition to Morocco. At the time, Donizetti was attempting to compose an opera competitive with similar historical operas by Daniel Auber, Fromental Halévy and Giacomo Meyerbeer. One critical description of the nature of Dom Sébastien is 'a funeral in five acts'. The work was received with reluctance, which Donizetti himself felt was a fiasco. Although Donizetti considered his last opera to be one of his most important works, Dom Sébastien is largely forgotten today. It was written at a time when Donizetti 'no longer had unrestricted control over his imagination', so the opera was already marked by Donizetti's incipient illness." #1!
 elgar.1021.t: "Les Troyens" #1!
 elgar.1021.f: "Les Troyens is a French grand opera in five acts by Hector Berlioz. The libretto was written by Berlioz himself from Virgil's epic poem the Aeneid; the score was composed between 1856 and 1858. Les Troyens is Berlioz's most ambitious work, the summation of his entire artistic career, but he did not live to see it performed in its entirety. Under the title Les Troyens à Carthage, the last three acts were premièred with many cuts by Léon Carvalho's company, the Théâtre Lyrique, at their theatre (now the Théâtre de la Ville) on the Place du Châtelet in Paris on 4 November 1863, with 21 repeat performances. After decades of neglect, today the opera is considered by some music critics as one of the finest ever written." #1!
 elgar.1022.t: "La damnation de Faust" #1!
 elgar.1022.f: "La damnation de Faust is a work for four solo voices, full seven-part chorus, large children's chorus and orchestra by the French composer Hector Berlioz. He called it a "légende dramatique" (dramatic legend). The French composer was inspired by a translation of Goethe's dramatic poem Faust and produced a musical work that, like the masterpiece on which it is based, defies easy categorisation. Conceived at various times as a free-form oratorio and as an opera its travelogue form and cosmic perspective have made it an extreme challenge to stage as an opera. Berlioz himself was eager to see the work staged, but once he did, he conceded that the production techniques of his time were not up to the task of bringing the work to dramatic life. Most of the work's fame has come through concert performances." #1!
 elgar.1023.t: "Treatise on Instrumentation" #1!
 elgar.1023.f: "\"This Traité d'Instrumentation is a highly paradoxical work. It begins with a preface of several lines unrelated to the subject, in which the author takes a stand against musicians who abuse modulations and whose penchant for dissonance matches the taste that certain animals have for salty plants and thorny bushes. Then he turns to the orchestral instruments and mixes strange assertions with the most solid truths and valuable advice.[...] In his treatise, as in his orchestration, Berlioz, for all its oddities, is simply fabulous. To him my generation owes its education, and I dare say a good one. Berlioz possessed the invaluable gift of igniting the imagination and arousing love for the art he taught.[...] These seemingly superfluous musical examples made one dream, they opened the door to a new world, to a vast one and fascinating glimpse of the future, of the Promised Land.\" - Camille Saint-Saëns" #1!
 elgar.1031.t: "Les Préludes" #1!
 elgar.1031.f: "Les Préludes is the third of Franz Liszt's thirteen symphonic poems. The music was composed between 1845-54, and began as an overture to Liszt's choral cycle Les quatre élémens (The Four Elements), then revised as a stand-alone concert overture, with a new title referring to a poem by Alphonse de Lamartine. Les préludes is the earliest example of an orchestral work entitled 'Symphonic Poem'. Liszt sees the phases of life as preludes to the melody of death. These phases of life are struggles and storms, love happiness and pain, consolation, experiencing nature. Despite the contrasts in these moods reflected in Les Préludes, the work is of great coherence. It begins with a melancholy melody, from which the first stormy main theme develops, which leads to the second theme via a pastoral part. These two themes are developed in glidingly changing moods. In a climax, the original theme flows into the first main theme as a majestic, glamorous fanfare." #1!
 elgar.1032.t: "Hungarian Rhapsodies" #1!
 elgar.1032.f: "The Hungarian Rhapsodies is a set of 19 piano pieces based on Hungarian folk themes, composed by Franz Liszt during 1846-1853, and later in 1882 and 1885. Liszt also arranged versions for orchestra, piano duet and piano trio. Some are better known than others, with Hungarian Rhapsody No. 2 being particularly famous and No. 6, No. 10, No. 12 and No. 14 (especially as arranged for piano and orchestra as the Hungarian Fantasy) also being well known. Liszt incorporated many themes he had heard in his native western Hungary and which he believed to be folk music, though many were in fact tunes written by members of the Hungarian upper middle class, or by composers such as József Kossovits. In their original piano form, the Hungarian Rhapsodies are noted for their difficulty." #1!
 elgar.1033.t: "Dante Symphony" #1!
 elgar.1033.f: "The 'Dante Symphony' is a choral symphony composed by Franz Liszt. Written in the high romantic style, it is based on Dante Alighieri's journey through Hell and Purgatory, as depicted in The Divine Comedy. Some critics have argued that the Dante Symphony is not so much a symphony in the classical sense as it is two descriptive symphonic poems. Liszt's original intention was to compose the work in three movements: an Inferno, a Purgatorio and a Paradiso. The first two were to be purely instrumental, and the finale choral. Wagner, however, persuaded Liszt that no earthly composer could faithfully express the joys of Paradise. Liszt dropped the third movement but added a choral Magnificat at the end of the second movement. Liszt scholar Humphrey Searle argues that while Liszt may have felt more at home portraying the infernal regions than the celestial ones, the task of portraying Paradise in music would not have been beyond his powers." #1!
 elgar.1041.t: "Die Meistersinger von Nürnberg" #1!
 elgar.1041.f: "\"Die Meistersinger von Nürnberg' is a music drama, or opera, in three acts, by Richard Wagner. It is the longest opera commonly performed, taking nearly four and a half hours, not counting two breaks between acts, and is traditionally not cut. The Meistersinger of Nuremberg occupies a unique place in Wagner's oeuvre. It is the only comedy among his mature operas and is also unusual among his works in being set in a historically well-defined time and place rather than in a mythical or legendary setting. It is the only mature Wagner opera based on an entirely original story. It incorporates many of the operatic conventions that Wagner had railed against in his essays on the theory of opera: rhymed verse, arias, choruses, a quintet, and even a ballet." #1!
 elgar.1042.t: "Die Walküre" #1!
 elgar.1042.f: "\"Die Walküre' forms together with the operas 'Das Rheingold', 'Siegfried' and 'Götterdämmerung' the complete work 'Der Ring des Nibelungen'. Wagner largely followed the principles related to the form of musical drama, reflecting the feelings and moods behind the work, using a system of recurring leitmotifs to represent people, ideas, and situations rather than the conventional operatic units of arias, ensembles, and choruses. The story of Die Walküre is based on the Norse mythology told in the Völsunga saga and the Poetic Edda." #1!
 elgar.1043.t: "Parsifal" #1!
 elgar.1043.f: "Richard Wagner's Parsifal contains religious elements such as sacred music, the unveiling of the monstrance (Grail), baptism and the Christian communion ritual. Already in his Zurich art writings, he developed the idea of using art to clarify the core of religion. Wagner explained that in order to transform his parable-like message of salvation and regeneration of mankind through compassion - represented by the searching Parsifal and the suffering Amfortas - he chose an art form which, with religious symbolism, was intended to have a 'rapturing effect on the mind'. Wagner himself described the three-act play as a stage consecration festival play and decreed that it should only be performed in the Bayreuth Festspielhaus." #1!
 elgar.1051.t: "Peer Gynt" #1!
 elgar.1051.f: "Peer Gynt, Op. 23, is the incidental music to Henrik Ibsen's 1867 play of the same name, written by the Norwegian composer Edvard Grieg. Although composing many short piano pieces and chamber works, the work Grieg did for Henrik Ibsen stood out. Originally composing 90 minutes of orchestral music for the play, he later went back and extracted certain sections for the suites. Peer Gynt's travels around the world and distant lands are represented by the instruments Grieg chooses to use. Grieg later created two suites from his Peer Gynt music. Some of the music from these suites has received coverage in popular culture, especially the pieces 'Morning Mood', 'In the Hall of the Mountain King' and 'Solveig's Song'." #1!
 elgar.1052.t: "Lyric Pieces" #1!
 elgar.1052.f: "Lyric Pieces is a collection of 66 short pieces for solo piano written by Edvard Grieg. They were published in 10 volumes, from 1867 to 1901. The collection includes several of his best known pieces, such as Wedding Day at Troldhaugen, To Spring, March of the Trolls, and Butterfly. The theme of the first piece in the set, Arietta, was one of the composer's favorite melodies. In the words of pianist Andrei Gavrilow, the Lyric Pieces are 'a very special kind of diary that Grieg kept throughout his life, or a confession, because they reflect the most intimate moments in the composer's life'." #1!
 elgar.1053.t: "Norwegian Dances" #1!
 elgar.1053.f: "The Norwegian Dances were the Norwegian's answer to the hugely successful Slavonic Dances of Antonín Dvořák and the Hungarian Dances of Johannes Brahms. The two colleagues had published their dance series for piano four hands in 1878 and 1881 by the Simrock publishing house. At that time Grieg did not dare to orchestrate his dances, since the terrain was occupied by his friend Johan Svendsen's 'Norwegian Rhapsodies'. The orchestral version of his Norwegian Dances was therefore arranged by Robert Henriques - much to Grieg's satisfaction. For the first dance, Grieg used the popular Sinklar march, for the last three so-called "Hallings", traditional Norwegian bridal dances for young men, which are fast and very acrobatic to perform." #1!
 elgar.1061.t: "Deutsches Requiem" #1!
 elgar.1061.f: "\"There is little to tell here, but I still have to tell you that I am completely filled with your Requiem, it is a very powerful piece, it grips the whole person in a way like few other things. The deep seriousness, combined with all the magic of poetry, has a wonderful, shocking and soothing effect. As you know, I can never really put it into words, but I feel the whole rich treasure of this work to the core, and the enthusiasm that speaks from every piece moves me deeply, which is why I can't help myself pronounce … Oh, if I could hear it, what would I give for it.\" - Clara Schuman" #1!
 elgar.1062.t: "Hungarian Dances" #1!
 elgar.1062.f: "The Hungarian Dances by Johannes Brahms are a set of 21 lively dance tunes based mostly on Hungarian themes, completed in 1879. They vary from about a minute to five minutes in length. They are among Brahms's most popular works and were the most profitable for him. Each dance has been arranged for a wide variety of instruments and ensembles. Brahms originally wrote the version for piano four hands and later arranged the first ten dances for solo piano. The violinist Joseph Joachim, who was a friend of Brahms, created a virtuoso arrangement of all Hungarian Dances for violin and piano." #1!
 elgar.1063.t: "Symphony No. 4" #1!
 elgar.1063.f: "Symphony No. 4 is the last symphony written by Johannes Brahms. Today it is one of the composer's most popular and most frequently performed orchestral works. At first glance, the uncompromising way in which the work is designed was disconcerting. When Brahms and Ignaz Brüll played the symphony to friends on two pianos, Clara Schumann and Brahms' later biographer Max Kalbeck, among others, reacted with rejection. Eduard Hanslick is said to have exclaimed: 'Throughout the movement I felt as if I were being beaten through by two terribly clever people.' Elisabeth von Herzogenberg described the work as 'a small world for the clever and knowledgeable, in which the people who walk in the dark could only have a small part'. When Brahms attended a performance of the symphony in 1897, shortly before his death, he received thunderous applause from the Viennese audience, which the work has received to this day." #1!
 elgar.1071.t: "Symphony No. 5" #1!
 elgar.1071.f: "Like some of Mahler's other symphonies, the 5th symphony was not understood after its premiere. In 1905, after an unsuccessful performance in Hamburg, Mahler complained: 'The Fifth is a cursed work. Nobody gets it.' Music reviews in the years following the premiere were mostly negative. The music critic Ferdinand Pfohl, for example, judged that the 5th symphony was one of Mahler's weaker works. Only the Neue Zeitung für Musik gave the symphony a benevolent testimony and spoke of an 'overwhelming wealth of beauty'. Especially in comparison to the 4th symphony written two years earlier, it represents a major difference in content and form. With the rougher sound world of the 5th symphony, Mahler begins a new creative phase, which is further developed in the following 6th symphony. Only after Mahler's death did the work become more and more appreciated." #1!
 elgar.1072.t: "Lied von der Erde" #1!
 elgar.1072.f: "\"Is it really the same man who, 'in harmony with the infinite', erected the edifice of the Eighth that we now find in the drinking song of Earth's woes? Who creeps lonely in the autumn to his beloved resting place, longing for refreshment? Who looks at youth with a friendly look of old age, with gentle emotion at beauty? Who seeks to forget the meaningless earthly existence in drunkenness and finally says goodbye in melancholy? […] It is hardly the same person and composer. All works up to that point had arisen from the feeling of life [...] The earth is disappearing, a different air is blowing in, a different light shines over it. [...] When I brought the autograph back to him, almost unable to say a word about it, he opened the 'Abschied' and said, 'What do you think? Is that bearable at all? Won't people kill themselves afterwards?' He then pointed to the rhythmic difficulties and asked jokingly, 'Any idea how to conduct that? Not me!\" - Bruno Walter" #1!
 elgar.1073.t: "Kindertotenlieder" #1!
 elgar.1073.f: "\"I can well understand that one composes such terrible lyrics when one has no children or when one has lost children. But I can't understand how you can sing about the death of children if you hugged and kissed them half an hour before, happy and healthy!\" - Alma Mahler-Werfel, wife of Gustav Mahler" #1!
 elgar.1081.t: "Piano Concerto No. 3" #1!
 elgar.1081.f: "At that time Mahler was the only conductor whom I considered worthy to be classed with Nikisch. He devoted himself to the concerto until the accompaniment, which is rather complicated, had been practiced to perfection, although he had already gone through another long rehearsal. According to Mahler, every detail of the score was important - an attitude too rare amongst conductors. ... Though the rehearsal was scheduled to end at 12:30, we played and played, far beyond this hour, and when Mahler announced that the first movement would be rehearsed again, I expected some protest or scene from the musicians, but I did not notice a single sign of annoyance. The orchestra played the first movement with a keen or perhaps even closer appreciation than the previous time. - Sergei Rachmaninoff" #1!
 elgar.1082.t: "Rhapsody on a Theme of Paganini" #1!
 elgar.1082.f: "The piece consists of 24 variations on a theme that Niccolò Paganini himself used as the starting point for a series of variations. This melody has repeatedly served as a template for various composers, including Johannes Brahms and Franz Liszt. In some variations, Rachmaninoff uses another, much older melody: the sequence 'Dies irae', once an integral part of the Latin mass for the dead. Rachmaninoff used this theme again and again in his works. It appears in all the symphonies, the Symphonic Dances, the symphonic poem Die Toteninsel and the first piano sonata. The combination of a Paganini theme with the 'Dies irae' prompts the search for a programmatic background to the work. According to legend, the great violinist sold his soul to the devil in order to achieve perfection on his instrument and the love of a woman. The 'Dies irae' motif stands for the devil, the Paganini theme for the composing violinist himself." #1!
 elgar.1083.t: "Symphony No. 3" #1!
 elgar.1083.f: "\"It was played in New York, Philadelphia, Chicago, etc. At the first two performances I was present. It was played wonderfully. Its reception by both the public and critics was sour. One review sticks painfully in my mind: that I didn't have a Third Symphony in me any more. Personally, I am firmly convinced that this is a good work. But—sometimes composers are mistaken too! Be that as it may, I am holding to my opinion so far.\" - Sergei Rachmaninoff" #1!
 elgar.1091.t: "Romeo and Juliet" #1!
 elgar.1091.f: "Romeo and Juliet is Sergei Prokofiev's longest and best-known ballet and is widely regarded as his most important contribution to the genre. It is considered a highlight of his musical work. The rich and varied instrumentation as well as the rhythmic complexity of the score still pose challenges for orchestra and dancers. In some places, dissonances border on atonality. The famous 'Dance of the Knights', with its dotted rhythms, is now better known as a quasi-symphonic theme. In contrast, the themes associated with Juliet's awakening to love are at once tender and youthfully lively. Prokofiev reused music from the ballet in three suites for orchestra and a solo piano work." #1!
 elgar.1092.t: "Lieutenant Kijé" #1!
 elgar.1092.f: "Lieutenant Kijé music was originally written to accompany the film of the same name. It was Prokofiev's first attempt at film music, and his first commission. In the early days of sound cinema, among the various distinguished composers ready to try their hand at film music, Prokofiev was not an obvious choice for the commission. Based in Paris for almost a decade, he had a reputation for experimentation and dissonance. Soon after the film's release, Prokofiev received an invitation from the Moscow Radio Symphony Orchestra to create an orchestral suite from his Kijé film music - probably the first instance of a film score being adapted into a significant musical work. While Prokofiev was in the United States for the Boston premiere he was greatly sought after by film producers, but although he was flattered and attracted by their offers he never composed a Hollywood film score." #1!
 elgar.1093.t: "Peter and the Wolf" #1!
 elgar.1093.f: "Peter and the Wolf is a 'symphonic fairy tale for children'. It is Prokofiev's most frequently performed work and one of the most frequently performed works in the entire classical repertoire. The narrator tells a children's story, while the orchestra illustrates it by using different instruments to play a 'theme' that represents each character in the story: 'Each character of this tale is represented by a corresponding instrument in the orchestra: the bird by a flute, the duck by an oboe, the cat by a clarinet playing staccato in a low register, the grandfather by a bassoon, the wolf by three horns, Peter by the string quartet, the shooting of the hunters by the kettle drums and bass drum. Before an orchestral performance it is desirable to show these instruments to the children and to play on them the corresponding leitmotifs. Thereby, the children learn to distinguish the sounds of the instruments during the performance of this tale.\"" #1!
  
 elgar.1101.t: "Die Fledermaus" #1!
 elgar.1101.f: "Johann Strauss's Fledermaus is considered one of the highlights of the operetta era. Along with The Gypsy Baron and One Night in Venice, Die Fledermaus is one of the three most famous Strauss operettas and also one of the few operettas that are regularly performed at major international opera houses. The lyrics are catchy and full of irony with timeless truths. The essential parts of the music are said to have been created within 42 days. The overture, written in free sonata form, occupies a special place and is one of Johann Strauss' greatest creations. It summarizes the numerous musical highlights of the entire work and, with its varied dynamics, is always a challenge even for top orchestras." #1!
 elgar.1102.t: "Donauwalzer" #1!
 elgar.1102.f: "The waltz By the Beautiful Blue Danube (often shortened to: Danube Waltz) is compositionally based on melodies that Johann Strauss had already used in earlier works. Already at its premiere it sparked enthusiasm among the audience. Due to the large number of new musical releases in the carnival season at the time, the waltz did not initially catch on. However, because Strauss appeared in Paris at the 1867 World's Fair in the same year and created new compositions for it, he remembered to include this waltz in the program. Under the name Le beau Danube bleu, the piece became a great success during this exhibition. It is assumed that the published editions of the waltz, especially the two-hand piano version, were sold almost 1,000,000 times in a short period of time. The waltz is considered Austria's secret anthem and one of the most popular pieces in the entire history of classical music." #1!
 elgar.1103.t: "A Night in Venice" #1!
 elgar.1103.f: "A Night in Venice is a 'comic operetta' in three acts. The action takes place in Venice around the middle of the 18th century and is a comedy of disguise and mistaken identity with love confusion between two classes. Like many other Viennese operettas, the libretto is an adaptation of a French opéra-comique. The premiere in Berlin was a failure. This was partly due to the confusing plot, but also partly due to the underlying texts. The piece was therefore reworked for the premiere at the Theater an der Wien. The overture was also reworked by Strauss. The most famous musical numbers are the lagoon waltz and the gondola song. In 1923 and again in 1931 it was significantly revised by Erich Wolfgang Korngold; another version was written by Walter Felsenstein in 1954; the original version is now only very rarely performed." #1!
 elgar.1111.t: "Rigoletto" #1!
 elgar.1111.f: "Rigoletto is an opera by Giuseppe Verdi with a libretto by Francesco Maria Piave. It is based on the melodrama 'Le roi s'amuse' by Victor Hugo. The opera was initially criticized by the censors; Verdi and Piave therefore had to, among other things, change the originally intended title and move the setting from Paris to Mantua. However, the elements essential to Verdi, such as the crippled main character Rigoletto and the sack into which his dying daughter is put, remained intact. The opera is considered Verdi's first masterpiece and established his world fame. Verdi himself considered Rigoletto to be one of his most accomplished works, and unlike other Verdi operas, there are no revisions or new versions. Rigoletto was an overwhelming success at its premiere and was played at almost all European opera houses over the next few years. The opera has been part of the repertoire of many opera houses for over 160 years and remains one of the most frequently performed Italian operas." #1!
 elgar.1112.t: "La Traviata" #1!
 elgar.1112.f: "La traviata is an opera by Giuseppe Verdi and Francesco Maria Piave based on the novel La dame aux camélias by Alexandre Dumas the Younger. As before in Rigoletto and Il trovatore, Verdi placed a person ostracized and rejected by society at the center of the action. An opera about a courtesan who dies of tuberculosis was scandalous innovation at the time. The work failed at the premiere, even though Verdi had staged it himself and, as a precaution, moved the action to the time of Louis XIV. After its revision, Verdi had it performed again a year later - after which it became one of the most successful operas in music history. In some countries it is the most performed opera ever. In terms of the number of recordings made, La traviata is only surpassed by Aida. For censorship reasons, the opera was also performed in Italy under the title Violetta." #1!
 elgar.1113.t: "Messa da Requiem" #1!
 elgar.1113.f: "Under the impression of the death of Gioachino Rossini in 1868, Giuseppe Verdi invited the twelve most important composers in Italy at the time to jointly compose a funeral mass, the so-called Messa per Rossini. He himself took over the setting of the final movement, 'Libera me', in this requiem. However, a performance did not take place due to adverse circumstances. Verdi once again dealt with the Requiem material after the poet Alessandro Manzoni died in 1873. Verdi deeply admired the highly respected Manzoni. He offered the city of Milan the composition of a mass to be performed a year after Manzoni's death. The 'Libera me' from the Rossini Mass now became the nucleus of the new Requiem for Manzoni. The setting of 'Dies irae' from the older composition was taken up three times for passages of the sequence with the same or similar text. The first performance, at the San Marco church in Milan on May 22, 1874, marked the first anniversary of Manzoni's death. Verdi himself conducted." #1!
 elgar.1121.t: "Prélude à l'après-midi d'un faune" #1!
 elgar.1121.f: "\"The music of this prelude is a very free illustration of Mallarmé's beautiful poem. By no means does it claim to be a synthesis of it. Rather there is a succession of scenes through which pass the desires and dreams of the faun in the heat of the afternoon. Then, tired of pursuing the timorous flight of nymphs and naiads, he succumbs to intoxicating sleep, in which he can finally realize his dreams of possession in universal Nature.\"\n\nPrelude to the Afternoon of a Faun is a symphonic poem for orchestra and one of Debussy's most famous works. The piece is considered a turning point in the history of Western art music as well as a masterpiece of Impressionist composition. Pierre Boulez considered the score to be the beginning of modern music, observing that 'the flute of the faun brought new breath to the art of music.\"" #1!
 elgar.1121.g: "Indulge, dream, enjoy the never-ending moment..." #1!
 elgar.1122.t: "La Mer" #1!
 elgar.1122.f: "\"Last night's concert began with a lot of impressionistic daubs of color smeared higgledy-piggledy on a tonal palette, with never a thought of form or purpose except to create new combinations of sounds. … One thing only was certain, and that was that the composer's ocean was a frog-pond and that some of its denizens had got into the throat of every one of the brass instruments.\"\n\nComposed between 1903 and 1905, La mer was premiered in Paris in October 1905. It was initially not well received. Even some who had been strong supporters of Debussy's work were unenthusiastic, even though the piece presented three key aspects of Debussy's aesthetic: Impressionism, Symbolism and Japonism. In the decades after the premiere La mer established itself in the core orchestral repertoire." #1!
 elgar.1123.t: "Pelléas et Mélisande" #1!
 elgar.1123.f: "\"As a teacher he was pedantic—that's the only word. Really pedantic ... There was a core of anger and bitterness in him—I often think he was rather like Golaud in Pelléas and yet he wasn't. He was—it's in all his music—a very sensual man. No one seemed to like him. Jean Périer, who played Pelléas to my Mélisande, went white with anger if you mentioned the name of Debussy...\"\n\nPelléas et Mélisande is an opera in five acts. The genre name of the composer Claude Debussy is 'Drame lyrique'. The text is an adaptation of the play Pelléas et Mélisande by Maurice Maeterlinck. Debussy avoided arias and larger solo scenes, which gave the text a realistic character. Pelléas was to be Debussy's only completed opera. For this reason it has sometimes been compared to Beethoven's Fidelio." #1!
 elgar.1131.t: "Swan Lake" #1!
 elgar.1131.f: "Swan Lake is a world-famous ballet to the music of Pyotr Ilyich Tchaikovsky, which premiered in 1877 at the Bolshoi Theater in Moscow and is part of the standard repertoire of classical ballet companies. Common motifs from numerous fairy tales can be found in Swan Lake: in particular the unfortunate enchanted princess who is redeemed by the love of a prince. The unfortunate ending of the original libretto is also a well-known fairy tale motif of the swan girl or swan maiden. Tchaikovsky drew on previous compositions for his Swan Lake score. According to two of Tchaikovsky's relatives the composer had earlier created a little ballet called 'The Lake of the Swans' at their home in 1871. This ballet included the famous Leitmotif. He also made use of material from 'The Voyevoda', an opera he had abandoned in 1868. By April 1876 the score was complete, and rehearsals began. Soon the choreographer Reisinger began setting certain numbers aside that he dubbed 'undanceable'. Reisinger even began choreographing dances to other composers' music, but Tchaikovsky protested and his pieces were reinstated." #1!
 elgar.1132.t: "Symphony No. 6 'Pathétique\"" #1!
 elgar.1132.f: "\"I am now wholly occupied with the new work ... and it is hard for me to tear myself away from it. I believe it comes into being as the best of my works. I must finish it as soon as possible, for I have to wind up a lot of affairs and I must soon go to London. I told you that I had completed a Symphony which suddenly displeased me, and I tore it up. Now I have composed a new symphony which I certainly shall not tear up.\"\n\nTwo years after the premiere of his Symphony No. 5 in E minor, Op. 64, Tchaikovsky planned, as he wrote to a friend, 'to write a magnificent symphony that will form the keystone of my entire work'. The composer entitled the work 'The Passionate Symphony'. Characteristic of the work is the slow final movement - unusual for symphonies - whose end is reminiscent of a requiem." #1!
 elgar.1133.t: "Violin Concerto in D major" #1!
 elgar.1133.f: "The Violin Concerto in D major is the only violin concerto by the Russian composer Pyotr Ilyich Tchaikovsky. Tchaikovsky wrote the concerto in March and April 1878 in Clarens, a wine-growing town on Lake Geneva. There he recovered from depression and a severe nervous breakdown. The positive effect of his stay was reflected in the concert, in which his newfound joy of life manifested itself. The composition work was completed after three weeks, although Tchaikovsky replaced the originally planned middle movement with the Andante known as 'Canzonetta'. Music critics reacted negatively to the work. Tchaikovsky reacted calmly and was convinced that the concerto would prevail. To this day, it is one of the most famous, most performed and most played violin concertos in the world." #1!
 elgar.1141.t: "Pomp & Circumstance" #1!
 elgar.1141.f: "The Pomp and Circumstance Military Marches are a series of five (or six) marches for orchestra. They include some of Elgar's best-known compositions. The best known of the six marches, Pomp And Circumstance March No. 1 In D had its premiere, along with March No. 2, in Liverpool on 19 October 1901. Elgar and his wife attended, and it was a 'frantic' success. The Trio contains the tune known as 'Land of Hope and Glory'. In 1902 the tune was re-used, in modified form, for the 'Land of hope and glory' section of his Coronation Ode for King Edward VII. The words were further modified to fit the original tune, and the result has since become a fixture at the Last Night of the Proms, and an English sporting anthem and general patriotic song." #1!
 elgar.1141.g: "Land of Hope and Glory!" #1!
 elgar.1142.t: "The Crown of India" #1!
 elgar.1142.f: "The Crown of India, was a masque, an elaborate theatrical presentation, staged in 1912 to celebrate the visit the preceding December of King George V and Queen Mary to Delhi for their coronation as Emperor and Empress of India. For this masque, the English composer Sir Edward Elgar wrote the music , with a libretto by Henry Hamilton. The masque consisted of two tableaux: 'The Cities of Ind' and 'Ave Imperator!'. Elgar later extracted five of the pieces and added an intermezzo for solo violin to create The Crown of India Suite.  The Suite gained immediate popularity: during Elgar's lifetime, there were 102 live performances of it on the BBC." #1!
 elgar.1143.t: "Enigma Variations" #1!
 elgar.1143.f: "The Enigma Variations are an orchestral work that describes the people from Elgar's environment in 14 variations. They made Elgar internationally known after their premiere by the conductor Hans Richter. The 'Enigma' from the title does not refer to the assignment of which variation is dedicated to which friend, but to another puzzle. According to Elgar, there is a different and larger theme running through the whole composition, but it is not played, and the actual theme is composed as a countermelody to it. Various theories have been put forward so far. The 9th variation (Nimrod) in particular gained great popularity." #1!
 elgar.1151.t: "The 9th Symphony" #1!
 elgar.1151.f: "In 1892, Dvořák moved to the United States and became the director of the National Conservatory of Music of America in New York City. While in the United States, Dvořák wrote one of his most successful orchestral works: the Symphony 'From the New World', which spread his reputation worldwide. It has been said that Dvořák was inspired by the 'wide open spaces' of America, such as prairies he may have seen on his trip to Iowa in the summer of 1893. Dvořák was also influenced by the style and techniques used by earlier classical composers including Beethoven and Schubert. The falling fourths and timpani strokes in the New World Symphony's Scherzo movement evoke the Scherzo of Beethoven's Symphony No. 9. At the premiere in Carnegie Hall, the end of every movement was met with thunderous clapping and Dvořák felt obliged to stand up and bow." #1!
 elgar.1152.t: "Slavonic Dances" #1!
 elgar.1152.f: "The Slavonic Dances are a collection of 16 instrumental pieces by Antonín Dvořák, written for piano four hands and each shortly afterwards arranged for orchestra. They are among the Czech composer's most famous works. Dvořák's compositions use characteristic rhythmic patterns of Bohemian and Moravian folk dances as well as those of neighboring countries. However, they are still completely independent creations of the composer. In the first row there are two Furiants characterized by rhythm changes, two Sousedskás similar to the Ländler, two Skočnás (fast jumping dance), a Polka and, as the only non-Czech dance, a Ukrainian Dumka. In the second series, non-Czech dances predominate, which is why Dvořák was exposed to some hostility. He was accused of not identifying enough with his homeland and instead wanting to make himself popular abroad." #1!
 elgar.1153.t: "Rusalka" #1!
 elgar.1153.f: "Rusalka is Antonín Dvořák's most successful opera. It was created based on a libretto by Jaroslav Kvapil and goes back to Slavic folk myths about the rusalky (water spirits, mermaids) and is similar to the German story Undine by Friedrich de la Motte Fouqué, Hans Christian Andersen's fairy tale The Little Mermaid and the Old French Melusine saga. The opera with the subtitle Lyric Fairy Tale is also known as the 'Czech Undine'. Along with Bedřich Smetana's The Bartered Bride, Rusalka is the most famous Czech opera. The opera Rusalka occupies a prominent place in the development of Czech dramatic music." #1!
 elgar.1161.t: "Fantasie in C-Dur" #1!
 elgar.1161.f: "The Fantasy in C major is one of Robert Schumann's most important piano compositions. Along with the Kreisleriana and Children's Scenes, it is one of the composer's best-known pieces and is part of the core of romantic piano literature. He dedicated it to Franz Liszt, the admired virtuoso who thanked him years later by donating his great B minor sonata to him. The visionary swing of this piano fantasy and the power sustained throughout the entire composition are reminiscent of the architectural mastery of Ludwig van Beethoven, from whose song cycle 'To the distant beloved' Schumann quotes several times in the first movement, while in the third movement he uses a theme from the Allegretto of the 7th Symphony takes up." #1!
 elgar.1162.t: "Piano Concerto in A minor" #1!
 elgar.1162.f: "The Piano Concerto in A minor op. 54 is a romantic solo concerto for piano and orchestra that was written during the High Romantic period. It bears many characteristics of the romantic era. Like some other piano concertos of the 19th century, the A minor concerto has a symphonic character. Since the work was initially conceived as a fantasy, the entire concert has romantic and fantastic impressions. Schumann needed over five years for the delayed completion. On the title page of the autograph, Schumann points out the different times in which the movements were written. The basic ideas of the work are longing and the happiness of two people in love. In this work, Schumann translates his fight for Clara Wieck into music. The main theme of the first movement is similar to the melody of the Florestan aria from Beethoven's opera Fidelio. Congruent with Beethoven, this theme also stands for spousal loyalty and the fight for freedom in Schumann." #1!
 elgar.1163.t: "Kinderszenen" #1!
 elgar.1163.f: "The Kinderszenen (Children's Scenes) is a cycle by Robert Schumann consisting of thirteen short piano pieces. In contrast to the 'Album for the Youth', these are pieces that were not composed for children, but, in Schumann's own words, as a 'reflection of an older person for older people'. The most famous and longest piece in the cycle is 'Träumerei'. With a playing time of just under 20 minutes, the Children's Scenes are among the most popular Romantic piano works today. Although the Children's Scenes were not particularly successful during Schumann's lifetime, the work had a special meaning, at least for him. An exchange of letters from 1839 shows that Schumann at that time firmly believed in the possibility of a marital union with Clara Wieck and that the Children's Scenes arose from his optimistic and cheerful side." #1!
 elgar.1171.t: "Violin Concerto in E minor" #1!
 elgar.1171.f: "Felix Mendelssohn's Violin Concerto in E minor is his last concerto. Well received at its premiere, it has remained among the most prominent and highly-regarded violin concertos. It holds a central place in the violin repertoire and has developed a reputation as an essential concerto for all aspiring concert violinists to master, and usually one of the first Romantic era concertos they learn. The work itself was one of the foremost violin concertos of the Romantic era and was influential on many other composers.Although the concerto consists of three movements in a standard fast-slow-fast structure and each movement follows a traditional form, it was innovative and included many novel features for its time. Distinctive aspects include the almost immediate entrance of the violin at the beginning of the work - rather than following an orchestral preview of the first movement's major themes, as was typical in Classical-era concertos." #1!
 elgar.1181.t: "Ètudes" #1!
 elgar.1181.f: "Frédéric Chopin wrote a total of 27 études for piano: 12 études op. 10 (published in 1833), 12 études op. 25 (published in 1837) and another three études for the third part (Études de perfectionnement pour le piano, published in 1840) of the piano school Méthodes des Méthodes by Ignaz Moscheles and François-Joseph Fétis. The three études were later published separately under the title Trois nouvelles études. As the 'Magna Carta of piano playing' (Karl Schumann), they are among the most important piano compositions in music history. Great piano composers such as Alkan, Scriabin, Debussy and Rachmaninoff took their cues from them. Franz Liszt and Józef Wieniawski were the first pianists to publicly perform Chopin études." #1!
 elgar.1191.t: "Ein Leben für den Zar" #1!
 elgar.1191.f: "After years of listening to singers, romancing women with his music, and meeting famous people including Mendelssohn, Berlioz and Liszt, Glinka realized that his life's mission was to return to Russia, write in a Russian manner, and do for Russian music what Donizetti and Bellini had done for Italian music. A Life for the Tsar was the first of Glinka's two great operas. It was originally entitled Ivan Susanin. Set in 1612, it tells the story of the Russian peasant and patriotic hero Ivan Susanin who sacrifices his life for the Tsar by leading astray a group of marauding Poles who were hunting him. With this opera Glinka succeeded in creating an independent Russian music; it is considered the first Russian opera." #1!
 elgar.1192.t: "Ruslan and Ljudmila" #1!
 elgar.1192.f: "Ruslan and Lyudmila is a 'fantastic opera' in five acts with music by Mikhail Glinka with a libretto by Nestor Kukolnik and others based on the poem of the same name by Alexander Sergeyevich Pushkin. Pushkin's death in the famous duel prevented him from writing the libretto himself as planned. As with 'A Life for the Tsar', Ruslan employs some aspects of Russian folk music; it is also noted for imaginative use of dissonance, chromaticism, and Eastern elements. Of particular consequence is the use of the whole tone scale for the first time in Russian music. The rollicking overture is one of the best known orchestral showpieces in the West and known for being a nightmare for bassists." #1!
 elgar.1193.t: "Kamarinskaya" #1!
 elgar.1193.f: "Kamarinskaya is a traditional Russian folk dance, which is mostly known today as the Russian composer Mikhail Glinka's composition of the same name. Glinka's Kamarinskaya, written in 1848, was the first orchestral work based entirely on Russian folk song and to use the compositional principles of that genre to dictate the form of the music. It became a touchstone for the following generation of Russian composers ranging from the Western-oriented Pyotr Ilyich Tchaikovsky to the group of nationalists known collectively as The Five and was also lauded abroad, most notably by French composer Hector Berlioz. For Tchaikovsky, Kamarinskaya offered a viable example of the creative possibilities of folk songs in a symphonic structure, using a variety of harmonic and contrapuntal combinations." #1!
  
