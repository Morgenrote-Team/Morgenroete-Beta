 je_elgar_accademia_santa_cecilia: "Erhebe Santa Cecilia in den Status einer Akademie"
 je_elgar_accademia_santa_cecilia_reason: "Die Accademia di Santa Cecilia wurde 1585 durch die päpstliche Bulle \"Ratione congruit\" von Sixtus V. in Form einer Kongregation gegründet. Im Jahr 1838 wurde die Kongregation der Heiligen Cäcilia offiziell zur Akademie und dann zur Päpstlichen Akademie ernannt. Zu seinen damaligen Mitgliedern gehörten Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod und Meyerbeer. Eines seiner Ehrenmitglieder war Königin Victoria. Im vereinigten Italien entwickelte es sich zu einem führenden Konservatorium."
 je_elgar_leipzig_conservatory: "Leipziger Konservatorium gefunden"
 je_elgar_leipzig_conservatory_reason: "Die traditionsreiche Musikstadt Leipzig, in der bereits Johann Sebastian Bach wirkte, bot zu Beginn des 19. Jahrhunderts optimale Voraussetzungen für die Gründung einer musikalischen und akademischen Talentschmiede. Vier engagierte Bürger der Stadt, nämlich der Jurist Heinrich Conrad Schleinitz (Zweiter Direktor), der Bezirksdirektor von Leipzig Johann Paul von Falkenstein und der Königlich-Sächsische Hofrat Johann Georg Keil sowie der Gewandhauskapellmeister Felix Mendelssohn Bartholdy setzten die bisherigen Ideen um üben."
 je_elgar_petrograd_conservatory: "Petrograder Konservatorium gründen"
 je_elgar_petrograd_conservatory_reason: "Auf Initiative der Großherzogin Elena Pawlowna, Anton Rubinstein, Andrei Nikolajewitsch Markowitsch und anderer Persönlichkeiten der Gesellschaft und des Musiklebens wurde die Russische Musikgesellschaft gegründet, aus deren Musikklassen das erste Konservatorium Russlands entstand. Anton Rubinstein war der erste Direktor des Konservatoriums und Professor für Klavier. Der erste Absolvent, der hier sein Kompositionsstudium abschloss, war Peter Tschaikowsky. Eine besonders einflussreiche Rolle hatte Nikolai Andrejewitsch Rimski-Korsakow als Professor für Komposition und Instrumentierung sowie Leiter der Orchesterklasse."
 elgar.201.t: "Der [SCOPE.sState('elgar_art_capital').GetCityHubName]-Preis"
 elgar.201.d: "Die Elite unseres kunstinteressierten Landes drängt auf einen Künstlerpreis für die besten Kompositionen."
 elgar.201.f: "Länder mit einem Zentrum des Irrationalismus oder des Impressionismus veranstalten von Zeit zu Zeit Musikwettbewerbe. Die fünf talentiertesten Komponisten erhalten einen Preis, der sich positiv auf ihre Reputation auswirkt. Ein Kunstpreis wird in der Regel alle fünf Jahre verliehen. Große Komponisten werden nicht eingeladen – sie haben ihre Belohnung bereits erhalten."
 elgar.201.g: "Wir sollten einen Kunstwettbewerb organisieren."
 elgar.201.h: "Was für eine Geldverschwendung!"
 elgar.202.t: "Der [SCOPE.sState('elgar_art_capital').GetCityHubName]-Preis"
 elgar.202.d: "Die Jury ist zu einem Ergebnis gekommen und hat die besten Kompositionen ausgewählt. Die Liste der fünf Gewinner macht bereits die Runde."
 elgar.202.f: "1. [SCOPE.sCharacter('elgar_character_first_winner_scope').GetFullName] aus [GetGlobalVariable('elgar_prize_winner_1_global_var').GetCountry.GetAltName('DAT')]\n2. [SCOPE.sCharacter('elgar_character_second_winner_scope').GetFullName] aus [GetGlobalVariable('elgar_prize_winner_2_global_var').GetCountry.GetAltName('DAT')]\n3. [SCOPE.sCharacter('elgar_character_third_winner_scope').GetFullName] aus [GetGlobalVariable('elgar_prize_winner_3_global_var').GetCountry.GetAltName('DAT')]\n4. [SCOPE.sCharacter('elgar_character_fourth_winner_scope').GetFullName] aus [GetGlobalVariable('elgar_prize_winner_4_global_var').GetCountry.GetAltName('DAT')]\n5. [SCOPE.sCharacter('elgar_character_fifth_winner_scope').GetFullName] aus [GetGlobalVariable('elgar_prize_winner_5_global_var').GetCountry.GetAltName('DAT')]"
 elgar.202.g: "Preisverleihung an die Gewinner."
 elgar.1201.t: "Daphnis und Chloé"
 elgar.1201.f: "Daphnis und Chloé ist eine symphonie chorégraphique oder choreografische Symphonie für Orchester und wortlosen Chor. Es besteht aus drei Hauptabschnitten oder Abschnitten und einem Dutzend Szenen, die meisten davon Tänze, und dauert knapp eine Stunde, was es zum längsten Werk des Komponisten macht. Tatsächlich handelt es sich um ein Ballett, und als solches wurde es auch erstmals aufgeführt. Das Tanzszenario wurde vom Choreografen Michel Fokine aus einer Hirtenromanze des griechischen Schriftstellers Longus adaptiert, die vermutlich aus dem 2. Jahrhundert n. Chr. stammt. Daphnis et Chloé ist mit fast einer Stunde Länge Ravels längstes Werk. Vier erkennbare Leitmotive verleihen ihm eine musikalische Einheit. Die Musik gehört zu den leidenschaftlichsten des Komponisten und gilt weithin als eine seiner besten, mit außergewöhnlich üppigen Harmonien, die typisch für die impressionistische Bewegung sind. Schon zu Lebzeiten des Komponisten bezeichneten Kommentatoren es als sein Meisterwerk für Orchester."
 elgar.1202.t: "Rhapsodie Espagnole"
 elgar.1202.f: "Die zwischen 1907 und 1908 komponierte Rapsodie ist eines von Ravels ersten großen Orchesterwerken. Es wurde 1908 in Paris uraufgeführt und gelangte schnell ins internationale Repertoire. Das Stück greift auf das spanische Erbe des Komponisten zurück und ist eines von mehreren seiner Werke, die in Spanien spielen oder dieses widerspiegeln. Die Uraufführung der Rapsodie fand am 15. März 1908 im Théâtre du Châtelet durch das Orchestre des Concerts Colonne unter der Leitung von Édouard Colonne statt. Die kritische Aufnahme war im Allgemeinen positiv. Abweichende Stimmen waren Pierre Lalo, der Ravels Musik gewohnheitsmäßig nicht mochte, und Gaston Carraud, der die Partitur als \"schlank, inkonsistent und flüchtig\" bezeichnete. Ansonsten gab es viel Lob für die subtile und frische Orchestrierung und die Bildhaftigkeit der Musik."
 elgar.1203.t: "Boléro"
 elgar.1203.f: "\"Ich habe nur ein Meisterwerk geschaffen, das ist der Boléro; Leider enthält es keine Musik.\" -Maurice Ravel"
 elgar.1211.t: "Zwölftontechnik"
 elgar.1211.f: "Die Zwölftontechnik – auch bekannt als Dodekaphonie und Zwölftonserialismus – ist eine Methode der musikalischen Komposition. Die Technik stellt sicher, dass alle 12 Noten der chromatischen Tonleiter in einem Musikstück gleich oft erklingen, und verhindert gleichzeitig die Betonung einer einzelnen Note durch die Verwendung von Tonreihen und Reihenfolgen der 12 Tonhöhen. Somit erhalten alle 12 Noten mehr oder weniger die gleiche Bedeutung, und die Musik vermeidet die Einteilung in eine Tonart. Im Laufe der Zeit erfreute sich die Technik großer Beliebtheit und erlangte schließlich großen Einfluss auf Komponisten des 20. Jahrhunderts. Es wird allgemein als eine Form des Serialismus angesehen."
 elgar.1211.g: "Ich bin mir nicht so sicher, ob das eine gute Idee war."
 elgar.1212.t: "Streichquartett Nr. 2."
 elgar.1212.f: "Dieses viersätzige Werk entstand in einer sehr emotionalen Zeit in Schönbergs Leben. Der dritte und vierte Satz sind für ein Streichquartett recht ungewöhnlich, da sie auch eine Sopranistin enthalten und Gedichte von Stefan George verwenden. Über die Vertonung von George schrieb Schönberg später selbst: \"Ich wurde von Gedichten des deutschen Dichters Stefan George inspiriert, Musik zu einigen seiner Gedichte zu komponieren, und überraschenderweise zeigten diese Lieder ohne jede Erwartung meinerseits einen ganz anderen Stil als …\" alles, was ich zuvor geschrieben hatte. … Neue Klänge wurden erzeugt, eine neue Art von Melodie erschien, ein neuer Ansatz zum Ausdruck von Stimmungen und Charakteren wurde entdeckt.\""
 elgar.1212.g: "Großartig! Aber könnte die \"Musik\" vorerst aufhören?"
 elgar.1213.t: "Kammersymphonie Nr. 1"
 elgar.1213.f: "Schönbergs erste Kammersymphonie wurde 1906 fertiggestellt und am 8. Februar 1907 in Wien vom Rosé Quartett zusammen mit einem Bläserensemble der Wiener Philharmoniker unter der Leitung des Komponisten uraufgeführt. Im Jahr 1913 dirigierte Schönberg das Stück erneut im Rahmen des berühmten Skandalkonzerts, bei dem die heterodoxen Tonalitäten von Schönbergs Symphonie und vor allem der Werke seines Schülers Alban Berg die Anwesenden zu Protestkundgebungen anstifteten und das Konzert vorzeitig beendeten."
 elgar.1213.g: "Wird das nie enden?"
 elgar.1221.t: "Der Feuervogel"
 elgar.1221.f: "Der Feuervogel ist ein Ballett- und Orchesterkonzertwerk, das auf den russischen Märchen vom Feuervogel und dem Segen und Fluch basiert, den er für seinen Besitzer mit sich bringt. Die sterblichen und übernatürlichen Elemente des Balletts werden durch ein System von Leitmotiven unterschieden, die in der Harmonie angeordnet sind und als \"Leitharmonie\" bezeichnet werden. Strawinsky verwendete im Orchester absichtlich viele spezielle Techniken, darunter Ponticello, Col Legno, Flautando, Glissando und Flatterzunge. Das Ballett spielt im Schloss des bösen unsterblichen Koschei und folgt Prinz Ivan, der mit Hilfe des magischen Feuervogels gegen Koschei kämpft."
 elgar.1222.t: "Petruschka"
 elgar.1222.f: "Petrouchka wurde für die Pariser Saison 1911 der Ballets Russes von Sergej Diaghilew geschrieben. Das Ballett erzählt die Geschichte der Liebe und Eifersucht dreier Puppen. Die drei werden vom Scharlatan während der Fastnachtsmesse (Maslenitsa) 1830 in Sankt Petersburg zum Leben erweckt. Petrushka vereint Musik, Tanz und Design zu einem Ganzen. Es handelt sich um eine der beliebtesten Produktionen des Ballets Russes. Heutzutage wird es in der Regel mit den ursprünglichen Entwürfen und Choreografien aufgeführt. Charakteristisch für das Werk ist der sogenannte Petruschka-Akkord, ein bitonales Mittel, das das Erscheinen der Hauptfigur ankündigt."
 elgar.1223.t: "Sacre du printemps"
 elgar.1223.f: "Das Frühlingsopfer ist ein Ballett- und Orchesterkonzertwerk des russischen Komponisten Igor Strawinsky. Es wurde für die Pariser Saison 1913 der Ballets Russes von Sergej Diaghilew geschrieben; Die ursprüngliche Choreografie stammte von Vaslav Nijinsky mit Bühnenbildern und Kostümen von Nicholas Roerich. Bei seiner Uraufführung am 29. Mai 1913 im Théâtre des Champs-Élysées sorgte der avantgardistische Charakter der Musik und Choreografie für Aufsehen. Viele haben die Reaktion am ersten Abend als \"Aufstand\" oder \"Beinahe-Aufstand\" bezeichnet, obwohl diese Formulierung erst über ein Jahrzehnt später in Rezensionen späterer Aufführungen zustande kam. Obwohl die Musik als Bühnenwerk mit spezifischen Passagen zur Begleitung von Charakteren und Handlung konzipiert war, erlangte sie als Konzertstück ebenso große, wenn nicht sogar größere Anerkennung und gilt weithin als eines der einflussreichsten Musikwerke des 20. Jahrhunderts."
