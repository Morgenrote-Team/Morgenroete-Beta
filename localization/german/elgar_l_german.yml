 elgar.801.t: "Eine Nationalhymne"
 elgar.801.d: "Mit dem wachsenden Nationalgefühl in unserem Volk wächst heute nicht nur unter den Intellektuellen, sondern auch in breiten Schichten der Bevölkerung der Wunsch nach einer Nationalhymne, die den Herrscher, das Land und das Volk angemessen repräsentiert."
 elgar.801.f: "Schon vor der Mitte des 19. Jahrhunderts gab es in Europa und Amerika viele Länder, die bei offiziellen Anlässen bestimmte Lieder spielten, oft um den Monarchen zu repräsentieren. Manche Hymnen wurden schon früh kodifiziert, andere blieben bis ins 20. Jahrhundert inoffiziell. Manche Länder beginnen daher mit vorgegebenen Nationalhymnen, die sich durch eine Revolution oder Verfassungsänderungen ändern können. Viele Länder wiederum müssen ihre Nationalhymnen von Grund auf neu erfinden – Komponisten und Texter können dabei wertvolle Hilfe leisten."
 elgar.801.g: "Darum kümmern wir uns später."
