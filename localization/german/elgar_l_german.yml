 elgar_classicism_tech:1 "Klassizismus" #1!
 elgar_classicism_tech_desc:1 "Der Begriff Klassizismus bezieht sich in der Kunst im Allgemeinen auf die Wertschätzung einer klassischen Epoche, der klassischen Antike in der westlichen Tradition, als Maßstab für den Geschmack, dem die Klassizisten nacheifern wollen. In seiner reinsten Form ist der Klassizismus eine ästhetische Haltung, die sich auf Prinzipien stützt, die in der Kultur, Kunst und Literatur des antiken Griechenlands und Roms verankert sind, wobei der Schwerpunkt auf Form, Einfachheit, Proportion, Klarheit der Struktur, Perfektion, zurückhaltenden Emotionen sowie auf einem ausdrücklichen Appell an den Intellekt liegt." #1!
 elgar_irrationalism_tech:1 "Irrationalismus" #1!
 elgar_modern_art_tech:1 "Moderne Kunst" #1!
 elgar_modern_art_tech_desc:1 "#R Diese Technologie ist nur ein Platzhalter und kann nicht erforscht werden. Vervollständige die Journaleinträge, um [concept_elgar_impressionism], [concept_elgar_expressionism] oder [concept_elgar_art_nouveau] zu erhalten!#!" #1!
 elgar_art_nouveau_tech:1 "Jugendstil" #1!
 elgar_art_deco_tech:1 "Art Déco" #1!
 elgar_art_deco_tech_desc:1 "Art Déco kombiniert moderne Stile mit feiner Handwerkskunst und reichen Materialien. In seiner Blütezeit stand es für Luxus, Glamour, Überschwang und den Glauben an den sozialen und technischen Fortschritt. Art Déco ist einer der ersten wirklich internationalen Stile, aber seine Dominanz endete mit dem Beginn des Zweiten Weltkriegs." #1!
 elgar_impressionism_tech:1 "Impressionismus" #1!
 elgar_neoclassicism_tech:1 "Neoclassicismus" #1!
 elgar_neoclassicism_tech_desc:1 "Nach der Jahrhundertwende kam es zu einer erneuten Begeisterung für klassische Ideale: Der Neoklassizismus. Er umfasste zumindest die Musik, die Philosophie und die Literatur. Während sich Architekten wieder an römischen und griechischen Bauwerken orientierten, entdeckten Komponisten die Barockmusik als Inspirationsquelle neu." #1!
 elgar_expressionism_tech:1 "Expressionismus" #1!
 elgar_new_objectivity_tech:1 "Neue Objektivität" #1!
 elgar_new_objectivity_tech_desc:1 "Obwohl der Begriff in erster Linie eine Tendenz in der deutschen Malerei beschrieb, verselbständigte er sich und charakterisierte die Haltung des öffentlichen Lebens im Weimarer Deutschland sowie die Kunst, Literatur, Musik und Architektur, die geschaffen wurden, um sich ihr anzupassen. Statt eines Ziels philosophischer Objektivität sollte er eine Hinwendung zur praktischen Auseinandersetzung mit der Welt bedeuten - eine ganz und gar geschäftliche Haltung, die von den Deutschen als typisch amerikanisch verstanden wurde." #1!
 elgar_mass_culture_tech:1 "Massenkultur" #1!
 elgar_mass_culture_tech_desc:1 "#R Diese Technologie ist nur über den Journaleintrag verfügbar!#!\n\nDie verständnislose Feindseligkeit der Masse gegenüber allen Traditionen, die für die Kultur stehen, die scharfe und kalte Intelligenz, die die Weisheit des Bauern verwirft, der neu entdeckte Naturalismus, der in Bezug auf alle Fragen des Geschlechts und der Gesellschaft weit auf ganz primitive Instinkte und Zustände zurückgeht, das Wiederauftauchen des panem et circenses in Form von Lohnstreitigkeiten und Sportstadien - all diese Dinge deuten auf die endgültige Schließung der Kultur und den Beginn einer ganz neuen Phase der menschlichen Existenz hin. - Oswald Spengler, Untergang des Abendlandes" #1!

 elgar_stop_composing_button:1 "Komponieren stoppen" #1!
 elgar_stop_composing_button_desc:1 "Der Komponist beendet seine kompositorische Arbeit und ist wieder für andere Aufgaben verfügbar." #1!
