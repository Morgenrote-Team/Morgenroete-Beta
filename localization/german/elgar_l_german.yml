 elgar.304.h:1 "Bezahlen Sie dem Komponisten das Doppelte, damit er ein ganz besonderes Stück für den Monarchen komponiert." #1!
 elgar.440.i:1 "Es gibt bestimmt ein Volkslied, mit dem sich jeder identifizieren kann." #1!
 elgar.441.h:1 "Ein Seemannslied könnte  nicht nur Seeleute erfreuen..." #1!
 elgar.442.h:1 "Ein Marsch konkönnte nte nicht nur Soldaten erfreuen..." #1!
  
 elgar_adopt_national_anthem_decision:1 "Adoptieren Sie eine Nationalhymne" #1!
 elgar_adopt_national_anthem_decision_desc:1 "Angesichts des wachsenden Nationalismus ist das Fehlen einer Nationalhymne gleichbedeutend mit Betrug. Es genügt, einigermaßen akzeptable zeremonielle Musik für repräsentative Zwecke auszuwählen. Komponisten können nach dem Zufallsprinzip Musikstücke erstellen, die später verwendet werden, sie können aber auch direkt in Auftrag gegeben werden. Nicht alle Hymnen müssen einen Text haben – aber es ist viel prestigeträchtiger." #1!
  
 je_elgar_composer_anthem:1 "Komponist komponiert Hymnenmelodie" #1!
 je_elgar_composer_anthem_reason:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] wurde mit der höchst offiziellen Aufgabe betraut, eine Melodie für die zukünftige Nationalhymne von [ROOT.GetCountry.GetNameNoFormatting] zu komponieren." #1!
 je_elgar_composer_anthem_goal:1 "Wenn es keine Vorfälle gibt, wird [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] jeden Monat [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]e Arbeit fortsetzen. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetSheHe|U] hat #G [ROOT.Var('elgar_composer_progress').GetValue]#! Monate lang gearbeitet." #1!

