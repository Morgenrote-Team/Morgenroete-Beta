 notification_elgar_composer_yearly_compositions_notification_desc:1 "Dieses Jahr hat [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] [GetPlayer.MakeScope.Var('elgar_composer_num_yearly_compositions').GetValue|V0] Musikstücke komponiert." #1!
 je_elgar_composer_touring:1 "Komponist geht auf Konzerttournee im Ausland" #1!
 je_elgar_composer_touring_reason:1 "Der [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] wird 30 Monate lang auf eine Konzertreise ins Ausland gehen und so unser Ansehen verbessern. Danach ist er wieder verfügbar." #1!
 je_elgar_composer_touring_goal:1 "Wenn es keine Zwischenfälle gibt, wird [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] seine Arbeit jeden Monat fortsetzen. Er hat für #G [ROOT.Var('elgar_composer_progress').GetValue]#! Monate gearbeitet." #1!
 je_elgar_composer_success:1 "Wenn es keine Zwischenfälle gibt, wird [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] seine Arbeit jeden Monat fortsetzen. Er hat für #G [ROOT.Var('elgar_composer_progress').GetValue]#! Monate gearbeitet." #1!
 je_elgar_composer_masterpiece:1 "Komponist komponiert Meisterwerk" #1!
 je_elgar_composer_masterpiece_reason:1 "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] wird sich in den nächsten Monaten ganz der Komposition eines Meisterwerks widmen. Die Zeit, die ein Komponist braucht, um ein Meisterwerk zu schaffen, hängt in erster Linie von seinem Renommee ab. Ein großer Komponist kann ein Meisterwerk in nur zwei Jahren schaffen. Komponisten mit einem Renommee von weniger als 400 brauchen wesentlich länger; ein Komponist mit einem Renommee von weniger als 250 sollte es gar nicht erst versuchen. Am Ende des Arbeitsprozesses wird [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] ein herausragendes musikalisches Meisterwerk unserer Generation präsentieren." #1!
 je_elgar_composer_masterpiece_goal:1 "Wenn es keine Zwischenfälle gibt, wird [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] seine Arbeit jeden Monat fortsetzen. Er hat für #G [ROOT.Var('elgar_composer_progress').GetValue]#! Monate gearbeitet." #1!
 je_elgar_composer_duel:1 "Komponistenduell" #1!
 je_elgar_composer_duel_reason:1 "Der [SCOPE.sCountry('target').GetAdjectiveNoFlag] Komponist [SCOPE.sCharacter('rival_composer_scope').GetFullName] hat behauptet, unser Land sei kulturell rückständig und [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] sei eine unbekannte Zahl. Wir müssen unbedingt dafür sorgen, dass er bekannter wird und damit der Welt beweisen, welches Land als musikalische Avantgarde gilt." #1!
 je_elgar_composer_duel_success:1 "Der erste Komponist, der es schafft, #V 100 zusätzliches Renommee#! zu gewinnen, beweist, dass sein Land mehr kulturelle Anerkennung genießt als das andere." #1!
 je_elgar_composer_duel_rival_death:1 "Auch der vorzeitige Tod des anderen Komponisten führt zum Sieg." #1!
 je_elgar_composer_duel_fail:1 "Wir verlieren das Duell, wenn der gegnerische Komponist vor uns #V 100 oder mehr Renommee#! erhält oder unser Komponist vorzeitig stirbt." #1!
  
 elgar.9.t:1 "Zwölftontechnik" #1!
 elgar.9.d:1 "Nach Jahrzehnten der musikalischen Stagnation haben moderne Komponisten ein neues Konzept entwickelt, das die Welt der Musik revolutionieren wird." #1!
 elgar.9.f:1 "Die Zwölftontechnik - auch bekannt als Dodekaphonie, Zwölfton-Serialismus und (im britischen Sprachgebrauch) Zwölftonkomposition - ist eine Methode der Musikkomposition. Mit dieser Technik wird sichergestellt, dass alle 12 Töne der chromatischen Tonleiter in einem Musikstück gleich oft erklingen, während die Betonung eines einzelnen Tons durch die Verwendung von Tonreihen, d. h. die Anordnung der 12 Tonklassen, verhindert wird. Auf diese Weise erhalten alle 12 Töne mehr oder weniger die gleiche Bedeutung, und die Musik ist nicht auf eine Tonart festgelegt. Im Laufe der Zeit wurde diese Technik immer beliebter und übte schließlich großen Einfluss auf die Komponisten des 20. Jahrhunderts. Sie wird gemeinhin als eine Form des Serialismus angesehen." #1!
 elgar.9.g:1 "Ich bin mir nicht so sicher, ob das eine gute Idee war." #1!
  
