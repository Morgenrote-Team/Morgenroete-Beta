 elgar.9.t: "Zwölftontechnik"
 elgar.9.d: "Nach Jahrzehnten der musikalischen Stagnation haben moderne Komponisten ein neues Konzept entwickelt, das die Welt der Musik revolutionieren wird."
 elgar.9.f: "Die Zwölftontechnik - auch bekannt als Dodekaphonie, Zwölfton-Serialismus und (im britischen Sprachgebrauch) Zwölftonkomposition - ist eine Methode der Musikkomposition. Mit dieser Technik wird sichergestellt, dass alle 12 Töne der chromatischen Tonleiter in einem Musikstück gleich oft erklingen, während die Betonung eines einzelnen Tons durch die Verwendung von Tonreihen, d. h. die Anordnung der 12 Tonklassen, verhindert wird. Auf diese Weise erhalten alle 12 Töne mehr oder weniger die gleiche Bedeutung, und die Musik ist nicht auf eine Tonart festgelegt. Im Laufe der Zeit wurde diese Technik immer beliebter und übte schließlich großen Einfluss auf die Komponisten des 20. Jahrhunderts. Sie wird gemeinhin als eine Form des Serialismus angesehen."
 elgar.9.g: "Ich bin mir nicht so sicher, ob das eine gute Idee war."
